- fmt: '# Geospatial Basics


    When building a geospatial search engine, it is important to define how the data
    will be represented. A bad representation can lead to slow and inefficient queries,
    thus leading to an overall degraded end-user experience.


    Geospatial data is typically available in various flavors. From high-level abstract
    models such as states and cities to granular forms such as latitude and longitude,
    geospatial data’s form determines its use cases. Data such as countries and their
    general locations is good for things like world maps but not good for hyperlocal
    delivery apps (for which actual longitude and latitude are vital). Hence, there
    is no silver bullet.


    Another consideration is the representation of the data in the search engine.
    Once we decide which data format we want to use, it is important to define how
    the data is stored in our indexes and how the query path works. In general, a
    bad representation can lead to an explosion in the size of the index, with a commensurate
    rise in the overall storage cost. In addition, Lucene queries are fan out, so
    the amount of data examined also increases, which can increase latency.


    As you can understand already from this discussion, the use of a search engine
    often proves advantageous compared to using a pure GIS application. A search engine
    allows you to use multiple focal points to build a composite result. As mentioned
    earlier, a combination of data such as locations and semantic data can provide
    powerful insight to applications.


    # Representing Spatial Data


    An obvious way to represent spatial data is to just store an identifier for the
    location. For example, consider indexing the name of a city as a token in the
    inverted index. Doing so allows for searching on the city name.


    However, this method is restrictive because it allows just a single dimension
    of search to be performed. In this case, only search term queries on city names
    are served.


    Therefore, we need to move to a deeper and richer data model that will allow finer
    queries to be served.


    One thing to consider is the system used in our application to represent the said
    data. The spatial reference used to define the representation of the data being
    indexed is crucial. The most common spatial reference is the World Geodetic System,
    and we shall assume we are using a standard system across our engine.


    The data that we will store for our search is latitudinal and longitudinal representation
    of the locations that we want to index and store. Latitude and longitude are generally
    expressed in degrees, minutes, and seconds from the prime meridian.


    One catch when using latitudes and longitudes is the possibility of information
    explosion. This depends solely on how the overall geographic horizon is structured.
    What that means is that the granularity at which data is stored is of crucial
    importance. Too granular the data being stored, the larger the index size. Too
    macro level, the more degradation of search quality.


    Figure [5-1](#485809_1_En_5_Chapter.xhtml#Fig1) shows the size of the index with
    the increase in the granularity of the latitude and longitude pairs stored for
    the same geographic area. The X-axis represents the number of pairs stored, and
    the Y-axis represents the size in gigabytes (GB).


    ![../images/485809_1_En_5_Chapter/485809_1_En_5_Fig1_HTML.jpg](images/485809_1_En_5_Chapter/485809_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Granularity vs. storage size


    Figure [5-2](#485809_1_En_5_Chapter.xhtml#Fig2) shows the search precision vs.
    the index size. As evident, search precision eventually peaks out with increasing
    index size.


    ![../images/485809_1_En_5_Chapter/485809_1_En_5_Fig2_HTML.jpg](images/485809_1_En_5_Chapter/485809_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Search precision vs. index size


    How do we solve this problem of storage vs. search quality? The next section answers
    this question for you.


    # Tiered Design for Storage


    Instead of storing all latitudes and longitudes in the same index, we break down
    the overall geographic spectrum into areas. This trade-off between precision and
    storage is a way to reach equilibrium.


    The division is done using Cartesian tiers. Each Cartesian tier focuses on a specific
    part of the geographic spectrum. For example, a tier may focus on one half of
    the city, and another tier may focus on a different part of the same city.


    This design helps divide the data space into logical partitions, and helps in
    defining independent indexes for groups of partitions (thus reducing both the
    memory footprint of a query and the overall latency). However, because two different
    design layouts in the same engine can cause correctness issues, it is imperative
    to ensure that no confusion or ambiguity exists when inserting new records or
    reading the data.


    # Geohashes


    Geohashes are a popular way to represent latitudes and longitudes. From Lucene’s
    point of view, a latitude and longitude can be represented as two separate fields,
    but such a representation can result in query and indexing performance issues.


    Geohashes provide an alternative way to represent this data. Representing the
    point on a Z order curve, a geohash is a hash for a given location. A Z order
    curve is a way of mapping multidimensional data to a single dimension without
    losing information.


    Imagine the world divided into a grid with 32 cells. The first character in a
    geohash identifies the initial location as 1 of the 32 cells.


    This cell will also contain 32 cells, and each of these will contain 32 cells
    (and so on ad infinitum). Adding characters to the geohash subdivides a cell,
    effectively zooming in to a more detailed area.


    Figure [5-3](#485809_1_En_5_Chapter.xhtml#Fig3) shows a geohash at three different
    levels.


    ![../images/485809_1_En_5_Chapter/485809_1_En_5_Fig3_HTML.jpg](images/485809_1_En_5_Chapter/485809_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Three levels of a geohash


    The use of a geohash allows indexing as a single field in Lucene and thus can
    save some performance cycles. However, the encoding and decoding cost their own
    CPU cycles (something to consider when performance planning).


    # Spatial Data with Text Search


    A typical location search engine will typically have these requirements from the
    indexed data:


    - **Distance calculation**: Given two points, calculate their distance.

    - **Bounding box filter**: Given an area, find all documents that match in the
    area.

    - **Sorting**: Sort all documents by their distance from an origin.

    - **Relevancy enhancement**: Use the distance as a boost in the ranking algorithm.

    - **Query parsing**: Given an abstract query, convert it into an actual internal
    representation.'
