    # Introduction


    Lucene has singlehandedly conquered the world of search. This project has come
    a long way in the context of features and user base from its initial days when
    being developed by Doug Cutting.


    Fast forward, and the world is changing. With the advent of big data and machine
    learning, Lucene has to embrace the upcoming change and ensure that the search
    quality that people have come to expect of the project remains constant.


    Lucene 8 is a step in that direction. With major new features introduced into
    the system, users need an updated look at how to use Lucene, which this book provides.


    # Acknowledgments


    I would like to acknowledge the Lucene/Solr community for the great product that
    they have built and the support they provided me when I was writing this book.


    # About the Author About the Technical Reviewer


    # 1. Hola, Lucene!


    Welcome to your journey into the mystic and fun world of search!


    This chapter discusses information-retrieval (IR) systems, focusing on Lucene,
    and includes a number of terms and key bits of information that you will find
    handy as we delve deeper into the innards of Lucene and build some cool applications.


    Before we begin, let’s review some commonly asked questions and their answers.


    > *Is Lucene a search engine?*


    I would generally respond, “Well, yes and no.”


    Lucene is a library and platform used to build a variety of IR systems, search
    engines being the most well known. Other areas where Lucene applies include the
    following:


    *   *Document analytics*: Loading and traversing text documents based on some
    given criteria, finding the top terms from documents, aggregating on specific
    fields.


    *   *Log analytics*: Analyzing application logs with high-performance dashboards
    built directly on top of Lucene.


    *   *Geospatial search*: With the recent advent of geospatial queries and data
    structures, Lucene is fast becoming a popular choice for indexing latitudinal
    and longitudinal data and queries such as colocation searches.


    > *Do I need a background in information retrieval?*


    A background in IR is good to have, but it is not mandatory in your quest to understand
    Lucene. Although this book covers some background theory, any complex information
    is explained in such a way as to allow you to build a contextual understanding.


    Note


    Information retrieval is a vast subject, and this book does not aim to be exhaustively
    authoritative on the topic. Instead, this book focuses on enhancing your understanding
    of Lucene. For a more robust understanding of IR in general, consult an IR book
    to complement this one. *Introduction to Information Retrieval* by Manning is
    a good reference book to start with.


    > *Does Lucene support SQL or SQL dialects?*


    No, Lucene has a set of supported queries (discussed in further chapters). You
    can use those queries, however, to construct execution plans that can be derived
    from SQL-ish languages. Some engines have done exactly that, but Lucene has no
    native support for it.


    Lucene is a library that enables you to build your search application. Use Lucene
    when you need fast indexing and search capabilities in your application. Lucene
    puts a lot of power in the user’s hands, but with great power comes great responsibility.
    So, it is crucial that the discerning user understand trade-offs and the best-fit
    cases for Lucene’s more advanced features (as discussed in later chapters).


    ## Key Features of Lucene


    Lucene has been around for a while, and a number of its features and capabilities
    have made it quite popular, including the following:


    *   *Scalable, high-performance indexing*: Lucene enables very fast indexing (over
    150GB/hour on modern hardware).


    *   *Incremental indexing*: Indexes are added as new documents come in, with no
    need to modify existing indexes (and thus avoiding excess index churn).


    *   *Top N queries*: Lucene is efficient at scanning through large volumes of
    data and getting the top N documents which match the query, ranked by the scoring
    function used.


    *   *Myriad query types*: Phrase queries, wildcard queries, proximity queries,
    range queries, and more.


    *   *Single-field and multifield searching*: Lucene allows searching on a single
    field or multiple fields — allowing ranking across multiple fields.


    *   *Sorting and faceting*: Lucene allows ordering results on a specific field
    (think of SQL `ORDER BY`). Lucene also allows faceting on different attributes
    (think of SQL `GROUP BY`).


    *   *Multi-index searches*: Lucene allows a single query to query multiple indices
    and then merge results from all of the indices to a final result set.


    *   *Concurrent indexing and searching*: Lucene allows using multiple threads
    for a single indexing or a search request. This can speed up the performance of
    a single request significantly.


    *   *Highlighting, joins, and result grouping*: Lucene allows joins across different
    indices with certain conditions.


    *   *Pluggable ranking models*: Including the [vector space model](http://en.wikipedia.org/wiki/Vector_Space_Model)
    and [Okapi BM25](http://en.wikipedia.org/wiki/Okapi_BM25).


    *   *Custom codecs for storage*: It is possible to implement and use custom storage
    formats in Lucene, thus allowing flexibility when using Lucene in the search application.


    Although by no means comprehensive, the preceding list highlights some of the
    more popular features available in Lucene that enable you to build high-performance
    systems while maintaining a high degree of relevance in the returned results.'
