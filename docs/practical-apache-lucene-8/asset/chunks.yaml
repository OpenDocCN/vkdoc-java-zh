  trans: '

    ## 距离计算


    假设我们需要定义一个度量标准以及计算两点之间距离的方法。最简单的选择是将地球视为平面模型，并使用欧几里得模型计算两点间的距离。这种模型能以最小的复杂度进行直线距离计算。然而，随着距离增加和对更高精度的需求，该模型将不再适用。


    另一种选择是将地球视为球体，并使用球面模型计算距离。虽然计算成本更高，但该模型能提供更好的精度。


    ### 边界框过滤器


    边界框过滤器用于指定边界过滤条件，以创建符合地理空间过滤条件的文档候选空间。考虑一个包含文本过滤器和地理空间过滤器的查询。由于地理空间索引会包含大量点，因此合理的做法是先将文档集缩小到一个小子集，然后对该子集应用进一步的过滤器，以实现查询的最佳性能。这就是边界框过滤器的作用所在。理想情况下，地理空间搜索的第一阶段应执行高级别的边界框过滤，然后对第一阶段的结果应用更复杂的搜索方法。


    通常，当系统中存储了纬度和经度时，你可以围绕给定的纬度和经度定义一个区域，从而划定一个区域，在该区域内的相关文档符合条件，并参与更高级别的整体过滤。


    请注意，如果系统使用地理哈希（geohashes）而不是纬度和经度，则可以确保更高的精度。


    ### 关于距离计算的一点说明


    对于具备地理空间搜索功能的搜索引擎而言，一个关键问题是用于处理和评估查询的距离算法。使用哪种算法取决于你对搜索精度的要求。在某些场景下，偏差一英里是可以接受的。然而，在其他场景下，偏差几英寸就可能导致严重问题。


    在大多数情况下，使用欧几里得距离对于各种查询来说已经足够。然而，对于类似地球的模型，哈弗辛（Haversine）计算算法效果非常好。对于更高的精度要求，文森特（Vincenty）模型则更为合理。


    # 6. 使用 Apache Mahout 引入机器学习


    本章介绍 Apache Mahout 以及 Apache Mahout 与 Lucene 之间的协同作用。


    Apache Mahout 是一个专为可扩展性而设计的机器学习算法库。


    ## Apache Mahout 的起源


    Mahout 起源于 Apache Lucene。2008 年，Lucene 默认内置了一些用于执行某种聚类的算法。


    Lucene 在其现有功能基础上不断添加机器学习算法，以至于将其保留在 Lucene 中已不再合理，而是应该将其打造成一个能够独立运行的引擎。这就是 Apache
    Mahout 项目的诞生。Mahout 最初是 Apache Lucene 的一个子项目，后来成为了顶级项目。


    ## 为什么选择 Apache Mahout？


    Apache Mahout 只是构建机器学习引擎的众多方式之一。我们在此探讨 Apache Mahout，是因为它最初是 Apache Lucene 的一个子项目，因此
    Mahout 具有一种天然的互补架构，能够支持对 Lucene 中的数据进行机器学习。


    ## 机器学习简介


    机器学习的应用范围从游戏博弈到欺诈检测，再到股票市场分析。


    机器学习使得构建诸如亚马逊推荐系统（试图推测用户购买意图）和 Netflix 推荐系统（基于过往观看历史推荐相关或互补的节目）等系统成为可能。


    机器学习利用算法和数学来定义预期结果的类型。分类和过滤是应用机器学习的两个强大用例。


    ### 学习


    *学习*（在机器学习语境中）是“学习”关于数据的新信息，并以越来越高的正确概率做出决策的过程。


    两种主要的学习类型是监督学习和无监督学习：


    *   *监督学习*是指有样本数据可用于训练机器学习模型，以预测和理解预期输出。


    *   *无监督学习*在没有输入数据的情况下工作。相反，它随着过程的进行从结果中学习。通过这种机制，算法从非常低的正确概率开始，然后利用反馈，最终逐步达到更高的正确概率。


    聚类是执行第一级过滤并排除你不希望包含在最终搜索结果中的内容的好方法。


    ### 协同过滤


    协同并非一个复杂的概念。这里有一个简单的例子：如果你想看一部电影，你会向朋友寻求推荐。同样地，协同过滤在执行过滤时采用最近邻方法。图 6-1 展示了一个协同过滤模型，其中用户推荐项目。如图所示，项目
    3 获得了最高评分，因为两位用户都推荐了该项目。


    ![../images/485809_1_En_6_Chapter/485809_1_En_6_Fig1_HTML.jpg](img/485809_1_En_6_Fig1_HTML.jpg)


    图 6-1


    协同过滤


    ### 聚类


    *聚类*是将相似对象分组的技术。


    聚类涉及将大量对象分隔成多个组，使得每个组内的对象彼此之间的相似度高于它们与其他组中对象的相似度。


    当你希望将对象分隔到不同的桶中，然后按桶进行处理时，聚类非常有用。


    聚类和协同过滤在它们都计算对象之间的相似度这一点上是相似的。然而，聚类仅涉及分隔，而协同过滤则更进一步。


    给定两个向量（值元组），我们实际上可以执行不同的分析来确定两者的“接近程度”（例如曼哈顿距离、余弦相似度、欧几里得距离等）。


    两种最流行的聚类方式是自上而下和自下而上。自上而下的聚类从一个大的簇开始，然后迭代地将大簇分解成更小的子簇，随着簇粒度的增加，簇内对象之间的相似度也随之增加。自下而上的聚类则相反。它将小簇合并成大簇，以形成最终的配置。流行的方法包括
    K-means 和层次聚类。图 6-2 展示了使用 K-means 算法聚类的一组文档。


    ![../images/485809_1_En_6_Chapter/485809_1_En_6_Fig2_HTML.jpg](img/485809_1_En_6_Fig2_HTML.jpg)


    图 6-2


    聚类


    ### 分类


    分类（通常也称为归类）的目标是标记未见过的对象，从而将它们分组在一起。


    分类是在看到“未见过的”对象时立即将其放入已知的桶中。这个过程可以包括从先前的候选对象中学习，观察未见过的对象具有哪些属性，然后利用这些属性的已知特征构建模型，以一定的概率为新对象分配一个类别。


    用于分类的特征可以是任何在被分类对象的上下文中具有意义的东西。它可以是词性、标签、短语等等。


    ## 从 Lucene 组件转换为 Mahout 组件


    在 Mahout 世界中，特征向量是一个对象或文档的一个子集。明确地说，特征向量是用于表示文档特定属性的一组属性元组。在一般情况下，它可以是一组权重。


    特征向量构成了 Lucene 和 Mahout 之间集成的基础。大多数 Mahout 算法都基于特征向量运行。

    '
- fmt: "# Integrating Lucene with Mahout\n\nThe key difference between Lucene and\
    \ Mahout is that Lucene requires features that enable a search and Mahout requires\
    \ features relevant for machine learning.\n\nThere are two standard ways to integrate\
    \ Lucene with Mahout, as discussed in the following two subsections.\n\n## lucene.vector\n\
    \nThe `lucene.vector` utility enables the conversion of Lucene vectors to Mahout\
    \ vectors. Note that the version of Lucene that creates the vectors should be\
    \ the same as the Lucene vector used in Mahout.\n\nThe first step is to create\
    \ term vectors before the conversion.\n\nHere, we create a field with term vectors:\n\
    \n```\nField fld = new Field(\"text\", \"foo\", Field.Store.NO, Field.Index.ANALYZED,\
    \ Field.TermVector.YES)\n```\n\nConvert the created Lucene index directly in Mahout\
    \ with the following:\n\n```\n/bin/mahout lucene.vector –dir / example/solr/data/index/\
    \ –output /tmp/ foo/part-out.vec –field title-clustering – idField id –dictOut\
    \ \n```\n\n## Lucene2seq\n\nThe preceding section showed you how to convert Lucene\
    \ term vectors into Mahout vectors for Mahout incorporation and processing. This\
    \ section shows you how to convert Lucene stored fields into Mahout consumable\
    \ objects (and thus available for Mahout processing). Run the following to see\
    \ the options:\n\n| `$ bin/mahout lucene2seq – help`Job-Specific Options:` | |\n\
    | --- | --- |\n| `--output (-o) output` | `The directory pathname for` |\n| |\
    \ `output.` |\n| `--dir (-d) dir` | `The Lucene directory` |\n| `--idField (-i)\
    \ idField` | `The field in the index` |\n| `containing the id` | |\n| `--fields\
    \ (-f) fields` | `The stored field(s) in the` |\n| `index containing text` | |\n\
    | `--query (-q) query` | `(Optional) Lucene query.` |\n| `Defaults to` | `MatchAllDocsQuery`\
    \ |\n| `--maxHits (-n) maxHits` | `(Optional) Max hits.` |\n| `Defaults to 2147483647`\
    \ | |\n| `--method (-xm) method` | `The execution method to use:` |\n| `sequential\
    \ or` | `mapreduce. Default is` |\n| `mapreduce` | |\n| `--help (-h)` | `Print\
    \ out help` |\n| `--tempDir tempDir` | `Intermediate output` |\n| `directory`\
    \ | |\n| `--startPhase startPhase` | `First phase to run` |\n| `--endPhase endPhase`\
    \ | `Last phase to run` |\n\nThe tool fetches all documents and creates a set\
    \ of key-value pairs, the key being the value of the ID of the field and value\
    \ being a concatenated value of the stored fields associated with that key.\n\n\
    `Lucene2seq` converts into sequence files (which are Mahout components).\n\n##\
    \ Java Version of Lucene2seq\n\nAnother way to use `lucene2seq` is to write a\
    \ Java program. An equivalent Java class is `LuceneStorageConfiguration`:\n\n\
    ```\nLuceneStorageConfiguration luceneStorageConf = new LuceneStorageConfiguration(configuration,\
    \ asList(index), seqFilesOutputPath, \"id\", asList(\"title\", \"description\"\
    ));\nLuceneIndexToSequenceFiles lucene2Seq = new LuceneIndexToSequenceFiles();\n\
    lucene2Seq.run(luceneStorageConf);\n```\n\n## Putting It All Together\n\nIn this\
    \ section, we use everything discussed in this chapter to write a clustering program\
    \ for Mahout with data accumulated from Lucene indexes.\n\nNote that this uses\
    \ `LuceneIndexToSequenceFiles` to convert Lucene indexes to Mahout sequence files.\n\
    \nIt then performs clustering based on standard Mahout techniques (with nothing\
    \ Lucene specific in this part of the code):\n\n```\nimport org.apache.hadoop.conf.Configuration;\
    \ import org.apache.hadoop.fs.FileSystem; import org.apache.hadoop.fs.Path;\n\
    import org.apache.hadoop.io.IntWritable; import org.apache.hadoop.io.SequenceFile;\
    \ import org.apache.hadoop.util.ToolRunner; import org.apache.mahout.clustering.Cluster;\n\
    import org.apache.mahout.clustering.canopy.CanopyDriver;\nimport org.apache.mahout.clustering.classify.WeightedPropertyVectorWritable;\n\
    import org.apache.mahout.clustering.kmeans.KMeansDriver;\nimport org.apache.mahout.common.distance.TanimotoDistanceMeasure;\n\
    import org.apache.mahout.text.LuceneStorageConfiguration;\nimport org.apache.mahout.text.SequenceFilesFromLuceneStorage;\n\
    importorg.apache.mahout.vectorizer.SparseVectorsFromSequenceFiles;\nimport com.google.common.collect.Lists;\n\
    import java.util.Arrays;\nimport java.util.List;\n//Perform a simple K-means clustering\
    \ to segregate documents\npublic class SimpleKMeansClustering {\npublic static\
    \ void main(String args[]) throws Exception {\nConfiguration conf = new Configuration();\
    \ FileSystem fs = FileSystem.get(conf);\n//Use Lucene indexes as input data sources\n\
    Path indexFilesPath = new Path(\"lucene/indexes/educations\");\n//ML model data\
    \ inputs—training data\nPath sequenceFilesPath = new Path(\"clustering/testdata/sequencefiles/\"\
    );\nPath sparseVectorsPath = new Path(\"clustering/testdata/sparsevectors/\");\n\
    //For TF IDF calculation\nPath tfVectorsPath = new Path(\"clustering/testdata/sparsevectors/tf-vectors\"\
    );\nPath inputClustersPath = new Path(\"clustering/testdata/input-clusters\");\n\
    Path finishedInputClustersPath = new Path(\"clustering/testdata/input-clusters/clusters-0-final\"\
    );\nPath finalClustersPath = new Path(\"clustering/output\");\n//Create sequence\
    \ files from a Lucene index\nLuceneStorageConfiguration luceneStorageConf = new\
    \ LuceneStorageConfiguration(conf, Arrays.asList(indexFilesPath),\nsequenceFilesPath,\
    \ \"id\", Arrays.asList(\"name\", \"description\"));\nSequenceFilesFromLuceneStorage\
    \ sequenceFilefromLuceneStorage = new SequenceFilesFromLuceneStorage();\nsequenceFilefromLuceneStorage.run(luceneStorageConf);\n\
    //Generate Sparse vectors from sequence files\ngenerateSparseVectors(true, true,\
    \ true, 5, 4, sequenceFilesPath, sparseVectorsPath);\n//Generate input clusters\
    \ for K-means (instead of having K\n//randomly initiated)\nTanimotoDistanceMeasure\
    \ tanimoDistance = new TanimotoDistanceMeasure();\nCanopyDriver.run(tfVectorsPath,\
    \ inputClustersPath, tanimoDistance, (float) 3.1, (float) 2.1, false, (float)\
    \ 0.2, true);\n//Generate K-means clusters\nKMeansDriver.run(conf, tfVectorsPath,\
    \ finishedInputClustersPath, finalClustersPath, 0.001, 10, true, 0, true);\n//Read\
    \ and print out the clusters in the console\n//SequenceFile.Reader reader = new\n\
    SequenceFile.Reader(fs, new Path(\"clustering/output/\" + Cluster.CLUSTERED_POINTS_DIR\
    \ + \"/part-m-0\"), conf);\nIntWritable key = new IntWritable(); WeightedPropertyVectorWritable\
    \ value = new WeightedPropertyVectorWritable();\nwhile (reader.next(key, value))\
    \ {\nSystem.out.println(value.toString() + \" belongs to cluster \" + key.toString());\n\
    }\nreader.close();\n}\n//Use Mahout to generate weights\npublic static void generateSparseVectors\
    \ (boolean tfWeighting, boolean sequential, boolean named, double maxDFSigma,\
    \ int numDocs, Path inputPath, Path outputPath) throws Exception {\nList argList\
    \ = Lists.newLinkedList();\nargList.add(\"-i\");\nargList.add(inputPath.toString());\n\
    argList.add(\"-o\");\nargList.add(outputPath.toString());\nif (sequential) {\n\
    argList.add(\"-seq\");\n}\nif (named) {\nargList.add(\"-nv\");\n}\nif (maxDFSigma\
    \ >= 0) {\nargList.add(\"--maxDFSigma\");\nargList.add(String.valueOf(maxDFSigma));\n\
    }\nif (tfWeighting) {\nargList.add(\"--weight\");\nargList.add(\"tf\");\n}\nString[]\
    \ args = argList.toArray(new String[argList.size()]);\nToolRunner.run(new SparseVectorsFromSequenceFiles(),\
    \ args);\n}\n}\n```\n\n# Improving Lucene’s Performance\n\nThis chapter focuses\
    \ on how to tune Lucene for optimal performance. You can use Lucene in multiple\
    \ ways, but core performance ideally focuses on two aspects: indexing and querying\
    \ (as discussed throughout this chapter).\n\nThis short chapter provides pointers\
    \ for problem solving and is therefore light on theoretical concepts. The contents\
    \ of this chapter build on what you’ve learned in earlier chapters. Here we just\
    \ discuss best practices. The chapter does not really introduce anything new.\
    \ (And because you have carefully read through the book to this point, you already\
    \ understand the reasoning behind most of these practices.)"
