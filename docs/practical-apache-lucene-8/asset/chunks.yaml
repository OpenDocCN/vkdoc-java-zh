    \ 0 表示未索引字段。\n\n*   次低位为 1 表示字段存储了词向量，为 0 表示字段没有词向量。\n\n*   如果第三低位被设置（0x04），则词项位置与词向量一起存储。\n\
    \n*   如果第四低位被设置（0x08），则词项偏移量与词向量一起存储。\n\n*   如果第五低位被设置（0x10），则已索引字段的范数被省略。\n\n\
    如果第六低位被设置（0x20），则为已索引字段存储载荷。\n\n### 词项字典\n\n词项字典由两个文件表示：\n\n词项信息（或 tis）文件保存关于词项的元数据，例如词项名称、跳跃信息和文档频率（即包含该词项的文档数量）。tis\
    \ 文件还保存有用的信息，帮助 Lucene 构建结构，以便更优地访问给定词项的相关文档（Lucene 内部使用跳跃数据结构来加快访问速度，tis 文件保存的数据有助于构建此结构）。此外，此文件中的词项频率等元数据允许在其他文件中更快地访问。\n\
    \n词项信息索引文件（扩展名 .tii）保存元数据，允许对词项信息文件进行随机访问。\n\n## 频率文件\n\n频率文件（扩展名 .frq）将文档映射到词项。也就是说，它包含一个列表，列出了词项字典中所有包含某个词项的文档，以及每个词项在文档中的出现频率。\n\
    \n## 位置文件\n\n位置文件（扩展名 .prx）表示每个词项在文档中出现的位置列表。\n\n## Lucene 查询\n\n查询是应用程序与 Lucene\
    \ 交互并从中提取数据的灵魂。\n\nLucene 在这方面拥有多种核心能力，并允许构建丰富且语义多样的查询。Lucene 查询引擎的一个关键特性是其可扩展性，以及能够根据用户需求设置自定义参数来定制搜索和排序，这将在后续章节中讨论。\n\
    \n与普遍预期相反，Lucene 不支持 SQL 或类似 SQL 的语法。Lucene 拥有自定义的查询语法，旨在充分利用 Lucene 提供的所有功能。\n\
    \n## Lucene 查询的结构\n\nLucene 的查询由两个主要部分组成：词项和操作符。由于我们之前已经讨论过词项的定义和语义相关性，这里不再赘述。然而，词项的两个重要分类对我们后续的讨论会很有帮助：\n\
    \n*   **单一词项**：单一词项是由单个词元组成的词项（例如，“walk”）。它们通常是原子的，构成了查询的基本结构。\n\n*   **短语**：短语是由多个单一词项组成的多词项现象。例如“Walk\
    \ This Way”。短语允许更丰富的查询匹配和检索，以及一种语义更强大的表达查询的方式。表 1-1 描述了查询及其等效应用，并为每种查询提供了一个示例。\n\
    \n## 字段\n\n字段用于在定义查询时指定谓词。字段是特定于数据语料库的，可以在构建查询时使用。可以指定任何可查询的有效字段。执行搜索时，可以指定要搜索的字段。可以使用任何现有的字段名称作为字段名称。在某些类型的查询中，可以指定多个字段。\n\
    \n## Lucene 中的查询类型\n\n本节介绍 Lucene 中可用的不同查询类型、它们的应用以及一个简短的示例。\n\n图 1-5 展示了一种实例化复合查询并为其设置一组子句的方法。大多数查询支持单个谓词，但某些查询（如\
    \ BooleanQuery）支持多个且多样化的子句，从而允许进行更复杂的搜索。\n\n![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig5_HTML.jpg](img/485809_1_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5.\n\n## Lucene 与关系数据库\n\n尽管在许多方面相似，但信息检索系统与传统的关系统数据库系统存在本质区别。主要区别包括：\n\n\
    *   数据库提供严格的模式，从而强制输入系统的数据必须符合特定的结构。相比之下，信息检索系统通常是无模式的，并基于元组模型工作。\n\n*   数据库建立在模式之上，允许进行数据建模（例如实体关系图）。信息检索系统不具备这种能力（也不需要）。\n\
    \n*   必须使用精确值查询数据库，但信息检索系统允许不精确的搜索和语义。\n\n*   数据库通常用于精确检索，而信息检索系统通常用于不精确的“广泛”搜索，其中所有文档都可能匹配查询，因此排序和相关性概念得以应用。\n\
    \n# 2. Hello World：Lucene 之道\n\n本章介绍如何使用 Lucene 索引数据，具体包括 Lucene 如何存储和表示数据、Lucene\
    \ 查询的细微差别，以及 Lucene 如何促进多参数搜索。\n\n## 在 Lucene 中索引数据\n\n`IndexWriter` 是面向用户的主要类，负责在\
    \ Lucene 中索引数据。`IndexWriter` 用于分析文档、打开目录以及将数据写入目录。\n\n图 2-1 展示了索引操作的整体流程。一个由各种字段组成的文档首先被传递给分析器，然后被交给一个\
    \ `IndexWriter` 实例。`IndexWriter` 与 Lucene 内部交互以打开相关目录，以正确且必需的格式形成索引，并将其写入底层目录。此后打开的任何读取器都可以访问（可见）该文档。\n\
    \n![../images/485809_1_En_2_Chapter/485809_1_En_2_Fig1_HTML.jpg](img/485809_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1\n\n索引操作流程\n\n现在让我们更仔细地看看此过程中涉及的类。\n"
- fmt: '# Document


    `Document`是Lucene中表示文档及其关联内容的基类。文档是索引和搜索的宏观单元；索引和搜索都以文档为单位处理数据。


    一个`Document`由一个或多个`Field`类实例组成。字段是键和值的组合。字段可以存储或不存储。存储的字段会随搜索结果一起返回，因此理想情况下每个文档应至少包含一个存储字段。然而，存储字段会显著增加索引的存储占用。在最坏情况下（所有字段都存储），字段存储可能导致磁盘索引的整体存储大小增加约30%。


    创建`Document`类实例时，可以将每个字段标记为已分析或未分析。标记为已分析的字段会通过分析器处理。


    ## Analyzers


    分析器在数据作为输入传递给另一个Lucene类之前对其进行分析。分析器可用于索引和搜索，通常建议使用。分析器通常使用一组已定义的分词器将输入文本拆分为词元，并应用一组过滤器。以下部分介绍Lucene中可用的几种分析器。


    ### StandardAnalyzer


    大多数Lucene用户使用`StandardAnalyzer`，这是一个为简单性、通用行为和易用性而设计的一体化分析器。


    `StandardAnalyzer`从输入中移除停用词，这在处理自然语言文本时非常有帮助。`StandardAnalyzer`还会将文本转换为小写（这是一个需要注意的重要点，因为大小写问题可能导致在使用`StandardAnalyzer`索引的数据进行搜索时出现细微的应用程序代码错误）。


    注意


    `StandardAnalyzer`会将数据转换为小写。因此，请记住这一点，并确保在搜索时使用相同的分析器，或自行将文本转换为小写。


    以下是一个示例：


    *   *输入：* “Lucene Is A Library”

    *   *输出：* [Lucene] [a] [Library]


    ### StopAnalyzer


    `StopAnalyzer`与`StandardAnalyzer`类似，但它使用`StopFilter`执行停用词移除。


    ### SimpleAnalyzer


    `SimpleAnalyzer`同样与`StandardAnalyzer`类似，但它无法移除停用词，也无法识别URL。


    以下是一个示例：


    *   *输入：* “Lucene Is A Library”

    *   *输出：* [Lucene] [is] [a] [Library]


    以下代码示例展示了一个用于分析文本并返回分词结果的分析器。请注意，分词结果取决于所使用的分析器及其特性：


    ```

    public List performAnalyze(String input, Analyzer analyser) throws IOException
    {

    List result = new ArrayList();

    TokenStream tokenStream = analyser.tokenStream("field_name", input);

    CharTermAttribute attr = tokenStream.addAttribute(CharTermAttribute.class);

    tokenStream.reset();

    while(tokenStream.incrementToken()) {

    result.add(attracts.toString());

    }

    return result;

    }

    ```


    ### IndexWriter


    `IndexWriter`创建索引并将数据写入索引。由于`IndexWriter`是索引过程的关键组件，构建应用程序的用户需要理解它。


    `IndexWriter`允许创建新索引和打开现有索引。请记住，Lucene索引是仅追加的。也就是说，一旦数据被写入，它就是不可变的，直到称为段合并（稍后讨论）的过程合并旧数据。这种不可变性允许`IndexWriter`处理当前仅提供查询服务的现有索引。正在运行的查询仅使用索引的快照，不会干扰`IndexWriter`的数据写入过程。


    `IndexWriter`支持多种应用程序编程接口（API）来与底层数据交互，并允许与数据进行复杂和自定义的交互。可以使用`addDocument()`添加新文档，使用`deleteDocuments()`删除文档，使用`updateDocument()`更新现有文档。请注意，`deleteDocuments()`也可以传入查询，所有匹配查询的文档都将被删除。更新文档意味着删除和插入，因为Lucene索引是仅追加的。


    `IndexWriter`将数据写入索引内的新段。段是Lucene索引内的逻辑数据单元。调用`commit()`会强制创建新段。然而，在每次文档插入后调用`commit()`是一种昂贵的操作，且不是一个好主意。请注意，`commit()`是一个原子操作。


    ## Directory


    `Directory`表示文件系统级目录的逻辑表示。`Directory`允许创建和访问索引，并支持随机访问。Lucene支持多种`Directory`实现，例如使用Java非阻塞I/O（NIO）的实现（`NIOFSDirectory`），另一种使用内存映射文件（`MMapDirectory`）的实现，等等。


    现在，让我们按照以下高级步骤创建文档并对其进行索引：


    1.  创建文档。

    2.  创建索引并打开以进行写入。

    3.  索引数据。


    ### 创建文档


    在此示例中，假设我们获得一个`File`实例作为输入。然后我们完成以下步骤：


    1.  从原始`File`实例获取字段。

    2.  从步骤1获取的数据创建Lucene`Field`实例。

    3.  为每个字段设置相关属性。

    4.  创建Lucene文档。

    5.  将字段添加到文档。


    以下代码按给定顺序遵循上述步骤：


    ```

    private Document parseAndCreateDocument(File file) throws IOException {

    //Assume we have a parser that returns different fields from the file

    FancyParser fancyParser = FancyParser.getParser().parse(file);

    //Step 1

    String firstTest = fancyParser.getFirst();

    String secondText = fancyParser.getSecond();

    String thirdText = fancyParser.getThird();

    //Steps 2 and 3

    Field firstField = new Field("first_field", firstText, Field.Store.YES, Field.Index.NOT_ANALYZED);

    Field secondField = new Field("second_field", secondText, Field.Store.YES, Field.Index.NOT_ANALYZED);

    Field thirdField = new Field("third_field", thirdText, Field.Store.YES, Field.Index.NOT_ANALYZED);

    //Step 4

    Document document = new Document();

    //Step 5

    document.add(firstField);

    document.add(secondField);

    document.add(thirdField);

    return document;

    }

    ```


    ### 创建索引并写入文档


    在本节中，我们创建一个新索引并使用它来索引文档。如前所述，此过程涉及的主要组件是`IndexWriter`和`Directory`。`IndexWriter`允许创建索引和写入索引。`IndexWriter`在底层使用目录来实际写入所需数据。


    高级步骤如下：


    1.  创建`IndexWriter`实例。

    2.  创建用于存储索引的Lucene目录。

    3.  使用正确的配置初始化`IndexWriter`。


    实现上述步骤：


    ```

    public IndexWriter getIndexWriter(String path) throws IOException {

    //Step 1

    IndexWriter indexWriter;

    //Step 2

    FSDirectory.open(new File(path));

    //Step 3

    indexWriter = new IndexWriter(indexDirectory,

    new StandardAnalyzer(Version.LUCENE_80), true,

    IndexWriter.MaxFieldLength.UNLIMITED);

    return indexWriter;

    }

    ```'
  raw: '## Document


    `Document` is the base class representing a document and its associated contents
    in Lucene. A document is the macro unit for both indexing and search; both indexing
    and search process data in document units.


    A `Document` consists of one or more instances of the `Field` class. A field is
    a combination of a key and a value. A field can be stored or not. A stored field
    is returned with search hits, and so ideally each document should contain at least
    one stored field. However, stored fields can significantly add to the storage
    footprint of the index. In worst cases (where all fields are stored), field storage
    can lead to an increase of about 30% in the overall storage size of the on-disk
    index.


    When you create a Document class’ instance, you can mark each field as analyzed
    or not. A field marked as analyzed is run through an analyzer.


    ## Analyzers


    Analyzers analyze data before it that data is passed as input to another Lucene
    class. You can use analyzers for both indexing and searching, and their use is
    generally recommended. Analyzers typically split the input text into tokens, using
    a set of tokenizers already defined and applying a set of filters. The following
    sections cover a few of the available analyzers in Lucene.


    ### StandardAnalyzer


    Most Lucene users use `StandardAnalyzer`, a one-size-fits-all analyzer designed
    for simplicity, generic behavior, and ease of use.


    `StandardAnalyzer` removes stop words from the input, which is a great help when
    processing naturally occurring text. `StandardAnalyzer` also converts text to
    lowercase (an important point to note because case issues can lead to subtle bugs
    in application code when searching for data indexed with `StandardAnalyzer`).


    Note


    `StandardAnalyzer` lowercases data. So, remember this and ensure that you use
    the same analyzer while searching or converting the text to lowercase yourself.


    Here is an example:


    *   *Input:* “Lucene Is A Library”


    *   *Output:* [Lucene] [a] [Library]


    ### StopAnalyzer


    `StopAnalyzer` is similar to `StandardAnalyzer`, but it performs stop-word removal
    using the `StopFilter`.


    ### SimpleAnalyzer


    `SimpleAnalyzer` is again similar to `StandardAnalyzer`, but it cannot remove
    stop words and cannot recognize URLs.


    Here is an example:


    *   *Input:* "Lucene Is A Library"


    *   *Output:* [Lucene] [is] [a] [Library]


    The following code sample shows an input analyzer used to analyze a piece of text
    and return a tokenized result. Note that the tokenized result depends on the analyzer
    being used and the characteristics of the analyzer:


    ```

    public List performAnalyze(String input, Analyzer analyser) throws IOException
    {

    List result = new ArrayList();

    TokenStream tokenStream = analyser.tokenStream("field_name", input);

    CharTermAttribute attr = tokenStream.addAttribute(CharTermAttribute.class);

    tokenStream.reset();

    while(tokenStream.incrementToken()) {

    result.add(attracts.toString());

    }

    return result;

    }

    ```


    ### IndexWriter


    `IndexWriter` creates and writes data to an index. Because `IndexWriter` is a
    crucial component of the indexing process, users building applications need to
    understand it.


    `IndexWriter` enables you to both create a new index and open an existing index.
    Remember that Lucene indexes are append only. That is, once data is written, it
    is immutable until a process known as segment merging (discussed later) merges
    older data. This immutability allows an `IndexWriter` to work on existing indexes
    that currently just serve queries. The currently running queries just use a snapshot
    of the index and do not interfere in the `IndexWriter`’s data-writing process.


    `IndexWriter` supports a diverse set of application programming interfaces (APIs)
    to interact with the underlying data and to allow complex and custom interactions
    with the data. New documents can be added with `addDocument()`, documents can
    be deleted with `deleteDocuments()`, and an existing document can be updated with
    `updateDocument()`. Note that `deleteDocuments()` can be passed in a query as
    well, and all documents matching the query will be deleted. Updating a document
    implies a delete and an insert because Lucene indexes are append only.


    `IndexWriter` writes data to a new segment within the index. A segment is a logical
    unit of data within a Lucene index. Calling `commit()` forces the creation of
    a new segment. However, calling `commit()` after each document insertion is an
    expensive operation and a bad idea. Note that `commit()` is an atomic operation
    .


    ## Directory


    `Directory` represents the logical representation of a filesystem-level directory.
    `Directory` allows creation and access of indexes and supports random accesses.
    Lucene supports a variety of `Directory` implementations, such as one using Java’s
    Non-blocking I/O (NIO) (`NIOFSDirectory`), another one that MMaps files (`MMapDirectory`),
    and so forth.


    Let’s now create documents and index them with the following high-level steps:


    1.  Create documents.


    2.  Create index and open it for writing.


    3.  Index data.


    ### Create Documents


    For this example, assume that we get a `File` instance as the input. We then complete
    the following steps:


    1.  Get fields from the raw `File` instance.


    2.  Create Lucene `Field` instances from the data you get in step 1.


    3.  Set relevant properties for each field.


    4.  Create a Lucene document.


    5.  Add the fields to the document.


    The following code follows the above steps in given order:


    ```

    private Document parseAndCreateDocument(File file) throws IOException {

    //Assume we have a parser that returns different fields from the file

    FancyParser fancyParser = FancyParser.getParser().parse(file);

    //Step 1

    String firstTest = fancyParser.getFirst();

    String secondText = fancyParser.getSecond();

    String thirdText = fancyParser.getThird();

    //Steps 2 and 3

    Field firstField = new Field("first_field", firstText, Field.Store.YES, Field.Index.NOT_ANALYZED);

    Field secondField = new Field("second_field", secondText, Field.Store.YES, Field.Index.NOT_ANALYZED);

    Field thirdField = new Field("third_field", thirdText, Field.Store.YES, Field.Index.NOT_ANALYZED);

    //Step 4

    Document document = new Document();

    //Step 5

    document.add(firstField);

    document.add(secondField);

    document.add(thirdField);

    return document;

    }

    ```


    ### Create Index and Write Documents


    In this section, we create a new index and use it to index documents. As described
    earlier, the main components involved in this process are `IndexWriter` and `Directory`.
    `IndexWriter` enables both creation of the index and writing to the index. `IndexWriter`
    uses a directory below it to actually write the needed data.


    The high-level steps are as follows:


    1.  Create an `IndexWriter` instance.


    2.  Create a Lucene directory in which to storage the index.


    3.  Initialize the `IndexWriter` with the correct configuration.


    Implementing the above steps:


    ```

    public IndexWriter getIndexWriter(String path) throws IOException {

    //Step 1

    IndexWriter indexWriter;

    //Step 2

    FSDirectory.open(new File(path));

    //Step 3

    indexWriter = new IndexWriter(indexDirectory,

    new StandardAnalyzer(Version.LUCENE_80), true,

    IndexWriter.MaxFieldLength.UNLIMITED);

    return indexWriter;

    }

    ```'
