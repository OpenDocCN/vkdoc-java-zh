- fmt: '# Distance Calculations


    Suppose that we need to define a metric and a method to calculate the distance
    between two points. The easiest option is to treat the earth as a flat model and
    calculate the distance between two points using a Euclidean model. This model
    allows straight distance calculations with minimal complications. However, this
    model does not scale as distances grow and higher precision is needed.


    The other option is to treat earth as a sphere and calculate distances using a
    spherical model. While more computationally expensive, this model provides better
    accuracy.


    ## Bounding Box Filter


    Bounding box filters are used to specify bounding filters for creating a candidate
    space of documents that match a geospatial filter. Consider a query that contains
    a textual filter and a geospatial filter. Since a geospatial index will contain
    a high number of points, it makes sense to first narrow down the set of documents
    to a small subset and then apply further filters on the subset to allow optimal
    performance of the query. This is where bounding box filters come in. Optimally,
    the first phase of a geospatial search should perform a high-level bounding box
    filter and then apply more sophisticated searching methods to the result of the
    first phase.


    Typically, when latitudes and longitudes are stored in the system, you can define
    an area around a given latitude and longitude and thus define an area in which
    the documents involved are qualified and participate in the overall filtering
    at a higher level.


    Note that you can ensure a higher degree of accuracy if the system use geohashes
    instead of latitudes and longitudes.


    ## A Point on Distance Calculation


    For search engines with geospatial searches, a key question is the distance algorithm
    used to serve and evaluate queries. Which algorithm you use depends on how accurate
    you want your searches to be. In some scenarios, being off by a mile is fine.
    In other scenarios, however, a few inches off may cause havoc.


    In most cases, using Euclidean distance is good enough for all kinds of queries.
    However, for an earth-like model, the Haversine calculation algorithm works really
    well. For higher accuracy, Vincenty’s model makes sense.


    # Introducing Machine Learning with Apache Mahout


    This chapter covers Apache Mahout and the synergy between Apache Mahout and Lucene.


    Apache Mahout is a library of machine-learning algorithms designed to for scalability.


    ## Origin of Apache Mahout


    Mahout’s origin derives from Apache Lucene. In 2008, Lucene had a few algorithms
    for doing some sort of clustering by default.


    Lucene kept adding machine-learning algorithms on top of its existing capabilities,
    to a point where it did not make sense to keep the capability in Lucene but to
    instead make it an independent engine that could function on its own. This was
    the birth of the Apache Mahout project. Mahout started as a subproject of Apache
    Lucene and then became a top-level project.


    ## Why Apache Mahout?


    Apache Mahout is only one of the numerous ways in which machine-learning engines
    can be built. We are examining Apache Mahout here because it started as a subproject
    of Apache Lucene, and therefore Mahout has an inherent complementary architecture
    that supports machine learning on data present in Lucene.


    ## Introduction to Machine Learning


    Machine-learning uses range from game playing to fraud detection to stock market
    analysis.


    Machine learning enables system builds such as Amazon’s recommendation system,
    which attempts to divine user purchasing intentions, and such as Netflix recommendation
    system, which builds upon past viewing history and recommends related or complementary
    shows.


    Machine learning leverages algorithms and mathematics to define the kinds of expected
    results. Categorization and filtering are two powerful use cases that apply machine
    learning.


    ### Learning


    *Learning* (in a machine-learning context) is the process of “learning” new information
    about the data and making decisions with a rising probability of being correct.


    The two main types of learning are supervised and unsupervised learning:


    - *Supervised learning* is when sample data is available for training the machine-learning
    model to anticipate and understand the expected output.

    - *Unsupervised learning* works without any input data. Instead, it learns from
    results as it goes along. With this is mechanism, the algorithm starts from a
    very low correctness probability and then, using feedback, eventually works its
    way to more correct probability.


    Clustering is a good way to perform first-level filtering and to eliminate pieces
    that you do not want included in the final search results.


    ### Collaborative Filtering


    Collaboration is not a complex concept. Here is a simple example: If you want
    to watch a movie, you ask your friends for recommendations. Likewise, collaborative
    filtering takes a nearest-neighbor approach when performing filtering. Figure
    6-1 shows a collaborative-filtering model in which users recommend items. As shown,
    Item 3 gets the highest rating because both users recommend that item.


    ![../images/485809_1_En_6_Chapter/485809_1_En_6_Fig1_HTML.jpg](images/485809_1_En_6_Chapter/485809_1_En_6_Fig1_HTML.jpg)


    Figure 6-1 Collaborative filtering


    ### Clustering


    *Clustering* is the art of creating groups of similar objects.


    Clustering involves segregating myriad objects into groups in which each group’s
    objects are most similar to each other compared to their similarity to objects
    in other groups.


    Clustering proves useful when you want to segregate objects into different buckets
    and then process them on a per-bucket basis.


    Clustering and collaborative filtering are similar in the sense that they both
    calculate similarity between objects. However, clustering is involved only in
    the segregation, whereas CF goes a step further.


    Given two vectors (value tuples), we can actually perform different analysis to
    determine the “closeness” of the two (such as Manhattan distance, cosine similarity,
    Euclidean distance, and so on).


    The two most popular ways to cluster are top down and bottom up. Top-down clustering
    starts with a large cluster and iteratively breaks down the large cluster into
    smaller subclusters, with increasing similarity between objects of a cluster as
    the cluster granularity increases. Bottom-up clustering works the other way around.
    It merges small clusters into larger clusters to form the final configuration.
    Popular approaches include K-means and hierarchical clustering. Figure 6-2 shows
    a clustered set of documents using a K-means algorithm.


    ![../images/485809_1_En_6_Chapter/485809_1_En_6_Fig2_HTML.jpg](images/485809_1_En_6_Chapter/485809_1_En_6_Fig2_HTML.jpg)


    Figure 6-2 Clustering


    ### Categorization


    The goal of categorization (often also called classification) is to label unseen
    objects and thus group them together.


    Categorization is putting the “unseen” in a known bucket as soon as it is viewed.
    This process can involve learning from previous candidates and seeing which kinds
    of properties the unseen object has, and then building a model using the known
    features of those properties to assign a category to the new object with a probability.


    Features for classification can be anything that makes sense in the context of
    the object being classified. It can be parts of speech, tags, phrases, and so
    forth.


    ## Converting from Lucene Components to Mahout Components


    In the Mahout world, a feature vector is an object or a subset of a document.
    Explicitly, a feature vector is a tuple of attributes used for a document to represent
    a specific property. In a general case, it can be a set of weights.


    Feature vectors form the basis of the integration between Lucene and Mahout. Most
    Mahout algorithms run off feature vectors.'
