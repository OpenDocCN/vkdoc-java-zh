- fmt: '# On-Disk Representation of a Lucene Index


    The on-disk representation of a Lucene index is optimized to be efficient in reads
    and writes, and it allows searches into required areas of the index.


    At the heart of Lucene lies the Lucene index file format. Post Lucene 4, formats
    are pluggable (using custom codecs, as discussed later in this chapter). However,
    the default file format is what is published on Lucene’s official website and
    what this section covers.


    Referring to Figure [1-4](#485809_1_En_1_Chapter.xhtml#Fig4), the basic components
    to start defining are as follows:


    - **Field definition**: Field definitions are stored in an independent file named
    `FieldInfos` (with the extension `.fnm`).


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig4_HTML.jpg](images/485809_1_En_1_Chapter/485809_1_En_1_Fig4_HTML.jpg)


    Figure 1-4. Lucene Index Structure


    From the official definition:


    `FieldInfos (.fnm) --> FNMVersion,FieldsCount, <FieldName, FieldBits> FieldsCount`


    - `FNMVersion`, `FieldsCount` --> `VInt`

    - `FieldName` --> `Strings`

    - `FieldBits` --> `Byte`

    - The low-order bit is one for indexed fields, and zero for nonindexed fields.

    - The second lowest-order bit is one for fields that have term vectors stored,
    and zero for fields without term vectors.

    - If the third lowest-order bit is set (`0x04`), term positions are stored with
    the term vectors.

    - If the fourth lowest-order bit is set (`0x08`), term offsets are stored with
    the term vectors.

    - If the fifth lowest-order bit is set (`0x10`), norms are omitted for the indexed
    field.

    - If the sixth lowest-order bit is set (`0x20`), payloads are stored for the indexed
    field.


    ## Terms Dictionary


    The terms dictionary is represented by two files:


    The term infos (or `tis`) file holds metadata about the term, such as term name,
    skip information, and document frequency (i.e., the count of documents that hold
    the term). A `tis` file also holds useful information that helps Lucene build
    structures for more optimal access of relevant documents for a given term (Lucene
    uses skip data structures internally to make access faster, and the `tis` file
    holds data to help build this structure.) In addition, metadata such as term frequencies
    in this file allows faster access in other files.


    The term infos index file (extension `.tii`) holds metadata to allow random access
    to the term infos file.


    ## Frequencies File


    The frequencies file (extension `.frq`) maps documents to a term. That is, it
    contains a list of all documents that contain a term present in the terms dictionary,
    along with the frequency of each term in the document.


    ## Positions File


    The positions file (extension `.prx`) represents the list of positions at which
    each term occurs within documents.


    ## Queries on Lucene


    Queries are the life and soul of how applications interact and extract data from
    Lucene.


    Lucene has multiple core capabilities on this front and allows rich and semantically
    diverse queries to be built. One key feature in Lucene’s query engine is the extensibility
    and the ability to set custom parameters to customize search and ranking according
    to the user’s desire, as discussed in later chapters.


    Contrary to common expectations, Lucene does not support SQL or SQL-ish syntax.
    Lucene has a custom query syntax designed to make the best use of all that Lucene
    has to offer.


    ## Structure of a Lucene Query


    Lucene’s queries consist of two principal parts: terms and operators. Because
    we have discussed the definition and semantic relevance of terms earlier, there
    is no need to details that again here. However, two important categorizations
    of terms will prove useful for our further discussion:


    - **Single terms**: Single terms are terms that consist of a single token (e.g.,
    “walk”). They are generally atomic and constitute the fundamental construct of
    a query.

    - **Phrases**: Phrases are a multiterm phenomenon consisting of groups of single
    terms. An example is “Walk This Way.” A phrase allows richer query matching and
    retrieval and a more semantically powerful way to express queries. Table [1-1](#485809_1_En_1_Chapter.xhtml#Tab1)
    gives a description of the queries and their equivalent applications and a sample
    query for each.


    ## Fields


    Fields are used to specify predicates when defining a query. Fields are data corpus
    specific and can be used during query construction. Any valid field that is queryable
    can be specified upon. When performing a search, you can specify the field in
    which you want to search. You can use any existing field name as a field name.
    You can specify multiple fields in some types of queries.


    ## Types of Queries in Lucene


    This section covers the different query types available in Lucene, their applications,
    and a short example.


    Figure [1-5](#485809_1_En_1_Chapter.xhtml#Fig5) shows a way to instantiate a composite
    query and set a set of clauses in it. Most queries support a single predicate,
    but some queries, such as `BooleanQuery`, support multiple and diverse clauses,
    thus allowing for more complex search.


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig5_HTML.jpg](images/485809_1_En_1_Chapter/485809_1_En_1_Fig5_HTML.jpg)


    Figure 1-5.


    ## Lucene vs. Relational Databases


    Although similar in many ways, IR systems differ inherently from traditional relational
    database systems. Key differences include the following:


    - Databases offer the strictness of schemas, thus enforcing that the data fed
    to the system is cast in a specific structure. IR systems, in contrast, tend to
    be schema-less and work on a tuple-based model.

    - Databases, building on top of schemas, allow data modeling (such as an entity
    relationship diagram). IR systems do not have that capability (and neither do
    they need it).

    - Databases have to be queried with precise values, but IR systems allow imprecise
    search and semantics.

    - Databases are typically used for precise and exact retrievals, whereas IR systems
    are normally used for imprecise and “wide” searches, where all documents can match
    a query, and hence the concepts of ranking and relevance apply.


    # 2. Hello World: The Lucene Way


    This chapter covers indexing data with Lucene, specifically how Lucene stores
    and represents data, Lucene query nuances, and how Lucene facilitates multiparameter
    search.


    ## Indexing Data in Lucene


    `IndexWriter` is the main user-facing class responsible for indexing data in Lucene.
    `IndexWriter` is used for analyzing documents, opening directories, and writing
    the data to directories.


    Figure [2-1](#485809_1_En_2_Chapter.xhtml#Fig1) shows the overall flow of an indexing
    operation. A document consisting of various fields is first passed to the analyzer,
    after which it is given to an `IndexWriter` instance. `IndexWriter` interacts
    with the internals of Lucene to open the relevant directory, forms the index in
    the correct and required format, and writes the same to the underlying directory.
    Any readers opened after this have access (visibility) to that document.


    ![../images/485809_1_En_2_Chapter/485809_1_En_2_Fig1_HTML.jpg](images/485809_1_En_2_Chapter/485809_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. Flow of an indexing operation


    Let’s now take a closer look at the classes involved in this process.'
