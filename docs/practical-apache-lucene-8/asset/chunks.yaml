  trans: "\n## 将 Lucene 与 Mahout 集成\n\nLucene 与 Mahout 的关键区别在于，Lucene 需要支持搜索的特征，而\
    \ Mahout 需要与机器学习相关的特征。\n\n将 Lucene 与 Mahout 集成有两种标准方法，如下两小节所述。\n\n### lucene.vector\n\
    \n`lucene.vector` 工具能够将 Lucene 向量转换为 Mahout 向量。请注意，创建向量的 Lucene 版本应与 Mahout 中使用的\
    \ Lucene 向量版本一致。\n\n第一步是在转换之前创建词向量。\n\n这里，我们创建一个包含词向量的字段：\n\n```\nField fld =\
    \ new Field(\"text\", \"foo\", Field.Store.NO, Field.Index.ANALYZED, Field.TermVector.YES)\n\
    ```\n\n使用以下命令直接在 Mahout 中转换已创建的 Lucene 索引：\n\n```\n/bin/mahout lucene.vector –dir\
    \ / example/solr/data/index/ –output /tmp/ foo/part-out.vec –field title-clustering\
    \ – idField id –dictOut \n```\n\n### Lucene2seq\n\n上一节展示了如何将 Lucene 词向量转换为 Mahout\
    \ 向量，以供 Mahout 集成和处理。本节将展示如何将 Lucene 存储字段转换为 Mahout 可消费的对象（从而可用于 Mahout 处理）。运行以下命令查看选项：\n\
    \n| `$ bin/mahout lucene2seq – help`作业特定选项： |   |\n| --- | --- |\n| `--output\
    \ (-o) output` | `输出目录的路径名` |\n|   | `output.` |\n| `--dir (-d) dir` | `Lucene\
    \ 目录` |\n| `--idField (-i) idField` | `索引中包含 ID 的字段` |\n| `containing the id`\
    \ |   |\n| `--fields (-f) fields` | `索引中包含文本的存储字段` |\n| `index containing text`\
    \ |   |\n| `--query (-q) query` | `（可选）Lucene 查询。` |\n| `Defaults to` | `MatchAllDocsQuery`\
    \ |\n| `--maxHits (-n) maxHits` | `（可选）最大命中数。` |\n| `Defaults to 2147483647` |\
    \   |\n| `--method (-xm) method` | `要使用的执行方法：` |\n| `sequential or` | `mapreduce。默认为`\
    \ |\n| `mapreduce` |   |\n| `--help (-h)` | `打印帮助信息` |\n| `--tempDir tempDir`\
    \ | `中间输出目录` |\n| `directory` |   |\n| `--startPhase startPhase` | `要运行的第一个阶段`\
    \ |\n| `--endPhase endPhase` | `要运行的最后一个阶段` |\n\n该工具会获取所有文档并创建一组键值对，其中键是字段 ID\
    \ 的值，值是与该键关联的所有存储字段的拼接值。\n\n`Lucene2seq` 会转换为序列文件（这些是 Mahout 的组件）。\n\n### Java\
    \ 版本的 Lucene2seq\n\n使用 `lucene2seq` 的另一种方法是编写一个 Java 程序。一个等效的 Java 类是 `LuceneStorageConfiguration`：\n\
    \n```\nLuceneStorageConfiguration luceneStorageConf = new LuceneStorageConfiguration(configuration,\
    \ asList(index), seqFilesOutputPath, \"id\", asList(\"title\", \"description\"\
    ));\nLuceneIndexToSequenceFiles lucene2Seq = new LuceneIndexToSequenceFiles();\n\
    lucene2Seq.run(luceneStorageConf);\n```\n\n## 综合运用\n\n在本节中，我们将运用本章讨论的所有内容，使用从\
    \ Lucene 索引积累的数据，为 Mahout 编写一个聚类程序。\n\n请注意，这里使用了 `LuceneIndexToSequenceFiles`\
    \ 将 Lucene 索引转换为 Mahout 序列文件。\n\n然后，它基于标准的 Mahout 技术执行聚类（代码的这一部分没有任何 Lucene 特定的内容）：\n\
    \n```\nimport org.apache.hadoop.conf.Configuration; import org.apache.hadoop.fs.FileSystem;\
    \ import org.apache.hadoop.fs.Path;\nimport org.apache.hadoop.io.IntWritable;\
    \ import org.apache.hadoop.io.SequenceFile; import org.apache.hadoop.util.ToolRunner;\
    \ import org.apache.mahout.clustering.Cluster;\nimport org.apache.mahout.clustering.canopy.CanopyDriver;\n\
    import org.apache.mahout.clustering.classify.WeightedPropertyVectorWritable;\n\
    import org.apache.mahout.clustering.kmeans.KMeansDriver;\nimport org.apache.mahout.common.distance.TanimotoDistanceMeasure;\n\
    import org.apache.mahout.text.LuceneStorageConfiguration;\nimport org.apache.mahout.text.SequenceFilesFromLuceneStorage;\n\
    importorg.apache.mahout.vectorizer.SparseVectorsFromSequenceFiles;\nimport com.google.common.collect.Lists;\n\
    import java.util.Arrays;\nimport java.util.List;\n//执行简单的 K-means 聚类以分离文档\npublic\
    \ class SimpleKMeansClustering {\npublic static void main(String args[]) throws\
    \ Exception {\nConfiguration conf = new Configuration(); FileSystem fs = FileSystem.get(conf);\n\
    //使用 Lucene 索引作为输入数据源\nPath indexFilesPath = new Path(\"lucene/indexes/educations\"\
    );\n//ML 模型数据输入——训练数据\nPath sequenceFilesPath = new Path(\"clustering/testdata/sequencefiles/\"\
    );\nPath sparseVectorsPath = new Path(\"clustering/testdata/sparsevectors/\");\n\
    //用于 TF IDF 计算\nPath tfVectorsPath = new Path(\"clustering/testdata/sparsevectors/tf-vectors\"\
    );\nPath inputClustersPath = new Path(\"clustering/testdata/input-clusters\");\n\
    Path finishedInputClustersPath = new Path(\"clustering/testdata/input-clusters/clusters-0-final\"\
    );\nPath finalClustersPath = new Path(\"clustering/output\");\n//从 Lucene 索引创建序列文件\n\
    LuceneStorageConfiguration luceneStorageConf = new LuceneStorageConfiguration(conf,\
    \ Arrays.asList(indexFilesPath),\nsequenceFilesPath, \"id\", Arrays.asList(\"\
    name\", \"description\"));\nSequenceFilesFromLuceneStorage sequenceFilefromLuceneStorage\
    \ = new SequenceFilesFromLuceneStorage();\nsequenceFilefromLuceneStorage.run(luceneStorageConf);\n\
    //从序列文件生成稀疏向量\ngenerateSparseVectors(true, true, true, 5, 4, sequenceFilesPath,\
    \ sparseVectorsPath);\n//为 K-means 生成输入聚类（而不是随机初始化 K 个聚类）\nTanimotoDistanceMeasure\
    \ tanimoDistance = new TanimotoDistanceMeasure();\nCanopyDriver.run(tfVectorsPath,\
    \ inputClustersPath, tanimoDistance, (float) 3.1, (float) 2.1, false, (float)\
    \ 0.2, true);\n//生成 K-means 聚类\nKMeansDriver.run(conf, tfVectorsPath, finishedInputClustersPath,\
    \ finalClustersPath, 0.001, 10, true, 0, true);\n//在控制台读取并打印聚类结果\n//SequenceFile.Reader\
    \ reader = new\nSequenceFile.Reader(fs, new Path(\"clustering/output/\" + Cluster.CLUSTERED_POINTS_DIR\
    \ + \"/part-m-0\"), conf);\nIntWritable key = new IntWritable(); WeightedPropertyVectorWritable\
    \ value = new WeightedPropertyVectorWritable();\nwhile (reader.next(key, value))\
    \ {\nSystem.out.println(value.toString() + \" belongs to cluster \" + key.toString());\n\
    }\nreader.close();\n}\n//使用 Mahout 生成权重\npublic static void generateSparseVectors\
    \ (boolean tfWeighting, boolean sequential, boolean named, double maxDFSigma,\
    \ int numDocs, Path inputPath, Path outputPath) throws Exception {\nList argList\
    \ = Lists.newLinkedList();\nargList.add(\"-i\");\nargList.add(inputPath.toString());\n\
    argList.add(\"-o\");\nargList.add(outputPath.toString());\nif (sequential) {\n\
    argList.add(\"-seq\");\n}\nif (named) {\nargList.add(\"-nv\");\n}\nif (maxDFSigma\
    \ >= 0) {\nargList.add(\"--maxDFSigma\");\nargList.add(String.valueOf(maxDFSigma));\n\
    }\nif (tfWeighting) {\nargList.add(\"--weight\");\nargList.add(\"tf\");\n}\nString[]\
    \ args = argList.toArray(new String[argList.size()]);\nToolRunner.run(new SparseVectorsFromSequenceFiles(),\
    \ args);\n}\n}\n```\n\n# 7. 提升 Lucene 性能\n\n本章重点介绍如何调优 Lucene 以获得最佳性能。你可以通过多种方式使用\
    \ Lucene，但核心性能理想情况下应聚焦于两个方面：索引和查询（本章将对此进行讨论）。\n\n本章篇幅较短，旨在提供解决问题的指导，因此理论概念较少。本章内容建立在你之前章节所学知识的基础上。这里我们只讨论最佳实践。本章并未真正引入任何新内容。（因为你已经仔细阅读了本书至此的内容，所以你已经理解了这些实践背后的大部分原理。）\n\
    \n"
- fmt: '# Increase Indexing Speed


    Let’s start with speed increases:


    - Reduce the number of concurrently open writers. Open one writer and use it for
    the duration of the session.

    - Too many concurrent writers can cause an excessive load and thus cause a general
    slowdown in the write performance. You should use a single writer throughout the
    cycle of existence of the search application.


    # Reuse Field Instances


    To add new documents, create `Field` instances, assign them values, and then assign
    them to a document. Post the addition of the document to the index, reassign values
    to the fields, assign them to a new document, and add the new document.


    # The Curious Case of Large Commits


    `IndexWriter` instances can create excess overhead when merging large files. Switching
    to `autoCommit=false` ensures optimal performance in such cases. However, such
    a switch also leads to open searchers not being able to see changes until the
    `IndexWriter` is closed. The ideal method is to chunk data in smaller blocks (batch
    your documents) and keep `autoCommit` to true.


    # Reuse Tokens in Analyzers


    Analyzers create a new token for every term in the sequence.


    Reusing tokens is a sensible strategy to follow.


    ```

    StoredFieldsWriter.MergeVisitor.tokenStream(Analyzer analyzer, TokenStream reuse)

    ```


    # Tuning Flush Intervals


    Lucene enables you to define flush intervals based on different criteria, such
    as the number of documents or the RAM usage. RAM usage flush intervals allow better
    utilization of RAM and result in less disk churn from frequent flushing when working
    with small/average document lengths. See the class `LiveIndexWriterConfig`.


    # Increase mergeFactor


    Increasing `mergeFactor` by small deltas should increase the indexing speed.


    # Choosing the Correct Analyzers


    Analyzers play an important role in indexing speed. Slow analyzers cause the overall
    indexing speed to decrease.


    # Use Multiple Threads with One IndexWriter


    Using concurrency in `IndexWriter` can increase the indexing speed and utilize
    CPU core power better. However, there is a tipping point, so beware of overdoing
    it. The setting should be no more than the number of cores in the machine. See
    the `setMaxThreadCount` method of your `MergeScheduler` instance.


    # Index into Separate Indexes and Then Merge


    If you have a very large amount of content to index, you can break your content
    into N “silos,” index each silo on a separate machine, and then use `writer.addIndexes`
    to merge them all into one final index.


    # Improve Search Performance


    This and the preceding section are not necessarily mutually exclusive and can
    depend on the kind of juice you are focusing on for your indexing. Remember that
    indexing and search are mostly happening on the same machine and that a resource
    overlap can happen.


    # Use the Latest Version of Lucene


    If you are not using the latest version of Lucene, you risk missing out on upgrades
    and the latest of what Lucene has to offer.


    # Use IndexReader with the readOnly Attribute Equal to True


    Using `IndexReader` with `readOnly=true` reduces thread contention to some extent
    and thus improves performance.


    # Use MMapDirectory/NIOFSDirectory


    Both `MMapDirectory` and `NIOFSDirectory` give a substantially better I/O performance
    and thus improve overall performance. Note that `NIOFSDirectory` and `MMapDirectory`
    implementations face file-channel issues in Windows. It is best to use `FSDirectory.open()`,
    and Lucene will give the appropriate `Directory` implementation to the current
    environment.


    # Decrease mergeFactor


    A reduced `mergeFactor` will lead to a fewer number of segments and thus reduce
    the fan out and hence improve query performance. However, this can be detrimental
    to performance of indexing and so needs to be done carefully.


    # Ignore First Query’s Performance


    The first query usually deals with cold caches, so disregard its performance.
    You need a larger dataset to be give you a holistic answer regarding performance
    characteristics.


    # Avoid Reopening IndexSearcher Instances


    Reopening `IndexSearcher` instances is expensive. Don’t do it unless absolutely
    necessary.


    # Share IndexSearcher Instances


    Continuing the previous point, it is a good idea to share `IndexSearcher` instances
    to so that you have less contention.


    # Use Stored Fields and Term Vectors Sparingly


    Stored fields and term vectors typically constitute a significant portion in the
    overall memory usage of the system. Indiscriminate usage of these can lead to
    a higher memory footprint.


    # Use Filters


    Filters can reduce the overall disk seek that needs to be done by Lucene to fetch
    the required hits for a result set. Filters disable score computation and reduce
    the dataset being looked at. Wrap the query in `ConstantScoreQuery` or use filters.


    # Final Thoughts on Best Practices


    While not a conclusive list, this chapter identified some ways to improve the
    overall performance of indexing and search in Lucene. Keep in mind that it is
    easy to optimize early and then see degraded performance. A better strategy is
    to first build your search application using vanilla configurations and measure
    performance. Only after you identify bottlenecks should you focus on improving
    performance.


    # 8. Your First Lucene Patch


    This chapter covers some best practices for contributing to Apache Lucene. The
    walkthrough provides details about the Apache Software Foundation, the Apache
    way, and how to write your first patch and interact with the community.'
