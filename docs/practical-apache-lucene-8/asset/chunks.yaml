  trans: '

    ### 什么是相关性？


    相关性指的是相似度的衡量标准（即，一个文档与给定查询的相关程度）。每个文档都会被分配一个分数，用于筛选文档并返回最相关的结果（见图 2-2）。请注意，相关性是针对所有文档按每个查询分别计算的。


    ![../images/485809_1_En_2_Chapter/485809_1_En_2_Fig2_HTML.jpg](img/485809_1_En_2_Fig2_HTML.jpg)


    图 2-2


    搜索布局


    根据前面描述的布尔模型，假设查询由多个子句组成，每个子句可以相同或不同。


    每个子句对评分的影响各不相同，并且并非所有子句都必然对评分有贡献。


    请注意，每种查询类型所对应的相关性（或相似度）参数是不同的。


    ### 评分算法


    评分算法决定了在给定查询下文档的“相似度”（即，给定文档与给定查询的接近程度）。


    Lucene 拥有多种评分算法。以下小节将介绍最常用的几种。


    #### TF/IDF


    词频/逆文档频率（TF/IDF）是 Lucene 使用的默认评分算法。


    以下因素对 TF/IDF 评分模型有贡献：


    *   *词频*：词频简单来说就是一个词在文档中重复出现的频率。重复 5 次比重复 1 次更好。


    *   *逆文档频率*：逆文档频率是衡量一个词在整个文档集合中出现频率的指标。它用于区分“罕见”词与“常见”词。例如，如果一个词只出现在一个文档中，那么它可能比出现在
    80% 文档中的某个词更有价值。


    *   *字段长度归一化*：字段长度是衡量一个词与命中文档相关性的重要方面。匹配的字段越长，该字段仅与该词相关的可能性就越小。字段越短，相关性越高。


    这三个因素共同作用，生成一个权重，用以表示文档的重要性。


    #### 向量空间模型


    向量空间模型使用向量模型来与查询中的多个词项进行比较。向量中的每个词项代表查询中一个词项的 TF/IDF 分数。请注意，TF/IDF 只是一种选择。这里也可以使用任何其他评分模型。


    例如，考虑一个查询“foo bar”。对于这个查询，计算每个词项在每个文档中的权重，为每个文档构建一个向量，并将它们与查询向量一起绘制。向量之间的夹角表示偏差，或者反过来说，表示相关性。


    #### 评分示例


    考虑一个包含 100 个单词的文档，其中单词“cat”出现了 3 次。那么“cat”的词频（tf）为 (3 / 100) = 0.03。现在，假设我们有 1000
    万个文档，其中“cat”出现在 1000 个文档中。那么，逆文档频率（idf）计算为 log(10,000,000 / 1,000) = 4。因此，tf-idf
    权重是这些数量的乘积：0.03 * 4 = 0.12。


    ### Lucene 的评分模型


    虽然单词项查询适合学习其内部机制，但实际的生产工作负载处理的是多词项查询。Lucene 构建了一个模型，将本章前面讨论的所有内容整合到一个通用的模型中。


    Lucene 的核心查询模型建立在布尔模型之上；所有多词项查询都是由谓词连接的一系列子句组成的。


    Lucene 评分算法的核心思想是：它考量一个词项在某个文档中出现的次数，相对于该词项在所述文档集合中所有文档里出现的总次数。如果一个文档中某个词项出现了
    100 次，而该词项在所有文档中总共出现了 10,000 次，那么其得分低于一个词项在某个文档中出现 5 次、而在整个文档集合中总共出现 7 次的情况。


    #### 字段


    字段是文档的构建块。文档由一组字段组成。请注意，Lucene 的评分是基于字段而非文档进行的，因此字段的表示方式对于分数的计算方式至关重要。


    #### 相似度


    `Similarity` 类负责对给定词项进行最终的“接近度”计算。相似度可以被覆盖，高级用户可以编写自己的相似度实现。然而，这属于复杂领域，需要谨慎操作。


    一旦确定了用于过滤词项的布尔子句并批准了文档，就会使用定义的 `Similarity` 类对它们进行评分。默认的评分模型基于 TF/IDF 工作，计算结果随后被返回给上层进行进一步处理。


    ## 权重提升


    权重提升可以在三个层面进行：


    *   *文档级权重提升*：可以在索引时指定

    *   *字段级权重提升*：可以在将字段添加到文档时指定

    *   *查询级权重提升*：可以在查询时通过对查询中的特定子句指定提升值来实现


    权重提升允许影响整个评分决策，并为查询中的特定文档、字段或子句赋予优先级。


    ## 收集器


    收集器是 Lucene 查询中的“文件库”。它们根据给定的查询收集命中的结果。收集器非常有用，因为它们定义了结果的结构，并且可以以更有用的方式处理命中结果。示例包括最高分文档收集器（将在下一节中描述）、Elasticsearch
    聚合等。


    用户可以通过实现 Lucene 中定义的 `Collector` 接口来编写自定义收集器。这个功能为处理收集到的命中结果以及如何返回/排序命中结果提供了极大的灵活性。


    在大多数常见的搜索场景中，用户只关心给定查询和数据集的前 N 个最相关的命中结果。Lucene 支持的前 N 个查询对于构建搜索引擎、搜索项目等非常有用。


    Lucene 提供了一种特殊机制来精确处理这类特定的查询。这些被称为前 N 个命中结果查询。


    通常，用户必须向底层的 `IndexSearcher` 指定一个 `Collector` 和一个 `Query`，才能让查询填充所需的结果。然而，对于前 N
    个命中结果，用户可以指定查询和请求的命中结果数量，Lucene 会在内部从一个收集器家族（称为 `TopScoreDocsCollector`）中创建一个
    `Collector`，并返回一个名为 `TopDocs` 的类的对象。`TopDocs` 负责保存给定查询的前 N 个命中结果。


    在内部，`TopScoreDocCollector` 使用一个优先级队列来根据文档的分数维护它们。当收集完成时，优先级队列用于返回前 N 个命中结果。


    # 3. 核心搜索基础


    查询是任何使用 Lucene 的应用程序的基本构建块，理应如此。毕竟，Lucene 之所以备受喜爱，是因为其建立在复杂索引模型之上的强大搜索能力。


    本章涵盖了 Lucene 的核心搜索基础、过程中涉及的组件，以及用于利用 Lucene 搜索能力的更常用结构。


    作为概述，本章将向您介绍基础知识，而不会深入探讨过于复杂的细节。

    '
- fmt: '# Codecs


    Codecs enable the reading and writing of indexes.


    Lucene defines an abstract class, `Codec`, which outlines the contract that users
    of `Codec` should be expecting as the model of usage. Each physical codec needs
    to implement the contract and ensure that it is as performant as possible. (Remember
    that codecs are generally actively used in the critical path of indexing, so any
    performance leaks there can impact the overall performance of index creation/updating/deletion.)


    A salient aspect of `Codec` is that it abstracts the complexity and low-level
    details of how an index is stored. Recall from earlier chapters that Lucene represents
    its indexes in a multifaceted manner, with quite a bit of low-level tuning to
    ensure that the corresponding read and write operations are fast. In this way,
    Lucene allows a wide variety of operations to be performed easily on the data
    structures. Codecs honor that promise while hiding the specific details from the
    user.


    The abstract representation also ensures flexibility to change the underlying
    implementation of the codec without any user breakage, because all codecs must
    implement the same contract.


    A codec returns a concrete instance of the `Format` class for different types
    of components of the underlying index.


    `Format` implementations used/returned by `Codec` include the following:


    *   `StoredFieldsFormat` : Represents the fields stored in the underlying index

    *   `FieldsInfoFormat` : Has the per-field metadata

    *   `PostingsFormat` : Represents the underlying postings list, including fields,
    terms, documents, offsets, and so on

    *   `DocValuesFormat` : Represents the columnar store (used for operations like
    grouping, range queries, and sorted access)


    A new type of format, `CompoundFormat`, is used when compound indexes are enabled.
    Traditionally, Lucene stores the different layouts within its index in different
    files on disk. However, in newer versions of Lucene, compound indexes can be turned
    on, leading to a singular representation of the physical files of the index (and
    leading to codecs returning `CompoundFormat`, which enables accessing the same).


    # DocValues


    Lucene uses its inverted index functionality to store data in an inverted format
    and allow matching queries to generate results. However, this way of doing things
    limits Lucene’s ability to perform other interesting stuff. For example, if we
    want to group by a field, or sort, or facet, inverted indexes cannot provide this
    functionality.


    Lucene has an important component for solving this specific use case: `DocValues`.
    DocValues are a columnar store, an uninverted form of the inverted index. Specifically,
    `DocValues` allow access to specific fields. All the values associated with a
    field are colocated, making accesses efficient.


    One common argument in that direction is that stored fields provide similar functionality
    (i.e., accessing specific values for fields). However, stored fields work best
    when their data is bulk loaded into the system’s memory. They are not optimal
    for point seeks in the field’s values.


    Think of `DocValues` as an inverted index that reverse maps what Lucene’s regular
    inverted index maps. (That is, `DocValues` map document IDs to field values.)
    Storing field values in a colocated manner also helps with disk reads, because
    reads typically happen in blocks (and hence colocated values will most likely
    be loaded when a block from a disk is read into main memory). In this scenario,
    further seeks should have a much lower latency because ideally the data should
    already be present in the memory.


    To think about uses, consider a scenario in which a field is being used for sorting
    hits identified by the scoring criteria. To sort, we need actual field values.
    One way to do this is to do a document read using the document ID of the hit,
    and you then use the necessary field/fields to get the needed values.


    However, this method is inefficient and a performance unworthy for this type of
    queries. The optimal way to execute such queries is to have a columnar store that
    maps document IDs to field values, giving all the benefits described earlier.
    So, the value of using `DocValues` should be obvious to you now.


    You can add a `DocValue` to a document as follows:


    ```

    doc.add(new SortedDocValuesField ("date", new BytesRef(date) ));

    ```


    # Phrase Queries


    Phrase queries are used to match “phrases” of terms. A group of terms given in
    a sequence are searched, and documents maintaining that sequence are then returned,
    as follows:


    ```

    private void searchPhraseQuery(String[] phrases)

    throws I0Exception, ParseException {

    searcher = new Searcher(indexDir);

    long startTime = System.currentTimeMillis();

    PhraseQuery query = new PhraseQuery();

    query.setSlop(0);

    for(String word:phrases) {

    query.add(new Term(LuceneConstants.FILE_NAME,word));

    }

    TopDocs hits = searcher.search(query);

    long endTime = System.currentTimeMillis();

    for(ScoreDoc scoreDoc : hits.scoreDocs) {

    Document doc = searcher.getDocument(scoreDoc);

    System.out.println("File: "+ doc.get(LuceneConstants.FILE_PATH));

    }

    searcher.close();

    }

    ```


    Phrase queries mandate that the given terms occur in any document in sequence.
    For example, “hi friend” as a phrase needs to match “hi” and “friend,” and “friend”
    needs to immediately succeed “hi.”


    You can lift this restriction, however, by giving a value for the `slop` parameter.
    The `slop` parameter allows N number of words to occur between words in the phrase
    for a document to match. The higher the value of `slop`, the more the number of
    hits. (A higher value might not necessarily be a good idea, though, because a
    high value of `slop` can lead to unnecessary noise in the returned documents.)'
