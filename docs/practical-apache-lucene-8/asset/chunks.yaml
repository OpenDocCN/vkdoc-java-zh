  trans: '

    ## 查询缓存


    `QueryCache` 在需要提升重度查询性能时非常有用。`QueryCache` 定义了一个接口，允许在最需要缓存的地方——即查询开始时——对查询进行缓存。


    所使用的 `QueryCache` 实现是 `LRUQueryCache`。顾名思义，`LRUQueryCache` 使用最近最少使用算法，在缓存满时淘汰键值。


    如第 2 章所述，每个查询都会创建一个 `Weight` 实例（与相应的 `IndexSearcher` 关联）。默认的 `IndexSearcher` 实现使用
    `LRUQueryCache` 实例来缓存传入的查询，并创建一个可缓存的 `Weight` 实例。当评分开始时，可缓存的 `Weight` 实例会检查该查询是否存在于缓存中。如果存在，则检索并返回缓存版本。否则，会执行缓存加载，并返回相应的实例（见图
    3-1）。


    ![../images/485809_1_En_3_Chapter/485809_1_En_3_Fig1_HTML.jpg](img/485809_1_En_3_Fig1_HTML.jpg)


    图 3-1


    `QueryCache` 的实际应用


    `QueryCache` 在高负载和重复查询下能极大地提升性能。然而，对于大量不同的查询，`QueryCache` 实际上可能会增加查询延迟，因为需要额外的查询缓存加载时间。此外，如果被缓存的查询很大，这也会成为整个查询延迟中的一个显著开销。


    `Weight` 表示与查询关联的、每个 `IndexSearcher` 的统计信息。这一点至关重要，因为它允许查询被重用（正如本章前面关于 `QueryCache`
    的讨论所述）。因此，同一个查询可以在多个 `IndexSearcher` 之间使用，但每个 `IndexSearcher` 都会拥有自己的 `Weight`
    实例。请记住，`Weight` 与 `IndexSearcher` + `Query` 相关联，而不仅仅是两者中的某一个。


    当将一个查询交给 `IndexSearcher` 执行时，`IndexSearcher` 实例会为其创建一个 `Weight` 实例。`Weight` 的生命周期仅限于该查询在
    `IndexSearcher` 内的执行生命周期。


    `Weight` 还负责参与评分过程。`Weight` 创建相应的 `Scorer`（在下一节中描述），然后针对正在评估查询的各种文档调用该 `Scorer`。


    请注意，`Weight` 完全由 `IndexSearcher` 拥有。它仅为特定查询维护统计信息，`IndexSearcher` 可以随意操作 `Weight`
    的数据，而不会对系统的其他部分产生副作用。


    ## 评分器作为搜索过程的一部分


    `Scorer` 是 Lucene 搜索过程的核心。`Scorer` 负责识别匹配项，并对现有文档集中的命中结果进行评分。


    `Scorer` 是一个特殊的类。它也是名为 `DocIdSetIterator` 的类的扩展。`DocIdSetIterator` 允许对文档 ID 进行“迭代”，从而可以在索引中定位以获取特定文档，或遍历所有文档。请注意，该迭代器只能向前移动，不能向后移动。这一限制简化了支持该迭代器的底层编解码器。


    `DocIdSetIterator` 提供了三个有用的方法：


    *   `docID()`：获取此文档的内部索引文档 ID。此方法始终返回单调递增的文档 ID。

    *   `nextDoc()`：迭代到下一个文档。

    *   `advance(location)`：前进到指定的位置。


    该接口允许 `Scorer` 遍历所有文档，并判断它们是否与查询相关。


    `Scorer` 通过在迭代器之上实现 `score()` 方法来工作。`score()` 方法获取当前文档 ID，获取当前文档，并返回其分数。`IndexReader`
    拥有关于当前文档的统计信息，`Scorer` 可以充分利用这些信息来确定分数。如果为该字段启用了词向量，`Scorer` 可以访问该词向量，并执行更复杂的操作。


    评分是如何执行的，在第 2 章中讨论过。这里你将看到所有这些是如何结合在一起的（见图 3-2）。


    ![../images/485809_1_En_3_Chapter/485809_1_En_3_Fig2_HTML.jpg](img/485809_1_En_3_Fig2_HTML.jpg)


    图 3-2


    搜索中的 `Scorer`


    用户使用 `Query` 类的实例发出一个查询。该查询被交给一个 `IndexSearcher`，后者首先递归地重写查询（如果可能，调用任何修改/简化操作）。重写完成后，会创建一个
    `Weight` 类的实例，该实例特定于 `Query` + `IndexSearcher` 的组合。这个 `Weight` 将包含适用于此查询执行的所有查询特定统计信息。


    在评分过程中，`Weight` 创建一个 `Scorer`，它遍历索引中的所有文档，过滤掉不相关的文档，并对候选文档应用评分算法。评分算法可以是用户选择实现或使用的任何算法，但通常是词频/逆文档频率（TF/IDF）家族的一个变体。


    `Scorer` 与 `IndexReader` 交互，以从底层文件目录获取相关细节。如果存在词向量，`Scorer` 也可以选择使用其中的特征来计算文档的分数。`Scorer`
    需要为它迭代的每个文档返回一个分数。


    评分完成后，结果返回给收集器，然后收集器选择下一步操作。如果请求的是前 N 个命中结果，收集器通常会维护一个优先级队列来识别前 N 个命中结果，然后将它们返回给用户。


    # 4. 空间索引


    Lucene 提供了一套丰富的应用程序编程接口（API）来索引和查询空间字段，从而允许执行各种查询。Lucene 支持平面模型或球面模型的空间搜索。


    Lucene 在该领域的一些关键特性包括多维点、经纬度点和盒形查询。


    Lucene 有一个空间模块，它是负责空间索引和搜索的核心引擎。下一节将研究该模块暴露的 API。

    '
- fmt: '# Spatial Module


    The spatial module is based on Spatial4j, an Apache-licensed library that provides
    implementations for various shapes, such as points, rectangles, and circles, and
    additionally supports polygons with an extra dependency.


    `SpatialStrategy` is the core interface used to interact with the spatial module,
    index spatial data, and perform spatial queries. `SpatialStrategy` defines the
    way to index and query based on shapes. From Lucene''s javadocs, the points defined
    by a `SpatialStrategy` are as follows:


    - Can it index more than one shape per field?

    - What types of shapes can be indexed?

    - What types of query shapes can be used?

    - What types of query operations are supported? This might vary per shape.


    Remember that if a different shape is attempted to be indexed than what is defined
    by the corresponding `SpatialStrategy`, an exception will be thrown.


    Prefix trees form the foundation of spatial index data structures in Lucene. A
    prefix tree acts as a trie (a tree data structure where shapes are decomposed
    into strings, each string representing a rectangular spatial region). Figure [4-1](#485809_1_En_4_Chapter.xhtml#Fig1)
    shows a prefix tree of the words "Car," "Cat," "Do," and "Don."


    ![../images/485809_1_En_4_Chapter/485809_1_En_4_Fig1_HTML.jpg](images/485809_1_En_4_Chapter/485809_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    A prefix tree


    Lucene defines an abstract class, `SpatialPrefixTree`, which represents abstract
    representations of a prefix tree. The class defines all the necessary methods,
    such as getting the number of levels, getting a cell at a level, and so on, that
    are required for working with prefix trees during searches.


    As discussed in upcoming sections, Lucene consists of two concrete implementations
    of `SpatialPrefixTree`: `QuadPrefixTree` and `GeoHashPrefixTree`.


    ## What Are Geohashes?


    A geohash is a method of encoding an object of geographic information in the form
    of a short string of letters and digits.


    Geohashes are hierarchal and offer variable precision (reducing the length of
    the representation by removing characters from the end of the string, and reducing
    the corresponding precision).


    The value that geohashes bring is the simplicity by which two geographic information
    objects can be compared for similarity.


    For two given objects represented in their geohash representations, a prefix match
    will give a value of how similar the two objects are. The higher the degree of
    the prefixes that match, the more the similarity between the two geographic objects.


    `GeoHashPrefixTree` is based on the concept of geohashes, and it uses this technique
    to implement Lucene''s `Prefix` tree class for similarity and matching.


    ### Quad Trees


    A quad tree is a spatial data structure where each node has exactly four children.
    A quad tree splits a spatial dimension into four each time a new level is added
    to the tree.


    Quad trees are notable for two use properties:


    - The higher-level nodes of quad trees help representation of the overall data
    in a less-granular level (i.e., the depth of detail stored in the top level is
    less than that stored in the leaf-level nodes).

    - Quad trees are great for searching two-dimensional spaces. For example, given
    a two-dimensional space, to find a point closest to the given coordinates, a simple
    traversal of the quad tree will lead to the result.


    Figure [4-2](#485809_1_En_4_Chapter.xhtml#Fig2) shows a quad tree.


    ![../images/485809_1_En_4_Chapter/485809_1_En_4_Fig2_HTML.jpg](images/485809_1_En_4_Chapter/485809_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    A quad tree


    ### K-D Trees


    A K-D tree is a space-partitioning tree that allows splitting a plane of space
    into a K dimensional space.


    A K-D tree is a binary tree, with each node representing a K dimensional point.
    Put simply, given a collection of points, the range is split using an axis value.
    For example, if a node represents the X axis, and a split using the X axis is
    done, the left being all the points that have an X axis value less than the split
    value, the right tree having all values greater than the same.


    K-D trees prove useful for a variety of query types, such as point and range queries.
    For this reason, they are an important member of Lucene''s indexing capabilities.
    Figure [4-3](#485809_1_En_4_Chapter.xhtml#Fig3) shows an example of a K-D tree.


    ![../images/485809_1_En_4_Chapter/485809_1_En_4_Fig3_HTML.jpg](images/485809_1_En_4_Chapter/485809_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    A K-D tree


    Lucene''s implementation uses a Block-KD (BKD) tree, which is an efficient version
    that is I/O friendly and restricts I/O usage.


    ### BKD Trees


    BKD trees are built in the same manner as K-D trees, recursing and partitioning
    the N dimensional space, and performing an equal split at each recursion. However,
    BKD trees stop recursing once there are fewer than 1024 points.


    At that point, all points are written to one block on the disk.


    When a point is indexed in the BKD tree, it is converted into its equivalent `byte[]`
    representation. Lucene then buffers the points being indexed and then writes them
    using a `PointsFormat`. All default Lucene codecs now support points being indexed.


    As evident in Figure [4-4](#485809_1_En_4_Chapter.xhtml#Fig4), a BKD tree is a
    K-D tree with a B tree incorporated into it. Nodes have compressed keys of their
    children and define key ranges with equivalent pointers into their children.


    ![../images/485809_1_En_4_Chapter/485809_1_En_4_Fig4_HTML.jpg](images/485809_1_En_4_Chapter/485809_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    A BKD tree'
