    # 1. 你好，Lucene！


    欢迎踏上探索神秘而有趣的搜索世界之旅！


    本章讨论信息检索（IR）系统，重点介绍 Lucene，并包含许多术语和关键信息，随着我们深入 Lucene 的内部机制并构建一些酷炫的应用程序，你会发现这些信息非常有用。


    在开始之前，让我们先回顾一些常见问题及其答案。


    > *Lucene 是一个搜索引擎吗？*


    我通常会回答：“嗯，既是也不是。”


    Lucene 是一个用于构建各种信息检索系统的库和平台，其中搜索引擎最为人所知。Lucene 适用的其他领域包括：


    *   *文档分析*：根据某些给定标准加载和遍历文本文档，从文档中找出热门词汇，对特定字段进行聚合。


    *   *日志分析*：使用直接构建在 Lucene 之上的高性能仪表板分析应用程序日志。


    *   *地理空间搜索*：随着地理空间查询和数据结构的近期兴起，Lucene 正迅速成为索引经纬度数据以及执行诸如共址搜索等查询的热门选择。


    > *我需要信息检索的背景知识吗？*


    具备信息检索背景固然好，但这并非理解 Lucene 的必备条件。尽管本书涵盖了一些背景理论，但所有复杂信息都会以帮助你建立上下文理解的方式来解释。


    注意


    信息检索是一个庞大的学科，本书无意在此主题上做到详尽权威。相反，本书侧重于加深你对 Lucene 的理解。为了更全面地理解信息检索，建议结合一本信息检索书籍来阅读本书。Manning
    所著的《信息检索导论》是一本不错的入门参考书。


    > *Lucene 支持 SQL 或 SQL 方言吗？*


    不支持，Lucene 有一套受支持的查询（将在后续章节中讨论）。不过，你可以使用这些查询来构建可从类似 SQL 的语言派生的执行计划。有些引擎确实做到了这一点，但
    Lucene 本身并不原生支持。


    Lucene 是一个让你能够构建自己搜索应用程序的库。当你的应用程序需要快速索引和搜索能力时，请使用 Lucene。Lucene 赋予了用户强大的能力，但能力越大，责任越大。因此，对于
    Lucene 更高级的特性（如后续章节所述），有辨别力的用户理解其权衡和最佳适用场景至关重要。


    ## Lucene 的主要特性


    Lucene 已经存在了一段时间，其众多特性和能力使其非常受欢迎，包括：


    *   *可扩展的高性能索引*：Lucene 支持非常快速的索引（在现代硬件上每小时超过 150GB）。


    *   *增量索引*：随着新文档的加入，索引会被添加，无需修改现有索引（从而避免过多的索引变动）。


    *   *Top N 查询*：Lucene 能高效地扫描大量数据，并获取与查询匹配、按所用评分函数排序的前 N 个文档。


    *   *多种查询类型*：短语查询、通配符查询、邻近查询、范围查询等等。


    *   *单字段和多字段搜索*：Lucene 允许在单个字段或多个字段上进行搜索——支持跨多个字段进行排序。


    *   *排序和分面*：Lucene 允许按特定字段对结果进行排序（类似于 SQL 的 ORDER BY）。Lucene 还允许对不同属性进行分面（类似于
    SQL 的 GROUP BY）。


    *   *多索引搜索*：Lucene 允许单个查询查询多个索引，然后将所有索引的结果合并到一个最终结果集中。


    *   *并发索引和搜索*：Lucene 允许使用多个线程处理单个索引或搜索请求。这可以显著加快单个请求的性能。


    *   *高亮、连接和结果分组*：Lucene 允许在满足特定条件的情况下跨不同索引进行连接。


    *   *可插拔的排序模型*：包括[向量空间模型](http://en.wikipedia.org/wiki/Vector_Space_Model)和 [Okapi
    BM25](http://en.wikipedia.org/wiki/Okapi_BM25)。


    *   *用于存储的自定义编解码器*：可以在 Lucene 中实现并使用自定义存储格式，从而在搜索应用程序中使用 Lucene 时提供灵活性。


    尽管上述列表并不详尽，但它突出了 Lucene 中一些更受欢迎的特性，这些特性使你能够在构建高性能系统的同时，保持返回结果的高度相关性。'
- fmt: '# Information Retrieval Basics


    Before delving deeper into the innards of Lucene, let’s review what search in
    IR systems is really about. Although this discussion does not go into the full
    complexity of IR, it should allow you to grasp the finer details of Lucene as
    we progress.


    `Search`, in the context of IR systems, is the art of extracting information with
    high relevance for a given query.


    `Indexing`, in the context of IR systems, is building inverted indexes from the
    given text. The process is described in the chapter on indexing. Note that the
    indexing referred to here and in later chapters differs from typical indexing
    in relational database systems. Relational database systems typically refer to
    indexing as the creation of a secondary data structure such as B-tree on top of
    a table attribute for faster searching. In this context, indexing refers to building
    an inverted index on top of the given dataset.


    Consider a thick book for which a sequential search (line by line) for a specific
    combination of terms is impossible. For example, in a children’s bedtime stories
    book, we might search for the following: all stories containing the words “sunshine”
    and “candies” and not containing the word “ghosts.”


    From an IR system perspective, the query can be shown as follows:


    - `sunshine AND candies AND NOT ghosts`


    The following sections discuss the ways in which this query can be executed.


    ## Linear Scan


    A `linear scan` is a simple process of sequentially going through each line in
    the system and checking for the parameters (i.e., conditions in the given query).
    This is precisely how Unix''s `grep` command works, and it also works fairly well
    with wildcards and regular expressions. If the size of data set being searched
    size is not too large and the hardware being used is reasonably powerful, linear
    search is the simplest way.


    However, linear search starts showing performance degradations beyond a million
    medium-sized documents. The world around us is experiencing an information explosion.
    In fact, the amount of data that needs to be processed to extract relevant information
    has quadrupled over the last 10 years, thanks to the advent of connected world,
    hand held devices and IoT. Linear search cannot scale to meet those needs, and
    so we need something more sophisticated and performant that can handle massive
    datasets while still providing relevant results at reasonable speeds.


    Linear searches also limit what kind of queries can be answered. For example,
    there is no way to define a query that seeks “close” matches of a given pattern.
    Suppose, for instance, that we search for documents with the words “flower” and
    “sunshine” within a proximity of three words in a document. Doing so with linear
    search is impossible. Also, there is no notion of ranked results. That is, given
    a query, a result is either a match or not for a linear scan. If we want some
    sort of ranking, we cannot use a linear scan.


    An `inverted index` is a data structure used to store data in an “inverted” manner
    (i.e., terms are mapped to documents in which the terms appear). Any unique term
    appearing in any document is made a part of the inverted index.


    As shown in Figure [1-1](#485809_1_En_1_Chapter.xhtml#Fig1), this data structure
    proves useful for answering questions like “find me the documents containing Term1”
    in an optimized manner. As you can see, a single-term search is a constant-time
    operation.


    Table 1-1.


    | Query | Application | Sample Query |

    | --- | --- | --- |

    | `TermQuery` | Single-term match | `"Foo":"Bar"` |

    | `PhraseQuery` | Several terms Coupled together | `"All Cars With Black Tyres"`
    |

    | `RangeQuery` | Range of terms, excluding or including the endpoints | `"AGE":[13-19]`
    |

    | `PrefixQuery` | Matches given prefix | `Foo*` |

    | `FuzzyQuery` | Levenshtein algorithm for closeness matching | `Foo~` |

    | `WildcardQuery` | Regular expression Like matching | `F??bar` |

    | `BooleanQuery` | Multiple queries connected by logical clauses | `"NAME:Ramesh"
    AND "AGE":[13-19]` |


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig1_HTML.jpg](images/485809_1_En_1_Chapter/485809_1_En_1_Fig1_HTML.jpg)


    Figure 1-1. A Representation of Inverted Index


    To create an inverted index, the fields within the document are first split and
    tokenized, a sorted list of all the unique terms is created, and the documents
    that contain the corresponding terms are populated.


    While being fast for a single-term query, inverted indexes can also answer an
    important class of questions: similarity queries.


    Figure [1-2](#485809_1_En_1_Chapter.xhtml#Fig2) shows the typical way a query
    is processed in IR systems. A query comes in and is parsed and split into individual
    tokens. A token is an independent term having its own semantics in a query.


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig2_HTML.jpg](images/485809_1_En_1_Chapter/485809_1_En_1_Fig2_HTML.jpg)


    Figure 1-2. Control Flow of Query Process


    For example, consider the following query:


    - Find all people who drove to college yesterday


    In this scenario, tokenizing the query will lead to independent terms such as
    “drove,” “college,” “yesterday,” and “to.”


    ## Stop List


    A `stop list` consists of words that are used in the associated language to form
    the structure of sentences but are not necessarily useful for semantic matching
    and searching. For example, in the sentence “Alex went to London,” we see that
    the word “to” is a stop word because that helps form the structure of the query.
    However, it cannot necessarily contribute anything to the semantic assessment
    of a potential document match, and so it should not be considered on the same
    lines.


    Stop words are filtered out before further processing to help limit the number
    of tokens in the index to the ones that can contribute to the relevance of the
    document. Of course, later on, we might discover that some of the semantically-able
    words are not useful in matching relevant documents, but that is done stage by
    stage, and we do not want to overoptimize.'
  raw: '## Information Retrieval Basics


    Before delving deeper into the innards of Lucene, let’s review what search in
    IR systems is really about. Although this discussion does not go into the full
    complexity of IR, it should allow you to grasp the finer details of Lucene as
    we progress.


    *Search*, in the context of IR systems, is the art of extracting information with
    high relevance for a given query.


    *Indexing* , in the context of IR systems, is building inverted indexes from the
    given text. The process is described in the chapter on indexing. Note that the
    indexing referred to here and in later chapters differs from typical indexing
    in relational database systems. Relational database systems typically refer to
    indexing as the creation of a secondary data structure such as B-tree on top of
    a table attribute for faster searching. In this context, indexing refers to building
    an inverted index on top of the given dataset.


    Consider a thick book for which a sequential search (line by line) for a specific
    combination of terms is impossible. For example, in a children’s bedtime stories
    book, we might search for the following: all stories containing the words “sunshine”
    and “candies” and not containing the word “ghosts.”


    From an IR system perspective, the query can be shown as follows:


    *   sunshine AND candies AND NOT ghosts


    The following sections discuss the ways in which this query can be executed.


    ## Linear Scan


    A *linear scan* is a simple process of sequentially going through each line in
    the system and checking for the parameters (i.e., conditions in the given query).
    This is precisely how Unix''s `grep` command works, and it also works fairly well
    with wildcards and regular expressions. If the size of data set being searched
    size is not too large and the hardware being used is reasonably powerful, linear
    search is the simplest way.


    However, linear search starts showing performance degradations beyond a million
    medium-sized documents. The world around us is experiencing an information explosion.
    In fact, the amount of data that needs to be processed to extract relevant information
    has quadrupled over the last 10 years, thanks to the advent of connected world,
    hand held devices and IoT. Linear search cannot scale to meet those needs, and
    so we need something more sophisticated and performant that can handle massive
    datasets while still providing relevant results at reasonable speeds.


    Linear searches also limit what kind of queries can be answered. For example,
    there is no way to define a query that seeks “close” matches of a given pattern.
    Suppose, for instance, that we search for documents with the words “flower” and
    “sunshine” within a proximity of three words in a document. Doing so with linear
    search is impossible. Also, there is no notion of ranked results. That is, given
    a query, a result is either a match or not for a linear scan. If we want some
    sort of ranking, we cannot use a linear scan.


    An *inverted index* is a data structure used to store data in an “inverted” manner
    (i.e., terms are mapped to documents in which the terms appear). Any unique term
    appearing in any document is made a part of the inverted index.


    As shown in Figure [1-1](#485809_1_En_1_Chapter.xhtml#Fig1), this data structure
    proves useful for answering questions like “find me the documents containing Term1”
    in an optimized manner. As you can see, a single-term search is a constant-time
    operation.


    Table 1-1.


    | Query | Application | Sample Query |

    | --- | --- | --- |

    | TermQuery | Single-term match | “Foo”:”Bar” |

    | PhraseQuery | Several terms Coupled together | “All Cars With Black Tyres” |

    | RangeQuery | Range of terms, excluding or including the endpoints | “AGE”:[13-19]
    |

    | PrefixQuery | Matches given prefix | Foo* |

    | FuzzyQuery | Levenshtein algorithm for closeness matching | Foo~ |

    | WildcardQuery | Regular expression Like matching | F??bar |

    | BooleanQuery | Multiple queries connected by logical clauses | “NAME:Ramesh”
    AND “AGE”:[13-19] |


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig1_HTML.jpg](images/485809_1_En_1_Chapter/485809_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    A Representation of Inverted Index


    To create an inverted index, the fields within the document are first split and
    tokenized, a sorted list of all the unique terms is created, and the documents
    that contain the corresponding terms are populated.


    While being fast for a single-term query, inverted indexes can also answer an
    important class of questions: similarity queries.


    Figure [1-2](#485809_1_En_1_Chapter.xhtml#Fig2) shows the typical way a query
    is processed in IR systems. A query comes in and is parsed and split into individual
    tokens. A token is an independent term having its own semantics in a query.


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig2_HTML.jpg](images/485809_1_En_1_Chapter/485809_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    Control Flow of Query Process


    For example, consider the following query:


    *   Find all people who drove to college yesterday


    In this scenario, tokenizing the query will lead to independent terms such as
    “drove,” “college,” “yesterday,” and “to.”


    ## Stop List


    A *stop list* consists of words that are used in the associated language to form
    the structure of sentences but are not necessarily useful for semantic matching
    and searching. For example, in the sentence “Alex went to London,” we see that
    the word “to” is a stop word because that helps form the structure of the query.
    However, it cannot necessarily contribute anything to the semantic assessment
    of a potential document match, and so it should not be considered on the same
    lines.


    Stop words are filtered out before further processing to help limit the number
    of tokens in the index to the ones that can contribute to the relevance of the
    document. Of course, later on, we might discover that some of the semantically-able
    words are not useful in matching relevant documents, but that is done stage by
    stage, and we do not want to overoptimize.'
  trans: '

    ## 信息检索基础


    在深入探讨 Lucene 的内部机制之前，我们先来回顾一下信息检索系统中的搜索究竟是怎么回事。虽然这里的讨论不会涉及信息检索的全部复杂性，但它应该能帮助你随着我们的学习进度，掌握
    Lucene 的更多细节。


    在信息检索系统的语境下，*搜索* 是一门从信息中提取与给定查询高度相关的内容的艺术。


    在信息检索系统的语境下，*索引* 是从给定文本构建倒排索引的过程。该过程在索引章节中有详细描述。请注意，此处及后续章节所指的索引，与关系型数据库系统中的典型索引不同。关系型数据库系统中的索引通常是指在表属性之上创建诸如
    B 树之类的辅助数据结构，以加快搜索速度。而在此语境下，索引是指在给定数据集之上构建倒排索引。


    想象一本厚书，要对其中的特定术语组合进行顺序搜索（逐行查找）是不可能的。例如，在一本儿童睡前故事书中，我们可能会搜索：所有包含“阳光”和“糖果”但不包含“鬼怪”的故事。


    从信息检索系统的角度来看，该查询可以表示如下：


    *   阳光 AND 糖果 AND NOT 鬼怪


    以下章节将讨论执行此查询的几种方式。


    ## 线性扫描


    *线性扫描* 是一个简单的过程，它依次遍历系统中的每一行，并检查参数（即给定查询中的条件）。这正是 Unix 的 `grep` 命令的工作方式，并且它在处理通配符和正则表达式时也相当有效。如果被搜索的数据集规模不是太大，并且所使用的硬件性能足够强大，那么线性搜索是最简单的方法。


    然而，当文档数量超过一百万篇中等大小的文档时，线性搜索的性能就会开始下降。我们周围的世界正在经历信息爆炸。事实上，由于互联世界、手持设备和物联网的出现，在过去
    10 年里，需要处理以提取相关信息的数据量已经翻了两番。线性搜索无法扩展以满足这些需求，因此我们需要更复杂、性能更高的方案，能够处理海量数据集，同时仍能以合理的速度提供相关结果。


    线性搜索也限制了能够回答的查询类型。例如，无法定义一个查询来寻找给定模式的“近似”匹配。假设我们要搜索文档中“flower”和“sunshine”这两个词出现在三个词距离内的文档。使用线性搜索是无法做到的。此外，也没有排序结果的概念。也就是说，对于给定的查询，线性扫描的结果要么匹配，要么不匹配。如果我们想要某种排序，就不能使用线性扫描。


    *倒排索引* 是一种以“倒排”方式存储数据的数据结构（即，将词条映射到包含这些词条的文档）。任何出现在任何文档中的唯一词条都会成为倒排索引的一部分。


    如图 1-1 所示，这种数据结构对于以优化方式回答诸如“找到包含 Term1 的文档”这类问题非常有用。如您所见，单词条搜索是一个常数时间操作。


    表 1-1.


    | 查询类型 | 应用场景 | 示例查询 |

    | --- | --- | --- |

    | TermQuery | 单词条匹配 | “Foo”:”Bar” |

    | PhraseQuery | 多个词条组合在一起 | “所有带黑色轮胎的汽车” |

    | RangeQuery | 词条范围，包含或不包含端点 | “年龄”:[13-19] |

    | PrefixQuery | 匹配给定前缀 | Foo* |

    | FuzzyQuery | 用于近似匹配的 Levenshtein 算法 | Foo~ |

    | WildcardQuery | 类似正则表达式的匹配 | F??bar |

    | BooleanQuery | 通过逻辑子句连接的多个查询 | “姓名:Ramesh” AND “年龄”:[13-19] |


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig1_HTML.jpg](img/485809_1_En_1_Fig1_HTML.jpg)


    图 1-1.


    倒排索引的表示


    为了创建倒排索引，首先需要将文档中的字段进行拆分和分词，创建一个包含所有唯一词条的排序列表，然后填充包含相应词条的文档。


    虽然倒排索引对于单词条查询速度很快，但它也能回答一类重要的问题：相似性查询。


    图 1-2 展示了信息检索系统中处理查询的典型方式。查询进入系统后，会被解析并拆分成独立的词元。词元是查询中具有自身语义的独立词条。


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig2_HTML.jpg](img/485809_1_En_1_Fig2_HTML.jpg)


    图 1-2.


    查询处理的控制流程


    例如，考虑以下查询：


    *   找出所有昨天开车去大学的人


    在这种情况下，对该查询进行分词将得到独立的词条，例如“开车”、“大学”、“昨天”和“去”。


    ## 停用词表


    *停用词表* 包含在相关语言中用于构成句子结构，但对语义匹配和搜索不一定有用的词。例如，在句子“Alex went to London”中，我们看到单词“to”是一个停用词，因为它有助于构成查询的结构。然而，它不一定能为潜在文档匹配的语义评估做出任何贡献，因此不应将其与其它词同等对待。


    在进一步处理之前，会过滤掉停用词，以帮助将索引中的词元数量限制在那些能够对文档相关性做出贡献的词元上。当然，我们之后可能会发现，一些具有语义能力的词在匹配相关文档时并无用处，但这是分阶段进行的，我们不想过度优化。

    '
- fmt: "# Stemming\n\nQueries can contain words in different forms, with different\
    \ tenses, spellings, and associated grammatical semantics. For example, “drive,”\
    \ “driving,” and “drives” are all based on the same word but differ in their structure.\
    \ However, for semantic matching, the actual structure of the word is of little\
    \ value. What really matters is the root word, which will contribute to calculating\
    \ the overall relevance of a document to the query.\n\nAnother advantage of discounting\
    \ different structures of the same word is to allow one to match the remaining.\
    \ For example, a query containing the word “drive” should match documents containing\
    \ the word “driving.” This increases the *recall* of the query results. Recall\
    \ is defined as the breadth of the returned results (i.e., how many documents\
    \ match a given query). Unlike a relational database, IR systems can answer queries\
    \ with a semantic element with them; that is, any document can match the given\
    \ query. The trick is to identify the most relevant ones and eliminate the unnecessary\
    \ noise.\n\n> **Note**  \n> *Recall* is the width of documents in the returned\
    \ results. However, too high a recall, and the returned results will have lower\
    \ correctness. Too low a recall, and the returned results are very small in size.\
    \ Most IR systems struggle with this trade-off.\n\n*Stemming* is the process of\
    \ reducing words to their base word and removing the structural differences between\
    \ words that originate from the same root. However, stemming can be crude in its\
    \ operations. For example, stemming can employ a crude heuristic to remove parts\
    \ of words, which can sometimes lead to weird semantic outputs. While this is\
    \ efficient and works most of the time, a more sophisticated way to deal with\
    \ this requirement is the art of lemmatization: rewriting words using a given\
    \ vocabulary and depending on morphological analysis of the tokens of the query.\
    \ Lemmatization is beyond the scope of the current discussion.\n\nTo avoid linear\
    \ search, you can index the set of documents in advance and use special queries\
    \ to get the right set of results. Consider, for instance, a set of documents\
    \ with a range of words present. Let’s use a group of related books, as shown\
    \ here:\n\n- Databases in Action\n- World of Lucene\n- Introduction to Information\
    \ Retrieval\n\nLet’s now assume that we have to serve queries across all three\
    \ of these books. Doing so requires that we index data across all three books\
    \ so that we can be efficient in query operations. Note that there are multiple\
    \ ways to do the same thing. We can create a separate index per book, or index\
    \ all three books in the same index. To see what kind of index are we building,\
    \ refer back to Figure [1-1](#485809_1_En_1_Chapter.xhtml#Fig1).\n\nNote that\
    \ these books will have some key terms in common. For example, we expect “search”\
    \ to be present across all three of the texts. Similarly, “bytes” is another term\
    \ that can repeat across all three texts.\n\nA naive indexing technique is to\
    \ maintain independent metadata about each of the documents, effectively discarding\
    \ the common terms present. This method is a waste of space, and is also inefficient\
    \ for serving queries that seek matches across all the texts.\n\nTo implement\
    \ inverted indexes as outlined in Figure [1-1](#485809_1_En_1_Chapter.xhtml#Fig1),\
    \ you first need to understand the concepts of a term and a term-document incidence\
    \ matrix.\n\n## Term\n\nA *term* is an independent indexable unit in an IR system.\
    \ Terms are generally words, but they can be more complex and structured types\
    \ as well. Examples pertaining to our data set are “search” and “bytes.”\n\n##\
    \ Term-Document Incidence Matrix\n\nA *term-document incidence matrix* is what\
    \ maps a term to the documents that hold the given term. Simply put, it is a two-dimensional\
    \ matrix, where the column represents the name of the book, and the row represents\
    \ the terms involved.\n\nFigure [1-3](#485809_1_En_1_Chapter.xhtml#Fig3) shows\
    \ a term-incidence matrix for a given set of books and terms.\n\n![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig3_HTML.png](images/485809_1_En_1_Chapter/485809_1_En_1_Fig3_HTML.png)\n\
    \n**Figure 1-3.** Term Incidence Matrix\n\n## Serving Queries Using a Term-Document\
    \ Incidence Matrix\n\nThis section explains how to serve queries using the built\
    \ structure. A simple model using a term-document incidence matrix involves building\
    \ vectors for queries being served. For example, consider a query:\n\n- `TERM`\
    \ and `INDEX` and not `RESULT`\n\nUsing the vectors for each of the associated\
    \ terms, we perform the following:\n\n- `vector(term)` AND `vector(index)` AND\
    \ NOT `vector(result)`\n\nThe AND NOT `vector(result)` can be converted into AND\
    \ `~vector(result)`, where `~` represents the complement of the boolean vector.\n\
    \nThis converts to the following:\n\n- `vector(term)` AND `vector(index)` AND\
    \ `~vector(result)`\n\nReplacing with actual boolean vectors:\n\n- `01` AND `11`\
    \ AND `10`\n\nyields the final result of the query: Book2.\n\nNow that you have\
    \ a basic understanding of how inverted indexes work, are built, and are used\
    \ for querying, let’s take a look at actual Lucene implementations.\n\n## Basic\
    \ Terminology\n\nBefore discussing the finer aspects of Lucene’s data structures,\
    \ here are some general terms you want to understand. These terms will help you\
    \ navigate your journey through Lucene:\n\n- **Document**: A record; the unit\
    \ of search; the thing returned as search results\n- **Field**: A typed slot in\
    \ a document for storing and indexing values\n- **Index**: A collection of documents,\
    \ typically with the same schema\n- **Corpus**: The entire set of documents in\
    \ an index\n- **Inverted index**: Internal data structure that maps terms to documents\
    \ by a unique identifier\n- **Term**: Value extracted from source document, used\
    \ for building the inverted index\n- **Vocabulary**: The full set of distinct\
    \ terms in a corpus\n- **Field data**: Array of all field values per field, sorted\
    \ by document identifiers\n- **Doc values**: Columnar store representing field\
    \ values\n\n## Heart of Lucene’s Data Representation\n\nNote that at its most\
    \ basic, Lucene stores data in the form of an inverted index, similar to what\
    \ we discussed earlier. However, the actual representation, construction, and\
    \ storage of the inverted index are optimized and specific for Lucene, as discussed\
    \ next.\n\n## Lucene’s Inverted Index Structure\n\nBefore looking closer at the\
    \ semantics of this format, let’s first review some basic elements of Lucene’s\
    \ indexing and searching terminology:\n\n- **Term**: Term in Lucene is the equivalent\
    \ of a token in the English language, only much more powerful and semantically\
    \ augmented than its English language counterpart. Terms can be analyzed or not\
    \ analyzed in Lucene, although non-analyzed terms hold little value. Consider\
    \ the following input to Lucene:\n\n  `\"Foo\" : \"Bar\"`\n\n  This converts into\
    \ the term `\"Bar\"` and is queryable in that format by any such Lucene queries.\n\
    \n  Remember that a term is the basic unit of both indexing and search. Lucene\
    \ stores its underlying data as terms, and user queries are deconstructed into\
    \ terms and then sent for further processing.\n\n- **Term dictionary**: A term\
    \ dictionary is what holds the terms indexed in the Lucene index and their corresponding\
    \ document frequencies."
  raw: '## Stemming


    Queries can contain words in different forms, with different tenses, spellings,
    and associated grammatical semantics. For example, “drive,” “driving,” and “drives”
    are all based on the same word but differ in their structure. However, for semantic
    matching, the actual structure of the word is of little value. What really matters
    is the root word, which will contribute to calculating the overall relevance of
    a document to the query.


    Another advantage of discounting different structures of the same word is to allow
    one to match the remaining. For example, a query containing the word “drive” should
    match documents containing the word “driving.” This increases the *recall* of
    the query results. Recall is defined as the breadth of the returned results (i.e.,
    how many documents match a given query). Unlike a relational database, IR systems
    can answer queries with a semantic element with them; that is, any document can
    match the given query. The trick is to identify the most relevant ones and eliminate
    the unnecessary noise.


    Note


    *Recall* is the width of documents in the returned results. However, too high
    a recall, and the returned results will have lower correctness. Too low a recall,
    and the returned results are very small in size. Most IR systems struggle with
    this trade-off.


    *Stemming* is the process of reducing words to their base word and removing the
    structural differences between words that originate from the same root. However,
    stemming can be crude in its operations. For example, stemming can employ a crude
    heuristic to remove parts of words, which can sometimes lead to weird semantic
    outputs. While this is efficient and works most of the time, a more sophisticated
    way to deal with this requirement is the art of lemmatization: rewriting words
    using a given vocabulary and depending on morphological analysis of the tokens
    of the query. Lemmatization is beyond the scope of the current discussion.


    To avoid linear search, you can index the set of documents in advance and use
    special queries to get the right set of results. Consider, for instance, a set
    of documents with a range of words present. Let’s use a group of related books,
    as shown here:


    *   Databases in Action World of Lucene Introduction to Information Retrieval


    Let’s now assume that we have to serve queries across all three of these books.
    Doing so requires that we index data across all three books so that we can be
    efficient in query operations. Note that there are multiple ways to do the same
    thing. We can create a separate index per book, or index all three books in the
    same index. To see what kind of index are we building, refer back to Figure [1-1](#485809_1_En_1_Chapter.xhtml#Fig1).


    Note that these books will have some key terms in common. For example, we expect
    “search” to be present across all three of the texts. Similarly, “bytes” is another
    term that can repeat across all three texts.


    A naive indexing technique is to maintain independent metadata about each of the
    documents, effectively discarding the common terms present. This method is a waste
    of space, and is also inefficient for serving queries that seek matches across
    all the texts.


    To implement inverted indexes as outlined in Figure [1-1](#485809_1_En_1_Chapter.xhtml#Fig1),
    you first need to understand the concepts of a term and a term-document incidence
    matrix.


    ## Term


    A *term* is an independent indexable unit in an IR system. Terms are generally
    words, but they can be more complex and structured types as well. Examples pertaining
    to our data set are “search” and “bytes.”


    ## Term-Document Incidence Matrix


    A *term-document incidence matrix* is what maps a term to the documents that hold
    the given term. Simply put, it is a two-dimensional matrix, where the column represents
    the name of the book, and the row represents the terms involved.


    Figure [1-3](#485809_1_En_1_Chapter.xhtml#Fig3) shows a term-incidence matrix
    for a given set of books and terms.


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig3_HTML.png](images/485809_1_En_1_Chapter/485809_1_En_1_Fig3_HTML.png)


    Figure 1-3.


    Term Incidence Matrix


    ## Serving Queries Using a Term-Document Incidence Matrix


    This section explains how to serve queries using the built structure. A simple
    model using a term-document incidence matrix involves building vectors for queries
    being served. For example, consider a query:


    *   TERM and INDEX and not RESULT


    Using the vectors for each of the associated terms, we perform the following:


    *   vector(term) AND vector(index) AND NOT vector(result)


    The AND NOT vector(result) can be converted into AND ~vector(result), where ~
    represent the complement of the boolean vector.


    This converts to the following:


    *   vector(term) AND vector(index) AND ~vector(result)


    Replacing with actual boolean vectors


    *   01 AND 11 AND 10


    yields the final result of the query: Book2.


    Now that you have a basic understanding of how inverted indexes work, are built,
    and are used for querying, let’s take a look at actual Lucene implementations.


    ## Basic Terminology


    Before discussing the finer aspects of Lucene’s data structures, here are some
    general terms you want to understand. These terms will help you navigate your
    journey through Lucene:


    *   *Document* : A record; the unit of search; the thing returned as search results


    *   *Field* : A typed slot in a document for storing and indexing values


    *   *Index* : A collection of documents, typically with the same schema


    *   *Corpus* : The entire set of documents in an index


    *   *Inverted index* : Internal data structure that maps terms to documents by
    a unique identifier.


    *   *Term* : Value extracted from source document, used for building the inverted
    index


    *   *Vocabulary* : The full set of distinct terms in a corpus


    *   *Field data* : Array of all field values per field, sorted by document identifiers


    *   *Doc values* : Columnar store representing field values


    ## Heart of Lucene’s Data Representation


    Note that at its most basic, Lucene stores data in the form of an inverted index,
    similar to what we discussed earlier. However, the actual representation, construction,
    and storage of the inverted index are optimized and specific for Lucene, as discussed
    next.


    ## Lucene’s Inverted Index Structure


    Before looking closer at the semantics of this format, let’s first review some
    basic elements of Lucene’s indexing and searching terminology:


    *   *Term*: Term in Lucene is the equivalent of a token in the English language,
    only much more powerful and semantically augmented than its English language counterpart.
    Terms can be analyzed or not analyzed in Lucene, although non-analyzed terms hold
    little value. Consider the following input to Lucene:


    “Foo” : “Bar”


    This converts into the term “Bar” and is queryable in that format by any such
    Lucene queries.


    Remember that a term is the basic unit of both indexing and search. Lucene stores
    its underlying data as terms, and user queries are deconstructed into terms and
    then sent for further processing.


    *   *Term dictionary*: A term dictionary is what holds the terms indexed in the
    Lucene index and their corresponding document frequencies.'
  trans: '

    ## 词干提取


    查询可能包含不同形式的单词，具有不同的时态、拼写和相关的语法语义。例如，“drive”、“driving”和“drives”都基于同一个词，但结构不同。然而，对于语义匹配而言，单词的实际结构价值不大。真正重要的是词根，它将有助于计算文档与查询的整体相关性。


    忽略同一单词不同结构的另一个好处是，可以匹配剩余部分。例如，包含单词“drive”的查询应该匹配包含单词“driving”的文档。这提高了查询结果的*召回率*。召回率定义为返回结果的广度（即，有多少文档匹配给定查询）。与关系数据库不同，信息检索系统可以回答带有语义元素的查询；也就是说，任何文档都可以匹配给定的查询。关键在于识别最相关的文档并消除不必要的噪音。


    注意


    *召回率*是返回结果中文档的宽度。然而，召回率过高，返回结果的正确性就会降低。召回率过低，返回结果的数量就会非常少。大多数信息检索系统都在这种权衡中挣扎。


    *词干提取*是将单词还原为其基本词，并消除源自同一词根的单词之间结构差异的过程。然而，词干提取的操作可能很粗糙。例如，词干提取可以使用粗糙的启发式方法来去除单词的某些部分，这有时会导致奇怪的语义输出。虽然这种方法很高效，并且在大多数情况下都有效，但处理此需求的更复杂方法是词形还原的艺术：使用给定的词汇表并根据查询词元的形态分析来重写单词。词形还原超出了当前讨论的范围。


    为了避免线性搜索，你可以预先索引文档集，并使用特殊查询来获取正确的结果集。例如，考虑一组包含一系列单词的文档。让我们使用一组相关的书籍，如下所示：


    *   Databases in Action World of Lucene Introduction to Information Retrieval


    现在假设我们必须为这三本书提供查询服务。这样做需要我们对这三本书的数据进行索引，以便在查询操作中提高效率。请注意，有多种方法可以实现相同的目的。我们可以为每本书创建一个单独的索引，或者将这三本书索引到同一个索引中。要了解我们正在构建哪种索引，请参考图
    1-1。


    请注意，这些书会有一些共同的关键词。例如，我们预计“search”会出现在所有三本书的文本中。同样，“bytes”是另一个可能在三本书的文本中重复出现的词。


    一种简单的索引技术是为每个文档维护独立的元数据，从而有效地丢弃了常见的词项。这种方法浪费空间，并且对于寻求跨所有文本匹配的查询服务来说效率也很低。


    要实现图 1-1 中概述的倒排索引，你首先需要理解词项和词项-文档关联矩阵的概念。


    ## 词项


    *词项*是信息检索系统中一个独立的可索引单元。词项通常是单词，但也可能是更复杂和结构化的类型。与我们数据集相关的示例有“search”和“bytes”。


    ## 词项-文档关联矩阵


    *词项-文档关联矩阵*将词项映射到包含该词项的文档。简单来说，它是一个二维矩阵，其中列代表书名，行代表涉及的词项。


    图 1-3 展示了一个给定书籍和词项集的词项-文档关联矩阵。


    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig3_HTML.png](img/485809_1_En_1_Fig3_HTML.png)


    图 1-3.


    词项-文档关联矩阵


    ## 使用词项-文档关联矩阵提供查询服务


    本节解释如何使用构建好的结构来提供查询服务。一个使用词项-文档关联矩阵的简单模型涉及为正在服务的查询构建向量。例如，考虑一个查询：


    *   TERM and INDEX and not RESULT


    使用每个相关词项的向量，我们执行以下操作：


    *   vector(term) AND vector(index) AND NOT vector(result)


    AND NOT vector(result) 可以转换为 AND ~vector(result)，其中 ~ 表示布尔向量的补集。


    这转换为以下内容：


    *   vector(term) AND vector(index) AND ~vector(result)


    用实际的布尔向量替换：


    *   01 AND 11 AND 10


    得到查询的最终结果：Book2。


    现在你已经基本了解了倒排索引的工作原理、构建方式以及如何用于查询，让我们来看看实际的 Lucene 实现。


    ## 基本术语


    在讨论 Lucene 数据结构的更精细方面之前，这里有一些你需要理解的一般术语。这些术语将有助于你在 Lucene 中的探索之旅：


    *   *文档*：一条记录；搜索的单位；作为搜索结果返回的内容

    *   *字段*：文档中用于存储和索引值的类型化槽位

    *   *索引*：文档的集合，通常具有相同的模式

    *   *语料库*：索引中所有文档的完整集合

    *   *倒排索引*：通过唯一标识符将词项映射到文档的内部数据结构。

    *   *词项*：从源文档中提取的值，用于构建倒排索引

    *   *词汇表*：语料库中所有不同词项的完整集合

    *   *字段数据*：按文档标识符排序的每个字段的所有字段值数组

    *   *文档值*：表示字段值的列式存储


    ## Lucene 数据表示的核心


    请注意，在最基本的层面上，Lucene 以倒排索引的形式存储数据，类似于我们之前讨论的内容。然而，倒排索引的实际表示、构建和存储都是针对 Lucene 进行优化和特定的，如下所述。


    ## Lucene 的倒排索引结构


    在更仔细地审视这种格式的语义之前，让我们先回顾一下 Lucene 索引和搜索术语的一些基本元素：


    *   *词项*：Lucene 中的词项相当于英语中的词元，只是比其英语对应物更强大，语义更丰富。在 Lucene 中，词项可以被分析或不被分析，尽管未被分析的词项价值不大。考虑以下输入到
    Lucene 的内容：


    “Foo” : “Bar”


    这转换为词项“Bar”，并且可以以该格式被任何此类 Lucene 查询检索到。


    请记住，词项是索引和搜索的基本单位。Lucene 将其底层数据存储为词项，用户查询被分解为词项，然后发送以进行进一步处理。


    *   *词项词典*：词项词典保存了在 Lucene 索引中索引的词项及其对应的文档频率。

