  raw: '### Writing a Patch


    If you have identified what you want to change in Lucene/Solr and have a good
    idea about how to do so, it makes sense to write a patch. A patch is a change
    delta. Think of it as a “change” you want to make in the code base.


    How you do this is by first forking the Lucene/Solr code base on Github. Post
    that, and then clone the repository by using `git clone`. Post that, and then
    create a branch by using `git checkout -b <foobar>`. Remember that the commit
    that you raise into the Lucene/Solr code base has to be marked with the JIRA number
    of the JIRA that you are working against. So, ensure that you have set up the
    JIRA number beforehand.


    After making the changes locally in your repository, do a `git diff` to ensure
    that you have written the code the way you want and that no unintended changes
    occurred.


    Do a `git commit` to create a commit and ensure that you have it pushed to your
    fork.


    ### Tests


    Here is an important reminder: Test every change and validate all functionality
    that your patch affects. You also need to confirm that all existing tests pass;
    there are no regressions.


    It is a good idea to run `ant test` on the project to ensure that all tests pass.
    If a specific test is causing issues, use the following:


    ```

    ant beast -Dtestcase= -Dtests.method= -Dbeast.iters=

    ```


    ### Writing Good Commit Messages


    Although not fixed rules, these following guidelines apply when you write commit
    messages:


    *   Separate the subject from the body with a blank line.


    *   Limit the subject line to 50 characters.


    *   Capitalize the subject line.


    *   Do not end the subject line with a period.


    *   Use the imperative mood in the subject line.


    *   Wrap the body at 72 characters.


    *   Use the body to explain what and why vs. how.


    #### Writing Documentation


    You need to accompany any nontrivial changes with proper documentation (in code,
    configurations, and reference documents). Doing anything less will result in less-than-positive
    feedback from the community.


    #### Raise a Pull Request


    Now that you have completed a review-ready patch, you’re ready to raise a pull
    request. Go to Github’s UI and raise a pull request from your repository. Make
    sure that you track comments on it, actively iterate, respect feedback, and improve
    it. Hopefully, your changes will be incorporated.


    #### Interacting with the Community


    It is a good idea to drop an email to dev@lucene.apache.org stating your changes
    and asking for feedback. Generally, people will respond with constructive feedback.
    Remember that the most important goal is to improve the project; so although your
    work might be criticized, take it as constructive criticism.


    Being a good community member is important, so you want to follow decorum and
    respect established norms and standards.


