  ### Lucene2seq\n\n上一节展示了如何将 Lucene 词向量转换为 Mahout 向量，以供 Mahout 集成和处理。本节将展示如何将 Lucene\
  \ 存储字段转换为 Mahout 可消费的对象（从而可用于 Mahout 处理）。运行以下命令查看选项：\n\n| `$ bin/mahout lucene2seq\
  \ – help`作业特定选项： |   |\n| --- | --- |\n| `--output (-o) output` | `输出目录的路径名` |\n\
