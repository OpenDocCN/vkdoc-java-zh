  \n## 停用词表\n\n*停用词表* 包含在相关语言中用于构成句子结构，但对语义匹配和搜索不一定有用的词。例如，在句子“Alex went to London”中，我们看到单词“to”是一个停用词，因为它有助于构成查询的结构。然而，它不一定能为潜在文档匹配的语义评估做出任何贡献，因此不应将其与其它词同等对待。\n\
  \n在进一步处理之前，会过滤掉停用词，以帮助将索引中的词元数量限制在那些能够对文档相关性做出贡献的词元上。当然，我们之后可能会发现，一些具有语义能力的词在匹配相关文档时并无用处，但这是分阶段进行的，我们不想过度优化。\n\
  \n\n\n## 词干提取\n\n查询可能包含不同形式的单词，具有不同的时态、拼写和相关的语法语义。例如，“drive”、“driving”和“drives”都基于同一个词，但结构不同。然而，对于语义匹配而言，单词的实际结构价值不大。真正重要的是词根，它将有助于计算文档与查询的整体相关性。\n\
  \n忽略同一单词不同结构的另一个好处是，可以匹配剩余部分。例如，包含单词“drive”的查询应该匹配包含单词“driving”的文档。这提高了查询结果的*召回率*。召回率定义为返回结果的广度（即，有多少文档匹配给定查询）。与关系数据库不同，信息检索系统可以回答带有语义元素的查询；也就是说，任何文档都可以匹配给定的查询。关键在于识别最相关的文档并消除不必要的噪音。\n\
  \n注意\n\n*召回率*是返回结果中文档的宽度。然而，召回率过高，返回结果的正确性就会降低。召回率过低，返回结果的数量就会非常少。大多数信息检索系统都在这种权衡中挣扎。\n\
  \n*词干提取*是将单词还原为其基本词，并消除源自同一词根的单词之间结构差异的过程。然而，词干提取的操作可能很粗糙。例如，词干提取可以使用粗糙的启发式方法来去除单词的某些部分，这有时会导致奇怪的语义输出。虽然这种方法很高效，并且在大多数情况下都有效，但处理此需求的更复杂方法是词形还原的艺术：使用给定的词汇表并根据查询词元的形态分析来重写单词。词形还原超出了当前讨论的范围。\n\
  \n为了避免线性搜索，你可以预先索引文档集，并使用特殊查询来获取正确的结果集。例如，考虑一组包含一系列单词的文档。让我们使用一组相关的书籍，如下所示：\n\n\
  *   Databases in Action World of Lucene Introduction to Information Retrieval\n\n\
  现在假设我们必须为这三本书提供查询服务。这样做需要我们对这三本书的数据进行索引，以便在查询操作中提高效率。请注意，有多种方法可以实现相同的目的。我们可以为每本书创建一个单独的索引，或者将这三本书索引到同一个索引中。要了解我们正在构建哪种索引，请参考图\
  \ 1-1。\n\n请注意，这些书会有一些共同的关键词。例如，我们预计“search”会出现在所有三本书的文本中。同样，“bytes”是另一个可能在三本书的文本中重复出现的词。\n\
  \n一种简单的索引技术是为每个文档维护独立的元数据，从而有效地丢弃了常见的词项。这种方法浪费空间，并且对于寻求跨所有文本匹配的查询服务来说效率也很低。\n\n\
  要实现图 1-1 中概述的倒排索引，你首先需要理解词项和词项-文档关联矩阵的概念。\n\n## 词项\n\n*词项*是信息检索系统中一个独立的可索引单元。词项通常是单词，但也可能是更复杂和结构化的类型。与我们数据集相关的示例有“search”和“bytes”。\n\
  \n## 词项-文档关联矩阵\n\n*词项-文档关联矩阵*将词项映射到包含该词项的文档。简单来说，它是一个二维矩阵，其中列代表书名，行代表涉及的词项。\n\n\
  图 1-3 展示了一个给定书籍和词项集的词项-文档关联矩阵。\n\n![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig3_HTML.png](img/485809_1_En_1_Fig3_HTML.png)\n\
  \n图 1-3.\n\n词项-文档关联矩阵\n\n## 使用词项-文档关联矩阵提供查询服务\n\n本节解释如何使用构建好的结构来提供查询服务。一个使用词项-文档关联矩阵的简单模型涉及为正在服务的查询构建向量。例如，考虑一个查询：\n\
  \n*   TERM and INDEX and not RESULT\n\n使用每个相关词项的向量，我们执行以下操作：\n\n*   vector(term)\
  \ AND vector(index) AND NOT vector(result)\n\nAND NOT vector(result) 可以转换为 AND ~vector(result)，其中\
  \ ~ 表示布尔向量的补集。\n\n这转换为以下内容：\n\n*   vector(term) AND vector(index) AND ~vector(result)\n\
  \n用实际的布尔向量替换：\n\n*   01 AND 11 AND 10\n\n得到查询的最终结果：Book2。\n\n现在你已经基本了解了倒排索引的工作原理、构建方式以及如何用于查询，让我们来看看实际的\
  \ Lucene 实现。\n\n## 基本术语\n\n在讨论 Lucene 数据结构的更精细方面之前，这里有一些你需要理解的一般术语。这些术语将有助于你在 Lucene\
  \ 中的探索之旅：\n\n*   *文档*：一条记录；搜索的单位；作为搜索结果返回的内容\n*   *字段*：文档中用于存储和索引值的类型化槽位\n*   *索引*：文档的集合，通常具有相同的模式\n\
  *   *语料库*：索引中所有文档的完整集合\n*   *倒排索引*：通过唯一标识符将词项映射到文档的内部数据结构。\n*   *词项*：从源文档中提取的值，用于构建倒排索引\n\
  *   *词汇表*：语料库中所有不同词项的完整集合\n*   *字段数据*：按文档标识符排序的每个字段的所有字段值数组\n*   *文档值*：表示字段值的列式存储\n\
  \n## Lucene 数据表示的核心\n\n请注意，在最基本的层面上，Lucene 以倒排索引的形式存储数据，类似于我们之前讨论的内容。然而，倒排索引的实际表示、构建和存储都是针对\
  \ Lucene 进行优化和特定的，如下所述。\n\n## Lucene 的倒排索引结构\n\n在更仔细地审视这种格式的语义之前，让我们先回顾一下 Lucene\
  \ 索引和搜索术语的一些基本元素：\n\n*   *词项*：Lucene 中的词项相当于英语中的词元，只是比其英语对应物更强大，语义更丰富。在 Lucene 中，词项可以被分析或不被分析，尽管未被分析的词项价值不大。考虑以下输入到\
  \ Lucene 的内容：\n\n“Foo” : “Bar”\n\n这转换为词项“Bar”，并且可以以该格式被任何此类 Lucene 查询检索到。\n\n请记住，词项是索引和搜索的基本单位。Lucene\
  \ 将其底层数据存储为词项，用户查询被分解为词项，然后发送以进行进一步处理。\n\n*   *词项词典*：词项词典保存了在 Lucene 索引中索引的词项及其对应的文档频率。\n\
  \n\n\n## Lucene 索引的磁盘表示形式\n\nLucene 索引的磁盘表示形式经过优化，读写效率高，并且允许搜索索引中的特定区域。\n\nLucene\
  \ 的核心在于其索引文件格式。在 Lucene 4 之后，格式是可插拔的（使用自定义编解码器，本章后续会讨论）。然而，默认的文件格式是 Lucene 官方网站上发布的格式，也是本节将要介绍的内容。\n\
  \n参考图 1-4，开始定义的基本组件如下：\n\n*   **字段定义**：字段定义存储在一个名为 FieldInfos 的独立文件中（扩展名为 .fnm）。\n\
  \n    ![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig4_HTML.jpg](img/485809_1_En_1_Fig4_HTML.jpg)\n\
  \n    图 1-4.\n\n    Lucene 索引结构\n\n根据官方定义：\n\nFieldInfos (.fnm) --> FNMVersion,FieldsCount,\
  \ <FieldName, FieldBits> FieldsCount\n\n*   FNMVersion, FieldsCount --> VInt\n\n\
  *   FieldName --> Strings\n\n*   FieldBits --> Byte\n\n*   最低位为 1 表示已索引字段，为 0 表示未索引字段。\n\
  \n*   次低位为 1 表示字段存储了词向量，为 0 表示字段没有词向量。\n\n*   如果第三低位被设置（0x04），则词项位置与词向量一起存储。\n\n\
  *   如果第四低位被设置（0x08），则词项偏移量与词向量一起存储。\n\n*   如果第五低位被设置（0x10），则已索引字段的范数被省略。\n\n如果第六低位被设置（0x20），则为已索引字段存储载荷。\n\
  \n### 词项字典\n\n词项字典由两个文件表示：\n\n词项信息（或 tis）文件保存关于词项的元数据，例如词项名称、跳跃信息和文档频率（即包含该词项的文档数量）。tis\
  \ 文件还保存有用的信息，帮助 Lucene 构建结构，以便更优地访问给定词项的相关文档（Lucene 内部使用跳跃数据结构来加快访问速度，tis 文件保存的数据有助于构建此结构）。此外，此文件中的词项频率等元数据允许在其他文件中更快地访问。\n\
  \n词项信息索引文件（扩展名 .tii）保存元数据，允许对词项信息文件进行随机访问。\n\n## 频率文件\n\n频率文件（扩展名 .frq）将文档映射到词项。也就是说，它包含一个列表，列出了词项字典中所有包含某个词项的文档，以及每个词项在文档中的出现频率。\n\
  \n## 位置文件\n\n位置文件（扩展名 .prx）表示每个词项在文档中出现的位置列表。\n\n## Lucene 查询\n\n查询是应用程序与 Lucene\
  \ 交互并从中提取数据的灵魂。\n\nLucene 在这方面拥有多种核心能力，并允许构建丰富且语义多样的查询。Lucene 查询引擎的一个关键特性是其可扩展性，以及能够根据用户需求设置自定义参数来定制搜索和排序，这将在后续章节中讨论。\n\
  \n与普遍预期相反，Lucene 不支持 SQL 或类似 SQL 的语法。Lucene 拥有自定义的查询语法，旨在充分利用 Lucene 提供的所有功能。\n\n\
  ## Lucene 查询的结构\n\nLucene 的查询由两个主要部分组成：词项和操作符。由于我们之前已经讨论过词项的定义和语义相关性，这里不再赘述。然而，词项的两个重要分类对我们后续的讨论会很有帮助：\n\
  \n*   **单一词项**：单一词项是由单个词元组成的词项（例如，“walk”）。它们通常是原子的，构成了查询的基本结构。\n\n*   **短语**：短语是由多个单一词项组成的多词项现象。例如“Walk\
  \ This Way”。短语允许更丰富的查询匹配和检索，以及一种语义更强大的表达查询的方式。表 1-1 描述了查询及其等效应用，并为每种查询提供了一个示例。\n\
  \n## 字段\n\n字段用于在定义查询时指定谓词。字段是特定于数据语料库的，可以在构建查询时使用。可以指定任何可查询的有效字段。执行搜索时，可以指定要搜索的字段。可以使用任何现有的字段名称作为字段名称。在某些类型的查询中，可以指定多个字段。\n\
  \n## Lucene 中的查询类型\n\n本节介绍 Lucene 中可用的不同查询类型、它们的应用以及一个简短的示例。\n\n图 1-5 展示了一种实例化复合查询并为其设置一组子句的方法。大多数查询支持单个谓词，但某些查询（如\
  \ BooleanQuery）支持多个且多样化的子句，从而允许进行更复杂的搜索。\n\n![../images/485809_1_En_1_Chapter/485809_1_En_1_Fig5_HTML.jpg](img/485809_1_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5.\n\n## Lucene 与关系数据库\n\n尽管在许多方面相似，但信息检索系统与传统的关系统数据库系统存在本质区别。主要区别包括：\n\n\
  *   数据库提供严格的模式，从而强制输入系统的数据必须符合特定的结构。相比之下，信息检索系统通常是无模式的，并基于元组模型工作。\n\n*   数据库建立在模式之上，允许进行数据建模（例如实体关系图）。信息检索系统不具备这种能力（也不需要）。\n\
  \n*   必须使用精确值查询数据库，但信息检索系统允许不精确的搜索和语义。\n\n*   数据库通常用于精确检索，而信息检索系统通常用于不精确的“广泛”搜索，其中所有文档都可能匹配查询，因此排序和相关性概念得以应用。\n\
  \n"
- '# 2. Hello World：Lucene 之道


  本章介绍如何使用 Lucene 索引数据，具体包括 Lucene 如何存储和表示数据、Lucene 查询的细微差别，以及 Lucene 如何促进多参数搜索。


  ## 在 Lucene 中索引数据


  `IndexWriter` 是面向用户的主要类，负责在 Lucene 中索引数据。`IndexWriter` 用于分析文档、打开目录以及将数据写入目录。


  图 2-1 展示了索引操作的整体流程。一个由各种字段组成的文档首先被传递给分析器，然后被交给一个 `IndexWriter` 实例。`IndexWriter`
  与 Lucene 内部交互以打开相关目录，以正确且必需的格式形成索引，并将其写入底层目录。此后打开的任何读取器都可以访问（可见）该文档。


  ![../images/485809_1_En_2_Chapter/485809_1_En_2_Fig1_HTML.jpg](img/485809_1_En_2_Fig1_HTML.jpg)


  图 2-1


  索引操作流程


  现在让我们更仔细地看看此过程中涉及的类。




  ## 文档


  `Document` 是 Lucene 中代表文档及其关联内容的基类。文档是索引和搜索的宏观单元；索引和搜索均以文档为单位处理数据。


  一个 `Document` 由一个或多个 `Field` 类的实例组成。字段是键和值的组合。字段可以选择是否存储。存储的字段会随搜索结果一起返回，因此理想情况下每个文档应至少包含一个存储字段。然而，存储字段会显著增加索引的存储占用。在最坏的情况下（所有字段都存储），字段存储可能导致磁盘索引的整体存储大小增加约
  30%。


  创建 Document 类的实例时，你可以将每个字段标记为是否进行分词。标记为分词的字段会通过分析器进行处理。


  ## 分析器


  分析器在数据作为输入传递给另一个 Lucene 类之前对其进行分析。你可以在索引和搜索时使用分析器，通常建议使用它们。分析器通常使用一组已定义的分词器并应用一组过滤器，将输入文本拆分为词元。以下部分介绍了
  Lucene 中一些可用的分析器。


  ### StandardAnalyzer


  大多数 Lucene 用户使用 `StandardAnalyzer`，这是一个通用的分析器，旨在提供简单性、通用行为和易用性。


  `StandardAnalyzer` 会从输入中移除停用词，这在处理自然语言文本时非常有帮助。`StandardAnalyzer` 还会将文本转换为小写（这是一个需要注意的重点，因为在搜索使用
  `StandardAnalyzer` 索引的数据时，大小写问题可能导致应用程序代码中出现细微的错误）。


  注意


  `StandardAnalyzer` 会将数据转换为小写。因此，请记住这一点，并确保在搜索时使用相同的分析器，或者自行将文本转换为小写。


  示例如下：


  *   *输入：* “Lucene Is A Library”


  *   *输出：* [Lucene] [a] [Library]


  ### StopAnalyzer


  `StopAnalyzer` 与 `StandardAnalyzer` 类似，但它使用 `StopFilter` 执行停用词移除。


  ### SimpleAnalyzer


  `SimpleAnalyzer` 同样与 `StandardAnalyzer` 类似，但它无法移除停用词，也无法识别 URL。


  示例如下：


  *   *输入：* “Lucene Is A Library”


  *   *输出：* [Lucene] [is] [a] [Library]


  以下代码示例展示了一个用于分析文本并返回分词结果的输入分析器。请注意，分词结果取决于所使用的分析器及其特性：


  ```

  public List performAnalyze(String input, Analyzer analyser) throws IOException {

  List result = new ArrayList();

  TokenStream tokenStream = analyser.tokenStream("field_name", input);

  CharTermAttribute attr = tokenStream.addAttribute(CharTermAttribute.class);

  tokenStream.reset();

  while(tokenStream.incrementToken()) {

  result.add(attracts.toString());

  }

  return result;

  }

  ```


  ### IndexWriter


  `IndexWriter` 创建索引并将数据写入索引。由于 `IndexWriter` 是索引过程中的关键组件，构建应用程序的用户需要理解它。


  `IndexWriter` 允许你创建新索引以及打开现有索引。请记住，Lucene 索引是仅追加的。也就是说，一旦数据被写入，它就是不可变的，直到一个称为段合并（稍后讨论）的过程合并旧数据。这种不可变性允许
  `IndexWriter` 在仅提供查询服务的现有索引上工作。正在运行的查询仅使用索引的快照，不会干扰 `IndexWriter` 的数据写入过程。


  `IndexWriter` 支持多种应用程序编程接口（API）来与底层数据交互，并允许与数据进行复杂和自定义的交互。可以使用 `addDocument()` 添加新文档，使用
  `deleteDocuments()` 删除文档，以及使用 `updateDocument()` 更新现有文档。请注意，`deleteDocuments()`
  也可以传入一个查询，所有匹配该查询的文档都将被删除。更新文档意味着一次删除和一次插入，因为 Lucene 索引是仅追加的。


  `IndexWriter` 将数据写入索引内的一个新段。段是 Lucene 索引内的一个逻辑数据单元。调用 `commit()` 会强制创建一个新段。然而，在每次文档插入后都调用
  `commit()` 是一项昂贵的操作，并且不是一个好主意。请注意，`commit()` 是一个原子操作。


  ## 目录


  `Directory` 表示文件系统级别目录的逻辑表示。`Directory` 允许创建和访问索引，并支持随机访问。Lucene 支持多种 `Directory`
  实现，例如使用 Java 非阻塞 I/O（NIO）的实现（`NIOFSDirectory`），另一种是内存映射文件的实现（`MMapDirectory`），等等。


  现在，让我们按照以下高级步骤创建文档并对其进行索引：


  1.  创建文档。


  2.  创建索引并打开它以进行写入。


  3.  索引数据。


  ### 创建文档


  在此示例中，假设我们得到一个 `File` 实例作为输入。然后我们完成以下步骤：


  1.  从原始 `File` 实例中获取字段。


  2.  根据步骤 1 中获取的数据创建 Lucene `Field` 实例。


  3.  为每个字段设置相关属性。


  4.  创建一个 Lucene 文档。


  5.  将字段添加到文档中。


  以下代码按给定顺序遵循上述步骤：


  ```

  private Document parseAndCreateDocument(File file) throws IOException {

  //假设我们有一个解析器，可以从文件中返回不同的字段

  FancyParser fancyParser = FancyParser.getParser().parse(file);

  //步骤 1

  String firstTest = fancyParser.getFirst();

  String secondText = fancyParser.getSecond();

  String thirdText = fancyParser.getThird();

  //步骤 2 和 3

  Field firstField = new Field("first_field", firstText, Field.Store.YES, Field.Index.NOT_ANALYZED);

  Field secondField = new Field("second_field", secondText, Field.Store.YES, Field.Index.NOT_ANALYZED);

  Field thirdField = new Field("third_field", thirdText, Field.Store.YES, Field.Index.NOT_ANALYZED);

  //步骤 4

  Document document = new Document();

  //步骤 5

  document.add(firstField);

  document.add(secondField);

  document.add(thirdField);

  return document;

  }

  ```


  ### 创建索引并写入文档


  在本节中，我们将创建一个新索引并使用它来索引文档。如前所述，此过程中涉及的主要组件是 `IndexWriter` 和 `Directory`。`IndexWriter`
  既可以创建索引，也可以写入索引。`IndexWriter` 使用其底层的目录来实际写入所需数据。


  高级步骤如下：


  1.  创建一个 `IndexWriter` 实例。


  2.  创建一个用于存储索引的 Lucene 目录。


  3.  使用正确的配置初始化 `IndexWriter`。


  实现上述步骤：


  ```

  public IndexWriter getIndexWriter(String path) throws IOException {

  //步骤 1

  IndexWriter indexWriter;

  //步骤 2

  FSDirectory.open(new File(path));

  //步骤 3

  indexWriter = new IndexWriter(indexDirectory,

  new StandardAnalyzer(Version.LUCENE_80), true,

  IndexWriter.MaxFieldLength.UNLIMITED);

  return indexWriter;

  }

  ```




  ### 向索引添加数据


  你可以通过多种方式向刚刚创建的索引中添加数据。请注意，`IndexWriter` 不仅用于创建索引，还用于添加、删除和更新索引中的文档。在创建 `IndexWriter`
  实例时作为参数传入的分析器，决定了输入文档在被添加到索引之前如何被分析。以下代码展示了一个 `IndexWriter` 实例将文档写入其对应索引的简单示例：


  ```

  private void doIndexing(File file, IndexWriter indexWriter) throws IOException {

  //检查 indexWriter 不为空且处于打开状态

  if (indexWriter == null) {

  throw new IllegalArgumentsException("IndexWriter instance must not be null");

  }

  if (!indexWriter.isOpen()) {

  throw new IllegalArgumentsException("IndexWriter instance must be open");

  }

  Document document = parseAndCreateDocument(file);

  indexWriter.addDocument(document);

  }

  ```


  ### 整合所有组件


  以下是包含所有组件的最终类：


  ```

  public class DemoIndexing {

  private final String indexPath;

  public Indexer(String indexDirectoryPath) throws I0Exception {

  this.indexPath = indexDirectoryPath;

  }

  private Document parseAndCreateDocument(File file) throws I0Exception {

  Document document = new Document();

  //假设我们有一个解析器，可以从文件中返回不同的字段

  FancyParser fancyParser = FancyParser.getParser().parse(file);

  String        firstText   =  fancyParser.getFirst();

  String        secondText  =  fancyParser.getSecond();

  String        thirdText   =  fancyParser.getThird();

  Field firstField = new Field("first_field", firstText,

  Field.Store.YES,Field.Index.NOT_ANALYZED);

  Field secondField = new Field("second_field", secondText,

  Field.Store.YES,Field.Index.NOT_ANALYZED);

  Field thirdField = new Field("third_field", thirdText,

  Field.Store.YES,Field.Index.NOT_ANALYZED);

  document.add(firstField);

  document.add(secondField);

  document.add(thirdField);

  return document;

  }

  public IndexWriter getIndexWriter(String path) throws I0Exception {

  IndexWriter indexWriter;

  Directory indexDirectory = FSDirectory.open(new File(path));

  //创建索引器

  indexWriter = new IndexWriter(indexDirectory,

  new StandardAnalyzer(Version.LUCENE_80),true,

  IndexWriter.MaxFieldLength.UNLIMITED);

  return indexWriter;

  }

  private void doIndexing(File file, IndexWriter indexWriter) throws I0Exception {

  //检查 indexWriter 不为空且处于打开状态

  if (indexWriter == null) {

  throw new IllegalArgumentsException("IndexWriter instance must not be null");

  }

  if (!indexWriter.isOpen() {

  throw new IllegalArgumentsException("IndexWriter instance must be open");

  }

  //使用我们之前编写的方法获取文档

  Document document = parseAndCreateDocument(file);

  writer.addDocument(document);

  }

  public void index(List files) {

  IndexWriter indexWriter = getIndexWriter(indexPath);

  for (File file : files) {

  doIndexing(file, indexWriter);

  }

