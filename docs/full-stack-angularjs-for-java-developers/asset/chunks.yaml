  raw: '## Summary


    In this chapter, you created a REST client using `RestTemplate` and used it to
    perform client operations such as `GET`, `POST`, `PUT`, and `DELETE` on resources.
    You looked into the different `RestTemplate` methods and operations to consume
    REST APIs. You also implemented Basic Authentication with `RestTemplate`.


    Then you moved into testing RESTful services using the Spring Test framework.
    I introduced unit testing and integration testing. You saw different annotations
    and assert methods in the JUnit4 framework. Then you looked at a mocking framework
    and mock objects. Finally, you tested REST services using the Test framework and
    the Spring MVC Test framework.


    In the next chapter, you will manage and monitor your Spring Boot application
    in production.


    # 7. Application Monitoring Using Spring Boot Actuator


    Application monitoring ensures that an application running on a server performs
    as expected. In Chapter [2](#A436970_1_En_2_Chapter.html), you developed RESTful
    services using Spring Boot. In addition, Spring Boot supports additional features
    to monitor and manage your Spring Boot application when it is pushed to production.


    For example, say a developer just finished his application and pushed the changes
    to the repository. Moving on, the developer approaches the operations (ops) team
    and asks them to deploy this application. In return, the ops team asks the developer
    for the runbook (i.e., the operational guide), which contains instruction for
    the deployment, the actions that need to be performed when an exception occurs,
    and so on. The ops team also needs details on the configuration of applications.
    A seasoned developer will even share information about external properties and
    their locations on the server, which the ops team will use to configure external
    properties with acceptable values. So far so good.


    The final question from the ops team is, “How do you monitor this application?”
    Uh-oh, this was not mentioned in business requirement. So, the developer thinks
    about the different options, such as asking his manager for more money to develop
    a monitoring tool, which may not be possible.


    The Spring Framework is one of the most popular frameworks for building complex
    enterprise applications. These applications used to be run on many servers for
    many domains and environments such as a local build environment, a test environment,
    a QA environment, and sometimes a user acceptance testing (UAT) environment, before
    being deployed into the production environment. Each environment had different
    configurations, such as in the local environment the developer might be using
    an open source database, and in the production environment the database might
    be Oracle. Furthermore, the local environment might be using ActiveMQ for messaging,
    and production might be using an IBM messaging source. There are lots of things
    that need to be addressed for enterprise needs such as continuous builds, and
    so on. It’s not like you can just create a `.war` file and put it on the server.
    In this chapter, you will be using a local environment for deployment.


    Using HTTP endpoints, you can manage your deployed application in a production
    environment. Spring Boot has a bunch of features that let you monitor your Spring
    Boot application in production, or any environment, after you have deployed your
    application.


    In Spring Boot, you can monitor and manage your Spring Boot application in various
    ways such as HTTP, JVM, and SSH. In this chapter, you will look in the Actuator
    module from Spring Boot to monitor your application. This chapter will give you
    an overview of how DevOps uses Spring Boot. DevOps is a combination of dev (a
    developer) and ops (the operations team).


    ## Introducing Spring Boot Actuator


    [Spring Boot Actuator](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#production-ready)
    is a subproject of Spring Boot. The Actuator module in Spring Boot enables production-ready
    features to be used in your Spring Boot application. Actuator exposes various
    endpoints to monitor metrics and statistics of your running application. Using
    Actuator, you can monitor health, view metrics, collect logs, perform thread dumps,
    understand garbage collection, view environment variables, and view beans from
    `BeanFactory`. In addition, you can use it monitor your application for any production
    support and related stuff such as monitoring processes, checking health, checking
    whether a process is running, checking whether the database connection is running,
    and checking related metrics such as heap size or available space in the JVM.
    All this stuff is taken care of by Actuator.


    Spring Boot offers libraries that can expose some REST endpoints so that different
    monitoring tools can use those REST endpoints to get the data out of the REST
    endpoints. You can access all these endpoints using `<host>:port/<endpoint>`.
    For example, if you want to monitor the health of your application, you have to
    visit `http://localhost:8080/health`.


    ### Enabling the Actuator Module


    To enable the Actuator module, visit [`http://start.spring.io/`](http://start.spring.io/)
    in your browser. The Ops section on the Spring Initializr site contains a bunch
    of dependencies, such as Actuator, Actuator Docs, and Remote Shell, as shown in
    Figure [7-1](#A436970_1_En_7_Chapter.html#Fig1).


    ![A436970_1_En_7_Fig1_HTML.jpg](A436970_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    Spring Boot starter dependencies in Spring Initializr


    Let’s manually add the `spring-boot-starter-actuator` dependency in your Maven
    `pom.xml` file in your UserRegistrationSystem application, as shown in Listing
    [7-1](#A436970_1_En_7_Chapter.html#Par11).


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    Listing 7-1.

    Actuator Dependency

    ```


    Just by adding the `spring-boot-starter-actuator` dependency in your `pom.xml`
    file, the Actuator module will be enabled in your Spring Boot application and
    health, metrics, and other features can be automatically applied to your application.


    ## Actuator Endpoints


    The Actuator endpoint allows developers to monitor the running Spring Boot application,
    and it also lets developers interact with the Spring Boot application. Spring
    Boot provides many built-in endpoints such as a health endpoint that provides
    basic health information about your running Spring Boot application and that will
    be mapped to `/health`. You can also add your own endpoints.


    By default, Spring Boot Actuator is secured so that not just anyone can access
    these endpoints. You can disable these security features by setting properties
    in the `application.properties` file , as shown here:


    ```

    management.security.enabled=false

    ```


    However, since these actuator endpoints are exposing environment variables and
    metrics information, you’ll want to keep them secured.


    Let’s start the UserRegistrationSystem application and explore the most common
    endpoints that Spring Boot provides out of the box. Figure [7-2](#A436970_1_En_7_Chapter.html#Fig2)
    shows the endpoints in the STS console .


    ![A436970_1_En_7_Fig2_HTML.jpg](A436970_1_En_7_Fig2_HTML.jpg)


    Figure 7-2.


    Endpoints in console


    As shown in Figure [7-2](#A436970_1_En_7_Chapter.html#Fig2), there are different
    endpoints that come in the STS console. By default, you have `/info`, `/health`,
    `/beans`, `/dump`, `/env`, and more. All these endpoints are REST endpoints provided
    by Actuator. Let’s explore a few of these REST endpoints so you can fetch data
    in the next sections.'
  trans: '

    ## 本章小结


    在本章中，你使用 `RestTemplate` 创建了一个 REST 客户端，并利用它对资源执行了 `GET`、`POST`、`PUT` 和 `DELETE`
    等客户端操作。你了解了用于消费 REST API 的不同 `RestTemplate` 方法和操作。你还使用 `RestTemplate` 实现了基本身份验证。


    接着，你转向使用 Spring 测试框架测试 RESTful 服务。我介绍了单元测试和集成测试。你了解了 JUnit4 框架中的不同注解和断言方法。然后，你学习了模拟框架和模拟对象。最后，你使用测试框架和
    Spring MVC 测试框架测试了 REST 服务。


    在下一章中，你将学习如何在生产环境中管理和监控你的 Spring Boot 应用。


    # 7. 使用 Spring Boot Actuator 进行应用监控


    应用监控可确保运行在服务器上的应用按预期工作。在第 2 章中，你使用 Spring Boot 开发了 RESTful 服务。此外，当你的 Spring Boot
    应用部署到生产环境时，Spring Boot 还支持额外的功能来监控和管理它。


    例如，假设一位开发者刚刚完成了他的应用并将更改推送到了仓库。接着，这位开发者找到运维团队，请他们部署这个应用。作为回应，运维团队向开发者索要运行手册（即操作指南），其中包含部署说明、发生异常时需要执行的操作等。运维团队还需要了解应用的配置细节。经验丰富的开发者甚至会分享有关外部属性及其在服务器上位置的信息，运维团队将据此使用可接受的值来配置外部属性。到目前为止，一切顺利。


    运维团队最后的问题是：“你们如何监控这个应用？” 哎呀，这在业务需求中并未提及。于是，开发者开始思考各种方案，比如向经理申请更多资金来开发一个监控工具，但这可能行不通。


    Spring 框架是构建复杂企业应用最流行的框架之一。这些应用过去常常在许多服务器上运行，服务于多个领域和环境，例如本地构建环境、测试环境、QA 环境，有时还有用户验收测试环境，然后才会部署到生产环境。每个环境都有不同的配置，例如在本地环境中，开发者可能使用开源数据库，而在生产环境中，数据库可能是
    Oracle。此外，本地环境可能使用 ActiveMQ 进行消息传递，而生产环境可能使用 IBM 消息源。企业需求（如持续构建等）需要处理很多问题。这不像你只需创建一个
    `.war` 文件然后放到服务器上那么简单。在本章中，你将使用本地环境进行部署。


    通过使用 HTTP 端点，你可以在生产环境中管理已部署的应用。Spring Boot 拥有一系列功能，让你在部署应用后，能够在生产环境或任何环境中监控你的
    Spring Boot 应用。


    在 Spring Boot 中，你可以通过多种方式监控和管理你的 Spring Boot 应用，例如 HTTP、JVM 和 SSH。在本章中，你将了解如何使用
    Spring Boot 的 Actuator 模块来监控你的应用。本章将概述 DevOps 如何使用 Spring Boot。DevOps 是开发者和运维团队的结合。


    ## 介绍 Spring Boot Actuator


    [Spring Boot Actuator](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#production-ready)
    是 Spring Boot 的一个子项目。Spring Boot 中的 Actuator 模块使得在你的 Spring Boot 应用中使用生产就绪功能成为可能。Actuator
    暴露了各种端点，用于监控你正在运行的应用的指标和统计数据。使用 Actuator，你可以监控健康状态、查看指标、收集日志、执行线程转储、了解垃圾回收、查看环境变量，以及查看来自
    `BeanFactory` 的 Bean。此外，你可以使用它来监控你的应用，以进行任何生产支持和相关事务，例如监控进程、检查健康状态、检查进程是否在运行、检查数据库连接是否正常，以及检查相关指标，如
    JVM 中的堆大小或可用空间。所有这些都由 Actuator 处理。


    Spring Boot 提供了可以暴露一些 REST 端点的库，以便不同的监控工具可以使用这些 REST 端点从 REST 端点获取数据。你可以使用 `<host>:port/<endpoint>`
    访问所有这些端点。例如，如果你想监控应用的运行状况，你需要访问 `http://localhost:8080/health`。


    ### 启用 Actuator 模块


    要启用 Actuator 模块，请在浏览器中访问 [`http://start.spring.io/`](http://start.spring.io/)。Spring
    Initializr 站点上的“运维”部分包含一系列依赖项，例如 Actuator、Actuator Docs 和 Remote Shell，如图 7-1
    所示。


    ![A436970_1_En_7_Fig1_HTML.jpg](img/A436970_1_En_7_Fig1_HTML.jpg)


    图 7-1.


    Spring Initializr 中的 Spring Boot Starter 依赖项


    让我们在你的 UserRegistrationSystem 应用的 Maven `pom.xml` 文件中手动添加 `spring-boot-starter-actuator`
    依赖项，如清单 7-1 所示。


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    清单 7-1.

    Actuator 依赖项

    ```


    只需在你的 `pom.xml` 文件中添加 `spring-boot-starter-actuator` 依赖项，Actuator 模块就会在你的 Spring
    Boot 应用中启用，并且健康检查、指标和其他功能将自动应用于你的应用。


    ## Actuator 端点


    Actuator 端点允许开发者监控正在运行的 Spring Boot 应用，并且还允许开发者与 Spring Boot 应用进行交互。Spring Boot
    提供了许多内置端点，例如一个健康端点，它提供有关你正在运行的 Spring Boot 应用的基本健康信息，并且该端点将映射到 `/health`。你也可以添加自己的端点。


    默认情况下，Spring Boot Actuator 是安全的，因此并非任何人都可以访问这些端点。你可以通过在 `application.properties`
    文件中设置属性来禁用这些安全功能，如下所示：


    ```

    management.security.enabled=false

    ```


    然而，由于这些 Actuator 端点会暴露环境变量和指标信息，你最好还是让它们保持安全状态。


    让我们启动 UserRegistrationSystem 应用，并探索 Spring Boot 开箱即用的最常见端点。图 7-2 显示了 STS 控制台中的端点。


    ![A436970_1_En_7_Fig2_HTML.jpg](img/A436970_1_En_7_Fig2_HTML.jpg)


    图 7-2.


    控制台中的端点


    如图 7-2 所示，STS 控制台中出现了不同的端点。默认情况下，你有 `/info`、`/health`、`/beans`、`/dump`、`/env`
    等端点。所有这些端点都是由 Actuator 提供的 REST 端点。让我们探索其中几个 REST 端点，以便在接下来的章节中获取数据。

