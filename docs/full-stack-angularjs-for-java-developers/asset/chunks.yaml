    Controller Advice Class to handleValidationError

    ```


    如清单 2-21 所示，`RestValidationHandler` 使用了来自 `org.springframework.web.bind.annotation`
    包的 `@ControllerAdvice` 注解。该类定义了一个名为 `handleValidationError` 的全局异常处理方法，该方法带有 `@ExceptionHandler(MethodArgumentNotValidException.class)`
    注解，用于拦截由 UserRegistrationSystem 应用程序中任何控制器类抛出的 `MethodArgumentNotValidException`
    类型的异常。


    `handlerValidationError` 方法的实现首先创建了一个 `FieldValidationErrorDetails` 实例，并通过调用不同字段的
    setter 方法为其填充适当的信息。然后，你使用传入的异常参数 `mNotValidException` 来获取字段错误列表，并遍历该列表以获取错误信息。接着，你为每个字段错误创建一个
    `FieldValidationError` 实例，并用代码和错误信息填充它。


    有了这个实现，让我们重启 UserRegistrationSystem 应用程序，并从 Postman 提交一个缺少地址的用户。这个缺少地址的 `POST`
    数据请求将导致返回状态码 400 以及自定义的错误响应，如图 2-11 所示。


