    of the repository interface. Spring Data JPA creates an implementation at runtime
    when you run the application. Now, let’s create the REST controller class and
    implement the REST endpoints.'
  trans: '

    ### 嵌入式数据库：H2


    H2 是一个用 Java 编写的开源轻量级关系数据库管理系统。H2 数据库可以轻松嵌入到任何基于 Java 的应用程序中，并且可以方便地配置为内存数据库运行。H2
    数据库不能用于生产环境开发，因为数据不会持久化到磁盘上。因此，该数据库主要用于开发和测试。H2 数据库支持 SQL 和 JDBC API，并具有强大的安全特性。


    在 UserRegistrationSystem 应用程序中，你将使用 H2 来持久化数据。要在 Spring Boot 应用程序中使用 H2，你需要在 `pom.xml`
    文件中包含一个构建依赖项。


    当将 H2 用作内存数据库时，你无需提供任何数据库连接 URL 或用户名和密码。在部署和应用程序关闭期间，数据库的启动和停止将由 Spring Boot 负责处理。清单
    2-2 显示了 UserRegistrationSystem 的 `pom.xml` 文件中 H2 的依赖信息。


    ```

    com.h2database

    h2

    runtime


    清单 2-2.

    pom.xml 中的 H2 依赖项

    ```


    ### 领域实现：用户


    图 2-2 展示了表示 UserRegistrationSystem 应用程序中 `Users` 领域对象的 UML 类图。


    ![A436970_1_En_2_Fig2_HTML.jpg](img/A436970_1_En_2_Fig2_HTML.jpg)


    图 2-2.


    用户领域对象


    在 UserRegistrationSystem 项目中，你将在 `src/main/java` 文件夹下的 `com.apress.ravi.dto` 子包内创建一个名为
    `UserDTO` 的数据传输对象（DTO）类，该类对应于 `Users` 领域的 `Object`。


    DTO 对象仅包含数据和访问修饰符，不含逻辑；它用于在应用程序的不同层之间传输数据，以实现关注点分离。你可以使用 Java 持久化 API（JPA）注解来标注此类，这使得
    `Users` 类能够使用 JPA 技术轻松地进行持久化和检索。对 JPA 的正式概述超出了本书的范围。清单 2-3 给出了 `UserDTO` 实体类的实现。


    ```

    package com.apress.ravi.dto;

    import javax.persistence.Column;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.Id;

    @Entity

    @Table(name="Users")

    public class UserDTO {

    @Id

    @GeneratedValue

    @Column(name = "USER_ID")

    private Long id;

    @Column(name = "NAME")

    private String name;

    @Column(name = "ADDRESS")

    private String address;

    @Column(name = "EMAIL")

    private String email;

    // Getter 和 Setter 方法

    }

    清单 2-3.

    UsersDTO 实体类

    ```


    这里，`UserDTO` 类有四个属性，分别名为 `id`、`name`、`address` 和 `email`。`UserDTO` 使用了 `@Entity`
    注解，使其成为一个 JPA 实体。该实体类使用了 `@Table` 注解来定义表名为 `Users`。


    `UserDTO` 的 `id` 属性使用了 `@Id` 注解，使其成为主键。`id` 属性使用了 `@GeneratedValue` 注解，表示 `id`
    值应自动生成。`id` 属性还使用了 `@Column` 注解，以指定字段或属性将要映射到的列的详细信息。其他三个属性（`name`、`address` 和
    `email`）都使用了 `@Column` 注解。我在此省略了 getter 和 setter 方法，但在实际代码中，每个属性都应有对应的 getter
    和 setter。


    下一步是提供仓库或 DAO 实现。


    ### 仓库实现：UserJpaRepository


    仓库或 DAO 抽象并封装了对数据源的所有访问。仓库包含一个管理数据源连接的接口，并提供一组用于检索、操作、删除和持久化数据的方法。最佳实践是为每个领域对象配备一个仓库。


    为了消除编写任何仓库实现的需要，Spring Data 项目提供了 `JpaRepository` 接口，该接口在运行时自动生成其实现。清单 2-4 显示了支持
    `JpaRepository` 所需在 Maven `pom.xml` 中的依赖信息。


    ```

    org.springframework.boot

    spring-boot-starter-data-jpa


    清单 2-4.

    pom.xml 中的 JPA 依赖项

    ```


    你将通过扩展 Spring Data JPA 子项目的 `org.springframework.data.jpa.repository.JpaRepository`
    接口来创建一个仓库接口，以将 `UserDTO` 领域对象持久化到关系数据库中。


    你首先在 UserRegistrationSystem 应用程序的 `src/main/java` 文件夹下创建 `com.apress.ravi.repository`
    包，从而开始仓库的实现。同时，你可以创建一个 `UserJpaRepository` 接口，如清单 2-5 所示。


    ```

    package com.apress.ravi.repository;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.stereotype.Repository;

    import com.apress.ravi.dto.UsersDTO;

    @Repository

    public interface UserJpaRepository extends JpaRepository {

    UsersDTO findByName(String name);

    }

    清单 2-5.

    com.apress.ravi.repository.UserJpaRepository.java 接口

    ```


    如清单 2-5 所示，`UserJpaRepository` 接口扩展了 Spring Data 的 `JpaRepository`，后者将其可操作的领域对象类型和
    `UserDTO` 领域对象标识符字段的类型（即 `UserDTO` 和 `Long`）作为其泛型参数 `T` 和 `ID`。`UserJpaRepository`
    继承了 `JpaRepository` 所有用于处理 `UserDTO` 持久化的 CRUD 方法。


    Spring Data JPA 允许开发者仅通过声明方法签名来定义其他查询方法。如前面的代码所示，你定义了一个名为 `findByName` 的自定义查找方法，该方法基本上创建了一个形式为
    `select u from UserDTO u` 的 JPA 查询，其中 `u.name` 等于 `:name`。


    Spring Data JPA 的好处在于开发者无需编写仓库接口的实现。当你运行应用程序时，Spring Data JPA 会在运行时创建实现。现在，让我们创建
    REST 控制器类并实现 REST 端点。

