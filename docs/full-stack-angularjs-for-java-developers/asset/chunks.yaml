    JavaScript 库可供使用。


    AngularJS 是一个开源 JavaScript 框架，为创建 Web 应用程序提供了结构化方法。它是一个构建在轻量级 jQuery 之上的 JavaScript
    库。它强制使用结构清晰、整洁的模型-视图-控制器（MVC）框架。由于这种清晰且结构化的方法，AngularJS 是 Spring Boot 客户端库的完美解决方案。


    在本章中，我将介绍 MVC 和 AngularJS 框架及其主要组件，以便你能够为使用 Spring Boot 开发的 UserRegistrationSystem
    应用程序开发前端。


    我将从 AngularJS 及其生命周期介绍开始。然后你将了解 AngularJS 组件以及如何在应用程序中实现它们。此外，你将消费在第 2 章中开发的 REST
    API，以开发你的单页应用程序（SPA）。在本章中，你将学习以下内容：


    *   如何使用 AngularJS 作为前端框架

    *   如何开发单页应用程序来消费 REST API


    在本章中，你将学习如何将 AngularJS 框架集成到你的 Spring Boot UserRegistrationSystem 应用程序中，以开发单页应用程序。如果你想深入了解
    AngularJS，请参考[`https://angularjs.org/`](https://angularjs.org/)。


    ## 介绍 AngularJS 作为前端框架


    AngularJS 是一个用 JavaScript 编写的 Web 应用程序开发库，由 Google 维护。它是一个开源 JavaScript 框架，解决了单页应用程序（SPA）的挑战。AngularJS
    Web 应用程序遵循 MVC 设计模式，从而开发出可扩展、可维护、可测试且标准化的 Web 应用程序。AngularJS 的数据绑定和依赖注入使其成为任何服务器技术的理想合作伙伴，因为它消除了许多否则你必须编写的代码，并且这一切都在浏览器中完成。

