    The `H2` database supports SQL and the JDBC API and has strong security features.


    In the `UserRegistrationSystem` application, you will be using `H2` to persist
    your data. To use `H2` in a Spring Boot application, you need to include a build
    dependency in the `pom.xml` file.


    While using `H2` as an in-memory database, you do not need to provide any database
    connection URLs or username and password. The starting and stopping of the database
    during deployment and application shutdown will be taken care by Spring Boot.
    Listing [2-2](#A436970_1_En_2_Chapter.html#Par33) shows the dependency information
    for `H2` in `UserRegistrationSystem`’s `pom.xml`.


    ```

    com.h2database

    h2

