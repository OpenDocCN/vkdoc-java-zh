    ## Defining New Endpoints


    Even though Spring Boot Actuator provides endpoints, you can define a new endpoint
    other than the existing Actuator endpoints. Let’s create a new endpoint by creating
    the `MyCustomEndpoint` class and implementing the `Endpoint<List<String>>` interface,
    as shown in Listing [7-3](#A436970_1_En_7_Chapter.html#Par51).


    ```java

    import java.util.ArrayList;

    import java.util.List;

    import org.springframework.boot.actuate.endpoint.Endpoint;

    import org.springframework.stereotype.Component;

    @Component

    public class MyCustomEndpoint implements Endpoint<List<String>> {

    @Override

    public String getId() {

    return "myCustomEndpoint";

    }

    @Override

    public List<String> invoke() {

    List<String> customMessages = new ArrayList<>();

    customMessages.add("This is custom message 1");

    customMessages.add("This is custom message 2");

    return customMessages;

    }

    @Override

    public boolean isEnabled() {

    return true;

    }

    @Override

    public boolean isSensitive() {

    return true;

    }

    }

    ```


    *Listing 7-3. MyCustomEndpoint Class*


    Let’s run the Spring Boot application. The console log will contain the `/myCustomEndpoint`
    endpoint, as shown in Figure [7-12](#A436970_1_En_7_Chapter.html#Fig12).


    ![A436970_1_En_7_Fig12_HTML.jpg](A436970_1_En_7_Fig12_HTML.jpg)


    *Figure 7-12. New endpoints in the console*


    You can access this new endpoint using its `id` value at `/myCustomEndpoint`.
    The output will display in the browser, as shown in Figure [7-13](#A436970_1_En_7_Chapter.html#Fig13).


    ![A436970_1_En_7_Fig13_HTML.jpg](A436970_1_En_7_Fig13_HTML.jpg)


    *Figure 7-13. /myCustomEndpoint endpoint*


    ## Management Over HTTP


    In this section, you will manage the Actuator endpoint over HTTP.


    ### Customizing the Server Port


    You can customize the server port to expose the Actuator endpoint over a nonstandard
    port for security purposes. You can use the `management.port` property to configure
    this.


    You can also change the address using the `management.address` property to restrict
    where the endpoint can be accessed from over the network.


    Let’s change the following properties in the `application.properties` file:


    ```properties

    management.port=8081

    management.address=127.0.0.1

    ```


    When you restart the Spring Boot application and access the `/health` endpoint
    using the customized address and port number, the output will return, as shown
    in Figure [7-14](#A436970_1_En_7_Chapter.html#Fig14).


    ![A436970_1_En_7_Fig14_HTML.jpg](A436970_1_En_7_Fig14_HTML.jpg)


    *Figure 7-14. Customized port number and address*


    ### Accessing a Sensitive Endpoint


    When the Spring Boot application is secured using Spring Security, you can secure
    these endpoints by defining the default security properties, such as the username,
    password, and role, in the `application.properties` file, as shown in the following
    code:


    ```properties

    management.security.enabled=true

    security.user.name=admin

    security.user.password=password

    security.user.role=ADMIN

    ```


    When you try to access the secured endpoint such as `/info`, which is sensitive
    by default, a pop-up will prompt for the credentials, as shown in Figure [7-15](#A436970_1_En_7_Chapter.html#Fig15).


    ![A436970_1_En_7_Fig15_HTML.jpg](A436970_1_En_7_Fig15_HTML.jpg)


    *Figure 7-15. Accessing a secured endpoint*


    ## Summary


    In this chapter, you learned about Spring Boot Actuator and how to enable Actuator
    by adding the dependency in the Maven `pom.xml` file. Then you saw a few Actuator
    endpoints. Later, you customized these existing Spring Boot Actuator endpoints
    and defined new endpoints. Finally, you customized the server port.


    ## Appendix A: Tools for Accessing REST APIs


    When you have to work in an agile development environment, you need to be able
    to quickly test your API. In this appendix, you will learn about open source REST
    API testing.


    GUI testing for REST API services is slow and a poor choice for developers who
    want to get quick results about their code from the latest build. API testing
    is considered a better choice for developers because it tends to be faster and
    is more reliable than GUI testing.


    ## API Testing


    Application programming interface (API) testing involves bypassing the user interaction
    using a GUI/web page and communicating directly to the services within an application
    by making API calls.


    API testing lets developers test “headless” technologies such as RESTful web services.
    In headless testing, the GUI (or head) is bypassed; requests are sent directly
    to an application’s services, and the services receive responses to validate the
    results.


    ## API Testing Tools


    You will need to find a tool to do REST APIs testing. There are a number of API
    testing tools available on the Internet; for example, Selenium is a browser-based
    testing tool. In this book, you will be using Postman.


    Let’s explore the Postman API testing tools.'
  raw: '### Custom Health Indicator


    You can also define your own custom health indicator by implementing the `HealthIndicator`
    interface and overriding the unimplemented method. This custom health indicator
    collects any type of custom health data specific to the application and provides
    it to the `/health` endpoint. Listing [7-2](#A436970_1_En_7_Chapter.html#Par47)
    shows the `CustomHealthIndicator` class that implements the `HealthIndicator`
    interface.


    ```

    import org.springframework.boot.actuate.health.Health;

    import org.springframework.boot.actuate.health.HealthIndicator;

    import org.springframework.stereotype.Component;

    @Component

    public class CustomHealthIndicator implements HealthIndicator {

    @Override

    public Health health() {

    int errorCode = check();

    if (errorCode == 0) {

    return Health

    .up()

    .withDetail("Status", "UP")

    .withDetail("Error Code", errorCode)

    .withDetail("Description",

    "Your Custom Health indicator point is UP")

    .build();

    }

    return Health.up().build();

    }

    public int check() {

    return 0;

    }

    }

    Listing 7-2.

    CustomHealthIndicator Class

    ```


    The following output will appear in the browser, as shown in Figure [7-11](#A436970_1_En_7_Chapter.html#Fig11).


    ![A436970_1_En_7_Fig11_HTML.jpg](A436970_1_En_7_Fig11_HTML.jpg)


    Figure 7-11.


    /health endpoint


    ```

    {

    "status":"UP",

    "custom":{

    "status":"UP",

    "Status":"UP",

    "Error Code":0,

    "Description":"Your Custom Health indicator point is UP"

    },

    "diskSpace":{

    "status":"UP",

    "total":142753132544,

    "free":97823797248,

    "threshold":10485760

    },

    "db":{

    "status":"UP",

    "database":"H2",

    "hello":1

    }

    }

    ```


    ## Defining New Endpoints


    Even though Spring Boot Actuator provides endpoints, you can define a new endpoint
    other than the existing Actuator endpoints. Let’s create a new endpoint by creating
    the `MyCustomEndpoint` class and implementing the `Endpoint<List<String>>` interface,
    as shown in Listing [7-3](#A436970_1_En_7_Chapter.html#Par51).


    ```

    import java.util.ArrayList;

    import java.util.List;

    import org.springframework.boot.actuate.endpoint.Endpoint;

    import org.springframework.stereotype.Component;

    @Component

    public class MyCustomEndpoint implements Endpoint> {

    @Override

    public String getId() {

    return "myCustomEndpoint";

    }

    @Override

    public List invoke() {

    List customMessages = new ArrayList();

    customMessages.add("This is custom message 1");

    customMessages.add("This is custom message 2");

    return customMessages;

    }

    @Override

    public boolean isEnabled() {

    return true;

    }

    @Override

    public boolean isSensitive() {

    return true;

    }

    }

    Listing 7-3.

    MyCustomEndpoint Class

    ```


    Let’s run the Spring Boot application. The console log will contain the `/myCustomEndpoint`
    endpoint, as shown in Figure [7-12](#A436970_1_En_7_Chapter.html#Fig12).


    ![A436970_1_En_7_Fig12_HTML.jpg](A436970_1_En_7_Fig12_HTML.jpg)


    Figure 7-12.


    New endpoints in the console


    You can access this new endpoint using its `id` value at `/myCustomEndpoint`.
    The output will display in the browser, as shown in Figure [7-13](#A436970_1_En_7_Chapter.html#Fig13).


    ![A436970_1_En_7_Fig13_HTML.jpg](A436970_1_En_7_Fig13_HTML.jpg)


    Figure 7-13.


    /myCustomEndpoint endpoint


    ## Management Over HTTP


    In this section, you will manage the Actuator endpoint over HTTP.


    ### Customizing the Server Port


    You can customize the server port to expose the Actuator endpoint over a nonstandard
    port for security purposes. You can use the `management.port` property to configure
    this.


    You can also change the address using the `management.address` property to restrict
    where the endpoint can be accessed from over the network.


    Let’s change the following properties in the `application.properties` file:


    ```

    management.port=8081

    management.address=127.0.0.1

    ```


    When you restart the Spring Boot application and access the `/health` endpoint
    using the customized address and port number, the output will return, as shown
    in Figure [7-14](#A436970_1_En_7_Chapter.html#Fig14).


    ![A436970_1_En_7_Fig14_HTML.jpg](A436970_1_En_7_Fig14_HTML.jpg)


    Figure 7-14.


    Customized port number and address


    ### Accessing a Sensitive Endpoint


    When the Spring Boot application is secured using Spring Security, you can secure
    these endpoints by defining the default security properties, such as the username,
    password, and role, in the `application.properties` file, as shown in the following
    code:


    ```

    management.security.enabled=true

    security.user.name=admin

    security.user.password=password

    security.user.role=ADMIN

    ```


    When you try to access the secured endpoint such as `/info`, which is sensitive
    by default, a pop-up will prompt for the credentials, as shown in Figure [7-15](#A436970_1_En_7_Chapter.html#Fig15).


    ![A436970_1_En_7_Fig15_HTML.jpg](A436970_1_En_7_Fig15_HTML.jpg)


    Figure 7-15.


    Accessing a secured endpoint


    ## Summary


    In this chapter, you learned about Spring Boot Actuator and how to enable Actuator
    by adding the dependency in the Maven `pom.xml` file. Then you saw a few Actuator
    endpoints. Later, you customized these existing Spring Boot Actuator endpoints
    and defined new endpoints. Finally, you customized the server port.


    ## Appendix A: Tools for Accessing REST APIs


    When you have to work in an agile development environment, you need to be able
    to quickly test your API. In this appendix, you will learn about open source REST
    API testing.


    GUI testing for REST API services is slow and a poor choice for developers who
    want to get quick results about their code from the latest build. API testing
    is considered a better choice for developers because it tends to be faster and
    is more reliable than GUI testing.


    ## API Testing


    Application programming interface (API) testing involves bypassing the user interaction
    using a GUI/web page and communicating directly to the services within an application
    by making API calls.


    API testing lets developers test “headless” technologies such as RESTful web services.
    In headless testing, the GUI (or head) is bypassed; requests are sent directly
    to an application’s services, and the services receive responses to validate the
    results.


    ## API Testing Tools


    You will need to find a tool to do REST APIs testing. There are a number of API
    testing tools available on the Internet; for example, Selenium is a browser-based
    testing tool. In this book, you will be using Postman.


    Let’s explore the Postman API testing tools.'
