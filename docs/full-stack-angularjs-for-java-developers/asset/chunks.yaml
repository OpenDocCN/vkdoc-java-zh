    with the `@ExceptionHandler(MethodArgumentNotValidException.class)` annotation
    to intercept an exception of type `MethodArgumentNotValidException` thrown by
    any controller class from the `UserRegistrationSystem` application.


    The implementation of the `handlerValidationError` method begins by creating an
    instance of `FieldValidationErrorDetails` and populating it with appropriate information
    by calling the setter method for different fields. Then you use the passed-in
    exception parameter `mNotValidException` to obtain a field errors list and loop
