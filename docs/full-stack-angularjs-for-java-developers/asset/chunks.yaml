- fmt: "### Build a RESTful API\n\nBefore you start implementing the RESTful API,\
    \ you need to understand some basic Spring elements that will be used to implement\
    \ the RESTful API in Spring.\n\n- `@RestController`: This is a stereotype annotation\
    \ that itself is annotated with [`@Controller`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/stereotype/Controller.html#annotation%20in%20org.springframework.stereotype)\
    \ and [`@ResponseBody`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/bind/annotation/ResponseBody.html#annotation%20in%20org.springframework.web.bind.annotation),\
    \ which eliminates the need of annotating each method with `@ResponseBody`. This\
    \ annotation is used to define an API endpoint. This annotation lets Spring render\
    \ the result back to the caller. To build RESTful web services in Spring, create\
    \ a controller class using the `@RestController` annotation to handle the HTTP\
    \ request.\n\n    ```\n    @Target(value=TYPE)\n    @Retention(value=RUNTIME)\n\
    \    @Documented\n    @Controller\n    @ResponseBody\n    public @interface RestController\n\
    \    ```\n\n- `@RequestMapping`: This annotation is used to provide routing information.\
    \ The HTTP request in Spring is mapped to the corresponding handler method. This\
    \ annotation can be applied to the class level to map the HTTP request to the\
    \ controller class or can be applied to the method level to map the HTTP request\
    \ to the controller handler method.\n\n    ```\n    @Target(value={METHOD,TYPE})\n\
    \    @Retention(value=RUNTIME)\n    @Documented\n    public @interface RequestMapping\n\
    \    ```\n\n- `ResponseEntity`: This class extends `HttpEntity` and is used in\
    \ the controller method to add the HTTP status to the response. It can contain\
    \ HTTP status codes, headers, and the body.\n\n    ```\n    public class ResponseEntity\n\
    \    extends HttpEntity\n    ```\n\n- `@RequestBody`: This annotation is used\
    \ to bind the method parameter to the body of the incoming HTTP request. Spring\
    \ will use an [`HttpMessageConverter`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/http/converter/HttpMessageConverter.html#interface%20in%20org.springframework.http.converter)\
    \ to convert the body of the web request into a domain object depending on the\
    \ content type of the request. The `@valid` annotation can be applied to perform\
    \ automatic validation, which is optional.\n\n    ```\n    @Target(value=PARAMETER)\n\
    \    @Retention(value=RUNTIME)\n    @Documented\n    public @interface RequestBody\n\
    \    ```\n\n- `@ResponseBody`: This annotation is used to bind the return value\
    \ from the annotated method to the outgoing HTTP response body. Spring will use\
    \ an `HttpMessageConverter` to convert the return value to the HTTP response body\
    \ (typically to return data formats such as JSON or XML), depending on the content\
    \ type of the request HTTP header.\n\n    ```\n    @Target(value={TYPE,METHOD})\n\
    \    @Retention(value=RUNTIME)\n    @Documented\n    public @interface ResponseBody\n\
    \    ```\n\n- `@PathVariable`: This annotation is used to bind a method parameter\
    \ to a URI template variable (the one in `{}`).\n\n    ```\n    @Target(value=PARAMETER)\n\
    \    @Retention(value=RUNTIME)\n    @Documented\n    public @interface PathVariable\n\
    \    ```\n\n- `MediaType`: This is a subclass of `MimeType`. While using the `@RequestMapping`\
    \ annotation, you can also specify the `MediaType` to be produced or consumed\
    \ by the controller method.\n\n    ```\n    public class MediaType\n    extends\
    \ MimeType\n    implements Serializable\n    ```\n\n### Create a RESTful Controller:\
    \ `UserRegistrationRestController`\n\nYou will be creating a Spring MVC controller\
    \ and implementing REST API endpoints. Let’s create the `UserRegistrationRestController`\
    \ class within the `com.apress.ravi.Rest` package under the `src/main/java` folder.\
    \ This controller class provides all the necessary endpoints to retrieve and manipulate\
    \ users. Listing [2-6](#A436970_1_En_2_Chapter.html#Par66) shows the necessary\
    \ code changes for the `UserRegistrationRestController` class.\n\n```\npackage\
    \ com.apress.ravi.Rest;\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
    import org.springframework.web.bind.annotation.RestController;\nimport com.apress.ravi.repository.UserJpaRepository;\n\
    @RestController\n@RequestMapping(\"/api/user\")\npublic class UserRegistrationRestController\
    \ {\npublic static final Logger logger =\nLoggerFactory.getLogger(UserRegistrationRestController.class);\n\
    private UserJpaRepository userJpaRepository;\n@Autowired\npublic void setUserJpaRepository(UserJpaRepository\
    \ userJpaRepository) {\nthis.userJpaRepository = userJpaRepository;\n}\n}\nListing\
    \ 2-6.\nUserRegistrationRestController Class\n```\n\nIn Listing [2-6](#A436970_1_En_2_Chapter.html#Par66),\
    \ you annotated the `UserRegistrationRestController` class with the `@RestController`\
    \ annotation and defined a new `@RequestMapping` to map the URI `/api/user` to\
    \ the entire class, which means the HTTP request received on the `/api/user` URI\
    \ is attended by the `UserRegistrationRestController` class. You have used the\
    \ `@Autowired` annotation to `autowireUserJpaRepository` to the RESTful controller.\n\
    \nLet’s define different endpoints in the controller class to access and manipulate\
    \ `UserDTO`. You will be using the new annotations `@GetMapping`, `@PostMapping`,\
    \ `@PutMapping`, and `@DeleteMapping` instead of the standard `@RequestMapping`,\
    \ which have been available since Spring MVC 4.3 and are a standard way of defining\
    \ REST endpoints. These new annotations act as a wrapper to `@RequestMapping`,\
    \ simplifying mappings for common HTTP methods.\n\n### `@GetMapping`: Retrieve\
    \ All Users\n\nThis is a composed annotation that is a shortcut for `@RequestMapping(value=\"\
    /\", method = RequestMethod.GET)`. The `GET` request on the `/api/user/` endpoint\
    \ returns the list of users available in the UserRegistrationSystem application.\
    \ Listing [2-7](#A436970_1_En_2_Chapter.html#Par70) shows the necessary code for\
    \ implementing this functionality.\n\n```\n@GetMapping(\"/\")\npublic ResponseEntity>\
    \ listAllUsers() {\nList users = userJpaRepository.findAll();\nreturn new ResponseEntity>(users,\
    \ HttpStatus.OK);\n}\nListing 2-7.\nGET Verb Implementation to Retrieve All Users\n\
    ```\n\nThe `listAllUsers` method returns `ResponseEntity` containing the HTTP\
    \ response. This method reads all of the users using `UserJpaRepository`. You\
    \ then created an instance of `ResponseEntity` by calling its constructor, which\
    \ takes two arguments: `UserDTO` is data that became part of the response body,\
    \ and the `HttpStatus.OK` status value is data that became the response status\
    \ code.\n\nLet’s test the first endpoint by running the UserRegistrationSystem\
    \ application as a Spring Boot application from STS and launching the Postman\
    \ app. Enter the URL `http://localhost:8080/api/user/` and hit Send, as shown\
    \ in Figure [2-3](#A436970_1_En_2_Chapter.html#Fig3).\n\n![A436970_1_En_2_Fig3_HTML.jpg](A436970_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3.\n\nGET verb implementation to retrieve all users\n\nBecause there\
    \ are no users created yet, this results in an empty collection. So, the next\
    \ task is to add a user to UserRegistrationSystem by implementing the `POST` verb\
    \ functionality."
