    ### Domain Implementation: Users


    Figure [2-2](#A436970_1_En_2_Chapter.html#Fig2) shows the UML class diagram representing
    the `Users` domain object in the `UserRegistrationSystem` application.


    ![A436970_1_En_2_Fig2_HTML.jpg](A436970_1_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    Users domain object


    In the `UserRegistrationSystem` project, you will create a data transfer object
    (DTO) class called `UserDTO` corresponding to the `Users` domain’s `Object` inside
    a subpackage called `com.apress.ravi.dto` under the `src/main/java` folder.


    The DTO object contains just data and access modifiers and no logic; it is used
    to transfer data between different layers of the application when there is a separation
    of concerns. You can annotate this class with Java Persistence API (JPA) annotations,
    which allows the `Users` class to be easily persisted and retrieved using the
    JPA technology. A formal overview of JPA is beyond the scope of this book. Listing
    [2-3](#A436970_1_En_2_Chapter.html#Par37) gives the implementation of the `UserDTO`
    entity class.


    ```

    package com.apress.ravi.dto;

    import javax.persistence.Column;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.Id;

    @Entity

    @Table(name="Users")

    public class UserDTO {

    @Id

    @GeneratedValue

    @Column(name = "USER_ID")

    private Long id;

    @Column(name = "NAME")

    private String name;

    @Column(name = "ADDRESS")

    private String address;

    @Column(name = "EMAIL")

    private String email;

    // Getters and Setters methods

    }

    Listing 2-3.

    UsersDTO Entity Class

    ```


    Here the `UserDTO` class has four attributes, named `id`, `name`, `address`, and
    `email`. `UserDTO` is annotated with the `@Entity` annotation to make it a JPA
    entity. This entity class is annotated with the `@Table` annotation to define
    the table name as `Users`.


    The `UserDTO`’s `id` property has been annotated with the `@Id` annotation to
    make it the primary key. The `id` attribute has been annotated with the `@GeneratedValue`
    annotation to indicate that the `id` value should be generated automatically.
    The `id` attribute also has been annotated with the `@Column` annotation to specify
    the details of the column to which a field or property will be mapped. The other
    three properties (`name`, `address`, and `email`) are annotated with the `@Column`
    annotation. I have omitted the getter and setter methods here, but in the actual
    code there should be a getter and setter for each attribute.


    The next step is to provide the repository or DAO implementation.


    ### Repository Implementation : UserJpaRepository


    Repositories or DAOs abstract and encapsulate all access to the data source. The
    repository includes an interface that manages the connection with the data source
    and provides a set of methods for retrieving, manipulating, deleting, and persisting
    data. It is good practice to have one repository per domain object.


    With the goal of eliminating the need to write any repository implementations,
    the Spring Data project provided the `JpaRepository` interface that automatically
    generates its implementation at runtime. Listing [2-4](#A436970_1_En_2_Chapter.html#Par43)
    shows the dependency information that needs to be in the Maven `pom.xml` to support
    `JpaRepository`.


    ```

    org.springframework.boot

    spring-boot-starter-data-jpa


    Listing 2-4.

    JPA Dependency in pom.xml

    ```


    You will be creating a repository interface by extending the Spring Data JPA subproject’s
    `org.springframework.data.jpa.repository.JpaRepository` interface to persist the
    `UserDTO` domain object into a relational database.


    You begin the repository implementation by creating the `com.apress.ravi.repository`
    package under the `src/main/java` folder inside the `UserRegistrationSystem` application.
    Also, you can create a `UserJpaRepository` interface, as shown in Listing [2-5](#A436970_1_En_2_Chapter.html#Par46).


    ```

    package com.apress.ravi.repository;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.stereotype.Repository;

    import com.apress.ravi.dto.UsersDTO;

    @Repository

    public interface UserJpaRepository extends JpaRepository {

    UsersDTO findByName(String name);

    }

    Listing 2-5.

    com.apress.ravi.repository.UserJpaRepository.java Interface

    ```


    As shown in Listing [2-5](#A436970_1_En_2_Chapter.html#Par46), the `UserJpaRepository`
    interface extends Spring Data’s `JpaRepository`, which takes the type of domain
    object that it can manipulate and the type of `UserDTO` domain object’s identifier
    field, `UserDTO` and `Long`, as its generic parameters, `T` and `ID`. `UserJpaRepository`
    inherits all of `JpaRepository`’s CRUD methods for working with `UserDTO` persistence.


    Spring Data JPA allows developers to define other query methods just by declaring
    their method signature. As shown in the previous code, you define a custom finder
    method called `findByName`, which basically creates a JPA query of the form `select
    u from UserDTO u`, where `u.name` equals `:name`.


    The benefit of Spring Data JPA is that developers do not have to write implementations
    of the repository interface. Spring Data JPA creates an implementation at runtime
    when you run the application. Now, let’s create the REST controller class and
    implement the REST endpoints.'
