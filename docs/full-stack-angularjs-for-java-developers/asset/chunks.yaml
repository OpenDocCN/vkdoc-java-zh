  trans: "\n### 构建 RESTful API\n\n在开始实现 RESTful API 之前，你需要了解一些基本的 Spring 元素，这些元素将用于在\
    \ Spring 中实现 RESTful API。\n\n*   `@RestController`：这是一个构造型注解，它本身被 [`@Controller`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/stereotype/Controller.html#annotation%20in%20org.springframework.stereotype)\
    \ 和 [`@ResponseBody`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/bind/annotation/ResponseBody.html#annotation%20in%20org.springframework.web.bind.annotation)\
    \ 注解，从而免去了在每个方法上添加 `@ResponseBody` 注解的需要。此注解用于定义 API 端点。该注解让 Spring 将结果渲染回调用者。要在\
    \ Spring 中构建 RESTful Web 服务，请使用 `@RestController` 注解创建一个控制器类来处理 HTTP 请求。\n\n \
    \   ```\n    @Target(value=TYPE)\n    @Retention(value=RUNTIME)\n    @Documented\n\
    \    @Controller\n    @ResponseBody\n    public @interface RestController\n  \
    \  ```\n\n*   `@RequestMapping`：此注解用于提供路由信息。Spring 中的 HTTP 请求会被映射到相应的处理方法。此注解可以应用于类级别，将\
    \ HTTP 请求映射到控制器类，也可以应用于方法级别，将 HTTP 请求映射到控制器处理方法。\n\n    ```\n    @Target(value={METHOD,TYPE})\n\
    \    @Retention(value=RUNTIME)\n    @Documented\n    public @interface RequestMapping\n\
    \    ```\n\n*   `ResponseEntity`：此类扩展了 `HttpEntity`，用于在控制器方法中向响应添加 HTTP 状态。它可以包含\
    \ HTTP 状态码、标头和响应体。\n\n    ```\n    public class ResponseEntity\n    extends HttpEntity\n\
    \    ```\n\n*   `@RequestBody`：此注解用于将方法参数绑定到传入 HTTP 请求的请求体。Spring 将使用 [`HttpMessageConverter`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/http/converter/HttpMessageConverter.html#interface%20in%20org.springframework.http.converter)\
    \ 根据请求的内容类型将 Web 请求的请求体转换为领域对象。可以应用 `@valid` 注解来执行自动验证，这是可选的。\n\n    ```\n   \
    \ @Target(value=PARAMETER)\n    @Retention(value=RUNTIME)\n    @Documented\n \
    \   public @interface RequestBody\n    ```\n\n*   `@ResponseBody`：此注解用于将注解方法的返回值绑定到传出的\
    \ HTTP 响应体。Spring 将使用 `HttpMessageConverter` 根据请求 HTTP 标头的内容类型将返回值转换为 HTTP 响应体（通常返回\
    \ JSON 或 XML 等数据格式）。\n\n    ```\n    @Target(value={TYPE,METHOD})\n    @Retention(value=RUNTIME)\n\
    \    @Documented\n    public @interface ResponseBody\n    ```\n\n*   `@PathVariable`：此注解用于将方法参数绑定到\
    \ URI 模板变量（即 `{}` 中的变量）。\n\n    ```\n    @Target(value=PARAMETER)\n    @Retention(value=RUNTIME)\n\
    \    @Documented\n    public @interface PathVariable\n    ```\n\n*   `MediaType`：这是\
    \ `MimeType` 的子类。在使用 `@RequestMapping` 注解时，你还可以指定控制器方法要生成或消费的 `MediaType`。\n\n\
    \    ```\n    public class MediaType\n    extends MimeType\n    implements Serializable\n\
    \    ```\n\n#### 创建 RESTful 控制器：UserRegistrationRestController\n\n你将创建一个 Spring\
    \ MVC 控制器并实现 REST API 端点。让我们在 `src/main/java` 文件夹下的 `com.apress.ravi.Rest` 包中创建\
    \ `UserRegistrationRestController` 类。该控制器类提供了所有必要的端点来检索和操作用户。清单 2-6 展示了 `UserRegistrationRestController`\
    \ 类所需的代码更改。\n\n```\npackage com.apress.ravi.Rest;\nimport org.slf4j.Logger;\n\
    import org.slf4j.LoggerFactory;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
    import com.apress.ravi.repository.UserJpaRepository;\n@RestController\n@RequestMapping(\"\
    /api/user\")\npublic class UserRegistrationRestController {\npublic static final\
    \ Logger logger =\nLoggerFactory.getLogger(UserRegistrationRestController.class);\n\
    private UserJpaRepository userJpaRepository;\n@Autowired\npublic void setUserJpaRepository(UserJpaRepository\
    \ userJpaRepository) {\nthis.userJpaRepository = userJpaRepository;\n}\n}\n清单\
    \ 2-6.\nUserRegistrationRestController 类\n```\n\n在清单 2-6 中，你使用 `@RestController`\
    \ 注解标注了 `UserRegistrationRestController` 类，并定义了一个新的 `@RequestMapping` 将 URI `/api/user`\
    \ 映射到整个类，这意味着在 `/api/user` URI 上接收到的 HTTP 请求由 `UserRegistrationRestController`\
    \ 类处理。你使用了 `@Autowired` 注解将 `autowireUserJpaRepository` 自动装配到 RESTful 控制器。\n\n\
    让我们在控制器类中定义不同的端点来访问和操作 `UserDTO`。你将使用新的注解 `@GetMapping`、`@PostMapping`、`@PutMapping`\
    \ 和 `@DeleteMapping`，而不是标准的 `@RequestMapping`，这些注解自 Spring MVC 4.3 起可用，并且是定义 REST\
    \ 端点的标准方式。这些新注解充当了 `@RequestMapping` 的包装器，简化了常见 HTTP 方法的映射。\n\n#### @GetMapping：检索所有用户\n\
    \n这是一个组合注解，是 `@RequestMapping(value=\"/\", method = RequestMethod.GET)` 的快捷方式。对\
    \ `/api/user/` 端点的 `GET` 请求返回 UserRegistrationSystem 应用程序中可用的用户列表。清单 2-7 展示了实现此功能所需的代码。\n\
    \n```\n@GetMapping(\"/\")\npublic ResponseEntity> listAllUsers() {\nList users\
    \ = userJpaRepository.findAll();\nreturn new ResponseEntity>(users, HttpStatus.OK);\n\
    }\n清单 2-7.\n用于检索所有用户的 GET 动词实现\n```\n\n`listAllUsers` 方法返回包含 HTTP 响应的 `ResponseEntity`。此方法使用\
    \ `UserJpaRepository` 读取所有用户。然后，你通过调用其构造函数创建了一个 `ResponseEntity` 实例，该构造函数接受两个参数：`UserDTO`\
    \ 是成为响应体一部分的数据，而 `HttpStatus.OK` 状态值是成为响应状态码的数据。\n\n让我们通过从 STS 将 UserRegistrationSystem\
    \ 应用程序作为 Spring Boot 应用程序运行并启动 Postman 应用程序来测试第一个端点。输入 URL `http://localhost:8080/api/user/`\
    \ 并点击发送，如图 2-3 所示。\n\n![A436970_1_En_2_Fig3_HTML.jpg](img/A436970_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3.\n\n用于检索所有用户的 GET 动词实现\n\n由于尚未创建任何用户，这将导致一个空集合。因此，下一个任务是通过实现 `POST` 动词功能向\
    \ UserRegistrationSystem 添加一个用户。\n"
- fmt: '#### `@PostMapping` : Create a New User


    The `@PostMapping` annotation is a composed annotation that is a shortcut for
    `@RequestMapping(value="/", method=RequestMethod.POST)`. The `POST` request on
    the `/api/user/` endpoint creates a new user using the enclosed body of the request.
    Listing [2-8](#A436970_1_En_2_Chapter.html#Par75) shows the necessary code for
    implementing the `POST` verb functionality.


    ```

    @PostMapping(value = "/", consumes = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity createUser(@RequestBody final UsersDTO user) {

    userJpaRepository.save(user);

    return new ResponseEntity(user, HttpStatus.CREATED);

    }

    Listing 2-8.

    POST Verb Implementation to Create a New User

    ```


    The `createUser` method takes a parameter of type `UsersDTO` annotated with the
    `@RequestBody` annotation, which requests Spring to convert the entire request
    body to an instance of `UserDTO`.


    You have configured content negotiation using `consumes = MediaType.APPLICATION_JSON_VALUE`,
    which indicates this method will accept only JSON data from the request body.
    The `produces` and `consumes` attributes are used to [narrow the mapping types](http://docs.spring.io/spring/docs/3.2.x/spring-framework-reference/html/mvc.html#mvc-ann-requestmapping-consumes).
    You can eliminate this because `@RequestBody` uses `HttpMessageConverters` to
    determine the right converter to use and to convert the body of the HTTP request
    to domain objects. The message converters in Spring BOOT support JSON and XML
    resource representations.


    Inside the method, you delegated the `UserDTO` persistence to `userJpaRepository`’s
    save method. Then you created a new `ResponseEntity` with the created user (`UserDTO`)
    and HTTP status `HttpStatus.CREATED` (201) and returned it.


    To test this newly added endpoint, start the UserRegistrationSystem application.
    If the UserRegistrationSystem application is already running, then you need to
    terminate the process and restart it. Launch Postman and select the request type
    as POST. Click Body and select raw; then from the drop-down, select JSON (application/json)
    as the Content-Type header. Enter some information and hit Send. Listing [2-9](#A436970_1_En_2_Chapter.html#Par80)
    shows the JSON used in the body.


    ```

    {

    "name":"Ravi Kant Soni",

    "address":"Lashkariganj, Sasaram, Rohtas, Bihar, pin-821115",

    "email":"ravikantsoni.author@gmail.com"

    }

    Listing 2-9.

    JSON Used in the Body to Create a New User

    ```


    On completion of the request, you will see a 201 `Created` message, as shown in
    Figure [2-4](#A436970_1_En_2_Chapter.html#Fig4).


    ![A436970_1_En_2_Fig4_HTML.jpg](A436970_1_En_2_Fig4_HTML.jpg)


    Figure 2-4.


    POST verb implementation to create a new user


    #### `@GetMapping` ("/ {id}") : Retrieve an Individual User


    The next step is to implement an endpoint to access an individual user. Listing
    [2-10](#A436970_1_En_2_Chapter.html#Par83) shows the necessary code.


    ```

    @GetMapping("/{id}")

    public ResponseEntity getUserById(@PathVariable("id") final Long id) {

    UsersDTO user = userJpaRepository.findById(id);

    return new ResponseEntity(user, HttpStatus.OK);

    }

    Listing 2-10.

    GET Verb Implementation to Retrieve Individual User

    ```


    As shown in Listing [2-10](#A436970_1_En_2_Chapter.html#Par83), you have annotated
    the `getUserById` method with the `@GetMapping("/{id}")` annotation. The placeholder
    `{id}` in the URI along with the `@PathVariable` annotation allows Spring to extract
    the `id` parameter value. Inside the method, you have used `UserJpaRepository`’s
    `findById` method to read the `UserDTO` object and pass it as part of a `ResponseEntity`
    along with the HTTP status `HttpStatus.OK` (200).


    To test this functionality, launch Postman and restart the UserRegistrationSystem
    application. Enter the URL `http://localhost:8080/api/user/1` and hit Send, as
    shown in Figure [2-5](#A436970_1_En_2_Chapter.html#Fig5).


    ![A436970_1_En_2_Fig5_HTML.jpg](A436970_1_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    Retrieving individual user


    Similarly, you can implement an endpoint to perform the update and delete functionality.


    #### `@PutMapping` : Update a User


    This annotation is a composed annotation that is a shortcut for `@RequestMapping(method
    = RequestMethod.PUT)`. It requests that the enclosed entity be considered as a
    modified version of an existing resource at the request URI. Listing [2-11](#A436970_1_En_2_Chapter.html#Par88)
    shows the necessary code.


    ```

    @PutMapping(value = "/{id}", consumes = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity updateUser(

    @PathVariable("id") final Long id, @RequestBody UsersDTO user) {

    // fetch user based on id and set it to currentUser object of type UserDTO

    UsersDTO currentUser = userJpaRepository.findById(id);

    // update currentUser object data  with user object data

    currentUser.setName(user.getName());

    currentUser.setAddress(user.getAddress());

    currentUser.setEmail(user.getEmail());

    // save currentUser obejct

    userJpaRepository.saveAndFlush(currentUser);

    //return ResponseEntity object

    return new ResponseEntity(currentUser, HttpStatus.OK);

    }

    Listing 2-11.

    PUT Verb Implementation to Update a User

    ```


    In Listing [2-11](#A436970_1_En_2_Chapter.html#Par88), you retrieved the existing
    `UserDTO` object as `currentUser` using `UserJpaRepository`’s `findById` method
    by passing the argument as `id` from `pathvariable`. Then you updated the `currentUser`
    property data from the user’s information in `requestbody`.


    You also called `UserJpaRepository`’s `saveAndFlush` method by passing `currentUser`,
    which saves `UserDTO` and flushes the changes instantly. Finally, you returned
    `ResponseEntity` with `currentUser` as the response body and `HttpStatus.OK` as
    the HTTP status.


    Let’s test this endpoint by launching Postman and restarting the application,
    as shown in Figure [2-6](#A436970_1_En_2_Chapter.html#Fig6).


    ![A436970_1_En_2_Fig6_HTML.jpg](A436970_1_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    PUT verb implementation to update a user


    Now let’s implement the delete functionality to delete an existing user from the
    UserRegistrationSystem application.


    #### `@DeleteMapping` : Delete a User


    This is a composed annotation that is a shortcut for `@RequestMapping(method =
    RequestMethod.DELETE)`. It requests that the application deletes resources identified
    by `Request-URI`. Listing [2-12](#A436970_1_En_2_Chapter.html#Par94) shows the
    necessary code for implementing this functionality.


    ```

    @DeleteMapping("/{id}")

    public ResponseEntity deleteUser(@PathVariable("id") final Long id) {

    userJpaRepository.delete(id);

    return new ResponseEntity(HttpStatus.NO_CONTENT);

    }

    Listing 2-12.

    DELETE Verb Implementation to Delete a User

    ```


    In Listing [2-12](#A436970_1_En_2_Chapter.html#Par94), the inside method you called
    `UserJpaRepository`’s delete method by passing the argument `id` from `pathvariable`.
    And, then you returned `ResponseEntity` with an HTTP status of `HttpStatus.NO_CONTENT`
    (204).


    Restart the UserRegistrationSystem application and launch Postman to test this
    functionality, as shown in Figure [2-7](#A436970_1_En_2_Chapter.html#Fig7).


    ![A436970_1_En_2_Fig7_HTML.jpg](A436970_1_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    DELETE verb implementation to delete a user


    Up to now you learned about how to implement a RESTful API to perform CRUD operations.
    Now you will learn about error handling in a RESTful API.


    ## Handle Errors in a RESTful API


    Although a developer takes care of handling error, it is important to design error
    responses in a suitable format that allows a client who consumes a RESTful API
    to understand the issues and help by using the API correctly. Error handling is
    one of the most important concerns of RESTful API development. In the real world,
    a RESTful API is being consumed in various scenarios, and it is difficult to predict
    everything about the scenario in which the API is being consumed.'
