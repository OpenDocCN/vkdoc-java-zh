    ## 总结


    在本章中，你了解了单页应用程序的概念。你学习了 AngularJS 的生命周期，并看到了不同的阶段，例如引导阶段、编译阶段和运行时数据绑定阶段。然后你学习了
    AngularJS 架构概念和 MVC 架构。你通过将 AngularJS 添加到你在第 2 章中开发的 Spring Boot 应用程序中，设置了 AngularJS
    开发环境。你使用了 Bootstrap 进行 CSS 设计。你了解了 AngularJS 的不同组件，并在应用程序中实现了模型、视图和控制器。然后你创建了不同的视图页面来使用你的
    REST API。


    在下一章中，你将实现 Spring Security 来保护你使用 Spring Boot 开发的 RESTful API。保护基于 Web 的应用程序与保护
    RESTful API 不同，因为在基于 Web 的应用程序中，需要从登录页面进行人工交互以传递用户凭据。在 RESTful API 中，交互可以是机器对机器，或者来自用不同语言开发的不同应用程序。

