    # 3. 设置 AngularJS：创建你的单页应用程序


    在上一章中，你学习了如何为 UserRegistrationSystem 应用程序创建 RESTful 服务。现在你了解了 HTTP 方法和状态码。你创建了不同的端点来执行
    CRUD 操作。你处理了 REST API 中的错误，并定义了自定义错误响应。你还使用`Validation`注解验证了请求输入，并将错误消息外部化。


