    In addition, with the evolution of cloud infrastructure, a full stack developer
    should be aware of the platform as a service (PaaS) and software as a service
    (SaaS) models, Amazon Web Services, and IBM Bluemix.


    This section was all about being a full stack web developer. Let’s dig into the
    big picture of full stack development in the next section.


    ## Full Stack Web Development


    The stack is the combination of tools and components that make up an application.
    In a web application, the components can be on the front end (HTML, CSS, JavaScript/jQuery)
    or the back end (server operations, logical layers, and databases). Note that
    today the database can be placed in a separate section instead of the server-side
    operation because of database as a service (DaaS).


    Full stack web development means being comfortable working with both front-end
    and back-end technologies. Put simply, full stack development covers client-side
    development using HTML/CSS, JavaScript/jQuery, and framework such as AngularJS
    and Bootstrap.


    For server-side development, it covers programming languages such as Java, frameworks
    such as Spring Boot, databases such as PostgreSQL or Oracle or any other database,
    and everything in between.


    The communication between the client side and the server side happens through
    a RESTful API and HTTP, as shown in Figure [1-2](#A436970_1_En_1_Chapter.html#Fig2).
    Let’s discuss the architecture of modern web applications in the next section.


    ![A436970_1_En_1_Fig2_HTML.jpg](A436970_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    Communication between the client and server'
  trans: '

    # 1. 全栈 Web 开发的宏观图景


    全栈 Web 开发让你能够探索最佳的工具和框架，同时让你的应用程序在设计、可扩展性、健壮性和安全性等不同方面都变得稳固可靠。


    在本章中，我将概述全栈 Web 开发的宏观图景，并讨论现代应用程序的架构，以打破“开发孤立的桌面和移动应用是一种好方法”这一迷思。我将讨论作为前端框架的 AngularJS
    和作为后端框架的 Spring Boot。我还将展示如何将 Spring Boot 设置为开发环境。然后，你将开发你的第一个 Spring Boot 应用程序并运行它。最后，你将使用
    Spring Boot Actuator 监控你的 Spring Boot 应用程序。


    ## 什么是全栈开发者？


    每当有人告诉你他们是全栈开发者时，你可能会问的第一个问题是：“你是哪种全栈开发者？” 问题是，如今当你从事 Web 开发时，你必须使用大量的工具。技术栈已经变得比以前更庞大了。


    如今的公司更倾向于雇佣那些足够灵活、能够处理各种事务的工程师，而不是那些只精通单一技术的人。最终目标是，你将能够编写 Java 代码、使用 Angular、编写数据库脚本、编写
    CSS 等等。事实上，几年前，说自己是全栈开发者很容易，但今天，你必须同时处理 Java、AngularJS、Bootstrap、CSS、数据库脚本以及多种数据库，而且你还需要了解内容交付、部署以及如何发布到
    Amazon Web Services 集群。不用说，同时管理所有这些事情是很复杂的。我甚至还没有提到设计 UI 和创建移动应用等领域。所以，当你说自己是全栈开发者时，需要了解的东西非常多。


    全栈开发者是对所有这些主题都略知一二，还是精通所有？很多时候，全栈开发者被认为是“万金油”，但样样不精。因此，最好明确自己是哪种类型的全栈开发者。


    成为一名全栈开发者意味着你基本上需要成为一个连接者。所以，即使你只擅长某一套技能，你也可以准备好你的工作成果以便交付，这样另一个人就能在另一端接手他们的工作，并知道如何接收它。这就是全栈开发者非常有价值的地方。


    但是，找到一位优秀的全栈开发者的几率极低。问题是，初创公司总是需要一位能够关注所有方面的全栈开发者，而初创公司总是急于不惜重金雇佣全栈开发者。


    行业中全栈开发者的定义是：一位精通从客户端编码（如 HTML、CSS 和 AngularJS）到服务器端（如 Java 和 Spring Boot）所有方面，并且对各种数据库（包括
    RDBMS 和 NoSQL 数据库系统）都有经验的工程师。因此，一个全栈 Web 开发者应该对客户端和服务器端技术都有良好的实践经验，如图 1-1 所示。


    ![A436970_1_En_1_Fig1_HTML.jpg](img/A436970_1_En_1_Fig1_HTML.jpg)


    图 1-1.


    客户端和服务器端技术


    全栈开发者负责确保系统的每个部分都能平稳运行。开发者应具备以下方面的专业知识：


    *   设计用户界面

    *   在服务器端开发业务逻辑和服务层

    *   处理关系型和非关系型数据库

    *   处理 API 交互

    *   通过编程方式使用身份验证和授权来保护应用程序

    *   确保质量保证

    *   理解业务需求和客户需求


    除此之外，全栈开发者还必须知道如何进行基本的服务器管理，在必要时承担服务器管理员或 DevOps 的角色。


    *   通过命令或终端连接到云服务器，并访问诸如 `putty` 之类的工具

    *   管理用户和组的集合与子集

    *   在指定的服务器环境中进行基本的 Shell 脚本编写

    *   理解 Apache 和 Nginx 服务器程序

    *   管理防火墙和权限

    *   安装、更新和管理服务器端软件、包和库


    此外，随着云基础设施的发展，全栈开发者应该了解平台即服务（PaaS）和软件即服务（SaaS）模型、Amazon Web Services 以及 IBM Bluemix。


    本节内容全是关于成为一名全栈 Web 开发者。让我们在下一节深入探讨全栈开发的宏观图景。


    ## 全栈 Web 开发


    技术栈是构成应用程序的工具和组件的组合。在 Web 应用程序中，组件可以位于前端（HTML、CSS、JavaScript/jQuery）或后端（服务器操作、逻辑层和数据库）。请注意，由于数据库即服务（DaaS）的出现，如今数据库可以放在一个单独的部分，而不是服务器端操作中。


    全栈 Web 开发意味着能够自如地处理前端和后端技术。简单来说，全栈开发涵盖了使用 HTML/CSS、JavaScript/jQuery 以及诸如 AngularJS
    和 Bootstrap 等框架进行的客户端开发。


    对于服务器端开发，它涵盖了诸如 Java 等编程语言、诸如 Spring Boot 等框架、诸如 PostgreSQL 或 Oracle 或任何其他数据库，以及介于两者之间的所有内容。


    客户端和服务器端之间的通信通过 RESTful API 和 HTTP 进行，如图 1-2 所示。让我们在下一节讨论现代 Web 应用程序的架构。


    ![A436970_1_En_1_Fig2_HTML.jpg](img/A436970_1_En_1_Fig2_HTML.jpg)


    图 1-2.


    客户端与服务器之间的通信

