    # Agile Software Testing


    In the software development world, agile refers to a project management approach
    where teams work by focusing on the principles of collaboration, flexibility,
    simplicity, and responsiveness throughout the development of new modules in an
    application. When using the agile software methodology, a team delivers the project
    or allocated works in smaller divisions termed sprints with continuous collaboration
    between a cross-functional team including stakeholders. This particular methodology
    is incremental and iterative in nature, focusing on the effective delivery of
    allocated works.


    Agile software testing refers to the practice of testing software for any bugs
    and performance issues within the context of the agile workflow. It includes unit
    testing as well as integration testing. The following sections will help you understand
    the objectives of unit testing and integration testing.


    ## Unit Testing


    Unit testing refers to testing individual functionality/methods in the code. Unit
    tests are written by software developers to test the fundamental pieces of functionality
    in their code and prevent bugs.


    The phrase class under test refers to the concept that whenever you write any
    unit test cases, you create a test class against a class that is being tested
    and for which you have to write unit test cases, as shown in Figure [6-3](#A436970_1_En_6_Chapter.html#Fig3).


    ![A436970_1_En_6_Fig3_HTML.jpg](A436970_1_En_6_Fig3_HTML.jpg)


    **Figure 6-3.** Class under test and its dependencies


    Let’s take an example where you have two classes named `UserRegistrationService`
    and `UserRegistrationDAO` to perform a CRUD operation by interacting with a database.
    The `UserRegistrationService` class needs the `UserRegistrationDAO` object for
    loading a list of users from a database. This `UserRegistrationDAO` object is
    a real object, so while testing your `UserRegistrationService` class, you need
    to have a `UserRegistrationDAO` object with a valid connection to the database.
    You also have to insert a user in the database for the testing. Setting up a database
    connection, inserting a user into the database, and then testing the `UserRegistrationService`
    class can be a lot of work.'
