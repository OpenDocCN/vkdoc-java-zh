    #### 使用模拟对象对依赖类进行单元测试


    你可以通过创建一个伪造的 `UserRegistrationDAO` 实例来减少工作量，该实例将返回预期的用户列表，并将其传递给 `UserRegistrationService`。这个伪造的
    `UserRegistrationDAO` 不会与数据库建立连接。这个伪造的 `UserRegistrationDAO` 对象被称为模拟对象，它是 `realUserRegistrationDAO`
    对象的替代品。这将简化对 `UserRegistrationService` 类的测试。图 6-4 展示了如何为被测类模拟一个依赖项。


    ![A436970_1_En_6_Fig4_HTML.jpg](img/A436970_1_En_6_Fig4_HTML.jpg)


    图 6-4.

    被测类中的模拟依赖对象


    ##### Mockito 框架


    Mockito 框架是一个用于创建和配置模拟对象的开源模拟框架。


    再次说明，模拟对象是一个模仿真实对象的假对象，而创建假对象的过程称为模拟。Java 中有多个可用于模拟的库，例如 EasyMock 和 Mockito。


    要使用 Mockito，你需要在应用程序上下文中拥有 Mockito JAR 以及 JUnit。Mockito 支持如下列出的字段级注解：


    *   `@Mock`：此注解用于为被注解的字段创建一个模拟对象。

    *   `@Spy`：此注解为其注解的真实对象字段创建一个间谍，当监视或存根其特定方法时，这可以被称为部分模拟。

    *   `@RunWith(MockitoJUnitRunner.class)`：使用 `@Mock` 注解和 `@Spy` 注解创建模拟对象需要将 `@RunWith(MockitoJUnitRunner.class)`
    注解应用于你的测试类。当 `MockitoJUnitRunner` 执行单元测试时，所有被注解的字段都将创建模拟和间谍对象。


    请参考 [`http://mockito.org/`](http://mockito.org/) 获取关于 Mockito 框架的更多详细信息。


    ### 集成测试


    在集成测试中，各个模块被组合在一起，并作为一个整体进行逻辑测试。软件开发阶段的集成测试发生在单元测试之后。


    ## 测试 Spring Boot 应用程序


    Spring 框架中的 `spring-test` 模块通过提供丰富的注解集、工具类和模拟对象，允许开发人员执行单元测试和集成测试。让我们通过使用所需的依赖项更新
    Maven `pom.xml` 文件来设置环境。


    ### Maven 依赖


    Spring Boot 提供了名为 `spring-boot-starter-test` 的启动器 POM，它会自动将 `spring-test` 模块添加到
    Spring Boot 应用程序中。清单 6-16 展示了 `pom.xml` 中的依赖项。


    ```

    org.springframework.boot

    spring-boot-starter-test

    test


    清单 6-16.

    pom.xml 中的依赖项

    ```


    这个启动器 POM 将 JUnit（Java 应用程序单元测试的事实标准）、AssertJ（一个断言库）、Mockito（一个 Java 模拟框架）以及 [Spring
    Test](http://docs.spring.io/spring/docs/4.3.10.RELEASE/spring-framework-reference/htmlsingle/#integration-testing%23_top)
    和 Spring Boot Test（用于 Spring Boot 应用程序的工具和集成测试支持）引入到你的应用程序中，如图 6-5 所示。


    ![A436970_1_En_6_Fig5_HTML.jpg](img/A436970_1_En_6_Fig5_HTML.jpg)


    图 6-5.

    类路径中的 JAR


    ### Spring 测试中的注解


    Spring 框架提供了不同的注解，开发人员可以使用它们来执行单元测试和集成测试。


    让我们检查典型的测试用例，以理解 `spring-test` 模块和 Spring 框架提供的注解。清单 6-17 展示了一个使用 Spring Boot
    Test 构建的 Spring Test 示例。


    ```

    package com.apress.ravi.chapter6.UserRegistrationSystem;

