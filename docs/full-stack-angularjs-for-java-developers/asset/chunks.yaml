  trans: '

    ## 现代 Web 应用的架构


    在 Web 早期，并不存在 Web 应用。我们只有充满静态内容和图片的网站。这种方式有利有弊。


    以下是一些优点：


    *   服务器端的计算开销非常低。

    *   由于数据是静态的，且对众多 ISP 和服务提供商来说不会改变，因此内容本身具有很高的可缓存性。


    以下是一些缺点：


    *   更新内容很困难。

    *   没有个性化，所有用户获得的体验相同。

    *   与当今的应用相比，用户界面通常很差。


    CGI 通过使用脚本语言实现动态内容创建，引发了一场革命。其缺点是计算开销相对较高，并且要求你成为 HTML 和服务器端脚本语言的专家。


    随后，JavaScript 出现了，它首次使页面具备了动态能力。它主要用于非常基础的脚本编写，例如验证表单或显示弹窗广告。它增强了可用性，并减少了因基础验证而导致的与服务器的往返通信。缺点是你必须将业务逻辑实现两次：一次在客户端，一次在服务器端。因此，我们提出了现代
    Web 应用的架构。


    在本节中，我将讨论现代应用的架构，以打破“开发独立的桌面和移动应用是正确方向”这一迷思。现代 Web 应用专注于构建分布式后端基础设施，通过 RESTful
    API 在 Web 上提供内容并服务于前端客户端，如图 1-3 中 Web 应用的分层架构所示。


    ![A436970_1_En_1_Fig3_HTML.jpg](img/A436970_1_En_1_Fig3_HTML.jpg)


    图 1-3.


    现代 Web 应用的分层架构


    当你想要与页面上的多个组件交互，而这些组件又包含许多中间组件时，让所有中间组件都实现服务器端渲染会变得很困难。与传统的服务器端架构相比，这里的主要思想是将服务器构建为一组无状态、可复用的
    REST 服务。从模型-视图-控制器（MVC）的角度来看，控制器已从后端移除并移到了客户端。因此，现在客户端能够使用 MVC 架构。客户端拥有一个独立的视图层，包含所有展示逻辑。它还有独立的前端服务层和控制器层。


    在应用初始启动时，只有 JSON 数据通过 RESTful API 在客户端和服务器之间传输。整个业务逻辑将暴露为 REST 端点，供 Angular 服务消费。这样做的好处是，当你的
    Web 应用有对应的移动应用时，你可以直接消费这些 RESTful 服务，而无需为移动应用在服务器端编写任何额外的代码。


    REST 代表表述性状态转移，它是一种架构风格，是对具体事物的一种抽象。它是当今 Web 运作的架构。你将在第 2 章中更详细地学习 RESTful API，届时你将为自己的应用创建
    RESTful 层。


    ## 前端 vs. 后端


    当你开发一个 Web 应用时，你主要将开发过程分为两部分：前端和后端。当你谈论 Web 应用或移动应用时，基本上关注的是前端开发。当你使用任何 Web 应用或浏览器时，你输入地址，网站会打开包含文本、图片、表单和不同交互元素等多个元素的页面。图
    1-4 展示了前端和后端的物理视图。


    ![A436970_1_En_1_Fig4_HTML.jpg](img/A436970_1_En_1_Fig4_HTML.jpg)


    图 1-4.


    前端和后端的物理视图


    如果你使用移动应用，你会看到不同的元素、列表视图等。这些应用会出现在客户端。因此，无论你使用的是笔记本电脑、移动设备，还是浏览器或移动应用，你都会接触到完整应用的客户端部分。


    所有用户数据都存储在数据库中。所有业务逻辑和安全数据都存储在服务器上。服务器接收来自 Web 应用或移动应用的请求，处理这些请求，从数据库或文件服务器中获取必要的信息，并将其发送回前端应用。所以，基本上，后端存储信息，前端展示信息。


    设计师和开发者通常使用框架来构建网站和应用的雏形，因为从头开始构建应用或网站需要花费大量时间。


    软件框架被定义为：一组预定义的可复用模块，可以实现这些模块以更好、更快地完成指定任务。因此，一个软件框架总是包含库、编译器以及多个 API，用于开发特定的企业级
    Web 应用。一个优秀的全栈开发者应该知道哪个框架最适合他们那套应用的实现。


    以下是一些流行的软件框架：


    *   AngularJS（用于 UI/前端开发）

    *   Ionic（用于混合移动应用原型设计和开发）

    *   Pure MVC 框架（应用开发框架）

    *   Selenium（Web 测试框架）


    在计算机编程中，软件框架是一种抽象，其中提供通用功能的软件可以通过额外的用户编写代码进行选择性更改，从而提供特定于应用的软件。


    ## 前端框架


    前端涉及用户看到的一切，包括设计以及 HTML 和 CSS 等语言。前端代码的主要目的是与用户交互，并以定义良好的样式呈现数据。


    在构建前端应用时，有非常多令人惊叹的 JavaScript 库可供使用。有时，选择一个单一的项目可能会有点棘手。前端就是让 Web 应用看起来和用起来都“性感”的所有东西。这些前端内容包括
    HTML、CSS 和 JavaScript。在本书中，你将使用 AngularJS 作为前端开发框架。我将在本章后面更详细地介绍 AngularJS。


    ### AngularJS 作为前端框架


    AngularJS 是一个用 JavaScript 编写的库，用于 Web 应用开发。它解决了单页应用（SPA）的挑战。一个 AngularJS Web 应用遵循
    MVC 设计模式，从而开发出可扩展、可维护、可测试且标准化的 Web 应用。AngularJS 的数据绑定和依赖注入使其成为任何服务器技术的理想搭档，因为它消除了许多你原本必须编写的代码，并且这一切都发生在浏览器内部。


    #### AngularJS 版本


    AngularJS 通常被称为 Angular.js，有时也称为 AngularJS 1.x。AngularJS 是一个基于 JavaScript 的开源前端
    Web 应用开发框架，主要由 Google 维护。


    现在，Angular 4.0.0 已经可用，并且对于大多数应用来说，它与 2.x.x 版本向后兼容。这个新版本包含一些新特性，例如将动画包从核心中分离出来，放入其自己的包中，以及改进了支持`if/else`风格的`ngIf`等。

    '
- fmt: '### AngularJS Architecture Concepts


    Now you will take a look at the architecture concepts of AngularJS. When an HTML
    document is loaded into the browser and is evaluated by the browser, the following
    happens:


    1. The AngularJS JavaScript file is loaded, and the Angular global object is created.
    The JavaScript file that registers the controller functions is executed.

    2. AngularJS scans the HTML to look for AngularJS apps and views and finds a controller
    function corresponding to the view.

    3. AngularJS executes the controller functions and updates the views with data
    from the model populated by the controller.

    4. AngularJS listens for browser events, such as button clicked, mouse moved,
    input field being changed, and so on. If any of these events happen, then AngularJS
    will update the view accordingly.


    Figure [1-5](#A436970_1_En_1_Chapter.html#Fig5) shows a workflow diagram of AngularJS.


    ![A436970_1_En_1_Fig5_HTML.jpg](A436970_1_En_1_Fig5_HTML.jpg)


    Figure 1-5. Workflow diagram of AngularJS


    AngularJS contains modules that act as containers for different types of applications
    such as views, controllers, directives, services, and so on. A module specifies
    how an application can be bootstrapped. Then you have a config component.


    The routes are used for linking URLs to controllers and views. A view is used
    to handle a sophisticated event. It uses `ng-view` directives. The controller
    controls the data of the AngularJS application, which consists of regular JavaScript
    objects. AngularJS defines an `ng-controller` directive that creates new controller
    objects by using the controller function.


    AngularJS comes with several built-in services such as `$http`, `$route`, `$window`,
    `$location`, and so on. The scope consists of objects that refer to the model.
    They play the important role of joining the controller with the view. We will
    discuss these in more detail in Chapter [3](#A436970_1_En_3_Chapter.html).


    #### MVC Architecture


    AngularJS uses an MVC architecture to create web applications. The MVC architecture
    is a programming methodology that aims to split an application into three core
    components: a model, a view, and a controller. These three components combine
    to form your application. Figure [1-6](#A436970_1_En_1_Chapter.html#Fig6) shows
    the Model-View-Controller architecture.


    ![A436970_1_En_1_Fig6_HTML.jpg](A436970_1_En_1_Fig6_HTML.jpg)


    Figure 1-6. MVC architecture in AngularJS


    When a user sends an HTTP request via a browser, the request is received by the
    controller. The controller processes that request and sends the request to the
    model to provide the appropriate data. The model in response provides the resulting
    data array to the controller again. The controller processes the data again to
    the required format and sends it to the view. The view represents the data via
    UI contents and sends it to the controller. Finally, the controller sends the
    HTTP response to the browser.


    - AngularJS views are used to generate an output representation of information,
    such as a chart or a diagram, to the user in a web browser. AngularJS builds the
    views in the document object model (DOM) by pulling in all the templates defined
    for an application. So, the developer work here is to just create the template
    by using mostly HTML and CSS.

    - The AngularJS model contains the `$scope` object that is used to store the application
    model, so there’s no need to create a JavaScript model class like with other JavaScript
    client-side frameworks. Scopes are attached to the DOM, helping to simplify the
    JavaScript problem considerably.

    - The AngularJS controller is the place where you define all the business logic
    specific to a particular view. The controller holds the model and view together.


    ### Twitter Bootstrap


    Twitter Bootstrap is a front-end framework that was created to make responsive
    design much easier. The Bootstrap CSS framework can be used to style the content
    of a web site. You can create your own CSS style to make your web site look awesome,
    but Bootstrap provides a nice set of CSS styles that will let you design a really
    great-looking content layout. It is not really required to use Bootstrap while
    working with AngularJS, and there is no intrinsic relationship between AngularJS
    and Bootstrap as both are different packages.


    To use CSS from the Bootstrap CSS framework, you can define a dependency in `pom.xml`
    while developing a Spring Boot application so that it will be automatically downloaded
    to the library folder. Also, you can download the Bootstrap archive from [`https://getbootstrap.com/`](https://getbootstrap.com/),
    which also contains CSS and JavaScript files.


    ## Back-End Framework


    The back-end code of any application can be considered to be the brain of that
    application. The back-end code is built with the use of a server-side language
    and database and is never visible to the user. The front-end code interacts with
    the end user in real time, and anything displayed on the web site inside the browser
    is because of a query performed on the server, where back-end code interacts with
    the server to return user-ready data to the front end.


    The developer builds the back-end code of an application using server-side code
    like Java, which connects with the database to save or update data and return
    it to the end user in the form of front-end code. This kind of back-end code structure
    helps the developer to develop applications to do online shopping, interact socially,
    look for real-time information, and do much more in the modern world of the Internet.


    There are so many frameworks and libraries available that can be used to make
    the back-end coding much simpler and the performance faster. The most popular
    one that you will be using throughout this book is the Spring Framework. The Spring
    Framework has always been popular for building the back-end features in enterprise
    applications, and with Spring Boot, a developer’s life has never been easier.


    ### Spring Boot as a Back-End Framework


    Why Spring Boot? There are lots of frameworks for developing web applications,
    and Spring Boot is just one of them. If you want to build something fast, Spring
    Boot can be the first choice as a web application development framework.


    > Working with Spring Boot is like pair programming with the Spring developers.
    —By Josh Long @starbuxman


    The team at Pivotal has designed a new lightweight framework named Spring Boot
    to ease the bootstrapping and development of stand-alone Spring-based and production-ready
    applications and services with minimum fuss that you can “just run.”'
