- fmt: '### 创建 `ReloadableResourceBundleMessageSource` Bean：`messageSource`


    让我们在`src/main/java`文件夹下`com.apress.ravi`包内的`UserRegistrationConfiguration`类中创建一个`ReloadableResourceBundleMessageSource`
    bean。清单 [2-22](#A436970_1_En_2_Chapter.html#Par155) 展示了必要的代码更改。


    ```java

    package com.apress.ravi;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.support.ReloadableResourceBundleMessageSource;

    @Configuration

    public class UserRegistrationConfiguration {

    @Bean(name = "messageSource")

    public ReloadableResourceBundleMessageSource messageSource() {

    ReloadableResourceBundleMessageSource messageBundle =

    new ReloadableResourceBundleMessageSource();

    messageBundle.setBasename("classpath:messages/messages");

    messageBundle.setDefaultEncoding("UTF-8");

    return messageBundle;

    }

    }

    ```

    *清单 2-22. `ReloadableResourceBundleMessageSource` Bean*


    在清单 [2-22](#A436970_1_En_2_Chapter.html#Par155) 中，你使用`@Configuration`注解标注了`UserRegistrationConfiguration`类。Bean
    名称通过`@Bean(name = "messageSource")`定义为`messageSource`。


    `@Configuration`注解是一个元注解，表明该配置类可以包含一个或多个`@Bean`方法，用于生成由 Spring 容器管理的 Bean 定义。这个
    Bean 允许你在不重启应用程序的情况下更改消息的属性文件。


    `messageSource`方法配置了一个`ReloadableResourceBundleMessageSource`以支持来自属性文件的消息。`ReloadableResourceBundleMessageSource`
    Bean 是一种`MessageSource`，它加载消息的属性文件并从属性文件中解析消息键。


    为了设置基础名称，`setBaseName`方法接受一个参数`classpath:messages/messages`（即属性文件的路径）。你设置了消息源文件的默认编码，例如
    UTF-8。Spring 将在`src/main/resources/messages`文件夹中搜索名为`messages.properties`的属性文件。


    ### 创建属性文件


    让我们在`src/main/resources/messages`文件夹下创建一个`messages.properties`文件，并添加以下消息：


    ```properties

    error.name.empty=The name is required field

    error.name.length=The name should be limited to 50 characters

    error.address.empty=The address is required field

    error.address.length=The address should be limited to 150 characters

    error.email.empty=The email is required field

    error.email.email=The email should be in proper format

    error.email.length=The email should be limited to 80 characters

    ```


    这些消息遵循每个消息键的特定模式，如下所示：


    ```properties

    error.<field>.<validation>

    ```


    ### 使用 `message` 属性的 Bean 验证注解


    让我们使用 JSR-303 注解进行 Bean 验证，并配合`message`属性。`message`属性用于设置自定义错误消息，当注解定义的约束未被满足时显示该消息。清单
    [2-23](#A436970_1_En_2_Chapter.html#Par166) 展示了必要的代码更改。


    这个`message`属性将使用上一节定义的`ReloadableResourceBundleMessageSource` Bean，从`messages.properties`文件中获取匹配消息键的消息值。


    ```java

    package com.apress.ravi.dto;

    import javax.persistence.Column;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.Id;

    import org.hibernate.validator.constraints.Email;

    import org.hibernate.validator.constraints.Length;

    import org.hibernate.validator.constraints.NotEmpty;

    @Entity

    public class UsersDTO {

    @Id

    @GeneratedValue

    @Column(name = "USER_ID")

    private Long id;

    @NotEmpty(message = "error.name.empty")

    @Length(max = 50, message = "error.name.length")

    @Column(name = "NAME")

    private String name;

    @NotEmpty(message = "error.address.empty")

    @Length(max = 150, message = "error.address.length")

    @Column(name = "ADDRESS")

    private String address;

    @Email(message = "error.email.email")

    @NotEmpty(message = "error.email.empty")

    @Length(max = 80, message = "error.email.length")

    @Column(name = "EMAIL")

    private String email;

    //Getter & Setter method

    }

    ```

    *清单 2-23. 使用 `message` 属性的 Bean 验证注解*


    到目前为止，你已经创建了`ReloadableResourceBundleMessageSource` Bean，在`messages.properties`文件中定义了消息，并使用带有`message`属性的
    Bean 验证注解标注了实体类。


    下一步是从属性文件中读取消息，并在创建`FieldValidationErrorinstance`时使用它们。'
  raw: '##### Create ReloadableResourceBundleMessageSource Bean: messageSource


    Let’s create a `ReloadableResourceBundleMessageSource` bean in the `UserRegistrationConfiguration`
    class inside the `com.apress.ravi` package under the `src/main/java` folder. Listing
    [2-22](#A436970_1_En_2_Chapter.html#Par155) shows the necessary code changes.


    ```

    package com.apress.ravi;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.support.ReloadableResourceBundleMessageSource;

    @Configuration

    public class UserRegistrationConfiguration {

    @Bean(name = "messageSource")

    public ReloadableResourceBundleMessageSource messageSource() {

    ReloadableResourceBundleMessageSource messageBundle =

    new ReloadableResourceBundleMessageSource();

    messageBundle.setBasename("classpath:messages/messages");

    messageBundle.setDefaultEncoding("UTF-8");

    return messageBundle;

    }

    }

    Listing 2-22.

    ReloadableResourceBundleMessageSource Bean

    ```


    In Listing [2-22](#A436970_1_En_2_Chapter.html#Par155), you annotated the `UserRegistrationConfiguration`
    class with the `@Configuration` annotation. The bean name is defined as `messageSource`
    using `@Bean(name = "messageSource")`.


    The `@Configuration` annotation is a meta-annotation and indicates that this configuration
    class can have one or more `@Bean` methods to generate bean definitions manageable
    by the Spring container. This bean will allow you to alter a message’s properties
    file without restarting the application.


    The method `messageSource` configures a `ReloadableResourceBundleMessageSource`
    to support messages from properties. The `ReloadableResourceBundleMessageSource`
    bean is a kind of `MessageSource` that loads a message’s properties file and resolves
    message keys from a properties file.


    To set a base name, the `setBaseName` method takes an argument as `classpath:messages/messages`
    (in other words, the path of the property file). You set the default encoding
    of the message source file like UTF-8\. Spring will search for a properties file
    named `messages.properties` in the `src/main/resources/messages` folder.


    ##### Create a Properties File


    Let’s create a `messages.properties` file under the `src/main/resources/messages`
    folder and add the following messages:


    ```

    error.name.empty=The name is required field

    error.name.length=The name should be limited to 50 characters

    error.address.empty=The address is required field

    error.address.length=The address should be limited to 150 characters

    error.email.empty=The email is required field

    error.email.email=The email should be in proper format

    error.email.length=The email should be limited to 80 characters

    ```


    These messages follow the specific pattern for each key of the message, as shown
    here:


    ```

    error.>.>

    ```


    ##### Bean Validation Annotation with the message Attribute


    Let’s use the JSR-303 annotation for bean validation with the `message` attribute.
    The `message` attribute is used to set a custom error message to be displayed
    when the constraint defined by the annotation is not satisfied. Listing [2-23](#A436970_1_En_2_Chapter.html#Par166)
    shows the necessary code changes.


    This `message` attribute will get the message value from the `messages.properties`
    file for the matched message key using the `ReloadableResourceBundleMessageSource`
    bean defined in the previous section.


    ```

    package com.apress.ravi.dto;

    import javax.persistence.Column;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.Id;

    import org.hibernate.validator.constraints.Email;

    import org.hibernate.validator.constraints.Length;

    import org.hibernate.validator.constraints.NotEmpty;

    @Entity

    public class UsersDTO {

    @Id

    @GeneratedValue

    @Column(name = "USER_ID")

    private Long id;

    @NotEmpty(message = "error.name.empty")

    @Length(max = 50, message = "error.name.length")

    @Column(name = "NAME")

    private String name;

    @NotEmpty(message = "error.address.empty")

    @Length(max = 150, message = "error.address.length")

    @Column(name = "ADDRESS")

    private String address;

    @Email(message = "error.email.email")

    @NotEmpty(message = "error.email.empty")

    @Length(max = 80, message = "error.email.length")

    @Column(name = "EMAIL")

    private String email;

    //Getter & Setter method

    }

