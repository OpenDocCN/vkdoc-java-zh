- fmt: '### Unit Testing REST Controller


    Inversion of Control (IoC) in the Spring Framework makes unit testing easier by
    supplying dependency injection. Dependency can be easily mocked with expected
    behaviors by allowing developers to test code in isolation.


    The traditional approach to test Spring MVC controllers follows this concept.
    Listing [6-18](#A436970_1_En_6_Chapter.html#Par99) shows the unit testing for
    the `listAllUsers` method in the `UserRegistrationRestController` class.


    ```

    package com.apress.ravi.chapter6.UserRegistrationSystem;

    import java.util.ArrayList;

    import java.util.List;

    import static org.mockito.Mockito.when;

    import org.junit.After;

    import org.junit.Assert;

    import org.junit.Before;

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.mockito.Mock;

    import org.mockito.Spy;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.boot.test.context.SpringBootTest.WebEnvironment;

    import org.springframework.http.HttpStatus;

    import org.springframework.http.ResponseEntity;

    import org.springframework.test.context.junit4.SpringRunner;

    import org.springframework.test.util.ReflectionTestUtils;

    import com.apress.ravi.chapter2.UserRegistrationSystemApplication;

    import com.apress.ravi.chapter2.Rest.UserRegistrationRestController;

    import com.apress.ravi.chapter2.dto.UsersDTO;

    import com.apress.ravi.chapter2.repository.UserJpaRepository;

    @RunWith(SpringRunner.class)

    @SpringBootTest(classes = UserRegistrationSystemApplication.class,

    webEnvironment = WebEnvironment.RANDOM_PORT)

    public class UserRegistrationRestControllerTest{

    @Spy

    private UserRegistrationRestController userRegistrationRestController;

    @Mock

    private UserJpaRepository userJpaRepository;

    @Before

    public void setup() {

    userRegistrationRestController = new UserRegistrationRestController();

    ReflectionTestUtils.setField(userRegistrationRestController,

    "userJpaRepository", userJpaRepository);

    }

    @Test

    public void testListAllUsers() {

    List userList = new ArrayList();

    userList.add(new UsersDTO());

    when(this.userJpaRepository.findAll()).thenReturn(userList);

    ResponseEntity> responseEntity =

    this.userRegistrationRestController.listAllUsers();

    Assert.assertEquals(HttpStatus.OK, responseEntity.getStatusCode());

    Assert.assertEquals(1, responseEntity.getBody().size());

    }

    @After

    public void teardown() {

    userRegistrationRestController = null;

    }

    }

    Listing 6-18.

    Unit Testing for REST Controller

    ```


    In Listing [6-18](#A436970_1_En_6_Chapter.html#Par99), you have created a `UserRegistrationRestControllerTest`
    test class under the package `com.apress.ravi.chapter6.UserRegistrationSystem`
    inside the folder `src/test/java`. You have annotated this class with the `@RunWith(SpringRunner.class)`
    annotation that supports the mocking of dependent `Object` and `@SpringBootTest(classes
    = UserRegistrationSystemApplication.class, webEnvironment = WebEnvironment.RANDOM_PORT)`
    annotation. The `webEnvironment=RANDOM_PORT` part starts the server with a random
    port (useful to avoid conflicts in test environments).


    The `UserRegistrationRestControllerTest` class uses Mockito’s `@Spy` annotation
    to spy `UserRegistrationRestController`. This test class uses the `@Mock` annotation
    to mock `UserRegistrationRestController`’s only dependency: `UserJpaRepository`.


    In the setup method, you create an instance of `UserRegistrationRestController`
    and inject the mock `UserJpaRepository` using Spring’s `ReflectionTestUtils` utility
    class by calling its `setField` method. You annotated the setup class with the
    `@Before` annotation.


    In the `testListAllUsers` method, you used Mockito’s `when` and `then` return
    methods to set the `UserJpaRepository` mock’s behavior. You also indicated that
    when the `UserJpaRepository`’s `findAll` method is invoked, a list of users should
    be returned. Finally, you invoked the `listAllUsers` method and the assert controller’s
    return value.


    In the teardown method, you assigned a null value to `UserRegistrationRestController`
    and annotated this method with the `@After` annotation.


    When you run the test class as a JUnit test, you can view the result in JUnit
    view, as shown in Figure [6-6](#A436970_1_En_6_Chapter.html#Fig6).


    ![A436970_1_En_6_Fig6_HTML.jpg](A436970_1_En_6_Fig6_HTML.jpg)


    Figure 6-6. JUnit view


    As shown in Figure [6-6](#A436970_1_En_6_Chapter.html#Fig6), `UserRegistrationRestControllerTest`
    has been treated as a POJO and hence doesn’t test the controller’s request mapping
    validation. So, in the next section, you will be using the Spring MVC Test framework
    that allows you to test a controller as MVC’s controller. So, `DispatcherServlet`
    will intercept the request and generate a response the same as when it runs in
    a web container when actually starting up a web server.


    ### Testing the Web Layer Using the Spring MVC Test Framework


    In this section, you will do testing with the `@WebMvcTest` annotation, which
    can be used in combination with `@RunWith(SpringRunner.class)` for a typical Spring
    MVC test and which can be used when a test focuses only on Spring MVC components.
    A test class annotated with `@WebMvcTest` will autoconfigure `MockMvc` (include
    support for HtmlUnit WebClient and Selenium WebDriver).


    Generally, `@WebMvcTest` is used in combination with `@MockBean` to create any
    collaborators required by your `@Controller` beans. To start with the Spring MVC
    Test framework, you need to be familiar with `MockMVC`.'
