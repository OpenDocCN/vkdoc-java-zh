- fmt: "# Summary\n\nIn this chapter, you created a REST client using `RestTemplate`\
    \ and used it to perform client operations such as `GET`, `POST`, `PUT`, and `DELETE`\
    \ on resources. You looked into the different `RestTemplate` methods and operations\
    \ to consume REST APIs. You also implemented Basic Authentication with `RestTemplate`.\n\
    \nThen you moved into testing RESTful services using the Spring Test framework.\
    \ I introduced unit testing and integration testing. You saw different annotations\
    \ and assert methods in the JUnit4 framework. Then you looked at a mocking framework\
    \ and mock objects. Finally, you tested REST services using the Test framework\
    \ and the Spring MVC Test framework.\n\nIn the next chapter, you will manage and\
    \ monitor your Spring Boot application in production.\n\n# 7. Application Monitoring\
    \ Using Spring Boot Actuator\n\nApplication monitoring ensures that an application\
    \ running on a server performs as expected. In Chapter 2, you developed RESTful\
    \ services using Spring Boot. In addition, Spring Boot supports additional features\
    \ to monitor and manage your Spring Boot application when it is pushed to production.\n\
    \nFor example, say a developer just finished his application and pushed the changes\
    \ to the repository. Moving on, the developer approaches the operations (ops)\
    \ team and asks them to deploy this application. In return, the ops team asks\
    \ the developer for the runbook (i.e., the operational guide), which contains\
    \ instruction for the deployment, the actions that need to be performed when an\
    \ exception occurs, and so on. The ops team also needs details on the configuration\
    \ of applications. A seasoned developer will even share information about external\
    \ properties and their locations on the server, which the ops team will use to\
    \ configure external properties with acceptable values. So far so good.\n\nThe\
    \ final question from the ops team is, “How do you monitor this application?”\
    \ Uh-oh, this was not mentioned in business requirement. So, the developer thinks\
    \ about the different options, such as asking his manager for more money to develop\
    \ a monitoring tool, which may not be possible.\n\nThe Spring Framework is one\
    \ of the most popular frameworks for building complex enterprise applications.\
    \ These applications used to be run on many servers for many domains and environments\
    \ such as a local build environment, a test environment, a QA environment, and\
    \ sometimes a user acceptance testing (UAT) environment, before being deployed\
    \ into the production environment. Each environment had different configurations,\
    \ such as in the local environment the developer might be using an open source\
    \ database, and in the production environment the database might be Oracle. Furthermore,\
    \ the local environment might be using ActiveMQ for messaging, and production\
    \ might be using an IBM messaging source. There are lots of things that need to\
    \ be addressed for enterprise needs such as continuous builds, and so on. It’s\
