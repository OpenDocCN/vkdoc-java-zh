- fmt: "### Using Spring Tool Suite\n\nThe Spring Tool Suite comes as a ready-to-use\
    \ distribution of the latest Eclipse releases with the Spring IDE components pre-installed.\
    \ Use a Spring Starter Project wizard to create a basic Spring Boot application\
    \ (Figure [1-9](#A436970_1_En_1_Chapter.html#Fig9)).\n\n![A436970_1_En_1_Fig9_HTML.jpg](A436970_1_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9. The wizard to create a Spring Boot application\n\nSpring Boot provides\
    \ so-called starters where you need to provide project-related details, as shown\
    \ in Figure [1-10](#A436970_1_En_1_Chapter.html#Fig10).\n\n![A436970_1_En_1_Fig10_HTML.jpg](A436970_1_En_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10. Spring starter project\n\nA starter in Spring Boot is a set of\
    \ classpath dependencies that autoconfigure an app and lets you develop an app\
    \ without needing to do any configuration. In this chapter, you will pick the\
    \ web dependencies because you’ll build a simple `HelloSpringBoot` RESTful service,\
    \ as shown in Figure [1-11](#A436970_1_En_1_Chapter.html#Fig11).\n\n![A436970_1_En_1_Fig11_HTML.jpg](A436970_1_En_1_Fig11_HTML.jpg)\n\
    \nFigure 1-11. Selecting a web dependency in the Spring starter\n\nClicking the\
    \ Finish button will generate a workspace where you can create a new package and\
    \ class and static files in your resources. The final structure of the project\
    \ will look like Figure [1-12](#A436970_1_En_1_Chapter.html#Fig12).\n\n![A436970_1_En_1_Fig12_HTML.jpg](A436970_1_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12. Project structure\n\nLet’s go through the code in the next section.\n\
    \n### A Walk-Through of the Code\n\nLet’s walk through the code for more details.\
    \ You will go through the code in `pom.xml` and in the Java files. Let’s start\
    \ with `pom.xml`.\n\n#### Looking at pom.xml\n\nAll the dependencies that you\
    \ select in the starter dialog while creating the Spring Boot application are\
    \ available in `pom.xml`, as shown in Listing [1-1](#A436970_1_En_1_Chapter.html#Par120).\
    \ The `pom.xml` file is the recipe that will be used to build your project.\n\n\
    ```\n4.0.0\ncom.apress.ravi.chapter1\nHelloSpringBoot\n0.0.1-SNAPSHOT\njar\nHelloSpringBoot\n\
    Hello Spring Boot application\n\norg.springframework.boot\nspring-boot-starter-parent\n\
    1.5.4.RELEASE\n\nUTF-8\nUTF-8\n1.8\n\norg.springframework.boot\nspring-boot-starter-web\n\
    \norg.springframework.boot\nspring-boot-starter-test\ntest\n\norg.springframework.boot\n\
    spring-boot-maven-plugin\n```\n\nListing 1-1. `pom.xml`\n\nNote the following\
    \ about Listing [1-1](#A436970_1_En_1_Chapter.html#Par120):\n\n*   The `<parent>`\
    \ element specifies the Spring Boot parent POM, which contains definitions for\
    \ common components.\n*   The `<dependency>` element on `spring-boot-starter-web`\
    \ tells Spring Boot that the application is a web application and lets Spring\
    \ Boot form its opinions accordingly.\n\nBefore going further, let’s understand\
    \ Spring Boot’s opinions. You need to understand how Spring Boot uses a starter\
    \ like `spring-boot-starter-web` to form its configuration opinions. The `HelloSpringBoot`\
    \ application uses `spring-boot-starter-web` as Spring Boot’s web application\
    \ starter. Based on this starter, Spring Boot has formed the following opinions:\n\
    \n*   Spring MVC for the REST framework\n*   Apache Jackson for the JSON binding\n\
    *   Tomcat embedded web server container\n*   Hibernate for object-relational\
    \ mapping\n\nAfter Spring Boot forms an opinion about the type of application\
    \ you intend to build, Spring Boot delivers a set of Maven dependencies based\
    \ on the POM contents and starter specified for the `HelloSpringBoot` application.\
    \ Figure [1-13](#A436970_1_En_1_Chapter.html#Fig13) shows some of the Maven dependencies\
    \ that Spring Boot has set up in STS.\n\n![A436970_1_En_1_Fig13_HTML.jpg](A436970_1_En_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13. Maven dependencies set up in STS\n\nYou can see in Figure [1-13](#A436970_1_En_1_Chapter.html#Fig13)\
    \ that Tomcat is the default embedded web server container. Suppose you want to\
    \ use Jetty instead of Tomcat; all you need to do is change the `<dependencies>`\
    \ section in the POM, as shown in Listing [1-2](#A436970_1_En_1_Chapter.html#Par131).\n\
    \n```\norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
    spring-boot-starter-tomcat\n\norg.springframework.boot\nspring-boot-starter-jetty\n\
    ```\n\nListing 1-2. `pom.xml` with Dependency for Tomcat and Jetty\n\nYou can\
    \ see in Figure [1-14](#A436970_1_En_1_Chapter.html#Fig14) that the Maven dependencies\
    \ for Tomcat are replaced with dependencies for Jetty.\n\n![A436970_1_En_1_Fig14_HTML.jpg](A436970_1_En_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14. Updated Maven dependencies\n\n#### Writing the Code\n\nTo bootstrap\
    \ a Spring Boot application, you can start from a `main()` method. Most likely\
    \ you can just delegate to the `static SpringApplication.run` method, as shown\
    \ in Listing [1-3](#A436970_1_En_1_Chapter.html#Par134).\n\n```\npackage com.apress.ravi.chapter1;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
    /**\n* @author RaviKantSoni\n*/\n@SpringBootApplication\n@RestController\npublic\
    \ class HelloSpringBootApplication {\npublic static void main(String[] args) {\n\
    SpringApplication.run(HelloSpringBootApplication.class, args);\n}\n@RequestMapping(\"\
    /hello\")\npublic String greeting(){\nreturn \"Hello World!\";\n}\n}\n```\n\n\
    Listing 1-3. `com.apress.ravi.chapter1.HelloSpringBootApplication.java`\n\nLet’s\
    \ step through the important parts.\n\n##### @SpringBootApplication Annotation\n\
    \nThe first annotation of the `HelloSpringBootApplication` class is `@SpringBootApplication`.\
    \ The `@SpringBootApplication` annotation is a convenience annotation introduced\
    \ in Spring Boot 1.2.0 and adds the following annotations:\n\n*   `@Configuration`:\
    \ A class annotated with the `@Configuration` annotation can be used by the Spring\
    \ container as a source of bean definitions, which is not specific to Spring Boot.\
    \ This class may contain one or more Spring bean declarations by annotated methods\
    \ with the `@Bean` annotation.\n*   `@EnableAutoConfiguration`: This annotation\
    \ is part of the Spring Boot project that tells Spring Boot to start adding the\
    \ beans using classpath definitions or settings. Autoconfiguration intelligently\
    \ guesses and configures beans that you are likely to run with the application\
    \ and thus simplifies the developer’s work.\n    *   For example, let’s assume\
    \ you have `tomcat-embedded.jar` on your classpath, and then you want a `TomcatEmbeddedServletContainerFactory`\
    \ bean to configure the Tomcat server. So, this will be automatically searched\
    \ for and configured without any manual XML configurations.\n    *   Normally,\
    \ for a Spring MVC application, you add the `@EnableWebMvc` annotation, which\
    \ flags the application as a web application and activates key features such as\
    \ setting up a `DispatcherServlet`, but Spring Boot will automatically add this\
    \ annotation when it sees `spring-webmvc` on the classpath. Similarly, the `@EnableTransactionManagement`\
    \ annotation will be automatically added, which will enable declarative transaction\
    \ management.\n*   `@ComponentScan`: This annotation tells Spring to look for\
    \ specific packages to scan for annotated components, configurations, and services.\n\
    \n##### @RestController and @RequestMapping Annotations\n\nThe first annotation\
    \ of the `HelloSpringBootApplication` class is `@RestController`, which is a stereotype\
    \ annotation. The `@RequestMapping` annotation provides “routing” information\
    \ and tells Spring that any HTTP request with the path `/hello` should be mapped\
    \ to the greeting method.\n\nThe `@RestController` and `@RequestMapping` annotations\
    \ come from Spring MVC (these annotations are not specific to Spring Boot)."
  raw: "##### Using Spring Tool Suite\n\nThe Spring Tool Suite comes as a ready-to-use\
    \ distribution of the latest Eclipse releases with the Spring IDE components pre-installed.\
    \ Use a Spring Starter Project wizard to create a basic Spring Boot application\
    \ (Figure [1-9](#A436970_1_En_1_Chapter.html#Fig9)).\n\n![A436970_1_En_1_Fig9_HTML.jpg](A436970_1_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9.\n\nThe wizard to create a Spring Boot application\n\nSpring Boot\
    \ provides so-called starters where you need to provide project-related details,\
    \ as shown in Figure [1-10](#A436970_1_En_1_Chapter.html#Fig10).\n\n![A436970_1_En_1_Fig10_HTML.jpg](A436970_1_En_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10.\n\nSpring starter project\n\nA starter in Spring Boot is a set\
    \ of classpath dependencies that autoconfigure an app and lets you develop an\
    \ app without needing to do any configuration. In this chapter, you will pick\
    \ the web dependencies because you’ll build a simple `HelloSpringBoot` RESTful\
    \ service, as shown in Figure [1-11](#A436970_1_En_1_Chapter.html#Fig11).\n\n\
    ![A436970_1_En_1_Fig11_HTML.jpg](A436970_1_En_1_Fig11_HTML.jpg)\n\nFigure 1-11.\n\
    \nSelecting a web dependency in the Spring starter\n\nClicking the Finish button\
    \ will generate a workspace where you can create a new package and class and static\
    \ files in your resources. The final structure of the project will look like Figure\
    \ [1-12](#A436970_1_En_1_Chapter.html#Fig12).\n\n![A436970_1_En_1_Fig12_HTML.jpg](A436970_1_En_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12.\n\nProject structure\n\nLet’s go through the code in the next section.\n\
    \n#### A Walk-Through of the Code\n\nLet’s walk through the code for more details.\
    \ You will go through the code in `pom.xml` and in the Java files. Let’s start\
    \ with `pom.xml`.\n\n##### Looking at pom.xml\n\nAll the dependencies that you\
    \ select in the starter dialog while creating the Spring Boot application are\
    \ available in `pom.xml`, as shown in Listing [1-1](#A436970_1_En_1_Chapter.html#Par120).\
    \ The `pom.xml` file is the recipe that will be used to build your project.\n\n\
    ```\n\n4.0.0\ncom.apress.ravi.chapter1\nHelloSpringBoot\n0.0.1-SNAPSHOT\njar\n\
    HelloSpringBoot\nHello Spring Boot application\n\norg.springframework.boot\nspring-boot-starter-parent\n\
    1.5.4.RELEASE\n\nUTF-8\nUTF-8\n1.8\n\norg.springframework.boot\nspring-boot-starter-web\n\
    \norg.springframework.boot\nspring-boot-starter-test\ntest\n\norg.springframework.boot\n\
    spring-boot-maven-plugin\n\nListing 1-1.\npom.xml\n```\n\nNote the following about\
    \ Listing [1-1](#A436970_1_En_1_Chapter.html#Par120):\n\n*   The `<parent>` element\
    \ specifies the Spring Boot parent POM, which contains definitions for common\
    \ components.\n*   The `<dependency>` element on `spring-boot-starter-web` tells\
    \ Spring Boot that the application is a web application and lets Spring Boot form\
    \ its opinions accordingly.\n\nBefore going further, let’s understand Spring Boot’s\
    \ opinions. You need to understand how Spring Boot uses a starter like `spring-boot-starter-web`\
    \ to form its configuration opinions. The HelloSpringBoot application uses `spring-boot-starter-web`\
    \ as Spring Boot’s web application starter. Based on this starter, Spring Boot\
    \ has formed the following opinions :\n\n*   Spring MVC for the REST framework\n\
    *   Apache Jackson for the JSON binding\n*   Tomcat embedded web server container\n\
    *   Hibernate for object-relational mapping\n\nAfter Spring Boot forms an opinion\
    \ about the type of application you intend to build, Spring Boot delivers a set\
    \ of Maven dependencies based on the POM contents and starter specified for the\
    \ HelloSpringBoot application. Figure [1-13](#A436970_1_En_1_Chapter.html#Fig13)\
    \ shows some of the Maven dependencies that Spring Boot has set up in STS .\n\n\
    ![A436970_1_En_1_Fig13_HTML.jpg](A436970_1_En_1_Fig13_HTML.jpg)\n\nFigure 1-13.\n\
    \nMaven dependencies set up in STS\n\nYou can see in Figure [1-13](#A436970_1_En_1_Chapter.html#Fig13)\
    \ that Tomcat is the default embedded web server container. Suppose you want to\
    \ use Jetty instead of Tomcat; all you need to do is change the `<dependencies>`\
    \ section in the POM, as shown in Listing [1-2](#A436970_1_En_1_Chapter.html#Par131).\n\
    \n```\norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
    spring-boot-starter-tomcat\n\norg.springframework.boot\nspring-boot-starter-jetty\n\
    \nListing 1-2.\npom.xml with Dependency for Tomcat and Jetty\n```\n\nYou can see\
    \ in Figure [1-14](#A436970_1_En_1_Chapter.html#Fig14) that the Maven dependencies\
    \ for Tomcat are replaced with dependencies for Jetty.\n\n![A436970_1_En_1_Fig14_HTML.jpg](A436970_1_En_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14.\n\nUpdated Maven dependencies\n\n##### Writing the Code\n\nTo bootstrap\
    \ a Spring Boot application, you can start from a `main()` method. Most likely\
    \ you can just delegate to the `static SpringApplication.run` method , as shown\
    \ in Listing [1-3](#A436970_1_En_1_Chapter.html#Par134).\n\n```\npackage com.apress.ravi.chapter1;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
    /**\n* @author RaviKantSoni\n*/\n@SpringBootApplication\n@RestController\npublic\
    \ class HelloSpringBootApplication {\npublic static void main(String[] args) {\n\
    SpringApplication.run(HelloSpringBootApplication.class, args);\n}\n@RequestMapping(\"\
    /hello\")\npublic String greeting(){\nreturn \"Hello World!\";\n}\n}\nListing\
    \ 1-3.\ncom.apress.ravi.chapter1.HelloSpringBootApplication.java\n```\n\nLet’s\
    \ step through the important parts.\n\n###### @SpringBootApplication Annotation\n\
    \nThe first annotation of the `HelloSpringBootApplication` class is `@SpringBootApplication`.\
    \ The `@SpringBootApplication` annotation is a convenience annotation introduced\
    \ in Spring Boot 1.2.0 and adds the following annotations:\n\n*   `@Configuration`:\
    \ A class annotated with the `@Configuration` annotation can be used by the Spring\
    \ container as a source of bean definitions, which is not specific to Spring Boot.\
    \ This class may contain one or more Spring bean declarations by annotated methods\
    \ with the `@Bean` annotation.\n*   `@EnableAutoConfiguration`: This annotation\
    \ is part of the Spring Boot project that tells Spring Boot to start adding the\
    \ beans using classpath definitions or settings. Autoconfiguration intelligently\
    \ guesses and configures beans that you are likely to run with the application\
    \ and thus simplifies the developer’s work.\n    *   For example, let’s assume\
    \ you have `tomcat-embedded.jar` on your classpath, and then you want a `TomcatEmbeddedServletContainerFactory`\
    \ bean to configure the Tomcat server. So, this will be automatically searched\
    \ for and configured without any manual XML configurations.\n    *   Normally,\
    \ for a Spring MVC application, you add the `@EnableWebMvc` annotation, which\
    \ flags the application as a web application and activates key features such as\
    \ setting up a `DispatcherServlet`, but Spring Boot will automatically add this\
    \ annotation when it sees `spring-webmvc` on the classpath. Similarly, the `@EnableTransactionManagement`\
    \ annotation will be automatically added, which will enable declarative transaction\
    \ management.\n*   `@ComponentScan`: This annotation tells Spring to look for\
    \ specific packages to scan for annotated components, configurations, and services.\n\
    \n###### @RestController and @RequestMapping Annotations\n\nThe first annotation\
    \ of the `HelloSpringBootApplication` class is `@RestController`, which is a stereotype\
    \ annotation. The `@RequestMapping` annotation provides “routing” information\
    \ and tells Spring that any HTTP request with the path `/hello` should be mapped\
    \ to the greeting method.\n\nThe `@RestController` and `@RequestMapping` annotations\
    \ come from Spring MVC (these annotations are not specific to Spring Boot)."
  trans: "\n##### 使用 Spring Tool Suite\n\nSpring Tool Suite 是一个开箱即用的最新 Eclipse 发行版，并预装了\
    \ Spring IDE 组件。使用 Spring Starter Project 向导可以创建一个基本的 Spring Boot 应用程序（图 1-9）。\n\
    \n![A436970_1_En_1_Fig9_HTML.jpg](img/A436970_1_En_1_Fig9_HTML.jpg)\n\n图 1-9.\n\
    \n创建 Spring Boot 应用程序的向导\n\nSpring Boot 提供了所谓的启动器（starters），你需要提供项目相关的详细信息，如图\
    \ 1-10 所示。\n\n![A436970_1_En_1_Fig10_HTML.jpg](img/A436970_1_En_1_Fig10_HTML.jpg)\n\
    \n图 1-10.\n\nSpring 启动器项目\n\nSpring Boot 中的启动器是一组类路径依赖项，它们可以自动配置应用程序，让你无需进行任何配置即可开发应用。在本章中，你将选择\
    \ Web 依赖项，因为你将构建一个简单的 `HelloSpringBoot` RESTful 服务，如图 1-11 所示。\n\n![A436970_1_En_1_Fig11_HTML.jpg](img/A436970_1_En_1_Fig11_HTML.jpg)\n\
    \n图 1-11.\n\n在 Spring 启动器中选择 Web 依赖项\n\n点击“完成”按钮将生成一个工作空间，你可以在其中创建新的包、类和静态文件（位于\
    \ resources 目录下）。项目的最终结构将如图 1-12 所示。\n\n![A436970_1_En_1_Fig12_HTML.jpg](img/A436970_1_En_1_Fig12_HTML.jpg)\n\
    \n图 1-12.\n\n项目结构\n\n让我们在下一节中浏览代码。\n\n#### 代码概览\n\n让我们详细浏览代码。你将查看 `pom.xml` 和\
    \ Java 文件中的代码。先从 `pom.xml` 开始。\n\n##### 查看 pom.xml\n\n在创建 Spring Boot 应用程序时，你在启动器对话框中选择的所有依赖项都会出现在\
    \ `pom.xml` 中，如代码清单 1-1 所示。`pom.xml` 文件是用于构建项目的配方。\n\n```\n\n4.0.0\ncom.apress.ravi.chapter1\n\
    HelloSpringBoot\n0.0.1-SNAPSHOT\njar\nHelloSpringBoot\nHello Spring Boot application\n\
    \norg.springframework.boot\nspring-boot-starter-parent\n1.5.4.RELEASE\n\nUTF-8\n\
    UTF-8\n1.8\n\norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
    spring-boot-starter-test\ntest\n\norg.springframework.boot\nspring-boot-maven-plugin\n\
    \n代码清单 1-1.\npom.xml\n```\n\n关于代码清单 1-1，请注意以下几点：\n\n*   `<parent>` 元素指定了 Spring\
    \ Boot 的父 POM，其中包含通用组件的定义。\n*   `spring-boot-starter-web` 的 `<dependency>` 元素告诉\
    \ Spring Boot 该应用程序是一个 Web 应用程序，并让 Spring Boot 据此形成其“观点”。\n\n在进一步深入之前，让我们先理解 Spring\
    \ Boot 的“观点”。你需要了解 Spring Boot 如何使用像 `spring-boot-starter-web` 这样的启动器来形成其配置观点。HelloSpringBoot\
    \ 应用程序使用 `spring-boot-starter-web` 作为 Spring Boot 的 Web 应用程序启动器。基于此启动器，Spring\
    \ Boot 形成了以下观点：\n\n*   使用 Spring MVC 作为 REST 框架\n*   使用 Apache Jackson 进行 JSON\
    \ 绑定\n*   使用 Tomcat 作为嵌入式 Web 服务器容器\n*   使用 Hibernate 进行对象关系映射\n\n在 Spring Boot\
    \ 对你打算构建的应用程序类型形成观点后，它会根据 POM 内容和为 HelloSpringBoot 应用程序指定的启动器，提供一组 Maven 依赖项。图\
    \ 1-13 显示了 Spring Boot 在 STS 中设置的部分 Maven 依赖项。\n\n![A436970_1_En_1_Fig13_HTML.jpg](img/A436970_1_En_1_Fig13_HTML.jpg)\n\
    \n图 1-13.\n\n在 STS 中设置的 Maven 依赖项\n\n你可以在图 1-13 中看到，Tomcat 是默认的嵌入式 Web 服务器容器。假设你想使用\
    \ Jetty 代替 Tomcat；你只需要更改 POM 中的 `<dependencies>` 部分，如代码清单 1-2 所示。\n\n```\norg.springframework.boot\n\
    spring-boot-starter-web\n\norg.springframework.boot\nspring-boot-starter-tomcat\n\
    \norg.springframework.boot\nspring-boot-starter-jetty\n\n代码清单 1-2.\n包含 Tomcat\
    \ 和 Jetty 依赖项的 pom.xml\n```\n\n你可以在图 1-14 中看到，Tomcat 的 Maven 依赖项已被替换为 Jetty 的依赖项。\n\
    \n![A436970_1_En_1_Fig14_HTML.jpg](img/A436970_1_En_1_Fig14_HTML.jpg)\n\n图 1-14.\n\
    \n更新后的 Maven 依赖项\n\n##### 编写代码\n\n要启动一个 Spring Boot 应用程序，你可以从一个 `main()` 方法开始。大多数情况下，你只需委托给\
    \ `static SpringApplication.run` 方法，如代码清单 1-3 所示。\n\n```\npackage com.apress.ravi.chapter1;\n\
    import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
    import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
    /**\n* @author RaviKantSoni\n*/\n@SpringBootApplication\n@RestController\npublic\
    \ class HelloSpringBootApplication {\npublic static void main(String[] args) {\n\
    SpringApplication.run(HelloSpringBootApplication.class, args);\n}\n@RequestMapping(\"\
    /hello\")\npublic String greeting(){\nreturn \"Hello World!\";\n}\n}\n代码清单 1-3.\n\
    com.apress.ravi.chapter1.HelloSpringBootApplication.java\n```\n\n让我们逐步了解重要的部分。\n\
    \n###### @SpringBootApplication 注解\n\n`HelloSpringBootApplication` 类的第一个注解是 `@SpringBootApplication`。`@SpringBootApplication`\
    \ 注解是 Spring Boot 1.2.0 中引入的一个便捷注解，它包含了以下注解：\n\n*   `@Configuration`：被 `@Configuration`\
    \ 注解标记的类可以被 Spring 容器用作 bean 定义的来源，这并非 Spring Boot 特有。该类可能包含一个或多个通过 `@Bean` 注解方法声明的\
    \ Spring bean。\n*   `@EnableAutoConfiguration`：此注解是 Spring Boot 项目的一部分，它告诉 Spring\
    \ Boot 开始使用类路径定义或设置来添加 bean。自动配置会智能地猜测并配置你很可能在应用程序中运行的 bean，从而简化开发者的工作。\n    *\
    \   例如，假设你的类路径上有 `tomcat-embedded.jar`，那么你可能需要一个 `TomcatEmbeddedServletContainerFactory`\
    \ bean 来配置 Tomcat 服务器。因此，这将被自动搜索和配置，无需任何手动的 XML 配置。\n    *   通常，对于 Spring MVC\
    \ 应用程序，你会添加 `@EnableWebMvc` 注解，该注解将应用程序标记为 Web 应用程序并激活关键功能，例如设置 `DispatcherServlet`，但\
    \ Spring Boot 在类路径上发现 `spring-webmvc` 时会自动添加此注解。类似地，`@EnableTransactionManagement`\
    \ 注解也会被自动添加，从而启用声明式事务管理。\n*   `@ComponentScan`：此注解告诉 Spring 查找特定的包，以扫描带注解的组件、配置和服务。\n\
    \n###### @RestController 和 @RequestMapping 注解\n\n`HelloSpringBootApplication`\
    \ 类的第一个注解是 `@RestController`，这是一个构造型注解。`@RequestMapping` 注解提供了“路由”信息，并告诉 Spring\
    \ 任何路径为 `/hello` 的 HTTP 请求都应映射到 `greeting` 方法。\n\n`@RestController` 和 `@RequestMapping`\
    \ 注解来自 Spring MVC（这些注解并非 Spring Boot 特有）。\n"
- fmt: "### The Main Method\n\nThe main part of the `HelloSpringBootApplication` class\
    \ is the `main` method. The Spring application developed using Spring Boot contains\
    \ the `main` method, which calls Spring Boot’s `SpringApplication.run()` method\
    \ to launch an application, as shown in the previous code. The class that contains\
    \ a `main` method is referred to as the main class and is annotated with the `@SpringBootApplication`\
    \ annotation.\n\n### Running a Spring Boot Application in STS\n\nThe Spring Boot\
    \ application created using the Spring Starter Project wizard comes in two flavors:\
    \ WAR and JAR. This wizard allows you to choose between WAR and JAR in its packaging\
    \ option.\n\n> As Josh Long said in one of his talks in the Spring IO, “Make JAR,\
    \ not WAR.” — [`https://twitter.com/springcentral/status/598910532008062976`](https://twitter.com/springcentral/status/598910532008062976)\n\
    \nSpring Boot favors JARs over WARs by allowing you to easily create stand-alone\
    \ JAR packaged projects that add an embedded web server (Apache Tomcat is the\
    \ default web server) inside the created artifact, and it helps developers reduce\
    \ the overhead of setting up local or remote Tomcat servers, WAR packaging, and\
    \ deploying.\n\nTo run the Spring Boot application locally, you don’t need any\
    \ special tooling from STS. You just need to run it by selecting Run As ➤ Java\
    \ Application, either from the standard Eclipse Java debugging tools or from STS.\n\
    \nThe benefits of using STS over IDEs are that it provides a dedicated launcher,\
    \ which does the same thing as an IDE but adds a few useful bells and whistles\
    \ on the top of that. So, let’s use STS to run the Spring Boot application, as\
    \ shown in Figure [1-15](#A436970_1_En_1_Chapter.html#Fig15).\n\nRight-click the\
    \ project `fullstackdeveloper` and select Run As ➤ Spring Boot App.\n\n![A436970_1_En_1_Fig15_HTML.jpg](A436970_1_En_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15. Wizard in STS to run application\n\nThe Spring Boot application\
    \ starts with some output in the console, as shown in Figure [1-16](#A436970_1_En_1_Chapter.html#Fig16).\n\
    \n![A436970_1_En_1_Fig16_HTML.jpg](A436970_1_En_1_Fig16_HTML.jpg)\n\nFigure 1-16.\
    \ Output on the console\n\nIf the application starts successfully, the last line\
    \ of the console output from Spring Boot will contain the words `Started HelloSpringBootApplication`.\n\
    \nCongratulations! You have successfully set up and run the application using\
    \ Spring Boot. Now it’s time to visit `http://localhost:8080/hello` in the browser\
    \ to see the web page, as shown in Figure [1-17](#A436970_1_En_1_Chapter.html#Fig17).\n\
    \n![A436970_1_En_1_Fig17_HTML.jpg](A436970_1_En_1_Fig17_HTML.jpg)\n\nFigure 1-17.\
    \ Accessing the REST endpoint from the browser\n\n### Starters\n\nStarters are\
    \ a set of convenient dependency descriptors that you can include in your application.\
    \ They contain a lot of dependencies that you need to get your project up and\
    \ running quickly. The starter POMs are dependency descriptors that can be added\
    \ to your application’s Maven.\n\nIn simple words, if you are developing a project\
    \ that uses Spring MVC for HTTP request processing, you just have to include `spring-boot-starter-web`,\
    \ which will import all the required dependencies for the Spring MVC application\
    \ such as `view-resolver`, `tomcat`, and so on. This reduces the burden of configuring\
    \ all the required dependencies for a framework.\n\nYou can refer to [`http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#using-boot-starter`](http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#using-boot-starter)\
    \ for a complete list of starters.\n\n### Spring Boot Actuator: Production-Ready\
    \ Features\n\nSpring Boot has a bunch of features that let you monitor your Spring\
    \ Boot application in production or any environment after you deploy it. For example,\
    \ you can get logs, perform thread dumps, view metrics, analyze garbage collection,\
    \ and show beans configured in `BeanFactory`. This information can be exposed\
    \ via HTTP or JMX, and it even can be logged into the process via SSH.\n\n####\
    \ Enabling Actuator\n\nActuator HTTP endpoints are available only to Spring MVC.\
    \ This is a new endpoint that gets added to your application without you writing\
    \ a controller. The definition of an actuator is a production-ready feature to\
    \ help you monitor and manage your application.\n\nThe simplest way to enable\
    \ the production-ready feature is to add the `spring-boot-actuator` module dependency\
    \ `spring-boot-starter-actuator` from the Spring starter, as shown in Figure [1-18](#A436970_1_En_1_Chapter.html#Fig18).\n\
    \n![A436970_1_En_1_Fig18_HTML.jpg](A436970_1_En_1_Fig18_HTML.jpg)\n\nFigure 1-18.\
    \ Actuator dependency in Spring Initializr\n\nTo add the actuator to a Maven-based\
    \ project, add the following `starter` dependency in `pom.xml`:\n\n```\n<dependency>\n\
    \    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-actuator</artifactId>\n\
    </dependency>\n```\n\n#### Running the Application\n\nOnce you run the Spring\
    \ Boot application, the actuator endpoints will be logged in the console, as shown\
    \ in Figure [1-19](#A436970_1_En_1_Chapter.html#Fig19).\n\n![A436970_1_En_1_Fig19_HTML.jpg](A436970_1_En_1_Fig19_HTML.jpg)\n\
    \nFigure 1-19. Actuator endpoints in console log\n\n#### Using Actuator Endpoints\n\
    \nSpring Boot includes a number of actuator endpoints, which allow you to monitor\
    \ and interact with your Spring Boot application. Most of the endpoints are sensitive,\
    \ and they are not fully public, while a few are not such as `/health` and `/info`.\n\
    \nThe following are some of the common endpoints Spring Boot provides out of the\
    \ box:\n\n*   `/health` shows health information for a running Boot application.\
    \ By default, it is not sensitive.\n*   `/info` displays arbitrary application\
    \ information. By default, it is not sensitive.\n*   `/metrics` shows metrics\
    \ information for a running Boot application. By default, it is sensitive.\n\n\
    #### Customizing the Management Server Port\n\nIf your Spring Boot application\
    \ is running inside your own data center, then you may prefer to expose endpoints\
    \ using the default HTTP port of 8080. But for cloud-based deployments, exposing\
    \ management endpoints using the default HTTP port 8080 is a sensible choice.\
    \ The `management.port` property can be used to change the HTTP port.\n\nYou can\
    \ assign port number 8081 to the `management.port` property using `src\\main\\\
    resources\\application.properties` file: `management.port=8081`.\n\n#### Getting\
    \ Health Information\n\nThe `/health` endpoint can be used to check the health/status\
    \ of your running Spring Boot application. It returns a JSON file with a bunch\
    \ of matrixes. Going to `http://localhost:8081/health` in the browser will give\
    \ the results shown in Figure [1-20](#A436970_1_En_1_Chapter.html#Fig20).\n\n\
