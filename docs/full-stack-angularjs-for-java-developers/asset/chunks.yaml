  raw: '#### Spring Framework Problems and Spring Boot Advantages


    Let’s understand some of the Spring Framework’s problems. Spring Framework was
    mostly about dependency injection in 2006\. Later it grew and became a whole application
    framework that lets you build enterprise Java applications. It addresses most
    of the business logic such as handling transactions by providing templates to
    create an easy-to-build enterprise application.


    The Spring Framework also has a configuration module where Spring handles lots
    of common concerns such as handling HTTP requests, connecting to databases, and
    so on, and it allows the developer to focus on business services. The developer
    develops business services and annotates classes with Spring-provided annotations,
    which lets Spring know about those services. Spring also has infrastructure support
    such as connecting to an RDBMS database or a MongoDB database.


    But while bringing these features, Spring also brings some problems such as it
    is a huge framework that has multiple setup and configuration steps. There are
    multiple build and deploy steps.


    To address these problems, Spring Boot came into the picture. Spring Boot abstracts
    these steps and allows developers to once again focus on the business logic. Spring
    Boot’s main aim is to address the complexity of configuration in the Spring Framework
    by taking most of the work out of configuring Spring-based applications; there
    is no need for XML or code configuration most of the time.


    Another interesting feature that Spring Boot provides is “no WAR, only JAR.” So,
    you don’t have to generate a WAR file and then upload it to a Tomcat server; you
    can create self-hosted web applications and execute them as Java JAR applications,
    making the deployment extremely easy and straightforward.


    Spring Boot has opinions, which means Spring Boot has reasonable defaults. You
    can build an application quickly using these commonly used values. Spring Boot
    automatically configures the required classes depending on the libraries on its
    classpath.


    Suppose your application wants to interact with the database. If there are Spring
    Data libraries on a class path, then Spring Data automatically sets up a connection
    to a database along with the data source class. Since Tomcat is a popular web
    container, by default a Spring Boot web application uses an embedded Tomcat container.


    With Spring Boot, you can expose components such as REST services independently,
    the same as proposed in the microservices architecture, so that when maintaining
    any of the components, you no longer have to redeploy the entire system.


    #### Primary Goals of Spring Boot


    The following are the primary goals of Spring Boot:


    *   To provide production-ready applications and services with minimum fuss that
    anyone can “just run.”

    *   To be opinionated, which means making certain decisions for developers and
    supporting ranges of nonfunctional features that are common for enterprise applications
    (embedded servers, security, health checks, metrics, and externalized configuration)

    *   To support convention over configuration, avoid XML configuration completely,
    and avoid annotation configuration

    *   To allow developers to customize Spring Boot applications to their liking


    #### Develop Your First Spring Boot Application


    In this section, you will develop your first Spring Boot application step by step.
    If you are already familiar with this process, you can skip to the end to see
    how it all fits together. There are different options for starting a new project.
    For more details, refer to [`https://spring.io/`](https://spring.io/) .


    ##### System Requirements


    Spring Boot 2.0.0.M2 requires Java 8\. So, the first thing that is required is
    the Java 8 SDK. If you have already set up the JDK in your system, you should
    check the current version of Java installed on your system before you begin.


    ```

    $ java -version

    java version "1.8.0_101"

    Java(TM) SE Runtime Environment (build 1.8.0_101-b13)

    Java HotSpot(TM) 64-Bit Server VM (build 25.101-b13, mixed mode)

    ```


    The Spring team has provided the following three approaches to create a Spring
    Boot application using the opinionated approach:


    *   Using the Spring Boot CLI tool

    *   Using the Spring STS IDE

    *   Using Spring Initializr ( [`http://start.spring.io/`](http://start.spring.io/)
    )


    A developer can develop Spring Boot Groovy applications using the Spring Boot
    CLI, Spring STS IDE, or Spring Initializr web site. They can develop Spring Boot
    Java applications using the Spring STS IDE or Spring Initializr web site.


    ##### Using the Spring Boot CLI


    Spring Boot has a command-line interface that lets developer create Spring Boot
    applications. I will not be covering this topic in this book; for information
    about it, you can refer to [`http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#getting-started-installing-the-cli`](http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#getting-started-installing-the-cli)
    .


    ##### Using Spring Initializr


    To start a new Spring Boot project from absolutely nothing, you can create a new
    project from the web service called Spring Initializr provided by Spring Boot:
    [`http://start.spring.io/`](http://start.spring.io/) . By entering the required
    information and selecting a set of desired options (dependencies), you can download
    either a build file project or a zipped file project that contains a standard
    Maven or Gradle project in the root directory.


    This lets you bootstrap an application by choosing options and downloading it.
    You can select the type of project such as Maven or Gradle, and you can select
    the version for Spring Boot. Also, you can select Project Metadata, as shown in
    Figure [1-7](#A436970_1_En_1_Chapter.html#Fig7).


    ![A436970_1_En_1_Fig7_HTML.jpg](A436970_1_En_1_Fig7_HTML.jpg)


    Figure 1-7.


    Spring Initializr


    You will be developing a Maven project in this book.


    The screen in Figure [1-7](#A436970_1_En_1_Chapter.html#Fig7) is a bit long so
    was cut off. Table [1-1](#A436970_1_En_1_Chapter.html#Tab1) shows you all the
    settings for this example.


    Table 1-1.


    Project-Related Details


    | Field | Value |

    | --- | --- |

    | Group | com.apress.ravi.chapter [1](#A436970_1_En_1_Chapter.html) |

    | Artifact | HelloSpringBoot |

    | Name | HelloSpringBoot |

    | Description | Hello Spring Boot application |

    | Package Name | com.apress.ravi.chapter [1](#A436970_1_En_1_Chapter.html) |

    | Packaging | Jar |

    | Java Version | 1.8 |

    | Language | Java |

    | Project dependencies | Web |

    | Generate a | Maven Project |


    Spring Boot lets developers create executable JARs that can be started using `java
    -jar` or more traditional WAR deployments. You can get a list of dependencies
    that you select based on your requirements. To create the HelloSpringBoot application,
    I have chosen a web dependency that supports full stack web development with Tomcat
    and Spring MVC, as shown in Figure [1-8](#A436970_1_En_1_Chapter.html#Fig8).


    ![A436970_1_En_1_Fig8_HTML.jpg](A436970_1_En_1_Fig8_HTML.jpg)


    Figure 1-8.


    Web dependency in Spring Initializr


    Click the Generate Project button to download the `HelloSpringBoot.zip` file.
    You can import a Maven project (after unzipping it) directly into the Spring Source
    Tool (STS) and work your way through it from there.


    I will be using STS as an IDE throughout this book. If you don’t have STS installed
    yet, visit [`https://spring.io/tools/sts/all`](https://spring.io/tools/sts/all)
    and download a copy for your operating system. To install it, simply unpack the
    downloaded archive. When you’re done, go ahead and launch STS.


    Another option for creating a Spring Boot project is to use a wizard by selecting
    File ➤ New ➤ Spring Starter Project.'
  trans: '

    #### Spring Framework 的问题与 Spring Boot 的优势


    我们先来了解 Spring Framework 的一些问题。2006 年时，Spring Framework 主要关注依赖注入。后来它不断发展，演变成一个完整的应用框架，可用于构建企业级
    Java 应用程序。它通过提供模板来简化企业应用的构建，从而处理了大部分业务逻辑，例如事务处理。


    Spring Framework 还拥有一个配置模块，Spring 在此处理许多常见问题，例如处理 HTTP 请求、连接数据库等，这使得开发者能够专注于业务服务。开发者开发业务服务，并使用
    Spring 提供的注解来标注类，从而让 Spring 知晓这些服务。Spring 还提供基础设施支持，例如连接 RDBMS 数据库或 MongoDB 数据库。


    然而，在带来这些功能的同时，Spring 也带来了一些问题，例如它是一个庞大的框架，包含多个设置和配置步骤。此外，还有多个构建和部署步骤。


    为了解决这些问题，Spring Boot 应运而生。Spring Boot 将这些步骤抽象化，使开发者能够再次专注于业务逻辑。Spring Boot 的主要目标是通过承担配置基于
    Spring 的应用的大部分工作，来解决 Spring Framework 中配置的复杂性；大多数情况下，无需 XML 或代码配置。


    Spring Boot 提供的另一个有趣特性是“无 WAR，仅 JAR”。因此，你无需生成 WAR 文件再上传到 Tomcat 服务器；你可以创建自托管的
    Web 应用程序，并将其作为 Java JAR 应用程序执行，这使得部署变得极其简单直接。


    Spring Boot 具有“约定优于配置”的特性，这意味着它提供了合理的默认值。你可以使用这些常用值快速构建应用程序。Spring Boot 会根据其类路径上的库自动配置所需的类。


    假设你的应用程序需要与数据库交互。如果类路径上有 Spring Data 库，那么 Spring Data 会自动设置与数据库的连接以及数据源类。由于 Tomcat
    是一个流行的 Web 容器，默认情况下，Spring Boot Web 应用程序会使用内嵌的 Tomcat 容器。


    使用 Spring Boot，你可以独立地暴露诸如 REST 服务之类的组件，这与微服务架构中提出的理念一致，这样在维护任何组件时，你无需重新部署整个系统。


    #### Spring Boot 的主要目标


    以下是 Spring Boot 的主要目标：


    *   以最少的麻烦提供生产就绪的应用程序和服务，任何人都可以“直接运行”。

    *   坚持“约定优于配置”，即为开发者做出某些决策，并支持企业应用常见的一系列非功能性特性（内嵌服务器、安全性、健康检查、指标和外部化配置）。

    *   支持约定优于配置，完全避免 XML 配置，并避免注解配置。

    *   允许开发者根据自己的喜好自定义 Spring Boot 应用程序。


    #### 开发你的第一个 Spring Boot 应用程序


    在本节中，你将逐步开发你的第一个 Spring Boot 应用程序。如果你已经熟悉此过程，可以跳到末尾查看所有内容如何整合在一起。启动新项目有多种不同的选项。更多详情，请参考
    [`https://spring.io/`](https://spring.io/) 。


    ##### 系统要求


    Spring Boot 2.0.0.M2 需要 Java 8。因此，首先需要的是 Java 8 SDK。如果你已经在系统中设置了 JDK，那么在开始之前，你应该检查系统上安装的
    Java 当前版本。


    ```

    $ java -version

    java version "1.8.0_101"

    Java(TM) SE Runtime Environment (build 1.8.0_101-b13)

    Java HotSpot(TM) 64-Bit Server VM (build 25.101-b13, mixed mode)

    ```


    Spring 团队提供了以下三种方法来使用“约定优于配置”的方式创建 Spring Boot 应用程序：


    *   使用 Spring Boot CLI 工具

    *   使用 Spring STS IDE

    *   使用 Spring Initializr ( [`http://start.spring.io/`](http://start.spring.io/)
    )


    开发者可以使用 Spring Boot CLI、Spring STS IDE 或 Spring Initializr 网站来开发 Spring Boot Groovy
    应用程序。他们可以使用 Spring STS IDE 或 Spring Initializr 网站来开发 Spring Boot Java 应用程序。


    ##### 使用 Spring Boot CLI


    Spring Boot 有一个命令行界面，允许开发者创建 Spring Boot 应用程序。本书不会涉及此主题；有关信息，你可以参考 [`http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#getting-started-installing-the-cli`](http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#getting-started-installing-the-cli)
    。


    ##### 使用 Spring Initializr


    要从零开始启动一个新的 Spring Boot 项目，你可以通过 Spring Boot 提供的名为 Spring Initializr 的 Web 服务创建一个新项目：[`http://start.spring.io/`](http://start.spring.io/)
    。通过输入所需信息并选择一组所需的选项（依赖项），你可以下载一个构建文件项目或一个压缩文件项目，其中包含根目录下的标准 Maven 或 Gradle 项目。


    这让你可以通过选择选项并下载来引导一个应用程序。你可以选择项目类型，例如 Maven 或 Gradle，并且可以选择 Spring Boot 的版本。此外，你还可以选择项目元数据，如图
    1-7 所示。


    ![A436970_1_En_1_Fig7_HTML.jpg](img/A436970_1_En_1_Fig7_HTML.jpg)


    图 1-7.


    Spring Initializr


    本书中你将开发一个 Maven 项目。


    图 1-7 中的屏幕截图有点长，因此被截断了。表 1-1 显示了此示例的所有设置。


    表 1-1.


    项目相关详情


    | 字段 | 值 |

    | --- | --- |

    | Group | com.apress.ravi.chapter 1 |

    | Artifact | HelloSpringBoot |

    | Name | HelloSpringBoot |

    | Description | Hello Spring Boot 应用程序 |

    | Package Name | com.apress.ravi.chapter 1 |

    | Packaging | Jar |

    | Java Version | 1.8 |

    | Language | Java |

    | Project dependencies | Web |

    | Generate a | Maven Project |


    Spring Boot 允许开发者创建可执行的 JAR，这些 JAR 可以使用 `java -jar` 启动，或者采用更传统的 WAR 部署方式。你可以根据需求获取所选依赖项的列表。为了创建
    HelloSpringBoot 应用程序，我选择了一个 Web 依赖项，它支持使用 Tomcat 和 Spring MVC 进行全栈 Web 开发，如图 1-8
    所示。


    ![A436970_1_En_1_Fig8_HTML.jpg](img/A436970_1_En_1_Fig8_HTML.jpg)


    图 1-8.


    Spring Initializr 中的 Web 依赖项


    点击“Generate Project”按钮下载 `HelloSpringBoot.zip` 文件。你可以将 Maven 项目（解压后）直接导入 Spring
    Source Tool (STS)，并从中开始工作。


    本书将全程使用 STS 作为 IDE。如果你尚未安装 STS，请访问 [`https://spring.io/tools/sts/all`](https://spring.io/tools/sts/all)
    并为你的操作系统下载一份副本。要安装它，只需解压下载的存档文件。完成后，继续启动 STS。


    创建 Spring Boot 项目的另一个选项是使用向导，方法是选择 File ➤ New ➤ Spring Starter Project。

