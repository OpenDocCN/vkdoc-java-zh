    #### Externalizing Error Messages


    Up to now you have made good progress with input data validation, and the client
    is able to receive a descriptive error message that lets the client troubleshoot
    issues and recover from those errors while consuming the API.


    Even though the error message that you saw in the previous section is descriptive,
