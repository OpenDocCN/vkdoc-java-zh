    ### Running the Application


    Let’s restart the `UserRegistrationSystem` application and visit the URL `http://localhost:8080/#/list-all-users`
    in the browser. The `list-all-users` page will display in the browser without
    displaying any pop-up for authentication, as shown in Figure [5-3](#A436970_1_En_5_Chapter.html#Fig3).


    ![A436970_1_En_5_Fig3_HTML.jpg](A436970_1_En_5_Fig3_HTML.jpg)


    Figure 5-3. The `list-all-users` page displaying in the browser


    #### HTTP Request with Basic Authentication Header: Verify in Developer Tools


    You can verify the HTTP request that the Basic Authentication header sent while
    requesting the URL `http://localhost:8080/#/list-all-users`. Open Developer Tools
    in the browser (here, it’s a Chrome browser), select Network, and click the Headers
    tab to monitor the request headers with authorization data, as shown in Figure
    [5-4](#A436970_1_En_5_Chapter.html#Fig4).


    ![A436970_1_En_5_Fig4_HTML.jpg](A436970_1_En_5_Fig4_HTML.jpg)


    Figure 5-4. Monitoring Basic Authentication header in Developer Tools


    So far, you have successfully sent an authorization header with each request using
    the interceptor, and you were able to consume a secured REST endpoint. You have
    configured a single user in the AngularJS interceptor to perform Basic Authentication.
    An issue will arise when you have more than one user with different roles. To
    address this issue, you need to have a login page where you can enter a username
    and password to get authenticated and authorized before accessing any resource,
    and you need to have a Logout button on the web page.


    In the next section, you will create a login page and perform the login and logout
    authentication process. You will be using form-based authentication in your `UserRegistrationSystem`
    application, which will provide more flexibility than HTTP Basic Authentication.


    ## The Login Page


    In this section, you will be using AngularJS to authenticate a user via a login
    form and fetch a secured resource to render JSON data in the UI. This login form
    gives the user some control over whether to authenticate.


    ### Updating `index.html`: Adding Navigation to the Welcome Page


    As you saw in Chapter [3](#A436970_1_En_3_Chapter.html), `index.html` is the core
    of an SPA, and you already have a really basic one so far. You need to offer some
    more navigation features such as login and logout capabilities. So, let’s modify
    your existing `src/main/resources/static/index.html` file, as shown in Listing
    [5-5](#A436970_1_En_5_Chapter.html#Par31).


    ```

    Full Stack Development


    User Registration System


    Login


    Login to go to Home Page


    Home


    Register New User


    List All Users


    Logout


    Listing 5-5.

    Updating src/main/resources/static/index.html

    ```


    As shown in Listing [5-5](#A436970_1_En_5_Chapter.html#Par31), the updated `index.html`
    is not that different from the original one. You added a new `div` containing
    an anchor tag for login. And you added an anchor tag for logout. You used AngularJS’s
    `ng-show` to hide/show elements on the page based on `authenticated`.


    ### Updating `app.js`: Adding Navigation to the Angular Application


    You now need to update the `UserRegistrationSystem` application (in `src/main/resources/static/js/app.js`)
    to add new navigation features for logging in and logging out, as shown in Listing
    [5-6](#A436970_1_En_5_Chapter.html#Par34).


    ```

    var app = angular.module(''userregistrationsystem'', [ ''ngRoute'', ''ngResource''
    ]);

    app.config(function(''routeProvider, ''locationProvider) {

    ''routeProvider

    .when(''/'', {

    templateUrl : ''/template/home.html'',

    controller : ''homeController''

    })

    .when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    })

    .when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    })

    .when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'',

    controller : ''usersDetailsController''

    })

    .when(''/login'',{

    templateUrl : ''/login/login.html'',

    controller : ''loginController''

    })

    .when(''/logout'',{

    templateUrl : ''/login/login.html'',

    controller : ''logoutController''

    })

    .otherwise({

    redirectTo : ''/login''

    });

    });

    app.config([''''httpProvider'', function(''httpProvider) {

    ''httpProvider.defaults.headers.common["X-Requested-With"] = ''XMLHttpRequest'';

    }]);

    Listing 5-6.

    Updating src/main/resources/static/js/app.js

    ```


    In Listing [5-4](#A436970_1_En_5_Chapter.html#Par24), you added the `homeController`
    controller for the link `/`. You also set up new links such as `/login` and `/logout`
    and their `templateUrl` and `controller`.


    The custom `X-Requested-With` line is a conventional header sent by browser clients.
    Spring Security responds to it by not sending a `WWW-Authenticate` header in a
    401 response, and thus the browser will not open an authentication pop-up dialog,
    which is desirable in your `UserRegistrationSystem` application since you want
    to control the authentication.


    ### Creating `login.html`: The Login Form


    Let’s create a login form that goes in `src/main/resources/static/login/login.html`,
    as shown in Listing [5-7](#A436970_1_En_5_Chapter.html#Par38).


    ```

    Login Page

