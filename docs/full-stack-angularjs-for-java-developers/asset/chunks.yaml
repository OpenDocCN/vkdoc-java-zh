    ![A436970_1_En_3_Fig13_HTML.jpg](img/A436970_1_En_3_Fig13_HTML.jpg)


    图 3-13.


    `http://localhost:8080/#/home`


    默认情况下，网页将重定向到你在 `app.js` 中配置的主页（`http://localhost:8080/#/home`）。点击主页上的“列出所有用户”按钮将重定向到
    `http://localhost:8080/#/list-all-users`，如图 3-14 所示。


