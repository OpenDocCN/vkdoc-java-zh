- fmt: '# 5. Consuming Secured RESTful Services Using AngularJS


    In Chapter [2](#A436970_1_En_2_Chapter.html), you created a REST application called
    `UserRegistrationSystem` using Spring Boot and performed CRUD operations. In Chapter
    [3](#A436970_1_En_3_Chapter.html), you created a single-page application (SPA)
    using AngularJS and consumed the REST endpoints. In Chapter [4](#A436970_1_En_4_Chapter.html),
    you secured your REST endpoints using Spring Security.


    In this chapter, I will show you how Spring Boot, Spring Security, and AngularJS
    can work together to provide a pleasant and secure user experience. You will consume
    secure RESTful services using AngularJS. You will initially start by sending an
    authorization header with each request in AngularJS. Then you will create a login
    page and update the Spring Security configuration to support the login and logout
    authentication process.


    ## Enabling Basic Authentication in Spring Security


    In Chapter [4](#A436970_1_En_4_Chapter.html), you secured the `UserRegistrationSystem`
    application’s REST endpoint with Basic Authentication just by updating the Maven
    `pom.xml` file with the Spring Boot starter Security dependency and by adding
    the Spring Security configuration file with an in-memory authentication configuration,
    as shown in Listing [5-1](#A436970_1_En_5_Chapter.html#Par4).


    ```

    @Configuration

    @Order(SecurityProperties.ACCESS_OVERRIDE_ORDER)

    public class SpringSecurityConfiguration_InMemory

    extends WebSecurityConfigurerAdapter {

    @Autowired

    protected void configureGlobal(AuthenticationManagerBuilder auth)

    throws Exception {

    auth.inMemoryAuthentication()

    .withUser("admin").password("password")

    .roles("USER", "ADMIN");

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .httpBasic()

    .realmName("User Registration System")

    .and()

    .authorizeRequests()

    .antMatchers(HttpMethod.GET, "/api/user/")

    .hasRole("USER")

    .antMatchers(HttpMethod.POST, "/api/user/")

    .hasRole("USER")

    .antMatchers(HttpMethod.PUT, "/api/user/**")

    .hasRole("USER")

    .antMatchers(HttpMethod.DELETE, "/api/user/**")

    .hasRole("ADMIN")

    .and()

    .csrf()

    .disable();

    }

    }

    Listing 5-1.

    In-Memory Authentication Configuration

    ```


    In Chapter [3](#A436970_1_En_3_Chapter.html), you developed `UserRegistrationSystem`
    as an SPA using AngularJS to consume a REST endpoint. With the Spring Security
    configuration, now when you try to access your page using the URL `http://localhost:8080/#/list-all-users`
    in a browser, an “Authentication Required” pop-up will appear, and you will need
    to enter a username and password that you have configured in the security configuration
    file in order to access the `/list-all-users` page, as shown in Figure [5-1](#A436970_1_En_5_Chapter.html#Fig1).


    ![A436970_1_En_5_Fig1_HTML.jpg](A436970_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.

    Authentication required to access a page in the browser


    The issue is that every time you open a browser and access a web page, a pop-up
    appears in the browser for a username and password. You can fix this issue by
    sending an authorization header with each request in AngularJS.


    ## Sending an Authorization Header with Each Request in AngularJS


    [Basic Authentication](https://en.wikipedia.org/wiki/Basic_access_authentication)
    allows a client to send its Base64-encoded credentials using an authorization
    header in each HTTP request. That means each request is independent of other requests,
    and the server doesn’t maintain any state information for the client.


    As you have to send an authentication header with each request, an HTTP interceptor
    is a good choice to handle it instead of manually specifying the authentication
    header in all `$http` methods.


    ### Adding the HTTP Interceptor in AngularJS


    When a request/response communicates over an HTTP call and you want to inject
    some custom logic, then an HTTP interceptor comes into the picture. An HTTP interceptor
    always executes custom logic for authenticating, authorizing, managing session
    state, logging, modifying a response, rewriting URLs, handling errors, caching,
    adding custom headers, adding a timestamp in the request/response, and encrypting
    and decrypting the request and response information before and after the HTTP
    call, as shown in Figure [5-2](#A436970_1_En_5_Chapter.html#Fig2).


    ![A436970_1_En_5_Fig2_HTML.jpg](A436970_1_En_5_Fig2_HTML.jpg)


    Figure 5-2.

    HTTP interceptor


    AngularJS supports four kinds of HTTP interceptor: `request`, `response`, `requestError`,
    and `responseError`.


    * The `request` interceptor is called before `$http` sends the request to the
    server. The request function takes the config object as an input parameter and
    returns a config object after adding, modifying, or removing data to or from this
    object.

    * The `response` interceptor is called after `$http` receives the response from
    the server. The response function takes a response object as a parameter and modifies
    the response data or adds a new set of values, calling another module or service
    call before returning a response object.

    * The `requestError` interceptor gets called when any error is thrown by the request
    interceptor.

    * The `responseError` interceptor gets called when any call to a server has failed
    and the application needs to trigger some action based on different HTTP status
    codes.


    Let’s implement the HTTP interceptor in your `UserRegistrationSystem` application.


    #### `authInterceptor.js`


    Create an interceptor named `AuthInterceptor` in the `authInterceptor.js` file,
    as shown in Listing [5-2](#A436970_1_En_5_Chapter.html#Par17).


    ```

    app.factory(''AuthInterceptor'', [ function() {

    return {

    ''request'' : function(config) {

    config.headers = config.headers || {};

    var encodedString = btoa("admin:password");

    config.headers.Authorization = ''Basic '' + encodedString;

    return config;

    }

    };

    } ]);

    Listing 5-2.

    HTTP Interceptor with Request Function

    ```


    In Listing [5-1](#A436970_1_En_5_Chapter.html#Par4), you configured security authentication
    credentials with the username `admin` and the password `password`. Also, you called
    the `btoa()` function to get the Base64-encoded string from the user’s credentials.


    You called a request interceptor function that takes a config object as a parameter.
    You updated `config.headers.Authorization` with Basic Authentication data and
    returned this updated config object. This is sufficient to enable Basic Authentication.
    You just need to register the `AuthInterceptor` interceptor with the AngularJS
    application.


    ### Updating `app.js`


    To register the `AuthInterceptor` interceptor with the AngularJS application,
    you need to update the `app.js` file, as shown in Listing [5-3](#A436970_1_En_5_Chapter.html#Par21).


    ```

    var app = angular.module(''userregistrationsystem'', [ ''ngRoute'', ''ngResource''
    ]);

    app.config(function($routeProvider) {

    $routeProvider.when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    }).when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    }).when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'',

    controller : ''usersDetailsController''

    }).otherwise({

    redirectTo : ''/home'',

    templateUrl : ''/template/home.html'',

    });

    });

    app.config([''$httpProvider'', function($httpProvider) {

    $httpProvider.interceptors.push(''AuthInterceptor'');

    }]);

    Listing 5-3.

    Registering the Interceptor in the Application by Updating app.js

    ```


    In Listing [5-3](#A436970_1_En_5_Chapter.html#Par21), you registered the `AuthInterceptor`
    interceptor (interceptors are service factories) with `$httpProvider` just by
    adding them to the `$httpProvider.interceptors` array using the push method. This
    service factory is called and returns the interceptor.'
