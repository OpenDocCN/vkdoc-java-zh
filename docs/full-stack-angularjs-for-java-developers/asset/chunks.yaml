- fmt: '### `/info`


    This endpoint displays arbitrary information about the Spring Boot application.
    Figure [7-3](#A436970_1_En_7_Chapter.html#Fig3) shows the `/info` endpoint in
    the browser.


    ![A436970_1_En_7_Fig3_HTML.jpg](A436970_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. The `/info` endpoint in the browser displays nothing


    As shown in Figure [7-3](#A436970_1_En_7_Chapter.html#Fig3), by default the `/info`
    endpoint displays nothing. You can override this information, though. Still, the
    `/info` endpoint displays nonsensitive data.


    ### `/env`


    The `/env` endpoint returns all the sensitive information that you have configured
    inside the JVM such as `{"local.server.port":8080}`. In other words, it displays
    the port on which your application is running, and it displays system properties
    such as the JDK and Java versions (`jre1.8.0_101\\bin`), directory information
    (`user.dir`) where your project is running, the library path (`java.library.path`),
    the time zone (`user.timezone":"Asia/Calcutta"`), and so on. It also shows properties
    information and the properties file name where you have added properties, such
    as `[classpath:/application.properties]":{"management.security.enabled":"false"}`.
    Figure [7-4](#A436970_1_En_7_Chapter.html#Fig4) shows a cropped image of the `/env`
    data in the browser.


    ![A436970_1_En_7_Fig4_HTML.jpg](A436970_1_En_7_Fig4_HTML.jpg)


    Figure 7-4. `/env` data in the browser


    ### `/metrics`


    This endpoint displays information from the OS, the JVM, and application-level
    metrics such as the memory heap, processor, threads, classloader, and thread pools.


    It shows the metrics information for the currently running application. It is
    sensitive by default. The metric information returns the following data, as shown
    in Figure [7-5](#A436970_1_En_7_Chapter.html#Fig5):


    ![A436970_1_En_7_Fig5_HTML.jpg](A436970_1_En_7_Fig5_HTML.jpg)


    Figure 7-5. `/metrics` endpoint


    ```

    {

    "mem":295288,

    "mem.free":177815,

    "processors":4,

    "instance.uptime":620849,

    "uptime":632125,

    "systemload.average":-1.0,

    "heap.committed":225792,

    "heap.init":65536,

    "heap.used":47976,

    "heap":905216,

    "nonheap.committed":71360,

    "nonheap.init":2496,

    "nonheap.used":69497,

    "nonheap":0,

    "threads.peak":20,

    "threads.daemon":18,

    "threads.totalStarted":26,

    "threads":20,

    "classes":9559,

    "classes.loaded":9559,

    "classes.unloaded":0,

    "gc.ps_scavenge.count":12,

    "gc.ps_scavenge.time":169,

    "gc.ps_marksweep.count":2,

    "gc.ps_marksweep.time":219,

    "httpsessions.max":-1,"httpsessions.active":0,

    "datasource.primary.active":0,

    "datasource.primary.usage":0.0,

    "gauge.response.userregistrationsystemhealth":214.0,

    "gauge.response.info":37.0,

    "counter.status.200.info":1,

    "counter.status.200.userregistrationsystemhealth":1

    }

    ```


    As shown in Figure [7-5](#A436970_1_En_7_Chapter.html#Fig5), you can see metrics
    information using the `/metrics` endpoint. This endpoint shows the `heap.used`
    details, `nonheap.used` details, how much memory is free (`mem.free`), the number
    of processors being used, instance uptime information, the number of threads,
    and so on.


    ### `/trace`


    This endpoint displays the trace information requests that have been made by showing
    a list of REST endpoints people have been accessing. For example, in Figure [7-6](#A436970_1_En_7_Chapter.html#Fig6),
    you can see that I have accessed `/metrics`, `/env`, and `/info`. This shows the
    last few requests that were hit for these particular endpoints. The `/trace` endpoint
    also shows the different REST endpoints people have been accessing. If you go
    to `/trace`, you can see the last request people have been accessing by the particular
    REST service.


    ![A436970_1_En_7_Fig6_HTML.jpg](A436970_1_En_7_Fig6_HTML.jpg)


    Figure 7-6. `/trace` endpoint


    ### `/health`


    This endpoint can be used to check the health or status of the running Spring
    Boot application. It helps developers to monitor the software’s health and trace
    status if the production environment goes down. The default information shown
    when accessing over HTTP is as follows:


    ```

    {

    "status":"UP",

    "diskSpace":{"status":"UP",

    "total":142753132544,

    "free":97978245120,

    "threshold":10485760

    },

    "db":{"status":"UP","database":"H2","hello":1}

    }

    ```


    This shows the running application’s disk space. The `/health` endpoint also shows
    the server health and gives information on whether the server is up or not. If
    there is any database connectivity, it shows the database connection automatically.
    So, if you have autowired any database connection, let’s say the H2 database,
    it automatically shows up here. By default, this endpoint is not sensitive. Figure
    [7-7](#A436970_1_En_7_Chapter.html#Fig7) shows the endpoint in the browser.


    ![A436970_1_En_7_Fig7_HTML.jpg](A436970_1_En_7_Fig7_HTML.jpg)


    Figure 7-7. `/health` endpoint


    You can find a complete list of existing Actuator endpoints at [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#production-ready-endpoints`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#production-ready-endpoints).


    ## Customizing an Actuator Endpoint


    You can customize Actuator endpoints via Spring properties (`application.properties`)
    using the following format:


    ```

    endpoints.[endpoint-name].[property to customize]

    ```


    ### Properties to Customize


    Three properties are available to customize Actuator endpoints.


    *   `id`: This is the property by which the endpoint will be accessed over HTTP.

    *   `enabled`: This endpoint gives access control to the endpoint. If it is set
    as `true`, then this endpoint can be accessed; otherwise, it cannot be.

    *   `sensitive`: This property provides a security layer to the endpoint. If it
    is set as `true`, then the required authorization shows critical information over
    HTTP.


    For example, you can customize the `id`, `sensitive`, and `enabled` properties
    of the `/health` endpoint by adding the following properties in the `application.properties`
    file:


    ```

    endpoints.health.id=userregistrationsystemhealth

    endpoints.health.enabled=true

