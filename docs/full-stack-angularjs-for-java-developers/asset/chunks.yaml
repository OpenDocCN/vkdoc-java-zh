- fmt: '### RestTemplate Method


    While using `RestTemplate`, the client has to only provide the URL and parameters
    (if any) and then extract the result received from the response. `RestTemplate`
    takes care of the HTTP connection itself. The `RestTemplate` class inherits the
    `RestOperations` interface specifying a basic set of RESTful operations, and hence
    `RestTemplate` provides support for all major HTTP methods, namely, `GET`, `POST`,
    `PUT`, `DELETE`, `OPTIONS`, `HEAD`, and other HTTP methods to consume RESTful
    services. Table [6-1](#A436970_1_En_6_Chapter.html#Tab1) lists the methods provided
    by `RestTemplate` for each HTTP method.


    **Table 6-1.** RestTemplate Methods for HTTP Operations


    | HTTP Method | Spring RestTemplate Method |

    | --- | --- |

    | `GET` | `getForObject(java.lang.String, java.lang.Class<T>, java.lang.Object...)`
    `getForEntity(java.lang.String, java.lang.Class<T>, java.lang.Object...)` |

    | `POST` | `postForLocation(java.lang.String, java.lang.Object, java.lang.Object...)`
    `postForObject(java.lang.String, java.lang.Object, java.lang.Class<T>, java.lang.Object...)`
    `postForEntity(java.lang.String, java.lang.Object, java.lang.Class<T>, java.lang.Object...)`
    |

    | `PUT` | `put(java.lang.String, java.lang.Object, java.lang.Object...)` |

    | `DELETE` | `delete(java.lang.String, java.lang.Object...)` |

    | `HEAD` | `headForHeaders(java.lang.String, java.lang.Object...)` |

    | `OPTIONS` | `optionsForAllow(java.lang.String, java.lang.Object...)` |

    | `any` | `exchange(java.lang.String, org.springframework.http.HttpMethod, org.springframework.http.HttpEntity<?>,
    java.lang.Class<T>, java.lang.Object...)` |


    The method name in `RestTemplate` indicates the implementation of the respective
    HTTP method inside the corresponding method and what is going to be returned.
    For example, the `getForEntity` method will perform an HTTP `GET` action on the
    server and convert the HTTP response into a given type and return this entity
    to the client. Similarly, the `postForObject` method will do an HTTP `POST` action
    on the server by converting the given object into an HTTP request and returning
    the response by converting the HTTP response into an object of a given type.


    Let’s use `RestTemplate`’s methods to consume REST APIs from the UserRegistrationSystem
    application developed in Chapter [2](#A436970_1_En_2_Chapter.html).


    ### RestTemplate Operation


    You will be using `RestTemplate` to perform operation for HTTP methods. Let’s
    start with a simple `GET` request example using the `getForEntity` method to get
    plain JSON.


    #### HTTP GET Request with Parameter to Retrieve User


    You can use either the `getForObject` or `getForEntity` method from `RestTemplate`
    to make an HTTP `GET` request. Here, you will be using the `getForObject` method
    for the `GET` request. Spring `RestTemplate` provides three overloaded versions
    of the `getForObject` method, as shown in Table [6-2](#A436970_1_En_6_Chapter.html#Tab2).


    **Table 6-2.** Overloaded getForObject Method


