  trans: '

    ### 针对关系型数据库的身份验证自定义


    尽管你已经使用内存身份验证自定义了 Spring Security，但你希望针对数据库进行身份验证来自定义安全行为，以便使用应用程序的用户，而不是 Spring
    Boot 的通用用户。让我们通过创建和更新用户，为你的 UserRegistrationSystem 应用程序设置针对数据库进行身份验证自定义所需的基础设施。


    首先，创建一个 `UserInfo` 领域对象，如清单 4-6 所示。这个实体类代表一个 UserRegistrationSystem 用户。`UserInfo`
    实体类包含诸如 ID（`userid`）、用户名、密码、`isEnabled` 和角色等属性。你使用 JPA 和 Hibernate 注解来标注这个类。


    ```

    package com.apress.ravi.dto;

    import javax.persistence.Column;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.Id;

    import javax.persistence.Table;

    import org.hibernate.validator.constraints.NotEmpty;

    @Entity

    @Table(name = "users")

    public class UserInfo {

    @Id

    @GeneratedValue

    @Column(name = "userid")

    private Long id;

    @Column(name = "username")

    @NotEmpty

    private String username;

    @Column(name = "password")

    @NotEmpty

    private String password;

    @Column(name = "enabled")

    private boolean isEnabled;

    @Column(name = "role")

    private String role;

    public String getUsername() {

    return username;

    }

    public void setUsername(String username) {

    this.username = username;

    }

    public String getPassword() {

    return password;

    }

    public void setPassword(String password) {

    this.password = password;

    }

    public boolean isEnabled() {

    return isEnabled;

    }

    public void setEnabled(boolean isEnabled) {

    this.isEnabled = isEnabled;

    }

    public String getRole() {

    return role;

    }

    public void setRole(String role) {

    this.role = role;

    }

    }

    清单 4-6.

    UserInfo 类

    ```


    由于你将把 UserRegistrationSystem 的用户存储在数据库中，因此需要一个 `UserInfoJpaRepository` 接口来对 `UserInfo`
    实体执行 CRUD 操作。清单 4-7 展示了扩展了 `JpaRepository` 的 `UserInfoJpaRepository` 接口。除了 `JpaRepository`
    提供的默认方法外，`UserInfoJpaRepository` 接口还包含一个名为 `findByUsername` 的自定义查找方法，该方法以用户名作为参数。Spring
    Data JPA 将提供一个运行时实现，允许 `findByUsername` 方法根据传入的用户名参数返回一个用户。


    ```

    package com.apress.ravi.repository;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.stereotype.Repository;

    import com.apress.ravi.dto.UserInfo;

