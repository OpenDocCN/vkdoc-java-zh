    在该类的构造函数中被初始化。


    在 UserRegistrationSystem 应用程序中进行此修改后，重新启动应用程序并启动 Postman，为 ID 为 50 的用户发送 `GET`
    请求。`UserRegistrationRestController` 返回正确状态码和错误消息的结果如图 2-9 所示。


    ![A436970_1_En_2_Fig9_HTML.jpg](img/A436970_1_En_2_Fig9_HTML.jpg)


    图 2-9.


    针对不存在用户的错误消息和状态码


