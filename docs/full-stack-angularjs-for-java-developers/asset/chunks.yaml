  trans: '

    #### @PostMapping：创建新用户


    `@PostMapping` 注解是一个组合注解，是 `@RequestMapping(value="/", method=RequestMethod.POST)`
    的快捷方式。对 `/api/user/` 端点的 `POST` 请求会使用请求的正文体创建一个新用户。清单 2-8 展示了实现 `POST` 动词功能所需的代码。


    ```

    @PostMapping(value = "/", consumes = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity createUser(@RequestBody final UsersDTO user) {

    userJpaRepository.save(user);

    return new ResponseEntity(user, HttpStatus.CREATED);

    }

    清单 2-8.

    创建新用户的 POST 动词实现

    ```


    `createUser` 方法接受一个类型为 `UsersDTO` 的参数，该参数带有 `@RequestBody` 注解，这要求 Spring 将整个请求体转换为
    `UserDTO` 的实例。


    你使用 `consumes = MediaType.APPLICATION_JSON_VALUE` 配置了内容协商，这表明该方法仅接受来自请求体的 JSON
    数据。`produces` 和 `consumes` 属性用于[缩小映射类型](http://docs.spring.io/spring/docs/3.2.x/spring-framework-reference/html/mvc.html#mvc-ann-requestmapping-consumes)。你可以省略此配置，因为
    `@RequestBody` 会使用 `HttpMessageConverters` 来确定要使用的正确转换器，并将 HTTP 请求的正文转换为领域对象。Spring
    BOOT 中的消息转换器支持 JSON 和 XML 资源表示形式。


    在方法内部，你将 `UserDTO` 的持久化操作委托给了 `userJpaRepository` 的 save 方法。然后，你创建了一个新的 `ResponseEntity`，其中包含已创建的用户（`UserDTO`）和
    HTTP 状态码 `HttpStatus.CREATED`（201），并将其返回。


    要测试这个新添加的端点，请启动 UserRegistrationSystem 应用程序。如果 UserRegistrationSystem 应用程序已在运行，则需要终止进程并重新启动。启动
    Postman 并选择请求类型为 POST。点击 Body 并选择 raw；然后从下拉菜单中选择 JSON (application/json) 作为 Content-Type
    标头。输入一些信息并点击 Send。清单 2-9 展示了请求体中使用的 JSON。


    ```

    {

    "name":"Ravi Kant Soni",

    "address":"Lashkariganj, Sasaram, Rohtas, Bihar, pin-821115",

    "email":"ravikantsoni.author@gmail.com"

    }

    清单 2-9.

    用于创建新用户的请求体 JSON


    请求完成后，你将看到一条 201 `Created` 消息，如图 2-4 所示。


    ![A436970_1_En_2_Fig4_HTML.jpg](img/A436970_1_En_2_Fig4_HTML.jpg)


    图 2-4.

    创建新用户的 POST 动词实现


    #### @GetMapping ("/ {id}")：检索单个用户


    下一步是实现一个用于访问单个用户的端点。清单 2-10 展示了所需的代码。


    ```

    @GetMapping("/{id}")

    public ResponseEntity getUserById(@PathVariable("id") final Long id) {

    UsersDTO user = userJpaRepository.findById(id);

    return new ResponseEntity(user, HttpStatus.OK);

    }

    清单 2-10.

    检索单个用户的 GET 动词实现


    如清单 2-10 所示，你使用 `@GetMapping("/{id}")` 注解标注了 `getUserById` 方法。URI 中的占位符 `{id}`
    与 `@PathVariable` 注解一起，允许 Spring 提取 `id` 参数值。在方法内部，你使用了 `UserJpaRepository` 的
    `findById` 方法来读取 `UserDTO` 对象，并将其作为 `ResponseEntity` 的一部分连同 HTTP 状态码 `HttpStatus.OK`（200）一起返回。


    要测试此功能，请启动 Postman 并重新启动 UserRegistrationSystem 应用程序。输入 URL `http://localhost:8080/api/user/1`
    并点击 Send，如图 2-5 所示。


    ![A436970_1_En_2_Fig5_HTML.jpg](img/A436970_1_En_2_Fig5_HTML.jpg)


    图 2-5.

    检索单个用户


    类似地，你可以实现用于执行更新和删除功能的端点。


    #### @PutMapping：更新用户


    此注解是一个组合注解，是 `@RequestMapping(method = RequestMethod.PUT)` 的快捷方式。它要求将包含的实体视为请求
    URI 上现有资源的修改版本。清单 2-11 展示了所需的代码。


    ```

    @PutMapping(value = "/{id}", consumes = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity updateUser(

    @PathVariable("id") final Long id, @RequestBody UsersDTO user) {

    // 根据 id 获取用户并设置为 UserDTO 类型的 currentUser 对象

    UsersDTO currentUser = userJpaRepository.findById(id);

    // 使用 user 对象数据更新 currentUser 对象数据

    currentUser.setName(user.getName());

    currentUser.setAddress(user.getAddress());

    currentUser.setEmail(user.getEmail());

    // 保存 currentUser 对象

    userJpaRepository.saveAndFlush(currentUser);

    // 返回 ResponseEntity 对象

    return new ResponseEntity(currentUser, HttpStatus.OK);

    }

    清单 2-11.

    更新用户的 PUT 动词实现


    在清单 2-11 中，你通过将 `pathvariable` 中的 `id` 作为参数传递给 `UserJpaRepository` 的 `findById`
    方法，检索到了现有的 `UserDTO` 对象作为 `currentUser`。然后，你根据 `requestbody` 中的用户信息更新了 `currentUser`
    的属性数据。


    你还调用了 `UserJpaRepository` 的 `saveAndFlush` 方法，并传入 `currentUser`，该方法会保存 `UserDTO`
    并立即刷新更改。最后，你返回了 `ResponseEntity`，其中包含 `currentUser` 作为响应体，以及 `HttpStatus.OK` 作为
    HTTP 状态码。


    让我们通过启动 Postman 并重新启动应用程序来测试此端点，如图 2-6 所示。


    ![A436970_1_En_2_Fig6_HTML.jpg](img/A436970_1_En_2_Fig6_HTML.jpg)


    图 2-6.

    更新用户的 PUT 动词实现


    现在，让我们实现删除功能，以从 UserRegistrationSystem 应用程序中删除现有用户。


    #### @DeleteMapping：删除用户


    这是一个组合注解，是 `@RequestMapping(method = RequestMethod.DELETE)` 的快捷方式。它要求应用程序删除由 `Request-URI`
    标识的资源。清单 2-12 展示了实现此功能所需的代码。


    ```

    @DeleteMapping("/{id}")

    public ResponseEntity deleteUser(@PathVariable("id") final Long id) {

    userJpaRepository.delete(id);

    return new ResponseEntity(HttpStatus.NO_CONTENT);

    }

    清单 2-12.

    删除用户的 DELETE 动词实现


    在清单 2-12 中，方法内部你调用了 `UserJpaRepository` 的 delete 方法，并传入 `pathvariable` 中的 `id`
    作为参数。然后，你返回了带有 HTTP 状态码 `HttpStatus.NO_CONTENT`（204）的 `ResponseEntity`。


    重新启动 UserRegistrationSystem 应用程序并启动 Postman 来测试此功能，如图 2-7 所示。


    ![A436970_1_En_2_Fig7_HTML.jpg](img/A436970_1_En_2_Fig7_HTML.jpg)


    图 2-7.

    删除用户的 DELETE 动词实现


    到目前为止，你已经了解了如何实现用于执行 CRUD 操作的 RESTful API。接下来，你将学习 RESTful API 中的错误处理。


    ## 处理 RESTful API 中的错误


    尽管开发人员会注意处理错误，但以合适的格式设计错误响应仍然很重要，这能让使用 RESTful API 的客户端理解问题，并帮助其正确使用 API。错误处理是
    RESTful API 开发中最重要的问题之一。在现实世界中，RESTful API 在各种场景下被使用，很难预测 API 被使用的所有场景。

