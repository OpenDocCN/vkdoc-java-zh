  raw: '###### The main Method


    The main part of the `HelloSpringBootApplication` class is the main method. The
    Spring application developed using Spring Boot contains the main method, which
    calls Spring Boot’s `SpringApplication.run()` method to launch an application,
    as shown in the previous code. The class that contains a main method is referred
    to as the main class and is annotated with the `@SpringBootApplication` annotation.


    ##### Running a Spring Boot Application in STS


    The Spring Boot application created using the Spring Starter Project wizard comes
    in two flavors: WAR and JAR. This wizard allows you to choose between WAR and
    JAR in its packaging option .


    > As Josh Long said in one of his talks in the Spring IO, “Make JAR, not WAR.”
    — [`https://twitter.com/springcentral/status/598910532008062976`](https://twitter.com/springcentral/status/598910532008062976)


    Spring Boot favors JARs over WARs by allowing you to easily create stand-alone
    JAR packaged projects that add an embedded web server (Apache Tomcat is the default
    web server) inside the created artifact, and it helps developers reduce the overhead
    of setting up local or remote Tomcat servers, WAR packaging, and deploying.


    To run the Spring Boot application locally, you don’t need any special tooling
    from STS. You just need to run it by selecting Run As ➤ Java Application, either
    from the standard Eclipse Java debugging tools or from STS.


    The benefits of using STS over IDEs are that it provides a dedicated launcher,
    which does the same thing as an IDE but adds a few useful bells and whistles on
    the top of that. So, let’s use STS to run the Spring Boot application, as shown
    in Figure [1-15](#A436970_1_En_1_Chapter.html#Fig15).


    Right-click the project fullstackdeveloper and select Run As ➤ Spring Boot App.


    ![A436970_1_En_1_Fig15_HTML.jpg](A436970_1_En_1_Fig15_HTML.jpg)


    Figure 1-15.


    Wizard in STS to run application


    The Spring Boot application starts with some output in the console, as shown in
    Figure [1-16](#A436970_1_En_1_Chapter.html#Fig16).


    ![A436970_1_En_1_Fig16_HTML.jpg](A436970_1_En_1_Fig16_HTML.jpg)


    Figure 1-16.


    Output on the console


    If the application starts successfully, the last line of the console output from
    Spring Boot will contain the words Started HelloSpringBootApplication.


    Congratulations! You have successfully set up and run the application using Spring
    Boot. Now it’s time to visit `http://localhost:8080/hello` in the browser to see
    the web page, as shown in Figure [1-17](#A436970_1_En_1_Chapter.html#Fig17).


    ![A436970_1_En_1_Fig17_HTML.jpg](A436970_1_En_1_Fig17_HTML.jpg)


    Figure 1-17.


    Accessing the REST endpoint from the browser


    #### Starters


    Starters are a set of convenient dependency descriptors that you can include in
    your application. They contain a lot of dependencies that you need to get your
    project up and running quickly. The starter POMs are dependency descriptors that
    can be added to your application’s Maven.


    In simple words, if you are developing a project that uses Spring MVC for HTTP
    request processing, you just have to include `spring-boot-starter-web`, which
    will import all the required dependencies for the Spring MVC application such
    as `view-resolver`, `tomcat`, and so on. This reduces the burden of configuring
    all the required dependencies for a framework.


    You can refer to [`http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#using-boot-starter`](http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#using-boot-starter)
    for a complete list of starters.


    #### Spring Boot Actuator: Production-Ready Features


    Spring Boot has a bunch of features that let you monitor your Spring Boot application
    in production or any environment after you deploy it. For example, you can get
    logs, perform thread dumps, view metrics, analyze garbage collection, and show
    beans configured in `BeanFactory`. This information can be exposed via HTTP or
    JMX, and it even can be logged into the process via SSH.


    ##### Enabling Actuator


    Actuator HTTP endpoints are available only to Spring MVC. This is a new endpoint
    that gets added to your application without you writing a controller. The definition
    of an actuator is a production-ready feature to help you monitor and manage your
    application.


    The simplest way to enable the production-ready feature is to add the `spring-boot-actuator`
    module dependency `spring-boot-starter-actuator` from the Spring starter, as shown
    in Figure [1-18](#A436970_1_En_1_Chapter.html#Fig18).


    ![A436970_1_En_1_Fig18_HTML.jpg](A436970_1_En_1_Fig18_HTML.jpg)


    Figure 1-18.


    Actuator dependency in Spring Initializr


    To add the actuator to a Maven-based project, add the following s`tarter` dependency
    in `pom.xml`:


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    ```


    ##### Running the Application


    Once you run the Spring Boot application, the actuator endpoints will be logged
    in the console, as shown in Figure [1-19](#A436970_1_En_1_Chapter.html#Fig19).


    ![A436970_1_En_1_Fig19_HTML.jpg](A436970_1_En_1_Fig19_HTML.jpg)


    Figure 1-19.


    Actuator endpoints in console log


    ##### Using Actuator Endpoints


    Spring Boot includes a number of actuator endpoints, which allow you to monitor
    and interact with your Spring Boot application. Most of the endpoints are sensitive,
    and they are not fully public, while a few are not such as `/health` and `/info`.


    The following are some of the common endpoints Spring Boot provides out of the
    box:


    *   `/health` shows health information for a running Boot application. By default,
    it is not sensitive.

    *   `/Info` displays arbitrary application information. By default, it is not
    sensitive.

    *   `/metrics` shows metrics information for a running Boot application. By default,
    it is sensitive.


    ##### Customizing the Management Server Port


    If your Spring Boot application is running inside your own data center, then you
    may prefer to expose endpoints using the default HTTP port of 8080\. But for cloud-based
    deployments, exposing management endpoints using the default HTTP port 8080 is
    a sensible choice. The `management.port` property can be used to change the HTTP
    port.


    You can assign port number 8081 to the `management.port` property using `src\main\resources\application.properties
    file: management.port=8081`.


    ##### Getting Health Information


    The `/health` endpoint can be used to check the health/status of your running
    Spring Boot application. It returns a JSON file with a bunch of matrixes. Going
    to `http://localhost:8081/health` in the browser will give the results shown in
    Figure [1-20](#A436970_1_En_1_Chapter.html#Fig20).


    ![A436970_1_En_1_Fig20_HTML.jpg](A436970_1_En_1_Fig20_HTML.jpg)


    Figure 1-20.


    Accessing the /health endpoint


    The following health information is shown to unauthorized access over HTTP:


    ```

    {

    "status":"UP"

    }

    ```


    In Chapter [7](#A436970_1_En_7_Chapter.html), I will discuss the Spring Boot actuator
    in more detail so you can understand what this returned JSON data represents.


    ## Summary


    In this chapter, you got an over of what a full stack developer is and what full
    stack web development entails. You also learned about the architecture of modern
    web applications. You got an overview of AngularJS as a front-end framework and
    Spring Boot as a back-end framework. You developed your first Spring Boot application.
    Finally, you learned how to monitor your Spring Boot application using an actuator.
    In the next chapter, you will create a RESTful application using Spring Boot to
    perform the CRUD operations.'
