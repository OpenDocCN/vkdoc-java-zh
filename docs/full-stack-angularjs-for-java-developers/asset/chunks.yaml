- fmt: "### AngularJS Basic Components\n\nAngularJS allows developers to build structured\
    \ applications based on the MVC model that are robust and easily maintained. It\
    \ is important to get familiar with the various components of AngularJS before\
    \ implementing AngularJS.\n\n- **Module**: This is one of the components of AngularJS.\
    \ A module is basically a container containing services, controllers, filters,\
    \ directives, and so on. Each module in AngularJS has its own folder structure\
    \ for controllers, directives, and so on. Each view page in AngularJS has a module.\n\
    - **Scope**: Scope in AngularJS is just a JavaScript representation of data used\
    \ to populate a view on a web page. This data can be from any source such as a\
    \ database or a remote web server.\n- **View**: Views with templates and directives\
    \ in AngularJS are other components of AngularJS to build an HTML view that is\
    \ presented to the user.\n- **Expression**: The ability to add an expression inside\
    \ an HTML template is a great feature of AngularJS. An expression is basically\
    \ linked to a scope. An expression helps bind application data to HTML.\n- **Controller**:\
    \ A controller is a component of the MVC framework. A controller will contain\
    \ your core business logic. Its main role in AngularJS is to expose data to the\
    \ view page using the scope.\n- **Data binding**: An important feature of AngularJS\
    \ is data binding. This is the process of linking data from the model to the view,\
    \ and vice versa. AngularJS supports two-way data binding.\n    - When data changes\
    \ on a web page, the model is updated.\n    - When data changes in the model,\
    \ then the view page is automatically updated. The model represents the data,\
    \ and the view projects the data.\n- **Services**: Services in AngularJS are singleton\
    \ objects that provide functionality for a web application.\n- **Dependency injection**:\
    \ DI is the process of injecting the dependency at runtime (i.e., making dependent\
    \ components available for access within the component of initialized code). It\
    \ is used to consume services. For example, if a module requires access to a resource\
    \ via an HTTP request, then the HTTP service can be injected into the module to\
    \ make the functionality available in the module code.\n\n### AngularJS Life Cycle\n\
    \nNow that you understand the different components involved in an AngularJS application,\
    \ I’ll cover what happens during the AngularJS life cycle, which has three phases:\
    \ bootstrap, compilation, and runtime. These phases of AngularJS occur at the\
    \ time of the web page being loaded in the client’s browser. To design and implement\
    \ the code in an application developed using AngularJS, it is important to understand\
    \ the life cycle of AngularJS.\n\n#### Bootstrap Phase\n\nThe bootstrap phase\
    \ is the first phase of the AngularJS life cycle and occurs when the AngularJS\
    \ JavaScript library is downloaded to the client’s browser. Once the JavaScript\
    \ library is downloaded, AngularJS initializes its own components and initializes\
    \ the application’s module, which the `ng-app` directive points to. The static\
    \ DOM in this phase is loaded into the browser.\n\n#### Compilation Phase\n\n\
    The HTML compilation stage is the second phase in the AngularJS life cycle. In\
    \ this phase, the loaded static DOM is replaced with the dynamic DOM to represent\
    \ the AngularJS view. Then these DOMs get linked to the appropriate JavaScript\
    \ function from the AngularJS built-in library or custom directive code.\n\n####\
    \ Runtime Data Binding Phase\n\nThis is the final stage of the AngularJS life\
    \ cycle, which exists as long as the user does not reload or navigate away from\
    \ a web page. In this phase, any changes made to the scope reflect in the view,\
    \ and vice versa.\n\n### AngularJS Architecture Concepts\n\nNow you will take\
    \ a look at the architecture concept of AngularJS. When an HTML document is loaded\
    \ into the browser and is evaluated by the browser, first the AngularJS JavaScript\
    \ file is loaded, the Angular global object is created, and your JavaScript that\
    \ registers the controller functions is executed. Then AngularJS scans the HTML\
    \ looking for AngularJS apps and views and finds a controller function corresponding\
    \ to the view. Then AngularJS executes the controller functions and updates the\
    \ views with data from the model populated by the controller.\n\nNext AngularJS\
    \ listens for browser events, for example, a button clicked, a mouse moved, an\
    \ input field being changed, and so on. If any of these events happen, then AngularJS\
    \ will update the view accordingly. Figure [3-1](#A436970_1_En_3_Chapter.html#Fig1)\
    \ shows the workflow diagram of AngularJS.\n\n![A436970_1_En_3_Fig1_HTML.jpg](A436970_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1. Workflow diagram of AngularJS\n\nAngularJS contains a module that\
    \ acts as a container for different types of applications such as views, controllers,\
    \ directives, services, and so on. A module specifies how an application can be\
    \ bootstrapped. Then you have a config component. The routes are used for linking\
    \ URLs to controllers and views. A view is used to handle a sophisticated event.\
    \ It uses `ng-view` directives. Also, you have a controller, which controls the\
    \ data of the AngularJS application and consists of regular JavaScript objects.\
    \ AngularJS defines an `ng-controller` directive that creates new controller objects\
    \ by using a controller function. AngularJS comes with several built-in services\
    \ such as `$http`, `$route`, `$window`, `$location`, and so on. The scope refers\
    \ to the objects that refer to the model. They play the important role of joining\
    \ the controller with the view.\n\n#### MVC Architecture\n\nAngularJS uses an\
    \ MVC architecture to create web applications. The MVC architecture is a programming\
    \ methodology that aims to split an application into three core components: a\
    \ model, a view, and a controller. These three components combine to form your\
    \ application. Figure [3-2](#A436970_1_En_3_Chapter.html#Fig2) shows the Model-View-Controller\
    \ architecture.\n\n![A436970_1_En_3_Fig2_HTML.jpg](A436970_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2. MVC architecture in AngularJS\n\nWhen a user sends an HTTP request\
    \ via a browser, the request is received by the controller. The controller processes\
    \ that request and sends the request to the model to provide the appropriate data.\
    \ The model in response provides the resulting data array to the controller again.\
    \ The controller processes the data again to the required format and sends it\
    \ to the view. The view represents the data via UI contents and sends it to the\
    \ controller. Finally, the controller sends the HTTP response to the browser.\n\
    \n- AngularJS views are used to generate an output representation of information,\
    \ such as a chart or a diagram, to the user in a web browser. AngularJS builds\
    \ the views in the DOM by pulling in all the templates defined for an application.\
    \ So, the developer work here is to just create the template by using mostly HTML\
    \ and CSS.\n- The AngularJS model contains the `$scope` object that is used to\
    \ store the application model, so there’s no need to create a JavaScript model\
    \ class like with other JavaScript client-side frameworks. Scopes are attached\
    \ to the DOM, helping to simplify the JavaScript problem considerably.\n- The\
    \ AngularJS controller is the place where you define all the business logic specific\
    \ to a particular view. The controller holds the model and view together.\n\n\
    ## Setting Up Your Development Environment\n\nIn this section, you will set up\
    \ your development environment.\n\n### Adding AngularJS to Spring Boot\n\nLet’s\
    \ set up the development environment by adding AngularJS to your Spring Boot application\
    \ developed in Chapter [2](#A436970_1_En_2_Chapter.html)’s UserRegistrationSystem\
    \ application. You can achieve this in three ways.\n\n- Include Angular scripts\
    \ from the Google CDN\n- Download and host Angular files locally\n- Provide dependency\
    \ information for AngularJS in the Spring Boot application’s `pom.xml`\n\nThe\
    \ following sections will cover all three ways."
