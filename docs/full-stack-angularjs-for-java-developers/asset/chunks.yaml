    ### 自定义健康指标


    您也可以通过实现 `HealthIndicator` 接口并重写未实现的方法来定义自己的自定义健康指标。该自定义健康指标会收集特定于应用程序的任何类型的自定义健康数据，并将其提供给
    `/health` 端点。清单 7-2 展示了实现 `HealthIndicator` 接口的 `CustomHealthIndicator` 类。


    ```

    import org.springframework.boot.actuate.health.Health;

    import org.springframework.boot.actuate.health.HealthIndicator;

    import org.springframework.stereotype.Component;

    @Component

    public class CustomHealthIndicator implements HealthIndicator {

    @Override

    public Health health() {

    int errorCode = check();

    if (errorCode == 0) {

    return Health

    .up()

    .withDetail("Status", "UP")

    .withDetail("Error Code", errorCode)

    .withDetail("Description",

    "Your Custom Health indicator point is UP")

    .build();

    }

    return Health.up().build();

    }

    public int check() {

    return 0;

    }

    }

    清单 7-2.

    CustomHealthIndicator 类

    ```


    浏览器中将显示以下输出，如图 7-11 所示。


    ![A436970_1_En_7_Fig11_HTML.jpg](img/A436970_1_En_7_Fig11_HTML.jpg)


    图 7-11.


    /health 端点


    ```

    {

    "status":"UP",

    "custom":{

    "status":"UP",

    "Status":"UP",

    "Error Code":0,

    "Description":"Your Custom Health indicator point is UP"

    },

    "diskSpace":{

    "status":"UP",

    "total":142753132544,

    "free":97823797248,

    "threshold":10485760

    },

    "db":{

    "status":"UP",

    "database":"H2",

    "hello":1

    }

    }

    ```


    ## 定义新端点


    尽管 Spring Boot Actuator 提供了端点，但您也可以定义除现有 Actuator 端点之外的新端点。让我们通过创建 `MyCustomEndpoint`
    类并实现 `Endpoint<List<String>>` 接口来创建一个新端点，如清单 7-3 所示。


    ```

    import java.util.ArrayList;

    import java.util.List;

    import org.springframework.boot.actuate.endpoint.Endpoint;

    import org.springframework.stereotype.Component;

    @Component

    public class MyCustomEndpoint implements Endpoint> {

    @Override

    public String getId() {

    return "myCustomEndpoint";

    }

    @Override

    public List invoke() {

    List customMessages = new ArrayList();

    customMessages.add("This is custom message 1");

    customMessages.add("This is custom message 2");

    return customMessages;

    }

    @Override

    public boolean isEnabled() {

    return true;

    }

    @Override

    public boolean isSensitive() {

    return true;

    }

    }

    清单 7-3.

    MyCustomEndpoint 类

    ```


    让我们运行 Spring Boot 应用程序。控制台日志将包含 `/myCustomEndpoint` 端点，如图 7-12 所示。


    ![A436970_1_En_7_Fig12_HTML.jpg](img/A436970_1_En_7_Fig12_HTML.jpg)


    图 7-12.


    控制台中的新端点


    您可以使用其 `id` 值在 `/myCustomEndpoint` 访问这个新端点。输出将显示在浏览器中，如图 7-13 所示。


    ![A436970_1_En_7_Fig13_HTML.jpg](img/A436970_1_En_7_Fig13_HTML.jpg)


    图 7-13.


    /myCustomEndpoint 端点


    ## 通过 HTTP 进行管理


    在本节中，您将通过 HTTP 管理 Actuator 端点。


    ### 自定义服务器端口


    出于安全目的，您可以自定义服务器端口，通过非标准端口暴露 Actuator 端点。您可以使用 `management.port` 属性进行配置。


    您还可以使用 `management.address` 属性更改地址，以限制端点可以从网络上的哪些位置访问。


    让我们更改 `application.properties` 文件中的以下属性：


    ```

    management.port=8081

    management.address=127.0.0.1

    ```


    当您重新启动 Spring Boot 应用程序并使用自定义的地址和端口号访问 `/health` 端点时，将返回输出，如图 7-14 所示。


    ![A436970_1_En_7_Fig14_HTML.jpg](img/A436970_1_En_7_Fig14_HTML.jpg)


    图 7-14.


    自定义端口号和地址


    ### 访问敏感端点


    当使用 Spring Security 保护 Spring Boot 应用程序时，您可以通过在 `application.properties` 文件中定义默认安全属性（如用户名、密码和角色）来保护这些端点，如下代码所示：


    ```

    management.security.enabled=true

    security.user.name=admin

    security.user.password=password

    security.user.role=ADMIN

    ```


    当您尝试访问受保护的端点（例如默认情况下敏感的 `/info`）时，将弹出一个窗口提示输入凭据，如图 7-15 所示。


    ![A436970_1_En_7_Fig15_HTML.jpg](img/A436970_1_En_7_Fig15_HTML.jpg)


    图 7-15.


    访问受保护的端点


    ## 总结


    在本章中，您了解了 Spring Boot Actuator，以及如何通过在 Maven `pom.xml` 文件中添加依赖项来启用 Actuator。然后，您了解了一些
    Actuator 端点。之后，您自定义了这些现有的 Spring Boot Actuator 端点并定义了新的端点。最后，您自定义了服务器端口。


    ## 附录 A：访问 REST API 的工具


    当您需要在敏捷开发环境中工作时，您需要能够快速测试您的 API。在本附录中，您将了解开源 REST API 测试。


    针对 REST API 服务的 GUI 测试速度较慢，对于希望从最新构建中快速获得代码结果的开发者来说，这是一个糟糕的选择。API 测试被认为是开发者的更好选择，因为它往往比
    GUI 测试更快且更可靠。


    ## API 测试


    应用程序编程接口（API）测试涉及绕过使用 GUI/网页的用户交互，通过进行 API 调用直接与应用程序内的服务进行通信。


    API 测试允许开发者测试“无头”技术，例如 RESTful Web 服务。在无头测试中，GUI（或头部）被绕过；请求直接发送到应用程序的服务，服务接收响应以验证结果。


    ## API 测试工具


    您需要找到一个工具来进行 REST API 测试。互联网上有许多 API 测试工具可用；例如，Selenium 是一个基于浏览器的测试工具。在本书中，您将使用
    Postman。


    让我们探索 Postman API 测试工具。

    '
- fmt: "### Postman\n\nPostman is a REST client that started off as a Chrome browser\
    \ plug-in for making HTTP requests. Postman can be used to make HTTP requests\
    \ to REST services and get responses from the server.\n\nYou can download Postman\
    \ from the Chrome web store using the link [`https://chrome.google.com/webstore/detail/postman/fhbjgbiflinjbdggehcddcbncdddomop`](https://chrome.google.com/webstore/detail/postman/fhbjgbiflinjbdggehcddcbncdddomop),\
    \ as shown in Figure [A-1](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig1).\n\
    \n![A436970_1_En_BookBackmatter_Fig1_HTML.jpg](A436970_1_En_BookBackmatter_Fig1_HTML.jpg)\n\
    \nFigure A-1. Adding Postman to Chrome\n\nClicking the Add To Chrome button will\
    \ result in a pop-up, as shown in Figure [A-2](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig2).\n\
    \n![A436970_1_En_BookBackmatter_Fig2_HTML.jpg](A436970_1_En_BookBackmatter_Fig2_HTML.jpg)\n\
    \nFigure A-2. Pop-up to add Postman app\n\nClicking \"Add app\" will download\
    \ a `.crx` file. Once this download is successful, Postman will be added to the\
    \ Chrome app list. Visit `chrome://apps/` in a Chrome browser to see the list\
    \ of apps available in Chrome.\n\nNow you can launch the app by clicking the Launch\
    \ App button, as shown in Figure [A-3](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig3).\n\
    \n![A436970_1_En_BookBackmatter_Fig3_HTML.jpg](A436970_1_En_BookBackmatter_Fig3_HTML.jpg)\n\
    \nFigure A-3. Launching an app\n\nOnce you launch the app, you will get a new\
    \ window showing the Postman tool, as shown in Figure [A-4](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig4).\n\
    \n![A436970_1_En_BookBackmatter_Fig4_HTML.jpg](A436970_1_En_BookBackmatter_Fig4_HTML.jpg)\n\
    \nFigure A-4. Postman app\n\nPostman lets developers compose HTTP requests from\
    \ the user interface and send those requests to the server. Developers can view\
    \ the responses, as shown in Figure [A-5](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig5).\n\
    \n![A436970_1_En_BookBackmatter_Fig5_HTML.jpg](A436970_1_En_BookBackmatter_Fig5_HTML.jpg)\n\
    \nFigure A-5. Postman app showing responses\n\n### Functions in Postman\n\nLet's\
    \ look at a few of the functions available in Postman.\n\n#### Request URL\n\n\
    The \"Enter request URL\" box allows users to enter a request URL.\n\n#### HTTP\
    \ Method\n\nThe drop-down to the left of the \"Enter request URL\" box lets developers\
    \ select their HTTP method, such as `GET`, `POST`, and so on, as shown in Figure\
    \ [A-6](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig6).\n\n![A436970_1_En_BookBackmatter_Fig6_HTML.jpg](A436970_1_En_BookBackmatter_Fig6_HTML.jpg)\n\
    \nFigure A-6. HTTP methods\n\n#### Parameters\n\nThe Params button is to the right\
    \ of the \"Enter request URL\" box. This lets users set the param's key and value,\
    \ which will be passed along with the request URL that calls an API, as shown\
    \ in Figure [A-7](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig7).\n\n![A436970_1_En_BookBackmatter_Fig7_HTML.jpg](A436970_1_En_BookBackmatter_Fig7_HTML.jpg)\n\
    \nFigure A-7. Parameters in Postman\n\n#### Authorization\n\nThere is Authorization\
    \ tab underneath the \"Enter request URL here\" box. Clicking Authorization brings\
    \ up a drop-down to select options as No Auth, Basic Auth, and so on, as shown\
    \ in Figure [A-8](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig8). The default\
    \ selection is No Auth.\n\n![A436970_1_En_BookBackmatter_Fig8_HTML.jpg](A436970_1_En_BookBackmatter_Fig8_HTML.jpg)\n\
    \nFigure A-8. Authorization options in Postman\n\n#### Headers\n\nClicking Headers\
    \ allows the user to enter header information, as shown in Figure [A-9](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig9).\n\
    \n![A436970_1_En_BookBackmatter_Fig9_HTML.jpg](A436970_1_En_BookBackmatter_Fig9_HTML.jpg)\n\
    \nFigure A-9. Headers in Postman\n\n#### Body\n\nThe Body tab is available only\
    \ for these HTTP methods: `Post`, `Put`, `Patch`, `Delete`, `Link`, `Unlink`,\
    \ `Lock`, and `Propfind`. For other HTTP methods, it will be disabled. Clicking\
    \ Body will bring up four options: form-data, x-www-form-urlencoded, raw, and\
    \ binary.\n\n*   **Form-data**: Selecting this will reveal a row with a Key drop-down\
    \ menu.\n*   **X-www-form-urlencoded**: Selecting this will reveal a row below\
    \ with Key and Value fields.\n*   **Raw**: Selecting this will reveal a drop-down\
    \ menu and a text box with numbered rows, as shown in Figure [A-10](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig10).\
    \ The drop-down menu has the following options: Text, Text (text/plain), JSON\
    \ (application/json), Javascript (application/javascript), XML (application/xml),\
    \ XML (text/xml), and HTML (text/html).\n\n    ![A436970_1_En_BookBackmatter_Fig10_HTML.jpg](A436970_1_En_BookBackmatter_Fig10_HTML.jpg)\n\
    \n    Figure A-10. Body options in Postman\n\n#### Send\n\nUse the blue Send button\
    \ to send the HTTP request.\n\n### Response Message\n\nAfter clicking the Send\
    \ button, you'll receive a response message from requested APIs. The response\
    \ message can include tabs called Body, Cookies, Headers, and Tests, as shown\
    \ in Figure [A-11](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig11).\n\n![A436970_1_En_BookBackmatter_Fig11_HTML.jpg](A436970_1_En_BookBackmatter_Fig11_HTML.jpg)\n\
    \nFigure A-11. Response options in Postman\n\n#### Body\n\nThe body can be displayed\
    \ with Pretty, Raw, and Preview options. Pretty allows developers to select from\
    \ these options: JSON, XML, HTML, Text, and Auto.\n\n#### Cookies\n\nTo use cookies,\
    \ it is required that you install the Postman Interceptor app using the link [`https://chrome.google.com/webstore/detail/postmaninterceptor/aicmkgpgakddgnaphhhpliifpcfhicfo?hl=en`](https://chrome.google.com/webstore/detail/postmaninterceptor/aicmkgpgakddgnaphhhpliifpcfhicfo?hl=en).\
    \ Once the Interceptor app is installed, enable it as shown in Figure [A-12](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig12).\n\
    \n![A436970_1_En_BookBackmatter_Fig12_HTML.jpg](A436970_1_En_BookBackmatter_Fig12_HTML.jpg)\n\
    \nFigure A-12. Enabling Interceptor for cookies\n\n#### Headers\n\nThis will display\
    \ the headers received in the row format.\n\n#### Tests\n\nThis is available for\
    \ paid customers.\n\n### Other Features\n\nThe History section of Postman, on\
    \ the left of the window, records all the requests you've made, as shown in Figure\
    \ [A-13](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig13). History saves the\
    \ HTTP requests and allows them to be reopened.\n\n![A436970_1_En_BookBackmatter_Fig13_HTML.jpg](A436970_1_En_BookBackmatter_Fig13_HTML.jpg)\n\
    \nFigure A-13."
