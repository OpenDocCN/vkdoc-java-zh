    \nFigure A-4.\n\nPostman app\n\nPostman lets developers compose HTTP requests\
    \ from the user interface and send those requests to the server. Developers can\
    \ view the responses, as shown in Figure [A-5](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig5)\
    \ .\n\n![A436970_1_En_BookBackmatter_Fig5_HTML.jpg](A436970_1_En_BookBackmatter_Fig5_HTML.jpg)\n\
    \nFigure A-5.\n\nPostman app showing responses\n\n#### Functions in Postman\n\n\
    Let’s look at a few of the functions available in Postman.\n\n##### Request URL\n\
    \nThe “Enter request URL” box allows users to enter a request URL.\n\n##### HTTP\
    \ Method\n\nThe drop-down to the left of the “Enter request URL” box lets developers\
    \ select their HTTP method, such as `GET` , `POST` , and so on, as shown in Figure\
    \ [A-6](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig6) .\n\n![A436970_1_En_BookBackmatter_Fig6_HTML.jpg](A436970_1_En_BookBackmatter_Fig6_HTML.jpg)\n\
    \nFigure A-6.\n\nHTTP methods\n\n##### Parameters\n\nThe Params button is to the\
    \ right of the “Enter request URL” box. This lets users set the param’s key and\
    \ value, which will be passed along with the request URL that calls an API, as\
    \ shown in Figure [A-7](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig7) .\n\n\
    ![A436970_1_En_BookBackmatter_Fig7_HTML.jpg](A436970_1_En_BookBackmatter_Fig7_HTML.jpg)\n\
    \nFigure A-7.\n\nParameters in Postman\n\n##### Authorization\n\nThere is Authorization\
    \ tab underneath the “Enter request URL here” box. Clicking Authorization brings\
    \ up a drop-down to select options as No Auth, Basic Auth, and so on, as shown\
    \ in Figure [A-8](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig8) . The default\
    \ selection is No Auth.\n\n![A436970_1_En_BookBackmatter_Fig8_HTML.jpg](A436970_1_En_BookBackmatter_Fig8_HTML.jpg)\n\
    \nFigure A-8.\n\nAuthorization options in Postman\n\n##### Headers\n\nClicking\
    \ Headers allows the user to enter header information, as shown in Figure [A-9](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig9)\
    \ .\n\n![A436970_1_En_BookBackmatter_Fig9_HTML.jpg](A436970_1_En_BookBackmatter_Fig9_HTML.jpg)\n\
    \nFigure A-9.\n\nHeaders in Postman\n\n##### Body\n\nThe Body tab is available\
    \ only for these HTTP methods: `Post` , `Put` , `Patch` , `Delete` , `Link` ,\
    \ `Unlink` , `Lock` , and `Propfind` . For other HTTP methods, it will be disabled.\
    \ Clicking Body will bring up four options: form-data, x-www-form-urlencoded,\
    \ raw, and binary.\n\n*   Form-data : Selecting this will reveal a row with a\
    \ Key drop-down menu.\n*   X-www-form-urlencoded : Selecting this will reveal\
    \ a row below with Key and Value fields.\n*   Raw : Selecting this will reveal\
    \ a drop-down menu and a text box with numbered rows, as shown in Figure [A-10](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig10)\
    \ . The drop-down menu has the following options: Text, Text (text/plain), JSON\
    \ (application/json), Javascript (application/javascript), XML (application/xml),\
    \ XML (text/xml), and HTML (text/html).\n\n    ![A436970_1_En_BookBackmatter_Fig10_HTML.jpg](A436970_1_En_BookBackmatter_Fig10_HTML.jpg)\n\
    \n    Figure A-10.\n\n    Body options in Postman\n\n##### Send\n\nUse the blue\
    \ Send button to send the HTTP request.\n\n#### Response Message\n\nAfter clicking\
    \ the Send button, you’ll receive a response message from requested APIs. The\
    \ response message can include tabs called Body, Cookies, Headers, and Tests,\
    \ as shown in Figure [A-11](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig11)\
    \ .\n\n![A436970_1_En_BookBackmatter_Fig11_HTML.jpg](A436970_1_En_BookBackmatter_Fig11_HTML.jpg)\n\
    \nFigure A-11.\n\nResponse options in Postman\n\n##### Body\n\nThe body can be\
    \ displayed with Pretty, Raw, and Preview options. Pretty allows developers to\
    \ select from these options: JSON, XML, HTML, Text, and Auto.\n\n##### Cookies\n\
    \nTo use cookies, it is required that you install the Postman Interceptor app\
    \ using the link [`https://chrome.google.com/webstore/detail/postmaninterceptor/aicmkgpgakddgnaphhhpliifpcfhicfo?hl=en`](https://chrome.google.com/webstore/detail/postmaninterceptor/aicmkgpgakddgnaphhhpliifpcfhicfo?hl=en)\
    \ . Once the Interceptor app is installed, enable it as shown in Figure [A-12](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig12)\
    \ .\n\n![A436970_1_En_BookBackmatter_Fig12_HTML.jpg](A436970_1_En_BookBackmatter_Fig12_HTML.jpg)\n\
    \nFigure A-12.\n\nEnabling Interceptor for cookies\n\n##### Headers\n\nThis will\
    \ display the headers received in the row format.\n\n##### Tests\n\nThis is available\
    \ for paid customers.\n\n#### Other Features\n\nThe History section of Postman,\
    \ on the left of the window, records all the requests you’ve made, as shown in\
    \ Figure [A-13](#A436970_1_En_BookBackmatter_OnlinePDF.html#Fig13) . History saves\
    \ the HTTP requests and allows them to be reopened.\n\n![A436970_1_En_BookBackmatter_Fig13_HTML.jpg](A436970_1_En_BookBackmatter_Fig13_HTML.jpg)\n\
    \nFigure A-13."
  trans: "\n### Postman\n\nPostman 是一款 REST 客户端，最初是作为 Chrome 浏览器插件而开发的，用于发起 HTTP 请求。Postman\
    \ 可用于向 REST 服务发送 HTTP 请求，并从服务器获取响应。\n\n你可以通过链接 [`https://chrome.google.com/webstore/detail/postman/fhbjgbiflinjbdggehcddcbncdddomop`](https://chrome.google.com/webstore/detail/postman/fhbjgbiflinjbdggehcddcbncdddomop)\
    \ 从 Chrome 网上应用店下载 Postman，如图 A-1 所示。\n\n![A436970_1_En_BookBackmatter_Fig1_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig1_HTML.jpg)\n\
    \n图 A-1.\n\n将 Postman 添加到 Chrome\n\n点击“添加到 Chrome”按钮会弹出一个窗口，如图 A-2 所示。\n\n![A436970_1_En_BookBackmatter_Fig2_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig2_HTML.jpg)\n\
    \n图 A-2.\n\n添加 Postman 应用的弹出窗口\n\n点击“添加应用”将下载一个 `.crx` 文件。下载成功后，Postman 将被添加到\
    \ Chrome 的应用列表中。在 Chrome 浏览器中访问 `chrome://apps/` 即可查看 Chrome 中可用的应用列表。\n\n现在，你可以点击“启动应用”按钮来启动该应用，如图\
    \ A-3 所示。\n\n![A436970_1_En_BookBackmatter_Fig3_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig3_HTML.jpg)\n\
    \n图 A-3.\n\n启动应用\n\n启动应用后，你将看到一个显示 Postman 工具的新窗口，如图 A-4 所示。\n\n![A436970_1_En_BookBackmatter_Fig4_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig4_HTML.jpg)\n\
    \n图 A-4.\n\nPostman 应用\n\nPostman 允许开发者通过用户界面编写 HTTP 请求，并将这些请求发送到服务器。开发者可以查看响应，如图\
    \ A-5 所示。\n\n![A436970_1_En_BookBackmatter_Fig5_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig5_HTML.jpg)\n\
    \n图 A-5.\n\n显示响应的 Postman 应用\n\n#### Postman 中的功能\n\n让我们来看看 Postman 中可用的一些功能。\n\
    \n##### 请求 URL\n\n“输入请求 URL”框允许用户输入请求 URL。\n\n##### HTTP 方法\n\n“输入请求 URL”框左侧的下拉菜单允许开发者选择其\
    \ HTTP 方法，例如 `GET`、`POST` 等，如图 A-6 所示。\n\n![A436970_1_En_BookBackmatter_Fig6_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig6_HTML.jpg)\n\
    \n图 A-6.\n\nHTTP 方法\n\n##### 参数\n\nParams 按钮位于“输入请求 URL”框的右侧。这允许用户设置参数的键和值，这些参数将与调用\
    \ API 的请求 URL 一起传递，如图 A-7 所示。\n\n![A436970_1_En_BookBackmatter_Fig7_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig7_HTML.jpg)\n\
    \n图 A-7.\n\nPostman 中的参数\n\n##### 授权\n\n“在此输入请求 URL”框下方有一个“授权”选项卡。点击“授权”会弹出一个下拉菜单，用于选择选项，如“无授权”、“基本授权”等，如图\
    \ A-8 所示。默认选择是“无授权”。\n\n![A436970_1_En_BookBackmatter_Fig8_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig8_HTML.jpg)\n\
    \n图 A-8.\n\nPostman 中的授权选项\n\n##### 标头\n\n点击“标头”允许用户输入标头信息，如图 A-9 所示。\n\n![A436970_1_En_BookBackmatter_Fig9_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig9_HTML.jpg)\n\
    \n图 A-9.\n\nPostman 中的标头\n\n##### 请求体\n\n“请求体”选项卡仅对以下 HTTP 方法可用：`Post`、`Put`、`Patch`、`Delete`、`Link`、`Unlink`、`Lock`\
    \ 和 `Propfind`。对于其他 HTTP 方法，该选项卡将被禁用。点击“请求体”会显示四个选项：form-data、x-www-form-urlencoded、raw\
    \ 和 binary。\n\n*   Form-data：选择此项将显示一行带有“键”下拉菜单的内容。\n*   X-www-form-urlencoded：选择此项将在下方显示一行带有“键”和“值”字段的内容。\n\
    *   Raw：选择此项将显示一个下拉菜单和一个带有编号行的文本框，如图 A-10 所示。下拉菜单包含以下选项：Text、Text (text/plain)、JSON\
    \ (application/json)、Javascript (application/javascript)、XML (application/xml)、XML\
    \ (text/xml) 和 HTML (text/html)。\n\n    ![A436970_1_En_BookBackmatter_Fig10_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig10_HTML.jpg)\n\
    \n    图 A-10.\n\n    Postman 中的请求体选项\n\n##### 发送\n\n使用蓝色的“发送”按钮来发送 HTTP 请求。\n\n\
    #### 响应消息\n\n点击“发送”按钮后，你将收到来自所请求 API 的响应消息。响应消息可以包含名为“响应体”、“Cookies”、“标头”和“测试”的选项卡，如图\
    \ A-11 所示。\n\n![A436970_1_En_BookBackmatter_Fig11_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig11_HTML.jpg)\n\
    \n图 A-11.\n\nPostman 中的响应选项\n\n##### 响应体\n\n响应体可以通过“美化”、“原始”和“预览”选项来显示。“美化”允许开发者从以下选项中选择：JSON、XML、HTML、Text\
    \ 和 Auto。\n\n##### Cookies\n\n要使用 Cookies，你需要通过链接 [`https://chrome.google.com/webstore/detail/postmaninterceptor/aicmkgpgakddgnaphhhpliifpcfhicfo?hl=en`](https://chrome.google.com/webstore/detail/postmaninterceptor/aicmkgpgakddgnaphhhpliifpcfhicfo?hl=en)\
    \ 安装 Postman Interceptor 应用。安装好 Interceptor 应用后，按图 A-12 所示启用它。\n\n![A436970_1_En_BookBackmatter_Fig12_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig12_HTML.jpg)\n\
    \n图 A-12.\n\n为 Cookies 启用 Interceptor\n\n##### 标头\n\n这将显示以行格式接收到的标头。\n\n#####\
    \ 测试\n\n此功能仅对付费用户可用。\n\n#### 其他功能\n\nPostman 的“历史记录”部分位于窗口左侧，记录了你发起的所有请求，如图 A-13\
    \ 所示。历史记录会保存 HTTP 请求，并允许重新打开它们。\n\n![A436970_1_En_BookBackmatter_Fig13_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig13_HTML.jpg)\n\
    \n图 A-13.\n"
