    `.`


    ## Customizing an Actuator Endpoint


    You can customize Actuator endpoints via Spring properties (`application.properties`)
    using the following format:


    ```

    endpoints.[endpoint-name].[property to customize]

    ```


    ### Properties to Customize


    Three properties are available to customize Actuator endpoints.


    *   `id`: This is the property by which the endpoint will be accessed over HTTP.

    *   `enabled`: This endpoint gives access control to the endpoint. If it is set
    as `true`, then this endpoint can be accessed; otherwise, it cannot be.

    *   `sensitive`: This property provides a security layer to the endpoint. If it
    is set as `true`, then the required authorization shows critical information over
    HTTP.


    For example, you can customize the `id`, `sensitive`, and `enabled` properties
    of the `/health` endpoint by adding the following properties in the `application.properties`
    file:


    ```

    endpoints.health.id=userregistrationsystemhealth

    endpoints.health.enabled=true

    endpoints.health.sensitive=false

    ```


    Once you start your application, `/userregistrationsystemhealth` will appear in
    the console, as shown in Figure [7-8](#A436970_1_En_7_Chapter.html#Fig8).


    ![A436970_1_En_7_Fig8_HTML.jpg](A436970_1_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    /userregistrationsystemhealth endpoint in the console


    The prefix `endpoints` is used to identify the endpoint that is being configured
    in your application. You can access this customized `/health` endpoint using `/userregistrationsystemhealth`,
    as shown in Figure [7-9](#A436970_1_En_7_Chapter.html#Fig9).


    ![A436970_1_En_7_Fig9_HTML.jpg](A436970_1_En_7_Fig9_HTML.jpg)


    Figure 7-9.


    Customized health endpoint


    The `/health` endpoint gives health information that is collected from all the
    beans that implement a `HealthIndicator` interface and is configured in your application
    context. Since some of the information is sensitive in nature, you can configure
    `endpoints.health.sensitive=false` to expose other information such as the disk
    space and data source, as shown in Figure [7-10](#A436970_1_En_7_Chapter.html#Fig10).


    Similarly, you can customize the data shown by the `/info` endpoint by adding
    the following properties in the `application.properties` file:


    ```

    info.app.name=User Registration System Application

    info.app.description=This Spring Boot application has been created for learning

    info.app.version=1.0.0

    ```


    The following output will appear in the browser, as shown in Figure [7-9](#A436970_1_En_7_Chapter.html#Fig9).


    ![A436970_1_En_7_Fig10_HTML.jpg](A436970_1_En_7_Fig10_HTML.jpg)


    Figure 7-10.


    Customized /info endpoint


    ```

    {

    "app":

    {

    "description":"This Spring Boot application has been created for learning",

    "name":"User Registration System Application",

    "version":"1.0.0"

    }

    }

    ```'
