  raw: "#### MockMvc\n\nThe `MockMvc` class is the central class of the Spring MVC\
    \ Test framework. The `org.springframework.test.web.servlet.MockMvc` class can\
    \ be used to write the test for the applications developed using the Spring MVC\
    \ framework. The `MockMvc` class can be used to perform HTTP requests.\n\n`MockMvc`\
    \ mock the entire Spring infrastructure and is created using the implementation\
    \ of the `org.springframework.test.web.servlet.MockMvcBuilder` interface, which\
    \ makes the Spring MVC Test framework heavily use the Builder pattern.\n\nThe\
    \ `MockMvc` class contains the `perform` method, which can be used to run test\
    \ cases by passing a relative path. After that, the `Expect` method can be used\
    \ to verify the different components inside the controller.\n\nThe `andExpect\
    \ (status().OK())` line can be used to verify the 200 status. Similarly, `contentType`\
    \ validation, XPath validation, data validation model, URL validation, and so\
    \ on, can be performed.\n\nLet’s create the `UserRegistrationControllerTest` class\
    \ in the package `com.apress.ravi.chapter` [`6`](#A436970_1_En_6_Chapter.html)\
    \ `.UserRegistrationSystem` under the `src/test/java` folder, as shown in Listing\
    \ [6-19](#A436970_1_En_6_Chapter.html#Par114), to demonstrate how to test the\
    \ `UserRegistrationRestController`’s `getUserById` method. You will also mock\
    \ the dependencies that the controller requires.\n\n```\npackage com.apress.ravi.chapter6.UserRegistrationSystem;\n\
    import static org.hamcrest.Matchers.is;\nimport static org.mockito.Mockito.when;\n\
    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultHandlers.print;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.jsonPath;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
    import java.nio.charset.Charset;\nimport org.junit.Before;\nimport org.junit.Test;\n\
    import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\nimport\
    \ org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.http.MediaType;\n\
    import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
    import org.springframework.test.web.servlet.MockMvc;\nimport com.apress.ravi.chapter2.UserRegistrationSystemApplication;\n\
    import com.apress.ravi.chapter2.Rest.UserRegistrationRestController;\nimport com.apress.ravi.chapter2.dto.UsersDTO;\n\
    import com.apress.ravi.chapter2.repository.UserJpaRepository;;\n@RunWith(SpringRunner.class)\n\
    @WebMvcTest(controllers = UserRegistrationRestController.class)\n@ContextConfiguration(classes\
    \ = UserRegistrationSystemApplication.class)\npublic class UserRegistrationControllerTest\
    \ {\n@Autowired\nprivate MockMvc mockMvc;\n@MockBean\nprivate UserJpaRepository\
    \ userJpaRepositoryMock;\nprivate MediaType contentType;\nprivate UsersDTO user;\n\
    @Before\npublic void setup() {\ncontentType = new MediaType(MediaType.APPLICATION_JSON.getType(),\n\
    MediaType.APPLICATION_JSON.getSubtype(),\nCharset.forName(\"utf8\"));\nuser =\
    \ new UsersDTO();\nuser.setName(\"Ravi Kant Soni\");\nuser.setAddress(\"JP Nagar;\
    \ Bangalore; India\");\nuser.setEmail(\"ravikantsoni.author@gmail.com\");\n}\n\
    @Test\npublic void shouldReturnSuccessMessage() throws Exception {\nwhen(this.userJpaRepositoryMock.findById(1L)).thenReturn(user);\n\
    this.mockMvc.perform(get(\"/api/user/1\"))\n.andExpect(status().isOk())\n.andExpect(content().contentType(contentType))\n\
    .andExpect(jsonPath(\"'.name\", is(\"Ravi Kant Soni\")))\n.andExpect(jsonPath(\"\
    '.address\",\nis(\"JP Nagar; Bangalore; India\")))\n.andExpect(jsonPath(\"'.email\"\
    ,\nis(\"ravikantsoni.author@gmail.com\")))\n.andDo(print());\n}\n}\nListing 6-19.\n\
    Testing the Web Layer Using Spring MVC Test\n```\n\nLet’s look at Listing [6-19](#A436970_1_En_6_Chapter.html#Par114)\
    \ in detail. In it, you tested the behavior of `UserRegistrationRestController`’s\
    \ `getUserById` method .\n\n*   @RunWith, @WebMvcTest, and @ContextConfiguration:\
    \ You have used the `@ContextConfiguration` annotation to look for the main configuration\
    \ class. The `@WebMvcTest` annotation is used to test the web layer. So, Spring\
    \ Boot will instantiate the web layer, not the whole context.\n*   @Autowired\
    \ MockMvc: You have autowired `MockMvc` instead of building it manually. So, Spring\
    \ will create and configure `MockMvc` and inject it at runtime. An `@Autowired\
    \ MockMvc` combined with `@WebMvcTest(controllers=UserRegistrationRestControlle.class`)\
    \ gives a fully configured `MockMvc` instance. Using `MockMvc`, you sent mock\
    \ HTTP requests to `UserRegistrationRestController` and tested how `UserRegistrationRestController`\
    \ behaves without running this controller within a server.\n*   @MockBean: You\
    \ annotated `UserJpaRepository` with the `@MockBean` annotation to create and\
    \ inject a mock of `UserJpaRepository`.\n*   @Before: You annotated the setup\
    \ method with the `@Before` annotation. You created and initialized the `MediaType`\
    \ (`contentType`) and `UserDTO` (`user`) domain objects that have been used in\
    \ the `@Test` method.\n*   @Test: You annotated the `shouldReturnSuccessMessage`\
    \ method with the `@Test` annotation. You have used Mockito to stub the `findById`\
    \ method on the `UserJpaRepository` mock to return the initialized `UserDTO` instance.\
    \ You used the `MockMvcRequestBuilders` class’s `get` to create a `GET` request.\
    \ `MockMvcRequestBuilders` also provides additional methods such as `post`, `put`,\
    \ and `delete` to create corresponding HTTP requests. You have called `MockMvc`’s\
    \ `perform` to make a `GET` request to `\"/api/user/{id}\"` and the `Expect` method\
    \ to perform assert the response:\n    *   HTTP status code 200 in response.\n\
    \    *   The `contentType` in the response content.\n    *   The properties (name,\
    \ address, e-mail) of the user attribute against the values you used to initialize\
    \ `UserDTO`. You have used the `JsonPath` expression in the `jsonPath` method\
    \ to write assertions against the response body. Put simply, `JsonPath` for JSON\
    \ is the same as `xPath` for XML.\n\nFinally, you have used `andDo(print())` to\
    \ get the following output on the console:\n\n```\nMockHttpServletRequest:\nHTTP\
    \ Method = GET\nRequest URI = /api/user/1\nParameters = {}\nHeaders = {}\nHandler:\n\
    Type = com.apress.ravi.chapter2.Rest.UserRegistrationRestController\nMethod =\
    \ public org.springframework.http.ResponseEntity com.apress.ravi.chapter2.Rest.UserRegistrationRestCont\n\
    roller.getUserById(java.lang.Long)\nAsync:\nAsync started = false\nAsync result\
    \ = null\nResolved Exception:\nType = null\nModelAndView:\nView name = null\n\
    View = null\nModel = null\nFlashMap:\nAttributes = null\nMockHttpServletResponse:\n\
    Status = 200\nError message = null\nHeaders = {Content-Type=[application/json;charset=UTF-8]}\n\
    Content type = application/json;charset=UTF-8\nBody = {\"id\":null,\"name\":\"\
    Ravi Kant Soni\",\"address\":\"JP Nagar; Bang\nalore; India\",\"email\":\"ravikantsoni.author@gmail.com\"\
    }\nForwarded URL = null\nRedirected URL = null\nCookies = []\n```\n\nWhen you\
    \ run the test, the JUnit view of the test result looks like Figure [6-7](#A436970_1_En_6_Chapter.html#Fig7).\n\
    \n![A436970_1_En_6_Fig7_HTML.jpg](A436970_1_En_6_Fig7_HTML.jpg)\n\nFigure 6-7.\n\
    \nJUnit view of test"
