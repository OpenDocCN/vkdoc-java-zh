    图 2-11.


    创建缺少地址的用户时返回的自定义错误消息


    #### 外部化错误消息


    到目前为止，你在输入数据验证方面取得了良好进展，客户端能够收到描述性的错误消息，这有助于客户端在消费 API 时排查问题并从这些错误中恢复。


    尽管你在上一节中看到的错误消息是描述性的，但 API 开发者可以通过从外部的 `messages.properties` 文件中提取此消息，使其更具描述性。这种
    properties 文件方法允许 API 开发者轻松地替换消息，而无需修改代码。它还支持国际化/本地化。


    下一步是读取 properties 文件，以便在创建 `ValidationError` 实例时可以使用该文件中的属性。为了实现该功能，你必须在应用程序配置类中配置
    `ReloadableResourceBundleMessageSource`。

