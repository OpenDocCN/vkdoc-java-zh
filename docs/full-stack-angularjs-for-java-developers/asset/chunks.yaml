- fmt: '# Architecture of Modern Web Applications


    In the early days of the Web, web applications didn’t exist. We had web sites
    full of static content and images. There were advantages and disadvantages to
    this.


    Here are a few advantages:


    - There was very low computational overhead on the server.

    - The content itself was highly cacheable as the data was static and didn’t change
    for lots of ISPs and server providers.


    Here are a few disadvantages:


    - It was hard to update content.

    - There was no personalization, and everybody got the same experience.

    - The UI was usually poor when compared to the applications of today.


    `CGI` introduced a revolution by enabling dynamic content creation using scripting
    languages. On the downside, there was a relatively high computational overhead,
    and it required you to be an expert in HTML and scripting languages on the server
    side.


    Then JavaScript came, which enabled the pages to be dynamic for the first time.
    It was mostly used for very basic scripting to validate forms or display pop-up
    ads. It enhanced the usability and reduced round-trips to server for very basic
    validations. The disadvantage was that you had to implement the business logic
    twice, once on the client side and once on the server side. So, we have come up
    with the architecture of modern web applications.


    In this section, I will discuss the architecture of modern applications to overcome
    the myth that developing isolated desktop and mobile applications is a good way
    to go. Modern web applications focus on a distributed back-end infrastructure
    to serve content and front-end clients over the Web using `RESTful` APIs, as shown
    in the layered architecture of the web application in Figure [1-3](#A436970_1_En_1_Chapter.html#Fig3).


    ![A436970_1_En_1_Fig3_HTML.jpg](A436970_1_En_1_Fig3_HTML.jpg)


    Figure 1-3. Layered architecture of modern web applications


    When you want to interact with multiple components on a page and those components
    have many more intermediate components, then it is hard for all the intermediate
    components to implement server-side rendering. Compared to the traditional server-side
    architecture, the main idea here is to build the server as a set of stateless
    reusable REST services. From the Model-View-Controller (MVC) point of view, the
    controller has been taken out of the back end and moved onto the client. So, now
    the client is capable of using the MVC architecture. The client has a separate
    view layer that contains all the presentation logic. It also has a separate front-end
    services layer and a controller layer.


    During the initial startup of an application, only the JSON data is transferred
    between the client and server using a `RESTful` API. The entire business logic
    will be exposed as REST endpoints that will be consumed by Angular services. The
    benefit here is that when you have a mobile app of your web application, you can
    just consume the `RESTful` services without writing any additional code on the
    server side for your mobile app.


    `REST` stands for Representational State Transfer, which is an architectural style
    that is an abstraction opposed to a concrete thing. It is the architecture of
    the Web as it works today. You will study `RESTful` APIs in more detail in Chapter
    [2](#A436970_1_En_2_Chapter.html) where you will be creating the `RESTful` layer
    for your application.


    ## Front End vs. Back End


    When you develop a web application, you separate the development process mainly
    into two parts: the front end and the back end. When you talk about a web app
    or mobile app, basically you focus on front-end development. When you use any
    web app or any browser, you type the address, and the web site opens with multiple
    elements such as text, images, forms, and different interactive elements. Figure
    [1-4](#A436970_1_En_1_Chapter.html#Fig4) shows the physical view of the front
    end and back end.


    ![A436970_1_En_1_Fig4_HTML.jpg](A436970_1_En_1_Fig4_HTML.jpg)


    Figure 1-4. Physical view of front end and back end


    If you use a mobile app, you will have different elements, list views, and so
    on. These applications will appear on the client side. So, whether you have a
    laptop or mobile device or you are using a browser or mobile application, you
    will get the client side of a complete application.


    All the user data is stored in a database. All the business logic and secured
    data are stored on the server. The server receives requests from the web app or
    mobile app, processes these requests, grabs the necessary information from the
    database or the files from the file server, and sends them back to the front-end
    app. So basically, the back end stores the information, and the front end displays
    the information.


    Designers and developers commonly use a framework for prototyping web sites and
    applications because building an app or web site from scratch takes a lot of time.


    The software framework is defined as a predefined set of reusable modules that
    can be implemented to accomplish a designated job better and faster. Thus, a software
    framework always contains libraries, compilers, and multiple APIs to develop a
    specific enterprise web application. A good full stack developer should know which
    framework is most appropriate to implement for their set of applications.


    These are a few of the popular software frameworks available:


    - `AngularJS` (for UI/front-end development)

    - `Ionic` (for hybrid mobile app prototyping and development)

    - `Pure MVC` framework (application development framework)

    - `Selenium` (web testing framework)


    In computer programming, a software framework is an abstraction in which software
    providing generic functionality can be selectively changed by additional user-written
    code, thus providing application-specific software.


    ## Front-End Framework


    The front end involves everything that the user sees, including the design and
    some languages like HTML and CSS. The main aim of the front-end code is to interact
    with the user, as well as present the data in a well-defined style.


    There are so many amazing JavaScript libraries that you can use when building
    a front-end application. Sometimes it can be a bit tricky to choose one single
    project. The front end is all the stuff that makes the web application look and
    feel sexy. This front-end content is HTML, CSS, and JavaScript. You will use `AngularJS`
    as a front-end development framework in this book. I’ll cover `AngularJS` in more
    detail later in the chapter.


    ### AngularJS as a Front-End Framework


    `AngularJS` is a library written in JavaScript for web application development.
    It addresses the challenges of a single-page application (SPA). An `AngularJS`
    web application follows the MVC design pattern that results in developing extendable,
    maintainable, testable, and standardized web applications. `AngularJS` data binding
    and dependency injection make it an ideal partner with any server technology because
    it eliminates much of the code you would otherwise have to write, and it all happens
    within the browser.


    #### AngularJS Version


    `AngularJS` is commonly referred to as `Angular.js` or sometimes as `AngularJS
    1.x`. `AngularJS` is a JavaScript-based open source front-end web application
    development framework and is mainly maintained by Google.


    Now, `Angular 4.0.0` is available and is backward compatible with `2.x.x` for
    most applications. This new version contains some new features such as an animation
    package pulled out from core into its own package, an improved `ngIf` that supports
    `if/else` style, and more.'
