  trans: '

    # 4. 使用 Spring Security 保护你的 RESTful API


    在本章中，你将保护你的 REST API，使得只有经过身份验证和授权的用户才能调用 REST API 并执行不同的 CRUD 操作。你将使用 Spring
    Security 来保护你的 RESTful 服务。首先，我将介绍 Spring Security 并解释所需的 Maven 依赖项。然后，你将学习如何在
    UserRegistrationSystem 应用程序中实现 Spring Security 来保护你的 REST API。你还将了解用于设置用户凭据及其角色的内存和数据库配置。


    ## 介绍 Spring Security


    安全是指保护资源免受未经身份验证和未授权用户的访问，并允许特定（经过身份验证和授权）用户访问这些受保护资源的过程。安全不同于防火墙、入侵检测、JVM 安全或其他任何东西。Spring
    Security 主要面向基于 Spring 的应用程序。


    Spring Security 框架最初以 Acegi Security 框架起步，后来被 Spring 采纳为一个子项目。它已成为保护使用 Spring
    框架开发的应用程序的事实标准。Spring Security 在 HTTP 请求方法的调用级别支持身份验证和授权。


    ### 身份验证与授权


    身份验证和授权是 Spring Security 提供的两个主要操作（参见图 4-1）。


    ![A436970_1_En_4_Fig1_HTML.jpg](img/A436970_1_En_4_Fig1_HTML.jpg)


    图 4-1.


    身份验证与授权


    身份验证是验证用户是否为其所声称身份的过程。身份验证通过识别和核实来完成。


    授权是允许经过身份验证的用户访问资源的过程。换句话说，它为经过身份验证的用户提供访问控制。让我们来看一个 UserRegistrationSystem 应用程序中的示例：用户
    `USER` 可以执行用户注册、更新用户详情以及获取用户列表，而只有用户 `ADMIN` 拥有删除用户的额外权限。授予客户端的访问权限将决定该应用程序的访问规则。


    Spring Security 支持基于 URL 的安全性，并通过过滤器实现。Spring Security 还支持方法级安全性，只有授权用户才能调用授予他们的特定方法。


    ### 介绍基本认证


    传统的身份验证方法，例如使用登录页面和会话标识，都依赖于需要人工交互的基于 Web 的客户端。当涉及到与 REST 客户端（甚至可能不是基于 Web 的应用程序）通信时，你需要考虑基本认证提供的解决方案。


    基本认证是一种标准的 HTTP 标头（`Authorization`），它在每个请求中发送 Base64 编码的凭据。Base64 并未以任何方式进行加密或哈希处理；换句话说，用户名和密码以明文格式编码。


    凭据字符串包含格式为 `username:password` 的用户名和密码。清单 4-1 展示了用于准备该标头的算法。


    ```

    String plain_Client_Credentials="user:password";

    String base64_ClientCredentials =

    new String(Base64.encodeBase64(plain_Client_Credentials.getBytes()));

    HttpHeaders headers = getHeaders();

    headers.add("Authorization", "Basic " + base64_ClientCredentials);

    清单 4-1.

    准备 HTTP 标头的代码

    ```


    清单 4-1 生成了标头 `Authorization : Basic dXNlcjpwYXNzd29yZA==`，该标头将随每个 HTTP 请求一起发送。


    基本认证是保护 RESTful API 的最简单技术之一，因为它不需要 Cookie、会话标识符，甚至不需要登录页面。


    ### BasicAuthenticationFilter


    `BasicAuthenticationFilter` 对象负责处理任何包含 HTTP 请求标头 `Authorization` 且认证方案为基本认证以及
    Base64 编码的 `username:password` 令牌的 HTTP 请求。


    如果身份验证成功，Spring 中的 `BasicAuthenticationFilter` 负责将结果（`Authentication` 对象）放入 `SecurityContextHolder`
    中。


    ## 在 RESTful 服务上启用 Spring Security


    在本节中，你将了解名为 Security 的 Spring Boot 启动器，然后你将使用它来保护你的 RESTful API。


    ### 什么是 Spring Boot Security 启动器？


    Spring Boot 的目标是简化应用程序开发。与 Spring Boot 的每个其他特性一样，通过添加匹配的启动器 POM，名为 Security 的
    Spring Boot 启动器会为开发者创建基本配置设置，包括 HTTP 基本认证和一个 `AuthenticationManager` bean，该 bean
    在基于 Spring Boot 构建应用程序时带有一个内存中的默认用户。


    现在，你将在你的 UserRegistrationSystem 应用程序中配置 Spring Security。要将 Spring Security 添加到你的
    Spring Boot 应用程序，你需要在 Maven 的 `pom.xml` 文件中添加 Spring Security 依赖项。

