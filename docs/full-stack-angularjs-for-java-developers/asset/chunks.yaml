- fmt: "# MockMvc\n\n`MockMvc`类是Spring MVC测试框架的核心类。`org.springframework.test.web.servlet.MockMvc`类可用于为使用Spring\
    \ MVC框架开发的应用程序编写测试。`MockMvc`类可用于执行HTTP请求。\n\n`MockMvc`模拟了整个Spring基础设施，并通过`org.springframework.test.web.servlet.MockMvcBuilder`接口的实现创建，这使得Spring\
    \ MVC测试框架大量使用了构建器模式。\n\n`MockMvc`类包含`perform`方法，可用于通过传递相对路径来运行测试用例。之后，可以使用`Expect`方法来验证控制器内的不同组件。\n\
    \n`andExpect(status().OK())`行可用于验证200状态。类似地，可以执行`contentType`验证、XPath验证、数据验证模型、URL验证等。\n\
    \n让我们在`src/test/java`文件夹下的`com.apress.ravi.chapter6.UserRegistrationSystem`包中创建`UserRegistrationControllerTest`类，如清单6-19所示，以演示如何测试`UserRegistrationRestController`的`getUserById`方法。您还需要模拟控制器所需的依赖项。\n\
    \n```\npackage com.apress.ravi.chapter6.UserRegistrationSystem;\nimport static\
    \ org.hamcrest.Matchers.is;\nimport static org.mockito.Mockito.when;\nimport static\
    \ org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\nimport\
    \ static org.springframework.test.web.servlet.result.MockMvcResultHandlers.print;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;\n\
