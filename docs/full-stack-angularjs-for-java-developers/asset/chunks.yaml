  raw: '### AngularJS Routes


    AngularJS routes are configured using the `$routeProvider` API. Routes are dependent
    on the `ngRoute` module, which is why its dependency is defined in an array in
    the module definition.


    Listing [3-5](#A436970_1_En_3_Chapter.html#Par82) shows the code from `app.js`.
    You will define four routes in your AngularJS application.


    *   The first is `/list-all-users`.

    *   The second one is `/register-new-user`.

    *   The third one is `/update-user/:id`.

    *   The fourth one is different from the other three.


    ```

    app.config(function($routeProvider) {

    $routeProvider

    .when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    }).when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    }).when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'' ,

    controller : ''usersDetailsController''

    }).otherwise({

    redirectTo : ''/home'',

    templateUrl : ''/template/home.html'',

    });

    });

    Listing 3-5.

    Defining Routes in AngularJS Application

    ```


    The four defined routes in Listing [3-5](#A436970_1_En_3_Chapter.html#Par82) map
    directly to URLs defined in the application.


    When the user clicks the link in the application specified at `http://localhost:8080/#/list-all-users`,
    the `/list-all-users` route will be followed, and the content associated with
    the `/list-all-users` URL will be displayed.


    Similarly, when the user clicks the link `http://localhost:8080/#/register-new-user`,
    the `/register-new-user` route will be followed, and the content associated with
    `/register-new-user` URL will be displayed.


    When the user clicks the link `http://localhost:8080/#/update-user/{id` `}`, the
    `/update-user/:id` route will be followed, and the content associated with the
    `/update-user/:id` URL will be displayed.


    Also, if the user accesses any URL other than these three, the `/home` route will
    be followed, and the content associated with the `/home` URL will be displayed.


    ### AngularJS Templates


    AngularJS templates, also known as HTML partials , are HTML code that are bound
    to the `<div ng-view></div>` tag shown in the `index.html` file. If you look at
    the code from the `app.js` file, you can see that different `templateUrl` values
    are defined for different routes, as shown in Listing [3-6](#A436970_1_En_3_Chapter.html#Par89).


    ```

    $routeProvider

    .when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    }).when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    }).when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'' ,

    controller : ''usersDetailsController''

    }).otherwise({

    redirectTo : ''/home'',

    templateUrl : ''/template/home.html'',

    });

    Listing 3-6.

    Defining templateUrl for Routes

    ```


    As shown in Listing [3-6](#A436970_1_En_3_Chapter.html#Par89), you have defined
    four different partials or templates. The `listuser.html`, `userregistration.html`,
    `userupdation.html`, and `home.html` pages are four different partials or templates,
    which contain HTML code and AngularJS’s built-in template language to display
    dynamic data in your template.


    ### Implementing the Model, View, and Controller in Your Single-Page Application


    Spring Boot, by default, will automatically serve static content from the root
    of `ServletContext` or from the following directories :


    *   `classpath:/META-INF/resources/`

    *   `classpath:/resources/`

    *   `classpath:/static/`

    *   `classpath:/public/`


    In your project, you will be creating the static content under the `classpath:/resources/`
    directory. The final directory structure will look like Figure [3-5](#A436970_1_En_3_Chapter.html#Fig5).


    ![A436970_1_En_3_Fig5_HTML.jpg](A436970_1_En_3_Fig5_HTML.jpg)


    Figure 3-5.


    Directory structure of SPA in the UserRegistrationSystem application


    Let’s implement the model, view, and controller in your AngularJS application.


    #### Create the Home/Application Page


    The core of a single-page application is the static page `index.html`, as shown
    in Listing [3-7](#A436970_1_En_3_Chapter.html#Par99), so let’s create it in the
    `src/main/resources/static` (or `src/main/resources/public`) directory. This `index.html`
    page will contain some front-end code to display links on the web page, which
    will be handled by AngularJS. This `src/main/resources/static/index.html` page
    also contains some `<script>` tags that include all the necessary AngularJS files.


    ```


    Full Stack Development


    User Registration System


    Home


    Register New User


    List All Users


    Listing 3-7.

    src/main/resources/static/index.html

    ```


    This `index.html` page will display three links: Home, Register New User, and
