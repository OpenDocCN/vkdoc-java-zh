  trans: '

    ### AngularJS 路由


    AngularJS 路由通过 `$routeProvider` API 进行配置。路由依赖于 `ngRoute` 模块，这就是为什么在模块定义中，其依赖项被定义在一个数组里。


    清单 3-5 展示了 `app.js` 中的代码。你将在 AngularJS 应用中定义四个路由。


    *   第一个是 `/list-all-users`。

    *   第二个是 `/register-new-user`。

    *   第三个是 `/update-user/:id`。

    *   第四个与前三个不同。


    ```

    app.config(function($routeProvider) {

    $routeProvider

    .when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    }).when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    }).when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'' ,

    controller : ''usersDetailsController''

    }).otherwise({

    redirectTo : ''/home'',

    templateUrl : ''/template/home.html'',

    });

    });

    清单 3-5.

    在 AngularJS 应用中定义路由

    ```


    清单 3-5 中定义的四个路由直接映射到应用中定义的 URL。


    当用户点击应用中指定为 `http://localhost:8080/#/list-all-users` 的链接时，将遵循 `/list-all-users`
    路由，并显示与 `/list-all-users` URL 关联的内容。


    类似地，当用户点击链接 `http://localhost:8080/#/register-new-user` 时，将遵循 `/register-new-user`
    路由，并显示与 `/register-new-user` URL 关联的内容。


    当用户点击链接 `http://localhost:8080/#/update-user/{id` `}` 时，将遵循 `/update-user/:id`
    路由，并显示与 `/update-user/:id` URL 关联的内容。


    此外，如果用户访问除这三个之外的任何 URL，将遵循 `/home` 路由，并显示与 `/home` URL 关联的内容。


    ### AngularJS 模板


    AngularJS 模板，也称为 HTML 片段，是绑定到 `index.html` 文件中 `<div ng-view></div>` 标签的 HTML
    代码。如果你查看 `app.js` 文件中的代码，可以看到为不同的路由定义了不同的 `templateUrl` 值，如清单 3-6 所示。


    ```

    $routeProvider

    .when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    }).when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    }).when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'' ,

    controller : ''usersDetailsController''

    }).otherwise({

    redirectTo : ''/home'',

    templateUrl : ''/template/home.html'',

    });

    清单 3-6.

    为路由定义 templateUrl

    ```


    如清单 3-6 所示，你定义了四个不同的片段或模板。`listuser.html`、`userregistration.html`、`userupdation.html`
    和 `home.html` 页面是四个不同的片段或模板，它们包含 HTML 代码和 AngularJS 内置的模板语言，用于在模板中显示动态数据。


    ### 在单页应用中实现模型、视图和控制器


    默认情况下，Spring Boot 会自动从 `ServletContext` 的根目录或以下目录提供静态内容：


    *   `classpath:/META-INF/resources/`

    *   `classpath:/resources/`

    *   `classpath:/static/`

    *   `classpath:/public/`


    在你的项目中，你将在 `classpath:/resources/` 目录下创建静态内容。最终的目录结构将如图 3-5 所示。


    ![A436970_1_En_3_Fig5_HTML.jpg](img/A436970_1_En_3_Fig5_HTML.jpg)


    图 3-5.

    UserRegistrationSystem 应用中 SPA 的目录结构


    现在，让我们在你的 AngularJS 应用中实现模型、视图和控制器。


    #### 创建主页/应用页面


    单页应用的核心是静态页面 `index.html`，如清单 3-7 所示，因此让我们在 `src/main/resources/static`（或 `src/main/resources/public`）目录中创建它。这个
    `index.html` 页面将包含一些前端代码，用于在网页上显示链接，这些链接将由 AngularJS 处理。这个 `src/main/resources/static/index.html`
    页面还包含一些 `<script>` 标签，其中包含了所有必要的 AngularJS 文件。


    ```


    全栈开发


    用户注册系统


    首页


    注册新用户


    列出所有用户


    清单 3-7.

    src/main/resources/static/index.html

    ```


    这个 `index.html` 页面将显示三个链接：首页、注册新用户和列出所有用户。


    让我们更详细地查看前面的代码。AngularJS 库启用了几个自定义属性，用于标准 HTML 标签。


    *   `index.html` 页面中的 `<html>` 标签具有 `ng-app="userregistrationsystem"` 属性，这告诉你要定义一个
    JavaScript 模块，Angular 会将其识别为一个名为 `userregistrationsystem` 的应用。

    *   所有 CSS 类都来自 (Twitter) Bootstrap，以使页面看起来更美观。

    *   Angular JS 和 (Twitter) Bootstrap 被包含在 `<body>` 标签的底部，如前面的代码所示，这样浏览器可以在处理之前先处理整个
    HTML。

    *   你还包含了一个单独的 `app.js`，你将在其中定义应用的行为。


    #### 创建视图页面


    让我们在 `src/main/resources/static` 目录下的模板文件夹中创建四个视图页面。


    *   首页页面：`src/main/resources/template/home.html`

    *   注册新用户页面：`src/main/resources/template/userregistration.html`

    *   用户列表页面：`src/main/resources/template/listuser.html`

    *   更新现有用户页面：`src/main/resources/template/userupdation.html`


    ##### 首页页面


    清单 3-8 展示了 `home.html` 视图页面的代码。此页面创建在 `src/main/resources/template` 文件夹内。


    ```


    欢迎使用用户注册系统


    请点击

    注册新用户

    来注册新用户。


    请点击

    列出所有用户

    来获取所有用户。


    清单 3-8.

    src/main/resources/template/home.html

    ```


    在 `home.html` 页面中，你只是向用户显示一条（静态）欢迎消息，如图 3-6 所示。


    ![A436970_1_En_3_Fig6_HTML.jpg](img/A436970_1_En_3_Fig6_HTML.jpg)


    图 3-6.

    首页页面

    '
- fmt: "### Register New User Page\n\nListing [3-9](#A436970_1_En_3_Chapter.html#Par115)\
    \ shows the code for the `userregistration.html` view page. This page is created\
    \ inside the folder `src/main/resources/template`.\n\n```\n{{errorMessage}}\n\n\
    Register New User\nPlease maintain uniqueness of User-Name\n\nName\n\nAddress\n\
    \nEmail\n\nReset Form\n\nListing 3-9.\nsrc/main/resources/template/userregistration.html\n\
    ```\n\nIn the `userregistration.html` page (as shown in the previous code), `errorMessage`\
    \ is marked up using curly braces, as in `{{errorMessage}}`. These curly braces\
    \ will be filled in later by AngularJS using a controller defined in the `app.js`\
    \ file.\n\nYou have also created input boxes to enter the name, address, and e-mail.\
    \ Once a user enters the details and clicks the Register User button, the user\
    \ details will be saved in the database.\n\nYou have a Reset Form button that\
    \ will reset the input box with an empty value. Figure [3-7](#A436970_1_En_3_Chapter.html#Fig7)\
    \ shows the view of the Register New User page in the browser.\n\n![A436970_1_En_3_Fig7_HTML.jpg](A436970_1_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7. Register New User page\n\nOnce the user successfully performs the\
    \ user registration by entering the correct details and a unique name, as shown\
    \ in Figure [3-8](#A436970_1_En_3_Chapter.html#Fig8), then the user will be navigated\
    \ to the List All Users page.\n\n![A436970_1_En_3_Fig8_HTML.jpg](A436970_1_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8. Registering a new user with the user’s details\n\nIf the username\
    \ entered is not unique and if the user with the matching name exists in the database,\
    \ then a warning error message will be displayed in the browser, as shown in Figure\
    \ [3-9](#A436970_1_En_3_Chapter.html#Fig9).\n\n![A436970_1_En_3_Fig9_HTML.jpg](A436970_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9. Error message on duplicate username\n\n### List of Users\n\nListing\
    \ [3-10](#A436970_1_En_3_Chapter.html#Par122) shows the code for the `listuser.html`\
    \ view page. This page is created inside the folder `src/main/resources/template`.\
    \ This page will show the list of all users in the `UserRegistrationSystem` application.\n\
    \n```\nList of Users \n\nName\nEmail\nAddress\nEdit\nDelete\n\n{{user.name}}\n\
    {{user.email}}\n{{user.address}}\n\nEdit\n\nDelete\n\nListing 3-10.\nsrc/main/resources/template/listuser.html\n\
    ```\n\nIn the `listuser.html` page (as shown in the previous code), the `user.name`,\
    \ `user.email`, and `user.address` are marked up using curly braces: `{{user.name}}`,\
    \ `{{user.email}}`, and `{{user.address}}`. These curly braces will be filled\
    \ in later by AngularJS using a controller defined in the `app.js` file.\n\nThis\
    \ page shows the list of all users in a table with the columns Name, Email, and\
    \ Address and also contains Edit and Delete buttons. Figure [3-10](#A436970_1_En_3_Chapter.html#Fig10)\
    \ shows the view of the `listuser.html` page in the browser.\n\n![A436970_1_En_3_Fig10_HTML.jpg](A436970_1_En_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10. List of users\n\nClicking the Delete button will delete the specific\
    \ user from the user table. Clicking the Edit button will redirect to the Update\
    \ Existing User page.\n\n### Update Existing User\n\nListing [3-11](#A436970_1_En_3_Chapter.html#Par127)\
    \ shows the code for the `userupdation.html` view page. This page is created inside\
    \ the folder `src/main/resources/template`. This page allows you to update the\
    \ existing user from the `UserRegistrationSystem` application.\n\n```\n{{errorMessage}}\n\
    \nUpdate Existing User\nPlease maintain uniqueness of User-Name\n\nName\n\nAddress\n\
    \nEmail\n\nReset Form                                          \n\nListing 3-11.\n\
    src/main/resources/template/userupdation.html\n```\n\nFigure [3-11](#A436970_1_En_3_Chapter.html#Fig11)\
    \ shows the view of the `userupdation.html` page in the browser when clicking\
    \ the Edit button in the List Of Users table in Figure [3-10](#A436970_1_En_3_Chapter.html#Fig10).\n\
    \n![A436970_1_En_3_Fig11_HTML.jpg](A436970_1_En_3_Fig11_HTML.jpg)\n\nFigure 3-11.\
    \ Updating the user\n\nOnce you update the user details along with the username\
    \ and click the Update User button, you will navigate to the List of Users view.\n\
    \nUp to here, you are good with view pages. Now, you will be creating the `UserRegistrationSystem`\
    \ application in the `app.js` file inside the `js` folder for your single-page\
    \ application.\n\n### Create an AngularJS Application\n\nLet’s create an AngularJS\
    \ application named as `app` in the `src/main/resources/static/js/app.js` file\
    \ that defines the application module configuration and routes. To handle a request\
    \ like `/home`, it needs an AngularJS module, called `ngRoute`. To use `ngRoute`\
    \ and inject it into your application, you use `angular.module` to add the `ngRoute`\
    \ module to your app, as shown in Listing [3-12](#A436970_1_En_3_Chapter.html#Par132).\n\
    \n```\nvar app = angular.module('userregistrationsystem', ['ngRoute', 'ngResource']);\n\
    app.config(function($routeProvider) {\n$routeProvider.when('/list-all-users',\
    \ {\ntemplateUrl : '/template/listuser.html',\ncontroller : 'listUserController'\n\
    }).when('/register-new-user',{\ntemplateUrl : '/template/userregistration.html',\n\
    controller : 'registerUserController'\n}).when('/update-user/:id',{\ntemplateUrl\
    \ : '/template/userupdation.html' ,\ncontroller : 'usersDetailsController'\n}).otherwise({\n\
    redirectTo : '/home',\ntemplateUrl : '/template/home.html',\n});\n});\nListing\
    \ 3-12.\nsrc/main/resources/static/js/app.js\n```\n\nThen, in `app.config`, each\
    \ route is mapped to a template and controller (optional).\n\n- The controller\
    \ `listUserController` will be called when you navigate to the URL `/list-all-users`.\n\
    - The controller `registerUserController` will be called when you navigate to\
    \ the URL `/register-new-user`.\n- The controller `usersDetailsController` will\
    \ be called when you navigate to the URL `/update-user/:id`.\n\nIn this section,\
    \ you have created the `app` application in the `app.js` file. Let’s create three\
    \ different controllers named `listUserController`, `registerUserController`,\
    \ and `usersDetailsController` in the next section."
