    ##### 创建 ReloadableResourceBundleMessageSource Bean：messageSource


    现在，我们在 `src/main/java` 文件夹下 `com.apress.ravi` 包内的 `UserRegistrationConfiguration`
    类中创建一个 `ReloadableResourceBundleMessageSource` bean。清单 2-22 展示了必要的代码修改。


    ```

    package com.apress.ravi;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.context.support.ReloadableResourceBundleMessageSource;

    @Configuration

    public class UserRegistrationConfiguration {

    @Bean(name = "messageSource")

    public ReloadableResourceBundleMessageSource messageSource() {

    ReloadableResourceBundleMessageSource messageBundle =

    new ReloadableResourceBundleMessageSource();

    messageBundle.setBasename("classpath:messages/messages");

    messageBundle.setDefaultEncoding("UTF-8");

    return messageBundle;

    }

    }

    清单 2-22.

    ReloadableResourceBundleMessageSource Bean

    ```


    在清单 2-22 中，你使用 `@Configuration` 注解标注了 `UserRegistrationConfiguration` 类。Bean 的名称通过
    `@Bean(name = "messageSource")` 定义为 `messageSource`。


    `@Configuration` 注解是一个元注解，表明该配置类可以包含一个或多个 `@Bean` 方法，用于生成可由 Spring 容器管理的 Bean
    定义。这个 Bean 将允许你在不重启应用程序的情况下修改消息的属性文件。


    `messageSource` 方法配置了一个 `ReloadableResourceBundleMessageSource`，以支持从属性文件中读取消息。`ReloadableResourceBundleMessageSource`
    Bean 是一种 `MessageSource`，它加载消息的属性文件，并从属性文件中解析消息键。


    要设置基础名称，`setBaseName` 方法接受一个参数 `classpath:messages/messages`（即属性文件的路径）。你设置了消息源文件的默认编码为
    UTF-8。Spring 将在 `src/main/resources/messages` 文件夹中查找名为 `messages.properties` 的属性文件。


    ##### 创建属性文件


    现在，在 `src/main/resources/messages` 文件夹下创建一个 `messages.properties` 文件，并添加以下消息：


    ```

    error.name.empty=姓名字段为必填项

    error.name.length=姓名应限制在 50 个字符以内

    error.address.empty=地址字段为必填项

    error.address.length=地址应限制在 150 个字符以内

    error.email.empty=邮箱字段为必填项

    error.email.email=邮箱格式应正确

    error.email.length=邮箱应限制在 80 个字符以内

    ```


    这些消息遵循每个消息键的特定模式，如下所示：


    ```

    error.字段名.验证类型

    ```


    ##### 使用 message 属性的 Bean 验证注解


    现在，我们使用带有 `message` 属性的 JSR-303 注解进行 Bean 验证。`message` 属性用于设置当注解定义的约束未满足时显示的自定义错误消息。清单
    2-23 展示了必要的代码修改。


    这个 `message` 属性将通过上一节定义的 `ReloadableResourceBundleMessageSource` Bean，从 `messages.properties`
    文件中获取匹配消息键的消息值。


