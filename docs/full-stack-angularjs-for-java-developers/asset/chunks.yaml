    Bean Validation Annotation with message Attribute

    ```


    Up to now you have created the `ReloadableResourceBundleMessageSource` bean and
    defined messages in the `messages.properties` file and annotated entity class
    with bean validation annotation with the `message` attribute.


    The next step is to read messages from the properties file and use them during
    `FieldValidationErrorinstance` creation.'
