    #### RestTemplate 方法


    在使用 `RestTemplate` 时，客户端只需提供 URL 和参数（如果有），然后从响应中提取结果。`RestTemplate` 自身负责处理 HTTP
    连接。`RestTemplate` 类继承了 `RestOperations` 接口，该接口指定了一组基本的 RESTful 操作，因此 `RestTemplate`
    支持所有主要的 HTTP 方法，即 `GET`、`POST`、`PUT`、`DELETE`、`OPTIONS`、`HEAD` 以及其他用于消费 RESTful
    服务的 HTTP 方法。表 6-1 列出了 `RestTemplate` 为每种 HTTP 方法提供的方法。


    表 6-1.


    用于 HTTP 操作的 RestTemplate 方法


    | HTTP 方法 | Spring RestTemplate 方法 |

    | --- | --- |

    | `GET` | `getForObject(java.lang.String, java.lang.Class<T>, java.lang.Object...)`
    [`getForEntity(java.lang.String, java.lang.Class<T>, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#getForEntity-java.lang.String-java.lang.Class-java.lang.Object%E2%80%A6-)
    `)` |

    | `POST` | [`postForLocation(java.lang.String, java.lang.Object, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#postForLocation-java.lang.String-java.lang.Object-java.lang.Object%E2%80%A6-)
    `)` [`postForObject(java.lang.String, java.lang.Object, java.lang.Class<T>, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#postForObject-java.lang.String-java.lang.Object-java.lang.Class-java.lang.Object%E2%80%A6-)
    `)` `postForEntity(postForObject(java.lang.String, java.lang.Object, java.lang.Class<T>,
    java.lang.Object...)` |

    | `PUT` | [`put(java.lang.String, java.lang.Object, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#put-java.lang.String-java.lang.Object-java.lang.Object%E2%80%A6-)
    `)` |

    | `DELETE` | [`delete(java.lang.String, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#delete-java.lang.String-java.lang.Object%E2%80%A6-)
    `)` |

    | `HEAD` | [`headForHeaders(java.lang.String, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#headForHeaders-java.lang.String-java.lang.Object%E2%80%A6-)
    `)` |

    | `OPTIONS` | [`optionsForAllow(java.lang.String, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#optionsForAllow-java.lang.String-java.lang.Object%E2%80%A6-)
    `)` |

    | `any` | [`exchange(java.lang.String, org.springframework.http.HttpMethod, org.springframework.http.HttpEntity<?>,
    java.lang.Class<T>, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#exchange-java.lang.String-org.springframework.http.HttpMethod-org.springframework.http.HttpEntity-java.lang.Class-java.lang.Object%E2%80%A6-)
    `)` |


    `RestTemplate` 中的方法名称表明了相应 HTTP 方法在对应方法内部的实现方式以及将要返回的内容。例如，`getForEntity` 方法将对服务器执行
    HTTP `GET` 操作，并将 HTTP 响应转换为指定类型，然后将此实体返回给客户端。类似地，`postForObject` 方法将通过把给定对象转换为
    HTTP 请求来对服务器执行 HTTP `POST` 操作，并通过将 HTTP 响应转换为给定类型的对象来返回响应。


    接下来，我们使用 `RestTemplate` 的方法来消费第 2 章开发的 UserRegistrationSystem 应用程序中的 REST API。


    ### RestTemplate 操作


    你将使用 `RestTemplate` 来执行 HTTP 方法的操作。让我们从一个简单的 `GET` 请求示例开始，使用 `getForEntity` 方法来获取纯
    JSON。


    #### 带参数的 HTTP GET 请求以检索用户


    你可以使用 `RestTemplate` 中的 `getForObject` 或 `getForEntity` 方法来发起 HTTP `GET` 请求。这里，我们将使用
    `getForObject` 方法进行 `GET` 请求。Spring `RestTemplate` 提供了三个重载版本的 `getForObject` 方法，如表
    6-2 所示。


    表 6-2.


    重载的 getForObject 方法


    | # | 重载的 getForObject 方法 |

    | --- | --- |

    | 1 | `@Override` `public <T> T getForObject(String url, Class<T> responseType,
    Object... uriVariables) throws RestClientException {` `RequestCallback requestCallback
    =` `acceptHeaderRequestCallback(responseType);` `HttpMessageConverterExtractor<T>
    responseExtractor =` `new HttpMessageConverterExtractor<T>(responseType,` `getMessageConverters(),
    logger);` `return execute(url, HttpMethod.GET, requestCallback,` `responseExtractor,
    uriVariables);` `}` |

    | 2 | `@Override` `public <T> T getForObject(String url, Class<T> responseType,
    Map<String, ?> uriVariables) throws RestClientException {` `RequestCallback requestCallback
    =` `acceptHeaderRequestCallback(responseType);` `HttpMessageConverterExtractor<T>
    responseExtractor =` `new HttpMessageConverterExtractor<T>(responseType,` `getMessageConverters(),
    logger);` `return execute(url, HttpMethod.GET, requestCallback,` `responseExtractor,
    uriVariables);` `}` |

    | 3 | `@Override` `public <T> T getForObject(URI url, Class<T> responseType) throws
    RestClientException {` `RequestCallback requestCallback =` `acceptHeaderRequestCallback(responseType);`
    `HttpMessageConverterExtractor<T> responseExtractor =` `new HttpMessageConverterExtractor<T>(responseType,`
    `getMessageConverters(), logger);` `return execute(url, HttpMethod.GET, requestCallback,`
    `responseExtractor);` `}` |


    前两个重载方法包含一个作为 `String` 的 URI 模板、一个返回值类型和一个 URI 变量作为方法参数。第三个重载方法接受两个参数，即完整形成的 URI
    和返回值类型。


    让我们在 `src/main/java` 文件夹下的 `com.apress.ravi.chapter` `6` `.client` 包中创建一个 `UserRegistrationClient`
    类，如清单 6-2 所示。你将消费第 2 章为你的 UserRegistrationSystem 应用程序开发的 `getUserById` REST API
    端点。


