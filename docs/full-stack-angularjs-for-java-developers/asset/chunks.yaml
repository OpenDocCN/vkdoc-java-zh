    Table 2-2.


    HTTP Status Codes


    | Code | Message | Description |

    | --- | --- | --- |

    | 200 | `OK` | The request has succeeded (this is a standard response for a successful
    HTTP request). |

    | 201 | `Created` | The request has been fulfilled, and the request successfully
    created a new resource. |

    | 204 | `Not Content` | The request has processed successfully but is not returning
    any content. |

    | 400 | `Bad Request` | The request could not be fulfilled because of bad syntax.
    |

    | 401 | `Unauthorized` | The request requires user authorization. |

    | 403 | `Forbidden` | The server refuses to fulfill the request. |

    | 404 | `Not Found` | The requested resource could not be found. |

    | 409 | `Conflict` | The request cannot be completed because of a resource conflict.
    |


    Refer to Appendix A to learn about some tools you can use to access RESTful applications
    to test RESTful APIs. I will be using Postman from Chrome as the REST client throughout
    this book.


    ## Build a RESTful Service : UserRegistrationSystem


    In this chapter, you will be building a RESTful application called UserRegistrationSystem
    with REST endpoints for user registration. I will be referring to this as the
    base application throughout this book.


    ### Introducing UserRegistrationSystem


    UserRegistrationSystem can be understood as a software as a service (SaaS) provider,
    which allows the user to perform CRUD operations such as creating a new user,
    getting a list of all users, getting individual users, updating a user, and deleting
    a user.


    UserRegistrationSystem will be formed with a REST API layer and a repository layer,
    with a domain layer crosscutting those two, which gives a separation of concerns.
    The REST API layer is responsible for handling client requests, validating client
    input, interacting with the repository layer (or service layer) , and generating
    a response.


    The domain layer contains a domain object that has business data. The repository
    layer interacts with the database and supports CRUD operations. You will begin
    the development of your RESTful service by understanding these requirements :


    *   Consumers register themselves by creating a new user.

    *   A list of users can be obtained.

    *   Individual user details can be obtained.

    *   User details can be updated at the later time.

    *   A user can be deleted when required.


    ### Identifying REST Endpoints


    A URI endpoint is used to identify REST resources. The name you choose for the
    UserRegistrationSystem REST API endpoint should have a clearly defined meaning
    to consumers. To design endpoints for services, you should follow some best practices
    and conventions that are widely used in the software industry.


    *   Use a base URI for the RESTful API to provide an entry point.

    *   Name resource endpoints using plural nouns.

    *   Use a URI hierarchy to represent related resources.


    The UserRegistrationSystem application will have a `User` resource. This `User`
    resource can be accessed using the `GET`, `POST`, `PUT`, and `DELETE` HTTP methods.
    Table [2-3](#A436970_1_En_2_Chapter.html#Tab3) lists the REST endpoints you will
    be creating for your application.


    Table 2-3.


    REST Endpoint for UserRegistration


    | HTTP Method | REST Endpoint | Description |

    | --- | --- | --- |

    | `GET` | `/api/user/` | Returns the list of users |

    | `GET` | `/api/user/{id}` | Returns user details for the given `user {id}` |

    | `POST` | `/api/user/` | Creates a new user from `POST` data |

    | `PUT` | `/api/user/{id}` | Updates the details of the given `User {id}` |

    | `DELETE` | `/api/user` | Deletes a user for the given `user {id}` |


    The next step is to define a resource representation and the representation format.
    REST typically supports multiple formats such as HTML, JSON, and XML. In this
    chapter, and the rest of the book, JSON will be the preferred format for the API
    operation.


    ### JSON Format


    JavaScript Object Notation (JSON) is a syntax for storing and exchanging data
    between the client and the server. A JSON object is a key-value data format where
    each key-value pair consists of a key in double quotes followed by a colon (`:`),
    followed by a value. JSON objects are surrounded by curly braces (`{}`) where
    each key value is separated by a comma (`,`). Listing [2-1](#A436970_1_En_2_Chapter.html#Par27)
    shows an example of a `User` JSON object.


    ```

    {

    "id": 1,

    "name":"Ravi Kant Soni",

    "address":"Lashkariganj, Sasaram, Rohtas, Bihar, pin-821115",

    "email":"ravikantsoni.author@gmail.com"

    }

    Listing 2-1.

    User JSON Object

    ```


    As you can see, a `User` resource has a name, address, and e-mail as the key,
    and the `id` attribute uniquely identifies the user.


    ### Creating the UserRegistrationSystem Application


    You will be creating UserRegistrationSystem by generating a Spring Boot application
    using Spring Initializr, as shown in Figure [2-1](#A436970_1_En_2_Chapter.html#Fig1).
    Select Web, JPA, and H2 as dependencies. By default, the Spring Boot application
    runs on port 8080.


    ![A436970_1_En_2_Fig1_HTML.jpg](A436970_1_En_2_Fig1_HTML.jpg)


