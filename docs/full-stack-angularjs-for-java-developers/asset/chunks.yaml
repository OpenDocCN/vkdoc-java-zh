  trans: '

    ### 使用内存定义进行身份验证自定义


    如果您的应用程序只有少数用户，您可以在 Spring 配置文件中定义他们的详细信息，而不是从某个持久化引擎中提取用户信息，这样用户详细信息就会加载到应用程序的内存中。让我们创建一个
    `SpringSecurityConfiguration_InMemory.java` 文件，如代码清单 4-5 所示。


    ```

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.http.HttpMethod;

    import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

    import org.springframework.security.config.annotation.web.builders.HttpSecurity;

    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

    @Configuration

    @Order(SecurityProperties.ACCESS_OVERRIDE_ORDER)

    public class SpringSecurityConfiguration_InMemory extends WebSecurityConfigurerAdapter
    {

    @Autowired

    protected void configureGlobal(AuthenticationManagerBuilder auth)

    throws Exception {                auth.inMemoryAuthentication().withUser("user").password("password")

    .roles("USER");                auth.inMemoryAuthentication().withUser("admin").password("password")

    .roles("USER", "ADMIN");

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .httpBasic().and()

    .authorizeRequests()

    .antMatchers(HttpMethod.GET, "/api/user/")

    .hasRole("USER")

    .antMatchers(HttpMethod.POST, "/api/user/")

    .hasRole("USER")

    .antMatchers(HttpMethod.PUT, "/api/user/**")                          .hasRole("USER")

    .antMatchers(HttpMethod.DELETE, "/api/user/**")

    .hasRole("ADMIN")

    .and()

    .csrf()

    .disable();

    }

    }

    代码清单 4-5.

    在内存中自定义用户身份验证

    ```


    在上一个代码片段中，您创建了一个名为 `SpringSecurityConfiguration_InMemory` 的类，并使用 `@Configuration`
    注解标记了该类，这是一个 Spring 注解，使该类成为一个配置类。您让该类继承了 `WebSecurityConfigurerAdapter` 类，这允许您配置
    Spring Security 并覆盖应用程序的默认方法。


    您通过创建两个用户（`user` 和 `admin`）及其角色（`USER` 和 `ADMIN`）和密码来配置身份验证。`admin` 用户同时拥有 `USER`
    和 `ADMIN` 角色，而 `user` 用户只有 `USER` 角色。为了配置内存身份验证，您使用了 `configureGlobal` 方法。您使用
    `@Autowired` 注解标记了此方法。此方法有一个 `AuthenticationManagerBuilder` 类型的参数。


    接下来，您覆盖了第二个方法 `configure`，它接受参数 `HttpSecurity`。在 `configure` 方法中，您通过将角色映射到 URL
    来配置授权。您使用了 HTTP 基本身份验证来验证每个请求。在此 `configure` 方法内部，您使用了 `anyMatchers` 方法将 URL 模式和
    `HttpMethod` 映射到特定角色；例如，任何匹配 `/api/user/**` 并执行 `DELETE` 操作的 URL 都应具有 `ADMIN`
    角色，其余操作可以具有 `USER` 角色。您还禁用了跨站请求伪造，以限制任何最终用户执行非预期的操作。


    #### 运行 UserRegistrationSystem 应用程序


    一旦您重新启动 UserRegistrationSystem 应用程序，您就可以通过启动 Postman 并使用用户凭据调用 API 来测试新实现的代码。


    如图 4-10 所示，启动 Postman 在您的 UserRegistrationSystem 应用程序中注册一个新用户。在 Postman 中，选择 HTTP
    `POST` 方法并输入 URL `http://localhost:8080/api/user/`。点击 Authorization 选项卡，并为 Basic
    Auth 选择 TYPE。输入用户名 `user` 和密码 `password`，然后点击 Update Request 按钮，这将使用 `Authorization`
    值更新 HTTP 标头。然后在请求体中提供 JSON 数据（如您在第 2 章中所见），最后点击 Send 按钮。


    ![A436970_1_En_4_Fig10_HTML.jpg](img/A436970_1_En_4_Fig10_HTML.jpg)


    图 4-10.

    通过传递用户凭据创建新用户


    如果一切顺利，这将在您的 UserRegistrationSystem 应用程序中注册一个新用户。


    您可以调用另一个端点来获取用户列表。输入用户凭据为 `user`/`password`，如图 4-11 所示。


    ![A436970_1_En_4_Fig11_HTML.jpg](img/A436970_1_En_4_Fig11_HTML.jpg)


    图 4-11.

    传递用户凭据后获取用户列表


    类似地，您可以通过调用另一个端点并传递用户凭据 `user`/`password` 来更新用户详细信息，如图 4-12 所示。


    ![A436970_1_En_4_Fig12_HTML.jpg](img/A436970_1_En_4_Fig12_HTML.jpg)


    图 4-12.

    通过传递用户凭据更新用户详细信息


    因此，您现在已使用用户凭据 `user`/`password` 在您的 Spring Boot 应用程序中执行了创建、读取和更新操作。您也可以使用 `admin`
    用户的凭据 `admin`/`password` 执行这些操作，因为前面的端点可以被 `USER` 和 `ADMIN` 两种角色访问。


    现在，如果您尝试使用 `USER` 角色，通过传递凭据 `user`/`password` 来调用应用程序中的另一个端点执行删除操作，会发生什么？由于您已将此操作限制为除
    `ADMIN` 之外的所有其他用户角色，它应该会抛出错误消息“Access is denied”，状态码为 403 `Forbidden`，如图 4-13
    所示。


    ![A436970_1_En_4_Fig13_HTML.jpg](img/A436970_1_En_4_Fig13_HTML.jpg)


    图 4-13.

    对未经授权的用户拒绝访问。


    让我们通过传递 `admin` 凭据来调用此 API 以执行删除操作，如图 4-14 所示。


    ![A436970_1_En_4_Fig14_HTML.jpg](img/A436970_1_En_4_Fig14_HTML.jpg)


    图 4-14.

    使用 ADMIN 角色执行删除操作


    由于您使用了 `ADMIN` 的凭据来调用此端点，操作成功，并且由于此操作从 UserRegistrationSystem 中删除了一个用户，响应返回了一个空列表。


    到目前为止，您已经使用内存定义执行了身份验证自定义。接下来，让我们通过针对数据库进行身份验证自定义，将这一实践提升到新的水平。

    '
- fmt: '### Authentication Customization Against a Relational Database


    Although you have customized Spring Security with in-memory authentication, you
    would like to customize the security behavior with authentication against a database
    so that it uses the application’s users instead of generic users from Spring Boot.
    Let’s set up the infrastructure needed for customizing authentication against
    a database for your `UserRegistrationSystem` application by creating and updating
    users.


    Let’s start by creating a `UserInfo` domain object, as shown in Listing [4-6](#A436970_1_En_4_Chapter.html#Par67).
    This entity class represents a `UserRegistrationSystem` user. The `UserInfo` entity
    class contains attributes such as the ID (`userid`), username, password, `isEnabled`,
    and role. You annotate this class using JPA and Hibernate annotations.


    ```

    package com.apress.ravi.dto;

    import javax.persistence.Column;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.Id;

    import javax.persistence.Table;

    import org.hibernate.validator.constraints.NotEmpty;

    @Entity

    @Table(name = "users")

    public class UserInfo {

    @Id

    @GeneratedValue

    @Column(name = "userid")

    private Long id;

    @Column(name = "username")

    @NotEmpty

    private String username;

    @Column(name = "password")

    @NotEmpty

    private String password;

    @Column(name = "enabled")

    private boolean isEnabled;

    @Column(name = "role")

    private String role;

    public String getUsername() {

    return username;

    }

    public void setUsername(String username) {

    this.username = username;

    }

    public String getPassword() {

    return password;

    }

    public void setPassword(String password) {

    this.password = password;

    }

    public boolean isEnabled() {

    return isEnabled;

    }

    public void setEnabled(boolean isEnabled) {

    this.isEnabled = isEnabled;

    }

    public String getRole() {

    return role;

    }

    public void setRole(String role) {

    this.role = role;

    }

    }

    Listing 4-6.

    UserInfo Class

    ```


    Since you will be storing `UserRegistrationSystem`’s users in a database, you
    will require a `UserInfoJpaRepository` interface to perform CRUD operations on
    the `UserInfo` entity. Listing [4-7](#A436970_1_En_4_Chapter.html#Par69) shows
    the `UserInfoJpaRepository` interface that has extended `JpaRepository`. In addition
    to the default method provided by `JpaRepository`, the `UserInfoJpaRepository`
    interface contains a custom finder method named `findByUsername` that has a username
    as an argument. Spring Data JPA will provide a runtime implementation that allows
    the `findByUsername` method to return a user based on the passed-in username parameter.


    ```

    package com.apress.ravi.repository;

    import org.springframework.data.jpa.repository.JpaRepository;

    import org.springframework.stereotype.Repository;

    import com.apress.ravi.dto.UserInfo;

    @Repository

    public interface UserInfoJpaRepository extends JpaRepository {

    public UserInfo findByUsername(String username);

    }

    Listing 4-7.

