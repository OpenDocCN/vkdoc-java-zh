    The next step is to create a class to intercept and process the `MethodArgumentNotValidException`
    exception.


    #### Handling Exceptions Using the `@ControllerAdvice` Annotation


    The `@ControllerAdvice` annotation is used to define a global exception handler
    for an exception handler method annotated using the `@ExceptionHandler` annotation.


    A class annotated with the `@ControllerAdvice` annotation will be applicable to
    all controllers in the application. So, any exception thrown by any controller
    class in that application will be handled by this annotated class having a method
    annotated with the `@ExceptionHandler` annotation. This method will be executed
    only if any controller classes throw an exception matching the configured `Exception`
    class.


    So, let’s create the controller advice class `RestValidationHandler` inside the
    `com.apress.ravi.Exception` package under the `src/main/java` folder, which intercepts
    the exception, as shown in Listing [2-21](#A436970_1_En_2_Chapter.html#Par147).


    ```

    package com.apress.ravi.Exception;

    import java.awt.TrayIcon.MessageType;

    import java.util.ArrayList;

    import java.util.Date;

    import java.util.List;

    import javax.servlet.http.HttpServletRequest;

    import org.springframework.http.HttpStatus;

    import org.springframework.http.ResponseEntity;

    import org.springframework.validation.BindingResult;

    import org.springframework.validation.FieldError;

    import org.springframework.web.bind.MethodArgumentNotValidException;

    import org.springframework.web.bind.annotation.ControllerAdvice;

    import org.springframework.web.bind.annotation.ExceptionHandler;

    import org.springframework.web.bind.annotation.ResponseStatus;

    @ControllerAdvice

    public class RestValidationHandler {

    // method to handle validation error

    @ExceptionHandler(MethodArgumentNotValidException.class)

    @ResponseStatus(HttpStatus.BAD_REQUEST)

    public ResponseEntity<FieldValidationErrorDetails> handleValidationError(

    MethodArgumentNotValidException mNotValidException,

    HttpServletRequest request) {

    FieldValidationErrorDetails fErrorDetails =

    new FieldValidationErrorDetails();

    fErrorDetails.setError_timeStamp(new Date().getTime());

    fErrorDetails.setError_status(HttpStatus.BAD_REQUEST.value());

    fErrorDetails.setError_title("Field Validation Error");

    fErrorDetails.setError_detail("Inut Field Validation Failed");

    fErrorDetails.setError_developer_Message(

    mNotValidException.getClass().getName());

    fErrorDetails.setError_path(request.getRequestURI());

    BindingResult result = mNotValidException.getBindingResult();

    List<FieldError> fieldErrors = result.getFieldErrors();

    for (FieldError error : fieldErrors) {

