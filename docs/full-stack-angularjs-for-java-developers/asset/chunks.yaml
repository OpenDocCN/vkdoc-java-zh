    `throws RestClientException {` `execute(url, HttpMethod.DELETE, null, null, uriVariables);`
    `}` |

    | 3 | `@Override` `public void delete(URI url) throws RestClientException {` `execute(url,
    HttpMethod.DELETE, null, null);` `}` |


