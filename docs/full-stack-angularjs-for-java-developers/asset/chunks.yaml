    Spring Security protecting using the authenticated method, which allows an authenticated
    user to access the respective endpoint. Finally, you enabled HTTP Basic Authentication
    and also set the realm name to User Registration System.


    In addition, you disabled CSRF for HTTP methods to keep things simple. CSRF is
    a type of security vulnerability whereby a malicious web site forces users to
    execute unwanted commands on another web site in which they are currently authenticated.
    By default, Spring Security enables CSRF protection and is highly recommended
    when requests are submitted by a user via a browser. For services (REST) that
    are used by nonbrowser clients, CSRF can be disabled.


    #### Method-Level Security


    Method-level security is an alternate to secure URI access. Sometimes it is required
    to ensure that only users with administrative privileges (having the `admin` role)
    can delete a registered user in UserRegistrationSystem, which can be achieved
    by enforcing fine-grained security control on methods. You will be applying Spring
    Security’s method-level security on the `deleteUser` method.


    To enable Spring’s method-level security, annotate the `SpringSecurityConfiguration_Database`
    configuration class with the `org.springframework.security.config.annotation.method.configuration.EnableGlobalMethodSecurity`
    annotation, as shown in Listing [4-11](#A436970_1_En_4_Chapter.html#Par83).


    ```

    package com.apress.ravi.Security;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

    import org.springframework.security.config.annotation.method.configuration.EnableGlobalMethodSecurity;

    import org.springframework.security.config.annotation.web.builders.HttpSecurity;

    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

    import org.springframework.security.config.http.SessionCreationPolicy;

    import com.apress.ravi.chapter2.Service.UserInfoDetailsService;

    @Configuration

    @EnableWebSecurity

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    public class SpringSecurityConfiguration_Database

    extends WebSecurityConfigurerAdapter {

    //...code

    }

    Listing 4-11.

    Adding the EnableGlobalMethodSecurity Annotation

    ```


    Spring Security supports a rich set of method-level authorization annotations
    along with class-level authorization annotations. You set the `prePostEnabled`
    flag to `true` in `EnableGlobalMethodSecurity`, which enables the Spring Security
    annotation to perform pre- and post-method invocation authorization checks. So,
    annotate the `UserRegistrationRestController`’s `deleteUser` method with the `@PreAuthorize`
    annotation, as shown in Listing [4-12](#A436970_1_En_4_Chapter.html#Par85).


    ```

    import org.springframework.security.access.prepost.PreAuthorize;

    @DeleteMapping("/{id}")

    @PreAuthorize("hasAuthority(''ADMIN'')")

    public ResponseEntity deleteUser(@PathVariable("id") final Long id) {

    //...code

    }

    Listing 4-12.

    Adding the PreAuthorize Annotation

    ```


    The `@PreAuthorize` annotation only allows an authorized user to invoke the `deleteUser`
    method. `hasAuthority` checks whether the logged-in user has `ADMIN` authority
    and lets Spring Security make the decision.


    Restart the UserRegistrationSystem application and launch Postman to perform a
    `DELETE` on the endpoint `http://localhost:8080/api/user/1`. Set the Authorization
    type in Postman to Basic Auth and enter a username of `user` and a password of
    `password`, which has the role `USER`. Since `user` doesn’t have administrative
    rights, an unauthorized response with the message “Access is denied” will be returned,
    as shown in Figure [4-15](#A436970_1_En_4_Chapter.html#Fig15).


    ![A436970_1_En_4_Fig15_HTML.jpg](A436970_1_En_4_Fig15_HTML.jpg)


    Figure 4-15.


    Unauthorized delete response


    ## Summary


    In this chapter, you were introduced to Spring Security and the concepts of authentication
    and authorization. You enabled Spring Security on RESTful services by implementing
    Basic Authentication. Then you customized the authentication with in-memory databases
    and against databases. In the next chapter, you will explore how to consume a
    secured RESTful API using AngularJS.'
  trans: '

    #### 自定义 Spring Security 并保护 URI


    现在，你将通过创建一个带有 `@Configuration` 和 `@EnableWebSecurity` 注解的 `SpringSecurityConfiguration_Database`
    配置类，来自定义 Spring Security 的默认行为并保护一个 URI。该配置类继承了 `org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter`
    类，该类提供了一个辅助方法来配置 Spring Security。清单 4-10 展示了包含 UserRegistrationSystem 应用程序 Spring
    Security 配置的 `SpringSecurityConfiguration` 数据库。


    ```

    package com.apress.ravi.Security;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

    import org.springframework.security.config.annotation.web.builders.HttpSecurity;

    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

    import org.springframework.security.config.http.SessionCreationPolicy;

    import com.apress.ravi.Service.UserInfoDetailsService;

    @Configuration

    @EnableWebSecurity

    public class SpringSecurityConfiguration_Database

    extends WebSecurityConfigurerAdapter {

    @Autowired

    private UserInfoDetailsService userInfoDetailsService;

    @Override

    protected void configure(

    AuthenticationManagerBuilder authenticationManagerBuilder)

    throws Exception {

    authenticationManagerBuilder

    .userDetailsService(userInfoDetailsService);

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http.sessionManagement()

    .sessionCreationPolicy(SessionCreationPolicy.STATELESS)

    .and()

    .authorizeRequests()

    .antMatchers("/api/user/**")

    .authenticated()

    .and()

    .httpBasic()

    .realmName("User Registration System")

    .and()

    .csrf()

    .disable();

    }

    }

    清单 4-10.

    UserRegistrationSystem 的安全配置

    ```


    `SpringSecurityConfiguration_Database` 配置类自动装配了 `UserInfoDetailsService` bean。该配置类重写了
    `WebSecurityConfigurerAdapter` 的 `configure` 方法，该方法以 `AuthenticationManagerBuilder`
    作为参数。`AuthenticationManagerBuilder` 是一个辅助类，它实现了构建器模式，并提供了一种组装 `AuthenticationManager`
    的方法。你在此方法中使用了 `AuthenticationManagerBuilder` 来添加 `UserInfoDetailsService` 实例。


    此外，你还在 `SpringSecurityConfiguration` 数据库配置类中重写了 `WebSecurityConfigurerAdapter`
    的另一个 `configure` 方法，该方法有助于配置 HTTP 基本认证以使用 UserRegistrationSystem 用户。此配置保护所有端点，并要求进行身份验证才能访问资源。该方法以
    `HttpSecurity` 作为参数，允许你指定哪些 URI 应该被保护或不受保护。该方法的实现首先请求 Spring Security 不要创建 HTTP
    会话，也不要将已登录用户的 `SecurityContext` 值存储在会话中，这是通过使用 `SessionCreationPolicy.STATELESS`
    创建策略实现的。然后，你使用了 `antMatchers` 来提供一个 Ant 风格的 URI 表达式，你希望 Spring Security 使用 `authenticated`
    方法来保护该表达式，该方法允许经过身份验证的用户访问相应的端点。最后，你启用了 HTTP 基本认证，并将领域名称设置为 User Registration
    System。


    此外，为了简单起见，你禁用了 HTTP 方法的 CSRF。CSRF 是一种安全漏洞，恶意网站会强制用户在当前已认证的另一个网站上执行非预期的命令。默认情况下，Spring
    Security 会启用 CSRF 保护，并且强烈建议在用户通过浏览器提交请求时使用。对于非浏览器客户端使用的服务（REST），可以禁用 CSRF。


    #### 方法级安全


    方法级安全是保护 URI 访问的另一种方式。有时需要确保只有具有管理员权限（拥有 `admin` 角色）的用户才能删除 UserRegistrationSystem
    中的注册用户，这可以通过对方法实施细粒度的安全控制来实现。你将在 `deleteUser` 方法上应用 Spring Security 的方法级安全。


    要启用 Spring 的方法级安全，请使用 `org.springframework.security.config.annotation.method.configuration.EnableGlobalMethodSecurity`
    注解来标注 `SpringSecurityConfiguration_Database` 配置类，如清单 4-11 所示。


    ```

    package com.apress.ravi.Security;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

    import org.springframework.security.config.annotation.method.configuration.EnableGlobalMethodSecurity;

    import org.springframework.security.config.annotation.web.builders.HttpSecurity;

    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

    import org.springframework.security.config.http.SessionCreationPolicy;

    import com.apress.ravi.chapter2.Service.UserInfoDetailsService;

    @Configuration

    @EnableWebSecurity

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    public class SpringSecurityConfiguration_Database

    extends WebSecurityConfigurerAdapter {

    //...code

    }

    清单 4-11.

    添加 EnableGlobalMethodSecurity 注解

    ```


    Spring Security 支持丰富的方法级授权注解以及类级授权注解。你在 `EnableGlobalMethodSecurity` 中将 `prePostEnabled`
    标志设置为 `true`，这将启用 Spring Security 注解来执行方法调用前后的授权检查。因此，使用 `@PreAuthorize` 注解来标注
    `UserRegistrationRestController` 的 `deleteUser` 方法，如清单 4-12 所示。


    ```

    import org.springframework.security.access.prepost.PreAuthorize;

    @DeleteMapping("/{id}")

    @PreAuthorize("hasAuthority(''ADMIN'')")

    public ResponseEntity deleteUser(@PathVariable("id") final Long id) {

    //...code

    }

    清单 4-12.

    添加 PreAuthorize 注解

    ```


    `@PreAuthorize` 注解仅允许授权用户调用 `deleteUser` 方法。`hasAuthority` 检查登录用户是否拥有 `ADMIN`
    权限，并让 Spring Security 做出决定。


    重新启动 UserRegistrationSystem 应用程序，并启动 Postman 对端点 `http://localhost:8080/api/user/1`
    执行 `DELETE` 操作。将 Postman 中的授权类型设置为 Basic Auth，并输入用户名为 `user`、密码为 `password` 的凭据，该用户拥有
    `USER` 角色。由于 `user` 没有管理权限，将返回一条未经授权的响应，消息为“Access is denied”，如图 4-15 所示。


    ![A436970_1_En_4_Fig15_HTML.jpg](img/A436970_1_En_4_Fig15_HTML.jpg)


    图 4-15.


    未经授权的删除响应


    ## 总结


    在本章中，你了解了 Spring Security 以及身份验证和授权的概念。你通过实现基本认证，在 RESTful 服务上启用了 Spring Security。然后，你使用内存数据库和针对数据库的方式自定义了身份验证。在下一章中，你将探索如何使用
    AngularJS 消费受保护的 RESTful API。

