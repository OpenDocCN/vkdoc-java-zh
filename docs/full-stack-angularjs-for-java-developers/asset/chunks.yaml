    module in `controller.js` is simply a function that takes different parameters
    based on the application requirements.


    *   `$scope`: `$scope` is used to set up dynamic content for the UI elements that
    this controller is responsible for. The concept of `$scope` is important in AngularJS
    as it can be seen as the glue that allows the template, model, and controller
    to work together. AngularJS supports dependency injection by naming conventions.
    AngularJS uses this `$scope` to keep the model and view separate but in sync.
    Any changes made in the view are reflected in the model, and any changes made
    in the model are reflected in the view.

    *   `$http`: The `$http` service is the core feature provided by AngularJS and
    is used to consume the REST service.


    ### Running a Spring Boot Application in STS


    Figure [3-12](#A436970_1_En_3_Chapter.html#Fig12) shows the final directory structure
    of your UserRegistrationSystem application.


    ![A436970_1_En_3_Fig12_HTML.jpg](A436970_1_En_3_Fig12_HTML.jpg)


    Figure 3-12.


    Directory structure of the UserRegistrationSystem application


    Let’s run your UserRegistrationSystem application in STS. Congratulations! You
    have successfully set up and run the single-page application using Spring Boot
    and AngularJS. Now it’s time to visit the URL in the browser to see the web page
    shown in Figure [3-13](#A436970_1_En_3_Chapter.html#Fig13).


    ![A436970_1_En_3_Fig13_HTML.jpg](A436970_1_En_3_Fig13_HTML.jpg)


    Figure 3-13.


    `http://localhost:8080/#/home`


    By default, the web page will redirect to the home page (`http://localhost:8080/#/home`)
    that you have configured in `app.js`. Clicking the List All Users button on the
    home page will redirect to `http://localhost:8080/#/list-all-users`, as shown
    in Figure [3-14](#A436970_1_En_3_Chapter.html#Fig14).


    ![A436970_1_En_3_Fig14_HTML.jpg](A436970_1_En_3_Fig14_HTML.jpg)


    Figure 3-14.


    `http://localhost:8080/#/list-all-users`


    This list is empty as of now; no user has been registered to the UserRegistrationSystem
    application. Let’s register a new user by clicking the button Register New User.
    By clicking this button, it will redirect you to `http://localhost:8080/#/register-new-user`,
    as shown in Figure [3-15](#A436970_1_En_3_Chapter.html#Fig15).


    ![A436970_1_En_3_Fig15_HTML.jpg](A436970_1_En_3_Fig15_HTML.jpg)


    Figure 3-15.


    `http://localhost:8080/#/register-new-user`


    The Register New User page contains an input box where you need to enter the name,
    address, and e-mail, as shown in Figure [3-16](#A436970_1_En_3_Chapter.html#Fig16).


    ![A436970_1_En_3_Fig16_HTML.jpg](A436970_1_En_3_Fig16_HTML.jpg)


    Figure 3-16.


    Register New User page with user details


    After entering a user’s details and clicking the Register User button, you will
    be redirected to the List User page at `http://localhost:8080/#/list-all-users`
    where you can see a list of all the registered users, as shown in Figure [3-17](#A436970_1_En_3_Chapter.html#Fig17).


    ![A436970_1_En_3_Fig17_HTML.jpg](A436970_1_En_3_Fig17_HTML.jpg)


    Figure 3-17.


    `http://localhost:8080/#/list-all-users`


    The user table on the List of Users page contains the columns Name, Email, and
    Address and Edit and Delete buttons. Clicking Edit will allow you to edit a specific
    user’s details, as shown in Figure [3-18](#A436970_1_En_3_Chapter.html#Fig18).


    ![A436970_1_En_3_Fig18_HTML.jpg](A436970_1_En_3_Fig18_HTML.jpg)


    Figure 3-18.


    `http://localhost:8080/#/update-user` /1


    If you try to register a new user with an existing username, then an error message
    will be displayed on the page, as shown in Figure [3-19](#A436970_1_En_3_Chapter.html#Fig19).


    ![A436970_1_En_3_Fig19_HTML.jpg](A436970_1_En_3_Fig19_HTML.jpg)


    Figure 3-19.


    Error message showing user already exists


    ## Summary


    In this chapter, you looked at the concept of single-page applications. You went
    through the life cycle of AngularJS and saw different phases such as the bootstrap
    phase, the compilation phase, and the runtime data binding phase. Then you learn
    about AngularJS architecture concepts and the MVC architecture. You set up the
    AngularJS development environment by adding AngularJS to the Spring Boot application
    you developed in Chapter [2](#A436970_1_En_2_Chapter.html). You used Bootstrap
    for CSS designing. You saw different components of AngularJS and implemented the
    model, view, and controller in your application. Then you created different view
    pages to consume your REST API.


    In the next chapter, you will implement Spring Security to secure the RESTful
    API that you developed using Spring Boot. Securing a web-based application is
    different from securing a RESTful API because in web-based applications human
    interaction is required from the login page to pass the user credentials. In a
    RESTful API, the interaction can be machine to machine or from different applications
    developed in different languages.'
