  raw: '### UserRegistrationSystem Error Handling


    Consider a scenario in the UserRegistrationSystem application where the client
    tries to fetch user information that doesn’t exist in the system. Figure [2-8](#A436970_1_En_2_Chapter.html#Fig8)
    shows the Postman `GET` request for a nonexistent user with an ID of 50.


    ![A436970_1_En_2_Fig8_HTML.jpg](A436970_1_En_2_Fig8_HTML.jpg)


    Figure 2-8.


    GET request for a nonexistent user with an ID of 50


    As shown in Figure [2-8](#A436970_1_En_2_Chapter.html#Fig8), the RESTful API returns
    the empty body because `UserJpaRepository`’s `findOne` method returns `null` to
    `UserRegistrationRestController` for a user ID of 50, which doesn’t exist. The
    RESTful API returns the HTTP status code as 200 `OK`, instead of status code 404,
    which should indicate the requested user doesn’t exist.


    To achieve this behavior, you will validate the user `id` attribute in `com.apress.ravi.Rest.UserRegistrationRestController`’s
    `getUserById` method. For a nonexistent user, return `ResponseEntity` containing
    `CustomErrorType` and status code `HttpStatus.NOT_FOUND` (404). Listing [2-13](#A436970_1_En_2_Chapter.html#Par102)
    shows the necessary code update for handling errors.


    ```

    @GetMapping("/{id}")

    public ResponseEntity getUserById(@PathVariable("id") final Long id) {

    UsersDTO user = userJpaRepository.findById(id);

    if (user == null) {

    return new ResponseEntity(

    new CustomErrorType("User with id "

    + id + " not found"), HttpStatus.NOT_FOUND);

    }

    return new ResponseEntity(user, HttpStatus.OK);

    }

    Listing 2-13.

    Error Handing for Nonexistent User

    ```


    In Listing [2-13](#A436970_1_En_2_Chapter.html#Par102), you have created an instance
    of the `CustomErrorType` class by passing a custom error message (“User with id
    50 not found”) in its constructor.


    #### Custom Error Response


    Now let’s create the `CustomErrorType` class in the `com.apress.ravi.Exception`
    package under `src/main/java`. Listing [2-14](#A436970_1_En_2_Chapter.html#Par105)
    shows the necessary code implementation for the `CustomErrorType` class .


    ```

    package com.apress.ravi.Exception;

    import com.apress.ravi.dto.UsersDTO;

    public class CustomErrorType extends UsersDTO {

    private String errorMessage;

    public CustomErrorType(final String errorMessage){

    this.errorMessage = errorMessage;

    }

    @Override

    public String getErrorMessage() {

    return errorMessage;

    }

    }

    Listing 2-14.

    CustomErrorType Class

    ```


    In Listing [2-14](#A436970_1_En_2_Chapter.html#Par105), the `CustomErrorType`
    class declared `errorMessage` as a member variable with its corresponding getter
    method. This `errorMessage` is getting initialized inside the constructor of this
    class.


    With this modification in the UserRegistrationSystem application, restart the
    application and launch Postman to send a `GET` request for the user with an ID
    of 50\. The `UserRegistrationRestController` result with the right status code
    and error message is shown in Figure [2-9](#A436970_1_En_2_Chapter.html#Fig9).


    ![A436970_1_En_2_Fig9_HTML.jpg](A436970_1_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    Error message and status code for nonexistent user


    The same user ID verification needs to be performed for other methods that are
    involved in CRUD operations with HTTP methods such as `GET`, `PUT`, and `DELETE`
    in the UserRegistrationSystem application to return the right status code and
    message. Listing [2-15](#A436970_1_En_2_Chapter.html#Par109) shows the updated
    `UserRegistrationRestController` class with the modified `listAllUsers`, `getUserById`,
    `createUser`, `updateUser`, and `deleteUser` methods.


    ```

    // method to get list of users

    @GetMapping("/")

    public ResponseEntity> listAllUsers() {

    List users = userJpaRepository.findAll();

    if (users.isEmpty()) {

    return new ResponseEntity>(HttpStatus.NO_CONTENT);

    }

    return new ResponseEntity>(users, HttpStatus.OK);

    }

    // method to get user by id

    @GetMapping("/{id}")

    public ResponseEntity getUserById(@PathVariable("id") final Long id) {

    UsersDTO user = userJpaRepository.findById(id);

    if (user == null) {

    return new ResponseEntity(

    new CustomErrorType("User with id "

    + id + " not found"), HttpStatus.NOT_FOUND);

    }

    return new ResponseEntity(user, HttpStatus.OK);

    }

    // method to create an user

    @PostMapping(value = "/", consumes = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity createUser(@RequestBody final UsersDTO user) {

    if (userJpaRepository.findByName(user.getName()) != null) {

    return new ResponseEntity(new CustomErrorType(

    "Unable to create new user. A User with name "

    + user.getName() + " already exist."),HttpStatus.CONFLICT);

    }

    userJpaRepository.save(user);

    return new ResponseEntity(user, HttpStatus.CREATED);

    }

    // method to update an existing user

    @PutMapping(value = "/{id}", consumes = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity updateUser(

    @PathVariable("id") final Long id, @RequestBody UsersDTO user) {

    UsersDTO currentUser = userJpaRepository.findById(id);

    if (currentUser == null) {

    return new ResponseEntity(

    new CustomErrorType("Unable to upate. User with id "

    + id + " not found."), HttpStatus.NOT_FOUND);

    }

    currentUser.setName(user.getName());

    currentUser.setAddress(user.getAddress());

    currentUser.setEmail(user.getEmail());

    userJpaRepository.saveAndFlush(currentUser);

    return new ResponseEntity(currentUser, HttpStatus.OK);

    }

    // delete an existing user

    @DeleteMapping("/{id}")

    public ResponseEntity deleteUser(@PathVariable("id") final Long id) {

    UsersDTO user = userJpaRepository.findById(id);

    if (user == null) {

    return new ResponseEntity(

    new CustomErrorType("Unable to delete. User with id "

    + id + " not found."), HttpStatus.NOT_FOUND);

    }

    userJpaRepository.delete(id);

    return new ResponseEntity(

    new CustomErrorType("Deleted User with id "

    + id + "."), HttpStatus.NO_CONTENT);

    }

    Listing 2-15.

    Updated UserRegistrationRestController Class

    ```


    ### Validating Request Body


    When it is required to validate the request body containing JSON data for some
    complex object, you have to do a bit more. Consider a scenario where a client
    makes a new user creation request with missing data in the request body, such
    as the request body doesn’t include an address.


    Spring MVC supports input validation using JSR-303 Bean Validation constraints.'
