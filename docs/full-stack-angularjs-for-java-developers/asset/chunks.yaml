    # 3. Setting Up AngularJS: Creating Your Single-Page Application


    In the previous chapter, you looked at creating RESTful services for the `UserRegistrationSystem`
    application. You now understand HTTP methods and status codes. You created different
    endpoints to perform CRUD operations. You handled errors in the REST API and defined
    your custom error response. You also validated request input using the `Validation`
    annotation and externalized error messages.


    The front end involves everything that the user sees, including the design and
    some languages like HTML and CSS. The main aim of the front-end code is to interact
    with the user, as well as present the data in a well-defined style. There are
    so many amazing JavaScript libraries that you can use when building a front-end
    application.


    AngularJS is an open source JavaScript framework that provides structured methods
    for creating web applications. It is a JavaScript library built on the top of
    a light version of jQuery. It enforces a structured, clean Model-View-Controller
    (MVC) framework. AngularJS is a perfect solution for a client-side library for
    Spring Boot because of this clean and structured approach.


    In this chapter, I will introduce MVC and the AngularJS framework and its major
    components so you can develop a front end for your `UserRegistrationSystem` application
    developed using Spring Boot.


    I will start with an introduction of AngularJS and its life cycle. You will then
    look into AngularJS components and how to implement them in your application.
    Also, you will consume your REST API developed in Chapter [2](#A436970_1_En_2_Chapter.html)
    to develop your single-page application (SPA). In this chapter, you will learn
    about the following:


    - How to use AngularJS as a front-end framework

    - How to develop a single-page application to consume a REST API


    In this chapter, you will learn how to integrate the AngularJS framework in your
    Spring Boot `UserRegistrationSystem` application to develop a single-page application.
    If you want to get an in-depth understanding of AngularJS, then refer to [`https://angularjs.org/`](https://angularjs.org/).


    ## Introducing AngularJS as a Front-End Framework


    AngularJS is a library written in JavaScript for web application development,
    maintained by Google. It is an open source JavaScript framework and addresses
    the challenges of single-page applications (SPAs). An AngularJS web application
    follows the MVC design pattern, which results in developing extendable, maintainable,
    testable, and standardized web applications. AngularJS data binding and dependency
    injection make it an ideal partner with any server technology because it eliminates
    much of the code you would otherwise have to write, and it all happens within
    the browser.'
