- fmt: '# 1. The Big Picture of Full Stack Web Development


    Full stack web development lets you explore the best tools and frameworks while
    making your application solid and reliable on different fronts such as design,
    scalability, robustness, and security.


    In this chapter, I will cover the big picture of full stack web development and
    discuss the architecture of modern applications to overcome the myth that developing
    isolated desktop and mobile applications is a good approach. I will discuss `AngularJS`
    as a front-end framework and `Spring Boot` as a back-end framework. I will also
    show how to set up `Spring Boot` as the development environment. Then you will
    develop your first `Spring Boot` application and run this application. Finally,
    you will monitor your `Spring Boot` application using the `Spring Boot actuator`.


    ## What Is a Full Stack Developer?


    Whenever someone tells you they are a full stack developer, the first question
    you will probably ask is, “What kind of full stack developer are you?” The thing
    is, when you work with the Web today, you have to use lots of tools. The stack
    has become larger than what it was before.


    Companies nowadays prefer to employ engineers who are flexible enough to do anything
    rather than have a lot of expertise with just one technology. The final goal is
    that you will be able to code Java, use Angular, write database scripts, write
    CSS, and so on. In fact, a few years ago, it was easy to say that you were a full
    stack developer, but today you will have to take care of Java, `AngularJS`, `Bootstrap`,
    CSS, database scripts, and several databases, and also you will need to know about
    content delivery, deployment, and how to publish to an Amazon Web Services cluster.
    Needless to say, it is complicated to manage all of this at once. And I haven’t
    even mentioned areas such as designing the UI and creating mobile applications.
    So, there is a lot to know when you say you are full stack developer.


    Is a full stack developer the one who knows a little bit about all these subjects
    or has a mastery of all of them? Many times, full stack developers are considered
    to be jacks-of-all-trades but masters of none. So, it’s best to decide on what
    kind of full stack developer you are.


    Being a full stack developer means you need to pretty much become a connector.
    So, even if you have one set of good skills, you can prep your work for delivery
    so that another person can do their work at the other end and know how to receive
    it. That’s where full stack developers are very valuable.


    But the chances of finding a good full stack developer are extremely low. The
    thing is, startup companies always need a full stack developer who can look into
    all things, and startups are always desperate to hire full stack developers for
    any amount of money.


    The definition of a full stack developer in the industry is an engineer who is
    specialized in everything from client-side coding such as HTML, CSS, and `AngularJS`
    to the server side such as Java and `Spring Boot` and is experienced with different
    databases, including both RDBMS and NoSQL database systems. So, a full stack web
    developer should have good hands-on experience with both client-side and server-side
    technologies, as shown in Figure 1-1.


    ![A436970_1_En_1_Fig1_HTML.jpg](A436970_1_En_1_Fig1_HTML.jpg)


    Figure 1-1. Client-side and server-side technologies


    The full stack developer is responsible for getting every part of the system to
    run smoothly. The developer should have expertise in the following:


    - Designing user interfaces

    - Developing business logic and service layers on the server side

    - Handling relational and nonrelational databases

    - Handling API interaction

    - Securing applications using authentication and authorization programmatically

    - Ensuring quality assurance

    - Understanding business requirements and customer needs


    In addition to all this, a full stack developer must know how to do basic server
    management, providing the roles of a server admin or DevOps when necessary.


    - Connecting to the cloud server through a command or terminal and access tools
    like `putty`

    - Managing sets and subsets of users and groups

    - Doing basic shell scripting in a designated server environment

    - Understanding the Apache and Nginx server programs

    - Managing firewall and permissions

    - Installing, updating, and managing server-side software, packages, and libraries


    In addition, with the evolution of cloud infrastructure, a full stack developer
    should be aware of the platform as a service (PaaS) and software as a service
    (SaaS) models, Amazon Web Services, and IBM Bluemix.


    This section was all about being a full stack web developer. Let’s dig into the
    big picture of full stack development in the next section.


    ## Full Stack Web Development


    The stack is the combination of tools and components that make up an application.
    In a web application, the components can be on the front end (HTML, CSS, JavaScript/jQuery)
    or the back end (server operations, logical layers, and databases). Note that
    today the database can be placed in a separate section instead of the server-side
    operation because of database as a service (DaaS).


    Full stack web development means being comfortable working with both front-end
    and back-end technologies. Put simply, full stack development covers client-side
    development using HTML/CSS, JavaScript/jQuery, and framework such as `AngularJS`
    and `Bootstrap`.


    For server-side development, it covers programming languages such as Java, frameworks
    such as `Spring Boot`, databases such as PostgreSQL or Oracle or any other database,
    and everything in between.


    The communication between the client side and the server side happens through
    a RESTful API and HTTP, as shown in Figure 1-2. Let’s discuss the architecture
    of modern web applications in the next section.


    ![A436970_1_En_1_Fig2_HTML.jpg](A436970_1_En_1_Fig2_HTML.jpg)


    Figure 1-2. Communication between the client and server'
