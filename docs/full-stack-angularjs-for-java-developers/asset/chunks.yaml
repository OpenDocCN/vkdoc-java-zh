    \ benefits of automated testing are that it runs continuously and repeatedly at\
    \ different phases of software development process, which is highly recommended\
    \ when you follow the agile development process. Since the Spring Framework is\
    \ agile in nature, it supports this kind of process.\n\nLet’s discuss a popular\
    \ Java testing framework, JUnit, and the basic techniques of testing with it.\n\
    \n### Testing Using JUnit4\n\nJUnit4 ([http://junit.org/](http://junit.org/))\
