- fmt: '# 4. Securing Your RESTful API Using Spring Security


    In this chapter, you will secure your REST API so that only authenticated and
    authorized users are able to call the REST API and perform different CRUD operations.
    You will use Spring Security to secure your RESTful services. First I will introduce
    Spring Security and explain the Maven dependencies needed. Then you will learn
    how to implement Spring Security to secure your REST APIs in the `UserRegistrationSystem`
    application. You will also learn about the in-memory and database configuration
    to set up user credentials and their roles.


    ## Introducing Spring Security


    Security is the process of protecting resources from unauthenticated and unauthorized
    users and allowing specific (authenticated and authorized) users to access these
    protected resources. Security is different from firewalls, intrusion detection,
    JVM security, or anything else. Spring Security is primarily targeted toward Spring-based
    applications.


    The Spring Security framework initially started as the Acegi Security framework
    and was later adopted by Spring as a subproject. It has become the de facto standard
    for securing applications developed using the Spring Framework. Spring Security
    supports authentication and authorization at the HTTP request method’s invocation
    level.


    ### Authentication and Authorization


    Authentication and authorization are the two major operations provided by Spring
    Security (see Figure [4-1](#A436970_1_En_4_Chapter.html#Fig1)).


    ![A436970_1_En_4_Fig1_HTML.jpg](A436970_1_En_4_Fig1_HTML.jpg)


    Figure 4-1. Authentication and authorization


    Authentication is the process of verifying that the user is the person the user
    is claiming to be. Authentication takes place through identification and verification.


    Authorization is the process of granting access to a resource for the authenticated
    user. In other words, it provides access control to an authenticated user. Let’s
    look at an example in the `UserRegistrationSystem` application: the user `USER`
    can perform user registration, update user details, and get a list of users, whereas
    only the user `ADMIN` has the extra privileges to delete users. The access rights
    given to the client will determine the access rule for that application.


    Spring Security supports URL-based security and is implemented using filters.
    Spring Security also supports method-level security where only authorized users
    are allowed to invoke specific methods granted to them.


    ### Introducing Basic Authentication


    The traditional approaches for authentication, such as using the login page and
    session identification, are bound to a web-based client requiring human interaction.
    When it comes to communicating with the REST client, which may not even be a web-based
    application, you need to think about the solution provided by Basic Authentication.


    Basic Authentication is a standard HTTP header (`Authorization`) that sends Base64-encoded
    credentials with each request. Base64 is not encrypted or hashed in any way; in
    other words, the username and password are encoded in clear-text format.


    The credential string contains the username and password in the format `username:password`.
    Listing [4-1](#A436970_1_En_4_Chapter.html#Par11) shows the algorithm used to
    prepare the header.


    ```

    String plain_Client_Credentials="user:password";

    String base64_ClientCredentials =

    new String(Base64.encodeBase64(plain_Client_Credentials.getBytes()));

    HttpHeaders headers = getHeaders();

    headers.add("Authorization", "Basic " + base64_ClientCredentials);

    ```


    Listing 4-1. Code to Prepare the HTTP Header


    Listing [4-1](#A436970_1_En_4_Chapter.html#Par11) produces the header `Authorization
    : Basic dXNlcjpwYXNzd29yZA==`, which will be sent with each HTTP request.


    Basic Authentication is one of the simplest techniques for protecting a RESTful
    API because it does not require cookies, a session identifier, or even a login
    page.


    ### BasicAuthenticationFilter


    The `BasicAuthenticationFilter` object is responsible for processing any HTTP
    request that contains an HTTP request header of `Authorization` with an authentication
    schema of Basic Authentication and a Base64-encoded `username:password` token.


    If the authentication is successful, `BasicAuthenticationFilter` in Spring is
    responsible for putting the result (the `Authentication` object) into the `SecurityContextHolder`.


    ## Enabling Spring Security on RESTful Services


    In this section, you will understand the Spring Boot starter called Security,
    and then you will use it to secure your RESTful API.


    ### What Is the Spring Boot Security Starter?


    The goal of Spring Boot is to ease application development. Just like with every
    other feature of Spring Boot, by adding the matching starter POM, the Spring Boot
    starter called Security creates the basic configuration setup for the developer,
    including HTTP Basic Authentication and an `AuthenticationManager` bean with an
    in-memory default user when building an application on top of Spring Boot.


    You will now configure Spring Security in your `UserRegistrationSystem` application.
    To add Spring Security to your Spring Boot application, you need to add the Spring
    Security dependency in the Maven `pom.xml` file.'
