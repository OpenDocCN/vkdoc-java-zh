    by the JUnit framework.


    **Table 6-6.** Annotations in the JUnit Framework


    | Annotation | Import | Description |

    | --- | --- | --- |

    | `@Test` | `org.junit.Test` | Annotates the public `void` method with the `@Test`
    annotation to identify and run test cases. |

    | `@Before` | `org.junit.Before` | Annotates the public `void` method with the
    `@Before` annotation, which needs to be executed before each test method in that
    class. This method can be used to set up environment variables. |

    | `@After` | `org.junit.After` | Annotates the public `void` method with the `@After`
    annotation, which needs to be executed after each test method in that class. This
    method can be used to clean up the test environment or to release resources. |

    | `@BeforeClass` | `org.junit.BeforeClass` | Annotates the public static `void`
    method with the `@BeforeClass` annotation, which needs to be executed only once
    before the entire test executes in that `Test` class. |

    | `@AfterClass` | `org.junit.AfterClass` | Annotates the public static `void`
    method with the `@AfterClass` annotation, which needs to be executed only once
    after the entire test executes in that `Test` class. This method can be used to
    perform some cleanup activities. |

    | `@Ignore` | `org.junit.Ignore` | Annotates the method with the `@Ignore` annotation,
    which shouldn’t be executed. |


    # JUnit 4 Assert Methods


    The JUnit framework provides the `org.junit.Assert` class, which contains a set
    of assert methods useful for writing unit tests to test certain conditions. These
    methods compare the expected value with the actual value to verify the test result.
    Table [6-7](#A436970_1_En_6_Chapter.html#Tab7) lists a few of the assert methods
    provided by JUnit 4.


    **Table 6-7.** Annotations in the JUnit Framework


    | Assert Method | Description |

    | --- | --- |

    | `assertTrue(boolean expected, boolean actual)` | This method checks whether
    the Boolean condition is true. |

    | `assertFalse(boolean condition)` | The `assertFalse` method checks whether the
    Boolean condition is false. |

    | `assertEquals(boolean expected, expected, actual)` | The `assertEquals` compares
    the equality of any two objects using the `equals()` method. |

    | `assertEquals(boolean expected, expected, actual, tolerance)` | The `assertEquals`
    method compares either the float or the double values, and tolerance defines the
    number of the decimal that must be the same. |

    | `assertNull(Object object)` | The `assertNotNull` tests that a given object
    is null. |

    | `assertNotNull(Object object)` | The `assertNotNull` tests that a given object
    is not null. |

    | `assertSame(Object object1,Object object2)` | The `assertSame` method tests
    whether two objects refer to the same object. |

    | `assertNotSame(Object object1,Object object2)` | The `assertNotSame` method
    tests whether two objects do not refer to the same object. |


    # Example: Implementing JUnit 4


    Let’s develop a simple application to add two numbers, as shown in Listing [6-14](#A436970_1_En_6_Chapter.html#Par62).


    ```

    package com.apress.ravi.chapter6.SpringTesting;

    public class SimpleCalculator {

    public long addOperation(int x, int y) {

    return x + y;

    }

    }

    Listing 6-14.

    Simple Calculator to Perform an Add Operation

    ```


    Note that the JUnit4 JAR needs to be added in the application’s `CLASSPATH` to
    compile and run the test cases created for JUnit 4.


    Now, you will be testing your simple `addOperation` method in the `SimpleCalculator`
    class with JUnit 4. The STS IDE supports the creation of JUnit tests through wizards.
    You will create your test class `SimpleCalculatorTests`, as shown in Listing [6-15](#A436970_1_En_6_Chapter.html#Par65).


    ```

    package com.apress.ravi.chapter6.SpringTesting;

    import static org.junit.Assert.assertEquals;

    import org.junit.After;

    import org.junit.Before;

    import org.junit.Test;

    public class SimpleCalculatorTests {

    private SimpleCalculator simpleCalculator;

    @Before

    public void setup() {

    simpleCalculator = new SimpleCalculator();

    }

    @Test

    public void verifyAdd() {

    long sum = simpleCalculator.addOperation(2, 1);

    assertEquals(3, sum);

    }

    @After

    public void teardown() {

    simpleCalculator = null;

    }

    }

    Listing 6-15.

    Test Add Operation Method

    ```


    In Listing [6-15](#A436970_1_En_6_Chapter.html#Par65), the `setup` method is annotated
    with the `@Before` annotation to perform the initialization of an instance member
    variable, and it instructs JUnit to run this `setup` method prior to any test
    method execution in the `SimpleCalculatorTests` class. The `teardown` method is
    annotated with the `@After` annotation and instructs JUnit to run the `teardown`
    method to perform cleanup after any test method execution in the `SimpleCalculatorTests`
    class.


    The `verifyAdd` method is annotated with the `@Test` annotation to denotate `verifyAdd`
    as a JUnit test method. The `verifyAdd` method contains code that ensures that
    your production code works as expected.


