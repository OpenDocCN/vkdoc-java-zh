    #### 创建 AngularJS 控制器


    在 `src/main/resources/static/js` 文件夹中定义的 `controller.js` 文件包含了 AngularJS 控制器的实现。


    让我们创建一个名为 `registerUserController` 的 AngularJS 控制器模块，它将使用 Spring REST 服务来执行 `POST`
    HTTP 调用。这里，在 `$scope` 中设置了一个 `errorMessage`，用于显示在“注册新用户”页面上从 `POST` 调用返回的错误信息。当
    `POST` 调用成功时，它将重定向到 `list-all-users`。请参见清单 3-13。


    ```

    app.controller(''registerUserController'', function($scope, $http, $location,

    $route) {

    $scope.submitUserForm = function() {

    $http({

    method : ''POST'',

    url : ''http://localhost:8080/api/user/'',

    data : $scope.user,

    }).then(function(response) {

    $location.path("/list-all-users");

    $route.reload();

    }, function(errResponse) {

    $scope.errorMessage = errResponse.data.errorMessage;

    });

    }

    $scope.resetForm = function() {

    $scope.user = null;

    };

    });

    清单 3-13.

    src/main/resources/static/js.controller.js 中的 registerUserController

    ```


    类似地，你定义了 `listUserController` 和 `usersDetailsController` 来使用第 2 章中开发的 REST API。清单
    3-14 展示了 `listUserController`，清单 3-15 展示了 `usersDetailsController`。


    ```

    app.controller(''listUserController'', function($scope, $http, $location, $route)
    {

    $http({

    method : ''GET'',

    url : ''http://localhost:8080/api/user/''

    }).then(function(response) {

    $scope.users = response.data;

    });

    $scope.editUser = function(userId) {

    $location.path("/update-user/" + userId);

    }

    $scope.deleteUser = function(userId) {

    $http({

    method : ''DELETE'',

    url : ''http://localhost:8080/api/user/'' + userId

    })

    .then(

    function(response) {

    $location.path("/list-all-users");

    $route.reload();

    });

    }

    });

    清单 3-14.

    src/main/resources/static/js.controller.js 中的 listUserController

    ```


    ```

    app.controller(''usersDetailsController'',function($scope, $http, $location, $routeParams,
    $route) {

    $scope.userId = $routeParams.id;

    $http({

    method : ''GET'',

    url : ''http://localhost:8080/api/user/'' + $scope.userId

    }).then(function(response) {

    $scope.user = response.data;

    });

    $scope.submitUserForm = function() {

    $http({

    method : ''POST'',

    url : ''http://localhost:8080/api/user/'',

    data : $scope.user,

    })

    .then(

    function(response) {

    $location.path("/list-all-users");

    $route.reload();

    },

    function(errResponse) {

    $scope.errorMessage = "Error while updating User - Error Message: ''"

    + errResponse.data.errorMessage;

    });

    }

    });

    清单 3-15.

    src/main/resources/static/js.controller.js 中的 usersDetailsController

    ```


    让我们理解一下 `controller.js` 文件中定义的代码。`controller.js` 中的控制器模块只是一个函数，它根据应用程序的需求接受不同的参数。


    *   `$scope`：`$scope` 用于为该控制器负责的 UI 元素设置动态内容。`$scope` 的概念在 AngularJS 中很重要，因为它可以被视为连接模板、模型和控制器的粘合剂。AngularJS
    通过命名约定支持依赖注入。AngularJS 使用这个 `$scope` 来保持模型和视图分离但同步。视图中所做的任何更改都会反映在模型中，模型中所做的任何更改也会反映在视图中。

    *   `$http`：`$http` 服务是 AngularJS 提供的核心功能，用于使用 REST 服务。


