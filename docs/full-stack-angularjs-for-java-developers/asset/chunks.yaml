    testing for your REST services in your UserRegistrationSystem application using
    the Spring Test framework.


    With `RestTemplate`, you can make a call to any REST API from a different application.
    Let’s build your REST client using `RestTemplate` to access the REST API.


    ## Building a REST Client Using RestTemplate


    Building a REST client to consume REST services involves building a request and
    consuming a response containing the JSON data. Spring provides utility classes
    and templates to ease the consumption of REST services.


    ### RestTemplate


    The `org.springframework.web.client.RestTemplate` in Spring is used to build a
    REST client to consume REST services. The central class in Spring is `RestTemplate`,
    which can be used for synchronous calls by the client to consume RESTful services.
    `RestTemplate` is a thread-safe. The `RestTemplate` is based on Template Method
    design pattern.


    `RestTemplate` is part of the `spring-web.jar` file. So, you need to add the `spring-web`
    dependency in your Maven `pom.xml` file when you are building a stand-alone REST
    client, as shown in Listing [6-1](#A436970_1_En_6_Chapter.html#Par7).


