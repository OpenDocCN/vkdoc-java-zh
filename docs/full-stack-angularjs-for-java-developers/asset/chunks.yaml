- fmt: '### Adding the Bean Validation Annotations


    Listing [2-16](#A436970_1_En_2_Chapter.html#Par113) shows the update in the `UsersDTO`
    entity class. You annotate your `UsersDTO` object properties with validation constraints
    such as `@NotNull` and `@Email`. You can use Hibernate Validator, which is a popular
    JSR 303 and JSR 349 implementation framework.


    ```

    package com.apress.ravi.dto;

    import javax.persistence.Column;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.Id;

    import org.hibernate.validator.constraints.Email;

