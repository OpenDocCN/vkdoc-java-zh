    ### 更新 controller.js 以支持登录和注销认证流程


    为了支持登录和注销认证流程，你需要添加更多功能。你需要新增三个控制器：`homeController`、`loginController` 和 `logoutController`。将它们添加到现有
    UserRegistrationSystem 应用程序的 `src/main/resources/static/js/controller.js` 文件中，如代码清单
    5-8 所示。


    ```

    app.controller(''homeController'', function(''rootScope, ''scope,

    ''http, ''location, ''route){

    if (''rootScope.authenticated) {

    ''location.path("/");

    ''scope.loginerror = false;

    } else {

    ''location.path("/login");

    ''scope.loginerror = true;

    }

    });

    app.controller(''loginController'', function(''rootScope, ''scope,

    ''http, ''location, ''route){

    ''scope.credentials = {};

    ''scope.resetForm = function() {

    ''scope.credentials = null;

    }

    var authenticate = function(credentials, callback) {

    var headers = ''scope.credentials ? {

    authorization : "Basic "

    + btoa(''scope.credentials.username + ":"

    + ''scope.credentials.password)

    } : {};

    ''http.get(''user'', {

    headers : headers

    }).then(function(response) {

    if (response.data.name) {

    ''rootScope.authenticated = true;

    } else {

    ''rootScope.authenticated = false;

    }

    callback && callback();

    }, function() {

    ''rootScope.authenticated = false;

    callback && callback();

    });

    }

    authenticate();

    ''scope.loginUser = function() {

    authenticate(''scope.credentials, function() {

    if (''rootScope.authenticated) {

    ''location.path("/");

    ''scope.loginerror = false;

    } else {

    ''location.path("/login");

    ''scope.loginerror = true;

    }

    });

    };

    });

    app.controller(''logoutController'', function(''rootScope, ''scope,

    ''http, ''location, ''route){

    ''http.post(''logout'', {}).finally(function() {

    ''rootScope.authenticated = false;

    ''location.path("/");

    });

    });

    代码清单 5-8.

    src/main/resources/static/js/controller.js

    ```


    如代码清单 5-8 所示，你创建了名为 `homeController`、`loginController` 和 `logoutController` 的新控制器。`homeController`
    控制器检查 `''rootScope` 中的 `authenticated` 是否为 true，然后将 `''location.path` 设置为 `/`
    并将 `''scope` 中的 `loginerror` 设置为 false，否则将 `''location.path` 设置为 `/login` 并将 `''scope`
    中的 `loginerror` 设置为 `true`。


    `loginController` 控制器将在登录页面加载时执行。该控制器首先初始化 credentials 对象，然后定义以下函数：`resetForm()`
    方法（将用户名和密码的输入框重置为空值）、`authenticate()` 函数（一个本地辅助函数，用于从后端加载 `user` 资源）以及表单中需要的 `loginUser()`
    函数。


    当控制器加载时，会调用本地辅助函数 `authenticate()` 来检查用户是否已经通过认证。你需要这个函数只是为了进行远程调用，因为实际的认证是由服务器完成的。该函数还设置了一个名为
    `authenticated` 的应用程序级标志，你在 `index.html` 页面中使用它来显示/隐藏元素，并控制页面的哪些部分被渲染。你使用 [`''rootScope`](https://docs.angularjs.org/api/ng/service/''rootScope)
    实现了这个应用程序级标志，因为它方便且易于理解，并且你需要在不同控制器之间共享 authenticated 标志。


    这个 `authenticate()` 方法向名为 `/user` 的相对资源发起一个 `GET` 调用。当从 `loginUser()` 函数调用时，`authenticate()`
    函数会在请求头中添加 Base64 编码的凭据，这样服务器就会进行认证并返回一个 cookie。`loginUser()` 函数在获取认证结果后，也会相应地设置本地的
    `''scope.loginerror` 标志，该标志用于控制登录页面中错误消息的显示。


    如果用户已通过认证，你会在每个网页上显示一个“注销”按钮。点击“注销”按钮将执行 `logoutController`。`logoutController`
    控制器向 `/logout` 发送一个 HTTP `POST` 请求，你无需在服务器端实现该端点，因为 Spring Security 已经为你添加了它。为了对
    Spring Security 提供的注销流程的默认行为进行更多控制，你可以在 `Memory.java` 中使用 `HttpSecurity` 回调的 `inSpringSecurityConfiguration`
    方法，例如在注销后执行一些业务逻辑。


    ### 更新后端代码


    你还需要更新后端代码，以支持 UserRegistrationSystem 应用程序中的登录和注销认证流程。


    #### 创建新的 RESTful 端点以获取当前已认证用户


    如代码清单 5-8 所示，`authenticate()` 函数向 `/user` 资源发起一个 `GET` 请求以获取当前已认证用户。因此，为了服务 `authenticate()`
    函数，你需要在 UserRegistrationSystem 应用程序中添加一个新的 REST 端点。让我们在 `src/main/java` 文件夹下的
    `com.apress.ravi.Rest` 包中创建 `ServiceAuthenticate.java` 类，如代码清单 5-9 所示。


    ```

    package com.apress.ravi.Rest;

    import java.security.Principal;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class ServiceAuthenticate {

    @RequestMapping("/user")

    public Principal user(Principal user) {

    return user;

    }

    }

    代码清单 5-9.

    com.apress.ravi.Rest.ServiceAuthenticate.java

    ```


