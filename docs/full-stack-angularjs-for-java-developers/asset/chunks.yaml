    ### 验证请求体


    当需要验证包含 JSON 数据的请求体（针对某些复杂对象）时，你需要做更多工作。考虑一个场景：客户端发起一个新用户创建请求，但请求体中缺少数据，例如请求体不包含地址。


    Spring MVC 支持使用 JSR-303 Bean 验证约束进行输入验证。

