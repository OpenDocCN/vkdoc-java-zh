    #### The Mockito Framework


    The Mockito framework is an open source Mock framework for creating and configuring
    mock objects.


    Again, a mock object is a fake object that mimics an actual object, and the process
    of creating fake object is called mocking. Several libraries are available in
    Java that can be used for mocking, such as EasyMock and Mockito.


    To use Mockito, you need to have a Mockito JAR along with JUnit in an application
    context. Mockito supports field-level annotation as listed here:


    - `@Mock`: This annotation is used to create a mock object for an annotated field.

    - `@Spy`: This annotation creates a spy for the real object field it annotates,
    which can be referred to as a partial mock, when spying or stubbing a specific
    method of it.

    - `@RunWith(MockitoJUnitRunner.class)`: Creating a mock object using the `@Mock`
    annotation and the `@Spy` annotation requires the `@RunWith(MockitoJUnitRunner.class)`
    annotation to be applied to your test class. When `MockitoJUnitRunner` executes
    the unit test, all annotated fields will create mock and spy objects.


    Refer to [`http://mockito.org/`](http://mockito.org/) to get more details about
    the Mockito framework.


    ### Integration Testing


    In integration testing, individual modules are combined and logically tested as
    a group. Integration testing in the software development phase occurs after unit
    testing.


    ## Testing the Spring Boot Application


    The `spring-test` module in the Spring Framework allows developers to perform
    unit testing and integration testing by providing rich sets of annotations, utility
    classes, and mock objects. Let’s set up the environment by updating your Maven
    `pom.xml` file with the required dependency.


    ### Maven Dependency


    Spring Boot provides the starter POM named `spring-boot-starter-test`, which automatically
    adds the `spring-test` module to the Spring Boot application. Listing [6-16](#A436970_1_En_6_Chapter.html#Par87)
    shows the dependency in `pom.xml`.


    ```

    org.springframework.boot

    spring-boot-starter-test

    test

    ```


    Listing 6-16. Dependency in `pom.xml`


    This starter POM brings JUnit (the de facto standard for unit testing a Java application),
    AssertJ (an assertion library), Mockito (a Java mocking framework), and [Spring
    Test](http://docs.spring.io/spring/docs/4.3.10.RELEASE/spring-framework-reference/htmlsingle/#integration-testing%23_top)
    and Spring Boot Test (utilities and integration test support for Spring Boot applications)
    to your application, as shown in Figure [6-5](#A436970_1_En_6_Chapter.html#Fig5).


    ![A436970_1_En_6_Fig5_HTML.jpg](A436970_1_En_6_Fig5_HTML.jpg)


    Figure 6-5. JAR in classpath


    ### Annotations in Spring Testing


    The Spring Framework provides different annotations that developers can use to
    perform unit and integration testing.


    Let’s examine typical test cases to understand the `spring-test` module and annotations
    provided by the Spring Framework. Listing [6-17](#A436970_1_En_6_Chapter.html#Par91)
    shows an example of Spring Test built using Spring Boot Test.


    ```

    package com.apress.ravi.chapter6.UserRegistrationSystem;

    import org.junit.After;

    import org.junit.Before;

    import org.junit.Test;

    import org.junit.runner.RunWith;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.test.context.junit4.SpringRunner;

    @RunWith(SpringRunner.class)

    @SpringBootTest(classes = UserRegistrationSystemApplication.class,

    webEnvironment = WebEnvironment.RANDOM_PORT)

    public class UserRegistrationSystemApplicationTests {

    @Before

    public void setup() {

    }

    @Test

    public void testFunction() {

    }

    @After

    public void teardown() {

    }

    }

    ```


    Listing 6-17. Unit Testing Using Spring Boot Test


    Listing [6-17](#A436970_1_En_6_Chapter.html#Par91) contains three methods: `setup`,
    `testFunction`, and `teardown`. Each method is annotated with the JUnit annotation.


    - `@RunWith(SpringRunner.class)`: The `@RunWith(SpringRunner.class)` annotation
    instructs JUnit to use the `SpringJUnit4ClassRunner` class to run the test case.
    The `SpringRunner` class extends the `SpringJUnit4ClassRunner` class. The `@RunWith`
    annotation is a JUnit annotation; it executes the tests in a class annotated with
    the `@RunWith` annotation or extends another class annotated with the `@RunWith`
    annotation. This means the annotated test class will not be executed by the built-in
    API in the JUnit framework. Rather, it will use `SpringJUnit4ClassRunner` for
    running the test cases within the `SpringApplicationContext` environment.

    - `@SpringBootTest`: Spring Boot provides the `@SpringBootTest` annotation to
    bootstrap with Spring Boot’s support; it is an alternative to the standard Spring
    Test `@ContextConfiguration` annotation when you need to have Spring Boot features.
    The `@ContextConfiguration` annotation is used to test the application context
    for the test class. It caches `ApplicationContext` and puts it in static memory
    for the entire duration of the test or test suite, and the entire test executes
    in the same JVM because `ApplicationContext` is stored in the static memory.

    - `webEnvironment`: The `webEnvironment` attribute of `@SpringBootTest` configures
    the web environment for the test. It lets the developer test with a mock servlet
    environment or with a real HTTP server running on either a `DEFINED_PORT` or `RANDOM_PORT`.

    - `classes`: You can use the `classes` attribute of `@SpringBootTest` to load
    a specific configuration. By default, it will search for the `@SpringBootApplication`
    class to load `@Configuration`.'
