    with the `@Before` annotation to perform the initialization of an instance member
    variable, and it instructs JUnit to run this setup method prior to any test method
    execution in the `SimpleCalculatorTests` class. The teardown method is annotated
    with the `@After` annotation and instructs JUnit to run the teardown method to
    perform cleanup after any test method execution in the `SimpleCalculatorTests`
    class.


    The `verifyAdd` method is annotated with the `@Test` annotation to denotate `verifyAdd`
    as a JUnit test method. The `verifyAdd` method contains code that ensures that
