    *   Angular JS and (Twitter) Bootstrap are included at the bottom of the `<body>`
    tag, as shown in the previous code, so that the browser can process the entire
    HTML before it gets processed.

    *   You have also included a separate `app.js`, which is where you will be defining
    the application behavior.


    #### Create the View Pages


    Let’s create four view pages in the template folder inside the `src/main/resources/static`
    directory.


    *   Home page: `src/main/resources/template/home.html`

    *   Register New User page: `src/main/resources/template/userregistration.html`

    *   List Of User page: `src/main/resources/template/listuser.html`

    *   Update Existing User page: `src/main/resources/template/userupdation.html`


    ##### Home Page


