    ### UserRegistrationSystem 错误处理


    考虑 UserRegistrationSystem 应用程序中的一个场景：客户端尝试获取系统中不存在的用户信息。图 2-8 展示了针对 ID 为 50 的不存在用户发送的
    Postman `GET` 请求。


    ![A436970_1_En_2_Fig8_HTML.jpg](img/A436970_1_En_2_Fig8_HTML.jpg)


    图 2-8.


    针对 ID 为 50 的不存在用户发送的 GET 请求


    如图 2-8 所示，RESTful API 返回了空响应体，因为对于不存在的用户 ID 50，`UserJpaRepository` 的 `findOne`
    方法向 `UserRegistrationRestController` 返回了 `null`。RESTful API 返回了 HTTP 状态码 200 `OK`，而不是应该指示请求用户不存在的状态码
    404。


    为了实现此行为，你需要在 `com.apress.ravi.Rest.UserRegistrationRestController` 的 `getUserById`
    方法中验证用户 `id` 属性。对于不存在的用户，返回包含 `CustomErrorType` 和状态码 `HttpStatus.NOT_FOUND` (404)
    的 `ResponseEntity`。清单 2-13 展示了处理错误所需的代码更新。


    ```

    @GetMapping("/{id}")

    public ResponseEntity getUserById(@PathVariable("id") final Long id) {

    UsersDTO user = userJpaRepository.findById(id);

    if (user == null) {

    return new ResponseEntity(

    new CustomErrorType("User with id "

    + id + " not found"), HttpStatus.NOT_FOUND);

    }

    return new ResponseEntity(user, HttpStatus.OK);

    }

    清单 2-13.

    针对不存在用户的错误处理

    ```


    在清单 2-13 中，你通过在其构造函数中传递自定义错误消息（“User with id 50 not found”）创建了一个 `CustomErrorType`
    类的实例。


    #### 自定义错误响应


    现在，让我们在 `src/main/java` 下的 `com.apress.ravi.Exception` 包中创建 `CustomErrorType`
    类。清单 2-14 展示了 `CustomErrorType` 类所需的代码实现。


    ```

