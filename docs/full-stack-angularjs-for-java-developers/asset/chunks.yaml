    # 2. 为应用程序创建 RESTful 层


    在上一章中，你了解了全栈 Web 开发的宏观视图，还学习了 Spring Boot 的基础知识，并使用 Spring Boot 创建了一个 HelloWorld
    REST 应用程序。在本章中，你将学习以下内容：


    *   REST

    *   构建 RESTful 服务

    *   在 RESTful API 中处理错误


    现在，是时候使用 Spring Boot 开发一个更复杂的 RESTful 应用程序了。要开发任何 RESTful 服务，你必须首先理解 RESTful API
    并知道如何实现它们。因此，我将首先介绍 REST 和 RESTful API 的概念，然后带你逐步了解开发 RESTful API 的代码。


    这应该足以让你开始探索 RESTful API 设计和实现的各种可能性。让我们从 REST 的介绍开始。


    ## REST 简介


    表述性状态转移（REST）是一种架构风格，描述了一个系统如何与另一个系统通信或共享状态。REST 的基本概念是资源，即任何可以被访问或操作的事物。这些状态需要使用通用格式（如
    XML 或 JSON）来表示。对于 Web 应用程序，通常使用 HTTP 来支持 RESTful 架构。换句话说，REST 用于创建暴露 HTTP API
    的 Web 应用程序。


    ### HTTP 方法与 CRUD 操作


    标准的 HTTP 方法，如 `GET`、`POST`、`PUT` 和 `DELETE`，用于访问和操作 REST Web 资源。CRUD 操作有四个基本的持久化功能：创建、读取、更新和删除。表
    2-1 展示了 CRUD 操作与四个 HTTP 动词的映射关系。


    表 2-1.


    CRUD 操作到 HTTP 动词的映射


    | CRUD 操作 | HTTP 方法 | 描述 |

    | --- | --- | --- |

    | 创建 | `POST` | 执行创建操作 |

    | 读取 | `GET` | 执行读取操作 |

    | 更新 | `PUT` | 执行更新操作 |

    | 删除 | `DELETE` | 执行删除操作 |


    ### HTTP 状态码


    有意义的 HTTP 状态码有助于客户端使用你的 RESTful API。表 2-2 列出了一些在调用 RESTful API 时可能作为服务器响应返回的 HTTP
    状态码元素。


    表 2-2.


    HTTP 状态码


    | 代码 | 消息 | 描述 |

    | --- | --- | --- |

    | 200 | `OK` | 请求已成功（这是成功 HTTP 请求的标准响应）。 |

    | 201 | `Created` | 请求已完成，并成功创建了一个新资源。 |

    | 204 | `Not Content` | 请求已成功处理，但未返回任何内容。 |

    | 400 | `Bad Request` | 由于语法错误，请求无法完成。 |

    | 401 | `Unauthorized` | 请求需要用户授权。 |

    | 403 | `Forbidden` | 服务器拒绝完成请求。 |

    | 404 | `Not Found` | 找不到请求的资源。 |

    | 409 | `Conflict` | 由于资源冲突，请求无法完成。 |


    请参考附录 A 了解一些可用于访问 RESTful 应用程序以测试 RESTful API 的工具。在本书中，我将使用 Chrome 的 Postman 作为
    REST 客户端。


    ## 构建 RESTful 服务：UserRegistrationSystem


    在本章中，你将构建一个名为 UserRegistrationSystem 的 RESTful 应用程序，该程序提供用于用户注册的 REST 端点。在本书中，我将此应用程序称为基础应用程序。


    ### 介绍 UserRegistrationSystem


    UserRegistrationSystem 可以理解为一个软件即服务（SaaS）提供商，它允许用户执行 CRUD 操作，例如创建新用户、获取所有用户列表、获取单个用户、更新用户和删除用户。


    UserRegistrationSystem 将由一个 REST API 层和一个存储库层构成，并有一个贯穿这两层的领域层，从而实现关注点分离。REST API
    层负责处理客户端请求、验证客户端输入、与存储库层（或服务层）交互以及生成响应。


    领域层包含具有业务数据的领域对象。存储库层与数据库交互并支持 CRUD 操作。你将通过理解以下需求来开始开发你的 RESTful 服务：


    *   消费者通过创建新用户来注册自己。

    *   可以获取用户列表。

    *   可以获取单个用户的详细信息。

    *   用户详细信息可以在以后更新。

    *   可以在需要时删除用户。


    ### 识别 REST 端点


    URI 端点用于标识 REST 资源。你为 UserRegistrationSystem REST API 端点选择的名称应对消费者具有明确定义的含义。要为服务设计端点，你应该遵循软件行业中广泛使用的一些最佳实践和约定。


    *   为 RESTful API 使用基础 URI 以提供入口点。

    *   使用复数名词命名资源端点。

    *   使用 URI 层次结构来表示相关资源。


    UserRegistrationSystem 应用程序将有一个 `User` 资源。可以使用 `GET`、`POST`、`PUT` 和 `DELETE` HTTP
    方法来访问此 `User` 资源。表 2-3 列出了你将为此应用程序创建的 REST 端点。


    表 2-3.


    用户注册的 REST 端点


    | HTTP 方法 | REST 端点 | 描述 |

    | --- | --- | --- |

    | `GET` | `/api/user/` | 返回用户列表 |

    | `GET` | `/api/user/{id}` | 返回给定 `user {id}` 的用户详细信息 |

    | `POST` | `/api/user/` | 从 `POST` 数据创建新用户 |

    | `PUT` | `/api/user/{id}` | 更新给定 `User {id}` 的详细信息 |

    | `DELETE` | `/api/user` | 删除给定 `user {id}` 的用户 |


    下一步是定义资源表示和表示格式。REST 通常支持多种格式，例如 HTML、JSON 和 XML。在本章及本书的其余部分，JSON 将是 API 操作的首选格式。


    ### JSON 格式


    JavaScript 对象表示法（JSON）是一种在客户端和服务器之间存储和交换数据的语法。JSON 对象是一种键值数据格式，其中每个键值对由一个用双引号括起来的键、后跟一个冒号（`:`）、再后跟一个值组成。JSON
    对象用花括号（`{}`）括起来，每个键值之间用逗号（`,`）分隔。清单 2-1 显示了一个 `User` JSON 对象的示例。


    ```

    {

    "id": 1,

    "name":"Ravi Kant Soni",

    "address":"Lashkariganj, Sasaram, Rohtas, Bihar, pin-821115",

    "email":"ravikantsoni.author@gmail.com"

    }

    清单 2-1.

    User JSON 对象

    ```


    如你所见，`User` 资源具有名称、地址和电子邮件作为键，而 `id` 属性则唯一标识该用户。


    ### 创建 UserRegistrationSystem 应用程序


    你将通过使用 Spring Initializr 生成一个 Spring Boot 应用程序来创建 UserRegistrationSystem，如图 2-1
    所示。选择 Web、JPA 和 H2 作为依赖项。默认情况下，Spring Boot 应用程序在端口 8080 上运行。


    ![A436970_1_En_2_Fig1_HTML.jpg](img/A436970_1_En_2_Fig1_HTML.jpg)


    图 2-1.


    使用 Spring Initializr 创建 UserRegistrationSystem

