    ### Basic Authentication with RestTemplate


    So far you have successfully created a REST client for your UserRegistrationSystem
    application.


    In Chapter [4](#A436970_1_En_4_Chapter.html), you secured your REST APIs, and
    any communication required Basic Authentication. Without that, the program would
    raise an `HttpClientErrorException` with a status code of 401.


    To interact with a secure API, you need to programmatically Base64-encode the
    user’s credentials and also construct an authorization request header by prefixing
    `Basic` to the encoded value. You will create a class called `UserRegistrationClientBasicAuth`
    under the package `com.apress.ravi.chapter` [`6`](#A436970_1_En_6_Chapter.html)
    `.client`, as shown in Listing [6-13](#A436970_1_En_6_Chapter.html#Par50).


    ```

    package com.apress.ravi.chapter6.client;

    import org.apache.tomcat.util.codec.binary.Base64;

    import org.springframework.http.HttpEntity;

    import org.springframework.http.HttpHeaders;

    import org.springframework.http.HttpMethod;

    import org.springframework.web.client.RestTemplate;

    public class UserRegistrationClientBasicAuth {

    private static final String securityUserName = "admin";

    private static final String securityUserPassword = "password";

    private static final String USER_REGISTRATION_BASE_URL =

    "http://localhost:8080/api/user/";

    private static RestTemplate restTemplate = new RestTemplate();

    public void deleteUserById(Long userId) {

    String userCredential =

    securityUserName + ":" + securityUserPassword;

    byte[] base64UserCredentialData =

    Base64.encodeBase64(userCredential.getBytes());

    HttpHeaders authenticationHeaders = new HttpHeaders();

    authenticationHeaders.set("Authorization",

    "Basic " + new String(base64UserCredentialData));

    HttpEntity httpEntity =

    new HttpEntity(authenticationHeaders);

    restTemplate.exchange(USER_REGISTRATION_BASE_URL + "/{id}",

    HttpMethod.DELETE, httpEntity, Void.class, userId);

    }

    }

    Listing 6-13.

    UserRegistrationClient with BasicAuth

    ```


    In Listing [6-13](#A436970_1_En_6_Chapter.html#Par50), you have concatenated `securityUserName`
    and `securityUserPassword`, and then Base64 encodes this user credential and creates
    `authenticationHeaders` by prefixing `Basic` to this encoded value. You also created
    an instance of `HttpEntity` of type `Void` by passing `authenticationHeaders`
    to its constructor. Finally, you called `RestTemplate`’s exchange method to perform
    an HTTP `DELETE` operation with a `responseType` of `Void`.


    ## Testing RESTful Services Using the Spring Test Framework


    In this section, you will perform unit and end-to-end testing of the RESTful services
    developed in Chapter [2](#A436970_1_En_2_Chapter.html). You will focus on two
    flavors of testing: unit testing and integration testing. Unit testing is used
    to verify an isolated unit of code. Integration testing is used to focus on interaction
    between previously tested code/units.


    ### What Is Testing?


    Testing is a crucial part of the software development life cycle; it is the process
    that ensures the quality and performance of the software, without which the software
    development could be completed.


    Unit testing means testing each component of an application independently or separately,
    whereas integration testing helps in ensuring that multiple components in a system
    are working well.


    It is a good practice to create unit test in a separate source folder such as
    `src/test/java` or in a separate project. What should be tested is a hot topic
    where some developers believe that every statement in the code should be tested.


    You can do testing either automatically or manually. The benefits of automated
    testing are that it runs continuously and repeatedly at different phases of software
    development process, which is highly recommended when you follow the agile development
    process. Since the Spring Framework is agile in nature, it supports this kind
    of process.


    Let’s discuss a popular Java testing framework, JUnit, and the basic techniques
    of testing with it.


    ### Testing Using JUnit4


    JUnit4 ( [`http://junit.org/`](http://junit.org/) ) is a popular unit testing
    framework on the Java platform. It provides the `@Test` annotation to annotate
    a method that needs to be tested. A test method inside the `Test` class needs
    to be annotated with the `@org.junit.Test` annotation. JUnit frameworks provide
    different annotations and assert methods to perform unit testing.'
