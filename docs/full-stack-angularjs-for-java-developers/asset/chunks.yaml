    You also need to update your existing Spring Security configuration file `com.apress.ravi.Security.SpringSecurityConfiguration_InMemory.java`,
    as shown in Listing [5-10](#A436970_1_En_5_Chapter.html#Par54).


    ```

    package com.apress.ravi.Security;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.autoconfigure.security.SecurityProperties;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.core.annotation.Order;

    import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

    import org.springframework.security.config.annotation.web.builders.HttpSecurity;

    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

    import org.springframework.security.web.csrf.CookieCsrfTokenRepository;

    @Configuration

    @Order(SecurityProperties.ACCESS_OVERRIDE_ORDER)

    public class SpringSecurityConfiguration_InMemory

    extends WebSecurityConfigurerAdapter {

    @Autowired

    protected void configureGlobal(AuthenticationManagerBuilder auth)

    throws Exception {

    auth.inMemoryAuthentication().

    withUser("user").password("password")

    .roles("USER");

    auth.inMemoryAuthentication()

    .withUser("admin").password("password")

    .roles("USER", "ADMIN");

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .httpBasic()

    .realmName("User Registration System")

    .and()

    .authorizeRequests()

    .antMatchers("/login/login.html", "/template/home.html", "/").permitAll()

    .anyRequest().authenticated()

    .and()

    .csrf()

    .csrfTokenRepository(CookieCsrfTokenRepository.withHttpOnlyFalse());

    }

    }

    Listing 5-10.

    SpringSecurityConfiguration_InMemory.java

    ```


    In Listing [5-10](#A436970_1_En_5_Chapter.html#Par54), you updated your existing
    `configure` method to handle the login request. You allowed anonymous access to
    the static resources such as `/login/login.html`, `/template/home.html`, and `/`,
    because these HTML resources need to be available to anonymous users.


    Spring Security provides a special `CsrfTokenRepository` to send a cookie. When
    you start with a clean browser (Ctrl+F5 or incognito in Chrome), the first request
    to the server has no cookies, but the server sends back `Set-Cookie` for `JSESSIONID`
    (the regular `HttpSession`) and `X-XSRF-TOKEN`, which are the CRSF cookies that
    you set up in Listing [5-10](#A436970_1_En_5_Chapter.html#Par54). Subsequent requests
    will have these cookies, which are important: the Spring Security application
    doesn’t work without them, and they are providing some really basic security features
    (authentication and CSRF protection). When you log out, the values of the cookies
    change. Spring Security expects the token sent to it in a header called `X-CSRF`.
    From the initial request that loads the home page, the value of the CSRF token
    was available in the `HttpRequest` attributes on the server side. Angular has
    built-in support for [CSRF](https://docs.angularjs.org/api/ng/service/''http)
    (which it calls XSRF) based on cookies. Angular wants the cookie name to be `XSRF-TOKEN`,
    and the best part of Spring Security is that it provides it as a request attribute
    by default.


