- fmt: '### Updating `controller.js` for the Login and Logout Authentication Process


    To support the login and logout authentication process, you need to add some more
    features. You need to add three new controllers: `homeController`, `loginController`,
    and `logoutController`. You add these to the existing `UserRegistrationSystem`
    application in the `src/main/resources/static/js/controller.js` file, as shown
    in Listing [5-8](#A436970_1_En_5_Chapter.html#Par43).


    ```

    app.controller(''homeController'', function(''rootScope, ''scope,

    ''http, ''location, ''route){

    if (''rootScope.authenticated) {

    ''location.path("/");

    ''scope.loginerror = false;

    } else {

    ''location.path("/login");

    ''scope.loginerror = true;

    }

    });

    app.controller(''loginController'', function(''rootScope, ''scope,

    ''http, ''location, ''route){

    ''scope.credentials = {};

    ''scope.resetForm = function() {

    ''scope.credentials = null;

    }

    var authenticate = function(credentials, callback) {

    var headers = ''scope.credentials ? {

    authorization : "Basic "

    + btoa(''scope.credentials.username + ":"

    + ''scope.credentials.password)

    } : {};

    ''http.get(''user'', {

    headers : headers

    }).then(function(response) {

    if (response.data.name) {

    ''rootScope.authenticated = true;

    } else {

    ''rootScope.authenticated = false;

    }

    callback && callback();

    }, function() {

    ''rootScope.authenticated = false;

    callback && callback();

    });

    }

    authenticate();

    ''scope.loginUser = function() {

    authenticate(''scope.credentials, function() {

    if (''rootScope.authenticated) {

    ''location.path("/");

    ''scope.loginerror = false;

    } else {

    ''location.path("/login");

    ''scope.loginerror = true;

    }

    });

    };

    });

    app.controller(''logoutController'', function(''rootScope, ''scope,

    ''http, ''location, ''route){

    ''http.post(''logout'', {}).finally(function() {

    ''rootScope.authenticated = false;

    ''location.path("/");

    });

    });

    Listing 5-8.

    src/main/resources/static/js/controller.js

    ```


    As shown in Listing [5-8](#A436970_1_En_5_Chapter.html#Par43), you created new
    controllers named `homeController`, `loginController`, and `logoutController`.
    The `homeController` controller checks whether `authenticated` inside `''rootScope`
    is true and then sets `''location.path` with `/` and `loginerror` in `''scope`
    to false, or it sets `''location.path` with `/login` and `loginerror` in `''scope`
    to `true`.


    The `loginController` controller will be executed when the login page loads. This
    controller starts with initializing the `credentials` object, and then it defines
    the functions: the `resetForm()` method that resets the input box for the username
    and password with a null value, the `authenticate()` function (a local helper
    function) that loads a `user` resource from the back end, and the function `loginUser()`
    that you need in the form.


    The local helper function `authenticate()` is called when the controller is loaded
    to see whether the user is actually already authenticated, and you need this function
    just to make a remote call because the actual authentication is done by the server.
    This function also sets an application-wide flag called `authenticated` that you
    used in the `index.html` page to show/hide elements and control which parts of
    the page are rendered. You achieved this application-wide flag using [`''rootScope`](https://docs.angularjs.org/api/ng/service/''rootScope)
    because it’s convenient and easy to follow, and you need to share the `authenticated`
    flag between different controllers.


    This `authenticate()` method makes a `GET` call to a relative resource called
    `/user`. While calling from the `loginUser()` function, the `authenticate()` function
    adds the Base64-encoded credentials in the request headers, so on the server it
    does an authentication and accepts a cookie in return. The `loginUser()` function
    also sets a local `''scope.loginerror` flag accordingly when it gets the result
    of the authentication that is being used to control the display of the error message
    in the login page.


    If the user is authenticated, then you show a Logout button on each web page.
    Clicking the Logout button will let `logoutController` to be executed. The `logoutController`
    controller sends an HTTP `POST` to `/logout`, which you do not need to implement
    on the server because it is added for you already by Spring Security. To add more
    control over the default behavior of the logout process provided by Spring Security,
    you could use the `HttpSecurity` callback’s `inSpringSecurityConfiguration` in
    `Memory.java` to, for instance, execute some business logic after logout.


    ### Updating the Back-End Code


    You also need to update your back-end code to support the login and logout authentication
    process in your `UserRegistrationSystem` application.


    #### Creating a New RESTful Endpoint to Get the Currently Authenticated User


    As you saw in Listing [5-8](#A436970_1_En_5_Chapter.html#Par43), the `authenticate()`
    function makes a `GET` request to the resource `/user` to get the currently authenticated
    user. So, to service the `authenticate()` function, you have to add a new REST
    endpoint in your `UserRegistrationSystem` application. Let’s create the `ServiceAuthenticate.java`
    class inside the package `com.apress.ravi.Rest` under the `src/main/java` folder,
    as shown in Listing [5-9](#A436970_1_En_5_Chapter.html#Par51).


    ```

    package com.apress.ravi.Rest;

    import java.security.Principal;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class ServiceAuthenticate {

    @RequestMapping("/user")

    public Principal user(Principal user) {

    return user;

    }

    }

    Listing 5-9.

    com.apress.ravi.Rest.ServiceAuthenticate.java

    ```


    If the `/user` resource is reachable, then it will return the authenticated user.'
