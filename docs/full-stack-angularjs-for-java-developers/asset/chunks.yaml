  trans: '

    #### 从 Google CDN 引入 Angular 脚本


    以下介绍如何从 Google CDN 引入 Angular 脚本。


    要快速上手 AngularJS，请将 HTML 的 `<script>` 标签指向一个 Google CDN URL。Angular 脚本 URL 有两种类型，一种用于生产环境，一种用于开发环境。


    *   `angular.min.js`：这是压缩版本，应在生产环境中使用。

    *   `angular.js`：这是未压缩、人类可读的版本，应在 Web 开发中使用。


    清单 3-1 展示了将代码指向 Google CDN 服务器上 Angular 脚本的压缩版本 1.5.6 的示例。


    ```


    Angular Application


    清单 3-1.

    H2 pom.xml 依赖

    ```


    #### 下载并在本地托管 Angular 文件


    引入 Angular 脚本的另一种方法是下载并在本地托管 Angular 文件。


    希望离线使用 Angular 或希望在自己的服务器上托管 Angular 文件的开发者可以选择此方式。导航至 [`https://code.angularjs.org/`](https://code.angularjs.org/)
    ，从 Angular 版本列表中选择并下载所需版本。或者，您可以从 [`https://angularjs.org/`](https://angularjs.org/)
    下载 Angular 的最新稳定版本。图 3-3 显示了带有下载链接的 AngularJS 页面。


    ![A436970_1_En_3_Fig3_HTML.jpg](img/A436970_1_En_3_Fig3_HTML.jpg)


    图 3-3.


    AngularJS 页面


    点击“Download AngularJS”会弹出一个下载 AngularJS 的弹窗，如图 3-4 所示。


    ![A436970_1_En_3_Fig4_HTML.jpg](img/A436970_1_En_3_Fig4_HTML.jpg)


    图 3-4.


    下载 AngularJS 的弹窗


    #### 在 pom.xml 中提供依赖信息


    除了手动下载 AngularJS 库，您还可以在开发 Spring Boot 应用时，在 `pom.xml` 中为 AngularJS 提供依赖信息，这样
    AngularJS 将会被自动下载到库中。清单 3-2 展示了 AngularJS 和 Bootstrap CSS 的依赖信息。


    ```

    org.webjars

    angularjs

    1.4.9

    runtime


    org.webjars

    bootstrap

    3.3.6

    runtime


    清单 3-2.

    在 pom.xml 中添加 AngularJS 和 Bootstrap 的依赖

    ```


    ### 将 Twitter Bootstrap 添加到 Spring Boot


    Twitter Bootstrap 是一个前端框架，旨在让响应式设计变得更加容易。Bootstrap CSS 框架可用于设置网站内容的样式。您可以创建自己的
    CSS 样式来让网站看起来很棒，但 Bootstrap 提供了一套优秀的 CSS 样式，能让您设计出外观极佳的内容布局。在使用 AngularJS 时，并非必须使用
    Bootstrap，AngularJS 和 Bootstrap 之间也没有内在联系，因为它们是两个不同的包。


    要使用 Bootstrap CSS 框架中的 CSS，您可以在开发 Spring Boot 应用时，在 `pom.xml` 中定义一个依赖，如清单 3-2
    所示，这样它就会被自动下载到库文件夹中。此外，也可以从 [`https://getbootstrap.com/`](https://getbootstrap.com/)
    下载 Bootstrap 归档文件，其中也包含了 CSS 和 JavaScript 文件。


    ### 开发单页应用


    单页应用是指只有一个入口 HTML 页面（可能是 `index.html`）的应用；所有应用内容都动态地添加和移除到这个页面中。在运行时，基于某些事件，附加到标签上的现有内容会被移除，然后动态内容会被附加到同一个标签上。


    单页应用的入口点可以在一个包含 `<div ng-view></div>` 标签的 `index.html` 中看到，如清单 3-3 所示，所有动态内容都被插入到
    `index.html` 中。因此，用户无需等待加载新页面，新内容会在极短的时间内动态显示出来。


    ```


    ...


    ...


    ...


    清单 3-3.

    开发 HTML 页面：单页应用的入口点

    ```


    在清单 3-3 中，您在开发 HTML 页面时使用了以下良好实践：


    *   将 `<script>` 标签放在页面底部，以提高应用加载速度，因为 Angular 脚本的加载不会影响 HTML 的加载。

    *   将 `ng-app` 放在应用的根元素上，通常放在 `<html>` 标签上，如果您希望 Angular 自动引导您的应用。


    ### 引导应用


    引导 AngularJS 是指通过向 HTML 中的某个元素添加 `ng-app` 来初始化或启动 Angular 应用的过程，如清单 3-4 所示，这发生在应用首次启动时。


    ```

    ...


    清单 3-4.

    通过在 HTML 页面中添加 ng-app 来引导 AngularJS

    ```


    这也被称为自动初始化。因此，当 AngularJS 在分析 `index.html` 文件后找到 `ng-app` 指令时，它会加载相关的模块，然后编译 DOM。


    AngularJS 应用 `UserRegistrationSystem` 在 `app.js` 中被定义为 AngularJS 模块（`angular.module`），`app.js`
    是应用的入口点。


    ```

    var app = angular.module(''userregistrationsystem'', [''ngRoute'', ''ngResource'']);

    ```


    `app.js` 文件中的变量 `app` 可以命名为任何名称。


    ### 依赖注入


    依赖注入是一种设计模式，用于在应用中定义依赖关系，将其作为配置的一部分，而不是在组件内部硬编码。DI 帮助您避免手动创建应用依赖，并使得在需要时可以更改它们。AngularJS
    在应用首次启动时使用 DI 来加载模块依赖。


    DI 的好处如下：


    *   它将创建依赖的过程与使用依赖的过程分离开来。

    *   使用者会感觉创建依赖的过程是由其他人处理的；用户只需关心如何使用依赖。

    *   它提供了在需要时更改依赖的功能。

    *   它使应用更易于测试。


    如您所见，`app.js` 中定义了两个依赖，供 `userregistrationsystem` 在启动时使用，如下所示：


    ```

    var app = angular.module(''userregistrationsystem'', [''ngRoute'', ''ngResource'']);

    ```


    上述代码中的两个依赖是在模块定义的一个数组中定义的。


    *   `ngRoute`：第一个依赖是 AngularJS 的 `ngRoute` 模块，它为应用提供路由功能。`ngRoute` 模块用于将 URL 深度链接到控制器和视图（HTML
    片段）。

    *   `ngResource`：第二个依赖是 AngularJS 的 `ngResource` 模块，它提供与 RESTful 服务的交互支持。

    '
- fmt: '### AngularJS Routes


    AngularJS routes are configured using the `$routeProvider` API. Routes are dependent
    on the `ngRoute` module, which is why its dependency is defined in an array in
    the module definition.


    Listing [3-5](#A436970_1_En_3_Chapter.html#Par82) shows the code from `app.js`.
    You will define four routes in your AngularJS application.


    - The first is `/list-all-users`.

    - The second one is `/register-new-user`.

    - The third one is `/update-user/:id`.

    - The fourth one is different from the other three.


    ```

    app.config(function($routeProvider) {

    $routeProvider

    .when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    }).when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    }).when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'' ,

    controller : ''usersDetailsController''

    }).otherwise({

    redirectTo : ''/home'',

    templateUrl : ''/template/home.html'',

    });

    });

    Listing 3-5.

    Defining Routes in AngularJS Application

    ```


    The four defined routes in Listing [3-5](#A436970_1_En_3_Chapter.html#Par82) map
    directly to URLs defined in the application.


    When the user clicks the link in the application specified at `http://localhost:8080/#/list-all-users`,
    the `/list-all-users` route will be followed, and the content associated with
    the `/list-all-users` URL will be displayed.


    Similarly, when the user clicks the link `http://localhost:8080/#/register-new-user`,
    the `/register-new-user` route will be followed, and the content associated with
    `/register-new-user` URL will be displayed.


    When the user clicks the link `http://localhost:8080/#/update-user/{id}`, the
    `/update-user/:id` route will be followed, and the content associated with the
    `/update-user/:id` URL will be displayed.


    Also, if the user accesses any URL other than these three, the `/home` route will
    be followed, and the content associated with the `/home` URL will be displayed.


    ### AngularJS Templates


    AngularJS templates, also known as HTML partials, are HTML code that are bound
    to the `<div ng-view></div>` tag shown in the `index.html` file. If you look at
    the code from the `app.js` file, you can see that different `templateUrl` values
    are defined for different routes, as shown in Listing [3-6](#A436970_1_En_3_Chapter.html#Par89).


    ```

    $routeProvider

    .when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    }).when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    }).when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'' ,

    controller : ''usersDetailsController''

    }).otherwise({

    redirectTo : ''/home'',

    templateUrl : ''/template/home.html'',

    });

    Listing 3-6.

    Defining templateUrl for Routes

    ```


    As shown in Listing [3-6](#A436970_1_En_3_Chapter.html#Par89), you have defined
    four different partials or templates. The `listuser.html`, `userregistration.html`,
    `userupdation.html`, and `home.html` pages are four different partials or templates,
    which contain HTML code and AngularJS’s built-in template language to display
    dynamic data in your template.


    ### Implementing the Model, View, and Controller in Your Single-Page Application


    Spring Boot, by default, will automatically serve static content from the root
    of `ServletContext` or from the following directories:


    - `classpath:/META-INF/resources/`

    - `classpath:/resources/`

    - `classpath:/static/`

    - `classpath:/public/`


    In your project, you will be creating the static content under the `classpath:/resources/`
    directory. The final directory structure will look like Figure [3-5](#A436970_1_En_3_Chapter.html#Fig5).


    ![A436970_1_En_3_Fig5_HTML.jpg](A436970_1_En_3_Fig5_HTML.jpg)


    Figure 3-5. Directory structure of SPA in the UserRegistrationSystem application


    Let’s implement the model, view, and controller in your AngularJS application.


    #### Create the Home/Application Page


    The core of a single-page application is the static page `index.html`, as shown
    in Listing [3-7](#A436970_1_En_3_Chapter.html#Par99), so let’s create it in the
    `src/main/resources/static` (or `src/main/resources/public`) directory. This `index.html`
    page will contain some front-end code to display links on the web page, which
    will be handled by AngularJS. This `src/main/resources/static/index.html` page
    also contains some `<script>` tags that include all the necessary AngularJS files.


    ```

    Full Stack Development


    User Registration System


    Home


    Register New User


    List All Users


    Listing 3-7.

    src/main/resources/static/index.html

    ```


    This `index.html` page will display three links: Home, Register New User, and
    List All Users.


    Let’s look at the previous code in more detail. The AngularJS library enables
    several custom attributes for use with standard HTML tags.


    - The `<html>` tag in the `index.html` page has the `ng-app="userregistrationsystem"`
    that tells you to define a JavaScript module that Angular will recognize as an
    application called `userregistrationsystem`.

    - All the CSS classes are from (Twitter) Bootstrap to make the page look pretty.

    - Angular JS and (Twitter) Bootstrap are included at the bottom of the `<body>`
    tag, as shown in the previous code, so that the browser can process the entire
    HTML before it gets processed.

    - You have also included a separate `app.js`, which is where you will be defining
    the application behavior.


