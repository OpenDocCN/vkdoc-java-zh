  trans: '

    # 5. 使用 AngularJS 消费安全的 RESTful 服务


    在第 2 章中，你使用 Spring Boot 创建了一个名为 UserRegistrationSystem 的 REST 应用程序，并执行了 CRUD 操作。在第
    3 章中，你使用 AngularJS 创建了一个单页应用（SPA）并消费了 REST 端点。在第 4 章中，你使用 Spring Security 保护了你的
    REST 端点。


    在本章中，我将向你展示 Spring Boot、Spring Security 和 AngularJS 如何协同工作，以提供愉快且安全的用户体验。你将使用
    AngularJS 消费安全的 RESTful 服务。首先，你将在 AngularJS 中为每个请求发送一个授权标头。然后，你将创建一个登录页面，并更新 Spring
    Security 配置以支持登录和注销的认证流程。


    ## 在 Spring Security 中启用基本认证


    在第 4 章中，你仅通过使用 Spring Boot Starter Security 依赖更新 Maven `pom.xml` 文件，并添加带有内存认证配置的
    Spring Security 配置文件，就使用基本认证保护了 UserRegistrationSystem 应用程序的 REST 端点，如清单 5-1 所示。


    ```

    @Configuration

    @Order(SecurityProperties.ACCESS_OVERRIDE_ORDER)

    public class SpringSecurityConfiguration_InMemory

    extends WebSecurityConfigurerAdapter {

    @Autowired

    protected void configureGlobal(AuthenticationManagerBuilder auth)

    throws Exception {

    auth.inMemoryAuthentication()

    .withUser("admin").password("password")

    .roles("USER", "ADMIN");

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .httpBasic()

    .realmName("User Registration System")

    .and()

    .authorizeRequests()

    .antMatchers(HttpMethod.GET, "/api/user/")

    .hasRole("USER")

    .antMatchers(HttpMethod.POST, "/api/user/")

    .hasRole("USER")

    .antMatchers(HttpMethod.PUT, "/api/user/**")

    .hasRole("USER")

    .antMatchers(HttpMethod.DELETE, "/api/user/**")

    .hasRole("ADMIN")

    .and()

    .csrf()

    .disable();

    }

    }

    清单 5-1.

    内存认证配置

    ```


    在第 3 章中，你将 UserRegistrationSystem 开发为一个使用 AngularJS 消费 REST 端点的 SPA。有了 Spring
    Security 配置，现在当你尝试使用 URL `http://localhost:8080/#/list-all-users` 在浏览器中访问你的页面时，会出现一个“需要身份验证”的弹出窗口，你需要输入在安全配置文件中配置的用户名和密码才能访问
    `/list-all-users` 页面，如图 5-1 所示。


    ![A436970_1_En_5_Fig1_HTML.jpg](img/A436970_1_En_5_Fig1_HTML.jpg)


    图 5-1.


    在浏览器中访问页面需要身份验证


    问题在于，每次你打开浏览器并访问网页时，浏览器都会弹出一个要求输入用户名和密码的窗口。你可以通过在 AngularJS 中为每个请求发送一个授权标头来解决此问题。


    ## 在 AngularJS 中为每个请求发送授权标头


    [基本认证](https://en.wikipedia.org/wiki/Basic_access_authentication)允许客户端在每个 HTTP
    请求中使用授权标头发送其 Base64 编码的凭据。这意味着每个请求都独立于其他请求，服务器不会为客户端维护任何状态信息。


    由于你必须为每个请求发送一个认证标头，因此使用 HTTP 拦截器来处理它比在所有 `''http` 方法中手动指定认证标头更好。


    ### 在 AngularJS 中添加 HTTP 拦截器


    当请求/响应通过 HTTP 调用进行通信，并且你想要注入一些自定义逻辑时，HTTP 拦截器就派上用场了。HTTP 拦截器始终执行自定义逻辑，用于认证、授权、管理会话状态、日志记录、修改响应、重写
    URL、处理错误、缓存、添加自定义标头、在请求/响应中添加时间戳，以及在 HTTP 调用前后加密和解密请求和响应信息，如图 5-2 所示。


    ![A436970_1_En_5_Fig2_HTML.jpg](img/A436970_1_En_5_Fig2_HTML.jpg)


    图 5-2.


    HTTP 拦截器


    AngularJS 支持四种 HTTP 拦截器：`request`、`response`、`requestError` 和 `responseError`。


    *   `request` 拦截器在 `''http` 将请求发送到服务器之前被调用。请求函数将配置对象作为输入参数，并在向该对象添加、修改或删除数据后返回一个配置对象。

    *   `response` 拦截器在 `''http` 从服务器接收响应后被调用。响应函数将响应对象作为参数，并在返回响应对象之前修改响应数据或添加一组新值，调用另一个模块或服务调用。

    *   当请求拦截器抛出任何错误时，会调用 `requestError` 拦截器。

    *   当对服务器的任何调用失败，并且应用程序需要根据不同的 HTTP 状态码触发某些操作时，会调用 `responseError` 拦截器。


    让我们在 UserRegistrationSystem 应用程序中实现 HTTP 拦截器。


    #### authInterceptor.js


    在 `authInterceptor.js` 文件中创建一个名为 `AuthInterceptor` 的拦截器，如清单 5-2 所示。


    ```

    app.factory(''AuthInterceptor'', [ function() {

    return {

    ''request'' : function(config) {

    config.headers = config.headers || {};

    var encodedString = btoa("admin:password");

    config.headers.Authorization = ''Basic '' + encodedString;

    return config;

    }

    };

    } ]);

    清单 5-2.

    带有请求函数的 HTTP 拦截器

    ```


    在清单 5-1 中，你配置了用户名为 `admin`、密码为 `password` 的安全认证凭据。此外，你调用了 `btoa()` 函数来从用户凭据中获取
    Base64 编码的字符串。


    你调用了一个请求拦截器函数，该函数将配置对象作为参数。你使用基本认证数据更新了 `config.headers.Authorization`，并返回了这个更新后的配置对象。这足以启用基本认证。你只需要将
    `AuthInterceptor` 拦截器注册到 AngularJS 应用程序中。


    ### 更新 app.js


    要将 `AuthInterceptor` 拦截器注册到 AngularJS 应用程序，你需要更新 `app.js` 文件，如清单 5-3 所示。


    ```

    var app = angular.module(''userregistrationsystem'', [ ''ngRoute'', ''ngResource''
    ]);

    app.config(function(''routeProvider) {

    ''routeProvider.when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    }).when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    }).when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'',

    controller : ''usersDetailsController''

    }).otherwise({

    redirectTo : ''/home'',

    templateUrl : ''/template/home.html'',

    });

    });

    app.config([''''httpProvider'', function(''httpProvider) {

    ''httpProvider.interceptors.push(''AuthInterceptor'');

    }]);

    清单 5-3.

    通过更新 app.js 在应用程序中注册拦截器

    ```


    在清单 5-3 中，你通过使用 push 方法将 `AuthInterceptor` 拦截器（拦截器是服务工厂）添加到 `''httpProvider.interceptors`
    数组中，从而将其注册到 `''httpProvider`。这个服务工厂被调用并返回拦截器。

