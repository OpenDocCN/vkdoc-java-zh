    There was a problem logging in. Please try again.


    Username


    Password


    Reset Form


    Listing 5-7.

    src/main/resources/static/login/login.html

    ```


    As shown in Listing [5-5](#A436970_1_En_5_Chapter.html#Par31), this is a simple
    and standard login form; it contains two fields for entering the username and
    password and two buttons for logging in (submitting the form via `ng-submit`)
    and resetting the form, as shown in Figure [5-5](#A436970_1_En_5_Chapter.html#Fig5).


    ![A436970_1_En_5_Fig5_HTML.jpg](A436970_1_En_5_Fig5_HTML.jpg)


    Figure 5-5. Login form with input boxes and buttons


    The login form control uses `ng-model` to pass data between the HTML (`login.html`)
    and the Angular controller (`controller.js`), and in this case you are using a
    credentials object to hold the username and password. You also added code to show
    an error message when the Angular model contains a `loginerror` value, as shown
    in Figure [5-6](#A436970_1_En_5_Chapter.html#Fig6).


    ![A436970_1_En_5_Fig6_HTML.jpg](A436970_1_En_5_Fig6_HTML.jpg)


    Figure 5-6. Login page with error message


    As per the routes defined in an application, such as `app.js`, you have defined
    a login form that needs to be linked with `loginController`, so let’s update your
    `controller.js` file.'
