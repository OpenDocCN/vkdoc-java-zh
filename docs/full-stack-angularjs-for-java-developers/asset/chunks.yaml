    #### UserDetailsService 实现


    在 Spring Security 中，`UserDetailsService` 用于从后端（例如数据库）返回用户信息，该信息会在身份验证过程中与提交的用户凭据进行比较。清单
    4-9 展示了你的 UserRegistrationSystem 应用程序的 `UserDetailsService` 实现。


    ```

    package com.apress.ravi.Service;

    import java.util.ArrayList;

    import java.util.Collection;

    import java.util.List;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.security.core.GrantedAuthority;

    import org.springframework.security.core.authority.AuthorityUtils;

    import org.springframework.security.core.userdetails.UserDetails;

    import org.springframework.security.core.userdetails.UserDetailsService;

    import org.springframework.security.core.userdetails.UsernameNotFoundException;

    import org.springframework.stereotype.Service;

    import com.apress.ravi.dto.UserInfo;

    import com.apress.ravi.repository.UserInfoJpaRepository;

    @Service

    public class UserInfoDetailsService implements UserDetailsService {

    @Autowired

    private UserInfoJpaRepository userInfoJpaRepository;

    @Override

    public UserDetails loadUserByUsername(String username)

    throws UsernameNotFoundException {

    UserInfo user = userInfoJpaRepository.findByUsername(username);

    if (user == null) {

    throw new UsernameNotFoundException(

    "Opps! user not found with user-name: " + username);

    }

    return new org.springframework.security.core.userdetails.User(

    user.getUsername(), user.getPassword(),

    getAuthorities(user));

    }

    private Collection getAuthorities(UserInfo user) {

    List authorities = new ArrayList();

    authorities = AuthorityUtils.createAuthorityList(user.getRole());

    return authorities;

    }

    }

    清单 4-9.

    UserRegistrationSystem 的 UserDetailsService 实现

    ```


    `UserInfoDetailsService` 类自动装配了 `UserInfoJpaRepository`，以便从数据库中检索 `UserInfo` 详细信息。该类重写了
    `loadUserByUsername` 方法，该方法返回一个 `UserDetails` 类型的实例。此方法首先检查从数据库检索到的用户是否为空，如果为空，则抛出一个带有适当消息的
    `UsernameNotFoundException` 异常。如果检索到的用户不为空，则此方法创建一个 `org.springframework.security.core.userdetails.User`
    实例，并使用从数据库返回的用户数据填充它。

