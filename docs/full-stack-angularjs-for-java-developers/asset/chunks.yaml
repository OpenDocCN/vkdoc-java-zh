    ID 验证，以返回正确的状态码和消息。清单 2-15 展示了更新后的 `UserRegistrationRestController` 类，其中包含了修改后的
    `listAllUsers`、`getUserById`、`createUser`、`updateUser` 和 `deleteUser` 方法。


