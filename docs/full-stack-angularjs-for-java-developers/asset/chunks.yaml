    ### 覆盖 Spring Security 默认值


    通过之前的设置，每次重启 Spring Boot 应用时，你都必须查找生成的默认用户密码，然后复制并粘贴该密码以在访问 RESTful API 时对用户进行身份验证，这几乎不切实际。


    Spring Boot 允许开发者通过在 `application.properties` 文件中指定安全属性来轻松覆盖安全默认值（用户名、密码和角色），该文件位于
