    ### Overriding the Spring Security Defaults


    With the previous setup, every time you restart your Spring Boot application,
    you have to search for the generated default user’s password and then copy and
    paste this generated password to authenticate the user while accessing the RESTful
    API, which is hardly practical.


    Spring Boot allows developers to easily override the security defaults (username,
    password, and role) by specifying security properties in the `application.properties`
    file located in the `src\main\resources\` folder of the `UserRegistrationSystem`
    application, as shown in Figure [4-8](#A436970_1_En_4_Chapter.html#Fig8).


    ![A436970_1_En_4_Fig8_HTML.jpg](A436970_1_En_4_Fig8_HTML.jpg)


    *Figure 4-8. Overriding security properties in the `application.properties` file*


    Restart the `UserRegistrationSystem` application and observe the log in the STS
    console, as shown in Figure [4-6](#A436970_1_En_4_Chapter.html#Fig6). You can
    clearly see that this time the Spring Boot application has not generated any default
    user password.


    Let’s test this by launching Postman and passing the user credentials, as shown
    in Listing [4-4](#A436970_1_En_4_Chapter.html#Par40).


    ```properties

    security.user.name = user

    security.user.password = password

    security.user.role = ADMIN

    ```


    *Listing 4-4. Security Properties*


    While passing the user credentials from Postman in the request header, you can
    click Update Request in Postman to update the authorization value in the HTTP
    request header, as shown in Figure [4-9](#A436970_1_En_4_Chapter.html#Fig9).


    ![A436970_1_En_4_Fig9_HTML.jpg](A436970_1_En_4_Fig9_HTML.jpg)


    *Figure 4-9. Calling the secured REST API with the newly configured username and
    password*


    Up to now you have seen lots of magic happen just by adding the dependency `spring-boot-starter-security`.


    In a real-world use case, it is required that you configure more than one user
    with different credentials and roles to access your application. Also, it is required
    that you customize the users who are authorized to access your REST APIs. To achieve
    this, you need to bring in some Java configuration.


    ## Customizing User Authentication


    Users need to be authenticated and then authorized before being allowed to access
    secured resources. The authentication provider authenticates the user in Spring
    Security, and on successful authentication, the user is able to access secured
    resources from the system.


    Spring Security supports multiple ways to authenticate users such as user authentication
    using in-memory definitions and authentication against a user repository (relational
    database) that is storing user details. Let’s customize user authentication by
    configuring these users and roles:


    *   You will have two roles: `USER` and `ADMIN`.

    *   You will create one `USER` role with the credentials `user`/`password`.

    *   You will also create one `ADMIN` role with the credentials `admin`/`password`.


    In your `UserRegistrationSystem` application, you will provide access for different
    REST endpoints to specific user roles, as shown in Table [4-1](#A436970_1_En_4_Chapter.html#Tab1).


    *Table 4-1. Mapping of APIs to User Role*


    | User Role | HTTP Method | API Endpoints |

    | --- | --- | --- |

    | `USER` | `GET` | `/api/user/` |

    | `USER` | `POST` | `/api/user/` |

    | `USER` | `PUT` | `/api/user/{id}` |

    | `ADMIN` | `DELETE` | `/api/user/{id}` |'
