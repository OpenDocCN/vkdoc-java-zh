    ### 运行应用程序


    让我们重新启动 UserRegistrationSystem 应用程序，并在浏览器中访问 URL `http://localhost:8080/#/list-all-users`。`list-all-users`
    页面将在浏览器中显示，而不会弹出任何身份验证对话框，如图 5-3 所示。


    ![A436970_1_En_5_Fig3_HTML.jpg](img/A436970_1_En_5_Fig3_HTML.jpg)


    图 5-3.


    在浏览器中显示的 list-all-users 页面


    #### 携带基本认证头部的 HTTP 请求：在开发者工具中验证


    您可以验证在请求 URL `http://localhost:8080/#/list-all-users` 时，基本认证头部发送的 HTTP 请求。在浏览器中打开开发者工具（此处为
    Chrome 浏览器），选择“网络”选项卡，然后点击“标头”选项卡，以监控包含授权数据的请求标头，如图 5-4 所示。


    ![A436970_1_En_5_Fig4_HTML.jpg](img/A436970_1_En_5_Fig4_HTML.jpg)


    图 5-4.


    在开发者工具中监控基本认证头部


    到目前为止，您已成功使用拦截器在每个请求中发送了授权头部，并且能够使用受保护的 REST 端点。您在 AngularJS 拦截器中配置了一个用户来执行基本认证。当有多个具有不同角色的用户时，就会出现问题。为了解决这个问题，您需要一个登录页面，在访问任何资源之前，可以输入用户名和密码进行身份验证和授权，并且网页上还需要一个“注销”按钮。


    在下一节中，您将创建一个登录页面，并执行登录和注销的身份验证过程。您将在 UserRegistrationSystem 应用程序中使用基于表单的身份验证，这将比
    HTTP 基本认证提供更大的灵活性。


    ## 登录页面


    在本节中，您将使用 AngularJS 通过登录表单对用户进行身份验证，并获取受保护的资源以在 UI 中渲染 JSON 数据。此登录表单让用户对是否进行身份验证拥有一定的控制权。


    ### 更新 index.html：添加导航到欢迎页面


    正如您在第 3 章中所见，`index.html` 是单页应用的核心，到目前为止您已经拥有一个非常基础的版本。您需要提供更多导航功能，例如登录和注销功能。因此，让我们修改现有的
    `src/main/resources/static/index.html` 文件，如代码清单 5-5 所示。


    ```


    全栈开发


    用户注册系统


    登录


    登录以进入首页


    首页


    注册新用户


    列出所有用户


    注销


    代码清单 5-5.

    更新 src/main/resources/static/index.html

    ```


    如代码清单 5-5 所示，更新后的 `index.html` 与原始版本没有太大区别。您添加了一个新的 `div`，其中包含一个用于登录的锚点标签。并且您添加了一个用于注销的锚点标签。您使用了
    AngularJS 的 `ng-show` 来根据 `authenticated` 的值隐藏/显示页面上的元素。


    ### 更新 app.js：为 Angular 应用程序添加导航


    您现在需要更新 UserRegistrationSystem 应用程序（位于 `src/main/resources/static/js/app.js`），以添加用于登录和注销的新导航功能，如代码清单
    5-6 所示。


    ```

    var app = angular.module(''userregistrationsystem'', [ ''ngRoute'', ''ngResource''
    ]);

    app.config(function(''routeProvider, ''locationProvider) {

    ''routeProvider

    .when(''/'', {

    templateUrl : ''/template/home.html'',

    controller : ''homeController''

    })

    .when(''/list-all-users'', {

    templateUrl : ''/template/listuser.html'',

    controller : ''listUserController''

    })

    .when(''/register-new-user'',{

    templateUrl : ''/template/userregistration.html'',

    controller : ''registerUserController''

    })

    .when(''/update-user/:id'',{

    templateUrl : ''/template/userupdation.html'',

    controller : ''usersDetailsController''

    })

    .when(''/login'',{

    templateUrl : ''/login/login.html'',

    controller : ''loginController''

    })

    .when(''/logout'',{

    templateUrl : ''/login/login.html'',

    controller : ''logoutController''

    })

    .otherwise({

    redirectTo : ''/login''

    });

    });

    app.config([''''httpProvider'', function(''httpProvider) {

    ''httpProvider.defaults.headers.common["X-Requested-With"] = ''XMLHttpRequest'';

    }]);

    代码清单 5-6.

    更新 src/main/resources/static/js/app.js

    ```


    在代码清单 5-4 中，您为路径 `/` 添加了 `homeController` 控制器。您还设置了新的路径，例如 `/login` 和 `/logout`，以及它们的
    `templateUrl` 和 `controller`。


    自定义的 `X-Requested-With` 行是浏览器客户端发送的传统标头。Spring Security 会对此做出响应，不在 401 响应中发送 `WWW-Authenticate`
    标头，因此浏览器不会打开身份验证弹出对话框，这在您的 UserRegistrationSystem 应用程序中是期望的行为，因为您希望控制身份验证过程。


    ### 创建 login.html：登录表单


    让我们创建一个登录表单，该表单位于 `src/main/resources/static/login/login.html`，如代码清单 5-7 所示。


    ```


    登录页面

    输入用户名和密码


    登录时出现问题。请重试。


    用户名


    密码


    重置表单


    代码清单 5-7.

    src/main/resources/static/login/login.html

    ```


    如代码清单 5-5 所示，这是一个简单且标准的登录表单；它包含两个用于输入用户名和密码的字段，以及两个按钮，分别用于登录（通过 `ng-submit` 提交表单）和重置表单，如图
    5-5 所示。


    ![A436970_1_En_5_Fig5_HTML.jpg](img/A436970_1_En_5_Fig5_HTML.jpg)


    图 5-5.


    带有输入框和按钮的登录表单


    登录表单控件使用 `ng-model` 在 HTML（`login.html`）和 Angular 控制器（`controller.js`）之间传递数据，在此示例中，您使用一个
    credentials 对象来保存用户名和密码。您还添加了代码，以便在 Angular 模型包含 `loginerror` 值时显示错误消息，如图 5-6
    所示。


    ![A436970_1_En_5_Fig6_HTML.jpg](img/A436970_1_En_5_Fig6_HTML.jpg)


    图 5-6.


    带有错误消息的登录页面


    根据在应用程序（如 `app.js`）中定义的路由，您已经定义了一个需要与 `loginController` 关联的登录表单，因此让我们更新您的 `controller.js`
    文件。

