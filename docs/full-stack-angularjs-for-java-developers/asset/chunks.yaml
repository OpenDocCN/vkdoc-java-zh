    `endpoints.health.sensitive=false` 来暴露其他信息，例如磁盘空间和数据源，如图 7-10 所示。


    类似地，你可以通过在 `application.properties` 文件中添加以下属性来自定义 `/info` 端点显示的数据：


    ```

