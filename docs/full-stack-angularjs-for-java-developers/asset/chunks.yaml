  trans: "\n### AngularJS 基本组件\n\nAngularJS 允许开发者基于 MVC 模型构建结构化的应用程序，这些应用健壮且易于维护。在实现\
    \ AngularJS 之前，熟悉其各个组件非常重要。\n\n*   **模块**：这是 AngularJS 的组件之一。模块本质上是一个容器，包含服务、控制器、过滤器、指令等。AngularJS\
    \ 中的每个模块都有自己独立的文件夹结构，用于存放控制器、指令等。AngularJS 中的每个视图页面都有一个模块。\n*   **作用域**：AngularJS\
    \ 中的作用域只是用于填充网页视图的数据的 JavaScript 表示。这些数据可以来自任何源，例如数据库或远程 Web 服务器。\n*   **视图**：AngularJS\
    \ 中带有模板和指令的视图是构建呈现给用户的 HTML 视图的其他组件。\n*   **表达式**：在 HTML 模板中添加表达式的能力是 AngularJS\
    \ 的一大特性。表达式基本上与作用域相关联。表达式有助于将应用程序数据绑定到 HTML。\n*   **控制器**：控制器是 MVC 框架的一个组件。控制器将包含您的核心业务逻辑。它在\
    \ AngularJS 中的主要作用是使用作用域将数据暴露给视图页面。\n*   **数据绑定**：AngularJS 的一个重要特性是数据绑定。这是将数据从模型链接到视图，反之亦然的过程。AngularJS\
    \ 支持双向数据绑定。\n    *   当网页上的数据发生变化时，模型会更新。\n    *   当模型中的数据发生变化时，视图页面会自动更新。模型代表数据，视图则展示数据。\n\
    *   **服务**：AngularJS 中的服务是单例对象，为 Web 应用程序提供功能。\n*   **依赖注入**：DI 是在运行时注入依赖项的过程（即，使依赖组件能够在已初始化代码的组件内被访问）。它用于消费服务。例如，如果一个模块需要通过\
    \ HTTP 请求访问资源，那么可以将 HTTP 服务注入到该模块中，以使该功能在模块代码中可用。\n\n### AngularJS 生命周期\n\n现在您已经了解了\
    \ AngularJS 应用程序中涉及的不同组件，我将介绍 AngularJS 生命周期中发生的事情，该周期包含三个阶段：引导阶段、编译阶段和运行时阶段。AngularJS\
    \ 的这些阶段发生在网页在客户端浏览器中加载时。为了设计和实现使用 AngularJS 开发的应用程序中的代码，理解 AngularJS 的生命周期非常重要。\n\
    \n#### 引导阶段\n\n引导阶段是 AngularJS 生命周期的第一阶段，发生在 AngularJS JavaScript 库被下载到客户端浏览器时。一旦\
    \ JavaScript 库被下载，AngularJS 会初始化其自身的组件，并初始化 `ng-app` 指令所指向的应用程序模块。此阶段中的静态 DOM\
    \ 被加载到浏览器中。\n\n#### 编译阶段\n\nHTML 编译阶段是 AngularJS 生命周期的第二阶段。在此阶段，加载的静态 DOM 会被动态\
    \ DOM 替换，以表示 AngularJS 视图。然后，这些 DOM 会链接到来自 AngularJS 内置库或自定义指令代码的相应 JavaScript\
    \ 函数。\n\n#### 运行时数据绑定阶段\n\n这是 AngularJS 生命周期的最后阶段，只要用户不重新加载或导航离开网页，该阶段就会持续存在。在此阶段，对作用域所做的任何更改都会反映在视图中，反之亦然。\n\
    \n### AngularJS 架构概念\n\n现在您将了解 AngularJS 的架构概念。当一个 HTML 文档被加载到浏览器并由浏览器评估时，首先会加载\
    \ AngularJS JavaScript 文件，创建 Angular 全局对象，并执行您注册控制器函数的 JavaScript 代码。然后，AngularJS\
    \ 会扫描 HTML 以查找 AngularJS 应用程序和视图，并找到与视图对应的控制器函数。接着，AngularJS 执行控制器函数，并使用由控制器填充的模型中的数据更新视图。\n\
    \n接下来，AngularJS 会监听浏览器事件，例如，按钮点击、鼠标移动、输入字段更改等。如果发生任何这些事件，AngularJS 将相应地更新视图。图\
    \ 3-1 展示了 AngularJS 的工作流程图。\n\n![A436970_1_En_3_Fig1_HTML.jpg](img/A436970_1_En_3_Fig1_HTML.jpg)\n\
    \n图 3-1.\n\nAngularJS 工作流程图\n\nAngularJS 包含一个模块，该模块充当不同类型应用程序（如视图、控制器、指令、服务等）的容器。模块指定了应用程序如何被引导。然后，您有一个配置组件。路由用于将\
    \ URL 链接到控制器和视图。视图用于处理复杂的事件。它使用 `ng-view` 指令。此外，您还有一个控制器，它控制 AngularJS 应用程序的数据，并由常规的\
    \ JavaScript 对象组成。AngularJS 定义了一个 `ng-controller` 指令，该指令通过使用控制器函数来创建新的控制器对象。AngularJS\
    \ 带有几个内置服务，例如 `$http`、`$route`、`$window`、`$location` 等。作用域指的是引用模型的对象。它们在连接控制器与视图方面扮演着重要角色。\n\
    \n#### MVC 架构\n\nAngularJS 使用 MVC 架构来创建 Web 应用程序。MVC 架构是一种编程方法论，旨在将应用程序拆分为三个核心组件：模型、视图和控制器。这三个组件组合起来形成您的应用程序。图\
    \ 3-2 展示了模型-视图-控制器架构。\n\n![A436970_1_En_3_Fig2_HTML.jpg](img/A436970_1_En_3_Fig2_HTML.jpg)\n\
    \n图 3-2.\n\nAngularJS 中的 MVC 架构\n\n当用户通过浏览器发送 HTTP 请求时，该请求由控制器接收。控制器处理该请求，并将请求发送给模型以提供适当的数据。作为响应，模型将结果数据数组再次提供给控制器。控制器再次将数据处理为所需格式，并将其发送给视图。视图通过\
    \ UI 内容表示数据，并将其发送给控制器。最后，控制器将 HTTP 响应发送回浏览器。\n\n*   AngularJS 视图用于在 Web 浏览器中向用户生成信息的输出表示，例如图表或示意图。AngularJS\
    \ 通过拉取为应用程序定义的所有模板，在 DOM 中构建视图。因此，开发人员在这里的工作主要是使用 HTML 和 CSS 来创建模板。\n*   AngularJS\
    \ 模型包含用于存储应用程序模型的 `$scope` 对象，因此无需像其他 JavaScript 客户端框架那样创建 JavaScript 模型类。作用域附加到\
    \ DOM，有助于大大简化 JavaScript 问题。\n*   AngularJS 控制器是您定义特定于某个视图的所有业务逻辑的地方。控制器将模型和视图联系在一起。\n\
    \n## 设置您的开发环境\n\n在本节中，您将设置您的开发环境。\n\n### 将 AngularJS 添加到 Spring Boot\n\n让我们通过将\
    \ AngularJS 添加到您在第 2 章的 UserRegistrationSystem 应用程序中开发的 Spring Boot 应用程序来设置开发环境。您可以通过三种方式实现此目的。\n\
    \n*   从 Google CDN 包含 Angular 脚本\n*   下载并在本地托管 Angular 文件\n*   在 Spring Boot 应用程序的\
    \ `pom.xml` 中提供 AngularJS 的依赖信息\n\n以下各节将涵盖所有三种方式。\n"
- fmt: '### Including Angular Scripts from the Google CDN


    Here’s how you include your Angular scripts from the Google CDN.


    To get started quickly with AngularJS, point your HTML `<script>` tag to a Google
    CDN URL. Two types of Angular script URLs are available, one for production and
    one for development.


    - `angular.min.js`: This is minified version that should be used in production.

    - `angular.js`: This is nonminified, human-readable version that should be used
    in web development.


    Listing [3-1](#A436970_1_En_3_Chapter.html#Par45) shows an example of pointing
    your code to the minified version 1.5.6 of an Angular script on the Google CDN
    server.


    ```

    Angular Application


    Listing 3-1.

    H2 pom.xml Dependency

    ```


    ### Downloading and Hosting Angular Files Locally


    Another way to include Angular scripts is by downloading and hosting Angular files
    locally.


    A developer who wants to work with Angular offline or wants to host Angular files
    on their own server can opt for this option. Navigate to [`https://code.angularjs.org/`](https://code.angularjs.org/)
    and download the required version from the list of Angular versions. Or you can
    download the latest stable release of Angular from [`https://angularjs.org/`](https://angularjs.org/)
    . Figure [3-3](#A436970_1_En_3_Chapter.html#Fig3) shows the AngularJS page with
    the download link.


    ![A436970_1_En_3_Fig3_HTML.jpg](A436970_1_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    AngularJS page


    Click Download AngularJS to display a pop-up to download AngularJS, as shown in
    Figure [3-4](#A436970_1_En_3_Chapter.html#Fig4).


    ![A436970_1_En_3_Fig4_HTML.jpg](A436970_1_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    Pop-up to download AngularJS


    ### Providing Dependency Information in pom.xml


    Instead of manually downloading the AngularJS library, you can provide dependency
    information for AngularJS in `pom.xml` while developing a Spring Boot application
    so that AngularJS will be automatically downloaded to the library. Listing [3-2](#A436970_1_En_3_Chapter.html#Par50)
    shows the dependency information for AngularJS and Bootstrap for CSS.


    ```

    org.webjars

    angularjs

    1.4.9

    runtime


    org.webjars

    bootstrap

    3.3.6

    runtime


    Listing 3-2.

    Added Dependency for AngularJS and Bootstrap in pom.xml

    ```


    ### Adding Twitter Bootstrap to Spring Boot


    Twitter Bootstrap is a front-end framework that was created to make responsive
    design much easier. The Bootstrap CSS framework can be used to style the content
    of a web site. You can create your own CSS styles to make your web site look awesome,
    but Bootstrap provides a nice set of CSS styles that will let you design a really
    great-looking content layout. It is not really required to use Bootstrap while
    working with AngularJS, and there is no intrinsic relationship between AngularJS
    and Bootstrap as both are different packages.


    To use CSS from the Bootstrap CSS framework, you can define a dependency in `pom.xml`
    while developing a Spring Boot application, as shown in Listing [3-2](#A436970_1_En_3_Chapter.html#Par50),
    so that it will be automatically downloaded to the library folder. Also, the Bootstrap
    archive can be downloaded from [`https://getbootstrap.com/`](https://getbootstrap.com/)
    , which also contains CSS and JavaScript files.


    ### Developing Your Single-Page Application


    Single-page applications are applications that have one entry point HTML page
    (may be `index.html`); all the application content is dynamically added to and
    removed from that one page. At runtime, based on some event, existing content
    attached to the tag is removed, and dynamic content is then attached to the same
    tag.


    The entry point of a single-page application can be seen in an `index.html` that
    contains a `<div ng-view></div>` tag, as shown in Listing [3-3](#A436970_1_En_3_Chapter.html#Par55),
    where all the dynamic content is inserted into `index.html`. So, rather than a
    user waiting for a new page to load, new content is dynamically displayed in a
    fraction of the time.


    ```

    ...


    ...


    ...


    Listing 3-3.

    Developing the HTML Page: Entry Point of a Single-Page Application

    ```


    In Listing [3-3](#A436970_1_En_3_Chapter.html#Par55), you are using these good
    practices while developing the HTML page:


    - Place the `<script>` tag at the bottom of the page to improve the app load time
    because the loading of the Angular script will not affect the HTML loading.

    - Place `ng-app` at the root of your application, typically on the `<html>` tag
    if you want Angular to autobootstrap your application.


    ### Bootstrapping the Application


    Bootstrapping AngularJS is the process of initialization, or starting, your Angular
    app by adding `ng-app` to an element in your HTML, as shown in Listing [3-4](#A436970_1_En_3_Chapter.html#Par60),
    when an application first starts.


    ```

    ...


    Listing 3-4.

    Bootstrapping AngularJS by Adding ng-app in an HTML Page

    ```


    This is also known as automatic initialization. So, when AngularJS finds the `ng-app`
    directive after analyzing the `index.html` file, it loads the associated modules
    and then compiles the DOM.


    The AngularJS application `UserRegistrationSystem` is defined as the AngularJS
    module (`angular.module`) in `app.js`, which is the entry point into the application.


    ```

    var app = angular.module(''userregistrationsystem'', [''ngRoute'', ''ngResource'']);

    ```


    The variable `app` in the `app.js` file could be named anything.


    ### Dependency Injection


    Dependency injection is a design pattern to define dependencies in an application
    as part of configuration instead of hard-coding them within the component. DI
    helps you avoid the manual creation of application dependencies and makes it possible
    to change them whenever needed. AngularJS uses DI to load module dependencies
    when an application first starts.


    The benefits of DI are as follows:


    - It separates the process of creating dependencies and their consumption.

    - The consumer will feel like the process of creating dependencies is being handled
    by someone else; the user just needs to worry about how to use the dependency.

    - It offers the facility to change the dependencies whenever needed.

    - It makes an application more testable.


    As you can see, the two dependencies have been defined in `app.js` as needed by
    `userregistrationsystem` at startup, as shown here:


    ```

    var app = angular.module(''userregistrationsystem'', [''ngRoute'', ''ngResource'']);

    ```


    The two dependencies in the previous code are defined in an array in the module
    definition.


    - `ngRoute`: The first dependency is the AngularJS `ngRoute` module, which provides
    routing to the application. The `ngRoute` module is used for deep-linking URLs
    to controllers and views (HTML partials).

    - `ngResource`: The second dependency is the AngularJS `ngResource` module, which
    provides interaction support with RESTful services.'
