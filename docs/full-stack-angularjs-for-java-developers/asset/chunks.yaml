- fmt: '### Authentication Customization with an In-Memory Definition


    If there are only a few users for your application, you can define their details
    in a Spring configuration file instead of extracting user information from some
    persistence engine so that the user details are loaded into the application’s
    memory. Let’s create a `SpringSecurityConfiguration_InMemory.java` file, as shown
    in Listing [4-5](#A436970_1_En_4_Chapter.html#Par51).


    ```

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.http.HttpMethod;

    import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

    import org.springframework.security.config.annotation.web.builders.HttpSecurity;

    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

    @Configuration

    @Order(SecurityProperties.ACCESS_OVERRIDE_ORDER)

    public class SpringSecurityConfiguration_InMemory extends WebSecurityConfigurerAdapter
    {

    @Autowired

    protected void configureGlobal(AuthenticationManagerBuilder auth)

    throws Exception {                auth.inMemoryAuthentication().withUser("user").password("password")

    .roles("USER");                auth.inMemoryAuthentication().withUser("admin").password("password")

    .roles("USER", "ADMIN");

    }

    @Override

    protected void configure(HttpSecurity http) throws Exception {

    http

    .httpBasic().and()

    .authorizeRequests()

    .antMatchers(HttpMethod.GET, "/api/user/")

    .hasRole("USER")

    .antMatchers(HttpMethod.POST, "/api/user/")

    .hasRole("USER")

    .antMatchers(HttpMethod.PUT, "/api/user/**")                          .hasRole("USER")

    .antMatchers(HttpMethod.DELETE, "/api/user/**")

    .hasRole("ADMIN")

    .and()

    .csrf()

    .disable();

    }

    }

    Listing 4-5.

    Customize User Authentication in Memory

    ```


    In the previous code snippet, you created a class named `SpringSecurityConfiguration_InMemory`
    and annotated this class with the `@Configuration` annotation, which is a Spring
    annotation and makes this class a configuration class. You extended this class
    with the `WebSecurityConfigurerAdapter` class, which allows you to configure Spring
    Security and override the default methods for your application.


    You configured authentication by creating two users (`user` and `admin`) and their
    roles (`USER` and `ADMIN`) and their passwords. The `admin` user has both the
    `USER` and `ADMIN` roles, whereas `user` has only the `USER` role. To configure
    in-memory authentication, you used the `configureGlobal` method. You annotated
    this method with the `@Autowired` annotation. This method has an argument of type
    `AuthenticationManagerBuilder`.


    Moving on, you overrode the second method, `configure`, which takes the argument
    `HttpSecurity`. In the `configure` method, you configured authorization by mapping
    roles to URLs. You used HTTP Basic Authentication to authenticate every request.
    Inside this `configure` method, you used the `anyMatchers` method to map the URL
    pattern and `HttpMethod` to a specific role; for example, any URL that matches
    `/api/user/**` and performs a `DELETE` operation should have the `ADMIN` role,
    and the rest can have the `USER` role. You also disabled cross-site request forgery
    to restrict any end user from executing unwanted actions.


    ### Running the UserRegistrationSystem Application


    Once you restart your `UserRegistrationSystem` application, you can test the newly
    implemented code by launching Postman and calling APIs along with a user’s credentials.


    As shown in Figure [4-10](#A436970_1_En_4_Chapter.html#Fig10), launch Postman
    to register a new user in your `UserRegistrationSystem` application. In Postman,
    select the HTTP `POST` method and enter the URL `http://localhost:8080/api/user/`.
    Click the Authorization tab and select TYPE for Basic Auth. Enter the username
    `user` and password `password` and then click the Update Request button, which
    will update the HTTP header with the `Authorization` value. Then provide JSON
    data in the body (as you saw in Chapter [2](#A436970_1_En_2_Chapter.html)), and
    finally click the Send button.


    ![A436970_1_En_4_Fig10_HTML.jpg](A436970_1_En_4_Fig10_HTML.jpg)


    Figure 4-10.


    Creating a new user by passing a user’s credentials


    If everything goes fine, this will register a new user in your `UserRegistrationSystem`
    application.


    You can call another endpoint to get a list of users. Enter the user’s credentials
    as `user`/`password`, as shown in Figure [4-11](#A436970_1_En_4_Chapter.html#Fig11).


    ![A436970_1_En_4_Fig11_HTML.jpg](A436970_1_En_4_Fig11_HTML.jpg)


    Figure 4-11.


    Getting a list of users after passing a user’s credential


    Similarly, you can update a user’s details by calling another endpoint and passing
    a user’s credentials as `user`/`password`, as shown in Figure [4-12](#A436970_1_En_4_Chapter.html#Fig12).


    ![A436970_1_En_4_Fig12_HTML.jpg](A436970_1_En_4_Fig12_HTML.jpg)


    Figure 4-12.


    Updating a user’s details by passing a user’s credentials


    So, you have now performed create, read, and update operations in your Spring
    Boot application using the user credentials of `user`/`password`. You could have
    also performed these operations using the `admin` user’s credentials of `admin`/`password`
    because the earlier endpoints can be accessed by both of the roles `USER` and
    `ADMIN`.


    Now, what will happen if you try to call another endpoint in your application
    to perform a delete operation using the `USER` role by passing the credentials
    `user`/`password`? Since you have restricted this operation for all other user
    roles except `ADMIN`, it should throw the error message “Access is denied” with
    status 403, `Forbidden`, as shown in Figure [4-13](#A436970_1_En_4_Chapter.html#Fig13).


    ![A436970_1_En_4_Fig13_HTML.jpg](A436970_1_En_4_Fig13_HTML.jpg)


    Figure 4-13.


    Access is denied for unauthorized users.


    Let’s call this API by passing the `admin` credentials to perform a delete operation,
    as shown in Figure [4-14](#A436970_1_En_4_Chapter.html#Fig14).


    ![A436970_1_En_4_Fig14_HTML.jpg](A436970_1_En_4_Fig14_HTML.jpg)


    Figure 4-14.


    Delete operation using the ADMIN role


    As you have used `ADMIN`’s credentials to call this endpoint, the operation is
    successful, and since this operation deleted a user from `UserRegistrationSystem`,
    the response returned an empty list.


    Up to now, you have performed authentication customization with in-memory definitions.
    Let’s take this to the next level by customizing authentication against a database.'
