  \ function($scope, $http, $location, $route) {\n$http({\nmethod : 'GET',\nurl :\
  \ 'http://localhost:8080/api/user/'\n}).then(function(response) {\n$scope.users\
  \ = response.data;\n});\n$scope.editUser = function(userId) {\n$location.path(\"\
  /update-user/\" + userId);\n}\n$scope.deleteUser = function(userId) {\n$http({\n\
