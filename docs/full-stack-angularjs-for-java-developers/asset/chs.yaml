  到目前为止，你已看到仅通过添加 `spring-boot-starter-security` 依赖就发生了许多神奇的事情。


  在实际用例中，你需要配置多个具有不同凭据和角色的用户来访问你的应用。此外，还需要自定义有权访问 REST API 的用户。为了实现这一点，你需要引入一些 Java
  配置。


  ## 自定义用户身份验证


  用户在获准访问受保护资源之前，需要先进行身份验证和授权。在 Spring Security 中，身份验证提供者负责对用户进行身份验证，验证成功后，用户才能访问系统中的受保护资源。


  Spring Security 支持多种用户身份验证方式，例如使用内存定义进行用户身份验证，以及针对存储用户详细信息的用户存储库（关系数据库）进行身份验证。让我们通过配置这些用户和角色来自定义用户身份验证：


  *   你将拥有两个角色：`USER` 和 `ADMIN`。

  *   你将创建一个 `USER` 角色，凭据为 `user`/`password`。

  *   你还将创建一个 `ADMIN` 角色，凭据为 `admin`/`password`。


  在你的 UserRegistrationSystem 应用中，你将向特定用户角色提供对不同 REST 端点的访问权限，如表 4-1 所示。


  表 4-1.


  API 与用户角色的映射


  | 用户角色 | HTTP 方法 | API 端点 |

  | --- | --- | --- |

  | `USER` | `GET` | `/api/user/` |

  | `USER` | `POST` | `/api/user/` |

  | `USER` | `PUT` | `/api/user/{id}` |

  | `ADMIN` | `DELETE` | `/api/user/{id}` |




  ### 使用内存定义进行身份验证自定义


  如果您的应用程序只有少数用户，您可以在 Spring 配置文件中定义他们的详细信息，而不是从某个持久化引擎中提取用户信息，这样用户详细信息就会加载到应用程序的内存中。让我们创建一个
  `SpringSecurityConfiguration_InMemory.java` 文件，如代码清单 4-5 所示。


  ```

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.http.HttpMethod;

  import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

  import org.springframework.security.config.annotation.web.builders.HttpSecurity;

  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

  import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

  @Configuration

  @Order(SecurityProperties.ACCESS_OVERRIDE_ORDER)

  public class SpringSecurityConfiguration_InMemory extends WebSecurityConfigurerAdapter
  {

  @Autowired

  protected void configureGlobal(AuthenticationManagerBuilder auth)

  throws Exception {                auth.inMemoryAuthentication().withUser("user").password("password")

  .roles("USER");                auth.inMemoryAuthentication().withUser("admin").password("password")

  .roles("USER", "ADMIN");

  }

  @Override

  protected void configure(HttpSecurity http) throws Exception {

  http

  .httpBasic().and()

  .authorizeRequests()

  .antMatchers(HttpMethod.GET, "/api/user/")

  .hasRole("USER")

  .antMatchers(HttpMethod.POST, "/api/user/")

  .hasRole("USER")

  .antMatchers(HttpMethod.PUT, "/api/user/**")                          .hasRole("USER")

  .antMatchers(HttpMethod.DELETE, "/api/user/**")

  .hasRole("ADMIN")

  .and()

  .csrf()

  .disable();

  }

  }

  代码清单 4-5.

  在内存中自定义用户身份验证

  ```


  在上一个代码片段中，您创建了一个名为 `SpringSecurityConfiguration_InMemory` 的类，并使用 `@Configuration`
  注解标记了该类，这是一个 Spring 注解，使该类成为一个配置类。您让该类继承了 `WebSecurityConfigurerAdapter` 类，这允许您配置
  Spring Security 并覆盖应用程序的默认方法。


  您通过创建两个用户（`user` 和 `admin`）及其角色（`USER` 和 `ADMIN`）和密码来配置身份验证。`admin` 用户同时拥有 `USER`
  和 `ADMIN` 角色，而 `user` 用户只有 `USER` 角色。为了配置内存身份验证，您使用了 `configureGlobal` 方法。您使用 `@Autowired`
  注解标记了此方法。此方法有一个 `AuthenticationManagerBuilder` 类型的参数。


  接下来，您覆盖了第二个方法 `configure`，它接受参数 `HttpSecurity`。在 `configure` 方法中，您通过将角色映射到 URL 来配置授权。您使用了
  HTTP 基本身份验证来验证每个请求。在此 `configure` 方法内部，您使用了 `anyMatchers` 方法将 URL 模式和 `HttpMethod`
  映射到特定角色；例如，任何匹配 `/api/user/**` 并执行 `DELETE` 操作的 URL 都应具有 `ADMIN` 角色，其余操作可以具有 `USER`
  角色。您还禁用了跨站请求伪造，以限制任何最终用户执行非预期的操作。


