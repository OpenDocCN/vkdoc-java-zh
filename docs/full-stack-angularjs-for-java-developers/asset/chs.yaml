  \ `)` |\n| `DELETE` | [`delete(java.lang.String, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#delete-java.lang.String-java.lang.Object%E2%80%A6-)\
  \ `)` |\n| `HEAD` | [`headForHeaders(java.lang.String, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#headForHeaders-java.lang.String-java.lang.Object%E2%80%A6-)\
  \ `)` |\n| `OPTIONS` | [`optionsForAllow(java.lang.String, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#optionsForAllow-java.lang.String-java.lang.Object%E2%80%A6-)\
  \ `)` |\n| `any` | [`exchange(java.lang.String, org.springframework.http.HttpMethod,\
  \ org.springframework.http.HttpEntity<?>, java.lang.Class<T>, java.lang.Object...`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/client/RestTemplate.html#exchange-java.lang.String-org.springframework.http.HttpMethod-org.springframework.http.HttpEntity-java.lang.Class-java.lang.Object%E2%80%A6-)\
  \ `)` |\n\n`RestTemplate` 中的方法名称表明了相应 HTTP 方法在对应方法内部的实现方式以及将要返回的内容。例如，`getForEntity`\
  \ 方法将对服务器执行 HTTP `GET` 操作，并将 HTTP 响应转换为指定类型，然后将此实体返回给客户端。类似地，`postForObject` 方法将通过把给定对象转换为\
  \ HTTP 请求来对服务器执行 HTTP `POST` 操作，并通过将 HTTP 响应转换为给定类型的对象来返回响应。\n\n接下来，我们使用 `RestTemplate`\
  \ 的方法来消费第 2 章开发的 UserRegistrationSystem 应用程序中的 REST API。\n\n### RestTemplate 操作\n\
  \n你将使用 `RestTemplate` 来执行 HTTP 方法的操作。让我们从一个简单的 `GET` 请求示例开始，使用 `getForEntity` 方法来获取纯\
  \ JSON。\n\n#### 带参数的 HTTP GET 请求以检索用户\n\n你可以使用 `RestTemplate` 中的 `getForObject`\
  \ 或 `getForEntity` 方法来发起 HTTP `GET` 请求。这里，我们将使用 `getForObject` 方法进行 `GET` 请求。Spring\
  \ `RestTemplate` 提供了三个重载版本的 `getForObject` 方法，如表 6-2 所示。\n\n表 6-2.\n\n重载的 getForObject\
  \ 方法\n\n| # | 重载的 getForObject 方法 |\n| --- | --- |\n| 1 | `@Override` `public <T>\
  \ T getForObject(String url, Class<T> responseType, Object... uriVariables) throws\
  \ RestClientException {` `RequestCallback requestCallback =` `acceptHeaderRequestCallback(responseType);`\
  \ `HttpMessageConverterExtractor<T> responseExtractor =` `new HttpMessageConverterExtractor<T>(responseType,`\
  \ `getMessageConverters(), logger);` `return execute(url, HttpMethod.GET, requestCallback,`\
  \ `responseExtractor, uriVariables);` `}` |\n| 2 | `@Override` `public <T> T getForObject(String\
  \ url, Class<T> responseType, Map<String, ?> uriVariables) throws RestClientException\
  \ {` `RequestCallback requestCallback =` `acceptHeaderRequestCallback(responseType);`\
  \ `HttpMessageConverterExtractor<T> responseExtractor =` `new HttpMessageConverterExtractor<T>(responseType,`\
  \ `getMessageConverters(), logger);` `return execute(url, HttpMethod.GET, requestCallback,`\
  \ `responseExtractor, uriVariables);` `}` |\n| 3 | `@Override` `public <T> T getForObject(URI\
  \ url, Class<T> responseType) throws RestClientException {` `RequestCallback requestCallback\
  \ =` `acceptHeaderRequestCallback(responseType);` `HttpMessageConverterExtractor<T>\
  \ responseExtractor =` `new HttpMessageConverterExtractor<T>(responseType,` `getMessageConverters(),\
  \ logger);` `return execute(url, HttpMethod.GET, requestCallback,` `responseExtractor);`\
  \ `}` |\n\n前两个重载方法包含一个作为 `String` 的 URI 模板、一个返回值类型和一个 URI 变量作为方法参数。第三个重载方法接受两个参数，即完整形成的\
  \ URI 和返回值类型。\n\n让我们在 `src/main/java` 文件夹下的 `com.apress.ravi.chapter` `6` `.client`\
  \ 包中创建一个 `UserRegistrationClient` 类，如清单 6-2 所示。你将消费第 2 章为你的 UserRegistrationSystem\
  \ 应用程序开发的 `getUserById` REST API 端点。\n\n```\npackage com.apress.ravi.chapter6.client;\n\
  import org.springframework.web.client.RestTemplate;\nimport com.apress.ravi.chapter2.dto.UsersDTO;\n\
  public class UserRegistrationClient {\nprivate static RestTemplate restTemplate\
  \ = new RestTemplate();\nprivate static final String USER_REGISTRATION_BASE_URL\
  \ =\n\"http://localhost:8080/api/user/\";\npublic UsersDTO getUserById(final Long\
  \ userId) {\nreturn restTemplate.getForObject(\nUSER_REGISTRATION_BASE_URL + \"\
  /{id}\",\nUsersDTO.class, userId);\n}\n}\n清单 6-2.\nUserRegistrationClient 和 getForObject\
  \ 的使用\n```\n\n在清单 6-2 中，你在类级别创建了一个 `RestTemplate` 实例，因为 `RestTemplate` 是线程安全的。你创建了一个值为\
  \ `http://localhost:8080/api/user/` 的类成员 `USER_REGISTRATION_BASE_URL`。\n\n你创建了一个\
  \ `getUserById` 方法来调用 `RestTemplate` 的 `getForObject` 方法，以消费来自 URL `USER_REGISTRATION_BASE_URL\
  \ + \"/{id}\"` 的 REST API。你指定了 `UsersDTO` 作为第二个参数，以便 `RestTemplate` 使用 `HttpMessageConverter`\
  \ 将来自服务器的 HTTP 响应内容转换为 `UserDTO` 实例。\n\n可以通过在 `UserRegistrationClient` 类中创建一个 main\
  \ 方法来测试 `getUserById` 方法，如清单 6-3 所示。\n\n\n\n```\npublic static void main(String[]\
  \ args) {\nUserRegistrationClient userRegistrationClient =\nnew UserRegistrationClient();\n\
