  id\") final Long id) {\nUsersDTO user = userJpaRepository.findById(id);\nreturn\
  \ new ResponseEntity(user, HttpStatus.OK);\n}\n清单 2-10.\n检索单个用户的 GET 动词实现\n\n如清单\
