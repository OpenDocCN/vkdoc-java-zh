  #### 更新 Spring Security 配置以处理登录请求


  你还需要更新现有的 Spring Security 配置文件 `com.apress.ravi.Security.SpringSecurityConfiguration_InMemory.java`，如清单
  5-10 所示。


  ```

  package com.apress.ravi.Security;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.boot.autoconfigure.security.SecurityProperties;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.core.annotation.Order;

  import org.springframework.security.config.annotation.authentication.builders.AuthenticationManagerBuilder;

  import org.springframework.security.config.annotation.web.builders.HttpSecurity;

  import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;

  import org.springframework.security.web.csrf.CookieCsrfTokenRepository;

  @Configuration

  @Order(SecurityProperties.ACCESS_OVERRIDE_ORDER)

  public class SpringSecurityConfiguration_InMemory

  extends WebSecurityConfigurerAdapter {

  @Autowired

  protected void configureGlobal(AuthenticationManagerBuilder auth)

  throws Exception {

  auth.inMemoryAuthentication().

  withUser("user").password("password")

  .roles("USER");

  auth.inMemoryAuthentication()

  .withUser("admin").password("password")

  .roles("USER", "ADMIN");

  }

  @Override

  protected void configure(HttpSecurity http) throws Exception {

  http

  .httpBasic()

  .realmName("User Registration System")

  .and()

  .authorizeRequests()

  .antMatchers("/login/login.html", "/template/home.html", "/").permitAll()

  .anyRequest().authenticated()

  .and()

  .csrf()

  .csrfTokenRepository(CookieCsrfTokenRepository.withHttpOnlyFalse());

  }

  }

  清单 5-10.

  SpringSecurityConfiguration_InMemory.java

  ```


  在清单 5-10 中，你更新了现有的 `configure` 方法来处理登录请求。你允许匿名访问静态资源，例如 `/login/login.html`、`/template/home.html`
  和 `/`，因为这些 HTML 资源需要可供匿名用户使用。


  Spring Security 提供了一个特殊的 `CsrfTokenRepository` 来发送 cookie。当你从一个干净的浏览器（Ctrl+F5 或
  Chrome 的隐身模式）开始时，对服务器的第一个请求没有 cookie，但服务器会为 `JSESSIONID`（常规的 `HttpSession`）和 `X-XSRF-TOKEN`
  发回 `Set-Cookie`，这些是你在清单 5-10 中设置的 CRSF cookie。后续的请求将包含这些 cookie，它们非常重要：没有它们，Spring
  Security 应用程序将无法工作，并且它们提供了一些非常基本的安全功能（身份验证和 CSRF 保护）。当你注销时，cookie 的值会改变。Spring Security
  期望在名为 `X-CSRF` 的标头中发送令牌。从加载主页的初始请求开始，CSRF 令牌的值在服务器端的 `HttpRequest` 属性中可用。Angular
  基于 cookie 内置了对 [CSRF](https://docs.angularjs.org/api/ng/service/''http)（它称之为 XSRF）的支持。Angular
  希望 cookie 名称为 `XSRF-TOKEN`，而 Spring Security 最好的部分是它默认将其作为请求属性提供。


