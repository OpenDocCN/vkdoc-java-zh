  \ requestCallback,` `responseExtractor, uriVariables);` `}` |\n| 2 | `@Override`\
  \ `public <T> T postForObject(String url, Object request, Class<T>responseType,Map<String,?>uriVariables)throws\
  \ RestClientException{` `RequestCallback requestCallback =` `httpEntityCallback(request,\
  \ responseType);` `HttpMessageConverterExtractor<T> responseExtractor =` `new HttpMessageConverterExtractor<T>(`\
  \ `responseType,` `getMessageConverters(),` `logger);` `return execute(url, HttpMethod.POST,\
  \ requestCallback,` `responseExtractor, uriVariables);` `}` |\n| 3 | `@Override`\
  \ `public <T> T postForObject(URI url, Object request,` `Class<T> responseType)\
  \ throws RestClientException {` `RequestCallback requestCallback =` `httpEntityCallback(request,\
  \ responseType);` `HttpMessageConverterExtractor<T> responseExtractor =` `new HttpMessageConverterExtractor<T>(`\
  \ `responseType,` `getMessageConverters());` `return execute(url, HttpMethod.POST,\
  \ requestCallback,` `responseExtractor);` `}` |\n\n前两个重载方法包含一个 `String` 类型的 URI\
  \ 模板，以及请求对象、返回值类型和 URI 变量作为方法参数。第三个重载方法接受三个参数：一个完整的 URI、一个请求对象和一个返回值类型。\n\n你将使用\
  \ `RestTemplate` 的 `postForObject` 方法对资源 `http://localhost:8080/api/user/` 执行 `POST`\
  \ 操作。`RestTemplate` 的 `postForObject` 方法对给定的 URI 和对象执行 HTTP `POST` 操作，然后根据 `responseType`\
  \ 将响应转换为一种表示形式。代码清单 6-5 展示了 `createUser` 方法，该方法使用 `POST` 对象方法创建一个新用户。\n\n```\npublic\
  \ UsersDTO createUser(final UsersDTO user) {\nreturn restTemplate.postForObject(\n\
  USER_REGISTRATION_BASE_URL,\nuser,\nUsersDTO.class);\n}\n代码清单 6-5.\n创建新用户\n```\n\
  \n在代码清单 6-5 中，你创建了一个 `createUser` 方法，其参数类型为 `UsersDTO`，用于调用 `RestTemplate` 的 `postForObject`\
  \ 方法，以使用来自 URL `USER_REGISTRATION_BASE_URL` 的 REST API。你将参数值作为第二个参数传递给了 `postForObject`\
  \ 方法。你指定 `UsersDTO` 作为第三个参数，以便 `RestTemplate` 使用 `HttpMessageConverter` 将来自服务器的\
  \ HTTP 响应内容转换为 `UserDTO` 实例。\n\n可以通过更新 `UserRegistrationClient` 类中的 main 方法来测试 `createUser`\
  \ 方法，如代码清单 6-6 所示。\n\n```\npublic static void main(String[] args) {\nUserRegistrationClient\
  \ userRegistrationClient =\nnew UserRegistrationClient();\nUsersDTO user = new UsersDTO();\n\
  user.setName(\"Soniya Singh\");\nuser.setAddress(\"JP Nagar; Bangalore; India\"\
  );\nuser.setEmail(\"test@test.com\");\nUsersDTO newUser = userRegistrationClient.createUser(user);\n\
  System.out.println(newUser.getId());\n}\n代码清单 6-6.\nUserRegistrationClient 类中的 Main\
  \ 方法\n```\n\n#### 使用带参数的 HTTP PUT 请求更新用户\n\n你将使用 `RestTemplate` 中的 `put` 方法来执行 HTTP\
  \ `PUT` 操作。Spring `RestTemplate` 提供了三个重载版本的 `put` 方法，如表 6-4 所示。\n\n表 6-4.\n\n重载的\
  \ put 方法\n\n| # | 重载的 put 方法 |\n| --- | --- |\n| 1 | `@Override` `public void put(String\
  \ url, Object request,` `Object... uriVariables) throws RestClientException {` `RequestCallback\
  \ requestCallback =` `httpEntityCallback(request);` `execute(url, HttpMethod.PUT,\
  \ requestCallback,` `null, uriVariables);` `}` |\n| 2 | `@Override` `public void\
  \ put(String url, Object request,` `Map<String, ?> uriVariables) throws RestClientException\
  \ {` `RequestCallback requestCallback =` `httpEntityCallback(request);` `execute(url,\
  \ HttpMethod.PUT, requestCallback,` `null, uriVariables);` `}` |\n| 3 | `@Override`\
  \ `public void put(URI url, Object request) throws RestClientException {` `RequestCallback\
  \ requestCallback =` `httpEntityCallback(request);` `execute(url, HttpMethod.PUT,\
  \ requestCallback, null);` `}` |\n\n前两个重载方法包含一个 `String` 类型的 URI 模板，以及一个请求对象和 URI\
  \ 变量作为方法参数。第三个重载方法接受两个参数：一个完整的 URI 和一个请求对象。`put` 方法的返回类型是 `void`。代码清单 6-7 展示了 `updateUser`\
  \ 方法，该方法将更新 `UserDTO` 实例。`put` 方法不会返回任何响应。\n\n```\npublic void updateUser(final\
  \ Long userId, final UsersDTO user) {\nrestTemplate.put(\nUSER_REGISTRATION_BASE_URL\
  \ + \"/{id}\",\nuser,\nuserId);\n}\n代码清单 6-7.\n更新现有用户\n```\n\n要测试 `updateUser`，请使用代码清单\
  \ 6-8 中所示的代码更新 main 方法。\n\n```\npublic static void main(String[] args) {\nUserRegistrationClient\
  \ userRegistrationClient =\nnew UserRegistrationClient();\nUsersDTO user = userRegistrationClient.getUserById(1L);\n\
  System.out.println(\"old user name: \" + user.getName());\nuser.setName(\"Ravi Kant\
  \ Soni\");\nuserRegistrationClient.updateUser(1L, user);\nSystem.out.println(\"\
  updated user name: \" + user.getName());\n}\n代码清单 6-8.\n更新后的 Main 方法\n```\n\n\n\n\
  #### 使用带参数的 HTTP DELETE 方法删除用户\n\n`RestTemplate` 提供了三个重载的 `delete` 方法来支持 HTTP `DELETE`\
  \ 方法，如表 6-5 所示。\n\n表 6-5.\n\n重载的 DELETE 方法\n\n| # | 重载的 delete 方法 |\n| --- | ---\
  \ |\n| 1 | `@Override` `public void delete(String url, Object... uriVariables)`\
  \ `throws RestClientException {` `execute(url, HttpMethod.DELETE, null, null, uriVariables);`\
  \ `}` |\n| 2 | `@Override` `public void delete(String url, Map<String, ?> uriVariables)`\
  \ `throws RestClientException {` `execute(url, HttpMethod.DELETE, null, null, uriVariables);`\
  \ `}` |\n| 3 | `@Override` `public void delete(URI url) throws RestClientException\
  \ {` `execute(url, HttpMethod.DELETE, null, null);` `}` |\n\n前两个重载方法将 URI 模板作为 `String`\
  \ 类型参数，并将 URI 变量作为方法参数。第三个重载方法只接受一个参数，即一个完整的 URI。`delete` 方法的返回类型是 `void`。\n\n清单\
  \ 6-9 展示了 `deleteUser` 方法，该方法将删除 `UserDTO` 实例。`delete` 方法不会返回任何响应。\n\n```\npublic\
  \ void deleteUser(final Long userId) {\nrestTemplate.delete(\nUSER_REGISTRATION_BASE_URL\
  \ + \"/{id}\",\nuserId);\n}\nListing 6-9.\n删除一个用户\n```\n\n要测试这个新功能，请更新 `main` 方法，如清单\
  \ 6-10 所示。\n\n```\npublic static void main(String[] args) {\nUserRegistrationClient\
  \ userRegistrationClient =\nnew UserRegistrationClient();\nSystem.out.println(\"\
  Old Users List: \" +\nuserRegistrationClient.getAllUsers().length);\nuserRegistrationClient.deleteUser(1L);\n\
  System.out.println(\"New Users List: \" +\nuserRegistrationClient.getAllUsers().length);\n\
  }\nListing 6-10.\n更新后的 Main 方法\n```\n\n### RestTemplate 的 Exchange API\n\n现在，让我们了解\
  \ `RestTemplate` 的 exchange API，以便以更通用的方式执行 HTTP 操作，如清单 6-11 所示。\n\n```\npublic\
  \ ResponseEntity getUserByIdUsingExchangeAPI(final Long userId) {\nHttpEntity httpEntity\
  \ = new HttpEntity(new UsersDTO());\nreturn restTemplate.exchange(USER_REGISTRATION_BASE_URL\
  \ + \"/{id}\",\nHttpMethod.GET, httpEntity, UsersDTO.class,        userId);\n}\n\
  Listing 6-11.\n用于获取用户的 Exchange API\n```\n\n如清单 6-11 所示，`RestTemplate` 的 exchange\
  \ 方法根据传递给该方法的 `responseType` 参数泛化了返回类型，并返回类型为 `UserDTO` 的 `ResponseEntity` 实例。\n\
  \n要测试此功能，请更新 `main` 方法，如清单 6-12 所示。\n\n```\npublic static void main(String[] args)\
  \ {\nUserRegistrationClient userRegistrationClient =\nnew UserRegistrationClient();\n\
  ResponseEntity responseEntity =\nuserRegistrationClient.getUserByIdUsingExchangeAPI(1L);\n\
  UsersDTO user = responseEntity.getBody();\nSystem.out.println(user.getName());\n\
  }\nListing 6-12.\n更新后的 Main 方法\n```\n\n如清单 6-12 所示，`ResponseEntity` 的 `getBody`\
  \ 方法返回 `UsersDTO`。\n\n### 使用 RestTemplate 进行基本认证\n\n到目前为止，您已经成功为您的 UserRegistrationSystem\
  \ 应用程序创建了一个 REST 客户端。\n\n在第 4 章中，您保护了您的 REST API，并且任何通信都需要基本认证。如果没有认证，程序将抛出一个状态码为\
  \ 401 的 `HttpClientErrorException` 异常。\n\n要与安全的 API 交互，您需要以编程方式对用户凭据进行 Base64 编码，并通过在编码值前加上\
  \ `Basic` 前缀来构造授权请求头。您将在 `com.apress.ravi.chapter` `6` `.client` 包下创建一个名为 `UserRegistrationClientBasicAuth`\
  \ 的类，如清单 6-13 所示。\n\n```\npackage com.apress.ravi.chapter6.client;\nimport org.apache.tomcat.util.codec.binary.Base64;\n\
  import org.springframework.http.HttpEntity;\nimport org.springframework.http.HttpHeaders;\n\
  import org.springframework.http.HttpMethod;\nimport org.springframework.web.client.RestTemplate;\n\
  public class UserRegistrationClientBasicAuth {\nprivate static final String securityUserName\
  \ = \"admin\";\nprivate static final String securityUserPassword = \"password\"\
  ;\nprivate static final String USER_REGISTRATION_BASE_URL =\n\"http://localhost:8080/api/user/\"\
  ;\nprivate static RestTemplate restTemplate = new RestTemplate();\npublic void deleteUserById(Long\
  \ userId) {\nString userCredential =\nsecurityUserName + \":\" + securityUserPassword;\n\
  byte[] base64UserCredentialData =\nBase64.encodeBase64(userCredential.getBytes());\n\
  HttpHeaders authenticationHeaders = new HttpHeaders();\nauthenticationHeaders.set(\"\
  Authorization\",\n\"Basic \" + new String(base64UserCredentialData));\nHttpEntity\
  \ httpEntity =\nnew HttpEntity(authenticationHeaders);\nrestTemplate.exchange(USER_REGISTRATION_BASE_URL\
  \ + \"/{id}\",\nHttpMethod.DELETE, httpEntity, Void.class, userId);\n}\n}\nListing\
  \ 6-13.\n带有基本认证的 UserRegistrationClient\n```\n\n在清单 6-13 中，您连接了 `securityUserName`\
  \ 和 `securityUserPassword`，然后对该用户凭据进行 Base64 编码，并通过在此编码值前加上 `Basic` 前缀来创建 `authenticationHeaders`。您还通过将\
  \ `authenticationHeaders` 传递给其构造函数，创建了一个类型为 `Void` 的 `HttpEntity` 实例。最后，您调用了 `RestTemplate`\
  \ 的 exchange 方法，以执行一个 `responseType` 为 `Void` 的 HTTP `DELETE` 操作。\n\n## 使用 Spring\
  \ 测试框架测试 RESTful 服务\n\n在本节中，您将对第 2 章中开发的 RESTful 服务执行单元测试和端到端测试。您将关注两种测试风格：单元测试和集成测试。单元测试用于验证隔离的代码单元。集成测试用于关注先前测试过的代码/单元之间的交互。\n\
  \n### 什么是测试？\n\n测试是软件开发生命周期中的关键部分；它是确保软件质量和性能的过程，没有它，软件开发就无法完成。\n\n单元测试意味着独立或单独地测试应用程序的每个组件，而集成测试则有助于确保系统中的多个组件协同工作。\n\
  \n一个好的实践是在单独的源文件夹（例如 `src/test/java`）或单独的项目中创建单元测试。应该测试什么是一个热门话题，有些开发者认为代码中的每条语句都应该被测试。\n\
  \n您可以自动或手动进行测试。自动化测试的好处是它可以在软件开发生命周期的不同阶段连续且重复地运行，当您遵循敏捷开发流程时，强烈推荐这样做。由于 Spring\
  \ 框架本质上是敏捷的，它支持这种流程。\n\n让我们讨论一个流行的 Java 测试框架 JUnit，以及使用它进行测试的基本技术。\n\n### 使用 JUnit4\
  \ 进行测试\n\nJUnit4 ( [`http://junit.org/`](http://junit.org/) ) 是 Java 平台上流行的单元测试框架。它提供了\
  \ `@Test` 注解来标记需要测试的方法。`Test` 类中的测试方法需要使用 `@org.junit.Test` 注解进行标记。JUnit 框架提供了不同的注解和断言方法来执行单元测试。\n\
  \n\n\n#### JUnit 4 注解\n\n表 6-6 列出了 JUnit 框架提供的注解。\n\n表 6-6.\n\nJUnit 框架中的注解\n\n\
  | 注解 | 导入 | 描述 |\n| --- | --- | --- |\n| `@Test` | `org.junit.Test` | 使用 `@Test`\
  \ 注解标记公共 `void` 方法，以识别并运行测试用例。 |\n| `@Before` | `org.junit.Before` | 使用 `@Before`\
  \ 注解标记公共 `void` 方法，该方法需要在所在类中的每个测试方法之前执行。此方法可用于设置环境变量。 |\n| `@After` | `org.junit.After`\
  \ | 使用 `@After` 注解标记公共 `void` 方法，该方法需要在所在类中的每个测试方法之后执行。此方法可用于清理测试环境或释放资源。 |\n| `@BeforeClass`\
  \ | `org.junit.BeforeClass` | 使用 `@BeforeClass` 注解标记公共静态 `void` 方法，该方法仅需在整个测试类执行之前运行一次。\
  \ |\n| `@AfterClass` | `org.junit.AfterClass` | 使用 `@AfterClass` 注解标记公共静态 `void`\
  \ 方法，该方法仅需在整个测试类执行之后运行一次。此方法可用于执行一些清理活动。 |\n| `@Ignore` | `org.junit.Ignore` | 使用\
  \ `@Ignore` 注解标记方法，该方法不应被执行。 |\n\n#### JUnit 4 断言方法\n\nJUnit 框架提供了 `org.junit.Assert`\
  \ 类，其中包含一组断言方法，可用于编写单元测试以测试特定条件。这些方法将预期值与实际值进行比较，以验证测试结果。表 6-7 列出了 JUnit 4 提供的一些断言方法。\n\
  \n表 6-7.\n\nJUnit 框架中的断言方法\n\n| 断言方法 | 描述 |\n| --- | --- |\n| `assertTrue(boolean\
  \ expected, boolean actual)` | 此方法检查布尔条件是否为真。 |\n| `assertFalse(boolean condition)`\
  \ | `assertFalse` 方法检查布尔条件是否为假。 |\n| `assertEquals(boolean expected, expected, actual)`\
  \ | `assertEquals` 使用 `equals()` 方法比较任意两个对象是否相等。 |\n| `assertEquals(boolean expected,\
  \ expected, actual, tolerance)` | `assertEquals` 方法比较 float 或 double 值，tolerance\
  \ 定义了必须相同的小数位数。 |\n| `assertNull(Object object)` | `assertNull` 测试给定对象是否为 null。\
  \ |\n| `assertNotNull(Object object)` | `assertNotNull` 测试给定对象是否不为 null。 |\n| `assertSame(Object\
  \ object1,Object object2)` | `assertSame` 方法测试两个对象是否引用同一个对象。 |\n| `assertNotSame(Object\
  \ object1,Object object2)` | `assertNotSame` 方法测试两个对象是否不引用同一个对象。 |\n\n#### 示例：实现\
  \ JUnit 4\n\n让我们开发一个简单的应用程序来对两个数进行加法运算，如清单 6-14 所示。\n\n```\npackage com.apress.ravi.chapter6.SpringTesting;\n\
  public class SimpleCalculator {\npublic long addOperation(int x, int y) {\nreturn\
  \ x + y;\n}\n}\n清单 6-14.\n执行加法运算的简单计算器\n```\n\n请注意，需要将 JUnit4 JAR 添加到应用程序的 `CLASSPATH`\
  \ 中，才能编译和运行为 JUnit 4 创建的测试用例。\n\n现在，你将使用 JUnit 4 测试 `SimpleCalculator` 类中的简单 `addOperation`\
  \ 方法。STS IDE 支持通过向导创建 JUnit 测试。你将创建测试类 `SimpleCalculatorTests`，如清单 6-15 所示。\n\n\
  ```\npackage com.apress.ravi.chapter6.SpringTesting;\nimport static org.junit.Assert.assertEquals;\n\
  import org.junit.After;\nimport org.junit.Before;\nimport org.junit.Test;\npublic\
  \ class SimpleCalculatorTests {\nprivate SimpleCalculator simpleCalculator;\n@Before\n\
  public void setup() {\nsimpleCalculator = new SimpleCalculator();\n}\n@Test\npublic\
  \ void verifyAdd() {\nlong sum = simpleCalculator.addOperation(2, 1);\nassertEquals(3,\
  \ sum);\n}\n@After\npublic void teardown() {\nsimpleCalculator = null;\n}\n}\n清单\
  \ 6-15.\n测试加法操作方法\n```\n\n在清单 6-15 中，`setup` 方法使用 `@Before` 注解进行标记，以执行实例成员变量的初始化，并指示\
  \ JUnit 在 `SimpleCalculatorTests` 类中任何测试方法执行之前运行此 setup 方法。`teardown` 方法使用 `@After`\
  \ 注解进行标记，并指示 JUnit 在 `SimpleCalculatorTests` 类中任何测试方法执行之后运行 teardown 方法以执行清理。\n\n\
  `verifyAdd` 方法使用 `@Test` 注解进行标记，以将 `verifyAdd` 标识为 JUnit 测试方法。`verifyAdd` 方法包含确保你的生产代码按预期工作的代码。\n\
  \n现在，通过右键单击测试类并选择“RUN AS JUnit test”来运行你的测试用例。JUnit 视图有助于验证测试的成功或失败。成功通过 JUnit 测试后，结果视图将显示一个绿色条，如图\
  \ 6-1 所示。\n\n![A436970_1_En_6_Fig1_HTML.jpg](img/A436970_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1.\n\n绿色条表示测试成功通过\n\n当 JUnit 测试失败时，结果视图将显示一个红色条，如图 6-2 所示。\n\n![A436970_1_En_6_Fig2_HTML.jpg](img/A436970_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2.\n\n红色条表示测试失败\n\n```\n@Test\npublic void verifyAdd() {\nlong sum = simpleCalculator.addOperation(2,\
  \ 1);\nassertEquals(2, sum);\n}\n```\n\n## 敏捷软件测试\n\n在软件开发领域，敏捷指的是一种项目管理方法，团队在应用程序新模块的开发过程中，专注于协作、灵活性、简单性和响应性等原则。当使用敏捷软件方法论时，团队以称为冲刺的较小单元交付项目或分配的工作，并与包括利益相关者在内的跨职能团队持续协作。这种特定的方法论本质上是增量式和迭代式的，侧重于有效交付分配的工作。\n\
  \n敏捷软件测试是指在敏捷工作流背景下，对软件进行任何错误和性能问题测试的实践。它包括单元测试和集成测试。以下部分将帮助你理解单元测试和集成测试的目标。\n\n\
  ### 单元测试\n\n单元测试是指测试代码中的单个功能/方法。单元测试由软件开发人员编写，用于测试其代码中的基本功能片段并防止错误。\n\n“被测类”这一概念指的是，每当你编写任何单元测试用例时，你都会针对一个正在被测试的类创建一个测试类，并且你必须为该类编写单元测试用例，如图\
  \ 6-3 所示。\n\n![A436970_1_En_6_Fig3_HTML.jpg](img/A436970_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3.\n\n被测类及其依赖项\n\n让我们举一个例子，你有两个名为 `UserRegistrationService` 和 `UserRegistrationDAO`\
  \ 的类，用于通过与数据库交互来执行 CRUD 操作。`UserRegistrationService` 类需要 `UserRegistrationDAO` 对象来从数据库加载用户列表。这个\
  \ `UserRegistrationDAO` 对象是一个真实对象，因此在测试你的 `UserRegistrationService` 类时，你需要有一个与数据库有效连接的\
  \ `UserRegistrationDAO` 对象。你还必须在数据库中插入一个用户用于测试。设置数据库连接、向数据库插入用户，然后测试 `UserRegistrationService`\
  \ 类可能工作量很大。\n\n\n\n#### 使用模拟对象对依赖类进行单元测试\n\n你可以通过创建一个伪造的 `UserRegistrationDAO` 实例来减少工作量，该实例将返回预期的用户列表，并将其传递给\
  \ `UserRegistrationService`。这个伪造的 `UserRegistrationDAO` 不会与数据库建立连接。这个伪造的 `UserRegistrationDAO`\
  \ 对象被称为模拟对象，它是 `realUserRegistrationDAO` 对象的替代品。这将简化对 `UserRegistrationService`\
  \ 类的测试。图 6-4 展示了如何为被测类模拟一个依赖项。\n\n![A436970_1_En_6_Fig4_HTML.jpg](img/A436970_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4.\n被测类中的模拟依赖对象\n\n##### Mockito 框架\n\nMockito 框架是一个用于创建和配置模拟对象的开源模拟框架。\n\n\
  再次说明，模拟对象是一个模仿真实对象的假对象，而创建假对象的过程称为模拟。Java 中有多个可用于模拟的库，例如 EasyMock 和 Mockito。\n\n\
  要使用 Mockito，你需要在应用程序上下文中拥有 Mockito JAR 以及 JUnit。Mockito 支持如下列出的字段级注解：\n\n*   `@Mock`：此注解用于为被注解的字段创建一个模拟对象。\n\
  *   `@Spy`：此注解为其注解的真实对象字段创建一个间谍，当监视或存根其特定方法时，这可以被称为部分模拟。\n*   `@RunWith(MockitoJUnitRunner.class)`：使用\
  \ `@Mock` 注解和 `@Spy` 注解创建模拟对象需要将 `@RunWith(MockitoJUnitRunner.class)` 注解应用于你的测试类。当\
  \ `MockitoJUnitRunner` 执行单元测试时，所有被注解的字段都将创建模拟和间谍对象。\n\n请参考 [`http://mockito.org/`](http://mockito.org/)\
  \ 获取关于 Mockito 框架的更多详细信息。\n\n### 集成测试\n\n在集成测试中，各个模块被组合在一起，并作为一个整体进行逻辑测试。软件开发阶段的集成测试发生在单元测试之后。\n\
  \n## 测试 Spring Boot 应用程序\n\nSpring 框架中的 `spring-test` 模块通过提供丰富的注解集、工具类和模拟对象，允许开发人员执行单元测试和集成测试。让我们通过使用所需的依赖项更新\
  \ Maven `pom.xml` 文件来设置环境。\n\n### Maven 依赖\n\nSpring Boot 提供了名为 `spring-boot-starter-test`\
  \ 的启动器 POM，它会自动将 `spring-test` 模块添加到 Spring Boot 应用程序中。清单 6-16 展示了 `pom.xml` 中的依赖项。\n\
  \n```\norg.springframework.boot\nspring-boot-starter-test\ntest\n\n清单 6-16.\npom.xml\
  \ 中的依赖项\n```\n\n这个启动器 POM 将 JUnit（Java 应用程序单元测试的事实标准）、AssertJ（一个断言库）、Mockito（一个\
  \ Java 模拟框架）以及 [Spring Test](http://docs.spring.io/spring/docs/4.3.10.RELEASE/spring-framework-reference/htmlsingle/#integration-testing%23_top)\
  \ 和 Spring Boot Test（用于 Spring Boot 应用程序的工具和集成测试支持）引入到你的应用程序中，如图 6-5 所示。\n\n![A436970_1_En_6_Fig5_HTML.jpg](img/A436970_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5.\n类路径中的 JAR\n\n### Spring 测试中的注解\n\nSpring 框架提供了不同的注解，开发人员可以使用它们来执行单元测试和集成测试。\n\
  \n让我们检查典型的测试用例，以理解 `spring-test` 模块和 Spring 框架提供的注解。清单 6-17 展示了一个使用 Spring Boot\
  \ Test 构建的 Spring Test 示例。\n\n```\npackage com.apress.ravi.chapter6.UserRegistrationSystem;\n\
  import org.junit.After;\nimport org.junit.Before;\nimport org.junit.Test;\nimport\
  \ org.junit.runner.RunWith;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
  import org.springframework.test.context.junit4.SpringRunner;\n@RunWith(SpringRunner.class)\n\
  @SpringBootTest(classes = UserRegistrationSystemApplication.class,\nwebEnvironment\
  \ = WebEnvironment.RANDOM_PORT)\npublic class UserRegistrationSystemApplicationTests\
  \ {\n@Before\npublic void setup() {\n}\n@Test\npublic void testFunction() {\n}\n\
  @After\npublic void teardown() {\n}\n}\n清单 6-17.\n使用 Spring Boot Test 进行单元测试\n```\n\
  \n清单 6-17 包含三个方法：`setup`、`testFunction` 和 `teardown`。每个方法都使用了 JUnit 注解进行标注。\n\n\
  *   `@RunWith(SpringRunner.class)`：`@RunWith(SpringRunner.class)` 注解指示 JUnit 使用\
  \ `SpringJUnit4ClassRunner` 类来运行测试用例。`SpringRunner` 类扩展了 `SpringJUnit4ClassRunner`\
  \ 类。`@RunWith` 注解是一个 JUnit 注解；它执行被 `@RunWith` 注解标注的类中的测试，或者执行扩展了另一个被 `@RunWith`\
  \ 注解标注的类中的测试。这意味着被注解的测试类不会由 JUnit 框架中的内置 API 执行。相反，它将使用 `SpringJUnit4ClassRunner`\
  \ 在 `SpringApplicationContext` 环境中运行测试用例。\n*   `@SpringBootTest`：Spring Boot 提供了\
  \ `@SpringBootTest` 注解，用于在 Spring Boot 的支持下启动；当你需要 Spring Boot 特性时，它是标准 Spring Test\
  \ 的 `@ContextConfiguration` 注解的替代方案。`@ContextConfiguration` 注解用于为测试类测试应用程序上下文。它会缓存\
  \ `ApplicationContext` 并将其放入静态内存中，持续整个测试或测试套件的时间，并且整个测试在同一个 JVM 中执行，因为 `ApplicationContext`\
  \ 存储在静态内存中。\n*   `webEnvironment`：`@SpringBootTest` 的 `webEnvironment` 属性为测试配置 Web\
  \ 环境。它允许开发人员使用模拟的 Servlet 环境或运行在 `DEFINED_PORT` 或 `RANDOM_PORT` 上的真实 HTTP 服务器进行测试。\n\
  *   `classes`：你可以使用 `@SpringBootTest` 的 `classes` 属性来加载特定的配置。默认情况下，它会搜索 `@SpringBootApplication`\
  \ 类来加载 `@Configuration`。\n\n\n\n### REST 控制器单元测试\n\nSpring 框架中的控制反转（IoC）通过提供依赖注入简化了单元测试。通过允许开发者隔离测试代码，可以轻松地使用预期行为来模拟依赖关系。\n\
  \n测试 Spring MVC 控制器的传统方法遵循这一概念。清单 6-18 展示了 `UserRegistrationRestController` 类中 `listAllUsers`\
  \ 方法的单元测试。\n\n```\npackage com.apress.ravi.chapter6.UserRegistrationSystem;\nimport\
  \ java.util.ArrayList;\nimport java.util.List;\nimport static org.mockito.Mockito.when;\n\
  import org.junit.After;\nimport org.junit.Assert;\nimport org.junit.Before;\nimport\
  \ org.junit.Test;\nimport org.junit.runner.RunWith;\nimport org.mockito.Mock;\n\
  import org.mockito.Spy;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
  import org.springframework.boot.test.context.SpringBootTest.WebEnvironment;\nimport\
  \ org.springframework.http.HttpStatus;\nimport org.springframework.http.ResponseEntity;\n\
  import org.springframework.test.context.junit4.SpringRunner;\nimport org.springframework.test.util.ReflectionTestUtils;\n\
  import com.apress.ravi.chapter2.UserRegistrationSystemApplication;\nimport com.apress.ravi.chapter2.Rest.UserRegistrationRestController;\n\
  import com.apress.ravi.chapter2.dto.UsersDTO;\nimport com.apress.ravi.chapter2.repository.UserJpaRepository;\n\
  @RunWith(SpringRunner.class)\n@SpringBootTest(classes = UserRegistrationSystemApplication.class,\n\
  webEnvironment = WebEnvironment.RANDOM_PORT)\npublic class UserRegistrationRestControllerTest{\n\
  @Spy\nprivate UserRegistrationRestController userRegistrationRestController;\n@Mock\n\
  private UserJpaRepository userJpaRepository;\n@Before\npublic void setup() {\nuserRegistrationRestController\
  \ = new UserRegistrationRestController();\nReflectionTestUtils.setField(userRegistrationRestController,\n\
  \"userJpaRepository\", userJpaRepository);\n}\n@Test\npublic void testListAllUsers()\
  \ {\nList userList = new ArrayList();\nuserList.add(new UsersDTO());\nwhen(this.userJpaRepository.findAll()).thenReturn(userList);\n\
  ResponseEntity> responseEntity =\nthis.userRegistrationRestController.listAllUsers();\n\
  Assert.assertEquals(HttpStatus.OK, responseEntity.getStatusCode());\nAssert.assertEquals(1,\
  \ responseEntity.getBody().size());\n}\n@After\npublic void teardown() {\nuserRegistrationRestController\
  \ = null;\n}\n}\n清单 6-18.\nREST 控制器单元测试\n```\n\n在清单 6-18 中，你在 `src/test/java` 文件夹下的\
  \ `com.apress.ravi.chapter` `6` `.UserRegistrationSystem` 包中创建了一个 `UserRegistrationRestControllerTest`\
  \ 测试类。你使用 `@RunWith(SpringRunner.class)` 注解标记了该类，该注解支持模拟依赖的 `Object`，以及 `@SpringBootTest`\
  \ (`classes = UserRegistrationSystemApplication.class, webEnvironment = WebEnvironment.RANDOM_PORT)`\
  \ 注解。`webEnvironment=RANDOM_PORT` 部分会以随机端口启动服务器（有助于避免测试环境中的端口冲突）。\n\n`UserRegistrationRestControllerTest`\
  \ 类使用 Mockito 的 `@Spy` 注解来监视 `UserRegistrationRestController`。该测试类使用 `@Mock` 注解来模拟\
  \ `UserRegistrationRestController` 的唯一依赖：`UserJpaRepository`。\n\n在 setup 方法中，你创建了一个\
  \ `UserRegistrationRestController` 实例，并通过调用 Spring 的 `ReflectionTestUtils` 工具类的\
  \ `setField` 方法，将模拟的 `UserJpaRepository` 注入其中。你使用 `@Before` 注解标记了 setup 方法。\n\n\
  在 `testListAllUsers` 方法中，你使用了 Mockito 的 `when` 和 `thenReturn` 方法来设置 `UserJpaRepository`\
  \ 模拟对象的行为。你还指定了当调用 `UserJpaRepository` 的 `findAll` 方法时，应返回一个用户列表。最后，你调用了 `listAllUsers`\
  \ 方法并断言了控制器的返回值。\n\n在 teardown 方法中，你将 `UserRegistrationRestController` 赋值为 null，并使用\
  \ `@After` 注解标记了该方法。\n\n当你以 JUnit 测试方式运行该测试类时，可以在 JUnit 视图中查看结果，如图 6-6 所示。\n\n![A436970_1_En_6_Fig6_HTML.jpg](img/A436970_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6.\n\nJUnit 视图\n\n如图 6-6 所示，`UserRegistrationRestControllerTest` 被视为一个 POJO，因此并未测试控制器的请求映射验证。因此，在下一节中，你将使用\
  \ Spring MVC 测试框架，该框架允许你将控制器作为 MVC 控制器进行测试。这样，`DispatcherServlet` 将拦截请求并生成响应，其方式与在实际启动\
  \ Web 服务器时在 Web 容器中运行相同。\n\n### 使用 Spring MVC 测试框架测试 Web 层\n\n在本节中，你将使用 `@WebMvcTest`\
  \ 注解进行测试，该注解可与 `@RunWith(SpringRunner.class)` 结合用于典型的 Spring MVC 测试，并且当测试仅关注 Spring\
  \ MVC 组件时可以使用。使用 `@WebMvcTest` 注解的测试类将自动配置 `MockMvc`（包括对 HtmlUnit WebClient 和 Selenium\
  \ WebDriver 的支持）。\n\n通常，`@WebMvcTest` 与 `@MockBean` 结合使用，以创建 `@Controller` Bean\
  \ 所需的任何协作者。要开始使用 Spring MVC 测试框架，你需要熟悉 `MockMVC`。\n\n\n\n#### MockMvc\n\n`MockMvc`\
  \ 类是 Spring MVC 测试框架的核心类。`org.springframework.test.web.servlet.MockMvc` 类可用于为使用\
  \ Spring MVC 框架开发的应用程序编写测试。`MockMvc` 类可用于执行 HTTP 请求。\n\n`MockMvc` 模拟了整个 Spring 基础设施，并通过\
  \ `org.springframework.test.web.servlet.MockMvcBuilder` 接口的实现来创建，这使得 Spring MVC\
  \ 测试框架大量使用了构建器模式。\n\n`MockMvc` 类包含 `perform` 方法，该方法可通过传递相对路径来运行测试用例。之后，可以使用 `Expect`\
  \ 方法来验证控制器内的不同组件。\n\n`andExpect (status().OK())` 行可用于验证 200 状态码。类似地，还可以执行 `contentType`\
  \ 验证、XPath 验证、数据验证模型、URL 验证等。\n\n让我们在 `src/test/java` 文件夹下的 `com.apress.ravi.chapter`\
  \ `6` `.UserRegistrationSystem` 包中创建 `UserRegistrationControllerTest` 类，如代码清单 6-19\
  \ 所示，以演示如何测试 `UserRegistrationRestController` 的 `getUserById` 方法。你还需要模拟控制器所需的依赖项。\n\
  \n```\npackage com.apress.ravi.chapter6.UserRegistrationSystem;\nimport static org.hamcrest.Matchers.is;\n\
  import static org.mockito.Mockito.when;\nimport static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultHandlers.print;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.jsonPath;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
  import java.nio.charset.Charset;\nimport org.junit.Before;\nimport org.junit.Test;\n\
  import org.junit.runner.RunWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\nimport\
  \ org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.http.MediaType;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit4.SpringRunner;\n\
  import org.springframework.test.web.servlet.MockMvc;\nimport com.apress.ravi.chapter2.UserRegistrationSystemApplication;\n\
  import com.apress.ravi.chapter2.Rest.UserRegistrationRestController;\nimport com.apress.ravi.chapter2.dto.UsersDTO;\n\
  import com.apress.ravi.chapter2.repository.UserJpaRepository;;\n@RunWith(SpringRunner.class)\n\
  @WebMvcTest(controllers = UserRegistrationRestController.class)\n@ContextConfiguration(classes\
  \ = UserRegistrationSystemApplication.class)\npublic class UserRegistrationControllerTest\
  \ {\n@Autowired\nprivate MockMvc mockMvc;\n@MockBean\nprivate UserJpaRepository\
  \ userJpaRepositoryMock;\nprivate MediaType contentType;\nprivate UsersDTO user;\n\
  @Before\npublic void setup() {\ncontentType = new MediaType(MediaType.APPLICATION_JSON.getType(),\n\
  MediaType.APPLICATION_JSON.getSubtype(),\nCharset.forName(\"utf8\"));\nuser = new\
  \ UsersDTO();\nuser.setName(\"Ravi Kant Soni\");\nuser.setAddress(\"JP Nagar; Bangalore;\
  \ India\");\nuser.setEmail(\"ravikantsoni.author@gmail.com\");\n}\n@Test\npublic\
  \ void shouldReturnSuccessMessage() throws Exception {\nwhen(this.userJpaRepositoryMock.findById(1L)).thenReturn(user);\n\
  this.mockMvc.perform(get(\"/api/user/1\"))\n.andExpect(status().isOk())\n.andExpect(content().contentType(contentType))\n\
