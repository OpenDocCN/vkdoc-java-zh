- "# 1. 全栈 Web 开发的宏观图景\n\n全栈 Web 开发让你能够探索最佳的工具和框架，同时让你的应用程序在设计、可扩展性、健壮性和安全性等不同方面都变得稳固可靠。\n\
  \n在本章中，我将概述全栈 Web 开发的宏观图景，并讨论现代应用程序的架构，以打破“开发孤立的桌面和移动应用是一种好方法”这一迷思。我将讨论作为前端框架的 AngularJS\
  \ 和作为后端框架的 Spring Boot。我还将展示如何将 Spring Boot 设置为开发环境。然后，你将开发你的第一个 Spring Boot 应用程序并运行它。最后，你将使用\
  \ Spring Boot Actuator 监控你的 Spring Boot 应用程序。\n\n## 什么是全栈开发者？\n\n每当有人告诉你他们是全栈开发者时，你可能会问的第一个问题是：“你是哪种全栈开发者？”\
  \ 问题是，如今当你从事 Web 开发时，你必须使用大量的工具。技术栈已经变得比以前更庞大了。\n\n如今的公司更倾向于雇佣那些足够灵活、能够处理各种事务的工程师，而不是那些只精通单一技术的人。最终目标是，你将能够编写\
  \ Java 代码、使用 Angular、编写数据库脚本、编写 CSS 等等。事实上，几年前，说自己是全栈开发者很容易，但今天，你必须同时处理 Java、AngularJS、Bootstrap、CSS、数据库脚本以及多种数据库，而且你还需要了解内容交付、部署以及如何发布到\
  \ Amazon Web Services 集群。不用说，同时管理所有这些事情是很复杂的。我甚至还没有提到设计 UI 和创建移动应用等领域。所以，当你说自己是全栈开发者时，需要了解的东西非常多。\n\
  \n全栈开发者是对所有这些主题都略知一二，还是精通所有？很多时候，全栈开发者被认为是“万金油”，但样样不精。因此，最好明确自己是哪种类型的全栈开发者。\n\n\
  成为一名全栈开发者意味着你基本上需要成为一个连接者。所以，即使你只擅长某一套技能，你也可以准备好你的工作成果以便交付，这样另一个人就能在另一端接手他们的工作，并知道如何接收它。这就是全栈开发者非常有价值的地方。\n\
  \n但是，找到一位优秀的全栈开发者的几率极低。问题是，初创公司总是需要一位能够关注所有方面的全栈开发者，而初创公司总是急于不惜重金雇佣全栈开发者。\n\n行业中全栈开发者的定义是：一位精通从客户端编码（如\
  \ HTML、CSS 和 AngularJS）到服务器端（如 Java 和 Spring Boot）所有方面，并且对各种数据库（包括 RDBMS 和 NoSQL\
  \ 数据库系统）都有经验的工程师。因此，一个全栈 Web 开发者应该对客户端和服务器端技术都有良好的实践经验，如图 1-1 所示。\n\n![A436970_1_En_1_Fig1_HTML.jpg](img/A436970_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1.\n\n客户端和服务器端技术\n\n全栈开发者负责确保系统的每个部分都能平稳运行。开发者应具备以下方面的专业知识：\n\n*   设计用户界面\n\
  *   在服务器端开发业务逻辑和服务层\n*   处理关系型和非关系型数据库\n*   处理 API 交互\n*   通过编程方式使用身份验证和授权来保护应用程序\n\
  *   确保质量保证\n*   理解业务需求和客户需求\n\n除此之外，全栈开发者还必须知道如何进行基本的服务器管理，在必要时承担服务器管理员或 DevOps\
  \ 的角色。\n\n*   通过命令或终端连接到云服务器，并访问诸如 `putty` 之类的工具\n*   管理用户和组的集合与子集\n*   在指定的服务器环境中进行基本的\
  \ Shell 脚本编写\n*   理解 Apache 和 Nginx 服务器程序\n*   管理防火墙和权限\n*   安装、更新和管理服务器端软件、包和库\n\
  \n此外，随着云基础设施的发展，全栈开发者应该了解平台即服务（PaaS）和软件即服务（SaaS）模型、Amazon Web Services 以及 IBM Bluemix。\n\
  \n本节内容全是关于成为一名全栈 Web 开发者。让我们在下一节深入探讨全栈开发的宏观图景。\n\n## 全栈 Web 开发\n\n技术栈是构成应用程序的工具和组件的组合。在\
  \ Web 应用程序中，组件可以位于前端（HTML、CSS、JavaScript/jQuery）或后端（服务器操作、逻辑层和数据库）。请注意，由于数据库即服务（DaaS）的出现，如今数据库可以放在一个单独的部分，而不是服务器端操作中。\n\
  \n全栈 Web 开发意味着能够自如地处理前端和后端技术。简单来说，全栈开发涵盖了使用 HTML/CSS、JavaScript/jQuery 以及诸如 AngularJS\
  \ 和 Bootstrap 等框架进行的客户端开发。\n\n对于服务器端开发，它涵盖了诸如 Java 等编程语言、诸如 Spring Boot 等框架、诸如 PostgreSQL\
  \ 或 Oracle 或任何其他数据库，以及介于两者之间的所有内容。\n\n客户端和服务器端之间的通信通过 RESTful API 和 HTTP 进行，如图 1-2\
  \ 所示。让我们在下一节讨论现代 Web 应用程序的架构。\n\n![A436970_1_En_1_Fig2_HTML.jpg](img/A436970_1_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2.\n\n客户端与服务器之间的通信\n\n\n\n## 现代 Web 应用的架构\n\n在 Web 早期，并不存在 Web 应用。我们只有充满静态内容和图片的网站。这种方式有利有弊。\n\
  \n以下是一些优点：\n\n*   服务器端的计算开销非常低。\n*   由于数据是静态的，且对众多 ISP 和服务提供商来说不会改变，因此内容本身具有很高的可缓存性。\n\
  \n以下是一些缺点：\n\n*   更新内容很困难。\n*   没有个性化，所有用户获得的体验相同。\n*   与当今的应用相比，用户界面通常很差。\n\nCGI\
  \ 通过使用脚本语言实现动态内容创建，引发了一场革命。其缺点是计算开销相对较高，并且要求你成为 HTML 和服务器端脚本语言的专家。\n\n随后，JavaScript\
  \ 出现了，它首次使页面具备了动态能力。它主要用于非常基础的脚本编写，例如验证表单或显示弹窗广告。它增强了可用性，并减少了因基础验证而导致的与服务器的往返通信。缺点是你必须将业务逻辑实现两次：一次在客户端，一次在服务器端。因此，我们提出了现代\
  \ Web 应用的架构。\n\n在本节中，我将讨论现代应用的架构，以打破“开发独立的桌面和移动应用是正确方向”这一迷思。现代 Web 应用专注于构建分布式后端基础设施，通过\
  \ RESTful API 在 Web 上提供内容并服务于前端客户端，如图 1-3 中 Web 应用的分层架构所示。\n\n![A436970_1_En_1_Fig3_HTML.jpg](img/A436970_1_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3.\n\n现代 Web 应用的分层架构\n\n当你想要与页面上的多个组件交互，而这些组件又包含许多中间组件时，让所有中间组件都实现服务器端渲染会变得很困难。与传统的服务器端架构相比，这里的主要思想是将服务器构建为一组无状态、可复用的\
  \ REST 服务。从模型-视图-控制器（MVC）的角度来看，控制器已从后端移除并移到了客户端。因此，现在客户端能够使用 MVC 架构。客户端拥有一个独立的视图层，包含所有展示逻辑。它还有独立的前端服务层和控制器层。\n\
  \n在应用初始启动时，只有 JSON 数据通过 RESTful API 在客户端和服务器之间传输。整个业务逻辑将暴露为 REST 端点，供 Angular 服务消费。这样做的好处是，当你的\
  \ Web 应用有对应的移动应用时，你可以直接消费这些 RESTful 服务，而无需为移动应用在服务器端编写任何额外的代码。\n\nREST 代表表述性状态转移，它是一种架构风格，是对具体事物的一种抽象。它是当今\
  \ Web 运作的架构。你将在第 2 章中更详细地学习 RESTful API，届时你将为自己的应用创建 RESTful 层。\n\n## 前端 vs. 后端\n\
  \n当你开发一个 Web 应用时，你主要将开发过程分为两部分：前端和后端。当你谈论 Web 应用或移动应用时，基本上关注的是前端开发。当你使用任何 Web 应用或浏览器时，你输入地址，网站会打开包含文本、图片、表单和不同交互元素等多个元素的页面。图\
  \ 1-4 展示了前端和后端的物理视图。\n\n![A436970_1_En_1_Fig4_HTML.jpg](img/A436970_1_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4.\n\n前端和后端的物理视图\n\n如果你使用移动应用，你会看到不同的元素、列表视图等。这些应用会出现在客户端。因此，无论你使用的是笔记本电脑、移动设备，还是浏览器或移动应用，你都会接触到完整应用的客户端部分。\n\
  \n所有用户数据都存储在数据库中。所有业务逻辑和安全数据都存储在服务器上。服务器接收来自 Web 应用或移动应用的请求，处理这些请求，从数据库或文件服务器中获取必要的信息，并将其发送回前端应用。所以，基本上，后端存储信息，前端展示信息。\n\
  \n设计师和开发者通常使用框架来构建网站和应用的雏形，因为从头开始构建应用或网站需要花费大量时间。\n\n软件框架被定义为：一组预定义的可复用模块，可以实现这些模块以更好、更快地完成指定任务。因此，一个软件框架总是包含库、编译器以及多个\
  \ API，用于开发特定的企业级 Web 应用。一个优秀的全栈开发者应该知道哪个框架最适合他们那套应用的实现。\n\n以下是一些流行的软件框架：\n\n*  \
  \ AngularJS（用于 UI/前端开发）\n*   Ionic（用于混合移动应用原型设计和开发）\n*   Pure MVC 框架（应用开发框架）\n*\
  \   Selenium（Web 测试框架）\n\n在计算机编程中，软件框架是一种抽象，其中提供通用功能的软件可以通过额外的用户编写代码进行选择性更改，从而提供特定于应用的软件。\n\
  \n## 前端框架\n\n前端涉及用户看到的一切，包括设计以及 HTML 和 CSS 等语言。前端代码的主要目的是与用户交互，并以定义良好的样式呈现数据。\n\n\
  在构建前端应用时，有非常多令人惊叹的 JavaScript 库可供使用。有时，选择一个单一的项目可能会有点棘手。前端就是让 Web 应用看起来和用起来都“性感”的所有东西。这些前端内容包括\
  \ HTML、CSS 和 JavaScript。在本书中，你将使用 AngularJS 作为前端开发框架。我将在本章后面更详细地介绍 AngularJS。\n\n\
  ### AngularJS 作为前端框架\n\nAngularJS 是一个用 JavaScript 编写的库，用于 Web 应用开发。它解决了单页应用（SPA）的挑战。一个\
  \ AngularJS Web 应用遵循 MVC 设计模式，从而开发出可扩展、可维护、可测试且标准化的 Web 应用。AngularJS 的数据绑定和依赖注入使其成为任何服务器技术的理想搭档，因为它消除了许多你原本必须编写的代码，并且这一切都发生在浏览器内部。\n\
  \n#### AngularJS 版本\n\nAngularJS 通常被称为 Angular.js，有时也称为 AngularJS 1.x。AngularJS\
  \ 是一个基于 JavaScript 的开源前端 Web 应用开发框架，主要由 Google 维护。\n\n现在，Angular 4.0.0 已经可用，并且对于大多数应用来说，它与\
  \ 2.x.x 版本向后兼容。这个新版本包含一些新特性，例如将动画包从核心中分离出来，放入其自己的包中，以及改进了支持`if/else`风格的`ngIf`等。\n\
  \n\n\n#### AngularJS 架构概念\n\n现在，你将了解 AngularJS 的架构概念。当一个 HTML 文档被加载到浏览器并由浏览器解析时，会发生以下过程：\n\
  \n1.  AngularJS JavaScript 文件被加载，并创建 Angular 全局对象。注册控制器函数的 JavaScript 文件被执行。\n2.\
  \  AngularJS 扫描 HTML 以查找 AngularJS 应用和视图，并找到与视图对应的控制器函数。\n3.  AngularJS 执行控制器函数，并使用由控制器填充的模型中的数据更新视图。\n\
  4.  AngularJS 监听浏览器事件，例如按钮点击、鼠标移动、输入字段变化等。如果这些事件中的任何一个发生，AngularJS 将相应地更新视图。\n\n\
  图 1-5 展示了 AngularJS 的工作流程图。\n\n![A436970_1_En_1_Fig5_HTML.jpg](img/A436970_1_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5.\n\nAngularJS 工作流程图\n\nAngularJS 包含模块，这些模块充当不同类型应用的容器，例如视图、控制器、指令、服务等。模块指定了应用如何被引导启动。然后，你还有一个配置组件。\n\
  \n路由用于将 URL 链接到控制器和视图。视图用于处理复杂的事件。它使用 `ng-view` 指令。控制器控制 AngularJS 应用的数据，这些数据由常规的\
  \ JavaScript 对象组成。AngularJS 定义了一个 `ng-controller` 指令，该指令通过使用控制器函数来创建新的控制器对象。\n\n\
  AngularJS 带有几个内置服务，例如 `$http`、`$route`、`$window`、`$location` 等。作用域由引用模型的对象组成。它们在连接控制器与视图方面扮演着重要角色。我们将在第\
  \ 3 章中更详细地讨论这些内容。\n\n##### MVC 架构\n\nAngularJS 使用 MVC 架构来创建 Web 应用。MVC 架构是一种编程方法论，旨在将应用拆分为三个核心组件：模型、视图和控制器。这三个组件组合起来构成你的应用。图\
  \ 1-6 展示了模型-视图-控制器架构。\n\n![A436970_1_En_1_Fig6_HTML.jpg](img/A436970_1_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6.\n\nAngularJS 中的 MVC 架构\n\n当用户通过浏览器发送 HTTP 请求时，该请求由控制器接收。控制器处理该请求，并将其发送给模型以提供相应的数据。作为响应，模型将结果数据数组再次返回给控制器。控制器再次将数据处理成所需格式，并将其发送给视图。视图通过\
  \ UI 内容呈现数据，并将其发送给控制器。最后，控制器将 HTTP 响应发送回浏览器。\n\n*   AngularJS 视图用于在 Web 浏览器中向用户生成信息的输出表示，例如图表或示意图。AngularJS\
  \ 通过拉取为应用定义的所有模板，在文档对象模型（DOM）中构建视图。因此，开发人员在此的工作主要是使用 HTML 和 CSS 来创建模板。\n*   AngularJS\
  \ 模型包含用于存储应用模型的 `$scope` 对象，因此无需像其他 JavaScript 客户端框架那样创建 JavaScript 模型类。作用域附加到 DOM\
  \ 上，这有助于大大简化 JavaScript 问题。\n*   AngularJS 控制器是定义特定于某个视图的所有业务逻辑的地方。控制器将模型和视图结合在一起。\n\
  \n### Twitter Bootstrap\n\nTwitter Bootstrap 是一个前端框架，旨在使响应式设计变得更加容易。Bootstrap CSS\
  \ 框架可用于设置网站内容的样式。你可以创建自己的 CSS 样式来使网站看起来很棒，但 Bootstrap 提供了一套不错的 CSS 样式，让你能够设计出外观非常出色的内容布局。在使用\
  \ AngularJS 时，并非必须使用 Bootstrap，并且 AngularJS 和 Bootstrap 之间没有内在关系，因为它们是不同的软件包。\n\n\
  要使用 Bootstrap CSS 框架中的 CSS，你可以在开发 Spring Boot 应用时，在 `pom.xml` 中定义一个依赖项，这样它就会被自动下载到库文件夹中。此外，你也可以从\
  \ [`https://getbootstrap.com/`](https://getbootstrap.com/) 下载 Bootstrap 归档文件，其中也包含\
  \ CSS 和 JavaScript 文件。\n\n## 后端框架\n\n任何应用的后端代码都可以被视为该应用的大脑。后端代码是使用服务器端语言和数据库构建的，并且对用户不可见。前端代码与最终用户实时交互，而浏览器中网站上显示的任何内容，都是因为在服务器上执行了查询，后端代码与服务器交互，将用户可用的数据返回给前端。\n\
  \n开发人员使用 Java 等服务器端代码构建应用的后端代码，这些代码与数据库连接以保存或更新数据，并以前端代码的形式将其返回给最终用户。这种后端代码结构有助于开发人员开发应用，以实现在现代互联网世界中进行在线购物、社交互动、查找实时信息以及执行更多操作。\n\
  \n有许多可用的框架和库可以使后端编码更简单、性能更快。本书中将全程使用的最流行的一个是 Spring 框架。Spring 框架一直因在企业应用中构建后端功能而广受欢迎，而有了\
  \ Spring Boot，开发人员的工作从未如此轻松。\n\n### Spring Boot 作为后端框架\n\n为什么选择 Spring Boot？有很多用于开发\
  \ Web 应用的框架，Spring Boot 只是其中之一。如果你想快速构建某些东西，Spring Boot 可以作为 Web 应用开发框架的首选。\n\n\
  > 使用 Spring Boot 就像与 Spring 开发者进行结对编程。 —— Josh Long @starbuxman\n\nPivotal 团队设计了一个名为\
  \ Spring Boot 的新轻量级框架，旨在以最小的麻烦简化独立、基于 Spring 且可用于生产环境的应用和服务的引导和开发，让你可以“直接运行”。\n\n\
  \n\n#### Spring Framework 的问题与 Spring Boot 的优势\n\n我们先来了解 Spring Framework 的一些问题。2006\
  \ 年时，Spring Framework 主要关注依赖注入。后来它不断发展，演变成一个完整的应用框架，可用于构建企业级 Java 应用程序。它通过提供模板来简化企业应用的构建，从而处理了大部分业务逻辑，例如事务处理。\n\
  \nSpring Framework 还拥有一个配置模块，Spring 在此处理许多常见问题，例如处理 HTTP 请求、连接数据库等，这使得开发者能够专注于业务服务。开发者开发业务服务，并使用\
  \ Spring 提供的注解来标注类，从而让 Spring 知晓这些服务。Spring 还提供基础设施支持，例如连接 RDBMS 数据库或 MongoDB 数据库。\n\
  \n然而，在带来这些功能的同时，Spring 也带来了一些问题，例如它是一个庞大的框架，包含多个设置和配置步骤。此外，还有多个构建和部署步骤。\n\n为了解决这些问题，Spring\
  \ Boot 应运而生。Spring Boot 将这些步骤抽象化，使开发者能够再次专注于业务逻辑。Spring Boot 的主要目标是通过承担配置基于 Spring\
  \ 的应用的大部分工作，来解决 Spring Framework 中配置的复杂性；大多数情况下，无需 XML 或代码配置。\n\nSpring Boot 提供的另一个有趣特性是“无\
  \ WAR，仅 JAR”。因此，你无需生成 WAR 文件再上传到 Tomcat 服务器；你可以创建自托管的 Web 应用程序，并将其作为 Java JAR 应用程序执行，这使得部署变得极其简单直接。\n\
  \nSpring Boot 具有“约定优于配置”的特性，这意味着它提供了合理的默认值。你可以使用这些常用值快速构建应用程序。Spring Boot 会根据其类路径上的库自动配置所需的类。\n\
  \n假设你的应用程序需要与数据库交互。如果类路径上有 Spring Data 库，那么 Spring Data 会自动设置与数据库的连接以及数据源类。由于 Tomcat\
  \ 是一个流行的 Web 容器，默认情况下，Spring Boot Web 应用程序会使用内嵌的 Tomcat 容器。\n\n使用 Spring Boot，你可以独立地暴露诸如\
  \ REST 服务之类的组件，这与微服务架构中提出的理念一致，这样在维护任何组件时，你无需重新部署整个系统。\n\n#### Spring Boot 的主要目标\n\
  \n以下是 Spring Boot 的主要目标：\n\n*   以最少的麻烦提供生产就绪的应用程序和服务，任何人都可以“直接运行”。\n*   坚持“约定优于配置”，即为开发者做出某些决策，并支持企业应用常见的一系列非功能性特性（内嵌服务器、安全性、健康检查、指标和外部化配置）。\n\
  *   支持约定优于配置，完全避免 XML 配置，并避免注解配置。\n*   允许开发者根据自己的喜好自定义 Spring Boot 应用程序。\n\n####\
  \ 开发你的第一个 Spring Boot 应用程序\n\n在本节中，你将逐步开发你的第一个 Spring Boot 应用程序。如果你已经熟悉此过程，可以跳到末尾查看所有内容如何整合在一起。启动新项目有多种不同的选项。更多详情，请参考\
  \ [`https://spring.io/`](https://spring.io/) 。\n\n##### 系统要求\n\nSpring Boot 2.0.0.M2\
  \ 需要 Java 8。因此，首先需要的是 Java 8 SDK。如果你已经在系统中设置了 JDK，那么在开始之前，你应该检查系统上安装的 Java 当前版本。\n\
  \n```\n$ java -version\njava version \"1.8.0_101\"\nJava(TM) SE Runtime Environment\
  \ (build 1.8.0_101-b13)\nJava HotSpot(TM) 64-Bit Server VM (build 25.101-b13, mixed\
  \ mode)\n```\n\nSpring 团队提供了以下三种方法来使用“约定优于配置”的方式创建 Spring Boot 应用程序：\n\n*   使用 Spring\
  \ Boot CLI 工具\n*   使用 Spring STS IDE\n*   使用 Spring Initializr ( [`http://start.spring.io/`](http://start.spring.io/)\
  \ )\n\n开发者可以使用 Spring Boot CLI、Spring STS IDE 或 Spring Initializr 网站来开发 Spring Boot\
  \ Groovy 应用程序。他们可以使用 Spring STS IDE 或 Spring Initializr 网站来开发 Spring Boot Java 应用程序。\n\
  \n##### 使用 Spring Boot CLI\n\nSpring Boot 有一个命令行界面，允许开发者创建 Spring Boot 应用程序。本书不会涉及此主题；有关信息，你可以参考\
  \ [`http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#getting-started-installing-the-cli`](http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#getting-started-installing-the-cli)\
  \ 。\n\n##### 使用 Spring Initializr\n\n要从零开始启动一个新的 Spring Boot 项目，你可以通过 Spring Boot\
  \ 提供的名为 Spring Initializr 的 Web 服务创建一个新项目：[`http://start.spring.io/`](http://start.spring.io/)\
  \ 。通过输入所需信息并选择一组所需的选项（依赖项），你可以下载一个构建文件项目或一个压缩文件项目，其中包含根目录下的标准 Maven 或 Gradle 项目。\n\
  \n这让你可以通过选择选项并下载来引导一个应用程序。你可以选择项目类型，例如 Maven 或 Gradle，并且可以选择 Spring Boot 的版本。此外，你还可以选择项目元数据，如图\
  \ 1-7 所示。\n\n![A436970_1_En_1_Fig7_HTML.jpg](img/A436970_1_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7.\n\nSpring Initializr\n\n本书中你将开发一个 Maven 项目。\n\n图 1-7 中的屏幕截图有点长，因此被截断了。表\
  \ 1-1 显示了此示例的所有设置。\n\n表 1-1.\n\n项目相关详情\n\n| 字段 | 值 |\n| --- | --- |\n| Group | com.apress.ravi.chapter\
  \ 1 |\n| Artifact | HelloSpringBoot |\n| Name | HelloSpringBoot |\n| Description\
  \ | Hello Spring Boot 应用程序 |\n| Package Name | com.apress.ravi.chapter 1 |\n| Packaging\
  \ | Jar |\n| Java Version | 1.8 |\n| Language | Java |\n| Project dependencies |\
  \ Web |\n| Generate a | Maven Project |\n\nSpring Boot 允许开发者创建可执行的 JAR，这些 JAR 可以使用\
  \ `java -jar` 启动，或者采用更传统的 WAR 部署方式。你可以根据需求获取所选依赖项的列表。为了创建 HelloSpringBoot 应用程序，我选择了一个\
  \ Web 依赖项，它支持使用 Tomcat 和 Spring MVC 进行全栈 Web 开发，如图 1-8 所示。\n\n![A436970_1_En_1_Fig8_HTML.jpg](img/A436970_1_En_1_Fig8_HTML.jpg)\n\
  \n图 1-8.\n\nSpring Initializr 中的 Web 依赖项\n\n点击“Generate Project”按钮下载 `HelloSpringBoot.zip`\
  \ 文件。你可以将 Maven 项目（解压后）直接导入 Spring Source Tool (STS)，并从中开始工作。\n\n本书将全程使用 STS 作为\
  \ IDE。如果你尚未安装 STS，请访问 [`https://spring.io/tools/sts/all`](https://spring.io/tools/sts/all)\
  \ 并为你的操作系统下载一份副本。要安装它，只需解压下载的存档文件。完成后，继续启动 STS。\n\n创建 Spring Boot 项目的另一个选项是使用向导，方法是选择\
  \ File ➤ New ➤ Spring Starter Project。\n\n\n\n##### 使用 Spring Tool Suite\n\nSpring\
  \ Tool Suite 是一个开箱即用的最新 Eclipse 发行版，并预装了 Spring IDE 组件。使用 Spring Starter Project\
  \ 向导可以创建一个基本的 Spring Boot 应用程序（图 1-9）。\n\n![A436970_1_En_1_Fig9_HTML.jpg](img/A436970_1_En_1_Fig9_HTML.jpg)\n\
  \n图 1-9.\n\n创建 Spring Boot 应用程序的向导\n\nSpring Boot 提供了所谓的启动器（starters），你需要提供项目相关的详细信息，如图\
  \ 1-10 所示。\n\n![A436970_1_En_1_Fig10_HTML.jpg](img/A436970_1_En_1_Fig10_HTML.jpg)\n\
  \n图 1-10.\n\nSpring 启动器项目\n\nSpring Boot 中的启动器是一组类路径依赖项，它们可以自动配置应用程序，让你无需进行任何配置即可开发应用。在本章中，你将选择\
  \ Web 依赖项，因为你将构建一个简单的 `HelloSpringBoot` RESTful 服务，如图 1-11 所示。\n\n![A436970_1_En_1_Fig11_HTML.jpg](img/A436970_1_En_1_Fig11_HTML.jpg)\n\
  \n图 1-11.\n\n在 Spring 启动器中选择 Web 依赖项\n\n点击“完成”按钮将生成一个工作空间，你可以在其中创建新的包、类和静态文件（位于\
  \ resources 目录下）。项目的最终结构将如图 1-12 所示。\n\n![A436970_1_En_1_Fig12_HTML.jpg](img/A436970_1_En_1_Fig12_HTML.jpg)\n\
  \n图 1-12.\n\n项目结构\n\n让我们在下一节中浏览代码。\n\n#### 代码概览\n\n让我们详细浏览代码。你将查看 `pom.xml` 和 Java\
  \ 文件中的代码。先从 `pom.xml` 开始。\n\n##### 查看 pom.xml\n\n在创建 Spring Boot 应用程序时，你在启动器对话框中选择的所有依赖项都会出现在\
  \ `pom.xml` 中，如代码清单 1-1 所示。`pom.xml` 文件是用于构建项目的配方。\n\n```\n\n4.0.0\ncom.apress.ravi.chapter1\n\
  HelloSpringBoot\n0.0.1-SNAPSHOT\njar\nHelloSpringBoot\nHello Spring Boot application\n\
  \norg.springframework.boot\nspring-boot-starter-parent\n1.5.4.RELEASE\n\nUTF-8\n\
  UTF-8\n1.8\n\norg.springframework.boot\nspring-boot-starter-web\n\norg.springframework.boot\n\
  spring-boot-starter-test\ntest\n\norg.springframework.boot\nspring-boot-maven-plugin\n\
  \n代码清单 1-1.\npom.xml\n```\n\n关于代码清单 1-1，请注意以下几点：\n\n*   `<parent>` 元素指定了 Spring\
  \ Boot 的父 POM，其中包含通用组件的定义。\n*   `spring-boot-starter-web` 的 `<dependency>` 元素告诉\
  \ Spring Boot 该应用程序是一个 Web 应用程序，并让 Spring Boot 据此形成其“观点”。\n\n在进一步深入之前，让我们先理解 Spring\
  \ Boot 的“观点”。你需要了解 Spring Boot 如何使用像 `spring-boot-starter-web` 这样的启动器来形成其配置观点。HelloSpringBoot\
  \ 应用程序使用 `spring-boot-starter-web` 作为 Spring Boot 的 Web 应用程序启动器。基于此启动器，Spring Boot\
  \ 形成了以下观点：\n\n*   使用 Spring MVC 作为 REST 框架\n*   使用 Apache Jackson 进行 JSON 绑定\n*\
  \   使用 Tomcat 作为嵌入式 Web 服务器容器\n*   使用 Hibernate 进行对象关系映射\n\n在 Spring Boot 对你打算构建的应用程序类型形成观点后，它会根据\
  \ POM 内容和为 HelloSpringBoot 应用程序指定的启动器，提供一组 Maven 依赖项。图 1-13 显示了 Spring Boot 在 STS\
  \ 中设置的部分 Maven 依赖项。\n\n![A436970_1_En_1_Fig13_HTML.jpg](img/A436970_1_En_1_Fig13_HTML.jpg)\n\
  \n图 1-13.\n\n在 STS 中设置的 Maven 依赖项\n\n你可以在图 1-13 中看到，Tomcat 是默认的嵌入式 Web 服务器容器。假设你想使用\
  \ Jetty 代替 Tomcat；你只需要更改 POM 中的 `<dependencies>` 部分，如代码清单 1-2 所示。\n\n```\norg.springframework.boot\n\
  spring-boot-starter-web\n\norg.springframework.boot\nspring-boot-starter-tomcat\n\
  \norg.springframework.boot\nspring-boot-starter-jetty\n\n代码清单 1-2.\n包含 Tomcat 和\
  \ Jetty 依赖项的 pom.xml\n```\n\n你可以在图 1-14 中看到，Tomcat 的 Maven 依赖项已被替换为 Jetty 的依赖项。\n\
  \n![A436970_1_En_1_Fig14_HTML.jpg](img/A436970_1_En_1_Fig14_HTML.jpg)\n\n图 1-14.\n\
  \n更新后的 Maven 依赖项\n\n##### 编写代码\n\n要启动一个 Spring Boot 应用程序，你可以从一个 `main()` 方法开始。大多数情况下，你只需委托给\
  \ `static SpringApplication.run` 方法，如代码清单 1-3 所示。\n\n```\npackage com.apress.ravi.chapter1;\n\
  import org.springframework.boot.SpringApplication;\nimport org.springframework.boot.autoconfigure.SpringBootApplication;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
  /**\n* @author RaviKantSoni\n*/\n@SpringBootApplication\n@RestController\npublic\
  \ class HelloSpringBootApplication {\npublic static void main(String[] args) {\n\
  SpringApplication.run(HelloSpringBootApplication.class, args);\n}\n@RequestMapping(\"\
  /hello\")\npublic String greeting(){\nreturn \"Hello World!\";\n}\n}\n代码清单 1-3.\n\
  com.apress.ravi.chapter1.HelloSpringBootApplication.java\n```\n\n让我们逐步了解重要的部分。\n\
  \n###### @SpringBootApplication 注解\n\n`HelloSpringBootApplication` 类的第一个注解是 `@SpringBootApplication`。`@SpringBootApplication`\
  \ 注解是 Spring Boot 1.2.0 中引入的一个便捷注解，它包含了以下注解：\n\n*   `@Configuration`：被 `@Configuration`\
  \ 注解标记的类可以被 Spring 容器用作 bean 定义的来源，这并非 Spring Boot 特有。该类可能包含一个或多个通过 `@Bean` 注解方法声明的\
  \ Spring bean。\n*   `@EnableAutoConfiguration`：此注解是 Spring Boot 项目的一部分，它告诉 Spring\
  \ Boot 开始使用类路径定义或设置来添加 bean。自动配置会智能地猜测并配置你很可能在应用程序中运行的 bean，从而简化开发者的工作。\n    * \
  \  例如，假设你的类路径上有 `tomcat-embedded.jar`，那么你可能需要一个 `TomcatEmbeddedServletContainerFactory`\
  \ bean 来配置 Tomcat 服务器。因此，这将被自动搜索和配置，无需任何手动的 XML 配置。\n    *   通常，对于 Spring MVC 应用程序，你会添加\
  \ `@EnableWebMvc` 注解，该注解将应用程序标记为 Web 应用程序并激活关键功能，例如设置 `DispatcherServlet`，但 Spring\
  \ Boot 在类路径上发现 `spring-webmvc` 时会自动添加此注解。类似地，`@EnableTransactionManagement` 注解也会被自动添加，从而启用声明式事务管理。\n\
  *   `@ComponentScan`：此注解告诉 Spring 查找特定的包，以扫描带注解的组件、配置和服务。\n\n###### @RestController\
  \ 和 @RequestMapping 注解\n\n`HelloSpringBootApplication` 类的第一个注解是 `@RestController`，这是一个构造型注解。`@RequestMapping`\
  \ 注解提供了“路由”信息，并告诉 Spring 任何路径为 `/hello` 的 HTTP 请求都应映射到 `greeting` 方法。\n\n`@RestController`\
  \ 和 `@RequestMapping` 注解来自 Spring MVC（这些注解并非 Spring Boot 特有）。\n\n\n\n###### 主要方法\n\
  \n`HelloSpringBootApplication` 类的主要部分是 main 方法。使用 Spring Boot 开发的 Spring 应用程序包含\
  \ main 方法，该方法调用 Spring Boot 的 `SpringApplication.run()` 方法来启动应用程序，如之前的代码所示。包含 main\
  \ 方法的类被称为主类，并使用 `@SpringBootApplication` 注解进行标记。\n\n##### 在 STS 中运行 Spring Boot\
  \ 应用程序\n\n使用 Spring Starter Project 向导创建的 Spring Boot 应用程序有两种形式：WAR 和 JAR。该向导允许您在其打包选项中选择\
  \ WAR 或 JAR。\n\n> 正如 Josh Long 在 Spring IO 的一次演讲中所说：“Make JAR, not WAR。” — [`https://twitter.com/springcentral/status/598910532008062976`](https://twitter.com/springcentral/status/598910532008062976)\n\
  \nSpring Boot 更倾向于 JAR 而非 WAR，它允许您轻松创建独立的 JAR 打包项目，这些项目在生成的工件内部嵌入了 Web 服务器（Apache\
  \ Tomcat 是默认的 Web 服务器），这有助于开发人员减少设置本地或远程 Tomcat 服务器、WAR 打包和部署的开销。\n\n要在本地运行 Spring\
  \ Boot 应用程序，您不需要 STS 中的任何特殊工具。您只需通过选择“Run As ➤ Java Application”来运行它，无论是从标准的 Eclipse\
  \ Java 调试工具还是从 STS 中。\n\n与 IDE 相比，使用 STS 的好处在于它提供了一个专用的启动器，该启动器执行与 IDE 相同的操作，但在此之上添加了一些有用的附加功能。因此，让我们使用\
  \ STS 来运行 Spring Boot 应用程序，如图 1-15 所示。\n\n右键单击项目 `fullstackdeveloper`，然后选择“Run As\
  \ ➤ Spring Boot App”。\n\n![A436970_1_En_1_Fig15_HTML.jpg](img/A436970_1_En_1_Fig15_HTML.jpg)\n\
  \n图 1-15.\n\nSTS 中运行应用程序的向导\n\nSpring Boot 应用程序启动时，控制台会输出一些信息，如图 1-16 所示。\n\n![A436970_1_En_1_Fig16_HTML.jpg](img/A436970_1_En_1_Fig16_HTML.jpg)\n\
  \n图 1-16.\n\n控制台输出\n\n如果应用程序启动成功，Spring Boot 控制台输出的最后一行将包含“Started HelloSpringBootApplication”字样。\n\
  \n恭喜！您已成功使用 Spring Boot 设置并运行了应用程序。现在是时候在浏览器中访问 `http://localhost:8080/hello` 来查看网页了，如图\
  \ 1-17 所示。\n\n![A436970_1_En_1_Fig17_HTML.jpg](img/A436970_1_En_1_Fig17_HTML.jpg)\n\
  \n图 1-17.\n\n从浏览器访问 REST 端点\n\n#### 启动器\n\n启动器是一组方便的依赖描述符，您可以将其包含在应用程序中。它们包含了许多让您的项目快速启动和运行所需的依赖项。启动器\
  \ POM 是可以添加到应用程序 Maven 中的依赖描述符。\n\n简单来说，如果您正在开发一个使用 Spring MVC 处理 HTTP 请求的项目，您只需包含\
  \ `spring-boot-starter-web`，它将导入 Spring MVC 应用程序所需的所有依赖项，例如 `view-resolver`、`tomcat`\
  \ 等。这减轻了为框架配置所有必需依赖项的负担。\n\n您可以参考 [`http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#using-boot-starter`](http://docs.spring.io/spring-boot/docs/2.0.0.M2/reference/htmlsingle/#using-boot-starter)\
  \ 获取完整的启动器列表。\n\n#### Spring Boot Actuator：生产就绪特性\n\nSpring Boot 拥有一系列特性，让您可以在生产环境或部署后的任何环境中监控您的\
  \ Spring Boot 应用程序。例如，您可以获取日志、执行线程转储、查看指标、分析垃圾回收以及显示在 `BeanFactory` 中配置的 Bean。这些信息可以通过\
  \ HTTP 或 JMX 暴露，甚至可以通过 SSH 记录到进程中。\n\n##### 启用 Actuator\n\nActuator HTTP 端点仅适用于\
  \ Spring MVC。这是一个无需编写控制器即可添加到应用程序的新端点。Actuator 的定义是一个生产就绪的特性，用于帮助您监控和管理应用程序。\n\n\
  启用生产就绪特性的最简单方法是从 Spring 启动器添加 `spring-boot-actuator` 模块依赖 `spring-boot-starter-actuator`，如图\
  \ 1-18 所示。\n\n![A436970_1_En_1_Fig18_HTML.jpg](img/A436970_1_En_1_Fig18_HTML.jpg)\n\
  \n图 1-18.\n\nSpring Initializr 中的 Actuator 依赖\n\n要将 actuator 添加到基于 Maven 的项目中，请在\
  \ `pom.xml` 中添加以下 `starter` 依赖：\n\n```\norg.springframework.boot\nspring-boot-starter-actuator\n\
  \n```\n\n##### 运行应用程序\n\n一旦您运行 Spring Boot 应用程序，actuator 端点将记录在控制台中，如图 1-19 所示。\n\
  \n![A436970_1_En_1_Fig19_HTML.jpg](img/A436970_1_En_1_Fig19_HTML.jpg)\n\n图 1-19.\n\
  \n控制台日志中的 Actuator 端点\n\n##### 使用 Actuator 端点\n\nSpring Boot 包含许多 actuator 端点，允许您监控并与\
  \ Spring Boot 应用程序交互。大多数端点是敏感的，并非完全公开，而少数端点如 `/health` 和 `/info` 则不是。\n\n以下是 Spring\
  \ Boot 开箱即用提供的一些常见端点：\n\n*   `/health` 显示正在运行的 Boot 应用程序的健康信息。默认情况下，它不敏感。\n*   `/Info`\
  \ 显示任意的应用程序信息。默认情况下，它不敏感。\n*   `/metrics` 显示正在运行的 Boot 应用程序的指标信息。默认情况下，它是敏感的。\n\n\
  ##### 自定义管理服务器端口\n\n如果您的 Spring Boot 应用程序在您自己的数据中心内运行，那么您可能更倾向于使用默认的 HTTP 端口 8080\
  \ 来暴露端点。但对于基于云的部署，使用默认的 HTTP 端口 8080 来暴露管理端点是一个明智的选择。可以使用 `management.port` 属性来更改\
  \ HTTP 端口。\n\n您可以使用 `src\\main\\resources\\application.properties` 文件为 `management.port`\
  \ 属性分配端口号 8081：`management.port=8081`。\n\n##### 获取健康信息\n\n`/health` 端点可用于检查正在运行的\
  \ Spring Boot 应用程序的健康/状态。它返回一个包含大量矩阵的 JSON 文件。在浏览器中访问 `http://localhost:8081/health`\
  \ 将得到如图 1-20 所示的结果。\n\n![A436970_1_En_1_Fig20_HTML.jpg](img/A436970_1_En_1_Fig20_HTML.jpg)\n\
  \n图 1-20.\n\n访问 /health 端点\n\n以下健康信息显示给未经授权的 HTTP 访问：\n\n```\n{\n\"status\":\"UP\"\
  \n}\n```\n\n在第 7 章中，我将更详细地讨论 Spring Boot actuator，以便您理解这个返回的 JSON 数据代表什么。\n\n##\
  \ 总结\n\n在本章中，您了解了什么是全栈开发人员以及全栈 Web 开发涉及的内容。您还学习了现代 Web 应用程序的架构。您了解了 AngularJS 作为前端框架和\
  \ Spring Boot 作为后端框架的概况。您开发了第一个 Spring Boot 应用程序。最后，您学习了如何使用 actuator 监控您的 Spring\
  \ Boot 应用程序。在下一章中，您将使用 Spring Boot 创建一个 RESTful 应用程序来执行 CRUD 操作。\n\n\n\n"
- "# 2. 为应用程序创建 RESTful 层\n\n在上一章中，你了解了全栈 Web 开发的宏观视图，还学习了 Spring Boot 的基础知识，并使用 Spring\
  \ Boot 创建了一个 HelloWorld REST 应用程序。在本章中，你将学习以下内容：\n\n*   REST\n*   构建 RESTful 服务\n\
  *   在 RESTful API 中处理错误\n\n现在，是时候使用 Spring Boot 开发一个更复杂的 RESTful 应用程序了。要开发任何 RESTful\
  \ 服务，你必须首先理解 RESTful API 并知道如何实现它们。因此，我将首先介绍 REST 和 RESTful API 的概念，然后带你逐步了解开发 RESTful\
  \ API 的代码。\n\n这应该足以让你开始探索 RESTful API 设计和实现的各种可能性。让我们从 REST 的介绍开始。\n\n## REST 简介\n\
  \n表述性状态转移（REST）是一种架构风格，描述了一个系统如何与另一个系统通信或共享状态。REST 的基本概念是资源，即任何可以被访问或操作的事物。这些状态需要使用通用格式（如\
  \ XML 或 JSON）来表示。对于 Web 应用程序，通常使用 HTTP 来支持 RESTful 架构。换句话说，REST 用于创建暴露 HTTP API\
  \ 的 Web 应用程序。\n\n### HTTP 方法与 CRUD 操作\n\n标准的 HTTP 方法，如 `GET`、`POST`、`PUT` 和 `DELETE`，用于访问和操作\
  \ REST Web 资源。CRUD 操作有四个基本的持久化功能：创建、读取、更新和删除。表 2-1 展示了 CRUD 操作与四个 HTTP 动词的映射关系。\n\
  \n表 2-1.\n\nCRUD 操作到 HTTP 动词的映射\n\n| CRUD 操作 | HTTP 方法 | 描述 |\n| --- | --- | ---\
  \ |\n| 创建 | `POST` | 执行创建操作 |\n| 读取 | `GET` | 执行读取操作 |\n| 更新 | `PUT` | 执行更新操作 |\n\
  | 删除 | `DELETE` | 执行删除操作 |\n\n### HTTP 状态码\n\n有意义的 HTTP 状态码有助于客户端使用你的 RESTful API。表\
  \ 2-2 列出了一些在调用 RESTful API 时可能作为服务器响应返回的 HTTP 状态码元素。\n\n表 2-2.\n\nHTTP 状态码\n\n|\
  \ 代码 | 消息 | 描述 |\n| --- | --- | --- |\n| 200 | `OK` | 请求已成功（这是成功 HTTP 请求的标准响应）。\
  \ |\n| 201 | `Created` | 请求已完成，并成功创建了一个新资源。 |\n| 204 | `Not Content` | 请求已成功处理，但未返回任何内容。\
  \ |\n| 400 | `Bad Request` | 由于语法错误，请求无法完成。 |\n| 401 | `Unauthorized` | 请求需要用户授权。\
  \ |\n| 403 | `Forbidden` | 服务器拒绝完成请求。 |\n| 404 | `Not Found` | 找不到请求的资源。 |\n| 409\
  \ | `Conflict` | 由于资源冲突，请求无法完成。 |\n\n请参考附录 A 了解一些可用于访问 RESTful 应用程序以测试 RESTful API\
  \ 的工具。在本书中，我将使用 Chrome 的 Postman 作为 REST 客户端。\n\n## 构建 RESTful 服务：UserRegistrationSystem\n\
  \n在本章中，你将构建一个名为 UserRegistrationSystem 的 RESTful 应用程序，该程序提供用于用户注册的 REST 端点。在本书中，我将此应用程序称为基础应用程序。\n\
  \n### 介绍 UserRegistrationSystem\n\nUserRegistrationSystem 可以理解为一个软件即服务（SaaS）提供商，它允许用户执行\
  \ CRUD 操作，例如创建新用户、获取所有用户列表、获取单个用户、更新用户和删除用户。\n\nUserRegistrationSystem 将由一个 REST\
  \ API 层和一个存储库层构成，并有一个贯穿这两层的领域层，从而实现关注点分离。REST API 层负责处理客户端请求、验证客户端输入、与存储库层（或服务层）交互以及生成响应。\n\
  \n领域层包含具有业务数据的领域对象。存储库层与数据库交互并支持 CRUD 操作。你将通过理解以下需求来开始开发你的 RESTful 服务：\n\n*   消费者通过创建新用户来注册自己。\n\
  *   可以获取用户列表。\n*   可以获取单个用户的详细信息。\n*   用户详细信息可以在以后更新。\n*   可以在需要时删除用户。\n\n### 识别\
  \ REST 端点\n\nURI 端点用于标识 REST 资源。你为 UserRegistrationSystem REST API 端点选择的名称应对消费者具有明确定义的含义。要为服务设计端点，你应该遵循软件行业中广泛使用的一些最佳实践和约定。\n\
  \n*   为 RESTful API 使用基础 URI 以提供入口点。\n*   使用复数名词命名资源端点。\n*   使用 URI 层次结构来表示相关资源。\n\
  \nUserRegistrationSystem 应用程序将有一个 `User` 资源。可以使用 `GET`、`POST`、`PUT` 和 `DELETE` HTTP\
  \ 方法来访问此 `User` 资源。表 2-3 列出了你将为此应用程序创建的 REST 端点。\n\n表 2-3.\n\n用户注册的 REST 端点\n\n\
  | HTTP 方法 | REST 端点 | 描述 |\n| --- | --- | --- |\n| `GET` | `/api/user/` | 返回用户列表\
  \ |\n| `GET` | `/api/user/{id}` | 返回给定 `user {id}` 的用户详细信息 |\n| `POST` | `/api/user/`\
  \ | 从 `POST` 数据创建新用户 |\n| `PUT` | `/api/user/{id}` | 更新给定 `User {id}` 的详细信息 |\n\
  | `DELETE` | `/api/user` | 删除给定 `user {id}` 的用户 |\n\n下一步是定义资源表示和表示格式。REST 通常支持多种格式，例如\
  \ HTML、JSON 和 XML。在本章及本书的其余部分，JSON 将是 API 操作的首选格式。\n\n### JSON 格式\n\nJavaScript\
  \ 对象表示法（JSON）是一种在客户端和服务器之间存储和交换数据的语法。JSON 对象是一种键值数据格式，其中每个键值对由一个用双引号括起来的键、后跟一个冒号（`:`）、再后跟一个值组成。JSON\
  \ 对象用花括号（`{}`）括起来，每个键值之间用逗号（`,`）分隔。清单 2-1 显示了一个 `User` JSON 对象的示例。\n\n```\n{\n\"\
  id\": 1,\n\"name\":\"Ravi Kant Soni\",\n\"address\":\"Lashkariganj, Sasaram, Rohtas,\
  \ Bihar, pin-821115\",\n\"email\":\"ravikantsoni.author@gmail.com\"\n}\n清单 2-1.\n\
  User JSON 对象\n```\n\n如你所见，`User` 资源具有名称、地址和电子邮件作为键，而 `id` 属性则唯一标识该用户。\n\n### 创建\
  \ UserRegistrationSystem 应用程序\n\n你将通过使用 Spring Initializr 生成一个 Spring Boot 应用程序来创建\
  \ UserRegistrationSystem，如图 2-1 所示。选择 Web、JPA 和 H2 作为依赖项。默认情况下，Spring Boot 应用程序在端口\
  \ 8080 上运行。\n\n![A436970_1_En_2_Fig1_HTML.jpg](img/A436970_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1.\n\n使用 Spring Initializr 创建 UserRegistrationSystem\n\n\n\n### 嵌入式数据库：H2\n\
  \nH2 是一个用 Java 编写的开源轻量级关系数据库管理系统。H2 数据库可以轻松嵌入到任何基于 Java 的应用程序中，并且可以方便地配置为内存数据库运行。H2\
  \ 数据库不能用于生产环境开发，因为数据不会持久化到磁盘上。因此，该数据库主要用于开发和测试。H2 数据库支持 SQL 和 JDBC API，并具有强大的安全特性。\n\
  \n在 UserRegistrationSystem 应用程序中，你将使用 H2 来持久化数据。要在 Spring Boot 应用程序中使用 H2，你需要在 `pom.xml`\
  \ 文件中包含一个构建依赖项。\n\n当将 H2 用作内存数据库时，你无需提供任何数据库连接 URL 或用户名和密码。在部署和应用程序关闭期间，数据库的启动和停止将由\
  \ Spring Boot 负责处理。清单 2-2 显示了 UserRegistrationSystem 的 `pom.xml` 文件中 H2 的依赖信息。\n\
  \n```\ncom.h2database\nh2\nruntime\n\n清单 2-2.\npom.xml 中的 H2 依赖项\n```\n\n### 领域实现：用户\n\
  \n图 2-2 展示了表示 UserRegistrationSystem 应用程序中 `Users` 领域对象的 UML 类图。\n\n![A436970_1_En_2_Fig2_HTML.jpg](img/A436970_1_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2.\n\n用户领域对象\n\n在 UserRegistrationSystem 项目中，你将在 `src/main/java` 文件夹下的 `com.apress.ravi.dto`\
  \ 子包内创建一个名为 `UserDTO` 的数据传输对象（DTO）类，该类对应于 `Users` 领域的 `Object`。\n\nDTO 对象仅包含数据和访问修饰符，不含逻辑；它用于在应用程序的不同层之间传输数据，以实现关注点分离。你可以使用\
  \ Java 持久化 API（JPA）注解来标注此类，这使得 `Users` 类能够使用 JPA 技术轻松地进行持久化和检索。对 JPA 的正式概述超出了本书的范围。清单\
  \ 2-3 给出了 `UserDTO` 实体类的实现。\n\n```\npackage com.apress.ravi.dto;\nimport javax.persistence.Column;\n\
  import javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\nimport\
  \ javax.persistence.Id;\n@Entity\n@Table(name=\"Users\")\npublic class UserDTO {\n\
  @Id\n@GeneratedValue\n@Column(name = \"USER_ID\")\nprivate Long id;\n@Column(name\
  \ = \"NAME\")\nprivate String name;\n@Column(name = \"ADDRESS\")\nprivate String\
  \ address;\n@Column(name = \"EMAIL\")\nprivate String email;\n// Getter 和 Setter\
  \ 方法\n}\n清单 2-3.\nUsersDTO 实体类\n```\n\n这里，`UserDTO` 类有四个属性，分别名为 `id`、`name`、`address`\
  \ 和 `email`。`UserDTO` 使用了 `@Entity` 注解，使其成为一个 JPA 实体。该实体类使用了 `@Table` 注解来定义表名为 `Users`。\n\
  \n`UserDTO` 的 `id` 属性使用了 `@Id` 注解，使其成为主键。`id` 属性使用了 `@GeneratedValue` 注解，表示 `id`\
  \ 值应自动生成。`id` 属性还使用了 `@Column` 注解，以指定字段或属性将要映射到的列的详细信息。其他三个属性（`name`、`address` 和\
  \ `email`）都使用了 `@Column` 注解。我在此省略了 getter 和 setter 方法，但在实际代码中，每个属性都应有对应的 getter\
  \ 和 setter。\n\n下一步是提供仓库或 DAO 实现。\n\n### 仓库实现：UserJpaRepository\n\n仓库或 DAO 抽象并封装了对数据源的所有访问。仓库包含一个管理数据源连接的接口，并提供一组用于检索、操作、删除和持久化数据的方法。最佳实践是为每个领域对象配备一个仓库。\n\
  \n为了消除编写任何仓库实现的需要，Spring Data 项目提供了 `JpaRepository` 接口，该接口在运行时自动生成其实现。清单 2-4 显示了支持\
  \ `JpaRepository` 所需在 Maven `pom.xml` 中的依赖信息。\n\n```\norg.springframework.boot\n\
  spring-boot-starter-data-jpa\n\n清单 2-4.\npom.xml 中的 JPA 依赖项\n```\n\n你将通过扩展 Spring\
  \ Data JPA 子项目的 `org.springframework.data.jpa.repository.JpaRepository` 接口来创建一个仓库接口，以将\
  \ `UserDTO` 领域对象持久化到关系数据库中。\n\n你首先在 UserRegistrationSystem 应用程序的 `src/main/java`\
  \ 文件夹下创建 `com.apress.ravi.repository` 包，从而开始仓库的实现。同时，你可以创建一个 `UserJpaRepository`\
  \ 接口，如清单 2-5 所示。\n\n```\npackage com.apress.ravi.repository;\nimport org.springframework.data.jpa.repository.JpaRepository;\n\
  import org.springframework.stereotype.Repository;\nimport com.apress.ravi.dto.UsersDTO;\n\
  @Repository\npublic interface UserJpaRepository extends JpaRepository {\nUsersDTO\
  \ findByName(String name);\n}\n清单 2-5.\ncom.apress.ravi.repository.UserJpaRepository.java\
  \ 接口\n```\n\n如清单 2-5 所示，`UserJpaRepository` 接口扩展了 Spring Data 的 `JpaRepository`，后者将其可操作的领域对象类型和\
  \ `UserDTO` 领域对象标识符字段的类型（即 `UserDTO` 和 `Long`）作为其泛型参数 `T` 和 `ID`。`UserJpaRepository`\
  \ 继承了 `JpaRepository` 所有用于处理 `UserDTO` 持久化的 CRUD 方法。\n\nSpring Data JPA 允许开发者仅通过声明方法签名来定义其他查询方法。如前面的代码所示，你定义了一个名为\
  \ `findByName` 的自定义查找方法，该方法基本上创建了一个形式为 `select u from UserDTO u` 的 JPA 查询，其中 `u.name`\
  \ 等于 `:name`。\n\nSpring Data JPA 的好处在于开发者无需编写仓库接口的实现。当你运行应用程序时，Spring Data JPA 会在运行时创建实现。现在，让我们创建\
  \ REST 控制器类并实现 REST 端点。\n\n\n\n### 构建 RESTful API\n\n在开始实现 RESTful API 之前，你需要了解一些基本的\
  \ Spring 元素，这些元素将用于在 Spring 中实现 RESTful API。\n\n*   `@RestController`：这是一个构造型注解，它本身被\
  \ [`@Controller`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/stereotype/Controller.html#annotation%20in%20org.springframework.stereotype)\
  \ 和 [`@ResponseBody`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/web/bind/annotation/ResponseBody.html#annotation%20in%20org.springframework.web.bind.annotation)\
  \ 注解，从而免去了在每个方法上添加 `@ResponseBody` 注解的需要。此注解用于定义 API 端点。该注解让 Spring 将结果渲染回调用者。要在\
  \ Spring 中构建 RESTful Web 服务，请使用 `@RestController` 注解创建一个控制器类来处理 HTTP 请求。\n\n   \
  \ ```\n    @Target(value=TYPE)\n    @Retention(value=RUNTIME)\n    @Documented\n\
  \    @Controller\n    @ResponseBody\n    public @interface RestController\n    ```\n\
  \n*   `@RequestMapping`：此注解用于提供路由信息。Spring 中的 HTTP 请求会被映射到相应的处理方法。此注解可以应用于类级别，将\
  \ HTTP 请求映射到控制器类，也可以应用于方法级别，将 HTTP 请求映射到控制器处理方法。\n\n    ```\n    @Target(value={METHOD,TYPE})\n\
  \    @Retention(value=RUNTIME)\n    @Documented\n    public @interface RequestMapping\n\
  \    ```\n\n*   `ResponseEntity`：此类扩展了 `HttpEntity`，用于在控制器方法中向响应添加 HTTP 状态。它可以包含\
  \ HTTP 状态码、标头和响应体。\n\n    ```\n    public class ResponseEntity\n    extends HttpEntity\n\
  \    ```\n\n*   `@RequestBody`：此注解用于将方法参数绑定到传入 HTTP 请求的请求体。Spring 将使用 [`HttpMessageConverter`](https://docs.spring.io/spring/docs/current/javadoc-api/org/springframework/http/converter/HttpMessageConverter.html#interface%20in%20org.springframework.http.converter)\
  \ 根据请求的内容类型将 Web 请求的请求体转换为领域对象。可以应用 `@valid` 注解来执行自动验证，这是可选的。\n\n    ```\n    @Target(value=PARAMETER)\n\
  \    @Retention(value=RUNTIME)\n    @Documented\n    public @interface RequestBody\n\
  \    ```\n\n*   `@ResponseBody`：此注解用于将注解方法的返回值绑定到传出的 HTTP 响应体。Spring 将使用 `HttpMessageConverter`\
  \ 根据请求 HTTP 标头的内容类型将返回值转换为 HTTP 响应体（通常返回 JSON 或 XML 等数据格式）。\n\n    ```\n    @Target(value={TYPE,METHOD})\n\
  \    @Retention(value=RUNTIME)\n    @Documented\n    public @interface ResponseBody\n\
  \    ```\n\n*   `@PathVariable`：此注解用于将方法参数绑定到 URI 模板变量（即 `{}` 中的变量）。\n\n    ```\n\
  \    @Target(value=PARAMETER)\n    @Retention(value=RUNTIME)\n    @Documented\n\
  \    public @interface PathVariable\n    ```\n\n*   `MediaType`：这是 `MimeType` 的子类。在使用\
  \ `@RequestMapping` 注解时，你还可以指定控制器方法要生成或消费的 `MediaType`。\n\n    ```\n    public class\
  \ MediaType\n    extends MimeType\n    implements Serializable\n    ```\n\n####\
  \ 创建 RESTful 控制器：UserRegistrationRestController\n\n你将创建一个 Spring MVC 控制器并实现 REST\
  \ API 端点。让我们在 `src/main/java` 文件夹下的 `com.apress.ravi.Rest` 包中创建 `UserRegistrationRestController`\
  \ 类。该控制器类提供了所有必要的端点来检索和操作用户。清单 2-6 展示了 `UserRegistrationRestController` 类所需的代码更改。\n\
  \n```\npackage com.apress.ravi.Rest;\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import org.springframework.web.bind.annotation.RestController;\nimport com.apress.ravi.repository.UserJpaRepository;\n\
  @RestController\n@RequestMapping(\"/api/user\")\npublic class UserRegistrationRestController\
  \ {\npublic static final Logger logger =\nLoggerFactory.getLogger(UserRegistrationRestController.class);\n\
  private UserJpaRepository userJpaRepository;\n@Autowired\npublic void setUserJpaRepository(UserJpaRepository\
  \ userJpaRepository) {\nthis.userJpaRepository = userJpaRepository;\n}\n}\n清单 2-6.\n\
  UserRegistrationRestController 类\n```\n\n在清单 2-6 中，你使用 `@RestController` 注解标注了 `UserRegistrationRestController`\
  \ 类，并定义了一个新的 `@RequestMapping` 将 URI `/api/user` 映射到整个类，这意味着在 `/api/user` URI 上接收到的\
  \ HTTP 请求由 `UserRegistrationRestController` 类处理。你使用了 `@Autowired` 注解将 `autowireUserJpaRepository`\
  \ 自动装配到 RESTful 控制器。\n\n让我们在控制器类中定义不同的端点来访问和操作 `UserDTO`。你将使用新的注解 `@GetMapping`、`@PostMapping`、`@PutMapping`\
  \ 和 `@DeleteMapping`，而不是标准的 `@RequestMapping`，这些注解自 Spring MVC 4.3 起可用，并且是定义 REST\
  \ 端点的标准方式。这些新注解充当了 `@RequestMapping` 的包装器，简化了常见 HTTP 方法的映射。\n\n#### @GetMapping：检索所有用户\n\
  \n这是一个组合注解，是 `@RequestMapping(value=\"/\", method = RequestMethod.GET)` 的快捷方式。对\
  \ `/api/user/` 端点的 `GET` 请求返回 UserRegistrationSystem 应用程序中可用的用户列表。清单 2-7 展示了实现此功能所需的代码。\n\
  \n```\n@GetMapping(\"/\")\npublic ResponseEntity> listAllUsers() {\nList users =\
  \ userJpaRepository.findAll();\nreturn new ResponseEntity>(users, HttpStatus.OK);\n\
  }\n清单 2-7.\n用于检索所有用户的 GET 动词实现\n```\n\n`listAllUsers` 方法返回包含 HTTP 响应的 `ResponseEntity`。此方法使用\
  \ `UserJpaRepository` 读取所有用户。然后，你通过调用其构造函数创建了一个 `ResponseEntity` 实例，该构造函数接受两个参数：`UserDTO`\
  \ 是成为响应体一部分的数据，而 `HttpStatus.OK` 状态值是成为响应状态码的数据。\n\n让我们通过从 STS 将 UserRegistrationSystem\
  \ 应用程序作为 Spring Boot 应用程序运行并启动 Postman 应用程序来测试第一个端点。输入 URL `http://localhost:8080/api/user/`\
  \ 并点击发送，如图 2-3 所示。\n\n![A436970_1_En_2_Fig3_HTML.jpg](img/A436970_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3.\n\n用于检索所有用户的 GET 动词实现\n\n由于尚未创建任何用户，这将导致一个空集合。因此，下一个任务是通过实现 `POST` 动词功能向\
  \ UserRegistrationSystem 添加一个用户。\n\n\n\n#### @PostMapping：创建新用户\n\n`@PostMapping`\
  \ 注解是一个组合注解，是 `@RequestMapping(value=\"/\", method=RequestMethod.POST)` 的快捷方式。对\
  \ `/api/user/` 端点的 `POST` 请求会使用请求的正文体创建一个新用户。清单 2-8 展示了实现 `POST` 动词功能所需的代码。\n\n\
  ```\n@PostMapping(value = \"/\", consumes = MediaType.APPLICATION_JSON_VALUE)\n\
  public ResponseEntity createUser(@RequestBody final UsersDTO user) {\nuserJpaRepository.save(user);\n\
  return new ResponseEntity(user, HttpStatus.CREATED);\n}\n清单 2-8.\n创建新用户的 POST 动词实现\n\
  ```\n\n`createUser` 方法接受一个类型为 `UsersDTO` 的参数，该参数带有 `@RequestBody` 注解，这要求 Spring\
  \ 将整个请求体转换为 `UserDTO` 的实例。\n\n你使用 `consumes = MediaType.APPLICATION_JSON_VALUE`\
  \ 配置了内容协商，这表明该方法仅接受来自请求体的 JSON 数据。`produces` 和 `consumes` 属性用于[缩小映射类型](http://docs.spring.io/spring/docs/3.2.x/spring-framework-reference/html/mvc.html#mvc-ann-requestmapping-consumes)。你可以省略此配置，因为\
  \ `@RequestBody` 会使用 `HttpMessageConverters` 来确定要使用的正确转换器，并将 HTTP 请求的正文转换为领域对象。Spring\
  \ BOOT 中的消息转换器支持 JSON 和 XML 资源表示形式。\n\n在方法内部，你将 `UserDTO` 的持久化操作委托给了 `userJpaRepository`\
  \ 的 save 方法。然后，你创建了一个新的 `ResponseEntity`，其中包含已创建的用户（`UserDTO`）和 HTTP 状态码 `HttpStatus.CREATED`（201），并将其返回。\n\
  \n要测试这个新添加的端点，请启动 UserRegistrationSystem 应用程序。如果 UserRegistrationSystem 应用程序已在运行，则需要终止进程并重新启动。启动\
  \ Postman 并选择请求类型为 POST。点击 Body 并选择 raw；然后从下拉菜单中选择 JSON (application/json) 作为 Content-Type\
  \ 标头。输入一些信息并点击 Send。清单 2-9 展示了请求体中使用的 JSON。\n\n```\n{\n\"name\":\"Ravi Kant Soni\"\
  ,\n\"address\":\"Lashkariganj, Sasaram, Rohtas, Bihar, pin-821115\",\n\"email\"\
  :\"ravikantsoni.author@gmail.com\"\n}\n清单 2-9.\n用于创建新用户的请求体 JSON\n\n请求完成后，你将看到一条\
