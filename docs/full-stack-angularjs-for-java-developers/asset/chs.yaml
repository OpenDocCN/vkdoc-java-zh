  因此，您现在已使用用户凭据 `user`/`password` 在您的 Spring Boot 应用程序中执行了创建、读取和更新操作。您也可以使用 `admin`
  用户的凭据 `admin`/`password` 执行这些操作，因为前面的端点可以被 `USER` 和 `ADMIN` 两种角色访问。


