  ```\n\n然后，在 `app.config` 中，每个路由都映射到一个模板和控制器（可选）。\n\n*   当导航到 URL `/list-all-users`\
  \ 时，将调用控制器 `listUserController`。\n*   当导航到 URL `/register-new-user` 时，将调用控制器 `registerUserController`。\n\
  *   当导航到 URL `/update-user/:id` 时，将调用控制器 `usersDetailsController`。\n\n在本节中，您已在 `app.js`\
  \ 文件中创建了 `app` 应用程序。在下一节中，我们将创建三个不同的控制器，分别命名为 `listUserController`、`registerUserController`\
  \ 和 `usersDetailsController`。\n\n\n\n#### 创建 AngularJS 控制器\n\n在 `src/main/resources/static/js`\
  \ 文件夹中定义的 `controller.js` 文件包含了 AngularJS 控制器的实现。\n\n让我们创建一个名为 `registerUserController`\
  \ 的 AngularJS 控制器模块，它将使用 Spring REST 服务来执行 `POST` HTTP 调用。这里，在 `$scope` 中设置了一个 `errorMessage`，用于显示在“注册新用户”页面上从\
  \ `POST` 调用返回的错误信息。当 `POST` 调用成功时，它将重定向到 `list-all-users`。请参见清单 3-13。\n\n```\napp.controller('registerUserController',\
  \ function($scope, $http, $location,\n$route) {\n$scope.submitUserForm = function()\
  \ {\n$http({\nmethod : 'POST',\nurl : 'http://localhost:8080/api/user/',\ndata :\
  \ $scope.user,\n}).then(function(response) {\n$location.path(\"/list-all-users\"\
  );\n$route.reload();\n}, function(errResponse) {\n$scope.errorMessage = errResponse.data.errorMessage;\n\
  });\n}\n$scope.resetForm = function() {\n$scope.user = null;\n};\n});\n清单 3-13.\n\
  src/main/resources/static/js.controller.js 中的 registerUserController\n```\n\n类似地，你定义了\
