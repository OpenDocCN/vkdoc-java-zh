  \n获取所有用户会稍微复杂一些，因为将 `UsersDTO[]` 类作为返回值类型提供给 `getForObject` 会得到一个 `UsersDTO` 实例的数组，如代码清单\
  \ 6-4 所示。\n\n```\npublic UsersDTO[] getAllUsers() {\nreturn restTemplate.getForObject(\n\
  USER_REGISTRATION_BASE_URL,\nUsersDTO[].class);\n}\n代码清单 6-4.\n获取所有用户\n```\n\n####\
  \ 使用 JSON 数据的 HTTP POST 请求创建用户\n\n你可以使用 `RestTemplate` 中的 `postForLocation`、`postForEntity`\
  \ 或 `postForObject` 方法来发起 HTTP `POST` 请求。这里，你将使用 `postForObject` 方法进行 `POST` 请求。Spring\
  \ `RestTemplate` 提供了三个重载版本的 `postForObject` 方法，如表 6-3 所示。\n\n表 6-3.\n\n重载的 postForObject\
  \ 方法\n\n| # | 重载的 postForObject 方法 |\n| --- | --- |\n| 1 | `@Override` `public <T>\
  \ T postForObject(String url, Object request,Class<T> responseType, Object... uriVariables)\
  \ throws RestClientException {` `RequestCallback requestCallback =` `httpEntityCallback(request,\
  \ responseType);` `HttpMessageConverterExtractor<T> responseExtractor =` `new HttpMessageConverterExtractor<T>(`\
