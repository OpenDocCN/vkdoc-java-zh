  \n图 2-5.\n检索单个用户\n\n类似地，你可以实现用于执行更新和删除功能的端点。\n\n#### @PutMapping：更新用户\n\n此注解是一个组合注解，是\
  \ `@RequestMapping(method = RequestMethod.PUT)` 的快捷方式。它要求将包含的实体视为请求 URI 上现有资源的修改版本。清单\
  \ 2-11 展示了所需的代码。\n\n```\n@PutMapping(value = \"/{id}\", consumes = MediaType.APPLICATION_JSON_VALUE)\n\
  public ResponseEntity updateUser(\n@PathVariable(\"id\") final Long id, @RequestBody\
  \ UsersDTO user) {\n// 根据 id 获取用户并设置为 UserDTO 类型的 currentUser 对象\nUsersDTO currentUser\
  \ = userJpaRepository.findById(id);\n// 使用 user 对象数据更新 currentUser 对象数据\ncurrentUser.setName(user.getName());\n\
  currentUser.setAddress(user.getAddress());\ncurrentUser.setEmail(user.getEmail());\n\
  // 保存 currentUser 对象\nuserJpaRepository.saveAndFlush(currentUser);\n// 返回 ResponseEntity\
  \ 对象\nreturn new ResponseEntity(currentUser, HttpStatus.OK);\n}\n清单 2-11.\n更新用户的\
  \ PUT 动词实现\n\n在清单 2-11 中，你通过将 `pathvariable` 中的 `id` 作为参数传递给 `UserJpaRepository`\
  \ 的 `findById` 方法，检索到了现有的 `UserDTO` 对象作为 `currentUser`。然后，你根据 `requestbody` 中的用户信息更新了\
  \ `currentUser` 的属性数据。\n\n你还调用了 `UserJpaRepository` 的 `saveAndFlush` 方法，并传入 `currentUser`，该方法会保存\
  \ `UserDTO` 并立即刷新更改。最后，你返回了 `ResponseEntity`，其中包含 `currentUser` 作为响应体，以及 `HttpStatus.OK`\
  \ 作为 HTTP 状态码。\n\n让我们通过启动 Postman 并重新启动应用程序来测试此端点，如图 2-6 所示。\n\n![A436970_1_En_2_Fig6_HTML.jpg](img/A436970_1_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6.\n更新用户的 PUT 动词实现\n\n现在，让我们实现删除功能，以从 UserRegistrationSystem 应用程序中删除现有用户。\n\
  \n#### @DeleteMapping：删除用户\n\n这是一个组合注解，是 `@RequestMapping(method = RequestMethod.DELETE)`\
  \ 的快捷方式。它要求应用程序删除由 `Request-URI` 标识的资源。清单 2-12 展示了实现此功能所需的代码。\n\n```\n@DeleteMapping(\"\
  /{id}\")\npublic ResponseEntity deleteUser(@PathVariable(\"id\") final Long id)\
  \ {\nuserJpaRepository.delete(id);\nreturn new ResponseEntity(HttpStatus.NO_CONTENT);\n\
  }\n清单 2-12.\n删除用户的 DELETE 动词实现\n\n在清单 2-12 中，方法内部你调用了 `UserJpaRepository` 的 delete\
  \ 方法，并传入 `pathvariable` 中的 `id` 作为参数。然后，你返回了带有 HTTP 状态码 `HttpStatus.NO_CONTENT`（204）的\
  \ `ResponseEntity`。\n\n重新启动 UserRegistrationSystem 应用程序并启动 Postman 来测试此功能，如图 2-7\
  \ 所示。\n\n![A436970_1_En_2_Fig7_HTML.jpg](img/A436970_1_En_2_Fig7_HTML.jpg)\n\n图\
  \ 2-7.\n删除用户的 DELETE 动词实现\n\n到目前为止，你已经了解了如何实现用于执行 CRUD 操作的 RESTful API。接下来，你将学习\
  \ RESTful API 中的错误处理。\n\n## 处理 RESTful API 中的错误\n\n尽管开发人员会注意处理错误，但以合适的格式设计错误响应仍然很重要，这能让使用\
  \ RESTful API 的客户端理解问题，并帮助其正确使用 API。错误处理是 RESTful API 开发中最重要的问题之一。在现实世界中，RESTful\
  \ API 在各种场景下被使用，很难预测 API 被使用的所有场景。\n\n\n\n### UserRegistrationSystem 错误处理\n\n考虑\
  \ UserRegistrationSystem 应用程序中的一个场景：客户端尝试获取系统中不存在的用户信息。图 2-8 展示了针对 ID 为 50 的不存在用户发送的\
  \ Postman `GET` 请求。\n\n![A436970_1_En_2_Fig8_HTML.jpg](img/A436970_1_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8.\n\n针对 ID 为 50 的不存在用户发送的 GET 请求\n\n如图 2-8 所示，RESTful API 返回了空响应体，因为对于不存在的用户\
  \ ID 50，`UserJpaRepository` 的 `findOne` 方法向 `UserRegistrationRestController` 返回了\
  \ `null`。RESTful API 返回了 HTTP 状态码 200 `OK`，而不是应该指示请求用户不存在的状态码 404。\n\n为了实现此行为，你需要在\
  \ `com.apress.ravi.Rest.UserRegistrationRestController` 的 `getUserById` 方法中验证用户\
  \ `id` 属性。对于不存在的用户，返回包含 `CustomErrorType` 和状态码 `HttpStatus.NOT_FOUND` (404) 的 `ResponseEntity`。清单\
  \ 2-13 展示了处理错误所需的代码更新。\n\n```\n@GetMapping(\"/{id}\")\npublic ResponseEntity getUserById(@PathVariable(\"\
  id\") final Long id) {\nUsersDTO user = userJpaRepository.findById(id);\nif (user\
  \ == null) {\nreturn new ResponseEntity(\nnew CustomErrorType(\"User with id \"\n\
  + id + \" not found\"), HttpStatus.NOT_FOUND);\n}\nreturn new ResponseEntity(user,\
  \ HttpStatus.OK);\n}\n清单 2-13.\n针对不存在用户的错误处理\n```\n\n在清单 2-13 中，你通过在其构造函数中传递自定义错误消息（“User\
  \ with id 50 not found”）创建了一个 `CustomErrorType` 类的实例。\n\n#### 自定义错误响应\n\n现在，让我们在\
  \ `src/main/java` 下的 `com.apress.ravi.Exception` 包中创建 `CustomErrorType` 类。清单 2-14\
  \ 展示了 `CustomErrorType` 类所需的代码实现。\n\n```\npackage com.apress.ravi.Exception;\nimport\
  \ com.apress.ravi.dto.UsersDTO;\npublic class CustomErrorType extends UsersDTO {\n\
  private String errorMessage;\npublic CustomErrorType(final String errorMessage){\n\
  this.errorMessage = errorMessage;\n}\n@Override\npublic String getErrorMessage()\
  \ {\nreturn errorMessage;\n}\n}\n清单 2-14.\nCustomErrorType 类\n```\n\n在清单 2-14 中，`CustomErrorType`\
  \ 类将 `errorMessage` 声明为成员变量，并提供了相应的 getter 方法。此 `errorMessage` 在该类的构造函数中被初始化。\n\n\
  在 UserRegistrationSystem 应用程序中进行此修改后，重新启动应用程序并启动 Postman，为 ID 为 50 的用户发送 `GET` 请求。`UserRegistrationRestController`\
  \ 返回正确状态码和错误消息的结果如图 2-9 所示。\n\n![A436970_1_En_2_Fig9_HTML.jpg](img/A436970_1_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9.\n\n针对不存在用户的错误消息和状态码\n\n在 UserRegistrationSystem 应用程序中，对于涉及 HTTP 方法（如 `GET`、`PUT`\
  \ 和 `DELETE`）的 CRUD 操作的其他方法，也需要执行相同的用户 ID 验证，以返回正确的状态码和消息。清单 2-15 展示了更新后的 `UserRegistrationRestController`\
  \ 类，其中包含了修改后的 `listAllUsers`、`getUserById`、`createUser`、`updateUser` 和 `deleteUser`\
  \ 方法。\n\n```\n// method to get list of users\n@GetMapping(\"/\")\npublic ResponseEntity>\
  \ listAllUsers() {\nList users = userJpaRepository.findAll();\nif (users.isEmpty())\
  \ {\nreturn new ResponseEntity>(HttpStatus.NO_CONTENT);\n}\nreturn new ResponseEntity>(users,\
  \ HttpStatus.OK);\n}\n// method to get user by id\n@GetMapping(\"/{id}\")\npublic\
  \ ResponseEntity getUserById(@PathVariable(\"id\") final Long id) {\nUsersDTO user\
  \ = userJpaRepository.findById(id);\nif (user == null) {\nreturn new ResponseEntity(\n\
  new CustomErrorType(\"User with id \"\n+ id + \" not found\"), HttpStatus.NOT_FOUND);\n\
  }\nreturn new ResponseEntity(user, HttpStatus.OK);\n}\n// method to create an user\n\
  @PostMapping(value = \"/\", consumes = MediaType.APPLICATION_JSON_VALUE)\npublic\
  \ ResponseEntity createUser(@RequestBody final UsersDTO user) {\nif (userJpaRepository.findByName(user.getName())\
  \ != null) {\nreturn new ResponseEntity(new CustomErrorType(\n\"Unable to create\
  \ new user. A User with name \"\n+ user.getName() + \" already exist.\"),HttpStatus.CONFLICT);\n\
  }\nuserJpaRepository.save(user);\nreturn new ResponseEntity(user, HttpStatus.CREATED);\n\
  }\n// method to update an existing user\n@PutMapping(value = \"/{id}\", consumes\
  \ = MediaType.APPLICATION_JSON_VALUE)\npublic ResponseEntity updateUser(\n@PathVariable(\"\
  id\") final Long id, @RequestBody UsersDTO user) {\nUsersDTO currentUser = userJpaRepository.findById(id);\n\
  if (currentUser == null) {\nreturn new ResponseEntity(\nnew CustomErrorType(\"Unable\
  \ to upate. User with id \"\n+ id + \" not found.\"), HttpStatus.NOT_FOUND);\n}\n\
  currentUser.setName(user.getName());\ncurrentUser.setAddress(user.getAddress());\n\
  currentUser.setEmail(user.getEmail());\nuserJpaRepository.saveAndFlush(currentUser);\n\
  return new ResponseEntity(currentUser, HttpStatus.OK);\n}\n// delete an existing\
  \ user\n@DeleteMapping(\"/{id}\")\npublic ResponseEntity deleteUser(@PathVariable(\"\
  id\") final Long id) {\nUsersDTO user = userJpaRepository.findById(id);\nif (user\
  \ == null) {\nreturn new ResponseEntity(\nnew CustomErrorType(\"Unable to delete.\
  \ User with id \"\n+ id + \" not found.\"), HttpStatus.NOT_FOUND);\n}\nuserJpaRepository.delete(id);\n\
  return new ResponseEntity(\nnew CustomErrorType(\"Deleted User with id \"\n+ id\
  \ + \".\"), HttpStatus.NO_CONTENT);\n}\n清单 2-15.\n更新后的 UserRegistrationRestController\
  \ 类\n```\n\n### 验证请求体\n\n当需要验证包含 JSON 数据的请求体（针对某些复杂对象）时，你需要做更多工作。考虑一个场景：客户端发起一个新用户创建请求，但请求体中缺少数据，例如请求体不包含地址。\n\
  \nSpring MVC 支持使用 JSR-303 Bean 验证约束进行输入验证。\n\n\n\n#### 添加 Bean 验证注解\n\n清单 2-16 展示了\
  \ `UsersDTO` 实体类中的更新内容。你使用 `@NotNull` 和 `@Email` 等验证约束来注解 `UsersDTO` 对象的属性。你可以使用\
  \ Hibernate Validator，这是一个流行的 JSR 303 和 JSR 349 实现框架。\n\n```\npackage com.apress.ravi.dto;\n\
  import javax.persistence.Column;\nimport javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\n\
  import javax.persistence.Id;\nimport org.hibernate.validator.constraints.Email;\n\
  import org.hibernate.validator.constraints.Length;\nimport org.hibernate.validator.constraints.NotEmpty;\n\
  @Entity\npublic class UsersDTO {\n@Id\n@GeneratedValue\n@Column(name = \"USER_ID\"\
  )\nprivate Long id;\n@NotEmpty\n@Length(max = 50)\n@Column(name = \"NAME\")\nprivate\
  \ String name;\n@NotEmpty\n@Length(max = 150)\n@Column(name = \"ADDRESS\")\nprivate\
  \ String address;\n@Email\n@NotEmpty\n@Length(max = 80)\n@Column(name = \"EMAIL\"\
  )\nprivate String email;\n// Getter & Setter method\n}\n清单 2-16.\n使用 JSR 303 注解的\
  \ UsersDTO 类\n```\n\n如清单 2-16 所示，你已对 `UsersDTO` 类进行了注解，为 UserRegistrationSystem\
  \ 应用程序添加了输入验证功能。表 2-4 展示了 Bean 验证 API 提供的一些验证约束。\n\n表 2-4.\n\nBean 验证 API 提供的验证约束\n\
  \n| 约束 | 描述 |\n| --- | --- |\n| `NotNull` | 被注解的成员变量不能为 null。 |\n| `NotEmpty` |\
  \ 被注解的成员变量（字符串、集合、映射或数组）不能为 null 或空。 |\n| `Size` | 被注解的成员变量（字符串、集合、映射或数组）的大小必须在指定边界之间（包含边界）。\
  \ |\n| `Length` | 执行更新操作。 |\n| `Email` | 被注解的成员变量（字符串）必须是一个格式正确的有效电子邮件地址。 |\n| `Min`\
  \ | 被注解的成员变量（`BigDecimal`、`BigInteger`、`Byte`、`Short`、`int`、`long` 及其包装类）必须是一个数值，其值必须大于或等于指定的最小值。\
  \ |\n| `Max` | 被注解的成员变量（`BigDecimal`、`BigInteger`、`Byte`、`Short`、`int`、`long` 及其包装类）必须是一个数值，其值必须小于或等于指定的最小值。\
  \ |\n\n由于你希望确保每个用户都有姓名、地址和电子邮件，因此你使用 `@NotEmpty` 注解对这些字段进行了标注，这确保了输入字符串不为 null 且长度大于零。你还使用\
  \ `@Length` 注解和最大值对这些字段进行了标注，以确保 `String` 长度不超过此最大长度值。电子邮件字段使用 `@Email` 注解进行标注，以验证输入字符串是否为有效的电子邮件地址。\n\
  \n下一步是在 `UserRegistrationRestController` 类的 `createUser` 方法的 `UsersDTO` 参数上添加 `@Valid`\
  \ 注解。\n\n#### UserRegistrationRestController 方法参数中 @RequestBody 上的 @Valid\n\n在 `UserRegistrationRestController`\
  \ 端点的 `createUser` 方法的 `UsersDTO` 参数上添加 `@Valid` 注解，如清单 2-17 所示。\n\n```\n@PostMapping(value\
  \ = \"/\", consumes = MediaType.APPLICATION_JSON_VALUE)\npublic ResponseEntity createUser(\n\
  @Valid @RequestBody final UsersDTO user) {\nlogger.info(\"Creating User : {}\",\
  \ user);\nif (userJpaRepository.findByName(user.getName()) != null) {\nlogger.error(\"\
  Unable to create. A User with name {} already exist\",\nuser.getName());\nreturn\
  \ new ResponseEntity(\nnew CustomErrorType(\n\"Unable to create new user. A User\
  \ with name \"\n+ user.getName() + \" already exist.\"),                       \
  \                          HttpStatus.CONFLICT);\n}\nuserJpaRepository.save(user);\n\
  return new ResponseEntity(user, HttpStatus.CREATED);\n}\n清单 2-17.\n使用 @Valid 注解的\
  \ UserRegistrationRestController\n```\n\n如清单 2-17 所示，`@Valid` 注解将指示 Spring 在将传入的\
  \ `POST` 参数与对象绑定后执行请求数据验证。\n\n`@RequestBody` 方法参数可以使用 `@Valid` 进行注解，以调用自动验证，类似于对\
  \ `@ModelAttribute` 方法参数的支持。由此产生的 `MethodArgumentNotValidException` 会在 `DefaultHandlerExceptionResolver`\
  \ 中处理，并导致返回 400 响应码。\n\n来源\n\n参见 [`http://docs.spring.io/spring/docs/3.2.18.RELEASE/spring-framework-reference/htmlsingle/#new-in-3.1-mvc-valid-requestbody`](http://docs.spring.io/spring/docs/3.2.18.RELEASE/spring-framework-reference/htmlsingle/#new-in-3.1-mvc-valid-requestbody)\
  \ 。\n\n通过使用 `@Valid` 注解，Spring 将验证委托给已注册的验证器。在运行 UserRegistrationSystem 应用程序并发送缺少地址的\
  \ Postman 请求时，如图 2-10 所示，错误代码 HTTP 状态 400（`Bad Request`）表示操作失败。\n\n![A436970_1_En_2_Fig10_HTML.jpg](img/A436970_1_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10.\n\n缺少地址导致 MethodArgumentNotValidException\n\n重复发送缺少问题的 Postman 请求，如你在\
  \ [图 5-7](https://www.safaribooksonline.com/library/view/spring-rest/9781484208236/9781484208243_Ch05.xhtml#Fig7)\
  \ 中所做的那样，你将看到操作失败并显示以下信息，如 [图 5-8](https://www.safaribooksonline.com/library/view/spring-rest/9781484208236/9781484208243_Ch05.xhtml#Fig8)\
  \ 所示：\n\n*   状态：400\n*   错误：Bad request\n*   异常：`org.springframework.web.bind.MethodArgumentNotValidException`\n\
  \n从这个错误响应中，你可以了解到 Spring MVC 验证了输入数据，并在未找到必需的地址字段时抛出了 `MethodArgumentNotValidException`\
  \ 异常。\n\n尽管 Spring Boot 返回的错误消息有所帮助，但对于使用 RESTful API 的客户端来说，信息量还不够大。因此，你应该提供更具信息量的错误消息，如下面\
  \ JSON 格式所示：\n\n```\n{\n\"error_title\" : \"\",\n\"error_status\" : \"\",\n\"error_detail\"\
  \ : \"\",\n\"error_timestamp\" : \"\",\n\"error_path\" : \"\",\n\"error_developerMessage\"\
  \": \"\",\n\"errors\": {\n\"field1\" : [ {\n\"field\" : \"\"\n\"message\" : \"\"\
  \n\"type\" : \"\"\n},\n\"field2\" : [ {\n\"field\" : \"\"\n\"message\" : \"\"\n\"\
  type\" : \"\"\n}\n}\n}\n```\n\n为了表示这种用于错误消息的 JSON 格式，你需要拦截 `MethodArgumentNotValidException`\
  \ 并返回适当的错误消息。在设计 UserRegistrationSystem 错误响应时，你提出了一个错误对象，它可以包含一个无序的键值错误实例集合，其中 `key`\
  \ 包含字段名称，`values` 包含字段的错误信息（包括字段、消息和类型），如前面的 JSON 数据所示。\n\n牢记前面的 JSON 错误消息设计，让我们创建类来返回一个包含适当\
  \ JSON 格式错误消息的实例。\n\n\n\n#### ValidationError 与更新后的 ErrorDetail 类\n\n为了在 UserRegistrationSystem\
  \ 应用程序中添加之前的验证错误功能，你需要创建两个类。\n\n*   `com.apress.ravi.Exception.FieldValidationError`\n\
  *   `com.apress.ravi.Exception.FieldValidationErrorDetails`\n\n清单 2-18 展示了 `FieldValidationError`\
  \ 类。\n\n```\nimport java.awt.TrayIcon.MessageType;\npublic class FieldValidationError\
  \ {\nprivate String filed;\nprivate String message;\nprivate MessageType type;\n\
  // Getter & Setter\n}\nListing 2-18.\nFieldValidationError Class\n```\n\n`FieldValidationError`\
  \ 类有三个属性：字段（`String`）、消息（`String`）和消息类型（`MessageType`）。\n\n`MessageType` 是一个枚举，包含可能的消息类型，如清单\
  \ 2-19 所示。\n\n```\npublic enum MessageType {\nSUCCESS, INFO, WARNING, ERROR\n}\n\
  Listing 2-19.\nEnumeration MessageType\n```\n\n`FieldValidationErrorDetails` 类的实例将被创建，用于生成预期的错误\
  \ JSON 格式的错误响应，如清单 2-20 所示。\n\n```\npackage com.apress.ravi.Exception;\nimport java.util.HashMap;\n\
  import java.util.List;\nimport java.util.Map;\npublic class FieldValidationErrorDetails\
  \ {\nprivate String error_title;\nprivate int error_status;\nprivate String error_detail;\n\
  private long error_timeStamp;\nprivate String error_path;\nprivate String error_developer_Message;\n\
  private Map<String, List<FieldValidationError>> errors =\nnew HashMap<String, List<FieldValidationError>>();\n\
  // Getter & Setter\n}\nListing 2-20.\nFieldValidationErrorDetails Class\n```\n\n\
  `FieldValidationErrorDetails` 类中的 `errors` 字段被定义为一个 `Map`，它接受 `String` 实例作为键，`FieldValidationError`\
  \ 实例的列表作为值。\n\n下一步是创建一个类来拦截并处理 `MethodArgumentNotValidException` 异常。\n\n#### 使用\
  \ @ControllerAdvice 注解处理异常\n\n`@ControllerAdvice` 注解用于为使用 `@ExceptionHandler` 注解标注的异常处理方法定义一个全局异常处理器。\n\
  \n使用 `@ControllerAdvice` 注解标注的类将适用于应用程序中的所有控制器。因此，该应用程序中任何控制器类抛出的任何异常都将由这个被注解的类处理，该类中有一个使用\
  \ `@ExceptionHandler` 注解标注的方法。只有当任何控制器类抛出的异常与配置的 `Exception` 类匹配时，此方法才会被执行。\n\n\
  那么，让我们在 `src/main/java` 文件夹下的 `com.apress.ravi.Exception` 包中创建控制器通知类 `RestValidationHandler`，该类用于拦截异常，如清单\
  \ 2-21 所示。\n\n```\npackage com.apress.ravi.Exception;\nimport java.awt.TrayIcon.MessageType;\n\
  import java.util.ArrayList;\nimport java.util.Date;\nimport java.util.List;\nimport\
  \ javax.servlet.http.HttpServletRequest;\nimport org.springframework.http.HttpStatus;\n\
  import org.springframework.http.ResponseEntity;\nimport org.springframework.validation.BindingResult;\n\
  import org.springframework.validation.FieldError;\nimport org.springframework.web.bind.MethodArgumentNotValidException;\n\
  import org.springframework.web.bind.annotation.ControllerAdvice;\nimport org.springframework.web.bind.annotation.ExceptionHandler;\n\
  import org.springframework.web.bind.annotation.ResponseStatus;\n@ControllerAdvice\n\
  public class RestValidationHandler {\n// method to handle validation error\n@ExceptionHandler(MethodArgumentNotValidException.class)\n\
  @ResponseStatus(HttpStatus.BAD_REQUEST)\npublic ResponseEntity<FieldValidationErrorDetails>\
  \ handleValidationError(\nMethodArgumentNotValidException mNotValidException,\n\
  HttpServletRequest request) {\nFieldValidationErrorDetails fErrorDetails =\nnew\
  \ FieldValidationErrorDetails();\nfErrorDetails.setError_timeStamp(new Date().getTime());\n\
  fErrorDetails.setError_status(HttpStatus.BAD_REQUEST.value());\nfErrorDetails.setError_title(\"\
  Field Validation Error\");\nfErrorDetails.setError_detail(\"Inut Field Validation\
  \ Failed\");\nfErrorDetails.setError_developer_Message(\nmNotValidException.getClass().getName());\n\
  fErrorDetails.setError_path(request.getRequestURI());\nBindingResult result = mNotValidException.getBindingResult();\n\
  List<FieldError> fieldErrors = result.getFieldErrors();\nfor (FieldError error :\
  \ fieldErrors) {\nFieldValidationError fError = processFieldError(error);\nList<FieldValidationError>\
  \ fValidationErrorsList =\nfErrorDetails.getErrors().get(error.getField());\nif\
  \ (fValidationErrorsList == null) {\nfValidationErrorsList =\nnew ArrayList<FieldValidationError>();\n\
  }\nfValidationErrorsList.add(fError);\nfErrorDetails.getErrors().put(\nerror.getField(),\
  \ fValidationErrorsList);\n}\nreturn new ResponseEntity<FieldValidationErrorDetails>(\n\
  fErrorDetails, HttpStatus.BAD_REQUEST);\n}\n// method to process field error\nprivate\
  \ FieldValidationError processFieldError(final FieldError error) {\nFieldValidationError\
  \ fieldValidationError =\nnew FieldValidationError();\nif (error != null) {\nfieldValidationError.setFiled(error.getField());\n\
  fieldValidationError.setType(MessageType.ERROR);\nfieldValidationError.setMessage(error.getDefaultMessage());\n\
  }\nreturn fieldValidationError;\n}\n}\nListing 2-21.\nController Advice Class to\
  \ handleValidationError\n```\n\n如清单 2-21 所示，`RestValidationHandler` 使用了来自 `org.springframework.web.bind.annotation`\
  \ 包的 `@ControllerAdvice` 注解。该类定义了一个名为 `handleValidationError` 的全局异常处理方法，该方法带有 `@ExceptionHandler(MethodArgumentNotValidException.class)`\
  \ 注解，用于拦截由 UserRegistrationSystem 应用程序中任何控制器类抛出的 `MethodArgumentNotValidException`\
  \ 类型的异常。\n\n`handlerValidationError` 方法的实现首先创建了一个 `FieldValidationErrorDetails`\
  \ 实例，并通过调用不同字段的 setter 方法为其填充适当的信息。然后，你使用传入的异常参数 `mNotValidException` 来获取字段错误列表，并遍历该列表以获取错误信息。接着，你为每个字段错误创建一个\
  \ `FieldValidationError` 实例，并用代码和错误信息填充它。\n\n有了这个实现，让我们重启 UserRegistrationSystem\
  \ 应用程序，并从 Postman 提交一个缺少地址的用户。这个缺少地址的 `POST` 数据请求将导致返回状态码 400 以及自定义的错误响应，如图 2-11\
  \ 所示。\n\n![A436970_1_En_2_Fig11_HTML.jpg](img/A436970_1_En_2_Fig11_HTML.jpg)\n\n\
  图 2-11.\n\n创建缺少地址的用户时返回的自定义错误消息\n\n#### 外部化错误消息\n\n到目前为止，你在输入数据验证方面取得了良好进展，客户端能够收到描述性的错误消息，这有助于客户端在消费\
  \ API 时排查问题并从这些错误中恢复。\n\n尽管你在上一节中看到的错误消息是描述性的，但 API 开发者可以通过从外部的 `messages.properties`\
  \ 文件中提取此消息，使其更具描述性。这种 properties 文件方法允许 API 开发者轻松地替换消息，而无需修改代码。它还支持国际化/本地化。\n\n\
  下一步是读取 properties 文件，以便在创建 `ValidationError` 实例时可以使用该文件中的属性。为了实现该功能，你必须在应用程序配置类中配置\
  \ `ReloadableResourceBundleMessageSource`。\n\n\n\n##### 创建 ReloadableResourceBundleMessageSource\
  \ Bean：messageSource\n\n现在，我们在 `src/main/java` 文件夹下 `com.apress.ravi` 包内的 `UserRegistrationConfiguration`\
  \ 类中创建一个 `ReloadableResourceBundleMessageSource` bean。清单 2-22 展示了必要的代码修改。\n\n```\n\
  package com.apress.ravi;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.context.support.ReloadableResourceBundleMessageSource;\n\
  @Configuration\npublic class UserRegistrationConfiguration {\n@Bean(name = \"messageSource\"\
  )\npublic ReloadableResourceBundleMessageSource messageSource() {\nReloadableResourceBundleMessageSource\
  \ messageBundle =\nnew ReloadableResourceBundleMessageSource();\nmessageBundle.setBasename(\"\
  classpath:messages/messages\");\nmessageBundle.setDefaultEncoding(\"UTF-8\");\n\
  return messageBundle;\n}\n}\n清单 2-22.\nReloadableResourceBundleMessageSource Bean\n\
  ```\n\n在清单 2-22 中，你使用 `@Configuration` 注解标注了 `UserRegistrationConfiguration` 类。Bean\
  \ 的名称通过 `@Bean(name = \"messageSource\")` 定义为 `messageSource`。\n\n`@Configuration`\
  \ 注解是一个元注解，表明该配置类可以包含一个或多个 `@Bean` 方法，用于生成可由 Spring 容器管理的 Bean 定义。这个 Bean 将允许你在不重启应用程序的情况下修改消息的属性文件。\n\
  \n`messageSource` 方法配置了一个 `ReloadableResourceBundleMessageSource`，以支持从属性文件中读取消息。`ReloadableResourceBundleMessageSource`\
  \ Bean 是一种 `MessageSource`，它加载消息的属性文件，并从属性文件中解析消息键。\n\n要设置基础名称，`setBaseName` 方法接受一个参数\
  \ `classpath:messages/messages`（即属性文件的路径）。你设置了消息源文件的默认编码为 UTF-8。Spring 将在 `src/main/resources/messages`\
  \ 文件夹中查找名为 `messages.properties` 的属性文件。\n\n##### 创建属性文件\n\n现在，在 `src/main/resources/messages`\
  \ 文件夹下创建一个 `messages.properties` 文件，并添加以下消息：\n\n```\nerror.name.empty=姓名字段为必填项\n\
  error.name.length=姓名应限制在 50 个字符以内\nerror.address.empty=地址字段为必填项\nerror.address.length=地址应限制在\
  \ 150 个字符以内\nerror.email.empty=邮箱字段为必填项\nerror.email.email=邮箱格式应正确\nerror.email.length=邮箱应限制在\
  \ 80 个字符以内\n```\n\n这些消息遵循每个消息键的特定模式，如下所示：\n\n```\nerror.字段名.验证类型\n```\n\n##### 使用\
  \ message 属性的 Bean 验证注解\n\n现在，我们使用带有 `message` 属性的 JSR-303 注解进行 Bean 验证。`message`\
  \ 属性用于设置当注解定义的约束未满足时显示的自定义错误消息。清单 2-23 展示了必要的代码修改。\n\n这个 `message` 属性将通过上一节定义的 `ReloadableResourceBundleMessageSource`\
  \ Bean，从 `messages.properties` 文件中获取匹配消息键的消息值。\n\n```\npackage com.apress.ravi.dto;\n\
  import javax.persistence.Column;\nimport javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\n\
  import javax.persistence.Id;\nimport org.hibernate.validator.constraints.Email;\n\
  import org.hibernate.validator.constraints.Length;\nimport org.hibernate.validator.constraints.NotEmpty;\n\
  @Entity\npublic class UsersDTO {\n@Id\n@GeneratedValue\n@Column(name = \"USER_ID\"\
  )\nprivate Long id;\n@NotEmpty(message = \"error.name.empty\")\n@Length(max = 50,\
  \ message = \"error.name.length\")\n@Column(name = \"NAME\")\nprivate String name;\n\
  @NotEmpty(message = \"error.address.empty\")\n@Length(max = 150, message = \"error.address.length\"\
  )\n@Column(name = \"ADDRESS\")\nprivate String address;\n@Email(message = \"error.email.email\"\
  )\n@NotEmpty(message = \"error.email.empty\")\n@Length(max = 80, message = \"error.email.length\"\
  )\n@Column(name = \"EMAIL\")\nprivate String email;\n// Getter & Setter 方法\n}\n\
  清单 2-23.\n使用 message 属性的 Bean 验证注解\n```\n\n到目前为止，你已经创建了 `ReloadableResourceBundleMessageSource`\
  \ Bean，在 `messages.properties` 文件中定义了消息，并使用带有 `message` 属性的 Bean 验证注解标注了实体类。\n\n\
  下一步是从属性文件中读取消息，并在创建 `FieldValidationErrorinstance` 时使用它们。\n\n\n\n##### 从属性文件读取消息\n\
  \n要读取属性文件，请在`RestValidationHandler`类的构造函数中通过`@Autowired`注解注入`MessageSource`参数。清单\
  \ 2-24 展示了`RestValidationHandler`类中`handleValidationError`方法的更新后源代码。\n\n```\npackage\
  \ com.apress.ravi.Exception;\nimport java.awt.TrayIcon.MessageType;\nimport java.util.ArrayList;\n\
  import java.util.Date;\nimport java.util.List;\nimport javax.servlet.http.HttpServletRequest;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.MessageSource;\n\
  import org.springframework.http.HttpStatus;\nimport org.springframework.http.ResponseEntity;\n\
  import org.springframework.validation.BindingResult;\nimport org.springframework.validation.FieldError;\n\
  import org.springframework.web.bind.MethodArgumentNotValidException;\nimport org.springframework.web.bind.annotation.ControllerAdvice;\n\
  import org.springframework.web.bind.annotation.ExceptionHandler;\nimport org.springframework.web.bind.annotation.ResponseStatus;\n\
  @ControllerAdvice\npublic class RestValidationHandler {\nprivate MessageSource messageSource;\n\
  @Autowired\npublic RestValidationHandler(MessageSource messageSource) {\nthis.messageSource\
  \ = messageSource;\n}\n// 处理验证错误的方法\n@ExceptionHandler(MethodArgumentNotValidException.class)\n\
  @ResponseStatus(HttpStatus.BAD_REQUEST)\npublic ResponseEntity handleValidationError(\n\
  MethodArgumentNotValidException mNotValidException,\nHttpServletRequest request)\
  \ {\nFieldValidationErrorDetails fErrorDetails =\nnew FieldValidationErrorDetails();\n\
  fErrorDetails.setError_timeStamp(new Date().getTime());\nfErrorDetails.setError_status(HttpStatus.BAD_REQUEST.value());\n\
  fErrorDetails.setError_title(\"字段验证错误\");\nfErrorDetails.setError_detail(\"输入字段验证失败\"\
  );\nfErrorDetails.setError_developer_Message(\nmNotValidException.getClass().getName());\n\
  fErrorDetails.setError_path(request.getRequestURI());\nBindingResult result = mNotValidException.getBindingResult();\n\
  List fieldErrors = result.getFieldErrors();\nfor (FieldError error : fieldErrors)\
  \ {\nFieldValidationError fError = processFieldError(error);\nList fValidationErrorsList\
  \ =\nfErrorDetails.getErrors().get(error.getField());\nif (fValidationErrorsList\
  \ == null) {\nfValidationErrorsList =\nnew ArrayList();\n}\nfValidationErrorsList.add(fError);\n\
  fErrorDetails.getErrors().put(\nerror.getField(), fValidationErrorsList);\n}\nreturn\
  \ new ResponseEntity(\nfErrorDetails, HttpStatus.BAD_REQUEST);\n}\n// 处理字段错误的方法\n\
  private FieldValidationError processFieldError(final FieldError error) {\nFieldValidationError\
  \ fieldValidationError =\nnew FieldValidationError();\nif (error != null) {\nLocale\
  \ currentLocale = LocaleContextHolder.getLocale();\nString msg = messageSource.getMessage(\n\
  error.getDefaultMessage(), null, currentLocale);\nfieldValidationError.setFiled(error.getField());\n\
  fieldValidationError.setType(MessageType.ERROR);\nfieldValidationError.setMessage(msg);\n\
  }\nreturn fieldValidationError;\n}\n}\n清单 2-24.\n从消息属性文件读取消息\n```\n\n在清单 2-24 中，你使用了`MessageSource`的`getMessage`方法，根据`currentLocale`从属性文件中检索消息。\n\
  \n要测试这些更改，请重启 UserRegistrationSystem 应用程序并启动 Postman，提交一个缺少地址且电子邮件格式不正确的用户，如图 2-12\
  \ 所示。这将导致从属性文件中返回新的验证错误消息。\n\n![A436970_1_En_2_Fig12_HTML.jpg](img/A436970_1_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12.\n\n创建一个缺少地址且电子邮件格式不正确的用户\n\n## 本章小结\n\n在本章中，你学习了如何为 UserRegistrationSystem\
