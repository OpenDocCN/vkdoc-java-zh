- "# 3. 设置 AngularJS：创建你的单页应用程序\n\n在上一章中，你学习了如何为 UserRegistrationSystem 应用程序创建 RESTful\
  \ 服务。现在你了解了 HTTP 方法和状态码。你创建了不同的端点来执行 CRUD 操作。你处理了 REST API 中的错误，并定义了自定义错误响应。你还使用`Validation`注解验证了请求输入，并将错误消息外部化。\n\
  \n前端涉及用户看到的所有内容，包括设计以及 HTML 和 CSS 等语言。前端代码的主要目的是与用户交互，并以定义良好的样式呈现数据。在构建前端应用程序时，有许多出色的\
  \ JavaScript 库可供使用。\n\nAngularJS 是一个开源 JavaScript 框架，为创建 Web 应用程序提供了结构化方法。它是一个构建在轻量级\
  \ jQuery 之上的 JavaScript 库。它强制使用结构清晰、整洁的模型-视图-控制器（MVC）框架。由于这种清晰且结构化的方法，AngularJS\
  \ 是 Spring Boot 客户端库的完美解决方案。\n\n在本章中，我将介绍 MVC 和 AngularJS 框架及其主要组件，以便你能够为使用 Spring\
  \ Boot 开发的 UserRegistrationSystem 应用程序开发前端。\n\n我将从 AngularJS 及其生命周期介绍开始。然后你将了解 AngularJS\
  \ 组件以及如何在应用程序中实现它们。此外，你将消费在第 2 章中开发的 REST API，以开发你的单页应用程序（SPA）。在本章中，你将学习以下内容：\n\n\
  *   如何使用 AngularJS 作为前端框架\n*   如何开发单页应用程序来消费 REST API\n\n在本章中，你将学习如何将 AngularJS\
  \ 框架集成到你的 Spring Boot UserRegistrationSystem 应用程序中，以开发单页应用程序。如果你想深入了解 AngularJS，请参考[`https://angularjs.org/`](https://angularjs.org/)。\n\
  \n## 介绍 AngularJS 作为前端框架\n\nAngularJS 是一个用 JavaScript 编写的 Web 应用程序开发库，由 Google 维护。它是一个开源\
  \ JavaScript 框架，解决了单页应用程序（SPA）的挑战。AngularJS Web 应用程序遵循 MVC 设计模式，从而开发出可扩展、可维护、可测试且标准化的\
  \ Web 应用程序。AngularJS 的数据绑定和依赖注入使其成为任何服务器技术的理想合作伙伴，因为它消除了许多否则你必须编写的代码，并且这一切都在浏览器中完成。\n\
  \n\n\n### AngularJS 基本组件\n\nAngularJS 允许开发者基于 MVC 模型构建结构化的应用程序，这些应用健壮且易于维护。在实现 AngularJS\
  \ 之前，熟悉其各个组件非常重要。\n\n*   **模块**：这是 AngularJS 的组件之一。模块本质上是一个容器，包含服务、控制器、过滤器、指令等。AngularJS\
  \ 中的每个模块都有自己独立的文件夹结构，用于存放控制器、指令等。AngularJS 中的每个视图页面都有一个模块。\n*   **作用域**：AngularJS\
  \ 中的作用域只是用于填充网页视图的数据的 JavaScript 表示。这些数据可以来自任何源，例如数据库或远程 Web 服务器。\n*   **视图**：AngularJS\
  \ 中带有模板和指令的视图是构建呈现给用户的 HTML 视图的其他组件。\n*   **表达式**：在 HTML 模板中添加表达式的能力是 AngularJS\
  \ 的一大特性。表达式基本上与作用域相关联。表达式有助于将应用程序数据绑定到 HTML。\n*   **控制器**：控制器是 MVC 框架的一个组件。控制器将包含您的核心业务逻辑。它在\
  \ AngularJS 中的主要作用是使用作用域将数据暴露给视图页面。\n*   **数据绑定**：AngularJS 的一个重要特性是数据绑定。这是将数据从模型链接到视图，反之亦然的过程。AngularJS\
  \ 支持双向数据绑定。\n    *   当网页上的数据发生变化时，模型会更新。\n    *   当模型中的数据发生变化时，视图页面会自动更新。模型代表数据，视图则展示数据。\n\
  *   **服务**：AngularJS 中的服务是单例对象，为 Web 应用程序提供功能。\n*   **依赖注入**：DI 是在运行时注入依赖项的过程（即，使依赖组件能够在已初始化代码的组件内被访问）。它用于消费服务。例如，如果一个模块需要通过\
  \ HTTP 请求访问资源，那么可以将 HTTP 服务注入到该模块中，以使该功能在模块代码中可用。\n\n### AngularJS 生命周期\n\n现在您已经了解了\
  \ AngularJS 应用程序中涉及的不同组件，我将介绍 AngularJS 生命周期中发生的事情，该周期包含三个阶段：引导阶段、编译阶段和运行时阶段。AngularJS\
  \ 的这些阶段发生在网页在客户端浏览器中加载时。为了设计和实现使用 AngularJS 开发的应用程序中的代码，理解 AngularJS 的生命周期非常重要。\n\
  \n#### 引导阶段\n\n引导阶段是 AngularJS 生命周期的第一阶段，发生在 AngularJS JavaScript 库被下载到客户端浏览器时。一旦\
  \ JavaScript 库被下载，AngularJS 会初始化其自身的组件，并初始化 `ng-app` 指令所指向的应用程序模块。此阶段中的静态 DOM 被加载到浏览器中。\n\
  \n#### 编译阶段\n\nHTML 编译阶段是 AngularJS 生命周期的第二阶段。在此阶段，加载的静态 DOM 会被动态 DOM 替换，以表示 AngularJS\
  \ 视图。然后，这些 DOM 会链接到来自 AngularJS 内置库或自定义指令代码的相应 JavaScript 函数。\n\n#### 运行时数据绑定阶段\n\
  \n这是 AngularJS 生命周期的最后阶段，只要用户不重新加载或导航离开网页，该阶段就会持续存在。在此阶段，对作用域所做的任何更改都会反映在视图中，反之亦然。\n\
  \n### AngularJS 架构概念\n\n现在您将了解 AngularJS 的架构概念。当一个 HTML 文档被加载到浏览器并由浏览器评估时，首先会加载\
  \ AngularJS JavaScript 文件，创建 Angular 全局对象，并执行您注册控制器函数的 JavaScript 代码。然后，AngularJS\
  \ 会扫描 HTML 以查找 AngularJS 应用程序和视图，并找到与视图对应的控制器函数。接着，AngularJS 执行控制器函数，并使用由控制器填充的模型中的数据更新视图。\n\
  \n接下来，AngularJS 会监听浏览器事件，例如，按钮点击、鼠标移动、输入字段更改等。如果发生任何这些事件，AngularJS 将相应地更新视图。图 3-1\
  \ 展示了 AngularJS 的工作流程图。\n\n![A436970_1_En_3_Fig1_HTML.jpg](img/A436970_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1.\n\nAngularJS 工作流程图\n\nAngularJS 包含一个模块，该模块充当不同类型应用程序（如视图、控制器、指令、服务等）的容器。模块指定了应用程序如何被引导。然后，您有一个配置组件。路由用于将\
  \ URL 链接到控制器和视图。视图用于处理复杂的事件。它使用 `ng-view` 指令。此外，您还有一个控制器，它控制 AngularJS 应用程序的数据，并由常规的\
  \ JavaScript 对象组成。AngularJS 定义了一个 `ng-controller` 指令，该指令通过使用控制器函数来创建新的控制器对象。AngularJS\
  \ 带有几个内置服务，例如 `$http`、`$route`、`$window`、`$location` 等。作用域指的是引用模型的对象。它们在连接控制器与视图方面扮演着重要角色。\n\
  \n#### MVC 架构\n\nAngularJS 使用 MVC 架构来创建 Web 应用程序。MVC 架构是一种编程方法论，旨在将应用程序拆分为三个核心组件：模型、视图和控制器。这三个组件组合起来形成您的应用程序。图\
  \ 3-2 展示了模型-视图-控制器架构。\n\n![A436970_1_En_3_Fig2_HTML.jpg](img/A436970_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2.\n\nAngularJS 中的 MVC 架构\n\n当用户通过浏览器发送 HTTP 请求时，该请求由控制器接收。控制器处理该请求，并将请求发送给模型以提供适当的数据。作为响应，模型将结果数据数组再次提供给控制器。控制器再次将数据处理为所需格式，并将其发送给视图。视图通过\
  \ UI 内容表示数据，并将其发送给控制器。最后，控制器将 HTTP 响应发送回浏览器。\n\n*   AngularJS 视图用于在 Web 浏览器中向用户生成信息的输出表示，例如图表或示意图。AngularJS\
  \ 通过拉取为应用程序定义的所有模板，在 DOM 中构建视图。因此，开发人员在这里的工作主要是使用 HTML 和 CSS 来创建模板。\n*   AngularJS\
  \ 模型包含用于存储应用程序模型的 `$scope` 对象，因此无需像其他 JavaScript 客户端框架那样创建 JavaScript 模型类。作用域附加到\
  \ DOM，有助于大大简化 JavaScript 问题。\n*   AngularJS 控制器是您定义特定于某个视图的所有业务逻辑的地方。控制器将模型和视图联系在一起。\n\
  \n## 设置您的开发环境\n\n在本节中，您将设置您的开发环境。\n\n### 将 AngularJS 添加到 Spring Boot\n\n让我们通过将 AngularJS\
  \ 添加到您在第 2 章的 UserRegistrationSystem 应用程序中开发的 Spring Boot 应用程序来设置开发环境。您可以通过三种方式实现此目的。\n\
  \n*   从 Google CDN 包含 Angular 脚本\n*   下载并在本地托管 Angular 文件\n*   在 Spring Boot 应用程序的\
  \ `pom.xml` 中提供 AngularJS 的依赖信息\n\n以下各节将涵盖所有三种方式。\n\n\n\n#### 从 Google CDN 引入 Angular\
  \ 脚本\n\n以下介绍如何从 Google CDN 引入 Angular 脚本。\n\n要快速上手 AngularJS，请将 HTML 的 `<script>`\
  \ 标签指向一个 Google CDN URL。Angular 脚本 URL 有两种类型，一种用于生产环境，一种用于开发环境。\n\n*   `angular.min.js`：这是压缩版本，应在生产环境中使用。\n\
  *   `angular.js`：这是未压缩、人类可读的版本，应在 Web 开发中使用。\n\n清单 3-1 展示了将代码指向 Google CDN 服务器上\
  \ Angular 脚本的压缩版本 1.5.6 的示例。\n\n```\n\nAngular Application\n\n清单 3-1.\nH2 pom.xml\
  \ 依赖\n```\n\n#### 下载并在本地托管 Angular 文件\n\n引入 Angular 脚本的另一种方法是下载并在本地托管 Angular 文件。\n\
  \n希望离线使用 Angular 或希望在自己的服务器上托管 Angular 文件的开发者可以选择此方式。导航至 [`https://code.angularjs.org/`](https://code.angularjs.org/)\
  \ ，从 Angular 版本列表中选择并下载所需版本。或者，您可以从 [`https://angularjs.org/`](https://angularjs.org/)\
  \ 下载 Angular 的最新稳定版本。图 3-3 显示了带有下载链接的 AngularJS 页面。\n\n![A436970_1_En_3_Fig3_HTML.jpg](img/A436970_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3.\n\nAngularJS 页面\n\n点击“Download AngularJS”会弹出一个下载 AngularJS 的弹窗，如图 3-4 所示。\n\
  \n![A436970_1_En_3_Fig4_HTML.jpg](img/A436970_1_En_3_Fig4_HTML.jpg)\n\n图 3-4.\n\n\
  下载 AngularJS 的弹窗\n\n#### 在 pom.xml 中提供依赖信息\n\n除了手动下载 AngularJS 库，您还可以在开发 Spring\
  \ Boot 应用时，在 `pom.xml` 中为 AngularJS 提供依赖信息，这样 AngularJS 将会被自动下载到库中。清单 3-2 展示了 AngularJS\
  \ 和 Bootstrap CSS 的依赖信息。\n\n```\norg.webjars\nangularjs\n1.4.9\nruntime\n\norg.webjars\n\
  bootstrap\n3.3.6\nruntime\n\n清单 3-2.\n在 pom.xml 中添加 AngularJS 和 Bootstrap 的依赖\n\
  ```\n\n### 将 Twitter Bootstrap 添加到 Spring Boot\n\nTwitter Bootstrap 是一个前端框架，旨在让响应式设计变得更加容易。Bootstrap\
  \ CSS 框架可用于设置网站内容的样式。您可以创建自己的 CSS 样式来让网站看起来很棒，但 Bootstrap 提供了一套优秀的 CSS 样式，能让您设计出外观极佳的内容布局。在使用\
  \ AngularJS 时，并非必须使用 Bootstrap，AngularJS 和 Bootstrap 之间也没有内在联系，因为它们是两个不同的包。\n\n\
  要使用 Bootstrap CSS 框架中的 CSS，您可以在开发 Spring Boot 应用时，在 `pom.xml` 中定义一个依赖，如清单 3-2 所示，这样它就会被自动下载到库文件夹中。此外，也可以从\
  \ [`https://getbootstrap.com/`](https://getbootstrap.com/) 下载 Bootstrap 归档文件，其中也包含了\
  \ CSS 和 JavaScript 文件。\n\n### 开发单页应用\n\n单页应用是指只有一个入口 HTML 页面（可能是 `index.html`）的应用；所有应用内容都动态地添加和移除到这个页面中。在运行时，基于某些事件，附加到标签上的现有内容会被移除，然后动态内容会被附加到同一个标签上。\n\
  \n单页应用的入口点可以在一个包含 `<div ng-view></div>` 标签的 `index.html` 中看到，如清单 3-3 所示，所有动态内容都被插入到\
  \ `index.html` 中。因此，用户无需等待加载新页面，新内容会在极短的时间内动态显示出来。\n\n```\n\n...\n\n...\n\n...\n\
  \n清单 3-3.\n开发 HTML 页面：单页应用的入口点\n```\n\n在清单 3-3 中，您在开发 HTML 页面时使用了以下良好实践：\n\n*  \
  \ 将 `<script>` 标签放在页面底部，以提高应用加载速度，因为 Angular 脚本的加载不会影响 HTML 的加载。\n*   将 `ng-app`\
  \ 放在应用的根元素上，通常放在 `<html>` 标签上，如果您希望 Angular 自动引导您的应用。\n\n### 引导应用\n\n引导 AngularJS\
  \ 是指通过向 HTML 中的某个元素添加 `ng-app` 来初始化或启动 Angular 应用的过程，如清单 3-4 所示，这发生在应用首次启动时。\n\n\
  ```\n...\n\n清单 3-4.\n通过在 HTML 页面中添加 ng-app 来引导 AngularJS\n```\n\n这也被称为自动初始化。因此，当\
  \ AngularJS 在分析 `index.html` 文件后找到 `ng-app` 指令时，它会加载相关的模块，然后编译 DOM。\n\nAngularJS\
  \ 应用 `UserRegistrationSystem` 在 `app.js` 中被定义为 AngularJS 模块（`angular.module`），`app.js`\
  \ 是应用的入口点。\n\n```\nvar app = angular.module('userregistrationsystem', ['ngRoute',\
  \ 'ngResource']);\n```\n\n`app.js` 文件中的变量 `app` 可以命名为任何名称。\n\n### 依赖注入\n\n依赖注入是一种设计模式，用于在应用中定义依赖关系，将其作为配置的一部分，而不是在组件内部硬编码。DI\
  \ 帮助您避免手动创建应用依赖，并使得在需要时可以更改它们。AngularJS 在应用首次启动时使用 DI 来加载模块依赖。\n\nDI 的好处如下：\n\n\
  *   它将创建依赖的过程与使用依赖的过程分离开来。\n*   使用者会感觉创建依赖的过程是由其他人处理的；用户只需关心如何使用依赖。\n*   它提供了在需要时更改依赖的功能。\n\
  *   它使应用更易于测试。\n\n如您所见，`app.js` 中定义了两个依赖，供 `userregistrationsystem` 在启动时使用，如下所示：\n\
  \n```\nvar app = angular.module('userregistrationsystem', ['ngRoute', 'ngResource']);\n\
  ```\n\n上述代码中的两个依赖是在模块定义的一个数组中定义的。\n\n*   `ngRoute`：第一个依赖是 AngularJS 的 `ngRoute`\
  \ 模块，它为应用提供路由功能。`ngRoute` 模块用于将 URL 深度链接到控制器和视图（HTML 片段）。\n*   `ngResource`：第二个依赖是\
  \ AngularJS 的 `ngResource` 模块，它提供与 RESTful 服务的交互支持。\n\n\n\n### AngularJS 路由\n\n\
  AngularJS 路由通过 `$routeProvider` API 进行配置。路由依赖于 `ngRoute` 模块，这就是为什么在模块定义中，其依赖项被定义在一个数组里。\n\
  \n清单 3-5 展示了 `app.js` 中的代码。你将在 AngularJS 应用中定义四个路由。\n\n*   第一个是 `/list-all-users`。\n\
  *   第二个是 `/register-new-user`。\n*   第三个是 `/update-user/:id`。\n*   第四个与前三个不同。\n\n\
  ```\napp.config(function($routeProvider) {\n$routeProvider\n.when('/list-all-users',\
  \ {\ntemplateUrl : '/template/listuser.html',\ncontroller : 'listUserController'\n\
  }).when('/register-new-user',{\ntemplateUrl : '/template/userregistration.html',\n\
  controller : 'registerUserController'\n}).when('/update-user/:id',{\ntemplateUrl\
  \ : '/template/userupdation.html' ,\ncontroller : 'usersDetailsController'\n}).otherwise({\n\
  redirectTo : '/home',\ntemplateUrl : '/template/home.html',\n});\n});\n清单 3-5.\n\
  在 AngularJS 应用中定义路由\n```\n\n清单 3-5 中定义的四个路由直接映射到应用中定义的 URL。\n\n当用户点击应用中指定为 `http://localhost:8080/#/list-all-users`\
  \ 的链接时，将遵循 `/list-all-users` 路由，并显示与 `/list-all-users` URL 关联的内容。\n\n类似地，当用户点击链接\
  \ `http://localhost:8080/#/register-new-user` 时，将遵循 `/register-new-user` 路由，并显示与\
  \ `/register-new-user` URL 关联的内容。\n\n当用户点击链接 `http://localhost:8080/#/update-user/{id`\
  \ `}` 时，将遵循 `/update-user/:id` 路由，并显示与 `/update-user/:id` URL 关联的内容。\n\n此外，如果用户访问除这三个之外的任何\
  \ URL，将遵循 `/home` 路由，并显示与 `/home` URL 关联的内容。\n\n### AngularJS 模板\n\nAngularJS 模板，也称为\
  \ HTML 片段，是绑定到 `index.html` 文件中 `<div ng-view></div>` 标签的 HTML 代码。如果你查看 `app.js`\
  \ 文件中的代码，可以看到为不同的路由定义了不同的 `templateUrl` 值，如清单 3-6 所示。\n\n```\n$routeProvider\n.when('/list-all-users',\
  \ {\ntemplateUrl : '/template/listuser.html',\ncontroller : 'listUserController'\n\
  }).when('/register-new-user',{\ntemplateUrl : '/template/userregistration.html',\n\
  controller : 'registerUserController'\n}).when('/update-user/:id',{\ntemplateUrl\
  \ : '/template/userupdation.html' ,\ncontroller : 'usersDetailsController'\n}).otherwise({\n\
  redirectTo : '/home',\ntemplateUrl : '/template/home.html',\n});\n清单 3-6.\n为路由定义\
  \ templateUrl\n```\n\n如清单 3-6 所示，你定义了四个不同的片段或模板。`listuser.html`、`userregistration.html`、`userupdation.html`\
  \ 和 `home.html` 页面是四个不同的片段或模板，它们包含 HTML 代码和 AngularJS 内置的模板语言，用于在模板中显示动态数据。\n\n\
