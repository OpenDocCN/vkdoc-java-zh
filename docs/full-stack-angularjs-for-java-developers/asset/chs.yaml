- "# 7. 使用 Spring Boot Actuator 进行应用监控\n\n应用监控可确保运行在服务器上的应用按预期工作。在第 2 章中，你使用 Spring\
  \ Boot 开发了 RESTful 服务。此外，当你的 Spring Boot 应用部署到生产环境时，Spring Boot 还支持额外的功能来监控和管理它。\n\
  \n例如，假设一位开发者刚刚完成了他的应用并将更改推送到了仓库。接着，这位开发者找到运维团队，请他们部署这个应用。作为回应，运维团队向开发者索要运行手册（即操作指南），其中包含部署说明、发生异常时需要执行的操作等。运维团队还需要了解应用的配置细节。经验丰富的开发者甚至会分享有关外部属性及其在服务器上位置的信息，运维团队将据此使用可接受的值来配置外部属性。到目前为止，一切顺利。\n\
  \n运维团队最后的问题是：“你们如何监控这个应用？” 哎呀，这在业务需求中并未提及。于是，开发者开始思考各种方案，比如向经理申请更多资金来开发一个监控工具，但这可能行不通。\n\
  \nSpring 框架是构建复杂企业应用最流行的框架之一。这些应用过去常常在许多服务器上运行，服务于多个领域和环境，例如本地构建环境、测试环境、QA 环境，有时还有用户验收测试环境，然后才会部署到生产环境。每个环境都有不同的配置，例如在本地环境中，开发者可能使用开源数据库，而在生产环境中，数据库可能是\
  \ Oracle。此外，本地环境可能使用 ActiveMQ 进行消息传递，而生产环境可能使用 IBM 消息源。企业需求（如持续构建等）需要处理很多问题。这不像你只需创建一个\
  \ `.war` 文件然后放到服务器上那么简单。在本章中，你将使用本地环境进行部署。\n\n通过使用 HTTP 端点，你可以在生产环境中管理已部署的应用。Spring\
  \ Boot 拥有一系列功能，让你在部署应用后，能够在生产环境或任何环境中监控你的 Spring Boot 应用。\n\n在 Spring Boot 中，你可以通过多种方式监控和管理你的\
  \ Spring Boot 应用，例如 HTTP、JVM 和 SSH。在本章中，你将了解如何使用 Spring Boot 的 Actuator 模块来监控你的应用。本章将概述\
  \ DevOps 如何使用 Spring Boot。DevOps 是开发者和运维团队的结合。\n\n## 介绍 Spring Boot Actuator\n\n\
  [Spring Boot Actuator](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#production-ready)\
  \ 是 Spring Boot 的一个子项目。Spring Boot 中的 Actuator 模块使得在你的 Spring Boot 应用中使用生产就绪功能成为可能。Actuator\
  \ 暴露了各种端点，用于监控你正在运行的应用的指标和统计数据。使用 Actuator，你可以监控健康状态、查看指标、收集日志、执行线程转储、了解垃圾回收、查看环境变量，以及查看来自\
  \ `BeanFactory` 的 Bean。此外，你可以使用它来监控你的应用，以进行任何生产支持和相关事务，例如监控进程、检查健康状态、检查进程是否在运行、检查数据库连接是否正常，以及检查相关指标，如\
  \ JVM 中的堆大小或可用空间。所有这些都由 Actuator 处理。\n\nSpring Boot 提供了可以暴露一些 REST 端点的库，以便不同的监控工具可以使用这些\
  \ REST 端点从 REST 端点获取数据。你可以使用 `<host>:port/<endpoint>` 访问所有这些端点。例如，如果你想监控应用的运行状况，你需要访问\
  \ `http://localhost:8080/health`。\n\n### 启用 Actuator 模块\n\n要启用 Actuator 模块，请在浏览器中访问\
  \ [`http://start.spring.io/`](http://start.spring.io/)。Spring Initializr 站点上的“运维”部分包含一系列依赖项，例如\
  \ Actuator、Actuator Docs 和 Remote Shell，如图 7-1 所示。\n\n![A436970_1_En_7_Fig1_HTML.jpg](img/A436970_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1.\n\nSpring Initializr 中的 Spring Boot Starter 依赖项\n\n让我们在你的 UserRegistrationSystem\
  \ 应用的 Maven `pom.xml` 文件中手动添加 `spring-boot-starter-actuator` 依赖项，如清单 7-1 所示。\n\n\
  ```\norg.springframework.boot\nspring-boot-starter-actuator\n\n清单 7-1.\nActuator\
  \ 依赖项\n```\n\n只需在你的 `pom.xml` 文件中添加 `spring-boot-starter-actuator` 依赖项，Actuator\
  \ 模块就会在你的 Spring Boot 应用中启用，并且健康检查、指标和其他功能将自动应用于你的应用。\n\n## Actuator 端点\n\nActuator\
  \ 端点允许开发者监控正在运行的 Spring Boot 应用，并且还允许开发者与 Spring Boot 应用进行交互。Spring Boot 提供了许多内置端点，例如一个健康端点，它提供有关你正在运行的\
  \ Spring Boot 应用的基本健康信息，并且该端点将映射到 `/health`。你也可以添加自己的端点。\n\n默认情况下，Spring Boot Actuator\
  \ 是安全的，因此并非任何人都可以访问这些端点。你可以通过在 `application.properties` 文件中设置属性来禁用这些安全功能，如下所示：\n\
  \n```\nmanagement.security.enabled=false\n```\n\n然而，由于这些 Actuator 端点会暴露环境变量和指标信息，你最好还是让它们保持安全状态。\n\
  \n让我们启动 UserRegistrationSystem 应用，并探索 Spring Boot 开箱即用的最常见端点。图 7-2 显示了 STS 控制台中的端点。\n\
  \n![A436970_1_En_7_Fig2_HTML.jpg](img/A436970_1_En_7_Fig2_HTML.jpg)\n\n图 7-2.\n\n\
  控制台中的端点\n\n如图 7-2 所示，STS 控制台中出现了不同的端点。默认情况下，你有 `/info`、`/health`、`/beans`、`/dump`、`/env`\
  \ 等端点。所有这些端点都是由 Actuator 提供的 REST 端点。让我们探索其中几个 REST 端点，以便在接下来的章节中获取数据。\n\n\n\n###\
  \ /info\n\n此端点显示关于 Spring Boot 应用程序的任意信息。图 7-3 展示了浏览器中的 `/info` 端点。\n\n![A436970_1_En_7_Fig3_HTML.jpg](img/A436970_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3.\n\n浏览器中的 /info 端点不显示任何内容\n\n如图 7-3 所示，默认情况下 `/info` 端点不显示任何内容。不过，你可以覆盖这些信息。尽管如此，`/info`\
  \ 端点显示的是非敏感数据。\n\n### /env\n\n`/env` 端点返回你在 JVM 内配置的所有敏感信息，例如 `{\"local.server.port\"\
  :8080}`。换句话说，它显示你的应用程序正在运行的端口，并显示系统属性，例如 JDK 和 Java 版本（`jre1.8.0_101\\\\bin`）、你的项目正在运行的目录信息（`user.dir`）、库路径（`java.library.path`）、时区（`user.timezone\"\
  :\"Asia/Calcutta\"`）等等。它还显示属性信息以及你添加属性的属性文件名，例如 `[classpath:/application.properties]\"\
  :{\"management.security.enabled\":\"false\"}`。图 7-4 展示了浏览器中 `/env` 数据的裁剪图像。\n\n\
  ![A436970_1_En_7_Fig4_HTML.jpg](img/A436970_1_En_7_Fig4_HTML.jpg)\n\n图 7-4.\n\n\
  浏览器中的 /env 数据\n\n### /metrics\n\n此端点显示来自操作系统、JVM 以及应用级别的指标信息，例如内存堆、处理器、线程、类加载器和线程池。\n\
  \n它显示当前运行应用程序的指标信息。默认情况下它是敏感的。指标信息返回以下数据，如图 7-5 所示：\n\n![A436970_1_En_7_Fig5_HTML.jpg](img/A436970_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5.\n\n/metrics 端点\n\n```\n{\n\"mem\":295288,\n\"mem.free\":177815,\n\"processors\"\
  :4,\n\"instance.uptime\":620849,\n\"uptime\":632125,\n\"systemload.average\":-1.0,\n\
  \"heap.committed\":225792,\n\"heap.init\":65536,\n\"heap.used\":47976,\n\"heap\"\
  :905216,\n\"nonheap.committed\":71360,\n\"nonheap.init\":2496,\n\"nonheap.used\"\
  :69497,\n\"nonheap\":0,\n\"threads.peak\":20,\n\"threads.daemon\":18,\n\"threads.totalStarted\"\
  :26,\n\"threads\":20,\n\"classes\":9559,\n\"classes.loaded\":9559,\n\"classes.unloaded\"\
  :0,\n\"gc.ps_scavenge.count\":12,\n\"gc.ps_scavenge.time\":169,\n\"gc.ps_marksweep.count\"\
  :2,\n\"gc.ps_marksweep.time\":219,\n\"httpsessions.max\":-1,\"httpsessions.active\"\
  :0,\n\"datasource.primary.active\":0,\n\"datasource.primary.usage\":0.0,\n\"gauge.response.userregistrationsystemhealth\"\
  :214.0,\n\"gauge.response.info\":37.0,\n\"counter.status.200.info\":1,\n\"counter.status.200.userregistrationsystemhealth\"\
  :1\n}\n```\n\n如图 7-5 所示，你可以使用 `/metrics` 端点查看指标信息。此端点显示 `heap.used` 详情、`nonheap.used`\
  \ 详情、可用内存量（`mem.free`）、正在使用的处理器数量、实例运行时间信息、线程数等等。\n\n### /trace\n\n此端点通过显示人们正在访问的\
  \ REST 端点列表，来展示已发出的跟踪信息请求。例如，在图 7-6 中，你可以看到我访问了 `/metrics`、`/env` 和 `/info`。这显示了针对这些特定端点最后几次被命中的请求。`/trace`\
  \ 端点还显示人们正在访问的不同 REST 端点。如果你访问 `/trace`，你可以看到人们通过特定 REST 服务最后访问的请求。\n\n![A436970_1_En_7_Fig6_HTML.jpg](img/A436970_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6.\n\n/trace 端点\n\n### /health\n\n此端点可用于检查正在运行的 Spring Boot 应用程序的健康状况或状态。它帮助开发者在生产环境宕机时监控软件的健康状况和跟踪状态。通过\
  \ HTTP 访问时显示的默认信息如下：\n\n```\n{\n\"status\":\"UP\",\n\"diskSpace\":{\"status\":\"\
  UP\",\n\"total\":142753132544,\n\"free\":97978245120,\n\"threshold\":10485760\n\
  },\n\"db\":{\"status\":\"UP\",\"database\":\"H2\",\"hello\":1}\n}\n```\n\n这显示了正在运行的应用程序的磁盘空间。`/health`\
  \ 端点还显示服务器健康状况，并提供服务器是否正常运行的信息。如果存在任何数据库连接，它会自动显示数据库连接。因此，如果你自动装配了任何数据库连接，比如 H2\
  \ 数据库，它会自动显示在这里。默认情况下，此端点不敏感。图 7-7 展示了浏览器中的该端点。\n\n![A436970_1_En_7_Fig7_HTML.jpg](img/A436970_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7.\n\n/health 端点\n\n你可以在 [`http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#production-ready-endpoints`](http://docs.spring.io/spring-boot/docs/current/reference/htmlsingle/#production-ready-endpoints)\
  \ 找到现有 Actuator 端点的完整列表。\n\n## 自定义 Actuator 端点\n\n你可以通过 Spring 属性文件（`application.properties`）使用以下格式来自定义\
  \ Actuator 端点：\n\n```\nendpoints.[端点名称].[要自定义的属性]\n```\n\n### 可自定义的属性\n\n有三个属性可用于自定义\
  \ Actuator 端点。\n\n*   `id`：通过此属性，端点将通过 HTTP 被访问。\n*   `enabled`：此属性提供对端点的访问控制。如果设置为\
  \ `true`，则可以访问此端点；否则，无法访问。\n*   `sensitive`：此属性为端点提供安全层。如果设置为 `true`，则所需的授权会通过 HTTP\
  \ 显示关键信息。\n\n例如，你可以通过在 `application.properties` 文件中添加以下属性来自定义 `/health` 端点的 `id`、`sensitive`\
  \ 和 `enabled` 属性：\n\n```\nendpoints.health.id=userregistrationsystemhealth\nendpoints.health.enabled=true\n\
  endpoints.health.sensitive=false\n```\n\n一旦你启动应用程序，`/userregistrationsystemhealth`\
  \ 将出现在控制台中，如图 7-8 所示。\n\n![A436970_1_En_7_Fig8_HTML.jpg](img/A436970_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8.\n\n控制台中的 /userregistrationsystemhealth 端点\n\n前缀 `endpoints` 用于标识在你的应用程序中正在配置的端点。你可以使用\
  \ `/userregistrationsystemhealth` 访问这个自定义的 `/health` 端点，如图 7-9 所示。\n\n![A436970_1_En_7_Fig9_HTML.jpg](img/A436970_1_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9.\n\n自定义的健康端点\n\n`/health` 端点提供从所有实现了 `HealthIndicator` 接口并在你的应用程序上下文中配置的\
  \ Bean 收集的健康信息。由于某些信息本质上是敏感的，你可以配置 `endpoints.health.sensitive=false` 来暴露其他信息，例如磁盘空间和数据源，如图\
  \ 7-10 所示。\n\n类似地，你可以通过在 `application.properties` 文件中添加以下属性来自定义 `/info` 端点显示的数据：\n\
  \n```\ninfo.app.name=用户注册系统应用程序\ninfo.app.description=此 Spring Boot 应用程序是为学习而创建的\n\
  info.app.version=1.0.0\n```\n\n以下输出将出现在浏览器中，如图 7-9 所示。\n\n![A436970_1_En_7_Fig10_HTML.jpg](img/A436970_1_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10.\n\n自定义的 /info 端点\n\n```\n{\n\"app\":\n{\n\"description\":\"此 Spring Boot\
  \ 应用程序是为学习而创建的\",\n\"name\":\"用户注册系统应用程序\",\n\"version\":\"1.0.0\"\n}\n}\n```\n\n\
  \n\n### 自定义健康指标\n\n您也可以通过实现 `HealthIndicator` 接口并重写未实现的方法来定义自己的自定义健康指标。该自定义健康指标会收集特定于应用程序的任何类型的自定义健康数据，并将其提供给\
  \ `/health` 端点。清单 7-2 展示了实现 `HealthIndicator` 接口的 `CustomHealthIndicator` 类。\n\n\
  ```\nimport org.springframework.boot.actuate.health.Health;\nimport org.springframework.boot.actuate.health.HealthIndicator;\n\
  import org.springframework.stereotype.Component;\n@Component\npublic class CustomHealthIndicator\
  \ implements HealthIndicator {\n@Override\npublic Health health() {\nint errorCode\
  \ = check();\nif (errorCode == 0) {\nreturn Health\n.up()\n.withDetail(\"Status\"\
  , \"UP\")\n.withDetail(\"Error Code\", errorCode)\n.withDetail(\"Description\",\n\
  \"Your Custom Health indicator point is UP\")\n.build();\n}\nreturn Health.up().build();\n\
  }\npublic int check() {\nreturn 0;\n}\n}\n清单 7-2.\nCustomHealthIndicator 类\n```\n\
  \n浏览器中将显示以下输出，如图 7-11 所示。\n\n![A436970_1_En_7_Fig11_HTML.jpg](img/A436970_1_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11.\n\n/health 端点\n\n```\n{\n\"status\":\"UP\",\n\"custom\":{\n\"status\"\
  :\"UP\",\n\"Status\":\"UP\",\n\"Error Code\":0,\n\"Description\":\"Your Custom Health\
  \ indicator point is UP\"\n},\n\"diskSpace\":{\n\"status\":\"UP\",\n\"total\":142753132544,\n\
  \"free\":97823797248,\n\"threshold\":10485760\n},\n\"db\":{\n\"status\":\"UP\",\n\
  \"database\":\"H2\",\n\"hello\":1\n}\n}\n```\n\n## 定义新端点\n\n尽管 Spring Boot Actuator\
  \ 提供了端点，但您也可以定义除现有 Actuator 端点之外的新端点。让我们通过创建 `MyCustomEndpoint` 类并实现 `Endpoint<List<String>>`\
  \ 接口来创建一个新端点，如清单 7-3 所示。\n\n```\nimport java.util.ArrayList;\nimport java.util.List;\n\
  import org.springframework.boot.actuate.endpoint.Endpoint;\nimport org.springframework.stereotype.Component;\n\
  @Component\npublic class MyCustomEndpoint implements Endpoint> {\n@Override\npublic\
  \ String getId() {\nreturn \"myCustomEndpoint\";\n}\n@Override\npublic List invoke()\
  \ {\nList customMessages = new ArrayList();\ncustomMessages.add(\"This is custom\
  \ message 1\");\ncustomMessages.add(\"This is custom message 2\");\nreturn customMessages;\n\
  }\n@Override\npublic boolean isEnabled() {\nreturn true;\n}\n@Override\npublic boolean\
  \ isSensitive() {\nreturn true;\n}\n}\n清单 7-3.\nMyCustomEndpoint 类\n```\n\n让我们运行\
  \ Spring Boot 应用程序。控制台日志将包含 `/myCustomEndpoint` 端点，如图 7-12 所示。\n\n![A436970_1_En_7_Fig12_HTML.jpg](img/A436970_1_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12.\n\n控制台中的新端点\n\n您可以使用其 `id` 值在 `/myCustomEndpoint` 访问这个新端点。输出将显示在浏览器中，如图\
  \ 7-13 所示。\n\n![A436970_1_En_7_Fig13_HTML.jpg](img/A436970_1_En_7_Fig13_HTML.jpg)\n\
  \n图 7-13.\n\n/myCustomEndpoint 端点\n\n## 通过 HTTP 进行管理\n\n在本节中，您将通过 HTTP 管理 Actuator\
  \ 端点。\n\n### 自定义服务器端口\n\n出于安全目的，您可以自定义服务器端口，通过非标准端口暴露 Actuator 端点。您可以使用 `management.port`\
  \ 属性进行配置。\n\n您还可以使用 `management.address` 属性更改地址，以限制端点可以从网络上的哪些位置访问。\n\n让我们更改 `application.properties`\
  \ 文件中的以下属性：\n\n```\nmanagement.port=8081\nmanagement.address=127.0.0.1\n```\n\n\
  当您重新启动 Spring Boot 应用程序并使用自定义的地址和端口号访问 `/health` 端点时，将返回输出，如图 7-14 所示。\n\n![A436970_1_En_7_Fig14_HTML.jpg](img/A436970_1_En_7_Fig14_HTML.jpg)\n\
  \n图 7-14.\n\n自定义端口号和地址\n\n### 访问敏感端点\n\n当使用 Spring Security 保护 Spring Boot 应用程序时，您可以通过在\
  \ `application.properties` 文件中定义默认安全属性（如用户名、密码和角色）来保护这些端点，如下代码所示：\n\n```\nmanagement.security.enabled=true\n\
  security.user.name=admin\nsecurity.user.password=password\nsecurity.user.role=ADMIN\n\
  ```\n\n当您尝试访问受保护的端点（例如默认情况下敏感的 `/info`）时，将弹出一个窗口提示输入凭据，如图 7-15 所示。\n\n![A436970_1_En_7_Fig15_HTML.jpg](img/A436970_1_En_7_Fig15_HTML.jpg)\n\
  \n图 7-15.\n\n访问受保护的端点\n\n## 总结\n\n在本章中，您了解了 Spring Boot Actuator，以及如何通过在 Maven `pom.xml`\
  \ 文件中添加依赖项来启用 Actuator。然后，您了解了一些 Actuator 端点。之后，您自定义了这些现有的 Spring Boot Actuator\
  \ 端点并定义了新的端点。最后，您自定义了服务器端口。\n\n## 附录 A：访问 REST API 的工具\n\n当您需要在敏捷开发环境中工作时，您需要能够快速测试您的\
  \ API。在本附录中，您将了解开源 REST API 测试。\n\n针对 REST API 服务的 GUI 测试速度较慢，对于希望从最新构建中快速获得代码结果的开发者来说，这是一个糟糕的选择。API\
  \ 测试被认为是开发者的更好选择，因为它往往比 GUI 测试更快且更可靠。\n\n## API 测试\n\n应用程序编程接口（API）测试涉及绕过使用 GUI/网页的用户交互，通过进行\
  \ API 调用直接与应用程序内的服务进行通信。\n\nAPI 测试允许开发者测试“无头”技术，例如 RESTful Web 服务。在无头测试中，GUI（或头部）被绕过；请求直接发送到应用程序的服务，服务接收响应以验证结果。\n\
  \n## API 测试工具\n\n您需要找到一个工具来进行 REST API 测试。互联网上有许多 API 测试工具可用；例如，Selenium 是一个基于浏览器的测试工具。在本书中，您将使用\
  \ Postman。\n\n让我们探索 Postman API 测试工具。\n\n\n\n### Postman\n\nPostman 是一款 REST 客户端，最初是作为\
  \ Chrome 浏览器插件而开发的，用于发起 HTTP 请求。Postman 可用于向 REST 服务发送 HTTP 请求，并从服务器获取响应。\n\n你可以通过链接\
  \ [`https://chrome.google.com/webstore/detail/postman/fhbjgbiflinjbdggehcddcbncdddomop`](https://chrome.google.com/webstore/detail/postman/fhbjgbiflinjbdggehcddcbncdddomop)\
  \ 从 Chrome 网上应用店下载 Postman，如图 A-1 所示。\n\n![A436970_1_En_BookBackmatter_Fig1_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig1_HTML.jpg)\n\
  \n图 A-1.\n\n将 Postman 添加到 Chrome\n\n点击“添加到 Chrome”按钮会弹出一个窗口，如图 A-2 所示。\n\n![A436970_1_En_BookBackmatter_Fig2_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig2_HTML.jpg)\n\
  \n图 A-2.\n\n添加 Postman 应用的弹出窗口\n\n点击“添加应用”将下载一个 `.crx` 文件。下载成功后，Postman 将被添加到 Chrome\
  \ 的应用列表中。在 Chrome 浏览器中访问 `chrome://apps/` 即可查看 Chrome 中可用的应用列表。\n\n现在，你可以点击“启动应用”按钮来启动该应用，如图\
  \ A-3 所示。\n\n![A436970_1_En_BookBackmatter_Fig3_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig3_HTML.jpg)\n\
  \n图 A-3.\n\n启动应用\n\n启动应用后，你将看到一个显示 Postman 工具的新窗口，如图 A-4 所示。\n\n![A436970_1_En_BookBackmatter_Fig4_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig4_HTML.jpg)\n\
  \n图 A-4.\n\nPostman 应用\n\nPostman 允许开发者通过用户界面编写 HTTP 请求，并将这些请求发送到服务器。开发者可以查看响应，如图\
  \ A-5 所示。\n\n![A436970_1_En_BookBackmatter_Fig5_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig5_HTML.jpg)\n\
  \n图 A-5.\n\n显示响应的 Postman 应用\n\n#### Postman 中的功能\n\n让我们来看看 Postman 中可用的一些功能。\n\n\
  ##### 请求 URL\n\n“输入请求 URL”框允许用户输入请求 URL。\n\n##### HTTP 方法\n\n“输入请求 URL”框左侧的下拉菜单允许开发者选择其\
  \ HTTP 方法，例如 `GET`、`POST` 等，如图 A-6 所示。\n\n![A436970_1_En_BookBackmatter_Fig6_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig6_HTML.jpg)\n\
  \n图 A-6.\n\nHTTP 方法\n\n##### 参数\n\nParams 按钮位于“输入请求 URL”框的右侧。这允许用户设置参数的键和值，这些参数将与调用\
  \ API 的请求 URL 一起传递，如图 A-7 所示。\n\n![A436970_1_En_BookBackmatter_Fig7_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig7_HTML.jpg)\n\
  \n图 A-7.\n\nPostman 中的参数\n\n##### 授权\n\n“在此输入请求 URL”框下方有一个“授权”选项卡。点击“授权”会弹出一个下拉菜单，用于选择选项，如“无授权”、“基本授权”等，如图\
  \ A-8 所示。默认选择是“无授权”。\n\n![A436970_1_En_BookBackmatter_Fig8_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig8_HTML.jpg)\n\
  \n图 A-8.\n\nPostman 中的授权选项\n\n##### 标头\n\n点击“标头”允许用户输入标头信息，如图 A-9 所示。\n\n![A436970_1_En_BookBackmatter_Fig9_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig9_HTML.jpg)\n\
  \n图 A-9.\n\nPostman 中的标头\n\n##### 请求体\n\n“请求体”选项卡仅对以下 HTTP 方法可用：`Post`、`Put`、`Patch`、`Delete`、`Link`、`Unlink`、`Lock`\
  \ 和 `Propfind`。对于其他 HTTP 方法，该选项卡将被禁用。点击“请求体”会显示四个选项：form-data、x-www-form-urlencoded、raw\
  \ 和 binary。\n\n*   Form-data：选择此项将显示一行带有“键”下拉菜单的内容。\n*   X-www-form-urlencoded：选择此项将在下方显示一行带有“键”和“值”字段的内容。\n\
  *   Raw：选择此项将显示一个下拉菜单和一个带有编号行的文本框，如图 A-10 所示。下拉菜单包含以下选项：Text、Text (text/plain)、JSON\
  \ (application/json)、Javascript (application/javascript)、XML (application/xml)、XML\
  \ (text/xml) 和 HTML (text/html)。\n\n    ![A436970_1_En_BookBackmatter_Fig10_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig10_HTML.jpg)\n\
  \n    图 A-10.\n\n    Postman 中的请求体选项\n\n##### 发送\n\n使用蓝色的“发送”按钮来发送 HTTP 请求。\n\n\
  #### 响应消息\n\n点击“发送”按钮后，你将收到来自所请求 API 的响应消息。响应消息可以包含名为“响应体”、“Cookies”、“标头”和“测试”的选项卡，如图\
  \ A-11 所示。\n\n![A436970_1_En_BookBackmatter_Fig11_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig11_HTML.jpg)\n\
  \n图 A-11.\n\nPostman 中的响应选项\n\n##### 响应体\n\n响应体可以通过“美化”、“原始”和“预览”选项来显示。“美化”允许开发者从以下选项中选择：JSON、XML、HTML、Text\
  \ 和 Auto。\n\n##### Cookies\n\n要使用 Cookies，你需要通过链接 [`https://chrome.google.com/webstore/detail/postmaninterceptor/aicmkgpgakddgnaphhhpliifpcfhicfo?hl=en`](https://chrome.google.com/webstore/detail/postmaninterceptor/aicmkgpgakddgnaphhhpliifpcfhicfo?hl=en)\
  \ 安装 Postman Interceptor 应用。安装好 Interceptor 应用后，按图 A-12 所示启用它。\n\n![A436970_1_En_BookBackmatter_Fig12_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig12_HTML.jpg)\n\
  \n图 A-12.\n\n为 Cookies 启用 Interceptor\n\n##### 标头\n\n这将显示以行格式接收到的标头。\n\n##### 测试\n\
  \n此功能仅对付费用户可用。\n\n#### 其他功能\n\nPostman 的“历史记录”部分位于窗口左侧，记录了你发起的所有请求，如图 A-13 所示。历史记录会保存\
  \ HTTP 请求，并允许重新打开它们。\n\n![A436970_1_En_BookBackmatter_Fig13_HTML.jpg](img/A436970_1_En_BookBackmatter_Fig13_HTML.jpg)\n\
