- fmt: "#### Other Clauses\n\nThe other two directives that can be used inside a module\
    \ descriptor are the `uses` and `provides` clauses. These clauses are used to\
    \ define (`provides`) and consume (`uses`) services and will be described in Chapter\
    \ [6](../Text/A431534_1_En_6_Chapter.html) ÔÇô Services.\n\n> **Note**  \n> None\
    \ of the five directives already mentioned (`requires`, `exports`, `opens`, `uses`,\
    \ and `provides`) are mandatory inside a module declaration. There is no restriction\
    \ in selecting which directive to use and which not to use. We can create our\
    \ own module and use any combination of the five directives.\n\nWeÔÇÖve now seen\
    \ the basics of the module declaration. ItÔÇÖs time to learn how to compile and\
    \ run modular applications in JDK 9.\n\n## Compiling and Running Modules\n\nThe\
    \ compilation of a modular Java 9 application is different than in Java 8 or 7.\
    \ All the examples of compiling and running modules are expressed in this book\
    \ using the command-line running a Linux-like environment. However, this is an\
    \ unusual practice in day-to-day work. Build tools like Maven or Gradle are far\
    \ more productive, suitable, and easy to use for compiling and running Java applications.\
    \ Chapter [12](../Text/A431534_1_En_12_Chapter.html) covers the integration of\
    \ Java 9 with Maven and shows how to use it to build, package, compile, and run\
    \ Java 9 modular applications.\n\n### Compile a Single Module\n\nHereÔÇÖs a very\
    \ simple example of compiling a single module using JDK 9. Suppose we have a module\
    \ `com.apress.moduleA` that has no dependencies. It contains a `Main.java` file\
    \ inside its package `com.apress.moduleA`. The structure of the folder is as follows:\n\
    \n```\nsrc/com.apress.moduleA/\nmodule-info.java\ncom/\napress/\nmoduleA/\nMain.java\n\
    ```\n\nListing [4-11](#A431534_1_En_4_Chapter.html#Par137) shows the content of\
    \ class `Main`. It prints a message on the console.\n\n```java\n// Main.java\n\
    package com.apress.moduleA;\npublic class Main {\n    public static void main(String[]\
    \ args) {\n        System.out.println(\"Here is Java 9!\");\n    }\n}\n```\n\n\
    *Listing 4-11. The `Main` class from the module `com.apress.moduleA`*\n\nListing\
    \ [4-12](#A431534_1_En_4_Chapter.html#Par139) shows the `module-info.java` file\
    \ of module `com.apress.moduleA`. It doesnÔÇÖt define any clause.\n\n```java\n//\
    \ module-info.java\nmodule com.apress.moduleA {\n}\n```\n\n*Listing 4-12. The\
    \ Module Descriptor for `moduleA`*\n\nFirst we create the destination directory\
    \ where the compiler outputs to using the `mkdir` command:\n\n```\nmkdir ÔÇôp outputDir\n\
    ```\n\nThen we use the Java compiler to compile the `Main.java` file and the `module-info.java`\
    \ file. The compilation will create a `.class` file for each `.java` file:\n\n\
    ```\n$ javac ÔÇôd outputDir/com.apress.moduleA src/com.apress.moduleA/module-info.java\
    \ src/com.apress.moduleA/com/apress/moduleA/Main.java\n```\n\nThe `javac` command\
    \ gets the files that it has to compile. The `-d` option specifies the directory\
    \ where the compiler outputs to. In this case, it will output to the directory\
    \ `outputDir/com.apress.moduleA`. The last two parameters represent the path to\
    \ the files that we want to compile, `module-info.java` and `Main.java`.\n\nThe\
    \ corresponding class files are generated during the compilation in the directory\
    \ passed as parameter to the option `-d`. The compilation of a single module is\
    \ done very much the same as in Java 7 or 8 without necessarily needing to use\
    \ other compiler flags than the ones used in the older versions of Java. Compared\
    \ to Java 8, the single distinction here is that `module-info.java` was also compiled.\n\
    \n> **Note**  \n> The module declaration from the `module-info.java` file is compiled\
    \ along with the rest of the source code, and a `module-info.class` file is generated.\n\
    \n### Run an Application Containing a Single Module\n\nTo run the previously compiled\
    \ classes, we use the Java launcher with the following command:\n\n```\n$ java\
    \ --module-path outputDir --module com.apress.moduleA/com.apress.moduleA.Main\n\
    ```\n\nAs a result, the string ÔÇťHere is Java9!ÔÇŁ is printed at the console. We\
    \ recognize in the previous listing that the `java` command uses new flags for\
    \ handling modules. The `--module-path` option, introduced in Java 9, gets as\
    \ parameter a directory or a list of directories containing the location of the\
    \ already compiled files. In our case, these are in the `outputDir` directory.\
    \ The module path is used in order for the compiler to be able to locate the modules\
    \ at runtime.\n\nThe differences between the module path and the class path are\
