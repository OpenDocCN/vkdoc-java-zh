- fmt: "### The `requires` Clause\n\nThe `requires` clause is used inside the module\
    \ declaration (`module-info.java`) to express the module that the actual module\
    \ needs upon in order to fulfill its dependencies. ItÔÇÖs used to express the moduleÔÇÖs\
    \ dependencies.\n\nFigure┬á[4-2](#A431534_1_En_4_Chapter.html#Fig2) shows the syntax\
    \ of the `requires` clause.\n\n![A431534_1_En_4_Fig2_HTML.gif](Images/A431534_1_En_4_Fig2_HTML.gif)\n\
    \nFigure 4-2. Syntax of the `requires` clause\n\nThe syntax is simple and concise.\
    \ The `requires` directive specifies the name of the module it depends upon, followed\
    \ by a semicolon. Inside the curly brackets of the module declaration we can put\
    \ one or more `requires` clauses, each of them followed by the name of the module.\n\
    \nIn the following example, the module `com.apress.moduleA` requires two modules,\
    \ module `com.apress.moduleB` and module `com.apress.moduleC`:\n\n```\nmodule\
    \ com.apress.moduleA {\n    requires com.apress.moduleB;\n    requires com.apress.moduleC;\n\
    }\n```\n\nIn this example, two dependencies are expressed using the `requires`\
    \ clauses. Module `com.apress.moduleA` has a dependency on module `com.apress.moduleB`\
    \ and also has a dependency on module `com.apress.moduleC`. In this case, we say\
    \ that module `com.apress.moduleA` requires (or reads) module `com.apress.moduleB`\
    \ and requires (or reads) module `com.apress.moduleC`.\n\nFigure┬á[4-3](#A431534_1_En_4_Chapter.html#Fig3)\
    \ shows a module graph that illustrates these dependencies.\n\n![A431534_1_En_4_Fig3_HTML.gif](Images/A431534_1_En_4_Fig3_HTML.gif)\n\
    \nFigure 4-3. Module graph expressing dependencies between the three modules\n\
    \nIn the module graph we have an arrow from module `com.apress.moduleA` to module\
    \ `com.apress.moduleB` and also an arrow to module `com.apress.moduleC`. There\
    \ is no arrow between module `com.apress.moduleB` and module `com.apress.moduleC`\
    \ because those two modules donÔÇÖt have dependencies between them. The direction\
    \ of the arrow is straightforward: from `com.apress.moduleA` to `com.apress.moduleB`,\
    \ because module `com.apress.moduleA` reads the module `com.apress.moduleB` and\
    \ not inversely.\n\nWhat does it mean that module `com.apress.moduleA` has a dependency\
    \ on module `com.apress.moduleB` and on module `com.apress.moduleC`? It means\
    \ that module `com.apress.moduleA` uses types that are part of module `com.apress.moduleB`\
    \ and of module `com.apress.moduleC`. Because module `com.apress.moduleA` uses\
    \ types from those modules, it has dependencies on them that must be explicit\
    \ declared in the module descriptor `module-info.java`. In this way, the Java\
    \ compiler knows at compile-time what the dependencies of a module are and doesnÔÇÖt\
    \ allow the compilation if a single dependency is not fulfilled.\n\n> **Note**\
    \  \n> Compared to the class path, the situation when a module dependency isnÔÇÖt\
    \ fulfilled is detected right at compile-time using the Java 9 Module System.\
    \ It would have not been allowed for module `com.apress.moduleB` to also read\
    \ module `com.apress.moduleA` at the same time at compile-time. We would then\
    \ have had a circular dependency, which is in JDK 9 forbidden by the Java compiler.\n\
    \nIf we try to run module `com.apress.moduleA`, a resolution is first performed.\
    \ A resolution represents a process that searches and discovers the modules required\
    \ by a module. All the modules found on the host system are being searched, and\
    \ the modules found are searched again for dependencies. This process continues\
    \ and runs until every required module has been covered and until every dependency\
    \ of every required module has been solved. In our case, the resolution is simple,\
    \ because module `com.apress.moduleA` requires only two modules: module `com.apress.moduleB`\
    \ and module `com.apress.moduleC`. We suppose that these last two modules donÔÇÖt\
    \ have any dependencies upon other modules. In this case, the resolution process\
    \ is successfully finished after all three modules are added to the module graph.\
    \ For instance, if module `com.apress.moduleB` has had other dependencies, these\
    \ would have been resolved and also added to the module graph. The result of the\
    \ resolution process contains the entire data required for compiling and running\
    \ the root module, `com.apress.moduleA`.\n\nEvery module implicitly requires `java.base`,\
    \ as we already know. Mentioning `requires java.base` in the module descriptor\
    \ is unnecessary because module `java.base` is by default required by every module.\
    \ The module `java.base` will always be located right at the bottom of the module\
    \ graph because every module depends upon it. Figure [4-4](#A431534_1_En_4_Chapter.html#Fig4)\
    \ shows the previous module graph with module `java.base` included at the bottom.\n\
    \n![A431534_1_En_4_Fig4_HTML.gif](Images/A431534_1_En_4_Fig4_HTML.gif)\n\nFigure\
    \ 4-4. Module graph expressing dependencies between modules, including module\
    \ `java.base`\n\nIf a module descriptor doesnÔÇÖt contain any `requires` clauses,\
    \ the module doesnÔÇÖt have any dependency on any module except for module `java.base`.\
    \ Module `java.base` doesnÔÇÖt have any `requires` directives because it doesnÔÇÖt\
    \ depend upon any other module.\n\nUntil now, weÔÇÖve looked at only the positive\
    \ cases. LetÔÇÖs also explore some cases when something goes wrong and the compilation\
    \ fails. The compilation will fail if the module used in the `requires` clause\
    \ isnÔÇÖt found. The following module declaration states that it requires module\
    \ `com.apress.moduleB`, but if this module hasnÔÇÖt been defined, compiling `com.apress.moduleA`\
    \ will result in an error, because its dependencies canÔÇÖt be fulfilled:\n\n```\n\
    module com.apress.moduleA {\n    requires com.apress.moduleB;\n}\n```\n\nWe state\
    \ that a module isnÔÇÖt defined if it doesnÔÇÖt have a `module-info.java` file or\
    \ if its `module-info.java` file doesnÔÇÖt contain the right name of the module.\
    \ In the previous example, the output of the compilation of module `com.apress.moduleA`\
    \ results in an error:\n\n```\nerror: module not found: com.apress.moduleB\n```\n\
    \nWe get the same results if we have a qualified export to a module that isnÔÇÖt\
    \ found.\n\nLoops in module declarations arenÔÇÖt allowed, as in the following example:\n\
    \n```\nmodule com.apress.moduleA {\n    requires com.apress.moduleA;\n}\n```\n\
    \nThis module declaration has a cyclic dependence and results in a compilation\
    \ error:\n\n```\nerror: cyclic dependence involving com.apress.moduleA requires\
    \ com.apress.moduleA\n```\n\n> **Note**  \n> Cyclic dependencies arenÔÇÖt allowed\
    \ by the module system at compile-time.\n\nListing [4-1](#A431534_1_En_4_Chapter.html#Par65)\
    \ shows an example of a simple circular dependency between three modules.\n\n\
    ```\n// module-info.java (module com.apress.moduleA)\nmodule com.apress.moduleA\
    \ {\n    requires com.apress.moduleB;\n}\n\n// module-info.java (module com.apress.moduleB)\n\
    module com.apress.moduleB {\n    requires com.apress.moduleC;\n}\n\n// module-info.java\
    \ (module com.apress.moduleC)\nmodule com.apress.moduleC {\n    requires com.apress.moduleA;\n\
    }\n```\n\nListing 4-1. Defining Three Module Descriptors for Three Distinct Modules\n\
    \nA circular dependency is present because of the following conditions:"
  raw: '#### The requires Clause


    The `requires` clause is used inside the module declaration (module-info.java)
    to express the module that the actual module needs upon in order to fulfill its
    dependencies. ItÔÇÖs used to express the moduleÔÇÖs dependencies.


    Figure┬á[4-2](#A431534_1_En_4_Chapter.html#Fig2) shows the syntax of the `requires`
    clause.


    ![A431534_1_En_4_Fig2_HTML.gif](Images/A431534_1_En_4_Fig2_HTML.gif)


    Figure 4-2.


    Syntax of the requires clause


    The syntax is simple and concise. The `requires` directive specifies the name
    of the module it depends upon, followed by a semicolon. Inside the curly brackets
    of the module declaration we can put one or more `requires` clauses, each of them
    followed by the name of the module.


    In the following example, the module com.apress.moduleA requires two modules,
    module com.apress.moduleB and module com.apress.moduleC:


    ```

    module com.apress.moduleA {

    requires com.apress.moduleB;

    requires com.apress.moduleC;

    }

    ```


    In this example, two dependencies are expressed using the `requires` clauses.
    Module com.apress.moduleA has a dependency on module com.apress.moduleB and also
    has a dependency on module com.apress.moduleC. In this case, we say that module
    com.apress.moduleA requires (or reads) module com.apress.moduleB and requires
    (or reads) module com.apress.moduleC.


    Figure┬á[4-3](#A431534_1_En_4_Chapter.html#Fig3) shows a module graph that illustrates
    these dependencies.


    ![A431534_1_En_4_Fig3_HTML.gif](Images/A431534_1_En_4_Fig3_HTML.gif)


    Figure 4-3.


    Module graph expressing dependencies between the three modules


    In the module graph we have an arrow from module com.apress.moduleA to module
    com.apress.moduleB and also an arrow to module com.apress.moduleC. There is no
    arrow between module com.apress.moduleB and module com.apress.moduleC because
    those two modules donÔÇÖt have dependencies between them. The direction of the arrow
    is straightforward: from com.apress.moduleA to com.apress.moduleB, because module
    com.apress.moduleA reads the module com.apress.moduleB and not inversely.


    What does it mean that module com.apress.moduleA has a dependency on module com.apress.moduleB
    and on module com.apress.moduleC? It means that module com.apress.moduleA uses
    types that are part of module com.apress.moduleB and of module com.apress.moduleC.
    Because module com.apress.moduleA uses types from those modules, it has dependencies
    on them that must be explicit declared in the module descriptor module-info.java.
    In this way, the Java compiler knows at compile-time what the dependencies of
    a module are and doesnÔÇÖt allow the compilation if a single dependency is not fulfilled.


    Note


    Compared to the class path, the situation when a module dependency isnÔÇÖt fulfilled
    is detected right at compile-time using the Java 9 Module System. It would have
    not been allowed for module com.apress.moduleB to also read module com.apress.moduleA
    at the same time at compile-time. We would then have had a circular dependency,
    which is in JDK 9 forbidden by the Java compiler.


    If we try to run module com.apress.moduleA, a resolution is first performed. A
    resolution represents a process that searches and discovers the modules required
    by a module. All the modules found on the host system are being searched, and
    the modules found are searched again for dependencies. This process continues
    and runs until every required module has been covered and until every dependency
    of every required module has been solved. In our case, the resolution is simple,
    because module com.apress.moduleA requires only two modules: module com.apress.moduleB
    and module com.apress.moduleC. We suppose that these last two modules donÔÇÖt have
    any dependencies upon other modules. In this case, the resolution process is successfully
    finished after all three modules are added to the module graph. For instance,
    if module com.apress.moduleB has had other dependencies, these would have been
    resolved and also added to the module graph. The result of the resolution process
    contains the entire data required for compiling and running the root module, com.apress.moduleA.


    Every module implicitly requires java.base, as we already know. Mentioning `requires
    java.base` in the module descriptor is unnecessary because module java.base is
    by default required by every module. The module java.base will always be located
    right at the bottom of the module graph because every module depends upon it.
    Figure [4-4](#A431534_1_En_4_Chapter.html#Fig4) shows the previous module graph
    with module java.base included at the bottom.


    ![A431534_1_En_4_Fig4_HTML.gif](Images/A431534_1_En_4_Fig4_HTML.gif)


    Figure 4-4.


    Module graph expressing dependencies between modules, including module java.base


    If a module descriptor doesnÔÇÖt contain any `requires` clauses, the module doesnÔÇÖt
    have any dependency on any module except for module java.base. Module java.base
    doesnÔÇÖt have any `requires` directives because it doesnÔÇÖt depend upon any other
    module.


    Until now, weÔÇÖve looked at only the positive cases. LetÔÇÖs also explore some cases
    when something goes wrong and the compilation fails. The compilation will fail
    if the module used in the `requires` clause isnÔÇÖt found. The following module
    declaration states that it requires module com.apress.moduleB, but if this module
    hasnÔÇÖt been defined, compiling com.apress.moduleA will result in an error, because
    its dependencies canÔÇÖt be fulfilled:


    ```

    module com.apress.moduleA {

    requires com.apress.moduleB;

    }

    ```


    We state that a module isnÔÇÖt defined if it doesnÔÇÖt have a module-info.java file
    or if its module-info.java file doesnÔÇÖt contain the right name of the module.
    In the previous example, the output of the compilation of module com.apress.moduleA
    results in an error:


    ```

    error: module not found: com.apress.moduleB

    ```


    We get the same results if we have a qualified export to a module that isnÔÇÖt found.


    Loops in module declarations arenÔÇÖt allowed, as in the following example:


    ```

    module com.apress.moduleA {

    requires com.apress.moduleA;

    }

    ```


    This module declaration has a cyclic dependence and results in a compilation error:


    ```

    error: cyclic dependence involving com.apress.moduleA requires com.apress.moduleA

    ```


