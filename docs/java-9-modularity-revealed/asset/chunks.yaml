- fmt: "### Scenario 1: Junit Test Classes and Types Under Test Are in Different Modules\n\
    \nSuppose that the types under test are in module A and the Junit test classes\
    \ are in module B. This scenario is one of the simplest. Figure [11-1](#A431534_1_En_11_Chapter.html#Fig1)\
    \ illustrates it.\n\n![A431534_1_En_11_Fig1_HTML.gif](Images/A431534_1_En_11_Fig1_HTML.gif)\n\
    \nFigure 11-1. Junit test classes and classes under test are in different modules\n\
    \nFirst of all, we need to assure readability between the two modules. Module\
    \ A should export its packages. Module B should require module A and also export\
    \ its packages. In this way, module B can access the public types from module\
    \ A. Module B should further require the junit automatic module in its module\
    \ declaration because itÔÇÖs making use of it.\n\nTo make this scenario work, be\
    \ aware of one more important thing. When we run the Junit test cases from module\
    \ B, we need to also add all the existing modules (including the automatic modules)\
    \ using the `java` launcher `--add-modules` flag. In our case, we need to add\
    \ the module B and the automatic module `hamcrest.core`, which is a dependency\
    \ of Junit. This is basically everything we need to do in order to make this scenario\
    \ work. Later in this chapter, weÔÇÖll will show an example using this scenario.\n\
    \n### Scenario 2: Only the Types Under Test Reside Inside a Module\n\nThis second\
    \ scenario is the most difficult one. In this scenario, we have the types under\
    \ test in module A, but the Junit test classes arenÔÇÖt residing in any moduleÔÇöthey\
    \ reside on the class path. For this, we have to use the `javac -Xmodule` and\
    \ the `java` launcher `--patch-module` command-line options. Both options are\
    \ described in detail later in this chapter. Figure [11-2](#A431534_1_En_11_Chapter.html#Fig2)\
    \ illustrates this scenario.\n\n![A431534_1_En_11_Fig2_HTML.gif](Images/A431534_1_En_11_Fig2_HTML.gif)\n\
    \nFigure 11-2. Types under test are inside a module, and Junit test cases are\
    \ on the class path\n\nFirst, we have to compile the Junit test classes as if\
    \ it were part of module A (using the `javac -Xmodule` option). In this way, we\
    \ make the Junit test classes part of module A. Second, we have to use the `javac\
    \ --add-reads` command-line option to add the reading edges to Junit. This is\
    \ mandatory because now module A has a dependency on Junit. Because module A doesnÔÇÖt\
    \ read Junit, we have to use the `--add-reads` command-line option to tell it\
    \ to read Junit. At the same time, we also have to add the junit automatic module\
    \ using the `javac --add-modules` option.\n\nTo make this scenario work, when\
    \ weÔÇÖre running the Junit test classes, we have to use the `java` launcher `--patch-module`\
    \ command-line option so that we can patch module A. Therefore, we make the Junit\
    \ test class part of module A at runtime using the `ALL-MODULE-PATH` constant.\
    \ DonÔÇÖt worry if itÔÇÖs not clear yet how this scenario works. Later in this chapter,\
    \ youÔÇÖll see this scenario at work, and weÔÇÖll explain the new command-line options\
    \ used.\n\n### Scenario 3: Both Junit Test Classes and Test Under Test Reside\
    \ in the Same Module\n\nIn this scenario, we have implicit readability between\
    \ the types. The disadvantage in this case is related to the fact that our module\
    \ needs all the test dependencies. Introducing dependencies on test libraries\
    \ for every module that requires unit testing is definitely not the best solution.\
    \ If we have ten modules that need to be tested, then all of them would need to\
    \ add the test dependency separately.\n\nNow that we know the most common scenarios\
    \ that can occur when performing unit testing in Java 9, letÔÇÖs move on to the\
    \ `-Xmodule` command-line option of the Java compiler and the `--patch-module`\
    \ command-line option, mentioned earlier in the second scenario. TheyÔÇÖre used\
    \ to patch modules with classes.\n\n## The `-Xmodule` Option\n\nThe Java compiler\
    \ command-line option `-Xmodule` is used to compile classes for a module. Figure\
    \ [11-3](#A431534_1_En_11_Chapter.html#Fig3) describes its syntax.\n\n![A431534_1_En_11_Fig3_HTML.gif](Images/A431534_1_En_11_Fig3_HTML.gif)\n\
    \nFigure 11-3. Syntax of the `javac -Xmodule` command-line option\n\nThe `-Xmodule`\
    \ option specifies that we should compile the classes as if they were part of\
    \ the module `<module_name>`. This option is used at compile-time to inject a\
    \ class into a module. It canÔÇÖt be used at runtime. Using the `-Xmodule` option,\
    \ we can make classes be part of a specific module. If the module we pass as an\
    \ argument doesnÔÇÖt exist, an error `module not found` will be thrown:\n\n```\n\
    error: module not found: \n```\n\nNote\n\nItÔÇÖs not possible to list more than\
    \ one module. You canÔÇÖt specify multiple module names to the `-Xmodule` command-line\
    \ option.\n\n## The `--patch-module` Option\n\nThe JDK 9 specification states:\
    \ ÔÇťWhen testing or debugging it is sometimes useful to replace selected class\
    \ files or resources of specific modules with alternate or experimental versions,\
    \ or to provide entirely new class files, resources, and even packages. This can\
    \ be done via the `--patch-module` option.ÔÇŁ\n\nThe `--patch-module` option is\
    \ used at both compile-time and runtime to replace the class files of a module\
    \ with other class-specific class files. It can be used by the Java compiler as\
    \ well as by the `Java` launcher. The role of the `--patch-module` option is to\
    \ override classes inside a module. This option replaced the old `-Xbootclasspath/p`\
    \ option, which has been removed in Java 9.\n\nFigure [11-4](#A431534_1_En_11_Chapter.html#Fig4)\
    \ shows the syntax of the `--patch-module` command-line option.\n\n*   `<module_name>`\
    \ represents the module name.\n*   `<file>` represents the file system path name\
    \ of a module definition.\n*   `<path_separator>` represents the host platformÔÇÖs\
    \ path-separator character.\n\n![A431534_1_En_11_Fig4_HTML.gif](Images/A431534_1_En_11_Fig4_HTML.gif)\n\
    \nFigure 11-4. Syntax of the `--patch-module` option\n\nThe module specified by\
    \ `<module_name>` is patched with the class files existing inside the directory\
    \ `<file>`. We can also specify a normal JAR (not a modular one) instead of the\
    \ directory containing the class files.\n\nNote\n\nThe `--patch-module` can be\
    \ used to make the test classes part of the module at runtime. The JCP team states\
    \ that it is ÔÇťintended only for testing and debugging. Its use in production settings\
    \ is strongly discouraged.ÔÇŁ\n\nThe `--patch-module` command-line option can also\
    \ be used to patch automatic modules, but it canÔÇÖt be used to replace `module-info.class`\
    \ files, as the JCP team states in the specification: ÔÇťThe `--patch-module` option\
    \ cannot be used to replace `module-info.class` files. If a `module-info.class`\
    \ file is found in a module definition on a patch path, then a warning will be\
    \ issued and the file will be ignored.ÔÇŁ The JCP team also tell us what happens\
    \ with the packages that arenÔÇÖt exported: ÔÇťIf a package found in a module definition\
    \ on a patch path is not already exported by that module, then it will, still,\
    \ not be exported. It can be exported explicitly via either the reflection API\
    \ or the `--add-exports` option.ÔÇŁ"
