  raw: '### High Module Cohesion


    Cohesion measures how the elements of a module are residing together. Module cohesion
    denotes the moduleÔÇÖs integrality and coherence in regard to its internal structure.
    It expresses the rate to which the moduleÔÇÖs items are defining only one functionality.


    The highest module cohesion is achieved when all the elements from the module
    are grouped together to form a piece of functionality. When designing a module,
    the focus should be on having a high level of cohesion, and this can be accomplished
    in many different ways:


    *   By reducing the complexity of the module (for instance by using fewer methods
    or less code)

    *   By reducing the complexity of the methods described in the module

    *   By using related groups of data

    *   By defining only one predefined scope for the module


    Cohesion describes not only the capability of the module to act like a standalone
    component in the entire ecosystem, but also the homogeneity of its internal components.
    High cohesion provides better maintainability and reusability because loosely
    coupled source code can be altered more simply and with less pain than source
    code that isnÔÇÖt loosely coupled.


    During the conception of modules, one significant aspect is choosing the right
    degree of complexity for them. If the functionality of a module is small, then
    the module might not be very helpful in the entire module ecosystem. If its functionality
    is complex and it performs a lot of tasks, then it might be troublesome to reuse
    it. ItÔÇÖs a trade-off, and itÔÇÖs up to you to make the right decision .


    ### Low Module Coupling


    Coupling specifies the level of interdependence between modules. Module coupling
    refers to the dependency between modules and the way they interact. The objective
    is to reduce module coupling as much as possible, and this is achieved by specifying
    interfaces for the inter-modular communication. The interfaces have the role of
    hiding the module implementation. The resulting modules are independent and can
    be modified or swapped without fear of breaking other modulesÔÇöor worse, breaking
    the entire application.


    Low coupling usually corresponds to high cohesion. This is the result we want
    to achieve in the context of modularity. The reverseÔÇöhigh coupling and low cohesionÔÇöis
    the opposite of what a modular system should normally aim to accomplish.


    ### Tight Coupling vs. Loose Coupling


    Tight and loose coupling can refer to classes or modules. Tight coupling between
    classes is when a class uses logic from another class. It basically uses another
    class, instantiates an object of it, and then calls the object to access methods
    or instance variables .


    Loose coupling is encountered when a class doesnÔÇÖt directly use an instance of
    another class but uses an intermediate layer that primarily defines the object
    to be injected. One framework that defines loose coupling is the Spring framework,
    where the dependency objects are being injected by the container into another
    object. Loosely coupled modules can be altered with less effort. Loose coupling
    is generally accomplished by using small or medium-sized modules. Replacing a
    module wonÔÇÖt affect the system if the new module has the same interface as the
    module being replaced.


    Tight coupling means classes are dependent on other classes and it doesnÔÇÖt allow
    a module to be replaced so easily because it has dependencies on the implementation
    of other modules.


    Listing [1-1](#A431534_1_En_1_Chapter.html#Par59) shows an example of tight coupling.
    The listing defines one class called `Customer` that has dependencies on objects
    of types `CurrentAccount`, `DepositAccount`, and `SavingsAccount`. In the `Main`
    class, we create one object of type `Customer`. This object further creates three
    other objects. The `Customer` class contains an object of type `CurrentAccount`
    and calls the method `depositMoney(amount)` on this object. This is a tight coupling
    between class `Customer` and class `CurrentAccount`, and because class `CurrentAccount`
    is completely tied to class `Customer`, it depends on it. The class `Customer`
    creates objects of types `CurrentAccount`, `DepositAccount`, and `SavingsAccount`
    in order to execute some business logic that is defined in these three classes.


    ```

    // CurrentAccount.java

    package com.apress.tightcoupling;

    public class CurrentAccount {

    long deposit;

    public void depositMoney(long amount) {

    deposit = amount;

    }

    public long getDeposit() {

    return deposit;

    }

    }

    // DepositAccount.java

    package com.apress.tightcoupling;

    public class DepositAccount {

    long deposit;

    public void depositMoney(long amount) {

    deposit = amount;

    }

    public long getDeposit() {

    return deposit;

    }

    }

    // SavingsAccount.java

    package com.apress.tightcoupling;

    public class SavingsAccount {

    long deposit;

    public void depositMoney(long amount) {

    deposit = amount;

    }

    public long getDeposit() {

    return deposit;

    }

    }

