- fmt: '# Using One Consumer and One Provider


    This section shows a simple example to illustrate the concepts presented earlier.
    Suppose we have three modules:


    - Module `com.apress.moduleA` contains a simple interface called `ServiceExample`.

    - Module `com.apress.providerA` defines a service provider that contains the class
    `ServiceExampleImplementation1`, which implements the interface from module `com.apress.moduleA`,
    `ServiceExample`.

    - Module `com.apress.consumer` defines a service consumer that creates a new service
    loader for the `ServiceExample` service and uses this service.


    Listing [6-1](#A431534_1_En_6_Chapter.html#Par57) shows the interface `ServiceExample`,
    defined inside the module `com.apress.moduleA`.


    ```

    package com.apress.moduleA.interfaces;

    public interface ServiceExample {

    String printHelloWorld();

    }

    Listing 6-1.

    The Interface ServiceExample from the Module com.apress.moduleA

    ```


    The module descriptor of the module `com.apress.moduleA` is depicted in Listing
    [6-2](#A431534_1_En_6_Chapter.html#Par59). The package `com.apress.moduleA.interfaces`,
    where the interface is located, is exported.


    ```

    module com.apress.moduleA {

    exports com.apress.moduleA.interfaces;

    }

    Listing 6-2.

    The Module Descriptor of the Module com.apress.moduleA

    ```


    Until now weÔÇÖve only defined an interface inside of a module. Next weÔÇÖll define
    the provider module. Listing [6-3](#A431534_1_En_6_Chapter.html#Par61) shows the
    implementation class of the interface from the module `com.apress.providerA`.


    ```

    package com.apress.providerA;

    import com.apress.moduleA.interfaces.ServiceExample;

    public class ServiceExampleImplementation1 implements ServiceExample {

    public ServiceExampleImplementation() {

    }

    @Override

    public String printHelloWorld() {

    return "Hello World from ServiceExampleImplementation1";

    }

    }

    Listing 6-3.

    The Implementation Class of Interface ServiceExample from Module com.apress.providerA

    ```


    In Listing [6-4](#A431534_1_En_6_Chapter.html#Par63) you see the module descriptor
    of module `com.apress.providerA`.


    ```

    module com.apress.providerA {

    requires com.apress.moduleA;

    provides com.apress.moduleA.interfaces.ServiceExample with com.apress.providerA.ServiceExampleImplementation1;

    }

    Listing 6-4.

    The Module Descriptor of Module com.apress.providerA

    ```


    The module descriptor states that it provides an implementation of the `ServiceExample`
    interface with the class `ServiceExampleImplementation1`. This means that inside
    the module we have a class called `ServiceExampleImplementation1` that implements
    the interface `ServiceExample`. The module descriptor also requires the `com.apress.moduleA`
    module because it has to access the interface in order to be able to implement
    it.


    Listing [6-5](#A431534_1_En_6_Chapter.html#Par66) shows the content of module
    `com.apress.consumer`.


    ```

    package com.apress.consumer;

    import com.apress.moduleA.interfaces.ServiceExample;

    import java.util.ServiceLoader;

    public class Main {

    public static void main(String[] args) {

    Iterable services = ServiceLoader.load(ServiceExample.class);

    for(ServiceExample serviceExample : services) {

    System.out.println(serviceExample.printHelloWorld());

    }

    }

    }

    Listing 6-5.

    The Main Class of Module com.apress.consumer

    ```


    The `Main` class obtains instances of `ServiceExample` using the `ServiceLoader`
    from the `java.util` package. This is done by creating a new service loader for
    the `ServiceExample` type inside the `Main` class of the `com.apress.consumer`
    module. All instances of type `ServiceExample` are retrieved by calling the `load()`
    method with the `ServiceExample.class` parameter. Finally, we iterate through
    them and call the `printHelloWorld()` method on them.


    Listing [6-6](#A431534_1_En_6_Chapter.html#Par69) shows the `module-info.java`
    file of the module `com.apress.consumer`.


    ```

    module com.apress.consumer {

    requires com.apress.moduleA;

    uses com.apress.moduleA.interfaces.ServiceExample;

    }

    Listing 6-6.

    The Module Descriptor of Module com.apress.consumer

    ```


    Module `com.apress.consumer` requires module `com.apress.moduleA` because it needs
    access to the interface to call the corresponding method on it. Additionally,
    it specifies that it uses the interface `ServiceExample`. This tells the module
    system that the module `com.apress.consumer` wants to consume instances of the
    `com.apress.moduleA.interfaces.ServiceExample` interface.


    Finally, we compile the modules specified using the following command:


    ```

    javac -d output --module-source-path src $(find . -name "*.java")

    ```


    Then we run the following command:


    ```

    java --module-path output -m com.apress.consumer/com.apress.consumer.Main

    ```


    The output is printed inside the console:


    ```

    Hello World from ServiceExampleImplementation1

    ```


    We saw in this example how to define a simple service provider, a service consumer,
    and an interface in a separate module for the communication between the service
    provider and the service consumer. Both service provider and service consumer
    require only the interface. This means thereÔÇÖs a dependency between the service
    provider and the interface and respectively a dependency between the service consumer
    and the interface. ItÔÇÖs important to remember that thereÔÇÖs no dependency between
    the service provider and the service consumer. As a consequence, we donÔÇÖt have
    tight coupling between those two modules.


    **Note**


    You can find the source code for this example in the directory `/ch06/oneConsumerOneProvider`.


    # Using One Consumer and Two Providers


    Until now weÔÇÖve had only one service provider, but we can define many service
    providers and at the same time keeping the loosely coupled relation between the
    service providers at the service consumers. WeÔÇÖll illustrate this concept with
    an example by defining another provider module.


    Listing [6-7](#A431534_1_En_6_Chapter.html#Par81) shows the implementation class
    of the interface `ServiceExample` in the module `com.apress.providerB`.


    ```

    package com.apress.providerB;

    import com.apress.moduleA.interfaces.ServiceExample;

    public class ServiceExampleImplementation2 implements ServiceExample {

    public ServiceExampleImplementation2() {

    }

    @Override

    public String printHelloWorld() {

    return "Hello World from ServiceExampleImplementation2";

    }

    }

    Listing 6-7.

    The Implementation Class of Interface ServiceExample from Module com.apress.providerB

    ```


    Listing [6-8](#A431534_1_En_6_Chapter.html#Par82) shows the module descriptor
    of module `com.apress.providerB`.


    ```

    module com.apress.providerB {

    requires com.apress.moduleA;

    provides com.apress.moduleA.interfaces.ServiceExample with com.apress.providerB.ServiceExampleImplementation2;

    }

    Listing 6-8.

    The Module Descriptor of Module com.apress.providerB

    ```


    The module descriptor of module `com.apress.providesB` provides an implementation
    of the `ServiceExample` interface with the class `ServiceExampleImplementation2`.


    By compiling and running the modules, the following result is printed in the console:


    ```

    Hello World from ServiceExampleImplementation2

    Hello World from ServiceExampleImplementation1

    ```


    In this example, we defined two provider modules and saw how they interact in
    the context of the module system. None of the provider modules has a dependency
    upon the consumer module.


    In our example, neither the provider modules nor the consumer module exports their
    packages. In this way, theyÔÇÖre encapsulated and canÔÇÖt be accessed from outside.
    Nonetheless, Jigsaw has the capability to instantiate classes of type `ServiceExampleImplementation1`
    because it implements the interface `ServiceExample`, which is defined using the
    `provides` directive inside the `module-info.java` of module `com.apress.providerB`.


    **Note**


    You can find the source code for this example in the directory `/ch06/oneConsumerTwoProviders`.'
