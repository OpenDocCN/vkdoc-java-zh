- fmt: "### The Unnamed Module\n\nAn unnamed module, as the term suggests, doesnÔÇÖt\
    \ have a name and isnÔÇÖt declared. It comprises all the JAR files or modular JAR\
    \ files from the class path. All these JAR files together form the unnamed module.\
    \ The Java Platform Module System first searches for a specific type on the module\
    \ path. The module path is searched before the class path. If the type isnÔÇÖt found\
    \ on the module path, the search is performed on the class path. If the type is\
    \ found on the class path, it will be part of the so-called unnamed module. We\
    \ use the singular term unnamed module instead of the plural unnamed modules because\
    \ the unnamed module is unique for each class loader. ThereÔÇÖs only one, single\
    \ unnamed module for each class loader.\n\n> **Note**  \n> An unnamed module is\
    \ bound to a class loader. ThereÔÇÖs a one-to-one relationship between a class loader\
    \ and an unnamed module. The unnamed module reads all the named modules in the\
    \ JDK image and on the module path. It also exports all of its packages.\n\nBy\
    \ default, the unnamed module reads all the named modules from the system. In\
    \ this way, according to the Java 9 accessibility rules, the unnamed module can\
    \ access all packages from all the named modules that are being exported. The\
    \ reverse isnÔÇÖt true, meaning that the named modules canÔÇÖt read the unnamed module.\
    \ If we try to access code on the class path (in the unnamed module) from the\
    \ module path, the compilation will fail. To succeed, we need to turn the code\
    \ from the unnamed module into automatic modules. Therefore, we take the JAR file\
    \ out of the class path and place it on the module path to become an automatic\
    \ module.\n\n> **Note**  \n> A named module canÔÇÖt require an unnamed module.\n\
    \nAll classes that arenÔÇÖt contained into the named modules are implicitly contained\
    \ in the unnamed module. All the packages contained in the unnamed module are\
    \ open by default to all the modules from the module path, which makes reflective\
    \ access from the module path on the class path possible.\n\n### Observable Modules\n\
    \nThe observable modules are not a separate category of modules. This is why we\
    \ didnÔÇÖt include them in the classification of modules. The term observable modules\
    \ is used to denominate all the modules from the system: platform modules, library\
    \ modules, and our own modules. The modules from the module path are part of the\
    \ observable modules too.\n\n## Summary\n\nThis chapter presented the new concept\
    \ of module in Jigsaw. We learned how to define a module and described the structure\
    \ of the new `module-info.java` file that represents the module descriptor.\n\n\
    Inside the module descriptor there are five types of directives that can be used:\
    \ `requires`, `exports`, `opens`, `uses`, and `provides`. The first three were\
    \ explained in detail throughout this chapter. We saw how we can define dependencies\
    \ between modules using the `requires` directive and also how we can specify which\
    \ packages a module exports using the `exports` directive. Further, we defined\
    \ a couple of modules and illustrated the dependencies between them in a module\
    \ graph.\n\nWe mentioned the differences between the `exports` and `opens` clauses.\
    \ The `exports` clause allows compile-time and runtime access to the public types\
    \ of a specific package. The `use` clause allows runtime access using reflection\
    \ for both the public and private types of a specific package.\n\nWe compiled\
    \ and ran a single module as well as multiple modules. To be able to do this,\
    \ we used the new concept of module path together with the new command-line options\
    \ `--module-source-path` and `--module-path`. Then we talked about the new modular\
    \ JARs and described their internal structure. I described the enhancements added\
    \ to the `jar` tool and showed how to package a modular JAR using the `jar` tool.\n\
    \nThe chapter explained the three types of existing module paths: the application\
    \ module path, the compilation module path, and the upgrade module path. It also\
    \ talked about the module resolution process and about the new accessibility rules\
    \ that were introduced in Java 9. We described topics like readability, implied\
    \ readability, and qualified exports.\n\nThis chapter concluded by describing\
    \ the different types of modules in Jigsaw: normal modules, open modules, named\
    \ modules, unnamed modules, automatic modules, and observable modules. We stressed\
    \ that as a consequence of the fact that a named module canÔÇÖt read the unnamed\
    \ module, code from the module path canÔÇÖt access code inside the JARs placed on\
    \ the class path.\n\nIn Chapter [5](../Text/A431534_1_En_5_Chapter.html) youÔÇÖll\
    \ learn about modular runtime images.\n\n# 5. Modular Runtime Images\n\nIn this\
    \ chapter weÔÇÖll look at the structure of the new modular runtime image introduced\
    \ in Java 9, which brings an important benefit in terms of improved performance\
    \ and maintainability. On the other hand, the new format of the runtime image\
    \ doesnÔÇÖt necessarily result in preserving the exactly same functionality of all\
    \ the existing APIs.\n\n> **Note**  \n> This chapter is an informational one that\
    \ describes the format of the modular runtime images introduced in JDK 9.\n\n\
    ## Modular Runtime Images\n\nChapter [3](../Text/A431534_1_En_3_Chapter.html)\
    \ showed how the source code in the JDK was restructured around modules. In this\
    \ chapter weÔÇÖll talk about the new modular runtime image that was implemented\
    \ in the Java Enhancement Proposal 220. This JEP modified the structure of the\
    \ JDK and JRE as a consequence of the introduction of modules. It also defines\
    \ the layout of the modular runtime image.\n\nThe introduction of modules in Java\
    \ 9 caused an important change in the structure of the JDK and the JRE. As a result,\
    \ a new runtime format was introduced. The minimum possible runtime that we can\
    \ have in Java 9 would consist only of the module `java.base`. A JDK 9 image can\
    \ be accessed not only by tools that are running on Java 9, but also by tools\
    \ running on Java 8, for example.\n\n> **Note**  \n> For accessing classes and\
    \ resources in the JDK and JRE, a helper interface has been introduced in Java\
    \ 9.\n\nAnother important change, not directly related to modules but more related\
    \ to the JDK, is the replacement of the `rt.jar` file and the `tools.jar` file\
    \ with the new runtime image.\n\n> **Note**  \n> Java 9 doesnÔÇÖt remove the JAR\
    \ files and doesnÔÇÖt prohibit them. JAR files continue to work in Java 9.\n\nBecause\
    \ JAR files can cause many problems, the intention of the JCP team was to stop\
    \ using them inside the JDK and the JRE as much as possible.\n\n### The Runtime\
    \ Image Prior to Java 9\n\nThis section covers the structure of the runtime image\
    \ prior to Java version 9. We already talked about it in Chapter [2](../Text/A431534_1_En_2_Chapter.html),\
    \ but now weÔÇÖll get into more details. Before Java 9, the JDK build provided us\
    \ with two types of runtime images: a Java Runtime Environment (JRE) image and\
    \ a Java Development Kit (JDK) image.\n\n#### The JRE Image Prior to Java 9\n\n\
    A Java Runtime Environment was a complete implementation of the Java SE Platform.\
    \ A JRE image was composed of two directories: `bin` and `lib`.\n\nThe `bin` directory\
    \ contained the `java` command for launching the runtime system and also executable\
    \ binaries, like `javacp`, `java-rmi`, `javaw`, `javaws`, `keytool`, `pack200`,\
    \ `rmid`, `rmiregistry`, and `servertool`.\n\nThe `lib` directory was larger than\
    \ the `bin` directory and contained `.properties` and `.policy` files. The `ext`\
    \ directory was placed inside the `lib` directory and contained JAR files like\
    \ `nashorn.jar`, `sunec.jar`, `zipfs.jar`, and others. The most important thing\
    \ to mention is that inside the `lib` directory we could find the `rt.jar` file.\
    \ The `lib` directory comprised the runtime system's dynamically-linked native\
    \ libraries on the Mac OS and Linux operating systems."
  raw: '### The Unnamed Module


    An unnamed module, as the term suggests, doesnÔÇÖt have a name and isnÔÇÖt declared.
    It comprises all the JAR files or modular JAR files from the class path. All these
    JAR files together form the unnamed module. The Java Platform Module System first
    searches for a specific type on the module path. The module path is searched before
    the class path. If the type isnÔÇÖt found on the module path, the search is performed
    on the class path. If the type is found on the class path, it will be part of
    the so-called unnamed module. We use the singular term unnamed module instead
    of the plural unnamed modules because the unnamed module is unique for each class
    loader. ThereÔÇÖs only one, single unnamed module for each class loader.


    Note


    An unnamed module is bound to a class loader. ThereÔÇÖs a one-to-one relationship
    between a class loader and an unnamed module. The unnamed module reads all the
    named modules in the JDK image and on the module path. It also exports all of
    its packages.


    By default, the unnamed module reads all the named modules from the system. In
    this way, according to the Java 9 accessibility rules, the unnamed module can
    access all packages from all the named modules that are being exported. The reverse
    isnÔÇÖt true, meaning that the named modules canÔÇÖt read the unnamed module. If we
    try to access code on the class path (in the unnamed module) from the module path,
    the compilation will fail. To succeed, we need to turn the code from the unnamed
    module into automatic modules. Therefore, we take the JAR file out of the class
    path and place it on the module path to become an automatic module.


    Note


    A named module canÔÇÖt require an unnamed module.


    All classes that arenÔÇÖt contained into the named modules are implicitly contained
    in the unnamed module. All the packages contained in the unnamed module are open
    by default to all the modules from the module path, which makes reflective access
    from the module path on the class path possible.


    ### Observable Modules


    The observable modules are not a separate category of modules. This is why we
    didnÔÇÖt include them in the classification of modules. The term observable modules
    is used to denominate all the modules from the system: platform modules, library
    modules, and our own modules. The modules from the module path are part of the
    observable modules too.


    ## Summary


    This chapter presented the new concept of module in Jigsaw. We learned how to
    define a module and described the structure of the new module-info.java file that
    represents the module descriptor.


    Inside the module descriptor there are five types of directives that can be used:
    `requires`, `exports`, `opens`, `uses`, and `provides`. The first three were explained
    in detail throughout this chapter. We saw how we can define dependencies between
    modules using the `requires` directive and also how we can specify which packages
    a module exports using the `exports` directive. Further, we defined a couple of
    modules and illustrated the dependencies between them in a module graph.


    We mentioned the differences between the `exports` and `opens` clauses. The `exports`
    clause allows compile-time and runtime access to the public types of a specific
    package. The `use` clause allows runtime access using reflection for both the
    public and private types of a specific package.


    We compiled and ran a single module as well as multiple modules. To be able to
    do this, we used the new concept of module path together with the new command-line
    options `--module-source-path` and `--module-path`. Then we talked about the new
    modular JARs and described their internal structure. I described the enhancements
    added to the jar tool and showed how to package a modular JAR using the jar tool.


    The chapter explained the three types of existing module paths: the application
    module path, the compilation module path, and the upgrade module path. It also
    talked about the module resolution process and about the new accessibility rules
    that were introduced in Java 9\. We described topics like readability, implied
    readability, and qualified exports.


    This chapter concluded by describing the different types of modules in Jigsaw:
    normal modules, open modules, named modules, unnamed modules, automatic modules,
    and observable modules. We stressed that as a consequence of the fact that a named
    module canÔÇÖt read the unnamed module, code from the module path canÔÇÖt access code
    inside the JARs placed on the class path.


    In Chapter [5](../Text/A431534_1_En_5_Chapter.html) youÔÇÖll learn about modular
    runtime images.


    # 5.┬áModular Runtime Images


    In this chapter weÔÇÖll look at the structure of the new modular runtime image introduced
    in Java 9, which brings an important benefit in terms of improved performance
    and maintainability. On the other hand, the new format of the runtime image doesnÔÇÖt
    necessarily result in preserving the exactly same functionality of all the existing
    APIs.


    Note


    This chapter is an informational one that describes the format of the modular
    runtime images introduced in JDK 9.


    ## Modular Runtime Images


    Chapter [3](../Text/A431534_1_En_3_Chapter.html) showed how the source code in
    the JDK was restructured around modules. In this chapter weÔÇÖll talk about the
    new modular runtime image that was implemented in the Java Enhancement Proposal
    220\. This JEP modified the structure of the JDK and JRE as a consequence of the
    introduction of modules. It also defines the layout of the modular runtime image.


    The introduction of modules in Java 9 caused an important change in the structure
    of the JDK and the JRE. As a result, a new runtime format was introduced. The
    minimum possible runtime that we can have in Java 9 would consist only of the
    module java.base. A JDK 9 image can be accessed not only by tools that are running
    on Java 9, but also by tools running on Java 8, for example.


    Note


    For accessing classes and resources in the JDK and JRE, a helper interface has
    been introduced in Java 9.


    Another important change, not directly related to modules but more related to
    the JDK, is the replacement of the rt.jar file and the tools.jar file with the
    new runtime image.


    Note


    Java 9 doesnÔÇÖt remove the JAR files and doesnÔÇÖt prohibit them. JAR files continue
    to work in Java 9.


    Because JAR files can cause many problems, the intention of the JCP team was to
    stop using them inside the JDK and the JRE as much as possible.


    ### The Runtime Image Prior to Java 9


    This section covers the structure of the runtime image prior to Java version 9\.
    We already talked about it in Chapter [2](../Text/A431534_1_En_2_Chapter.html),
    but now weÔÇÖll get into more details. Before Java 9, the JDK build provided us
    with two types of runtime images: a Java Runtime Environment (JRE) image and a
    Java Development Kit (JDK) image.


    #### The JRE Image Prior to Java 9


    A Java Runtime Environment was a complete implementation of the Java SE Platform.
    A JRE image was composed of two directories: bin and lib.


    The bin directory contained the `java` command for launching the runtime system
    and also executable binaries, like javacp, java-rmi, javaw, javaws, keytool, pack200,
    rmid, rmiregistry, and servertool.


    The lib directory was larger than the bin directory and contained .properties
    and .policy files. The ext directory was placed inside the lib directory and contained
    JAR files like nashorn.jar, sunec.jar, zipfs.jar, and others. The most important
    thing to mention is that inside the lib directory we could find the rt.jar file.
    The lib directory comprised the runtime system''s dynamically-linked native libraries
    on the Mac OS and Linux operating systems.'
