    | java.xml.ws | Specifies the Web Services Metadata API and the Java API for XML-based
    Web Services |

    | java.xml.ws.annotation | Specifies a part of the Commons Annotations APIs to
    support programs running on the Java SE platform |


    ## Platform Modules


    The JCP team put a lot of effort into modularizing the Java platform. The most
    difficult tasks were to investigate and evaluate the dependencies between different
    parts of the libraries and to split all the classes from the JDK and put them
    into modules.


    The platform modules are the modules that resulted after splitting the JDK. They
    completely replace the monolithic JDK and enable us to create custom runtime images.
    These can consist of a specific configuration that contains a subset of modules
    together with their transitive dependencies. This subset of modules can represent
    one module or more than one module. It can also represent all the modules, which
    is the equivalent of the entire JDK. ItÔÇÖs also possible to combine platform modules
    together with our own created modules in order to form a runtime image.


    Each module has a determined functionality and can define dependencies upon other
    modules. A platform module is part of the Java runtime and contains source code.
    Platform modules are able to export their packages so they can be accessible from
    other modules that read them. When we generally talk about modules, we mean not
    only the platform modules but also the modules created by application programmers.
    These modules donÔÇÖt have a special definition. We could call them ÔÇťdeveloper modulesÔÇŁ
    or ÔÇťprogrammer modulesÔÇŁ in order to make a clear distinction between them and
    the modules that are by default part of the platform, which are the platform modules.


    There are two different kinds of platform modules: standard modules and non-standard
    modules.


    ### Standard Modules


    The standard modules are managed by the Java Community Process (JCP). The names
    of the standard Java SE modules start with `java.*`. These names are explicit
    enough, so itÔÇÖs quite easy to imagine what the role of the module is. For example,
    the module named `java.rmi` defines the Remote Method Invocation API, and the
    module named `java.logging` defines the Java Logging API. A standard module can
    consist of standard API packages as well as non-standard API packages. It can
    also depend upon one or more non-standard modules.'
