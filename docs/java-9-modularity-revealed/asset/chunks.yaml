    ```


    This method returns the `Class` object or null if the class couldnÔÇÖt be found.
    If we pass a name for the module, then the method will always return null. Otherwise,
    it will call the `findClass(name)` method by passing the name of the class. This
    method isnÔÇÖt useful in a modular context unless we have our own class loader implementation
    that supports the loading from modules. Then we could overwrite this method.


    > **Note:** Class loaders can be upgraded to load types in modules.


    The Extension class loader was renamed to platform class loader in JDK 9. The
    name of the built-in platform class loader is `platform`. The new static `getPlatformClassLoader()`
    method returns a platform class loader via which all the built-in Java SE and
    JDK types are visible. This method checks for permissions and can throw a `SecurityException`
    exception.


    A class loader can load types from multiple modules if two conditions are simultaneously
    met:


    - All types from every module are loaded by just one single class loader.

    - Modules are independent and donÔÇÖt conflict with each other.


    To assure backwards compatibility, itÔÇÖs possible to load types from the class
    path. Every class loader has a unique unnamed module thatÔÇÖs retrieved by the new
    method `getUnnamedModule()` located in the `java.lang.Classloader` class. If the
    class loader loads a type that isnÔÇÖt defined in a named module, that type is in
    the unnamed module. The unnamed module from the application class loader loads
    types from the class path when these types are in packages that arenÔÇÖt defined
    by any known module.


    ## New Methods in the ClassLoader Class


    Here are the methods added in Java 9 inside the `ClassLoader` class:


    - `Class<?> findClass(String moduleName, String className)`

    - `URL findResource(String moduleName, String resourceName)`

    - `String getName()`

    - `ClassLoader getPlatformClassLoader()`

    - `Module getUnnamedModule()`


    Next weÔÇÖll look at the key concept of layers, which was introduced in JDK 9.'
  raw: '## Class Loading Mechanism in JDK 9


    This section covers the class loading mechanism in JDK 9\. As you know, the role
    of a class loader is to load a class. The JCP team didnÔÇÖt change the class loading
    process in JDK 9\. The Classloader API hasnÔÇÖt been modified in JDK 9\. The same
    class loaders from JDK 8 are present in JDK 9: the bootstrap class loader, the
    platform class loader, and the application class loader.


    The class loading process in JDK 9 is the same as in the previous versions of
    the JDK: first, the request to load a type is delegated to the parent class loader.
    The parent class loader delegates further to its parent class loader. This process
    traverses the application class loader and platform class loader and stops at
    the bootstrap class loader. If the bootstrap class loader canÔÇÖt load the type,
    the class loader that started the delegation process will load the type.


    By examining the structural layers that compose the JDK 9, we can observe that
    the Java Platform Module System (JPMS) is located on top of the JVM, under the
    class loading architecture. Right at the bottom we have the Java Virtual Machine
    (JVM). Above that we have the JPMS, and above the JPMS we have the three types
    of class loaders mentioned earlier. This architecture is illustrated clearly in
    Figure [10-1](#A431534_1_En_10_Chapter.html#Fig1).


    ![A431534_1_En_10_Fig1_HTML.gif](Images/A431534_1_En_10_Fig1_HTML.gif)


    Figure 10-1.


    Overview over the structure of JDK 9


    The bootstrap class loader is used to define the classes from most of the modules,
    like java.base, java.sql, or java.logging. The platform class loader is used to
    define the classes from only a few modules, like java.corba or java.transaction.
    Both bootstrap and platform class loader load types from platform modules, whereas
    the application class loader loads types from the module path. The application
    class loader is used to define the classes from jdk.compiler, junit, guava, slf4j,
    and so on. In JDK 9, the application and platform class loaders arenÔÇÖt instances
    of the class `java.net.URLClassLoader` anymore.


    Jigsaw allows loading modules using our own class loaders. This can be done using
    the method `defineModules()` from the `Module` class, but this feature is pretty
    advanced, so not many developers will ever use it.


    Note


    Every module has a class loader at runtime.


    Jigsaw also introduced support for class loader names. Class loaders can have
    optional names. If the name isnÔÇÖt specified when a class loader is created, it
    will have no name. The name of the class loader is retrieved by the `getName()`
    method of the `Classloader` class. The name of the moduleÔÇÖs class loader is always
    mentioned together with the module name and version in warning messages or stack
    traces.


    Note


    Jigsaw uses the existing class loaders and doesnÔÇÖt create its own class loaders.


    Because a class loader can have a name attribute in JDK 9, a new constructor has
    been added for the `Classloader` class that creates a new class loader of the
    specified name by using the specified parent class loader for delegation:


    ```

    protected ClassLoader(String name, Classloader parent)

    ```


    Jigsaw also allows you to find a class by name in a specific module with the help
    of the new `findClass()` method, which gets as parameter the name of the module
    and the binary name of the class:


    ```

    Class findClass(String moduleName, String name)

    ```


    This method returns the `Class` object or null if the class couldnÔÇÖt be found.
    If we pass a name for the module, then the method will always return null. Otherwise,
    it will call the `findClass(name)` method by passing the name of the class. This
    method isnÔÇÖt useful in a modular context unless we have our own class loader implementation
    that supports the loading from modules. Then we could overwrite this method.


    Note


    Class loaders can be upgraded to load types in modules.


    The Extension class loader was renamed to platform class loader in JDK 9\. The
    name of the built-in platform class loader is platform. The new static getPlatformClassLoader()
    method returns a platform class loader via which all the built-in Java SE and
    JDK types are visible. This method checks for permissions and can throw a `SecurityException`
    exception.


    A class loader can load types from multiple modules if two conditions are simultaneously
    met:


    *   All types from every module are loaded by just one single class loader.

    *   Modules are independent and donÔÇÖt conflict with each other.


    To assure backwards compatibility, itÔÇÖs possible to load types from the class
    path. Every class loader has a unique unnamed module thatÔÇÖs retrieved by the new
    method `getUnnamedModule()` located in the `java.lang.Classloader` class. If the
    class loader loads a type that isnÔÇÖt defined in a named module, that type is in
    the unnamed module. The unnamed module from the application class loader loads
    types from the class path when these types are in packages that arenÔÇÖt defined
    by any known module.


    ### New Methods in the ClassLoader Class


    Here are the methods added in Java 9 inside the `ClassLoader` class:


    *   `Class<?> findClass(String moduleName, String className)`

    *   `URL findResource(String moduleName, String resourceName)`

    *   `String getName()`

    *   `ClassLoader getPlatformClassLoader()`

    *   `Module getUnnamedModule()`


    Next weÔÇÖll look at the key concept of layers, which was introduced in JDK 9.'
