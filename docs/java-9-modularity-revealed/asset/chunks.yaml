    ## Introduction


    The Java programming language, introduced in 1995, has had a very successful story.
    ItÔÇÖs evolved constantly since its birth and became one of the most popular programming
    languages in the world. Every new release of Java has added new featuresÔÇösmall,
    medium, and big.


    Java 9 is finally here! It is scheduled for release in September 2017, more than
    three years after the release of Java 8.


    ### Issues with the Monolithic JDK


    The release of Java 8 in March 2014 brought very important features to the Java
    platform like Lambdas and the Stream API, which were definitely needed by developers.
    Nevertheless, some well-known weaknesses of the platform had still not been addressed
    in Java 8: the huge monolithic JDK and the class path. These problems are addressed
    in Java 9 by Project Jigsaw.


    The most important feature of Java 9 is by far the new modular system it introduced.
    Other new features have been introduced in Java 9, but theyÔÇÖre not the focus of
    this book. This book covers the new modular system introduced in Java 9. The big,
    monolithic, and indivisible JDK has been problematic for a long time. ItÔÇÖs difficult
    to install it on small devices because many donÔÇÖt have enough memory to hold it.
    In many cases, a large number of classes that comprise the JDK arenÔÇÖt needed because
    the application may not require them. CORBA, for instance, is still part of the
    JDK, but itÔÇÖs rarely used in real projects today. It makes no sense to use the
    entire JDK when only a part or a small part of it is needed. The Compact Profiles
    introduced in Java 8 recognized the problems caused by the huge JDK and attempted
    to solve them, but only to a low degree. The three Compact Profiles still contain
    a lot of libraries that a developer may not actually need. There had to be a better
    way to split the entire JDK and to create a much smaller custom JDK as a runtime
    image that contains only the libraries needed and nothing more. Project Jigsaw
    is that way, as weÔÇÖll see throughout this book.


    Big, monolithic software applications present a series of disadvantages. Maintaining
    them is tough and expensive, and performing a small change can result into a great
    effort. In large projects, modularity is crucial because it allows easy maintenance
    of the source code by reducing its complexity due to the loose coupling mechanism
    it provides.


    ### Issues with the Class Path


    The problems related to class path have been in Java since the birth of the language.
    The Java Virtual Machine (JVM) doesnÔÇÖt know that a JAR on the class path depends
    on another JAR. It simply loads a group of JARs, but it doesnÔÇÖt check their dependencies.
    When a JAR is missing, the JVM breaks the execution at runtime. The JARs canÔÇÖt
    define concepts related to accessibility. They donÔÇÖt define accessibility constraints
    like public or private. The entire content of all JARs on the class path is completely
    visible to all the other JARs from the class path. ThereÔÇÖs no way to declare that
    some classes in a JAR are private. All classes and methods are public related
    to the class path, which leads to a problem sometimes called JAR hell. Conflicts
    between versions of JARs can arise, especially when two different versions of
    the same library are required. Loading the classes from the class path is a slow
    process because the JVM doesnÔÇÖt know where exactly the class is located and therefore
    has to check all the existing files from the class path. Jigsaw addresses this
    pain point. By taking advantage of reliable configuration, module boundaries are
    enforced, and the JVM knows about the dependencies that are needed. This has a
    positive impact on performance. Java 9 defines the concept of module path and
    allows you to have a library as a JAR file on the class path or have the same
    library as a module on the module path. This means nobody is forced to turn all
    their libraries into modules when they switch to Java 9. The libraries can still
    be used on the class path, even in Java 9. This is a big advantage because Java
    9 provides a smooth transition of libraries.


    The module path introduced in Java 9 tends to solve the problems caused by the
    class path. It can replace the class path completely or can interact and work
    together with the class path.


    Modularity is important because it provides a maintainable code base for the future.
    We should use modular programming when we want to separate the effort put into
    design, development, and testing. Modular programming speeds up development and
    makes debugging applications easier by reducing their complexity.'
