    \ to use both the short and long formats, as described in Table [4-3](#A431534_1_En_4_Chapter.html#Tab3).\
    \ However, there are situations when thereÔÇÖs no corresponding for the long format.\n\
    \n> **Note**  \n> The Java Archive Tool, also called the `jar` tool, is an archiving\
    \ tool that creates a JAR file by archiving a couple of files. Java 9 improved\
