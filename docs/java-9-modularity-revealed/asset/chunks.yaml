    \nWe already worked with the application module path and the compilation module\
    \ path when we compiled and ran multiple modules. The next subsections go over\
    \ these types of module paths.\n\n### Application Module Path\n\nThe application\
    \ module path is used by the Java launcher to mark the directory that incorporates\
