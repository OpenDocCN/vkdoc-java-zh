  raw: '#### Adding a Module Version


    When creating a modular JAR, a module version can also be added. The option `--module-version`
    can be used during packaging to add some metadata regarding the version of the
    module. The metadata isnÔÇÖt added to the module declaration and wonÔÇÖt be processed
    at runtime. ItÔÇÖs important to make this distinction.


    #### Printing the Module Descriptor


    The module descriptor is printed with the jar toolÔÇÖs command-line option `--describe-module`:


    ```

    $ jar --describe-module

    ```


    Or simply:


    ```

    $ jar -d

    ```


    By printing the module descriptor we can see what the corresponding JAR file contains.
    The following information is displayed:


    *   The name of the module thatÔÇÖs contained in the JAR file

    *   A list of modules that the module contained into the JAR file depends on

    *   The name and package of the main class


    An important change is the introduction of a long format for the specification
    of the options. In Java 8, we had only the short format composed of a letter.
    In Java 9 itÔÇÖs possible to use both the short and long formats, as described in
    Table [4-3](#A431534_1_En_4_Chapter.html#Tab3). However, there are situations
    when thereÔÇÖs no corresponding for the long format.


    Note


    The Java Archive Tool, also called the jar tool, is an archiving tool that creates
    a JAR file by archiving a couple of files. Java 9 improved the jar tool by adding
    support for modules.


    The next section describes a fundamental feature in JDK 9: the introduction of
    the module path.


    ## The Module Path


    Project Jigsaw introduces a new concept for replacing the class path: the module
    path, which can represent one of the following:


    *   A path to a sequence of directories that contain modules

    *   A path to a modular JAR file

    *   A path to a JMOD file


    In contrast to the module path, the class path represents a sequence of JAR files.
    The module path is used by the compiler to find the modules in order to resolve
    them. The module path can be mixed together with the class path. In this case,
    the classes that are part of the modules are able to depend on anything that exists
    on the class path.


    Every existing artifact from the module path must have a module declaration. On
    the module path, we canÔÇÖt have artifacts that donÔÇÖt have a module declaration.


    Note


    Even if the module path was introduced in Java 9 to replace the class path, the
    class path still exists and can be used standalone or in combination with the
    module path.


    There are three types of module paths introduced in Jigsaw:


    *   Application module path

    *   Compilation module path

    *   Upgrade module path


    We already worked with the application module path and the compilation module
    path when we compiled and ran multiple modules. The next subsections go over these
    types of module paths.


    ### Application Module Path


    The application module path is used by the Java launcher to mark the directory
    that incorporates the application modules. ItÔÇÖs expressed using the new command-line
    option `--module-path` or its short-form, `-p`.


    Figure┬á[4-9](#A431534_1_En_4_Chapter.html#Fig9) shows the command-line syntax
    of the module path flag:


    ![A431534_1_En_4_Fig9_HTML.gif](Images/A431534_1_En_4_Fig9_HTML.gif)


    Figure 4-9.


    Syntax of the --module-path command-line option


    The module path flag gets a list of directories as parameters separated by a colon.
    There can be an unlimited number of directories listed, but for each of them there
    has to be a colon separating them.


    Note


    In the previous example, we used a colon (:) to separate directories, but a colon
    is used only for Linux environments. For Windows environments, we must use a semicolon
    (;) instead.


    The modules contained in the directories that form the module path can be:


    *   Packaged as modular JAR files.

    *   Exploded as standalone class files.


    The Java launcher can load exactly the module that it needs from the module path
    because it knows this information due to the configurations that exist in the
    module declaration.


    Note


    The module path allows specifying modules instead of JAR libraries as the class
    path.


    At runtime, using the module path is possible to specify the different types of
    modules that weÔÇÖve built together with the project. A module can be only in one
    place. If itÔÇÖs in more than one place, the first occurrence will be retained,
    and the other occurrences wonÔÇÖt be taken into consideration.


    Remember


    The module path can contain only modules.


    Besides the application module path, there are two more types of module path:
    the compilation module path and the upgrade module path.


    ### Compilation Module Path


    The compilation module path, which contains definitions of modules in source form
    and is used together with `javac`, is specified using the new Java option `--module-source-path`
    on the command-line. ItÔÇÖs used during the compilation to inform the Java compiler
    of the location of the modules that must be searched.


    Figure┬á[4-10](#A431534_1_En_4_Chapter.html#Fig10) illustrates the syntax of the
    command-line `--module-source-path` option:


    ![A431534_1_En_4_Fig10_HTML.gif](Images/A431534_1_En_4_Fig10_HTML.gif)


    Figure 4-10.


    Syntax of the --module-source-path command-line option


    The `--module-source-path` flag specifies a list of Java source files to be compiled.
    They can be listed one after another separated by a blank space.


    Note


    In most situations, the list of Java files will be huge. Linux helps you in this
    respect. You can type `$(find. ÔÇôname ''*.java''`) to get the entire list of directories
    having the extension .java.


    Generally, we can think of the `--module-source-path` command-line option as the
    module correspondent of the `--sourcepath` option.


    ### Upgrade Module Path


    The upgrade module path is specified using the Java compiler option `--upgrade-module-path`
    on the command-line. According to OpenJDK, ÔÇťit contains compiled definitions of
    modules intended to be used in place of upgradeable modules built-in to the environment.ÔÇŁ
    The upgrade module path isnÔÇÖt covered in this book.


    In this section weÔÇÖll talk about the module resolution process.


    ## Module Resolution


    Module resolution is a process introduced in Java 9 that checks the correctness
    of the module path and also resolves the dependencies that exist throughout a
    module system. It takes place at both compile-time and runtime. The goal of the
    module resolution process is to end up with a minimum necessary set of resolved
    modules in order to be able to run the application.


    Note


    Modules are resolved during build and installation. TheyÔÇÖre not resolvable during
    runtime.


    The `requires` clauses from the module declaration located in the module-info.java
    file provide the module system with valuable information about the dependencies
    that have to be solved. These dependencies are nothing more than modules that
    our current module depends upon. In Java 9, theyÔÇÖre called observable modules,
    covered later in this chapter in the section ÔÇťTypes of Modules.ÔÇŁ


    After all the observable modules of our current module are found, the module system
    doesnÔÇÖt stop. It searches further for the observable modules of the most recently
    found modules. This process continues until every dependence of every module is
    fulfilled and until the base module java.base is reached.


    Note


    At compile-time, during the module resolution, Jigsaw searches to see whether
    there are any cyclic dependencies. If it finds any, the application wonÔÇÖt compile.'
