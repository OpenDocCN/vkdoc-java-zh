- fmt: "### Integration with Apache Maven\n\nOne of the primary goals of Maven was\
    \ to upgrade only its plugins in order to offer support for Java 9. No changes\
    \ were necessary inside the Maven Core for making Maven run on Java 9. Another\
    \ primary goal was to offer support for Java 9 starting with Maven 3.0.\n\nIn\
    \ order to use Maven with Java 9, two conditions have to be met simultaneously:\n\
    \n- The `JAVA_HOME` variable for Maven has to be set to point to a JDK 9 installation.\n\
    - The `source` and `target` of the Maven Compiler plugin should be greater or\
    \ equal than 6.\n\nThe Maven Compiler plugin defines a parameter for `source`\
    \ and a parameter for `target` that correspond to the version of the JDK. The\
    \ minimum supported version for the `source` and `target` for JDK 9 is 6. The\
    \ version of JDK used to run Maven doesnÔÇÖt necessarily have to be the same as\
    \ the version of JDK used to run the Maven Compiler plugin.\n\nMaven needed adjustments\
    \ for some of the JEPs implemented in Java 9. Besides the JEPs related to Jigsaw,\
    \ Maven also needed adjustments in order to fit the following JEPs: JEP 223 ÔÇô\
    \ New Version-String scheme, JEP 226 ÔÇô UTF-8 Property Files, JEP 238 ÔÇô Multi-Release\
    \ JAR files, JEP 247 ÔÇô Compile for Older Platform Versions, and JEP 285 ÔÇô Modular\
    \ Java Application Packaging.\n\nEven if itÔÇÖs not part of Jigsaw, we should say\
    \ something about the JEP 223 ÔÇô New Version-String scheme because it has huge\
    \ impact on Maven. Maven relies heavily on the system properties. Since the version\
    \ string has changed in Java 9, Maven throws an `ArrayIndexOutOfBoundsException`\
    \ as it internally tries to compute the version. Fortunately, the issue has been\
    \ fixed starting with the following versions of the following plugins:\n\n- `maven-archiver-3.0.1`\n\
    - `maven-jar-plugin-3.0.0`\n- `maven-war-plugin-3.0.0`\n- `maven-ear-plugin-xxx`\n\
    - `maven-javadoc-plugin-2.10.4`\n\nIf youÔÇÖre using these plugins in Java 9, make\
    \ sure to upgrade them to at least one of these versions.\n\nTable [12-1](#A431534_1_En_12_Chapter.html#Tab1)\
    \ shows the Maven plugins affected by the introduction of Java 9.\n\n**Table 12-1.**\
    \ Maven Plugins Affected by Java 9\n\n| Plugin Name | Minimum Compatible Version\
    \ | Affected Goal and Status |\n| --- | --- | --- |\n| Maven Compiler plugin |\
    \ 3.6.1 | `compile` => new feature `testCompile` => new feature |\n| Maven Javadoc\
    \ plugin | 2.10.4 | `jar` => failure `javadoc` => warning `aggregate` => failure\
    \ |\n| Maven Plugin plugin | 3.5 | `descriptor` |\n| Maven War plugin |  | `war`\
    \ => failure |\n| Plexus :: Component Metadata | 1.7 | `generate-metadata` =>\
    \ new feature |\n\nRemember the JDeps tool described in Chapter [8](../Text/A431534_1_En_8_Chapter.html)?\
    \ Maven integrates this tool into a new plugin, the Apache Maven JDeps plugin.\n\
    \n#### Apache Maven JDeps Plugin\n\nThis plugin makes use of the JDeps tool to\
    \ analyze internal API calls inside our classes. It can perform analysis when\
    \ building a project.\n\n> **Note:** The first version of the Maven JDeps Plugin\
    \ is 3.0. This version has been chosen deliberately by Maven to reveal that Maven\
    \ 3.0 or greater should be used.\n\nThe plugin consists of two goals:\n\n- A goal\
    \ called `jdeps:jdkinternals` that verifies whether the main classes depend on\
    \ internal JDK classes.\n- A goal called `jdeps:test-jdkinternals` that verifies\
    \ whether the test classes depend on internal JDK classes.\n\nTable [12-2](#A431534_1_En_12_Chapter.html#Tab2)\
    \ shows some of the most important options that can be used inside the `<configuration>`\
    \ tag of the Maven JDeps plugin, as recorded in the Oracle documentation for Java\
    \ SE.\n\n**Table 12-2.** Options for the Maven JDeps Plugin\n\n| Plugin Name |\
    \ Description | Example |\n| --- | --- | --- |\n| `failOnWarning` | Specifies\
    \ whether the build continues if there are JDeps specific warnings. Default is\
    \ true | `<failOnWarning>false</failOnWarning>` |\n| `dependenciesToAnalyzeIncludes`\
    \ | Specifies additional dependencies to be analyzed. The format is `<include>groupId:artifactId</include>`.\
    \ Patterns are allowed. | `<dependenciesToAnalyzeIncludes><include>*:*</include><include>com.apress.*:*</include><include>com.apress.book:*</include><include>com.apress.book:utils</include></dependenciesToAnalyzeIncludes>`\
    \ |\n| `dependenciesToAnalyzeExcludes` | Specifies dependencies that shouldnÔÇÖt\
    \ be analyzed. The format is `<exclude>groupId:artifactId</exclude>`. Patterns\
    \ are allowed. | `<dependenciesToAnalyzeExcludes><exclude>com.apress.book:*</exclude></dependenciesToAnalyzeExcludes>`\
    \ |\n| `jdeps.include` | Restricts analysis to classes that are matching the pattern.\
    \ It filters the list of classes to be analyzed. |  |\n| `jdeps.profile` | Shows\
    \ profile or the file containing a package. |  |\n| `jdeps.recursive` | Traverses\
    \ all dependencies recursively. |  |\n| `jdeps.module` | Shows the module containing\
    \ the package. |  |\n\nRunning with the option `-R` results in warnings being\
    \ displayed if there are transitive dependencies that are making use of JDK internal\
    \ APIs.\n\n> **Note:** By setting the `<failOnWarning>` option to true, the build\
    \ will immediately fail if there are any warnings.\n\nIf we have an application\
    \ that uses third-party libraries, it would make sense first to find the JDK internal\
    \ APIs inside our application code using the Maven JDeps plugin with option `<failOnWarning>`\
    \ set to true so that the build fails if any JDK internal APIs are found. In the\
    \ next step we could run the Maven JDeps plugin only on our third-party libraries,\
    \ but this time setting `<failOnWarning>` to false so that our build doesnÔÇÖt fail\
    \ if the third-party libraries are using JDK internal APIs. This is reasonable\
    \ because we canÔÇÖt dig inside the third-party libraries to fix them, but we can\
    \ do this inside our own application code.\n\nListing [12-1](#A431534_1_En_12_Chapter.html#Par62)\
    \ shows an example of using the Maven JDeps plugin to implement this specific\
    \ use case.\n\n```\n<plugin>\n    <groupId>org.apache.maven.plugins</groupId>\n\
    \    <artifactId>maven-jdeps-plugin</artifactId>\n    <version>3.0.0</version>\n\
    \    <executions>\n        <execution>\n            <id>testOnClasses</id>\n \
