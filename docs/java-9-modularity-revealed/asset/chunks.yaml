  raw: 'We can further reduce the size of the runtime image by using the `--strip-debug`
    flag, which strips the debug information from the image. In our example, the new
    size of the runtime image will be 26 MB instead of 29 MB after taking advantage
    of the `--strip-debug` option.


    Note


    If we use the Windows operating system, we have to use the separator : instead
    of ; for the module path.


    ### Running the Runtime Image


    To run the image, we make use of the Java launcher inside the runtime image:


    ```

    $ ./bin/java -m com.apress.application/com.apress.application.Main

    ```


    We pointed to the bin folder located inside the runtime image and called the Java
    launcher with the `-m` option, which contains the module name together with the
    name of the `Main` class. We specified that we want to run the `Main` class from
    module com.apress.application.


    Note that inside the runtime image we have an executable thatÔÇÖs targeted at a
    particular platform (in our case, Windows).


    ### Modular JAR Files as Input for the Jlink Tool


    We stated at the beginning of this chapter that the Jlink tool can take as input
    the following file formats: modular JAR files, JAR files, class files, and JMOD
    files.


    Until now, weÔÇÖve put class files and JMOD files on the module path. In this example,
    weÔÇÖll use modular JAR files instead of expanded class files. First, we delete
    our runtime image because weÔÇÖll create a new one using modular JAR files and JMOD
    files. For each module, we create modular JAR files in the output directory using
    the following pattern:


    ```

    $ jar --create --file output/com.apress.application.jar --main-class com.apress.application.Main
    -C output/com.apress.application.

    ```


    After all four modular JAR files are created inside the output directory, we delete
    all class files from this directory. Further, we run exactly the same `jlink`
    command as previously in order to create a custom runtime image.


    The newly created runtime image created from modular JAR files is the same as
    the runtime image created previously from expanded class files.


    ### Structure of the Generated Runtime Image


    The runtime image weÔÇÖve previously created is a smaller implementation of Java
    made exactly for our code to be able to successfully run. It doesnÔÇÖt have anything
    else in it except the minimum libraries necessary to be able to run. The content
    of the generated runtime image was discussed in the previous section. This section
    focuses on details regarding each folder of the runtime image.


    In the bin directory there are three Java launchers. The keytool is used for managing
    certificates and other security-related stuff. Java is the launcher we already
    know.


    *   In the lib directory are all the classes and resources, and there is no rt.jar
    file.

    *   The conf directory contains the user configuration. All the files in this
    directory can be edited by the user.

    *   The legal directory contains the copyright stuff from Oracle. There are per
    module license files. When using Jlink to create our own runtime images, the legal
    stuff comes from the packaged modules.


    In order to find all the modules contained inside a runtime image, we can run
    `java --list-modules` inside the image, as repeatedly shown in the previous examples.


    ### No Support for Linking Automatic Modules


    Project Jigsaw doesnÔÇÖt offer support for linking automatic modules. Trying to
    add a module that doesnÔÇÖt contain a module-info.class file in the runtime image
    will result in an error.


    In our next example, we download and add the guava.jar inside the output directory.
    Then we attempt to create the runtime image by additionally specifying the Guava
    JAR file :


    ```

    --add-modules guava

    ```


    Because the guava.jar is a simple JAR and not a modular one, and therefore doesnÔÇÖt
    contain a module-info.class inside it, the following error will be raised:


    ```

    Error: module-info.class not found for guava module

    ```


    ThereÔÇÖs a justified reason for not adding automatic modules support in Jlink.
    As we know, the automatic modules can access the class path. As a result, no one
    can assume that a custom runtime image created by Jlink will work correctly if
    it also contains automatic modules in it. Because automatic modules are employed
    for performing migration, they may have references to types on the class path.
    If, for example, an automatic module is linked into a custom runtime image, it
    could eventually result in faulty references unless itÔÇÖs used with the class path.


    To make automatic modules work in Jlink, we should add module-info.class files
    to each of the existing JAR files. For this, we could use the JDeps tool with
    the option `--generate-module-info`.


    Note


    YouÔÇÖll find the source code for this example in the directory /ch07/jlink.


    So far, weÔÇÖve seen how to create a runtime image and looked at the structure of
    it. The Jlink tool has a couple of useful plugins you can use. The next section
    talks about three of them.


    ## Jlink Plugins


    The Jlink tool is plugin-based. Open JDK states that ÔÇťJlink gathers the classes,
    native libraries, and configuration files into a set of resources. These resources
    are fed through a pipeline of transformers, which are defined by plugins.ÔÇŁ


    Jlink contains a couple of important plugins that can be extended by developers.
    We can develop our own Jlink plugins for optimizing the runtime images, for example.
    Table [7-2](#A431534_1_En_7_Chapter.html#Tab2) lists the existing JLink plugins,
    according to the official JDK 9 API specification.


    Table 7-2.


    The Jlink Plugins


    | Plugin | Description |

    | --- | --- |

    | `--class-for-name` | Optimizes classes by converting `Class.forName()` calls
    to constant loads. |

    | `--compress` `=<0 &#124; 1 &#124; 2> [: filter=pattern-list]` | Enables the
    compression of resources. |

    | `--strip-debug` | Strips the debug information from the output image. |

    | `--strip-native-commands` | Excludes native commands from the image. |

    | `--vm={client &#124; server &#124; minimal &#124; all}` | Selects the HotSpot
    VM in the output image. Default is `all`. |

    | `--generate-jli-classes=@filename` | Takes a file hinting to Jlink what java.lang.invoke
    classes to pre-generate. If you donÔÇÖt specify this flag, Jlink generates a default
    set of classes. |

    | `--include-locales` `=langtag[,langtag]*` | Includes the list of locales. |

    | `--dedup-legal-notices` `=[error_if_not_same_content]` | De-duplicates all legal
    notices. |

    | `--exclude-files` `=[pattern_list]` | Specifies the files to exclude. |

    | `--exclude-jmod-section` | Specifies a JMOD section to exclude. |

    | `--exclude-resources` | Specifies the resources to exclude. |

    | `--order-resources` | Specifies a file listing the `java.lang.invoke` classes
    to pre-generate. |

    | `--release-info` `=<file> &#124; add:<key1>=<value1> &#124; del:<key list>`
    | Loads release properties from the supplied file. `add` is used to add properties
    to the release file. `del` is used to delete the list of keys in the release file.
    |

    | `--system-modules` | Represents a fast loading of module descriptors. ItÔÇÖs always
    enabled. |


    The next subsections cover three Jlink plugins: the compress, release-info, and
    exclude-files plugins.'
