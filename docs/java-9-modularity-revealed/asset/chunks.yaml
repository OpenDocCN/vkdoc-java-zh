- fmt: '### Patching a Module


    The following example shows how to patch a class inside a module. That means we
    replace a Java class file inside a module with another one. For doing this, weÔÇÖll
    use the `javac` command-line option `-Xmodule` and the `java` command-line option
    `--patch-module`. WeÔÇÖll patch an existing module using the `--patch-module` option,
    and youÔÇÖll see two ways of doing that. Therefore, we create four folders:


    - The `modules` folder

    - The `modulesLibrary` folder

    - The `patchModules` folder

    - The `patchModulesLibrary` folder


    We have a module `com.apress.moduleA` that contains a POJO class called `Employee.java`
    and another class called `EmployeeImpl.java`, which creates an object of type
    `Employee` and sets some properties on it. ThereÔÇÖs also a module `com.apress.moduleB`
    that contains the `public static void main(String[] args)` method. This module
    simply creates an object of type `EmployeeImpl` and then calls some methods on
    this object. Further, we define another Java class called `EmployeeImpl.java`,
    having the same package name as the package name of the former `EmployeeImpl.java`
    class. This new class isnÔÇÖt part of a module. Our intention is to replace the
    new class with the older one inside the `com.apress.moduleA` module using the
    command-line options `-Xmodule` and `--patch-module` described earlier.


    Listing [11-1](#A431534_1_En_11_Chapter.html#Par37) shows the classes `Employee.java`
    and `EmployeeImpl.java` of the `com.apress.moduleA` module. The class `Employee.java`
    is inside the package `com.apress.moduleA.entity`.


    ```

    // Employee.java

    package com.apress.moduleA.entity;

    public class Employee {

    private String firstName;

    private String lastName;

    private String department;

    public Employee() {

    }

    public String getFirstName() {

    return firstName;

    }

    public void setFirstName(String firstName) {

    this.firstName = firstName;

    }

    public String getLastName() {

    return lastName;

    }

    public void setLastName(String lastName) {

    this.lastName = lastName;

    }

    public String getDepartment() {

    return department;

    }

    public void setDepartment(String department) {

    this.department = department;

    }

    }

    // EmployeeImpl.java

    package com.apress.moduleA;

    import com.apress.moduleA.entity.Employee;

    public class EmployeeImpl {

    public Employee employee;

    public EmployeeImpl() {

    }

    public Employee createNewEmployee() {

    employee = new Employee();

    return employee;

    }

    public Employee setEmployeeInfo() {

    employee = createNewEmployee();

    employee.setFirstName("John");

    employee.setLastName("Anderson");

    employee.setDepartment("IT");

    return employee;

    }

    public void getEmployeeInfo() {

    System.out.println("Employee first name is: " + employee.getFirstName());

    System.out.println("Employee last name is: " + employee.getLastName());

    System.out.println("Employee department is: " + employee.getDepartment());

    }

    }

    Listing 11-1.

    The Classes Employee.java and EmployeeImpl.java from the com.apress.moduleA Module

    ```


    Listing [11-2](#A431534_1_En_11_Chapter.html#Par39) shows the module descriptor
    of module `com.apress.moduleA`, which exports the package.


    ```

    module com.apress.moduleA {

    exports com.apress.moduleA;

    }

    Listing 11-2.

    The module-info.java File of Module com.apress.moduleA

    ```


    Module `com.apress.moduleB` imports types from module `com.apress.moduleA` and
