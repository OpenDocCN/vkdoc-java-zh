- fmt: '### Tools.jar and dt.jar Removed


    Before JDK 9, the `tools.jar` file was used by the JDK and was located in the
    `lib` directory of the JDK version 8 or lower. It contained classes used by `javac`
    and also support for tools like `javah`, `javap`, `jdeps`, `javadoc`, and more.
    The `dt.jar` file was also located inside the `lib` directory and contained `Swing`
    classes.


    **Note:** Both `tools.jar` and `dt.jar` have been removed in Java 9.


    In Java 9, resources and class files that were formerly located inside the `tools.jar`
    file are visible via the bootstrap or application class loaders in a JDK image.
    Similarly, resource and class files that were formerly located inside the `dt.jar`
    file are visible via the bootstrap class loader in Java 9.


    ### New URI Scheme


    A new URI scheme was introduced in JDK 9. To demonstrate the new URI scheme, weÔÇÖll
    first show a simple example. In this example, we use the `getSystemResource()`
    method of the `ClassLoader` class to find a URL resource of the class `String`
    from the search path used to load classes. The resource will be located through
    the system class loader.


    In Listing [5-1](#A431534_1_En_5_Chapter.html#Par46) the `getSystemResource()`
    method retrieves the URL resource of the class `java.lang.String`.


    ```

    // Main.java (module com.apress.getSystemResource)

    package com.apress.getSystemResource;

    import java.net.URL;

    public class Main {

    public static void main(String[] args) {

    URL url = ClassLoader.getSystemResource(ÔÇťjava/lang/String.classÔÇŁ);

    System.out.println(url);

    }

    }

    Listing 5-1.

    The Main Class of Module com.apress.getSystemResource

    ```


    Listing [5-2](#A431534_1_En_5_Chapter.html#Par48) defines the module descriptor
    of the module `com.apress.getSystemResource`.


    ```

    module com.apress.getSystemResource {

    }

    Listing 5-2.

    The module-info.java File of Module com.apress.getSystemResource

    ```


    We run the previous module and see the resulting URL printed in the console:


    ```

    jrt:/java.base/java/lang/String.class

    ```


    LetÔÇÖs now run the same example on Java 8. The resulting URL in this case would
    be as follows:


    ```

    jar:file:/C:/Program%20Files/Java/jdk1.8.0_101/jre/lib/rt.jar!/java/lang/String.class

    ```


    **Note:** You can find the source code for this example in the directory `/ch05/getSystemResource`.


    We observe that the output is completely different between Java 8 and Java 9.
    In Java 8, the URL has the form of a JAR file and the `String.class` is located
    inside the `rt.jar` file. ItÔÇÖs not possible to have the same output in Java 9
    because Java 9 doesnÔÇÖt have an `rt.jar` file.


    To solve this problem, Java 9 introduces a new URL scheme called `jrt` that provides
    access to the content of the runtime image. The term `jrt` is derived from java
    runtime. According to Open JDK, the `jrt` URL scheme ÔÇťis used for naming the modules,
    classes, and resources stored in a runtime image without revealing the internal
    structure or format of the image.ÔÇŁ


    **Note:** A `jrt` URL can have a total of four distinct forms.


    Figure [5-2](#A431534_1_En_5_Chapter.html#Fig2) shows the simplest structure of
    the `jrt` URL.


    ![A431534_1_En_5_Fig2_HTML.gif](Images/A431534_1_En_5_Fig2_HTML.gif)


    Figure 5-2. Simplest structure of the `jrt` URL


    This `jrt` URL, which doesnÔÇÖt specify anything else except the `jrt:/`, specifies
    all the files that exist in the current runtime image. But we can have more representations
    of the `jrt` URL. Figure [5-3](#A431534_1_En_5_Chapter.html#Fig3) shows another
    form of the `jrt` URL that specifies only the module name.


    ![A431534_1_En_5_Fig3_HTML.gif](Images/A431534_1_En_5_Fig3_HTML.gif)


    Figure 5-3. Structure of the `jrt` URL with module


    In this case, the `jrt` URL specifies all the files from the module that was specified.


    Figure [5-4](#A431534_1_En_5_Chapter.html#Fig4) represents another form of the
    `jrt` URL that contains only the path, but no module name.


    ![A431534_1_En_5_Fig4_HTML.gif](Images/A431534_1_En_5_Fig4_HTML.gif)


    Figure 5-4. Structure of the `jrt` URL with path


    In this case, the path represents a resource file or a class from the current
    runtime image. The path is not bound to a specific module.


    Figure [5-5](#A431534_1_En_5_Chapter.html#Fig5) shows the full structure of the
    `jrt` URL, specifying both a module and a path.


    ![A431534_1_En_5_Fig5_HTML.gif](Images/A431534_1_En_5_Fig5_HTML.gif)


    Figure 5-5. Full structure of the `jrt` URL


    The full structure of the `jrt` URL refers to a specific resource file within
    the given module. The `jrt` scheme also allows retrieving the contents of platform
    modules.


    Now that weÔÇÖve learned about the new URI scheme, letÔÇÖs move on and talk about
    the compatibility problems that can arise due to all these modifications.


    ### Compatibility


    As mentioned, important compatibility problems can eventually occur in Java 9
    for some existing applications due to the new structure of the JDK. Compatibility
    issues will appear in Java 9 for applications that strictly depend on the internal
    structure of the JDK. Because the JDK doesnÔÇÖt contain the `jre` subdirectory anymore,
    every piece of code that makes use of this subdirectory will stop working as expected.


    Moreover, in Java 9 the system properties `java.endorsed.dirs` and `java.ext.dirs`
    have been removed. This means applications that rely on these two system properties
    wonÔÇÖt work correctly in Java 9.


    The removal of `rt.jar`, `tools.jar`, and `dt.jar` files also has a negative impact
    on applications that rely on them.


    Another compatibility problem will arise in Java 9 for source code that expects
    JAR URLs for naming class and resource files inside the runtime image. As mentioned,
    the jar URLs have been replaced with `jrt` URLs.


    Another topic that needs some attention is related to class loaders. Table [5-1](#A431534_1_En_5_Chapter.html#Tab1)
    shows the class loaders that were changed in Java 9, together with the new class
    loaders and the corresponding packages. Chapter [10](../Text/A431534_1_En_10_Chapter.html)
    covers the class loaders in more detail.


    Table 5-1. The Class Loaders Changes


    | Package | Old Class Loader | New Class Loader |

    | --- | --- | --- |

    | `sun.tracing.dtrace` | boot | application |

    | `sun.tools.jar` | boot | application |

    | `sun.security.tools.policytool` | boot | application |

    | `com.sun.tracing` | boot | application |

    | `com.sun.tools.script` | application | boot |

    | `com.sun.tools.corba.se.idl` | application | boot |

    | `com.sun.jndi.url.dns` | boot | extension |

    | `com.sun.jndi.dns` | boot | extension |

    | `com.sun.crypto` | extension | boot |


    As a result, source code that depends on the class loaders of the packages listed
    here may not work properly in Java 9.


    ## Summary


    This chapter covered the new modular runtime images introduced in Java 9 and the
    reasons behind the decision to introduce them. It compared the runtime image we
    had before Java 9 with the one in Java 9.


    We explained in detail what every folder of the new runtime image contains and
    showed the content of the release file. We talked about the removal of the `rt.jar`,
    `tools.jar`, and `dt.jar` files and emphasized the consequences for existing applications.
    We continued by presenting the new URI scheme, which consists of a `jrt` URL instead
    of a `jar` URL.


    The chapter concluded by summarizing the compatibility problems that may occur
    due to the changes implemented in JEP 220. For more information on the topics
    discussed in this chapter, consult the documentation of JEP 220 at [`http://openjdk.java.net/jeps/220`](http://openjdk.java.net/jeps/220).


    Chapter [6](../Text/A431534_1_En_6_Chapter.html) shows how to decouple modules
    using services.'
  raw: '#### Tools.jar and dt.jar Removed


    Before JDK 9, the tools.jar file was used by the JDK and was located in the lib
    directory of the JDK version 8 or lower. It contained classes used by javac and
    also support for tools like javah, javap, jdeps, javadoc, and more. The dt.jar
    file was also located inside the lib directory and contained `Swing` classes.


    Note


    Both tools.jar and dt.jar have been removed in Java 9.


    In Java 9, resources and class files that were formerly located inside the tools.jar
    file are visible via the bootstrap or application class loaders in a JDK image.
    Similarly, resource and class files that were formerly located inside the dt.jar
    file are visible via the bootstrap class loader in Java 9.


    ### New URI Scheme


    A new URI scheme was introduced in JDK 9\. To demonstrate the new URI scheme,
    weÔÇÖll first show a simple example. In this example, we use the `getSystemResource()`
    method of the `ClassLoader` class to find a URL resource of the class `String`
    from the search path used to load classes. The resource will be located through
    the system class loader.


    In Listing [5-1](#A431534_1_En_5_Chapter.html#Par46) the `getSystemResource()`
    method retrieves the URL resource of the class `java.lang.String`.


    ```

    // Main.java (module com.apress.getSystemResource)

    package com.apress.getSystemResource;

    import java.net.URL;

    public class Main {

    public static void main(String[] args) {

    URL url = ClassLoader.getSystemResource(ÔÇťjava/lang/String.classÔÇŁ);

    System.out.println(url);

    }

    }

    Listing 5-1.

    The Main Class of Module com.apress.getSystemResource

    ```


    Listing [5-2](#A431534_1_En_5_Chapter.html#Par48) defines the module descriptor
    of the module com.apress.getSystemResource.


    ```

    module com.apress.getSystemResource {

    }

    Listing 5-2.

    The module-info.java File of Module com.apress.getSystemResource

    ```


    We run the previous module and see the resulting URL printed in the console:


    ```

    jrt:/java.base/java/lang/String.class

    ```


    LetÔÇÖs now run the same example on Java 8\. The resulting URL in this case would
    be as follows:


    ```

    jar:file:/C:/Program%20Files/Java/jdk1.8.0_101/jre/lib/rt.jar!/java/lang/String.class

    ```


    Note


    You can find the source code for this example in the directory /ch05/getSystemResource.


    We observe that the output is completely different between Java 8 and Java 9\.
    In Java 8, the URL has the form of a JAR file and the `String.class` is located
    inside the rt.jar file. ItÔÇÖs not possible to have the same output in Java 9 because
    Java 9 doesnÔÇÖt have an rt.jar file.


    To solve this problem, Java 9 introduces a new URL scheme called jrt that provides
    access to the content of the runtime image. The term jrt is derived from java
    runtime. According to Open JDK, the jrt URL scheme ÔÇťis used for naming the modules,
    classes, and resources stored in a runtime image without revealing the internal
    structure or format of the image.ÔÇŁ


    Note


    A jrt URL can have a total of four distinct forms.


    Figure [5-2](#A431534_1_En_5_Chapter.html#Fig2) shows the simplest structure of
    the jrt URL.


    ![A431534_1_En_5_Fig2_HTML.gif](Images/A431534_1_En_5_Fig2_HTML.gif)


    Figure 5-2.


    Simplest structure of the jrt URL


    This jrt URL, which doesnÔÇÖt specify anything else except the jrt:/, specifies
    all the files that exist in the current runtime image. But we can have more representations
    of the jrt URL. Figure [5-3](#A431534_1_En_5_Chapter.html#Fig3) shows another
    form of the jrt URL that specifies only the module name.


    ![A431534_1_En_5_Fig3_HTML.gif](Images/A431534_1_En_5_Fig3_HTML.gif)


    Figure 5-3.


    Structure of the jrt URL with module


    In this case, the jrt URL specifies all the files from the module that was specified.


    Figure [5-4](#A431534_1_En_5_Chapter.html#Fig4) represents another form of the
    jrt URL that contains only the path, but no module name.


    ![A431534_1_En_5_Fig4_HTML.gif](Images/A431534_1_En_5_Fig4_HTML.gif)


    Figure 5-4.


    Structure of the jrt URL with path


    In this case, the path represents a resource file or a class from the current
    runtime image. The path is not bound to a specific module.


    Figure [5-5](#A431534_1_En_5_Chapter.html#Fig5) shows the full structure of the
    jrt URL, specifying both a module and a path.


    ![A431534_1_En_5_Fig5_HTML.gif](Images/A431534_1_En_5_Fig5_HTML.gif)


    Figure 5-5.


    Full structure of the jrt URL


    The full structure of the jrt URL refers to a specific resource file within the
    given module. The jrt scheme also allows retrieving the contents of platform modules.


    Now that weÔÇÖve learned about the new URI scheme, letÔÇÖs move on and talk about
    the compatibility problems that can arise due to all these modifications.


    ### Compatibility


    As mentioned, important compatibility problems can eventually occur in Java 9
    for some existing applications due to the new structure of the JDK. Compatibility
    issues will appear in Java 9 for applications that strictly depend on the internal
    structure of the JDK. Because the JDK doesnÔÇÖt contain the jre subdirectory anymore,
    every piece of code that makes use of this subdirectory will stop working as expected.


    Moreover, in Java 9 the system properties `java.endorsed.dirs` and `java.ext.dirs`
    have been removed. This means applications that rely on these two system properties
    wonÔÇÖt work correctly in Java 9.


    The removal of rt.jar, tools.jar, and dt.jar files also has a negative impact
    on applications that rely on them.


    Another compatibility problem will arise in Java 9 for source code that expects
    JAR URLs for naming class and resource files inside the runtime image. As mentioned,
    the jar URLs have been replaced with jrt URLs.


    Another topic that needs some attention is related to class loaders. Table [5-1](#A431534_1_En_5_Chapter.html#Tab1)
    shows the class loaders that were changed in Java 9, together with the new class
    loaders and the corresponding packages. Chapter [10](../Text/A431534_1_En_10_Chapter.html)
    covers the class loaders in more detail .


    Table 5-1.


    The Class Loaders Changes


    | Package | Old Class Loader | New Class Loader |

    | --- | --- | --- |

    | sun.tracing.dtrace | boot | application |

    | sun.tools.jar | boot | application |

    | sun.security.tools.policytool | boot | application |

    | com.sun.tracing | boot | application |

    | com.sun.tools.script | application | boot |

    | com.sun.tools.corba.se.idl | application | boot |

    | com.sun.jndi.url.dns | boot | extension |

    | com.sun.jndi.dns | boot | extension |

    | com.sun.crypto | extension | boot |


    As a result, source code that that depends on the class loaders of the packages
    listed here may not work properly in Java 9.


    ## Summary


    This chapter covered the new modular runtime images introduced in Java 9 and the
    reasons behind the decision to introduce them. It compared the runtime image we
    had before Java 9 with the one in Java 9.


    We explained in detail what every folder of the new runtime image contains and
    showed the content of the release file. We talked about the removal of the rt.jar,
    tools.jar, and dt.jar files and emphasized the consequences for existing applications.
    We continued by presenting the new URI scheme, which consists of a jrt URL instead
    of a jar URL.


    The chapter conculded by summarizing the compatibility problems that may occur
    due to the changes implemented in JEP 220\. For more information on the topics
    discussed in this chapter, consult the documentation of JEP 220 at [`http://openjdk.java.net/jeps/220`](http://openjdk.java.net/jeps/220)
    .


