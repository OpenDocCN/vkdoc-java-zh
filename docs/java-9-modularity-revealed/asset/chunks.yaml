- fmt: '### Read the Description of a Module


    To get the entire description of a module, we can use the `--describe-module`
    command-line option of the Java launcher, followed by the module name:


    ```

    $ java --describe-module

    ```


    By running the `--describe-module` option on module `java.naming`, we get the
    following output:


    ```

    java.naming@9

    exports javax.naming

    exports javax.naming.directory

    exports javax.naming.event

    exports javax.naming.ldap

    exports javax.naming.spi

    requires java.base mandated

    requires java.security.sasl

    uses javax.naming.spi.InitialContextFactory

    uses javax.naming.ldap.StartTlsResponse

    provides java.security.Provider with sun.security.provider.certpath.ldap.JdkLDAP

    qualified exports com.sun.jndi.toolkit.ctx to jdk.naming.dns

    qualified exports com.sun.jndi.toolkit.url to jdk.naming.dns jdk.naming.rmi

    contains com.sun.jndi.ldap

    contains com.sun.jndi.ldap.ext

    contains com.sun.jndi.ldap.pool

    contains com.sun.jndi.ldap.sasl

    contains com.sun.jndi.toolkit.dir

    contains com.sun.jndi.url.ldap

    contains com.sun.jndi.url.ldaps

    contains com.sun.naming.internal

    contains sun.security.provider.certpath.ldap

    ```


    The preceding code displays the entire information contained in the `module-info.java`
    file of the `java.naming` module. It additionally contains the `contains` clauses,
    which arenÔÇÖt displayed in the `module-info.java` file:


    - The `exports` statements denote that module `java.naming` makes the packages
    `javax.naming`, `javax.naming.directory`, `javax.naming.event`, `javax.naming.ldap`,
    and `javax.naming.spi` available to any other module that depends on it (on module
    `java.naming`).

    - The `requires` statements from the preceding code denote that module `java.naming`
    depends on module `java.base` and also on module `java.security.sasl`, meaning
    that the exported types in those two modules are used inside the `java.naming`
    module. For instance, the class `LDAPCertStore` from the `java.naming` module
    imports all the `java.security` subpackages that are part of module `java.security.sasl`.

    - The `uses` statement takes as an argument a type name that represents a service
    type. In our case, module `java.naming` consumes instances of `InitialContextFactory`
    and `StartTlsResponse`.

    - The `provides` statement specifies that the module provides the implementation
    of `java.security.Provider` (from module `java.base`) with `sun.security.provider.certpath.ldap.JdkLDAP`.

    - The statement `qualified exports com.sun.jndi.toolkit.url to jdk.naming.rmi`
    means that package `com.sun.jndi.toolkit.url` from the `java.naming` module should
    be accessible only in the module `jdk.naming.rmi`. If we take a look in the `jdk.naming.rmi`
    module, we find there a class called `rmiUrlContext` that imports the class `com.sun.jndi.toolkit.url.GenericURLContext`
    from module `java.naming`. This is why module `java.naming` needs to specify that
    it exports the package to module `jdk.naming.rmi`.

    - The `contains` clauses list all the packages from the module that arenÔÇÖt part
    of the standard API.


    Chapter [4](../Text/A431534_1_En_4_Chapter.html) explains in detail what the `exports`,
    `requires`, `uses`, and `provides` clauses mean and how they can be used.


    ### Module `java.base`


    With more than 5,600 classes and a size of more than 43 MB, `java.base` is one
    of the largest modules of the Java Platform Module System. Every module depends
    on `java.base` by default, as the `java.base` module is located at the bottom
    of the module graph, representing the core of the system.


    The module `java.base` contains the core APIs and encapsulates the Java runtime.
    ItÔÇÖs not mandatory for a module to explicitly declare that it depends on module
    `java.base` because it depends on it automatically. Writing `requires java.base`
    is allowed, but itÔÇÖs not necessary because the compiler inserts it anyway by default.


    The module `java.base` contains the following packages:


    - `java.io`

    - `java.lang.*`

    - `java.math`

    - `java.net.*`

    - `java.nio.*`

    - `java.security.*`

    - `java.text.*`

    - `java.time.*`

    - `java.util.*`

    - `javax.crypto.*`

    - `javax.net.*`

    - `javax.security.*`


    Note


    I used `*` to indicate the package and all its corresponding sub-packages.


    The module `java.base` represents the root of the module system because it contains
    classes like `java.lang.Object`, `java.lang.Class`, `java.lang.String`, `java.lang.System`,
    and reflection classes like `java.lang.reflect.Constructor` and `java.lang.reflect.Method`.


    All the Java platform packages are exported by the `java.base` module, meaning
    theyÔÇÖre accessible to any other modules:


    ```

    // module-info.java (module java.base)

    module java.base {

    exports java.io;

    exports java.lang;

    exports java.lang.module;

    ...

    ...

    exports java.text;

    exports java.time;

    exports java.util;

    exports javax.net;

    }

    ```


    The module `java.base`, called the base module of the system, depends upon no
    other module. We say that it has no dependencies upon other modules, meaning that
    its `module-info.java` file contains no `requires` clauses. Module `java.base`
    also contains the new `java.lang.module` package introduced in JDK 9, which is
    part of the new module API. Chapter [9](../Text/A431534_1_En_9_Chapter.html) covers
    the `java.lang.module` package. ItÔÇÖs also important to remember that `java.base`
    is not an aggregator module.


    There will be situations when `java.base` will be the only module you need in
    order to compile and run a simple Java application. If all the types you need
    are in packages contained in the `java.base` module, then `java.base` is all you
    need. Due to the fact that `java.base` has no dependencies on other modules, there
    arenÔÇÖt any other modules that have to be utilized together with `java.base`. This
    is a great advantage because before JDK 9 we had to take the entire JDK since
    even a simple class like `java.lang.Object` previously had to be used with a large
    number of classes. A module also contains a new file called `module-info.java`,
    which represents the module descriptor, which Chapter [4](../Text/A431534_1_En_4_Chapter.html)
    describes in detail.


    In addition, `java.base` contains lots of JDK internal packages like `jdk.internal.util`,
    `sun.io`, `sun.text`, `sun.util`, `com.sun.crypto.provider`, `com.sun.net.ssl`,
    and more.


    Note


    Use the Java launcher with the option `--describe-module java.base` to find out
    all the available information related to the `java.base` module descriptor.


    WeÔÇÖve seen how the JDK was modularized and what the module graph looks like. In
    the next section, youÔÇÖll learn about the modularization of the source code.


    ## Modular Source Code


    Whereas JEP 200ÔÇÖs role is to divide the JDK into a set of modules, JEP 201ÔÇÖs role
    is, according to Open JDK, ÔÇťto reorganize the source code in the JDK into modules,
    enhance the build system to compile modules, and enforce module boundaries at
    build time.ÔÇŁ The layout of the source code was entirely changed in JDK and replaced
    by modules. The whole source code of a module is now inside a single directory.
    Therefore, in JDK 9 we have a new scheme of the source code, and thatÔÇÖs the focus
    of this section.'
