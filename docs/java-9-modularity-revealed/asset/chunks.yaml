    \ langtools:2f01728210c1 nashorn:aa7404e062b9 sponsors:d751e23bea1e\"\n```\n\n\
    The next section discusses the `rt.jar`, `tools.jar`, and `dt.jar` files that\
    \ were removed in JDK 9.\n\n### Removed Files\n\n#### `rt.jar` Removed\n\nThe\
    \ `rt.jar` file comprised the entire compiled class files that formed the JRE.\
    \ These represented all the compiled classes from the Core Java API, including\
    \ the `sun` and `com` packages. `rt.jar` used to be located inside the `lib` folder\
    \ of the JRE. In Java 8, the `rt.jar` file weighed approximatively 52 MB. In all\
    \ Java versions prior to version 9, it was absolutely mandatory to include the\
    \ `rt.jar` file into the class path in order to be able to access the core Java\
    \ libraries. But the `rt.jar` file has been completely removed in Java 9. It doesnÔÇÖt\
    \ exist anymore among the files that make up the JDK 9.\n\nTools, compilers, and\
    \ integrated development environments (IDEs) using `rt.jar` are affected by the\
    \ removal of the `rt.jar` file. They have to be adjusted by their authors in order\
    \ to continue to work properly in Java 9.\n\nAccording to the specification of\
    \ JEP 220, ÔÇťthe class and resources files previously stored in `lib/rt.jar`, `lib/tools.jar`\
    \ and `lib/dt.jar`, and various other internal JAR files will now be stored in\
    \ a more efficient format in implementation specific files in the `lib` directory.ÔÇŁ\n\
    \nIn JDK 9, the `rt.jar` file was replaced by the new runtime."
  raw: '#### The JDK Image Prior to Java 9


    On the other hand, prior to Java 9, a JDK image enclosed a JRE. It had a copy
    of the JRE in its jre subdirectory. A JDK image contained many directories, but
    the most important three of them were the lib, the bin, and the include directories.


    Note


    A JDK image contained libraries and development tools.


    The lib directory consisted of JAR files comprising the implementations of the
    JDK''s tools. The tools.jar file, which included the classes that composed the
    javac compiler, was located into this lib directory. The bin directory had command-line
    debugging and development tools like javac, javadoc, and jconsole. The include
    directory contained C and C++ header files for use in compiling native code that
    interfaces directly with the runtime system.


    ### Why a New Format for the Runtime Images?


    According to Open JDK, there are various reasons why a new format is required
    for the runtime images. First of all, the new runtime format is more powerful
    than the old JAR format. Second, the new runtime format can be easily enhanced
    to hold precompiled native code for Java classes or precomputed JVM data structures.
    Third, the new runtime format can store class and resource files from application
    modules, JDK modules, and library modules.


    The most important reason behind the decision to revamp the JDK and the JRE is
    stated by OpenJDK on their website: ÔÇťto draw a clear distinction between files
    that developers, deployers, and end-users can rely upon and, when appropriate,
    modify, in contrast to files that are internal to the implementation and subject
    to change without notice.ÔÇŁ


    OpenJDK lists three more reasons:


    *   ÔÇťto provide supported ways to perform common operations that today can only
    be done by inspecting the internal structure of a runtime image such as, e.g.,
    enumerating all of the classes present in an imageÔÇŁ

    *   ÔÇťto enable the selective de-privileging of JDK classes that today are granted
    all security permissions but do not actually require those permissionsÔÇŁ

    *   ÔÇťto preserve the existing behavior of well-behaved applications, i.e., applications
    that do not depend upon internal aspects of JRE and JDK runtime imagesÔÇŁ


    ### The Runtime Image in Java 9


    This section describes the structure of the new runtime image introduced in Java
    9.


    #### Identical Structure of the JDK and JRE


    The JRE and the JDK have the same structure in Java 9\. This is different from
    older versions of Java where, as described earlier, there was a clear distinction
    between the JDK and the JRE. A JDK image is simply a runtime image that contains
    the development tools from the JDK.


    Configuration files that were once located in the lib directory are now located
    inside the conf directory. These are files we can edit. The files in the lib directory
    are implementation details of the runtime system.


    Note


    The files from the lib directory should not be modified.


    #### The Structure of the New Runtime Image


    Figure [5-1](#A431534_1_En_5_Chapter.html#Fig1) shows the new structure of the
    runtime image in Java 9.


    ![A431534_1_En_5_Fig1_HTML.jpg](Images/A431534_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    The structure of the runtime image in Java 9


    LetÔÇÖs see what kind of directories the new modular runtime image contains:


    *   The bin directory incorporates command-line launchers represented by the modules
    that are linked into the image. Some of the most important command-line launchers
    are java, javac, javadoc, javah, javap, jcmd, jconsole, jdeps, jimage, jlink,
    jmod, jshell, and jstat. We are not going to describe all of them here. You can
    check the bin directory of the JDK 9 build.

    *   The lib directory consists of the runtime systemÔÇÖs dynamically-linked native
    libraries.

    *   The conf directory contains files that can be edited. Among them are .properties
    files and .policy files.

    *   The jmods directory contains all the JMOD files.

    *   The legal directory contains the copyright files.


    The root directory of a modular runtime image contains copyright, readme, and
    release files.


    #### The release File


    The structure of the release file contains information about the modules, OS version,
    source, operating system arch, operating system name, Java version, and the full
    Java version:


    ```

