    \ including native code and configuration files. JMOD is a new format used for\
    \ packaging the modules. This new format isnÔÇÖt executable.\n\nA JMOD file is an\
    \ alternative to the modular JAR file covered in Chapter [4](../Text/A431534_1_En_4_Chapter.html).\
    \ ItÔÇÖs mostly used when a module also contains native code . JMOD files are used\
