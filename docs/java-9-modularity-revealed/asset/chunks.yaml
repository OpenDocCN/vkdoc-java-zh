- fmt: '# 3. Modular JDK and Source Code


    This chapter focuses on describing the JDK modularization process that resulted
    in a new structure of the JDK and its source code. According to Open JDK, the
    aim of Java Enhancement Proposal 200 ÔÇô The Modular JDK is to ÔÇťdivide the JDK into
    a set of modules that can be combined at compile time, build time, or runtime
    into a variety of configurations.ÔÇŁ These configurations can have any size. They
    can represent one or more modules together with their transitive dependencies,
    but they can also comprise the entire JDK.


    The JDK Module Summary consists of comprehensive information related to the modules
    that currently exist in the Java Platform. For each module it specifies the following:


    * The number of classes and resources it contains

    * The total size of the module together with the total size of its dependencies

    * The modules it requires

    * The types it exports

    * The services it uses and the services it provides


    **Note**


    The JDK Module Summary can be found online at [`http://cr.openjdk.java.net/Ôł╝mr/jigsaw/ea/module-summary.html`](http://cr.openjdk.java.net/%E2%88%BCmr/jigsaw/ea/module-summary.html).


    As of September 2017, Project Jigsaw introduced 73 new modules in the Java platform,
    with a total size of more than 170 MB. Taking the number of classes in each module,
    the biggest module is `java.desktop`, which contains 5,900 classes and 284 resources.
    Its size is more than 26 MB, and the total size of its dependencies is about 55
    MB. The second largest module is module `java.base`, which contains 5,684 classes
    and 17 resources. It has no dependencies because itÔÇÖs the base module.


    ## Modular JDK


    In Java 9, the JDK is modularized. In order to list all modules that exist in
    the runtime system, the Java launcher can be used with the command-line option
    `--list-modules`. By running the following command, we get a full list of the
    existing modules in our runtime:


    ```

    $ java --list-modules

    ```


