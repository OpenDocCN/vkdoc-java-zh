- fmt: '### Build Process Adjustments


    Not only the source code, but the build itself was organized around modules. There
    are a new proposed layout and new build targets. The output emitted during the
    build is different in Java 9 compared to previous versions. The build was changed
    so that it builds everything as modules. Besides that, the make files have been
    split into module specific files.


    Table [3-4](#A431534_1_En_3_Chapter.html#Tab4) shows the new structure of the
    build system in JDK 9 compared to the one that existed in JDK 8.


    **Table 3-4.** Comparison Between the Structure of the Build System in JDK 8 and
    JDK 9


    | Structure of the Build System in JDK 8 | Structure of the Build System in JDK
    9 |

    | --- | --- |

    | `jdk / classes / *.class` | `jdk / modules / <module_name> / *.class` |


    Table [3-5](#A431534_1_En_3_Chapter.html#Tab5) shows a list of target commands
    together with their descriptions that are used to build the JDK 9. These are described
    in the official JDK 9 API specification.


    **Table 3-5.** Target commands Used to Build the JDK 9


    | Target Command | Description |

    | --- | --- |

    | `make java` | Compiles all Java classes from the system |

    | `make java.sql` | Compiles Java code as well as native code in the `java.sql`
    module together with all its dependencies |

    | `make java.sql-java` | Compiles only the Java classes in the `java.sql` module
    together with all its dependencies |

    | `make [default]` | Compiles everything |

    | `make all` | Builds everything (JARs, docs, images, and so on), executes a verification
    tool on the Java classes which finds broken module boundaries |

    | `make images` | Same functionality as JDK 8 |

    | `make hotspot` | Same functionality as JDK 8 |

    | `make docs` | Builds the entire documentation |

    | `make docs-javadocs` | Builds only the javadoc |

    | `make gensrc` | Executes all the steps involving the generation of source code
    |


    The prospect of compiling only one module at a time is one of the most important
    changes to the build system. A module can be compiled together with its dependencies,
    and the compiled classes are divided into modules. During the build process, the
    modules that are independent can be compiled at the same time. If module boundaries
    are violated, the build process wonÔÇÖt succeed.


    The first module to be compiled is the `java.base` module because itÔÇÖs required
    by all other modules. The module graph is traversed in a reversed order (starting
    from bottom to top) during the compilation. This makes sense because by compiling
    the modules successively from `java.base` up to the top of the module graph, we
    avoid the situation of compiling a module that has a dependency on a module that
    has not been compiled.


    **Note**


    A great advantage of being able to compile modules lies in the fact that the source
    code in the JAX-WS, JAXP, and CORBA repositories can now use the new Java language
    APIs. In the Java versions prior to version 9, that wasnÔÇÖt possible because those
    repositories were compiled before the JDK repository.


    The JCP team performed significant modifications to the build system in order
    for modules to be built independently. For instance, a change performed in the
    `java.logging` module wonÔÇÖt determine a new build of the `java.base` module. This
    is a great achievement because it boosts productivity.


    ## Summary


    This chapter covered two of the most important JEPs of the Java Platform Module
    System: the Modular SDK and the Modular Source Code.


    First, we showed how to list all the modules of the Java runtime system using
    the `--list-modules` command-line option. We then gave a brief explanation of
    the standard modules that are part of the Java Platform Standard Edition 9 API
    Specification. We explained what the platform modules are and talked about the
    characteristics of the standard and non-standard modules that comprise the Java
    Platform Module System. We also showed the new JDK module graph that resulted
    after the JDK modularization. And we showed how to get the entire content of the
    module descriptor of module `java.naming` using the `--describe-module <module_name>`
    command-line option. The end of the first part discussed the module `java.base`,
    the most important module of the Java Platform Module System.


    The second part of the chapter focused on describing the changes performed at
    the source code level due to the implementation of JEP 201 (the Modular Source
    Code). We started by presenting the new scheme of the JDK 9 source code and then
    described how the source code was organized into directories and what each directory
    represents. We pointed out the differences between the source code layout in JDK
    8 and JDK 9. The chapter finished by talking about the way the build system was
    enhanced in order to meet the requirements of the newly introduced modules that
    are now first-class components of the Java platform.


    Chapter [4](../Text/A431534_1_En_4_Chapter.html) explains what a module is and
    shows how you can define and use your own modules.


    # 4. Defining and Using Modules


    In this chapter weÔÇÖll start to develop modular applications in Java 9 using some
    of the features offered by Project Jigsaw. WeÔÇÖll begin by explaining the new concept
    of a Jigsaw module together with its module declaration, the `module-info.java`
    file. YouÔÇÖll also learn about the five types of directives that can be used inside
    the module declaration: `requires`, `exports`, `uses`, `provides`, and `opens`.
    Then weÔÇÖll look at compiling and running modules using JDK 9, and for that weÔÇÖll
    introduce the new module path in detail.


    The accessibility changes introduced in Java 9 are also covered in this chapter.
    They have a great impact on the platform because they differ almost entirely from
    the old accessibility rules that were in place before in Java. In Java 9 we can
    have more types of modules: normal modules, automatic modules, named modules,
    observable modules, open modules, and unnamed modules. Each is briefly covered
    in this chapter.


    ## The Concept of Module


    As you know by now, Java 9 introduces a new sort of first-class components called
    modules. A Jigsaw module, also a fundamental part of the Java 9 Platform, represents
    a container of packages. It contains packages, resource files, and native code.
    The packages can contain Java classes, enumerations, and interfaces.


    Figure [4-1](#A431534_1_En_4_Chapter.html#Fig1) displays the general structure
    of a module.


    ![A431534_1_En_4_Fig1_HTML.gif](Images/A431534_1_En_4_Fig1_HTML.gif)


    **Figure 4-1.** General structure of a module


    A module consists of the source files together with the module declaration represented
    by the `module-info.java` file. HereÔÇÖs a typical directory structure of a module
    named `com.apress.moduleA`:


    ```

    src/

    com.apress.moduleA/

    module-info.java

    com/apress/moduleA/

    Main.java

    // other files

    ```


    A directory having the same name with the name of the module is located right
    at the top. Inside it is the `module-info.java` file as well as a structure of
    directories representing the format of the package. In our case, the package has
    the same name as the module name. The `.java` files are located inside the directories
    of the package.


    **Note**


    ItÔÇÖs also possible to define a module that has no source files and no packages
    except the module descriptor `module-info.java`.


    We mentioned the module declaration `module-info.java`. In the next subsection
    youÔÇÖll learn about it.'
