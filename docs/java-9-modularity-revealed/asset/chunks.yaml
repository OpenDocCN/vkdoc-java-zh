  raw: '### The ModuleDescriptor.Requires Class


    The `ModuleDescriptor.Requires` class, whose instance expresses a `requires` clause
    in a module descriptor, contains some attributes and methods, described next.


    It contains an enum called `Modifier` with the following values:


    *   `TRANSITIVE`: As stated in the official JDK 9 documentation, ÔÇťthis dependence
    causes any module which depends on current module to have an implicitly declared
    dependence on the module named by the `requires`.ÔÇŁ

    *   `STATIC`: This dependence is mandatory at compile-time but is optional at
    runtime.

    *   `SYNTHETIC`: This dependence wasnÔÇÖt declared in the module declaration.

    *   `MANDATED`: This dependence was declared in the module declaration.


    The methods defined by the `ModuleDescriptor.Requires` class are as follows:


    *   `Set<Modifier> modifiers()`: Returns a set of `Modifier` objects

    *   `String name()`: Returns the name of the module

    *   `Optional<Version> compiledVersion()`: Returns a `Version` object representing
    the version of the module

    *   `Optional<String> rawCompiledVersion()`: Returns a `String` representing the
    unparseable version of the module


    ### The ModuleDescriptor.Exports Class


    The `ModuleDescriptor.Exports` class can be instantiated to express an `exports`
    clause inside the module declaration. The class contains an enum called `Modifier`
    with the following values: `SYNTHETIC` and `MANDATED`.


    Here are the methods defined by this class:


    *   `Set<Modifier> modifiers()`: Returns a set of `Modifier` objects

    *   `boolean isQualified()`: Returns true if the export is qualified or false
    otherwise

    *   `String source()`: Returns a `String` representing the name of the package

    *   `Set<String> targets()`: Returns a set representing the names of the modules
    to which the package is exported. If the export is unqualified, it returns an
    empty set.


    ### The ModuleDescriptor.Opens Class


    The `ModuleDescriptor.Opens` class can be instantiated to express an `opens` clause
    inside the module declaration. The class contains an enum called `Modifier` with
    the following values: `Modifier.SYNTHETIC` and `Modifier.MANDATED`. In this case,
    `MANDATED` means that the `opens` statement was declared in the module declaration,
    and `SYNTHETIC` means that the `opens` statement was not declared in the module
    declaration.


    According to the JDK 9 API specification, the methods defined by this class are
    as follows:


    *   `Set<Modifier> modifiers()`: Returns a set of `Modifier` objects.

    *   `boolean isQualified()`: Returns true if it is a qualified `opens` operation
    and false otherwise. A qualified `opens` operation is characterized by the fact
    that the modules to which the package is opened are specified in the module declaration.
    An unqualified `opens` operation doesnÔÇÖt specify any modules in the module declaration,
    which means that the package is opened to all the modules.

    *   `String source()`: Returns the name of the package as `String`.

    *   `Set<String> targets()`: Returns a set of `String` that represents the names
    of the modules to which the package is open, but for an unqualified `opens` it
    returns an empty set.


    ### The ModuleDescriptor.Provides Class


    The `ModuleDescriptor.Provides` class is, in a manner of speaking, the correspondent
    of the `provides` statement from the module-info.java file. To recap, the `provides`
    statementÔÇÖs role is to define a service type. The syntax of the `provides` statement
    is like this: `provides <interface_name> with <class_name>`, where `<class_name>`
    represents the implementation class for the service type defined by the interface
    with the name `<interface_name>`.


    The `ModuleDescriptor.Provides` class defines the following variables: `String`
    service and `List<String>` providers. This means we can create one instance of
    the `ModuleDescriptor.Provides` class to define a single service and one or more
    providers.


    There are two methods defined by the `ModuleDescriptor.Provides` class:


    *   `String service()`: This method returns the fully qualified class name of
    the service type.

    *   `List<String> providers()`: This method returns a list of `String`s representing
    the fully qualified class names of the providers or provider factories.


    Further, we can define three `provides` statements inside our module descriptor:


    ```

    module com.apress.myModule {

    provides ServiceType1 with package1.Class1;

    provides ServiceType1 with package1.Class2;

    provides ServiceType1 with package2.Class3;

    }

    ```


    Because we have only a single instance of the service type, we have only one instance
    of the class `ModuleDescriptor.Provides`. We can get all the names of the providers
    classes by calling the method `providers()` and the name of the service type by
    calling the method `service()`.


    ### The ModuleDescriptor.Version Class


    The nested class `ModuleDescriptor.Version` represents the version of a module.
    The version of a module is used only for documentation, because the JPMS does
    not support versioning. The most used methods provided by the `ModuleDescriptor.Version`
    class are as follows:


    *   `Version parse(String)`: Parses the given `String` as a version `String`

    *   `int compareTo(Version version)`: Compares this module version to the given
    module version


    ## The ModuleFinder Interface


    According to the JDK 9 API specification, this interface ÔÇťrepresents a finder
    of modules and is used to find methods during resolution or service binding.ÔÇŁ
    Here are the methods contained in this interface:


    *   `Optional<ModuleReference> find(String moduleName)`: Finds and returns a `ModuleReference`
    object to a module whose name is passed as parameter

    *   `Set<ModuleReference> findAll()`: Returns a set containing all the `ModuleReference`
    objects that can be located in the system

    *   `static ModuleFinder ofSystem()`: Returns a `ModuleFinder` object that locates
    all the system modules from the Java runtime

    *   `static ModuleFinder of(PathÔÇŽ entries)`: Returns a `ModuleFinder` object that
    locates modules on the file system by searching a sequence of directories or packaged
    modules


    The role of the `ModuleFinder` interface is to find modules. A `ModuleFinder`
    finds only a single module. It canÔÇÖt find more than one module. If we search for
    modules inside directories, the `ModuleFinder` will retrieve only the first module
    found.


    For instance, if we have two directories and want to find a module named myModule,
    we could first get the `MethodFinder` by passing the sequence of directories as
    an argument to the method `of()` of the `ModuleFinder` interface:


    ```

    ModuleFinder moduleFinder = ModuleFinder.of(directoryA, directoryB);

    ```


    We can call the `find()` method on the the `ModuleFinder` object by passing the
    name of the module weÔÇÖre searching for:


    ```

    Optional moduleReference = moduleFinder.find("myModule");

    ```


    The `find()` method returns a `ModuleReference` object to the module with the
    name myModule.


    From a `ModuleReference` object, we can derive a `ModuleDescriptor` object:


    ```

    if(moduleReference.isPresent()) {

    ModuleDescriptor moduleDescriptor = moduleReference.get().descriptor();

    }

    ```


    The `findAll()` method returns a set of all the module references that can be
    located. Hence, we could then find all the modules located inside the two directories.'
