- fmt: "### The JDK Image Prior to Java 9\n\nOn the other hand, prior to Java 9, a\
    \ JDK image enclosed a JRE. It had a copy of the JRE in its `jre` subdirectory.\
    \ A JDK image contained many directories, but the most important three of them\
    \ were the `lib`, the `bin`, and the `include` directories.\n\n> **Note**  \n\
    > A JDK image contained libraries and development tools.\n\nThe `lib` directory\
    \ consisted of JAR files comprising the implementations of the JDK's tools. The\
    \ `tools.jar` file, which included the classes that composed the `javac` compiler,\
    \ was located into this `lib` directory. The `bin` directory had command-line\
    \ debugging and development tools like `javac`, `javadoc`, and `jconsole`. The\
    \ `include` directory contained C and C++ header files for use in compiling native\
    \ code that interfaces directly with the runtime system.\n\n### Why a New Format\
    \ for the Runtime Images?\n\nAccording to Open JDK, there are various reasons\
    \ why a new format is required for the runtime images. First of all, the new runtime\
    \ format is more powerful than the old JAR format. Second, the new runtime format\
    \ can be easily enhanced to hold precompiled native code for Java classes or precomputed\
    \ JVM data structures. Third, the new runtime format can store class and resource\
    \ files from application modules, JDK modules, and library modules.\n\nThe most\
    \ important reason behind the decision to revamp the JDK and the JRE is stated\
    \ by OpenJDK on their website: ÔÇťto draw a clear distinction between files that\
    \ developers, deployers, and end-users can rely upon and, when appropriate, modify,\
    \ in contrast to files that are internal to the implementation and subject to\
    \ change without notice.ÔÇŁ\n\nOpenJDK lists three more reasons:\n\n- ÔÇťto provide\
    \ supported ways to perform common operations that today can only be done by inspecting\
    \ the internal structure of a runtime image such as, e.g., enumerating all of\
    \ the classes present in an imageÔÇŁ\n- ÔÇťto enable the selective de-privileging\
    \ of JDK classes that today are granted all security permissions but do not actually\
    \ require those permissionsÔÇŁ\n- ÔÇťto preserve the existing behavior of well-behaved\
    \ applications, i.e., applications that do not depend upon internal aspects of\
    \ JRE and JDK runtime imagesÔÇŁ\n\n### The Runtime Image in Java 9\n\nThis section\
    \ describes the structure of the new runtime image introduced in Java 9.\n\n####\
    \ Identical Structure of the JDK and JRE\n\nThe JRE and the JDK have the same\
    \ structure in Java 9. This is different from older versions of Java where, as\
    \ described earlier, there was a clear distinction between the JDK and the JRE.\
    \ A JDK image is simply a runtime image that contains the development tools from\
    \ the JDK.\n\nConfiguration files that were once located in the `lib` directory\
    \ are now located inside the `conf` directory. These are files we can edit. The\
    \ files in the `lib` directory are implementation details of the runtime system.\n\
    \n> **Note**  \n> The files from the `lib` directory should not be modified.\n\
    \n#### The Structure of the New Runtime Image\n\nFigure [5-1](#A431534_1_En_5_Chapter.html#Fig1)\
    \ shows the new structure of the runtime image in Java 9.\n\n![A431534_1_En_5_Fig1_HTML.jpg](Images/A431534_1_En_5_Fig1_HTML.jpg)\n\
    \n**Figure 5-1.** The structure of the runtime image in Java 9\n\nLetÔÇÖs see what\
    \ kind of directories the new modular runtime image contains:\n\n- The `bin` directory\
    \ incorporates command-line launchers represented by the modules that are linked\
    \ into the image. Some of the most important command-line launchers are `java`,\
    \ `javac`, `javadoc`, `javah`, `javap`, `jcmd`, `jconsole`, `jdeps`, `jimage`,\
    \ `jlink`, `jmod`, `jshell`, and `jstat`. We are not going to describe all of\
    \ them here. You can check the `bin` directory of the JDK 9 build.\n- The `lib`\
    \ directory consists of the runtime systemÔÇÖs dynamically-linked native libraries.\n\
    - The `conf` directory contains files that can be edited. Among them are `.properties`\
    \ files and `.policy` files.\n- The `jmods` directory contains all the JMOD files.\n\
    - The `legal` directory contains the copyright files.\n\nThe root directory of\
    \ a modular runtime image contains copyright, readme, and release files.\n\n####\
    \ The `release` File\n\nThe structure of the `release` file contains information\
    \ about the modules, OS version, source, operating system arch, operating system\
    \ name, Java version, and the full Java version:\n\n```\nIMPLEMENTOR=\"Oracle\
    \ Corporation\"\nJAVA_VERSION=\"9\"\nMODULES=\"java.base java.datatransfer java.logging\
    \ java.activation java.compiler java.rmi java.transaction java.xml java.prefs\
    \ java.desktop java.security.sasl java.naming jdk.unsupported java.corba java.instrument\
    \ java.jnlp java.management java.management.rmi java.scripting java.xml.ws.annotation\
