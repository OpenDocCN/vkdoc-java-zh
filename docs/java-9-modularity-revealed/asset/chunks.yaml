- fmt: '# What Is Project Jigsaw?


    `Project Jigsaw` represents the implementation of the new scalable module system
    introduced in Java 9. It was developed under `Open JDK`, which is the free, open
    source implementation of the Java Platform Standard Edition. The goal of the newly
    designed module system for the Java SE Platform is to modularize the JDK and apply
    the module system to the JDK itself. `Jigsaw` modularizes the Java SE platform.


    The process of modularizing the Java platform was a complicated and tremendous
    effort. A great number of difficult design decisions had to be made. The modularization
    of the platform is an enormous change with a major impact on the entire ecosystem.
    It introduces the new concept of modules and significantly changes the way we
    develop software applications using the Java programming language. Modules are
    placed in the foreground and are the key concept upon which `Project Jigsaw` is
    based. Entire programming techniques have to be adjusted to match the newly introduced
    concept.


    `Project Jigsaw` started back in 2008 in an exploratory phase. The JEPs that constitute
    the Java Platform Module System were created starting with year 2014. `Project
    Jigsaw` was initially planned for the Java 7 release, but due to its complexity
    it was not included in the JDK 7 release and was postponed for the JDK 8 release.
    Then the Java Community Process deferred it for Java 9. Although the official
    release of `Project Jigsaw` is at the time of this writing planned for September
    2017, early access builds have been available for a long time on the `Open JDK`
    website so that the community can test and provide valuable feedback to the JDK
    developers.


    `Project Jigsaw` consists of six JEPs and a JSR. `JSR 376` is called the Java
    Platform Module System. It designates a standard specification for building a
    modular version of the Java platform. Table [2-1](#A431534_1_En_2_Chapter.html#Tab1)
    lists the other six JEPs that are part of `Project Jigsaw`.


    **Table 2-1.** JDK Enhancement Proposals (JEP) for the Development of the Java
    Platform System


    | JEP Number | JEP Name | Scope |

    | --- | --- | --- |

    | JEP 200 | Modular JDK | Standard Edition |

    | JEP 201 | Modular Source Code | Implementation |

    | JEP 220 | Modular Run-Time Images | Standard Edition |

    | JEP 260 | Encapsulate Most Internal APIs | Java Development Kit |

    | JEP 261 | Module System | Standard Edition |

    | JEP 282 | jLink: The Java Linker | Java Development Kit |


    Following are short descriptions of each of the JEPs. TheyÔÇÖre covered in greater
    depth in the chapters that follow:


    *   **JEP 200ÔÇöthe Modular JDK**: This Java Enhancement Proposal divided the JDK
    into a set of modules. The JDK was modularized, and the source code was organized
    into modules. There are two different categories of modules: standard modules,
    with names that start with `java.`, and JDK modules, that start with `jdk.` A
    new module graph emerged as the modular format of the JDK changed (shown in Chapter
    [3](../Text/A431534_1_En_3_Chapter.html)). More information about the JDK modularization
    can also be found in Chapter [3](../Text/A431534_1_En_3_Chapter.html).

    *   **JEP 201ÔÇöModular Source Code**: This JEP defines how the JDK build and the
    source code were reorganized around modules (covered in detail in Chapter [3](../Text/A431534_1_En_3_Chapter.html)).

    *   **JEP 220ÔÇöModular Run-Time Images**: `JEP 220` presents the new modular runtime
    image and the enhancements added so that we can build custom modular runtime images.
    The binary structure of the JRE and JDK was changed. The JEP is discussed in Chapter
    [5](../Text/A431534_1_En_5_Chapter.html).

    *   **JEP 260ÔÇöEncapsulate Most Internal APIs**: `JEP 260` refers to the process
    of encapsulating the non-critical internal APIs. This JEP is covered in many chapters
    throughout this book.

    *   **JEP 261ÔÇöModule System**: `JEP 261` represents the implementation of the
    new module system.

    *   **JEP 282ÔÇöjLink: The Java Linker**: This JEP creates a tool that assembles
    a set of modules into a custom runtime image (covered in Chapter [7](../Text/A431534_1_En_7_Chapter.html)).


    ## Downloading and Installing


    As of September 2017, an early-access version of `Project Jigsaw` can be downloaded
    from the following URL address: [`http://jdk.java.net/9/`](http://jdk.java.net/9/).
    `Project Jigsaw` is contained into JDK 9. It cannot be used separately.


    JDK 9 is available for download for the following platforms:


    *   Windows 32-bit

    *   Windows 64-bit

    *   Linux 32-bit

    *   Linux 64-bit

    *   Solaris SPARC 64-bit

    *   Solaris x86 64-bit

    *   Mac OS


    `Project Jigsaw` was merged into JDK 9, so if you download JDK 9, you will have
    `Jigsaw` included by default.


    The installation is straightforward. You have to set the environment variables
    on your PC to point to the new JDK. For this, choose the root folder where your
    Java 9 installation resides. If you use Windows and JDK 9 is in the `PATH`, you
    can verify that the environment variables have been successfully set by opening
    a command line and typing `java -version`.


    ## Documentation


    There is plenty of documentation available for `Project Jigsaw` on the official
    `Open JDK` website at [`http://openjdk.java.net/projects/jigsaw`](http://openjdk.java.net/projects/jigsaw).
    YouÔÇÖll find descriptions for each of the JEPs that constitute the Java Platform
    Module System. The specification document can be found at [`http://openjdk.java.net/projects/jigsaw/spec/reqs/`](http://openjdk.java.net/projects/jigsaw/spec/reqs/).


    To get more deep insight into `Project Jigsaw`, you can access the `Jigsaw Development`
    mailing list, which contains comprehensive information about the internals of
    `Jigsaw`, at [`http://mail.openjdk.java.net/pipermail/jigsaw-dev/`](http://mail.openjdk.java.net/pipermail/jigsaw-dev/).
    Other mailing lists that might interest you are the `Expert Group` mailing list
    at [`http://mail.openjdk.java.net/pipermail/jpms-spec-experts/`](http://mail.openjdk.java.net/pipermail/jpms-spec-experts/)
    and the `Adoption Discuss` mailing list at [`http://mail.openjdk.java.net/pipermail/adoption-discuss/`](http://mail.openjdk.java.net/pipermail/adoption-discuss/).


    The API Specification for the Java 9 Standard Edition can be found at [`http://download.java.net/java/jdk9/docs/api/overview-summary.html`](http://download.java.net/java/jdk9/docs/api/overview-summary.html).'
