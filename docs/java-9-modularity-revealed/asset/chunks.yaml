- fmt: "### Running a Junit Test Where the Junit Test Class DoesnÔÇÖt Reside Inside\
    \ a Module\n\nSo far, so good. In the previous example, our Junit test was in\
    \ a module, and the test object was in another module. We managed to connect them\
    \ and make them work. But what happens when the Junit test isnÔÇÖt part of a module\
    \ and instead resides on the class path? Things get a little more complicated\
    \ in this case, which corresponds to scenario 2 from the beginning of the chapter.\n\
    \nIn the next example, we have our `EmployeeTest` class, but this isnÔÇÖt part of\
    \ a module anymore. We also change the package name of the `EmployeeTest` class.\
    \ Its new name is `com.apress.moduleA`. We do this because during patching, the\
    \ package name has to be the same as the one from module `com.apress.moduleA`.\n\
    \nIn this example, we donÔÇÖt have a module `com.apress.moduleB` anymore, so we\
    \ delete the `module-info.java` file from it. Listing [11-9](#A431534_1_En_11_Chapter.html#Par98)\
    \ shows the module descriptor of module `com.apress.moduleA`.\n\n```\nmodule com.apress.moduleA\
    \ {\n    exports com.apress.moduleA.entity;\n    exports com.apress.moduleA;\n\
    }\n```\n\n*Listing 11-9. The `module-info.java` File of Module `com.apress.moduleA`*\n\
    \nWe start by compiling the module `com.apress.moduleA`, and afterwards we create\
    \ a modular JAR out of it:\n\n```\njavac -d modules --module-path \"automaticModules;modulesLibrary\"\
    \ --module-source-path src $(find src -name \"*.java\" | grep -v com.apress.moduleB)\n\
    cd modules\njar --create --file=../modulesLibrary/com.apress.moduleA.jar -C com.apress.moduleA\
    \ .\n```\n\nNext, we compile the `EmployeeTest.java` file:\n\n```\ncd ..\njavac\
    \ -d patchModules/com.apress.moduleA -Xmodule:com.apress.moduleA --add-reads com.apress.moduleA=junit\
    \ --add-modules junit --module-path \"modulesLibrary;automaticModules\" src/com.apress.moduleB/com/apress/moduleA/EmployeeTest.java\n\
    ```\n\nDuring compilation, we used the option `-Xmodule:com.apress.moduleA` in\
    \ order to compile the Java class `EmployeeTest` as if it were part of module\
    \ `com.apress.moduleA`. The command-line option `--add-reads com.apress.moduleA=junit`\
    \ is mandatory because module `com.apress.moduleA` uses Junit, so as a result\
    \ a read dependency to Junit is required by the module `com.apress.moduleA`. The\
    \ option `--add-modules junit` is also mandatory. WeÔÇÖre making use of Junit and\
    \ therefore we add the automatic module `junit`, which is automatically created\
    \ after placing the `junit.jar` on the module path.\n\nAfter compiling the statement\
    \ just mentioned, the `patchModules` folder will contain the `EmployeeTest.class`\
    \ file. Further, we create a JAR containing this class file:\n\n```\ncd patchModules\n\
    jar --create --file=../patchModulesLibrary/com.apress.moduleA.jar -C com.apress.moduleA\
    \ .\n```\n\nWe run the Junit test by patching the module `com.apress.moduleA`:\n\
    \n```\ncd ..\njava --patch-module com.apress.moduleA=patchModules/com.apress.moduleA\
    \ --module-path \"automaticModules;modulesLibrary\" --add-reads com.apress.moduleA=junit\
    \ --add-modules ALL-MODULE-PATH -m junit/org.junit.runner.JUnitCore com.apress.moduleA.EmployeeTest\n\
    ```\n\nHere we patched the module using the `EmployeeTest.class` file located\
    \ in the `patchModules` folder. We also added the reads dependency on Junit and\
    \ added all the modules from the module path using the constant `ALL-MODULE-PATH`,\
    \ which of course include the automatic modules. In this way, we were able to\
    \ successfully run a Junit test located outside of a module that uses test objects\
    \ from a module.\n\nWe could also use the JAR file `com.apress.moduleA.jar` for\
    \ patching the module `com.apress.moduleA` (instead of the class files as in the\
    \ previous example). This `java` command gives the same result as the previous\
    \ example:\n\n```\n$ java --patch-module com.apress.moduleA=patchModulesLibrary/com.apress.moduleA.jar\
    \ --module-path \"automaticModules;modulesLibrary\" --add-reads com.apress.moduleA=junit\
    \ --add-modules ALL-MODULE-PATH -m junit/org.junit.runner.JUnitCore com.apress.moduleA.EmployeeTest\n\
    ```\n\n**Note:** You can find the source code for this example in the directory\
    \ `/ch11/junitTestNotInModule`.\n\n## Testing with Maven\n\nMaven and other build\
    \ automation tools make our lives much easier because we donÔÇÖt have to write so\
    \ many command-line flags. We donÔÇÖt have to write `-Xmodule` and `--patch-module`\
    \ when running tests using Maven because Maven does this for us in the background.\n\
    \n**Note:** The Maven Compiler plugin starting from version 3.6.0 has Jigsaw support.\n\
    \nItÔÇÖs much easier to compile our application and run our tests with Maven than\
    \ it is by writing our entire commands with flags on the command-line. The Jigsaw\
    \ support built into Maven helps us reduce the amount of work considerably.\n\n\
    We take our last example (from scenario 2), which has the Junit test class outside\
    \ the module. We have to modify the structure of our project a little in order\
    \ to make it work with Maven. Therefore, the module `com.apress.moduleA` has to\
    \ be located under the `src/main/java` directory. Also, the `EmployeeTest.java`\
    \ will be located under the `src/test` directory.\n\nA `pom.xml` file is the essential\
    \ unit of work in Maven. It contains information about the project and the configuration\
    \ stuff used to build the project. Listing [11-10](#A431534_1_En_11_Chapter.html#Par117)\
    \ shows the `pom.xml` file that we add in the root of our project.\n\n```\n<project>\n\
    \    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.apress.junit</groupId>\n\
    \    <artifactId>junit-testing</artifactId>\n    <version>0.0.1</version>\n\n\
    \    <dependencies>\n        <dependency>\n            <groupId>junit</groupId>\n\
    \            <artifactId>junit</artifactId>\n            <version>4.12</version>\n\
    \            <scope>test</scope>\n        </dependency>\n    </dependencies>\n\
    \n    <build>\n        <plugins>\n            <plugin>\n                <groupId>org.apache.maven.plugins</groupId>\n\
    \                <artifactId>maven-compiler-plugin</artifactId>\n            \
    \    <version>3.6.1</version>\n                <configuration>\n             \
    \       <source>9</source>\n                    <target>9</target>\n         \
    \       </configuration>\n            </plugin>\n            <plugin>\n      \
    \          <groupId>org.apache.maven.plugins</groupId>\n                <artifactId>maven-dependency-plugin</artifactId>\n\
    \                <executions>\n                    <execution>\n             \
    \           <id>copy-dependencies</id>\n                        <phase>package</phase>\n\
    \                        <goals>\n                            <goal>copy-dependencies</goal>\n\
    \                        </goals>\n                        <configuration>\n \
    \                           <outputDirectory>${project.build.directory}/lib</outputDirectory>\n\
    \                        </configuration>\n                    </execution>\n\
    \                </executions>\n            </plugin>\n        </plugins>\n  \
    \  </build>\n</project>\n```\n\n*Listing 11-10. The `pom.xml` file*\n\nUsing the\
    \ `<maven.compiler.source>` and `<maven.compiler.target>` tags, we set the source\
    \ and target to 9 because we want to use JDK 9 for compiling our project. We use\
    \ the Maven Compiler plugin version 3.6.1 which has Jigsaw support. We also use\
    \ the Maven Dependency plugin to copy the dependencies inside the `target/lib`\
    \ directory. We can now run `mvn clean package` to build the project. By building\
    \ the project, our tests are also executed. We get a `BUILD SUCCESS` message,\
    \ so the tests were successful.\n\nIn the newly created `target` directory, we\
    \ have a `classes` folder that contains our class files (including the `module-info.class`\
    \ file) that were compiled using the Maven Compiler plugin. Inside the `lib` folder\
    \ we can find the test dependencies `hamcrest-core-1.3.jar` and `junit-4.12.jar`.\n\
    \nUsing Maven, we didnÔÇÖt have to use the `-Xmodule` flag or the `--add-modules`\
    \ flag because everything was done in the background by the Maven Compiler plugin.\n\
    \n**Note:** You can find the source code for this example in the directory `/ch11/junitTestNotInModuleMaven`.\n\
    \n## Summary\n\nThis chapter discussed the most important aspects of unit testing\
    \ modular applications in Java 9. We learned about the `-Xmodule` Java compiler\
    \ command-line option used to compile classes for a module. We also learned about\
    \ the `--patch-module` command-line option used to override classes inside a module.\
    \ Using these handy flags, we showed how to test an application where the types\
    \ under test reside inside a module, but the Junit test classes donÔÇÖt. We also\
    \ looked at an example where the types under test and the Junit test classes reside\
    \ in different modules. At the end of the chapter, we demonstrated how to use\
    \ Maven with its Maven Compiler plugin to compile and run unit tests in JDK 9.\n\
    \nChapter [12](../Text/A431534_1_En_12_Chapter.html) covers the integration of\
    \ Jigsaw with integrated development environments (IDEs) like Intellij IDEA and\
