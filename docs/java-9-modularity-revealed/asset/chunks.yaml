    com.apress.moduleA

    ```


    WeÔÇÖve learned what the qualified exports directives are and how theyÔÇÖre different
    from standard exports directives. ItÔÇÖs a great advantage to be able to specify
    only the specific modules that are allowed to access the moduleÔÇÖs data. Modules
    shouldnÔÇÖt be obligated to expose their packages to all the existing modules.


    Qualified exports are a great benefit of strong encapsulation. TheyÔÇÖve been extensively
    used during the process of modularizing the JDK and are present in a couple of
    module-info.java files inside the JDK.


    We talked about accessibility and discussed the concepts of readability, implied
    readability, and qualified exports. Next letÔÇÖs look at the different types of
    modules introduced in Jigsaw.


    ## Types of Modules


    Jigsaw defines two primary types of modules: named modules and the unnamed module.
    The named modules are divided into normal modules and automatic modules. The normal
    modules are also separated in basic modules and open modules. Figure [4-15](#A431534_1_En_4_Chapter.html#Fig15)
    illustrates the classification of modules.


    ![A431534_1_En_4_Fig15_HTML.gif](Images/A431534_1_En_4_Fig15_HTML.gif)


    Figure 4-15.


    The classification of modules in the JPMS


    First, weÔÇÖll talk about the named modules together with its children, and then
    the unnamed module.


    ### Named Modules


    The named modules comprise all the modules from the module system except the unnamed
    module. There are two important things that distinguish an unnamed module from
    a named one. First, the unnamed module lives on the class path, whereas the named
    modules live on the module path. Second, the unnamed module doesnÔÇÖt have a name,
    whereas each named module has a name. A named module can be a normal module or
    an automatic module. Named modules are modules declared using a name in the module-info.java
    module descriptor file. Every module that has a declaration of form `module <module_name>`
    in its module-info.java is a named module. This is the single condition that has
    to be met for a module in order to be classified as a named module. Examples of
    named modules include all the platform modules, but our own modules can also be
    included in this category if they respect the unique condition just mentioned.
    Transforming a JAR file into a named module is possible by merely adding a module-info.class
    file to it.


    ### Normal Modules


    The notion of ÔÇťnormalÔÇŁ modules doesnÔÇÖt officially exist. We use this term to define
    a named module that isnÔÇÖt automatic. The main difference between a normal module
    and an automatic one is that a normal module has a module descriptor module-info.java,
    whereas an automatic module doesnÔÇÖt. Additionally, a normal module is explicitly
    declared by developers, which declares the moduleÔÇÖs dependencies in the moduleÔÇÖs
    module descriptor. The module descriptor of an automatic module isnÔÇÖt provided
    by developers. A normal module is declared using the keyword `module` followed
    by the name of the module. All the modules weÔÇÖve presented until now in this chapter
    were normal modules. A normal module doesnÔÇÖt export any of its packages by default.
    Besides that, its `exports` clauses must be explicitly specified. The `exports`
    clauses export packages at compile-time as well as at runtime. A normal module
    comprises both basic modules and open modules.


    ### Automatic Modules


    An automatic module is a module created after placing a JAR file onto the module
    path. Comparing an automatic module to a normal one, two important distinctions
    emerge:


    *   An automatic module requires by default all the existing modules from the
    system, which comprise all our own modules, plus all modules from the JDK image,
    plus all the other automatic modules.

    *   An automatic module exports all its packages by default.


    An automatic module can access types on the class path and is useful for third-party
    code especially. Automatic modules are used for migrating existing applications
    to Java 9\. Chapter [8](../Text/A431534_1_En_8_Chapter.html) talks about them
    in more detail.


    Note


    An automatic module isnÔÇÖt explicit declared by us inside a module descriptor.
    ItÔÇÖs automatically created when placing a JAR file into the module path.


    ### Basic Modules


    We call every named module that isnÔÇÖt an open module a basic module. However,
    the term ÔÇťbasicÔÇŁ module doesnÔÇÖt officially exist in JDK 9\. We use it to define
    a named module thatÔÇÖs neither automatic nor open. A basic module has the same
    set of characteristics as a normal module, except that itÔÇÖs not opened for deep
    reflection.'
