- fmt: "### Providing Readability Between Modules\n\nThe `--add-reads` command-line\
    \ option is used at both compile-time and runtime to add readability from a module\
    \ to another module. Its syntax is as follows:\n\n```\n--add-reads <source_module>=<list_of_target_modules>\n\
    ```\n\nBy using the `--add-reads` command-line option, the `<source_module>` gets\
    \ readability to all the modules represented by the `<list_of_target_modules>`,\
    \ which means that the `<source_module>` will require all those modules. This\
    \ is equivalent to providing a `requires` clause in a module descriptor:\n\n```\n\
    module <source_module> {\n    requires target_module_A;\n    requires target_module_B;\n\
    }\n```\n\nWe can make a module `<source_module>` read the entire class path by\
    \ providing the constant `ALL-UNNAMED` to the `--add-reads` option:\n\n```\n--add-reads\
    \ <source_module>=ALL-UNNAMED\n```\n\nThis option is used merely during testingÔÇöfor\
    \ instance, when a module is patched at compile-time and at runtime in order to\
    \ add tests in the same modules as the module under test. During testing, we might\
    \ need a module to read another module, although the first module doesnÔÇÖt depend\
    \ on the other module because it doesnÔÇÖt define a `requires` directive to the\
    \ other module. By using the `--add-reads` option, we get readability between\
    \ the two modules. The first module will be able access all the exported types\
    \ from the other module.\n\nSuppose we have a Junit test class inside our module\
    \ `com.apress.testing`. This class extends a class from the Junit library. So\
    \ we need a readability relation from our module `com.apress.testing` to the automatic\
    \ module `junit`. This can be achieved very simply using the `--add-reads` option:\n\
    \n```\n--add-reads com.apress.testing=junit\n```\n\nIf we have the Junit library\
    \ on the class path and donÔÇÖt want to move to the module path, then we use the\
    \ `ALL-UNNAMED` constant to provide readability between our module and the entire\
    \ code on the class path:\n\n```\n--add-reads com.apress.testing=ALL-UNNAMED\n\
    ```\n\nChapter [11](../Text/A431534_1_En_11_Chapter.html) provides an explanatory\
    \ example of using the `--add-reads` command-line option for running JUnit tests.\n\
    \n**Note**\n\nThe `--add-reads` command allows duplicates and if it encounters\
    \ bad values, a warning is raised, but no fatal error is thrown. If duplicates\
    \ are found, only the first class will be taken into consideration.\n\nBefore\
    \ we discuss the `--add-modules` command-line option, thereÔÇÖs one more thing worth\
    \ mentioning: when we use reflection on a member in a module, readability is automatically\
    \ granted.\n\n### Adding Modules to the Root Set\n\nThe `--add-modules` command-line\
    \ option is used to add modules directly to the set of root modules. Hence, the\
    \ modules will be resolved. This option is used to resolve modules that arenÔÇÖt\
    \ resolved by default.\n\nIts syntax is simple. It takes one or more modules separated\
    \ by comma:\n\n```\n--add-modules (<module_name>,)*<module_name>\n```\n\n`<module_name>`\
    \ represents the name of a module that will be added to the default set of root\
    \ modules.\n\nThere are three values that can be used with the `--add-modules`\
    \ option instead of specifying a list of modules:\n\n- `ALL-DEFAULT`: The official\
    \ specification released for JDK 9 states that by using the `ALL-DEFAULT` option\
    \ ÔÇťthe default set of root modules for the unnamed module, as defined above, is\
    \ added to the root set. This is useful when the application is a container that\
    \ hosts other applications which can, in turn, depend upon modules not required\
    \ by the container itself.ÔÇŁ\n- `ALL-SYSTEM`: This option adds all the system modules\
    \ to the root set.\n- `ALL-MODULE-PATH`: This option adds all the observable modules\
    \ found on the module path to the root set. ItÔÇÖs helpful to be able to add each\
    \ module from the module path at once to the root set. For a large list of automatic\
    \ modules, itÔÇÖs more practical and easier to add all of them at once and without\
    \ the need to enumerate them one by one. Maven uses this option considerably because\
    \ it needs all the modules from the module path.\n\nThe `--add-modules` option\
    \ is also used by Jlink to set the root module inside the runtime image. We saw\
    \ in Chapter [7](../Text/A431534_1_En_7_Chapter.html) how to create a runtime\
    \ image and how to add modules to the runtime image using the `--add-modules`\
    \ command-line option.\n\n**Note**\n\nBoth `javac` and `java` support the `--add-modules`\
    \ command-line option.\n\nThe `--add-modules` option can be repeated. The following\
    \ usages of `--add-modules` options have the same effect and cause no errors:\n\
    \n```\n--add-modules com.apress.moduleA --add-modules com.apress.moduleB\n--add-modules\
    \ com.apress.moduleA,com.apress.moduleB\n```\n\nNext weÔÇÖll look at an explanatory\
    \ example to better understand when we should use the `--add-modules` option.\
    \ We download the `junit-4-12.jar` and the `hamcrest-core-1.3.jar` and put them\
    \ into a folder. We run `jdeps -s` on the entire folder to find all the dependencies\
    \ of the two JAR files:\n\n```\n$ jdeps -s *.jar\nhamcrest-core-1.3.jar -> java.base\n\
    junit-4.12.jar -> hamcrest-core-1.3.jar\njunit-4.12.jar -> java.base\njunit-4.12.jar\
    \ -> java.management\n```\n\nHamcrest-Core depends only on `java.base`, meaning\
    \ it uses types only from `java.base`. Hence, Junit is depending on Hamcrest-Core\
    \ because it uses types from it. If we look inside the content of Junit, we can\
    \ see lots of imports from Hamcrest-Core packages.\n\nSuppose we have a module\
    \ `com.apress.myModule` and we put the `junit-4.1.2.jar` and the `hamcrest-core-1.3.jar`\
    \ files on the module path in order to use them as automatic modules. You already\
    \ learned at the beginning of this chapter, in the ÔÇťAutomatic ModulesÔÇŁ section,\
    \ that an automatic module canÔÇÖt declare dependencies on other modules. So we\
    \ canÔÇÖt use the directive `requires hamcrest-core` because we donÔÇÖt have a module\
    \ descriptor available where to place it, because an automatic module doesnÔÇÖt\
    \ have a module descriptor `module-info.java`. The situation is depicted in Figure\
    \ [8-2](#A431534_1_En_8_Chapter.html#Fig2).\n\n![A431534_1_En_8_Fig2_HTML.gif](Images/A431534_1_En_8_Fig2_HTML.gif)\n\
    \n**Figure 8-2.** Relation between named modules and automatic modules that have\
    \ dependencies\n\nModule `com.apress.myModule` contains in its module descriptor\
    \ a `requires junit` clause. The automatic module `junit` uses types from the\
    \ automatic module `hamcrest.core`. The module graph contains the modules `com.apress.myModule`\
    \ and `junit`. The module `hamcrest.core` isnÔÇÖt added to the module graph because\
    \ it canÔÇÖt be identified during the resolution process. ThereÔÇÖs no `requires`\
    \ clause inside the `junit` automatic module so that the module system could discover\
    \ the `hamcrest.core` automatic module and add it to the module graph. This means\
    \ we have to manually add the `hamcrest.core` automatic module to the module graph\
    \ using the `--add-modules` option at both compile-time and runtime:\n\n```\n\
    --add-modules hamcrest.core\n```\n\nIf we donÔÇÖt add the `hamcrest.core` module\
    \ to the module graph, the classes from the `hamcrest.core` wonÔÇÖt be found and\
    \ an exception of type `ClassNotFoundException` will be thrown at runtime.\n\n\
    Another option provided by default in JDK is the `--illegal-access` one, covered\
    \ in the next section."
  raw: '### Providing Readability Between Modules


    The `--add-reads` command-line option is used at both compile-time and runtime
    to add readability from a module to another module. Its syntax is as follows:


    ```

    --add-reads =

    ```


    By using the `--add-reads` command-line option, the `<source_module>` gets readability
    to all the modules represented by the `<list_of_target_modules>`, which means
    that the `<source_module>` will require all those modules. This is equivalent
    to providing a `requires` clause in a module descriptor:


    ```

    module  {

    requires target_module_A;

    requires target_module_B;

    }

    ```


    We can make a module `<source_module>` read the entire class path by providing
    the constant `ALL-UNNAMED` to the `--add-reads` option:


    ```

    --add-reads =ALL-UNNAMED

    ```


    This option is used merely during testingÔÇöfor instance, when a module is patched
    at compile-time and at runtime in order to add tests in the same modules as the
    module under test. During testing, we might need a module to read another module,
    although the first module doesnÔÇÖt depend on the other module because it doesnÔÇÖt
    define a `requires` directive to the other module. By using the `--add-reads`
    option, we get readability between the two modules. The first module will be able
    access all the exported types from the other module.


    Suppose we have a Junit test class inside our module com.apress.testing. This
    class extends a class from the Junit library. So we need a readability relation
    from our module com.apress.testing to the automatic module junit. This can be
    achieved very simply using the `--add-reads` option:


    ```

    --add-reads com.apress.testing=junit

    ```


    If we have the Junit library on the class path and donÔÇÖt want to move to the module
    path, then we use the `ALL-UNNAMED` constant to provide readability between our
    module and the entire code on the class path:


    ```

    --add-reads com.apress.testing=ALL-UNNAMED

    ```


    Chapter [11](../Text/A431534_1_En_11_Chapter.html) provides an explanatory example
    of using the `--add-reads` command-line option for running JUnit tests.


    Note


    The `--add-reads` command allows duplicates and if it encounters bad values, a
    warning is raised, but no fatal error is thrown. If duplicates are found, only
    the first class will be taken into consideration.


    Before we discuss the `--add-modules` command-line option, thereÔÇÖs one more thing
    worth mentioning: when we use reflection on a member in a module, readability
    is automatically granted.


    ### Adding Modules to the Root Set


    The `--add-modules` command-line option is used to add modules directly to the
    set of root modules. Hence, the modules will be resolved. This option is used
    to resolve modules that arenÔÇÖt resolved by default.


    Its syntax is simple. It takes one or more modules separated by comma:


    ```

    --add-modules (,<module_name)*

    ```


    `<module_name>` represents the name of a module that will be added to the default
    set of root modules


    There are three values that can be used with the `--add-modules` option instead
    of specifying a list of modules:


    *   `ALL-DEFAULT`: The official specification released for JDK 9 states that by
    using the `ALL-DEFAULT` option ÔÇťthe default set of root modules for the unnamed
    module, as defined above, is added to the root set. This is useful when the application
    is a container that hosts other applications which can, in turn, depend upon modules
    not required by the container itself.ÔÇŁ

    *   `ALL-SYSTEM`: This option adds all the system modules to the root set.

    *   `ALL-MODULE-PATH`: This option adds all the observable modules found on the
    module path to the root set. ItÔÇÖs helpful to be able to add each module from the
    module path at once to the root set. For a large list of automatic modules, itÔÇÖs
    more practical and easier to add all of them at once and without the need to enumerate
    them one by one. Maven uses this option considerably because it needs all the
    modules from the module path.


    The `--add-modules` option is also used by Jlink to set the root module inside
    the runtime image. We saw in Chapter [7](../Text/A431534_1_En_7_Chapter.html)
    how to create a runtime image and how to add modules to the runtime image using
    the `--add-modules` command-line option.


    Note


    Both `javac` and `java` support the `--add-modules` command-line option.


    The `--add-modules` option can be repeated. The following usages of `--add-modules`
    options have the same effect and cause no errors:


    ```

    --add-modules com.apress.moduleA --add-modules com.apress.moduleB

    --add-modules com.apress.moduleA,com.apress.moduleB

    ```


    Next weÔÇÖll look at an explanatory example to better understand when we should
    use the `--add-modules` option. We download the junit-4-12.jar and the hamcrest-core-1.3.jar
    and put them into a folder. We run `jdeps -s` on the entire folder to find all
    the dependencies of the two JAR files:


    ```

    $ jdeps -s *.jar

    hamcrest-core-1.3.jar -> java.base

    junit-4.12.jar -> hamcrest-core-1.3.jar

    junit-4.12.jar -> java.base

    junit-4.12.jar -> java.management

    ```


    Hamcrest-Core depends only on java.base, meaning it use types only from java.base.
    Hence, Junit is depending on Hamcrest-Core because it uses types from it. If we
    look inside the content of Junit, we can see lots of imports from Hamcrest-Core
    packages.


    Suppose we have a module com.apress.myModule and we put the junit-4.1.2.jar and
    the hamcrest-core-1.3.jar files on the module path in order to use them as automatic
    modules. You already learned at the beginning of this chapter, in the ÔÇťAutomatic
    ModulesÔÇŁ section, that an automatic module canÔÇÖt declare dependencies on other
    modules. So we canÔÇÖt use the directive `requires hamcrest-core` because we donÔÇÖt
    have a module descriptor available where to place it, because an automatic module
    doesnÔÇÖt have a module descriptor module-info.java. The situation is depicted in
    Figure [8-2](#A431534_1_En_8_Chapter.html#Fig2).


    ![A431534_1_En_8_Fig2_HTML.gif](Images/A431534_1_En_8_Fig2_HTML.gif)


    Figure 8-2.


    Relation between named modules and automatic modules that have dependencies


    Module com.apress.myModule contains in its module descriptor a `requires junit`
    clause. The automatic module junit uses types from the automatic module hamcrest.core.
    The module graph contains the modules com.apress.myModule and junit. The module
    hamcrest.core isnÔÇÖt added to the module graph because it canÔÇÖt be identified during
    the resolution process. ThereÔÇÖs no `requires` clause inside the junit automatic
    module so that the module system could discover the hamcrest.core automatic module
    and add it to the module graph. This means we have to manually add the hamcrest.core
    automatic module to the module graph using the `--add-modules` option at both
    compile-time and runtime :


    ```

    --add-modules hamcrest.core

    ```


    If we donÔÇÖt add the hamcrest.core module to the module graph, the classes from
    the hamcrest.core wonÔÇÖt be found and an exception of type `ClassNotFoundException`
    will be thrown at runtime.


    Another option provided by default in JDK is the `--illegal-access` one, covered
    in the next section.'
