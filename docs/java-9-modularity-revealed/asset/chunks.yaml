- fmt: "### Generate Module Descriptors with JDeps\n\nJDeps can be used to generate\
    \ a module descriptor for one or more JAR files using the command-line option\
    \ `--generate-module-info`:\n\n```\njdeps --generate-module-info <output_directory>\
    \ <list_of_jar_files>\n```\n\nThis command gets two parameters:\n\n- `<output_directory>`\
    \ represents the directory where the `module-info.java` files will be created.\n\
    - `<list_of_jar_files>` represents one or more JAR files for which a `module-info`\
    \ will be generated. The list is separated by a blank space. For each JAR, each\
    \ dependency must be listed here.\n\nThis command creates a module descriptor\
    \ `module-info.java` for each JAR file that we pass. To demonstrate this, next\
    \ we generate a `module-info.java` file for the `junit-4.12.jar` file. We also\
    \ have to pass the `hamcrest-core-1.3.jar` file because this JAR is a dependency\
    \ of JUnit:\n\n```\njdeps --generate-module-info output hamcrest-core-1.3.jar\
    \ junit-4.12.jar\n```\n\nAs a result, two `module-info` files are created inside\
    \ the `output` directory, one for JUnit and one for Hamcrest Core:\n\n```\noutput\\\
    junit\\module-info.java\noutput\\hamcrest.core\\module-info.java\n```\n\nListing\
    \ [8-3](#A431534_1_En_8_Chapter.html#Par101) shows an excerpt of the `module-info.java`\
    \ files created.\n\n```\nmodule junit {\n    requires transitive hamcrest.core;\n\
    \    requires java.management;\n    exports junit.extensions;\n    exports junit.framework;\n\
    \    exports junit.runner;\n    exports junit.textui;\n    exports org.junit;\n\
    \    exports org.junit.experimental;\n    ...\n    exports org.junit.runners;\n\
    \    exports org.junit.runners.model;\n    exports org.junit.runners.parameterized;\n\
    \    exports org.junit.validator;\n}\nmodule hamcrest.core {\n    exports org.hamcrest;\n\
    \    exports org.hamcrest.core;\n    exports org.hamcrest.internal;\n}\nListing\
    \ 8-3.\nModule Descriptors for JUnit and Hamcrest Core That Were Generated by\
    \ JDeps\n```\n\n**Note:** The module descriptor generated by JDeps exports by\
    \ default all the existing packages of its corresponding JAR.\n\nJDeps can also\
    \ generate a `module-info.java` file for an open module. The command is `generate-open-module`\
    \ and it takes the same type of parameters:\n\n```\njdeps --generate-open-module\
    \ <output_directory> <list_of_jar_files>\n```\n\nThe only difference is that this\
    \ command creates a module descriptor that defines an open module instead of a\
    \ simple module. As a result, no packages are exported. This is suitable for frameworks\
    \ that access the JDK using reflection.\n\nJDeps also provides other useful features.\
    \ Table [8-2](#A431534_1_En_8_Chapter.html#Tab2) shows a list of the most useful\
    \ options offered by JDeps, as defined in the JDK 9 API specification.\n\n**Table\
    \ 8-2.** JDeps Options\n\n| JDeps Option | Description |\n| --- | --- |\n| `--check\
    \ <module_name>[,<module_name>...]` | Prints the module descriptor and the resulting\
    \ module dependences after analyzing the dependence of the specified modules |\n\
    | `--list-deps` | Lists the dependences of JDK internal APIs |\n| `--class-path\
    \ <path>` | Specifies the path where to find class files |\n| `--module-path <module_path>`\
    \ | Specifies the module path |\n| `--upgrade-module-path <module_path>` | Specifies\
    \ the upgrade module path |\n| `--module <name_module>` | Specifies the root module\
    \ that will get analyzed |\n| `--multi-release <version>` | Specifies the version\
    \ for processing multi-release JAR files |\n| `-filter:module` | Filters dependences\
    \ within the same module |\n| `--regex <regex>` | Finds dependences matching the\
    \ given pattern |\n\nWeÔÇÖve looked at automatic modules and JDeps. ItÔÇÖs time to\
    \ focus on the Java 9 encapsulation topic. WeÔÇÖll learn how to break the encapsulation\
    \ in Java 9, how to open packages and modules, and how to use the `--add-opens`,\
    \ `--add-reads`, and `--add-modules` command-line options.\n\n## Encapsulation\
    \ in Java 9\n\nJava has two categories of APIs in the JDK: supported APIs and\
    \ unsupported APIs. The supported APIs comprise JCP standard APIs like `java.*`\
    \ and `javax.*`, JDK-specific APIs like `com.sun.*` and `jdk.*`. These APIs are\
    \ intended to be used outside the JDK.\n\nThe unsupported APIs comprise the `sun.*`\
    \ packages. These APIs were never intended for external use outside the JDK. Typically\
    \ all the packages that contain the name `\"internal\"` are JDK internal APIs.\
    \ The problem is that in the past many developers used the `sun.*` packages, even\
    \ if they were told they werenÔÇÖt allowed to use these packages outside the JDK.\n\
    \nJava 9 encapsulated almost all the JDK internal APIs, which means that by default,\
    \ without any hacks, these APIs arenÔÇÖt accessible either at compile-time nor at\
    \ runtime.\n\n**Note:** Oracle made a study that revealed the most-used JDK internal\
    \ classes: `sun.misc.BASE64Encoder`, `sun.misc.BASE64Decoder`, and `sun.misc.Unsafe`.\n\
    \nThe JCP team put the JDK-internal APIs into two categories: non-critical JDK-internal\
    \ APIs and critical JDK-internal APIs.\n\nThe non-critical JDK-internal APIs category\
    \ comprises the APIs that are used outside the JDK to an extremely low degree.\
    \ Therefore, the risk of breaking applications by encapsulating these APIs is\
    \ also low. This category of APIs also contains the `sun.misc.BASE64Encoder` and\
    \ `sun.misc.BASE64Decoder` classes.\n\nThe critical JDK-internal APIs category\
    \ comprises the APIs whose functionality would be extremely difficult to implement\
    \ outside the JDK. ItÔÇÖs demanding, if not almost impossible, to develop replacements\
    \ for these APIs outside the JDK. This category contains, for instance, the `sun.misc.Unsafe`\
    \ class, which was marked as critical because itÔÇÖs very demanding to build a similar\
    \ class outside the JDK.\n\nTherefore, the JCP team decided to do the following:\n\
    \n- Encapsulate all non-critical internal APIs\n- Encapsulate all critical internal\
    \ APIs for which supported replacements exist in JDK 8\n- Not encapsulate critical\
    \ internal APIs, but just deprecate them\n\nThe critical internal APIs that werenÔÇÖt\
    \ encapsulated are `sun.misc.Unsafe`, `sun.misc.Signal`, `sun.misc.SignalHandler`,\
    \ `sun.misc.Cleaner`, `sun.reflect.Reflection`, `sun.reflect.ReflectionFactory`.\
    \ These are still accessible in JDK 9.\n\nThe following example from Listing [8-4](#A431534_1_En_8_Chapter.html#Par121)\
    \ demonstrates the encapsulation of JDK internal APIs. Therefore, we use an instance\
    \ of the class `URLCanonicalizer` from the package `sun.net`. All the classes\
    \ from package `sun.net` were encapsulated in JDK 9.\n\n```\npackage com.apress.jdkinternal;\n\
    import sun.net.URLCanonicalizer;\npublic class Main {\n    public static void\
    \ main(String[] args) {\n        URLCanonicalizer urlCanonicalizer = new URLCanonicalizer();\n\
    \        String apressUrl = urlCanonicalizer.canonicalize(\"www.apress.com\");\n\
    \        System.out.println(apressUrl);\n    }\n}\nListing 8-4.\nUse of a Class\
    \ from an Internal JDK API\n```\n\nThe compilation fails because we try to access\
    \ a JDK internal API that is encapsulated:\n\n```\nerror: package sun.net isn't\
    \ visible\nimport sun.net.URLCanonicalizer;\n(package sun.net is declared in module\
    \ java.base, which doesn't export it to module com.apress.jdkinternal)\n```\n\n\
    The error states that the package `sun.net`, located in module `java.base`, isnÔÇÖt\
    \ visible from our module `com.apress.jdkinternal`. We know that the `sun.net`\
    \ package has been encapsulated, so we need a way to make our module `com.apress.jdkinternal`\
    \ able to access the `sun.net` package at compile-time.\n\nFortunately, thereÔÇÖs\
    \ a solution to gain access to the `sun.net` packageÔÇöby exporting this package\
    \ to our module during compilation using the `--add-exports` command-line option,\
    \ described next."
  raw: "### Generate Module Descriptors with JDeps\n\nJDeps can be used to generate\
