- fmt: '#### Resolve a Module with a Configuration


    To resolve a module with a configuration, we need to use the `resolve()` method
    described earlier. In the following example, we resolve our module name called
    `com.apress.myModule`. For this we use the configuration of the boot layer as
    the parent, as illustrated in Listing [10-2](#A431534_1_En_10_Chapter.html#Par125).


    ```

    Path ourDirectory = ...;

    ModuleFinder finder = ModuleFinder.of(ourDirectory);

    Configuration parentConfiguration = ModuleLayer.boot().configuration();

    Configuration configuration = parentConfiguration.resolve(finder, ModuleFinder.of(),
    Set.of("com.apress.myModule"));

    Listing 10-2.

    Resolving the Module com.apress.myModule with a Configuration

    ```


    ### Creating Layers


    In this section weÔÇÖll see how to create a layer. This is not a difficult process.
    The new module API provides some useful methods for creating a layer inside the
    `ModuleLayer` class, as specified by the official JDK 9 API specification:


    - `ModuleLayer defineModules(Configuration cf, Function<String, Classloader> clf)`:
    Creates a new module layer with the current layer as its parent by defining the
    modules in the given `Configuration` to the JVM. The second parameter represents
    the function that maps a module name to a class loader. It returns the newly created
    `ModuleLayer`.

    - `ModuleLayer defineModulesWithManyLoaders(Configuration cf, ClassLoader parentLoader)`:
    Creates a new module layer with the current layer as its parent. Each module is
    defined to its own `Classloader` created by this method. The second parameter
    represents the parent class loader for each of the class loaders created by this
    method.

    - `ModuleLayer defineModulesWithOneLoader(Configuration cf, ClassLoader parentLoader)`:
    Similar to the previous method described above. The only difference is that this
    method creates one class loader and defines all modules to that class loader.


    As you can see, in order to create a module layer we need to pass a `Configuration`
    object and a `ClassLoader` object. In the previous section, we learned how to
    create a `Configuration` object by resolving a module `com.apress.myModule` with
    the configuration for the boot layer as a parent configuration. Now that we know
    how to get the `Configuration`, we can create a new layer with the modules in
    our configuration, as demonstrated in Listing [10-3](#A431534_1_En_10_Chapter.html#Par131).


    ```

    ModuleLayer parentLayer = ModuleLayer.boot();

    ClassLoader classLoader = ClassLoader.getSystemClassLoader();

    ModuleLayer layer = parent.defineModulesWithOneLoader(configuration, classLoader)

    Listing 10-3.

    Create a Module Layer

    ```


    We used the `configuration` object created earlier and passed it to the `defineModuleWithOneLoader()`
    method. We also passed the system class loader which was retrieved from the method
    `getSystemClassLoader()`.


    **Note**


    Most times, the parent of an own created layer is the boot layer.


    Jigsaw has to enforce constraints on the module graph because of some class loading
    constraints. As a result, only module graphs that contain no cycles can be transformed
    into a layer.


    ### Get the Loaded Modules from a Layer


    Getting the loaded modules from a layer is very simple. On the `ModuleLayer` object,
    the method `modules()` is called, which returns a set of the modules loaded in
    this layer. Listing [10-4](#A431534_1_En_10_Chapter.html#Par136) shows how to
    get all the modules from the boot layer and print their names.


    ```

    ModuleLayer moduleLayer = ModuleLayer.boot();

    moduleLayer.modules().stream().forEach(module -> {

    String moduleName = module.getName();

    System.out.println("Name of the module is: " + moduleName);

    });

    Listing 10-4.

    Print the Names of the Modules in the Boot Layer

    ```


    Following is an excerpt of the output printed. We wonÔÇÖt show it entirely because
    itÔÇÖs too large:


    ```

    Name of the module is: jdk.javadoc

    Name of the module is: jdk.deploy

    Name of the module is: javafx.graphics

    Name of the module is: java.security.jgss

    Name of the module is: jdk.editpad

    Name of the module is: java.compiler

    Name of the module is: jdk.jdeps

    Name of the module is: jdk.packager

    Name of the module is: java.management.rmi

    Name of the module is: javafx.swing

    Name of the module is: jdk.attach

    Name of the module is: java.desktop

    Name of the module is: jdk.unsupported

    Name of the module is: javafx.fxml

    ...

    ```


    **Note**


    You can find the source code for this example in the directory `/ch10/layers`.


    The next example shows how to print information about all the layers that exist
    in the system.


    ### Describe Layers at Runtime


    Listing [10-5](#A431534_1_En_10_Chapter.html#Par142) shows the current module
    layer and its parent layers.


    ```

    package modulelayer;

    import java.lang.ModuleLayer;

    import java.util.List;

    public class LayerUtil {

    public static void describeCurrentAndParentLayers() {

    // prints the layer information for the current layer

    ModuleLayer thisModuleLayer = LayerUtil.class.getModule().getLayer();

    printLayerInformation(thisModuleLayer);

    // gets all the parents of the layer

    List parentModuleLayerList = thisModuleLayer.parents();

    if(parentModuleLayerList.isEmpty()) {

    System.out.println("This layer has no parent layers");

    }

    else {

    for(ModuleLayer moduleLayer : parentModuleLayerList) {

    printLayerInformation(moduleLayer);

    }

    }

    }

    private static void printLayerInformation(ModuleLayer moduleLayer) {

    System.out.println("The name of the modules in this layer are: " + moduleLayer.toString());

    System.out.println("The configuration for this layer: " + moduleLayer.configuration());

    }

    public static void main(String[] args) {

    describeCurrentAndParentLayers();

    }

    }

    Listing 10-5.

    Describe the Current Modules Layer and Its Parent Layers

    ```


    First, we print the information for the current layer. We retrieve it by calling
    the `getLayer()` method on the current module. Afterward, we retrieve the layerÔÇÖs
    parents by calling the method `parents()` on the current layer. If the resulting
    list is empty, then we have no parent for our layer. Otherwise, if the resulting
    list has only one element and this element is the empty layer, then our layer
    doesnÔÇÖt have any parent layers, so we print a corresponding message. Finally,
    we iterate over the list of parent layers and print the names of the modules they
    contain together with the configuration.


    **Note**


    The empty layer doesnÔÇÖt consist of any modules. The Java Platform Module System
    canÔÇÖt load two modules into the same layer when the two modules have the same
    package name. This is true even if the package is private.


    WeÔÇÖve covered the basics of layers. ItÔÇÖs time to move forward and present the
    concept of upgradeable modules.'
