    \ book all the operations are performed using Cygwin.\n\nFor compilation we use\
    \ the `--module-source-path` command-line option in order to indicate to `javac`\
    \ the location of the source code of the modules. In our example, the `--module-source-path\
    \ src` option defines that the subdirectories of the `src` directory comprise\
    \ the code for various modules.\n\nThe compilation fails, and weÔÇÖre informed that\
    \ the package `com.apress.moduleB` doesnÔÇÖt exist:\n\n```\n.\\src\\com.apress.moduleA\\\
    com\\apress\\moduleA\\Main.java:3: error: package com.apress.moduleB does not\
    \ exist\nimport com.apress.moduleB.*;\n^\n.\\src\\com.apress.moduleA\\com\\apress\\\
    moduleA\\Main.java:8: error: cannot find symbol\nEmployee employee = new Employee(\"\
    John\", \"Albert\");\n^\nsymbol:   class Employee\nlocation: class Main\n.\\src\\\
    com.apress.moduleA\\com\\apress\\moduleA\\Main.java:8: error: cannot find symbol\n\
    Employee employee = new Employee(\"John\", \"Albert\");\n^\nsymbol:   class Employee\n\
    location: class Main\n3 errors\n```\n\n`Module com.apress.moduleA` has an empty\
    \ module declaration. It doesnÔÇÖt require any other module, so it canÔÇÖt access\
    \ types from other modules according to the strong encapsulation mechanism introduced\
    \ in Jigsaw. This is why attempting to access types from the `module com.apress.moduleB`\
    \ inside `com.apress.moduleA` results in a compilation error.\n\nNote\n\nYou can\
    \ find the source code for this example in the directory `/ch04/requiresClause`.\n\
    \nLetÔÇÖs edit `module-info.java` of the `module com.apress.moduleA` and add the\
    \ dependency to `module com.apress.moduleB`. Listing [4-6](#A431534_1_En_4_Chapter.html#Par90)\
    \ shows its new module descriptor.\n\n```\n// module-info.java\nmodule com.apress.moduleA\
    \ {\nrequires com.apress.moduleB;\n}\nListing 4-6.\nThe Module Descriptor of module\
    \ com.apress.moduleA\n```\n\nNow we try to compile the source code again using\
    \ the same options. Unfortunately, exactly the same compilation error as the one\
    \ that we previously had. ThatÔÇÖs because in Java 9 itÔÇÖs not enough to specify\
    \ that a module requires another module in order to access types from that module.\n\
    \nAdditionally, the second module must export some of its types in order to make\
