    \ its `module-info.java` file.\n\n```\n// module-info.java\nmodule com.apress.moduleB\
    \ {\nexports com.apress.moduleB;\n}\nListing 4-7.\nThe Module Descriptor of Module\
    \ com.apress.moduleB\n```\n\nTo recap, weÔÇÖve learned up to now how to define dependencies\
    \ upon other modules using the `requires` clause. The property of a module to\
    \ specify the modules that it requires represents the base of reliable configuration.\
    \ Until now weÔÇÖve used only the simple form of the `requires` clause. Hence, the\
    \ `requires` clause can also include the `static` keyword as well as the `transitive`\
    \ keyword. We explain the `requires transitive` clause later in the ÔÇťAccessibilityÔÇŁ\
    \ section.\n\nThe `requires static myModule` clause indicates that the module\
    \ `myModule` should be present only at compile-time. At runtime, its presence\
    \ isnÔÇÖt mandatory. In this way, we must have a compile-time dependency, but no\
    \ runtime dependency.\n\nLetÔÇÖs find out how to make a module express that it makes\
    \ its packages available for other modules that depend upon it. The next section\
    \ explains how the `exports` clause can be used inside the module declaration."
