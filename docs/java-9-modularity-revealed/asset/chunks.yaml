- fmt: "### Jlink Command Options\n\nThe Jlink tool isnÔÇÖt limited to the options discussed\
    \ in the preceding section. According to the official JDK 9 API specification,\
    \ it allows many other options, all of which are shown in Table [7-1](#A431534_1_En_7_Chapter.html#Tab1).\n\
    \n**Table 7-1.** The Options of the Jlink Command\n\n| Option Name | Description\
    \ |\n| --- | --- |\n| `--help` | Prints a help message. |\n| `--module-path <module_path>`\
    \ | Defines the module path. |\n| `--limit-modules <list_of_modules_names>` |\
    \ Limits the group of observable modules to those in the transitive closure of\
    \ the modules specified. If there are any modules specified using the `--add-modules`\
    \ option, theyÔÇÖll be also added to the observable modules, even if not present\
    \ in the list of `--limit-modules`. The main module, if it exists, will also be\
    \ added to the observable modules. |\n| `--add-modules <module_name>` | Specifies\
    \ the root modules that need to be resolved. |\n| `--output <directory_name>`\
    \ | Specifies the name of the directory where the runtime image will be generated.\
    \ |\n| `--launcher <command_name>=<module_name>` | Specifies the launcher command\
    \ name for the module. |\n| `--launcher command=<module_name>/main` | Specifies\
    \ the launcher command name for the module together with the `main` class. |\n\
    | `--endian <little &#124; big>` | Defines the byte order of the runtime image\
    \ that is being generated. |\n| `--version` | Displays the version information.\
    \ |\n| `--save-opts <name_of_file>` | Saves the Jlink options in the given file.\
    \ |\n| `--strip-debug` | Strips the debug information. |\n| `--no-man-pages` |\
    \ Excludes the `man` pages. |\n| `--no-header-files` | Excludes the header files.\
    \ |\n| `--disable-plugin <name_of_plugin>` | Disables the plugin. |\n| `--list-plugins`\
    \ | Lists all the available Jlink plugins that are reachable using the command-line.\
    \ |\n| `--ignore-signing-information` | Overcomes an error when signed modular\
    \ JARs are linked to the runtime image. |\n| `@<name_of_file>` | Reads all the\
    \ options from the file specified as an argument. |\n| `--bind-services` | Executes\
    \ a full service binding and links in service provider modules and their dependences\
    \ into the runtime image. |\n| `--suggest-providers <list_of_names_of_service>`\
    \ | Helps to find providers that implement the service types from the module path.\
    \ |\n| `--verbose` | Enables verbose tracing. |\n\n### Link Phase\n\nA new link\
    \ phase was introduced in Java 9. Its role is to produce a runtime image by assembling\
    \ a collection of modules together with their transitive dependencies. OpenJDK\
    \ states that the ÔÇťlink time is an opportunity to do whole-world optimizations\
    \ that are otherwise difficult at compile or costly at runtime.ÔÇŁ\n\nLinking is\
    \ a new development phase that has been added throughout the Java development\
    \ process. ItÔÇÖs very important to remember that the linking phase is optionalÔÇöyou\
    \ donÔÇÖt have to use it if you donÔÇÖt want or need to.\n\nLinking can be used in\
    \ Java 9 when we have a modular application. The resulting image is platform independent.\
    \ The linker can link two or more targetsÔÇöfor example, if youÔÇÖre using operating\
    \ system A, you can successfully target operating system B provided that your\
    \ module path owns the modules for operating system B rather than the ones for\
    \ operating system A. But itÔÇÖs not possible to link a WAR file together.\n\n###\
    \ The jdk.jlink Module\n\nFigure [7-3](#A431534_1_En_7_Chapter.html#Fig3) shows\
    \ the module graph that contains the `jdk.jlink` module together with its dependencies.\n\
    \n![A431534_1_En_7_Fig3_HTML.gif](Images/A431534_1_En_7_Fig3_HTML.gif)\n\n**Figure\
    \ 7-3.** The module graph of the internal module `jdk.jlink`\n\nThe module `jdk.jlink`\
    \ contains different java classes inside the `tools` directory. There is a `jimage`\
    \ directory, `jlink` directory, and `jmod` directory inside the `tools` directory.\
    \ The module `jdk.jlink` has dependencies on the `jdk.internal.opt` and the `jdk.jdeps`\
    \ modules, as expressed in its module descriptor, the `module-info.java` file.\
    \ The `jdk.jdeps` module has a dependency on the `jdk.compiler` module, which\
    \ has a dependency on the `java.compiler` module. Finally, the `java.compiler`\
    \ module requires the `java.logging` module.\n\n**Note:** Module `jdk.jlink` isnÔÇÖt\
    \ designed to be used by programmers.\n\nFigure [7-3](#A431534_1_En_7_Chapter.html#Fig3)\
    \ shows the non-standard JDK modules (`jdk.jlink`, `jdk.internal.opt`, `jdk.jdeps`,\
    \ and `jdk.compiler`) and the standard JDK modules (`java.compiler`, `java.logging`\
    \ and `java.base`). As in the module graph shown in Chapter [3](../Text/A431534_1_En_3_Chapter.html),\
    \ the solid lines represent implied readability, and the dashed lines represent\
    \ simple readability between modules.\n\nListing [7-1](#A431534_1_En_7_Chapter.html#Par48)\
    \ shows the module descriptor of the `jdk.jlink` module.\n\n```\nmodule jdk.jlink\
    \ {\n    requires jdk.internal.opt;\n    requires jdk.jdeps;\n    uses jdk.tools.jlink.plugin.Plugin;\n\
    \    provides java.util.spi.ToolProvider with\n        jdk.tools.jmod.Main.JmodToolProvider,\n\
    \        jdk.tools.jlink.internal.Main.JlinkToolProvider;\n    provides jdk.tools.jlink.plugin.Plugin\
    \ with\n        jdk.tools.jlink.internal.plugins.StripDebugPlugin,\n        jdk.tools.jlink.internal.plugins.ExcludePlugin,\n\
    \        jdk.tools.jlink.internal.plugins.ExcludeFilesPlugin,\n        jdk.tools.jlink.internal.plugins.ExcludeJmodSectionPlugin,\n\
    \        jdk.tools.jlink.internal.plugins.LegalNoticeFilePlugin,\n        jdk.tools.jlink.internal.plugins.SystemModulesPlugin,\n\
    \        jdk.tools.jlink.internal.plugins.StripNativeCommandsPlugin,\n       \
    \ jdk.tools.jlink.internal.plugins.OrderResourcesPlugin,\n        jdk.tools.jlink.internal.plugins.DefaultCompressPlugin,\n\
    \        jdk.tools.jlink.internal.plugins.ExcludeVMPlugin,\n        jdk.tools.jlink.internal.plugins.IncludeLocalesPlugin,\n\
    \        jdk.tools.jlink.internal.plugins.GenerateJLIClassesPlugin,\n        jdk.tools.jlink.internal.plugins.ReleaseInfoPlugin,\n\
    \        jdk.tools.jlink.internal.plugins.ClassForNamePlugin;\n}\n```\n\n**Listing\
    \ 7-1.** The Module Descriptor of the `jdk.jlink` Module\n\nYou can see in this\
    \ module descriptor the entire list of plugins the Jlink tool has."
  raw: '### Jlink Command Options


    The Jlink tool isnÔÇÖt limited to the options discussed in the preceding section.
    According to the official JDK 9 API specification, it allows many other options,
    all of which are shown in Table [7-1](#A431534_1_En_7_Chapter.html#Tab1).


    Table 7-1.


    The Options of the Jlink Command


    | Option Name | Description |

    | --- | --- |

    | `--help` | Prints a help message. |

    | `--module-path <module_path>` | Defines the module path. |

    | `--limit-modules <list_of_modules_names>` | Limits the group of observable modules
    to those in the transitive closure of the modules specified. If there are any
    modules specified using the `--add-modules` option, theyÔÇÖll be also added to the
    observable modules, even if not present in the list of `--limit-modules`. The
    main module, if it exists, will also be added to the observable modules. |

    | `--add-modules <module_name>` | Specifies the root modules that need to be resolved.
    |

    | `--output <directory_name>` | Specifies the name of the directory where the
    runtime image will be generated. |

    | `--launcher <command_name>=<module_name>` | Specifies the launcher command name
    for the module. |

    | `--launcher command=<module_name>/main` | Specifies the launcher command name
    for the module together with the `main` class. |

    | `--endian <little &#124; big>` | Defines the byte order of the runtime image
    that is being generated . |

    | `--version` | Displays the version information. |

    | `--save-opts <name_of_file>` | Saves the Jlink options in the given file. |

    | `--strip-debug` | Strips the debug information. |

    | `--no-man-pages` | Excludes the `man` pages. |

    | `--no-header-files` | Excludes the header files. |

    | `--disable-plugin <name_of_plugin>` | Disables the plugin. |

    | `--list-plugins` | Lists all the available Jlink plugins that are reachable
    using the command-line. |

    | `--ignore-signing-information` | Overcomes an error when signed modular JARs
    are linked to the runtime image. |

    | `@<name_of_file>` | Reads all the options from the file specified as an argument.
    |

    | `--bind-services` | Executes a full service binding and links in service provider
    modules and their dependences into the runtime image. |

    | `--suggest-providers <list_of_names_of_service>` | Helps to find providers that
    implement the service types from the module path. |

    | `--verbose` | Enables verbose tracing . |


    ### Link Phase


    A new link phase was introduced in Java 9\. Its role is to produce a runtime image
    by assembling a collection of modules together with their transitive dependencies.
    OpenJDK states that the ÔÇťlink time is an opportunity to do whole-world optimizations
    that are otherwise difficult at compile or costly at runtime.ÔÇŁ


    Linking is a new development phase that has been added throughout the Java development
    process. ItÔÇÖs very important to remember that the linking phase is optionalÔÇöyou
    donÔÇÖt have to use it if you donÔÇÖt want or need to.


    Linking can be used in Java 9 when we have a modular application. The resulting
    image is platform independent. The linker can link two or more targetsÔÇöfor example,
    if youÔÇÖre using operating system A, you can successfully target operating system
    B provided that your module path owns the modules for operating system B rather
    than the ones for operating system A. But itÔÇÖs not possible to link a WAR file
    together.


    ### The jdk.jlink Module


    Figure [7-3](#A431534_1_En_7_Chapter.html#Fig3) shows the module graph that contains
    the jdk.jlink module together with its dependencies.


    ![A431534_1_En_7_Fig3_HTML.gif](Images/A431534_1_En_7_Fig3_HTML.gif)


    Figure 7-3.


    The module graph of the internal module jdk.jlink


    The module jdk.jlink contains different java classes inside the tools directory.
    There is a jimage directory, jlink directory, and jmod directory inside the tools
    directory. The module jdk.jlink has dependencies on the jdk.internal.opt and the
    jdk.jdeps modules, as expressed in its module descriptor, the module-info.java
    file. The jdk.jdeps module has a dependency on the jdk.compiler module, which
    has a dependency on the java.compiler module. Finally, the java.compiler module
    requires the java.logging module.


    Note


    Module jdk.jlink isnÔÇÖt designed to be used by programmers.


    Figure [7-3](#A431534_1_En_7_Chapter.html#Fig3) shows the non-standard JDK modules
    (jdk.jlink, jdk.internal.opt, jdk.jdeps, and jdk.compiler) and the standard JDK
    modules (java.compiler, java.logging and java.base). As in the module graph shown
    in Chapter [3](../Text/A431534_1_En_3_Chapter.html), the solid lines represent
    implied readability, and the dashed lines represent simple readability between
    modules.


    Listing [7-1](#A431534_1_En_7_Chapter.html#Par48) shows the module descriptor
    of the jdk.jlink module.


    ```

    module jdk.jlink {

    requires jdk.internal.opt;

    requires jdk.jdeps;

    uses jdk.tools.jlink.plugin.Plugin;

    provides java.util.spi.ToolProvider with

    jdk.tools.jmod.Main.JmodToolProvider,

    jdk.tools.jlink.internal.Main.JlinkToolProvider;

    provides jdk.tools.jlink.plugin.Plugin with

    jdk.tools.jlink.internal.plugins.StripDebugPlugin,

    jdk.tools.jlink.internal.plugins.ExcludePlugin,

    jdk.tools.jlink.internal.plugins.ExcludeFilesPlugin,

    jdk.tools.jlink.internal.plugins.ExcludeJmodSectionPlugin,

    jdk.tools.jlink.internal.plugins.LegalNoticeFilePlugin,

    jdk.tools.jlink.internal.plugins.SystemModulesPlugin,

    jdk.tools.jlink.internal.plugins.StripNativeCommandsPlugin,

    jdk.tools.jlink.internal.plugins.OrderResourcesPlugin,

    jdk.tools.jlink.internal.plugins.DefaultCompressPlugin,

    jdk.tools.jlink.internal.plugins.ExcludeVMPlugin,

    jdk.tools.jlink.internal.plugins.IncludeLocalesPlugin,

    jdk.tools.jlink.internal.plugins.GenerateJLIClassesPlugin,

    jdk.tools.jlink.internal.plugins.ReleaseInfoPlugin,

    jdk.tools.jlink.internal.plugins.ClassForNamePlugin;

    }

    Listing 7-1.

    The Module Descriptor of the jdk.jlink Module

    ```


    You can see in this module descriptor the entire list of plugins the Jlink tool
    has.'
