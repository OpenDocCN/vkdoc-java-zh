- fmt: "### Open Modules\n\nInside a module, packages arenÔÇÖt accessible to code from\
    \ another module at compile-time, even when using deep reflection. However, many\
    \ third-party libraries and frameworks use reflection to access the internals\
    \ of JDK at runtime. As a result, all these frameworks arenÔÇÖt working in JDK 9\
    \ unless reflective access is granted. In JDK 9, reflective access is granted\
    \ only by code in named modules to code from the class path. ItÔÇÖs not granted\
    \ by default by code in named modules to code in other named modules. As a result,\
    \ if the third-party libraries or frameworks lie on the class path, they have\
    \ reflective access by default in the JDK. If they live on the module path, then\
    \ they donÔÇÖt have reflective access in the JDK. But to grant reflective access\
    \ to all the packages in a module, the module should be declared as open.\n\n\
    An open module is defined by placing the identifier `open` in front of the keyword\
    \ `module`, followed by the name of the module.\n\nOpen modules make all the packages\
    \ inside of the module available for deep reflection. When we say ÔÇťall the packagesÔÇŁ,\
    \ we mean both the public and private packages. We can also opt between opening\
    \ an entire module for deep reflection or opening only specific packages. When\
    \ choosing the latter, we donÔÇÖt specify an entire module as open but only one\
    \ or more packages inside the module. The keyword `open` can be placed near the\
    \ module name or inside the module descriptor to open specific packages.\n\n**Note:**\
    \ The reason behind open modules is that they permit frameworks to reflect over\
    \ the moduleÔÇÖs internals, which isnÔÇÖt possible using basic modules. Frameworks\
    \ like Spring, JPA, and Hibernate need reflective access at runtime.\n\nListing\
    \ [4-25](#A431534_1_En_4_Chapter.html#Par365) defines an open module called `com.apress.myModule`\
    \ that requires two Spring modules, `spring.tx` and `spring.context`.\n\n```\n\
    open module com.apress.myModule {\n    requires spring.tx;\n    requires spring.context;\n\
    \    exports com.apress.myModule.myPackage;\n}\n```\n\n*Listing 4-25. Defining\
    \ an Open Module*\n\nTwo important facts must be stressed in regard to the previous\
    \ example:\n\n- All types from all packages of the module `com.apress.myModule`\
    \ are available for deep reflection at runtime.\n- At compile-time, only the public\
    \ and protected types in package `com.apress.myModule.myPackage` are accessible.\n\
    \nAs a result, the Spring framework can make use of the `setAccessible()` method\
    \ to access the non-public elements of the `com.apress.myModule.myPackage` package.\n\
    \n#### Enabling Core Reflection Using Open Modules\n\nWith respect to the principles\
    \ of strong encapsulation, there are some constraints introduced in Java 9 when\
    \ calling the method `setAccessible()` method of the `java.lang.reflect.AccessibleObject`\
    \ class. We canÔÇÖt use the method `setAccessible()` to make private fields or methods\
    \ from other modules accessible in our module. But there is a solution to make\
    \ them accessible: by declaring the target module as an open module.\n\nIn the\
    \ following example we have two modules. Class `Employee` from module `target`\
    \ contains a private `String` field called `employeeName`. We want to set this\
    \ field to be accessible from our second module called `testReflection`.\n\nListing\
    \ [4-26](#A431534_1_En_4_Chapter.html#Par373) shows the declaration of module\
    \ `target`, which exports its package.\n\n```\nmodule target {\n    exports target;\n\
    }\n```\n\n*Listing 4-26. The `module-info.java` of Module `target`*\n\nIn Listing\
    \ [4-27](#A431534_1_En_4_Chapter.html#Par375) the module `testReflection` reads\
    \ the module `target`.\n\n```\nmodule testReflection {\n    requires target;\n\
    }\n```\n\n*Listing 4-27. The `module-info.java` of Module `testReflection`*\n\n\
    Listing [4-28](#A431534_1_En_4_Chapter.html#Par377) shows the class `Employee`\
    \ from module `target` that contains a private type called `employeeName`:\n\n\
    ```\npackage target;\n\npublic class Employee {\n    private String employeeName\
    \ = null;\n\n    public Employee(String employeeName) {\n        this.employeeName\
    \ = employeeName;\n    }\n}\n```\n\n*Listing 4-28. Definition of Class `Employee`*\n\
    \nThe `Main` class creates an object of type `Employee` and calls its constructor,\
    \ setting the value `\"John\"` to `employeeName`. After that, a `Field` object\
    \ is returned that represents the field `employeeName` and the method `setAccessible()`\
    \ with parameter `true` is called on this field in order to make it accessible\
    \ throughout our `testReflection` module.\n\nListing [4-29](#A431534_1_En_4_Chapter.html#Par380)\
    \ shows the `Main` class of the application.\n\n```\npackage testReflection;\n\
    \nimport java.lang.reflect.*;\nimport target.*;\n\npublic class Main {\n    public\
    \ static void main(String[] args) {\n        Employee employee = new Employee(\"\
    John\");\n        try {\n            Field employeeField = Employee.class.getDeclaredField(\"\
    employeeName\");\n            employeeField.setAccessible(true);\n        }\n\
    \        catch(NoSuchFieldException noSuchFieldException) {\n        }\n    }\n\
    }\n```\n\n*Listing 4-29. `Main` Class from Package `testReflection`*\n\nWe compile\
    \ the code inside the two modules and specify the location of the compiled files\
    \ to be in the `out` directory. Listing [4-30](#A431534_1_En_4_Chapter.html#Par382)\
    \ shows the usage of the `--module-source-path` option to specify that all the\
    \ files that have the extension `.java` are on the module source path.\n\n```\n\
    javac -d out --module-source-path src $(find . -name \"*.java\")\n```\n\n*Listing\
    \ 4-30. Compile Files Using the flag `--module-source-path`*\n\nListing [4-31](#A431534_1_En_4_Chapter.html#Par384)\
    \ illustrates the `java` command used to run the `Main` class of our module. We\
    \ pass the `Main` class to the `--module` option and the `--module-path` option\
    \ points to the `out` directory where all the compiled class files exist.\n\n\
    ```\n$ java --module-path out --module testReflection/testReflection.Main\n```\n\
    \n*Listing 4-31. Run the `Main` Class Using the `--module` option*\n\nUnfortunately,\
    \ an exception is thrown when attempting to run our application because the call\
    \ of the method `setAccessible()` fails. Thus we canÔÇÖt make the private field\
    \ `employeeName` accessible.\n\n```\nException in thread \"main\" java.lang.reflect.InaccessibleObjectException:\
    \ Unable to make field private java.lang.String target.Employee.employeeName accessible:\
    \ module target does not \"opens target\" to module testReflection\n    at java.base/jdk.internal.reflect.Reflection.throwInaccessibleObjectException(Reflection.java:424)\n\
    \    at java.base/java.lang.reflect.AccessibleObject.checkCanSetAccessible(AccessibleObject.java:198)\n\
    \    at java.base/java.lang.reflect.Field.checkCanSetAccessible(Field.java:171)\n\
    \    at java.base/java.lang.reflect.Field.setAccessible(Field.java:165)\n    at\
    \ testReflection/testReflection.Main.main(Main.java:14)\n```\n\n**Note:** In this\
    \ example, we have readability between the two modules `target` and `testReflection`.\
    \ But due to the very powerful strong encapsulation mechanism introduced in Java\
    \ 9, calling the method `setAccessible()` on a private field of the other module\
    \ throws an `InaccessibleObjectException`.\n\nWe can fix this issue very easily\
    \ by defining the `target` module as an open module instead of a strong module.\
    \ Calling the `setAccessible()` method on a private field of the `target` module\
    \ will succeed. The private field `employeeName` is now accessible into the `testReflection`\
    \ module.\n\nListing [4-32](#A431534_1_En_4_Chapter.html#Par390) defines the `target`\
    \ module as an open module by specifying the keyword `open`.\n\n```\nopen module\
    \ target {\n    exports target;\n}\n```\n\n*Listing 4-32. Define the `target`\
    \ Module as an Open Module*\n\n**Note:** You can find the source code for the\
    \ first example in the folder `/ch04/CoreReflectionFail` and the source code for\
    \ the second example in the folder `/ch04/CoreReflectionSucceed`.\n\nUntil now\
    \ weÔÇÖve talked about the named module and its types. Next weÔÇÖll talk about the\
    \ unnamed module."
  raw: '### Open Modules


    Inside a module, packages arenÔÇÖt accessible to code from another module at compile-time,
    even when using deep reflection. However, many third-party libraries and frameworks
    use reflection to access the internals of JDK at runtime. As a result, all these
    frameworks arenÔÇÖt working in JDK 9 unless reflective access is granted. In JDK
    9, reflective access is granted only by code in named modules to code from the
    class path. ItÔÇÖs not granted by default by code in named modules to code in other
    named modules. As a result, if the third-party libraries or frameworks lie on
    the class path, they have reflective access by default in the JDK. If they live
    on the module path, then they donÔÇÖt have reflective access in the JDK. But to
    grant reflective access to all the packages in a module, the module should be
    declared as open.


    An open module is defined by placing the identifier `open` in front of the keyword
    `module`, followed by the name of the module.


    Open modules make all the packages inside of the module available for deep reflection.
    When we say ÔÇťall the packagesÔÇŁ, we mean both the public and private packages.
    We can also opt between opening an entire module for deep reflection or opening
    only specific packages. When choosing the latter, we donÔÇÖt specify an entire module
    as open but only one or more packages inside the module. The keyword `open` can
    be placed near the module name or inside the module descriptor to open specific
    packages.


    Note


    The reason behind open modules is that they permit frameworks to reflect over
    the moduleÔÇÖs internals, which isnÔÇÖt possible using basic modules. Frameworks like
    Spring, JPA, and Hibernate need reflective access at runtime.


    Listing [4-25](#A431534_1_En_4_Chapter.html#Par365) defines an open module called
    com.apress.myModule that requires two Spring modules, spring.tx and spring.context.


    ```

    open module com.apress.myModule {

    requires spring.tx;

    requires spring.context;

    exports com.apress.myModule.myPackage;

    }

    Listing 4-25.

    Defining an Open Module

    ```


    Two important facts must be stressed in regard to the previous example:


    *   All types from all packages of the module com.apress.myModule are available
    for deep reflection at runtime.

    *   At compile-time, only the public and protected types in package com.apress.myModule.myPackage
    are accessible.


    As a result, the Spring framework can make use of the `setAccessible()` method
    to access the non-public elements of the com.apress.myModule.myPackage package.


    #### Enabling Core Reflection Using Open Modules


    With respect to the principles of strong encapsulation, there are some constraints
    introduced in Java 9 when calling the method `setAccessible()` method of the `java.lang.reflect.AccessibleObject`
    class. We canÔÇÖt use the method `setAccessible()` to make private fields or methods
    from other modules accessible in our module. But there is a solution to make them
    accessible: by declaring the target module as an open module.


    In the following example we have two modules. Class `Employee` from module target
    contains a private `String` field called `employeeName`. We want to set this field
    to be accessible from our second module called testReflection.


    Listing [4-26](#A431534_1_En_4_Chapter.html#Par373) shows the declaration of module
    target, which exports its package.


    ```

    module target {

    exports target;

    }

    Listing 4-26.

    The module-info.java of Module target

    ```


    In Listing [4-27](#A431534_1_En_4_Chapter.html#Par375) the module testReflection
    reads the module target.


    ```

    module testReflection {

    requires target;

    }

    Listing 4-27.

    The module-info.java of Module testReflection

    ```


    Listing [4-28](#A431534_1_En_4_Chapter.html#Par377) shows the class `Employee`
    from module target that contains a private type called `employeeName`:


    ```

    package target;

    public class Employee {

    private String employeeName = null;

    public Employee(String employeeName) {

    this.employeeName = employeeName;

    }

    }

    Listing 4-28.

    Definition of Class Employee

    ```


    The `Main` class creates an object of type `Employee` and calls its constructor,
    setting the value `"John"` to `employeeName`. After that, a `Field` object is
    returned that represents the field `employeeName` and the method `setAccessible()`
    with parameter `true` is called on this field in order to make it accessible throughout
    our testReflection module.


    Listing [4-29](#A431534_1_En_4_Chapter.html#Par380) shows the `Main` class of
    the application.


    ```

    package testReflection;

    import java.lang.reflect.*;

    import target.*;

    public class Main {

    public static void main(String[] args) {

    Employee employee = new Employee("John");

    try {

    Field employeeField = Employee.class.getDeclaredField("employeeName");

    employeeField.setAccessible(true);

    }

    catch(NoSuchFieldException noSuchFieldException) {

    }

    }

    }

    Listing 4-29.

    Main Class from Package testReflection

    ```


    We compile the code inside the two modules and specify the location of the compiled
    files to be in the out directory. Listing [4-30](#A431534_1_En_4_Chapter.html#Par382)
    shows the usage of the `--module-source-path` option to specify that all the files
    that have the extension .java are on the module source path.


    ```

    javac -d out --module-source-path src $(find . -name "*.java")

    Listing 4-30.

    Compile Files Using the flag --module-source-path

    ```


    Listing [4-31](#A431534_1_En_4_Chapter.html#Par384) illustrates the `java` command
    used to run the `Main` class of our module. We pass the `Main` class to the `--module
    option` and the `--module-path` option points to the out directory where all the
    compiled class files exist.


    ```

    $ java --module-path out --module testReflection/testReflection.Main

    Listing 4-31.

    Run the Main Class Using the --module option

    ```


    Unfortunately, an exception is thrown when attempting to run our application because
    the call of the method `setAccessible()` fails. Thus we canÔÇÖt make the private
    field `employeeName` accessible.


    ```

    Exception in thread "main" java.lang.reflect.InaccessibleObjectException: Unable
    to make field private java.lang.String target.Employee.employeeName accessible:
    module target does not "opens target" to module testReflection

    at java.base/jdk.internal.reflect.Reflection.throwInaccessibleObjectException(Reflection.java:424)

    at java.base/java.lang.reflect.AccessibleObject.checkCanSetAccessible(AccessibleObject.java:198)

    at java.base/java.lang.reflect.Field.checkCanSetAccessible(Field.java:171)

    at java.base/java.lang.reflect.Field.setAccessible(Field.java:165)

    at testReflection/testReflection.Main.main(Main.java:14)

    ```


    Note


    In this example, we have readability between the two modules target and testReflection.
    But due to the very powerful strong encapsulation mechanism introduced in Java9,
    calling the method `setAccessible()` on a private field of the other module throws
    an `InaccessibleObjectException`.


    We can fix this issue very easily by defining the target module as an open module
    instead of a strong module. Calling the `setAccessible()` method on a private
    field of the target module will succeed. The private field `employeeName` is now
    accessible into the testReflection module.


    Listing [4-32](#A431534_1_En_4_Chapter.html#Par390) defines the target module
    as an open module by specifying the keyword `open`.


    ```

    open module target {

    exports target;

    }

    Listing 4-32.

    Define the Target Module as an Open Module

    ```


    Note


    You can find the source code for the first example in the folder /ch04/CoreReflectionFail
    and the source code for the second example in the folder /ch04/CoreReflectionSucceed.


    Until now weÔÇÖve talked about the named module and its types. Next weÔÇÖll talk about
    the unnamed module.'
