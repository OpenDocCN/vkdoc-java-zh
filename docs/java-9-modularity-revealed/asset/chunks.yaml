    \ class is mandatory information that the `java` command needs to be aware of.\n\
    \nThe Java launcher will load the root module `com.apress.moduleA`, resolve all\
    \ its dependencies and transitive dependencies by running the resolution process,\
    \ and finally run its `Main` class, which was passed to the option `--module`.\
    \ At the end, the message is printed in the console.\n\nCongratulations! You just\
    \ learned how to successfully compile and run your first module in Java 9.\n\n\
