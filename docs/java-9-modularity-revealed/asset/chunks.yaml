- fmt: '### Exporting a Package at Compile-time and Runtime


    The `--add-exports` option added to the Java compiler (`javac`) exports a package
    to a specific named module or to the unnamed module. It corresponds to the qualified
    export `"exports ÔÇŽ to"` statement from the module declaration. It can be used
    to break the encapsulation of JDK internal APIs and to make them accessible in
    a named module or in the unnamed module.


    The following shows the syntax of the `--add-exports` command-line option:


    - `<source_module>` represents the module where the package to be exported is
    located.

    - `<name_of_package_to_be_exported>` represents the name of the package that will
    be exported to the `<list_of_target_modules>`.

    - `<list_of_target_modules>` represents a comma-separated list of modules that
    will gain access to the exported package.


    ```

    --add-exports <source_module>/<name_of_package_to_be_exported>=<list_of_target_modules>

    ```


    In Figure [8-1](#A431534_1_En_8_Chapter.html#Fig1) the package `sun.net`, located
    in module `java.base`, is exported to our module `com.apress.jdkinternal`.


    ![A431534_1_En_8_Fig1_HTML.gif](Images/A431534_1_En_8_Fig1_HTML.gif)


    Figure 8-1. Exporting the `sun.net` package to a named module with the `--add-exports`
    option


    In this way, the package `sun.net` will be accessible from our the module `com.apress.jdkinternal`.
    By compiling our application again using the option `--add-exports` mentioned
    earlier, the package `sun.net` will be exported to our module. We pass the module
    where the package is located (`java.base`) and the module where the package should
    be exported (`com.apress.jdkinternal`).


    To compile we have to use the `--add-exports` option, as mentioned:


    ```

    $ javac ÔÇôd outputDir --add-exports java.base/sun.net=com.apress.jdkinternal --module-source-path
    src $(find . ÔÇôname "*.java")

    ```


    The compilation succeeds, and the `.class` files are created. However, a warning
    is displayed, informing us that `URLCanonicalizer` is an internal proprietary
    API that may be removed in a future release:


    ```

    warning: URLCanonicalizer is internal proprietary API and may be removed in a
    future release

    import sun.net.URLCanonicalizer;

    ```


    We run the application by using exactly the same `--add-exports` command:


    ```

    java --module-path outputDir --add-exports java.base/sun.net=com.javausergroup.jdkinternal
    -m com.apress.jdkinternal/com.apress.jdkinternal.Main

    ```


    Because we need readability at runtime, not only at compile-time, itÔÇÖs mandatory
    to use the same `--add-exports` option with the same arguments when running the
    application. If we had run our application without the `--add-exports` flag, the
    following error would have been thrown:


    ```

    Exception in thread "main" java.lang.IllegalAccessError: class com.apress.jdkinternal.Main
    (in module com.apress.jdkinternal) canÔÇÖt access class sun.net.URLCanonicalizer
    (in module java.base) because module java.base doesnÔÇÖt export sun.net to module
    com.apress.jdkinternal

    at com.apress.jdkinternal/com.apress.jdkinternal.Main.main

    ```


    The `IllegalAccessError` occurs at runtime because the package `sun.net` isnÔÇÖt
    exported.


    #### Export to the Unnamed Module


    We exported an unsupported package to our module to make it accessible. But what
    if our code was on the class path? Fortunately, thereÔÇÖs a solution for that. The
    constant `ALL-UNNAMED` stands for the entire class path. In our case, the following
    command exports the `sun.net` package to the class path so it can be accessed
    from the entire code on the class path:


    ```

    --add-exports java.base/sun.net=ALL-UNNAMED

    ```


    Note


    The constant `ALL-UNNAMED` stands for all the code in the unnamed module, which
    represents the entire class path.


    There are some general aspects that want to mention:


    - The `--add-exports` command-line option can be used more than once when running
    it, meaning it allows duplicates.

    - The `--add-exports` command-line option is used by both Java compiler and Java
    launcher.

    - If our code uses only the JDK-critical APIs that remained accessible in Java
    9, we donÔÇÖt have to use the `--add-exports` option because these APIs are already
    accessible.

    - If the `--add-exports` command-line option encounters bad values, a warning
    is raised, but no fatal error is thrown, so the program doesnÔÇÖt stop working.


    Throughout this book weÔÇÖve looked at two ways of exporting a package: by specifying
    the `exports` clause in the module declaration or by using the command-line option
    `--add-exports`. But thereÔÇÖs still another option: specifying the attribute `Add-Exports`
    in the `MANIFEST.MF` file of a JAR file. This attribute has the format `module/package`.
    It exports the specified module from the specified package to the unnamed module.
    For instance, in order to export the package `sun.net` from module `java.base`
    to the unnamed module, we could write the following:


    ```

    Add-Exports: java.base/sun.net

    ```


    In this section, weÔÇÖve learned to make code that uses encapsulated JDK APIs compile
    and run in JDK 9. This workaround is very useful because if our code uses JDK
    internal APIs, we know that we have one solution to make the code run in Java
    9 without needing to redesign the code or replace the encapsulated JDK internal
    APIs. But relying on this flag forever isnÔÇÖt recommended because the JDK internal
    APIs were deprecated in JDK 9 and may be removed in JDK 10. That means you have
    time only during a release cycle to refactor your code in order to get rid of
    these unsupported APIs. If your third-party library is using JDK internal APIs,
    you should check on a regularly basis if a new version of the library, one that
    replaces the unsupported APIs with supported ones, has been published.


    ### Opening Packages for Deep Reflection


    Chapter [4](../Text/A431534_1_En_4_Chapter.html) talked about the `opens` clause
    in the module descriptors. There we mentioned that deep reflection is by default
    allowed by code in a named module to code on the class path, but by default itÔÇÖs
    not allowed to code in another named module. In this second case, in order to
    allow reflective access from code in a named module to code in another named module,
    we could use the new `--add-opens` command-line option. ItÔÇÖs used to provide deep
    reflective access from one module to another module or to the code on the class
    path. ItÔÇÖs equivalent to a qualified `opens` from a module declaration:


    ```

    opens <package> to <module>

    ```


    The syntax of the `--add-opens` command-line option goes like this:


    ```

    --add-opens <source_module>/<package>=<list_of_target_modules>

    ```


    The package defined and located in the `<source_module>` is opened for deep reflective
    access to the modules listed in the `<list_of_target_modules>`. These modules
    will be able to access the package at runtime only using deep reflection but wonÔÇÖt
    be able to access the package during compilation. If we put the constant `ALL-UNNAMED`
    instead of the `<list_of_target_modules>`, then the entire code on the class path
    will be able to access the package at runtime using deep reflection. However,
    this last case happens already by default, so we should use it only if someone
    programmatically disabled reflective access by code in a named module to code
    from the class path.


    Note


    Deep reflection can take place only at runtime. It canÔÇÖt take place at compile-time.
    As a result, the `--add-opens` command-line option can be used only at runtime
    using the `java` command. It canÔÇÖt be used at compile-time using the `javac` command.


    Because automatic modules open all their packages by default, thereÔÇÖs no need
    to open them using the `--add-opens` option. Now that we know how to open packages
    at runtime for deep reflection, letÔÇÖs learn how to add readability at runtime
    using the option `--add-reads`.'
