- fmt: "# Multi-release JAR files\n\nSuppose you want to switch to the latest JDK\
    \ version but have a third-party library thatÔÇÖs incompatible with the latest version\
    \ of the JDK. As a consequence, you decide not to switch to the latest JDK version\
    \ at least until the third-party library youÔÇÖre using will be made compatible\
    \ with the latest version of the JDK. This is a bad scenario that was solved in\
    \ Java 9 by the introduction of multi-release JAR files, which allow packaging\
    \ code for different versions of the JDK in a single JAR file.\n\nMulti-release\
    \ JAR files were implemented in JDK 9 in JEP 238. This JEP isnÔÇÖt part of Jigsaw.\
    \ We mention it here because itÔÇÖs an important feature that helps during migration\
    \ to Java 9. It doesnÔÇÖt depend on the Java Platform Module System at all. We can\
    \ use multi-release JAR files in a non-modular world, too.\n\nJava 9 enhances\
    \ the JAR file format so that multiple major versions of a class can be stored\
    \ inside a single JAR file, in its `META-INF` directory. The new JAR file format\
    \ is called a multi-release JAR and can consist of a single library for different\
    \ JDK versions. The correct versions of the classes are loaded at runtime depending\
    \ on the JDK version used by the user. A multi-release JAR file changes the structure\
    \ of a JAR file only to a low degree.\n\n> **Note**  \n> Multi-release JAR files\
    \ are supported for both normal JARs and modular JARs.\n\nListing [10-1](#A431534_1_En_10_Chapter.html#Par24)\
    \ shows a multi-release JAR file that contains versioning metadata for JDK 8 and\
    \ JDK 9.\n\n```\nRoot of JAR\n-   A1.class\n-   B1.class\n-   C1.class\n-   D1.class\n\
    -   E1.class\n-META-INF\n- MANIFEST.MF\n- versions\n\n- A1.class\n- B1.class\n\
    - F1.class\n\n- A1.class\n- C1.class\n- D1.class\n- F1.class\n- G1.class\nListing\
    \ 10-1.\nMulti-release JAR file Having Versioning Metadata for JDK 8 and JDK 9\n\
    ```\n\nIn this example, we have Java `.class` files in the root directory of the\
    \ JAR, but also in the `8` and `9` directories. In the `META-INF` directory, we\
    \ have the `MANIFEST.MF` file and a directory called `versions`, which contains\
    \ two directories: a directory called `8` that represents the resources provided\
    \ for JDK 8 and a directory called `9` that represents the resources provided\
    \ for JDK 9. There are Java `.class` files in the `8` directory and in the `9`\
    \ directory. The classes inside the `8` directory will be considered when we use\
    \ JDK 8, and the classes inside the `9` directory will be considered when we use\
    \ JDK 9.\n\nThe classes in the root directory of the JAR file will be considered\
    \ in the following situations:\n\n- If weÔÇÖre using a version of JDK different\
    \ from JDK 8 or JDK 9\n- If weÔÇÖre using JDK 8 or JDK 9 and the corresponding classes\
    \ arenÔÇÖt present in the `versions/8` and `versions/9` directories\n\nWeÔÇÖll explain\
    \ this in detail. For the multi-release JAR file just discussed, we first have\
    \ to know whether the JDK version weÔÇÖre using supports multi-release JAR files.\
    \ If it doesnÔÇÖt, then everything inside the `versions/8` and `versions/9` directories\
    \ will be ignored, and only the class files from the root directory will be considered:\
    \ `A1.class`, `B1.class`, `C1.class`, `D1.class`, and `E1.class`.\n\nWhen we use\
    \ a JDK version different from JDK 8 or JDK 9, only the class files from the root\
    \ directory will be used. In our example, the classes `F1` and `G1`, present only\
    \ in the `versions/9` directory, wonÔÇÖt be used at all.\n\nWhen we use JDK 8, the\
    \ following classes will be used:\n\n```\nA1.class (from the versions/8 directory)\n\
    B1.class (from the versions/8 directory)\nC1.class (from the root directory)\n\
    D1.class (from the root directory)\nE1.class (from the root directory)\nF1.class\
    \ (from the versions/8 directory)\n```\n\nInstead, when we use JDK 9, the following\
    \ classes will be used:\n\n```\nA1.class (from the versions/9 directory)\nB1.class\
    \ (from the root directory)\nC1.class (from the versions/9 directory)\nD1.class\
    \ (from the versions/9 directory)\nE1.class (from the root directory)\nF1.class\
    \ (from the versions/9 directory)\nG1.class (from the versions/9 directory)\n\
    ```\n\nAs you can see from this example, the classes inside a specific `8` or\
    \ `9` directory, if present, override the classes from the root directory. But\
    \ this happens only if weÔÇÖre using JDK 8 or JDK 9, respectively.\n\nA `module-info.class`\
    \ file can also be added inside the `versions` directory of a multi-release JAR\
    \ file. This feature is supported by the `jar` tool. But a `module-info.class`\
    \ canÔÇÖt be placed in the root directory.\n\n> **Note**  \n> Java Compiler, Java\
    \ Class File Disassembler, and JDeps are able to handle multi-release JAR files.\n\
    \nA multi-release JAR file has an attribute called `Multi-Release` set to `true`,\
    \ declared in its `MANIFEST.MF`:\n\n```\nMulti-Release: true\n```\n\nThis attribute\
    \ distinguishes a multi-release JAR from a non-multi-release one. If the attribute\
    \ is set to `false` or is missing, we have a normal JAR.\n\nA multi-release JAR\
    \ file retains the structure of a JAR file. What a multi-release JAR adds is a\
    \ directory called `versions`, under the `META-INF` directory. This directory\
    \ can contain subdirectories for specific major JDK versions: 6, 7, 8, 9, and\
    \ so on. Inside these subdirectories we can put the `.class` files specific to\
    \ that JDK version.\n\n> **Note**  \n> A multi-release JAR file supports only\
    \ major versions of the JDK. A minor or a security version canÔÇÖt be put in a multi-release\
    \ JAR file.\n\nWhat happens if a version of the JDK doesnÔÇÖt support multi-release\
    \ JARs? In this case, only the classes and resources present in the root of the\
    \ JAR files are visible. Everything inside the `versions` directory will be invisible\
    \ and implicitly not be taken into account.\n\n> **Note**  \n> `Jlink` has been\
    \ enhanced with support for creating images with modules that are packaged as\
    \ multi-release JAR files. `Jlink` adds the classes for the right version into\
    \ the Jimage.\n\nNext, weÔÇÖll explain how to build a multi-release JAR file.\n\n\
    ## Build a Multi-release JAR File\n\nA multi-release JAR file is built with the\
    \ `jar` tool using its new `--release` command-line option. The syntax goes like\
    \ this:\n\n- `<version_number>` represents the major version of the JDK.\n- `<options>`\
    \ represents a set of other options.\n\n```\njar --create --file --release <version_number>\
    \ <options>\n```\n\nSuppose we have a class thatÔÇÖs supported only in JDK 9. We\
    \ want to build a multi-release JAR file and put this specific class in the `versions/9`\
    \ directoryÔÇöeverything else should be put in the root directory. For this, we\
    \ use the `--release` option and specify the version, which in our case is 9,\
    \ and the location of the directory that contains the class that will be put in\
    \ the `versions/9` directoryÔÇöin our case, `classesDirectoryJDK9`:\n\n```\njar\
    \ --create --file myMultiReleaseJar.jar -C classesDirectoryJDK8 --release 9 -C\
    \ classesDirectoryJDK9 .\n```\n\nThis command creates a multi-release JAR file\
    \ by doing the following:\n\n- Taking all the files from the directory `classesDirectoryJDK8`\
    \ and putting them into the root directory of the multi-release JAR file.\n- Taking\
    \ all the files from the directory `classesDirectoryJDK9` and putting them into\
    \ the `versions/9` directory of the multi-release JAR file.\n\nWe now know to\
    \ create a multi-release JAR file by specifying different sources for specific\
    \ major version of the JDK. Next letÔÇÖs find out how to update a multi-release\
    \ JAR file.\n\n## Update Multi-release JAR Files\n\nItÔÇÖs possible to update multi-release\
    \ JAR files using the `jar` tool by adding different versions of the module descriptor\
    \ in the `versions` directory. Therefore, we use the option `--update` of the\
    \ `jar` tool.\n\nWe update the previous multi-release JAR file created earlier\
    \ and add some classes specific to the upcoming JDK 10:\n\n```\njar --update --file\
    \ myMultiReleaseJAR.jar --release 10 -C classesDirectoryJDK10 .\n```\n\nThe multi-release\
    \ JAR is updated, and the content of the `classesDirectoryJDK10` directory are\
    \ placed inside a new directory called `versions/10`. This new directory will\
    \ be considered for JDK 10."
