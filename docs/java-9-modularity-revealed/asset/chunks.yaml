- fmt: '### Split Packages


    The split packages problem is one of the most serious problems that can take place
    in the Java 9 modular world. Split packages occur when two or more members of
    a package reside in more than one module. In order to support reliable configuration,
    the Java Platform Module System doesnÔÇÖt allow split packages at compile-time.
    The reason is that the system loads all the modules from the module path with
    a single class loader, which canÔÇÖt have more than one single type of a package.
    Two modules loaded by the same class loader canÔÇÖt split a package.


    Figure [8-4](#A431534_1_En_8_Chapter.html#Fig4) illustrates two modules having
    a split package.


    ![A431534_1_En_8_Fig4_HTML.gif](Images/A431534_1_En_8_Fig4_HTML.gif)


    Figure 8-4. Two modules having a split package


    Module A and module B contain both the package `myPackage`. Even if the modules
    contain different subpackages, the split package problem is present, because they
    share a package with the same name. The split package arises even if the packages
    arenÔÇÖt exported.


    In this case, the compilation will fail with the following error because we have
    split packages at compile-time:


    ```

    error: module A reads package myPackage from both A and B

    ```


    This error clearly states that the package B is in both module A and module C.


    A split package problem can occur for every type of package, even for packages
    that arenÔÇÖt exported, the so-called concealed packages. If two modules contain
    a package with the same name, an error will occur when we put the modules on the
    module path. It doesnÔÇÖt matter if the packages are exported, open, or concealed.
    The split package problem will occur anyway.


    > **Note:** If a package is neither exported nor open, we can say that the module
    conceals the package.


    ItÔÇÖs also important to mention another aspect. If we develop our own module that
    uses a package name that already exists in one of the platform modules, we have
    the split packages problem too.


    > **Note:** The packages from the platform modules also count in the split package
    problem. This means we canÔÇÖt use in our own module a package that has the same
    name as a package that resides in the existing platform modules.


    ThereÔÇÖs no universal solution to repair the split packages problem. You can choose
    whatever solution you want in order to reach the desired goalÔÇöto not have a package
    or members of a package with the same name in more than one module.


    Suppose we have two third-party JAR files that share a package with the same name.
    Some of the most used solutions to fix the split packages problems include the
    following:


    - **Create a single JAR file out of the two JAR files:** Combine them into a single
    JAR file. If we have two third-party JAR files that share a package with the same
    name, then we could make a single JAR file out of the two by unzipping them in
    the same directory and then zipping the entire directory into a single ZIP file.
    DonÔÇÖt forget to change the suffix of the new ZIP file into a JAR file. In this
    way, we have just one single JAR that can be put into the module path and have
    just one automatic module, not two. The package is now in a single module, and
    the split packages issue is gone.

    - **Check to see whether one of the JARs can be eventually replaced by a different
    one:** If thereÔÇÖs a chance of replacing the JAR with another one, we should at
    least try it.

    - **Rename one of the packages:** Renaming one of the packages is also a solution
    to consider. The probability of success depends on the structure of the classes
    and especially if the classes live in a single namespace or not.


    Until now weÔÇÖve talked about different use cases for JAR files. LetÔÇÖs move on
    to modules. There are three possible solutions that can help getting rid of split
    packages in the case of modules:


    - **Create a single module out of two or more modules:** Combine them into a single
    module. If we have two modules that share a package with the same name, then we
    could eventually redesign our code and have just one module out of the two.

    - **Create a third module:** Another option would be to take the entire packages
    that cause the split package problem from both modules and move them into a third
    new module, which exports the packages we need inside our module. This solution
    is much easier to implement.

    - **Attempt to remove the package dependencies:** This is questionable and can
    be implemented only if you really donÔÇÖt need the dependency anymore.


    YouÔÇÖve seen some suggestions of how to solve the split packages problem. You can
    choose these approaches or implement your own solutions in order to reach the
    goal of not having a package with the same name in more than one module.


    > **Note:** Split package problems can also occur in JAR files that are making
    use of the Service Provider API.


    The JEP 200 states that ÔÇťa non-standard module must not export any standard API
    packages.ÔÇŁ This makes sense because if we have our own module `com.apress.myModule`,
    we shouldnÔÇÖt, for example, export the `java.sql` package, because the `java.sql`
    package is already exported by the `java.sql` platform module. This will result
    in a split package.


    > **Note:** DonÔÇÖt export any standard API from a non-standard module. Otherwise,
    you will have a split package.


    One requirement of the JPMS states that ÔÇťthe Java compiler, virtual machine, and
    runtime system must ensure that modules that contain packages of the same name
    donÔÇÖt interfere with each other. If two distinct modules contain packages of the
    same name then, from the perspective of each module, all of the types and members
    in that package are defined only by that module. Code in that package in one module
    must not be able to access package-private types or members in that package in
    the other module.ÔÇŁ


    > **Note:** When we develop unit test cases in JDK 9, we must be careful not to
    introduce split packages. If we have a specific test module where we put the test
    cases, then when we import types from the module under test in the test module,
    we introduce the split package issue because weÔÇÖll have the same package in two
    different modules.


    The next section talks about another problem that can arise: cyclic dependencies.'
