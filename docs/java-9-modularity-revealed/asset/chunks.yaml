- fmt: "### No Support for Automatic Modules at Link-time\n\nThereÔÇÖs a limitation\
    \ regarding the use of automatic modules at link-time using `Jlink`. ThereÔÇÖs no\
    \ support for automatic modules at link-time, which means that linking automatic\
    \ modules into a runtime image is deliberately not supported. Automatic modules\
    \ canÔÇÖt be used with `Jlink` because they have access to the class path. That\
    \ means that if automatic modules were hypothetically supported by `Jlink`, errors\
    \ of type `NoClassDefFoundError` would have been thrown at runtime.\n\n**Note**\
    \  \nIt isnÔÇÖt possible to create a runtime with `Jlink` unless all the components\
    \ are standard modules (not automatic modules).\n\nThe `ModuleDescriptor` class\
    \ of the new module API contains a method called `isAutomatic()`. This method\
    \ returns `true` if the module is an automatic one and `false` otherwise. We talk\
    \ about the new module API and the API support for automatic modules in the next\
    \ chapter.\n\n**Note**  \nAutomatic modules open all their packages by default\
    \ so we donÔÇÖt need to use the option `--add-opens` when working with automatic\
    \ modules.\n\nNow that weÔÇÖve covered almost everything we need to know about automatic\
    \ modules, itÔÇÖs time to look at the `JDeps` tool, which is an extremely important\
    \ tool used to find dependencies of a library.\n\n## The JDeps Tool\n\nThe Java\
    \ Dependency Analysis Tool (`JDeps`) is a command-line tool used for different\
    \ purposes: to discover all the static dependencies of a library, to discover\
    \ the usages of internal JDK APIs, or to automatically generate a module descriptor\
    \ for a JAR file. The tool was introduced in Java 8 but enhanced in Java 9 with\
    \ some useful new options and features. It can be found in the `bin` directory\
    \ of the JDK. `JDeps` is a very useful tool for migration to Java 9. WeÔÇÖll explain\
    \ why.\n\n### Find Dependencies of Unsupported JDK Internal APIs\n\n`JDeps` has\
    \ an option called `--jdk-internals` that finds dependencies of any unsupported\
    \ JDK internal APIs that are private to the JDK implementation. Its syntax is\
    \ as follows:\n\n```\njdeps --jdk-internals --class-path\n```\n\nAs an input,\
    \ we can specify a JAR file or a `.class` file that will be analyzed.\n\nListing\
    \ [8-2](#A431534_1_En_8_Chapter.html#Par86) shows an example of using `JDeps`\
    \ with the option `--jdk-internals` by taking the Guava library and checking whether\
    \ it has any unsupported APIs.\n\n```\n$ jdeps --jdk-internals guava-19.0.jar\n\
    guava-19.0.jar -> jdk.unsupported\ncom.google.common.cache.Striped64 -> sun.misc.Unsafe\
    \ JDK internal API (jdk.unsupported)\ncom.google.common.cache.Striped64$1 -> sun.misc.Unsafe\
    \ JDK internal API (jdk.unsupported)\ncom.google.common.cache.Striped64$Cell ->\
    \ sun.misc.Unsafe JDK internal API (jdk.unsupported)\ncom.google.common.primitives.UnsignedBytes$LexicographicalComparatorHolder$UnsafeComparator\
    \ -> sun.misc.Unsafe\nJDK internal API (jdk.unsupported)\ncom.google.common.primitives.UnsignedBytes$LexicographicalComparatorHolder$UnsafeComparator$1\
    \ -> sun.misc.Unsafe\nJDK internal API (jdk.unsupported)\ncom.google.common.util.concurrent.AbstractFuture$UnsafeAtomicHelper\
    \ -> sun.misc.Unsafe\nJDK internal API (jdk.unsupported)\ncom.google.common.util.concurrent.AbstractFuture$UnsafeAtomicHelper$1\
    \ -> sun.misc.Unsafe\nJDK internal API (jdk.unsupported)\nWarning: JDK internal\
    \ APIs are unsupported and private to JDK implementation that are\nsubject to\
    \ be removed or changed incompatibly and could break your application.\nPlease\
    \ modify your code to eliminate dependency on any JDK internal APIs.\nFor the\
    \ most recent update on JDK internal API replacements, please check:\nhttps://wiki.openjdk.java.net/display/JDK8/Java+Dependency+Analysis+Tool\n\
    JDK Internal API                         Suggested Replacement\n----------------\
    \                         ---------------------\nsun.misc.Unsafe             \
    \             See http://openjdk.java.net/jeps/260\nListing 8-2.\nRunning jdeps\
    \ --jdk-internals on the JAR File guava-19.0.jar\n```\n\nIn the output we can\
    \ see that `JDeps` finds all the JDK internal libraries that the Guava library\
    \ is using. In our case, it finds the JDK internal class `sun.misc.Unsafe` in\
    \ five different locations, listed in the preceding code.\n\n`JDeps` also suggests\
    \ replacements for the internal APIs found. For `sun.misc.Unsafe` it suggests\
    \ taking a look on the Open JDK website at JEP 260. In general, `JDeps` is capable\
    \ of giving clear information about possible replacements by suggesting the class\
    \ name that could be eventually used instead.\n\nIn order to prepare for using\
    \ Java 9, `JDeps` is very useful because we can check whether our JAR files from\
    \ the class path are making use of JDK internal APIs. It isnÔÇÖt mandatory to replace\
    \ the JDK internal APIs with the ones suggested by `JDeps`. We can replace them\
    \ with whatever library we want. But we should replace them so that we can compile\
    \ and run our application with JDK 9.\n\n**Note**  \n`JDeps` can be applied to\
    \ modules as well."
