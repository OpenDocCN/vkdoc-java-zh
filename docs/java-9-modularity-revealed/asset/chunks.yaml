- fmt: '### Methods


    The most important methods defined by the `Module` class are, according to the
    JDK 9 API specification, the following:


    - `boolean isNamed()`: Returns `true` if the module is a named module and `false`
    otherwise.

    - `String getName()`: Returns the name of the module if the module is a named
    module. If the module is in an unnamed module, it returns `null`.

    - `ClassLoader getClassLoader()`: Returns the `ClassLoader` for this module.

    - `ModuleDescriptor getDescriptor()`: Returns the `ModuleDescriptor` for this
    module if the module is a named module. If the module is an unnamed module, it
    returns `null`.

    - `ModuleLayer getLayer()`: Returns the `ModuleLayer` that contains this module.
    If this module is not in a module layer, it returns `null`. If the module is in
    an unnamed module, `null` is returned.

    - `boolean canRead(Module other)`: Returns `true` if this module reads the module
    given as parameter and `false` otherwise. If our module is an unnamed module,
    then `true` will be always returned, since an unnamed module reads all the modules.

    - `Module addReads(Module other)`: Updates this module to read the given module.

    - `boolean isExported(String packageName)`: Returns `true` if this module exports
    the given package. If our module is in an unnamed module, then `true` is by default
    returned. If the package is opened, then this method returns `true` because an
    opened package is also exported at runtime.

    - `boolean isExported(String packageName, Module other)`: Returns `true` if this
    module exports the given package to at least the given module.

    - `boolean isOpen(String packageName)`: Returns `true` if this module has opened
    the given package. If the module is in an unnamed module, then `true` is always
    returned.

    - `boolean isOpen(String packageName, Module other)`: Returns `true` if this module
    has opened the given package to at least the given module specified as the second
    parameter.

    - `Module addExports(String packageName, Module other)`: Updates this module to
    export the given package to the given module.

    - `Module addOpens(String packageName, Module other)`: Updates this module to
    open the given package to the given module.

    - `Module addUses(Class<?> service)`: Updates this module to add a service dependence
    on the given service type.

    - `boolean canUse(Class<?> service)`: Returns `true` if this module has a service
    dependence on the given service type. If our module is an automatic module or
    is in an unnamed module, the method returns `true` by default.

    - `Set<String> getPackages()`: Returns a set of package names for all the packages
    in this module.

    - `InputStream getResourceAsStream(String name)`: Returns an `InputStream` object
    for reading a resource in this module. The resource is identified by the given
    name.


    ## Changes in java.lang.Class


    The class `java.lang.Class` has been enhanced with three methods in order to better
    fit into the newly added module system. Here are the methods added in Java 9 inside
    the `Class` class, according to the JDK 9 API specification:


    - `Class<?> forName(Module module, String className)`: Returns the `Class` object
    of the given class from the given module.

    - `Module getModule()`: Returns the module that this class or interface is a member
    of.

    - `String getPackageName()`: Returns a `String` representing the name of the package
    of this class.


    ## The ModuleDescriptor class


    The `ModuleDescriptor` class is located inside the `java.lang.module` package
    of the `java.base` module. This class represents a module descriptor of a named
    module. An instance of this class expresses a module descriptor thatÔÇÖs obtained
    from a `module-info.class` file.


    Because a `ModuleDescriptor` object is immutable, obtaining a `ModuleDescriptor`
    object is straightforward. ItÔÇÖs obtained by calling the `getDescriptor()` method
    on the corresponding `Module` object:


    ```

    java.lang.Module myModule = MyClass.class.getModule();

    java.lang.ModuleDescriptor myModuleDescriptor = myModule.getDescriptor();

    ```


    But this is not the only way we can get a `ModuleDescriptor` object. We can create
    a `ModuleDescriptor` using the `build()` method of the `Builder` class, which
    is an inner class of the `ModuleDescriptor` class. Creating a `ModuleDescriptor`
    using the `Builder` class is not the common approach, so we donÔÇÖt cover it in
    this book.


    Note


    A module descriptor canÔÇÖt describe the unnamed module. It describes all the existing
    types of modules except the unnamed module: normal modules, open modules, and
    automatic modules.


    The `ModuleDescriptor` class consists of a set of nested classes, discussed later
    in this section:


    - `ModuleDescriptor.Builder` class

    - `ModuleDescriptor.Exports` class

    - `ModuleDescriptor.Modifier` class

    - `ModuleDescriptor.Opens` class

    - `ModuleDescriptor.Provides` class

    - `ModuleDescriptor.Requires` class

    - `ModuleDescriptor.Version` class


    The instances of four of these nested classes (`ModuleDescriptor.Exports`, `ModuleDescriptor.Opens`,
    `ModuleDescriptor.Provides`, and `ModuleDescriptor.Requires`) represent statements
    that can reside inside a module declaration `module-info.java` file: `exports`,
    `opens`, `provides`, and `requires`.


    WeÔÇÖll continue by looking at some of the attributes defined inside the `ModuleDescriptor`
    class.


    ### ModuleDescriptor Attributes


    The most important attributes defined by the `ModuleDescriptor` class are the
    following, and theyÔÇÖre described more fully in the next subsection:


    - `String name`

    - `Version version`

    - `Set<Modifier> modifiers`

    - `boolean open`

    - `boolean automatic`

    - `Set<Requires> requires`

    - `Set<Exports> exports`

    - `Set<Opens> opens`

    - `Set<String> uses`

    - `Set<Provides> provides`

    - `Set<String> packages`

    - `String mainClass`

    - `static enum Modifier {OPEN, AUTOMATIC, SYNTHETIC, MANDATED}`


    Next up: the most important methods of the `ModuleDescriptor` class.


    ### ModuleDescriptor Methods


    The JDK 9 API specification defines a couple of methods for the `ModuleDescriptor`
    class. The most important methods of the `ModuleDescriptor` class are as follows:


    - `String name()`: Returns the name of the module.

    - `Set<Modifier> modifiers()`: Returns a set of the `Modifier` enum, which represents
    the module modifiers. A `Modifier` enum contains the following values: `OPEN`,
    `AUTOMATIC`, `SYNTHETHIC`, and `MANDATE`. `Modifier.OPEN` denotes an open module.
    `Modifier.AUTOMATIC` represents an automatic module. `Modifier.SYNTHETIC` specifies
    that the module wasnÔÇÖt declared, either explicitly nor implicitly. `Modifier.MANDATED`
    states that the module was implicitly declared.

    - `boolean isOpen()`: Returns `true` if the module is open and `false` otherwise.

    - `boolean isAutomatic()`: Returns `true` if this is an automatic module and `false`
    otherwise.

    - `Set<Requires> requires()`: Returns a set of `Requires` objects that denote
    the dependencies of the module.

    - `Set<Exports> exports()`: Returns a set of `Exports` objects that stand for
    the exported packages of the module.

    - `Set<Opens> opens()`: Returns a set of `Opens` objects that represent the open
    packages.

    - `Set<String> uses()`: Returns a set of `String`s that represent the service
    dependencies of the module.

    - `Set<Provides> provides()`: Returns a set of `Provides` objects that expresses
    the services provided by the module.

    - `Optional<Version> version()`: Returns the version of the module.

    - `String toNameAndVersion()`: Returns the module name and the version formatted
    as `<module_name>@<version>`.

    - `Optional<String> mainClass()`: Returns the `main` class of the module.

    - `Set<String> packages()`: Returns a set of `String`s that expresses the packages
    from the module.


    The following sections focus on the nested classes of the `ModuleDescriptor` class.'
