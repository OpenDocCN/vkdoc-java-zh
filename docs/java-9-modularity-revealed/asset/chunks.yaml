- fmt: '### No Versioning in Jigsaw


    Versioning is not supported in Project Jigsaw. The JCP team included versioning
    in the first releases of Jigsaw but then decided to leave it out due to the complexity
    and complications that subsequently occurred. The decision was based on the fact
    that build tools like `Gradle` or `Maven` have better mechanisms to handle this
    complicated problem. Project Jigsaw relies on these build tools for solving versioning
    resolution or dealing with different conflicts. Jigsaw allows you to declare a
    version in the meta information of a module, but this version isnÔÇÖt taken into
    account by the module system. Chapter [10](../Text/A431534_1_En_10_Chapter.html)
    talks about layers, and youÔÇÖll learn how Jigsaw can load two different versions
    of a module. Hence, these are all the features that Jigsaw brings for versioning.
    For instance, declaring in a module declaration that a module depends only on
    a specific version of another module isnÔÇÖt supported.


    ## Backward Compatibility


    Having backward compatibility to older versions of the JDK was a critical topic
    during the design of JDK 9. The JCP team states, ÔÇťif an application uses only
    supported APIs and works on release X, then it should work on release X+1 even
    without performing a recompilation.ÔÇŁ Fixing the incompatibilities inside the source
    code is mandatory in order to make a Java software application work after moving
    to Java 9.


    The requirements of Project Jigsaw, published on the Open JDK page, state: ÔÇťIt
    must be possible to divide an existing Java Platform, Java SE or Java EE, into
    a set of modules such that existing libraries can run without change, so long
    as they use only standard platform APIs.ÔÇŁ Java applications will be backward-compatible
    with versions prior to JDK 9 as long as they use only standard platform APIs.
    If theyÔÇÖre using other APIs besides the standard ones, thereÔÇÖs no guarantee theyÔÇÖll
    work in JDK 9.


    Some compatibility problems could appear for applications or libraries that use
    core reflection to gain access to JDK internal types. For the builds to work,
    using the command-line flag `--add-exports` is mandatory in order to break encapsulation.
    This command-line option is covered in Chapter [8](../Text/A431534_1_En_8_Chapter.html).


    Another issue can occur when an existing library from the class path has a reference
    to a type in a non-exported package that belongs to an explicit module. In order
    to solve it, using the class path in combination with the module path is required.
    In upcoming chapters youÔÇÖll learn how to achieve that. ItÔÇÖs important to remember
    that, for having backward compatibility, the class path can be further used in
    JDK 9.


    Nevertheless, in order to provide backward compatibility, the three class loaders
    are still present in JDK 9. Chapter [10](../Text/A431534_1_En_10_Chapter.html)
    talks about them.


    ## Platform Modularization


    One of the most important roles of Project Jigsaw is to split the JDK into modules,
    explained in detail in Chapter [3](../Text/A431534_1_En_3_Chapter.html). The resulting
    modules can be divided into three distinct categories: standard modules, JDK-specific
    modules, and JDK-internal modules.


    Before Java 9, `rt.jar` contained many publicly accessible APIs that were planned
    for public use. It was possible to use them when writing your own code. Among
    the publicly accessible APIs there are plenty that are part of the standard Java
    SE. These packages start with `java.*` and `javax.*` and are specified by JCP.
    Other packages that form the publicly accessible APIs, but are not part of the
    standard Java SE, are the `jdk.*` and `com.sun.*` packages. These packages are
    not part of the standard Java SE because theyÔÇÖre intended to be used by tools
    that interact with the Java Virtual Machine, for instance. It doesnÔÇÖt make sense
    to make them part of the standard Java Standard Edition.


    Besides the supported APIs, there are also unsupported APIs. Most of them reside
    in the `sun.*` package. TheyÔÇÖre not meant to be used publicly. A survey organized
    by Oracle revealed that the most popular unsupported APIs are `sun.misc.Base64Encoder`,
    `sun.misc.Unsafe`, and `sun.misc.Base64Decoder`. Oracle classified the APIs based
    on their usage and organized them into critical and non-critical. The non-critical
    APIs have very little usage outside the JDK.


    ## New Structure of the JRE and JDK


    In order to provide the means for creating runtime images, the binary structure
    of the JDK and JRE was changed in Java 9. Due to the introduction of modules,
    thereÔÇÖs no difference between the JDK and the JRE. Every tool that depends on
    `rt.jar` had to be changed in order to work further properly in Java 9.


    Figure [2-2](#A431534_1_En_2_Chapter.html#Fig2) illustrates the old structure
    of the JDK and JRE, prior to Java 9.


    ![A431534_1_En_2_Fig2_HTML.gif](Images/A431534_1_En_2_Fig2_HTML.gif)


    Figure 2-2. The structure of the JDK prior to Java 9


    Before JDK 9, there were two `bin` and two `lib` directories. The `lib` directory
    from the top level contained classes for tools, and the `lib` directory from the
    `jre` directory contained the runtime classes. The `lib` directory also contained
    configuration files, security policy files, and other types of files.


    Figure [2-3](#A431534_1_En_2_Chapter.html#Fig3) shows which files and directories
    have been completely removed in JDK 9: the `jre` directory, the `tools.jar` file,
    and the `rt.jar` file.


    ![A431534_1_En_2_Fig3_HTML.gif](Images/A431534_1_En_2_Fig3_HTML.gif)


    Figure 2-3. The `jre` directory, `tools.jar`, and `rt.jar` were removed in JDK
    9


    Figure [2-4](#A431534_1_En_2_Chapter.html#Fig4) depicts the final structure of
    the JDK 9.


    ![A431534_1_En_2_Fig4_HTML.gif](Images/A431534_1_En_2_Fig4_HTML.gif)


    Figure 2-4. The new layout of JDK 9


    As you can see, the `jre` directory doesnÔÇÖt exist anymore, and a new `conf` directory
    was added. The `conf` directory contains the configuration files that customize
    the JDK or the runtime. It contains only the files that should be edited. The
    files that should not be edited are not located in the `conf` directory anymore.
    This is important because the new layout provides a clear separation between the
    configuration files that are allowed to be changed and the ones that arenÔÇÖt. In
    the past it was a risk to change a configuration file because you couldnÔÇÖt know
    in advance if you were even allowed to change it, meaning the application might
    not start anymore.


    The `rt.jar` and `tools.jar` files have been completely removed. The `bin` directory,
    which is now a single one, contains all the launchers. The new format of the JDK
    is more suitable for future optimizations than the old format.'
  raw: '### No Versioning in Jigsaw


    Versioning is not supported in Project Jigsaw . The JCP team included versioning
    in the first releases of Jigsaw but then decided to leave it out due to the complexity
    and complications that subsequently occurred. The decision was based on the fact
    that build tools like Gradle or Maven have better mechanisms to handle this complicated
    problem. Project Jigsaw relies on these build tools for solving versioning resolution
    or dealing with different conflicts. Jigsaw allows you to declare a version in
    the meta information of a module, but this version isnÔÇÖt taken into account by
    the module system. Chapter [10](../Text/A431534_1_En_10_Chapter.html) talks about
    layers, and youÔÇÖll learn how Jigsaw can load two different versions of a module.
    Hence, these are all the features that Jigsaw brings for versioning. For instance,
    declaring in a module declaration that a module dependends only on a specific
    version of another module isnÔÇÖt supported.


    ## Backward Compatibility


    Having backward compatibility to older versions of the JDK was a critical topic
    during the design of JDK 9\. The JCP team states, ÔÇťif an application uses only
    supported APIs and works on release X, then it should work on release X+1 even
    without performing a recompilation.ÔÇŁ Fixing the incompatibilities inside the source
    code is mandatory in order to make a Java software application work after moving
    to Java 9.


    The requirements of Project Jigsaw, published on the Open JDK page, state: ÔÇťIt
    must be possible to divide an existing Java Platform, Java SE or Java EE, into
    a set of modules such that existing libraries can run without change, so long
    as they use only standard platform APIs.ÔÇŁ Java applications will be backward-compatible
    with versions prior to JDK 9 as long as they use only standard platform APIs.
    If theyÔÇÖre using other APIs besides the standard ones, thereÔÇÖs no guarantee theyÔÇÖll
    work in JDK 9.


    Some compatibility problems could appear for applications or libraries that use
    core reflection to gain access to JDK internal types. For the builds to work,
    using the command-line flag `--add-exports` is mandatory in order to break encapsulation.
    This command-line option is covered in Chapter [8](../Text/A431534_1_En_8_Chapter.html).


    Another issue can occur when an existing library from the class path has a reference
    to a type in a non-exported package that belongs to an explicit module. In order
    to solve it, using the class path in combination with the module path is required.
    In upcoming chapters youÔÇÖll learn how to achieve that. ItÔÇÖs important to remember
    that, for having backward compatibility, the class path can be further used in
    JDK 9.


    Nevertheless, in order to provide backward compatibility , the three class loaders
    are still present in JDK 9\. Chapter [10](../Text/A431534_1_En_10_Chapter.html)
    talks about them.


    ## Platform Modularization


    One of the most important roles of Project Jigsaw is to split the JDK into modules,
    explained in detail in Chapter [3](../Text/A431534_1_En_3_Chapter.html). The resulting
    modules can be divided into three distinct categories: standard modules, JDK-specific
    modules, and JDK-internal modules.


