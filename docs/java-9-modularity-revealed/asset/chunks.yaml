- fmt: '# Apache Maven Compiler Plugin


    The Apache Maven Compiler plugin offers support for the new Java Platform Module
    System starting with version 3.6.0, released in October 2016.


    The version of the Apache Maven Compiler plugin can be specified directly in the
    pluginÔÇÖs configuration:


    ```

    org.apache.maven.plugins

    maven-compiler-plugin

    3.6.0

    ```


    Version 3.6.0 of the Apache Maven Compiler plugin added support for the module
    path. As we already know, the Maven Compiler plugin has two goals: `compile` and
    `test-compile`. During the compile phase, when a `module-info.java` file is found,
    the plugin will automatically switch to the module path. During the `test-compile`
    phase, the plugin will switch to the module path for the main sources and to the
    class path for the test sources.


    **Note:** The Maven team also added support for specifying flags like `--add-modules`
    or `--add-exports` directly inside the `pom.xml` configuration.


    For instance, if we want to use the `--add-modules` flag to add the module `java.xml.bind`
    using the Maven Compiler plugin, we could define this inside the configuration
    of the Maven Compiler plugin:


    ```

    --add-modules

    java.xml.bind

    ```


    We could also use Maven to make the `sun.net` package from module `java.base`
    available to our module `com.apress.myModule`:


    ```

    --add-exports

    java.base/sun.net=com.apress.myModule

    ```


    Listing [12-2](#A431534_1_En_12_Chapter.html#Par75) shows the entire configuration
    of the plugin for the two use cases mentioned earlier:


    ```

    maven-compiler-plugin

    3.6.0


    example


    compile


    --add-exports

    java.base/sun.net=com.apress.myModule

    --add-modules

    java.xml.bind


    Listing 12-2.

    Adding Compiler Arguments to the Maven Compiler Plugin

    ```


    In this example, we defined the version of the `maven-compiler-plugin` to be 3.6.0.
    Inside the `<compilerArgs>` XML tag, we specified arguments that we want to be
    passed to the compiler. Each argument is specified inside the `<arg>` XML tag.


    ## Backward Compatibility


    During migration to Java 9, projects written in a Java version <8 will get a `module-info.java`
    file. With Maven, itÔÇÖs possible to compile these projects in Java 9 (taking the
    `module-info.java` file into account) or compile them in versions prior to Java
    9.


    For this, two compilations have to be made:


    - The first compilation will be executed by the Maven Compiler plugin using the
    configuration `<release>9</release>`.

    - The second compilation will be executed by the Maven Compiler plugin using a
    configuration lower than 9, for instance: `<source>1.8</source> and <target>8</target>`.


    This can be easily executed by the Maven Compiler in two different execution blocks.
    If we want to be compatible with a version prior to JDK 6, we have to use different
    JDKs. ThatÔÇÖs because JDK 9 doesnÔÇÖt support compilation for versions prior to JDK
    6.


    The Maven Compiler plugin also offers support for JEP 247 ÔÇô Compile for Older
    Platform Versions. It allows us to add a `module-info.java` file for Java 9 projects
    and also be compatible with earlier versions of Java. For this, we need to call
    `javac` twice. First we need to call `javac` with `release=9` in order to compile
    the `module-info.java` file with JDK 9. Then we need to set the `source` and `target`
    to a lower version of Java in order to compile the rest of the source code with
    a lower Java version. If weÔÇÖre using at least Maven version 3.3.1, we can use
    toolchains for achieving this use case.


    For instance, if our `JAVA_HOME` environment variable is lower than or equal to
    JDK 9, we can set the version of the `jdkToolchain` to 9 in order to compile everything,
    including the `module-info.java` file:


    ```


    ```


    Subsequently, we recompile the files and exclude the `module-info.java` file:


    ```


    module-info.java

    ```


    On the other side, if our `JAVA_HOME` environment variable is equal to JDK 9,
    then we could set the version of the `<jdkToolchain>` to `[1.5,9)` and compile
    the files with `<source>` and `<target>` = 1.5:


    ```

    [1.5,9)


    1.5

    1.5

    ```


    **Note:** As a rule, we should compile with the matching JDK version.


    To configure the Maven Toolchain plugin, we could edit the `toolchains.xml` file
    in the `.m2` folder or, if weÔÇÖre using a version of Maven greater of equal to
    3.3.1, we could directly edit the `toolchains.xml` file inside the Maven conf
    directory.


    Maven also defines a new command-line option `--release`, which lets us pass the
    version of the JDK release that we want to compile with. For example, the option
    `--release 8` is equivalent to `-source 8 -target 8 -bootclasspath ...`. The Maven
    Compiler plugin starting with version 3.6.0 specifies the release version like
    this:


    ```

    release_version

    ```


    The `<release>` tag configuration has greater precedence over the `<source>` and
    `<target>` tags. As a result, if we specify the `<release>` tag as well as the
    `<source>` and `<target>` tags, then the `<release>` tag will be taken into consideration.


    **Note:** Version 3.6.1 of the Apache Maven Compiler plugin was introduced in
    January 2017.


    We would also like to recommend an interesting article written by Robert Scholte,
    the chairman of the Maven project, which explains why Maven is unable to automatically
    generate the `module-info.java` file. You can read it at [`www.sitepoint.com/maven-cannot-generate-module-declaration/`](http://www.sitepoint.com/maven-cannot-generate-module-declaration/).


    ## Summary


    In this chapter we saw what kind of support IDEs and build tools provide for Jigsaw.
    We started by briefly talking about three IDEs: Intellij IDEA, Eclipse, and NetBeans.


    Then we switched to build tools and looked at the support Maven provides for JDK
    9. We talked about backward compatibility with Maven and learned how the Java
    Compiler is called twiceÔÇöonce because the `module-info.java` file has to be compiled
    with `--release 9`, and once again so that all the Java sources except `module-info.java`
    are compiled with `source` and target less than 9. We also learned about the Maven
    JDeps plugin, which is used to find usages of JDK internal APIs throughout our
    code.'
