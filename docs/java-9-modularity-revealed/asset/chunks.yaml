    \ jdk.packager jdk.plugin.dom jdk.plugin.server jdk.security.jgss jdk.policytool\
    \ jdk.rmic jdk.scripting.nashorn jdk.scripting.nashorn.shell jdk.sctp jdk.security.auth\
    \ jdk.snmp jdk.xml.bind jdk.xml.ws jdk.zipfs oracle.desktop oracle.net\"\nOS_ARCH=\"\
    x86_64\"\nOS_NAME=\"Windows\"\nSOURCE=\".:a4371edb589c+ closed:3b9bef864bcf corba:c72e9d3823f0\
