- fmt: '# 6. Services


    A service is basically a piece of functionality defined by an interface or a class
    for which service providers exist. The role of services is to decouple tightly
    coupled modules and to allow loose coupling between service providers and service
    consumers. Using services in JDK 9 isnÔÇÖt mandatory, but they offer a nice solution
    for having decoupled modules.


    Suppose we want to test the brake systems for different types of cars. A brake
    service could define general guidelines, legal rules, and best practices for testing
    the brake systems. The car manufacturers could implement their own services for
    testing the brake systems in their cars, because each brake system is different
    from model to model. These services are called service providers, because they
    provide specific implementations for the brake service. Internal tools used by
    car manufacturers for visualizing and analyzing the functions in a car could use
    the brake service. These are called service consumers because they use, or consume,
    the service.


    The basic idea behind services in Jigsaw is that in a module we donÔÇÖt want to
    expose our implementation class, but only something thatÔÇÖs being exposed through
    an interface. This leads to the following question: how can we implement this
    in the Java Platform Module System of Java 9? The answer is straightforward: we
    can use an interface as a contract.


    Before digging into that answer, letÔÇÖs briefly look at what services are and how
    they work in Java 9. A service can consist of both interfaces and classes that
    specify the functionality of the service. A service provider implements a service.
    Multiple service providers can implement a service by providing custom implementations
    of it.


    To provide a separation and a decoupling between service providers and service
    consumers, Java provides the `ServiceLoader<S>` class in package `java.util` of
    module `java.base`. This class wasnÔÇÖt introduced in Java 9. It existed in Java
    since JDK 6 but has been enhanced in JDK 9 in order to support modules. Its role
    is to search, find, and load all the service providers for a service of type `S`.
    This is performed at runtime, not at compile-time. Application code invokes only
    the service and doesnÔÇÖt refer to service providers.


    Imagine that each three of the biggest German car manufacturersÔÇöVolkswagen, Daimler,
    and BMWÔÇöhas its own service providers that implement a service called `brake system`.
    The service `brake system` provides the legal rules that a car brake system must
    fulfill. Because the brake systems produced by car manufacturers differ, each
    of them decided to provide its own implementations of the `brake system` rule
    by adhering to its prescription. Each manufacturer decided to build tools for
    being able to visualize the output generated by its brake systems. These tools
    act like service consumers and theyÔÇÖre aware only of the service `brake system`.
    TheyÔÇÖre not aware of the service providers that implement the braking system service
    interface. What makes the interaction between service providers and service consumers
    possible, since theyÔÇÖre not aware of each other? Here comes the `ServiceLoader`
    in play. It makes the instances of services providers available to service consumers.
    In our case, `ServiceLoader` makes the different implementations of the `brake
    system` service available to the data visualizing tools.


    **Note:** `ServiceLoader`ÔÇÖs role is to find and load all the service providers
    and make them accessible to service consumers.


    Now letÔÇÖs move to the modular world and explain how the concepts just presented
    fit in the new Java Platform Module System. In a modular context, we could use
    a provider module that has the role of registering a service on the service registry.
    Additionally we could make use of a consumer module that has the role of performing
    lookups for a service in the service registry.


    **Note:** The service registry returns a service instance to the consumer module.


    Even if we use modules, the workflow is the same as we know from the non-modular
    world. First, a provider registers a service or an interface. Second, a consumer
    searches a registry for any implementations of the interface. When any implementations
    are found, they can call upon the service via the interface without having to
    know about the concrete implementation.


    The `ServiceLoader` API is used to decouple modules. A module should depend on
    an interface rather than on the implementation of another module. The implementation
    classes should not be exported. Instead, an interface should be exported. One
    of the strong features of the `ServiceLoader` API is that the system doesnÔÇÖt need
    to know about all the service provider implementations right at compile-time.
    TheyÔÇÖre computed only at runtime. So at compile-time this kind of dependency between
    modules doesnÔÇÖt need to be declared inside module declarations.


    ## Strong Coupling Between Modules


    In Chapter 4 you learned what the `requires` and `exports` clauses mean. When
    a module requires another module, a strong coupling between the two modules occurs.
    If a module changes, then it may be necessary to adjust all the dependent modules.
    This not only makes the source code much harder to maintain, it can also considerably
    increase the time interval needed for implementing change requests in the code.


    LetÔÇÖs illustrate the strong coupling between modules with an explanatory example.
    We know from the module declaration of module `java.rmi` that it requires module
    `java.logging`. Module `java.rmi` has a dependency on module `java.logging` and
    also has access to the public types in the API exported by the `java.logging`
    module. As a result, thereÔÇÖs a strong and tight coupling between the modules `java.rmi`
    and `java.logging`. This has an important impact at both compile-time and runtime.


    At compile-time, if the `java.logging` module isnÔÇÖt found, the `java.rmi` module
    canÔÇÖt be built. A `module not found error` will be thrown at compile-time.


    At runtime, if `java.logging` isnÔÇÖt found, no application that depends on `java.rmi`
    can start. This happens because the dependency of `java.rmi` on `java.logging`
    isnÔÇÖt resolved. The following error will be thrown:


    ```

    Error occurred during initialization of VM

    java.lang.module.ResolutionException: Module java.logging not found, required
    by java.rmi

    at java.lang.module.Resolver.fail(java.base@9-ea/Resolver.java:841)

    at java.lang.module.Resolver.resolve(java.base@9-ea/Resolver.java:154)

    at java.lang.module.Resolver.resolveRequires(java.base@9-ea/Resolver.java:116)

    at java.lang.module.Configuration.resolveRequiresAndUses(java.base@9-ea/Configuration.java:311)

    at java.lang.module.ModuleDescriptor$1.resolveRequiresAndUses(java.base@9-ea/ModuleDescriptor.java:2483)

    at jdk.internal.module.ModuleBootstrap.boot(java.base@9-ea/ModuleBootstrap.java:272)

    at java.lang.System.initPhase2(java.base@9-ea/System.java:1927)

    ```'
