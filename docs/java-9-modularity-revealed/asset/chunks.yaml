- fmt: "### Cyclic Dependencies\n\nA cyclic dependency is a relation between two or\
    \ more modules expressed by the fact that the modules depend on each other, either\
    \ directly or indirectly. Cyclic dependencies are considered anti-patterns. They\
    \ arenÔÇÖt allowed at compile-time in Java 9. If two modules contain a cyclic dependency,\
    \ the compilation will fail. Jigsaw deliberately imposes a cyclic dependency check\
    \ during compilation. The requirement imposed by the Java Platform Module System\
    \ is severe: no cycle dependencies are allowed in the module graph.\n\nHowever,\
    \ cyclic dependencies are allowed at runtime, but only after the module graph\
    \ is already resolved. We refer here to the `reads` relations of runtime modules,\
    \ which are allowed at runtime. Cyclic dependencies arenÔÇÖt allowed at compile-time,\
    \ link-time, and runtime when the module graph is resolved for the first time.\
    \ But at runtime, you can add readability edges using the command-line option\
    \ `--add-reads`. At runtime, you can introduce a cyclic dependency using the `--add-reads`\
    \ option because the module graph has already been resolved before and because\
    \ weÔÇÖre at runtime, not at compile-time.\n\nThe reasons for interdicting cyclic\
    \ dependencies are justified: to simplify the module system or to make the module\
    \ graph more understandable. Two modules that require each other would be better\
    \ represented as a single module.\n\nCyclic dependencies can occur often for automatic\
    \ modules, for instance. Because automatic modules imply readability to all other\
    \ modules, the likelihood of getting two modules that depend on each other isnÔÇÖt\
    \ low.\n\n**Note**  \nCyclic dependencies between modules are forbidden during\
    \ compilation. Cyclic dependencies between classes are allowed just inside of\
    \ a single class, not between distinct modules.\n\nChapter [4](../Text/A431534_1_En_4_Chapter.html)\
    \ had an example of cyclic dependency in our module declaration. Cyclic dependencies\
    \ can be solved by using interfaces to decouple the coupling between modules.\
    \ A module should depend on an interface, not on another module. This can be implemented\
    \ using the Service Provider API described in Chapter [6](../Text/A431534_1_En_6_Chapter.html).\
    \ What we need to do is to implement Service consumers and Service providers to\
    \ decouple the coupling between modules.\n\n**Note**  \nThereÔÇÖs an official proposal\
    \ to allow cyclic relationships amongst modules at runtime, but not at compile-time.\
    \ ItÔÇÖs unclear when this proposal will be implementedÔÇöpossible in JDK 10. Allowing\
    \ cyclic relationships at runtime will help solve some problems that can arise\
    \ especially for very large applications, where the probability of having cycles\
    \ is much higher.\n\nWe covered the cyclic dependencies issue in this section.\
    \ The next section covers the new versioning scheme introduced in JDK 9.\n\n###\
    \ New Versioning Scheme\n\nJava 9 introduces a new format to define the version.\
    \ This matters for a migration point of view because code that relies on the old\
    \ string format will break. The maintainers of the Hadoop library had to fix the\
    \ Hadoop library because it was broken in JDK 9 due to the introduction of the\
    \ new version format:\n\n```\nSystem.getProperty(\"java.version\").substring(0,\
    \ 3).compareTo(\"1.7\") >= 0\n```\n\nThis piece of code isnÔÇÖt working on JDK 9\
    \ anymore, because the version is no longer represented as `1.7`. Instead of `1.7`,\
    \ the new version could have a format similar to `7` (containing only the major\
    \ version) or `7.1.1` (containing the major version, minor version, and security\
    \ version).\n\nThe format of the new version string is as follows:\n\n- `$MAJOR`\
    \ serves as the major version of a JDK release.\n- `$MINOR` serves as the minor\
    \ version of a JDK release.\n- `$SECURITY` serves as a security-related release\
    \ of the JDK.\n\n```\n$MAJOR.$MINOR.$SECURITY.$PATCH\n```\n\nThe changes affect\
    \ not only `java -version`, but also the following system properties: `java.runtime.version`,\
    \ `java.vm.version`, `java.specification.version`, and `java.vm.specification.version`.\n\
    \nWe know how the new version looks in JDK 9, so letÔÇÖs move on and see what methods\
    \ were removed in JDK 9.\n\n### Removed Methods in JDK 9\n\nThe following methods\
    \ have been completely removed in Java 9:\n\n- `java.util.logging.LogManager.addPropertyChangeListener`\n\
    - `java.util.logging.LogManager.removePropertyChangeListener`\n- `java.util.jar.Pack200.Packer.addPropertyChangeListener`\n\
    - `java.util.jar.Pack200.Packer.removePropertyChangeListener`\n- `java.util.jar.Pack200.Unpacker.addPropertyChangeListener`\n\
    - `java.util.jar.Pack200.Unpacker.removePropertyChangeListener`\n\nWe should make\
    \ sure not to use these six methods in Java 9ÔÇöotherwise our code will break at\
    \ compile-time. The probability of having at least one of these six methods in\
    \ our code is low.\n\nAnother change in JDK 9, with a definitely greater impact,\
    \ is the removal of the runtime `rt.jar` and of `tools.jar` and `dt.jar`.\n\n\
    ### Removal of rt.jar, tools.jar, and dt.jar\n\nChapter [2](../Text/A431534_1_En_2_Chapter.html)\
    \ talked about the removal of the `rt.jar`, `tools.jar`, and `dt.jar` in JDK 9.\
    \ This can have a consequence on our code if we make assumptions throughout our\
    \ code based on one of these three JAR files. But the impact is greater on tools\
    \ rather than on our own code.\n\nCalling the `ClassLoader::getSystemResource()`\
    \ method in JDK 9 wonÔÇÖt return a URL to a JAR file. Instead, it will return a\
    \ valid URL.\n\nIf we call the method `getSystemResource()` with the parameter\
    \ `java/lang/Class.class`,\n\n```\nClassLoader.getSystemResource(\"java/lang/Class.class\"\
    )\n```\n\nThe following URL will be returned:\n\n```\njrt:/java.base/java/lang/Class.class\n\
    ```\n\nWe have to be aware of these new changes and check if our code expects\
    \ to receive this URL in a specific format, which may now not be the same.\n\n\
    LetÔÇÖs move to the next section, where we show migration strategies for migrating\
    \ a Java application to Java 9.\n\n## Migrating an Application to Java 9\n\nThis\
    \ chapter describes the process of migrating an application to Java 9 using the\
    \ top-down approach. There are basically two types of migration we can perform\
    \ when we decide to migrate our existing Java application, together with its dependencies,\
    \ to Java 9: top-down migration and bottom-up migration.\n\nThe main difference\
    \ between the two approaches is that application migration migrates the application\
    \ first. By contrast, library migration starts migrating the libraries first,\
    \ rather than the application.\n\n**Note**  \nIn Chapter [4](../Text/A431534_1_En_4_Chapter.html)\
    \ you learned what an unnamed module is. It is important to remember the following\
    \ rule: code that exists in a named module canÔÇÖt access anything on the class\
    \ path!"
  raw: '### Cyclic Dependencies


    A cyclic dependency is a relation between two or more modules expressed by the
    fact that the modules depend on each other, either directly or indirectly. Cyclic
    dependencies are considered anti-patterns. They arenÔÇÖt allowed at compile-time
    in Java 9\. If two modules contain a cyclic dependency, the compilation will fail.
    Jigsaw deliberately imposes a cyclic dependency check during compilation. The
    requirement imposed by the Java Platform Module System is severe: no cycle dependencies
    are allowed in the module graph.


    However, cyclic dependencies are allowed at runtime, but only after the module
    graph is already resolved. We refer here to the `reads` relations of runtime modules,
    which are allowed at runtime. Cyclic dependencies arenÔÇÖt allowed at compile-time,
    link-time, and runtime when the module graph is resolved for the first time. But
    at runtime, you can add readability edges using the command-line option `--add-reads`.
    At runtime, you can introduce a cyclic dependency using the `--add-reads` option
    because the module graph has already been resolved before and because weÔÇÖre at
    runtime, not at compile-time.


    The reasons for interdicting cyclic dependencies are justified: to simplify the
    module system or to make the module graph more understandable. Two modules that
    require each other would be better represented as a single module.


    Cyclic dependencies can occur often for automatic modules, for instance. Because
    automatic modules imply readability to all other modules, the likelihood of getting
    two modules that depend on each other isnÔÇÖt low.


    Note


    Cyclic dependencies between modules are forbidden during compilation. Cyclic dependencies
    between classes are allowed just inside of a single class, not between distinct
    modules.


    Chapter [4](../Text/A431534_1_En_4_Chapter.html) had an example of cyclic dependency
    in our module declaration. Cyclic dependencies can be solved by using interfaces
    to decouple the coupling between modules. A module should depend on an interface,
    not on another module. This can be implemented using the Service Provider API
    described in Chapter [6](../Text/A431534_1_En_6_Chapter.html). What we need to
    do is to implement Service consumers and Service providers to decouple the coupling
    between modules.


    Note


    ThereÔÇÖs an official proposal to allow cyclic relationships amongst modules at
    runtime, but not at compile-time. ItÔÇÖs unclear when this proposal will be implementedÔÇöpossible
    in JDK 10\. Allowing cyclic relationships at runtime will help solve some problems
    that can arise especially for very large applications, where the probability of
    having cycles is much higher.


    We covered the cyclic dependencies issue in this section. The next section covers
    the new versioning scheme introduced in JDK 9.


    ### New Versioning Scheme


    Java 9 introduces a new format to define the version. This matters for a migration
    point of view because code that relies on the old string format will break. The
    maintainers of the Hadoop library had to fix the Hadoop library because it was
    broken in JDK 9 due to the introduction of the new version format:


    ```

    System.getProperty("java.version").substring(0, 3).compareTo("1.7") >= 0

    ```


    This piece of code isnÔÇÖt working on JDK 9 anymore, because the version is no longer
    represented as 1.7\. Instead of 1.7, the new version could have a format similar
    to 7 (containing only the major version) or 7.1.1 (containing the major version,
    minor version, and security version).


    The format of the new version string is as follows:


    *   `$MAJOR` serves as the major version of a JDK release.

    *   $`MINOR` serves as the minor version of a JDK release.

    *   $`SECURITY` serves as a security-related release of the JDK.


    ```

    $MAJOR.$MINOR.$SECURITY.$PATCH

    ```


    The changes affect not only `java -version`, but also the following system properties:
    `java.runtime.version`, `java.vm.version`, `java.specification.version`, and `java.vm.specification.version`.


    We know how the new version looks in JDK 9, so letÔÇÖs move on and see what methods
    were removed in JDK 9.


    ### Removed Methods in JDK 9


    The following methods have been completely removed in Java 9:


    *   `java.util.logging.LogManager.addPropertyChangeListener`

    *   `java.util.logging.LogManager.removePropertyChangeListener`

    *   `java.util.jar.Pack200.Packer.addPropertyChangeListener`

    *   `java.util.jar.Pack200.Packer.removePropertyChangeListener`

    *   `java.util.jar.Pack200.Unpacker.addPropertyChangeListener`

    *   `java.util.jar.Pack200.Unpacker.removePropertyChangeListener`


    We should make sure not to use these six methods in Java 9ÔÇöotherwise our code
    will break at compile-time. The probability of having one at least one of these
    six methods in our code is low.


    Another change in JDK 9, with a definitely greater impact, is the removal of the
    runtime rt.jar and of tools.jar and dt.jar .


    ### Removal of rt.jar, tools.jar, and dt.jar


    Chapter [2](../Text/A431534_1_En_2_Chapter.html) talked about the removal of the
    rt.jar, tools.jar, and dt.jar in JDK 9\. This can have a consequence on our code
    if we make assumptions throughout our code based on one of these three JAR files.
    But the impact is greater on tools rather than on our own code.


    Calling the `ClassLoader::getSystemResource()` method in JDK 9 wonÔÇÖt return an
    URL to a JAR file. Instead, it will return a valid URL.


    If we call the method `getSystemResource()` with the parameter `java/lang/Class.class`,


    ```

    ClassLoader.getSystemResource("java/lang/Class.class")

    ```


    The following URL will be returned:


    ```

    jrt:/java.base/java/lang/Class.class

    ```


    We have to be aware of these new changes and check if our code expects to receive
    this URL in a specific format, which may now not be the same.


    LetÔÇÖs move to the next section, where we show migration strategies for migrating
    a Java application to Java 9.


    ## Migrating an Application to Java 9


    This chapter describes the process of migrating an application to Java 9 using
    the top-down approach. There are basically two types of migration we can perform
    when we decide to migrate our existing Java application, together with its dependencies,
    to Java 9: top-down migration and bottom-up migration.


    The main difference between the two approaches is that application migration migrates
    the application first. By contrast, library migration starts migrating the libraries
    first, rather than the application.


    Note


    In Chapter [4](../Text/A431534_1_En_4_Chapter.html) you learned what an unnamed
    module is. It is important to remember the following rule: code that exists in
    a named module canÔÇÖt access anything on the class path!'
