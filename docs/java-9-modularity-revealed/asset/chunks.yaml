- fmt: '# 12. Integration with Tools


    In order for Java 9 to be adopted easily and as quickly as possible by the developer
    community, itÔÇÖs very important for the integrated development environments (IDEs)
    and build tools to offer extensive support for Java 9 as much as possibleÔÇöso important
    that we dedicate this entire chapter to this topic.


    This last chapter shows how JDK 9 in general and the Java Platform Module System
    in particular integrates with the following:


    - IDEs like Intellij IDE, Eclipse, and NetBeans

    - Build tools like Apache Maven


    WeÔÇÖll discover what kinds of support these tools offer for Jigsaw.


    ## Integration with IDEs


    Jigsaw is already integrated in IDEs like Intellij IDEA, Eclipse, and Netbeans.
    The next three subsections cover what kind of support these IDEs offer to make
    the work with Jigsaw easier for developers. WeÔÇÖll start with Intellij IDEA.


    Note: Intellij IDEA, Eclipse, and NetBeans are among the most popular IDEs for
    Java programming according to an article published on July 2017, at [`www.keycdn.com/blog/best-ide/`](http://www.keycdn.com/blog/best-ide/).
    So we decided to focus on these three IDEs in this chapter instead of other IDEs
    that donÔÇÖt especially focus on the Java programming language.


    ### Integration with Intellij IDEA


    Intellij IDEA, developed by JetBrains, is a Java IDE that has both a community
    edition and a commercial edition. It offers support for Project Jigsaw starting
    from version 2017.1, released in March 2017. Among its many features, IDEA supports
    code completion inside the `module-info.java` module descriptor file.


    Figure 12-1 shows how we can create a `module-info.java` file in Intellij IDEA
    by selecting New Ô×Ą `module-info.java`.


    ![A431534_1_En_12_Fig1_HTML.jpg](Images/A431534_1_En_12_Fig1_HTML.jpg)


    Figure 12-1. Add a `module-info.java` in Intellij IDEA


    IDEA creates an empty `module-info.java` file that contains only the `module`
    keyword and a name for the module.


    If we add a new import into a java file, Intellij IDEA can automatically add the
    necessary `requires` clause inside the `module-info.java`. For example, if we
    import the `java.sql.DriverManager` class in our code, Intellij IDEA can find
    out the name of the module where this class resides. As a result, it can indicate
    to us to add the `requires java.sql` clause inside the module descriptor, as illustrated
    in Figure 12-2.


    ![A431534_1_En_12_Fig2_HTML.jpg](Images/A431534_1_En_12_Fig2_HTML.jpg)


    Figure 12-2. Autocomplete function for adding a `requires` statement inside the
    `module-info.java`


    Intellij IDEA also provides code autocomplete functionality inside the `module-info.java`
    file. If we start to type the name of a module, IDEA will compute and show the
    available suggestions, as shown in Figure 12-3.


    ![A431534_1_En_12_Fig3_HTML.jpg](Images/A431534_1_En_12_Fig3_HTML.jpg)


    Figure 12-3. Autocomplete for the module names


    Intellij IDEA can also provide autocomplete functionality for the packages we
    want to export. Figure 12-4 shows an example of providing the autocomplete feature
    for the `exports` clause. When we start to type the name of the package we want
    to export, Intellij IDEA can indicate likely suggestions so we donÔÇÖt have to type
    the entire name.


    ![A431534_1_En_12_Fig4_HTML.jpg](Images/A431534_1_En_12_Fig4_HTML.jpg)


    Figure 12-4. Autocomplete function for the names of the packages inside the `module-info.java`
    file


    Among other features related to Jigsaw that Intellij IDEA offers, we want to mention
    these:


    - Visualizing module diagrams: Module diagrams allow us to visualize the dependencies
    between our modules. These can be visualized by selecting Diagrams Ô×Ą Show Diagram
    Ô×Ą Java Modules Diagram.

    - Visualizing module usages: Shows where a module is used.


    Intellij IDEA provides many other features not covered in this chapter. Covering
    all the features is beyond the scope of this book. For more on Jigsaw support
    in Intellij IDEA, check out the documentation on the official JetBrains blog,
    at [`https://blog.jetbrains.com/idea/?s=java+9`](https://blog.jetbrains.com/idea/?s=java+9).
    Search for the keywords `java 9` or `module`.


    The next section explores another popular IDE: Eclipse.


    ### Integration with Eclipse


    Eclipse is a free IDE. As of JDK 9 build 178 (July 2017), Eclipse offers a useful
    tool called Java 9 Support for Oxygen that works only with Eclipse Oxygen (4.7).


    However, itÔÇÖs possible to start every version of Eclipse with JDK 9, and there
    are two possibilities for doing that. The first is to have JDK 9 on the system
    path, and the second is to add the path to JDK 9 in the `eclipse.ini` file, as
    in the following example:


    ```

    --launcher.appendVmargs

    -vm

    C:\Program Files\Java\jdk-9\bin\javaw.exe

    ```


    Eclipse can be started using JDK if youÔÇÖre using a version greater or equal to
    Eclipse 4.7. If youÔÇÖre using a version prior to Eclipse 4.7, you have to add the
    flag `--add-modules=ALL-SYSTEM` inside the `eclipse.ini` file. This flag has been
    added in `eclipse.ini` in Eclipse 4.7, so you donÔÇÖt have to add it anymore if
    youÔÇÖre using Eclipse 4.7 or higher. The `ALL-SYSTEM` flag is used because not
    all the types that Eclipse uses reside inside the `java.base` module.


    As for the Java 9 Support for Oxygen tool, the Eclipse documentation states: ÔÇťEclipse
    Java 9 Support contains the following: ability to add JRE and JDK 9 as installed
    JRE, support for JavaSE-9 execution environment, ability to create Java and Plug-in
    projects that use a JRE or JDK 9, ability to compile modules that are part of
    a Java project.ÔÇŁ


    The support of Java 9 for Eclipse is still work in progress as of August 2017.
    For more information on Jigsaw support in Eclipse, check the documentation on
    the official Eclipse Wiki at [`https://wiki.eclipse.org/Java_9_Readiness`](https://wiki.eclipse.org/Java_9_Readiness).


    ### Integration with NetBeans


    Netbeans is a cross-platform IDE developed by Oracle. It offers support for JDK
    9 starting from Netbeans version 9. As of August 2017, NetBeans lets us create
    only one single module inside a NetBeans projectÔÇöwe canÔÇÖt create more than one
    module into a single NetBeans project. If we have more than one Jigsaw module,
    we have to create a separate NetBeans project for each module.


    NetBeans 9 is still under development as of August 2017. You can download it from
    [`http://bits.netbeans.org/download/trunk/nightly/latest/`](http://bits.netbeans.org/download/trunk/nightly/latest/).


    If we have only JDK 9 installed on our system, then itÔÇÖs fine for NetBeans 9,
    but if we have JDK 9 and another JDK version <9 installed on our system, we have
    to explicitly specify during the installation of NetBeans that we want to use
    JDK 9.


    According to the official NetBeans website, here are the most important areas
    where NetBeans JDK 9 offers support:


    - Maven projects

    - `module-info.java` support

    - Compilation

    - Run and debug

    - Module dependency graph


    Note: For more information on JDK 9 integration with NetBeans, visit [`http://wiki.netbeans.org/JDK9Support`](http://wiki.netbeans.org/JDK9Support).


    You just got an overview of the support that three of the most popular Java-related
    IDEs give for Project Jigsaw. The next section talks about Jigsaw integration
    with build tools like Apache Maven.


    ## Integration with Build Tools


    Apache Maven has provided very good integration for Jigsaw since the first half
    of 2016. It started integrating Jigsaw very early and collected valuable feedback
    from the developer community. The Maven team also developed a great Apache Maven
    JDeps plugin for running JDeps from Maven.'
