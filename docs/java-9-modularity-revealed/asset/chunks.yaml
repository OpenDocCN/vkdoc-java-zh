- fmt: '# Example: Create a Runtime Image Using Jlink


    This section shows an example of creating a custom runtime image. Our small application
    saves a text message inside a file and then inside a database.


    We define four modules and use the `ServiceLoader` API again, as in Chapter [6](../Text/A431534_1_En_6_Chapter.html).
    Why the `ServiceLoader` API again? Because, and we want to stress this, Jlink
    doesnÔÇÖt provide service binding by default. That means that by default Jlink doesnÔÇÖt
    add the modules observed using the `use` and `provides` clauses to the runtime
    image. It only adds the modules specified using the `requires` clauses. However,
    the JCP team enhanced the Jlink tool with an option called `--bind-services` that
    does service binding and links in service provider modules and their dependences.


    Listing [7-2](#A431534_1_En_7_Chapter.html#Par53) shows the interfaces `DatabasePersistenceService`
    and `FilePersistenceService` of the module `com.apress.service`.


    ```

    // DatabasePersistenceService.java

    package com.apress.service.interfaces;

    public interface DatabasePersistenceService {

    void saveMessageIntoDatabase(String message);

    }

    // FilePersistenceService.java

    package com.apress.service.interfaces;

    public interface FilePersistenceService {

    void saveMessageIntoFile(String message);

    }

    Listing 7-2.

    The Interfaces DatabasePersistenceService and FilePersistenceService of the Module
    com.apress.service

    ```


    These interfaces contain method definitions for saving a message into the database
    and saving a message into a file, respectively.


    Listing [7-3](#A431534_1_En_7_Chapter.html#Par56) shows the module descriptor
    of module `com.apress.service`, which simply exports the package `com.apress.service.interfaces`.


    ```

    module com.apress.service {

    exports com.apress.service.interfaces;

    }

    Listing 7-3.

    The Module Descriptor of Module com.apress.service

    ```


    Listing [7-4](#A431534_1_En_7_Chapter.html#Par58) shows the class `DatabasePersistenceProvider`
    of the module `com.apress.databasepersistence`.


    ```

    package com.apress.databasepersistence;

    import com.apress.service.interfaces.*;

    import java.sql.*;

    public class DatabasePersistenceProvider implements DatabasePersistenceService
    {

    private Connection connection;

    private static final String JDBC_URL = "jdbc:postgresql://localhost/myDatabase";

    public void saveMessageIntoDatabase(String message) {

    String insertSql = "INSERT INTO MESSAGES(CONTENT) VALUES(" + message + ")";

    try {

    connection = DriverManager.getConnection(JDBC_URL, "root", "password");

    Statement statement = connection.createStatement();

    int result = statement.executeUpdate(insertSql);

    if (result > 0) {

    System.out.println("Message successfully saved into the database");

    } else {

    System.out.println("Message could not be saved into the database");

    }

    } catch (SQLException sqlException) {

    sqlException.printStackTrace();

    }

    }

    }

    Listing 7-4.

    The Class DatabasePersistenceProvider of the Module com.apress.databasepersistence

    ```


    This class is a service provider that implements the method `saveMessageIntoDatabase()`
    of the interface `DatabasePersistenceService`. It also imports the package `java.sql`.
    The role of the class is to simply store a string into a database using JDBC.


    Listing [7-5](#A431534_1_En_7_Chapter.html#Par61) shows the module descriptor
    of module `com.apress.databasepersistence`.


    ```

    module com.apress.databasepersistence {

    requires com.apress.service;

    requires java.sql;

    provides com.apress.service.interfaces.DatabasePersistenceService with com.apress.databasepersistence.DatabasePersistenceProvider;

    }

    Listing 7-5.

    The Module Descriptor of Module com.apress.databasepersistence

    ```


    This module requires the `com.apress.service` module as it uses its interfaces.
    It also requires module `java.sql` because it uses types from this module. Nevertheless,
    it declares that it provides the implementation of the `DatabasePersistenceService`
    interface with the `DatabasePersistenceProvider` class.


    Listing [7-6](#A431534_1_En_7_Chapter.html#Par64) shows the class `FilePersistenceProvider`
    of the module `com.apress.filepersistence`.


    ```

    package com.apress.filepersistence;

    import com.apress.service.interfaces.*;

    import java.io.*;

    public class FilePersistenceProvider implements FilePersistenceService {

    private static final String FILENAME = "C:\\Java9\\example.txt";

    // for Linux

    // private static final String FILENAME = "Java9/example.txt";

    private BufferedWriter bufferedWriter = null;

    private FileWriter fileWriter = null;

    public void saveMessageIntoFile(String message) {

    try {

    fileWriter = new FileWriter(FILENAME);

    bufferedWriter = new BufferedWriter(fileWriter);

    bufferedWriter.write(message);

    }

    catch (IOException e) {

    e.printStackTrace();

    }

    finally {

    try {

    if (bufferedWriter != null)

    bufferedWriter.close();

    if (fileWriter != null)

    fileWriter.close();

    } catch (IOException ex) {

    ex.printStackTrace();

    }

    }

    }

    }

    Listing 7-6.

    The Class FilePersistenceProvider of the Module com.apress.filepersistence

    ```


    This class is a service provider that implements the method `saveMessageIntoFile()`
    of the interface `FilePersistenceService`. The role of the class is to save a
    string into a file using Java I/O.


    Listing [7-7](#A431534_1_En_7_Chapter.html#Par67) shows the module descriptor
    of module `com.apress.filepersistence`.


    ```

    module com.apress.filepersistence {

    requires com.apress.service;

    provides com.apress.service.interfaces.FilePersistenceService with com.apress.filepersistence.FilePersistenceProvider;

    }

    Listing 7-7.

    The Module Descriptor of Module com.apress.filepersistence

    ```


    This module requires the `com.apress.service` module and declares that it provides
    the implementation of the `FilePersistenceService` interface with the `FilePersistenceProvider`
    class.


    Listing [7-8](#A431534_1_En_7_Chapter.html#Par70) shows the `Main` class located
    in the module `com.apress.application`.


    ```

    package com.apress.application;

    import com.apress.service.interfaces.*;

    import java.util.ServiceLoader;

    public class Main {

    public static void main(String[] args) {

    FilePersistenceService filePersistenceService = ServiceLoader.load(FilePersistenceService.class).iterator().next();

    filePersistenceService.saveMessageIntoFile("First message saved into the file");

    DatabasePersistenceService databasePersistenceService = ServiceLoader.load(DatabasePersistenceService.class).iterator().next();

    databasePersistenceService.saveMessageIntoDatabase("Second message saved into
    the database");

    }

    }

    Listing 7-8.

    The Main Class of Module com.apress.application

    ```


    This class uses the `ServiceLoader` API to load the interfaces `FilePersistenceService`
    and `DatabasePersistenceService`. It then calls the corresponding methods on the
    interfaces. As a result, the message is saved in the text file, respectively saved
    into the database.


    Listing [7-9](#A431534_1_En_7_Chapter.html#Par73) represents the module descriptor
    of module `com.apress.application`.


    ```

    module com.apress.application {

    requires com.apress.service;

    uses com.apress.service.interfaces.FilePersistenceService;

    uses com.apress.service.interfaces.DatabasePersistenceService;

    }

    Listing 7-9.

    The Module Descriptor of module com.apress.application

    ```


    We notice that `com.apress.application` represents our main module. We compile
    all the Java classes using the `javac` command:


    ```

    javac -d output --module-source-path src $(find . -name "*.java")

    ```


    As a result, the output directory will contain all the compiled classes of our
    four modules that we have. Further, we create a custom runtime image using the
    Jlink tool by running the following command (in our case, on the Windows operating
    system):


    ```

    jlink --module-path "output;$JAVA_HOME/jmods" --add-modules com.apress.application
    --output runtimeImage

    ```'
