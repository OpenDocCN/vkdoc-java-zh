  raw: '### Root Module


    The root module is the module that the resolution process starts with. ItÔÇÖs specified
    in the `java` command using the `--module` option, as weÔÇÖve seen in the examples
    when we ran the modular application.


    First, the root module is added to the group of resolved modules. Second, the
    module system scans the module descriptor of this module and adds all the dependencies
    (modules) to the group of resolved modules. The process continues, and the Java
    Platform Module System tries to find the dependencies on the other modules. When
    all the modules searched are found and the module java.base is reached, the process
    stops. After the resolving process is finished, we have all the necessary modules
    for running our software application.


    In some cases, a module is on the module path but wasnÔÇÖt found during the resolution
    process so that it can be added to the module graph. Here, we have to manually
    add the module to the module graph. This can be done using the `--add-modules`
    command-line option. We discuss this option in more detail in Chapter [8](../Text/A431534_1_En_8_Chapter.html).


    ItÔÇÖs important to know that the module resolution process detects any modules
    that could eventually be missing. If a mandatory module is missing, the module
    resolution process stops, and an exception is thrown.


    Note


    If we have an incomplete module path at compile-time, the compiler will give us
    a warning. Both platform modules and developer modules are searched for during
    the resolution process.


    Another important topic in Jigsaw is accessibility, covered in the next section.


    ## Accessibility


    The accessibility rules changed fundamentally in Java 9\. A type declared as public
    but not exported will be available only inside the module where it resides. This
    a major change compared to older versions of Java. Prior to Java 9, it was enough
    to mention that a type is public and therefore was accessible anywhere. In Java
    9, declaring a type as public doesnÔÇÖt imply that it will be accessible everywhere.


    Simply reading a module doesnÔÇÖt guarantee access to its packages. In addition,
    in order to be accessible, modules have to export some of their packages. Only
    the public types from the exported packages will be accessible from another module.
    By taking advantage of strong encapsulation and reliable configuration, we can
    explicitly define which of the moduleÔÇÖs types are available for external access.
    In this way, we can very easily hide our implementation internals.


    Hiding the implementation details becomes the standard in Java 9\. ItÔÇÖs obtained
    by defaultÔÇöwe donÔÇÖt have to opt for it. ItÔÇÖs enough to omit to export a type in
    order to make that type strong encapsulated and invisible from outside of the
    module. A package can quickly benefit from the power of strong encapsulation by
    simply being placed inside a module. In Java 9, weÔÇÖre able to decide which types
    should be accessible from outside by enumerating them in the module declaration.
    Very simple and concise.


    To recap, in order for a module A to read package P from module B, two conditions
    have to be met simultaneously. The first is that module A should read (`requires`)
    module B. The second condition is that module B should export its package P.


    Note


    In Java 9, accessibility is imposed at both compile-time and at runtime. An error
    of type `IllegalAccessError` is thrown at runtime if the accessibility rules are
    breached. The accessibility checks are enforced in the Java Virtual Machine.


    In Java 9, simply setting a `public` modifier to a type doesnÔÇÖt mean that access
    is granted. In the Java versions before 9, setting an accessibility type of `public`
    to a type conferred him global accessibility, but in Java 9 three conditions have
    to be simultaneously met in order to make a type called T accessible outside the
    module:


    *   The package in which type T resides has to be exported.

    *   The module that needs to access type T has to read the module that contains
    the type T.

    *   Type T must have a public identifier.


    These conditions are illustrated in Table [4-3](#A431534_1_En_4_Chapter.html#Tab3),
    which displays a comprehensive list of the cases when the accessibility is granted
    or not:


    *   The ÔÇťModule Is ReadÔÇŁ column has the value Yes if the module that contains
    the type T is read by the module that wants to access the type T.

    *   The ÔÇťPackage Is ExportedÔÇŁ column has the value Yes if the module that contains
    the type T exports the package of type T.

    *   The ÔÇťAccess Modifier of Type TÔÇŁ column represents the access modifiers for
    type T.

    *   The ÔÇťAccessible in the Other ModuleÔÇŁ column specifies Yes if the type T is
    accessible from the other module, and No otherwise.


    Table┬á[4-3](#A431534_1_En_4_Chapter.html#Tab3) shows the new accessibility cases
    in Java 9 together with the results.


    Table 4-3.


    Accessibility Cases in Java 9


    | Module Is Read | Package Is Exported | Access Modifier of Type T | Accessible
    in the Other Module |

    | --- | --- | --- | --- |

    | Yes | Yes | Public | Yes |

    | Yes | Yes | Protected | No |

    | Yes | Yes | (default) | No |

    | Yes | Yes | Private | No |

    | Yes | No | Public | No |

    | Yes | No | Protected | No |

    | Yes | No | (default) | No |

    | Yes | No | Private | No |

    | No | Yes | Public | No |

    | No | Yes | Protected | No |

    | No | Yes | (default) | No |

    | No | Yes | Private | No |

    | No | No | Public | No |

    | No | No | Protected | No |

    | No | No | (default) | No |

    | No | No | Private | No |


    As a rule, a public component of an exported package can be accessed from outside
    of the module provided that the module that makes use of it reads the origin module.
    In contrast, a public element of a non-exported package isnÔÇÖt accessible from
    outside of the module. ItÔÇÖs accessible by default to all the source code from
    the module where it resides, but it wonÔÇÖt be accessible from outside of the module.


    The Java compiler throws exceptions when we attempt to access types that arenÔÇÖt
    accessible. The most common is a `ClassNotFoundException`. At runtime the most
    common errors are `IllegalAccessError` or `InaccessibleObjectException`.


    ### Readability vs. Implied Readability


    Readability is the relation between two modules that refers to the fact that a
    module that reads another module can access the types from its exported packages.
    In this case, we say that a module reads another module.


    We touched the subject of readability in previous examples when we described the
    `requires` and `exports` directives inside of a module declaration. To recap the
    concept of readability, you can go back to the ÔÇťModule DeclarationÔÇŁ section, subsection
    ÔÇťThe requires Clause.ÔÇŁ What we havenÔÇÖt covered yet is the new concept of implied
    readability.'
