    we iterate over the list of parent layers and print the names of the modules they
    contain together with the configuration.


    Note


    The empty layer doesnÔÇÖt consist of any modules. The Java Platform Module System
    canÔÇÖt load two modules into the same layer when the two modules have the same
    package name. This is true even if the package is private.


