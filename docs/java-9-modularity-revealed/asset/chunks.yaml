- fmt: "### New Scheme for the Source Code\n\nFigure [3-2](#A431534_1_En_3_Chapter.html#Fig2)\
    \ illustrates the new scheme of the source code in the JDK.\n\n![A431534_1_En_3_Fig2_HTML.gif](Images/A431534_1_En_3_Fig2_HTML.gif)\n\
    \nFigure 3-2. New scheme of JDK 9 source code\n\nThe `src` directory of the JDK\
    \ contains a list of directories that represent modules names. Each module has\
    \ its own directory. The directoriesÔÇÖ modules names start with `java.*` or `jdk.*`\
    \ and represent the names of the modules.\n\nEvery module directory contains a\
    \ `share` directory, which consists of cross-platform source code. Additionally,\
    \ a module directory can also contain other directories related to operating systems,\
    \ like `aix`, `linux`, `macosx`, `solaris`, `unix`, and `windows`. These directories\
    \ contain source code pertaining to a single operating system only. Not all the\
    \ modules contain all the operating-system directories just listed. There are\
    \ modules that contain operating-system-specific source code for all the operating\
    \ systems (like `java.base` or `java.desktop`) or only for a part of them. For\
    \ instance, the module `java.prefs` consists only of three operating-system directories:\
    \ `macosx`, `unix`, and `windows`ÔÇömeaning that this module doesnÔÇÖt have any source\
    \ code specific to Linux or Solaris inside it.\n\n> **Note**  \n> The aggregator\
    \ modules like `java.se.ee` and `java.se` donÔÇÖt have any operating-system-specific\
    \ source code because they donÔÇÖt have any source code inside their directories.\n\
    \nThe next level of directories inside a module contains directories with names\
    \ like `classes`, `conf`, `lib`, `native`, and `doc`. Except for the `conf` directories,\
    \ the other four directories can also be found in JDK 8 under the `share` directory.\n\
    \nThe `classes` directories in JDK 9 consist of Java source files grouped into\
    \ directories that designate the structure of their packages. We want to point\
    \ out two main differences to JDK 8: first, in JDK 9 thereÔÇÖs a `classes` directory\
    \ for each of the existing modules. Even the aggregator modules have a `classes`\
    \ directory. Second, in JDK 9 a `module-info.java` file is placed in the root\
    \ of the `classes` directory. The `module-info.java` file represents the module\
    \ descriptor and was introduced in Java 9. Each module has a `module-info.java`\
    \ file inside its `classes` directory. The `classes` directory can contain `java`,\
    \ `javax`, `jdk`, `sun`, `com`, or `org` directories, depending on the packages\
    \ contained in it.\n\nThe `conf` directory includes configuration files, which\
    \ may be properties files, security policy files, policy files, and so on. This\
    \ is a new directory that didnÔÇÖt exist in JDK 8.\n\nThe `lib` directory is present\
    \ only in `java.base` and consists of the file `default.policy` in the directories\
    \ `share`, `solaris`, and `windows`.\n\nThe `native` directory holds C and C++\
    \ source files, native classes, and procedures. It can contain some of the following\
    \ directories: `include`, `launcher`, `common`, `libfdlibm`, `libjava`, `libjimage`,\
    \ `libjli`, `libnet`, `libnio`, `libverify`, `libzip`, and more. According to\
    \ Open JDK, the names of the directories correspond ÔÇťto the names of the shared\
    \ libraries into which the compiled code will be linked.ÔÇŁ The `include` folder\
    \ represents an exception to this rule because it has C/C++ header files in it.\n\
    \n> **Note**  \n> The `classes` and `native` directories werenÔÇÖt renamed in JDK\
    \ 9 because doing so could create confusion and slow the adoption of JDK 9.\n\n\
    Table [3-3](#A431534_1_En_3_Chapter.html#Tab3) shows where some of the most important\
    \ classes in Java are now located.\n\nTable 3-3. Location of Some of the Most\
    \ Important Java Classes\n\n| Class name | Location |\n| --- | --- |\n| `java.lang.Object`\
    \ | `src / java.base / share / classes / java / lang` |\n| `java.lang.String`\
    \ | `src / java.base / share / classes / java / lang` |\n| `java.lang.Exception`\
    \ | `src / java.base / share / classes / java / lang` |\n| `java.lang.Class` |\
    \ `src / java.base / share / classes / java / lang` |\n| `java.util.ArrayList`\
    \ | `src / java.base / share / classes / java / util` |\n| `java.util.Date` |\
    \ `src / java.base / share / classes / java / util` |\n| `java.io.File` | `src\
    \ / java.base / share / classes / java / io` |\n| `java.net.URL` | `src / java.base\
    \ / share / classes / java / net` |\n| `java.text.Format` | `src / java.base /\
    \ share / classes / java / text` |\n| `java.util.logging.Logger` | `src / java.logging\
    \ / share / classes / java / util / logging` |\n| `java.sql.DriverManager` | `src\
    \ / java.sql / share / classes / java / sql` |\n\n> **Note**  \n> As you can see\
    \ in Table [3-3](#A431534_1_En_3_Chapter.html#Tab3), the most important and useful\
    \ Java classes are in module `java.base`, the base module.\n\nThe next subsection\
    \ describes the new structure of the source code in JDK 9.\n\n### Comparison Source\
    \ Code Structure\n\nHereÔÇÖs a short comparison between the structure of the source\
    \ code in JDK 8 and JDK 9. In JDK 8, the structure of the source code looks like\
    \ this:\n\n```\njdk / src / share / {back; bin; classes; demo; doc; instrument;\
    \ javavm; lib; native; npt; sample; transport}\n```\n\nIn JDK 9, the structure\
    \ of the source looks like this:\n\n```\njdk / src /  / share / {classes; conf;\
    \ lib; native; doc}\n```\n\nAs you can see, an intermediary directory containing\
    \ the module name was added between the directories `src` and `share`. Another\
    \ important difference between JDK 8 and 9 is that in JDK 9 for each `classes`\
    \ directory of each module thereÔÇÖs a `module-info.java` file at the root level.\
    \ In JDK 9, under the `classes` directory and its subdirectories are only the\
    \ packages and the classes that belong to the corresponding module. In JDK 8,\
    \ the `classes` directory and its subdirectories contain all the packages and\
    \ classes that comprise the Java platform."
  raw: '### New Scheme for the Source Code


    Figure [3-2](#A431534_1_En_3_Chapter.html#Fig2) illustrates the new scheme of
    the source code in the JDK.


    ![A431534_1_En_3_Fig2_HTML.gif](Images/A431534_1_En_3_Fig2_HTML.gif)


    Figure 3-2.


    New scheme of JDK 9 source code


    The src directory of the JDK contains a list of directories that represent modules
    names. Each module has its own directory. The directoriesÔÇÖ modules names start
    with java.* or jdk.* and represent the names of the modules.


    Every module directory contains a share directory, which consists of cross-platform
    source code. Additionally, a module directory can also contain other directories
    related to operating systems, like aix, linux, macosx, solaris, unix, and windows.
    These directories contain source code pertaining to a single operating system
    only. Not all the modules contain all the operating-system directories just listed.
    There are modules that contain operating-system-specific source code for all the
    operating systems (like java.base or java.desktop) or only for a part of them.
    For instance, the module java.prefs consists only of three operating-system directories:
    macosx, unix, and windowsÔÇömeaning that this module doesnÔÇÖt have any source code
    specific to Linux or Solaris inside it.


    Note


    The aggregator modules like java.se.ee and java.se donÔÇÖt have any operating-system-specific
    source code because they donÔÇÖt have any source code inside their directories.


    The next level of directories inside a module contains directories with names
    like classes, conf, lib, native, and doc. Except for the conf directories, the
    other four directories can also be found in JDK 8 under the share directory.


    The classes directories in JDK 9 consist of Java source files grouped into directories
    that designate the structure of their packages. We want to point out two main
    differences to JDK 8: first, in JDK 9 thereÔÇÖs a classes directory for each of
    the existing modules . Even the aggregator modules have a classes directory. Second,
    in JDK 9 a module-info.java file is placed in the root of the classes directory.
    The module-info.java file represents the module descriptor and was introduced
    in Java 9. Each module has a module-info.java file inside its classes directory.
    The classes directory can contain java, javax, jdk, sun, com, or org directories,
    depending on the packages contained in it.


    The conf directory includes configuration files, which may be properties files,
    security policy files, policy files, and so on. This is a new directory that didnÔÇÖt
    exist in JDK 8.


    The lib directory is present only in java.base and consists of the file default.policy
    in the directories share, solaris, and windows.


    The native directory holds C and C++ source files, native classes, and procedures.
    It can contain some of the following directories: include, launcher, common, libfdlibm,
    libjava, libjimage, libjli, libnet, libnio, libverify, libzip, and more. According
    to Open JDK, the names of the directories correspond ÔÇťto the names of the shared
    libraries into which the compiled code will be linked.ÔÇŁ The include folder represents
    an exception to this rule because it has C/C++ header files in it.


    Note


    The classes and native directories werenÔÇÖt renamed in JDK 9 because doing so could
    create confusion and slow the adoption of JDK 9.


    Table [3-3](#A431534_1_En_3_Chapter.html#Tab3) shows where some of the most important
    classes in Java are now located.


    Table 3-3.


    Location of Some of the Most Important Java Classes


    | Class name | Location |

    | --- | --- |

    | java.lang.Object | src / java.base / share / classes / java / lang |

    | java.lang.String | src / java.base / share / classes / java / lang |

    | java.lang.Exception | src / java.base / share / classes / java / lang |

    | java.lang.Class | src / java.base / share / classes / java / lang |

    | java.util.ArrayList | src / java.base / share / classes / java / util |

    | java.util.Date | src / java.base / share / classes / java / util |

    | java.io.File | src / java.base / share / classes / java / io |

    | java.net.URL | src / java.base / share / classes / java / net |

    | java.text.Format | src / java.base / share / classes / java / text |

    | java.util.logging.Logger | src / java.logging / share / classes / java / util
    / logging |

    | java.sql.DriverManager | src / java.sql / share / classes / java / sql |


    Note


    As you can see in Table [3-3](#A431534_1_En_3_Chapter.html#Tab3), the most important
    and useful Java classes are in module java.base, the base module.


    The next subsection describes the new structure of the source code in JDK 9.


    ### Comparison Source Code Structure


    HereÔÇÖs a short comparison between the structure of the source code in JDK 8 and
    JDK 9\. In JDK 8, the structure of the source code looks like this:


    ```

    jdk / src / share / {back; bin; classes; demo; doc; instrument; javavm; lib; native;
    npt; sample; transport}

    ```


    In JDK 9, the structure of the source looks like this:


    ```

    jdk / src /  / share / {classes; conf; lib; native; doc}

    ```


    As you can see, an intermediary directory containing the module name was added
    between the directories src and share. Another important difference between JDK
    8 and 9 is that in JDK 9 for each classes directory of each module thereÔÇÖs a module-info.java
    file at the root level. In JDK 9, under the classes directory and its subdirectories
    are only the packages and the classes that belong to the corresponding module.
    In JDK 8, the classes directory and its subdirectories contain all the packages
    and classes that comprise the Java platform.'
