    \ | Defines directories holding user-editable configuration files that are copied\
    \ into the JMOD file. |\n| `--exclude <pattern-list>` | The files matching `<pattern-list>`\
    \ wonÔÇÖt be copied into the JMOD file. `<pattern-list>` is comma-separated and\
