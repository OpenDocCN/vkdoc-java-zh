- fmt: '# Summary


    This chapter discussed the new module API introduced in Java 9, which gives us
    the means to access modules and the information inside modules.


    You learned what kind of classes, interfaces, enums, and exceptions are contained
    inside the new module API. We talked about the `java.lang.Module` class together
    with its attributes, constructors, and methods. Next we showed how the `java.lang.Class`
    class has been enhanced with three useful methods. The new `ModuleDescriptor`
    class was also covered in detail. We explained its attributes and methods, but
    also its nested classes like `ModuleDescriptor.Requires`, `ModuleDescriptor.Exports`,
    `ModuleDescriptor.Opens`, `ModuleDescriptor.Provides`, and `ModuleDescriptor.Version`.
    We talked about the new `ModuleReader` and `ModuleFinder` interfaces and showed
    an example of how we can read the contents of a module. With the help of the `ModuleFinder`
    interface, we searched for all the implementation classes of the `java.base` module.
    Once we found them, we loaded them using the `loadClass()` method of the `ClassLoader`
    class. Then we displayed the names of the classes loaded together with the names
    of their packages.


    Afterwards, we saw some examples of performing operations on modules, such as
    getting the module of a class, accessing the resources of a module, or searching
    for all the modules in the module path. The chapter concluded by discussing a
    Java class that reads all the properties from the module `java.base` and prints
    them at the system console.


    Chapter [10](../Text/A431534_1_En_10_Chapter.html) will cover some advanced topics
    related to Jigsaw, including layers, class loaders, multi-release JAR files, JMOD
    files and upgradeable modules. The layers are also part of the Module API.


    # 10. Advanced Topics


    Applications with plugin and container architectures need to be able to use two
    important features: dynamic configuration and runtime augmentation of platform
    modules. This means that such applications must be able to load new additional
    modules at runtime, bind them into the existing applicationÔÇÖs configuration, and
    use them without the need to stop the application and compile it again. This type
    of application also needs to be able to load and configure other platform modules
    after a runtime image has been invoked. Jigsaw introduces such support in form
    of layers. Layers are one of the main subjects of this chapter.


    This chapter presents some advanced topics on Java 9 modularity. They didnÔÇÖt fit
    in the other chapters, so we put them here instead of creating separate chapters
    for each of them.


    This chapter covers class loaders, layers, the JMOD format, multi-release JAR
    files, and upgradeable modules. WeÔÇÖll also touch on some new features that will
    come in the next JDK releases and a couple of issues that were fixed.


    ## JMOD Files


    According to the JDK 9 documentation, ÔÇťfor the purpose of modularizing the JDK,
    a new artifact format called JMOD goes beyond JAR files to accommodate native
    code, configuration files, and other kinds of data that do not fit naturally,
    if at all, into JAR files.ÔÇŁ


    A JMOD file is a new module artifact that consists of a compiled module definition
    in the form of a ZIP file. It enhances a JAR file by also including native code
    and configuration files. JMOD is a new format used for packaging the modules.
    This new format isnÔÇÖt executable.


    A JMOD file is an alternative to the modular JAR file covered in Chapter [4](../Text/A431534_1_En_4_Chapter.html).
    ItÔÇÖs mostly used when a module also contains native code. JMOD files are used
    to package the modules of the JDK, but they can be used only at compile-time and
    link-time. They canÔÇÖt be used at runtime. The JMOD files are also used by the
    `Jlink` tool to create a modular runtime image. The directory consisting of the
    JMOD files represents the module path used by the linker.


    ### The JMOD Tool


    The JMOD tool can be especially used for the following:


    - To create a JMOD file for a standard or JDK-specific module

    - To list the content of an existing JMOD file


    The JMOD tool has been extended in order to be able to install a module as a JAR
    file with a `module-info` in the top level directory. In other words, the JMOD
    tool is to the new JMOD format similar to what the `jar` tool is to the JAR format.


    Using the `jmod` command we can create a new JMOD archive:


    ```

    jmod create <jmod-file>

    ```


    The `jmod create` command creates a new JMOD archive named `<jmod-file>`. Table
    [10-1](#A431534_1_En_10_Chapter.html#Tab1) lists some of the most important options
    of the JMOD tool, as specified in the JDK specification.


    **Table 10-1.** Summary of the Options Provided by the JMOD Tool


    | Option | Description |

    | --- | --- |

    | `--class-path <path>` | Specifies the application JAR files that contain classes.
    |

    | `--config <path>` | Defines directories holding user-editable configuration
    files that are copied into the JMOD file. |

    | `--exclude <pattern-list>` | The files matching `<pattern-list>` wonÔÇÖt be copied
    into the JMOD file. `<pattern-list>` is comma-separated and can have one of the
    formats: `<glob-pattern>`, `glob:<glob-pattern>`, or `regex:<regex-pattern>`.
    |

    | `--libs <path>` | Defines the directories containing native libraries that are
    copied into the JMOD file. |

    | `--main-class <class-name>` | Defines the `main` class. |

    | `--module-version <module-version>` | Defines the module version. |

    | `--module-path <path>` or `-p <path>` | Specifies the module path where to find
    the modules with content that will be copied into the JMOD file. |


    The `jmod list` command prints the names of all the entries contained in the JMOD
    file passed as parameter:


    ```

    jmod list <jmod-file>

    ```


    The `jmod describe` command prints the details of the module contained in the
    JMOD file passed as parameter:


    ```

    jmod describe <jmod-file>

    ```


    The next section discusses the basics of the multi-release JAR files.'
  raw: "## Summary\n\nThis chapter discussed the new module API introduced in Java\
    \ 9, which gives us the means to access modules and the information inside modules.\n\
    \nYou learned what kind of classes, interfaces, enums, and exceptions are contained\
    \ inside the new module API. We talked about the `java.lang.Module` class together\
    \ with its attributes, constructors, and methods. Next we showed how the `java.lang.Class`\
    \ class has been enhanced with three useful methods. The new `ModuleDescriptor`\
    \ class was also covered in detail. We explained its attributes and methods, but\
    \ also its nested classes like `ModuleDescriptor.Requires`, `ModuleDescriptor.Exports`,\
    \ `ModuleDescriptor.Opens`, `ModuleDescriptor.Provides`, and `ModuleDescriptor.Version`.\
    \ We talked about the new `ModuleReader` and `ModuleFinder` interfaces and showed\
    \ an example of how we can read the contents of a module. With the help of the\
    \ `ModuleFinder` interface, we searched for all the implementation classes of\
    \ the java.base module. Once we found them, we loaded them using the `loadClass()`\
    \ method of the `ClassLoader` class. Then we displayed the names of the classes\
    \ loaded together with the names of their packages.\n\nAfterwards, we saw some\
    \ examples of performing operations on modules, such as getting the module of\
    \ a class, accessing the resources of a module, or searching for all the modules\
    \ in the module path. The chapter concluded by discussing a Java class that reads\
    \ all the properties from the module java.base and prints them at the system console.\n\
    \nChapter [10](../Text/A431534_1_En_10_Chapter.html) will cover some advanced\
    \ topics related to Jigsaw, including layers, class loaders, multi-release JAR\
    \ files, JMOD files and upgradeable modules. The layers are also part of the Module\
    \ API.\n\n# 10.┬áAdvanced Topics\n\nApplications with plugin and container architectures\
    \ need to be able to use two important features: dynamic configuration and runtime\
    \ augmentation of platform modules. This means that such applications must be\
    \ able to load new additional modules at runtime, bind them into the existing\
    \ applicationÔÇÖs configuration, and use them without the need to stop the application\
    \ and compile it again. This type of application also needs to be able to load\
    \ and configure other platform modules after a runtime image has been invoked.\
    \ Jigsaw introduces such support in form of layers. Layers are one of the main\
    \ subjects of this chapter.\n\nThis chapter presents some advanced topics on Java\
    \ 9 modularity. They didnÔÇÖt fit in the other chapters, so we put them here instead\
    \ of creating separate chapters for each of them.\n\nThis chapter covers class\
    \ loaders, layers, the JMOD format, multi-release JAR files, and upgradeable modules.\
    \ WeÔÇÖll also touch on some new features that will come in the next JDK releases\
    \ and a couple of issues that were fixed.\n\n## JMOD Files\n\nAccording to the\
