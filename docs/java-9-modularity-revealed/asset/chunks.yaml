  raw: 'The second case involves modularizing only a part of our application and keeping
    the other part not modularized. This means we combine the module path with the
    class path: the part of the code that contains modules is on the module path,
    and the non-modularized part of the code is on the class path. A big problem is
    that by default, code from the module path canÔÇÖt access types from the class path!
    Fortunately, there are at least two solutions for this. One solution is to take
    the code from the class path and turn it into automatic modules. This is useful
    especially for third-party JAR files that may not yet have been modularized by
    their maintainers. Another solution would be to use a new command-line option
    called `--add-exports` that exports our packages so they can be accessed from
    other modules or from the class path.


    The third case involves completely modularizing our application. As a result,
    the class path wonÔÇÖt be used anymore. The entire code lies only on the module
    path. Each piece of code is included in a module defined by a module descriptor.
    No piece of code is residing outside of a module. This approach brings many advantages
    because we can use all the features that the Java Platform Module System offers,
    including strong encapsulation, reliable configuration, improved security, maintainability,
    reusability, scalability, and so on. We recommend following this approach and
    modularizing the entire application.


    Note


    The class path wasnÔÇÖt removed in Java 9\. It can still be used standalone or in
    combination with the module path.


    There are three situations that we can have in Java 9 in correlation to the three
    use cases discussed earlier:


    *   Only the class path is used: The module path isnÔÇÖt used. Corresponds to the
    first use case mentioned earlier.

    *   Both the class path and the module path are used: Corresponds to the second
    use case mentioned earlier .

    *   Only the module path is used: The class path isnÔÇÖt used. Corresponds to the
    third use case mentioned earlier.


    WeÔÇÖll start to learn some key concepts in order to be able later to migrate an
    application to Java 9\. Many topics are covered in this chapter, because the migration
    topic is quite comprehensive. We introduce the key concepts that you need to know.
    LetÔÇÖs start by presenting the new concept of automatic modules, which are a very
    important component in the migration to Java 9 ecosystem.


    ## Automatic Modules


    Automatic modules are a special type of modules used to ease migration to Java
    9 and to accomplish backward-compatibility. An automatic module is a named module
    created after placing a JAR file onto the module path. An automatic module isnÔÇÖt
    directly declared by the Java Platform Module System or by usÔÇöitÔÇÖs generated automatically
    for a JAR file that we place on the module path.


    Automatic modules bring a great benefit in the modularization landscape . They
    permit us to start modularizing our own code without needing to wait for all the
    needed libraries and frameworks to be modularized. It would have been extremely
    bad to have to wait until each maintainer of each third-party library or framework
    modularizes their work.


    An automatic module is created by deriving a JAR file, modularizing it without
    modifying its contents. In this way, each JAR file can be treated like a module.
    Automatic modules help us work with modules instead of working with non-modularized
    JAR files. They represent a bridge for each JAR file to the modular world.


    An automatic module has at least five important characteristics :


    *   It requires transitive all the existing modules from the system, which comprise
    all our own modules plus all modules from the JDK image plus all the other automatic
    modules.

    *   It exports and opens all of its packages.

    *   It doesnÔÇÖt consist of a module-info.class file in its top-level directory.

    *   It can access every type from the unnamed module (from the class path).

    *   It canÔÇÖt declare that it has any dependencies to any other modules.


    We stated previously that an automatic module exports and opens all of its packages.
    This means the following things:


    *   All the packages from an automatic module are exported for being accessible
    at both compile-time and at runtime.

    *   All the packages from an automatic module are open for being accessible using
    deep reflection.


    Note


    An automatic module isnÔÇÖt explicitly declared by us because itÔÇÖs automatically
    created when a JAR file is placed onto the module path.


    An automatic module can access types on the class path and is useful especially
    for third-party code. Automatic modules are used for migrating existing applications
    to Java 9\. LetÔÇÖs suppose our application uses the Log4j library. If we put the
    Log4j JAR file on the module path, we can use it in our module by requiring it
    inside the module descriptor of our application:


    ```

    module com.apress.myModule {

    requires log4j;

    }

    ```


    In this way, the Log4j JAR is turned into an automatic module and can be used
    in our modular application. We can access all the packages from the Log4j module
    because as an automatic module it exports all its packages by default.


    We donÔÇÖt have to wait until the maintainers of the Log4j library have modularized
    their library because we can turn the Log4j library in an automatic module and
    use it on the module path (even if the Apache committers were hard-working and
    have already modularized Log4j at the time of writing this book).


    When using an automatic module, the only thing we have to know is the name of
    the automatic module that will be generated. For this, Jigsaw makes use of a filename-based
    algorithm we cover shortly.


    DonÔÇÖt worry if you run the preceding piece of code and see some warnings. The
    warnings have been deliberately added at runtime by the JDK team to make the users
    aware of the fact that theyÔÇÖre using automatic modules.


    An automatic module requires transitive all the existing modules. If we require
    an automatic module, then we acquire readability to all the modules, because the
    automatic module requires transitive all modules. Publishing a module that requires
    an automatic module on public repositories such as Maven Central is discouraged.
    ThatÔÇÖs because some of the properties of an automatic module, such as its exported
    packages, could change when itÔÇÖs later converted into an explicit module. This
    makes the automatic module unstable and increases the level of risk considerably.


    The names of the automatic modules are generated automatically by the Java Platform
    Module System unless we set them explicitly in the MANIFEST.MF file. The name
    of the automatic module can be defined directly inside the MANIFEST.MF file from
    the META-INF directory of the JAR file. Inside MANIFEST.MF we need to set a value
    to the attribute `Automatic-Module-Name` in order to define the name of the automatic
    module that will be generated:


    ```

    Automatic-Module-Name: myModule

    ```


    This solution gives us the advantage and flexibility of being able to choose the
    name of the automatic module. Alternatively, if we donÔÇÖt set the automatic module
    name, Jigsaw will use an algorithm for deriving the name of the automatic module
    out of the name of the JAR, covered next.'
