- fmt: '# How to Prepare for Jigsaw


    There are some steps that you should perform in order to prepare for Project Jigsaw.
    As you already know, the JDK-internal classes arenÔÇÖt accessible any more, unless
    theyÔÇÖre part of the package `jdk.unsupported`. Code that relies on JDK-internal
    classes will break.


    First of all, you should check your code for uses of JDK-internal APIs using `JDeps`.
    `JDeps` is a tool for analyzing and finding statical dependencies (itÔÇÖs covered
    in detail in Chapter [8](../Text/A431534_1_En_8_Chapter.html)). If you find uses
    of JDK-internal classes throughout your code, you should provide replacements
    for them. `JDeps` gives you hints and proposes alternatives for your JDK-internal
    classes, but itÔÇÖs your responsibility to get rid of these classes and replace
    them with supported ones.


    The Java compiler command-line option `--add-exports` is an alternative if you
    canÔÇÖt provide replacements for the JDK-internal classes. This command breaks the
    encapsulation and makes the JDK-internal classes accessible in your code. In this
    way, you donÔÇÖt have to modify your source codeÔÇöyou just have to adapt your build
    scripts to include this option during the compilation of your code.


    Besides the uses of the JDK-internal classes, you should also check your code
    for dependencies on the `rt.jar` and `tools.jar` files. Both files were removed
    in Java 9, and code that relies on them will stop working. You canÔÇÖt use them
    throughout your code anymore in Java 9.


    Another important topic refers to the split packages, which should be definitely
    avoided. Split packages arise when two or more loaders designate classes for a
    single package. You have to get rid of the split packages before migrating to
    Java 9. Chapter [8](../Text/A431534_1_En_8_Chapter.html) covers the split packages
    problem in detail and shows you how to get rid of them.


    Migrating to Java 9 can be challenging under some circumstances. ThatÔÇÖs why we
    cover this topic in more detail in Chapter [8](../Text/A431534_1_En_8_Chapter.html).
    The list just presented isnÔÇÖt complete. If you want to know more about how to
    prepare for using Jigsaw, go directly to Chapter [8](../Text/A431534_1_En_8_Chapter.html).


    ## Differences Between OSGi and Jigsaw


    OSGi (Open Service Gateway Initiative) is a well-known framework that allows developing
    modular applications in the Java programming language. The specification for implementing
    module systems in Java using OSGi can be found in the document JSR 291 ÔÇô Dynamic
    Component Support for Java SE, which was released in August 2007.


    We wonÔÇÖt go deep into detail regarding OSGi because OSGi is beyond the scope of
    this book, but we will present some important distinctions between it and Jigsaw.
    One major difference between OSGi and Jigsaw is the fact that OSGi supports versioning,
    but Jigsaw does only at a low degree. Jigsaw allows you to define a version as
    a meta attribute or to use multiple versions for a module in a layer. But the
    versioning system offered by Jigsaw is far less powerful than the one offered
    by OSGi. OSGi also has some features related to dynamic life-cycle that Jigsaw
    does not have. Besides this, OSGi provides a dynamic service registry and an upgraded
    security model.


    Jigsaw is more secure than OSGi because its security mechanism canÔÇÖt be bypassed.
    The security mechanism from OSGi can be bypassed. The OSGi bundles donÔÇÖt give
    the same level as security compared to the Jigsaw modules.


    Jigsaw isnÔÇÖt intended to be a replacement for OSGi. OSGi can operate very well
    on top of JDK 9. JCP aims to make both systems able to work in parallel and to
    cooperate. It should even be possible for OSGi to treat a Jigsaw module as an
    OSGi bundle.


    There may be specific cases when OSGi is more suitable to the needs of an application
    than Jigsaw. Jigsaw is more suited for software applications that donÔÇÖt present
    an extremely high level of complexity. OSGi takes advantage of true isolation
    because itÔÇÖs built on top of the platform. Both OSGi and Jigsaw provide isolation,
    but the way thatÔÇÖs achieved differs. In OSGi, isolation is achieved automatically
    because OSGi is built on top of the platform. In Jigsaw, the modules have been
    built inside the platform, not on top of it. They present isolation programmatically
    by the manner in which they are designed into the platform.


    In general, Jigsaw has fewer features than OSGi. For instance, Jigsaw doesnÔÇÖt
    offer the possibility to dynamically download and load modules from a repository
    when an application and the virtual machine are running. This kind of feature
    doesnÔÇÖt exist in Jigsaw, and OSGi should be used instead for this specific case.


    Project Jigsaw also offers important features that donÔÇÖt exist in OSGi, such as
    modularity at compile-time and built-in support for native libraries. Jigsaw,
    in contrast to OSGi, modularizes the Java platform and introduces the new concept
    of modules as a central program element.


    ## Summary


    We started this chapter by presenting some weaknesses and problems that occurred
    prior to Java 9, such as weak encapsulation and the Jar Hell problem. Then we
    introduced Project Jigsaw, the new module system introduced in Java 9, and described
    the goals of Project Jigsaw and some of the problems it solves. The chapter briefly
    presented a couple of new concepts introduced in Jigsaw.


    We talked about the strong encapsulation and reliable configuration mechanisms
    introduced in Jigsaw, which make a public type not accessible from outside of
    its module unless itÔÇÖs in an exported package. We also described other enhancements
    provided by Jigsaw in the fields of security, scalability, and performance. Prior
    to JDK 9, it was much more difficult to maintain our code because we couldnÔÇÖt
    encapsulate it in order to hide our internal implementation from external use.


    The next topics were backward compatibility and platform modulatization, and we
    provided insights into the new categories of APIs in the JDK. Then we presented
    the new structure of the JRE and JDK in Java 9 and talked about the removal of
    `rt.jar` and `tools.jar`. Next we outlined some of the most important steps you
    have to take in order to prepare for using Jigsaw in your projects. The end of
    the chapter illustrated some of the most important differences between OSGi and
    Jigsaw.


    Chapter [3](../Text/A431534_1_En_3_Chapter.html) describes the JDK modularization
    process, the resulting modular JDK, and the way source code was modularized in
    JDK 9.'
