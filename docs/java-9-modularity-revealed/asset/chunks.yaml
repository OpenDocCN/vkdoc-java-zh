- fmt: '### The `compress` Plugin


    The `compress` plugin has the role of compressing all the resources in the output
    image. The syntax of the plugin is simple:


    ```

    --compress=

    ```


    There are a total of three levels of compression:


    - Level 0: Constant string sharing

    - Level 1: ZIP compression

    - Level 2: Both constant string sharing and ZIP compression of image classes


    Level 0 scans the image classesÔÇÖ constant pool. Level 1 performs a ZIP compression
    of the image classes. Level 2 comprises both levels 0 and 1.


    Earlier in this chapter we explained how to create a runtime image. In Table [7-3](#A431534_1_En_7_Chapter.html#Tab3)
    youÔÇÖll find a comparison of the size of our runtime image by using different levels
    of compression.


    **Table 7-3.** Size of Our Runtime Image Using Different Levels of Compression


    | Compression Level | Size of the Runtime Image |

    | --- | --- |

    | No compression | 48 MB |

    | Level 0 | 48 MB |

    | Level 1 | 38 MB |

    | Level 2 | 29 MB |


    As you can see, Level 2 compression is the most performant. If we specify a level
    of compression other than 0, 1, or 2, an error will be thrown during the creation
    of the runtime image.


    ### The `release-info` Plugin


    The `release-info` plugin prints useful information regarding the image. In this
    example, we want to see what the ÔÇťreleaseÔÇŁ file of our runtime image contains:


    ```

    runtimeImage>cat release

    OS_NAME="Windows"

    MODULES="java.base com.apress.service com.apress.application java.logging comapress.filepersistence
    java.xml java.sql com.apress.databasepersistence"

    OS_VERSION="5.2"

    OS_ARCH="amd64"

    JAVA_VERSION="9"

    JAVA_FULL_VERSION="9-ea"

    ```


    The release file contains different properties. The `MODULES` property specifies
    all the modules existing in the image. We can add new properties inside the release
    file using the following command:


    ```

    --release-info add:=

    ```


    ItÔÇÖs also possible to delete properties files from the release file by specifying
    the list of keys to be deleted:


    ```

    --release-info del:

    ```


    In the following example, we build our runtime image by adding a key called `date`
    inside the release file:


    ```

    jlink --release-info add:date=17.07.2017 ............

    ```


    The release file now contains our newly added key:


    ```

    $ cat release

    date=19.03.2017

    ...

    ```


    ### The `excludes-files` Plugin


    The `excludes-files` plugin lets us exclude files from the runtime image. It gets
    as parameter a pattern.


    Now we want to exclude all the `*.diz` files from our runtime image. The `*.diz`
    files are compressed debug information files. Because our image is inflated by
    all these debug files, getting rid of them is worth it:


    ```

    --exclude-files *.diz

    ```


    As a result, our runtime image doesnÔÇÖt contain any `*.diz` files anymore, because
    we excluded them.


    ## Summary


    `jlink` started as a command-line utility to generate runtime images, but after
    a while became a standard. `jlink` is useful and suitable especially when we intend
    to create a targeted executable.


    This chapter explained what `jlink` is, described the newly introduced link phase,
    and presented the syntax of the `jlink` command together with its options. It
    described the `jdk.jlink` module and looked inside its module descriptor. After
    that it showed a clear example of creating a custom runtime image that contains
    four application modules and four JDK modules. For this, we used the `ServiceLoader`
    API. We also saw how to run the runtime image and how to create a runtime image
    using modular JAR files as an input instead of class files.


    Next we talked about the structure of the generated runtime image, and we explained
    the reasons behind `jlink`ÔÇÖs lack of support for automatic modules. The next section
    covered the existing `jlink` plugins and showed practical examples using the `compress`,
    `release-info`, and `excludes-file` plugins. We saw how we can compress and strip
    debug a runtime image in order to reduce its size.


    We managed to create a smaller, more compact, and tailored runtime image that
    we can distribute or run. We learned that if we use the advantages that `jlink`
    gives us, we donÔÇÖt have to install the entire JDK, as the targeted binary `jlink`
    creates is smaller than the JDK.


    The next chapter talks about a very complex and important topic: migration.


    # 8. Migration


    This chapter covers key concepts and tools used to ease migration to JDK 9. It
    covers common issues that can occur when we migrate existing Java applications
    to JDK 9 and suggests solutions and tips for solving migration problems.


    First, why do we need migration? The answer is obvious: without migrating to JDK
    9, we canÔÇÖt use the powerful features introduced by Jigsaw, nor can we use the
    other features introduced in Java 9 by the other JEPs, like the following:


    - The Java Shell

    - The updates in the Process API

    - The HTTP 2 client

    - The Stack-Walking API

    - The Platform Logging API

    - The multi-release JAR files


    By looking back in the history of Java, every time a new version of Java SE has
    been released, there were some changes that caused incompatibilities with the
    previous versions of Java. The supreme scope of Oracle has always been to provide
    backward compatibility as much as possible. Hence, the modularization of the JDK
    is such a disruptive change that backward compatibility canÔÇÖt be 100 percent assured.
    Oracle struggled to offer the highest possible degree of backward compatibility,
    but there are some breaking changes that can affect the backward compatibility.
    This all depends on how our code is structured. Before starting talking about
    any compatibility issues, we must outline two very important things:


    - Code that uses internal JDK APIs might not work in JDK 9. Some changes may be
    necessary.

    - Code that uses only official Java SE platform APIs and supported JDK-specific
    APIs works in JDK 9 without any necessary change.


    When deciding to migrate to Java 9, itÔÇÖs important to know the outcome we want
    to achieve:


    - We want our existing Java application to simply run on JDK 9, but we donÔÇÖt want
    to have any modules defined inside our code.

    - We want to modularize only a part of our application and keep the other part
    not modularized.

    - We want to modularize the entire application.


    WeÔÇÖll explain each case in detail. For each case, suppose we have a Java application
    written in a version lower or equal to Java 8 and that we want to compile and
    run it using Java 9.


    The first case involves only assuring that our application works on Java 9, without
    creating any modules. This means we stay on the class path and donÔÇÖt use the newly
    introduced module path at all. Start by setting the `JAVA_HOME` environment variable
    to point to a JDK 9 installation and then compile and run our application without
    performing any changes inside the code. Our application most likely works on Java
    9 if itÔÇÖs not using JDK internal APIs. Most of the JDK internal APIs have been
    encapsulated in Java 9 and therefore canÔÇÖt be accessed. A small number of the
    JDK internal APIs, the ones from the module `jdk.unsupported`, are still accessible,
    but all the other are inaccessible. When we talk about JDK internal APIs, we refer
    to both our application code and library code. It doesnÔÇÖt matter if our application
    doesnÔÇÖt make use of internal JDK APIs because if one of our libraries that weÔÇÖre
    using inside our application makes use of JDK internal APIs, then our application
    will break anyway. Nevertheless, there are a couple of changes performed in JDK
    9 that can eventually break our application, like the new versioning scheme or
    the new structure of the JDK and the JRE. These changes will be covered in detail
    throughout this chapter. The biggest disadvantage on relying just on the class
    path is that we canÔÇÖt use two of the most important features brought by JDK 9:
    reliable configuration and strong encapsulation. That means we canÔÇÖt, for instance,
    declare dependencies on other modules, we canÔÇÖt hide the internals of parts of
    our application, and we also canÔÇÖt create custom runtime images.'
