    src/com.apress.moduleA2/com/apress/moduleA/EmployeeImpl.java

    ```


    Here are the command-line options used:


    - `-Xmodule:com.apress.moduleA` specifies that the class `EmployeeImpl.java` should
    be compiled as if itÔÇÖs actually part of the module `com.apress.moduleA`.

