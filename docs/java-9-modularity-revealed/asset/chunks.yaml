    \ using deep reflection. A warning will be displayed during the first access.\n\
    *   `--illegal-access=warn`: The `warn` mode is very similar to the `permit` mode\
    \ previously discussed. The only difference is that the `warn` mode returns a\
    \ warning each time an illegal access is performed using reflection.\n*   `--illegal-access=debug`:\
    \ The `debug` mode shows a warning in the stack trace for every illegal access\
    \ performed using reflection.\n*   `--illegal-access=deny`: The `deny` mode disables\
    \ all the illegal access operations using reflection. When this mode is set, no\
    \ illegal access can be done using reflection. Hence, this mode can be overwritten\
    \ by the command-line option `--add-opens`. With `--add-opens` weÔÇÖre able to open\
    \ specific packages for reflection.\n\nNote\n\nThe JDK internal APIs arenÔÇÖt encapsulated\
    \ at runtime.\n\nHowever, the JCP team announced that the `--illegal-access` option\
    \ will be removed in JDK 10\\. It will be available only in JDK 9 in order to\
    \ ease migration of third-party libraries that were constructed by making use\
    \ of deep reflective access into the internals of the JDK. The `--illegal-access`\
    \ option has not been planned right from the beginning. It was added later in\
    \ order to ease migration to Java 9, because an important number of external libraries\
    \ and frameworks use reflection to access the internal APIs of the JDK.\n\nThis\
    \ option emits warning messages when used:\n\n*   A is the name of the type that\
    \ contains the code that invoked the reflective operation in question.\n*   B\
    \ is the name of the member being accessed.\n*   C is the name of the command-line\
    \ option that enabled this access.\n\n```\nWARNING: Illegal access by A to B (permitted\
    \ by C)\n```\n\nNote\n\nThe `--illegal-access` option is set by default in JDK\
    \ 9.\n\nThe next example shows what kind of warning messages are displayed when\
    \ a library performs illegal reflective access to types in the JDK. We run the\
    \ `java -jar` command on the the JRuby Complete-9.1 JAR file:\n\n```\n$ java -jar\
    \ jruby-complete-9.1.12.0.jar\nWARNING: An illegal reflective access operation\
    \ has occurred\nWARNING: Illegal reflective access by org.jruby.util.io.FilenoUtil\
    \ (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar) to method sun.nio.ch.SelChImpl.getFD()\n\
    WARNING: Please consider reporting this to the maintainers of org.jruby.util.io.FilenoUtil\n\
    WARNING: Use --illegal-access=warn to enable warnings of further illegal reflective\
    \ access operations\nWARNING: All illegal access operations will be denied in\
    \ a future release\n```\n\nA warning message lets us know that the jruby-complete-9.1.12.0.jar\
    \ performs an illegal reflective access operation on method `sun.nio.ch.SelChImpl.getFD()`\
    \ of the JDK. This illegal reflective access is allowed, because the `--illegal-access`\
    \ flag is set by default.\n\nIf we want to see a warning for every illegal access\
    \ performed, we can use the `mode=warn` of the `--illegal-access` command-line\
    \ option:\n\n```\n$ java --illegal-access=warn -jar jruby-complete-9.1.12.0.jar\n\
    WARNING: Illegal reflective access by org.jruby.util.io.FilenoUtil (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)\
    \ to method sun.nio.ch.SelChImpl.getFD()\nWARNING: Illegal reflective access by\
    \ org.jruby.util.io.FilenoUtil (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)\
    \ to field sun.nio.ch.FileChannelImpl.fd\nWARNING: Illegal reflective access by\
    \ org.jruby.util.io.FilenoUtil (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)\
    \ to field java.io.FileDescriptor.fd\nWARNING: Illegal reflective access by jnr.posix.JavaLibCHelper\
    \ (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar) to method sun.nio.ch.SelChImpl.getFD()\n\
    WARNING: Illegal reflective access by jnr.posix.JavaLibCHelper (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)\
    \ to field sun.nio.ch.FileChannelImpl.fd\nWARNING: Illegal reflective access by\
    \ jnr.posix.JavaLibCHelper (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)\
    \ to field java.io.FileDescriptor.fd\nWARNING: Illegal reflective access by jnr.posix.JavaLibCHelper\
    \ (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar) to field java.io.FileDescriptor.handle\n\
    WARNING: Illegal reflective access by org.jruby.java.invokers.RubyToJavaInvoker\
    \ (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar) to method java.lang.Object.clone()\n\
    WARNING: Illegal reflective access by org.jruby.java.invokers.RubyToJavaInvoker\
    \ (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar) to method java.lang.Object.finalize()\n\
    ...\n```\n\nThe output is very long, so we decided not to include it all. You\
    \ can see that the type that performs the illegal reflective access is displayed\
    \ together with the name of the method or the field from the JDK thatÔÇÖs accessed\
    \ reflectively.\n\nThe JDK 9 API introduced a new useful method in the `AccessibleObject`\
    \ class of package java.lang.reflect called `boolean canAccess(Object object)`.\
    \ This method lets us test whether the caller can access this reflected object.\
    \ The method returns true if access is allowed and false otherwise. According\
    \ to the JDK 9 API documentation, an `IllegalArgumentException` will be thrown\
    \ if ÔÇťthis reflected object is a static member or constructor or if it is an instance\
    \ method or field and the given object is null.ÔÇŁ To avoid any exceptions, we could\
    \ also use the new `boolean` `trySetAccessible()` method from the same class.\
    \ This method doesnÔÇÖt throw any exceptions except a `SecurityException` if the\
    \ request is denied by the Security Manager.\n\nNote\n\nThe system property `sun.reflect.debugModuleAccessChecks=access`\
    \ allows us to get a stack trace on each warning. It also can help to debug exceptions\
    \ raised by the use of `--illegal-access`.\n\nWe talked about the command-line\
    \ flags. Now itÔÇÖs time to present some migration issues that can commonly occur.\n\
    \n## Migration Issues\n\nThis section explains the concepts and gives practical\
    \ solutions to some of the most common issues that usually occur during the migration\
    \ process to Java 9:\n\n*   Encapsulated JDK internal APIs\n*   Not resolved modules\n\
    *   Cyclic dependencies\n*   New versioning scheme\n*   Split packages\n*   Removed\
    \ methods in Java 9\n*   Removal of rt.jar, tools.jar, and dt.jar"
