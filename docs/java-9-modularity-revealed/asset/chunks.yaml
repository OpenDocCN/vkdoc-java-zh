    \ modules instead of JAR libraries as the class path.\n\nAt runtime, using the\
    \ module path is possible to specify the different types of modules that weÔÇÖve\
    \ built together with the project. A module can be only in one place. If itÔÇÖs\
    \ in more than one place, the first occurrence will be retained, and the other\
    \ occurrences wonÔÇÖt be taken into consideration.\n\n> **Remember**  \n> The module\
    \ path can contain only modules.\n\nBesides the application module path, there\
    \ are two more types of module path: the compilation module path and the upgrade\
    \ module path.\n\n### Compilation Module Path\n\nThe compilation module path,\
    \ which contains definitions of modules in source form and is used together with\
