- fmt: '### Non-standard Modules


    The non-standard modules are specific to JDK. Their names start with `jdk.*`.
    Non-standard modules contain packages and specific JDK code, which may be distinct
    between various implementations of the Java Development Kit. Some JDK modules,
    such as tools or service providers, donÔÇÖt export anything, which means theyÔÇÖre
    not visible outside the module.


    Two things are very important to remember: first, that standard API packages must
    not be exported by non-standard modules, so their visibility remains hidden from
    outside. Second, and certainly the most important thing to keep in mind, is that
    the source code that depends only upon Java SE modules will depend only upon standard
    Java SE types. This is a great advantage because the code becomes portable to
    all the existing implementations of the Java SE platform, as stated in the official
    description of the JEP 200 under [`http://openjdk.java.net`](http://openjdk.java.net).


    Turning a JDK-specific API into a Java standard API is possible, but special focus
    is required regarding compatibility. When considering doing this, you should take
    into account whether itÔÇÖs feasible and necessary by looking at the way itÔÇÖs used.
    For example, the reason why the Java Debug Interface wasnÔÇÖt turned into a standard
    API is because itÔÇÖs used only by tools and debuggers, so it definitely doesnÔÇÖt
    make sense to enhance it to be part of the Java Standard API.


    Every platform module contains a folder called `classes` inside a folder called
    `share`. The `classes` folder contains all the classes that compose the module,
    along with the module descriptor in a file called `module-info.java`. Some modules,
    such as the `java.base` module, have native code for different operating systems
    like Windows, Linux, macOS, and so on.


    ## The JDK Module Graph


    The modularization of the Java 9 platform can be well represented as a module
    graph. Figure [3-1](#A431534_1_En_3_Chapter.html#Fig1) shows an excerpt of the
    new module graph of the JDK containing only the standard SE modules. It is resulted
    after splitting the JDK into modules.


    ![A431534_1_En_3_Fig1_HTML.gif](Images/A431534_1_En_3_Fig1_HTML.gif)


    Figure 3-1. A part of the module graph of JDK 9 representing only the standard
    SE modules


    Only the standard Java SE modules are shown in this graph (the non-Java SE modules
    arenÔÇÖt shown due to lack of space). In the graph, the modules are represented
    by the nodes, and the dependencies between modules are expressed with arrows.
    If a module depends on another module, thereÔÇÖs a direct arrow from one module
    to another.


    We have two categories of lines between the modules. The solid lines illustrate
    an implied readability between modules, and the dashed lines mean there is only
    simple readability between modules but no implied readability. But in both cases,
    the module reads another module, meaning the module depends on the other module.
    For instance, thereÔÇÖs a solid line between module `java.transaction` and module
    `java.rmi`. This means that module `java.transaction` `requires transitive` module
    `java.rmi`. ThereÔÇÖs also a dashed line between module `java.xml.ws` and module
    `java.xml.ws.annotation`, which means that module `java.xml.ws` `requires` module
    `java.xml.ws.annotation`. In other words, module `java.xml.ws` uses types from
    module `java.xml.ws.annotation`.


    The graph is hierarchical and clean, has no cycles, and contains no split packages.
    It has no circular dependencies, because theyÔÇÖre not allowed. The `java.base`
    module is right at the bottom of the graph. It doesnÔÇÖt depend on any other module.
    All the rest of the modules depend directly or indirectly on module `java.base`
    (not shown in the module graph due to lack of space). Therefore, there are lines
    to module `java.base` only for the modules that require only `java.base` and nothing
    else. For the modules that require at least one more module besides `java.base`,
    thereÔÇÖs no line to module `java.base`.


    The `java.se.ee` module is located at the top of the module graph. It acts like
    an aggregator module and consists not only of all the Java SE modules, but also
    of the modules that overlap with the specification of Java EE. Module `java.se.ee`
    adds no content of its own. It has only a module descriptor that gathers the contents
    of the following modules:


    *   module `java.se`

    *   module `java.activation`

    *   module `java.xml.ws.annotation`

    *   module `java.corba`

    *   module `java.transaction`

    *   module `java.xml.bind`

    *   module `java.xml.ws`


    In chapter [4](../Text/A431534_1_En_4_Chapter.html), we show what a module descriptor
    is. The module `java.se.ee` consists of all the Java SE APIs. Compared to module
    `java.se.ee`, the `java.se` module is an aggregator that consists of the parts
    of the Java SE that donÔÇÖt overlap with Java EE. The `java.se` module gathers the
    contents of the following modules: `java.datatransfer`, `java.logging`, `java.sql`,
    `java.instrument`, `java.security.jgss`, `java.security.sasl`, `java.prefs`, `java.xml.crypto`,
    `java.rmi`, `java.xml`, `java.naming`, `java.compiler`, `java.desktop`, `java.scripting`,
    `java.management.rmi`, `java.sql.rowset`, `java.management`, and `java.base`.


    **Note:** The module graph in Figure [3-1](#A431534_1_En_3_Chapter.html#Fig1)
    shows only the standard SE modules. The non-standard SE modules (with names that
    start with `jdk.*`), the Java FX modules (names start with `javafx.*`), and the
    Oracle modules (names start with `oracle.*`) arenÔÇÖt displayed in this module graph.


    ## More on Modules


    Now we will learn how to read the description of a module and to present the module
    `java.base`.'
