    JDK, and to apply that system to the JDK itself.ÔÇŁ


    Before Java 9, JDK was a big, indivisible monolith with more than 5.500 classes.
    It was impossible to split it into more pieces. The only way to use it was to
    install it entirely on the target platform. The Java runtime represented by the
    rt.jar file was also monolithic and couldnÔÇÖt be split into more parts. JDK consisted
    of rt.jar , which contained almost all the compiled classes for the base Java
    runtime. rt.jar grouped together all the runtime class files and had to be placed
    on the class path in order for the user to be able to access the Java API classes.
    Inside rt.jar there wereÔÇöbesides the popular java.* and javax.* packagesÔÇö other
    packages such as com.oracle.*, com.sun.*, jdk.internal.*, jdk.management.*, jdk.net.*,
    sun.*, and more. There was no way to split rt.jar into different files. In Java
    9, the focus was to break the monolithic JDK into modules and to completely remove
    the rt.jar file.


    The JDK had to be modularized because, after more than 22 years since its first
    release, it had grown so much that it effectively became too big and too complex.
    Installing JDK on small devices can be cumbersome in certain situations, because
    not all small devices have enough CPU, memory, or disk space to be able to hold
    the entire JDK. Besides that, itÔÇÖs a huge waste of memory to install the entire
    monolithic JDK and use only a small portion of it in your application. This problem
    relates not only to small devices, but to big devices as well, like the ones used
    to hold the applications in the cloud. Important additional costs could occur
    using the cloud because the use of hardware resources isnÔÇÖt optimized.


    JDK 1.0, released at the beginning of 1996, was extremely small and tiny in comparison
    to the actual release of the JDK . The first version of Java had only a few standard
    packages: java.lang, java.io, java.applet, java.awt, java.net, and java.util.
    There were a total of 8 packages and 212 classes and interfaces. Every release
    after JDK 1.0 added more and more complexity. JDK 1.1 had 504 classes and interfaces.
    JDK 1.2, released in 1998, tripled the number of classes and interfaces to 1,520\.
    During the next JDK releases, this increase continued: JDK 1.4 had 2,991 classes
    and interfaces, and JSE 8.0 had 4,240 classes and interfaces. Compared to JDK
    1.0, the release of Java 8 contained exactly 20 times more classes and interfaces.
    Besides the big size, the JDK prior to version 9 was very complex due to the dependencies
    between the APIs.


    Previous to JDK 9, for a simple program that prints a string in the console, a
    great number of classes had to be loaded. For example, the base module in JDK
    7 depended on a lot of other modules such as logging, security-smartcardio, security-sunec,
    security-resources, resources, charsets, client, security-misc, security-jsse,
    security-kerberos, and others. All these modules had to be loaded in order to
    print a basic and very simple ÔÇťHello world!ÔÇŁ in the console.


    Taking into consideration all the facts previously mentioned, the decision to
    work at splitting the JDK into modules was absolute necessary. A modular JDK reduces
    the number of classes loaded because there arenÔÇÖt any dependencies or connections
    between classes from different modules anymore. Java 9 also improves the startup
    time of Java applications , and the memory footprint in Java 9 is better than
    in previous releases.


    ## New Concepts Introduced in Jigsaw


    Project Jigsaw introduces the new concept of module as a central software component
    that is built inside the Java platform. A module represents a collection of packages.
    It has a module descriptor that specifies the modules upon which the module depends
    and also specifies its exported packages that are made available for external
    use. A module can be packaged into a new format called modular JAR , which is
    a JAR file that also contains a module-info.class file. A modular JAR file can
    function as a module in Java 9, but also as a regular JAR file on the class path
    in Java 8 or earlier. ThereÔÇÖs another new format called JMOD , which is similar
    to a modular JAR but can also contain native code. A module can be open or not.
    Chapter [4](../Text/A431534_1_En_4_Chapter.html) describes modules in detail.


    The new notion of module path is introduced in Project Jigsaw. Module path is
    the module equivalent of the class path and consists of a list of directories
    that contain modules. Upcoming chapters cover the module path and show you how
    to use it alone or in combination with the class path.


    Jigsaw also introduces a linking phase in which a group of modules is assembled
    by a new linking tool, called Jlink (covered in Chapter [7](../Text/A431534_1_En_7_Chapter.html)),
    into a custom binary runtime image. Linking can create a full Java development
    environment and can also create a Java runtime system incorporated in a program.


    Java 9 adds many new options for both the Java compiler and the Java launcher
    in order to allow the compilation and running of modules. Throughout this book
    youÔÇÖll find plenty of examples of compiling and running modules using different
    command-line options. Jigsaw also introduces new notions like unnamed module,
    open module, and automatic module, all covered in Chapter [4](../Text/A431534_1_En_4_Chapter.html).'
