  raw: '### Integration with Apache Maven


    One of the primary goals of Maven was to upgrade only its plugins in order to
    offer support for Java 9\. No changes were necessary inside the Maven Core for
    making Maven run on Java 9\. Another primary goal was to offer support for Java
    9 starting with Maven 3.0.


    In order to use Maven with Java 9, two conditions have to be met simultaneously:


    *   The `JAVA_HOME` variable for Maven has to be set to point to a JDK 9 installation.

    *   The `source` and `target` of the Maven Compiler plugin should be greater or
    equal than 6.


    The Maven Compiler plugin defines a parameter for `source` and a parameter for
    `target` that correspond to the version of the JDK. The minimum supported version
    for the `source` and `target` for JDK 9 is 6\. The version of JDK used to run
    Maven doesnÔÇÖt necessarily have to be the same as the version of JDK used to run
    the Maven Compiler plugin.


    Maven needed adjustments for some of the JEPs implemented in Java 9. Besides the
    JEPs related to Jigsaw, Maven also needed adjustments in order to fit the following
    JEPs: JEP 223 ÔÇô New Version-String scheme, JEP 226 ÔÇô UTF-8 Property Files, JEP
    238 ÔÇô Multi-Release JAR files, JEP 247 ÔÇô Compile for Older Platform Versions,
    and JEP 285 ÔÇô Modular Java Application Packaging.


    Even if itÔÇÖs not part of Jigsaw, we should say something about the JEP 223 ÔÇô New
    Version-String scheme because it has huge impact on Maven. Maven relies heavily
    on the system properties. Since the version string has changed in Java 9, Maven
    throws an `ArrayIndexOutOfBoundsException` as it internally tries to compute the
    version. Fortunately, the issue has been fixed starting with the following versions
    of the following plugins:


    *   maven-archiver-3.0.1

    *   maven-jar-plugin-3.0.0

    *   maven-war-plugin-3.0.0

    *   maven-ear-plugin-xxx

    *   maven-javadoc-plugin-2.10.4


    If youÔÇÖre using these plugins in Java 9, make sure to upgrade them to at least
    one of these versions.


    Table [12-1](#A431534_1_En_12_Chapter.html#Tab1) shows the Maven plugins affected
    by the introduction of Java 9.


    Table 12-1.


    Maven Plugins Affected by Java 9


    | Plugin Name | Minimum Compatible Version | Affected Goal and Status |

    | --- | --- | --- |

    | Maven Compiler plugin | 3.6.1 | compile => new feature testCompile => new feature
    |

    | Maven Javadoc plugin | 2.10.4 | jar => failure javadoc => warning aggregate
    => failure |

    | Maven Plugin plugin | 3.5 | descriptor |

    | Maven War plugin | ┬á | war => failure |

    | Plexus :: Component Metadata | 1.7 | generate-metadata => new feature |


    Remember the JDeps tool described in Chapter [8](../Text/A431534_1_En_8_Chapter.html)?
    Maven integrates this tool into a new plugin, the Apache Maven JDeps plugin.


    #### Apache Maven JDeps Plugin


    This plugin makes use of the JDeps tool to analyze internal API calls inside our
    classes. It can perform analysis when building a project.


    Note


    The first version of the Maven JDeps Plugin is 3.0\. This version has been chosen
    deliberately by Maven to reveal that Maven 3.0 or greater should be used.


    The plugin consists of two goals :


    *   A goal called `jdeps:jdkinternals` that verifies whether the main classes
    depend on internal JDK classes

    *   A goal called `jdeps:test-jdkinternals` that verifies whether the test classes
    depend on internal JDK classes


    Table [12-2](#A431534_1_En_12_Chapter.html#Tab2) shows some of the most important
    options that can be used inside the `<configuration>` tag of the Maven JDeps plugin,
    as recorded in the Oracle documentation for Java SE.


    Table 12-2.


    Options for the Maven JDeps Plugin


    | Plugin Name | Description | Example |

    | --- | --- | --- |

    | `failOnWarning` | Specifies whether the build continues if there are JDeps specific
    warnings. Default is true | `<failOnWarning>` `false` `</failOnWarning>` |

    | `dependenciesToAnalyzeIncludes` | Specifies additional dependencies to be analyzed.
    The format is `<include>` `groupId:artifactId` `</include>`. Patterns are allowed.
    | `<dependenciesToAnalyzeIncludes>` `<include>*:*</include>` `<include>` `com.apress.*:*`
    `</include>` `<include>` `com.apress.book:*` `</include>` `<include>` `com.apress.book:utils`
    `</include>` `</dependenciesToAnalyzeIncludes>` |

    | `dependenciesToAnalyzeExcludes` | Specifies dependencies that shouldnÔÇÖt be analyzed.
    The format is `<exclude>` `groupId:artifactId` `</exclude>`. Patterns are allowed.
    | `<dependenciesToAnalyzeExcludes>` `<exclude>` `com.apress.book:*` `</exclude>`
    `</dependenciesToAnalyzeExcludes>` |

    | `jdeps.include` | Restricts analysis to classes that are matching the pattern.
    It filters the list of classes to be analyzed. | ┬á |

    | `jdeps.profile` | Shows profile or the file containing a package. | ┬á |

    | `jdeps.recursive` | Traverses all dependencies recursively. | ┬á |

    | `jdeps.module` | Shows the module containing the package. | ┬á |


    Running with the option `-` `R` results in warnings being displayed if there are
    transitive dependencies that are making use of JDK internal APIs.


    Note


    By setting the `<failOnWarning>` option to true, the build will immediately fail
    if there are any warnings.


    If we have an application that uses third-party libraries, it would make sense
    first to find the JDK internal APIs inside our application code using the Maven
    JDeps plugin with option `<failOnWarning>` set to true so that the build fails
    if any JDK internal APIs are found. In the next step we could run the Maven JDeps
    plugin only on our third-party libraries, but this time setting `<failOnWarning>`
    to false so that our build doesnÔÇÖt fail if the third-party libraries are using
    JDK internal APIs. This is reasonable because we canÔÇÖt dig inside the third-party
    libraries to fix them, but we can do this inside our own application code.


    Listing [12-1](#A431534_1_En_12_Chapter.html#Par62) shows an example of using
    the Maven JDeps plugin to implement this specific use case.


    ```

    org.apache.maven.plugins

    maven-jdeps-plugin

    3.0.0


    testOnClasses


    jdkinternals

    test-jdkinternals


    testOnDependencies


    jdkinternals

    test-jdkinternals


    false

    true


    Listing 12-1.

    Example Using the Maven JDeps Plugin

    ```


    We search for JDK internal APIs inside our application code in the execution block
    which we named `testOnClasses`. We specified both goals, `jdkinternals` and `test-jdkinternals`,
    so that both `main` and `test` classes are verified. We didnÔÇÖt specify the `<failOnWarning>`
    attribute here, so it will default to true. Afterward, we specify another execution
    block to search our third-party libraries that are attached to our application.
    For this, we specify the `<recursive>` tag as true. `failOnWarning` is set to
    false so the build doesnÔÇÖt fail in case we find a JDK internal API.


    The next section explores the support that the Maven Compiler plugin offers for
    Jigsaw.'
