  raw: '## Layers


    Suppose we want to add a couple of new modules at runtime into our application.
    We donÔÇÖt know all the modules that we need straight at compile-time, so we need
    the possibility of adding new modules later at runtime. Fortunately, the Java
    Platform Module System provides a solution for this in the form of a new concept
    called layers . Layers group a set of modules and are used to add new modules
    at runtime into an application. The JDK 9 API specifies that a layer maps each
    module in the graph to the unique class responsible for loading the types defined
    in that module. Therefore, a layer is used to find a class loader in order to
    load classes for a graph of modules.


    Not all applications make use of layers. The applications that use layers are
    those that implement a container architecture, where modules are dynamically added
    and linked at runtime. On top of the existing layer, a container application can
    create a new layer. It does that by resolving the initial module of the application
    against a whole set of observable modules, like non-platform modules from the
    lower layer, upgradeable platform modules that can have different versions, different
    service providers, and so on. Nevertheless, a container application might require
    a different version of a module already present in the runtime environment. This
    can be implemented in Jigsaw using the powerful features introduced by layers.


    Note


    Layers allow the use of more than one version of a module.


    A layer is built at runtime from a graph of modules. Each layer has the following:


    *   A configuration, represented by an instance of the `Configuration` class located
    in package java.lang.module

    *   A function that maps each module to a class loader, represented by an instance
    of the `ClassLoader` class located in package java.lang


    According to the JDK 9 API specification, a configuration ÔÇťencapsulates the readability
    graph that is the output of the resolution. It is the result of resolution or
    resolution with service binding.ÔÇŁ The following sections talk about configurations.


    Note


    A module can read modules from its own layer and from any layer situated lower
    in the layer hierarchy.


    Layers can be built in a hierarchy similar to a stack. They can be created on
    top of the boot layer, and other layers can be created on top of the previously
    created layers, and so on. The Java Virtual Machine has the boot layer, which
    is the basic and the first layer used by the JPMS.


    Note


    Every Java 9 modular application has at least one layer. Each layer, without the
    empty layer, has one or more parent layers. Layers donÔÇÖt have names.


    The `ModuleLayer` class from the package java.lang in the module java.base represents
    an instance of a layer. A `ModuleLayer` object is obtained by calling the `getLayer()`
    method on a Module. A module layer contains only named modules. Hence, if we call
    the `getLayer()` method on an unnamed module, a null is returned. Otherwise a
    `ModuleLayer` object is returned:


    ```

    ModuleLayer moduleLayer = module.getLayer();

    ```


    Next weÔÇÖll look at the boot layer, which is the most important layer.


    ### The Boot Layer


    The boot layer consists of the bootstrap loader, platform loader, and application
    loader. The modules in the boot layer are mapped to the bootstrap, to the platform,
    and to the application class loaders. The boot layer maps modules to loaders.
    For instance, it maps the module java.base to the bootstrap loader.


    Note


    Most of the applications donÔÇÖt use any layer except the boot layer.


    The JVM creates the boot layer at startup. This is done in a process called resolution.
    The root modules of the application are resolved together with their dependencies.
    The boot layer contains the module graph after all the modules have been resolved.


    In most cases, the boot layer will be enough. It contains by default the module
    java.base. Modules in the boot layer are mapped to the bootstrap class loader
    and other existing class loaders from the JVM.


    The boot layer can be retrieved by calling the static method `boot()` on a `ModuleLayer`
    class:


    ```

    ModuleLayer bootLayer = ModuleLayer.boot();

    Set modulesSet = bootLayer.modules();

    ```


    The method `boot()` returns the boot layer, an object of type `ModuleLayer`. In
    order to get the set of modules from the boot layer, we called the method `modules()`
    on the resulting `bootLayer` object.


    To get a `Module` object from the boot layer for our module com.apress.myModule,
    we can use the `findModule()` method of the `ModuleLayer` class:


    ```

    Optional myModule = bootLayer.findModule("com.apress.myModule");

    ```


    We could further get an `InputStream` for reading a resource from our module by
    calling the `getResourceAsStream()` method on the `Module` object:


    ```

    InputStream inputStream = myModule.getResourceAsStream(resourceName);

    ```


    The parameter of the method must be a path separated by / (forward slash) that
    identifies the resource.


    Now that we have a grasp of what the boot layer is, letÔÇÖs move on to the new concept
    of configuration.


    ### Configuration


    According to the JDK 9 API specification, ÔÇťa configuration encapsulates the readability
    graph that is the output of a resolution.ÔÇŁ To retrieve a configuration, the class
    `ModuleLayer` defines a method called `configuration()` that returns the configuration
    for this layer.


    In Jigsaw, a configuration is independent and isolated from other configurations.
    It can also relate to other dynamically created configurations and not only to
    the initial configuration. Nevertheless, a configuration lets you include and
    to use multiple versions of non-platform modules and upgradeable platform modules
    that are different from those already available in the enclosing configuration.
    This is a very strong feature that the configurations bring in JDK 9.


    The `Configuration` class is located in the module java.base in package java.lang.module.
    Its most important methods are the following, as described in the JDK 9 API specification:


    *   `Set<ResolvedModule> modules()`: Returns an immutable set of the resolved
    modules in this configuration.

    *   `Configuration resolve(ModuleFinder before, ModuleFinder after, Collection<String>
    roots)`: Creates a new configuration by resolving a collection of root modules
    with this configuration as its parent. The first parameter represents the main
    module finder to find modules. If no modules can be found, then the modules are
    searched using the module finder passed as the second parameter. The third parameter
    represents a collection of module names of the modules to resolve. The collection
    can also be empty.

    *   `Optional<ResolvedModule> findModule(String name)`: Finds a resolved module
    in this configuration. It gets as parameter the name of the module for which we
    want to find its `ResolvedModule` object.

    *   `List<Configuration> parents()`: Returns a list of this configurationÔÇÖs parents.

    *   `Configuration resolveAndBind(ModuleFinder finder, Collection<String> roots,
    boolean check, PrintStream output)`: Resolves a collection of root modules with
    service binding. ItÔÇÖs used to create the configuration for the boot layer.


    #### Create a Configuration


    To create a new configuration, we usually take the configuration of the boot layer
    as a parent. To get the configuration of the boot layer, we call the method `configuration()`
    on the boot layer:


    ```

    Configuration configuration = ModuleLayer.boot().configuration()

    ```


    Note


    In the JVM, each layer of modules is created from a configuration.


    Next weÔÇÖll show how to resolve a module with a configuration.'
