    .

    ```


    As a result, inside the `patchModulesLibrary` directory a new JAR called `com.apress.moduleA.jar`
    is created.


    We can run this example in two different ways: by patching module `com.apress.moduleA`
    with classes or by patching it with a JAR.'
  raw: '### Patching a Module


    The following example shows how to patch a class inside a module. That means we
    replace a Java class file inside a module with another one. For doing this, weÔÇÖll
    use the `javac` command-line option `-Xmodule` and the `java` command-line option
    `--patch-module`. WeÔÇÖll patch an existing module using the `--patch-module` option,
    and youÔÇÖll see two ways of doing that. Therefore, we create four folders:


    *   The modules folder

    *   The modulesLibrary folder

    *   The patchModules folder

    *   The patchModulesLibrary folder


    We have a module com.apress.moduleA that contains a POJO class called `Employee.java`
    and another class called `EmployeeImpl.java`, which creates an object of type
    `Employee` and sets some properties on it. ThereÔÇÖs also a module com.apress.moduleB
    that contains the public static void `main(String[] args)` method. This module
    simply creates an object of type `EmployeeImpl` and then calls some methods on
    this object. Further, we define another Java class called `EmployeeImpl.java`,
    having the same package name as the package name of the former `EmployeeImpl.java`
    class. This new class isnÔÇÖt part of a module. Our intention is to replace the
    new class with the older one inside the com.apress.moduleA module using the command-line
    options `-Xmodule` and `--patch-module` described earlier.


    Listing [11-1](#A431534_1_En_11_Chapter.html#Par37) shows the classes `Employee.java`
    and `EmployeeImpl.java` of the com.apress.moduleA module. The class `Employee.java`
    is inside the package com.apress.moduleA.entity.


