- fmt: '# What You Will Learn


    This book aims to provide comprehensive information on the new modular system
    introduced in Java 9. A well-structured tutorial is conducted throughout the book
    by combining theoretical concepts with practical examples.


    Learning to use modularity with Java 9 will help you enhance your technology career
    and give you very precious technical skills.


    Once you read this book, youÔÇÖll be able to develop scalable and modular Java 9
    applications and migrate existing Java applications to Java 9.


    Here are some of the most important things youÔÇÖll learn in this book:


    - What modularity is in general and what advantages it brings

    - What Java 9 modularity is and what its goals are

    - How the new layout for JDK and JRE looks

    - What strong encapsulation and reliable configuration are and how to apply and
    take advantage of them

    - Which JDK-internal APIs have been encapsulated in Java 9 and which have remained
    accessible

    - How the JDK was divided into a group of modules

    - What the new accessibility rules in JDK 9 are

    - How to define a module together with its dependencies

    - How to create a modular JAR file and a JMOD file

    - How to compile, package, and run a modular Java application using Jigsaw

    - How to use the `JDeps` tool to audit the code, search for dependencies between
    the libraries, or generate module descriptors

    - How to migrate an application to the modular system

    - How to solve migration issues like encapsulated JDK internal APIs, not resolved
    modules, split packages, cyclic dependencies, and more

    - How to perform top-down migration

    - How to define, configure, and use services for modules

    - How to combine the module path and the class path to provide backward compatibility

    - How to create custom modular runtime images using the `Jlink` linking tool

    - How to define and use a layer in Java 9

    - How to perform operations on a `Module` using the new `Module` API

    - How to use qualified exports

    - How to improve the maintainability and performance of Java applications

    - How to handle the unit testing of a modular application

    - How to patch a module

    - How to integrate Jigsaw with different build tools like Maven

    - How to check whether a Java application is compatible with JDK 9

    - How to make a Java application compatible with JDK 9

    - How to assure runtime compatibility when switching to Java 9

    - How to choose the best design patterns when modularizing a Java application


    ## Errata


    Everybody involved in publishing this book is strongly committed to providing
    an error-free book. ThatÔÇÖs why the errata of this book is continuously updated
    as soon as even a minor issue is found. You can submit errata at [`www.apress.com/us/services/errata`](http://www.apress.com/us/services/errata).


    ## Contacting the Author


    The source code for this book can be accessed by clicking the Download Source
    Code button on its `apress.com` product page, located at [`www.apress.com/9781484227121`](http://www.apress.com/9781484227121).


    ## Downloading the Code


    The source code from this book can be found on GitHub. You can also download it
    from the bookÔÇÖs product page at [`www.apress.com/us/book/9781484227121`](http://www.apress.com/us/book/9781484227121).


    ## Acknowledgments


    I would like to thank my family and my wife, Diana, for supporting me, encouraging
