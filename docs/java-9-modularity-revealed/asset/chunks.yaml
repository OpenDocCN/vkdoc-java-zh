    characteristics of the standard and non-standard modules that comprise the Java
    Platform Module System. We also showed the new JDK module graph that resulted
    after the JDK modularization. And we showed how to get the entire content of the
    module descriptor of module java.naming using the `--describe-module <module_name>`
    command-line option. The end of the first part discussed the module java.base,
    the most important module of the Java Platform Module System.


    The second part of the chapter focused on describing the changes performed at
    the source code level due to the implementation of JEP 201 (the Modular Source
    Code). We started by presenting the new scheme of the JDK 9 source code and then
    described how the source code was organized into directories and what each directory
    represents. We pointed out the differences between the source code layout in JDK
    8 and JDK 9\. The chapter finished by talking about the way the build system was
    enhanced in order to meet the requirements of the newly introduced modules that
    are now first-class components of the Java platform.


    Chapter [4](../Text/A431534_1_En_4_Chapter.html) explains what a module is and
    shows how you can define and use your own modules.


    # 4.┬áDefining and Using Modules


    In this chapter weÔÇÖll start to develop modular applications in Java 9 using some
    of the features offered by Project Jigsaw. WeÔÇÖll begin by explaining the new concept
    of a Jigsaw module together with its module declaration, the module-info.java
    file. YouÔÇÖll also learn about the five types of directives that can be used inside
    the module declaration: `requires`, `exports`, `uses`, `provides`, and `opens`.
    Then weÔÇÖll look at compiling and running modules using JDK 9, and for that weÔÇÖll
    introduce the new module path in detail.


    The accessibility changes introduced in Java 9 are also covered in this chapter.
    They have a great impact on the platform because they differ almost entirely from
    the old accessibility rules that were in place before in Java. In Java 9 we can
    have more types of modules: normal modules, automatic modules, named modules,
    observable modules, open modules, and unnamed modules. Each is briefly covered
    in this chapter.


    ## The Concept of Module


    As you know by now, Java 9 introduces a new sort of first-class components called
    modules. A Jigsaw module, also a fundamental part of the Java 9 Platform, represents
    a container of packages. It contains packages, resource files, and native code.
    The packages can contain Java classes, enumerations, and interfaces.


    Figure┬á[4-1](#A431534_1_En_4_Chapter.html#Fig1) displays the general structure
    of a module.


    ![A431534_1_En_4_Fig1_HTML.gif](Images/A431534_1_En_4_Fig1_HTML.gif)


    Figure 4-1.


    General structure of a module


    A module consists of the source files together with the module declaration represented
    by the module-info.java file. HereÔÇÖs a typical directory structure of a module
    named com.apress.moduleA:


    ```

    src/

    com.apress.moduleA/

    module-info.java

    com/apress/moduleA/

    Main.java

    // other files

    ```


    A directory having the same name with the name of the module is located right
    at the top. Inside it is the module-info.java file as well as a structure of directories
    representing the format of the package. In our case, the package has the same
    name as the module name. The .java files are located inside the directories of
    the package.


    Note


    ItÔÇÖs also possible to define a module that has no source files and no packages
    except the module descriptor module-info.java.


    We mentioned the module declaration module-info.java. In the next subsection youÔÇÖll
    learn about it.'
