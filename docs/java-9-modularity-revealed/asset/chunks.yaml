- fmt: '### Top-down Migration


    We have a small application that reads some news from a JSON file using Google
    Gson. It logs the output using SLF4J and formats it using Google Guava. Therefore,
    we have four JAR libraries on the class path:


    - `slf4j-simple-1.7.25.jar`

    - `slf4j-api-1.7.25.jar`

    - `guava-21.0.jar`

    - `gson-2.8.0.jar`


    Our application consists of a POJO class called `News` that has four attributes:
    `id`, `title`, `category`, and `link`. It also consists of a `Main` class that
    reads the entire information from the `news.json` file as a list of `News` objects.
    A for loop iterates over the entire list of `News`, formats the results so that
    everything is uppercase, and then logs the results.


    Listing [8-5](#A431534_1_En_8_Chapter.html#Par333) shows the `News` class.


    ```

    package org.news;

    public class News {

    private String id;

    private String title;

    private String category;

    private String link;

    public String getId() {

    return id;

    }

    public void setId(String id) {

    this.id = id;

    }

    public String getTitle() {

    return title;

    }

    public void setTitle(String title) {

    this.title = title;

    }

    public String getCategory() {

    return category;

    }

    public void setCategory(String category) {

    this.category = category;

    }

    public String getLink() {

    return link;

    }

    public void setLink(String link) {

    this.link = link;

    }

    @Override

    public String toString() {

    return "Id: " + id + " - " + "Title: " + title + " - " + "Category: " + category
    + " - " + "Link: " + link;

    }

    }

    Listing 8-5.

    The News Class

    ```


    Listing [8-6](#A431534_1_En_8_Chapter.html#Par335) represents the `Main` class,
    which imports packages from Gson, Guava, and SLF4J, reads the `news.json`, logs
    its content, and also formats it.


    ```

    package org.news;

    import java.io.*;

    import java.lang.reflect.Type;

    import java.util.ArrayList;

    import java.util.List;

    import com.google.gson.reflect.TypeToken;

    import com.google.gson.Gson;

    import com.google.gson.GsonBuilder;

    import com.google.common.base.CaseFormat;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    public class Main {

    public static void main(String[] args) throws FileNotFoundException {

    Logger logger = LoggerFactory.getLogger(Main.class);

    BufferedReader bufferedReader = new BufferedReader(new FileReader("news.json"));

    Type listType = new TypeToken>(){}.getType();

    List yourClassList = new Gson().fromJson(bufferedReader, listType);

    for(News news : yourClassList) {

    logger.info("Id: " + CaseFormat.LOWER_UNDERSCORE.to(CaseFormat.UPPER_UNDERSCORE,
    news.getId()));

    logger.info("Title: " + CaseFormat.LOWER_UNDERSCORE.to(CaseFormat.UPPER_UNDERSCORE,
    news.getTitle()));

    logger.info("Category: " + CaseFormat.LOWER_UNDERSCORE.to(CaseFormat.UPPER_UNDERSCORE,
    news.getCategory()));

    logger.info("Link: " + CaseFormat.LOWER_UNDERSCORE.to(CaseFormat.UPPER_UNDERSCORE,
    news.getLink()));

    }

    }

    }

    Listing 8-6.

    The Main Class of our Application

    ```


    First, we compile and run our application in JDK 9 using only the class path,
    so weÔÇÖre sure that our application works in JDK 9 without any changes.


    ```

    javac -d out -cp "lib/gson-2.8.0.jar;lib/guava-21.0.jar;lib/slf4j-api-1.7.25.jar;lib/slf4j-simple-1.7.25.jar"
    $(find src -name ''*.java'')

    ```


    We create a JAR file named `news.jar`:


    ```

    jar --create --file lib/news.jar -C out.

    ```


    Finally, we run our application:


    ```

    java -cp "lib/gson-2.8.0.jar;lib/guava-21.0.jar;lib/slf4j-api-1.7.25.jar;lib/slf4j-simple-1.7.25.jar;lib/news.jar"
    org.news.Main

    ```


    Our application is running successfully. We now have the confirmation that our
    not modularized application is running with JDK 9 without any changes.


    LetÔÇÖs start the modularization process. In this part weÔÇÖll modularize our News
    application only as part of the top-down migration strategy. We wonÔÇÖt modularize
    and wonÔÇÖt even change the four JAR files that represent our dependencies.


    The first thing we do is to create a `module-info.java` file in the root directory.
    We have to figure out what kind of `requires` and `exports` clauses we need to
    put inside the module descriptor. We have to require our dependency JAR files
    inside the module descriptor and we do this by putting them on the module path
    so they become automatic modules. We covered the automatic modules in detail at
    the beginning of this chapter, where we also talked about how to find out the
    name of the generated automatic modules:


    ```

    jar --describe-module --file gson-2.8.0.jar

    ```


    By running the command `jar --describe-module` on the Gson JAR file, we find out
    that the generated name of the automatic module is `gson`. We add this name into
    our module descriptor and do the same for all the other JAR files, because our
    application depends on these. If weÔÇÖre not sure about the dependencies used by
    our application, we can run the Jdeps on our previously created `news.jar` file:


    ```

    $ jdeps -cp "lib/gson-2.8.0.jar;lib/guava-21.0.jar;lib/slf4j-api-1.7.25.jar;lib/slf4j-simple-1.7.25.jar;lib/news.jar"
    -s lib/news.jar

    news.jar -> lib\gson-2.8.0.jar

    news.jar -> lib\guava-21.0.jar

    news.jar -> java.base

    news.jar -> lib\slf4j-api-1.7.25.jar

    ```


    The JDeps tool informs us that our `news.jar` file has dependencies on three JAR
    files and on module `java.base`.


    Our `module-info.java` looks like this:


    ```

    module news {

    requires slf4j.simple;

    requires slf4j.api;

    requires guava;

    requires gson;

    }

    ```


    Because our News application is standalone and isnÔÇÖt an API, we have no `exports`
    clauses. We donÔÇÖt need to give our application to somebody else to include it
    in their own application, so `exports` clauses are for the moment not necessary.


    We compile our application:


    ```

    javac -d modules --module-path lib --module-source-path src -m news

    ```


    Now, if we take a look in the `modules` directory, we see that we have `.class`
    files not only for the corresponding Java classes, but also for the `module-info.java`
    we have a compiled `module-info.class` file.


    We create a modular JAR for our application:


    ```

    jar --create --file lib/news.jar -C modules/news.

    ```


    Next we run our `Main` class:


    ```

    java --module-path lib -m news/org.news.Main

    ```


    Unfortunately, we got a `ClassNotFoundException`, which informs us that the class
    `java.sql.Time` canÔÇÖt be found:


    ```

    Exception in thread "main" java.lang.NoClassDefFoundError: java/sql/Time

    at gson@2.8.0/com.google.gson.Gson.(Gson.java:240)

    at gson@2.8.0/com.google.gson.Gson.(Gson.java:174)

    at news/org.news.Main.main(Main.java:23)

    Caused by: java.lang.ClassNotFoundException: java.sql.Time

    at java.base/jdk.internal.loader.BuiltinClassLoader.loadClass(Unknown Source)

    at java.base/jdk.internal.loader.ClassLoaders$AppClassLoader.loadClass(Unknown
    Source)

    at java.base/java.lang.ClassLoader.loadClass(Unknown Source)

    ... 3 more

    ```


    The `java.sql.Time` class is located in the `java.sql` module. We need to add
    this module to the root set of modules using the `--add-modules` option so it
    can be resolved:


    ```

    java --add-modules java.sql --module-path lib -m news/org.news.Main

    ```


    The previous error doesnÔÇÖt appear anymore, because it was solved. Unfortunately,
    we get now a different type of exception:


    ```

    Exception in thread "main" java.lang.reflect.InaccessibleObjectException: Unable
    to make field private java.lang.String org.news.News.id accessible: module news
    doesnÔÇÖt "opens org.news" to module gson

    at java.base/java.lang.reflect.AccessibleObject.checkCanSetAccessible(Unknown
    Source)

    at java.base/java.lang.reflect.AccessibleObject.checkCanSetAccessible(Unknown
    Source)

    at java.base/java.lang.reflect.Field.checkCanSetAccessible(Unknown Source)

    at java.base/java.lang.reflect.Field.setAccessible(Unknown Source)

    ```'
