- fmt: '### Encapsulated JDK Internal APIs


    Throughout the book weÔÇÖve talked about the encapsulation of the JDK internals
    APIs. This can cause critical problems when we move to JDK 9. However, this probably
    isnÔÇÖt the most encountered problem during migration to JDK 9. In our opinion,
    the split packages and cyclic dependencies problems can occur more often.


    Two independent solutions can help solve the problem of JDK internal APIs:


    - Replace each of your JDK internal APIs with supported APIs.

    - Keep the existing JDK internal APIs and use the `--add-exports` command-line
    option to break the encapsulationÔÇöto make the JDK internal APIs accessible to
    code in other modules or to code on the class path.


    The first solution is by far the better one because we completely get rid of the
    unsupported JDK APIs in our code. Because the JDK internal APIs are marked as
    deprecated, itÔÇÖs wise to provide replacements for them as soon as possible.


    The second solution is reasonable if you donÔÇÖt have enough time to replace the
    unsupported JDK internal APIs with supported ones. If all you want is to make
    your code compile and run again using JDK 9 this time, using the `--add-exports`
    option is a way to move forward. However, Oracle has stated that the JDK unsupported
    APIs will be removed in the next major JDK release. This could be JDK 10 or later.
    Sooner or later, youÔÇÖll have to replace them with supported JDK APIs in order
    to ensure that your code wonÔÇÖt break. As a conclusion, adding the `--add-exports`
    option is just a temporary solution to make code work. ThereÔÇÖs no guarantee how
    long this workaround will work. It all depends on how long the unsupported JDK
    APIs that youÔÇÖre using will remain in JDK and not be removed.


    We already saw in this chapter how to identify the presence of JDK internal APIs
    in a JAR file or in a module: by using the JDeps tool with the option `--jdk-internals`.
    LetÔÇÖs move on to discuss another possible problem we may encounter during compilation:
    not resolved modules.


    ### Not Resolved Modules


    Remember the module graph that resulted after the modularization of the JDK? Figure
    [8-3](#A431534_1_En_8_Chapter.html#Fig3) shows a small part of it.


    ![A431534_1_En_8_Fig3_HTML.gif](Images/A431534_1_En_8_Fig3_HTML.gif)


    Figure 8-3. Small part of the module graph of the Java SE modules with module
    `java.se.ee` at the top


    Module `java.se.ee` is located right at the top of the module graph, and module
    `java.se` is only a level below. As described in Chapter [3](../Text/A431534_1_En_3_Chapter.html),
    the differences between the module `java.se.ee` and the module `java.se` are as
    follows:


    - The module `java.se.ee` collects all modules that comprise the Java SE platform,
    including the modules that overlap with the Java EE platform.

    - The module `java.se` collects all the modules that comprise the Java SE platform
    that donÔÇÖt overlap with the Java EE platform.

    - The module `java.se.ee` contains a total number of five modules that arenÔÇÖt
    present in module `java.se`: `java.xml.ws`, `java.xml.bind`, `java.corba`, `java.activation`,
    and `java.xml.ws.annotation`.


    We deliberately use the term *collects* instead of *contains* here because both
    module `java.se.ee` and module `java.se` are aggregator modules, which means that
    according to the JDK 9 specification, they ÔÇťcollect and re-export the content
    of other modules but add no content of their own.ÔÇŁ


    During the compilation process in JDK 9, the `java.se` module is considered the
    root module and not the `java.se.ee` module. This means that in the compilation
    step, the visible modules are the ones that are under the `java.se` module. It
    also means that the five modules from the module `java.se.ee` that arenÔÇÖt in module
    `java.se` arenÔÇÖt visible at compilation.


    > **Note:** The reason why the five modules arenÔÇÖt resolved by default is related
    to backward-compatibility problems.


    If our code makes use of any of the following five modules, the compilation will
    fail:


    - `java.xml.ws`

    - `java.xml.ws.annotation`

    - `java.xml.bind`

    - `java.corba`

    - `java.activation`


    We can compare the modules contained by the `java.se` module with the modules
    contained by the `java.se.ee` module by limiting the observable modules with the
    `--limit-modules` option. The following two commands return the name of all the
    modules having module `java.se` and `java.se.ee`, respectively, in the root of
    the transitive closure:


    ```

    java --limit-modules java.se --list-modules

    java --limit-modules java.se.ee --list-modules

    ```


    The solution for getting rid of the non-resolved modules problem is simple. We
    have to add the modules to the default root set of modules at both compile-time
    and runtime using the `--add-modules` command-line option, so they can be resolved:


    ```

    --add-modules

    ```


    For instance, if weÔÇÖre using types from module `java.xml.ws`, then itÔÇÖs absolutely
    necessary to always add the module `java.xml.ws` in the root set of modules at
    both compile-time and runtime:


    ```

    javac --add-modules java.xml.ws

    java --add-modules java.xml.ws

    ```


    As a result, the `java.xml.ws` module is resolved and can be used.


    > **Note:** Even if we use only libraries that have dependencies on these five
    modules, we still have to add the non-resolved modules to the root set of modules.


    We now know that by adding the modules to the root set of module we can solve
    compilation errors like `"package java.activation doesn''t exist"` or `"package
    java.xml.bind doesn''t exist"`.


    ItÔÇÖs time to explore another issue that can occur during migration: split packages.'
