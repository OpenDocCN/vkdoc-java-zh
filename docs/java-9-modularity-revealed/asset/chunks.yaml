    result, the `EmployeeImpl` file from `com.apress.moduleA2` directory has been
    compiled into the `patchModules` directory. Further, we create a JAR file for
    the class that we previously patched. In this case, we create a normal JAR, not
    a modular one. Therefore, we go inside the `patchModules` directory and type the
    following:


    ```

