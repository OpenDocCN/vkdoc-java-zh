- fmt: "### The `exports` Clause\n\nThe `exports` clause has the role of exporting\
    \ a package at compile-time as well as at runtime. It allows a module to specify\
    \ which packages it exports. Only an `exported` package can be available to other\
    \ modules, provided that the other conditions regarding reliable configuration\
    \ are met. The reverse is also true. A package that isnÔÇÖt exported isnÔÇÖt available\
    \ for any other modules.\n\n**Note**  \nA module doesnÔÇÖt export any package by\
    \ default. This means that by default, no package from the current module is available\
    \ to other modules for access.\n\nThe `exports` clause is specified in the module\
    \ descriptor by using the keyword `exports` followed by the package name. ItÔÇÖs\
    \ forbidden to separate packages or modules using a comma. For each package, a\
    \ separate `exports` clause must exist.\n\nFigure┬á[4-5](#A431534_1_En_4_Chapter.html#Fig5)\
    \ shows the syntax of the `exports` clause.\n\n![A431534_1_En_4_Fig5_HTML.gif](Images/A431534_1_En_4_Fig5_HTML.gif)\n\
    \n**Figure 4-5.** Syntax of the `exports` clause\n\nSimilar to the `requires`\
    \ clause, the `exports` clause has some constraints. For example, duplicating\
    \ the `exports` statements inside the module declaration isnÔÇÖt allowed and results\
    \ in a compilation error:\n\n```\nerror: duplicate export: \n```\n\nWe suppose\
    \ that module `com.apress.moduleB` wants to make two of its packages, `com.apress.moduleB.packageB1`\
    \ and `com.apress.moduleB.packageB2`, available to other modules that require\
    \ it. In this case we say that module `com.apress.moduleB` exports those packages.\
    \ Listing [4-8](#A431534_1_En_4_Chapter.html#Par104) illustrates this in its module\
    \ declaration.\n\n```\nmodule com.apress.moduleB {\n    exports com.apress.moduleB.packageB1;\n\
    \    exports com.apress.moduleB.packageB2;\n}\n```\n\n**Listing 4-8.** The `module-info.java`\
    \ of module `com.apress.moduleB`\n\nListing [4-9](#A431534_1_En_4_Chapter.html#Par106)\
    \ states that module `com.apress.moduleC` also exports a package called `com.apress.moduleC.packageC1`.\n\
    \n```\nmodule com.apress.moduleC {\n    exports com.apress.moduleC.packageC1;\n\
    }\n```\n\n**Listing 4-9.** The Module Descriptor of module `com.apress.moduleC`\n\
    \nIn the following module graph, module `com.apress.moduleB` has two packages\
    \ that are both exported. Module `com.apress.moduleC` also consists of two packages,\
    \ but only one is exported according to its module definition. Package `com.apress.moduleC.packageC2`\
    \ isnÔÇÖt exported and therefore will never be accessible outside the module `com.apress.moduleC`.\
    \ Any other module attempting to make use of package `com.apress.moduleC.packageC2`\
    \ will not only fail, it will also not be compiled successfully.\n\nFigure┬á[4-6](#A431534_1_En_4_Chapter.html#Fig6)\
    \ shows a new enhanced type of the module graph where we have also inserted the\
    \ packages that the module contains. The packages `com.apress.moduleB.packageB1`,\
    \ `com.apress.moduleB.packageB2`, and `com.apress.moduleC.packageC1` are exported,\
    \ and the `com.apress.moduleC.packageC2` package is not exported.\n\n![A431534_1_En_4_Fig6_HTML.gif](Images/A431534_1_En_4_Fig6_HTML.gif)\n\
    \n**Figure 4-6.** Module graph showing which packages are exported and which arenÔÇÖt\n\
    \nModule `com.apress.moduleA` can successfully access types in both packages `packageB1`\
    \ and `packageB2` for the following reasons:\n\n- It reads module `com.apress.moduleB`.\n\
    - The packages `packageB1` and `packageB2` are being exported by module `com.apress.moduleB`.\n\
    \nHowever, if a new package were added into module `com.apress.moduleB`, it would\
    \ not be accessible to module `com.apress.moduleA` unless it were declared as\
    \ exported in the module description of module `com.apress.moduleB`. Module `com.apress.moduleA`\
    \ can access types from `com.apress.moduleC`, but only from package `packageC1`\
    \ because this is the only package that is being exported by module `com.apress.moduleC`.\
    \ Package `packageC2` is not being exported and therefore canÔÇÖt be accessed by\
    \ module `com.apress.moduleA`.\n\nWeÔÇÖve learned so far how to set up a module\
    \ declaration file and how to use the `requires` and `exports` clauses. Listing\
    \ [4-10](#A431534_1_En_4_Chapter.html#Par114) presents a simple module with both\
    \ `requires` and `exports` clauses.\n\n```\nmodule com.apress.moduleA {\n    requires\
    \ com.apress.moduleB;\n    exports com.apress.moduleA.packageP1;\n}\n```\n\n**Listing\
    \ 4-10.** The Module Descriptor of module `com.apress.moduleA` Using Both `requires`\
    \ and `exports` Clauses\n\nIn this example, we defined a module called `com.apress.moduleA`\
    \ that depends upon another module called `com.apress.moduleB` and also exports\
    \ the package called `com.apress.moduleA.packageP1`.\n\n### The `opens` Clause\n\
    \nUntil now weÔÇÖve seen how we can achieve strong encapsulation using the `exports`\
    \ directive. But what happens if we need to access some types using reflection?\n\
    \n**Note**  \nThe `exports` clause just shown doesnÔÇÖt allow its non-public types\
    \ to become accessible by using deep reflection.\n\nThere are two different situations\
    \ for using reflection in Java 9:\n\n- Code in the unnamed module (the class path)\
    \ can access code in any named modules using reflection. This is possible due\
    \ to a flag called `--illegal-access` thatÔÇÖs set by default and that was added\
    \ by the JCP team in order to ease migration. Many frameworks such as Hibernate\
    \ and JPA need reflective access to code in named modules. These frameworks typically\
    \ reside on the class path. Chapter [8](../Text/A431534_1_En_8_Chapter.html) discusses\
    \ the `--illegal-access` flag in more detail.\n- Code in a named module canÔÇÖt\
    \ access code in any named modules using reflection.\n\nThis is where the new\
    \ `opens` clause and the `--add-opens` command-line option come in play.\n\nIn\
    \ order to solve this problem, a new directive called `opens` was introduced.\
    \ Its role is to provide reflective access to the types passed as parameter.\n\
    \n**Note**  \nUsing `opens` to export a package that has some internal implementation\
    \ isnÔÇÖt recommended. Doing so will expose the internal implementation and break\
    \ the strong encapsulation rules.\n\nFigure┬á[4-7](#A431534_1_En_4_Chapter.html#Fig7)\
    \ illustrates the syntax of the `opens` clause.\n\n![A431534_1_En_4_Fig7_HTML.gif](Images/A431534_1_En_4_Fig7_HTML.gif)\n\
    \n**Figure 4-7.** The syntax of the `opens` clause\n\nThe `opens` clause is another\
    \ clause that can exist in a module descriptor, besides the `requires` and `exports`\
    \ clauses discussed earlier in this chapter. The `opens` clause is used inside\
    \ the module declaration to define the packages that are available for deep reflection\
    \ at runtime for all modules. Therefore, both the public and the private types\
    \ of the package are accessible using deep reflection by code in other modules.\n\
    \n**Note**  \nPackages inside a module are by default available for deep reflection\
    \ only by code in any unnamed module.\n\nThe `opens` directive can also be qualified\
    \ by specifying a list of target named modules, as illustrated in Figure [4-8](#A431534_1_En_4_Chapter.html#Fig8).\n\
    \n![A431534_1_En_4_Fig8_HTML.gif](Images/A431534_1_En_4_Fig8_HTML.gif)\n\n**Figure\
    \ 4-8.** The syntax of the qualified `opens` clause\n\nThere are some characteristics\
    \ of the `opens` clauses you should know. First, itÔÇÖs important to know that it\
    \ is possible to use both `exports` and `opens` directives for the same package.\
    \ In this case, the package is exported for access at compile-time and runtime\
    \ and also available for deep reflection at runtime. As a result, its public types\
    \ can be accessed at compile-time and at runtime, and both its public and private\
    \ types can be accessed at runtime using reflection. Second, the `opens` directive\
    \ canÔÇÖt be used inside an open module. Open modules are covered later in this\
    \ chapter.\n\n**Note**  \nThe `opens` directive canÔÇÖt use wildcards and cannot\
    \ contain more than one package."
