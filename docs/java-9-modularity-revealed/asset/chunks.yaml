    \ or its short-form, `-p`.\n\nFigure [4-9](#A431534_1_En_4_Chapter.html#Fig9)\
    \ shows the command-line syntax of the module path flag:\n\n![A431534_1_En_4_Fig9_HTML.gif](Images/A431534_1_En_4_Fig9_HTML.gif)\n\
    \n**Figure 4-9.** Syntax of the `--module-path` command-line option\n\nThe module\
    \ path flag gets a list of directories as parameters separated by a colon. There\
