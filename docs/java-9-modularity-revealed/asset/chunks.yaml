    \ artifact from the module path must have a module declaration. On the module\
    \ path, we canÔÇÖt have artifacts that donÔÇÖt have a module declaration.\n\n> **Note**\
    \  \n> Even if the module path was introduced in Java 9 to replace the class path,\
    \ the class path still exists and can be used standalone or in combination with\
