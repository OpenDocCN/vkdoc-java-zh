- fmt: '### Benefits of Modular Programming


    We stress some important advantages of modular programming throughout this book,
    especially when we talk about Project Jigsaw, which brings modularity to Java
    9. As you know by now, modular programming reduces the complexity of software
    applications. And it facilitates the reuse of software components. Moreover, it
    generally helps make debugging applications easier because only a single module
    can be debugged and not the entire monolith.


    Modular programming allows a team to work together on the same project at the
    same time with fewer problems related to source code conflicts. If every developer
    works on their own module, there wonÔÇÖt be any conflicts at all. Having to write
    less code is another benefit of using modular programming and it is a direct consequence
    of the reuse capability. By using modular programming techniques, developers gain
    better productivity and performance by taking advantage of parallel development.


    Faster development is another key aspect of modular programming. The time required
    for development decreases because modules can be designed and implemented independently.
    The development process can be scaled because itÔÇÖs possible to develop more modules
    simultaneously by involving a larger team that can work on different modules at
    the same time. If a module is being modified, then the other modules will continue
    to work.


    Modules should be easily interchanged with other modules. By defining an interface
    for the other modules of the application, changing or replacing a module implies
    only assuring that the new interface is equivalent to the old one. The internal
    implementation of the new module can differ.


    Another important aspect refers to the testing process. Instead of testing an
    entire application as a whole monolith, the application is divided into modules,
    and each module is tested separately. Because the modules are independent, multiple
    modules can be tested at the same time, which speeds test execution and assures
    the integrity of the modules. By testing each module separately as a unit, better
    test coverage is achieved. Integration testing is performed by connecting the
    modules and looking at them as black boxes.


    Now that you know what the principles and benefits of modular programming are,
    itÔÇÖs time to make a comparison between modular programming and object-oriented
    programming.


    ### Modular Programming vs. Object-Oriented Programming (OOP)


    The similarities between modular programming and OOP include the fact that both
    break large software applications down into fragments or concerns. Modular programming
    is not object-oriented. The core principles of OOP, such as polymorphism and inheritance,
    donÔÇÖt exist in modular programming. In OOP, polymorphism is used to dynamically
    change the properties of classes at runtime. This isnÔÇÖt possible in modular programming
    because the modules arenÔÇÖt dynamic. Besides that, in OOP classes use inheritance
    to enable other classes to inherit variables and method implementations from them.
    In modular programming, a module canÔÇÖt inherit another module.


    One of the main differences between modular programming and OOP is the fact that
    in OOP objects can be created from classes. In modular programming, deriving objects
    from modules isnÔÇÖt possible.


    ### Monolithic Application vs. Modular Application


    A monolithic application is a software application with a high level of complexity
    that executes an entire group of tasks in order to implement a whole use case.
    It doesnÔÇÖt execute only a specific task or function and it doesnÔÇÖt consist of
    any logical units that can be identified. It has the role of executing entire
    functions, not just particular tasks inside these functions. Monolithic applications
    are constructed without modularity.


    Figure [1-4](#A431534_1_En_1_Chapter.html#Fig4) shows a possible architecture
    of a monolithic application.


    ![A431534_1_En_1_Fig4_HTML.gif](Images/A431534_1_En_1_Fig4_HTML.gif)


    Figure 1-4. Architecture of a monolithic application


    A monolithic application typically consists of many layers: presentation layer,
    business layer, data access layer, and database. With this system of layers, using
    multiple technologies for a single layer is difficult. We donÔÇÖt claim that itÔÇÖs
    absolutely impossibleÔÇöit depends on the technologies youÔÇÖre using. Sometimes itÔÇÖs
    possible to use multiple technologies, and sometimes not. But having such constraints
    is definitely a drawback for every developer. If they find a third-party library
    that can solve a specific problem easier, they might not be able to use it because
    itÔÇÖs incompatible with the technology used on that layer. It would have been easier
    for them to be able to split the layers into different microservices and have
    the freedom to use, for each microservice, whichever technology better suits the
    task. Being forced sometimes to continue to use the existing technology is bad
    because the technology may already be old. For a modular system, because you may
    not have so many dependencies to care about, it is obviously not so time-consuming
    to update the technology and install the latest version of it, when compared to
    a monolithic system.


    Due to the complexity of the system and the technical know-how required, there
    may be many cases when multiple teams are working on different layers of the application.
    To add a new feature to the application, every layer has to be addressed, which
    means in most cases, when a new feature is added, more than one team has to be
    involved. That can increase the time needed to develop and test new features because
    the teams will need to coordinate their work. There may also be more integration
    work to doÔÇöteams will not only have to coordinate with each other, theyÔÇÖll sometimes
    also have to wait for certain features to be ready so they can integrate their
    own piece of developed functionality.


    As for scalability, a monolithic system can be scaled only as a whole. ItÔÇÖs impossible
    to scale only specific parts of the system, and itÔÇÖs not a good idea to try to
    scale the entire system if only a part should be actually scaled. Scaling the
    entire system could mean additional infrastructure costs. This is why monolithic
    applications arenÔÇÖt so frequently upgraded and patched compared to modular applications.


    A monolithic application can be separated into a set of modules, but thatÔÇÖs not
    the only way to get a modular application. It can also be designed as modular
    from the beginning. Redesigning a monolithic application may be not a trivial
    task, especially when the system is very complex.


    ## Summary


    This chapter presented some general aspects on modularity. It discussed two important
    aspects of modularity: maintainability and reusability. It explained the concept
    of a software module and underlined the basics of the module declaration. It went
    over the four main concepts upon which a modular application is built: strong
    encapsulation, explicit interfaces, high module cohesion, and low module coupling.
    It presented the benefits of modular programming and compared modular and object-oriented
    programming. And the chapter illustrated what tight and loose coupling are and
    showed an explanatory example using Java.


    HereÔÇÖs a short summary of when we should use modular programming:


    - When we have a large program with lots of classes and methods and dependencies
    between themÔÇösuch programs are always good candidates for modularization

    - When we want to make a software application more suitable for future developments

    - When we want to get out of monolithic applications

    - When we want to make a software application more understandable


    The next chapter explores the basics of Project Jigsaw, the new Java Platform
    Module System introduced in Java 9.'
