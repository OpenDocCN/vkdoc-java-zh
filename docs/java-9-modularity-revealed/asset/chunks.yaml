- fmt: '# Summary


    In this chapter we talked about services. Services are used to decouple modules
    by specifying a contract in form of an interface. They allow loose coupling between
    service consumer and service providers. The concept of loose coupling is very
    important in software development, especially when weÔÇÖre talking about large software
    applications. We showed how to declare that a module provides a service by using
    the new construct `provides ÔÇŽ with` inside the module descriptor `module-info.java`.
    Afterwards, we talked about how to declare that a module consumes a service by
    using the new construct `uses` inside the module descriptor. Further, we discussed
    how to retrieve a `ServiceLoader`.


    We looked at two examples of how we can define one service consumer and one service
    provider, respectively one service consumer and two service providers.


    In Chapter [7](../Text/A431534_1_En_7_Chapter.html) youÔÇÖll learn about the `Jlink`
    tool, which lets us create custom runtime images that contain only the modules
    we need.


    # 7. Jlink: The Java Linker


    Throughout the software development process, we may encounter situations in which
    we need targeted Java Runtime Environments (JREs) for the operating system weÔÇÖre
    using. The reasons for this are various: we may want to achieve a better degree
    of performance or we may have some customized libraries that only work on a specific
    operating system.


    For instance, when using microservices, we may not want to use the entire JDK,
    but rather just a part of it. Microservices are small and typically donÔÇÖt use
    libraries from the whole JDK.


    `Jlink` helps solve these problems by creating a customized, targeted version
    of the JRE that is specific to an operating system and contains only the modules
    we need.


    ## The Java Linker


    Java 9 introduces a new tool for dynamically linking modules, called `Jlink`.
    Its role is to assemble a group of modules in order to create a runtime image.
    During the assembly process, different optimizations across module boundaries
    can be applied. The following sections cover some methods for performing this
    kind of optimizations.


    `Jlink` starts with the modules we specify and searches recursively for all the
    `requires` statements inside the module descriptors of the specified modules.
    In this way, `Jlink` can find all the modules needed to be assembled inside a
    new custom runtime image.


    A runtime image created by the `Jlink` tool contains the minimum number of required
    modules together with their dependencies. We can also specify which modules we
    want to be added to the runtime image. As a result, a platform-specific binary
    executable is created.


    `Jlink` can take the following types of files as input:


    *   Modular JAR files

    *   JMOD files

    *   JAR files

    *   Class files


    The following types of files can represent the output of the `Jlink` tool:


    *   JMOD files

    *   JAR files

    *   JVM images

    *   Custom JREs


    The `Jlink` tool can generate these four kinds of files at link time. `Jlink`
    can even create custom JVM images. Figure [7-1](#A431534_1_En_7_Chapter.html#Fig1)
    illustrates the types of input files that are accepted by the `Jlink` tool and
    also which kind of output files it can create.


    ![A431534_1_En_7_Fig1_HTML.gif](Images/A431534_1_En_7_Fig1_HTML.gif)


    Figure 7-1. Types of input and output files for the `Jlink` tool


    The `Jlink` tool acts like a transformer of code and runs the resolution process
    in order to compute the minimum possible set of modules needed for creating the
    runtime image. The minimum runtime image we can hypothetically create is a runtime
    image that contains only the base module, `java.base`. `Jlink` is a tool used
    at build-time that can cross-compile and use cross-module optimizations, but it
    canÔÇÖt create cross-platform executable files.


    You may ask how `Jlink` knows what our target platform is. It knows that based
    on the type of the platform modules weÔÇÖre attempting to link. For example, if
    weÔÇÖre working on a Linux operating system and are passing a module path to a Windows
    distribution, `Jlink` will link the Windows versions of these modules and create
    a Windows runtime image.


    > **Note:** The module path we specify when we use `Jlink` has to be the module
    for the target platform.


    There is no change needed at code level in order to use `Jlink`. `Jlink` assembles
    the modules into a custom runtime image and doesnÔÇÖt modify the `module-info.class`
    files at all.


    ### Jlink Images


    `Jlink` images are specific to each operating system. They represent a customization
    of the JDK and the JRE. We can consider them as custom runtime images of a JRE
    that contains only the modules our application needs. `Jlink` creates a custom
    directory that can be used to run our Java application.


    A `Jlink` image contains the following directories:


    *   `bin`

    *   `conf`

    *   `include`

    *   `legal`

    *   `lib`

    *   `release`


    `Jlink` also links modules that have the directive `requires static myModule`.
    At runtime, if the module `myModule` is located on the module path, the `requires
    static` clause will be satisfied. If we have an application that uses only the
    module `java.base` and nothing else, then our custom runtime image will consist
    only of our application modules plus the `java.base` module.


    YouÔÇÖll learn more about `Jlink` images and `Jlink` command syntax later in this
    chapter as we create a custom runtime image.


    ### Jlink Command Syntax


    To create a custom runtime image using `Jlink`, the `jlink` command is used together
    with the necessary options. Figure [7-2](#A431534_1_En_7_Chapter.html#Fig2) shows
    the syntax of this command together with its most important options.


    *   `[jlink_options]` specifies a set of options separated by spaces. YouÔÇÖll learn
    about these options in the next section.

    *   The `--module-path` option specifies the location of the modules that should
    be discovered by the `Jlink` tool. They can be exploded modules, modular JAR files,
    or JMOD files.

    *   The `--add-modules` option specifies the names of the modules to add to the
    runtime image. The modules specified will be added to the runtime image together
    with their transitive dependencies.

    *   The `--output` option specifies the directory where the custom runtime image
    will be created.


    ![A431534_1_En_7_Fig2_HTML.gif](Images/A431534_1_En_7_Fig2_HTML.gif)


    Figure 7-2. The syntax of the `jlink` command


    As mentioned, the `Jlink` tool receives the module path showing where to find
    the modules. It finds the modules by starting the module resolution process that
    searches for all the transitive dependencies of each module until the bottom module,
    `java.base`, is reached. Provided that we add a module using the `--add-modules`
    command-line option, `Jlink` will search for all its `requires` and `requires
    static` clauses and add all the corresponding dependent modules into the custom
    runtime image.


    > **Note:** The `Jlink` tool allows cross-linking if we have the JMOD files for
    the target platform.'
  raw: '## Summary


    In this chapter we talked about services. Services are used to decouple modules
    by specifying a contract in form of an interface. They allow loose coupling between
    service consumer and service providers. The concept of loose coupling is very
    important in software development, especially when weÔÇÖre talking about large software
    applications. We showed how to declare that a module provides a service by using
    the new construct `provides ÔÇŽ with` inside the module descriptor module-info.java.
    Afterwards, we talked about how to declare that a module consumes a service by
    using the new construct `uses` inside the module descriptor. Further, we discussed
    how to retrieve a `ServiceLoader`.


    We looked at two examples of how we can define one service consumer and one service
    provider, respectively one service consumer and two service providers.


    In Chapter [7](../Text/A431534_1_En_7_Chapter.html) youÔÇÖll learn about the Jlink
    tool, which lets us create custom runtime images that contain only the modules
    we need.


    # 7.┬áJlink: The Java Linker


    Throughout the software development process, we may encounter situations in which
    we need targeted Java Runtime Environments (JREs) for the operating system weÔÇÖre
    using. The reasons for this are various: we may want to achieve a better degree
    of performance or we may have some customized libraries that only work on a specific
    operating system.


    For instance, when using microservices, we may not want to use the entire JDK,
    but rather just a part of it. Microservices are small and typically donÔÇÖt use
    libraries from the whole JDK.


    Jlink helps solve these problems by creating a customized, targeted version of
    the JRE that is specific to an operating system and contains only the modules
    we need.


    ## The Java Linker


    Java 9 introduces a new tool for dynamically linking modules, called Jlink. Its
    role is to assemble a group of modules in order to create a runtime image. During
    the assembly process, different optimizations across module boundaries can be
    applied. The following sections cover some methods for performing this kind of
    optimizations.


    Jlink starts with the modules we specify and searches recursively for all the
    `requires` statements inside the module descriptors of the specified modules.
    In this way, Jlink can find all the modules needed to be assembled inside a new
    custom runtime image.


    A runtime image created by the Jlink tool contains the minimum number of required
    modules together with their dependencies. We can also specify which modules we
    want to be added to the runtime image. As a result, a platform-specific binary
    executable is created.


    Jlink can take the following types of files as input:


    *   Modular JAR files

    *   JMOD files

    *   JAR files

    *   Class files


    The following types of files can represent the output of the Jlink tool :


    *   JMOD files

    *   JAR files

    *   JVM images

    *   Custom JREs


    The Jlink tool can generate these four kinds of files at link time. Jlink can
    even create custom JVM images. Figure [7-1](#A431534_1_En_7_Chapter.html#Fig1)
    illustrates the types of input files that are accepted by the Jlink tool and also
    which kind of output files it can create.


    ![A431534_1_En_7_Fig1_HTML.gif](Images/A431534_1_En_7_Fig1_HTML.gif)


    Figure 7-1.


    Types of input and output files for the Jlink tool


    The Jlink tool acts like a transformer of code and runs the resolution process
    in order to compute the minimum possible set of modules needed for creating the
    runtime image . The minimum runtime image we can hypothetically create is a runtime
    image that contains only the base module, java.base. Jlink is a tool used at build-time
    that can cross-compile and use cross-module optimizations, but it canÔÇÖt create
    cross-platform executable files.


    You may ask how Jlink knows what our target platform is. It knows that based on
    the type of the platform modules weÔÇÖare attempting to link. For example, if weÔÇÖre
    working on a Linux operating system and are passing a module path to a Windows
    distribution, Jlink will link the Windows versions of these modules and create
    a Windows runtime image.


    Note


    The module path we specify when we use Jlink has to be the module for the target
    platform.


    There is no change needed at code level in order to use Jlink. Jlink assembles
    the modules into a custom runtime image and doesnÔÇÖt modify the module-info.class
    files at all.


    ### Jlink Images


    Jlink images are specific to each operating system. They represent a customization
    of the JDK and the JRE. We can consider them as custom runtime images of a JRE
    that contains only the modules our application needs. Jlink creates a custom directory
    that can be used to run our Java application.


    A Jlink image contains the following directories :


    *   bin

    *   conf

    *   include

    *   legal

    *   lib

    *   release


    Jlink also links modules that have the directive `requires static myModule`. At
    runtime, if the module myModule is located on the module path, the `requires static`
    clause will be satisfied. If we have an application that uses only the module
    java.base and nothing else, then our custom runtime image will consist only of
    our application modules plus the java.base module.


    YouÔÇÖll learn more about Jlink images and Jlink command syntax later in this chapter
    as we create a custom runtime image.


    ### Jlink Command Syntax


    To create a custom runtime image using Jlink, the `jlink` command is used together
    with the necessary options. Figure [7-2](#A431534_1_En_7_Chapter.html#Fig2) shows
    the syntax of this command together with its most important options.


    *   `[jlink_options]` specifies a set of options separated by spaces. YouÔÇÖll learn
    about these options in the next section.

    *   The `--module-path` option specifies the location of the modules that should
    be discovered by the Jlink tool. They can be exploded modules, modular JAR files,
    or JMOD files.

    *   The `--add-modules` option specifies the names of the modules to add to the
    runtime image. The modules specified will be added to the runtime image together
    with their transitive dependencies.

    *   The `--output` option specifies the directory where the custom runtime image
    will be created.


    ![A431534_1_En_7_Fig2_HTML.gif](Images/A431534_1_En_7_Fig2_HTML.gif)


    Figure 7-2.


    The syntax of the jlink command


    As mentioned, the Jlink tool receives the module path showing where to find the
    modules. It finds the modules by starting the module resolution process that searches
    for all the transitive dependencies of each module until the bottom module, java.base,
    is reached. Provided that we add a module using the `--add-modules` command-line
    option, Jlink will search for all its `requires` and `requires static` clauses
    and add all the corresponding dependent modules into the custom runtime image.


    Note


    The Jlink tool allows cross-linking if we have the JMOD files for the target platform.'
