- fmt: "# Using Services in JDK 9\n\nThis section describes what services are in Java\
    \ 9 and how we can use them to prevent tight coupling between modules. Project\
    \ Jigsaw can use the service registry as a layer of communication for the interaction\
    \ between modules.\n\nModules can register their implementation class as a service\
    \ in the service registry. These modules are called service provider modules.\
    \ Their main role is to provide implementations of an interface. The service consumer\
    \ modules use services that implement the interface thatÔÇÖs defined in the service\
    \ registry. They donÔÇÖt deal with the implementation classes that implement the\
    \ interface defined in the service registry. Service consumer modules obtain objects\
    \ from the service registry that implement the interface. In this way, theyÔÇÖre\
    \ able to successfully call methods on this interface.\n\n> **Note**  \n> A service\
    \ consumer module and a service provider module donÔÇÖt have a dependency upon each\
    \ other.\n\nThe interface defined in the service registry implemented by the corresponding\
    \ class represents the interaction between service providers and service consumers.\
    \ The service registry instantiates the classes and afterwards provides this instance\
    \ to the service consumer. The service consumer only has to know about the interface.\
    \ It will return an object that implements the interface. It can also call methods\
    \ on this object.\n\n> **Note**  \n> A service can be declared as an abstract\
    \ class or as an interface. However, itÔÇÖs better from a design point of view to\
    \ use an interface rather than an abstract class. When using an abstract class\
    \ instead of an interface, a public static provider method has to be defined.\n\
    \nLetÔÇÖs look at the syntax of the `uses` and `provides` clauses, which are mandatory\
    \ in order to be able to implement the concepts present throughout this chapter.\n\
    \n## Providing and Consuming Services\n\nIn this section youÔÇÖll learn how to consume\
    \ and provide services in JDK 9. We present the clauses used in the module declarations\
    \ to declare that a module provides a service implementation and that a module\
    \ uses a service.\n\n### Providing a Service\n\nThe Java Platform Module System\
    \ introduced a new construct called `provides` in the module descriptor in order\
    \ for a module to be able to declare that it provides and exposes a service implementation\
    \ for a specific service. Figure [6-1](#A431534_1_En_6_Chapter.html#Fig1) illustrates\
    \ its syntax.\n\n![A431534_1_En_6_Fig1_HTML.gif](Images/A431534_1_En_6_Fig1_HTML.gif)\n\
    \n**Figure 6-1.** The `provides with` clause\n\nThe `provides with` clause takes\
    \ two parameters:\n\n*   `<interface_name>` represents the name of the service\
    \ interface. It specifies the name of the service for which the current module\
    \ provides an implementation. The service could be either a class or an interface.\n\
    *   `<class_name>` represents the name of the class. It specifies the name of\
    \ the class that implements the service interface. This class must be present\
    \ in the current module. If it is not present in the current module, we get a\
    \ compilation error.\n\nA module uses the `provides` clause to inform the `ServiceLoader`\
    \ that it provides an implementation of a service. Without this knowledge, the\
    \ `ServiceLoader` wouldnÔÇÖt have been able to load the service provider because\
    \ it wouldnÔÇÖt have been aware of its existence.\n\n> **Note**  \n> JDK 9 allows\
    \ you to have a service implementation as an interface. This wasnÔÇÖt possible in\
    \ previous versions of Java.\n\nJigsaw also allows for a single module to provide\
    \ an implementation for a service and to also consume that service. But it does\
    \ not allow for more than one `provides` statement to specify the same interface\
    \ in a module declaration. A module declaration like this will never compile:\n\
    \n```\nmodule myModule {\n    provides myInterface with firstClass;\n    provides\
    \ myInterface with secondClass;\n}\n```\n\nWe mentioned previously the notion\
    \ of consuming a service. The next subsection explains what this means and how\
    \ it can be declared in Jigsaw.\n\n### Consuming a Service\n\nIn JDK 9, a module\
    \ can explicitly declare that it consumes a service. For this, the service has\
    \ to be discovered. Therefore, the `uses` clause was introduced in JDK 9 in the\
    \ module declaration. It takes an interface as a parameter.\n\nFigure [6-2](#A431534_1_En_6_Chapter.html#Fig2)\
