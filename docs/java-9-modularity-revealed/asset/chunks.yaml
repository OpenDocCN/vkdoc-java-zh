    The next section discusses the rt.jar, tools.jar, and dt.jar files that were removed
    in JDK 9.


    ### Removed Files


    #### Rt.jar Removed


    The rt.jar file comprised the entire compiled class files that formed the JRE.
    These represented all the compiled classes from the Core Java API, including the
    sun and com packages. rt.jar used to be located inside the lib folder of the JRE.
    In Java 8, the rt.jar file weighed approximatively 52 MB. In all Java versions
    prior to version 9, it was absolutely mandatory to include the rt.jar file into
    the class path in order to be able to access the core Java libaries. But the rt.jar
    file has been completely removed in Java 9\. It doesnÔÇÖt exist anymore among the
    files that make up the JDK 9.


    Tools, compilers, and integrated development environments (IDEs) using rt.jar
    are affected by the removal of the rt.jar file. They have to be adjusted by their
    authors in order to continue to work properly in Java 9.


    According to the specification of JEP 220, ÔÇťthe class and resources files previously
    stored in lib/rt.jar, lib/tools.jar and lib/dt.jar, and various other internal
    JAR files will now be stored in a more efficient format in implementation specific
    files in the lib directory.ÔÇŁ


    In JDK 9, the rt.jar file was replaced by the new runtime.'
