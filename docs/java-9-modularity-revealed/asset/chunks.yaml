- fmt: '# Overview of Chapters


    The first chapter of this book describes the concepts that build the foundation
    of a modular application: high module cohesion, strong encapsulation, low module
    coupling and explicit interfaces. It also illustrates some of the most important
    principles of modular programming, like: continuity, understandability, reusability,
    combinability, and decomposability.


    You may wonder why we shouldnÔÇÖt use OSGi instead of Jigsaw. The reason is that
    OSGi canÔÇÖt be used to modularize the JDK because itÔÇÖs built on top of the Java
    Development Kit Platform. Jigsaw isnÔÇÖt built on top of the platform but rather
    directly into the core of it. This allows Jigsaw to completely change the structure
    of the JDK. The main differences between Jigsaw and OSGi are described in Chapter
    [2](../Text/A431534_1_En_2_Chapter.html).


    Prior to JDK 9, there was no way to manage modules. ThatÔÇÖs where Project Jigsaw
    comes into action. It introduces a brand new modular system into the JDK and therefore
    allows applications to be built on the skeleton of a modular architecture. It
    brings flexibility, maintainability, security, and scalability to the Java platform.
    It introduces loosely coupled modules by clearly defining the dependencies between
    the modules.


    Project Jigsaw groups the source code of the Java platform into modules and provides
    a new system to implement modules as part of the platform. It applies the modular
    system to the platform and to the JDK itself and offers programmers the possibility
    of writing programs using the modular system on top of the JDK.


    The main goal of Project Jigsaw is to modularize the JDK and the runtime. A new
    component called module is introduced. Chapter [4](../Text/A431534_1_En_4_Chapter.html)
    explains what a module is and how to define a module in Java 9. That chapter also
    examines how to declare a moduleÔÇÖs dependencies, how to encapsulate, and how to
    hide a moduleÔÇÖs internal implementation. YouÔÇÖll learn what an unnamed module,
    a named module, an automatic module, and an open module are. The chapter introduces
    the notion of module path and shows how to build a module graph with no cycles.


    Regarding modules declarations, I show practical examples using each of the five
    clauses introduced in Jigsaw: the `requires` clause, the `exports` clause, the
    `uses` clause, the `provides` clause, and the `opens` clause.


    The objective of the Java modular system is to provide strong encapsulation and
    reliable configuration. Chapter [2](../Text/A431534_1_En_2_Chapter.html) explains
    what these notions mean and how theyÔÇÖre achieved through the modular system in
    Java 9.


    The class path is partially replaced by modules and the module path. The class
    pathÔÇôspecific well-known `ClassNotFound` exceptions are avoided on the module
    path because the compiler can now test, based on the modulesÔÇÖ definitions, whether
    all the modules needed to run the application are available. If theyÔÇÖre not found,
    it doesnÔÇÖt compile the application.


    Accessibility is an important part of the entire ecosystem and is covered throughout
    this book. The integral concept regarding the manner in which accessibility is
    achieved fundamentally changes in Java 9. The public access identifier that we
    all know no longer means accessible everywhere and to anyone. Supplementary accessibility
    levels have been added in JDK 9 that extend the existing accessibility mechanism
    by defining accessibility at the module level. Concepts like direct and implied
    readability, prerequisites for defining accessibility, are also outlined in this
    book. YouÔÇÖll see how accessibility is imposed by the compiler, by the virtual
    machine, or by using core reflection.


    WeÔÇÖll look at the new concept of modular JAR files and the great advantage it
    brings: the possibility of compiling a library with JDK 9+, using it on the module
    path for JDK 9+, and compiling it with JDK8 or earlier and using it on the class
    path. Because the class path can still be used, the migration of libraries to
    JDK 9 is smooth. Even if the libraries contain a module descriptor and are to
    be treated as ÔÇťmodules,ÔÇŁ they will still work on previous versions of JDK 9 because
    their module descriptor wonÔÇÖt be taken into consideration on the class path. By
    using modular JARs, developers have the freedom to decide whether they want to
    switch to the module platform or not.


    WeÔÇÖll highlight the distinctions between regular and modular JARs with some examples
    and describe the new format for files introduced in Java 9, called JMOD, which
    is very similar to the format of JAR files. WeÔÇÖll go over the new JMOD tool and
    describe its use in detail.


    The compilation of multiple modules using the `--module-source-path` option is
    illustrated with some explanatory examples. WeÔÇÖll also describe the enhancements
    added to the jar tool and show how to use it to package everything as a modular
    JAR or as a JMOD file.


    WeÔÇÖll see how to run the compiled classes and the `module-info.class` using the
    java launcher. New options like `--module-path` and `-m`, introduced in JDK9,
    are covered thoroughly. When attempting to run an application using the `-m` option,
    which tells the launcher where the main module is, a resolution is triggered.
    WeÔÇÖll describe in detail all the steps involved when running a Java modular application,
    including resolution triggering and generation of the module graph. WeÔÇÖll also
    look at special cases like when a module is missing and the startup fails, and
    weÔÇÖll present some workarounds for this, such as using the newly introduced java
    launcher option `--show-module-resolution`.


    WeÔÇÖll also put modular JARs on the class path and see how to successfully run
    them. This is very important: WeÔÇÖll explain how to mix the class path and the
    module path when running with the java launcher. For this, weÔÇÖll take advantage
    of the newly introduced `--add-modules` command-line option.


    Chapter [3](../Text/A431534_1_En_3_Chapter.html) describes the JEP 200, called
    the Modular JDK. This is the JEP that splits the JDK into a set of modules. WeÔÇÖll
    consider the new structure of the JDK together with its modules. WeÔÇÖll talk about
    platform modules and show the module graph that represents the new modular structure
    of the JDK. WeÔÇÖll examine the graph, show how modules depend on each other, and
    learn how to list all the modules from the system using the `--list-modules` command-line
    option. WeÔÇÖll also explain the notions of standard module and non-standard module.


    ItÔÇÖs beyond the scope of this book to go through every module in detail. You can
    find a comprehensive list of all the existing modules on the Open JDK website
    at [`http://cr.openjdk.java.net/Ôł╝mr/jigsaw/ea/module-summary.html`](http://cr.openjdk.java.net/%E2%88%BCmr/jigsaw/ea/module-summary.html).


    The JEP 260, Encapsulate most internal APIs, is also covered in this book. In
    order to manage incompatibilities, all non-critical internal APIs were encapsulated
    by default. Besides that, all critical internal APIs for which supported replacements
    exist in JDK 8 were encapsulated. Other critical internal APIs werenÔÇÖt encapsulated.
    Since they were deprecated in JDK 9, a workaround via a command-line flag is provided.'
