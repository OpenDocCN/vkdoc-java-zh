    \ jdk.hotspot.agent jdk.incubator.httpclient jdk.internal.le jdk.internal.opt\
    \ jdk.internal.vm.ci jdk.jartool jdk.javadoc jdk.jcmd jdk.management.agent jdk.management\
    \ jdk.jconsole jdk.jdeps jdk.jdwp.agent jdk.jdi jdk.jfr jdk.jlink jdk.jshell jdk.jstatd\
