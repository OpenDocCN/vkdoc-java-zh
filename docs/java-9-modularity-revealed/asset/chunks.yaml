- fmt: 'First, letÔÇÖs run it by patching it with classes. In this example, we make
    use of the `--patch-module` command-line option to express that we want to patch
    the module `com.apress.moduleA` with the class existing inside the `patchModules`
    directory. To recap, inside the `patchModules` directory is our `EmployeeImpl.class`,
    which corresponds to the new `EmployeeImpl` class that we want to be used to replace
    the old one:


    ```

    cd ..

    $ java --patch-module com.apress.moduleA=patchModules/com.apress.moduleA --module-path
    modulesLibrary -m com.apress.moduleB/com.apress.moduleB.MainClass

    ```


    We also passed the `main` class to the `-m` flag. The following output is printed
    at the console:


    ```

    Employee first name is: Andrew

    Employee last name is: Lopez

    Employee department is: Big Data

    ```


    As we can see in this output, the new `EmployeeImpl` class replaced the existing
    one. In the `MainClass` we created an object of type `EmployeeImpl` that represents
    the new `EmployeeImpl` class.


    In the previous example, we specified the location of the `.class` files to the
    `--patch-module` option. As an alternative, we can also specify the location of
    the JAR file we previously created inside the `patchModulesLibrary` directory.
    Therefore, we run the `java` launcher and patch the module `com.apress.moduleA`
    with the JAR `com.apress.moduleA.jar`:


    ```

    $ java --patch-module com.apress.moduleA=patchModulesLibrary/com.apress.moduleA.jar
    --module-path modulesLibrary -m com.apress.moduleB/com.apress.moduleB.MainClass

    ```


    The result is the same as the one we previously had. In this example, we revealed
    how we can patch a module using the `--patch-module` command-line option first.


    Now that we know how to patch a module, letÔÇÖs see how we can apply this knowledge
    for running Junit test cases in a modular context.


    **Note**


    You can find the source code for this example in the directory `/ch11/patchingAModule`.


    Earlier in this chapter, you saw three scenarios for unit testing in Java 9. LetÔÇÖs
    look at practical code examples for scenario 1 (Junit test classes and types under
    test reside in separate modules) and scenario 2 (types under test reside in a
    module and the Junit test classes are on the class path).


    ## Running a Junit Test Where the Junit Test Class and the Types Under Test Reside
    in Separate Modules


    The following shows a very simple example of running a Junit test in Java 9. In
    our case, the Junit test and the classes under test reside in different modules.
    This scenario corresponds to scenario 1 described earlier in this chapter. We
    modify the previous example (the example that patched a module) in order to make
    it suitable for testing with Junit.


    We add the following method in the `Employee.java` class of module `com.apress.moduleA`:


    ```

    public String getEmployeeFullData() {

    return getFirstName() + ", " + getLastName() + ", " + getDepartment();

    }

    ```


    We also need to add a Junit test case. It will reside in the module `com.apress.moduleB`
    and will simply call the method `getEmployeeFullData()` from the module `com.apress.moduleA`.


    Listing 11-6 shows the class `EmployeeTest`.


    ```

    package com.apress.moduleB;

    import org.junit.Assert;

    import org.junit.Test;

    import org.junit.Before;

    import com.apress.moduleA.entity.Employee;

    public class EmployeeTest {

    Employee employee;

    @Before

    public void setEmployeeData() {

    employee = new Employee();

    employee.setFirstName("Alexandru");

    employee.setLastName("Jecan");

    employee.setDepartment("IT");

    }

    @Test

    public void employeeDataTest() {

    Assert.assertEquals("Alexandru, Jecan, IT", employee.getEmployeeFullData());

    }

    }

    Listing 11-6.

    The EmployeeTest Class

    ```


    This class imports the `Employee` class from module `com.apress.moduleA`, instantiates
    an object of type `Employee`, and calls a method on it. Listing 11-7 shows the
    module descriptor of module `com.apress.moduleB`.


    ```

    module com.apress.moduleB {

    requires junit;

    requires com.apress.moduleA;

    exports com.apress.moduleB;

    }

    Listing 11-7.

    The module-info.java of Module com.apress.moduleB

    ```


    Module `com.apress.moduleB` requires module `com.apress.moduleA`, because it uses
    types from it. It also requires the module `junit`, because weÔÇÖre using the Junit
    test framework. In this example, `junit` is an automatic module.


    We define a folder called `automaticModules` where we put the two necessary JARs
    needed to run a Junit test: Junit and Hamcrest-core.


    **Note**


    The Junit and Hamcrest-core JAR files can be downloaded from the Maven repository
    at [https://mvnrepository.com/](https://mvnrepository.com/). You can download
    them using your web browser by clicking the Download (JAR) link. You donÔÇÖt need
    to use Maven for this.


    Listing 11-8 shows the content of the `automaticModules` folder.


    ```

    hamcrest-core-1.3jar

    junit-4.12.jar

    Listing 11-8.

    The automaticModules folder

    ```


    We compile both modules `com.apress.moduleA` and `com.apress.moduleB`:


    ```

    javac -d modules --module-path "automaticModules;modulesLibrary" --module-source-path
    src $(find src -name "*.java")

    ```


    The `automaticModules` folder, which contains both JAR files described earlier,
    is passed to the `--module-path` command-line option. In this way, the JAR files
    become automatic modules. Next, we switch to the `modules` folder and create two
    JARs for both modules `com.apress.moduleA` and `com.apress.moduleB`:


    ```

    cd modules

    jar --create --file=../modulesLibrary/com.apress.moduleA.jar -C com.apress.moduleA
    .

    jar --create --file=../modulesLibrary/com.apress.moduleB.jar -C com.apress.moduleB
    .

    ```


    We can now run our unit test. For this, we have to pass all the modules that we
    have on the module path, including the automatic modules. We can use the constant
    `ALL-MODULE-PATH`. As specified in the JDK documentation, this variable stands
    for all the modules on the module path. ItÔÇÖs much easier to specify this constant
    instead of specifying each module separately:


    ```

    cd ..

    java --module-path "automaticModules;modulesLibrary" --add-modules ALL-MODULE-PATH
    -m junit/org.junit.runner.JUnitCore com.apress.moduleB.EmployeeTest

    ```


    The `--module-path` command-line option points to the `automaticModules` folder,
    which contains the Hamcrest and Junit JAR files, and to the `modulesLibrary` folder,
    which contains the `com.apress.moduleA.jar` and the `com.apress.moduleB.jar` files.
    The `-m` option gets the parameter `junit/org.junit.runner.JunitCore com.apress.moduleB.EmployeeTest`.
    In this way, we state that we want to use `JunitCore` from the module `junit`
    to run the tests from the class `EmployeeTest`, which is located inside the package
    `com.apress.moduleB`.


    Instead of the constant `ALL-MODULE-PATH`, it would have also been possible to
    list the modules we need using comma. In this case, we would have had this:


    ```

    --add-modules com.apress.moduleB,hamcrest.core

    ```


    The result of running this test is OK, which means the test was successful and
    weÔÇÖve successfully managed to run the test case by accessing the other module
    and by reading the `junit-4.12.jar` and the `hamcrest-core-1.3.jar` files as automatic
    modules.


    **Note**


    You can find the source code for this example in the directory `/ch11/junitSeparateModules`.'
