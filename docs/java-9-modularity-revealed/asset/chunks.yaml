- fmt: '# The ModuleReader Interface


    The role of the `ModuleReader` interface is to help access the content of a module.
    As stated in the official JDK 9 API documentation, ÔÇťa module reader is intended
    for cases where access to the resources in a module is required, regardless of
    whether the module has been loaded. A framework that scans a collection of packaged
    modules on the file system, for example, may use a module reader to access a specific
    resource in each module.ÔÇŁ


    The JDK 9 API specification defines a couple of methods for the `ModuleReader`
    interface. The most important methods defined by the `ModuleReader` interface
    are as follows:


    *   `Optional<URI> find(String resourceName)`: This method finds the resource
    identified by the name `resourceName`. It returns a `URI` object to the resource
    in the module. It can throw an I/O Exception if the module reader is closed.

    *   `Optional<InputStream> open(String resourceName)`: This method opens a resource
    with name `resourceName`. It returns an `InputStream` object to read the resource
    in the module.

    *   `Optional<ByteBuffer> read(String resourceName)`: This method reads the given
    resource and returns a `ByteBuffer` object that contains the contents of the resource.

    *   `Stream<String> list()`: This method lists the contents of the module. It
    returns a `Stream` of `String` objects that represents the names of all the resources
    in the module. Like the `find(resourceName)` and `open(resourceName)` methods,
    it can throw an I/O Exception if the module reader is closed.


    The following example uses what weÔÇÖve learned so far to read some information
    from a module. We will search inside the `java.base` module for all the implementation
    classes. Once we find them, we load them and then print their name and the name
    of their package.


    Listing [9-1](#A431534_1_En_9_Chapter.html#Par148) shows the class `ModuleReaderExample`,
    which loads all the implementation classes from module `java.base` and then prints
    their name and their package name:


    ```

    package com.apress.apimodule;

    import java.io.IOException;

    import java.io.UncheckedIOException;

    import java.lang.module.ModuleFinder;

    import java.lang.module.ModuleReader;

    import java.lang.module.ModuleReference;

    import java.util.*;

    public class ModuleReaderExample {

    public static void main(String[] args) {

    List> listClasses = getClassesByModuleName("java.base");

    for(Class myClass : listClasses) {

    System.out.println("Name of the class is: " + myClass.getName());

    System.out.println("Name of the package is: " + myClass.getPackageName());

    }

    }

    private static List> getClassesByModuleName(String moduleName) {

    ModuleFinder finder = ModuleFinder.ofSystem();

    Optional optionalModuleReference = finder.find(moduleName);

    ModuleReference moduleReference = optionalModuleReference.get();

    try (ModuleReader moduleReader = moduleReference.open()) {

    return moduleReader.list()

    .filter(name -> name.endsWith("Impl.class"))

    .map(ModuleReaderExample::classLoadByFileName)

    .collect(Collectors.toList());

    } catch(IOException ioException) {

    throw new UncheckedIOException(ioException);

    }

    }

    private static Class classLoadByFileName(String classFileName) {

    ClassLoader classLoader = ModuleReaderExample.class.getClassLoader();

    String nameOfClass = classFileName.substring(0, classFileName.length() - ".class".length());

    try {

    nameOfClass = nameOfClass.replace(''/'',''.'');

    return classLoader.loadClass(nameOfClass);

    }

    catch (ClassNotFoundException classNotFoundException) {

    throw new UncheckedIOException(new IOException(classNotFoundException));

    }

    }

    }

    Listing 9-1.

    The Class ModuleReaderExample

    ```


    The method `static Class<?> classLoadByFileName(String classFileName)` is simple.
    It uses the `ClassLoader` object to load the given class and returns an instance
    of object `Class`. The method `List<Class<?>> getClassesByModuleName(String moduleName)`
    is interesting. It returns a list of `Class` objects that are located in the given
    module. First, we get an instance of the `ModuleFinder` by calling the method
    `ofSystem()`. This method returns a module finder that locates the system modules.
    Then we find a reference to a module with the name `moduleName` by calling the
    `find(moduleName)` method on the `finder` object:


    ```

    Optional optionalModuleReference = finder.find(moduleName);

    ModuleReference moduleReference = optionalModuleReference.get();

    ```


    A `ModuleReference` object is a reference to the moduleÔÇÖs contentÔÇöin our case,
    module `java.base`. To open the module for reading, we call the method `open()`
    on the `ModuleReference` object. Thus we obtain an instance of a `ModuleReader`
    object:


    ```

    ModuleReader moduleReader = moduleReference.open()

    ```


    Next we call the `list()` method on the `ModuleReader` object and filter the results
    by searching only for the classes with names ending in `Impl.class`. In the end,
    we call the method `classLoadByFileName()` to get a `Class` object of the corresponding
    class. In the `main` method, we load all the implementation classes of the module
    `java.base` and print their names together with their package names.


    The output is huge, so weÔÇÖll show only a small snippet of it here:


    ```

    Name of the class is: sun.util.locale.provider.BreakIteratorProviderImpl

    Name of the package is: sun.util.locale.provider

    Name of the class is: java.lang.ProcessImpl

    Name of the package is: java.lang

    Name of the class is: java.util.jar.JavaUtilJarAccessImpl

    Name of the package is: java.util.jar

    ...

    ```


    ## Performing Operations on Modules


    This section covers some operations we can perform on modules programmatically,
    such as getting the module of a class, accessing the resources of a module, searching
    for all the modules in the module path, or getting the module information.


    ### Getting the Module of a Class


    As we already learned in this chapter, a module at runtime is expressed by the
    `Module` class defined in package `java.lang` of the module `java.base`. The `Module`
    class can represent either a named or unnamed module. In order to return a `Module`
    object for our class called `ModuleCore`, we call the method `getModule()` of
    the class `Class`:


    ```

    Class myClass = ModuleCore.class;

    Module module = myClass.getModule();

    ```


    This method returns a module that the class `ModuleCore` is a member of. If the
    class is in the unnamed module, the method `getUnnamedModule()` from `ClassLoader.java`
    is called.


    ### Accessing Resources of a Module


    Listing [9-2](#A431534_1_En_9_Chapter.html#Par161) shows how we can access resources
    of the module using the `getResourceAsStream()` method, which returns an `InputStream`
    object.


    ```

    this.class.getModule().getResourceAsStream("file.properties");

    Listing 9-2.

    Accessing Resources of a Module Using Method getResourceAsStream()

    ```


    We can also access resources of a module using the `getResource()` method, which
    returns a URL object, as in Listing [9-3](#A431534_1_En_9_Chapter.html#Par163).


    ```

    this.getClass().getResource("file.properties")

    ClassLoader.getPlatformClassLoader().getResource("file.properties")

    Listing 9-3.

    Accessing Resources of a Module Using Method getResource()

    ```


    ### Searching for all Modules in the Module Path


    Using the new module API, we can even find all the modules in the module path.
    Listing [9-4](#A431534_1_En_9_Chapter.html#Par165) shows how to search for all
    the modules in the module path in the system environment variable `jdk.module.path`,
    get their module descriptors, and print their module names.


    ```

    ModuleFinder.of(Paths.get(System.getProperty("jdk.module.path"))).

    .findAll()

    .stream()

    .forEach(ref -> {

    System.out.println(moduleReference.descriptor().name());

    });

    Listing 9-4.

    Searching for All the Modules in the Module Path

    ```'
