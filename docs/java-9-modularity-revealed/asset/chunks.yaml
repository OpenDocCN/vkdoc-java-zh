- fmt: '### The `--illegal-access` Option


    The `--illegal-access` option was added into JDK 9 to ease migration. This option
    states that code on the class path can perform illegal reflective access by default.


    > **Note**: Illegal reflective access means access using reflection to types in
    named modules only for code in the class path.


    With the `--illegal-access` option, the code on the class path gets reflective
    access to types in any named modules. The reflective access is done using standard
    reflection-related APIs like `java.lang.reflect` and `java.lang.invoke`. `--illegal-access`
    is very useful for third-party frameworks like Spring, Hibernate, or Guava, which
    were so designed that they need to perform reflective access inside the internals
    of the JDK in order to be able to work properly.


    > **Note**: The `--illegal-access` option allows reflective access only for code
    on the class path to types in any named modules. It doesnÔÇÖt allow reflective access
    for code in named modules to types in other named modules.


    The syntax of the `--illegal-access` option is as follows:


    ```

    java --illegal-access

    ```


    The `--illegal-access` option can take one of four possible parameters: `permit`,
    `warn`, `debug`, and `deny`:


    *   `--illegal-access=permit`: The `permit` mode represents the default behavior
    in Java 9. It states that every package from every module is opened for deep reflection
    to code in all the unnamed modules. The unnamed modules represent the class path.
    This means that at runtime the code from the class path can access the entire
    information stored in modules using deep reflection. A warning will be displayed
    during the first access.

    *   `--illegal-access=warn`: The `warn` mode is very similar to the `permit` mode
    previously discussed. The only difference is that the `warn` mode returns a warning
    each time an illegal access is performed using reflection.

    *   `--illegal-access=debug`: The `debug` mode shows a warning in the stack trace
    for every illegal access performed using reflection.

    *   `--illegal-access=deny`: The `deny` mode disables all the illegal access operations
    using reflection. When this mode is set, no illegal access can be done using reflection.
    Hence, this mode can be overwritten by the command-line option `--add-opens`.
    With `--add-opens` weÔÇÖre able to open specific packages for reflection.


    > **Note**: The JDK internal APIs arenÔÇÖt encapsulated at runtime.


    However, the JCP team announced that the `--illegal-access` option will be removed
    in JDK 10. It will be available only in JDK 9 in order to ease migration of third-party
    libraries that were constructed by making use of deep reflective access into the
    internals of the JDK. The `--illegal-access` option has not been planned right
    from the beginning. It was added later in order to ease migration to Java 9, because
    an important number of external libraries and frameworks use reflection to access
    the internal APIs of the JDK.


    This option emits warning messages when used:


    *   A is the name of the type that contains the code that invoked the reflective
    operation in question.

    *   B is the name of the member being accessed.

    *   C is the name of the command-line option that enabled this access.


    ```

    WARNING: Illegal access by A to B (permitted by C)

    ```


    > **Note**: The `--illegal-access` option is set by default in JDK 9.


    The next example shows what kind of warning messages are displayed when a library
    performs illegal reflective access to types in the JDK. We run the `java -jar`
    command on the the JRuby Complete-9.1 JAR file:


    ```

    $ java -jar jruby-complete-9.1.12.0.jar

    WARNING: An illegal reflective access operation has occurred

    WARNING: Illegal reflective access by org.jruby.util.io.FilenoUtil (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)
    to method sun.nio.ch.SelChImpl.getFD()

    WARNING: Please consider reporting this to the maintainers of org.jruby.util.io.FilenoUtil

    WARNING: Use --illegal-access=warn to enable warnings of further illegal reflective
    access operations

    WARNING: All illegal access operations will be denied in a future release

    ```


    A warning message lets us know that the `jruby-complete-9.1.12.0.jar` performs
    an illegal reflective access operation on method `sun.nio.ch.SelChImpl.getFD()`
    of the JDK. This illegal reflective access is allowed, because the `--illegal-access`
    flag is set by default.


    If we want to see a warning for every illegal access performed, we can use the
    `mode=warn` of the `--illegal-access` command-line option:


    ```

    $ java --illegal-access=warn -jar jruby-complete-9.1.12.0.jar

    WARNING: Illegal reflective access by org.jruby.util.io.FilenoUtil (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)
    to method sun.nio.ch.SelChImpl.getFD()

    WARNING: Illegal reflective access by org.jruby.util.io.FilenoUtil (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)
    to field sun.nio.ch.FileChannelImpl.fd

    WARNING: Illegal reflective access by org.jruby.util.io.FilenoUtil (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)
    to field java.io.FileDescriptor.fd

    WARNING: Illegal reflective access by jnr.posix.JavaLibCHelper (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)
    to method sun.nio.ch.SelChImpl.getFD()

    WARNING: Illegal reflective access by jnr.posix.JavaLibCHelper (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)
    to field sun.nio.ch.FileChannelImpl.fd

    WARNING: Illegal reflective access by jnr.posix.JavaLibCHelper (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)
    to field java.io.FileDescriptor.fd

    WARNING: Illegal reflective access by jnr.posix.JavaLibCHelper (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar)
    to field java.io.FileDescriptor.handle

    WARNING: Illegal reflective access by org.jruby.java.invokers.RubyToJavaInvoker
    (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar) to method java.lang.Object.clone()

    WARNING: Illegal reflective access by org.jruby.java.invokers.RubyToJavaInvoker
    (file:/C:/Users/Alex/Downloads/jruby-complete-9.1.12.0.jar) to method java.lang.Object.finalize()

    ...

    ```


    The output is very long, so we decided not to include it all. You can see that
    the type that performs the illegal reflective access is displayed together with
    the name of the method or the field from the JDK thatÔÇÖs accessed reflectively.


    The JDK 9 API introduced a new useful method in the `AccessibleObject` class of
    package `java.lang.reflect` called `boolean canAccess(Object object)`. This method
    lets us test whether the caller can access this reflected object. The method returns
    `true` if access is allowed and `false` otherwise. According to the JDK 9 API
    documentation, an `IllegalArgumentException` will be thrown if ÔÇťthis reflected
    object is a static member or constructor or if it is an instance method or field
    and the given object is null.ÔÇŁ To avoid any exceptions, we could also use the
    new `boolean` `trySetAccessible()` method from the same class. This method doesnÔÇÖt
    throw any exceptions except a `SecurityException` if the request is denied by
    the Security Manager.


    > **Note**: The system property `sun.reflect.debugModuleAccessChecks=access` allows
    us to get a stack trace on each warning. It also can help to debug exceptions
    raised by the use of `--illegal-access`.


    We talked about the command-line flags. Now itÔÇÖs time to present some migration
    issues that can commonly occur.


    ## Migration Issues


    This section explains the concepts and gives practical solutions to some of the
    most common issues that usually occur during the migration process to Java 9:


    *   Encapsulated JDK internal APIs

    *   Not resolved modules

    *   Cyclic dependencies

    *   New versioning scheme

    *   Split packages

    *   Removed methods in Java 9

    *   Removal of `rt.jar`, `tools.jar`, and `dt.jar`'
