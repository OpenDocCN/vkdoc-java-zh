- fmt: '### Module Definition


    A software module is an independent and deployable software component of a larger
    system that interacts with other modules and hides its inner implementation. It
    has an interface that allows inter-modular communication. The interface defines
    which components it provides for external use and which components it requires
    for internal use. A module determines a boundary by specifying which part of the
    source code is inside the module. It also provides flexibility and increases the
    reusability of the software system.


    Modules can be discovered starting from compile-time. A module can expose some
    of its classes to outside or can encapsulate them in order to prevent external
    access. Figure [1-1](#A431534_1_En_1_Chapter.html#Fig1) illustrates this concept
    with an example of a module containing classes that are exposed to outside (classes
    in green color) and classes that are not exposed to outside (classes in red color).


    ![A431534_1_En_1_Fig1_HTML.gif](Images/A431534_1_En_1_Fig1_HTML.gif)


    Figure 1-1. A module specifies the non-encapsulated (green) and the encapsulated
    classes (red)


    A module can also be viewed as a black box. It has an input and an output and
    performs a specific function. It takes the input, applies some business logic
    on it, and returns an output, as illustrated in Figure [1-2](#A431534_1_En_1_Chapter.html#Fig2).


    ![A431534_1_En_1_Fig2_HTML.gif](Images/A431534_1_En_1_Fig2_HTML.gif)


    Figure 1-2. A module seen as a black box


    A software module is reusable, testable, manageable, and deployable. Multiple
    modules can be combined together to form a new module. Modular programming is
    the key to reducing the number of bugs in complex software systems to a minimum.
    By dividing the application into very small modules, each module will have fewer
    defects because its functionality is not complex. Assembling these less error-prone
    modules results in an application with fewer errors.


    One of the key facets of modularity is breaking the application down into small,
    thin modules that are easy to implement because they donÔÇÖt possess a high level
    of complexity. The modules can be interconnected earlier at compile time or later
    at runtime. Each module must be able to be bound to the core application.


    Figure [1-3](#A431534_1_En_1_Chapter.html#Fig3) shows the general structure of
    a module.


    ![A431534_1_En_1_Fig3_HTML.gif](Images/A431534_1_En_1_Fig3_HTML.gif)


    Figure 1-3. General structure of a software module


    A module generally consists of two parts: the module interface and the module
    implementation. The module interface defines the objects that it exports and the
    objects that it imports. The exported objects are the objects that are suited
    to being available outside of the module. The imported objects are the objects
    that the module requires from outside for internal use. The module implementation
    defines the variables, constants, and implementation of methods.


    Using a module as a variable, instance variable, constant, or function isnÔÇÖt allowed.
    A module can consist of objects that can be used only internally inside the module
    and objects that can be exported to the other modules for external use. Data abstraction,
    a core concept of modularity, is achieved by hiding information so that it wonÔÇÖt
    be accessible from outside unless itÔÇÖs explicitly specified by an export. By default,
    the internal structure and internal implementation of a module are hidden from
    other modules.


    A change performed on a specific module should not have an impact on other modules.
    Additionally, it should be possible to add a new module to the core system without
    breaking the system. Because only the interface of a module is visible from outside
    the module, it should be possible for developers to change the moduleÔÇÖs internal
    implementation without breaking the code in the application. The structure of
    a modular software application is basically defined by the connections and correlations
    between modules.


    Some of the characteristics of a module include the following:


    - A module must define interfaces for communication with other modules.

    - A module defines a separation between the module interface and the module implementation.

    - A module should present a set of properties that contain information.

    - Two or more modules can be nested together.

    - A module should have a clear, defined responsibility. Each function should be
    implemented by only one module.

    - A module must be able to be tested independently from other modules.

    - An error in a module should not propagate to other modules.


    LetÔÇÖs give a short example. If we have two Jigsaw modules called `A1` and `A2`
    and one package in module `A2` called `P2` that we want to be accessible in module
    `A1`, then the following conditions have to be met:


    - Module `A1` should depend on module `A2`; module `A1` should specify in its
    declaration that it `requires` module `A2`.

    - Module `A2` should export the package `P2` in order to make it available to
    the modules that depend on it. In our case, in the declaration of the module `A2`
    we should specify that it `exports` package `P2`.


    Package `P2` will be accessible in module `A1` only if both of conditions are
    met at compile-time. If none or just one of the conditions mentioned above is
    met, then package `P2` wonÔÇÖt be accessible in module `A1`. ThatÔÇÖs part of the
    reliable configuration concept introduced in JDK 9. We cover reliable configuration
    later in this chapter and in upcoming chapters.


    The following sections look at four concepts that build the foundation of a modular
    application:


    - Strong encapsulation

    - Explicit interfaces

    - High module cohesion

    - Low module coupling


    ### Strong Encapsulation


    Encapsulation defines the process of preventing data access from outside by allowing
    a component to declare which of its public types are available to other components
    and which arenÔÇÖt. Encapsulation improves code reusability and diminishes the number
    of software defects. It helps obtain modularity by decoupling the internal behavior
    of each object from the other elements of the software application.


    Related to modularity, encapsulation designates a technique that hides the details
    of the module implementation. Only the important characteristics of a module should
    be visible and accessible from other modules. Source code in one module should
    be able to access a type in another module only if the first module reads the
    second module and at the same time the second module exports the package that
    encloses that corresponding type.


    In Java prior to version 9, we took advantage of encapsulation by setting the
    variables and methods of classes to `private`. In this way, they were accessible
    only inside the class. We used to define accessor methods like setters and getters
    as `public` in order to allow the instance variables to be read or modified from
    outside of the class.


    You will see in the following sections how we can achieve strong encapsulation
    in Java 9 using modules and the new types used for accessibility.


    ### Explicit Interfaces


    The interfaces of a modular system should be as small as possible. If an interface
    is too big, it should be divided into several smaller interfaces. An interface
    should make available to a module only the methods that the module really needs
    in order to be able to fulfill its business requirements.


    A modular system typically provides module management and configuration management.
    Module management refers to the capacity to install, uninstall, and deploy a module.
    The installation could be done from a module repository, for example. In some
    cases, a module could be deployed instantly without requiring that the system
    is restarted. Configuration management specifies the capacity to dynamically configure
    modules and specify the dependencies between them.'
