- fmt: '# Upgradeable Modules


    A module is upgradeable if it can be upgraded by deploying it on the upgrade module
    path. The JPMS performs a check at link-time and runtime to make sure that only
    the upgradeable modules are allowed to be upgraded.


    From the Java SE modules, the only upgradeable modules are the ones from module
    `java.se.ee`. The upgradeable modules are `java.activation`, `java.compiler`,
    `java.corba`, `java.transaction`, `java.xml.bind`, `java.xml.ws`, `java.xml.ws.annotation`,
    and `jdk.internal.vm.compiler`. A couple of standard modules from JDK are upgradeable.


    `javac` and `java` provide a command-line option called `--upgrade-module-path`
    that takes a list of directories. These directories contain modules that replace
    the existing modules in the runtime image. For example, to upgrade JAXB, we can
    execute the following command:


    ```

    java --upgrade-module-path myDirectory --add-modules java.xml.bind

    ```


    Here, `myDirectory` represents a directory that contains the modules that will
    replace the existing modules.


    **Note**


    Non-upgradeable modules canÔÇÖt be upgraded even when using the command-line option
    `--patch-module`. Non-upgradeable modules are modules linked into a runtime image.


    For upgrading a module in the runtime image, a module can be deployed on the upgrade
    module path. An automatic module can also be deployed on the upgrade module path.
    But an automatic module canÔÇÖt be upgraded because an upgradeable module is linked
    into a runtime image, whereas an automatic module isnÔÇÖt linked into a runtime
    image.


    **Note**


    The upgradeable modules replace the old Endorsed Standard Mechanism in JDK 9.


    # Features Coming in the Next Releases


    Some features will be coming in the next releases of JDK. The JCP team announced
    that the next releases will resolve two issues that we have now and will also
    add two new features. The new features that will come in the next releases are
    the following:


    - **multi-module JAR files**: Now a modular JAR file can contain only a single
    module. ItÔÇÖs not allowed to contain more than one module. In practice, we can
    have large JAR files that contain different pieces of functionality that donÔÇÖt
    pass into a single module. So it would be better to have multiple modules in a
    single modular JAR file.

    - **Additional module-layer operations**: The `ModuleLayer.Controller` API will
    be enhanced with new methods, like `addUses()` and `addPackage()`.


    The issues that will be solved in the next releases are the following:


    - **Concealed package conflicts**: This issue was covered in Chapter [8](../Text/A431534_1_En_8_Chapter.html).
    The problem is that two distinct modules canÔÇÖt share the same name of a package.
    The proposal made by the JCP team is to avoid concealed package conflicts by doing
    a redesign so that modules that contain conflicting packages will be loaded in
    their own class loaders.

    - **Cyclic module relationships**: This issue was also covered in Chapter [8](../Text/A431534_1_En_8_Chapter.html).
    The proposal for the next JDK releases is to allow cyclic relationships among
    modules at runtime.


    # Summary


    We started this chapter by looking at the new JMOD files together with the `jmod`
    tool. Then we talked about multi-release JAR files, which represent one single
    JAR file. Therefore, theyÔÇÖre only a unit of release and can be used, for example,
    for replacing JDK internal APIs. If weÔÇÖre using a JDK internal API in Java 8,
    we can provide a new class with a replacement for it in JDK 9 and place both class
    files in a multi-release JAR file. Multi-release JAR files were introduced to
    be able to use a specific version of the JDK, even if some third-party libraries
    havenÔÇÖt been yet upgraded to the last version. They help third-party libraries
    to use API features from newer releases of Java.


    Further, we explained the new notion of layer in the context of the Java Platform
    Module System. I explained what layers are, why theyÔÇÖre useful, and how we can
    create our own layers. If an application uses layers, it will probably use only
    the boot layer. I covered the class loading mechanism in JDK 9 and explained how
    it fits together with the new module system. We learned that there is no relation
    between class loaders and modules enforced by Jigsaw.


    The chapter concluded by talking about upgradeable modules and about some features
    that will come in the next JDK releases.


    In Chapter [11](../Text/A431534_1_En_11_Chapter.html), youÔÇÖll learn how to unit
    test modular applications.


    # 11. Testing Modular Applications


    By now, you should have a deep overview of Project Jigsaw and should be able to
    start using use it in your projects. But thereÔÇÖs one important topic we havenÔÇÖt
    mentioned yet: unit testing. This chapter focuses on unit testing modular applications
    in Java 9 and the different approaches to it that you can take. In this chapter,
    weÔÇÖll show you some best practices for performing unit testing in Java 9 in the
    context of a modular application.


    Suppose we have a module with classes that need to be tested. If we put the unit
    test classes in another module, then we need to make the unit tests be able to
    access types from the module being tested. This puts the strong encapsulation
    mechanism introduced in JDK 9 in play. A solution would be to add `--add-exports`
    flags to make the types from the module under test available to the unit tests.
    But this isnÔÇÖt sufficient because itÔÇÖs also compulsory that the types from the
    module under test are public. If theyÔÇÖre not, then the export of packages doesnÔÇÖt
    give us the necessary level of accessibility. This is just one of the many challenges
    that we have to solve before performing unit testing in Java 9.


    Performing unit testing in a modular application is necessary in order to achieve
    the desired level of software quality, and itÔÇÖs even more critical here than when
    testing non-modular applications. Unit testing in Java 9 is a little more complicated
    than unit testing in versions prior to Java 9 because in Java 9 we have to assure
    readability between the Junit test classes and the objects under test. There can
    be different combinations for locations of the Junit test classes for the classes
    being tested. They can reside in the same module, in different modules, on the
    class path, or partially on the module path and on the class path. The next section
    goes into these scenarios in more detail.


    ## Scenarios for Unit Testing in Java 9


    As mentioned earlier, we can have different scenarios for unit testing in JDK
    9, depending on the location of the Junit test classes and the objects under test.
    The following common scenarios may occur during unit testing in JDK 9:


    - The Junit test classes and the test objects reside in different modules.

    - The Junit test classes donÔÇÖt reside in a module, but the test objects do.

    - Both Junit test classes and the test objects reside in the same module.


    Each of the three scenarios has to be treated differently and requires a different
    approach to assure readability between the Junit test cases and the objects under
    test. The following subsections look at each of them in detail.'
