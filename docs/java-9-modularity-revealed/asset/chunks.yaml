    We extend our example to be able to call a method from a different module. A private
    method wonÔÇÖt be able to be accessed from other module even if the module is read
    and the corresponding types are exported.


    Note


    ItÔÇÖs important to remember that a private method is always package private.


    Listing [4-16](#A431534_1_En_4_Chapter.html#Par198) shows the class `ClassB1`
    from package com.apress.moduleB which has a new private static method.


    ```

    // ClassB1.java

    package com.apress.moduleB;

    public class ClassB1 {

    private static String getInfoForClassB1() {

    return "ClassB1 from ModuleB";

    }

    }

    Listing 4-16.

    Class ClassB1 Contains a Private Method

    ```


    Listing [4-17](#A431534_1_En_4_Chapter.html#Par200) shows how the `Main` class
    from module com.apress.moduleA calls the static method from `ClassB1`.


    ```

    // Main.java

    package com.apress.moduleA;

    import com.apress.moduleB.ClassB1;

    import com.apress.moduleC.ClassC1;

    public class Main {

    public static void main(String[] args) {

    System.out.println(ÔÇťHere is Java 9!ÔÇŁ);

    System.out.println(ClassB1.getInfoForClassB1());

    }

    }

    Listing 4-17.

    Class Main

    ```


    The compilation fails with the following error message:


    ```

    Main.java:10: error: getInfoForClassB1() has private access in ClassB1

    ```


    By setting the `getInfoForClassB1()` method to public in ClassB1.java, the compilation
    will succeed. Running the application


    ```

    $ java --module-path outputDir ÔÇôm com.apress.moduleA/com.apress.moduleA.Main

    ```


    results in the following being printed:


    ```

    Here is Java 9!

    ClassB1 from ModuleB

    ```


    In this example, we showed that having an access identifier as `private` makes
    the type inaccessible, as in the previous versions of Java.


    WeÔÇÖve learned how to compile and run modular applications in Java 9\. In the next
    section we discover the new modular JAR files introduced in Jigsaw.


    ## Modular JARs


    The modular JARs were introduced in JDK 9\. They represent module artifacts that
    contain compiled module definitions. A modular JAR resembles a regular JAR and
    contains .class files and also a module-info.class file. The difference between
    a modular JAR and a regular JAR consists only of the module-info.class that a
    modular JAR additionally has.


    The module-info.class file lies in a modular JAR at the top level of its directory.
    Every modular JAR must contain such a file. If it doesnÔÇÖt, itÔÇÖs just a regular
    JAR file, not a modular one.


    Note


    The module-info.class is located at the root of the directory, inside the modular
    JAR file. ItÔÇÖs not located inside the packages.


    A modular JAR can be used on the module path as well as on the class path. When
    used on the class path, the module-info.class file isnÔÇÖt taken into consideration.


    Note


    A modular JAR file is compatible with older versions of the JDK. It works as a
    regular JAR file on the class path for all Java versions prior to Java 9.


    Because the module descriptor is compiled in a module-info.class file in Java
    9, a modular JAR can work as a module by being placed on the module path. If we
    place the modular JAR on the class path, the module-info.class file will be simply
    ignored. But all the other files of the modular JAR, except the module-info.class
    file, will be taken into consideration. In this way, the modular JAR will act
    as a normal JAR file.


    ItÔÇÖs a great advantage to have a JAR file that can be used either on the class
    path or on the module path. We could compile a library and be able to use it on
    the class path for JDK 8 (or earlier) or compile it with JDK 9+ and use it on
    the module path.


    Note


    A modular JAR can incorporate only one module. It canÔÇÖt be composed of more than
    one module.


    The alternative to modular JARs would be to explode the compiled modules on the
    file system. Both solutions work, but itÔÇÖs definitely better and more suitable
    to have a single modular JAR instead of a group of files.


    LetÔÇÖs imagine a situation where the module path contains two modular JAR files
    that are located in the same directory. If the module thatÔÇÖs part of the first
    modular JAR file has the same name as the module thatÔÇÖs part of the second modular
    JAR file, there will be an error at compile-time.


    In order to create a modular JAR, we can use the jar tool, which was enhanced
    in Java 9\. WeÔÇÖll learn more about it later in this section. Next, we talk about
    the structure of a modular JAR file.


    ### Structure of a Modular JAR


    The structure of a modular JAR file is similar to the one of a normal JAR file,
    except a module-info.class file is present. HereÔÇÖs an example of a modular JAR
    file:


    ```

    META-INF/

    META-INF/MANIFEST.MF

    module-info.class

    com/apress/moduleA/Main.class

    com/apress/moduleB/ClassB1.class

    com/apress/moduleB/ClassB2.class

    ...

    ```


    There is also a MANIFEST.MF file located in the META-INF directory. The module-info.class
    file is located in the root directory. All our compiled .class files are present
    in the modular JAR.


    Up to now, weÔÇÖve learned about modular JAR files and about their structure. But
    how can we create one? WeÔÇÖll find the answer in the next section when we talk
    about packaging and present the jar tool used to create modular JAR files.


    ## Packaging


    Java 9 allows a module to be packaged, besides in the already known normal JAR
    file, in a modular JAR file, multi-release JAR file, JMOD file, or JIMAGE file.
    The JMOD files and multi-release JAR files are discussed in Chapter [10](../Text/A431534_1_En_10_Chapter.html).
    ItÔÇÖs important to mention that the Java Platform Module System doesnÔÇÖt force in
    any way a module to be packaged as a modular JAR.


    LetÔÇÖs start by discussing how we can package a module in a modular JAR. You can
    do this using the jar tool that can be found under the JDK_HOME\bin directory.


    ### Package as a Modular JAR Using the jar Tool


    The jar tool has been enhanced to support the newly introduced concept of modules.
    Table [4-2](#A431534_1_En_4_Chapter.html#Tab2) displays the new options that have
    been added in JDK 9 to the jar tool, according to the official JDK 9 API specification.


    Table 4-2.


    New Options Added to the JAR tool in JDK 9


    | Short Format | Long Format | Description |

    | --- | --- | --- |

    | `-d` | `--describe-module` | Prints the module descriptor |

    | ┬á | `--module-version=VERSION` | Specifies the module version when creating
    a modular JAR or when updating a non-modular JAR |

    | ┬á | `--hash-modules=PATTERN` | Computes and records the hashes of modules matched
    by the given pattern and that depend directly or indirectly upon a modular JAR
    being created or upon a non-modular JAR being updated |

    | `-p` | `--module-path` | Specifies the location of module dependence for generating
    the hash |

    | ┬á | `--release VERSION` | Puts the files in a versioned directory of the JAR
    file |


    The options presented in Table [4-2](#A431534_1_En_4_Chapter.html#Tab2) can be
    used when we create modular JARs or when we update a non-modular JAR. The `jar
    --help` command has also been enhanced in JDK 9\. It contains more detailed descriptions
    about each command.


    Using the jar tool, we create a new modular JAR file called moduleA.jar in the
    lib directory by packaging everything that exists in the modules directory:


    *   The `--create` option creates the modular JAR file.

    *   The `--file` option indicates the name of the modular JAR that will be created.
    It also specifies the location where it will be created (in our case, the lib
    directory).

    *   The `--main-class` option sets the `Main` class while the module is being
    packaged.

    *   The `-c` option specifies the location where the compiled modules are (in
    our case, theyÔÇÖre in the modules directory, which contains the compiled class
    files for the module com.apress.moduleA).


    ```

    $ jar --create --file lib/moduleA.jar --main-class com.apress.moduleA.Main ÔÇôc
    modules

    ```


    Note


    In order to be able to package a module as a modular JAR, the module must have
    been compiled before.'
