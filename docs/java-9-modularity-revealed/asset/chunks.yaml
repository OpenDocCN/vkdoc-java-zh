- fmt: '### Compile Multiple Modules


    Until now, weÔÇÖve compiled and executed a single module. But for the compilation
    of two or more modules, some extra compiler flags have been introduced in Java
    9. In the following example youÔÇÖll learn how to compile multiple modules at the
    same time.


    Suppose we have a total of three modules: module `com.apress.moduleA`, module
    `com.apress.moduleB`, and module `com.apress.moduleC`. The structure of the folders
    for the three modules is like this:


    ```

    src/com.apress.moduleA/

    module-info.java

    com/

    apress/

    moduleA/

    Main.java

    com.apress.moduleB/

    module-info.java

    com/

    apress/

    moduleB/

    ClassB1.java

    ClassB2.java

    com.apress.moduleC/

    module-info.java

    com/

    apress/

    moduleC/

    ClassC1.java

    ClassC2.java

    ```


    Further, suppose that for each module the `module-info.java` doesnÔÇÖt contain any
    clause. Listing [4-13](#A431534_1_En_4_Chapter.html#Par164) shows the `javac`
    command used to compile only the module `com.apress.moduleA`.


    ```

    $ javac ÔÇôd outputDir --module-source-path src src/com.apress.moduleA/module-info.java
    src/com.apress.moduleA/com/apress/moduleA/Main.java

    Listing 4-13.

    Compile module com.apress.moduleA Using the --module-source-path Flag

    ```


    The compilation of multiple modules at the same time is done using the new `--module-source-path`
    command-line option introduced in Java 9. ItÔÇÖs used to tell `javac` about the
    sources in the directory. In this case we point the `--module-source-path` to
    the `src` directory and output our compiled modules into the `outputDir` directory.


    The compilation generates the following classes inside the `outputDir` directory:


    ```

    outputDir/com.apress.moduleA/

    com/

    apress/

    moduleA/

    Main.class

    module-info.class

    ```


    The other two modules, `com.apress.moduleB` and `com.apress.moduleC`, havenÔÇÖt
    been generated because we didnÔÇÖt specify them in the `javac` command. We compiled
    only the module `com.apress.moduleA`.


    LetÔÇÖs specify that module `com.apress.moduleA` has a dependency on module `com.apress.moduleB`
    and on `com.apress.moduleC`. Listing [4-14](#A431534_1_En_4_Chapter.html#Par170)
    shows the `module-info.java` file of module `com.apress.moduleA` where we define
    the dependency using the `requires` clause.


    ```

    // module-info.java

    module com.apress.moduleA {

    requires com.apress.moduleB;

    requires com.apress.moduleC;

    }

    Listing 4-14.

    The Module Descriptor of module com.apress.moduleA

    ```


    If we run the `javac` command from Listing [4-13](#A431534_1_En_4_Chapter.html#Par164),
    we get the following structure of the `outputDir` directory:


    ```

    outputDir/com.apress.moduleA/

    com/

    apress/

    moduleA/

    Main.class

    module-info.class

    com.apress.moduleB/

    module-info.class

    com.apress.moduleC/

    module-info.class

    ```


    In the `javac` command, we specified to compile only the `Main.java` and the `module-info.java`
    files from module `com.apress.moduleA`. But due to the fact that module `com.apress.moduleA`
    requires both modules `com.apress.moduleB` and `com.apress.moduleC`, the module
    descriptors from `com.apress.moduleB` and `com.apress.moduleC` have also been
    compiled to class files.


    We compile all the classes that end with `.java` using the following command:


    ```

    $ javac -d outputDir --module-source-path src $(find . -name "*.java")

    ```


    The `--module-source-path` option specifies the location of non-compiled files.
    We search for all the files that end with the extension `.java`, including the
    module descriptor, of course. All the files ending with `.java` from all the modules
    have been compiled to `.class` files. The structure of `outputDir` is shown in
    the following code. Both Java classes and the `module-info.java` files have been
    compiled to `.class` files:


    ```

    outputDir/com.apress.moduleA/

    com/

    apress/

    moduleA/

    Main.class

    module-info.class

    com.apress.moduleB/

    com/

    apress/

    moduleB/

    ClassB1.class

    ClassB2.class

    module-info.class

    com.apress.moduleC/

    com/

    apress/

    moduleC/

    ClassC1.class

    ClassC2.class

    module-info.class

    ```


    ### Run an Application Containing Multiple Modules


    To run the previously compiled classes, we use the Java launcher with the following
    command:


    ```

    $ java --module-path outputDir --module com.apress.moduleA/com.apress.moduleA.Main

    ```


    This is the same `java` command used in the previous example, when we ran an application
    consisting of only one module. But now we have three modules inside the application
    that we want to run, so why do we specify a single module?


    The `--module` option needs to get only the name of the root module. It doesnÔÇÖt
    need to get all the modules. By getting the root module, it starts a resolution
    process and finds the other modules according to the information present in the
    module descriptor.


    Note


    The `--module` command-line option gets as parameter only the name of the `Main`
    class from the root module.


    The resolution process starts with module `com.apress.moduleA` and then finds
    the modules `com.apress.moduleB` and `com.apress.moduleC`. After it finishes,
    the `Main` class of the root module is executed.


    In this section, weÔÇÖve learned how to compile and run multiple modules using Java
    9. Now letÔÇÖs see an example where compilation fails due to the broken accessibility
    rules. Here, we import `ClassB1` and `ClassB2` into `Main.java`. Listing [4-15](#A431534_1_En_4_Chapter.html#Par185)
    shows the `Main` class of `com.apress.moduleA`.


    ```

    // Main.java

    package com.apress.moduleA;

    import com.apress.moduleB.ClassB1;

    import com.apress.moduleC.ClassC1;

    public class Main {

    public static void main(String[] args) {

    System.out.println("Here is Java 9!");

    }

    }

    Listing 4-15.

    The Main Class

    ```


    We know from the previous example that module `com.apress.moduleA` requires modules
    `com.apress.moduleB` and `com.apress.moduleC`. By compiling all the Java files


    ```

    $ javac -d outputDir --module-source-path src $(find . -name "*.java")

    ```


    the following error is thrown:


    ```

    Main.java:3: error: ClassB1 is not visible because package com.apress.moduleB
    is not visible

    import com.apress.moduleB.ClassB1;

    Main.java:4: error: ClassC1 is not visible because package com.apress.moduleC
    is not visible

    import com.apress.moduleC.ClassC1;

    2 errors

    ```


    The compilation fails as a result of strong encapsulation. The classes `ClassB1`
    and `ClassC1` canÔÇÖt be imported into the `Main` class. Even if module `com.apress.moduleA`
    requires the other two modules, it canÔÇÖt access types from them because those
    types arenÔÇÖt exported by these modules. The public access modifier used to define
    the classes `ClassB1` and `ClassC1` isnÔÇÖt able to enforce accessibility any more
    in Java 9.


    In order to make the classes `ClassB1` and `ClassC1` available to the `Main` class,
    we must explicitly specify the following two things:


    *   In the module descriptor of module `com.apress.moduleB`, we specify that the
    package containing the `ClassB1` is exported.

    *   In the module descriptor of module `com.apress.moduleC`, we specify that the
    packages containing the `ClassC1` is exported.


    By doing this, all classes from the exported package from module `com.apress.moduleB`
    and from the exported package from module `com.apress.moduleC` will be accessible
    in this way to module `com.apress.moduleA`, and the compilation will succeed without
    any error.'
