- fmt: '# 2. Project Jigsaw


    This chapter introduces Project Jigsaw. It describes what Project Jigsaw is all
    about, shows some problems encountered in the past in Java, and discusses the
    Java Enhancement Proposals that constitute Project Jigsaw. It explains the goals
    of Project Jigsaw so that we can get a grasp of the reasons that made the JCP
    team decide to introduce a new module system for the Java platform. It also goes
    over concepts like strong encapsulation and reliable configuration.


    ## Weaknesses in Java Prior to JDK 9


    Figure [2-1](#A431534_1_En_2_Chapter.html#Fig1) shows the JDK 7 module graph,
    from the official OpenJDK website at [`http://openjdk.java.net/projects/jigsaw/doc/jdk-modularization.html`](http://openjdk.java.net/projects/jigsaw/doc/jdk-modularization.html).
    The base module is displayed right in the middle. Because there were a lot of
    dependencies between the classes, there was no way to split the monolith into
    smaller pieces. Besides that, the access delimiters didnÔÇÖt provide sufficient
    means to completely hide the implementation of the classes. Their scope was limited.
    For instance, in JDK 7 if we wanted to print ÔÇťHello world!ÔÇŁ using the `System`
    console, we would need a great number of packages besides the base module.


    ![A431534_1_En_2_Fig1_HTML.jpg](Images/A431534_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. The module graph in JDK 7


    JAR (Java Archive) files are ZIP files that contain class files and other resources.
    One or more JAR files are placed on the class path, which doesnÔÇÖt provide encapsulation
    for the JAR files it contains. This means that every class in a JAR file is accessible
    by every other class, and that represents a security vulnerability. You can imagine
    the class path like being a row where the JAR files are being searched linearly
    from left to right. JAR files are not components that can provide modularity for
    the classes that they contain.


    Introduced in JDK 8, compact profiles are a subset of the full Java SE platform.
    The three compact profiles are called compact 1, compact 2, and compact 3. A list
    of the packages contained in each compact profile is listed on the Oracle website.
    The compact profiles were just a small step toward the modularization of the platform.
    Being able to get three different versions of the JDK by aggregating the standard
    packages was not what the community expected with respect to modularization. Besides
    that, compact profiles donÔÇÖt hide their internals and therefore brought no improvements
    to the security of the Java Platform.


    Explicit dependencies were also a huge problem before Java 9. By packaging source
    code in a JAR file and putting it on the class path, there was no way of programmatically
    defining which other JARs were needed in order for the actual JAR to be able to
    run. Because Java didnÔÇÖt solve this problem, a few popular build tools have emerged,
    including Maven and Gradle.


    ### Weak Encapsulation


    For achieving encapsulation, Java prior to version 9 used the well-known access
    modifiers: `private`, `protected`, `public`, and no modifier. The `private` access
    modifier is the most restrictive. It makes the data inside unavailable from outside.
    The `protected` access modifier indicates that the member can only be accessed
    by a subclass of its class in another package or within its own package. The `public`
    access modifier makes data available everywhere. Using no access modifier means
    that availability is granted only inside the same package.


    However, encapsulation has some limitations. ItÔÇÖs impossible to make a type accessible
    to an external package and at the same time restrict access to it from all other
    existing packages. To make the type available to an external package, the only
    way would be to mark it as `public`, although defining it as `public` breaks encapsulation
    and makes it public for all the existing packages. There is no way to reach the
    desired level of encapsulation using Java prior to version 9.


    ### JAR Hell Problem


    Prior to JDK 9, the standard style for developing Java applications was to insert
    all the necessary libraries and JAR files directly on the class path. This approach
    could give rise to the JAR hell problem.


    Before JDK 9, the runtime environment searched on a couple of locations in order
    to load a class. One of the searched locations is the class path, which contained
    a list of class files that were loaded by the Java Virtual Machine. Searching
    for a class on the class path was straightforward. The class loader searched a
    class by exploring all the JAR files listed on the class path. It didnÔÇÖt take
    into account a pre-definite order but just searched from the first to the last.
    It also didnÔÇÖt take into account aspects of the internal structure of the classes
    on the class path. Java wasnÔÇÖt able to take the boundaries between the JAR files
    into consideration. All the classes from all the JAR files were placed on the
    class path, and the boundaries between the JAR files disappeared. Each type in
    a JAR could access all the public types from any other JAR files. Therefore, the
    code couldnÔÇÖt be encapsulated in order to hide it from external use.


    WeÔÇÖll give you an example. Suppose an author of a library had some internal code
    in the library that was never intended to be used from outside. Because there
    was no encapsulation, everyone could access this internal codeÔÇöand worse, provide
    an own implementation that depended on the internal code. If the author of the
    library decided to make some changes in the internal code of his library, then
    code that depended on this library might encounter issues.


    JAR hell is a common problem encountered prior to JDK 9. If there were more libraries
    on the class path with different versions and each library depended on another
    library, then there was said to be a JAR hell problem on the class path. This
    so-called dependency hell happened when a package had a dependency not on another
    package, but only on a version of that package. There were different variations
    of dependency hell, taking into account the environment being used. The problem
    with JAR hell is that you could have conflicts on the class path, especially when
    it contained many JARs. For instance, one library could have two or more different
    versions of a specific class on the class path. The class path wasnÔÇÖt the best
    solution because JAR files arenÔÇÖt components, and therefore we canÔÇÖt exactly know
    if something is missing or is conflicting.


    If a specific class wasnÔÇÖt found on the classpath, a runtime exception was triggeredÔÇönot
    during the launch of the application but at a later point when, due to an action
    performed by the user, the missing class was invoked. The runtime didnÔÇÖt have
    the capacity to identify all the existing dependencies until it had to access
    them. It would have been preferable to have all the errors displayed right during
    the start of the application and not at a later point.'
