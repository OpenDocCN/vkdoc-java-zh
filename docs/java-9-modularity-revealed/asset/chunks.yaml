  raw: 'We specify two directories, separated by semicolon, for the module path. The
    output directory contains the class files of all our modules. `JAVA_HOME` is an
    environment variable that points to the current installation of Java 9. Inside
    `JAVA_HOME` is the JMODS directory, which contains the modules of the JDK. Remember,
    we have to explicitly point the module path at the JDK we intend to produce a
    runtime image for.


    Using the `--add-modules` option , we specify the name of the main module. Finally,
    the output option indicates the directory where the new custom runtime image will
    be created.


    The Jlink tool first analyzes the module descriptor file of the module com.apress.application
    and then recursively adds any modules that are required inside the runtime image.
    The runtimeImage directory now contains the runtime that weÔÇÖve just created. We
    can see what modules the runtime image contains by running the `java --list-modules`
    command inside the runtimeImage directory:


    ```

    ./bin/java --list-modules

    ```


    The result is:


    ```

    com.apress.application

    com.apress.service

    java.base

    ```


    Our runtime image contains those three modules. The module java.base is the single
    platform module thatÔÇÖs always being automatically added to our runtime image.
    Further, we have two more application modules in our runtime image: com.apress.application,
    which is the root module that we specified using the `--add-options` option, and
    com.apress.service module. The com.apress.application module requires the module
    com.apress.service in its module descriptor. As a result, we have the module com.apress.service
    in our runtime image.


    Note


    The modules com.apress.databasepersistence and com.apress.filepersistence arenÔÇÖt
    present in our newly created runtime image, even if theyÔÇÖve been previously successfully
    compiled inside the output directory. Further, the java.sql module should also
    be present in the runtime image, because itÔÇÖs required by the module com.apress.databasepersistence.
    The reason why these modules arenÔÇÖt in the runtime image is that the Jlink tool
    doesnÔÇÖt do service binding by default. The tool identifies the necessary modules
    by searching for the `requires` clauses inside the module descriptors. It doesnÔÇÖt
    search for the uses or provides clauses either. In our module com.apress.application,
    we donÔÇÖt require the modules com.apress.databasepersistence and com.apress.filepersistence.
    As a result, theyÔÇÖre not added to the runtime image.


    To solve this, there are two solutions. The first is also the simplest: use the
    `new --bind-services` option added to the `jlink` command. This option makes a
    full service binding. Therefore, it searches for all the `uses` clauses and then,
    for all the services specified by the `uses` clauses, it adds all the service
    provider modules in the runtime image. We could use it like this:


    ```

    jlink --module-path "output;$JAVA_HOME/jmods" --bind-services

    --add-modules com.apress.application

    --output runtimeImage

    ```


    A second solution to add them to the runtime image would be to specify them inside
    the `--add-modules` command-line option, but this is a workaround that was mostly
    used before the introduction of the `--bind-services` option. Using the workaround
    with the `--add-modules` option is definitely more costly than using the `--bind-services`
    option. Hence, we talk about this second solution here. We delete our runtime
    image and supplementary add the explicit `--add-modules` flags for each of the
    service provider modules that we want to be added into our runtime image:


    ```

    jlink --module-path "output;$JAVA_HOME/jmods"

    --add-modules com.apress.application

    --add-modules com.apress.databasepersistence

    --add-modules com.apress.filepersistence

    --output runtimeImage

    ```


    If we omit to mention the JMODS directory in our module path, an error will be
    thrown:


    ```

    Error: module java.sql not found, required by com.apress.databasepersistence

    ```


    This error states that the module java.sql, which is required by the module com.apress.databasepersistence,
    wasnÔÇÖt found on the module path because we didnÔÇÖt include its location, the JMODS
    directory, on the module path.


    We explicitly specified that we want the modules com.apress.databaspersistence
    and com.apress.filepersistence to be added to the runtime image, next to the main
    module com.apress.application. If we run the `--list-modules` command inside the
    runtimeImage directory, we get the following result:


    ```

    ./bin/java --list-modules

    com.apress.application

    com.apress.databasepersistence

    com.apress.filepersistence

    com.apress.service

    java.base

    java.logging

    java.sql

    java.xml

    ```


    Note that the new runtime image not only contains the two service provider modules
    that we specified using the `--add-modules` flags, but also contains three new
    modules: java.logging, java.sql, and java.xml. The reason is that the module com.apress.databasepersistence
    requires java.sql, so this module is also added to the runtime image. But module
    java.sql also requires the modules java.logging and module java.xml. Therefore,
    these two modules are also added to the runtime image in order for all the dependencies
    to be fulfilled.


    Our runtime image has a structure similar to that of a JRE. The newly created
    runtimeImage directory has the following structure:


    ```

    -bin (directory)

    -conf (directory)

    -include (directory)

    -legal (directory)

    -lib (directory)

    -release (file)

    ```


    The bin directory has the following content:


    ```

    -server (directory) => contains a jvm.dll file

    -java.dll (file)

    -java.exe (file)

    -javaw.exe (file)

    -jimage.dll (file)

    -jli.dll (file)

    -keytool.exe (file)

    -msvcp120.dll

    -msvcr120.dll

    -net.dll

    -nio.dll

    -verify.dll

    -zip.dll

    ```


    The conf directory has the following structure:


    ```

    -net.properties (file)

    -security (folder)    => -policy (folder)

    -java.policy (file)

    -java.security (file)

    -net.properties (file)

    ```


    The include directory has the following structure:


    ```

    -win32 (folder) => -jni_md.h

    -classfile_constants.h

    -jni.h

    -jvtmi.h

    -jvmticmlr.h

    ```


    The legal directory has the following content:


    ```

    -java.base (folder) => aes.md, asm.md, cldr.md, icu.md, zlib.md

    -java.logging => COPYRIGHT

    -java.sql => COPYRIGHT

    -java.xml => bcel.md, COPYRIGHT, dom.md, jcup.md, xalan.md, xerces.md, xmlresolver.md

    ```


    The lib directory has the following content:


    ```

    -security (folder) => blacklist, blacklisted.certs, cacerts, default.policy, trusted.libraries

    -server (folder) => Xusage.txt

    -classlist (file)

    -jrt-js.jar

    -jvm.cfg

    -jvm.lib

    -modules (file)

    -tzdb.dat

    -tzmappings (file)

    ```


    Note


    We used Windows 7 Professional Edition as the operating system while creating
    this runtime image using Jlink. ThatÔÇÖs why the custom runtime image is specific
    to the Windows operating system.


    Jlink doesnÔÇÖt perform service binding by default . That means we have two distinct
    options:


    *   Use the `--bind-services` option in order for the service provider modules
    to be explicitly discovered and added to the runtime image

    *   Define each service provider module that we want to add in the `--add-modules`
    option


    Next we check the size of the newly generated runtime image:


    ```

    $ du -hs

    48M

    ```


    Our entire runtime image has a size of 48 MB, which is much smaller than the size
    of the entire JDK.


    We delete our runtime image and generate a new one using compression in order
    to reduce its size :


