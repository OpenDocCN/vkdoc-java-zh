    \   <goal>test-jdkinternals</goal>\n            </goals>\n        </execution>\n\
    \        <execution>\n            <id>testOnDependencies</id>\n            <goals>\n\
    \                <goal>jdkinternals</goal>\n                <goal>test-jdkinternals</goal>\n\
    \            </goals>\n            <configuration>\n                <failOnWarning>false</failOnWarning>\n\
    \                <recursive>true</recursive>\n            </configuration>\n \
    \       </execution>\n    </executions>\n</plugin>\n```\n\n**Listing 12-1.** Example\
    \ Using the Maven JDeps Plugin\n\nWe search for JDK internal APIs inside our application\
