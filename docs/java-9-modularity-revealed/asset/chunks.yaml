    ## Modular Programming


    This section discusses the principles and benefits of modular programming. It
    compares modular programming and object-oriented programming (OOP) and talks about
    the differences between a monolithic application and a modular one.


    ### Principles of Modular Programming


    The principles of modular programming are continuity, understandability, reusability,
    combinability, and decomposability. IÔÇÖve already talked about reusability, so
    now letÔÇÖs focus on the other four.


    *   **Continuity:** Refers to the situation when a requirement to change the functionality
    of the software system should cause changes in as few modules as possible.

    *   **Understandability:** Refers to the fact that each module should be comprehensible
    as a standalone single unit. Its role should be clear and concise. ItÔÇÖs definitely
    easier to understand the inner workings of a particular moduleÔÇöwhich presents
    a lower level of functionalityÔÇöthan of an entire application. You should avoid
    situations in which a module fulfills its role only in correlation with some other
    modules. A module should not cause side issues for other modules.

    *   **Combinability:** Allows us to recombine modules so that a new software application
    results.

    *   **Decomposability:** Allows us to decompose a monolith into smaller and simpler
    parts, which should be independently packaged into a different software unit.
    The resulting software unit should have a simpler structure and a lower level
    of complexity than the initial monolith. By breaking a system down into logical
    modules, we can understand the system much better and adjust it more easily.'
