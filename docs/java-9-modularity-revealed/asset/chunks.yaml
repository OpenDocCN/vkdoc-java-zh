    \ a fundamental feature in JDK 9: the introduction of the module path.\n\n## The\
    \ Module Path\n\nProject Jigsaw introduces a new concept for replacing the class\
    \ path: the module path, which can represent one of the following:\n\n- A path\
    \ to a sequence of directories that contain modules\n- A path to a modular JAR\
    \ file\n- A path to a JMOD file\n\nIn contrast to the module path, the class path\
    \ represents a sequence of JAR files. The module path is used by the compiler\
