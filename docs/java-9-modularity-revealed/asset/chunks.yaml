  raw: '#### Other Clauses


    The other two directives that can be used inside a module descriptor are the `uses`
    and `provides` clauses. These clauses are used to define (provides) and consume
    (uses) services and will be described in Chapter [6](../Text/A431534_1_En_6_Chapter.html)
    ÔÇô Services.


    Note


    None of the five directives already mentioned (`requires`, `exports`, `opens`,
    `uses`, and `provides`) are mandatory inside a module declaration. There is no
    restriction in selecting which directive to use and which not to use. We can create
    our own module and use any combination of the five directives.


    WeÔÇÖve now seen the basics of the module declaration. ItÔÇÖs time to learn how to
    compile and run modular applications in JDK 9.


    ## Compiling and Running Modules


    The compilation of a modular Java 9 application is different than in Java 8 or
    7\. All the examples of compiling and running modules are expressed in this book
    using the command-line running a Linux-like environment. However, this is an unusual
    practice in day-to-day work. Build tools like Maven or Gradle are far more productive,
    suitable, and easy to use for compling and running Java applications. Chapter
    [12](../Text/A431534_1_En_12_Chapter.html) covers the integration of Java 9 with
    Maven and shows how to use it to build, package, compile, and run Java 9 modular
    applications.


    ### Compile a Single Module


    HereÔÇÖs a very simple example of compiling a single module using JDK 9. Suppose
    we have a module com.apress.moduleA that has no dependencies. It contains a Main.java
    file inside its package com.apress.moduleA. The structure of the folder is as
    follows:


    ```

    src/com.apress.moduleA/

    module-info.java

    com/

    apress/

    moduleA/

    Main.java

    ```


    Listing [4-11](#A431534_1_En_4_Chapter.html#Par137) shows the content of class
    `Main`. It prints a message on the console.


    ```

    // Main.java

    package com.apress.moduleA;

    public class Main {

    public static void main(String[] args) {

    System.out.println(ÔÇťHere is Java 9!ÔÇŁ);

    }

    }

    Listing 4-11.

    The Main class from the module com.apress.moduleA

    ```


    Listing [4-12](#A431534_1_En_4_Chapter.html#Par139) shows the module-info.java
    file of module com.apress.moduleA. It doesnÔÇÖt define any clause.


    ```

    // module-info.java

    module com.apress.moduleA {

    }

    Listing 4-12.

    The Module Descriptor for moduleA

    ```


    First we create the destination directory where the compiler outputs to using
    the `mkdir` command:


    ```

    mkdir ÔÇôp outputDir

    ```


    Then we use the Java compiler to compile the Main.java file and the module-info.java
    file. The compilation will create a .class file for each .java file:


    ```

    $ javac ÔÇôd outputDir/com.apress.moduleA src/com.apress.moduleA/module-info.java
    src/com.apress.moduleA/com/apress/moduleA/Main.java

    ```


    The `javac` command gets the files that is has to compile. The `-d` option specifies
    the directory where the compiler outputs to. In this case, it will output to the
    directory outputDir/com.apress.moduleA. The last two parameters represent the
    path to the files that we want to compile, module-info.java and Main.java.


    The corresponding class files are generated during the compilation in the directory
    passed as parameter to the option `-d`. The compilation of a single module is
    done very much the same as in Java 7 or 8 without necessarily needing to use other
    compiler flags than the ones used in the older versions of Java. Compared to Java
    8, the single distinction here is that module-info.java was also compiled.


    Note


    The module declaration from the module-info.java file is compiled along with the
    rest of the source code, and a module-info.class file is generated.


    ### Run an Application Containing a Single Module


    To run the previously compiled classes, we use the Java launcher with the following
    command:


    ```

    $ java --module-path outputDir --module com.apress.moduleA/com.apress.moduleA.Main

    ```


    As a result, the string ÔÇťHere is Java9!ÔÇŁ is printed at the console. We recognize
    in the previous listing that the `java` command uses new flags for handling modules.
    The `--module-path` option, introduced in Java 9, gets as parameter a directory
    or a list of directories containing the location of the already compiled files.
    In our case, these are in the outputDir directory. The module path is used in
    order for the compiler to be able to locate the modules at runtime.


    The differences between the module path and the class path are listed later in
    this chapter, in the section ÔÇťThe Module Path.ÔÇŁ


    Note


    We exploded the files on the file system as .class files. Another possibility
    would have been to package them as modular JARs. Later in this chapter we show
    how.


    The second option used by the Java launcher is the command-line option `--module`.
    ItÔÇÖs used to specify the main class and the main module by taking a parameter
    in form of `<module_name> / <main_class>`. The location of the `main` class is
    mandatory information that the `java` command needs to be aware of.


    The Java launcher will load the root module com.apress.moduleA, resolve all its
    dependencies and transitive dependencies by running the resolution process, and
    finally run its `Main` class, which was passed to the option `--module`. At the
    end, the message is printed in the console.


    Congratulations! You just learned how to successfully compile and run your first
    module in Java 9.


    If we had tried to run the `java` command without the `--module-path` option,
    like this


    ```

    $ java ÔÇôm com.apress.moduleA/com.apress.moduleA.Main

    ```


    the following error message would have been displayed:


    ```

    Error occurred during initialization of VM

    java.lang.module.ResolutionException: Module com.apress.moduleA not found

    at java.lang.module.Resolver.fail(java.base@9-ea/Resolver.java:796)

    at java.lang.module.Resolver.resolveRequires(java.base@9-ea/Configuration.java:370)

    at java.lang.module.Configuration.resolveRequiresAndUses(java.base@9-ea/ModuleDescriptor.java:2081(

    at jdk.internal.module.ModuleBootstrap.boot(java.base@9-ea/ModuleBootstrap.java:263)

    at java.lang.System.initPhase2(java.base@9-ea/System.java:1925)

    ```


    What does this error mean? Module com.apress.moduleA isnÔÇÖt found because we didnÔÇÖt
    inform the Java launcher about the location of the compiled modules. The directory
    where the compiled modules are located has to be specified using the `--module-path`
    option. The Java launcher canÔÇÖt find the modules unless we explicitly specify
    their location.'
