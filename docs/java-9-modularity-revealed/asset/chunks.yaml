- fmt: '# 9. The New Module API


    Project Jigsaw introduced a new layer in JDK 9, modules, and added many new features
    to the Java platform. Among the new features, a new module API was introduced
    for handling the work with modules. The new module API was added in the module
    `java.base` in the packages `java.lang` and `java.lang.module`. It contains a
    set of classes, interfaces, enumerations (enums), and exceptions that can be used
    to work with modules.


    The module API allows us to perform different operations on modules, such as extracting
    the information from the module descriptors, accessing the resources of a module,
    searching for modules on the module path or for all the system modules, creating
    layers, and more. The module API can also be used to dynamically add `reads`,
    `opens`, or exports `directives` to other modules at runtime. WeÔÇÖll start this
    chapter by briefly presenting the structure of the new module API: its interfaces,
    classes, enums, and exceptions.


    According to the JDK 9 API specification, two interfaces were added for working
    with modules. Table 9-1 shows the new interfaces of the module API.


    **Table 9-1.** The Interfaces of the Module API


    | Name | Type | Description |

    | --- | --- | --- |

    | `ModuleFinder` | Interface | Finds modules during resolution or service binding
    |

    | `ModuleReader` | Interface | Accesses the moduleÔÇÖs content |


    Table 9-2 lists the classes of the new module API.


    **Table 9-2.** The Classes of the Module API


    | Name | Type | Description |

    | --- | --- | --- |

    | `Configuration` | Class | A configuration that contains the readability graph
    |

    | `Module` | Class | A module at runtime |

    | `ModuleDescriptor` | Class | A module descriptor |

    | `ModuleDescriptor.Builder` | Class | A builder for creating module descriptors
    |

    | `ModuleDescriptor.Exports` | Class | A package exported by a module |

    | `ModuleDescriptor.Opens` | Class | A package opened by a module |

    | `ModuleDescriptor.Provides` | Class | A service with implementations provided
    by the module |

    | `ModuleDescriptor.Requires` | Class | A dependence upon a module |

    | `ModuleDescriptor.Version` | Class | A module version |

    | `ModuleReference` | Class | A reference to a module |

    | `ResolvedModule` | Class | A module in a graph of resolved modules |


    Table 9-3 shows the enumerations of the module API.


    **Table 9-3.** The Enumerations of the Module API


    | Name | Type | Description |

    | --- | --- | --- |

    | `ModuleDescriptor.Exports.Modifier` | Enum | A modifier on an exported package
    |

    | `ModuleDescriptor.Modifier` | Enum | A modifier on a module |

    | `ModuleDescriptor.Opens.Modifier` | Enum | A modifier on an open package |

    | `ModuleDescriptor.Requires.Modifier` | Enum | A modifier on a module dependence
    |


    Table 9-4 shows the exceptions of the module API.


    **Table 9-4.** The Exceptions of the Module API


    | Name | Type | Description |

    | --- | --- | --- |

    | `FindException` | Exception | Thrown when an error occurs while finding a module
    |

    | `InvalidModuleDescriptorException` | Exception | Thrown when a module descriptor
    has an invalid format |

    | `ResolutionException` | Exception | Thrown when the process of resolving a set
    of modules fails |

    | `LayerInstantiationException` | Exception | Thrown when an error occurs while
    creating a module layer |


    WeÔÇÖll next look at some of the most important classes and interfaces of the new
    module API in detail, starting with the fundamental one, the `Module` class.


    ## The Module Class


    The `Module` class represents a module at runtime, which can be either a named
    module or an unnamed module. The `Module` class was introduced in Java 9 and is
    located in module `java.base` in the package `java.lang` in the following location:


    ```

    \java.base\share\classes\java\lang\Module.java

    ```


    LetÔÇÖs explore the attributes, constructors, and methods defined by the `Module`
    class.


    ### Attributes


    Following are some of the most important attributes defined by the `Module` class:


    *   `ModuleLayer layer`: Represents the layer that contains this module. The layer
    can also be null.

    *   `String name`: Represents the name of this module.

    *   `ClassLoader loader`: Represents the `ClassLoader` of this module.

    *   `ModuleDescriptor descriptor`: Represents the `ModuleDescriptor` of this module.

    *   `Map<String, Set<Module>> exportedPackages`: Represents the packages that
    are exported by this module.

    *   `Map<String, Set<Module>> openPackages`: Represents the packages that are
    open to other modules.

    *   `Set<Module> reads`: Represents the modules that this module reads.

    *   `static final Module ALL_UNNAMED_MODULE`: Represents a special module that
    defines the entire set of unnamed modules. An unnamed module has no `ClassLoader`
    object, no `ModuleLayer` object, and no `ModuleDescriptor` object defined.


    ### Constructors


    The `Module` class has three types of constructors, as stated in the JDK 9 API
    specification:


    *   `Module(ClassLoader loader)`: This constructor creates the unnamed module
    for the given `ClassLoader`. The `ClassLoader` object can also be null. An unnamed
    module contains no `ModuleDescriptor` and no `ModuleLayer`.

    *   `Module(ClassLoader loader, ModuleDescriptor descriptor)`: This constructor
    creates a named module thatÔÇÖs not inside a `ModuleLayer`.

    *   `Module(ModuleLayer layer, ClassLoader loader, ModuleDescriptor descriptor,
    URI uri)`: This constructor creates a named module inside a `ModuleLayer`, which
    means that the module is represented inside the virtual machine.'
