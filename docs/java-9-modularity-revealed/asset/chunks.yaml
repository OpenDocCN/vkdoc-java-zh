- fmt: '### Strong Encapsulation


    According to the official Jigsaw specification, ÔÇťstrong encapsulation allows a
    component to declare which of its public types are accessible to other components
    and which are not.ÔÇŁ Strong encapsulationÔÇÖs role is to forbid code from accessing
    classes in packages that arenÔÇÖt exported by their containing modules, or in packages
    whose containing modules arenÔÇÖt needed by the module that contains the code.


    Strong encapsulation couldnÔÇÖt be achieved without having a concept like modules,
    because in Jigsaw the modules represent the base on which the principles of strong
    encapsulation are applied. Jigsaw allows modules to export only specific packages.
    The accessibility of modules is provided by their boundaries. Strong encapsulation
    is accomplished in Jigsaw using the definitions of the modules, where we are able
    to specify what types are accessible. Strong encapsulation hides moduleÔÇÖs internals
    and prevents them from external access. It also makes it more difficult to achieve
    reflective access.


    In Java 9, calling the method `setAccessible()` wonÔÇÖt work unless the object is
    accessible before the class. To be accessible, the corresponding package has to
    be exported, and the module has to be read. If both conditions are met, then it
    is accessible, so the method can be applied to make, for instance, a private field
    available. Strong encapsulation restricts access even when the accessing class
    in the target class is in the same class loader. By the way, strong encapsulation
    is not dependent on class loaders.


    ### Reliable Configuration


    Reliable configuration is a strong feature introduced in JDK 9. Open JDK states
    that ÔÇťreliable configuration replaces the class path mechanism with a means for
    program components to declare explicit dependences upon one another.ÔÇŁ Reliable
    configuration is based on the capacity to declare dependencies between modules.
    It allows us to know at compile-time if a module is missing or a dependency isnÔÇÖt
    fulfilled. This is something we couldnÔÇÖt achieve in versions before Java 9. In
    JDK 9, modules can manifest their dependencies on other modules, and the module
    system certifies that every module dependence is achieved.


    The ground for reliable configuration is represented by the readability connections
    that exist in the module system. Dependencies are analyzed and enforced at both
    compile-time and runtime. In chapter [4](../Text/A431534_1_En_4_Chapter.html)
    youÔÇÖll learn how reliable configuration is achieved in Jigsaw by the `requires`
    clause and how strong encapsulation is achieved by the `exports` clause in the
    module declaration.


    ## Enhancements Provided by Jigsaw


    Jigsaw also provides enhancements in three important areas: security, scalability,
    and performance.


    ### Security


    Java had a considerable amount of security issues in the past. Prior to JDK 9,
    as mentioned, there was no encapsulation across package boundaries. Hence, security
    is a very important subject in Jigsaw, being one of the key factors in some of
    the implemented design considerations. In Java 9, some portions of the code canÔÇÖt
    be accessed directly anymore. Jigsaw improves security significantly and greatly
    reduces the security risks by hiding the JDK internal APIs. We call this the encapsulation
    of the JDK internal APIs. They can now be handled only within the JDK itself.
    To improve security, it was not enough to only encapsulate the JDK internal APIsÔÇöits
    number of uses was decreased too. By specifying module boundaries, code is no
    longer reachable from outside of the module unless itÔÇÖs explicitly defined so.
    By default, itÔÇÖs not reachable from outside.


    Security is improved by the newly introduced strong encapsulation mechanism, which
    hides moduleÔÇÖs internals. Critical source code is hidden and is not accessible
    from outside unless absolutely necessary. Attempting to access a public JDK internal
    type results in an access error. This is why code that uses internal APIs no longer
    works starting with Java 9.


    In Jigsaw, the mechanisms that allow access to internal classes using reflection
    have been hardened. This is a great improvement because in the past the benefit
    of accessing internal JDK classes resulted in many security incidents in the Java
    platform. As the number of internal JDK classes decreases in Java 9, so do the
    number of potential breaches.


    Prior to JDK 9, Java had a serious issue regarding the fact that its classes were
    accessible from external code running in the same environment. It had very limited
    ways of restricting the access to its code from outside. In order to restrict
    package access, Java used the method `checkPackageAccess(String packageName)`
    of class `java.lang.SecurityManager`. This method gets a list of restricted packages
    from calling `java.security.Security.getProperty("package.access")` and checks
    whether the parameter `packageName` is between the retrieved packages. If not,
    then the method throws a `SecurityException`. If `packageName` is found, then
    the method `checkPermission()` is called. Some of these security problems from
    the past were related to the fact that the software developers sometimes forgot
    to call the `checkPackageAccess()` method in code everywhere it was necessary.
    If this check isnÔÇÖt done everywhere, then the code can be accessed from outside
    and a big security breach is opened, causing potential damage. It was the responsibility
    of every JCP developer to be careful and not forget to put the `checkPackageAccess()`
    call everywhere it was necessary.


    ### Scalability and Performance


    Jigsaw allows developers to create their own Java Runtime Environments (JREs)
    that contain only the modules they need. A great number of small devices benefit
    from the prospect of being able to group only the functionality that is strictly
    required by the running Java software application.


    Performance is enhanced during the class loading process because the Java Virtual
    Machine now knows where the location of a class is. Because we know in advance
    all the classes that a class refers to, the JVM can eventually perform optimizations
    that will result in a performance increase. Before Java 9, the JVM had to open
    every JAR file and perform a linear search in order to find a class, which imposed
    a huge cost on performance.


    The removal of `rt.jar` in Java 9 was a good design decision with respect to performance
    because it allowed the introduction of a new productive storage system. The performance
    of Java applications has been improved in Java 9, especially at startup time.
    For this, the structure of Java runtime has been modified. ThereÔÇÖs now enough
    potential for future performance optimizations because portions of code are reached
    only by the modules they depend on.


    The degree of scalability of the Java platform is increased by allowing developers
    to create smaller and more optimized deployments that help reduce the amount of
    memory needed on the corresponding running device. The new custom runtime images
    contain only the specific libraries and the minimum number of dependencies needed
    to run a Java application. ThereÔÇÖs no longer a requirement to install the entire
    JDK. ItÔÇÖs possible to select exactly the modules needed by an application.


    ## Other Generalities


    ### New Keywords in Java 9


    `Module` is a restricted keyword that acts like a keyword only in relation to
    a module declaration. When a module isnÔÇÖt used in connection with a module declaration,
    then the word `module` can further be used as an identifier. This means that if
    we used the word `module` to define the name of a variable, an instance variable,
    or a method, we donÔÇÖt have to change it.


    Other restricted keywords introduced in Java 9 include `exports`, `requires`,
    `provides`, `uses`, `with`, `to`, `transitive`, and `opens`.'
