    \ |\n| `--libs <path>` | Defines the directories containing native libraries that\
    \ are copied into the JMOD file. |\n| `--main-class <class-name>` | Defines the\
    \ `main` class. |\n| `--module-version <module-version>` | Defines the module\
    \ version. |\n| `--module-path <path> or -p <path>` | Specifies the module path\
