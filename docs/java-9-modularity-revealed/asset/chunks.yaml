  raw: '## Using Services in JDK 9


    This section describes what services are in Java 9 and how we can use them to
    prevent tight coupling between modules. Project Jigsaw can use the service registry
    as a layer of communication for the interaction between modules.


    Modules can register their implementation class as a service in the service registry.
    These modules are called service provider modules . Their main role is to provide
    implementations of an interface. The service consumer modules use services that
    implement the interface thatÔÇÖs defined in the service registry. They donÔÇÖt deal
    with the implementation classes that implement the interface defined in the service
    registry. Service consumer modules obtain objects from the service registry that
    implement the interface. In this way, theyÔÇÖre able to successfully call methods
    on this interface.


    Note


    A service consumer module and a service provider module donÔÇÖt have a dependency
    upon each other.


    The interface defined in the service registry implemented by the corresponding
    class represents the interaction between service providers and service consumers.
    The service registry instantiates the classes and afterwards provides this instance
    to the service consumer. The service consumer only has to know about the interface.
    It will return an object that implements the interface. It can also call methods
    on this object.


    Note


    A service can be declared as an abstract class or as an interface. However, itÔÇÖs
    better from a design point of view to use an interface rather than an abstract
    class. When using an abstract class instead of an interface, a public static provider
    method has to be defined.


    LetÔÇÖs look at the syntax of the `uses` and `provides` clauses, which are mandatory
    in order to be able to implement the concepts present throughout this chapter.


    ### Providing and Consuming Services


    In this section youÔÇÖll learn how to consume and provide services in JDK 9\. We
    present the clauses used in the module declarations to declare that a module provides
    a service implementation and that a module uses a service.


    #### Providing a Service


    he Java Platform Module System introduced a new construct called `provides` in
    the module descriptor in order for a module to be able to declare that it provides
    and exposes a service implementation for a specific service. Figure [6-1](#A431534_1_En_6_Chapter.html#Fig1)
    illustrates its syntax.


    ![A431534_1_En_6_Fig1_HTML.gif](Images/A431534_1_En_6_Fig1_HTML.gif)


    Figure 6-1.


    The provides with clause


    The `provides with` clause takes two parameters :


    *   `<interface_name>` represents the name of the service interface. It specifies
    the name of the service for which the current module provides an implementation.
    The service could be either a class or an interface.

    *   `<class_name>` represents the name of the class. It specifies the name of
    the class that implements the service interface. This class must be present in
    the current module. If it is not present in the current module, we get a compilation
    error.


    A module uses the `provides` clause to inform the ServiceLoader that it provides
    an implementation of a service. Without this knowledge, the ServiceLoader wouldnÔÇÖt
    have been able to load the service provider because it wouldnÔÇÖt have been aware
    of it existence.


    Note


    JDK 9 allows you to have a service implementation as an interface. This wasnÔÇÖt
    possible in previous versions of Java.


    Jigsaw also allows for a single module to provide an implementation for a service
    and to also consume that service. But it does not allow for more than one provides
    statement to specify the same interface in a module declaration. A module declaration
    like this will never compile:


    ```

    module myModule {

    provides myInterface with firstClass;

    provides myInterface with secondClass;

    }

    ```


    We mentioned previously the notion of consuming a service. The next subsection
    explains what this means and how it can be declared in Jigsaw.


    #### Consuming a Service


    In JDK 9, a module can explicitly declare that it consumes a service. For this,
    the service has to be discovered. Therefore, the `uses` clause was introduced
    in JDK 9 in the module declaration. It takes an interface as a parameter.


    Figure [6-2](#A431534_1_En_6_Chapter.html#Fig2) shows the syntax of the `uses`
    clause.


    ![A431534_1_En_6_Fig2_HTML.gif](Images/A431534_1_En_6_Fig2_HTML.gif)


    Figure 6-2.


    The uses clause


    When should we use this clause? This clause should be used in modules that define
    a `ServiceLoader<interface_name>`, which loads service providers for the service
    with the name `<interface_name>`. If our module uses the `ServiceLoader` class
    to load services, then itÔÇÖs mandatory to declare this in the moduleÔÇÖs declaration
    using the `uses` clause, followed by the name of the service interface used.


    This means that inside the module that declares the `uses` clause, a `ServiceLoader`
    is used, as in the following example:


    ```

    Iterable ourInterfaces = ServiceLoader.load(interface_name.class);

    ```


    Here, a `ServiceLoader` for services of type `interface_name` has been used.


    Note


    The service declared with the `uses` clause doesnÔÇÖt have to reside in the same
    module. It can also reside in another module provided that there is readability
    between the two modules .


    #### Retrieving a ServiceLoader


    WeÔÇÖve already seen how to obtain a service loader. It can be done using the `load()`
    method , which comes in four flavours, according to the JDK 9 API specification:


    *   `public static <S> ServiceLoader<S> load(Class<S> service)` This method creates
    a new service loader for the given service type. It uses the context class loader
    of the current thread.

    *   `public static <S> ServiceLoader<S> load(Class<S> service, ClassLoader loader)`
    This method creates a new service loader and uses the given class loader to locate
    service providers for the service. Providers are located first in named modules
    and then in unnamed modules. Providers are located in all named modules of the
    class loader or to any class loader reachable via parent delegation.

    *   `public static <S> ServiceLoader<S> load(ModuleLayer layer, Class<S> service)`
    This method creates a new service loader for the given service type to load service
    providers from modules in the given module layer and its ancestors. It doesnÔÇÖt
    locate providers in unnamed modules.

    *   `public static <S> ServiceLoader<S> loadInstalled(Class<S> service)` This
    method creates a new service loader for the given service type. It uses the platform
    class loader.


    After we retrieve a `ServiceLoader`, we can iterate over all the service providers
    using the `iterate()` method. Another option would be to call the `stream()` method,
    which returns a stream to lazily load available providers. The syntax of the `stream()`
    method is as follows:


    ```

    Stream> stream()

    ```


    Until now, weÔÇÖve seen how to retrieve a ServiceLoader and also how to provide
    and to consume a service. ItÔÇÖs time to see a practical example. WeÔÇÖll use an example
    using one service consumer and one service provider. Then weÔÇÖll expand the example
    and show how to add more service providers.'
