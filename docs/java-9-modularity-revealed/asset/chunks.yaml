- fmt: "### Root Module\n\nThe root module is the module that the resolution process\
    \ starts with. ItÔÇÖs specified in the `java` command using the `--module` option,\
    \ as weÔÇÖve seen in the examples when we ran the modular application.\n\nFirst,\
    \ the root module is added to the group of resolved modules. Second, the module\
    \ system scans the module descriptor of this module and adds all the dependencies\
    \ (modules) to the group of resolved modules. The process continues, and the Java\
    \ Platform Module System tries to find the dependencies on the other modules.\
    \ When all the modules searched are found and the module `java.base` is reached,\
    \ the process stops. After the resolving process is finished, we have all the\
    \ necessary modules for running our software application.\n\nIn some cases, a\
    \ module is on the module path but wasnÔÇÖt found during the resolution process\
    \ so that it can be added to the module graph. Here, we have to manually add the\
    \ module to the module graph. This can be done using the `--add-modules` command-line\
    \ option. We discuss this option in more detail in Chapter [8](../Text/A431534_1_En_8_Chapter.html).\n\
    \nItÔÇÖs important to know that the module resolution process detects any modules\
    \ that could eventually be missing. If a mandatory module is missing, the module\
    \ resolution process stops, and an exception is thrown.\n\n> **Note**  \n> If\
    \ we have an incomplete module path at compile-time, the compiler will give us\
    \ a warning. Both platform modules and developer modules are searched for during\
    \ the resolution process.\n\nAnother important topic in Jigsaw is accessibility,\
    \ covered in the next section.\n\n## Accessibility\n\nThe accessibility rules\
    \ changed fundamentally in Java 9. A type declared as `public` but not exported\
    \ will be available only inside the module where it resides. This a major change\
    \ compared to older versions of Java. Prior to Java 9, it was enough to mention\
    \ that a type is `public` and therefore was accessible anywhere. In Java 9, declaring\
    \ a type as `public` doesnÔÇÖt imply that it will be accessible everywhere.\n\n\
    Simply reading a module doesnÔÇÖt guarantee access to its packages. In addition,\
    \ in order to be accessible, modules have to export some of their packages. Only\
    \ the `public` types from the exported packages will be accessible from another\
    \ module. By taking advantage of strong encapsulation and reliable configuration,\
    \ we can explicitly define which of the moduleÔÇÖs types are available for external\
    \ access. In this way, we can very easily hide our implementation internals.\n\
    \nHiding the implementation details becomes the standard in Java 9. ItÔÇÖs obtained\
    \ by defaultÔÇöwe donÔÇÖt have to opt for it. ItÔÇÖs enough to omit to export a type\
    \ in order to make that type strong encapsulated and invisible from outside of\
    \ the module. A package can quickly benefit from the power of strong encapsulation\
    \ by simply being placed inside a module. In Java 9, weÔÇÖre able to decide which\
    \ types should be accessible from outside by enumerating them in the module declaration.\
    \ Very simple and concise.\n\nTo recap, in order for a module A to read package\
    \ P from module B, two conditions have to be met simultaneously. The first is\
    \ that module A should read (`requires`) module B. The second condition is that\
    \ module B should export its package P.\n\n> **Note**  \n> In Java 9, accessibility\
    \ is imposed at both compile-time and at runtime. An error of type `IllegalAccessError`\
    \ is thrown at runtime if the accessibility rules are breached. The accessibility\
    \ checks are enforced in the Java Virtual Machine.\n\nIn Java 9, simply setting\
    \ a `public` modifier to a type doesnÔÇÖt mean that access is granted. In the Java\
    \ versions before 9, setting an accessibility type of `public` to a type conferred\
    \ him global accessibility, but in Java 9 three conditions have to be simultaneously\
    \ met in order to make a type called T accessible outside the module:\n\n*   The\
