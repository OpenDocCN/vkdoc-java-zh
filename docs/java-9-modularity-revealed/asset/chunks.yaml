  raw: 'We get an `InaccessibleObjectException` because Gson is performing deep reflective
    access into the JDK and it doesnÔÇÖt succeed because our package org.news is by
    default not opened for deep reflection. We have to open our package org.news to
    module Gson using a qualified `opens` clause. Therefore, we need to add the following
    statement in our module descriptor:


    ```

    opens org.news to gson;

    ```


    We compile and run our application again, and, because we opened the org.news
    package so that the Gson library can perform deep reflection on it, it works.


    In this section, we managed to migrate an application that uses JAR files to run
    on JDK 9\. We created a module for our own code and put the JAR files on the module
    path by transforming them into automatic modules. We donÔÇÖt have any code on the
    class path, because the entire code is now on the module path.


    Note


    The source code we had before starting the modularization process can be found
    in the directory /ch08/topDownMigrationStart. The source code after the top-down
    modularization process can be found in the directory /ch08/topDownMigration.


    This was top-down migration , where we modularize our application and use the
    JAR libraries as automatic modules on the module path .


    ## Summary


    This chapter presented useful information on topics related to migration. Migrating
    an application to Java 9 is a multi-step process, depending on the size and the
    libraries the application is using.


    We started this chapter by presenting the automatic modules, which help us make
    significant steps forward in the process of migrating to modules because they
    reuse existing JARs. The automatic modules can be used as a replacement for JAR
    files. If you donÔÇÖt plan to migrate your codebase to modules, you can use automatic
    modules instead. ItÔÇÖs understandable to use automatic modules when the JAR file
    has not yet been modularized by its authors, but you should replace the automatic
    modules by their corresponding named modules as soon as the corresponding named
    modules are available.


    Further we presented the JDeps tool. This is a very useful tool used to find static
    dependencies of a library, but it canÔÇÖt find reflective uses of JDK internal APIs.
    JDeps performs a static investigation on class level and outputs any use of JDK
    internal APIs. If weÔÇÖre using Maven, we can make use of the Maven JDeps plugin,
    because JDeps is very well integrated with Maven through it.


    Next we talked about the encapsulation introduced in Java 9\. We learned which
    packages are encapsulated in Java 9 and which arenÔÇÖt. We showed an example of
    breaking encapsulation of JDK internal APIs using the `--add-exports` command-line
    option. We also saw how to open packages, provide readability between modules,
    and add modules to the root set of modules. The `--illegal-access` option introduced
    to allow deep reflection for code in the class path was covered in detail.


    When talking about changes in the area of the JDK internal APIs in Java 9, we
    must distinguish between accessing the internal APIs and accessing the internal
    APIs using reflection. The first isnÔÇÖt so surprising due to the fact that for
    a long time the JDK internal APIs were marked as deprecated. The latter is different
    because no deprecation warning can be thrown as the code is executed at runtime.
    As a conclusion, normal access to JDK internal APIs isnÔÇÖt possible in Java 9 anymore,
    but reflective access to JDK internal APIs is still possible, though limited.


    We also discussed and gave solutions to some of the most common issues that can
    occur during migration to Java 9: encapsulated JDK internal APIs, not resolved
    modules, cyclic dependencies, new versioning scheme, split packages, removed methods
    in Java 9, and removal of rt.jar, tools.jar, and dt.jar. An important problem
    that can occur when moving to Java 9 is the split packages problem. A split package
    is a single package located inside two or more modules.


    We finished this chapter by showing an example of migrating a small application
    that uses some third-party libraries to Java 9\. We migrated the application step-by-step
    using the top-down approach. During migration, the messages displayed in the exceptions
    and errors give valuable hints for solving the root cause of the problem and for
    moving forward.


    In Chapter [9](../Text/A431534_1_En_9_Chapter.html), weÔÇÖll learn about the new
    API introduced in JDK 9 for handling modules, module descriptors, module references,
    and layers.'
