- fmt: '### Computing the Name of the Automatic Module


    If the attribute `Automatic-Module-Name` isnÔÇÖt set, the name of the automatic
    module is automatically derived from the name of the JAR file. If the attribute
    `Automatic-Module-Name` is set, but the JAR also contains a `module-info.class`
    file, then the information stored in the attribute `Automatic-Module-Name` is
    simply ignored. The name of the automatic module will be the same as the one defined
    inside the `module-info.class` file.


    Next letÔÇÖs talk about the filename-based algorithm used by Jigsaw for computing
    the name of the automatic module from the name of the JAR. Two strings are derived
    from the JAR file: the name of the automatic module and its version:


    1.  The `.jar` suffix is removed from the name of the JAR file. The resulting
    string is further used for determining and extracting the name and the version
    of the automatic module.

    2.  The module name is extracted. According to the JDK 9 API documentation, ÔÇťif
    the name matches the regular expression `-(\\d+(\\.|$))`, then the module name
    will be derived from the subsequence preceding the hyphen of the first occurrence.
    The subsequence after the hyphen is parsed as a version and it is ignored if it
    canÔÇÖt be parsed as a version.ÔÇŁ

    3.  Some replacements on the name of the module are performed. The JDK 9 API documentation
    states that ÔÇťall non-alphanumeric characters (`[^A-Za-z0-9]`) in the module name
    are replaced with a dot (ÔÇś.ÔÇÖ), all repeating dots are replaced with one dot, and
    all leading and trailing dots are removed.ÔÇŁ


    Table [8-1](#A431534_1_En_8_Chapter.html#Tab1) shows some examples of deriving
    the name and the version from a couple of JAR files. The first column represents
    the name of the JAR file, and the second and third columns represent the automatically
    extracted name of the module and version, respectively. The fourth column tells
    us if an error occurred or not.


    **Table 8-1.** Examples of Deriving Module Names and Versions from JAR Files


    | Name of JAR | Name of Module | Version of Module | Error |

    | --- | --- | --- | --- |

    | `guava-19.0.jar` | `guava` | `19.0` | no |

    | `hadoop-common-2.8.0.jar` | `hadoop.common` | `2.8.0` | no |

    | `mockito-all-2.0.2-beta.jar` | `mockito.all` | `2.0.2-beta` | no |

    | `spark-core_2.10-2.1.0.jar` | - | - | yes |

    | `spring-core-4.3.7.RELEASE.jar` | `spring.core` | `4.3.7.RELEASE` | no |

    | `com.apress.myModule0.0.1.jar` | - | - | yes |

    | `log4j-1.2.17.redhat-2.jar` | `log4j` | `1.2.17.redhat-2` | no |

    | `jackson-core-2.9.0.pr3.jar` | `jackson.core` | `2.9.0.pr3` | no |

    | `jaxrs-api-3.0.12.Final.jar` | `jaxrs.api` | `3.0.12.Final` | no |

    | `maven-plugin-api-3.5.0-beta-1.jar` | `maven.plugin.api` | `3.5.0-beta-1` |
    no |

    | `123.jar` | - | - | yes |

    | `1my-module.jar` | - | - | yes |


    The name and version of the `guava-19.0.jar` JAR file could be successfully derived.
    According to the filename-based algorithm, first the `.jar` suffix is deleted.
    The result string is `"guava-19.0"`. Afterward, the name of the module is extracted
    by searching for the first occurrence of the hyphen. The new string is extracted
    from the beginning of the resulting string until the last position before the
    hyphen. In our case, the string found is `"guava"`, which corresponds to the name
    of the module. The string after the hyphen represents the version of the module:
    `"19.0"`.


    The name and version of the JAR `hadoop-common-2.8.0.jar` can be successfully
    extracted. The name of the module is `hadoop.common` because the hyphen from `hadoop-common`
    is replaced with a dot.


    There are situations when weÔÇÖre not able to extract the name of the automatic
    module. An example is the JAR file called `spark-core_2.10-2.1.0.jar`. When attempting
    to extract its name, we get the following error:


    ```

    Unable to derive module descriptor for: spark-core_2.10-2.1.0.jar

    spark.core.2.10: Invalid module name: ''2'' isnÔÇÖt a Java identifier

    ```


    The filename-based algorithm searches for the last hyphen in the string `"spark_core-2.10-2.1.0"`
    and splits the string into name and version. The resulting string for the name
    is `"spark_core-2.10"`. The hyphens on this string are replaced with dots. Therefore,
    the string `"spark.core.2.10"` is computed as the name of the module. However,
    this string is invalid because it contains the identifiers `2` and `10`, which
    arenÔÇÖt valid as Java identifiers. As a result, an error is thrown, and the name
    of the automatic module canÔÇÖt be extracted. If we place this JAR on the module
    path, we get the following exception:


    ```

    java.lang.module.ResolutionException: Unable to derive module descriptor for:
    spark-core_2.10-2.10.jar

    ```


    We get the same kind of error when we attempt to extract the module name from
    our `com.apress.myModule0.0.1.jar`, from our `123.jar`, or from our `1my-module.jar`:


    ```

    Unable to derive module descriptor for: com.apress.myModule0.0.1.jar

    com.apress.myModule0.0.1: Invalid module name: ''0'' isnÔÇÖt a Java identifier

    Unable to derive module descriptor for: 123.jar

    123: Invalid module name: ''123'' isnÔÇÖt a Java identifier

    Unable to derive module descriptor for: 1my-module.jar

    1my.module: Invalid module name: ''1my'' isnÔÇÖt a Java identifier

    ```


    Attempting to place any of these three JARs on the module path will result in
    a `ResolutionException` being thrown.


    **Note**


    A fatal error is thrown while placing a JAR on the module path for which the module
    name canÔÇÖt be extracted.


    For the JAR `commons-lang3-3.0.jar`, the automatic moduleÔÇÖs name is `commons.lang3`.
    As we can observe, the digits are preserved at the end of the module name.


    The JDK 9 specification recommends that the modules names follow the reverse Internet
    domain-name convention. According to the specification, ÔÇťa moduleÔÇÖs name should
    correspond to the name of its principal exported API package, which should also
    follow that convention. If a module doesnÔÇÖt have such a package, or if for legacy
    reasons it must have a name that doesnÔÇÖt correspond to one of its exported packages,
    then its name should at least start with the reversed form of an Internet domain
    with which the author is associated.ÔÇŁ


    ### Describing a JAR File


    If we have a JAR that we want to use as an automatic module and want to find out
    what kind of name the JPMS system derives out of it, we can use the `--describe-module`
    option of the `jar` tool:


    ```

    jar --describe-module --file <jar-file>

    ```


    The `--describe-module` option prints the following:


    *   The name of the module and the version

    *   The module descriptor

    *   The entire list of packages that the JAR consists of


    Listing [8-1](#A431534_1_En_8_Chapter.html#Par74) displays the results of running
    the `jar` command with the `--describe-module` option on the `guava.jar` file.


    ```

    $ jar --describe-module --file guava-19.0.jar

    No module descriptor found. Derived automatic module.

    guava@19.0 automatic

    requires java.base mandated

    contains com.google.common.annotations

    contains com.google.common.base

    contains com.google.common.base.internal

    contains com.google.common.cache

    contains com.google.common.collect

    contains com.google.common.escape

    contains com.google.common.eventbus

    contains com.google.common.hash

    contains com.google.common.html

    contains com.google.common.io

    contains com.google.common.math

    contains com.google.common.net

    contains com.google.common.primitives

    contains com.google.common.reflect

    contains com.google.common.util.concurrent

    contains com.google.common.xml

    contains com.google.thirdparty.publicsuffix

    ```


    **Listing 8-1.** Running `jar --describe-module` on the `guava-19.0.jar` File


    The module system finds no module descriptor inside the `guava-19.0.jar`, so it
    derives an automatic module out of the JAR file. The new automatic module has
    the name `"guava"` and the version `"19.0"`. It requires `java.base` and consists
    of the packages listed above.'
