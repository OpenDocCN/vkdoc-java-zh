- fmt: '### Module Declaration


    Each module has a module declaration located in a special new file called `module-info.java`,
    located in the top level of the directory. To define a module in Java 9, we create
    the file `module-info.java` and put inside it the new keyword `module` followed
    by the module name and the module declaration in curly brackets.


    Declaring a module is easy and straightforward. In this example, a module called
    `com.apress.moduleA` is declared inside the `module-info.java` file:


    ```

    module com.apress.moduleA {}

    ```


    In this case, the module declaration doesnÔÇÖt contain anything besides the module
    heading. Module `com.apress.moduleA` doesnÔÇÖt require any modules, nor does it
    export any packages, and it doesnÔÇÖt provide or consume any services.


    As already mentioned, each module must have a module declaration and thus must
    contain an own `module-info.java` file. This rule applies no matter whether itÔÇÖs
    a platform module or a module created by developers. If the `module-info.java`
    file isnÔÇÖt present, the Java compiler doesnÔÇÖt treat the source code as a module.
    The `module-info.java` file gets compiled in exactly the same way as a Java file.


    If we change the name of the `module-info.java` file to something else, the compiler
    will interpret the file as a normal file rather than as a module descriptor. In
    this case, the module system wonÔÇÖt be able to recognize the module anymore.


    **Note**


    In order to move the source code into a module, a module descriptor is mandatory.
    Otherwise, the source code wonÔÇÖt be part of a module.


    LetÔÇÖs describe some cases to see what we can put in a `module-info.java` file
    and what we canÔÇÖt. `Module-info.java` canÔÇÖt contain anything besides the module
    definition. The Java compiler can recognize syntax errors in the module declaration.


    If the module declaration isnÔÇÖt in the `module-info.java` file, the following
    error message will be displayed by the Java compiler, and the compilation will
    fail:


    ```

    Error: module declarations should be in a file named module-info.java

    ```


    A Java class canÔÇÖt be put into the `module-info.java` file instead of a module.
    If you try to do so, the compilation will also fail:


    ```

    error: cannot access module-info

    bad source file: src\com.apress.moduleA\module-info.java

    file does not contain module declaration

    Please remove or make sure it appears in the correct subdirectory of the sourcepath.

    ```


    Besides that, attempting to write two module declarations in a single `module-info.java`
    file will also result in a compilation error. As we already observed in the examples
    presented earlier, the Java compiler gives concrete indications about the cause
    and the location of the errors. In this way, we can go directly to the line of
    code that generates the issues and provide a fix for it.


    The `module-info.java` module descriptor is compiled together with the source
    code. As a result, `.class` files, including a `module-info.class` file, are generated.
    All these compiled files can be packaged as a modular JAR file (we cover modular
    JAR files later in this chapter). The compiler treats `module-info.java` like
    any other Java file and translates it into a `module-info.class` file that we
    can put in a JAR file. The result is a modular JAR.


    **Note**


    The name of file `module-info.java` was chosen by the JCP team after the already
    existing name of the `package-info.java` file. The compiler can make use of the
    `module-info.java` file even if it contains an illegal Java identifier (the dash)
    in its name definition.


    Platform modules consist of a `module-info.java` file by default. If we create
    our own module, in most cases we have to create and write the content of the `module-info.java`
    file on our own. But there are two cases when we donÔÇÖt write a `module-info.java`
    file on our own:


    *   When we put a JAR file on the module path, a `module-info.java` file will
    be automatically generated.

    *   When we automatically generate a `module-info.java` file for a specific JAR
    file using the JDeps tool and the option `--generate-module-info`.


    DonÔÇÖt worry if notions like module path and JDeps are unfamiliar to you. YouÔÇÖll
    find out later in this book what they are.


    #### Module Name


    Specifying a name for the module is mandatory. Two modules within the same code
    base canÔÇÖt have the same name. ItÔÇÖs good practice to name our modules the same
    way we name packages: by using the domain names in reverse order. The name of
    the module could therefore be a prefix of the names of its exported packages,
    but we can name our modules how we want because we donÔÇÖt have any constraints
    regarding the format of the module name. Nevertheless, the name of the module
    complies with the general rules of identifiers in Java. A module can have the
    same name as a Java class or an interface, because the names of the modules have
    their own namespace.


    **Note**


    There is an exception to the rule: when compiling multiple modules at the same
    time, itÔÇÖs mandatory that the module name has the same name as the directory where
    the module descriptor `module-info.java` is located.


    Inside a module declaration we can have a total of five types of clauses, discussed
    next.


    #### Five Types of Clauses


    A module declaration can consist of up to five types of clauses:


    *   `requires` clauses specify the module thatÔÇÖs required by the current module.

    *   `exports` clauses specify the packages that are exported by the current module

    *   `provides` clauses specify the service implementations that the current module
    provides

    *   `uses` clauses specify the services that the current module consumes

    *   `opens` clauses specify the packages that the current module opens for deep
    reflection


    Table┬á[4-1](#A431534_1_En_4_Chapter.html#Tab1) describes the syntax of these five
    clauses.


    **Table 4-1.** The Five Clauses from a Module Descriptor


    | Directive Keyword | Description |

    | --- | --- |

    | `requires <module_name>` | Expresses which other modules the current module
    depends on. |

    | `exports <package_name>` `(to <module_name>)` | Expresses which packages from
    the current module are exported outside the module. The optional `to` clause lists
    the modules to which the packages are exported. |

    | `opens <package_name>` | Makes the `<package_name>` available for deep reflection
    at runtime. |

    | `provides <service_name> with <service_name_implementation>` | Specifies that
    the current module provide the implementation of `<service_name>` with `<service_name_implementation>`.
    |

    | `uses <service_type>` | Specifies that the current module consumes instances
    of `<service_type>`. |


    This chapter covers only the first three clauses: `requires`, `exports`, and `opens`.
    The last two, `provides` and `uses`, are covered in Chapter [6](../Text/A431534_1_En_6_Chapter.html)
    because theyÔÇÖre related to services.


    LetÔÇÖs continue by exploring in detail the most common clauses typically used inside
    a module declaration: the `requires` clause and the `exports` clause.'
