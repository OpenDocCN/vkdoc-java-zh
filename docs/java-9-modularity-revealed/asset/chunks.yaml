- fmt: "#### Implied Readability\n\nImplied readability refers to the situation when:\n\
    \n- The first module reads the second module.\n- The second module reads the third\
    \ module.\n- The first module logically reads the third module as a result of\
    \ the two conditions just met.\n\nSuppose we have a module `B` that uses a type\
    \ from a module `C` (`B` reads `C`). If another module `A` reads module `B` and\
    \ uses types from module `C`, then without implied readability, module `A` should\
    \ explicitly specify that it also requires module `C`. By using implied readability,\
    \ itÔÇÖs not necessary to specify this in module `A`. ItÔÇÖs enough to specify in\
    \ the `module-info.java` of module `B` that it `requires transitive` the types\
    \ from module `C`. As a result, every module that reads types from module `B`\
    \ will automatically be able to access the types from module `C`.\n\nFigure [4-11](#A431534_1_En_4_Chapter.html#Fig11)\
    \ illustrates the corresponding module graph of the three modules and shows the\
    \ readability relations between them.\n\n![A431534_1_En_4_Fig11_HTML.gif](Images/A431534_1_En_4_Fig11_HTML.gif)\n\
    \nFigure 4-11. Module graph showing implied readability\n\nListing [4-18](#A431534_1_En_4_Chapter.html#Par315)\
    \ illustrates the module descriptor of module `A`, which requires module `B`.\n\
    \n```\n// module-info.java\nmodule A {\n    requires B;\n}\n```\n\nListing 4-18.\
    \ Module Descriptor of Module A\n\nListing [4-19](#A431534_1_En_4_Chapter.html#Par317)\
    \ shows the module descriptor of module `B`, which requires transitive module\
    \ `C`.\n\n```\n// module-info.java\nmodule B {\n    requires transitive C;\n}\n\
    ```\n\nListing 4-19. Module Descriptor of Module B\n\nItÔÇÖs not necessary for module\
    \ `A` to `require` module `C`, because module `B` `requires transitive` module\
    \ `C`. As a result, module `A` can automatically access types from module `C`.\n\
    \n> **Note:** Implied readability is achieved by adding the statement `requires\
    \ transitive` in the module declaration, followed by the name of the module that\
    \ the current module depends upon.\n\nFigure [4-12](#A431534_1_En_4_Chapter.html#Fig12)\
    \ illustrates the syntax of the `requires transitive` clause. It takes a module\
    \ name as parameter.\n\n![A431534_1_En_4_Fig12_HTML.gif](Images/A431534_1_En_4_Fig12_HTML.gif)\n\
    \nFigure 4-12. Syntax of the `requires transitive` clause\n\nLetÔÇÖs look at an\
    \ example of implied readability with platform modules in order to understand\
    \ this better. Listing [4-20](#A431534_1_En_4_Chapter.html#Par322) shows the module\
    \ declaration of the platform module `java.desktop` that defines `requires transitive`\
    \ clauses in order to take advantage of implied readability.\n\n```\n// module-info.java\n\
    module java.desktop {\n    requires transitive java.datatransfer;\n    requires\
    \ transitive java.xml;\n    requires java.prefs;\n    exports java.applet;\n \
    \   ...\n}\n```\n\nListing 4-20. The Module Descriptor of module `java.desktop`\n\
    \nListing [4-21](#A431534_1_En_4_Chapter.html#Par324) is an excerpt of the class\
    \ `DocumentHandler` located in module `java.desktop` in the package `com.sun.beans.decoder`:\n\
    \n```\n// jdk/src/java.desktop/share/classes/DocumentHandler.java\npackage com.sun.beans.decoder;\n\
    \nimport javax.xml.parsers.ParserConfigurationException;\nimport javax.xml.parsers.SAXParserFactory;\n\
    ...\n\npublic final class DocumentHandler extends DefaultHandler {\n    ...\n\
    \    public void parse(final InputSource input) {\n        if ((this.acc == null)\
    \ && (null != System.getSecurityManager())) {\n            throw new SecurityException(\"\
    AccessControlContext is not set\");\n        }\n        AccessControlContext stack\
    \ = AccessController.getContext();\n        SharedSecrets.getJavaSecurityAccess().doIntersectionPrivilege(new\
    \ PrivilegedAction() {\n            public Void run() {\n                try {\n\
    \                    SAXParserFactory.newInstance().newSAXParser().parse(input,\
    \ DocumentHandler.this);\n                }\n                catch (ParserConfigurationException\
    \ exception) {\n                    handleException(exception);\n            \
    \    }\n                catch (SAXException wrapper) {\n                    Exception\
    \ exception = wrapper.getException();\n                    if (exception == null)\
    \ {\n                        exception = wrapper;\n                    }\n   \
    \                 handleException(exception);\n                }\n           \
    \     catch (IOException exception) {\n                    handleException(exception);\n\
    \                }\n                return null;\n            }\n        }, stack,\
    \ this.acc);\n    }\n}\n```\n\nListing 4-21. Class `DocumentHandler` from Module\
    \ `java.desktop`\n\nAs you can see, the class `DocumentHandler` from module `java.desktop`\
    \ uses `SAXParserFactory` from the `java.xml` module. This denotes that module\
    \ `java.desktop` uses a type from module `java.xml`, so a readability relation\
    \ occurs between module `java.desktop` and module `java.xml`.\n\nIf we add a dependency\
    \ to the `java.desktop` module in our module descriptor and try to use the `parse()`\
    \ method from the `DocumentHandler`, weÔÇÖre attempting to access types not only\
    \ from module `java.desktop` but also from module `java.xml`. In order to access\
    \ the method from our own module, itÔÇÖs mandatory that the module `java.xml` is\
    \ required transitive by the module `java.desktop`. In this way our module can\
    \ take advantage of implied readability and have access to the types from the\
    \ module `java.xml` without explicitly requiring them. Any module that requires\
    \ module `java.desktop` automatically requires the modules `java.datatransfer`\
    \ and `java.xml`, because both are present in the module descriptor of module\
    \ `java.desktop`. By requiring the module `java.desktop`, we get access to the\
    \ exported packages from modules `java.desktop`, `java.datatransfer`, and `java.xml`.\n\
    \nIf we omit the `transitive` keyword and use only the `requires` directive, we\
    \ have the situation where our module is able to access types only from the module\
    \ `java.desktop`, but not from `java.xml`.\n\nSuppose we create a simple module\
    \ called `myModule` that requires module `java.desktop`. Listing [4-22](#A431534_1_En_4_Chapter.html#Par329)\
    \ shows the module descriptor of module `myModule`.\n\n```\n// module-info.java\n\
    module myModule {\n    requires java.desktop;\n}\n```\n\nListing 4-22. Module\
    \ Descriptor of Module `myModule`\n\nFigure [4-13](#A431534_1_En_4_Chapter.html#Fig13)\
    \ shows the module graph of the module `myModule` and expresses the readability\
    \ together with the implied readability relations between modules.\n\n![A431534_1_En_4_Fig13_HTML.gif](Images/A431534_1_En_4_Fig13_HTML.gif)\n\
    \nFigure 4-13. The module graph of `myModule`\n\nWe have the following situation:\n\
    \n- `myModule` requires `java.desktop` (readability illustrated with a dashed\
    \ line in the graph).\n- `java.desktop` module requires transitive module `java.datatransfer`\
    \ and module `java.xml` (implied readability illustrated with a solid line).\n\
    \nOur module `myModule` gets readability to modules `java.datatransfer` and `java.xml`\
    \ without needing to explicitly require them. As a result, it can use types from\
    \ these two modules without having to worry about the need to specifically declare\
    \ the dependencies to them.\n\nNow that weÔÇÖve learned what implied readability\
    \ is, letÔÇÖs see what a qualified export means."
  raw: '#### Implied Readability


    Implied readability refers to the situation when


    *   The first module reads the second module.

    *   The second module reads the third module.

    *   The first module logically reads the third module as a result of the two conditions
    just met.


    Suppose we have a module B that uses a type from a module C (B reads C). If another
    module A reads module B and uses types from module C, then without implied readability,
    module A should explicit specify that it also requires module C. By using implied
    readability, itÔÇÖs not necessary to specify this in module A. ItÔÇÖs enough to specify
    in the module-info.java of module B that it `requires transitive` the types from
    module C. As a result, every module that reads types from module B will automatically
    be able to access the types from module C.


    Figure┬á[4-11](#A431534_1_En_4_Chapter.html#Fig11) illustrates the corresponding
    module graph of the three modules and shows the readability relations between
    them.


    ![A431534_1_En_4_Fig11_HTML.gif](Images/A431534_1_En_4_Fig11_HTML.gif)


    Figure 4-11.


    Module graph showing implied readability


    Listing [4-18](#A431534_1_En_4_Chapter.html#Par315) illustrates the module descriptor
    of module A, which requires module B.


    ```

    // module-info.java

    module A {

    requires B;

    }

    Listing 4-18.

    Module Descriptor of Module A

    ```


    Listing [4-19](#A431534_1_En_4_Chapter.html#Par317) shows the module descriptor
    of module B, which requires transitive module C.


    ```

    // module-info.java

    module B {

    requires transitive C;

    }

    Listing 4-19.

    Module Descriptor of Module B

    ```


    ItÔÇÖs not necessary for module A to `require` module C, because module B `requires
    transitive` module C. As a result, module A can automatically access types from
    module C.


    Note


    Implied readability is achieved by adding the statement `requires transitive`
    in the module declaration, followed by the name of the module that the current
    module depends upon.


    Figure┬á[4-12](#A431534_1_En_4_Chapter.html#Fig12) illustrates the syntax of the
    `requires transitive` clause. It takes a module name as parameter.


    ![A431534_1_En_4_Fig12_HTML.gif](Images/A431534_1_En_4_Fig12_HTML.gif)


    Figure 4-12.


    Syntax of the requires transitive clause


    LetÔÇÖs look at an example of implied readability with platform modules in order
    to understand this better. Listing [4-20](#A431534_1_En_4_Chapter.html#Par322)
    shows the module declaration of the platform module java.desktop that defines
    `requires transitive` clauses in order to take advantage of implied readability.


    ```

    // module-info.java

    module java.desktop {

    requires transitive java.datatransfer;

    requires transitive java.xml;

    requires java.prefs;

    exports java.applet;

    ...

    }

    Listing 4-20.

    The Module Descriptor of module java.desktop

    ```


    Listing [4-21](#A431534_1_En_4_Chapter.html#Par324) is an excerpt of the class
    `DocumentHandler` located in module java.desktop in the package com.sun.beans.decoder:


    ```

    // jdk/src/java.desktop/share/classes/DocumentHandler.java

    package com.sun.beans.decoder;

    import javax.xml.parsers.ParserConfigurationException;

    import javax.xml.parsers.SAXParserFactory;

    ...

    public final class DocumentHandler extends DefaultHandler {

    ...

    public void parse(final InputSource input) {

    if ((this.acc == null) && (null != System.getSecurityManager())) {

    throw new SecurityException("AccessControlContext is not set");

    }

    AccessControlContext stack = AccessController.getContext();

    SharedSecrets.getJavaSecurityAccess().doIntersectionPrivilege(new PrivilegedAction()
    {

    public Void run() {

    try {

    SAXParserFactory.newInstance().newSAXParser().parse(input, DocumentHandler.this);

    }

    catch (ParserConfigurationException exception) {

    handleException(exception);

    }

    catch (SAXException wrapper) {

    Exception exception = wrapper.getException();

    if (exception == null) {

    exception = wrapper;

    }

    handleException(exception);

    }

    catch (IOException exception) {

    handleException(exception);

    }

    return null;

    }

    }, stack, this.acc);

    }

    }

    Listing 4-21.

    Class DocumentHandler from Module java.desktop

    ```


    As you can see, the class `DocumentHandler` from module java.desktop uses `SaxParserFactory`
    from the java.xml module. This denotes that module java.desktop uses a type from
    module java.xml, so a readability relation occurs between module java.desktop
    and module java.xml.


    If we add a dependency to the java.desktop module in our module descriptor and
    try to use the `parse()` method from the `DocumentHandler`, weÔÇÖre attempting to
    access types not only from module java.desktop but also from module java.xml.
    In order to access the method from our own module, itÔÇÖs mandatory that the module
    java.xml is required transitive by the module java.desktop. In this way our module
    can take advantage of implied readability and have access to the types from the
    module java.xml without explicitly requiring them. Any module that requires module
    java.desktop automatically requires the modules java.datatransfer and java.xml,
    because both are present in the module descriptor of module java.desktop. By requiring
    the module java.desktop, we get access to the exported packages from modules java.desktop,
    java.datatransfer, and java.xml.


    If we omit the `transitive` keyword and use only the `requires` directive, we
    have the situation where our module is able to access types only from the module
    java.desktop, but not from java.xml.


    Suppose we create a simple module called myModule that requires module java.desktop.
    Listing [4-22](#A431534_1_En_4_Chapter.html#Par329) shows the module descriptor
    of module myModule.


    ```

    // module-info.java

    module myModule {

    requires java.desktop;

    }

    Listing 4-22.

    Module Descriptor of Module myModule

    ```


    Figure┬á[4-13](#A431534_1_En_4_Chapter.html#Fig13) shows the module graph of the
    module myModule and expresses the readability together with the implied readability
    relations between modules.


    ![A431534_1_En_4_Fig13_HTML.gif](Images/A431534_1_En_4_Fig13_HTML.gif)


    Figure 4-13.


    The module graph of myModule


    We have the following situation:


    *   myModule requires java.desktop (readability illustrated with a dashed line
    in the graph).

    *   java.desktop module requires transitive module java.datatransfer and module
    java.xml (implied readability illustrated with a solid line).


    Our module myModule gets readability to modules java.datatransfer and java.xml
    without needing to explicitly require them. As a result, it can use types from
    these two modules without having to worry about the need to specifically declare
    the dependencies to them.


    Now that weÔÇÖve learned what implied readability is, letÔÇÖs see what a qualified
    export means.'
