  raw: 'A linker and a new phase called link-time were introduced in Java 9. This
    phase is optional and is executed after the compile-time but before the runtime.
    It basically assembles the modules in order to form a runtime image. Runtime images
    allow us to create custom JDKs that contain only the minimum number of modules
    necessary to run our application. The minimum possible runtime would contain a
    single module, the java.base module. Runtime images allow us to scale down the
    JDK or to scale it up based on our needs. TheyÔÇÖre a replacement of the runtime
    rt.jar.


    The linker represents a new phase of the development life-cycle. It improves performance
    by selecting only the minimum modules that it needs to successfully compile the
    code and provides many optimization options for the future.


    Jigsaw makes it possible to install separate modules as part of the JDK platform
    installation. It also allows us to dynamically include other additional modules
    in the JDK runtime image. WeÔÇÖll talk about the changes related to the binary structure
    of the JRE and the JDK and about the new structure of the legacy JDK image. YouÔÇÖll
    learn more about all these new concepts in Chapters [5](../Text/A431534_1_En_5_Chapter.html)
    and [7](../Text/A431534_1_En_7_Chapter.html) .


    In Chapter [6](../Text/A431534_1_En_6_Chapter.html) youÔÇÖll learn what services
    are, and weÔÇÖll describe through examples the notions of service interface and
    service providers. WeÔÇÖll show how to define service providers in modules and how
    to make them available to other modules.


    In Chapter [8](../Text/A431534_1_En_8_Chapter.html) youÔÇÖll see how to migrate
    applications and libraries to modules in a smooth way. WeÔÇÖll describe how to migrate
    an application to Java 9 using the top-down migration strategy. For this, weÔÇÖll
    look at a concrete example of how to migrate an application that contains some
    third-party JARs to modules. WeÔÇÖll see which kind of applications present the
    risk of breaking when switching to JDK 9\. WeÔÇÖll will give useful solutions to
    avoid this, such as searching the code for dependencies, avoiding splitting packages,
    and checking the usage of the internal APIs. If youÔÇÖve already switched to JDK
    9, we recommend trying first to run your applications with the new JDK to see
    if it breaks your code. WeÔÇÖll cover the JDeps tool and how to use it to audit
    your code and search for JDK-internal APIs. WeÔÇÖll discuss the Maven JDeps plugin,
    which represents the integration of the JDeps tool with the build tool Maven.
    WeÔÇÖll also talk about the impact and consequences of the removal of rt.jar and
    tools.jar from the JRE.


    Chapter [9](../Text/A431534_1_En_9_Chapter.html) covers the new API introduced
    in JDK 9 for working with modules. WeÔÇÖll see how to perform basic operations on
    modules.


    Chapter [10](../Text/A431534_1_En_10_Chapter.html) gets into some advanced topics
    like layers, class loading mechanism in JDK 9, multi-release JAR files, the JMOD
    tool, and upgradeable modules. WeÔÇÖll describe the concept of layers, which are
    a group of class loaders used to load classes from a module graph. WeÔÇÖll look
    at the boot layer and the correlation to the so-called well-formed graphs.


    Chapter [11](../Text/A431534_1_En_11_Chapter.html) talks about how to handle different
    scenarios for testing modular applications. Three scenarios are covered: Junit
    test classes and objects under test residing in different modules, Junit test
    classes and objects under test residing in the same module, and only objects under
    test residing inside a module. WeÔÇÖll show how to patch a module and how to use
    Maven for easing testing.


    In Chapter [12](../Text/A431534_1_En_12_Chapter.html) youÔÇÖll learn how Jigsaw
    interacts with build tools like Maven and what kind of support the most popular
    IDEs offer for Project Jigsaw.


    As you can see, this book is structured into 12 chapters. Chapter [1](../Text/A431534_1_En_1_Chapter.html)
    covers modular programming concepts. Chapters [2](../Text/A431534_1_En_2_Chapter.html)
    ÔÇô [9](../Text/A431534_1_En_9_Chapter.html) provide you with a very strong foundation
    on Project Jigsaw. Chapter [10](../Text/A431534_1_En_10_Chapter.html) describes
    some advanced features that will help you understand some complex topics on Jigsaw.
    Chapter [11](../Text/A431534_1_En_11_Chapter.html) shows how to test modular applications
    using Junit. Chapter [12](../Text/A431534_1_En_12_Chapter.html) teaches using
    Jigsaw together with build tools and integrated development environments (IDEs).


    Each topic should be easy to find. We recommend reading the chapters sequentially
    in order to understand all the topics. Some examples build on concepts that were
    explained in previous chapters.


    ## Who Should Read This Book


    This book is intended for anyone who wants to get familiar with the new modularity
    system introduced in Java 9\. It gives a strong foundation for anyone who wants
    to understand the core concepts as well as the advanced concepts of Java 9 modularity.
    The examples are designed to help you deeply understand all the notions introduced
    in Project Jigsaw. WeÔÇÖve tried, as much as possible, to give a plenty of examples
    for most of the theoretical concepts discussed throughout the book.


    Whether you already have experience with modular systems or not, this book is
    for you.


    The book canÔÇÖt cover everything on Java 9 modularity. Java 9 modularity is a very
    large and complex subject, and covering every corner of it wouldnÔÇÖt be possible
    in a book of this size. However, the book goes through all the core parts of Java
    9 modularity and touches some advanced topics. By reading this book, youÔÇÖll not
    only understand the concepts behind Java 9 modularity, youÔÇÖll also be able to
    apply them on your day-by-day projects.


    We advise you to try the examples from this book by yourself in order to get familiar
    with Project Jigsaw.'
