  *   `bin` 目录包含由链接到镜像中的模块所代表的命令行启动器。一些最重要的命令行启动器包括 `java`、`javac`、`javadoc`、`javah`、`javap`、`jcmd`、`jconsole`、`jdeps`、`jimage`、`jlink`、`jmod`、`jshell`
  和 `jstat`。我们不打算在此全部描述它们。你可以查看 JDK 9 构建版本的 `bin` 目录。

  *   `lib` 目录包含运行时系统的动态链接原生库。

  *   `conf` 目录包含可编辑的文件。其中包括 `.properties` 文件和 `.policy` 文件。

  *   `jmods` 目录包含所有 JMOD 文件。

  *   `legal` 目录包含版权文件。


  模块化运行时镜像的根目录包含版权、自述文件和发布文件。


