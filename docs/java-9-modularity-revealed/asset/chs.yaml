  \ com.apress.moduleB 的模块描述符。\n\n```\nmodule com.apress.moduleB {\nrequires com.apress.moduleA;\n\
  }\n清单 11-4.\n模块 com.apress.moduleB 的 module-info.java 文件\n```\n\n在新的目录 com.apress.moduleA2\
  \ 中，我们定义了 `EmployeeImpl.java` 类的另一个版本，它不属于任何模块。清单 11-5 展示了这个新类，其包名与旧类 com.apress.moduleA\
  \ 相同。\n\n```\npackage com.apress.moduleA;\nimport com.apress.moduleA.entity.Employee;\n\
  public class EmployeeImpl {\npublic Employee employee;\npublic EmployeeImpl() {\n\
  }\npublic Employee createNewEmployee() {\nemployee = new Employee();\nreturn employee;\n\
  }\npublic Employee setEmployeeInfo() {\nemployee = createNewEmployee();\nemployee.setFirstName(\"\
  Andrew\");\nemployee.setLastName(\"Lopez\");\nemployee.setDepartment(\"Big Data\"\
  );\nreturn employee;\n}\npublic void getEmployeeInfo() {\nSystem.out.println(\"\
  Employee first name is: \" + employee.getFirstName());\nSystem.out.println(\"Employee\
  \ last name is: \" + employee.getLastName());\nSystem.out.println(\"Employee department\
  \ is: \" + employee.getDepartment());\n}\n}\n清单 11-5.\nEmployeeImpl 类\n```\n\n在最后一个示例中，我们只更改了名字、姓氏和部门。现在我们有了代码，开始用模块\
  \ com.apress.moduleA 中的 `EmployeeImpl.java` 替换上一个清单中的那个。首先，我们编译两个现有模块，但排除目录 com.apress.moduleA2，因为它不是一个模块。以下命令实现了这一点，它利用\
  \ `grep -v` 命令来排除目录 com.apress.moduleA2 中的文件，使其不被编译：\n\n```\n$ javac -d modules\
  \ --module-path modulesLibrary --module-source-path src $(find src -name “*.java”\
  \ | grep -v com.apress.moduleA2)\n```\n\n注意\n\n`grep -v` 或 `grep -invert-match`\
  \ 的作用是反转匹配的意义。在我们的例子中，它排除了来自 com.apress.moduleA2 目录的文件，并选择了不匹配的文件。\n\n结果，com.apress.moduleA\
  \ 和 com.apress.moduleB 两个模块都被编译了，类文件现在位于 modules 目录中。接下来，我们为前面编译的每个模块创建模块化 JAR 文件。为此，我们进入\
  \ modules 目录，并为每个模块创建两个模块化 JAR 文件。作为输入，我们使用来自 modules 目录的类文件：\n\n```\ncd modules\n\
  $ jar --create --file=../modulesLibrary/com.apress.moduleA.jar -C com.apress.moduleA\
  \ .\n$ jar --create --file=../modulesLibrary/com.apress.moduleB.jar -C com.apress.moduleB\
  \ .\n```\n\n两个模块化 JAR 文件都创建在 modulesLibrary 目录中。此外，我们尝试将补丁编译为一个类。我们编译位于目录 com.apress.moduleA2\
  \ 内包 com.apress.moduleA 中的 EmployeeImpl.java 文件：\n\n```\ncd ..\n$ javac -Xmodule:com.apress.moduleA\
  \ --module-path modules -d patchModules/com.apress.moduleA src/com.apress.moduleA2/com/apress/moduleA/EmployeeImpl.java\n\
  ```\n\n以下是使用的命令行选项：\n\n*   `-Xmodule:com.apress.moduleA` 指定 `EmployeeImpl.java`\
  \ 类应该被编译，就好像它实际上是模块 com.apress.moduleA 的一部分一样。\n*   `-d patchModules/com.apress.moduleA`\
  \ 指定编译 `EmployeeImpl.java` 类的输出目录。\n\n我们传递将要被编译的类 `EmployeeImpl.java` 的路径。结果，来自\
  \ com.apress.moduleA2 目录的 EmployeeImpl 文件已被编译到 patchModules 目录中。此外，我们为之前修补的类创建一个\
  \ JAR 文件。在这种情况下，我们创建一个普通的 JAR，而不是模块化的 JAR。因此，我们进入 patchModules 目录并输入以下内容：\n\n```\n\
  jar --create -file=../patchModulesLibrary/com.apress.moduleA.jar -C com.apress.moduleA\
  \ .\n```\n\n结果，在 patchModulesLibrary 目录内创建了一个名为 com.apress.moduleA.jar 的新 JAR 文件。\n\
  \n我们可以通过两种不同的方式运行这个示例：使用类来修补模块 com.apress.moduleA，或者使用 JAR 文件来修补它。\n\n\n\n首先，让我们通过使用类来修补模块来运行它。在此示例中，我们利用\
  \ `--patch-module` 命令行选项，表示我们希望用 `patchModules` 目录中的类来修补 `com.apress.moduleA` 模块。回顾一下，`patchModules`\
  \ 目录中包含我们的 `EmployeeImpl.class`，它对应于我们想要用来替换旧类的新 `EmployeeImpl` 类：\n\n```\ncd ..\n\
  $ java --patch-module com.apress.moduleA=patchModules/com.apress.moduleA --module-path\
  \ modulesLibrary -m com.apress.moduleB/com.apress.moduleB.MainClass\n```\n\n我们还向\
  \ `-m` 标志传递了 `main` 类。控制台会输出以下内容：\n\n```\nEmployee first name is: Andrew\nEmployee\
  \ last name is: Lopez\nEmployee department is: Big Data\n```\n\n正如我们在输出中看到的，新的 `EmployeeImpl`\
  \ 类替换了现有的类。在 `MainClass` 中，我们创建了一个 `EmployeeImpl` 类型的对象，它代表了新的 `EmployeeImpl` 类。\n\
  \n在前面的示例中，我们向 `--patch-module` 选项指定了 `.class` 文件的位置。作为替代方案，我们也可以指定之前创建的位于 `patchModulesLibrary`\
  \ 目录中的 JAR 文件的位置。因此，我们运行 `java` 启动器，并使用 JAR 文件 `com.apress.moduleA.jar` 来修补模块 `com.apress.moduleA`：\n\
  \n```\n$ java --patch-module com.apress.moduleA=patchModulesLibrary/com.apress.moduleA.jar\
  \ --module-path modulesLibrary -m com.apress.moduleB/com.apress.moduleB.MainClass\n\
  ```\n\n结果与我们之前得到的结果相同。在此示例中，我们首先展示了如何使用 `--patch-module` 命令行选项来修补模块。\n\n既然我们知道了如何修补模块，接下来让我们看看如何应用这一知识在模块化环境中运行\
  \ Junit 测试用例。\n\n注意\n\n你可以在目录 `/ch11/patchingAModule` 中找到此示例的源代码。\n\n在本章前面部分，你看到了\
  \ Java 9 中单元测试的三种场景。让我们看一下场景 1（Junit 测试类和被测类型位于不同的模块中）和场景 2（被测类型位于一个模块中，而 Junit\
  \ 测试类位于类路径上）的实际代码示例。\n\n### 运行 Junit 测试，其中 Junit 测试类和被测类型位于不同的模块中\n\n以下是一个在 Java\
  \ 9 中运行 Junit 测试的非常简单的示例。在我们的案例中，Junit 测试和被测类位于不同的模块中。此场景对应于本章前面描述的场景 1。我们修改之前的示例（修补模块的示例），使其适合使用\
  \ Junit 进行测试。\n\n我们在模块 `com.apress.moduleA` 的 `Employee.java` 类中添加以下方法：\n\n```\n\
  public String getEmployeeFullData() {\nreturn getFirstName() + \", \" + getLastName()\
  \ + \", \" + getDepartment();\n}\n```\n\n我们还需要添加一个 Junit 测试用例。它将位于模块 `com.apress.moduleB`\
  \ 中，并简单地调用模块 `com.apress.moduleA` 中的 `getEmployeeFullData()` 方法。\n\n清单 11-6 展示了\
  \ `EmployeeTest` 类。\n\n```\npackage com.apress.moduleB;\nimport org.junit.Assert;\n\
  import org.junit.Test;\nimport org.junit.Before;\nimport com.apress.moduleA.entity.Employee;\n\
  public class EmployeeTest {\nEmployee employee;\n@Before\npublic void setEmployeeData()\
  \ {\nemployee = new Employee();\nemployee.setFirstName(\"Alexandru\");\nemployee.setLastName(\"\
  Jecan\");\nemployee.setDepartment(\"IT\");\n}\n@Test\npublic void employeeDataTest()\
  \ {\nAssert.assertEquals(\"Alexandru, Jecan, IT\", employee.getEmployeeFullData());\n\
  }\n}\n清单 11-6.\nEmployeeTest 类\n```\n\n此类从模块 `com.apress.moduleA` 导入 `Employee`\
  \ 类，实例化一个 `Employee` 类型的对象，并调用其上的一个方法。清单 11-7 展示了模块 `com.apress.moduleB` 的模块描述符。\n\
  \n```\nmodule com.apress.moduleB {\nrequires junit;\nrequires com.apress.moduleA;\n\
  exports com.apress.moduleB;\n}\n清单 11-7.\n模块 com.apress.moduleB 的 module-info.java\n\
  ```\n\n模块 `com.apress.moduleB` 需要模块 `com.apress.moduleA`，因为它使用了其中的类型。它还需要模块 `junit`，因为我们使用了\
  \ Junit 测试框架。在此示例中，`junit` 是一个自动模块。\n\n我们定义一个名为 `automaticModules` 的文件夹，其中放置运行 Junit\
  \ 测试所需的两个 JAR 文件：Junit 和 Hamcrest-core。\n\n注意\n\nJunit 和 Hamcrest-core 的 JAR 文件可以从\
  \ Maven 仓库 [`https://mvnrepository.com/`](https://mvnrepository.com/) 下载。你可以通过点击下载（JAR）链接，使用网页浏览器下载它们。你不需要为此使用\
  \ Maven。\n\n清单 11-8 展示了 `automaticModules` 文件夹的内容。\n\n```\nhamcrest-core-1.3jar\n\
  junit-4.12.jar\n清单 11-8.\nautomaticModules 文件夹\n```\n\n我们编译模块 `com.apress.moduleA`\
  \ 和 `com.apress.moduleB`：\n\n```\njavac -d modules --module-path \"automaticModules;modulesLibrary\"\
  \ --module-source-path src $(find src -name \"*.java\")\n```\n\n包含前面描述的两个 JAR 文件的\
  \ `automaticModules` 文件夹被传递给 `--module-path` 命令行选项。这样，这些 JAR 文件就变成了自动模块。接下来，我们切换到\
  \ `modules` 文件夹，并为模块 `com.apress.moduleA` 和 `com.apress.moduleB` 创建两个 JAR 文件：\n\n\
  ```\ncd modules\njar --create --file=../modulesLibrary/com.apress.moduleA.jar -C\
  \ com.apress.moduleA .\njar --create --file=../modulesLibrary/com.apress.moduleB.jar\
  \ -C com.apress.moduleB .\n```\n\n我们现在可以运行单元测试了。为此，我们必须传递模块路径上的所有模块，包括自动模块。我们可以使用常量\
  \ `ALL-MODULE-PATH`。正如 JDK 文档中所指定的，此变量代表模块路径上的所有模块。指定此常量比单独指定每个模块要容易得多：\n\n```\n\
  cd ..\njava --module-path \"automaticModules;modulesLibrary\" --add-modules ALL-MODULE-PATH\
  \ -m junit/org.junit.runner.JUnitCore com.apress.moduleB.EmployeeTest\n```\n\n`--module-path`\
  \ 命令行选项指向包含 Hamcrest 和 Junit JAR 文件的 `automaticModules` 文件夹，以及包含 `com.apress.moduleA.jar`\
  \ 和 `com.apress.moduleB.jar` 文件的 `modulesLibrary` 文件夹。`-m` 选项接收参数 `junit/org.junit.runner.JunitCore\
  \ com.apress.moduleB.EmployeeTest`。通过这种方式，我们声明希望使用模块 `junit` 中的 `JunitCore` 来运行位于包\
  \ `com.apress.moduleB` 中的 `EmployeeTest` 类的测试。\n\n除了使用常量 `ALL-MODULE-PATH`，也可以使用逗号列出我们需要的模块。在这种情况下，我们会这样写：\n\
  \n```\n--add-modules com.apress.moduleB,hamcrest.core\n```\n\n运行此测试的结果是 `OK`，这意味着测试成功，并且我们通过访问另一个模块并将\
  \ `junit-4.12.jar` 和 `hamcrest-core-1.3.jar` 文件作为自动模块读取，成功运行了测试用例。\n\n注意\n\n你可以在目录\
  \ `/ch11/junitSeparateModules` 中找到此示例的源代码。\n\n\n\n### 运行 JUnit 测试时，测试类不在模块内\n\n\
  到目前为止，一切顺利。在前面的示例中，我们的 JUnit 测试位于一个模块中，而测试对象位于另一个模块中。我们成功地将它们连接起来并使其运行。但是，当 JUnit\
  \ 测试不是模块的一部分，而是位于类路径上时，会发生什么？在这种情况下，事情会变得稍微复杂一些，这对应于本章开头提到的场景 2。\n\n在下一个示例中，我们有\
  \ `EmployeeTest` 类，但它不再是模块的一部分。我们还更改了 `EmployeeTest` 类的包名。它的新名称是 com.apress.moduleA。我们这样做是因为在修补（patching）期间，包名必须与模块\
  \ com.apress.moduleA 中的包名相同。\n\n在这个示例中，我们不再有模块 com.apress.moduleB，因此我们删除了其中的 `module-info.java`\
  \ 文件。清单 11-9 展示了模块 com.apress.moduleA 的模块描述符。\n\n```\nmodule com.apress.moduleA\
  \ {\n    exports com.apress.moduleA.entity;\n    exports com.apress.moduleA;\n}\n\
  清单 11-9. 模块 com.apress.moduleA 的 module-info.java 文件\n```\n\n我们首先编译模块 com.apress.moduleA，然后从中创建一个模块化\
  \ JAR：\n\n```\njavac -d modules --module-path \"automaticModules;modulesLibrary\"\
  \ --module-source-path src $(find src -name \"*.java\" | grep -v com.apress.moduleB)\n\
  cd modules\njar --create --file=../modulesLibrary/com.apress.moduleA.jar -C com.apress.moduleA\
  \ .\n```\n\n接下来，我们编译 `EmployeeTest.java` 文件：\n\n```\ncd ..\njavac -d patchModules/com.apress.moduleA\
  \ -Xmodule:com.apress.moduleA --add-reads com.apress.moduleA=junit --add-modules\
  \ junit --module-path \"modulesLibrary;automaticModules\" src/com.apress.moduleB/com/apress/moduleA/EmployeeTest.java\n\
  ```\n\n在编译期间，我们使用了选项 `-Xmodule:com.apress.moduleA`，以便将 Java 类 `EmployeeTest` 编译为模块\
  \ com.apress.moduleA 的一部分。命令行选项 `--add-reads com.apress.moduleA=junit` 是必需的，因为模块\
  \ com.apress.moduleA 使用了 JUnit，因此模块 com.apress.moduleA 需要添加对 JUnit 的读取依赖。选项 `--add-modules\
  \ junit` 也是必需的。我们正在使用 JUnit，因此我们添加了自动模块 junit，该模块是在将 `junit.jar` 放置在模块路径上后自动创建的。\n\
  \n编译完上述语句后，`patchModules` 文件夹将包含 `EmployeeTest.class` 文件。此外，我们创建一个包含此 class 文件的\
  \ JAR：\n\n```\ncd patchModules\njar --create --file=../patchModulesLibrary/com.apress.moduleA.jar\
  \ -C com.apress.moduleA .\n```\n\n我们通过修补模块 com.apress.moduleA 来运行 JUnit 测试：\n\n\
  ```\ncd ..\njava --patch-module com.apress.moduleA=patchModules/com.apress.moduleA\
  \ --module-path \"automaticModules;modulesLibrary\" --add-reads com.apress.moduleA=junit\
  \ --add-modules ALL-MODULE-PATH -m junit/org.junit.runner.JUnitCore com.apress.moduleA.EmployeeTest\n\
  ```\n\n这里我们使用位于 `patchModules` 文件夹中的 `EmployeeTest.class` 文件修补了模块。我们还添加了对 JUnit\
  \ 的读取依赖，并使用常量 `ALL-MODULE-PATH` 添加了模块路径中的所有模块，这当然包括自动模块。通过这种方式，我们成功运行了一个位于模块外部的\
  \ JUnit 测试，该测试使用了来自某个模块的测试对象。\n\n我们也可以使用 JAR 文件 `com.apress.moduleA.jar` 来修补模块 com.apress.moduleA（而不是像上一个示例那样使用\
  \ class 文件）。以下 `java` 命令与上一个示例产生相同的结果：\n\n```\n$ java --patch-module com.apress.moduleA=patchModulesLibrary/com.apress.moduleA.jar\
  \ --module-path \"automaticModules;modulesLibrary\" --add-reads com.apress.moduleA=junit\
  \ --add-modules ALL-MODULE-PATH -m junit/org.junit.runner.JUnitCore com.apress.moduleA.EmployeeTest\n\
  ```\n\n注意\n\n你可以在目录 `/ch11/junitTestNotInModule` 中找到此示例的源代码。\n\n## 使用 Maven 进行测试\n\
  \nMaven 和其他构建自动化工具让我们的生活轻松得多，因为我们不必编写那么多命令行标志。使用 Maven 运行测试时，我们不必编写 `-Xmodule` 和\
  \ `--patch-module`，因为 Maven 会在后台为我们完成这些工作。\n\n注意\n\n从版本 3.6.0 开始，Maven Compiler\
  \ 插件已支持 Jigsaw。\n\n使用 Maven 编译应用程序和运行测试比在命令行上编写带有标志的整个命令要容易得多。Maven 内置的 Jigsaw 支持极大地帮助我们减少了工作量。\n\
  \n我们沿用上一个示例（来自场景 2），其中 JUnit 测试类位于模块外部。我们必须稍微修改项目的结构，以便使其能与 Maven 配合使用。因此，模块 com.apress.moduleA\
  \ 必须位于 `src/main/java` 目录下。同时，`EmployeeTest.java` 将位于 `src/test` 目录下。\n\n`pom.xml`\
  \ 文件是 Maven 中的基本工作单元。它包含有关项目的信息以及用于构建项目的配置内容。清单 11-10 展示了我们添加到项目根目录的 `pom.xml` 文件。\n\
  \n```\n<project>\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.apress.junit</groupId>\n\
  \    <artifactId>junit-testing</artifactId>\n    <version>0.0.1</version>\n\n  \
  \  <dependencies>\n        <dependency>\n            <groupId>junit</groupId>\n\
  \            <artifactId>junit</artifactId>\n            <version>4.12</version>\n\
  \            <scope>test</scope>\n        </dependency>\n    </dependencies>\n\n\
  \    <build>\n        <plugins>\n            <plugin>\n                <groupId>org.apache.maven.plugins</groupId>\n\
  \                <artifactId>maven-compiler-plugin</artifactId>\n              \
  \  <version>3.6.1</version>\n                <configuration>\n                 \
  \   <source>9</source>\n                    <target>9</target>\n               \
  \ </configuration>\n            </plugin>\n            <plugin>\n              \
  \  <groupId>org.apache.maven.plugins</groupId>\n                <artifactId>maven-dependency-plugin</artifactId>\n\
  \                <executions>\n                    <execution>\n               \
  \         <id>copy-dependencies</id>\n                        <phase>package</phase>\n\
  \                        <goals>\n                            <goal>copy-dependencies</goal>\n\
  \                        </goals>\n                        <configuration>\n   \
  \                         <outputDirectory>${project.build.directory}/lib</outputDirectory>\n\
  \                        </configuration>\n                    </execution>\n  \
  \              </executions>\n            </plugin>\n        </plugins>\n    </build>\n\
  </project>\n清单 11-10. pom.xml 文件\n```\n\n使用 `<maven.compiler.source>` 和 `<maven.compiler.target>`\
  \ 标签，我们将源和目标版本设置为 9，因为我们想使用 JDK 9 来编译项目。我们使用支持 Jigsaw 的 Maven Compiler 插件版本 3.6.1。我们还使用\
  \ Maven Dependency 插件将依赖项复制到 `target/lib` 目录中。现在我们可以运行 `mvn clean package` 来构建项目。构建项目时，我们的测试也会被执行。我们收到\
  \ `BUILD SUCCESS` 消息，表明测试成功。\n\n在新创建的 `target` 目录中，有一个 `classes` 文件夹，其中包含使用 Maven\
  \ Compiler 插件编译的 class 文件（包括 `module-info.class` 文件）。在 `lib` 文件夹中，我们可以找到测试依赖项 `hamcrest-core-1.3.jar`\
  \ 和 `junit-4.12.jar`。\n\n使用 Maven，我们不必使用 `-Xmodule` 标志或 `--add-modules` 标志，因为所有工作都由\
  \ Maven Compiler 插件在后台完成。\n\n注意\n\n你可以在目录 `/ch11/junitTestNotInModuleMaven` 中找到此示例的源代码。\n\
  \n## 总结\n\n本章讨论了在 Java 9 中对模块化应用程序进行单元测试的最重要方面。我们了解了用于为模块编译类的 Java 编译器命令行选项 `-Xmodule`。我们还了解了用于覆盖模块内类的命令行选项\
  \ `--patch-module`。通过使用这些便捷的标志，我们展示了如何测试一个应用程序，其中被测试的类型位于模块内部，而 JUnit 测试类不在模块内部。我们还看了一个示例，其中被测试的类型和\
  \ JUnit 测试类位于不同的模块中。在本章末尾，我们演示了如何使用 Maven 及其 Maven Compiler 插件在 JDK 9 中编译和运行单元测试。\n\
  \n第 12 章涵盖了 Jigsaw 与 Intellij IDEA 和 Eclipse 等集成开发环境（IDE）的集成。它还讨论了 Jigsaw 如何与 Maven\
  \ 等构建工具协同工作。\n\n\n\n"
- "# 12. 与工具的集成\n\n为了让开发者社区能够轻松且尽快地采用 Java 9，集成开发环境（IDE）和构建工具尽可能广泛地支持 Java 9 至关重要——这一点非常重要，以至于我们专门用一整章来讨论这个主题。\n\
  \n这最后一章展示了 JDK 9 整体上，特别是 Java 平台模块系统，如何与以下工具集成：\n\n*   像 Intellij IDEA、Eclipse 和\
  \ NetBeans 这样的 IDE\n*   像 Apache Maven 这样的构建工具\n\n我们将了解这些工具为 Jigsaw 提供了哪些支持。\n\n\
  ## 与 IDE 的集成\n\nJigsaw 已经集成到 Intellij IDEA、Eclipse 和 NetBeans 等 IDE 中。接下来的三个小节将介绍这些\
  \ IDE 提供了哪些支持，以使开发者更轻松地使用 Jigsaw。我们从 Intellij IDEA 开始。\n\n注意\n\n根据 2017 年 7 月在 [`www.keycdn.com/blog/best-ide/`](http://www.keycdn.com/blog/best-ide/)\
  \ 上发表的一篇文章，Intellij IDEA、Eclipse 和 NetBeans 是 Java 编程中最流行的 IDE。因此，我们决定在本章中重点介绍这三个\
  \ IDE，而不是其他不特别关注 Java 编程语言的 IDE。\n\n### 与 Intellij IDEA 的集成\n\n由 JetBrains 开发的 Intellij\
  \ IDEA 是一款 Java IDE，同时提供社区版和商业版。从 2017 年 3 月发布的 2017.1 版本开始，它就开始支持 Project Jigsaw。在其众多功能中，IDEA\
  \ 支持在 `module-info.java` 模块描述符文件中进行代码补全。\n\n图 12-1 展示了我们如何通过在 Intellij IDEA 中选择\
  \ New ➤ module-info.java 来创建一个 `module-info.java` 文件。\n\n![A431534_1_En_12_Fig1_HTML.jpg](img/A431534_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1.\n\n在 Intellij IDEA 中添加 module-info.java\n\nIDEA 会创建一个空的 `module-info.java`\
  \ 文件，其中只包含 `module` 关键字和模块名称。\n\n如果我们在一个 Java 文件中添加新的导入，Intellij IDEA 可以自动在 `module-info.java`\
  \ 中添加必要的 `requires` 子句。例如，如果我们在代码中导入 `java.sql.DriverManager` 类，Intellij IDEA 可以找出该类所在的模块名称。因此，它可以提示我们在模块描述符中添加\
  \ `requires java.sql` 子句，如图 12-2 所示。\n\n![A431534_1_En_12_Fig2_HTML.jpg](img/A431534_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2.\n\n在 module-info.java 中添加 requires 语句的自动补全功能\n\nIntellij IDEA 还在 `module-info.java`\
  \ 文件中提供了代码自动补全功能。如果我们开始输入模块名称，IDEA 会计算并显示可用的建议，如图 12-3 所示。\n\n![A431534_1_En_12_Fig3_HTML.jpg](img/A431534_1_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3.\n\n模块名称的自动补全\n\nIntellij IDEA 还可以为我们想要导出的包提供自动补全功能。图 12-4 展示了为 `exports`\
  \ 子句提供自动补全功能的示例。当我们开始输入想要导出的包名时，Intellij IDEA 可以提示可能的建议，这样我们就不必输入完整的名称。\n\n![A431534_1_En_12_Fig4_HTML.jpg](img/A431534_1_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4.\n\nmodule-info.java 文件中包名的自动补全功能\n\n在 Intellij IDEA 提供的与 Jigsaw 相关的其他功能中，我们想提一下这些：\n\
  \n*   **可视化模块图**：模块图允许我们可视化模块之间的依赖关系。可以通过选择 Diagrams ➤ Show Diagram ➤ Java Modules\
  \ Diagram 来查看。\n*   **可视化模块使用情况**：显示模块在何处被使用。\n\nIntellij IDEA 还提供了许多本章未涵盖的其他功能。涵盖所有功能超出了本书的范围。有关\
  \ Intellij IDEA 中 Jigsaw 支持的更多信息，请查看 JetBrains 官方博客上的文档，网址为 [`https://blog.jetbrains.com/idea/?s=java+9`](https://blog.jetbrains.com/idea/?s=java+9)\
  \ 。搜索关键词 `java 9` 或 `module`。\n\n下一节将探讨另一个流行的 IDE：Eclipse。\n\n### 与 Eclipse 的集成\n\
  \nEclipse 是一款免费的 IDE。截至 JDK 9 build 178（2017 年 7 月），Eclipse 提供了一个名为 Java 9 Support\
  \ for Oxygen 的有用工具，该工具仅适用于 Eclipse Oxygen（4.7）。\n\n然而，可以使用 JDK 9 启动任何版本的 Eclipse，有两种方法可以实现。第一种是将\
  \ JDK 9 放在系统路径中，第二种是在 `eclipse.ini` 文件中添加 JDK 9 的路径，如下例所示：\n\n```\n--launcher.appendVmargs\n\
  -vm\nC:\\Program Files\\Java\\jdk-9\\bin\\javaw.exe\n```\n\n如果你使用的 Eclipse 版本大于或等于\
  \ 4.7，则可以使用 JDK 启动 Eclipse。如果你使用的版本低于 Eclipse 4.7，则必须在 `eclipse.ini` 文件中添加 `--add-modules=ALL-SYSTEM`\
  \ 标志。此标志已在 Eclipse 4.7 的 `eclipse.ini` 中添加，因此如果你使用的是 Eclipse 4.7 或更高版本，则无需再添加。使用\
  \ `ALL-SYSTEM` 标志是因为 Eclipse 使用的并非所有类型都位于 `java.base` 模块内。\n\n至于 Java 9 Support\
  \ for Oxygen 工具，Eclipse 文档指出：“Eclipse Java 9 Support 包含以下内容：能够将 JRE 和 JDK 9 添加为已安装的\
  \ JRE，支持 JavaSE-9 执行环境，能够创建使用 JRE 或 JDK 9 的 Java 和插件项目，能够编译属于 Java 项目一部分的模块。”\n\n\
  截至 2017 年 8 月，Eclipse 对 Java 9 的支持仍在进行中。有关 Eclipse 中 Jigsaw 支持的更多信息，请查看 Eclipse\
  \ 官方 Wiki 上的文档，网址为 [`https://wiki.eclipse.org/Java_9_Readiness`](https://wiki.eclipse.org/Java_9_Readiness)\
  \ 。\n\n### 与 NetBeans 的集成\n\nNetBeans 是由 Oracle 开发的跨平台 IDE。从 NetBeans 9 版本开始，它提供对\
  \ JDK 9 的支持。截至 2017 年 8 月，NetBeans 只允许我们在一个 NetBeans 项目中创建一个模块——我们不能在一个 NetBeans\
  \ 项目中创建多个模块。如果我们有多个 Jigsaw 模块，我们必须为每个模块创建一个单独的 NetBeans 项目。\n\n截至 2017 年 8 月，NetBeans\
  \ 9 仍在开发中。你可以从 [`http://bits.netbeans.org/download/trunk/nightly/latest/`](http://bits.netbeans.org/download/trunk/nightly/latest/)\
  \ 下载它。\n\n如果我们的系统上只安装了 JDK 9，那么对于 NetBeans 9 来说没问题，但如果我们的系统上同时安装了 JDK 9 和另一个版本 <9\
  \ 的 JDK，则必须在 NetBeans 安装过程中明确指定我们要使用 JDK 9。\n\n根据 NetBeans 官方网站的说法，以下是 NetBeans\
  \ JDK 9 提供支持的最重要领域：\n\n*   Maven 项目\n*   `module-info.java` 支持\n*   编译\n*   运行和调试\n\
  *   模块依赖关系图\n\n注意\n\n有关 JDK 9 与 NetBeans 集成的更多信息，请访问 [`http://wiki.netbeans.org/JDK9Support`](http://wiki.netbeans.org/JDK9Support)\
  \ 。\n\n您刚刚了解了三个最流行的 Java 相关 IDE 为 Project Jigsaw 提供的支持概况。下一节将讨论 Jigsaw 与 Apache\
  \ Maven 等构建工具的集成。\n\n## 与构建工具的集成\n\n自 2016 年上半年以来，Apache Maven 为 Jigsaw 提供了非常好的集成。它很早就开始集成\
  \ Jigsaw，并从开发者社区收集了宝贵的反馈。Maven 团队还开发了一个出色的 Apache Maven JDeps 插件，用于从 Maven 运行 JDeps。\n\
  \n\n\n### 与 Apache Maven 的集成\n\nMaven 的主要目标之一是通过仅升级其插件来提供对 Java 9 的支持。为了让 Maven\
  \ 能在 Java 9 上运行，Maven 核心内部无需进行任何更改。另一个主要目标是从 Maven 3.0 开始提供对 Java 9 的支持。\n\n为了在\
  \ Java 9 中使用 Maven，必须同时满足两个条件：\n\n*   必须将 Maven 的 `JAVA_HOME` 变量设置为指向 JDK 9 的安装目录。\n\
  *   Maven Compiler 插件的 `source` 和 `target` 参数应大于或等于 6。\n\nMaven Compiler 插件为 `source`\
  \ 和 `target` 定义了参数，这些参数对应于 JDK 的版本。JDK 9 的 `source` 和 `target` 支持的最低版本是 6。用于运行 Maven\
  \ 的 JDK 版本不必与用于运行 Maven Compiler 插件的 JDK 版本相同。\n\nMaven 需要针对 Java 9 中实现的一些 JEP 进行调整。除了与\
  \ Jigsaw 相关的 JEP 之外，Maven 还需要进行调整以适应以下 JEP：JEP 223 – 新版本字符串方案、JEP 226 – UTF-8 属性文件、JEP\
  \ 238 – 多版本 JAR 文件、JEP 247 – 为旧平台版本编译，以及 JEP 285 – 模块化 Java 应用程序打包。\n\n即使它不属于 Jigsaw\
  \ 的一部分，我们也应该谈谈 JEP 223 – 新版本字符串方案，因为它对 Maven 影响巨大。Maven 严重依赖系统属性。由于 Java 9 中的版本字符串已更改，Maven\
  \ 在内部尝试计算版本时会抛出 `ArrayIndexOutOfBoundsException`。幸运的是，从以下插件的以下版本开始，该问题已得到修复：\n\n\
  *   maven-archiver-3.0.1\n*   maven-jar-plugin-3.0.0\n*   maven-war-plugin-3.0.0\n\
  *   maven-ear-plugin-xxx\n*   maven-javadoc-plugin-2.10.4\n\n如果你在 Java 9 中使用这些插件，请确保将它们升级到至少这些版本之一。\n\
  \n表 12-1 显示了受 Java 9 引入影响的 Maven 插件。\n\n表 12-1.\n\n受 Java 9 影响的 Maven 插件\n\n| 插件名称\
  \ | 最低兼容版本 | 受影响的目标和状态 |\n| --- | --- | --- |\n| Maven Compiler 插件 | 3.6.1 | compile\
  \ => 新特性 testCompile => 新特性 |\n| Maven Javadoc 插件 | 2.10.4 | jar => 失败 javadoc =>\
  \ 警告 aggregate => 失败 |\n| Maven Plugin 插件 | 3.5 | descriptor |\n| Maven War 插件 |\
  \   | war => 失败 |\n| Plexus :: Component Metadata | 1.7 | generate-metadata => 新特性\
  \ |\n\n还记得第 8 章中描述的 JDeps 工具吗？Maven 将此工具集成到一个新插件中，即 Apache Maven JDeps 插件。\n\n####\
  \ Apache Maven JDeps 插件\n\n该插件利用 JDeps 工具分析我们类中的内部 API 调用。它可以在构建项目时执行分析。\n\n注意\n\
  \nMaven JDeps 插件的第一个版本是 3.0。Maven 特意选择了这个版本，以表明应使用 Maven 3.0 或更高版本。\n\n该插件包含两个目标：\n\
  \n*   一个名为 `jdeps:jdkinternals` 的目标，用于验证主类是否依赖于内部 JDK 类\n*   一个名为 `jdeps:test-jdkinternals`\
  \ 的目标，用于验证测试类是否依赖于内部 JDK 类\n\n表 12-2 显示了可以在 Maven JDeps 插件的 `<configuration>` 标签内使用的一些最重要的选项，这些选项记录在\
  \ Oracle 的 Java SE 文档中。\n\n表 12-2.\n\nMaven JDeps 插件的选项\n\n| 插件名称 | 描述 | 示例 |\n\
  | --- | --- | --- |\n| `failOnWarning` | 指定如果存在 JDeps 特定警告，构建是否继续。默认为 true | `<failOnWarning>`\
  \ `false` `</failOnWarning>` |\n| `dependenciesToAnalyzeIncludes` | 指定要分析的额外依赖项。格式为\
  \ `<include>` `groupId:artifactId` `</include>`。允许使用模式。 | `<dependenciesToAnalyzeIncludes>`\
  \ `<include>*:*</include>` `<include>` `com.apress.*:*` `</include>` `<include>`\
  \ `com.apress.book:*` `</include>` `<include>` `com.apress.book:utils` `</include>`\
  \ `</dependenciesToAnalyzeIncludes>` |\n| `dependenciesToAnalyzeExcludes` | 指定不应分析的依赖项。格式为\
  \ `<exclude>` `groupId:artifactId` `</exclude>`。允许使用模式。 | `<dependenciesToAnalyzeExcludes>`\
  \ `<exclude>` `com.apress.book:*` `</exclude>` `</dependenciesToAnalyzeExcludes>`\
  \ |\n| `jdeps.include` | 将分析限制为与模式匹配的类。它过滤要分析的类列表。 |   |\n| `jdeps.profile` | 显示包含包的配置文件或文件。\
  \ |   |\n| `jdeps.recursive` | 递归遍历所有依赖项。 |   |\n| `jdeps.module` | 显示包含包的模块。 |\
  \   |\n\n使用 `-` `R` 选项运行时，如果存在使用 JDK 内部 API 的传递依赖项，则会显示警告。\n\n注意\n\n通过将 `<failOnWarning>`\
  \ 选项设置为 true，如果存在任何警告，构建将立即失败。\n\n如果我们有一个使用第三方库的应用程序，那么首先使用 Maven JDeps 插件（将 `<failOnWarning>`\
  \ 选项设置为 true）在我们的应用程序代码中查找 JDK 内部 API 是有意义的，这样如果发现任何 JDK 内部 API，构建就会失败。下一步，我们可以仅对第三方库运行\
  \ Maven JDeps 插件，但这次将 `<failOnWarning>` 设置为 false，这样如果第三方库使用了 JDK 内部 API，我们的构建也不会失败。这是合理的，因为我们无法深入第三方库内部进行修复，但我们可以在自己的应用程序代码中做到这一点。\n\
  \n清单 12-1 展示了一个使用 Maven JDeps 插件实现此特定用例的示例。\n\n```\norg.apache.maven.plugins\nmaven-jdeps-plugin\n\
  3.0.0\n\ntestOnClasses\n\njdkinternals\ntest-jdkinternals\n\ntestOnDependencies\n\
  \njdkinternals\ntest-jdkinternals\n\nfalse\ntrue\n\n清单 12-1.\n使用 Maven JDeps 插件的示例\n\
  ```\n\n我们在名为 `testOnClasses` 的执行块中搜索应用程序代码中的 JDK 内部 API。我们指定了两个目标，`jdkinternals`\
  \ 和 `test-jdkinternals`，以便同时验证 `main` 类和 `test` 类。我们在此处没有指定 `<failOnWarning>` 属性，因此它将默认为\
  \ true。之后，我们指定另一个执行块来搜索附加到我们应用程序的第三方库。为此，我们将 `<recursive>` 标签指定为 true。`failOnWarning`\
  \ 设置为 false，这样如果发现 JDK 内部 API，构建不会失败。\n\n下一节将探讨 Maven Compiler 插件为 Jigsaw 提供的支持。\n\
  \n\n\n#### Apache Maven Compiler 插件\n\nApache Maven Compiler 插件自 2016 年 10 月发布的\
  \ 3.6.0 版本起，开始支持新的 Java 平台模块系统。\n\nApache Maven Compiler 插件的版本可以直接在插件配置中指定：\n\n\
  ```\norg.apache.maven.plugins\nmaven-compiler-plugin\n3.6.0\n\n```\n\nApache Maven\
  \ Compiler 插件的 3.6.0 版本增加了对模块路径的支持。众所周知，Maven Compiler 插件有两个目标：`compile` 和 `test-compile`。在编译阶段，当发现\
  \ `module-info.java` 文件时，插件会自动切换到模块路径。在 `test-compile` 阶段，插件会为主源码切换到模块路径，而为测试源码切换到类路径。\n\
  \n注意\n\nMaven 团队还增加了对在 `pom.xml` 配置中直接指定 `--add-modules` 或 `--add-exports` 等标志的支持。\n\
  \n例如，如果我们想使用 `--add-modules` 标志通过 Maven Compiler 插件添加 `java.xml.bind` 模块，可以在 Maven\
  \ Compiler 插件的配置中这样定义：\n\n```\n--add-modules\njava.xml.bind\n\n```\n\n我们也可以使用 Maven\
  \ 将 `java.base` 模块中的 `sun.net` 包提供给我们的模块 `com.apress.myModule`：\n\n```\n--add-exports\n\
  java.base/sun.net=com.apress.myModule\n\n```\n\n清单 12-2 展示了针对上述两个用例的插件完整配置：\n\n\
  ```\nmaven-compiler-plugin\n3.6.0\n\nexample\n\ncompile\n\n--add-exports\njava.base/sun.net=com.apress.myModule\n\
  --add-modules\njava.xml.bind\n\n清单 12-2.\n向 Maven Compiler 插件添加编译器参数\n```\n\n在此示例中，我们将\
  \ `maven-compiler-plugin` 的版本定义为 3.6.0。在 `<compilerArgs>` XML 标签内，我们指定了要传递给编译器的参数。每个参数都在\
  \ `<arg>` XML 标签内指定。\n\n#### 向后兼容性\n\n在迁移到 Java 9 期间，使用 Java 版本 <8 编写的项目将获得一个 `module-info.java`\
  \ 文件。使用 Maven，可以在 Java 9 中编译这些项目（考虑 `module-info.java` 文件），也可以在 Java 9 之前的版本中编译它们。\n\
  \n为此，需要进行两次编译：\n\n*   第一次编译将由 Maven Compiler 插件使用配置 `<release>9</release>` 执行。\n\
  *   第二次编译将由 Maven Compiler 插件使用低于 9 的配置执行，例如：`<source>1.8</source> 和 <target>8</target>`。\n\
  \n这可以通过 Maven Compiler 在两个不同的执行块中轻松完成。如果我们希望与 JDK 6 之前的版本兼容，则必须使用不同的 JDK。这是因为 JDK\
  \ 9 不支持为 JDK 6 之前的版本进行编译。\n\nMaven Compiler 插件还支持 JEP 247 – 为旧平台版本编译。它允许我们为 Java\
  \ 9 项目添加 `module-info.java` 文件，同时与早期版本的 Java 兼容。为此，我们需要调用 `javac` 两次。首先，我们需要使用 `release=9`\
  \ 调用 `javac`，以便使用 JDK 9 编译 `module-info.java` 文件。然后，我们需要将 `source` 和 `target` 设置为较低的\
  \ Java 版本，以便使用较低的 Java 版本编译其余的源代码。如果我们至少使用 Maven 3.3.1 版本，则可以使用工具链来实现此用例。\n\n例如，如果我们的\
  \ `JAVA_HOME` 环境变量低于或等于 JDK 9，我们可以将 `jdkToolchain` 的版本设置为 9，以便编译所有内容，包括 `module-info.java`\
  \ 文件：\n\n```\n\n```\n\n随后，我们重新编译文件并排除 `module-info.java` 文件：\n\n```\n\nmodule-info.java\n\
  \n```\n\n另一方面，如果我们的 `JAVA_HOME` 环境变量等于 JDK 9，那么我们可以将 `<jdkToolchain>` 的版本设置为 `[1.5,9)`，并使用\
  \ `<source>` 和 `<target>` = 1.5 编译文件：\n\n```\n[1.5,9)\n\n1.5\n1.5\n```\n\n注意\n\n\
  作为规则，我们应该使用匹配的 JDK 版本进行编译。\n\n要配置 Maven Toolchain 插件，我们可以编辑 `.m2` 文件夹中的 `toolchains.xml`\
  \ 文件，或者，如果我们使用的 Maven 版本大于或等于 3.3.1，我们可以直接编辑 Maven `conf` 目录中的 `toolchains.xml`\
  \ 文件。\n\nMaven 还定义了一个新的命令行选项 `--release`，它允许我们传递要编译的 JDK 发行版版本。例如，选项 `--release\
  \ 8` 等同于 `-source 8 -target 8 -bootclasspath ...`。从 3.6.0 版本开始的 Maven Compiler 插件像这样指定发行版版本：\n\
  \n```\nrelease_version\n```\n\n`<release>` 标签配置的优先级高于 `<source>` 和 `<target>` 标签。因此，如果我们同时指定了\
  \ `<release>` 标签以及 `<source>` 和 `<target>` 标签，那么 `<release>` 标签将被优先考虑。\n\n注意\n\n\
  Apache Maven Compiler 插件的 3.6.1 版本于 2017 年 1 月推出。\n\n我们还推荐一篇由 Maven 项目主席 Robert\
  \ Scholte 撰写的有趣文章，该文章解释了为什么 Maven 无法自动生成 `module-info.java` 文件。您可以在 [`www.sitepoint.com/maven-cannot-generate-module-declaration/`](http://www.sitepoint.com/maven-cannot-generate-module-declaration/)\
  \ 阅读。\n\n## 总结\n\n在本章中，我们了解了 IDE 和构建工具为 Jigsaw 提供了哪些支持。我们首先简要讨论了三个 IDE：Intellij\
  \ IDEA、Eclipse 和 NetBeans。\n\n然后，我们转向构建工具，并了解了 Maven 为 JDK 9 提供的支持。我们讨论了 Maven 的向后兼容性，并了解了\
  \ Java 编译器是如何被调用两次的——一次是因为 `module-info.java` 文件必须使用 `--release 9` 编译，另一次是为了让除 `module-info.java`\
  \ 之外的所有 Java 源文件都使用小于 9 的 `source` 和 `target` 进行编译。我们还了解了 Maven JDeps 插件，它用于在我们的代码中查找\
  \ JDK 内部 API 的使用情况。\n\n\n\n索引 A  \n--add-exports 选项  \nApache Maven 兼容性  \nCompiler\
