  // SavingsAccount.java

  package com.apress.looseCoupling;

  public class SavingsAccount implements AccountInterface {

  long deposit;

  public SavingsAccount() {

  }

  @Override

  public long getDeposit() {

  return deposit;

  }

  @Override

  public void depositMoney(long amount) {

