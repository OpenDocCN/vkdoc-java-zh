  下一节将讨论在 JDK 9 中移除的 `rt.jar`、`tools.jar` 和 `dt.jar` 文件。


  ### 已移除的文件


  #### Rt.jar 已移除


  `rt.jar` 文件包含了构成 JRE 的整个编译后的类文件。这些代表了来自 Core Java API 的所有编译后的类，包括 `sun` 和 `com`
  包。`rt.jar` 过去位于 JRE 的 `lib` 文件夹内。在 Java 8 中，`rt.jar` 文件大小约为 52 MB。在版本 9 之前的所有 Java
  版本中，为了能够访问核心 Java 库，必须将 `rt.jar` 文件包含在类路径中。但是，`rt.jar` 文件在 Java 9 中已被完全移除。它不再存在于构成
  JDK 9 的文件中。


  使用 `rt.jar` 的工具、编译器和集成开发环境 (IDE) 会受到 `rt.jar` 文件移除的影响。它们的作者必须对其进行调整，以便在 Java 9 中继续正常工作。


  根据 JEP 220 的规范，“以前存储在 `lib/rt.jar`、`lib/tools.jar` 和 `lib/dt.jar` 以及各种其他内部 JAR 文件中的类和资源文件，现在将以更高效的格式存储在
  `lib` 目录中特定于实现的文件中。”


  在 JDK 9 中，`rt.jar` 文件已被新的运行时取代。




  #### Tools.jar 和 dt.jar 已移除


  在 JDK 9 之前，`tools.jar` 文件被 JDK 使用，位于 JDK 8 或更低版本的 `lib` 目录中。它包含了 `javac` 使用的类，并支持
  `javah`、`javap`、`jdeps`、`javadoc` 等工具。`dt.jar` 文件也位于 `lib` 目录内，包含了 `Swing` 类。


  注意


  `tools.jar` 和 `dt.jar` 都已在 Java 9 中被移除。


  在 Java 9 中，原先位于 `tools.jar` 文件内的资源和类文件，可以通过 JDK 镜像中的引导类加载器或应用程序类加载器访问。同样，原先位于 `dt.jar`
  文件内的资源和类文件，在 Java 9 中可以通过引导类加载器访问。


  ### 新的 URI 方案


  JDK 9 引入了一种新的 URI 方案。为了演示这种新的 URI 方案，我们首先展示一个简单的例子。在这个例子中，我们使用 `ClassLoader` 类的
  `getSystemResource()` 方法，从用于加载类的搜索路径中查找 `String` 类的 URL 资源。该资源将通过系统类加载器定位。


  在清单 5-1 中，`getSystemResource()` 方法检索了 `java.lang.String` 类的 URL 资源。


  ```

  // Main.java (module com.apress.getSystemResource)

  package com.apress.getSystemResource;

  import java.net.URL;

  public class Main {

  public static void main(String[] args) {

  URL url = ClassLoader.getSystemResource(“java/lang/String.class”);

  System.out.println(url);

  }

  }

  清单 5-1.

  模块 com.apress.getSystemResource 的主类

  ```


  清单 5-2 定义了模块 `com.apress.getSystemResource` 的模块描述符。


  ```

  module com.apress.getSystemResource {

  }

  清单 5-2.

  模块 com.apress.getSystemResource 的 module-info.java 文件

  ```


  我们运行上述模块，并在控制台看到打印出的结果 URL：


  ```

  jrt:/java.base/java/lang/String.class

  ```


  现在，我们在 Java 8 上运行同样的例子。这种情况下，结果 URL 如下所示：


  ```

  jar:file:/C:/Program%20Files/Java/jdk1.8.0_101/jre/lib/rt.jar!/java/lang/String.class

  ```


  注意


  你可以在目录 `/ch05/getSystemResource` 中找到此示例的源代码。


  我们观察到，Java 8 和 Java 9 的输出完全不同。在 Java 8 中，URL 是 JAR 文件的形式，`String.class` 位于 `rt.jar`
  文件内。在 Java 9 中不可能有相同的输出，因为 Java 9 没有 `rt.jar` 文件。


  为了解决这个问题，Java 9 引入了一种名为 `jrt` 的新 URL 方案，它提供了对运行时镜像内容的访问。术语 `jrt` 源自 Java 运行时（java
  runtime）。根据 Open JDK 的说法，`jrt` URL 方案“用于命名存储在运行时镜像中的模块、类和资源，而无需揭示镜像的内部结构或格式。”


  注意


  一个 `jrt` URL 可以有四种不同的形式。


  图 5-2 展示了 `jrt` URL 最简单的结构。


  ![A431534_1_En_5_Fig2_HTML.gif](img/A431534_1_En_5_Fig2_HTML.gif)


  图 5-2.


  jrt URL 的最简结构


  这个 `jrt` URL（除了 `jrt:/` 之外没有指定任何内容）指定了当前运行时镜像中存在的所有文件。但我们还可以有更多 `jrt` URL 的表示形式。图
  5-3 展示了仅指定模块名称的另一种 `jrt` URL 形式。


  ![A431534_1_En_5_Fig3_HTML.gif](img/A431534_1_En_5_Fig3_HTML.gif)


  图 5-3.


  带模块的 jrt URL 结构


  在这种情况下，`jrt` URL 指定了所指定模块中的所有文件。


  图 5-4 展示了另一种 `jrt` URL 形式，它只包含路径，但不包含模块名称。


  ![A431534_1_En_5_Fig4_HTML.gif](img/A431534_1_En_5_Fig4_HTML.gif)


  图 5-4.


  带路径的 jrt URL 结构


  在这种情况下，路径代表当前运行时镜像中的一个资源文件或一个类。该路径不绑定到特定模块。


  图 5-5 展示了 `jrt` URL 的完整结构，同时指定了模块和路径。


  ![A431534_1_En_5_Fig5_HTML.gif](img/A431534_1_En_5_Fig5_HTML.gif)


  图 5-5.


  jrt URL 的完整结构


  `jrt` URL 的完整结构指向给定模块内的特定资源文件。`jrt` 方案还允许检索平台模块的内容。


  现在我们已经了解了新的 URI 方案，接下来继续讨论所有这些修改可能导致的兼容性问题。


  ### 兼容性


  如前所述，由于 JDK 的新结构，Java 9 中某些现有应用程序最终可能会出现重要的兼容性问题。对于严格依赖 JDK 内部结构的应用程序，Java 9 中会出现兼容性问题。因为
  JDK 不再包含 `jre` 子目录，任何使用此子目录的代码都将无法按预期工作。


  此外，在 Java 9 中，系统属性 `java.endorsed.dirs` 和 `java.ext.dirs` 已被移除。这意味着依赖这两个系统属性的应用程序在
  Java 9 中将无法正常工作。


  `rt.jar`、`tools.jar` 和 `dt.jar` 文件的移除也对依赖它们的应用程序产生了负面影响。


  Java 9 中另一个兼容性问题将出现在期望使用 JAR URL 来命名运行时镜像内的类和资源文件的源代码中。如前所述，JAR URL 已被 `jrt` URL
  取代。


  另一个需要注意的话题与类加载器有关。表 5-1 显示了 Java 9 中发生变化的类加载器，以及新的类加载器和相应的包。第 10 章将更详细地介绍类加载器。


  表 5-1.


  类加载器变更


  | 包 | 旧类加载器 | 新类加载器 |

  | --- | --- | --- |

  | sun.tracing.dtrace | 引导 | 应用程序 |

  | sun.tools.jar | 引导 | 应用程序 |

  | sun.security.tools.policytool | 引导 | 应用程序 |

  | com.sun.tracing | 引导 | 应用程序 |

  | com.sun.tools.script | 应用程序 | 引导 |

  | com.sun.tools.corba.se.idl | 应用程序 | 引导 |

  | com.sun.jndi.url.dns | 引导 | 扩展 |

  | com.sun.jndi.dns | 引导 | 扩展 |

  | com.sun.crypto | 扩展 | 引导 |


  因此，依赖此处列出的包的类加载器的源代码在 Java 9 中可能无法正常工作。


  ## 总结


  本章涵盖了 Java 9 中引入的新模块化运行时镜像，以及决定引入它们背后的原因。它比较了 Java 9 之前和 Java 9 中的运行时镜像。


  我们详细解释了新运行时镜像中每个文件夹包含的内容，并展示了 release 文件的内容。我们讨论了 `rt.jar`、`tools.jar` 和 `dt.jar`
  文件的移除，并强调了这对现有应用程序的影响。接着，我们介绍了新的 URI 方案，该方案由 `jrt` URL 代替了 `jar` URL。


  本章最后总结了由于 JEP 220 中实施的更改可能出现的兼容性问题。有关本章讨论主题的更多信息，请查阅 [`http://openjdk.java.net/jeps/220`](http://openjdk.java.net/jeps/220)
  上的 JEP 220 文档。


  第 6 章将展示如何使用服务解耦模块。




  '
- "# 6. 服务\n\n服务本质上是由接口或类定义的一组功能，并且存在相应的服务提供者。服务的作用是解耦紧密耦合的模块，并允许服务提供者与服务消费者之间实现松散耦合。在\
  \ JDK 9 中使用服务并非强制要求，但它们为构建解耦模块提供了很好的解决方案。\n\n假设我们要测试不同类型汽车的制动系统。制动服务可以定义测试制动系统的一般准则、法律规则和最佳实践。汽车制造商可以实现自己的服务来测试其汽车的制动系统，因为不同车型的制动系统各不相同。这些服务被称为服务提供者，因为它们为制动服务提供了具体的实现。汽车制造商用于可视化和分析汽车功能的内部工具可以使用制动服务。这些工具被称为服务消费者，因为它们使用或消费该服务。\n\
  \nJigsaw 中服务的基本思想是：在模块中，我们不想暴露实现类，而只想暴露通过接口公开的内容。这就引出了以下问题：如何在 Java 9 的 Java 平台模块系统中实现这一点？答案很简单：我们可以使用接口作为契约。\n\
  \n在深入探讨这个答案之前，我们先简要了解一下服务是什么以及它们在 Java 9 中如何工作。服务可以由指定服务功能的接口和类组成。服务提供者实现一个服务。多个服务提供者可以通过提供自定义实现来实现同一个服务。\n\
  \n为了在服务提供者与服务消费者之间实现分离和解耦，Java 在 `java.base` 模块的 `java.util` 包中提供了 `ServiceLoader<S>`\
  \ 类。这个类并非在 Java 9 中引入，它自 JDK 6 起就已存在，但在 JDK 9 中得到了增强以支持模块。它的作用是搜索、查找并加载类型为 S 的服务对应的所有服务提供者。这是在运行时执行的，而不是在编译时。应用程序代码仅调用服务，而不引用服务提供者。\n\
  \n想象一下，德国三大汽车制造商——大众、戴姆勒和宝马——各自拥有自己的服务提供者，这些提供者实现了一个名为 `brake system` 的服务。`brake\
  \ system` 服务提供了汽车制动系统必须满足的法律规则。由于汽车制造商生产的制动系统各不相同，它们各自决定通过遵守其规定来提供 `brake system`\
  \ 规则的实现。每家制造商都决定构建工具，以便能够可视化其制动系统生成的输出。这些工具充当服务消费者，它们只知道 `brake system` 服务，而不知道实现制动系统服务接口的服务提供者。既然服务提供者和服务消费者互不知晓，是什么让它们之间的交互成为可能？这时\
  \ `ServiceLoader` 就登场了。它使服务提供者的实例对服务消费者可用。在我们的例子中，`ServiceLoader` 使 `brake system`\
  \ 服务的不同实现对数据可视化工具可用。\n\n注意\n\n`ServiceLoader` 的作用是查找并加载所有服务提供者，并使它们对服务消费者可访问。\n\n\
  现在让我们进入模块化世界，解释刚才介绍的概念如何融入新的 Java 平台模块系统。在模块化上下文中，我们可以使用一个提供者模块，其作用是在服务注册中心注册服务。此外，我们还可以使用一个消费者模块，其作用是在服务注册中心查找服务。\n\
  \n注意\n\n服务注册中心向消费者模块返回一个服务实例。\n\n即使我们使用模块，工作流程也与我们在非模块化世界中了解的一样。首先，提供者注册一个服务或接口。其次，消费者在注册中心搜索该接口的任何实现。当找到任何实现时，它们可以通过接口调用服务，而无需了解具体的实现。\n\
  \nServiceLoader API 用于解耦模块。一个模块应依赖于接口，而不是另一个模块的实现。实现类不应被导出，而应导出接口。ServiceLoader\
  \ API 的强大特性之一是，系统无需在编译时就了解所有服务提供者的实现，它们仅在运行时才被计算。因此，在编译时，模块之间的这种依赖关系无需在模块声明中声明。\n\
  \n## 模块间的强耦合\n\n在第 4 章中，你了解了 `requires` 和 `exports` 子句的含义。当一个模块需要另一个模块时，两个模块之间就会产生强耦合。如果一个模块发生更改，则可能需要调整所有依赖它的模块。这不仅使源代码更难维护，还可能显著增加在代码中实现变更请求所需的时间。\n\
  \n让我们通过一个解释性示例来说明模块间的强耦合。从 `java.rmi` 模块的模块声明中我们知道，它需要 `java.logging` 模块。`java.rmi`\
  \ 模块依赖于 `java.logging` 模块，并且可以访问 `java.logging` 模块导出的 API 中的公共类型。因此，`java.rmi` 和\
  \ `java.logging` 模块之间存在强耦合。这在编译时和运行时都有重要影响。\n\n在编译时，如果找不到 `java.logging` 模块，则无法构建\
  \ `java.rmi` 模块。编译时会抛出 `module not found error` 错误。\n\n在运行时，如果找不到 `java.logging`\
  \ 模块，则任何依赖于 `java.rmi` 的应用程序都无法启动。这是因为 `java.rmi` 对 `java.logging` 的依赖关系无法解析。将抛出以下错误：\n\
  \n```\nError occurred during initialization of VM\njava.lang.module.ResolutionException:\
  \ Module java.logging not found, required by java.rmi\nat java.lang.module.Resolver.fail(java.base@9-ea/Resolver.java:841)\n\
  at java.lang.module.Resolver.resolve(java.base@9-ea/Resolver.java:154)\nat java.lang.module.Resolver.resolveRequires(java.base@9-ea/Resolver.java:116)\n\
  at java.lang.module.Configuration.resolveRequiresAndUses(java.base@9-ea/Configuration.java:311)\n\
  at java.lang.module.ModuleDescriptor$1.resolveRequiresAndUses(java.base@9-ea/ModuleDescriptor.java:2483)\n\
  at jdk.internal.module.ModuleBootstrap.boot(java.base@9-ea/ModuleBootstrap.java:272)\n\
  at java.lang.System.initPhase2(java.base@9-ea/System.java:1927)\n```\n\n\n\n## 在\
  \ JDK 9 中使用服务\n\n本节将介绍 Java 9 中的服务是什么，以及如何使用它们来防止模块之间的紧耦合。Project Jigsaw 可以利用服务注册表作为模块间交互的通信层。\n\
  \n模块可以将其实现类作为服务注册到服务注册表中。这些模块被称为**服务提供者模块**。它们的主要角色是提供某个接口的实现。**服务消费者模块**则使用那些实现了服务注册表中定义的接口的服务。它们不直接处理实现该接口的具体类。服务消费者模块从服务注册表中获取实现了该接口的对象。通过这种方式，它们能够成功调用该接口上的方法。\n\
  \n> **注意**\n> \n> 服务消费者模块和服务提供者模块之间不存在相互依赖关系。\n\n服务注册表中定义的、由相应类实现的接口，代表了服务提供者与服务消费者之间的交互。服务注册表会实例化这些类，然后将此实例提供给服务消费者。服务消费者只需要了解该接口即可。它将返回一个实现了该接口的对象，并且可以调用该对象上的方法。\n\
  \n> **注意**\n> \n> 服务可以声明为抽象类或接口。然而，从设计角度来看，使用接口比使用抽象类更好。如果使用抽象类而非接口，则必须定义一个 `public\
  \ static provider` 方法。\n\n让我们来看看 `uses` 和 `provides` 子句的语法，它们是实现本章所述概念所必需的。\n\n\
  ### 提供与消费服务\n\n在本节中，你将学习如何在 JDK 9 中消费和提供服务。我们将介绍模块声明中使用的子句，用于声明一个模块提供了某个服务实现，以及一个模块使用了某个服务。\n\
  \n#### 提供服务\n\nJava 平台模块系统在模块描述符中引入了一个名为 `provides` 的新构造，以便模块能够声明它为特定服务提供并暴露了一个服务实现。图\
  \ 6-1 展示了其语法。\n\n![A431534_1_En_6_Fig1_HTML.gif](img/A431534_1_En_6_Fig1_HTML.gif)\n\
  \n**图 6-1.** `provides with` 子句\n\n`provides with` 子句接受两个参数：\n\n*   `<interface_name>`\
  \ 代表服务接口的名称。它指定了当前模块为其提供实现的服务名称。该服务可以是一个类或一个接口。\n*   `<class_name>` 代表类的名称。它指定了实现服务接口的类的名称。此类必须存在于当前模块中。如果它不存在于当前模块中，我们将得到一个编译错误。\n\
  \n模块使用 `provides` 子句来通知 `ServiceLoader` 它提供了某个服务的实现。如果没有这个信息，`ServiceLoader` 将无法加载服务提供者，因为它不知道其存在。\n\
  \n> **注意**\n> \n> JDK 9 允许将服务实现作为接口。这在 Java 的早期版本中是不可能的。\n\nJigsaw 还允许单个模块既为某个服务提供实现，又消费该服务。但它不允许在模块声明中出现多个\
  \ `provides` 语句指定同一个接口。像这样的模块声明将永远无法编译：\n\n```\nmodule myModule {\nprovides myInterface\
  \ with firstClass;\nprovides myInterface with secondClass;\n}\n```\n\n我们之前提到了消费服务的概念。下一小节将解释这意味着什么，以及如何在\
  \ Jigsaw 中声明它。\n\n#### 消费服务\n\n在 JDK 9 中，模块可以显式声明它消费某个服务。为此，必须发现该服务。因此，JDK 9 在模块声明中引入了\
  \ `uses` 子句。它接受一个接口作为参数。\n\n图 6-2 展示了 `uses` 子句的语法。\n\n![A431534_1_En_6_Fig2_HTML.gif](img/A431534_1_En_6_Fig2_HTML.gif)\n\
  \n**图 6-2.** `uses` 子句\n\n我们何时应该使用这个子句？该子句应该用于定义了 `ServiceLoader<interface_name>`\
  \ 的模块中，该加载器会为名称为 `<interface_name>` 的服务加载服务提供者。如果我们的模块使用 `ServiceLoader` 类来加载服务，那么必须在模块声明中使用\
  \ `uses` 子句，后跟所使用的服务接口名称，来声明这一点。\n\n这意味着，在声明了 `uses` 子句的模块内部，会使用一个 `ServiceLoader`，如下例所示：\n\
  \n```\nIterable ourInterfaces = ServiceLoader.load(interface_name.class);\n```\n\
  \n这里，使用了一个用于类型为 `interface_name` 的服务的 `ServiceLoader`。\n\n> **注意**\n> \n> 使用 `uses`\
  \ 子句声明的服务不必位于同一个模块中。它也可以位于另一个模块中，前提是两个模块之间存在可读性关系。\n\n#### 获取 ServiceLoader\n\n\
  我们已经了解了如何获取服务加载器。根据 JDK 9 API 规范，可以通过 `load()` 方法实现，该方法有四种形式：\n\n*   `public static\
  \ <S> ServiceLoader<S> load(Class<S> service)`：此方法为给定的服务类型创建一个新的服务加载器。它使用当前线程的上下文类加载器。\n\
  *   `public static <S> ServiceLoader<S> load(Class<S> service, ClassLoader loader)`：此方法创建一个新的服务加载器，并使用给定的类加载器来定位服务的提供者。提供者首先在命名模块中定位，然后在未命名模块中定位。提供者位于类加载器的所有命名模块中，或位于通过父委托可达的任何类加载器中。\n\
  *   `public static <S> ServiceLoader<S> load(ModuleLayer layer, Class<S> service)`：此方法为给定的服务类型创建一个新的服务加载器，用于从给定模块层及其祖先模块中的模块加载服务提供者。它不会在未命名模块中定位提供者。\n\
  *   `public static <S> ServiceLoader<S> loadInstalled(Class<S> service)`：此方法为给定的服务类型创建一个新的服务加载器。它使用平台类加载器。\n\
  \n在获取 `ServiceLoader` 之后，我们可以使用 `iterate()` 方法遍历所有服务提供者。另一种选择是调用 `stream()` 方法，该方法返回一个流，用于延迟加载可用的提供者。`stream()`\
  \ 方法的语法如下：\n\n```\nStream> stream()\n```\n\n到目前为止，我们已经了解了如何获取 ServiceLoader，以及如何提供和消费服务。现在是时候看一个实际示例了。我们将使用一个包含一个服务消费者和一个服务提供者的示例。然后，我们将扩展该示例，并展示如何添加更多的服务提供者。\n\
  \n\n\n#### 使用一个消费者和一个提供者\n\n本节通过一个简单示例来说明前面介绍的概念。假设我们有三个模块：\n\n*   `com.apress.moduleA`\
  \ 模块包含一个名为 `ServiceExample` 的简单接口。\n*   `com.apress.providerA` 模块定义了一个服务提供者，其中包含类\
  \ `ServiceExampleImplementation1`，该类实现了来自 `com.apress.moduleA` 模块的接口 `ServiceExample`。\n\
  *   `com.apress.consumer` 模块定义了一个服务消费者，它为 `ServiceExample` 服务创建一个新的服务加载器并使用该服务。\n\
  \n清单 6-1 展示了定义在 `com.apress.moduleA` 模块内的接口 `ServiceExample`。\n\n```\npackage com.apress.moduleA.interfaces;\n\
  public interface ServiceExample {\nString printHelloWorld();\n}\n清单 6-1.\n来自模块 com.apress.moduleA\
  \ 的接口 ServiceExample\n```\n\n`com.apress.moduleA` 模块的模块描述符如清单 6-2 所示。接口所在的包 `com.apress.moduleA.interfaces`\
  \ 被导出。\n\n```\nmodule com.apress.moduleA {\nexports com.apress.moduleA.interfaces;\n\
  }\n清单 6-2.\n模块 com.apress.moduleA 的模块描述符\n```\n\n到目前为止，我们只在一个模块内定义了一个接口。接下来，我们将定义提供者模块。清单\
  \ 6-3 展示了来自 `com.apress.providerA` 模块的接口实现类。\n\n```\npackage com.apress.providerA;\n\
  import com.apress.moduleA.interfaces.ServiceExample;\npublic class ServiceExampleImplementation1\
  \ implements ServiceExample {\npublic ServiceExampleImplementation() {\n}\n@Override\n\
  public String printHelloWorld() {\nreturn \"Hello World from ServiceExampleImplementation1\"\
  ;\n}\n}\n清单 6-3.\n来自模块 com.apress.providerA 的接口 ServiceExample 的实现类\n```\n\n在清单\
  \ 6-4 中，你可以看到 `com.apress.providerA` 模块的模块描述符。\n\n```\nmodule com.apress.providerA\
  \ {\nrequires com.apress.moduleA;\nprovides com.apress.moduleA.interfaces.ServiceExample\
  \ with com.apress.providerA.ServiceExampleImplementation1;\n}\n清单 6-4.\n模块 com.apress.providerA\
  \ 的模块描述符\n```\n\n该模块描述符声明它使用类 `ServiceExampleImplementation1` 提供了 `ServiceExample`\
  \ 接口的一个实现。这意味着在该模块内部，我们有一个名为 `ServiceExampleImplementation1` 的类，它实现了 `ServiceExample`\
  \ 接口。该模块描述符还要求了 `com.apress.moduleA` 模块，因为它必须访问该接口才能实现它。\n\n清单 6-5 展示了 `com.apress.consumer`\
  \ 模块的内容。\n\n```\npackage com.apress.consumer;\nimport com.apress.moduleA.interfaces.ServiceExample;\n\
  import java.util.ServiceLoader;\npublic class Main {\npublic static void main(String[]\
  \ args) {\nIterable services = ServiceLoader.load(ServiceExample.class);\nfor(ServiceExample\
  \ serviceExample : services) {\nSystem.out.println(serviceExample.printHelloWorld());\n\
  }\n}\n}\n清单 6-5.\n模块 com.apress.consumer 的主类\n```\n\n`Main` 类使用来自 `java.util` 包的\
  \ `ServiceLoader` 获取 `ServiceExample` 的实例。这是通过在 `com.apress.consumer` 模块的 `Main`\
  \ 类中为 `ServiceExample` 类型创建一个新的服务加载器来完成的。所有 `ServiceExample` 类型的实例都通过调用带有 `ServiceExample.class`\
  \ 参数的 `load()` 方法来检索。最后，我们遍历它们并调用它们的 `printHelloWorld()` 方法。\n\n清单 6-6 展示了 `com.apress.consumer`\
  \ 模块的 `module-info.java` 文件。\n\n```\nmodule com.apress.consumer {\nrequires com.apress.moduleA;\n\
  uses com.apress.moduleA.interfaces.ServiceExample;\n}\n清单 6-6.\n模块 com.apress.consumer\
  \ 的模块描述符\n```\n\n模块 `com.apress.consumer` 要求模块 `com.apress.moduleA`，因为它需要访问该接口以调用其上的相应方法。此外，它指定它使用接口\
  \ `ServiceExample`。这告诉模块系统，模块 `com.apress.consumer` 想要消费 `com.apress.moduleA.interfaces.ServiceExample`\
  \ 接口的实例。\n\n最后，我们使用以下命令编译指定的模块：\n\n```\njavac -d output --module-source-path src\
  \ $(find . -name \"*.java\")\n```\n\n然后我们运行以下命令：\n\n```\njava --module-path output\
  \ -m com.apress.consumer/com.apress.consumer.Main\n```\n\n输出打印在控制台中：\n\n```\nHello\
  \ World from ServiceExampleImplementation1\n```\n\n在这个示例中，我们看到了如何在一个单独的模块中定义一个简单的服务提供者、一个服务消费者以及一个用于服务提供者和服务消费者之间通信的接口。服务提供者和服务消费者都只需要该接口。这意味着服务提供者和接口之间存在依赖关系，同样，服务消费者和接口之间也存在依赖关系。重要的是要记住，服务提供者和服务消费者之间没有依赖关系。因此，这两个模块之间没有紧密耦合。\n\
  \n注意\n\n你可以在目录 `/ch06/oneConsumerOneProvider` 中找到此示例的源代码。\n\n#### 使用一个消费者和两个提供者\n\
  \n到目前为止，我们只有一个服务提供者，但我们可以定义多个服务提供者，同时保持服务提供者与服务消费者之间的松散耦合关系。我们将通过定义另一个提供者模块的示例来说明这个概念。\n\
  \n清单 6-7 展示了 `com.apress.providerB` 模块中接口 `ServiceExample` 的实现类。\n\n```\npackage\
  \ com.apress.providerB;\nimport com.apress.moduleA.interfaces.ServiceExample;\n\
  public class ServiceExampleImplementation2 implements ServiceExample {\npublic ServiceExampleImplementation2()\
  \ {\n}\n@Override\npublic String printHelloWorld() {\nreturn \"Hello World from\
  \ ServiceExampleImplementation2\";\n}\n}\n清单 6-7.\n来自模块 com.apress.providerB 的接口\
  \ ServiceExample 的实现类\n```\n\n清单 6-8 展示了 `com.apress.providerB` 模块的模块描述符。\n\n```\n\
  module com.apress.providerB {\nrequires com.apress.moduleA;\nprovides com.apress.moduleA.interfaces.ServiceExample\
  \ with com.apress.providerB.ServiceExampleImplementation2;\n}\n清单 6-8.\n模块 com.apress.providerB\
  \ 的模块描述符\n```\n\n`com.apress.providesB` 模块的模块描述符使用类 `ServiceExampleImplementation2`\
  \ 提供了 `ServiceExample` 接口的一个实现。\n\n通过编译和运行这些模块，控制台中会打印出以下结果：\n\n```\nHello World\
  \ from ServiceExampleImplementation2\nHello World from ServiceExampleImplementation1\n\
  ```\n\n在这个示例中，我们定义了两个提供者模块，并看到了它们如何在模块系统的上下文中进行交互。没有一个提供者模块依赖于消费者模块。\n\n在我们的示例中，提供者模块和消费者模块都没有导出它们的包。这样，它们就被封装起来，无法从外部访问。尽管如此，Jigsaw\
  \ 仍然能够实例化 `ServiceExampleImplementation1` 类型的类，因为它实现了 `ServiceExample` 接口，而该接口是在\
  \ `com.apress.providerB` 模块的 `module-info.java` 中使用 `provides` 指令定义的。\n\n注意\n\n\
  你可以在目录 `/ch06/oneConsumerTwoProviders` 中找到此示例的源代码。\n\n\n\n## 摘要\n\n本章我们讨论了服务。服务通过以接口形式指定契约来解耦模块，允许服务消费者与服务提供者之间实现松散耦合。松散耦合的概念在软件开发中非常重要，尤其是在大型软件应用中。我们展示了如何通过模块描述文件\
  \ `module-info.java` 中的新构造 `provides … with` 来声明模块提供服务。随后，我们讨论了如何通过模块描述文件中的新构造 `uses`\
  \ 来声明模块消费服务。此外，我们还探讨了如何获取 `ServiceLoader`。\n\n我们通过两个示例分别演示了如何定义一个服务消费者与一个服务提供者，以及一个服务消费者与两个服务提供者。\n\
  \n在第七章 7 中，你将学习 Jlink 工具，它允许我们创建仅包含所需模块的自定义运行时镜像。\n\n"
- '# 7. Jlink：Java 链接器


  在整个软件开发过程中，我们可能会遇到需要针对当前操作系统定制 Java 运行时环境（JRE）的情况。其原因多种多样：可能是为了获得更好的性能，或者我们有一些仅能在特定操作系统上运行的自定义库。


  例如，在使用微服务时，我们可能不希望使用整个 JDK，而只需要其中的一部分。微服务通常规模较小，不会使用整个 JDK 中的库。


  Jlink 通过创建针对特定操作系统、仅包含所需模块的自定义 JRE 版本来帮助解决这些问题。


  ## Java 链接器


  Java 9 引入了一个名为 Jlink 的新工具，用于动态链接模块。其作用是将一组模块组装起来，以创建运行时镜像。在组装过程中，可以跨模块边界应用不同的优化。以下章节将介绍执行此类优化的一些方法。


  Jlink 从我们指定的模块开始，递归搜索这些模块描述文件中所有的 `requires` 语句。通过这种方式，Jlink 能够找到所有需要组装到新的自定义运行时镜像中的模块。


  由 Jlink 工具创建的运行时镜像包含所需的最少模块及其依赖项。我们还可以指定要添加到运行时镜像中的模块。最终会生成一个特定于平台的可执行二进制文件。


  Jlink 可以接受以下类型的文件作为输入：


  *   模块化 JAR 文件

  *   JMOD 文件

  *   JAR 文件

  *   类文件


  Jlink 工具的输出可以是以下类型的文件：


  *   JMOD 文件

  *   JAR 文件

  *   JVM 镜像

  *   自定义 JRE


  Jlink 工具可以在链接时生成这四种文件。Jlink 甚至可以创建自定义的 JVM 镜像。图 7-1 展示了 Jlink 工具接受的输入文件类型以及它可以创建的输出文件类型。


  ![A431534_1_En_7_Fig1_HTML.gif](img/A431534_1_En_7_Fig1_HTML.gif)


  图 7-1.


  Jlink 工具的输入和输出文件类型


  Jlink 工具充当代码转换器，运行解析过程以计算创建运行时镜像所需的最小可能模块集。理论上，我们可以创建的最小运行时镜像是一个仅包含基础模块 `java.base`
  的镜像。Jlink 是一个构建时使用的工具，可以进行交叉编译并利用跨模块优化，但它不能创建跨平台的可执行文件。


  你可能会问 Jlink 如何知道我们的目标平台。它是根据我们尝试链接的平台模块类型来确定的。例如，如果我们在 Linux 操作系统上工作，并将模块路径传递给 Windows
  发行版，Jlink 将链接这些模块的 Windows 版本，并创建一个 Windows 运行时镜像。


  注意


  使用 Jlink 时指定的模块路径必须是目标平台的模块。


  使用 Jlink 无需在代码层面进行任何更改。Jlink 将模块组装到自定义运行时镜像中，并且完全不会修改 `module-info.class` 文件。


  ### Jlink 镜像


  Jlink 镜像特定于每个操作系统。它们代表了对 JDK 和 JRE 的定制。我们可以将它们视为仅包含应用程序所需模块的 JRE 自定义运行时镜像。Jlink
  会创建一个可用于运行 Java 应用程序的自定义目录。


  一个 Jlink 镜像包含以下目录：


  *   bin

  *   conf

  *   include

  *   legal

  *   lib

  *   release


  Jlink 还会链接包含指令 `requires static myModule` 的模块。在运行时，如果模块 `myModule` 位于模块路径上，则 `requires
  static` 子句将被满足。如果我们的应用程序仅使用 `java.base` 模块而不使用其他模块，那么我们的自定义运行时镜像将仅包含我们的应用程序模块加上
  `java.base` 模块。


  在本章后续创建自定义运行时镜像时，你将了解更多关于 Jlink 镜像和 Jlink 命令语法的内容。


  ### Jlink 命令语法


  要使用 Jlink 创建自定义运行时镜像，需要将 `jlink` 命令与必要的选项一起使用。图 7-2 展示了此命令的语法及其最重要的选项。


  *   `[jlink_options]` 指定一组用空格分隔的选项。你将在下一节中了解这些选项。

  *   `--module-path` 选项指定 Jlink 工具应发现的模块的位置。这些模块可以是展开的模块、模块化 JAR 文件或 JMOD 文件。

  *   `--add-modules` 选项指定要添加到运行时镜像中的模块名称。指定的模块及其传递依赖项将被添加到运行时镜像中。

  *   `--output` 选项指定创建自定义运行时镜像的目录。


  ![A431534_1_En_7_Fig2_HTML.gif](img/A431534_1_En_7_Fig2_HTML.gif)


  图 7-2.


  jlink 命令的语法


  如前所述，Jlink 工具接收模块路径以指示在哪里查找模块。它通过启动模块解析过程来查找模块，该过程会搜索每个模块的所有传递依赖项，直到到达底层模块 `java.base`。只要我们使用
  `--add-modules` 命令行选项添加一个模块，Jlink 就会搜索其所有 `requires` 和 `requires static` 子句，并将所有相应的依赖模块添加到自定义运行时镜像中。


  注意


  如果我们拥有目标平台的 JMOD 文件，Jlink 工具允许进行交叉链接。




  ### Jlink 命令选项


  Jlink 工具的功能并不仅限于上一节讨论的选项。根据官方 JDK 9 API 规范，它还支持许多其他选项，所有这些选项均列于表 7-1 中。


  表 7-1. Jlink 命令的选项


  | 选项名称 | 描述 |

  | --- | --- |

  | `--help` | 打印帮助信息。 |

  | `--module-path <模块路径>` | 定义模块路径。 |

  | `--limit-modules <模块名称列表>` | 将可观察模块组限制为指定模块的传递闭包中的模块。如果使用 `--add-modules` 选项指定了任何模块，即使这些模块不在
  `--limit-modules` 列表中，它们也会被添加到可观察模块中。如果存在主模块，它也将被添加到可观察模块中。 |

  | `--add-modules <模块名称>` | 指定需要解析的根模块。 |

  | `--output <目录名称>` | 指定生成运行时映像的目录名称。 |

  | `--launcher <命令名称>=<模块名称>` | 指定模块的启动器命令名称。 |

  | `--launcher command=<模块名称>/main` | 指定模块的启动器命令名称以及 `main` 类。 |

  | `--endian <little &#124; big>` | 定义正在生成的运行时映像的字节顺序。 |

  | `--version` | 显示版本信息。 |

  | `--save-opts <文件名>` | 将 Jlink 选项保存到指定文件中。 |

  | `--strip-debug` | 剥离调试信息。 |

  | `--no-man-pages` | 排除 `man` 手册页。 |

  | `--no-header-files` | 排除头文件。 |

  | `--disable-plugin <插件名称>` | 禁用插件。 |

  | `--list-plugins` | 列出所有可通过命令行访问的 Jlink 插件。 |

  | `--ignore-signing-information` | 当签名的模块化 JAR 文件链接到运行时映像时，忽略错误。 |

  | `@<文件名>` | 从作为参数指定的文件中读取所有选项。 |

  | `--bind-services` | 执行完整的服务绑定，并将服务提供者模块及其依赖项链接到运行时映像中。 |

  | `--suggest-providers <服务名称列表>` | 帮助查找实现模块路径中服务类型的提供者。 |

  | `--verbose` | 启用详细跟踪。 |


  ### 链接阶段


  Java 9 引入了一个新的链接阶段。其作用是通过将一组模块及其传递依赖项组合在一起来生成运行时映像。OpenJDK 指出，“链接时是进行全局优化的机会，这些优化在编译时难以实现或在运行时成本高昂。”


  链接是 Java 开发过程中新增的一个开发阶段。务必记住，链接阶段是可选的——如果你不想或不需要使用它，可以不使用。


  在 Java 9 中，当我们拥有模块化应用程序时，可以使用链接。生成的映像与平台无关。链接器可以链接两个或多个目标——例如，如果你使用的是操作系统 A，只要你的模块路径拥有操作系统
  B 的模块而不是操作系统 A 的模块，你就可以成功地为操作系统 B 生成目标映像。但无法将 WAR 文件链接在一起。


  ### jdk.jlink 模块


  图 7-3 显示了包含 jdk.jlink 模块及其依赖项的模块图。


  ![A431534_1_En_7_Fig3_HTML.gif](img/A431534_1_En_7_Fig3_HTML.gif)


  图 7-3. 内部模块 jdk.jlink 的模块图


  jdk.jlink 模块在 tools 目录中包含不同的 Java 类。在 tools 目录下有一个 jimage 目录、一个 jlink 目录和一个 jmod
