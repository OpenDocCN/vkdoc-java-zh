  \ | jdk.jdwp.agent |   |\n\n表 3-2 包含了每个标准 Java SE 模块的简短描述，如 JDK 9 API 文档所述。\n\n\
  表 3-2.\n\n根据 Java 平台标准版 9 API 规范的标准化模块\n\n| 模块名称 | 描述 |\n| --- | --- |\n| java.activation\
  \ | 表示 JavaBeans 激活框架 API |\n| java.base | 表示 Java SE 平台的主要 API |\n| java.compiler\
  \ | 表示注解处理、语言模型和 Java 编译器 API |\n| java.corba | 定义 RMI-IIOP API 和 OMG CORBA API\
  \ |\n| java.datatransfer | 定义用于在应用程序之间交换信息的 API |\n| java.desktop | 包含 AWT 和 Swing\
  \ 用户界面工具包，以及用于打印、音频、成像等的 API |\n| java.instrument | 包含允许代理对在 Java 虚拟机上执行的程序进行检测的服务\
  \ |\n| java.logging | 表示 Java 日志记录 API |\n| java.management | 表示 Java 管理扩展 API |\n\
  | java.management.rmi | 表示 Java 管理扩展 API 的 RMI 连接器 |\n| java.naming | 包含 Java 命名和目录接口\
  \ API |\n| java.prefs | 指定首选项 API |\n| java.rmi | 包含远程方法调用 API |\n| java.scripting\
  \ | 表示脚本 API |\n| java.se | 表示核心 Java SE API |\n| java.se.ee | 表示 Java SE 平台的完整\
  \ API |\n| java.security.jgss | 包含通用安全服务 API 的 Java 绑定 |\n| java.security.sasl |\
  \ 包含 Java 对简单身份验证和安全层的支持 |\n| java.sql | 表示 Java 数据库连接 API |\n| java.sql.rowset\
  \ | 定义 JDBC RowSet API |\n| java.transaction | 指定 Java 事务 API 的一个子部分 |\n| java.xml\
  \ | 包含用于 XML 处理的 Java API、用于 XML 的流式 API、用于 XML 的简单 API 以及 W3C 文档对象模型 API |\n| java.xml.bind\
  \ | 表示用于 XML 绑定的 Java 架构 API |\n| java.xml.crypto | 描述 XML 加密 API |\n| java.xml.ws\
  \ | 指定 Web 服务元数据 API 和基于 XML 的 Web 服务的 Java API |\n| java.xml.ws.annotation | 指定\
  \ Commons Annotations API 的一部分，以支持在 Java SE 平台上运行的程序 |\n\n## 平台模块\n\nJCP 团队在 Java\
  \ 平台模块化方面投入了大量精力。最困难的任务是调查和评估库不同部分之间的依赖关系，并将 JDK 中的所有类拆分并放入模块中。\n\n平台模块是拆分 JDK 后产生的模块。它们完全取代了单一的\
  \ JDK，并使我们能够创建自定义运行时映像。这些映像可以由一个特定配置组成，该配置包含一个模块子集及其传递依赖项。这个模块子集可以表示一个模块或多个模块。它也可以表示所有模块，这相当于整个\
  \ JDK。还可以将平台模块与我们自己创建的模块组合在一起，以形成运行时映像。\n\n每个模块都有确定的功能，并且可以定义对其他模块的依赖关系。平台模块是 Java\
  \ 运行时的一部分，并包含源代码。平台模块能够导出其包，以便其他读取它们的模块可以访问这些包。当我们一般性地谈论模块时，我们不仅指平台模块，也指应用程序程序员创建的模块。这些模块没有特殊的定义。为了将它们与默认属于平台一部分的模块（即平台模块）明确区分开来，我们可以称它们为“开发者模块”或“程序员模块”。\n\
  \n有两种不同类型的平台模块：标准模块和非标准模块。\n\n### 标准模块\n\n标准模块由 Java 社区流程（JCP）管理。标准 Java SE 模块的名称以\
  \ `java.*` 开头。这些名称足够明确，因此很容易想象模块的作用。例如，名为 `java.rmi` 的模块定义了远程方法调用 API，而名为 `java.logging`\
  \ 的模块定义了 Java 日志记录 API。标准模块可以包含标准 API 包以及非标准 API 包。它也可以依赖于一个或多个非标准模块。\n\n\n\n###\
  \ 非标准模块\n\n非标准模块是 JDK 特有的。它们的名称以 `jdk.*` 开头。非标准模块包含特定的 JDK 包和代码，这些内容在不同 Java 开发工具包实现之间可能有所不同。某些\
  \ JDK 模块（例如工具或服务提供者模块）不导出任何内容，这意味着它们在模块外部不可见。\n\n有两件事非常重要，需要牢记：首先，标准 API 包不得由非标准模块导出，因此它们对外部保持隐藏。其次，也是最重要的一点，仅依赖\
  \ Java SE 模块的源代码将仅依赖标准的 Java SE 类型。这是一个巨大的优势，因为正如 JEP 200 官方描述（参见 [`http://openjdk.java.net`](http://openjdk.java.net)）所述，这样的代码可以移植到\
  \ Java SE 平台的所有现有实现上。\n\n将 JDK 特有的 API 转变为 Java 标准 API 是可行的，但需要特别关注兼容性问题。在考虑这样做时，你应该通过观察其使用方式来评估其可行性和必要性。例如，Java\
  \ 调试接口之所以没有成为标准 API，是因为它仅被工具和调试器使用，因此将其提升为 Java 标准 API 的一部分显然没有意义。\n\n每个平台模块在名为\
  \ `share` 的文件夹内都包含一个名为 `classes` 的文件夹。`classes` 文件夹包含了组成该模块的所有类，以及一个名为 `module-info.java`\
  \ 的模块描述符文件。某些模块，例如 `java.base` 模块，包含针对不同操作系统（如 Windows、Linux、macOS 等）的原生代码。\n\n\
  ## JDK 模块图\n\nJava 9 平台的模块化可以很好地用模块图来表示。图 3-1 展示了 JDK 新模块图的一个片段，其中仅包含标准的 SE 模块。这是在将\
  \ JDK 拆分为模块后得到的结果。\n\n![A431534_1_En_3_Fig1_HTML.gif](img/A431534_1_En_3_Fig1_HTML.gif)\n\
  \n图 3-1.\n\nJDK 9 模块图的一部分，仅表示标准 SE 模块\n\n此图中仅显示了标准的 Java SE 模块（由于空间限制，非 Java SE\
  \ 模块未显示）。在图中，模块由节点表示，模块之间的依赖关系用箭头表示。如果一个模块依赖于另一个模块，则存在一个从该模块指向另一模块的直接箭头。\n\n模块之间的连线分为两类。实线表示模块之间存在隐式可读性，虚线表示模块之间仅存在简单可读性，而没有隐式可读性。但在这两种情况下，模块都读取了另一个模块，这意味着该模块依赖于另一个模块。例如，`java.transaction`\
  \ 模块和 `java.rmi` 模块之间有一条实线。这意味着 `java.transaction` 模块 `requires transitive` `java.rmi`\
  \ 模块。`java.xml.ws` 模块和 `java.xml.ws.annotation` 模块之间也有一条虚线，这意味着 `java.xml.ws` 模块\
  \ `requires` `java.xml.ws.annotation` 模块。换句话说，`java.xml.ws` 模块使用了 `java.xml.ws.annotation`\
  \ 模块中的类型。\n\n该图是层次化的且清晰，没有循环，也不包含拆分包。它没有循环依赖，因为这是不允许的。`java.base` 模块位于图的底部。它不依赖于任何其他模块。所有其他模块都直接或间接依赖于\
  \ `java.base` 模块（由于空间限制，未在模块图中显示）。因此，只有那些仅依赖 `java.base` 而不依赖其他模块的模块，才有指向 `java.base`\
  \ 模块的连线。对于除了 `java.base` 之外还至少需要一个其他模块的模块，则没有指向 `java.base` 模块的连线。\n\n`java.se.ee`\
  \ 模块位于模块图的顶部。它充当一个聚合器模块，不仅包含所有 Java SE 模块，还包含与 Java EE 规范重叠的模块。`java.se.ee` 模块本身不添加任何内容。它只有一个模块描述符，用于收集以下模块的内容：\n\
  \n*   `java.se` 模块\n*   `java.activation` 模块\n*   `java.xml.ws.annotation` 模块\n\
  *   `java.corba` 模块\n*   `java.transaction` 模块\n*   `java.xml.bind` 模块\n*   `java.xml.ws`\
  \ 模块\n\n在第 4 章中，我们将展示什么是模块描述符。`java.se.ee` 模块包含所有 Java SE API。与 `java.se.ee` 模块相比，`java.se`\
  \ 模块是一个聚合器，它包含 Java SE 中不与 Java EE 重叠的部分。`java.se` 模块收集了以下模块的内容：`java.datatransfer`、`java.logging`、`java.sql`、`java.instrument`、`java.security.jgss`、`java.security.sasl`、`java.prefs`、`java.xml.crypto`、`java.rmi`、`java.xml`、`java.naming`、`java.compiler`、`java.desktop`、`java.scripting`、`java.management.rmi`、`java.sql.rowset`、`java.management`\
  \ 和 `java.base`。\n\n注意\n\n图 3-1 中的模块图仅显示了标准 SE 模块。非标准 SE 模块（名称以 `jdk.*` 开头）、Java\
  \ FX 模块（名称以 `javafx.*` 开头）和 Oracle 模块（名称以 `oracle.*` 开头）未在此模块图中显示。\n\n## 更多关于模块的内容\n\
  \n现在我们将学习如何读取模块的描述，并介绍 `java.base` 模块。\n\n\n\n### 读取模块描述\n\n要获取某个模块的完整描述，我们可以使用\
  \ Java 启动器的 `--describe-module` 命令行选项，后跟模块名称：\n\n```\n$ java --describe-module \n\
  ```\n\n对 `java.naming` 模块运行 `--describe-module` 选项后，会得到以下输出：\n\n```\njava.naming@9\n\
  exports javax.naming\nexports javax.naming.directory\nexports javax.naming.event\n\
  exports javax.naming.ldap\nexports javax.naming.spi\nrequires java.base mandated\n\
  requires java.security.sasl\nuses javax.naming.spi.InitialContextFactory\nuses javax.naming.ldap.StartTlsResponse\n\
  provides java.security.Provider with sun.security.provider.certpath.ldap.JdkLDAP\n\
  qualified exports com.sun.jndi.toolkit.ctx to jdk.naming.dns\nqualified exports\
  \ com.sun.jndi.toolkit.url to jdk.naming.dns jdk.naming.rmi\ncontains com.sun.jndi.ldap\n\
  contains com.sun.jndi.ldap.ext\ncontains com.sun.jndi.ldap.pool\ncontains com.sun.jndi.ldap.sasl\n\
  contains com.sun.jndi.toolkit.dir\ncontains com.sun.jndi.url.ldap\ncontains com.sun.jndi.url.ldaps\n\
  contains com.sun.naming.internal\ncontains sun.security.provider.certpath.ldap\n\
  ```\n\n上述代码显示了 `java.naming` 模块的 `module-info.java` 文件中包含的全部信息。此外，它还包含了 `contains`\
  \ 子句，这些子句在 `module-info.java` 文件中并未显示：\n\n*   `exports` 语句表示 `java.naming` 模块将 `javax.naming`、`javax.naming.directory`、`javax.naming.event`、`javax.naming.ldap`\
  \ 和 `javax.naming.spi` 这些包提供给任何依赖于它的其他模块（即依赖于 `java.naming` 模块的模块）。\n*   上述代码中的\
  \ `requires` 语句表示 `java.naming` 模块依赖于 `java.base` 模块以及 `java.security.sasl` 模块，这意味着这两个模块中导出的类型在\
  \ `java.naming` 模块内部被使用。例如，`java.naming` 模块中的 `LDAPCertStore` 类导入了属于 `java.security.sasl`\
  \ 模块的所有 `java.security` 子包。\n*   `uses` 语句将一个表示服务类型的类型名称作为参数。在我们的例子中，`java.naming`\
  \ 模块消费了 `InitialContextFactory` 和 `StartTlsResponse` 的实例。\n*   `provides` 语句指定该模块使用\
  \ `sun.security.provider.certpath.ldap.JdkLDAP` 来提供 `java.security.Provider`（来自\
  \ `java.base` 模块）的实现。\n*   语句 `qualified exports com.sun.jndi.toolkit.url to jdk.naming.rmi`\
  \ 意味着 `java.naming` 模块中的 `com.sun.jndi.toolkit.url` 包仅应在 `jdk.naming.rmi` 模块中可访问。如果我们查看\
  \ `jdk.naming.rmi` 模块，会发现其中有一个名为 `rmiUrlContext` 的类，它从 `java.naming` 模块导入了 `com.sun.jndi.toolkit.url.GenericURLContext`\
  \ 类。这就是为什么 `java.naming` 模块需要指定将该包导出到 `jdk.naming.rmi` 模块。\n*   `contains` 子句列出了模块中不属于标准\
  \ API 的所有包。\n\n第 4 章详细解释了 `exports`、`requires`、`uses` 和 `provides` 子句的含义及其使用方法。\n\
  \n### java.base 模块\n\n`java.base` 拥有超过 5600 个类，大小超过 43 MB，是 Java 平台模块系统中最大的模块之一。每个模块默认都依赖于\
  \ `java.base`，因为 `java.base` 模块位于模块图的底部，代表了系统的核心。\n\n`java.base` 模块包含核心 API 并封装了\
  \ Java 运行时。模块不必显式声明它依赖于 `java.base` 模块，因为它是自动依赖的。编写 `requires java.base` 是允许的，但并非必要，因为编译器默认会插入它。\n\
  \n`java.base` 模块包含以下包：\n\n*   java.io\n*   java.lang.*\n*   java.math\n*   java.net.*\n\
  *   java.nio.*\n*   java.security.*\n*   java.text.*\n*   java.time.*\n*   java.util.*\n\
  *   javax.crypto.*\n*   javax.net.*\n*   javax.security .*\n\n注意\n\n我使用 * 来表示该包及其所有对应的子包。\n\
  \n`java.base` 模块代表了模块系统的根，因为它包含了诸如 `java.lang.Object`、`java.lang.Class`、`java.lang.String`、`java.lang.System`\
  \ 等类，以及像 `java.lang.reflect.Constructor` 和 `java.lang.reflect.Method` 这样的反射类。\n\n\
  所有 Java 平台包都由 `java.base` 模块导出，这意味着它们可以被任何其他模块访问：\n\n```\n// module-info.java (module\
  \ java.base)\nmodule java.base {\nexports java.io;\nexports java.lang;\nexports\
  \ java.lang.module;\n...\n...\nexports java.text;\nexports java.time;\nexports java.util;\n\
  exports javax.net;\n}\n```\n\n`java.base` 模块，被称为系统的基模块，不依赖于任何其他模块。我们说它没有对其他模块的依赖关系，这意味着它的\
  \ `module-info.java` 文件不包含任何 `requires` 子句。`java.base` 模块还包含了 JDK 9 中引入的新包 `java.lang.module`，它是新模块\
  \ API 的一部分。第 9 章涵盖了 `java.lang.module` 包。同样重要的是要记住，`java.base` 不是一个聚合器模块。\n\n在某些情况下，`java.base`\
  \ 可能是你编译和运行一个简单 Java 应用程序所需的唯一模块。如果你需要的所有类型都包含在 `java.base` 模块的包中，那么你只需要 `java.base`。由于\
  \ `java.base` 不依赖于其他模块，因此不需要与 `java.base` 一起使用任何其他模块。这是一个巨大的优势，因为在 JDK 9 之前，我们必须使用整个\
  \ JDK，因为即使是像 `java.lang.Object` 这样的简单类，以前也必须与大量类一起使用。一个模块还包含一个名为 `module-info.java`\
  \ 的新文件，它代表了模块描述符，第 4 章对此进行了详细描述。\n\n此外，`java.base` 包含了许多 JDK 内部包，例如 `jdk.internal.util`、`sun.io`、`sun.text`、`sun.util`、`com.sun.crypto.provider`、`com.sun.net.ssl`\
  \ 等等。\n\n注意\n\n使用带有 `--describe-module java.base` 选项的 Java 启动器，可以找出与 `java.base`\
  \ 模块描述符相关的所有可用信息。\n\n我们已经了解了 JDK 是如何被模块化的，以及模块图的样子。在下一节中，你将学习源代码的模块化。\n\n## 模块化源代码\n\
  \n根据 Open JDK 的说法，JEP 200 的作用是将 JDK 划分为一组模块，而 JEP 201 的作用是“将 JDK 中的源代码重新组织成模块，增强构建系统以编译模块，并在构建时强制执行模块边界。”JDK\
  \ 中源代码的布局被完全改变，并被模块所取代。一个模块的全部源代码现在都位于一个单独的目录中。因此，在 JDK 9 中，我们有了一个新的源代码方案，这正是本节的重点。\n\
  \n\n\n### 源代码的新方案\n\n图 3-2 展示了 JDK 中源代码的新方案。\n\n![A431534_1_En_3_Fig2_HTML.gif](img/A431534_1_En_3_Fig2_HTML.gif)\n\
  \n图 3-2.\n\nJDK 9 源代码的新方案\n\nJDK 的 src 目录包含一系列代表模块名称的目录。每个模块都有自己的目录。这些目录的模块名称以 `java.*`\
  \ 或 `jdk.*` 开头，代表模块的名称。\n\n每个模块目录都包含一个 `share` 目录，其中包含跨平台源代码。此外，模块目录还可以包含其他与操作系统相关的目录，例如\
  \ `aix`、`linux`、`macosx`、`solaris`、`unix` 和 `windows`。这些目录仅包含与单个操作系统相关的源代码。并非所有模块都包含上述所有操作系统目录。有些模块包含所有操作系统的特定源代码（例如\
  \ `java.base` 或 `java.desktop`），或者仅包含部分操作系统的源代码。例如，`java.prefs` 模块仅包含三个操作系统目录：`macosx`、`unix`\
  \ 和 `windows`——这意味着该模块内部没有任何特定于 Linux 或 Solaris 的源代码。\n\n注意\n\n像 `java.se.ee` 和\
  \ `java.se` 这样的聚合模块没有任何特定于操作系统的源代码，因为它们的目录内没有任何源代码。\n\n模块内的下一级目录包含名为 `classes`、`conf`、`lib`、`native`\
  \ 和 `doc` 的目录。除了 `conf` 目录，其他四个目录在 JDK 8 的 `share` 目录下也能找到。\n\nJDK 9 中的 `classes`\
  \ 目录由 Java 源文件组成，这些文件被分组到指定其包结构的目录中。我们想指出与 JDK 8 的两个主要区别：首先，在 JDK 9 中，每个现有模块都有一个\
  \ `classes` 目录。即使是聚合模块也有一个 `classes` 目录。其次，在 JDK 9 中，`module-info.java` 文件位于 `classes`\
  \ 目录的根目录下。`module-info.java` 文件代表模块描述符，是在 Java 9 中引入的。每个模块在其 `classes` 目录内都有一个 `module-info.java`\
  \ 文件。`classes` 目录可以包含 `java`、`javax`、`jdk`、`sun`、`com` 或 `org` 目录，具体取决于其中包含的包。\n\
  \n`conf` 目录包含配置文件，这些文件可能是属性文件、安全策略文件、策略文件等。这是一个在 JDK 8 中不存在的新目录。\n\n`lib` 目录仅存在于\
  \ `java.base` 中，并在 `share`、`solaris` 和 `windows` 目录中包含 `default.policy` 文件。\n\n\
  `native` 目录包含 C 和 C++ 源文件、原生类和过程。它可以包含以下一些目录：`include`、`launcher`、`common`、`libfdlibm`、`libjava`、`libjimage`、`libjli`、`libnet`、`libnio`、`libverify`、`libzip`\
  \ 等。根据 Open JDK 的说法，这些目录的名称“对应于编译后的代码将链接到的共享库的名称”。`include` 文件夹是此规则的一个例外，因为它包含 C/C++\
  \ 头文件。\n\n注意\n\n`classes` 和 `native` 目录在 JDK 9 中没有重命名，因为这样做可能会造成混淆并减缓 JDK 9 的采用速度。\n\
  \n表 3-3 显示了 Java 中一些最重要的类现在所在的位置。\n\n表 3-3.\n\n一些最重要的 Java 类的位置\n\n| 类名 | 位置 |\n\
  | --- | --- |\n| java.lang.Object | src / java.base / share / classes / java / lang\
  \ |\n| java.lang.String | src / java.base / share / classes / java / lang |\n| java.lang.Exception\
  \ | src / java.base / share / classes / java / lang |\n| java.lang.Class | src /\
  \ java.base / share / classes / java / lang |\n| java.util.ArrayList | src / java.base\
  \ / share / classes / java / util |\n| java.util.Date | src / java.base / share\
  \ / classes / java / util |\n| java.io.File | src / java.base / share / classes\
  \ / java / io |\n| java.net.URL | src / java.base / share / classes / java / net\
  \ |\n| java.text.Format | src / java.base / share / classes / java / text |\n| java.util.logging.Logger\
  \ | src / java.logging / share / classes / java / util / logging |\n| java.sql.DriverManager\
  \ | src / java.sql / share / classes / java / sql |\n\n注意\n\n正如你在表 3-3 中所见，最重要和最常用的\
  \ Java 类位于 `java.base` 模块（基础模块）中。\n\n下一小节将描述 JDK 9 中源代码的新结构。\n\n### 源代码结构对比\n\n\
  以下是 JDK 8 和 JDK 9 中源代码结构的简短对比。在 JDK 8 中，源代码结构如下所示：\n\n```\njdk / src / share / {back;\
  \ bin; classes; demo; doc; instrument; javavm; lib; native; npt; sample; transport}\n\
  ```\n\n在 JDK 9 中，源代码结构如下所示：\n\n```\njdk / src / <模块名称> / share / {classes; conf;\
  \ lib; native; doc}\n```\n\n如你所见，在 `src` 和 `share` 目录之间增加了一个包含模块名称的中间目录。JDK 8 和\
  \ 9 之间的另一个重要区别是，在 JDK 9 中，每个模块的每个 `classes` 目录的根级别都有一个 `module-info.java` 文件。在 JDK\
  \ 9 中，`classes` 目录及其子目录下仅包含属于相应模块的包和类。在 JDK 8 中，`classes` 目录及其子目录包含构成 Java 平台的所有包和类。\n\
  \n\n\n### 构建流程调整\n\n不仅源代码，构建过程本身也是围绕模块组织的。现在有了新的提议布局和新的构建目标。与之前的版本相比，Java 9 在构建过程中产生的输出有所不同。构建过程已更改，以便将所有内容构建为模块。除此之外，make\
  \ 文件已被拆分为特定于模块的文件。\n\n表 3-4 展示了 JDK 9 中构建系统的新结构，并与 JDK 8 中的结构进行了对比。\n\n表 3-4.\n\n\
  JDK 8 与 JDK 9 构建系统结构对比\n\n| JDK 8 构建系统结构 | JDK 9 构建系统结构 |\n| --- | --- |\n| jdk\
  \ / classes / *.class | jdk / modules / <module_name> / *.class |\n\n表 3-5 列出了用于构建\
  \ JDK 9 的目标命令及其描述。这些内容在官方 JDK 9 API 规范中有详细说明。\n\n表 3-5.\n\n用于构建 JDK 9 的目标命令\n\n\
  | 目标命令 | 描述 |\n| --- | --- |\n| `make java` | 编译系统中的所有 Java 类 |\n| `make java.sql`\
  \ | 编译 java.sql 模块中的 Java 代码及其原生代码，以及其所有依赖项 |\n| `make java.sql-java` | 仅编译 java.sql\
  \ 模块中的 Java 类及其所有依赖项 |\n| `make [default]` | 编译所有内容 |\n| `make all` | 构建所有内容（JAR、文档、镜像等），并在\
  \ Java 类上执行验证工具以查找损坏的模块边界 |\n| `make images` | 功能与 JDK 8 相同 |\n| `make hotspot`\
  \ | 功能与 JDK 8 相同 |\n| `make docs` | 构建完整的文档 |\n| `make docs-javadocs` | 仅构建 javadoc\
  \ |\n| `make gensrc` | 执行所有涉及源代码生成的步骤 |\n\n一次只编译一个模块的前景是构建系统最重要的变化之一。一个模块可以与其依赖项一起编译，编译后的类被划分到各个模块中。在构建过程中，相互独立的模块可以同时编译。如果违反了模块边界，构建过程将不会成功。\n\
  \n第一个被编译的模块是 java.base 模块，因为所有其他模块都需要它。在编译期间，模块图会以相反的顺序（从底部到顶部）进行遍历。这是有道理的，因为通过从\
  \ java.base 开始依次向上编译到模块图的顶部，我们可以避免编译一个依赖于尚未编译模块的模块的情况。\n\n注意\n\n能够编译模块的一个巨大优势在于，JAX-WS、JAXP\
  \ 和 CORBA 仓库中的源代码现在可以使用新的 Java 语言 API。在 Java 9 之前的版本中，这是不可能的，因为这些仓库是在 JDK 仓库之前编译的。\n\
  \nJCP 团队对构建系统进行了重大修改，以便模块能够独立构建。例如，对 java.logging 模块的更改不会导致 java.base 模块的重新构建。这是一项巨大的成就，因为它提高了生产力。\n\
  \n## 总结\n\n本章涵盖了 Java 平台模块系统中两个最重要的 JEP：模块化 SDK 和模块化源代码。\n\n首先，我们展示了如何使用 `--list-modules`\
  \ 命令行选项列出 Java 运行时系统的所有模块。然后，我们简要解释了属于 Java 平台标准版 9 API 规范的标准模块。我们解释了什么是平台模块，并讨论了构成\
  \ Java 平台模块系统的标准和非标准模块的特性。我们还展示了 JDK 模块化后产生的新 JDK 模块图。并且，我们展示了如何使用 `--describe-module\
  \ <module_name>` 命令行选项获取 java.naming 模块的模块描述符的完整内容。第一部分末尾讨论了 java.base 模块，它是 Java\
  \ 平台模块系统中最重要的模块。\n\n本章的第二部分重点描述了由于 JEP 201（模块化源代码）的实现而在源代码层面进行的更改。我们首先介绍了 JDK 9\
  \ 源代码的新方案，然后描述了源代码是如何组织到目录中的，以及每个目录代表什么。我们指出了 JDK 8 和 JDK 9 在源代码布局上的差异。本章最后讨论了构建系统是如何增强的，以满足新引入的模块（这些模块现在是\
  \ Java 平台的一等组件）的要求。\n\n第 4 章将解释什么是模块，并展示如何定义和使用你自己的模块。\n\n"
- "# 4. 定义和使用模块\n\n在本章中，我们将开始使用 Project Jigsaw 提供的一些特性来开发 Java 9 中的模块化应用程序。我们将首先解释\
  \ Jigsaw 模块的新概念及其模块声明文件 module-info.java。你还将学习可以在模块声明中使用的五种类型的指令：`requires`、`exports`、`uses`、`provides`\
  \ 和 `opens`。然后，我们将介绍如何使用 JDK 9 编译和运行模块，为此我们将详细引入新的模块路径。\n\n本章还涵盖了 Java 9 中引入的可访问性更改。这些更改对平台影响巨大，因为它们几乎完全不同于\
  \ Java 之前存在的旧可访问性规则。在 Java 9 中，我们可以拥有更多类型的模块：普通模块、自动模块、命名模块、可观察模块、开放模块和未命名模块。本章将简要介绍每一种模块。\n\
  \n## 模块的概念\n\n正如你现在所知，Java 9 引入了一种称为模块的新型一等组件。Jigsaw 模块也是 Java 9 平台的基本组成部分，它代表了一个包的容器。它包含包、资源文件和原生代码。这些包可以包含\
  \ Java 类、枚举和接口。\n\n图 4-1 展示了模块的通用结构。\n\n![A431534_1_En_4_Fig1_HTML.gif](img/A431534_1_En_4_Fig1_HTML.gif)\n\
  \n图 4-1.\n\n模块的通用结构\n\n一个模块由源文件以及由 module-info.java 文件表示的模块声明组成。以下是一个名为 com.apress.moduleA\
  \ 的模块的典型目录结构：\n\n```\nsrc/\ncom.apress.moduleA/\nmodule-info.java\ncom/apress/moduleA/\n\
  Main.java\n// 其他文件\n```\n\n一个与模块名称同名的目录位于最顶层。其内部是 module-info.java 文件以及代表包格式的目录结构。在我们的例子中，包名与模块名相同。.java\
  \ 文件位于包的目录内。\n\n注意\n\n也可以定义一个没有源文件且没有包（除了模块描述符 module-info.java）的模块。\n\n我们提到了模块声明\
  \ module-info.java。在下一小节中，你将了解它。\n\n\n\n### 模块声明\n\n每个模块都有一个模块声明，位于一个名为 `module-info.java`\
  \ 的特殊新文件中，该文件位于目录的顶层。要在 Java 9 中定义一个模块，我们创建 `module-info.java` 文件，并在其中放入新的关键字 `module`，后跟模块名称以及用花括号括起来的模块声明。\n\
  \n声明模块简单直接。在此示例中，一个名为 `com.apress.moduleA` 的模块在 `module-info.java` 文件中被声明：\n\n```\n\
  module com.apress.moduleA {}\n```\n\n在这种情况下，模块声明除了模块标题外不包含任何内容。模块 `com.apress.moduleA`\
  \ 不依赖任何模块，也不导出任何包，并且不提供或消费任何服务。\n\n如前所述，每个模块必须有一个模块声明，因此必须包含一个自己的 `module-info.java`\
  \ 文件。无论它是平台模块还是开发者创建的模块，此规则都适用。如果缺少 `module-info.java` 文件，Java 编译器不会将源代码视为模块。`module-info.java`\
  \ 文件的编译方式与 Java 文件完全相同。\n\n如果我们将 `module-info.java` 文件重命名为其他名称，编译器会将该文件解释为普通文件，而不是模块描述符。在这种情况下，模块系统将无法再识别该模块。\n\
  \n注意\n\n为了将源代码移入模块，模块描述符是强制性的。否则，源代码将不属于模块的一部分。\n\n让我们描述一些情况，看看我们可以在 `module-info.java`\
  \ 文件中放入什么，以及不能放入什么。`module-info.java` 除了模块定义之外不能包含任何内容。Java 编译器可以识别模块声明中的语法错误。\n\
  \n如果模块声明不在 `module-info.java` 文件中，Java 编译器将显示以下错误消息，并且编译将失败：\n\n```\nError: module\
  \ declarations should be in a file named module-info.java\n```\n\n不能将 Java 类放入 `module-info.java`\
  \ 文件中来代替模块。如果尝试这样做，编译也会失败：\n\n```\nerror: cannot access module-info\nbad source\
  \ file: src\\com.apress.moduleA\\module-info.java\nfile does not contain module\
  \ declaration\nPlease remove or make sure it appears in the correct subdirectory\
  \ of the sourcepath.\n```\n\n除此之外，尝试在单个 `module-info.java` 文件中编写两个模块声明也会导致编译错误。正如我们在前面示例中已经观察到的，Java\
  \ 编译器会给出关于错误原因和位置的具体指示。这样，我们可以直接定位到产生问题的代码行并提供修复。\n\n`module-info.java` 模块描述符与源代码一起编译。结果会生成\
  \ `.class` 文件，包括一个 `module-info.class` 文件。所有这些编译后的文件都可以打包成一个模块化 JAR 文件（我们将在本章后面介绍模块化\
  \ JAR 文件）。编译器像处理任何其他 Java 文件一样处理 `module-info.java`，并将其转换为一个 `module-info.class`\
  \ 文件，我们可以将其放入 JAR 文件中。结果就是一个模块化 JAR。\n\n注意\n\n`module-info.java` 文件的名称是由 JCP 团队根据已有的\
  \ `package-info.java` 文件名称选择的。即使其名称定义中包含非法的 Java 标识符（短横线），编译器也可以使用 `module-info.java`\
  \ 文件。\n\n平台模块默认包含一个 `module-info.java` 文件。如果我们创建自己的模块，在大多数情况下，我们必须自己创建并编写 `module-info.java`\
  \ 文件的内容。但在两种情况下，我们不需要自己编写 `module-info.java` 文件：\n\n*   当我们将 JAR 文件放在模块路径上时，会自动生成一个\
  \ `module-info.java` 文件。\n*   当我们使用 JDeps 工具和选项 `--generate-module-info` 为特定的 JAR\
  \ 文件自动生成 `module-info.java` 文件时。\n\n如果模块路径和 JDeps 等概念对您来说不熟悉，请不要担心。您将在本书后面了解它们是什么。\n\
  \n#### 模块名称\n\n为模块指定名称是强制性的。同一代码库中的两个模块不能具有相同的名称。良好的实践是像命名包一样命名我们的模块：使用反向的域名。因此，模块名称可以是其导出包名称的前缀，但我们可以随意命名模块，因为对模块名称的格式没有任何限制。尽管如此，模块名称必须符合\
  \ Java 中标识符的一般规则。模块可以与 Java 类或接口同名，因为模块名称拥有自己的命名空间。\n\n注意\n\n此规则有一个例外：当同时编译多个模块时，模块名称必须与模块描述符\
  \ `module-info.java` 所在的目录名称相同。\n\n在模块声明内部，我们总共可以有五种类型的子句，接下来将讨论这些子句。\n\n#### 五种类型的子句\n\
  \n一个模块声明最多可以由五种类型的子句组成：\n\n*   `requires` 子句指定当前模块所依赖的模块。\n*   `exports` 子句指定当前模块导出的包。\n\
  *   `provides` 子句指定当前模块提供的服务实现。\n*   `uses` 子句指定当前模块消费的服务。\n*   `opens` 子句指定当前模块为深度反射开放的包。\n\
  \n表 4-1 描述了这五种子句的语法。\n\n表 4-1. 模块描述符中的五种子句\n\n| 指令关键字 | 描述 |\n| --- | --- |\n| `requires\
  \ <module_name>` | 表示当前模块依赖哪些其他模块。 |\n| `exports <package_name>` `(to <module_name>)`\
  \ | 表示当前模块中的哪些包被导出到模块外部。可选的 `to` 子句列出了包被导出到的模块。 |\n| `opens <package_name>` | 使\
  \ `<package_name>` 在运行时可用于深度反射。 |\n| `provides <service_name> with <service_name_implementation>`\
  \ | 指定当前模块使用 `<service_name_implementation>` 提供 `<service_name>` 的实现。 |\n| `uses\
  \ <service_type>` | 指定当前模块消费 `<service_type>` 的实例。 |\n\n本章仅涵盖前三个子句：`requires`、`exports`\
  \ 和 `opens`。最后两个子句 `provides` 和 `uses` 将在第 6 章中介绍，因为它们与服务相关。\n\n接下来，让我们详细探讨模块声明中通常使用的最常见的子句：`requires`\
  \ 子句和 `exports` 子句。\n\n\n\n#### requires 子句\n\n`requires` 子句用于模块声明（module-info.java）内部，用以指明当前模块为了满足其依赖关系而需要使用的其他模块。它用于表达模块的依赖关系。\n\
  \n图 4-2 展示了 `requires` 子句的语法。\n\n![A431534_1_En_4_Fig2_HTML.gif](img/A431534_1_En_4_Fig2_HTML.gif)\n\
  \n图 4-2.\n\nrequires 子句的语法\n\n该语法简洁明了。`requires` 指令指定了其所依赖的模块名称，后跟一个分号。在模块声明的大括号内，我们可以放置一个或多个\
  \ `requires` 子句，每个子句后跟模块的名称。\n\n在以下示例中，模块 com.apress.moduleA 需要两个模块：模块 com.apress.moduleB\
  \ 和模块 com.apress.moduleC：\n\n```\nmodule com.apress.moduleA {\nrequires com.apress.moduleB;\n\
  requires com.apress.moduleC;\n}\n```\n\n在此示例中，使用 `requires` 子句表达了两个依赖关系。模块 com.apress.moduleA\
  \ 依赖于模块 com.apress.moduleB，同时也依赖于模块 com.apress.moduleC。在这种情况下，我们说模块 com.apress.moduleA\
  \ 需要（或读取）模块 com.apress.moduleB，并且需要（或读取）模块 com.apress.moduleC。\n\n图 4-3 展示了一个说明这些依赖关系的模块图。\n\
  \n![A431534_1_En_4_Fig3_HTML.gif](img/A431534_1_En_4_Fig3_HTML.gif)\n\n图 4-3.\n\n\
  表达三个模块之间依赖关系的模块图\n\n在模块图中，有一条从模块 com.apress.moduleA 指向模块 com.apress.moduleB 的箭头，也有一条指向模块\
  \ com.apress.moduleC 的箭头。模块 com.apress.moduleB 和模块 com.apress.moduleC 之间没有箭头，因为这两个模块之间没有依赖关系。箭头的方向很直接：从\
  \ com.apress.moduleA 指向 com.apress.moduleB，因为模块 com.apress.moduleA 读取模块 com.apress.moduleB，反之则不成立。\n\
  \n模块 com.apress.moduleA 依赖于模块 com.apress.moduleB 和模块 com.apress.moduleC 意味着什么？这意味着模块\
  \ com.apress.moduleA 使用了属于模块 com.apress.moduleB 和模块 com.apress.moduleC 的类型。由于模块\
  \ com.apress.moduleA 使用了来自这些模块的类型，因此它依赖于它们，这些依赖关系必须在模块描述符 module-info.java 中显式声明。这样，Java\
  \ 编译器在编译时就能知道模块的依赖关系，并且如果任何一个依赖关系未满足，则不允许编译。\n\n注意\n\n与类路径相比，模块依赖关系未满足的情况在使用 Java\
  \ 9 模块系统时会在编译时立即被检测到。在编译时，不允许模块 com.apress.moduleB 同时读取模块 com.apress.moduleA。否则就会产生循环依赖，这在\
  \ JDK 9 中是被 Java 编译器禁止的。\n\n如果我们尝试运行模块 com.apress.moduleA，首先会执行解析过程。解析是一个搜索和发现模块所需依赖模块的过程。系统会搜索主机系统上找到的所有模块，并对找到的模块再次搜索其依赖关系。此过程持续进行，直到每个必需的模块都被覆盖，并且每个必需模块的每个依赖关系都得到解决。在我们的例子中，解析很简单，因为模块\
  \ com.apress.moduleA 只需要两个模块：模块 com.apress.moduleB 和模块 com.apress.moduleC。我们假设这两个模块不依赖于其他任何模块。在这种情况下，当所有三个模块都被添加到模块图中后，解析过程就成功完成了。例如，如果模块\
  \ com.apress.moduleB 有其他依赖关系，这些依赖关系也会被解析并添加到模块图中。解析过程的结果包含了编译和运行根模块 com.apress.moduleA\
  \ 所需的全部数据。\n\n正如我们已经知道的，每个模块都隐式地需要 java.base。在模块描述符中提及 `requires java.base` 是不必要的，因为模块\
  \ java.base 默认被每个模块所需。模块 java.base 将始终位于模块图的最底部，因为每个模块都依赖于它。图 4-4 展示了之前的模块图，并在底部包含了模块\
  \ java.base。\n\n![A431534_1_En_4_Fig4_HTML.gif](img/A431534_1_En_4_Fig4_HTML.gif)\n\
  \n图 4-4.\n\n表达模块间依赖关系的模块图，包含模块 java.base\n\n如果模块描述符不包含任何 `requires` 子句，则该模块除了模块\
  \ java.base 之外，不依赖于任何其他模块。模块 java.base 没有任何 `requires` 指令，因为它不依赖于任何其他模块。\n\n到目前为止，我们只看了正常情况。让我们也探讨一些出现问题导致编译失败的情况。如果在\
  \ `requires` 子句中使用的模块未找到，编译将会失败。以下模块声明表明它需要模块 com.apress.moduleB，但如果该模块尚未定义，编译 com.apress.moduleA\
  \ 将会导致错误，因为其依赖关系无法满足：\n\n```\nmodule com.apress.moduleA {\nrequires com.apress.moduleB;\n\
  }\n```\n\n我们说一个模块未定义，如果它没有 module-info.java 文件，或者其 module-info.java 文件未包含正确的模块名称。在前面的例子中，编译模块\
  \ com.apress.moduleA 的输出会导致一个错误：\n\n```\nerror: module not found: com.apress.moduleB\n\
  ```\n\n如果我们对一个未找到的模块进行了限定导出，也会得到相同的结果。\n\n模块声明中不允许出现循环，如下例所示：\n\n```\nmodule com.apress.moduleA\
  \ {\nrequires com.apress.moduleA;\n}\n```\n\n此模块声明存在循环依赖，会导致编译错误：\n\n```\nerror:\
  \ cyclic dependence involving com.apress.moduleA requires com.apress.moduleA\n```\n\
  \n注意\n\n模块系统在编译时不允许循环依赖。\n\n清单 4-1 展示了一个三个模块之间简单循环依赖的示例。\n\n```\n// module-info.java\
  \ (模块 com.apress.moduleA)\nmodule com.apress.moduleA {\nrequires com.apress.moduleB;\n\
  }\n// module-info.java (模块 com.apress.moduleB)\nmodule com.apress.moduleB {\nrequires\
  \ com.apress.moduleC;\n}\n// module-info.java (模块 com.apress.moduleC)\nmodule com.apress.moduleC\
  \ {\nrequires com.apress.moduleA;\n}\n清单 4-1.\n为三个不同模块定义三个模块描述符\n```\n\n存在循环依赖是因为以下条件：\n\
  \n\n\n*   `module com.apress.moduleA` 依赖于 `module com.apress.moduleB`。\n*   `module\
  \ com.apress.moduleB` 依赖于 `module com.apress.moduleC`。\n*   `module com.apress.moduleC`\
  \ 依赖于 `module com.apress.moduleA`。\n\n这三个模块的编译会失败，因为与之前的示例一样，会产生循环依赖错误。\n\n每个 `requires`\
  \ 语句只能包含一个模块名称。它不能在一个 `requires` 语句中使用逗号列举两个模块名称。在这种情况下，编译时会报错。同时，也禁止在同一个模块声明中重复两个\
  \ `requires` 语句。编译错误信息如下所示：\n\n```\nerror: duplicate requires: \n```\n\n当一个模块依赖于另一个模块，但未在其模块描述符中声明此依赖关系时，会发生什么？在接下来的示例中，模块\
  \ `com.apress.moduleA` 的描述符表明它不依赖任何其他模块。清单 4-2 展示了该模块的模块描述符：\n\n```\n// module-info.java\n\
  module com.apress.moduleA {\n}\n清单 4-2.\n模块 com.apress.moduleA 的模块描述符\n```\n\n在清单\
  \ 4-3 中，模块 `com.apress.moduleA` 包含一个名为 `Main` 的类，该类导入并使用了模块 `com.apress.moduleB`\
  \ 中的类型。\n\n```\n// Main.java (module com.apress.moduleA)\npackage com.apress.moduleA;\n\
  import com.apress.moduleB.*;\npublic class Main {\npublic static void main(String[]\
  \ args) {\nEmployee employee = new Employee(\"John\", \"Albert\");\nSystem.out.println(\"\
  First name is : \" + employee.getFirstName());\nSystem.out.println(\"Last name is\
  \ : \" + employee.getLastName());\n}\n}\n清单 4-3.\n模块 com.apress.moduleA 的 Main 类\n\
  ```\n\n清单 4-4 定义了模块 `com.apress.moduleB`，它有一个空的模块声明。\n\n```\n// module-info.java\n\
  module com.apress.moduleB {\n}\n清单 4-4.\n模块 com.apress.moduleB 的模块描述符\n```\n\n清单\
  \ 4-5 定义了一个 POJO 类，作为模块 `com.apress.moduleB` 的一部分。\n\n```\n// Employee.java (module\
  \ com.apress.moduleB)\npackage com.apress.moduleB;\npublic class Employee {\nprivate\
  \ String firstName;\nprivate String lastName;\npublic Employee() {\n}\npublic Employee(String\
  \ firstName, String lastName) {\nthis.firstName = firstName;\nthis.lastName = lastName;\n\
  }\npublic String getFirstName() {\nreturn firstName;\n}\npublic String getLastName()\
  \ {\nreturn lastName;\n}\n}\n清单 4-5.\n来自模块 com.apress.moduleB 的 Employee 类\n```\n\
  \n我们使用以下命令同时编译两个模块中的所有 `.java` 文件：\n\n```\njavac -d output --module-source-path\
  \ src $(find  . -name \"*.java\")\n```\n\n注意\n\n此编译是在 Windows 中使用 Cygwin 完成的。Cygwin\
  \ 是一个在 Windows 中运行的类 Unix 命令行界面。在本书中，所有操作均使用 Cygwin 执行。\n\n为了编译，我们使用 `--module-source-path`\
  \ 命令行选项，以告知 `javac` 模块源代码的位置。在我们的示例中，`--module-source-path src` 选项定义了 src 目录的子目录包含各个模块的代码。\n\
  \n编译失败，并提示包 `com.apress.moduleB` 不存在：\n\n```\n.\\src\\com.apress.moduleA\\com\\\
  apress\\moduleA\\Main.java:3: error: package com.apress.moduleB does not exist\n\
  import com.apress.moduleB.*;\n^\n.\\src\\com.apress.moduleA\\com\\apress\\moduleA\\\
  Main.java:8: error: cannot find symbol\nEmployee employee = new Employee(\"John\"\
  , \"Albert\");\n^\nsymbol:   class Employee\nlocation: class Main\n.\\src\\com.apress.moduleA\\\
  com\\apress\\moduleA\\Main.java:8: error: cannot find symbol\nEmployee employee\
  \ = new Employee(\"John\", \"Albert\");\n^\nsymbol:   class Employee\nlocation:\
  \ class Main\n3 errors\n```\n\n模块 `com.apress.moduleA` 有一个空的模块声明。它不依赖任何其他模块，因此根据\
  \ Jigsaw 引入的强封装机制，它无法访问其他模块中的类型。这就是为什么尝试在 `com.apress.moduleA` 内部访问模块 `com.apress.moduleB`\
  \ 中的类型会导致编译错误。\n\n注意\n\n你可以在目录 `/ch04/requiresClause` 中找到此示例的源代码。\n\n让我们编辑模块 `com.apress.moduleA`\
  \ 的 `module-info.java`，并添加对模块 `com.apress.moduleB` 的依赖。清单 4-6 展示了其新的模块描述符。\n\n```\n\
  // module-info.java\nmodule com.apress.moduleA {\nrequires com.apress.moduleB;\n\
  }\n清单 4-6.\n模块 com.apress.moduleA 的模块描述符\n```\n\n现在我们尝试使用相同的选项再次编译源代码。不幸的是，出现了与之前完全相同的编译错误。这是因为在\
  \ Java 9 中，仅仅指定一个模块需要另一个模块以访问该模块中的类型是不够的。\n\n此外，第二个模块必须导出其部分类型，以使依赖于它的模块能够访问这些类型。在我们的案例中，为了成功编译，我们必须修改模块\
  \ `com.apress.moduleB` 的 `module-info.java`，并指定它导出包 `com.apress.moduleB` 中的所有类型。清单\
  \ 4-7 展示了其 `module-info.java` 文件的新定义。\n\n```\n// module-info.java\nmodule com.apress.moduleB\
  \ {\nexports com.apress.moduleB;\n}\n清单 4-7.\n模块 com.apress.moduleB 的模块描述符\n```\n\
  \n总结一下，到目前为止，我们已经学习了如何使用 `requires` 子句定义对其他模块的依赖关系。模块指定其所需模块的属性是可靠配置的基础。到目前为止，我们只使用了\
  \ `requires` 子句的简单形式。因此，`requires` 子句还可以包含 `static` 关键字以及 `transitive` 关键字。我们将在后面的“可访问性”部分解释\
  \ `requires transitive` 子句。\n\n`requires static myModule` 子句表示模块 `myModule` 仅在编译时存在。在运行时，它的存在不是强制性的。这样，我们必须有一个编译时依赖，但不需要运行时依赖。\n\
  \n接下来，让我们了解如何让一个模块表明它将其包提供给依赖于它的其他模块使用。下一节将解释如何在模块声明中使用 `exports` 子句。\n\n\n\n####\
  \ exports 子句\n\n`exports` 子句的作用是在编译时和运行时导出包。它允许模块指定其导出的包。只有满足可靠配置的其他条件时，`exported`（已导出）包才能被其他模块使用。反之亦然。未导出的包无法被任何其他模块使用。\n\
  \n注意\n\n默认情况下，模块不会导出任何包。这意味着，默认情况下，当前模块中的任何包都无法被其他模块访问。\n\n`exports` 子句在模块描述符中使用关键字\
  \ `exports` 后跟包名来指定。禁止使用逗号分隔包或模块。每个包都必须有单独的 `exports` 子句。\n\n图 4-5 展示了 `exports`\
  \ 子句的语法。\n\n![A431534_1_En_4_Fig5_HTML.gif](img/A431534_1_En_4_Fig5_HTML.gif)\n\n\
  图 4-5.\n\nexports 子句的语法\n\n与 `requires` 子句类似，`exports` 子句也有一些限制。例如，不允许在模块声明中重复 `exports`\
  \ 语句，否则会导致编译错误：\n\n```\nerror: duplicate export: \n```\n\n我们假设模块 com.apress.moduleB\
  \ 希望将其两个包 com.apress.moduleB.packageB1 和 com.apress.moduleB.packageB2 提供给需要它的其他模块使用。在这种情况下，我们说模块\
  \ com.apress.moduleB 导出了这些包。清单 4-8 在其模块声明中说明了这一点。\n\n```\nmodule com.apress.moduleB\
  \ {\nexports com.apress.moduleB.packageB1;\nexports com.apress.moduleB.packageB2;\n\
  }\n清单 4-8.\n模块 com.apress.moduleB 的 module-info.java\n```\n\n清单 4-9 指出模块 com.apress.moduleC\
  \ 也导出了一个名为 com.apress.moduleC.packageC1 的包。\n\n```\nmodule com.apress.moduleC {\n\
  exports com.apress.moduleC.packageC1;\n}\n清单 4-9.\n模块 com.apress.moduleC 的模块描述符\n\
  ```\n\n在下面的模块图中，模块 com.apress.moduleB 有两个包，它们都被导出了。模块 com.apress.moduleC 也包含两个包，但根据其模块定义，只有一个被导出。包\
  \ com.apress.moduleC.packageC2 未被导出，因此永远无法在模块 com.apress.moduleC 外部访问。任何其他尝试使用包\
  \ com.apress.moduleC.packageC2 的模块不仅会失败，而且无法成功编译。\n\n图 4-6 展示了一种新型增强的模块图，其中我们还插入了模块包含的包。包\
  \ com.apress.moduleB.packageB1、com.apress.moduleB.packageB2 和 com.apress.moduleC.packageC1\
  \ 已被导出，而包 com.apress.moduleC.packageC2 未被导出。\n\n![A431534_1_En_4_Fig6_HTML.gif](img/A431534_1_En_4_Fig6_HTML.gif)\n\
  \n图 4-6.\n\n显示哪些包被导出、哪些未被导出的模块图\n\n模块 com.apress.moduleA 可以成功访问 packageB1 和 packageB2\
  \ 这两个包中的类型，原因如下：\n\n*   它读取了模块 com.apress.moduleB。\n*   包 packageB1 和 packageB2\
  \ 正被模块 com.apress.moduleB 导出。\n\n然而，如果向模块 com.apress.moduleB 中添加一个新包，除非在模块 com.apress.moduleB\
  \ 的模块描述中将其声明为已导出，否则模块 com.apress.moduleA 将无法访问它。模块 com.apress.moduleA 可以访问 com.apress.moduleC\
  \ 中的类型，但只能访问 packageC1 包中的类型，因为这是模块 com.apress.moduleC 唯一导出的包。包 packageC2 未被导出，因此模块\
  \ com.apress.moduleA 无法访问它。\n\n到目前为止，我们已经学习了如何设置模块声明文件，以及如何使用 `requires` 和 `exports`\
  \ 子句。清单 4-10 展示了一个同时包含 `requires` 和 `exports` 子句的简单模块。\n\n```\nmodule com.apress.moduleA\
  \ {\nrequires com.apress.moduleB;\nexports com.apress.moduleA.packageP1;\n}\n清单\
  \ 4-10.\n同时使用 requires 和 exports 子句的模块 com.apress.moduleA 的模块描述符\n```\n\n在这个例子中，我们定义了一个名为\
  \ com.apress.moduleA 的模块，它依赖于另一个名为 com.apress.moduleB 的模块，并且导出了名为 com.apress.moduleA.packageP1\
  \ 的包。\n\n#### opens 子句\n\n到目前为止，我们已经了解了如何使用 `exports` 指令实现强封装。但是，如果我们需要使用反射访问某些类型，该怎么办呢？\n\
  \n注意\n\n刚刚展示的 `exports` 子句不允许通过深度反射访问其非公共类型。\n\n在 Java 9 中使用反射有两种不同的情况：\n\n*   未命名模块（类路径）中的代码可以使用反射访问任何命名模块中的代码。这是通过一个名为\
  \ `--illegal-access` 的标志实现的，该标志默认设置，由 JCP 团队添加以简化迁移。许多框架（如 Hibernate 和 JPA）需要对命名模块中的代码进行反射访问。这些框架通常位于类路径上。第\
  \ 8 章将更详细地讨论 `--illegal-access` 标志。\n*   命名模块中的代码不能使用反射访问任何命名模块中的代码。\n\n这就是新的 `opens`\
  \ 子句和 `--add-opens` 命令行选项发挥作用的地方。\n\n为了解决这个问题，引入了一个名为 `opens` 的新指令。它的作用是为作为参数传递的类型提供反射访问。\n\
  \n注意\n\n不建议使用 `opens` 来导出包含某些内部实现的包。这样做会暴露内部实现并破坏强封装规则。\n\n图 4-7 展示了 opens 子句的语法。\n\
  \n![A431534_1_En_4_Fig7_HTML.gif](img/A431534_1_En_4_Fig7_HTML.gif)\n\n图 4-7.\n\n\
  opens 子句的语法\n\n`opens` 子句是模块描述符中可以存在的另一个子句，除了本章前面讨论的 `requires` 和 `exports` 子句之外。`opens`\
  \ 子句在模块声明内部使用，用于定义在运行时对所有模块可进行深度反射的包。因此，该包的公共类型和私有类型都可以通过其他模块中的代码使用深度反射进行访问。\n\n\
  注意\n\n默认情况下，模块内的包仅对任何未命名模块中的代码可进行深度反射。\n\n`opens` 指令也可以通过指定目标命名模块列表来限定，如图 4-8 所示。\n\
  \n![A431534_1_En_4_Fig8_HTML.gif](img/A431534_1_En_4_Fig8_HTML.gif)\n\n图 4-8.\n\n\
  限定 opens 子句的语法\n\n关于 `opens` 子句，有一些特性你应该了解。首先，重要的是要知道，可以对同一个包同时使用 `exports` 和 `opens`\
  \ 指令。在这种情况下，该包在编译时和运行时被导出以供访问，并且在运行时也可用于深度反射。因此，其公共类型可以在编译时和运行时访问，而其公共类型和私有类型都可以在运行时通过反射访问。其次，`opens`\
  \ 指令不能在开放模块（open module）内部使用。开放模块将在本章后面介绍。\n\n注意\n\n`opens` 指令不能使用通配符，并且不能包含多个包。\n\
  \n\n\n#### 其他子句\n\n模块描述符中可使用的另外两个指令是 `uses` 和 `provides` 子句。这些子句用于定义（`provides`）和使用（`uses`）服务，将在第\
  \ 6 章——服务中描述。\n\n注意\n\n模块声明中，前面提到的五个指令（`requires`、`exports`、`opens`、`uses` 和 `provides`）都不是强制性的。选择使用哪些指令或不使用哪些指令没有任何限制。我们可以创建自己的模块，并使用这五个指令的任意组合。\n\
  \n现在我们已经了解了模块声明的基础知识。是时候学习如何在 JDK 9 中编译和运行模块化应用程序了。\n\n## 编译和运行模块\n\nJava 9 模块化应用程序的编译方式与\
  \ Java 8 或 7 不同。本书中所有编译和运行模块的示例均使用类似 Linux 环境的命令行进行说明。然而，在日常工作中，这种做法并不常见。像 Maven\
  \ 或 Gradle 这样的构建工具在编译和运行 Java 应用程序方面效率更高、更合适且更易于使用。第 12 章介绍了 Java 9 与 Maven 的集成，并展示了如何使用它来构建、打包、编译和运行\
  \ Java 9 模块化应用程序。\n\n### 编译单个模块\n\n以下是一个使用 JDK 9 编译单个模块的非常简单的示例。假设我们有一个模块 `com.apress.moduleA`，它没有任何依赖项。在其包\
  \ `com.apress.moduleA` 中包含一个 `Main.java` 文件。文件夹结构如下：\n\n```\nsrc/com.apress.moduleA/\n\
  module-info.java\ncom/\napress/\nmoduleA/\nMain.java\n```\n\n代码清单 4-11 显示了类 `Main`\
  \ 的内容。它会在控制台打印一条消息。\n\n```\n// Main.java\npackage com.apress.moduleA;\npublic class\
  \ Main {\npublic static void main(String[] args) {\nSystem.out.println(“这里是 Java\
  \ 9！”);\n}\n}\n代码清单 4-11.\n来自模块 com.apress.moduleA 的 Main 类\n```\n\n代码清单 4-12 显示了模块\
  \ `com.apress.moduleA` 的 `module-info.java` 文件。它没有定义任何子句。\n\n```\n// module-info.java\n\
  module com.apress.moduleA {\n}\n代码清单 4-12.\n模块 A 的模块描述符\n```\n\n首先，我们使用 `mkdir`\
  \ 命令创建编译器输出到的目标目录：\n\n```\nmkdir –p outputDir\n```\n\n然后，我们使用 Java 编译器编译 `Main.java`\
  \ 文件和 `module-info.java` 文件。编译将为每个 `.java` 文件创建一个 `.class` 文件：\n\n```\n$ javac –d\
  \ outputDir/com.apress.moduleA src/com.apress.moduleA/module-info.java src/com.apress.moduleA/com/apress/moduleA/Main.java\n\
  ```\n\n`javac` 命令获取需要编译的文件。`-d` 选项指定编译器输出到的目录。在本例中，它将输出到目录 `outputDir/com.apress.moduleA`。最后两个参数代表我们要编译的文件\
  \ `module-info.java` 和 `Main.java` 的路径。\n\n在编译过程中，相应的类文件会生成在作为参数传递给 `-d` 选项的目录中。单个模块的编译方式与\
  \ Java 7 或 8 非常相似，不一定需要使用比旧版本 Java 中使用的编译器标志更多的标志。与 Java 8 相比，这里唯一的区别是 `module-info.java`\
  \ 也被编译了。\n\n注意\n\n`module-info.java` 文件中的模块声明会与其余源代码一起编译，并生成一个 `module-info.class`\
  \ 文件。\n\n### 运行包含单个模块的应用程序\n\n要运行之前编译的类，我们使用 Java 启动器执行以下命令：\n\n```\n$ java --module-path\
  \ outputDir --module com.apress.moduleA/com.apress.moduleA.Main\n```\n\n结果，字符串“这里是\
  \ Java 9！”会打印在控制台上。我们在前面的代码中看到，`java` 命令使用了处理模块的新标志。`--module-path` 选项（在 Java 9\
  \ 中引入）接受一个目录或目录列表作为参数，其中包含已编译文件的位置。在我们的例子中，这些文件位于 `outputDir` 目录中。使用模块路径是为了让编译器能够在运行时定位模块。\n\
  \n模块路径和类路径之间的区别将在本章后面的“模块路径”一节中列出。\n\n注意\n\n我们将文件以 `.class` 文件的形式展开在文件系统上。另一种可能性是将它们打包为模块化\
  \ JAR。我们将在本章后面展示如何操作。\n\nJava 启动器使用的第二个选项是命令行选项 `--module`。它用于指定主类和主模块，参数形式为 `<模块名>\
  \ / <主类>`。`main` 类的位置是 `java` 命令必须知道的强制信息。\n\nJava 启动器将加载根模块 `com.apress.moduleA`，通过运行解析过程解析其所有依赖项和传递依赖项，最后运行传递给\
  \ `--module` 选项的 `Main` 类。最后，消息会打印在控制台上。\n\n恭喜！您刚刚学会了如何在 Java 9 中成功编译和运行您的第一个模块。\n\
  \n如果我们尝试在不使用 `--module-path` 选项的情况下运行 `java` 命令，如下所示：\n\n```\n$ java –m com.apress.moduleA/com.apress.moduleA.Main\n\
  ```\n\n则会显示以下错误消息：\n\n```\nError occurred during initialization of VM\njava.lang.module.ResolutionException:\
  \ Module com.apress.moduleA not found\nat java.lang.module.Resolver.fail(java.base@9-ea/Resolver.java:796)\n\
  at java.lang.module.Resolver.resolveRequires(java.base@9-ea/Configuration.java:370)\n\
  at java.lang.module.Configuration.resolveRequiresAndUses(java.base@9-ea/ModuleDescriptor.java:2081(\n\
  at jdk.internal.module.ModuleBootstrap.boot(java.base@9-ea/ModuleBootstrap.java:263)\n\
  at java.lang.System.initPhase2(java.base@9-ea/System.java:1925)\n```\n\n这个错误是什么意思？找不到模块\
  \ `com.apress.moduleA`，因为我们没有告知 Java 启动器已编译模块的位置。必须使用 `--module-path` 选项指定已编译模块所在的目录。除非我们明确指定模块的位置，否则\
  \ Java 启动器无法找到它们。\n\n\n\n### 编译多个模块\n\n到目前为止，我们只编译和执行了单个模块。但对于两个或更多模块的编译，Java 9\
  \ 引入了一些额外的编译器标志。在下面的示例中，你将学习如何同时编译多个模块。\n\n假设我们总共有三个模块：模块 `com.apress.moduleA`、模块\
  \ `com.apress.moduleB` 和模块 `com.apress.moduleC`。这三个模块的文件夹结构如下：\n\n```\nsrc/com.apress.moduleA/\n\
  module-info.java\ncom/\napress/\nmoduleA/\nMain.java\ncom.apress.moduleB/\nmodule-info.java\n\
  com/\napress/\nmoduleB/\nClassB1.java\nClassB2.java\ncom.apress.moduleC/\nmodule-info.java\n\
  com/\napress/\nmoduleC/\nClassC1.java\nClassC2.java\n```\n\n此外，假设每个模块的 `module-info.java`\
  \ 不包含任何子句。清单 4-13 展示了用于仅编译模块 `com.apress.moduleA` 的 `javac` 命令。\n\n```\n$ javac\
  \ –d outputDir --module-source-path src src/com.apress.moduleA/module-info.java\
  \ src/com.apress.moduleA/com/apress/moduleA/Main.java\n清单 4-13.\n使用 --module-source-path\
  \ 标志编译模块 com.apress.moduleA\n```\n\n同时编译多个模块是通过使用 Java 9 中引入的新命令行选项 `--module-source-path`\
  \ 完成的。它用于告诉 `javac` 目录中的源文件位置。在此例中，我们将 `--module-source-path` 指向 `src` 目录，并将编译后的模块输出到\
  \ `outputDir` 目录。\n\n编译会在 `outputDir` 目录内生成以下类文件：\n\n```\noutputDir/com.apress.moduleA/\n\
  com/\napress/\nmoduleA/\nMain.class\nmodule-info.class\n```\n\n另外两个模块 `com.apress.moduleB`\
  \ 和 `com.apress.moduleC` 没有被生成，因为我们没有在 `javac` 命令中指定它们。我们只编译了模块 `com.apress.moduleA`。\n\
  \n现在，我们指定模块 `com.apress.moduleA` 依赖于模块 `com.apress.moduleB` 和 `com.apress.moduleC`。清单\
  \ 4-14 展示了模块 `com.apress.moduleA` 的 `module-info.java` 文件，其中我们使用 `requires` 子句定义了依赖关系。\n\
  \n```\n// module-info.java\nmodule com.apress.moduleA {\nrequires com.apress.moduleB;\n\
  requires com.apress.moduleC;\n}\n清单 4-14.\n模块 com.apress.moduleA 的模块描述符\n```\n\n\
  如果我们运行清单 4-13 中的 `javac` 命令，会得到 `outputDir` 目录的以下结构：\n\n```\noutputDir/com.apress.moduleA/\n\
  com/\napress/\nmoduleA/\nMain.class\nmodule-info.class\ncom.apress.moduleB/\nmodule-info.class\n\
  com.apress.moduleC/\nmodule-info.class\n```\n\n在 `javac` 命令中，我们指定只编译模块 `com.apress.moduleA`\
  \ 中的 `Main.java` 和 `module-info.java` 文件。但由于模块 `com.apress.moduleA` 需要模块 `com.apress.moduleB`\
  \ 和 `com.apress.moduleC`，因此来自 `com.apress.moduleB` 和 `com.apress.moduleC` 的模块描述符也被编译成了类文件。\n\
  \n我们使用以下命令编译所有以 `.java` 结尾的类：\n\n```\n$ javac -d outputDir --module-source-path\
  \ src $(find . -name \"*.java\")\n```\n\n`--module-source-path` 选项指定了未编译文件的位置。我们搜索所有以\
  \ `.java` 扩展名结尾的文件，当然也包括模块描述符。所有模块中以 `.java` 结尾的文件都被编译成了 `.class` 文件。`outputDir`\
  \ 的结构如下所示。Java 类和 `module-info.java` 文件都已被编译成 `.class` 文件：\n\n```\noutputDir/com.apress.moduleA/\n\
  com/\napress/\nmoduleA/\nMain.class\nmodule-info.class\ncom.apress.moduleB/\ncom/\n\
  apress/\nmoduleB/\nClassB1.class\nClassB2.class\nmodule-info.class\ncom.apress.moduleC/\n\
  com/\napress/\nmoduleC/\nClassC1.class\nClassC2.class\nmodule-info.class\n```\n\n\
  ### 运行包含多个模块的应用程序\n\n要运行之前编译的类，我们使用 Java 启动器并执行以下命令：\n\n```\n$ java --module-path\
  \ outputDir --module com.apress.moduleA/com.apress.moduleA.Main\n```\n\n这与之前示例中运行仅包含一个模块的应用程序时使用的\
  \ `java` 命令相同。但现在我们的应用程序中包含三个模块，为什么我们只指定了一个模块呢？\n\n`--module` 选项只需要获取根模块的名称，不需要获取所有模块。通过获取根模块，它会启动一个解析过程，并根据模块描述符中的信息找到其他模块。\n\
  \n注意\n\n`--module` 命令行选项仅将根模块中 `Main` 类的名称作为参数。\n\n解析过程从模块 `com.apress.moduleA`\
  \ 开始，然后找到模块 `com.apress.moduleB` 和 `com.apress.moduleC`。解析完成后，将执行根模块的 `Main` 类。\n\
  \n在本节中，我们学习了如何使用 Java 9 编译和运行多个模块。现在，让我们看一个因可访问性规则被破坏而导致编译失败的示例。这里，我们将 `ClassB1`\
  \ 和 `ClassB2` 导入到 `Main.java` 中。清单 4-15 展示了 `com.apress.moduleA` 的 `Main` 类。\n\n\
  ```\n// Main.java\npackage com.apress.moduleA;\nimport com.apress.moduleB.ClassB1;\n\
  import com.apress.moduleC.ClassC1;\npublic class Main {\npublic static void main(String[]\
  \ args) {\nSystem.out.println(\"Here is Java 9!\");\n}\n}\n清单 4-15.\nMain 类\n```\n\
  \n从前面的示例我们知道，模块 `com.apress.moduleA` 需要模块 `com.apress.moduleB` 和 `com.apress.moduleC`。通过编译所有\
  \ Java 文件\n\n```\n$ javac -d outputDir --module-source-path src $(find . -name \"\
  *.java\")\n```\n\n会抛出以下错误：\n\n```\nMain.java:3: 错误: ClassB1 不可见，因为包 com.apress.moduleB\
  \ 不可见\nimport com.apress.moduleB.ClassB1;\nMain.java:4: 错误: ClassC1 不可见，因为包 com.apress.moduleC\
  \ 不可见\nimport com.apress.moduleC.ClassC1;\n2 个错误\n```\n\n由于强封装，编译失败。类 `ClassB1`\
  \ 和 `ClassC1` 无法导入到 `Main` 类中。即使模块 `com.apress.moduleA` 需要其他两个模块，它也无法访问其中的类型，因为这些类型没有被这些模块导出。在\
  \ Java 9 中，用于定义类 `ClassB1` 和 `ClassC1` 的 `public` 访问修饰符不再能够强制执行可访问性。\n\n为了使类 `ClassB1`\
  \ 和 `ClassC1` 对 `Main` 类可用，我们必须明确指定以下两点：\n\n*   在模块 `com.apress.moduleB` 的模块描述符中，指定包含\
  \ `ClassB1` 的包被导出。\n*   在模块 `com.apress.moduleC` 的模块描述符中，指定包含 `ClassC1` 的包被导出。\n\
  \n通过这样做，来自模块 `com.apress.moduleB` 导出包和模块 `com.apress.moduleC` 导出包中的所有类都将以这种方式对模块\
  \ `com.apress.moduleA` 可访问，并且编译将成功，不会出现任何错误。\n\n\n\n### 私有方法与公有方法\n\n我们扩展之前的示例，使其能够从另一个模块调用方法。即使模块被读取且相应类型被导出，私有方法也无法从其他模块访问。\n\
  \n注意\n\n务必牢记，私有方法始终是包级私有的。\n\n清单 4-16 展示了来自包 `com.apress.moduleB` 的类 `ClassB1`，其中包含一个新的私有静态方法。\n\
  \n```\n// ClassB1.java\npackage com.apress.moduleB;\npublic class ClassB1 {\nprivate\
  \ static String getInfoForClassB1() {\nreturn \"ClassB1 from ModuleB\";\n}\n}\n\
  清单 4-16.\n包含私有方法的 ClassB1 类\n```\n\n清单 4-17 展示了来自模块 `com.apress.moduleA` 的 `Main`\
  \ 类如何调用 `ClassB1` 中的静态方法。\n\n```\n// Main.java\npackage com.apress.moduleA;\nimport\
  \ com.apress.moduleB.ClassB1;\nimport com.apress.moduleC.ClassC1;\npublic class\
  \ Main {\npublic static void main(String[] args) {\nSystem.out.println(“Here is\
  \ Java 9!”);\nSystem.out.println(ClassB1.getInfoForClassB1());\n}\n}\n清单 4-17.\n\
  Main 类\n```\n\n编译失败并显示以下错误信息：\n\n```\nMain.java:10: error: getInfoForClassB1() has\
  \ private access in ClassB1\n```\n\n将 `ClassB1.java` 中的 `getInfoForClassB1()` 方法设置为公有后，编译即可成功。运行该应用程序\n\
  \n```\n$ java --module-path outputDir –m com.apress.moduleA/com.apress.moduleA.Main\n\
  ```\n\n将输出以下内容：\n\n```\nHere is Java 9!\nClassB1 from ModuleB\n```\n\n在此示例中，我们展示了与\
  \ Java 早期版本一样，将访问标识符设为 `private` 会使该类型无法被访问。\n\n我们已经学习了如何在 Java 9 中编译和运行模块化应用程序。下一节将介绍\
  \ Jigsaw 中引入的新型模块化 JAR 文件。\n\n## 模块化 JAR\n\n模块化 JAR 是在 JDK 9 中引入的。它们代表包含已编译模块定义的模块工件。模块化\
  \ JAR 类似于常规 JAR，包含 .class 文件以及一个 `module-info.class` 文件。模块化 JAR 与常规 JAR 的区别仅在于模块化\
  \ JAR 额外包含的 `module-info.class` 文件。\n\n`module-info.class` 文件位于模块化 JAR 目录的顶层。每个模块化\
  \ JAR 都必须包含此文件。如果不包含，它就是一个常规 JAR 文件，而非模块化 JAR。\n\n注意\n\n`module-info.class` 位于模块化\
  \ JAR 文件内的根目录，而非包内部。\n\n模块化 JAR 既可用于模块路径，也可用于类路径。当用于类路径时，`module-info.class` 文件不会被考虑。\n\
  \n注意\n\n模块化 JAR 文件与旧版本的 JDK 兼容。对于 Java 9 之前的所有 Java 版本，它在类路径上作为常规 JAR 文件工作。\n\n\
  由于模块描述符在 Java 9 中被编译为 `module-info.class` 文件，因此模块化 JAR 可以通过放置在模块路径上来作为模块工作。如果我们将模块化\
  \ JAR 放置在类路径上，`module-info.class` 文件将被直接忽略。但模块化 JAR 中除 `module-info.class` 文件之外的所有其他文件都会被考虑。这样，模块化\
  \ JAR 将充当一个普通的 JAR 文件。\n\n拥有一个既可用于类路径又可用于模块路径的 JAR 文件是一个巨大的优势。我们可以编译一个库，使其能在 JDK\
  \ 8（或更早版本）的类路径上使用，或者使用 JDK 9+ 编译它并在模块路径上使用。\n\n注意\n\n一个模块化 JAR 只能包含一个模块。它不能由多个模块组成。\n\
  \n模块化 JAR 的替代方案是将编译后的模块解压到文件系统中。两种方案都可行，但使用单个模块化 JAR 文件显然比使用一组文件更好、更合适。\n\n让我们设想一种情况：模块路径包含两个位于同一目录下的模块化\
  \ JAR 文件。如果第一个模块化 JAR 文件中的模块与第二个模块化 JAR 文件中的模块同名，则会在编译时出现错误。\n\n为了创建模块化 JAR，我们可以使用\
  \ `jar` 工具，该工具在 Java 9 中得到了增强。我们将在本节稍后部分了解更多相关信息。接下来，我们将讨论模块化 JAR 文件的结构。\n\n###\
  \ 模块化 JAR 的结构\n\n模块化 JAR 文件的结构与普通 JAR 文件类似，只是多了一个 `module-info.class` 文件。以下是一个模块化\
  \ JAR 文件的示例：\n\n```\nMETA-INF/\nMETA-INF/MANIFEST.MF\nmodule-info.class\ncom/apress/moduleA/Main.class\n\
  com/apress/moduleB/ClassB1.class\ncom/apress/moduleB/ClassB2.class\n...\n```\n\n\
  `META-INF` 目录中还包含一个 `MANIFEST.MF` 文件。`module-info.class` 文件位于根目录。我们所有编译后的 .class\
  \ 文件都存在于模块化 JAR 中。\n\n到目前为止，我们已经了解了模块化 JAR 文件及其结构。但是如何创建一个呢？我们将在下一节中找到答案，届时将讨论打包并介绍用于创建模块化\
  \ JAR 文件的 `jar` 工具。\n\n## 打包\n\nJava 9 允许将模块打包为多种格式，除了已知的常规 JAR 文件外，还可以打包为模块化 JAR\
  \ 文件、多版本 JAR 文件、JMOD 文件或 JIMAGE 文件。JMOD 文件和多版本 JAR 文件将在第 10 章中讨论。需要指出的是，Java 平台模块系统并不强制要求模块必须以模块化\
  \ JAR 的形式打包。\n\n我们首先讨论如何将模块打包成模块化 JAR。你可以使用位于 `JDK_HOME\\bin` 目录下的 `jar` 工具来完成此操作。\n\
  \n### 使用 jar 工具打包为模块化 JAR\n\n`jar` 工具已得到增强，以支持新引入的模块概念。表 4-2 根据官方 JDK 9 API 规范，展示了\
  \ JDK 9 中为 `jar` 工具新增的选项。\n\n表 4-2.\nJDK 9 中为 JAR 工具新增的选项\n\n| 短格式 | 长格式 | 描述 |\n\
  | --- | --- | --- |\n| `-d` | `--describe-module` | 打印模块描述符 |\n|   | `--module-version=VERSION`\
  \ | 在创建模块化 JAR 或更新非模块化 JAR 时指定模块版本 |\n|   | `--hash-modules=PATTERN` | 计算并记录与给定模式匹配、且直接或间接依赖于正在创建的模块化\
  \ JAR 或正在更新的非模块化 JAR 的模块的哈希值 |\n| `-p` | `--module-path` | 指定用于生成哈希的模块依赖项的位置 |\n\
  |   | `--release VERSION` | 将文件放入 JAR 文件的版本化目录中 |\n\n表 4-2 中列出的选项可用于创建模块化 JAR 或更新非模块化\
  \ JAR。`jar --help` 命令在 JDK 9 中也得到了增强，其中包含关于每个命令的更详细描述。\n\n使用 `jar` 工具，我们通过打包 `modules`\
  \ 目录中的所有内容，在 `lib` 目录中创建一个名为 `moduleA.jar` 的新模块化 JAR 文件：\n\n*   `--create` 选项用于创建模块化\
  \ JAR 文件。\n*   `--file` 选项指定要创建的模块化 JAR 的名称，并指定其创建位置（本例中为 `lib` 目录）。\n*   `--main-class`\
  \ 选项在打包模块时设置 `Main` 类。\n*   `-c` 选项指定编译后模块的位置（本例中，它们位于 `modules` 目录，该目录包含模块 `com.apress.moduleA`\
  \ 的编译后类文件）。\n\n```\n$ jar --create --file lib/moduleA.jar --main-class com.apress.moduleA.Main\
  \ –c modules\n```\n\n注意\n\n为了能够将模块打包为模块化 JAR，该模块必须事先已被编译。\n\n\n\n#### 添加模块版本\n\n\
  在创建模块化 JAR 时，还可以添加模块版本。打包时可以使用 `--module-version` 选项来添加一些关于模块版本的元数据。这些元数据不会添加到模块声明中，也不会在运行时被处理。理解这一区别非常重要。\n\
  \n#### 打印模块描述符\n\n使用 jar 工具的命令行选项 `--describe-module` 可以打印模块描述符：\n\n```\n$ jar --describe-module\n\
  ```\n\n或者简写为：\n\n```\n$ jar -d\n```\n\n通过打印模块描述符，我们可以查看对应的 JAR 文件包含哪些内容。显示的信息如下：\n\
  \n*   该 JAR 文件中所包含模块的名称\n*   该 JAR 文件中模块所依赖的模块列表\n*   主类的名称和包\n\n一个重要的变化是引入了选项规范的长格式。在\
  \ Java 8 中，我们只有由单个字母组成的短格式。在 Java 9 中，可以同时使用短格式和长格式，如表 4-3 所述。然而，在某些情况下，长格式没有对应的选项。\n\
  \n注意\n\nJava 归档工具（也称为 jar 工具）是一种归档工具，通过归档多个文件来创建 JAR 文件。Java 9 通过添加对模块的支持改进了 jar\
  \ 工具。\n\n下一节将介绍 JDK 9 中的一个基本特性：模块路径的引入。\n\n## 模块路径\n\nProject Jigsaw 引入了一个新概念来替代类路径：模块路径，它可以表示以下之一：\n\
  \n*   包含模块的目录序列的路径\n*   指向模块化 JAR 文件的路径\n*   指向 JMOD 文件的路径\n\n与模块路径不同，类路径表示一系列 JAR\
  \ 文件。编译器使用模块路径来查找模块以进行解析。模块路径可以与类路径混合使用。在这种情况下，属于模块的类可以依赖于类路径上存在的任何内容。\n\n模块路径上的每个现有工件都必须有一个模块声明。在模块路径上，我们不能有未包含模块声明的工件。\n\
  \n注意\n\n尽管 Java 9 引入了模块路径来替代类路径，但类路径仍然存在，并且可以单独使用或与模块路径结合使用。\n\nJigsaw 中引入了三种类型的模块路径：\n\
  \n*   应用程序模块路径\n*   编译模块路径\n*   升级模块路径\n\n在编译和运行多个模块时，我们已经使用过应用程序模块路径和编译模块路径。接下来的小节将详细介绍这些类型的模块路径。\n\
  \n### 应用程序模块路径\n\n应用程序模块路径由 Java 启动器使用，用于标记包含应用程序模块的目录。它通过新的命令行选项 `--module-path`\
  \ 或其短格式 `-p` 来指定。\n\n图 4-9 展示了模块路径标志的命令行语法：\n\n![A431534_1_En_4_Fig9_HTML.gif](img/A431534_1_En_4_Fig9_HTML.gif)\n\
  \n图 4-9.\n\n`--module-path` 命令行选项的语法\n\n模块路径标志接收一个目录列表作为参数，目录之间用冒号分隔。可以列出无限数量的目录，但每个目录之间必须用冒号分隔。\n\
  \n注意\n\n在前面的示例中，我们使用冒号 (:) 来分隔目录，但冒号仅用于 Linux 环境。对于 Windows 环境，我们必须使用分号 (;) 代替。\n\
  \n构成模块路径的目录中包含的模块可以是：\n\n*   打包为模块化 JAR 文件。\n*   展开为独立的类文件。\n\nJava 启动器可以从模块路径中精确加载它所需的模块，因为它通过模块声明中存在的配置知道了这些信息。\n\
  \n注意\n\n模块路径允许指定模块而不是 JAR 库作为类路径。\n\n在运行时，使用模块路径可以指定与项目一起构建的不同类型的模块。一个模块只能位于一个位置。如果它位于多个位置，则保留第一个出现的模块，其他出现的模块将不予考虑。\n\
  \n记住\n\n模块路径只能包含模块。\n\n除了应用程序模块路径，还有另外两种类型的模块路径：编译模块路径和升级模块路径。\n\n### 编译模块路径\n\n\
  编译模块路径包含源代码形式的模块定义，并与 `javac` 一起使用，通过命令行上的新 Java 选项 `--module-source-path` 指定。它在编译期间用于告知\
  \ Java 编译器必须搜索的模块的位置。\n\n图 4-10 展示了命令行 `--module-source-path` 选项的语法：\n\n![A431534_1_En_4_Fig10_HTML.gif](img/A431534_1_En_4_Fig10_HTML.gif)\n\
  \n图 4-10.\n\n`--module-source-path` 命令行选项的语法\n\n`--module-source-path` 标志指定要编译的\
  \ Java 源文件列表。它们可以一个接一个地列出，用空格分隔。\n\n注意\n\n在大多数情况下，Java 文件列表会非常庞大。Linux 在这方面可以帮助你。你可以输入\
  \ `$(find. –name '*.java'`) 来获取所有扩展名为 .java 的目录的完整列表。\n\n通常，我们可以将 `--module-source-path`\
  \ 命令行选项视为 `--sourcepath` 选项的模块对应项。\n\n### 升级模块路径\n\n升级模块路径通过命令行上的 Java 编译器选项 `--upgrade-module-path`\
  \ 指定。根据 OpenJDK 的说法，“它包含编译后的模块定义，旨在用于替代环境中内置的可升级模块。”本书不涉及升级模块路径。\n\n在本节中，我们将讨论模块解析过程。\n\
  \n## 模块解析\n\n模块解析是 Java 9 中引入的一个过程，它检查模块路径的正确性，并解析整个模块系统中存在的依赖关系。它在编译时和运行时都会发生。模块解析过程的目标是最终得到一组最小必要的已解析模块，以便能够运行应用程序。\n\
  \n注意\n\n模块在构建和安装期间被解析。它们在运行时不可解析。\n\n位于 module-info.java 文件中的模块声明中的 `requires` 子句，为模块系统提供了有关必须解决的依赖关系的有价值信息。这些依赖关系无非就是当前模块所依赖的其他模块。在\
  \ Java 9 中，它们被称为可观察模块，本章后面的“模块类型”一节将对此进行介绍。\n\n在找到当前模块的所有可观察模块后，模块系统不会停止。它会进一步搜索最近找到的模块的可观察模块。此过程持续进行，直到满足每个模块的所有依赖关系，并且到达基础模块\
  \ java.base。\n\n注意\n\n在编译时，在模块解析过程中，Jigsaw 会检查是否存在循环依赖。如果发现任何循环依赖，应用程序将无法编译。\n\n\
  \n\n### 根模块\n\n根模块是解析过程起始的模块。它通过 `java` 命令中的 `--module` 选项指定，正如我们在运行模块化应用程序的示例中所见。\n\
  \n首先，根模块会被添加到已解析模块组中。其次，模块系统会扫描该模块的模块描述符，并将其所有依赖（模块）添加到已解析模块组中。此过程持续进行，Java 平台模块系统会尝试查找其他模块上的依赖。当找到所有搜索的模块并到达\
  \ `java.base` 模块时，该过程停止。解析过程完成后，我们就拥有了运行软件应用程序所需的所有模块。\n\n在某些情况下，某个模块位于模块路径上，但在解析过程中未被找到，因此无法添加到模块图中。此时，我们必须手动将该模块添加到模块图中。这可以通过\
  \ `--add-modules` 命令行选项完成。我们将在第 8 章更详细地讨论此选项。\n\n重要的是要知道，模块解析过程会检测任何可能缺失的模块。如果缺少强制模块，模块解析过程将停止，并抛出异常。\n\
  \n注意\n\n如果在编译时模块路径不完整，编译器会给出警告。在解析过程中，平台模块和开发者模块都会被搜索。\n\nJigsaw 的另一个重要主题是**可访问性**，将在下一节介绍。\n\
  \n## 可访问性\n\n可访问性规则在 Java 9 中发生了根本性变化。声明为 `public` 但未导出的类型将仅在其所在的模块内部可用。与旧版 Java\
  \ 相比，这是一个重大变化。在 Java 9 之前，只需声明一个类型为 `public`，它就可以在任何地方被访问。在 Java 9 中，将类型声明为 `public`\
  \ 并不意味着它可以在任何地方被访问。\n\n仅仅读取一个模块并不能保证可以访问其包。此外，为了可访问，模块必须导出其部分包。只有从导出包中的公共类型才能被其他模块访问。通过利用强封装和可靠配置，我们可以明确定义模块的哪些类型可供外部访问。这样，我们可以非常轻松地隐藏内部实现。\n\
  \n隐藏实现细节成为 Java 9 的标准做法。这是默认获得的——我们无需特意选择。只需省略导出某个类型，即可使该类型被强封装，并从模块外部不可见。一个包只需被放置在一个模块内，就能迅速受益于强封装的力量。在\
  \ Java 9 中，我们能够通过在模块声明中列举它们来决定哪些类型应该可以从外部访问。非常简单且简洁。\n\n总结一下，为了使模块 A 能够读取模块 B 中的包\
  \ P，必须同时满足两个条件。第一个条件是模块 A 应读取（`requires`）模块 B。第二个条件是模块 B 应导出其包 P。\n\n注意\n\n在 Java\
  \ 9 中，可访问性在编译时和运行时都会强制执行。如果违反了可访问性规则，运行时将抛出 `IllegalAccessError` 类型的错误。可访问性检查在 Java\
  \ 虚拟机中强制执行。\n\n在 Java 9 中，仅仅为类型设置 `public` 修饰符并不意味着授予访问权限。在 Java 9 之前的版本中，为类型设置\
  \ `public` 可访问性类型会赋予其全局可访问性，但在 Java 9 中，要使名为 T 的类型在模块外部可访问，必须同时满足三个条件：\n\n*   类型\
  \ T 所在的包必须被导出。\n*   需要访问类型 T 的模块必须读取包含类型 T 的模块。\n*   类型 T 必须具有公共标识符。\n\n这些条件在表 4-3\
  \ 中进行了说明，该表列出了授予或不授予可访问性的情况综合列表：\n\n*   “模块是否被读取”列：如果包含类型 T 的模块被想要访问类型 T 的模块读取，则值为“是”。\n\
  *   “包是否被导出”列：如果包含类型 T 的模块导出了类型 T 的包，则值为“是”。\n*   “类型 T 的访问修饰符”列：表示类型 T 的访问修饰符。\n\
  *   “在其他模块中是否可访问”列：如果类型 T 可以从其他模块访问，则指定为“是”，否则为“否”。\n\n表 4-3 展示了 Java 9 中新的可访问性情况及其结果。\n\
  \n表 4-3.\n\nJava 9 中的可访问性情况\n\n| 模块是否被读取 | 包是否被导出 | 类型 T 的访问修饰符 | 在其他模块中是否可访问 |\n\
  | --- | --- | --- | --- |\n| 是 | 是 | Public | 是 |\n| 是 | 是 | Protected | 否 |\n|\
  \ 是 | 是 | (默认) | 否 |\n| 是 | 是 | Private | 否 |\n| 是 | 否 | Public | 否 |\n| 是 | 否 |\
  \ Protected | 否 |\n| 是 | 否 | (默认) | 否 |\n| 是 | 否 | Private | 否 |\n| 否 | 是 | Public\
  \ | 否 |\n| 否 | 是 | Protected | 否 |\n| 否 | 是 | (默认) | 否 |\n| 否 | 是 | Private | 否\
  \ |\n| 否 | 否 | Public | 否 |\n| 否 | 否 | Protected | 否 |\n| 否 | 否 | (默认) | 否 |\n|\
  \ 否 | 否 | Private | 否 |\n\n作为规则，导出包的公共组件可以从模块外部访问，前提是使用它的模块读取了源模块。相反，未导出包的公共元素无法从模块外部访问。它默认对其所在模块内的所有源代码可访问，但无法从模块外部访问。\n\
  \n当我们尝试访问不可访问的类型时，Java 编译器会抛出异常。最常见的是 `ClassNotFoundException`。在运行时，最常见的错误是 `IllegalAccessError`\
  \ 或 `InaccessibleObjectException`。\n\n### 可读性与隐含可读性\n\n可读性是两个模块之间的关系，指的是一个模块读取另一个模块时，可以访问其导出包中的类型。在这种情况下，我们说一个模块读取另一个模块。\n\
  \n我们在之前的示例中，当描述模块声明中的 `requires` 和 `exports` 指令时，已经涉及了可读性的主题。要回顾可读性的概念，您可以回到“模块声明”部分的“requires\
  \ 子句”小节。我们尚未涉及的是隐含可读性的新概念。\n\n\n\n#### 隐式可读性\n\n隐式可读性指的是以下情况：\n\n*   第一个模块读取第二个模块。\n\
  *   第二个模块读取第三个模块。\n*   由于上述两个条件，第一个模块在逻辑上读取了第三个模块。\n\n假设有一个模块 B 使用了模块 C 中的某个类型（B\
  \ 读取 C）。如果另一个模块 A 读取了模块 B，并且也使用了模块 C 中的类型，那么在没有隐式可读性的情况下，模块 A 需要显式声明它也依赖模块 C。而利用隐式可读性，则无需在模块\
  \ A 中指定这一点。只需在模块 B 的 `module-info.java` 中声明它 `requires transitive` 模块 C 中的类型即可。这样一来，所有读取模块\
  \ B 中类型的模块都将自动能够访问模块 C 中的类型。\n\n图 4-11 展示了这三个模块对应的模块图，并说明了它们之间的可读性关系。\n\n![A431534_1_En_4_Fig11_HTML.gif](img/A431534_1_En_4_Fig11_HTML.gif)\n\
  \n图 4-11.\n\n展示隐式可读性的模块图\n\n代码清单 4-18 展示了模块 A 的模块描述符，它依赖模块 B。\n\n```\n// module-info.java\n\
  module A {\nrequires B;\n}\n代码清单 4-18.\n模块 A 的模块描述符\n```\n\n代码清单 4-19 展示了模块 B 的模块描述符，它通过\
  \ `requires transitive` 依赖模块 C。\n\n```\n// module-info.java\nmodule B {\nrequires\
  \ transitive C;\n}\n代码清单 4-19.\n模块 B 的模块描述符\n```\n\n模块 A 无需 `require` 模块 C，因为模块\
  \ B 已经 `requires transitive` 模块 C。因此，模块 A 可以自动访问模块 C 中的类型。\n\n注意\n\n隐式可读性是通过在模块声明中添加\
  \ `requires transitive` 语句，后跟当前模块所依赖的模块名称来实现的。\n\n图 4-12 展示了 `requires transitive`\
  \ 子句的语法。它接受一个模块名称作为参数。\n\n![A431534_1_En_4_Fig12_HTML.gif](img/A431534_1_En_4_Fig12_HTML.gif)\n\
  \n图 4-12.\n\nrequires transitive 子句的语法\n\n为了更好地理解，我们来看一个使用平台模块实现隐式可读性的例子。代码清单 4-20\
  \ 展示了平台模块 `java.desktop` 的模块声明，它定义了 `requires transitive` 子句以利用隐式可读性。\n\n```\n//\
  \ module-info.java\nmodule java.desktop {\nrequires transitive java.datatransfer;\n\
  requires transitive java.xml;\nrequires java.prefs;\nexports java.applet;\n...\n\
  }\n代码清单 4-20.\n模块 java.desktop 的模块描述符\n```\n\n代码清单 4-21 是位于模块 `java.desktop` 的包\
  \ `com.sun.beans.decoder` 中的类 `DocumentHandler` 的摘录：\n\n```\n// jdk/src/java.desktop/share/classes/DocumentHandler.java\n\
  package com.sun.beans.decoder;\nimport javax.xml.parsers.ParserConfigurationException;\n\
  import javax.xml.parsers.SAXParserFactory;\n...\npublic final class DocumentHandler\
  \ extends DefaultHandler {\n...\npublic void parse(final InputSource input) {\n\
  if ((this.acc == null) && (null != System.getSecurityManager())) {\nthrow new SecurityException(\"\
  AccessControlContext is not set\");\n}\nAccessControlContext stack = AccessController.getContext();\n\
  SharedSecrets.getJavaSecurityAccess().doIntersectionPrivilege(new PrivilegedAction()\
  \ {\npublic Void run() {\ntry {\nSAXParserFactory.newInstance().newSAXParser().parse(input,\
  \ DocumentHandler.this);\n}\ncatch (ParserConfigurationException exception) {\n\
  handleException(exception);\n}\ncatch (SAXException wrapper) {\nException exception\
  \ = wrapper.getException();\nif (exception == null) {\nexception = wrapper;\n}\n\
  handleException(exception);\n}\ncatch (IOException exception) {\nhandleException(exception);\n\
  }\nreturn null;\n}\n}, stack, this.acc);\n}\n}\n代码清单 4-21.\n来自模块 java.desktop 的类\
  \ DocumentHandler\n```\n\n如你所见，模块 `java.desktop` 中的类 `DocumentHandler` 使用了来自 `java.xml`\
  \ 模块的 `SaxParserFactory`。这表明模块 `java.desktop` 使用了模块 `java.xml` 中的类型，因此在模块 `java.desktop`\
  \ 和模块 `java.xml` 之间建立了可读性关系。\n\n如果我们在自己的模块描述符中添加对 `java.desktop` 模块的依赖，并尝试使用 `DocumentHandler`\
  \ 中的 `parse()` 方法，我们不仅试图访问模块 `java.desktop` 中的类型，还会访问模块 `java.xml` 中的类型。为了能够从我们自己的模块中访问该方法，模块\
  \ `java.desktop` 必须通过 `requires transitive` 依赖模块 `java.xml`。这样，我们的模块就可以利用隐式可读性，无需显式依赖即可访问模块\
  \ `java.xml` 中的类型。任何依赖模块 `java.desktop` 的模块都会自动依赖模块 `java.datatransfer` 和 `java.xml`，因为这两个模块都出现在模块\
  \ `java.desktop` 的模块描述符中。通过依赖模块 `java.desktop`，我们可以访问来自模块 `java.desktop`、`java.datatransfer`\
  \ 和 `java.xml` 的导出包。\n\n如果我们省略 `transitive` 关键字，仅使用 `requires` 指令，那么我们的模块将只能访问模块\
  \ `java.desktop` 中的类型，而无法访问 `java.xml` 中的类型。\n\n假设我们创建一个名为 `myModule` 的简单模块，它依赖模块\
  \ `java.desktop`。代码清单 4-22 展示了模块 `myModule` 的模块描述符。\n\n```\n// module-info.java\n\
  module myModule {\nrequires java.desktop;\n}\n代码清单 4-22.\n模块 myModule 的模块描述符\n```\n\
  \n图 4-13 展示了模块 `myModule` 的模块图，并说明了模块之间的可读性以及隐式可读性关系。\n\n![A431534_1_En_4_Fig13_HTML.gif](img/A431534_1_En_4_Fig13_HTML.gif)\n\
  \n图 4-13.\n\nmyModule 的模块图\n\n我们面临以下情况：\n\n*   `myModule` 依赖 `java.desktop`（图中用虚线表示可读性）。\n\
  *   `java.desktop` 模块通过 `requires transitive` 依赖模块 `java.datatransfer` 和模块 `java.xml`（图中用实线表示隐式可读性）。\n\
  \n我们的模块 `myModule` 无需显式依赖即可获得对模块 `java.datatransfer` 和 `java.xml` 的可读性。因此，它可以访问这两个模块中的类型，而无需担心需要专门声明对它们的依赖。\n\
  \n现在我们已经了解了什么是隐式可读性，接下来让我们看看限定导出是什么意思。\n\n\n\n### 限定导出\n\n一个模块可以将其所有包或一组包导出给所有模块。`exports`\
  \ 子句已得到增强，可以指定一个模块仅将其一组包导出给一组指定的模块。\n\n清单 4-23 是来自 `java.rmi` 模块的模块描述符的摘录。\n\n```\n\
  // module-info.java\nmodule java.rmi {\n...\nexports com.sun.rmi.rmid to java.base;\n\
  exports sun.rmi.registry to\njava.management;\nexports sun.rmi.server to\njava.management,\n\
  jdk.jconsole;\nexports sun.rmi.transport to\njava.management,\njdk.jconsole;\n}\n\
  清单 4-23.\njava.rmi 模块描述符摘录\n```\n\n包 `com.sun.rmi.rmid` 通过限定导出被导出到 `java.base` 模块。因此，它只能在\
  \ `java.base` 模块内部被访问。其他模块无法访问它。只有 `to` 子句后指定的模块才能访问该包。\n\n注意\n\n如果一个模块不读取另一个模块，则它无法访问该模块导出的包。即使该包是通过限定导出导出的，也是如此。\n\
  \n在 `module-info.java` 文件中定义限定导出所使用的语法如图 4-14 所示。\n\n![A431534_1_En_4_Fig14_HTML.gif](img/A431534_1_En_4_Fig14_HTML.gif)\n\
  \n图 4-14.\n\n限定导出语法 注意\n\n一个限定导出指令可以定义多个模块，用逗号分隔。相比之下，一个简单导出指令只能定义一个模块。\n\n在限定导出声明中禁止重复模块名称，如清单\
  \ 4-24 所示。\n\n```\n// module-info.java (com.apress.moduleA)\nmodule com.apress.moduleA\
  \ {\n}\n// module-info.java (com.apress.moduleB)\nmodule com.apress.moduleB {\n\
  exports com.apress.moduleB to com.apress.moduleA, com.apress.moduleA;\n}\n清单 4-24.\n\
  包含重复模块名称的限定导出\n```\n\n在这种情况下会发生编译失败：\n\n```\nError: duplicate export: com.apress.moduleA\
  \ exports com.apress.moduleB to com.apress.moduleA, com.apress.moduleA\n```\n\n\
  我们已经了解了什么是限定导出指令，以及它们与标准导出指令的区别。能够仅指定允许访问模块数据的特定模块是一个巨大的优势。模块不应该有义务将其包暴露给所有现有模块。\n\
  \n限定导出是强封装的一大优势。它们在 JDK 模块化过程中被广泛使用，并且存在于 JDK 内部的多个 `module-info.java` 文件中。\n\n\
  我们讨论了可访问性，并探讨了可读性、隐含可读性和限定导出的概念。接下来，让我们看看 Jigsaw 中引入的不同类型的模块。\n\n## 模块类型\n\nJigsaw\
  \ 定义了两种主要的模块类型：命名模块和未命名模块。命名模块又分为普通模块和自动模块。普通模块又进一步分为基础模块和开放模块。图 4-15 展示了模块的分类。\n\
  \n![A431534_1_En_4_Fig15_HTML.gif](img/A431534_1_En_4_Fig15_HTML.gif)\n\n图 4-15.\n\
  \nJPMS 中的模块分类\n\n首先，我们将讨论命名模块及其子类型，然后讨论未命名模块。\n\n### 命名模块\n\n命名模块包括模块系统中除未命名模块之外的所有模块。区分未命名模块和命名模块有两个重要方面。第一，未命名模块位于类路径上，而命名模块位于模块路径上。第二，未命名模块没有名称，而每个命名模块都有一个名称。命名模块可以是普通模块或自动模块。命名模块是在\
  \ `module-info.java` 模块描述符文件中使用名称声明的模块。每个在其 `module-info.java` 中有 `module <module_name>`\
  \ 形式声明的模块都是一个命名模块。这是模块被归类为命名模块必须满足的唯一条件。命名模块的例子包括所有平台模块，但我们自己的模块如果满足刚才提到的唯一条件，也可以归入此类。通过简单地向\
  \ JAR 文件添加一个 `module-info.class` 文件，就可以将其转换为命名模块。\n\n### 普通模块\n\n“普通”模块的概念并非官方存在。我们使用这个术语来定义非自动的命名模块。普通模块和自动模块的主要区别在于，普通模块有一个模块描述符\
  \ `module-info.java`，而自动模块没有。此外，普通模块由开发者显式声明，并在模块的模块描述符中声明模块的依赖关系。自动模块的模块描述符不是由开发者提供的。普通模块使用关键字\
  \ `module` 后跟模块名称来声明。本章到目前为止介绍的所有模块都是普通模块。默认情况下，普通模块不导出其任何包。除此之外，必须显式指定其 `exports`\
  \ 子句。`exports` 子句在编译时和运行时都导出包。普通模块包括基础模块和开放模块。\n\n### 自动模块\n\n自动模块是将 JAR 文件放置到模块路径后创建的模块。将自动模块与普通模块进行比较，有两个重要的区别：\n\
  \n*   默认情况下，自动模块需要系统中所有现有的模块，包括我们自己的所有模块、JDK 映像中的所有模块以及所有其他自动模块。\n*   默认情况下，自动模块导出其所有包。\n\
  \n自动模块可以访问类路径上的类型，尤其对第三方代码很有用。自动模块用于将现有应用程序迁移到 Java 9。第 8 章将更详细地讨论它们。\n\n注意\n\n\
  自动模块不是我们在模块描述符中显式声明的。它是在将 JAR 文件放入模块路径时自动创建的。\n\n### 基础模块\n\n我们将每个不是开放模块的命名模块称为基础模块。然而，“基础”模块这个术语在\
  \ JDK 9 中并非官方存在。我们用它来定义既不是自动模块也不是开放模块的命名模块。基础模块具有与普通模块相同的一组特征，只是它没有为深度反射开放。\n\n\n\
  \n### 开放模块\n\n在模块内部，其他模块的代码在编译时无法访问其包，即使使用深度反射也不行。然而，许多第三方库和框架在运行时使用反射来访问 JDK 的内部结构。因此，除非授予反射访问权限，否则所有这些框架都无法在\
  \ JDK 9 中工作。在 JDK 9 中，只有命名模块中的代码才能授予类路径上的代码反射访问权限。命名模块中的代码默认不会授予其他命名模块中的代码反射访问权限。因此，如果第三方库或框架位于类路径上，它们在\
  \ JDK 中默认拥有反射访问权限。如果它们位于模块路径上，则它们在 JDK 中没有反射访问权限。但是，要授予对模块中所有包的反射访问权限，该模块应声明为开放模块。\n\
  \n开放模块通过在关键字 `module` 前放置标识符 `open`，后跟模块名称来定义。\n\n开放模块使模块内的所有包都可用于深度反射。当我们说“所有包”时，指的是公共包和私有包。我们也可以选择是开放整个模块用于深度反射，还是仅开放特定包。当选择后者时，我们不将整个模块指定为开放，而只指定模块内的一个或多个包。关键字\
  \ `open` 可以放在模块名称附近，也可以放在模块描述符内部，以开放特定包。\n\n注意\n\n开放模块背后的原因是它们允许框架反射模块的内部结构，而使用基本模块则无法做到这一点。像\
  \ Spring、JPA 和 Hibernate 这样的框架需要在运行时拥有反射访问权限。\n\n清单 4-25 定义了一个名为 com.apress.myModule\
  \ 的开放模块，它需要两个 Spring 模块：spring.tx 和 spring.context。\n\n```\nopen module com.apress.myModule\
  \ {\nrequires spring.tx;\nrequires spring.context;\nexports com.apress.myModule.myPackage;\n\
  }\n清单 4-25.\n定义开放模块\n```\n\n关于上述示例，必须强调两个重要事实：\n\n*   模块 com.apress.myModule 中所有包的所有类型在运行时都可用于深度反射。\n\
  *   在编译时，只有包 com.apress.myModule.myPackage 中的公共和受保护类型是可访问的。\n\n因此，Spring 框架可以利用\
  \ `setAccessible()` 方法来访问 com.apress.myModule.myPackage 包的非公共元素。\n\n#### 使用开放模块启用核心反射\n\
  \n关于强封装原则，在 Java 9 中调用 `java.lang.reflect.AccessibleObject` 类的 `setAccessible()`\
  \ 方法时引入了一些限制。我们不能使用 `setAccessible()` 方法使其他模块中的私有字段或方法在我们的模块中可访问。但有一个解决方案可以使它们可访问：将目标模块声明为开放模块。\n\
  \n在以下示例中，我们有两个模块。来自目标模块的 `Employee` 类包含一个名为 `employeeName` 的私有 `String` 字段。我们希望将此字段设置为可从我们的第二个模块\
  \ testReflection 访问。\n\n清单 4-26 显示了目标模块的声明，该模块导出了其包。\n\n```\nmodule target {\nexports\
  \ target;\n}\n清单 4-26.\n模块 target 的 module-info.java\n```\n\n在清单 4-27 中，模块 testReflection\
  \ 读取了模块 target。\n\n```\nmodule testReflection {\nrequires target;\n}\n清单 4-27.\n\
  模块 testReflection 的 module-info.java\n```\n\n清单 4-28 显示了来自模块 target 的 `Employee`\
  \ 类，该类包含一个名为 `employeeName` 的私有类型：\n\n```\npackage target;\npublic class Employee\
  \ {\nprivate String employeeName = null;\npublic Employee(String employeeName) {\n\
  this.employeeName = employeeName;\n}\n}\n清单 4-28.\n类 Employee 的定义\n```\n\n`Main`\
  \ 类创建了一个 `Employee` 类型的对象，并调用其构造函数，将值 `\"John\"` 设置给 `employeeName`。之后，返回一个代表字段\
  \ `employeeName` 的 `Field` 对象，并在此字段上调用参数为 `true` 的 `setAccessible()` 方法，以使其在整个 testReflection\
  \ 模块中可访问。\n\n清单 4-29 显示了应用程序的 `Main` 类。\n\n```\npackage testReflection;\nimport\
  \ java.lang.reflect.*;\nimport target.*;\npublic class Main {\npublic static void\
  \ main(String[] args) {\nEmployee employee = new Employee(\"John\");\ntry {\nField\
  \ employeeField = Employee.class.getDeclaredField(\"employeeName\");\nemployeeField.setAccessible(true);\n\
  }\ncatch(NoSuchFieldException noSuchFieldException) {\n}\n}\n}\n清单 4-29.\n来自包 testReflection\
  \ 的 Main 类\n```\n\n我们编译两个模块内的代码，并指定编译后文件的位置在 out 目录中。清单 4-30 展示了使用 `--module-source-path`\
  \ 选项来指定所有扩展名为 .java 的文件都位于模块源路径上。\n\n```\njavac -d out --module-source-path src\
  \ $(find . -name \"*.java\")\n清单 4-30.\n使用 --module-source-path 标志编译文件\n```\n\n\
  清单 4-31 说明了用于运行我们模块的 `Main` 类的 `java` 命令。我们将 `Main` 类传递给 `--module` 选项，`--module-path`\
  \ 选项指向包含所有已编译类文件的 out 目录。\n\n```\n$ java --module-path out --module testReflection/testReflection.Main\n\
  清单 4-31.\n使用 --module 选项运行 Main 类\n```\n\n不幸的是，尝试运行我们的应用程序时会抛出异常，因为调用 `setAccessible()`\
  \ 方法失败。因此，我们无法使私有字段 `employeeName` 可访问。\n\n```\nException in thread \"main\" java.lang.reflect.InaccessibleObjectException:\
  \ Unable to make field private java.lang.String target.Employee.employeeName accessible:\
  \ module target does not \"opens target\" to module testReflection\nat java.base/jdk.internal.reflect.Reflection.throwInaccessibleObjectException(Reflection.java:424)\n\
  at java.base/java.lang.reflect.AccessibleObject.checkCanSetAccessible(AccessibleObject.java:198)\n\
  at java.base/java.lang.reflect.Field.checkCanSetAccessible(Field.java:171)\nat java.base/java.lang.reflect.Field.setAccessible(Field.java:165)\n\
  at testReflection/testReflection.Main.main(Main.java:14)\n```\n\n注意\n\n在此示例中，我们在两个模块\
  \ target 和 testReflection 之间具有可读性。但由于 Java 9 中引入的非常强大的强封装机制，在另一个模块的私有字段上调用 `setAccessible()`\
  \ 方法会抛出 `InaccessibleObjectException`。\n\n我们可以通过将目标模块定义为开放模块而不是强模块来非常轻松地解决此问题。在目标模块的私有字段上调用\
  \ `setAccessible()` 方法将会成功。私有字段 `employeeName` 现在可以在 testReflection 模块中访问。\n\n清单\
  \ 4-32 通过指定关键字 `open` 将目标模块定义为开放模块。\n\n```\nopen module target {\nexports target;\n\
  }\n清单 4-32.\n将目标模块定义为开放模块\n```\n\n注意\n\n你可以在文件夹 /ch04/CoreReflectionFail 中找到第一个示例的源代码，在文件夹\
  \ /ch04/CoreReflectionSucceed 中找到第二个示例的源代码。\n\n到目前为止，我们已经讨论了命名模块及其类型。接下来，我们将讨论未命名模块。\n\
  \n\n\n### 未命名模块\n\n顾名思义，未命名模块没有名称，也无需声明。它由类路径中的所有 JAR 文件或模块化 JAR 文件组成。所有这些 JAR 文件共同构成了未命名模块。Java\
  \ 平台模块系统首先在模块路径上搜索特定类型。模块路径的搜索优先级高于类路径。如果在模块路径上未找到该类型，则会在类路径上执行搜索。如果在类路径上找到了该类型，它将成为所谓未命名模块的一部分。我们使用单数术语“未命名模块”而非复数形式“未命名模块”，是因为每个类加载器对应的未命名模块是唯一的。每个类加载器只有一个唯一的未命名模块。\n\
  \n注意\n\n未命名模块与类加载器绑定。类加载器与未命名模块之间存在一一对应的关系。未命名模块可以读取 JDK 映像和模块路径上的所有命名模块。同时，它也会导出其所有包。\n\
  \n默认情况下，未命名模块会读取系统中所有的命名模块。这样一来，根据 Java 9 的可访问性规则，未命名模块可以访问所有已导出的命名模块中的包。反之则不成立，即命名模块无法读取未命名模块。如果我们尝试从模块路径访问类路径（即未命名模块）中的代码，编译将会失败。要成功访问，我们需要将未命名模块中的代码转换为自动模块。因此，我们需要将\
  \ JAR 文件从类路径中取出，并放置到模块路径上，使其成为自动模块。\n\n注意\n\n命名模块不能`requires`（依赖）未命名模块。\n\n所有未包含在命名模块中的类都隐式地包含在未命名模块中。未命名模块中包含的所有包默认对模块路径上的所有模块开放，这使得从模块路径对类路径进行反射访问成为可能。\n\
  \n### 可观察模块\n\n可观察模块并非一个独立的模块类别。这就是为什么我们没有将其纳入模块分类的原因。“可观察模块”这一术语用于指代系统中的所有模块：平台模块、库模块以及我们自己的模块。模块路径上的模块也属于可观察模块的一部分。\n\
  \n## 总结\n\n本章介绍了 Jigsaw 中模块这一新概念。我们学习了如何定义模块，并描述了代表模块描述符的新 `module-info.java` 文件的结构。\n\
  \n在模块描述符内部，可以使用五种类型的指令：`requires`、`exports`、`opens`、`uses` 和 `provides`。前三种指令在本章中已详细解释。我们了解了如何使用\
  \ `requires` 指令定义模块之间的依赖关系，以及如何使用 `exports` 指令指定模块导出哪些包。此外，我们还定义了几个模块，并在模块图中展示了它们之间的依赖关系。\n\
  \n我们提到了 `exports` 和 `opens` 子句之间的区别。`exports` 子句允许在编译时和运行时访问特定包中的公共类型。而 `opens`\
  \ 子句则允许在运行时通过反射访问特定包中的公共类型和私有类型。\n\n我们编译并运行了单个模块以及多个模块。为此，我们使用了模块路径这一新概念，以及新的命令行选项\
  \ `--module-source-path` 和 `--module-path`。接着，我们讨论了新的模块化 JAR，并描述了其内部结构。我介绍了 `jar`\
  \ 工具新增的功能，并展示了如何使用 `jar` 工具打包模块化 JAR。\n\n本章解释了三种现有的模块路径类型：应用程序模块路径、编译模块路径和升级模块路径。还讨论了模块解析过程以及\
  \ Java 9 中引入的新可访问性规则。我们描述了可读性、隐含可读性和限定导出等主题。\n\n本章最后描述了 Jigsaw 中不同类型的模块：普通模块、开放模块、命名模块、未命名模块、自动模块和可观察模块。我们强调，由于命名模块无法读取未命名模块，因此模块路径上的代码无法访问放置在类路径上的\
  \ JAR 内部的代码。\n\n在第 5 章中，你将学习模块化运行时映像。\n\n"
- '# 5. 模块化运行时映像


  在本章中，我们将研究 Java 9 中引入的新模块化运行时映像的结构，它在提高性能与可维护性方面带来了重要优势。另一方面，运行时映像的新格式并不一定能保证所有现有
  API 的功能完全一致。


  注意


  本章为信息性章节，描述了 JDK 9 中引入的模块化运行时映像的格式。


  ## 模块化运行时映像


  第 3 章展示了 JDK 中的源代码是如何围绕模块进行重构的。在本章中，我们将讨论在 Java 增强提案 220 中实现的新模块化运行时映像。由于模块的引入，该
  JEP 修改了 JDK 和 JRE 的结构。它还定义了模块化运行时映像的布局。


  Java 9 中模块的引入导致了 JDK 和 JRE 结构的重要变化。因此，引入了一种新的运行时格式。在 Java 9 中，可能的最小运行时仅由 `java.base`
  模块组成。JDK 9 映像不仅可以通过运行在 Java 9 上的工具访问，例如，也可以通过运行在 Java 8 上的工具访问。


  注意


  为了访问 JDK 和 JRE 中的类与资源，Java 9 中引入了一个辅助接口。


  另一个与模块不直接相关但与 JDK 相关的重要变化是，用新的运行时映像替换了 `rt.jar` 文件和 `tools.jar` 文件。


  注意


  Java 9 并未移除 JAR 文件，也不禁止使用它们。JAR 文件在 Java 9 中仍然可以正常工作。


  由于 JAR 文件可能引发许多问题，JCP 团队的意图是尽可能避免在 JDK 和 JRE 内部使用它们。


  ### Java 9 之前的运行时映像


  本节介绍 Java 9 版本之前的运行时映像结构。我们在第 2 章中已经讨论过，但现在我们将更详细地探讨。在 Java 9 之前，JDK 构建为我们提供了两种类型的运行时映像：Java
  运行时环境（JRE）映像和 Java 开发工具包（JDK）映像。


  #### Java 9 之前的 JRE 映像


  Java 运行时环境是 Java SE 平台的完整实现。JRE 映像由两个目录组成：`bin` 和 `lib`。


  `bin` 目录包含用于启动运行时系统的 `java` 命令，以及可执行二进制文件，例如 `javacp`、`java-rmi`、`javaw`、`javaws`、`keytool`、`pack200`、`rmid`、`rmiregistry`
  和 `servertool`。


  `lib` 目录比 `bin` 目录大，包含 `.properties` 和 `.policy` 文件。`ext` 目录位于 `lib` 目录内部，包含诸如 `nashorn.jar`、`sunec.jar`、`zipfs.jar`
  等 JAR 文件。最重要的一点是，在 `lib` 目录内我们可以找到 `rt.jar` 文件。在 Mac OS 和 Linux 操作系统上，`lib` 目录包含了运行时系统的动态链接本地库。




  #### Java 9 之前的 JDK 镜像


  另一方面，在 Java 9 之前，JDK 镜像包含了一个 JRE。它在 `jre` 子目录中有一份 JRE 的副本。一个 JDK 镜像包含许多目录，但其中最重要的三个是
  `lib`、`bin` 和 `include` 目录。


  注意


  JDK 镜像包含库和开发工具。


  `lib` 目录由包含 JDK 工具实现的 JAR 文件组成。`tools.jar` 文件（其中包含构成 `javac` 编译器的类）位于此 `lib` 目录中。`bin`
  目录包含命令行调试和开发工具，如 `javac`、`javadoc` 和 `jconsole`。`include` 目录包含 C 和 C++ 头文件，用于编译与运行时系统直接交互的原生代码。


  ### 为什么运行时镜像需要新格式？


  根据 OpenJDK 的说法，运行时镜像需要新格式有多种原因。首先，新的运行时格式比旧的 JAR 格式更强大。其次，新的运行时格式可以轻松增强，以容纳 Java
  类的预编译原生代码或预计算的 JVM 数据结构。第三，新的运行时格式可以存储来自应用程序模块、JDK 模块和库模块的类文件和资源文件。


  OpenJDK 在其网站上阐述了决定改造 JDK 和 JRE 的最重要原因：“为了在开发者、部署者和最终用户可以依赖并在适当时修改的文件，与属于实现内部且可能随时更改而无需通知的文件之间，划清界限。”


  OpenJDK 还列出了另外三个原因：


  *   “提供支持的方式来执行常见的操作，这些操作目前只能通过检查运行时镜像的内部结构来完成，例如，枚举镜像中存在的所有类”

  *   “实现对 JDK 类的选择性降权，这些类目前被授予了所有安全权限，但实际上并不需要这些权限”

  *   “保留行为良好的应用程序的现有行为，即不依赖于 JRE 和 JDK 运行时镜像内部方面的应用程序”


  ### Java 9 中的运行时镜像


  本节描述 Java 9 中引入的新运行时镜像的结构。


  #### JDK 和 JRE 的相同结构


  在 Java 9 中，JRE 和 JDK 具有相同的结构。这与旧版 Java 不同，如前所述，旧版 Java 中 JDK 和 JRE 之间存在明显区别。JDK
  镜像只是一个包含 JDK 开发工具的运行时镜像。


  曾经位于 `lib` 目录中的配置文件现在位于 `conf` 目录内。这些是我们可编辑的文件。`lib` 目录中的文件是运行时系统的实现细节。


  注意


  不应修改 `lib` 目录中的文件。


  #### 新运行时镜像的结构


  图 5-1 展示了 Java 9 中运行时镜像的新结构。


  ![A431534_1_En_5_Fig1_HTML.jpg](img/A431534_1_En_5_Fig1_HTML.jpg)


