  ## 摘要


  本章讨论了 Java 9 中引入的新模块 API，它为我们提供了访问模块及模块内部信息的手段。


  你了解了新模块 API 中包含的类、接口、枚举和异常类型。我们详细介绍了 `java.lang.Module` 类及其属性、构造器和方法。接着展示了 `java.lang.Class`
  类如何通过三个实用的方法得到增强。此外，还深入讲解了新的 `ModuleDescriptor` 类，不仅说明了其属性和方法，还介绍了它的嵌套类，如 `ModuleDescriptor.Requires`、`ModuleDescriptor.Exports`、`ModuleDescriptor.Opens`、`ModuleDescriptor.Provides`
  和 `ModuleDescriptor.Version`。我们讨论了新的 `ModuleReader` 和 `ModuleFinder` 接口，并通过示例演示了如何读取模块的内容。借助
  `ModuleFinder` 接口，我们搜索了 java.base 模块的所有实现类。找到这些类后，我们使用 `ClassLoader` 类的 `loadClass()`
  方法加载它们，然后显示了已加载的类名及其所属包名。


  随后，我们通过一些示例演示了如何对模块执行操作，例如获取某个类的模块、访问模块的资源，或在模块路径中搜索所有模块。本章最后讨论了一个 Java 类，它从 java.base
  模块中读取所有属性并将其打印到系统控制台。


  第 10 章将涵盖与 Jigsaw 相关的一些高级主题，包括层、类加载器、多版本 JAR 文件、JMOD 文件以及可升级模块。层也是模块 API 的一部分。


  '
- "# 10. 高级主题\n\n具有插件和容器架构的应用程序需要能够使用两个重要特性：动态配置和平台模块的运行时增强。这意味着此类应用程序必须能够在运行时加载新的附加模块，将它们绑定到现有应用程序的配置中，并在无需停止应用程序并重新编译的情况下使用它们。这类应用程序还需要能够在运行时映像被调用后加载和配置其他平台模块。Jigsaw\
  \ 以层的形式引入了这种支持。层是本章的主要主题之一。\n\n本章介绍 Java 9 模块化的一些高级主题。这些内容不适合放在其他章节，因此我们将其集中在此处，而不是为每个主题单独创建章节。\n\
  \n本章涵盖类加载器、层、JMOD 格式、多版本 JAR 文件以及可升级模块。我们还将简要介绍即将在后续 JDK 版本中推出的一些新特性，以及已修复的几个问题。\n\
  \n## JMOD 文件\n\n根据 JDK 9 文档，“为了对 JDK 进行模块化，一种名为 JMOD 的新工件格式超越了 JAR 文件，能够容纳原生代码、配置文件以及其他在\
  \ JAR 文件中难以自然存放的数据类型。”\n\nJMOD 文件是一种新的模块工件，它以 ZIP 文件的形式包含编译后的模块定义。它通过包含原生代码和配置文件来增强\
  \ JAR 文件。JMOD 是用于打包模块的新格式。这种新格式不可执行。\n\nJMOD 文件是第 4 章中介绍的模块化 JAR 文件的替代方案。它主要用于模块同时包含原生代码的情况。JMOD\
  \ 文件用于打包 JDK 的模块，但只能在编译时和链接时使用，不能在运行时使用。JMOD 文件也被 Jlink 工具用于创建模块化运行时映像。由 JMOD 文件组成的目录代表了链接器使用的模块路径。\n\
  \n### JMOD 工具\n\nJMOD 工具特别适用于以下用途：\n\n*   为标准模块或 JDK 特定模块创建 JMOD 文件\n*   列出现有 JMOD\
  \ 文件的内容\n\nJMOD 工具已得到扩展，以便能够将模块作为顶层目录中包含 `module-info` 的 JAR 文件进行安装。换句话说，JMOD 工具之于新的\
  \ JMOD 格式，类似于 jar 工具之于 JAR 格式。\n\n使用 `jmod` 命令可以创建新的 JMOD 归档文件：\n\n```\njmod create\
  \  \n```\n\n`jmod create` 命令会创建一个名为 <jmod-file> 的新 JMOD 归档文件。表 10-1 列出了 JMOD 工具的一些最重要选项，如\
  \ JDK 规范中所指定。</jmod-file>\n\n表 10-1. JMOD 工具提供的选项摘要\n\n| 选项 | 描述 |\n| --- | ---\
  \ |\n| `--class-path <path>` | 指定包含类的应用程序 JAR 文件。 |\n| `--config <path>` | 定义存放用户可编辑配置文件的目录，这些文件会被复制到\
  \ JMOD 文件中。 |\n| `--exclude <pattern-list>` | 匹配 `<pattern-list>` 的文件不会被复制到 JMOD\
  \ 文件中。`<pattern-list>` 以逗号分隔，可以采用以下格式之一：`<glob-pattern>`、`glob:<glob-pattern>` 或\
  \ `regex:<regex-pattern>`。 |\n| `--libs <path>` | 定义包含原生库的目录，这些库会被复制到 JMOD 文件中。\
  \ |\n| `--main-class <class-name>` | 定义 `main` 类。 |\n| `--module-version <module-version>`\
  \ | 定义模块版本。 |\n| `--module-path <path> 或 -p <path>` | 指定模块路径，用于查找其内容将被复制到 JMOD 文件中的模块。\
  \ |\n\n`jmod list` 命令会打印作为参数传入的 JMOD 文件中包含的所有条目名称：\n\n```\njmod list \n```\n\n`jmod\
  \ describe` 命令会打印作为参数传入的 JMOD 文件中所包含模块的详细信息：\n\n```\njmod describe \n```\n\n下一节将讨论多版本\
  \ JAR 文件的基础知识。\n\n\n\n## 多版本 JAR 文件\n\n假设你想切换到最新的 JDK 版本，但某个第三方库与最新版 JDK 不兼容。因此，你决定至少在所使用的第三方库与最新版\
  \ JDK 兼容之前，不进行切换。这是一个糟糕的场景，Java 9 通过引入多版本 JAR 文件解决了这个问题，它允许在单个 JAR 文件中打包适用于不同 JDK\
  \ 版本的代码。\n\n多版本 JAR 文件是在 JDK 9 中通过 JEP 238 实现的。这个 JEP 不属于 Jigsaw 项目。我们在此提及它，是因为它是一个有助于迁移到\
  \ Java 9 的重要特性。它完全不依赖于 Java 平台模块系统。我们也可以在非模块化环境中使用多版本 JAR 文件。\n\nJava 9 增强了 JAR\
  \ 文件格式，使得一个类的多个主要版本可以存储在单个 JAR 文件的 `META-INF` 目录中。这种新的 JAR 文件格式被称为多版本 JAR，它可以包含适用于不同\
  \ JDK 版本的单个库。在运行时，会根据用户使用的 JDK 版本加载正确的类版本。多版本 JAR 文件对 JAR 文件结构的改动很小。\n\n> **注意**\n\
  >\n> 普通 JAR 和模块化 JAR 都支持多版本 JAR 文件。\n\n列表 10-1 展示了一个包含 JDK 8 和 JDK 9 版本元数据的多版本 JAR\
  \ 文件。\n\n```\nJAR 根目录\n-   A1.class\n-   B1.class\n-   C1.class\n-   D1.class\n\
  -   E1.class\n-META-INF\n- MANIFEST.MF\n- versions\n\n- A1.class\n- B1.class\n-\
  \ F1.class\n\n- A1.class\n- C1.class\n- D1.class\n- F1.class\n- G1.class\n列表 10-1.\n\
  包含 JDK 8 和 JDK 9 版本元数据的多版本 JAR 文件\n```\n\n在这个例子中，Java `.class` 文件不仅存在于 JAR 的根目录，也存在于\
  \ `8` 和 `9` 目录中。在 `META-INF` 目录中，我们有 `MANIFEST.MF` 文件和一个名为 `versions` 的目录，该目录包含两个子目录：一个名为\
  \ `8` 的目录，代表为 JDK 8 提供的资源；另一个名为 `9` 的目录，代表为 JDK 9 提供的资源。`8` 目录和 `9` 目录中都包含 Java\
  \ `.class` 文件。当我们使用 JDK 8 时，会考虑 `8` 目录中的类；当我们使用 JDK 9 时，会考虑 `9` 目录中的类。\n\n在以下情况下，会考虑\
  \ JAR 文件根目录中的类：\n\n*   如果我们使用的 JDK 版本不是 JDK 8 或 JDK 9\n*   如果我们使用 JDK 8 或 JDK 9，但\
  \ `versions/8` 和 `versions/9` 目录中不存在相应的类\n\n我们将对此进行详细解释。对于刚刚讨论的多版本 JAR 文件，我们首先需要知道我们使用的\
  \ JDK 版本是否支持多版本 JAR 文件。如果不支持，那么 `versions/8` 和 `versions/9` 目录中的所有内容都将被忽略，只会考虑根目录中的类文件：`A1.class`、`B1.class`、`C1.class`、`D1.class`\
  \ 和 `E1.class`。\n\n当我们使用的 JDK 版本不是 JDK 8 或 JDK 9 时，只会使用根目录中的类文件。在我们的例子中，仅存在于 `versions/9`\
  \ 目录中的类 `F1` 和 `G1` 将完全不会被使用。\n\n当我们使用 JDK 8 时，将使用以下类：\n\n```\nA1.class (来自 versions/8\
  \ 目录)\nB1.class (来自 versions/8 目录)\nC1.class (来自根目录)\nD1.class (来自根目录)\nE1.class\
  \ (来自根目录)\nF1.class (来自 versions/8 目录)\n```\n\n相反，当我们使用 JDK 9 时，将使用以下类：\n\n```\n\
  A1.class (来自 versions/9 目录)\nB1.class (来自根目录)\nC1.class (来自 versions/9 目录)\nD1.class\
  \ (来自 versions/9 目录)\nE1.class (来自根目录)\nF1.class (来自 versions/9 目录)\nG1.class (来自\
  \ versions/9 目录)\n```\n\n从这个例子可以看出，特定 `8` 或 `9` 目录中的类（如果存在）会覆盖根目录中的类。但这仅在我们分别使用\
  \ JDK 8 或 JDK 9 时才会发生。\n\n`module-info.class` 文件也可以添加到多版本 JAR 文件的 `versions` 目录中。`jar`\
  \ 工具支持此功能。但是，`module-info.class` 不能放在根目录中。\n\n> **注意**\n>\n> Java 编译器、Java 类文件反汇编器和\
  \ JDeps 都能够处理多版本 JAR 文件。\n\n多版本 JAR 文件在其 `MANIFEST.MF` 中声明了一个名为 `Multi-Release`\
  \ 的属性，并将其设置为 true：\n\n```\nMulti-Release: true\n```\n\n该属性用于区分多版本 JAR 和非多版本 JAR。如果该属性设置为\
  \ false 或缺失，则为普通 JAR。\n\n多版本 JAR 文件保留了 JAR 文件的结构。多版本 JAR 新增的是一个名为 `versions` 的目录，位于\
  \ `META-INF` 目录下。此目录可以包含针对特定 JDK 主要版本的子目录：6、7、8、9 等。在这些子目录中，我们可以放置特定于该 JDK 版本的 `.class`\
  \ 文件。\n\n> **注意**\n>\n> 多版本 JAR 文件仅支持 JDK 的主要版本。次要版本或安全更新版本不能放入多版本 JAR 文件中。\n\n\
  如果某个 JDK 版本不支持多版本 JAR 文件，会发生什么？在这种情况下，只有 JAR 文件根目录中的类和资源是可见的。`versions` 目录中的所有内容都将不可见，并且隐式地不被考虑。\n\
  \n> **注意**\n>\n> Jlink 已得到增强，支持创建包含打包为多版本 JAR 文件的模块的镜像。Jlink 会将正确版本的类添加到 Jimage\
  \ 中。\n\n接下来，我们将解释如何构建多版本 JAR 文件。\n\n### 构建多版本 JAR 文件\n\n多版本 JAR 文件是使用 `jar` 工具及其新的\
  \ `--release` 命令行选项构建的。语法如下：\n\n*   `<version_number>` 代表 JDK 的主要版本号。\n*   `<options>`\
  \ 代表一组其他选项。\n\n```\njar --create --file --release  \n```\n\n假设我们有一个仅在 JDK 9 中受支持的类。我们想要构建一个多版本\
  \ JAR 文件，并将这个特定类放在 `versions/9` 目录中——其他所有内容都应放在根目录中。为此，我们使用 `--release` 选项并指定版本（在我们的例子中是\
  \ 9），以及包含将被放入 `versions/9` 目录的类的目录位置（在我们的例子中是 `classesDirectoryJDK9`）：\n\n```\n\
  jar --create --file myMultiReleaseJar.jar -C classesDirectoryJDK8 --release 9 -C\
  \ classesDirectoryJDK9 .\n```\n\n此命令通过执行以下操作来创建多版本 JAR 文件：\n\n*   从 `classesDirectoryJDK8`\
  \ 目录中获取所有文件，并将它们放入多版本 JAR 文件的根目录。\n*   从 `classesDirectoryJDK9` 目录中获取所有文件，并将它们放入多版本\
  \ JAR 文件的 `versions/9` 目录。\n\n我们现在知道如何通过为特定的 JDK 主要版本指定不同的源来创建多版本 JAR 文件。接下来，让我们了解如何更新多版本\
  \ JAR 文件。\n\n### 更新多版本 JAR 文件\n\n可以使用 `jar` 工具，通过在 `versions` 目录中添加不同版本的模块描述符来更新多版本\
  \ JAR 文件。因此，我们使用 `jar` 工具的 `--update` 选项。\n\n我们更新之前创建的多版本 JAR 文件，并添加一些特定于即将到来的 JDK\
  \ 10 的类：\n\n```\njar --update --file myMultiReleaseJAR.jar --release 10 -C classesDirectoryJDK10\
  \ .\n```\n\n多版本 JAR 被更新，`classesDirectoryJDK10` 目录的内容被放置在一个名为 `versions/10` 的新目录中。这个新目录将在\
  \ JDK 10 中被考虑。\n\n\n\n## JDK 9 中的类加载机制\n\n本节将介绍 JDK 9 中的类加载机制。如你所知，类加载器的作用是加载类。JCP\
  \ 团队并未在 JDK 9 中改变类加载过程。`Classloader` API 在 JDK 9 中也未被修改。JDK 9 中保留了与 JDK 8 相同的类加载器：启动类加载器、平台类加载器和应用程序类加载器。\n\
  \nJDK 9 中的类加载过程与之前版本的 JDK 相同：首先，加载类型的请求被委托给父类加载器。父类加载器再进一步委托给其父类加载器。此过程会依次经过应用程序类加载器和平台类加载器，最终到达启动类加载器。如果启动类加载器无法加载该类型，则发起委托过程的类加载器将负责加载该类型。\n\
  \n通过审视构成 JDK 9 的结构层次，我们可以观察到 Java 平台模块系统（JPMS）位于 JVM 之上、类加载架构之下。最底层是 Java 虚拟机（JVM）。其上是\
  \ JPMS，再往上则是前面提到的三种类型的类加载器。此架构在图 10-1 中清晰展示。\n\n![A431534_1_En_10_Fig1_HTML.gif](img/A431534_1_En_10_Fig1_HTML.gif)\n\
  \n图 10-1.\n\nJDK 9 结构概览\n\n启动类加载器用于定义来自大多数模块的类，例如 `java.base`、`java.sql` 或 `java.logging`。平台类加载器用于定义仅来自少数模块的类，例如\
  \ `java.corba` 或 `java.transaction`。启动类加载器和平台类加载器都从平台模块加载类型，而应用程序类加载器则从模块路径加载类型。应用程序类加载器用于定义来自\
  \ `jdk.compiler`、`junit`、`guava`、`slf4j` 等模块的类。在 JDK 9 中，应用程序和平台类加载器不再是 `java.net.URLClassLoader`\
  \ 类的实例。\n\nJigsaw 允许使用我们自己的类加载器来加载模块。这可以通过 `Module` 类中的 `defineModules()` 方法实现，但此功能相当高级，因此不会有太多开发者使用它。\n\
  \n注意\n\n每个模块在运行时都有一个类加载器。\n\nJigsaw 还引入了对类加载器名称的支持。类加载器可以有可选的名称。如果在创建类加载器时未指定名称，则它将没有名称。类加载器的名称通过\
  \ `Classloader` 类的 `getName()` 方法获取。在警告消息或堆栈跟踪中，模块的类加载器名称总是与模块名称和版本一起提及。\n\n注意\n\
  \nJigsaw 使用现有的类加载器，不会创建自己的类加载器。\n\n由于在 JDK 9 中类加载器可以拥有名称属性，因此为 `Classloader` 类添加了一个新的构造函数，该构造函数通过使用指定的父类加载器进行委托，来创建一个具有指定名称的新类加载器：\n\
  \n```\nprotected ClassLoader(String name, Classloader parent)\n```\n\nJigsaw 还允许你借助新的\
  \ `findClass()` 方法在特定模块中按名称查找类，该方法接收模块名称和类的二进制名称作为参数：\n\n```\nClass findClass(String\
  \ moduleName, String name)\n```\n\n此方法返回 `Class` 对象，如果找不到该类则返回 null。如果我们为模块传递了一个名称，那么该方法将始终返回\
  \ null。否则，它将通过传递类的名称来调用 `findClass(name)` 方法。在模块化上下文中，除非我们拥有支持从模块加载的自定义类加载器实现，否则此方法用处不大。然后我们可以重写此方法。\n\
  \n注意\n\n类加载器可以升级以加载模块中的类型。\n\n在 JDK 9 中，扩展类加载器被重命名为平台类加载器。内置平台类加载器的名称是 `platform`。新的静态方法\
  \ `getPlatformClassLoader()` 返回一个平台类加载器，通过它可以看见所有内置的 Java SE 和 JDK 类型。此方法会检查权限，并可能抛出\
  \ `SecurityException` 异常。\n\n如果同时满足以下两个条件，一个类加载器可以从多个模块加载类型：\n\n*   每个模块中的所有类型仅由一个类加载器加载。\n\
  *   模块之间相互独立，互不冲突。\n\n为了确保向后兼容性，可以从类路径加载类型。每个类加载器都有一个唯一的未命名模块，该模块通过位于 `java.lang.Classloader`\
  \ 类中的新方法 `getUnnamedModule()` 获取。如果类加载器加载的类型未在命名模块中定义，则该类型位于未命名模块中。当这些类型位于任何已知模块都未定义的包中时，来自应用程序类加载器的未命名模块会从类路径加载这些类型。\n\
  \n### ClassLoader 类中的新方法\n\n以下是 Java 9 在 `ClassLoader` 类中添加的方法：\n\n*   `Class<?>\
  \ findClass(String moduleName, String className)`\n*   `URL findResource(String\
  \ moduleName, String resourceName)`\n*   `String getName()`\n*   `ClassLoader getPlatformClassLoader()`\n\
  *   `Module getUnnamedModule()`\n\n接下来，我们将探讨在 JDK 9 中引入的关键概念——层。\n\n\n\n## 层\n\n\
  假设我们想在运行时向应用程序添加几个新模块。我们无法在编译时就知道所需的所有模块，因此需要能够在运行时后期添加新模块。幸运的是，Java 平台模块系统通过一个名为“层”的新概念为此提供了解决方案。层对一组模块进行分组，用于在运行时向应用程序添加新模块。JDK\
  \ 9 API 规定，层将图中的每个模块映射到负责加载该模块中定义的类型的唯一类。因此，层用于查找类加载器，以便为模块图加载类。\n\n并非所有应用程序都使用层。使用层的应用程序是那些实现容器架构的应用程序，其中模块在运行时被动态添加和链接。在现有层之上，容器应用程序可以创建一个新层。它通过将应用程序的初始模块与一组可观察的模块（例如来自较低层的非平台模块、可具有不同版本的可升级平台模块、不同的服务提供者等）进行解析来实现这一点。尽管如此，容器应用程序可能需要一个与运行时环境中已存在的模块版本不同的模块。这可以在\
  \ Jigsaw 中使用层引入的强大功能来实现。\n\n注意\n\n层允许使用一个模块的多个版本。\n\n层是在运行时根据模块图构建的。每个层具有以下内容：\n\
  \n*   一个配置，由位于 `java.lang.module` 包中的 `Configuration` 类的实例表示。\n*   一个将每个模块映射到类加载器的函数，由位于\
  \ `java.lang` 包中的 `ClassLoader` 类的实例表示。\n\n根据 JDK 9 API 规范，配置“封装了作为解析输出的可读性图。它是解析或带服务绑定的解析的结果。”以下部分将讨论配置。\n\
  \n注意\n\n一个模块可以读取其自身层以及层层次结构中位于其下方的任何层中的模块。\n\n层可以构建成类似于栈的层次结构。它们可以在引导层之上创建，其他层可以在先前创建的层之上创建，依此类推。Java\
  \ 虚拟机具有引导层，这是 JPMS 使用的基本层和第一个层。\n\n注意\n\n每个 Java 9 模块化应用程序至少有一个层。每个层（空层除外）都有一个或多个父层。层没有名称。\n\
  \n来自模块 `java.base` 中 `java.lang` 包的 `ModuleLayer` 类表示一个层的实例。通过调用 `Module` 上的 `getLayer()`\
  \ 方法可以获得 `ModuleLayer` 对象。模块层仅包含命名模块。因此，如果我们在未命名模块上调用 `getLayer()` 方法，则返回 `null`。否则返回一个\
  \ `ModuleLayer` 对象：\n\n```\nModuleLayer moduleLayer = module.getLayer();\n```\n\n\
  接下来，我们将介绍引导层，它是最重要的层。\n\n### 引导层\n\n引导层由引导类加载器、平台类加载器和应用程序类加载器组成。引导层中的模块被映射到引导类加载器、平台类加载器和应用程序类加载器。引导层将模块映射到加载器。例如，它将\
  \ `java.base` 模块映射到引导类加载器。\n\n注意\n\n大多数应用程序除了引导层外不使用任何其他层。\n\nJVM 在启动时创建引导层。这是在一个称为“解析”的过程中完成的。应用程序的根模块及其依赖项被一起解析。在所有模块被解析后，引导层包含模块图。\n\
  \n在大多数情况下，引导层就足够了。它默认包含 `java.base` 模块。引导层中的模块被映射到引导类加载器和 JVM 中的其他现有类加载器。\n\n可以通过在\
  \ `ModuleLayer` 类上调用静态方法 `boot()` 来检索引导层：\n\n```\nModuleLayer bootLayer = ModuleLayer.boot();\n\
  Set modulesSet = bootLayer.modules();\n```\n\n方法 `boot()` 返回引导层，一个 `ModuleLayer`\
  \ 类型的对象。为了从引导层获取模块集，我们在生成的 `bootLayer` 对象上调用了方法 `modules()`。\n\n要从引导层获取我们模块 `com.apress.myModule`\
  \ 的 `Module` 对象，我们可以使用 `ModuleLayer` 类的 `findModule()` 方法：\n\n```\nOptional myModule\
  \ = bootLayer.findModule(\"com.apress.myModule\");\n```\n\n我们还可以通过调用 `Module` 对象上的\
  \ `getResourceAsStream()` 方法来获取用于从我们的模块读取资源的 `InputStream`：\n\n```\nInputStream\
  \ inputStream = myModule.getResourceAsStream(resourceName);\n```\n\n该方法的参数必须是标识资源的由\
  \ `/`（正斜杠）分隔的路径。\n\n现在我们已经了解了引导层是什么，让我们继续讨论配置这个新概念。\n\n### 配置\n\n根据 JDK 9 API 规范，“配置封装了作为解析输出的可读性图。”为了检索配置，`ModuleLayer`\
  \ 类定义了一个名为 `configuration()` 的方法，该方法返回此层的配置。\n\n在 Jigsaw 中，配置是独立且与其他配置隔离的。它也可以关联到其他动态创建的配置，而不仅仅是初始配置。尽管如此，配置允许您包含和使用与封闭配置中已有的非平台模块和可升级平台模块不同的多个版本。这是\
  \ JDK 9 中配置带来的一个非常强大的特性。\n\n`Configuration` 类位于 `java.base` 模块的 `java.lang.module`\
  \ 包中。根据 JDK 9 API 规范，其最重要的方法如下：\n\n*   `Set<ResolvedModule> modules()`：返回此配置中已解析模块的不可变集合。\n\
  *   `Configuration resolve(ModuleFinder before, ModuleFinder after, Collection<String>\
  \ roots)`：通过解析一组根模块来创建一个新配置，并将此配置作为其父配置。第一个参数表示用于查找模块的主模块查找器。如果找不到模块，则使用作为第二个参数传递的模块查找器搜索模块。第三个参数表示要解析的模块名称的集合。该集合也可以为空。\n\
  *   `Optional<ResolvedModule> findModule(String name)`：在此配置中查找已解析的模块。它接收我们想要查找其\
  \ `ResolvedModule` 对象的模块名称作为参数。\n*   `List<Configuration> parents()`：返回此配置的父配置列表。\n\
  *   `Configuration resolveAndBind(ModuleFinder finder, Collection<String> roots,\
  \ boolean check, PrintStream output)`：使用服务绑定解析一组根模块。它用于创建引导层的配置。\n\n#### 创建配置\n\n\
  要创建新配置，我们通常将引导层的配置作为父配置。要获取引导层的配置，我们在引导层上调用方法 `configuration()`：\n\n```\nConfiguration\
  \ configuration = ModuleLayer.boot().configuration()\n```\n\n注意\n\n在 JVM 中，每个模块层都是根据配置创建的。\n\
  \n接下来，我们将展示如何使用配置解析模块。\n\n\n\n#### 通过配置解析模块\n\n要通过配置解析模块，我们需要使用前面描述的 `resolve()`\
  \ 方法。在以下示例中，我们解析名为 `com.apress.myModule` 的模块。为此，我们使用引导层的配置作为父配置，如清单 10-2 所示。\n\n\
  ```\nPath ourDirectory = ...;\nModuleFinder finder = ModuleFinder.of(ourDirectory);\n\
  Configuration parentConfiguration = ModuleLayer.boot().configuration();\nConfiguration\
  \ configuration = parentConfiguration.resolve(finder, ModuleFinder.of(), Set.of(\"\
  com.apress.myModule\");\n清单 10-2.\n通过配置解析模块 com.apress.myModule\n```\n\n### 创建层\n\
  \n在本节中，我们将了解如何创建层。这并非一个困难的过程。新的模块 API 在 `ModuleLayer` 类中提供了一些有用的方法来创建层，正如官方 JDK\
  \ 9 API 规范所指定的那样：\n\n*   `ModuleLayer defineModules(Configuration cf, Function<String,\
  \ Classloader> clf)`：通过将给定 `Configuration` 中的模块定义到 JVM，创建一个新的模块层，并以当前层作为其父层。第二个参数表示将模块名称映射到类加载器的函数。它返回新创建的\
  \ `ModuleLayer`。\n*   `ModuleLayer defineModulesWithManyLoaders(Configuration cf,\
  \ ClassLoader parentLoader)`：创建一个新的模块层，以当前层作为其父层。每个模块都被定义到由该方法创建的自己的 `Classloader`\
  \ 中。第二个参数表示由该方法创建的每个类加载器的父类加载器。\n*   `ModuleLayer defineModulesWithOneLoader(Configuration\
  \ cf, ClassLoader parentLoader)`：类似于上述方法。唯一的区别是，此方法创建一个类加载器，并将所有模块定义到该类加载器。\n\n\
  如您所见，为了创建一个模块层，我们需要传递一个 `Configuration` 对象和一个 `ClassLoader` 对象。在上一节中，我们学习了如何通过解析模块\
  \ `com.apress.myModule` 并以其引导层的配置作为父配置来创建 `Configuration` 对象。现在我们知道如何获取 `Configuration`，就可以使用配置中的模块创建一个新层，如清单\
  \ 10-3 所示。\n\n```\nModuleLayer parentLayer = ModuleLayer.boot();\nClassLoader classLoader\
  \ = ClassLoader.getSystemClassLoader();\nModuleLayer layer = parent.defineModulesWithOneLoader(configuration,\
  \ classLoader)\n清单 10-3.\n创建一个模块层\n```\n\n我们使用了之前创建的 `configuration` 对象，并将其传递给 `defineModuleWithOneLoader()`\
  \ 方法。我们还传递了通过 `getSystemClassLoader()` 方法获取的系统类加载器。\n\n注意\n\n大多数情况下，自定义创建的层的父层是引导层。\n\
  \n由于某些类加载约束，Jigsaw 必须对模块图施加约束。因此，只有不包含循环的模块图才能转换为层。\n\n### 从层中获取已加载的模块\n\n从层中获取已加载的模块非常简单。在\
  \ `ModuleLayer` 对象上，调用 `modules()` 方法，该方法返回此层中已加载模块的集合。清单 10-4 展示了如何从引导层获取所有模块并打印它们的名称。\n\
  \n```\nModuleLayer moduleLayer = ModuleLayer.boot();\nmoduleLayer.modules().stream().forEach(module\
  \ -> {\nString moduleName = module.getName();\nSystem.out.println(\"Name of the\
  \ module is: \" + moduleName);\n});\n清单 10-4.\n打印引导层中模块的名称\n```\n\n以下是打印输出的摘录。我们不会完整展示，因为它太长了：\n\
  \n```\nName of the module is: jdk.javadoc\nName of the module is: jdk.deploy\nName\
  \ of the module is: javafx.graphics\nName of the module is: java.security.jgss\n\
  Name of the module is: jdk.editpad\nName of the module is: java.compiler\nName of\
  \ the module is: jdk.jdeps\nName of the module is: jdk.packager\nName of the module\
  \ is: java.management.rmi\nName of the module is: javafx.swing\nName of the module\
  \ is: jdk.attach\nName of the module is: java.desktop\nName of the module is: jdk.unsupported\n\
  Name of the module is: javafx.fxml\n...\n```\n\n注意\n\n你可以在目录 /ch10/layers 中找到此示例的源代码。\n\
  \n下一个示例展示了如何打印系统中存在的所有层的信息。\n\n### 在运行时描述层\n\n清单 10-5 展示了当前模块层及其父层。\n\n```\npackage\
  \ modulelayer;\nimport java.lang.ModuleLayer;\nimport java.util.List;\npublic class\
  \ LayerUtil {\npublic static void describeCurrentAndParentLayers() {\n// 打印当前层的层信息\n\
  ModuleLayer thisModuleLayer = LayerUtil.class.getModule().getLayer();\nprintLayerInformation(thisModuleLayer);\n\
  // 获取该层的所有父层\nList parentModuleLayerList = thisModuleLayer.parents();\nif(parentModuleLayerList.isEmpty())\
  \ {\nSystem.out.println(\"This layer has no parent layers\");\n}\nelse {\nfor(ModuleLayer\
  \ moduleLayer : parentModuleLayerList) {\nprintLayerInformation(moduleLayer);\n\
  }\n}\n}\nprivate static void printLayerInformation(ModuleLayer moduleLayer) {\n\
  System.out.println(\"The name of the modules in this layer are: \" + moduleLayer.toString());\n\
  System.out.println(\"The configuration for this layer: \" + moduleLayer.configuration());\n\
  }\npublic static void main(String[] args) {\ndescribeCurrentAndParentLayers();\n\
  }\n}\n清单 10-5.\n描述当前模块层及其父层\n```\n\n首先，我们打印当前层的信息。我们通过在当前模块上调用 `getLayer()` 方法来获取它。之后，我们通过在当前层上调用\
  \ `parents()` 方法来获取该层的父层。如果结果列表为空，则我们的层没有父层。否则，如果结果列表只有一个元素，并且该元素是空层，那么我们的层没有任何父层，因此我们打印相应的消息。最后，我们遍历父层列表，并打印它们包含的模块名称以及配置。\n\
  \n注意\n\n空层不包含任何模块。当两个模块具有相同的包名时，Java 平台模块系统无法将这两个模块加载到同一层中。即使该包是私有的，也是如此。\n\n我们已经介绍了层的基础知识。是时候继续前进，介绍可升级模块的概念了。\n\
  \n\n\n## 可升级模块\n\n如果一个模块可以通过部署在升级模块路径上来进行升级，那么它就是可升级的。JPMS 会在链接时和运行时执行检查，以确保只允许升级可升级模块。\n\
  \n在 Java SE 模块中，唯一可升级的模块是来自 `java.se.ee` 模块的那些。可升级模块包括 `java.activation`、`java.compiler`、`java.corba`、`java.transaction`、`java.xml.bind`、`java.xml.ws`、`java.xml.ws.annotation`\
  \ 和 `jdk.internal.vm.compiler`。JDK 中的几个标准模块也是可升级的。\n\n`javac` 和 `java` 提供了一个名为 `--upgrade-module-path`\
  \ 的命令行选项，该选项接受一个目录列表。这些目录包含用于替换运行时映像中现有模块的模块。例如，要升级 JAXB，我们可以执行以下命令：\n\n```\njava\
  \ --upgrade-module-path myDirectory --add-modules java.xml.bind\n```\n\n这里，`myDirectory`\
  \ 代表一个包含将替换现有模块的模块的目录。\n\n注意\n\n即使使用命令行选项 `--patch-module`，也无法升级不可升级的模块。不可升级模块是链接到运行时映像中的模块。\n\
  \n要升级运行时映像中的模块，可以将模块部署在升级模块路径上。自动模块也可以部署在升级模块路径上。但自动模块无法升级，因为可升级模块是链接到运行时映像中的，而自动模块则不是。\n\
  \n注意\n\n可升级模块取代了 JDK 9 中旧的“认可标准机制”。\n\n## 下个版本即将推出的功能\n\nJDK 的下一个版本将带来一些功能。JCP 团队宣布，下一个版本将解决我们目前面临的两个问题，并增加两项新功能。即将在下一个版本中推出的新功能如下：\n\
  \n*   **多模块 JAR 文件**：目前，一个模块化 JAR 文件只能包含一个模块。不允许包含多个模块。在实践中，我们可能会有包含不同功能片段的大型 JAR\
  \ 文件，这些片段无法归入单个模块。因此，在单个模块化 JAR 文件中包含多个模块会更好。\n*   **额外的模块层操作**：`ModuleLayer.Controller`\
  \ API 将通过新增方法（如 `addUses()` 和 `addPackage()`）得到增强。\n\n将在下一个版本中解决的问题如下：\n\n*   **隐藏包冲突**：此问题已在第\
  \ 8 章中介绍。问题在于两个不同的模块不能共享同一个包名。JCP 团队提出的建议是通过重新设计来避免隐藏包冲突，以便包含冲突包的模块将在它们自己的类加载器中加载。\n\
  *   **循环模块依赖关系**：此问题也已在第 8 章中介绍。针对下一个 JDK 版本的提议是允许模块在运行时存在循环依赖关系。\n\n## 总结\n\n本章开始时，我们探讨了新的\
  \ JMOD 文件以及 `jmod` 工具。然后，我们讨论了多版本 JAR 文件，它代表一个单一的 JAR 文件。因此，它们只是一个发布单元，可以用于例如替换\
  \ JDK 内部 API。如果在 Java 8 中使用了 JDK 内部 API，我们可以在 JDK 9 中提供一个替换它的新类，并将两个类文件都放在一个多版本\
  \ JAR 文件中。引入多版本 JAR 文件是为了能够使用特定版本的 JDK，即使某些第三方库尚未升级到最新版本。它们有助于第三方库使用来自较新 Java 版本的\
  \ API 特性。\n\n此外，我们解释了 Java 平台模块系统上下文中“层”的新概念。我解释了什么是层，为什么它们有用，以及如何创建我们自己的层。如果应用程序使用层，它可能只会使用引导层。我介绍了\
  \ JDK 9 中的类加载机制，并解释了它如何与新的模块系统协同工作。我们了解到，Jigsaw 并未强制规定类加载器和模块之间存在任何关系。\n\n本章最后讨论了可升级模块以及即将在下一个\
  \ JDK 版本中推出的一些功能。\n\n在第 11 章中，你将学习如何对模块化应用程序进行单元测试。\n\n"
- "# 11. 测试模块化应用程序\n\n到目前为止，你应该对 Project Jigsaw 有了深入的了解，并且应该能够在你的项目中开始使用它。但还有一个重要的话题我们尚未提及：单元测试。本章重点介绍\
  \ Java 9 中模块化应用程序的单元测试以及你可以采用的不同方法。在本章中，我们将向你展示在模块化应用程序的背景下，在 Java 9 中执行单元测试的一些最佳实践。\n\
  \n假设我们有一个模块，其中包含需要测试的类。如果我们将单元测试类放在另一个模块中，那么我们需要让单元测试能够访问被测试模块中的类型。这就涉及到了 JDK 9\
  \ 中引入的强封装机制。一种解决方案是添加 `--add-exports` 标志，使被测试模块中的类型对单元测试可用。但这还不够，因为还必须要求被测试模块中的类型是公开的。如果不是，那么导出包并不能提供我们所需的可访问性级别。这只是我们在\
  \ Java 9 中执行单元测试之前必须解决的众多挑战之一。\n\n为了达到所需的软件质量水平，在模块化应用程序中执行单元测试是必要的，而且这比测试非模块化应用程序更为关键。Java\
  \ 9 中的单元测试比 Java 9 之前的版本稍微复杂一些，因为在 Java 9 中，我们必须确保 Junit 测试类与被测试对象之间的可读性。对于被测试的类，Junit\
  \ 测试类的位置可以有多种不同的组合。它们可以位于同一个模块中、不同的模块中、类路径上，或者部分位于模块路径上、部分位于类路径上。下一节将更详细地探讨这些场景。\n\
  \n## Java 9 中的单元测试场景\n\n如前所述，根据 Junit 测试类和被测试对象的位置，JDK 9 中的单元测试可能有不同的场景。在 JDK 9\
  \ 的单元测试过程中，可能会出现以下常见场景：\n\n*   Junit 测试类和测试对象位于不同的模块中。\n*   Junit 测试类不在模块中，但测试对象在模块中。\n\
  *   Junit 测试类和测试对象都位于同一个模块中。\n\n这三种场景中的每一种都必须区别对待，并且需要不同的方法来确保 Junit 测试用例与被测试对象之间的可读性。以下小节将详细讨论每一种场景。\n\
  \n\n\n### 场景 1：Junit 测试类与被测类型位于不同模块\n\n假设被测类型位于模块 A，而 Junit 测试类位于模块 B。这是最简单的场景之一。图\
  \ 11-1 展示了这一情况。\n\n![A431534_1_En_11_Fig1_HTML.gif](img/A431534_1_En_11_Fig1_HTML.gif)\n\
  \n图 11-1.\n\nJunit 测试类与被测类位于不同模块\n\n首先，我们需要确保两个模块之间的可读性。模块 A 应导出其包。模块 B 应依赖模块 A，并同时导出其包。这样，模块\
  \ B 就能访问模块 A 中的公共类型。此外，由于模块 B 使用了 Junit 自动模块，因此在其模块声明中也需要依赖该自动模块。\n\n要使此场景生效，还需注意一个重要事项。当我们从模块\
  \ B 运行 Junit 测试用例时，需要使用 `java` 启动器的 `--add-modules` 标志来添加所有现有模块（包括自动模块）。在我们的案例中，需要添加模块\
  \ B 以及 Junit 的依赖项——自动模块 `hamcrest.core`。这基本上就是使此场景正常运行所需的全部操作。本章稍后将展示一个使用此场景的示例。\n\
  \n### 场景 2：仅被测类型位于模块内\n\n第二个场景是最复杂的。在此场景中，被测类型位于模块 A，但 Junit 测试类并不位于任何模块中——它们位于类路径上。为此，我们必须使用\
  \ `javac -Xmodule` 和 `java` 启动器的 `--patch-module` 命令行选项。这两个选项将在本章后面详细描述。图 11-2 展示了这一场景。\n\
  \n![A431534_1_En_11_Fig2_HTML.gif](img/A431534_1_En_11_Fig2_HTML.gif)\n\n图 11-2.\n\
  \n被测类型位于模块内，Junit 测试用例位于类路径上\n\n首先，我们必须像编译模块 A 的一部分那样编译 Junit 测试类（使用 `javac -Xmodule`\
  \ 选项）。这样，我们就将 Junit 测试类纳入了模块 A。其次，我们必须使用 `javac --add-reads` 命令行选项来添加对 Junit 的读取边。这是强制性的，因为现在模块\
  \ A 依赖于 Junit。由于模块 A 并未读取 Junit，我们必须使用 `--add-reads` 命令行选项来告知它读取 Junit。同时，我们还需要使用\
  \ `javac --add-modules` 选项来添加 Junit 自动模块。\n\n要使此场景生效，在运行 Junit 测试类时，我们必须使用 `java`\
  \ 启动器的 `--patch-module` 命令行选项，以便修补模块 A。因此，我们使用 `ALL-MODULE-PATH` 常量在运行时将 Junit 测试类纳入模块\
  \ A。如果目前对此场景的工作原理还不清楚，不必担心。本章稍后你将看到此场景的实际应用，届时我们将解释所使用的新命令行选项。\n\n### 场景 3：Junit\
  \ 测试类与被测类型位于同一模块\n\n在此场景中，类型之间具有隐式可读性。这种情况的缺点在于，我们的模块需要所有测试依赖项。为每个需要单元测试的模块引入测试库的依赖项，显然不是最佳解决方案。如果我们有十个模块需要测试，那么所有模块都需要单独添加测试依赖项。\n\
  \n现在我们已经了解了在 Java 9 中执行单元测试时可能遇到的最常见场景，接下来让我们继续探讨 Java 编译器的 `-Xmodule` 命令行选项和前面在第二个场景中提到的\
  \ `--patch-module` 命令行选项。它们用于使用类来修补模块。\n\n## -Xmodule 选项\n\nJava 编译器的命令行选项 `-Xmodule`\
  \ 用于为某个模块编译类。图 11-3 描述了其语法。\n\n![A431534_1_En_11_Fig3_HTML.gif](img/A431534_1_En_11_Fig3_HTML.gif)\n\
  \n图 11-3.\n\n`javac -Xmodule` 命令行选项的语法\n\n`-Xmodule` 选项指定我们应该像编译模块 <module_name>\
  \ 的一部分那样编译这些类。此选项在编译时用于将类注入到模块中，不能在运行时使用。使用 `-Xmodule` 选项，我们可以使类成为特定模块的一部分。如果作为参数传递的模块不存在，则会抛出错误\
  \ `module not found`：\n\n```\nerror: module not found: \n```\n\n注意\n\n无法列出多个模块。你不能为\
  \ `-Xmodule` 命令行选项指定多个模块名称。\n\n## --patch-module 选项\n\nJDK 9 规范指出：“在测试或调试时，有时需要用替代或实验版本替换特定模块的选定类文件或资源，或者提供全新的类文件、资源甚至包。这可以通过\
  \ `--patch-module` 选项实现。”\n\n`--patch-module` 选项在编译时和运行时均可使用，用于用其他特定于类的类文件替换模块的类文件。它既可以被\
  \ Java 编译器使用，也可以被 `Java` 启动器使用。`--patch-module` 选项的作用是覆盖模块内部的类。此选项取代了旧的 `-Xbootclasspath/p`\
  \ 选项，后者已在 Java 9 中被移除。\n\n图 11-4 展示了 `--patch-module` 命令行选项的语法。\n\n*   `<module_name>`\
  \ 代表模块名称。\n*   `<file>` 代表模块定义的文件系统路径名。\n*   `<path_separator>` 代表宿主平台的路径分隔符。\n\n\
  ![A431534_1_En_11_Fig4_HTML.gif](img/A431534_1_En_11_Fig4_HTML.gif)\n\n图 11-4.\n\
  \n`--patch-module` 选项的语法\n\n由 `<module_name>` 指定的模块将使用目录 <file> 中存在的类文件进行修补。我们也可以指定一个普通的\
  \ JAR（非模块化 JAR）来代替包含类文件的目录。</file>\n\n注意\n\n`--patch-module` 可用于在运行时使测试类成为模块的一部分。JCP\
  \ 团队指出，它“仅用于测试和调试。强烈不鼓励在生产环境中使用。”\n\n`--patch-module` 命令行选项也可用于修补自动模块，但不能用于替换 `module-info.class`\
  \ 文件，正如 JCP 团队在规范中所述：“`--patch-module` 选项不能用于替换 `module-info.class` 文件。如果在修补路径上的模块定义中找到了\
  \ `module-info.class` 文件，则会发出警告，并且该文件将被忽略。”JCP 团队还告诉我们未导出包的情况：“如果在修补路径上的模块定义中发现的包尚未被该模块导出，那么它仍然不会被导出。可以通过反射\
  \ API 或 `--add-exports` 选项显式导出。”\n\n\n\n### 修补模块\n\n以下示例展示了如何修补模块内部的类。这意味着我们用另一个\
  \ Java 类文件替换模块内的一个 Java 类文件。为此，我们将使用 `javac` 命令行选项 `-Xmodule` 和 `java` 命令行选项 `--patch-module`。我们将使用\
  \ `--patch-module` 选项修补一个现有模块，你将看到两种实现方式。因此，我们创建四个文件夹：\n\n*   modules 文件夹\n*   modulesLibrary\
  \ 文件夹\n*   patchModules 文件夹\n*   patchModulesLibrary 文件夹\n\n我们有一个模块 com.apress.moduleA，它包含一个名为\
  \ `Employee.java` 的 POJO 类，以及另一个名为 `EmployeeImpl.java` 的类，该类创建了一个 `Employee` 类型的对象并为其设置了一些属性。还有一个模块\
  \ com.apress.moduleB，它包含了 public static void `main(String[] args)` 方法。该模块简单地创建了一个\
  \ `EmployeeImpl` 类型的对象，然后调用该对象的一些方法。此外，我们定义了另一个名为 `EmployeeImpl.java` 的 Java 类，其包名与之前的\
  \ `EmployeeImpl.java` 类的包名相同。这个新类不属于任何模块。我们的意图是使用前面描述的 `-Xmodule` 和 `--patch-module`\
  \ 命令行选项，用这个新类替换 com.apress.moduleA 模块中的旧类。\n\n清单 11-1 展示了 com.apress.moduleA 模块的\
  \ `Employee.java` 和 `EmployeeImpl.java` 类。`Employee.java` 类位于包 com.apress.moduleA.entity\
  \ 中。\n\n```\n// Employee.java\npackage com.apress.moduleA.entity;\npublic class\
  \ Employee {\nprivate String firstName;\nprivate String lastName;\nprivate String\
  \ department;\npublic Employee() {\n}\npublic String getFirstName() {\nreturn firstName;\n\
  }\npublic void setFirstName(String firstName) {\nthis.firstName = firstName;\n}\n\
  public String getLastName() {\nreturn lastName;\n}\npublic void setLastName(String\
  \ lastName) {\nthis.lastName = lastName;\n}\npublic String getDepartment() {\nreturn\
  \ department;\n}\npublic void setDepartment(String department) {\nthis.department\
  \ = department;\n}\n}\n// EmployeeImpl.java\npackage com.apress.moduleA;\nimport\
  \ com.apress.moduleA.entity.Employee;\npublic class EmployeeImpl {\npublic Employee\
  \ employee;\npublic EmployeeImpl() {\n}\npublic Employee createNewEmployee() {\n\
  employee = new Employee();\nreturn employee;\n}\npublic Employee setEmployeeInfo()\
  \ {\nemployee = createNewEmployee();\nemployee.setFirstName(\"John\");\nemployee.setLastName(\"\
  Anderson\");\nemployee.setDepartment(\"IT\");\nreturn employee;\n}\npublic void\
  \ getEmployeeInfo() {\nSystem.out.println(\"Employee first name is: \" + employee.getFirstName());\n\
  System.out.println(\"Employee last name is: \" + employee.getLastName());\nSystem.out.println(\"\
  Employee department is: \" + employee.getDepartment());\n}\n}\n清单 11-1.\n来自 com.apress.moduleA\
  \ 模块的 Employee.java 和 EmployeeImpl.java 类\n```\n\n清单 11-2 展示了模块 com.apress.moduleA\
  \ 的模块描述符，该描述符导出了包。\n\n```\nmodule com.apress.moduleA {\nexports com.apress.moduleA;\n\
