  前面的三个代码清单展示了紧耦合的情况，其中 `Customer` 类实例化了其他类的对象，并随后调用了这些对象的方法。这导致 `Customer` 类与其使用的其他类之间存在非常高的依赖级别。主要问题在于，`CurrentAccount`、`DepositAccount`
  或 `SavingsAccount` 类中的任何变更，最终都可能迫使我们修改 `Customer` 类。例如，如果 `CurrentAccount` 的构造函数发生了变化，我们就会遇到问题。为了解耦本例中的这些类，我们应该修改代码，使
  `Customer` 类不再依赖于 `CurrentAccount`、`DepositAccount` 和 `SavingsAccount` 类的具体实现。因此，我们将使用一个接口，使得
  `Customer` 类仅依赖于该接口。并且，我们将只在 `Main` 类中实例化其他依赖项，而不再像之前那样在 `Customer` 类中进行实例化。


  代码清单 1-4 定义了接口 `AccountInterface`，其中包含了方法的定义。


  ```

  // AccountInterface.java

  package com.apress.looseCoupling;

  public interface AccountInterface {

  void depositMoney(long amount);

  long getDeposit();

  }

