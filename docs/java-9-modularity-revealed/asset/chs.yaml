  `java.base` 模块的 `ModuleReference`。我们使用 `isPresent()` 方法验证是否找到了 `ModuleReference`。接着，我们在
  `ModuleReference` 对象上调用 `descriptor()` 方法来获取模块描述符。`ModuleDescriptor` 对象包含模块的全面信息，例如其名称、`main`
