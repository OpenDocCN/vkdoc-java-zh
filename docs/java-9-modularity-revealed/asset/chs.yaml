  package com.apress.tightcoupling;

  public class CurrentAccount {

  long deposit;

  public void depositMoney(long amount) {

  deposit = amount;

  }

  public long getDeposit() {

  return deposit;

  }

  }

  // DepositAccount.java

  package com.apress.tightcoupling;

  public class DepositAccount {

  long deposit;

  public void depositMoney(long amount) {

  deposit = amount;

  }

  public long getDeposit() {

  return deposit;

  }

  }

  // SavingsAccount.java

  package com.apress.tightcoupling;

  public class SavingsAccount {

