- '# 2. 项目拼图（Project Jigsaw）


  本章介绍项目拼图。它阐述了项目拼图的核心内容，展示了 Java 过去遇到的一些问题，并讨论了构成项目拼图的 Java 增强提案。本章解释了项目拼图的目标，以便我们理解
  JCP 团队决定为 Java 平台引入新模块系统的原因。同时，本章还涵盖了强封装和可靠配置等概念。


  ## JDK 9 之前 Java 的弱点


  图 2-1 展示了来自 OpenJDK 官方网站 [`http://openjdk.java.net/projects/jigsaw/doc/jdk-modularization.html`](http://openjdk.java.net/projects/jigsaw/doc/jdk-modularization.html)
  的 JDK 7 模块图。基础模块显示在正中央。由于类之间存在大量依赖关系，无法将这个庞大的单体拆分成更小的部分。除此之外，访问限定符无法提供足够的手段来完全隐藏类的实现。它们的作用范围是有限的。例如，在
  JDK 7 中，如果我们想使用 System 控制台打印“Hello world!”，除了基础模块之外，我们还需要大量的包。


  ![A431534_1_En_2_Fig1_HTML.jpg](img/A431534_1_En_2_Fig1_HTML.jpg)


  图 2-1.


  JDK 7 中的模块图


  JAR（Java 归档）文件是包含类文件和其他资源的 ZIP 文件。一个或多个 JAR 文件被放置在类路径上，但类路径并不为其包含的 JAR 文件提供封装。这意味着
  JAR 文件中的每个类都可以被其他所有类访问，这构成了一个安全漏洞。你可以把类路径想象成一行，JAR 文件在其中从左到右被线性搜索。JAR 文件不是能够为其包含的类提供模块化的组件。


  JDK 8 中引入的紧凑配置文件是完整 Java SE 平台的一个子集。这三个紧凑配置文件分别称为 compact 1、compact 2 和 compact
  3。每个紧凑配置文件所包含的包列表可以在 Oracle 网站上找到。紧凑配置文件只是迈向平台模块化的一小步。通过聚合标准包来获得 JDK 的三个不同版本，并不是社区在模块化方面所期望的。除此之外，紧凑配置文件不隐藏其内部实现，因此并未给
  Java 平台的安全性带来任何改进。


  在 Java 9 之前，显式依赖也是一个巨大的问题。通过将源代码打包到 JAR 文件中并放置在类路径上，无法以编程方式定义运行该 JAR 文件需要哪些其他 JAR
  文件。由于 Java 没有解决这个问题，出现了一些流行的构建工具，包括 Maven 和 Gradle。


  ### 弱封装


  为了实现封装，Java 9 之前的版本使用了众所周知的访问修饰符：private、protected、public 和无修饰符。private 访问修饰符限制性最强，它使得外部无法访问内部数据。protected
  访问修饰符表示该成员只能被其所在类的子类（在另一个包中）或同一包中的类访问。public 访问修饰符使得数据在任何地方都可访问。不使用访问修饰符意味着仅在同一包内可访问。


  然而，封装存在一些局限性。不可能让一个类型对外部包可访问，同时又限制所有其他现有包对其访问。要使该类型对外部包可访问，唯一的方法就是将其标记为 public，尽管将其定义为
  public 会破坏封装，并使其对所有现有包都公开。使用 Java 9 之前的版本，无法达到理想的封装级别。


  ### JAR 地狱问题


  在 JDK 9 之前，开发 Java 应用程序的标准方式是将所有必要的库和 JAR 文件直接放在类路径上。这种方法可能会引发 JAR 地狱问题。


  在 JDK 9 之前，运行时环境会在几个位置进行搜索以加载类。其中一个搜索位置是类路径，它包含由 Java 虚拟机加载的类文件列表。在类路径上搜索类很简单。类加载器通过遍历类路径上列出的所有
  JAR 文件来搜索类。它不考虑预定义的顺序，只是从头搜索到尾。它也不考虑类路径上类的内部结构方面。Java 无法考虑 JAR 文件之间的边界。所有 JAR 文件中的所有类都被放置在类路径上，JAR
  文件之间的边界消失了。一个 JAR 中的每个类型都可以访问任何其他 JAR 中的所有公共类型。因此，代码无法被封装以隐藏起来，防止外部使用。


  我们举个例子。假设一个库的作者在库中有一些内部代码，这些代码从未打算被外部使用。由于没有封装，每个人都可以访问这些内部代码——更糟糕的是，可以提供依赖于这些内部代码的自有实现。如果库的作者决定对其库的内部代码进行一些更改，那么依赖于该库的代码可能会遇到问题。


  JAR 地狱是 JDK 9 之前常见的难题。如果类路径上有多个不同版本的库，并且每个库都依赖于另一个库，那么就说类路径上存在 JAR 地狱问题。当一个包不是依赖于另一个包，而是仅依赖于该包的某个版本时，就会发生这种所谓的依赖地狱。考虑到所使用的环境，依赖地狱有不同的变体。JAR
  地狱的问题在于，类路径上可能存在冲突，尤其是当它包含许多 JAR 文件时。例如，一个库可能在类路径上有两个或更多不同版本的特定类。类路径并不是最佳解决方案，因为
  JAR 文件不是组件，因此我们无法确切知道是否有缺失或冲突。


  如果在类路径上找不到某个特定的类，就会触发运行时异常——不是在应用程序启动时，而是在稍后的某个时刻，由于用户执行了某个操作，导致缺失的类被调用时。运行时环境在必须访问依赖项之前，没有能力识别所有现有的依赖项。最好能在应用程序启动时立即显示所有错误，而不是在稍后的某个时刻。




  ## 什么是 Project Jigsaw？


  Project Jigsaw 代表了 Java 9 中引入的新的可扩展模块系统的实现。它是在 Open JDK 下开发的，Open JDK 是 Java 平台标准版的免费开源实现。为
  Java SE 平台新设计的模块系统的目标是将 JDK 模块化，并将该模块系统应用于 JDK 本身。Jigsaw 将 Java SE 平台模块化。


  将 Java 平台模块化的过程是一项复杂且艰巨的工作。必须做出大量困难的设计决策。平台的模块化是一个巨大的变化，对整个生态系统产生了重大影响。它引入了模块的新概念，并显著改变了我们使用
  Java 编程语言开发软件应用程序的方式。模块被置于前台，是 Project Jigsaw 所基于的关键概念。整个编程技术都必须进行调整，以适应这个新引入的概念。


  Project Jigsaw 始于 2008 年的探索阶段。构成 Java 平台模块系统的 JEP 是从 2014 年开始创建的。Project Jigsaw
  最初计划用于 Java 7 版本，但由于其复杂性，它没有被包含在 JDK 7 版本中，并被推迟到 JDK 8 版本。随后，Java 社区流程将其推迟到 Java
  9。尽管在撰写本文时，Project Jigsaw 的正式发布计划于 2017 年 9 月，但早期访问版本已在 Open JDK 网站上提供很长时间，以便社区能够测试并向
  JDK 开发人员提供宝贵的反馈。


  Project Jigsaw 由六个 JEP 和一个 JSR 组成。JSR 376 被称为 Java 平台模块系统。它指定了构建 Java 平台模块化版本的标准规范。表
  2-1 列出了属于 Project Jigsaw 的其他六个 JEP。


  表 2-1.


  用于开发 Java 平台系统的 JDK 增强提案 (JEP)


  | JEP 编号 | JEP 名称 | 范围 |

  | --- | --- | --- |

  | JEP 200 | 模块化 JDK | 标准版 |

  | JEP 201 | 模块化源代码 | 实现 |

  | JEP 220 | 模块化运行时映像 | 标准版 |

  | JEP 260 | 封装大多数内部 API | Java 开发工具包 |

  | JEP 261 | 模块系统 | 标准版 |

  | JEP 282 | jLink：Java 链接器 | Java 开发工具包 |


  以下是每个 JEP 的简短描述。它们将在后续章节中进行更深入的介绍：


  *   **JEP 200——模块化 JDK**：此 Java 增强提案将 JDK 划分为一组模块。JDK 被模块化，源代码被组织成模块。有两种不同类型的模块：标准模块（名称以
  `java.` 开头）和 JDK 模块（名称以 `jdk.` 开头）。随着 JDK 模块化格式的改变，出现了一个新的模块图（如第 3 章所示）。有关 JDK 模块化的更多信息，也可在第
  3 章中找到。

  *   **JEP 201——模块化源代码**：此 JEP 定义了 JDK 构建和源代码如何围绕模块进行重组（在第 3 章中详细讨论）。

  *   **JEP 220——模块化运行时映像**：JEP 220 介绍了新的模块化运行时映像以及添加的增强功能，以便我们可以构建自定义的模块化运行时映像。JRE
  和 JDK 的二进制结构已更改。该 JEP 在第 5 章中讨论。

  *   **JEP 260——封装大多数内部 API**：JEP 260 指的是封装非关键内部 API 的过程。本书的许多章节都涵盖了此 JEP。

  *   **JEP 261——模块系统**：JEP 261 代表了新模块系统的实现。

  *   **JEP 282——jLink：Java 链接器**：此 JEP 创建了一个工具，用于将一组模块组装成一个自定义运行时映像（在第 7 章中讨论）。


