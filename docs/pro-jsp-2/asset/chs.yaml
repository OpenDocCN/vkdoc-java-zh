  \ %>`、`<%! %>` 或 `<%= %>` 标签内）中，你可以使用标准的 Java 注释：\n\n<%\n\n/* 这个 Java 注释以斜杠星号开头，一直持续到遇到结束的星号斜杠为止。\n\
  \n*/\n\n// 以双斜杠开头的注释会持续到行尾。\n\n%>\n\n513-0 appa.qxd 11/16/05 9:10 PM 第 635 页\n\n\
  附 录 A ■ J AVA 服 务 器 页 面 语 法 参 考\n\n**635**\n\n**指令**\n\n指令是向 JSP 容器发出的关于页面属性、导入标签库以及在\
  \ JSP 中包含内容的指令。由于指令是指导性信息而非输入输出过程，它们不能通过输出流产生任何输出。\n\n**page 指令**\n\npage 指令为页面指定属性——所有属性都是可选的，因为基本属性都有默认值，以粗体显示。\n\
  \n<%@ page language=\" **java**\"\n\nextends=\"package.class\"\n\nimport=\"package.class,\
  \ package.*, ...\"\n\nsession=\" **true**|false\"\n\nbuffer=\"none|**default**|sizekb\"\
  \n\nautoFlush=\" **true**|false\"\n\nisThreadSafe=\" **true**|false\"\n\ninfo=\"\
  展示标签的示例 JSP\"\n\nisErrorPage=\"true|**false**\"\n\nerrorPage=\"ErrorPage.jsp\"\n\
  \ncontentType=\"TYPE|\n\nTYPE; charset=CHARSET|\n\n**text/html; charset=ISO-8859-1**\"\
  \n\npageEncoding=\" **default**\"\n\nisELIgnored=\"true|**false**\"\n\ndeferredSyntaxAllowedAsLiteral=\"\
  true|**false**\"\n\ntrimDirectiveWhitespaces=\"true|**false**\"\n\n%>\n\n• 默认缓冲区大小至少定义为\
  \ 8 KB。\n\n• errorPage 属性包含错误页面的相对 URL，如果当前页面出现未处理的错误，将跳转到该错误页面。\n\n• 指定的错误页面文件必须声明\
  \ isErrorPage=\"true\" 才能访问 Exception 对象。以下是可用于错误页面的代码示例：\n\n<%@ page language=\"\
  java\"\n\nisErrorPage=\"true\" %>\n\n<html>\n\n<body>\n\n<!-- 显示异常的完全限定名称 -->\n\n\
  <%= exception.toString() %>\n\n<br>\n\n<!-- 显示异常的描述性消息 -->\n\n<%= exception.getMessage()\
  \ %>\n\n</body>\n\n</html>\n\n该页面将打印出接收到的错误消息。\n\n513-0 appa.qxd 11/16/05 9:10 PM\
  \ 第 636 页\n\n**636**\n\n附 录 A ■ J AVA 服 务 器 页 面 语 法 参 考\n\n• contentType 属性设置响应的\
  \ MIME 类型和字符集。定义 JSP 页面标准语法时，默认值为 text/html；以 XML 格式实现 JSP 文档时，默认值为 text/xml。\n\n\
  • pageEncoding 属性定义 JSP 页面的字符编码。默认值为 contentType 属性中指定的编码，如果未指定，则为 \"ISO-8859-1\"\
  。\n\n• isELIgnored：设置 EL 支持。默认值为 false，表示页面中启用 EL。此属性的值会覆盖 web.xml 中指定的值。\n\n• deferredSyntaxAllowedAsLiteral\
  \ 属性配置是否将 #{ 视为延迟 EL 语句的开头或字面量。\n\n• trimDirectiveWhitespaces 属性配置是否从模板文本中修剪空白。\n\
  \n**taglib 指令**\n\n标签库是用于扩展 JSP 容器功能模型的标签集合。taglib 指令为页面定义一个标签库命名空间，将标签库描述符（TLD）的\
  \ URI 映射到一个前缀，该前缀可用于引用此页面中来自该库的标签。\n\n<%@ taglib uri|tagdir=\"/WEB-INF/taglib.tld\"\
  \ prefix=\"tagPrefix\" %>\n\n\n\n<tagPrefix:tagName attributeName=\"attributeValue\"\
  \ > JSP 内容\n\n</tagPrefix:tagName>\n\n<tagPrefix:tagName attributeName=\"attributeValue\"\
  \ /> 您应假设标签库描述符定义了一个名为 tagName 的元素。tagdir 属性表示此前缀用于标识安装在 /WEB-INF/tags/ 目录或其子目录中的标签扩展。如果指定目录中存在\
  \ tld 文件，则使用该文件；否则，将使用隐式标签库。如果 tagdir 属性的值不以 /WEB-INF/tags/ 开头，则必须发生翻译错误。如果该值指向一个不存在的目录，则必须发生翻译错误。如果与\
  \ uri 属性一起使用，则必须发生翻译错误。\n\n**include 指令**\n\n有两种 include 标签——include 指令和 jsp:include\
  \ 动作。include 指令在翻译时包含一个静态文件，将该文件中的任何 JSP 内容添加到此页面以进行运行时处理：\n\n<%@ include file=\"\
  header.html\" %>\n\n513-0 appa.qxd 11/16/05 9:10 PM 第 637 页\n\n附录 A ■ Java 服务器页面语法参考\n\
  \n**637**\n\n**标签文件**\n\n标签文件中可用的指令与 JSP 页面中使用的指令不同。page 指令不允许在标签文件中使用。taglib 和\
  \ include 指令可以在标签文件中使用。有三个指令仅在标签文件中有效，如下所列：\n\n• tag\n\n• attribute\n\n• variable\n\
  \ntag 指令\n\n请注意，page 指令本身不在标签文件中使用，而是使用 tag 指令，该指令只能在标签文件中使用。tag 指令如下所示：\n\n<%@\
  \ tag\n\ndisplay-name=\"display-name\"\n\nbody-content=\"**scriptless**|tagdependent|empty\"\
  \n\ndynamic-attributes=\"name\"\n\nsmall-icon=\"small-icon\"\n\nlarge-icon=\"large-icon\"\
  \n\ndescription=\"description\"\n\nexample=\"example\"\n\nlanguage=\"scriptingLanguage\"\
  \n\nimport=\"importList\"\n\npageEncoding=\"peinfo\"\n\nisELIgnored=\"true|**false**\"\
  \n\ndeferredSyntaxAllowedAsLiteral=\"true|**false**\"\n\ntrimDirectiveWhitespaces=\"\
  true|**false**\"\n\n%>\n\n以下是一个 tag 指令示例：\n\n<%@ tag name=\"msg\"\n\ndisplay-name=\"\
  Message\"\n\nbody-content=\"scriptless\"\n\ndynamic-attributes=\"true\"\n\nsmall-icon=\"\
  /WEB-INF/small-icon.jpg\"\n\nlarge-icon=\"/WEB-INF/large-icon.jpg\"\n\ndescription=\"\
  标签指令的简单用法\"\n\n%>\n\n513-0 appa.qxd 11/16/05 9:10 PM 第 638 页\n\n**638**\n\n附录 A\
  \ ■ Java 服务器页面语法参考\n\nattribute 指令\n\nattribute 指令类似于标签库描述符中的 `<attribute>` 元素，允许声明自定义动作属性。\n\
  \n<%@ attribute\n\nname=\"attribute-name\"\n\nrequired=\"true|**false**\"\n\nfragment=\"\
  true|**false**\"\n\nrtexprvalue=\" **true**|false\"\n\ntype=\"type\"\n\ndescription=\"\
  description\"\n\ndeferredValue=\"true|false\"\n\ndeferredValueType=\"type\"\n\n\
  deferredMethod=\"true|false\"\n\ndeferredMethodSignature=\"signature\"\n\n%>\n\n\
  variable 指令\n\nvariable 指令类似于标签库描述符中的 `<variable>` 元素，定义了标签处理器向调用页面公开的变量的详细信息。\n\
  \n<%@ variable\n\n( name-given=\"output-name\" |\n\n(name-from-attribute=\"attr-name\"\
  \ alias=\"local-name\" ) ) variable-class=\"output-type|**String**\"\n\ndeclare=\"\
  \ **true**|false\"\n\nscope=\"AT_BEGIN|AT_END|**NESTED**\"\n\ndescription=\"description\"\
  \n\n%>\n\n**脚本元素**\n\n脚本元素用于在 JSP 中包含 Java 代码片段：声明变量和方法、执行任意 Java 代码以及显示 Java 表达式的结果。\n\
  \n**声明**\n\n以下语法允许您为页面声明变量和方法。这些声明被放置在生成的 servlet 中 _jspService() 方法之外；换句话说，此处声明的变量将成为\
  \ servlet 的实例变量，此处声明的方法将成为 servlet 的实例方法。声明不会产生任何输出。\n\n以下是声明变量的示例：\n\n<%! String\
  \ message; %>\n\n以下代码声明一个变量并初始化它：\n\n<%! String message = \"variable declared\"\
  ; %>\n\n513-0 appa.qxd 11/16/05 9:10 PM 第 639 页\n\n\n\n附录 A ■ Java 服务器页面语法参考\n\n\
  **639**\n\n你可以像这样在全局页面上定义一个方法以供使用：\n\n<%! public String showMessage() { return message;\
  \ } %> 声明标签主要与脚本片段结合使用。\n\n**脚本片段**\n\n脚本片段包含 Java 代码（不限行数），这些代码在生成的 servlet 的 `_jspService()`\
  \ 方法中被求值，以生成动态内容：\n\n<%\n\n// Java 代码\n\n%>\n\n使用相邻的脚本片段块时要小心；以下代码\n\n<% if(user.isLoggedIn)\
  \ { %>\n\n<p>你好！</p>\n\n<% } %>\n\n<% else { %>\n\n<p>请先登录...</p>\n\n<% } %>\n\n\
  是不合法的，因为我们将 else 块分成了两个脚本片段，并在它们之间插入了空白。\n\n**表达式**\n\n表达式将脚本代码中的值作为字符串返回到页面：\n\n\
  <p>你好，\n\n<%= userName %>\n\n很高兴见到你。</p>\n\n表达式不是完整的 Java 语句，因此你不需要像在脚本片段中那样用分号结束表达式。\n\
  \n**标准动作**\n\n标准动作提供了各种操作 JavaBeans 组件的功能，包括在请求时包含和转发控制权给其他资源，以及生成 HTML 以使用 Java\
  \ 插件。\n\n**<jsp:useBean>**\n\n`<jsp:useBean>` 标签检查给定类和作用域的 bean 实例。如果指定类的 bean 存在，则使用\
  \ id 引用它；否则，它会实例化该 bean。该 bean 在其作用域内可通过其 id 属性使用。\n\n513-0 appa.qxd 11/16/05 9:10\
  \ PM 第 640 页\n\n**640**\n\n附录 A ■ Java 服务器页面语法参考\n\n你可以在 `<jsp:useBean>` 标签之间包含代码，如第二个示例所示——这段代码仅在\
  \ `<jsp:useBean>` 标签成功实例化 bean 时才会运行：\n\n<jsp:useBean id=\"aBeanName\"\n\nscope=\"\
  \ **page**|request|session|application\"\n\ntypeSpecification\n\n/>\n\n或\n\n<jsp:useBean\
  \ id=\"anotherBeanName\"\n\nscope=\" **page**|request|session|application\"\n\n\
  typeSpecification>\n\n<jsp.setProperty name=\"anotherBeanName\"\n\nproperty=\"*|propertyName\"\
  \ />\n\n</jsp:useBean>\n\n在指定 bean 的类型（由 typeSpecification 表示）方面有很大的灵活性。你可以使用\n\n\
  • class=\"class_name\"\n\n• type=\"typeName\"\n\n• class=\"package.class\" type=\"\
  typeName\"（以及术语顺序颠倒）\n\n• beanName=\"beanName\" type=\"typeName\"（以及术语顺序颠倒）\n\n\
  其中\n\n• typeName 是由 id 属性定义的脚本变量的类；也就是说，bean 实例被转换成的类（无论是该类、父类还是该类实现的接口）。\n\n• beanName\
  \ 是 bean 的名称，如同在 `java.beans.Beans` 类的 `instantiate()` 方法中使用的那样。\n\n**<jsp:setProperty>**\n\
  \n你之前使用的 `<jsp:setProperty>` 标签使用 value 设置由 name 引用的 bean 的属性：\n\n<jsp:setProperty\
  \ name=\"anotherBeanName\"\n\npropertyExpression\n\n/>\n\npropertyExpression 可以是以下任意一种：\n\
  \n• property=\"*\"\n\n• property=\"propertyName\"\n\n• property=\"propertyName\"\
  \ param=\"parameterName\"\n\n• property=\"propertyName\" value=\"propertyValue\"\
  \n\n513-0 appa.qxd 11/16/05 9:10 PM 第 641 页\n\n附录 A ■ Java 服务器页面语法参考\n\n**641**\n\
  \n其中\n\n• * 设置告诉标签遍历页面的请求参数，为 bean 中名称与参数名匹配的属性设置任何值。\n\n• param 属性指定用于设置此属性的参数名称。\n\
