  * @struts.action name=\"userForm\" path=\"/editUser\" scope=\"session\"\n\n* validate=\"\
  false\" parameter=\"action\" input=\"mainMenu\"\n\n513-0 ch15.qxd 11/14/05 5:38\
  \ PM Page 586\n\n**586**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n当由 XDoclet 处理时，@struts.action\
  \ 标签将被转换为一个 <action> 元素。在你的 Ant 构建文件（build.xml）的 webdoclet 任务中，你使用以下 XML 来生成 struts-config.xml\
  \ 文件：\n\n<target name=\"webdoclet\" description=\"Generate web and Struts descriptors\"\
  >\n\n<taskdef name=\"webdoclet\"\n\nclassname=\"xdoclet.modules.web.WebDocletTask\"\
  >\n\n<classpath>\n\n<path refid=\"xdoclet.classpath\"/>\n\n<path refid=\"web.compile.classpath\"\
  />\n\n</classpath>\n\n</taskdef>\n\n<webdoclet destdir=\"${webapp.target}/WEB-INF\"\
  \n\nforce=\"${xdoclet.force}\"\n\nmergedir=\"metadata/web\"\n\nexcludedtags=\"@version,@author\"\
  \n\nverbose=\"true\">\n\n<fileset dir=\"src/web\"/>\n\n<fileset dir=\"${build.dir}/web/gen\"\
  />\n\n<configParam name=\"cactusOn\" value=\"${enable.cactus}\"/>\n\n<deploymentdescriptor\
  \ validatexml=\"true\"\n\nservletspec=\"2.3\" sessiontimeout=\"30\"\n\ndestdir=\"\
  ${build.dir}/web/WEB-INF\"\n\ndistributable=\"false\">\n\n<configParam name=\"security\"\
  \ value=\"${security.mode}\"/>\n\n</deploymentdescriptor>\n\n<jsptaglib validatexml=\"\
  true\"\n\ndescription=\"Tag Libraries for Security and Labels\"\n\nvalidateXML=\"\
  true\"\n\nshortName=\"struts-resume\"\n\nfilename=\"struts-resume.tld\"\n\n/>\n\n\
  <strutsconfigxml validatexml=\"true\" version=\"1.1\"/>\n\n<strutsvalidationxml/>\n\
  \n</webdoclet>\n\n</target>\n\n只需这些步骤，就能在生成的 struts-config.xml 文件中生成以下映射（为了节省空间，我们对\
  \ XML 进行了美化，但文本内容未变）：\n\n<action path=\"/editUser\" type=\"org.appfuse.webapp.action.UserAction\"\
  \n\nname=\"userForm\" scope=\"session\" input=\"mainMenu\"\n\nparameter=\"action\"\
  \ unknown=\"false\" validate=\"false\">\n\n</action>\n\n当然，你仍然可以手动编写配置文件，通过生成特定命名的文件（称为**合并点**）来添加自定义数据。这些文件在生成项目时会被包含在主文件中。在\
  \ struts-resume 的目录（也称为**合并目录**）中，有一个 README.txt 文件列出了 web.xml 的可用合并点，\n\n513-0\
  \ ch15.qxd 11/14/05 5:38 PM Page 587\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n**587**\n\
  \n\n\n`struts-config.xml` 和 `validation.xml`。例如，要为应用程序指定全局转发，可以创建一个 `global-forwards.xml`\
  \ 文件，其中包含一个或多个 `<forward>` 元素。全局转发文件允许你配置模块中多个动作使用的转发，从而方便配置多个页面共用的转发。\n\n<global-forwards>\n\
  \n<forward name=\"mainMenu\" path=\"/mainMenu.do\"/>\n\n</global-forwards>\n\n然后，该文件将被包含在生成的文件中。XDoclet\
  \ 通过检查 `webdoclet` 任务的 `mergedir` 属性来知道在此目录中查找这些文件：\n\n<webdoclet destdir=\"${webapp.target}/WEB-INF\"\
  \n\nforce=\"${xdoclet.force}\"\n\nmergedir=\"metadata/web\"\n\nexcludedtags=\"@version,@author\"\
  \n\nverbose=\"true\">\n\nXDoclet 还可以用于在 `struts-config.xml` 中生成 `form-bean` 条目，以及为\
  \ Validator 生成 `validation.xml` 文件。对于表单 Bean，你只需在类的 Javadoc 中添加以下内容：\n\n* @struts.form\
  \ name=\"UserForm\"\n\n你也可以使用此标签，通过简单地使用 `@struts.form` 从 POJO（或实体 Bean）生成 ActionForm。但是，如果你想包含实体\
  \ Bean 的所有字段，则需要添加 `include-all=\"true\"`。你还可以添加一个可选的 `extends` 属性来指定它继承自 `ValidatorForm`\
  \ 或你自己的基类。例如，在 `struts-resume` 中，`User.java` 文件的 Javadoc 头部包含以下内容：\n\n/**\n\n* User\
  \ class\n\n*\n\n* This class is used to generate the Struts Validator Form\n\n*\
  \ as well as the Hibernate persistence later.\n\n*\n\n* @author Matt Raible\n\n\
  * @version $Revision: 1.6 $ $Date: 2003/06/27 03:27:44$\n\n*\n\n* @struts.form include-all=\"\
  true\"\n\n* extends=\"org.appfuse.webapp.form.BaseForm\"\n\n*\n\n* @hibernate.class\
  \ table=\"app_user\"\n\n*/\n\n然后，你可以添加方法级别的标签来生成 `validation.xml` 文件。如果你正在向现有的 ValidatorForm\
  \ 添加 XDoclet 标签，请确保将这些标签放在你的 **setter** 方法上，否则不会生成任何内容！\n\n* @struts.validator type=\"\
  required\" msgkey=\"errors.required\"\n\n513-0 ch15.qxd 11/14/05 5:38 PM Page 588\n\
  \n**588**\n\n第 15 章 ■ 使用 STRUTS、XDoclet 和其他工具\n\n如果你正在从 POJO 或实体 Bean 生成 ValidatorForm，则需要将\
  \ `@struts.validator` 标签放在类的 get 方法上。在 `struts-resume` 中，我们设置了一个自定义的 XDoclet 模板来生成\
  \ Struts 的表单（位于 `metadata/templates/struts_form.xdt`），该模板将生成一个 ValidatorForm，并在\
  \ setter 上附带 `@struts.validator` 标签。\n\n由于在撰写本文时这并非 XDoclet 的核心功能，我们受到启发创建了一个自定义模板来实现它。\n\
  \n我们不确定是否推荐将动作转发编码到你的类中。我们两种方式都尝试过，感觉都挺方便。当然，我们最近一直在很多单人开发团队中工作，这可能会稍微影响我们的看法。如果你想将全局转发外部化，可以将它们放在一个名为\
  \ `global-forwards.xml` 的合并点文件中。\n\n如果你想在类本地实现，可以在类的开头使用以下语法：\n\n* @struts.action-forward\
  \ name=\"list\" path=\".resumeList\"\n\nXDoclet 与 Ant 集成的一个很棒的地方是，你还可以在源代码中指定 Ant\
  \ 属性，这些属性将在构建时被替换。因此，你可以通过 Ant 配置所有值，而不是硬编码它们。例如，在 `LoginServlet` 中，我们在 Javadoc\
  \ 头部有以下 XDoclet 标签：\n\n* @web.servlet-init-param\n\n* name=\"encrypt-password\"\n\
  \n* value=\"${encrypt-password}\"\n\n该值在 `app-settings.xml` 文件中默认设置：\n\n<property\
  \ name=\"secure-login\" value=\"false\"/> 然而，通过执行带有指定参数的 Ant 命令可以轻松覆盖它：`ant -Dsecure-login=true`\n\
  \n这会导致在 `LoginServlet` 的部署描述符（`web.xml`）中生成以下内容：\n\n<init-param>\n\n<param-name>encrypt-password</param-name>\n\
  \n<param-value>true</param-value>\n\n</init-param>\n\n如果你已经有一个数据库模式，并希望开发基于 Java\
  \ EE 的应用程序，你可以使用 Middlegen (http://boss.bekk.no/boss/middlegen/)。Middlegen 是一个基于\
  \ JDBC、Velocity、Ant 和 XDoclet 的数据库驱动代码生成引擎。它可以直接从数据库生成容器管理持久化（CMP）、企业 JavaBean（EJB）、Java\
  \ 数据库对象（JDO）以及 JSP 或 Struts 的代码！这是一个用于快速原型开发的绝佳工具。一个缺点是它对 Struts 的支持似乎非常薄弱。当我们第一次接触\
  \ Middlegen 时，它只支持 Struts 1.0。在撰写本文时，Middlegen 网站仍然将 Struts 插件标识为 alpha 状态。\n\n\
  513-0 ch15.qxd 11/14/05 5:38 PM Page 589\n\n第 15 章 ■ 使用 STRUTS、XDoclet 和其他工具\n\n\
  **589**\n\nStrutsGen 工具\n\n在 `struts-resume` 应用程序中有一个小巧但灵活的工具，Erik Hatcher 最初为他在《*Java\
  \ Development with Ant*》中的示例应用程序编写了它。它使用 Ant 和 XDoclet，通过检查表单的属性文件来生成 JSP 页面和 ResourceBundle。这两个文件使用的模板简单且可定制。该工具可以在\
  \ `struts-resume` 应用程序的 `tools/strutsgen` 目录中找到。要使用它，你首先需要运行命令 `ant webdoclet` 在\
  \ `build/gen/web` 目录中生成你的表单。然后导航到 `tools/strutsgen` 并运行 `ant \"-Dform.name=MyForm\"\
  `，其中 `MyForm` 是你想要为其生成文件的表单名称。\n\n这将在 `tool/strutsgen/build` 目录中生成两个文件，一个名为 `UserForm.jsp`，另一个名为\
  \ `UserForm.properties`。你也可以在不指定表单名称的情况下运行该工具，它将为你的所有表单生成这些文件。\n\n该工具使用 TreeMap\
  \ 从表单中获取属性，这意味着新文件将按字母顺序包含这些属性。在大多数情况下，你可能仍然需要自定义字段的顺序以使其对用户友好；这个工具只是稍微加快了速度。目前它也只支持生成\
  \ `<html:text>` 字段，但既然你无论如何都需要进入 JSP 重新排列字段顺序，这也不是什么大问题。我们发现它在开发此应用程序期间非常有用。\n\n\
  **在 Struts 中处理持久化**\n\n在我们看来，Struts 在为你（开发者）提供实现视图和控制器的绝佳方式方面做得非常出色，但它对模型的支持并不多。ActionForm\
  \ 很好，ValidatorForm 甚至更好，但如果你希望应用程序有一个数据库后端，Struts 并没有提供太多简化编码的方法。表单为后端提供了一个良好的接口，但\
  \ Struts 不负责提供数据访问，因此它不提供任何用于检索数据的类。虽然有很多不同的方法可以编写控制器到数据库的逻辑，但我们将告诉你我们是如何做的，以及哪些方法对我们有效。\n\
  \n当我们刚开始使用 Struts 进行开发时，我们的架构已经预先确定，我们只需要接入它。我们在项目中使用 EJB，并使用 RowSet 来处理列表屏幕。这对我们来说相当容易，因为我们只需要为每个动作调用特定的会话\
  \ Bean 并与之适当交互即可。我们实际上发现，在每个表单上为我们的数据对象（或值对象或数据传输对象）创建访问器和修改器（getter 和 setter）非常容易。后来我们才发现这不是推荐的“设计模式”——我们的数据对象永远不应该到达表示层。然而，它确实有效，而且效果很好——我们对此很满意。\n\
  \n关于持久化选项的话题似乎几乎每周都会出现在 Struts 用户邮件列表中。\n\n\n\n我们认为这是因为选择太多了。实际上，你几乎可以将任何基于 Java\
  \ 的持久化框架与 Struts 配合使用。毕竟它们都是 Java 技术。当没有一个框架被证明是占主导地位且广泛使用的框架时，选择起来确实很困难。这也是 Struts\
  \ 的一个优势，它允许你选择任何框架——但我们猜测这对许多开发者来说也是一个令人头疼的问题。\n\n不过，如果你坚持使用自己熟悉的技术，为 Struts 应用选择持久化框架也可以很简单。如果你打算选择开源实现，请确保文档质量良好、开发邮件列表活跃，并且有示例应用。复制现有示例比从头开发要容易得多。花时间研究现有的数据库代码生成工具是值得的，因为从长远来看这会节省大量时间。最重要的是，学习并使用\
  \ XDoclet（我们稍后会讨论）来辅助你的持久化层。我们相信你会对它非常满意。\n\n持久化选项\n\n在第 9 章中，你已经花了大量时间评估各种可用的持久化选项，因此我们不再赘述。这里我们只想告诉你，在\
  \ struts-resume 示例项目中我们选择了使用 Hibernate。到目前为止，我们对它非常满意。\n\n它似乎拥有出色的文档，并且支持 XDoclet。XDoclet\
  \ 支持对我们来说是一个很大的卖点，因为我们希望生成大部分数据库访问代码。\n\n■**注意** struts-resume 中的示例借鉴了 Dave Johnson（第\
  \ 9 章作者）在其示例应用中的范例，以及我们从 Hibernate 开发邮件列表中获得的帮助。\n\n**增强 Struts ActionForm 开发**\n\
  \nStruts 有一些经常被忽视的特性，但在你开发 ActionForm 时可能会很有用。让我们来看看它们。\n\n使用 DynaActionForm\n\n\
  DynaActionForm 是作为 Struts 1.1 的一部分添加的。它基本上允许你通过 XML 声明表单的属性，而不是用 Java 编写表单。对开发者来说，好处是不必编写和编译\
  \ ActionForm。然而，如果你使用 XDoclet 生成 ActionForm，那么可能就用不到 DynaActionForm。它们对于提供不需要持久化的简单表单非常方便——例如用于发送电子邮件的\
  \ MessageForm。让我们以此为例，看看它的设置：\n\n<form-bean name=\"messageForm\"\n\ntype=\"org.apache.struts.action.DynaActionForm\"\
  >\n\n<form-property name=\"name\" type=\"java.lang.String\"/>\n\n<form-property\
  \ name=\"email\" type=\"java.lang.String\"/>\n\n<form-property name=\"subject\"\
  \ type=\"java.lang.String\"/>\n\n<form-property name=\"content\" type=\"java.lang.String\"\
  />\n\n</form-bean>\n\n就像 ActionForm 一样，为了与 Web 层交互，你所有的属性都应该是字符串类型。\n\n只有对象类型（String、Integer\
  \ 或 Boolean）可以用作 `<form-property>` 元素的类型。不允许使用基本类型。指定表单属性后，你可以像使用常规 ActionForm 或\
  \ ValidatorForm 一样，在动作映射中引用该表单。DynaActionForm 也可以通过使用 `org.apache.struts.action.DynaValidatorActionForm`\
  \ 类型来利用 Validator。\n\n然后，你可以在 Action 类中使用以下代码获取该表单：`DynaActionForm msgForm = (DynaActionForm)\
  \ form;`\n\n要从表单中获取值，你必须使用 `form.get(propertyName)` 语法（类似于从 HashMap 中获取值的方式）：\n\n\
  `String subject = (String) theForm.get(\"subject\");` 你还可以在 Action 类中创建并初始化一个 DynaActionForm（或\
  \ DynaValidatorActionForm）：\n\n`DynaActionForm msgForm = (DynaActionForm) DynaActionFormClass`\n\
  \n\n\n`.getDynaActionFormClass(\"messageForm\").newInstance();` 然后可以使用 `form.set(\"\
  propertyName\", object)` 在表单上设置值。就像普通的 ActionForm 一样，在填充完数据后，你需要将其放入指定的作用域中。\n\n\
  如果你打算在表单上频繁地获取和设置属性，由于需要进行大量的类型转换，而不是简单的 `form.getProperty()`，DynaActionForm 可能会有些麻烦。我们建议在使用\
  \ DynaActionForm 之前，先使用 XDoclet 生成你的 ActionForms 和 ValidatorForms。同时，它也有很好的用途，比如在消息表单中。\n\
  \n**在 Struts 中使用带索引属性的表单**\n\n索引属性是 Struts 从一开始就提供的功能。如果你使用过它，你可能会非常喜欢它，因为它允许你获取和设置对象列表（例如，父表单上的子表单的\
  \ ArrayList）。在 struts-resume 应用程序中，这可能类似于在 ResumeForm 上获取/设置一个 SkillForms 的 ArrayList。基本上，其语法涉及像\
  \ `<logic:iterate>` 和 `<c:forEach>` 这样的标签，并在表单元素的名称上设置索引：\n\n`<logic:iterate id=\"\
  skill\" name=\"userSkills\" indexId=\"index\">` 然后，你需要在你的表单中添加 get 和 set 访问器，以便能够根据索引检索和修改这些值。以下是一个如何在\
  \ struts-resume 的 SkillGroup 表单上实现此功能的示例，用户在该表单中分配多个 SkillForms：\n\n```java\n/**\n\
  \ * 技能属性。\n */\nprivate ArrayList skill;\n\n/**\n * 技能的 Getter。用于迭代器标签和对象的索引。\n\
  \ */\npublic SkillForm getSkill(int index) {\n    return (SkillForm) skill.get(index);\n\
  }\n\n/**\n * 上述 getter 的 Setter。\n */\npublic void setSkill(int index, SkillForm\
  \ skill) {\n    this.skill.set(index, skill);\n}\n\n/**\n * 技能 ArrayList 的 Getter\n\
  \ */\npublic ArrayList getSkills() {\n    return skill;\n}\n\n/**\n * 技能 ArrayList\
  \ 的 Setter\n */\npublic void setSkills(ArrayList skills) {\n    this.skill = skills;\n\
  }\n```\n\n我们尚未实现索引属性，尽管我们计划这样做，并且在你阅读本文时可能已经实现了。\n\n**表单验证**\n\n我们首选的表单验证方法是使用 Struts\
  \ Validator。Validator 最初由 David Winterfeldt 编写，旨在克服在 ActionForms 中编写验证逻辑的繁琐。它可以执行基本验证，以检查字段是否为必填项，或是否匹配正则表达式、电子邮件或信用卡，以及服务器端类型检查和日期验证。你可以在任何\
  \ JSP 和 Servlet 应用程序中使用 Validator，但它最初是为 Struts 设计的，因此在 Struts 中使用最为简便。自 Struts\
  \ 1.1 起，验证框架已集成到核心 Struts 库（struts.jar）中。\n\n有关 Validator 的详细在线信息，请访问 http://struts.apache.org/userGuide/building_view.html#validator。\n\
  \n**使用 Validator**\n\nValidator 框架依赖于一个 `validator-rules.xml` 文件，该文件定义了所有可插拔的 Validator\
  \ 定义。这些定义本质上是用于服务器端验证的 Java 类和用于客户端验证的 JavaScript 函数。让我们以“required”可插拔 Validator\
  \ 为例：\n\n```xml\n<validator name=\"required\"\n    classname=\"org.apache.struts.validator.FieldChecks\"\
  \n    method=\"validateRequired\"\n    methodParams=\"java.lang.Object,\n      \
  \  org.apache.commons.validator.ValidatorAction,\n        org.apache.commons.validator.Field,\n\
  \        org.apache.struts.action.ActionErrors,\n        javax.servlet.http.HttpServletRequest\"\
  \n    msg=\"errors.required\">\n    <javascript>\n        <![CDATA[\n          \
  \  ... 在此插入 JavaScript 函数 ...\n        ]]>\n    </javascript>\n</validator>\n```\n\
  \n我们省略了 JavaScript 函数，因为它有 40 行，而你来这里是为了学习 JSP，而不是 JavaScript，对吧？在上面的定义中，`FieldChecks`\
  \ 是 Validator 框架中的一个类，它有一个名为 `validateRequired()` 的方法，该方法接收列出的参数。\n\n`<javascript>`\
  \ 元素定义了用于执行客户端验证的 JavaScript 函数。在此文件中定义这些内容使得 Validator 框架易于配置。\n\n要在 Struts 应用程序中启用\
  \ Validator，你首先需要将以下 XML 添加到 `struts-config.xml` 文件中。根据 Struts DTD，`<plug-in>` 元素应出现在该文件的末尾附近。如果你使用\
  \ XDoclet，可以将此 XML 放入合并目录中的文件中：\n\n```xml\n<plug-in className=\"org.apache.struts.validator.ValidatorPlugIn\"\
  >\n    <set-property property=\"pathnames\"\n        value=\"/WEB-INF/validator-rules.xml,/WEB-INF/validation.xml\"\
  />\n</plug-in>\n```\n\n从这个例子中可以看出，Validator 加载了两个文件。这些文件可以重命名为你喜欢的任何名称；你只需确保 `<plug-in>`\
  \ 配置正确即可。由于这些文件名是 Validator 的事实标准，我们将在示例中使用它们。Validator 还允许扩展，例如以下用于验证两个字段是否匹配的扩展：\n\
  \n```java\npublic static boolean validateTwoFields(Object bean, ValidatorAction\
  \ va, Field field, ActionErrors errors, HttpServletRequest request, ServletContext\
  \ application) {\n    String value = ValidatorUtil.getValueAsString(bean, field.getProperty());\n\
  \    String sProperty2 = field.getVarValue(\"secondProperty\");\n    String value2\
  \ = ValidatorUtil.getValueAsString(bean, sProperty2);\n    if (!GenericValidator.isBlankOrNull(value))\
  \ {\n        try {\n            if (!value.equals(value2)) {\n                errors.add(field.getKey(),\
  \ ValidatorUtil.getActionError(\n                    application, request, va, field));\n\
  \                return false;\n            }\n        } catch (Exception e) {\n\
  \            errors.add(field.getKey(), ValidatorUtil.getActionError(\n        \
  \        application, request, va, field));\n            return false;\n       \
  \ }\n    }\n    return true;\n}\n```\n\n然后，你可以通过添加以下元素将此 class 添加到 `validator-rules.xml`\
  \ 文件中：\n\n```xml\n<validator name=\"twofields\"\n    classname=\"com.mysite.StrutsValidator\"\
  \n    method=\"validateTwoFields\"\n    msg=\"errors.twofields\"/>\n```\n\n然后，在\
  \ `validation.xml` 中，你可以配置一个字段来使用此验证规则：\n\n```xml\n<field property=\"password\"\n\
  \    depends=\"required,twofields\">\n    <arg0 key=\"typeForm.password.displayname\"\
  />\n    <var>\n        <var-name>secondProperty</var-name>\n        <var-value>password2</var-value>\n\
  \    </var>\n</field>\n```\n\n你也可以轻松地向 `validator-rules.xml` 添加一个 JavaScript 函数以进行客户端验证。这只需在\
  \ `<validator>` 元素内部添加一个 `<javascript>` 元素即可。\n\n如果没有 Validator，在应用程序中编写验证逻辑的最简单方法是覆盖\
  \ ActionForm 中的 `validate()` 方法。其签名如下：\n`public ActionErrors validate(ActionMapping\
  \ mapping, HttpServletRequest request);`\n这个 ActionForm 方法返回 null，就像 ActionForm\
  \ 的 `reset()` 方法一样，类似地，如果你不想覆盖它，也不是必须的。\n\n`public void reset(ActionMapping mapping,\
  \ HttpServletRequest request);`\n`reset()` 方法旨在将所有属性重置回其默认状态。它在控制器 Servlet 重新填充\
  \ bean 之前被调用，并且在你的视图表单上使用复选框时非常有用。这是因为当复选框未被选中时，其值和名称都不会在请求中传递。这就是 `reset()` 方法存在的主要原因——设置复选框的默认状态，使它们像其他表单元素一样，始终作为名称-值对在请求中传递。\n\
  \n\n\n老实说，我们只在验证索引属性时，在 ActionForm 中使用了 `validate()` 方法，也只在表单有复选框时使用了 `reset()`\
  \ 方法。我们在开始使用 Struts 大约一个月后发现了 Validator 框架，之后就再也没回头。Validator 非常适合执行基本的必填字段验证，以及更高级的功能，例如正则表达式匹配、电子邮件地址语法（并非实际验证地址）、信用卡和类型检查（字符串、数字、日期）。此外，可以为不同的区域设置定义不同的验证规则。然而，要充分利用\
  \ Validator，你确实需要相当好地理解正则表达式语法。\n\n要配置一个 Action 以调用 ActionForm 上的 `validate()` 方法，或使用\
  \ ValidatorForm 的声明式验证，你不需要做任何额外操作，因为验证默认是**开启**的。就个人而言，我们喜欢在 `<action-mappings>`\
  \ 元素中明确指定 `validate=\"true\"` 或 `validate=\"false\"` 以避免混淆。此外，你需要为 `<action-mappings>`\
  \ 指定一个 `input` 属性，否则 Validator 将不知道返回何处进行服务器端验证。这一点非常重要，尤其是在使用我们稍后将讨论的 Tiles 框架时——如果你不添加\
  \ `input` 属性，你将得到一个空白的屏幕。\n\n在 XDoclet 中配置此内容如下例所示：\n\n* @struts.action name=\"\
  userForm\" path=\"/saveUser\" scope=\"session\"\n* validate=\"true\" parameter=\"\
  action\" input=\"editProfile\"\n\n这将产生以下 action 映射：\n\n<action path=\"/saveUser\"\
  \ type=\"org.appfuse.webapp.action.UserAction\"\nname=\"userForm\" scope=\"session\"\
  \ input=\"editProfile\" parameter=\"action\"\nunknown=\"false\" validate=\"true\"\
  >\n</action>\n\n我们在 struts-resume 应用程序中使用了 `inputForwards`，因此值 `editProfile` 实际上引用了一个全局转发。\n\
  \n我们非常喜欢 Validator，因为它既执行客户端验证（通过 JavaScript），也执行服务器端验证。根据我们的经验，大多数客户和开发人员一样更喜欢客户端验证。如果必填字段未填写，浏览器为何还要尝试提交表单呢？有些大型组织出于兼容性考虑不鼓励使用\
  \ JavaScript，这很可惜，因为它可以帮助你的 Web 应用程序表现得更像传统的桌面应用程序。然而，有些 HTML 元素需要服务器端验证——例如 `<input\
  \ type=\"file\" ... />` 元素。它不允许 JavaScript 操作或访问，因此无法检查是否已输入值。这是出于安全原因，因为你不会希望脚本在未经你同意的情况下从你的硬盘驱动器获取文件。\n\
  \n在使用 JavaScript 开发富 Web 客户端时，需要记住的最重要的事情是无障碍标准。目前有两个标准。在美国，有联邦政府的第 508 条倡议。第 508\
  \ 条要求联邦机构的电子和信息技术应对残障人士可访问。更多信息请访问 http://www.section508.gov。\n\n第二个标准更具全球性，是 W3C\
  \ 的 Web 无障碍倡议（WAI）。万维网联盟（W3C）致力于引领 Web 发挥其全部潜力，其中包括促进残障人士的高度可用性。WAI 与全球各地的组织协调，通过五个主要工作领域追求\
  \ Web 的无障碍性：技术、指南、工具、教育和推广，以及研究与开发。更多信息请访问 http://www.w3.org/WAI/。\n\n这些无障碍标准建立在其他标准之上，例如\
  \ XHTML 和 CSS。如果在开发 Web 应用程序时遵循这些标准，你会发现使应用程序易于访问会容易得多。我们发现无障碍标准不鼓励使用 JavaScript\
  \ 在 `<select>` 的 `onchange` 事件上更改页面，但像 Validator 使用的弹出式 JavaScript 警报是可以的。大多数屏幕阅读器可以理解并读取它们——与客户端\
  \ JavaScript 相关的主要无障碍问题是：1) 消息易于理解，2) 当 JavaScript 关闭时仍能给出消息。由于 Validator 同时提供客户端和服务器端验证，它满足了许多无障碍要求。\n\
  \n**使用 XDoclet 生成 validation.xml**\n\n在 struts-resume 应用程序中，XDoclet 从 ActionForm\
  \ 及其子类（包括 ValidatorForm）生成 `validation.xml` 文件。我们创建了一个扩展 ValidatorForm 并实现 Serializable（用于集群环境）的\
  \ BaseForm，然后我们所有的表单都扩展它。UserForm 和 `validation.xml` 的生成过程如图 15-9 所示，其中箭头代表 Ant\
  \ 目标或任务的名称。\n\nejbdoclet/\nUser.htm.xml\nUser.java\n（由 hibernatedoclet 使用的 XML）\n\
  ejbdoclet\nstrutsfor /\nm\nwebdoclet/\nValidation.xml\nUserForm.java\nstrutsvalidationxml\n\
  \n**图 15-9.** *XDoclet 可以生成表单以及这些表单的验证描述符。*\n\n有三个方法级别的 XDoclet 标签可用于生成值：\n\n• `@struts.validator`\n\
  • `@struts-validator.args`\n• `@struts.validator-var`\n\n最简单的例子是使用 required Validator\
  \ 生成一个条目。我们将使用在 UserForm 上生成的 `username` 属性来说明。如前面的图表所示，它从 User.java 文件开始，这些标签被转移到生成的\
  \ ActionForm 上。在 `username` 的 getter 字段上，你会找到以下标签：\n\n/**\n* 返回用户名。\n* @return String\n\
  *\n* @struts.validator type=\"required\" msgkey=\"errors.required\"\n* @struts.validator\
  \ type=\"email\" msgkey=\"errors.email\"\n* @hibernate.property\n* column=\"username\"\
  \ type=\"string\" not-null=\"true\" unique=\"true\"\n*/\npublic String getUsername()\
  \ {\nreturn username;\n}\n\n为了使表单生成正常工作，此代码必须位于 getter 上。在撰写本文时，`strutsform` 任务是\
  \ `ejbdoclet` 的一个子任务，因此我们仍然将其作为 `ejbdoclet` 任务运行。当运行 `ejbdoclet` 任务时，其中的 `<strutsform>`\
  \ 子任务将在 `validation.xml` 中生成以下条目：\n\n<formset>\n<form name=\"userForm\">\n...\n\
  <field property=\"username\"\ndepends=\"required,email\">\n<msg name=\"required\"\
  \nkey=\"errors.required\"/>\n<msg name=\"email\"\nkey=\"errors.email\"/>\n<arg0\
  \ key=\"userForm.username\"/>\n</field>\n...\n</form>\n</formset>\n\n我们应该指出，`<msg>`\
  \ 元素不是必需的；因此你不需要在 XDoclet 标签中指定 `msgkey` 属性。如果你选择省略此元素，将应用来自 `validation-rules.xml`\
  \ 文件的 Validator 默认消息。该值在 `validation-rules.xml` 中由 `msg` 属性表示。例如，required Validator\
  \ 具有 `msg=\"errors.required\"`。XDoclet 在 `validation.xml` 中为我们创建了 `msg` 条目，从长远来看提供了更大的灵活性。\n\
  \n既然你已经知道如何生成 `validation.xml`，让我们检查一下这些部分实际意味着什么。在前面的摘录中有四个不同的元素：`<form>`、`<field>`、`<msg>`\
  \ 和 `<arg>`。\n\n\n\n`<form>` 元素的 name 属性定义了 ActionForm 的名称，该名称应与 `struts-config.xml`\
  \ 中定义的名称一致。由于你使用 XDoclet 来生成表单和 `struts-config.xml` 文件，因此可以确保这些名称是匹配的。\n\n`<field>`\
  \ 元素有两个属性：`property` 和 `depends`。`property` 属性定义了 `UserForm.java` 中待验证变量的名称，而 `depends`\
  \ 属性则指定了要应用的验证规则。\n\n有两个 `<msg>` 元素，用于指明从 `ApplicationResources.properties` 文件（或\
  \ `struts-config.xml` 中定义的任何 ResourceBundle）中使用的消息。在 `struts-resume` 中，这些消息定义如下：`errors.required={0}\
  \ is required.`\n\n`errors.email={0} is an invalid e-mail address.`\n\n最后一个元素 `<arg0>`\
  \ 指定了每条消息中 `{0}` 替换值的消息键。在 `struts-resume` 中，它被定义为：`userForm.username=Username`\n\
  \n如果你希望在错误消息中替换多个参数，可以在 `ApplicationResources` 中通过递增数字来添加更多参数，例如 `{1}` 表示第二个参数。要在表单中添加此参数的替换值，你可以在原始表单中添加另一个\
  \ XDoclet 标签：\n\n`@struts.validator-args arg1resource=\"username.lastName\" arg1value=\"\
  My Surname\"`\n\n当然，你绝不会同时使用这两个属性，因为第一个（`arg1resource`）用于查找资源键，而第二个（`arg2value`）用于在\
  \ `validation.xml` 中放置字面字符串。通过 webdoclet 任务运行上述代码会生成以下 XML：\n\n`<arg0 key=\"username.lastName\"\
  />`\n\n`<arg0 key=\"My Last Name\" resource=\"false\"/>`\n\n现在你已经配置了表单的验证，接下来应该在\
  \ JSP 中添加一些 JavaScript 来强制执行客户端验证。第一步是使用 `<html:messages/>` 标签库来捕获任何服务器端验证错误：\n\n\
  `<logic:messagesPresent>`\n\n`<div class=\"error\">`\n\n`<html:messages id=\"error\"\
  >`\n\n`<bean:write name=\"error\" filter=\"false\"/><br/>`\n\n`</html:messages>`\n\
  \n`</div>`\n\n`</logic:messagesPresent>`\n\n在 `struts-resume` 应用程序中，上述代码出现在 `messages.jsp`\
  \ 文件中。该文件还包含捕获常规消息（非错误消息）的代码，并位于 `web/common` 文件夹中。它被包含在 Tiles 模板中，因此我们不必将其添加到每个需要使用验证的页面中。\n\
  \n其次，你需要在表单中添加一个 `onsubmit` 事件处理器：\n\n`<html:form action=\"/userSave\" method=\"\
  post\" styleId=\"userForm\"`\n\n`focus=\"password\" onsubmit=\"return validateUserForm(this)\"\
  >`\n\n在检查此表单语法时，我们还想指出其他几点。\n\n默认情况下，如果你在表单上未使用 `method` 属性，`<html:form>` 标签会为你生成一个。但它生成的问题在于不符合\
  \ XHTML 规范。也就是说，它生成为 `method=\"POST\"`，而 XHTML 要求预定义的属性值必须是小写。\n\n我们通常为所有表单和表单元素（例如\
  \ `<html:text>` 或 `<html:password>`）添加一个 `styleId` 属性，以便可以通过文档对象模型（DOM）使用 `document.getElementById(elementId)`\
  \ 来访问它们。需要注意的一点是，每个 Id 在页面内必须是唯一的。最后，为了提高应用程序的可用性，你应该尝试在表单上使用 `focus` 属性，但要谨慎使用：如果你根据用户角色或其他逻辑隐藏了字段，这可能会导致\
  \ JavaScript 错误。\n\n配置完表单后，你需要为表单的“提交”和“取消”按钮添加一个 `onclick` 处理器，以调用 Validator 的\
  \ `validateForm` JavaScript 函数。这样做是为了确保点击“取消”按钮时不会触发任何验证：\n\n`<html:cancel styleClass=\"\
  button\" onclick=\"bCancel=true\">`\n\n`<bean:message key=\"button.cancel\">`\n\n\
  `</html:cancel>`\n\n![图片 189](img/index-632_1.png)\n\n\n\n513-0 ch15.qxd 11/14/05\
  \ 5:38 PM 第 599 页\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具\n\n**599**\n\n<bean:message\
  \ key=\"button.submit\">\n\n</html:submit>\n\n在前面的示例中，我们添加了 `styleClass` 属性来为按钮指定\
  \ CSS 规则。最后，添加以下代码以引入执行实际验证所需的 JavaScript：\n\n<html:javascript formName=\"userForm\"\
  \ cdata=\"false\"\n\ndynamicJavascript=\"true\" staticJavascript=\"false\"/>\n\n\
  <script type=\"text/javascript\"\n\nsrc=\"<html:rewrite page=\"/scripts/validator.jsp\"\
  />\">\n\n</script>\n\n我们始终建议在引用 JavaScript 或 CSS 文件时使用 `<html:rewrite />`，因为它会生成包含应用程序上下文的\
  \ URL。也就是说，它会创建一个相对于 Web 服务器根目录（`/`）的 URL。`validation.jsp` 包含以下代码，用于从 `validation-rules.xml`\
  \ 文件中渲染所有 JavaScript 函数：\n\n<%@ page language=\"java\" contentType=\"javascript/x-javascript\"\
  \ %>\n\n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags-html\"\n\nprefix=\"\
  html\" %>\n\n<html:javascript dynamicJavascript=\"false\" staticJavascript=\"true\"\
  /> **测试验证**\n\n现在一切已配置完毕，让我们来测试一下！为此，您需要登录到 `struts-resume` 应用程序，并点击“编辑个人资料”链接。这将显示您的用户信息。如果您清空用户名字段，将会出现如图\
  \ 15-10 所示的错误对话框。\n\n*或显示对话框。*\n\n![图 190](img/index-633_1.png)\n\n513-0 ch15.qxd\
  \ 11/14/05 5:38 PM 第 600 页\n\n**600**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具\n\n当您在浏览器中禁用\
  \ JavaScript 时，验证器会在服务器端捕获错误，您将看到如图 15-11 所示的消息。因此，如果您不想在应用程序中使用 JavaScript，除了 XDoclet\
  \ 标签外，几乎无需编写任何代码。如果您不使用 XDoclet，则需要手动配置 `validation.xml`——我们喜欢将其称为*声明式验证*。\n\n**图\
  \ 15-11.** *即使在客户端浏览器中禁用了 JavaScript，验证仍会在服务器端进行，并且错误消息仍会显示。*\n\n您还可以使用验证器基于变量进行验证，例如验证邮政编码是否与正则表达式匹配。这可以通过一个包含正则表达式作为其值的掩码来实现。对于可能多次使用的正则表达式，最好将它们定义为\
  \ `validation.xml` 文件中的常量。由于我们使用 XDoclet，这可以在位于合并目录中的 `validation-global.xml` 文件中完成。在\
  \ `struts-resume` 应用程序中，该目录为 `metadata/web/`。\n\n<constant>\n\n<constant-name>zip</constant-name>\n\
  \n<constant-value>^\\d{5}\\d*$</constant-value>\n\n</constant>\n\n这个正则表达式表示邮政编码必须为五位字符，且所有字符必须为数字。要验证\
  \ `userForm` 中的邮政编码，您需要像这样配置 `validation.xml`：\n\n<field property=\"postalCode\"\
  \ depends=\"required,mask\">\n\n<msg name=\"required\" key=\"errors.required\"/>\n\
  \n513-0 ch15.qxd 11/14/05 5:38 PM 第 601 页\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具\n\n\
  **601**\n\n<msg name=\"mask\" key=\"errors.zip\"/>\n\n<arg0 key=\"userForm.postalCode\"\
  />\n\n<var>\n\n<var-name>mask</var-name>\n\n<var-value>${zip}</var-value>\n\n</var>\n\
  \n</field>\n\n如前所述，如果您想使用验证器的默认值，可以省略 `<msg>` 元素。然而，掩码的默认错误消息键是 `errors.invalid`，它只是简单的\
  \ `{0}` 无效。为了增强应用程序的可用性，使用包含更多信息的键（例如 `errors.zip`）可能更好（例如 `{0} 字段必须是一个 5 位数字`）。使用\
  \ XDoclet 为 `postalCode` 字段配置这一点很容易。您只需添加一个标签来指定规则和变量的名称-值对：\n\n* @struts.validator\
  \ type=\"mask\" msgkey=\"errors.zip\"\n\n* @struts.validator-var name=\"mask\" value=\"\
  ${zip}\"\n\n**高级验证器特性**\n\n我们尚未提及的验证器其他特性包括多页验证、索引属性验证、条件验证和 DynaFormValidation。多页验证允许您将表单的验证规则分布在多个页面上。当您的应用程序中有类似向导的表单用于收集信息时，这非常有用。要配置此功能，您需要在\
  \ JSP 中添加一个隐藏字段来指定页码：\n\n<html:hidden property=\"page\" value=\"1\"/> 这通过在 `validation.xml`\
  \ 中为字段的验证规则添加 `page` 属性来补充。在您目前看到的示例中，字段具有 `property` 和 `depends` 属性。添加 `page` 属性后，您的表单现在可以包含跨不同\
  \ JSP 页面调用的验证！\n\n<field property=\"firstName\" depends=\"required,mask\" page=\"\
  1\"> 我们非常喜欢这个特性，因为它配置起来非常简单。\n\n索引属性验证允许您拥有包含在表单内的表单或子表单。\n\n例如，在您的应用程序中，一个 `ResumeForm`\
  \ 可以包含一对多的 `SkillGroupForms`。`SkillGroups` 描述一组技能。在技术简历上，一个好的 `SkillGroup` 可能是“Java”，或者更高级别的“编程语言”。此外，`SkillGroupForms`\
  \ 可以包含一对多的 `SkillForms`。以 Java 为例，您可能有诸如“Swing”、“JDBC”和“XML”等 `SkillForms`。一个用于编辑这些内容的良好用户界面应允许您查看简历的所有\
  \ `SkillGroups` 及其后续的 `SkillForms`。显示所有这些内容并不困难，因为您可以使用 `<logic:iterate>` 标签或 `<c:forEach>`。然而，要保存它们，您必须知道用户编辑了哪一行（或哪个表单）。这就是索引属性发挥作用的地方。您基本上可以在表单中添加一个\
  \ getter/setter，用于设置/获取嵌套的表单值。更多信息请参阅“在 Struts 中将索引属性与表单一起使用”一节。要配置验证器\n\n513-0\
  \ ch15.qxd 11/14/05 5:38 PM 第 602 页\n\n**602**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具\n\
  \n以验证索引属性，您需要在 `<field>` 元素中添加一个 `indexedListProperty` 属性：\n\n<field property=\"\
  groupName\" depends=\"required\" indexedListProperty=\"skills\">\n\n<var>\n\n<var-name>field[0]</var-name>\n\
  \n<var-value>name</var-value>\n\n</var>\n\n<var>\n\n<var-name>field-indexed[0]</var-name>\n\
  \n<var-value>true</var-value>\n\n</var>\n\n<var>\n\n<var-name>field-test[0]</var-name>\n\
  \n<var-value>NOTNULL</var-value>\n\n</var>\n\n</field>\n\n这表明 `skills` 属性包含一个列表，并且此\
  \ `skills` 列表中的必填字段是 `name` 属性。\n\n验证器最近新增的一个特性是能够根据其他字段的值有条件地要求验证字段。它允许您定义诸如“仅当字段\
  \ X 非空且字段 Y 包含 'male' 时才验证此字段”的逻辑。验证器支持验证索引属性，如前面示例中的 `[0]` 指示符所示。然而，在撰写本文时，它不支持动态索引属性。也就是说，您必须知道子（索引）属性的数量并相应地配置验证器。条件验证可能非常有用，但由于我们在\
  \ `struts-resume` 中未使用它，我们建议查阅在线文档以获取更多信息。\n\n**将验证器与 DynaActionForms 一起使用**\n\n\
  \n\n我们想提及的 Validator 的最后一个特性是，它也可以与 DynaActionForms 一起使用。正如您之前所见，DynaActionForms\
  \ 是通过在 `struts-config.xml` 中指定表单属性来创建的表单。这可以在为应用程序开发具体表单时节省时间。就个人而言，我们更倾向于为表单使用具体的\
  \ Java 类，而不是用表单属性把配置文件弄得杂乱无章。DynaActionForms 背后的主要动机是加速和简化 Struts 开发，以便开发者能够快速创建新表单。使用\
  \ XDoclet 生成表单甚至更快，因为（在我们的示例中）它还会创建持久层。使用 XDoclet 还会为您创建 `form-bean` 条目和 `validation.xml`，而如果您使用\
  \ DynaActionForms，您仍然需要手动创建 `validation.xml`。也就是说，创建一个使用 Validator 的 DynaActionForm\
  \ 就像指定它是哪种类型的 bean 一样简单。一个作为 DynaActionForm 创建的常规 UserForm 可能如下所示：\n\n<form-bean\
  \ name=\"userForm\"\n\ntype=\"org.apache.struts.action.DynaActionForm\">\n\n...\n\
  \n</form-bean>\n\n513-0 ch15.qxd 11/14/05 5:38 PM Page 603\n\n第 15 章 ■ 使用 STRUTS、XDOCLET\
  \ 和其他工具\n\n**603**\n\n要使此表单支持 Validator，您只需更改 `type` 属性：\n\n<form-bean name=\"userForm\"\
  \n\ntype=\"org.apache.struts.validator.DynaValidatorForm\">\n\n...\n\n</form-bean>\n\
  \n配置 Validator 看起来可能工作量很大；毕竟，您确实需要在 JSP 页面中添加三段不同的代码：表单的 `onsubmit` 处理程序、按钮的 `onclick`\
  \ 处理程序以及表单底部的 JavaScript 声明。然而，使用 StrutsGen 工具可以轻松地自动化这个过程。我们只需修改 `ActionForm_jsp.xdt`\
  \ 文件（位于 `tools/strutsgen/src`），使其包含所有这些 Validator 特定的代码，现在我们的初始表单将在生成时就支持 Validator！这有多棒？\n\
  \n**对索引标签执行验证**\n\nValidator 也能够对索引标签执行验证。您只需在 `validation.xml` 中为您想要验证的字段添加一个 `[#]`。例如，如果您想配置\
  \ ResumeForm 以要求第一个 SkillForm 的 name 字段，您可以在 `validation.xml` 文件中配置如下内容：\n\n<form\
  \ name=\"resumeForm\">\n\n...\n\n<field property=\"skills[0]name\"\n\ndepends=\"\
  required\">\n\n<msg name=\"required\"\n\nkey=\"errors.required\"/>\n\n<arg0 key=\"\
  skillForm.name\"/>\n\n</field>\n\n**使用内置的 Struts Actions**\n\n如果您已经构建了一个 Struts\
  \ 应用程序，您可能会发现您开发了一些遵循 MVC 模式的 action，但实际上并不需要它们。或者您可能直接链接到 JSP 页面，绕过了推荐的“每个链接都应通过控制器”的模型。我们知道我们以前就是这样做的——直到我们发现了\
  \ Struts 内置的 actions。我们现在把它们看作是一群热切的板凳球员，在说：“让我们上场吧，教练，我们保证会让您骄傲！”\n\n然而，您可能没有意识到它们的存在。因此，我们现在就来介绍这些状态良好的\
  \ actions，让您领略一下它们的潜力，甚至可能让它们上场参赛。\n\nStruts 有五个内置的 actions，前三个（ForwardAction、IncludeAction\
  \ 和 SwitchAction）完全不需要编码。最后两个，DispatchAction 和 LookupDispatchAction，旨在促进代码精简和重用。\n\
  \nForwardAction\n\nForwardAction 可用于重定向到 JSP 页面，同时仍然利用控制器的内置功能——例如使用 `roles` 属性保护\
  \ actions。在将模型 1 架构（即仅使用 JSP 页面）迁移到 Struts 时，它也非常有用。在示例简历\n\n513-0 ch15.qxd 11/14/05\
  \ 5:38 PM Page 604\n\n**604**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n应用程序中，使用 ForwardAction\
  \ 将用户引导至主菜单页面。要配置 ForwardAction，您只需将 `org.apache.struts.actions.ForwardAction` 类指定为\
  \ `type`，并将 JSP 页面（或 Tiles 定义）指定为 `parameter`。\n\n<action path=\"/mainMenu\"\n\n\
  type=\"org.apache.struts.actions.ForwardAction\"\n\nparameter=\".mainMenu\"/>\n\n\
  我们还创建了一个全局转发来调用此 action：\n\n<forward name=\"mainMenu\"\n\npath=\"/mainMenu.do\"\
  />\n\n配置好 action 和转发后，就可以在应用程序的起始页面（`index.jsp`）中调用它：\n\n<logic:redirect forward=\"\
  mainMenu\"/>\n\n您还应该注意，前面的 action 和转发定义分别位于 `metadata/web` 目录下的 `struts-actions.xml`\
  \ 和 `global-forwards.xml` 文件中。当执行 `strutsconfigxml` 任务时，XDoclet 会抓取这些片段并将它们合并到主\
  \ `struts-config.xml` 文件中。对于所有这三个“无需编码”的 actions，您都需要在这些文件中定义您的 actions 和 forwards。\n\
  \nIncludeAction\n\nIncludeAction 的开发原因与 ForwardAction 相同。它允许您集成使用 `RequestDispatcher.include()`\
  \ 的基于 servlet 的组件。与 ForwardAction 一样，它只需要您指定 `name`、`parameter` 和 `type` 属性。就个人而言，我们从未使用过它，也从未见过它被使用，但以下是您可能配置它的方式：\n\
  \n<action path=\"/resumeComments\"\n\ntype=\"org.apache.struts.actions.IncludeAction\"\
  \n\nparameter=\"/path/to/servlet\"/>\n\nSwitchAction\n\nSwitchAction 旨在允许切换应用程序模块。请稍后参考“在团队开发环境中使用模块”一节以获取完整描述和配置方法。\n\
  \nDispatchAction\n\nDispatchAction 和 LookupDispatchAction 是 Struts 框架的两个重要补充。\n\n\
  对于我们开发的第一个应用程序，我们最终为每个实体的创建、检索、更新和删除（CRUD）类创建了一个 Edit 和 Save action。编写完这些类后，我们注意到\
  \ Edit（用于检索和搜索）和 Save 类中存在大量重复代码。DispatchAction 及其友好的兄弟 LookupDispatchAction 允许您在\
  \ action 中创建不同的方法，这些方法根据一个参数进行“调度”。\n\n513-0 ch15.qxd 11/14/05 5:38 PM Page 605\n\
  \n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n**605**\n\n这意味着，您不必在 action 中编写一个 `execute()`\
  \ 方法，而是可以编写详细说明您业务逻辑的方法（例如 `add()`、`save()`、`remove()`、`search()`）。这两个 dispatch\
  \ action 类都是 `Action` 的子类，因此仍然可以使用 `execute()` 方法，但如果您想要调度行为，则必须在此方法中构建自己的调度机制。这些\
  \ actions 使用反射来选择并调用适当的方法。因此，您的方法必须具有 `public` 修饰符，否则您将看到 Struts 的白屏死机（或您浏览器设置的任何背景色！）。\n\
  \n要使用 dispatch action，您只需在您的 Action 类中继承它而不是 `Action`。我们通常为应用程序创建一个 `BaseAction`，并使用它来扩展适当的\
  \ `Action` 类。这提供了什么优势？通过使用 `BaseAction`，您只需在一个位置扩展 Struts 的 `Action` 类，并且您可以随时选择切换到\
  \ `DispatchAction` 或 `LookupDispatchAction`。此外，我们见过开发者使用 `BaseAction` 来处理或调度的情况，但我们从未需要那样做。也就是说，`BaseAction`\
  \ 类上有一个 `execute()` 方法，并且在 `web.xml` 中它被配置为 Struts 的 servlet。要在 `struts-resume`\
  \ 中做到这一点，您可以简单地更改 `metadata/web/servlets.xml` 中的以下行\n\n<servlet-class>org.apache.struts.action.ActionServlet</servlet-class>\
  \ 为\n\n\n\n<servlet-class>org.appfuse.webapp.action.BaseAction</servlet-class> 如果希望在分派到方法之前执行逻辑，最佳做法是深入研究\
  \ Struts 代码（优秀的开源项目！），并使用 `DispatchAction` 或 `LookupDispatchAction` 作为基类。你也可以在基类（或每个类）中使用\
  \ `preExecute()` 方法，并在每个方法的开头调用它。我们通过简单地使用 `BaseAction` 来存放公共操作方法，取得了良好的效果。例如，我们使用\
  \ `BaseAction` 实现了一个便捷方法，并通过 `getUserForm(session)` 从会话中获取用户信息。\n\n编写完 action 后，你需要在\
  \ `<action-mappings>` 中配置一个参数，适当地命名为 `method` 或 `action`——我们使用 `method` 以保持与文档一致，尽管我们更倾向于使用\
  \ `action`：\n\n<action path=\"/test\" type=\"org.example.MyAction\" name=\"MyForm\"\
  \ scope=\"request\"\n\ninput=\"/test.jsp\" parameter=\"method\"/> 然后，你需要在调用此 action\
  \ 的表单中添加一个隐藏字段。例如：\n\n<html:hidden property=\"method\" value=\"add\"/> 如果你不想从表单中获取\
  \ `method` 属性，也可以使用普通的 HTML 标签来实现：\n\n<input type=\"hidden\" name=\"method\" id=\"\
  method\" value=\"add\" /> 此外，你并不总是需要通过表单来调用 dispatch action，例如从列表中编辑某个项目时。为此，你可以使用已定义方法所指定的\
  \ forward：\n\n<forward name=\"editUser\" path=\"/editUser.do?method=edit\"/>\n\n\
  513-0 ch15.qxd 11/14/05 5:38 PM Page 606\n\n**606**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET\
  \ 及其他工具\n\n然而，`DispatchAction` 也存在一些问题。例如，如果你的表单中有多个按钮（如添加、复制、保存、删除）来执行不同的操作，你就必须使用\
  \ JavaScript 来操作 `method` 隐藏字段。虽然 JavaScript 是一种完全可以接受的方式，但还有一种更简单的方法——`LookupDispatchAction`。\n\
  \nLookupDispatchAction\n\n`LookupDispatchAction` 类是 `DispatchAction` 的子类，它允许你将按钮标题映射到方法名。此外，它会从你的\
  \ Struts ResourceBundle（`ApplicationResources.properties`）中读取按钮标题。这意味着你可以轻松地将键 `button.save`\
  \ 映射到 `save()` 方法。\n\n要在项目中实现 `LookupDispatchAction`，你首先必须在你的类中继承 `LookupDispatchAction`。同样，我们建议在\
  \ `BaseAction` 类中完成此操作，然后让你的项目中的 action 继承自这个基类。你需要在 `<action-mappings>` 中添加一个参数，这与\
  \ `DispatchAction` 非常相似：\n\n<action path=\"/test\"\n\ntype=\"org.example.MyAction\"\
  \n\nname=\"MyForm\"\n\nscope=\"request\"\n\ninput=\"/test.jsp\"\n\nparameter=\"\
  action\"/>\n\n你可以将参数设置为 `method`，但 `action` 在 `LookupDispatchAction` 的 Javadoc 中已有演示，因此我们在这里使用它以避免混淆。`action`\
  \ 请求参数将用于在 `ApplicationResources` 中定位对应的键。在适当配置 `struts-config.xml` 或 action 类中的\
  \ XDoclet 标签后，你需要在子类中实现 `getKeyMethodMap()` 方法，如下所示：protected Map getKeyMethodMap()\
  \ {\n\nMap map = new HashMap();\n\nmap.put(\"button.add\", \"add\");\n\nmap.put(\"\
  button.delete\", \"delete\"); return map;\n\n}\n\n你的 `ApplicationResources.properties`\
  \ 文件决定了按钮上显示的文本，因此应包含这两个键的条目：button.add=添加记录\n\nbutton.delete=删除记录\n\n最后，你需要将表单提交按钮的\
  \ `property` 属性设置为 `action`，以便将按钮的标题传递给 action：\n\n<html:submit property=\"action\"\
  >\n\n<bean:message key=\"button.add\"/>\n\n</html:submit>\n\n513-0 ch15.qxd 11/14/05\
  \ 5:38 PM Page 607\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具\n\n**607**\n\n<html:submit\
  \ property=\"action\">\n\n<bean:message key=\"button.delete\"/>\n\n</html:submit>\n\
  \n在 `struts-resume` 应用程序中，`BaseAction` 继承了 `LookupDispatchAction`。我们还对 `getKeyMethodMap()`\
  \ 方法进行了自己的小改进，使得键值对可以从另一个属性文件中加载。这样可以在不重新编译的情况下将新方法映射到按钮。这看起来可能有些过度设计，但实现起来只需几分钟。我们遇到的一个问题是，如果你使用\
  \ JavaScript 在点击后禁用提交按钮，`action` 参数将不会被发送。\n\n■**注意** 有关这些内置 action 的更多信息，可以在 Struts\
  \ Javadocs 中找到，网址为 http://struts.apache.org/javadoc.html。\n\n**使用 Tiles 框架组装视图**\n\
  \n**Tiles** 是一个复合视图框架，用于从组件部分组装展示页面。每个部分（或称为 tile）可以在整个应用程序中根据需要重复使用。你可以在任何 JSP\
  \ 或 Servlet 应用程序中使用 Tiles，但它最初是为 Struts 设计的，因此在 Struts 中使用最为方便。自 Struts 1.1 起，Tiles\
  \ 框架已集成到核心 Struts 库（`struts.jar`）中。Tiles 常被视为一个重量级、配置密集型的插件，但实际上它提供了与（现已弃用的）struts-template\
  \ 标签库相同的简单功能。\n\nTiles 由 Cedric Dumoulin 开发，在我们看来，这是 JSP 开发者遇到的最好的事情之一。像 CSS 和 XHTML\
  \ 这样的标准也很棒（并且为开发跨浏览器工作的 Web 应用程序提供了更多结构），但 Tiles 让这一切变得*更加容易*。Tiles 将减少你构建 Web 应用程序的开发时间，并且还能让你相对轻松地更改整个应用程序的外观。它提供了我们所知的最佳布局框架，尽管还有其他框架拥有热情的拥护者，例如\
  \ OpenSymphony 的 SiteMesh (http://www.opensymphony.com/sitemesh)。\n\n在过去的几年里，我们开发了几个\
  \ JSP 应用程序，并使用了多种不同的技术进行布局。第一种技术类似于开发静态网站的方式，即每个 JSP 页面都包含典型 HTML 页面的所有布局元素。\n\n\
  这包括 `<html>` 声明、`<head>` 元素、`<body>`，以及 `<body>` 内的任何 `<div>` 或 `<table>` 元素，还有实际内容。虽然这对于\
  \ HTML 开发者来说通常更容易掌握，但这绝对是困难的方式。如果你需要进行网站重新设计，很可能需要修改每个 JSP 文件。当然，HTML 编辑器（如 Dreamweaver、BBEdit\
  \ 和 HomeSite）通过其全局搜索和替换功能可以使这变得更容易，但同时也可能轻易搞乱你的 HTML。\n\n一种更简单的方法是*包含*所有页面共有的元素。这些元素包括包含\
  \ CSS 和 JavaScript 引用的 `<head>` 元素，或者所有页面共有的菜单。\n\n513-0 ch15.qxd 11/14/05 5:38\
  \ PM Page 608\n\n**608**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具\n\n虽然这种方法比第一种方法容易得多，但你仍然需要在所有页面中重复代码来包含这些外部元素。可能只有三四行代码，但无论如何，如果你忘记包含页眉，很可能直到你（或你的用户）通过浏览器运行页面时才会发现。\n\
  \n\n\n如果你正在使用 Struts，我们推荐使用 Tiles，因为它提供了许多与 Struts 的内置互操作特性。与 Validator 类似，只需在你的应用程序的\
  \ `web.xml` 中添加一个 Servlet 条目，它就可以独立使用。不过，我们不会探讨这种配置，因为本章重点介绍基于 Struts 的解决方案。我们将说明示例简历应用程序中使用的模板系统，以及我们如何在这个特定应用程序中实现\
  \ Tiles。我们将使用的架构和技术已经在生产应用程序中得到验证和证明。Tiles 可以以多种不同方式用于构建门户网站、菜单系统以及定制化。\n\nTiles\
  \ 的详细在线文档可以在 http://www.lifl.fr/~dumoulin/tiles/ 找到。\n\n**在示例应用程序中使用 Tiles**\n\n\
  首先，让我们看看如何将 Tiles 集成到 Struts 应用程序中。对于 Struts，这与 Validator 非常相似，只需在 `struts-config.xml`\
  \ 文件中将其注册为插件即可：\n\n<plug-in className=\"org.apache.struts.tiles.TilesPlugin\" >\n\
  \n<set-property property=\"definitions-config\"\n\nvalue=\"/WEB-INF/tiles-config.xml\"\
  \ />\n\n<set-property property=\"moduleAware\" value=\"true\" />\n\n<set-property\
  \ property=\"definitions-parser-validate\" value=\"true\" />\n\n</plug-in>\n\n如果你正在使用\
  \ XDoclet，这需要放在合并目录中的 `struts-plugins.xml` 文件中。使用 Tiles 基本上有两种方式：\n\n• 第一种是通过一个\
  \ JSP 页面，该页面将其他页面作为模板包含进来。\n• 第二种是使用 XML 文件来定义给定页面中的不同组件，也称为**定义**。\n\n我们强烈推荐使用\
  \ XML 配置的方式，因为它允许你在一个位置更改页面定义，而不是逐个页面进行修改。它还支持继承，因此你可以定义一个包含相同页眉和页脚的基础定义，然后在子定义中无需再指定这些内容。第一个属性\
  \ `definitions-config` 指向你用来定义定义的文件。它还支持以逗号分隔的文件路径列表，如果你的应用程序中有许多页面或定义，这会很方便。第二个属性\
  \ `moduleAware` 允许 Tiles 识别模块（以前称为子应用程序）。\n\n我们将在接下来的章节中进一步描述这些内容。\n\nTiles 的基础在于它允许你为整个应用程序定义一个“模板”，或者根据你的需要定义多个模板。这个模板通常看起来像一个普通的\
  \ HTML 文件，包含所有基本元素，例如 `<html>`、`<head>`、`<body>`，以及任何布局元素，例如 `<div>` 或 `<table>`。如果你仍然在使用表格来布局你的\
  \ Web 应用程序，我们恳请你尝试使用 `<div>` 和 CSS 的无表格布局，因为它会使你的页面更轻量、更小巧，对客户端更友好。XHTML 和 CSS，当然还有现代浏览器，使得这变得容易得多。清单\
  \ 15-1 展示了一个非常简单的 Tiles 模板。\n\n513-0 ch15.qxd 11/14/05 5:38 PM 第 609 页\n\n第 15 章\
  \ ■ 使用 STRUTS、XDOCLET 和其他工具\n\n**609**\n\n**清单 15-1.** *template.jsp*\n\n<!DOCTYPE\
  \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
  >\n\n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags/struts-tiles\"\n\nprefix=\"\
  tiles\" %>\n\n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags/struts-bean\"\
  \n\nprefix=\"bean\" %>\n\n<html:html xhtml=\"true\" locale=\"true\">\n\n<head>\n\
  \n<%-- 将 tiles 属性推入页面上下文 --%>\n\n<tiles:importAttribute />\n\n<title><bean:message\
  \ name=\"title.key\"/></title>\n\n</head>\n\n<body>\n\n<div id=\"header\">\n\n<tiles:insert\
  \ attribute=\"header\"/>\n\n</div>\n\n<div id=\"menu\">\n\n<tiles:insert attribute=\"\
  menu\" ignore=\"true\"/>\n\n</div>\n\n<div id=\"content\">\n\n<%@ include file=\"\
  /common/messages.jsp\" %>\n\n<h1><bean:message name=\"heading.key\"/></h1>\n\n<tiles:insert\
  \ attribute=\"content\"/>\n\n</div>\n\n<div id=\"footer\">\n\n<tiles:insert attribute=\"\
  footer\"/>\n\n</div>\n\n</body>\n\n</html:html>\n\n\n\n在前一个模板中，您可以看到有些属性是导入的，有些则是插入的。基本上，`<tiles:importAttribute>`\
  \ 用于 `<bean:message/>` 标签。当您配置应用程序使用此模板时，实际上可以告诉它使用 `ApplicationResources.properties`\
  \ 文件中的哪个键作为 `title.key` 和 `heading.key`。`<tiles:insert />` 标签用于插入或包含一个 JSP 页面，但这也可以是应用程序中任何组件的\
  \ URL。\n\n如果您要将 JSP 页面插入到 Tiles 模板中，则需要配置这些 JSP 页面，使其能够独立于其他页面执行。这意味着，它们可以通过动态包含（`<jsp:include>`）而非静态包含（`<%@\
  \ include %>`）来引用。因此，您必须在每个页面的顶部引用相应的标签库。为了更快速、更轻松地进行开发，我们通常会创建一个包含所有标签库声明的 JSP\
  \ 文件，然后使用静态包含将其包含在每个页面中。您可以在 struts-resume 应用程序中看到这样一个示例。清单 15-1 中的模板将呈现一个类似于图 15-12\
  \ 所示的布局。\n\n![Image 191](img/index-643_1.png)\n\n513-0 ch15.qxd 11/14/05 5:38 PM\
  \ 第 610 页\n\n**610**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n**图 15-12.** *前面展示的\
  \ Tiles 模板渲染出的这个网页。*\n\nTiles 模板（也称为布局）可以通过两种不同的技术进行引用。\n\n第一种是使用 JSP 页面。例如，您可以将所有\
  \ JSP 页面放在一个 pages 目录中。\n\n当使用 JSP 页面来组合 Tiles 页面时，这种技术非常有用。您只需将所有不同的页面部分（或 **tiles**）放在\
  \ pages 目录中，然后从根目录引用它们即可。例如，根目录中的一个页面可能如下所示：\n\n<%@ include file=\"/common/taglibs.jsp\"\
  %>\n\n<tiles:insert page=\"/layouts/simpleLayout.jsp\" flush=\"true\">\n\n<tiles:put\
  \ name=\"title.key\" value=\"login.title\"/>\n\n<tiles:put name=\"heading.key\"\
  \ value=\"login.heading\"/>\n\n<tiles:put name=\"header\" value=\"/common/header.jsp\
  \ \"/>\n\n<tiles:put name=\"menu\" value=\"/menu.html\"/>\n\n<tiles:put name=\"\
  content\" value=\"/WEB-INF/pages/login.jsp\"/>\n\n<tiles:put name=\"footer\" value=\"\
  /common/footer.jsp \"/>\n\n</tiles:insert>\n\n第二种选择是使用 XML 文件并为每个页面创建**定义**。这样做的好处是，定义可以相互继承，并且可以为页面组合信息提供一个中央存储库。此外，定义仍然可以从\
  \ JSP 页面（使用 `/do/*` 映射时）或作为 `struts-config.xml` 中的 `ActionForward` 路径进行引用。让我们看看前面的\
  \ JSP 代码在 `tiles-config.xml` 文件中可能是什么样子：\n\n<definition name=\".login\" path=\"\
  /layouts/simpleLayout.jsp\">\n\n<put name=\"title.key\" value=\"login.title\"/>\n\
  \n<put name=\"heading.key\" value=\"login.heading\"/>\n\n513-0 ch15.qxd 11/14/05\
  \ 5:38 PM 第 611 页\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n**611**\n\n<put name=\"\
  header\" value=\"/common/header.jsp\"/>\n\n<put name=\"menu\" value=\"/menu.html\"\
  />\n\n<put name=\"content\" value=\"/WEB-INF/pages/welcome.jsp\"/>\n\n<put name=\"\
  footer\" value=\"/common/footer.jsp\"/>\n\n</definition>\n\n使用定义的主要优势之一是，您可以相互继承属性。这样，您可以创建一个所有定义都继承的\
  \ `baseLayout` 定义，子定义就不需要再定义某些属性，例如 header 和 footer。前面的定义可以重构为如下形式：\n\n<definition\
  \ name=\"baseLayout\" path=\"/layouts/baseLayout.jsp\">\n\n<put name=\"title.key\"\
  />\n\n<put name=\"heading.key\"/>\n\n<put name=\"header\" value=\"/common/header.jsp\"\
  />\n\n<put name=\"footer\" value=\"/common/footer.jsp\"/>\n\n</definition>\n\n<definition\
  \ name=\".login\" extends=\"baseLayout\">\n\n<put name=\"title.key\" value=\"login.title\"\
  />\n\n<put name=\"heading.key\" value=\"login.heading\"/>\n\n<put name=\"menu\"\
  \ value=\"/menu.html\"/>\n\n\n\n<put name=\"content\" value=\"/WEB-INF/pages/welcome.jsp\"\
  />\n\n</definition>\n\n在之前的 `.login` 定义中，你会注意到我们在 tile 名称前加了一个句点（`.`）。这种点号表示法是命名\
  \ tile 的推荐做法。由于 Tiles 的定义可以在 forward 的 `path` 属性中被引用，这个前缀使它们更容易被识别。\n\n如果你不想从 action\
  \ 转发到某个定义，可以在 JSP 页面中直接引用它。在 struts-resume 项目中，我们在 login.jsp 页面中就是这样做的。我们使用 `<security-constraint>`\
  \ 保护了所有 `*.do` 映射，因此未经身份验证无法访问任何 action。\n\nlogin.jsp 页面的内容简短明了：\n\n```\n<%@ include\
  \ file=\"/common/taglibs.jsp\"%>\n\n<tiles:insert definition=\".login\" flush=\"\
  true\"/>\n```\n\n在提供的示例中，你会注意到标题和页眉设置的消息来自 `ApplicationResources.properties`，但还有另一种选择。这可能就是为什么\
  \ Tiles 对某些人来说显得如此令人生畏——因为选项太多了！\n\n然而，我们确实想向你展示一些可能更适合你的其他选项。\n\n你可以直接在定义或 JSP\
  \ 中对字符串进行硬编码，而不是使用 `ApplicationResources.properties` 文件来表示标题或页眉：\n\n```\n<put name=\"\
  title\" value=\"Login to Struts Resume\"/>\n```\n\n你可以使用 `<tiles:getAsString name=\"\
  title\"/>`，而不是使用 `<tiles:importAttributes/>` 和 `<bean:message key=\"title.key\"\
  />`。你可能会认为在这个过程中失去了国际化（I18n）支持，但 Tiles 提供了另一种实现 I18n 的方式：为每个区域创建单独的 XML 定义文件。使用这种策略，你会有一个用于英语的\
  \ `tiles_config_en.xml`，用于俄语的 `tiles_config_ru.xml`，依此类推。使用\n\n513-0 ch15.qxd 11/14/05\
  \ 5:38 PM 第 612 页\n\n**612**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n`ApplicationResources.properties`\
  \ 文件是国际化应用程序的一种更简单的方法，因为所有语言更改都可以在一个文件中完成。\n\n之前我们提到，CSS 样式表可以极大地提高布局的灵活性。我们在许多项目中都使用过不同的样式表，用于不同的页面，甚至不同的用户。我们使用过两种切换样式表的方法：第一种是基于页面，第二种是针对用户。第一种方法使用\
  \ Tiles 定义为任何给定页面设置样式表。既然你已经在做这件事，不妨也添加同样的功能来包含 JavaScript 文件。首先，你可以在 `baseLayout`\
  \ 定义中添加你想要包含的文件：\n\n```\n<definition name=\"baseLayout\" path=\"/layouts/baseLayout.jsp\"\
  >\n    <put name=\"title.key\"/>\n    <put name=\"heading.key\"/>\n    <put name=\"\
  header\" value=\"/common/header.jsp\"/>\n    <put name=\"footer\" value=\"/common/footer.jsp\"\
  />\n    <!-- 默认 JavaScript 文件 -->\n    <putList name=\"scripts\">\n        <add\
  \ value=\"/scripts/global.js\"/>\n    </putList>\n    <!-- 默认样式表文件 -->\n    <putList\
  \ name=\"styles\">\n        <add value=\"/styles/default.css\"/>\n    </putList>\n\
  </definition>\n```\n\n然后，在 `baseLayout.jsp` 文件中，你可以使用 Tiles 标签和 JSTL 来获取这些属性并按如下方式渲染它们：\n\
  \n```\n<%-- 获取 JavaScript 列表 --%>\n<tiles:useAttribute id=\"scriptList\" name=\"\
  scripts\"\n    classname=\"java.util.List\" ignore=\"true\"/>\n<c:forEach var=\"\
  js\" items=\"${scriptList}\">\n    <script type=\"text/JavaScript\"\n        src=\"\
  <%=request.getContextPath()%><c:out value=\"${js}\"/>\">\n    </script>\n</c:forEach>\n\
  \n<%-- 获取样式表列表 --%>\n<tiles:useAttribute id=\"styleList\" name=\"styles\"\n    classname=\"\
  java.util.List\" ignore=\"true\"/>\n<c:forEach var=\"css\" items=\"${styleList}\"\
  >\n    <link rel=\"stylesheet\" type=\"text/css\" media=\"all\"\n        href=\"\
  <%=request.getContextPath()%><c:out value=\"${css}\"/>\" />\n</c:forEach>\n```\n\
  \n我们必须添加 scriptlet `<%=request.getContextPath()%>`，因为 `putList` 中的 `add value` 只渲染字面值。我们不想在\n\
  \n513-0 ch15.qxd 11/14/05 5:38 PM 第 613 页\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n\
  **613**\n\n定义文件中硬编码 `contextPath`，所以这是一个简单的解决方案。如果你使用的是 JSP 2.1，可以将 `<c:out value=\"\
  ${variable}\"/>` 替换为 `${variable}`。你还可以将样式表的 `<link>` 标签替换为更现代的导入样式表的方法，即使用 `@import`。使用这种语法，样式表导入将如下所示：\n\
  \n```\n<style type=\"text/css\" media=\"all\">\n    <c:forEach var=\"css\" items=\"\
  ${styleList}\">\n        @import url(<%=request.getContextPath()%><c:out value=\"\
  ${css}\"/>);\n    </c:forEach>\n</style>\n```\n\n这种技术可以用来减少编写的 HTML 量，也可以为旧版浏览器（例如\
  \ Netscape 4.x）禁用样式表。这听起来可能有些愚蠢，但为什么要为旧版浏览器禁用样式表呢？原因很简单。如果你的网站是使用 CSS 和 `<div>`\
  \ 元素进行布局的，那么在没有样式表的情况下查看你的网站可能仍然可读，但它只是纯文本，黑白的，没有花哨的布局。\n\n这允许旧版浏览器仍然可以看到你的内容，而且你不必担心让你的\
  \ CSS 与旧版浏览器兼容。当然，这种奢侈完全取决于你的客户。我们的建议是放弃对旧版浏览器的支持——我们保证仅此一项就能提高你的生产力。如果你愿意使用符合标准的服务器（Java\
  \ EE），为什么不对客户端也提出符合标准的要求呢？可以肯定的是，大多数用户现在已经升级到了更新的浏览器。\n\n**浏览器——另一种观点**\n\n然而，本书至少有一位作者不同意随意放弃对旧版浏览器支持的建议。截至\
  \ 2005 年 7 月，68% 的网络用户在使用 Internet Explorer 6（http://www.w3schools.com/browsers/browsers_stats.asp）。但从另一个角度来看，32%\
  \ 的潜在用户正在使用 Internet Explorer 6 以外的浏览器。而当 Internet Explorer 7 发布时，可以预计许多人会在升级前继续使用版本\
  \ 6 好几个月。\n\n除了使用旧版浏览器之外，你的网站的大量用户可能正在使用拨号连接（根据 http://www.websiteoptimization.com/bw/0506/\
  \ 的数据，比例为 41%）。\n\n正如 W3Schools 在其网站上所说：\n\n“全球平均值可能并不总是与你的网站相关。不同的网站吸引不同的受众。\n\
  一些网站吸引使用专业硬件的专业开发人员，其他网站则吸引使用老旧低端电脑的爱好者。”\n\n你的应用程序设计的一部分应该考虑你网站用户的特征。\n如果你确定有足够多的用户将使用尖端技术，那么你的设计决策将与如果你认为许多用户是使用\
  \ 56K 拨号调制解调器连接的老旧电脑的老年用户时不同。\n\n在 struts-resume 应用程序中，我们使用 `<link>` 语法，以便将来可以使用样式表切换器。我们实现的是\
  \ Paul Sowden 开发的样式表切换器，\n\n513-0 ch15.qxd 11/14/05 5:38 PM 第 614 页\n\n**614**\n\
  \n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n其实现说明记录在 http://www.alistapart.com/stories/alternate/。基本上，它使用\
  \ JavaScript 和 cookie 来禁用或启用你偏好的样式表。我们在几个项目中使用过它，发现它非常有用。\n\n在你设置好模板和 `baseLayout`\
  \ 定义以渲染多个样式表之后，你可以在子定义中覆盖该列表。需要注意的一点是，`<putList>` 不允许扩展，所以你必须替换整个列表。这意味着，如果你只想添加一个额外的样式表，你也必须包含原始的（`default.css`）样式表。在\
  \ `mainMenu` 定义中，你正在使用 **Struts Menu**（http://www.sourceforge.net/projects/）\n\n\
  \n\nstruts-menu) 作为您的菜单系统。该菜单需要额外的样式表文件和 JavaScript 文件。因此，您应该用新的列表替换原有的列表：\n\n<putList\
  \ name=\"scripts\">\n\n<add value=\"/scripts/global.js\"/>\n\n<add value=\"/scripts/menuExpandable.js\"\
  />\n\n</putList>\n\n<putList name=\"styles\">\n\n<add value=\"/styles/default.css\"\
  />\n\n<add value=\"/styles/menuExpandable.css\"/>\n\n</putList>\n\n相当巧妙，对吧？过去一年我们一直使用这项技术，效果非常好。\n\
  \n**Tiles、XDoclet 和 Forwards**\n\n使用 Tiles 来组装和定义页面非常方便，但如何调用这些定义呢？引用 Tiles 定义最简单的方法是使用\
  \ ActionForward。\n\n当您在 Struts 配置文件中添加 Tiles 插件时，会使用一个智能的、支持 Tiles 的处理器来执行请求。这个名为\
  \ TilesRequestProcessor 的处理器继承自 Struts 默认的 RequestProcessor，用于拦截对 includes 和 forwards\
  \ 的调用，以检查指定的 URI（路径）是否是一个定义名称。\n\n要在应用程序中配置 Tiles 定义转发，您只需将 `<forward>` 的 `path`\
  \ 属性与定义的 `name` 属性匹配即可。例如，在 struts-resume 中，ResumeAction 的 `search()` 方法返回一个指向本地\
  \ `<forward>` 的 ActionForward，该 forward 名为 `list`：\n\nreturn mapping.findForward(\"\
  list\");\n\n这个 forward 在 struts-config.xml 中为 ResumeAction 类定义如下：\n\n<action path=\"\
  /editResume\" type=\"org.appfuse.webapp.action.ResumeAction\"\n\nname=\"resumeForm\"\
  \ scope=\"request\" input=\"viewResumes\"\n\nparameter=\"action\" unknown=\"false\"\
  \ validate=\"false\">\n\n<forward name=\"edit\" path=\".resumeDetail\" redirect=\"\
  false\"/>\n\n<forward name=\"list\" path=\".resumeList\" redirect=\"false\"/>\n\n\
  </action>\n\n513-0 ch15.qxd 11/14/05 5:38 PM Page 615\n\n第 15 章 ■ 使用 STRUTS、XDoclet\
  \ 和其他工具\n\n**615**\n\n在 tiles-config.xml 中，`.resumeList` 定义是一个简单的定义，它定义了标题、页眉和内容页面。\n\
  \n<definition name=\".resumeList\" extends=\".mainMenu\">\n\n<put name=\"title.key\"\
  \ value=\"resumeList.title\" />\n\n<put name=\"heading.key\" value=\"resumeList.heading\"\
  \ />\n\n<put name=\"content\" value=\"/WEB-INF/pages/resumeList.jsp\"/>\n\n</definition>\n\
  \n在 struts-resume 中，BaseAction 类继承自 LookupDispatchAction，并且广泛使用 Tiles 定义来组装页面。从\
  \ JSP 的 URL 到 action 的方法，再到 Tiles 定义的逻辑流程有时会令人困惑，尤其是当您引入 XDoclet 来定义 action 的映射和本地\
  \ forwards 时。图 15-13 展示了这一切的逻辑流程。\n\n**MainMenu** (JSP)\n\n链接“查看我的简历”与全局转发 `viewResumes`\
  \ 相关联，而 `viewResumes` 又与路径 `/viewResumes.do?action=search` 相关联。因此，流程通过 ActionServlet(*.do)\
  \ 到达路径 */viewResumes.do。\n\n**ResumeAction** (Action)\n\nResumeAction.java 的 JavaDoc\
  \ 中的 Xdoclet 标签定义了一个名为 `action` 的参数。之前指定的路径表明 `action=search`，因此流程传递到 `search()`\
  \ 方法。\n\n**search()** 方法\n\n该方法包含一行代码 `return mapping.findForward(\"list\");`。这个\
  \ `list` 转发是使用 Xdoclet 定义的：\n\n* @struts.action-forward\n\n*\n\nname= list\n\n*\n\
  \npath= .resumeList\n\n**.resumeList** 定义\n\n来自 **tiles-config.xml**\n\n**图 15-13.**\
  \ *从 JSP 到 Tiles 的控制逻辑流程*\n在上图中，ResumeAction 类继承自 LookupDispatchAction。基本上，它允许您使用一个参数（action）来指定在\
  \ Action 类中调用哪个方法。\n\n该图显示了用于在 Struts 配置文件中创建 ResumeAction 映射及其本地 forward 的 XDoclet\
  \ 标签。所有这些标签都写在类的头部 Javadoc 注释中。\n\n513-0 ch15.qxd 11/14/05 5:38 PM Page 616\n\n\
  **616**\n\n第 15 章 ■ 使用 STRUTS、XDoclet 和其他工具\n\n**Tiles 控制器**\n\nTiles 控制器对于改进支持\
  \ Tiles 的应用程序的架构非常有帮助。它们在当前的出版物中并未得到太多关注，但却是一个非常实用的特性。其核心思想是，Tiles 控制器旨在为在 tile\
  \ 上呈现数据做准备。您可以将其视为一个微型 action。然而，这些控制器并非用于确定应用程序流程；那是 ActionServlet 的职责。如果您正在开发一个门户网站，或者您的\
  \ tiles 需要它们自己的自定义数据，那么您绝对应该考虑使用一个。\n\n当然，通过一个例子会更容易理解。因此，我们为 struts-resume 创建了一个功能，用于统计当前活动的会话数，并将其显示为“当前用户”。我们首先创建了一个实现\
  \ ServletContextListener 和 HttpSessionListener 的 UserCounterListener。这个监听器在新会话创建时递增一个应用程序范围的变量，并在会话销毁时递减同一个变量。该源文件位于\
  \ struts-resume 的 src/web/org/appfuse/webapp/listener 目录下。我们使用了 XDoclet 的 `@web:listener`\
  \ 标签在 web.xml 中为这个类创建了一个 `<listener>` 条目。\n\n为了实现一个 Tiles 控制器，我们创建了一个实现 Controller\
  \ 接口及其方法的 UserCounterController 类：\n\npublic final class UserCounterController implements\
  \ Controller {\n\n/**\n\n* 此方法演示了使用 Tiles 控制器获取此应用程序“当前用户”计数器的简单示例。\n\n*\n\n* @param\
  \ tileContext 当前 tile 上下文\n\n* @param request 当前请求\n\n* @param response 当前响应\n\n\
  * @param servletContext 当前 Servlet 上下文\n\n*/\n\npublic void perform(ComponentContext\
  \ tilesContext,\n\nHttpServletRequest request,\n\nHttpServletResponse response,\n\
  \nServletContext servletContext)\n\nthrows ServletException, IOException {\n\n//\
  \ 从应用程序上下文中获取当前用户数\n\nString userCounter =\n\n(String) servletContext.getAttribute(UserCounterListener.COUNT_KEY);\n\
  \n// 将此数字添加到请求中以供显示\n\nrequest.setAttribute(UserCounterListener.COUNT_KEY, userCounter);\n\
  \n}\n\n}\n\n您可以看到 `perform()` 方法的签名与 Action 类的签名类似——只是没有 ActionMapping 或 ActionForm。ComponentContext\
  \ 是一个类似于请求或会话作用域的作用域；然而，它特定于 Tiles，用于存储其配置信息。\n\n513-0 ch15.qxd 11/14/05 5:38 PM\
  \ Page 617\n\n第 15 章 ■ 使用 STRUTS、XDoclet 和其他工具\n\n**617**\n\nUserCounterController\
  \ 只是从应用程序作用域中获取一个属性并将其放入请求作用域。但是，您可以轻松地在此方法中添加更复杂的逻辑。在此示例中，为简单起见，我们将属性存储在请求属性中，但也可以使用以下代码将其存储在\
  \ ComponentContext 中：`tilesContext.putAttribute(UserCounterListener.COUNT_KEY, userCounter);`\
  \ 这将确保该属性仅对此 tile 可用。\n\n为了配置 struts-resume 使用此控制器，我们编辑了 tiles-config.xml 文件（位于\
  \ web/WEB-INF 目录下）。我们决定在页面的页眉中显示这个“当前用户”计数器——并且由于我们只在 `baseLayout` 定义中定义了页眉，所以这是一个简单的更改。\n\
  \n更改前，页眉 tile 只是指向 header.jsp 文件：\n\n<definition name=\"baseLayout\" path=\"/layouts/baseLayout.jsp\"\
  >\n\n...\n\n<put name=\"header\" value=\"/common/header.jsp\"/>\n\n...\n\n</definition>\n\
  \n为了使 *header* tile 支持控制器，我们为其创建了一个新的定义，并从 baseLayout 定义中指向它：\n\n<definition name=\"\
  baseLayout\" path=\"/layouts/baseLayout.jsp\">\n\n...\n\n<put name=\"header\" value=\"\
  .header.userCount\"/>\n\n...\n\n</definition>\n\n<definition name=\".header.userCount\"\
  \ path=\"/common/header.jsp\"\n\n\n\ncontrollerClass=\"org.appfuse.webapp.action.UserCounterController\"\
  \ /> 这意味着，每当出现 \".header.userCount\" 磁贴的页面时，都会调用 `UserCounterController.perform()`\
  \ 方法。为了在 header.jsp 中显示计数器，我们随后添加了以下 JSP 代码：\n\n<%-- 检查以确保 \"userCounter\" 存在于请求中，如果不存在，则不显示\
  \ --%>\n\n<c:if test=\"${requestScope.userCounter != null}\">\n\n<div id=\"activeUsers\"\
  >\n\n<bean:message key=\"mainMenu.activeUsers\"/>:\n\n<c:out value=\"${userCounter}\"\
  \ />\n\n</div>\n\n</c:if>\n\n为了测试它，我们使用两个不同的浏览器登录了 struts-resume 应用程序，这创建了两个不同的会话。会话创建后，头部中的用户计数器文本（见图\
  \ 15-14）显示当前有两个用户处于活动状态。我们意识到这可能不是一个精确的计数，但这已经是 Web 应用程序所能达到的最准确程度了。\n\n![图片 192](img/index-651_1.png)\n\
  \n513-0 ch15.qxd 11/14/05 5:38 PM 第 618 页\n\n**618**\n\n第 1 5 章 ■ 使用 STRUTS、XDOCLET\
  \ 和其他工具\n\n**图 15-14.** *使用 Tiles 控制器，应用程序可以跟踪会话数量，并在头部显示该数字。*\n\n您可以看到，Tiles 控制器可以成为您\
  \ Struts 工具箱中非常有价值的资产。\n\n您可以减少操作中所需的代码量，并将特定的逻辑移动到特定的磁贴中。您甚至可能无需再链式调用多个操作，而是使用多个磁贴和控制器的组合。我们鼓励您考虑使用控制器，因为它们可以极大地帮助您组织代码和视图逻辑。通过使用控制器，操作可以专注于页面流程，而不是准备视图。\n\
  \n如果您正在开发一个非常小且简单的应用程序，可能不需要 Tiles。Tiles 的难点在于找到一个好的示例来操作和扩展。我们希望这些示例，结合 struts-resume\
  \ 应用程序，能让您的 Struts 开发之旅更加轻松。您应该能够使用 `basicLayout.jsp` 和 `tiles-config.xml` 文件来快速上手。如果您已经了解\
  \ Struts 但尚未使用 Tiles，那么为了您自己（以及您的项目截止日期），您应该尝试一下。\n\n**使用 IDE 和 Struts 开发环境**\n\n\
  我们过去一直使用 Macromedia 的 HomeSite 和 vi 进行所有 Java 编辑，因为我们讨厌 IDE 的臃肿和内存浪费。此外，IDE 似乎总是把事情复杂化，而不是简化。随着\
  \ IDEA 和 Eclipse 等工具的成熟，使用 IDE 再次变得有趣起来——并且值得我们投入时间（1GB 的内存也没什么坏处）。\n\n我们从未觉得需要使用\
  \ IDE 来帮助我们配置 `struts-config.xml` 或 `web.xml` 文件。然而，这可能是因为当我们刚开始使用 Struts 和 Web\
  \ 应用程序时，这些工具还不存在。现在我们很庆幸学习了 DTD，并且我们觉得\n\n513-0 ch15.qxd 11/14/05 5:38 PM 第 619\
  \ 页\n\n第 1 5 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n**619**\n\n有了这些知识，工作起来更容易。如果手动编辑 XML\
  \ 文件，我们推荐使用 XMLSpy (http://www.xmlspy.com)。这是一个适用于任何 XML 相关开发的出色工具，因为它能根据 DTD 或\
  \ XML Schema 验证您的 XML，并在您输入时执行自动补全。学习 DTD 或 XML Schema 的另一个原因是，像 XDoclet 这样的工具会从多个\
  \ XML 片段组装 `struts-config.xml` 文件，而大多数 IDE 工具只支持编辑完全组装好的 `struts-config.xml` 文件。\n\
  \n还有一些应用程序被创建出来，专门为 Struts 应用程序开发提供开发环境。现在让我们来看其中的几个。\n\nStruts Console\n\nStruts\
  \ Console（可在 http://www.jamesholmes.com/struts/ 找到）是一个用于管理基于 Struts 的应用程序的免费工具。Struts\
  \ Console 是一个用于 JSP 标签库、Struts、Tiles 和验证器配置文件的可视化编辑器。它可以作为独立的 Swing 应用程序使用，也可以作为您喜爱的\
  \ IDE 的插件使用。支持的 IDE 包括 JBuilder (v4.0+)、Eclipse (v1.0+)、IBM\n\nWebSphere Appl. Dev.\
  \ (v4.0.3+)、IDEA (v3.0, build 668+)、NetBeans (v3.2)、Sun ONE/Forte (v3.0+) 和 JDeveloper\
  \ (v9i+)。它支持管理所有与 Struts 相关的 XML 文件，例如 `struts-config.xml`、`tiles-config.xml` 和\
  \ `validation.xml`。与许多其他工具一样，使用此工具时，您应用到文档的任何格式都会丢失。但是，它确实允许在工具内部进行格式化，以使您的 XML\
  \ 看起来更“漂亮”。它还有一个向导，用于将 JSP 和 HTML 页面转换为 Struts JSP 页面——如果您正在将现有应用程序转换为 Struts，这是一个非常方便的功能。\n\
  \nEasy Struts\n\nEasy Struts 项目（参见 http://easystruts.sourceforge.net/）提供了一套用于 Struts\
  \ 开发的工具，包括一个 `struts-config.xml` 编辑器、XSLT 生成、来自 Struts DTD 的工具提示、模块支持以及一个输入助手。Easy\
  \ Struts 仅作为 IDE\n\n插件提供；没有独立的应用程序可用。支持的 IDE 包括 Eclipse (v2.0+) 和 JBuilder (v5.0+)。\n\
  \n**在团队开发环境中使用模块**\n\n您是否曾参与过许多开发人员处理相同代码库的项目？许多开发团队在这种环境中工作，而其他团队则将开发角色分配给单个人员。让我们想象两种类型的团队；第一个有十五名开发人员，第二个有三名成员。我们假设两个团队都在开发类似的应用程序，这些应用程序使用\
  \ Struts 和 EJB 为一家大型银行处理信用卡支付。大型团队可能会按层划分工作，每层有五个人——EJB、ActionServlet 和业务层，以及包含\
  \ JSP 页面或 Velocity 模板的 Web 层。第二个（较小的）团队将简单地为每一层分配一个人。\n\n在多人配置和操作部署描述符的团队环境中，保持\
  \ `web.xml` 和 `struts-config.xml` 同步可能很困难。我们找到的最简单的解决方案是使用 XDoclet 生成这些配置文件，但还有另一种选择——**模块**。最初由\
  \ Struts 开发团队开发时，它们被称为子应用程序，这是一个更具描述性的名称。模块允许您将应用程序的不同区域分离到不同的模块中。模块是 Struts 1.1\
  \ 的核心功能，对于大型项目以及创建可插拔功能非常有用。\n\n513-0 ch15.qxd 11/14/05 5:38 PM 第 620 页\n\n**620**\n\
  \n第 1 5 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n由于模块的开发与开发标准 Struts 应用程序非常相似，我们将向您展示如何设置它们，并且我们实际上在\
  \ struts-resume 应用程序中实现了一个使用它们的“上传”功能。设置相当简单，包括以下三个步骤：\n\n**1.** 为您的模块准备一个配置文件。\n\
  \n**2.** 通知控制器有关模块的信息。\n\n**3.** 使用转发或操作切换到您的新模块。\n\n我们不会在这里详细说明第一步，因为这和创建一个新的 Struts\
  \ 应用程序是一样的。您可能可以使用 XDoclet 为不同的模块创建配置文件，但您必须调整您的 Ant webdoclet 任务，使其将 `struts-config.xml`\
  \ 输出到不同的目录。当然，子模块的目的是使开发和配置更容易，而 XDoclet 已经为您做到了这一点！\n\n第二步涉及在应用程序的部署描述符 `web.xml`\
  \ 中，向 `ActionServlet` 的定义添加一个新的初始化参数。在 struts-resume 应用程序中，此配置位于 `metadata/web/servlets.xml`：\n\
  \n\n\n<servlet>\n\n<servlet-name>action</servlet-name>\n\n<servlet-class>org.apache.struts.action.ActionServlet</servlet-class>\n\
  \n<init-param>\n\n<param-name>config</param-name>\n\n<param-value>/WEB-INF/struts-config.xml</param-value>\n\
  \n</init-param>\n\n<init-param>\n\n<param-name>config/upload</param-name>\n\n<param-value>/WEB-INF/struts-upload.xml</param-value>\n\
  \n</init-param>\n\n<init-param>\n\n<param-name>debug</param-name>\n\n<param-value>2</param-value>\n\
  \n</init-param>\n\n<init-param>\n\n<param-name>detail</param-name>\n\n<param-value>2</param-value>\n\
  \n</init-param>\n\n<load-on-startup>2</load-on-startup>\n\n</servlet>\n\n该配置表明此应用程序包含两个模块——默认模块（其名称中不含正斜杠\
  \ /）和第二个模块，即我们的“上传”功能。两个模块的配置文件均位于 WEB-INF 目录下。命名模块配置文件的推荐标准格式为 struts-module.xml。\n\
  \n在查看 ActionServlet 的配置时，我们想指出 1.0 版本与 1.1/1.2 版本之间的一些变化。在 1.0 版本中，通常的做法是将 ResourceBundle\
  \ 指定为“application”初始化参数。我们曾使用过此设置以及“nocache”初始化参数。在 Struts 1.1 中，这些设置已被弃用，并移至 struts-config.xml\
  \ 文件中的 <controller> 元素内。以下设置可在 metadata/web/struts-controller.xml 中找到：\n\n<controller\
  \ nocache=\"true\"\n\ninputForward=\"true\"\n\nmaxFileSize=\"2M\" />\n\nnocache\
  \ 设置指示控制器添加 HTTP 头以防止内容缓存——默认情况下该功能是关闭的。您还可以指定一个 forwardPattern 属性，例如 WEB-INF/pages/$M$P，其中\
  \ $M 变量表示模块前缀，$P 表示所选 <forward> 元素的路径属性，不过此处并未使用该属性。inputForward 属性允许您在动作映射的 input\
  \ 属性中使用本地或全局转发。这是一个非常实用且备受期待的功能。\n\n■**注意** 有关可选值及其含义的更多信息，可在线查阅 http://struts.apache.org/userGuide/configuration.html。\n\
  \n现在，应用程序的 ResourceBundle 在 struts-config.xml 文件的 <message-resources> 元素中指定。如果您使用\
  \ XDoclet，可以将其放在 struts-message-resources.xml 文件中。在 struts-resume 应用程序中，该文件与其他 Struts\
  \ 配置片段位于同一位置：\n\n<message-resources parameter=\"ApplicationResources\"/> 由于我们将此文件（ApplicationResources.properties）保存在\
  \ WEB-INF/classes 目录下，因此无需指定包名。您还可以通过添加第二个 <message-resources> 元素并指定 key 属性，为应用程序指定备用的资源包：\n\
  \n<message-resources parameter=\"CustomResources\" key=\"custom\"/> 例如，如果您正在使用 Struts\
  \ 构建一个产品，并且只想暴露客户可能更改的最少选项，这将非常有用。要配合 <bean:message> 标签使用此 ResourceBundle，您只需指定一个与\
  \ key 匹配的 bundle 属性：\n\n<bean:message key=\"webapp.title.prefix\" bundle=\"custom\"\
  /> 现在您已经了解了如何为应用程序设置模块，接下来让我们看看如何在模块之间切换。为了演示，我们在 struts-resume 中添加了一个用于上传简历的“upload”模块。该模块主要演示文件上传和模块切换功能。它可以发展成一个允许简单上传现有简历的功能，但功能不止于此。在撰写本文时，有两种基本技术可用于切换模块。第一种是使用一个设置了\
  \ contextRelative 属性为 true 的转发（全局或本地）。这将指示控制器和请求分发器对模块敏感，而不仅仅是上下文敏感：\n\n<forward\
  \ name=\"toUpload\"\n\ncontextRelative=\"true\"\n\npath=\"/upload/index\"\n\nredirect=\"\
  true\">\n\n在此示例中，index 是 tiles-upload.xml 文档中的一个定义。需要添加 redirect=\"true\" 才能确保切换正确执行。第二种方法是使用内置的\
  \ SwitchAction。使用 SwitchAction 会产生如下所示的 <action-mappings>：\n\n<action-mappings>\n\
  \n<action path=\"/switchModule\"\n\ntype=\"org.apache.struts.actions.SwitchAction\"\
  />\n\n...\n\n</action-mappings>\n\n然后，要切换到上传模块，您可以使用类似 http://localhost:8080/struts-resume/switchAction.do?prefix=upload&page=index\
  \ 的 URL。我们认为使用全局转发技术更简单、更清晰，因此我们在 metadata/web/global-forwards.xml 中配置了以下转发：\n\n\
  <forward name=\"uploadResume\" contextRelative=\"true\"\n\npath=\"/upload/index.do\"\
  \ redirect=\"true\" /> 在为 struts-resume 构建“upload”模块时，我们注意到可以在应用程序之间共享配置设置。例如，我们共享了用于\
  \ Tiles 的同一个 basicLayout.jsp 模板。我们遇到的一个问题是，子模块中包含的任何消息（在 ApplicationResources 中）和任何转发都必须在其各自的文件中定义。例如，我们必须定义错误页面消息、按钮标签和验证器消息。我们预料到了这一点，所以这不成问题。很高兴看到模块之间有清晰的分离，但同时也允许共享每个模块的部分内容。\n\
  \n希望您觉得这足够简单，如果您认为应用程序中需要模块，可以考虑使用。目前模块的一个限制是，它们仅在您使用 ActionServlet 的扩展映射时才受支持。也就是说，支持\
  \ *.do，但不支持 /do/*；但请查阅 Struts 网站 (http://struts.apache.org/) 或邮件列表以了解此问题的当前状态。\n\
  \n**测试 Struts 应用程序**\n\n像任何优秀的 Java 程序员一样，您一定听说过测试框架，并且可能使用过 **JUnit**。JUnit 3.8.1\
  \ 版本（struts-resume 所需）可从 http://www.junit.org 下载。Ant 可以成为运行 JUnit 测试的非常强大的工具。要运行它们，您需要将\
  \ JUnit 的 JAR 文件 (junit.jar) 放在 $ANT_HOME/lib 目录中。\n\nJUnit 非常适合测试 Servlet 容器外部的类，但无法提供测试用户实际行为所需的结构。为此，您有幸拥有来自\
  \ Jakarta 项目的 **Cactus**。Cactus 是一个用于单元测试服务器端代码的简单测试框架。它通过*模拟对象*支持容器内测试和容器外测试。它非常巧妙，您可以运行一个测试（例如，针对\
  \ struts-resume 应用程序运行 ant test-cactus -Dtestcase=ActionFilterTest），它会启动 Tomcat，运行测试，然后停止\
  \ Tomcat。它还与 **HttpUnit** 集成，用于测试您的 JSP 页面并验证生成的 HTML 是否正确。有关 Cactus 的更多信息，请访问 http://jakarta.apache.org/cactus。您可以在\
  \ http://httpunit.sourceforge.net 找到 HttpUnit 网站。\n\nstruts-resume 示例使用一个名为 **JUnitDoclet**\
  \ (http://www.junitdoclet.org) 的工具来生成基于 JUnit 的骨架测试用例和所有 Java 源文件的测试套件。您只需执行 ant\
  \ gen-test-module 命令，其中 module 可以是 common、web 或 ejb。\n\n\n\nJUnitDoclet 是一款相当精巧的工具，它能在你添加新方法时自动更新测试用例，并且不会覆盖你已添加到测试用例中的任何自定义代码。我们在此提醒你，有些测试用例可能“方法中缺乏实质内容”。大多数情况下，这是因为我们之前使用过该类并确认其功能正常，因此不打算对其进行测试。这是否是一种不良实践？或许吧，但这无疑能加快我们的开发进度。\n\
  \n我们为测试用例使用了不同的源代码树，这种方法效果很好。不幸的是，一旦你将某个测试用例改为继承 JUnit 以外的类（例如 Cactus 的 `ServletTestCase`），该工具就不会再更新那个类了。它会直接忽略它，这对我们来说也无妨。\n\
  \n另一个专门针对 Struts 的测试框架于 2001 年底推出。它被称为 **StrutsTestCase for JUnit**（参见 http://strutstestcase.sourceforge.net/），是标准\
  \ JUnit 测试用例的一个扩展。通过提供模拟对象和基于 Cactus 的方法来运行 `ActionServlet`，StrutsTestCase 允许在有无运行中\
  \ Servlet 引擎的情况下测试 Struts 代码。由于它使用控制器来测试代码，因此不仅能测试 `Action` 对象的实现，还能测试映射、`ActionForms`\
  \ 和 `ActionForwards`。\n\nStrutsTestCase 兼容 Java Servlet 2.5 规范，并支持 Struts 1.2、Cactus\
  \ 1.6.1 和 JUnit 3.8.1。\n\nStrutsTestCase 已经提供了验证方法，因此创建单元测试用例非常简单，如下面的代码片段所示：\n\n\
  public void testEditUser() {\n\nsetRequestPathInfo(\"/editUser\");\n\nsetRequestParameter(\"\
  action\", \"edit\"); addRequestParameter(\"email\",\"tomcat\"); actionPerform();\n\
  \nverifyForward(\"success\");\n\nassertTrue(getSession().getAttribute(Constants.USER_KEY)\
  \ != null);\n\n}\n\n你可以使用 Cactus 和 HttpUnit 对你的应用程序进行非常全面的测试，以验证你的 action 类以及你在渲染\
  \ UI（JSP、XML 或 Velocity）时使用的任何视图技术。HttpUnit 测试也非常简单，如下例所示：\n\nWebConversation wc\
  \ = new WebConversation();\n\nWebResponse resp = wc.getResponse(\n\n\"http://www.httpunit.org/doc/Cookbook.html\"\
  ); WebLink link = resp.getLinkWith(\"response\");\n\nlink.click();\n\nWebResponse\
  \ jdoc = wc.getCurrentPage();\n\n513-0 ch15.qxd 11/14/05 5:38 PM Page 624\n\n**624**\n\
  \n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\nHttpUnit 还支持测试 JavaScript，其网站带有警告，称其“目前非常基础”（参见\
  \ http://www.httpunit.org/doc/javascript-support.html）。\n\n如果你正在寻找一个更强大的 JavaScript\
  \ 测试框架，我们推荐 **JsUnit**（http://www.jsunit.net）。JsUnit 是一个用于客户端 JavaScript 测试的单元测试框架。\n\
  \nJsUnit 测试是用 JavaScript 编写的：它本质上是 JUnit 的 JavaScript 移植版，因此你需要相应地命名你的方法等。需要注意的是，这些语言差异巨大，编写\
  \ JavaScript 的人很可能也应该编写这些测试。\n\n我们要介绍的最后一个测试框架是来自 Canoo 的 **WebTest** 工具（http://webtest.canoo.com）。这是一个更易于开发的测试框架，因为所有内容都只需在\
  \ XML 文件中配置即可。与其他测试框架类似，WebTest 通过 Ant 运行。然而，主要区别在于整个测试都在一个 Ant 任务中配置。例如，以下是你如何为用户登录应用程序创建测试的方法：\n\
  \n<target name=\"login\">\n\n<testSpec name=\"tomcat-login\">\n\n<config host=\"\
  ${tomcat.server}\" port=\"${tomcat.port}\"\n\nprotocol=\"http\" basepath=\"${webapp.name}\"\
  \ verbose=\"true\"\n\nresultpath=\".\" resultfile=\"web-test-result.xml\" summary=\"\
  true\"\n\nsaveresponse=\"true\"/>\n\n<steps>\n\n<invoke stepid=\"get Login Page\"\
  \ url=\"/\"/>\n\n<verifytitle stepid=\"we should see the login title\" text=\"Login\"\
  />\n\n<setinputfield stepid=\"set user name\"\n\nname=\"j_username\" value=\"tomcat\"\
  />\n\n<setinputfield stepid=\"set password\"\n\nname=\"j_password\" value=\"tomcat\"\
  />\n\n<clickbutton label=\"Login\" stepid=\"Click the submit button\"/>\n\n<verifytitle\
  \ text=\"Main Menu\"\n\nstepid=\"Home Page follows if login ok\"/>\n\n</steps>\n\
  \n</testSpec>\n\n<loadfile property=\"web-test.result\"\n\nsrcFile=\"web-test-result.xml\"\
  />\n\n<echo>${web-test.result}</echo>\n\n</target>\n\nWebTest 是一个非常适合 Web 开发人员的框架，因为你无需编写任何代码，只需使用\
  \ XML 即可轻松测试用户所走的路径。它似乎也使用了 HttpUnit，因此并非重新发明轮子，而是提供了一种更简单的开发方式。\n\n为了测试你的应用程序与数据库的交互，你可能想看看\
  \ **Dbunit**（http://www.dbunit.org）。Dbunit 是一个 JUnit 扩展，它可以将你的数据库设置到一个已知状态，以便你使用预期的数据执行测试。它使用\
  \ XML 数据集（即数据表的集合），并在每个测试前后执行数据库操作。当然，你也可以在你的测试用例中执行此操作，例如插入、更新或删除对象，但由于这些操作的执行顺序无法保证，因此使用\
  \ Dbunit 可能是个好主意。\n\n我们曾成功地将测试按特定顺序放在一个类中，然后让这些方法按该顺序执行，但理想的测试方法应该是自治的。\n\n513-0\
  \ ch15.qxd 11/14/05 5:38 PM Page 625\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n**625**\n\
  \n我们提供了 Cactus 测试、Struts Action 测试、HttpUnit 测试，甚至一个简单的 Canoo WebTest 示例。表 15-2 指出了你可以使用哪些类进行这些测试以及如何运行它们。如果你想在\
  \ Tomcat 已经运行的情况下运行这些测试，请运行 `test-cactus` 而不是 `test-web`。\n\n**表 15-2.** *使用各种测试框架测试\
  \ struts-resume* **测试类型**\n\n**文件位置**\n\n**Ant 命令**\n\nCactus\n\ntest/org/appfuse/webapp/action/UserAction\n\
  \nant test-web\n\n-Dtestcase=LoginActionTest\n\nStruts\n\ntest/org/appfuse/webapp/action/ResumeAction\n\
  \nant test-web\n\n-Dtestcase=ResumeActionTest\n\nHttpUnit\n\ntest/org/appfuse/webapp/action/MainMenuTest\n\
  \nant test-web\n\n-Dtestcase=MainMenuTest\n\nCanoo\n\nweb-tests.xml\n\nant test-canoo\n\
  \n-Dtestcase=login\n\n使用像 StrutsTestCase 和 Cactus 这样的 Servlet 测试框架将使测试你的 action\
  \ 变得容易得多。要么使用它们，要么通过浏览器进行测试，而浏览器测试可能需要你点击五次才能到达目标。如果你真的只想访问一个 Servlet，则无需等待 JSP\
  \ 页面编译。struts-resume 应用程序使得开发和运行新测试变得容易。我们鼓励你使用它并向它学习。\n\nJSP 开发中一个真正节省时间的方法是，在将\
  \ JSP 页面部署到 Servlet 容器之前对其进行预编译。这可以通过 Ant 的 `<jspc>` 任务来完成，该任务使用 Tomcat 的 Jasper\
  \ 编译器生成 `.java` 源文件。虽然它对于测试来说很棒，但你也希望使用此工具为生产环境预编译 JSP 页面，对吧？不幸的是，要做到这一点，你需要在 `web.xml`\
  \ 文件中为每个 JSP 添加一个条目，而这将是一个非常漫长且费力的过程。如果你不执行此步骤，Tomcat 将重新编译你已经编译过的页面。某些应用服务器，如 WebLogic\
  \ 和 SunONE，允许你在应用程序部署后配置 JSP 页面的预编译。\n\n我们希望其他供应商也能复制这个功能。\n\n\n\n开发 JSP 页面时，另一个好习惯是检查\
  \ CSS 和 HTML 是否正确。当然，在 JSP 编译并显示之前，你无法进行此项检查。如果你使用 WebTest，它会为每次请求生成一个 HTML 文件，从而记录最后查看的请求。在\
  \ struts-resume 示例应用中，这些文件可以在 build/test/data 目录下找到。如果你不使用 WebTest，可以直接在浏览器中查看源代码，并将\
  \ HTML 保存到某个目录。然后你可以将其上传到 W3C 的验证器（http://validator.w3.org）以确保 HTML 符合指定的 DOCTYPE。我们通常会在项目目录中创建一个“沙盒”目录，用于存放这些\
  \ HTML 文件以进行验证和其他快速修复。有时使用静态 HTML 版本会更方便。我们的做法是更改所有样式表、JavaScript 和图片的绝对路径，改用相对路径。在\
  \ struts-resume 项目中，这需要将\n\n/struts-resume/ 改为 ../web/。\n\n一旦验证了应用程序并进行了彻底测试，你会对其运行效果更有信心，从而更有可能产出高质量的软件。希望借助我们提供的示例，编写测试的艰巨工作已经完成。编写测试看似麻烦，但这仅在你先编写实际代码时才会如此。下次尝试先编写测试\n\
  \n513-0 ch15.qxd 11/14/05 5:38 PM 第 626 页\n\n**626**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET\
  \ 和其他工具\n\n用例，我们相信你会发现它们非常有趣。没有什么比编写一个在浏览器中首次运行就能正常工作的应用程序更令人愉悦的了（当然，这要归功于单元测试）。\n\
  \n**在 Struts 应用程序中处理异常**\n\nStruts 1.1 使得在 Struts 应用程序中处理异常变得更加容易。软件开发中一个流行的规则是：“如果出现问题，你应该告知用户。”在使用\
  \ MVC 和业务对象与数据库通信的 Web 应用程序中，这可能会变得相当复杂。异常可能在任何层级抛出，包括数据访问代码、Action 类、业务对象，甚至 JSP\
  \ 页面。\n\n我们过去采用的方法是在 Action 类和业务对象中都使用 try...catch，然后将任何异常“冒泡”到顶层。这种做法很不优雅，并且可能导致用户看到诸如“列\
  \ street_address 未找到”之类的消息。\n\n此外，在 Action 类中，我们捕获了业务层异常，将其包装在 ServletException\
  \ 中，然后抛给客户端。我们在 web.xml 以及 JSP 页面中都配置了错误页面，当发生错误时，客户端会被重定向到该页面。\n\n尽管我们将向你展示一种使用\
  \ Struts 处理异常的更好方法，但我们仍然认为配置 JSP 页面和 web.xml 以处理未捕获的异常非常重要。你应该在 web.xml 中添加一个条目，用于处理服务器抛出\
  \ HTTP 状态码 500（即可怕的“内部服务器错误”）的情况：\n\n<error-page>\n\n<error-code>500</error-code>\n\
  \n<location>/error.jsp</location>\n\n</error-page>\n\n或者，你也可以使用 <exception-type>\
  \ 而不是 HTTP 状态码或错误码：\n\n<error-page>\n\n<exception-type>java.lang.Throwable</exception-type>\n\
  \n<location>/error.jsp</location>\n\n</error-page>\n\n为了安全起见，你也可以同时添加两者。使用 XDoclet\
  \ 时，你可以在合并目录的 error-pages.xml 文件中指定这些条目。我们通常也会在 JSP 页面中声明 errorPage：\n\n<%@ page\
  \ language=\"java\" errorPage=\"/error.jsp\" %> 在 struts-resume 示例应用中，这一行仅存在于 common/taglibs.jsp\
  \ 文件中。添加这些条目基本上可以防止用户看到异常的堆栈跟踪——前提是你已经恰当地编写了 error.jsp。对于高级错误页面，你甚至可以配置它在显示给用户时向管理员发送电子邮件（或使用\
  \ log4j 的 SMTP Logger）。近年来，我们看到 500 内部服务器错误的次数比经典的 404 错误还要多。为这些错误添加一个友好的界面可以让每个人的生活都更愉快一些。\n\
  \n真正的期望是错误页面永远不会被显示。作为一个精明的网络用户，如果它确实被显示了，我们希望确切地知道哪里出了问题——比如 SQL 的详细信息。当然，这取决于\n\
  \n513-0 ch15.qxd 11/14/05 5:38 PM 第 627 页\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n\
  **627**\n\n你的应用程序的安全要求。如果你的应用程序容易受到攻击（位于互联网而非内网上），你可能希望抑制任何泄露数据库信息的消息。同时，并非所有用户都想看到异常的细枝末节，因此，我们建议你提供更友好的用户消息。\n\
  \n**链式异常**\n\n在我们看来，一个开发良好的应用程序应该捕获错误消息，将其转化为友好的消息，然后将用户返回到他们最后成功查看的页面。同时，最好也能添加一条技术性消息，供那些希望了解问题确切原因并可能避免它的精明的用户（或开发者）查看。为了实现这一点，你首先可以做的就是使用**链式异常**。传统的\
  \ Java 异常机制只允许你抛出一个异常。这在分层架构中会带来问题，因为异常可能发生在每一层。\n\n当然，你可以像我们使用 ServletException\
  \ 那样包装异常，但这最终可能导致细节丢失。Ted Husted 在他的一篇 Struts 技巧中最好地描述了解决方案。与其试图改写他的话来显得像是我们想出的主意，不如直接引用他（参见\
  \ http://husted.com/struts/tips/015.html）：*我们真正需要做的是“堆叠”或“链接”异常，这样每一层都可以为事件添加自己的视角。然后，在最后，将它们全部显示出来，并将原始异常放在列表的底部。*\n\
  \n*这种方法在分层架构中效果出奇地好。“最顶层”最“接近”用户，因此抛出最“用户友好”的异常。“最底层”抛出解决* *问题所需的“极客友好”错误。当我们通过链接将异常串联起来时，用户友好的消息在前，更详细的消息在后。用户首先被告知他们需要知道的内容，其余部分可以留给系统管理员处理。*\n\
  \n从 JDK 1.4 开始，java.lang.Exception 类提供了 getCause() 方法，允许你找到每个异常的原始原因。要正确使用这一点，你需要抛出每一层发生的异常，而不是仅仅捕获异常并附带一条消息抛出。我们的意思是，这样做更好：\
  \ try {\n\n...\n\n} catch (Exception e) {\n\nthrow new DAOException(\"连接数据库时发生错误\"\
  , e);\n\n}\n\n而不是仅仅抛出消息：\n\ntry {\n\n...\n\n} catch (Exception e) {\n\nthrow new\
  \ DAOException(\"连接数据库时发生错误\");\n\n}\n\n513-0 ch15.qxd 11/14/05 5:38 PM 第 628 页\n\
  \n**628**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具\n\n\n\n我们在 struts-resume 应用程序的 `ActionFilter.java`\
  \ 类中使用了此功能，准确地说是在该类中。如果您使用的 JDK 版本低于 1.4，我们建议您查看 Scaffold 包，其中包含一个适用于旧版 JDK 的 `ChainedException`\
  \ 类。以下代码片段说明了我们如何在 `ActionFilter.java` 类（位于 `src/web/org/appfuse/webapp/filters`）中实现此功能：\n\
  \n```java\n// 用户已认证，用户对象为空\n\nif (username != null && userForm == null) {\n\ntry\
  \ {\n\nUserManager mgr =\n\nnew UserManagerImpl(\n\n(String) ctx.getAttribute(Constants.DAO_TYPE));\n\
  \nUserForm user = mgr.getUser(username);\n\nsession.setAttribute(Constants.USER_KEY,\
  \ user);\n\n} catch (Exception e) {\n\n// 记录日志，以便我们能够查看日志并了解\n\n// 出了什么问题\n\nlog.error(\"\
  获取用户信息时出错 \" + e);\n\n// 打印堆栈跟踪，这始终是个好习惯\n\ne.printStackTrace();\n\n// 创建一个空的 ActionErrors\
  \ 集合，用于添加所有\n\n// 异常消息\n\nActionErrors errors = new ActionErrors();\n\n// 添加一条通用消息，内容为“进程未完成。”\n\
  \nerrors.add(ActionErrors.GLOBAL_ERROR,\n\nnew ActionError(\"errors.general\"));\n\
  \nStringBuffer sb = new StringBuffer();\n\n// 仅限 JDK 1.4 - 如果存在原因，则遍历它们并获取\n\n//\
  \ 它们的所有消息\n\nif (e.getCause() == null) {\n\nsb.append(e.getMessage());\n\n} else\
  \ {\n\nwhile (e.getCause() != null) {\n\nsb.append(e.getMessage());\n\nsb.append(\"\
  \\n\");\n\ne = (Exception) e.getCause();\n\n}\n\n}\n\n// 将所有错误添加到一个资源包键中，定义如下：\n\
  \n// errors.detail={0}\n\nerrors.add(\n\nActionErrors.GLOBAL_ERROR,\n\nnew ActionError(\"\
  errors.detail\", sb.toString()));\n\n// 将错误添加到请求中，以便我们可以为用户显示它们\n\nrequest.setAttribute(Globals.ERROR_KEY,\
  \ errors);\n\n// 分派到错误消息页面\n\nRequestDispatcher dispatcher =\n\nrequest.getRequestDispatcher(\"\
  /error.jsp\");\n\ndispatcher.forward(request, response);\n\nreturn;\n\n}\n\n}\n\
  ```\n\n最终结果是一系列错误消息，如下所示：\n\n*   所需资源不可用。\n*   进程未完成。详情如下。\n*   无法连接到 MySQL 服务器\
  \ localhost:3307。您尝试连接的机器/端口上是否运行着 MySQL 服务器？(java.net.ConnectException)\n\n很容易看出，链式异常如何为您提供能够满足所有用户需求的消息。甚至可能可以在\
  \ Struts 的声明式异常中使用前面的错误循环代码，但我们尚未尝试过。在构建完所有错误后，您需要将用户引导到一个友好的页面。在 Action 类中使用此代码时，您很可能将他们引导回他们来自的页面。\n\
  \n```java\nreturn (new ActionForward(mapping.getInput()));\n```\n\n如果您从多个不同的页面访问同一个\
  \ `ActionMapping`，这可能会出现问题。我们见过几种不同的解决方式。第一种方式是在调用该 action 的表单或 URL 中添加一个额外参数，然后使用该值进行适当的转发。另一种方法是\
  \ Roller Weblogger 开源项目 (http://www.rollerweblogger.org) 使用的方法。它使用一个 `BreadCrumbFilter`\
  \ 来保存应用程序访问过的最后 URL 的堆栈。这样做的好处是，您可以简单地从堆栈中获取最后一个 URL，从而转发回最后查看的页面。\n\n### 声明异常\n\
  \nStruts 1.1 引入了可配置异常的概念。也就是说，您可以在 `struts-config.xml` 的全局级别以及 `ActionMapping` 级别声明式地指定异常。\n\
  \n此概念类似于您在全局转发和局部转发中看到的概念。注册异常很容易——唯一必需的属性是 `type`，它指定了异常的类型。您还可以选择指定一个 `key`（指向资源包中的消息）和用于定向响应的\
  \ `path`。以下是一个可用于处理 `UserNotFoundException` 的示例：\n\n```xml\n<exception key=\"missing.user\"\
  \n\ntype=\"org.appfuse.webapp.services.UserNotFoundException\"\n\npath=\"addUser\"\
  />\n```\n\n在此示例中，`addUser` 是一个转发，其路径引用了一个 tile 的定义（在 `tiles-config.xml` 中）。您可以轻松地将其更改为重定向到一个\
  \ JSP 页面（例如，`/addUser.jsp` 或 `/editUser?action=add`）。异常最好在 `ActionMapping` 级别使用，而不定义路径。如果您不定义路径，Struts\
  \ 足够智能，会重定向到您的 `ActionMapping` 的 `input` 值。当然，如果您没有定义 `input`，您可能应该为您的异常指定 `path`，否则您将看到\
  \ Struts 那令人恐惧的空白屏幕。此示例中的 `key` 用于覆盖异常本身使用的键。\n\nStruts 使开发异常变得更加容易，并提供了内置的国际化支持。\n\
  \n让我们看一下 `UserNotFoundException` 的代码：\n\n```java\nimport org.apache.struts.util.ModuleException;\n\
  \npublic class UserNotFoundException extends ModuleException {\n\n/**\n\n* 为此异常构造一个新实例，用于指定的用户名。\n\
  \n* @param username 未找到的用户名\n\n*/\n\npublic UserNotFoundException(String username)\
  \ {\n\nsuper(\"error.user.missing\", username);\n\n}\n\n}\n```\n\n字符串 `error.user.missing`\
  \ 引用了默认 `ResourceBundle` 中的一个键，该键在 `struts-config.xml` 中定义。在 struts-resume 应用程序中，这个\
  \ bundle 是 `ApplicationResource.properties`，其中该键定义如下：\n\n```properties\nerror.user.missing=Could\
  \ not find user information for username '{0}'\n```\n\n当然，您可以更改异常的构造函数，以处理消息键中拥有的任意数量的参数。如果您在\
  \ `struts-config.xml` 中为此异常指定了一个 `key`，它将覆盖异常输出的消息。这样做的一个缺点是，您会失去替换参数的能力，但对于不使用\
  \ Struts 消息 bundle 的异常来说，这可能很有用。\n\nStruts 异常处理的一个不错的功能是，消息可以很容易地在 properties 文件中外部化。也就是说，您可以在异常处理中直接获得\
  \ I18n 支持。此外，您可以通过在异常上指定 `bundle` 属性，为您的错误消息指定一个单独的 `ResourceBundle`。当然，您可以在业务层和持久化层使用带有\
  \ properties 文件的 `ResourceBundle`，但如果这些异常从未冒泡到 UI 层，则可能不需要这样做。\n\n在应用程序中使用声明式异常的美妙之处在于，您不必在\
  \ Action 类中捕获它们。Struts 的 `execute()` 方法会抛出一个顶级 `Exception`。由于所有异常最终都继承自 `Exception`，这使得编写和抛出异常变得容易：\n\
  \n```java\npublic ActionForward execute(ActionMapping mapping,\n\nActionForm form,\n\
  \nHttpServletRequest request,\n\nHttpServletResponse response)\n\nthrows Exception\
  \ {\n```\n\n当 Struts 捕获到一个已注册的异常时，它会为您创建一个 errors 对象，然后可以使用 `<html:errors/>` 或类似\
  \ struts-resume 中的语法来显示该对象。\n\n以下是 `messages.jsp` 文件使用的内容，该文件包含在 struts-resume 应用程序的主\
  \ Tiles 模板中：\n\n```jsp\n<%-- 错误消息 --%>\n<logic:messagesPresent>\n\n<div class=\"\
  error\">\n\n<html:messages id=\"error\">\n\n<bean:write name=\"error\" filter=\"\
  false\"/><br />\n\n</html:messages>\n\n</div>\n\n</logic:messagesPresent>\n\n<%--\
  \ 成功消息 --%>\n<logic:messagesPresent message=\"true\">\n\n<div class=\"message\"\
  >\n\n<html:messages id=\"message\" message=\"true\">\n\n<bean:write name=\"message\"\
  \ filter=\"false\"/><br />\n\n</html:messages>\n\n</div>\n\n</logic:messagesPresent>\n\
  ```\n\n\n\n虽然使用 JSTL 也能实现此功能，但我们更倾向于采用输入更少的简洁方法，因此这里使用了 Struts 标签。你会注意到，本页的后半部分用于显示成功消息。我们认为，了解如何在应用程序中创建并显示成功消息非常重要，因此我们将向你展示其简便性。本质上，你只需创建一个新的消息对象，并向其中添加一条或多条消息即可。这与\
  \ `ActionErrors` 类非常相似（实际上它是其超类），因此创建过程几乎相同：`ActionMessages messages = new ActionMessages();`\n\
  \n// 执行业务逻辑以添加新记录\n\n// 向请求中添加成功消息\n\n`messages.add(ActionMessages.GLOBAL_MESSAGE,\
  \ new ActionMessage(\"record.added\"));` 虽然我们尚未在任何实际项目中使用 Struts 的声明式异常处理，但我们在 struts-resume\
  \ 应用程序中实现了它，并且效果显著。如果你有一个适用于基于 Struts 的应用程序的异常框架，我们也欢迎你加入 struts-dev 邮件列表，提出改进建议。struts-resume\
  \ 应用程序提供了使用声明式异常的示例，你也可以在 Struts 自带的 struts-example 应用程序中找到相关示例。\n\n**总结**\n\n在软件开发中，我们遇到的最令人沮丧的事情之一就是阅读了关于如何做某事的说明，却没有找到任何示例。设计模式只有在实现时有效才有价值。我们信奉保持简单，并且相信\
  \ Struts 简化了 JSP 和 Servlet 的开发。我们知道 Struts 一开始可能让人望而生畏，但它的回报是巨大的。使用 Struts 最终会让你更好地理解\
  \ Web 应用程序，并且随着你使用得越多，你的开发时间也会随之减少。\n\n513-0 ch15.qxd 11/14/05 5:38 PM 第 632 页\n\
  \n**632**\n\n第 15 章 ■ 使用 Struts、XDoclet 及其他工具\n\nStruts 提供的工具和示例应用程序同样可能让人感到不知所措。\n\
  \n真正了解什么是最好的方法的唯一途径就是亲自尝试，并找出最适合你的方案。如果你向 Struts 用户邮件列表发送关于非 Struts 相关（例如 HTML、JavaScript、持久化）的问题，你很可能会收到各种不同的回复和意见。然而，这是一个非常活跃的社区，你的问题很可能会得到解答。希望我们为你提供了一些关于如何与\
  \ Struts 良好配合的指导，也许我们的示例应用程序会向你展示 XDoclet 如何使代码生成和其他工作变得更加容易。我们也邀请你下载并使用 Dave Johnson\
  \ 的 Roller Weblogger 软件——它是开源的，并且包含大量优秀的 Struts 代码。它还使用了 XDoclet，是一个相当健壮的应用程序。更多关于\
  \ Roller 的信息，请访问 http://www.rollerweblogger.org。\n\n最重要的是，我们建议不要试图在 Web 应用程序相关的事情上重复造轮子。很可能已经有人尝试过你正在做的事情。花时间研究你的问题和解决方案，可能会为你节省大量时间。使用邮件列表存档和\
  \ Google 可以解决大量问题。开源项目非常棒，因为你有一个完整的开发团队与你合作，并帮助你使用他们的框架。参与你所使用的技术也很有帮助。如果你正在使用 Struts，请订阅\
  \ struts-user 邮件列表，看着你的收件箱被填满，或者订阅摘要列表，每天只接收几封邮件。请记住，在简单的 JSP 和 Servlet 应用程序中可能实现的任何功能，在使用\
  \ Struts 时同样可以实现。Struts 只是让它变得更容易，我们相信任何基于 Web 的 MVC 框架都是如此。同样，在 HTML 页面或 Servlet\
  \ 中可能实现的任何功能，在 JSP 页面中同样可以实现。\n\n我们非常喜欢使用 Struts 的另一个原因是，出现了许多用于自动化开发过程的工具。我们已经足够熟练地开发所有组件，可以检查生成的代码以确保一切正常。你肯定不想使用一个生成意大利面条式代码的代码生成器！Struts\
  \ 路线图包括对这些工具的增强支持，并拥抱 JSF 和 JSTL 等新技术。\n\n这里我们仅列出几点提示，作为本章内容的简要回顾：\n\n• 如果你的 Struts\
  \ 应用程序需要验证，请使用 Validator。如果你正在使用 Validator，请使用 XDoclet 生成你的 `validation.xml`。\n\n\
  • 如果你的 Struts 应用程序需要模板，请使用 Tiles。如果你正在使用 Tiles，请使用定义，并将它们用作 `struts-config.xml`\
  \ 中的转发。\n\n• 使用容器管理的身份验证进行登录——这样你就可以使用角色来显示或隐藏磁贴，并限制对某些操作和链接的访问。\n\n• 使用 CSS 而非表格进行页面布局。这将减小页面的大小，并且从长远来看更易于开发。\n\
  \n513-0 appa.qxd 11/16/05 9:10 PM 第 633 页\n\n附录 A\n\n■ ■ ■\n\nJavaServer Pages\n\
