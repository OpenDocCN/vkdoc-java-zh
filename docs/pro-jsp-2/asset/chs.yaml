  现在，编辑%TOMCAT_HOME%/conf/server.xml 并移除 SSL HTTP/1.1 连接器条目周围的注释。设置完成后，您应该能够通过 https://localhost:8443
  访问 Tomcat。不要忘记 http 后面的 s。必须指定端口，因为它不是 HTTPS 的默认端口（端口 443）。


  Tomcat 期望密钥库工具创建的.keystore 文件位于特定位置（用户的主目录）。如果您在通过 SSL 访问 Tomcat 时遇到问题（特别是错误日志中包含无法访问.keystore
  文件的消息），您可以通过在 server.xml 的 SSL <Connector>元素中添加以下属性来告诉 Tomcat.keystore 文件的位置：


  keystoreFile="path_to_keystore\.keystore"


  如果您在使用 Tomcat 时不想在 URL 中指定端口号，可以轻松地在 server.xml 文件中更改它们。首次通过 SSL 端口访问 Tomcat 时，系统应提示您一个安全警报（见图
  12-11）。


