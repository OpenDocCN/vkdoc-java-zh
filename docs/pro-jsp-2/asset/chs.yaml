  \ />\n\n</c:if>\n\n513-0 ch12.qxd 11/17/05 4:15 PM 第 505 页\n\n第 12 章 ■ Web 应用安全\n\
  \n**505**\n\n**安全套接层总结**\n\n希望本节内容能让你了解如何在应用中为特定 Servlet 控制 SSL。如果需要为整个应用保证 SSL，我们建议将\
  \ web.xml 文件中的 `<transport-guarantee>` 元素设置为 INTEGRAL 或 CONFIDENTIAL。\n\n该值用于指定客户端与服务器之间数据的发送方式。在示例应用中，该值设置如下：\n\
  \n<user-data-constraint>\n\n<description>\n\n应用通常不需要加密。\n\n</description>\n\n<transport-guarantee>NONE</transport-guarantee>\n\
  \n</user-data-constraint>\n\n表 12-2 展示了 Servlet 规范对每个值的定义。\n\n**表 12-2.** *<transport-guarantee>\
  \ 值的含义* **值**\n\n**描述**\n\nNONE\n\n应用不需要任何传输保证。这与在 web.xml 中不包含 `<user-data-constraint>`\
  \ 元素效果相同。\n\nINTEGRAL\n\n应用要求客户端与服务器之间发送的数据在传输过程中不可被更改。\n\nCONFIDENTIAL\n\n应用要求数据传输方式能防止其他实体观察传输内容。\n\
  \n大多数 Servlet 容器会在该值设置为 INTEGRAL 或 CONFIDENTIAL 时将客户端切换到 SSL。虽然这种切换对需要它的应用来说很好，但在实现时必须小心。在大多数\
  \ Servlet 容器中，如果将该值设置为 INTEGRAL 或 CONFIDENTIAL，你的应用将*仅*在 SSL 端口上可用。巧妙之处在于，当你尝试访问应用时，服务器会自动将你重定向到\
  \ https://serverName:443。然而，如果你的安全服务器运行在 443 以外的端口上，在 Internet Explorer 中将会收到“服务器未找到”错误。这引出了我们的下一个技巧：使用过滤器检查对受保护资源的请求。\n\
  \n对受保护资源使用过滤器\n\n当过滤受保护资源时，可以使用相同的 SSL 切换使整个应用在任何端口上都安全，同时还能检索用户信息。用户通过应用认证后，你可能希望获取该用户的更多信息。容器管理安全的一个限制是，你只能知道用户的用户名及其所属角色。为解决此问题，我们建议使用一个过滤器，检查会话中是否存在\
  \ User 对象，如果为 null 则填充它。为了演示这一点，你需要创建一个 User 对象、数据库访问代码以及一个与之通信的数据库。\n\n513-0 ch12.qxd\
  \ 11/17/05 4:15 PM 第 506 页\n\n**506**\n\n第 12 章 ■ Web 应用安全\n\n■**注意** 在安全项目中，你可以通过使用\
  \ setup-db Ant 任务来创建一个已填充数据的 MySQL 数据库。\n\n下载文件中包含一个 security-example.sql 文件，你也可以用它来创建并填充数据库。\n\
  \n现在数据库已填充数据，你可以通过过滤器从中获取信息。我们创建了一个名为 ActionFilter.java 的过滤器，它映射到与受保护资源相同的 `<url-pattern>`\
  \ (*.do)。这样，它只会在用户成功认证后被调用。我们喜欢使用一个辅助类来调用持久层——这个类名为 UserManager.java，它使用了**业务委托**模式。\n\
  \n■**注意** 你可以在 http://java.sun.com/blueprints/corej2eepatterns/Patterns/BusinessDelegate.html\
  \ 找到关于业务委托模式的更多信息。\n\n通过使用业务委托来隐藏过滤器的实现细节非常重要，这样你就可以随时切换到新的持久层（例如 EJB）。我们不深入探讨 UserManager\
  \ 及其工作原理的细节，因此请相信我们，UserManager.getUser() 方法会返回一个填充了用户属性的 JavaBean。来看一下这个过滤器的部署描述符：\n\
