  **488**


  第 12 章 ■ WEB 应用程序的安全性


  为此，您需要在 CLASSPATH 中包含用于 LDAP 的 JNDI 驱动程序。您可以从 http://java.sun.com/products/jndi/downloads/index.html
  下载最新的 LDAP 服务提供程序（版本 1.2.4）。下载后，将 ldap.jar 解压到 %TOMCAT_HOME%\common\lib 目录中。


  与 JDBC 领域类似，您可以通过将 <Realm> 元素嵌套在应用程序 META-INF 目录下 context.xml 文件的 <Context> 元素中，来保护单个应用程序。或者，您也可以将整个服务器的默认领域设置为
  JNDI 领域。为此，请编辑 Tomcat 的 server.xml 文件（位于 %TOMCAT_HOME%\conf），并将默认领域（如下所示）替换为您所需领域的信息。请注意，如果您仍想使用
  Tomcat Manager 或 Admin 应用程序，您的 LDAP 服务器需要包含相应的用户和角色条目以允许此操作。


  如果一切安装和配置正确，那么当您尝试访问受保护的网页时，将看到相同的登录对话框或表单（取决于您指定的是基本认证还是表单认证）。输入用户名和密码后，Tomcat
  将向 LDAP 服务器发起 JNDI 调用来验证用户名。


  **JAASRealm**


  Tomcat 也支持 JAASRealm。我们将在本章后面的“Java 认证与授权服务”部分向您展示如何配置 JAASRealm。就本章及其相关示例应用程序而言，我们将主要使用
  JDBCRealm。


  **使用安全套接字层**


  到目前为止，我们已经讨论了设置基于表单的登录并将其配置为与领域通信。目前示例的一个问题是浏览器与服务器之间的通信并不安全。如果有人使用密码嗅探器进行监听，您的安全性将受到威胁。此外，这些嗅探器很容易获得——尝试在
  Google 中搜索“password sniffer”即可。


  根据开放 Web 应用程序安全项目（http://www.owasp.org）发布的《构建安全 Web 应用程序指南，版本 1.1.1》，“保护 HTTP 协议最常用的方法是使用
  SSL。**安全套接字层**协议，或称 **SSL**，由 Netscape 设计，并于 1994 年在 Netscape Communicator 浏览器中引入。”




  它很可能是全球使用最广泛的安全协议，并内置于所有商业网络浏览器和网络服务器中。当前版本为第 2 版。由于 SSL 的原始版本在技术上是专有协议，**互联网工程任务组（IETF）**
  接管了升级 SSL 的职责，并将其重新命名为**传输层安全协议（TLS）**。TLS 的第一个版本是 3.1 版，与原始规范相比仅有微小改动。


  SSL 是一种允许网络浏览器和网络服务器通过安全通道进行通信的技术。在 SSL 中，数据在浏览器端（传输前）进行加密，然后在服务器端读取数据前进行解密。当服务器向客户端返回数据时，也会经历同样的过程。这个过程被称为**SSL
  握手**。该协议目前支持三种加密级别：40 位、56 位和 128 位。


  所需的安全性越高，应使用的位数就越多。有关 SSL 握手的更多信息，请访问 http://medialab.di.unipi.it/doc/JNetSec/jns_ch11.htm。


  深入理解 SSL 的最佳方式是实践它。在您的网络服务器（本例中为 Tomcat）上设置 SSL 的第一步是生成一个证书。请记住


