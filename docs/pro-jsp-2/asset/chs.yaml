  }\n\n**使用标签库**\n\n如果您的应用程序运行在默认 HTTP（80）和 HTTPS（443）端口上，您可以使用标签库强制在该特定页面上使用某种协议。HTTPS\
  \ 的非标准端口会在 Internet Explorer 中导致问题，并出现“服务器未找到”错误。前面的“使用 Servlet”部分描述了解决此问题的一个巧妙方法。\n\
  \n在示例应用程序中，我们有一个 Secure.java 标签库（由 Jon Lipsky 编写，http://www.javablogs.com/views/ViewBlog.action?id=13055），可用于强制特定\
  \ JSP 页面使用 SSL 或非 SSL。其语法如下：\n\n\n\n<security-example:secure mode=\"secured\"/>\
  \ 此处，mode 可设置为 secured、unsecured 或 either。此外，如果省略 mode 属性，则默认采用 secured 模式。\n\n\
  基于 Servlet 示例，其中变量 secureLogin 已在应用作用域中设置，你可以在 login.jsp 页面中检索并使用它来强制启用 SSL：\n\n\
