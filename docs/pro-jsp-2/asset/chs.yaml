  \n</servlet>\n\n如果您是从源代码构建 security-example 项目，则登录 servlet 的参数是在构建时指定的。默认设置包含在 app-settings.xml\
  \ 文件中，可以通过命令行使用 `-Dname=<value>`（在这种情况下意味着 `-Dsecure.login=true`）进行覆盖。`secure.login`\
  \ 默认是关闭的，因此您需要将 `secure.login=true` 添加到您的 build.properties 文件中，或者在命令行中传递它。\n\n现在让我们深入研究这个\
  \ servlet，看看它是如何工作的。首先，我们必须承认，我们实现这一功能的一些魔法来自于 Steve Ditlinger 在 *JavaWorld* 上发表的一篇文章。我们使用了这篇文章中的两个类：`SslUtil`\
  \ 和 `RequestUtil`。\n\n■**注意** 您可以在线找到 Steve Ditlinger 的文章，标题为“在 Web 应用中透明地混合协议”，网址为\
