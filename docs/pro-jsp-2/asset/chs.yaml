  \n}\n\n}\n\n在该 servlet 的 execute()方法中——doGet()和 doPost()都会调用它——有以下代码用于判断当前协议是否正确，如果不正确则切换协议：\n\
  \nString redirectString = SslUtil.getRedirectString(request, getServletContext(),\
  \ secure.booleanValue());\n\nif (redirectString != null) {\n\n// 将页面重定向到所需 URL\n\
