  \ // 获取持久化会话\n\nUserManager mgr =\n\nnew UserManagerImpl((String) ctx.getAttribute(Constants.DAO_TYPE));\
  \ UserForm user = mgr.getUser(ses, username);\n\nsession.setAttribute(Constants.USER_KEY,\
  \ user);\n\n} catch (Exception e) {\n\nlog.error(\"获取用户信息时出错 \" + e); e.printStackTrace();\n\
  \nRequestDispatcher dispatcher =\n\nrequest.getRequestDispatcher(\"/error.jsp\"\
  );\n\ndispatcher.forward(request, response);\n\nreturn;\n\n}}\n\nUserManager 检索用户信息，并向客户端隐藏了脏活（在此例中即过滤器）。在本例中，当未找到用户时，getUser(ses,\
  \ username) 方法调用会抛出异常。catch 块获取一个 RequestDispatcher 并转发到一个解释问题的 JSP 页面。\n\n隐藏用户详细信息检索的实现非常重要，这样你将来就能切换到\
  \ LDAP 或其他类型的用户数据库。要使用 LDAP，你只需创建一个实现 UserManager 并与 LDAP 通信的新类，而不是与数据库通信。更妙的是，你可以在\
  \ web.xml 中添加一个上下文参数，以便在数据库和 LDAP 之间切换。使用 LDAP 这样的目录服务器的好处是，你可以将加密密码作为数据存储的一部分。对于文件和数据库领域，你必须通过编程方式加密密码，或者配置\
  \ Servlet 容器为你完成。\n\n加密密码\n\n在 Tomcat 中，通过向领域定义添加 digest 属性可以轻松加密密码。该值必须是 java.security.MessageDigest\
  \ 类支持的摘要算法之一（SHA、MD2 或 MD5）。扩展前面的示例，下面的 XML 片段为基于文件的领域添加了 SHA 加密：\n\n<Realm className=\"\
  org.apache.catalina.realm.UserDatabaseRealm\"\n\ndebug=\"0\" resourceName=\"UserDatabase\"\
  \ digest=\"SHA\" /> 现在要登录应用，你需要将存储在 tomcat-users.xml 中的密码加密为其加密形式。可以通过执行以下命令来完成：\n\
  \njava org.apache.catalina.realm.RealmBase -a SHA {明文密码}\n\n其中 catalina.jar 位于 CLASSPATH\
  \ 中。然后，将此新密码复制并粘贴到 %TOMCAT_HOME%\\conf\\tomcat-users.xml 文件中。\n\n这种密码加密方法的问题在于它可能不可移植。\n\
  \n\n\n让我们来看看程序化加密。好消息是，你已经创建了一个 `LoginServlet`，因此可以用它来加密密码。由于该功能默认是关闭的，你需要\n\n513-0\
