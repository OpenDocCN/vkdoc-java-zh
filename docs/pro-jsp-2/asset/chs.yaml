  在 `build.properties` 文件中添加 `encrypt.password=true`，或者通过命令行使用 `ant –Dencrypt.password=true`\
  \ 传入该参数，也可以编辑 `app-settings.xml` 中的默认设置。如果你使用的是本应用程序的二进制版本（`.war` 文件），只需编辑 `web.xml`\
  \ 文件中 `LoginServlet` 的以下 `<init-param>` 配置：\n\n<init-param>\n\n<param-name>encrypt-password</param-name>\n\
  \n<param-value>true</param-value>\n\n</init-param>\n\n接下来，你需要在你的 Servlet 中实际加密密码。为此，请在\
  \ `StringUtil.java` 类中创建一个 `encodePassword(String password, String algorithm)` 方法。该方法使用\
  \ JSSE 中的 `MessageDigest` 类来加密字符串：`import java.security.MessageDigest;`\n\npublic\
  \ static String encodePassword(String password, String algorithm) {\n\nbyte[] unencodedPassword\
  \ = password.getBytes();\n\nMessageDigest md = null;\n\ntry {\n\n// 首先，根据给定的提供者创建一个实例\n\
  \nmd = MessageDigest.getInstance(algorithm);\n\n} catch (Exception e) {\n\nlog.error(\"\
  Exception: \" + e);\n\nreturn password;\n\n}\n\nmd.reset();\n\n// 调用 update 方法一次或多次\n\
  \n// （当你不知道数据大小时很有用，例如流） md.update(unencodedPassword);\n\n// 现在计算哈希值\n\nbyte[] encodedPassword\
  \ = md.digest();\n\nStringBuffer buf = new StringBuffer();\n\nfor (int i = 0; i\
  \ < encodedPassword.length; i++) {\n\nif (((int) encodedPassword[i] & 0xff) < 0x10)\
  \ {\n\nbuf.append(\"0\");\n\n}\n\nbuf.append(Long.toString((int) encodedPassword[i]\
  \ & 0xff, 16));\n\n}\n\nreturn buf.toString();\n\n}\n\n此方法根据你传入的算法对字符串进行加密。该算法在\
  \ `LoginServlet` 中定义，并且在构建时可通过 `${encrypt-algorithm}` 变量进行配置。默认设置为 SHA。\n\n■**注意**\
  \ 有关这些算法及其工作原理的更多信息，请访问 http://theory.lcs.mit.edu/~rivest/crypto-security.html#Algorithms。\n\
  \n513-0 ch12.qxd 11/17/05 4:15 PM 第 509 页\n\n第 12 章 ■ **Web 应用程序的安全性**\n\n**509**\n\
  \n如果你正在使用密码加密，并且还提供了“找回密码”功能，你可能需要在用户存储中添加一个 `password_hint` 列。记住所有密码已经够难了，而当你不得不创建一个新密码时更是令人烦恼，因此“发送提示”策略非常有用。\n\
  \n**Servlet 2.5 安全变更**\n\nServlet 2.5 规范有一整章关于安全的内容，但变化不大。JSP 2.1 规范不包含任何与安全相关的信息。它只是指出了通过\
  \ `HttpServletRequest` 接口进行安全编程的有用信息，为你提供了以下方法：\n\n• `getRemoteUser()`\n\n• `isUserInRole(String\
  \ roleName)`\n\n• `getUserPrincipal()`\n\n`getRemoteUser()` 方法返回已验证用户的登录名，如果不存在已验证用户则返回\
  \ `null`。`isUserInRole()` 方法有助于确定某个角色对特定资源的授权。\n\n关于角色，如果你将它们硬编码到 Servlet 中，需要记住一件重要的事情：使用\
  \ `web.xml` 中的 `<security-role-ref>` 元素来创建链接。示例如下：\n\n<security-role-ref>\n\n<role-name>admin</role-name>\n\
  \n<role-link>accounting</role-name>\n\n</security-role-ref>\n\n这样，你就可以编写 Servlet\
  \ 代码，而无需担心 admin 角色是否会从会计部门变更为 IT 部门。你只需使用 `admin` 进行配置/编码，并知道你的代码将安全地应对变更。当然，我们建议将此值放在\
  \ `Constants.java` 文件中，以便在确实需要时能够轻松更改。\n\n`HttpSession` 接口提供了 `session.invalidate()`\
  \ 方法用于用户登出。这对我们来说一直很好用。当你调用 `session.invalidate()` 时，它会使会话失效，然后解绑所有绑定到该会话的对象。\n\n\
  \n\n**其他身份验证选项与注意事项**\n\n如果你对容器管理的身份验证在开发便捷性方面不满意，或者有更严格的安全要求，还有其他替代方案。最常见的做法是构建自定义身份验证机制。如果决定采用此方案，我们强烈建议你研究\
  \ JAAS 并尝试使用其 API。\n\n安全过滤器\n\n安全过滤器（http://securityfilter.sourceforge.net/）是一个模仿容器管理安全机制的开源项目。它看起来与容器管理安全机制完全一致，并支持\
  \ `HttpServletRequest` 的程序化安全方法。但遗憾的是，它无法自动将用户的 `Principal` 对象传播到 EJB 调用中。\n\n513-0\
  \ ch12.qxd 11/17/05 4:15 PM 第 510 页\n\n**510**\n\n第 12 章 ■ Web 应用程序中的安全性\n\nStruts\
  \ 的 SSL 扩展\n\nStruts 的 SSL 扩展（http://sslext.sourceforge.net/）适用于 HTTP/HTTPS 切换。这是一个开源项目，允许你通过修改后的\
  \ Struts 标签库以及 Struts 配置文件中的配置设置，来实现 HTTP/HTTPS 切换。该项目由 Steve Ditlinger 编写，他也是前面提到的\
  \ SSL 切换文章的作者。\n\n记住密码\n\n你可能在许多门户网站（如 Yahoo!）上见过“记住我的密码”功能。通常，这是通过将用户名和密码组合存储在\
  \ cookie 中来实现的。如果你的应用程序需要登录，并且你想添加此功能，实现起来相当简单，尤其是在 Servlet 2.5 环境下。你可以使用一个 servlet\
  \ 作为欢迎文件，并检查 cookie 是否存在。当然，你也可以使用 JSP 来模拟相同的行为，获取用户名和密码的 cookie，并将这些 cookie 作为参数重定向到\
  \ `LoginServlet`。大多数现代浏览器的优点在于它们会主动提供记住密码的功能，这通常比使用 cookie 更安全。\n\n“记住我”功能\n\n作为此功能实现方式的示例，你将为代码下载附带的示例应用程序添加一个“记住我”功能。具体做法是使用\
  \ cookie 记住用户名和密码，并在用户首次访问应用程序时查找这些信息。如果 cookie 存在，则尝试对用户进行身份验证。此过程涉及三个 cookie；前两个已在前面提及。第三个\
  \ cookie 用于指示用户希望使用“记住我”功能。然后，你使用一个过滤器来检测这些 cookie 是否存在，如果存在，则尝试登录用户。\n\n首先，在 `login.jsp`\
  \ 页面中添加一个复选框，允许用户指示他希望应用程序记住其密码：\n\n```html\n<input type=\"checkbox\" name=\"rememberMe\"\
  \ id=\"rememberMe\" /> 记住我\n```\n\n如果选中此框，则设置一个 cookie 来指示用户希望使用此功能。同时，设置一个 cookie\
  \ 来记住用户的用户名和密码。由于你使用 `LoginServlet` 将登录请求转发到 `j_security_check`，因此需要在 `execute()`\
  \ 方法中添加设置这些 cookie 的代码：\n\n```java\nif (request.getParameter(\"rememberMe\") !=\
  \ null) {\n\n    response =\n\n        RequestUtil.setCookie(response, \"rememberMe\"\
  , \"true\", false); response =\n\n        RequestUtil.setCookie(response, \"password\"\
  ,\n\n            StringUtil.encodeString(encryptedPassword),\n\n            false);\n\
  \n}\n```\n\n513-0 ch12.qxd 11/17/05 4:15 PM 第 511 页\n\n第 12 章 ■ Web 应用程序中的安全性\n\n\
  **511**\n\n对于密码 cookie，你使用了 `StringUtil.java` 类中的 `encodeString()` 方法。这是一个简单的方法，通过使用\
  \ `sun.misc.BASE64Encoder()` 来加密密码 cookie 的值：\n\n```java\npublic static String encodeString(String\
  \ str) throws IOException {\n\n    sun.misc.BASE64Encoder encoder = new sun.misc.BASE64Encoder();\
  \ String encodedStr = new String(encoder.encodeBuffer(str.getBytes())); return (encodedStr.trim());\n\
  \n}\n```\n\n\n\nBase64 编码非常适合此功能，因为它可以被解码（自动登录时需要用到），并且能确保客户的密码不以明文形式存储。\n\n如果你没有使用\
  \ `LoginServlet`，而只是在表单中将 `j_security_check` 作为 action 属性，你仍然可以使用此功能。只需使用少量 JavaScript\
  \ 代码，在表单的 `onsubmit()` 处理程序中设置这些 cookie 即可。这样会失去加密密码的功能，但此功能仍然有效。\n\n此功能的核心部分位于\
  \ `BreadCrumbFilter.java` 类中。如果存在所需的 cookie，该类会执行检查并自动登录。在该类的 `doFilter()` 方法中，以下代码处理了此逻辑：\n\
  \n```java\n// 获取与“记住我”功能相关的 cookie\nCookie rememberMe = RequestUtil.getCookie(request,\
  \ \"rememberMe\");\nCookie passCookie = RequestUtil.getCookie(request, \"password\"\
  );\nString password =\n\n(passCookie != null)\n\n? URLDecoder.decode(passCookie.getValue(),\
  \ \"UTF-8\") : null;\n\n// 检测认证是否失败 - 由 web.xml 中 <form-error-page> 的 error=true\
  \ 参数指示\n// StringUtils.equals 是 commons-lang 中的一个便捷方法，能优雅地处理 null 值\nboolean authFailed\
  \ =\n\nStringUtils.equals(request.getParameter(\"error\"), \"true\");\n\n// 检查用户是否正在注销，如果是，则删除\
  \ rememberMe cookie 和 password cookie\nif ((authFailed ||\n\n(request.getRequestURL().indexOf(\"\
  logout\") != -1)) && (rememberMe != null)) {\n\nif (log.isDebugEnabled()) {\n\n\
  log.debug(\"正在删除与 rememberMe 相关的 cookie\");\n\n}\n\nresponse =\n\nRequestUtil.deleteCookie(response,\n\
  \nRequestUtil.getCookie(request,\n\n\"rememberMe\"));\n\nresponse = RequestUtil.deleteCookie(response,\
  \ passCookie);\n\n}\n\n// 检查用户是否正在登录。如果是，则检查他/她是否启用了 rememberMe 功能。\n// 仅在请求“login”时尝试进行认证\n\
  if ((request.getRequestURL().indexOf(\"login\") != -1)) {\n\n// 检查是否应自动登录用户\n//\
  \ 容器正在将用户路由到登录页面，检查 remember me cookie\nCookie userCookie = RequestUtil.getCookie(request,\
  \ \"username\");\nString username =\n\n(passCookie != null)\n\n? URLDecoder.decode(userCookie.getValue(),\
  \ \"UTF-8\") : null;\nif ((rememberMe != null) && (password != null)) {\n\n// 无需显示登录页面即可认证用户\n\
  \nString route =\n\nrequest.getContextPath() +\n\n\"/auth?j_username=\" + username\
  \ +\n\n\"&j_password=\" + StringUtil.decodeString(password);\nif (log.isDebugEnabled())\
  \ {\n\nlog.debug(\"我记得你 '\" + username +\n\n\"'，正在尝试认证...\");\n\n}\n\nresponse.sendRedirect(response.encodeRedirectURL(route));\n\
  return;\n\n}\n\n}\n```\n\n就是这样！它甚至通过检查 `error` 参数来处理域中的密码更改——这是我们添加到最近大多数应用程序中的一个巧妙功能。\n\
  \n**授权**\n\n用户登录到应用程序后，你可能对用户能做什么或看到什么有要求。使用容器管理的安全性会简单得多，因为你可以获取用户的角色。使用你自己的认证架构，你或许也能得到类似的结果，但你可能无法利用大量可用的插件。我们所说的**插件**，指的是允许进行角色配置的标签库和其他与\
  \ Java 相关的包。例如，Struts Logic 标签库有一个 `<logic:present>` 标签，允许你根据用户的角色执行逻辑。Tiles 模板框架也允许你根据角色配置模板中部分的显示/隐藏。\n\
  \n在本节中，我们将提供一些关于在 Web 应用程序中控制*谁看到什么*的建议和技巧。如果你使用容器管理的认证，这些技术中的大多数实现起来会容易得多，但这并非必需。\n\
  \n你首先需要考虑的是，用户登录后应该有哪些选择。通常这些选择以链接的形式出现，但也可能是其他菜单类型的系统，例如选择列表或 DHTML 下拉菜单。控制用户可能看到哪些链接的一种简单方法是根据用户的角色显示或隐藏链接。然而，这仅仅是隐藏了链接，用户仍然可以通过输入\
  \ URL 来访问它。\n\n一个推荐的做法是，在部署应用程序时，将你的 JSP 文件和片段放在 `WEB-INF` 目录下。这样做可以防止浏览器通过 URL\
  \ 直接访问 JSP 页面，同时也迫使你（作为开发者）遵循 MVC 模式。你的 JSP 页面将受到保护，因为 `WEB-INF` 下的所有资源都是隔离的，无法通过\
  \ URL 访问。Servlet 规范规定必须在 `WEB-INF` 内部提供安全性，并且通过强制每个请求都经过一个 Servlet 控制器，确保了控制器和视图的良好分离。然而，我们见过一些容器不支持这一点——它们要么允许通过浏览器访问\
  \ `WEB-INF`，要么不允许你渲染位于 `WEB-INF` 下的 JSP 页面。如果你的 Servlet 容器符合 Java EE 规范，它应该允许你这样做。\n\
  \n如果你使用的框架允许配置 Servlet 到 JSP 的映射，这做起来相当容易。我们通常在一个目录中开发 JSP 页面，旁边是样式表、JavaScript\
  \ 文件和图片的目录。然后在部署时，我们将包含 JSP 页面的目录（`pages`）移动到 `WEB-INF` 下的一个目录中。\n\n通过将 JSP 页面放在\
  \ `WEB-INF` 下，你可以确保在显示它们之前会执行必要的应用程序逻辑。毕竟，用户必须通过这个逻辑才能到达你的 JSP。\n\n在保护了页面位置之后，你需要保护对它们的访问，以便未经授权的用户无法执行访问它们的逻辑。你可以通过几种方式做到这一点。\n\
  \nServlet 内置的方法是为你想要保护的每个 Servlet（或 Servlet 组）使用不同的 `<security-constraint>`。要做到这一点，你必须为每个\
  \ Servlet 或组创建 Servlet 映射——如果你有很多 Servlet，你的 `web.xml` 可能会变得相当庞大。一种更简单的方法是通过一个初始\
  \ Servlet 代理所有请求，该 Servlet 检查权限并适当地转发，或者更好的方法是使用一个过滤器。我们还见过另一种替代方案，即在每个 JSP 文件的顶部放置一个标签库。这个标签库会检查用户是否有权访问该页面。\n\
  \n以编程方式检查用户角色并相应地分发请求，或者在 JSP 页面的情况下显示错误消息，其问题在于它可能变成维护的噩梦。我们参与过一些使用这种架构的项目，在转向容器管理的认证后，维护变得容易多了。\n\
  \n**总结**\n\n我们希望我们已经说服你，为 Web 应用程序添加安全性是相当容易的。添加之后，它带来了许多好处：基于角色的定制、审计日志和密码加密。根据我们的经验，使用容器管理的安全性让我们的开发体验更加愉快。我们曾通过编程方式使用\
  \ LDAP 和大量应用程序逻辑来显示或隐藏链接，以及允许或拒绝访问页面。尽管它有效，而且效果不错，但初始编程花费的时间要长得多，并且维护起来相当麻烦。另一方面，如果你已经有一个能提供所有这些好处的认证和授权框架，那么你完全应该使用它，并且如果它是可移植且运行良好的，请分享它！\n\
  \n\n\n我们在容器管理安全性方面遇到的最大问题，与 Servlet 容器对 Servlet 规范的实现有关。如果在配置安全性时遇到问题，我们建议您在 Tomcat\
  \ 上测试应用程序。如果您的应用程序能在 Tomcat 上运行，那么您的容器可能存在问题，此时需要进行一些研究或编写变通方案，甚至可以考虑迁移到其他容器（如果可行的话）。开发中\n\
  \n513-0 ch12.qxd 11/17/05 4:15 PM 第 514 页\n\n513-0 ch13.qxd 11/16/05 12:07 PM 第\
  \ 515 页\n\n第 13 章\n\n■ ■ ■\n\n提升 Web 应用的\n\n性能与可扩展性\n\n**W**eb 应用的分布式和多用户特性使得性能和可扩展性成为重要关注点。Web\
  \ 应用是分布式系统。用户通过网络从远程客户端访问 Web 应用，而 Web 应用通常依赖于数据库、企业信息系统和 Web 服务等远程系统。网络连接开销、缓慢的网络连接以及远程系统的低效都可能导致您的\
  \ Web 应用性能不佳。\n\nWeb 应用常常需要扩展以满足日益增长的用户需求。一旦 Web 应用投入生产，由于除了无处不在的 Web 浏览器外，访问无需客户端软件，因此增加用户似乎非常容易。增加用户很容易，但要确保您的应用在这些新增用户下仍能良好运行，则需要付出一些努力。\n\
  \n在本章中，您将了解一些可以采取的步骤和可以使用的技术，以提升 Web 应用的性能和可扩展性。在开始之前，我们先澄清本章中使用的术语：\n\n• **性能：**\
  \ 每个应用对性能都有自己的定义。对于 Web 应用，一个常见的性能指标是**响应时间**——即应用完成来自最终用户的任何给定请求所花费的时间。因此，您可能要求应用的最大响应时间为\
  \ 3 秒。然而，为了完整起见，任何此类指标都必须考虑在任意给定时间可能与应用交互的用户数量。因此，一个更完整的性能描述可能是：*应用必须支持 100 个并发用户，且最大响应时间为\
  \ 3 秒*。\n\n• **可扩展性：** 凭借合理的编码技能和足够的硬件，您可能会发现达到上述性能目标相当容易。但是，假设您的应用取得了成功，因此突然需要支持\
  \ 200 个用户。如果您将处理能力加倍，例如在每个服务器上增加 Java 虚拟机或增加服务器计算机，您的应用是否能够（大致）支持双倍的用户数量，同时继续满足性能要求？如果答案是肯定的，那么您的应用就是可扩展的。\n\
  \n**515**\n\n513-0 ch13.qxd 11/16/05 12:07 PM 第 516 页\n\n**516**\n\n第 13 章 ■ 提升\
  \ Web 应用的性能与可扩展性\n\n那么，如何确保您的 JSP 应用满足其性能和可扩展性要求呢？作为一名软件开发人员，您可能熟悉以下引用自唐纳德·克努特（Donald\
  \ Knuth）的经典性能名言：\n\n*我们应当忘记微小的效率提升，大约 97% 的情况下：过早优化是万恶之源。*\n\n在本章中，我们不会关注微小的效率提升，也会避免过早优化；相反，我们将专注于您可以采取的更大步骤，以确保达到\
  \ JSP 应用的性能目标。我们将首先介绍两种能够显著增强 JSP 应用性能和可扩展性特性的具体技术：**页面缓存**和**数据库连接池**。接着，我们将讨论更通用的性能技巧和最佳实践，最后讨论如何实际测试应用的性能和可扩展性，以确保您确实满足了要求。\n\
  \n**通用原则**\n\n以下内容适用于高性能 Web 应用的开发，因此是您 JSP 应用设计的指导原则：\n\n• **不要执行不必要的代码。** 提升代码性能的最佳方法之一就是简单地避免执行它。除非绝对必要，否则不要执行代码。我们将讨论页面缓存如何在这方面提供帮助。\n\
  \n• **不要创建不必要的对象。** 创建新对象是一项昂贵的操作，无论是创建它们所需的处理时间，还是存储它们所需的内存。在编写代码时，尽量最小化创建对象的数量。尽可能重用您创建的对象。JSP\
  \ 应用中最昂贵的对象之一是数据库连接对象。在本章中，我们将讨论如何使用数据库连接池来避免重复创建数据库连接对象。\n\n• **当必须创建对象时，在正确的范围内创建它们。**\
  \ 在 Web 应用中，有三个作用域级别：**请求**、**会话**和**应用**。为了扩展 Web 应用以满足大量用户的需求，请仔细考虑哪些内容应存储在会话作用域中。我们将讨论这一点以及其他确保应用准备好扩展的方法。\n\
  \n现在我们已经介绍了通用原则，接下来将详细讨论如何将页面缓存和数据库连接池的概念应用于 JSP 应用。\n\n**页面缓存**\n\n在典型的 JSP 应用中，网页由\
  \ Java 代码动态生成，这些代码从数据库提取数据并格式化数据以供显示。此处理过程需要时间，会导致 Java 对象的创建，并消耗网络资源。如果我们能找到一种方法，避免为每个传入的页面请求重新生成页面，那么不仅可以加快页面响应时间，还能提升\
  \ JSP 应用的整体性能和可扩展性。我们真正想做的是将每个动态生成的页面保存在缓存内存中。当收到一个我们已经生成过的页面的请求时，我们可以直接从缓存中取出该页面并发送给浏览器。这种技术称为**页面缓存**，它可以显著提升\
  \ JSP 应用的性能。\n\n**何时应使用页面缓存？**\n\n您可能以前使用过缓存，也许是通过编写自己的简单缓存。如果您使用的是像 Struts 这样的\
  \ MVC 框架，您可以为从数据库数据构建的对象使用简单缓存，而很少需要页面缓存。那么何时需要页面缓存呢？\n\n当您无法在负责输出页面的 JSP 页面或 Servlet\
  \ 被调用之前，将网页所需的所有数据放入上下文中时，页面缓存就很有用。此外，当您的 JSP 页面由多个 JSP 标签或其他组件组成，而这些组件本身负责执行诸如获取数据或渲染复杂\
  \ HTML 等昂贵操作时，页面缓存也很有用。\n\n**数据应缓存多久？**\n\n\n\n为了减轻服务器负载，您应尽可能长时间地缓存页面。那么，这个时间是多长呢？答案取决于应用程序的性质。当然，对于高度交互的页面，您可能完全无法使用缓存，或者只能缓存页面中一些较小且相对静态的部分。您可能会决定将某些页面缓存很长时间，但每次网站数据库更新时，会刷新部分或全部缓存。\n\
  \n为了更好地理解页面缓存技术，让我们仔细研究一个最流行的开源 Java 缓存包：OSCache。\n\n**OSCache**\n\n**OSCache**\
  \ 是一个开源缓存库，可从 OpenSymphony 组织免费获取（下载和安装说明可在 http://www.opensymphony.com/oscache\
  \ 找到）。OSCache 包含一组 JSP 标签，可让您在 JSP 应用程序中轻松实现页面缓存，同时还提供了一个基于 ServletFilter 的缓存实现，以便您可以缓存由任何\
  \ Servlet（不仅仅是 JSP 页面）生成的内容。\n\nOSCache 应用了以下通用的页面缓存概念：\n\n**• 缓存条目**：存储在页面缓存中的对象称为缓存条目。在\
  \ JSP 应用程序中，缓存条目通常是 JSP 页面、JSP 页面的一部分或 Servlet 的输出。\n\n**• 缓存键**：页面缓存类似于哈希表。当您在页面缓存中保存一个缓存条目时，必须提供一个缓存键来标识该条目。在\
  \ JSP 应用程序中，您可以将多个请求参数组合在一起形成一个缓存键，或者使用页面的请求 URI 作为其缓存键。\n\n**• 缓存持续时间**：这是缓存条目在过期之前保留在页面缓存中的时间段。当缓存条目过期时，它会从缓存中移除，并且将其放入缓存的应用程序将被迫重新生成它。对于显示频繁更新数据的\
  \ JSP 页面，您应该设置较短的缓存持续时间，以便缓存频繁更新，用户不会看到过时信息。对于显示不常更新数据的 JSP 页面，您可以设置较长的缓存持续时间。\n\
  \n**• 缓存作用域**：这是缓存存储的作用域。在 JSP 应用程序中，将缓存条目存储在应用程序作用域（以便所有用户共享缓存条目）或会话作用域（以便按用户存储缓存条目）是合理的。\n\
  \n**OSCache JSP 标签**\n\n使用 OSCache 标签很简单。假设您已经安装并配置了 OSCache，您需要做的就是在希望缓存的 JSP 页面部分周围放置\
  \ `<os:cache>` 标签。清单 13-1 中的示例 JSP 页面说明了如何执行此操作。\n\n**清单 13-1.** *longop-cached.jsp*\n\
  \n<%@ page language=\"java\" %>\n\n<%@ taglib uri=\"/WEB-INF/oscache.tld\" prefix=\"\
  os\" %>\n\n<!DOCTYPE HTML PUBLIC \"-//w3c//dtd html 4.0 transitional//en\">\n\n\
  <html>\n\n<head><title>长时间操作 - 已缓存</title></head>\n\n<body>\n\n<h1>长时间操作 - 已缓存</h1>\n\
  \n<os:cache time=\"60\">\n\n<% Thread.sleep(10000); %>\n\n<p>唤醒时间：<%= new java.util.Date().toString()\
  \ %></p>\n\n</os:cache>\n\n<p>\n\n这个 JSP 页面加载时间长的原因是它包含一个 10 秒的休眠。\n\n</p>\n\n<p>\n\
  \n此页面使用超时时间为 60 秒的页面缓存，\n\n因此，如果您在接下来的 60 秒内再次运行此页面，\n\n其运行时间将不到一秒钟。\n\n</p>\n\n\
  </body>\n\n</html>\n\n在上面的示例中，您有一个 JSP 页面，它会休眠 10 秒，然后显示唤醒时间和其他一些文本。如您所见，对 `sleep()`\
  \ 方法的调用和唤醒时间消息被包含在缓存时间为 60 秒的 `<os:cache>` 标签内。\n\n\n\n该页面首次执行时，需要耗时 10 秒。然而，它会在`<os:cache>`标签内缓存一份输出副本。如果你在\
  \ 60 秒内再次运行该页面，执行时间将缩短至不到 1 秒，因为它会从缓存中返回输出结果，而无需重新执行`<os:cache>`标签内的代码。如果你等待 60\
  \ 秒后再运行该页面，则必须等待 10 秒的休眠时间完成，因为缓存条目已超时，输出结果需要重新生成。\n\n在此示例中，你未指定缓存键，因此默认情况下，OSCache\
  \ 将使用请求 URI 作为缓存键。你同样未指定缓存范围，因此默认情况下将使用应用程序范围。\n\n**OSCache Servlet 过滤器**\n\n你还可以使用\
  \ OSCache 的 Servlet 过滤器类`com.opensymphony.module.oscache.web.filter.CacheFilter`来缓存\
  \ Servlet 的输出。你只需将此过滤器添加到应用程序的`web.xml`文件中，并为所有希望缓存的 URL 模式添加过滤器映射即可。\n\n例如，本章的代码下载中包含一个需要\
  \ 10 秒才能运行的 Servlet。这个`LongOpServlet`产生的输出与上一节讨论的`longop.jsp`页面几乎相同。为了像缓存 JSP 页面一样缓存`LongOpServlet`的输出，你需要将\
  \ OSCache 的`CacheFilter`添加到你的 Web 应用程序中。清单 13-2 展示了一个包含 OSCache `CacheFilter`条目的示例部署描述符。\n\
  \n**清单 13-2.** *web.xml*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  \n<web-app\n\nxsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd\"\
  \n\nversion=\"2.5\">\n\n<context-param>\n\n<param-name>debug</param-name>\n\n<param-value>true</param-value>\n\
  \n</context-param>\n\n<filter>\n\n<filter-name>CacheFilter</filter-name>\n\n<filter-class>\n\
  \ncom.opensymphony.module.oscache.web.filter.CacheFilter\n\n</filter-class>\n\n\
  <init-param>\n\n<param-name>time</param-name>\n\n<param-value>60</param-value>\n\
  \n</init-param>\n\n</filter>\n\n<filter-mapping>\n\n<filter-name>CacheFilter</filter-name>\n\
  \n<url-pattern>/servlets/*</url-pattern>\n\n</filter-mapping>\n\n<servlet>\n\n<servlet-name>LongOpServlet</servlet-name>\n\
  \n<servlet-class>\n\ncom.apress.projsp.servlets.LongOpServlet\n\n</servlet-class>\n\
  \n</servlet>\n\n<servlet-mapping>\n\n<servlet-name>LongOpServlet</servlet-name>\n\
  \n<url-pattern>/servlets/longop</url-pattern>\n\n</servlet-mapping>\n\n</web-app>\n\
  ```\n\n`<filter>`元素配置了`CacheFilter`本身。它指定了过滤器的类名并设置了一个参数：缓存时间。与上一节的`longop.jsp`示例一样，缓存时间设置为\
  \ 60 秒。其他参数，如缓存键和缓存范围，已被省略，因此将使用默认值。`<filter-mapping>`元素配置了`CacheFilter`，使其能够缓存所有匹配模式`/servlets/*`的请求\
  \ URL 的响应输出。这对于`LongOpServlet`非常适用，因为它映射到了 URL `/servlets/longop`。\n\n有关 Servlet\
  \ 过滤器的更多信息，请参考第 10 章和第 11 章。有关 OSCache 的更多信息，请访问以下 URL：\n\n*   **OpenSymphony 网站：**\
  \ http://www.opensymphony.com\n*   **OSCache 网站：** http://www.opensymphony.com/oscache\n\
  *   **OSCache WIKI：** http://www.opensymphony.com:8668/space/OSCache\n\n**数据库连接池**\n\
  \n页面缓存有助于减少 JSP 应用程序中数据库访问的频率，但无法完全消除数据库访问。最终，应用程序仍需打开数据库连接来查询、创建、更新和删除数据库中的记录。不幸的是，打开数据库连接是一项昂贵的操作，会消耗处理时间、内存和网络资源。\n\
  \n提升 JSP 应用程序性能最有效的方法之一是使用一种称为**数据库连接池**的技术。通过使用此技术，你可以始终保持一个打开的数据库连接池。当需要连接时，从池中获取；使用完毕后，将其归还到池中。\n\
  \n数据库连接池是一项非常成熟的技术，几乎在所有 Java EE 应用服务器中都可使用。它也被内置到许多 JDBC 驱动程序和某些持久化框架中。例如，第 9 章讨论的\
  \ Hibernate 持久化框架就包含一个易于使用的数据库连接池。\n\n数据库连接池的替代方案有很多，我们在此不一一讨论。相反，我们将讨论常见的数据库连接池配置参数，然后给出一个示例。大多数数据库连接池允许你设置以下配置参数：\n\
  \n*   **最大活动连接数：** 这是池中允许同时打开的最大连接数。如果池中所有连接都已被占用时收到连接请求，那么对`getConnection()`方法的调用将会阻塞，直到另一个线程释放连接或达到可配置的最大等待时间。\n\
  *   **最大空闲连接数：** 这是池中允许保持打开但未使用的最大连接数。如果将此参数设置为零，则不设置最大限制。\n*   **最大等待时间：** 这是调用`getConnection()`方法在等待连接释放时阻塞的最长时间。如果等待时间超过此时间，`getConnection()`调用将抛出异常，或者你可以使用其他技术来指示连接不可用。\n\
  *   **废弃连接超时：** 在某些情况下，应用程序可能无法正确释放数据库连接。这被称为废弃连接，是一个严重的问题，因为在连接被释放之前，它不会返回池中供重用。一些数据库连接池会监控未释放的连接，如果某个连接空闲时间超过废弃连接超时时间，则被视为已废弃，并自动释放回池中。\n\
  \n**Jakarta Commons 数据库连接池**\n\n我们不可能涵盖所有数据库连接池的选项，因此我们将重点介绍 Jakarta Commons 数据库连接池（DBCP）。DBCP\
  \ 是内置于流行的开源 Tomcat Servlet 引擎中的数据库连接池技术。由于它随 Tomcat 一起提供，你无需下载或安装任何文件或库。\n\n通常，要将应用程序部署到\
  \ Tomcat Servlet 引擎，只需将应用程序的 WAR 文件或部署目录复制到 Tomcat 的`webapps`目录即可。但是，要为你的应用程序配置\
  \ DBCP，你需要多做一点工作：你需要将应用程序添加到 Tomcat 服务器配置文件`conf/server.xml`中。\n\n为此，你需要在 Tomcat\
  \ 的`server.xml`文件中添加一个新的`<Context>`条目。使用你喜欢的编辑器打开`server.xml`文件，并找到 Tomcat 根上下文。你需要将`<Context>`条目添加到`server.xml`文件的正确位置。例如，你可以将其添加到\
  \ ROOT 上下文之后、examples 上下文之前，如下面的代码片段所示：\n\n```xml\n<!-- Tomcat Root Context -->\n\
  \n<!--\n\n<Context path=\"\" docBase=\"ROOT\" debug=\"0\"/>\n\n-->\n\n<Context path=\"\
  /myapp\" docBase=\"roller\" debug=\"0\">\n\n<Resource name=\"jdbc/mydb\" auth=\"\
  Container\" type=\"javax.sql.DataSource\" />\n\n<ResourceParams name=\"jdbc/mydb\"\
  >\n\n<parameter>\n\n<name>factory</name>\n```\n\n\n<!-- 以下值适用于 Tomcat 5.0：\n\n<value>org.apache.commons.dbcp.BasicDataSourceFactory</value>\n\
  \n-->\n\n<!-- 以下值适用于 Tomcat 5.5： -->\n\n<value>org.apache.tomcat.dbcp.dbcp.BasicDataSourceFactory</value>\n\
  \n</parameter>\n\n<parameter><name>maxActive</name><value>100</value></parameter>\n\
  \n<parameter><name>maxWait</name><value>100</value></parameter>\n\n<parameter><name>username</name><value>scott</value></parameter>\n\
  \n<parameter><name>password</name><value>tiger</value></parameter>\n\n<parameter>\n\
  \n<name>driverClassName</name>\n\n<value>org.gjt.mm.mysql.Driver</value>\n\n</parameter>\n\
  \n<parameter>\n\n<name>url</name>\n\n<value>jdbc:mysql://localhost:3306/mydb?autoReconnect=true</value>\n\
  \n</parameter>\n\n</ResourceParams>\n\n</Context>\n\n<!-- Tomcat 示例上下文 -->\n\n<Context\
  \ path=\"/examples\" docBase=\"examples\" debug=\"0\"\n\nreloadable=\"true\" crossContext=\"\
  true\">\n\n<Logger className=\"org.apache.catalina.logger.FileLogger\"\n\nprefix=\"\
  localhost_examples_log.\" suffix=\".txt\" timestamp=\"true\"/> 前面的示例展示了如何为一个名为 myapp\
  \ 的应用程序配置 DBCP。\n\n<Context> 元素内的第一个条目是 <Resource> 声明。<Resource> 声明声明了一个 javax.sql.DataSource，并将其绑定到\
  \ JNDI 名称 jdbc/mydb。<ResourceParams> 元素及其嵌套的 <parameter> 元素指定了应用程序数据库连接池的 DBCP 参数。我们已经讨论过\
  \ maxActive 和 maxWait 参数。driverClassName 和 url 参数是标准的 JDBC 连接参数。（更多关于 JDBC 的信息请参见第\
  \ 9 章。）\n\n■**注意** factory 参数的值会根据 Tomcat 发行版的不同而变化。Tomcat 5.0 及更早版本使用了 Jakarta\
  \ Commons DBCP 库。从 Tomcat 5.5 开始，DBCP 库已从 Commons 版本更改为 Tomcat 专用库。如果您想再次确认所使用的值是否正确，请检查\
  \ Tomcat 的 common\\lib 目录中的 Tomcat JAR 文件，找到 BasicDataSourceFactory 类，并使用您找到的类的完全限定类名。\n\
  \n513-0 ch13.qxd 11/16/05 12:07 PM 第 523 页\n\n第 13 章 ■ 提升 Web 应用程序的性能和可扩展性\n\n**523**\n\
  \n接下来的代码片段展示了如何从前面的连接池中获取连接。首先，您使用 JNDI 查找 javax.sql.DataSource 接口，然后向该接口请求一个连接。使用完连接后，您将其关闭并返回到池中以供重用。关闭连接实际上并不会关闭底层的物理连接；它只是将连接返回到池中。\n\
  \njavax.naming.InitialContext context = new InitialContext();\n\n// 查找数据源\n\njavax.sql.DataSource\
  \ dataSource =\n\n(javax.sql.DataSource)context.lookup (\"java:comp/env/jdbc/mydb\"\
  );\n\n// 从池中获取连接\n\njava.sql.Connection conn = dataSource.getConnection();\n\n//\
  \ ...使用连接...\n\n// 关闭连接以将其返回到池中\n\nconn.close();\n\n有关使用 DBCP 的工作示例，请参见第 9 章中的“在\
  \ Web 应用程序中获取 JDBC 连接”一节。\n\n**为可扩展性而设计**\n\nJava 应用服务器旨在支持可扩展性。通过使用应用服务器的管理控制台或编辑配置文件，您可以增加分配给每个服务器进程的内存量，增加每个进程内的请求处理线程数，添加额外的服务器进程，并配置额外的服务器机器来运行服务器进程。\n\
  \n无论您如何设计应用程序，通过将其运行在更强大的计算机上，您可能都能使其运行得更快并为更多用户提供服务。如果您的服务器是多处理器机器，您可以配置应用服务器使用更多线程来处理请求。如果您的服务器有大量内存，您可以配置应用服务器为每个服务器进程分配更多内存。您的应用服务器文档应提供一些指导原则，帮助您决定如何配置这些线程和内存设置。\n\
  \n在一台服务器机器上运行一个服务器进程所能做的事情是有限的。您的 Java 应用服务器将允许您扩展到单台机器上的单个进程之外，但要利用这一点，您需要在开发 JSP\
  \ 应用程序时遵循一些简单的指导原则：\n\n• **最小化每个会话中存储的数据。** 在典型的 JSP 应用程序中，会为每个用户创建一个类型为 javax.servlet.HttpSession\
  \ 的会话对象。随着每个会话存储的数据量增加，每个服务器能够支持的用户数量就会减少。这只是简单的算术。例如，假设应用服务器运行在一个配置了 100 MB 堆的\
  \ Java 虚拟机中。如果应用服务器本身使用 10 MB 内存，并且每个用户会话消耗 1 MB 内存，那么每个应用服务器实例最多可以支持 90 个并发用户。\n\
  \n513-0 ch13.qxd 11/16/05 12:07 PM 第 524 页\n\n**524**\n\n第 13 章 ■ 提升 Web 应用程序的性能和可扩展性\n\
  \n• **尽可能避免创建会话。** 每个创建的会话都会使用一些内存，因此，尽可能尝试在不创建会话的情况下处理请求。\n\n• **仅在会话对象中存储可序列化的对象。**\
  \ Java EE 应用服务器通过跨多个服务器并行运行 JSP 应用程序来支持可扩展性。当创建一个会话时，它会被分配给一个服务器。一种称为**负载均衡**的技术用于确保会话在所有参与的服务器之间均匀分布。一些\
  \ Java EE 应用服务器，例如 IBM WebSphere，支持一种称为**会话迁移**的特殊负载均衡技术。如果启用了会话迁移并且某个服务器过载，则该服务器上的会话可能会被迁移到另一个负载较轻的服务器。会话迁移通常通过序列化来实现，因此，为了使\
  \ JSP 应用程序能够与会话迁移一起工作，您需要确保存储在会话中的每个对象都实现了 java.io.Serializable 接口。\n\n• **不要写入文件系统。**\
  \ 如果 JSP 应用程序跨多个服务器运行，则不能使用文件系统进行存储。您写入一个服务器的文件可能无法在运行该应用程序的所有其他服务器上使用。在这种情况下，请使用数据库而不是文件系统进行存储。\n\
  \n**其他性能提示和资源**\n\n有关性能和可扩展性最佳实践的一个良好信息来源是 IBM 网站。在 WebSphere 和 developerWorks 网站\
  \ (http://www.ibm.com/developerworks) 上搜索“performance”，会找到一系列关于 WebSphere 开发的白皮书和最佳实践指南。关于\
  \ WebSphere 的大部分信息也适用于其他 Java EE 应用服务器以及一般的 JSP 应用程序。\n\n白皮书“WebSphere Application\
  \ Server Development Best Practices for Performance and Scalability”（http://www-306.ibm.com/software/webservers/appserv/ws_bestpractices.pdf）尤其有用。同样，这份白皮书中的大多数最佳实践都适用于任何\
  \ Java EE 应用服务器。许多建议仅适用于 EJB 应用程序，但也有相当多的建议适用于 JSP 应用程序，例如：\n\n\n\n• **避免线程同步与单线程化。**\
  \ 同步方法和代码块会使 JSP 应用表现得如同单线程，从而导致吞吐量降低。JSP 页面和 Servlet 必须保证线程安全，因此切勿使用 `isThreadSafe=false`\
  \ 页面指令。编写 Servlet 时，也不要实现 `javax.servlet.SingleThreadModel` 接口。\n\n（实际上，自 Servlet\
  \ 2.4 起，`SingleThreadModel` 接口已被弃用。）\n\n• **避免使用** System.out.println()**。** 看似无害的\
  \ `System.out.println()` 方法实际上相当有害。根据 IBM 白皮书所述：“由于 `System.out.println()` 语句及类似结构会在磁盘\
  \ I/O 期间同步处理，因此会显著降低吞吐量。”建议使用如 log4j 等日志系统，而非 `System.out` 和 `System.err`。\n\n513-0\
  \ ch13.qxd 11/16/05 12:07 PM 第 525 页\n\n第 13 章 ■ 提升 Web 应用性能与可扩展性\n\n**525**\n\n\
  • **避免字符串拼接。** 这一点广为人知，但仍需重申。使用 `+` 和 `+=` 运算符拼接字符串速度缓慢，且会创建不必要的临时对象。建议改用 `java.lang.StringBuffer`\
  \ 类进行字符串拼接。\n\n**衡量 JSP 应用性能**\n\n除了实施我们一直在讨论的最佳实践设计建议外，你还需要能够证明你的应用能够满足客户设定的性能标准。你需要能够对应用进行性能剖析，找出并修复任何占用过多资源或内存的代码，或导致争用问题从而降低可扩展性的代码。\n\
  \n市面上有多种 Web 应用性能测试工具和产品可供选择，它们均可用于衡量 JSP 应用性能。通常，性能测试工具会支持以下功能：\n\n• **可定制的测试计划**，用于模拟用户使用特定\
  \ JSP 应用时的操作\n• **响应时间统计**，用于测量并收集每个页面的最小、最大和平均响应时间\n• **负载测试**，用于模拟任意数量的用户访问网站\n\
  • **错误检测**，用于检测并记录任何页面发生错误时的信息\n\n性能测试的一个选择是开源产品 **Apache JMeter**。JMeter 允许你开发测试计划，用于测试可通过\
  \ HTTP、FTP 和 JDBC 访问的数据库服务器。\n\nJMeter 能够通过 Cookie 和 URL 重写处理 Servlet 认证，因此非常适合测试\
  \ JSP 应用。JMeter 最大的优势在于它是免费的。你可以下载并试用它，学习性能测试知识，如果喜欢可以继续使用。如果发现它不满足需求，可以评估其他性能测试工具。本节末尾列出了一些流行的性能测试产品。\n\
  \n■**注意** 你可以从 Apache Jakarta 网站 (http://jakarta.apache.org/jmeter) 下载 JMeter。\n\
  \n让我们来看看 JMeter，并用它来测试本节前面讨论过的一项性能建议。你将使用一个非常简单的 JSP 页面，其运行时间为 3 秒，如清单 13-3 所示。\n\
  \n![图片 176](img/index-559_1.png)\n\n513-0 ch13.qxd 11/16/05 12:07 PM 第 526 页\n\n\
  **526**\n\n第 13 章 ■ 提升 Web 应用性能与可扩展性\n\n**清单 13-3.** *threesec.jsp*\n\n<%@ page\
  \ language=\"java\" %>\n\n<!DOCTYPE HTML PUBLIC \"-//w3c//dtd html 4.0 transitional//en\"\
  >\n\n<html>\n\n<head><title>三秒操作</title></head>\n\n<body>\n\n<h1>三秒操作</h1>\n\n<p>\n\
  \n此 JSP 页面加载耗时 3 秒的原因在于它包含一个 3 秒的休眠。\n\n</p>\n\n<% Thread.sleep(3000); %>\n\n</body>\n\
  \n</html>\n\n\n\n该页面运行需要 3 秒，因为它包含一个 3 秒的休眠。要在 JMeter 中测试此页面，首先创建一个包含五个线程且循环次数为\
  \ 100 的线程组。这将模拟五个浏览器各自执行测试计划 100 次的效果。具体操作是：右键点击树形结构中的“测试计划”图标，然后选择“添加 ➤ 线程组”菜单选项来添加一个线程组。图\
  \ 13-1 展示了 JMeter 工具中的线程组页面。\n\n**图 13-1.** *JMeter 应用程序允许你创建任意数量的线程，这些线程可以按需多次执行你的\
  \ Web 应用程序。*\n\n你只需要测试一个页面，因此在线程组下创建一个 HTTP 请求，并将其配置为访问你的`threesec.jsp`页面。接着，添加一个聚合报告，以便查看运行测试页面时的最小、最大和平均响应时间。\n\
  \n图 13-2 展示了测试计划，其中 HTTP 请求编辑器已加载到右侧面板中。\n\n![Image 177](img/index-560_1.png)\n\n\
  ![Image 178](img/index-560_2.png)\n\n513-0 ch13.qxd 11/16/05 12:07 PM 第 527 页\n\n\
  第 13 章 ■ 提升 Web 应用程序性能与可扩展性\n\n**527**\n\n**图 13-2.** *配置线程后，JMeter 会显示一个页面，让你配置将要测试的资源。*\n\
  \n下一步是运行测试计划。使用 JMeter 的“运行 ➤ 启动”菜单项来执行此操作。\n\n测试应该需要几分钟才能完成。在测试运行期间，你可以在聚合报告窗口中观察结果，当测试完成时，该窗口应如图\
  \ 13-3 所示。你的结果会因硬件、操作系统和 Servlet 引擎的不同而有所差异。\n\n**图 13-3.** *运行测试后，你可以在 JMeter 中查看结果。*\n\
  \n![Image 179](img/index-561_1.png)\n\n513-0 ch13.qxd 11/16/05 12:07 PM 第 528 页\n\
  \n**528**\n\n第 13 章 ■ 提升 Web 应用程序性能与可扩展性\n\n查看聚合报告窗口的结果，你可以看到处理了 500 个请求，平均响应时间为\
  \ 3024 毫秒。这很合理，因为页面包含一个 3 秒的休眠，几乎没有其他内容。你可以看到没有发生错误，并且达到了每秒 1.7 个请求（即每分钟 102 个请求）的吞吐率。\n\
  \n我们的性能建议之一是避免单线程。有时你可能觉得有必要对 JSP 页面中的某个调用进行串行化访问。但是，你应该意识到，如果这个调用很频繁，可能会对性能产生严重影响。让我们看看在相同测试下，使用单线程\
  \ JSP 页面会发生什么。为此，你需要对`threesec.jsp`页面做一个简单的修改。你将为该类添加一个锁，以便所有对`Thread.sleep()`的调用都是同步的。清单\
  \ 13-4 展示了新的`threesec-single.jsp`页面。\n\n**清单 13-4.** *threesec-single.jsp*\n\n<%@\
  \ page language=\"java\" %>\n\n<!DOCTYPE HTML PUBLIC \"-//w3c//dtd html 4.0 transitional//en\"\
  >\n\n<html>\n\n<head><title>三秒操作：单线程</title></head>\n\n<body>\n\n<%! static String\
  \ lock = new String(); %>\n\n<h1>三秒操作：单线程</h1>\n\n<p>\n\n此 JSP 页面加载需要 3 秒的原因是其包含一个\
  \ 3 秒的休眠。\n\n</p>\n\n<% synchronized (lock)\n\n{\n\nThread.Sleep(3000);\n\n}\n\n\
  %>\n\n</body>\n\n</html>\n\n现在再次运行测试。这次大约需要 20 分钟，而不是 5 分钟。结果如图 13-4 所示。\n\n**图\
  \ 13-4.** *对 JSP 进行同步会导致其性能显著下降。*\n\n513-0 ch13.qxd 11/16/05 12:07 PM 第 529 页\n\n\
  第 13 章 ■ 提升 Web 应用程序性能与可扩展性\n\n**529**\n\n正如预期的那样，单线程页面的性能远差于多线程页面。单线程页面的吞吐率为每分钟\
  \ 20.1 个请求，而线程安全的 JSP 为每分钟 102 个请求。\n\n\n\n有关 Web 应用程序性能测试的更多信息，请访问以下产品网站：\n\n•\
  \ **Apache JMeter：** http://jakarta.apache.org/jmeter/\n\n• **Mercury LoadRunner：**\
  \ http://www.mercury.com/us/products/performance-center/\n\nloadrunner/\n\n• **Web\
  \ Performance Inc.：** http://www.webperformanceinc.com/\n\n其中，Web Performance Inc.\
  \ 网站是一个很好的资源。它包含性能测试术语表、性能测试演示文稿，以及一份比较 Java EE Servlet 引擎（包括 Tomcat、WebSphere、Orion、Jetty\
  \ 和 Resin）性能的报告。\n\n**测试性能技术**\n\n现在，你将通过将本章介绍的技术应用于一个实际的示例程序来付诸实践。你将使用第 9 章中数据访问示例的增强版本，因为它是一个简单但相当典型的数据库驱动型\
  \ Web 应用程序。\n\n你可能还记得，第 9 章的示例是一个名为 Ag 的基于 Web 的 RSS 新闻阅读器程序。Ag 允许你通过输入用户名登录，维护\
  \ RSS 新闻源的订阅列表，获取订阅的新闻条目，并查看每个新闻源的标题。\n\n出于本案例研究的目的，我们为 Ag 添加了一个新的首页。这个新首页显示来自所有用户的最新新闻源条目，并允许访问者按时间倒序或按每条新闻的点击次数来查看条目。有了这个新首页，Ag\
  \ 与流行的社区新闻源聚合网站 JavaBlogs.com (http://javablogs.com) 和 ASP.NET 的 Weblogs (http://weblogs.asp.net)\
  \ 非常相似。\n\n图 13-5 显示了新首页的屏幕截图。\n\n当少量用户访问新的 Ag 首页时，性能似乎还不错。页面在一秒或更短时间内显示。然而，当你使用\
  \ JMeter 模拟大量用户访问该网站时，性能会下降到不可接受的水平。页面需要 5 到 10 秒才能显示，服务器负载也上升到不可接受的水平（见图 13-6）。\n\
  \n每个页面平均需要 4 秒才能运行。除此之外，在此测试期间，CPU 使用率为 100%。Ag 拖慢了整个服务器。为什么 Ag 的性能如此糟糕？\n\n对于每个传入的请求，Ag\
  \ 必须获取一个数据库连接，执行一次数据库查询，并将结果渲染为 HTML。如何减少每个请求的工作量？让我们从应用数据库连接池开始。\n\n![Image 180](img/index-563_1.png)\n\
  \n![Image 181](img/index-563_2.png)\n\n513-0 ch13.qxd 11/16/05 12:07 PM 第 530 页\n\
  \n**530**\n\n第 13 章 ■ 提升 Web 应用程序的性能和可扩展性\n\n**图 13-5.** *第 9 章中新闻阅读器应用程序的首页*\n\n\
  **图 13-6.** *JMeter 显示了新闻阅读器应用程序在负载下的糟糕性能。*\n\n513-0 ch13.qxd 11/16/05 12:07 PM\
  \ 第 531 页\n\n第 13 章 ■ 提升 Web 应用程序的性能和可扩展性\n\n**531**\n\n**应用数据库连接池**\n\n数据库连接池应该有助于提高性能，因为它将消除打开和关闭数据库连接所带来的开销。当应用程序需要数据库连接时，它将从已打开的数据库连接池中获取一个连接。\n\
  \n那么，如何将数据库连接池应用到 Ag 应用程序中呢？\n\n事实证明，由于 Ag 使用 Hibernate 进行所有数据库访问，Ag 已经在使用数据库连接池了。Hibernate\
  \ 内置了连接池。Hibernate 连接池在 Hibernate 配置文件 `hibernate.properties` 中配置，你可以在其中指定应用程序的数据库连接参数。以下是\
  \ Ag 应用程序的 Hibernate 配置文件：\n\nhibernate.connection.driver_class=org.hsqldb.jdbcDriver\
  \ hibernate.connection.url=jdbc:hsqldb:hsql://localhost\n\nhibernate.connection.username=sa\n\
  \nhibernate.connection.password=\n\nhibernate.connection.pool_size=30\n\nhibernate.statement_cache.size=6\n\
  \nhibernate.dialect=net.sf.hibernate.dialect.HSQLDialect\n\n毫无疑问，Hibernate 内置的连接池很方便，但它并不总是正确的答案。你的应用程序服务器管理员可能更希望你配置应用程序以使用应用程序服务器或\
  \ JDBC 驱动程序的数据库连接池功能。那么，该怎么做呢？\n\n如果你使用 Hibernate，你需要在 Hibernate 配置文件中指定由应用程序服务器管理员提供的\
  \ JNDI 数据源名称。你还必须指定数据库方言。以下示例配置用于访问绑定到 JNDI 名称 `java:comp/env/jdbc/oracle` 的 Oracle\
  \ 数据源。无需指定 JDBC 驱动类、连接 URL 或其他任何内容，因为这些已由你的服务器管理员在配置数据源时指定。有关数据源使用和配置的更多信息，请参见第\
  \ 9 章中的“在 Web 应用程序中获取 JDBC 连接”一节。\n\nhibernate.connection.datasource=java:comp/env/jdbc/oracle\
  \ hibernate.dialect=net.sf.hibernate.dialect.Oracle9Dialect 添加数据库连接池对你没有任何好处，因为你已经在使用它了，所以让我们继续应用页面缓存。\n\
  \n**应用页面缓存**\n\n新的 Ag 首页由 JSP 文件 `main.jsp` 渲染，因此你将在此处添加缓存。你将使用本章前面讨论过的 OSCache\
  \ JSP 标签。\n\n你的应用程序的 `WEB-INF\\lib` 目录中已经有 OSCache JAR 文件，`WEB-INF\\classes` 目录中也有\
  \ `oscache.properties` 文件，因此你只需将 OSCache JSP 标签库声明添加到 `main.jsp` 的顶部，并将 OSCache\
  \ 标签包裹在你希望缓存的那部分页面周围。清单 13-5 显示了添加了新的 OSCache 代码后的 `main.jsp` 代码。\n\n513-0 ch13.qxd\
  \ 11/16/05 12:07 PM 第 532 页\n\n**532**\n\n第 13 章 ■ 提升 Web 应用程序的性能和可扩展性\n\n**清单 13-5.**\
  \ *main.jsp*\n\n<%@ page language=\"java\" %>\n\n<%@ taglib uri=\"/WEB-INF/c-rt.tld\"\
  \ prefix=\"c\" %>\n\n<%@ taglib uri=\"/WEB-INF/oscache.tld\" prefix=\"os\"%>\n\n\
  <!DOCTYPE HTML PUBLIC \"-//w3c//dtd html 4.0 transitional//en\"><html>\n\n<head>\n\
  \n<style type=\"text/css\"><jsp:include page=\"/ag.jsp\" /></style>\n\n<title>Ag\
  \ - RSS 新闻阅读器和聚合器</title>\n\n</head>\n\n<body bgcolor=\"#FFFFFF\">\n\n<h1>Ag - RSS\
  \ 新闻阅读器和聚合器</h1>\n\n<hr />\n\n<p>以下聚合了所有用户订阅的新闻条目。</p>\n\n<p>您可以登录 <a href=\"subs\"\
  >管理您的订阅</a>。</p>\n\n<os:cache time=\"3600\" key=\"${param.mode}\">\n\n<c:choose>\n\
  \n<c:when test=\"${param.mode == 'popular'}\" >\n\n<h2>最受欢迎的新闻源条目</h2>\n\n视图：热门\
  \ | <a href=\"main?mode=recent\">最近</a>\n\n<c:set var=\"items\" value=\"${ag.popularItems}\"\
  \ />\n\n</c:when>\n\n<c:otherwise>\n\n<h2>最近的新闻源条目</h2>\n\n视图：<a href=\"main?mode=popular\"\
  >热门</a> | 最近\n\n<c:set var=\"items\" value=\"${ag.recentItems}\" />\n\n</c:otherwise>\n\
  \n</c:choose>\n\n<c:forEach var=\"item\" items=\"${items}\">\n\n<c:url var=\"url\"\
  \ value=\"/ag/link\">\n\n<c:param name=\"link\" value=\"${item.link}\"/>\n\n</c:url>\n\
  \n<h3><a href=\"${url}\">${item.title}</a></h3> ${item.description} <br />\n\n<b>发布时间：${item.time}，点击量：${item.hits}</b>\n\
  \n</c:forEach>\n\n</os:cache>\n\n<hr />\n\n</body>\n\n</html>\n\n![Image 182](img/index-566_1.png)\n\
  \n513-0 ch13.qxd 11/16/05 12:07 PM 第 533 页\n\n第 13 章 ■ 提升 Web 应用程序的性能和可扩展性\n\n**533**\n\
  \nOSCache 标签被添加在负责获取要显示的条目以及显示这些条目的页面部分周围。让我们关注一下 OSCache 标签：\n\n<os:cache time=\"\
  3600\" key=\"${mode.param}\"> . . .\n\n</os:cache>\n\n\n\n缓存时间设置为 3600 秒，即 1 小时。这意味着主页将每小时刷新一次新数据。缓存键设置为使用请求参数`mode`，因为页面有两种操作模式。在“热门”模式下，页面优先显示点击量最高的项目。在“最新”模式下，页面优先显示最近的项目。通过将参数值作为缓存键，可以确保页面的两个版本都被缓存。\n\
  \n现在，你已经对页面应用了页面缓存，接下来将重新运行完全相同的 JMeter 测试。\n\n结果如图 13-7 所示，性能有了显著提升。页面现在运行速度提高了\
  \ 10 倍，平均响应时间从 4 秒降至 0.391 秒。测试期间，服务器 CPU 占用率从 100%降至约 5%。\n\n**图 13-7.** *通过使用缓存，新闻阅读器应用程序运行速度显著提升。*\n\
  \n**总结**\n\n在本章中，我们介绍了多种提升 JSP 应用程序性能的技术。我们讨论了如何使用 OSCache 页面缓存系统来避免为每个页面请求重新生成页面。考虑到数据库连接是一种消耗处理时间、内存和网络资源的昂贵操作，我们探讨了使用连接池来最小化\
  \ JSP 应用程序中该操作成本的方法。\n\n性能和可扩展性是任何 JSP 应用程序的首要关注点。当 JSP 应用程序部署到企业内网或互联网后，其受欢迎程度可能超出最初的预期。如果应用本章讨论的设计实践，你将更有把握满足客户的性能需求，并在用户群扩大时持续满足这些需求。我们向你展示了一个具体的性能测试工具——Apache\
  \ JMeter，你可以在开发过程中使用它来验证性能和可扩展性需求是否得到满足。\n\n在后续章节阅读关于 JSP 应用程序框架的内容时，请牢记你学到的关于性能和可扩展性设计的内容。\n\
  \n513-0 ch13.qxd 11/16/05 12:07 PM 第 534 页\n\n513-0 ch14.qxd 11/17/05 8:44 PM 第\
  \ 535 页\n\n第 14 章\n\n■ ■ ■\n\nWeb 应用程序设计\n\n与最佳实践\n\n**前**几章涵盖了 JSP 规范提供的大量功能。现在，你已经具备了利用这些知识开始构建基于\
  \ Java 的 Web 应用程序的良好基础。那么，为什么还需要阅读本章呢？虽然了解类和 API 对于充分利用 JSP 和 Servlet 至关重要，但还有一些其他关键因素能真正帮助你取得成功。本章将整合本书前面介绍的技术，并向你展示如何构建可维护、可扩展的基于\
  \ Java 的 Web 应用程序。\n\n在本章中，你将了解良好设计的重要性，以及它如何帮助你构建高质量、易于维护和未来易于扩展的 Web 应用程序。为此，你将学习一些已被证明有助于实现这些目标的标准架构。延续良好设计的主题，我们将从更底层的角度探讨如何使用设计模式来实现这些架构。具体来说，我们将展示一些构建基于\
  \ Java 的 Web 应用程序的最佳实践是如何被记录为模式的，并解释如何将它们应用到你自己的 Web 应用程序中。\n\n当然，拥有良好的设计至关重要，但这并不意味着可以忽视\
  \ Web 应用程序的实际实现工作。因此，我们将介绍一些开发和测试的最佳实践。内容涵盖从日志记录和调试的使用，到如何实际测试 Web 应用程序并使其具备可测试性。最后，我们将讨论一些通用指南，包括如何增强用户在使用你的\
  \ Web 应用程序时的体验等主题。到本章结束时，你将能够以更有条理的方式运用已有的知识，从而构建出更好的 Web 应用程序。\n\n**设计的重要性**\n\n\
  当我们谈论**设计**时，无论它是在软件工程还是其他领域的语境下，本质上我们指的是在创建某物之前所进行的思考过程。这种前置思考有助于我们找到实现最终目标的最佳途径。例如，你通常不会在未考虑水管、电源插座、窗户、门等物品位置的情况下，就直接去建造一个新厨房。虽然你可以直接动手建造厨房，但如果没有一些前置思考，你可能无法得出最佳方案。这一点同样适用于软件。你可以直接投入开发，但确实需要一些预先规划。\n\
  \n软件行业常被比作许多其他形式的行业，不过最广为人知的类比可能是建筑业。虽然这种比较在许多层面上都成立，但制作软件和建造建筑之间存在几个关键差异。建筑是为特定目的而设计的，并且必须设计成能够承受环境造成的已知公差。而软件则更具动态性。毕竟，总的来说，目前软件开发并不像建造房屋那样精确。这并不是说它不应该如此——只是这个行业尚未达到那个阶段。你上次看到没有缺陷的软件是什么时候？这里要指出的另一点是，软件在其生命周期中通常会发生变化。有时这些变化只是简单的缺陷修复；但更多时候，它们是重大的功能变更或新增。正是软件行业的这一特性使得设计变得重要。为了量化设计的重要性，让我们看看它能够直接影响的一些特性。\n\
  \n**可维护性**\n\n**可维护性**是指维护一个软件的能力。它在多个层面上发挥作用。在最基本的层面上，可维护性涉及保持该特定软件正常运行所需的工作（清理日志、归档旧数据等）。在另一个层面上，维护应用程序可以包括修复报告的缺陷，以及进行性能优化以应对业务日益增长的需求。可维护性虽然不易衡量，但它与软件设计和实现的好坏程度相关。设计良好的软件更容易让任何维护它的人理解，并且这些人可以在确信不会破坏不相关功能的前提下进行所需的小改动。而对于设计糟糕的软件，情况则截然不同。\n\
  \n**可扩展性**\n\n\n\n系统设计影响的另一个方面是**可扩展性**，即扩展和增强软件的能力。同样，设计良好的软件通常具有明确的结构，以便能够轻松修改现有功能并添加新功能，而不会对系统的其余部分产生副作用。特别是对于关键任务型业务系统，可扩展性非常重要，因为它允许软件以最低的成本和开销来跟上其所实现的业务流程。\n\
  \n**Web 应用程序架构**\n\n既然您已经理解设计——即使只是少量设计——的重要性，那么让我们来看看两种常见且经过验证的、基于 Java 的 Web 应用程序架构。\n\
  \n513-0 ch14.qxd 11/17/05 8:44 PM 第 537 页\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\n**537**\n\
  \n**以页面为中心（模型 1）**\n\n构建 Web 应用程序的第一种常见架构是**以页面为中心**，在 Java Web 应用程序圈子中，它更常被称为**模型\
  \ 1 架构**（见图 14-1）。我们在本书中多次提到过这种架构。这种架构提供了构建 Web 应用程序最简单的方法。它只是将应用程序构建为一组 JSP 页面。\n\
  \n**图 14-1.** *在模型 1 架构中，所有请求都在应用程序的单个层中处理。*\n\n*例如，所有显示逻辑、业务逻辑和数据都包含在 JSP 页面中。*\n\
  \n当然，应用程序通常是为了与用户共享信息（通常来自某种数据库）而构建的，而在以页面为中心的应用程序中，信息通常以几种方式表示。\n\n第一种方式是，页面所需的任何信息都通过使用嵌入式结构化查询语言（SQL）语句直接从数据库访问。通常，这些\
  \ SQL 代码与建立数据库连接和检索结果的代码一起直接写入页面。作为这种模式的一种变体，处理数据库连接的代码通常被推送到可重用的 Java 类或自定义标签（例如\
  \ JSTL 中的标签）中。在各种构建 Web 应用程序的方法中，这可能是最不可维护的，因为所有访问数据的逻辑都嵌入在 JSP 页面内部。对数据库模式的任何更改都意味着可能需要打开应用程序中的每个页面进行修复。\n\
  \n在以页面为中心的应用程序中访问数据的另一种机制是使用 JavaBean 来表示系统中的持久化实体。例如，您可能有一个名为 `Customer` 的 JavaBean\
  \ 来表示系统中的客户。通过采用这种方法，数据访问代码被从各个页面中分离出来，并可以推回到可重用的 Java 类中（见图 14-2）。您可以立即在整个应用程序中获得更高程度的代码重用，同时提高应用程序的可维护性。例如，当数据访问被移到一个单独的层时，对数据库模式的更改只需要修改少数几个\
  \ Java 类。\n\n513-0 ch14.qxd 11/17/05 8:44 PM 第 538 页\n\n**538**\n\n第 14 章 ■ WEB\
  \ 应用程序设计与最佳实践\n\n**图 14-2.** *即使是对应用程序进行简单的更改，例如将数据访问移到一个单独的层，也可以提高应用程序的可重用性和可维护性。*\n\
  \n因此，尽管您可以采取措施来提高以页面为中心的应用程序的可维护性，但真正的限制在于您更改或修改系统提供的端到端功能的能力。在以页面为中心的应用程序中，用户看到的页面都是作为独立的\
  \ JSP 实现的。实际上，您也可以使用 Servlet，但原理是相同的：以这种方式构建应用程序存在局限性。如果您想为每个页面添加一些功能（例如日志记录），您必须打开每个页面并进行编辑。想要在应用程序中添加新的功能流程？您很可能需要打开大量页面来编辑链接，并确保所需的数据对页面可用。主要问题在于应用程序的页面承担了过多的职责。它们包含了收集适当信息（并对这些信息进行更改）的业务逻辑，以及向用户显示这些信息的表示逻辑。理想情况下，对业务逻辑的更改应该独立于表示逻辑，反之亦然。\n\
  \n**模型-视图-控制器（模型 2）**\n\n用于构建 Web 应用程序的另一种主要架构基于经典的**模型-视图-控制器（MVC）**架构，有时也被称为**模型\
  \ 2**。在以页面为中心的 Web 应用程序中，单个请求通常由包含业务逻辑和表示逻辑的单个页面处理。然而，MVC 在处理请求时使用了三个主要组件，如图 14-3\
  \ 所示。\n\n第一个是**控制器**，所有请求都通过它进行路由以得到处理。它充当 Web 应用程序所提供功能的网关，通常作为 Java Servlet 实现。为系统中的所有请求设置一个单一的访问点有几个好处。首先，它为系统级方面（如安全性、日志记录等）提供了一个公共位置。其次，控制器负责查找并执行业务逻辑，这些逻辑将用于处理请求。这个职责范围可以从简单地定位要显示的信息，到处理更新请求并修改数据库中存储的数据。关于控制器需要注意的重要一点是，它与向用户呈现信息无关。\n\
  \n513-0 ch14.qxd 11/17/05 8:44 PM 第 539 页\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\n**539**\n\
  \n**图 14-3.** *在 MVC 应用程序中，不同的层处理显示逻辑（视图）、数据访问（模型）以及业务逻辑（控制器和模型）。*\n\nMVC 架构使用的下一个组件或组件集代表**模型**。对于模型组件，有几种广泛接受的定义，但我们倾向于将它们视为控制器用来执行其处理的信息。换句话说，控制器包含业务逻辑，而模型代表该逻辑所操作的业务/领域对象。如果您做过任何\
  \ Swing 编程，可以将模型视为 Swing 模型组件，它们仅提供正在操作和显示的数据的表示。与 Swing 一样，模型组件通常作为 JavaBean 实现。\n\
  \nMVC 架构中的最后一个组件是**视图**组件。它们仅负责向用户呈现信息。由于所有业务逻辑都由控制器执行，视图组件只需将模型提供的信息呈现给用户。因此，视图组件通常使用\
  \ JSP 页面实现，因为这些页面最易于向用户呈现信息（例如，使用 HTML 等标记语言）。\n\n\n\n尽管这种关注点分离的方式看起来确实比简单的以页面为中心的设计要复杂一些，但它使您能够独立地修改这三个组件中的每一个。您可以分别修改数据模式、业务逻辑或表示层。这不仅因为每种特定类型的代码都有集中存放的位置而使得应用程序更易于维护，而且整个系统现在也更具可扩展性。需要添加新的功能流程？只需将逻辑添加到控制器组件中，并添加一个新视图来向用户显示相关信息即可。当然，仍然有可能构建出难以维护的\
  \ MVC Web 应用程序，因此，在设计开发过程中可以使用一系列经过验证的模式。\n\n**设计模式**\n\n对**设计模式**的一个简单描述是：它们是在特定上下文中针对常见问题的可复用解决方案。除此之外，通过其记录方式，模式还提供了一种通用的语言来理解和运用它们。\n\
  \n513-0 ch14.qxd 11/17/05 8:44 PM 第 540 页\n\n**540**\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\
  \n模式真正进入公众视野是在“四人组”（Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides）出版了《设计模式：可复用面向对象软件的基础》（Addison-Wesley，1995\
  \ 年）之后。这本书详细介绍了大量针对结构、行为和创建上下文中常见的、与语言无关的设计问题的可复用解决方案。以这些原始设计模式为基础，许多人扩展了这项工作，为\
  \ Java EE 系统的设计和实现记录了新的模式，其中包括许多与构建基于 Java 的 Web 应用程序相关的模式。\n\n乍一看，模式似乎会使系统的设计复杂化，在某种程度上确实如此。毕竟，当一个类就能解决问题时，为什么要用一组相关的类来实现一个功能呢？嗯，好处体现在多个层面。使用模式及其通用的语言，使我们作为软件开发人员能够轻松地交流应用程序特定部分的工作原理。例如，如果我们有一个负责按需创建其他类型类的类，使用这个模式的通用名称（在这种情况下是“工厂”）就提供了一定程度的共同理解。这很有用，因为它有助于项目团队的其他成员或任何查看代码的人轻松掌握它。\n\
  \n使用模式的能力也有助于确保在应用程序中解决重复出现的问题时具有一定的一致性。这种做法随后促进了代码复用（因此也提高了质量）和可维护性，同样是因为设计更容易理解。此外，由于模式能够为设计引入一定程度的组织结构，因此该设计的可扩展性通常比使用单个类构建相同功能时要大。\n\
  \n**Java EE 模式与 Web 应用程序**\n\n**组件**\n\n迄今为止最著名的 Java EE 模式集合可能是 Sun Java Center\
  \ 在 http://java.sun.com/blueprints/corej2eepatterns 上编录的那些。该目录中包含的模式涵盖了 Java EE\
  \ 5 架构的所有层，如果您正在构建多层企业应用程序，它们非常值得一看。就本章而言，您只对与构建 Java EE 应用程序的 Web 层相关的那些模式感兴趣。让我们来看看其中的一些模式，看看它们如何帮助您构建设计良好的\
  \ Web 应用程序。\n\n**前端控制器**\n\n正如您在 MVC 架构的讨论中所了解到的，控制器组件充当 Web 应用程序的网关，是所有请求得到服务的中心位置。就其本身而言，MVC\
  \ 架构是与编程语言无关的，在将其转化为基于 Java 的 Web 应用程序世界时，Sun Java Center 提出了**前端控制器**模式，这是 MVC\
  \ 中控制器的 Java EE 特定版本。\n\n清单 14-1 展示了此模式的一个原型实现。\n\n513-0 ch14.qxd 11/17/05 8:44\
  \ PM 第 541 页\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\n**541**\n\n**清单 14-1.** *FrontController.java*\n\
  \n```java\npackage com.apress.projsp;\n\nimport java.io.IOException;\n\nimport javax.servlet.RequestDispatcher;\n\
  \nimport javax.servlet.ServletException;\n\nimport javax.servlet.http.*;\n\npublic\
  \ class FrontController extends HttpServlet {\n\n    protected void processRequest(HttpServletRequest\
  \ request, HttpServletResponse response)\n            throws ServletException, IOException\
  \ {\n\n        // 步骤 1 – 执行业务逻辑并操作模型\n        // someObject.someBusinessLogic();\n\
  \n        // 步骤 2 – 分派到适当的视图组件\n        RequestDispatcher dispatcher =\n       \
  \         getServletContext().\n                getRequestDispatcher(\"视图组件的名称\"\
  );\n        dispatcher.forward(request, response);\n    }\n\n    protected void\
  \ doGet(HttpServletRequest req, HttpServletResponse res)\n            throws ServletException,\
  \ IOException {\n        processRequest(req, res);\n    }\n\n    protected void\
  \ doPost(HttpServletRequest req, HttpServletResponse res)\n            throws ServletException,\
  \ IOException {\n        processRequest(req, res);\n    }\n}\n```\n\n正如这个示例实现所示，前端控制器可以简单到只是一个响应\
  \ HTTP GET 和 POST 请求的 Servlet。尽管代码实际上没有显示任何被调用的真实业务逻辑，但它确实展示了处理请求的步骤。首先，通过执行一些业务逻辑来处理请求，然后重定向到或分派到将向用户呈现信息的视图组件。此实现的主要问题是，如果应用程序的所有业务逻辑都封装在一个单一的控制器中，那么该控制器很快就会变得臃肿并承担大量职责。为了克服这个问题，您可以使用命令与控制器策略。\n\
  \n命令与控制器策略\n\n实现前端控制器模式的方法有很多种，每种方法都称为一种**策略**。例如，在前面的示例中，前端控制器是作为 Java Servlet\
  \ 实现的，尽管这并不妨碍该实现可以是一个 JSP 页面。为了克服控制器因包含特定系统的所有应用程序逻辑而变得臃肿的问题，命令与控制器策略将控制器 Servlet\
  \ 与实现**命令**设计模式的类结合起来。（命令模式是一种更通用的面向对象设计模式。）本质上，命令模式指出，执行特定任务所需的逻辑被封装到一个具有标准接口的单个类中，以执行该代码。例如，您可以将查找客户详细信息的逻辑封装到一个单独的类中，放在一个名为\
  \ `execute()` 的方法内。首先，您可以为前端控制器将要使用的所有命令定义一个标准接口。清单 14-2 展示了一个实现此功能的接口。\n\n**清单\
  \ 14-2.** *Action.java*\n\n```java\npackage com.apress.projsp;\n\nimport javax.servlet.ServletException;\n\
  \nimport javax.servlet.http.HttpServletRequest;\n\nimport javax.servlet.http.HttpServletResponse;\n\
  \npublic interface Action {\n\n    public String execute(HttpServletRequest request,\n\
  \                          HttpServletResponse response)\n            throws ServletException;\n\
  }\n```\n\n\n\n该接口包含一个单一方法，用于执行将封装在该接口具体实现中的逻辑。本质上，您要做的就是将请求的处理委托给一个 Action 实例，而不是将该代码放在控制器内部。因此，方法签名被定义为接收与使用\
  \ Servlet 处理 HTTP 请求时相同的 request 和 response 对象引用。通过使用此接口，您可以提供一个实现，该实现根据给定的客户 ID\
  \ 查找该客户，并将相应的领域对象放入 HTTP 请求中，以供视图组件显示（参见清单 14-3）。\n\n**清单 14-3.** *ViewCustomerAction.java*\n\
  \npackage com.apress.projsp;\n\nimport javax.servlet.http.HttpServletRequest;\n\n\
  import javax.servlet.http.HttpServletResponse;\n\nimport javax.servlet.ServletException;\n\
  \npublic class ViewCustomerAction implements Action {\n\npublic String execute(HttpServletRequest\
  \ request,\n\nHttpServletResponse response)\n\nthrows ServletException {\n\nString\
  \ id = request.getParameter(\"id\");\n\nCustomer customer = CustomerFactory.getInstance().getCustomer(id);\
  \ request.setAttribute(\"customer\", customer);\n\nreturn \"/view-customer.jsp\"\
  ;\n\n}\n\n}\n\n假设所有必要的客户查找代码都已编写完成，当找到一个 Customer 实例时，您可以使用 request 对象作为一个区域，通过\
  \ `setAttribute()` 方法放置在此请求生命周期内相关的任何对象。关于此实现最后需要注意的一点是，`execute()` 方法返回的值是代表视图组件的\
  \ JSP 页面的名称。换句话说，这就是\n\n513-0 ch14.qxd 11/17/05 8:44 PM 第 543 页\n\n第 14 章 ■ WEB\
  \ 应用程序设计与最佳实践\n\n**543**\n\n将用于渲染或向用户呈现信息的 JSP 页面的名称。\n\n当所有业务逻辑都封装在 Action 实例中后，前端控制器本身变得非常小巧，因此内聚性更强，如清单\
  \ 14-4 所示。\n\n**清单 14-4.** *FrontController.java*\n\npackage com.apress.projsp;\n\
  \nimport java.io.IOException;\n\nimport javax.servlet.http.*;\n\nimport javax.servlet.ServletException;\n\
  \nimport javax.servlet.RequestDispatcher;\n\npublic class FrontController extends\
  \ HttpServlet {\n\nprivate ActionFactory actionFactory = new ActionFactory(); protected\
  \ void processRequest(HttpServletRequest request, HttpServletResponse response)\n\
  \nthrows ServletException, IOException {\n\nAction action;\n\ntry {\n\naction =\
  \ actionFactory.getAction(request);\n\n} catch (ActionNotFoundException anfe) {\n\
  \nthrow new ServletException(anfe);\n\n}\n\n// 现在处理 action，找出接下来要向用户显示的视图 String\
  \ nextView = action.execute(request, response);\n\n// 最后重定向到适当的视图，\n\n// 记得添加路径前缀\n\
  \ntry {\n\nif (nextView != null) {\n\nRequestDispatcher dispatcher =\n\ngetServletContext().getRequestDispatcher(nextView);\n\
  \ndispatcher.forward(request, response);\n\n}\n\n} catch (Exception e) {\n\ne.printStackTrace();\n\
  \nthrow new ServletException(e);\n\n}\n\n}\n\nprotected void doGet(HttpServletRequest\
  \ req, HttpServletResponse res) throws ServletException, IOException {\n\nprocessRequest(req,\
  \ res);\n\n}\n\nprotected void doPost(HttpServletRequest req, HttpServletResponse\
  \ res) throws ServletException, IOException {\n\nprocessRequest(req, res);\n\n}\n\
  \n}\n\n513-0 ch14.qxd 11/17/05 8:44 PM 第 544 页\n\n**544**\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\
  \n在这个版本的前端控制器中，您只是使用一个辅助类来查找应该使用哪个 Action 实现来处理这个特定的请求。控制器如何知道使用哪个 action？嗯，有多种方式可以将\
  \ action 的名称传递给控制器。这些方式包括在查询字符串中使用命名参数，以及在特殊映射的 URL 中编码 action 的名称。一个示例如下：\n\nhttp://www.mycompany.com/controller/ViewCustomer?id=123456\n\
  \n使用命令和控制器策略的主要好处是，它允许您维护一个接受请求的中心位置，同时将实际处理单个请求的逻辑与处理其他类型请求所需的逻辑分离开来。\n\n视图组件\n\
  \n在我们继续讨论其他模式之前，我们需要花一点时间讨论 Java EE 模式中的**视图组件**。当控制器负责与处理请求相关的业务逻辑时，您可能会问如何实现视图组件。在最简单的情况下，视图被实现为由控制器组件转发的\
  \ JSP 页面。控制器（或者如果您使用该策略，则是 action 类）的工作是执行任何处理并为视图呈现信息设置环境。在第 9 章中，您看到 JSP 页面完全可以包含数据库代码，以便它们能够找到应该显示的数据。然而，MVC\
  \ 架构颠覆了这一点，因为现在查找数据是控制器的责任。正如您在前面的示例 action 实现中看到的，可以使用 request 对象来存储当前请求生命周期内所需的信息：request.setAttribute(\"\
  customer\", customer);\n\n在这里，您只是将一个 Customer 实例放入由 request 维护的对象映射中。当从视图呈现信息时，您可以使用\
  \ JSP EL 来定位该 Customer 实例并显示它。例如，您可以使用以下表达式来显示客户的名称（假设存在一个名为 getName() 的方法）：${customer.name}\n\
  \n这种业务逻辑和表示逻辑的分离使您能够在必要时轻松地独立更改其中之一。如果您需要更改向用户呈现客户信息的方式，这没有问题。您可以只修改 JSP 页面，而不会破坏查找该客户的现有业务逻辑。\n\
  \n**视图助手**\n\n尽管前端控制器负责（可能通过委托给命令）执行为处理给定请求所需的业务逻辑，但通常仍然存在仅与该信息表示相关的逻辑。像 JSP 页面这样的视图组件非常擅长显示信息，但有时还需要一些额外的代码。也许对象列表在显示之前需要排序，或者信息需要以某种特定方式格式化。虽然这些代码可以简单地嵌入到视图组件中，但**视图助手**模式描述了一种封装这些代码并使其在多个视图中可重用的方法。\n\
  \n您已经看到了许多视图助手的例子。回顾第 7 章，您看到的一个标签过滤了电子邮件地址的域名，使垃圾邮件发送者更难获取地址。虽然非常有用，但这种逻辑实际上并不属于业务逻辑。\n\
  \n相反，这是表示逻辑——帮助视图向用户呈现信息的代码。当然，这样的代码可以编写并嵌入到 JSP 页面中，但出于质量、可维护性等原因，这被认为是不良实践。相反，该代码被封装在一个自定义标签中，以便可以在\
  \ Web 应用程序的各个页面中使用和重用。实际上，这个自定义标签就是视图助手模式的一个实现。在这种情况下，标签是视图用来帮助其执行任务的组件。\n\n**服务到工作者**\n\
  \n\n\n到目前为止，我们介绍的每种模式都解决了 Web 应用程序设计中的不同问题。前端控制器为请求提供了单一访问点以集中业务逻辑，而视图和视图助手则将信息呈现过程与信息查找和操作过程分离开来。为了将这些模式整合在一起，Java\
  \ EE 模式目录定义了一个名为“服务到工作者”的宏模式，如图 14-4 所示。所谓“宏模式”，是指它实际上只是其他模式的组合——在本例中，即前端控制器、视图和视图助手。\n\
  \n**图 14-4.** *“服务到工作者”模式是其他模式的组合。*\n\n将这些模式整合在一起是扩展 MVC 架构的基础，并为 Web 应用程序的设计和易于理解提供了共同基础。它还有助于强调各个模式的优势，并表明如果将它们结合使用，会更加有用。稍后您将看到，“服务到工作者”模式构成了当前许多\
  \ Web 应用程序框架的基础。\n\n513-0 ch14.qxd 11/17/05 8:44 PM 第 546 页\n\n**546**\n\n第 14 章\
  \ ■ Web 应用程序设计与最佳实践\n\n**过滤器**\n\n另一个有用但未被广泛使用的模式值得简要提及，它被称为**过滤器**。\n\n您在之前章节中看到的过滤器\
  \ API 就是此模式的一种实现，因此，我们不再探讨如何实现过滤器，而是看看它如何在 Web 应用程序设计中使用，并讨论一些更典型的用途。\n\n过滤器在 Web\
  \ 应用程序设计中可以发挥重要作用，因为它们可以承担与任何特定 JSP 或 Servlet 无关的职责。过滤器可以被视为所有请求和响应都可以通过的通道。\n\n\
  我在 Web 应用程序中使用过滤器的一种方式是解释用户友好的 URL。为了帮助我保持网站更新，我构建了一些网络日志软件——一个简单的基于日期的内容管理系统，我每天在上面发布简短条目。然后，网络日志（缩写为“博客”）会在首页按日期倒序显示最新的条目。此外，当读者想要查找更早的条目时，他们可以直接跳转到包含某一天所有条目的页面。过去，这类网站由静态页面构建，其组织方式便于查找特定日期的页面。例如，2003\
  \ 年 6 月 10 日的博客条目可以在 http://www.simongbrown.com/blog/2003/06/10.html 找到。\n\n由于 JSP\
  \ 和 Servlet 等技术比编写静态页面有更多优势，我决定将我的网络日志编写为基于 Java 的 Web 应用程序。所有条目都单独存储在文件系统中，并借助前端控制器模式，使用几个\
  \ JSP 页面将各个条目组装成一个页面呈现给用户。然而，我没有向用户显示诸如 http://www.simongbrown.com/blog/servlet/ViewDailyBlog?year=2003&month=6&day=10\
  \ 这样的 URL，而是决定让之前显示的 URL 仍然有效。为了实现这一点，我使用了过滤器。\n\n因为可以设置过滤器来查看发送到 Web 应用程序的所有传入请求，所以过滤器需要做的就是查找匹配\
  \ yyyy/mm/dd.html 的请求，并通过前端控制器将请求转发到相应的操作。过滤器用于通过用户友好的 URL 捕获这些看似静态内容的请求，并将这些请求转换为通过前端控制器对内容的动态请求。这是过滤器模式的一个简单而强大的实现，它对传入请求执行过滤。\n\
  \n过滤器也可以用于传出的响应。一个经常被引用的例子是，在处理完请求后，使用压缩技术压缩传出流，以尝试更有效地利用可用带宽。另一个例子是突出显示页面中搜索词用法的过滤器。通过\
  \ Servlet API 提供的接口，可以找到用户访问您网站时来自的完整 URL。例如，有人可能会点击 Google 中的链接来到您的网站。利用这些信息，您可以编写一个过滤器来检查来自\
  \ Google 的引荐，并在响应随后发送回用户之前突出显示所使用的搜索词的出现。同样，这是您可以使用过滤器来增强用户对 Web 应用程序体验的另一种方式。\n\
  \n**其他 Web 应用程序模式**\n\n除了我们刚刚介绍的 Java EE 模式之外，还有其他模式或最佳实践可以帮助您构建 Web 应用程序。此外，JSP\
  \ 2.1 提供了一种更好且通常更简单的方法来实现其中一些模式，我们将在本节中描述。\n\n513-0 ch14.qxd 11/17/05 8:44 PM 第\
  \ 547 页\n\n第 14 章 ■ Web 应用程序设计与最佳实践\n\n**547**\n\n包含标准页眉和页脚\n\n在构建基于 JSP 的 Web 应用程序时，最常用的最佳实践之一可能是将页眉和页脚中使用的公共代码分离到\
  \ JSP 页面或片段中，并在必要时包含它们。此类文件可能包括所有用于定义格式良好的 HTML 页眉的 HTML 标签、用于导入公共标签库的 <%@ taglib\
  \ %> 指令、定义要在页面中使用的对象等。无论您要实现什么目标，通常都会通过使用 JSP include 指令在每个页面上静态包含页眉来实现此实践：\n\n\
  <%@ include file=\"header.jspf\" %>\n\n在将 JSP 转换为 Servlet 时，JSP 编译器会将包含的文件内联到生成的\
  \ Servlet 类的源代码中。这是使某些内容可重用的有用方法，尽管它确实依赖于页面作者记住在可能的地方包含页眉。此外，Web 应用程序的不同部分通常需要不同的页眉。例如，当\
  \ JSP 页面来自站点的安全部分时，您可能会包含一个不同的文件。\n\n为了解决这个问题，JSP 和 Servlet 新规范背后的团队提出了**前奏**和**尾声**的概念。基本思想是，对于任何一组一个或多个\
  \ JSP 页面，都可以定义一个或多个前奏或尾声。前奏是在匹配给定 URL 模式的 JSP 页面的主体之前包含的文件；尾声是在这些 JSP 页面的主体之后包含的文件。因此，您无需在每个页面上包含页眉和页脚，而是可以通过在\
  \ web.xml 部署描述符中使用以下片段来实现相同的结果：\n\n<jsp-property-group>\n\n<url-pattern>*.jsp</url-pattern>\n\
  \n<include-prelude>/header.jspf</include-prelude>\n\n<include-coda>/footer.jspf</include-coda>\n\
  \n</jsp-property-group>\n\n这是进一步提高 Web 应用程序可维护性并减少其中重复内容量的好方法。\n\n模板化\n\n模板化是 Web\
  \ 应用程序中另一种常见的实现技术。**模板**是一个预定义的骨架，您可以在运行时通过使用参数对其进行自定义。回顾第 6 章，用于演示标签文件的一个示例是一个在主页上包含多个促销通知的网页。虽然每个标签中包含的内容不同，但构建它们的实际结构和代码是相同的。这些实际上就是被使用和自定义的模板。\n\
  \n在引入标签文件之前，使用 JSP 实现模板化相当困难。\n\n\n\n由于缺乏表达模板定制方式的简便方法，过去曾有一些可选方案，例如使用简短的脚本片段甚至自定义标签，来指示动态内容应插入模板主体的位置。然而，这些方法的问题在于，使用它们时往往会在页面中引入一些\
  \ Java 代码。也许需要设置对象，或者需要一些表示逻辑。一旦引入了代码，许多人就不再称那些页面为模板了。毕竟，你不再仅仅是指示动态内容应插入何处，而是基本上完全控制了模板的工作方式。另一种选择是使用特定的模板框架，例如\
  \ Velocity（将在接下来的“构建 Web 应用程序的框架”部分讨论）。\n\n随着 JSP 2.0 中 EL（表达式语言）的引入，开发者获得了执行模板化的能力。由于\
  \ EL 是 JSP 规范的一个组成部分，现在构建模板要容易得多。只需在 JSP 文件中编写静态内容，然后在需要插入动态内容的地方插入 EL 表达式即可。这些表达式本身功能相当强大，同时仍然足够简单易懂，并且不会暴露模板的内部工作机制。\n\
  \n**构建 Web 应用程序的框架**\n\n到目前为止，你已经了解了一些经过验证的构建 Web 应用程序的方法，以及许多将这些想法转化为可运行代码的模式。你真的需要在每次构建应用程序时都编写所有这些代码吗？\n\
  \n**定制框架**\n\n通过结合前面讨论的 Java EE 模式的实现，你基本上就拥有了一个用于构建基于 MVC 的 Web 应用程序的定制框架。事实上，我们参与过的许多\
  \ Web 应用程序（无论是开源项目还是为客户开发的）都使用这些简单的实现作为轻量级 MVC 框架的基础，用于处理应用程序中的所有请求。我们信奉“保持简单”的软件设计方法，使用这种轻量级框架有几个好处。该框架易于学习、易于维护，并且在必要时易于扩展，例如处理用户提交的\
  \ HTML 表单中的验证错误。\n\n然而，编写定制框架并不总是最佳选择。这里展示的前端控制器模式的实现相当简单直接，但还可以进行许多改进。例如，包括构建 HTML\
  \ 表单和执行验证的标准方法，用于显示模型信息的更复杂的组件，等等。尽管这类工作并非特别复杂，但却非常耗时。因此，有多个第三方框架可供开发者用作其 Web 应用程序的起点。\n\
  \n**Struts**\n\n来自 Jakarta 项目（http://jakarta.apache.org）的 Struts 是一个开源框架，它不仅提供了前端控制器的实现，还提供了\
  \ MVC 架构的完整实现（或框架）。其关键组件与这里介绍的类似，例如，包括一个控制器 Servlet（称为 ActionServlet）、用于放置处理请求功能的\
  \ Action 类，以及用于封装来自请求的数据的 ActionBean 类。此外，Struts 还包含一个全面的 JSP 标签库集合，用于方便地组装基于 HTML\
  \ 的表单和 JSP 页面。\n\nStruts 最重要的特性之一是，它的几乎所有方面都通过 struts-config.xml 文件进行外部配置。这包括动作名称与\
  \ Action 类之间的映射（称为 ActionMappings），以及一个称为 ActionForwards 的概念。对于清单 14-3 中展示的简单实现，Action\
  \ 类返回一个表示接下来应显示的 JSP 页面 URI 的字符串。然而，在 Struts 中，Action 类返回一个符号名称（封装在 ActionForward\
  \ 实例中），表示接下来应显示哪个视图组件。例如，考虑一个包含用户名和密码的登录表单。提交表单后，登录要么成功，要么失败。在这种情况下，Action 类可以返回诸如\
  \ success 或 failure 之类的符号名称。这些符号名称随后在 struts-config.xml 文件中进行配置，并在此处指定指向相应 JSP 页面的物理\
  \ URI。以下代码片段展示了如何处理登录动作的两种不同流程：\n\n<action path=\"/login\" type=\"com.mycompany.myapp.LoginAction\"\
  >\n\n<forward name=\"success\" path=\"/index.jsp\"/>\n\n<forward name=\"failure\"\
  \ path=\"/login-failed.jsp\"/>\n\n</action>\n\n这里，我们声明登录动作有两种可能的结果。第一种是登录成功，如果是这种情况，用户将被重定向到\
  \ index 页面。或者，登录失败会将用户带到一个解释登录失败的页面。通常，这种逻辑和页面名称必须硬编码到动作中。借助 Struts 及其配置文件，应用程序的流程可以轻松更改，这也是将\
  \ Web 应用程序的流程和结构从代码中分离出来以提高可维护性的另一种方式。毕竟，如果站点结构发生变化，只需更改配置文件即可。你将在下一章更详细地了解 Struts。\n\
  \n**Spring**\n\nSpring 框架（http://www.springframework.org）旨在做到轻量级但功能强大，且易于使用。Spring\
  \ 是一个分层式的 Java EE 应用程序框架，由 Rod Johnson 开发。Spring 拥有许多特性，可以使企业级开发对你来说更加容易。\n\n■**注意**\
  \ 如果你想了解更多关于 Spring 的信息（超出此处简短描述的范围），我们推荐 Rod Johnson 的《Expert One-on-One J2EE Design\
  \ and Development》（Wrox Press, 2002）、Rob Harrop 和 Jan Machacek 的《Pro Spring》（Apress,\
  \ 2005），或 Rod Johnson 等人合著的《Professional Java Development with the Spring Framework》（Wrox\
  \ Press, 2005）。\n\nSpring 可以单独使用，以提供一个完整的企业级应用程序框架。\n\n该框架简化了构建和集成 Web 应用程序的表示层、业务层和数据层所需的工作。尽管\
  \ Spring 足够强大，可以用于企业级应用程序，但它并不强制你使用 Java EE。你可以从普通的 Java 对象（POJO）开发 Spring 组件，并使用\
  \ Spring 轻松地将这些对象集成到一个可运行的应用程序中。你构建的对象可以轻松地在 Java EE 环境中使用，或作为独立应用程序的一部分使用。\n\n\
  另一方面，Spring 也足够灵活，可以与其他框架协同工作以提供企业级解决方案。\n\nSpring 拥有自己的数据抽象层用于数据持久化。但它也可以与其他数据抽象技术集成，例如\
  \ Oracle TopLink、Hibernate 和 Java 数据对象（JDO）。有关这些及其他数据抽象技术的更多信息，请参见第 9 章。\n\nSpring\
  \ 不仅与数据层集成良好，还与表示层的其他技术（如 JSP、Velocity 和 Tiles）集成良好。因此，你可以使用 Spring 开发业务对象，并使用你最喜欢的表示层框架在\
  \ MVC 应用程序中提供视图。\n\n最后，Spring 与其他 MVC 框架（如 Struts、WebWork 或 Tapestry）也能很好地协同工作。\n\
  \n**WebWork**\n\n\n\nWebWork（http://www.opensymphony.com/webwork/）是另一个常与 Struts\
  \ 相提并论的 MVC 框架。它也采用了实现命令模式的类这一概念，不过 Struts 与 WebWork 的关键区别之一在于，WebWork 构建在另一个框架（XWork）之上，而\
  \ XWork 实际上并不与 Web 以及 HTTP 请求和响应等概念绑定。因此，可以在 Web 应用与其他 Java 实现（如 Swing 客户端）之间共享实现。本质上，动作类只是\
  \ JavaBean，在 Web 环境中，参数会被简单地映射到 Bean 的属性上。\n\n在构建视图的用户界面组件、可定制的验证、用于从模型访问信息的表达式语言等方面，WebWork\
  \ 提供了与 Struts 类似的功能。然而，WebWork 不仅仅是 Struts 的翻版，其独特之处在于它并不只依赖 JSP 来构建表示层。视图组件*可以*是\
  \ JSP，但也可以使用其他技术编写，包括 XML 和 Velocity（关于 Velocity 的更多信息，请参见下一节）。\n\nWebWork 的一个独特功能是支持拦截器，可用于在动作调用之前和/或之后执行逻辑。这类似于使用过滤器来拦截传入请求和传出响应的方式。如同面向切面编程（AOP），WebWork\
  \ 的拦截器让你能够在不打开每个动作类并编辑的情况下，将横切关注点插入整个代码库。所谓“横切关注点”，指的是那些并非特定于系统提供的业务功能的逻辑，例如日志记录、安全性、缓存等。通常，业务逻辑可以被视为垂直的，因为在任何应用中，你都会有一组提供业务逻辑的垂直切片。借助拦截器，你可以构建能够跨越所有这些垂直切片工作的代码，并且在\
  \ WebWork 中，你可以声明式地配置这一点。\n\n总而言之，WebWork 是 Struts 的一个更简单（尽管可以说更强大）的替代方案，它提供了一种快速构建基于\
  \ MVC 的 Web 应用的方法。此外，动作类提供的简单接口使得测试 WebWork 动作比测试 Struts 容易得多，无需使用像 Cactus 这样的测试框架。使用\
  \ WebWork 的唯一缺点是，目前其用户社区规模较小，且现成的信息不多。希望这种情况会开始改变。\n\n**Velocity**\n\nVelocity（http://jakarta.apache.org/velocity/）是一个基于\
  \ Java 的模板引擎，为构建 Web 应用的视图组件提供了另一种方式。事实上，Velocity 的能力远不止于此，它还可以在 Web 应用之外使用，例如用于帮助生成报告或\
  \ XML。Velocity 有自己的模板语言（Velocity 模板语言，简称 VTL），它提供了一种访问几乎任何可以通过常规 Java 方法调用访问的内容的方式。在\
  \ Velocity 创建之时，JSP 还没有自己的表达式语言，Velocity 试图填补这一空白，并为开发者提供一种构建真正模板的简便方法。\n\n尽管 JSP\
  \ 现在包含了 EL，但 Velocity 仍拥有大量追随者，并已部署在许多应用中，尤其是 Web 应用。随着像 WebWork 这样的框架提供了与 Velocity\
  \ 的轻松集成，对于严重依赖易于模板化的动态内容的 Web 应用来说，它仍将是一个受欢迎的选择。\n\n**测试**\n\n测试在软件开发生命周期中扮演着重要角色，尽管当时间紧迫、截止日期临近时，测试往往得不到应有的重视。幸运的是，像极限编程（http://www.xprogramming.com/）这样的新开发方法正在大力推广使用\
  \ JUnit 等工具进行自动化测试，其中单元测试实际上是用 Java 编写的。那么，这些原则如何应用于测试 Web 应用，以及你到底可以测试什么呢？Web 应用本质上通常很复杂，这可能导致对究竟可以且应该测试什么产生混淆。从自动化测试的角度来看，通常进行两种类型的测试：单元测试和功能测试。有许多工具可以帮助你执行单元测试和功能测试，例如\
  \ JUnit、JUnitEE、Cactus、TagUnit 和 HttpUnit。在了解了这些工具之后，你将学习如何为测试设计你的 Web 应用，测试策略的指导原则是什么，以及为什么要进行兼容性测试。\n\
  \n**Web 应用的单元测试**\n\n**单元测试** 是从你知道软件如何工作的角度来测试软件的过程。它也被称为**白盒测试**，因为你可以看到软件是如何工作的——你可以看到盒子内部。与此相反的是**黑盒测试**，我们稍后会讨论。\n\
  \n单元测试背后的理念是确保单元内的所有（或大部分）路径都得到充分测试，包括诸如循环和方法调用的边界条件、方法调用的正确和错误（例如，null）参数等。通过这样做，你可以确保被测试的单元是正确的，能够完成其预期功能，并且在接收到它不期望的输入时不会崩溃。\n\
  \n那么，如何将单元测试应用于 Web 应用呢？简单的答案是，你对构成 Web 应用的所有类和组件进行单元测试——从代表业务对象的 JavaBean 到处理请求的\
  \ Servlet。虽然这在理论上听起来不错，但在实践中，由于许多存在于服务器内部的 Java EE 组件所需的支撑基础设施，这很难实现。对于独立的 Java\
  \ 类，使用 JUnit 框架编写自动化单元测试是直接的。通常，此类测试可能会创建被测试类的新实例，调用该实例上的方法，然后对结果进行断言以确保其正确。然而，对于像\
  \ Servlet 和 JSP 页面（它们会被编译成 Servlet）这样的组件，就无法以同样的方式进行测试了。毕竟，这些组件需要在支持这些技术的服务器上下文中执行。本质上，这些组件严重依赖于此类服务器提供的支撑基础设施、基础架构和服务。幸运的是，人们已经意识到了这一点，并提出了一些使此类组件的单元测试更容易的方法。然而，通常会有一个临界点，超过该点单元测试就变得不可行，必须使用其他测试方法。\n\
  \n带着这些想法，让我们继续看看你可以测试什么，以及可以使用的工具。\n\nJUnit\n\n\n\nJUnit（http://www.junit.org）如今已成为\
  \ Java 语言中构建自动化测试的事实标准，广泛应用于从桌面应用程序到企业级分布式服务器等各类项目。JUnit 提供了一个轻量级框架用于编写测试。从高层来看，你只需扩展其中一个提供的类，并编写一个或多个方法来测试目标类（或类集合）的每个方面。编译测试类后，通过\
  \ JUnit 测试运行器之一运行测试，该运行器会统计通过和失败的数量，并在过程结束时输出结果。\n\n清单 14-5 展示了使用 JUnit 编写自动化单元测试的简便性，通过测试一个代表客户且包含两个属性（firstName\
  \ 和 lastName）的简单 JavaBean 来演示。在此示例中，该类还有一个名为 getFullName() 的额外方法，该方法仅将名字和姓氏用空格连接起来。使用\
  \ JUnit，你可以通过设置相应属性并对访问这些属性的结果进行断言，来测试各个 get 方法是否按预期工作。\n\n**清单 14-5.** *CustomerTest.java*\n\
  \nimport junit.framework.TestCase;\n\npublic class CustomerTest extends TestCase\
  \ {\n\npublic void testFirstName() {\n\nCustomer customer = new Customer();\n\n\
  customer.setFirstName(\"Simon\");\n\nassertEquals(\"Simon\", customer.getFirstName());\n\
  \n}\n\npublic void testLastName() {\n\nCustomer customer = new Customer();\n\ncustomer.setLastName(\"\
  Brown\");\n\nassertEquals(\"Brown\", customer.getLastName());\n\n}\n\npublic void\
  \ testFullName() {\n\nCustomer customer = new Customer();\n\ncustomer.setFirstName(\"\
  Simon\");\n\ncustomer.setLastName(\"Brown\");\n\nassertEquals(\"Simon Brown\", customer.getFullName());\n\
  \n}\n\n}\n\n这里你所做的只是扩展 JUnit 提供的其中一个类，并为想要测试的各种功能实现 testXXX() 方法。在这个例子中，你正在测试设置/获取名字、姓氏和全名的能力。当然，这是一个\n\
  \n513-0 ch14.qxd 11/17/05 8:44 PM 第 553 页\n\n第 14 章 ■ 网络应用程序设计与最佳实践\n\n**553**\n\
  \n简单的示例，并未涵盖诸如空值之类的特殊情况。然而，它确实展示了使用 JUnit 编写单元测试是多么容易，并显示了其潜力。\n\n开始使用 JUnit 有时可能会有些棘手，尤其是在最初找到编写测试的动力方面。然而，一旦他们克服了学习曲线并体验到\
  \ JUnit 的好处，大多数人就会上瘾，或者用 JUnit 团队创造的一个术语来说，就是“测试感染”。\n\n第一次看到 JUnit 可能会让人有些畏惧，尤其是当你开始思考需要为你正在构建的每个类编写多少额外的\
  \ Java 代码时。\n\n然而，根据我们使用 JUnit 的经验，我们发现使用 JUnit 一段时间后，你会开始欣赏自动化单元测试的强大功能，以及它在重构或重新设计系统部分时带给你的信心。当你进行重大的设计更改而测试仍然通过时，所获得的信心感是惊人的！\n\
  \n使用 JUnit 时，你可以测试的类类型包括代表业务领域、业务逻辑、MVC 风格的动作类、辅助类等。本质上，任何独立的类都可以使用 JUnit 进行测试。在许多\
  \ Web 应用程序中，这组类将涵盖正在开发的大部分代码，并有望带来对代码正确运行的良好信心。然而，有时你可能有一些独立的类仍然需要在 Java EE 容器环境中运行并进行测试。对于这些情况，JUnitEE\
  \ 就很有用。\n\nJUnitEE\n\nJUnitEE（http://www.junitee.org）提供了一种在 Java EE 容器内运行常规 JUnit\
  \ 测试的方法。为什么要这样做呢？嗯，也许你有一些类需要使用通过容器的 JNDI 树设置并提供给这些类的数据库连接。或者这些类需要访问其他企业资源才能正常运行。使用\
  \ JUnitEE，你可以将所有类及其测试打包成一个 WAR 文件，然后将其部署到诸如 Tomcat 之类的 Java EE Web 容器上。要执行这些测试，你只需将\
  \ Web 浏览器指向新部署的 Web 应用程序，一个 servlet 会在后台运行以执行 JUnit 测试，并将结果呈现给你。\n\nJUnitEE 实际上是一个轻量级的测试运行器，允许你在服务器环境中执行测试。然而，它并不能比\
  \ JUnit 更容易地测试诸如 servlet 和 JSP 之类的组件。为此，你需要考虑其他选项，例如 Cactus。\n\nCactus\n\nCactus（http://jakarta.apache.org/cactus/）是\
  \ JUnit 的一个扩展，提供了一种在运行的 Java EE 容器内运行单元测试的机制。虽然使用 JUnitEE 时你可以在服务器环境中运行常规的 JUnit\
  \ 测试，但你仍然没有完整的必要基础设施来测试那些依赖于逐个请求传递信息的类。例如，要真正测试一个 servlet，你需要有一个实时的请求和响应对象可用，因为\
  \ servlet 内部的代码可能会从请求中提取参数或将信息推送到响应中。Cactus 使你能够测试这些类型的组件，并确信它们在其真实环境中运行。\n\n在 Cactus\
  \ 中，测试功能分为两部分。首先是客户端部分。这看起来就像一个普通的 JUnit 测试，用于启动测试。Cactus 的第二部分位于\n\n513-0 ch14.qxd\
  \ 11/17/05 8:44 PM 第 554 页\n\n**554**\n\n第 14 章 ■ 网络应用程序设计与最佳实践\n\n服务器上。在这里，你可以使用\
  \ Cactus 提供的测试类来实例化你想要测试的组件并调用它们的方法。例如，你可以选择创建一个新的 servlet 类实例并调用 doGet() 方法。当然，要实际调用此方法，你需要访问\
  \ HTTP 请求和响应对象，那么它们从何而来呢？\n\n关键在于一个位于客户端和服务器端测试类之间的测试重定向器组件。当客户端启动测试时，会向 Java EE\
  \ 容器发出一个请求，该请求被一个也必须在服务器上运行的 Cactus 提供的 servlet 拦截。然后，这个 servlet（测试重定向器）确定需要运行哪个服务器端测试，并启动相应的测试类。由于已经向\
  \ Java EE 容器发出了一个实际的 HTTP 请求，Cactus 只需将其封装并传递给服务器端测试类以供其按需使用。代表 HTTP 响应的对象也被封装起来供测试类使用。有了这些访问权限，服务器端测试类和被测试的类就可以提取参数、将输出写入响应等。然后可以断言被测试的类按预期工作，这些断言的结果会传回客户端进行报告。\n\
  \n作为示例，考虑我们在本章前面讨论 MVC 时介绍的 ViewCustomerAction 类。由于此类依赖于服务器获取真实请求，因此它是使用 Cactus\
  \ 进行测试的理想候选。清单 14-6 展示了如何实现这一点。\n\n**清单 14-6.** *ViewCustomerTest.java*\n\nimport\
  \ javax.servlet.ServletException;\n\nimport junit.framework.Test;\n\nimport junit.framework.TestSuite;\n\
  \nimport org.apache.cactus.ServletTestCase;\n\nimport org.apache.cactus.WebRequest;\n\
  \n\n\npublic class ViewCustomerTest extends ServletTestCase {\n\npublic ViewCustomerTest(String\
  \ theName) {\n\nsuper(theName);\n\n}\n\npublic static Test suite() {\n\nreturn new\
  \ TestSuite(ViewCustomerTest.class);\n\n}\n\npublic void beginExecute(WebRequest\
  \ webRequest) {\n\nwebRequest.addParameter(\"id\", \"123\");\n\n}\n\npublic void\
  \ testExecute() {\n\nCustomer customer = CustomerFactory.getInstance().getCustomer(\"\
  123\"); ViewCustomerAction action = new ViewCustomerAction();\n\ntry {\n\naction.execute(this.request,\
  \ this.response);\n\nassertEquals(customer, request.getAttribute(\"customer\"));\n\
  \n} catch (ServletException e) {\n\nfail();\n\n}\n\n}\n\n}\n\n513-0 ch14.qxd 11/17/05\
  \ 8:44 PM Page 555\n\n第 14 章 ■ 网络应用程序设计与最佳实践\n\n**555**\n\n从很多方面来看，这个类与你在上一节中看到的\
  \ JUnit 测试类似，不同之处在于这次你继承了一个 Cactus 特定的类。同样，你编写一个 `testXXX()` 方法来测试功能，但 Cactus 允许你编写一个对应的\
  \ `beginXXX()` 方法，该方法会在你的测试方法之前被调用。正是在这里，你可以初始化请求参数等。你所继承的类（`ServletTestCase`）为你提供了访问真实请求/响应的能力，正是因为这个原因，测试服务器端动作变得如此直接。\n\
  \nCactus 提供了一种灵活的方式来测试那些确实需要在 Java EE 容器内部进行测试的组件，并且它目前支持对 Servlet、JSP、自定义标签和过滤器的测试。Cactus\
  \ 最大的问题在于，它一开始可能看起来很复杂，尤其是在框架的设置方面。Cactus 的伟大之处在于，它提供了一种方法来实际测试所有那些如果单独使用 JUnit\
  \ 就会未经测试的组件。另一方面，Cactus 测试确实要求你编写一些通常由容器自动执行的代码。如果你创建了一个 Servlet 实例，理想情况下你也应该调用诸如\
  \ `init()` 和 `destroy()` 这样的容器管理方法。通常来说，这不会造成太大问题，因为 Servlet 和过滤器的生命周期是直接的。然而，自定义标签的情况则略有不同。\n\
  \n**TagUnit**\n\n自定义标签最复杂的部分之一（当然是在 JSP 2.0 出现之前）是标签处理程序实例的生命周期看起来神秘且难以理解。JSP 2.0\
  \ 通过新的 `SimpleTag` 接口解决了这些问题，但在此之前，JSP 规范对标签处理程序实例的生命周期和池化设置了一些非常严格的规则，这些规则从未被广泛理解。由于实现这些生命周期需求的代码通常是\
  \ Java EE 容器的职责，所以这通常不是问题。然而，为了使用 Cactus 测试自定义标签，开发者必须编写代码来精确模拟标签在页面上的使用方式。不幸的是，这个过程容易出错，因此\
  \ TagUnit 测试框架应运而生。\n\nTagUnit (http://tagunit.sourceforge.net/) 是一个用于测试自定义标签的框架。它与其他测试工具的不同之处在于，它允许在标签最终将被使用的相同环境中进行测试。换句话说，测试本身是使用常规\
  \ JSP 语法编写为 JSP 页面的。为了实现这一点，TagUnit 提供了自己的标签库，其中包含模拟 JUnit 中 `assertXXX()` 方法的测试和断言标签。因此，测试自定义标签变得非常容易。你只需在页面上使用你的标签，并将它们包裹在\
  \ TagUnit 标签内即可。断言的示例包括将生成的内容与某些预期内容进行比较、查找作用域变量/属性的存在，以及检查异常是否被正确处理。\n\n清单 14-7\
  \ 是一个测试你在第 7 章中看到的电子邮件地址过滤器标签所生成内容的示例，在该示例中，你测试了自定义标签是否确实过滤掉了电子邮件地址的域名部分。\n\n**清单\
  \ 14-7.** *TestEmailAddressFilter.jsp*\n\n<%@ taglib uri=\"http://www.tagunit.org/tagunit/core\"\
  \ prefix=\"tagunit\" %>\n\n<%@ taglib prefix=\"x\" uri=\"/WEB-INF/tlds/myTags.tld\"\
  \ %>\n\n<tagunit:assertEquals name=\"简单过滤器测试\">\n\n<tagunit:actualResult>\n\n513-0\
  \ ch14.qxd 11/17/05 8:44 PM Page 556\n\n**556**\n\n第 14 章 ■ 网络应用程序设计与最佳实践\n\n<x:emailAddressFilter>simon.brown@somedomain.com</x:emailAddressFilter>\n\
  \n</tagunit:actualResult>\n\n<tagunit:expectedResult>simon.brown@...</tagunit:expectedResult>\n\
  \n</tagunit:assertEquals>\n\n与 JUnit 和 Cactus 不同，TagUnit 的测试是编写为 JSP 的，断言使用 TagUnit\
  \ 特定的自定义标签编写。\n\nTagUnit 测试被打包成一个 WAR 文件，因此可以部署在任何兼容的 Java EE 容器中。另一个好处是，这使得将测试轻松部署到另一台服务器上成为可能，这使得跨供应商测试变得非常容易，特别是当每个测试可能以略微不同的方式实现标签生命周期和池化的各个方面时。尽管\
  \ Cactus 为测试服务器端组件提供了更丰富的框架，但 TagUnit 非常适合测试自定义标签，尤其是那些将被其他人重用的自定义标签。\n\n**其他单元测试工具**\n\
  \n我们在本章中提到的工具只是众多可用测试工具中的一小部分。有关用于单元测试 Web 应用程序的更多工具信息，请查看 JUnit Web 扩展页面：http://www.junit.org/news/extension/web/index.htm。\n\
  \n既然我们已经介绍了如何对 Web 应用程序执行单元测试，现在让我们换个角度，看看功能测试。\n\n**Web 应用程序的功能/验收测试**\n\n测试 Web\
  \ 应用程序的另一个关键方法是**功能测试**。与单元测试相反，功能测试将应用程序视为一个黑盒（你无法看到其内部），并测试在给定一组输入的情况下输出是否正确。例如，这可能包括在在线商店中向购物车添加商品的请求。在这里，你并不关心请求是如何工作的——你只想知道它确实有效，并且达到了预期的结果。\n\
  \n功能测试通常分为两类，测试由两类人员编写。第一类由开发人员编写，作为他们可能为其编写的类和组件所编写的单元测试的补充。孤立地测试单元类无疑是有用的，但有时开发人员希望运行一些跨越多个类和组件的功能测试。通常，这些测试会考虑到应用程序的内部流程，并且确实有助于支持单元测试，以证明软件对于给定的输入集是有效的。第二类包含由专门的测试团队编写的功能测试。他们的职责范围从系统测试（其中端到端的流程在整个系统中得到执行）到编写将用于正式声明功能满足需求并将被项目发起人或最终用户接受的测试。\n\
  \n与验收相关的一个问题是，传统的验收测试（有时称为用户验收测试）是遵循文本脚本手动执行的。\n\n\n\n尽管这种方法行之有效且被广泛使用，但每当软件发布新版本时，无论出于何种原因，这些手动测试都必须重新执行。虽然确实存在一些工具允许测试人员捕获手动测试应用程序的过程以实现自动回放，但其中许多工具可能价格昂贵且使用繁琐。另一方面，现在有许多开源选项可供选择，尽管这些工具往往更面向开发者社区。\n\
  \n513-0 ch14.qxd 2005 年 11 月 17 日 下午 8:44 第 557 页\n\n第 14 章 ■ 网络应用程序设计与最佳实践\n\n\
  **557**\n\n并且要求使用编程语言、脚本语言或 XML 来编写测试。这是一个目前处于变动中的领域，在最终选择工具之前，值得考虑你的测试受众。让我们看看如何使用另一个广泛使用的开源框架\
  \ HttpUnit 来自动化功能级测试。\n\nHttpUnit\n\nHttpUnit (http://www.httpunit.org) 是 JUnit\
  \ 的另一个扩展，但它与我们讨论过的其他扩展不同，因为它允许你在略有不同的层面上编写测试。\n\n你可以使用 JUnit 和 Cactus 等工具来测试单个类和组件是否正常工作，而\
  \ HttpUnit 是一个可用于测试 Web 应用程序所提供功能的框架。正如你所见，对类进行单元测试很容易，但如何测试 Web 应用程序的功能呢？\n\n答案在于\
  \ HttpUnit 为你提供的工具。该框架提供了一系列类，允许你模拟用户使用 Web 浏览器连接并使用网站的过程。在底层，它通过向网站发出 HTTP 请求，并传递用户通常需要手动输入的信息来实现这一点。就通过该框架可用的功能而言，HttpUnit\
  \ 允许你访问单个网页，并对网页是否包含特定元素执行断言。例如，如果你正在测试一个在线商店，你可能想测试所有页面是否都包含购物车的当前总价。除了这些基本功能外，HttpUnit\
  \ 还提供了一种方法来查找页面上的 HTML 表单，并通过编程方式填写这些表单以发送回服务器，然后可以检查服务器的响应。同样，对于在线商店，你可能想测试用户能否将商品添加到购物车，以及后续页面是否向用户显示更新后的购物车状态。\n\
  \nHttpUnit 提供了一种使用 Java 代码以编程方式测试网站功能的方法，其真正的好处在于，当新版本可用时，可以重新运行这些测试来对 Web 应用程序进行回归测试。事实上，由于\
  \ HttpUnit 使用 HTTP 协议，它可以用于测试任何其他基于 HTML 的 Web 应用程序，包括使用 Active Server Pages (ASP)、Perl、PHP\
  \ 等编写的应用程序。\n\n其他功能测试工具\n\n为了完善你对功能测试工具的了解，还有几个其他框架值得一提。第一个是 jWebUnit (http://jwebunit.sourceforge.net)，它实际上是\
  \ HttpUnit 的一个扩展。jWebUnit 背后的团队在一个项目中使用 HttpUnit 时，意识到许多测试都包含重复的代码来设置请求对象和执行断言。因此，该团队为\
  \ HttpUnit 构建了一套包装类，以简化其 API 的用途。这经过不断改进并已发布到开源社区。有些人喜欢 HttpUnit 提供的控制力，而另一些人则更喜欢\
  \ jWebUnit 提供的更简单的接口。归根结底，这完全取决于个人偏好。\n\n另一个值得一提的框架是 Jameleon (http://jameleon.sourceforge.net)。该框架提供了一种对应用程序进行功能测试的方法，但它是从应用程序所提供的功能角度出发的。Jameleon\
  \ 与 HttpUnit 和 jWebUnit 的不同之处在于，它将功能的测试与实际测试用例分离开来。一个功能可以是像登录这样粒度很细的操作，也可能是每次测试前都必须执行的操作。使用\
  \ Jameleon，你可以单独编写功能测试，然后将它们组合成一个可重用的测试用例。这些测试用例可以通过在运行时与特定数据集关联来实现数据驱动，这提供了一种在特定环境中轻松运行特定测试的方法。Jameleon\
  \ 本身并非专门为测试 Web 应用程序而设计；相反，它采用插件架构，可以将测试代码插入并执行。在撰写本文时，Jameleon 提供了 HttpUnit/jWebUnit\
  \ 的插件；因此，它可以用于对 Web 应用程序进行功能测试。这是一个很棒的想法，而且通常是商业测试工具才具备的功能。一如既往，开源测试领域值得关注，因为新的工具和增强功能会定期发布。\n\
  \n现在我们已经介绍了测试 Web 应用程序的各种方法，接下来让我们看看设计如何影响测试 Web 应用程序的能力。\n\n**为测试而设计 Web 应用程序**\n\
  \n尽管对单个类进行单元测试很简单，但正如我们所暗示的，有时对 Web 应用程序中的类进行单元测试可能会很棘手。当各种业务逻辑和表示逻辑与需要在 Web 服务器内执行的组件（如\
  \ Servlet）混杂在一起时，尤其如此。为了解决这些问题，我们必须再次求助于架构和设计。\n\n架构分层\n\n虽然我们没有明确讨论架构分层，但我们讨论过\
  \ MVC 架构以及它如何帮助实现各个组件之间的关注点分离。例如，控制器是负责管理请求的总体组件，模型表示正在被操作的领域信息，而视图则将信息呈现给用户。将其与模型\
  \ 1 架构（其中所有这些职责都嵌入在单个组件中）进行比较，你就可以开始看到分离这些职责如何能够简化测试。\n\n我们已经说过，Web 应用程序单元测试中最困难的部分是测试那些依赖于\
  \ Java EE Web 服务器上下文的组件，而你可以采取的一项有助于测试的措施是，尽量使这些组件变得小巧轻量。通过将这些组件作为封装在 Java 类中的功能的轻量级包装器，你就有更大的机会对应用程序进行单元测试。例如，回想一下\
  \ MVC 架构，特别是命令和控制器策略，其中处理传入请求的功能被拆分到各个命令对象中。由于每个命令对象只是一个独立的 Java 类，你现在可以使用与普通 Java\
  \ 类相同的单元测试技术——你可以使用 JUnit 创建新实例并调用这些实例上的方法。\n\n\n\n能够对 Web 应用程序进行单元测试的关键之一，在于确保每个类都有明确的角色。在\
  \ MVC 架构中，这涉及将类划分为主要组件类别之一：控制器/动作、模型和视图/表示。此外，无论你是否采用 MVC 架构，某些类型的类比其他类更容易测试。我们已经提到过这一点，但再总结一下：能够独立存在的类通常更容易测试——在\
  \ Java EE Web 应用程序中，这通常意味着代表业务/领域对象的类，以及那些封装了一定级别业务逻辑和处理的类。\n\n513-0 ch14.qxd 11/17/05\
  \ 8:44 PM 第 559 页\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\n**559**\n\n在我们参与过的项目中，测试 Web 应用程序组件一直是反复出现的难点之一。归根结底，将组件分解为不同的架构层确实能提高测试这些组件的能力。此外，试图实现\
  \ Web 应用程序中所有组件的完全测试覆盖往往需要付出过多努力。如果你已将大部分功能分解为能够独立于 Web 服务器环境运行的类，那么测试这些类应该能让你对正在编写的代码产生令人满意的信心。测试的全部意义在于为你提供一定程度的信心，确保代码能按预期执行，而不是追求完全覆盖。\n\
  \n**测试策略**\n\n当你编写常规 Java 代码（非 Java EE 相关）时，像 JUnit 这样的测试工具通常能满足大部分需求。然而，对于 Java\
  \ EE 应用程序，仅靠单一工具是不可行的。例如，使用 JUnit 和 Cactus，只能测试独立类。使用 TagUnit，只能测试自定义标签。使用 HttpUnit，只能测试应用程序提供的端到端功能。由于这些工具各自从不同角度测试软件，你不能只依赖一个工具。测试的目的是提供软件能正常工作的信心，而这仅靠单一工具是无法实现的。\n\
  \n测试可以在多个层面进行，Web 应用程序测试也是如此。\n\n在最底层，你可以使用 JUnit 和 Cactus 等工具进行单元测试。再往上，你会遇到稍大一些的交互类或组件组。这些也可以用\
  \ JUnit 和 Cactus 进行测试，尽管 TagUnit 等其他工具也开始发挥作用。再往上，你开始测试系统的更多功能，这时功能测试工具就派上用场了。测试其中一层固然很好，但这并不能保证整个系统能正常工作。毕竟，单元测试往往更详细、更侧重于健壮性。而功能测试则更倾向于检查功能是否按预期工作。你应该将所有测试工具视为互补的，由你来选择那些能让你对软件正常工作有信心的工具。\n\
  \n**Web 应用程序兼容性测试**\n\n作为额外的测试层级，许多开发者会测试其应用程序在不同服务器之间的兼容性。通过编写符合 Java EE 平台的代码，你（至少在理论上）可以保证应用程序能在任何其他兼容或符合\
  \ Java EE 规范的实现上运行。对许多人来说，这并非问题，因为他们只会在单一类型的 Java EE 服务器上运行应用程序。但对其他人，尤其是那些构建产品（无论是商业产品还是开源产品）的人来说，测试兼容性对其\
  \ Web 应用程序的成功至关重要。\n\n几年前，Java EE 兼容性仍然是服务器供应商们正在努力解决的问题。尤其是在规范仍在成熟的过程中，这一点尤为突出。幸运的是，这种情况已大为改善，现在大多数\
  \ Web 应用程序都能在任何兼容 Java EE 的服务器上直接运行。然而，如果你正在构建产品，那么测试你的 Web 应用程序是否能在某些可用的不同实现上按预期运行，仍然是有价值的。例如，某个供应商实现中的小错误\n\
  \n513-0 ch14.qxd 11/17/05 8:44 PM 第 560 页\n\n**560**\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\
  \n可能会完全阻止你的应用程序运行。其他时候，你可能在不知不觉中依赖了某个特定的实现特性，或者仅仅是规范点的实现方式。例如，Tomcat 团队最近更改了一些与通过\
  \ Servlet 分发器直接调用 Servlet 方式相关的默认安全设置。在升级到更新版本的 Tomcat 时，许多开发者发现他们的 Web 应用程序不再工作，因为他们曾在\
  \ JSP 页面中使用这种方法调用 Servlet。\n\n我们曾参与一个项目，负责为一家大型投资银行的企业应用程序构建 Web 层。我们团队使用的应用服务器\
  \ BEA WebLogic 的许可证尚未到位，因此我们开始使用 Tomcat 构建 Web 层。当许可证最终到位时，由于不同供应商在 JSP/Servlet\
  \ 规范实现上的不兼容性，我们不得不将部分代码在服务器之间进行移植。值得庆幸的是，这些实现已经成熟了很多，大多数代码现在可以在不同的 Java EE 服务器上直接运行。\n\
  \n这个故事的寓意是：即使你不打算使用其他供应商的服务器，在其他兼容 Java EE 的服务器上运行你的 Web 应用程序也是有益的。对于任何基于 Java EE\
  \ 构建商业产品的人，Sun 公司有一个验证程序，包含一套兼容性测试套件，可以测试你的应用程序是否正确且标准地使用了 Java EE 规范提供的 API。详情请参见\
  \ http://java.sun.com/j2ee/verified/avk_enterprise.html。\n\n**安全性**\n\n虽然我们在第 12\
  \ 章中已经涵盖了安全性，但在本章关于 Web 应用程序设计与最佳实践的背景下，仍有一些安全最佳实践值得回顾。\n\n**使用标准安全模型**\n\n如果可能，尽量使用标准安全模型。许多\
  \ Web 应用程序使用自定义的安全模型进行身份验证和授权。虽然有时这是必要的，可能是因为标准模型无法满足你的需求，但许多 Web 应用程序甚至没有与标准安全模型集成。除了利用现有技术外，使用标准安全模型还有很多理由。\n\
  \n\n\n第一个原因与你的 Web 应用程序的安全性有关。如果没有标准的安全模型，Web 应用程序根目录下的每个 JSP 页面、Servlet 和资源实际上都是公开的。当使用定制框架时，开发者通常必须在\
  \ JSP 页面顶部插入脚本代码，通过会话变量（例如指示用户是否已登录的值）来判断请求应被允许还是拒绝。但如果这段代码被遗漏，未登录的用户就能访问这些资源，会发生什么情况呢？\n\
  \n我们曾为一个项目提供咨询，该项目实现了自己的安全模型。尽管资源授权很复杂，但用户的实际身份验证并无特别之处。整个系统没有采用标准模型，而是为身份验证和授权都实现了定制解决方案。该系统主要基于\
  \ MVC 架构构建，尽管部分模块只是以页面为中心。因此，为了确保安全，他们构建了一个自定义标签，插入到每个页面的顶部，以判断当前用户是否应该看到页面内容。\n\
  \n513-0 ch14.qxd 11/17/05 8:44 PM 第 561 页\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\n**561**\n\
  \n虽然这种方法有效，但通过审查应用程序我们发现，有些页面没有插入这个自定义标签，导致这些页面处于不安全状态。其中最糟糕的可能是某个页面允许任何人获取系统内所有数据的报告。如果使用了标准安全模型，每个\
  \ JSP 页面都可以轻松地限制为仅允许已认证用户访问。\n\n使用标准安全模型不仅能简化 Web 应用程序的设计，还能为你的 Web 应用程序安全性提供额外的信心保障。\n\
  \n**保护视图组件**\n\n即使你的 Web 应用程序不需要用户登录和身份验证这种意义上的安全性，仍然需要确保应用程序安全且仅按预期方式运行。例如，以一个基于\
  \ MVC 的 Web 应用程序为例。通常，请求由控制器组件处理，然后转发给视图组件，将信息呈现给用户。如果视图组件是简单的 JSP 页面，用户发现了该 JSP\
  \ 页面的名称和位置并尝试直接访问，会发生什么？在很多情况下，他们可能会看到一个不包含任何信息的页面，或者一个令人头疼的堆栈跟踪信息。也许你的 JSP 页面包含对系统有其他副作用的代码。如果你正在对用户进行身份验证，他们可能会看到其他人的信息，因为他们的请求没有经过控制器。\n\
  \n为了解决这个潜在问题，一个解决方案是确保视图组件（JSP 页面）遵循标准安全模型。例如，如果所有视图组件都放在一个名为 `view-components`\
  \ 的目录中，你可以在 `web.xml` 文件中放置以下代码来禁止所有直接访问：\n\n<security-constraint>\n\n<web-resource-collection>\n\
  \n<web-resource-name>禁止直接访问</web-resource-name>\n\n<url-pattern>/view-components/*</url-pattern>\n\
  \n</web-resource-collection>\n\n<auth-constraint>\n\n<role-name>某个不存在的角色</role-name>\n\
  \n</auth-constraint>\n\n</security-constraint>\n\n这段代码指定该目录下的任何内容只能由指定角色的用户访问。因此，如果你没有将该角色映射到任何用户，就没有人能直接访问这些页面。当然，控制器组件仍然可以转发到\
  \ JSP 页面，因为它不受相同规则的约束。类似地，另一个选择是将所有视图组件放在 Web 应用程序的 `WEB-INF` 目录下，该目录根据定义不允许直接访问。无论哪种方式，保护视图组件都能让你的\
  \ Web 应用程序更安全、更具弹性。\n\n**故障排除**\n\n在基于 JSP 和 Servlet 的应用程序中，可能会发生一些常见问题。在本节中，我们将回顾其中一些问题，并提供快速指导来帮助你调试。\n\
  \n513-0 ch14.qxd 11/17/05 8:44 PM 第 562 页\n\n**562**\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\
  \n**Servlet 引擎内存耗尽**\n\n如果 Servlet 引擎或应用服务器停止响应请求，并且你在日志文件中发现 `OutOfMemoryError`\
  \ 消息，那么很可能是你的应用程序消耗了所有可用内存。这可能是应用程序代码中存在内存泄漏的结果。也许应用程序持有大量对象的引用，从而阻止它们被垃圾回收。如果是这种情况，你需要进行仔细的代码审查，以了解问题出在哪里。一些应用服务器为此问题提供了一种变通方法：一个称为**服务器回收**的功能，它会定期重启空闲的\
  \ Servlet 引擎。重启 JVM 是清理泄漏对象的可靠方法。\n\n即使代码中没有内存泄漏，仍然可能耗尽内存。通常，JSP 应用程序会为每个并发用户创建一个会话对象。会话对象会消耗内存，而内存是有限的资源。因此，过多的并发用户可能导致\
  \ Servlet 引擎内存耗尽。当服务器内存耗尽时，需要重启。解决这个问题的一种方法是将 Servlet 引擎配置为更短的超时时间。设置更短的会话超时时间通常会导致并发会话减少，从而降低内存耗尽的可能性。其他解决方案如下：\n\
  \n*   增加更多内存，使每台服务器能支持更多用户。\n*   增加更多应用服务器实例，以处理更大的用户总数。\n*   将会话中存储的对象数量和大小保持在最低限度。\n\
  \n除了这些解决方案，如果你有一个完全无状态的应用程序，你可以使用以下 JSP 页面指令告诉容器不要使用会话，从而节省大量内存：\n\n<%@ page session=\"\
  false\" %>\n\n商业性能调优产品（如 Borland 的 Optimizeit (http://www.borland.com/optimizeit)\
  \ 和 Quest Software 的 JProbe (http://www.quest.com/jprobe/)）内置的内存调试工具有助于追踪内存泄漏，尽管这类工具价格不菲。当你在这类工具下运行应用程序时，可以暂停应用程序，检查内存中每个对象类的内存使用统计信息，列出负责最多对象分配的方法，并确定当前内存中的对象是在哪里分配的。\n\
  \n**数据库连接耗尽**\n\n如果应用程序开始出现异常行为，抛出“数据库连接耗尽”或“无法获取数据库连接”的错误，那么它已经消耗了所有数据库连接。\n\n\n\
  \n原因可能是数据库连接泄漏，即数据库连接在使用后未能正确释放。如果应用程序使用了数据库连接池，你可以启用连接池的相关功能，以便定位那些占用连接却不归还的错误代码。如果这还不行，那么仔细的代码审查和日志文件可能是唯一的选择。\n\
  \n513-0 ch14.qxd 11/17/05 8:44 PM 第 563 页\n\n第 1 4 章 ■ W E B 应用程序设计与最佳实践\n\n**563**\n\
  \n即使应用程序没有泄漏数据库连接，它仍然可能耗尽所有连接。在使用数据库连接池时，你可以通过简单配置数据库连接池，允许更大的最大连接数来解决这个问题。如果这不起作用，请与数据库管理员沟通，增加数据库服务器上允许的数据库连接数。\n\
  \n**Servlet 引擎停止响应**\n\n如果 Servlet 引擎或应用服务器停止响应 HTTP 请求，并且日志文件中没有出现 OutOfMemoryError\
  \ 消息，那么问题可能有两个其他原因：\n\n• 存在**线程死锁**。在多线程的 JSP 中，当两个或多个线程因各自等待对方持有的锁而无法继续执行时，就会发生死锁。\n\
  \n• 应用程序代码中存在**无限循环**。当线程陷入一个编写不当的 for、while 或 do 循环时，就会发生无限循环的情况。\n\n精确定位问题的根源可能很困难。通常，仔细的代码审查和检查日志文件是唯一的选择。在这种情况下，详细的调试日志会非常有帮助。\n\
  \n**遇到 ClassCastException**\n\nServlet 引擎使用特殊的类加载器来隔离各个 Web 应用程序，并将它们与 Servlet 引擎内部使用的类隔离开。这些类加载器可能会导致一些看似难以理解的问题。例如，你可能会遇到一个\
  \ ClassCastException，提示存在同一类的不兼容版本。通常，这类问题是由于将与 Servlet 引擎提供的 JAR 包冲突的 JAR 包放入了应用程序的\
  \ WEB-INF\\lib 目录中引起的，尽管理论上类加载机制应该为你处理这个问题。另外，重新部署应用程序也可能导致此问题。在幕后，虽然 Web 应用程序会重新加载所有类，但如果你持有会话中对象的引用（并且使用同一个浏览器实例），当\
  \ JSP 容器尝试将这些带有旧类定义的对象转换为新定义时，就会失败，并抛出 ClassCastException。简单地重启容器就能解决大部分此类问题。\n\n\
  **页面运行过慢**\n\n如果 JSP 页面或 Servlet 运行过慢，并且本章描述的性能优化技术未能找出问题原因，那么可以尝试使用**性能分析器**。性能分析器会生成一份报告，显示应用程序中每个方法所花费的时间，从而帮助你缩小性能问题的排查范围。我们之前讨论过的商业性能调优工具\
  \ Optimizeit 和 JProbe 都包含性能分析器。此外，在撰写本文时，一个名为 Eclipse Profiler 的性能分析插件正在为 Eclipse\
  \ IDE 开发中。你可以通过以下网址关注该项目的进展：http://eclipsecolorer.sourceforge.net/index_profiler.html。\n\
  \n513-0 ch14.qxd 11/17/05 8:44 PM 第 564 页\n\n**564**\n\n第 1 4 章 ■ W E B 应用程序设计与最佳实践\n\
  \n**调试**\n\n调试通常是编程中最困难、最令人沮丧的方面。基于 JSP 和 Servlet 的应用程序通常相当复杂，因此调试起来尤其困难。为什么 JSP\
  \ 应用程序如此复杂？以下是一些原因：\n\n\n• **JSP 应用程序是分布式的：** 在生产环境中部署时，一个 JSP 应用程序可能涉及多个分布式系统，包括负载均衡路由器、Web\
  \ 服务器、应用服务器、数据库以及其他后端系统。\n\n• **JSP 应用程序混合了多种编程语言：** JSP 应用程序可以包含 HTML、JavaScript、Java\
  \ 代码、SQL、XML 以及其他编程和标记语言。当你阅读一个 JSP 页面时，通常很难分辨页面的哪些部分在服务器端执行，哪些在客户端执行。\n\n• **JSP\
  \ 应用程序运行在多线程环境中：** JSP 应用程序需要是线程安全的，以达到最佳性能。对许多程序员来说，线程是一个复杂且令人困惑的话题，而且线程问题可能很难调试。\n\
  \n• **JSP 应用程序包含许多组件：** 一个 JSP 应用程序的技术栈通常包括一个 Servlet 引擎、一个 JSP 编译器、一个 MVC 框架、一个持久化框架、一个\
  \ JDBC 驱动程序、一个数据库以及其他后端系统。\n\n学习如何在复杂、分布式和多线程的程序中解决问题需要时间，并且通常需要大量的深入思考，所以请做好思考的准备。如果出现特别棘手的问题，先睡一觉，然后再思考。向另一位更有经验的程序员解释这个问题。如果身边没有人，就向你显示器上的那个塑料恐龙解释。通常，仅仅详细地解释一个问题就能激发灵感，从而找到解决方案。\n\
  \n如果你能设法用简单的术语解释你的问题，或者能将问题隔离在一个简单的代码示例中，你或许可以从新闻组、邮件列表或其他在线论坛获得帮助。在向这些论坛发布消息之前，你应该先阅读论坛存档中的历史帖子，看看你的问题或疑问是否已经被问过。使用像\
  \ Google 这样的搜索引擎也可能对解决某些问题有帮助。\n\n**日志记录**\n\n日志记录是任何 JSP 应用程序的最佳实践，它受到 Servlet\
  \ API、应用服务器以及各种日志记录工具的支持。执行日志记录的方法有很多，从使用简单的 `System.out.println()` 语句到使用功能完备的日志记录\
  \ API。\n\n使用 Servlet API 进行日志记录\n\nServlet API 在 `javax.servlet.ServletContext`\
  \ 接口中包含了日志记录方法。`ServletContext` 接口的 `log()` 方法使得将日志消息和异常堆栈跟踪写入应用服务器的日志系统变得容易。使用\
  \ Servlet API 内置日志记录方法的优点如下：\n\n• 日志消息会自动添加时间戳前缀并写入日志文件。这意味着即使在它们从控制台滚动消失之后，甚至在服务器关闭之后，你仍然可以访问它们。\n\
  \n• 应用服务器管理日志文件，并确保它们永远不会变得过大而消耗所有磁盘空间。\n\n• 应用服务器通常提供一个管理程序，即使日志文件被写入多个远程服务器，你也可以轻松地查看和搜索日志文件。\n\
  \n所有这些听起来都不错，但实际上，Servlet API 只提供了最基本的日志记录支持。你可以记录字符串消息，也可以记录异常。但是，如果你想启用和禁用日志记录，你需要添加配置属性，并通过例如向\
  \ `web.xml` 文件添加参数来实现条件逻辑。然而，像前面那样实现你自己的临时日志记录并不是最佳方法。使用像 log4j 或 Java 日志记录 API\
  \ 这样的功能完备的日志记录系统有很多好处。\n\n功能完备的日志记录系统\n\n一个功能完备的日志记录系统，例如开源的 log4j 框架（http://logging.apache.org/log4j/docs/），相比使用\
  \ `System.out.println()` 调用或使用 Servlet API 中的日志记录方法，提供了几个优势：\n\n• **对日志级别的控制：**\
  \ 你可以按不同的严重级别记录消息。例如，log4j 支持 DEBUG、INFO、WARN、ERROR 和 FATAL 日志级别（按严重性递增顺序列出）。当你设置一个日志级别时，系统将输出该日志级别以及所有高于该级别的消息。因此，例如，INFO\
  \ 级别的日志记录将包括 INFO、WARN、ERROR 和 FATAL 级别的消息。只需更改 log4j 属性文件中的一个配置参数，你就可以启用 DEBUG\
  \ 级别的日志记录来帮助你调试问题。当你找到并修复问题后，你可以将日志级别设置回 ERROR，这样只有 ERROR 和 FATAL 级别的日志消息会被记录。\n\
  \n• **多个日志记录器：** 你可以在应用程序的不同部分使用不同的逻辑日志记录器。例如，你可以在表示层使用一个名为 `com.mydomain.ui` 的日志记录器，在数据访问层使用另一个名为\
  \ `com.mydomain.db` 的日志记录器。这允许你仅控制应用程序中出现 bug 的那一部分的日志级别。\n\n• **多个日志目标：** 你可以配置日志记录系统，将日志消息发送到文件、操作系统日志、数据库、消息队列、通过\
  \ TCP/IP 连接的远程系统以及其他目标。这在生产环境中可能很有帮助，因为应用程序可能运行在异构和分布式环境中。\n\n• **更好的日志文件管理：** 日志文件可能会迅速增长到很大的尺寸，尤其是在启用\
  \ DEBUG 级别日志记录时。你可以配置日志记录系统，在当前日志文件变得过大时开始一个新的日志文件。你可以配置日志记录系统删除或归档旧的日志文件，这样就不会消耗你的磁盘空间。\n\
  \n• **对日志格式的控制：** 你可以配置日志记录系统生成的日志消息的格式，以满足特定需求。\n\nJava 现在在其 `java.util.logging`\
  \ 包下包含了它自己的日志记录 API。这个新的日志记录 API 是对 Java 的一个受欢迎的补充，并且在许多方面与 log4j API 相似，但它不如 log4j\
  \ 强大和灵活。例如，log4j 可以将日志消息定向到 Unix 系统日志、Microsoft Windows 事件日志、Java 消息服务（JMS）消息队列和电子邮件。而\
  \ Java 日志记录 API 只能记录到控制台、文件和套接字。就像在开发的许多方面一样，人们会对自己喜欢的日志记录框架产生依赖，这在决定使用哪个框架时常常是个问题。此外，选择其中一个而不是另一个也有一些技术原因。也许你需要特定\
  \ API 中可用的功能，或者你的 Java EE 服务器自带了 log4j。无论哪种方式，为了确保你保留在两者之间自由切换的能力，Jakarta Commons\
  \ Logging 提供了一个解决方案。\n\nJakarta Commons Logging\n\nJakarta Commons Logging（JCL，位于\
  \ http://jakarta.apache.org/commons/logging/）是围绕 log4j 和 J2SE 1.4 日志记录的一个轻量级封装，其唯一目的是在两者之间提供一个通用接口。将\
  \ Commons Logging 的 JAR 文件放在你的 CLASSPATH 中后，该框架会自动定位这两个日志记录框架中的任何一个，并使用它在你的 CLASSPATH\
  \ 中找到的那个。它会首先查找 log4j，如果没有找到 log4j，它会检查 J2SE 1.4 日志记录是否可用。这是一个简单的技巧，但效果确实很好。如果你需要在应用程序中使用\
  \ log4j，只需确保它在 CLASSPATH 中即可。\n\n无论你使用哪个日志记录框架，实际使用 JCL 都很容易，如下面的代码片段所示：\n\n```java\n\
  Log log = LogFactory.getLog(MyClass.class);\n```\n\n之后，在初始化了 `log` 之后，你可以通过以下方法调用在各个级别写入消息：\n\
  \n\n\nlog.fatal(\"这里有一些有用的信息！\"); log.error(\"这里有一些有用的信息！\"); log.warn(\"这里有一些有用的信息！\"\
  ); log.info(\"这里有一些有用的信息！\"); log.debug(\"这里有一些有用的信息！\"); log.trace(\"这里有一些有用的信息！\"\
  ); 与其最终委托的框架类似，JCL 拥有多种严重级别，这些级别映射到底层日志框架所使用的级别。如果你需要更多控制，也许 JCL 并不适合你。对许多人来说，控制上的牺牲很容易被\
  \ JCL 提供的简洁性所抵消。\n\nJakarta Commons Logging 在我们使用过的项目中表现良好，尤其是在我们的开源工作中。毕竟，你永远无法确定用户更喜欢哪个日志库，或者他们的\
  \ Java EE 服务器是否随附了 log4j，亦或是否不支持 J2SE 1.4。JCL 为你提供了额外的灵活性。\n\n**通用指南**\n\n在本章结束之前，你将了解一些构建\
  \ Web 应用程序的通用指南。\n\n尽管这些指南并非专门与设计相关，但它们对于构建一个成功的网站同样重要。\n\n513-0 ch14.qxd 11/17/05\
  \ 8:44 PM 第 567 页\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\n**567**\n\n**错误报告**\n\n作为开发者，当错误发生时，我们喜欢看到的东西之一是堆栈跟踪。\n\
  \n毕竟，它们对于追踪问题的来源和原因非常有用。另一方面，用户可能并不想看到它们；它们肯定不会提升用户体验。\n\n在网站上看到堆栈跟踪或其他形式的技术错误消息，往往会让我不想再访问那个网站。例如，我经常访问的一个特定电子商务网站会向我显示一些关于某个\
  \ Visual Basic 组件无法连接到其数据库的消息。虽然我承认自己对 Visual Basic 一无所知，但看到这样的消息确实让我在从该网站订购时三思。\n\
  \n不幸的是，即使是最经过测试的网站，错误也难免会发生，因此 JSP 规范提供了 JSP 错误页面。你在第 2 章已经看到过这些页面，回顾一下，它们就是当容器遇到未捕获的异常时被转发到的页面。设置你的\
  \ Web 应用程序使用这些页面是确保你拥有处理错误的标准方式，并且用户不会在过程中看到令人不快的堆栈跟踪的好方法。\n\n与此相关，另一个建议是使用一致的异常处理策略，并确保你处理并记录所有异常。这将帮助你理解当错误发生时出了什么问题以及在哪里出的问题。在适当的地方使用\
  \ JSP 内置的异常处理机制——它们就是为了帮助你而存在的。如果你正在使用像 Struts 这样的 MVC 框架，也要利用其异常处理机制。\n\n**国际化与本地化**\n\
  \n国际化（I18n）和本地化（l10n）是内置于 Java 平台的功能，没有什么能阻止你在 Web 应用程序中使用它们，特别是如果你打算面向国际受众。通常，尤其是在公共网站上，会投入大量精力使网站功能正确且外观良好。然而，往往很少投入精力来最大化对国际受众的吸引力。毕竟，互联网是一个全球网络，你永远无法确切知道谁会使用你的网站。\n\
  \n添加这些功能不一定是一项艰巨的工作，像 JSTL 这样的工具支持国际化与本地化 Web 应用程序所需的大部分功能。例如，这可以涵盖从简单地本地化日期和时间到提供国际化文本和/或内容。这里最重要的指导原则是考虑你的受众。\n\
  \n**采用新技术和标准**\n\nWeb 在过去几年中发生了巨大变化，一些 Web 应用程序比其他应用程序更好地跟上了这些变化。虽然有一种观点认为不应总是采用最新、最伟大的技术，但在采用最有意义的功能和从不采用之间有一条微妙的界限。随着技术几乎每月都在变化，这为你提供了在你参与的每个新\
  \ Web 应用程序上尝试新技术和标准的机会。大多数 Web 开发人员现在已经采用了像层叠样式表（CSS）这样的标准，但你不会发现很多网站（相对而言）使用像 XHTML\
  \ 这样的较新标准。这在很大程度上与保持现有网站更新的成本有关，但当你开始一个新的 Web 应用程序时，环顾四周看看行业内正在发生什么，并利用这一点来判断是否有任何新技术或标准可以帮助你实现目标。\n\
  \n我们参与的一个项目涉及帮助一家客户公司内部的团队构建一个内部使用的 Web 应用程序。该系统本身正在取代一个“绿屏”应用程序，这是该团队第一次使用 Java，更不用说构建\
  \ Web 应用程序了。虽然系统的第一个原型功能正常，但其用户界面与原始大型机应用程序上的界面非常相似。在与团队一起摆弄视图组件仅仅一天左右后，我们提出了一个与公司企业形象相匹配，并且更接近你在互联网上找到的那种\
  \ Web 应用程序的方案。我们向他们展示了 CSS，并指导他们了解互联网上一些最受欢迎的网站是如何工作的。结果呢？不仅应用程序的外观和感觉好多了，而且系统的业务赞助商和用户突然对这个项目变得更加热情。一点点\
  \ HTML 和 CSS 能做的事情真是令人惊叹！\n\n总而言之，让你以前构建 Web 应用程序的经验帮助你，但不要让它们限制你。\n\n**采用现有组件**\n\
  \n最后一个值得讨论的指南是使用第三方组件，特别是那些开源的组件。在过去几年中，开源社区在采用率和当前正在进行的项目数量方面确实取得了长足进步。快速浏览一下像\
  \ Jakarta 项目 (http://jakarta.apache.org)、SourceForge (http://sourceforge.net) 和\
  \ java.net (http://java.net) 这样的网站就能证实这一点。随着项目预算和时间表的缩减，这里有一个机会可以获取许多已经构建好的东西，并在你自己的项目中使用它们。\n\
  \n正如我在本章前面提到的，我决定构建一个基于 Java 的 Web 应用程序实现的博客系统。在构建该应用程序时，我使用了几个开源项目，包括用于日志记录的 Jakarta\
  \ Commons Logging 和 log4j、用于向网站上传文件的 Jakarta Commons FileUpload、用于访问 Web 服务的 Apache\
  \ XML-RPC，以及用于为用户提供搜索功能的 Lucene。自己实现所有这些功能将花费极其漫长的时间。而实际上，这些开源工具每一个最多只需要几个小时就能集成，这意味着我可以专注于\
  \ Web 应用程序的真正目的。\n\n让我们快速浏览一下当前一些流行的开源工具。\n\nJakarta Commons\n\n\n\nJakarta Commons\
  \ (http://jakarta.apache.org/commons/) 是一个伞式项目，涵盖了开发者反复构建的各种通用功能。你已经见过其中一个组件（Jakarta\
  \ Commons Logging）。其他组件还包括基于 Servlet 的文件上传组件、对象池实现、表达式语言、JavaBean 工具等等。这是一个极其有用的项目，新的组件和功能一直在不断添加。\n\
  \nLucene\n\nLucene (http://lucene.apache.org/) 是一个完整搜索引擎的开源实现。它在整个 Java 开源社区中备受推崇，因为它非常健壮、功能全面且速度极快。其\
  \ API 易于上手，只需几行代码就能为你的数据创建索引。同样，只需几行代码就能实际搜索该索引。如果你希望在网站上集成搜索功能，Lucene 就是你的不二之选。\n\
  \n**总结**\n\n本章涵盖了与 Web 应用程序设计和最佳实践相关的几个主题，将你在前几章中探讨的许多内容融合在一起。首先，我们讨论了设计为何重要，并回顾了构建\
  \ Web 应用程序的两种主要架构：以页面为中心（模型 1）和模型-视图-控制器（模型 2）。然后，我们展示了设计模式如何帮助你设计应用程序，并描述了如何使用一些\
  \ Java EE 模式来构建基于 MVC 架构的 Web 应用程序。这些模式包括：\n\n• 前端控制器\n\n• 视图\n\n• 视图助手\n\n• 服务到工作者\n\
  \n• 过滤器\n\n接着，我们讨论了一些第三方框架，例如 Struts、WebWork 和 Velocity。\n\n之后，我们展示了测试是 Web 应用程序开发的重要组成部分，并介绍了单元测试和功能（或验收）测试。自动化测试在\
  \ Web 应用程序领域现已真正兴起，为了说明这一点，我们讨论了一些目前可用的测试工具。然后，我们通过展示 Web 应用程序的设计如何影响其可测试性，将测试与本章前面介绍的设计方面联系起来。\n\
  \n最后，我们涵盖了一些实现主题，包括日志记录、故障排除以及构建 Web 应用程序的一些通用指南。\n\n513-0 ch14.qxd 11/17/05 8:44\
  \ PM 第 570 页\n\n513-0 ch15.qxd 11/14/05 5:38 PM 第 571 页\n\n第 15 章\n\n■ ■ ■\n\n使用\
  \ Struts、XDoclet\n\n及其他工具\n\n**从**前面几章可以看出，构建 Web 应用程序有很多选择。如果你从头开始开发一个 Web 应用程序，你会成为一名更强大的程序员，但这（很可能）将是一个漫长而费力的过程。在本章中，我们将介绍用于\
  \ Web 开发的工具，以及如何在开发本章的简历构建应用程序中使用它们。通过分享我们的经验和知识，希望你不必经历我们曾经忍受过的同样痛苦的记忆-学习-开发过程。为了让你对本章中涉及的大量主题有所准备，让我们先看看我们将要介绍的各种开源工具和技术：\n\
  \n• **Ant**：一个基于 Java 的构建工具，用于快速编译、部署和测试基于 Java 的应用程序。\n\n• **XDoclet**：一个用于创建 Java\
  \ 类和部署描述符的代码生成引擎。它要求用户向 Javadoc 语句中添加 @tags，并通过 Ant 生成文件。\n\n• **Struts**：一个使用基于\
  \ Servlet 的模型-视图-控制器（MVC）架构的 Web 应用程序框架。\n\n• **Validator**：一个与 Struts 集成的验证框架。支持客户端（JavaScript）和服务器端验证。\n\
  \n• **Tiles**：一个与 Struts 集成的基于 JSP 的模板框架。\n\n• **JUnit**：一个基于 Java 的回归测试框架。\n\n\
  • **Cactus**：一个用于测试 Web 应用程序的基于 Java 的测试框架。\n\n• **StrutsTestCase**：Cactus 的一个扩展，用于测试\
  \ Struts 的 Action 类。\n\n你在前一章中已经了解了 Struts，并且你可能已经在整本书中看到过对它的引用。这是因为自 2001 年 6 月\
  \ 1.0 版本发布以来，它在 Java 社区中获得了广泛的接受和赞誉。在撰写本文时，Struts 的版本是 1.2.7，并且发展势头强劲。\n\n使用 Struts\
  \ 作为 Web 应用程序基础的最大优势在于，它提供了一套现成的服务，并鼓励你按照已发布的标准和经过验证的设计模式来构建应用程序，这将使你的应用程序具有高度的可扩展性、灵活性和可维护性。\n\
  \n**571**\n\n513-0 ch15.qxd 11/14/05 5:38 PM 第 572 页\n\n**572**\n\n第 15 章 ■ 使用 Struts、XDoclet\
  \ 及其他工具\n\n然而，在本章中，我们不会从头教你 Struts：市面上有很多好书，它们从头开始教你使用 Struts 的基础知识，其深度远超我们一章所能涵盖的内容！如果你想免费获得一个很棒的\
  \ Struts 快速入门教程（谁不想要免费的好东西呢？！），请查看 Ted Husted 的 Struts 网站 (http://husted.com/struts/)\
  \ 上的资源。\n\n相反，在本章中，我们将假设你对如何使用 Struts 有基本的了解，并重点介绍如何通过使用第三方工具（包括 Ant、XDoclet、Validator、Tiles、StrutsGen、Struts\
  \ Menu、Struts Console、Easy Struts、Hibernate 和 StrutsTestCase）来增强基于 Struts 的开发。其理念是向你展示如何使用这些工具更快、更轻松、更经济高效地创建基于\
  \ Struts 的应用程序。为此，你将使用它们来创建一个可以构建和查看简历的示例应用程序。\n\n■**注意** 我们这里没有篇幅来介绍它，但另一个你可能觉得对\
  \ Struts 开发有用的第三方工具是 Struts Builder，它是一个基于 Java Swing 的开发环境，用于协助快速创建基于 Struts 的\
  \ Web 应用程序。可以在 http://sourceforge.net/projects/rivernorth/ 找到它。\n\n在本章的过程中，你将学习\
  \ XDoclet 如何生成 web.xml 部署描述符和 struts-config.xml 文件。我们还将讨论 Struts 的 IDE 工具、异常处理、内置动作、模块、DynaFormBeans\
  \ 和 Struts 标签（包括 JSTL 和 JSP 2.1）。我们将使用 JSP 页面作为视图层，因为这是我们熟悉的（毕竟这本书是关于 JSP 的！）。我们还将涉及使用\
  \ XHTML 和层叠样式表（CSS）的良好实践。\n\n然而，让我们先从 Struts 架构的闪电式快速回顾开始。\n\n**Struts 快速回顾**\n\n\
  **Web 框架**提供了一套可以在许多不同的 Web 应用程序中使用和重用的服务。Struts 是一个基于久经考验的 MVC 设计模式的开源 Web 框架。其核心由\
  \ Java Servlet、JavaBean、资源包、XML 和标签库组成。\n\nStruts 提供以下服务：\n\n• 一个控制器 Servlet\n\n\
  • 现成的标签库\n\n• 一个用于国际化消息的框架\n\n• 一个通用的错误和异常处理机制\n\n• XML 解析\n\n• 文件上传和日志记录工具\n\n\
  513-0 ch15.qxd 11/14/05 5:38 PM 第 573 页\n\n第 15 章 ■ 使用 Struts、XDoclet 及其他工具\n\n\
  **573**\n\nCraig McClanahan 最初编写了 Struts 框架，大部分工作是在 2000 年的阵亡将士纪念日假期完成的！该框架随后由 Craig\
  \ 捐赠给了 Apache 软件基金会。它主要是在一个周末内编写完成的，这应该能让你明白它是一个非常简单的框架。根据我们的经验，它不仅简单，而且一旦你熟悉了它，就很容易使用。\n\
  \n\n\n■**注意** 如果您想了解更多关于 Web 应用程序框架的信息，最佳起点之一是 Craig McClanahan 的博客，网址为 http://blogs.sun.com/roller/page/craigmcc。\n\
  \n您还应该注意，任何可以用 JSP 页面和 Servlet 完成的事情，仍然可以用 Struts 完成。因此，您仍然可以在应用程序中编写扩展 HttpServlet\
  \ 的常规 Servlet，或者使用包含任意嵌入式脚本代码的 JSP 页面。\n\n另一方面，Struts 确实试图鼓励某些更好的 Web 应用程序编码实践，并且它确实使编写和部署它们变得更加容易。例如，使用\
  \ Struts 时，您无需在 Servlet 中编写一大堆 `request.getParameter()` 调用来获取表单的所有值。Struts 通过 ActionForm\
  \ 为您完成这项工作，它负责处理 HTML 表单值的填充和获取。\n\n**Struts 架构**\n\n那么，这些 ActionForm 是如何融入整个 Struts\
  \ 架构的呢？图 15-1 展示了一个简单 Struts 应用程序的总体示意图。\n\n**图 15-1.** *这个 Struts 应用程序的 UML 视图展示了主要组件如何协同工作。*\n\
  \n让我们快速回顾一下此图的特点。\n\n513-0 ch15.qxd 11/14/05 5:38 PM 第 574 页\n\n**574**\n\n第 15\
  \ 章 ■ 使用 Struts、XDOCLET 和其他工具\n\n首先，您可以看到我们假设您使用 JSP 页面作为视图，并且这些页面是使用 Struts 标签库构建的。每个客户端请求应用程序执行特定**操作**时，该请求都会被传递给控制器\
  \ Servlet（称为 ActionServlet），然后由它分派给一个 Action 类。\n\n每个 Action 类都继承自 `org.apache.struts.action.Action`。每个\
  \ Action 通过重写 `execute()` 方法来提供特定于应用程序的实现。执行每个操作（处理每种类型的请求）所需的业务逻辑都位于相应 Action 类的\
  \ `execute()` 方法中。Action 类代表了应用程序的控制器逻辑。它们控制向用户呈现哪些视图元素。例如，如果发生错误，操作负责在输入页面上显示错误信息。\n\
  \n每个操作也可能有一个对应的 ActionForm JavaBean 类。ActionForm 类继承自 `org.apache.struts.action.ActionForm`\
  \ 并重写 `validate()` 方法。每个 ActionForm 验证用户数据，并且 Action 类可以使用它来检索用户数据。ActionForm 类代表了模型的数据。模型是您的数据以及您为检索、保存或删除这些数据而编写的代码。\n\
  \n因此，正如您对控制器的期望，ActionServlet 提供了视图与 Action 和 ActionForm 模型组件之间的链接。为此，它需要根据客户端请求的操作，将请求数据映射到适当的\
  \ Action 和 ActionForm 类。请求操作到 Action 和 ActionForm 类的正确映射在配置文件 `struts-config.xml`（由\
  \ http://struts.apache.org/dtds/struts-config_1_2.dtd 定义）中定义。该文件定义了一组 ActionMapping\
  \ 对象，每个对象代表一个操作到相应模型类的映射。因此，ActionServlet 会检查这个 `struts-config.xml` 文件，以找到当前请求的适当映射。\n\
  \n最后，如果 Action 类正确处理了请求，它会通过向 ActionServlet 传递一个 ActionForward 对象，指示 ActionServlet\
  \ 应将用户转发到何处（通常是一个 JSP 页面）。\n\n有关 Struts 框架架构和实现的更深入信息，您可以参考本章引言中提到的书籍和文章，或者将浏览器指向以下链接：\n\
  \n• http://jakarta.apache.org/struts/：Struts 主页（您可以从此处下载最新版本）\n• http://struts.apache.org/userGuide/index.html：Struts\
  \ 用户指南\n\n正如您可能已经注意到的，使用 Struts 的一大好处是，您可以在不知不觉中实现许多经过验证的 Java EE 设计模式。前端控制器（ActionServlet\
  \ 和 Action）、视图助手（Action）、复合视图（我们稍后将讨论的 Tiles 框架）、服务到工作者（ActionServlet 到 actions）以及调度器视图（ActionForward）都集成到了\
  \ Struts 框架中。根据《Core J2EE Patterns》1 一书，这些都是“表示层模式”一章中提到的所有模式，除了拦截过滤器。\n\nStruts\
  \ 没有整合拦截过滤器模式的唯一原因是为了保持与 Servlet 2.2 规范的向后兼容性（对于 Struts 2.0，有讨论用过滤器替换 ActionServlet）。\n\
  \n1\\. Alur, Deepak, John Crupi, 和 Dan Malks, *Core J2EE Patterns: Best Practices\
  \ and Design Strategies*.\n(Upper Saddle River, NJ: Prentice Hall, 2001)\n\n513-0\
  \ ch15.qxd 11/14/05 5:38 PM 第 575 页\n\n第 15 章 ■ 使用 Struts、XDOCLET 和其他工具\n\n**575**\n\
  \n**Struts 标签库**\n\n大多数 Struts 应用程序似乎都使用 JSP 页面作为应用程序的视图组件。这很可能是因为 Struts 开发人员可以使用丰富的标签库。这些标签使许多事情变得更加容易。如果您曾经开发过纯\
  \ JSP 或 Servlet 应用程序，您可能会记得使用 JavaBeans、`<useBean>` 标签，或者甚至编写大量 `request.getParameter()`\
  \ 调用。Struts 基本上消除了这种需求，并使用其控制器和标签库架构轻松地填充表单。当然，也可以使用其他架构，例如 Velocity 和 XML。但由于我们迄今为止从未在项目中使用过它们，我们认为对其有用性进行评论是不公平的。\n\
  \n■**注意** 有关使用 Velocity 和 XML 或 XSL 渲染视图的更多信息，请访问 http://jakarta.apache.org/velocity/index.html。\n\
  \n在撰写本文时（Struts 1.2.7），Struts 框架内有六个可用的标签库。这些库列在表 15-1 中，并附有对其功能的高级定义。\n\n**表 15-1.**\
  \ *Struts 标签库*\n\n**库**\n\n**功能**\n\nBean 标签\n\n用于与任何给定范围内的 Bean 进行交互的标签。用途包括创建和渲染\
  \ ActionForm 的属性。也用于通过 `<bean:message>` 标签进行国际化。其中许多标签可以用 JSTL 标签替代。\n\nHTML 标签\n\
  \n用于在表单上渲染 HTML 元素的标签。还包含用于渲染上下文相关 URL 的有用标签。JSTL 中没有替代品。不过，使用常规 HTML 标签和 JSP 2.1\
  \ 语法可能更简单。\n\n逻辑标签\n\n用于执行逻辑的标签，例如检查角色是否存在、遍历 Bean 列表以及转发或重定向。其中许多标签可以用 JSTL 标签替代。\n\
  \n嵌套标签\n\n这些标签扩展了前面提到的基本 Struts 标签，但允许它们以嵌套的方式相互关联。JSTL 中没有等效项。\n\nTiles 标签\n\n\
  用于对您的站点执行 JSP“模板化”的标签。对于使用小的、可重用的组件创建应用程序非常有用。我们稍后将更深入地讨论这一点。\n\nStruts EL 标签\n\n\
  一个最近创建的子项目，用于使用 JSTL 中的表达式语言评估引擎。一些 Struts 标签没有被移植，因为其功能已存在于 JSTL 中。\n\n这些标签的在线\
  \ API 文档非常出色（请参阅 Struts 用户指南页面 http://struts.apache.org/userGuide/index.html 上的链接）。此外，最近的书籍（如前所述）在彻底记录这些标签方面做得非常出色。\n\
  \nStruts HTML 标签的一个重要特性是能够渲染符合 XHTML 的标签。这意味着如果您在 JSP 或 Tiles 布局定义的顶部添加 `xhtml=\"\
  true\"`，所有 HTML 标签都将成为格式良好的 XML（即，使用结束标签或尾随 `/>` 闭合）。要\n\n\n\n513-0 ch15.qxd 11/14/05\
  \ 5:38 PM Page 576\n\n**576**\n\n第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具\n\n为了演示，你只需在页面顶部添加以下标签，然后在浏览器中查看源代码：\n\
  \n<html:html xhtml=\"true\"/>\n\n如果你使用 JSP 包含或 Tiles，则可能需要在所包含页面的顶部使用 `<html:xhtml\
  \ />` 标签来强制渲染 XHTML 语法。在撰写本文时，仅支持 XHTML 1.0 Transitional 作为 DOCTYPE。这是因为表单上仍会渲染\
  \ name 属性。XHTML 1.0 Strict 要求仅存在 id 属性。\n\n在将 Struts 标签导入 JSP 页面时，你可以为它们指定任意前缀。例如，以下文件的内容：\n\
  \n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags-bean\" prefix=\"bean\"\
  \ %>\n\n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags-html\" prefix=\"\
  html\" %>\n\n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags-logic\" prefix=\"\
  logic\" %>\n\n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags-tiles\" prefix=\"\
  tiles\" %>\n\n<%@ taglib uri=\"http://java.sun.com/jstl/core\" prefix=\"c\" %>\n\
  \n你可能已经见过这种 Struts 前缀的事实标准。不过，实际上没有理由使用这些冗长的前缀，如果你愿意，也可以像 JSTL 那样使用单字母前缀，例如：\n\n\
  <%@ taglib uri=\"http://jakarta.apache.org/struts/tags-bean\" prefix=\"b\" %>\n\n\
  <%@ taglib uri=\"http://jakarta.apache.org/struts/tags-html\" prefix=\"h\" %>\n\n\
  <%@ taglib uri=\"http://jakarta.apache.org/struts/tags-logic\" prefix=\"l\" %>\n\
  \n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags-tiles\" prefix=\"t\" %>\n\
  \n我们还了解并喜爱另外几个能让 Web UI 开发更轻松的标签库。第一个是 **display 标签库**（http://displaytag.sourceforge.net/），最初由\
  \ Ed Hill 编写，它支持数据列排序和分页，并能与 Struts 良好集成。你只需创建一个 ActionForm 的 List（或其他集合），然后在 JSP\
  \ 中将其传递给标签即可。该标签库还支持将表格数据导出为 Excel、CSV 和 XML 格式。\n\n第二个是 **Struts 菜单标签库**。该组件是一个菜单框架，可用于在\
  \ XML 文件中声明菜单项。它作为插件与 Struts 集成，支持流行的菜单样式（例如 CoolMenus 和符合标准的 DHTML 菜单），并允许根据角色隐藏和显示菜单及菜单项。目前，它支持绝对链接、上下文相关链接以及\
  \ Struts 转发。\n\n这两个标签库都将在本章的应用程序中使用。\n\n要引用 Struts 标签库，你只需将 `struts.jar` 文件放入 `/WEB-INF/lib`\
  \ 目录，并匹配每个标签库的标签描述符（TLD）文件中指定的 URI。我们发现某些 Servlet 容器要求你在 `web.xml` 中声明 TLD 的位置。如果你的\
  \ TLD 文件没有声明要映射的 URI，这也是必要的。在我们的示例 `struts-resume` 应用程序中，`struts-resume.tld` 和 `struts-menu.tld`\
  \ 因此需要在 `web.xml` 中添加条目。\n\nJSP 2.1 允许在 JSP 页面中直接访问 JavaBean 的属性，从而有助于保持代码简洁。以前，你必须使用\
  \ `<c:out value=\"${beanName.propertyName}\"/>`，而现在，JSP 2.1 允许你直接使用 `${beanName.propertyName}`。我们预计\
  \ JSTL 类型的语法以及 Struts 标签仍会存在一段时间，哪怕只是为了向后兼容。\n\n513-0 ch15.qxd 11/14/05 5:38 PM\
