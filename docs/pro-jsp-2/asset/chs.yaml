  在本章后面，我们将向您展示如何在用户登录时以及用户登录前进行 SSL 切换。


  **Java 认证和授权服务**


  您可能想知道**Java 认证和授权服务（JAAS）** 如何融入这一切。JAAS 提供了一个用于认证用户和分配权限的框架和标准编程接口。结合 Java 2，应用程序可以提供以代码为中心的访问控制、以用户为中心的访问控制，或两者的组合。JAAS
  的发明是为了使登录服务独立于认证技术，并允许**可插拔认证模块（PAM）**。大多数现代应用服务器在底层使用 JAAS 来配置容器管理的安全性——您甚至可能在使用它而自己并未察觉！




  当您需要使用复杂的身份验证方案，或向用户授予特定资源的权限（例如，在数据库中插入一行或分配文件的写入权限）时，JAAS 会很有帮助。JAAS 的核心本质上是一种安全机制，允许您通过策略文件指定身份验证和授权。从
  J2SE 1.4 开始，它已成为 Java 不可或缺的一部分。当您使用安全管理器运行应用程序服务器时，会检查策略文件，然后允许用户运行您的应用程序，或提示用户输入凭据。正如我们提到的，JAAS
  确实支持复杂的登录方案，例如 Windows NT 域或智能卡（例如 RSA SecurID）。


  ■**注意** 您可以在 http://java.sun.com/j2se/1.4/docs/guide/security/jaas/JAASRefGuide.html#AppendixB
  找到有关支持的登录方案的更多信息。


  要为您的应用程序设置应用程序服务器以专门使用 JAAS（而不是其自身的身份验证机制），您通常必须选择一个 JAAS 自定义域，然后执行一些额外的步骤。以下步骤在
  Tomcat 5（在 Windows 机器上）上设置一个 JAASRealm，以使用 NT 域进行身份验证。


  最简单的方法是从 http://free.tagish.net/jaas/ 下载 Andy Armstrong 的 JAAS 登录模块。这些模块是专门为使用 Windows
  NT 域进行身份验证而编写的，类似于使 JDBCRealm 在后台工作的辅助类。下载 ZIP 文件后，将下载文件的内容解压到 jaas-modules 目录。在撰写本文时，1.0.3
  版本是最新的可用下载版本。


  下载登录模块后，将 NTSystem.dll 文件复制到 Tomcat 的 bin 目录。将 tagishauth.jar 复制到 Tomcat 的 common\lib
  目录。


