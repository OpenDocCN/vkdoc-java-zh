  \n第 12 章 ■ Web 应用程序中的安全性\n\n**503**\n\n如何检索上下文和初始化参数。以下是 LoginServlet.init()方法，它从\
  \ web.xml 中检索这些值：\n\npublic void init() throws ServletException\n\n{\n\n// 获取基于表单认证的容器认证\
