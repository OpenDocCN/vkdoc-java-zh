  \ `<security-constraint>` 和 `<login-config>` 元素。\n\n**基于表单的身份验证技巧与诀窍**\n\n既然我们已经讨论了如何将基于表单的身份验证与服务器的域一起使用，我们想分享一些技巧和诀窍。其中许多是客户请求或可用性增强，我们认为它们将使开发安全应用程序变得更加容易。\n\
  \n使用欢迎文件\n\n在 Web 应用程序中，配置用户将看到的起始页面非常重要。将以下 `<welcome-file-list>` 元素添加到你的 `web.xml`\
  \ 文件中可以实现这一点：\n\n<welcome-file-list>\n\n<welcome-file>index.jsp</welcome-file>\n\
  \n</welcome-file-list>\n\n在某些应用服务器中，默认的欢迎文件已经配置为 `index.html` 和 `index.jsp`，但指定这一点并提高应用程序的可移植性并无坏处。另外，请注意你的欢迎文件可以使用任意名称命名；你不必将其命名为\
  \ `index.jsp` 或 `index.html`。配置好欢迎文件后，很容易添加几行简单的代码将用户转发到受保护的资源：\n\n<% response.sendRedirect(\"\
  /welcome.do\"); %> Servlet 2.4 规范的一个不错的补充是，你实际上可以将欢迎文件设置为使用一个 servlet；这在早期版本中是无法做到的。也就是说，当使用兼容\
  \ Servlet 2.4 或 Servlet 2.5 的容器时，以下配置将生效：\n\n<welcome-file>/welcome.do</welcome-file>\n\
  \n\n\n当您使用基于表单的身份验证并转发到受保护资源时，您将看到 web.xml 文件中指定的页面——在本章的示例应用中，该页面是 login.jsp。为了让这个页面比单纯的登录表单更友好，我们通常会采取以下措施之一：\n\
  \n• 在此页面上包含欢迎信息\n\n• 通过使用 `<jsp:include>` 从另一个 JSP 页面包含欢迎信息\n\n• 使用诸如 Tiles 或 SiteMesh\
  \ 之类的模板机制，将两个页面以及重定向值中的适当 URL 组合起来\n\n513-0 ch12.qxd 11/17/05 4:15 PM 第 500 页\n\n\
  **500**\n\n第 12 章 ■ WEB 应用安全\n\n■**注意** 您可以在 http://jakarta.apache.org/struts/userGuide/dev_tiles.html\
  \ 和 http://www.opensymphony.com/sitemesh/ 分别找到关于 Tiles 和 SiteMesh 的更多信息。\n\n在错误页面上允许登录\n\
  \n使用 HTTP 基本身份验证时，用户可能会在登录失败时感到沮丧。如果您在使用某些浏览器（例如 Mac 上的 Internet Explorer）时输入了无效凭据，则会返回一个\
  \ HTTP 状态码（401 – 未授权），并在屏幕上显示一条错误消息。Mozilla 通过再次提示您输入有效凭据来处理得更好。这是理想的情况，也是大多数可用性专家所推荐的。基于表单的身份验证的默认行为与前面描述的不良行为类似。\n\
  \n不过，别担心——有几种技术可以帮助解决这个问题。第一种是使用一个 JSP 页面同时提供登录页面和错误页面。第二种是使用 cookie 来捕获请求的 URL\
  \ 并重复使用它。\n\n将同一个页面用作表单登录页面和表单错误页面，只需配置 web.xml 来处理即可：\n\n<form-login-config>\n\n\
  <form-login-page>/login.jsp</form-login-page>\n\n<form-error-page>/login.jsp</form-error-page>\n\
  \n</form-login-config>\n\n这种方法的一个问题是，如果登录失败，用户将再次看到同一个页面——没有任何错误信息。因此，让我们在表单错误页面中添加一个小指示器，以表明登录失败：\n\
  \n<form-error-page>/login.jsp?error=true</form-error-page> 现在，可以在您的 JSP 页面中获取此参数，并在身份验证失败时显示错误消息：\n\
  \n<c:if test=\"${param.error != null}\">\n\n<div class=\"error\">\n\n用户名和/或密码无效，请重试。\n\
  \n</div>\n\n</c:if>\n\n虽然这看起来很简单，但已知在某些容器上会失败。当这种情况发生时，容器仍然符合规范。但是，您可以施展一点小魔法，尝试从错误页面再次登录。\n\
  \n在使用 iPlanet Application Server 6.x 时，该服务器要求在 `<login-config>` 中使用两个独立的页面，我们在浏览器中查看\
  \ login.jsp 的源代码时偶然发现了这个解决方案。HTML 源代码显示了各种有用的信息，特别是作为隐藏字段的原始请求 URL。利用这个隐藏字段，我们能够将此值设置为\
  \ cookie，并在登录错误页面的表单操作中重复使用它。\n\n513-0 ch12.qxd 11/17/05 4:15 PM 第 501 页\n\n第 12\
  \ 章 ■ WEB 应用安全\n\n**501**\n\n■**注意** 您可以在 http://husted.com/struts/resources/fb-auth.htm\
  \ 找到此过程的详细信息。\n\n不幸的是，没有可移植的机制来获取最初请求的 URL，而且甚至无法保证这是可能的。您只知道容器检测到请求了一个受保护的 URL，并且当前没有用户通过身份验证。一种解决方案可能是使用过滤器来跟踪所有最近请求的\
  \ URL，并从中获取最后请求的 URL。您需要确保您的登录表单是一个 `*.jspf`（JSP 片段）文件，这样您就可以将其同时包含在表单登录页面和表单错误页面中。\n\
  \n仅对登录使用安全套接字层\n\n如前所述，使用 SSL 会降低应用程序的性能，因此明智的做法是仅在需要时使用它。SSL 的一个良好用途是在用户登录时。这意味着，当用户名和密码通过网络发送时，使用\
  \ HTTP 协议（http://）访问登录页面的用户将被切换到 HTTPS（https://）。在此示例中，您将使用一个 Login servlet 来处理初始登录请求，切换到\
  \ SSL，然后重定向到容器的身份验证机制。\n\n本书的代码下载附带了一个功能齐全的应用程序，用于演示安全技术。不幸的是，它太长了，无法在此完整列出。在接下来的页面中解释应用程序时，我们会提供摘录。这个应用程序，为简单起见我们称之为\
  \ security-example.war，旨在包含本章描述的所有安全机制。该应用程序的源代码和二进制版本均可下载。您可以通过使用二进制版本并调整 security-example.xml\
  \ 文件和应用程序的 web.xml 文件来完成大部分练习。\n\n**使用 Servlet**\n\n该应用程序提供的第一个功能是基于 SSL 的登录。为了提供这种基于\
  \ SSL 的登录，应用程序有一个 servlet 来拦截登录请求。这个 servlet 被称为 LoginServlet，它映射到一个 `/auth/*` 的\
  \ `<url-pattern>`。然后，您将使用 `auth/`，而不是在登录表单的 action 属性中使用 `j_security_check`。以下是登录页面上的表单样式：\n\
  \n<form id=\"loginForm\" method=\"post\" action=\"auth/\"> 要启用安全登录，您需要编辑此应用程序附带的\
  \ web.xml 文件，将 isSecure 初始化参数设置为 true：\n\n<servlet>\n\n<servlet-name>login</servlet-name>\n\
  \n<display-name>Login Servlet</display-name>\n\n<servlet-class>org.appfuse.webapp.action.LoginServlet</servlet-class>\n\
  \n<init-param>\n\n<param-name>authURL</param-name>\n\n<param-value>j_security_check</param-value>\n\
  \n</init-param>\n\n513-0 ch12.qxd 11/17/05 4:15 PM 第 502 页\n\n**502**\n\n第 12 章\
  \ ■ WEB 应用安全\n\n<init-param>\n\n<param-name>isSecure</param-name>\n\n<param-value>true</param-value>\n\
  \n</init-param>\n\n<init-param>\n\n<param-name>encrypt-password</param-name>\n\n\
