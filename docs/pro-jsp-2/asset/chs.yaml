  \n为专业人士打造™\n\n加入 Apress 论坛，成为我们社区的一员。您将找到涵盖 IT 专业人士、程序员和爱好者感兴趣主题的讨论。如果您在我们的某个论坛上发布问题，可以期待业内一些最优秀的人才——尤其是\
  \ Apress 的作者，他们都以 *专家之声*™ 写作——会来帮助您。何不努力成为我们最有价值的参与者（MVP）并赢取酷炫奖品？以下是一些您会发现的内容示例：**数据库**\n\
  \n**编程/商业**\n\n数据驱动一切。\n\n不幸的是，确实如此。\n\n分享信息、交流想法，并讨论任何有关数据库编程或管理的问题。\n\n讨论 Apress\
  \ 系列书籍，内容涵盖软件编程方法论、最佳实践，以及程序员如何与“管理层”互动。\n\n**互联网技术与网络**\n\n**Web 开发/设计**\n\n尝试没有管道的生活（最终还有\
  \ IPv6）。\n\n丑陋已经行不通了，CGI 也荒谬可笑。\n\n讨论网络相关主题，包括协议、设计、管理、无线、有线、存储、备份、认证、趋势和新技术。\n\n\
  您的网站有救了。为您的项目寻找设计方案，并获得构建交互式网站的想法。\n\n**Java**\n\n**安全**\n\n我们从古老的 Oak 树一路走来，已经走了很远。\n\
  \n外面坏人很多——好人需要帮助。\n\n在这里畅谈您喜欢的任何 Java 版本：J2SE、J2EE、J2ME、Jakarta 等等。\n\n在这里讨论计算机和网络安全问题。只是别让其他人知道答案！\n\
  \n**Mac OS X**\n\n**技术实践**\n\n关于 OS X 的禅意。\n\n酷炫的东西。有趣的东西。\n\nOS X 既是 Mac 应用的现在，也是未来。提出建议、分享想法，或炫耀您的新硬件。\n\
  \n这是业余时间。是时候玩了。无论您是喜欢 LEGO® MINDSTORMS™ 还是想把旧 PC 变成 DVR，这里都是技术变成乐趣的地方。\n\n**开源**\n\
  \n**Windows**\n\n源代码很好；理解（开放）源代码更好。\n\n这里没有窗户被扔出去。\n\n讨论开源技术及相关主题，如 PHP、MySQL、Linux、Perl、Apache、Python\
  \ 等。\n\n提出关于 Windows 编程各个方面的问题，获取 Apress 书籍中涵盖的 Microsoft 技术的帮助，或对任何 Apress Windows\
  \ 书籍提供反馈。\n\n如何参与：\n\n访问 Apress 论坛网站：**http://forums.apress.com/**。\n\n点击“新用户”链接。\n\
