  \n`import=\"package.class, package.*, ...\"`\n\n`session=\" **true**|false\"`\n\n\
  **URL 规范**\n\n在 JSP 标签内指定的 URL 可以分为两种：\n\n**• 上下文相关**路径以“/”开头；基础 URL 由 JSP 所属的 Web\
  \ 应用程序提供。例如，在托管于 http://localhost:8080/projsp-appendixA/ 的 Web 应用程序中，URL `/pageurl.jsp`\
  \ 等同于 http://localhost:8080/projsp-appendixA/pageurl.jsp。\n\n\n\n**• 页面相对**路径是相对于它们所在的\
  \ JSP 页面的路径。与上下文相对路径不同，页面相对路径不以“/”开头。例如，托管在 http://localhost:8080/projsp-appendixA/morespecs/urlspec.jsp\
  \ 的页面应用可能会给出一个页面路径为 subfolder/urlspec.jsp，这相当于 http://localhost:8080/projsp-appendixA/morespecs/subfolder/urlspec.jsp。\n\
