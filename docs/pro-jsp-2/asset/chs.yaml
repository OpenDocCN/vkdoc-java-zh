  \ 及其他工具\n\n并用于生成 validation.xml 文件。我们之所以这样做，是因为它允许我们轻松地向表中添加新列。在我们上一个项目中，我们使用了验证器表单、值对象和\
  \ DAO，如果向表中添加新列，我们必须在两个地方（表单和 POJO）添加 getter 和 setter，并且还要更改 DAO 中的 SQL。\n\n使用 XDoclet\
  \ 和 Hibernate 消除了这个麻烦——尤其是因为 Hibernate 可以生成模式并为你构建数据库。我们编写了一个 db-create Ant 任务来自动执行此表创建操作。\n\
  \ntools 目录包含由 Erik Hatcher 编写的 StrutsGen 工具。该工具使用 Ant 和 XDoclet 从 ActionForm 生成一个\
  \ JSP 骨架和一个关联的属性文件，极大地加速了应用程序开发。\n\nweb 目录包含所有与 Web 相关的文件：图片、JavaScript 文件、CSS 文件、属性文件和\
  \ XML 配置文件。它包含这些文件的大部分独立目录，以及一个 WEB-INF/classes 目录。pages 目录中的 JSP 文件在部署时会被复制到 WEB-INF\
  \ 目录。\n\n■**提示** 顺便提一下，此应用程序是使用 AppFuse (http://raibledesigns.com/wiki/Wiki.jsp?page=Downloads)\
  \ 作为基线创建的，我们建议你在开发自己的基于 Struts 的应用程序时也使用它。它已经内置了目录布局、用于编译、测试和部署的构建脚本，以及用于生成 XML\
  \ 文件的 XDoclet 片段。下载后，只需执行 `ant new -Dapp.name=yourAppName -Ddb.name=yourDBName`。请随意删除你认为不必要的文件。\n\
  \n**Struts 开发技巧与工具**\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\
  \n现在，我们已经回顾了典型 Struts 应用程序的架构，并概述了一个示例 struts-resume 应用程序，接下来让我们审视一些您可能尚未了解的技术、工具和框架，它们可以增强或加速您的\
  \ Struts 应用程序开发。我们将重点关注 Struts 1.2 版本及其高级特性。\n\nStruts 为开发者提供了许多出色的特性、扩展和插件。其中一些插件起初可能看起来令人生畏，因为它们功能非常强大且配置极其灵活。当我们初次发现其中一些插件时，我们不禁自问：“这是谁把厨房水槽都搬来了？”\
  \ 然而，如果您只需要它们的一小部分功能，那么只使用那一小部分也完全没问题。\n\n我们将首先介绍两个可用于构建和生成代码的开源工具：Ant 和 XDoclet。然后，我们将探讨一系列在编写代码时可以使用的技术或工具。\n\
  \n**使用 Ant 构建 Struts 应用程序**\n\nApache Ant（可从 http://ant.apache.org/ 获取）是一个基于 Java\
  \ 的强大构建工具。\n\n使用 Ant 将使您的编译、组装或部署过程变得更加容易。\n\nAnt 是我们迄今为止最喜欢的、与 Struts 和整个 Java\
  \ 配合使用的工具。然而，我们遇到过太多开发者要么没听说过它，要么没有使用它。*JavaWorld* 的读者将其评为\n\n513-0 ch15.qxd 11/14/05\
  \ 5:38 PM Page 583\n\n第 15 章 ■ 使用 Struts、XDoclet 及其他工具\n\n**583**\n\n2002 年“最有用的\
  \ Java 社区开发技术”。此外，在 2003 年，它赢得了 *JavaPro* 读者选择奖的“最有价值的 Java 部署技术”奖项。在 2003 年和 2004\
  \ 年，它获得了 *Java Developer's Journal* 编辑选择奖。最后，在 2003 年，它赢得了 *JavaWorld* 编辑选择奖的“最有用的\
  \ Java 社区开发技术”奖项。\n\n如果它未来继续获奖，我们也不会感到惊讶。我们过去曾受困于 IDE 的局限来编译代码，而现在使用了 Ant，我们感觉像是被解放了一样。\n\
  \nAnt 本质上是一种技术，其核心是使用构建文件（通常命名为 build.xml）将您的 .java 文件编译成 .class 文件。使用 Ant，配置用于编译文件的类路径要容易得多，如下例所示：\n\
  \n<!-- 设置一个指向所有 Struts JAR 文件的路径引用 -->\n\n<path id=\"web.compile.classpath\">\n\n\
  <fileset dir=\"/lib/jakarta-struts-1.1\" includes=\"*.jar\"/>\n\n</path>\n\n<target\
  \ name=\"compile\" description=\"将 .java 文件编译成 .class 文件\">\n\n<mkdir dir=\"${build.dir}/web/classes\"\
  />\n\n<javac srcdir=\"src/web\"\n\ndestdir=\"${build.dir}/web/classes\"\n\ndebug=\"\
  false\"\n\ndeprecation=\"true\"\n\noptimize=\"true\"\n\nclasspathref=\"web.compile.classpath\"\
  \n\n/>\n\n</target>\n\n上述代码片段中的 `<path>` 元素告诉 Ant 构建一个名值对，名称为 `web.compile.classpath`；其值被构建为\
  \ `/lib/Jakarta-struts-1.1` 目录中所有 JAR 文件的列表。通过一个简单的声明性语句，Ant 就为您创建了编译类路径。\n\n对于本章的示例应用程序，需要\
  \ Ant 1.5.1（或更高）版本。下载后，您需要将其解压到硬盘上的某个位置（例如，Windows 上的 `c:\\Tools\\jakarta-ant-1.5.1`，或\
  \ Linux 和 Unix 上的 `/usr/local/jakarta-ant-1.5.1`）。解压后，您需要将 `ANT_HOME` 设置为指向此解压位置的环境变量，并将\
  \ `$ANT_HOME/bin` 添加到您的 `$PATH` 环境变量中。\n\nAnt 任务\n\n执行 `ant -projecthelp` 将显示基本的\
  \ Ant 任务，但以下是您最常使用的任务：\n\n*   `ant deploy`：生成并编译所有内容，然后部署到 Tomcat（如果您已安装）。\n*  \
  \ `ant compile-module`：其中 `module` 是 `ejb`、`web` 或 `common`。\n*   `ant ejbdoclet`：生成\
  \ ValidatorForms 和 Hibernate 的基于 XML 的映射文件。\n*   `ant webdoclet`：生成 `web.xml`、`struts-config.xml`、`validation.xml`\
  \ 和 TLD。\n\n513-0 ch15.qxd 11/14/05 5:38 PM Page 584\n\n**584**\n\n第 15 章 ■ 使用 Struts、XDoclet\
  \ 及其他工具\n\n*   `ant test-module`：其中 `module` 的值可能与前面提到的 `compile` 选项的值相同。这会递归运行\
  \ `test/module` 目录中的所有测试。我们建议使用 `ant test-module -Dtestcase=ClassName`，其中 `ClassName`\
  \ 是您的测试类的名称。\n*   `ant test-cactus -Dtestcase=ClassName`：在运行测试之前启动 Tomcat，并在测试完成后停止它。如果\
  \ Tomcat 已经在运行，请使用 `ant test-web -Dtestcase=ClassName`。\n\nstruts-resume 中的许多第三方库要求您为它们定义一个*任务定义*，以便与\
  \ Ant 集成。例如，要使用 XDoclet 生成 Struts 配置文件 `struts-config.xml`，您必须定义 `\"webdoclet\"\
  ` 任务：\n\n<taskdef name=\"webdoclet\"\n\nclassname=\"xdoclet.modules.web.WebDocletTask\"\
  >\n\n<classpath>\n\n<path refid=\"xdoclet.classpath\"/>\n\n<path refid=\"web.compile.classpath\"\
  />\n\n</classpath>\n\n</taskdef>\n\n定义此任务后，它就可以像使用 `<javac>` 任务（参见前面的示例）一样，在您的 `build.xml`\
  \ 文件中使用。您可以在“使用 XDoclet 生成配置文件”一节中看到此任务的可用属性。\n\n在示例应用程序中使用 Ant\n\n在 struts-resume\
  \ 中，Ant 执行以下所有任务：\n\n*   生成 Java 代码和 XML 文件（通过 XDoclet）\n*   构建（编译）整个源代码树（.java\
  \ 文件）\n*   将组件组装成 JAR 和 Web 归档（WAR）文件\n*   将 WAR 文件部署到 Tomcat\n*   运行单元测试和容器内测试（通过\
  \ Cactus）\n\nAnt 是我们钟爱的技术之一，因为它*就是能正常工作*。我们在 struts-resume 应用程序中建模了 `build.xml`\
  \ 文件，以符合 Erik Hatcher 在其著作 *Java Development with Ant*² 中推荐的 Ant 最佳实践。我们大量借鉴了他书中示例应用程序的架构，并就此与他交换了许多电子邮件。将测试源代码目录（`test/src`）与常规源代码目录（`src`）分开所带来的灵活性，使得在生产部署中排除测试类变得非常容易。\n\
  \n最后，对我们来说，Struts 一直是一个非常稳定的框架——即使是每日构建版本也是如此。当您查看示例应用程序的 Ant 构建文件时，您会发现我们创建它的方式使得您可以轻松切换任何第三方库（包括\
  \ Struts）的版本。您所需要做的就是下载一个新版本并将其解压到 `lib` 目录，然后更改 `lib/lib.properties` 中给出的版本号。这确实使得测试库的新版本并查看您的应用程序是否仍然正常工作变得非常容易。您还可以使用类似\
  \ `ant -Dstruts-dir=/path/to/struts/jars` 的命令从命令行覆盖库目录。\n\n**使用 XDoclet 生成配置文件**\n\
  \nXDoclet 是一个代码生成引擎。它为 Java 实现了**面向属性的编程**。简而言之，这意味着您可以通过向 Java 源代码添加元数据（属性）来为代码增加更多意义。这是通过特殊的\
  \ JavaDoc 标签完成的。XDoclet 将解析您的源文件，并从中生成许多工件，例如 XML 描述符和/或源代码。\n\n这些文件是根据模板生成的，这些模板使用了源代码及其\
  \ Javadoc 标签中提供的信息。在撰写本文时，XDoclet 只能作为利用 Ant 的构建过程的一部分来使用。XDoclet 的文档和下载可从 http://xdoclet.sourceforge.net/\
  \ 获取。\n\n\n\n在构建过程中，你将利用 Ant 和 XDoclet 的强大功能来生成部署描述符（web.xml）、Struts 配置文件（struts-config.xml），甚至表单验证配置文件（validation.xml）。为了加速开发过程，你还会使用\
  \ XDoclet 从 POJO 生成 ValidatorForms 的 Java 代码。此外，你将生成 Hibernate 基于 XML 的映射文件，以将 POJO\
  \ 映射到数据库表。\n\n哇，听起来我们要做很多事情，不是吗？！事实上，在我们发现 XDoclet 之前，我们手动完成所有这些活动，那*确实*是一项繁重的工作。使用\
  \ XDoclet（它依赖于 Ant）使得为 Web 应用程序创建所有必需的 XML 工件变得*非常*容易，并且大大节省了时间。\n\n我们喜欢使用 XDoclet，因为在开发应用程序时，我们无需过多担心编辑\
  \ XML 文件。只需在类（或方法）的 Javadoc 中添加一些标签，然后 XDoclet 就会为你生成这些文件。例如，我们在 UserAction 类的顶部有以下普通的\
  \ Javadoc 代码：\n\n/**\n\n* Implementation of <strong>Action</strong> that interacts\
  \ with the {@link\n\n* UserForm} to retrieve/persist values to the database.\n\n\
  *\n\n* @author Matt Raible\n\n* @version $Revision: 1.5 $ $Date: 2003/06/26 13:48:46\
  \ $\n\n*\n\n*/\n\n通过向此 Javadoc 头部添加一些 XDoclet 标签，你可以为 struts-config.xml 文件生成 <action-mappings>\
  \ 定义：\n\n/**\n\n* Implementation of <strong>Action</strong> that interacts with\
  \ the {@link\n\n* UserForm} and retrieves values. It interacts with the {@link\n\
  \n* BusinessManager} to retrieve/persist values to the database.\n\n*\n\n* @author\
