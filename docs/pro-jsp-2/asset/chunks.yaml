  raw: '• **Avoid thread synchronization and single-threading.** Synchronizing methods
    and blocks of code can make a JSP application behave as if it is single-threaded,
    and this results in lower throughput. It’s important that JSP pages and servlets
    are thread-safe, so don’t be tempted to use the isThreadSafe=false page directive.
    When you write a servlet, don’t be tempted to implement the javax.servlet.SingleThreadModel
    interface.


    (In fact, as of Servlet 2.4, the SingleThreadModel interface is deprecated.)


    • **Avoid use of** System.out.println()**.** The seemingly harmless System.out.println()
    method is actually pretty harmful. According to the IBM white paper, “Because
    System.out.println() statements and similar constructs synchronize processing
    for the duration of disk I/O, they can significantly slow throughput.” Instead
    of using System.out and System.err, consider using a logging system such as log4j.


