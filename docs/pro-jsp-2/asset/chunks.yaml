- fmt: "# Appendix A: JavaServer Pages Syntax Reference\n\n## Inclusion- and Forward-Related\
    \ Attributes\n\nThese attributes apply when a servlet or JSP is accessed via a\
    \ `<jsp:include>`, `RequestDispatcher.include()`, or `RequestDispatcher.forward()`\
    \ like so:\n\n```java\nrequest.getRequestDispatcher(\"servlet_path/myservlet\"\
    ).forward(req, res);\n```\n\n### `javax.servlet.include.request_uri`\n\n`javax.servlet.include.request_uri`\
    \ is a request attribute of type `String` containing the URI under which this\
    \ included servlet or JSP is being accessed.\n\n```java\nString reqURI = (String)\
    \ request.getAttribute(\n    \"javax.servlet.include.request_uri\");\n```\n\n\
    ### `javax.servlet.include.context_path`\n\n`javax.servlet.include.context_path`\
    \ is a request attribute of type `String` containing the context path of the URI\
    \ under which this included servlet or JSP is being accessed.\n\n```java\nString\
    \ contextPath = (String) req.getAttribute(\n    \"javax.servlet.include.context_path\"\
    );\n```\n\n### `javax.servlet.include.path_info`\n\n`javax.servlet.include.path_info`\
    \ is a request attribute of type `String` containing the path info of the URI\
    \ under which this included servlet or JSP is being accessed.\n\n```java\nString\
    \ pathInfo = (String) req.getAttribute(\n    \"javax.servlet.include.path_info\"\
    );\n```\n\n### `javax.servlet.include.servlet_path`\n\n`javax.servlet.include.servlet_path`\
    \ is a request attribute of type `String` containing the servlet path of the URI\
    \ under which this included servlet or JSP is being accessed.\n\n```java\nString\
    \ pathInfo;\nif(req.getAttribute(\"javax.servlet.include.servlet_path\") != null)\
    \ {\n    pathInfo = (String)req.getAttribute(\"javax.servlet.include.path_info\"\
    );\n}\n```\n\n### `javax.servlet.include.query_string`\n\n`javax.servlet.include.query_string`\
    \ is a request attribute of type `String` containing the query string of the URI\
    \ under which this included servlet or JSP is being accessed.\n\n```java\nString\
    \ reqQueryString = req.getAttribute(\n    \"javax.servlet.include.query_string\"\
    );\n```\n\n## Servlet Error Page Attributes\n\nThese attributes are only available\
    \ within an error page declared in `web.xml`.\n\n### `javax.servlet.error.status_code`\n\
    \n`javax.servlet.error.status_code` is a request attribute of type `Integer` containing\
    \ the status code of the servlet or JSP that caused the error.\n\n```java\nInteger\
    \ statusCode = (Integer) req.getAttribute(\n    \"javax.servlet.error.status_code\"\
    );\nString error = \"HTTP Status Code - \" + statusCode.intValue();\nreturn error;\n\
    ```\n\n### `javax.servlet.error.exception_type`\n\n`javax.servlet.error.exception_type`\
    \ is a request attribute of type `Class` that contains the type of the exception\
    \ thrown by the servlet or JSP. It's now redundant with the introduction of the\
    \ `javax.servlet.error.exception` attribute.\n\n```java\nException e = (Exception)\
    \ req.getAttribute(\n    \"javax.servlet.error.exception_type\");\n```\n\n###\
    \ `javax.servlet.error.message`\n\n`javax.servlet.error.message` is a request\
    \ attribute of type `String` containing the message contained within the exception\
    \ thrown by the servlet or JSP. It's now redundant with the introduction of the\
    \ `javax.servlet.error.exception` attribute.\n\n```java\nString statusCode = (String)\
    \ req.getAttribute(\n    \"javax.servlet.error.status_code\");\nString message\
    \ = (String)req.getAttribute(\"javax.servlet.error.message\");\nif (message ==\
    \ null) {\n    message = \"Unknown error\";\n}\n```\n\n### `javax.servlet.error.exception`\n\
    \n`javax.servlet.error.exception` is a request attribute of type `Throwable` containing\
    \ the exception thrown by the servlet or JSP.\n\n```java\npublic void doGet(HttpServletRequest\
    \ req, HttpServletResponse res)\n    throws ServletException, IOException {\n\
    \    PrintWriter out = res.getWriter();\n    Throwable throwable = (Throwable)\
    \ req.getAttribute(\n        \"javax.servlet.error.exception\");\n}\n```"
