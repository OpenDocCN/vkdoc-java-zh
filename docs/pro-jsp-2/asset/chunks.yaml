    using WebTest, you can just view source in your browser and save the HTML to a
    directory. Then you can upload it to the W3C’s Validator (http://validator.w3.org)
    to ensure the HTML complies with the specified DOCTYPE. We usually create a “sandbox”
    directory in our project’s directory where we can put these HTML


    files for validation and other quick fixes. Sometimes it’s nice to work with a
    static HTML version. What we do is change the absolute path for all our stylesheets,
    JavaScript, and images in order to use a relative path. In the struts-resume project,
    this would entail changing


    /struts-resume/ to ../web/.


    Once you’ve validated your application and tested it thoroughly, you’ll be much
    more confident that it works and therefore more likely to produce quality software.
    Hopefully, with the examples we’ve put together, the hard work of writing tests
    is over. Writing tests might seem like a pain, but that’s only if you’re writing
    your actual code first. Try writing your test


    513-0 ch15.qxd 11/14/05 5:38 PM Page 626


    **626**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    cases first next time, we think you’ll find them most enjoyable. There’s nothing
    like writing an application that works the first time you run it in a browser
    (thanks to the unit tests, of course).


    **Handling Exceptions in Struts Applications**


    Struts 1.1 made it much easier to handle exceptions in a Struts application. A
    popular rule in software development is that “if something goes wrong, you should
    tell the user about it.” This can become quite complicated in a web application
    that uses MVC and business objects to talk to a database. Exceptions can be thrown
    at any level, in your data access code, in your Action classes, in your business
    objects, or even in your JSP pages.


    What we’ve done in the past was to use a try...catch in both our Action classes
    and in our business objects and then “bubble” any exceptions up to the top. This
    is ugly and can result in the user being presented with a message such as column
    street_address not found.


    Furthermore, in our Action classes, we’ve caught our business-level exceptions,
    wrapped them in a ServletException, and thrown them to the client. We have an
    error page configured in web.xml as well as on our JSP pages, which the client
    is directed to in the event of an error.


    Even though we’re going to show you a better way to handle exceptions with Struts,
    we still think it’s important to configure your JSP pages and web.xml to deal
    with uncaught exceptions. You should add an entry to web.xml for when the server
    throws a HTTP Status Code 500, the dreaded Internal Server Error:


    <error-page>


    <error-code>500</error-code>


    <location>/error.jsp</location>


    </error-page>


    Alternatively, you can use <exception-type> rather than an HTTP status code or
    error code:


    <error-page>


    <exception-type>java.lang.Throwable</exception-type>


    <location>/error.jsp</location>


    </error-page>


    You can also add both of them, just to be safe. When using XDoclet, you can specify
    these entries in an error-pages.xml file in your merge directory. We usually declare
    an errorPage in our JSP pages as well:


    <%@ page language="java" errorPage="/error.jsp" %> In the struts-resume example
    application, this line only exists in the common/taglibs.jsp file. Adding these
    entries will basically prevent users from ever seeing a stack trace of the exception—providing
    that you’ve written your error.jsp appropriately. For an advanced error page,
    you might even configure it to e-mail an administrator when it’s displayed to
    users (or use log4j’s SMTP Logger). We’ve seen the 500 Internal Server Error more
    than we’ve seen the classic 404 error in recent years. Adding a pretty face onto
    these errors can make everyone’s life a little more pleasant.


    The real hope is that an error page will never be displayed. As a savvy web user,
    if it does get displayed, we’d like to see exactly what went wrong—the SQL details.
    Of course, this will depend


    513-0 ch15.qxd 11/14/05 5:38 PM Page 627


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **627**


    on your application’s security requirements. If your application is open for attack
    (resides on the Internet rather than an intranet), you might want to suppress
    messages that give any database information. At the same time, not all your users
    will want to see the nitty-gritty details of exceptions, and therefore, we recommend
    you aim for more user-friendly messages.


    Chained Exceptions


    In our opinion, a well-developed application should catch error messages, turn
    them into friendly messages, and then return the user to the last page they viewed
    successfully. At the same time, it would be nice to add a technical message as
    well, for those savvy users (or developers) who want to know the exact cause of
    the problem and may be able to avoid it. To achieve this, the first thing you
    can do is to use **chained exceptions**. The traditional Java exception mechanism
    only allows you to throw one exception. This presents a problem in a layered architecture
    where exceptions can occur at each layer.


    Of course, you can wrap exceptions, as we’ve done with a ServletException, but
    this might result in a loss of detail in the end. Ted Husted described the solution
    best in one of his Struts Tips. Rather than trying to manipulate his words to
    sound like we came up with the idea, it’s easiest to quote him (see http://husted.com/struts/tips/015.html):
    *What we really need to do is “stack” or “chain” the exceptions, so that each
    layer can add* *its own viewpoint to the incident. Then, at the end, display them
    all, with the originating exception at the bottom of the list.*


    *This approach works surprisingly well in a layered architecture. The “topmost”
    layer is*


    *“closest” to the user, and so throws the most “user-friendly” exceptions. The
    “lowest” layer* *throws the “geek-friendly” errors that we need to solve the problem.
    When we chain* *exceptions by linking them together, the user-friendly message
    comes first, followed by* *the more detailed messages. The user is told what they
    need to know first, and can leave* *the rest to the system administrators.*


    Starting with JDK 1.4, the java.lang.Exception class has a getCause() method that
    allows you to find the original cause of each exception. To use this properly,
    you’ll need to throw the exceptions that occurred from each tier, rather than
    just catching an exception and throwing it with a message. By this, we mean to
    say that it’s better to have this: try {


    ...


    } catch (Exception e) {


    throw new DAOException("Error occurred connecting to database", e);


    }


    rather than just throwing the message:


    try {


    ...


    } catch (Exception e) {


    throw new DAOException("Error occurred connecting to database");


    }


