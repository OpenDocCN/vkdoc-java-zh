    5-23, we show only the new method, and the import needed for the class to compile.
    Because you tell the JSF implementation which method to call by using a method-binding
    expression, the value changed method can have any name you want to give it. The
    only requirements for the method signature are that the method must be public,
    must return void, and must accept a ValueChangeEvent as the only parameter.


    **Listing 5-23.** *typeChanged() method of Flight Search.java*


    ...


    import javax.faces.event.ValueChangeEvent;


    ...


    public class FlightSearch {


    ...


    public FlightSearch() {


    setTripType("Roundtrip");


    }


