- fmt: '■**Note** If you’d like to read more about the web application frameworks,
    one of the best places to start is Craig McClanahan’s blog at http://blogs.sun.com/roller/page/craigmcc.


    You should also note that anything that can be done with JSP pages and servlets
    can still be done with Struts. So you can still write regular servlets that extend
    `HttpServlet` in your application or have JSP pages with whatever embedded scriplet
    code you want.


    On the other hand, Struts does try to encourage certain better practices for coding
    web applications, and it does make it easier to write and deploy them. For instance,
    when using Struts, you don’t need to write a whole slew of `request.getParameter()`
    calls in your servlet to get all your form’s values. Struts does this for you
    with an `ActionForm`, which handles the population and grabbing of an HTML form’s
    values.


    ## Struts Architecture


    So how do these `ActionForm`s fit into the overall Struts architecture? Figure
    15-1 shows a schematic of a simple Struts application in general.


    **Figure 15-1.** *This UML view of a Struts application shows how the primary
    components fit together.*


    Let’s quickly review the features of this diagram.


    First, you can see that we’ve assumed that you’re using JSP pages for the view,
    and that these are built using the Struts tag libraries. Each client request for
    the application to perform a particular action is passed to the controller servlet
    (known as the `ActionServlet`), which dispatches to an `Action` class.


    Each `Action` class extends `org.apache.struts.action.Action`. Every `Action`
    provides application-specific implementation by overriding the `execute()` method.
    The business logic needed to perform each action (process each type of request)
    is present in this corresponding `Action` class in the `execute()` method. The
    `Action` classes represent the controller logic for your application. They control
    which view elements are presented to the user. For instance, if an error occurs,
    the action is responsible for displaying errors on an input page.


    There also may be a corresponding `ActionForm` JavaBean class for each action.
    The `ActionForm` class extends `org.apache.struts.action.ActionForm` and overrides
    the `validate()` method. Each `ActionForm` validates user data and can be used
    by the `Action` class to retrieve user data. The `ActionForm` classes represent
    the data of the model. The model is your data and the code you write to retrieve,
    save, or delete that data.


    So, as you would expect from the controller, the `ActionServlet` provides the
    link between the view and the `Action` and `ActionForm` model components. To do
    this it needs to map the request data to the appropriate `Action` and `ActionForm`
    classes, depending upon the action requested by the client. The correct mapping
    of request actions to `Action` and `ActionForm` classes is defined in a configuration
    file, `struts-config.xml` (defined by http://struts.apache.org/dtds/struts-config_1_2.dtd).
    This file defines a set of `ActionMapping` objects that each represents a mapping
    of an action to the appropriate model classes. Therefore, the `ActionServlet`
    checks this `struts-config.xml` file to find the appropriate mapping for the current
    request.


    Finally, if the `Action` class processes the request correctly, it indicates to
    the `ActionServlet` where the user should be forwarded to (usually a JSP page),
    by passing the `ActionServlet` an `ActionForward` object.


    For more in-depth information about the architecture and implementation of the
    Struts framework, you can refer to the books and article referred to in the introduction
    to this chapter, or try pointing your browser to the following links:


    - http://jakarta.apache.org/struts/: Struts homepage (you can download the latest
    version from here)

    - http://struts.apache.org/userGuide/index.html: Struts user guide


    As you may have spotted already, a big benefit of using Struts is that you implement
    many proven Java EE design patterns without even knowing it. The Front Controller
    (`ActionServlet` and `Action`), View Helper (`Action`), Composite View (the Tiles
    framework that we’ll discuss later), Service to Worker (`ActionServlet` to actions),
    and Dispatcher View (`ActionForward`) are all integrated into the Struts framework.
    From the book *Core J2EE Patterns,* these are all the patterns mentioned in the
    “Presentation Tier Patterns” chapter, save the Intercepting Filter.


    The only reason that Struts doesn’t incorporate the Intercepting Filter pattern
    is to maintain backward compatibility with the Servlet 2.2 specification (and
    for Struts 2.0, there is talk of replacing the `ActionServlet` with a filter).


    ## Struts Tag Libraries


    Most Struts applications seem to use JSP pages for the view component of the application.
    This is most likely due to the rich set of tag libraries that are available to
    Struts developers. These tags make several things much easier. If you’ve ever
    developed a pure JSP or servlet application, you’ll probably remember using JavaBeans,
    the `<useBean>` tag, or perhaps even writing a lot of `request.getParameter()`
    calls. Struts basically eliminates this need and easily populates forms using
    its controller and tag library architecture. Of course, other architectures, such
    as Velocity and XML, can be used. But since we’ve never implemented them on a
    project to date, we don’t feel it’s fair to comment on their usefulness.


    ■**Note** More information on using Velocity and XML or XSL for rendering your
    view can be found at http://jakarta.apache.org/velocity/index.html.


    At the time of this writing (Struts 1.2.7), there are six available tag libraries
    within the Struts framework. These libraries are listed in Table 15-1, coupled
    with a high-level definition of their function.


    **Table 15-1.** *Struts Tag Libraries*


    | Library | Function |

    |---------|----------|

    | Bean tags | Tags to interact with beans in any given scope. Uses include creating
    and rendering an `ActionForm`’s properties. Also used for internationalization
    with the `<bean:message>` tag. Many of these tags can be replaced with JSTL tags.
    |

    | HTML tags | Tags to render HTML elements on a form. Also contains helpful tags
    for rendering context-sensitive URLs. No replacement in the JSTL. Using regular
    HTML tags and JSP 2.1 syntax may be easier though. |

    | Logic tags | Tags to perform logic such as checking for the presence of roles,
    iteration of bean lists, and forward or redirects. Many of these tags can be replaced
    with JSTL tags. |

    | Nested tags | These tags extend the basic Struts tags mentioned earlier, but
    allow them to relate to each other in a nested nature. No equivalent in the JSTL.
    |

    | Tiles tags | Tags to perform JSP “templating” of your site. Very useful for
    creating applications from small, reusable components. We’ll discuss this in more
    depth a little later. |

    | Struts EL tags | A subproject that was recently created to use the expression
    language evaluation engine from the JSTL. Some of the Struts tags weren’t ported,
    as their functionality already exists in JSTL. |


    The online API documentation for these tags is excellent (refer to the links available
    from the Struts User Guide page at http://struts.apache.org/userGuide/index.html).
    Also, recent books (as mentioned earlier) have done a terrific job of documenting
    these tags thoroughly.


    One significant feature of the Struts HTML tags is the ability to render XHTML-compliant
    tags. This means that if you add `xhtml="true"` to the top of your JSP or Tiles
    layout definition, all HTML tags will be well-formed XML (that is, closed with
    an end tag or trailing `/>`).'
  raw: '■**Note** If you’d like to read more about the web application frameworks,
    one of the best places to start is Craig McClanahan’s blog at http://blogs.sun.com/roller/page/craigmcc.


    You should also note that anything that can be done with JSP pages and servlets
    can still be done with Struts. So you can still write regular servlets that extend
    HttpServlet in your application or have JSP pages with whatever embedded scriplet
    code you want.


    On the other hand, Struts does try to encourage certain better practices for coding
    web applications, and it does make it easier to write and deploy them. For instance,
    when using Struts, you don’t need to write a whole slew of request.getParameter()
    calls in your servlet to get all your form’s values. Struts does this for you
    with an ActionForm, which handles the population and grabbing of an HTML form’s
    values.


    **Struts Architecture**


    So how do these ActionForms fit into the overall Struts architecture? Figure 15-1
    shows a schematic of a simple Struts application in general.


    **Figure 15-1.** *This UML view of a Struts application shows how the primary
    components fit* *together.*


    Let’s quickly review the features of this diagram.


    513-0 ch15.qxd 11/14/05 5:38 PM Page 574


    **574**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    First, you can see that we’ve assumed that you’re using JSP pages for the view,
    and that these are built using the Struts tag libraries. Each client request for
    the application to perform a particular **action** is passed to the controller
    servlet (known as the ActionServlet), which dispatches to an Action class.


    Each Action class extends org.apache.struts.action.Action. Every Action provides
    application-specific implementation by overriding the execute() method. The business
    logic needed to perform each action (process each type of request) is present
    in this corresponding Action class in the execute() method. The Action classes
    represent the controller logic for your application. They control which view elements
    are presented to the user. For instance, if an error occurs, the action is responsible
    for displaying errors on an input page.


    There also may be a corresponding ActionForm JavaBean class for each action. The
    ActionForm class extends org.apache.struts.action.ActionForm and overrides the
    validate() method. Each ActionForm validates user data and can be used by the
    Action class to retrieve user data. The ActionForm classes represent the data
    of the model. The model is your data and the code you write to retrieve, save,
    or delete that data.


    So, as you would expect from the controller, the ActionServlet provides the link
    between the view and the Action and ActionForm model components. To do this it
    needs to map the request data to the appropriate Action and ActionForm classes,
    depending upon the action requested by the client. The correct mapping of request
    actions to Action and ActionForm classes is defined in a configuration file, struts-config.xml
    (defined by http://struts.apache.org/dtds/


    struts-config_1_2.dtd). This file defines a set of ActionMapping objects that
    each represents a mapping of an action to the appropriate model classes. Therefore,
    the ActionServlet checks this struts-config.xml file to find the appropriate mapping
    for the current request.


    Finally, if the Action class processes the request correctly, it indicates to
    the ActionServlet where the user should be forwarded to (usually a JSP page),
    by passing the ActionServlet an ActionForward object.


    For more in-depth information about the architecture and implementation of the
    Struts framework, you can refer to the books and article referred to in the introduction
    to this chapter, or try pointing your browser to the following links:


    • http://jakarta.apache.org/struts/: Struts homepage (you can download the latest
    version from here)


    • http://struts.apache.org/userGuide/index.html: Struts user guide As you may
    have spotted already, a big benefit of using Struts is that you implement many
    proven Java EE design patterns without even knowing it. The Front Controller (ActionServlet
    and Action), View Helper (Action), Composite View (the Tiles framework that we’ll
    discuss later), Service to Worker (ActionServlet to actions), and Dispatcher View
    (ActionForward) are all integrated into the Struts framework. From the book *Core
    J2EE Patterns,* 1 these are all the patterns mentioned in the “Presentation Tier
    Patterns” chapter, save the Intercepting Filter.


    The only reason that Struts doesn’t incorporate the Intercepting Filter pattern
    is to maintain backward compatibility with the Servlet 2.2 specification (and
    for Struts 2.0, there is talk of replacing the ActionServlet with a filter).


    1\. Alur, Deepak, John Crupi, and Dan Malks, *Core J2EE Patterns: Best Practices
    and Design Strategies*.


    (Upper Saddle River, NJ: Prentice Hall, 2001)


