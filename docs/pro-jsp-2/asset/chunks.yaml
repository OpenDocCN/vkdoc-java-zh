- fmt: "# Web Application Design and Best Practices\n\nThe first of these reasons\
    \ is related to how secure your web application is. Without the standard security\
    \ model, every `JSP` page, `servlet`, and resource underneath your web application\
    \ root is effectively public. When using bespoke frameworks, generally developers\
    \ must insert scriptlet code into the top of their `JSP` pages that determines\
    \ whether the request should be allowed or denied, perhaps by using the value\
    \ of a session variable that indicates whether the user has logged in. But what\
    \ happens if this code is omitted and users who aren’t logged in are able to access\
    \ those resources?\n\nOne of the projects that we provided some consultancy for\
    \ implemented their own security model. Although the authorization of resources\
    \ was complex, the actual authentication of users was nothing unusual. Rather\
    \ than adopting the standard model, a bespoke solution was implemented for both\
    \ authentication and authorization throughout the entire system. The system itself\
    \ was built mostly around an `MVC` architecture, although parts were simply page\
    \ centric. Therefore, and to ensure security, a custom tag was built to be inserted\
    \ at the top of every page in order to determine whether the current user should\
    \ be able to see the contents of the page. Although this works, and as we found\
    \ by reviewing the application, there were pages where this custom tag hadn’t\
    \ been inserted and pages were left unsecured. Probably the worst of these was\
    \ a page that allowed anybody to get a report of all the data within the system.\
    \ Had the standard security model been used, every single `JSP` page could have\
    \ easily been restricted to only authenticated users.\n\nNot only does using the\
    \ standard security model simplify the design of web applications, but it also\
    \ really does provide an additional level of confidence in the security of your\
    \ web applications.\n\n## Securing View Components\n\nEven if your web application\
    \ doesn’t require security in the sense of users logging in and authenticating\
    \ themselves, there’s still a need for ensuring that your application is secure\
    \ and will work only as expected. For example, take an `MVC`-based web application.\
    \ Typically, a request is serviced by the controller component, which in turn\
    \ gets forwarded to a view component for presenting information back to the user.\
    \ If the view components were simple `JSP` pages, what would happen if the user\
    \ found out the name and location of that `JSP` page and tried to access it directly?\
    \ In many cases, they would probably get a page containing no information or a\
    \ nasty stack trace. Perhaps your `JSP` pages contain code that has other side\
    \ effects on the system. If you’re authenticating users, perhaps they’ll be able\
    \ to see somebody else’s information because their request hasn’t gone through\
    \ the controller.\n\nTo get around this potential problem, one solution is to\
    \ ensure that the view components (the `JSP` pages) are subjected to the standard\
    \ security model. For example, if all the view components are placed within a\
    \ directory called `view-components`, you can place the following code in the\
    \ `web.xml` file to disallow all direct access:\n\n```\n<security-constraint>\n\
    \    <web-resource-collection>\n        <web-resource-name>No direct access</web-resource-name>\n\
    \        <url-pattern>/view-components/*</url-pattern>\n    </web-resource-collection>\n\
    \    <auth-constraint>\n        <role-name>some-nonexistent-role</role-name>\n\
    \    </auth-constraint>\n</security-constraint>\n```\n\nThis code specifies that\
    \ anything under that directory can be accessed only by users in the specified\
    \ role. Therefore, if you don’t map that role to any users, nobody can directly\
    \ access the pages. Of course, the controller component can still forward to the\
    \ `JSP` pages because it isn’t subject to the same rules. Similarly, another option\
    \ is to place all view components underneath the `WEB-INF` directory of your web\
    \ application, which by definition doesn’t have direct access. Either way, securing\
    \ your view components can make your web application more secure and more resilient.\n\
    \n## Troubleshooting\n\nA number of common problems can occur in `JSP`- and `servlet`-based\
    \ applications. In this section, we’ll review some of these problems and provide\
    \ quick pointers to help you debug them.\n\n### The Servlet Engine Runs Out of\
    \ Memory\n\nIf the servlet engine or application server stops responding to requests\
    \ and you find `OutOfMemoryError` messages in the log files, chances are that\
    \ your application has consumed all available memory. This could be the result\
    \ of a memory leak in the application code. Perhaps the application is holding\
    \ references to a large number of objects and thus preventing them from being\
    \ garbage collected. If this is the case, you’ll need to resort to careful code\
    \ reviews to understand where the problem is occurring. Some application servers\
    \ provide a workaround for this problem: a feature called **server recycling**,\
    \ whereby idle servlet engines are periodically restarted. Restarting a `JVM`\
    \ is a sure way to clean up leaked objects.\n\nEven if there isn’t a memory leak\
    \ in the code, it’s still possible to run out of memory. Typically, a session\
    \ object is created for each concurrent user of a `JSP` application. Session objects\
    \ consume memory, and memory is a limited resource. Therefore, too many concurrent\
    \ users can cause the servlet engine to run out of memory. When the server runs\
    \ out of memory, it will need to be restarted. One way to address this problem\
    \ is to configure the servlet engine for a shorter timeout period. Setting a shorter\
    \ session timeout usually results in fewer concurrent sessions and lessens the\
    \ chances of running out of memory. Other solutions to this problem are as follows:\n\
    \n- Add more memory so that each server can support more users.\n- Add more application\
    \ server instances to handle a larger total number of users.\n- Keep the number\
    \ and size of objects stored in the session to a minimum.\n\nIn addition to these\
    \ solutions, if you have a completely stateless application, you can tell the\
    \ container not to use sessions with the following `JSP` page directive and save\
    \ yourself a great deal of memory:\n\n```\n<%@ page session=\"false\" %>\n```\n\
    \nThe memory debugging tools built into commercial performance-tuning products\
    \ such as Borland’s `Optimizeit` (http://www.borland.com/optimizeit) and Quest\
    \ Software’s `JProbe` (http://www.quest.com/jprobe/) can be helpful in tracking\
    \ down memory leaks, although such tools are moderately expensive. When you’re\
    \ running an application under one of these tools, you can pause the application\
    \ and examine memory usage statistics for each class of object in memory, list\
    \ methods responsible for largest number of object allocations, and determine\
    \ where the objects currently in memory were allocated.\n\n### The Database Connections\
    \ Are Exhausted\n\nIf an application starts behaving strangely, emitting `database\
    \ connections exhausted` or `cannot obtain database connection` errors, then it\
    \ has consumed all database connections."
  raw: 'The first of these reasons is related to how secure your web application is.
    Without the standard security model, every JSP page, servlet, and resource underneath
    your web application root is effectively public. When using bespoke frameworks,
    generally developers must insert scriptlet code into the top of their JSP pages
    that determines whether the request should be allowed or denied, perhaps by using
    the value of a session variable that indicates whether the user has logged in.
    But what happens if this code is omitted and users who aren’t logged in are able
    to access those resources?


    One of the projects that we provided some consultancy for implemented their own
    security model. Although the authorization of resources was complex, the actual
    authentication of users was nothing unusual. Rather than adopting the standard
    model, a bespoke solution was implemented for both authentication and authorization
    throughout the entire system. The system itself was built mostly around an MVC
    architecture, although parts were simply page centric. Therefore, and to ensure
    security, a custom tag was built to be inserted at the top of every page in order
    to determine whether the current user should be able to see the contents


    513-0 ch14.qxd 11/17/05 8:44 PM Page 561


    C H A P T E R 1 4 ■ W E B - A P P L I C AT I O N D E S I G N A N D B E S T P R
    A C T I C E S


    **561**


    of the page. Although this works, and as we found by reviewing the application,
    there were pages where this custom tag hadn’t been inserted and pages were left
    unsecured. Probably the worst of these was a page that allowed anybody to get
    a report of all the data within the system. Had the standard security model been
    used, every single JSP page could have easily been restricted to only authenticated
    users.


    Not only does using the standard security model simplify the design of web applications,
    but it also really does provide an additional level of confidence in the security
    of your web applications.


    **Securing View Components**


    Even if your web application doesn’t require security in the sense of users logging
    in and authenticating themselves, there’s still a need for ensuring that your
    application is secure and will work only as expected. For example, take an MVC-based
    web application. Typically, a request is serviced by the controller component,
    which in turn gets forwarded to a view component for presenting information back
    to the user. If the view components were simple JSP


    pages, what would happen if the user found out the name and location of that JSP
    page and tried to access it directly? In many cases, they would probably get a
    page containing no information or a nasty stack trace. Perhaps your JSP pages
    contain code that has other side effects on the system. If you’re authenticating
    users, perhaps they’ll be able to see somebody else’s information because their
    request hasn’t gone through the controller.


    To get around this potential problem, one solution is to ensure that the view
    components (the JSP pages) are subjected to the standard security model. For example,
    if all the view components are placed within a directory called view-components,
    you can place the following code in the web.xml file to disallow all direct access:


    <security-constraint>


    <web-resource-collection>


    <web-resource-name>No direct access</web-resource-name>


    <url-pattern>/view-components/*</url-pattern>


    </web-resource-collection>


    <auth-constraint>


    <role-name>some-nonexistent-role</role-name>


    </auth-constraint>


    </security-constraint>


    This code specifies that anything under that directory can be accessed only by
    users in the specified role. Therefore, if you don’t map that role to any users,
    nobody can directly access the pages. Of course, the controller component can
    still forward to the JSP pages because it isn’t subject to the same rules. Similarly,
    another option is to place all view components underneath the WEB-INF directory
    of your web application, which by definition doesn’t have direct access. Either
    way, securing your view components can make your web application more secure and
    more resilient.


    **Troubleshooting**


    A number of common problems can occur in JSP- and servlet-based applications.
    In this section, we’ll review some of these problems and provide quick pointers
    to help you debug them.


    513-0 ch14.qxd 11/17/05 8:44 PM Page 562


    **562**


    C H A P T E R 1 4 ■ W E B - A P P L I C AT I O N D E S I G N A N D B E S T P R
    A C T I C E S


    **The Servlet Engine Runs Out of Memory**


    If the servlet engine or application server stops responding to requests and you
    find OutOfMemoryError messages in the log files, chances are that your application
    has consumed all available memory. This could be the result of a memory leak in
    the application code. Perhaps the application is holding references to a large
    number of objects and thus preventing them from being garbage collected. If this
    is the case, you’ll need to resort to careful code reviews to understand where
    the problem is occurring. Some application servers provide a workaround for this
    problem: a feature called **server recycling**, whereby idle servlet engines are
    periodically restarted. Restarting a JVM is a sure way to clean up leaked objects.


    Even if there isn’t a memory leak in the code, it’s still possible to run out
    of memory. Typically, a session object is created for each concurrent user of
    a JSP application. Session objects consume memory, and memory is a limited resource.
    Therefore, too many concurrent users can cause the servlet engine to run out of
    memory. When the server runs out of memory, it will need to be restarted. One
    way to address this problem is to configure the servlet engine for a shorter timeout
    period. Setting a shorter session timeout usually results in fewer concurrent
    sessions and lessens the chances of running out of memory. Other solutions to
    this problem are as follows:


    • Add more memory so that each server can support more users.


    • Add more application server instances to handle a larger total number of users.


    • Keep the number and size of objects stored in the session to a minimum.


    In addition to these solutions, if you have a completely stateless application,
    you can tell the container not to use sessions with the following JSP page directive
    and save yourself a great deal of memory:


    <%@ page session="false" %>


    The memory debugging tools built into commercial performance-tuning products such
    as Borland’s Optimizeit (http://www.borland.com/optimizeit) and Quest Software’s
    JProbe (http://www.quest.com/jprobe/) can be helpful in tracking down memory leaks,
    although such tools are moderately expensive. When you’re running an application
    under one of these tools, you can pause the application and examine memory usage
    statistics for each class of object in memory, list methods responsible for largest
    number of object allocations, and determine where the objects currently in memory
    were allocated.


    **The Database Connections Are Exhausted**


    If an application starts behaving strangely, emitting database connections exhausted
    or cannot obtain database connection errors, then it has consumed all database
    connections.'
  trans: '

    第一个原因与你的 Web 应用程序的安全性有关。如果没有标准的安全模型，Web 应用程序根目录下的每个 JSP 页面、Servlet 和资源实际上都是公开的。当使用定制框架时，开发者通常必须在
    JSP 页面顶部插入脚本代码，通过会话变量（例如指示用户是否已登录的值）来判断请求应被允许还是拒绝。但如果这段代码被遗漏，未登录的用户就能访问这些资源，会发生什么情况呢？


    我们曾为一个项目提供咨询，该项目实现了自己的安全模型。尽管资源授权很复杂，但用户的实际身份验证并无特别之处。整个系统没有采用标准模型，而是为身份验证和授权都实现了定制解决方案。该系统主要基于
    MVC 架构构建，尽管部分模块只是以页面为中心。因此，为了确保安全，他们构建了一个自定义标签，插入到每个页面的顶部，以判断当前用户是否应该看到页面内容。


    513-0 ch14.qxd 11/17/05 8:44 PM 第 561 页


    第 14 章 ■ WEB 应用程序设计与最佳实践


    **561**


    虽然这种方法有效，但通过审查应用程序我们发现，有些页面没有插入这个自定义标签，导致这些页面处于不安全状态。其中最糟糕的可能是某个页面允许任何人获取系统内所有数据的报告。如果使用了标准安全模型，每个
    JSP 页面都可以轻松地限制为仅允许已认证用户访问。


    使用标准安全模型不仅能简化 Web 应用程序的设计，还能为你的 Web 应用程序安全性提供额外的信心保障。


    **保护视图组件**


    即使你的 Web 应用程序不需要用户登录和身份验证这种意义上的安全性，仍然需要确保应用程序安全且仅按预期方式运行。例如，以一个基于 MVC 的 Web 应用程序为例。通常，请求由控制器组件处理，然后转发给视图组件，将信息呈现给用户。如果视图组件是简单的
    JSP 页面，用户发现了该 JSP 页面的名称和位置并尝试直接访问，会发生什么？在很多情况下，他们可能会看到一个不包含任何信息的页面，或者一个令人头疼的堆栈跟踪信息。也许你的
    JSP 页面包含对系统有其他副作用的代码。如果你正在对用户进行身份验证，他们可能会看到其他人的信息，因为他们的请求没有经过控制器。


    为了解决这个潜在问题，一个解决方案是确保视图组件（JSP 页面）遵循标准安全模型。例如，如果所有视图组件都放在一个名为 `view-components`
    的目录中，你可以在 `web.xml` 文件中放置以下代码来禁止所有直接访问：


    <security-constraint>


    <web-resource-collection>


    <web-resource-name>禁止直接访问</web-resource-name>


    <url-pattern>/view-components/*</url-pattern>


    </web-resource-collection>


    <auth-constraint>


    <role-name>某个不存在的角色</role-name>


    </auth-constraint>


    </security-constraint>


    这段代码指定该目录下的任何内容只能由指定角色的用户访问。因此，如果你没有将该角色映射到任何用户，就没有人能直接访问这些页面。当然，控制器组件仍然可以转发到
    JSP 页面，因为它不受相同规则的约束。类似地，另一个选择是将所有视图组件放在 Web 应用程序的 `WEB-INF` 目录下，该目录根据定义不允许直接访问。无论哪种方式，保护视图组件都能让你的
    Web 应用程序更安全、更具弹性。


    **故障排除**


    在基于 JSP 和 Servlet 的应用程序中，可能会发生一些常见问题。在本节中，我们将回顾其中一些问题，并提供快速指导来帮助你调试。


    513-0 ch14.qxd 11/17/05 8:44 PM 第 562 页


    **562**


    第 14 章 ■ WEB 应用程序设计与最佳实践


    **Servlet 引擎内存耗尽**


    如果 Servlet 引擎或应用服务器停止响应请求，并且你在日志文件中发现 `OutOfMemoryError` 消息，那么很可能是你的应用程序消耗了所有可用内存。这可能是应用程序代码中存在内存泄漏的结果。也许应用程序持有大量对象的引用，从而阻止它们被垃圾回收。如果是这种情况，你需要进行仔细的代码审查，以了解问题出在哪里。一些应用服务器为此问题提供了一种变通方法：一个称为**服务器回收**的功能，它会定期重启空闲的
    Servlet 引擎。重启 JVM 是清理泄漏对象的可靠方法。


    即使代码中没有内存泄漏，仍然可能耗尽内存。通常，JSP 应用程序会为每个并发用户创建一个会话对象。会话对象会消耗内存，而内存是有限的资源。因此，过多的并发用户可能导致
    Servlet 引擎内存耗尽。当服务器内存耗尽时，需要重启。解决这个问题的一种方法是将 Servlet 引擎配置为更短的超时时间。设置更短的会话超时时间通常会导致并发会话减少，从而降低内存耗尽的可能性。其他解决方案如下：


    *   增加更多内存，使每台服务器能支持更多用户。

    *   增加更多应用服务器实例，以处理更大的用户总数。

    *   将会话中存储的对象数量和大小保持在最低限度。


    除了这些解决方案，如果你有一个完全无状态的应用程序，你可以使用以下 JSP 页面指令告诉容器不要使用会话，从而节省大量内存：


    <%@ page session="false" %>


    商业性能调优产品（如 Borland 的 Optimizeit (http://www.borland.com/optimizeit) 和 Quest Software
    的 JProbe (http://www.quest.com/jprobe/)）内置的内存调试工具有助于追踪内存泄漏，尽管这类工具价格不菲。当你在这类工具下运行应用程序时，可以暂停应用程序，检查内存中每个对象类的内存使用统计信息，列出负责最多对象分配的方法，并确定当前内存中的对象是在哪里分配的。


    **数据库连接耗尽**


    如果应用程序开始出现异常行为，抛出“数据库连接耗尽”或“无法获取数据库连接”的错误，那么它已经消耗了所有数据库连接。

    '
- fmt: 'The cause may be a database connection leak, meaning that database connections
    aren’t being properly released after use. If the application is using database
    connection pooling, you may be able to turn on features of the connection pool
    so that you can locate the misbehaving code that’s taking but not giving back
    connections. Failing this, careful code reviews and log files are probably the
    only options.


    Even if an application isn’t leaking database connections, it can still exhaust
    your connections. When using database connection pooling, you might be able to
    solve this problem by simply configuring the database connection pool to allow
    a larger number of maximum connections. If that doesn’t work, talk to a database
    administrator about increasing the number of database connections allowed on the
    database server.


    ## The Servlet Engine Stops Responding


    If the servlet engine or application server stops responding to HTTP requests
    and there are no instances of `OutOfMemoryError` messages in the log files, there
    are two other possible causes of this problem:


    - There’s a thread deadlock. Deadlock occurs in a multithreaded JSP when two or
    more threads can’t continue because each is waiting on a lock held by the other.

    - There’s an infinite loop in application code. An infinite loop condition occurs
    when a thread becomes trapped in an improperly programmed `for`, `while`, or `do`
    loop.


    Locating the exact location of the cause of the problem can be difficult. Usually,
    careful code reviews and examination of log files are the only options. This is
    one situation in which detailed debug logs can be very helpful.


    ## You Get a ClassCastException


    Servlet engines use special class loaders to isolate web applications from each
    other and from the classes used internally by the servlet engine itself. These
    class loaders can cause problems that often appear to be incomprehensible. For
    example, you might get a `ClassCastException` that complains that you have incompatible
    versions of the same class. Often, these types of problems are caused when JARs
    that conflict with the JARs provided by the servlet engine are placed into the
    application’s `WEB-INF\lib` directory, although in theory the class-loading mechanism
    should take care of this for you. Alternatively, redeploying your applications
    can also make this problem occur. Behind the scenes, although the web application
    reloads all of the classes, if you have references to objects residing in the
    session (and use the same browser instance), when the JSP container tries to cast
    these existing objects with the old class definition into the new definition,
    it will fail, throwing a `ClassCastException`. Simply restarting the container
    will solve the majority of such problems.


    ## The Page Runs Too Slowly


    If a JSP page or a servlet is running too slowly, and the performance techniques
    described in this chapter haven’t uncovered the cause of the problem, then try
    a profiler. A profiler will produce a report on the amount of time spent in each
    method of your application, allowing you to narrow your search for the cause of
    the performance problem. The commercial performance-tuning tools that we discussed
    earlier, `Optimizeit` and `JProbe`, include profilers. Also, under development
    at the time of this writing is a profiling plug-in called the Eclipse Profiler,
    for the Eclipse IDE. You can follow the progress of this project at `http://eclipsecolorer.sourceforge.net/index_profiler.html`.


    ## Debugging


    Debugging is often the most difficult and frustrating aspect of programming. JSP-
    and servlet-based applications are often rather complex and therefore especially
    difficult to debug. Why are JSP applications so complex? Here are a few reasons:'
