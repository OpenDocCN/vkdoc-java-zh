    The <x:param> action is simple and has only two attributes:


    <x:transform xml="${books}" xslt="${xslt}">


    <x:param name="myParam" value="myValue"/>


    </x:transform>


    As with the SQL parameters, the value of the <x:param> action can be passed either
    as an attribute or as the body content of the action itself, as follows:


    <x:transform xml="${books}" xslt="${xslt}">


    <x:param name="myParam">MyValue</x:param>


    </x:transform>


