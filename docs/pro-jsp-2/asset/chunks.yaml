    Servlets and Deployment


    **I**n this chapter, you’ll look at the development and deployment of Java servlets.
    The Servlet and JSP specifications are developed in parallel for each major release
    of the specifications; the current releases are Servlet 2.5 and JSP 2.1\. In this
    chapter, we’ll cover the following areas:


    • An introduction to developing Java servlets, including a history of servlets


    • Key features of the Java Servlet API


    • Developing HTTP servlets


    • Deploying Java Servlet 2.5–based web applications


    This chapter isn’t a definitive guide to Java servlets; instead it provides an
    overview of the Servlet API and the deployment of applications based on this API.


    **What Is a Servlet?**


    As you learned in the previous chapter, JSP pages are translated into servlets
    before the web container executes them. This chapter presents the anatomy of a
    Java servlet and the Servlet model that supports such servlets, and thus JSP pages.


    A servlet is a server-side component that is capable of dynamically processing
    requests and constructing responses in a protocol-independent manner. Figure 2-1
    shows the classes that are involved in developing servlets.


    All the classes and interfaces shown in Figure 2-1 are in either the javax.servlet
    or javax.servlet.http package. The javax.servlet package provides the contract
    between the servlet or web application and the web container. This allows the
    vendors of web containers to focus on developing the container in the manner most
    suitable to them, assuming they provide implementations of the standard interfaces
    for the web application to use. From the developer’s perspective, the package
    provides a standard library to process client requests and develop servlet-based
    web applications.


    At the center of the package is the javax.servlet.Servlet interface. This interface
    defines the core structure of *all* servlets; however, in developing most servlets,
    you inherit from a defined implementation of this interface (such as HttpServlet).


