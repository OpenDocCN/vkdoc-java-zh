    513-0 fm.qxd 11/18/05 11:24 AM Page xxvii Introduction


    **W**elcome to the fourth edition of *Professional JSP*, designed to help new
    and experienced Java developers alike discover the power (and even the joy) of
    creating Java-based server-side solutions for the Web by using **JavaServer Pages**,
    or **JSP** for short. If you’ve programmed with JSP before, you’ll find that the
    new features in JSP 2.1 make developing JSP pages easier than ever before. If
    you only know a little Java, this is your chance to add JSP to your toolbox skills.


    **JSP** is a server-side technology that takes the Java language, with its inherent
    simplicity and elegance, and uses it to create highly interactive and flexible
    web applications. In today’s unsure economic climate, having the Java language
    as the cornerstone of JSP makes JSP particularly compelling for business: Because
    Java is an open language (meaning it doesn’t require expensive licenses), JSP
    solutions can be highly cost-effective.


    The founding premise of JSP is that HTML can be used to create the basic structure
    of a web page, and Java code can be mixed in with the HTML to provide the dynamic
    components of the page that modern web users expect. If you understand the concepts
    of HTML and web pages, JSP provides an unbeatable way to learn about creating
    innovative, interactive content as well as coming to grips with the popular language
    of Java. This book will be your guide as you step into this exciting new world.


    **Who Is This Book For?**


    This book is aimed at anyone who knows the Java language and core APIs and wants
    to learn about web programming with the latest versions of the JSP and Servlet
    APIs.


    Familiarity with HTML is required; however, no prior knowledge of server-side
    Java programming is necessary. Having said that, this book does not claim to be
    exhaustive in all areas, particularly in relation to other Java Enterprise Edition
    APIs such as Enterprise JavaBeans.


    **What’s Covered in This Book**


    This book covers the latest versions of the JSP and Servlet specifications—versions
    2.1 and 2.5


    respectively, both of which are new specifications developed through the **Java
    Community** **Process** (http://www.jcp.org/).


    ■**Note** At the time this book was being published, the JSP specification was
    in Proposed Final Draft stage.


    It’s possible that some small changes might be made before the specification reaches
    final release; however, any modifications are likely to be minor and the new specifications
    are already being implemented by a number of products such as Tomcat 5.5.


    **xxvii**


    513-0 fm.qxd 11/18/05 11:24 AM Page xxviii **xxviii**


    ■INTRODUCTION


    Those who have read previous editions of this book will notice that this edition
    is a revision of *Professional JSP, 3rd Edition.* Because the third edition covered
    JSP 2.0, most of the information was still current for this book, which covers
    JSP 2.1\. However, we’ve gone through the entire book and ensured that the material
    is still correct for JSP 2.1\. We’ve gone through every chapter and updated the
    text to make it clearer and more concise. Finally, we’ve added an entire new chapter
    on JavaServer Faces, one of the newest Java web-application technologies.


    If you already have some exposure to server Java web development, you should pay
    attention to any changes in the technologies that are indicated throughout the
    book, or skip ahead to the sections that interest you the most. On the other hand,
    if you’re new to JSP, servlets, and JSTL, and this is somewhat confusing, you’ve
    come to the right place; the early chapters in this book, especially, were written
    with you in mind.


    Here is what you can expect to find in each chapter:


    Chapter 1, *The Anatomy of a JavaServer Page*, looks at the JSP life cycle, JSP
    application architecture, and the fundamentals of JSP pages, and provides a feel
    for where JSP technology fits within the Java EE 5 and other web components such
    as servlets, tag libraries, and JavaBeans, which exist in the Java EE 5 web tier
    for providing dynamic web-based content.


    Chapter 2, *Servlets and Deployment*, delves into what Java servlets are, and
    looks at the development and deployment of Java servlets. The Servlet and JSP
    specifications are developed in parallel, and this chapter is up to date for the
    latest release of JSP 2.1 and Servlets 2.5 (as is the rest of the book).


    We discuss one of the new features of the JSP 2.1 specification in Chapter 3,
    *The* *JavaServer Pages Expression Language*. The JSP expression language is what
    you’ll be using most often in JSP pages, an intentionally simple language that
    is, to a large extent, independent of JSP.


    Chapter 4, *JavaServer Pages Standard Tag Library*, looks at the reasons for the
    creation of the JSTL, its details (it is in fact four different tag libraries),
    and how to install the JSTL.


    Chapter 5, *JavaServer Faces*, is an introduction to JavaServer Faces (JSF), a
    framework for creating component-based user interfaces. You’ll learn how to use
    JSF with JSP pages to create feature-rich user interfaces.


    *Tag Files and Simple Tags* is the title of Chapter 6\. Tags contained within
    JSTL are extremely valuable for improving the readability and maintainability
    of a JSP page. You can also build custom tags to enable your own functionality
    to be reusable and easily maintained. Tag files and simple tags are both new mechanisms
    for writing custom tags introduced as a part of the JSP 2.1 specification.


    Chapter 7, *Classic Tags*, takes a look at the facilities provided by former versions
    of the JSP


    specification for writing custom tags. As you’ll see throughout the chapter, these
    previous methods, now called classic tags, provide a great deal more flexibility
    and therefore are still useful in some scenarios.


    After you learn the basics of building custom tags, Chapter 8, *Custom Tag Advanced
    Features and Best Practices*, wraps up your understanding by looking at some more
    advanced features and the best way to use custom tags.


    513-0 fm.qxd 11/18/05 11:24 AM Page xxix


    ■INTRODUCTION


    **xxix**


    Chapter 9, *Data Access Options for Web Applications*, discusses how best to access
    your back-end data from your JSPs and servlets. No matter what type of JSP application
    you’re writing, you’ll need to either store the data that is created by your application,
    or use data from an external source, and this chapter looks at examples using
    a MySQL database.


    In Chapter 10, *Introduction to Filtering*, you’ll look at filtering, a standard
    feature of all Servlet 2.5–compliant containers. You’ll explore the life cycle
    of a filter as managed by the container, discuss the very important concept of
    filter chaining, and then create and deploy two simple filters.


    Chapter 11, *Advanced Filtering Techniques*, is a cookbook for the application
    of filters, as you turn your attention to the more advanced techniques involved
    in applied filter programming by looking at five examples that can be used as
    the basis for your own filter implementation.


    Chapter 12, *Security in Web Applications*, looks at making your web applications
    secure and explores different methods of authentication and authorization.


    Chapter 13, *Improving Web-Application Performance and Scalability*, is your guide
    to a number of well-known tools and techniques such as page caching and database
    connection pooling that you can use to improve performance and stability, even
    after you’ve designed and coded your application.


    Chapter 14, *Web-Application Design and Best Practices*, brings together the techniques
    covered in the earlier chapters and shows how to build maintainable, extensible
    Java-based web applications. It looks at the importance of good design and how
    it can help you build high-quality web applications that are easier to maintain
    and extend in the future.


    In Chapter 15, *Using Struts, XDoclet, and Other Tools*, you’ll develop a résumé
    building and viewing web application called struts-resume, by using a variety
    of third-party products. All of the products used in struts-resume are open source
    and help to facilitate and speed up various stages of the development process.


    **What You Need to Use This Book**


    The first thing you’ll need to use this book is a computer that supports the Java
    programming language. This includes computers that run Microsoft Windows, Sun
    Solaris, or Linux.


    We don’t use any proprietary software, and all code runs on open-source products,
    available free of charge over the Internet. Consequently, an Internet connection
    is pretty much essential in order to get hold of this software.


    The primary piece of software you’ll need is a web container that supports the
    JSP 2.1


    and Servlet 2.5 specifications. Although there are a number of options to choose
    from, we’ve elected to use the Jakarta Tomcat web container throughout the whole
    book because it’s the officially designated reference implementation. Version
    5.5 is the latest and greatest, which supports the specs we require. You can get
    the latest release information about Tomcat 5.5


    from http://jakarta.apache.org/tomcat/index.html.


    As you need further software components during the course of the book, we’ll indicate
    clearly where to download them from.


    513-0 fm.qxd 11/18/05 11:24 AM Page xxx **xxx**


    ■INTRODUCTION


    **Conventions**


    We’ve used several styles of text and layout in this book to differentiate between
    different kinds of information. Here are examples of the styles used and an explanation
    of what they mean.


    Code has several fonts. If we’re talking about code in the text, we use a nonproportional
    font like this: for...next. If it’s a complete code listing that can be entered
    and used as part of an application, then it will appear in a nonproportional font
    with a caption like this: **Listing 1-2.** *date.jsp*


    <html>


    <body>


    <h2>Greetings!</h2>


    <p>The current time is <%=new java.util.Date()%> precisely</p>


    </body>


    </html>


    Code that is an extract or snippet from a larger listing will appear without a
    caption, like this:


    import javax.servlet.http.*;


    public class SessionTracker2 extends HttpServlet {


    public void doGet(HttpServletRequest req, HttpServletResponse res) Sometimes you
