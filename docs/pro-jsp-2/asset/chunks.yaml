    ■ ■ ■


    Custom Tag Advanced Features


    and Best Practices


    **N**ow that you understand the basics of building custom tags, it’s time to wrap
    up your understanding by looking at more-advanced features and best practices.


    As some of the examples in the previous chapters have shown, it’s possible for
    custom tags to place objects into the various scopes so that those objects can
    be used elsewhere in the page with an EL expression. Before the introduction of
    the EL, such functionality was achieved by tags introducing JSP scripting variables
    into the page, and this is the first topic that we’ll cover in this chapter. Although
    developers no longer see introducing JSP scripting variables into the page as
    the best way, this method is still possible—and often useful—if you need to use
    Java code on the page, perhaps to integrate with some existing components or for
    maintenance reasons.


    We’ll then move on to show how both simple and classic tags can cooperate on the
    page.


    This is an important use of custom tags and one that allows tags to be more flexible
    in the way that they’re used on the page. As you’ll see, this use of tags can
    increase page readability.


    Next, we’ll introduce validation, specifically how to implement the logic to validate
    that a tag’s attributes are being used correctly. This is an often-overlooked
    topic, but it’s important for anybody who is building tags that will be reused
    on many other web applications.


    After this, we’ll show how exceptions can be handled with custom tags. Again,
    this is a topic that is often overlooked but provides a way to build much more
    reliable and resilient tags.


    Having covered how to build tags, we’ll then turn our focus to deployment and
    how tag libraries can be packaged for reuse. In particular, we’ll show how to
    package a tag library and all of its constituent components as a single JAR file
    that can be easily distributed and reused by others. Then we’ll discuss why it’s
    important to test custom tags, and we’ll cover the new tools available to help
    automate this process.


    To wrap up our custom tag coverage, we’ll discuss some of the softer aspects around
    building custom tags. We’ll examine what makes a good tag, some guidelines on
    naming tags, and some common usage patterns.


    **Introducing Scripting Variables into the Page**


    In the previous examples, you’ve seen that it’s possible for custom tags to place
    objects into one of the various scopes (request, page, session, or application)
    so that those objects can subsequently be used elsewhere in the page or within
    the tag’s body content. For example, in **327**


    513-0 ch08.qxd 10/28/05 1:02 PM Page 328


    **328**


    C H A P T E R 8 ■ C U S TO M TA G A D VA N C E D F E AT U R E S A N D B E S T
    P R A C T I C E S


    the <list> tag from Chapter 6, we placed the name of each file into the page scope
    so that the filename could be used with an EL expression within the body content
    of the tag. Here is the line of code from Chapter 6 that performed that task:


    getJspContext().setAttribute("filename", filename); The PageContext class has
    always been available to custom tags, so this mechanism of placing information
    into one of the available scopes was available in previous versions of the JSP
    specification. However, before the introduction of the JSP EL, one of the biggest
    problems associated with using these objects was that you had to access them with
    Java code on the page. Taking the same example again, instead of an EL expression
    such as ${filename}, the name of the file would have traditionally been accessed
    with a request-time expression such as the following:


    <%= pageContext.findAttribute("filename") %>.


    To provide a simpler way of accessing information from within a JSP page, it’s
    possible for custom tags to introduce scripting variables back into the page,
    meaning that the variable can be accessed directly rather than through the PageContext
    class. For example, if the <list> tag introduced a scripting variable into the
    page to represent the filename, that value could be accessed by using a simple
    expression such as <%= filename %>. Invoking the custom tag would lead to the
    creation of a Java scripting variable on the page.


    This is a tried and tested method for allowing custom tags to introduce information
    (in this case, Java objects) into the JSP page, but it brings with it some consequences.
    The first consequence is that the information is most easily accessible on the
    page by using Java scriptlets and expressions, and a downside to this is that
    it can make the page difficult to read, particularly because of the verbose syntax.
    In addition, having Java scripting variables ready to use on the page tends to
    encourage people to use more and more Java code on their JSP pages. As we’ve mentioned
    before, this is now seen as a bad practice because it not only reduces the maintainability
    of the page, but also tends to encourage copy-and-paste–style reuse.


    To support backward compatibility with older versions of the JSP specification,
    this method of introducing scripting variables into the page is still possible.
    Therefore, for completeness, let’s take a quick look at how to do this. Also,
    this technique is useful if you find yourself working on previous versions of
    the JSP specification or if you need to integrate with other pages/components
    that require Java variables to be available on the page.


    There are two methods for placing scripting variables into the JSP page. The first
    is to provide the definitions of those variables within the TLD file (declaratively).
    The second is achieved by using a TagExtraInfo class (programmatically).


    **Defining Variables in the TLD File**


    Behind the scenes, the process of introducing scripting variables into the JSP
    page is fairly straightforward. All you need to do is place an object in one of
    the available scopes (request, page, session, or application) and then indicate
    to the JSP container that you’d like to be able to access this as a scripting
    variable. Then, when the tag is invoked, the JSP container finds your object and
    automatically declares a scripting variable for you.


    So how do you indicate to the JSP container that it should create a variable?
    Well, the easiest way is to place this information in the TLD file. Let’s look
    at an example.


