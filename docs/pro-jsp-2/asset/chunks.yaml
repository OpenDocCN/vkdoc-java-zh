    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    **Introduction to JSF**


    The JSF specification lists the following ways that JSF helps web-application
    developers to create user interfaces (UIs):


    • Makes it easy to construct a UI from a set of reusable UI components


    • Simplifies migration of application data to and from the UI


    • Helps manage UI state across server requests


    • Provides a simple model for wiring client-generated events to server-side application
    code


    • Allows custom UI components to be easily built and reused UI development is
    easier because UI components are provided as reusable objects. A number of classes,
    corresponding to UI components, are part of the JSF specification and implementation.
    Rather than have to worry about the syntax of page layout, you simply drop the
    UI components into your application. A custom render kit and rendering process
    convert the components into appropriate page-layout code. The JSF implementation
    comes with a default render kit for HTML, but the same JSF code can be rendered
    by other render kits for other client systems. This means that you can use the
    same JSF code for a variety of client systems, and use different render kits to
    customize the UI for each client system.


    Moving application data to and from the UI is simplified by letting the JSF implementation
    handle the mechanics of data transfer. You simply specify which data goes where,
    and the JSF implementation handles the process of moving the data from UI objects
    to business objects and vice versa. The JSF implementation automatically manages
    state across user requests, so you do not need to manage or implement any session
    handling.


    Just as it simplifies data handling, JSF provides an easy way to manage event
    handling.


    You specify the events of interest and the business objects or classes to handle
    the events, and the JSF implementation takes care of calling the appropriate methods
    to handle any events that are generated. The JSF event-handling model is similar
    to those used in other UI frameworks, such as Java Swing. Specifically, this means
    that multiple event listeners can respond to a single event.


    Finally, because JSF is based on reusable components, it provides a design that
    allows you to easily create and integrate your own components or third-party components
    into your JSF-enabled applications. If you are a vendor, JSF allows you to create
    custom components that can be marketed to developers and page designers.


    As with all the enterprise Java technologies, detailed information about the technology
    can be found in the JSF specification, which can be found at http://java.sun.com/j2ee/


    javaserverfaces.


    **The Relationship Between JSF and Other Java EE Technologies** Within the Java
    Platform, Enterprise Edition 5 (Java EE 5), technologies such as JSP and Servlet
    are stand-alone technologies. You could, if you wanted to, create an application
    using only


    513-0 ch05.qxd 11/1/05 7:18 PM Page 185


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    **185**


    servlets or only JSP pages. JSF is different because it is a *supporting* technology.
    You use it in conjunction with JSP pages, servlets, or other presentation technologies.


    The primary design pattern of JSF is the Model-View-Controller (MVC) pattern.
    As you saw in Chapter 1, MVC separates an application architecture into three
    categories of components: model, view, and controller. The model is the abstraction
    of all the domain data in the system. It is the bank account in a banking application,
    or a shopping cart in an e-commerce system. The view is the visualization of the
    model. In a web application, the view consists of the HTML pages and the components
    that create the HTML pages sent to web browsers, the Wireless Application Protocol
    (WAP) pages sent to mobile devices, or the UI components sent to a dedicated client.
    The controller is the set of components that manage the communications between
    model and view.


    As you’ve learned in the previous chapters, you can create user interfaces with
    JSP. In fact, as you saw, JSP was designed to make the view component of a web
    application easy to create and manage. It is also possible, although not as easy,
    to create UIs with servlets. However, combining JSF with JSP or Servlet technology
    makes UI creation—and integration of the model, view, and controller—easier by
    far. JSF brings a component-based model to web-application development that is
    similar to the model that has been used in stand-alone GUI applications for years.


    To use JSF with servlets, you use the components that make up JSF directly; that
    is, within your servlet, you explicitly create and use instances of UI component
    classes. However, because this is a book about JSP, we will focus exclusively
    on using JSF with JSP. The JSF implementation includes a tag library of custom
    tags, similar to the JSTL (see Chapter 4), that you can use with JSP to easily
    create JSF-enabled applications.


    **Request-Processing Life Cycle**


    Regardless of whether you are using JSF with JSP pages, servlets, or some other
    web technology, each request/response flow that involves JSF follows a certain
    life cycle. Several kinds of request/response cycles can occur in a JSF-enabled
    application. You can have a request that comes from a previously rendered JSF
    page (a JSF request) and a request that comes from a non-JSF page (a non-JSF request).
    Likewise, you can have a JSF response or a non-JSF


    response. We are concerned with these three request/response pairs:


    • Non-JSF request generates JSF response


    • JSF request generates JSF response


    • JSF request generates non-JSF response


    Of course, you can also have a non-JSF request that generates a non-JSF response.
    Because this does not involve JSF in any way, the JSF life cycle does not apply.


    Recall that JSP pages have a relatively simple life cycle. A JSP page source is
    compiled into a page implementation class. When a web server receives a request,
    that request is passed to the container, which passes the request to the page
    class. The page class processes the request and then writes the response back
    to the client. When other pages are included or the request is forwarded, or when
    an exception occurs, the process includes a few more components or pages, but
    basically, a small set of classes processes a request and sends back a response.


    513-0 ch05.qxd 11/1/05 7:18 PM Page 186


    **186**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    When using JSF, the life cycle is more complicated. This is because the core of
    JSF is the MVC pattern, which has several implications. User actions in JSF-generated
    views take place in a client that does not have a permanent connection to the
    server. The delivery of user actions or page events is delayed until a new connection
    is established. The JSF life cycle must handle this delay between event and event
    processing. Also, the JSF life cycle must ensure that the view is correct before
    rendering the view. To ensure that the business state is never invalid, the JSF


    system includes a phase for validating inputs and another for updating the model
    only after all inputs pass validation.


    In MVC, the presentation of data (the *view*) is separate from its representation
    in the system (the *model*). When the model is updated, the controller sends a
    message to the view, telling the view to update its presentation. When the user
    takes some action with the presentation, the controller sends a message to the
    model, telling the model to update its data. In JSF, the model is composed of
    business objects that are usually implemented as JavaBeans, the controller is
    the JSF implementation, and the UI components are the view.


    The JSF life cycle has six phases as defined by the JSF specification:


    • **Restore View:** In this phase, the JSF implementation restores the objects
    and data structures that represent the view of the request. Of course, if this
    is the client’s first visit to a page, the JSF implementation must create the
    view. When a JSF implementation creates and renders a JSF-enabled page, it creates
    UI objects for each view component.


    The components are stored in a component tree, and the state of the UI view is
    saved for subsequent requests. If this is a subsequent request, the previously
    saved UI view is retrieved for the processing of the current request.


    • **Apply Request Values:** Any data that was sent as part of the request is passed
    to the appropriate UI objects that compose the view. Those objects update their
    state with the data values. Data can come from input fields in a web form, from
    cookies sent as part of the request, or from request headers. Data for some components,
    such as components that create HTML input fields, is validated at this time. Note
    that this does not yet update the business objects that compose the model. It
    updates only the UI components with the new data.


    • **Process Validations:** The data that was submitted with the form is validated
    (if it was not validated in the previous phase). As with the previous phase, this
    does not yet update the business objects in the application. This is because if
    the JSF implementation began to update the business objects as data was validated,
    and a piece of data failed validation, the model would be partially updated and
    in an invalid state.


    • **Update Model Values:** After all validations are complete, the business objects
    that make up the application are updated with the validated data from the request.
    In addition, if any of the data needs to be converted to a different format to
    update the model (for example, converting a String to a Date object), the conversion
    occurs in this phase. Conversion is needed when the data type of a property is
    not a String or a Java primitive.


    • **Invoke Application:** During this phase, the action method of any command
    button or link that was activated is called. In addition, any events that were
    generated during previous phases and that have not yet been handled are passed
    to the web application so that it can complete any other processing of the request
    that is required.


    513-0 ch05.qxd 11/1/05 7:18 PM Page 187


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    **187**


    • **Render Response:** The response UI components are rendered, and the response
    is sent to the client. The state of the UI components is saved so that the component
    tree can be restored when the client sends another request.


    For a JSF-enabled application, the thread of execution for a request/response
    cycle can flow through each phase, in the order listed here and as shown in Figure
    5-1\. However, depending on the request, and what happens during the processing
    and response, not every request will flow through all six phases.


    **Figure 5-1.** *When a request is sent to a JSF-enabled application, the request
    can potentially* *encompass all six phases of the JSF life cycle.*


    In Figure 5-1, you can see a number of optional paths through the life cycle.
    For example, if errors occur during any of the phases, the flow of execution transfers
    immediately to the Render Response phase, skipping any remaining phases. One way
    this might occur is if input data is incorrect or invalid. If data fails validation
    in either the Apply Request Values or Process Validations phase, information about
    the error is saved and processing proceeds directly to the Render Response phase.
    Also, if at any point in the life cycle the request processing is complete and
    a non-JSF response is to be sent to the client, the flow of execution can exit
    the life cycle without completing further phases.


    **Installing JSF**


    To run the examples in this chapter, you will need to obtain and install a JSF
    implementation, and the JSP Standard Tag Library (JSTL) reference implementation.
    For this chapter, we will use the JSF reference implementation from Sun. If you
    have an implementation from some other vendor, consult the documentation for that
    implementation for installation instructions.


    If you are running Tomcat 5.0 or 5.5, you can download JSF from http://java.sun.com/


    j2ee/javaserverfaces/download.html. Instructions on downloading the JSTL were
    presented


    513-0 ch05.qxd 11/1/05 7:18 PM Page 188


    **188**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    in Chapter 4\. For now, simply unpack each distribution as needed into a directory
    of your choice, remembering where that directory is.


    There are two ways that you can make the JSF and JSTL libraries available to your
    web application running in Tomcat. Both require putting the following eight JAR
    files, which are located in the lib directory of each distribution, into a location
    that can be accessed by the server or the web application:


    • **Six JSF JARs:** commons-beanutils.jar, commons-collections.jar, commons-digester.jar,
    commons-logging.jar, jsf-api.jar, and jsf-impl.jar


    • **Two JSTL JARs:** jstl.jar and standard.jar


    As you saw in Chapter 4, one way to make API libraries available to a web application
    is to place them into the WEB-INF\lib directory of the web application. Then only
    that application will have access to those libraries. If you have another JSF
    application, that application would also need access to those files in its own
    WEB-INF\lib directory.


    Alternatively, if you have several JSF applications, you can put the JAR files
    into a common location. For Tomcat, that location is %TOMCAT_HOME%\common\lib.
    When the JAR files are located in the common directory, then every application
    in the application server has access to them. Note that if you copy the JAR files
    into the common directory while the server is running, you may need to restart
    the Tomcat server so the new JAR files can be loaded.


