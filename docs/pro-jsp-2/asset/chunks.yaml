    // (useful when you don''t know the size of your data, e.g. stream) md.update(unencodedPassword);


    // now calculate the hash


    byte[] encodedPassword = md.digest();


    StringBuffer buf = new StringBuffer();


    for (int i = 0; i < encodedPassword.length; i++) {


    if (((int) encodedPassword[i] & 0xff) < 0x10) {


    buf.append("0");


    }


    buf.append(Long.toString((int) encodedPassword[i] & 0xff, 16));


    }


    return buf.toString();


    }


    This method encrypts a string based on the algorithm you pass in. This algorithm
    is defined in LoginServlet and configurable when building via the ${encrypt-algorithm}
    variable. The default setting is SHA.


    ■**Note** More information on these algorithms and how they work is available
    at http://theory.lcs.


    mit.edu/~rivest/crypto-security.html#Algorithms.


    513-0 ch12.qxd 11/17/05 4:15 PM Page 509


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    **509**


    If you’re using password encryption and also have a retrieve password feature,
    you’ll probably want to add a password_hint column in your user store. It’s hard
    enough to remember all the passwords you keep, and it’s annoying when you have
    to create a new password, so the “send me a hint” tactic is useful.


    **Servlet 2.5 Security Changes**


    The Servlet 2.5 specification has a whole chapter on security, but not much has
    changed. The JSP 2.1 specification doesn’t contain any security-related information.
    It simply points out helpful information for programming security via the HttpServletRequest
    interface, giving you the following methods:


    • getRemoteUser()


    • isUserInRole(String roleName)


    • getUserPrincipal()


    The getRemoteUser() method returns the authenticated user’s login name or null
    if no authenticated user exists. The isUserInRole() method is helpful in determining
    a role’s authorization to certain resources.


    One important thing to remember about roles, if you’re coding them into your servlets,
    is to create links by using the <security-role-ref> element in web.xml. Here’s
    an example:


    <security-role-ref>


    <role-name>admin</role-name>


    <role-link>accounting</role-name>


    </security-role-ref>


    This way, you can code your servlets without worrying whether the admin role changes
    from the accounting group to the IT department. All you have to do is configure/code
    with admin and know that your code will be safe from change. Of course, we recommend
    placing this value in a Constants.java file so you can change it easily if the
    need does ever arise.


    The HttpSession interface has the session.invalidate() method for logging out
    users.


    It has worked fine for us. When you call session.invalidate(), it invalidates
    the session and then unbinds any objects bound to it.'
