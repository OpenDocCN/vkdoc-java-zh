    Building the <select> Tag Handler


    Keeping in mind the attributes you can customize, let’s look at how to implement
    the tag handler. Listing 7-5 shows the tag handler for a <select> tag. As before,
    the tag handler class will extend the TagSupport class.


    **Listing 7-5.** *SelectTag.java*


    package com.apress.projsp;


    import java.beans.PropertyDescriptor;


    import java.util.Collection;


    import java.util.Iterator;


    import javax.servlet.jsp.*;


    import javax.servlet.jsp.tagext.TagSupport;


    public class SelectTag extends TagSupport {


    private String name;


    private String label;


    private String value;


    private Collection items;


    public void setName(String s) {


    this.name = s;


    }


    public void setLabel(String s) {


    this.label = s;


    }


    public void setValue(String s) {


    this.value = s;


    }


    public void setItems(Collection coll) {


    this.items = coll;


    }


    public int doStartTag() throws JspException {


    Iterator iterator = items.iterator();


    try {


    JspWriter out = pageContext.getOut();


    out.print("<select name=\"");


    out.print(name);


    out.print("\">");


    while (iterator.hasNext()) {


    // get the next JavaBean from the collection


    Object o = iterator.next();


    // and use it to create a description of the property used


    // to represent the displayable label


    PropertyDescriptor labelPD =


    new PropertyDescriptor(label, o.getClass());


    // and the property used to represent the hidden value


    513-0 ch07.qxd 11/9/05 4:49 PM Page 301


    C H A P T E R 7 ■ C L A S S I C TA G S


    **301**


    PropertyDescriptor valuePD =


    new PropertyDescriptor(value, o.getClass());


    // and now generate the HTML


    out.print("<option value=\"");


    // call the accessor method for the value property


    // (this is the same as calling get<PropertyName>() on


    // the JavaBean instance)


    out.print(


    valuePD.getReadMethod().invoke(o, new Object[] {}).toString()); out.print("\">");


    // and do the same for the label property


    out.print(


    labelPD.getReadMethod().invoke(o, new Object[] {}).toString()); out.print("</option>");


    }


    out.print("</select>");


    } catch (Exception e) {


    throw new JspTagException(e.getMessage());


    }


    // and skip the body


    return SKIP_BODY;


    }


    }


    The class has fields that correspond to the various attributes for the tag. These
    are implemented in exactly the same way as with simple tags, by having an instance
    variable and **setter** **method** for each attribute.


    As in this book’s previous examples, three of the four attributes here are simple
    string values. First, you have the name of the select control on the page. Then
    you have label and value, both of which are strings representing the name of the
    JavaBean property containing the information you’d like to extract from each JavaBean.
    For example, with the Country JavaBean, these attributes would be set to name
    and id, respectively.


    The fourth and final instance variable is of type java.util.Collection. When we
    covered attributes in the previous chapter, we mentioned that they can be more
    than just simple strings—they can be Boolean values, numeric values, and even
    objects. For this example, and in the same way as the items attribute in the JSTL
    <forEach> tag, you want to pass your tag handler a reference to a fully populated
    java.util.Collection instance containing the items that are to be displayed in
    the list. Therefore, the instance variable and setter method are defined to take
    Collection rather than String, and at request time the setter method will be called
    with a Collection of Country objects.


    The only other part of the tag handler that you must define is the functionality
    provided by the tag. As in the previous example, this functionality is implemented
    within the doStartTag() method, although the doEndTag() method can also be used.
    However, don’t implement the same functionality in the doStartTag() and doEndTag()
    methods, because they both get called.


    First, the doStartTag() method sets up an Iterator instance that will operate
    over the collection. Next, it generates and writes the opening <select> tag back
    to the page. Then, for


    513-0 ch07.qxd 11/9/05 4:49 PM Page 302


    **302**


    C H A P T E R 7 ■ C L A S S I C TA G S


    each item in the collection, it generates the appropriate HTML. To do this, it
    uses a feature of the Java reflection mechanism to extract the values of the specified
    JavaBean properties: PropertyDescriptor labelPD =


    new PropertyDescriptor(label, o.getClass());


    // and the property used to represent the hidden value


    PropertyDescriptor valuePD =


    new PropertyDescriptor(value, o.getClass());


    ■**Tip** Using PropertyDescriptor objects provides an easy way to find the getter
    and setter methods associated with a JavaBean property and saves you from writing
    the code to determine the method names.


    Finally, with the HTML generated for every item in the collection, the doStartTag()
    method generates and outputs the closing </select> tag and returns SKIP_BODY,
    because the tag is not interested in the body content of this custom tag.


    This technique does have at least one drawback, however. It is not possible to
    pass customized attributes to the HTML element created by the tag. That is, there
    are many other attributes that can be added to the <select> element, such as event
    handlers (onclick, onchange) or CSS attributes. There is no way to dynamically
    pass these to the tag handler in Listing 7-5, unless you are willing to create
    properties in the tag handler for every possible attribute. You will look at a
    way around this drawback in the “Dynamic Attributes” section later in this chapter.


