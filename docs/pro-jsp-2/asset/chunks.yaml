    **Using Managed Beans**


    As noted earlier in this chapter, the primary design pattern of JSF is the MVC
    pattern. As you saw in the previous example, JSF custom actions and JSP pages
    form the view in the MVC


    architecture. The Faces Servlet provided by a JSF implementation is the controller.
    However, JSF by itself is not enough to create a working application, because
    you need the third leg of MVC: the model. JavaBeans provide that part of the MVC
    pattern. In the example, FlightSearch was the model.


    JavaBeans are Java components that can be dropped into Java applications. They
    are simply Java classes that conform to a certain coding style (documented in
    the JavaBeans specification at http://java.sun.com/products/javabeans/). For our
    purposes, there are two aspects of the JavaBeans specification that are important:


    • The JavaBean used in the web application must have a no-argument constructor.
    This allows the container to construct an instance of the JavaBean.


    • Any property to be exposed must have a get or set method. If only a get method
    is present, the property is read-only. If only a set method is used, the property
    is write-only. If both are present, the property is read-write. The format of
    the set method name is the word set followed by the name of the property, with
    the first letter of the property name capitalized. The get method format is the
    word get followed by the name of the property, again with the first letter of
    the property name capitalized. For Boolean properties, the method is the word
    is followed by the name of the property.


    Because JavaBeans follow a particular design, they can be used programmatically,
    without a developer needing to explicitly write code that uses the JavaBeans.
    As you saw in the previous example, by simply identifying the JavaBean to the
    JSF application in the JSP pages and in the configuration file, the JSF implementation
    was able to use the JavaBean, setting and reading its properties—you didn’t need
    to write any explicit code.


    Within the JSF implementation, JavaBean instances that are used by a JSF-enabled
    application are referred to as **managed beans**, because the JSF implementation
    manages the creation and use of JavaBean objects.


    Within a JSF-enabled application, managed beans appear in two contexts:


    • The information needed to create and initialize the managed bean is identified
    within the configuration files of the application.


    • The properties and methods of managed beans are referenced in JSP pages by using
    value-binding expressions or method-binding expressions.


    **Configuring Managed Beans**


    You saw one method for identifying the managed bean parameters to the application
    in Listing 5-4, where we used a file named faces-config.xml located in the WEB-INF
    directory of the


    513-0 ch05.qxd 11/1/05 7:18 PM Page 201


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    **201**


    application. However, the JSF specification identifies several other files that
    can contain managed bean configuration information. The specification states that
    configuration files will be searched for as follows:


    • The JSF implementation looks for and processes files named META-INF\faces-config.xml.


    This is primarily for JSF components packaged as JAR files that are part of the
    application.


    • The JSF implementation checks the web.xml deployment descriptor for a context
    parameter named javax.faces.CONFIG_FILES. If the parameter exists, the value of
    the parameter must be a comma-delimited list of filenames that will be processed
    as JSF


    configuration files. The filenames must be relative paths from the application
    root to the file, such as WEB-INF\my-config.xml.


    • Finally, the JSF implementation processes the file WEB-INF\faces-config.xml,
    if it exists.


    The configuration files are used to identify the managed beans, provide initialization
    parameters for the beans, and identify the navigation rules for the application
    (as described in the “Controlling Page Navigation” section later in this chapter).
    This information can be placed in a single file, as in Listing 5-4, or it can
    be split among multiple files. For example, you could put all the JavaBean information
    into one configuration file and all the navigation information into another configuration
    file. These multiple files would then be listed in the web.xml deployment descriptor.


    Identifying Managed Beans


    A configuration file provides managed bean information to the application in the
    element named <managed-bean> of the configuration file. The <managed-bean> element
    declares a JavaBean that is created and populated by the JSF implementation. When
    an expression in a JSP page attempts to use a JavaBean, by accessing one of its
    properties for example, the JSF


    implementation attempts to find the object in request, session, and then application
    scope, in that order. If an object with the given <managed-bean-name> (see the
    first bulleted item that follows) is found, then the JSF implementation uses that
    object. If an object with the given name is not found in one of the three scopes,
    an instance of the JavaBean is created and stored in the appropriate scope (see
    the third bulleted item).


    The <managed-bean> element has three required subelements:


    • **<managed-bean-name>:** The string used to identify the bean instance in any
    JSF component. For example, in Listing 5-4, the bean name was given as flight.
    In Listings 5-2


    and 5-3, we referenced the bean instance by using this name.


    • **<managed-bean-class>:** The fully qualified class name of the class that provides
    the implementation for the bean.


    • **<managed-bean-scope>:** The scope of the bean instance. We will discuss scope
    in more depth in the “Identifying Bean Scopes” section a little later in this
    chapter.


    The <managed-bean> element has a number of optional elements, including <description>,


    <display-name>, <icon>, and <managed-property>. The usage of the first three should
    be relatively obvious, so we will just look at <managed-property>, which is used
    to initialize the properties of a managed bean.


    513-0 ch05.qxd 11/1/05 7:18 PM Page 202


    **202**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    Initializing Bean Properties


    Like <managed-bean>, <managed-property> can have an optional <description>, <display-name>,
    and <icon>. It must have a nested <property-name> element that identifies the
    name of an instance variable (property) of the class with a set and get method.
    It can have an optional


    <property-class> element that provides the fully qualified class name of the data
    type of the property. If the data type is not provided, the JSF implementation
    will attempt to infer the type from the bean class. Finally, it must have one
    of several elements that initialize the value of the property: <value>, <null-value>,
    <list-entries>, or <map-entries>. For example, if the property of the bean is
    a Java primitive or a String, you can use the <value> element like this:


    <property-name>myProperty</property-name>


    <value>3</value>


    If the type of the property is a Java object and not a primitive, you can also
    set the value to null, using this form:


    <property-name>myProperty</property-name>


    <null-value/>


    If the type of the property is some other managed bean, you can initialize the
    property by referencing the other bean by the name of the bean instance. So, for
    example, if you have a managed bean of type Flight, and you create an instance
    with the name flight1, you can initialize a property of type Flight by using a
    value-binding expression that is the name of the bean:


    <managed-bean>


    <managed-bean-name>flight</managed-bean-name>


    <managed-bean-class>com.apress.projsp.FlightSearch</managed-bean-class>


    <managed-bean-scope>session</managed-bean-scope>


    <managed-property>


    <property-name>matchingFlight</property-name>


    <value-class>com.apress.projsp.Flight</value-class>


    <value>#{flight1}</value>


    </managed-property>


    </managed-bean>


    <managed-bean>


    <managed-bean-name>flight1</managed-bean-name>


    <managed-bean-class>com.apress.projsp.Flight</managed-bean-class>


    <managed-bean-scope>none</managed-bean-scope>


    </managed-bean>


    In this snippet, the bean flight has a property named matchingFlight. The type
    of matchingFlight is com.apress.projsp.Flight. The value of matchingFlight is
    initialized by referencing the name of the Flight object in the value-binding
    expression #{flight1}. (We’ll discuss value-binding expressions in more detail
    in the “Using Value-Binding Expressions in JSP Pages” section a little later in
    this chapter.) You can see that an object with this name is specified in the second
    <managed-bean> element.


    Finally, if the type of the property is List or a subtype of List, or Map or a
    subtype of Map, you can initialize the List or Map in the configuration file.
    For example, in Listing 5-1, suppose


    513-0 ch05.qxd 11/1/05 7:18 PM Page 203


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    **203**


    we wanted to restrict the departTime and arriveTime properties to the values Morning,
    Afternoon, or Evening. We could create an additional property, like this: public
    class FlightSearch {


    List times;


    //...


    }


    We could then initialize the list, like this:


    <managed-bean>


    <managed-bean-name>flight</managed-bean-name>


    <managed-bean-class>com.apress.projsp.FlightSearch</managed-bean-class>


    <managed-bean-scope>session</managed-bean-scope>


    <managed-property>


    <property-name>times</property-name>


    <list-entries>


    <value>Morning</value>


    <value>Afternoon</value>


    <value>Evening</value>


    </list-entries>


    </managed-property>


    </managed-bean>


    The <list-entries> element can have an optional <value-class> element that provides
    the fully qualified class name of the objects stored in the list. If used, it
    appears before the


    <value> elements. When <value-class> is used, the JSF implementation will attempt
    to create objects of that type, initialize those objects with the given values,
    and store them in the List.


    You can also use the <null-value> element to store null values in the list.


    Initializing a Map is similar. Given a property of type Map: public class FlightSearch
    {


    Map airportNames;


    //...


    }


    you initialize the Map like this:


    <managed-bean>


    <managed-bean-name>flight</managed-bean-name>


    <managed-bean-class>com.apress.projsp.FlightSearch</managed-bean-class>


    <managed-bean-scope>session</managed-bean-scope>


    <managed-property>


    <property-name>airportNames</property-name>


    <map-entries>


    <key-class>java.lang.String</key-class>


    <value-class>java.lang.String</value-class>


    <map-entry>


    <key>BOS</key>


    <value>Logan International Airport</value>


    513-0 ch05.qxd 11/1/05 7:18 PM Page 204


    **204**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    </map-entry>


    <!-- and so on -->


    </map-entries>


    </managed-property>


    </managed-bean>


    In the element, both <key-class> and <value-class> are optional. The JSF implementation
    will choose appropriate classes if you do not provide either element. There can
    be zero or more <map-entry> elements, and each <map-entry> that appears must have
    a <key> and either a <value> or <null-value>.


    Identifying Bean Scopes


    When you configure a JavaBean to be used in a JSF page, you can configure it with
    one of four scopes:


    • **None:** Objects with this scope are not visible in any JSF page. When used
    in the configuration file, they indicate managed beans that are used by other
    managed beans in the application. Objects with none scope can use other objects
    with none scope.


    • **Request:** Objects with this scope are visible from the start of the request
    until the end of the request. Request scope starts at the beginning of a request
    and ends when the response has been sent to the client. If the request is forwarded,
    the objects are visible in the forwarded page, because that page is still part
    of the same request/response cycle. Objects with request scope can use other objects
    with none, request, session, or application scope.


    • **Session:** An object with session scope is visible for any request/response
    cycle that belongs to a session. Objects with this scope have their state persisted
    between requests and last until the object or the session is invalidated. Objects
    with session scope can use other objects with none, session, or application scope.


    • **Application:** An object with application scope is visible in all request/response
    cycles for all clients using the application, for as long as the application is
    active. Objects with application scope can use other objects with none or application
    scope.


    You may recall from Chapter 1 that when you use the <useBean> standard action,
    you can specify similar scopes for the JavaBean. The difference is that JSP scope
    includes an additional scope named page. Because JSF requests often involve navigation
    between pages, objects with page scope have no value in a JSF application. For
    example, in the initial example in this chapter, the properties of a JavaBean
    were set in one JSP page, and those values were displayed in another page. If
    the FlightSearch JavaBean had been given page scope, the searchResults.jsp page
    would not have access to the FlightSearch JavaBean, and so would not have been
    able to display the data stored in the JavaBean.


    Most often, you will define your managed beans to have session scope. However,
    in some cases, you may have a managed bean that encapsulates global data. For
    example, you may have a managed bean that holds information common to every page
    in the application; in that case, you would define the managed bean to have application
    scope. Managed beans that you use only within a single request/response will have
    request scope.


