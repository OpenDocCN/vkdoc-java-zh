    数据库对象（JDO）以及 JSP 或 Struts 的代码！这是一个用于快速原型开发的绝佳工具。一个缺点是它对 Struts 的支持似乎非常薄弱。当我们第一次接触
    Middlegen 时，它只支持 Struts 1.0。在撰写本文时，Middlegen 网站仍然将 Struts 插件标识为 alpha 状态。


