- fmt: "We’re using this functionality in the `struts-resume` application, in the\
    \ `ActionFilter.java` class to be precise. If you’re using a JDK less than 1.4,\
    \ we invite you to take a look at the `Scaffold` package, which includes a `ChainedException`\
    \ class that works with older JDKs. The following snippet illustrates how we’ve\
    \ implemented this functionality in the `ActionFilter.java` class (located in\
    \ `src/web/org/appfuse/webapp/filters`):\n\n```\n// User authenticated, empty\
    \ user object\nif (username != null && userForm == null) {\n    try {\n      \
    \  UserManager mgr =\n            new UserManagerImpl(\n                (String)\
    \ ctx.getAttribute(Constants.DAO_TYPE));\n        UserForm user = mgr.getUser(username);\n\
    \        session.setAttribute(Constants.USER_KEY, user);\n    } catch (Exception\
    \ e) {\n        // Log the message so we can read the logs and see\n        //\
    \ what went wrong\n        log.error(\"Error getting user's information \" + e);\n\
    \        // Print a StackTrace, always a good idea\n        e.printStackTrace();\n\
    \        // Set up an empty ActionErrors collection to add all\n        // the\
    \ exception messages to\n        ActionErrors errors = new ActionErrors();\n \
    \       // Add a general message that says \"The process did not complete.\"\n\
    \        errors.add(ActionErrors.GLOBAL_ERROR,\n            new ActionError(\"\
    errors.general\"));\n        StringBuffer sb = new StringBuffer();\n        //\
    \ JDK 1.4 ONLY - if there are causes, loop through them and get\n        // all\
    \ their messages\n        if (e.getCause() == null) {\n            sb.append(e.getMessage());\n\
    \        } else {\n            while (e.getCause() != null) {\n              \
    \  sb.append(e.getMessage());\n                sb.append(\"\\n\");\n         \
    \       e = (Exception) e.getCause();\n            }\n        }\n        // Add\
    \ all the errors to a resource bundle key, defined as:\n        // errors.detail={0}\n\
    \        errors.add(\n            ActionErrors.GLOBAL_ERROR,\n            new\
    \ ActionError(\"errors.detail\", sb.toString()));\n        // Add the errors to\
    \ the request so we can display them for the user\n        request.setAttribute(Globals.ERROR_KEY,\
    \ errors);\n        // Dispatch to the error messages page\n        RequestDispatcher\
    \ dispatcher =\n            request.getRequestDispatcher(\"/error.jsp\");\n  \
    \      dispatcher.forward(request, response);\n        return;\n    }\n}\n```\n\
    \nThe end result is a series of error messages as follows:\n\n- A required resource\
    \ is not available.\n- The process did not complete. Details should follow.\n\
    - Cannot connect to MySQL server localhost:3307. Is there a MySQL server running\
    \ the machine/port you’re trying to connect to? (java.net.ConnectException)\n\n\
    It’s easy to see how chained exceptions can give you messages that will satisfy\
    \ all your users. It might even be possible to use the previous error-looping\
    \ code in a declared exception for Struts, but we haven’t tried this yet. After\
    \ you’ve built all your errors, you need to direct the user to a friendly page.\
    \ When using this code in an `Action` class, you’ll most likely direct them back\
    \ to where they came from.\n\n```\nreturn (new ActionForward(mapping.getInput()));\n\
    ```\n\nThis can be problematic if you access the same `ActionMapping` from several\
    \ different pages. We’ve seen this solved in a couple of different ways. The first\
    \ way is to add an extra parameter to the form or URL that called the action,\
    \ and then use that value to forward appropriately. The other method is one used\
    \ by the Roller Weblogger open-source project (http://www.rollerweblogger.org).\
    \ It uses a `BreadCrumbFilter` to hold a stack of the last URLs accessed by the\
    \ application. This is nice in that you can simply grab the last URL off the stack\
    \ and so forward back to the last viewed page.\n\n## Declaring Exceptions\n\n\
    Struts 1.1 introduced the concept of configurable exceptions. That is, you can\
    \ declaratively specify exceptions on a global level in `struts-config.xml` as\
    \ well as on an `ActionMapping` level.\n\nThis concept is similar to the one you\
    \ see with global forwards and with local forwards. It’s easy to register an exception—the\
    \ only attribute that is required is `type`, which states the type of the exception.\
    \ Optionally, you can specify a `key` (to a message in your resource bundle) and\
    \ the `path` to direct the response to. The following is an example that might\
    \ be used to handle `UserNotFoundException`:\n\n```\n<exception key=\"missing.user\"\
    \n    type=\"org.appfuse.webapp.services.UserNotFoundException\"\n    path=\"\
    addUser\"/>\n```\n\nIn this example, `addUser` is a forward whose path references\
    \ a tile’s definition (in `tiles-config.xml`). You could easily change this to\
    \ redirect to a JSP page (for instance, `/addUser.jsp` or perhaps `/editUser?action=add`).\
    \ Exceptions are best used at the `ActionMapping` level, without a defined path.\
    \ If you don’t define a path, Struts is smart enough to redirect to your `ActionMapping`’s\
    \ input value. Of course, if you don’t have an input defined, you should probably\
    \ specify the path for your exception, or you’ll get the dreaded blank screen\
    \ of Struts. The `key` in this example is used to override the key used by the\
    \ exception itself.\n\nStruts makes it easier to develop exceptions and provides\
    \ built-in internationalization. Let’s take a look at the code for the `UserNotFoundException`:\n\
    \n```\nimport org.apache.struts.util.ModuleException;\n\npublic class UserNotFoundException\
    \ extends ModuleException {\n    /**\n     * Construct a new instance of this\
    \ exception for the specified username.\n     * @param username Username that\
    \ was not found\n     */\n    public UserNotFoundException(String username) {\n\
    \        super(\"error.user.missing\", username);\n    }\n}\n```\n\nThe String\
    \ `error.user.missing` refers to a key in the default `ResourceBundle`, as defined\
    \ in `struts-config.xml`. In the `struts-resume` application, this bundle is `ApplicationResource.properties`,\
    \ where the key is defined as follows:\n\n```\nerror.user.missing=Could not find\
    \ user information for username '{0}'\n```\n\nOf course, you can change your exception’s\
    \ constructor to handle as many parameters as you have in your message key. If\
    \ you specify a `key` for this exception in `struts-config.xml`, it will override\
    \ the message that is spit out by the exception. One disadvantage to this is that\
    \ you lose the ability to substitute parameters, but it can be useful for exceptions\
    \ that don’t use the Struts’s message bundle.\n\nA nice feature of Struts’s exception\
    \ handling is that messages are easily externalized in a properties file. That\
    \ is, you get I18n built right into your exception handling. Furthermore, you\
    \ can specify a separate `ResourceBundle` for your error messages by specifying\
    \ the `bundle` attribute on your exception. Of course, you could use a `ResourceBundle`\
    \ on your business and persistence layers with properties file, but it might not\
    \ be needed if these exceptions never bubble up to the UI.\n\nThe beauty of using\
    \ declared exceptions in your application is that you don’t have to catch them\
    \ in your `Action` classes. The Struts `execute()` method throws a top-level `Exception`.\
    \ Since all exceptions extend `Exception` somewhere along the line, this makes\
    \ it easy to write and throw your exceptions:\n\n```\npublic ActionForward execute(ActionMapping\
    \ mapping,\n                             ActionForm form,\n                  \
    \           HttpServletRequest request,\n                             HttpServletResponse\
    \ response)\n    throws Exception {\n```\n\nWhen a registered exception is caught\
    \ by Struts, it will actually create an errors object for you that can then be\
    \ displayed using `<html:errors/>` or a syntax like that in `struts-resume`. The\
    \ following is what the `messages.jsp` file uses that is included in the `struts-resume`\
    \ application’s main Tiles template:\n\n```\n<%-- Error Messages --%>\n<logic:messagesPresent>\n\
    \    <div class=\"error\">\n        <html:messages id=\"error\">\n           \
    \ <bean:write name=\"error\" filter=\"false\"/><br />\n        </html:messages>\n\
    \    </div>\n</logic:messagesPresent>\n\n<%-- Success Messages --%>\n<logic:messagesPresent\
    \ message=\"true\">\n    <div class=\"message\">\n        <html:messages id=\"\
    message\" message=\"true\">\n            <bean:write name=\"message\" filter=\"\
    false\"/><br />\n        </html:messages>\n    </div>\n</logic:messagesPresent>\n\
    ```"
