    x\" uri=\"/WEB-INF/tlds/myTags.tld\" %>\n\n<tagunit:assertEquals name=\"Simple\
    \ filter test\">\n    <tagunit:actualResult>\n        <x:emailAddressFilter>simon.brown@somedomain.com</x:emailAddressFilter>\n\
    \    </tagunit:actualResult>\n    <tagunit:expectedResult>simon.brown@...</tagunit:expectedResult>\n\
    </tagunit:assertEquals>\n```\n\nUnlike JUnit and Cactus, the tests for TagUnit\
    \ are written as JSPs, with the assertions written using TagUnit-specific custom\
