    **Expression-Language Implicit Objects**


    Within JSP scriptlets you have many implicit objects available to you. These objects
    allow you to access things such as the request, session, and page context. The
    EL also provides you with these implicit objects, and a lot more besides. The
    objects are always available under well-known names and are resolved to objects
    in the same way as JavaBeans. Table 3-1 lists the implicit objects, along with
    brief descriptions of each object.


    **Table 3-1.** *JSP Implicit Objects*


    **Implicit Object**


    **Description**


    applicationScope


    This is a Map that contains all application-scoped variables. The Map is keyed
    on the name of the variable.


    cookie


    This is a Map that maps cookie names to a single Cookie object. If more than one
    cookie exists for a given name, the first of these cookies is used for that name.


    header


    This is a Map that contains the values of each header name.


