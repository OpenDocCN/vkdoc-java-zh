    The doFinally() Method


    When you write try-catch-finally blocks in regular Java code, the finally block
    always gets called, regardless of whether an exception was thrown. Similarly,
    the doFinally() method on the tag handler will always get called.


    Although tag handlers are generally small components, there is still much that
    can go wrong, especially when you’re dealing with databases and remote objects
    such as Enterprise JavaBeans. Implementing the TryCatchFinally interface is a
    way to build tags that are better equipped to deal with such problems; it will
    make your tag libraries more robust and resilient to failure. With this in mind,
    let’s now take a look at how you can deploy these resilient tags and make them
    available for use in the easiest possible way.


    **Tag Library Deployment**


    Tag libraries can be deployed and used within web applications in several ways.
    The examples that you’ve seen until this point have all used one of these methods
    that focuses on deploying tag libraries within a development environment. There
    is, however, a much better way of deploying tag libraries that allows you to package
    all of your tag resources into a single JAR file.


    Before we cover how to do this packaging, we’ll briefly recap the former method
    of deployment.


    **Deploying a Tag Library for Development**


    Assuming that the tag handler classes have been written and compiled, the first
    step is to ensure that the class files for the tag handlers in the tag library
    are in the CLASSPATH of your web application. In other words, the class files
    should reside in the WEB-INF\classes directory of your web application or, if
    you’ve placed your class files within a JAR file, this JAR file has been copied
    into the WEB-INF\lib directory of your web application. If your tag handlers reference
    any other classes that you or a third party has written, don’t forget that these
    classes must also be present in one of these two places.


    As you’ve seen in the previous examples, the next step is to place the TLD file
    within the web-application directory structure. By convention, the JSP specification
    suggests that all TLD


    files be placed within the WEB-INF\tlds directory, and although this isn’t mandatory,
    placing all TLD files there provides a central place for people to find them at
    a later date.


    Importing the tag library is then simply a matter of using the taglib directive.
    This allows you to specify the tag library that you want to import and the prefix
    with which to reference the tags within that tag library. As an example, you used
    the following directive in Chapter 6


    to import the tags within the tag library that you built:


    <%@ taglib uri="/WEB-INF/tlds/ch06.tld" prefix="ch06" %> The uri attribute of
    the taglib directive explicitly specifies the location of the TLD representing
    the tag library that you’d like to use, and the prefix dictates how that tag library
    will be used and identified on the page.


    As we’ve said before, this method of deploying tag libraries is mainly used when
    deploying custom tags within a development environment. This approach allows you
    to save the TLD file straight into the web-application directory structure, underneath
    the WEB-INF directory, and to explicitly specify the tag library from within the
    JSP page. In an agile development


