    You probably won’t be surprised to learn that the <c:remove> action removes a
    variable from a specific application scope. Now, we’ve never needed to remove
    a variable’s value from a web application, but in case you need that capability,
    you’ve got it.


    We think that it would most likely be used for variables with session or application
    scope. Suppose you had a web application that is customized for beginners and
    expert users.


