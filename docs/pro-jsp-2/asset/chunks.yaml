    **Understanding the JavaServer Pages Standard**


    **Tag Libraries**


    The JSTL is often referred to as a single tag library when in fact it’s a collection
    of four tag libraries. Each tag library provides useful actions (or tags) based
    on the following functional areas:


    • Core


    • Internationalization (I18n) and formatting


    • Relational database access


    • XML processing


    One of the primary goals of the JSTL is to simplify the lives of JSP page authors.
    Providing a collection of tag libraries reinforces this goal by further separating
    simple, reusable logic from the page’s presentation, thus making the page easier
    to read and maintain.


    Having four tag libraries provides a handy namespace for each available tag, which
    ultimately makes it easier to identify which functional area a tag belongs to
    and gives the JSP page author some indication of the intended use for the tag.


    Before diving headfirst into an explanation of the tags provided by each of the
    four libraries, take a step back for a moment to understand the general functionality
    provided by each.


    513-0 ch04.qxd 11/17/05 8:40 PM Page 142


    **142**


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **The Core Tag Library**


    As its name suggests, this library contains a whole host of core, general-purpose
    actions that provide simple but effective solutions to everyday problems experienced
    in almost every JSP-based web application. Simple tasks such as displaying content
    based on runtime conditions or iterating over a collection of items, as well as
    a host of URL-manipulation features, can all be achieved via the actions provided
    by the Core library. Gone are the days of repeatedly embedding lots of ugly scriptlet
    code in your JSP pages!


    **The Internationalization and Formatting Tag Library**


    The huge popularity of the Internet has led to more and more organizations employing
    web-based technology to enable their applications to reach a wider client base.
    This trend has brought about an important need to interact with clients from around
    the world by using their own language and formatting conventions.


    The process of constructing an application so that it’s able to adapt to various
    languages and regions without any additional engineering effort is known as internationalization,
    or I18n for short (“internationalization” is a 20-character word that begins with
    “i,” ends with “n,”


    and has 18 letters in between). The Internationalization and Formatting tag library
    provides a series of actions to aid in the use of the three key components associated
    with internationalization: locales, resource bundles, and base names.


    **The SQL Tag Library**


    The vast majority of enterprise web applications rely on a relational database
    to store their enterprise information. Although it’s generally preferable to use
    Model-View-Controller (MVC) architecture to separate the business logic and database
    access from the presentation tier, sometimes you may need to access a database
    from JSP pages.


    The JSTL provides an assortment of actions via the SQL tag library to facilitate
    the basic interaction with a relational database by using SQL commands such as
    SELECT, INSERT, UPDATE, and DELETE.


    **The XML Processing Tag Library**


    The use of XML to represent and exchange enterprise data is rapidly becoming the
    industry standard. XML is therefore becoming more and more important to the JSP
    page author, and it should be of little or no surprise to find that the JSTL provides
    a separate tag library to deal with XML processing. The XML actions provided cater
    to the basic XML needs a page author is likely to require as well as more complex
    actions for XML flow control and XML transformations.


    **TWIN TAG LIBRARIES**


    We mentioned in an earlier note that the JSTL 1.1 reference implementation from
    Jakarta includes the JSTL


    1.0 TLDs. You also may have noticed that there are two versions of each JSTL 1.0
    TLD.


    Because JSTL 1.0 was released prior to JSP 2.0, there was a requirement to ensure
    that the JSTL was fully supported by JSP 1.2-compliant containers. To be able
    to support both the scripting (rtexprvalues) and the EL (elexprvalues) worlds,
    it was decided to create a set of twin tag libraries, one to support the


    513-0 ch04.qxd 11/17/05 8:40 PM Page 143


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **143**


    new EL and the second to support request-time expressions. Because there are two
    tag libraries for each functional area, there are two URIs to identify each tag
    library. The following list shows the URIs for each functional area and each version
    of the TLD:


    • Core expression language TLD: http://java.sun.com/jstl/core


    • Core runtime values TLD: http://java.sun.com/jstl/core_rt


    • XML expression language TLD: http://java.sun.com/jstl/xml


    • XML runtime values TLD: http://java.sun.com/jstl/xml_rt


    • Formatting expression language TLD: http://java.sun.com/jstl/fmt


    • Formatting runtime values TLD: http://java.sun.com/jstl/fmt_rt


    • SQL expression language TLD: http://java.sun.com/jstl/sql


    • SQL runtime values TLD: http://java.sun.com/jstl/sql_rt If, for whatever reason,
    you are using the JSTL 1.0 implementation, it’s possible to mix the use of the
    runtime and EL actions. To do so, you just include a taglib directive for each
    library you are using, and use the correct standard tag. For example, in the following
    code snippet, there is a taglib directive for both the EL format library and runtime
    format library. Within the snippet, you can see the use of the <fmt:param> tag
    used with an EL expression; alternately, in the line that uses a JSP scriptlet,
    the <fmt_rt:param> tag is used.


    <%@ taglib uri="http://java.sun.com/jstl/fmt" prefix="fmt" %>


    <%@ taglib uri="http://java.sun.com/jstl/fmt_rt" prefix="fmt_rt" %>


    <fmt:message key="stockPrice">


    <fmt:param value="${closePrice}">


    <fmt_rt:param value="<%=quoteBean.getOpenPrice()%>"/>


    </fmt:message>


    **Using the JavaServer Pages Standard Tag**


    **Libraries**


    Now that you understand the general composition of the JSTL, in this section you’ll
    learn about the tags provided by each of its four libraries.


    **The Core Tag Library**


    As mentioned previously, the Core tag library provides JSP page authors with a
    set of reusable actions to cater to the simple “core” requirements that almost
    every JSP application has in some shape or form, such as object manipulation,
    looping, and so on.


    Until now, such common functionality has been implemented via two alternative
    methods: Java scriptlets and custom actions. As we’ve discussed, scriptlets are
    the least favorable approach, because they not only require the JSP page author
    to understand Java syntax but also add clutter to JSP pages, thus reducing readability.
    A better alternative has been to encapsulate such functionality into a custom
    action, but of course it’s up to the JSP page author to


    513-0 ch04.qxd 11/17/05 8:40 PM Page 144


    **144**


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    code such a component, which the author may or may not have the skills to do.
    Although a custom action has until now been the best solution because it enables
    a high level of reuse, why should all JSP page authors be forced to write their
    own libraries of such simple core functionality?


    Thankfully, the JSTL provides such a library, thus making it easier for JSP page
    authors to concentrate on what they do best—building attractive, functional presentation
    layers—


    without the burden of having to worry about the intricacies of the Java programming
    language. The JSTL core library can be split further to expose its main functional
    areas:


    • Scoped variable manipulation


    • Conditionals


    • Looping and iteration


    • URL manipulation


    Let’s take a closer look at each of the actions.


    Scoped Variable Manipulation


    This first group of actions provides the means to work with scoped variables (JSP-scoped
    attributes) as well as cope with errors.


    **The <c:out> Action**


    As the name suggests, the <c:out> action evaluates an expression and outputs it
    to the current JspWriter. It’s equivalent to the JSP syntax <%= expression %>.


    Here is an example of this simple but useful action:


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <c:out value="Good Afternoon!" />


    <c:out value="${book.author.name}" default="Unknown"/> The expression to be evaluated
    is supplied via the value attribute, and the result is converted into a string
    before being returned as part of the response. Notice that an optional default
    value can be supplied that is returned if the expression evaluates to null. Should
    a Null expression be evaluated and no default value is supplied, an empty string
    is returned instead.


    The <c:out> action also has a second form that enables the default attribute to
    be specified as part of the action’s body content, which the JSP container will
    evaluate and trim on your behalf should the default value be required. Therefore,
    you can rewrite the example as follows:


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <c:out value="${book.author.name}">


    Unknown


    </c:out>


    ![Image 40](index-178_1.png)


    513-0 ch04.qxd 11/17/05 8:40 PM Page 145


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **145**


    **The <c:set> Action**


    You can use the <c:set> action to set a variable in a particular web application
    scope (page, request, session, or application), and it’s often used in conjunction
    with the <c:out> action.


    Let’s look at an example. Listing 4-3 shows a JSP page that stores the value of
    the User-Agent request header in session scope, and then accesses the value in
    another tag.


    **Listing 4-3.** *core_set.jsp*


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <c:set var="browser" value="${header[''User-Agent'']}" scope="session" /> Your
    Browser User Agent is : <c:out value="${browser}"/> The var attribute sets the
    name by which the variable may be referenced in the given scope. In a similar
    manner to the <c:out> action, the value of the variable can be specified in two
    possible ways: first, by simply using the value attribute, or second, by supplying
    the tag with some body content that is automatically evaluated and trimmed by
    the JSP container.


    In this case, the <c:set> action is being used to store a session-scoped variable
    called browser, which stores the value of the User-Agent request header that indicates
    the type of browser that initiated the request. The <c:out> action is then used
    to output the value stored inside the attribute. Figure 4-6 shows one example
    of the page generated by the JSP example code in Listing 4-3.


    **Figure 4-6.** *One capability of the core actions is to set a variable so that
    it can be used later in the* *page. In this example, the value of the User-Agent
