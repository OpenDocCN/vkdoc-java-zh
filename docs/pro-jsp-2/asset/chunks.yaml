    private Object retrieveObject(Class clazz, String id) throws DAOException {


    Object obj = null;


    Session ses = null;


    try {


    ses = sessionFactory.openSession();


    obj = ses.load( clazz, id );


    } catch (Exception e) {


    throw new DAOException(e);


    } finally {


    try { ses.close(); }


    catch (Exception ex) { ex.printStackTrace(); };


    }


    return obj;


    }


    The getAllNewsfeeds() method, shown in the following excerpt, illustrates the
    code necessary to fetch a collection of objects from the database by using a query.
    This is also a simple operation. You open a session and run a query to get all
    news feeds by using the ses.find() method. The query is expressed by using Hibernate’s
    own OQL, which is similar to but not quite the same as SQL.


    **Listing 9-6.** *HibeAggregatorDAO.java (getAllNewsfeeds() Method)* public List
    getAllNewsfeeds() throws DAOException {


    List feeds = null;


    Session ses = null;


    try {


    ses = sessionFactory.openSession();


    feeds = ses.find("from newsfeed in class " +


    "com.apress.projsp.Newsfeed");


    } catch (Exception e) {


    throw new DAOException(e);


    } finally {


    try { ses.close(); }


    catch (Exception ex) { ex.printStackTrace(); };


    }


    return feeds;


    }


