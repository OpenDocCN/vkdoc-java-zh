    HttpServletResponse


    You can use the HttpServletResponse interface to provide a response to the request
    to your servlet. Because this class extends the ServletResponse interface, you
    can perform all the functions of that class as well. Some of the useful operations
    that you can perform on your response are covered here.


    **Setting an HTTP Response Header and Setting the Content Type of the Response**
    You’ve seen how the HttpServletRequest interface provides methods to access any
    HTTP headers set by a client’s browser when requesting a web resource. Similarly,
    the HttpServletResponse interface provides methods to set headers in the response
    that is sent back to the browser from the web server. These methods are as follows:


    public void addHeader(String name, String value)


    public void addDateHeader(String name, long date)


    public void addIntHeader(String name, int value)


    public void setHeader(String name, String value)


    public void setDateHeader(String name, long value)


    public void setIntHeader(String name, int value)


    Here you can see two similar types of methods: the addXxxHeader() and setXxxHeader().


    Although similar in functionality, the two method types have distinctly different
    behavior. The addHeader(), addDateHeader(), and addIntHeader() methods all simply
    add a named header


    513-0 ch02.qxd 10/3/05 4:22 PM Page 63


    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    **63**


    value to the response. The result of calling any of these three methods is that
    multivalue headers can be created in the response.


    The setHeader(), setDateHeader(), and setIntHeader() methods will actually check
    for the existence of a header or headers with the same name already in the response.
    If the methods find an existing header or headers, they are simply replaced with
    the new value; otherwise, a new header is created.


    It’s important to note that for any headers to take effect, they obviously must
    be set before the response is committed and sent back to the client.


    The HttpServletResponse interface also inherits the following two methods from
    its superclass, javax.servlet.ServletResponse:


    public void setContentLength(int length)


    public void setContentType(String type)


    The setContentLength() method, used for persistent HTTP connections, sets the
    length of the content body returned to the client. If this value is set too low,
    the client may stop reading the response prematurely. Likewise, setting this value
    too high may leave clients hanging around, needlessly waiting for more data. When
    this method is called from an HTTP servlet, it has the effect of setting the Content-Length
    header.


    The setContentType() method is used to set the Multipurpose Internet Mail Extensions
    (MIME, RFC 2045 and 2046) type of the response. The effect of calling this method
    from an HTTP servlet is that the Content-Type header is set accordingly.


    In an HTTP servlet that serves HTML content, the content type is set as follows:
    response.setContentType("text/html");


    text/html is the most common type of content returned from servlets. It should
    also be noted that MIME types are used in many protocols other than HTTP (such
    as Simple Mail Transfer Protocol, or SMTP, e-mail) to indicate the type of the
    response and to show that many different content types exist.


    Another method that is worth mentioning in this context is the setLocale(java.util.Locale)
    method that is provided by the javax.servlet.ServletResponse interface. This method
    automatically sets the Content-Language header with the locale. If the servlet
    has defined a content type, setLocale() will also set the charset component of
    the Content_Type header.


    **Acquiring a Text Stream for the Response**


    The ServletResponse interface is responsible for the response that is sent back
    to a client after the request for some form of resource (HTML, XML, file, and
    so on). This interface makes a java.io.PrintWriter available to any servlet that
    returns text-based markup such as HTML, XML, or WML to a client.


    The PrintWriter object enables character data to be sent back to the client. Therefore,
    the following method is provided by the ServletResponse interface: public java.io.PrintWriter
    getWriter() throws java.io.IOException


    513-0 ch02.qxd 10/3/05 4:22 PM Page 64


    **64**


    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    ■**Note** This method returns a PrintWriter object that uses the character encoding
    as specified when calling the setContentType() method. The setContentType() method
    must be called before calling the getWriter() method.


    The ServletResponse interface also provides a flushBuffer() method, which will
    force any content stored in an internal buffer to be written to the client. Calling
    the flush() method of the PrintWriter will also have a similar effect.


    **Acquiring a Binary Stream for the Response**


    As mentioned earlier, servlets do not just have to return character data such
    as HTML to clients.


    The ServletResponse interface also provides access to a javax.servlet.ServletOutputStream
    object, which can be used for returning binary information such as a GIF image
    to a client and is obtained with the following method:


    public javax.servlet.ServletOutputStream getOutputStream() throws java.io.IOException


    The ServletOutputStream class, as the name suggests, is a subclass of java.io.OutputStream,
    so the normal techniques of chaining may be employed: ServletOutputStream can
    be wrapped inside a java.io.BufferedOutputStream or java.io.ObjectOutputStream.


    Calling flush() on ServletOutputStream or flushBuffer() on ServletResponse will
    commit the response to the client.


    **Redirecting an HTTP Request to Another URL**


    It’s often desirable for a servlet to redirect the request to another URL. The
    reasons for doing this are many—for example, a user may not have logged in to
    an application and needs to be redirected to a login page, or a site may have
    moved and users need to be pointed toward an alternative URL.


    As the name suggests, the redirect mechanism involves a server informing the client
    that they must request another URL. Most modern browsers support this functionality
    automatically, and it causes the user only a slightly longer waiting period before
    their request is served.


    It should be noted that there is a distinct difference between redirecting and
    forwarding a user to an alternative URL. Forwarding is totally invisible to the
    client, and the resource that was forwarded to is returned as if it were the output
    from the original request. This is a powerful mechanism; generally, forwarding
    is used to hide the implementation details of components that make up a web application.


    The sendRedirect() method is provided by the javax.servlet.http.HttpServletResponse
    interface:


    public void sendRedirect(String location)


    The location URL passed into the sendRedirect() method may be an absolute or relative
    URL. Absolute URLs must start with a “/” and are interpreted as relative to the
    servlet container root. Relative URLs do not start with a “/” and are interpreted
    as relative to the current request URI.


    513-0 ch02.qxd 10/3/05 4:22 PM Page 65


    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    **65**


    It’s important to note that if the response has already been committed when the
    sendRedirect() method is called, an IllegalStateException is thrown.


    Another important point to note is that if URL rewriting is being used to maintain
    client sessions and a redirect is required, the encodeRedirectURL() method of
    the HttpServletResponse interface should be used to add the session information
    to the redirect URL so that the client’s session state is maintained. There are
    multiple types of redirect headers, which are detailed in the section “Error Pages”
    later in this chapter.


    **HttpServlet Example**


    This section presents a simple example of an HttpServlet. This servlet will simply
    obtain the headers from the HttpRequest and respond by outputting these to the
    requesting browser.


    Here, you do not implement duplicate functionality in both the doGet() and doPost()
    methods; instead you call one from the other (doPost() calls doGet()) so that
    the servlet responds identically regardless of whether the request is a GET or
    a POST. The code for the servlet is shown in Listing 2-2.


    **Listing 2-2.** *HttpServletHeaders.java*


    package com.apress.projsp;


    import java.io.*;


    import java.util.*;


    import javax.servlet.*;


    import javax.servlet.http.*;


    public class HttpServletHeaders extends HttpServlet {


    public void doGet(HttpServletRequest request,


    HttpServletResponse response)


    throws IOException, ServletException {


    response.setContentType("text/html");


    PrintWriter out = response.getWriter();


    out.println("<html>");


    out.println("<head>");


    out.println("<title>Here are the headers</title>"); out.println("</head>");


    out.println("<body>");


    out.println("<h3>Headers</h3>");


    out.println("<table border=0>");


    Enumeration e = request.getHeaderNames();


    while (e.hasMoreElements()) {


    String headerName = (String)e.nextElement();


