    **Debugging**


    Debugging is often the most difficult and frustrating aspect of programming. JSP-
    and servlet-based applications are often rather complex and therefore especially
    difficult to debug. Why are JSP applications so complex? Here are a few reasons:'
  trans: '

    原因可能是数据库连接泄漏，即数据库连接在使用后未能正确释放。如果应用程序使用了数据库连接池，你可以启用连接池的相关功能，以便定位那些占用连接却不归还的错误代码。如果这还不行，那么仔细的代码审查和日志文件可能是唯一的选择。


    513-0 ch14.qxd 11/17/05 8:44 PM 第 563 页


    第 1 4 章 ■ W E B 应用程序设计与最佳实践


    **563**


    即使应用程序没有泄漏数据库连接，它仍然可能耗尽所有连接。在使用数据库连接池时，你可以通过简单配置数据库连接池，允许更大的最大连接数来解决这个问题。如果这不起作用，请与数据库管理员沟通，增加数据库服务器上允许的数据库连接数。


    **Servlet 引擎停止响应**


    如果 Servlet 引擎或应用服务器停止响应 HTTP 请求，并且日志文件中没有出现 OutOfMemoryError 消息，那么问题可能有两个其他原因：


    • 存在**线程死锁**。在多线程的 JSP 中，当两个或多个线程因各自等待对方持有的锁而无法继续执行时，就会发生死锁。


    • 应用程序代码中存在**无限循环**。当线程陷入一个编写不当的 for、while 或 do 循环时，就会发生无限循环的情况。


    精确定位问题的根源可能很困难。通常，仔细的代码审查和检查日志文件是唯一的选择。在这种情况下，详细的调试日志会非常有帮助。


    **遇到 ClassCastException**


    Servlet 引擎使用特殊的类加载器来隔离各个 Web 应用程序，并将它们与 Servlet 引擎内部使用的类隔离开。这些类加载器可能会导致一些看似难以理解的问题。例如，你可能会遇到一个
    ClassCastException，提示存在同一类的不兼容版本。通常，这类问题是由于将与 Servlet 引擎提供的 JAR 包冲突的 JAR 包放入了应用程序的
    WEB-INF\lib 目录中引起的，尽管理论上类加载机制应该为你处理这个问题。另外，重新部署应用程序也可能导致此问题。在幕后，虽然 Web 应用程序会重新加载所有类，但如果你持有会话中对象的引用（并且使用同一个浏览器实例），当
    JSP 容器尝试将这些带有旧类定义的对象转换为新定义时，就会失败，并抛出 ClassCastException。简单地重启容器就能解决大部分此类问题。


    **页面运行过慢**


    如果 JSP 页面或 Servlet 运行过慢，并且本章描述的性能优化技术未能找出问题原因，那么可以尝试使用**性能分析器**。性能分析器会生成一份报告，显示应用程序中每个方法所花费的时间，从而帮助你缩小性能问题的排查范围。我们之前讨论过的商业性能调优工具
    Optimizeit 和 JProbe 都包含性能分析器。此外，在撰写本文时，一个名为 Eclipse Profiler 的性能分析插件正在为 Eclipse
    IDE 开发中。你可以通过以下网址关注该项目的进展：http://eclipsecolorer.sourceforge.net/index_profiler.html。


