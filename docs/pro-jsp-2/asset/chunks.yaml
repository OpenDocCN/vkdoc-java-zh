    # Chapter 14: Web-Application Design and Best Practices


    The previous chapters covered a great deal of the functionality provided by the
    JSP specification. You’re now in a good position to take this knowledge and start
    using it to build Java-based web applications. So then, why should you read this
    chapter? Well, although knowing the classes and APIs is important in getting the
    most out of JSP and servlets, there are some other key factors that will really
    help you to achieve success. This chapter brings together the techniques covered
    earlier in the book and shows you how to build maintainable, extensible Java-based
    web applications.


    In this chapter, you will look at the importance of good design and how it can
    help you build high-quality web applications that are easy to maintain and extend
    in the future. To do this, you’ll learn about some of the standard architectures
    that have been proven to help achieve these goals. Continuing on the theme of
    good design, you’ll then take a lower-level look at how to use design patterns
    to help implement these architectures. Specifically, we’ll show you how some of
    the best practices for building Java-based web applications have been documented
    as patterns and explain how you can apply them to your own web applications.


    Of course, having a good design is essential, but not if the actual task of implementing
    the web application is neglected. Therefore, we’ll present some of the best practices
    for development and testing. We’ll cover topics ranging from the use of logging
    and debugging to how to actually test web applications and design them to be testable.
    Finally, we’ll discuss some general guidelines covering topics such as how to
    enhance the user’s experience with your web application. By the end of the chapter,
    you’ll be able to take the knowledge you already have and apply it in a much more
    structured way, which will help you build better web applications.


    ## The Importance of Design


    When we talk about **design**, regardless of whether it’s used within the context
    of software engineering or some other endeavor, what we’re essentially talking
    about is the thought process that goes into something before it’s created. This
    up-front thinking helps us come up with the best possible way for achieving our
    end goal. For example, you normally wouldn’t just go and build a new kitchen without
    considering the location of items such as water pipes, electricity outlets, windows,
    doors, and so on. Although you could just go ahead and build the kitchen, without
    some up-front thought you probably wouldn’t come up with the best solution. This
    is equally applicable to software. You could just dive straight in, but some forethought
    is required.


    The software industry is often likened to many other forms of industry, although
    probably the best-known analogy is to the building industry. Although this comparison
    works on many levels, there are several key differences between making software
    and creating buildings. Buildings are designed for a specific purpose and must
    be designed to withstand known tolerances caused by the environment. Software,
    on the other hand, is much more dynamic. After all, in general, building software
    isn’t currently seen as being as precise as building houses. This isn’t to say
    that it shouldn’t be—it’s just that it isn’t there as an industry yet. When was
    the last time you saw bug-free software? The other point to pick up on here is
    that software typically changes throughout its lifetime. Sometimes these changes
    are simple bug fixes; more often than not, they’re major functionality changes/additions.
    It’s this characteristic of the software industry that makes design important.
    To try to quantify the importance of design, let’s look at some of the characteristics
    that it can directly affect.


    ### Maintainability


    **Maintainability** is the ability to maintain a piece of software. It works at
    several levels. At its most basic level, maintainability involves the work needed
    to keep that particular piece of software up and running (cleaning up logs, archiving
    old data, and so on). At another level, maintaining an application can include
    fixing bugs as they’re reported and making performance enhancements to cope with
    the increasing demands of the business. Maintainability isn’t something that can
    easily be measured, although it is related to how well the software is designed
    and implemented. Well-designed software is easier for anybody maintaining the
    software to understand, and those people can make the small changes required with
    the knowledge that they aren’t about to break unrelated features. The same can’t
    be said for badly designed software.


