    it through the use of dynamic attributes, meaning you could customize the HTML
    select control that was eventually generated. One of the ways that you can customize
    the select control is to add a JavaScript event handler that forwards the user
    to another page when an item in the list is selected—this is something that is
    done on websites, such as JavaRanch, that allow users to easily navigate between
    the many forums. Because these event handlers are implemented as attributes on
    the generated HTML tag, forwarding the user to another page is fairly easy to
    achieve with the dynamic attributes version of the <select> tag from the previous
    chapter:


    <ch07:selectWithDynamicAttributes


    name="forum" label="name" value="id" items="${forums}">


