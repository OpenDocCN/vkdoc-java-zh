    **Listing 6-5.** *SimpleTag.java*


    package javax.servlet.jsp.tagext;


    public interface SimpleTag extends JspTag {


    public void doTag() throws JspException, IOException;


    public JspTag getParent();


    public void setJspBody(JspFragment jspBody);


    public void setJspContext(JspContext jspContext);


    public void setParent(JspTag parent);


    }


    **The Basic Tag Life Cycle**


    Although the SimpleTag interface supplies the contract that a simple tag must
    provide, interfaces in Java cannot specify the order in which operations are called.
    This information is instead specified within the JSP specification. Figure 6-2
    shows the order in which the tag methods are called when a tag is evaluated.


    aJSP:


    JspPage


    Create


    aSimpleTag:


    Simple Tag


    setJspContext(JspContext)


    setParent(JspTag)


    setJspBody(JspFragment)


    doTag()


    X


    **Figure 6-2.** *This UML sequence diagram shows how a page implementation class
    calls the* *methods of a tag handler class.*


    513-0 ch06.qxd 11/17/05 8:41 PM Page 267


