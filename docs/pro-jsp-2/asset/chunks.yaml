    **JavaServer Pages Configuration Elements**


    A new feature of the Servlet 2.4 deployment descriptor is the addition of several
    JSP configuration elements inside a <jsp-config> element. These elements allow
    you to do the following:


    • Enable or disable EL evaluation


    • Enable or disable scripting elements


    • Indicate page-encoding information


    • Automatically include preludes and codas


    You can perform some or all of these functions for individual pages or groups
    of pages.


    This grouping is controlled by the <jsp-property-group> element. This allows you
    to map URLs to groups of the properties mentioned earlier. As you can see in the
    previous example, you are applying several properties to *all* JSP pages in the
    application; this uses the following property group:


    <jsp-config>


    <jsp-property-group>


    <url-pattern>*.jsp</url-pattern>


    </jsp-property-group>


    </jsp-config>


    Enabling Expression Language Evaluation


    To enable or disable the evaluation of the EL, you can use the <el-ignored> element.
    This can be used to easily set the isELIgnored property of a group of JSP pages.
    By default, the EL


    evaluation is enabled for web applications using a Servlet 2.4 or Servlet 2.5
    web.xml. To disable evaluation for all the JSP pages in our application, you can
    use a fragment similar to the following:


    <jsp-config>


    <jsp-property-group>


    <url-pattern>*.jsp</url-pattern>


    <el-ignored>true</el-ignored>


    513-0 ch02.qxd 10/3/05 4:22 PM Page 77


    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    **77**


    </jsp-property-group


    </jsp-config>


    You can also disable the EL for specific pages by using a snippet such as the
    following:


    <jsp-config>


    <jsp-property-group>


    <url-pattern>noel.jsp</url-pattern>


    <el-ignored>true</el-ignored>


    </jsp-property-group


    </jsp-config>


    Enabling Scripting Elements


    To enable or disable the evaluation of scripting elements within a page, you can
    use the


    <scripting-invalid> element. By default, scripting is enabled. To disable scripting
    for all the JSP pages in your application, you can use a fragment similar to the
    following:


    <jsp-config>


    <jsp-property-group>


    <url-pattern>*.jsp</url-pattern>


    <scripting-invalid>true</scripting-invalid>


    </jsp-property-group>


    </jsp-config>


    To disable scripting for a specific page, you can use a snippet such as the following:


    <jsp-config>


    <jsp-property-group>


    <url-pattern>noscript.jsp</url-pattern>


    <scripting-invalid>true</scripting-invalid>


    </jsp-property-group>


    </jsp-config>


    Indicating Page-Encoding Information


    Using the <page-encoding> element, you can define the encoding for a group of
    JSP pages.


    The valid values of the <page-encoding> tag are those of the pageEncoding page
    directive. It’s a translation-time error to define the pageEncoding of a JSP page
    through one value in the JSP


    configuration element and then give it a different value in a pageEncoding directive,
    but it’s legal to give it the same value. You can use a snippet similar to the
    one shown here to control the page encoding:


    <jsp-config>


    <jsp-property-group>


    <url-pattern>*.jsp</url-pattern>


    <page-encoding>ISO-8859-2</page-encoding>


    </jsp-property-group


    </jsp-config>


