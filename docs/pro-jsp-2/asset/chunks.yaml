    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **169**


    The dataSource attribute is used to reference a DataSource that was configured
    by using the <sql:setDataSource> action. The mandatory var parameter is used to
    store the result of the query and is of type javax.servlet.jsp.jstl.sql.Result.
    It’s possible to pass the string of SQL as either body content or by using the
    sql attribute.


    It’s most familiar to see the <sql:query> and <c:forEach> actions working together
    to display the results of the query in an HTML table as follows:


    <sql:query var="users" dataSource="myDataSource" > SELECT * FROM User WHERE UserName=''Dan''


    </sql:query>


    <table>


    <c:forEach var="row" items="${users.row}">


    <tr>


    <td><c:out value="${row.firstName}" /></td>


    <td><c:out value="${row.lastName}" /></td>


    <td><c:out value="${row.phoneNumber}" /></td>


    </tr>


    </c:forEach>


    </table>


    ■**Caution** If the dataSource attribute is present, the <sql:query> action must
    not be nested inside a


    <sql:transaction> action. The <sql:transaction> action is covered later in this
    chapter.


    **The <sql:update> Action**


    To complement the <sql:query> action, the <sql:update> action enables SQL Data
    Manipulation Language INSERT, UPDATE, and DELETE statements to be executed. It
    is also used to execute SQL Data Definition Language statements, such as a table
    creation or alteration statements.


    The syntax of this action is similar to that of the <sql:query> action. Again,
    a var attribute is available to store the result of the <sql:update> action except
    this time it’s not mandatory.


    The type of the var parameter is java.lang.Integer.


    <sql:update var="count" dataSource="myDataSource"> DELETE FROM Users WHERE UserName
    <> ''Dan''


    </sql:update>


    **The <sql:param> and <sql:dateParam> Actions** Both the <sql:query> and <sql:update>
    actions provide support for nested <sql:param> and


    <sql:dateParam> actions that are used to pass parameters into a parameterized
    string of SQL.


    Both actions are incredibly simple and exist only to hold a simple object via
    its value attribute:


    <sql:param value="${userName}"/>


    513-0 ch04.qxd 11/17/05 8:41 PM Page 170


    **170**


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    To see how these tags could be used as part of a parameterized SQL statement,
    revisit the example you saw in the <sql:update> example:


    <sql:update var="count" dataSource="myDataSource"> DELETE FROM Users WHERE UserName
    <> ? AND Status = ?


    <sql:param value="${userName}"/>


    <sql:param value="${status}"/>


    </sql:update>


    The values held by each nested <sql:param> action are substituted for each parameter
    marker (“?”) in the SQL. The order in which the <sql:param> actions occur determines
    which parameter is substituted.


    **The <sql:transaction> Action**


    The final action provided by the SQL tag library is the <sql:transaction> action,
    which enables a series of SQL actions to be grouped together to provide transactional
    behavior.


    Transactions enable a series of database actions (such as queries, insertions,
    deletions, and so on) to be treated as a single atomic action. The transaction
    is committed permanently to the database only when all the database actions within
    it complete successfully; otherwise, the transaction is rolled back and any actions
    are reversed.


    Any <sql:query> or <sql:update> actions that wish to be included as part of the
    transaction are nested inside the <sql:transaction> action itself. For example,
    let’s add the previous examples to demonstrate the <sql:query> and <sql:update>
    actions inside a transaction:


    <sql:transaction dataSource="myDataSource" isolation="read_committed">


    <sql:query var="users">


    SELECT * FROM User WHERE UserName=''Dan''


    </sql:query>


    <sql:update var="count">


    DELETE FROM Users WHERE UserName <> ? AND Status = ?


    <sql:param value="${userName}"/>


    <sql:param value="${status}"/>


    </sql:update>


    </sql:transaction>


    As you can see, it’s simplicity itself! If both the <sql:query> and <sql:update>
    actions complete successfully, the transaction will automatically be committed!
    If either the SELECT


    command or the DELETE command fails, the entire transaction is rolled back.


    The only points to be aware of are that any nested SQL tags must not supply their
    own dataSource attributes because the DataSource is declared by the <sql:transaction>
    action itself. An optional isolation attribute can also be supplied to set the
    isolation level of the transaction. This attribute must be one of the following
    values:


    • read_committed


    • read_uncommitted


    • repeatable_read


    • serializable


    ce configuration itself.


