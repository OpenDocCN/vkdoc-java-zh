    **The javax.servlet Classes**


    In addition to the interfaces that you’ve seen, there are nine classes contained
    within the javax.servlet package. They are as follows:


    • GenericServlet


    • ServletContextEvent


    • ServletContextAttributeEvent


    • ServletInputStream


    • ServletOutputStream


    • ServletRequestEvent


    • ServletRequestAttributeEvent


    • ServletRequestWrapper


    • ServletResponseWrapper


    The GenericServlet abstract class can be used to develop protocol-independent
    servlets and requires only that subclasses implement its service() method. For
    servlets intended to function in a web context, it’s more common to extend the
    HttpServlet abstract class (which you’ll look at in a later section).


    The two event classes, ServletContextEvent and ServletContextAttributeEvent, are
    used for notification about changes to the ServletContext object and its attributes.


    The two event classes, ServletRequestEvent and ServletRequestAttributeEvent, are
    used for notification about changes to the ServletRequest object and its attributes.


    The ServletInputStream and ServletOutputStream abstract classes provide the ability
    to read and write binary data from and to the client. Classes that extend either
    of these abstract classes must provide an implementation of the java.io.InputStream.read()
    and java.io.OutputStream.write() methods, respectively.


    Last, the wrapper classes ServletRequestWrapper and ServletResponseWrapper provide
    useful implementation of the ServletRequest and ServletResponse interfaces. These
    can be used or subclassed to give developers the ability to adapt the standard
    behavior of these objects for their own applications’ needs.


    **The Life Cycle of a Servlet**


    The javax.servlet.Servlet interface defines the methods that all servlets must
    implement and, among others, three methods that are known as **life-cycle methods**:
    public void init(ServletConfig config) throws ServletException public void service(ServletRequest
    req, ServletResponse res) throws ServletException, IOException


    public void destroy()


    513-0 ch02.qxd 10/3/05 4:22 PM Page 55


    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    **55**


    These life-cycle methods are each called at separate times during the life span
    of a servlet, from the initial creation to the moment it’s removed from service
    and destroyed. These methods are called in the following order:


    **1.** When the servlet is constructed, it is initialized with the init() method.


    **2.** Any requests from clients are handled initially by the service() method
    before delegating to the doXxx() methods in the case of an HttpServlet. The service()
    method is responsible for processing the request and returning the response.


    **3.** When the servlet needs to be removed from service, it’s destroyed with
    the destroy() method, then garbage collected and finalized. When the container
    decides to take a servlet out of service, it first ensures that any service()
    method calls have been completed.


