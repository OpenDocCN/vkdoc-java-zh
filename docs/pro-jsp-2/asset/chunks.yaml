    **Summary**


    This chapter has introduced the concepts of encapsulating your own content and
    functionality as reusable software components known as JSP tag extensions or,
    informally, as custom tags. These tags provide a great way to promote several
    of the factors associated with JSP


    development, including the reusability, readability, and maintainability of JSP
    pages. Removing common Java code, content, and presentation from the page provides
    a way to clean up JSP pages, by speeding up development, increasing quality, and
    permitting a quicker time to market through reuse.


    Traditionally, common content such as that found in headers and footers has been
    abstracted away from JSP pages and included wherever necessary. Although this
    promotes maintainability and reuse, using the raw JSP constructs can often seem
    awkward to those who are not familiar with the technology and are more focused
    on the look and feel of a web application rather than the mechanics of how it
    works. Tag files help solve these problems by providing an easy-to-use mechanism
    for wrapping up and reusing common content. Next, you also learned how such content
    can be templated with tag files and parameterized with attributes. In addition
    to solving some technical problems, tag files provide a more natural interface
    for anybody using the tags.


    Simple tags were added in the JSP 2.0 specification. Previous versions of JSP
    technology featured a way to wrap up common and recurring functionality as reusable
    custom tags, although the life cycle and semantics behind these techniques were
    often seen as too


    513-0 ch06.qxd 11/17/05 8:41 PM Page 287


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **287**


    complicated by many developers. To address this, the SimpleTag interface was introduced
    to provide an effortless way to wrap up common functionality that is generally
    implemented in Java code as opposed to JSP code. As a convenience, the SimpleTagSupport
    class is also provided by the JSP specification to serve as a starting point for
    your tags.


    While looking at this interface, you saw the development of a fairly trivial tag,
    followed by a look at how attributes can be used to customize the functionality.
    This led to a further discussion on how custom tags can best be used, which culminated
    in the assertion that content and presentation should ideally be separated if
    the best degree of reuse is to be achieved. Backing this up was a modified example
    of the <thumbnail> tag that allowed page authors to be flexible in the way that
