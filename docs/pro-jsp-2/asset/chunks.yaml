- fmt: "JAAS can be helpful when you need to use complex authentication schemas or\
    \ when you grant resource-specific privileges to users (for example, inserting\
    \ a row in the database or assigning write permissions to a file). At its core,\
    \ JAAS is essentially a security mechanism that allows you to specify authentication\
    \ and authorization via policy files. It became an integral part of Java starting\
    \ with J2SE 1.4. When you run your application server with a security manager,\
    \ a policy file is checked, and then the user is allowed to run your application\
    \ or is prompted for credentials. As we mentioned, JAAS does allow for complex\
    \ login schemas, such as a Windows NT domain or smart cards (for example, RSA\
    \ SecurID).\n\n**Note** You can find more information on the login schemas supported\
    \ at `http://java.sun.com/j2se/1.4/docs/guide/security/jaas/JAASRefGuide.html#AppendixB`.\n\
    \nTo set up your application server to use JAAS specifically for your application,\
    \ rather than its own authentication mechanism, you usually have to select a JAAS\
    \ custom realm and then perform a few additional steps. The following steps set\
    \ up a `JAASRealm` on Tomcat 5 (on a Windows machine) to authenticate with an\
    \ NT domain.\n\nThe easiest way to do this is to download Andy Armstrong’s JAAS\
    \ login modules from `http://free.tagish.net/jaas/`. These modules were written\
    \ specifically for authenticating with a Windows NT domain and are similar to\
    \ the helper classes that make the `JDBCRealm` work behind the scenes. After you’ve\
    \ downloaded the ZIP file, extract the contents of the downloaded file to a `jaas-modules`\
    \ directory. At the time of this writing, version 1.0.3 was the latest available\
    \ download.\n\nAfter you’ve downloaded the login modules, copy the file `NTSystem.dll`\
    \ file to the Tomcat `bin` directory. Copy the `tagishauth.jar` to the Tomcat\
    \ `common\\lib` directory.\n\nIn the `Samples` config folder of the Tagish JAAS\
    \ distribution, you’ll find a `tagish.login` file and a `java.security.sample`\
    \ file. Copy the last few lines from `java.security.sample` and put it at the\
    \ end of the `java.security` file (located in `$JAVA_HOME\\jre\\lib\\security`).\
    \ This line looks as follows:\n\n```\n# Login configs\nlogin.config.url.1=file:${java.home}/lib/security/tagish.login\n\
    ```\n\nReplace the token `${java.home}` with the actual path to Java home on your\
    \ system. For example, if `${java.home}` evaluates to `C:\\Program Files\\Java\\\
    jre1.5.0_03\\`, the entry would be as follows:\n\n```\nlogin.config.url.1=file:C:/Program\
    \ Files/Java/jre1.5.0_03/lib/security/tagish.login\n```\n\nThen move the `tagish.login`\
    \ file into the same directory (`$JAVA_HOME\\jre\\lib\\security`).\n\nIf your\
    \ users always log in to the same domain (which is what we’ve configured here),\
    \ just set the `defaultDomain` property in `tagish.login` as follows:\n\n```\n\
    NTLogin\n{\n  com.tagish.auth.win32.NTSystemLogin required\n  returnNames=true\n\
    \  returnSIDs=false\n  defaultDomain=NT_DOMAIN_OR_WORKGROUP;\n};\n```\n\nwhere\
    \ `NT_DOMAIN_OR_WORKGROUP` is the NT domain of your login, or the Windows Workgroup\
    \ of your login.\n\n**Tip** Make sure to change the `defaultDomain` value from\
    \ `NT_DOMAIN_OR_WORKGROUP` to the domain you want to communicate with.\n\nAfter\
    \ you’ve completed these setup steps, you need to change your context to have\
    \ the following realm configuration:\n\n```xml\n<Realm className=\"org.apache.catalina.realm.JAASRealm\"\
    \ debug=\"10\"\n      appName=\"NTLogin\"\n      userClassNames=\"com.tagish.auth.win32.typed.NTUserPrincipal\"\
    \n      roleClassNames=\"com.tagish.auth.win32.typed.NTGroupPrincipal\" />\n```\n\
    \nListing 12-7 shows the `context.xml` file for Tomcat 5.5. If you are using Tomcat\
    \ 5.0, put the `<Realm>` element in the `server.xml` file. If you are using Tomcat\
    \ 5.5, nest the `<Realm>` element in a `<Context>` element in the file `META-INF\\\
    context.xml`.\n\n**Listing 12-7.** *context.xml*\n\n```xml\n<Context path=\"/5130ch12_jaas\"\
    \ docBase=\"5130ch12_jaas\" debug=\"99\">\n  <Realm className=\"org.apache.catalina.realm.JAASRealm\"\
    \ debug=\"10\"\n        appName=\"NTLogin\"\n        userClassNames=\"com.tagish.auth.win32.typed.NTUserPrincipal\"\
    \n        roleClassNames=\"com.tagish.auth.win32.typed.NTGroupPrincipal\" />\n\
    </Context>\n```\n\nNext, add the entry in Listing 12-8 to the deployment descriptor.\n\
    \n**Listing 12-8.** *<security-constraint> and <login-config> Elements for web.xml*\n\
    \n```xml\n<security-constraint>\n  <web-resource-collection>\n    <web-resource-name>Security\
    \ Example</web-resource-name>\n    <url-pattern>/*</url-pattern>\n  </web-resource-collection>\n\
    \  <auth-constraint>\n    <role-name>*</role-name>\n  </auth-constraint>\n</security-constraint>\n\
    \n<login-config>\n  <auth-method>FORM</auth-method>\n  <form-login-config>\n \
    \   <form-login-page>/login.jsp</form-login-page>\n    <form-error-page>/loginError.jsp</form-error-page>\n\
    \  </form-login-config>\n</login-config>\n```\n\nThe file `login.jsp` was shown\
    \ in Listing 12-1; we’ve left `loginError.jsp` for you to write as you please.\n\
    \n**Caution** There appears to be a bug in the Tagish distribution that causes\
    \ basic authentication to fail. That is why we use form authentication for this\
    \ example. For more information, see `http://blog.cmaeda.com/?p=22`.\n\nWe tested\
    \ this setup and configuration on a Windows XP machine, and everything worked\
    \ smoothly. We were able to log in using the same username/password combination\
    \ we used for logging onto Windows XP. Also, we didn’t have a domain, just a workgroup,\
    \ and everything worked flawlessly there as well.\n\nIf you don’t want to use\
    \ Andy Armstrong’s JAAS login modules, you can create your own file-based JAAS\
    \ `LoginModule` by performing the following steps.\n\nFirst, create a `LoginModule`\
    \ class as shown in Listing 12-9 that implements `javax.security.auth.login.LoginContext`.\n\
    \n**Listing 12-9.** *MyLoginModule.java*\n\n```java\npackage com.apress.projsp;\n\
    \nimport java.io.IOException;\nimport java.security.Principal;\nimport java.util.Map;\n\
    import javax.security.auth.Subject;\nimport javax.security.auth.callback.*;\n\
    import javax.security.auth.login.*;\nimport javax.security.auth.spi.LoginModule;\n\
    \npublic class MyLoginModule implements LoginModule\n{\n```"
