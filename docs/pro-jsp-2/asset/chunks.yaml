    **Other Operators**


    Besides the arithmetic, comparison, and logical operators that you’ve seen so
    far, several other operators are available to developers using the EL. These operators
    are mainly related to objects. A property or method of an object can be accessed
    by using either the . (dot) or []


    (bracket) operator, which is deliberate in order to align the language with ECMAScript.
    For example, obj.property is equivalent to obj["property"].


    This syntax is also used to access the items within maps, lists, or arrays. For
    example, to access the item in a map with the key "sam", you could use myMap["sam"]
    or myMap.sam.


    The final operator that you’ll look at is the empty operator. The empty operator
    is a prefix operator that can be used to determine if a value is null or empty.
    To evaluate the expression empty A, the EL implementation code first checks whether
    A is null. If A is null, the expression evaluates to true. If A is an empty string,
    array, map, or an empty list, then the expression also evaluates to true. If A
    is not null or empty, the expression evaluates to false.


    Now that you’ve seen all the available operators, you can again update your precedence
    table to include these new operators:


    • []


    • ()


    • - (unary) not ! empty


    • * / div % mod


    • + - (binary)


    • < > <= >= lt gt le ge


    • == != eq ne


    • && and


    • || or


    You’ll see much more about these operators in our discussion of using the EL with
    JavaBeans in the next section.


    **JavaBeans and the Expression Language**


    So far you’ve looked at the syntax of the EL. This in itself is not very useful
    when creating web applications. In this section, you’ll focus on how to use the
    EL to read values from JavaBeans to display within a JSP page. In previous incarnations
    of the JSP specification, you would have had to use code such as the following
    to read values from a JavaBean:


    <jsp:getProperty name="myBean" property="name" /> An alternative (and more common)
    method is to use a scriptlet such as the following:


    <%= myBean.getName()%>


    513-0 ch03.qxd 10/28/05 12:53 PM Page 114


    **114**


    C H A P T E R 3 ■ T H E J AVA S E R V E R PA G E S E X P R E S S I O N L A N G
    U A G E


    As we’ve discussed, the use of scriptlets does not represent good practice in
    JSP development. This may make you ask the question, “If I can use the <getProperty>
    standard action, why does anyone use scriptlets?" The answer to this question
    is simple: We developers are lazy! The scriptlet option represents less code and
    is a lot quicker to type!


    To get around this problem, the EL provides a nice way to access the properties
    of a JavaBean that is in scope within a page, request, session, or application.
    To achieve the same as the previous code sample, you can use the following expression:
    ${myBean.name}


    This is a nice neat way to access properties; there are no nasty brackets or any
    other Java-like syntax present. This brings us to another core feature of the
    EL: the concept of named variables. The EL provides a generalized mechanism for
    resolving variable names into objects.


    This mechanism has the same behavior as the pageContext.findAttribute() method
    of the PageContext object. Take the following, for example:


    ${product}


    This expression will look for the attribute named product by searching the page,
    request, session, and application scopes, in that order, and will print its value.
    This works regardless of how the object was placed into the particular scope.
    That is, one JSP page could put an attribute into request, session, or application
    scope, and another JSP page could access the attribute simply by using an EL statement
    that uses the name of the attribute. If the attribute is not found, null will
    be returned. This method is also used to resolve the implicit objects that we’ll
    talk about in the next section.


