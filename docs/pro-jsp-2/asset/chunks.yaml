    With the tag handler class and TLD file written, the next step is to deploy the
    tag. There are a couple of ways that tag libraries can be deployed and used—one
    in which the tag library is unpackaged and one in which it’s packaged and ready
    to be reused easily. The former method is typically how many developers deploy
    their tag libraries in a development environment, so let’s take a look at that
    one and leave the other until Chapter 8, where you’ll examine deployment in more
    depth.


    Deploying the Tag Library


    The first step is to ensure that the class files for the tag handlers in the tag
    library have been compiled and are available within the class path of your web
    application. In other words, you should ensure that your class files reside in
    either the WEB-INF\classes directory of your web application, or within a JAR
    file that has been copied into the WEB-INF\lib directory of your web application.
    If your tag handlers reference any other classes that you or a third party has
    written, don’t forget that these must also be made available in one of these two
    ways.


    With the classes residing within the web-application directory structure, the
    next step is to place the TLD file within the web-application directory structure
    too. By convention, the JSP specification suggests that all TLD files be placed
    within the WEB-INF\tlds directory.


    Although this isn’t mandatory, placing all TLD files here provides a central place
    for people to find them at a later date. For this example, we will place the TLD
    named ch06.tld in the WEB-INF\tlds directory. With these steps complete, you can
    now use the tag library.


    As you saw with the JSTL examples in Chapter 4 and the tag file example in this
    chapter, using a tag library requires that the tag library be imported via the
    taglib directive. This allows you to specify the prefix that references the tags
    within that tag library. With the TLD file for our example located at WEB-INF\tlds\ch06.tld,
    you can directly import this on a JSP page by using the following directive:


    <%@ taglib uri="/WEB-INF/tlds/ch06.tld" prefix="ch06" %> Here, you’re using the
    uri attribute of the taglib directive to explicitly specify the location of the
    TLD that represents the tag library that you would like to use. The prefix attribute
    allows you to specify the prefix of the tags in the tag library. Figure 6-3 shows
    the output you might see when the <datetime> tag is used on a page as follows:
    The current date and time is <ch06:datetime/>


    **Figure 6-3.** *Simple tags can provide powerful functionality for customizing
    JSP pages.*


