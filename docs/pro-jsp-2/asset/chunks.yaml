    and authenticating users in an LDAP directory server. When using either of these
    methods, you’ll have to create a Context for your application, so you can override
    the default MemoryRealm.


    Listing 12-2 shows a file named context.xml, which you can place in the META-INF
    directory of the web application. It shows an example of using a JDBCRealm to
    authenticate with a MySQL


    database named security.


    **Listing 12-2.** *context.xml*


    <Context path="/security" docBase="security" debug="0">


    <Realm className="org.apache.catalina.realm.JDBCRealm" debug="99"


    driverName="com.mysql.jdbc.Driver"


    connectionURL="jdbc:mysql://localhost:3306/security?autoReconnect=true"


    connectionName="test"


    connectionPassword="test"


    userTable="users"


    userNameCol="username"


    userCredCol="password"


    userRoleTable="user_roles"


    roleNameCol="role_name" />


    </Context>


    By placing context.xml in the META-INF directory of the web application, you are
    protecting only the given application. Tomcat also allows you to place this file
    in various other locations.


    See the Tomcat documentation (http://jakarta.apache.org/tomcat/tomcat-5.5-doc/config/


    context.html) for more information about using context.xml.


    Listing 12-2 defines two tables for users and roles. The userTable attribute in
    Listing 12-2


    defines the users table to be a table named users. The users table must contain
    at least two columns, identified by the userNameCol and userCredCol attributes;
    the userNameCol is the column that contains usernames, and the userCredCol is
    the column that contains the user’s password. The roles table (user_roles) also
    has at least two columns. The roles table contains one row for every valid role
    that is assigned to a particular user. A user can have zero, one, or many roles.
    The column that contains the role data is identified by the roleNameCol attribute.


    The username from both the users table and the roles table should match the value
    a person enters as a username. The role name value will match up to roles specified
    in the application’s web.xml file.


    The following example SQL script in Listing 12-3 creates the needed tables. This
    script has been tested only on MySQL.


    **Listing 12-3.** *security.sql*


    create database if not exists security;


    grant all privileges on security.* to test@localhost identified by "test"; grant
    all privileges on security.* to test@"%" identified by "test"; use security;


    create table users (


    username varchar(50) not null primary key,


    password varchar(25) not null


