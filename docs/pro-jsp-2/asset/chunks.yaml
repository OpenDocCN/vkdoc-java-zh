    server. Here, you can use Cactus-provided test classes to instantiate the components
    that you wish to test and invoke their methods. For example, you might choose
    to create a new instance of a servlet class and call the doGet() method. Of course,
    to actually call this method you need to have access to the HTTP request and response
    objects, so where do they come from?


    The key here is a test redirector component that sits between the client and server
    test classes. When a test is initiated by the client, a request is made to the
    Java EE container and this is intercepted by a Cactus-provided servlet that must
    also be running on the server. This servlet (the test redirector) then determines
    which server-side test needs to be run and initiates the appropriate test class.
    As an actual HTTP request has been made to the Java EE


    container, Cactus simply wraps this up and passes it on to the server-side test
    class to use as necessary. The object representing the HTTP response is also wrapped
    up for use by the test class. With access to these, the server-side test class
    and the class being tested can extract parameters, write output to the response,
    and so on. Assertions can then be made that the class being tested works as expected,
    with the results of these assertions being passed back to the client for reporting.


    As an example, consider the ViewCustomerAction class that we introduced during
    our discussion of MVC earlier in the chapter. Because this class relies on the
    server for a real request, it’s a great candidate for testing with Cactus. Listing
    14-6 shows how you might achieve this.


