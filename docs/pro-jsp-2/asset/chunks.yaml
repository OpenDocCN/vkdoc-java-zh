    请注意，有效的用户名和密码是硬编码在 `authenticate()` 方法中的。显然，在实际的应用程序中，该类会使用更健壮的技术来验证用户名和密码。


    现在我们需要编写一个类来表示用户和用户角色。清单 12-10 显示了实现 `java.security.Principal` 的 `MyPrincipal`
    类。


    **清单 12-10.** *MyPrincipal.java*


    package com.apress.projsp;


    public class MyPrincipal implements java.security.Principal


    {


    String m_Name = new String("");


    public MyPrincipal(String name) {


    m_Name = name;


    }


    public boolean equals(Object another) {


    try {


    MyPrincipal pm = (MyPrincipal) another;


    return pm.m_Name.equalsIgnoreCase(m_Name);


    } catch (Exception e) {


    return false;


    }


    }


    public String getName() {


    return m_Name;


    }


    public int hashCode() {


    return m_Name.hashCode();


    }


    public String toString() {


    return m_Name;


    }


    }


    清单 12-11 显示了一个角色类（它扩展了清单 12-10 中的 `MyPrincipal` 类）。


    513-0 ch12.qxd 11/17/05 4:15 PM Page 498


    **498**


    第 12 章 ■ WEB 应用程序中的安全性


    **清单 12-11.** *MyRolePrincipal.java*


    package com.apress.projsp;


    public class MyRolePrincipal extends MyPrincipal


    {


    /** 创建 MyRolePrincipal 的新实例 */

    public MyRolePrincipal(String s) {


    super(s);


    }


    }


    编译这三个类，并使它们对你的 Web 应用程序可访问。你可以通过将它们放在 `WEB-INF\classes` 中，或者将它们放入一个 JAR 文件中，然后将该
    JAR 文件复制到应用程序的 `WEB-INF\lib` 或 Tomcat 的 `common\lib` 来实现这一点。现在，你需要配置应用程序的上下文以使用这些新创建（当然，也已编译）的类。


    <Realm className="org.apache.catalina.realm.JAASRealm" debug="99"


    appName="ProJSP"


    userClassNames="com.apress.projsp.MyPrincipal"


    roleClassNames="com.apress.projsp.MyRolePrincipal" /> 如果你使用的是 Tomcat 5.0，请将 `<Realm>`
    元素放在 `server.xml` 文件中。如果你使用的是 Tomcat 5.5，请将 `<Realm>` 元素嵌套在文件 `META-INF\context.xml`
    的 `<Context>` 元素中。


    为 `MyLoginModule` 创建一个登录配置文件。（有关登录配置文件的更多信息，请参见 http://java.sun.com/j2se/1.4.2/docs/guide/security/jaas/JAASRefGuide.html。）Tagish
    发行版将其文件命名为 `tagish.login`；如清单 12-12 所示，我们将我们的文件命名为 `projsp.login`。


    **清单 12-12.** *projsp.login*


    ProJSP {


    com.apress.projsp.MyLoginModule required;


    };


    这里需要注意几点。首先，`<Realm>` 元素中的 `appName` 属性必须与登录配置文件中的应用程序名称匹配。其次，配置文件可以列出多个登录模块。只需依次添加每个额外的登录模块，并使用分号分隔每个条目。


    最后，我们需要告诉 JVM 在哪里找到这个登录配置文件。与 `tagish.login` 文件一样，我们在 `java.security` 配置文件 `jre\lib\security\java.security`
    中执行此操作：


    login.config.url.n=file:${path/to/projsp.login}


    安全配置文件由一组你可以配置的安全属性组成。上面一行中的 `n` 被替换为一个唯一的整数，以便你可以列出多个配置 URL。`login.config.url.n`
    属性的值是登录配置文件的路径。


    513-0 ch12.qxd 11/17/05 4:15 PM Page 499


    第 12 章 ■ WEB 应用程序中的安全性


    **499**


    因此，如果 `JAVA_HOME` 是 `c:\java`，那么 `java.security` 文件中针对 `projsp.login` 的条目将如下所示：


    login.config.url.1=file:c:/java/jre/lib/security/projsp.login 最后，编辑或创建部署描述符中的
    `<security-constraint>` 和 `<login-config>` 元素。


    **基于表单的身份验证技巧与诀窍**


    既然我们已经讨论了如何将基于表单的身份验证与服务器的域一起使用，我们想分享一些技巧和诀窍。其中许多是客户请求或可用性增强，我们认为它们将使开发安全应用程序变得更加容易。


    使用欢迎文件


    在 Web 应用程序中，配置用户将看到的起始页面非常重要。将以下 `<welcome-file-list>` 元素添加到你的 `web.xml` 文件中可以实现这一点：


    <welcome-file-list>


    <welcome-file>index.jsp</welcome-file>


    </welcome-file-list>


    在某些应用服务器中，默认的欢迎文件已经配置为 `index.html` 和 `index.jsp`，但指定这一点并提高应用程序的可移植性并无坏处。另外，请注意你的欢迎文件可以使用任意名称命名；你不必将其命名为
    `index.jsp` 或 `index.html`。配置好欢迎文件后，很容易添加几行简单的代码将用户转发到受保护的资源：


    <% response.sendRedirect("/welcome.do"); %> Servlet 2.4 规范的一个不错的补充是，你实际上可以将欢迎文件设置为使用一个
    servlet；这在早期版本中是无法做到的。也就是说，当使用兼容 Servlet 2.4 或 Servlet 2.5 的容器时，以下配置将生效：


    <welcome-file>/welcome.do</welcome-file>

