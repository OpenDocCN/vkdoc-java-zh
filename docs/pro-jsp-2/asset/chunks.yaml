- fmt: "When you use form-based authentication and you forward to a protected resource,\
    \ you’re presented with the page specified in your `web.xml` file—in this chapter’s\
    \ example application, it’s `login.jsp`. To make this page friendlier than just\
    \ a login form, we usually do one of the following:\n\n- Include a welcome message\
    \ on this page\n- Include a welcome message from another JSP by using `<jsp:include>`\n\
    - Use a templating mechanism such as Tiles or SiteMesh to combine the two pages\
    \ and the appropriate URL in the redirect’s value\n\n> **Note** You can find more\
    \ information on Tiles and SiteMesh at `http://jakarta.apache.org/struts/userGuide/dev_tiles.html`\
    \ and `http://www.opensymphony.com/sitemesh/`, respectively.\n\n## Allowing Login\
    \ on an Error Page\n\nWith HTTP basic authentication, users may find it frustrating\
    \ when their login fails. If you enter invalid credentials when using some browsers\
    \ (Internet Explorer for the Mac, for example), an HTTP status code (`401 – Unauthorized`)\
    \ is returned and an error message is displayed on the screen. Mozilla handles\
    \ this better by prompting you again for valid credentials. This is the ideal\
    \ situation and is what most usability experts recommend. The default behavior\
    \ with form-based authentication is similar to the undesirable behavior previously\
    \ described.\n\nDon’t worry, though—a couple of techniques can help solve this\
    \ problem. The first uses one JSP page to serve up both the login page and the\
    \ error page. The second uses cookies to capture the requested URL and reuse it.\n\
    \nUsing the same page as your `form-login-page` and `form-error-page` is as simple\
    \ as configuring your `web.xml` to handle this:\n\n```xml\n<form-login-config>\n\
    \  <form-login-page>/login.jsp</form-login-page>\n  <form-error-page>/login.jsp</form-error-page>\n\
    </form-login-config>\n```\n\nOne problem with this approach is that the user will\
    \ see the same page again—with no error information—if the login fails. So let’s\
    \ add a little indicator to the `form-error-page` to indicate that the login has\
    \ failed:\n\n```xml\n<form-error-page>/login.jsp?error=true</form-error-page>\n\
    ```\n\nNow it’s possible to grab this parameter in your JSP page and display an\
    \ error message if authentication fails:\n\n```jsp\n<c:if test=\"${param.error\
    \ != null}\">\n  <div class=\"error\">\n    Invalid username and/or password,\
    \ please try again.\n  </div>\n</c:if>\n```\n\nThough this seems easy enough,\
    \ it has been known to fail on some containers. When this happens, the containers\
    \ are still complying with the specification. However, you can work a little magic\
    \ to attempt to log in again from the error page.\n\nIn working with iPlanet Application\
    \ Server 6.x, which required two separate pages in `<login-config>`, we stumbled\
    \ upon this solution when viewing the source of the `login.jsp` in the browser.\
    \ The HTML source showed all kinds of good information, in particular the original\
    \ URL requested as a hidden field. Using this hidden field, we were able to set\
    \ this value as a cookie and reuse it in our form’s action on the `login-error-page`.\n\
    \n> **Note** You can find the details of this procedure at `http://husted.com/struts/resources/fb-auth.htm`.\n\
    \nUnfortunately, there’s no portable mechanism to acquire the URL that was originally\
    \ requested, and there’s no guarantee that this is even possible. All you know\
    \ is that the container has detected that a protected URL was requested and that\
    \ there was no user currently authenticated. One solution might be to use a filter\
    \ to track all recently requested URLs and get the last requested URL from it.\
    \ You’ll want to make sure your login form is a `*.jspf` (JSP fragment) file so\
    \ you can include it in both the `form-login-page` and `form-error-page`.\n\n\
    ## Using Secure Sockets Layer for Login Only\n\nAs mentioned earlier, using SSL\
    \ can slow the performance of your application, so it’s wise to use it only when\
    \ it’s needed. A good use of SSL is when a user logs in. This means that a user\
    \ who accesses the login page by using the HTTP protocol (`http://`) will be switched\
    \ over to HTTPS (`https://`) when the username and password are sent across the\
    \ wire. In this example, you’ll use a `Login` servlet to process the initial login\
    \ request, switch to SSL, and then redirect to the container’s authentication\
    \ mechanism.\n\nThe code download for this book comes with a fully featured application\
    \ for demonstrating security techniques. Unfortunately, it is too lengthy to fully\
    \ list here. We provide extracts as we explain the application in the following\
    \ pages. This application, which we refer to as `security-example.war` for simplicity’s\
    \ sake, is designed to hold all the security mechanisms described in this chapter.\
    \ Both source code and binary versions of this application are available for download.\
    \ You can complete most of these exercises by using the binary version and tweaking\
    \ the `security-example.xml` file and the application’s `web.xml` file.\n\n###\
    \ Using a Servlet\n\nThe first feature that this application offers is an SSL-based\
    \ login. To provide this SSL-based login, the application has a servlet that will\
    \ intercept login requests. This servlet is called `LoginServlet`, and it maps\
    \ to a `<url-pattern>` of `/auth/*`. Then, rather than using `j_security_check`\
    \ for the login form’s `action` attribute, you’ll use `auth/`. Here’s what the\
    \ form looks like on the login page:\n\n```html\n<form id=\"loginForm\" method=\"\
    post\" action=\"auth/\">\n```\n\nTo turn secure login on, you need to edit the\
    \ `web.xml` file that ships with this application, setting the `isSecure` init-parameter\
    \ to `true`:\n\n```xml\n<servlet>\n  <servlet-name>login</servlet-name>\n  <display-name>Login\
    \ Servlet</display-name>\n  <servlet-class>org.appfuse.webapp.action.LoginServlet</servlet-class>\n\
    \  <init-param>\n    <param-name>authURL</param-name>\n    <param-value>j_security_check</param-value>\n\
    \  </init-param>\n  <init-param>\n    <param-name>isSecure</param-name>\n    <param-value>true</param-value>\n\
    \  </init-param>\n  <init-param>\n    <param-name>encrypt-password</param-name>\n\
    \    <param-value>false</param-value>\n  </init-param>\n  <init-param>\n    <param-name>algorithm</param-name>\n\
    \    <param-value>SHA</param-value>\n  </init-param>\n  <load-on-startup>3</load-on-startup>\n\
    </servlet>\n```\n\nIf you’re building the `security-example` project from source,\
    \ the parameters for the login servlet are specified at build time. The default\
    \ settings are contained in the `app-settings.xml` file and can be overwritten\
    \ from the command line by using `-Dname=<value>` (which would mean `-Dsecure.login=true`\
    \ in this case). The `secure.login` is turned off by default, so you’ll need to\
    \ add `secure.login=true` to your `build.properties` file or pass it in on the\
    \ command line.\n\nNow let’s dig into this servlet and see what makes it tick.\
    \ First, we must confess that we did get some of the magic that makes this work\
    \ from a *JavaWorld* article by Steve Ditlinger. We’re using two classes from\
    \ this article: `SslUtil` and `RequestUtil`.\n\n> **Note** You can find Steve\
    \ Ditlinger’s article, titled “Mix Protocols Transparently in Web Applications,”\
    \ online at `http://www.javaworld.com/javaworld/jw-02-2002/jw-0215-ssl.html`.\n\
    \nIf your HTTP and HTTPS ports are different from the defaults, 80 and 443, you’ll\
    \ need to change the two context parameters in `web.xml` for the HTTP and HTTPS\
    \ ports. In the source distribution, you can edit `web.xml` in the `web\\WEB-INF`\
    \ folder. Currently, these values are set as follows:\n\n```xml\n<context-param>\n\
    \  <param-name>listenPort_http</param-name>\n  <param-value>8080</param-value>\n\
    </context-param>\n<context-param>\n  <param-name>listenPort_https</param-name>\n\
    \  <param-value>8443</param-value>\n</context-param>\n```\n\nThese values, along\
    \ with the servlet’s initialization parameters, are loaded when the servlet starts.\
    \ We don’t provide the code here, because we’re guessing you already understand."
