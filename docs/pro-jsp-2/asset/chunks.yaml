    **Validating Input**


    If you’ve worked with web applications before, you know that a lot of effort is
    involved in ensuring that the data entered by the user of your application is
    correct. JSF provides a means to simplify data validation, through the use of
    standard and custom validators.


    **Using Standard Validators**


    JSF provides three standard validators as part of the JSF implementation through
    the following custom tags:


    • **<validateDoubleRange>:** Validates that a value is a double. You can include
    the optional attributes minimum and maximum to set minimum and maximum values.


    • **<validateLongRange>:** Validates that a value is a long. You can include the
    optional attributes minimum and maximum to set minimum and maximum values.


    • **<validateLength>:** Validates a string value for length. You can include the
    optional attributes minimum and maximum to set minimum and maximum values.


    With all three validators, both of the attributes are optional. This means you
    could add a validator tag without either a minimum or maximum attribute. In that
    case, no validation will be performed. When you provide only a minimum, the validator
    checks that the value is greater


    513-0 ch05.qxd 11/1/05 7:18 PM Page 237


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    **237**


    than or equal to the minimum. When you provide only a maximum, the validator checks
    that the value is less than or equal to the maximum. When you provide both a minimum
    and a maximum, the validator checks that the value is greater than or equal to
    the minimum and less than or equal to the maximum.


    One other validation you can perform in your JSF application is to require a value.
    The


    <input> and <output> tags include an optional attribute: required. For example,
    the following tag would require that you enter a value in the text field:


    <h:inputText id="origination"


    value="#{flight.origination}" size="35" required="true"/> If you do not enter
    a value, the JSF implementation will return the originating page with a message
    that you did not enter a required value (assuming there is a <message> tag for
    the id origination).


    **Using Custom Validators**


    You create a custom validator by creating a class that implements the javax.faces.validator.


    Validator interface. All validators must implement this interface. The Validator
    interface has a single method that your class must implement:


    void validate(javax.faces.context.FacesContext context, javax.faces.component.UIComponent
    component, java.lang.Object value) In the validate() method, if the value argument
    passes the validation check, you can simply return from the method. This signals
    to the JSF implementation that the value passed the validation check. If it does
    not pass the validation check, you throw a javax.faces.validator.


    ValidatorException. The ValidatorException instance includes a FacesMessage instance
    with summary and detail messages describing the validation error.


    If you check the JSF Javadoc, you will see that the JSF implementation includes
    a number of implementations of the javax.faces.validator.Validator interface.
    These are the standard validators that handle validating doubles, longs, and string
    lengths.


    Suppose we wanted to create a date validator to ensure that dates entered by the
    user of our Flight Search application are greater than or equal to the day after
    the current date, and less than one year from the current date. Listing 5-22 shows
    the code for this validator.


    **Listing 5-22.** *DateValidator.java*


    package com.apress.projsp;


    import java.util.Calendar;


    import java.util.Date;


    import javax.faces.application.FacesMessage;


    import javax.faces.component.UIComponent;


    import javax.faces.context.FacesContext;


    import javax.faces.validator.Validator;


    import javax.faces.validator.ValidatorException;


    513-0 ch05.qxd 11/1/05 7:18 PM Page 238


    **238**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    public class DateValidator implements Validator {


    public void validate(FacesContext arg0, UIComponent arg1, Object arg2) throws
    ValidatorException {


    Calendar date = Calendar.getInstance();


    date.setTime((Date) arg2);


    Calendar tomorrow = Calendar.getInstance();


    tomorrow.set(Calendar.HOUR, 0);


    tomorrow.set(Calendar.MINUTE, 0);


    tomorrow.set(Calendar.SECOND, 0);


    Calendar oneYear = Calendar.getInstance();


    oneYear.set(Calendar.HOUR, 0);


    oneYear.set(Calendar.MINUTE, 0);


    oneYear.set(Calendar.SECOND, 0);


    oneYear.add(Calendar.YEAR, 1);


    if (date.before(tomorrow) || date.after(oneYear)) {


    FacesMessage message =


    new FacesMessage(


    FacesMessage.SEVERITY_ERROR,


    "Date Error",


    "Date must be between tomorrow and one year from today"); throw new ValidatorException(message);


    }


    }


    }


    The code in the validate() method creates two Calendar objects: tomorrow corresponds
    to the day after the current date, and oneYear corresponds to one year from the
    current date.


    Then the code compares the argument passed to the validate() method to see if
    it is between the dates represented by those two Calendar objects. If the argument
    is not between those two Calendar objects, a ValidatorException is thrown; if
    it is between those two dates, the method simply returns.


    The validator is registered with the JSF implementation with the <validator> element
    in a configuration file. The <validator> element has two required subelements:


    • **<validator-id>:** Used to create an ID string that you can use in the <validator>
    tag to specify a validator instance. This ID must be unique within the application.


    • **<validator-class>:** The fully qualified class name of the validator class.


    Here is an example of the element you could place in the faces-config.xml configuration
    file for this validator:


    <validator>


    <validator-id>date.validator</validator-id>


    <validator-class>com.apress.projsp.DateValidator</validator-class>


    </validator>


    ![Image 63](index-272_1.png)


