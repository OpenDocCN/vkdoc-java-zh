    for more information about login configuration files.) The Tagish distribution
    named its file `tagish.login`; as Listing 12-12 shows, we''ll name ours `projsp.login`.


    **Listing 12-12.** *projsp.login*


    ```

    ProJSP {


    com.apress.projsp.MyLoginModule required;


    };

    ```


    There are a couple of things to note here. First, the `appName` attribute in the
    `<Realm>` element must match the application name in the login configuration file.
    Second, the configuration file can list multiple login modules. Just add each
    additional login module sequentially, using a semicolon to separate each entry.


    Finally, we need to tell the JVM where to find this login configuration file.
    As with the `tagish.login` file, we do this in the `java.security` configuration
    file, `jre\lib\security\java.security`:


    ```

    login.config.url.n=file:${path/to/projsp.login}

    ```


    The security configuration file consists of a set of security properties that
    you can configure. The `n` in the preceding line is replaced with a unique integer
    so that you can list multiple config URLs. The value of the `login.config.url.n`
    property is the path to the login configuration file. So, if `JAVA_HOME` is `c:\java`,
    then the entry in the `java.security` file for `projsp.login` would be as follows:


    ```

    login.config.url.1=file:c:/java/jre/lib/security/projsp.login

    ```


    Finally, edit or create the `<security-constraint>` and `<login-config>` elements
    of the deployment descriptor.


    ## Form-Based Authentication Tips and Tricks


    Now that we''ve discussed how to use form-based authentication with your server''s
    realms, we''d like to share some tips and tricks. Many of these have been client
    requests or usability enhancements, and we think they''ll make developing your
    secure application easier.


    ### Using the Welcome File


    It''s important in a web application to configure the opening page that users
    will see. Adding the following `<welcome-file-list>` element to your `web.xml`
    file can do this:


    ```xml

    <welcome-file-list>


    <welcome-file>index.jsp</welcome-file>


    </welcome-file-list>

    ```


    In some application servers, the default welcome file is already configured to
    be `index.html` and `index.jsp`, but it doesn''t hurt to specify this and increase
    your application''s portability. Also, note that your welcome file can be named
    with any arbitrary name; you are not restricted to naming the welcome file `index.jsp`
    or `index.html`. After you''ve configured your welcome file, it''s easy to add
    a few simple lines to forward the user to a protected resource:


    ```jsp

    <% response.sendRedirect("/welcome.do"); %>

    ```


    One nice addition to the Servlet 2.4 specification is that you can actually set
    your welcome file to use a servlet; you were unable to do this in earlier versions.
    This is to say that the following will work when using a Servlet 2.4– or Servlet
    2.5–compliant container:


    ```xml

    <welcome-file>/welcome.do</welcome-file>

