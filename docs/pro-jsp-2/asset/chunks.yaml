    **531**


    **Applying Database Connection Pooling**


    Database connection pooling should help improve performance because it will eliminate
    the overhead that surrounds opening and closing database connections. When the
    application needs a database connection, it will obtain it from a pool of already
    opened database connections.


    So, how do you go about applying database connection pooling to the Ag application?


    Well, it turns out that because Ag uses Hibernate for all database access, Ag
    is already using database connection pooling. Hibernate has built-in connection
    pooling. Hibernate connection pooling is configured in the Hibernate configuration
    file, hibernate.properties, in which you specify your application’s database connection
    parameters. The following is the Hibernate configuration file for the Ag application:


    hibernate.connection.driver_class=org.hsqldb.jdbcDriver hibernate.connection.url=jdbc:hsqldb:hsql://localhost


    hibernate.connection.username=sa


    hibernate.connection.password=


    hibernate.connection.pool_size=30


    hibernate.statement_cache.size=6


    hibernate.dialect=net.sf.hibernate.dialect.HSQLDialect


    Hibernate’s built-in connection pooling is convenient, no doubt, but it isn’t
    always the right answer. Your application server administrator may prefer that
    you configure your application to use the database connection pooling capabilities
    of your application server or those of your JDBC driver. How do you do that?


    If you’re using Hibernate, you specify the name of the JNDI data source, provided
    by your application server administrator, in the Hibernate configuration file.
    You’ll also have to specify the database dialect. The following example is configured
    for accessing an Oracle data source that’s bound to the JNDI name java:comp/env/jdbc/oracle.
    There’s no need to specify a JDBC


    driver class, connection URL, or anything else because those were specified by
    your server administrator when he configured the data source. For more information
    on data source usage and configuration, see the section “Obtaining a JDBC Connection
    in a Web Application”


    in Chapter 9.


    hibernate.connection.datasource=java:comp/env/jdbc/oracle hibernate.dialect=net.sf.hibernate.dialect.Oracle9Dialect
    Adding database connection pooling isn’t going to do you any good because you’re
    already using it, so let’s move on to applying page caching.


    **Applying Page Caching**


    The new Ag front page is rendered by the JSP file main.jsp, so that’s where you’ll
    add your caching. You’ll use OSCache JSP tags that we discussed earlier in this
    chapter.


    You already have the OSCache JAR file in your application’s WEB-INF\lib directory
    and the oscache.properties file in the WEB-INF\classes, so all you need to do
    is add the OSCache JSP


    taglib declaration to the top of main.jsp and the OSCache tags around the part
    of the page that you wish to cache. Listing 13-5 shows the code for main.jsp with
    the new OSCache additions.


