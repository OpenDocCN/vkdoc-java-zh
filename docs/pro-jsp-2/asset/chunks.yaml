    C H A P T E R 9 ■ D ATA A C C E S S O P T I O N S F O R W E B A P P L I C AT I
    O N S


    Let’s analyze the contents of the Hibernate mapping.


    After the standard XML declaration and the DOCTYPE tags, you find the root element
    of a Hibernate mapping file, the <hibernate-mapping> element. Within the root
    element, you’ll find one or more <class> tags. The <class> tag maps one class
    to a database table, so the tag has two attributes. The name attribute specifies
    the name of the Java class, and the table attribute specifies the name of the
    table that the Java class is to be mapped to:


    <hibernate-mapping>


    <class name="com.apress.projsp.Newsfeed" table="newsfeed"> The first element within
    the class mapping is the <id> element. This element specifies which JavaBean property
    and which database table column are to be used as a primary key for the class.
    Within the <id> tag is the <generator> tag, which specifies which method should
    be used to generate primary keys for new objects:


    <id column="id" name="id" >


    <generator class="uuid.hex" />


    </id>


    Hibernate supports 10 primary-key generation methods. The class="uuid.hex" method
    results in a 32-character key that is generated by using the IP address of the
    machine upon which Hibernate is running. It’s also possible to tell Hibernate
    to allow the database to generate the key by using class="sequence" or to allow
    the application to assign the key by using class="assigned".


    The <property> tag maps a simple java.lang.String property named url to a database
    column called url. The property isn’t allowed to be null and is required to be
    unique.


    <property name="url" column="url" type="string"


    not-null="true" unique="true" /> The next two elements are interesting. The <set>
    tag indicates that you’re mapping a java.util.Set collection to the database.
    Each Newsfeed is associated with a collection of Item objects and a collection
    of Subscription objects. This is a classic one-to-many relationship. The com.apress.projsp.Newsfeed
    objects are stored in the newsfeed table, the com.apress.projsp.Item objects are
    stored in the item table, and the two tables are related by a newsfeed_id column
    in the item table:


    <set role="items" table="item" cascade="delete">


    <key column="newsfeed_id" />


    <one-to-many class="com.apress.projsp.Item" />


    </set>


    <set role="subscriptions" table="subscription" cascade="delete">


    <key column="newsfeed_id" />


    <one-to-many class="com.apress.projsp.Subscription" />


    </set>


    If you’re having a hard time visualizing these relationships, refer to Figure
    9-7 in the


    “Two-Layer Architecture” section, which shows the relationships between User,
    Subscription, Newsfeed, and Item objects.


