    in the initialization, and adds it to the cart object. As mentioned earlier, a
    cart can contain only one of each product. If the user tries to add more than
    one of the same item to the cart, an ItemAlreadyAddedException is thrown. As you’ll
    see later, the web container catches this exception and a special page is shown.


