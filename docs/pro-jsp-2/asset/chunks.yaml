    **Action Listeners**


    Action listeners are provided by JSF to make it easier to handle action events.
    JSF already provides some event handling. For example, in Listing 5-24, clicking
    a button on the search page (an event) causes the search() method of the FlightSearch
    class to be called. However, that event handler is limited in what it can do,
    because it has no access to the state of the user interface. Action listeners
    do receive information about the user interface, and thus can be used for more
    robust event handling.


    Action listeners are attached to the two JSF command elements: command buttons
    and command links. Action events are handled in a manner very similar to value
    change events.


    You attach a listener to a command element with the actionListener attribute.
    For example,


    513-0 ch05.qxd 11/1/05 7:18 PM Page 245


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    **245**


    the searchForm.jsp page has a command button. You can attach an action listener
    to it by using this syntax:


    <h:commandButton value="Search"


    actionListener="#{flight.confirm}"


    action="#{flight.search}"/>


    When the button is clicked, the JSF implementation calls the action listener during
    the Invoke Application phase. The action listener method then has a chance to
    perform any processing related to the command element selected by the user. You
    can perform any processing you need to inside the method. The method can have
    any name, must be public, return void, and accept an ActionEvent as its only parameter.


    After the action listener method is called, the method bound by the action attribute
    will be called, and the JSF implementation will determine where to navigate next.


    Because the action listener method is called before the action method, the action
    listener method is able to modify the response that the action method returns.
    For example, the Flight Search application could have some links that direct the
    user to searches for lodging, transportation, or other services. Without action
    listeners, you would need to write a different action method for each link, because
    the action method cannot have parameters and thus does not know what part of the
    user interface was clicked. As the number of links increased, so would the number
    of action methods. However, the action listener does have access to the user interface
    through the ActionEvent, and could determine which link was clicked. It could
    store that information as a bean property that the action method could access.
    With this technique, a single action listener method and a single action method
    could handle any number of links.


    **Calling Multiple Listeners**


    There may be situations in which you want multiple value change listeners or multiple
    action listeners to respond to an event. In that case, you need a slightly different
    syntax to attach the listeners to the JSF element.


    In the preceding examples, we attached a value change listener or an action listener
    to a JSF element by using the valueChangeListener or actionListener attributes.
    When using the attribute syntax, you use a method-binding expression to bind a
    method as a listener. However, this works only when attaching a single listener.


    When you need to attach multiple listeners, there is a JSF tag for value change
    listeners and one for action listeners that can be used to attach one or more
    listeners to an element.


    When using the tag syntax, you will be specifying a class that implements a listener
    interface.


    For value change listeners, the tag is <f:valueChangeListener>, with an attribute
    named type that is the class name of the listener. The interface that the listener
    must implement is javax.faces.event.ValueChangeListener. It has a single method
    that must be implemented: void processValueChangeEvent(ValueChangeEvent);


    So, if we assume that the FlightSearch and FlightTypes classes both implement
    ValueChangeListener, we could attach both of them to an element like this:


    <h:selectOneRadio layout="lineDirection"


    value="#{flight.tripType}"


    onclick="submit()"


    immediate="true">


    513-0 ch05.qxd 11/1/05 7:18 PM Page 246


    **246**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    <f:valueChangeListener type="com.apress.projsp.FlightSearch"/>


    <f:valueChangeListener type="com.apress.projsp.FlightTypes"/>


    <f:selectItems value="#{types.tripTypes}"/>


    </h:selectOneRadio>


    For action listeners, the tag is <f:actionListener>, with an attribute named type
    that is the class name of the listener. The interface that the listener must implement
    is javax.faces.


    event.ActionListener. It has a single method that must be implemented: void processAction(ActionEvent);


    If we assume that the FlightSearch and FlightTypes classes both implement ActionListener,
    we could attach both of them to an element, like this:


    <h:commandButton value="Search"


    action="#{flight.search}">


    <f:actionListener type="com.apress.projsp.FlightSearch"/>


    <f:actionListener type="com.apress.projsp.FlightTypes"/>


    </h:commandButton>


    In either of the two preceding examples, both listeners will be called at the
    appropriate time to respond to the event. If any listeners are attached by using
    attribute syntax, they will be called first. Then any listeners attached by using
    tag syntax will be called, in order of declaration.


    **Using Message Bundles**


    With the global nature of the Web, many web applications must be internationalized.
    JSF


    provides a facility to make it easy to internationalize your web application.
    The features of JSF


    that are used for internationalization build on the internationalization capability
    provided in the Java core libraries.


    To provide an internationalized version of your web application, all the text
    strings used in your application must be collected into a properties file that
    your application can load and use.


    Listing 5-25 shows a properties file of messages that you could use with the searchForm.jsp
    page we have developed in this chapter as part of the Flight Search application.
    This file holds the English language strings for the application.


    **Listing 5-25.** *messages.properties*


    title=Freedom Airlines Online Flight Reservation System head=Search Flights


    type=What type of flight do you need?


    searchLabel=Where and when do you want to travel?


    departAirport=Depart:


    arriveAirport=Arrive:


    departLabel=Depart Date:


    returnLabel=Return Date:


    searchButton=Search


