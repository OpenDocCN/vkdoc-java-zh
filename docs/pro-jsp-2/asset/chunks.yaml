    \n## 注释\n\nJSP 代码中允许两种注释——JSP 注释和 HTML 注释：\n\n```html\n<!-- HTML 注释会保留在最终的客户端页面中。\n\
    它们可以包含 JSP 表达式，这些表达式会被 JSP 容器忽略。\n-->\n```\n\n```jsp\n<%-- JSP 注释对最终的客户端页面隐藏 --%>\n\
    ```\n\n还要记住，在脚本片段中（在 `<% %>`、`<%! %>` 或 `<%= %>` 标签内），你可以使用标准的 Java 注释：\n\n```java\n\
    <%\n/* 这个 Java 注释以斜杠星号开头，一直持续到遇到闭合的星号斜杠。 */\n// 以双斜杠开头的注释会持续到行尾。\n%>\n```\n\n\
    ## 指令\n\n指令是向 JSP 容器发出的关于页面属性、导入标签库以及在 JSP 中包含内容的指令。由于指令是说明而非输入输出过程，它们不能通过输出流产生任何输出。\n\
    \n### page 指令\n\n`page` 指令指定页面的属性——所有属性都是可选的，因为基本属性都有默认值，以粗体显示。\n\n```jsp\n<%@\
