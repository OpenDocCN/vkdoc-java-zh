    ## Tiles, XDoclet, and Forwards\n\nUsing Tiles to assemble and define your pages\
    \ can be quite handy, but how do you call these definitions? The easiest way to\
    \ reference your Tiles definitions is using an `ActionForward`.\n\nWhen you add\
    \ the Tiles plug-in to your Struts configuration file, a smart Tiles-aware processor\
    \ is used to execute requests. This processor, named `TilesRequestProcessor`,\
    \ subclasses the Struts default `RequestProcessor` to intercept calls to includes\
    \ and forwards to see if the specified URI (path) is a definition name.\n\nTo\
    \ configure Tiles definition forwarding in your application, all you need to do\
    \ is match up the `path` attribute of a `<forward>` with the `name` attribute\
    \ of a definition. For example, in `struts-resume`, the `ResumeAction`'s `search()`\
    \ method returns an `ActionForward` to a local `<forward>` named `list`:\n\n```\n\
    return mapping.findForward(\"list\");\n```\n\nThis forward is defined in `struts-config.xml`\
    \ for the `ResumeAction` class as follows:\n\n```\n<action path=\"/editResume\"\
    \ type=\"org.appfuse.webapp.action.ResumeAction\"\n    name=\"resumeForm\" scope=\"\
    request\" input=\"viewResumes\"\n    parameter=\"action\" unknown=\"false\" validate=\"\
    false\">\n  <forward name=\"edit\" path=\".resumeDetail\" redirect=\"false\"/>\n\
    \  <forward name=\"list\" path=\".resumeList\" redirect=\"false\"/>\n</action>\n\
    ```\n\nIn `tiles-config.xml`, the `.resumeList` definition is a simple definition\
    \ that defines a title, header, and content page.\n\n```\n<definition name=\"\
    .resumeList\" extends=\".mainMenu\">\n  <put name=\"title.key\" value=\"resumeList.title\"\
    \ />\n  <put name=\"heading.key\" value=\"resumeList.heading\" />\n  <put name=\"\
    content\" value=\"/WEB-INF/pages/resumeList.jsp\"/>\n</definition>\n```\n\nIn\
    \ `struts-resume`, the `BaseAction` class extends `LookupDispatchAction`, and\
    \ Tiles definitions are used extensively for assembling pages. The logic flow\
    \ from a JSP’s URL to an action’s method to a Tiles definition can be somewhat\
    \ confusing, especially when you bring XDoclet into the mix to define the action’s\
    \ mapping and local forwards. Figure 15-13 illustrates the logical flow of it\
    \ all.\n\n**MainMenu** (JSP)\n\nThe link View My Resumes is associated with the\
    \ global-forward `viewResumes`, which in turn is associated with the path `/viewResumes.do?action=search`.\
    \ Therefore, flow goes through `ActionServlet(*.do)` to path `/viewResumes.do`.\n\
    \n**ResumeAction** (Action)\n\nXdoclet tags in JavaDoc of `ResumeAction.java`\
    \ define a parameter named `action`. The path defined earlier specified that `action=search`,\
    \ so flow passes to the `search()` method.\n\n**search()** Method\n\nMethod contains\
    \ the line `return mapping.findForward(\"list\");`. This `list` forward is defined\
    \ using Xdoclet:\n\n```\n* @struts.action-forward\n*\n* name= list\n*\n* path=\
    \ .resumeList\n```\n\n**.resumeList** Definition from **tiles-config.xml**\n\n\
    **Figure 15-13.** *The logical flow of control from JSP to Tiles*\n\nIn the previous\
    \ diagram, the `ResumeAction` class extends `LookupDispatchAction`. Basically,\
    \ it allows you to use a parameter (`action`) to specify which method to call\
    \ in your `Action` class.\n\nThe figure shows the XDoclet tags used to create\
    \ the `ResumeAction`'s mapping in the Struts configuration file as well its local\
    \ forward. All of these tags are written in the class’s header Javadoc comments.\n\
    \n## Tiles Controllers\n\nTiles controllers can be very helpful in improving the\
    \ architecture of your Tiles-enabled application. They haven’t received much press\
    \ in current publications, but can be a very useful feature. At its core, a Tiles\
    \ controller is designed to prepare data for presentation on a tile. You might\
    \ think of it as a mini-action. However, these controllers aren’t designed to\
    \ determine application flow; that’s the responsibility of the `ActionServlet`.\
    \ If you’re developing a portal site or you have tiles that require their own\
