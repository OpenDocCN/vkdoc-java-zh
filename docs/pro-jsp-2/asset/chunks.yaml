    **555**


    从很多方面来看，这个类与你在上一节中看到的 JUnit 测试类似，不同之处在于这次你继承了一个 Cactus 特定的类。同样，你编写一个 `testXXX()`
    方法来测试功能，但 Cactus 允许你编写一个对应的 `beginXXX()` 方法，该方法会在你的测试方法之前被调用。正是在这里，你可以初始化请求参数等。你所继承的类（`ServletTestCase`）为你提供了访问真实请求/响应的能力，正是因为这个原因，测试服务器端动作变得如此直接。


    Cactus 提供了一种灵活的方式来测试那些确实需要在 Java EE 容器内部进行测试的组件，并且它目前支持对 Servlet、JSP、自定义标签和过滤器的测试。Cactus
    最大的问题在于，它一开始可能看起来很复杂，尤其是在框架的设置方面。Cactus 的伟大之处在于，它提供了一种方法来实际测试所有那些如果单独使用 JUnit
    就会未经测试的组件。另一方面，Cactus 测试确实要求你编写一些通常由容器自动执行的代码。如果你创建了一个 Servlet 实例，理想情况下你也应该调用诸如
    `init()` 和 `destroy()` 这样的容器管理方法。通常来说，这不会造成太大问题，因为 Servlet 和过滤器的生命周期是直接的。然而，自定义标签的情况则略有不同。


    **TagUnit**


    自定义标签最复杂的部分之一（当然是在 JSP 2.0 出现之前）是标签处理程序实例的生命周期看起来神秘且难以理解。JSP 2.0 通过新的 `SimpleTag`
    接口解决了这些问题，但在此之前，JSP 规范对标签处理程序实例的生命周期和池化设置了一些非常严格的规则，这些规则从未被广泛理解。由于实现这些生命周期需求的代码通常是
    Java EE 容器的职责，所以这通常不是问题。然而，为了使用 Cactus 测试自定义标签，开发者必须编写代码来精确模拟标签在页面上的使用方式。不幸的是，这个过程容易出错，因此
    TagUnit 测试框架应运而生。


    TagUnit (http://tagunit.sourceforge.net/) 是一个用于测试自定义标签的框架。它与其他测试工具的不同之处在于，它允许在标签最终将被使用的相同环境中进行测试。换句话说，测试本身是使用常规
    JSP 语法编写为 JSP 页面的。为了实现这一点，TagUnit 提供了自己的标签库，其中包含模拟 JUnit 中 `assertXXX()` 方法的测试和断言标签。因此，测试自定义标签变得非常容易。你只需在页面上使用你的标签，并将它们包裹在
    TagUnit 标签内即可。断言的示例包括将生成的内容与某些预期内容进行比较、查找作用域变量/属性的存在，以及检查异常是否被正确处理。


    清单 14-7 是一个测试你在第 7 章中看到的电子邮件地址过滤器标签所生成内容的示例，在该示例中，你测试了自定义标签是否确实过滤掉了电子邮件地址的域名部分。


    **清单 14-7.** *TestEmailAddressFilter.jsp*


    <%@ taglib uri="http://www.tagunit.org/tagunit/core" prefix="tagunit" %>


    <%@ taglib prefix="x" uri="/WEB-INF/tlds/myTags.tld" %>


    <tagunit:assertEquals name="简单过滤器测试">


    <tagunit:actualResult>


