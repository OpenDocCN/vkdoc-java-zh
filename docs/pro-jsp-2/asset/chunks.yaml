    **Filter**


    Another useful, although not widely used, pattern worth briefly talking about
    is called **Filter**.


    The filter API that you saw in the previous chapters is an implementation of this
    pattern, so instead of looking at how to implement a filter, let’s see how it
    can be used in the design of web applications and talk about some more typical
    uses.


    Filters can play in important role in the design of web applications because they
    can have responsibilities unrelated to any particular JSP or servlet. Filters
    can be seen as channels through which all requests and responses can be passed.


    One way I have used filters in web applications is to interpret user-friendly
    URLs. To help me keep my website up to date, I built some web-logging software—a
    simple date-based content management system to which I post short entries on a
    daily basis. The web log (abbreviated to “blog”) then displays the most recent
    of these entries in reverse date order on the front page. In addition, when readers
    want to locate older entries, they can simply jump directly to a page containing
    all the entries for an individual day. In the past, such websites have been built
    of static pages, organized in such a way that made it easy to find the page for
    a specific day. For example, the blog entries for June 10, 2003, can be found
    at http://www.simongbrown.com/blog/2003/06/10.html.


    With technologies such as JSP and servlets providing many benefits over writing
    static pages, I decided to write my web log as a Java-based web application. All
    the entries are stored separately on the filing system, and with the help of the
    Front Controller pattern, a couple of JSP pages are used to assemble the individual
    entries into a page that is presented back to the user. However, rather than show
    the user a URL such as http://www.simongbrown.com/blog/


    servlet/ViewDailyBlog?year=2003&month=6&day=10, I decided that I’d still like
    URLs such as the one shown previously to work. To implement this, I used a filter.


    Because a filter can be set up to look at all incoming requests to a web application,
    all that the filter needs to do is look for a request matching yyyy/mm/dd.html
    and forward the request to the appropriate action via the front controller. The
    filter is being used to catch these requests for seemingly static content through
    user-friendly URLs and convert the requests into dynamic requests for content
    through the front controller. This is a simple yet powerful implementation of
    the Filter pattern that performs filtering on incoming requests.


    Filters can also be used on outgoing responses. One example often cited is a filter
    that, after a request has been processed, uses compression techniques to compress
    the outgoing stream in an attempt to make more efficient use of the available
    bandwidth. Another example is a filter that highlights the usage of search terms
    in the page. Through the interfaces provided by the Servlet API, it’s possible
    to find the complete URL of the website that the user came from to visit your
    site. For example, somebody might click a link in Google to get to your website.
    Using this information, you could write a filter to check for referrals from Google
    and highlight the occurrences of the search terms used before the response is
    subsequently sent back to the user. Again, this is another way that you can use
    filters to enhance the user’s experience of your web applications.


    **Other Web-Application Patterns**


    In addition to the Java EE patterns that we’ve just covered, there are other patterns
    or best practices that can help you to build web applications. Also, JSP 2.1 provides
    a much better and often easier way to implement some of these patterns, as we’ll
    describe in this section.


    513-0 ch14.qxd 11/17/05 8:44 PM Page 547


    C H A P T E R 1 4 ■ W E B - A P P L I C AT I O N D E S I G N A N D B E S T P R
    A C T I C E S


    **547**


    Including Standard Headers and Footers


    Probably one of the most commonly used best practices when building JSP-based
    web applications is to separate out the common code used in headers and footers
    into JSP pages or fragments that are included wherever necessary. Such files might
    include all of the HTML


    tags to define well-formed HTML headers, the <%@ taglib %> directives to import
    common tag libraries, defining objects to be used in the page, and so on. Whatever
    it is you’re trying to achieve, you’ll typically implement this practice by using
    the JSP include directive to statically include the header on every page:


    <%@ include file="header.jspf" %>


    On translation of the JSP into a servlet, the JSP compiler inlines the included
    file into the source code of the generated servlet class. This is a useful way
    to make some of the content reusable, although it does rely on the page author
    remembering to include the header wherever possible. Also, often different headers
    are needed for different parts of the web application. For example, you might
    have a different file that is included when the JSP page is from a secure part
    of the site.


    To address this, the teams behind the new JSP and Servlet specifications have
    come up with the idea of **preludes** and **codas**. The basic idea is that given
    any set of one or more JSP


    pages, it’s possible to define one or more preludes or codas. Preludes are files
    that are included before the main body of JSP pages that match a given URL pattern;
    codas are files that are included after the main body of those JSP pages. So,
    instead of including a header and footer on every page, you can achieve the same
    result by using the following fragment within the web.xml deployment descriptor:


    <jsp-property-group>


    <url-pattern>*.jsp</url-pattern>


    <include-prelude>/header.jspf</include-prelude>


    <include-coda>/footer.jspf</include-coda>


    </jsp-property-group>


    This is a great way to further increase the maintainability of your web applications
    and reduce the amount of duplicated content that they contain.


    Templating


    Templating is another common implementation technique in web applications. A **template**
    is a predefined skeleton that you can customize at runtime by using parameters.
    If you look back to Chapter 6, one of the examples used to demonstrate tag files
    was a web page that contained a number of promotional notices on the homepage.
    Although the content contained within each tag was different, the actual structure
    and code to build them was the same. These are effectively templates that are
    being used and customized.


    Before the introduction of tag files, templating was fairly hard to achieve with
    JSP'
  trans: '

    到目前为止，我们介绍的每种模式都解决了 Web 应用程序设计中的不同问题。前端控制器为请求提供了单一访问点以集中业务逻辑，而视图和视图助手则将信息呈现过程与信息查找和操作过程分离开来。为了将这些模式整合在一起，Java
    EE 模式目录定义了一个名为“服务到工作者”的宏模式，如图 14-4 所示。所谓“宏模式”，是指它实际上只是其他模式的组合——在本例中，即前端控制器、视图和视图助手。


    **图 14-4.** *“服务到工作者”模式是其他模式的组合。*


    将这些模式整合在一起是扩展 MVC 架构的基础，并为 Web 应用程序的设计和易于理解提供了共同基础。它还有助于强调各个模式的优势，并表明如果将它们结合使用，会更加有用。稍后您将看到，“服务到工作者”模式构成了当前许多
    Web 应用程序框架的基础。


    513-0 ch14.qxd 11/17/05 8:44 PM 第 546 页


    **546**


    第 14 章 ■ Web 应用程序设计与最佳实践


    **过滤器**


    另一个有用但未被广泛使用的模式值得简要提及，它被称为**过滤器**。


    您在之前章节中看到的过滤器 API 就是此模式的一种实现，因此，我们不再探讨如何实现过滤器，而是看看它如何在 Web 应用程序设计中使用，并讨论一些更典型的用途。


    过滤器在 Web 应用程序设计中可以发挥重要作用，因为它们可以承担与任何特定 JSP 或 Servlet 无关的职责。过滤器可以被视为所有请求和响应都可以通过的通道。


    我在 Web 应用程序中使用过滤器的一种方式是解释用户友好的 URL。为了帮助我保持网站更新，我构建了一些网络日志软件——一个简单的基于日期的内容管理系统，我每天在上面发布简短条目。然后，网络日志（缩写为“博客”）会在首页按日期倒序显示最新的条目。此外，当读者想要查找更早的条目时，他们可以直接跳转到包含某一天所有条目的页面。过去，这类网站由静态页面构建，其组织方式便于查找特定日期的页面。例如，2003
    年 6 月 10 日的博客条目可以在 http://www.simongbrown.com/blog/2003/06/10.html 找到。


    由于 JSP 和 Servlet 等技术比编写静态页面有更多优势，我决定将我的网络日志编写为基于 Java 的 Web 应用程序。所有条目都单独存储在文件系统中，并借助前端控制器模式，使用几个
    JSP 页面将各个条目组装成一个页面呈现给用户。然而，我没有向用户显示诸如 http://www.simongbrown.com/blog/servlet/ViewDailyBlog?year=2003&month=6&day=10
    这样的 URL，而是决定让之前显示的 URL 仍然有效。为了实现这一点，我使用了过滤器。


    因为可以设置过滤器来查看发送到 Web 应用程序的所有传入请求，所以过滤器需要做的就是查找匹配 yyyy/mm/dd.html 的请求，并通过前端控制器将请求转发到相应的操作。过滤器用于通过用户友好的
    URL 捕获这些看似静态内容的请求，并将这些请求转换为通过前端控制器对内容的动态请求。这是过滤器模式的一个简单而强大的实现，它对传入请求执行过滤。


    过滤器也可以用于传出的响应。一个经常被引用的例子是，在处理完请求后，使用压缩技术压缩传出流，以尝试更有效地利用可用带宽。另一个例子是突出显示页面中搜索词用法的过滤器。通过
    Servlet API 提供的接口，可以找到用户访问您网站时来自的完整 URL。例如，有人可能会点击 Google 中的链接来到您的网站。利用这些信息，您可以编写一个过滤器来检查来自
    Google 的引荐，并在响应随后发送回用户之前突出显示所使用的搜索词的出现。同样，这是您可以使用过滤器来增强用户对 Web 应用程序体验的另一种方式。


    **其他 Web 应用程序模式**


    除了我们刚刚介绍的 Java EE 模式之外，还有其他模式或最佳实践可以帮助您构建 Web 应用程序。此外，JSP 2.1 提供了一种更好且通常更简单的方法来实现其中一些模式，我们将在本节中描述。


    513-0 ch14.qxd 11/17/05 8:44 PM 第 547 页


    第 14 章 ■ Web 应用程序设计与最佳实践


    **547**


    包含标准页眉和页脚


    在构建基于 JSP 的 Web 应用程序时，最常用的最佳实践之一可能是将页眉和页脚中使用的公共代码分离到 JSP 页面或片段中，并在必要时包含它们。此类文件可能包括所有用于定义格式良好的
    HTML 页眉的 HTML 标签、用于导入公共标签库的 <%@ taglib %> 指令、定义要在页面中使用的对象等。无论您要实现什么目标，通常都会通过使用
    JSP include 指令在每个页面上静态包含页眉来实现此实践：


    <%@ include file="header.jspf" %>


    在将 JSP 转换为 Servlet 时，JSP 编译器会将包含的文件内联到生成的 Servlet 类的源代码中。这是使某些内容可重用的有用方法，尽管它确实依赖于页面作者记住在可能的地方包含页眉。此外，Web
    应用程序的不同部分通常需要不同的页眉。例如，当 JSP 页面来自站点的安全部分时，您可能会包含一个不同的文件。


    为了解决这个问题，JSP 和 Servlet 新规范背后的团队提出了**前奏**和**尾声**的概念。基本思想是，对于任何一组一个或多个 JSP 页面，都可以定义一个或多个前奏或尾声。前奏是在匹配给定
    URL 模式的 JSP 页面的主体之前包含的文件；尾声是在这些 JSP 页面的主体之后包含的文件。因此，您无需在每个页面上包含页眉和页脚，而是可以通过在 web.xml
    部署描述符中使用以下片段来实现相同的结果：


    <jsp-property-group>


    <url-pattern>*.jsp</url-pattern>


    <include-prelude>/header.jspf</include-prelude>


    <include-coda>/footer.jspf</include-coda>


    </jsp-property-group>


    这是进一步提高 Web 应用程序可维护性并减少其中重复内容量的好方法。


    模板化


    模板化是 Web 应用程序中另一种常见的实现技术。**模板**是一个预定义的骨架，您可以在运行时通过使用参数对其进行自定义。回顾第 6 章，用于演示标签文件的一个示例是一个在主页上包含多个促销通知的网页。虽然每个标签中包含的内容不同，但构建它们的实际结构和代码是相同的。这些实际上就是被使用和自定义的模板。


    在引入标签文件之前，使用 JSP 实现模板化相当困难。

    '
- fmt: "由于原文中包含大量书籍页码、章节标题等排版元素，且部分内容为书籍摘录，我将按照 Markdown 规范进行格式化，保留核心语义，并对代码、变量、路径等添加反引号。\n\
    \n---\n\nBecause there was no easy way to express how templates should be customized.\
    \ A couple of possible options included using short scriptlets or even custom\
    \ tags to indicate where dynamic content should be inserted inside the body of\
    \ the template. However, the problem with these was that all too often, using\
    \ such methods introduced some Java code into the page. Perhaps objects needed\
    \ to be set up or some presentation logic was needed. After code is introduced,\
    \ many people stop calling those pages templates. After all, instead of simply\
    \ indicating where dynamic content should be inserted, you basically have complete\
    \ control over how the template works. Another option is to use a specific templating\
    \ framework such as Velocity (discussed in the following “Frameworks for Building\
    \ Web Applications” section).\n\nWith the introduction of EL in JSP 2.0, developers\
    \ gained the ability to perform templating. Because the EL is an integral part\
    \ of the JSP specification, templates are now much easier to build. Simply write\
    \ the static content inside a JSP file and then insert EL expressions where the\
    \ dynamic content is to be inserted. The expressions themselves can be fairly\
    \ powerful, although they’re still simple enough for people to understand, and\
    \ they don’t expose the inner workings of the template.\n\n## Frameworks for Building\
    \ Web Applications\n\nSo far you’ve looked at some proven ways of building web\
    \ applications and a lot of patterns for translating these ideas into working\
    \ code. Do you really have to write all of this every time you build an application?\n\
    \n### A Bespoke Framework\n\nBy combining the implementations of the Java EE patterns\
    \ discussed previously, you basically have a bespoke framework on which to build\
    \ an MVC-based web application. In fact, many of the web applications that we’ve\
    \ worked on (open source and for clients) have used these simple implementations\
    \ as a basis for a lightweight MVC framework used to service all of the requests\
    \ throughout the application. We subscribe to the “keep it simple” approach to\
    \ software design, and using such a lightweight framework has several benefits.\
    \ The framework is easy to learn, easy to maintain, and, when necessary, easy\
    \ to extend, one such example being to handle validation errors from HTML forms\
    \ that users submit.\n\nHowever, writing a bespoke framework isn’t always the\
    \ best option. The implementation of the Front Controller pattern presented here\
    \ is fairly simple and straightforward, but many improvements can be made. Examples\
    \ include a standard way to build HTML forms and perform validation, more sophisticated\
    \ components to display information from the model, and so on. Although such work\
    \ isn’t particularly complex, it’s time-consuming. Therefore, several third-party\
    \ frameworks are available for developers to use as a starting point for their\
    \ web applications.\n\n### Struts\n\nStruts from the Jakarta Project (`http://jakarta.apache.org`)\
    \ is an open-source framework providing an implementation of not only a front\
    \ controller, but also a complete implementation (or framework) of the MVC architecture.\
    \ The key components are similar to those presented here, including, for example,\
    \ a controller servlet (called `ActionServlet`), `Action` classes in which to\
    \ place functionality for processing a request, and `ActionBean` classes in which\
    \ to encapsulate data coming in from a request. In addition, Struts contains a\
    \ comprehensive collection of JSP tag libraries for the easy assembly of HTML-based\
    \ forms and JSP pages in general.\n\nOne of the most important features of Struts\
    \ is that pretty much everything about it is externally configured through the\
    \ `struts-config.xml` file. This includes the mappings between action names and\
    \ `Action` classes (called `ActionMappings`), and also a concept called `ActionForwards`.\
    \ For the simple implementation presented in Listing 14-3, the `Action` class\
    \ returns a string representing the URI of the JSP page that should be displayed\
    \ next. In Struts, however, the `Action` classes return a symbolic name (wrapped\
    \ up in an `ActionForward` instance) representing which view component should\
    \ be displayed next. As an example, consider a login form containing a username\
    \ and password. On submission of the form, the login is either successful or unsuccessful.\
    \ In this case, the `Action` class could return symbolic names such as `success`\
    \ or `failure`. These symbolic names are then configured in the `struts-config.xml`\
    \ file, and it’s here that the physical URI to the appropriate JSP page is specified.\
    \ The following snippet shows how two different flows through a login action might\
    \ be handled:\n\n```xml\n<action path=\"/login\" type=\"com.mycompany.myapp.LoginAction\"\
    >\n    <forward name=\"success\" path=\"/index.jsp\"/>\n    <forward name=\"failure\"\
    \ path=\"/login-failed.jsp\"/>\n</action>\n```\n\nHere, we’re saying that there\
    \ are two possible outcomes for the login action. The first is that the login\
    \ is successful, and if this is the case, the user is directed to the index page.\
    \ Alternatively, a failed login takes the user to a page explaining that the user’s\
    \ login failed. Generally, this logic and the page names would have to be hard-coded\
    \ into the actions. With Struts and its configuration file, the flows through\
    \ an application can be easily changed, and it’s another way that the flow and\
    \ structure of the web application can be taken out of the code to increase maintainability.\
    \ After all, if the structure of the site changes, only the configuration file\
    \ needs to change. You will look at Struts in more detail in the next chapter.\n\
    \n### Spring\n\nThe Spring Framework (`http://www.springframework.org`) aims to\
    \ be lightweight but powerful, and easy to use. Spring is a layered Java EE application\
    \ framework, developed by Rod Johnson. Spring has a lot of features to make enterprise\
    \ development easier for you.\n\n> **Note** If you want to learn more about Spring,\
    \ beyond the short description here, we recommend *Expert One-on-One J2EE Design\
    \ and Development* by Rod Johnson (Wrox Press, 2002), *Pro Spring* by Rob Harrop\
    \ and Jan Machacek (Apress, 2005), or *Professional Java Development with the\
    \ Spring Framework* by Rod Johnson and others (Wrox Press, 2005).\n\nSpring can\
    \ be used on its own to provide a complete enterprise application framework. The\
    \ framework simplifies the work required to build and integrate the presentation\
    \ tier, business tier, and data tier of your web application. Although Spring\
    \ is powerful enough for enterprise applications, it does not force you to use\
    \ Java EE. You can develop Spring components from plain old Java objects (POJOs)\
    \ and use Spring to easily integrate those objects into a working application.\
    \ The objects you build can easily be used in a Java EE environment or as part\
    \ of stand-alone applications.\n\nOn the other hand, Spring is also flexible enough\
    \ to work with other frameworks to provide enterprise solutions. Spring has its\
    \ own data abstraction layer for data persistence. But it can also integrate with\
    \ other data abstraction technologies such as Oracle TopLink, Hibernate, and Java\
    \ Data Objects (JDO). See Chapter 9 for more information about these and other\
    \ data abstraction technologies.\n\nNot only does Spring integrate well with the\
    \ data tier, it also integrates well with other presentation tier technologies\
    \ such as JSP, Velocity, and Tiles. So you can use Spring to develop the business\
    \ objects, and use your favorite presentation-tier framework to provide the view\
    \ in your MVC application.\n\nFinally, Spring works well with other MVC frameworks\
    \ such as Struts, WebWork, or Tapestry.\n\n### WebWork"
