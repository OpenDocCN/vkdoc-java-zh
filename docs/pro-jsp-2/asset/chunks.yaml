    JSP pages—a very handy feature if you’re converting an existing application to
    Struts.


    Easy Struts


    The Easy Struts project (see http://easystruts.sourceforge.net/) provides a set
    of tools for Struts development, including a struts-config.xml editor, XSLT generation,
    tooltips from the Struts DTD, support for modules, and an input helper. Easy Struts
    is only available as an IDE


    plug-in; no stand-alone application is available. Supported IDEs are Eclipse (v2.0+)
    and JBuilder (v5.0+).


    **Using Modules in Team Development Environments**


    Have you ever worked on a project where many developers were working on the same
    codebase? Many development teams work in this type of environment, while others
    allocate development roles to single individuals. Let’s imagine two types of teams;
    the first has fifteen developers and the second has three individuals. We’ll pretend
    that both teams are developing similar applications that use Struts and EJBs for
    handling credit card payments for a large bank. The large team will probably divide
    the work among tiers, where five people work on each tier—EJBs, ActionServlets,
    and business layer, and the web tier comprising JSP pages or Velocity templates.
    The second (smaller) team will simply assign one person to each tier.


    In a team environment where many people are configuring and manipulating deployment
    descriptors, it can be difficult to keep your web.xml and struts-config.xml in
    sync. The simplest solution we’ve found is to use XDoclet to generate these configuration
    files, but there is another option—**modules**. When initially developed by the
    Struts development team, they were called subapplications, which is a more descriptive
    name. Modules allow you to separate different areas of an application out into
    different modules. Modules are a core feature of Struts 1.1 and can be very helpful
    for large projects as well as for creating pluggable features.


