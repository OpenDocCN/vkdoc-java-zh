- fmt: "# Define top-level entry\n\n`dn: dc=raibledesigns,dc=com`\n\n`objectClass:\
    \ dcObject`\n\n`objectClass: organization`\n\n`o: Raible Designs, Inc.`\n\n`dc:\
    \ raibledesigns`\n\n# Define Manager Role to authenticate with\n\n`dn: cn=Manager,dc=raibledesigns,dc=com`\n\
    \n`objectclass: organizationalRole`\n\n`cn: Manager`\n\n`description: Directory\
    \ Manager`\n\n# Define an entry to contain people\n\n# searches for users are\
    \ based on this entry\n\n`dn: ou=people,dc=raibledesigns,dc=com`\n\n`objectClass:\
    \ organizationalUnit`\n\n`ou: people`\n\n# Define a user entry for Tomcat User\n\
    \n`dn: uid=tomcat,ou=people,dc=raibledesigns,dc=com`\n\n`objectClass: inetOrgPerson`\n\
    \n`uid: tomcat`\n\n`sn: user`\n\n`cn: tomcat user`\n\n`mail: tomcat@raibledesigns.com`\n\
    \n`userPassword: jndi`\n\n# Define an entry to contain LDAP groups\n\n# searches\
    \ for roles are based on this entry\n\n`dn: ou=groups,dc=raibledesigns,dc=com`\n\
    \n`objectClass: organizationalUnit`\n\n`ou: groups`\n\n# Define an entry for the\
    \ \"developer\" role\n\n`dn: cn=developer,ou=groups,dc=raibledesigns,dc=com`\n\
    \n`objectClass: groupOfUniqueNames`\n\n`cn: developer`\n\n`uniqueMember: uid=tomcat,ou=people,dc=raibledesigns,dc=com`\n\
    \n![Image 172](index-520_1.png)\n\nWe named this file `entries.ldif`, placed it\
    \ in the root user's home directory, and imported it by using the `ldapadd` command:\n\
    \n```\nldapadd -x -D \"cn=Manager,dc=raibledesigns,dc=com\" -W -f ~/entries.ldif\n\
    ```\n\nFollowing this procedure should result in a number of adding new entry\
    \ lines displayed in your console window, as shown in Figure 12-9.\n\n**Figure\
    \ 12-9.** *As the LDAP server processes each entry in the LDIF file, it will display\
    \ a message to the console.*\n\nIf you get any errors, we found that it was easy\
    \ to start over by stopping LDAP (using the `kill` command) and removing the contents\
    \ of the `usr\\local\\var\\openldap-data` directory.\n\nThe `slapd.conf` and `entries.ldif`\
    \ files used for this example can be found with the code download for the book;\
    \ the files are located with the code for this chapter in the directory `jndi`.\
    \ To enable use of the `JNDIRealm` (instead of the `JDBCRealm`), replace the previous\
    \ realm configuration with the following:\n\n```\n<Realm className=\"org.apache.catalina.realm.JNDIRealm\"\
    \ debug=\"99\"\n      connectionName=\"cn=Developer,dc=raibledesigns,dc=com\"\n\
    \      connectionPassword=\"secret\"\n      connectionURL=\"ldap://localhost:389\"\
    \n      userPassword=\"userPassword\"\n      userPattern=\"uid={0},ou=people,dc=raibledesigns,dc=com\"\
    \n      roleBase=\"ou=groups,dc=raibledesigns,dc=com\"\n      roleName=\"cn\"\n\
    \      roleSearch=\"(uniqueMember={0})\"\n/>\n```\n\nYou'll need the JNDI drivers\
    \ for LDAP in your `CLASSPATH` for this to work. You can download the latest LDAP\
    \ Service Provider (version 1.2.4) from `http://java.sun.com/products/jndi/downloads/index.html`.\
    \ After you've downloaded it, extract `ldap.jar` into `%TOMCAT_HOME%\\common\\\
    lib`.\n\nAs with the JDBC realm, you can protect a single application by nesting\
    \ the `<Realm>` element in a `<Context>` element in the file `context.xml` in\
    \ the `META-INF` directory of the application. Optionally, you can set the default\
    \ realm for your entire server to be a JNDI realm. To do this, edit Tomcat's `server.xml`\
    \ file (in `%TOMCAT_HOME%\\conf`), and replace the default realm (shown next)\
    \ with your desired realm's information. Note that if you still want to use the\
    \ Tomcat Manager or Admin applications, your LDAP server will need appropriate\
    \ user and role entries to allow this.\n\nIf everything has been installed and\
    \ configured correctly, then when you try to access a protected web page, you\
    \ will see the same login dialog or form (depending on whether you have specified\
    \ basic or form authentication). After you enter a username and password, Tomcat\
    \ will make a JNDI call to the LDAP server to authenticate the username.\n\n##\
    \ JAASRealm\n\nTomcat has support for a `JAASRealm` as well. We show you how to\
    \ configure a `JAASRealm` in the \"Java Authentication and Authorization Service\"\
    \ section later in this chapter. For the purposes of this chapter and its associated\
    \ example application, we will generally use a `JDBCRealm`.\n\n## Using Secure\
    \ Sockets Layer\n\nSo far, we've discussed setting up a form-based login and configuring\
    \ it to talk to a realm. One problem with the example so far is that the communication\
    \ between the browser and server isn't secure. If someone were listening with\
    \ a password sniffer, your security would be compromised. Furthermore, these sniffers\
