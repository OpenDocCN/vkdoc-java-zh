    513-0 ch15.qxd 11/14/05 5:38 PM 第 599 页


    第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具


    **599**


    <bean:message key="button.submit">


    </html:submit>


    在前面的示例中，我们添加了 `styleClass` 属性来为按钮指定 CSS 规则。最后，添加以下代码以引入执行实际验证所需的 JavaScript：


    <html:javascript formName="userForm" cdata="false"


    dynamicJavascript="true" staticJavascript="false"/>


    <script type="text/javascript"


    src="<html:rewrite page="/scripts/validator.jsp"/>">


    </script>


    我们始终建议在引用 JavaScript 或 CSS 文件时使用 `<html:rewrite />`，因为它会生成包含应用程序上下文的 URL。也就是说，它会创建一个相对于
    Web 服务器根目录（`/`）的 URL。`validation.jsp` 包含以下代码，用于从 `validation-rules.xml` 文件中渲染所有
    JavaScript 函数：


    <%@ page language="java" contentType="javascript/x-javascript" %>


    <%@ taglib uri="http://jakarta.apache.org/struts/tags-html"


    prefix="html" %>


    <html:javascript dynamicJavascript="false" staticJavascript="true"/> **测试验证**


    现在一切已配置完毕，让我们来测试一下！为此，您需要登录到 `struts-resume` 应用程序，并点击“编辑个人资料”链接。这将显示您的用户信息。如果您清空用户名字段，将会出现如图
    15-10 所示的错误对话框。


    *或显示对话框。*


    ![图 190](img/index-633_1.png)


    513-0 ch15.qxd 11/14/05 5:38 PM 第 600 页


    **600**


    第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具


    当您在浏览器中禁用 JavaScript 时，验证器会在服务器端捕获错误，您将看到如图 15-11 所示的消息。因此，如果您不想在应用程序中使用 JavaScript，除了
    XDoclet 标签外，几乎无需编写任何代码。如果您不使用 XDoclet，则需要手动配置 `validation.xml`——我们喜欢将其称为*声明式验证*。


    **图 15-11.** *即使在客户端浏览器中禁用了 JavaScript，验证仍会在服务器端进行，并且错误消息仍会显示。*


    您还可以使用验证器基于变量进行验证，例如验证邮政编码是否与正则表达式匹配。这可以通过一个包含正则表达式作为其值的掩码来实现。对于可能多次使用的正则表达式，最好将它们定义为
    `validation.xml` 文件中的常量。由于我们使用 XDoclet，这可以在位于合并目录中的 `validation-global.xml` 文件中完成。在
    `struts-resume` 应用程序中，该目录为 `metadata/web/`。


    <constant>


    <constant-name>zip</constant-name>


    <constant-value>^\d{5}\d*$</constant-value>


    </constant>


    这个正则表达式表示邮政编码必须为五位字符，且所有字符必须为数字。要验证 `userForm` 中的邮政编码，您需要像这样配置 `validation.xml`：


    <field property="postalCode" depends="required,mask">


    <msg name="required" key="errors.required"/>


    513-0 ch15.qxd 11/14/05 5:38 PM 第 601 页


    第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具


    **601**


    <msg name="mask" key="errors.zip"/>


    <arg0 key="userForm.postalCode"/>


    <var>


    <var-name>mask</var-name>


    <var-value>${zip}</var-value>


    </var>


    </field>


    如前所述，如果您想使用验证器的默认值，可以省略 `<msg>` 元素。然而，掩码的默认错误消息键是 `errors.invalid`，它只是简单的 `{0}`
    无效。为了增强应用程序的可用性，使用包含更多信息的键（例如 `errors.zip`）可能更好（例如 `{0} 字段必须是一个 5 位数字`）。使用 XDoclet
    为 `postalCode` 字段配置这一点很容易。您只需添加一个标签来指定规则和变量的名称-值对：


    * @struts.validator type="mask" msgkey="errors.zip"


    * @struts.validator-var name="mask" value="${zip}"


    **高级验证器特性**


    我们尚未提及的验证器其他特性包括多页验证、索引属性验证、条件验证和 DynaFormValidation。多页验证允许您将表单的验证规则分布在多个页面上。当您的应用程序中有类似向导的表单用于收集信息时，这非常有用。要配置此功能，您需要在
    JSP 中添加一个隐藏字段来指定页码：


    <html:hidden property="page" value="1"/> 这通过在 `validation.xml` 中为字段的验证规则添加 `page`
    属性来补充。在您目前看到的示例中，字段具有 `property` 和 `depends` 属性。添加 `page` 属性后，您的表单现在可以包含跨不同 JSP
    页面调用的验证！


    <field property="firstName" depends="required,mask" page="1"> 我们非常喜欢这个特性，因为它配置起来非常简单。


    索引属性验证允许您拥有包含在表单内的表单或子表单。


    例如，在您的应用程序中，一个 `ResumeForm` 可以包含一对多的 `SkillGroupForms`。`SkillGroups` 描述一组技能。在技术简历上，一个好的
    `SkillGroup` 可能是“Java”，或者更高级别的“编程语言”。此外，`SkillGroupForms` 可以包含一对多的 `SkillForms`。以
    Java 为例，您可能有诸如“Swing”、“JDBC”和“XML”等 `SkillForms`。一个用于编辑这些内容的良好用户界面应允许您查看简历的所有
    `SkillGroups` 及其后续的 `SkillForms`。显示所有这些内容并不困难，因为您可以使用 `<logic:iterate>` 标签或 `<c:forEach>`。然而，要保存它们，您必须知道用户编辑了哪一行（或哪个表单）。这就是索引属性发挥作用的地方。您基本上可以在表单中添加一个
    getter/setter，用于设置/获取嵌套的表单值。更多信息请参阅“在 Struts 中将索引属性与表单一起使用”一节。要配置验证器


    513-0 ch15.qxd 11/14/05 5:38 PM 第 602 页


    **602**


    第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具


    以验证索引属性，您需要在 `<field>` 元素中添加一个 `indexedListProperty` 属性：


    <field property="groupName" depends="required" indexedListProperty="skills">


    <var>


    <var-name>field[0]</var-name>


    <var-value>name</var-value>


    </var>


    <var>


    <var-name>field-indexed[0]</var-name>


    <var-value>true</var-value>


    </var>


    <var>


    <var-name>field-test[0]</var-name>


    <var-value>NOTNULL</var-value>


    </var>


    </field>


    这表明 `skills` 属性包含一个列表，并且此 `skills` 列表中的必填字段是 `name` 属性。


    验证器最近新增的一个特性是能够根据其他字段的值有条件地要求验证字段。它允许您定义诸如“仅当字段 X 非空且字段 Y 包含 ''male'' 时才验证此字段”的逻辑。验证器支持验证索引属性，如前面示例中的
    `[0]` 指示符所示。然而，在撰写本文时，它不支持动态索引属性。也就是说，您必须知道子（索引）属性的数量并相应地配置验证器。条件验证可能非常有用，但由于我们在
    `struts-resume` 中未使用它，我们建议查阅在线文档以获取更多信息。


    **将验证器与 DynaActionForms 一起使用**

