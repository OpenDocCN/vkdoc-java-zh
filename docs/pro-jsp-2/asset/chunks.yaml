    Additionally, the <c:if> action accepts an optional var attribute that represents
    a scoped variable that can be used to store the result of evaluating the Boolean
    test expression. The optional variable can be set to either a specific scope or
    the default page scope. You may be surprised to learn that there is no explicit
    <c:else> action, but you’ll soon see why as we introduce the <c:choose>, <c:when>,
    and <c:otherwise> actions.


