    \n**在 Struts 中使用带索引属性的表单**\n\n索引属性是 Struts 从一开始就提供的功能。如果你使用过它，你可能会非常喜欢它，因为它允许你获取和设置对象列表（例如，父表单上的子表单的\
    \ ArrayList）。在 struts-resume 应用程序中，这可能类似于在 ResumeForm 上获取/设置一个 SkillForms 的 ArrayList。基本上，其语法涉及像\
    \ `<logic:iterate>` 和 `<c:forEach>` 这样的标签，并在表单元素的名称上设置索引：\n\n`<logic:iterate id=\"\
    skill\" name=\"userSkills\" indexId=\"index\">` 然后，你需要在你的表单中添加 get 和 set 访问器，以便能够根据索引检索和修改这些值。以下是一个如何在\
    \ struts-resume 的 SkillGroup 表单上实现此功能的示例，用户在该表单中分配多个 SkillForms：\n\n```java\n\
    /**\n * 技能属性。\n */\nprivate ArrayList skill;\n\n/**\n * 技能的 Getter。用于迭代器标签和对象的索引。\n\
    \ */\npublic SkillForm getSkill(int index) {\n    return (SkillForm) skill.get(index);\n\
    }\n\n/**\n * 上述 getter 的 Setter。\n */\npublic void setSkill(int index, SkillForm\
    \ skill) {\n    this.skill.set(index, skill);\n}\n\n/**\n * 技能 ArrayList 的 Getter\n\
    \ */\npublic ArrayList getSkills() {\n    return skill;\n}\n\n/**\n * 技能 ArrayList\
    \ 的 Setter\n */\npublic void setSkills(ArrayList skills) {\n    this.skill = skills;\n\
    }\n```\n\n我们尚未实现索引属性，尽管我们计划这样做，并且在你阅读本文时可能已经实现了。\n\n**表单验证**\n\n我们首选的表单验证方法是使用\
    \ Struts Validator。Validator 最初由 David Winterfeldt 编写，旨在克服在 ActionForms 中编写验证逻辑的繁琐。它可以执行基本验证，以检查字段是否为必填项，或是否匹配正则表达式、电子邮件或信用卡，以及服务器端类型检查和日期验证。你可以在任何\
    \ JSP 和 Servlet 应用程序中使用 Validator，但它最初是为 Struts 设计的，因此在 Struts 中使用最为简便。自 Struts\
    \ 1.1 起，验证框架已集成到核心 Struts 库（struts.jar）中。\n\n有关 Validator 的详细在线信息，请访问 http://struts.apache.org/userGuide/building_view.html#validator。\n\
    \n**使用 Validator**\n\nValidator 框架依赖于一个 `validator-rules.xml` 文件，该文件定义了所有可插拔的\
    \ Validator 定义。这些定义本质上是用于服务器端验证的 Java 类和用于客户端验证的 JavaScript 函数。让我们以“required”可插拔\
    \ Validator 为例：\n\n```xml\n<validator name=\"required\"\n    classname=\"org.apache.struts.validator.FieldChecks\"\
    \n    method=\"validateRequired\"\n    methodParams=\"java.lang.Object,\n    \
    \    org.apache.commons.validator.ValidatorAction,\n        org.apache.commons.validator.Field,\n\
    \        org.apache.struts.action.ActionErrors,\n        javax.servlet.http.HttpServletRequest\"\
    \n    msg=\"errors.required\">\n    <javascript>\n        <![CDATA[\n        \
    \    ... 在此插入 JavaScript 函数 ...\n        ]]>\n    </javascript>\n</validator>\n\
    ```\n\n我们省略了 JavaScript 函数，因为它有 40 行，而你来这里是为了学习 JSP，而不是 JavaScript，对吧？在上面的定义中，`FieldChecks`\
    \ 是 Validator 框架中的一个类，它有一个名为 `validateRequired()` 的方法，该方法接收列出的参数。\n\n`<javascript>`\
    \ 元素定义了用于执行客户端验证的 JavaScript 函数。在此文件中定义这些内容使得 Validator 框架易于配置。\n\n要在 Struts 应用程序中启用\
    \ Validator，你首先需要将以下 XML 添加到 `struts-config.xml` 文件中。根据 Struts DTD，`<plug-in>`\
    \ 元素应出现在该文件的末尾附近。如果你使用 XDoclet，可以将此 XML 放入合并目录中的文件中：\n\n```xml\n<plug-in className=\"\
    org.apache.struts.validator.ValidatorPlugIn\">\n    <set-property property=\"\
    pathnames\"\n        value=\"/WEB-INF/validator-rules.xml,/WEB-INF/validation.xml\"\
    />\n</plug-in>\n```\n\n从这个例子中可以看出，Validator 加载了两个文件。这些文件可以重命名为你喜欢的任何名称；你只需确保 `<plug-in>`\
    \ 配置正确即可。由于这些文件名是 Validator 的事实标准，我们将在示例中使用它们。Validator 还允许扩展，例如以下用于验证两个字段是否匹配的扩展：\n\
    \n```java\npublic static boolean validateTwoFields(Object bean, ValidatorAction\
    \ va, Field field, ActionErrors errors, HttpServletRequest request, ServletContext\
    \ application) {\n    String value = ValidatorUtil.getValueAsString(bean, field.getProperty());\n\
    \    String sProperty2 = field.getVarValue(\"secondProperty\");\n    String value2\
    \ = ValidatorUtil.getValueAsString(bean, sProperty2);\n    if (!GenericValidator.isBlankOrNull(value))\
    \ {\n        try {\n            if (!value.equals(value2)) {\n               \
    \ errors.add(field.getKey(), ValidatorUtil.getActionError(\n                 \
    \   application, request, va, field));\n                return false;\n      \
    \      }\n        } catch (Exception e) {\n            errors.add(field.getKey(),\
    \ ValidatorUtil.getActionError(\n                application, request, va, field));\n\
    \            return false;\n        }\n    }\n    return true;\n}\n```\n\n然后，你可以通过添加以下元素将此\
    \ class 添加到 `validator-rules.xml` 文件中：\n\n```xml\n<validator name=\"twofields\"\
    \n    classname=\"com.mysite.StrutsValidator\"\n    method=\"validateTwoFields\"\
    \n    msg=\"errors.twofields\"/>\n```\n\n然后，在 `validation.xml` 中，你可以配置一个字段来使用此验证规则：\n\
    \n```xml\n<field property=\"password\"\n    depends=\"required,twofields\">\n\
    \    <arg0 key=\"typeForm.password.displayname\"/>\n    <var>\n        <var-name>secondProperty</var-name>\n\
    \        <var-value>password2</var-value>\n    </var>\n</field>\n```\n\n你也可以轻松地向\
    \ `validator-rules.xml` 添加一个 JavaScript 函数以进行客户端验证。这只需在 `<validator>` 元素内部添加一个\
    \ `<javascript>` 元素即可。\n\n如果没有 Validator，在应用程序中编写验证逻辑的最简单方法是覆盖 ActionForm 中的 `validate()`\
    \ 方法。其签名如下：\n`public ActionErrors validate(ActionMapping mapping, HttpServletRequest\
    \ request);`\n这个 ActionForm 方法返回 null，就像 ActionForm 的 `reset()` 方法一样，类似地，如果你不想覆盖它，也不是必须的。\n\
    \n`public void reset(ActionMapping mapping, HttpServletRequest request);`\n`reset()`\
    \ 方法旨在将所有属性重置回其默认状态。它在控制器 Servlet 重新填充 bean 之前被调用，并且在你的视图表单上使用复选框时非常有用。这是因为当复选框未被选中时，其值和名称都不会在请求中传递。这就是\
    \ `reset()` 方法存在的主要原因——设置复选框的默认状态，使它们像其他表单元素一样，始终作为名称-值对在请求中传递。\n"
- fmt: "# 使用 Struts、XDoclet 和其他工具\n\n老实说，我们只在验证索引属性时在 `ActionForm` 中使用了 `validate()`\
    \ 方法，并且只在表单中有复选框时使用了 `reset()` 方法。我们在开始使用 Struts 大约一个月后发现了 `Validator` 框架，从那以后就再也没有回头。`Validator`\
    \ 非常适合执行基本的必填字段验证以及更高级的功能，例如正则表达式匹配、电子邮件地址语法（不是实际的地址验证）、信用卡和类型检查（字符串、数字、日期）。此外，可以为不同的区域设置定义不同的验证规则。然而，为了充分利用\
    \ `Validator`，你确实需要相当好地理解正则表达式语法。\n\n要配置一个 `Action` 以在 `ActionForm` 上调用 `validate()`\
    \ 方法或使用 `ValidatorForm` 的声明式验证，你不需要做任何事情，因为验证默认是**开启**的。就个人而言，我们喜欢在 `<action-mappings>`\
    \ 元素中指定 `validate=\"true\"` 或 `validate=\"false\"` 以避免混淆。此外，你需要为你的 `<action-mappings>`\
    \ 指定一个 `input` 属性，否则 `Validator` 将不知道返回哪里进行服务器端验证。这一点非常重要，尤其是在使用我们稍后将讨论的 `Tiles`\
    \ 框架时——如果你不添加 `input` 属性，你将得到一个空白屏幕。\n\n在 XDoclet 中配置如下所示：\n\n```\n* @struts.action\
    \ name=\"userForm\" path=\"/saveUser\" scope=\"session\"\n* validate=\"true\"\
    \ parameter=\"action\" input=\"editProfile\"\n```\n\n这将产生以下 action 映射：\n\n```xml\n\
    <action path=\"/saveUser\" type=\"org.appfuse.webapp.action.UserAction\"\n   \
    \ name=\"userForm\" scope=\"session\" input=\"editProfile\" parameter=\"action\"\
    \n    unknown=\"false\" validate=\"true\">\n</action>\n```\n\n我们在 `struts-resume`\
    \ 应用程序中使用了 `inputForwards`，因此值 `editProfile` 实际上引用了一个全局转发。\n\n我们非常喜欢 `Validator`，因为它执行客户端（通过\
    \ JavaScript）和服务器端验证。根据我们的经验，大多数客户更喜欢客户端验证，开发人员也是如此。如果必填字段未填写，浏览器为什么还要尝试提交表单呢？有些大型组织出于兼容性考虑不鼓励使用\
    \ JavaScript，这很遗憾，因为它可以帮助你的 Web 应用程序表现得像传统的桌面应用程序。然而，有些 HTML 元素需要服务器端验证——例如，`<input\
    \ type=\"file\" ... />` 元素。它不允许 JavaScript 操作或访问，因此无法检查是否已输入值。这是出于安全原因，因为你不会希望脚本在未经你同意的情况下从你的硬盘驱动器获取文件。\n\
    \n在使用 JavaScript 开发丰富的 Web 客户端时，最重要的事情是记住可访问性标准。目前有两个标准。在美国，有联邦政府的第 508 条倡议。第\
    \ 508 条要求联邦机构的电子和信息技术对残障人士可访问。更多信息可以在 `http://www.section508.gov` 找到。\n\n第二个标准更全球化，是\
    \ W3C 的 Web 可访问性倡议（WAI）。万维网联盟（W3C）致力于引领 Web 发挥其全部潜力，包括促进残障人士的高度可用性。WAI 与全球各地的组织协调，通过五个主要工作领域追求\
    \ Web 的可访问性：技术、指南、工具、教育和推广，以及研究与开发。更多信息可以在 `http://www.w3.org/WAI/` 找到。\n\n这些可访问性标准建立在其他标准之上，例如\
    \ XHTML 和 CSS。如果你在开发 Web 应用程序时遵循这些标准，你会发现让你的应用程序可访问会容易得多。我们发现可访问性标准不鼓励使用 JavaScript\
    \ 在 `<select>` 的 `onchange` 事件上更改页面，但像 `Validator` 使用的弹出式 JavaScript 警报是可以的。大多数屏幕阅读器可以理解并阅读它们——与客户端\
    \ JavaScript 相关的主要可访问性问题是：1）消息易于理解，2）当 JavaScript 关闭时仍然给出消息。由于 `Validator` 提供客户端和服务器端验证，它满足了许多可访问性要求。\n\
    \n## 使用 XDoclet 生成 validation.xml\n\n在 `struts-resume` 应用程序中，XDoclet 从 `ActionForm`\
    \ 及其子类（包括 `ValidatorForm`）生成 `validation.xml` 文件。我们创建了一个扩展 `ValidatorForm` 并实现\
    \ `Serializable`（用于集群环境）的 `BaseForm`，然后我们所有的表单都扩展它。`UserForm` 和 `validation.xml`\
    \ 的生成过程如图 15-9 所示，其中箭头代表 Ant 目标或任务的名称。\n\n```\nejbdoclet/\n    |\n    +-- User.htm.xml\n\
    \    |\n    +-- User.java\n    |   (XML Used by\n    |   hibernatedoclet\n   \
    \ |   Hibernate)\n    |\n    +-- ejbdoclet\n        |\n        +-- strutsfor /\n\
    \        |   m\n        |\n        +-- webdoclet/\n            |\n           \
    \ +-- Validation.xml\n            |\n            +-- UserForm.java\n         \
    \   |\n            +-- strutsvalidationxml\n```\n\n**图 15-9.** *XDoclet 可以生成表单以及这些表单的验证描述符。*\n\
    \n有三个方法级别的 XDoclet 标签可用于生成值：\n\n* `@struts.validator`\n* `@struts-validator.args`\n\
    * `@struts.validator-var`\n\n最简单的例子是使用 `required` 验证器生成一个条目。我们将使用在 `UserForm`\
    \ 上生成的 `username` 属性来说明。它从 `User.java` 文件开始，如前面的图表所示，这些标签被转移到生成的 `ActionForm`\
    \ 上。在 `username` 的 getter 字段上，你会找到以下标签：\n\n```java\n/**\n * Returns the username.\n\
    \ * @return String\n *\n * @struts.validator type=\"required\" msgkey=\"errors.required\"\
    \n * @struts.validator type=\"email\" msgkey=\"errors.email\"\n * @hibernate.property\n\
    \ *  column=\"username\" type=\"string\" not-null=\"true\" unique=\"true\"\n */\n\
    public String getUsername() {\n    return username;\n}\n```\n\n这段代码必须位于 getter\
    \ 上，表单生成才能正常工作。在撰写本文时，`strutsform` 任务是 `ejbdoclet` 的一个子任务，所以我们仍然将其作为 `ejbdoclet`\
    \ 任务运行。当运行 `ejbdoclet` 任务时，其中的 `<strutsform>` 子任务将在 `validation.xml` 中生成以下条目：\n\
    \n```xml\n<formset>\n    <form name=\"userForm\">\n        ...\n        <field\
    \ property=\"username\"\n            depends=\"required,email\">\n           \
    \ <msg name=\"required\"\n                key=\"errors.required\"/>\n        \
    \    <msg name=\"email\"\n                key=\"errors.email\"/>\n           \
    \ <arg0 key=\"userForm.username\"/>\n        </field>\n        ...\n    </form>\n\
    </formset>\n```\n\n我们应该指出，`<msg>` 元素不是必需的；因此你不需要在 XDoclet 标签中指定 `msgkey` 属性。如果你选择省略此元素，将应用来自\
    \ `validation-rules.xml` 文件的 `Validator` 默认消息。该值在 `validation-rules.xml` 中由 `msg`\
    \ 属性表示。例如，`required` 验证器有 `msg=\"errors.required\"`。XDoclet 在 `validation.xml`\
    \ 中为我们创建了 `msg` 条目，从长远来看提供了更大的灵活性。\n\n既然你知道如何生成 `validation.xml`，让我们检查一下这些部分实际意味着什么。在前面的摘录中有四个不同的元素：`<form>`、`<field>`、`<msg>`\
    \ 和 `<arg>`。"
  raw: 'To be perfectly honest, we’ve only used the validate() method in any of our
    ActionForms when validating indexed properties, and we’ve only used reset() when
    we had check boxes on a form. We discovered the Validator framework about a month
    after we started working with Struts and haven’t looked back since. The Validator
    is great for performing basic required field validation as well as more advanced
    functions such as regular expression matching, e-mail address syntax (not actual
    validation of addresses), credit card, and type checking (string, number, date).
    Furthermore, different validation rules can be defined for different locales.
    In order to make good use of the Validator, you do need to understand regular
    expression syntax fairly well, however.


    To configure an Action to call the validate() method on an ActionForm or to use
    the ValidatorForm’s declarative validation, you don’t need to do anything because
    validation is **turned on** by default. Personally, we like to specify validate="true"
    or validate="false" in


    513-0 ch15.qxd 11/14/05 5:38 PM Page 595


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **595**


    our <action-mappings> element to avoid confusion. Also, you’ll need to specify
    an input attribute for your <action-mappings>, or the Validator won’t know where
    to return to for server-side validation. This is very important, especially when
    using the Tiles framework we’ll discuss later—you’ll get the blank screen of nothingness
    if you don’t add the input attribute.


    Configuring this in XDoclet looks like the following example:


    * @struts.action name="userForm" path="/saveUser" scope="session"


    * validate="true" parameter="action" input="editProfile"


    This produces the following action mapping:


    <action path="/saveUser" type="org.appfuse.webapp.action.UserAction"


    name="userForm" scope="session" input="editProfile" parameter="action"


    unknown="false" validate="true">


    </action>


    We’re using inputForwards in the struts-resume application, so the value editProfile
    actually refers to a global forward.


    We really like the Validator because it performs client-side (through JavaScript)
    as well as server-side validation. In our experience, most customers prefer client-side
    validation, as do developers. Why should the browser even attempt to submit the
    form if the required fields aren’t populated? There are some larger organizations
    that discourage the use of JavaScript for the sake of compatibility, and it’s
    a shame as it can help your web applications to behave more like traditional desktop
    applications. However, there are some HTML elements that require server-side validation—for
    instance, the <input type="file" ... /> element. It doesn’t allow JavaScript manipulation
    or access, and therefore cannot be checked to see whether a value has been entered.
    This is for security reasons, because you wouldn’t want a script to grab files
    from your hard drive without your consent.


    When developing rich web clients with JavaScript, the most important things to
    remember are accessibility standards. Currently, there are two. In the United
    States, there is the federal government’s Section 508 Initiative. Section 508
    requires that federal agencies’ electronic and information technology be accessible
    to people with disabilities. More information can be found at http://www.section508.gov.


    The second standard, which is more worldwide, is the W3C’s Web Accessibility Initiative
    (WAI). The World Wide Web Consortium’s (W3C) commitment to lead the Web to its
    full potential includes promoting a high degree of usability for people with disabilities.
    WAI, in coordination with organizations around the world, pursues accessibility
    of the Web through five primary areas of work: technology, guidelines, tools,
    education and outreach, and research and development. More information can be
    found at http://www.w3.org/WAI/.


    These accessibility standards are built on top of other standards, such as XHTML
    and CSS. If you follow these standards when developing your web application, you’ll
    find that making your application accessible will be much easier. We’ve found
    that accessibility standards discourage the use of JavaScript to change pages
    on a <select>’s onchange event, but pop-up JavaScript alerts, like those used
    by the Validator, are fine. Most screen readers can understand and read them—the
    major accessibility concerns related to client-side JavaScript are 1) that the
    message is easy to understand, and 2) that messages are still given when JavaScript
    is turned off. Since the Validator provides both client and server-side validation,
    it satisfies many accessibility requirements.


    513-0 ch15.qxd 11/14/05 5:38 PM Page 596


    **596**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **Generating validation.xml Using XDoclet**


    In the struts-resume application, XDoclet generates the validation.xml file from
    the ActionForms and their subclasses, including the ValidatorForm. We created
    a BaseForm that extends ValidatorForm and implements Serializable (for clustered
    environments), and then all our forms extend it. The process by which UserForm
    and validation.xml are generated is shown in Figure 15-9, where the arrows represent
    names of the Ant targets or tasks.


    ejbdoclet/


    User.htm.xml


    User.java


    (XML Used by


    hibernatedoclet


    Hibernate)


    ejbdoclet


    strutsfor /


    m


    webdoclet/


    Validation.xml


    UserForm.java


    strutsvalidationxml


    **Figure 15-9.** *XDoclet can generate forms and the validation descriptor for
    those forms.*


    There are three method-level XDoclet tags you can use to generate values:


    • @struts.validator


    • @struts-validator.args


    • @struts.validator-var


    The simplest example of this is using the required Validator to generate an entry.
    We’ll use the username attribute that is generated on UserForm to illustrate.
    It starts, as illustrated in the previous diagram, at the User.java file, and
    these tags are transferred to the generated ActionForm. On the getter field for
    the username, you’ll find the following tags:


    /**


    * Returns the username.


    * @return String


    *


    * @struts.validator type="required" msgkey="errors.required"


    * @struts.validator type="email" msgkey="errors.email"


    * @hibernate.property


    * column="username" type="string" not-null="true" unique="true"


    */


    public String getUsername() {


    return username;


    513-0 ch15.qxd 11/14/05 5:38 PM Page 597


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **597**


    This code must be on the getter in order for the form generation to work correctly.
    At the time of writing, the strutsform task is a subtask of ejbdoclet, so we’re
    still running it as an ejbdoclet task. When the ejbdoclet task is run, the <strutsform>
    subtask within it will generate the following entry in validation.xml:


    <formset>


    <form name="userForm">


    ...


    <field property="username"


    depends="required,email">


    <msg name="required"


    key="errors.required"/>


    <msg name="email"


    key="errors.email"/>


    <arg0 key="userForm.username"/>


    </field>


    ...


    </form>


    </formset>


    We should point out that the <msg> elements aren’t required; therefore you don’t
    need to specify the msgkey attribute in the XDoclet tag. If you choose to eliminate
    this element, the Validator’s default message from the validation-rules.xml file
    will be applied. This value is represented in validation-rules.xml by the msg
    attribute. For example, the required Validator has msg="errors.required". XDoclet
    creates msg entries for us in validation.xml, providing greater flexibility in
    the long run.


    Now that you know how to generate validation.xml, let’s examine what the parts
    actually mean. There are four different elements in the previous extract: <form>,
    <field>, <msg>, and <arg>.'
  trans: '

    老实说，我们只在验证索引属性时，在 ActionForm 中使用了 `validate()` 方法，也只在表单有复选框时使用了 `reset()` 方法。我们在开始使用
    Struts 大约一个月后发现了 Validator 框架，之后就再也没回头。Validator 非常适合执行基本的必填字段验证，以及更高级的功能，例如正则表达式匹配、电子邮件地址语法（并非实际验证地址）、信用卡和类型检查（字符串、数字、日期）。此外，可以为不同的区域设置定义不同的验证规则。然而，要充分利用
    Validator，你确实需要相当好地理解正则表达式语法。


    要配置一个 Action 以调用 ActionForm 上的 `validate()` 方法，或使用 ValidatorForm 的声明式验证，你不需要做任何额外操作，因为验证默认是**开启**的。就个人而言，我们喜欢在
    `<action-mappings>` 元素中明确指定 `validate="true"` 或 `validate="false"` 以避免混淆。此外，你需要为
    `<action-mappings>` 指定一个 `input` 属性，否则 Validator 将不知道返回何处进行服务器端验证。这一点非常重要，尤其是在使用我们稍后将讨论的
    Tiles 框架时——如果你不添加 `input` 属性，你将得到一个空白的屏幕。


    在 XDoclet 中配置此内容如下例所示：


    * @struts.action name="userForm" path="/saveUser" scope="session"

    * validate="true" parameter="action" input="editProfile"


    这将产生以下 action 映射：


    <action path="/saveUser" type="org.appfuse.webapp.action.UserAction"

    name="userForm" scope="session" input="editProfile" parameter="action"

    unknown="false" validate="true">

    </action>


    我们在 struts-resume 应用程序中使用了 `inputForwards`，因此值 `editProfile` 实际上引用了一个全局转发。


    我们非常喜欢 Validator，因为它既执行客户端验证（通过 JavaScript），也执行服务器端验证。根据我们的经验，大多数客户和开发人员一样更喜欢客户端验证。如果必填字段未填写，浏览器为何还要尝试提交表单呢？有些大型组织出于兼容性考虑不鼓励使用
    JavaScript，这很可惜，因为它可以帮助你的 Web 应用程序表现得更像传统的桌面应用程序。然而，有些 HTML 元素需要服务器端验证——例如 `<input
    type="file" ... />` 元素。它不允许 JavaScript 操作或访问，因此无法检查是否已输入值。这是出于安全原因，因为你不会希望脚本在未经你同意的情况下从你的硬盘驱动器获取文件。


    在使用 JavaScript 开发富 Web 客户端时，需要记住的最重要的事情是无障碍标准。目前有两个标准。在美国，有联邦政府的第 508 条倡议。第 508
    条要求联邦机构的电子和信息技术应对残障人士可访问。更多信息请访问 http://www.section508.gov。


    第二个标准更具全球性，是 W3C 的 Web 无障碍倡议（WAI）。万维网联盟（W3C）致力于引领 Web 发挥其全部潜力，其中包括促进残障人士的高度可用性。WAI
    与全球各地的组织协调，通过五个主要工作领域追求 Web 的无障碍性：技术、指南、工具、教育和推广，以及研究与开发。更多信息请访问 http://www.w3.org/WAI/。


    这些无障碍标准建立在其他标准之上，例如 XHTML 和 CSS。如果在开发 Web 应用程序时遵循这些标准，你会发现使应用程序易于访问会容易得多。我们发现无障碍标准不鼓励使用
    JavaScript 在 `<select>` 的 `onchange` 事件上更改页面，但像 Validator 使用的弹出式 JavaScript 警报是可以的。大多数屏幕阅读器可以理解并读取它们——与客户端
    JavaScript 相关的主要无障碍问题是：1) 消息易于理解，2) 当 JavaScript 关闭时仍能给出消息。由于 Validator 同时提供客户端和服务器端验证，它满足了许多无障碍要求。


    **使用 XDoclet 生成 validation.xml**


    在 struts-resume 应用程序中，XDoclet 从 ActionForm 及其子类（包括 ValidatorForm）生成 `validation.xml`
    文件。我们创建了一个扩展 ValidatorForm 并实现 Serializable（用于集群环境）的 BaseForm，然后我们所有的表单都扩展它。UserForm
    和 `validation.xml` 的生成过程如图 15-9 所示，其中箭头代表 Ant 目标或任务的名称。


    ejbdoclet/

    User.htm.xml

    User.java

    （由 hibernatedoclet 使用的 XML）

    ejbdoclet

    strutsfor /

    m

    webdoclet/

    Validation.xml

    UserForm.java

    strutsvalidationxml


    **图 15-9.** *XDoclet 可以生成表单以及这些表单的验证描述符。*


    有三个方法级别的 XDoclet 标签可用于生成值：


    • `@struts.validator`

    • `@struts-validator.args`

    • `@struts.validator-var`


    最简单的例子是使用 required Validator 生成一个条目。我们将使用在 UserForm 上生成的 `username` 属性来说明。如前面的图表所示，它从
    User.java 文件开始，这些标签被转移到生成的 ActionForm 上。在 `username` 的 getter 字段上，你会找到以下标签：


    /**

    * 返回用户名。

    * @return String

    *

    * @struts.validator type="required" msgkey="errors.required"

    * @struts.validator type="email" msgkey="errors.email"

    * @hibernate.property

    * column="username" type="string" not-null="true" unique="true"

    */

    public String getUsername() {

    return username;

    }


    为了使表单生成正常工作，此代码必须位于 getter 上。在撰写本文时，`strutsform` 任务是 `ejbdoclet` 的一个子任务，因此我们仍然将其作为
    `ejbdoclet` 任务运行。当运行 `ejbdoclet` 任务时，其中的 `<strutsform>` 子任务将在 `validation.xml`
    中生成以下条目：


    <formset>

    <form name="userForm">

    ...

    <field property="username"

    depends="required,email">

    <msg name="required"

    key="errors.required"/>

    <msg name="email"

    key="errors.email"/>

    <arg0 key="userForm.username"/>

    </field>

    ...

    </form>

    </formset>


    我们应该指出，`<msg>` 元素不是必需的；因此你不需要在 XDoclet 标签中指定 `msgkey` 属性。如果你选择省略此元素，将应用来自 `validation-rules.xml`
    文件的 Validator 默认消息。该值在 `validation-rules.xml` 中由 `msg` 属性表示。例如，required Validator
    具有 `msg="errors.required"`。XDoclet 在 `validation.xml` 中为我们创建了 `msg` 条目，从长远来看提供了更大的灵活性。


    既然你已经知道如何生成 `validation.xml`，让我们检查一下这些部分实际意味着什么。在前面的摘录中有四个不同的元素：`<form>`、`<field>`、`<msg>`
    和 `<arg>`。

    '
- fmt: "`<form>`元素的`name`属性定义了`ActionForm`的名称，该名称应与`struts-config.xml`中定义的名称匹配。由于您使用`XDoclet`生成表单和`struts-config.xml`文件，因此可以确保这些名称匹配。\n\
    \n`<field>`元素有两个属性：`property`和`depends`。`property`属性定义了`UserForm.java`中要验证的变量名称，而`depends`属性标识了要应用的验证规则。\n\
    \n有两个`<msg>`元素，用于指定从`ApplicationResources.properties`文件或`struts-config.xml`中命名的任何`ResourceBundle`中使用的消息。在`struts-resume`中，这些消息定义如下：`errors.required={0}\
    \ is required.`\n\n`errors.email={0} is an invalid e-mail address.`\n\n最后一个元素`<arg0>`指定了每个消息中`{0}`替换值的消息键。在`struts-resume`中，它被定义为：`userForm.username=Username`\n\
    \n如果您想在错误消息中替换多个参数，可以通过递增数字在`ApplicationResources`中添加更多参数，因此`{1}`表示第二个参数。要在表单中添加此参数的替换值，您可以在原始表单中添加另一个`XDoclet`标签：\n\
    \n`@struts.validator-args arg1resource=\"username.lastName\" arg1value=\"My Surname\"\
    `\n\n当然，您永远不会同时使用这两个属性，因为第一个（`arg1resource`）用于查找资源键，而第二个（`arg2value`）用于在`validation.xml`中放置字面字符串。通过`webdoclet`任务运行上述代码会生成以下`XML`：\n\
    \n```\n<arg0 key=\"username.lastName\"/>\n<arg0 key=\"My Last Name\" resource=\"\
    false\"/>\n```\n\n现在您已经配置了表单的验证，应该向`JSP`添加一些`JavaScript`以强制执行客户端验证。第一步是使用`<html:messages/>`标签库捕获任何服务器端验证错误：\n\
    \n```\n<logic:messagesPresent>\n  <div class=\"error\">\n    <html:messages id=\"\
    error\">\n      <bean:write name=\"error\" filter=\"false\"/><br/>\n    </html:messages>\n\
    \  </div>\n</logic:messagesPresent>\n```\n\n在`struts-resume`应用程序中，上述代码出现在`messages.jsp`文件中。该文件还包含捕获常规消息（非错误消息）的代码，位于`web/common`文件夹中。它被包含在`Tiles`模板中，因此我们不必将其添加到每个应使用验证的页面。\n\
    \n其次，您需要向表单添加一个`onsubmit`事件处理程序：\n\n`<html:form action=\"/userSave\" method=\"\
    post\" styleId=\"userForm\" focus=\"password\" onsubmit=\"return validateUserForm(this)\"\
    >`\n\n在检查此表单语法时，我们想指出其他几点。\n\n默认情况下，如果您在表单上不使用`method`属性，`<html:form>`标签会为您生成一个。它生成的问题在于不符合`XHTML`规范。也就是说，它生成为`method=\"\
    POST\"`，而`XHTML`要求预定义的属性值必须为小写。\n\n我们通常为所有表单和表单元素（例如`<html:text>`或`<html:password>`）添加`styleId`属性，以便可以通过文档对象模型（`DOM`）使用`document.getElementById(elementId)`访问它们。您需要注意的一点是，每个`Id`在页面内必须是唯一的。最后，为了提高应用程序的可用性，您应尝试在表单上使用`focus`属性，但要谨慎使用：如果您根据用户角色或其他逻辑隐藏字段，这可能会导致`JavaScript`错误。\n\
