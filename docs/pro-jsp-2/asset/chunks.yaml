    In the previous .login definition, you’ll notice that we’ve prefixed the tile
    name with a period (.). This dot notation is the recommended practice for naming
    tiles. Since Tiles’s definitions can be references in a forward’s path attribute,
    this prefix makes them easier to recognize.


    A definition can be referenced in a JSP page if you don’t want to forward to it
    from an action. In struts-resume, we do this in the login.jsp page. We’re protecting
    all *.do mappings with a <security-constraint>, so we’re unable to access any
    action without authenticating.


    The content of the login.jsp page is short and simple:


    <%@ include file="/common/taglibs.jsp"%>


    <tiles:insert definition=".login" flush="true"/> In the examples provided, you’ll
    notice that messages come from ApplicationResources.properties for title and heading
    settings, but another option is available. This may be why Tiles seems so intimidating
    to some—there are so many options!


    However, we do want to show you some other options that might be more suitable
    for you.


    Rather than using the ApplicationResources.properties file to represent the title
    or heading, you can code the strings directly in your definition or JSP:


    <put name="title" value="Login to Struts Resume"/> Rather than using <tiles:importAttributes/>
    and <bean:message key="title.key"/>, you can use <tiles:getAsString name="title"/>.
    You might think you’ve lost the internationalization (I18n) support in this process,
    but Tiles allows for an alternative way of achieving I18n: creating separate XML
    definition files for each locale. Using this strategy, you would have a tiles_config_en.xml
    for English, tiles_config_ru.xml for Russian, and so on. Using the


