    **537**


    **Page-Centric (Model 1)**


    The first common architecture for building web applications is **page-centric**,
    which is more commonly known within Java web-application circles as the **Model
    1 architecture** (see Figure 14-1). We’ve mentioned this architecture in several
    places in this book. This architecture provides the easiest way to put a web application
    together. It involves simply building the application as a set of JSP pages.


    **Figure 14-1.** *In a Model 1 architecture, all requests are handled in a single
    tier of the application.*


    *For example, all the display logic, business logic, and data are contained in
    JSP pages.*


    Of course, applications are generally built to share information (typically from
    some sort of database) with the users, and in page-centric applications, information
    is typically represented in a couple of ways.


    The first of these is that any information required by a page is accessed directly
    from the database by using embedded Structured Query Language (SQL) statements.
    Usually this SQL


    code is written straight into the page along with the code to make the database
    connections and retrieve the results. As a twist on this paradigm, the code to
    deal with the database connections is often pushed into reusable Java classes
    or custom tags such as those found in the JSTL. Of the various ways to build a
    web application, this is probably the least maintainable because all the logic
    to access data is embedded right inside the JSP pages. Any change to the database
    schema means potentially opening up every page in the application to fix it.


    The other mechanism for accessing data within page-centric applications is to
    use JavaBeans to represent the persistent entities within your system. For example,
    you might have a JavaBean called Customer to represent the customers within your
    system. By taking this approach, data-access code is kept off of the individual
    pages and can be pushed back into reusable Java classes (see Figure 14-2). You
    instantly attain a greater level of code reuse throughout the application while
    at the same time you increase the maintainability of the application. For example,
    when data access is moved to a separate tier, changes to the database schema require
    changes to a select few Java classes.


    513-0 ch14.qxd 11/17/05 8:44 PM Page 538


    **538**


    C H A P T E R 1 4 ■ W E B - A P P L I C AT I O N D E S I G N A N D B E S T P R
    A C T I C E S


    **Figure 14-2.** *Even a simple change to the application, such as moving data
    access to a separate* *tier, can improve the reusability and maintainability of
    an application.*


    So, although you can take steps to increase the maintainability of page-centric
    applications, the real limitation lies within your ability to change or modify
    the end-to-end functionality provided by the system. In page-centric applications,
    the pages that the user sees are all implemented as stand-alone JSPs. In fact,
    you can also use servlets, but the principle is the same: building applications
    this way has limitations. If you want to add some functionality to every page
    (such as logging), you have to open up each page and edit it. Want to add a new
    flow of functionality through the application? Chances are that you’ll have to
    open up a large number of pages to edit links and ensure that the required data
    is available to the pages. The main problem is that the pages of the application
    have too much responsibility. They contain the business logic to gather the appropriate
    information (and make changes to that information) alongside the presentation
    logic of displaying that information to the user. Ideally, changes to the business
    logic should be independent of the presentation logic and vice versa.


    **Model-View-Controller (Model 2)**


    The other major architecture used to build web applications is based on the classic
    **Model-View-Controller (MVC)** architecture and is sometimes also referred to
    as **Model 2**. In page-centric web applications, a single request is generally
    serviced by a single page containing the business and presentation logic. MVC,
    however, uses three major components in the servicing of a request, as summarized
    in Figure 14-3.


    The first of these is the **controller,** the component through which all requests
    are routed to be serviced. It acts as the gateway to the functionality provided
    by the web application and is typically implemented as a Java servlet. Having
    a single point of access for all requests in the system has a couple of benefits.
    First, it provides a common location for systemwide aspects such as security,
    logging, and so on. Second, it’s the responsibility of the controller to find
    and execute the business logic that will be used to service the request. This
    responsibility could range from simply locating information that is to be displayed,
    to processing an update request and modifying some data residing in a database.
    The important point to note about the controller is that it doesn’t have anything
    to do with the presentation of information back to the user.


    513-0 ch14.qxd 11/17/05 8:44 PM Page 539


    C H A P T E R 1 4 ■ W E B - A P P L I C AT I O N D E S I G N A N D B E S T P R
    A C T I C E S


    **539**


    **Figure 14-3.** *In an MVC application, separate tiers handle display logic (view),
    data access* *(model), and business logic (the controller and the model).*


    The next component, or set of components, used by the MVC architecture represents
    the **model**. There are a couple of broadly accepted definitions for the model
    components, but we like to think of them as the information that the controller
    uses to perform its processing. In other words, the controller contains the business
    logic, and the model represents the business/domain objects upon which that logic
    operates. If you’ve done any Swing programming, think of the model as the Swing
    model components that just provide a representation of the data being manipulated
    and displayed. Like Swing, model components are generally implemented as JavaBeans.


    The final components in the MVC architecture are the **view** components. These
    are solely responsible for the presentation of information back to the user. Because
    all business logic is performed by the controller, the view components only have
    to present the information provided by the model to the user. Therefore, view
    components are typically implemented with JSP pages because these are most aligned
    to allow easy presentation of information back to the user (for example, using
    a markup language such as HTML).'
