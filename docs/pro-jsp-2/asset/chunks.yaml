  trans: '

    • **JSP 应用程序是分布式的：** 在生产环境中部署时，一个 JSP 应用程序可能涉及多个分布式系统，包括负载均衡路由器、Web 服务器、应用服务器、数据库以及其他后端系统。


    • **JSP 应用程序混合了多种编程语言：** JSP 应用程序可以包含 HTML、JavaScript、Java 代码、SQL、XML 以及其他编程和标记语言。当你阅读一个
    JSP 页面时，通常很难分辨页面的哪些部分在服务器端执行，哪些在客户端执行。


    • **JSP 应用程序运行在多线程环境中：** JSP 应用程序需要是线程安全的，以达到最佳性能。对许多程序员来说，线程是一个复杂且令人困惑的话题，而且线程问题可能很难调试。


    • **JSP 应用程序包含许多组件：** 一个 JSP 应用程序的技术栈通常包括一个 Servlet 引擎、一个 JSP 编译器、一个 MVC 框架、一个持久化框架、一个
    JDBC 驱动程序、一个数据库以及其他后端系统。


    学习如何在复杂、分布式和多线程的程序中解决问题需要时间，并且通常需要大量的深入思考，所以请做好思考的准备。如果出现特别棘手的问题，先睡一觉，然后再思考。向另一位更有经验的程序员解释这个问题。如果身边没有人，就向你显示器上的那个塑料恐龙解释。通常，仅仅详细地解释一个问题就能激发灵感，从而找到解决方案。


    如果你能设法用简单的术语解释你的问题，或者能将问题隔离在一个简单的代码示例中，你或许可以从新闻组、邮件列表或其他在线论坛获得帮助。在向这些论坛发布消息之前，你应该先阅读论坛存档中的历史帖子，看看你的问题或疑问是否已经被问过。使用像
    Google 这样的搜索引擎也可能对解决某些问题有帮助。


    **日志记录**


    日志记录是任何 JSP 应用程序的最佳实践，它受到 Servlet API、应用服务器以及各种日志记录工具的支持。执行日志记录的方法有很多，从使用简单的 `System.out.println()`
    语句到使用功能完备的日志记录 API。


    使用 Servlet API 进行日志记录


    Servlet API 在 `javax.servlet.ServletContext` 接口中包含了日志记录方法。`ServletContext` 接口的
    `log()` 方法使得将日志消息和异常堆栈跟踪写入应用服务器的日志系统变得容易。使用 Servlet API 内置日志记录方法的优点如下：


    • 日志消息会自动添加时间戳前缀并写入日志文件。这意味着即使在它们从控制台滚动消失之后，甚至在服务器关闭之后，你仍然可以访问它们。


    • 应用服务器管理日志文件，并确保它们永远不会变得过大而消耗所有磁盘空间。


    • 应用服务器通常提供一个管理程序，即使日志文件被写入多个远程服务器，你也可以轻松地查看和搜索日志文件。


    所有这些听起来都不错，但实际上，Servlet API 只提供了最基本的日志记录支持。你可以记录字符串消息，也可以记录异常。但是，如果你想启用和禁用日志记录，你需要添加配置属性，并通过例如向
    `web.xml` 文件添加参数来实现条件逻辑。然而，像前面那样实现你自己的临时日志记录并不是最佳方法。使用像 log4j 或 Java 日志记录 API
    这样的功能完备的日志记录系统有很多好处。


    功能完备的日志记录系统


    一个功能完备的日志记录系统，例如开源的 log4j 框架（http://logging.apache.org/log4j/docs/），相比使用 `System.out.println()`
    调用或使用 Servlet API 中的日志记录方法，提供了几个优势：


    • **对日志级别的控制：** 你可以按不同的严重级别记录消息。例如，log4j 支持 DEBUG、INFO、WARN、ERROR 和 FATAL 日志级别（按严重性递增顺序列出）。当你设置一个日志级别时，系统将输出该日志级别以及所有高于该级别的消息。因此，例如，INFO
    级别的日志记录将包括 INFO、WARN、ERROR 和 FATAL 级别的消息。只需更改 log4j 属性文件中的一个配置参数，你就可以启用 DEBUG
    级别的日志记录来帮助你调试问题。当你找到并修复问题后，你可以将日志级别设置回 ERROR，这样只有 ERROR 和 FATAL 级别的日志消息会被记录。


    • **多个日志记录器：** 你可以在应用程序的不同部分使用不同的逻辑日志记录器。例如，你可以在表示层使用一个名为 `com.mydomain.ui` 的日志记录器，在数据访问层使用另一个名为
    `com.mydomain.db` 的日志记录器。这允许你仅控制应用程序中出现 bug 的那一部分的日志级别。


    • **多个日志目标：** 你可以配置日志记录系统，将日志消息发送到文件、操作系统日志、数据库、消息队列、通过 TCP/IP 连接的远程系统以及其他目标。这在生产环境中可能很有帮助，因为应用程序可能运行在异构和分布式环境中。


    • **更好的日志文件管理：** 日志文件可能会迅速增长到很大的尺寸，尤其是在启用 DEBUG 级别日志记录时。你可以配置日志记录系统，在当前日志文件变得过大时开始一个新的日志文件。你可以配置日志记录系统删除或归档旧的日志文件，这样就不会消耗你的磁盘空间。


    • **对日志格式的控制：** 你可以配置日志记录系统生成的日志消息的格式，以满足特定需求。


    Java 现在在其 `java.util.logging` 包下包含了它自己的日志记录 API。这个新的日志记录 API 是对 Java 的一个受欢迎的补充，并且在许多方面与
    log4j API 相似，但它不如 log4j 强大和灵活。例如，log4j 可以将日志消息定向到 Unix 系统日志、Microsoft Windows
    事件日志、Java 消息服务（JMS）消息队列和电子邮件。而 Java 日志记录 API 只能记录到控制台、文件和套接字。就像在开发的许多方面一样，人们会对自己喜欢的日志记录框架产生依赖，这在决定使用哪个框架时常常是个问题。此外，选择其中一个而不是另一个也有一些技术原因。也许你需要特定
    API 中可用的功能，或者你的 Java EE 服务器自带了 log4j。无论哪种方式，为了确保你保留在两者之间自由切换的能力，Jakarta Commons
    Logging 提供了一个解决方案。


    Jakarta Commons Logging


    Jakarta Commons Logging（JCL，位于 http://jakarta.apache.org/commons/logging/）是围绕
    log4j 和 J2SE 1.4 日志记录的一个轻量级封装，其唯一目的是在两者之间提供一个通用接口。将 Commons Logging 的 JAR 文件放在你的
    CLASSPATH 中后，该框架会自动定位这两个日志记录框架中的任何一个，并使用它在你的 CLASSPATH 中找到的那个。它会首先查找 log4j，如果没有找到
    log4j，它会检查 J2SE 1.4 日志记录是否可用。这是一个简单的技巧，但效果确实很好。如果你需要在应用程序中使用 log4j，只需确保它在 CLASSPATH
    中即可。


    无论你使用哪个日志记录框架，实际使用 JCL 都很容易，如下面的代码片段所示：


    ```java

    Log log = LogFactory.getLog(MyClass.class);

    ```


    之后，在初始化了 `log` 之后，你可以通过以下方法调用在各个级别写入消息：

