    **632**


    第 15 章 ■ 使用 Struts、XDoclet 及其他工具


    Struts 提供的工具和示例应用程序同样可能让人感到不知所措。


    真正了解什么是最好的方法的唯一途径就是亲自尝试，并找出最适合你的方案。如果你向 Struts 用户邮件列表发送关于非 Struts 相关（例如 HTML、JavaScript、持久化）的问题，你很可能会收到各种不同的回复和意见。然而，这是一个非常活跃的社区，你的问题很可能会得到解答。希望我们为你提供了一些关于如何与
    Struts 良好配合的指导，也许我们的示例应用程序会向你展示 XDoclet 如何使代码生成和其他工作变得更加容易。我们也邀请你下载并使用 Dave Johnson
    的 Roller Weblogger 软件——它是开源的，并且包含大量优秀的 Struts 代码。它还使用了 XDoclet，是一个相当健壮的应用程序。更多关于
    Roller 的信息，请访问 http://www.rollerweblogger.org。


    最重要的是，我们建议不要试图在 Web 应用程序相关的事情上重复造轮子。很可能已经有人尝试过你正在做的事情。花时间研究你的问题和解决方案，可能会为你节省大量时间。使用邮件列表存档和
    Google 可以解决大量问题。开源项目非常棒，因为你有一个完整的开发团队与你合作，并帮助你使用他们的框架。参与你所使用的技术也很有帮助。如果你正在使用 Struts，请订阅
    struts-user 邮件列表，看着你的收件箱被填满，或者订阅摘要列表，每天只接收几封邮件。请记住，在简单的 JSP 和 Servlet 应用程序中可能实现的任何功能，在使用
    Struts 时同样可以实现。Struts 只是让它变得更容易，我们相信任何基于 Web 的 MVC 框架都是如此。同样，在 HTML 页面或 Servlet
    中可能实现的任何功能，在 JSP 页面中同样可以实现。


    我们非常喜欢使用 Struts 的另一个原因是，出现了许多用于自动化开发过程的工具。我们已经足够熟练地开发所有组件，可以检查生成的代码以确保一切正常。你肯定不想使用一个生成意大利面条式代码的代码生成器！Struts
    路线图包括对这些工具的增强支持，并拥抱 JSF 和 JSTL 等新技术。


    这里我们仅列出几点提示，作为本章内容的简要回顾：


    • 如果你的 Struts 应用程序需要验证，请使用 Validator。如果你正在使用 Validator，请使用 XDoclet 生成你的 `validation.xml`。


    • 如果你的 Struts 应用程序需要模板，请使用 Tiles。如果你正在使用 Tiles，请使用定义，并将它们用作 `struts-config.xml`
    中的转发。


    • 使用容器管理的身份验证进行登录——这样你就可以使用角色来显示或隐藏磁贴，并限制对某些操作和链接的访问。


    • 使用 CSS 而非表格进行页面布局。这将减小页面的大小，并且从长远来看更易于开发。


