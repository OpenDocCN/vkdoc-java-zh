    `public String getContextPath()`


    `getContextPath()` returns the part of the request URI that indicates the context
    path of the request. The context path is the first part of the URI and always
    begins with the “/” character. For servlets running in the root context, this
    method returns an empty `String`. For example, if there is an incoming request
    for `http://localhost/guide/suburbs/index.jsp`, then `getContextPath()` would
    return `/guide`.


    `public Cookie[] getCookies()`


    `getCookies()` returns an array containing any `Cookie` objects sent with the
    request or `null` if no cookies were sent.


    `public long getDateHeader(String name)`


    `getDateHeader()` returns a `long` value that converts the date specified in the
    named header to the number of milliseconds since midnight January 1, 1970, Greenwich
    Mean Time (GMT). This method is used with a header that contains a date and returns
    –1 if the request doesn’t contain the specified header.


    `public String getHeader(String name)`


    `getHeader()` returns the value of the specified header expressed as a `String`
    object or `null` if the request doesn’t contain the specified header. (See also
    the `getHeaderNames()` method next.) Here is an example HTTP request:


    ```

    GET /search?index=servlets+jsp HTTP/1.1

    Accept: image/gif, image/jpg, */*

    Accept-Encoding: gzip

    Connection: Keep-Alive

    Cookie: userID=id66589

    Host: www.mycompany.com

    Referer: http://www.mycompany.com/getproducts.html

    User-Agent: Mozilla/4.6 [en] (WinXP; U)

    ```


    For example, if the usage is `getRequest("Connection")`, it would return `Keep-Alive`.


