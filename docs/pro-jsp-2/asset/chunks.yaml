- fmt: '# Improving Web-Application Performance and Scalability


    Our biggest issues with container-managed security have been related to the servlet
    container’s implementation of the Servlet specification. We recommend testing
    your application on `Tomcat` if you’re experiencing problems with configuring
    security. If your application works on `Tomcat`, your container might have some
    problems, and it’s time to do some research or write a workaround, or even to
    move to a different container (if that’s an option).


    The distributed and multiuser nature of web applications makes performance and
    scalability an important concern. Web applications are distributed systems. Users
    access web applications from remote clients distributed across a network, and
    web applications typically depend on remote systems such as databases, enterprise
    information systems, and web services. Network connection overhead, slow network
    connections, and slow remote systems can cause your web application to exhibit
    poor performance.


    Web applications are often called upon to scale up to meet the needs of an increasing
    number of users. After a web application is put into production, it seems very
    easy to add more users because there is no client-side software required for access,
    other than the ubiquitous web browser. Adding more users is easy, but ensuring
    that your application will perform well with these additional users takes some
    effort.


    In this chapter, you’ll look at some of the steps you can take and techniques
    you can employ to improve the performance and scalability of your web applications.
    Before you get started, we should clarify the terms used in this chapter:


    - **Performance:** Each application will have its own definition of performance.
    For a web application, a common performance metric is **response time**—the time
    taken for the application to complete any given request from the end user. So,
    you might demand of your application a maximum response time of 3 seconds. However,
    to be complete, any such metric must account for the number of users that are
    likely to be interacting with the application at any given time. So, a more complete
    performance statement might read: *The application must support 100 simultaneous
    users, with a maximum response time of 3 seconds*.


    - **Scalability:** With reasonable coding skills and enough hardware, you may
    find it fairly easy to meet a performance target such as the preceding one. However,
    suppose that your application is a success and, as a result, is suddenly required
    to support 200 users. If you double your processing power, in the form of additional
    Java VMs on each server or additional server computers, will your application
    be able to support (roughly) double the number of users, while continuing to meet
    performance requirements? If the answer is yes, then your application is scalable.


    So, how do you go about ensuring that your JSP applications meet their performance
    and scalability requirements? As a software developer, you’re probably familiar
    with the following classic performance quote attributed to Donald Knuth:


    *We should forget about small efficiencies, say about 97% of the time: premature
    optimization is the root of all evil.*


    In this chapter we won’t focus on small efficiencies and we’ll avoid premature
    optimization; instead, we’ll focus on the larger steps that you can take to ensure
    you meet your JSP application performance goals. We’ll start by covering two specific
    techniques that can definitely enhance the performance and scalability characteristics
    of JSP applications: **page caching** and **database connection pooling**. We’ll
    move on to discuss more general performance tips and best practices, before finishing
    with a discussion of how you can actually go about testing the performance and
    scalability of your application to ensure that you’re really meeting your requirements.


    ## General Principles


    The following items apply to the development of high-performance web applications
    in general and thus are guiding principles for your JSP application design:


    - **Don’t execute code unnecessarily.** One of the best ways to improve code performance
    is to simply avoid executing it. Don’t execute code unless absolutely necessary.
    We’ll discuss how page caching can help in this regard.


    - **Don’t create objects unnecessarily.** Creating new objects is an expensive
    operation, both in terms of the processing time to create them and the memory
    required to store them. As you write your code, try to minimize the number of
    objects that you create. Where possible, reuse the objects that you do create.
    One of the most expensive objects in a JSP application is the database connection
    object. In this chapter, we’ll discuss how to use database connection pooling
    to avoid repeatedly creating database connection objects.


    - **When you must create objects, create them in the right scope.** In a web application,
    there are three levels of scope: **request**, **session**, and **application**.
    To scale a web application to meet the needs of a large number of users, carefully
    consider what is to be stored in the session scopes. We’ll discuss this and other
    ways to ensure that your application is ready to scale.


    Now that we’ve covered the general principles, we’ll next discuss the details
    of how you can apply the concepts of page caching and database connection pooling
    to JSP applications.


    ## Page Caching


    In a typical JSP application, web pages are dynamically generated by Java code
    that pulls data from a database and formats that data for display. This processing
    takes time, causes the creation of Java objects, and uses network resources. If
    we could find a way to avoid regenerating a page for every incoming page request,
    we could not only speed up the page response time, but also improve the overall
    performance and scalability of our JSP application. What we would really like
    to do is save each dynamically generated page in cache memory. When a request
    comes in for a page that we’ve already generated, we could just pull that page
    out of the cache and send it out to the browser. This technique is called **page
    caching** and it can dramatically improve the performance of a JSP application.


    ### When Should You Use Page Caching?


    You’ve probably used caching before, perhaps by writing your own simple cache.
    If you’re using an MVC framework such as `Struts`, you could use a simple cache
    for objects that you built from database data and have little need for page caching.
    When do you need page caching?


    Page caching is useful when you can’t put all the data needed for a web page into
    context before the JSP page or servlet that’s responsible for emitting the page
    is called. Also, page caching is useful when your JSP pages are composed of multiple
    JSP tags or other components that themselves are responsible for expensive operations
    such as fetching data or rendering complex HTML.


    ### How Long Should You Cache Data?'
