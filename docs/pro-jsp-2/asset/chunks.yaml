    Now filters can be applied in-between the first processing resource and any included
    resources. For example, if the first JSP page included the output from multiple
    JSP pages or servlets, filters could be applied to each included resource.


    Next, you’ll look at the case when the request dispatcher forwards processing
    to a web resource. Consider the following filter mapping:


    <filter-mapping>


    <filter-name>F1</filter-name>


    <url-pattern>/*</url-pattern>


    <dispatcher>REQUEST</dispatcher>


    <dispatcher>FORWARD</dispatcher>


