    C H A P T E R 7 ■ C L A S S I C TA G S


    Classic tags provide just another way to wrap up functionality, and therefore
    the same principle applies: you can use attributes to configure that functionality.
    In fact, the way that attributes are implemented with classic tags is exactly
    the same as with simple tags. An example of this follows.


    **Building Lists in HTML Forms**


    A common feature of many websites and HTML forms is a drop-down control that allows
    users to select an item from a list. Figure 7-4 shows a user registration form
    enabling users to select the country they live in from a list.


    **Figure 7-4.** *Drop-down boxes allow you to limit the choices a user can make
    on a web page form.*


    If the items in the list were available as a collection of JavaBeans (for example,
    a java.


    util.List containing Country beans), it would be possible to dynamically generate
    such a list with features provided by the JSP expression language and the JSTL.
    One option is to use the JSTL <forEach> tag to iterate over the collection and
    generate the appropriate HTML for each item in the collection.


    To hold each country’s information, consisting of an ID and a name, a simple Country
    JavaBean might look like the class in Listing 7-4.


    **Listing 7-4.** *Country.java*


    package com.apress.projsp.domain;


    public class Country {


    private int id;


    private String name;


    public Country() {


    }


    public Country(int id, String name) {


    this.id = id;


    this.name = name;


    }


    public int getId() {


