    in the TLD too.


    To do this, the first step is to ensure that the tag files will be included in
    the correct place within the JAR file structure. The JSP specification states
    that tag files must reside underneath the META-INF directory, in a subdirectory
    called tags. In Chapter 6, you built two tag files: one to generate a copyright
    statement and another to generate a template for an HTML box that can be used
    to highlight areas of importance on the page. Figure 8-5 shows the directory structure
