    URL-Related Actions


    Obviously the ability to import, link, and redirect is fundamental in any JSP-based
    web application. The JSTL provides several useful URL-related actions to simplify
    these requirements.


    **The <c:import> Action**


    This action imports the content of a URL-based resource and provides a simple,
    generic way to access URL-based resources that can be either included or processed
    within the JSP page.


    You can see a good example of the <c:import> action as it works with some of the
    actions from the XML library, which, of course, require an XML document to work
    with. The <c:import> action is the simplest way to retrieve a file containing
    XML or XSLT, which is then used by subsequent XML actions for processing. For
    example:


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <%@ taglib uri="http://java.sun.com/jstl/xml" prefix="x" %>


    <c:import url="http://mybookstore.com/book.xml" var="url" />


    <x:parse xml="${url}" var="book" scope="session" /> Here you can see how the <c:import>
    action is used to retrieve a file called book.xml from a remote location; the
    file is then utilized by the <x:parse> action from the XML tag library.


    Note that in this case, because of the presence of the var parameter, the actual
    contents of the file aren’t written to the current JspWriter but are instead stored
    in the named parameter.


    The <c:import> action can also be used to specify absolute, relative, foreign,
    context-relative, and FTP URL resources to provide a lot more functionality than
    the standard


    <jsp:include> action you’re so used to having.


    **The <c:url> Action**


    The <c:url> action provides a handy way of constructing correctly formatted URLs
    that have the correct URL-rewriting rules applied.


    As you’re no doubt aware, without session tracking, or the ability to recognize
    a number of requests from the same user, the majority of complex web-based applications
    wouldn’t be functionally possible due to the statelessness of the HTTP protocol.
    Generally, browsers provide the session-tracking mechanism by storing cookies
    (small text files stored on the client machine), which are sent back with each
    request the client makes during a “session.” Because most modern browsers enable
    the user to disable cookies (usually for security reasons), it’s important to
    ensure that any URLs that your web applications use are URL-rewritten so that
    that their session-tracking capabilities are maintained if cookies are disabled.


    A rewritten URL looks something like this:


    http://www.myserver.com/shop/checkout.jsp;jsessionid=42eab543dc2


    The actual rewriting of a URL simply involves appending a special value (the session
    ID) to the end of the query string, which is used to track requests that originate
    from the same user. These requests are therefore part of the same session.


    Previously, JSP scriptlets were typically used to ensure that all URLs were rewritten
    by calling the encodeURL() method provided by the HttpServletResponse interface.


    513-0 ch04.qxd 11/17/05 8:41 PM Page 157


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **157**


    The <c:url> action takes care of all the URL rewriting on your behalf without
    the need for any scriptlet code! For example, to encode the URL, all that’s required
    is the following:


    <c:url value="http://www.myserver.com/shop/checkout.jsp" /> **The <c:redirect>
    Action**


    As the name suggests, the <c:redirect> action sends an HTTP redirect to a client.


    For example, to redirect a user to an updated site or a moved application, the
    action is used as follows:


    <c:redirect url="http://www.myNewUrl.com" /> It’s as simple as that! The action
    does also support the use of another optional attribute called context, which
    can be used to identify the name of a context when redirecting to a relative URL
    that belongs to a foreign context. In simpler terms, this means that you can actually
    forward the request to another web application hosted inside the same container!


    **The <c:param> Action**


    The <c:import>, <c:url>, and <c:redirect> actions all deal with URLs and as you’re
    probably aware it’s pretty common to pass request parameters as part of URLs by
    appending them to the query string.


    The <c:param> action is designed solely for this purpose and may be used as a
    nested tag in the body content of either the <c:import>, <c:url>, or <c:redirect>
    actions. The <c:param> action takes two simple attributes, name and value, which
    represent the name of the request parameter along with its value, respectively.
    Note also that the value of the name and value attributes are URL encoded by default.


    For example:


    <c:url value="http://www.myBookshop.com/books/catalogue.jsp" >


    <c:param name="isbn" value="123456" />


    </c:url>


    Like many of the JSTL actions, the <c:param> action can be used in two forms,
    first as shown previously, and second, whereby the value for the parameter is
    given inside the body content of the action itself. Let’s take a look at the previous
    example using the alternative format:


    <c:url value="http://www.myBookshop.com/books/catalogue.jsp" >


    <c:param name="isbn">123456</c:param>


    </c:url>


    **The Internationalization and Formatting Tag Library**


    Preparing an application so it’s ready for the global marketplace is known as
    internationalization (or I18n for short). A related term, localization (or l10n),
    refers to the process of customizing an application for a particular language
    or region.


    513-0 ch04.qxd 11/17/05 8:41 PM Page 158


    **158**


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    The popularity of the Internet has enabled organizations to vastly increase their
    exposure and client base by providing their services via dynamic web applications.
    Ensuring that clients from around the world can interact with such applications
    by using their native language and conventions has never been more important.


    The Internationalization and Formatting tag library provided by the JSTL provides
    a set of simple actions to aid this process and uses three key components associated
    with internationalization: locales, resource bundles, and base names.


    Setting the Locale


    The Internationalization and Formatting tag library provides actions that allow
    you to control the locale settings for your JSP pages.


    **The <fmt:setLocale> Action**


    As the name suggests, this action can be used to override the client-specified
    locale for the processing of a JSP page. Any I18n formatting actions such as <fmt:message>
    that are found on the page will use this specified locale instead of the one sent
    by the client browser.


    The chosen locale is stored in a variable called javax.servlet.jsp.jstl.fmt.locale
    and can be stored in any chosen scope.


    This JSP code first sets the default locale for the page followed by the session:


    <fmt:setLocale value ="en_US" />


    <fmt:setLocale value ="fr_FR" scope="session" /> The value attribute accepts either
    a string representing the locale (a two-letter, lowercase language code followed
    a two-letter, optional uppercase country code), or a reference to a java.util.Locale
    object.


    ■**Tip** Locale codes are created by specifying a language code, an underbar,
    and an optional country code.


    Language codes are defined by the ISO 639 standard (http://www.loc.gov/standards/iso639-2/


    langhome.html). Country codes are defined by the ISO 3166 standard (http://www.iso.org/iso/en/


    prods-services/iso3166ma/02iso-3166-code-lists/index.html).


    Note that it’s also possible to set a default locale for use via the JSTL by using
    the following configuration setting in the web application’s deployment descriptor
    (web.xml):


    <context-param>


    <param-name>javax.servlet.jsp.jstl.fmt.locale</param-name>


    <param-value>en</param-value>


    </context-param>


    This configuration uses the locale code for English to set the default locale
    for the application.


    513-0 ch04.qxd 11/17/05 8:41 PM Page 159


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **159**


    ■**Caution** The <fmt:setLocale> action overrides the browser-based locale setting.
    Therefore, if you use this action, make sure it’s placed at the beginning of a
    JSP page before any I18n formatting actions.


    Messaging Actions


    After the locale has been defined for a client request, either by the client’s
    browser settings or by use of the <fmt:setLocale> action, the JSTL messaging actions
    can be used to display content to the browser in its own language as identified
    by its locale.


    To take advantage of localized messages, it’s necessary as a developer to provide
    a collection of resources (usually strings) for each locale that you intend to
    support. Each collection of resources is known as a resource bundle and is implemented
    via a standard key=value properties file. For more information, take a look at
    the Java 2 Platform, Standard Edition (J2SE) Javadocs for the java.util.ResourceBundle
    class.


    **The <fmt:bundle> and <fmt:setBundle> Actions** To enable the use of localized
    messages, you need to specify the required resource bundle that provides the localized
    messages.


    Either the <fmt:bundle> or <fmt:setBundle> actions can be used to specify a resource
    bundle, and they’re identified by the basename to be used in the JSP page. Once
    successfully declared, the resource bundle can then be used to provide localized
    messages via the


    <fmt:message> action, which you’ll see shortly.


    Although similar, the <fmt:bundle> and <fmt:setBundle> actions are used in different
    ways to produce localized messages in JSP pages.


    The <fmt:bundle> action is used to declare an I18n localization context for use
    by I18n-aware tags within its body content:


    <fmt:bundle basename="Labels">


    <fmt:message key="labels.firstName"/>


    <fmt:message key="labels.lastName"/>


    </fmt:bundle>


    Here, a resource bundle with the name Labels is declared to provide the localized
    resources for any nested <fmt:message> actions. The resource bundle contains at
    least two name-value pairs given by the keys labels.firstName and labels.lastName.


    Because the <fmt:bundle> action is designed to work so closely with nested <fmt:message>
    actions, a handy optional attribute can also be used as follows:


    <fmt:bundle basename="Labels" prefix="labels">


    <fmt:message key="firstName"/>


    <fmt:message key="lastName"/>


    </fmt:bundle>


    The optional prefix attribute enables the setting of a predefined prefix that
    is prepended to the key attribute of any nested <fmt:message> actions, which makes
    their use so much simpler.


    513-0 ch04.qxd 11/17/05 8:41 PM Page 160


    **160**


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    The <fmt:setBundle> action also provides similar functionality to those you just
    saw, but with a subtle difference. Instead of having to nest any <fmt:message>
    actions as body content, the <fmt:setBundle> action enables a resource bundle
    to be stored in the configuration variable javax.servlet.jsp.jstl.fmt.localizationContext,
    so any <fmt:message> actions that appear elsewhere in the JSP page can access
    the bundle without having to continually declare it as follows:


    <fmt:setBundle basename="Labels" />


    <fmt:message prefix="labels.firstName" /> The <fmt:setBundle> action also enables
    you to declare the exported variable that stores the bundle along with its scope.
    This flexibility makes it simple to use multiple bundles within the same JSP page
    interchangeably.


    Note that the JSTL does provide a mechanism to set a default resource bundle for
    a web application via the following configuration setting in the application’s
    deployment descriptor (web.xml):


    <context-param>


    <param-name>


    javax.servlet.jsp.jstl.fmt.localizationContext


    </param-name>


    <param-value>messages.MyMessages</param-value>


    </context-param>


    **The <fmt:message> Action**


    As mentioned earlier, localized messages are retrieved from a resource bundle
    by using the


    <fmt:message> action, which uses a key parameter to extract the message from the
    resource bundle and print it to the current JspWriter.


    You’ve also seen that the <fmt:message> action can be used by itself on a page
    or as body content to the <fmt:bundle> action. Should you wish to use the action
    by itself, you can specify via the optional bundle attribute the resource bundle
    to use. This can be the default configured bundle or a localization content that
    has been configured and stored in a separate variable by the <fmt:setBundle> action.


    Another optional parameter, var, enables the localized message to be stored in
    a parameter instead of being printed to the JspWriter. As with most of the JSTL
    tags, the scope of this variable can be set by using the scope attribute.


    Let’s build a simple working example to demonstrate the <fmt:setLocale>, <fmt:setBundle>,
    and <fmt:message> tags working together to create a localized JSP page.


    Your first task is to set up the locale-specific resources, and in this case you’re
    simply going to localize some simple strings by utilizing a resource bundle. There
    are several ways to create a resource bundle, but the simplest is to build a list
    of name-value pairs representing the locale-specific resources that you wish to
    externalize from the application code. Let’s localize some simple strings and
    provide implementations in both English and Spanish. Start by creating the properties
    file shown in Listing 4-7.


