    now chained with the AdHocAuthenticate filter. The legacy adapter filter supplies
    the missing originating department information for the JSP page. The authenticate
    filter protects all JSP access with the passwords bestofbreed and viponly. Deploy
    the new filter and go to the following URL: http://localhost:8080/filters2/jsp/FindProd.jsp


    You should be prompted with a login dialog box. Enter the username (any username
    will do) and an invalid password. You’ll see that you’re barred from accessing
    the protected resource until you enter one of the correct passwords.


    **Filter 5: A Filter in the Request-Processing Pipeline** Thus far, this chapter’s
    focus has been on filters that either control the flow of a request (stopping
    it or letting it through) or generate the response to a request. Vast as their
    fields of application may be, these design styles only partially cover the potential
    spectrum of filter applications. The fact that these filters are directly responsible
    for some portion of the response HTML page’s final appearance often makes them
    difficult to compose (that is, to chain them together in a value-added component
    fashion). This is because, by definition, they’re specific to the page output
    that they directly generate.


    The pipeline data-processing model provides a new style of filter that our fifth
    and final filter exemplifies. The first enabler for this model is the new <dispatcher>
    child element of the servlet <filter-mapping> definition. The new element enables
    filters to participate in every stage of the pipeline request-processing model.
    In this model, filters are themselves bona fide processors for a request traveling
    through a pipeline.


    **Understanding the Pipeline Model**


    There are many names given to the pipelined data-processing model. It’s often
    identified as the enabling element of **Model-View-Controller** (**MVC**) web-application
    design, and sometimes it’s referred to as the **push model** of application design,
    in contrast with the more conventional **pull model**.


    The idea is simple, but you have to think beyond the conventional web-application
    wis-dom to get the bigger picture. Consider the illustration of the model shown
    in Figure 11-13.


    A request enters the system and is shuttled along a pipeline. As it traverses
    the pipeline, a sequence of processors has access to the content of the request.
    Each processor performs some task on the request, and then it either attaches
    some new attribute or modifies an existing attribute as the result of that work.
    The request remains intact until it hits the final stage of the pipeline, in which
    special processors called **renderers** examine all the work being done to the
    request and produce the final response (renderers are also called the **view component**
    in the MVC paradigm because they alone are responsible for the final presentation
    to the user). You can see why this is often called the “push” model; data attributes
    are fetched by processors, pushed along the pipeline with the request, and rendered
    only at the final stage.


    513-0 ch11.qxd 11/17/05 8:39 PM Page 461


    C H A P T E R 1 1 ■ A D VA N C E D F I LT E R I N G T E C H N I Q U E S


    **461**


    **Figure 11-13.** *In the pipeline model, different processers can act upon a
    request as it travels* *through the system.*


    Another common analogy for the pipeline model is a conveyer belt or assembly line;
    each processor mirrors the workers (or robots) along the belt or line.


    Some of the highly desirable properties of a pipeline model are as follows:


    • The request stays intact as it traverse the pipeline, with work being carried
    out only on the attached attributes (sometimes called decorators).


    • Data management, business logic, and presentation logic can be cleanly separated
    into different processors and renderers.


    • The processors can be designed to be completely composable (that is, chained
    in any order) or highly specialized (to work only with specific attributes created
    or modified by other processors).


    • Multiple renderers can compose the final output (such as data to XML to HTML


    via XSLT).


    • The state of the request travels with the request through the pipeline. The
    processors and renderers don’t keep track of the request-dependent state at all.
    This makes it possible to duplicate or shuttle the request and its state between
    multiple physical servers if necessary.


    513-0 ch11.qxd 11/17/05 8:39 PM Page 462


    **462**


    C H A P T E R 1 1 ■ A D VA N C E D F I LT E R I N G T E C H N I Q U E S


    In general, designing request-handling logic by using the pipeline model provides
    the following:


    • Processors and renderers that are readily reusable as components


    • Strong and clear separation between data management, business logic, and presentation
    logic in an application


    • Applications that are more maintainable


    • Applications that are more adaptable to changing business requirements


    • Robust applications that will be scalable with container technology and hardware
    advances


    • Web applications whose performance is highly optimizable The last point may
    not be immediately obvious, but any processors in the pipeline that don’t depend
    on others’ outcomes can in principle be executed concurrently (perhaps on two
    physical processors, for instance) and any grouping of processors that has an
    outcome independent of others can also execute concurrently.


    In the past, limitations in container implementation have prevented the use of
    a clean pipeline design model. Servlet 2.5 has features that bring the dream of
    creating a pipelined application closer to reality.


    **Inserting Filters into the Pipeline**


    The <dispatcher> subelement enables you to insert filters into the request-processing
    pipeline. Recall that the <dispatcher> element now allows filters to intercept
    the request dispatcher’s forward() and include() calls. These are additional locations
    in the processing pipeline previously unavailable with Servlet 2.3 containers,
    where filters can go to work for you. You learned in Chapter 10 how this mechanism
    works, so let’s see it in action here.


    First, you’ll revisit the SimpleFilter class that you saw in Chapter 10\. All
    it did was write a couple of lines to the log, letting you know that it had been
    invoked. Now you’ll change it to process the request traveling through the pipeline.


    Instead of directly generating log output, it will now simply change attached
    attributes.


    The modification looks to see whether an attribute named MsgOut exists in the
    request. If it does exist, the code will append " : SimpleFilter" ; otherwise,
    MsgOut will be set to "SimpleFilter"


    (without the leading colon). The first time the filter (processor) operates on
    a request, the attached MsgOut attribute will be set to "SimpleFilter". After
    the second time, it will contain


    "SimpleFilter : SimpleFilter", and after the third time, "SimpleFilter :SimpleFilter
    : SimpleFilter".


    Eventually, the MsgOut attribute will be displayed on an HTML page, so you can
    see the number of times that this filter has operated on the specific request
    as it traveled through the pipeline. Listing 11-14 shows the code for the com.apress.projsp.SimpleFilter
    class.


    513-0 ch11.qxd 11/17/05 8:39 PM Page 463


