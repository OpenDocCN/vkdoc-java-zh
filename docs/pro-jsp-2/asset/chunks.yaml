- fmt: "# Each of the patterns that we’ve covered so far has tackled a different problem\
    \ within the design of web applications. The `Front Controller` provides a single\
    \ point of access for requests to centralize business logic, whereas views and\
    \ view helpers separate the process of presenting information from the process\
    \ of finding the information and manipulating it. To bring all these patterns\
    \ together, the Java EE patterns catalog defines a macro pattern called `Service\
    \ to Worker`, shown in Figure 14-4. By “macro pattern,” we mean that this is really\
    \ just a combination of other patterns—in this case, the `Front Controller`, views,\
    \ and view helpers.\n\n**Figure 14-4.** *The Service to Worker pattern is a combination\
    \ of other patterns.*\n\nBringing all these patterns together is the basis for\
    \ an extended MVC architecture and provides a common ground for web applications\
    \ to be designed and easily understood. It also helps to emphasize the benefits\
    \ of the individual patterns and demonstrates that they’re much more useful if\
    \ used with one another. As you’ll see shortly, the `Service to Worker` pattern\
    \ forms the basis of many web-application frameworks currently in use.\n\n## Filter\n\
    \nAnother useful, although not widely used, pattern worth briefly talking about\
    \ is called `Filter`.\n\nThe filter API that you saw in the previous chapters\
    \ is an implementation of this pattern, so instead of looking at how to implement\
    \ a filter, let’s see how it can be used in the design of web applications and\
    \ talk about some more typical uses.\n\nFilters can play an important role in\
    \ the design of web applications because they can have responsibilities unrelated\
    \ to any particular JSP or servlet. Filters can be seen as channels through which\
    \ all requests and responses can be passed.\n\nOne way I have used filters in\
    \ web applications is to interpret user-friendly URLs. To help me keep my website\
    \ up to date, I built some web-logging software—a simple date-based content management\
    \ system to which I post short entries on a daily basis. The web log (abbreviated\
    \ to “blog”) then displays the most recent of these entries in reverse date order\
    \ on the front page. In addition, when readers want to locate older entries, they\
    \ can simply jump directly to a page containing all the entries for an individual\
    \ day. In the past, such websites have been built of static pages, organized in\
    \ such a way that made it easy to find the page for a specific day. For example,\
    \ the blog entries for June 10, 2003, can be found at `http://www.simongbrown.com/blog/2003/06/10.html`.\n\
    \nWith technologies such as JSP and servlets providing many benefits over writing\
    \ static pages, I decided to write my web log as a Java-based web application.\
    \ All the entries are stored separately on the filing system, and with the help\
    \ of the `Front Controller` pattern, a couple of JSP pages are used to assemble\
    \ the individual entries into a page that is presented back to the user. However,\
    \ rather than show the user a URL such as `http://www.simongbrown.com/blog/servlet/ViewDailyBlog?year=2003&month=6&day=10`,\
    \ I decided that I’d still like URLs such as the one shown previously to work.\
    \ To implement this, I used a filter.\n\nBecause a filter can be set up to look\
    \ at all incoming requests to a web application, all that the filter needs to\
    \ do is look for a request matching `yyyy/mm/dd.html` and forward the request\
    \ to the appropriate action via the front controller. The filter is being used\
    \ to catch these requests for seemingly static content through user-friendly URLs\
    \ and convert the requests into dynamic requests for content through the front\
    \ controller. This is a simple yet powerful implementation of the `Filter` pattern\
    \ that performs filtering on incoming requests.\n\nFilters can also be used on\
    \ outgoing responses. One example often cited is a filter that, after a request\
    \ has been processed, uses compression techniques to compress the outgoing stream\
    \ in an attempt to make more efficient use of the available bandwidth. Another\
    \ example is a filter that highlights the usage of search terms in the page. Through\
    \ the interfaces provided by the Servlet API, it’s possible to find the complete\
    \ URL of the website that the user came from to visit your site. For example,\
    \ somebody might click a link in Google to get to your website. Using this information,\
    \ you could write a filter to check for referrals from Google and highlight the\
    \ occurrences of the search terms used before the response is subsequently sent\
    \ back to the user. Again, this is another way that you can use filters to enhance\
    \ the user’s experience of your web applications.\n\n## Other Web-Application\
    \ Patterns\n\nIn addition to the Java EE patterns that we’ve just covered, there\
    \ are other patterns or best practices that can help you to build web applications.\
    \ Also, JSP 2.1 provides a much better and often easier way to implement some\
    \ of these patterns, as we’ll describe in this section.\n\n### Including Standard\
    \ Headers and Footers\n\nProbably one of the most commonly used best practices\
    \ when building JSP-based web applications is to separate out the common code\
    \ used in headers and footers into JSP pages or fragments that are included wherever\
    \ necessary. Such files might include all of the HTML tags to define well-formed\
    \ HTML headers, the `<%@ taglib %>` directives to import common tag libraries,\
    \ defining objects to be used in the page, and so on. Whatever it is you’re trying\
    \ to achieve, you’ll typically implement this practice by using the JSP `include`\
    \ directive to statically include the header on every page:\n\n```\n<%@ include\
    \ file=\"header.jspf\" %>\n```\n\nOn translation of the JSP into a servlet, the\
    \ JSP compiler inlines the included file into the source code of the generated\
    \ servlet class. This is a useful way to make some of the content reusable, although\
    \ it does rely on the page author remembering to include the header wherever possible.\
    \ Also, often different headers are needed for different parts of the web application.\
    \ For example, you might have a different file that is included when the JSP page\
    \ is from a secure part of the site.\n\nTo address this, the teams behind the\
    \ new JSP and Servlet specifications have come up with the idea of `preludes`\
    \ and `codas`. The basic idea is that given any set of one or more JSP pages,\
    \ it’s possible to define one or more preludes or codas. Preludes are files that\
    \ are included before the main body of JSP pages that match a given URL pattern;\
    \ codas are files that are included after the main body of those JSP pages. So,\
    \ instead of including a header and footer on every page, you can achieve the\
    \ same result by using the following fragment within the `web.xml` deployment\
    \ descriptor:\n\n```\n<jsp-property-group>\n    <url-pattern>*.jsp</url-pattern>\n\
    \    <include-prelude>/header.jspf</include-prelude>\n    <include-coda>/footer.jspf</include-coda>\n\
    </jsp-property-group>\n```\n\nThis is a great way to further increase the maintainability\
    \ of your web applications and reduce the amount of duplicated content that they\
    \ contain.\n\n### Templating\n\nTemplating is another common implementation technique\
    \ in web applications. A `template` is a predefined skeleton that you can customize\
    \ at runtime by using parameters. If you look back to Chapter 6, one of the examples\
    \ used to demonstrate tag files was a web page that contained a number of promotional\
    \ notices on the homepage. Although the content contained within each tag was\
    \ different, the actual structure and code to build them was the same. These are\
    \ effectively templates that are being used and customized.\n\nBefore the introduction\
    \ of tag files, templating was fairly hard to achieve with JSP."
