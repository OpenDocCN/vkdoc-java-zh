    previous methods, now called **classic tags**, provide more flexibility than current
    methods and therefore are still useful in some scenarios. You’ll also see how
    classic tags can take advantage of some of the new features that are now a part
    of the JSP specification, including how custom tags can support dynamic attributes.


    As this chapter presents classic tags, you’ll learn how to use them in web applications.


    Specifically you’ll be looking at the following:


    • What classic tags are and why they are useful


