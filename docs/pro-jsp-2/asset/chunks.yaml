    **Java Data Objects**


    Each of the O/R frameworks previously mentioned has its own unique API and its
    own unique way to specify the mapping of Java objects to database tables. This
    is a problem because it means that Java programmers may have to learn multiple
    persistence APIs and mapping techniques as they move through their careers, and
    because the Java programs written by those programmers will each be locked into
    one persistence API. Wouldn’t it be better if there were only one standard persistence
    API? Sun thinks so, and that is why Sun worked closely with the Java community
    to create the Java Data Objects (JDO) API specification.


    JDO is a relatively new Java API specification designed to provide a standard
    API to enable the persistent storage of Java data in relational databases, object
    databases, and other enterprise information systems. The JDO specification (http://www.jcp.org/en/jsr/detail?id=12)
    was finalized in March 2002; a maintenance release of the specification occurred
    in 2003, and maintenance review was completed at the end of 2004\. In addition,
    at the time of this writing, public review of the next major update to JDO, JDO
    2.0 (http://www.jcp.org/en/jsr/


    detail?id=243), has been completed and the expert committee is working on a final
    draft specification. Since the initial specification release, a number of commercial
    and open source implementations have been released. Commercial JDO implementations
    include small-name vendors such as Signsoft and SolarMetric. Open-source implementations
    include Jakarta OJB


    and TriActive JDO (TJDO).


    The advantages of using JDO are that it provides the same benefits as using an
    O/R


    framework and that it does so through a standardized API and mapping technique.
    As a Java standard, JDO is likely to be very well supported and very well known
    among Java developers.


    The disadvantage of using JDO is that it’s new and, some would say, untested.
    The big-name Java vendors, IBM, BEA Systems, and Oracle, haven’t committed to
    JDO, and the open-source JDO implementations aren’t yet ready for production use.


    It’s important to note that JDO is very different from Microsoft’s ActiveX Data
    Objects (ADO) API, despite the similar names. ADO is a lower-level API, similar
    to JDBC, that allows you to execute SQL queries and retrieve data as RecordSet
    objects of tabular data. JDO, on the other hand, allows you to save and retrieve
    any arbitrary Java object to and from a database.


    JDO includes an object query language (OQL) and when you execute an OQL query,
    you receive a collection of objects instead of tabular data as you would with
    ADO or JDBC.


    Like JDBC, JDO is a fairly small API, but complete coverage is well beyond the
    scope of this book. For more information, refer to Sun’s JDO home page, the JDO
    central website, and the various vendors that are supporting JDO. The following
    are links to these resources:


    • Sun’s JDO home page: http://java.sun.com/products/jdo


    • JDO central: http://www.jdocentral.com


    • IntelliBO JDO (Signsoft)**:** http://www.intellibo.com/


    • Kodo JDO (SolarMetric)**:** http://www.solarmetric.com/Software/Kodo_JDO


    • Jakarta OJB (open source): http://jakarta.apache.org/ojb/


    • TJDO (open source): http://tjdo.sourceforge.net/


