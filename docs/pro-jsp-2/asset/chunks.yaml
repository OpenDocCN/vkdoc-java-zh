  trans: '

    由于缺乏表达模板定制方式的简便方法，过去曾有一些可选方案，例如使用简短的脚本片段甚至自定义标签，来指示动态内容应插入模板主体的位置。然而，这些方法的问题在于，使用它们时往往会在页面中引入一些
    Java 代码。也许需要设置对象，或者需要一些表示逻辑。一旦引入了代码，许多人就不再称那些页面为模板了。毕竟，你不再仅仅是指示动态内容应插入何处，而是基本上完全控制了模板的工作方式。另一种选择是使用特定的模板框架，例如
    Velocity（将在接下来的“构建 Web 应用程序的框架”部分讨论）。


    随着 JSP 2.0 中 EL（表达式语言）的引入，开发者获得了执行模板化的能力。由于 EL 是 JSP 规范的一个组成部分，现在构建模板要容易得多。只需在
    JSP 文件中编写静态内容，然后在需要插入动态内容的地方插入 EL 表达式即可。这些表达式本身功能相当强大，同时仍然足够简单易懂，并且不会暴露模板的内部工作机制。


    **构建 Web 应用程序的框架**


    到目前为止，你已经了解了一些经过验证的构建 Web 应用程序的方法，以及许多将这些想法转化为可运行代码的模式。你真的需要在每次构建应用程序时都编写所有这些代码吗？


    **定制框架**


    通过结合前面讨论的 Java EE 模式的实现，你基本上就拥有了一个用于构建基于 MVC 的 Web 应用程序的定制框架。事实上，我们参与过的许多 Web
    应用程序（无论是开源项目还是为客户开发的）都使用这些简单的实现作为轻量级 MVC 框架的基础，用于处理应用程序中的所有请求。我们信奉“保持简单”的软件设计方法，使用这种轻量级框架有几个好处。该框架易于学习、易于维护，并且在必要时易于扩展，例如处理用户提交的
    HTML 表单中的验证错误。


    然而，编写定制框架并不总是最佳选择。这里展示的前端控制器模式的实现相当简单直接，但还可以进行许多改进。例如，包括构建 HTML 表单和执行验证的标准方法，用于显示模型信息的更复杂的组件，等等。尽管这类工作并非特别复杂，但却非常耗时。因此，有多个第三方框架可供开发者用作其
    Web 应用程序的起点。


    **Struts**


    来自 Jakarta 项目（http://jakarta.apache.org）的 Struts 是一个开源框架，它不仅提供了前端控制器的实现，还提供了 MVC
    架构的完整实现（或框架）。其关键组件与这里介绍的类似，例如，包括一个控制器 Servlet（称为 ActionServlet）、用于放置处理请求功能的 Action
    类，以及用于封装来自请求的数据的 ActionBean 类。此外，Struts 还包含一个全面的 JSP 标签库集合，用于方便地组装基于 HTML 的表单和
    JSP 页面。


    Struts 最重要的特性之一是，它的几乎所有方面都通过 struts-config.xml 文件进行外部配置。这包括动作名称与 Action 类之间的映射（称为
    ActionMappings），以及一个称为 ActionForwards 的概念。对于清单 14-3 中展示的简单实现，Action 类返回一个表示接下来应显示的
    JSP 页面 URI 的字符串。然而，在 Struts 中，Action 类返回一个符号名称（封装在 ActionForward 实例中），表示接下来应显示哪个视图组件。例如，考虑一个包含用户名和密码的登录表单。提交表单后，登录要么成功，要么失败。在这种情况下，Action
    类可以返回诸如 success 或 failure 之类的符号名称。这些符号名称随后在 struts-config.xml 文件中进行配置，并在此处指定指向相应
    JSP 页面的物理 URI。以下代码片段展示了如何处理登录动作的两种不同流程：


    <action path="/login" type="com.mycompany.myapp.LoginAction">


    <forward name="success" path="/index.jsp"/>


    <forward name="failure" path="/login-failed.jsp"/>


    </action>


    这里，我们声明登录动作有两种可能的结果。第一种是登录成功，如果是这种情况，用户将被重定向到 index 页面。或者，登录失败会将用户带到一个解释登录失败的页面。通常，这种逻辑和页面名称必须硬编码到动作中。借助
    Struts 及其配置文件，应用程序的流程可以轻松更改，这也是将 Web 应用程序的流程和结构从代码中分离出来以提高可维护性的另一种方式。毕竟，如果站点结构发生变化，只需更改配置文件即可。你将在下一章更详细地了解
    Struts。


    **Spring**


    Spring 框架（http://www.springframework.org）旨在做到轻量级但功能强大，且易于使用。Spring 是一个分层式的 Java
    EE 应用程序框架，由 Rod Johnson 开发。Spring 拥有许多特性，可以使企业级开发对你来说更加容易。


    ■**注意** 如果你想了解更多关于 Spring 的信息（超出此处简短描述的范围），我们推荐 Rod Johnson 的《Expert One-on-One
    J2EE Design and Development》（Wrox Press, 2002）、Rob Harrop 和 Jan Machacek 的《Pro
    Spring》（Apress, 2005），或 Rod Johnson 等人合著的《Professional Java Development with the
    Spring Framework》（Wrox Press, 2005）。


    Spring 可以单独使用，以提供一个完整的企业级应用程序框架。


    该框架简化了构建和集成 Web 应用程序的表示层、业务层和数据层所需的工作。尽管 Spring 足够强大，可以用于企业级应用程序，但它并不强制你使用 Java
    EE。你可以从普通的 Java 对象（POJO）开发 Spring 组件，并使用 Spring 轻松地将这些对象集成到一个可运行的应用程序中。你构建的对象可以轻松地在
    Java EE 环境中使用，或作为独立应用程序的一部分使用。


    另一方面，Spring 也足够灵活，可以与其他框架协同工作以提供企业级解决方案。


    Spring 拥有自己的数据抽象层用于数据持久化。但它也可以与其他数据抽象技术集成，例如 Oracle TopLink、Hibernate 和 Java 数据对象（JDO）。有关这些及其他数据抽象技术的更多信息，请参见第
    9 章。


    Spring 不仅与数据层集成良好，还与表示层的其他技术（如 JSP、Velocity 和 Tiles）集成良好。因此，你可以使用 Spring 开发业务对象，并使用你最喜欢的表示层框架在
    MVC 应用程序中提供视图。


    最后，Spring 与其他 MVC 框架（如 Struts、WebWork 或 Tapestry）也能很好地协同工作。


    **WebWork**

    '
- fmt: '# WebWork


    `WebWork` (http://www.opensymphony.com/webwork/) is another MVC framework that
    is often compared to `Struts`. It too uses the concepts of classes that implement
    the command pattern, although one of the key differences between `Struts` and
    `WebWork` is that `WebWork` is built on top of another framework (`XWork`) that
    isn’t actually tied to the Web and concepts such as HTTP requests and responses.
    Therefore, it’s possible to share implementations between web applications and
    other Java implementations such as a Swing client. In essence, the action classes
    are just JavaBeans, and in a web environment, parameters are simply mapped on
    to bean properties.


    `WebWork` provides similar features to `Struts` in terms of user interface components
    for building views, customizable validation, an expression language for accessing
    information from the model, and so on. However, what makes `WebWork` more than
    just a `Struts` copy is that it doesn’t rely on just JSP for the presentation
    tier. The view components themselves *can* be JSP, but they can also be written
    using other technologies, including XML and `Velocity` (see the next section for
    more information on `Velocity`).


    A unique feature of `WebWork` is that it supports interceptors that can be used
    to execute logic before and/or after an action invocation. This is similar to
    the way that filters can be used to intercept incoming requests and outgoing responses.
    Like aspect-oriented programming (AOP), `WebWork` interceptors give you a way
    to insert cross-cutting concerns throughout your code base without having to open
    every action class and edit it. By “cross-cutting concerns,” we mean logic that
    isn’t specifically tied to the business function provided by the system, such
    as logging, security, caching, and so on. Typically, business logic can be seen
    as vertical in that in any application you have a collection of vertical slices
    providing business logic. With interceptors, you can build code that works across
    all of these vertical slices and, in `WebWork`, you can configure this declaratively.


    In summary, `WebWork` is a simpler, although arguably more powerful, alternative
    to `Struts` that provides a quick way to build MVC-based web applications. Additionally,
    the simple interface provided by the action classes makes testing `WebWork` actions
    much easier than `Struts`, without the need for a testing framework such as `Cactus`.
    The only downside to using `WebWork` is that the user community is currently small
    and there isn’t much information readily available. Hopefully, this will start
    to change.


    ## Velocity


    `Velocity` (http://jakarta.apache.org/velocity/) is a Java-based templating engine
    that provides an alternative way to build the view components of web applications.
    In fact, `Velocity` is capable of much more than this, as it can be used outside
    of the context of a web application, perhaps for helping to generate reports or
    XML. `Velocity` has its own templating language (the Velocity Templating Language,
    or VTL) that provides a way to access pretty much anything that can be accessed
    through regular Java method calls. At the time that `Velocity` was created, JSP
    didn’t include its own expression language, and `Velocity` was an attempt to fill
    this void and provide an easy way for developers to build true templates.


    Although JSP now includes an EL, `Velocity` has a large following and has been
    deployed in many applications, particularly web applications. With frameworks
    such as `WebWork` providing easy integration with `Velocity`, it will still be
    a popular choice for web applications that are heavily based on dynamic content
    that can be easily templated.


    ## Testing


    Testing plays an important role in the software development life cycle, although
    when time scales are short and deadlines loom, testing often doesn’t get the attention
    that it should. Fortunately, new development methods such as Extreme Programming
    (http://www.xprogramming.com/) are doing a great job of promoting automated testing
    with tools such as `JUnit`, in which unit tests are actually written in Java.
    So then, how do these principles apply to testing web applications and what exactly
    can you test? Web applications are often complex by nature, and this can lead
    to confusion over exactly what can and should be tested. From an automated testing
    perspective, two types of testing generally take place: unit testing and functional
    testing. There are many tools available to help you perform unit and functional
    testing, such as `JUnit`, `JUnitEE`, `Cactus`, `TagUnit`, and `HttpUnit`. After
    looking at these tools, you will learn how to design your web applications for
    testing, what the guidelines for a testing strategy are, and why you would want
    to perform compatibility testing.


    ### Unit Testing Web Applications


    **Unit testing** is the process of testing software from the perspective that
    you know how it works. It’s also called **white box testing** because you can
    see how the software works—you can see inside the box. The opposite of this is
    **black box testing**, which we’ll discuss shortly.


    The idea behind unit testing is to ensure that all (or most) of the paths throughout
    the unit are sufficiently tested, including things such as boundary conditions
    on loops and method calls, correct and incorrect (for example, `null`) parameters
    into method calls, and so on. By doing this, you’re making sure that the unit
    being tested is correct, does what it’s supposed to do, and doesn’t break when
    you throw inputs it just isn’t expecting.


    So, how can you apply unit testing to web applications? The simple answer is that
    you unit test all the classes and components that make up the web application—everything
    from the JavaBeans representing business objects to the servlets servicing requests.
    Although this sounds good in theory, in practice it’s difficult to achieve because
    of the plumbing required by many of the Java EE components that live inside a
    server. With stand-alone Java classes, it’s straightforward to write automated
    unit tests with the `JUnit` framework. Typically, such tests might create new
    instances of the class being tested, call methods on that instance, and subsequently
    perform assertions on the results to ensure that they were correct. However, with
    components such as servlets and JSP pages (which get compiled to servlets), this
    just isn’t something that can be done in the same way. After all, these components
    need to be executed within the context of a server that supports the technologies.
    In essence, these components rely heavily on the plumbing, infrastructure, and
    services provided by such servers. Fortunately, people have realized this and
    have come up with some ways of making unit testing such components easier. However,
    there will generally be a cutoff point at which unit testing becomes unfeasible
    and other testing methods must be used.


    With these thoughts in mind, let’s move on to look at what you can test and the
    tools you can use to do so.


