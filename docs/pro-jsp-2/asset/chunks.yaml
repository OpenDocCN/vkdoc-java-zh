    view, a new component tree is created with the components from the view. This
    will consist of objects that represent the form and each of the input fields.
    These objects are stored in the component tree. Because no other processing is
    required, control passes to the Render Response phase. The UI components are rendered
    into HTML, and the response is sent to the client.


