    **Disabling the Expression Language**


    Just as you can disable scriptlets within a page, you can also disable the evaluation
    of the EL.


    In previous versions of JSP, the characters ${ had no special meaning; therefore,
    it’s possible that people have used them in their JSP pages. If you were to try
    to deploy these pages on a JSP


    2.0– or JSP 2.1–compliant web container, you would get errors. Figure 3-2 shows
    the kind of error that you could expect to see.


    **Figure 3-2.** *A page implemented under an earlier JSP specification may use
    the characters ${,* *resulting in an error when the same page is used in a JSP
    2.0 or later container.*


    It’s worth noting that if a web application is deployed by using a Servlet 2.3
    deployment descriptor (that is, one that conforms to the 2.3 Document Type Definition,
    http://java.sun.com/


    dtd/web-app_2_3.dtd), then the evaluation of the EL is automatically deactivated.
    This is to reduce the chance that an error will occur when a web container is
    upgraded. Conversely, if a web application is deployed with a Servlet 2.4 or Servlet
    2.5 deployment descriptor (that is, the web application conforms to the 2.4 XML
    Schema, http://java.sun.com/xml/ns/


    j2ee/web-app_2_4.xsd, or to the 2.5 XML Schema, http://java.sun.com/xml/ns/javaee/


    web-app_2_5.xsd), then the EL is enabled by default.


    You can disable EL evaluation in two ways:


    • Individually on each page by using the page directive


    • Within the web.xml file by using a JSP configuration element To disable the
    EL for a single page, it’s simplest to use the isELIgnored attribute of the page
    directive in the header of the page:


    <%@ page isELIgnored="true" %>


    513-0 ch03.qxd 10/28/05 12:53 PM Page 103


    C H A P T E R 3 ■ T H E J AVA S E R V E R PA G E S E X P R E S S I O N L A N G
    U A G E


    **103**


    If you choose to disable evaluation within the web.xml file, you can disable for
    a single page, a set of pages, or the entire application. The following XML example
    shows how you might disable the EL for an entire application:


    <jsp-property-group>


    <url-pattern> ***.jsp**</url-pattern>


    <el-ignored>true</el-ignored>


    </jsp-property-group>


    To disable the evaluation of the EL for a single page within the deployment descriptor,
    you can use an XML fragment similar to the following:


    <jsp-property-group>


    <url-pattern> **noel.jsp**</url-pattern>


    <el-ignored>true</el-ignored>


    </jsp-property-group>


    To disable the evaluation of the EL for a set of pages within the deployment descriptor,
    you can use an XML fragment similar to the following:


    <jsp-property-group>


    <url-pattern> **/noel/**</url-pattern>


    <el-ignored>true</el-ignored>


    </jsp-property-group>


    If you try to use the EL after you’ve disabled it, you won’t see any errors and
    the ${expr}


    expression within the JSP page will appear unaltered in the final output.


    **Arithmetic Evaluation Using the Expression**


    **Language**


    Now that you’ve examined the basic syntax of the EL and where it can be used,
    you’ll look at some specific uses of the language. The first of these is using
    the EL to evaluate arithmetic operations. There are many cases within web-application
    development where you need to perform some mathematics on a page. This might be
    to show a number within the text of a page or to pass a number to a custom tag.
    In either case, the concepts are exactly the same.


    Arithmetic operators are provided to act on both integer and floating-point values.
    There are six operators that you can use and combine to achieve the vast majority
    of mathematical calculations with ease:


    • Addition: +


    • Subtraction: -


    • Multiplication: *


    • Exponents: E


    • Division: / or div


    • Modulus: % or mod


    513-0 ch03.qxd 10/28/05 12:53 PM Page 104


    **104**


    C H A P T E R 3 ■ T H E J AVA S E R V E R PA G E S E X P R E S S I O N L A N G
    U A G E


    The last two operators are presented with two alternative syntaxes (both will
    produce exactly the same result). This is so that the EL is consistent with both
    the XPath and ECMAScript syntaxes. You can use all the operators in a binary fashion
    (that is, with two arguments, such as 2 + 3) and the subtraction operator to represent
    the unary minus (that is, -4 + -2).


    As you would expect, each operator has a precedence that determines the order
    of evaluation of an expression. This precedence is as follows:


    • ()


    • - (unary)


    • * / div mod %


    • + - (binary)


    You’ll update this list when you look at the comparison operators in the next
    section. You can, of course, use parentheses to change the order of evaluation,
    as these take the highest precedence.


    With operators of equal precedence, the expression is evaluated from left to right,
    for example:


    2 * 5 mod 3


    is equivalent to (2 * 5) mod 3, which evaluates to 1—rather than 2 * (5 mod 3),
    which evaluates to 4.


    Listing 3-3 is a JSP page that shows an example of all the operators in action.


