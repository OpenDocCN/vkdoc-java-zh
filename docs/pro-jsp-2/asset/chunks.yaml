    To demonstrate the capabilities of the <x:transform> actions, let’s transform
    the books.xml file that you saw earlier into a simple HTML table by applying an
    XSLT transformation. The first step is to create the XSLT stylesheet; Listing
    4-16 shows the stylesheet that we’ll call books.xsl.


    **Listing 4-16.** *books.xsl*


    <?xml version="1.0"?>


    <xsl:stylesheet version="1.0" >


    <xsl:template match="/">


    <html>


    <body>


    <h2>Our Current Book List</h2>


    <table border="2">


    <tr>


    <!-- the header -->


    <td>title</td>


    <td>author</td>


    <td>isbn</td>


    <td>published</td>


    <td>publisher</td>


    <td>url</td>


    </tr>


    <xsl:for-each select="books/book">


    <tr>


    <td><b><xsl:value-of select="title"/></b></td>


    <td><xsl:value-of select="author"/></td>


    <td><xsl:value-of select="isbn"/></td>


    <td><xsl:value-of select="published"/></td>


    <td><i><xsl:value-of select="publisher"/></i></td>


    <td><xsl:value-of select="url"/></td>


    </tr>


    </xsl:for-each>


    </table>


    </body>


    </html>


    </xsl:template>


    </xsl:stylesheet>


    Although this chapter isn’t intended to be a guide to XSLT transformations, hopefully
    you can follow this code. In a nutshell, the <xsl:for-each select="books/book">
    expression is a simple way of iterating over a series of elements as defined by
    the XPath expression books/book (all the <book> elements beneath the root <books>
    element). The code inside the


    <xsl:for-each> expression creates the data for a single row of the HTML table
    by extracting the required elements (that is, <xsl:value-of select="title"/> extracts
    the value of the


    <title> element).


