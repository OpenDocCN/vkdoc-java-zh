    Listing 9-6 is the source code for the HibeAggregatorDAO class. We have split
    this code listing into parts, so that we can more easily discuss the various methods
    of the class. The constructor creates a Hibernate Datastore, loads the mappings
    for the classes that will be persisted, and creates a SessionFactory for use during
