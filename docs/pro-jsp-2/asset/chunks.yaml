    C H A P T E R 9 ■ D ATA A C C E S S O P T I O N S F O R W E B A P P L I C AT I
    O N S


    **385**


    It’s possible to map more than one class within a single <hibernate-mapping> element,
    but it’s a recommended practice to map only one class per mapping file. At runtime,
    the Newsfeed.hbm.xml file should be placed in the same package as the Newsfeed.class
    so that Hibernate can find it.


    The Hibernate mapping file may look complicated, but it’s complicated for a reason.
    The mapping is designed to accommodate all the different data and relationship
    types that you might use in a Java application and in a relational database schema.
    If you have problems coming up with the right mappings, consult your friendly
    database administrator. Ask for help on the Hibernate mailing list.


    **Step 3: Creating the Database Tables**


    Creating the object-relational mappings for the RSS newsreader classes is relatively
    difficult, but once you have those mappings Hibernate starts to earn its keep.


    Hibernate includes a command-line tool that reads mapping files and can then either
    generate a database creation script or connect to your database and create the
    tables for you.


    This tool is called SchemaExport and it can handle 16 database dialects including
    Oracle, Sybase, Microsoft SQL Server, MySQL, and PostgreSQL.


    SchemaExport is just a command-line Java program, so it may be easily run from
    an Ant build script. For example, the following Ant build script excerpt is used
    to run SchemaExport and create the tables for the RSS newsreader example:


    <target name="create-tables">


    <java classname="net.sf.hibernate.tool.hbm2ddl.SchemaExport"


    fork="true" dir="./build/5130ch09/WEB-INF/classes">


    <arg value="--quiet"/>


    <arg value="--output=../ag.ddl"/>


    <arg value="--properties=hibernate.properties"/>


    <arg value="./com/apress/projsp/Subscription.hbm.xml"/>


    <arg value="./com/apress/projsp/Newsfeed.hbm.xml"/>


    <arg value="./com/apress/projsp/Item.hbm.xml"/>


    <arg value="./com/apress/projsp/User.hbm.xml"/>


    <classpath>


    <path refid="jdbcdriver.path"/>


    <path refid="hibernate.path"/>


    <pathelement


    path="./build/5130ch09/WEBINF/classes/com/apress/projsp/"/>


    </classpath>


    </java>


    </target>


    The <java> element runs the class cirrus.hibernate.tools.SchemaExport within the
    build directory so that it can find the mapping files. The –output argument tells
    the SchemaExport to generate a database creation script named rss.ddl. The –properties
    argument tells SchemaExport where to find the Hibernate properties file, which
    contains the database connection parameters needed to connect to the target database.
    The rest of the arguments indicate which mappings are to be processed.


