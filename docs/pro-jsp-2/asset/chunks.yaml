    INCLUDE-Only Filtering


    With Tomcat 5 and Servlet 2.4 or Servlet 2.5, you can specify that your filter
    work only on included requests. Try this out by changing web.xml to this:


    <filter-mapping>


    <filter-name>Simple Push Filter</filter-name>


    <url-pattern>/jsp/*</url-pattern>


