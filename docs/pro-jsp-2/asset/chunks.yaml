    public void typeChanged(ValueChangeEvent event) {


    if ("Roundtrip".equals(event.getNewValue().toString())) {


    setTripType("Roundtrip");


    } else {


    setTripType("One Way");


    }


    FacesContext.getCurrentInstance().renderResponse();


    }


    }


    Within the method, you can perform any processing you need to handle the event.
    In the typeChanged() method in Listing 5-23, we set the trip type property of
    the bean. However, you can do whatever is needed to handle the event. The last
    thing that the method does is call the renderResponse() method. If the typeChanged()
    method did not do this, the JSF implementation would proceed through the normal
    JSF life cycle. However, we do not want this to happen. If you have selected a
    trip type before entering any other search parameters, proceeding through the
    normal life cycle would cause a validation error. Calling renderResponse() transitions
    the JSF processing directly to the Render Response stage, bypassing validation.


    If you want to validate the form data normally, your code would not call renderResponse().


