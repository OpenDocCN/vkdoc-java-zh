    设置完成后，您可能会注意到浏览器会警告您有关证书的信息。这是因为证书的颁发者是未知的（您自己），并且浏览器不将您识别为 CA。CA，例如 VeriSign
    (http://www.verisign.com)、Thawte (http://thawte.com) 和 TC TrustCenter (http://www.trustcenter.de/set_en.htm)，是受信任的组织，它们验证并证明服务器确实是其所声称的身份。此外，如果您想同时设置客户端和服务器证书，还可以获取客户端证书。这在高度安全、绝密的、类似《X
    档案》风格的应用中可能是必要的，但对于大多数 Web 应用来说并非必需。


    在 Web 应用中使用 SSL 的一个缺点是它往往会显著降低服务器的吞吐量。这主要是由于连接两端的加密和解密过程造成的。因此，我们建议仅在应用真正需要的部分使用
    SSL——例如，当用户登录或用户提交信用卡号时。


    ■**注意** 您可以在 http://www.computerworld.com/securitytopics/security/story/0,10801,58978,00.html
