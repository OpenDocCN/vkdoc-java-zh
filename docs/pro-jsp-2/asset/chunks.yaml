    **Other Filter-Like Technologies**


    Prior to Servlet 2.4 filters, there had been many server extension mechanisms
    based on similar concepts to filtering. In fact, **interceptors** form a key server-extension
    mechanism that is used quite heavily in many Tomcat 3.x-based containers. Tomcat
    4.x uses a technology called valves to perform filter-like processing. However,
    there are fundamental differences between filters and these mechanisms: they aren’t
    the same. This section briefly describes the essential differences between the
    technologies.


    **Filters Aren’t Tomcat 3.x Interceptors**


    Interceptors are a server-level extension mechanism for servers that support them.
    Interceptors are not an application-level technology. Being a server-extension
    technology, it’s specific to Tomcat. Furthermore, effects of interceptors are
    typically global to the server—filter effects are local to the web application
    that the filters belong to.


    The general architectures of interceptors and filters are completely different.
    Interceptors are “hooked in” modules that are called at specified points in the
    processing pipeline by the container. There are different types of interceptors
    for different access points. Filters, however, rely on nested chain calling (and
    custom wrapping of the request or response) to get their work done. There is only
    one “type” of filter. All filters implement the same javax.servlet.Filter interface.


    **Filters Aren’t Valves**


    Valves are a system-level mechanism used extensively within the design of Tomcat
    4.x and 5.x.


    On an architectural level, they’re almost identical to filters. But that’s where
    the similarity ends.


    Valves are Tomcat-specific and typically aren’t portable to other Servlet 2.5–compatible
    servers. On the other hand, filters are portable. Valves are also internal to
    the Tomcat server and have privileged access to many structures and resources
    that application-level filters cannot access.


    **Filter Design Best Practices**


    There are a few rules of thumb that you should consider when designing and writing
    filters.


    Some of these may give you novel ideas on how you can use filters in your own
    applications,


    513-0 ch10.qxd 11/17/05 8:43 PM Page 429


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    **429**


    while others may save you significant debugging time during the development cycle.
    This section presents an encapsulation of six such guidelines. You’ll see several
    more in the next chapter when you explore the design and coding of more complex
    filters.


    **Make Code Thread-Safe**


    Making code thread-safe cannot be stressed enough. Remember that there is typically
    only one instance of a filter per Java VM (unless the same filter is declared
    multiple times with different names or initial parameters). This makes it inevitable
    that the doFilter() method will be entered by many threads simultaneously, so
    your filter code must be thread-safe. This means the following:


    • Local variables in doFilter() may be used freely (except for complex objects
    that may hold references to instance variables, in which case the next bullet
    applies).


    • Instance variables in the filter class scope should be read-only, or the scope’s
    access must be synchronized.


    • Beware of calling methods that may modify instance variables indirectly or outside
    of synchronization.


    Figure 10-12 provides a spatial representation of this approach.


    **Figure 10-12.** *One of the first steps to writing thread-safe filters is to
    make instance variables* *read-only, or access protected. Local variables are
    generally thread-safe and can be used to store* *request-specific information.*


    **Handle State Carefully**


    State information can be readily maintained via local variables in doFilter().
    The prerequest and postresponse processing window within the doFilter() method
    has full access to this state information. To pass state information between filters
    on the same chain, you can associate attributes with the ServletContext, returned
    by the FilterConfig.getServletContext() method. The reason why ServletContext
    attributes rather than request attributes can be used will be clear when you examine
    request and response wrapping in the next chapter.


    513-0 ch10.qxd 11/17/05 8:43 PM Page 430


    **430**


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    You should note that, in general, filters should not maintain state across multiple
    requests because the very same instance of a filter can service a large number
    of requests in a given period. Logic requiring this degree of state maintenance
    is best served by servlets or JSP pages.


    In other words, the filter should depend on little or no session information to
    process a request or response.


    **Think of Filters As In-Series Resource Processors**


    When designing web applications that follow the well-documented Model-View-Controller
    (MVC) design pattern or Model 2 JSP architecture, consider the use of filters
    as in-series resource processors in conjunction with the request dispatcher.


    For example, in a push-model web application, a filter may perform part of the
    controller’s responsibility by fetching data from the model and attaching it to
    the request in the form of attributes for the view component to display.


    Another interesting example is form processing. When a form is submitted and before
    the controller component is called, a filter can be used to perform data validation
    on the incoming form data.


    **Reusing a Filter via Chaining**


    Break up your filter-processing work into reusable, independent, chainable filters
    whenever possible. This will enhance the reuse potential of the filters and also
    allow users to use your filters in new and innovative ways. Also design your filters
    to be easily configurable at deployment time. Often a filter can be reused through
    the careful planning and use of initialization parameters.


    **Avoid Duplicating System Features**


    Many problems addressed by filters can be solved instead via configuration of
    standard server features. This is especially true with Tomcat 5, which has logging,
    authentication, authorization, and fine-grained access control support built-in.
    Encrypted sessions via Transport Layer Security (TLS), more commonly known as
    secure sockets (HTTPS), are also supported natively.


    You should avoid duplicating system features in your filter design. Investigate
    all the server features first, looking to see whether your filter application
    can be accomplished by simple server configuration. Write your filter only after
    you have determined that it’s the only appropriate solution, given project requirements
    and constraints.


    **Avoid Unnecessary Filter Mappings**


    When mapping filters, always use the most restrictive mapping possible—use <servlet-name>
    instead of <url-pattern> if possible. The overhead of filter operations can be
    significantly increased if the filter is consistently applied to web resources
    that don’t need it.


