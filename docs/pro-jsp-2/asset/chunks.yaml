    **Expression-Language Functions**


    This final section discusses perhaps the most interesting part of the JSP EL:
    functions. An EL


    function is mapped to a static method of a Java class. This mapping is specified
    within a tag library descriptor (TLD), as you’ll see later.


    As with the rest of the EL, a function can appear either in template text or in
    the attributes of a custom tag.


    A function in EL can take any number of parameters, and these are again declared
    in a deployment descriptor. Functions are assigned a namespace that is used to
    access a function similar to package specifications in Java classes; for example,
    the following JSP code invokes an EL function:


    ${MyFunctions:function("param")}


    The namespace in this example is MyFunctions, which is declared by using this
    taglib directive:


    <%@ taglib uri="/WEB-IF/taglib.tld" prefix="MyFunctions" %> You’ll see this directive
    used in other places in this book to declare namespaces for custom tags; in this
    chapter you’ll use it to declare namespaces for EL functions. Functions must always
    have a namespace, with one exception: if a function is used within the attribute
    of a custom tag, the function call may omit the namespace as long as the function
    is declared within the same TLD as the custom tag.


    A TLD is an XML file that declares a tag library. The TLD contains information
    relating to the tags in the library and the classes that implement them. The TLD
    also contains the declarations and mappings of EL functions. Each TLD can describe
    zero or more static functions.


    Each function is given a name and a specific method in a Java class that will
    implement the function. The method must be a public static method on a public
    class. If this is not the case, translation-time error will occur. Within a TLD,
    function names must be unique, and if two functions have the same name, a translation-time
    error will occur. Here is an example of the TLD entries used to declare a function:


    <taglib>


    ...


    <function>


    <name>nickname</name>


    <function-class>com.apress.projsp.Functions</function-class>


    <function-signature>


    java.lang.String nickname(java.lang.String)


    </function-signature>


    </function>


    </taglib>


    This TLD fragment declares a function called nickname, which is intended to return
    the nickname for a particular user. If you look at the tags, you can see that
    we declared the name of the function that will be used by the EL by using the
    <name> element, the class that implements the function by using the <function-class>
    element, and the signature of the function by using the <function-signature> element.
    It’s this last element that is the most interesting and also the most complex.


    513-0 ch03.qxd 10/28/05 12:53 PM Page 126


    **126**


    C H A P T E R 3 ■ T H E J AVA S E R V E R PA G E S E X P R E S S I O N L A N G
    U A G E


    The syntax of the <function-signature> element is as follows: return_type static_function_name(parameter_1_type,..,parameter_n_type)
    It’s important to note that the parameter and return types must be the fully qualified
    Java class names. If the declared signature of the function does not match that
    of the function in the Java class, a translation-time error will occur.


    For more information about the content of TLDs, especially those that relate to
    custom tags, see Chapters 6 through 8.


    **A Simple Function**


    You are now ready to look at some example functions. The first of these examples
    outputs a greeting to the user. This greeting is customized depending on the time
    of day. So, for example, if called before midday the greeting will be Good Morning;
    if called after midday but before 6 p.m., the greeting will be Good Afternoon;
    and finally, if called after 6 p.m. but before midnight, the greeting will be
    Good Evening. Listing 3-15, Functions.java, is the Java class that implements
    this function.


    **Listing 3-15.** *Functions.java*


    package com.apress.projsp;


    import java.util.Calendar;


    public class Functions {


    public static String sayHello() {


    Calendar rightNow = Calendar.getInstance();


    int hour = rightNow.get(Calendar.HOUR);


    int AmPm = rightNow.get(Calendar.AM_PM);


    if (AmPm == Calendar.AM) {


    return "Good Morning";


    } else if (AmPm == Calendar.PM && hour < 6) {


    return "Good Afternoon";


    } else {


    return "Good Evening";


    }


    }


    }


    The TLD for this function is very simple, because the function has no parameters.


