    **Designing for Scalability**


    Java application servers are designed to support scalability. By using your application
    server’s administrative console or by editing configuration files, you can increase
    the amount of memory devoted to each server process, increase the number of request-processing
    threads within each process, add additional server processes, and configure additional
    server machines to run server processes.


    No matter how you design your application, you’ll probably be able to make it
    run faster and serve more users by running it on a more powerful computer. If
    your server is a multi-processor machine, you can configure your application server
    to use more threads to process requests. If your server has lots of memory, you
    can configure your application server to devote more memory to each server process.
    Your application server documentation should provide some guidelines to help you
    decide how to configure these thread and memory settings.


    There is a limit to what you can do with one server process running on one server
    machine. Your Java application server will allow you to scale up beyond a single
    process running on a single machine, but to take advantage of this, you need to
    follow some simple guidelines in the development of your JSP applications:


    • **Minimize the data that’s stored in each session.** In a typical JSP application,
    a session object of type javax.servlet.HttpSession is created for each user. As
    the amount of data stored per session increases, the number of users that can
    be supported by each server decreases. This is just simple arithmetic. For example,
    say the application server is running in a Java VM that’s configured for a 100
    MB heap. If the application server itself uses 10 MB of memory, and each user
    session consumes 1 MB of memory, then you can support a maximum of 90 simultaneous
    users per application server instance.


