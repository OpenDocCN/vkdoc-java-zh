    **Figure 2-1.** *This Unified Modeling Language (UML) diagram shows the interfaces
    and classes that* *form the Servlet API. Note that this diagram uses the convention
    of an open circle (also known as* *lollipop notation) to represent an interface.
    The interfaces and classes that you will use the most* *are the Servlet interface
    and its descendants, and the ServletRequest and ServletResponse interfaces and
    their descendants.*


    The additional classes and interfaces that you can see in Figure 2-1 provide additional
    services to the web-application developer; for example, the web container provides
    access to the client request via a standard interface, ServletRequest, and provides
    access to the response via ServletResponse. The javax.servlet package provides
    the basis for developing cross-platform and cross-web-container web applications
    without worrying about the implementation of each web container.


    **Why Servlets?**


    Why use servlets at all? After all, you have JSP pages, which are far easier to
    create than servlets. While this is definitely true, there are times when using
    a servlet is much more appropriate than using a JSP page. One such occasion is
    in the JSP Model 2 architecture; this was discussed in Chapter 1.


    Servlets are best used in situations where a great deal of programmatic control
    is required, such as decision making, database querying, or accessing other enterprise
    resources. If you attempt to perform these types of operations within a JSP page,
    you’ll encounter the following problems:


    **• Maintainability:** Because access to resources will be spread over a number
    of different JSP pages and interspersed with HTML display information, your pages
    will be hard to maintain. The code will also be hard to read because it is interspersed
    with the HTML


    code and indentation becomes tricky.


    **• Reusability:** When most of the processing logic is embedded into the JSP
    pages, it becomes much more difficult to reuse common functionality because it’s
    usually implemented by using scriptlets. Often this results in lots of cutting
    and pasting of code that isn’t only bad from a reusability perspective but is
    also likely to introduce errors and of course decrease productivity.


    513-0 ch02.qxd 10/3/05 4:22 PM Page 47


    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    **47**


    However, there are also many times when using a servlet isn’t appropriate. These
    situations occur primarily when a lot of display formatting is required. For example,
    it would be best not to use a servlet to present the front page of a website.
    If you were to use a servlet, it would contain lots of lines such as the following:


    out.println("<a href=\"cart.jsp\">Cart</a>"); This is both messy and hard to maintain;
    every quotation mark must be escaped, and you get no feel for the nesting in the
    page because the ubiquitous out.println statements surround everything.


    **JavaServer Pages Are Servlets!**


    As mentioned in Chapter 1, JSP pages are translated to servlets before they are
    run. The web container performs this translation transparently when a user makes
    a request for a given JSP


    page. For example, say you were to code the following JSP page and save it as
    simple.jsp:


    <html>


    <body>


    This is a very nice JSP page. Today''s date is <%=new java.util.Date()%>


    </body>


    </html>


    If you make a request for it, a servlet such as the following would be generated:
    package org.apache.jsp;


