    As you can see, this servlet is fairly simple. Its primary job is to receive a
    request, work out how to process it, delegate the processing to an appropriate
    class, and forward it to the next JSP


    page in the store. This is achieved by reading the request path and attempting
    to instantiate a class that matches the last part of it. For example, if the request
    is http://localhost:8080/


    store/servlet/DummyAction, the servlet will attempt to instantiate a class called
    DummyAction in the current package. After this class has been instantiated, it
    will call the method process on it, passing in the current request and response
    objects. This relies on the class implementing a known interface called Action.
    This interface (Listing 2-5) is simple, containing only one method.


    **Listing 2-5.** *Action.java*


    package com.apress.projsp.store;


    import javax.servlet.ServletException;


    import javax.servlet.http.HttpServletRequest;


    import javax.servlet.http.HttpServletResponse;


    public interface Action {


    /**


    * Peforms the processing associated with this action.


    *


    * @param request the HttpServletRequest instance


    * @param response the HttpServletResponse instance


    * @return the name of the next view


    */


