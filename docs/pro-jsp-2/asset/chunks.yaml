    **Filter 2: An Authorization Filter**


    A filter can generate its own output and deprive the downstream filters and resource
    processor of a chance to see the request altogether. Obviously, there’s very little
    application for a filter that does this all the time, but a filter that does this
    based on some dynamic criterion can be useful. One example is a filter that blocks
    resource access based on the time of day. You’ll create such a filter in this
    section.


    **Generating Your Own Response**


    The filter you’re going to create falls into the authorization filter application
    domain. More specifically, it allows or disallows an incoming request to reach
    its destined resource processor depending on the time of day. The application
    is intended to stop users from accessing game-playing resources during certain
    hours. Figure 11-7 illustrates the filter action.


    If a request arrives during the allotted time window, the user is allowed through
    to the resource processor to play games. If a request arrives outside of the allotted
    time window, the filter generates a response of its own, depriving the downstream
    resource processor of a chance to see the request. This effectively blocks the
    use of the game resources.


