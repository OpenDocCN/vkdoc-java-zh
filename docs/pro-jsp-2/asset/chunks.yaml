    and used to generate a validation.xml file. The reason we’ve done it this way
    is because it allows new columns to be added to our tables easily. On our last
    project, we used validator forms, value objects, and DAOs, and if we added a new
    column to a table, we had to add getters and setters in two places (on the form
    and the POJO) and also change the SQL in the DAO.


    Using XDoclet and Hibernate eliminates this headache—especially since Hibernate
    generates a schema and can build your database for you. We’ve written a db-create
    Ant task to perform this table creation for you automatically.


    The tools directory contains the StrutsGen tool written by Erik Hatcher. This
    tool uses Ant and XDoclet to generate a skeleton JSP and an associated properties
    file from an ActionForm, greatly speeding up application development.


    The web directory contains all web-related files: images, JavaScript files, CSS
    files, properties files, and XML configuration files. It contains separate directories
    for most of these and also a WEB-INF/classes directory. The JSP files in the pages
    directory are copied to WEB-INF at deployment time.


    ■**Tip** By the way, this application was created using AppFuse (http://raibledesigns.com/wiki/


    Wiki.jsp?page=Downloads) as a baseline, and we recommend that you use it too when
    you develop your own Struts-based applications. It already has a directory layout
    built, a build script for compiling, testing, and deploying, and XDoclet fragments
    for generating your XML files. After downloading, simply execute ant new -Dapp.name=yourAppName
    -Ddb.name=yourDBName. Feel free to remove those files you don’t find necessary.


