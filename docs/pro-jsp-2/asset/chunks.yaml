    variables that will be used to hold the two read-only passwords: adhocPassword
    and adhocGoldPassword.


    These variables are initialized by the container from the web.xml values via the
    init() method.


    In the doFilter() method, the class casts the request and response to their HTTP
    servlet versions to access and manipulate the headers associated with them. The
    class then attempts to get the authorization information from the request header.
    If no information is found, the filter sends an authorization request to the client.


    If the filter finds authorization data, it decodes the username and password.
    The authorization header begins with the token Basic, so the filter uses substring(6)
    to skip over the constant string Basic of the authorization header, getting to
    the beginning of the base64-encoded username and password.


    The filter calls the methods externalGoldAuthenticate() and externalAuthenticate()
    to perform the actual authentication for “gold member” users and “regular” users,
    respectively.


    The externalAuthenticate() and externalGoldAuthenticate() methods encapsulate
    the authentication mechanism. In this case, each authenticates against a single
    password from the initial parameters. You can modify each to perform any type
    of authentication you desire, including authentication against some physically
    external servers. Successful authentication allows access to the protected resource.
    In addition, “gold member” authentication will result in the, ahem, goldmember
    Boolean attribute being attached to the request. Failed authentication will cause
    the login dialog box to pop up again on the client’s browser.


    If everything has been authenticated properly, access to the resource is allowed,
    and the filter calls the chain.doFilter() method.


