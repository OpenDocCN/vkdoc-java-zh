    **The XML Processing Tag Library**


    XML has become the de facto standard for representing and exchanging data between
    enterprise applications. Data represented by XML isn’t only “self-describing”
    and easy to validate, but it’s also text based, which has further increased its
    popularity, especially with the recent rise of web services technologies.


    Increasingly, XML is also being used internally by web applications to represent
    data retrieved from the business or database layer, which is then rendered into
    an appropriate format (HTML, WML, and so on) by the presentation layer. Therefore,
    more and more JSP page authors have to manipulate XML in order to generate some
    content. Until now, using XML


    data has been a nontrivial task, often requiring specific programming skills of
    the page author.


    To address this problem, the JSTL provides an XML processing tag library that
    is designed to solve many of the common tasks met by page authors using XML data.


    The XML processing tag library can be split into the following functional areas
    concerned with XML data:


    • XML core actions


    • XML flow control actions


    • XML transformation actions


    The first two functional areas are very similar in nature to the core and flow
    control actions provided by the Core tag library, except that they are designed
    to work with XML data. The XML


    transformation actions enable XML data to be transformed into other content by
    using XSL


    Transformations (XSLT) stylesheets.


    Naturally, one of the key requirements when dealing with XML documents is to be
    able to easily manipulate their content. The actions from the XML processing tag
    library are no different and are all based around XPath (a W3C recommendation
    since 1999) to select and specify individual parts of an XML document by a simple
    XPath expression.


    ■**Note** To use XPath with the examples in this section, you will need the Xalan
    libraries. If you downloaded the JWSDP as described in the beginning of this chapter,
    you can find the Xalan libraries in the jaxp\lib\endorsed directory. Alternately,
    you can download Xalan from Apache. We downloaded the Xalan libraries from http://xml.apache.org/xalan-j/
    and then copied the JAR files to the lib directory of the application.


    The actions provided by the XML processing tag library support the use of only
    XPath expressions, which are evaluated by an appropriate XPath engine, via the
    select attribute. All other expressions are evaluated in the standard manner by
    the global EL in use.


    513-0 ch04.qxd 11/17/05 8:41 PM Page 172


    **172**


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    In addition to the standard XPath syntax, the XPath engine provided by the JSTL
    also supports the following “scopes,” which may be used in XPath expressions to
    access data stored in the various web applications’ scopes.


    $param:


    $header:


    $cookie:


    $initParam:


    $pageScope:


    $requestScope:


    $sessionScope:


    $applicationScope:


    You should be familiar with these scopes as they are defined in the same manner
    as those used in the JSTL EL. Consider the following XPath expression: $sessionScope:user


    This expression could be used in a similar manner to the standard JSTL EL to reference
    an attribute called user stored inside the session scope.


    XML Core Actions


    As the name suggests, the XML core actions provide fundamental tasks required
    to interact with an XML document such as parsing and accessing the XML content.


    **The <x:parse>, <x:out>, and <x:set> Actions** The <x:parse> action simply parses
    a named XML document and saves it inside a scoped variable for use by other tags
    from the XML tag library. For example, let’s imagine you’re working with the XML
    file in Listing 4-11 that describes a book: **Listing 4-11.** *book.xml*


    <book>


    <title>Professional JSP</title>


    <author>Brown et. al</author>


    <isbn>1-59059-513-0</isbn>


    <published>September 2005</published>


    <publisher>Apress</publisher>


    <url>www.apress.com/book/bookDisplay.html?bID=464</url>


    </book>


    Assuming this file is stored in a file called book.xml, you can parse this file
    and store the resulting object as follows:


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <%@ taglib uri="http://java.sun.com/jstl/xml" prefix="x" %>


    <c:import url="book.xml" var="url" />


    <x:parse xml="${url}" var="book" scope="session" />


    ![Image 47](index-206_1.png)


