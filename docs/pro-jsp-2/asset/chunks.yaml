    One of the reasons for choosing to show cooperation between simple and classic
    tags is that it’s not as straightforward as cooperation between tags of the same
    type. If you’re solely using simple tags, the getParent() method will return an
    object of type JspTag—the superclass of all tag interfaces. However, with classic
    tags, historically the getParent() method returns an object of type Tag, and this
    has been maintained for backward compatibility. In this example, the outer tag
    is a simple tag (of type SimpleTag), and the inner tag is a classic tag (of type
    BodyTag).


    An object implementing the SimpleTag interface can’t be cast to the Tag interface,
    and therefore the JSP container provides an adapter class called TagAdapter that
    wraps up a SimpleTag and makes it look like a Tag. Behind the scenes, it’s this
    object that’s passed to the setParent() method on your EventHandlerTag, which
    is why you need to do some additional processing to extract a reference to the
    enclosing tag handler instance. Basically, it all comes down to providing backward
    compatibility for existing classic tags while making them fully interoperable
    with the newer simple tags.


    An alternative way to find a specific parent tag is with the findAncestorWithClass()
    method provided by the SimpleTagSupport and TagSupport classes. This method provides
    a way to automatically search through all of the parent tag handler instances
    until it finds an instance that implements a specific interface. For example,
    you could use the following line of code to locate the parent SelectTag class:


    SelectTag tag = (SelectTag)findAncestorWithClass(this, SelectTag.class); This
    line says, “Starting from this tag handler, look at each parent in the tree in
    turn until you find one that is of type SelectTag.” This will even work if you’re
    mixing tag types and the actual tag handler is wrapped up inside the TagAdapter
    class behind the scenes.


    Another benefit is that you can search for parent tags that implement a specific
    Java interface, making it possible to allow the implementation of cooperating
    tags to be substituted, provided that they implement the same interface. A good
    example is that the SelectTag class could implement an interface that allows event
    handlers to be added. The <eventHandler> tag can then look for a parent implementing
    this interface, which gives you the flexibility to use the <eventHandler> tag
    nested inside other event-handler–capable tags and to substitute the implementation
    of the <select> tag if necessary.


