    and use the tags within it.


    There are many benefits to adopting this approach to deploying tag libraries,
    but the primary benefit is that it makes deployment and reuse of tag libraries
    easy. Another benefit relates to technology independence. With the ability to
    define a mixture of tag files, simple tags, and classic tags within a tag library,
    the end users of that tag library will never know how those tags are actually
    implemented. This means that should you need to reimplement a tag by using a different
    technology in the future, this is no problem. Essentially, custom tags provide
    a nice abstraction to reusable Java components.


    **Best Practices**


    To wrap up this chapter’s look at custom tags, we’ll briefly cover some of the
    best practices that have emerged over the past few years.


    **Common Usage Patterns and Granularity**


    Custom tags have access to the full range of APIs that are provided by the Java
    Standard Edition and Java Enterprise Edition platforms. This means that they can
    pretty much wrap and provide


    513-0 ch08.qxd 10/28/05 1:02 PM Page 356


    **356**


    C H A P T E R 8 ■ C U S TO M TA G A D VA N C E D F E AT U R E S A N D B E S T
    P R A C T I C E S


    any functionality for use on JSP pages, from generating content and providing
    iteration to reading files and accessing remote data sources. However, just because
    you can provide this type of functionality doesn’t necessarily mean that you should.
    One of the key things to remember when you design custom tags is your audience.
    Who will be using the tags? Generally, there are two user extremes, although most
    people tend to fit somewhere in between.


    At one extreme are web designers (or page authors). These people are responsible
    for the look and feel of a web application. As part of their role, they’re much
    more concerned with the creative aspects of the JSP pages than the mechanics behind
    how the pages work. At the other extreme are developers, who are more focused
    on providing functionality than on how the web application looks. This split of
    responsibility may not be as clear-cut on many of your own projects, but the principles
    are worth bearing in mind.


    Typically, the skill sets of these two types of people will be dramatically different.
    One has expert knowledge in web design and markup, and the other has expert knowledge
    of how a web application works from a technical perspective. This is why it’s
    important to consider your audience when you design custom tags and to work with
    that audience to ensure that your custom tags meet the audience’s needs.


    When programming, we as developers are typically used to building up high-level
    functionality from a series of low-level constructs. For example, to iterate over
    a collection we might choose to use a for loop. Within the for loop, we might
    use the counter variable to find a specific item in the collection. Although this
    may seem basic to us, it won’t to web designers; therefore, they won’t want to
    see such logic on JSP pages. The point is that custom tags should be fairly granular
    in nature. In other words, to achieve a specific goal you shouldn’t have to use
    many custom tags in cooperation with one another. A good example is providing
    iteration over an array. Before the introduction of the JSTL, many people would
    build two custom tags to implement iteration functionality—one tag to loop and
    one tag to get the next item in the collection, as follows:


    <prefix:for from="0" to="10">


    <prefix:getBean id="myBean" array="${myBeans}"/>


    ... content to be displayed on each iteration ...


    </prefix:for>


    From a developer’s perspective this makes sense, but from a page author’s perspective
    it doesn’t. In summary, keep the tags as simple as possible and don’t try to simply
    replicate programming constructs.


    **Naming**


    On a related note, the name you give to a tag or its attributes can also affect
    how that tag is perceived by others. Using overly technical language for naming
    these items can cause confusion. For example, the tag that provides iteration
    in the JSTL is called <forEach>, and the list of items that it iterates over is
    called items instead of collection, list, or array. Once again, keep your audience
    in mind when describing your tags—if you’re wrapping up technology-focused functionality
    such as accessing databases or using XML, then generally these tags are going
    to be used only by technologists anyway. Giving tags simple, appropriate names
    is a great way to make JSP pages readable and maintainable.


    513-0 ch08.qxd 10/28/05 1:02 PM Page 357


    C H A P T E R 8 ■ C U S TO M TA G A D VA N C E D F E AT U R E S A N D B E S T
    P R A C T I C E S


    **357**


    Another point related to naming is giving cooperating tags an appropriate name
    that reflects their intent. For example, you built a specific <eventHandler> tag
    to specify event handlers for the <select> tag. Although passing this information
    to the <select> tag is possible with dynamic attributes, a side effect is that
    the readability of the page suffers. The key is to make tags and using those tags
    seem natural, and you can help by providing good names for tags and making them
    easy to use together, in cooperation.


    **What Makes a Good Tag Library?**


    Finally, let’s address the question of what makes a good tag library. A useful
    comparison to make is between tags and other development disciplines such as object
    orientation (OO) and component-based development (CBD). A common goal in these
    disciplines is reuse. With OO, you aim to get reuse at the class level, and with
    CBD, you aim to get reuse at the component level. Mapping this back to custom
    tags, you can see that you’d like to get reuse at the tag level.


    With OO and CBD, a good class or component is one that has high cohesion and low
    coupling.


    In other words, the class contains highly related functionality and doesn’t depend
    too much on other classes/components.


    You can go one step further and look for reuse at the package level or, with custom
    tags, at the tag library level. Ideally, you’d like to be able to take a tag library
    and reuse it as-is on other web applications in the future.


    So, coming back to the question of what makes a good tag library, essentially
    it’s the same aspects of achieving reuse at the package level with OO and CBD.
    The tags within a tag library should form a highly cohesive collection of functionality
    that’s loosely coupled to other tag libraries. You’d like to take a tag library
    and reuse it elsewhere without having dependencies on other libraries. In this
    way, your initial goals to increase the readability, reusability, and maintainability
    of JSP development are all achieved.


    **Summary**


    In this final chapter on custom tags, you looked at some of the more advanced
    custom tag features. First, you learned how custom tags can introduce scripting
    variables into the page. This is something that has always been possible in previous
    versions of the JSP specification, and in essence nothing has changed. However,
    with the introduction of the JSP EL, you should see scripting variables being
    used within JSP pages less and less, meaning that these techniques should also
    be used less frequently by people writing new tags. After all, the JSP EL provides
    a much better, cleaner way to access information from within a JSP page.


    Next, you examined how tags can cooperate with one another on the page. You learned
    that this is possible through a couple of methods: one in which information is
    shared between the tags, and one in which child (nested) tags look up their parent
    and directly access the corresponding tag handler instance. Both methods are widely
    implemented and allow custom tags to be more flexible in the way that they’re
    used on the page. Also, these methods provide a way for more-generic tags to be
    created that can be used in cooperation with different tags to achieve different
    goals.


    Then you looked at how more-resilient tags can be built by using techniques that
    allow a tag’s attributes to be validated. This is an often-overlooked part of
    tag development, although


