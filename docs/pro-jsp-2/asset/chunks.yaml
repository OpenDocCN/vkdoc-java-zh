    `<form>` 元素的 name 属性定义了 ActionForm 的名称，该名称应与 `struts-config.xml` 中定义的名称一致。由于你使用
    XDoclet 来生成表单和 `struts-config.xml` 文件，因此可以确保这些名称是匹配的。


    `<field>` 元素有两个属性：`property` 和 `depends`。`property` 属性定义了 `UserForm.java` 中待验证变量的名称，而
    `depends` 属性则指定了要应用的验证规则。


    有两个 `<msg>` 元素，用于指明从 `ApplicationResources.properties` 文件（或 `struts-config.xml`
    中定义的任何 ResourceBundle）中使用的消息。在 `struts-resume` 中，这些消息定义如下：`errors.required={0}
    is required.`


    `errors.email={0} is an invalid e-mail address.`


    最后一个元素 `<arg0>` 指定了每条消息中 `{0}` 替换值的消息键。在 `struts-resume` 中，它被定义为：`userForm.username=Username`


    如果你希望在错误消息中替换多个参数，可以在 `ApplicationResources` 中通过递增数字来添加更多参数，例如 `{1}` 表示第二个参数。要在表单中添加此参数的替换值，你可以在原始表单中添加另一个
    XDoclet 标签：


    `@struts.validator-args arg1resource="username.lastName" arg1value="My Surname"`


    当然，你绝不会同时使用这两个属性，因为第一个（`arg1resource`）用于查找资源键，而第二个（`arg2value`）用于在 `validation.xml`
    中放置字面字符串。通过 webdoclet 任务运行上述代码会生成以下 XML：


    `<arg0 key="username.lastName"/>`


    `<arg0 key="My Last Name" resource="false"/>`


    现在你已经配置了表单的验证，接下来应该在 JSP 中添加一些 JavaScript 来强制执行客户端验证。第一步是使用 `<html:messages/>`
    标签库来捕获任何服务器端验证错误：


    `<logic:messagesPresent>`


    `<div class="error">`


    `<html:messages id="error">`


    `<bean:write name="error" filter="false"/><br/>`


    `</html:messages>`


    `</div>`


    `</logic:messagesPresent>`


    在 `struts-resume` 应用程序中，上述代码出现在 `messages.jsp` 文件中。该文件还包含捕获常规消息（非错误消息）的代码，并位于
    `web/common` 文件夹中。它被包含在 Tiles 模板中，因此我们不必将其添加到每个需要使用验证的页面中。


    其次，你需要在表单中添加一个 `onsubmit` 事件处理器：


    `<html:form action="/userSave" method="post" styleId="userForm"`


    `focus="password" onsubmit="return validateUserForm(this)">`


    在检查此表单语法时，我们还想指出其他几点。


    默认情况下，如果你在表单上未使用 `method` 属性，`<html:form>` 标签会为你生成一个。但它生成的问题在于不符合 XHTML 规范。也就是说，它生成为
    `method="POST"`，而 XHTML 要求预定义的属性值必须是小写。


    我们通常为所有表单和表单元素（例如 `<html:text>` 或 `<html:password>`）添加一个 `styleId` 属性，以便可以通过文档对象模型（DOM）使用
    `document.getElementById(elementId)` 来访问它们。需要注意的一点是，每个 Id 在页面内必须是唯一的。最后，为了提高应用程序的可用性，你应该尝试在表单上使用
    `focus` 属性，但要谨慎使用：如果你根据用户角色或其他逻辑隐藏了字段，这可能会导致 JavaScript 错误。


    配置完表单后，你需要为表单的“提交”和“取消”按钮添加一个 `onclick` 处理器，以调用 Validator 的 `validateForm` JavaScript
    函数。这样做是为了确保点击“取消”按钮时不会触发任何验证：


    `<html:cancel styleClass="button" onclick="bCancel=true">`


