    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **149**


    <c:out value="${cal.time}"/>,


    <c:set var="hour" value="${cal.hour}" scope="request" />


    <b>


    <c:if test="${hour >= 0 && hour <=11}"> Good Morning!


    </c:if>


    <c:if test="${hour >= 12 && hour <=17}"> Good Afternoon!


    </c:if>


    <c:if test="${hour >= 18 && hour <=23}"> Good Evening!


    </c:if>


    </b>


    As you can see, this JSP page uses an instance of a simple JavaBean component
    called CalendarBean (a simple wrapper around the java.util.Calendar class). The
    page also sets a variable called hour using the <c:set> action introduced earlier.
    After informing the user of the current time, the page then dynamically provides
    the user with a greeting depending on whether it’s morning, afternoon, or evening.
    Notice how it takes three separate <c:if> actions to accomplish this task.


    Note that the reason for using the CalendarBean class as a wrapper is that the
    standard java.util.Calendar class isn’t a standard JavaBean component and hence
    cannot be instantiated by the <jsp:useBean> action or manipulated by the EL. An
    alternative would be to use scriptlet code to provide access to a Calendar object,
    but as mentioned elsewhere this makes your JSP pages cluttered and harder to maintain.


