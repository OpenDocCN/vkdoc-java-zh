    developer uses the interfaces to develop servlets, and the web-container vendors
    can decide the most suitable way to implement these interfaces. The remaining
    seven interfaces are implemented by the web-application developer to provide the
    application’s functionality:


    • Servlet


    • ServletContextListener


    • ServletContextAttributeListener


    • ServletRequestAttributeListener


    • ServletRequestListener


    • SingleThreadModel


    • Filter


