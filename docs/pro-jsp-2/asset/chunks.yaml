    A P P E N D I X A ■ J AVA S E R V E R PA G E S S Y N TA X R E F E R E N C E


    • The contentType attribute sets the MIME type and the character set for the response.


    The default value is text/html when defining JSP Pages standard syntax and text/xml
    when implementing JSP Documents in XML format.


    • The pageEncoding attribute defines the character encoding for the JSP page.
    The default is that specified in the contentType attribute, or "ISO-8859-1" if
    none was specified there.


    • isELIgnored: Sets EL support. The default is false, meaning EL is enabled in
    the page.


    The value for this attribute overrides the value specified in web.xml.


    • The deferredSyntaxAllowedAsLiteral attribute configures whether #{ is treated
    as the beginning of a deferred EL statement or a literal.


    • The trimDirectiveWhitespaces attribute configures whether whitespace is trimmed
    from template text.


    **The taglib Directive**


    A tag library is a collection of tags used to extend a JSP container functional
    model. The taglib directive defines a tag library namespace for the page, mapping
    the URI of the tag library descriptor (TLD) to a prefix that can be used to reference
    tags from the library on this page.


    <%@ taglib uri|tagdir="/WEB-INF/taglib.tld" prefix="tagPrefix" %>'
