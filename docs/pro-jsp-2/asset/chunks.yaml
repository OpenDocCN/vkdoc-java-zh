  raw: 'In the previous template, you can see that there are attributes that you import
    and attributes you insert. Basically, the <tiles:importAttribute> is used for
    the <bean:message/> tags. When you configure the application to use this template,
    you can actually tell it which key from your ApplicationResources.properties file
    to use for the title.key and for the heading.key. The <tiles:insert /> tag is
    used to insert or include a JSP page, but this could also be a URL to any component
    within your application.


    If you’re inserting JSP pages into your Tiles template, you’ll need to configure
    your JSP


    pages so they can be executed independently of other pages. By this, we mean to
    say that they could be referenced with a dynamic include (<jsp:include>) rather
    than a static include (<%@ include />). Therefore, you must reference the appropriate
    tag libraries at the top of each page. To make development easier and faster,
    we usually create a JSP file with all our tag library declarations, and then use
    a static include to include them on every page. You can see an example of this
    in the struts-resume application. The template in Listing 15-1 will render a layout
    similar to the one shown in Figure 15-12.


    ![Image 191](index-643_1.png)


    513-0 ch15.qxd 11/14/05 5:38 PM Page 610


    **610**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **Figure 15-12.** *The Tiles template shown previously renders this web page.*


    Tiles templates, also known as layouts, can be referenced using two different
    techniques.


    The first is by using a JSP page. For example, you could put all the JSP pages
    in a pages directory.


    This technique comes in handy when using JSP pages to compose Tiles pages. You
    can simply put all your different page sections (or **tiles**) in the pages directory,
    and then reference them from the root directory. For instance, this is what a
    page might look like in the root directory:


    <%@ include file="/common/taglibs.jsp"%>


    <tiles:insert page="/layouts/simpleLayout.jsp" flush="true">


    <tiles:put name="title.key" value="login.title"/>


    <tiles:put name="heading.key" value="login.heading"/>


    <tiles:put name="header" value="/common/header.jsp "/>


    <tiles:put name="menu" value="/menu.html"/>


    <tiles:put name="content" value="/WEB-INF/pages/login.jsp"/>


    <tiles:put name="footer" value="/common/footer.jsp "/>


    </tiles:insert>


    The second option is to use an XML file and create **definitions** for each page.
    This is nice because definitions can extend each other as well as provide a central
    repository of your page composition information. Furthermore, definitions can
    still be references from a JSP page (when using a /do/* mapping) or as ActionForward
    paths in struts-config.xml. Let’s look at how the previous JSP code might look
    in a tiles-config.xml file:


    <definition name=".login" path="/layouts/simpleLayout.jsp">


    <put name="title.key" value="login.title"/>


    <put name="heading.key" value="login.heading"/>


    513-0 ch15.qxd 11/14/05 5:38 PM Page 611


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **611**


    <put name="header" value="/common/header.jsp"/>


    <put name="menu" value="/menu.html"/>


    <put name="content" value="/WEB-INF/pages/welcome.jsp"/>


    <put name="footer" value="/common/footer.jsp"/>


    </definition>


    One of the principal advantages of using definitions is that you can inherit properties
    from each other. In this way, you can create a baseLayout definition that all
    definitions inherit from, and child definitions won’t need to define certain properties,
    such as the header and footer. The previous definition can be refactored to something
    like this:


    <definition name="baseLayout" path="/layouts/baseLayout.jsp">


    <put name="title.key"/>


    <put name="heading.key"/>


    <put name="header" value="/common/header.jsp"/>


    <put name="footer" value="/common/footer.jsp"/>


    </definition>


    <definition name=".login" extends="baseLayout">


    <put name="title.key" value="login.title"/>


    <put name="heading.key" value="login.heading"/>


    <put name="menu" value="/menu.html"/>'
