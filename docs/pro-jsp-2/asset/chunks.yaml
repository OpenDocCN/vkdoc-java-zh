    **The <jsp:forward> Action**


    Another handy action available to JSP page authors is the <jsp:forward> action,
    which not surprisingly is used to forward the current request to another resource
    such as a static resource, a JSP page, or a servlet in the same context as the
    containing JSP, for processing.


    The syntax for the action is as follows:


    <jsp:forward page="relativeURL" />


    Any buffered content that was written before the call to the <jsp:forward> action
    will be ignored. If any buffered content has already been flushed (sent to the
    client), the call will result in an IllegalStateException.


    Note that nested <jsp:param> actions may be used in the <jsp:forward> action in
    the same way as with the <jsp:include> action to pass additional request parameters
    to the new resource.


    For example:


    <jsp:forward page="/pages/login.jsp">


    <jsp:param name="userName" value="Dan" />


    </jsp:forward>


