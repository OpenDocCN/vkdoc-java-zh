    With a collection of Country objects available as a page-scoped attribute (for
    example), the following JSP code snippet shows how the JSTL can be used to help
    build the list:


    <%@ taglib uri="http://java.sun.com/jstl/core_rt" prefix="c" %> Countries :


    <select name="country">


    <c:forEach var="country" items="${countries}">


    <option value="${country.id}">${country.name}</option>


    </c:forEach>


    </select>


    Here, you’re using the JSTL to iterate over the collection. Short JSP EL expressions
    within the JSTL tags extract the ID and name from the Country JavaBeans within
    that collection.


    Although this works, the logic related to building the list is embedded within
    the JSP page, meaning that it’s not easily reusable. Also, the code itself is
    a little raw and unreadable, particularly because the HTML for the select control
    is mixed in with JSTL and EL expressions. A better way to implement this is to
    use a custom tag that generates the content for you.


    Identifying the Attributes


    Before building the tag handler, let’s look at what you might want to allow users
    to customize when they use the tag. In the previous example, there are four things
    that you can customize:


    • The name property of the HTML select control


    • The value that is being displayed in the list (the label)


    • The value behind the scenes that acts as a key for each item (the value)


    • The collection of items to be displayed


    Looking at what can be customized is an important step in figuring out what attributes
    a custom tag might need. This review also allows the custom tag itself to be as
    generic as possible. After all, if you can specify all of the preceding information
    by using attributes, it means that you can build a generic HTML <select> tag rather
    than one that displays just country names.


