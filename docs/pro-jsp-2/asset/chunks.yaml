    ■**注意** 如果您想了解更多关于 Web 应用程序框架的信息，最佳起点之一是 Craig McClanahan 的博客，网址为 http://blogs.sun.com/roller/page/craigmcc。


    您还应该注意，任何可以用 JSP 页面和 Servlet 完成的事情，仍然可以用 Struts 完成。因此，您仍然可以在应用程序中编写扩展 HttpServlet
    的常规 Servlet，或者使用包含任意嵌入式脚本代码的 JSP 页面。


    另一方面，Struts 确实试图鼓励某些更好的 Web 应用程序编码实践，并且它确实使编写和部署它们变得更加容易。例如，使用 Struts 时，您无需在 Servlet
    中编写一大堆 `request.getParameter()` 调用来获取表单的所有值。Struts 通过 ActionForm 为您完成这项工作，它负责处理
    HTML 表单值的填充和获取。


    **Struts 架构**


    那么，这些 ActionForm 是如何融入整个 Struts 架构的呢？图 15-1 展示了一个简单 Struts 应用程序的总体示意图。


    **图 15-1.** *这个 Struts 应用程序的 UML 视图展示了主要组件如何协同工作。*


    让我们快速回顾一下此图的特点。


    513-0 ch15.qxd 11/14/05 5:38 PM 第 574 页


    **574**


    第 15 章 ■ 使用 Struts、XDOCLET 和其他工具


    首先，您可以看到我们假设您使用 JSP 页面作为视图，并且这些页面是使用 Struts 标签库构建的。每个客户端请求应用程序执行特定**操作**时，该请求都会被传递给控制器
    Servlet（称为 ActionServlet），然后由它分派给一个 Action 类。


    每个 Action 类都继承自 `org.apache.struts.action.Action`。每个 Action 通过重写 `execute()` 方法来提供特定于应用程序的实现。执行每个操作（处理每种类型的请求）所需的业务逻辑都位于相应
    Action 类的 `execute()` 方法中。Action 类代表了应用程序的控制器逻辑。它们控制向用户呈现哪些视图元素。例如，如果发生错误，操作负责在输入页面上显示错误信息。


    每个操作也可能有一个对应的 ActionForm JavaBean 类。ActionForm 类继承自 `org.apache.struts.action.ActionForm`
    并重写 `validate()` 方法。每个 ActionForm 验证用户数据，并且 Action 类可以使用它来检索用户数据。ActionForm 类代表了模型的数据。模型是您的数据以及您为检索、保存或删除这些数据而编写的代码。


    因此，正如您对控制器的期望，ActionServlet 提供了视图与 Action 和 ActionForm 模型组件之间的链接。为此，它需要根据客户端请求的操作，将请求数据映射到适当的
    Action 和 ActionForm 类。请求操作到 Action 和 ActionForm 类的正确映射在配置文件 `struts-config.xml`（由
    http://struts.apache.org/dtds/struts-config_1_2.dtd 定义）中定义。该文件定义了一组 ActionMapping
    对象，每个对象代表一个操作到相应模型类的映射。因此，ActionServlet 会检查这个 `struts-config.xml` 文件，以找到当前请求的适当映射。


    最后，如果 Action 类正确处理了请求，它会通过向 ActionServlet 传递一个 ActionForward 对象，指示 ActionServlet
    应将用户转发到何处（通常是一个 JSP 页面）。


    有关 Struts 框架架构和实现的更深入信息，您可以参考本章引言中提到的书籍和文章，或者将浏览器指向以下链接：


    • http://jakarta.apache.org/struts/：Struts 主页（您可以从此处下载最新版本）

    • http://struts.apache.org/userGuide/index.html：Struts 用户指南


    正如您可能已经注意到的，使用 Struts 的一大好处是，您可以在不知不觉中实现许多经过验证的 Java EE 设计模式。前端控制器（ActionServlet
    和 Action）、视图助手（Action）、复合视图（我们稍后将讨论的 Tiles 框架）、服务到工作者（ActionServlet 到 actions）以及调度器视图（ActionForward）都集成到了
    Struts 框架中。根据《Core J2EE Patterns》1 一书，这些都是“表示层模式”一章中提到的所有模式，除了拦截过滤器。


    Struts 没有整合拦截过滤器模式的唯一原因是为了保持与 Servlet 2.2 规范的向后兼容性（对于 Struts 2.0，有讨论用过滤器替换 ActionServlet）。


    1\. Alur, Deepak, John Crupi, 和 Dan Malks, *Core J2EE Patterns: Best Practices
    and Design Strategies*.

    (Upper Saddle River, NJ: Prentice Hall, 2001)


    513-0 ch15.qxd 11/14/05 5:38 PM 第 575 页


    第 15 章 ■ 使用 Struts、XDOCLET 和其他工具


    **575**


    **Struts 标签库**


    大多数 Struts 应用程序似乎都使用 JSP 页面作为应用程序的视图组件。这很可能是因为 Struts 开发人员可以使用丰富的标签库。这些标签使许多事情变得更加容易。如果您曾经开发过纯
    JSP 或 Servlet 应用程序，您可能会记得使用 JavaBeans、`<useBean>` 标签，或者甚至编写大量 `request.getParameter()`
    调用。Struts 基本上消除了这种需求，并使用其控制器和标签库架构轻松地填充表单。当然，也可以使用其他架构，例如 Velocity 和 XML。但由于我们迄今为止从未在项目中使用过它们，我们认为对其有用性进行评论是不公平的。


    ■**注意** 有关使用 Velocity 和 XML 或 XSL 渲染视图的更多信息，请访问 http://jakarta.apache.org/velocity/index.html。


    在撰写本文时（Struts 1.2.7），Struts 框架内有六个可用的标签库。这些库列在表 15-1 中，并附有对其功能的高级定义。


    **表 15-1.** *Struts 标签库*


    **库**


    **功能**


    Bean 标签


    用于与任何给定范围内的 Bean 进行交互的标签。用途包括创建和渲染 ActionForm 的属性。也用于通过 `<bean:message>` 标签进行国际化。其中许多标签可以用
    JSTL 标签替代。


    HTML 标签


    用于在表单上渲染 HTML 元素的标签。还包含用于渲染上下文相关 URL 的有用标签。JSTL 中没有替代品。不过，使用常规 HTML 标签和 JSP 2.1
    语法可能更简单。


    逻辑标签


    用于执行逻辑的标签，例如检查角色是否存在、遍历 Bean 列表以及转发或重定向。其中许多标签可以用 JSTL 标签替代。


    嵌套标签


    这些标签扩展了前面提到的基本 Struts 标签，但允许它们以嵌套的方式相互关联。JSTL 中没有等效项。


    Tiles 标签


    用于对您的站点执行 JSP“模板化”的标签。对于使用小的、可重用的组件创建应用程序非常有用。我们稍后将更深入地讨论这一点。


    Struts EL 标签


    一个最近创建的子项目，用于使用 JSTL 中的表达式语言评估引擎。一些 Struts 标签没有被移植，因为其功能已存在于 JSTL 中。


    这些标签的在线 API 文档非常出色（请参阅 Struts 用户指南页面 http://struts.apache.org/userGuide/index.html
    上的链接）。此外，最近的书籍（如前所述）在彻底记录这些标签方面做得非常出色。


    Struts HTML 标签的一个重要特性是能够渲染符合 XHTML 的标签。这意味着如果您在 JSP 或 Tiles 布局定义的顶部添加 `xhtml="true"`，所有
    HTML 标签都将成为格式良好的 XML（即，使用结束标签或尾随 `/>` 闭合）。要

