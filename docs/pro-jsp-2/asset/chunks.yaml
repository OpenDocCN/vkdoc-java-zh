    Unfortunately, this authentication mechanism was designed to resemble HTTP basic
    authentication, meaning that when a user enters an incorrect username or password,
    the server returns an HTTP status code of 401. HTTP status code 401 means “This
    resource requires HTTP authentication.” Therefore, your deployment descriptor
    will contain entries for a login form and an error page; the error page is served
    up when a 401 error is encountered. This process (see Figure 12-6) includes the
    same steps as those described previously, except the last step changes to the
    following: **6.** If authentication fails, the error page is returned and the
    status code of the response is set to 401.


    **Figure 12-6.** *When form-based authentication is used, the last step in the
    process is* *changed slightly.*


    To implement form-based authentication, the first thing you need is a page with
    a form. The only requirements mandated by the specification are that the form’s
    action is j_security_check, and that the username and password fields are named
    j_username and j_password, respectively. Listing 12-1 shows an example of how
    this might be coded in an HTML or JSP page.


    513-0 ch12.qxd 11/17/05 4:15 PM Page 479


