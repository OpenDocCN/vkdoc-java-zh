    The JavaServer Pages


    Expression Language


    **O**ne of the features of the JSP specification that you’ll be using most often
    is the **JSP expression language**, an intentionally simple language that is,
    to a large extent, independent from JSP.


    In previous incarnations of JSP, Java code was embedded into JSP pages in the
    form of scriptlets, for example:


    <%


    MyBean bean = new MyBean();


    String name = bean.getName();


    out.println(name);


    %>


    This scriptlet creates a new instance of a class called MyBean, gets its name
    property, assigns this to a string variable, and then outputs this string to the
    page. Now you might be looking at this and thinking, “I can achieve the same thing
    by using the JSP standard actions (<useBean> and <getProperty>).”


    Although this is certainly true, it was previously extremely hard to write a function-rich
    JSP-based web application without using a number of scriptlets within your pages.
    In fact, there are many problems associated with using Java code in the form of
    scriptlets in JSP pages.


    The first and most obvious of these is that it’s very common for non-Java programmers
    to create the user interface for a system. This is because graphic designers are
    generally better than Java programmers at creating functional user interfaces.
    The second problem caused by the use of scriptlets is that of maintainability.
    Embedding large amounts of code into the user interface of a system makes the
    interface much harder to change and understand.


    For all of these reasons, the JSP 2.0 specification introduced an expression language
    (EL) that can do pretty much everything that scriptlets can do. This language
    is far simpler to understand than Java and looks very similar to JavaScript. The
    following are good reasons for this similarity:


    • JavaScript is something that most page authors are already familiar with.


    • The EL is inspired by ECMAScript, which is the standardized version of JavaScript.


    **95**


    513-0 ch03.qxd 10/28/05 12:53 PM Page 96


    **96**


    C H A P T E R 3 ■ T H E J AVA S E R V E R PA G E S E X P R E S S I O N L A N G
    U A G E


    In fact, both ECMAScript and the XPath EL inspired the JSP EL. The EL specification
    states, “. . . the experts involved were very reluctant to design yet another
    expression language and tried to use each of these languages, but they fell short
    in different areas.”


    If you’ve been following the progress of JSP, and the JSP Standard Tag Library
    (JSTL), you’re probably aware that the first expression language was released
    as part of the JSTL. The EL was then incorporated into the JSP 2.0 specification
    with JSTL 1.1.


    At around the same time, the JavaServer Faces (JSF) expert group was developing
    an expression language for JSF. Because of JSF requirements, the JSF expression
    language had some differences from the JSP expression language. JSP 2.1 unifies
    the two versions so that there is a single expression language used for JSP, JSTL,
    and JSF.


    In this chapter, you’ll learn the following:


    • The syntax and usage of the EL, including reserved words, disabling scriptlets
    in a page, and disabling the evaluation of the EL on a page or set of pages


    • The operators within the EL, including arithmetic operators, comparison operators,
    logical operators, and other operators


    • The use of JavaBeans with the EL


    • The implicit objects within the EL


    • The declaration and use of functions in the EL


    **The Syntax and Use of the Expression Language**


    In this section, you’ll look at the syntax of the EL, see how to use it on a JSP
    page, and learn the reserved words of the language. After you’ve looked at the
    basics, you’ll move on to look at how and why you might disable the EL and Java
    scriptlets within a page or set of pages.


    **Basic Syntax**


    No matter where the EL is used, it’s always invoked in a consistent manner, via
    the construct ${expr} or #{expr}, where expr is the EL expression that you wish
    to have evaluated.


    In the EL 2.1 specification, the syntax of ${expr} and #{expr} are equivalent
    and can be used interchangeably. However, when used with some other Java Platform,
    Enterprise Edition API, the other API may enforce restrictions on the use of ${expr}
    and #{expr}. Specifically, when used with JSP pages, the two forms cannot be used
    interchangeably. Within a JSP page, ${expr} is used for expressions that are evaluated
    immediately, whereas #{expr} is used for expressions for which evaluation is deferred.
    Deferred expressions are used with custom actions, which you will look at in Chapters
    6 and 7.


    A simple use of the EL is shown here. This piece of code creates a JavaBean and
    outputs its name property:


    <jsp:useBean id="bean" class="MyBean"/> ${bean.name}


    We’ll discuss the detailed syntax of JavaBeans later in the “JavaBeans and the
    Expression Language” section.


    513-0 ch03.qxd 10/28/05 12:53 PM Page 97


    C H A P T E R 3 ■ T H E J AVA S E R V E R PA G E S E X P R E S S I O N L A N G
    U A G E


    **97**


    Note that in the previous example you used the <useBean> standard action to create
    the object. This is the recommended way to do this, rather than instantiating
    the object in a scriptlet.


    Literals


    Just as in any programming language, the EL provides several literals for developers
    to use. A literal can be of a Boolean, integer, floating point, string, or null
    type. The following are valid values for each literal type:


    • **Boolean:** true or false.


    • **Integer**: This is limited to values defined by the IntegerLiteral regular
    expression as follows:


    IntegerLiteral ::= [''0''-''9'']+


    This regular expression says that an integer is any sequence of digits using the
    digits from 0 to 9\. The specification also allows an integer literal to be preceded
    by a unary “-”


    symbol to form negative integer literals. For example, the following are valid
    integers:


    • **Floating point**: This is defined by the following FloatingPointLiteral expression:
    FloatingPointLiteral ::= ([''''0''-''9''])+ ''.'' ([''0''-''9''])* Exponent?


    | ''.'' ([''0''-''9''])+ Exponent?


    | ([''0''-''9''])+ Exponent?


    Exponent ::= [''e'',''E''] ([''+'',''-''])? ([''0''-''9''])+


    This expression is more complex. As with integer literals, a floating-point literal
    can be preceded by a unary “-” symbol to produce negative floating-point literals.
    To help you understand this, here are some valid floating-point literals:


    -1.09


    -1.003


    1.0E10


    1.


    -10.0


    0.1


    • **String**: A string is any sequence of characters delimited with either single
    or double quotes. For example, "a string" and ''a string'' are both valid; however,
    "as'' and ''as"


    are not valid. If you want to represent quotes within a string, then you can use
    \" for double quotes, or \'' for single quotes. Alternately, if the string is
    delimited by double quotes, you can use single quotes within the string without
    escaping the single quotes, and vice versa. To represent a \ in a string, you
    use the escape sequence \\.


    • **Null**: You can represent null by using the literal null.


