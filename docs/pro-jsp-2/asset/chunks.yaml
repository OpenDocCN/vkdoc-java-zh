    **Evaluating Body Content**


    In the previous sections on tags, we defined some templated content within a tag
    file. Essentially this is just regular JSP code that has been abstracted out of
    the page so it can easily be reused.


    With the <thumbnail> tag, the functionality of finding the list of files was wrapped
    up alongside the presentation of that list. Although we’ve made the presentation
    as simple as possible, we can imagine a scenario where every usage of the tag
    requires a slightly different HTML to be generated. Perhaps the list of thumbnails
    should be a bulleted list, or perhaps it should be enclosed within an HTML table.
    To achieve this goal, ideally you need to break out the content (the files) from
    the presentation (generating the HTML). This is something that is easy to implement
    by using JSP fragments, or tag body content.


    Essentially, the objective is to leave the content on the page where it belongs
    and to have the custom tag look up and locate the files. After the tag has this
    list, in a similar way to the JSTL <forEach> tag, it should then evaluate its
    body content repeatedly for every file that is found. Consider the following JSP
    code:


    <ch06:list path="/photos" suffix=".jpg">


    <img src=".${filename}" width="128" height="96">


    </ch06:list>


    <ch06:list path="/photos" suffix=".jpg">


    <td align="center">


