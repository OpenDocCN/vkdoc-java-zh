    properties.xml 文件加载所有 .properties 文件和环境变量。然后使用这些值来设置类路径属性、数据库属性和 Tomcat 部署属性。


    src 目录（显然）是存放所有 Java 源文件的地方。其下有三个子目录：common、ejb 和 web。此外，为持久层设置一个 ejb 目录是合理的，因为这使得目录结构在未来具有可扩展性。XDoclet
