- fmt: "`struts-config.xml`和`validation.xml`。例如，要为应用程序指定全局转发，可以创建一个`global-forwards.xml`文件，其中包含一个或多个`<forward>`元素。全局转发文件允许你配置模块中多个操作使用的转发，从而轻松配置多个页面共用的转发。\n\
    \n```\n<global-forwards>\n<forward name=\"mainMenu\" path=\"/mainMenu.do\"/>\n\
    </global-forwards>\n```\n\n该文件随后会被包含在生成的文件中。`XDoclet`通过检查`webdoclet`任务的`mergedir`属性来知道在此目录中查找这些文件：\n\
    \n```\n<webdoclet destdir=\"${webapp.target}/WEB-INF\"\n           force=\"${xdoclet.force}\"\
    \n           mergedir=\"metadata/web\"\n           excludedtags=\"@version,@author\"\
    \n           verbose=\"true\">\n```\n\n`XDoclet`也用于在`struts-config.xml`中生成`form-bean`条目，以及为`Validator`生成`validation.xml`文件。对于`form\
    \ beans`，你只需在类的`Javadoc`中添加以下内容：\n\n```\n* @struts.form name=\"UserForm\"\n```\n\
    \n你也可以使用此标签通过`@struts.form`从`POJO`（或实体bean）生成`ActionForms`。但是，如果要包含实体bean的所有字段，则需要添加`include-all=\"\
    true\"`。你还可以添加可选的`extends`属性来指定它扩展`ValidatorForm`或你自己的基类。例如，在`struts-resume`中，`User.java`文件的`Javadoc`头中包含以下内容：\n\
    \n```\n/**\n * User class\n *\n * This class is used to generate the Struts Validator\
    \ Form\n * as well as the Hibernate persistence later.\n *\n * @author Matt Raible\n\
    \ * @version $Revision: 1.6 $ $Date: 2003/06/27 03:27:44$\n *\n * @struts.form\
    \ include-all=\"true\"\n *   extends=\"org.appfuse.webapp.form.BaseForm\"\n *\n\
    \ * @hibernate.class table=\"app_user\"\n */\n```\n\n然后，你可以添加方法级别的标签来生成`validation.xml`文件。如果你正在向现有的`ValidatorForm`添加`XDoclet`标签，请确保将这些标签放在你的**setter**方法上，否则不会生成任何内容！\n\
    \n```\n* @struts.validator type=\"required\" msgkey=\"errors.required\"\n```\n\
    \n如果你从`POJO`或实体bean生成`ValidatorForms`，则需要将`@struts.validator`标签放在类的`get`方法上。在`struts-resume`中，我们设置了一个自定义的`XDoclet`模板来生成Struts的表单（位于`metadata/templates/struts_form.xdt`），该模板将生成一个`ValidatorForm`，并在setter方法上附带`@struts.validator`标签。\n\
    \n由于在撰写本文时这并非`XDoclet`的核心功能，我们受到启发创建了一个自定义模板来实现它。\n\n我们不确定是否推荐将操作转发（`action-forwards`）编码到类中。我们两种方式都尝试过，感觉都挺舒适。当然，我们最近一直在许多单人开发团队中工作，这可能会稍微影响我们的看法。如果你想外部化全局转发，可以将它们放在名为`global-forwards.xml`的合并点文件中。\n\
    \n如果你想在类本地执行此操作，可以在类的开头使用以下语法：\n\n```\n* @struts.action-forward name=\"list\"\
    \ path=\".resumeList\"\n```\n\n`XDoclet`与`Ant`集成的一个好处是，你也可以在源代码中指定`Ant`属性，这些属性将在构建时被替换。因此，你可以通过`Ant`配置所有值，而不是硬编码它们。例如，在`LoginServlet`中，我们在`Javadoc`头中包含以下`XDoclet`标签：\n\
    \n```\n* @web.servlet-init-param\n*   name=\"encrypt-password\"\n*   value=\"\
    ${encrypt-password}\"\n```\n\n此值在`app-settings.xml`文件中默认设置：\n\n```\n<property\
    \ name=\"secure-login\" value=\"false\"/>\n```\n\n但是，可以通过执行带有此参数的`Ant`轻松覆盖它：`ant\
    \ -Dsecure-login=true`\n\n这会导致在`LoginServlet`的部署描述符（`web.xml`）中生成以下内容：\n\n```\n\
    <init-param>\n    <param-name>encrypt-password</param-name>\n    <param-value>true</param-value>\n\
    </init-param>\n```\n\n如果你已有数据库模式并希望开发基于Java EE的应用程序，可以使用`Middlegen`（http://boss.bekk.no/boss/middlegen/）。`Middlegen`是一个基于JDBC、Velocity、Ant和XDoclet的数据库驱动代码生成引擎。它可以直接从数据库生成容器管理持久化（CMP）、企业JavaBeans（EJB）、Java数据库对象（JDO）以及JSP或Struts的代码！这是一个用于快速原型开发的绝佳工具。一个缺点是它对Struts的支持似乎非常薄弱。当我们第一次遇到`Middlegen`时，它只支持Struts\
    \ 1.0。在撰写本文时，`Middlegen`网站仍将Struts插件标识为alpha状态。\n\n## StrutsGen 工具\n\n在`struts-resume`应用程序中有一个小巧而灵活的工具，是Erik\
    \ Hatcher最初为他的示例应用程序《*Java Development with Ant*》编写的。它使用Ant和XDoclet，通过检查表单的属性文件来生成JSP页面和`ResourceBundle`。用于这两个文件的模板简单且可定制。此工具可以在`struts-resume`应用程序的`tools/strutsgen`目录中找到。要使用它，首先需要运行命令`ant\
    \ webdoclet`在`build/gen/web`目录中生成表单。然后导航到`tools/strutsgen`并运行`ant \"-Dform.name=MyForm\"\
    `，其中`MyForm`是你想要为其生成文件的表单名称。\n\n这将在`tool/strutsgen/build`目录中生成两个文件，一个名为`UserForm.jsp`，另一个名为`UserForm.properties`。你也可以在不指定表单名称的情况下运行该工具，它将为所有表单生成这些文件。\n\
    \n此工具使用`TreeMap`从表单中获取属性，这意味着新文件将按字母顺序包含属性。在大多数情况下，你可能需要自定义字段的顺序以使其对用户友好；这个工具只是稍微加快了速度。目前它也只支持生成`<html:text>`字段，但由于你无论如何都需要进入JSP重新排列字段顺序，所以这没什么大不了的。我们发现在开发此应用程序期间它非常有用。\n\
    \n## 在Struts中处理持久化\n\n在我们看来，Struts在为你（开发者）提供实现视图和控制器的绝佳方式方面做得很好，但在模型方面提供的支持不多。`ActionForms`很好，`ValidatorForms`甚至更好，但如果你想要一个应用程序的数据库后端，Struts并没有提供太多简化编码的方法。表单为后端提供了一个良好的接口，但Struts不负责提供数据访问，因此不提供任何用于检索数据的类。虽然有许多不同的方法来编写控制器到数据库的逻辑，但我们将告诉你我们是如何做的以及什么对我们有效。\n\
    \n当我们刚开始使用Struts开发时，我们的架构已经预先确定，我们所要做的就是接入它。我们在项目中使用EJB，并使用`RowSets`作为列表屏幕。这对我们来说相当容易，因为我们所要做的就是为每个操作调用特定的会话bean并与之适当交互。我们实际上发现，在每个表单上为我们的数据对象（或值对象或数据传输对象）创建访问器和修改器（getter和setter）非常容易。后来我们发现这不是推荐的“设计模式”——我们的数据对象永远不应该到达表示层。然而，它确实有效，而且效果很好——我们对此很满意。\n\
    \n持久化选项的话题似乎几乎每周都会出现在Struts用户邮件列表中。"
  raw: 'struts-config.xml, and validation.xml. For example, to specify global forwards
    for your application, you can create a global-forwards.xml file that contains
    one or more <forward> elements. The global forwards file allows you to configure
    forwards that are used by multiple actions in a module, which makes it easy to
    configure forwards that are common to multiple pages.


    <global-forwards>


    <forward name="mainMenu" path="/mainMenu.do"/>


    </global-forwards>


    This file will then be included in the generated file. XDoclet knows to look in
    this directory for these files by examining the mergedir attribute of the webdoclet
    task:


    <webdoclet destdir="${webapp.target}/WEB-INF"


    force="${xdoclet.force}"


    mergedir="metadata/web"


    excludedtags="@version,@author"


    verbose="true">


    XDoclet also works for producing form-bean entries in struts-config.xml as well
    as generating the validation.xml file for the Validator. For form beans, you can
    simply add the following in your class’s Javadoc:


    * @struts.form name="UserForm"


    You can also use this tag to generate ActionForms from POJOs (or entity beans)
    by simply using @struts.form. However, if you want to include all the entity bean’s
    fields, you’ll need to add include-all="true". You can also add an optional extends
    attribute to specify that it extends ValidatorForm or your own base class. For
    instance, in struts-resume, the User.java file has the following in its Javadoc
    header:


    /**


    * User class


    *


    * This class is used to generate the Struts Validator Form


    * as well as the Hibernate persistence later.


    *


    * @author Matt Raible


    * @version $Revision: 1.6 $ $Date: 2003/06/27 03:27:44$


    *


    * @struts.form include-all="true"


    * extends="org.appfuse.webapp.form.BaseForm"


    *


    * @hibernate.class table="app_user"


    */


    Then you can add method-level tags to generate the validation.xml file. If you’re
    adding XDoclet tags to an existing ValidatorForm, make sure to put these tags
    on your **setters**, as nothing will be generated otherwise!


    * @struts.validator type="required" msgkey="errors.required"


    513-0 ch15.qxd 11/14/05 5:38 PM Page 588


    **588**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    If you’re generating ValidatorForms from POJOs or entity beans, you’ll need to
    put the


    @struts.validator tags on the class’s get methods. In struts-resume, we’ve set
    up a custom XDoclet template for generating Struts’s forms (in metadata/templates/struts_form.xdt),
    which will generate a ValidatorForm, complete with @struts.validator tags on the
    setters.


    Since this wasn’t core functionality of XDoclet at the time of this writing, we
    were inspired to create a custom template to get it.


    We don’t know if we’d recommend coding your action-forwards into your classes.
    We’ve done it both ways and both seem comfortable. Of course, we’ve being working
    on a lot of one-person development teams lately, so that might skew our view a
    little. If you want to externalize your global forwards, you can put them in a
    merge-point file named global-forwards.xml.


    If you want to do it locally to the class, you can use the following syntax at
    the beginning of the class:


    * @struts.action-forward name="list" path=".resumeList"


    One great thing about XDoclet’s integration with Ant is that you can specify Ant
    properties in your source code as well and these will be substituted at build
    time. Thus, you could configure all your values via Ant rather than hard-coding
    them. For example, in LoginServlet, we have the following XDoclet tags as part
    of the Javadoc header:


    * @web.servlet-init-param


    * name="encrypt-password"


    * value="${encrypt-password}"


    This value is set by default in the app-settings.xml file:


    <property name="secure-login" value="false"/> However, it can easily be overwritten
    by executing Ant with this parameter specified: ant -Dsecure-login=true


    This results in the following being generated in the deployment descriptor (web.xml)
    for the LoginServlet:


    <init-param>


    <param-name>encrypt-password</param-name>


    <param-value>true</param-value>


    </init-param>


    If you already have a database schema and want to develop a Java EE-based application,
    you could use Middlegen (http://boss.bekk.no/boss/middlegen/). Middlegen is a
    database-driven code-generation engine based on JDBC, Velocity, Ant, and XDoclet.
    It can generate code for container-managed persistence (CMP), Enterprise JavaBeans
    (EJBs), Java Database Objects (JDO), and JSP or Struts—straight from a database!
    This is a great tool for rapid prototyping. One drawback is that the Struts support
    appears very weak. When we first encountered Middlegen, it only supported Struts
    1.0\. At the time of this writing, the Middlegen web site still identified the
    Struts plug-in as being in alpha state.


    513-0 ch15.qxd 11/14/05 5:38 PM Page 589


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **589**


    The StrutsGen Tool


    There is a small, yet nimble, tool in the struts-resume application that Erik
    Hatcher originally wrote for his sample application in *Java Development with
    Ant*. It uses Ant and XDoclet to generate a JSP page and a ResourceBundle by inspecting
    a form’s property files. The template used for both of these files is simple and
    customizable. This tool can be found in the tools/


    strutsgen directory of the struts-resume application. To use it, you first need
    to run the command ant webdoclet to generate your forms in the build/gen/web directory.
    Then navigate to tools/strutsgen and run ant "-Dform.name=MyForm" where MyForm
    is the name of the form you would like to generate files for.


    This will result in two files being generated in the tool/strutsgen/build directory,
    one named UserForm.jsp and the other named UserForm.properties. You can also run
    the tool without specifying a form name, and it will generate these files for
    all your forms.


    This tool uses a TreeMap for grabbing the properties from the form, so this means
    that the new files will contain the properties in alphabetical order. In most
    cases, you’ll probably need to customize the order of your fields to make them
    user friendly anyway; this tool just speeds things up a bit. It also only supports
    generating <html:text> fields at this time, but since you’ll have to get into
    the JSP to rearrange the order of fields anyway, it’s not a big deal. We found
    it to be very useful during development of this application.


    **Handling Persistence in Struts**


    In our opinion, Struts does a great job of giving you, the developer, great ways
    to implement your view and your controller, but it doesn’t provide much for the
    model. ActionForms are great and ValidatorForms are even better, but if you want
    a database back end to your application, there isn’t much in Struts that makes
    it easier to code it. Forms provide a nice interface to the back end, but Struts
    isn’t in the business of providing data access, and therefore doesn’t provide
    any classes for retrieving data. While there are many different ways to code your
    controller-to-database logic, we’ll be telling you how we’ve done it and what’s
    worked for us.


    When we first started developing with Struts, our architecture had been predetermined
    and all we had to do was hook into it. We were using EJBs on the project and used
    RowSets for our list screens. It was fairly easy on our part, because all we had
    to do was call a particular session bean for each action and interact with it
    appropriately. We actually found it very easy to create accessors and mutators
    (getters and setters) for our data objects (or value objects or data transfer
    objects) on each form. We discovered later that this wasn’t a recommended “design
    pattern”—our data objects should never make it to the presentation layer. However,
    it worked, and it worked great—and we were happy with it.


    The topic of persistence options seems to grace the Struts user mailing list almost
    weekly.'
