    **Bypassing Validation**


    Validation is an important aspect of your web application, because it ensures
    that all input values are valid before the model is updated, thereby enforcing
    model integrity. However, at times you will not want validation to occur.


    For example, various pages of the Flight Search application have a New Search
    button. If this button occurred on a page that also specified validators for any
    fields, we could have a


    513-0 ch05.qxd 11/1/05 7:18 PM Page 240


    **240**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    problem. In the normal JSF life cycle, the validators would be executed before
    the New Search button was processed. Validators are executed during the Process
    Validations phase, whereas command buttons are processed after the Invoke Application
    phase, which occurs after the Process Validations phase. By providing a New Search
    button, we are acknowledging that the user might want to throw away whatever values
    are in the page and start a new search. Thus, we would not want validations to
    occur when the user clicks the New Search button.


    We can tell the JSF implementation to process the event from the button click
    after the Apply Request Values phase (before the Process Validations phase) by
    adding an attribute named immediate to the <action> tag. So, for example, if we
    wanted the New Search button to bypass validations in a page, the tag would look
    like this:


    <h:commandButton value="New Search" action="#{flight.reset}"


    immediate="true"/>


    **Event Handling**


    There’s one final improvement we want to make to the Flight Search application.
    You may have noticed that when you select either Roundtrip or One Way as the trip
    type, no change is made to the display. In other words, when the user selects
    One Way, the search form still displays labels and fields for the return trip.
    In a real web application, the presentation would likely change in response to
    picking a one-way trip. There’s no sense in displaying fields for return trip
    date and time if the user doesn’t want a return ticket.


    There are many ways we could deal with this situation. However, since we still
    need to discuss event handling in a JSF application, we will deal with it by creating
    an event handler.


    There are two basic types of event handlers in JSF: value change listeners and
    action listeners.


    **Value Change Listeners**


    Value change listeners are attached to input elements such as text fields, radio
    buttons and check boxes, and menus. When you want your application to respond
    to a value change event, you attach a value change listener to the input element:


    <h:selectOneRadio layout="lineDirection"


    value="#{flight.tripType}"


    valueChangeListener="#{flight.typeChanged}"


    onclick="submit()"


    immediate="true">


    <f:selectItems value="#{flight.tripTypes}"/>


    </h:selectOneRadio>


    The preceding code snippet shows the <selectOneRadio> element from the searchForm.jsp
    page. As you can see, you use the valueChangeListener attribute with a method-binding
    expression to specify which method should be called when a value change event
    occurs. The FlightSearch class does not yet have a typeChanged() method; you will
    look at it later in this section. Additionally, input elements do not cause a
    form submission on their own, so you need to include an onclick event handler
    as well. Finally, because we do not want to validate inputs when the user changes
    flight types, the code uses the immediate attribute.


