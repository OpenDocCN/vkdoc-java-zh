    **对索引标签执行验证**


    Validator 也能够对索引标签执行验证。您只需在 `validation.xml` 中为您想要验证的字段添加一个 `[#]`。例如，如果您想配置 ResumeForm
    以要求第一个 SkillForm 的 name 字段，您可以在 `validation.xml` 文件中配置如下内容：


    <form name="resumeForm">


    ...


    <field property="skills[0]name"


    depends="required">


    <msg name="required"


    key="errors.required"/>


    <arg0 key="skillForm.name"/>


    </field>


    **使用内置的 Struts Actions**


    如果您已经构建了一个 Struts 应用程序，您可能会发现您开发了一些遵循 MVC 模式的 action，但实际上并不需要它们。或者您可能直接链接到 JSP
    页面，绕过了推荐的“每个链接都应通过控制器”的模型。我们知道我们以前就是这样做的——直到我们发现了 Struts 内置的 actions。我们现在把它们看作是一群热切的板凳球员，在说：“让我们上场吧，教练，我们保证会让您骄傲！”


    然而，您可能没有意识到它们的存在。因此，我们现在就来介绍这些状态良好的 actions，让您领略一下它们的潜力，甚至可能让它们上场参赛。


    Struts 有五个内置的 actions，前三个（ForwardAction、IncludeAction 和 SwitchAction）完全不需要编码。最后两个，DispatchAction
    和 LookupDispatchAction，旨在促进代码精简和重用。


    ForwardAction


    ForwardAction 可用于重定向到 JSP 页面，同时仍然利用控制器的内置功能——例如使用 `roles` 属性保护 actions。在将模型 1
