    **The <fmt:formatNumber> and <fmt:parseNumber> Actions** As mentioned earlier,
    there are many forms of data that are represented differently based on the time
    zone or locale. You’ve seen the JSTL actions to support date-and-time localization,
    so it should come as no real surprise that support is also provided for the formatting
    and parsing of numbers.


    The <fmt:formatNumber> action is also flexible and capable of formatting a numeric
    value in a locale-sensitive or custom format as a number, currency, or percentage.
    For example, the following action ensures that the given number has at least three
    decimal places:


    <fmt:formatNumber value="123.4" type="NUMBER" minFractionDigits="3" /> The result
    of this action will be to format the number 123.4 into the value 123.400\. To
    demonstrate the I18n capabilities of the <fmt:formatNumber> action, you can also
    automatically extract the correct currency symbol from the locale when working
    with monetary values:


    <%@page contentType="text/html;charset=ISO-8859-15" %>


    <c:set var="salary" value="125000" />


    <fmt:setLocale value="en_GB"/>


    <fmt:formatNumber type="CURRENCY" value="${salary}" /><BR>


    <fmt:setLocale value="fr_CH"/>


    <fmt:formatNumber type="CURRENCY" value="${salary}" /><BR>


    <fmt:setLocale value="fr_FR"/>


    <fmt:formatNumber type="CURRENCY" value="${salary}" /><BR>


    <fmt:setLocale value="it_IT"/>


    <fmt:formatNumber type="CURRENCY" value="${salary}" /> The previous example sets
    the local currency to be first English, then Swiss, then French, and finally Italian.
    It formats a currency in each case (notice the type="CURRENCY" attribute) with
    the value of 125000 in the current locale. The results of the formatting actions
    are as follows:


    • English locale = £125,000.00


    • Swish locale = SFr. 125''000.00


    • French locale = 125 000.00 €


    • Italian locale = € 125.000,00


    Notice how the change in locale and the usage of the page directive content-type
    attribute radically affects the way the value is interpreted. Depending on the
    locale, either the British pound, Swiss franc, or Euro symbol is displayed. In
    addition, notice the usage of various formatting styles for the digits themselves.


    As with the <fmt:parseDate> action, the <fmt:parseNumber> action is the reverse
    formatting tag, used to convert a formatted string representing either a number,
    currency, or percentage into an appropriate java.lang.Number.


