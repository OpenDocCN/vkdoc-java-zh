    **Using Value-Binding Expressions in JSP Pages**


    When using JSF custom actions in your JSP pages, the JSF implementation can set
    or get the value of JavaBean properties, based on the tag usage. For example,
    Listing 5-2 includes this tag:


    <h:inputText value="#{flight.origination}" size="35"/>


    ■**Tip** The syntax in the preceding example is sufficient for Java primitive
    and String values. However, if the property is some other data type, you will
    probably need to supply a converter as well. See the “Converting Data” section
    later in this chapter for details.


    This is also referred to as a **value-binding expression** because it binds the
    value of some bean property (using an EL statement in the form #{object.property})
    to an attribute or property of some JSF element. The expression to the left of
    the dot is some object accessible to the page, and the expression to the right
    of the dot is some property of the object. You can also chain expressions, like
    this:


    object1.object2.object3.property


    Each expression in the chain, reading from left to right, is evaluated as an object
    reference, and the final expression is a property of the last object.


    Another syntax you can use to write a value-binding expression uses brackets to
    denote the property. We refer to this syntax as **bracket notation**: flight["origination"]


    flight[''origination'']


    You would use the form with double quotes when using single quotes to delimit
    attribute values, and use single quotes when double quotes are used to delimit
    the attribute values. So, the preceding inputText element could be written in
    either of these ways:


    <h:inputText value="#{flight[''origination'']}" size="35"/>


    <h:inputText value=''#{flight["origination"]}'' size="35"/> When creating chained
    expressions, you can freely mix dot and bracket notation. In fact, as you will
    see shortly, when creating an expression to access a List or Map, mixed notation
    can be used to create dynamic expressions.


    Getting and Setting Bean Properties


    When the searchForm.jsp page is rendered, the JSP page implementation class calls
    the get method for the origination property of the FlightSearch class to get the
    value of the property.


    This value is then included in the rendering of the page. The JSP page class does
    this for all the properties that are referenced in the page. When the page is
    first loaded, the properties of the FlightSearch object have no values, so the
    page is rendered with empty text fields.


    During the processing of the request from searchForm.jsp, the values entered into
    the form are saved by the UI components that correspond to the UI widgets on the
    page. After


