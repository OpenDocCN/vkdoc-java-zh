    **Default Values and the Expression Language**


    Experience suggests that it’s most important to be able to provide as good a presentation
    as possible, even when there are simple errors in the page. To meet this requirement,
    the EL does not provide warnings, just “default values” and “errors.” Default
    values are type-correct values that are assigned to a subexpression when there
    is a problem, and errors are exceptions to be thrown (and then handled by the
    standard JSP error-handling process). An example of such a default value is ''infinity''.
    This value is assigned to an expression that results in a divide by zero. For
    example, the following piece of EL will display infinity rather than causing an
    error: ${2/0}


    The equivalent Java expression would throw an ArithmeticException.


    **Using the Expression Language**


    You can use the EL in the same places as you would have used a scriptlet, for
    example:


    • Within attribute values for JSP standard and custom tags


    • Within template text (that is, in the body of the page) Using the Expression
    Language Within Custom Tags


    Using the EL within the attributes of a custom tag in a JSP page allows you to
    dynamically specify the attribute values for a custom tag. This is an extremely
    powerful mechanism. The following code snippet shows how you might dynamically
    specify an attribute to a custom tag by using a scriptlet:


    <myTagLibrary:myTag counter="<%= 1+1 %>" /> To achieve this dynamic behavior prior
    to the JSP 2.0 specification, you had to use scriptlets. As we’ve discussed, scriptlets
    are untidy and cause all sorts of problems with readability and maintainability.
    By using an EL statement, you can dynamically provide the values to a custom tag’s
    attribute. If you were to repeat the previous tag example by using the EL, you
    would see that the code is much neater:


    <myTagLibrary:myTag counter="${1+1}" /> You can see that the value 1+1 is being
    passed to the custom tag as an attribute named counter. The details of the creation
    of custom tags are discussed at length in Chapters 6


    through 8.


    You’ll look at more advanced use of the language with JavaBeans, arithmetic, and
    comparisons later in this chapter.


