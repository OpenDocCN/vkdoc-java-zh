    The Controller Servlet


    The Controller servlet (FrontController.java in Listing 2-4) coordinates the behavior
    of our store.


    **Listing 2-4.** *FrontController.java*


    package com.apress.projsp.store;


    import java.io.*;


    import java.util.*;


    import javax.servlet.*;


    import javax.servlet.http.*;


    public class FrontController extends HttpServlet {


    public void init() throws ServletException {


    HashMap products = new HashMap();


    Product p = new Product(1, "Dog", "9.99"); products.put("1", p);


    p = new Product(2, "Cat", "4.99");


    products.put("2", p);


    p = new Product(3, "Fish", "1.99"); products.put("3", p);


    //Store products in the ServletContext


    getServletContext().setAttribute("products", products);


    }


    public void doPost(HttpServletRequest req, HttpServletResponse res) throws ServletException,
    IOException {


    // load the action


    String name = req.getPathInfo().substring(1);


    String viewName = "/error.jsp";


    try {


    name = "com.apress.projsp.store." + name;


    Class c = getClass().getClassLoader().loadClass(name);


    Action action = (Action) c.newInstance();


    viewName = action.process(req, res);


    } catch (ClassNotFoundException e) {


    e.printStackTrace();


