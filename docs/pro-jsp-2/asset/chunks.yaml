    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    **505**


    **Secure Sockets Layer Summary**


    Hopefully, this section has given you an idea of how you can control SSL for a
    specific servlet in your application. If you need to guarantee SSL for your entire
    application, we recommend setting the <transport-guarantee> element in the web.xml
    file to INTEGRAL or CONFIDENTIAL.


    This value is used to specify how data should be sent between the client and server.
    In the example application, this value is set as illustrated here:


    <user-data-constraint>


    <description>


    Encryption is not required for the application in general.


    </description>


    <transport-guarantee>NONE</transport-guarantee>


    </user-data-constraint>


    Table 12-2 shows how the Servlet specification defines each of these.


    **Table 12-2.** *Meaning of <transport-guarantee> Values* **Value**


    **Description**


    NONE


    The application doesn’t require any transport guarantee. This is the same as not
    including the <user-data-constraint> element in web.xml.


    INTEGRAL


    The application requires that the data sent between the client and server be sent
    in such a way that it can’t be changed in transit.


    CONFIDENTIAL


    The application requires that the data be transmitted in a fashion that prevents
    other entities from observing the contents of the transmission.


    Most servlet containers will switch the client to SSL when this value is set to
    INTEGRAL or CONFIDENTIAL. Although this switch is great for applications that
    require it, you have to be careful when implementing it. On most servlet containers,
    if you set this value to either INTEGRAL


    or CONFIDENTIAL, your application will be available *only* on the SSL port. The
    slick thing is that the server will automatically redirect you to https://serverName:443
    when you try to access your application. However, if you’re running your secure
    server on a port other than 443, you’ll get a Server Not Found error in Internet
    Explorer. This leads into our next trick: using a filter to inspect requests to
    your protected resources.


    Using a Filter on Protected Resources


    When you filter protected resources, it’s possible to use the same SSL switch
    to make your entire application secure on any port and also to retrieve a user’s
    information. After the user has authenticated with your application, you’ll probably
    want to get more information about that user. One limitation of container-managed
    security is that all you’ll know about a user is her username and what roles she
    belongs to. To solve this, we suggest using a filter that checks for a User object
    in the session and populates it if it’s null. To demonstrate this, you need to
    create a User object, a database access code, and a database to talk to.


