- fmt: '# JSP Application Characteristics and Best Practices


    ## JSP Application Characteristics


    - **JSP applications are distributed:** When deployed in a production environment,
    a `JSP` application can involve multiple distributed systems, including load-balancing
    routers, web servers, application servers, databases, and other back-end systems.


    - **JSP applications include a mixture of different programming languages:** `JSP`
    applications can include `HTML`, `JavaScript`, `Java` code, `SQL`, `XML`, and
    other programming and markup languages. When you read a `JSP` page, it’s often
    difficult to follow which parts of the page are executed on the server and which
    are executed on the client.


    - **JSP applications run in a multithreaded environment:** `JSP` applications
    need to be thread-safe to achieve the best performance. Threading is a complex
    and confusing topic for many programmers, and threading problems can be difficult
    to debug.


    - **JSP applications include many components:** A `JSP` application’s technology
    stack typically includes a servlet engine, a `JSP` compiler, an `MVC` framework,
    a persistence framework, a `JDBC` driver, a database, and other back-end systems.


    Learning how to solve problems in complex, distributed, and multithreaded programs
    takes time and often requires a lot of deep thought, so be prepared to think.
    If a particularly difficult problem arises, get some sleep and then think some
    more. Explain the problem to another, more experienced programmer. If no one is
    available, explain it to that plastic dinosaur sitting on top of your monitor.
    Often, simply explaining a problem in detail can spark the thought that leads
    to a solution.


    If you can figure out how to explain your problem in simple terms, or you can
    isolate the problem in a simple code example, you might be able to get some help
    from a newsgroup, mailing list, or other online forum. Before you post a message
    to one of these forums, you should read the previous postings in the forum archive
    to see whether your problem or question has been asked before. Using a search
    engine such as Google may also be helpful for some problems.


    ## Logging


    Logging is a best practice for any `JSP` application and is supported by the `Servlet
    API`, application servers, and a wide variety of logging tools. There are many
    ways to perform logging, from using simple `System.out.println()` statements to
    using a full-featured logging `API`.


    ### Logging with the Servlet API


    The `Servlet API` includes logging methods in the `javax.servlet.ServletContext`
    interface. The `ServletContext` interface’s `log()` methods make it easy to write
    log messages and exception stack traces to your application server’s logging system.
    The advantages of using the `Servlet API`’s built-in logging methods are as follows:


    - Log messages are automatically prefixed with a timestamp string and written
    to log files. This means that you can access them after they scroll off the console
    and after the server is shut down.

    - The application server manages log files and ensures that they never grow too
    big and consume all the disk space.

    - Application servers generally provide an administration program so that you
    can easily view and search log files even if they’re written to multiple remote
    servers.


    All of this sounds good but, in fact, the `Servlet API` provides only minimal
    support for logging. You can log a string message and you can log an exception.
    However, if you want to enable and disable logging, you need to add configuration
    properties and implement the conditional logic by adding a parameter to the `web.xml`
    file, for example. However, implementing your own ad hoc logging as shown previously
    isn’t the best approach. There are many advantages to be had from instead using
    a full-featured logging system such as `log4j` or the `Java logging API`.


    ### Full-Featured Logging Systems


    A full-featured logging system, such as the open-source `log4j` framework (`http://logging.apache.org/log4j/docs/`),
    offers several advantages over using `System.out.println()` calls or using the
    logging methods in the `Servlet API`:


    - **Control over logging levels:** You can log messages at different severity
    levels. For example, `log4j` supports log levels of `DEBUG`, `INFO`, `WARN`, `ERROR`,
    and `FATAL` (listed in order of increasing severity). When you set a log level,
    the system will output messages for that log level and for all log levels above
    that. So, for example, the `INFO`-level logging will include messages at the `INFO`,
    `WARN`, `ERROR`, and `FATAL` levels. By simply changing a configuration parameter
    in the `log4j` properties file, you can enable `DEBUG`-level logging to help you
    debug a problem. When you’ve found and fixed the problem, you can set the log
    level back to `ERROR` so that only `ERROR` and `FATAL` log messages are recorded
    in the logs.

    - **Multiple loggers:** You can use different logical loggers in different parts
    of your application. For example, you might use one logger named `com.mydomain.ui`
    in the presentation tier and another logger named `com.mydomain.db` in the data-access
    tier. This allows you to control the log level in only the part of the application
    that’s experiencing a bug.

    - **Multiple log destinations:** You can configure logging systems to send log
    messages to files, operating system logs, databases, message queues, remote systems
    via `TCP/IP`, and other destinations. This can be helpful in production in which
    an application may be running in a heterogeneous and distributed environment.

    - **Better management of log files:** Log files can grow to large sizes very quickly,
    especially when `DEBUG`-level logging is enabled. You can configure a logging
    system to start a new log when the current log file grows too large. You can configure
    the logging system to delete or archive old log files so that your disk space
    isn’t consumed.

    - **Control over log formatting:** You can configure the format of the log messages
    produced by the logging system to suit specific needs.


    Java now includes its own logging `API` under the `java.util.logging` package.
    This new logging `API` is a welcome addition to Java and is similar to the `log4j`
    `API` in many ways, but it isn’t as powerful and flexible as `log4j`. For example,
    `log4j` can direct log messages to Unix system logs, the Microsoft Windows event
    log, Java Message Service (`JMS`) message queues, and e-mail. The Java logging
    `API` can log only to the console, files, and sockets. As in many aspects of development,
    people become attached to their favorite logging framework and this is often a
    problem when deciding which one to use. Also, there are some technical reasons
    for choosing one over another. Perhaps you need the functionality available in
    a specific `API`, or perhaps your `Java EE` server ships with `log4j`. Either
    way, to ensure that you retain the ability to freely switch between the two, `Jakarta
    Commons Logging` provides a solution.


    ### Jakarta Commons Logging


    `Jakarta Commons Logging` (`JCL`, at `http://jakarta.apache.org/commons/logging/`)
    is a thin wrapper around both `log4j` and `J2SE 1.4` logging, with the sole purpose
    of providing a common interface between the two. With the `Commons Logging` `JAR`
    file in your `CLASSPATH`, the framework will automatically locate either of the
    two logging frameworks and use whichever one it finds in your `CLASSPATH`. It
    will first look for `log4j` and, if it doesn’t find `log4j`, it will check whether
    `J2SE 1.4` logging is available. This is a simple trick, but it really works well.
    If you need to use `log4j` in your application, just make sure it’s in the `CLASSPATH`.


    Regardless of which logging framework you use, actually using `JCL` is easy, as
    demonstrated by the following code snippet:


    ```

    Log log = LogFactory.getLog(MyClass.class);

    ```


    Following this, and with the `log` initialized, you can write messages at the
    various levels with the following method calls:'
