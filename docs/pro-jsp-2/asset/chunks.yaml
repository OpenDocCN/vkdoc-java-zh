    when you really do need to have a scripting variable declared in the page. However,
    as you’ve seen in previous chapters, it’s much better to use a simple EL expression
    and not introduce scripting variables into the page. After all, allowing people
    to use Java code in one page tends to encourage them to use it elsewhere, and
    before you know it you have a mass of unmaintainable Java code sitting inside
    your JSP pages.


    ■**Tip** We recommend you use the JSP EL when you can or, failing that, the JSTL
    with its expression language.


    **Cooperating Tags**


    Until now, the examples we’ve presented have all been tags that work on their
    own to achieve a specific goal. However, custom tags don’t have to work in isolation—they
    can cooperate with one another, either by sharing information or by directly accessing
    methods/fields on other tag handlers that are being used on the page. These are
    useful techniques and, as you’ll see, they allow you to make your tags more generic
    and therefore more reusable.


    **Cooperating by Sharing Information**


    The most common way that custom tags cooperate is by sharing information, which
    is typically implemented by using one of the available scopes (request, page,
    session, or application) as a shared resource in which information can be placed
    and retrieved later. There are generally two ways that this can happen.


    In the first method, a tag places an object in one of the available scopes, and
    then the name of that object is passed to another tag as an attribute. A good
    example of this in practice


