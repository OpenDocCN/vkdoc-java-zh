    In this version of the front controller, you’re simply using a helper class to
    find which Action implementation should be used to service this particular request.
    How does the controller know which action to use? Well, there are various ways
    to communicate the name of the action to the controller. These range from using
    a named parameter within the query string to encoding the name of the action inside
    specially mapped URLs. One such example might be as follows:


    http://www.mycompany.com/controller/ViewCustomer?id=123456


    The key benefit of using the command and controller strategy is that it allows
    you to maintain a central place for accepting requests, while keeping the logic
    to actually service an individual request separate from that needed to service
    other types of requests.


    View Components


    Before we move on to other patterns, we need to spend a little time discussing
    **View Components** within Java EE patterns. With the controller responsible for
    the business logic related to servicing a request, you may be asking how to implement
    the view components. In the simplest case, the views are implemented as JSP pages
    that are forwarded by the controller component. The job of the controller (or
    an action class if you’re using that strategy) is to perform any processing and
    set up the environment for the view to present the information. In Chapter 9,
    you saw that it’s quite possible for JSP pages to contain database code so that
    they can find the data they’re supposed to display. However, the MVC architecture
    turns this on its head because it’s now the responsibility of the controller to
    find that data. As you saw in the previous sample action implementation, it’s
    possible to use the request object to store information that’s required for the
    lifetime of the current request: request.setAttribute("customer", customer);


    Here, you’re just placing a Customer instance into the map of objects maintained
    by the request. When it comes to presenting the information from the view, you
    can use the JSP EL to locate that Customer instance and display it. For example,
    you can use the following expression to display the name of the customer (assuming
    that a method called getName() exists): ${customer.name}


    This separation of business and presentation logic gives you the ability to easily
    change one or the other independently if necessary. Should you need to change
    the way that the customer is presented to the user, this is no problem. You can
    just modify the JSP page without danger of breaking the existing business logic
    of locating that customer.


    **View Helper**


    Although the front controller is responsible (possibly through delegation to commands)
    for executing the business logic required to service a given request, there is
    still often logic that is related to only the presentation of that information.
    View components such as JSP pages are great at displaying information, but sometimes
    some more code is needed. Perhaps a list of objects needs to be sorted prior to
    being displayed, or perhaps the information needs to be


