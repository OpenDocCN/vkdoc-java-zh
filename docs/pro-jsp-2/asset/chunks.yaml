    definitions file, so this was a simple solution. If you’re using JSP 2.1, you
    can replace the <c:out value="${variable}"/> with ${variable}. You can also replace
    the <link> tag for the stylesheet with the more modern method of importing stylesheets,
    using @import. Using this syntax, the stylesheet import would look as follows:


    <style type="text/css" media="all">


    <c:forEach var="css" items="${styleList}">


