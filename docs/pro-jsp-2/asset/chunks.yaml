    use almost any Java-based persistence framework with Struts. It’s all Java after
    all. It’s tough to choose a framework when none has proved to be a dominant, well-used
    framework. This is an advantage of Struts in that it allows you to choose any
    framework—but we’re guessing this is a big headache for many developers as well.


    However, choosing a persistence framework for a Struts application can be easy
    if you stick to the technologies you know. If you’re going to choose an open-source
    implementation, make


