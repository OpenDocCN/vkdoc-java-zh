    Advanced Filtering Techniques


    **I**n the previous chapter, we discussed Servlet filtering. Filtering offers
    the ability to intercept and process requests and responses before and after processing
    by the underlying resource.


    Filters can add great value to many Java EE web applications by transforming the
    behavior of existing servlets, JSP pages, or even static pages.


    Chaining multiple filters together combines their transformations, offering the
    application developer or deployer great flexibility when configuring the final
    behavior of a web application.


