    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    A few days after the JSTL 1.0 specification was released, the Jakarta Taglibs
    project from Apache followed up with a reference implementation of the specification
    ready for use.


    The first maintenance release of JSTL (JSTL 1.1) was completed in November 2003\.
    A second maintenance release, JSTL 1.2, was started in June 2004\. Because that
    release has not been finalized, we will be using JSTL 1.1 in this chapter. Because
    JSTL is a maintenance release, most or all of the topics here should still apply
    when JSTL 1.2 is released.


    Throughout this chapter, you’ll take an in-depth look at the actions provided
    by the JSTL.


    You’ll see how actions may be used via examples that will demonstrate just how
    much simpler it is to build dynamic JSP-based applications with JSTL that avoid
    many of the problems associated with scriptlets.


    To fully appreciate the actions provided by the JSTL, you should be familiar with
    the syntax of the new expression language (EL)—the subject of the preceding chapter.


    **Installing the JavaServer Pages Standard**


    **Tag Library**


    Before you delve too deeply into the details of the tags that compose the JSTL,
    it’s a good idea to understand what’s involved with installing the JSTL into a
    JSP container that’s ready for use.


    Fortunately, the process isn’t too demanding and should take only a few minutes.


    To be able to use the JSTL, you must have the following:


    • At least a Servlet 2.3– and JSP 1.2–compliant container


    • An implementation of the JSTL specification


    Although Servlet 2.3 and JSP 1.2 are the minimum, we will be using Tomcat 5.5,
    which implements Servlet 2.4 and JSP 2.1, and we will use the JSTL 1.1 reference
    implementation.


    Any compliant container can be used to develop applications using the JSTL. If
    you’re using an alternative container, consult the appropriate documentation for
    installation instructions.


    Note that the JSTL installation on other containers may be similar, so it’s worth
    reading on!


    Originally, the reference implementation (RI) of the JSTL was provided by the
    Apache Jakarta project as part of its Taglibs project. Subsequently, Sun Microsystems
    included the RI as part of the Java Web Services Developer Pack (JWSDP). So you
