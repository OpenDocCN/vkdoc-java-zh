    ## The response Object


    The `response` object is an instance of a class that implements the `javax.servlet.http.HttpServletResponse`
    interface. It represents the response to be made to the client and makes the following
    methods available:


    `public void addCookie(Cookie cookie)`


    `addCookie()` adds the specified cookie to the response. It can be called multiple
    times to set more than one cookie.


    `public void addDateHeader(String name, long date)`


    `addDateHeader()` adds a response header containing the specified header name
    and the number of milliseconds since midnight January 1, 1970, GMT. This method
    can be used to assign multiple values to a given header name.


    `public void addHeader(String name, String value)`


    `addHeader()` adds a response header with the specified name and value. This method
    can be used to assign multiple values to a given header name.


    `public void addIntHeader(String name, int value)`


    `addIntHeader()` adds a response header with the specified name and `int` value.
    This method can be used to assign multiple values to a given header name.


    `public boolean containsHeader(String name)`


    `containsHeader()` returns `true` if the response header includes the specified
    header name. This method can be used before calling one of the `set()` methods
    to determine whether the header value has already been set.


    `public String encodeRedirectURL(String url)`


    `encodeRedirectURL()` encodes the specified URL with session tracking data or
    returns it unchanged if encoding isn’t required. This method is used to process
    a URL before sending it to the `sendRedirect()` method.


    `public String encodeURL(String url)`


    `encodeURL()` encodes the specified URL by including the session ID or returns
    it unchanged if encoding isn’t needed. All URLs generated by a servlet should
    be processed through this method to ensure compatibility with browsers that don’t
    support cookies.


    `public void flushBuffer() throws java.io.IOException`


    `flushBuffer()` causes any content stored in the buffer to be written to the client.
    Calling this method will also commit the response, meaning that the status code
    and headers will be written.


    `public int getBufferSize()`


    `getBufferSize()` returns the buffer size used for the response or `0` if no buffering
    is used.


    `public String getCharacterEncoding()`


    `getCharacterEncoding()` returns a `String` object containing the character encoding
    used in the body of the response. The default is `"ISO-8859-1"`, which corresponds
    to Latin-1.


    `public String getContentType()`


    `getContentType()` returns the content type used for the MIME body sent in this
    response.


    `public java.util.Locale getLocale()`


    `getLocale()` returns the locale that has been assigned to the response. By default,
    this will be the default locale for the server.


    `public ServletOutputStream getOutputStream() throws java.io.IOException`


    `getOutputStream()` returns a `ServletOutputStream` object that can be used to
    write the response as binary data.


    `public java.io.PrintWriter getWriter() throws java.io.IOException`


    `getWriter()` returns a `PrintWriter` object that can be used to write the response
    as character data.


    `public boolean isCommitted()`


    `isCommitted()` returns `true` if the response has been committed, meaning that
    the status code and headers have been written.


    `public void reset()`


    `reset()` clears the status code and headers and any data that exists in the buffer.
    If the response has already been committed, calling this method will cause an
    exception to be thrown.


    `public void resetBuffer()`


    `resetBuffer()` clears the content of the response buffer without clearing the
    headers or status code. It will throw an `IllegalStateException` if the response
    has been committed.


    `public void sendError(int sc, String msg) throws java.io.IOException`


    `public void sendError(int sc) throws java.io.IOException`


    `sendError()` sends an error response back to the client machine using the specified
    error status code. A descriptive message can also be provided. This method must
    be called before the response is committed (in other words, before the status
    code and headers have been written).


    `public void sendRedirect(String location) throws java.io.IOException`


    `sendRedirect()` redirects the client machine to the URL specified by the `location`
