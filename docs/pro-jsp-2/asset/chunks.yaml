    **A Simple Servlet**


    In this section, you’ll look at an example of a simple generic servlet. This servlet
    will extend the class GenericServlet that provides a basic implementation of the
    Servlet interface. You’ll implement the service() method of this class in our
    subclass, which will do the work of our servlet. You’ll also override the init()
    and destroy() methods of the GenericServlet abstract base class. The code for
    our servlet is shown in Listing 2-1 (written as a standard .java file).


    **Listing 2-1.** *MyServlet.java*


    package com.apress.projsp;


    import java.io.*;


    import java.util.Date;


    import javax.servlet.*;


    public class MyServlet extends GenericServlet {


    public void init(ServletConfig config) throws ServletException {


    super.init(config);


    log("MyServlet initialized at:" + new Date());


    }


    public void service(ServletRequest request, ServletResponse response) throws ServletException,
    IOException {


    response.setContentType("text/html");


    PrintWriter out = response.getWriter();


    out.println("<html><head><title>BasicServlet</title></head>"); out.println("<body><h2>"
    + getServletName() + "</h2>"); out.println("This is a basic servlet.<br>"); out.println("<hr></body></html>");
    out.close();


    }


    public void destroy() {


    log("MyServlet was destroyed at:" + new Date());


    }


    }


    This servlet performs a very simple job: it outputs a string of HTML. When the
    servlet is initialized, it will print a message to the servlet log. This is achieved
    via the log() method of the GenericServlet base class as follows:


    log("MyServlet initialized at:" + thisDate);


