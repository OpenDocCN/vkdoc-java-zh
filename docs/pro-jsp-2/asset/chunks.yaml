    **Nesting Functions**


    Another powerful use of functions is to nest them together. For example, you can
    use the uppercase function from the previous example (Listings 3-22 and 3-25)
    to render the source of a page produced by our view-source function in uppercase.
    Listing 3-26, uppersource.jsp, shows how you might do this.


