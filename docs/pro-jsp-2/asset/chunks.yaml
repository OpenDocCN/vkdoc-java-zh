    Tag Files and Simple Tags


    **P**rior to this chapter, we showed how to write JSP pages by using several mechanisms
    that allow dynamic content to be created.


    First, we presented scriptlets in the page, which provide an easy way to get started
    with JSP, particularly because they allow existing Java code to be easily migrated
    into a JSP-based environment. We also showed how JavaBeans could be integrated
    with JSP, making it easier to maintain and manipulate information residing within
    these reusable components. Chapter 3


    covered the JSP expression language (EL), which provides a way to create dynamic
    content through scripting expressions.


    In Chapter 4, we presented the JSP Standard Tag Library (JSTL), which contains
    useful, prebuilt tags that achieve tasks such as iterating over collections. In
    addition to helping you perform these common tasks easily, the tags contained
    within the JSTL are extremely valuable for improving the readability and maintainability
    of the page. In Chapter 5, we showed how to create dynamic user interfaces with
    JavaServer Faces (JSF). The JSF reference implementation includes a set of custom
    tags that encapsulate the JSF API and make it available to use within JSP pages.


    JSP also provides the capability for you to encapsulate reusable functionality
    into your own custom tags. Custom tags, also known as tag extensions, were first
    introduced in JSP 1.1


    and carried forward into JSP 1.2\. These custom tags are known as classic tags.
    Classic tags get their behavior from a Java class known as a tag handler. When
    a JSP page is translated, the custom tag in the page is translated into a call
    to the tag handler class.


    JSP 2.0 introduced two major additions to the tag extension mechanism: tag files
    and simple tags. Tag files are custom tags written entirely as JSP pages. Simple
    tags are similar to classic tags because they get their behavior from a tag handler
    class. However, as you will see when you get to Chapter 7, simple tags are simpler
    to implement.


    This chapter covers tag files and simple tags. You’ll also look at the differences
    between tag files, simple tags, and classic tags. Specifically you’ll be looking
    at the following:


    • What custom tags are and why they are useful


    • Tag terminology


    • The differences between simple tags and classic tags


    • How to create and use tag files


    • How to create and use simple tags


    **251**


    513-0 ch06.qxd 11/17/05 8:41 PM Page 252


    **252**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    In Chapter 7, we will cover the topic of classic tags. Then in Chapter 8, we will
    finish the discussion of custom tags by looking at some advanced topics, such
    as writing cooperating tags, validating tag usage, and deploying tag libraries.


    **Understanding JSP Custom Tags**


    Custom tags, also known as JSP tag extensions (because they extend the set of
    built-in JSP


    tags), provide a way of encapsulating reusable functionality on JSP pages. One
    of the major drawbacks of scripting environments such as JSP is that it’s easy
    to quickly put together an application without thinking about how it will be maintained
    and grown in the future. For example, the ability to generate dynamic content
    by using Java code embedded in the page is a very powerful feature of the JSP
    specification. Custom tags allow such functionality to be encapsulated into reusable
    components. As you’ve already seen with the JSTL, custom tags provide a great
    way for the logic behind common and recurring tasks to be wrapped up in an easy-to-use
    package. However, one question still remains: why should you go to all the trouble
    and effort of building custom tags when you can simply write code inside the JSP
    pages?


    In this section, you’ll learn why and how custom tags are used. You’ll also learn
    about the differences between JavaBeans and custom tags, and the differences between
    simple and classic tags.


    **The Need for Custom Tags**


    Among the best practices that have been established around JSP, one of the most
    important suggests that there should be as little Java code embedded inside a
    JSP page as possible. Experience has shown us that three key factors benefit from
    this practice:


    • Reusability


    • Readability


    • Maintainability


    We covered these in detail in Chapter 1, so we’ll just review them here.


    Reusability


    Reuse is a common goal associated with any programming language. Because you can
    embed Java code inside JSP pages, you may be tempted to reuse code on a source-code
    level between JSP pages. This kind of reuse brings with it a dramatic decrease
    in maintainability as changes and bugs slowly creep in and around the system.
    Ideally, you’re looking for reusability at the class or component level.


    The way that JSP allows you to reuse code is through custom tags and tag libraries.
    A **tag** **library** is simply a collection of one or more custom tags. A tag
    library can be reused on a single page, on several pages in an application, or
    across different applications. Obviously, the best option is to reuse tag libraries
    across applications.


    513-0 ch06.qxd 11/17/05 8:41 PM Page 253


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **253**


    Readability


    Custom tags improve readability by encapsulating Java code away from the page.
    As you may have noticed while developing JSP pages, the more you intermix scriptlets
    with template text, the harder it is to read the page. Encapsulating the Java
    code in a custom tag removes this code from the page, making the page cleaner,
    shorter, and more readable. Choosing appropriate names for your custom tags can
    also make a page easier for page designers to read.


    Maintainability


    An important concept in maintainability is removing duplication from your code.
    If you have 50 copies of the same method scattered throughout a Java application,
    you have 50 places to make corrections when an error is found. If, however, you
    extract that method and have 50 calls to that one method, the bug needs to be
    fixed in only one place. The same is true of JSP pages.


    If you can encapsulate some bit of functionality in a custom tag, changes or fixes
    to that functionality are made only to the custom tag, and then every JSP page
    that uses the tag automatically gets the fix.


    There are several signs that help identify whether a system will be easy or difficult
    to maintain. Good use of custom tags is one of those signs for a JSP application.


    **Tag Terminology and Concepts**


    Now that you know why using custom tags is a good idea, let’s quickly look at
    some of key tag concepts and the principles behind how tags work.


    Tags and Tag Libraries


    A tag library (commonly known as a taglib) is a collection of individual **custom
    tags** that are typically related to each other. For example, the JSTL Core tag
    library contains all of those tags that help you solve some of the common problems
    that you encounter when building JSP


    pages, such as iterating over collections and performing simple conditional logic
    on the page.


    Another example, again from JSTL, is the Internationalization and Formatting tag
    library that contains tags related to the formatting of information on the page.
    As you’ll see throughout this chapter, and as you’ve already seen in preceding
    chapters, there are several ways that tags can be built and deployed.


    Importing and Using Tags


    A defined and deployed tag library must be made available to a JSP page if it’s
    to be used. As you saw when using the JSTL and JSF tag libraries, this is done
    by importing the tag library through the JSP taglib directive, and by giving that
    tag library a namespace (or prefix) on the page to differentiate it from other
    tag libraries—in the same way that you place classes inside packages. After the
    tag library has been imported, the tags within that library can be used with XML
    syntax. For example, if the tag library contained a tag called copyright, you
    simply use the tag as follows:


    <tags:copyright></tags:copyright>


    513-0 ch06.qxd 11/17/05 8:41 PM Page 254


    **254**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    Here, you simply use the tag as an XML tag on the page, with the start and end
    tags being explicitly stated. In this example, there is no content between the
    start and end tags, although this is possible, too, and is written as follows:


    <tags:copyright>2005</tags:copyright>


    Alternatively, if an XML tag has nothing between its start and end tags, that
    tag can be used in its shortened format as follows:


    <tags:copyright/>


    Semantically, this shortened usage is identical to using the tag in its longer,
    more verbose syntax.


    Body Content


    Body content is defined as anything that falls between the start and end tags.
    When first introduced, three types of body content were defined: empty, tagdependent,
    and JSP. JSP 2.1


    supports the same three categories of body content, and an additional category
    named scriptless (introduced in JSP 2.0). Table 6-1 defines the four categories.
    As you’ll see later in this chapter, these options enable you to define the type
    of content that you’ll permit within your tags.


    **Table 6-1.** *Valid Body-Content Values for Tag Extensions* **Category**


    **Definition**


    empty


    As you’ve seen, a tag has empty body content when there is nothing between the
    start and end tags. If start and end tags are used (as opposed to shortened format)
    then nothing at all, not even whitespace, can appear between the tags when the
    body content is empty.


    JSP


    JSP body content is defined as anything that can usually appear within JSP pages.
    This includes content such as HTML, Java scriptlets, other custom tags, and so
    on:


    <prefix:myTag>Here is some <b>HTML content</b></prefix:myTag> scriptless


    This body content is effectively the same as JSP body content with the restriction
    that it cannot contain any Java code wrapped up as scriptlets. As you’ve seen,
    moving Java code off the page and into reusable components is one of the best
    practices associated with JSP


    development, and using a body content of scriptless provides a way to enforce
    this. At translation time, the JSP container looks at the body content and will
    throw a fatal translation error if scriptlets are found.


    For new developments, a body content type of scriptless is recommended over JSP.


    tagdependent


    With tagdependent body content, the custom tag has complete control over how its
    body content is included or evaluated in the page.


    Essentially, the body content is treated as plain text, meaning that JSP


    constructs and expressions simply aren’t evaluated. Although seemingly useless
    at first glance, there are a few good uses of this type of body content, including,
    for example, a tag that interprets its body content as another language. A custom
    tag could be written and used as a container for another language such as ColdFusion
    or another scripting language. The tag could then take its body content and pass
    it on to a parser that would execute the code.


    513-0 ch06.qxd 11/17/05 8:41 PM Page 255


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **255**


    Attributes


    The final key concept related to how custom tags are used on the page is that
    of attributes.


    As you’ll see later in the chapter, custom tags can be customized through the
    use of attributes in the same way that methods can be customized through the use
    of parameters. If you are familiar with HTML or XML tags, you will immediately
    recognize that custom tag attributes are the same concept as HTML or XML tag attributes.
    Attributes are written as name=value pairs within the tag itself, as shown here:


    <prefix:myTag attributeName="attribute value"/> In this example, the tag has a
    single attribute called attributeName, with a value of attribute value. A tag
    may have one or more attributes, and as you’ll see later, you have full control
    over some of the attribute characteristics such as the type and whether it’s required.


    **JavaBeans vs. Custom Tags**


    Now that you understand the purpose of custom tags and how they are used, you
    need to know when to use tags as opposed to JavaBeans for wrapping up reusable
    functionality. After all, JavaBeans are reusable components and the JSP specification
    provides a built-in mechanism for integrating and utilizing the features provided
    by JavaBeans. Although both technologies can be used to achieve the same goal,
    that of encapsulating and abstracting data away from the JSP page, there are significant
    differences between the two.


    JavaBeans are good general-purpose objects that encapsulate state in a portable
    “bucket.”


    We will continue to use these in our examples because they make great business
    objects.


    Tags are a web-specific technology. Tags are primarily for generating presentation
    elements, and as such they primarily encapsulate behavior. In addition, custom
    tags are aware of the environment in which they are running. For example, custom
    tags have access to the same implicit objects as the ones available when developing
    JSP pages: pageContext, request, response, session, and so on. JavaBeans, however,
    are components that can be reused within any Java environment; hence, they don’t
    know about such JSP specifics. Therefore, custom tags are a much better choice
    for encapsulating reusable functionality that will be used on JSP pages. You’ll
    look more closely at this in the discussion of custom tag best practices in Chapter
    8, but for the moment, keep in mind the following rules:


    • Use JavaBeans for representing and storing information and state. An example
    is building JavaBeans to represent the business objects in your application.


    • Use custom tags to represent and implement actions that occur on those JavaBeans,
    as well as logic related to the presentation of information. An example from JSTL
    is iterating over a collection of objects or conditional logic.


    **Differences Between Simple and Classic Tags**


    From a tag developer’s perspective, there are several important differences between
    simple and classic tags.


    To build classic tags, you write the functionality provided by the custom tag
    as a Java class that implements the javax.servlet.jsp.tagext.Tag interface. This
    class containing the functionality provided by the tag is called the tag handler.
    One of the biggest problems with building


    513-0 ch06.qxd 11/17/05 8:41 PM Page 256


    **256**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    tags in this way is that the Tag interface, the tag life cycle, and the semantics
    of its usage in the container are rather complex.


    Through feedback and the Java Community Process (JCP, http://www.jcp.org), two
    new ways for building custom tags have been introduced: **tag files** and **simple
    tags**. Both are the subject of this chapter and as you’ll see shortly, tag files
    and simple tags allow the functionality of custom tags to be implemented by using
    JSP fragments and Java code, respectively. Although they use different paradigms,
    they both greatly simplify the way in which custom tags can be built and have
    changed the way that JSP-based web applications are built.


    Other changes to custom tags introduced in JSP 2.0 include the ability of a custom
    tag to take any number of undefined (dynamic) attributes, and the ability to use
    the JSP EL with custom tags. Although these changes were introduced in JSP 2.0,
    both changes affect classic tags and simple tags. We’ll see examples using EL
    statements in the examples in this chapter. We will look at dynamic attributes
    in Chapter 7.


    **Using Tag Files**


    Tag files provide a very simple way for content and functionality to be abstracted
    away from JSP pages and into reusable components. So, what is a tag file?


    In short, a tag file is simply a JSP fragment containing some content or JSP code
    that you would like to use over and over again. This fragment is accessed by using
    a custom tag. In the past, you’ve typically achieved the same thing by taking
    JSP code out of a JSP page, placing it in a separate JSP file, and including it
    wherever necessary. So why do you need tag files? Let’s answer this question with
    an example showing how you can reuse content between JSP pages.


    **Reusing Content**


    On many websites, small pieces of content are abstracted away from the main pages
    and into smaller JSP pages that are included wherever necessary. Typical examples
    include header pages that contain references to cascading style sheets (CSS) and
    common JavaScript functions, or alternatively, footer pages that may include a
    brief copyright and usage notice about the website. We’ll recap how this is done
    with the JSP include directive, and then we’ll look at how to accomplish the same
    result with tag files.


    Reusing Content with Included JSP Files


    If you take an example where footer information is abstracted away from the main
    page, the following sample could be placed into a separate JSP file: Copyright
    2005, Apress


    As you can see, there isn’t a great deal of content within this JSP file. Although
    it seems trivial, the copyright text is a good example of the kind of information
    that you would want to abstract out of a JSP page. It is common to most or all
    of the pages in a website. Abstracting common information into reusable custom
    tags increases the maintainability of the web application. If you need to add
    to or change the copyright notice, moving it into a separate file means that you
    have to change the content in only a single place.


    513-0 ch06.qxd 11/17/05 8:41 PM Page 257


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **257**


    There are a couple of ways to include such pages, although with static content
    the include directive is generally used:


    <%@ include file="copyright.jsp" %>


    At translation time, the text contained within the referenced file simply gets
    inlined into the resulting JSP page. This is a common technique for including
    static content, so why do you need tag files and how can you reuse content with
    them?


    Reusing Content with Tag Files


    One of the real problems with including files is that with many include directives
    on the page, the content of each included file can sometimes be cryptic. The content
    of copyright.jsp may seem clear, but other included files may not be as obvious.
    In addition, there is no standard method for distributing included files for reuse
    in other web applications. Tag files can help address both of these drawbacks.


    **Defining Content in a Tag File**


    Building a tag file is almost the same as building the included JSP file—you simply
    copy out the content that you would like to reuse and place it in a file ending
    with a .tag extension, as shown in Listing 6-1.


    **Listing 6-1.** *copyright.tag*


    Copyright 2005, Apress


    As this example shows, there is, in fact, no difference between the content of
    this tag file and the content of the included JSP page. There is a minor difference
    in the name of the file.


    The key difference is in how tag files are deployed and used.


    To promote the use of custom tags to page authors and people who might not understand
    the Java programming side of JSP, the expert group behind JSP provided a very
    simple approach to defining tag files. Through a convention defined in the specification,
    tag files should be saved with a .tag file extension in a directory called tags
    (or a subdirectory of this) underneath the WEB-INF directory of your web application.


    **Using the Tag File**


    Tag files are used from within a JSP page as a custom tag in the same way that
    you’ve seen the custom tags in the JSTL used. Before using tag files on the page,
    you have to indicate that the tag file is a tag and import the tag library containing
    that tag.


    For this example, let’s say that the tag file that we just defined is saved in
    our web application as WEB-INF\tags\copyright.tag along with any other tag files
    that may be defined in that directory. Because the individual tags are being placed
    within the tags directory, it could be said that the tags directory represents
    a collection of tags, or a tag library. For this reason, and to use the tags,
    you can import the tag library that corresponds to this directory by using a taglib
    directive. Listing 6-2 shows a JSP page that uses the tag file in Listing 6-1.


    ![Image 66](index-291_1.png)


    513-0 ch06.qxd 11/17/05 8:41 PM Page 258


    **258**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **Listing 6-2.** *tagfile.jsp*


    <%@ taglib prefix="tags" tagdir="/WEB-INF/tags" %>


    <tags:copyright/>


    Behind the scenes, the container looks for all files that have a .tag extension
    in the directory specified by the tagdir attribute and makes them available to
    the page as custom tags with the specified prefix. The mechanics behind how each
    tag file is made available as a custom tag is up to the container, but the convention
    is that the name of the file is used as the name of the tag. For example, the
    copyright.tag file will become known as a custom tag called copyright. The process
    of importing the tag library by using the taglib directive makes the tag files
    within that directory available to use on the page, meaning that the <copyright>
    tag can be used just like standard actions or JSTL tags.


    As this example shows, the <copyright> tag is used in the same way as any other
    tag—by specifying the prefix and the name of the tag. Compared to the original
    included JSP file, the actual usage of this tag isn’t all that different. What
    is important here is that we now have a standard way to reuse this content. In
    addition, as you’ll see in Chapter 8, using tag files provides a standard way
    to deploy and distribute the tag file to other project members, project teams,
    and organizations.


    This, of course, is just a simple example to introduce the concept of tag files.
    To really appreciate the power and flexibility that they can provide page authors,
    let’s look at a more complicated example that uses templating—again, it’s something
    that often crops up in real-world projects.


    **Customizing Templates by Using Attributes**


    Many e-commerce websites have blocks on their home pages that stand out and inform
    potential customers of new products that have recently become available, or of
    special offers that are currently running (see Figure 6-1).


    **Figure 6-1.** *Tag files can be used to create custom user interfaces for your
    web application. This*


