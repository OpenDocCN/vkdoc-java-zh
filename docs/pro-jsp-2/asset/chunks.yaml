    **486**


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    You would, of course, modify the settings as needed for your system. For example,
    you might have a different directory location for the openldap-data file, or the
    root password may not be secret, or your domain may be different from raibledesigns.com.


    Then we created an **LDAP Data Interchange Format (LDIF)** file to create our
    top-level organization entry, the organization units for groups and people and,
    finally, the tomcat user with a password of jndi and the developer role (see Listing
    12-6).


