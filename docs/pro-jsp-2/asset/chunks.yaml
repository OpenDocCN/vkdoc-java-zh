    **Listing 12-1.** *login.jsp*


    <html>


    <body>


    <form id="loginForm" method="post" action="j_security_check">


    <p>


    Username: <input type="text" name="j_username" id="j_username" />


    <br/>


    Password: <input type="password" name="j_password" id="j_password" />


    <br/>


    <button type="submit">login</button>


    </p>


    </form>


    </body>


    </html>


    The form error page can contain anything, but most likely the page will explain
    that the user entered an invalid username or password.


    To configure form-based authentication in the deployment descriptor, let’s build
    upon the earlier example. The following code snippet is a <security-constraint>
    element where the


    <auth-method> has been changed to FORM, and a login page and error page have been
    defined:


    <security-constraint>


    <web-resource-collection>


    <url-pattern>/*</url-pattern>


    </web-resource-collection>


    <auth-constraint>


    <role-name>*</role-name>


    </auth-constraint>


    </security-constraint>


    <login-config>


    <auth-method>FORM</auth-method>


    <form-login-config>


    <form-login-page>/login.jsp</form-login-page>


    <form-error-page>/loginError.jsp</form-error-page>


    </form-login-config>


    </login-config>


    You’ll notice we removed the <realm-name> from the <login-config> block, mainly
    because it won’t be displayed anywhere and is therefore useless. If you’ve never
    configured form-based authentication before, we encourage you to try entering
    these lines in the web.xml of one of the example applications from this book.
    If you decide to try this, don’t forget to create login.jsp and loginError.jsp
    in the root directory.


    Although the preceding <security-constraint> element works fine on Tomcat, it
    may not work on other application servers. This is because the <security-constraint>
    in the preceding code snippet uses /* as the <url-pattern> to protect all resources.
    Therefore, you might need to adjust the <url-pattern> to protect only certain
    resources, rather than all of the application’s resources.


