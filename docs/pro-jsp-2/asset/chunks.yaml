    **Customizing Functionality by Using Attributes**


    In the previous chapter, you learned how you can customize tag files and simple
    tags by using attributes. With tag files this meant that you could parameterize
    content as templates, and with simple tags it meant that you could parameterize
    functionality.


    ![Image 70](index-331_1.png)


    513-0 ch07.qxd 11/9/05 4:49 PM Page 298


