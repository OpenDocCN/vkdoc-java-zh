- fmt: "# Validator 与 DynaActionForms 的集成\n\n`Validator`的最后一个特性是它可以与`DynaActionForms`一起使用。如您之前所见，`DynaActionForms`是通过在`struts-config.xml`中指定表单属性来创建的表单。这可以在为应用程序开发具体表单时节省时间。就个人而言，我们更倾向于为表单使用具体的\
    \ Java 类，而不是用表单属性来塞满配置文件。`DynaActionForms`背后的主要动机是加速和简化 Struts 开发，使开发人员能够快速创建新表单。使用`XDoclet`生成表单甚至更快，因为它（在我们的示例中）还创建了持久层。使用`XDoclet`还会为您创建`form-bean`条目和`validation.xml`，而如果您使用`DynaActionForms`，您仍然需要手动创建`validation.xml`。也就是说，创建一个使用`Validator`的`DynaActionForm`就像指定它的\
    \ bean 类型一样简单。一个作为`DynaActionForm`创建的常规`UserForm`可能如下所示：\n\n```\n<form-bean name=\"\
    userForm\"\n    type=\"org.apache.struts.action.DynaActionForm\">\n    ...\n</form-bean>\n\
    ```\n\n要使此表单支持`Validator`，您只需更改`type`属性：\n\n```\n<form-bean name=\"userForm\"\n\
    \    type=\"org.apache.struts.validator.DynaValidatorForm\">\n    ...\n</form-bean>\n\
    ```\n\n配置`Validator`看起来可能有很多工作；毕竟，您必须在 JSP 页面中添加三段不同的代码：表单的`onsubmit`处理程序、按钮的`onclick`处理程序以及表单底部的\
    \ JavaScript 声明。然而，使用`StrutsGen`工具可以轻松自动化此过程。我们只是修改了`ActionForm_jsp.xdt`文件（位于`tools/strutsgen/src`）以包含所有这些`Validator`特定的代码，现在我们的初始表单将生成带有`Validator`支持！这有多棒？\n\
    \n## 对索引标签执行验证\n\n`Validator`还能够对索引标签执行验证。您只需在`validation.xml`中为您要验证的字段添加一个`[#]`。例如，如果您想配置`ResumeForm`以要求第一个`SkillForm`的名称，您可以使用如下内容配置`validation.xml`文件：\n\
    \n```\n<form name=\"resumeForm\">\n    ...\n    <field property=\"skills[0]name\"\
    \n        depends=\"required\">\n        <msg name=\"required\"\n            key=\"\
    errors.required\"/>\n        <arg0 key=\"skillForm.name\"/>\n    </field>\n```\n\
    \n## 使用内置的 Struts Actions\n\n如果您已经构建了一个 Struts 应用程序，您可能会发现您开发了 actions 来遵循 MVC\
    \ 模式，但实际上并不需要它们。或者您可能直接链接到 JSP 页面，绕过了推荐的“每个链接都应通过控制器”的模型。我们知道我们曾经这样做过——直到我们发现了\
    \ Struts 内置的 actions。我们现在将这些 actions 视为一群热切的替补队员，他们说：“让我们上场吧，教练，我们保证会让您自豪！”\n\n\
    然而，您可能没有意识到它们的存在。因此，我们现在将介绍这些状态良好的 actions，以便您了解它们的潜力，甚至可能让它们上场。\n\nStruts 有五个内置的\
    \ actions，前三个（`ForwardAction`、`IncludeAction`和`SwitchAction`）完全不需要编码。最后两个，`DispatchAction`和`LookupDispatchAction`，旨在促进代码减少和重用。\n\
    \n### ForwardAction\n\n`ForwardAction`可用于重定向到 JSP 页面，同时仍然利用控制器的内置功能——例如使用`roles`属性保护\
    \ actions。在将模型 1 架构（即仅 JSP 页面）迁移到 Struts 时，它也非常有用。在示例简历应用程序中，使用`ForwardAction`将用户引导到主菜单页面。要配置`ForwardAction`，您只需将`org.apache.struts.actions.ForwardAction`类指定为`type`，并将\
    \ JSP 页面（或 Tiles 定义）指定为`parameter`。\n\n```\n<action path=\"/mainMenu\"\n    type=\"\
    org.apache.struts.actions.ForwardAction\"\n    parameter=\".mainMenu\"/>\n```\n\
    \n我们还创建了一个全局转发来调用此 action：\n\n```\n<forward name=\"mainMenu\"\n    path=\"/mainMenu.do\"\
    />\n```\n\n配置 action 和转发后，可以在应用程序的起始页面（`index.jsp`）中调用它：\n\n```\n<logic:redirect\
    \ forward=\"mainMenu\"/>\n```\n\n您还应该注意，前面的 action 和转发定义分别位于`metadata/web`目录中的`struts-actions.xml`和`global-forwards.xml`文件中。当执行`strutsconfigxml`任务时，`XDoclet`会获取这些片段并将它们合并到主`struts-config.xml`文件中。对于所有三个“无需编码”的\
    \ actions，您需要在这些文件中定义您的 actions 和 forwards。\n\n### IncludeAction\n\n`IncludeAction`的开发原因与`ForwardAction`相同。它允许您集成使用`RequestDispatcher.include()`的基于\
    \ servlet 的组件。与`ForwardAction`一样，它只需要您指定`name`、`parameter`和`type`属性。就个人而言，我们从未使用过它，也从未见过它被使用，但以下是您可能配置它的方式：\n\
    \n```\n<action path=\"/resumeComments\"\n    type=\"org.apache.struts.actions.IncludeAction\"\
    \n    parameter=\"/path/to/servlet\"/>\n```\n\n### SwitchAction\n\n`SwitchAction`旨在允许切换应用程序模块。请参阅后面的“在团队开发环境中使用模块”部分以获取完整描述以及如何配置它。\n\
    \n### DispatchAction\n\n`DispatchAction`和`LookupDispatchAction`是 Struts 框架的两个重要补充。对于我们开发的第一个应用程序，我们最终为每个实体的创建、检索、更新和删除（CRUD）类创建了`Edit`和`Save`\
    \ action。在编写这些类之后，我们注意到`Edit`（用于检索和搜索）和`Save`类中有大量重复代码。`DispatchAction`及其友好的兄弟`LookupDispatchAction`允许您在\
    \ action 中创建不同的方法，这些方法根据参数进行“调度”。\n\n这意味着您不必在 action 中编写`execute()`方法，而是可以编写详细说明业务逻辑的方法（例如`add()`、`save()`、`remove()`、`search()`）。这两个\
    \ dispatch action 类都是`Action`的子类，因此仍然可以使用`execute()`方法，但如果您想要调度行为，则必须在此方法中构建自己的调度机制。这些\
    \ actions 使用反射来选择并调用适当的方法。因此，您的方法必须具有`public`修饰符，否则您将看到 Struts 的白色死亡屏幕（或您在浏览器中设置的任何背景色！）。\n\
    \n要使用 dispatch action，您只需在 Action 类中扩展它而不是`Action`。我们通常为应用程序创建一个`BaseAction`，并使用它来扩展适当的`Action`类。这提供了什么优势？通过使用`BaseAction`，您只需在一个位置扩展\
    \ Struts 的`Action`类，并且您可以随时选择切换到`DispatchAction`或`LookupDispatchAction`。此外，我们见过开发人员使用`BaseAction`来处理或调度的情况，但我们从未需要以这种方式做事。也就是说，`BaseAction`类上有一个`execute()`方法，并且在`web.xml`中将其配置为\
    \ Struts 的 servlet。要在`struts-resume`中执行此操作，您可以简单地将`metadata/web/servlets.xml`中的以下行\n\
    \n```\n<servlet-class>org.apache.struts.action.ActionServlet</servlet-class>\n\
    ```\n\n更改为"
  raw: 'The final feature of the Validator we would like to mention is that it can
    also be used with DynaActionForms. As you saw earlier, DynaActionForms are forms
    that are created by specifying the form’s properties in struts-config.xml. This
    can save time when developing concrete forms for an application. Personally, we
    prefer using concrete Java classes for our forms, rather than cluttering up a
    configuration file with form properties. The main motivation behind DynaActionForms
    was to speed up and facilitate Struts development so developers could quickly
    create new forms. Using XDoclet to generate your forms is even faster, because
    it also (in our example) creates the persistence layer. Using XDoclet also creates
    the form-bean entries and validation.xml for you, while if you use DynaActionForms,
    you still need to manually create validation.xml. That said, creating a DynaActionForm
    that uses the Validator is as simple as specifying which type of bean it is. A
    regular UserForm created as a DynaActionForm might look as follows:


    <form-bean name="userForm"


    type="org.apache.struts.action.DynaActionForm">


    ...


    </form-bean>


    513-0 ch15.qxd 11/14/05 5:38 PM Page 603


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **603**


    To make this form Validator-enabled, all you need to do is change the type attribute:


    <form-bean name="userForm"


    type="org.apache.struts.validator.DynaValidatorForm">


    ...


    </form-bean>


    Configuring the Validator might look like a lot of work; after all, you do have
    to add three different pieces of code to your JSP page: the form’s onsubmit handler,
    the button’s onclick handler, and the JavaScript declarations at the bottom of
    the form. However, it’s easy to automate this process using the StrutsGen tool.
    We’ve simply modified the ActionForm_jsp.xdt file (located at tools/strutsgen/src)
    to include all of this Validator-specific code, and now our initial forms will
    be generated with Validator support! How sweet is that?


    **Performing Validation on Indexed Tags**


    The Validator is also capable of performing validation on indexed tags. You simply
    need to add a [#] to your validation.xml for the field you want to validate. As
    an example, if you wanted to configure the ResumeForm to require the first SkillForm’s
    name, you could configure the validation.xml file with something like the following:


    <form name="resumeForm">


    ...


    <field property="skills[0]name"


    depends="required">


    <msg name="required"


    key="errors.required"/>


    <arg0 key="skillForm.name"/>


    </field>


    **Using Built-In Struts Actions**


    If you’ve already built a Struts application, you might have found that you developed
    actions to follow an MVC pattern, but you really didn’t need them. Or maybe you
    linked directly to JSP


    pages and bypassed the recommended “every link should go through a controller”
    model. We know we did—until we discovered the actions that Struts has built in.
    We now think of these as a bunch of eager benchwarmers saying, “Put us in coach,
    we promise we’ll make you proud!”


    However, you might not realize they exist. Therefore, we’ll introduce these well-conditioned
    actions now, so you’ll get a taste of their potential and maybe even let them
    into the game.


    There are five built-in actions with Struts and the first three (ForwardAction,
    IncludeAction, and SwitchAction) require no coding at all. The last two, DispatchAction
    and LookupDispatchAction, are designed to promote code reduction and reuse.


    ForwardAction


    The ForwardAction can be used to redirect to a JSP page, but still utilize the
    built-in features of a controller—such as securing actions with the roles attribute.
    It can also be very useful when migrating a model 1 architecture (that is, JSP
    pages only) to Struts. In the example résumé


    513-0 ch15.qxd 11/14/05 5:38 PM Page 604


    **604**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    application, a ForwardAction is used to direct users to the Main Menu page. To
    configure a ForwardAction, you simply specify the org.apache.struts.actions.ForwardAction
    class as the type, and the JSP page (or Tiles definition) as the parameter.


    <action path="/mainMenu"


    type="org.apache.struts.actions.ForwardAction"


    parameter=".mainMenu"/>


    We’ve also created a global forward to call this action:


    <forward name="mainMenu"


    path="/mainMenu.do"/>


    After configuring the action and forward, it can then be called in your application’s
    start page (index.jsp):


    <logic:redirect forward="mainMenu"/>


    You should also note that the previous action and forward definitions are in the
    metadata/web directory in the files struts-actions.xml and global-forwards.xml,
    respectively. XDoclet grabs these fragments and merges them into the main struts-config.xml
    file when the strutsconfigxml task is executed. You’ll need to define your actions
    and forwards in these files for all three of the “no-coding-required” actions.


    IncludeAction


    IncludeAction was developed for the same reason as ForwardAction. It allows you
    to integrate servlet-based components that utilize RequestDispatcher.include().
    Like ForwardAction, it only requires that you specify name, parameter, and type
    attributes. Personally, we’ve never used it, and we’ve never seen it in use, but
    here’s how you might configure it:


    <action path="/resumeComments"


    type="org.apache.struts.actions.IncludeAction"


    parameter="/path/to/servlet"/>


    SwitchAction


    The SwitchAction was designed to allow switching of application modules. Please
    refer to the section “Using Modules in Team Development Environments” later for
    a full description and how to configure it.


    DispatchAction


    DispatchAction and LookupDispatchAction are two great additions to the Struts
    framework.


    For the first application we developed, we ended up creating an Edit and Save
    action for each entity’s Create, Retrieve, Update, and Delete (CRUD) classes.
    After writing the classes, we noticed that there was a lot of duplicate code in
    the Edit (used for retrieval and searching) and Save classes. DispatchAction,
    and its friendly sibling, LookupDispatchAction, allow you to create different
    methods in your action that are “dispatched” according to a parameter.


    513-0 ch15.qxd 11/14/05 5:38 PM Page 605


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **605**


    This means that rather than writing an execute() method in your action, you can
    write methods that detail your business logic (such as add(), save(), remove(),
    search()). Both dispatch action classes are subclasses of Action, so it’s still
    possible to use the execute() method, but you’ll have to build your own dispatching
    mechanism in this method if you want the dispatch behavior. These actions use
    reflection to choose and invoke the appropriate methods. Therefore, your methods
    must have a public modifier or you’ll get the Struts white screen of death (or
    whatever background color you have your browser set to!).


    To use the dispatch action, you simply have to extend it rather than Action in
    your Action class. We usually create a BaseAction for our applications and use
    that to extend the appropriate Action class. What advantages does this provide?
    By using a BaseAction, you only have to extend Struts’s Action class in one location,
    and you can elect to switch to a DispatchAction or LookupDispatchAction at any
    time. Also, we’ve seen cases in which developers use BaseAction to process or
    dispatch, but we’ve never had the need to do things that way. Which is to say
    that there is an execute() method on the BaseAction class, and it’s configured
    as the servlet for Struts in the web.xml. To do this in struts-resume, you could
    simply change the following line in metadata/web/servlets.xml


    <servlet-class>org.apache.struts.action.ActionServlet</servlet-class> to'
