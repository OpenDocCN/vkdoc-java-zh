    **Frameworks for Building Web Applications**


    So far you’ve looked at some proven ways of building web applications and a lot
    of patterns for translating these ideas into working code. Do you really have
    to write all of this every time you build an application?


    **A Bespoke Framework**


    By combining the implementations of the Java EE patterns discussed previously,
    you basically have a bespoke framework on which to build an MVC-based web application.
    In fact, many of the web applications that we’ve worked on (open source and for
    clients) have used these simple implementations as a basis for a lightweight MVC
    framework used to service all of the requests throughout the application. We subscribe
    to the “keep it simple” approach to software design, and using such a lightweight
    framework has several benefits. The framework is easy to learn, easy to maintain,
    and, when necessary, easy to extend, one such example being to handle validation
    errors from HTML forms that users submit.


