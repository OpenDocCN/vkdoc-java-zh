    to understand from this example is **custom response wrapping**. This is also
    one of the most difficult techniques to grasp for novice filter programmers. In
    custom response wrapping, you provide your own implementation of a custom response
    object to downstream filters and resources, with the response object that was
    passed to you wrapped inside. This means that you can modify the response content
    (inside your custom response


