    我们在 struts-resume 应用程序的 `ActionFilter.java` 类中使用了此功能，准确地说是在该类中。如果您使用的 JDK 版本低于
    1.4，我们建议您查看 Scaffold 包，其中包含一个适用于旧版 JDK 的 `ChainedException` 类。以下代码片段说明了我们如何在 `ActionFilter.java`
    类（位于 `src/web/org/appfuse/webapp/filters`）中实现此功能：


    ```java

    // 用户已认证，用户对象为空


    if (username != null && userForm == null) {


    try {


    UserManager mgr =


    new UserManagerImpl(


    (String) ctx.getAttribute(Constants.DAO_TYPE));


    UserForm user = mgr.getUser(username);


    session.setAttribute(Constants.USER_KEY, user);


    } catch (Exception e) {


    // 记录日志，以便我们能够查看日志并了解


    // 出了什么问题


    log.error("获取用户信息时出错 " + e);


    // 打印堆栈跟踪，这始终是个好习惯


    e.printStackTrace();


    // 创建一个空的 ActionErrors 集合，用于添加所有


    // 异常消息


    ActionErrors errors = new ActionErrors();


    // 添加一条通用消息，内容为“进程未完成。”


    errors.add(ActionErrors.GLOBAL_ERROR,


    new ActionError("errors.general"));


    StringBuffer sb = new StringBuffer();


    // 仅限 JDK 1.4 - 如果存在原因，则遍历它们并获取


    // 它们的所有消息


    if (e.getCause() == null) {


    sb.append(e.getMessage());


    } else {


    while (e.getCause() != null) {


    sb.append(e.getMessage());


    sb.append("\n");


    e = (Exception) e.getCause();


    }


    }


    // 将所有错误添加到一个资源包键中，定义如下：


    // errors.detail={0}


    errors.add(


    ActionErrors.GLOBAL_ERROR,


    new ActionError("errors.detail", sb.toString()));


    // 将错误添加到请求中，以便我们可以为用户显示它们


    request.setAttribute(Globals.ERROR_KEY, errors);


    // 分派到错误消息页面


    RequestDispatcher dispatcher =


    request.getRequestDispatcher("/error.jsp");


    dispatcher.forward(request, response);


    return;


    }


    }

    ```


    最终结果是一系列错误消息，如下所示：


    *   所需资源不可用。

    *   进程未完成。详情如下。

    *   无法连接到 MySQL 服务器 localhost:3307。您尝试连接的机器/端口上是否运行着 MySQL 服务器？(java.net.ConnectException)


    很容易看出，链式异常如何为您提供能够满足所有用户需求的消息。甚至可能可以在 Struts 的声明式异常中使用前面的错误循环代码，但我们尚未尝试过。在构建完所有错误后，您需要将用户引导到一个友好的页面。在
    Action 类中使用此代码时，您很可能将他们引导回他们来自的页面。


    ```java

    return (new ActionForward(mapping.getInput()));

    ```


    如果您从多个不同的页面访问同一个 `ActionMapping`，这可能会出现问题。我们见过几种不同的解决方式。第一种方式是在调用该 action 的表单或
    URL 中添加一个额外参数，然后使用该值进行适当的转发。另一种方法是 Roller Weblogger 开源项目 (http://www.rollerweblogger.org)
    使用的方法。它使用一个 `BreadCrumbFilter` 来保存应用程序访问过的最后 URL 的堆栈。这样做的好处是，您可以简单地从堆栈中获取最后一个
    URL，从而转发回最后查看的页面。


    ### 声明异常


    Struts 1.1 引入了可配置异常的概念。也就是说，您可以在 `struts-config.xml` 的全局级别以及 `ActionMapping` 级别声明式地指定异常。


    此概念类似于您在全局转发和局部转发中看到的概念。注册异常很容易——唯一必需的属性是 `type`，它指定了异常的类型。您还可以选择指定一个 `key`（指向资源包中的消息）和用于定向响应的
    `path`。以下是一个可用于处理 `UserNotFoundException` 的示例：


    ```xml

    <exception key="missing.user"


    type="org.appfuse.webapp.services.UserNotFoundException"


    path="addUser"/>

    ```


    在此示例中，`addUser` 是一个转发，其路径引用了一个 tile 的定义（在 `tiles-config.xml` 中）。您可以轻松地将其更改为重定向到一个
    JSP 页面（例如，`/addUser.jsp` 或 `/editUser?action=add`）。异常最好在 `ActionMapping` 级别使用，而不定义路径。如果您不定义路径，Struts
    足够智能，会重定向到您的 `ActionMapping` 的 `input` 值。当然，如果您没有定义 `input`，您可能应该为您的异常指定 `path`，否则您将看到
    Struts 那令人恐惧的空白屏幕。此示例中的 `key` 用于覆盖异常本身使用的键。


    Struts 使开发异常变得更加容易，并提供了内置的国际化支持。


    让我们看一下 `UserNotFoundException` 的代码：


    ```java

    import org.apache.struts.util.ModuleException;


    public class UserNotFoundException extends ModuleException {


    /**


    * 为此异常构造一个新实例，用于指定的用户名。


    * @param username 未找到的用户名


    */


    public UserNotFoundException(String username) {


    super("error.user.missing", username);


    }


    }

    ```


    字符串 `error.user.missing` 引用了默认 `ResourceBundle` 中的一个键，该键在 `struts-config.xml`
    中定义。在 struts-resume 应用程序中，这个 bundle 是 `ApplicationResource.properties`，其中该键定义如下：


    ```properties

    error.user.missing=Could not find user information for username ''{0}''

    ```


    当然，您可以更改异常的构造函数，以处理消息键中拥有的任意数量的参数。如果您在 `struts-config.xml` 中为此异常指定了一个 `key`，它将覆盖异常输出的消息。这样做的一个缺点是，您会失去替换参数的能力，但对于不使用
    Struts 消息 bundle 的异常来说，这可能很有用。


    Struts 异常处理的一个不错的功能是，消息可以很容易地在 properties 文件中外部化。也就是说，您可以在异常处理中直接获得 I18n 支持。此外，您可以通过在异常上指定
    `bundle` 属性，为您的错误消息指定一个单独的 `ResourceBundle`。当然，您可以在业务层和持久化层使用带有 properties 文件的
    `ResourceBundle`，但如果这些异常从未冒泡到 UI 层，则可能不需要这样做。


    在应用程序中使用声明式异常的美妙之处在于，您不必在 Action 类中捕获它们。Struts 的 `execute()` 方法会抛出一个顶级 `Exception`。由于所有异常最终都继承自
    `Exception`，这使得编写和抛出异常变得容易：


    ```java

    public ActionForward execute(ActionMapping mapping,


    ActionForm form,


    HttpServletRequest request,


    HttpServletResponse response)


    throws Exception {

    ```


    当 Struts 捕获到一个已注册的异常时，它会为您创建一个 errors 对象，然后可以使用 `<html:errors/>` 或类似 struts-resume
    中的语法来显示该对象。


    以下是 `messages.jsp` 文件使用的内容，该文件包含在 struts-resume 应用程序的主 Tiles 模板中：


