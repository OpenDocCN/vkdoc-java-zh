    Classic Tags


    **I**n the previous chapter, you looked at tag files and simple tags, both of
    which are mechanisms for writing custom tags introduced as a part of the JSP 2.0
    specification. As the examples in Chapter 6 demonstrated, these new mechanisms
    remove some of the complexity that was typically associated with building custom
    tags in the past. Rather than abandon the existing method of writing custom tags,
    JSP 2.1 supports full backward compatibility with it.


    In this chapter, you’ll take a look at the facilities provided by former versions
    of the JSP


