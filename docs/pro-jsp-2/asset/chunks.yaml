    \ and it’s because of this that testing the server-side action is so straightforward.\n\
    \nCactus provides a flexible way of testing those components that really do need\
    \ to be tested inside a Java EE container, and it currently provides support for\
    \ testing servlets, JSPs, custom tags, and filters. The biggest problem with Cactus\
    \ is that it can seem complicated to begin with, particularly with respect to\
    \ setting up the framework. The great thing about Cactus is that it provides a\
    \ way to actually test all of those components that would otherwise be untested\
    \ if you used JUnit on its own. On the flip side, Cactus tests do require you\
    \ to write some of the code that would normally be executed automatically by the\
    \ container. If you create a servlet instance, you should ideally also call the\
    \ container-management methods such as `init()` and `destroy()`. In general, this\
    \ isn’t too much of a problem because the life cycle of servlets and filters is\
    \ straightforward. Custom tags, however, are a slightly different story.\n\n###\
    \ TagUnit\n\nOne of the most complicated parts of custom tags (certainly before\
    \ JSP 2.0 came along) was that the life cycle of tag handler instances seemed\
    \ cryptic and hard to understand. JSP 2.0 addressed these features with the new\
    \ `SimpleTag` interface, but before this the JSP specification placed some very\
    \ strict rules around the life cycle and pooling of tag handler instances that\
    \ were never widely understood. Because the code to implement these life cycle\
    \ requirements is generally the responsibility of the Java EE container, this\
    \ usually isn’t a problem. To test custom tags with Cactus, however, the developer\
    \ must write this code to accurately mimic the way that tags are used on the page.\
    \ Unfortunately, this process can be error-prone, and therefore the TagUnit testing\
    \ framework was created.\n\nTagUnit (http://tagunit.sourceforge.net/) is a framework\
    \ for testing custom tags. It differs from other testing tools in that it allows\
    \ tags to be tested within the same environment where they’ll eventually be used.\
    \ In other words, the tests themselves are written as JSP pages with regular JSP\
    \ syntax. To achieve this, TagUnit provides a tag library of its own that contains\
    \ testing and assertion tags that mimic the `assertXXX()` methods found in JUnit.\
    \ Therefore, testing custom tags becomes very easy. You just use your tags on\
    \ the page and wrap them up within the TagUnit tags. Examples of assertions include\
    \ comparing the generated content with some expected content, looking for the\
    \ presence of scoped variables/attributes, and checking that exceptions are correctly\
    \ handled.\n\nListing 14-7 is an example that tests the content generated from\
    \ the e-mail address filter tag you saw in Chapter 7, in which you tested that\
