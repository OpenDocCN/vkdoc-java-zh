    Use of the tag library is made possible with the taglib directive. However, rather
    than explicitly specifying the location of the TLD file representing the tag library,
    specify the URI (the unique identifier for the tag library) that you defined in
    the TLD. In this example, the tag library can be used on the page with the following
    taglib directive:


    <%@ taglib uri="http://www.apress.com/projsp/ch06" prefix="ch06" %> Notice that
    the URI you’re using is the same as the one you defined for the tag library in
    the TLD file. From a usage perspective, because you’ve specified the same prefix,
    the tags within the imported tag library can be used in the same way as before.


    ■**Tip** Remember, the URI is just a unique identifier for the tag library—it
    doesn’t have to represent a valid resource on the Internet.


