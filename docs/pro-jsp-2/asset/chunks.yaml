    Functions can be nested to an arbitrary degree to perform some interesting and
    powerful operations. The only restricting factor is your imagination. This nesting
    encourages small functions that perform specialized jobs, which is a very positive
    design point.


    **Expression-Language Functions vs. Custom Tags**


    As you’ll see in later chapters, the JSP specification provides a powerful custom
    tag mechanism. You might ask why you would use tags over functions and vice versa.
    There are several factors that can help you to make the choice:


    • Is knowledge of the environment required? If the answer is yes, tags are the
    way to go. A tag provides easy access to pageContext and other variables; functions
    do not. To access these implicit objects within a function, you must pass them
    in as a parameter.


    513-0 ch03.qxd 10/28/05 12:53 PM Page 134


    **134**


    C H A P T E R 3 ■ T H E J AVA S E R V E R PA G E S E X P R E S S I O N L A N G
    U A G E


    • Do you require iterative behavior over a body? If the answer is yes, you should
    use a tag.


    Functions do not provide functionality to process a body (they don’t have one),
    whereas tags do.


    • Are you trying to provide a small, reusable piece of functionality that acts
    on one or more arguments? If the answer to this is yes, you should use a function.
    Overall, functions are much simpler to write than tags; therefore, they provide
    a great opportunity to write small, self-contained pieces of functionality.


    • Would you like to reuse existing Java code in a web context? If the answer is
    yes, functions are ideal. Because functions are no more than static Java methods,
    you can easily reuse existing code.


    The choice of tags versus functions should be eased by consulting these points,
    but it’s worth noting that the true power of the EL becomes evident when it’s
    combined with custom tags.


    **Summary**


    In this chapter, you’ve looked at the JSP EL. This EL is largely intended to replace
    scriptlets and to be used in combination with custom tags.


    You’ve examined the following topics in this chapter:


    • The reasons that the EL has come about, including a look at its history


    • The syntax and usage of the EL, including reserved words, disabling scriptlets
    in a page, and disabling the evaluation of the EL on a page or set of pages


    • The operators within the EL, including arithmetic operators, comparison operators,
    logical operators, and other operators


    • The use of JavaBeans with the EL


    • The implicit objects within the EL


    • The declaration and use of functions in the EL, including reasons for using
    functions over tags and vice versa


    In the next chapter, you’ll learn about the JSTL and the tags contained within
    it.


