    **The <c:catch> Action**


    The <c:catch> action provides a simple mechanism for catching any java.lang.Throwable
    exceptions that are thrown by any nested actions.


    This simple action has a single var attribute that holds a reference to any java.lang.Throwable
    exceptions that occur during execution of any of the nested actions forming the
    body content of the action. The JSP container processes each nested action in
    the standard way, and any output is returned to the current JspWriter.


    This action provides JSP developers with granular error handling, thereby allowing
    errors from multiple actions to be handled in a uniform way in a single place,
    which makes your applications more robust. It should be noted, however, that this
    action should not be used to provide error handling to actions that are of central
    importance to the page. Instead,


