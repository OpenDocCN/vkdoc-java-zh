    </attribute>


    </tag>


    </taglib>


    There are two points to note about this otherwise normal tag description. First,
    the body content of the tag has been set to JSP. This means that any JSP content
    (tags, scriptlets, and so on) can appear within the body content of the tag. If
    scriptless were used instead, a page-translation error would occur if you attempted
    to use Java scriptlets or expressions.


    The second difference is that you’ve added a new variable element to the tag description,
    and this is where the scripting variable is defined. In a similar way to defining
    attributes, this section allows you to define the name and type of the variable,
    along with some other information.


    When you’re defining the name of a scripting variable in a TLD file, you can use
    two tags.


    The first of these is <name-given>, which allows you to statically define the
    name of the scripting variable. As a result, the scripting variable will be accessible
    through the same name on every page where that tag is used. The drawback to this
    approach is that the name you statically define may clash with existing variables
    on the page, causing a page-translation error to occur. The other option you have
    is to use the <name-from-attribute> tag, as shown in this example. Instead of
    statically defining the name of the variable, you tell the JSP container to use
    the value of the named attribute. In this example, you’re telling the JSP container
    that the scripting variable should be given the name provided by the id attribute.


    Next is the <variable-class> element. This is just the fully qualified class name
    of the scripting variable. Because you’re introducing a cookie into the page,
    the class name is javax.servlet.http.Cookie, a class from the Servlet API.


    Finally, you have two elements that are related to how the variable is used on
    the page.


    You can decide whether a new variable should be declared on the page with the
    <declare> element. If you specify true (the default value), a new variable is
    automatically created. If you choose false, the JSP container assumes that a variable
    has already been declared for it to use.


    Subsequently, if that variable hasn’t been previously declared on the page, a
    compilation error will occur when the JSP page is translated into a Java servlet.


