    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **259**


    As Figure 6-1 illustrates, often there will be more than one of these blocks,
    each of which may have the same look and feel with only the content changing between
    them. One way to implement this is to write the HTML code for the first block
    and simply copy it, modifying the content as necessary. For static websites this
    is very common. However, when building such a page by using JSP, there are several
    other options available, all of which increase the reusability of common code,
    and therefore the readability, quality, and maintainability.


    Templating with Included JSP Files


    One option is to take the common code (in this case HTML code) and place it in
    its own JSP


    file. Because we want to parameterize each usage of the template, this rules out
    using the static include directive that you saw in the previous example. Instead,
    you have to use the


    <jsp:include> tag so that you can dynamically include this JSP file at runtime,
    substituting the content as appropriate.


    Defining a Template


    Listing 6-3 shows how you could write a JSP page to represent the template to
    be dynamically included. The tag file in Listing 6-3 is used to create the blocks
    in the web page in Figure 6-1.


    **Listing 6-3.** *box.jsp*


    <table width="320" bordercolor="${param.color}" border="1" cellpadding="4"


    cellspacing="0">


    <tr bgcolor="${param.color}" color="#ffffff">


    <td class="boxHeader" nowrap>


    ${param.title}


    </td>


    </tr>


    <tr>


    <td valign="top" class="boxText"> ${param.body}


    </td>


    </tr>


    </table>


    This example contains three factors that we would like page authors to customize:
    the title of the box, the content displayed within the box, and the color of the
    box. We have enabled these to be specified at runtime by using parameters, the
    values of which are simply inserted into the appropriate place in the template
    by using JSP EL expressions.


    ■**Note** You may notice that Listing 6-3 (and other listings in this chapter
    and the book) has elements that include an attribute named class (for example,
    <td class="boxHeader" nowrap>). The class attribute references elements from a
    cascading style sheet. Because these tag files are meant to be included in another
    JSP page, the stylesheet reference exists in the enclosing JSP (for example, the
    index.jsp shown in Figure 6-1). The stylesheet is not listed in this chapter but
    is available with the code download for the book, at the Source Code area of the
    Apress website (http://www.apress.com/book/download.html).


