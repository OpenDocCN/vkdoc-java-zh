    • How to use classic tags to evaluate body content


    **Classic Tags Overview**


    There are now three mechanisms for building custom tags outlined in the JSP 2.1
    specification: tag files, simple tags, and classic tags.


    As you saw in the previous chapter, tag files provide an easy way to abstract
    common behavior away from JSP pages and into reusable components. Because tag
    files allow this content to be written by using regular JSP constructs, wrapping
    up content is fairly straightforward for JSP developers who might not necessarily
    know the Java programming language.


    The next step up, in terms of complexity, is simple tags. These custom tags encapsulate
    reusable functionality in a Java class called a tag handler. Although this process
    does require **289**


    513-0 ch07.qxd 11/9/05 4:49 PM Page 290


    **290**


    C H A P T E R 7 ■ C L A S S I C TA G S


    familiarity with the Java programming language, it allows complex behavior to
    be wrapped up and used by page authors in a straightforward way. As you saw in
    the previous chapter, simple tags offer a great deal of flexibility in the way
    that the functionality is encapsulated and, through body content and JSP fragments,
    they allow separation between content and content presentation.


    Classic tags are the original tag development methodology introduced in version
    1.1 of the JSP specification. JSP 1.2 then added new functionality and simplified
    the programming model slightly, but essentially the model was the same, and it
    remains the same in the JSP 2.1


    specification. As with simple tags, classic tags use the concept of a tag handler
    class that is written by using Java code. This is then described with a tag library
    descriptor file in the same way it is with simple tags, and the resulting custom
    tags are again used in the same way.


    So, what differentiates classic tags from simple tags? You’ll learn about the
    differences in this section. You’ll also take a look at the classic tag interface,
    tag life cycle, and TagSupport class, and will build a small classic tag.


    **The Differences Between Simple and Classic Tags**


    There are several key differences between simple and classic tags. Let’s take
    a quick look at each in turn and evaluate what it means to you as a tag developer.


    The Tag Handler Interface


    The fundamental difference between simple and classic tags is the way in which
    the tag handler class is implemented. When you’re using simple tags, any tag handlers
    you build must implement the javax.servlet.jsp.tagext.SimpleTag interface. When
    you’re using classic tags, however, the tag handlers must implement the javax.servlet.jsp.tagext.Tag
    interface or, as you’ll see in this chapter, one of its subinterfaces.


    For you as a developer, this means you need to learn a slightly different programming
    model. For example, when using simple tags, all of the functionality to be encapsulated
    within the tag is defined within the doTag() method. When using classic tags,
    there are two methods you must implement: doStartTag() and doEndTag().


    Feedback from tag developers over the past couple of years has been mixed, and
    many people find the concepts employed by classic tag handlers confusing. Therefore,
    the interface has been simplified and simple tags are the result of this process.


    The Tag Life Cycle


    Another key, though often neglected, difference relates to the tag life cycle.


    With simple tags, an instance of the tag handler class is created when needed
    and that instance is used to serve only a single invocation of a custom tag. In
    other words, a unique tag handler instance is created for each usage of a simple
    tag on a page.


    With classic tags, this may or may not be the case because the JSP specification
    enables container vendors to optionally improve classic tag performance by pooling
    and reusing tag handler instances. This means that, for example, a single tag
    handler instance could be created and reused to service all invocations of that
    custom tag per page. The rules around reuse are fairly complicated, and to make
    matters worse, JSP container vendors don’t always choose


    513-0 ch07.qxd 11/9/05 4:49 PM Page 291


    C H A P T E R 7 ■ C L A S S I C TA G S


    **291**


    to implement this optional piece of the specification. Therefore, if you’re using
    classic tags, you must be aware of whether your container pools and reuses tag
    handler instances.


    The problems that arise between different JSP containers is another reason simple
    tags were introduced, and it’s another area in which the complexity associated
    with developing them has been reduced. The downside is that there may be times
    when you’d like tag instances pooled and reused. For example, your tag might acquire
    some expensive resource when it is created. In this example, it makes sense to
    take advantage of any performance benefits that the container may provide. In
    many scenarios, however, this just isn’t an issue and simple tags are more than
    adequate.


    With this brief overview of the differences between simple and classic tags over,
    let’s take a look at the interface that classic tag handlers must implement.


    **The Tag Interface**


    The Tag interface, like the SimpleTag interface, provides the basic contract that
    must be upheld between the JSP page and the tag. Listing 7-1 shows the Tag interface.


    **Listing 7-1.** *Tag.java*


    package javax.servlet.jsp.tagext;


    import javax.servlet.jsp.JspException;


    public interface Tag {


    public final static int SKIP_BODY = 0;


    public final static int EVAL_BODY_INCLUDE = 1;


    public final static int SKIP_PAGE = 5;


    public final static int EVAL_PAGE = 6;


    void setPageContext(PageContext pc);


    void setParent(Tag t);


    int doStartTag() throws JspException;


    int doEndTag() throws JspException;


    void release();


    }


    **The Tag Life Cycle**


    As you learned in Chapter 6, the life cycle of simple tags consists of the tag
    handler being created, contextual and environmental information being passed to
    it, and finally, the doTag() method being executed. As Figure 7-1 shows, classic
    tags are not too different in this respect.


    Creating a Tag Handler Instance


    As with simple tags, when a classic tag is used on a JSP page, the first thing
    that the JSP container must do is create a new instance of the tag handler class.
    Again, this is performed by invoking the default, no-arguments constructor.


    513-0 ch07.qxd 11/9/05 4:49 PM Page 292


    **292**


    C H A P T E R 7 ■ C L A S S I C TA G S


    aJSP


    aTag


    JspPage


    Tag


    setPageContext(PageContext) : void


    setParent (Tag) : void


    doStartTag() : int


    doEndTag() : int


    release () : void


    **Figure 7-1.** *This UML diagram shows the life cycle of a classic tag in terms
    of the calling sequence* *of the class tag methods.*


    Setting the Context


    The next step in the tag life cycle is to make the tag handler instance aware
    of the environment in which it is running. This involves passing the tag handler
    a reference to the current PageContext through the setPageContext() method. Like
    JspContext, this method provides an easy way to access other objects such as the
    current output writer and scoped attributes. Notice here that it’s a PageContext
    instance that gets passed to the tag and not a JspContext instance, as happens
    with simple tags. This moves simple tags away from being dependent on services
    and features provided by the Java Servlet API; PageContext uses such features,
    whereas JspContext doesn’t. However, for consistency and backward compatibility
    with earlier versions of the JSP


    specification, PageContext actually extends JspContext.


    Setting the Parent


    Like simple tags, classic tags can be nested, and as you’ll see in Chapter 8,
    it’s possible for custom tag handlers to cooperate and communicate with one another.
    As an example, a child (nested) tag may ask for information from its parent tag.
    For this reason, the setParent() method is called and passes a reference to the
    closest enclosing tag handler, or null if the tag isn’t nested.


    For simple tags, this reference is of type JspTag (the superinterface for all
    tag handlers), but again for classic tags this reference is of type Tag (a subinterface
    of JspTag) for backward compatibility.


    Executing the Functionality


    With the context set, the next thing to do is execute the functionality provided
    by the tag. With classic tags, this means calling the doStartTag() and doEndTag()
    methods.


    513-0 ch07.qxd 11/9/05 4:49 PM Page 293


    C H A P T E R 7 ■ C L A S S I C TA G S


    **293**


    When you looked at how custom tags can be used on the page, you saw that they
    can be written in a long or shortened form as follows:


    <prefix:myTag></prefix:myTag>


    <prefix:myTag/>


    In the long format you explicitly write the start (opening) and end (closing)
    tags, and in the shortened format you combine them. Regardless of how you write
    them, both the doStartTag() method and the doEndTag() method are called on a tag
    handler instance. Figure 7-2 shows the tag life cycle from a slightly different
    viewpoint and illustrates how the doStartTag() and doEndTag() methods can also
    affect the tag life cycle by the values that are returned by them.


    Initialize context and attributes


    doStartTag()


    [EVAL_BODY_INCLUDE]


    Evaluate body


    [SKIP_BODY]


    doEndTag()


    [EVAL_PAGE]


    Evaluate rest of page


    [SKIP_PAGE]


    **Figure 7-2.** *This UML digram shows how the doStartTag() and doEndTag() methods
    are called to* *evaluate a tag.*


    **The Start Tag**


    The doStartTag() method is called when the starting tag is encountered on the
    page: int doStartTag() throws JspException;


    513-0 ch07.qxd 11/9/05 4:49 PM Page 294


    **294**


    C H A P T E R 7 ■ C L A S S I C TA G S


    The method signature from the Tag interface states that a primitive int value
    is to be returned. This signals to the JSP page what do to next. Two values can
    be returned from tags implementing this interface, SKIP_BODY and EVAL_BODY_INCLUDE,
    which are defined as constants within the Tag interface.


    Returning SKIP_BODY signals to the JSP page that after the doStartTag() method
    has been called, any body content for the tag should be ignored. For example,
    any body content such as JSP code, Java code, or content that would normally be
    output to the page is simply dropped.


    Following this, processing proceeds to the doEndTag() method.


    On the other hand, returning EVAL_BODY_INCLUDE from the doStartTag() method signals
    that any body content should be evaluated and output to the page.


    **The End Tag**


    The doEndTag() method is called when the ending tag is encountered on the page,
    again, regardless of whether the tag is written on the page by using the long
    or shortened format: int doEndTag() throws JspException;


    This method also specifies an integer return type, and the valid return types
    for this method are the other two constants defined within the Tag interface,
    SKIP_PAGE and EVAL_PAGE. Here, these return values signal whether the JSP container
    should continue evaluating the rest of the JSP page.


    In reality, the SKIP_PAGE return value is rarely used, because there aren’t many
    circumstances in which you’ll want to actually stop the rest of the page from
    being processed. One such example might be a security tag that appears at the
    top of the JSP page and checks whether the current user is authorized to see the
    contents of the page.


    Releasing State


    The final method to be called as part of the tag life cycle is the release() method.
    This method is called to ask the tag handler to release any state it may be storing,
    and it’s called on the tag handler only when that tag handler instance is finished
    and won’t be used anymore. In other words, with JSP containers that don’t support
    the optional pooling of tag handler instances, the release() method is called
    after the doEndTag() method because that particular instance will never be used
    again. On the other hand, with containers that provide instance pooling, this
    method is called only when the container has finished using the instance and before
    it gets garbage collected.


    ■**Caution** It’s a common misconception that release() is always called directly
    after the doEndTag() method and hence is used to clear the values of instance
    variables. This is not the case, and relying on this behavior means that your
    tags might not work as expected in all vendors’ JSP containers. The next chapter
    looks at some of the best practices for using and taking advantage of the tag
    life cycle.


