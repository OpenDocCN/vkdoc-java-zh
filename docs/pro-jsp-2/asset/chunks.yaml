- fmt: "# JUnitDoclet\n\n`JUnitDoclet`是一个相当精巧的工具，它能在你添加新方法时更新测试用例，并且不会覆盖你已添加到测试用例中的任何自定义代码。我们在此提醒你，有些测试用例的方法中可能没有“实质内容”。大多数情况下，这是因为我们之前使用过该类并知道它能正常工作，所以不打算测试它。这是否是一种不良实践？也许吧，但这确实能加快我们的开发速度。\n\
    \n我们为测试用例使用了不同的源代码树，这种方法效果很好。不幸的是，一旦你将某个测试用例改为继承`JUnit`以外的类（例如`Cactus`的`ServletTestCase`），它就不会再更新该类了。它会直接忽略它，这对我们来说没问题。\n\
    \n# StrutsTestCase\n\n另一个专门针对`Struts`的测试框架于2001年底推出。它被称为`StrutsTestCase for JUnit`（参见`http://strutstestcase.sourceforge.net/`），是标准`JUnit`测试用例的扩展。通过提供模拟对象和`Cactus`方法来运行`ActionServlet`，`StrutsTestCase`允许在有无运行中`Servlet`引擎的情况下测试`Struts`代码。由于它使用控制器来测试代码，因此不仅测试`Action`对象的实现，还测试映射、`ActionForms`和`ActionForwards`。\n\
    \n`StrutsTestCase`符合`Java Servlet 2.5`规范，并支持`Struts 1.2`、`Cactus 1.6.1`和`JUnit\
    \ 3.8.1`。\n\n`StrutsTestCase`已经提供了验证方法，因此创建单元测试用例非常简单，如下面的代码片段所示：\n\n```\npublic\
    \ void testEditUser() {\n    setRequestPathInfo(\"/editUser\");\n    setRequestParameter(\"\
    action\", \"edit\");\n    addRequestParameter(\"email\", \"tomcat\");\n    actionPerform();\n\
    \    verifyForward(\"success\");\n    assertTrue(getSession().getAttribute(Constants.USER_KEY)\
    \ != null);\n}\n```\n\n# Cactus 和 HttpUnit\n\n你可以使用`Cactus`和`HttpUnit`对你的应用程序进行非常全面的测试，以验证你的`Action`类以及你在渲染用户界面（`JSP`、`XML`或`Velocity`）时使用的任何视图技术。`HttpUnit`测试也非常简单，如下例所示：\n\
    \n```\nWebConversation wc = new WebConversation();\nWebResponse resp = wc.getResponse(\n\
    \    \"http://www.httpunit.org/doc/Cookbook.html\");\nWebLink link = resp.getLinkWith(\"\
    response\");\nlink.click();\nWebResponse jdoc = wc.getCurrentPage();\n```\n\n\
    `HttpUnit`还支持测试`JavaScript`，其网站上有警告说它“目前非常基础”（参见`http://www.httpunit.org/doc/javascript-support.html`）。\n\
    \n# JsUnit\n\n如果你正在寻找一个更强大的`JavaScript`测试框架，我们推荐`JsUnit`（`http://www.jsunit.net`）。`JsUnit`是一个用于客户端`JavaScript`测试的单元测试框架。\n\
    \n`JsUnit`测试是用`JavaScript`编写的：它本质上是`JUnit`的`JavaScript`移植版，因此你需要相应地命名方法等。需要注意的是，这些语言差异巨大，编写`JavaScript`的人可能也应该编写测试。\n\
    \n# WebTest\n\n我们要介绍的最后一个测试框架是来自`Canoo`的`WebTest`工具（`http://webtest.canoo.com`）。这是一个更容易开发的测试框架，因为所有内容都只需在`XML`文件中配置。与其他测试框架类似，`WebTest`使用`Ant`运行。然而，主要区别在于整个测试都在一个`Ant`任务中配置。例如，以下是你如何为用户登录应用程序创建测试的方法：\n\
    \n```\n<target name=\"login\">\n    <testSpec name=\"tomcat-login\">\n       \
    \ <config host=\"${tomcat.server}\" port=\"${tomcat.port}\"\n                protocol=\"\
    http\" basepath=\"${webapp.name}\" verbose=\"true\"\n                resultpath=\"\
    .\" resultfile=\"web-test-result.xml\" summary=\"true\"\n                saveresponse=\"\
    true\"/>\n        <steps>\n            <invoke stepid=\"get Login Page\" url=\"\
    /\"/>\n            <verifytitle stepid=\"we should see the login title\" text=\"\
    Login\"/>\n            <setinputfield stepid=\"set user name\"\n             \
    \              name=\"j_username\" value=\"tomcat\"/>\n            <setinputfield\
    \ stepid=\"set password\"\n                           name=\"j_password\" value=\"\
    tomcat\"/>\n            <clickbutton label=\"Login\" stepid=\"Click the submit\
    \ button\"/>\n            <verifytitle text=\"Main Menu\"\n                  \
    \       stepid=\"Home Page follows if login ok\"/>\n        </steps>\n    </testSpec>\n\
    \    <loadfile property=\"web-test.result\"\n              srcFile=\"web-test-result.xml\"\
    />\n    <echo>${web-test.result}</echo>\n</target>\n```\n\n`WebTest`是一个非常适合Web开发人员的框架，因为你无需编写任何代码，只需`XML`即可轻松测试用户所走的路径。它似乎也使用了`HttpUnit`，因此并非重新发明轮子，而是提供了一种更简单的开发方式。\n\
    \n# Dbunit\n\n为了测试应用程序与数据库的交互，你可能想看看`Dbunit`（`http://www.dbunit.org`）。`Dbunit`是一个`JUnit`扩展，它将数据库设置为已知状态，以便你可以使用预期数据执行测试。它使用`XML`数据集（即数据表的集合），并在每个测试前后执行数据库操作。当然，你也可以在测试用例中执行此操作，例如插入、更新或删除对象，但由于无法保证这些操作的执行顺序，因此`Dbunit`可能是个好主意。\n\
    \n我们在类中将测试按特定顺序排列，然后让这些方法按该顺序执行，效果不错，但理想的测试方法是自治的。\n\n# 测试框架总结\n\n我们已经包含了`Cactus`测试、`Struts\
    \ Action`测试、`HttpUnit`测试，甚至一个简单的`Canoo WebTest`示例。表15-2指出了你可以使用哪些类进行这些测试以及如何运行它们。如果你希望在`Tomcat`已经运行时运行这些测试，请运行`test-cactus`而不是`test-web`。\n\
    \n**表15-2.** *使用各种测试框架测试`struts-resume`*\n\n| 测试类型 | 文件位置 | Ant命令 |\n| --- | ---\
    \ | --- |\n| `Cactus` | `test/org/appfuse/webapp/action/UserAction` | `ant test-web\
    \ -Dtestcase=LoginActionTest` |\n| `Struts` | `test/org/appfuse/webapp/action/ResumeAction`\
    \ | `ant test-web -Dtestcase=ResumeActionTest` |\n| `HttpUnit` | `test/org/appfuse/webapp/action/MainMenuTest`\
    \ | `ant test-web -Dtestcase=MainMenuTest` |\n| `Canoo` | `web-tests.xml` | `ant\
    \ test-canoo -Dtestcase=login` |\n\n使用像`StrutsTestCase`和`Cactus`这样的`Servlet`测试框架将使测试你的`Action`变得容易得多。要么使用它们，要么通过浏览器测试，而浏览器测试可能需要你点击五次才能到达目标。如果你真的只想访问一个`Servlet`，则无需等待`JSP`页面编译。`struts-resume`应用程序使得开发和运行新测试变得容易。我们鼓励你使用它并从中学习。\n\
    \n# JSP预编译\n\n`JSP`开发中一个真正节省时间的方法是，在将`JSP`页面部署到`Servlet`容器之前对其进行预编译。这可以通过`Ant`的`<jspc>`任务完成，该任务使用`Tomcat`的`Jasper`编译器生成`.java`源文件。虽然它非常适合测试，但你也希望使用此工具为生产环境预编译`JSP`页面，对吗？不幸的是，要做到这一点，你需要在`web.xml`文件中为每个`JSP`添加一个条目，而这将是一个非常漫长且费力的过程。如果你不执行此步骤，`Tomcat`将重新编译你已经编译过的页面。某些应用服务器，如`WebLogic`和`SunONE`，允许你在应用程序部署后配置`JSP`页面的预编译。我们希望其他供应商也能复制此功能。"
  raw: 'JUnitDoclet is a pretty slick tool in that it will update your test cases
    if you add new methods, and it won’t overwrite any custom code you’ve added to
    the test case. We’re saying this to warn you that there may be some test cases
    without any “meat in the methods.” In most cases, this is because we’ve used the
    class before and we know it works, so we don’t care to test it. Is this a bad
    practice? Maybe, but it will sure help our development time.


    We’re using a different source tree for test cases, and it works really well with
    this approach. Unfortunately, once you’ve changed a test case to extend something
    other than JUnit (that is, Cactus’s ServletTestCase), it won’t update that class
    anymore. It will simply ignore it, which is fine with us.


    Another testing framework, specific to Struts, was introduced in late 2001\. Known
    as **StrutsTestCase for JUnit** (see http://strutstestcase.sourceforge.net/),
    it’s an extension of the standard JUnit test case. By providing both a mock object
    and a Cactus approach to run the ActionServlet, StrutsTestCase allows testing
    of Struts code with or without a running servlet engine. Since it uses the controller
    to test code, it tests not only the implementation of Action objects, but also
    mappings, ActionForms, and ActionForwards.


    StrutsTestCase is compliant with both the Java Servlet 2.5 specifications and
    supports Struts 1.2, Cactus 1.6.1, and JUnit 3.8.1.


    StrutsTestCase already provides validation methods, so it’s simple to create unit
    test cases, as demonstrated by the following code snippet:


    public void testEditUser() {


    setRequestPathInfo("/editUser");


    setRequestParameter("action", "edit"); addRequestParameter("email","tomcat");
    actionPerform();


    verifyForward("success");


    assertTrue(getSession().getAttribute(Constants.USER_KEY) != null);


    }


    You could run a very comprehensive test of your application using Cactus and HttpUnit
    to verify your action classes and whatever view technology you happen to use in
    rendering your UI (JSP, XML, or Velocity). An HttpUnit test is also pretty simple,
    as demonstrated in the following example:


    WebConversation wc = new WebConversation();


    WebResponse resp = wc.getResponse(


    "http://www.httpunit.org/doc/Cookbook.html"); WebLink link = resp.getLinkWith("response");


    link.click();


    WebResponse jdoc = wc.getCurrentPage();


    513-0 ch15.qxd 11/14/05 5:38 PM Page 624


    **624**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    HttpUnit also supports testing of JavaScript, and their site carries the warning
    that it’s “very basic at present” (see http://www.httpunit.org/doc/javascript-support.html).


    If you’re looking for a more robust JavaScript testing framework, we recommend
    **JsUnit** (http://www.jsunit.net). JsUnit is a unit testing framework for client-side
    testing of JavaScript.


    JsUnit tests are written in JavaScript: it’s essentially a JavaScript port of
    JUnit, so you name your methods and such accordingly. It’s important to note that
    these languages are drasti-cally different, and whoever writes the JavaScript
    should probably also write the tests.


    The last testing framework we want to cover is the **WebTest** tool (http://


    webtest.canoo.com) from Canoo. This is a much easier testing framework to develop
    with because everything is simply configured in an XML file. Similar to the other
    testing frameworks, WebTest is run with Ant. However, the main difference is that
    the entire test is configured in an Ant task. For instance, this might be how
    you create a test for a user logging into your application:


    <target name="login">


    <testSpec name="tomcat-login">


    <config host="${tomcat.server}" port="${tomcat.port}"


    protocol="http" basepath="${webapp.name}" verbose="true"


    resultpath="." resultfile="web-test-result.xml" summary="true"


    saveresponse="true"/>


    <steps>


    <invoke stepid="get Login Page" url="/"/>


    <verifytitle stepid="we should see the login title" text="Login"/>


    <setinputfield stepid="set user name"


    name="j_username" value="tomcat"/>


    <setinputfield stepid="set password"


    name="j_password" value="tomcat"/>


    <clickbutton label="Login" stepid="Click the submit button"/>


    <verifytitle text="Main Menu"


    stepid="Home Page follows if login ok"/>


    </steps>


    </testSpec>


    <loadfile property="web-test.result"


    srcFile="web-test-result.xml"/>


    <echo>${web-test.result}</echo>


    </target>


    WebTest is a great framework for web developers, because you can easily test the
    path a user takes without writing any code, just XML. It also appears to use HttpUnit,
    so it isn’t reinventing the wheel, rather just providing an easier way to develop
    it.


    For testing your application’s interactions with a database, you might want to
    take a look at **Dbunit** (http://www.dbunit.org). Dbunit is a JUnit extension
    that sets up your database in a known state so you can execute your tests with
    expected data. It uses XML datasets, or collections of data tables, and performs
    database operations before and after each test. Of course, you can also do this
    in your test cases, where you can insert, update, or delete an object, but since
    there’s no guarantee of the order that these will execute, Dbunit is probably
    a good idea.


    We’ve had good luck with putting our tests in a particular order in a class, and
    then having these methods get executed in that order, but an ideal test method
    is autonomous.


    513-0 ch15.qxd 11/14/05 5:38 PM Page 625


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **625**


    We’ve included examples of Cactus tests, Struts Action tests, HttpUnit tests,
    and even a simple Canoo WebTest example. Table 15-2 indicates which classes you
    can use for these and how to run them. Run test-cactus instead of test-web if
    you want to run these tests while Tomcat is already running.


    **Table 15-2.** *Testing struts-resume with Various Testing Frameworks* **Test
    Type**


    **File Location**


    **Ant Command**


    Cactus


    test/org/appfuse/webapp/action/UserAction


    ant test-web


    -Dtestcase=LoginActionTest


    Struts


    test/org/appfuse/webapp/action/ResumeAction


    ant test-web


    -Dtestcase=ResumeActionTest


    HttpUnit


    test/org/appfuse/webapp/action/MainMenuTest


    ant test-web


    -Dtestcase=MainMenuTest


    Canoo


    web-tests.xml


    ant test-canoo


    -Dtestcase=login


    Using servlet testing frameworks like StrutsTestCase and Cactus will make testing
    your actions much easier. It’s either that or testing them through your browser,
    which may take you five clicks to get to. There’s no need to wait for your JSP
    pages to compile if you really only want to hit a servlet. The struts-resume application
    makes it easy to develop and run new tests. We encourage you to use it and learn
    from it.


    A real timesaver with JSP development is precompiling the JSP pages prior to deploying
    them to your servlet container. This can be done with Ant’s <jspc> task, which
    uses Tomcat’s Jasper compiler to generate .java source files. While it’s great
    for testing, you would like to use this tool to precompile your JSP pages for
    production use too, right? Unfortunately, to do this, you need to make an entry
    for every JSP in your web.xml file, and boy would that be a long and laborious
    process. If you don’t do this step, Tomcat will just recompile over the top of
    the pages you’ve already compiled. Some application servers, such as WebLogic
    and SunONE, allow you to configure precompilation of JSP pages once the application
    has been deployed.


    We’d love it if other vendors would copy this feature.'
  trans: '

    JUnitDoclet 是一款相当精巧的工具，它能在你添加新方法时自动更新测试用例，并且不会覆盖你已添加到测试用例中的任何自定义代码。我们在此提醒你，有些测试用例可能“方法中缺乏实质内容”。大多数情况下，这是因为我们之前使用过该类并确认其功能正常，因此不打算对其进行测试。这是否是一种不良实践？或许吧，但这无疑能加快我们的开发进度。


    我们为测试用例使用了不同的源代码树，这种方法效果很好。不幸的是，一旦你将某个测试用例改为继承 JUnit 以外的类（例如 Cactus 的 `ServletTestCase`），该工具就不会再更新那个类了。它会直接忽略它，这对我们来说也无妨。


    另一个专门针对 Struts 的测试框架于 2001 年底推出。它被称为 **StrutsTestCase for JUnit**（参见 http://strutstestcase.sourceforge.net/），是标准
    JUnit 测试用例的一个扩展。通过提供模拟对象和基于 Cactus 的方法来运行 `ActionServlet`，StrutsTestCase 允许在有无运行中
    Servlet 引擎的情况下测试 Struts 代码。由于它使用控制器来测试代码，因此不仅能测试 `Action` 对象的实现，还能测试映射、`ActionForms`
    和 `ActionForwards`。


    StrutsTestCase 兼容 Java Servlet 2.5 规范，并支持 Struts 1.2、Cactus 1.6.1 和 JUnit 3.8.1。


    StrutsTestCase 已经提供了验证方法，因此创建单元测试用例非常简单，如下面的代码片段所示：


    public void testEditUser() {


    setRequestPathInfo("/editUser");


    setRequestParameter("action", "edit"); addRequestParameter("email","tomcat");
    actionPerform();


    verifyForward("success");


    assertTrue(getSession().getAttribute(Constants.USER_KEY) != null);


    }


    你可以使用 Cactus 和 HttpUnit 对你的应用程序进行非常全面的测试，以验证你的 action 类以及你在渲染 UI（JSP、XML 或 Velocity）时使用的任何视图技术。HttpUnit
    测试也非常简单，如下例所示：


    WebConversation wc = new WebConversation();


    WebResponse resp = wc.getResponse(


    "http://www.httpunit.org/doc/Cookbook.html"); WebLink link = resp.getLinkWith("response");


    link.click();


    WebResponse jdoc = wc.getCurrentPage();


    513-0 ch15.qxd 11/14/05 5:38 PM Page 624


    **624**


    第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具


    HttpUnit 还支持测试 JavaScript，其网站带有警告，称其“目前非常基础”（参见 http://www.httpunit.org/doc/javascript-support.html）。


    如果你正在寻找一个更强大的 JavaScript 测试框架，我们推荐 **JsUnit**（http://www.jsunit.net）。JsUnit 是一个用于客户端
    JavaScript 测试的单元测试框架。


    JsUnit 测试是用 JavaScript 编写的：它本质上是 JUnit 的 JavaScript 移植版，因此你需要相应地命名你的方法等。需要注意的是，这些语言差异巨大，编写
    JavaScript 的人很可能也应该编写这些测试。


    我们要介绍的最后一个测试框架是来自 Canoo 的 **WebTest** 工具（http://webtest.canoo.com）。这是一个更易于开发的测试框架，因为所有内容都只需在
    XML 文件中配置即可。与其他测试框架类似，WebTest 通过 Ant 运行。然而，主要区别在于整个测试都在一个 Ant 任务中配置。例如，以下是你如何为用户登录应用程序创建测试的方法：


    <target name="login">


    <testSpec name="tomcat-login">


    <config host="${tomcat.server}" port="${tomcat.port}"


    protocol="http" basepath="${webapp.name}" verbose="true"


    resultpath="." resultfile="web-test-result.xml" summary="true"


    saveresponse="true"/>


    <steps>


    <invoke stepid="get Login Page" url="/"/>


    <verifytitle stepid="we should see the login title" text="Login"/>


    <setinputfield stepid="set user name"


    name="j_username" value="tomcat"/>


    <setinputfield stepid="set password"


    name="j_password" value="tomcat"/>


    <clickbutton label="Login" stepid="Click the submit button"/>


    <verifytitle text="Main Menu"


    stepid="Home Page follows if login ok"/>


    </steps>


    </testSpec>


    <loadfile property="web-test.result"


    srcFile="web-test-result.xml"/>


    <echo>${web-test.result}</echo>


    </target>


    WebTest 是一个非常适合 Web 开发人员的框架，因为你无需编写任何代码，只需使用 XML 即可轻松测试用户所走的路径。它似乎也使用了 HttpUnit，因此并非重新发明轮子，而是提供了一种更简单的开发方式。


    为了测试你的应用程序与数据库的交互，你可能想看看 **Dbunit**（http://www.dbunit.org）。Dbunit 是一个 JUnit 扩展，它可以将你的数据库设置到一个已知状态，以便你使用预期的数据执行测试。它使用
    XML 数据集（即数据表的集合），并在每个测试前后执行数据库操作。当然，你也可以在你的测试用例中执行此操作，例如插入、更新或删除对象，但由于这些操作的执行顺序无法保证，因此使用
    Dbunit 可能是个好主意。


    我们曾成功地将测试按特定顺序放在一个类中，然后让这些方法按该顺序执行，但理想的测试方法应该是自治的。


    513-0 ch15.qxd 11/14/05 5:38 PM Page 625


    第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具


    **625**


    我们提供了 Cactus 测试、Struts Action 测试、HttpUnit 测试，甚至一个简单的 Canoo WebTest 示例。表 15-2 指出了你可以使用哪些类进行这些测试以及如何运行它们。如果你想在
    Tomcat 已经运行的情况下运行这些测试，请运行 `test-cactus` 而不是 `test-web`。


    **表 15-2.** *使用各种测试框架测试 struts-resume* **测试类型**


    **文件位置**


    **Ant 命令**


    Cactus


    test/org/appfuse/webapp/action/UserAction


    ant test-web


    -Dtestcase=LoginActionTest


    Struts


    test/org/appfuse/webapp/action/ResumeAction


    ant test-web


    -Dtestcase=ResumeActionTest


    HttpUnit


    test/org/appfuse/webapp/action/MainMenuTest


    ant test-web


    -Dtestcase=MainMenuTest


    Canoo


    web-tests.xml


    ant test-canoo


    -Dtestcase=login


    使用像 StrutsTestCase 和 Cactus 这样的 Servlet 测试框架将使测试你的 action 变得容易得多。要么使用它们，要么通过浏览器进行测试，而浏览器测试可能需要你点击五次才能到达目标。如果你真的只想访问一个
    Servlet，则无需等待 JSP 页面编译。struts-resume 应用程序使得开发和运行新测试变得容易。我们鼓励你使用它并向它学习。


    JSP 开发中一个真正节省时间的方法是，在将 JSP 页面部署到 Servlet 容器之前对其进行预编译。这可以通过 Ant 的 `<jspc>` 任务来完成，该任务使用
    Tomcat 的 Jasper 编译器生成 `.java` 源文件。虽然它对于测试来说很棒，但你也希望使用此工具为生产环境预编译 JSP 页面，对吧？不幸的是，要做到这一点，你需要在
    `web.xml` 文件中为每个 JSP 添加一个条目，而这将是一个非常漫长且费力的过程。如果你不执行此步骤，Tomcat 将重新编译你已经编译过的页面。某些应用服务器，如
    WebLogic 和 SunONE，允许你在应用程序部署后配置 JSP 页面的预编译。


    我们希望其他供应商也能复制这个功能。

