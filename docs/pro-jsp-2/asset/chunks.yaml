    sure the documentation is good, the development mailing list is active, and there
    are example applications. It’s much easier to copy an existing example than to
    develop from scratch. It’s worth your time to investigate code-generation tools
    that exist for databases, because this will save you a lot of time in the long
    run. Above all, learn and use XDoclet (we’ll discuss this a little later) to help
    with your persistence layer. We expect you’ll be very happy with it.


    Persistence Options


    In Chapter 9, you spent a good bit of time evaluating the different persistence
    options available, so we won’t bother to repeat that discussion here. Instead,
    we’ll just let you know that we chose to use Hibernate on the example struts-resume
    project. We’re very happy with it so far.


    It seems to have great documentation and also has XDoclet support. XDoclet support
    was a big seller for us, because we want to generate most of the database access
    code.


    ■**Note** The examples in struts-resume are modeled after Dave Johnson’s examples
    (author of Chapter 9) in his sample application as well as help we’ve received
    from the Hibernate development mailing list.


    **Enhancing Struts ActionForm Development**


    There are a few features of Struts that are often overlooked but may be useful
    when you come to develop your ActionForms. Let’s take a look at them.


    Using DynaActionForms


    The DynaActionForm was added as part of Struts 1.1\. It basically allows you to
    declare your form’s properties via XML, rather than writing a form using Java.
    The advantage for the developer is that you don’t have to write and compile an
    ActionForm. However, if you’re using XDoclet to generate an ActionForm, then you
    might not have a use for a DynaActionForm. They can be handy for providing simple
    forms that aren’t persisted—for instance a MessageForm that is used to send e-mail.
    Let’s use that as an example and look at its settings:


    <form-bean name="messageForm"


    type="org.apache.struts.action.DynaActionForm">


    <form-property name="name" type="java.lang.String"/>


    <form-property name="email" type="java.lang.String"/>


    <form-property name="subject" type="java.lang.String"/>


    <form-property name="content" type="java.lang.String"/>


    </form-bean>


    Just like an ActionForm, all your properties should be strings for interaction
    with the web tier.


    Only object types (String, Integer, or Boolean) can be used as the type for the
    <form-property> element. Primitives aren’t allowed. After specifying the form’s
    properties, you can reference the form in an action mapping just like a regular
    ActionForm or ValidatorForm. A DynaActionForm can also utilize the Validator by
    using a type of org.apache.struts.action.DynaValidatorActionForm.


    513-0 ch15.qxd 11/14/05 5:38 PM Page 591


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **591**


    This form can then be retrieved in your Action class using the following code:
    DynaActionForm msgForm = (DynaActionForm) form;


    To retrieve values from the form, you must use the form.get(propertyName) syntax
    (similar to how values are retrieved from a HashMap):


    String subject = (String) theForm.get("subject"); You can also create and initialize
    a DynaActionForm (or DynaValidatorActionForm) in an Action class:


    DynaActionForm msgForm = (DynaActionForm) DynaActionFormClass'
