    Using the Iteration Tag


    Using the iteration tag is also straightforward, with the same usage pattern as
    the JSTL


    <forEach> tag:


    <%@ taglib uri="/WEB-INF/tlds/ch07.tld" prefix="ch07" %> Countries :


    <ul>


    <ch07:iterate var="country" collection="${countries}">


    <li>${country.name}


    </ch07:iterate>


    </ul>


    The tag handler places each object in the collection into page scope (under the
    name supplied by the var attribute); the JSP page uses a simple EL expression
    to access that object on the page.


    Before the introduction of JSTL, this was the only way that iteration functionality
    could be implemented without resorting to Java code on the page. Consequently,
    fewer and fewer developers will need to use the functionality provided by the
    IterationTag interface, although for completeness we’ve included it here. Most
    of the time, you will probably be able to use the JSTL iterator to accomplish
    what you need. However, at times you may need the additional flexibility that
    building your own tag can provide. With this in mind, don’t forget that it’s easier


    513-0 ch07.qxd 11/9/05 4:49 PM Page 317


    C H A P T E R 7 ■ C L A S S I C TA G S


    **317**


    to achieve the same functionality with the SimpleTag interface. You saw an example
    of this with the <list> tag in the previous chapter, in which the doTag() method
    repeatedly invoked the body content in the same way as you’ve just seen with the
    <iterate> tag. Additionally, this technique is useful if, for some reason, you
    can’t work with a container that supports JSP 2.0 or greater.


    The final topic that you will look at in this chapter is body tags, a concept
    that takes iteration tags one step further by allowing precise control over what
    actually gets written back to the page.


    **Body Tags**


    So far, you’ve seen that classic tags can evaluate their body content zero, or
    one or more, times. This is particularly useful when the content to be evaluated
    is trivial or, in other words, when no transformation or manipulation of the content
    is required before it’s output to the page. If such transformation is required
    prior to the content being written to the page, you must turn to the BodyTag interface.


    **The BodyTag Interface**


    The BodyTag interface (see Listing 7-13) further extends the IterationTag interface
    to add even more flexibility and capability.


    **Listing 7-13.** *BodyTag.java*


    package javax.servlet.jsp.tagext;


    import javax.servlet.jsp.JspException;


    public interface BodyTag extends IterationTag {


    public final static int EVAL_BODY_BUFFERED = 2;


    void setBodyContent(BodyContent b);


    void doInitBody() throws JspException;


    }


    Once again, this interface adds another new constant and two methods that are
    related to the body content of the tag in question. As you might expect, this
    means a slightly different life cycle for body tags.


    **The Body Tag Life Cycle**


    Figure 7-7 summarizes the tag life cycle.


    Setting the Context


    As with all of the other classic tags, first the contextual information (the PageContext
    and parent Tag) is passed to the tag handler instance.


    513-0 ch07.qxd 11/9/05 4:49 PM Page 318


    **318**


    C H A P T E R 7 ■ C L A S S I C TA G S


    Initialize context and attributes


    doStartTag()


    [EVAL_BODY_BUFFERED]


    setBodyContent()


    doInitBody()


    [EVAL_BODY_INCLUDE]


    Evaluate body


    doAfterBody()


    [SKIP_BODY]


    [EVAL_BODY_AGAIN]


    [SKIP_BODY]


    doEndTag()


    [EVAL_PAGE]


    Evaluate rest of page


    [SKIP_PAGE]


    **Figure 7-7.** *The life cycle of a tag handler that implements the BodyTag interface*
    The Start Tag


    After the context has been set, the doStartTag() method is called, and with the
    BodyTag interface there are three different return values.


    As before, the doStartTag() method can return SKIP_BODY, meaning that the body
    content is ignored and processing proceeds to the doEndTag() method, or it can
    return EVAL_BODY_INCLUDE, signaling that the body content should be evaluated
    and included in the page.


    The difference is that the doStartTag() method can now return the EVAL_BODY_BUFFERED


    constant defined in the BodyTag interface. Returning this value indicates to the
    JSP container


    513-0 ch07.qxd 11/9/05 4:49 PM Page 319


    C H A P T E R 7 ■ C L A S S I C TA G S


    **319**


    that you want to use the features provided by the BodyTag interface—specifically,
    that the tag handler will manipulate the body content.


    Setting the Body Content


    Assuming that you return EVAL_BODY_BUFFERED from the doStartTag() method to indicate
    that you want to manipulate the body content, the setBodyContent() method is called
    on the tag handler so that the tag can hold on to the BodyContent reference and
    use it later. As you may remember from the previous chapter, simple tags have
    a similar method called setJspBody() that passes a JspFragment instance representing
    the actual body of the tag. With the BodyTag interface, this process is slightly
    different. Instead of being passed a JspFragment representing the body content
    that can subsequently be invoked, the tag handler is passed an object of type
    BodyContent.


    Throughout our look at classic tags, generating content was simply a matter of
    finding the JspWriter instance associated with the page and outputting the content.
    The BodyContent class is a subclass of JspWriter and can be thought of as a temporary
    scratch-pad area to which content can be written. Behind the scenes, when the
    JSP container calls the setBodyContent() method, the regular output stream (the
    JspWriter) is swapped out for a BodyContent object—


    the same one that gets passed to the tag. This means that any content output from
    this point onward (until the end tag is reached) is actually written into this
    temporary scratch pad and not to the page.


    The JSP container then calls the doInitBody() method, which can be used to set
    up any state before the body content is eventually evaluated. The effect of replacing
    the original JspWriter is that when evaluated, any content between the start and
    end tags is also written into the BodyContent object, providing you with a way
    to access the generated content and manipulate it later.


    After the Body


    As with the IterationTag interface, the doAfterBody() method is called after the
    body content has been evaluated. There are no changes here; the method should
    return EVAL_BODY_AGAIN or SKIP_BODY to signal whether more evaluations of the
    body content are required.


    The End Tag


    Finally, regardless of whether or not the body was evaluated and reevaluated multiple
    times, the doEndTag() method is called in the same way as the other tags you’ve
    seen in this chapter.


    Again, possible return values are EVAL_PAGE and SKIP_PAGE.


    At this point in the life cycle, all of the body content has been evaluated and
    output into the BodyContent object (the temporary scratch pad). With this in mind,
    you can now take this content and manipulate/transform it. When you’re done, you
    can then write the final result to the original JspWriter instance.


    **The BodyTagSupport Class**


    Because the functionality associated with the BodyTag interface is slightly different
    from that provided by the other classic tag interfaces, another convenient base
    class, BodyTagSupport,


    513-0 ch07.qxd 11/9/05 4:49 PM Page 320


    **320**


    C H A P T E R 7 ■ C L A S S I C TA G S


    has been provided for you to use as a starting point when building body tags.
    Talking about the BodyTag interface makes it sound fairly complex, so let’s see
    it in action.


    **Filtering Content**


    Imagine that you’re building a web-based mailing list or forum, a great example
    of which can be found at http://saloon.javaranch.com. One of the features that
    many of these types of forums offer is the ability to hide e-mail addresses from
    users so that potential spammers can’t obtain this information. This facility,
    a piece of presentation logic, is undoubtedly useful not only for this project,
    but also perhaps for other web applications that you may build in the future.
    Therefore, let’s wrap it up as a custom tag.


    Building the Filter Tag Handler


    Listing 7-14 shows the EmailAddressFilterTag, which extends the BodyTagSupport
    class.


    **Listing 7-14.** *EmailAddressFilterTag.java*


    package com.apress.projsp;


    import java.io.IOException;


    import java.util.regex.Matcher;


    import java.util.regex.Pattern;


    import javax.servlet.jsp.JspException;


    import javax.servlet.jsp.JspTagException;


    import javax.servlet.jsp.tagext.BodyTagSupport;


    public class EmailAddressFilterTag extends BodyTagSupport {


    public int doEndTag() throws JspException {


    if (bodyContent != null) {


    try {


    String content = bodyContent.getString();


    content = filter(content);


    // now clear the original body content and write back


    // the filtered content


    bodyContent.clearBody();


    bodyContent.print(content);


    // finally, write the contents of the BodyContent object back to the


    // original JspWriter (out) instance


    bodyContent.writeOut(getPreviousOut());


    } catch (IOException ioe) {


    throw new JspTagException(ioe.getMessage());


    }


    }


    return EVAL_PAGE;


    }


    private String filter(String s) {


    513-0 ch07.qxd 11/9/05 4:49 PM Page 321


    C H A P T E R 7 ■ C L A S S I C TA G S


    **321**


    Pattern p = Pattern.compile("@[A-Za-z0-9_.]+\\.[A-Za-z]{2,}"); Matcher m = p.matcher(s);


    return m.replaceAll("@...");


    }


    }


    Because you want to filter the body content of the tag, it makes sense to wait
    until that body content has been evaluated before you look at it. Therefore, you’ll
    leave the processing until the doEndTag() method is called. This way, the JSP
    container will have already evaluated the tag’s body content.


    The doEndTag() method checks that the body content object isn’t null. This is
    an important step because using this tag with an empty body content will cause
    the container to skip the call to setBodyContent().


    Next, the method uses the BodyContent object to get a copy of its contents as
    a string. After it obtains the body content as a string, it then calls a private
    helper method to filter out all the e-mail addresses.


    With the content filtered, the method deletes (clears) the original body content
    and puts the filtered copy in its place.


    To ensure that the filtered copy actually gets output to the page, you must not
    forget to write out the contents of the BodyContent object (the temporary scratch-pad
    area) back to the page. This is possible because when the BodyContent instance
    is created, it’s provided with a reference to the original (enclosing) JspWriter.


    ■**Caution** Neglecting to write the contents of the BodyContent object back to
    the enclosing writer will result in it being lost as soon as the object goes out
    of scope.


    You can see that the doEndTag() method uses a method named getPreviousOut(). The
    getPreviousOut() method is just a convenience method supplied by the BodyTagSupport
    class for getBodyContent().getEnclosingWriter().


    As far as the filter() method is concerned, you’re just using the new regular
    expressions functionality that is a part of version 1.4 of the JDK. The Pattern
    class is used to represent a compiled regular expression, and the Matcher class
    is used to perform searches and replace-ments for that pattern on a particular
    string.


    Describing the Filter Tag


    Once again, although you’ve learned some new tag handler concepts from this example,
    the actual description of the tag is pretty much same as before. Listing 7-15
    shows the new entries in the ch07.tld file for this tag. In fact, because this
    tag has no attributes, its definition is fairly short.


    **Listing 7-15.** *ch07.tld*


