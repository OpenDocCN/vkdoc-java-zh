- fmt: "For the build process, you’ll be using the power of `Ant` and `XDoclet` to\
    \ generate the deployment descriptor (`web.xml`), the Struts configuration file\
    \ (`struts-config.xml`), and even the form validation configuration file (`validation.xml`).\
    \ To speed up the development process, you’ll also use `XDoclet` to generate the\
    \ Java code for the `ValidatorForms` from `POJOs`. Also, you’ll generate Hibernate’s\
    \ XML-based mapping files to map `POJOs` to database tables.\n\nWow, that sounds\
    \ like we’re doing a lot doesn’t it?! The truth is that before we found `XDoclet`,\
    \ we were doing all of those activities manually, and it *was* a lot of work.\
    \ Using `XDoclet` (which depends on `Ant`) has made it *much* easier to create\
    \ all of the required XML artifacts for a web application and is a huge timesaver.\n\
    \nWe like using `XDoclet` because we don’t need to worry about editing our XML\
    \ files as much when developing an application. It’s simply a case of adding some\
    \ tags to a class (or method) Javadoc, and then `XDoclet` generates these files\
    \ for you. For example, we have the following normal Javadoc code at the top of\
    \ our `UserAction` class:\n\n```\n/**\n* Implementation of <strong>Action</strong>\
    \ that interacts with the {@link\n* UserForm} to retrieve/persist values to the\
    \ database.\n*\n* @author Matt Raible\n* @version $Revision: 1.5 $ $Date: 2003/06/26\
    \ 13:48:46 $\n*\n*/\n```\n\nBy adding some `XDoclet` tags to this Javadoc header,\
    \ you can generate the `<action-mappings>` definition for the `struts-config.xml`\
    \ file:\n\n```\n/**\n* Implementation of <strong>Action</strong> that interacts\
    \ with the {@link\n* UserForm} and retrieves values. It interacts with the {@link\n\
    * BusinessManager} to retrieve/persist values to the database.\n*\n* @author Matt\
    \ Raible\n* @version $Revision: 1.5 $ $Date: 2003/06/26 13:48:46$\n*\n* @struts.action\
    \ name=\"userForm\" path=\"/editUser\" scope=\"session\"\n* validate=\"false\"\
    \ parameter=\"action\" input=\"mainMenu\"\n*/\n```\n\nWhen processed by `XDoclet`,\
    \ the `@struts.action` tag will be transformed into an `<action>` element. In\
    \ your Ant build file’s (`build.xml`) `webdoclet` task, you use the following\
    \ XML to generate the `struts-config.xml` file:\n\n```\n<target name=\"webdoclet\"\
    \ description=\"Generate web and Struts descriptors\">\n    <taskdef name=\"webdoclet\"\
    \n             classname=\"xdoclet.modules.web.WebDocletTask\">\n        <classpath>\n\
    \            <path refid=\"xdoclet.classpath\"/>\n            <path refid=\"web.compile.classpath\"\
    />\n        </classpath>\n    </taskdef>\n    <webdoclet destdir=\"${webapp.target}/WEB-INF\"\
    \n               force=\"${xdoclet.force}\"\n               mergedir=\"metadata/web\"\
    \n               excludedtags=\"@version,@author\"\n               verbose=\"\
    true\">\n        <fileset dir=\"src/web\"/>\n        <fileset dir=\"${build.dir}/web/gen\"\
    />\n        <configParam name=\"cactusOn\" value=\"${enable.cactus}\"/>\n    \
    \    <deploymentdescriptor validatexml=\"true\"\n                            \
    \  servletspec=\"2.3\" sessiontimeout=\"30\"\n                              destdir=\"\
    ${build.dir}/web/WEB-INF\"\n                              distributable=\"false\"\
    >\n            <configParam name=\"security\" value=\"${security.mode}\"/>\n \
    \       </deploymentdescriptor>\n        <jsptaglib validatexml=\"true\"\n   \
    \                description=\"Tag Libraries for Security and Labels\"\n     \
    \              validateXML=\"true\"\n                   shortName=\"struts-resume\"\
    \n                   filename=\"struts-resume.tld\"\n        />\n        <strutsconfigxml\
    \ validatexml=\"true\" version=\"1.1\"/>\n        <strutsvalidationxml/>\n   \
    \ </webdoclet>\n</target>\n```\n\nThat’s all it takes to generate the following\
    \ mapping in the resulting `struts-config.xml` file (we’ve prettied the XML up\
    \ a bit to save space, but no text has changed):\n\n```\n<action path=\"/editUser\"\
    \ type=\"org.appfuse.webapp.action.UserAction\"\n        name=\"userForm\" scope=\"\
    session\" input=\"mainMenu\"\n        parameter=\"action\" unknown=\"false\" validate=\"\
    false\">\n</action>\n```\n\nOf course, you can still code your configuration files\
    \ by hand, adding your own custom data by producing specifically named files known\
    \ as **merge points**. These files are included in the main file when the items\
    \ are produced. In the directory (also known as the **merge directory**) of `struts-resume`,\
    \ a `README.txt` file lists available merge points for `web.xml`."
  raw: 'For the build process, you’ll be using the power of Ant and XDoclet to generate
    the deployment descriptor (web.xml), the Struts configuration file (struts-config.xml),
    and even the form validation configuration file (validation.xml). To speed up
    the development process, you’ll also use XDoclet to generate the Java code for
    the ValidatorForms from POJOs. Also, you’ll generate Hibernate’s XML-based mapping
    files to map POJOs to database tables.


    Wow, that sounds like we’re doing a lot doesn’t it?! The truth is that before
    we found XDoclet, we were doing all of those activities manually, and it *was*
    a lot of work. Using XDoclet (which depends on Ant) has made it *much* easier
    to create all of the required XML artifacts for a web application and is a huge
    timesaver.


    We like using XDoclet because we don’t need to worry about editing our XML files
    as much when developing an application. It’s simply a case of adding some tags
    to a class (or method) Javadoc, and then XDoclet generates these files for you.
    For example, we have the following normal Javadoc code at the top of our UserAction
    class:


    /**


    * Implementation of <strong>Action</strong> that interacts with the {@link


    * UserForm} to retrieve/persist values to the database.


    *


    * @author Matt Raible


    * @version $Revision: 1.5 $ $Date: 2003/06/26 13:48:46 $


    *


    */


    By adding some XDoclet tags to this Javadoc header, you can generate the <action-mappings>
    definition for the struts-config.xml file:


    /**


    * Implementation of <strong>Action</strong> that interacts with the {@link


    * UserForm} and retrieves values. It interacts with the {@link


    * BusinessManager} to retrieve/persist values to the database.


    *


    * @author Matt Raible


    * @version $Revision: 1.5 $ $Date: 2003/06/26 13:48:46$


    *


    * @struts.action name="userForm" path="/editUser" scope="session"


    * validate="false" parameter="action" input="mainMenu"


    513-0 ch15.qxd 11/14/05 5:38 PM Page 586


    **586**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    When processed by XDoclet, the @struts.action tag will be transformed into an
    <action> element. In your Ant build file’s (build.xml) webdoclet task, you use
    the following XML to generate the struts-config.xml file:


    <target name="webdoclet" description="Generate web and Struts descriptors">


    <taskdef name="webdoclet"


    classname="xdoclet.modules.web.WebDocletTask">


    <classpath>


    <path refid="xdoclet.classpath"/>


    <path refid="web.compile.classpath"/>


    </classpath>


    </taskdef>


    <webdoclet destdir="${webapp.target}/WEB-INF"


    force="${xdoclet.force}"


    mergedir="metadata/web"


    excludedtags="@version,@author"


    verbose="true">


    <fileset dir="src/web"/>


    <fileset dir="${build.dir}/web/gen"/>


    <configParam name="cactusOn" value="${enable.cactus}"/>


    <deploymentdescriptor validatexml="true"


    servletspec="2.3" sessiontimeout="30"


    destdir="${build.dir}/web/WEB-INF"


    distributable="false">


    <configParam name="security" value="${security.mode}"/>


    </deploymentdescriptor>


    <jsptaglib validatexml="true"


    description="Tag Libraries for Security and Labels"


    validateXML="true"


    shortName="struts-resume"


    filename="struts-resume.tld"


    />


    <strutsconfigxml validatexml="true" version="1.1"/>


    <strutsvalidationxml/>


    </webdoclet>


    </target>


    That’s all it takes to generate the following mapping in the resulting struts-config.xml
    file (we’ve prettied the XML up a bit to save space, but no text has changed):


    <action path="/editUser" type="org.appfuse.webapp.action.UserAction"


    name="userForm" scope="session" input="mainMenu"


    parameter="action" unknown="false" validate="false">


    </action>


    Of course, you can still code your configuration files by hand, adding your own
    custom data by producing specifically named files known as **merge points**. These
    files are included in the main file when the items are produced. In the directory
    (also known as the **merge** **directory**) of struts-resume, a README.txt file
    lists available merge points for web.xml,


