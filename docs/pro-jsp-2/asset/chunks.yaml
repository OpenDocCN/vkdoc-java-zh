- fmt: "<security-example:secure mode=\"secured\"/> 这里，`mode`可以是`secured`、`unsecured`或`either`。此外，如果你省略`mode`属性，它将默认为`secured`模式。\n\
    \n基于Servlet示例，其中变量`secureLogin`在应用作用域中设置，你可以在`login.jsp`页面上检索并使用它来强制SSL：\n\n```\n\
    <c:if test=\"${applicationScope.secureLogin == 'true'}\">\n  <security-example:secure\
    \ />\n</c:if>\n```\n\n## 安全套接层（SSL）总结\n\n希望本节内容能让你了解如何在应用程序中为特定Servlet控制SSL。如果你需要为整个应用程序保证SSL，我们建议在`web.xml`文件中将`<transport-guarantee>`元素设置为`INTEGRAL`或`CONFIDENTIAL`。\n\
    \n该值用于指定客户端和服务器之间数据应如何发送。在示例应用程序中，该值设置如下：\n\n```\n<user-data-constraint>\n  <description>\n\
    \    Encryption is not required for the application in general.\n  </description>\n\
    \  <transport-guarantee>NONE</transport-guarantee>\n</user-data-constraint>\n\
    ```\n\n表12-2展示了Servlet规范如何定义这些值。\n\n**表12-2.** `<transport-guarantee>`值的含义\n\n\
    | 值 | 描述 |\n| --- | --- |\n| `NONE` | 应用程序不需要任何传输保证。这与不在`web.xml`中包含`<user-data-constraint>`元素相同。\
    \ |\n| `INTEGRAL` | 应用程序要求客户端和服务器之间发送的数据在传输过程中不能被更改。 |\n| `CONFIDENTIAL` | 应用程序要求数据传输方式能防止其他实体观察传输内容。\
    \ |\n\n大多数Servlet容器会在该值设置为`INTEGRAL`或`CONFIDENTIAL`时将客户端切换到SSL。虽然这种切换对于需要它的应用程序来说很好，但在实现时必须小心。在大多数Servlet容器上，如果你将此值设置为`INTEGRAL`或`CONFIDENTIAL`，你的应用程序将*仅*在SSL端口上可用。巧妙之处在于，当你尝试访问应用程序时，服务器会自动将你重定向到`https://serverName:443`。但是，如果你在443以外的端口上运行安全服务器，你将在Internet\
    \ Explorer中收到“服务器未找到”错误。这引出了我们的下一个技巧：使用过滤器检查对受保护资源的请求。\n\n## 在受保护资源上使用过滤器\n\n\
    当过滤受保护资源时，可以使用相同的SSL切换使整个应用程序在任何端口上都安全，并且还可以检索用户信息。用户通过应用程序认证后，你可能希望获取关于该用户的更多信息。容器管理安全性的一项限制是，你只能知道用户的用户名及其所属角色。为了解决这个问题，我们建议使用一个过滤器，检查会话中是否存在`User`对象，如果不存在则填充它。为了演示这一点，你需要创建一个`User`对象、数据库访问代码以及一个与之通信的数据库。\n\
    \n> **注意**：在安全项目中，你可以通过使用`setup-db` Ant任务来创建一个填充了数据的MySQL数据库。下载文件中包含一个`security-example.sql`文件，你可以使用它来创建和填充数据库。\n\
    \n现在你已经填充了数据库，可以通过过滤器从中获取信息。我们创建了一个名为`ActionFilter.java`的过滤器，它映射到与受保护资源相同的`<url-pattern>`（`*.do`）。这样，它只会在用户成功认证后被调用。我们喜欢使用一个辅助类来调用持久层——这个类名为`UserManager.java`，它使用了**业务委托**模式。\n\
    \n> **注意**：你可以在`http://java.sun.com/blueprints/corej2eepatterns/Patterns/BusinessDelegate.html`找到关于业务委托模式的更多信息。\n\
    \n通过使用业务委托来对过滤器隐藏实现细节非常重要，这样你就可以随时切换到新的持久层（例如，EJB）。我们不深入探讨`UserManager`及其工作原理的细节，所以请相信我们，`UserManager.getUser()`方法返回一个填充了用户属性的JavaBean。看一下这个过滤器的部署描述符：\n\
    \n```\n<filter>\n  <filter-name>actionFilter</filter-name>\n  <display-name>Action\
    \ Filter</display-name>\n  <filter-class>com.apress.projsp.filter.ActionFilter</filter-class>\n\
    \  <init-param>\n    <!-- Change this value to true if you want to secure your\
    \ entire application. -->\n    <param-name>isSecure</param-name>\n    <param-value>false</param-value>\n\
    \  </init-param>\n</filter>\n...\n<filter-mapping>\n  <filter-name>actionFilter</filter-name>\n\
