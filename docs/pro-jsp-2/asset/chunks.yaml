    will change the header and footer for all* *the pages.*


    This example demonstrates how useful the include directive is for constructing
    component-based web applications that share a consistent look and feel throughout,
    are extremely maintainable, and do not suffer from problems caused by code duplication.


    The taglib Directives


    A tag library contains a collection of actions (also known as tags) that can be
    grouped together to perform some form of logic. These actions are XML based, so
    their use is considerably easier for a non-Java-speaking UI designer. Of course
    another major benefit is that they can encapsulate large amounts of programmatic
    logic into a single line of code, which is a much better solution in terms of
    readability and maintainability and of course reuse, when compared to the ugly
    scriptlet-based approach you saw earlier.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 32


    **32**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    Tag libraries come in two flavors these days. The first is custom tag libraries,
    which have generally been put together by a development team or acquired from
    another team or project or even the Internet—and as of JSP 2.0, from the JSTL,
    which contains a set of useful actions that are applicable in some form to almost
    every web application in use today.


    To use a custom tag library, the web container needs to be made aware of specific
    information about the library itself. A special file called a **tag library descriptor**
    (TLD) is used for this purpose. The XML-based TLD file is used to provide general
    descriptive information about the custom tag library, such as a description of
    its usage and the JSP version that the tag supports.


    More important, the TLD file contains essential information about each of the
    custom actions or tags that are included inside the tag library, such as which
    attributes are permitted by which tags, whether the tags accept body content,
    and so on.


    After the JSP container is made aware of the TLD for a particular custom tag library,
    the JSP


    developer can use any of the tags declared inside the library. Like custom Java
    classes (in fact, any class that doesn’t reside in the core java.lang package),
    tag libraries must be imported into the page before they can be used. You’ve seen
    that Java classes are imported into a JSP page by using a JSP page directive,
    and in a similar fashion, tag libraries are imported by using the taglib directive.


    The syntax for the taglib directive is as follows:


    <%@ taglib {uri="/tagLibraryURI" | tagdir="/WEB-INF/tags/ *dirname"*


    prefix="tagPrefix" %>


    The attributes are shown in Table 1-2.


    **Table 1-2.** *Attributes for the taglib Directive* **Attribute**


    **Description**


    uri


    Can be either an absolute or a relative Uniform Resource Identifier (URI) that
    identifies the TLD, and therefore, the tag library that is associated with the
    prefix.


    tagdir


    Indicates this prefix is to be used to identify tag extensions installed in the
    WEB-INF\tags directory or a subdirectory. An implicit tag library descriptor is
    used.


    A translation error must occur if the value does not start with WEB-INF\tags.
    A translation error must occur if the value does not point to a directory that
    exists.


    A translation error must occur if used in conjunction with the uri attribute.


    prefix


    Indicates a uniquely identifiable string, which is used in the <prefix:tagname>
    declaration to identify the particular tag in use.


    Note that prefixes that start with any of the following aren’t allowed because
    they’re reserved by Sun: jsp, jspx, java, javax, servlet, sun, and sunw.


    All prefixes must follow the naming convention as specified in the XML


    namespaces specification.


    The current version of the JSP specification doesn’t support empty prefixes.


    There are, in fact, four ways that the taglib directive can be used to make a
    tag library available to JSP page authors, and you’ll see each in turn.


    **Option 1—Absolute URI**


    The first option for using the taglib directive passes an absolute value in the
    uri attribute that represents the location of the TLD file:


    <%@ taglib uri="/WEB-INF/tlds/myTaglib.tld" prefix="myPrefix" %>


    513-0 ch01.qxd 9/30/05 4:08 PM Page 33


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **33**


    The location of the TLD file is explicitly given by the uri attribute. In this
    example, the WEB-INF\tlds\myTaglib.tld file describes the tag library, and any
    references to any of the tags inside this library must be prefixed with myPrefix
    to distinguish the tag from any other tag library that may be available.


    For example, if a tag named displayImage were included in the library, its use
    would look something like this:


    <myPrefix:displayImage file="logo.jpg" /> The taglib directive is typically used
    in this form during development, when the locations of resources, such as images
    and TLDs, haven’t been finalized. Perhaps the application hasn’t been packaged
    into a WAR file and still exists in exploded directory format; therefore, an absolute
    value for the TLD file is usually the most convenient.


    Leaving your taglib directives in this form after the development process has
    finished is perhaps not the most flexible option available. Every tag library
    used in the application would, therefore, have its TLD location hard-coded into
    the JSP source. If the location of a TLD had to change for some reason, each JSP
    page would have to be altered, which could potentially be a long-winded, error-prone
    exercise.


    **Option 2—Relative URI**


    The second form of the taglib directive uses a relative URI to indicate the location
    of the TLD


    file. If a relative URI is to be used, a relative mapping must be configured in
    the web application’s deployment descriptor by using the <taglib> element. So,
    to use a relative URI in the taglib directive, we would provide a mapping in the
    deployment descriptor as shown in this example:


    <webapp>


    <taglib-uri>/myTaglib</taglib-uri>


    <taglib-location>/WEB-INF/tlds/myTaglib.tld</taglib-location>


    </webapp>


    The <taglib-uri> element provides an alias to the TLD at the location given by
    the


    <taglib-location> element. If the deployment descriptor for a web application
    declared the relative URI as shown, any JSP pages contained in the web application
    could import the available tag library by using the /myTaglib URI:


    <%@ taglib uri="/myTaglib" prefix="myPrefix" %> The taglib directive no longer
    explicitly declares the location of the TLD file, but instead relies upon the
    existence of a relative URI mapping in the application’s deployment descriptor.


    This form of the directive is the most popular because of the flexibility it provides.
    For example, by enabling the relative URI mapping to be set in the deployment
    descriptor, the location of the TLD files can effectively be set at deployment
    time, and any changes to the location can be made very simply in the one place.


    **Option 3—Packaged JAR**


    The third use of the taglib directive provides an absolute path to an external
    JAR file. As the name suggests, a JAR file is simply a way of packaging compiled
    Java classes and resources into a compressed archive file that can be placed into
    your application’s class path for use.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 34


    **34**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    Often when you use a third-party software component, it will be distributed as
    a JAR file. JAR


    files are created by using the %JAVA_HOME%\bin\jar.exe utility. Further information
    on its usage may be found by simply running the jar command without any parameters.


    As mentioned, the taglib directive can accept an absolute path to a JAR file as
    the value of the uri attribute. This form requires that the JAR file contain all
    the tag handler classes as well as the TLD file, which must be located inside
    the META-INF directory of the JAR file.


    This particular form of packaging is most commonly used when tag libraries are
    being used from external sources, perhaps when they’re purchased from a third
    party or from another application. It provides a good way to encapsulate all the
    necessary aspects of a tag library into one distributable component.


    Let’s look at an example:


    <%@ taglib uri="/WEB-INF/lib/myTaglib.jar" prefix="myPrefix" %> The entire tag
    library is stored in a single component inside the WEB-INF\lib directory, where
    it will be added to the web application’s class path, from where it’s available.


    The one downside to packaging your tag libraries into an external JAR file is
    that the TLD


    file is difficult to access. Any change to the TLD elements requires the JAR to
    be extracted first and then repackaged. Of course, the advantage of this method
    is that your tag libraries are self-contained and easy to distribute and reuse.


    **Option 4—Tag Files**


    The final use of the taglib directive provides a path to a directory that contains
    tag files. Tag files are special JSP files that end with the suffix .tag or .tagx.
    They can contain the same kinds of JSP elements as in a JSP page, with some exceptions.
    In other words, a tag file implements a tag by using JSP code rather than Java
    code. The container creates an implicit TLD for the files contained in the directory
    and makes the custom tags available to the JSP author. See the “Tag Files” chapter
    in the JSP 2.1 specification for more details on syntax and usage of tag files.


    **Action Elements**


    We mentioned earlier how difficult it is to read and maintain JSP pages that are
    full of scriptlet code. Not only are such pages “ugly,” but they’re almost meaningless
    to a web developer unless that developer also happens to be a Java developer who
    may have written the scriptlet code in the first place.


    A better alternative is to use existing actions (tags) provided by a tag library
    that encapsulate pieces of functional logic. These actions make JSP pages much
    cleaner and more readable.


    Also, because they’re XML tag-based, they are usable by a non-Java UI developer.
    In JSP 2.1


    there are three types of action elements:


    • Standard actions


    • Custom actions


    • JSTL actions


    Let’s take a brief look at each one.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 35


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **35**


    Standard Actions


    The JSP standard actions have been in existence since the first release of the
    JSP 1.0 specification and provide the JSP page author with a (relatively small)
    selection of useful actions. The majority of the provided functionality is based
    on the manipulation of JavaBeans components as well as the dynamic inclusion of
    files at request time and URL forwarding.


    Let’s look at some of the more popular standard actions to get a “flavor” of their
    functionality.


    **The <jsp:include> Action**


    You saw earlier how the include directive provides a simple mechanism for including
    the contents of a separate web component into the declaring JSP page at translation
    time.


    The <jsp:include> action provides a similar facility but with some subtle differences.
    The


    <jsp:include> action is actually executed at request time, thereby enabling the
    inclusion of both static and dynamic content and thus providing a more flexible
    approach.


    Another major difference is that the <jsp:include> action doesn’t include the
    actual content from the included resource in the same manner as the include directive.
    Instead, the


    <jsp:include> action will include any output generated by the included resource
    directly to the JspWriter assigned to the implicit out variable. This means that
    you can specify any different type of web resource, such as another JSP page or
    servlet, as long as it produces content of the same type as the calling JSP page.


    The syntax for using the standard include action is as follows:


    <jsp:include page="relativeURL" flush="true"/> Here you can see the action has
    two attributes. The page attribute is mandatory and contains a relative URL to
    the resource to be included, in the same way that the file attribute was interpreted
    by the include directive. The second attribute, flush, specifies whether the body
    of the response should be “flushed,” or sent to the client browser before the
    page inclusion. The flush attribute is optional and defaults to false if not specified.


    Because the flush attribute can cause buffered content to be returned to a client
    before the included resource is executed, any included resources may not set any
    response headers.


    We mentioned earlier that the <jsp:include> action allows static as well as dynamic
    content to be included, and we hinted that this ability offers flexibility that
    isn’t achievable by using the include directive. One example of such flexibility
    is that the page attribute can be specified via a request parameter, because the
    <jsp:include> action isn’t executed until the main page is requested:


    <jsp:include page="${param.nextPage}" /> Here you can see how the value of the
    page attribute isn’t known until the main JSP page containing the <jsp:include>
    is requested and the value is obtained by extracting a request parameter by using
    EL. In other words, it’s possible to create dynamic content that is so dynamic,
    its content isn’t known until request time!


    You can include additional request parameters with the request that is passed
    to the included page. You do that with the <jsp:param> element:


    <jsp:include page="includedPage">


    <jsp:param name="userName" value="Dan" />


    </jsp:include>


