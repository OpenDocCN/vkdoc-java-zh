    JSP page, that page can read or write the property when we use the #{flight.origination}


    expression in the page. The searchForm.jsp page uses the expression with input
    fields. When we submit this page to the application, the values entered into the
    fields will be used to set the property in the JavaBean.


    In a real web application that provided an online flight reservation system, the
    system would search for and display flights after the user submits a request.
    In this example, however, we will start by simply echoing the search parameters
    back to the user. This is accomplished in the searchResults.jsp page, shown in
    Listing 5-3.


