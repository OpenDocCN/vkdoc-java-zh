    <description>


    Outputs the current date and time to the page.


    </description>


    </tag>


    </taglib>


    At first glance this file looks fairly complicated, but in fact only a small portion
    of it is applicable to the custom tag that you’re building. The first thing you
    notice is the standard XML header that indicates which version of XML you’re using:


    <?xml version="1.0" encoding="UTF-8" ?> Next is the root element, along with the
    details of the XML schema to which this document must conform:


    <taglib


    xsi:schemaLocation="http://java.sun.com/xml/ns/javaee/web-jsptaglibrary_2_1.xsd"


    version="2.1">


    ... body of XML document ...


    </taglib>


    ■**Note** For backward compatibility, JSP containers must still support the DTD-based
    (Document Type Definition) TLDs that were a part of the earlier JSP 1.1 and JSP
    1.2 specifications. This means that TLDs can still be defined using these older
    mechanisms. This is particularly useful for tag library developers who are targeting
    older versions of the specification, or for those developers who want to reach
    the widest audience.


    The next set of elements within the TLD file, nested between the start and end
    <taglib> elements, describes the tag library. Rather than bundle custom tags individually,
    all tags must be part of a tag library. Implementing this requires grouping the
    tags and defining them within the same TLD file. Using those tags requires importing
    the tag library with the taglib directive.


    For this example, you’ll bundle all the tags that you’ve built in this chapter
    into their own tag library, the definition of which is as follows:


    <description>


    Tag library for Professional JSP 2.1, Chapter 6.


    </description>


    <jsp-version>2.1</jsp-version>


    <tlib-version>1.0</tlib-version>


    <short-name>ch06</short-name>


    <uri>http://www.apress.com/projsp/ch06</uri> First is a short textual description
    of the tag library, followed by the jsp-version and tlib-version elements, which
    allow you to define the required JSP and tag library versions, respectively.


    513-0 ch06.qxd 11/17/05 8:41 PM Page 272


    **272**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    Next is a short name for the tag library, used for identification purposes in
    JSP authoring or web-application management tools. For example, it could be used
    in a menu that lists the tag libraries available to the user.


    Finally, you have the uri element. This causes the most confusion when writing
    tag libraries. Although the value of this element should be a valid URI, this
    simply represents a unique identifier for the tag library. The example uses the
    absolute URI http://www.apress.com/


    projsp/ch06, even though there’s nothing to stop a relative URI such as /ch06
    or even /myTaglibs/


    chapter06 from being used instead. What is important here is that the URI is unique
    among the tag libraries that you’ll be using. The URI doesn’t have to exist in
    the real world; if you go to http://www.apress.com/projsp/ch06 you’ll find nothing
    there—it’s simply a unique, symbolic identifier.


    The final part of the TLD file has the tag description itself:


    <tag>


    <name>datetime</name>


    <tag-class>com.apress.projsp.DateTimeTag</tag-class>


    <body-content>empty</body-content>


    <description>


    Outputs the current date and time to the page.


    </description>


    </tag>


    A definition of a custom tag falls between the start and end <tag> tags and in
    this example has four characteristics that are being defined. First is the name
    of the tag. This doesn’t have to reflect the actual class name of the tag handler,
    but rather the name that you would like to use for the tag on the page. Following
    this is the fully qualified class name of the tag handler.


    ■**Caution** One of the common pitfalls encountered when building custom tags
    is that the tag handler classes are often placed in the default package—that is,
    the package statement is omitted from the source code. Because of the way that
    JSP pages are translated into Java servlets, attempting to use unpackaged tag
    handler classes almost always results in exceptions, such as ClassNotFoundException,
    when the tag is used on the page. To ensure that this doesn’t happen, you should
    always place your tag handler classes within a package.


    Next, you have a definition of the type of body content for the tag. Earlier in
    this chapter, you looked at the various types of body content that a custom tag
    can have, and it’s here that this is defined for a custom tag. For the <datetime>
    tag, the body content is stated to be empty, meaning that no content is required
    or permitted between the start and end tags. Because the


    <datetime> tag simply outputs the current date and time to the page, it’s not
    necessary for this tag to have any body content. The <body-content> element was
    optional prior to JSP 2.0\. It is now required when writing TLD files.


    Finally, there’s a short description about the tag itself. Again, this is optional
    but it’s useful for anybody reading the TLD file, whether it’s somebody on your
    own team using the tag on your project, or somebody on the other side of the world
    who is reusing your tag library on their own project.


