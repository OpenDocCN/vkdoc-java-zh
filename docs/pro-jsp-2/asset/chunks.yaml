    **One-Layer Architecture**


    In the simplest JSP data access architecture, an application accesses data directly
    from the presentation layer. You might be tempted to use this type of architecture
    because it seems like the easy route. After all, you don’t have to design and
    implement a business layer or a data layer. Figure 9-5 illustrates the single-layer
    architecture. As you can see, the presentation layer not only depends on the Servlet
    API, but also has a direct dependence on the data access technology, which might
    be JDBC, JDO, or some other persistence framework.


    Web


    Presentation Tier


    Browser


    Servlet


