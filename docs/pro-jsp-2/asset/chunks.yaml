    Security in Web Applications


    **A** web application lives a hazardous existence in the land of 1s and 0s. The
    Internet—the virtual environment we all know and love—can be a dark and dangerous
    place. It’s filled with calm, collected programmer types like us, but there are
    also zealous hackers wandering through the dark alleys, scanning for open ports
    and passwords to steal. Is your web application safe? Have you protected your
    resources from the vulnerable, open, and sometimes dangerous information superhighway?
    In such a treacherous environment, most web applications will have security requirements,
    such as encrypting passwords or protecting certain pages from unauthorized viewing.
    Sun Microsystems has come to the rescue and made this easier for Java developers.
    In the Java Servlet specification, compliant containers are required to have built-in
    mechanisms to support your security requirements.


    In this chapter, we will focus on building several examples that show different
    methods for authentication and access control. A more common name for these methods
    is **declarative** **security**, which basically involves changing an XML file
    (web.xml) to control who can log in and who can do what. This allows you to keep
    an application’s security configuration separate from your servlet and JSP code.
    Declarative security can be very helpful in making your application more portable
    across application servers, as well as making it easier for a deployer (versus
    a developer) to change.


    This chapter covers the aspects of security that we’ve encountered as web developers,
    particularly with JSP-based web applications. In this chapter, you will look at
    the following:


    • Authentication mechanisms (form, basic, digest, and client certification)


    • Secure Sockets Layer (SSL) and security certificates


    • Java Authentication and Authorization Service (JAAS)


    • Form-based authentication tips and tricks


    • Servlet 2.5 changes


    **Overview of Application Security**


    First, we should define “authentication” and “authorization.” **Authentication**
    is the process by which a web application verifies that *you are who you say you
    are*. For example, when a user logs in to a web page with a username and password,
    the web application validates the entered credentials against its user data store
    (for example, file-, database-, or Lightweight **469**


    513-0 ch12.qxd 11/17/05 4:15 PM Page 470


    **470**


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    Directory Access Protocol [LDAP]-based) and the login succeeds or fails. **Authorization**,
    on the other hand, occurs when the application checks to see whether you’re *allowed*
    to do something. For example, to delete a user from the database, you need to
    be an administrator.


    Having security built into servlet containers isn’t something new in the Servlet
    2.5


    specification—it’s been around since Servlet 2.2 with the advent of the web.xml
    deployment descriptor. The security features that all servlet containers provide
    are as follows:


    • **Authentication**: The process of proving your identity to an application


    • **Access control for resources**: The means by which interactions with resources
    are limited to users, roles, or programs for the purpose of enforcing integrity,
    confidentiality, or availability constraints


    • **Data integrity**: The means for proving that a third party hasn’t modified
    information while it was in transit


    • **Confidentiality or data privacy**: The means used to ensure that information
    is made available only to users who are authorized to access it So far, you’ve
    learned how to develop the different components in a web application. Now we’ll
    show you how to use the built-in mechanisms of the servlet and JSP APIs to configure
    authentication and authorization. It’s really quite simple. Container-managed
    authentication, where you configure or *declare* in your web.xml deployment descriptor
    file who can access your web application, is one of these built-in mechanisms,
    and it takes only about 5 minutes to set up when you’re using a Java EE–compliant
    server.


    ■**Note** When we refer to an “application” in this chapter, we’re speaking about
    a web application unless otherwise specified. When we refer to “application servers”
    or “servlet containers,” we’re speaking about Java EE application servers that
    have a servlet container.


    In this chapter, we’ll concentrate on securing the front end of an application.
    However, security is important in all tiers of an application, from the presentation
    layer (JSP pages, HTML, JavaScript) to the underlying hardware and the network
    that the application uses. You must ask yourself whether your database, network,
    and operating system are secure. If you leave any of these open to attack, there
    would be no point in securing the front end of your application.


    ■**Note** For more information on securing your database, network, or operating
    system, see http://


    www.owasp.org and http://online.securityfocus.com.


    As a web developer, you shouldn’t be tasked with the security in these areas,
    but it’s something you should be aware of. You also need to prevent your application
    from a **denial**


    513-0 ch12.qxd 11/17/05 4:15 PM Page 471


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    **471**


    **of service (DoS)** attack, in which your application or site is attacked by
    an enormous number of hits at the same time. Most good application servers have
    mechanisms to handle this, but it’s a good idea to test for DoS if you’re developing
    a highly visible site or application.


    In this chapter, you will see how to build a secure application, complete with
    user authentication and authorization. Using the security mechanisms in this chapter
    will further translate into the other layers of your application, particularly
    if you’re using Enterprise JavaBeans (EJBs).


    We’ve worked on projects in the past in which we rolled our own security mechanism.


    Although it worked well (interfacing with LDAP), it was a real pain to maintain
    and difficult for new developers to understand. By using container-managed security,
    your application will be much easier to maintain and comprehend. You can easily
    add new roles to your application by adding or altering a few lines in your application’s
    deployment descriptors. Using container-managed security also makes it easy to
    switch from using a file-based user data store (or realm) to a database or LDAP-based
    realm. If you use what Java EE provides—and a new developer should be familiar
    with Java EE—then understanding your application’s architecture will be a breeze.


    In the Servlet 2.5 specification, not much is new regarding security. The specification
    still recommends that you use the deployment descriptor as your primary vehicle
    to implement security. This is so the application developer doesn’t get bogged
    down with implementation details, and the application deployer has control over
    matters such as which roles to allow, which resources to protect, and so on. It’s
    easy to roll your own security mechanism when you fulfill both the application
    developer and application deployer roles on your development team. However, if
    you work in a large team or you’re developing a product for customers to install,
    an application with declared security will be much easier to maintain. Read on,
    and we’ll show you how easy it is to develop and maintain container-managed security.


    **Using Authentication**


    One of the most popular JSP/servlet sample applications produced today is the
    “how to log in” application. This application usually consists of a couple of
    JSP pages, some Java Database Connectivity (JDBC) code to access a database, and
    possibly a tag library that rejects or allows users on the basis of their logged-in
    status. Although these elements make for easy-to-understand applications, they
    promote an overly difficult method of performing authentication.


    Container-managed authentication has existed since the Servlet 2.2 specification,
    but unfortunately many application server vendors didn’t implement it correctly.
    Tomcat has an awesome implementation of container-managed authentication. All
    that is needed is some deployment descriptor manipulation, and your resources
    are protected. The beauty of container-managed authentication is that the level
    of security is up to the developer or the deployer.


    First, we’ll define a couple of terms that we use throughout this section. According
    to the Tomcat documentation (http://jakarta.apache.org/tomcat/tomcat-5.5-doc/


    realm-howto.html), “A **Realm** is a ‘database’ of usernames and passwords that
    identify valid users of a web application (or set of web applications), plus an
    enumeration of the list of roles associated with each valid user. You can think
    of roles as similar to *groups* in Unix-like operating systems, because access
    to specific web-application resources is granted to all users


    513-0 ch12.qxd 11/17/05 4:15 PM Page 472


    **472**


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    possessing a particular role (rather than enumerating the list of associated usernames).
    A particular user can have any number of roles associated with their username.”


    All configuration settings (servlet or filter mappings, URL patterns, and so on)
    in the web.xml file relate to the root directory of your web application. They
    don’t include your application’s context path. To prove how easy it is to use
    container-managed authentication, you can add the following lines to your web.xml
    file to protect your entire application. The following <security-constraint> and
    <login-config> elements should be entered toward the bottom of your web.xml file:


    <security-constraint>


    <web-resource-collection>


    <web-resource-name>My Application</web-resource-name>


    <url-pattern>/*</url-pattern>


    </web-resource-collection>


    <auth-constraint>


    <role-name>*</role-name>


    </auth-constraint>


    </security-constraint>


    <login-config>


    <auth-method>BASIC</auth-method>


    </login-config>


    The significant elements in the preceding code are <url-pattern>, <role-name>,
    and


    <auth-method>:


    • The <url-pattern> element defines the characters to look for in a client’s request.
    This value can be a path-based pattern (such as /admin/*) or an extension-based
    pattern (such as /admin/*.jsp), and it doesn’t include the context path. Any resources
    that match this path will be secured by the container.


    • The <role-name> element indicates the roles allowed to view the secured resource(s).


    There can be one or more role names defined, and an asterisk (*) indicates all
    roles defined in the realm.


    • The <auth-method> defines the type of authentication mechanism to use, such
    as basic (a simple dialog box with the username/password) or form (a redirect
    to an HTML-based login page).


    Figure 12-1 shows an illustration of the <security-constraint> element adapted
    from a similar illustration in the Servlet 2.5 specification. As you can see,
    there are very few required elements. The <security-constraint> element can occur
    zero or more times within the <web-app> element of the deployment descriptor.
    If it occurs, then it must have a <web-resource-collection> subelement. The <web-resource-collection>
    element is required to have <web-resource-name> and <url-pattern> subelements.
    More details on how to use the <security-constraint> element can be found in the
    Servlet 2.5 specification.


    513-0 ch12.qxd 11/17/05 4:15 PM Page 473


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    **473**


    **Figure 12-1.** *The <security-constraint> element of the deployment descriptor
    is used to provide* *descriptive security to a web application.*


    When you add the <security-constraint> element to the deployment descriptor of
    a web application installed in Tomcat, the application will be protected by Tomcat’s
    default memory realm. The <security-constraint> element, through the use of the
    wildcard for <role-name>, allows all roles to access the web application.


    There should already be a tomcat user in %TOMCAT_HOME%\conf\tomcat-users.xml with
    a role tomcat and password tomcat. Thus, if you accessed a web application protected
    by the preceding <security-constraint>, you could access it with the username
    and password tomcat/tomcat. The tomcat-users.xml file in our release has the following
    entries by default:


    <tomcat-users>


    <role rolename="tomcat"/>


