- fmt: "### Other Authentication Options and Considerations\n\nThere are alternative\
    \ options to container-managed authentication if you aren’t satisfied with its\
    \ ease of development or you have stricter security requirements. The most common\
    \ option is to build a custom authentication mechanism. If you decide to go this\
    \ route, we highly recommend you look into JAAS and try to use its APIs.\n\n####\
    \ Security Filter\n\n`Security Filter` (http://securityfilter.sourceforge.net/)\
    \ is an open-source project that mimics container-managed security. It looks exactly\
    \ like container-managed security, and it supports the programmatic security methods\
    \ of `HttpServletRequest`. Unfortunately, it doesn’t automatically propagate the\
    \ `Principal` object for a user to EJB calls.\n\n#### Secure Sockets Layer Extension\
    \ for Struts\n\nThe `SSL Extension for Struts` (http://sslext.sourceforge.net/)\
    \ is good for HTTP/HTTPS switching. It is an open-source project that allows you\
    \ to configure HTTP/HTTPS switching by using modified Struts tag libraries and\
    \ configuration settings in the Struts configuration file. It was written by Steve\
    \ Ditlinger, who also authored the previously mentioned SSL switching article.\n\
    \n#### Remembering Passwords\n\nYou’ve probably seen the “remember my password”\
    \ feature on many portal sites (such as Yahoo!). Usually, this is done by storing\
    \ the user’s username and password combination in a cookie. If you have an application\
    \ that requires a login, and you’d like to add this feature, it would be fairly\
    \ simple to do, especially with Servlets 2.5. You could use a servlet as your\
    \ welcome file and check for the cookie’s existence. Of course, you could also\
    \ use a JSP to mimic this same behavior, grab the username and password cookies,\
    \ and redirect to the `LoginServlet` with these cookies as parameters. The nice\
    \ thing about most modern browsers is that they offer to remember your passwords,\
    \ and this is probably more secure than a cookie.\n\n#### Remember Me Feature\n\
    \nAs an example of how this functionality might be implemented, you’ll add a `Remember\
    \ Me` feature to the example application that comes with the code download. You\
    \ do this by using cookies to remember the username and password, and looking\
    \ for these when the user first accesses the application. If the cookies exist,\
    \ you attempt to authenticate the user. Three cookies are involved in this process;\
    \ the first two were mentioned previously. The third cookie is used to indicate\
    \ that the user wants to use the `Remember Me` feature. You then use a filter\
    \ to detect whether these cookies are present and, if so, attempt to log in the\
    \ user.\n\nFirst, add a check box to the `login.jsp` page to allow the user to\
    \ indicate that he wants the application to remember his password:\n\n```html\n\
    <input type=\"checkbox\" name=\"rememberMe\" id=\"rememberMe\" /> Remember Me\n\
    ```\n\nIf this box is selected, set a cookie to indicate that the user wants to\
    \ use this feature. Also, set a cookie to remember the user’s username and password.\
    \ Because you’re using `LoginServlet` to forward the login request to `j_security_check`,\
    \ you add the code to set these cookies in the `execute()` method:\n\n```java\n\
    if (request.getParameter(\"rememberMe\") != null) {\n    response =\n        RequestUtil.setCookie(response,\
    \ \"rememberMe\", \"true\", false);\n    response =\n        RequestUtil.setCookie(response,\
    \ \"password\",\n            StringUtil.encodeString(encryptedPassword),\n   \
    \         false);\n}\n```\n\nFor the password cookie, you use an `encodeString()`\
    \ method from the `StringUtil.java` class. This is a simple method that encrypts\
    \ the password cookie’s value by using the `sun.misc.BASE64Encoder()`:\n\n```java\n\
    public static String encodeString(String str) throws IOException {\n    sun.misc.BASE64Encoder\
    \ encoder = new sun.misc.BASE64Encoder();\n    String encodedStr = new String(encoder.encodeBuffer(str.getBytes()));\n\
    \    return (encodedStr.trim());\n}\n```"
  raw: '**Other Authentication Options and Considerations**


    There are alternative options to container-managed authentication if you aren’t
    satisfied with its ease of development or you have stricter security requirements.
    The most common option is to build a custom authentication mechanism. If you decide
    to go this route, we highly recommend you look into JAAS and try to use its APIs.


    Security Filter


    Security Filter (http://securityfilter.sourceforge.net/) is an open-source project
    that mimics container-managed security. It looks exactly like container-managed
    security, and it supports the programmatic security methods of HttpServletRequest.
    Unfortunately, it doesn’t automatically propagate the Principal object for a user
    to EJB calls.


    513-0 ch12.qxd 11/17/05 4:15 PM Page 510


    **510**


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    Secure Sockets Layer Extension for Struts


    The SSL Extension for Struts (http://sslext.sourceforge.net/) is good for HTTP/HTTPS


    switching. It is an open-source project that allows you to configure HTTP/HTTPS
    switching by using modified Struts tag libraries and configuration settings in
    the Struts configuration file. It was written by Steve Ditlinger, who also authored
    the previously mentioned SSL


    switching article.


    Remembering Passwords


    You’ve probably seen the “remember my password” feature on many portal sites (such
    as Yahoo!). Usually, this is done by storing the user’s username and password
    combination in a cookie. If you have an application that requires a login, and
    you’d like to add this feature, it would be fairly simple to do, especially with
    Servlets 2.5\. You could use a servlet as your welcome file and check for the
    cookie’s existence. Of course, you could also use a JSP to mimic this same behavior,
    grab the username and password cookies, and redirect to the LoginServlet with
    these cookies as parameters. The nice thing about most modern browsers is that
    they offer to remember your passwords, and this is probably more secure than a
    cookie.


    Remember Me Feature


    As an example of how this functionality might be implemented, you’ll add a Remember
    Me feature to the example application that comes with the code download. You do
    this by using cookies to remember the username and password, and looking for these
    when the user first accesses the application. If the cookies exist, you attempt
    to authenticate the user. Three cookies are involved in this process; the first
    two were mentioned previously. The third cookie is used to indicate that the user
    wants to use the Remember Me feature. You then use a filter to detect whether
    these cookies are present and, if so, attempt to log in the user.


    First, add a check box to the login.jsp page to allow the user to indicate that
    he wants the application to remember his password:


    <input type="checkbox" name="rememberMe" id="rememberMe" /> Remember Me If this
    box is selected, set a cookie to indicate that the user wants to use this feature.


    Also, set a cookie to remember the user’s username and password. Because you’re
    using LoginServlet to forward the login request to j_security_check, you add the
    code to set these cookies in the execute() method:


    if (request.getParameter("rememberMe") != null) {


    response =


    RequestUtil.setCookie(response, "rememberMe", "true", false); response =


    RequestUtil.setCookie(response, "password",


    StringUtil.encodeString(encryptedPassword),


    false);


    }


