    Why would anybody want to introduce yet another layer into an application? After
    all, each additional layer adds another layer of complexity, and all these layers
    cannot be good for performance. You have to think carefully before you decide
    to add another layer to your application, but there are at least two reasons that
    you might want to do so. These reasons to consider separate business and data
    layers come right off the list of trade-offs that we discussed when we introduced
    the topic of architecture:


    • **Reusability:** Someday you may want to turn your business layer into a stand-alone
    desktop application that doesn’t require a database. If your data access logic
    is mixed in with your business logic, this task is going to be difficult and error-prone.


    • **Resilience to change:** Changes in the persistence logic will be less likely
    to affect the business logic, and changes in the business logic will be less likely
    to affect the persistence logic. For example: Someday you might find that the
    O/R persistence framework you chose has a fatal flaw or is no longer going to
    be supported. You might need to replace your chosen O/R framework with something
    else, and separation of business logic and data access logic will make this task
    easier.


    Reusability and resilience to change are forms of flexibility, and most developers
    consider flexibility to be a good thing. However, it’s important to realize that
    flexibility comes at the price of added complexity, and complexity makes software
    more difficult to develop and to maintain. You don’t want to do a lot of extra
    work now for some event that may possibly occur at some point in the future, especially
    if that extra work is going to make your application more difficult to maintain.
    The following are a couple of other reasons *not* to use separate business and
    data layers:


    • Developing an abstract interface to data access isn’t an easy task. It requires
    some knowledge of each of the various data access technologies that you may wish
    to use behind that interface.


    • Hiding your data access technology behind an abstract interface may make it
    difficult to use some of that technology’s advanced features.


    The Data Access Object Pattern


    If you decide that you do want to implement a three-layer architecture and you
    do want to separate out your data access logic into a data layer, then you should
    consider using the **Data** **Access Object (DAO) pattern**. As you may already
    know, a pattern is a general design for a recurring problem. The DAO pattern is
    a general design for encapsulating data access. The DAO pattern is a popular pattern
    and is documented as part of the Sun J2EE Patterns Catalog (http://java.sun.com/blueprints/corej2eepatterns/).


    Here is how the DAO pattern works. Instead of calling the JDBC or some other persistence
    API directly from all of your Java classes that need to access data, you encapsulate
    all of your data access code in one or more data access objects, or DAOs. Typically
    a DAO will include methods for creating, retrieving, updating, and deleting objects
    from the database as well as methods for querying the database to retrieve collections
    of objects. Depending on how you implement the DAO pattern, you could have a DAO
    for each class of object in your application or you could have a single DAO that
    is responsible for creating, retrieving, updating, and deleting all of your objects.


