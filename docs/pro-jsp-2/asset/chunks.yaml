- fmt: '# Screen Flow and Requirements


    Let’s explore the project’s initial requirements and screen flow. The nice thing
    about this application is that we’re our own customers, because we want to develop
    a better way to publish our résumés online. However, we’re not the only people
    who will use this application, and therefore we’re going to include administrator
    and user roles.


    We’re looking for a web-based system that supports the traditional résumé sections:
    user contact information, summary, objective, skill categories, skills, education,
    training, and extracurricular activities. Although we haven’t completed all of
    these sections at the time of this writing, this is what we want the application
    to grow into. We want to be able to render our résumés in `XML` and use `XSL`
    to produce `HTML`, text, Word’s rich text format, and `PDF` files. To demonstrate
    roles and security, we’ll make this a multiuser system in which there are administrators
    and users. Administrators can see and do everything, while users can only view
    or change their own résumé. Figure 15-2 shows the application flow.


    ```

    Main


    Upload


    Login


    Menu


    Resume


    Edit


    Edit


    View


    Create


    Profile


    Resume


    Resume


    Resume

    ```


    **Figure 15-2.** *From the main menu of the résumé application, you can upload,
    create, edit, and view a résumé.*


    After users have signed in, they may choose to create, edit, view, and upload
    résumés. They can also edit their user details. Let’s take a look at what each
    screen looks like by taking a quick walk through the application.


    When you first access the application, you’re presented with the Login page, as
    shown in Figure 15-3.


    ![Image 183](index-611_1.png)


    ![Image 184](index-611_2.png)


    **Figure 15-3.** *The login page is the entry point to the résumé application.*


    Filling in the appropriate username and password and clicking Login invokes the
    Main Menu page (Figure 15-4), the jumping-off point for the other pages.


    **Figure 15-4.** *The main menu page provides access to the functions of the application.*


    ![Image 185](index-612_1.png)


    ![Image 186](index-612_2.png)


    If you click the View Resume link, you’ll see the View Resumes page, shown in
    Figure 15-5.


    **Figure 15-5.** *The View Resumes page shows the user’s résumé.*


    This page allows you to view your résumé. This page has links for editing your
    résumé or editing your profile. Try clicking the Edit Resume link, and you’ll
    see the page shown in Figure 15-6.


    **Figure 15-6.** *When you click the Edit Resume link, you are directed to the
    Edit Resume page.*


    ![Image 187](index-613_1.png)


    Finally, go back to the Main Menu page. You’ll see that there are various other
    options on this page. First, there are two links in the middle of the page: Edit
    Profile and Edit Resume. Edit Profile allows you to change your user profile,
    including your login name, password, and contact details (see Figure 15-7). Edit
    Resume allows you to edit your résumé. At the top of the page are various other
    links; the purpose of each should be obvious.


    **Figure 15-7.** *The Edit Profile page allows you to modify your profile.*


    ## Directory Structure


    To familiarize you with `struts-resume`’s architecture, we’ll start with the directory
    structure shown in Figure 15-8.


    > **Note** The code for `struts-resume` can also be downloaded from `http://raibledesigns.com/wiki/Wiki.jsp?page=Downloads`.
    A CVS version is available at `http://sourceforge.net/projects/struts`. A `README.txt`
    file is provided with the code download that gives full application deployment
    instructions.


    ![Image 188](index-614_1.png)'
