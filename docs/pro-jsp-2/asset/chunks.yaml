    **JavaServer Pages**


    As mentioned earlier, the sole purpose of JSP technology is to produce dynamic,
    web-based content. This capability is implemented by embedding programmatic logic
    among template data (usually markup such as HTML, XML, and so on) which together
    produces the dynamic content on a request-by-request basis. This programmatic
    logic may be classified into the following JSP elements:


    • Scripting elements


    • Directives


    • Action elements


    In a moment you’ll look at each of the elements so you can see how they combine
    to produce the dynamic content required by today’s web applications. First let’s
    look at the template text.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 18


    **18**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **Template Text**


    As we said earlier in the chapter, any non-JSP code located inside a JSP page
    is known as **template text**. Template text can take any form as long as it’s
    text based. The most common form of template text is markup such as HTML or XML.
    For example, if your web design team were to develop an HTML page that you were
    required to convert into a JSP page in order to add some form of dynamic processing,
    then all the HTML markup would be referred to as template text (see Listing 1-3).


    **Listing 1-3.** *template_text.jsp*


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <%@ page import="com.apress.projsp.CalendarBean"%>


    **<html>**


    **<head>**


    **<title>My JSP Example</title>**


    **</head>**


    **<body>**


    <jsp:useBean id="cal" class="com.apress.projsp.CalendarBean"/>


    <c:set var="hour" value="${cal.hour}" scope="request" />


    <c:choose>


    <c:when test="${hour > 0 && hour <=11}"> **Good Morning!**


    </c:when>


    <c:when test="${hour >= 12 && hour <=17}"> **Good Afternoon!**


    </c:when>


    <c:otherwise>


    **Good Evening!**


    </c:otherwise>


    </c:choose>


    **</body>**


    **</html>**


    This is a JSP page that dynamically produces a greeting depending on the time
    of day.


    (This JSP page won’t compile and run without the CalendarBean class. We will deploy
    this JSP


    page with the CalendarBean class in Chapter 4.) For now, don’t worry about understanding
    the syntax of the various JSP elements but notice that the bolded static HTML
    is referred to as template text. The reason for this term is simply that a JSP
    page can be thought of as a “template” for producing some output. It’s the JSP
    logic embedded inside this template text that is responsible for producing the
    output based upon this template.


    During the translation phase, all the template text found in the original JSP
    page is converted into Java statements in the page implementation servlet. The
    Java statements simply output the template text in the correct order as part of
    the response.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 19


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **19**


    **Scripting Elements**


    Scripting elements are used within a JSP page to manipulate objects and perform
    computations that enable the generation of dynamic content. Scripting elements
    can be classified into the following categories:


    • Comments


    • Declarations


    • Scriptlets


    • Expressions


    • Expression language expressions


    We will discuss each scripting element in turn.


    Comments


    JSP comments are a good way of explaining any complicated logic that may arise
    for whatever reason—perhaps a comment could be used to flag a piece of scripting
    code to be simplified at a later date with a custom tag. Alternately, comments
    provide non-Java-speaking HTML users or web designers some clues as to what a
    piece of “magic” JSP code does.


    JSP comments may be declared inside a JSP page as follows:


    <%-- This is a JSP comment --%>


    Comments in JSP pages get stripped out during the translation phase and aren’t
    sent to the client as part of the response. HTML comments, on the other hand,
    such as the one shown next, do get sent to a client’s browser, and any client
    can view the comments by using the View Source options that most modern browsers
    provide:


    <!-- This is an HTML comment -->


    Having JSP comments stripped and not part of a client response is beneficial because
    it not only keeps the size of the response as small as possible, thereby aiding
    performance, but also removes clues about the technology used to implement a web-based
    application that a hacker could target.


    There is of course no reason why JSP expressions and HTML comments cannot work
    together:


    <!-- HTML comment generated <%= new java.util.Date() %> --> You’ll learn the meaning
    of this JSP expression shortly, but suffice it to say the previous comment produces
    the following in the content returned to a client:


    <!— HTML comment generated Fri Jan 03 12:37:09 GMT 2005 --> Declarations


    JSP pages allow both methods and variables to be declared in a similar manner
    to the way in which they’re declared inside standard Java classes. As with standard
    methods and variables,


    513-0 ch01.qxd 9/30/05 4:08 PM Page 20


    **20**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    after they are declared inside a JSP page, they’re available to subsequent scriptlets
    and expressions and so on for reference.


    During the translation phase, any JSP declarations (methods or variables) found
    inside the page are actually created outside the _jspService() method in the JSP
    page implementation servlet and therefore are available to any scripting elements
    throughout the page.


    JSP declarations must be placed between <%! and %> declaration delimiters. The
    general form of a declaration is shown here:


    <%! declaration; [declaration;]+...%>


    For example:


    <%! Date now = new Date(); %>


    <%!


    private int calculate(int a, int b) {


    ...


    }


    %>


    The previous examples demonstrate two simple JSP declarations. The first generates
    a java.util.Date instance that is available to the rest of the JSP page (and therefore
    to the servlet), whereas the second declares a stand-alone method that again is
    available to the rest of the page.


    ■**Caution** When declaring a page-level variable via a JSP declaration, you should
    ensure that its access is thread-safe. Multiple threads can execute the same servlet
    (JSP implementation class) simultaneously, and any page-level variables are accessible
    by each thread.


    Scriptlets


    Quite simply, scriptlets are small blocks of source code contained within the
    <% and %> delimiters that can be used to provide programming-style language functionality
    around a page’s content, thus making their output dynamic.


    For example:


    <%


    User user = (User)request.getAttribute("User"); if (user != null) {


    %>


    Welcome, you have successfully logged in!


    <%


    }


    %>


    513-0 ch01.qxd 9/30/05 4:08 PM Page 21


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **21**


    You can see from the previous example how a simple piece of dynamic content can
    be created with a scriptlet. If an object attribute called user exists in the
    request, a welcome message is generated; otherwise, one isn’t! Admittedly, this
    piece of dynamic content isn’t the most complex, but hopefully you can see how
    scriptlets add logic between the markup of your JSP


    page to control the output.


    The supported scripting languages available for use inside scriptlets are defined
    by the page directive’s language attribute. In all specifications, from JSP 1.0
    to the current JSP 2.1, the only defined value for this attribute is Java. Unlike
    declarations, all scriptlet code will be inserted into the _jspService() method
    of the generated servlet, which is used to handle the request and generate the
    response. When multiple scriptlets are included in any page, they’re included
    into the compiled servlet in the order in which they appear in the JSP. Unlike
    JSP


    declarations, any variables declared in a scriptlet aren’t available to the rest
    of the JSP page because they’re treated as local variables inside the _jspService()
    method.


    When JSP 1.0 first arrived, scriptlets were quickly adopted as the most popular
    way of adding dynamic features to JSP. Unfortunately, scriptlets became too popular
    and soon JSP


    page authors were embedding too much business logic among their markup. This caused
    several problems.


    In multideveloper projects, it’s quite common for a web designer with no Java
    or JSP skills to produce an HTML UI for an application that is then passed to
    Java developers to convert their work into JSP by adding dynamic content and hooking
    together business logic along the way. This caused delays and frustrations in
    the JSP 1.0 days due to the dependencies formed between the UI and Java developer.
    Also problems arose because UI designers would struggle to maintain their pages,
    as they would need to understand the scriptlet code surrounding their markup properly
    in order to change it. On top of these difficulties, adding too many scriptlets
    to a JSP file also makes it incredibly difficult to read and hence maintain. Anyone
    who has had to spend hours debugging a JSP page only to find a closing brace is
    missing will testify how much more difficult it is to fix a page with too many
    scriptlets in it.


    Thankfully, the early experiences of UI and JSP developers haven’t been wasted,
    and other methods are now considered better alternatives. For example, using standard
    JSP actions to manipulate JavaBeans (which contain business logic) and encapsulating
    logic inside custom actions (also known as custom tags) are two alternatives that
    solve many of the problems mentioned earlier. Most noticeably, both solutions
    use XML-style tags that can be used in har-mony with the tools of a UI designer.


    JSP 2.0 introduced another two candidates that further facilitate scriptless JSP
    code. The first of these new features comes in the form of the **JSTL,** which
    provides standard actions for many of the simple tasks required of a modern dynamic
    web application. Second, for the first time an **expression language (EL)** is
    available, which can be used to help reduce or even erad-icate scriptlets.


    As we mentioned at the start of this chapter, further information on JavaBeans,
    JSTL, and custom actions can be found later in this book. For now you just need
    to understand what scriptlets can do along with their limitations.


    Expressions


    Expressions are similar to scriptlets, but as their name suggests they evaluate
    a regular Java expression and return a result. This result must be a string or
    be convertible to a string; otherwise, an exception will be raised during the
    translation phase or at runtime. Expressions are


    513-0 ch01.qxd 9/30/05 4:08 PM Page 22


    **22**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    evaluated by the JSP implementation servlet and are returned to the client as
    part of the response.


    As with the other tag types, expressions must be placed between <%= and %> expression
    delimiters so that the JSP engine is aware of the developer’s intent to return
    the value of the expression in the response. The general syntax is as follows:


    <%= expression %>


    Two simple JSP expressions can be seen here. They could be part of any regular
    JSP page that generates nonstatic HTML.


    <h1>Welcome Back : <%= user.getName() %></h1>


    <b>Today''s date is <%= new java.util.Date()%></b> Apart from producing dynamic
    content as part of the client response, JSP expressions can be used to pass request-time
    parameters and values to other JSP actions that may appear on the page. You’ll
    look at an explanation of this later in this chapter, and again when we look at
    JSP standard actions (Chapter 4) and custom actions (Chapters 6 and 7).


    ■**Note** Unlike declarations and scriptlets, JSP expressions don’t require a
    closing semicolon (in fact they won’t compile with one) because they evaluate
    the result of a single expression.


    Expression Language Expressions


    JSP 2.0 introduced an EL that is based on ECMAScript and XML Path Language (XPath),
    and that has been designed to be simple to use and more user-friendly than Java.


    The new EL has built-in support for JavaBean access and manipulation, collections
    of objects, and automatic type conversion, to name but a small part of its extensive
    feature list.


    If you’re familiar with JavaScript, you should have no problem understanding the
    syntax of the EL, which insists that all expressions must be enclosed within ${
    and } delimiters.


    Unfortunately, another Java technology, JavaServer Faces (JSF), was implementing
    an expression language at approximately the same time as JSP 2.0, and the two
    versions are incompatible in some respects. JSP 2.1 unifies the two expression
    languages and provides an additional syntax for expression language statements,
    allowing the use of #{} to enclose expression language statements.


    EL expressions can be used in any attribute that accepts a runtime expression,
    usually a standard or custom action, or even in plain template text. The addition
    of the EL further facilitates the writing of scriptless JSP pages, that is, pages
    that don’t contain any Java scriptlets, expressions, or declaration elements.


    Although it’s the subject of Chapter 3, here are a couple of examples to give
    you a flavor of the new EL:


    ${anObject.aProperty}


    <c:if test="${user.salary > 10000}" >


    ...


    </c:if>


    513-0 ch01.qxd 9/30/05 4:08 PM Page 23


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **23**


    You can see from the first example just how simple it is to access the property
    of any JavaBean object, with no Java knowledge required at all! The second example
    demonstrates one of the core actions from the JSTL that is used to provide conditional
    processing of JSP


    code. Here an EL expression is used to provide the Boolean test for the action.


    **JSP Implicit Objects**


    All JSP scripting elements have access to a number of useful objects that are
    provided by the JSP container and are known as implicit objects. Each of these
    implicit objects are classes or interfaces as defined by either the Servlet or
    JSP specifications and are described in greater detail in this section.


    request


    The most notable of the implicit objects is the request object, which is an instance
    of the javax.servlet.http.ServletRequest interface. The request object provides
    access to all the available information about the user request (such as request
    parameters and headers) and may be used in exactly the same way that the HttpServletRequest
    parameter is used in the service() method of a servlet.


    Let’s consider an example. Imagine a simple JSP page that expects a single-request
    parameter called userName and constructs a personalized response to the user:


    <html>


    <head><title>A Simple Example</title></head>


    <body>


    <h2>Hello <%=request.getParameter("userName")%>, Have a nice day!</h2>


    </body>


    </html>


    This simple JSP page extracts a request parameter called userName from the implicit
    request object and constructs an appropriate greeting. To send a request parameter
    to a JSP


    page like the one outlined previously, either use an HTML form or add the parameter
    to the query string of your request as follows:


    http://localhost:8080/test/Request.jsp?userName=Dan


    response


    Like the request object seen earlier, there’s also an accompanying implicit response
    object that represents the current response to be returned to the user. The response
    object is an instance of the javax.servlet.http.HttpServletResponse interface.
    Again, this object can be used in exactly the same way as the HttpServletResponse
    parameter received by the service() method of a servlet.


    out


    The implicit out object represents an instance of the javax.servlet.jsp.JspWriter
    class that can be used to write character data to the response stream in a similar
    manner to that seen by the java.io.PrintWriter class. Although methods provided
    by the JspWriter such as print()


    513-0 ch01.qxd 9/30/05 4:08 PM Page 24


    **24**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    and println() can be used to write text to the body of the response, it’s usually
    sufficient to rely on plain template text and JSP action elements instead of explicitly
    writing to the out implicit object.


    session


    The implicit session object provides a reference to an implementation of the client’s
    individual javax.servlet.http.HttpSession object, which can be used to store and
    retrieve session data. Although HttpSession can be used explicitly, it should
    be noted that several action elements that interact with the session are available
    and can be used instead.


    config


    The config object simply provides the JSP developer with access to the ServletConfig
    object that is used by the web container to configure the JSP page. The ServletConfig
    interface is most commonly used to provide access to any initialization parameters
    that have been configured for the JSP page via the deployment descriptor of the
    web application.


    application


    The implicit application object provides a reference to the javax.servlet.ServletContext
    interface of the web application. The ServletContext object is used by a web container
    to represent an entire web application, and therefore any data that is stored
    inside it will be available to all resources included in the application.


    As with the session object, several action elements exist that interact with the
    ServletContext so it may not be necessary to interact directly with the object
    itself.


    page


    The implicit page object references an instance of the JSP’s page implementation
    class and is declared of type Object. The page object is rarely used in scripting
    elements and simply serves as a link between the JSP page and its implementing
    servlet.


    pageContext


    The pageContext object is slightly different in its functionality from the rest
    of the available implicit objects. A pageContext instance provides the JSP developer
    with access to all the available JSP scopes and to several useful page attributes,
    such as the current request and response, the ServletContext, HttpSession, and
    ServletConfig to name but a few.


    Perhaps the most useful piece of functionality provided by the pageContext variable
    is its ability to search for named attributes across multiple scopes. Therefore,
    if you were unsure in which scope a particular attribute is located, the pageContext
    can be used to traverse all available scopes until the attribute is found.


    The pageContext variable provides this cross-scope functionality because it exists
    at a level of abstraction higher than the lower-level JSP implementation classes.
    The JSP container will create a new, unique instance of this class for each request
    received and assign it to the pageContext variable.


