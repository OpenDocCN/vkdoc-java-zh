    XML Transformation Actions


    The XML standard tag library also includes tags that allow you to transform XML
    data into other formats such as HTML or WML.


    **The <x:transform> Action**


    Quite simply, the XML transformation actions provided by the JSTL are designed
    to apply an XSLT stylesheet to an XML document. Usually, the result of the XSLT
    transformation is returned as output, but it’s also possible to store the result
    inside a scoped variable instead so that it may be accessed by some of the other
    XML actions that you’ve already seen.


