    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **25**


    exception


    The implicit exception object is available only to those JSP pages that declare
    themselves as error pages by using the following page directive. (You’ll learn
    more about directives shortly!)


    <%@ page isErrorPage="true" %>


    The exception object itself is an instance of java.lang.Throwable and will represent
    a runtime error that occurred during the request process.


    Any scripting elements inside a JSP page that reference the implicit exception
    object when that page hasn’t been declared as an error page will cause a fatal
    error at translation time.


    **JSP Directives**


    Directives are used for passing important information to the JSP engine. Although
    directives generate no output, they provide a powerful mechanism for providing
    page-level information that is typically used during the compilation and translation
    phases.


    JSP page authors have the following three types of directives at their disposal:


    • page directives


    • include directives


    • taglib directives


    Each type of directive provides different information to the JSP engine or signifies
    some required behavior of the generated servlet. The information contained inside
    a directive is totally independent of any user request and is of use only to the
    JSP engine. All three directive types must be declared between <%@ and %> directive
    delimiters and take the following form:


    <%@ directive {attribute="value"}* %>


    Generally speaking, directives should be placed at the top of the JSP page; however,
    the include directive, which you’ll see later, is an exception to this rule. Let’s
    examine each directive type in turn.


    The page Directive


    The first directive type is the page directive, which is used to define any page-dependent
    properties that a JSP page may have, such as library dependencies, buffering,
    or error-handling requirements.


    The syntax of a page directive is as follows:


    <%@ page page_directive_attr_list %>


    where the page_directive_attr_list is used to define the name of any page attribute
    along with its value in the form attributeName=attributeValue.


    Each page directive applies to the entire compilation unit (that is, the JSP page
    in which the page directive appears, plus any included JSP pages). Although multiple
    page directives may occur, it should be noted that each attribute can occur only
    once in the page with the exception of the import attribute.


