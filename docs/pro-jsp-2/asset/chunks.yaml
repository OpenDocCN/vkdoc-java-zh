    As with searchForm.jsp, the outermost JSF tag is the <f:view> tag. Within the
    view, the page uses <h:outputText> tags. The <outputText> tags are obviously used
    to output text to the page. As with the <inputText> tags, they use the #{object.property}
    syntax to access a property of an object in the page. In this case, the object
    is a JavaBean identified by the name flight.


    This is the same object used in searchForm.jsp. Notice that the EL expression
    used to access the object’s properties is the same in both the searchForm.jsp
    and searchResults.jsp. In other words, the syntax of the value expression is the
    same regardless of whether the page is reading or writing a property. In the searchResults.jsp
    page, the <outputText> tag reads the property from the object and displays it
    in the web page generated by this JSP page.


    So, now you’ve seen the three main parts of the web application: an input page,
    an output page, and a JavaBean to hold the business data. In terms of the MVC
    pattern, FlightSearch is the model, and searchForm.jsp and searchResults.jsp are
    the view. What we haven’t shown yet is the controller. We also haven’t explained
    how the controller knows where to find the model or the view, and how the controller
    knows the logic flow through the web application.


    In the listings presented here, you can see that searchForm.jsp and searchResults.jsp
    do not


