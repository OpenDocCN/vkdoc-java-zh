    **The <c:choose>, <c:when>, and <c:otherwise> Actions** You’ve now seen how the
    <c:if> action can be used to provide content based on a specific condition. The
    <c:choose> action takes this step a little further and enables you to provide
    handling for a set of mutually exclusive conditions, instead of just one.


    The syntax for the <c:choose> action is as follows:


    <c:choose>


    body content (<c:when> and <c:otherwise> subtags)


    </c:choose>


    As you can see, the <c:choose> action has two possible nested actions that form
    its body content: <c:when> and <c:otherwise>. The syntax for each is as follows:


    <c:when test="testCondition">


    body content


    </c:when>


    <c:otherwise>


    conditional block


    </c:otherwise>


    The <c:when> action exists simply to provide handling for a specific condition,
    tested for via its test attribute. Unlimited <c:when> actions may exist within
    a <c:choose> action to provide handling for a wide range of conditions. The <c:otherwise>
    action may appear only once because it covers all remaining alternatives and must
    therefore appear after all <c:when> actions. Because it represents the last possible
    option, there’s no need for it to evaluate a Boolean expression.


    Combined, the <c:choose>, <c:when>, and <c:otherwise> actions provide efficient
    handling for a range of alternative conditions in a similar manner to if, else
    if, else blocks or case/switch statements in modern programming languages.


    When the JSP container first encounters a <c:choose> tag, it evaluates the body
    of the first


    <c:when> action whose test condition evaluates to true and returns any output
    to the current JspWriter without evaluating or processing any further <c:when>
    or <c:otherwise> actions.


    Should the test condition of every <c:when> evaluate to false, then and only then
    does the body of the <c:otherwise> action get processed. If no <c:when> condition
    evaluates to true and there’s no <c:otherwise> action specified, the <c:choose>
    action will simply do nothing!


    Let’s revisit the example JSP page that we created for the <c:if> action example,
    which prints an appropriate welcome based on the time of day:


    <c:if test="${hour >= 0 && hour <=11}"> Good Morning!


    </c:if>


    <c:if test="${hour >= 12 && hour <=17}"> Good Afternoon!


    </c:if>


    <c:if test="${hour >= 18 && hour <=23}"> Good Evening!


    </c:if>


    513-0 ch04.qxd 11/17/05 8:40 PM Page 151


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **151**


    There are three possible conditions that determine the welcome message returned
    to the user. This logic would be far better implemented using a <c:choose> action
    instead. Let’s make the appropriate changes:


    <c:choose>


    <c:when test="${hour >= 0 && hour <=11}"> Good Morning!


    </c:when>


    <c:when test="${hour >= 12 && hour <=17}"> Good Afternoon!


    </c:when>


    <c:otherwise>


    Good Evening!


    </c:otherwise>


    </c:choose>


    The new implementation of the welcome message logic is superior to the logic from
    the


    <c:if> example for three reasons. First, the code is more self-describing and
    readable to a nonprogrammer. Second, the code is more efficient. As soon as the
    JSP engine has found the first nested action whose test condition evaluates to
    true, it doesn’t need to continue checking the test conditions of any other actions.
    Compare this to the <c:if> example, where every action was tested regardless.
    Last, because the nested actions of the <c:choose> action are mutually exclusive,
    it’s impossible to execute the body of more than one of the conditions.


    A simple bug in the logic of the <c:if> example could easily cause the body of
    more than one


    <c:if> action to be processed, thereby causing a very strange welcome message!


    Looping and Iteration


    Another facility often required by JSP page authors is the ability to generate
    large amounts of presentation code (usually HTML tables or lists) by looping or
    iterating around the same JSP


    code. This functionality has until now usually been implemented via scriptlets
    that contain either while or for Java statements. Embedding such blocks of code
    into JSP pages makes it difficult for JSP developers who are not familiar with
    Java to do their job effectively, and scriptlets have a nasty habit of introducing
    silly, hard-to-detect bugs as well as reducing the readability of JSP pages. The
    best JSP pages will contain little, if any, scriptlet code at all!


    Thankfully, JSTL offers two useful actions for such purposes: <c:forEach> for
    general data and <c:forTokens> for string tokenizing.


    **The <c:forEach> Action**


    The <c:forEach> action is probably one of the most useful actions provided by
    the JSTL that enables its body content to be processed a number of times. The
    <c:forEach> action repeatedly processes its body content over a collection of
    objects or until a set number of iterations has been achieved.


    There are two alternate syntaxes for the <c:forEach> action. If you want to iterate
    over a collection of objects, you would use this syntax (syntax 1):


    <c:forEach[var="varName"] items="collection" [varStatus="varStatusName"]


    body content


    </c:forEach>


    513-0 ch04.qxd 11/17/05 8:40 PM Page 152


    **152**


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    If you want to iterate a set number of times, you would use this syntax (syntax
    2):


    <c:forEach [var="varName"] [varStatus="varStatusName"]


    begin="begin" end="end" [step="step"]> body content


    </c:forEach>


    If iterating over a collection (syntax 1), the only required parameter is the
    collection itself, specified via the items attribute. The object referenced by
    the items variable can be any one of the following data types:


    • An array


    • An implementation of java.util.Collection


    • An implementation of java.util.Iterator


    • An implementation of java.util.Enumeration


    • An implementation of java.util.Map


    • A string of comma-separated values


    Whichever data type items references, the type of the exposed var variable will
    be that of the object in the underlying collection. The only exceptions to this
    are arrays of primitives and java.util.Maps that are represented by the object
    wrapper class of the primitive type and Map.Entry, respectively.


    As mentioned earlier, syntax 2 can be used when a fixed number of iterations are
    required. Using this particular syntax, the type of the exposed var variable will
    be Integer and will be incremented by 1 or step at the end of each iteration.
    The body content will be processed repeatedly until the var variable is greater
    than or equal to the end variable. This option is usually used when iterating
    over a finite (and known) collection.


