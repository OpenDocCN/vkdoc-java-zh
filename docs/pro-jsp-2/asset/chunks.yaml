    Later in this chapter, we’ll show you how to do SSL switching upon user login
    and also before the user logs in.


    **Java Authentication and Authorization Service**


    You might be wondering how **Java Authentication and Authorization Service (JAAS)**
    fits into all of this. JAAS provides a framework and standard programming interface
    for authenticating users and for assigning privileges. Together with Java 2, an
    application can provide code-centric access control, user-centric access control,
    or a combination of the two. JAAS was invented to make login services independent
    of authentication technologies and allow **Pluggable Authentication Modules (PAM)**.
    Most modern application servers use JAAS under the covers to configure container-managed
    security—you’re using it without even knowing that you are!'
