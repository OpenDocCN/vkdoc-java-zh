    **Summary**


    After completing this chapter, you should know the following:


    • JSF was developed to make it easier to create customizable UIs for web applications
    using a component-based system. JSF provides a set of UI components that can easily
    be added to web applications and connected to business objects. The components
    are converted into user interfaces through the use of a render kit.


    • The JSF implementation comes with a set of custom actions in two tag libraries
    that allow you to easily integrate JSF with JSP pages. All JSF implementations
    must support JSP pages.


    • JavaBeans are the business objects in your JSF application. JSF makes it easy
    to connect JavaBeans with UI components. The JSF implementation handles all the
    work of moving data from the UI into the bean, and moving data from the bean to
    the UI.


    • Page navigation in a JSF application is handled by adding navigation rules to
    a configuration file. Navigation can be controlled through value-binding expressions
    or method-binding expressions.


    • Data conversion and validation is handled by converters and validators. The
    JSF implementation provides two standard converters: one for numbers and one for
    dates. The JSF implementation provides three standard validators for validating
    the ranges of doubles or longs and validating the length of strings.


    • You can implement your own converters or validators to perform custom conversion
    and validation.


    • JSF applications can be designed to respond to events and actions by using value
    change listeners and action listeners.


    • Message bundles provide an easy facility for internationalizing and customizing
    the pages in your web application.


