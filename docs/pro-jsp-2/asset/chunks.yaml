    After a user has successfully logged in, an instance of HttpSession is created
    for him or matched up with an existing session he created. This session is active
    for the duration that the <session-timeout> value specifies in the deployment
    descriptor (web.xml). This value determines how long the server retains a user’s
    session between interactions. Thus, if the user clicks a link or somehow sends
    a request to the application, the server will recalculate how long it will wait
    to expire the session. After the session expires or is killed by a reboot of the
    application server, the user will be required to log in again. If a <session-timeout>
    value isn’t specified, a default of 30 minutes is used. Some application servers
    have the ability to persist sessions to the file system (or a database), so a
    session can live through a reboot (provided it hasn’t timed out).


    It’s important to note that it isn’t currently possible to configure logout declaratively.
    Logging out is usually done by using a JSP page or servlet that calls session.invalidate().
    When you use session.invalidate(), all objects bound to the session are removed.
    If the user tries to access a protected resource again, he’ll be prompted for
    a username/password again. In most instances, logging out is accomplished by placing
    a link on a page that calls logout.jsp or a Logout.java servlet. Other ways that
    a user can log out are by closing the browser or by exceeding the minutes of inactivity
    specified by the <session-timeout> parameter.


    In an early draft of the Servlet 2.4 specification, a logout() method was proposed
    for the HttpSession interface. This method would log the client out of the web
    server and invalidate all sessions associated with this client. However, the method
    was dropped from the final draft of the specification.


    Tomcat Realms


    This section illustrates how to set up different realms in Tomcat. As mentioned
    previously, a realm is a “database” of usernames, passwords, and user roles. We’ll
    show you how to set up a MemoryRealm, a JDBCRealm, a JNDIRealm, and later in this
    chapter, a JAASRealm.


    **MemoryRealm**


    If you have a fresh Tomcat installation that you’ve been using to run these examples,
    you should be able to log in by using tomcat/tomcat for the username/password.
    These values are specified in %TOMCAT_HOME%\conf\tomcat-users.xml. This file is
    considered a MemoryRealm, which stores basic user information. This is the default
    realm for Tomcat, as specified in its server.xml file (located in the same directory).


    In Tomcat 5.0.30, the realm and its database are specified like this (we’ve deleted
    irrele-vant information from the excerpt):


    <Server port="8005" shutdown="SHUTDOWN" debug="0">


    <GlobalNamingResources>


    <Resource name="UserDatabase" auth="Container"


    type="org.apache.catalina.UserDatabase"


    description="User database that can be updated and saved">


    </Resource>


    <ResourceParams name="UserDatabase">


    <parameter>


    <name>factory</name>


    <value>org.apache.catalina.users.MemoryUserDatabaseFactory


    </value>


