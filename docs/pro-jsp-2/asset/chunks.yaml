    ■ ■ ■


    JSP Implicit Objects


    **J**SP defines a number of implicit objects that scripting elements can make
    use of. These implicit objects are Java objects that implement interfaces in the
    Servlet and JSP API and that the JSP container makes available to developers in
    each page. These objects may be accessed as built-in variables via scripting elements
    and can also be accessed programmatically by custom and standard actions. This
    appendix gives details of these objects and the methods that each of them exposes.
    There are many more classes and interfaces defined by the JSP and Servlet specifications.


    ■**Note** Apart from the page, pageContext, and exception implicit objects, this
    appendix lists all the methods available for each object (except those defined
    in java.lang.Object), irrespective of which class or interface defines the methods.


    The implicit objects are as follows:


    • request


    • response


    • out


    • session


    • application


    • exception


    • config


    • page


    • pageContext


