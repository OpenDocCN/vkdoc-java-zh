    **Castor: An Alternative to Hibernate**


    Castor is an open-source persistence framework like Hibernate. Although Castor
    has been around longer than Hibernate and may be more widely accepted, Hibernate
    was chosen for this chapter because it has better documentation. However, the
    RSS newsreader example program can be configured to use either Hibernate or Castor.


    If you look at the example source code, you’ll find a class in the package ag.persist.castor
    named CastorAggregatorDAO. This class is an implementation of the AggregregatorDAO


    interface that uses Castor instead of Hibernate. If you would like to compare
    the Castor and Hibernate APIs, compare the methods in HibeAggregatorDAO class
    to the methods in the CastorAggregatorDAO class. You’ll find that, in some cases,
    the APIs are very similar. If you would like to configure the RSS newsreader example
    to use Castor instead of Hibernate, refer to the example readme.txt file for instructions
    on how to make the switch.


