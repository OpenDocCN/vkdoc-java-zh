    如果你正在使用 Struts，我们推荐使用 Tiles，因为它提供了许多与 Struts 的内置互操作特性。与 Validator 类似，只需在你的应用程序的
    `web.xml` 中添加一个 Servlet 条目，它就可以独立使用。不过，我们不会探讨这种配置，因为本章重点介绍基于 Struts 的解决方案。我们将说明示例简历应用程序中使用的模板系统，以及我们如何在这个特定应用程序中实现
    Tiles。我们将使用的架构和技术已经在生产应用程序中得到验证和证明。Tiles 可以以多种不同方式用于构建门户网站、菜单系统以及定制化。


    Tiles 的详细在线文档可以在 http://www.lifl.fr/~dumoulin/tiles/ 找到。


    **在示例应用程序中使用 Tiles**


    首先，让我们看看如何将 Tiles 集成到 Struts 应用程序中。对于 Struts，这与 Validator 非常相似，只需在 `struts-config.xml`
    文件中将其注册为插件即可：


    <plug-in className="org.apache.struts.tiles.TilesPlugin" >


    <set-property property="definitions-config"


    value="/WEB-INF/tiles-config.xml" />


    <set-property property="moduleAware" value="true" />


    <set-property property="definitions-parser-validate" value="true" />


    </plug-in>


    如果你正在使用 XDoclet，这需要放在合并目录中的 `struts-plugins.xml` 文件中。使用 Tiles 基本上有两种方式：


    • 第一种是通过一个 JSP 页面，该页面将其他页面作为模板包含进来。

    • 第二种是使用 XML 文件来定义给定页面中的不同组件，也称为**定义**。


    我们强烈推荐使用 XML 配置的方式，因为它允许你在一个位置更改页面定义，而不是逐个页面进行修改。它还支持继承，因此你可以定义一个包含相同页眉和页脚的基础定义，然后在子定义中无需再指定这些内容。第一个属性
    `definitions-config` 指向你用来定义定义的文件。它还支持以逗号分隔的文件路径列表，如果你的应用程序中有许多页面或定义，这会很方便。第二个属性
    `moduleAware` 允许 Tiles 识别模块（以前称为子应用程序）。


    我们将在接下来的章节中进一步描述这些内容。


    Tiles 的基础在于它允许你为整个应用程序定义一个“模板”，或者根据你的需要定义多个模板。这个模板通常看起来像一个普通的 HTML 文件，包含所有基本元素，例如
    `<html>`、`<head>`、`<body>`，以及任何布局元素，例如 `<div>` 或 `<table>`。如果你仍然在使用表格来布局你的 Web
    应用程序，我们恳请你尝试使用 `<div>` 和 CSS 的无表格布局，因为它会使你的页面更轻量、更小巧，对客户端更友好。XHTML 和 CSS，当然还有现代浏览器，使得这变得容易得多。清单
    15-1 展示了一个非常简单的 Tiles 模板。


