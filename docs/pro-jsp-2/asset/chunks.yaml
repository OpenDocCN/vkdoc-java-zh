  trans: "\n**其他身份验证选项与注意事项**\n\n如果你对容器管理的身份验证在开发便捷性方面不满意，或者有更严格的安全要求，还有其他替代方案。最常见的做法是构建自定义身份验证机制。如果决定采用此方案，我们强烈建议你研究\
    \ JAAS 并尝试使用其 API。\n\n安全过滤器\n\n安全过滤器（http://securityfilter.sourceforge.net/）是一个模仿容器管理安全机制的开源项目。它看起来与容器管理安全机制完全一致，并支持\
    \ `HttpServletRequest` 的程序化安全方法。但遗憾的是，它无法自动将用户的 `Principal` 对象传播到 EJB 调用中。\n\n\
    513-0 ch12.qxd 11/17/05 4:15 PM 第 510 页\n\n**510**\n\n第 12 章 ■ Web 应用程序中的安全性\n\
    \nStruts 的 SSL 扩展\n\nStruts 的 SSL 扩展（http://sslext.sourceforge.net/）适用于 HTTP/HTTPS\
    \ 切换。这是一个开源项目，允许你通过修改后的 Struts 标签库以及 Struts 配置文件中的配置设置，来实现 HTTP/HTTPS 切换。该项目由\
    \ Steve Ditlinger 编写，他也是前面提到的 SSL 切换文章的作者。\n\n记住密码\n\n你可能在许多门户网站（如 Yahoo!）上见过“记住我的密码”功能。通常，这是通过将用户名和密码组合存储在\
    \ cookie 中来实现的。如果你的应用程序需要登录，并且你想添加此功能，实现起来相当简单，尤其是在 Servlet 2.5 环境下。你可以使用一个 servlet\
    \ 作为欢迎文件，并检查 cookie 是否存在。当然，你也可以使用 JSP 来模拟相同的行为，获取用户名和密码的 cookie，并将这些 cookie 作为参数重定向到\
    \ `LoginServlet`。大多数现代浏览器的优点在于它们会主动提供记住密码的功能，这通常比使用 cookie 更安全。\n\n“记住我”功能\n\n\
    作为此功能实现方式的示例，你将为代码下载附带的示例应用程序添加一个“记住我”功能。具体做法是使用 cookie 记住用户名和密码，并在用户首次访问应用程序时查找这些信息。如果\
    \ cookie 存在，则尝试对用户进行身份验证。此过程涉及三个 cookie；前两个已在前面提及。第三个 cookie 用于指示用户希望使用“记住我”功能。然后，你使用一个过滤器来检测这些\
    \ cookie 是否存在，如果存在，则尝试登录用户。\n\n首先，在 `login.jsp` 页面中添加一个复选框，允许用户指示他希望应用程序记住其密码：\n\
    \n```html\n<input type=\"checkbox\" name=\"rememberMe\" id=\"rememberMe\" /> 记住我\n\
    ```\n\n如果选中此框，则设置一个 cookie 来指示用户希望使用此功能。同时，设置一个 cookie 来记住用户的用户名和密码。由于你使用 `LoginServlet`\
    \ 将登录请求转发到 `j_security_check`，因此需要在 `execute()` 方法中添加设置这些 cookie 的代码：\n\n```java\n\
    if (request.getParameter(\"rememberMe\") != null) {\n\n    response =\n\n    \
    \    RequestUtil.setCookie(response, \"rememberMe\", \"true\", false); response\
    \ =\n\n        RequestUtil.setCookie(response, \"password\",\n\n            StringUtil.encodeString(encryptedPassword),\n\
    \n            false);\n\n}\n```\n\n513-0 ch12.qxd 11/17/05 4:15 PM 第 511 页\n\n\
    第 12 章 ■ Web 应用程序中的安全性\n\n**511**\n\n对于密码 cookie，你使用了 `StringUtil.java` 类中的 `encodeString()`\
    \ 方法。这是一个简单的方法，通过使用 `sun.misc.BASE64Encoder()` 来加密密码 cookie 的值：\n\n```java\npublic\
    \ static String encodeString(String str) throws IOException {\n\n    sun.misc.BASE64Encoder\
    \ encoder = new sun.misc.BASE64Encoder(); String encodedStr = new String(encoder.encodeBuffer(str.getBytes()));\
    \ return (encodedStr.trim());\n\n}\n```\n"
- fmt: "Base64编码非常适合此功能，因为它可以被解码（自动登录时需要），并且能确保客户端的密码不以明文形式存储。\n\n如果你没有使用`LoginServlet`，而只是在表单的`action`中使用了`j_security_check`，你仍然可以使用此功能。只需在表单的`onsubmit()`处理程序中使用少量JavaScript来设置这些Cookie即可。这样会失去加密密码的功能，但此功能仍然有效。\n\
    \n此功能的核心在于`BreadCrumbFilter.java`类。该类在存在所需Cookie时执行检查并自动登录。在该类的`doFilter()`方法中，以下代码处理此逻辑：\n\
    \n```java\n// Get the relevant cookies for the \"remember me\" feature\nCookie\
    \ rememberMe = RequestUtil.getCookie(request, \"rememberMe\");\nCookie passCookie\
    \ = RequestUtil.getCookie(request, \"password\");\nString password =\n    (passCookie\
    \ != null)\n        ? URLDecoder.decode(passCookie.getValue(), \"UTF-8\")\n  \
    \      : null;\n\n// Detect if authentication has failed - indicated by the error=true\n\
    // parameter from the <form-error-page> in web.xml\n// StringUtils.equals is a\
    \ convenience method from commons-lang that handles\n// nulls gracefully.\nboolean\
    \ authFailed =\n    StringUtils.equals(request.getParameter(\"error\"), \"true\"\
    );\n\n// Check to see if the user is logging out, if so, remove the\n// rememberMe\
    \ cookie and password cookie.\nif ((authFailed ||\n    (request.getRequestURL().indexOf(\"\
    logout\") != -1)) && (rememberMe != null)) {\n    if (log.isDebugEnabled()) {\n\
    \        log.debug(\"deleting rememberMe-related cookies\");\n    }\n    response\
    \ =\n        RequestUtil.deleteCookie(response,\n            RequestUtil.getCookie(request,\n\
    \                \"rememberMe\"));\n    response = RequestUtil.deleteCookie(response,\
    \ passCookie);\n}\n\n// Check to see if the user is logging in. If so, check to\
    \ see\n// if he/she has enabled rememberMe functionality.\n// Only attempt to\
    \ authenticate when \"login\" is requested\nif ((request.getRequestURL().indexOf(\"\
    login\") != -1)) {\n    // Check to see if we should automatically log in the\
    \ user\n    // container is routing user to login page, check for remember me\
    \ cookie\n    Cookie userCookie = RequestUtil.getCookie(request, \"username\"\
    );\n    String username =\n        (passCookie != null)\n            ? URLDecoder.decode(userCookie.getValue(),\
    \ \"UTF-8\")\n            : null;\n    if ((rememberMe != null) && (password !=\
    \ null)) {\n        // authenticate user without displaying login page\n     \
    \   String route =\n            request.getContextPath() +\n            \"/auth?j_username=\"\
    \ + username +\n            \"&j_password=\" + StringUtil.decodeString(password);\n\
    \        if (log.isDebugEnabled()) {\n            log.debug(\"I remember you '\"\
    \ + username +\n                \"', attempting authentication...\");\n      \
    \  }\n        response.sendRedirect(response.encodeRedirectURL(route));\n    \
    \    return;\n    }\n}\n```\n\n就是这样！它甚至通过检查`error`参数来处理域中的密码更改——这是我们最近参与的大多数应用程序中都添加的一个巧妙功能。\n\
    \n## 授权\n\n用户登录到应用程序后，你可能需要限制其能执行的操作或查看的内容。使用容器管理的安全性可以大大简化此过程，因为你可以获取用户的角色。使用你自己的身份验证架构，你可能会得到类似的结果，但你可能无法利用大量可用的插件。我们所说的**插件**，指的是允许进行角色配置的标签库和其他与Java相关的包。例如，Struts\
    \ Logic标签库有一个`<logic:present>`标签，允许你根据用户的角色执行逻辑。Tiles模板框架也允许你根据角色配置模板的显示/隐藏部分。\n\
    \n在本节中，我们将提供一些关于在Web应用程序中控制*谁看到什么*的建议和技巧。如果你使用容器管理的身份验证，这些技术中的大多数实现起来会容易得多，但这并非必需。\n\
    \n你首先需要考虑的是用户登录后应该有哪些选择。通常这些选择以链接的形式出现，但也可能是其他菜单类型的系统，例如选择列表或DHTML下拉菜单。控制用户可能看到哪些链接的一种简单方法是根据用户的角色显示或隐藏链接。然而，这只是隐藏了链接，通过输入URL仍然可能访问到它。\n\
    \n一个推荐的做法是在部署应用程序时将JSP文件和片段放在`WEB-INF`目录下。这样做可以防止浏览器通过URL直接访问JSP页面，同时也迫使你（作为开发者）遵循MVC模式。你的JSP页面将受到保护，因为`WEB-INF`下的所有资源都是隔离的，无法通过URL访问。Servlet规范规定必须在`WEB-INF`内部提供安全性，并且通过强制每个请求都经过Servlet控制器，确保了控制器和视图的良好分离。然而，我们看到过一些容器不支持这一点——它们要么允许通过浏览器访问`WEB-INF`，要么不允许渲染位于`WEB-INF`下的JSP页面。如果你的Servlet容器符合Java\
    \ EE规范，它应该允许你这样做。\n\n如果你使用的框架允许配置Servlet到JSP的映射，这很容易做到。我们通常在一个目录中开发JSP页面，该目录与样式表、JavaScript文件和图片的目录同级。然后在部署时，我们将包含JSP页面的目录（`pages`）移动到`WEB-INF`下的一个目录中。\n\
    \n通过将JSP页面放在`WEB-INF`下，你可以确保在显示它们之前会执行必要的应用程序逻辑。毕竟，用户必须通过此逻辑才能访问你的JSP。\n\n在保护了页面位置之后，你需要保护对它们的访问，以便未经授权的用户无法执行访问它们的逻辑。你可以通过几种方式做到这一点。\n\
    \nServlet内置的方法是为你想要保护的每个Servlet（或Servlet组）使用不同的`<security-constraint>`。为此，你必须为每个Servlet或组创建Servlet映射——如果你有很多Servlet，你的`web.xml`可能会变得相当庞大。一种更简单的方法是通过一个初始Servlet代理所有请求，该Servlet检查权限并相应地转发，或者更好的方法是使用过滤器。我们还看到另一种替代方案，即在每个JSP文件的顶部放置一个标签库。这个标签库会检查用户是否有权访问该页面。\n\
    \n以编程方式检查用户角色并根据结果进行分发，或者在JSP页面的情况下显示错误消息，其问题在于它可能成为维护的噩梦。我们参与过使用这种架构的项目，在转向容器管理的身份验证后，维护变得容易得多。\n\
    \n## 总结\n\n我们希望我们已经说服你，为Web应用程序添加安全性是相当容易的。添加之后，它提供了许多好处：基于角色的定制、审计日志和密码加密。根据我们的经验，使用容器管理的安全性使我们的开发体验更加愉快。我们曾通过使用LDAP和大量应用程序逻辑以编程方式实现显示或隐藏链接、允许或拒绝访问页面。尽管它有效且运行良好，但初始编程花费的时间要长得多，并且维护起来相当麻烦。另一方面，如果你已经拥有一个能提供所有这些好处的身份验证和授权框架，那么你完全应该使用它，并且如果它是可移植且运行良好的，请分享它！"
  raw: 'The base64 encoding works well for this feature because it can be decoded
    (you’ll need this for autologin) and it ensures clients’ passwords aren’t stored
    in plain text.


    If you’re not using a LoginServlet, and you’re simply using j_security_check as
    the action on your form, you can still use this feature. Just use a little JavaScript
    to set these cookies in the onsubmit() handler of your form. You’ll lose the encrypted
    password functionality, but this feature will still work.


    The real meat of this feature resides in the BreadCrumbFilter.java class. This
    class does the checking and autologin if the required cookies exist. In the doFilter()
    method for this class, the following code handles this logic:


    // Get the relevant cookies for the "remember me" feature Cookie rememberMe =
    RequestUtil.getCookie(request, "rememberMe"); Cookie passCookie = RequestUtil.getCookie(request,
    "password"); String password =


    (passCookie != null)


    ? URLDecoder.decode(passCookie.getValue(), "UTF-8") : null;


    // Detect if authentication has failed - indicated by the error=true


    // parameter from the <form-error-page> in web.xml


    // StringUtils.equals is a convenience method from commons-lang that handles


    // nulls gracefully.


    boolean authFailed =


    StringUtils.equals(request.getParameter("error"), "true");


    // Check to see if the user is logging out, if so, remove the


    // rememberMe cookie and password cookie.


    if ((authFailed ||


    (request.getRequestURL().indexOf("logout") != -1)) && (rememberMe != null)) {


    if (log.isDebugEnabled()) {


    log.debug("deleting rememberMe-related cookies");


    }


    response =


    RequestUtil.deleteCookie(response,


    RequestUtil.getCookie(request,


    "rememberMe"));


    response = RequestUtil.deleteCookie(response, passCookie);


    }


