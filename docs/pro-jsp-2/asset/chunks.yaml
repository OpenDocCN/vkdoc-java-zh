    • pageEncoding 属性定义 JSP 页面的字符编码。默认值为 contentType 属性中指定的编码，如果未指定，则为 "ISO-8859-1"。


    • isELIgnored：设置 EL 支持。默认值为 false，表示页面中启用 EL。此属性的值会覆盖 web.xml 中指定的值。


    • deferredSyntaxAllowedAsLiteral 属性配置是否将 #{ 视为延迟 EL 语句的开头或字面量。


    • trimDirectiveWhitespaces 属性配置是否从模板文本中修剪空白。


    **taglib 指令**


    标签库是用于扩展 JSP 容器功能模型的标签集合。taglib 指令为页面定义一个标签库命名空间，将标签库描述符（TLD）的 URI 映射到一个前缀，该前缀可用于引用此页面中来自该库的标签。


    <%@ taglib uri|tagdir="/WEB-INF/taglib.tld" prefix="tagPrefix" %>

    '
- fmt: '```xml

    <tagPrefix:tagName attributeName="attributeValue" > JSP content


    </tagPrefix:tagName>


    <tagPrefix:tagName attributeName="attributeValue" />

    ```


    You should assume that the tag library descriptor defines a `tagName` element.
    The `tagdir` attribute indicates this prefix is to be used to identify tag extensions
    installed in the `/WEB-INF/tags/` directory or a subdirectory. If a `tld` is present
    in the specified directory, it’s used. Otherwise, an implicit tag library is used.
    A translation error must occur if the value for the `tagdir` attribute doesn’t
    start with `/WEB-INF/tags/`. A translation error must occur if the value doesn’t
    point to a directory that exists. A translation error must occur if used in conjunction
    with the `uri` attribute.


    ## The `include` Directive


    There are two include tags—the include directive and the `jsp:include` action.
    The include directive includes a static file at translation time, adding any JSP
    in that file to this page for runtime processing:


    ```

    <%@ include file="header.html" %>

    ```


    ## Tag Files


    The directives available in tag files differ from that used in a JSP page. The
    `page` directive is not allowed in a tag file. The `taglib` and `include` directives
    can be used in a tag file. There are three directives that are only valid in tag
    files, and these are listed here:


    - `tag`

    - `attribute`

    - `variable`


    ### The `tag` Directive


    Note that the `page` directive itself isn’t used in a tag file, and instead you
    use the `tag` directive, which may only be used in tag files. The `tag` directive
    looks like this:


    ```

    <%@ tag

    display-name="display-name"

    body-content="scriptless|tagdependent|empty"

    dynamic-attributes="name"

    small-icon="small-icon"

    large-icon="large-icon"

    description="description"

    example="example"

    language="scriptingLanguage"

    import="importList"

    pageEncoding="peinfo"

    isELIgnored="true|false"

    deferredSyntaxAllowedAsLiteral="true|false"

    trimDirectiveWhitespaces="true|false"

    %>

    ```


    Here’s an example `tag` directive:


    ```

    <%@ tag name="msg"

    display-name="Message"

    body-content="scriptless"

    dynamic-attributes="true"

    small-icon="/WEB-INF/small-icon.jpg"

    large-icon="/WEB-INF/large-icon.jpg"

    description="Simple usage of a tag directive"

    %>

    ```


    ### The `attribute` Directive


    The `attribute` directive is analogous to the `<attribute>` element in the tag
    library descriptor, and allows for the declaration of custom action attributes.


    ```

    <%@ attribute

    name="attribute-name"

    required="true|false"

    fragment="true|false"

    rtexprvalue="true|false"

    type="type"

    description="description"

    deferredValue="true|false"

    deferredValueType="type"

    deferredMethod="true|false"

    deferredMethodSignature="signature"

    %>

    ```


    ### The `variable` Directive


    The `variable` directive is analogous to the `<variable>` element in the tag library
    descriptor, and defines the details of a variable exposed by the tag handler to
    the calling page.


    ```

    <%@ variable

    ( name-given="output-name" |

    (name-from-attribute="attr-name" alias="local-name" ) )

    variable-class="output-type|String"

    declare="true|false"

    scope="AT_BEGIN|AT_END|NESTED"

    description="description"

    %>

    ```


    ## Scripting Elements


    Scripting elements are used to include snippets of Java code within a JSP: to
    declare variables and methods, execute arbitrary Java code, and display the result
    of Java expressions.


    ### Declarations


    The following syntax allows you to declare variables and methods for the page.
    These are placed in the generated servlet outside the `_jspService()` method;
    in other words, variables declared here will be instance variables of the servlet,
    and methods declared here will be instance methods of the servlet. Declarations
    don’t produce any output.


    Here’s an example of declaring a variable:


    ```

    <%! String message; %>

    ```


    The following code declares a variable and initializes it:


    ```

    <%! String message = "variable declared"; %>

    ```'
