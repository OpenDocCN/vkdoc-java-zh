    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **31**


    To demonstrate just how effective this basic template mechanism is, use Listing
    1-7 to construct another page (MoreContent.jsp) and see how easy it is to maintain
    the same look and feel.


    **Listing 1-7.** *MoreContent.jsp*


    <%@ include file="./Header.jsp"%>


    <p align="center">Here is some more content...!!!</p>


    <%@ include file="./Footer.jsp"%>


    To open it, do exactly the same as you did for the Content.jsp page, only this
