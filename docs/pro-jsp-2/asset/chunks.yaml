    **Deploying Java Servlet–Based Web Applications**


    In this section, you’ll look at the deployment of Java servlet–based web applications.
    You’ll focus on the deployment of servlets. We’ve already created and used **deployment
    descriptors** (the file named web.xml) several times. As we mentioned earlier,
    the deployment descriptor describes the web application to the container. The
    deployment descriptor file is perhaps the single most important item of your web
    application.


    For the deployment descriptor to be valid for web applications using the Servlet
    2.5 specification, several things must be true:


    • The file must conform to the web application XML Schema, shown here:


    <web-app


    xsi:schemaLocation="http://java.sun.com/xml/ns/javaee/➥


    web-app_2_5.xsd"


    version="2.5">


    • The deployment descriptor must be a well-formed XML file.


    • The deployment descriptor must be named web.xml.


    • The deployment descriptor must reside at the top level of the WEB-INF directory
    of your web application.


    Now that you know what a deployment descriptor is, you may ask what it does. In
    a nutshell, the deployment descriptor conveys the elements and configuration information
    of a web application to developers, assemblers, and deployers. All manner of information
    is defined in the deployment descriptor: from information about the web application
    itself to information about its constituent parts, and most important, how those
    parts are assembled into a complete web application. This section discusses the
    elements of the deployment descriptor that are important for most web applications.
    The way in which a deployment descriptor is written is often the key to how well
    a web application fits its purpose. It’s simple to write the components of a web
    application, but how it’s assembled is a difficult and often neglected task.


    The sections of the deployment descriptor that we are going to focus on are those
    that relate to the deployment and configuration of servlets and JSP pages. This
    does not include the deployment of tag libraries and expression language (EL)
    functions because these are covered elsewhere in this book. The sections that
    you’ll focus on here are as follows:


    • Servlet definitions and mappings


    • Servlet context initialization parameters


    • Error pages


    • JSP configuration elements


    To illustrate the parts of the deployment descriptor, we’ll show you the following
    simple (but complete) example and then explain its constituent parts:


