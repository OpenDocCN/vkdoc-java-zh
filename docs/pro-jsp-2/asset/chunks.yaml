    **Spring**


    The Spring Framework (http://www.springframework.org) aims to be lightweight but
    powerful, and easy to use. Spring is a layered Java EE application framework,
    developed by Rod Johnson. Spring has a lot of features to make enterprise development
    easier for you.


    ■**Note** If you want to learn more about Spring, beyond the short description
    here, we recommend *Expert* *One-on-One J2EE Design and Development* by Rod Johnson
    (Wrox Press, 2002), *Pro Spring* by Rob Harrop and Jan Machacek (Apress, 2005),
    or *Professional Java Development with the Spring Framework* by Rod Johnson and
    others (Wrox Press, 2005).


    Spring can be used on its own to provide a complete enterprise application framework.


    The framework simplifies the work required to build and integrate the presentation
