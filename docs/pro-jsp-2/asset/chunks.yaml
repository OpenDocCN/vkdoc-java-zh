    **Using Custom Converters**


    If you could use only the <convertNumber> and <convertDateTime> tags, your ability
    to create feature-rich web applications would be limited. Fortunately, as you
    might guess from the title of this section, you can create and use custom converters
    in your JSF applications.


    To create a custom converter, you write a class that implements the javax.faces.convert.


    Converter interface. This interface has two methods:


    Object getAsObject(javax.faces.context.FacesContext context, javax.faces.component.UIComponent
    component, java.lang.String value) String getAsString(javax.faces.context.FacesContext
    context, javax.faces.component.UIComponent component, java.lang.Object value)
    The getAsObject() method converts the String value (which can be null) to an instance
    of the supported type and returns the new instance. This method throws a ConverterException
    if the conversion fails. The getAsString() method converts the provided value
    of the supported type (which can again be null) to a String instance and returns
    the new instance. This method also throws a ConverterException if the conversion
    fails.


    If you check the JSF Javadoc, you will see that the JSF implementation includes
    a number of implementations of the javax.faces.convert.Converter interface. These
    are the standard converters that handle converting input and output values to
    the primitive types.


