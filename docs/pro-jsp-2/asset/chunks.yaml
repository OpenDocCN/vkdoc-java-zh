- fmt: "`<servlet-class>org.appfuse.webapp.action.BaseAction</servlet-class>` 如果你希望在分发到方法之前执行逻辑，最好的办法是深入研究\
    \ Struts 代码（开源万岁！）并使用 `DispatchAction` 或 `LookupDispatchAction` 作为基类。你也可以在基类（或每个类）中使用\
    \ `preExecute()` 方法，并在每个方法开始时调用它。我们通过简单地使用 `BaseAction` 来持有公共 action 方法取得了很好的效果。例如，我们使用\
    \ `BaseAction` 实现了一个便捷方法 `getUserForm(session)`，用于从 session 中获取用户信息。\n\n编写完 action\
    \ 后，你需要在 `<action-mappings>` 中配置一个参数，通常命名为 `method` 或 `action`——我们使用 `method`\
    \ 以保持与文档一致，尽管我们更倾向于 `action`：\n\n```\n<action path=\"/test\" type=\"org.example.MyAction\"\
    \ name=\"MyForm\" scope=\"request\"\ninput=\"/test.jsp\" parameter=\"method\"\
    />\n```\n\n然后，你需要在调用此 action 的表单中添加一个隐藏字段。例如：\n\n```\n<html:hidden property=\"\
    method\" value=\"add\"/>\n```\n\n如果你不想从表单中获取 `method` 属性，也可以使用普通的 HTML 标签来实现：\n\
    \n```\n<input type=\"hidden\" name=\"method\" id=\"method\" value=\"add\" />\n\
    ```\n\n此外，你并不总是需要通过表单来调用 dispatch action，例如从列表中编辑某个项目时。为此，你可以使用已定义方法对应的 forward：\n\
    \n```\n<forward name=\"editUser\" path=\"/editUser.do?method=edit\"/>\n```\n\n\
    ---\n\n然而，`DispatchAction` 也存在一些问题。例如，如果你的表单中有多个按钮（如 Add、Copy、Save、Delete）来执行不同的操作，你必须使用\
    \ JavaScript 来操作 `method` 隐藏字段。虽然 JavaScript 是一种完全可以接受的方式，但有一种更简单的方法——`LookupDispatchAction`。\n\
    \n## LookupDispatchAction\n\n`LookupDispatchAction` 类是 `DispatchAction` 的子类，它允许你将按钮标题映射到方法名。此外，它会从你的\
    \ Struts ResourceBundle（`ApplicationResources.properties`）中读取按钮标题。这意味着你可以轻松地将键\
    \ `button.save` 映射到 `save()` 方法。\n\n要在你的项目中实现 `LookupDispatchAction`，首先必须让你的类继承\
    \ `LookupDispatchAction`。同样，我们建议在 `BaseAction` 类中完成此操作，然后让你的项目中的 action 继承这个基类。你需要在\
    \ `<action-mappings>` 中添加一个参数，这与 `DispatchAction` 非常相似：\n\n```\n<action path=\"\
    /test\"\ntype=\"org.example.MyAction\"\nname=\"MyForm\"\nscope=\"request\"\ninput=\"\
    /test.jsp\"\nparameter=\"action\"/>\n```\n\n你可以将参数设置为 `method`，但 `action` 在 `LookupDispatchAction`\
    \ 的 Javadoc 中已有示例，因此我们在这里使用它以避免混淆。`action` 请求参数将用于在 `ApplicationResources` 中定位对应的键。在适当配置\
    \ `struts-config.xml` 或 action 类中的 XDoclet 标签后，你需要在子类中实现 `getKeyMethodMap()` 方法，如下所示：\n\
    \n```\nprotected Map getKeyMethodMap() {\n    Map map = new HashMap();\n    map.put(\"\
    button.add\", \"add\");\n    map.put(\"button.delete\", \"delete\");\n    return\
    \ map;\n}\n```\n\n你的 `ApplicationResources.properties` 文件决定了按钮上显示的文本，因此应包含这两个键的条目：\n\
    \n```\nbutton.add=Add Record\nbutton.delete=Delete Record\n```\n\n最后，你需要将表单提交按钮的\
    \ `property` 属性设置为 `action`，以便将按钮的标题传递给 action：\n\n```\n<html:submit property=\"\
    action\">\n    <bean:message key=\"button.add\"/>\n</html:submit>\n```\n\n```\n\
    <html:submit property=\"action\">\n    <bean:message key=\"button.delete\"/>\n\
    </html:submit>\n```\n\n在 `struts-resume` 应用程序中，`BaseAction` 继承了 `LookupDispatchAction`。我们还对\
    \ `getKeyMethodMap()` 方法进行了自己的小改进，使得键值对可以从另一个属性文件中加载。这样可以在不重新编译的情况下将新方法映射到按钮。这看起来可能有些过度设计，但实现起来只需几分钟。我们遇到的一个问题是，如果你使用\
    \ JavaScript 在点击后禁用提交按钮，`action` 参数将不会被发送。\n\n> **注意**：关于这些内置 action 的更多信息，请参阅\
    \ Struts Javadoc：http://struts.apache.org/javadoc.html。\n\n## 使用 Tiles 框架组装视图\n\
    \n**Tiles** 是一个复合视图框架，用于从组件部分组装展示页面。每个部分（或称为 tile）可以在应用程序中根据需要重复使用。你可以在任何 JSP\
    \ 或 servlet 应用程序中使用 Tiles，但它最初是为 Struts 设计的，因此在 Struts 中使用最为方便。自 Struts 1.1 起，Tiles\
    \ 框架已集成到核心 Struts 库（`struts.jar`）中。Tiles 常被视为一个重量级、配置密集型的插件，但实际上它提供了与（现已弃用的）`struts-template`\
    \ 标签库相同的简单功能。\n\nTiles 由 Cedric Dumoulin 开发，在我们看来，它是 JSP 开发者遇到的最好的东西之一。像 CSS 和\
    \ XHTML 这样的标准也很棒（并且为开发跨浏览器工作的 Web 应用程序提供了更多结构），但 Tiles 让事情变得*更容易*。Tiles 将减少你在构建\
    \ Web 应用程序时的开发时间，并且还能让你相对轻松地更改整个应用程序的外观。它提供了我们所知道的最佳布局框架，尽管还有其他框架拥有热情的拥护者，例如 OpenSymphony\
    \ 的 SiteMesh（http://www.opensymphony.com/sitemesh）。\n\n在过去的几年里，我们开发了几个 JSP 应用程序，并使用了多种不同的技术进行布局。第一种技术类似于开发静态网站，每个\
    \ JSP 页面都包含典型 HTML 页面的所有布局元素。这包括 `<html>` 声明、`<head>` 元素、`<body>`，以及 `<body>`\
    \ 内的任何 `<div>` 或 `<table>` 元素，还有实际内容。虽然这对 HTML 开发者来说通常更容易掌握，但这绝对是困难的方式。如果你需要进行网站重新设计，很可能需要修改每个\
    \ JSP 文件。当然，HTML 编辑器（如 Dreamweaver、BBEdit 和 HomeSite）可以通过全局搜索和替换功能使这变得更容易，但同时你也可能轻易搞乱\
    \ HTML。\n\n一种更简单的方法是*包含*所有页面共有的元素。这些元素包括包含 CSS 和 JavaScript 引用的 `<head>` 元素，或者所有页面共有的菜单。\n\
    \n虽然这种方法比第一种方法容易得多，但你仍然需要在所有页面中重复代码来包含这些外部元素。可能只有三到四行代码，但如果你忘记包含头部，很可能直到你（或你的用户）在浏览器中运行页面时才会发现。"
  raw: '<servlet-class>org.appfuse.webapp.action.BaseAction</servlet-class> If you
    want to perform logic before dispatching to your methods, your best bet is to
    dig into the Struts code (good ol’ open source!) and use DispatchAction or LookupDispatchAction
    as your base class. You can also use a preExecute() method in your base class
    (or in each class) that you call at the beginning of each method. We’ve had good
    success with simply using a BaseAction to hold common action methods. For instance,
    we’ve used our BaseAction to implement a convenience method, and getUserForm(session)
    to get a user’s information from the session.


    Once you’ve written your action, you then need to configure your <action-mappings>
    with a parameter appropriately named method or action—we use method to be consistent
    with the documentation, even though we prefer action:


    <action path="/test" type="org.example.MyAction" name="MyForm" scope="request"


    input="/test.jsp" parameter="method"/> Then you’ll need to add a hidden field
    to your forms that call this action. For instance:


    <html:hidden property="method" value="add"/> You can also do this with a normal
    HTML tag if you aren’t trying to grab the method property from your form:


    <input type="hidden" name="method" id="method" value="add" /> It’s also plausible
    that you won’t always call your dispatch action with a form, say if editing an
    item from a list. For this, you can use a forward defined by the method already
    defined:


    <forward name="editUser" path="/editUser.do?method=edit"/>


    513-0 ch15.qxd 11/14/05 5:38 PM Page 606


    **606**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    There are, however, issues with DispatchAction. For instance, if you have a form
    with a number of buttons (such as Add, Copy, Save, Delete) to perform different
    actions, you have to use JavaScript to manipulate the method hidden field. While
    JavaScript is a perfectly acceptable way to do this, there’s an easier way—LookupDispatchAction.


    LookupDispatchAction


    The LookupDispatchAction class is a subclass of DispatchAction that allows you
    to map button captions to method names. Furthermore, it reads the button captions
    from your Struts ResourceBundle (ApplicationResources.properties). This means
    that you can easily map the key button.save to the save() method.


    To implement a LookupDispatchAction in your project, you must first extend the
    LookupDispatchAction in your class. Again, we recommend doing this in a BaseAction
    class, and then extending your project’s actions from this one. You’ll need to
    add a parameter to your <action-mappings>, which is very similar to DispatchAction:


    <action path="/test"


    type="org.example.MyAction"


    name="MyForm"


    scope="request"


    input="/test.jsp"


    parameter="action"/>


    You could set the parameter to method, but action is demonstrated in the LookupDispatchAction’s
    Javadoc, so we’ve used it here to avoid confusion. The action request parameter
    will be used to locate the corresponding key in ApplicationResources. After configuring
    your struts-config.xml appropriately, or your XDoclet tags in your action class,
    you’ll then need to implement the getKeyMethodMap() method in your subclass like
    so: protected Map getKeyMethodMap() {


    Map map = new HashMap();


    map.put("button.add", "add");


    map.put("button.delete", "delete"); return map;


    }


    Your ApplicationResources.properties file determines the text that appears on
    your buttons and therefore should contain entries for both of these keys: button.add=Add
    Record


    button.delete=Delete Record


    Finally, you need to set the property attribute to action for your form’s Submit
    buttons in order to pass the buttons’ caption to your action:


    <html:submit property="action">


    <bean:message key="button.add"/>


    </html:submit>


    513-0 ch15.qxd 11/14/05 5:38 PM Page 607


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **607**


    <html:submit property="action">


    <bean:message key="button.delete"/>


    </html:submit>


    In the struts-resume application, the BaseAction extends LookupDispatchAction.
    We’ve also added our own little enhancement to the getKeyMethodMap() method, so
    that the key or value pairs are loaded from another property’s file. This allows
    mapping new methods to buttons without recompilation. This might seem like overkill,
    but it only took a couple minutes to implement. One problem we’ve seen with this
    class is that if you use JavaScript to disable your Submit buttons after they’ve
    been clicked, the action parameter won’t be sent.


    ■**Note** More information on each of these built-in actions can be found in the
    Struts Javadocs at http://struts.apache.org/javadoc.html.


    **Using the Tiles Framework to Assemble the View**


    **Tiles** is a Composite View framework for assembling presentation pages from
    component parts. Each part, or tile, can be reused as often as needed throughout
    your application. You can use Tiles in any JSP or servlet application, but it
    was originally designed for Struts and is therefore easiest to use within Struts.
    Since Struts 1.1, the Tiles framework has been integrated into the core Struts
    library (struts.jar). Tiles is often seen as a heavyweight, configuration-intensive
    plug-in, when in fact it offers the same simple functionality as the (now deprecated)
    struts-template tag library.


    Tiles was developed by Cedric Dumoulin, and in our opinion is one of the best
    things that ever happened for JSP developers. Standards like CSS and XHTML are
    also awesome (and have provided more structure to develop web applications that
    work across browsers), but Tiles has made it so much *easier*. Tiles will reduce
    your development time in building web applications and will also make it relatively
    easy to change the entire application’s look. It offers the best layout framework
    we know of, although there are others that have fervent sup-porters such as SiteMesh
    (http://www.opensymphony.com/sitemesh) from OpenSymphony.


    We’ve developed several JSP applications over the past few years, and we’ve laid
    them out using many different techniques. The first technique was similar to how
    you would develop a static website, where each JSP page contained all the layout
    elements of a typical HTML page.


    This included the <html> declaration, the <head> element, <body>, and any <div>
    or <table> elements within the body as well as the actual content. While this
    is generally easier for HTML


    developers to grasp, it’s definitely the hard way. If you ever need to carry out
    a site redesign, chances are you’ll need to meddle with every JSP file to do so.
    Of course, HTML editors (such as Dreamweaver, BBEdit, and HomeSite) will make
    this easier with their global search-and-replace features, but you can easily
    mess up your HTML at the same time.


    An easier way is to *include* elements that are common to all pages. Such elements
    include the <head> element, which contains your CSS and JavaScript references,
    or a menu that is common to all pages.


    513-0 ch15.qxd 11/14/05 5:38 PM Page 608


    **608**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    While this approach is much easier than the first approach, you’re still duplicating
    code between all your pages to include these external elements. It might only
    be three or four lines of code, but nevertheless, if you forget to include the
    header, chances are you won’t find out until you (or your users) run your page
    through a browser.'
