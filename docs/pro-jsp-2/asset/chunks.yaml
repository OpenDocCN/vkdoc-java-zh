    **Tiles, XDoclet, and Forwards**


    Using Tiles to assemble and define your pages can be quite handy, but how do you
    call these definitions? The easiest way to reference your Tiles definitions is
    using an ActionForward.


    When you add the Tiles plug-in to your Struts configuration file, a smart Tiles-aware
    processor is used to execute requests. This processor, named TilesRequestProcessor,
    subclasses the Struts default RequestProcessor to intercept calls to includes
    and forwards to see if the specified URI (path) is a definition name.


    To configure Tiles definition forwarding in your application, all you need to
    do is match up the “path” attribute of a <forward> with the name attribute of
    a definition. For example, in struts-resume, the ResumeAction’s search() method
    returns an ActionForward to a local


    <forward> named list:


    return mapping.findForward("list");


    This forward is defined in struts-config.xml for the ResumeAction class as follows:


    <action path="/editResume" type="org.appfuse.webapp.action.ResumeAction"


    name="resumeForm" scope="request" input="viewResumes"


    parameter="action" unknown="false" validate="false">


    <forward name="edit" path=".resumeDetail" redirect="false"/>


    <forward name="list" path=".resumeList" redirect="false"/>


    </action>


