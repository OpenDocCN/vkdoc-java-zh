    **Listing 4-13.** *xml_if.jsp*


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <%@ taglib uri="http://java.sun.com/jstl/xml" prefix="x" %>


    <c:import url="book.xml" var="url" />


    <x:parse xml="${url}" var="book" scope="session" />


    <x:if select="$book/book/publisher=''Apress''"> Another great title from Apress!


    <p>


    <b><x:out select="$book/book/title"/></b><br>


    <x:out select="$book/book/author"/><br>


    <x:out select="$book/book/url"/><br>


    </x:if>


    You can see that the <x:if> action enables you to control whether to output any
    information based on the content of the XML. In this case, if the value of the
    book’s Publisher attribute is Apress, you’ll happily publicize the book and generate
    some content. If the Boolean condition is false and a different publisher has
    been used, you won’t generate any information about the book—sneaky, eh!


    According to the book.xml you used earlier, the book has indeed been published
    by Apress and so the body of the previous <x:if> action may be processed. Figure
    4-14 shows the result.


    **Figure 4-14.** *The <x:if> action can produce conditional output.*


    **The <x:choose>, <x:when>, and <x:otherwise> Actions** To complement the <x:if>
    action mentioned earlier, there are also a set of actions to provide mutually
    exclusive, XML-dependent conditional behavior in exactly the same way as the actions
    in the Core tag library.


    The following JSP page builds on the earlier example and provides you with the
    ability to market books from different publishers with different content:


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <%@ taglib uri="http://java.sun.com/jstl/xml" prefix="x" %>


