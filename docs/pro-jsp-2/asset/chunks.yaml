    Introduction to Filtering


    **F**iltering is a standard feature of all Servlet 2.5–compliant containers. Since
    its introduction in the Servlet 2.3 specification, filters have found widespread
    use among Java EE developers.


    Some popular uses for filters include authentication, auditing, compression, encryption,
    and on-the-fly format transformation, to name but a few. For the very first time,
    an application-level programmer can tap into the request-processing pipeline of
    the container—in a portable, nonserver-specific manner. Servlet 2.5 further enhances
    container support of filters by providing filtering for dispatched requests—a
    feature that you’ll be looking at in detail over this chapter and the next.


    The unique positioning of filters in the processing pipeline, the relative ease
    with which they can be written and designed, and the versatile way these filters
    can be configured make them ideal design choices for a wide range of web-application
    features that were formerly impossible, difficult, or awkward to implement.


    In this chapter, you’ll learn the following:


    • What a filter is, what it can do, and why it’s needed


    • How filters fit in with the rest of the servlets and JSP machinery


    • What life cycle is followed by container-managed filters


    • The power of filter mapping


    • What the importance of filter chaining is


    • How RequestDispatcher interacts with the action of filters and filter chains


    • How to develop filters by using three complete code samples


    • How filters differ from interceptors and valves


    • What some best practices for filter design and coding are The material covered
    in this chapter will provide a basic understanding of what Servlet 2.5


    filtering is all about. You’ll dive into the important concepts and illustrate
    them with easy-to-understand code wherever necessary. We have purposely deferred
    advanced concepts in filtering, together with detailed design issues for more
    complex filters, to the next chapter.


    **399**


    513-0 ch10.qxd 11/17/05 8:43 PM Page 400


    **400**


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    This chapter is concept-heavy and code-light, while the next one will be both
    concept- and code-heavy as we provide insight into the design and coding of many
    typical filters. Chapter 11


    focuses on the techniques used in programming filters and serves as a “cookbook”
    for the practicing JSP programmer, letting you incorporate filters into your favorite
    application recipes.


    **Common Filter Applications**


    Before you take a technical look at what a filter really is, let’s start with
    a quick look at some applications of filters in the real world. Here is a short
    list of common filter applications, together with a description of the specific
    feature that makes the filter appropriate for the application:


    • Filters can **intercept request header information before it reaches the resource**
    in the processing pipeline and can therefore be used to create customized authentication
    schemes. For example, a filter can be written to authenticate a user against an
    external legacy system before allowing access to a resource. Having “wide open”
    exposure to all the request headers, filters can be written to perform sophisticated
    logging and auditing. Combining the use of filters with URL pattern–based filter
    mapping, you can have fine-grained control on the set of resources to protect
    or audit.


    • Filters are also useful in **data transformation**. For example, you can use
    filters to present an XML document as HTML via an XSLT transformation filter on
    the fly. Another form of data transformation filter might perform encryption or
    compression. For example, a filter can first detect whether a user agent (browser)
    supports compressed data streams. If the browser can handle the compression, the
    filter can then compress the response from a resource on the fly.


    • Filters can **preempt the serving of a particular resource** altogether and
    generate their own response. One example could be a time-sensitive filter that
    blocks access to certain resources (such as an Internet proxy server) outside
    certain set hours. Yet another interesting application in this category is customized
    caching. A filter can maintain a cache of most frequently requested (static) resources
    based on prespecified criteria, and serve a cached copy instead of accessing the
    real resource whenever possible.


    By strategically combining the request dispatcher and filters, web-application
    frameworks designers can create specialized filters that perform a service such
    as form validation, data pre-fetch, and other functions. In these cases, filters
    can become fully fledged, bona fide resource processors in the request-processing
    pipeline.


    **The Big Picture of Filtering**


    The middle-tier component of the Java EE architecture consists of an application
    server often fronted by a web server. These servers serve up web content and execute
    servlets and JSP


    pages in response to incoming client requests. Figure 10-1 illustrates how client
    requests flow through a stand-alone application server such as Tomcat:


    513-0 ch10.qxd 11/17/05 8:43 PM Page 401


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    **401**


    **Figure 10-1.** *A client can request various types of resources from a web server.
    The web server* *routes the request and returns the appropriate resource to the
    client.*


    One way of looking at this diagram is to view it as a server for resource requests.
    In this view, you don’t differentiate between static and dynamically generated
    resources. Therefore, the middle-tier server becomes a server that serves one
    of three types of resources based on incoming requests:


    • Static content (HTML, images, and so on)


    • A servlet


    • A JSP page (which may be considered a specialized case of a servlet)


    ■**Note** This chapter and the next continually refer to this resource-based view
    of request processing. This is the way a filter designer looks at the container.
    Note that servlets and JSP pages are sometimes called


    “processing resources” because they can actively perform processing on a request.


    Figure 10-2 illustrates this simplified view of the middle-tier server, emphasizing
    the request and response flow and showing where filters fit into the picture.


    You can see that the filters are positioned in the **processing pipeline**, between
    the application server and the client. A filter provides application-level access
    in the request-handling pipeline of the container.


    513-0 ch10.qxd 11/17/05 8:43 PM Page 402


    **402**


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    **Figure 10-2.** *Filters are called by the application server both prior to and
    subsequent to the* *resource processing of a request.*


    Before the advent of filters, there was no way for web applications to participate
    in the processing being performed along the request-handling path. A web application
    could only supply and define the resources that were being served. If an application
    required access to the processing pipeline, you had to resort to nonportable server-level
    extensions (interceptors, valves, and the like which you’ll look at later).


    Due to their strategic position in the request-processing pipeline, filters can
    easily handle the pre- and postprocessing of requests for resources (such as HTML
    pages, JSP pages, and servlets). The specialized construction of filters, as you’ll
    discover later, will actually allow them to participate in the processing of the
    request or response throughout the processing path.


    You also have the option of chaining several filters together dynamically to process
    each incoming request. This allows the filter deployer to combine the action of
    two or more filters at deployment time. At runtime, the container uses filter
    mappings to determine the filter or filters that each request and response will
    pass through.


    **Filtering the Pipeline**


    Filters enable a developer to tap into the pipeline of request and response processing.
    A filter can do its work just before the resource is fetched (or executed in the
    case of dynamic output), and immediately after the resource is fetched and executed.
    It’s even possible to inject custom behavior *while* the request is being processed
    by the resource.


    513-0 ch10.qxd 11/17/05 8:43 PM Page 403


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    **403**


    More specifically, when you apply this notion to the HTTP-based request and response
    that is serviced by the middle-tier servers, filters can be used to do the following:


    • Inspect the request header and data before it reaches the resource


    • Inspect the response header and data after it has been sent by the resource


    • Provide a modified version of the request to the resource being processed by
    the container


    • Access and modify the response from the resource before returning it


    • Stop a request from reaching a resource altogether


    This behavior is depicted in Figure 10-3.


    **Figure 10-3.** *Filters can act on the request before it reaches the resource,
    and on the response after* *the resource has been accessed.*


    You’ll examine filter implementations that perform each of these actions in this
    chapter and the next. You should note that code implemented in filters can have
    the same power, if not more, as code implemented in resources (in other words,
    servlets and JSP pages) when it comes to request processing. In some ways, you
    can view the servlet engine and the JSP


    engine simply as end-point filters in this processing pipeline.


    **Filters in Depth**


    You’ll now take a more concrete, technical look at what filters really are. First,
    you’ll become intimately acquainted with the single interface that defines a filter:
    the Filter interface.


    513-0 ch10.qxd 11/17/05 8:43 PM Page 404


    **404**


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    **The Filter Interface**


    A filter is simply a class that implements the javax.servlet.Filter interface.
    Similar to the javax.servlet.Servlet interface, there are three life-cycle methods
    that a filter must implement:


    • **public void init(FilterConfig config)throws ServletException:** The container
    is responsible for setting the FilterConfig object before the doFilter() method
    (described next) is called for the first time. The FilterConfig object provides
    the initialization parameters for the filter and also allows access to the associated
    ServletContext.


    • **public void doFilter(ServletRequest req, ServletResponse res, FilterChain**
    **chain) throws IOException, ServletException:** The doFilter() method contains
    the logic of the filter. It’s where almost all of the work of a filter is done.
    The container will call this method each time an applicable request is being handled.
    You’ll see how to associate filters with types of requests in the next section.


    • **public void destroy():** The container calls destroy() when the filter is
    being taken out of service.


    Any class that implements this interface is officially a filter and can then be
    included as a component of a web application.


    **Configuration and Deployment of Filters**


    In the deployment phase, filters are an integral part of a web application, at
    the same level as servlets, JSP pages, or static resources. Filters are typically
    created by developers and delivered as bytecode classes within a web application.
    Typically, a web application’s filters are configured at deployment by specifying
    the following:


    • Which filter(s) to use


    • Any initialization parameters to the filter


    • Where to apply the filter


    • The order in which multiple filters are chained together (if applicable) All
    of the previous items are specified within the standard Java EE web-application
    deployment descriptor (web.xml).


    In this way, filters are configured and deployed in a similar fashion as servlets
    in a web application. The servlet container supporting filters will parse the
    following two types of filter-related declarations present within this file:


    • **Filter definition:** Tells the container the textual name associated with
    the filter


    • **Filter mapping:** Tells the container which resources the filter will be applied
    to You’ll cover these in more detail shortly when you examine filter definition
    and configuration.


    Now that you know what a filter is, you need to take a look at the interactions
    that occur between a container and the filter and specifically the life cycle
    of a filter.


    513-0 ch10.qxd 11/17/05 8:43 PM Page 405


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    **405**


    **The Life Cycle of a Filter**


    Just like servlets and JSP pages, the container manages the life cycle of a filter.
    You’ll learn the following in this section:


    • When the container instantiates a filter


    • How initialization parameters are passed into a filter


    • How the container determines how many instances of the filter to create


    • When the doFilter() method is called


    • How filters can clean up on application shutdown


    Figure 10-4 illustrates the life cycle of a filter by using a block diagram to
    represent states that the filter can be in. As you can see, the filter life cycle
    is almost identical to that of the servlet life cycle. The four stages of the
    filter life cycle (instantiation, initialization, filter execution, and destruction)
    are analogous to the servlet life cycle (instantiation, initialization, request
    execution, and destruction). Of the four stages, there are only two explicit states:
    initialization and filter execution. In the other two stages, the filter instance
    does not exist; it is either being created or being destroyed.


    **Figure 10-4.** *The life cycle of a filter is similar to the life cycle of a
    servlet. The filter is created* *and initialized, it processes requests, and it
    is destroyed when no longer needed.*


    513-0 ch10.qxd 11/17/05 8:43 PM Page 406


    **406**


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    For each filter definition in the web application (as specified in web.xml), the
    container will create and initialize a filter instance.


    Every filter must implement the javax.servlet.Filter interface. This interface
    defines three methods: init(), doFilter(), and destroy(). These three methods,
    and the constructor, correspond to the four stages of the filter life cycle. The
    constructor is called during the instantiation phase. The init() method is called
    for initialization. The doFilter() method, which contains all the filter-processing
    logic, handles the filter execution phase. Finally, the destroy() method is used
    in the destruction phase.


    That single filter instance, with its initial parameters, will service all requests
    that correspond to its filter mapping specified within the deployment descriptor.
    The only exception to this occurs when the engine consists of multiple Java Virtual
    Machine (VM) servicing requests.


    In this case, the container mechanism will create one instance in each VM, thereby
    allowing all participating VMs to service filtered resources equally. The container
    will call destroy() when the web application is shut down.


    The initialization must occur before the first request is mapped through the filter
    instance. During initialization, the container passes a FilterConfig object via
    the init() method of the javax.servlet.Filter interface.


    The FilterConfig can be used by the filter to obtain initialization parameters
    of the filter, the textual name of the filter, or the ServletContext that the
    application is running under.


    **The FilterConfig Interface**


    The FilterConfig interface declares four methods:


    • **public String getFilterName():** You can use this method to obtain the textual
    name of the filter, as defined in the web.xml deployment descriptor.


    • **public String getInitParameter(String paramName):** The getInitParameter()
    method obtains the string value of a specific initialization parameter by name.
    Returns null if not found.


    • **public Enumeration getInitParameterNames():** This method obtains a java.util.


    Enumeration consisting of all the names of the initialization parameters for this
    instance. These parameters are specified in the web.xml deployment descriptor
    within the <filter> definitions. Returns an empty enumeration if no parameter
    is set.


    • **public ServletContext getServletContext():** This method obtains the ServletContext
    that the filter is executing within. This context is typically specified in the
    server.xml file of the server.


    In all cases, after a filter is instantiated and initialized, the container will
    send all requests that the filter maps to through the filter’s doFilter() method.
    For most static pages, JSP pages, and servlet resources, this means that many
    threads of execution may be executing the doFilter() method at the same time.
    Therefore, you must take care to write filters that are thread-safe.


    513-0 ch10.qxd 11/17/05 8:43 PM Page 407


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    **407**


    The filter instance will be kept alive to process a request until the container
    (or a VM in the container) shuts down or the associated web application is undeployed.
    Before this happens, the container calls destroy() to give the filter a chance
    to perform any cleanup work that may be necessary.


    **Filter Definitions**


    Filters can be defined for each web application. Filter definitions appear in
    the web.xml deployment descriptor inside the <filter> element. Each <filter> element
    must have a


    <filter-name> child element, a <filter-class> child element, and optionally one
    or more


    <init-param> child elements. Here is a brief description of each:


    • **<filter-name>:** Textual name to associate with the filter. Used in filter
    mapping. This is a mandatory element.


    • **<filter-class>:** The actual class that implements a filter. Should be a fully
    qualified class name with a package prefix. This is a mandatory element.


    • **<init-param>:** Specifies the initial parameters to supply to this instance
    of the filter.


    Contains <param-name> and <param-value> subelements, specifying the name and value
    of the parameter, respectively. Note that <init-param> is an optional child element
    of


    <filter>, which can also appear multiple times—once for each initialization parameter
    for the filter.


    As an example, consider an audit filter that logs all access to certain specified
    resources.


    The AuditFilter class would be set up in the application’s web.xml file as follows:


    <filter>


    <filter-name>Audit Filter</filter-name>


    <filter-class>filters.AuditFilter</filter-class>


    </filter>


    The previous segment associates the name Audit Filter with the filter implementation
    in AuditFilter.class.


    You’ll examine the details of the initial parameters of filters after you’ve looked
    at how filters are mapped to resources.


    **Filter Mapping**


    You’ve seen how to define a filter in the web.xml deployment descriptor file.
    Now let’s move on to look at how to map a filter. Filter mapping allows you to
    specify resources that the filter will be applied to within your application on
    a by-request basis. Applying a filter to a resource literally means adding the
    filter to the processing pipeline when accessing that resource.


    Filter mappings are XML-based entries, specified per web application within the
    web.xml file. The “mapping” that is performed is between the filter’s textual
    name and one or more resources that the filter will be applied to. Because the
    filter mapping uses the filter’s textual name, the corresponding <filter> element
    must precede a <filter-mapping> element within the web.xml file.


    513-0 ch10.qxd 11/17/05 8:43 PM Page 408


    **408**


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    This is what the filter mapping for our audit filter might look like:


    <filter-mapping>


    <filter-name>Visual Audit Filter</filter-name>


    <servlet-name>mylocate</servlet-name>


    </filter-mapping>


    Here, the mapping specifies that the filter declared as Visual Audit Filter (in
    a previous


    <filter> declaration) will be applied only when a request is received for the
    servlet resource called mylocate. It’s assumed, of course, that the servlet name
    is defined within the same web.xml file, like this:


    <servlet>


    <servlet-name>mylocate</servlet-name>


    <servlet-class>FindProd</servlet-class>


    </servlet>


    To map a filter to more than one resource, you need to either create multiple
    mapping entries or create a filter mapping that uses a URL pattern. Now let’s
    take a look at how to use URL patterns.


    Matching URL Patterns


    The real power of filter mapping becomes evident when you use URL pattern matching.
    URL


    patterns allow users to apply a filter to a group of resources with some commonality
    in its URL. You can also use wildcard characters (such as *) within the URL to
    match multiple URLs.


    This is similar to the handling of the <servlet-mapping> element.


    Depending on how the URL pattern is specified, you can apply a filter to a set
    of homoge-neous resources (for instance, just servlets) or a set of heterogeneous
    resources (a mix of static HTML files, servlets, and JSP pages). Table 10-1 lists
    some sample URL patterns.


    **Table 10-1.** *Example Filter Mapping Patterns*


    **URL Pattern**


    **Matches**


    /*


    Everything that is served by this web application, including static pages, servlets,
    and JSP pages


    /servlet/*


    All servlets (assuming all servlets are mapped under the /servlet path)


    /jsp/*.jsp


    All JSP pages located on the /jsp path


    /dept/accounting/*


    All resources in the accounting department branch of the web application


    The following is an example of filter mapping that uses a URL pattern:


    <filter-mapping>


    <filter-name>Audit Filter</filter-name>


    <url-pattern>/*</url-pattern>


    </filter-mapping>


    513-0 ch10.qxd 11/17/05 8:43 PM Page 409


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    **409**


    This declaration applies the Audit Filter filter to all resources served by the
    application.


    Here’s another example:


    <filter-mapping>


    <filter-name>Stop Games Filter</filter-name>


    <url-pattern>/servlet/*</url-pattern>


    </filter-mapping>


    Assuming that servlets in this web application are mapped under the /servlet path,
    this filter mapping would apply the Stop Games Filter to all servlets in the application.


    **Insertion of Filters into the Request Flow**


    Prior to Servlet 2.4, filters could operate only on requests as they originated
    from the client.


    However, many modern web applications and frameworks make extensive use of the
    ability to dispatch requests from one processing resource to another (servlet
    to servlet, servlet to JSP, JSP to servlet, JSP to JSP, and so on). The inability
    of filters to work in the processing pipeline between dispatch points handicapped
    earlier versions of servlet containers. This was changed with the Servlet 2.4
    specification, and containers such as Tomcat 5.5 have full flexibility to insert
    filters into the request flow—even in-between programmatically dispatched points.


    Filters and the Request Dispatcher


    To better understand how the request dispatcher interacts with filters, we’ll
    present a series of figures depicting the request flow in a servlet container.
    First, we’ll show the action of Servlet 2.3–compliant containers. These containers
    support filters but don’t support interactions with the request dispatcher.


    Servlet 2.3–Compliant Container Filtering


    Consider a filter mapping similar to the following:


    <filter-mapping>


    <filter-name>F1</filter-name>


    <url-pattern>/*</url-pattern>


    </filter-mapping>


    <filter-mapping>


    <filter-name>F2</filter-name>


    <url-pattern>/*</url-pattern>


    </filter-mapping>


    <filter-mapping>


    <filter-name>F3</filter-name>


    <url-pattern>/*</url-pattern>


    </filter-mapping>


    Figure 10-5 illustrates the filtering that will be performed.


