- fmt: '# APPENDIX A ■ JAVA SERVER PAGES SYNTAX REFERENCE


    You can define a method for use on the global page like so:


    ```

    <%! public String showMessage() { return message; } %>

    ```


    `Declaration` tags are mainly used in conjunction with scriptlets.


    ## Scriptlets


    Scriptlets enclose Java code (on however many lines) that is evaluated within
    the generated servlet’s `_jspService()` method to generate dynamic content:


    ```

    <%

    // Java code

    %>

    ```


    Take care when using adjacent scriptlet blocks; the following code


    ```

    <% if(user.isLoggedIn) { %>

    <p>Hi!</p>

    <% } %>

    <% else { %>

    <p>Please log in first...</p>

    <% } %>

    ```


    isn’t legal because we’ve broken the `else` block into two scriptlets with embedded
    whitespace between the scriptlets.


    ## Expressions


    Expressions return a value from the scripting code as a `String` to the page:


    ```

    <p>Hello there,

    <%= userName %>

    Good to see you.</p>

    ```


    Expressions are not complete Java statements, so you do not terminate an expression
    with a semicolon as you would with a line of code in a scriptlet.


    ## Standard Actions


    The standard actions provide various facilities for manipulating JavaBeans components,
    including and forwarding control to other resources at request time and generating
    HTML to use the Java plug-in.


    ### `<jsp:useBean>`


    The `<jsp:useBean>` tag checks for an instance of a bean of the given class and
    scope. If a bean of the specified class exists, it references it with the `id`;
    otherwise it instantiates it. The bean is available within its scope with its
    `id` attribute.


    You can include code between the `<jsp:useBean>` tags, as shown in the second
    example—this code will only be run if the `<jsp:useBean>` tag successfully instantiates
    the bean:


    ```

    <jsp:useBean id="aBeanName"

    scope="page|request|session|application"

    typeSpecification

    />

    ```


    or


    ```

    <jsp:useBean id="anotherBeanName"

    scope="page|request|session|application"

    typeSpecification>

    <jsp.setProperty name="anotherBeanName"

    property="*|propertyName" />

    </jsp:useBean>

    ```


    There is a lot of flexibility in specifying the type of the bean (indicated by
    `typeSpecification`). You can use


    - `class="class_name"`

    - `type="typeName"`

    - `class="package.class" type="typeName"` (and with terms reversed)

    - `beanName="beanName" type="typeName"` (and with terms reversed)


    where


    - `typeName` is the class of the scripting variable defined by the `id` attribute;
    that is, the class that the bean instance is cast to (whether the class, a parent
    class, or an interface the class implements).

    - `beanName` is the name of the bean, as used in the `instantiate()` method of
    the `java.beans.Beans` class.


    ### `<jsp:setProperty>`


    The `<jsp:setProperty>` tag you used previously sets the property of the bean
    referenced by name using the value:


    ```

    <jsp:setProperty name="anotherBeanName"

    propertyExpression

    />

    ```


    The `propertyExpression` can be any of the following:


    - `property="*"`

    - `property="propertyName"`

    - `property="propertyName" param="parameterName"`

    - `property="propertyName" value="propertyValue"`


    where


    - The `*` setting tells the tag to iterate through the request parameters for
    the page, setting any values for properties in the bean whose names match parameter
    names.

    - The `param` attribute specifies the parameter name to use in setting this property.

    - The `value` attribute can accept a request-time attribute expression.

    - Omitting `value` and `param` attributes for a property assumes that the bean
    property and request parameter name match.

    - The `value` attribute `String` can be automatically cast to `boolean`, `byte`,
    `char`, `double`, `int`, `float`, `long`, and their class equivalents. Other casts
    will have to be handled explicitly in the bean’s `setPropertyName()` method.


    ### `<jsp:getProperty>`


    The final bean-handling action is `<jsp:getProperty>`, which gets the named property
    and outputs its value for inclusion in the page.'
