    will make your Struts development journey easier. You should be able to use the
    basicLayout.jsp and tiles-config.xml files to get up and running. If you already
    know Struts and aren’t using Tiles, you owe it to yourself (and your deadlines)
    to try it out.


    **Using IDEs and Struts Development Environments**


    We used to use Macromedia’s HomeSite and vi for all our Java editing, because
    we hated the bloat and RAM wastage of an IDE. Furthermore, IDEs always seemed
    to complicate things more than they helped. With the maturity of tools like IDEA
    and Eclipse, using an IDE is fun again—and worth our time (a gig of RAM doesn’t
    hurt either).


    We’ve never felt the need to use an IDE to help us configure our struts-config.xml
    or web.xml file. However, this was probably because these tools didn’t exist when
    we first started working with Struts and web application. Now we’re glad we learned
    the DTDs and we feel


