    + this.options[this.selectedIndex].value)


    </ch08:eventHandler>


    </ch08:select>


    The benefit of adopting this sort of approach is twofold. First, it provides a
    standard and natural way to add event handlers to the generated HTML tag. Having
    a specific <eventHandler> tag is more readable than having a generic <jsp:attribute>
    tag. Second, it provides a way to ensure that the JavaScript code doesn’t get
    interpreted in any way by the JSP compiler; you can specify the body content of
    the <eventHandler> tag as tagdependent. For this to work, the


    <eventHandler> tag will take the body content (the JavaScript code) and pass it
    directly to the enclosing <select> tag. The <select> tag can then use this information
    when generating the underlying HTML.


