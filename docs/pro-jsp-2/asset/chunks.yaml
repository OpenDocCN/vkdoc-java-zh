    P R A C T I C E S


    }


    }


    }


    // we got this far so the specified cookie wasn''t found return null;


    }


    }


    This tag will have two attributes: id and name. You use the id attribute to specify
    the name of the scripting variable on the page, and you use the name attribute
    to specify the name of the cookie that you’d like to look up. Another benefit
    of using the TagSupport class in this example rather than the SimpleTagSupport
    class is that the instance variable and setter method for the id attribute are
    already provided. Traditionally, the id attribute has been used to specify the
    name of scripting variables on the page and, because it used to be such a common
    requirement, the id attribute has been implemented for us in the TagSupport class.


    Next, you have the processing associated with this tag. Essentially, all this
    does is look up the named cookie with a private helper method. If the cookie is
    found, the Cookie object is placed into page scope under the name supplied by
    the id attribute. The body content of the tag is then evaluated. If the cookie
    isn’t found, the body content is simply skipped. This is yet another example of
    how tags can programmatically evaluate their body content.


    Note that you don’t mention anything about scripting variables—the object that
    you’d like to access as a scripting variable is just placed into page scope.


