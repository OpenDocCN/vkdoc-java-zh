    of the Front Controller pattern presented here is fairly simple and straightforward,
    but many improvements can be made. Examples include a standard way to build HTML
    forms and perform validation, more sophisticated components to display information
    from the model, and so on. Although such work isn’t particularly complex, it’s
    time-consuming. Therefore, several third-party frameworks are available for developers
    to use as a starting point for their web applications.


