    You can also extract a lot of information relating to the path used to request
    your servlet. The following methods return information about this path:


    public String getQueryString()


    The getQueryString() method returns the query string of a request, or null if
    there was no query string. For example, for the following URL, http://localhost:8080/servletExamples/


    TestServlet?name=sam, the method would return name=sam.


    public String getContextPath()


