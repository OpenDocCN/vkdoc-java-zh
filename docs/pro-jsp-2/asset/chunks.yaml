    has a collection of Item objects, the most recent news stories retrieved from
    the Newsfeed’s website.


    The addSubscription() and removeSubscription() methods allow you to manage subscription
    in the presentation layer. Finally, the aggregate() method allows you to launch
    the aggregate operation, which visits each of the news feeds represented by subscriptions
    in the database, parses the RSS from the news feed into Item objects, and stores
    those objects in the database.


    With the simple Aggregator interface previously discussed, you can totally separate
    the presentation layer of the RSS newsreader from the business layer. The presentation
    layer doesn’t need to know anything about what is going on behind that interface.
    It doesn’t need to know what type of RSS parser is being used to parse the incoming
    news feeds. It doesn’t need to know what type of data access technology is being
    used to persist business objects.


    A two-layer architecture is usually sufficient, but in some cases you may wish
    to take the architecture one step further and use a three-layer architecture.


    **Three-Layer Architecture**


    The two-layer architecture works well. It allows you to separate presentation
    logic from business logic, and that is good. However, you didn’t separate the
    business logic from the data access logic. Business logic and data access logic
    seem to go together. Business rules are often built right into database schemas
    in the form of database constraints, and business logic is often coded into databases
    in stored procedures and triggers.


    But if two is good, three must be better. Figure 9-8 shows an illustration of
    a three-layer architecture. In the three-layer architecture, business logic is
    further separated from data access logic.


    Business Tier


    Web


    Presentation


    Data Tier


    Browser


    Tier


    Servlet API


    Business Objects


    Data Access


    Database


    **Figure 9-8.** *In a three-tier architecture, presentation, business, and data
    are separated into* *different components, making it easier to change components
    in a tier without affecting the* *other tiers.*


