    You can see that the Tiles controller can be a very valuable asset in your Struts
    toolbox. You can reduce the amount of code needed in your actions and move specific
    logic to specific tiles. You might even eliminate the need to chain actions together,
    using multiple tiles and controller combinations instead. You’re encouraged to
    consider using controllers because they can greatly help organize your code and
    view logic. By using controllers, actions can focus on page flow rather than preparing
    views.


    If you’re developing a very small and simple application, Tiles might not be necessary.
    The difficult part of Tiles is finding a good example to operate from and extend.
    We hope that these examples, in combination with the struts-resume application,
    will make your Struts development journey easier. You should be able to use the
    `basicLayout.jsp` and `tiles-config.xml` files to get up and running. If you already
    know Struts and aren’t using Tiles, you owe it to yourself (and your deadlines)
    to try it out.


    ## Using IDEs and Struts Development Environments


    We used to use Macromedia’s HomeSite and vi for all our Java editing, because
    we hated the bloat and RAM wastage of an IDE. Furthermore, IDEs always seemed
    to complicate things more than they helped. With the maturity of tools like IDEA
    and Eclipse, using an IDE is fun again—and worth our time (a gig of RAM doesn’t
    hurt either).


    We’ve never felt the need to use an IDE to help us configure our `struts-config.xml`
    or `web.xml` file. However, this was probably because these tools didn’t exist
    when we first started working with Struts and web application. Now we’re glad
    we learned the DTDs and we feel that it’s easier to do our job with this knowledge.
    If editing XML files by hand, we recommend XMLSpy (http://www.xmlspy.com). This
    is a great tool for any XML-related development because it validates your XML
    against a DTD or XML Schema and also performs auto-completion as you type. Another
    reason to learn the DTDs or XML Schema is because tools like XDoclet assemble
    the `struts-config.xml` file from a number of XML fragments, and most IDE tools
    only support editing fully assembled `struts-config.xml` files.


    There are also applications that have been created simply to provide a development
    environment for Struts’s application development. Let’s take a look at a couple
    of these now.


    ### Struts Console


    Struts Console (found at http://www.jamesholmes.com/struts/) is a free application
    for managing Struts-based applications. Struts Console is a visual editor for
    JSP Tag Library, Struts, Tiles, and Validator configuration files. It can be used
    as a stand-alone Swing application or as a plug-in for your favorite IDE. Supported
    IDEs are JBuilder (v4.0+), Eclipse (v1.0+), IBM WebSphere Appl. Dev. (v4.0.3+),
    IDEA (v3.0, build 668+), NetBeans (v3.2), Sun ONE/Forte (v3.0+), and JDeveloper
    (v9i+). It has support for managing all your Struts-related XML files, such as
    `struts-config.xml`, `tiles-config.xml`, and `validation.xml`. When using this
    tool, as with many others, you’ll lose any formatting you’ve applied to the document.
    However, it does allow formatting within the tool to “pretty up” your XML. It
    also has a wizard for converting JSP and HTML pages into Struts JSP pages—a very
    handy feature if you’re converting an existing application to Struts.


    ### Easy Struts


    The Easy Struts project (see http://easystruts.sourceforge.net/) provides a set
    of tools for Struts development, including a `struts-config.xml` editor, XSLT
    generation, tooltips from the Struts DTD, support for modules, and an input helper.
    Easy Struts is only available as an IDE plug-in; no stand-alone application is
    available. Supported IDEs are Eclipse (v2.0+) and JBuilder (v5.0+).


    ## Using Modules in Team Development Environments


    Have you ever worked on a project where many developers were working on the same
    codebase? Many development teams work in this type of environment, while others
    allocate development roles to single individuals. Let’s imagine two types of teams;
    the first has fifteen developers and the second has three individuals. We’ll pretend
    that both teams are developing similar applications that use Struts and EJBs for
    handling credit card payments for a large bank. The large team will probably divide
    the work among tiers, where five people work on each tier—EJBs, ActionServlets,
    and business layer, and the web tier comprising JSP pages or Velocity templates.
    The second (smaller) team will simply assign one person to each tier.


    In a team environment where many people are configuring and manipulating deployment
    descriptors, it can be difficult to keep your `web.xml` and `struts-config.xml`
    in sync. The simplest solution we’ve found is to use XDoclet to generate these
    configuration files, but there is another option—**modules**. When initially developed
    by the Struts development team, they were called subapplications, which is a more
    descriptive name. Modules allow you to separate different areas of an application
    out into different modules. Modules are a core feature of Struts 1.1 and can be
    very helpful for large projects as well as for creating pluggable features.


    Since the development of modules is very similar to developing a standard Struts
    application, we’ll show you how to set them up, and we’ve actually implemented
    an “upload” feature that uses them in the struts-resume application. The setup
    is rather simple, consisting of the following three steps:


    1. Prepare a config file for your module.

    2. Inform the controller of the module.

    3. Use forwards or actions to switch to your new module.


    We won’t detail the first step here, because this is the same as creating a new
    Struts application. You could probably use XDoclet to create your configuration
    files for the different modules, but you would have to coax your Ant `webdoclet`
    task to output `struts-config.xml` to different directories. Of course, the purpose
    of submodules is to make development and configuration easier, and XDoclet already
    does this for you!


    The second step involves adding a new init parameter to the `ActionServlet`’s
    definition in the application’s deployment descriptor, `web.xml`. In the struts-resume
    application, this configuration is located at `metadata/web/servlets.xml`:'
  raw: 'controllerClass="org.appfuse.webapp.action.UserCounterController" /> This
    means that for each page that the ".header.userCount" tile appears on, UserCounterController.perform()
    will be called. To display the counter in the header.jsp, we then added the following
    JSP code:


    <%-- Check to ensure "userCounter" is in request, if not, don''t display --%>


    <c:if test="${requestScope.userCounter != null}">


    <div id="activeUsers">


    <bean:message key="mainMenu.activeUsers"/>:


    <c:out value="${userCounter}" />


    </div>


    </c:if>


    To test it, we logged in to the struts-resume application with two different browsers,
    which created two different sessions. After the sessions were created, the User
    Counter text in the header (see Figure 15-14) shows that there are currently two
    users active in the application. We realize this may not be a precise count, but
    it’s about as accurate as it gets with web applications.


