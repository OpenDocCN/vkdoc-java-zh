    Using the Tags


    As you’ve already seen, using the tags is simply a matter of nesting one inside
    the other:


    <%@ taglib uri="/WEB-INF/tlds/ch08.tld" prefix="ch08" %> Forums :


    <ch08:select name="forum" label="name" value="id" items="${forums}">


    <ch08:eventHandler name="onChange">


    window.location=(''view-forum.jsp&forumId=''


    + this.options[this.selectedIndex].value)


    </ch08:eventHandler>


    </ch08:select>


    If you then look at the generated HTML, you can see how the event handler has
    been implemented on the control:


    <select name="forum" onChange="window.location=(''view-forum.jsp& ➥


    forumId=''+this.options[this.selectedIndex].value)"><option value="1"> ➥


    Servlets</option><option value="2">JSP</option><option value="3"> ➥


    EJB</option><option value="4">JMS</option></select> As we mentioned at the start
    of this example, having a dedicated tag with which to specify event handlers can
    help make the JSP page more readable and provide you with a way to ensure that
    the JavaScript code doesn’t get mistaken for JSP code. However, you might be wondering
    whether the additional development overhead of this example provides any substantial,
    tangible benefit over using the dynamic attributes version that you built in the
    previous chapter. To answer this question, let’s look at how you can put some
    validation around the use of tag attributes.


    **Tag Validation**


    Having built custom tags, you’re now probably aware that the JSP container does,
    in fact, perform some rudimentary validation of the way that custom tags are used
    on the page. For example, it checks that you’ve specified the start and end tags
    correctly, that the body content matches up with that defined in the TLD file,
    and that you’ve specified any required attributes for your tags. The failure of
    any of these checks results in a page-translation error.


    This is useful in ensuring that, at a basic level, the tags are used properly
    on the page, but it would be nice if you could go a step further and check the
    actual values of attributes. This way, you could detect problems up front if attributes
    were being misused, perhaps because a value was out of your desired range. Thankfully,
    the JSP specification provides two mechanisms to perform validation: the TagLibraryValidator
    and TagExtraInfo classes.


    **Validation with a TagLibraryValidator Class**


    The TagLibraryValidator (TLV) class was introduced in version 1.2 of the JSP specification.
    It provides an extremely flexible method to perform validation. Behind the scenes,
    when a JSP


    page is being translated into a servlet, an intermediate version of the page is
    generated that is represented as a pure XML document. This document is useful
    because it provides a standard way for JSP containers to parse, process, and validate
    the JSP page. In essence, in the XML


    513-0 ch08.qxd 10/28/05 1:02 PM Page 345


    C H A P T E R 8 ■ C U S TO M TA G A D VA N C E D F E AT U R E S A N D B E S T
    P R A C T I C E S


    **345**


    view of the page, all the elements of the JSP page (content, directives, actions,
    scriptlets, and so on) are converted and represented as XML tags. When using the
    TLV class, it’s possible to get a reference to this document and validate anything
    on the page. This could include anything from checking that the values of tag
    attributes are acceptable to looking at the structure of the page and determining
    whether your tags have been used correctly (perhaps checking that they’ve been
    nested in the right way).


    Unfortunately, this flexibility comes at a price in that TLV classes are fairly
    complicated to build because they require a fair amount of XML knowledge. Therefore,
    they aren’t often used, and the TagExtraInfo class is favored.


    **Validation with a TagExtraInfo Class**


    TagExtraInfo (TEI) classes are inherently much simpler to use than TLV classes,
    but of course they don’t offer anywhere near as much flexibility, with the main
    function of TEI classes being to validate tag attributes. However, for those developers
    who need to implement such validation logic, a TEI class is usually sufficient.


    Implementing a TEI class is fairly straightforward, although the process has changed
    slightly from previous versions of the JSP specification. Before JSP 2.0, the
    validation logic would be implemented within a method called isValid(), returning
    true if valid and false otherwise. Although this was simple to implement, it couldn’t
    provide anybody with information should a particular tag not be valid. Of course,
    a System.out.println() statement can be used to output error details to the console,
    but this is hardly a desirable solution.


    For this reason, JSP 2.0 introduced similar functionality to that provided by
    the much more complex TagLibraryValidator class with a method called validate().
    Instead of returning true or false, JSP 2.0 and JSP 2.1 allow an array of ValidationMessage
    instances to be returned to the JSP container that details exactly what the problem
    is. Let’s put this into practice with an example.


    Building the TagExtraInfo Class


    For this example, imagine that you’d like to add some validation to the <eventHandler>
    tag to check that the value of the name attribute (the name of the JavaScript
    event handler) is valid.


    To do this, you can define a list of the permitted names and compare the value
    of the name attribute to this list. Listing 8-9 shows a class that does this and
    then can be used to validate the <eventHandler> tag.


    **Listing 8-9.** *EventHandlerTagExtraInfo.java*


    package com.apress.projsp;


    import java.util.ArrayList;


    import java.util.List;


    import javax.servlet.jsp.tagext.*;


    public class EventHandlerTagExtraInfo extends TagExtraInfo {


    private static List EVENT_HANDLERS = new ArrayList();


    static {


    // here is a list of the valid event handlers for the select tag EVENT_HANDLERS.add("onblur");


    EVENT_HANDLERS.add("onchange");


    513-0 ch08.qxd 10/28/05 1:02 PM Page 346


    **346**


    C H A P T E R 8 ■ C U S TO M TA G A D VA N C E D F E AT U R E S A N D B E S T
    P R A C T I C E S


    EVENT_HANDLERS.add("onclick");


    EVENT_HANDLERS.add("ondblclick");


    EVENT_HANDLERS.add("onfocus");


    EVENT_HANDLERS.add("onkeydown");


    EVENT_HANDLERS.add("onkeypress");


    EVENT_HANDLERS.add("onkeyup");


    EVENT_HANDLERS.add("onmousedown");


    EVENT_HANDLERS.add("onmousemove");


    EVENT_HANDLERS.add("onmouseout");


    EVENT_HANDLERS.add("onmouseover");


    EVENT_HANDLERS.add("onmouseup");


    }


    public ValidationMessage[] validate(TagData data) {


    String name = data.getAttributeString("name");


    // validate that the name is valid


    if (!EVENT_HANDLERS.contains(name.toLowerCase())) {


    return new ValidationMessage[]{


    new ValidationMessage(null, "Event handler called " +


    name + " not valid")


    };


    } else {


    return null;


    }


    }


    }


    Now all the validate() method has to do is find the value of the name attribute
    through the API provided by the TagData class and compare it with the list of
    valid values. The TagData class itself is just a translation-time view onto the
    way the tag has been used on the page; this view allows the values of a tag’s
    attributes to be obtained.


    ■**Note** Because TagData is a view of the tag’s attributes at page-translation
    time, it isn’t possible to get the values of those attributes that are request-time
    expressions because the page hasn’t yet been requested—it’s still in the process
    of being translated into a Java servlet.


    If the value of the name attribute is in the list of permitted values, we chose
    to return a null value from the validate() method, indicating that the attributes
    are valid. The specification also allows a zero length array to be returned if
    the attributes are valid. The TEI class is used by the JSP container, so the choice
    of whether to return a null or a zero-length array is mostly a matter of personal
    preference. There is no inherent advantage in one choice over the other. An array
    containing a ValidationMessage instance is returned to indicate that something
    is wrong.


