    C H A P T E R 1 3 ■ I M P R OV I N G W E B - A P P L I C AT I O N P E R F O R
    M A N C E A N D S C A L A B I L I T Y


    **525**


    • **Avoid string concatenation.** This is widely known, but it bears repeating.
    Using the +


    and += operators to concatenate strings is slow and results in the creation of
    unnecessary temporary objects. Instead, use the java.lang.StringBuffer class to
    concatenate strings.


    **Measuring JSP Application Performance**


    In addition to implementing the best practice design advice that we’ve been discussing,
    you need to be able to prove that your application will meet the performance criteria
    set by your customers. You need to be able to profile your application and root
    out and fix any code that’s taking up undue resources or memory, or is causing
    contention issues that will reduce scalability.


    A wide variety of web-application performance-testing tools and products are available,
    and any of these can be applied to measuring JSP application performance. Typically,
    a performance-testing tool will support the following features:


    • **Customizable test plans** to simulate what users are doing as they use a particular
    JSP


    application


    • **Response time statistics** to measure and collect the minimum, maximum, and
    average response time of each page


    • **Load testing** to simulate any number of users accessing a site


    • **Error detection** to detect and log when errors occur on any page One option
    for performance testing is the open-source **Apache JMeter** product. JMeter allows
    you to develop test plans for testing HTTP-, FTP-, and JDBC-accessible database
    servers.


    JMeter can handle servlet authentication by using cookies and URL rewriting, so
    it works well for testing JSP applications. The biggest advantage of JMeter is
    that it’s free. You can download it, try it out, learn about performance testing,
    and if you like it you can keep it. If you find that it’s unsatisfactory, you
    can evaluate one of the other performance-testing tools. At the end of this section
    is a list of some of the popular performance-testing products.


    ■**Note** You can download JMeter from the Apache Jakarta website (http://jakarta.apache.org/


    jmeter).


    Let’s take a look at JMeter and use it to test one of the performance recommendations
    that we discussed earlier in this section. You’ll use a very simple JSP page with
    a 3-second runtime, which is shown in Listing 13-3.


