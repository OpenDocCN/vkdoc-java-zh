    第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具


    为了演示，你只需在页面顶部添加以下标签，然后在浏览器中查看源代码：


    <html:html xhtml="true"/>


    如果你使用 JSP 包含或 Tiles，则可能需要在所包含页面的顶部使用 `<html:xhtml />` 标签来强制渲染 XHTML 语法。在撰写本文时，仅支持
    XHTML 1.0 Transitional 作为 DOCTYPE。这是因为表单上仍会渲染 name 属性。XHTML 1.0 Strict 要求仅存在 id
    属性。


    在将 Struts 标签导入 JSP 页面时，你可以为它们指定任意前缀。例如，以下文件的内容：


    <%@ taglib uri="http://jakarta.apache.org/struts/tags-bean" prefix="bean" %>


    <%@ taglib uri="http://jakarta.apache.org/struts/tags-html" prefix="html" %>


    <%@ taglib uri="http://jakarta.apache.org/struts/tags-logic" prefix="logic" %>


    <%@ taglib uri="http://jakarta.apache.org/struts/tags-tiles" prefix="tiles" %>


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    你可能已经见过这种 Struts 前缀的事实标准。不过，实际上没有理由使用这些冗长的前缀，如果你愿意，也可以像 JSTL 那样使用单字母前缀，例如：


    <%@ taglib uri="http://jakarta.apache.org/struts/tags-bean" prefix="b" %>


    <%@ taglib uri="http://jakarta.apache.org/struts/tags-html" prefix="h" %>


    <%@ taglib uri="http://jakarta.apache.org/struts/tags-logic" prefix="l" %>


    <%@ taglib uri="http://jakarta.apache.org/struts/tags-tiles" prefix="t" %>


    我们还了解并喜爱另外几个能让 Web UI 开发更轻松的标签库。第一个是 **display 标签库**（http://displaytag.sourceforge.net/），最初由
    Ed Hill 编写，它支持数据列排序和分页，并能与 Struts 良好集成。你只需创建一个 ActionForm 的 List（或其他集合），然后在 JSP
    中将其传递给标签即可。该标签库还支持将表格数据导出为 Excel、CSV 和 XML 格式。


    第二个是 **Struts 菜单标签库**。该组件是一个菜单框架，可用于在 XML 文件中声明菜单项。它作为插件与 Struts 集成，支持流行的菜单样式（例如
    CoolMenus 和符合标准的 DHTML 菜单），并允许根据角色隐藏和显示菜单及菜单项。目前，它支持绝对链接、上下文相关链接以及 Struts 转发。


    这两个标签库都将在本章的应用程序中使用。


    要引用 Struts 标签库，你只需将 `struts.jar` 文件放入 `/WEB-INF/lib` 目录，并匹配每个标签库的标签描述符（TLD）文件中指定的
    URI。我们发现某些 Servlet 容器要求你在 `web.xml` 中声明 TLD 的位置。如果你的 TLD 文件没有声明要映射的 URI，这也是必要的。在我们的示例
    `struts-resume` 应用程序中，`struts-resume.tld` 和 `struts-menu.tld` 因此需要在 `web.xml`
    中添加条目。


    JSP 2.1 允许在 JSP 页面中直接访问 JavaBean 的属性，从而有助于保持代码简洁。以前，你必须使用 `<c:out value="${beanName.propertyName}"/>`，而现在，JSP
    2.1 允许你直接使用 `${beanName.propertyName}`。我们预计 JSTL 类型的语法以及 Struts 标签仍会存在一段时间，哪怕只是为了向后兼容。


