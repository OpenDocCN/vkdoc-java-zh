    and use of different, perhaps unfamiliar, tags, you’ll soon see that it’s very
    simple.


    At the start of the deployment descriptor, there are several tags that are not
    directly related to servlets but give information about the web application. These
    tags occur directly after the <web-app> tag, which denotes the start of the deployment
    descriptor. These tags are as follows:


    <display-name>Test Web Application</display-name>


    <description>A test web application</description> The <display-name> tag allows
    you to specify a short name for the overall web application.


    This tag is designed to allow the name of the web application to be displayed
    by GUI tools. The


    <description> tag allows you to provide a short textual description of the purpose
    of this web application. This is a very simplistic form of documentation for the
    overall web application.


    Now let’s move on and look at the parts of the example deployment descriptor that
    relate directly to servlet deployment.


    **Servlet Definitions**


    Looking at the deployment descriptor, you can see that it defines two servlets
    in the web application. You can see this by looking at the number of unique <servlet>
    tags. The first of our two servlets is defined here:


    <servlet>


    <servlet-name>Servlet1</servlet-name>


    <servlet-class>com.apress.projsp.Servlet1</servlet-class>


    <init-param>


    <param-name>version</param-name>


    <param-value>0.1b</param-value>


    </init-param>


    </servlet>


