- fmt: '<bean:message key="button.submit">


    </html:submit>


    In the previous example, we’ve added the `styleClass` attribute to signify a CSS
    rule for our buttons. Lastly, you add the following to include the JavaScript
    necessary to perform the actual validation:


    ```

    <html:javascript formName="userForm" cdata="false"

    dynamicJavascript="true" staticJavascript="false"/>

    <script type="text/javascript"

    src="<html:rewrite page="/scripts/validator.jsp"/>">

    </script>

    ```


    We always try to use `<html:rewrite />` when referencing JavaScript or CSS files,
    because this will render a URL that includes the application’s context. That is,
    it will create a URL that is relative to the web server’s root (`/`) directory.
    `validation.jsp` contains the following code in order to render all the JavaScript
    functions from the `validation-rules.xml` file:


    ```

    <%@ page language="java" contentType="javascript/x-javascript" %>

    <%@ taglib uri="http://jakarta.apache.org/struts/tags-html"

    prefix="html" %>

    <html:javascript dynamicJavascript="false" staticJavascript="true"/>

    ```


    ## Testing the Validation


    Now that you’ve configured everything, let’s test it out! To do this, you’ll need
    to log in to the `struts-resume` application and click the **Edit Profile** link.
    This will bring up your user information. If you clear the username field, you’ll
    get the error dialog box shown in Figure 15-10.


    *or dialog box is displayed.*


    ![Image 190](index-633_1.png)


    When turning off JavaScript in your browser, the Validator will catch the error
    on the server side, and you’ll get the message shown in Figure 15-11. So if you
    don’t want to use JavaScript in your application, virtually no coding is necessary,
    save the XDoclet tags. If you aren’t using XDoclet, you’ll need to configure `validation.xml`
    manually—we like to refer to this as *declarative validation*.


    **Figure 15-11.** *Even if JavaScript is disabled in the client browser, validation
    still occurs on the server side, and an error message will still be displayed.*


    You can also use the Validator to perform validation based on variables, such
    as validating that a zip code matches a regular expression. This is possible with
    a mask that contains a regular expression as its value. For regular expressions
    that might be used more than once, it’s a good idea to define them as constants
    in your `validation.xml` file. Since we’re using XDoclet, this can be done in
    a `validation-global.xml` file, which lives in our merge directory. In the `struts-resume`
    application, this is `metadata/web/`.


    ```

    <constant>

    <constant-name>zip</constant-name>

    <constant-value>^\d{5}\d*$</constant-value>

    </constant>

    ```


    This regular expression says that zip must be five characters long and all characters
    must be digits. To validate a zip code in the `userForm`, you’ll need to configure
    `validation.xml` like so:


    ```

    <field property="postalCode" depends="required,mask">

    <msg name="required" key="errors.required"/>

    <msg name="mask" key="errors.zip"/>

    <arg0 key="userForm.postalCode"/>

    <var>

    <var-name>mask</var-name>

    <var-value>${zip}</var-value>

    </var>

    </field>

    ```


    As mentioned earlier, the `<msg>` elements can be eliminated if you want to use
    the default values for the Validators. However, the default error message key
    for `mask` is `errors.invalid`, which is simply `{0}, is invalid`. To enhance
    usability of the application, a different key (such as `errors.zip`) with more
    information is probably better (such as `The {0} field must be a 5-digit number`).
    To configure this for the `postalCode` field is easy with XDoclet. All you need
    to do is add a tag to specify the rule and the variable’s name-value pair:


    ```

    * @struts.validator type="mask" msgkey="errors.zip"

    * @struts.validator-var name="mask" value="${zip}"

    ```


    ## Advanced Validator Features


    Other features of the Validator that we haven’t mentioned yet include multipage
    validation, indexed property validation, conditional validation, and DynaFormValidation.
    Multipage validation allows you to spread your validation rules for a form across
    more than one page. This can be very helpful when you have a wizardlike form for
    gathering information in your application. To configure this, you need to add
    a hidden field to specify the page number in your JSP:


    ```

    <html:hidden property="page" value="1"/>

    ```


    This is complemented by adding a `page` attribute to the field’s validation rule
    in `validation.xml`. In the examples you’ve seen so far, the fields have a `property`
    and `depends` attribute. Add the `page` attribute and now your form can contain
    validation that is invoked across different JSP pages!


    ```

    <field property="firstName" depends="required,mask" page="1">

    ```


    We really like this feature because it’s so simple to configure.


    Indexed property validation allows you to have forms contained within forms or
    subforms. For instance, in your application, a `ResumeForm` can contain one-to-many
    `SkillGroupForms`. `SkillGroups` describe a group of skills. On a technical résumé,
    a good `SkillGroup` might be “Java” or, at an even higher level, “Programming
    Languages.” Furthermore, `SkillGroupForms` can contain one-to-many `SkillForms`.
    To elaborate on the Java example, you might have `SkillForms` such as “Swing,”
    “JDBC,” and “XML.” A nice user interface for editing these would allow you to
    view all your résumé’s `SkillGroups` and their subsequent `SkillForms`. Displaying
    all this isn’t a big deal, because you can use a `<logic:iterate>` tag or `<c:forEach>`.
    However, to save them, you have to know what row (or form) the user edited. This
    is where indexed properties come to the rescue. You can basically add a getter/setter
    to your form that allows for setting/getting nested form values. Please see the
    section “Using Indexed Properties with Forms in Struts” for more information.
    To configure the Validator to validate an indexed property, you need to add an
    `indexedListProperty` attribute to your `<field>` element:


    ```

    <field property="groupName" depends="required" indexedListProperty="skills">

    <var>

    <var-name>field[0]</var-name>

    <var-value>name</var-value>

    </var>

    <var>

    <var-name>field-indexed[0]</var-name>

    <var-value>true</var-value>

    </var>

    <var>

    <var-name>field-test[0]</var-name>

    <var-value>NOTNULL</var-value>

    </var>

    </field>

    ```


    This states that the `skills` property contains a list, and the required field
    within this `skills` list is the `name` property.


    A new feature recently added to the Validator is an ability to conditionally require
    Validator fields based on the value of other fields. It allows you to define logic
    such as “only validate this field if field X is nonnull and field Y contains ‘male’”.
    The Validator has support for validating indexed properties, indicated in the
    previous example by the `[0]` indicator. However, it doesn’t support dynamic indexed
    properties at the time of this writing. Which is to say that you must know the
    number of child (indexed) properties and configure the Validator accordingly.
    Conditionally validating can be very useful, but since we haven’t used it in `struts-resume`,
    we recommend consulting the online documentation for more information.


    ## Using the Validator with DynaActionForms'
