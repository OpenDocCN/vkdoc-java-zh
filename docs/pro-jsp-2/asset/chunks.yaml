  raw: 'The name attribute of the <form> element defines the name of your ActionForm,
    and this name should match the one defined in struts-config.xml. Since you’re
    using XDoclet to generate the form and struts-config.xml file, you can be certain
    that these names will match.


    The <field> element has two attributes, property and depends. The property attribute
    defines the name of the variable in UserForm.java to validate, while the depends
    attribute identifies which validation rules to apply.


    There are two <msg> elements that signify which messages to use from the ApplicationResources.properties
    file or whatever the ResourceBundle is named in struts-config.xml. In struts-resume,
    these are defined as follows: errors.required={0} is required.


    errors.email={0} is an invalid e-mail address.


    The last element, <arg0>, specifies the message key for the substitution value
    of {0} in each respective message. In struts-resume, this is defined as the following:
    userForm.username=Username


    If there is more than one argument you’d like to replace in your error message,
    you can add more arguments in ApplicationResources by incrementing the number,
    so {1} would


    513-0 ch15.qxd 11/14/05 5:38 PM Page 598


    **598**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    signify the second argument. To add this argument’s replacement value on your
    form, you could add another XDoclet tag to the original form:


    @struts.validator-args arg1resource="username.lastName" arg1value="My Surname"


    Of course, you would never use both of these attributes, because the first (arg1resource)
    is for looking up a resource key, and the second (arg2value) is for placing a
    literal string in your validation.xml. Running the previous code through the webdoclet
    task produces the following XML:


    <arg0 key="username.lastName"/>


    <arg0 key="My Last Name" resource="false"/> Now that you’ve configured the form’s
    validation, you should add some JavaScript to the JSP to enforce client-side validation.
    The first step is to use the <html:messages/> tag library to catch any server-side
    validation errors:


    <logic:messagesPresent>


    <div class="error">


    <html:messages id="error">


    <bean:write name="error" filter="false"/><br/>


    </html:messages>


    </div>


    </logic:messagesPresent>


    In the struts-resume application, the previous code appears in a messages.jsp
    file. This file also contains code to catch regular messages (not error messages)
    and is located in the web/common folder. It’s included in the Tiles template so
    we don’t have to add it to every page that should use validation.


    Secondly, you need to add an onsubmit event handler to your form:


    <html:form action="/userSave" method="post" styleId="userForm"


    focus="password" onsubmit="return validateUserForm(this)"> While you’re examining
    this form’s syntax, we’d like to point out a couple of other things.


    By default, if you don’t use a method attribute on your form, the <html:form>
    tag will render one for you. The problem with the one it renders is that it’s
    not XHTML compliant. That is, it renders as method="POST", where XHTML requires
    that predefined attribute values be in lowercase.


    We usually add a styleId attribute to all our forms and form elements (such as
    <html:text> or


    <html:password>) so that they can be accessed via the Document Object Model (DOM)
    with document.getElementById(elementId). One thing you have to be aware of is
    that every Id must be unique within a page. Lastly, to increase the usability
    of the application, you should try to use the focus attribute on your forms but
    use it cautiously: if you hide fields based on a user’s role or other logic, this
    may result in a JavaScript error.


    After configuring the form, you need to add an onclick handler to the form’s Submit
    and Cancel buttons to talk to the Validator’s validateForm JavaScript function.
    This is so clicking the Cancel button won’t invoke any validation:


    <html:cancel styleClass="button" onclick="bCancel=true">


    <bean:message key="button.cancel">


    </html:cancel>


    ![Image 189](index-632_1.png)'
