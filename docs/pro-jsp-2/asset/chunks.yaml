    Combining Dispatcher Actions


    Of course, you can use more than one <dispatcher> element to indicate multiple
    locations for the filter to apply to. For example:


    <filter-mapping>


    <filter-name>Simple Push Filter</filter-name>


    <url-pattern>/jsp/*</url-pattern>


    <dispatcher>FORWARD</dispatcher>


