    pages of your application don’t seem to work correctly.


    With the usage of the tags now more resilient, let’s see how you can make the
    tags themselves more robust in the way that they handle exceptions.


    **Handling Exceptions**


    Because custom tags have full access to the rich set of APIs provided by Java,
    it’s possible that something could go wrong. For example, a network connection
    might be unexpectedly terminated, or perhaps a file read could fail. Typically,
    you’d just wrap functionality that may potentially fail inside a try-catch block,
    and with simple tags this isn’t much of a problem because all the processing associated
    with the tag is wrapped up within the doTag() method.


    However, when you’re using classic tags, this logic can potentially be split across
    the doStartTag()


    513-0 ch08.qxd 10/28/05 1:02 PM Page 349


    C H A P T E R 8 ■ C U S TO M TA G A D VA N C E D F E AT U R E S A N D B E S T
    P R A C T I C E S


    **349**


    method, the tag’s body content, and the doEndTag() method. Therefore, it’s not
    possible to place a try-catch block around all of this logic. The JSP specification
    addresses this issue through the TryCatchFinally interface that classic tag handlers
    can implement.


    **The TryCatchFinally Interface**


    The TryCatchFinally interface was introduced in the JSP 1.2 specification. This
    interface provides a way to gracefully handle exceptions that may occur during
    the processing of classic tags, regardless of whether the tag implements the Tag,
    IterationTag, or BodyTag interface (see Listing 8-11).


    **Listing 8-11.** *TryCatchFinally.java*


    package javax.servlet.jsp.tagext;


    import javax.servlet.jsp.*;


    public interface TryCatchFinally {


    void doCatch(Throwable t) throws Throwable;


    void doFinally();


    }


    The TryCatchFinally interface has two methods, doCatch() and doFinally(), in which
    you can place functionality that might typically be written into catch and finally
    blocks. For example, in the doCatch() method, you might choose to roll back a
    transaction, and in the doFinally() method, you might choose to close a file or
    a connection to a remote resource.


    In essence, tags should implement this interface if you want them to have more
    control over exception handling. Figure 8-2 shows a UML diagram of the tag life
    cycle for a tag that implements the TryCatchFinally interface. Next, we’ll cover
    each of the methods in turn.


    The doCatch() Method


    The JSP specification guarantees that the doCatch() method will be called if an
    exception is thrown in the doStartTag() method, the tag’s body content, or the
    doEndTag() method. Additionally, if the tag handler implements the IterationTag
    or BodyTag interface, the doCatch() method will be executed if an exception is
    thrown within the doAfterBody() and doInitBody() methods, respectively.


    Something to notice is that the doCatch() method won’t be called if an exception
    is thrown before the execution of the doStartTag() method—perhaps when the context
    or attributes are being set. Therefore, it’s best not to put any logic into attribute
    setter methods that may cause an exception to be thrown.


    If the exception should be propagated further up the calling stack, perhaps by
    a JSP error page, the doCatch() method can handle the exception as required and
    then subsequently rethrow the same or a new exception. This is useful because
    there’s no way to tell the tag handler class to catch only specific subclasses
    of Exception in the same way you would when writing try-catch blocks in your code.
    Instead, the doCatch() method handles all exceptions, and it’s up to us as tag
    developers to decide which to handle and which to rethrow.


