- fmt: 'The page takes 3 seconds to run because it includes a 3-second sleep. To test
    this page in JMeter, you first create a thread group with five threads and a loop
    count of 100. This will simulate the effects of five browsers, each running through
    the test plan 100 times. You do this by right-clicking the `Test Plan` icon in
    the tree and then choosing the `Add ➤ Thread Group` menu option to add a thread
    group. Figure 13-1 shows the `Thread Group` page of the JMeter tool.


    **Figure 13-1.** *The JMeter application lets you create any number of threads
    that can execute your web application as many times as desired.*


    You’re going to test only one page, so under the thread group you’ll create one
    HTTP request and configure it to access your `threesec.jsp` page. Next, add an
    `Aggregate Report` so you can view the minimum, maximum, and average response
    times for running the test page.


    Figure 13-2 shows the test plan, with the HTTP request editor loaded into the
    right pane.


    ![Image 177](index-560_1.png)


    ![Image 178](index-560_2.png)


    **Figure 13-2.** *After configuring the threads, JMeter displays a page that lets
    you configure which resource will be tested.*


    The next step is to run the test plan. Use the JMeter `Run ➤ Start` menu item
    to do this. The test should take a couple of minutes to run. As the test runs,
    you can watch the results in the `Aggregate Report` window, and when the test
    completes that window should look like Figure 13-3. Your results will differ depending
    on your hardware, operating system, and servlet engine.


    **Figure 13-3.** *After running a test, you can view the results in JMeter.*


    ![Image 179](index-561_1.png)


    Looking at the `Aggregate Report` window results, you can see that 500 requests
    were processed with an average response time of 3024 milliseconds. This makes
    sense because the page included a 3-second sleep and almost nothing else. You
    can see that no errors occurred and that you achieved a throughput rate of 1.7
    requests per second, or 102 requests per minute.


    One of our performance recommendations was to avoid single-threading. There may
    be an occasion when you feel it’s necessary to serialize access to a certain call
    in a JSP page. However, you should be aware that, if this call is made often,
    it could have drastic performance consequences. Let’s see what happens when you
    run the same test, but with a single-threaded JSP page. To do this, you need to
    make a simple modification to your `threesec.jsp` page. You’ll add a lock to the
    class so that all access to the `Thread.sleep()` call is synchronized. Listing
    13-4 shows the new `threesec-single.jsp` page.


    **Listing 13-4.** *threesec-single.jsp*


    ```

    <%@ page language="java" %>


    <!DOCTYPE HTML PUBLIC "-//w3c//dtd html 4.0 transitional//en">


    <html>


    <head><title>Three second operation: single-threaded</title></head>


    <body>


    <%! static String lock = new String(); %>


    <h1>Three second operation: single-threaded</h1>


    <p>


    The reason this page JSP took 3 seconds to load is because it contains a 3 second
    sleep.


    </p>


    <% synchronized (lock)


    {


    Thread.Sleep(3000);


    }


    %>


    </body>


    </html>

    ```


    Now run the test again. This time, it takes about 20 minutes rather than 5 minutes.
    The results are shown in Figure 13-4.


    **Figure 13-4.** *Synchronizing the JSP causes its performance to deteriorate
    significantly.*


    As expected, the performance of the single-threaded page is much worse than that
    of the multithreaded page. The throughput of the single-threaded page is 20.1
    requests per minute compared to 102 requests per minute for the thread-safe JSP.'
