    第 13 章 ■ 提升 Web 应用程序的性能和可扩展性


    **523**


    接下来的代码片段展示了如何从前面的连接池中获取连接。首先，您使用 JNDI 查找 javax.sql.DataSource 接口，然后向该接口请求一个连接。使用完连接后，您将其关闭并返回到池中以供重用。关闭连接实际上并不会关闭底层的物理连接；它只是将连接返回到池中。


    javax.naming.InitialContext context = new InitialContext();


    // 查找数据源


    javax.sql.DataSource dataSource =


    (javax.sql.DataSource)context.lookup ("java:comp/env/jdbc/mydb");


    // 从池中获取连接


    java.sql.Connection conn = dataSource.getConnection();


    // ...使用连接...


    // 关闭连接以将其返回到池中


    conn.close();


    有关使用 DBCP 的工作示例，请参见第 9 章中的“在 Web 应用程序中获取 JDBC 连接”一节。


    **为可扩展性而设计**


    Java 应用服务器旨在支持可扩展性。通过使用应用服务器的管理控制台或编辑配置文件，您可以增加分配给每个服务器进程的内存量，增加每个进程内的请求处理线程数，添加额外的服务器进程，并配置额外的服务器机器来运行服务器进程。


    无论您如何设计应用程序，通过将其运行在更强大的计算机上，您可能都能使其运行得更快并为更多用户提供服务。如果您的服务器是多处理器机器，您可以配置应用服务器使用更多线程来处理请求。如果您的服务器有大量内存，您可以配置应用服务器为每个服务器进程分配更多内存。您的应用服务器文档应提供一些指导原则，帮助您决定如何配置这些线程和内存设置。


    在一台服务器机器上运行一个服务器进程所能做的事情是有限的。您的 Java 应用服务器将允许您扩展到单台机器上的单个进程之外，但要利用这一点，您需要在开发 JSP
    应用程序时遵循一些简单的指导原则：


    • **最小化每个会话中存储的数据。** 在典型的 JSP 应用程序中，会为每个用户创建一个类型为 javax.servlet.HttpSession 的会话对象。随着每个会话存储的数据量增加，每个服务器能够支持的用户数量就会减少。这只是简单的算术。例如，假设应用服务器运行在一个配置了
    100 MB 堆的 Java 虚拟机中。如果应用服务器本身使用 10 MB 内存，并且每个用户会话消耗 1 MB 内存，那么每个应用服务器实例最多可以支持
    90 个并发用户。


    513-0 ch13.qxd 11/16/05 12:07 PM 第 524 页


    **524**


    第 13 章 ■ 提升 Web 应用程序的性能和可扩展性


    • **尽可能避免创建会话。** 每个创建的会话都会使用一些内存，因此，尽可能尝试在不创建会话的情况下处理请求。


    • **仅在会话对象中存储可序列化的对象。** Java EE 应用服务器通过跨多个服务器并行运行 JSP 应用程序来支持可扩展性。当创建一个会话时，它会被分配给一个服务器。一种称为**负载均衡**的技术用于确保会话在所有参与的服务器之间均匀分布。一些
    Java EE 应用服务器，例如 IBM WebSphere，支持一种称为**会话迁移**的特殊负载均衡技术。如果启用了会话迁移并且某个服务器过载，则该服务器上的会话可能会被迁移到另一个负载较轻的服务器。会话迁移通常通过序列化来实现，因此，为了使
    JSP 应用程序能够与会话迁移一起工作，您需要确保存储在会话中的每个对象都实现了 java.io.Serializable 接口。


    • **不要写入文件系统。** 如果 JSP 应用程序跨多个服务器运行，则不能使用文件系统进行存储。您写入一个服务器的文件可能无法在运行该应用程序的所有其他服务器上使用。在这种情况下，请使用数据库而不是文件系统进行存储。


    **其他性能提示和资源**


    有关性能和可扩展性最佳实践的一个良好信息来源是 IBM 网站。在 WebSphere 和 developerWorks 网站 (http://www.ibm.com/developerworks)
    上搜索“performance”，会找到一系列关于 WebSphere 开发的白皮书和最佳实践指南。关于 WebSphere 的大部分信息也适用于其他 Java
    EE 应用服务器以及一般的 JSP 应用程序。


    白皮书“WebSphere Application Server Development Best Practices for Performance and
    Scalability”（http://www-306.ibm.com/software/webservers/appserv/ws_bestpractices.pdf）尤其有用。同样，这份白皮书中的大多数最佳实践都适用于任何
    Java EE 应用服务器。许多建议仅适用于 EJB 应用程序，但也有相当多的建议适用于 JSP 应用程序，例如：

    '
- fmt: '• **避免线程同步和单线程化。** 同步方法和代码块会使 JSP 应用表现得像单线程一样，从而导致吞吐量降低。JSP 页面和 Servlet 必须是线程安全的，因此不要使用`isThreadSafe=false`页面指令。编写
    Servlet 时，也不要实现`javax.servlet.SingleThreadModel`接口。


    （实际上，从 Servlet 2.4 开始，`SingleThreadModel`接口已被弃用。）


    • **避免使用`System.out.println()`。** 看似无害的`System.out.println()`方法实际上相当有害。根据 IBM
    白皮书，“由于`System.out.println()`语句及类似结构会在磁盘 I/O 期间同步处理，因此会显著降低吞吐量。”建议使用日志系统（如`log4j`）代替`System.out`和`System.err`。


    • **避免字符串拼接。** 这是广为人知的建议，但仍值得重申。使用`+`和`+=`运算符拼接字符串速度较慢，并且会创建不必要的临时对象。请改用`java.lang.StringBuffer`类来拼接字符串。


    **衡量 JSP 应用性能**


    除了实施我们一直在讨论的最佳实践设计建议外，您还需要能够证明您的应用能够满足客户设定的性能标准。您需要能够对应用进行性能分析，找出并修复任何占用过多资源或内存的代码，或导致争用问题从而降低可扩展性的代码。


    目前有多种 Web 应用性能测试工具和产品可供选择，它们都可以用于衡量 JSP 应用性能。通常，性能测试工具会支持以下功能：


    • **可定制的测试计划**，用于模拟用户在使用特定 JSP 应用时的操作

    • **响应时间统计**，用于测量和收集每个页面的最小、最大和平均响应时间

    • **负载测试**，用于模拟任意数量的用户访问网站

    • **错误检测**，用于检测并记录页面发生错误的情况


    性能测试的一个选择是开源产品 **Apache JMeter**。JMeter 允许您开发测试计划，用于测试可通过 HTTP、FTP 和 JDBC 访问的数据库服务器。


    JMeter 可以通过 Cookie 和 URL 重写来处理 Servlet 认证，因此非常适合测试 JSP 应用。JMeter 最大的优点是免费。您可以下载并试用它，了解性能测试，如果喜欢可以继续使用。如果发现它不满足需求，可以评估其他性能测试工具。本节末尾列出了一些流行的性能测试产品。


    ■**注意** 您可以从 Apache Jakarta 网站（`http://jakarta.apache.org/jmeter`）下载 JMeter。


    让我们来看看 JMeter，并用它来测试我们之前讨论过的一个性能建议。您将使用一个非常简单的 JSP 页面，其运行时间为 3 秒，如清单 13-3 所示。


