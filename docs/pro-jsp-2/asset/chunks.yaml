    **Reserved Words**


    As with any other language, the JSP EL has many words that are reserved. A reserved
    word (also known as a keyword) is one that has a special meaning within the language.
    This means that you cannot use the reserved word to represent anything else, such
    as a variable identifier.


    The following are reserved words in the JSP EL:


    and


    eq


    gt


    true


    instanceof


    or


    ne


    lt


    false


    513-0 ch03.qxd 10/28/05 12:53 PM Page 101


    C H A P T E R 3 ■ T H E J AVA S E R V E R PA G E S E X P R E S S I O N L A N G
    U A G E


    **101**


    empty


    not


    if


    ge


    null


    div


    mod


    It’s worth noting that not all of these words are currently in the language, but
    they may be in the future, and developers should avoid using them. You’ll see
    examples of using the majority of the reserved words during the course of this
    chapter.


    **Disabling Scriptlets**


    As we’ve mentioned, the EL is intended to replace the use of Java scriptlets in
    developing JSP-based web applications. To this end, it’s possible to disable the
    evaluation of scriptlets through configuration parameters. This allows a developer
    to ensure that no one inadvertently uses scriptlets instead of the EL. This can
    allow best practices to be more easily enforced.


    You can disable scriptlets within a page using the web.xml deployment descriptor
    by choosing to disable evaluation for a single page, a set of pages, or for the
    entire application.


    The tags that you need to add to the deployment descriptor are within the <jsp-config>
    element. The following example disables scriptlets for all JSP pages within an
    application:


    <jsp-config>


    <jsp-property-group>


    <url-pattern> ***.jsp**</url-pattern>


    <scripting-invalid>true</scripting-invalid>


    </jsp-property-group>


    </jsp-config>


    The <url-pattern> element can represent a single page, for example:


    <jsp-config>


    <jsp-property-group>


    <url-pattern> **/test.jsp**</url-pattern>


    <scripting-invalid>true</scripting-invalid>


    </jsp-property-group>


    </jsp-config>


    It can also represent a set of pages, for example:


    <jsp-config>


    <jsp-property-group>


    <url-pattern> **/noscriptlets/**</url-pattern>


    <scripting-invalid>true</scripting-invalid>


    </jsp-property-group>


    </jsp-config>


