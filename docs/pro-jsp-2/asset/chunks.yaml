    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **173**


    Hopefully you’ll be comfortable with the <c:import> action from the Core library,
    which is used to generate the appropriate URL to the book.xml file (which is stored
    in the same directory as the JSP page). The <x:parse> action parses the XML file
    and stores it in the session-scoped variable book.


    In the earlier example, the var parameter was used to indicate the name of a scoped
    variable to hold the object created as a result of the parse. The JSTL specification
    doesn’t define the type for this object and leaves it up to the container to specify
    the most appropriate type.


    However, if the parameter varDom were used instead, the JSTL specification would
    insist that the type of the resulting object must be org.w3c.dom.Document.


    If you’re familiar with the JSTL Core tag library introduced earlier, you should
    be able to guess what the <x:out> and <x:set> actions do because they’re like
    similarly named tags from the Core tag library. These similarities aren’t by chance;
    the <x:out> and <x:set> actions from the XML tag library are functionally identical
    to the <c:out> and <c:set> actions from the Core tag library except that they’re
    designed to work with XML documents.


    The <x:out> action evaluates an XPath expression (reference to somewhere in the
    XML


    document) and outputs the result of the evaluation to the current JspWriter. Let’s
    build on the earlier example to demonstrate the use of the <x:out> action. Listing
    4-12 shows a JSP page that uses various actions including the <c:import>, the
    <x:parse>, and the <x:out> actions.


    **Listing 4-12.** *xml_out.jsp*


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <%@ taglib uri="http://java.sun.com/jstl/xml" prefix="x" %>


    <c:import url="book.xml" var="url" />


    <x:parse xml="${url}" var="book" scope="session" />


    <b><x:out select="$book/book/title"/></b><br>


    <x:out select="$book/book/author"/><br>


    <x:out select="$book/book/url"/><br> You still parse the XML file in the same
    way, but this time some <x:out> actions have been added that can be used to extract
    the values of the title, author, and url nodes from beneath the parent book node
    (take a look at the earlier book.xml in Listing 4-11 if you’re confused). The
    document is parsed and interrogated by the <x:out> actions that use XPath expressions
    to retrieve the required data. Figure 4-13 shows the output of the JSP page in
    Listing 4-12.


    **Figure 4-13.** *XML tags can be used to parse and output values from XML formatted
    data.*


