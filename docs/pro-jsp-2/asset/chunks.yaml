    The storeNewsfeed() and storeObject() methods, as shown next, illustrate the code
    necessary to add a new object into the data store. The first step in the method
    is to open a session, which begins a database transaction. Next, you’ll save the
    object database. To finalize the operation, you commit the transaction. If an
    exception occurs, roll back the transaction and throw a DAOException so that the
    business layer can handle the error condition. The finally block ensures that,
    no matter what happens, the session is closed and therefore the database connection
    that was used by the connection is released back to the database connection pool.


    **Listing 9-6.** *HibeAggregatorDAO.java (storeNewsfeed() and storeObject() Methods)*
    public void storeNewsfeed(Newsfeed feed) throws DAOException {


    storeObject(feed);


    }


    private void storeObject(Object obj) throws DAOException {


    Session ses = null;


    try {


    ses = sessionFactory.openSession();


    ses.saveOrUpdate(obj);


    ses.flush();


    ses.connection().commit();


    } catch (Exception e) {


    try { ses.connection().rollback(); }


    catch (Exception ex) { e.printStackTrace(); };


    throw new DAOException(e);


    } finally {


    try { ses.close(); }


    catch (Exception ex) { ex.printStackTrace(); };


    }


    }


    The retrieveNewsfeed() method and retrieveObject() methods in the following continuation
    of Listing 9-6 show the code necessary to retrieve an object from the database
    by using the object’s primary key. The steps are simple. You open a session, load
    the object, close the session, and return the object.


    **Listing 9-6.** *HibeAggregatorDAO.java (retrieveNewsfeed() and retrieveObject()
    Methods)* public Newsfeed retrieveNewsfeed(String id) throws DAOException {


    return (Newsfeed)retrieveObject(Newsfeed.class, id);


    }


