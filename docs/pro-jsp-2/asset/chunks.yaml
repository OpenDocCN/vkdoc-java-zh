    \ programmers interact with the “suits.”\n\n**INTERNET TECHNOLOGIES AND NETWORKING**\
    \  \nTry living without plumbing (and eventually IPv6). Talk about networking\
    \ topics including protocols, design, administration, wireless, wired, storage,\
    \ backup, certifications, trends, and new technologies.\n\n**WEB DEVELOPMENT/DESIGN**\
    \  \nUgly doesn’t cut it anymore, and CGI is absurd. Help is in sight for your\
    \ site. Find design solutions for your projects and get ideas for building an\
    \ interactive Web site.\n\n**JAVA**  \nWe’ve come a long way from the old Oak\
    \ tree. Hang out and discuss Java in whatever flavor you choose: J2SE, J2EE, J2ME,\
    \ Jakarta, and so on.\n\n**SECURITY**  \nLots of bad guys out there—the good guys\
    \ need help. Discuss computer and network security issues here. Just don’t let\
    \ anyone else know the answers!\n\n**MAC OS X**  \nAll about the Zen of OS X.\
    \ OS X is both the present and the future for Mac apps. Make suggestions, offer\
    \ up ideas, or boast about your new hardware.\n\n**TECHNOLOGY IN ACTION**  \n\
    Cool things. Fun things. It’s after hours. It’s time to play. Whether you’re into\
