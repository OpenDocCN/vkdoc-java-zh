    **Java 认证和授权服务**


    您可能想知道**Java 认证和授权服务（JAAS）** 如何融入这一切。JAAS 提供了一个用于认证用户和分配权限的框架和标准编程接口。结合 Java 2，应用程序可以提供以代码为中心的访问控制、以用户为中心的访问控制，或两者的组合。JAAS
    的发明是为了使登录服务独立于认证技术，并允许**可插拔认证模块（PAM）**。大多数现代应用服务器在底层使用 JAAS 来配置容器管理的安全性——您甚至可能在使用它而自己并未察觉！

