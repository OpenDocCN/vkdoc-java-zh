    513-0 ch01.qxd 9/30/05 4:08 PM Page 5


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **5**


    As you can see in Figure 1-2, the JSP servlet container decides whether the JSP
    page has been translated before. If not, the JSP container starts the translation
    phase to generate the JSP page implementation servlet, which is then compiled,
    loaded and initialized, and used to service the request. If the JSP container
    detects that a JSP page has already been translated and hasn’t subsequently changed,
    the request is simply serviced by the implementation servlet that already exists
    inside the container.


    The life cycle of a JSP page can be split into four phases: translation, initialization,
    execution, and finalization.


    Translation


    The first stage in the life cycle of a JSP page is known as the translation phase.


    When a request is first made for a JSP page (assuming it hasn’t been precompiled),
    the JSP engine will examine the JSP file to check that it’s correctly formed and
    that the JSP syntax is correct. If the syntax check is successful, the JSP engine
    will translate the JSP page into its page implementation class, which takes the
    form of a standard Java servlet. After the page’s implementation servlet has been
    created, it will be compiled into a class file by the JSP engine and will be ready
    for use.


    Each time a container receives a request, it first checks whether the JSP file
    has changed since it was last translated. If it has, it’s retranslated so that
    the response is always generated by the most up-to-date implementation of the
    JSP file.


    Initialization


    After the translation phase has been completed, the JSP engine will need to load
    the generated class file and create an instance of the servlet in order to continue
    processing the initial request.


    Therefore, the JSP engine works very closely with the servlet container and the
    JSP page implementation servlet and will typically load a single instance of the
    servlet into memory.


    This single instance will be used to service all requests for the JSP page. In
    a real-world web application, those requests will most likely happen concurrently,
    so your JSP page must be multithreaded.


    Prior to the Servlet 2.5 specification, the Java Servlet specification provided
    two separate threading models that could be used for a servlet. The models determine
    whether single or multiple instances of a servlet can exist. The default threading
    model for any servlet is the multithreaded one that requires no additional work
    for the developer. In this model, the container creates only a single instance
    of the servlet class and sends multiple requests to the instance concurrently.


    To select the single-threaded model for your JSP, you must set an attribute of
    the page directive called isThreadSafe to false to serialize all requests to the
    implementation servlet behind the JSP:


    <%@ page isThreadSafe="false" %>


    In the past, containers would support this feature by creating an implementation
    page that implements the SingleThreadModel interface. When the implementation
    page implements this interface, the JSP container creates multiple instances of
    the implementation class; each instance handles a single request at any given
    time. However, note that the JSP 2.1 specification advises developers against
    using isThreadSafe="false" because the Servlet 2.5


    specification has deprecated SingleThreadModel.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 6


    **6**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    ■**Caution** A JSP page that sets the page attribute isThreadSafe to false may
    contain deprecated code in the implementation class. In addition, it does not
    guarantee thread safety in all cases. Do not rely on isThreadSafe="false" to protect
    your JSP page from concurrency problems.


    After the servlet class is loaded, the container initializes the servlet instance
    with a call to an initialization method. For a JSP implementation servlet, that
    method is the jspInit() method. As the name suggests, this method is used for
    initializing the implementation servlet in an identical manner to the standard
    servlet init() method, which is used to initialize a servlet. The behavior of
    both methods can be regarded as identical, and each is called exactly once. Although
    jspInit() is automatically generated during the translation phase, it’s possible
    to override this method in the JSP page by using a declaration. The method can
    be used for initializing application-level variables or resources, for example:


    <%! AppVar appvar = null; %>


    <%!


    public void jspInit() {


    try {


    appvar = initAppVar(...);


    } catch (Exception e){


    //handle exception


    }


    }


    %>


    Execution


    After the web container has loaded and initialized the implementation servlet,
    the initial request can be serviced. To service the request, the web container
    calls the _jspService() method of the implementation servlet. As we mentioned,
    each request to the JSP page results in a separately threaded call to the _jspService()
    method.


    The _jspService() method provides all the functionality for handling a request
    and returning a response to the client. All the scriptlets and expressions end
    up inside this method, in the order in which they were declared inside the JSP
    page. Notice that JSP declarations and directives aren’t included inside this
    method because they apply to the entire page, not just to a single request, and
    therefore exist outside the method. The _jspService() method may not be overridden
    in the JSP page.


    Finalization


    The last phase in the life cycle is the finalization phase. As with the previous
    two phases, there is a corresponding method in the implementation servlet for
    this phase. The method is named jspDestroy(). Like the destroy() method found
    in a standard servlet, this method is called by the servlet container when the
    page implementation servlet is about to be destroyed. This destruction could be
    for various reasons, such as the server being low on memory and want-ing to free
    up some resources, but the most common reason is that the servlet container is
    shutting down or being restarted.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 7


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **7**


    After this method has been called, the servlet can no longer serve any requests.
    Like the destroy() method, jspDestroy() is an excellent place to release or close
    application-level resources when the servlet is shutting down. To do this, simply
    provide an implementation of this method via a JSP method declaration. For example,
    to release the application resource you opened inside the jspInit() method, you
    would use the following:


    <%!


    public void jspDestroy() {


    try {


    appVar.release();


    } catch (Exception e){}


    appVar = null;


    }


    %>


    **JavaServer Pages Best Practices**


    One of the design goals of this book, apart from the obvious introduction to the
    concepts and mechanics of JSP technology, is to teach right from the start the
    best practices learned from experience. Of all the best practices that have been
    established around JSP, one of the most important suggests that there should be
    as little Java code as possible embedded inside a JSP


    page. Experience has shown us that three key factors benefit from this practice:


    • Reusability


    • Readability


    • Maintainability


    Let’s look at each of these and see how their use can benefit your JSP applications.


    **Reusability**


    A common goal associated with using any programming language is that of reuse,
    whether it involves structuring code inside modules, classes, or some other language-specific
    construct.


    Reusing code leads to increased maintainability and productivity, and higher quality
    because changes to such common functionality need to be made in only a single
    place. Although the concept of building web-based applications is relatively new,
    this goal applies equally to building Java-based web applications with JSP.


    Web-based applications are typically built up around the pages or screens from
    which the application is comprised. For example, in an online bookstore, you might
    build a welcome page first, followed by a page that shows a list of books, and
    then a page that displays the information about a single book. With the ability
    to embed Java code inside JSP pages, there can be a tendency to simply reuse code
    on a source-code level by copying and pasting it between JSP


    pages. Although this does achieve some reuse, it brings with it a dramatic decrease
    in the maintainability of such code as changes and bugs slowly creep in and around
    the system. Ideally, you’re looking for reusability at the class or component
    level.


    Throughout this book, you’ll see many techniques for aiding reusability provided
    by the JSP specification—such as JavaBeans components, custom tags, and tag libraries.
    A **tag library**


    513-0 ch01.qxd 9/30/05 4:08 PM Page 8


    **8**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    (commonly known as a **taglib**) is simply a collection of one or more custom
    tags that are generally related in some way. For example, as we said earlier,
    the JSP 2.0 specification introduced a standard tag library known as the JSTL.
    The JSP 2.1 specification refines the JSTL. The JSTL’s core library contains tags
    that solve many of the common and recurring problems encountered when building
    JSP-based web applications. After the tags are bundled into a tag library, that
    tag library can be reused across the following:


    • A single page


    • The pages of a web application


    • Different web applications


    The ability to easily reuse custom tags across more than a single page illustrates
    the true potential of tag libraries when building web applications. This is something
    that you’ll be seeing when you examine the best practices for designing and building
    custom tags in later chapters.


    **Readability**


    Another important best practice is that of readability. Embedding too much Java
    code in the page can easily lead to pages that are unreadable as content (typically
    HTML) is mixed with JSP tags and Java code wrapped up as scriptlets. In addition
    to the confusion caused by the various syntaxes that each of these “languages”
    uses, one clear problem with embedding Java code inside JSP pages is that it’s
    hard to correctly indent your source code. Writing and indent-ing code is trivial
    when dealing with regular class files, but trying to correctly indent Java code
    that is mixed with HTML and JSP elements is a different story.


    Wrapping up reusable functionality as custom tags or JavaBeans components removes
    this code from the page, therefore making it cleaner, shorter, and more readable.
    Also, choosing appropriate names for your custom tags can make a page more readable
    by page designers—


    those who are responsible for the look and feel of a page rather than the mechanics
    of how it works. This, as you’ll see when we talk about some of the best practices
    associated with custom tags, is very important and often overlooked.


    **Maintainability**


    Having a system that promotes reusability and readability is great, but what does
    that mean in the real world? The maintainability of an application is how well
    the system can be modified and fixed during its lifetime, which for a given application
    is typically hard to measure. However, in looking at any system, several signs
    help us to identify whether that system will be easy or difficult to maintain.
    In reality, this is dictated by reuse and the need to ensure that the code is
    as readable as possible—the two goals that custom tags can help you achieve.


    **JavaServer Pages Application Architecture**


    All the factors mentioned in this chapter—reusability, readability, maintainability—are
    improved by a good design or architecture; therefore, it’s worth ensuring that
    sufficient time is taken early in your project life cycle to select the architecture
    that best suits your environment


    513-0 ch01.qxd 9/30/05 4:08 PM Page 9


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **9**


    and technologies. Although architecture and design can seem a little daunting
    at first (especially when you’re new to the technology and all you really want
    to do is cut code), with a little effort you’ll soon start to understand the benefits
    that are to be gained by using tried and tested patterns.


    As you’re no doubt aware, the Java EE 5 presentation tier consists of several
    components—


    for example, servlets, JSP pages, tag libraries, and JavaBeans—which may be used
    to create a presentation layer for a web application. All these components have
    their relative strengths and weaknesses, particularly when used in different combinations.
    Good design, therefore, is concerned not only with selecting the correct component
    for a task but also with ensuring that the component is used in the correct manner.


    In recent times, two popular web-application architectures have been repeatedly
    used for web-application design, and there are strengths and weaknesses to consider
    with both. Let’s discuss the simpler of these two architectures first.


    **Model 1 Architecture**


    The simplicity of the Model 1 architecture is that each JSP page is entrusted
    to deal with its request entirely by itself, thereby generating a response and
    sending it back to the client, and for this reason it’s often known as page-centric.
    Usually such JSP pages will use some form of **model** to represent the business
    logic of the application. JavaBeans components are often used to model business
    logic. The JavaBean neatly encapsulates the business logic for reusability and
    at the same time keeps the amount of processing logic in the page to a minimum.


    Figure 1-3 shows a JSP page entrusted with handling a client request and building
    an appropriate response all by itself. It is also using a JavaBean to encapsulate
    business logic.


    JSP/Servlet Container


    Data Tier


    Request


    JSP Page


    Data


    Response


    Browser


    JavaBean


    Data


    **Figure 1-3.** *In a Model 1 architecture, all the application processing occurs
    in a single tier of the* *application.*


    Each JSP page has the potential to contain a lot of processing logic. However,
    as long as the application is relatively small with few pages, the Model 1 architecture
    is a good choice because it’s quick and simple to put together. However, such
    a page-centric architecture can begin to introduce problems when used with larger,
    more complex applications. Some of the more common problems are outlined here.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 10


    **10**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    Maintainability Problems


    Because each JSP page is solely responsible for handling a client request, it
    will often have to directly interact with a business layer. This can result in
    the application structure being embodied within the pages themselves. This obviously
    makes the pages more complicated and more likely to contain lots of scriptlet
    code, which ultimately makes them far harder to maintain.


    Reusability Problems


    When most of the processing logic is embedded into the JSP pages, it becomes much
    more difficult to reuse common functionality because it’s usually implemented
    using scriptlets.


    Often this results in a lot of cutting and pasting of code that isn’t only bad
    from a reusability perspective but is also likely to introduce errors and decrease
    productivity.


    Security Problems


    Because each JSP page is responsible for handling all of its processing, it’s
    possible that any actions that require a user to be logged in or that access password-protected
    resources such as databases could end up exposing sensitive information by embedding
    it in the page. It’s therefore important to make sure that any such logic is encapsulated
    into JavaBeans components or custom actions to prevent this possible security
    hole.


    Of course it would make far more sense to provide such security controls via a
    single, centralized access point, and you will see how the next architecture up
    for discussion does exactly this.


    **Model 2 Architecture (Model-View-Controller)**


    As you might expect, the Model 2 architecture builds on the Model 1 architecture
    you’ve just seen, and it overcomes many of the problems identified earlier.


    The Model 2 architecture is a server-side implementation of the popular **Model-View-Controller
    (MVC)** design pattern. This pattern enforces the separation of the way application
    data is modeled (hence, the **model**) from the way it’s presented (the **view**),
    and it also requires a separate component to handle the processing in between
    (the **controller**). Separating these responsibilities into components gives
    the developer a good opportunity to select the right type of component for each
    based on its suitability to the task.


    As mentioned earlier, JSP pages are best used for presenting content and aren’t
    particularly good for providing complex business processing because readability
    and maintainability would decline. Servlets, on the other hand, are particularly
    good components for providing business processing but aren’t best suited to generating
    content. Most applications implementing the Model 2 architecture therefore utilize
    a controller servlet to handle all the request processing and delegate requests
    to separate JSP components to provide the presentation, thereby making the best
    use of both technologies. Remember that the Model 1 architecture you saw earlier
    forced the controller and the view to coexist inside the same component, which
    accounts for a lot of its shortcomings.


    As you can see in Figure 1-4, all requests made of the web application are handled
    by a single controller servlet. Depending on the type of request received, the
    controller servlet is responsible for populating the model component with data
    that it has obtained, usually by interacting with the business layer. The controller
    then forwards the request to the JSP view


