    **576**


    ## CHAPTER 15 ■ USING STRUTS, XDOCLET, AND OTHER TOOLS


    To demonstrate, you can simply add the following tag to the top of a page, and
    then view the source in your browser:


    `<html:html xhtml="true"/>`


    If you’re using JSP includes or Tiles, you’ll likely have to use the `<html:xhtml
    />` tag at the top of your included pages to force rendering XHTML syntax. At
    the time of this writing, only XHTML 1.0 Transitional was supported as a DOCTYPE.
    This is because the `name` attribute is still rendered on a form. XHTML 1.0 Strict
    requires that only an `id` attribute be present.


    You can give your Struts tags any prefix you want when importing them into your
    JSP pages. Let’s take, for instance, the contents of this file:


    ```

    <%@ taglib uri="http://jakarta.apache.org/struts/tags-bean" prefix="bean" %>

    <%@ taglib uri="http://jakarta.apache.org/struts/tags-html" prefix="html" %>

    <%@ taglib uri="http://jakarta.apache.org/struts/tags-logic" prefix="logic" %>

    <%@ taglib uri="http://jakarta.apache.org/struts/tags-tiles" prefix="tiles" %>

    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>

    ```


    You may well have already seen this de facto standard for Struts prefixes. There’s
    really no reason to use these verbose prefixes though, and you may rather use
    single-letter prefixes like JSTL if you prefer, such as these:


    ```

    <%@ taglib uri="http://jakarta.apache.org/struts/tags-bean" prefix="b" %>

    <%@ taglib uri="http://jakarta.apache.org/struts/tags-html" prefix="h" %>

    <%@ taglib uri="http://jakarta.apache.org/struts/tags-logic" prefix="l" %>

    <%@ taglib uri="http://jakarta.apache.org/struts/tags-tiles" prefix="t" %>

    ```


    We’ve come to know and love a couple of additional tag libraries that make developing
    web UIs a bit easier. The first is the `display tag library` (http://displaytag.sourceforge.net/)
    originally authored by Ed Hill, which facilitates column sorting and pagination
    of data and integrates nicely with Struts. All you need to do is create a `List`
    (or other collection) of `ActionForms` and pass those to the tag in the JSP. This
    tag library also supports exporting your table’s data to Excel, CSV, and XML.


    The second is the `Struts menu tag library`. This component is a Menu framework
    that can be used to declare your menu items in an XML file. It integrates with
    Struts as a plug-in, supports popular menu styles (for instance, CoolMenus and
    standards-compliant DHTML menus), and allows for hiding and showing menus and
    items based on roles. Currently, it supports absolute and context-relative links,
    as well as Struts forwards.


    Both of these tag libraries are used in this chapter’s application.


    To reference the Struts tag libraries, you simply drop the `struts.jar` file into
    `/WEB-INF/lib` and match the URIs as specified in each library’s tag descriptor
    (TLD) file. We’ve seen that some servlet containers require you to declare the
    location of your TLD in `web.xml`. This is also necessary if your TLD file doesn’t
    declare a URI to map to. In our example `struts-resume` application, `struts-resume.tld`
    and `struts-menu.tld` require entries in `web.xml` for this reason.


    JSP 2.1 helps keep the code concise by allowing a JavaBean’s properties to be
    accessed directly in a JSP page. Previously, you had to use `<c:out value="${beanName.propertyName}"/>`,
    while now, JSP 2.1 lets you simply use `${beanName.propertyName}`. We expect JSTL-type
    syntax to be around for a while, as will the Struts tags, if only for backward
    compatibility.


    # 513-0 ch15.qxd 11/14/05 5:38 PM Page 577


    ## CHAPTER 15 ■ USING STRUTS, XDOCLET, AND OTHER TOOLS


    **577**


    ## Overview of the Example struts-resume Application


    The `struts-resume` application we’re going to use as an example throughout this
    chapter uses Ant (an open-source build tool) and XDoclet (an open-source code
    generation tool) as its core engines. They will generate a significant portion
    of the application for you as well as run any JUnit and Cactus tests you may have.'
