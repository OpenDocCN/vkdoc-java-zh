    The <dispatcher> Element


    The <dispatcher> subelement in <filter-mapping> is optional. If omitted, the <filter-mapping>
    declaration is backward compatible with Servlet 2.3 containers. In this case,
    the mapped filter will work only on the request level, and not when the request
    is dispatched via a request dispatcher. This compatibility mode is entirely equivalent
    to specifying the following


    <filter-mapping> segment:


    <filter-mapping>


    <filter-name>F1</filter-name>


    <url-pattern>/*</url-pattern>


    <dispatcher>REQUEST</dispatcher>


    </filter-mapping>


    REQUEST, FORWARD, INCLUDE, or ERROR <dispatcher> Values Table 10-2 shows the allowed
    values inside a <dispatcher> element.


    **Table 10-2.** *Valid Subelements of the <dispatcher> Tag* **Value**


    **Description**


    REQUEST


    Enables filter mapping for incoming requests


    FORWARD


    Enables filter mapping for forwarded requests by using the request dispatcher
    INCLUDE


    Enables filter mapping when the request dispatcher is used to include the output
    of multiple processing resources


    ERROR


    Enables filter mapping when the request is forwarded to an error-handling resource


