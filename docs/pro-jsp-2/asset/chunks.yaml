    The code download for this book comes with a fully featured application for demonstrat-ing
    security techniques. Unfortunately, it is too lengthy to fully list here. We provide
    extracts as we explain the application in the following pages. This application,
    which we refer to as security-example.war for simplicity’s sake, is designed to
    hold all the security mechanisms described in this chapter. Both source code and
