    removeObject(Newsfeed.class, feed.getId(), feed);


    }


    private void removeObject(Class clazz, String id, Object obj) throws DAOException
    {


    Session ses = null;


    try {


    ses = sessionFactory.openSession();


    obj = ses.load(clazz,id);


    ses.delete(obj);


    ses.flush();


    ses.connection().commit();


    } catch (Exception e) {


    try { ses.connection().rollback(); }


    catch (Exception ex) { e.printStackTrace(); };


    throw new DAOException(e);


    } finally {


    try { ses.close(); }


    catch (Exception ex) { ex.printStackTrace(); };


    }


    }


