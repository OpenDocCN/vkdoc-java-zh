    The UserManager retrieves the user’s information and hides the dirty work (which
    is the filter, in this case) from the client. In this example, the getUser(ses,
    username) method call throws an exception when the user isn’t found. The catch
    block gets a RequestDispatcher and forwards to a JSP page that explains the problem.


    It’s important to hide the implementation of retrieving the user’s details so
    that you have the ability to switch to LDAP at a later date, or to another type
    of user database. To use LDAP, all you’d need to do is create a new class that
    implements UserManager and talks to LDAP, rather than to a database. To make it
    even better, you can add a context parameter in your web.xml to allow switching
    between a database and LDAP. The nice thing about using a directory server such
    as LDAP is that you get encrypted passwords as part of your data store. With file
    and database realms, you have to either encrypt passwords programmatically or
    configure your servlet container to do it for you.


    Encrypting Passwords


    In Tomcat, it’s easy to encrypt passwords by adding the digest attribute to a
    realm definition.


    The value must be one of the digest algorithms supported by the java.security.MessageDigest
    class (SHA, MD2, or MD5). To expand on the earlier example, the XML snippet shown
    next adds SHA encrypting to a file-based realm:


    <Realm className="org.apache.catalina.realm.UserDatabaseRealm"


