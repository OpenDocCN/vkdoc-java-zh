    HTML 符合指定的 DOCTYPE。我们通常会在项目目录中创建一个“沙盒”目录，用于存放这些 HTML 文件以进行验证和其他快速修复。有时使用静态 HTML
    版本会更方便。我们的做法是更改所有样式表、JavaScript 和图片的绝对路径，改用相对路径。在 struts-resume 项目中，这需要将


    /struts-resume/ 改为 ../web/。


    一旦验证了应用程序并进行了彻底测试，你会对其运行效果更有信心，从而更有可能产出高质量的软件。希望借助我们提供的示例，编写测试的艰巨工作已经完成。编写测试看似麻烦，但这仅在你先编写实际代码时才会如此。下次尝试先编写测试


    513-0 ch15.qxd 11/14/05 5:38 PM 第 626 页


    **626**


    第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具


    用例，我们相信你会发现它们非常有趣。没有什么比编写一个在浏览器中首次运行就能正常工作的应用程序更令人愉悦的了（当然，这要归功于单元测试）。


    **在 Struts 应用程序中处理异常**


    Struts 1.1 使得在 Struts 应用程序中处理异常变得更加容易。软件开发中一个流行的规则是：“如果出现问题，你应该告知用户。”在使用 MVC 和业务对象与数据库通信的
    Web 应用程序中，这可能会变得相当复杂。异常可能在任何层级抛出，包括数据访问代码、Action 类、业务对象，甚至 JSP 页面。


    我们过去采用的方法是在 Action 类和业务对象中都使用 try...catch，然后将任何异常“冒泡”到顶层。这种做法很不优雅，并且可能导致用户看到诸如“列
    street_address 未找到”之类的消息。


    此外，在 Action 类中，我们捕获了业务层异常，将其包装在 ServletException 中，然后抛给客户端。我们在 web.xml 以及 JSP
    页面中都配置了错误页面，当发生错误时，客户端会被重定向到该页面。


    尽管我们将向你展示一种使用 Struts 处理异常的更好方法，但我们仍然认为配置 JSP 页面和 web.xml 以处理未捕获的异常非常重要。你应该在 web.xml
    中添加一个条目，用于处理服务器抛出 HTTP 状态码 500（即可怕的“内部服务器错误”）的情况：


    <error-page>


    <error-code>500</error-code>


    <location>/error.jsp</location>


    </error-page>


    或者，你也可以使用 <exception-type> 而不是 HTTP 状态码或错误码：


    <error-page>


    <exception-type>java.lang.Throwable</exception-type>


    <location>/error.jsp</location>


    </error-page>


    为了安全起见，你也可以同时添加两者。使用 XDoclet 时，你可以在合并目录的 error-pages.xml 文件中指定这些条目。我们通常也会在 JSP
    页面中声明 errorPage：


    <%@ page language="java" errorPage="/error.jsp" %> 在 struts-resume 示例应用中，这一行仅存在于
    common/taglibs.jsp 文件中。添加这些条目基本上可以防止用户看到异常的堆栈跟踪——前提是你已经恰当地编写了 error.jsp。对于高级错误页面，你甚至可以配置它在显示给用户时向管理员发送电子邮件（或使用
    log4j 的 SMTP Logger）。近年来，我们看到 500 内部服务器错误的次数比经典的 404 错误还要多。为这些错误添加一个友好的界面可以让每个人的生活都更愉快一些。


    真正的期望是错误页面永远不会被显示。作为一个精明的网络用户，如果它确实被显示了，我们希望确切地知道哪里出了问题——比如 SQL 的详细信息。当然，这取决于


    513-0 ch15.qxd 11/14/05 5:38 PM 第 627 页


    第 15 章 ■ 使用 STRUTS、XDOCLET 和其他工具


    **627**


    你的应用程序的安全要求。如果你的应用程序容易受到攻击（位于互联网而非内网上），你可能希望抑制任何泄露数据库信息的消息。同时，并非所有用户都想看到异常的细枝末节，因此，我们建议你提供更友好的用户消息。


    **链式异常**


    在我们看来，一个开发良好的应用程序应该捕获错误消息，将其转化为友好的消息，然后将用户返回到他们最后成功查看的页面。同时，最好也能添加一条技术性消息，供那些希望了解问题确切原因并可能避免它的精明的用户（或开发者）查看。为了实现这一点，你首先可以做的就是使用**链式异常**。传统的
    Java 异常机制只允许你抛出一个异常。这在分层架构中会带来问题，因为异常可能发生在每一层。


    当然，你可以像我们使用 ServletException 那样包装异常，但这最终可能导致细节丢失。Ted Husted 在他的一篇 Struts 技巧中最好地描述了解决方案。与其试图改写他的话来显得像是我们想出的主意，不如直接引用他（参见
    http://husted.com/struts/tips/015.html）：*我们真正需要做的是“堆叠”或“链接”异常，这样每一层都可以为事件添加自己的视角。然后，在最后，将它们全部显示出来，并将原始异常放在列表的底部。*


    *这种方法在分层架构中效果出奇地好。“最顶层”最“接近”用户，因此抛出最“用户友好”的异常。“最底层”抛出解决* *问题所需的“极客友好”错误。当我们通过链接将异常串联起来时，用户友好的消息在前，更详细的消息在后。用户首先被告知他们需要知道的内容，其余部分可以留给系统管理员处理。*


    从 JDK 1.4 开始，java.lang.Exception 类提供了 getCause() 方法，允许你找到每个异常的原始原因。要正确使用这一点，你需要抛出每一层发生的异常，而不是仅仅捕获异常并附带一条消息抛出。我们的意思是，这样做更好：
    try {


    ...


    } catch (Exception e) {


    throw new DAOException("连接数据库时发生错误", e);


    }


    而不是仅仅抛出消息：


    try {


    ...


    } catch (Exception e) {


    throw new DAOException("连接数据库时发生错误");


    }


