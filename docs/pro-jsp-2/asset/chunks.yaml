    The previous figure is the conventional request flow. The incoming request is
    optionally passed through a mapped filter chain before being sent to the final
    processing resource—


    typically a servlet or JSP page. This is the typical filtered request data flow
    for older Servlet 2.3–compliant containers.


    Figure 10-6 reveals what happens when you use the same filter mapping with two
    resources that are included by the main web resource (via RequestDispatcher.include()
    in a servlet or an include directive in JSP) when using Servlet 2.3–compliant
    containers.


    **Figure 10-6.** *When a resource in a Servlet 2.3 container includes other resources,
    these resources* *do not get processed by the filters.*


    In other words, under Servlet 2.3–compliant container control, when the primary
    web resource uses the request dispatcher to include other processing resources,
    the included processing resource cannot be filtered. The same thing happens when
    the web resource uses the request dispatcher to forward the request to other processing
    resources (via the RequestDispatcher.forward() method in a servlet or the <jsp:forward>
    tag in JSP).


    Figure 10-7 illustrates this situation.


