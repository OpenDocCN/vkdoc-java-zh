    Other application servers will likely support a similar file-based mechanism for
    storing user information, but we doubt you’d ever see this on a production system.
    One of the main problems with using a file-based mechanism is that most servers
    require a shutdown and restart to pick up any changes. It’s great to use for prototyping,
    but if you decide to add more user information, you’ll likely want to use a database
    or directory service. Although it’s possible to use a file-based realm for usernames
    and passwords, and a database for the rest of the users’ information, the realm
    will be easier to maintain if everything is kept in the database.


    For that, Tomcat provides you with the JDBCRealm.


    **JDBCRealm**


    The JDBCRealm allows you to configure *declaratively* the location for storing
    your users’ information. When we say “declaratively,” we mean that the location
    is typed in an XML file, rather than programmed and compiled into a Java class.
    Tomcat also supports a JNDIRealm for looking up


