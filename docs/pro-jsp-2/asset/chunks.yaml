    **Data Access Architectures**


    We have discussed several data access technologies and now we’ll discuss how data
    access fits into the architecture of a web application. Of course, there isn’t
    one true web-application architecture. Every application is different, and different
    applications often need different architectures.


    According to UML gurus Grady Booch, James Rumbaugh, and Ivar Jacobson in *The
    Unified* *Modeling Language User Guide* (Addison-Wesley, 2005), one definition
    of architecture is the


    “set of significant decisions about the organization of a software system.” When
    you come up with a new architecture, you’re deciding how to divide your software
    into different parts and you’re deciding how these parts will work together. These
    decisions will affect your application’s performance, maintainability, reusability,
    ease of development, and resilience to change.


    Architectural decisions often require trade-offs that can be made only by somebody
    who knows the unique requirements of the software being developed. In this section,
    we’ll discuss architectures at three increasing levels of complexity. You’ll learn
    the advantages and disadvantages of each type of architecture, so that you can
    decide for yourself which architecture is best for each of your web applications.


    **Example: RSS Newsreader**


    Before we discuss the three types of architectures, we should introduce the example
    application that we’ll use to illustrate these architectures. This chapter’s example
    is a JSP-based Rich Site Summary (RSS) newsreader.


    RSS is a simple XML-based format for representing the current news stories available
    on a website. A website that supports RSS may provide several RSS news feeds,
    each covering one topic and each available at a different URL. An RSS news feed
    is represented by an RSS file, which is dynamically generated and updated on a
    regular schedule. An RSS file contains a


    <channel> element that describes the contents of the file, and that channel element
    contains a series of <item> elements with each representing one news story. Each
    news item has a title, description, publication time, and link that points to
    the full story on the website that is associated with the news feed. Here’s one
    <item> element from an RSS that was recently available from a common news site:


    <item>


    <title>iPod Owners Make Friends And Influence People (TechWeb)</title>


    <link>http://us.rd.yahoo.com/dailynews/rss/digitalmusic/ ➥


    *http://news.yahoo.com/s/cmp/20051026/tc_cmp/172900215</link>


    <guid isPermaLink="false">cmp/20051026/172900215</guid>


    <pubDate>Tue, 25 Oct 2005 18:00:00 GMT</pubDate>


    <description>TechWeb - Owners of Apple Computer''s iPods are among ➥


    the Internet''s most influential users, a study says.</description>


    </item>


    An RSS newsreader allows a user to subscribe to one or more RSS news feeds, and
    then to view the news stories from those news feeds within a single interface
    such as a desktop application or a web page. RSS newsreaders are often referred
    to as aggregators because they typically read news stories from multiple sites
    and aggregate them together for display.


