    C H A P T E R 9


    ■ ■ ■


    Data Access Options


    for Web Applications


    **N**ow that you have a full understanding of web applications, JSP, and servlets,
    it’s time to start discussing how these technologies fit together in a JSP application.
    No matter what type of JSP application you’re writing, you’ll need to either store
    the data that is created by your application or use data from an external source
    in your application. You need **data access**.


    There are many options for data access from a JSP application including file storage,
    object-oriented databases, XML databases, and relational databases. In almost
    all cases, a relational database is the best choice.


    For simple applications intended for small-scale use on a single-instance application
    server, you might choose to store your data in files. However, if you want to
    scale your application up to meet the needs of a large number of users, then you’ll
    need to distribute application processing across multiple servers. All Java EE
    application servers make this easy and transparent to you, the application programmer,
    but you need to store your data in a location that is accessible to all of your
    servers. Unfortunately, file system storage isn’t the best way to do this.


    For more complex larger-scale applications, you should use a database, but what
    type of database should you choose? Although object-oriented and XML databases
    might be appeal-ing to some developers, most IT managers prefer to use tried-and-true
    relational database technology. Relational database technology is preferred because
    it’s ubiquitous, well understood, standardized, and supported by a tremendous
    number of tools and applications.


    In this chapter, we’ll discuss five Java database access options, several JSP
    database access architectures, and an example of a JSP database application. By
    the end of this chapter you should have enough knowledge to evaluate and select
    a database access technology, design database access architecture, and implement
    database access for your JSP application.


    This chapter assumes that you have knowledge of Java, JavaBeans, JSP, JDBC, SQL,
    and relational database technology.


    **Data Access Technologies**


    Database access has been part of Java since Sun Microsystems added the JDBC API
    as an add-on to Java 1.0\. Since then, Sun has also added Enterprise JavaBeans
    (EJBs) and most recently Java Data Objects (JDO) to Java. That isn’t all; Sun
    is only one of the many organizations supporting database access from Java. Numerous
    vendors have sprung up over the years to provide JDBC implementations and Object-Relational
    Mapping (O/R) frameworks for Java.


    **359**


    513-0 ch09.qxd 11/16/05 12:03 PM Page 360


    **360**


    C H A P T E R 9 ■ D ATA A C C E S S O P T I O N S F O R W E B A P P L I C AT I
    O N S


    The good news is that there are a lot of choices for data access. That’s also
    the bad news.


    In this section, we’ll sort out the choices by dividing them into five categories
    starting with the simplest and ending with the most sophisticated. The five data
    access technologies, from simplest to most sophisticated, are as follows:


    • JSP tags for SQL


    • JDBC


    • O/R frameworks


    • JDO


    • EJB entity beans


    When you choose a data access technology, you should consider both the nature
    of the web application that you’re developing and the skills of your development
    and support teams. Generally speaking, if you have simple requirements and a less
    experienced team, you should favor the simple end of the spectrum. If you have
    more complex requirements and a more experienced team, you should favor the sophisticated
    side. Here are some questions to consider:


    • Does your application have fairly simple database access requirements? Perhaps
    you need only to display a couple of reports based on information in a database.
    For simple applications, you might want to avoid the learning curve, complexity,
    and overhead of a more sophisticated data access technology.


    • Will your application have a complex Java object model that must be persisted
    to a database? If so, you might find that you really cannot do without the sophisticated
    automated object-relational mapping capabilities of an O/R framework or of EJB


    container-managed persistence (CMP).


    • Is your application one that is highly transactional, requires high availability,
    and is likely to support a large number of concurrent users? If so, you might
    need the declarative transaction support, fault tolerance, and load balancing
    provided by EJB servers.


    • Which Java data access technologies do your developers know? What level of database
    knowledge do your developers have? Will you need training? If your team has previous
    experience with database access, that might influence your selection of a database
    access technology.


    With these types of questions in mind, let’s discuss the pros and cons of each
    of the five data access options, starting with the most simple.


    **JavaServer Pages Tags for SQL**


    The JSTL, which is covered in Chapter 4, includes a set of JSP tags that allow
    you to access a database via SQL directly from your JSP pages.


    The obvious advantage of the JSP tags for SQL is simplicity. It’s easy to query
    the database and to throw the results up on a web page. This is great for simple
    applications that need only to display database data on a web page and make simple
    database table updates—JSP tags for SQL work well. The <sql:query> tag executes
    an SQL query and returns a result set object that


    513-0 ch09.qxd 11/16/05 12:03 PM Page 361


    C H A P T E R 9 ■ D ATA A C C E S S O P T I O N S F O R W E B A P P L I C AT I
    O N S


    **361**


    you can iterate over and display with other JSTL tags. You can also perform database
    table updates. The <sql:update> tag executes an SQL update.


    For larger projects, there are a couple of disadvantages to keep in mind. One
    disadvantage is that you must embed SQL queries with table and field names into
    your JSP pages. If database table and field names change, you’ll have to make
    the corresponding changes in your JSP


    files. For a small project, this might not be a big problem, but larger projects
    should consider other data access options. Other data access options, such as
    O/R frameworks and EJB, can provide some level of indirection so that changes
    to the database schema do not have as much of an effect on your application code.


    Another disadvantage is updates. The JSP tags for SQL allow you to perform updates
    on a database, but you have to build the SQL update string yourself. Again, for
    small projects with simple updating needs, this might not be a problem, but larger
    projects should consider other data access options. Other data access options
    can provide infrastructure to make updates much easier to program.


    JavaServer Pages Tags for SQL Example


    Listing 9-1 is an example of JSP tags for SQL. This example illustrates how to
    execute a query, iterate through the results, and display the results in an HTML
    table.


    **Listing 9-1.** *jstl-example.jsp*


