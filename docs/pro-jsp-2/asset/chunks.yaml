    **Filter 4: An Ad Hoc Authentication Filter**


    Tomcat 5 and almost all Servlet 2.5–compliant containers come with extensive authentication
    and authorization support, so in theory there should be little need to implement
    your own authentication filter. In fact, we will cover authorization and authentication
    in detail in Chapter 12\. In practice, however, there’s almost always room to
    apply an ad hoc authentication filter on a selected resource without affecting
    the rest of the application or requiring the overhead of setting up, say, JDBC
    realms.


    You should always analyze the problem at hand to see whether it would be better
    solved by the native authentication support of the server. When you need simple,
    temporary protection of selected resources, the AdHocAuthenticate filter can be
    the best choice.


    The action of this filter is straightforward. It triggers basic authentication
    on the client browser. Almost all known browsers, including even the earliest
    versions, support basic authentication. The authentication process works like
    this: **1.** A client attempts to access a protected resource.


    **2.** The server examines the client’s request to determine whether there’s any
    authorization data in the “Authorization” header.


    **3.** If authorization data isn’t found, the server sends back HTTP status code
    401


    (unauthorized access) and a header with WWW-authenticate: BASIC realm=<realm>,
    where realm is a text string that will be displayed to the client.


    **4.** The client browser pops up a login screen in which the user should enter
    a username and password.


    513-0 ch11.qxd 11/17/05 8:39 PM Page 457


    C H A P T E R 1 1 ■ A D VA N C E D F I LT E R I N G T E C H N I Q U E S


    **457**


    **5.** When the user enters the username and password, the client encodes the
    username and password by using simple base64 encoding and sends both to the server.


    **6.** The server examines the client request to determine whether there’s any
    authorization data, decoding the base64-encoded password if necessary. If there’s
    no authorization data, the process goes back to step 3.


    **7.** The server verifies the password and either allows or rejects access.


    ■**Note** Basic authentication isn’t very secure, because base64 encoding can
    easily be deciphered. However, for applications that just need to protect resources
    from casual access, it’s usually sufficient. For more details on different kinds
    of authentication, see Chapter 12.


    **The AdHocAuthenticateFilter Class**


    The AdHocAuthenticate filter in Listing 11-13 recognizes two passwords: one for
    “regular”


    users and one for privileged, “gold member” users. Both passwords are configured
    as initial parameters for the filter. If a user logs on using the “gold member”
    password, a Boolean attribute is created and attached to the request. You’ll learn
    later (in the pipeline-processing filters section) how this attribute is used.
    For now, let’s focus on the authentication action of this filter.


    **Listing 11-13.** *AdHocAuthenticateFilter*


