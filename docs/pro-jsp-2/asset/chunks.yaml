    **Figure 9-5.** *In a single-layer architecture, the presentation logic, business
    logic, and data access* *logic all reside within the same application code.*


    With single-layer architecture, you’re sacrificing maintainability, reusability,
    and resilience to change in order to make development a little easier. This might
    be acceptable for a smaller application, but for a larger application this type
    of architecture will make your code have the following characteristics:


    • **Difficult to maintain:** Presentation, business, and persistence logic are
    all mixed together and cannot be considered or changed separately.


    513-0 ch09.qxd 11/16/05 12:03 PM Page 375


    C H A P T E R 9 ■ D ATA A C C E S S O P T I O N S F O R W E B A P P L I C AT I
