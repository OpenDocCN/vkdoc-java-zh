    <servlet-class>org.appfuse.webapp.action.BaseAction</servlet-class> 如果希望在分派到方法之前执行逻辑，最佳做法是深入研究
    Struts 代码（优秀的开源项目！），并使用 `DispatchAction` 或 `LookupDispatchAction` 作为基类。你也可以在基类（或每个类）中使用
    `preExecute()` 方法，并在每个方法的开头调用它。我们通过简单地使用 `BaseAction` 来存放公共操作方法，取得了良好的效果。例如，我们使用
    `BaseAction` 实现了一个便捷方法，并通过 `getUserForm(session)` 从会话中获取用户信息。


    编写完 action 后，你需要在 `<action-mappings>` 中配置一个参数，适当地命名为 `method` 或 `action`——我们使用
    `method` 以保持与文档一致，尽管我们更倾向于使用 `action`：


    <action path="/test" type="org.example.MyAction" name="MyForm" scope="request"


    input="/test.jsp" parameter="method"/> 然后，你需要在调用此 action 的表单中添加一个隐藏字段。例如：


    <html:hidden property="method" value="add"/> 如果你不想从表单中获取 `method` 属性，也可以使用普通的
    HTML 标签来实现：


    <input type="hidden" name="method" id="method" value="add" /> 此外，你并不总是需要通过表单来调用
    dispatch action，例如从列表中编辑某个项目时。为此，你可以使用已定义方法所指定的 forward：


    <forward name="editUser" path="/editUser.do?method=edit"/>


    513-0 ch15.qxd 11/14/05 5:38 PM Page 606


    **606**


    第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具


    然而，`DispatchAction` 也存在一些问题。例如，如果你的表单中有多个按钮（如添加、复制、保存、删除）来执行不同的操作，你就必须使用 JavaScript
    来操作 `method` 隐藏字段。虽然 JavaScript 是一种完全可以接受的方式，但还有一种更简单的方法——`LookupDispatchAction`。


    LookupDispatchAction


    `LookupDispatchAction` 类是 `DispatchAction` 的子类，它允许你将按钮标题映射到方法名。此外，它会从你的 Struts
    ResourceBundle（`ApplicationResources.properties`）中读取按钮标题。这意味着你可以轻松地将键 `button.save`
    映射到 `save()` 方法。


    要在项目中实现 `LookupDispatchAction`，你首先必须在你的类中继承 `LookupDispatchAction`。同样，我们建议在 `BaseAction`
    类中完成此操作，然后让你的项目中的 action 继承自这个基类。你需要在 `<action-mappings>` 中添加一个参数，这与 `DispatchAction`
    非常相似：


    <action path="/test"


    type="org.example.MyAction"


    name="MyForm"


    scope="request"


    input="/test.jsp"


    parameter="action"/>


    你可以将参数设置为 `method`，但 `action` 在 `LookupDispatchAction` 的 Javadoc 中已有演示，因此我们在这里使用它以避免混淆。`action`
    请求参数将用于在 `ApplicationResources` 中定位对应的键。在适当配置 `struts-config.xml` 或 action 类中的
    XDoclet 标签后，你需要在子类中实现 `getKeyMethodMap()` 方法，如下所示：protected Map getKeyMethodMap()
    {


    Map map = new HashMap();


    map.put("button.add", "add");


    map.put("button.delete", "delete"); return map;


    }


    你的 `ApplicationResources.properties` 文件决定了按钮上显示的文本，因此应包含这两个键的条目：button.add=添加记录


    button.delete=删除记录


    最后，你需要将表单提交按钮的 `property` 属性设置为 `action`，以便将按钮的标题传递给 action：


    <html:submit property="action">


    <bean:message key="button.add"/>


    </html:submit>


    513-0 ch15.qxd 11/14/05 5:38 PM Page 607


    第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具


    **607**


    <html:submit property="action">


    <bean:message key="button.delete"/>


    </html:submit>


    在 `struts-resume` 应用程序中，`BaseAction` 继承了 `LookupDispatchAction`。我们还对 `getKeyMethodMap()`
    方法进行了自己的小改进，使得键值对可以从另一个属性文件中加载。这样可以在不重新编译的情况下将新方法映射到按钮。这看起来可能有些过度设计，但实现起来只需几分钟。我们遇到的一个问题是，如果你使用
    JavaScript 在点击后禁用提交按钮，`action` 参数将不会被发送。


    ■**注意** 有关这些内置 action 的更多信息，可以在 Struts Javadocs 中找到，网址为 http://struts.apache.org/javadoc.html。


    **使用 Tiles 框架组装视图**


    **Tiles** 是一个复合视图框架，用于从组件部分组装展示页面。每个部分（或称为 tile）可以在整个应用程序中根据需要重复使用。你可以在任何 JSP
    或 Servlet 应用程序中使用 Tiles，但它最初是为 Struts 设计的，因此在 Struts 中使用最为方便。自 Struts 1.1 起，Tiles
    框架已集成到核心 Struts 库（`struts.jar`）中。Tiles 常被视为一个重量级、配置密集型的插件，但实际上它提供了与（现已弃用的）struts-template
    标签库相同的简单功能。


    Tiles 由 Cedric Dumoulin 开发，在我们看来，这是 JSP 开发者遇到的最好的事情之一。像 CSS 和 XHTML 这样的标准也很棒（并且为开发跨浏览器工作的
    Web 应用程序提供了更多结构），但 Tiles 让这一切变得*更加容易*。Tiles 将减少你构建 Web 应用程序的开发时间，并且还能让你相对轻松地更改整个应用程序的外观。它提供了我们所知的最佳布局框架，尽管还有其他框架拥有热情的拥护者，例如
    OpenSymphony 的 SiteMesh (http://www.opensymphony.com/sitemesh)。


    在过去的几年里，我们开发了几个 JSP 应用程序，并使用了多种不同的技术进行布局。第一种技术类似于开发静态网站的方式，即每个 JSP 页面都包含典型 HTML
    页面的所有布局元素。


    这包括 `<html>` 声明、`<head>` 元素、`<body>`，以及 `<body>` 内的任何 `<div>` 或 `<table>` 元素，还有实际内容。虽然这对于
    HTML 开发者来说通常更容易掌握，但这绝对是困难的方式。如果你需要进行网站重新设计，很可能需要修改每个 JSP 文件。当然，HTML 编辑器（如 Dreamweaver、BBEdit
    和 HomeSite）通过其全局搜索和替换功能可以使这变得更容易，但同时也可能轻易搞乱你的 HTML。


    一种更简单的方法是*包含*所有页面共有的元素。这些元素包括包含 CSS 和 JavaScript 引用的 `<head>` 元素，或者所有页面共有的菜单。


    513-0 ch15.qxd 11/14/05 5:38 PM Page 608


    **608**


    第 15 章 ■ 使用 STRUTS、XDOCLET 及其他工具


    虽然这种方法比第一种方法容易得多，但你仍然需要在所有页面中重复代码来包含这些外部元素。可能只有三四行代码，但无论如何，如果你忘记包含页眉，很可能直到你（或你的用户）通过浏览器运行页面时才会发现。

