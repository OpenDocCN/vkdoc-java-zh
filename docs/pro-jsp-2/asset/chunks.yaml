    **Our First Filter—SimpleFilter**


    Before coding your first filter, let’s take a quick look at one additional interface
    that you’ll be using within the filters sample.


    The ServletContext Interface


    Using the getServletContext() method on the javax.servlet.FilterConfig object,
    the filter can obtain a reference to the current ServletContext that it’s executing
    under. There is a ServletContext for each running web application. Because of
    this single-instance nature, the ServletContext is frequently used for sharing
    information globally.


    Using this reference, the filter can utilize the context’s logger service. It
    can also use this interface to attach arbitrary attributes to the context during
    runtime. An attribute can be an arbitrary object associated with a String name.
    Attaching attributes to ServletContext is a popular way to pass information between
    processing agents during runtime. For example, state information can be passed
    between filter instances by using these attributes. Here are several of the most
    frequently used methods by filter writers, and you’ll see them used in the sample
    filters later:


    • **Object getAttribute(String name):** Obtains the value of a named attribute


    • **void setAttribute(String name, Object object):** Attaches a named attribute
    to the ServletContext


    • **void removeAttribute(String name):** Removes a previously attached attribute


    • **Enumeration getAttributeNames():** Returns a java.util.Enumeration consisting
    of the names of all the currently attached attributes


    You’ll need to write to the log file in your filters, using the following methods
    of the ServletContext object:


    • **void log(string msg):** Writes a string to the currently active logging facility
    associated with the context


    • **void log(String msg, Throwable throw):** Writes a string and a stack trace
    to the log Coding the Filter


    Your first filter is called SimpleFilter. Listing 10-1 shows the source code for
    SimpleFilter, which implements the Filter interface. To compile this class, you’ll
    need to include the appropriate library JAR for the servlet API. This JAR is named
    servlet-api.jar and is located in the Tomcat common\lib directory. This simple
    filter won’t do anything useful for now. It will simply make a log entry before
    calling FilterChain.doFilter() and another one right after it.


    513-0 ch10.qxd 11/17/05 8:43 PM Page 422


    **422**


    C H A P T E R 1 0 ■ I N T R O D U C T I O N TO F I LT E R I N G


    **Listing 10-1.** *SimpleFilter.java*


    package com.apress.projsp.filters;


    import java.io.*;


    import javax.servlet.*;


    public final class SimpleFilter implements Filter {


    private FilterConfig filterConfig = null;


    public void doFilter(ServletRequest request, ServletResponse response, FilterChain
    chain) throws IOException, ServletException {


    filterConfig.getServletContext().log("in SimpleFilter"); chain.doFilter(request,
    response);


    filterConfig.getServletContext().log("Getting out of SimpleFilter");


    }


    public void init(FilterConfig filterConfig) {


    this.filterConfig = filterConfig;


    }


    public void destroy() {}


    }


    As mentioned before, all filters must implement the javax.servlet.Filter interface,
    and the SimpleFilter is no exception. The filter does its work in the doFilter()
    method. Note the parameters: a request, response, and a FilterChain object.


    However, before the container calls doFilter(), it will pass a FilterConfig object
    to the filter through the init() method. If the filter needs to access any resources
    from the FilterConfig object, the class must save a reference to that object.


    To write to the log, you access the ServletContext from FilterConfig as provided
    by the container. The log() method will write a line by using the logger set up
    earlier for this context.


    The rest of the methods are standard trivial implementations required for the
    Filter interface.


