    **306**


    C H A P T E R 7 ■ C L A S S I C TA G S


    ■**Note** Although you didn’t see this in the previous chapter, providing support
    for dynamic attributes in simple tag handlers is achieved in exactly the same
    way as in classic tags, and the concepts that you’ll see in the next example are
    all applicable to simple tags, too.


    **Further Customization with Dynamic Attributes**


    Taking the <select> tag as a basis, let’s modify it to support dynamic attributes.
    This way, you’ll be able to customize the generated HTML without resorting to
    explicitly supporting all of the attributes that the true HTML <select> tag can
    support.


    Building the <selectWithDynamicAttributes> Tag Handler Listing 7-8 shows the <selectWithDynamicAttributes>
    tag handler. As before, you’ll use TagSupport as a starting point, although the
    tag will also implement the DynamicAttributes interface.


    **Listing 7-8.** *SelectTagWithDynamicAttributes.java* package com.apress.projsp;


    import java.beans.PropertyDescriptor;


    import java.util.*;


    import javax.servlet.jsp.*;


    import javax.servlet.jsp.tagext.DynamicAttributes;


    import javax.servlet.jsp.tagext.TagSupport;


    public class SelectTagWithDynamicAttributes


    extends TagSupport implements DynamicAttributes {


    private String name;


    private String label;


    private String value;


    private Collection items;


    private Map dynamicAttributes = new HashMap();


    public void setName(String s) {


    this.name = s;


    }


    public void setLabel(String s) {


    this.label = s;


    }


    public void setValue(String s) {


    this.value = s;


    }


    513-0 ch07.qxd 11/9/05 4:49 PM Page 307


    C H A P T E R 7 ■ C L A S S I C TA G S


    **307**


    public void setItems(Collection coll) {


    this.items = coll;


    }


    public void setDynamicAttribute(String uri, String name, Object value) throws
    JspException {


    dynamicAttributes.put(name, value);


    }


    public int doStartTag() throws JspException {


    Iterator iterator = items.iterator();


    try {


    JspWriter out = pageContext.getOut();


    // write the starting tag of the select control


    out.print("<select name=\"");


    out.print(name);


    out.print("\"");


    // insert the dynamic attributes


    Iterator it = dynamicAttributes.keySet().iterator();


    while (it.hasNext()) {


    String key = (String)it.next();


    out.print(" ");


    out.print(key);


    out.print("=\"");


    out.print(dynamicAttributes.get(key));


    out.print("\" ");


    }


    out.print(">");


    while (iterator.hasNext()) {


    // get the next JavaBean from the collection


    Object o = iterator.next();


    // and use it to create a description of the property used


    // to represent the displayable label


    PropertyDescriptor labelPD =


    new PropertyDescriptor(label, o.getClass());


    // and the property used to represent the hidden value


    PropertyDescriptor valuePD =


    new PropertyDescriptor(value, o.getClass());


    // and now generate the HTML


    out.print("<option value=\"");


    // call the accessor method for the value property


    // (this is the same as calling get<PropertyName>() on


    // the JavaBean instance)


    513-0 ch07.qxd 11/9/05 4:49 PM Page 308


    **308**


    C H A P T E R 7 ■ C L A S S I C TA G S


    out.print(


    valuePD.getReadMethod().invoke(o, new Object[] {}).toString()); out.print("\">");


    // and do the same for the label property


    out.print(


    labelPD.getReadMethod().invoke(o, new Object[] {}).toString()); out.print("</option>");


    }


    // write the ending tag of the select control


    out.print("</select>");


    } catch (Exception e) {


    throw new JspTagException(e.getMessage());


    }


    // and skip the body


    return SKIP_BODY;


    }


    }


    The class has instance variables for the static attributes and setter methods
    for each variable. One of the limitations of using dynamic attributes is that
    you can’t specify which of them, if any, are required. By keeping the core attributes
    of your custom tags as statically defined, you have the best of both worlds: flexibility
    through dynamic attributes and the ability to ensure that people use your tag
    in the correct manner.


    The class needs some way to store and retrieve dynamic attributes so they can
    be used during the actual processing of the tag. For this reason, and because
    you don’t know the names of the dynamic attributes, the class uses a HashMap to
    store the dynamic attribute names and values. The class also has an implementation
    of the DynamicAttributes interface’s setDynamicAttribute() method. This implementation
    is fairly straightforward and involves inserting the dynamic attributes as key-value
    pairs into the map. Because we’re not worried about the names of attributes clashing,
    the method does not use the namespace URI that’s a part of the method signature.


    Finally, the class has an implementation of the doStartTag() method. The core
    functionality provided by this method hasn’t changed too much, although the HTML
    select control is being generated to include any dynamic attributes that have
    been specified.


