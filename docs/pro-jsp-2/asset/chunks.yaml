    JavaServer Faces


    **J**avaServer Faces (JSF), a relatively new technology in the Java EE world,
    is designed to further simplify web-application development. JSF makes it easy
    to build user-interface components and pages, and to connect those components
    to business objects. It also automates the process of JavaBean usage and page
    navigation.


    JSF is not the first technology to attempt to create a GUI framework for web applications.


    Other GUI frameworks include Apache’s Tapestry project (http://jakarta.apache.org/


    tapestry), Enhydra’s Barracuda project (http://www.barracudamvc.org/Barracuda),
    the Sun Java System Application Framework (http://developers.sun.com/sw/tech/appserver/


    framework/), and the Oracle Application Development Framework (ADF) User Interface
    in XML (UIX) (http://www.oracle.com/technology/products/jdev/collateral/papers/10g/


    ADFFAQ). One of the goals of JSF, as stated in the specification proposal, was
    to create a standard for Java server application GUIs and to identify synergies
    in existing frameworks that JSF could take advantage of. The expert group included
    some of the same organizations that had been working on other GUI frameworks.
    Version 1.0 of the specification was finalized in March 2004\. At the time of
    this writing, version 1.2 of the specification is in Proposed Final Draft stage.


    JSF builds on the experience gained from JSP, Servlet, and the various other web-application
    GUI frameworks. In particular, JSF builds on the Apache Struts project. This is
    not surprising considering that the creator of Struts is the lead specification
    engineer for JSF.


    (If you’re a Struts enthusiast, you might want to know that you can even use JSF
    with Struts.


    For more information on Struts, see Chapter 15 and http://struts.apache.org).


    You might be wondering why we are focusing on JSF in a book about JSP. Simply
    put, JSF


    complements JSP. In fact, the JSF specification requires that all JSF implementations
    support JSP and provide custom actions for JSP corresponding to JSF user-interface
    components.


    In this chapter, you will learn the following:


    • Why JSF was developed and how it helps you to create dynamic user interfaces


    • How to install JSF


    • How to use custom tags for JSF components in JSP pages


    • How to use managed JavaBeans with JSF components


    • How to control page navigation


    • How to convert data and validate input


    • How to handle value change events in your JSF application **183**


