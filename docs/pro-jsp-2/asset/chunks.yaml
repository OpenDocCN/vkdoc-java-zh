    **HTTP Servlets**


    As we have mentioned, the javax.servlet package provides generic interfaces and
    classes to service clients’ requests independent of the protocol used. This means
    that any behavior that is specific to a particular package has to be implemented
    within the application by the developer. For this reason, the javax.servlet package
    is extended to provide a mechanism to handle requests in a protocol-dependent
    manner. This allows protocol-specific functionality to automatically be provided
    to the developer.


    In this section, you’ll look at one such extension: the javax.servlet.http package.
    This package provides classes that can be used and extended to develop servlets
    that provide HTTP-specific functionality.


    The main class in the javax.servlet.http package is the HttpServlet abstract class.
    This class extends from the javax.servlet.GenericServlet class. This means that
    all functionality provided by this class is available to HTTP servlets. The first
    point to note about the HttpServlet class is that it has several new methods that
    provide protocol-specific functionality. Instead of the single service() method
    as in the GenericServlet class, you now have methods such as doGet() and doPost()
    that allow your servlet to perform a different task depending upon the manner
    in which it’s being called. However, this rarely happens in practice.


    The request-handling methods that are provided are as follows: protected void
    doGet(HttpServletRequest req, HttpServletResponse resp) throws ServletException,
    IOException


    The doGet() method is intended to retrieve an entity from the server as referenced
    by a request URL.


    protected void doHead(HttpServletRequest req, HttpServletResponse resp) throws
    ServletException, IOException


    The doHead() method is simply a GET request that is intended to return only the
    HTTP


    header information.


    protected void doPost(HttpServletRequest req, HttpServletResponse resp) throws
    ServletException, IOException


    513-0 ch02.qxd 10/3/05 4:22 PM Page 60


    **60**


    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    The doPost() method is intended to allow posting of information (forms and so
    on) to the server.


    protected void doPut(HttpServletRequest req, HttpServletResponse resp) throws
    ServletException, IOException


    The doPut() method is used to upload a file to a server in a manner similar to
    the FTP.


    protected void doOptions(HttpServletRequest req, HttpServletResponse res) throws
    ServletException, IOException


    protected void doTrace(HttpServletRequest req, HttpServletResponse resp) throws
    ServletException, IOException


    The doOptions() and doTrace() methods allow you to override the behavior of HTTP.


    There is almost no reason to override either of these methods unless the servlet
    implements functionality beyond the HTTP 1.1 specification.


    To handle a request of a given type, you simply override the appropriate method.


    **HTTP Responses and Requests**


    As well as providing the HttpServlet class, the javax.servlet.http package also
    provides HTTP-specific versions of the ServletRequest and ServletResponse objects.
    These are named HttpServletRequest and HttpServletResponse, respectively.


    HttpServletRequest


    You can use the HttpServletRequest interface to access the HTTP-specific information
    of the request to your HttpServlet (such as the HTTP request parameters). Since
    the HttpServletRequest interface extends the ServletRequest interface, you can
    perform all the functions of ServletRequest as well, such as retrieving request
    parameters. Some of the useful operations that you can perform on your request
    are covered in the following sections.


    **Retrieving HTTP Request Header Information**


    HTTP headers store a wide range of information about the user and the request,
    and they are transmitted between a user (usually a browser) and a web server during
    each request. HTTP


    header information is separate from the body of a request and provides some useful
    information that can be used by a web component (servlet or JSP page) when constructing
    a response.


    A few of the more common headers are shown in Table 2-1 to give you an idea of
    the information passed between the browser and web server.


    **Table 2-1.** *HTTP Header Names and Their Usage* **Header**


    **Usage**


    Date


    The date and time the request was served


    Accept


    The media types accepted by the client


    Accept-Encoding


    The types of data encoding that the browser knows how to decode Connection


    Whether the client can handle persistent HTTP connections Content-Length


    The length of the body in bytes, or –1 if the length is unknown


