    Interaction with the Filter Life Cycle


    When working with filter initial parameters, it’s important to bear in mind that
    these parameters are set only once per filter instance: when the filter instance
    is first instantiated and before the arrival of the first filtered request. Subsequently,
    all new requests will be processed through the same filter instance—potentially
    concurrently via multithreading. In containers that use multiple Java VMs, there
    will be one instance of a declared filter per container Java VM. You can use filterConfig.getInitParameter()
    to obtain the initial parameters’ values from inside the doFilter() method when
    you need them. The handling of these initial parameters is very similar to servlets’
    parameter handling. If a filter instance is removed from service by the container
    (say, due to server system load), the container is responsible for ensuring that
    a new instance is created and initialized to process any future requests. Such
    removals and reinstantiations should be completely transparent to the filter creator.


    This concludes the initial conceptual coverage of filters. It’s time to get your
    hands on some code and implement your very own filter.


