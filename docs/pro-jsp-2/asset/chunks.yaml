    so, by default, application scope will be used.


    ## OSCache Servlet Filter


    You can also use OSCache to cache the output of servlets, using the OSCache servlet
    filter class, `com.opensymphony.module.oscache.web.filter.CacheFilter`. All you
    have to do is add this filter to the application’s `web.xml` file and add filter
    mappings for all the URL patterns that you wish to have cached.


    For example, the code download for this chapter includes a servlet that takes
    10 seconds to run. This `LongOpServlet` produces almost the same output as the
    `longop.jsp` page that we discussed in the previous section. To cache the output
    of the `LongOpServlet` in the same way as you cached the JSP page, you need to
    add the OSCache `CacheFilter` to your web application. Listing 13-2 shows an example
    deployment descriptor with an entry for the OSCache `CacheFilter`.


    **Listing 13-2.** *web.xml*


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <web-app


    xsi:schemaLocation="http://java.sun.com/xml/ns/javaee/web-app_2_5.xsd"


    version="2.5">


    <context-param>


    <param-name>debug</param-name>


    <param-value>true</param-value>


    </context-param>


    <filter>


    <filter-name>CacheFilter</filter-name>


    <filter-class>


    com.opensymphony.module.oscache.web.filter.CacheFilter


    </filter-class>


    <init-param>


    <param-name>time</param-name>


    <param-value>60</param-value>


    </init-param>


    </filter>


    <filter-mapping>


    <filter-name>CacheFilter</filter-name>


    <url-pattern>/servlets/*</url-pattern>


    </filter-mapping>


    <servlet>


    <servlet-name>LongOpServlet</servlet-name>


    <servlet-class>


    com.apress.projsp.servlets.LongOpServlet


    </servlet-class>


    </servlet>


    <servlet-mapping>


    <servlet-name>LongOpServlet</servlet-name>


    <url-pattern>/servlets/longop</url-pattern>


    </servlet-mapping>


    </web-app>

    ```


    The `<filter>` element configures the `CacheFilter` itself. It specifies the class
    name for the filter and sets one parameter: the cache time. As with the `longop.jsp`
    example in the previous section, the cache time is set to 60 seconds. Other parameters,
    such as the cache key and cache scope, have been omitted, so default values will
    be used. The `<filter-mapping>` element configures the `CacheFilter` so that it
    will cache the response output for all request URLs that match the pattern `/servlets/*`.
    This works well for the `LongOpServlet`, because it’s mapped to the URL `/servlets/longop`.


    For more information on servlet filters, refer to Chapters 10 and 11. For more
    information on OSCache, visit the following URLs:


    - **OpenSymphony website:** `http://www.opensymphony.com`

    - **OSCache website:** `http://www.opensymphony.com/oscache`

    - **OSCache WIKI:** `http://www.opensymphony.com:8668/space/OSCache`


    ## Database Connection Pooling


    Page caching can help reduce the frequency of database access in a JSP application,
    but it can’t eliminate database access entirely. Eventually, the application will
    have to open a database connection to query, create, update, and delete records
    in the database. Unfortunately, opening a database connection is an expensive
    operation that consumes processing time, memory, and network resources.


    One of the most effective ways to boost JSP application performance is to use
    a technique called **database connection pooling**. By using this technique, you
    keep a pool of database connections open at all times. When you need a connection,
    you take it from the pool, and when you’re done with it, you return it to the
    pool.


    Database connection pooling is a very well-known technique that’s available in
    almost every Java EE application server. It’s also built into many JDBC drivers
    and some persistence frameworks. For example, the Hibernate persistence framework
    discussed in Chapter 9 includes an easy-to-use database connection pool.


    There are a lot of database connection pool alternatives, and we won’t discuss
    them all here. Instead, we’ll discuss the common database connection pool configuration
    parameters and then present an example. Most database connection pools allow you
    to set the following configuration parameters:


    - **Maximum active connections:** This is the maximum number of connections that
    are allowed to be open in the pool. If a request is made for a connection while
    all connections in the pool are in use, then the call to the `getConnection()`
    method will block until a connection is released by another thread or until a
    configurable maximum wait time is reached.

    - **Maximum idle connections:** This is the maximum number of connections that
    are allowed to be open but not in use in the pool. If you set this parameter to
    zero, no maximum limit will be set.

    - **Maximum wait time:** This is the maximum length of time that a call to `getConnection()`
    will block while waiting for a connection to be released. If the wait exceeds
    this time, the `getConnection()` call will throw an exception, or you can use
    some other technique to indicate that a connection isn’t available.

    - **Abandoned connection timeout:** In some cases, an application may fail to
    properly release a database connection. This is called abandoning a connection
    and is a serious problem because until a connection is released, it isn’t returned
    to the pool for reuse. Some database connection pools monitor unreleased connections,
    and if one has been idle for longer than the abandoned connection timeout, it’s
    considered to be abandoned and is automatically released and returned to the pool.


    ## Jakarta Commons Database Connection Pool


    It isn’t possible for us to cover all the options for database connection pooling,
    so instead we’ll give you a close look at Jakarta Commons Database Connection
    Pool (DBCP). DBCP is the database connection pooling technology built into the
    popular open-source Tomcat servlet engine. Because it’s included with Tomcat,
    you don’t need to download or install any files or libraries.


    Normally, to deploy an application to the Tomcat servlet engine, you just copy
    the application’s WAR file, or deployment directory, to the Tomcat `webapps` directory.
    However, to configure DBCP for your application, you need to do a bit more work:
    you need to add the application to the Tomcat server configuration file `conf/server.xml`.


    To do this, you need to add a new `<Context>` entry to the Tomcat `server.xml`
    file. Open the `server.xml` file with your favorite editor and look for the Tomcat
    Root Context. You need to add the `<Context>` entry in the correct part of the
    `server.xml` file. For example, you can add it after the ROOT context and before
    the examples context, as in the snippet shown here:


    ```xml

    <!-- Tomcat Root Context -->


    <!--


    <Context path="" docBase="ROOT" debug="0"/>


    -->


    <Context path="/myapp" docBase="roller" debug="0">


    <Resource name="jdbc/mydb" auth="Container" type="javax.sql.DataSource" />


    <ResourceParams name="jdbc/mydb">


    <parameter>


    <name>factory</name>

    ```'
