- fmt: "Let’s take a look at programmatic encryption. The good news is that you’ve\
    \ already created a `LoginServlet`, so you can use it to encrypt passwords. Because\
    \ it’s off by default, you’ll need to add `encrypt.password=true` to the `build.properties`\
    \ file, pass it in from the command line with `ant –Dencrypt.password=true`, or\
    \ edit the default setting in `app-settings.xml`. If you’re using the binary version\
    \ (`.war` file) of this application, simply edit the following `<init-param>`\
    \ of the `LoginServlet` (in the `web.xml` file):\n\n```\n<init-param>\n    <param-name>encrypt-password</param-name>\n\
    \    <param-value>true</param-value>\n</init-param>\n```\n\nNext, you need to\
    \ actually encrypt the password within your servlet. To do this, create an `encodePassword(String\
    \ password, String algorithm)` method in a `StringUtil.java` class. This method\
    \ uses the `MessageDigest` class from JSSE to encrypt a string:\n\n```\nimport\
    \ java.security.MessageDigest;\n\npublic static String encodePassword(String password,\
    \ String algorithm) {\n    byte[] unencodedPassword = password.getBytes();\n \
    \   MessageDigest md = null;\n    try {\n        // first create an instance,\
    \ given the provider\n        md = MessageDigest.getInstance(algorithm);\n   \
    \ } catch (Exception e) {\n        log.error(\"Exception: \" + e);\n        return\
    \ password;\n    }\n    md.reset();\n    // call the update method one or more\
    \ times\n    // (useful when you don't know the size of your data, e.g. stream)\n\
    \    md.update(unencodedPassword);\n    // now calculate the hash\n    byte[]\
    \ encodedPassword = md.digest();\n    StringBuffer buf = new StringBuffer();\n\
    \    for (int i = 0; i < encodedPassword.length; i++) {\n        if (((int) encodedPassword[i]\
    \ & 0xff) < 0x10) {\n            buf.append(\"0\");\n        }\n        buf.append(Long.toString((int)\
    \ encodedPassword[i] & 0xff, 16));\n    }\n    return buf.toString();\n}\n```\n\
    \nThis method encrypts a string based on the algorithm you pass in. This algorithm\
    \ is defined in `LoginServlet` and configurable when building via the `${encrypt-algorithm}`\
    \ variable. The default setting is SHA.\n\n> **Note:** More information on these\
    \ algorithms and how they work is available at [http://theory.lcs.mit.edu/~rivest/crypto-security.html#Algorithms](http://theory.lcs.mit.edu/~rivest/crypto-security.html#Algorithms).\n\
    \nIf you’re using password encryption and also have a retrieve password feature,\
    \ you’ll probably want to add a `password_hint` column in your user store. It’s\
    \ hard enough to remember all the passwords you keep, and it’s annoying when you\
    \ have to create a new password, so the “send me a hint” tactic is useful.\n\n\
    ## Servlet 2.5 Security Changes\n\nThe Servlet 2.5 specification has a whole chapter\
    \ on security, but not much has changed. The JSP 2.1 specification doesn’t contain\
    \ any security-related information. It simply points out helpful information for\
    \ programming security via the `HttpServletRequest` interface, giving you the\
    \ following methods:\n\n- `getRemoteUser()`\n- `isUserInRole(String roleName)`\n\
    - `getUserPrincipal()`\n\nThe `getRemoteUser()` method returns the authenticated\
    \ user’s login name or `null` if no authenticated user exists. The `isUserInRole()`\
    \ method is helpful in determining a role’s authorization to certain resources.\n\
    \nOne important thing to remember about roles, if you’re coding them into your\
    \ servlets, is to create links by using the `<security-role-ref>` element in `web.xml`.\
    \ Here’s an example:\n\n```\n<security-role-ref>\n    <role-name>admin</role-name>\n\
    \    <role-link>accounting</role-name>\n</security-role-ref>\n```\n\nThis way,\
    \ you can code your servlets without worrying whether the `admin` role changes\
    \ from the accounting group to the IT department. All you have to do is configure/code\
    \ with `admin` and know that your code will be safe from change. Of course, we\
    \ recommend placing this value in a `Constants.java` file so you can change it\
    \ easily if the need does ever arise.\n\nThe `HttpSession` interface has the `session.invalidate()`\
    \ method for logging out users. It has worked fine for us. When you call `session.invalidate()`,\
    \ it invalidates the session and then unbinds any objects bound to it."
