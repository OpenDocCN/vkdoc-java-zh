    \ At the same time, there are good uses for it, as in the message form.\n\n##\
    \ Using Indexed Properties with Forms in Struts\n\nIndexed properties are a feature\
    \ of Struts that has been available since the beginning. If you’ve used it, you\
    \ probably really like it, because it allows you to get and set lists of objects\
    \ (such as an `ArrayList` of child forms on a parent form). In the struts-resume\
    \ application, this might be something like getting/setting an `ArrayList` of\
    \ `SkillForms` on a `ResumeForm`. Basically, the syntax involves tags like `<logic:iterate>`\
    \ and `<c:forEach>` and setting an index on the form element’s name:\n\n```\n\
    <logic:iterate id=\"skill\" name=\"userSkills\" indexId=\"index\">\n```\n\nThen\
    \ you need to add get and set accessors to your form to allow these values to\
    \ be retrieved and altered based on an index. Here is an example of how you might\
    \ implement this in struts-resume on a `SkillGroup` form, where a user is assigning\
    \ multiple `SkillForms`:\n\n```\n/**\n * The skill attribute.\n */\nprivate ArrayList\
    \ skill;\n\n/**\n * Getter for skill. For the sake of the iterator\n * tags and\
    \ the indexing of objects.\n */\npublic SkillForm getSkill(int index) {\n    return\
    \ (SkillForm) skill.get(index);\n}\n\n/**\n * Setter for the above getter.\n */\n\
    public void setSkill(int index, SkillForm skill) {\n    this.skill.set(index,\
    \ skill);\n}\n\n/**\n * Getter for ArrayList of skills\n */\npublic ArrayList\
    \ getSkills() {\n    return skill;\n}\n\n/**\n * Setter for ArrayList of skills\n\
    \ */\npublic void setSkills(ArrayList skills) {\n    this.skill = skills;\n}\n\
    ```\n\nWe haven’t implemented indexed properties as yet, although we plan to,\
    \ and may already have done so by the time you’re reading this.\n\n## Form Validation\n\
    \nOur favored method of performing form validation is to use Struts Validator.\
    \ Validator was originally authored by David Winterfeldt to overcome the tediousness\
    \ of writing validation logic in `ActionForms`. It can perform basic validations\
    \ to check whether a field is required, or matches a regular expression, e-mail,\
    \ or credit card, as well as server-side type checking and date validation. You\
    \ can use the Validator in any JSP and servlet application, but it was originally\
    \ designed for Struts and is therefore easiest to use within Struts. Since Struts\
    \ 1.1, the Validation framework has been integrated into the core Struts library\
    \ (`struts.jar`).\n\nFor detailed online information about Validator, go to http://struts.apache.org/userGuide/building_view.html#validator.\n\
    \n### Using Validator\n\nThe Validator framework relies on a `validator-rules.xml`\
    \ file, which defines all of the pluggable Validator definitions. These definitions\
    \ are basically Java classes for server-side validation and JavaScript functions\
    \ for client-side validation. Let’s look at the “required” pluggable Validator\
    \ as an example:\n\n```\n<validator name=\"required\"\n          classname=\"\
    org.apache.struts.validator.FieldChecks\"\n          method=\"validateRequired\"\
    \n          methodParams=\"java.lang.Object,\n                        org.apache.commons.validator.ValidatorAction,\n\
    \                        org.apache.commons.validator.Field,\n               \
    \         org.apache.struts.action.ActionErrors,\n                        javax.servlet.http.HttpServletRequest\"\
    \n          msg=\"errors.required\">\n    ... insert JavaScript function here\
    \ ...\n    ]]>\n</javascript>\n</validator>\n```\n\nWe’ve left out the JavaScript\
    \ function because it’s 40 lines long and you’re here to learn JSP, not JavaScript,\
    \ right? In the previous definition, the `FieldChecks` is a class within the Validator\
    \ framework, and it has a method named `validateRequired()` that takes the parameters\
    \ listed.\n\nThe `<javascript>` element defines the JavaScript function to do\
    \ client-side validation. Having the definitions in this file makes the Validator\
    \ framework easily configurable.\n\nTo enable the Validator in a Struts application,\
    \ you first need to add the following XML into the `struts-config.xml` file. According\
    \ to the Struts DTD, `<plug-in>` elements should appear toward the end of this\
    \ file. If you’re using XDoclet, you can put this XML into a file in your merge\
    \ directory:\n\n```\n<plug-in className=\"org.apache.struts.validator.ValidatorPlugIn\"\
    >\n    <set-property property=\"pathnames\"\n                  value=\"/WEB-INF/validator-rules.xml,/WEB-INF/validation.xml\"\
    />\n</plug-in>\n```\n\nYou can see from this example that there are two files\
    \ that the Validator is loading. These can be renamed to whatever you like; you\
    \ just have to make sure your `<plug-in>` configuration is set correctly. Since\
    \ these file names are the de facto standards for the Validator, we’ll use these\
    \ in our examples. The Validator also allows for extensions such as the following\
    \ for validating that two fields match:\n\n```\npublic static boolean validateTwoFields(Object\
    \ bean, ValidatorAction va, Field field,\n                                   \
    \     ActionErrors errors, HttpServletRequest request,\n                     \
    \                   ServletContext application) {\n    String value = ValidatorUtil.getValueAsString(bean,\
    \ field.getProperty());\n    String sProperty2 = field.getVarValue(\"secondProperty\"\
    );\n    String value2 = ValidatorUtil.getValueAsString(bean, sProperty2);\n  \
    \  if (!GenericValidator.isBlankOrNull(value)) {\n        try {\n            if\
    \ (!value.equals(value2)) {\n                errors.add(field.getKey(), ValidatorUtil.getActionError(\n\
    \                    application, request, va, field));\n                return\
    \ false;\n            }\n        } catch (Exception e) {\n            errors.add(field.getKey(),\
    \ ValidatorUtil.getActionError(\n                application, request, va, field));\n\
    \            return false;\n        }\n    }\n    return true;\n}\n```\n\nYou\
    \ can then add this class to the `validator-rules.xml` file by adding the following\
    \ element:\n\n```\n<validator name=\"twofields\"\n          classname=\"com.mysite.StrutsValidator\"\
    \n          method=\"validateTwoFields\"\n          msg=\"errors.twofields\"/>\n\
    ```\n\nThen, in `validation.xml`, you can configure a field to use this validation\
    \ rule:\n\n```\n<field property=\"password\"\n       depends=\"required,twofields\"\
    >\n    <arg0 key=\"typeForm.password.displayname\"/>\n    <var>\n        <var-name>secondProperty</var-name>\n\
    \        <var-value>password2</var-value>\n    </var>\n</field>\n```\n\nYou could\
    \ also easily add a JavaScript function to `validator-rules.xml` for client-side\
    \ validation. This merely requires adding a `<javascript>` element inside the\
    \ `<validator>` element.\n\nWithout the Validator, the easiest way to program\
    \ validation logic into your application is to override the `validate()` method\
    \ in your `ActionForm`. Its signature is as follows:\n\n```\npublic ActionErrors\
    \ validate(ActionMapping mapping, HttpServletRequest request);\n```\n\nThis `ActionForm`\
    \ method returns `null`, like the `ActionForm` `reset()` method, and similarly,\
    \ overriding it isn’t required if you don’t want to.\n\n```\npublic void reset(ActionMapping\
    \ mapping, HttpServletRequest request);\n```\n\nThe `reset()` method is designed\
    \ to reset all your properties back to their default state. It is called before\
    \ the bean is repopulated by the controller servlet and can be very helpful when\
    \ using check boxes on your view forms. This is because neither the value nor\
    \ the name of a check box is passed in the request when it’s unchecked. This is\
    \ the main reason the `reset()` method exists—to set the default state of check\
    \ boxes so they behave like other form elements and are always passed along in\
    \ the request as a name-value pair."
