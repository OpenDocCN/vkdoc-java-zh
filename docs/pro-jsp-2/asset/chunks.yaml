    简单的示例，并未涵盖诸如空值之类的特殊情况。然而，它确实展示了使用 JUnit 编写单元测试是多么容易，并显示了其潜力。


    开始使用 JUnit 有时可能会有些棘手，尤其是在最初找到编写测试的动力方面。然而，一旦他们克服了学习曲线并体验到 JUnit 的好处，大多数人就会上瘾，或者用
    JUnit 团队创造的一个术语来说，就是“测试感染”。


    第一次看到 JUnit 可能会让人有些畏惧，尤其是当你开始思考需要为你正在构建的每个类编写多少额外的 Java 代码时。


    然而，根据我们使用 JUnit 的经验，我们发现使用 JUnit 一段时间后，你会开始欣赏自动化单元测试的强大功能，以及它在重构或重新设计系统部分时带给你的信心。当你进行重大的设计更改而测试仍然通过时，所获得的信心感是惊人的！


    使用 JUnit 时，你可以测试的类类型包括代表业务领域、业务逻辑、MVC 风格的动作类、辅助类等。本质上，任何独立的类都可以使用 JUnit 进行测试。在许多
    Web 应用程序中，这组类将涵盖正在开发的大部分代码，并有望带来对代码正确运行的良好信心。然而，有时你可能有一些独立的类仍然需要在 Java EE 容器环境中运行并进行测试。对于这些情况，JUnitEE
    就很有用。


    JUnitEE


    JUnitEE（http://www.junitee.org）提供了一种在 Java EE 容器内运行常规 JUnit 测试的方法。为什么要这样做呢？嗯，也许你有一些类需要使用通过容器的
    JNDI 树设置并提供给这些类的数据库连接。或者这些类需要访问其他企业资源才能正常运行。使用 JUnitEE，你可以将所有类及其测试打包成一个 WAR 文件，然后将其部署到诸如
    Tomcat 之类的 Java EE Web 容器上。要执行这些测试，你只需将 Web 浏览器指向新部署的 Web 应用程序，一个 servlet 会在后台运行以执行
    JUnit 测试，并将结果呈现给你。


    JUnitEE 实际上是一个轻量级的测试运行器，允许你在服务器环境中执行测试。然而，它并不能比 JUnit 更容易地测试诸如 servlet 和 JSP 之类的组件。为此，你需要考虑其他选项，例如
    Cactus。


    Cactus


    Cactus（http://jakarta.apache.org/cactus/）是 JUnit 的一个扩展，提供了一种在运行的 Java EE 容器内运行单元测试的机制。虽然使用
    JUnitEE 时你可以在服务器环境中运行常规的 JUnit 测试，但你仍然没有完整的必要基础设施来测试那些依赖于逐个请求传递信息的类。例如，要真正测试一个
    servlet，你需要有一个实时的请求和响应对象可用，因为 servlet 内部的代码可能会从请求中提取参数或将信息推送到响应中。Cactus 使你能够测试这些类型的组件，并确信它们在其真实环境中运行。


    在 Cactus 中，测试功能分为两部分。首先是客户端部分。这看起来就像一个普通的 JUnit 测试，用于启动测试。Cactus 的第二部分位于


