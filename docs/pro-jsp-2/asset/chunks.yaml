    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    **61**


    **Header**


    **Usage**


    Cookie


    The cookies returned by the client browser to the server Host


    The host and port of the original URL


    Referrer


    The URL of any referring web page


    User-Agent


    The client or browser making the request


    The HttpServletRequest interface defines several methods that provide access to
    the available headers:


    public String getHeader(String name)


    public java.util.Enumeration getHeaders(String name)


    public java.util.Enumeration getHeaderNames()


    public String getMethod()


    The available methods for accessing HTTP headers take a similar form to those
    methods used for accessing HTML form parameters. The getHeader() method is used
    to access a given header’s value. The getHeaders() method returns an enumeration
    of string objects that represent all the values of a given request header; this
    method can be used for headers that may have multiple values, such as the Accept-Language
    header. The name parameter passed to the getHeader() or getHeaders() methods isn’t
    case sensitive.


    When you are unsure of the available headers, the getHeaderNames() method may
    be used to obtain an enumeration of available header names. Finally, the getMethod()
    method can be used to retrieve the HTTP method used, such as GET, POST, or PUT.


    HttpServletRequest also provides a couple of utility methods that can be used
    to convert the return type of specific header values.


    public long getDateHeader(String header)


    The getDateHeader() method will return a given header as a long value that represents
    a Date object. This method could be used with the If-Modified-Since or Date headers.


    public int getIntHeader(String header)


    The getIntHeader() method returns a given header as an integer value.


    Both of these methods will return –1 if the given header isn’t available. The
    reason to use these over the alternative getHeader() method is that you won’t
    have to perform any casting on the value returned. This produces neater and more
    reliable code.


