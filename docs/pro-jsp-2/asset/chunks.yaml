    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **283**


    <img src=".${filename}" alt="${filename}" width="128" height="96">


    </td>


    </ch06:list>


    By splitting the content (what is being displayed) from the presentation (how
    it’s being displayed), you’re introducing a separation between the list of files
    and its presentation in HTML. In addition to enabling this tag to be reused more
    often, this separation promotes easy maintenance and modification of the presentation.
    In other words, should you need to modify the way that the list of files is presented,
    you can do this by editing the JSP page rather than the tag handler code.


