    **485**


    **Figure 12-8.** *When you successfully log in to the security application, you
    should see* *this JSP page.*


    You can also use JDBC to protect all the applications of a Tomcat server. To do
    this, you take the <Realm> element from Listing 12-2 and put it into Tomcat’s
    conf\server.xml file in place of the existing <Realm> element. Note that if you
    do this, you need to ensure the database contains the admin and manager users
    and roles to keep using the existing Tomcat applications.


    If you’d rather authenticate with an LDAP server, you can configure a JNDIRealm
    in Tomcat. On most large projects we’ve worked on, an LDAP server was involved
    in storing user information.


    **JNDIRealm**


    Configuring a JNDIRealm is similar to configuring a JDBCRealm; however, the realms’
    attributes are slightly different. For this example, we installed OpenLDAP version
    2.2.19 on a Microsoft Windows XP Pro machine.


    We installed the OpenLDAP server according to the quick start guide at http://


    www.openldap.org/doc/admin/quickstart.html. Then we edited the slapd.conf file.
    At the top of the file, we had to include two additional schema entries. By default,
    only core.schema was included; we added cosine.schema and inetorgperson.schema:
    include C:/openldap/etc/schema/core.schema


    include C:/openldap/etc/schema/cosine.schema


    include C:/openldap/etc/schema/inetorgperson.schema Obviously, you may need to
    adjust the paths based on your system. Regardless of whether you are trying this
    example on a Windows system or a Unix-based system, the include directives in
    the slapd.conf file must be the correct paths to the files being included.


    In the same file, at the bottom, we changed the settings as follows: database
    bdb


    suffix "dc=raibledesigns,dc=com"


    rootdn "cn=Manager,dc=raibledesigns,dc=com"


    rootpw secret


    directory C:/openldap/var/openldap-data


