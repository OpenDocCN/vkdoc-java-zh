    **Iteration Tags**


    Now that you’re familiar with the Tag life cycle, you’re in a good position to
    compare its functionality to that offered by the newer SimpleTag interface. For
    instance, both allow you to wrap up reusable functionality, generate content,
    and customize the tag through the use of static and dynamic attributes. Also,
    you can write a classic custom tag that evaluates or ignores its body content,
    achieving the same result as simple tags invoking or not invoking their body content
    via the supplied JspFragment reference that represents the tag’s body content.


    One difference between a classic tag and a simple tag is that a simple tag can
    invoke its body content multiple times by repeatedly calling the invoke() method
    of the JspFragment.


    With the Tag interface, this isn’t possible; the return value from the doStartTag()
    method determines whether the body content should be evaluated once or not evaluated
    at all. In terms of evaluating body content more than once, to implement similar
    functionality to that provided by the simple tag, you must use another classic
    tag interface called IterationTag.


    **The IterationTag Interface**


    The IterationTag interface (see Listing 7-10) was introduced as a part of the
    JSP 1.2 specification in an attempt to simplify the procedure for evaluating and
    reevaluating body content multiple times. This was previously possible with the
    JSP 1.1 BodyTag interface (we cover this interface later in the chapter), although
    the implementation details were complex.


    **Listing 7-10.** *IterationTag.java*


    package javax.servlet.jsp.tagext;


    import javax.servlet.jsp.JspException;


    public interface IterationTag extends Tag {


    public final static int EVAL_BODY_AGAIN = 2;


    int doAfterBody() throws JspException;


    }


    The interface itself is fairly small, and this is because it extends the Tag interface.
    Effectively, a single method has been added to the tag life cycle called doAfterBody(),
    and it’s this method that provides you with the ability to ask that a tag’s body
    content is evaluated more than once. Let’s see how this affects the tag life cycle.


    **The Iteration Tag Life Cycle**


    Figure 7-6 illustrates the iteration tag life cycle and shows where the new doAfterBody()
    method fits in with the life cycle of a custom tag.


    513-0 ch07.qxd 11/9/05 4:49 PM Page 312


    **312**


    C H A P T E R 7 ■ C L A S S I C TA G S


    Initialize context and attributes


    doStartTag()


    [EVAL_BODY_INCLUDE]


    Evaluate body


    doAfterBody()


    [SKIP_BODY]


    [EVAL_BODY_AGAIN]


    [SKIP_BODY]


    doEndTag()


    [EVAL_PAGE]


    Evaluate rest of page


    [SKIP_PAGE]


    **Figure 7-6.** *To support iteration, the doAfterBody() method is called after
    doStartTag(). The return* *value of doAfterBody() indicates whether the tag body
    is evaluated again or processing continues to the doEndTag() method.*


    Setting the Context


    As before, the first thing that happens is that the contextual information (the
    PageContext and parent Tag) is passed to the tag handler instance.


    The Start Tag


    After the context has been set, the doStartTag() method is called and one of two
    things can happen. First, the doStartTag() method can return SKIP_BODY, meaning
    that the body content


    513-0 ch07.qxd 11/9/05 4:49 PM Page 313


    C H A P T E R 7 ■ C L A S S I C TA G S


    **313**


    is ignored and processing proceeds to the doEndTag() method as before. Alternatively,
    a value of EVAL_BODY_INCLUDE can be returned from the doStartTag() method, signaling
    to the JSP


    container that the body content should be evaluated and included in the page.
    Again, this is the same as with the Tag interface, although it’s after the body
    content has been evaluated that things start to change.


    After the Body


    After the body content has been evaluated, the new doAfterBody() method is called,
    the primary purpose of which is to determine whether the body content should be
    reevaluated. If this is the case, the method should return the EVAL_BODY_AGAIN
    constant defined within the IterationTag interface. On the other hand, and when
    no more evaluations of the body content should happen, the SKIP_BODY value should
    be returned.


    The End Tag


    Finally, regardless of whether or not the body was evaluated and reevaluated multiple
    times, the doEndTag() method is called in the same way as the other tags that
    you’ve seen in this chapter. Again, possible return values are EVAL_PAGE and SKIP_PAGE.


    **The TagSupport Class Revisited**


    You’ve already seen how the TagSupport class provides a convenient starting place
    for you to build classic tags, and we said that it provides a default implementation
    of the Tag interface.


    This is only half of the truth, as the TagSupport class actually provides a default
    implementation of the IterationTag interface, meaning that it can be used as a
    starting point for building iteration tags too. The default implementations of
    the doStartTag() and doEndTag() methods return SKIP_BODY and EVAL_PAGE, respectively
    (as you’ve seen before), and default implementation of the doAfterBody() method
    returns SKIP_BODY. Let’s look at an example.


    **Evaluating Body Content Multiple Times**


    As you learned in Chapter 4, the JSTL provides a standard <forEach> tag that enables
    you to perform iteration over a set of items by using simple JSP code. Although
    the JSTL is a standard, at times you still might want to build your own tag that
    performs iteration. For example, perhaps you have a graph of objects that can’t
    easily be iterated over without some preprocessing, or perhaps you’re unable to
    use JSTL for reasons beyond your control. Either way, let’s see how you can build
    a tag that evaluates its body content more than once, in the same way as the JSTL
    <forEach> tag and the <list> tag that you saw in the previous chapter.


    Building the Iteration Tag Handler


    Listing 7-11 shows the IteratorTag class, which extends the TagSupport class.


    **Listing 7-11.** *IteratorTag.java*


    package com.apress.projsp;


    import java.util.Collection;


    import java.util.Iterator;


    513-0 ch07.qxd 11/9/05 4:49 PM Page 314


    **314**


    C H A P T E R 7 ■ C L A S S I C TA G S


    import javax.servlet.jsp.JspException;


    import javax.servlet.jsp.tagext.TagSupport;


    public class IteratorTag extends TagSupport {


    private String var;


    private Collection items;


    private Iterator iterator;


    public void setVar(String s) {


    this.var = s;


    }


    public void setItems(Collection coll) {


    this.items = coll;


    }


    public int doStartTag() throws JspException {


    // set up the iterator to be used


    iterator = items.iterator();


    if (iterator.hasNext()) {


    // if there are elements, put the first one into page


    // scope under the name provided by the "var" attribute pageContext.setAttribute(var,
    iterator.next());


    // and include the body


    return EVAL_BODY_INCLUDE;


    } else {


    // there are no elements so skip the body


    return SKIP_BODY;


    }


    }


    public int doAfterBody() throws JspException {


    if (iterator.hasNext()) {


    // if there are more elements, put the next one into page


    // scope under the name provided by the "var" attribute pageContext.setAttribute(var,
    iterator.next());


    // and instruct the JSP engine to reevaluate the body of this tag return EVAL_BODY_AGAIN;


    } else {


    // there are no more elements so skip the body


    return SKIP_BODY;


    }


    }


    }


    The class has instance variables and setter methods to support any attributes
    that the tag will take. In this case, the class has two—one for the name of the
    attribute that will represent each item in the iteration (var) and one for the
    collection to be specified (items).


    513-0 ch07.qxd 11/9/05 4:49 PM Page 315


    C H A P T E R 7 ■ C L A S S I C TA G S


    **315**


    Next, the class has a java.util.Iterator instance. Because it will be iterating
    over the collection, it needs some way to keep track of where it is in that collection.
    When you looked at the simple <list> tag example in the previous chapter, the
    iteration over the entire collection of items was performed within the doTag()
    method. However, here you must perform the iteration over several methods; hence
    you use an instance variable to maintain your position.


    Now you get to the functionality provided by the tag in the doStartTag() method.
    The first thing to do is check whether there are items to be iterated over and,
    if so, get a reference to the first one in the collection. With this reference
    obtained, the method sets a page-scoped attribute under the name specified by
    var to point to this first item. It then asks the JSP container to evaluate the
    body content of the tag. An EL statement inside the tag body can be used to access
    the page-scoped attribute.


    Alternatively, if there are no items, the doStartTag() method simply ignores any
    body content and proceeds straight to the doEndTag()method, a default version
    of which is implemented by the TagSupport class.


    As you may recall from the iteration tag life cycle, after the body content has
    been evaluated, the doAfterBody() method is called on the tag handler. The purpose
    of the doStartTag() method is to find the first item in the collection, put it
    into the page scope, and evaluate the body content. If there are more items in
    the collection, the method repeats the action again.


    Here, doAfterBody() checks for more items, and if it finds them, it gets the next
    one, puts it into page scope, and asks the JSP container to evaluate the body
    content again. After the body content has again been evaluated, the doAfterBody()
    method is called. This cycle of calling doAfterBody() and evaluating the body
    content continues until there are no more items in the collection. At this time,
    the method returns SKIP_BODY, indicating that no more body content evaluations
    are required.


    ■**Tip** Don’t forget to eventually return SKIP_BODY from the doAfterBody() method;
    otherwise, you’ll run into an infinite loop by continuously evaluating the body
    content.


