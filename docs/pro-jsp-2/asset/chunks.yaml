    Base64 编码非常适合此功能，因为它可以被解码（自动登录时需要用到），并且能确保客户的密码不以明文形式存储。


    如果你没有使用 `LoginServlet`，而只是在表单中将 `j_security_check` 作为 action 属性，你仍然可以使用此功能。只需使用少量
    JavaScript 代码，在表单的 `onsubmit()` 处理程序中设置这些 cookie 即可。这样会失去加密密码的功能，但此功能仍然有效。


    此功能的核心部分位于 `BreadCrumbFilter.java` 类中。如果存在所需的 cookie，该类会执行检查并自动登录。在该类的 `doFilter()`
    方法中，以下代码处理了此逻辑：


    ```java

    // 获取与“记住我”功能相关的 cookie

    Cookie rememberMe = RequestUtil.getCookie(request, "rememberMe");

    Cookie passCookie = RequestUtil.getCookie(request, "password");

    String password =


    (passCookie != null)


    ? URLDecoder.decode(passCookie.getValue(), "UTF-8") : null;


    // 检测认证是否失败 - 由 web.xml 中 <form-error-page> 的 error=true 参数指示

    // StringUtils.equals 是 commons-lang 中的一个便捷方法，能优雅地处理 null 值

    boolean authFailed =


    StringUtils.equals(request.getParameter("error"), "true");


    // 检查用户是否正在注销，如果是，则删除 rememberMe cookie 和 password cookie

    if ((authFailed ||


    (request.getRequestURL().indexOf("logout") != -1)) && (rememberMe != null)) {


    if (log.isDebugEnabled()) {


    log.debug("正在删除与 rememberMe 相关的 cookie");


    }


    response =


    RequestUtil.deleteCookie(response,


    RequestUtil.getCookie(request,


    "rememberMe"));


    response = RequestUtil.deleteCookie(response, passCookie);


    }


    // 检查用户是否正在登录。如果是，则检查他/她是否启用了 rememberMe 功能。

    // 仅在请求“login”时尝试进行认证

    if ((request.getRequestURL().indexOf("login") != -1)) {


    // 检查是否应自动登录用户

    // 容器正在将用户路由到登录页面，检查 remember me cookie

    Cookie userCookie = RequestUtil.getCookie(request, "username");

    String username =


    (passCookie != null)


    ? URLDecoder.decode(userCookie.getValue(), "UTF-8") : null;

    if ((rememberMe != null) && (password != null)) {


    // 无需显示登录页面即可认证用户


    String route =


    request.getContextPath() +


    "/auth?j_username=" + username +


    "&j_password=" + StringUtil.decodeString(password);

    if (log.isDebugEnabled()) {


    log.debug("我记得你 ''" + username +


    "''，正在尝试认证...");


    }


    response.sendRedirect(response.encodeRedirectURL(route));

    return;


    }


    }

    ```


    就是这样！它甚至通过检查 `error` 参数来处理域中的密码更改——这是我们添加到最近大多数应用程序中的一个巧妙功能。


    **授权**


    用户登录到应用程序后，你可能对用户能做什么或看到什么有要求。使用容器管理的安全性会简单得多，因为你可以获取用户的角色。使用你自己的认证架构，你或许也能得到类似的结果，但你可能无法利用大量可用的插件。我们所说的**插件**，指的是允许进行角色配置的标签库和其他与
    Java 相关的包。例如，Struts Logic 标签库有一个 `<logic:present>` 标签，允许你根据用户的角色执行逻辑。Tiles 模板框架也允许你根据角色配置模板中部分的显示/隐藏。


    在本节中，我们将提供一些关于在 Web 应用程序中控制*谁看到什么*的建议和技巧。如果你使用容器管理的认证，这些技术中的大多数实现起来会容易得多，但这并非必需。


    你首先需要考虑的是，用户登录后应该有哪些选择。通常这些选择以链接的形式出现，但也可能是其他菜单类型的系统，例如选择列表或 DHTML 下拉菜单。控制用户可能看到哪些链接的一种简单方法是根据用户的角色显示或隐藏链接。然而，这仅仅是隐藏了链接，用户仍然可以通过输入
    URL 来访问它。


    一个推荐的做法是，在部署应用程序时，将你的 JSP 文件和片段放在 `WEB-INF` 目录下。这样做可以防止浏览器通过 URL 直接访问 JSP 页面，同时也迫使你（作为开发者）遵循
    MVC 模式。你的 JSP 页面将受到保护，因为 `WEB-INF` 下的所有资源都是隔离的，无法通过 URL 访问。Servlet 规范规定必须在 `WEB-INF`
    内部提供安全性，并且通过强制每个请求都经过一个 Servlet 控制器，确保了控制器和视图的良好分离。然而，我们见过一些容器不支持这一点——它们要么允许通过浏览器访问
    `WEB-INF`，要么不允许你渲染位于 `WEB-INF` 下的 JSP 页面。如果你的 Servlet 容器符合 Java EE 规范，它应该允许你这样做。


    如果你使用的框架允许配置 Servlet 到 JSP 的映射，这做起来相当容易。我们通常在一个目录中开发 JSP 页面，旁边是样式表、JavaScript
    文件和图片的目录。然后在部署时，我们将包含 JSP 页面的目录（`pages`）移动到 `WEB-INF` 下的一个目录中。


    通过将 JSP 页面放在 `WEB-INF` 下，你可以确保在显示它们之前会执行必要的应用程序逻辑。毕竟，用户必须通过这个逻辑才能到达你的 JSP。


    在保护了页面位置之后，你需要保护对它们的访问，以便未经授权的用户无法执行访问它们的逻辑。你可以通过几种方式做到这一点。


    Servlet 内置的方法是为你想要保护的每个 Servlet（或 Servlet 组）使用不同的 `<security-constraint>`。要做到这一点，你必须为每个
    Servlet 或组创建 Servlet 映射——如果你有很多 Servlet，你的 `web.xml` 可能会变得相当庞大。一种更简单的方法是通过一个初始
    Servlet 代理所有请求，该 Servlet 检查权限并适当地转发，或者更好的方法是使用一个过滤器。我们还见过另一种替代方案，即在每个 JSP 文件的顶部放置一个标签库。这个标签库会检查用户是否有权访问该页面。


    以编程方式检查用户角色并相应地分发请求，或者在 JSP 页面的情况下显示错误消息，其问题在于它可能变成维护的噩梦。我们参与过一些使用这种架构的项目，在转向容器管理的认证后，维护变得容易多了。


    **总结**


    我们希望我们已经说服你，为 Web 应用程序添加安全性是相当容易的。添加之后，它带来了许多好处：基于角色的定制、审计日志和密码加密。根据我们的经验，使用容器管理的安全性让我们的开发体验更加愉快。我们曾通过编程方式使用
    LDAP 和大量应用程序逻辑来显示或隐藏链接，以及允许或拒绝访问页面。尽管它有效，而且效果不错，但初始编程花费的时间要长得多，并且维护起来相当麻烦。另一方面，如果你已经有一个能提供所有这些好处的认证和授权框架，那么你完全应该使用它，并且如果它是可移植且运行良好的，请分享它！

