- fmt: '# Jakarta Commons


    `Jakarta Commons` (http://jakarta.apache.org/commons/) is an umbrella project
    for all sorts of common functionality that developers build over and over again.
    You’ve already seen one component (`Jakarta Commons Logging`). Others include
    a servlet-based file upload component, an object pool implementation, an expression
    language, JavaBean utilities, and much, much more. This is an incredibly useful
    project, and new components and features are being added to it all the time.


    # Lucene


    `Lucene` (http://lucene.apache.org/) is an open-source implementation of a complete
    search engine. It’s held in high regard throughout the Java open-source community
    because it’s so robust, full-featured, and fast. The API is easy to pick up, and
    in just a few lines of code you can create an index for your data. Similarly,
    just a few lines are required to actually search that index. If you’re looking
    to integrate a search facility on your website, look no further than `Lucene`.


    # Summary


    This chapter covered several topics related to web-application design and best
    practices, bringing together many of the topics you explored in the previous chapters.
    First, we discussed why design is important and we recapped the two major architectures
    for building web applications: page-centric (Model 1) and Model-View-Controller
    (Model 2). Then we showed how design patterns can help you design your application
    and described how some of the Java EE patterns can be used to build web applications
    based on the MVC architecture. These patterns included the following:


    - Front controller

    - View

    - View Helper

    - Service to Worker

    - Filter


    We then moved on to discuss some third-party frameworks such as `Struts`, `WebWork`,
    and `Velocity`.


    After this, we showed how testing is an important part of web-application development
    and introduced unit testing and functional (or acceptance) testing. Automated
    testing has now really taken off with regard to web applications, and to illustrate
    this we discussed some of the testing tools that are now available. We then related
    testing back to the design aspects we presented earlier in the chapter by showing
    how the design of a web application can affect the ability to test it.


    Finally, we covered some implementation topics, including logging, troubleshooting,
    and some general guidelines for building web applications.


    # Chapter 15: Using Struts, XDoclet, and Other Tools


    You can see from the previous chapters that there are many options for building
    a web application. If you develop a web application from scratch, you’ll be a
    stronger programmer for it, but it’ll (most likely) be a long and laborious process.
    In this chapter, we’ll describe the tools to use for web development, and how
    to use them in developing this chapter’s résumé-building application. By sharing
    our experiences and knowledge, hopefully you won’t have to endure the same painful
    memorize-learn-develop progression that we’ve been through. To prepare you for
    the vast array of subjects in this chapter, let’s first take a look at the various
    open-source tools and technologies that we’ll be covering:


    - **Ant**: A Java-based build tool for rapid compiling, deploying, and testing
    Java-based applications.

    - **XDoclet**: A code-generation engine for creating Java classes and deployment
    descriptors. It requires the user to add `@tags` to Javadoc statements and produces
    files via `Ant`.

    - **Struts**: A web application framework using a servlet-based Model-View-Controller
    (MVC) architecture.

    - **Validator**: A validation framework integrated with `Struts`. Supports both
    client (JavaScript) and server-side validation.

    - **Tiles**: A JSP-based templating framework integrated with `Struts`.

    - **JUnit**: A Java-based regression-testing framework.

    - **Cactus**: A Java-based testing framework for testing web applications.

    - **StrutsTestCase**: An extension of `Cactus` for testing `Struts`’s `Action`
    classes.


    You were introduced to `Struts` in the previous chapter, and you might well have
    seen references to it scattered throughout the whole book. This is because since
    version 1.0 was released in June of 2001, it has gained wide acceptance and praise
    in the Java community. At the time of this writing, `Struts` is at version 1.2.7
    and going strong.


    The big advantage of using `Struts` to underpin your web applications is that
    it provides a set of ready-made services, and encourages you to structure your
    applications according to published standards and proven design patterns, which
    will make your applications highly extensible, flexible, and maintainable.


    However, in this chapter we aren’t going to teach you `Struts` from scratch: There
    are a lot of good books out there that teach you the basics of using `Struts`
    from scratch in far more depth than we could in one chapter! If you want a great
    `Struts` kickstart tutorial for free (and who doesn’t want something great for
    free?!), check out the resources on Ted Husted’s `Struts` website (http://husted.com/struts/).


    Instead, in this chapter, we’re going to assume that you have a basic understanding
    of how to use `Struts`, and focus upon enhancing `Struts`-based development through
    the use of third-party tools (including `Ant`, `XDoclet`, `Validator`, `Tiles`,
    `StrutsGen`, `Struts Menu`, `Struts Console`, `Easy Struts`, `Hibernate`, and
    `StrutsTestCase`). The idea is to show you how to use these tools to create your
    `Struts`-based applications more quickly, easily, and cost effectively. To do
    this, you’ll use them to create an example application that can build and view
    résumés.


    > **Note**: We don’t have space to cover it here, but another third-party tool
    that you might find useful for `Struts` development is `Struts Builder`, a Java
    Swing-based development environment to assist in the rapid creation of `Struts`-based
    Web applications. It can be found at http://sourceforge.net/projects/rivernorth/.


    Through the course of the chapter, you’ll learn how `XDoclet` can generate the
    `web.xml` deployment descriptor and the `struts-config.xml` file. We’ll also discuss
    the IDE tools for `Struts`, exception handling, built-in actions, modules, `DynaFormBeans`,
    and `Struts` tags (including the `JSTL` and `JSP 2.1`). We’ll be using `JSP` pages
    for a view layer, because that is what we’re familiar with (and this book is about
    `JSP` after all!). We’ll also touch on good practices using `XHTML` and cascading
    style sheets (`CSS`).


    However, let’s start with a lightning-quick refresher on the `Struts` architecture.


    ## Struts Refresher


    A **web framework** provides a set of services that can be used and reused across
    many different web applications. `Struts` is an open-source web framework that
    is based upon the tried-and-trusted MVC design pattern. Its core is made up of
    Java servlets, JavaBeans, resource bundles, XML, and tag libraries.


    `Struts` provides the following services:


    - A controller servlet

    - Ready-made tag libraries

    - A framework for internationalizing messages

    - A generic error and exception-handling mechanism

    - XML parsing

    - File upload and logging utilities


    Craig McClanahan originally wrote the `Struts` framework, mostly while on his
    Memorial Day vacation in 2000! The framework was subsequently donated by Craig
    to the Apache Software Foundation. The fact that it was mostly written in one
    weekend should suggest to you that it’s a very simple framework. In our experience,
    not only is it simple, but it’s also easy to work with once you get to know it.'
