    Object Attributes


    We’ve said that the JSP container can automatically convert the string values
    supplied to attributes into a specific type such as a primitive int. However,
    because the JSP page is written (behind the scenes) as a Java class, and the tag
    handlers are also Java classes, there is nothing to stop objects from being passed
    as the values of attributes.


    To achieve this, a reference to an object needs to be specified as the value of
    the attribute, and this is typically done by using a request-time expression or
    an EL expression as follows:


    <prefix:myTag x="${myObject}"/>


    <prefix:myTag x="<%= myObject %>"/> Assuming that myObject is of type MyObjectType,
    then the corresponding setter method would be as follows:


    public void set *PropertyName(* MyObjectType o)


    When called, the JSP implementation class would set the property of the tag handler
    to the value of the object reference used in the JSP page. In the tag handler,
    the setter method for the attribute can be defined to take any arbitrary object
    type, regardless of whether it’s a part of the Java APIs or a user-defined type.
    You’ll see examples of this in the next chapter.


    JspFragment Attributes


    One type of object that gets special support in JSP is JspFragment. A JspFragment
    object is essentially a class that wraps up a particular section (or fragment)
    of JSP code. At runtime, JspFragment objects can be invoked, meaning that the
    JSP code that they wrap up is translated and executed as if it were included in
    a regular JSP page.


    If an attribute is defined as taking a JspFragment, this means that scriptless
    content can be passed as a JSP fragment into the tag handler. The only caveat
    here is in the way that the value of such an attribute can be specified: it can
    be passed only by using the body content of the


    <jsp:attribute> tag:


    <prefix:myTag>


    <jsp:attribute name="x">Hello ${name}</jsp:attribute>


    </prefix:myTag>


    At runtime, the JSP container wraps up the value of the attribute and passes it
    as a JspFragment instance to the tag handler. During the execution of that tag,
    the tag handler can invoke and evaluate the fragment to have the results included
    whenever necessary.


    Now you’ll see an example of how to use attributes.


    **Displaying Thumbnails with a Tag**


    Imagine that you’ve been asked to write a JSP page presenting a list of thumbnail
    images to the user. There are several ways to do this. First, you could statically
    code the page, writing the appropriate HTML tags to present a thumbnail of all
    images in a particular directory.


    The downside to this approach is that when the images change, your page will also
    have to change. Therefore, instead of taking this approach you’ll perform this
    dynamically, and rather than write a whole load of Java code into the JSP, you’ll
    build a custom tag that you could reuse elsewhere.


