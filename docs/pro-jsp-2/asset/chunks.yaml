    You can do this by putting them in `WEB-INF\classes`, or by putting them in a
    JAR file, and copy the JAR file to the application''s `WEB-INF\lib` or to Tomcat''s
    `common\lib`. Now you''ll need to configure your application''s context to use
    these newly created (and compiled, of course) classes.


    ```xml

    <Realm className="org.apache.catalina.realm.JAASRealm" debug="99"


    appName="ProJSP"


