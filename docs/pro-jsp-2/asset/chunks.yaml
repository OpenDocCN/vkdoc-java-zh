    </jsp:attribute>


    </ch07:selectWithDynamicAttributes>


    Remembering that attributes can be specified by using the <jsp:attribute> tag,
    in essence all you’re doing is specifying an attribute called onChange, the value
    of which is the JavaScript code that you’d like executed when an item in the list
