    第 15 章 ■ 使用 STRUTS、XDoclet 和其他工具


    **589**


    StrutsGen 工具


    在 `struts-resume` 应用程序中有一个小巧但灵活的工具，Erik Hatcher 最初为他在《*Java Development with Ant*》中的示例应用程序编写了它。它使用
    Ant 和 XDoclet，通过检查表单的属性文件来生成 JSP 页面和 ResourceBundle。这两个文件使用的模板简单且可定制。该工具可以在 `struts-resume`
    应用程序的 `tools/strutsgen` 目录中找到。要使用它，你首先需要运行命令 `ant webdoclet` 在 `build/gen/web`
    目录中生成你的表单。然后导航到 `tools/strutsgen` 并运行 `ant "-Dform.name=MyForm"`，其中 `MyForm` 是你想要为其生成文件的表单名称。


    这将在 `tool/strutsgen/build` 目录中生成两个文件，一个名为 `UserForm.jsp`，另一个名为 `UserForm.properties`。你也可以在不指定表单名称的情况下运行该工具，它将为你的所有表单生成这些文件。


    该工具使用 TreeMap 从表单中获取属性，这意味着新文件将按字母顺序包含这些属性。在大多数情况下，你可能仍然需要自定义字段的顺序以使其对用户友好；这个工具只是稍微加快了速度。目前它也只支持生成
    `<html:text>` 字段，但既然你无论如何都需要进入 JSP 重新排列字段顺序，这也不是什么大问题。我们发现它在开发此应用程序期间非常有用。


    **在 Struts 中处理持久化**


    在我们看来，Struts 在为你（开发者）提供实现视图和控制器的绝佳方式方面做得非常出色，但它对模型的支持并不多。ActionForm 很好，ValidatorForm
    甚至更好，但如果你希望应用程序有一个数据库后端，Struts 并没有提供太多简化编码的方法。表单为后端提供了一个良好的接口，但 Struts 不负责提供数据访问，因此它不提供任何用于检索数据的类。虽然有很多不同的方法可以编写控制器到数据库的逻辑，但我们将告诉你我们是如何做的，以及哪些方法对我们有效。


    当我们刚开始使用 Struts 进行开发时，我们的架构已经预先确定，我们只需要接入它。我们在项目中使用 EJB，并使用 RowSet 来处理列表屏幕。这对我们来说相当容易，因为我们只需要为每个动作调用特定的会话
    Bean 并与之适当交互即可。我们实际上发现，在每个表单上为我们的数据对象（或值对象或数据传输对象）创建访问器和修改器（getter 和 setter）非常容易。后来我们才发现这不是推荐的“设计模式”——我们的数据对象永远不应该到达表示层。然而，它确实有效，而且效果很好——我们对此很满意。


    关于持久化选项的话题似乎几乎每周都会出现在 Struts 用户邮件列表中。

