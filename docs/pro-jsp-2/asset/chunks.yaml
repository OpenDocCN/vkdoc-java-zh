    ■**Note** You can find more information about the Business Delegate pattern at
    http://java.sun.com/


    blueprints/corej2eepatterns/Patterns/BusinessDelegate.html.


    It’s important to hide the implementation details from your filter by using a
    Business Delegate so that you can switch to a new persistence layer (for example,
    EJBs) at any given time. We don’t go into the details behind the UserManager and
    how it works, so you’ll have to trust us when we say that the UserManager.getUser()
