    JavaServer Pages Standard


    Tag Library


    **D**espite the popularity of using JSP technology to build the dynamic presentation
    layers required by today’s modern web applications, JSP page authors have repeatedly
    come up against the same problems.


    In all but the simplest of web applications, JSP pages have needed to contain
    some form of logic to tailor the dynamic content, and until recently this has
    been done by using JSP


    scriptlets. Although this solution does produce the required output, using too
    many scriptlets on a page reduces its readability and therefore its maintainability
    and generally makes a JSP


    page look ugly. When using scriptlets, it’s all too easy to forget a closing brace
    or something equally as trivial, and in a large JSP page it can take a significant
    amount of time to track down the source of the resultant error.


    Reduced maintainability isn’t the only limitation of a scriptlet-based approach;
    it also places an assumption on the skill set of the JSP page author developing
    or maintaining the page. Because scriptlets are written in Java, JSP page authors
    need to be Java developers or at least have more than a basic understanding of
    the language. Often the specific design skills of a web designer cannot be controlled,
    or the designer requires some assistance to fully embrace JSP technology. A perfect
    example of the skills mismatch is that a web designer may have a preferred HTML
    editor or IDE that may not support Java scriptlets because editors are generally
    designed for XML-type languages such as HTML.


    More recently, a better approach has been for Java developers to create their
    own custom actions (often known as custom tags) and make them available to web
    designers via tag libraries. This solution is far better than the scriptlet-based
    approach, because the use of a custom tag places no assumptions on the skills
    of the page author—custom tags are simply XML based. One obvious drawback of custom
    tags is that they must be coded, packaged, and tested before use, which is a nontrivial
    task and must be done by a Java developer. This can place time constraints on
    when web designers can start work, and in some cases Java developers have found
    themselves writing all manner of custom tags for even the simplest of tasks to
    ensure that no scriptlets are necessary.


    The **JavaServer Pages Standard Tag Library (JSTL)** specification 1.0 was first
    released in June 2002, and its arrival signified a new phase for JSP page authors.
    The JSTL specification outlines a number of custom actions that are designed to
    handle the vast majority of common tasks needed by JSP page authors. Gone are
    the days of using ugly scriptlets, and thanks to the JSTL, hopefully only more
    complicated functionality warrants the construction of a custom action.


