    **631**


    The following is what the messages.jsp file uses that is included in the struts-resume
    application’s main Tiles template:


    <%-- Error Messages --%>


    <logic:messagesPresent>


    <div class="error">


    <html:messages id="error">


    <bean:write name="error" filter="false"/><br />


    </html:messages>


    </div>


    </logic:messagesPresent>


    <%-- Success Messages --%>


    <logic:messagesPresent message="true">


    <div class="message">


    <html:messages id="message" message="true">


    <bean:write name="message" filter="false"/><br />


    </html:messages>


    </div>


    </logic:messagesPresent>'
