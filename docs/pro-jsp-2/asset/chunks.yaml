    ## General Guidelines


    To wrap up this chapter, you’ll look at some general guidelines for building web
    applications.


    Although these guidelines aren’t specifically related to design, they can be just
    as important for building a successful website.


    ## Error Reporting


    One of the things that we as developers like to see when errors happen are stack
    traces.


    After all, they’re useful for tracking down the source and cause of a problem.
    Users, on the other hand, probably don’t want to see them; they certainly don’t
    add anything to the user experience.


    Seeing stack traces or other forms of technical error messages on websites tends
    to put me off from returning to that site. For example, one particular e-commerce
    site that I visit regularly presents me with messages about how some Visual Basic
    component can’t connect to their database. Though I don’t confess to know anything
    about Visual Basic, seeing such messages does make me think twice about ordering
    from that site.


    Unfortunately, even with the most tested of websites, errors will happen and therefore
    the `JSP` specification provides `JSP` error pages. You already saw these in Chapter
    2 and, to recap, they’re just pages that get forwarded to when an uncaught exception
    is encountered by the container. Setting your web application up to use these
    is a great way to ensure that you have a standard way to handle errors and that
    the user doesn’t end up seeing a nasty stack trace in the process.


    On a related note, another recommendation is to use a consistent exception-handling
    strategy and make sure that you handle and log all exceptions. This will help
    you to understand what went wrong and where it went wrong when an error occurs.
    Use the exception-handling facilities built into `JSP` where appropriate—they’re
    there to help you. If you’re using an `MVC` framework such as `Struts`, take advantage
    of its exception-handling facilities as well.


    ## I18n and l10n


    Internationalization (`I18n`) and localization (`l10n`) are built into the Java
    platform, and there’s nothing stopping you from using them within web applications,
    particularly if you intend to reach an international audience. Typically, and
    especially with public websites, a lot of effort is put into making the site both
    function correctly and look good. However, often little work is put into maximizing
    the appeal for international audiences. After all, the Internet is a global network
    and you can never tell exactly who will be using your site.


    Putting in such features doesn’t have to be a massive job, with tools such as
    `JSTL` supporting most of the functionality required to internationalize and localize
    a web application. For example, this can range from simply localizing dates and
    times to providing internationalized text and/or content. The overriding guideline
    here is to think about your audience.


    ## Adopting New Technologies and Standards


    The Web has changed a great deal over the past few years, and some web applications
    have kept up with the changes better than others. Although there’s an argument
    for not always adopting the latest and greatest technologies, there’s a fine line
    between adopting those features that make most sense and never adopting at all.
    With technologies changing on almost a monthly basis, this provides an opportunity
    to try out new technologies and standards on every new web application that you
    work on. Most web developers have now taken up standards such as cascading style
    sheets (`CSS`), but you won’t find many sites (relatively speaking) that use newer
    standards such as `XHTML`. This does have much to do with the expense of keeping
    existing sites up-to-date, but when you start a new web application, take a look
    around to see what’s happening within the industry and use this to figure out
    if there are any new technologies or standards that can help you achieve your
    goals.


    One of the projects that we worked on involved helping a team inside a client
    company build a web application for internal use. The system itself was replacing
    a “green screen” application, and this was the first time that the team had used
    Java, let alone built web applications.


    Although the first prototype of the system was functional, the user interface
    closely resembled that found on the original mainframe application. After just
    a day or so playing with the view components in conjunction with the team, we
    came up with something that matched the company’s corporate image and was much
    closer to the sort of web applications that you find on the Internet. We showed
    them `CSS` and guided them through how some of the most popular websites on the
    Internet work. The result? Not only did the application look and feel much better,
    but also the business sponsors and users of the system suddenly became much more
    enthusiastic about the project. It’s amazing what a little `HTML` and `CSS` can
    do!


    To sum up, let your previous experiences of building web applications help you,
    but don’t let them limit you.


    ## Adopting Existing Components


    The final guideline worth talking about is the use of third-party components,
    particularly those that are open source. In the past couple of years, the open-source
    community has really moved on in terms of adoption and the sheer number of projects
    that are currently being undertaken. A quick look at websites such as the Jakarta
    Project (`http://jakarta.apache.org`), SourceForge (`http://sourceforge.net`),
    and java.net (`http://java.net`) confirms this. With project budgets and timescales
    decreasing, there’s an opportunity here to take much of what has been built and
    use it in your own projects.


    As I mentioned earlier in the chapter, I decided to build a blogging system implemented
    as a Java-based web application. In building the application, I used several open-source
    projects, including `Jakarta Commons Logging` and `log4j` for logging, `Jakarta
    Commons FileUpload` for uploading files to the website, `Apache XML-RPC` for accessing
    web services, and `Lucene` to provide a search facility for users. Implementing
    all these features myself would have taken an incredibly long time. As it was,
    each of these open-source tools took a maximum of a few hours to integrate, meaning
    that I could concentrate on the real purpose of the web application.


    Let’s take a quick look at some popular open-source tools currently available.


