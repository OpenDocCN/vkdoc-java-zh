    The <servlet> tag contains several child tags that give information about the
    declaration of the servlet. This information includes the unique name that the
    servlet is registered with in this web application, and the full name of the class
    that implements the servlet’s functionality.


    The <servlet-name> tag gives the servlet’s unique name within the web application.
    In the case of our first servlet, you can see that it’s called Servlet1.


    The <servlet-class> tag gives the fully qualified class name of the class that
    implements the functionality of this servlet. In the case of our first servlet,
    you can see that Servlet1 is implemented in the class com.apress.projsp.Servlet1.


    Looking at the <servlet> element for our first servlet, you can see that it contains
    more than just the name and class of the servlet. It also contains an <init-param>
    tag. This tag allows you to specify initialization parameters for our servlet.


    <init-param>


    <param-name>version</param-name>


    <param-value>0.1b</param-value>


    </init-param>


    As you can see, our servlet has one parameter set. The <param-name> child tag
    gives the name that the parameter can be accessed by, and the <param-value> gives
    the starting value for the parameter. The parameter can be accessed from our first
    servlet by using the getInitParameter() method on the ServletConfig object. This
    method is public String ServletConfig.getInitParameter(String name) So to access
    the parameter defined for our first servlet, you can use the following code within
    the servlet’s class:


    ...


    String version = getInitParameter("version");


    ...


    Notice that you don’t need to get the ServletConfig object explicitly, because
    the GenericServlet class implements the ServletConfig interface so that the method
    is available to you.


    You won’t be examining the definition of our second servlet in detail, because
    this is nearly identical to the first servlet. However, the second servlet’s definition
    is simpler because it does not contain any initialization parameters.


    **Servlet Mappings**


    After you’ve defined your servlet through the <servlet> tag, you need to map it
    to a particular URL pattern. This is necessary so that the web container knows
    which requests to send to a particular servlet. You may think, “Why can’t I just
    pass all requests to the servlet with the same name as the end of the URL?” For
    example, http://localhost:8080/mywebapp/Servlet1


    would be routed to the servlet defined with the name Servlet1\. This would seem
    like a logical approach and is in fact the most common way of implementing the
    mappings between servlets and URLs. However, the approach isn’t very flexible.
    Imagine if you wanted to map more than one URL to the same servlet, which could,
    for example, check that a user is logged in. This is where the <servlet-mapping>
    element comes in, and where it illustrates its power.


    513-0 ch02.qxd 10/3/05 4:22 PM Page 72


    **72**


    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    In the example deployment descriptor, you map servlets to some strange-looking
    URL


    patterns. Our first servlet is invoked every time any URL that ends with home.html
    is encountered. The unique servlet name that you defined in the <servlet> tag
    (referenced here as


    <servlet-name>) is mapped to a URL pattern referenced here in a <url-pattern>
    element:


    <servlet-mapping>


    <servlet-name>Servlet1</servlet-name>


    <url-pattern>/home.html</url-pattern>


    </servlet-mapping>


    Again, we won’t discuss our second servlet, because this is very similar to the
    first, except that it maps to any URL ending in AnotherServlet.


    It’s worth mentioning at this stage that servlets can be mapped to more than one
    URL


    through the use of wildcards in the <url-pattern> child tag of the <servlet-mapping>
    tag. For example, the following maps every URL encountered to the same servlet,
    which allows you to have a central servlet that handles all requests:


    <servlet-mapping>


    <servlet-name>ValidatorServlet</servlet-name>


    <url-pattern>/*</url-pattern>


    </servlet-mapping>


    You can also have more than one <servlet-mapping> tag per defined servlet. This
    allows you to map completely disparate URLs to the same target.


    **Servlet Context Initialization Parameters**


    Here we’ll discuss the application (or servlet context) initialization parameters.
    You’ve already seen how to define initialization parameters for individual servlets;
    now you’ll look at defining parameters for the whole web application.


    To achieve this, you use the ServletContext object. The ServletContext is a servlet’s
    view onto the web application that contains it. As such, if a parameter is set
    in the ServletContext, it’s accessible from all servlets in the web application.


    Through the deployment descriptor, you can provide the ServletContext with any
    number of initialization parameters. You could use such parameters to convey application
    information such as an administrator’s e-mail address. These parameters are available
    to the servlets in the web application via the getInitParameter() and getInitParameterNames()
    methods of the ServletContext object:


    public abstract String getInitParameter(String name)


    public abstract Enumeration getInitParameterNames()


    Note that because this is an interface, all methods are abstract and their implementations
    must be provided by the web container.


    In the example, you define one initialization parameter for your web application
    by using a <context-param> element:


    <context-param>


    <param-name>adminEmail</param-name>


