    and displays the cart.


    The first thing done in this action is to retrieve the shopping cart from the
    user’s session.


    If there is no cart in the session, a new Cart object is created as follows: Cart
    cart = (Cart) session.getAttribute("cart"); if (cart == null) {


    cart = new Cart();


    }


    Next, this method decides what to do to the cart based on a parameter (called
    adding) passed to the action in HttpServletRequest. If the parameter contains
    the value true, you call the method addToCart(). If the adding parameter is false,
    you simply redirect to the cart.jsp page. This method looks for another parameter
    in HttpServletRequest called id.


