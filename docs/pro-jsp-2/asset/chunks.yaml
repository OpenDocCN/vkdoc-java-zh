    originally authored by Ed Hill, which facilitates column sorting and pagination
    of data and integrates nicely with Struts. All you need to do is create a List
    (or other collection) of ActionForms and pass those to the tag in the JSP. This
    tag library also supports exporting your table’s data to Excel, CSV, and XML.


    The second is the **Struts menu tag library**. This component is a Menu framework
    that can be used to declare your menu items in an XML file. It integrates with
    Struts as a plug-in, supports popular menu styles (for instance, CoolMenus and
    standards-compliant DHTML


    menus), and allows for hiding and showing menus and items based on roles. Currently,
    it supports absolute and context-relative links, as well as Struts forwards.


    Both of these tag libraries are used in this chapter’s application.


    To reference the Struts tag libraries, you simply drop the struts.jar file into
    /WEB-INF/lib and match the URIs as specified in each library’s tag descriptor
    (TLD) file. We’ve seen that some servlet containers require you to declare the
    location of your TLD in web.xml. This is also necessary if your TLD file doesn’t
    declare a URI to map to. In our example struts-resume application, struts-resume.tld
    and struts-menu.tld require entries in web.xml for this reason.


    JSP 2.1 helps keep the code concise by allowing a JavaBean’s properties to be
    accessed directly in a JSP page. Previously, you had to use <c:out value="${beanName.propertyName}"/>,
    while now, JSP 2.1 lets you simply use ${beanName.propertyName}. We expect JSTL-type
    syntax to be around for a while, as will the Struts tags, if only for backward
    compatibility.


