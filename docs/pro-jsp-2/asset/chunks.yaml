    </path>


    <target name="compile" description="将 .java 文件编译成 .class 文件">


    <mkdir dir="${build.dir}/web/classes"/>


    <javac srcdir="src/web"


    destdir="${build.dir}/web/classes"


    debug="false"


    deprecation="true"


    optimize="true"


    classpathref="web.compile.classpath"


    />


    </target>


    上述代码片段中的 `<path>` 元素告诉 Ant 构建一个名值对，名称为 `web.compile.classpath`；其值被构建为 `/lib/Jakarta-struts-1.1`
    目录中所有 JAR 文件的列表。通过一个简单的声明性语句，Ant 就为您创建了编译类路径。


    对于本章的示例应用程序，需要 Ant 1.5.1（或更高）版本。下载后，您需要将其解压到硬盘上的某个位置（例如，Windows 上的 `c:\Tools\jakarta-ant-1.5.1`，或
    Linux 和 Unix 上的 `/usr/local/jakarta-ant-1.5.1`）。解压后，您需要将 `ANT_HOME` 设置为指向此解压位置的环境变量，并将
    `$ANT_HOME/bin` 添加到您的 `$PATH` 环境变量中。


    Ant 任务


    执行 `ant -projecthelp` 将显示基本的 Ant 任务，但以下是您最常使用的任务：


    *   `ant deploy`：生成并编译所有内容，然后部署到 Tomcat（如果您已安装）。

    *   `ant compile-module`：其中 `module` 是 `ejb`、`web` 或 `common`。

    *   `ant ejbdoclet`：生成 ValidatorForms 和 Hibernate 的基于 XML 的映射文件。

    *   `ant webdoclet`：生成 `web.xml`、`struts-config.xml`、`validation.xml` 和 TLD。


    513-0 ch15.qxd 11/14/05 5:38 PM Page 584


    **584**


    第 15 章 ■ 使用 Struts、XDoclet 及其他工具


    *   `ant test-module`：其中 `module` 的值可能与前面提到的 `compile` 选项的值相同。这会递归运行 `test/module`
    目录中的所有测试。我们建议使用 `ant test-module -Dtestcase=ClassName`，其中 `ClassName` 是您的测试类的名称。

    *   `ant test-cactus -Dtestcase=ClassName`：在运行测试之前启动 Tomcat，并在测试完成后停止它。如果 Tomcat
    已经在运行，请使用 `ant test-web -Dtestcase=ClassName`。


    struts-resume 中的许多第三方库要求您为它们定义一个*任务定义*，以便与 Ant 集成。例如，要使用 XDoclet 生成 Struts 配置文件
    `struts-config.xml`，您必须定义 `"webdoclet"` 任务：


    <taskdef name="webdoclet"


    classname="xdoclet.modules.web.WebDocletTask">


    <classpath>


    <path refid="xdoclet.classpath"/>


    <path refid="web.compile.classpath"/>


    </classpath>


    </taskdef>


    定义此任务后，它就可以像使用 `<javac>` 任务（参见前面的示例）一样，在您的 `build.xml` 文件中使用。您可以在“使用 XDoclet 生成配置文件”一节中看到此任务的可用属性。


    在示例应用程序中使用 Ant


    在 struts-resume 中，Ant 执行以下所有任务：


    *   生成 Java 代码和 XML 文件（通过 XDoclet）

    *   构建（编译）整个源代码树（.java 文件）

    *   将组件组装成 JAR 和 Web 归档（WAR）文件

    *   将 WAR 文件部署到 Tomcat

    *   运行单元测试和容器内测试（通过 Cactus）


    Ant 是我们钟爱的技术之一，因为它*就是能正常工作*。我们在 struts-resume 应用程序中建模了 `build.xml` 文件，以符合 Erik
    Hatcher 在其著作 *Java Development with Ant*² 中推荐的 Ant 最佳实践。我们大量借鉴了他书中示例应用程序的架构，并就此与他交换了许多电子邮件。将测试源代码目录（`test/src`）与常规源代码目录（`src`）分开所带来的灵活性，使得在生产部署中排除测试类变得非常容易。


    最后，对我们来说，Struts 一直是一个非常稳定的框架——即使是每日构建版本也是如此。当您查看示例应用程序的 Ant 构建文件时，您会发现我们创建它的方式使得您可以轻松切换任何第三方库（包括
    Struts）的版本。您所需要做的就是下载一个新版本并将其解压到 `lib` 目录，然后更改 `lib/lib.properties` 中给出的版本号。这确实使得测试库的新版本并查看您的应用程序是否仍然正常工作变得非常容易。您还可以使用类似
    `ant -Dstruts-dir=/path/to/struts/jars` 的命令从命令行覆盖库目录。


    **使用 XDoclet 生成配置文件**


    XDoclet 是一个代码生成引擎。它为 Java 实现了**面向属性的编程**。简而言之，这意味着您可以通过向 Java 源代码添加元数据（属性）来为代码增加更多意义。这是通过特殊的
    JavaDoc 标签完成的。XDoclet 将解析您的源文件，并从中生成许多工件，例如 XML 描述符和/或源代码。


    这些文件是根据模板生成的，这些模板使用了源代码及其 Javadoc 标签中提供的信息。在撰写本文时，XDoclet 只能作为利用 Ant 的构建过程的一部分来使用。XDoclet
    的文档和下载可从 http://xdoclet.sourceforge.net/ 获取。

