    **Deploying with Tomcat**


    Deploying this application with Tomcat is simplicity itself. For basic deployments,
    all you need to do is copy your WAR file into the webapps directory of your Tomcat
    installation. It’s located at %TOMCAT_HOME%\webapps.


    If this is the first time you have copied the WAR file to the webapps directory,
    Tomcat will detect the new file and automatically deploy the application. If you
    are attempting to redeploy the store application, Tomcat does not check for newer
    versions of existing WAR files; you can do a couple of things to get Tomcat to
    redeploy the application. We recommend that you go to the Tomcat Management page,
    which you can access through a link on the main Tomcat page, http://localhost:8080.
    Find the store application in the list and click the Undeploy link for the application.
    Then, copy the WAR file to the webapps directory and Tomcat will redeploy it.


    To deploy the example in a more advanced way, you can follow these steps: **1.**
    Copy your WAR file to the webapps directory of your Tomcat installation. This
    step is voluntary, but it’s sensible to keep your web-application deployments
    in the same place.


    **2.** Add an entry to the server.xml file. This file is located in the %TOMCAT_HOME%\conf
    directory. The line that you should add to deploy the store application is as
    follows:


    <Context path="/store" docBase="/store.war" reloadable="true"/> This line declares
    a context to exist with its base URI being /store (this can be any valid path).
    This context is fulfilled by the application at /store.war. You are passing another
    parameter when creating the context.


    If the reloadable parameter is set to true, Tomcat monitors classes in WEB-INF\classes
    and WEB-INF\lib for changes and automatically reloads the web application if a
    change is detected. This feature is useful during application development, but
    it requires significant runtime overhead and isn’t recommended for use on deployed
    production applications.


    There are many other parameters that can be passed. Most of these are beyond the
    scope of this chapter, but it would be very useful to enable more control over
    how your application is deployed. Details of these parameters can be found at
    http://jakarta.apache.org/tomcat/.


    **3.** Start Tomcat, and your application will be deployed. It can now be accessed
    at http://localhost:8080/store/. The home page contains a link that passes you
    through to the main page at http://localhost:8080/store/servlet/MainAction.


