- fmt: '# CHAPTER 15 ■ USING STRUTS, XDOCLET, AND OTHER TOOLS


    **Figure 15-8.** *The directory structure for the résumé application development
    (not deployment)*


    Let’s go over what each file in the root directory is used for and what’s in each
    subdirectory.


    The `app-settings.xml` file allows you to easily customize your application. The
    Ant tool allows you to set properties from the command line using the `-DpropertyName=propertyValue`
    syntax. We separated these properties out of the main build file for readability.
    The main Ant build script, `build.xml`, at execution time includes this `app-settings.xml`
    file. The `build.properties` file contains application name settings and build
    directory settings. The `database.properties` file allows you to configure which
    database you want to talk to through Hibernate. Most databases are supported.


    The `lib` directory contains all the third-party libraries (JARs) used by the
    project. We use several large third-party libraries, therefore this directory
    weighs in at approximately 11 MB.


    XDoclet, Cactus, Struts, and other libraries are contained in this directory.
    A `lib.properties` file within this directory will allow you to change version
    numbers for packages.


    The `metadata` directory has a `web` subdirectory containing XML files that together
    make up `web.xml` and `struts-config.xml`. This is known as the merge directory
    in XDoclet terminology.


    If you were to add EJBs to this project, you could place any relevant XML fragments
    inside a new directory.


    The `properties.xml` file loads all `.properties` files and environment variables.
    It then uses these values to set class path properties, database properties, and
    Tomcat deployment properties.


    The `src` directory is (obviously) where all Java source files are kept. There
    are three directories underneath it: `common`, `ejb`, and `web`. Also, it makes
    sense to have an `ejb` directory for the persistence layer, because this makes
    the directory layout extensible for the future. XDoclet is used to generate a
    `ValidatorForm`, and the Hibernate Mapping XML file from a plain old Java object
    (POJO). The `ValidatorForm` is further marked up with `@struts.validator` XDoclet
    tags and used to generate a `validation.xml` file. The reason we’ve done it this
    way is because it allows new columns to be added to our tables easily. On our
    last project, we used validator forms, value objects, and DAOs, and if we added
    a new column to a table, we had to add getters and setters in two places (on the
    form and the POJO) and also change the SQL in the DAO.


    Using XDoclet and Hibernate eliminates this headache—especially since Hibernate
    generates a schema and can build your database for you. We’ve written a `db-create`
    Ant task to perform this table creation for you automatically.


    The `tools` directory contains the StrutsGen tool written by Erik Hatcher. This
    tool uses Ant and XDoclet to generate a skeleton JSP and an associated properties
    file from an `ActionForm`, greatly speeding up application development.


    The `web` directory contains all web-related files: images, JavaScript files,
    CSS files, properties files, and XML configuration files. It contains separate
    directories for most of these and also a `WEB-INF/classes` directory. The JSP
    files in the `pages` directory are copied to `WEB-INF` at deployment time.


    > **Tip** By the way, this application was created using AppFuse (http://raibledesigns.com/wiki/Wiki.jsp?page=Downloads)
    as a baseline, and we recommend that you use it too when you develop your own
    Struts-based applications. It already has a directory layout built, a build script
    for compiling, testing, and deploying, and XDoclet fragments for generating your
    XML files. After downloading, simply execute `ant new -Dapp.name=yourAppName -Ddb.name=yourDBName`.
    Feel free to remove those files you don’t find necessary.


    ## Struts Development Techniques and Tools'
