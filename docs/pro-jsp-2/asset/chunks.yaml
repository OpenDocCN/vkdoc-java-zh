    **Comparisons in the Expression Language**


    Another useful feature of the EL is the ability to perform comparisons, either
    between numbers or objects. This feature is used primarily for the values of custom
    tag attributes, but can equally be used to write out the result of a comparison
    (true or false) to the JSP page. The EL


    provides the following comparison operators:


    • == or eq


    • != or ne


    • < or lt


    • > or gt


    • <= or le


    • >= or ge


    The second version of each operator exists to avoid having to use entity references
    in JSP


