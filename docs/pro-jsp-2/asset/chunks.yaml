    性能与可扩展性


    **W**eb 应用的分布式和多用户特性使得性能和可扩展性成为重要关注点。Web 应用是分布式系统。用户通过网络从远程客户端访问 Web 应用，而 Web
    应用通常依赖于数据库、企业信息系统和 Web 服务等远程系统。网络连接开销、缓慢的网络连接以及远程系统的低效都可能导致您的 Web 应用性能不佳。


    Web 应用常常需要扩展以满足日益增长的用户需求。一旦 Web 应用投入生产，由于除了无处不在的 Web 浏览器外，访问无需客户端软件，因此增加用户似乎非常容易。增加用户很容易，但要确保您的应用在这些新增用户下仍能良好运行，则需要付出一些努力。


    在本章中，您将了解一些可以采取的步骤和可以使用的技术，以提升 Web 应用的性能和可扩展性。在开始之前，我们先澄清本章中使用的术语：


    • **性能：** 每个应用对性能都有自己的定义。对于 Web 应用，一个常见的性能指标是**响应时间**——即应用完成来自最终用户的任何给定请求所花费的时间。因此，您可能要求应用的最大响应时间为
    3 秒。然而，为了完整起见，任何此类指标都必须考虑在任意给定时间可能与应用交互的用户数量。因此，一个更完整的性能描述可能是：*应用必须支持 100 个并发用户，且最大响应时间为
    3 秒*。


    • **可扩展性：** 凭借合理的编码技能和足够的硬件，您可能会发现达到上述性能目标相当容易。但是，假设您的应用取得了成功，因此突然需要支持 200 个用户。如果您将处理能力加倍，例如在每个服务器上增加
    Java 虚拟机或增加服务器计算机，您的应用是否能够（大致）支持双倍的用户数量，同时继续满足性能要求？如果答案是肯定的，那么您的应用就是可扩展的。


