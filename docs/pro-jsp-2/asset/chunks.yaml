    **557**


    并且要求使用编程语言、脚本语言或 XML 来编写测试。这是一个目前处于变动中的领域，在最终选择工具之前，值得考虑你的测试受众。让我们看看如何使用另一个广泛使用的开源框架
    HttpUnit 来自动化功能级测试。


    HttpUnit


    HttpUnit (http://www.httpunit.org) 是 JUnit 的另一个扩展，但它与我们讨论过的其他扩展不同，因为它允许你在略有不同的层面上编写测试。


    你可以使用 JUnit 和 Cactus 等工具来测试单个类和组件是否正常工作，而 HttpUnit 是一个可用于测试 Web 应用程序所提供功能的框架。正如你所见，对类进行单元测试很容易，但如何测试
    Web 应用程序的功能呢？


    答案在于 HttpUnit 为你提供的工具。该框架提供了一系列类，允许你模拟用户使用 Web 浏览器连接并使用网站的过程。在底层，它通过向网站发出 HTTP
    请求，并传递用户通常需要手动输入的信息来实现这一点。就通过该框架可用的功能而言，HttpUnit 允许你访问单个网页，并对网页是否包含特定元素执行断言。例如，如果你正在测试一个在线商店，你可能想测试所有页面是否都包含购物车的当前总价。除了这些基本功能外，HttpUnit
    还提供了一种方法来查找页面上的 HTML 表单，并通过编程方式填写这些表单以发送回服务器，然后可以检查服务器的响应。同样，对于在线商店，你可能想测试用户能否将商品添加到购物车，以及后续页面是否向用户显示更新后的购物车状态。


    HttpUnit 提供了一种使用 Java 代码以编程方式测试网站功能的方法，其真正的好处在于，当新版本可用时，可以重新运行这些测试来对 Web 应用程序进行回归测试。事实上，由于
    HttpUnit 使用 HTTP 协议，它可以用于测试任何其他基于 HTML 的 Web 应用程序，包括使用 Active Server Pages (ASP)、Perl、PHP
    等编写的应用程序。


    其他功能测试工具


    为了完善你对功能测试工具的了解，还有几个其他框架值得一提。第一个是 jWebUnit (http://jwebunit.sourceforge.net)，它实际上是
    HttpUnit 的一个扩展。jWebUnit 背后的团队在一个项目中使用 HttpUnit 时，意识到许多测试都包含重复的代码来设置请求对象和执行断言。因此，该团队为
    HttpUnit 构建了一套包装类，以简化其 API 的用途。这经过不断改进并已发布到开源社区。有些人喜欢 HttpUnit 提供的控制力，而另一些人则更喜欢
    jWebUnit 提供的更简单的接口。归根结底，这完全取决于个人偏好。


    另一个值得一提的框架是 Jameleon (http://jameleon.sourceforge.net)。该框架提供了一种对应用程序进行功能测试的方法，但它是从应用程序所提供的功能角度出发的。Jameleon
    与 HttpUnit 和 jWebUnit 的不同之处在于，它将功能的测试与实际测试用例分离开来。一个功能可以是像登录这样粒度很细的操作，也可能是每次测试前都必须执行的操作。使用
    Jameleon，你可以单独编写功能测试，然后将它们组合成一个可重用的测试用例。这些测试用例可以通过在运行时与特定数据集关联来实现数据驱动，这提供了一种在特定环境中轻松运行特定测试的方法。Jameleon
    本身并非专门为测试 Web 应用程序而设计；相反，它采用插件架构，可以将测试代码插入并执行。在撰写本文时，Jameleon 提供了 HttpUnit/jWebUnit
    的插件；因此，它可以用于对 Web 应用程序进行功能测试。这是一个很棒的想法，而且通常是商业测试工具才具备的功能。一如既往，开源测试领域值得关注，因为新的工具和增强功能会定期发布。


    现在我们已经介绍了测试 Web 应用程序的各种方法，接下来让我们看看设计如何影响测试 Web 应用程序的能力。


    **为测试而设计 Web 应用程序**


    尽管对单个类进行单元测试很简单，但正如我们所暗示的，有时对 Web 应用程序中的类进行单元测试可能会很棘手。当各种业务逻辑和表示逻辑与需要在 Web 服务器内执行的组件（如
    Servlet）混杂在一起时，尤其如此。为了解决这些问题，我们必须再次求助于架构和设计。


    架构分层


    虽然我们没有明确讨论架构分层，但我们讨论过 MVC 架构以及它如何帮助实现各个组件之间的关注点分离。例如，控制器是负责管理请求的总体组件，模型表示正在被操作的领域信息，而视图则将信息呈现给用户。将其与模型
    1 架构（其中所有这些职责都嵌入在单个组件中）进行比较，你就可以开始看到分离这些职责如何能够简化测试。


    我们已经说过，Web 应用程序单元测试中最困难的部分是测试那些依赖于 Java EE Web 服务器上下文的组件，而你可以采取的一项有助于测试的措施是，尽量使这些组件变得小巧轻量。通过将这些组件作为封装在
    Java 类中的功能的轻量级包装器，你就有更大的机会对应用程序进行单元测试。例如，回想一下 MVC 架构，特别是命令和控制器策略，其中处理传入请求的功能被拆分到各个命令对象中。由于每个命令对象只是一个独立的
    Java 类，你现在可以使用与普通 Java 类相同的单元测试技术——你可以使用 JUnit 创建新实例并调用这些实例上的方法。

    '
- fmt: '# 单元测试与Web应用设计最佳实践


    能够对Web应用进行单元测试的关键之一是确保每个类都有明确的角色。在MVC架构中，这涉及将类划分为主要组件类别之一：控制器/动作、模型和视图/表示。此外，无论是否采用MVC架构，某些类型的类比其他类更容易测试。我们已经提到过这一点，但总结一下，能够独立存在的类通常更容易测试——在Java
    EE Web应用中，这通常意味着表示业务/领域对象的类以及封装了一定级别业务逻辑和处理的类。


    在我们参与的项目中，测试Web应用组件一直是反复出现的难点之一。归根结底，将组件分解为不同的架构层确实能提高测试这些组件的能力。此外，试图实现Web应用中所有组件的完全测试覆盖往往需要付出过多努力。如果你已将大部分功能分解为能够独立于Web服务器环境存在的类，那么测试这些类应该能为你所编写的代码提供令人满意的信心水平。测试的全部意义在于为你提供一定程度的信心，确保代码按预期执行，而不是追求完全覆盖。


    ## 测试策略


    当你编写常规Java代码（非Java EE相关）时，像`JUnit`这样的测试工具通常能满足大部分需求。然而，对于Java EE应用，仅靠单一工具是不可行的。例如，使用`JUnit`和`Cactus`，只能测试独立类。使用`TagUnit`，只能测试自定义标签。使用`HttpUnit`，只能测试应用提供的端到端功能。由于这些工具各自从不同角度测试软件，你不能仅依赖单一工具。测试的目的是提供软件正常工作的信心，而这仅靠单一工具是无法实现的。


    测试可以在多个层面进行，Web应用测试也是如此。在最底层，你可以使用`JUnit`和`Cactus`等工具执行单元测试。在此基础上，你可以测试稍大一些的交互类或组件组。这些也可以使用`JUnit`和`Cactus`进行测试，尽管`TagUnit`等其他工具开始提供优势。再往上，你开始测试系统的更多功能，这时功能测试工具就派上用场了。测试其中某一层固然很好，但这并不能保证整个系统能正常工作。毕竟，单元测试往往更详细、更侧重于健壮性。而功能测试则更倾向于检查功能是否按预期工作。你应该将所有测试工具视为互补的，由你来选择那些能让你对软件工作有信心的工具。


    ## Web应用兼容性测试


    作为额外的测试级别，许多开发者会测试其应用在不同服务器之间的兼容性。通过编写符合Java EE平台的代码，你（至少在理论上）可以保证应用能在任何其他兼容或符合规范的Java
    EE实现上运行。对许多人来说，这并非问题，因为他们只会在单一类型的Java EE服务器上运行应用。但对其他人，尤其是构建产品（无论是商业产品还是开源产品）的人来说，测试兼容性对其Web应用的成功至关重要。


    几年前，Java EE兼容性仍然是服务器供应商正在努力解决的问题，尤其是在规范仍在成熟的过程中。幸运的是，这种情况已大为改善，现在大多数Web应用无需修改即可在任何兼容Java
    EE的服务器上运行。然而，如果你正在构建产品，那么测试你的Web应用是否能在各种可用实现上按预期运行仍然是有价值的。例如，某个供应商实现中的小错误可能会完全阻止你的应用运行。其他时候，你可能在不知不觉中依赖了某个特定的实现特性，或者规范点的实现方式。例如，`Tomcat`团队最近更改了一些与通过Servlet调度器直接调用Servlet方式相关的默认安全设置。在升级到较新版本的`Tomcat`时，许多开发者发现他们的Web应用不再工作，因为他们曾在JSP页面中使用这种方法调用Servlet。


    我们曾参与一个项目，负责为一家大型投资银行的企业应用构建Web层。我们团队使用的应用服务器`BEA WebLogic`的许可证尚未到位，因此我们开始使用`Tomcat`构建Web层。当许可证最终到达时，由于供应商之间在JSP/Servlet规范的实现方式上存在不兼容，我们不得不将部分代码在服务器之间移植。值得庆幸的是，这些实现已经成熟了很多，大多数代码无需修改即可在不同的Java
    EE服务器上运行。


    这个故事的寓意是：即使你不打算使用其他供应商的服务器，在其他兼容Java EE的服务器上运行你的Web应用也是有益的。对于任何基于Java EE构建商业产品的人，Sun公司提供了一个验证程序，包含一套兼容性测试套件，可以测试你的应用是否正确且标准地使用了Java
    EE规范提供的API。更多详情请参见`http://java.sun.com/j2ee/verified/avk_enterprise.html`。


    ## 安全性


    虽然我们在第12章中已经讨论了安全性，但在本章关于Web应用设计和最佳实践的上下文中，仍有一些安全最佳实践值得回顾。


    ### 使用标准安全模型


    如果可能，请尽量使用标准安全模型。许多Web应用使用自己的自定义安全模型进行身份验证和授权。尽管有时这是必要的（可能是因为标准模型无法满足你的需求），但许多Web应用甚至没有与标准安全模型集成。除了利用现有技术外，使用标准安全模型还有许多其他原因。'
  raw: 'One of the keys to being able to unit test web applications is to ensure that
    each of your classes has a well-defined role. In the MVC architecture, this involves
    breaking classes into one of the main categories of components: controller/action,
    model, and view/presentation. Furthermore, and regardless of whether or not you
    adopt an MVC architecture, certain types of classes are much easier to test than
    others. We’ve already alluded to this, but to recap, classes that can stand on
    their own are generally much easier to test—within a Java EE web application,
    this usually means classes that represent business/domain objects and those classes
    that encapsulate some level of business logic and processing.


    513-0 ch14.qxd 11/17/05 8:44 PM Page 559


    C H A P T E R 1 4 ■ W E B - A P P L I C AT I O N D E S I G N A N D B E S T P R
    A C T I C E S


    **559**


    On the projects that we’ve worked on, testing web-application components has always
    been one of the areas that has come up repeatedly as being difficult. At the end
    of the day, breaking components into distinct architectural layers really does
    improve your ability to test those components. In addition, it’s often too much
    effort to try to achieve complete test coverage of all the components within your
    web application. If you’ve broken out the majority of the functionality into classes
    that can stand alone from the web server environment, testing these should provide
    a satisfactory level of confidence in the code that you’re producing. The whole
    point of testing is to provide you with a certain level of confidence that the
    code will perform as expected rather than striving to achieve complete coverage.


    **A Testing Strategy**


    When you’re writing regular Java code (not Java EE related), a testing tool such
    as JUnit generally suits most of your needs. However, for Java EE applications,
    it isn’t feasible to get by with just a single tool. For example, with JUnit and
    Cactus, it’s possible to test only stand-alone classes. With TagUnit, it’s possible
    to test only custom tags. With HttpUnit, you can test only the end-to-end functionality
    provided by the application. Because each of these tools provides a different
    angle on testing the software, you can’t get away with using only one tool. The
    purpose of testing is to provide confidence that the software works, and this
    is just not possible with a single tool.


    Testing can be performed at many layers, and this is also true of web-application
    testing.


    At the very bottom, you have the unit tests that can be performed with tools such
    as JUnit and Cactus. Moving up from this, you have slightly larger groups of interacting
    classes, or components. These can also be tested with JUnit and Cactus, although
    other tools such as TagUnit start to provide benefits. Moving further up, you
    start to test more functionality of the system, and this is where functional testing
    tools come into play. Testing one of these layers is great, but it doesn’t guarantee
    that the system as a whole will work. After all, unit tests tend to be much more
    detailed and much more focused on robustness. Functional tests, on the other hand,
    tend to be more geared toward checking that the functionality works as expected.
    You should view all of these testing tools as complementary, and it’s up to you
    to pick the ones that give you the confidence that your software works.


    **Compatibility Testing Web Applications**


    As an additional level of testing, many developers test their applications for
    compatibility between servers. By writing to the Java EE platform, you are (at
    least in theory) guaranteed that your application will work on any other compliant
    or compatible Java EE implementation. For many people, this just isn’t an issue
    because they’ll run their applications on only a single type of Java EE server.
    For others, particularly those building products (regardless of whether those
    products are commercial or open source), testing compatibility can be essential
    to the success of their web applications.


    A few years ago, Java EE compatibility was still very much something that was
    being worked on by the server vendors. This was especially true when the specifications
    were still maturing. Fortunately, this situation has improved considerably and
    now most web applications will run as is on any Java EE-compatible server. However,
    if you’re building products, then there’s still some mileage in testing that your
    web application does function as expected on some of the various implementations
    available. For example, small bugs in one vendor’s


    513-0 ch14.qxd 11/17/05 8:44 PM Page 560


    **560**


    C H A P T E R 1 4 ■ W E B - A P P L I C AT I O N D E S I G N A N D B E S T P R
    A C T I C E S


    implementation may stop your application from working completely. Other times,
    you may have been unknowingly relying on a specific implementation feature or
    just the way that a specification point has been implemented. As an example, the
    Tomcat team has recently changed some of the default security settings related
    to the way that servlets could be called directly through the servlet dispatcher.
    When upgrading to a newer version of Tomcat, many developers found that their
    web applications no longer worked because they had used this method of calling
    servlets within their JSP pages.


    We were involved on a project in which we were responsible for the web tier of
    an enterprise application for a large investment bank. The licenses for the application
    server our team was using, BEA WebLogic, hadn’t yet arrived, so we started building
    the web tier with Tomcat. When the licenses finally did arrive, we literally had
    to port some of the code between the servers because of incompatibilities in how
    the JSP/Servlet specifications had been implemented between the vendors. Thankfully,
    the implementations have matured a great deal and most code can be run as is on
    different Java EE servers.


    The moral of the story is that it’s beneficial to run your web applications on
    other Java EE–compatible servers, even if you aren’t planning to use one from
    another vendor. For anybody building commercial products based on Java EE, Sun
    has a verification program consisting of a compatibility-testing suite that can
    test whether your application makes correct and standard use of the APIs provided
    by the Java EE specification. See http://java.sun.com/


    j2ee/verified/avk_enterprise.html for more details.


    **Security**


    Although we covered security in Chapter 12, there are some security best practices
    worth recapping within the context of this chapter about web-application design
    and best practices.


    **Using the Standard Security Model**


    Try to use the standard security model if possible. Many web applications use
    their own custom security model for authentication and authorization. Although
    this is sometimes necessary, perhaps because the standard model doesn’t meet your
    requirements, many web applications don’t even integrate with the standard security
    model. Apart from using the available technology, there are many reasons for using
    the standard security model.'
