    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    **511**


    For the password cookie, you use an encodeString() method from the StringUtil.java
    class. This is a simple method that encrypts the password cookie’s value by using
    the sun.


    misc.BASE64Encoder():


    public static String encodeString(String str) throws IOException {


    sun.misc.BASE64Encoder encoder = new sun.misc.BASE64Encoder(); String encodedStr
    = new String(encoder.encodeBuffer(str.getBytes())); return (encodedStr.trim());


