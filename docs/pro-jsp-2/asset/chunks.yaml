    Form-Based Authentication


    To understand how form-based authentication works, let’s look at the five steps
    that occur in a successful login. Figure 12-5 shows those steps again, along with
    numbered keys that will guide the discussion that follows the figure.


    **Figure 12-5.** *When a client requests a protected page, the client and server
    work together to* *provide the resource only if the client is authenticated and
    authorized to view the resource.*


    Here are the steps in the interaction between a client and server when the client
    attempts to access a protected resource. Each numbered item in the following list
    corresponds to a number in Figure 12-5.


    **1.** A user requests a protected resource (defined as protected in web.xml)
    by clicking a link, selecting a bookmark, or typing in a URL.


    **2.** The login form associated with this protected resource is sent to the client,
    and the container stores the URL that the client tried to access. This is to say
    that the container remembers that the client originally requested /do/mainMenu.


    ■**Tip** The current servlet API doesn’t allow you to get the URL the user originally
    tried to access. However, some servlet containers will store this value as a hidden
    field in the form. View the servlet container documentation to see whether yours
    does.


