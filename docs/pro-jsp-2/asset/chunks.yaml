    with errors that don’t warrant informing the user and forwarding to a separate
    error page. In this example, the <fmt:parseDate> action from the Internationalization
    and Formatting tag library throws an exception if an invalid date is entered and
    if it does, the exception is stored in the exception variable. Should an exception
    be thrown during execution, it can be caught and tested for, and a default value
    will be used instead without informing the user of the internal error.


    Note that the scope of the var attribute will always be page, and should a java.lang.


    Throwable exception not be thrown by a nested action, then the var variable won’t
    exist. If a value for the var variable isn’t supplied, the java.lang.Throwable
    won’t be stored.


    Conditionals


    The content delivered by dynamic JSP-based web applications is often dynamic in
    nature because its generated content is dependent on the values of ever-changing
    application data.


    Until the release of the JSTL, JSP page authors were forced to provide such functionality
    via Java scriptlets containing if statements, which isn’t just ugly, but prone
    to errors as well. The conditional tags provided by the JSTL core tag library
    are far better suited for this purpose.


    **The <c:if> Action**


    The first and simplest of the conditional actions is <c:if>, which decides to
    evaluate its body content depending on the value of an evaluated Boolean attribute.
    If the result of the attribute expression evaluates to true, the action’s body
    content will be processed in the standard way by the JSP container and any output
    will be returned to the current JspWriter.


    Let’s use a really simple example to produce some dynamic content based on the
    current hour of the day. Listing 4-5 shows a JSP page that displays a different
    message based on the hour of the day.


    **Listing 4-5.** *core_if.jsp*


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <%@ page import="com.apress.projsp.CalendarBean"%>


    <jsp:useBean id="cal" class="com.apress.projsp.CalendarBean"/> The time is currently
    : <BR><BR>


    ![Image 42](index-182_1.png)


