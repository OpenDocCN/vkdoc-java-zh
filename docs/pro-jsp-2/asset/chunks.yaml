    tomcat/tomcat-5.5-doc/jndi-datasource-examples-howto.html **Object/Relational
    Persistence Frameworks**


    O/R persistence frameworks make it easy to store and retrieve Java objects in
    a relational database. O/R frameworks come in a variety of shapes and sizes, but
    generally speaking, an O/R


    framework is a class library and a small set of development tools that support
    the storage and retrieval of Java objects in a relational database. The following
    are the main advantages of using an O/R framework over JDBC:


    • **Easier to program**: With an O/R framework, you can easily store and retrieve
    your Java objects without writing a lot of repetitive boilerplate code to map
    fields to and from SQL queries.


    • **Better cross-database support**: O/R frameworks make it easier for you to
    support different vendors’ databases because the framework handles query creation
    and data-type mapping. Some frameworks will even generate database creation (DDL)
    scripts for dif-


    513-0 ch09.qxd 11/16/05 12:03 PM Page 369


    C H A P T E R 9 ■ D ATA A C C E S S O P T I O N S F O R W E B A P P L I C AT I
    O N S


    **369**


    • **Better performance**: O/R frameworks often include database connection pooling,
    object caching, and other performance-enhancing features.


    There are a number of ways to use an O/R framework. The authors of the open-source
    Hibernate O/R framework wrote about four approaches to O/R persistence. Table
    9-1 describes each approach. Most of the O/R frameworks support these four approaches,
    so let’s take a look at each one.


    **Table 9-1.** *Approaches to Object-Relational Persistence in the Hibernate Framework*
    **Name**


    **Description**


    Top-down


    Starting with an existing set of Java objects, you develop a mapping-specification
    file that describes your objects and their relationships, use tools provided by
    the O/R framework to generate a DDL script to create database tables to store
    your objects, and use the O/R frameworks API to store and retrieve your objects
    in the database.


    Bottom-up


    Starting with an existing database schema, you develop a mapping-specification
    file that describes your tables and their relationships, use tools provided by
    the O/R framework to generate your Java objects, and use the O/R frameworks API
    to store and retrieve your objects in the database.


    Middle-out


    In this approach you start by writing a mapping specification that describes your
    objects and their relationships, use tools provided by the O/R framework to generate
    both your Java objects and your DDL script, and use the O/R frameworks API to
    store and retrieve your objects in the database.


    Meet-in-the-middle


    Take this approach if you already have an existing set of Java objects and an
    existing database schema. All you have to do is write a mapping specification
    that maps your Java objects to your database tables, and then you’re ready to
    use the O/R frameworks API to store and retrieve your objects in the database.


    O/R persistence frameworks are popular among Java web-application developers,
    and there are many choices, both commercial and open source. Popular commercial
    O/R frameworks include TopLink, now owned by Oracle, and CocoBase, developed by
    Thought Inc.


    Some open-source O/R frameworks are Castor, Hibernate, and Jakarta OJB.


    Later in this chapter, you’ll use the open-source Hibernate framework because
    it’s well supported and well documented. This chapter will give you enough information
    to evaluate the strengths and weaknesses of the various other O/R frameworks for
    yourself.


