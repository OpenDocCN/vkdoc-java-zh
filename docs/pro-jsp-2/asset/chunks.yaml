    **Tiles 控制器**


    Tiles 控制器对于改进支持 Tiles 的应用程序的架构非常有帮助。它们在当前的出版物中并未得到太多关注，但却是一个非常实用的特性。其核心思想是，Tiles
    控制器旨在为在 tile 上呈现数据做准备。您可以将其视为一个微型 action。然而，这些控制器并非用于确定应用程序流程；那是 ActionServlet
    的职责。如果您正在开发一个门户网站，或者您的 tiles 需要它们自己的自定义数据，那么您绝对应该考虑使用一个。


    当然，通过一个例子会更容易理解。因此，我们为 struts-resume 创建了一个功能，用于统计当前活动的会话数，并将其显示为“当前用户”。我们首先创建了一个实现
    ServletContextListener 和 HttpSessionListener 的 UserCounterListener。这个监听器在新会话创建时递增一个应用程序范围的变量，并在会话销毁时递减同一个变量。该源文件位于
    struts-resume 的 src/web/org/appfuse/webapp/listener 目录下。我们使用了 XDoclet 的 `@web:listener`
    标签在 web.xml 中为这个类创建了一个 `<listener>` 条目。


    为了实现一个 Tiles 控制器，我们创建了一个实现 Controller 接口及其方法的 UserCounterController 类：


    public final class UserCounterController implements Controller {


    /**


    * 此方法演示了使用 Tiles 控制器获取此应用程序“当前用户”计数器的简单示例。


    *


    * @param tileContext 当前 tile 上下文


    * @param request 当前请求


    * @param response 当前响应


    * @param servletContext 当前 Servlet 上下文


    */


    public void perform(ComponentContext tilesContext,


    HttpServletRequest request,


    HttpServletResponse response,


    ServletContext servletContext)


    throws ServletException, IOException {


    // 从应用程序上下文中获取当前用户数


    String userCounter =


    (String) servletContext.getAttribute(UserCounterListener.COUNT_KEY);


    // 将此数字添加到请求中以供显示


    request.setAttribute(UserCounterListener.COUNT_KEY, userCounter);


    }


    }


    您可以看到 `perform()` 方法的签名与 Action 类的签名类似——只是没有 ActionMapping 或 ActionForm。ComponentContext
    是一个类似于请求或会话作用域的作用域；然而，它特定于 Tiles，用于存储其配置信息。


