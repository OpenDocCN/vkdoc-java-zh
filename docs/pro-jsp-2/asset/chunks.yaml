    **260**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    Using a Template


    With the JSP page in Listing 6-3 saved as part of a web application, it can be
    used with the


    <jsp:include> tag as follows:


    <jsp:include page="box.jsp">


    <jsp:param name="color" value="#314289"/>


    <jsp:param name="title" value="Professional JSP 2.1"/>


    <jsp:param name="body" value=" Professional JSP 2.1 is now out. It covers all
    of the new features of the JSP 2.1 specification, backed up by real-world examples
    that you can take and adapt to your own projects.


    <br><br>


    [


    <a href=\"projsp21.html\">More information...</a>


    ]"/>


    </jsp:include>


    Note that the value of the page attribute is the appropriate absolute or relative
    path to the included file. In the preceding snippet, the page that included box.jsp
    is located in the same directory as box.jsp. If box.jsp is not located in the
    same directory as the JSP page that includes it, you would need to change the
    path so that box.jsp could be located.


    As this sample shows, templating is a great way to separate content and the presentation
    of that content. However, from a page author’s perspective, using a fairly low-level
    construct can look a little raw. Another point to note is that as you’re passing
    the customized content as parameters to the included JSP, you have to ensure that
    you properly escape any special characters such as double quotes. Although this
    has worked in the past and will continue to work in the future, there is now a
    better way to achieve the same outcome. That better way is a feature called tag
    files.


    **Templating with Tag Files**


    As you’ve seen, tag files are small snippets of content that have been abstracted
    out of the main page and wrapped up for reuse. In addition, tag files can be customized
    by attributes at runtime. We will first look at how to create tag files, and then
    later in the chapter we will look at various ways to use attributes.


    Defining a Customizable Template


    Using Listing 6-3 as a starting point, Listing 6-4 shows how to implement a tag
    file to represent the same template.


    **Listing 6-4.** *box.tag*


    <%@ attribute name="color" required="true" rtexprvalue="false" %>


    <%@ attribute name="title" required="true" rtexprvalue="false" %>


    <table width="320" bordercolor="${color}" border="1" cellpadding="4"


    cellspacing="0">


    <tr bgcolor="${color}" color="#ffffff">


    513-0 ch06.qxd 11/17/05 8:41 PM Page 261


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **261**


    <td class="boxHeader" nowrap>


    ${title}


    </td>


    </tr>


    <tr>


    <td valign="top" class="boxText">


    <jsp:doBody/>


    </td>


    </tr>


    </table>


    Although the actual content and intent of the tag file is the same as that of
    box.jsp, there are three subtle differences.


    The first is the way that attributes are defined. Rather than obtaining values
    through the normal request implicit object, the attributes for a tag file are
    declared at the top of the file by using the attribute directive, a directive
    that is valid only in tag files. Using this directive in a tag file indicates
    to the JSP container that the custom tag used to access the tag file can accept
    an attribute with the specified name:


    <%@ attribute name="color" required="true" rtexprvalue="false" %>


    <%@ attribute name="title" required="true" rtexprvalue="false" %> There are some
    other directives that are valid only within tag files. Like the JSP page directive,
    these directives allow aspects of the tag file to be configured. For more information
    about these directives, see Chapter 1.


    In this example, we’ve declared two required attributes—one for the color of the
    box, and one for the title. Because we want the user to specify the values of
    the attributes when writing the page, we prevent the use of request-time expressions
    by setting the value of rtexprvalue to false. This means that the values for the
    color and title attributes can be only static strings, such as #000000 and My
    title, respectively, rather than JSP expressions.


    The second difference is in the way that the attributes are accessed within the
    tag file. To access an attribute in a tag file, all that is needed is a simple
    EL expression. For example, to access the value of the color attribute, we use
    the expression ${color}, with the result being that the value of the color attribute
    is substituted at runtime. Notice that we don’t need to look up the value as a
    parameter with the ${param.color} syntax as we did in Listing 6-3:


    <tr bgcolor="${color}" color="#ffffff"> The final difference is that you no longer
    have to declare an attribute for actual content that is to be displayed in the
    box. Instead, you’ll use the body content of the custom tag to single out this
    content, which is specified between the start and end tags. To access the content,
    you use the new <jsp:doBody> tag that is again only valid in tag files:


    <td valign="top" class="boxText">


    <jsp:doBody/>


    </td>


    All that the <jsp:doBody> tag does is ask the JSP container to invoke (or evaluate)
    the body content that was passed to the tag and in this case write it out to the
    page. An additional benefit


    513-0 ch06.qxd 11/17/05 8:41 PM Page 262


    **262**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    of passing the text as the body of the tag is that you can write the body content
    as is, without having to escape characters as we did in the code snippet in the
    “Using a Template” section earlier.


    Using a Customizable Template


    With the template defined, you can now use the tag file in the same way that you
    saw previously. That is, you import the tag library corresponding to the directory
    in which you saved the tag file. For this example, enter and save Listing 6-4
    as box.tag in the WEB-INF\tags directory.


    You then import the tag library that corresponds to this directory by using the
    following taglib directive:


    <%@ taglib prefix="tags" tagdir="/WEB-INF/tags" %> As previously discussed, the
    container looks for all files that have a .tag extension in the specified tagdir
    directory and makes them available to the page as custom tags with the specified
    prefix. Once imported through the taglib directive, the tag can be used as follows:


    <tags:box>


    <jsp:attribute name="color">#314289</jsp:attribute>


    <jsp:attribute name="title">Professional JSP 2.1</jsp:attribute>


    <jsp:body>


    Professional JSP 2.1 is now out. It covers all of the new features of the JSP


    2.1 specification, backed up by real-world examples that you can take and adapt
    to your own projects.


    <br><br>


    [


    <a href="projsp21.html">More information...</a>


    ]


    </jsp:body>


    </tags:box>


    As this example shows, the <box> tag is used in the same way as any other tag—by
    specifying the prefix and the name of the tag. In a similar way to how the parameters
    were passed to the included JSP page, the attributes for this tag are passed using
    the <jsp:attribute> tags, nested within the start and end <box> tags. As for the
    content that is being displayed within the box, it’s passed as a section of JSP
    code and wrapped inside the <jsp:body> tags, which are again nested between the
    start and end <box> tags. At runtime, these attributes and the body content are
    passed to the tag and substituted into the template, as you would expect.


    Compared to the original included JSP fragment (Listing 6-3), the actual usage
    of this tag isn’t all that different. After all, you have the same structure,
    with attributes being passed in a rather verbose way. You could certainly use
    include directives or actions to create the same view, but using tag files provides
    a much better way to create dynamic presentations.


    A minor example of the difference between using an <include> action and a tag
    file is that tag files can use attributes to pass data to the tag code:


    <tags:box color="#314289" title="Professional JSP 2.1"> Professional JSP 2.1 is
    now out. It covers all of the new features of the JSP


    2.1 specification, backed up by real-world examples that you can take and adapt
    to your own projects.


    513-0 ch06.qxd 11/17/05 8:41 PM Page 263


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **263**


    <br><br>


    [


    <a href="projsp21.html">More information...</a>


    ]


    </tags:box>


    In this example, the attributes are passed through as true attributes of the XML
    tag rather than as nested elements. This usage is cleaner and more concise, which
    makes it easier to understand what is happening on the page. Also, because the
    attributes are being passed in this way, the content to be displayed no longer
    needs to be wrapped inside a <jsp:body> tag; the content is now truly the body
    of the tag.


    Both methods of passing attributes are permitted by the JSP specification, although
    some syntax rules exist. If the attributes are passed by using the <jsp:attribute>
    tag, any body content must be wrapped inside a <jsp:body> tag. The reason behind
    this is that with the extra


    <jsp:attribute> tags, the JSP container can’t guess what you want the body content
    of the tag to be, and therefore you have to explicitly demarcate it. If, on the
    other hand, you specify all attributes as attributes of the XML tag, the body
    content of the tag is implicitly taken to be anything that falls between the start
    and end tags.


    **Attributes**


    As earlier examples of the JSTL tags have demonstrated, it’s possible to customize
    the use of the custom tag by using attributes. Without this ability, you would
    have to build a separate JSP file, or a separate tag for every different piece
    of content that you wanted to put in the template.


    Prior to the JSP 2.0 specification, there was only a single way to specify attributes:
    inside the opening tag as a normal tag attribute. In JSP 2.1, however, you can
    specify attributes by using nested tags.


    Specifying Attributes Within the Tag


    This is the traditional way of specifying attributes for custom tags, and as you’ve
    seen in the JSTL examples, it means that those attributes are written in the same
    way that attributes for other XML tags are written, for example:


    <tags:box title="My Title"/>


    Here, an attribute called title has been provided for the tag as a name and value
    pair and is written inside the tag itself. As with XML attributes in general,
    the value of an attribute must be wrapped inside quotation characters. This example
    uses double quotes, but there’s nothing stopping you from using single quotes
    instead. This flexibility is particularly useful if the value of the attribute
    contains characters that need to be escaped, such as double quote characters.


    Specifying Attributes as Nested Tags


    The other mechanism for specifying attributes is the <jsp:attribute> tag. Using
    the same example, this can now be written in one of the following ways:


    <tags:box>


    <jsp:attribute name="title" value="My Title"/>


    </tags:box>


    513-0 ch06.qxd 11/17/05 8:41 PM Page 264


    **264**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    or


    <tags:box>


    <jsp:attribute name="title">My Title</jsp:attribute>


    </tags:box>


    One of the biggest problems with passing attributes to XML tags is that often
    attributes with large values make the tag awkward to read. Therefore, the new
    syntax can be used instead.


    Both syntaxes are equivalent, and although the traditional syntax is certainly
    the most concise, the newer syntax improves the readability with particularly
    long attribute values.


    Required or Optional


    The core elements of any attribute are its name and its value. However, when using
    custom tags, various characteristics can be configured. The first is to define
    whether an attribute is required or optional. In other words, this allows you
    to state whether an attribute and its value must be specified for any given custom
    tag. This is useful in many situations because it forces you to specify values
    for attributes.


    Looking at the template example, you may decide that all boxes should have a title.
    This isn’t something that you can achieve easily with dynamically included JSP
    files, but with custom tags it’s trivial. When an attribute is marked as required
    and is omitted, a fatal translation error will occur, indicating that the attribute
    hasn’t been specified. By using custom tags, you can force users to specify a
    title in this example.


    Static or Dynamic (Request-Time Expressions)


    Another characteristic that is commonly defined for attributes is whether their
    values can be the result of a request-time expression. In the JSTL examples, the
    value of many of the attributes was simply a static string passed to the tag.
    For example, looking at the JSTL <forEach> tag that provides iteration over a
    collection, you can see that the name of the variable with which you’ll access
    each item in the collection (myVar) is supplied to the tag as a static string
    through the var attribute:


    <c:forEach var="myVar" items="${myItems}">


    <c:out value="${myVar.name}"/>


    </c:forEach>


    This is known as a static attribute because its value is statically defined in
    the JSP page.


    A dynamic attribute, or a request-time expression as it’s formally known, is written
    using one of the following methods:


    • The JSP EL, such as ${myItems}


    • Java code, such as <%= pageContext.findAttribute("myItems") %> In either case,
    if an attribute is marked as supporting request-time expressions, it means that
    expressions can be used to specify the value of the attribute. In the previous
    JSTL example, the actual collection over which the tag should iterate is being
    passed to the tag at request-time (runtime) by using an EL expression.


    Now let’s look at how you can build a tag file equivalent to the dynamically included
    JSP


    file you saw earlier.


    513-0 ch06.qxd 11/17/05 8:41 PM Page 265


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    **265**


    **Why Use Tag Files?**


    As these examples have demonstrated, it’s possible to wrap up content and reuse
    it elsewhere.


    Because this has always been possible with included JSP files, you might be asking
    why tag files have been introduced into the JSP specification and what their benefits
    are.


    First of all, there are the technical aspects. Tag files provide a much cleaner
    way to build and subsequently use templates on JSP pages. However, there are some
    other, softer, benefits that arise from using tag files over JSP include directives.
    Essentially, using custom tags gives you the ability to provide a natural interface
    to the content and functionality that you would like people to use and reuse.
    Having a custom tag called box, with the appropriate attributes, is much more
    understandable than having a generic JSP include. Also, naming custom tags appropriately
    provides page authors and developers maintaining the page with a much better idea
    of a tag’s intent, which in turn makes it easier to use, read, understand, and
    maintain.


    Using tag files to build templates is a great way to separate the content from
    the presentation of that content, and this makes it a natural progression from
    simply mixing the two together in JSP pages. However, there will be times when
    you want to encapsulate more than just pure presentation into a custom tag. Perhaps
    you have some Java code that you would like to wrap up and make reusable. Generally,
    any code that can appear in a JSP page can appear in a tag file. However, the
    best practices about keeping Java code out of JSP pages are also applicable to
    tag files. To wrap up logic that contains more code than content, simple tags
    are the answer.


    **Using Simple Tags**


    Previous versions of the JSP specification have supported the notion of building
    custom tags with Java code for some time. The JSP 2.1 specification simplifies
    this process greatly through the use of **simple tags**. When using tag files,
    the content and logic that you would like to reuse is defined using normal JSP
    syntax, thereby providing an easy way to wrap up reusable functionality and make
    the process of building tags available to those people who may not necessarily
    know how to program in Java. However, with simple tags, the reusable functionality
    is encapsulated within a Java class that implements a specific interface. As we
    said earlier, this class is called the tag handler.


    The characteristics of the tag, such as its name and a list of any attributes
    that it takes, are then defined in a tag library descriptor (TLD) file. When the
    tag is finally used on the page, an instance of the tag handler class is created
    and its methods are called to execute the reusable functionality.


    Ultimately, this method of writing tags is more complex than building tag files,
    but it does provide a much greater level of flexibility and control over the functionality
    that a tag file can provide. Before you look at how to build a simple tag, take
    a look at the interface that a simple tag handler must implement.


    **The SimpleTag Interface**


    The SimpleTag interface defines the basic contract between simple tags and the
    JSP page on which they are used. The interface itself serves two purposes:


    • It provides the simple tag with information about its execution environment.


    • It provides a method for executing the functionality encapsulated by the simple
    tag handler.


