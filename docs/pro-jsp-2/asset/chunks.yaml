    Building the Cookie Tag Handler


    In this section, you’ll build a custom tag that looks up a named cookie and makes
    it available as a scripting variable. Let’s look first at the tag handler, which
    is shown in Listing 8-1\. In this case, you’ll extend the classic TagSupport class
    because this makes it easier to gain access to some of the HTTP-specific classes
    that you need to access cookies.


    ■**Note** Remember, the Tag interface relies on features provided by the Java
    Servlet API, unlike the SimpleTag interface, which relies only on the JSP API.


    **Listing 8-1.** *CookieTag.java*


    package com.apress.projsp;


    import javax.servlet.http.Cookie;


    import javax.servlet.http.HttpServletRequest;


    import javax.servlet.jsp.JspException;


    import javax.servlet.jsp.tagext.TagSupport;


    public class CookieTag extends TagSupport {


    private String name;


    public void setName(String s) {


    this.name = s;


    }


    public int doStartTag() throws JspException {


    // find the current cookies


    HttpServletRequest request;


    request = (HttpServletRequest)pageContext.getRequest(); Cookie cookies[] = request.getCookies();


    // now try to find the named cookie


    Cookie cookie = getCookie(cookies, name);


    if (cookie != null) {


    // the cookie was found so evaluate the body content


    pageContext.setAttribute(id, cookie);


    return EVAL_BODY_INCLUDE;


    } else {


    // the cookie wasn''t found so skip the body content


    return SKIP_BODY;


    }


    }


    private Cookie getCookie(Cookie cookies[], String name) {


    if (cookies != null) {


    for (int i = 0; i < cookies.length; i++) {


    if (cookies[i].getName().equals(name)) {


    return cookies[i];


