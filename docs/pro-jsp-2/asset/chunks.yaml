- fmt: '# JavaServer Pages Syntax Reference


    This appendix describes the syntax for JavaServer Pages 2.1. The intention is
    to provide you with a reference that is complete and useful, but more compact
    than the specification. JSP specifications are available by visiting `http://java.sun.com/products/jsp/`.


    This appendix looks in turn at the following:


    - Various preliminary details: the notation we''re using, how URLs are specified
    in JSP code, and the various types of commenting you can use.

    - The JSP **directives**: the `page`, `taglib`, and `include` directives.

    - JSP **scripting elements**: declarations, scriptlets, and expressions.

    - JSP''s **standard actions** including the `<jsp:useBean>`, `<jsp:setProperty>`,
    `<jsp:getProperty>`, `<jsp:include>`, and `<jsp:forward>` actions.

    - A brief review of the syntax for using **tag libraries**.

    - The **implicit objects** that are available within a JSP such as `request`,
    `response`, `session`, and `application`. You''ll examine these in more detail
    in Appendix B.

    - Various predefined request and application **attributes** that you may find
    useful.


    ## Preliminaries


    Before you get stuck in the details, here are a few miscellaneous observations.


    ### Notation


    A word on the notation used in this appendix:


    - Attribute names are shown in regular text. These names are used exactly as shown.

    - **Bold** shows the default value of an attribute. Attributes with default values
    are optional, if you''re using the default. Sometimes, where the default value
    is a little complicated, we use **default** to indicate that the default is described
    in the following text.

    - When an attribute has a set of possible values, those are shown delimited by
    "|".

    - Nondefault attribute values are shown in regular text. In general, if several
    possible values are shown, these are the values to use in your JSP. In the following
    snippet, `true` or `false` are the only valid values for `session`. In other cases,
    the value shown is a sample that you would replace with the appropriate value.
    For example, the sample value used with `import` would be replaced with the actual
    classes to be imported, such as `java.util.Vector` or `java.io.*`. You should
    have little difficulty distinguishing which values are actual values and which
    are samples.


    ```

    import="package.class, package.*, ..."

    session="true|false"

    ```


    ### URL Specifications


    URLs specified within JSP tags can be of two sorts:


    - **Context-relative** paths start with a "/"; the base URL is provided by the
    web application to which the JSP belongs. For example, in a web application hosted
    at `http://localhost:8080/projsp-appendixA/`, the URL `/pageurl.jsp` would be
    equivalent to `http://localhost:8080/projsp-appendixA/pageurl.jsp`.


    ---


    This could also be done with the JSTL, but we prefer the shorter method with less
    typing, so we''re using Struts tags. You''ll notice the second half of this page
    is used to display success messages. We think it''s important to know how to create
    and display success messages in an application, so we''ll show you how easy it
    is. Essentially, all you need do is create a new messages object and add one or
    more messages to it. It''s very similar to the `ActionErrors` class (it''s actually
    its superclass), so the creation process is pretty much the same:


    ```

    ActionMessages messages = new ActionMessages();


    // execute business logic to add a new record


    // add success message to the request


    messages.add(ActionMessages.GLOBAL_MESSAGE, new ActionMessage("record.added"));

    ```


    While we haven''t yet used declarative exception handling with Struts on any real-world
    projects, we''ve implemented it in the `struts-resume` application where it was
    very useful. If you have an exception framework that works for your Struts-based
    application, we also invite you to chime in on the `struts-dev` mailing list and
    suggest improvements. The `struts-resume` application gives an example of using
    declared exceptions, and you can also find an example in the `struts-example`
    application that ships with Struts.


    ## Summary


    One of the most frustrating things we''ve experienced in software development
    is reading about how to do something, but not having any examples. Design patterns
    are good only if they work when implemented. We believe in keeping it simple,
    and we believe that Struts makes JSP and servlet development simpler. We know
    that Struts can be overwhelming at first, but its rewards are awesome. Using Struts
    will ultimately lead you to understand web applications better and will reduce
    your development time as you use it more.


    Using the tools and sample applications available for Struts can also be overwhelming.
    The only way to truly learn what is best is to try them and learn what is best
    for you. If you send a message to the Struts user mailing list about something
    non-Struts-related (for example HTML, JavaScript, persistence), chances are you''ll
    get a whole gamut of different responses and opinions. However, it''s a very active
    community, and chances are you''ll get your questions answered. Hopefully, we''ve
    given you some guidance in what works well with Struts, and perhaps our sample
    application will show you how XDoclet makes generating code and other items much
    easier. We also invite you to download and use Dave Johnson''s Roller Weblogger
    software—it''s open source and has a lot of good Struts code in it. It also uses
    XDoclet and is a fairly robust application. More information on Roller can be
    found at `http://www.rollerweblogger.org`.


    Above all, we advise not trying to reinvent the wheel with anything related to
    web applications. Chances are that someone has already tried to do what you''re
    doing. Spending the time to research your problem and solutions may save you a
    lot of time down the road. Using mailing list archives and Google can solve a
    great number of problems. Open-source projects are great because you get a whole
    team of developers working with you and helping you use their frameworks. It helps
    to get involved with the technology you''re using as well. If you''re using Struts,
    subscribe to the `struts-user` mailing list and watch your inbox fill up, or subscribe
    to the digest list for only a couple of e-mails per day. Remember that anything
    possible in a simple JSP and servlet application is possible when using Struts.
    Struts just makes it easier, as we''re sure any web-based MVC framework does.
    Likewise, anything that is possible on an HTML page or with a servlet is possible
    in a JSP page.


    Another reason we really like using Struts is because of the tools that have appeared
    to automate the development process. We''re comfortable enough with developing
    all the components that we can check the generated code to make sure everything
    is fine. You wouldn''t want to use a code-generator that produces spaghetti code!
    The Struts Roadmap includes enhanced support for these tools as well as embraces
    newer technologies such as JSF and the JSTL.


    We''ll just note a few tips here as gentle reminders of what we covered in the
    chapter:


    - If you need validation in your Struts application, use the Validator. If you''re
    using the Validator, use XDoclet to generate your `validation.xml`.

    - If you need templating in a Struts application, use Tiles. If you''re using
    Tiles, use definitions and use them as forwards in your `struts-config.xml`.

    - Use container-managed authentication for login—then you''ll have roles available
    to show or hide tiles and to limit access to certain actions and links.

    - Use CSS rather than tables for page layout. It will reduce the size of your
    pages, and it''s easier to develop with in the long run.'
