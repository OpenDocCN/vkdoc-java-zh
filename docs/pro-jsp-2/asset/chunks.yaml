    **206**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    these values are converted as necessary and validated, the JSF implementation
    updates the model (the FlightSearch object) by calling the set method for the
    property.


    After the model is updated, the life cycle advances to the render phase, and the
    searchResults.jsp page (Listing 5-3) is rendered. At this point, the FlightSearch
    object has some data, and so when the page is rendered, the JSF implementation
    calls the get methods for the properties that the page displays, and these values
    are used in the rendering and display of the page.


    Notice that by using the same simple #{flight.origination} syntax, the JSF implementation
    calls different code depending on the current phase of the JSF life cycle. Note
    also that the action does not depend on the tag type. The action taken for the
    <h:inputText> tag can be either a get or set method of the property, regardless
    of the fact that the <h:inputText> tag renders as an HTML <input> tag.


    Accessing List, Array, and Map Property Types


    You can also easily access bean properties that are of type List, array, and Map.
    You can access an element of the List or array by using a value-binding expression.
    For example, earlier we presented a possible List property added to FlightSearch:
    public class FlightSearch {


    List times;


    //...


    }


    After the bean is initialized, we could access the first value in the list by
    using any of the following expressions:


    #{flight.times["1"]}


    #{flight.times[''1'']}


    #{flight.times[1]}


    #{flight.times["var"]}


    #{flight.times.var}


    #{flight.times[var]}


    ■**Note** For a complete list of valid expression forms, see Section 5.1.2 of
    the JSF specification.


    As mentioned earlier, you can chain expressions together to create a value-binding
    expression. The last expression following the dot, or inside the brackets, must
    evaluate to an integer or must be convertible to an integer. When updating the
    model, the JSF implementation will attempt to set the element at the given index.
    If the given index does not exist, a PropertyNotFoundException will occur. When
    reading from the model, the implementation will call the get method to get the
    element at the given index. Again, if the index does not exist, a PropertyNotFoundException
    will occur.


    One difference between value-binding expressions for List and Map objects is that
    you can use bracket notation to create dynamic value-binding expressions. Suppose
    you had an object with some intProperty that evaluates to an integer and you tried
    this syntax:


    513-0 ch05.qxd 11/1/05 7:18 PM Page 207


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    **207**


    flight.times.object.intProperty


    The expression would cause an evaluation error. The JSF implementation expects
    object to be a property of times, which is not the case. However, you can use
    a mixed form with both dot and bracket notation:


    flight.times[object.intProperty]


    When this expression is evaluated, the object.intProperty expression evaluates
    to an integer, which is then used to access the value stored in the List at that
    index. The same syntax can be used when accessing Map entries.


    Given the Map property of FlightSearch:


    public class FlightSearch {


    Map airportNames;


    //...


    }


    any of the following expressions will cause the Map methods get(key) or set(key,
    value) to be called, depending on which life-cycle phase is currently being processed:
    flight.airportNames.key


    flight.airportNames[key]


    flight.airportNames["key"]


    **Using Method-Binding Expressions in JSP Pages**


    Just as you can bind managed bean properties to expressions in the JSP page, you
    can also bind managed bean methods to expressions. You use method binding when
    setting the attribute values for actions, validators, action listeners, and value
    change listeners.


    The syntax for method-binding expressions is the same as the syntax for value-binding
    expressions. You can use either dot or bracket notation. As with value-binding
    expressions, every expression in the chain, except the last expression, is evaluated
    as an object reference.


    The last expression in the chain must be a method name of a method. The method
    signature must follow a specific pattern, which depends on whether the method
    binding is used for an action, a validator, an action listener, or a value change
    listener.


    You will see how to use method-binding expressions for actions in the “Controlling
    Page Navigation” section later in this chapter. You will also look at using method-binding
    expressions for validators in the “Validating Input” section. Value change listeners
    and action listeners are covered in the “Event Handling” section later in the
    chapter.


