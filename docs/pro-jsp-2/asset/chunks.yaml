    **Summary**


    After covering simple tags in the previous chapter, we moved on to discuss the
    traditional methods for building custom tags, now called classic tags, in this
    chapter. The key differences between classic and simple tags are the interface
    that tag handlers must implement and the life cycle requirements around tag handler
    pooling and reuse. The complexity associated with these two differences is the
    primary reason simple tags were introduced into the JSP


    specification.


    We started our tour of classic tags by examining the Tag interface and the associated
    tag life cycle, and we presented a simple example to provide a direct comparison
    between a classic tag and a simple tag. Next, we covered how to customize classic
    tags with attributes by implementing a <select> tag that generated an HTML select
    control from a list of items. Then we showed the inherent problems in building
    such tags and introduced the DynamicAttributes interface as a way to help solve
    such problems. In essence, the DynamicAttributes interface allows fine-grained
    customizations to be made to tags in which the set of attributes is not fully
    known at development time.


    The next topic was the IterationTag interface, which provides a way to evaluate
    and reevaluate body content repeatedly. This functionality is easily achievable
    with simple tags, although at times slightly more flexibility may be required—for
    example, when iterating over a tree-like structure.


    Finally, we discussed one of the most powerful features of custom tags: the BodyTag
    interface. This interface allows the body content of a tag to be evaluated and
    then subsequently modified, transformed, and manipulated. You put these concepts
    into practice in the


    <emailAddressFilter> tag example, which illustrated how you can achieve postprocessing
    of body content.


    The previous chapter and this chapter have provided a fairly comprehensive look
    at the facilities provided by the JSP specification for building custom tags,
    and you should now be able to build many of the tags that you might need for your
    own web applications. To wrap up our coverage of custom tags, the next chapter
    presents some of the more advanced features and best practices that will help
    make your tags even more powerful.


