    **Controlling Page Navigation**


    As you saw in Listing 5-11, page navigation in your JSF application is handled
    by providing navigation rules in a configuration file. The navigation can specify
    which web component initiates the request, which web component handles the response,
    and which value causes navigation to follow the flow. So far, you have seen only
    navigation based on the hard-coded string value of an action attribute. You can
    also control navigation by using value-binding


    513-0 ch05.qxd 11/1/05 7:18 PM Page 218


    **218**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    expressions and method-binding expressions. Navigation then depends on the value
    of the expression.


    **Static and Dynamic Navigation**


    When you control navigation through string values of the action attribute, the
    path of navigation is known when the application is deployed. We call this **static
    navigation**, because the flow is statically determined and does not change. It
    is the same for every request.


    When using static navigation, you explicitly code a value into the action attribute
    of a JSF


    custom tag. You then define navigation rules in a configuration file. The rule
    specifies navigation flow when the <from-outcome> of a page matches the value
    of the action attribute. When that occurs, navigation flows to the specified <to-view-id>.
    These elements are part of a navigation rule element in a configuration file,
    such as faces-config.xml (see Listing 5-11).


    When you control navigation through value-binding expressions or method-binding
    expressions, the path of navigation is not known when the application is deployed.
    In fact, navigation flow can vary from request to request depending on the value
    of the expression.


    We call this **dynamic navigation**.


    For dynamic navigation, you use a value-binding expression or method-binding expression
    as the value of the action attribute. With value-binding expressions, the value
    of the property must be of type String. With method-binding expressions, the method
    must take no parameters and return a value of type String:


    public String search();


    The String value returned by the method is compared to the value specified in
    the navigation rule to determine where control flow should go.


    **Navigation Rules**


    Two JSF custom tags are used to control page navigation in conjunction with navigation
    rules:


    <commandButton> and <commandLink>.


    You specify navigation rules in a configuration file. In this chapter, we have
    done this in the faces-config.xml file. However, navigation rules can be in their
    own configuration file, which is then identified in the deployment descriptor
    web.xml.


    The general syntax of navigation rules is as follows:


    <navigation-rule>


    <from-view-id>/searchForm.jsp</from-view-id>


    <navigation-case>


    <from-outcome>search</from-outcome>


    <to-view-id>/searchResults.jsp</to-view-id>


    </navigation-case>


    </navigation-rule>


    The <from-view-id> element is optional; it contains the path to the page from
    which navigation starts. In the configuration file, you use the correct name of
    the file, searchForm.jsp, as we do in Listing 5-11, rather than searchForm.faces.
    Note also that the path to the


    513-0 ch05.qxd 11/1/05 7:18 PM Page 219


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    **219**


    resource begins with a leading forward slash (/) and is the full path to the resource.
    So, if searchResults.jsp were in the WEB-INF\pages\results directory, you would
    use the path


    /WEB-INF/pages/results/searchForm.jsp. The <from-outcome> element is the string
    value that is compared to the value of the action attribute.


    You need to specify the <from-view-id> only one time. This allows you to define
    multiple


    <navigation-case> elements that apply to one page. You use this when a page has
    multiple command buttons or command links.


    If you have an action that applies to every page in the application, you can use
    a


    <navigation-rule> element without a <from-view-id>. For example, suppose every
    page in your application had a link to your privacy policy. Because the following
    navigation rule does not have a <from-view-id>, it applies to every page in the
    application:


    <navigation-rule>


    <navigation-case>


    <from-outcome>privacy-policy</from-outcome>


    <to-view-id>/WEB-INF/privacy.jsp</to-view-id>


    </navigation-case>


    </navigation-rule>


    In some cases, you may have a rule that applies to some pages, but not all pages,
    in your application. If the pages are in a common location, you can use a wildcard
    to select the


    <from-view-id>:


    <navigation-rule>


    <from-view-id>/products/*</from-view-id>


    <navigation-case>


    . . .


    </navigation-case>


    </navigation-rule>


    In this rule, the navigation case applies to every page that is served from the
    products directory.


    There are a number of optional elements you can use with <navigation-case>. Three
    of them, <description>, <display-name>, and <icon>, we will not cover here. The
    three optional elements we will look at are <from-outcome>, <from-action>, and
    <redirect>.


    The <from-outcome> element is used to match an outcome string. The outcome string
    can be a literal string specified in the action attribute of a command element
    (see the


    <h:commandButton> element in Listing 5-12, for example). The outcome string can
    also be returned from the execution of an application action method. Action methods
    are called when a tag specifies a JavaBean method in its action attribute by using
    a method-binding expression. If <from-outcome> is used, the navigation case will
    be followed only if the outcome string matches the element’s value. If not used,
    this case will be followed no matter what the outcome value is.


    The <from-action> element is used in the <navigation-case> element. If you have
    a single page with multiple command actions or command links, and the command
    actions or links have the same value (the same <from-outcome>) for the action
    attribute, you use the


    513-0 ch05.qxd 11/1/05 7:18 PM Page 220


    **220**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    <from-action> element to distinguish between the actions. Suppose we give the
    FlightSearch bean two methods named search() and save(). Both methods will return
    the value success when used in a method-binding expression. Because each returns
    the value success, we need some way to distinguish between a success from search()
    and a success from save(). You do this with the <from-action> element:


    <navigation-rule>


    <from-view-id>/searchForm.jsp</from-view-id>


    <navigation-case>


    <from-action>#{flight.search}</from-action>


    <from-outcome>success</from-outcome>


    <to-view-id>/searchResults.jsp</to-view-id>


    </navigation-case>


    <navigation-case>


    <from-action>#{flight.save}</from-action>


    <from-outcome>success</from-outcome>


    <to-view-id>/searchForm.jsp</to-view-id>


    </navigation-case>


    </navigation-rule>


    Because the outcome values are the same, the case that is matched is the one with
    the matching action reference. If <from-action> is not used, the case will be
    matched no matter which action reference was executed (or if no action reference
    was executed).


    The final optional element is <redirect>. When you submit a request from a JSF
    form, the request is sent to the originating page. When you do not use <redirect>,
    the origination page forwards the request to the response page during the Render
    Response phase, so when your browser receives the response, it displays the URL
    of the originating page. When you use


    <redirect>, the originating page sends a redirect to the browser, which causes
    the browser to make a request for the response page, and updates the browser’s
    address bar to the address of the responding page. With the <redirect> in place,
    both of the earlier examples show searchResults.jsp in the address bar when the
    response is received; without <redirect>, the address bar would continue to display
    searchForm.jsp.


