    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    Of the many ways to deploy and use custom tags, this method is one of the most
    common.


    This is primarily because it allows you to save the TLD file straight into the
    web-application directory structure (that is, underneath the WEB-INF directory)
    and to explicitly specify the tag library that you would like to import. This,
    therefore, makes it easy to quickly create and deploy a tag library in a development
    environment where the build and deploy and test cycles generally tend to be shorter
    than usual.


    However, although it works, this method doesn’t really take into account the ability
    that tag libraries have to be reusable. After all, tag libraries can be reused
    over the pages in a single project, over the pages of multiple projects, and within
    multiple organizations. Adopting this method for all of those projects means copying
    the tag handler classes and the TLD files into every web application. Therefore,
    the JSP specification provides an alternative mechanism for packaging and then
    using and reusing tag libraries (see Chapter 8).


    As this example illustrates, simple tags enable you to wrap up reusable functionality
    that is typically written using Java code. This is different from the template
    examples that you saw earlier in the chapter; whereas they were about parameterizing
    and reusing content, these are about reusing functionality. Of course, reusing
    the same functionality again and again is useful only up to a certain point. Fortunately,
    functionality—like content—can be parameterized and customized through the use
    of attributes.


    **Customizing Functionality with Attributes**


    Now that you understand the basics behind developing simple tags such as the tag
    handler class and the TLD file, you are now in a position to look at some of the
    more advanced features. Like tag files, simple tags can also be customized by
    using attributes. The difference is in how the attributes are implemented. With
    simple tags, attributes are implemented on the tag handler class.


    As you saw in the tag file examples, attributes are defined within the tag file
    by using the attribute directive, and it’s here where you can specify the name
    and whether the attribute is required. When using simple tags, this information
    is defined within the TLD file.


    **The Tag Life Cycle with Attributes**


    Introducing attributes into a custom tag does change the tag life cycle slightly
    because before the functionality of the tag can be executed (the doTag() method
    in the case of simple tags), the attributes must be passed to the tag handler
    so that they can be used by the tag.


    The way that the JSP specification allows this is through properties and **setter
    methods** of the tag handler class. A tag handler must have a property and a setter
    method for every attribute that it supports.


    ■**Note** The necessity for the tag handler to have a property and setter method
    for every supported attribute is a requirement of previous versions of the JSP
    specification. But with the introduction of dynamic attributes, this is not strictly
    true anymore. You’ll look at dynamic attributes in the next chapter.


