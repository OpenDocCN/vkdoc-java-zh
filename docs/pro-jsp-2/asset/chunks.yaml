    ApplicationResources.properties file is an easier way to internationalize your
    application, because then all language changes are available in one file.


    Earlier we mentioned that CSS stylesheets can be used to greatly improve your
    layout flexibility. We’ve worked on many projects where we used different stylesheets
    for different pages or even for different users. There are two approaches that
    we’ve used to switch stylesheets, the first being on a page basis, and the second
    for users. The first uses Tiles definitions to set the stylesheet for any given
    page. While you’re at it, you might as well add this same feature for including
    JavaScript files. First of all, you can add the files you want to include in your
    baseLayout definition:


    <definition name="baseLayout" path="/layouts/baseLayout.jsp">


    <put name="title.key"/>


    <put name="heading.key"/>


    <put name="header" value="/common/header.jsp"/>


    <put name="footer" value="/common/footer.jsp"/>


    <!-- Default JavaScript File -->


    <putList name="scripts">


    <add value="/scripts/global.js"/>


    </putList>


    <!-- Default Stylesheet File -->


    <putList name="styles">


    <add value="/styles/default.css"/>


    </putList>


    </definition>


    Then in the baseLayout.jsp file you can use Tiles tags and the JSTL to get these
    attributes and render them as follows:


    <%-- Get JavaScript List --%>


    <tiles:useAttribute id="scriptList" name="scripts"


    classname="java.util.List" ignore="true"/>


    <c:forEach var="js" items="${scriptList}">


    <script type="text/JavaScript"


    src="<%=request.getContextPath()%><c:out value="${js}"/>">


    </script>


    </c:forEach>


    <%-- Get List of Stylesheets --%>


    <tiles:useAttribute id="styleList" name="styles"


    classname="java.util.List" ignore="true"/>


    <c:forEach var="css" items="${styleList}">


    <link rel="stylesheet" type="text/css" media="all"


    href="<%=request.getContextPath()%><c:out value="${css}"/>" />


    </c:forEach>


    We had to add the scriptlet <%=request.getContextPath()%> since the add value
    inside a putList only renders the literal value. We didn’t want to hard-code the
    contextPath in the


