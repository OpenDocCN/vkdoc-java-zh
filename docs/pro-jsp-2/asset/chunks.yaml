    **512**


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    // Check to see if the user is logging in. If so, check to see


    // if he/she has enabled rememberMe functionality.


    // Only attempt to authenticate when "login" is requested if ((request.getRequestURL().indexOf("login")
    != -1)) {


    // Check to see if we should automatically log in the user


    // container is routing user to login page, check for remember me cookie Cookie
    userCookie = RequestUtil.getCookie(request, "username"); String username =


    (passCookie != null)


    ? URLDecoder.decode(userCookie.getValue(), "UTF-8") : null; if ((rememberMe !=
    null) && (password != null)) {


    // authenticate user without displaying login page


    String route =


    request.getContextPath() +


    "/auth?j_username=" + username +


    "&j_password=" + StringUtil.decodeString(password); if (log.isDebugEnabled())
    {


    log.debug("I remember you ''" + username +


    "'', attempting authentication...");


    }


    response.sendRedirect(response.encodeRedirectURL(route)); return;


    }


    }


    That’s it! It even handles password changes in the realm by checking for the error
    parameter—a slick feature that we’ve added into most of the recent applications
    we’ve worked on.


    **Authorization**


    After a user has logged in to the application, you might have requirements for
    what the user can do or see. This is made much simpler with container-managed
    security, as you’ll have the user’s role available to you. Using your own authentication
    architecture, you could probably get a similar result, but you might not be able
    to take advantage of the wealth of available plug-ins. By **plug-ins**, we are
    referring to tag libraries and other Java-related packages that allow for role
    configuration. For instance, the Struts Logic tag library has a <logic:present>
    tag that allows you to perform logic based on a user’s role. The Tiles templating
    framework also allows you to configure showing/hiding sections of your template
    based on roles.


    In this section, we’ll supply a few recommendations and tricks for controlling
    *who sees* *what* within a web application. Most of these techniques are much
    easier to implement if you’re using container-managed authentication, but it’s
    not required.


    The first thing you’ll want to consider is what choices a user should have after
    that user has logged in. Usually these choices are in the form of links, but they
    can be other menu-type systems, such as pick lists or DHTML drop-downs. One simple
    way to control what links a user might see is to show or hide links on the basis
    of a user’s role. However, this is just hiding the link, and it might still be
    reachable by typing in the URL.


    513-0 ch12.qxd 11/17/05 4:15 PM Page 513


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    **513**


    One recommended practice is to place your JSP files and fragments under the WEB-INF


    directory when deploying your application. By doing this, you’ll prevent browsers
    from directly accessing JSP pages by using a URL, and it also forces you (as a
    developer) to follow the MVC pattern. Your JSP pages will be protected, because
    all resources under WEB-INF are secluded and not accessible from a URL. The Servlet
    specification mandates that security be provided inside WEB-INF, and it also ensures
    good separation of controller and view by forcing each request to go through a
    servlet controller. However, we’ve seen some containers that don’t support this—they
    either allow access to WEB-INF through the browser or don’t allow you to render
    JSP pages that live under WEB-INF. If your servlet container is Java EE–compliant,
    it should allow you to do this.


    If you’re working with a framework that allows configuration of your servlet-to-JSP
    mappings, this is fairly easy to do. We usually develop JSP pages in a directory
    alongside directories for stylesheets, JavaScript files, and images. Then when
    we deploy, we move the directory containing the JSP pages (pages) into a directory
    under WEB-INF.


    By placing your JSP pages under WEB-INF, you ensure that the necessary application
    logic will be executed before displaying them. After all, users will have to navigate
    through this logic to get to your JSP.


    After securing the locations of your pages, you’ll need to secure access to them
    so that unauthorized users can’t execute the logic to get to them. You can do
    this in a couple of ways.


    The method built in with servlets is to use a different <security-constraint>
    for each servlet (or group of servlets) that you want to protect. To do this,
    you’ll have to create servlet mappings for each servlet or group—your web.xml
    may become quite large if you have many servlets. An easier way is to proxy all
    requests through an initial servlet that checks permissions and forwards appropriately,
    or even better, use a filter. We’ve also seen another alternative in which you
    put a tag library at the top of every JSP file. This tag library does a check
    to see whether the user has access to that page.


    The problem with programmatically checking for user roles and dispatching accordingly,
    or displaying an error message in the case of the JSP page, is that it can become
    a maintenance nightmare. We’ve been on projects where we used this type of architecture,
    and maintenance became much easier after we moved to container-managed authentication.


    **Summary**


    We hope we’ve convinced you that security is pretty easy to add to a web application.
    It offers many benefits after it’s been added: customization based on role, an
    auditing log, and password encryption. In our experience, using container-managed
    security has made our development existence more enjoyable. We’ve done it programmatically
    by using LDAP and lots of application logic to show or hide links and to allow
    or deny access to pages. Even though it worked, and it worked well, it took much
    longer to program initially, and it was quite a nuisance to maintain. On the other
    hand, if you already have an authentication and authorization framework that offers
    you all the same benefits, you should, by all means, use it, and if it’s portable
    and works well, share it!'
