    public String process(HttpServletRequest request,


    HttpServletResponse response)


    throws ServletException;


    }


    It is the job of implementations of this interface to process the current request
    and return the name of the next page to forward it to. Our store has several implementations
    of this interface, which will all be shown and explained in this section.


