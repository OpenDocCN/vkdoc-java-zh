    return;


    }


    }


    The end result is a series of error messages as follows:


    • A required resource is not available.


    • The process did not complete. Details should follow.


    • Cannot connect to MySQL server localhost:3307\. Is there a MySQL server running
    the machine/port you’re trying to connect to? (java.net.ConnectException) It’s
    easy to see how chained exceptions can give you messages that will satisfy all
    your users. It might even be possible to use the previous error-looping code in
    a declared exception for Struts, but we haven’t tried this yet. After you’ve built
    all your errors, you need to direct the user to a friendly page. When using this
    code in an Action class, you’ll most likely direct them back to where they came
    from.


    return (new ActionForward(mapping.getInput()));


    This can be problematic if you access the same ActionMapping from several different
    pages. We’ve seen this solved in a couple of different ways. The first way is
    to add an extra parameter to the form or URL that called the action, and then
    use that value to forward appropriately. The other method is one used by the Roller
    Weblogger open-source project (http://www.rollerweblogger.org). It uses a BreadCrumbFilter
    to hold a stack of the last URLs accessed by the application. This is nice in
    that you can simply grab the last URL off the stack and so forward back to the
    last viewed page.


    Declaring Exceptions


    Struts 1.1 introduced the concept of configurable exceptions. That is, you can
    declaratively specify exceptions on a global level in struts-config.xml as well
    as on an ActionMapping level.


    This concept is similar to the one you see with global forwards and with local
    forwards. It’s easy to register an exception—the only attribute that is required
    is type, which states the type of the exception. Optionally, you can specify a
    key (to a message in your resource bundle) and the path to direct the response
    to. The following is an example that might be used to handle UserNotFoundException:


    <exception key="missing.user"


    type="org.appfuse.webapp.services.UserNotFoundException"


    path="addUser"/>


    In this example, addUser is a forward whose path references a tile’s definition
    (in tiles-config.xml). You could easily change this to redirect to a JSP page
    (for instance, /addUser.jsp


    513-0 ch15.qxd 11/14/05 5:38 PM Page 630


    **630**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    or perhaps /editUser?action=add). Exceptions are best used at the ActionMapping
    level, without a defined path. If you don’t define a path, Struts is smart enough
    to redirect to your ActionMapping’s input value. Of course, if you don’t have
    an input defined, you should probably specify the path for your exception, or
    you’ll get the dreaded blank screen of Struts. The key in this example is used
    to override the key used by the exception itself.


    Struts makes it easier to develop exceptions and provides built-in internationalization.


    Let’s take a look at the code for the UserNotFoundException: import org.apache.struts.util.ModuleException;


    public class UserNotFoundException extends ModuleException {


    /**


    * Construct a new instance of this exception for the specified username.


    * @param username Username that was not found


    */


    public UserNotFoundException(String username) {


    super("error.user.missing", username);


    }


    }


    The String error.user.missing refers to a key in the default ResourceBundle, as
    defined in struts-config.xml. In the struts-resume application, this bundle is
    ApplicationResource.properties, where the key is defined as follows: error.user.missing=Could
    not find user information for username ''{0}''


    Of course, you can change your exception’s constructor to handle as many parameters
    as you have in your message key. If you specify a key for this exception in struts-config.xml,
    it will override the message that is spit out by the exception. One disadvantage
    to this is that you lose the ability to substitute parameters, but it can be useful
    for exceptions that don’t use the Struts’s message bundle.


    A nice feature of Struts’s exception handling is that messages are easily externalized
    in a properties file. That is, you get I18n built right into your exception handling.
    Furthermore, you can specify a separate ResourceBundle for your error messages
    by specifying the bundle attribute on your exception. Of course, you could use
    a ResourceBundle on your business and persistence layers with properties file,
    but it might not be needed if these exceptions never bubble up to the UI.


    The beauty of using declared exceptions in your application is that you don’t
    have to catch them in your Action classes. The Struts execute() method throws
    a top-level Exception.


    Since all exceptions extend Exception somewhere along the line, this makes it
    easy to write and throw your exceptions:


    public ActionForward execute(ActionMapping mapping,


    ActionForm form,


    HttpServletRequest request,


    HttpServletResponse response)


    throws Exception {


    When a registered exception is caught by Struts, it will actually create an errors
    object for you that can then be displayed using <html:errors/> or a syntax like
    that in struts-resume.


