- fmt: "`<put name=\"content\" value=\"/WEB-INF/pages/welcome.jsp\"/>`\n\n`</definition>`\n\
    \nIn the previous `.login` definition, you’ll notice that we’ve prefixed the tile\
    \ name with a period (`.`). This dot notation is the recommended practice for\
    \ naming tiles. Since Tiles’s definitions can be references in a forward’s `path`\
    \ attribute, this prefix makes them easier to recognize.\n\nA definition can be\
    \ referenced in a JSP page if you don’t want to forward to it from an action.\
    \ In `struts-resume`, we do this in the `login.jsp` page. We’re protecting all\
    \ `*.do` mappings with a `<security-constraint>`, so we’re unable to access any\
    \ action without authenticating.\n\nThe content of the `login.jsp` page is short\
    \ and simple:\n\n```\n<%@ include file=\"/common/taglibs.jsp\"%>\n\n<tiles:insert\
    \ definition=\".login\" flush=\"true\"/>\n```\n\nIn the examples provided, you’ll\
    \ notice that messages come from `ApplicationResources.properties` for `title`\
    \ and `heading` settings, but another option is available. This may be why Tiles\
    \ seems so intimidating to some—there are so many options!\n\nHowever, we do want\
    \ to show you some other options that might be more suitable for you.\n\nRather\
    \ than using the `ApplicationResources.properties` file to represent the `title`\
    \ or `heading`, you can code the strings directly in your definition or JSP:\n\
    \n```\n<put name=\"title\" value=\"Login to Struts Resume\"/>\n```\n\nRather than\
    \ using `<tiles:importAttributes/>` and `<bean:message key=\"title.key\"/>`, you\
    \ can use `<tiles:getAsString name=\"title\"/>`. You might think you’ve lost the\
    \ internationalization (I18n) support in this process, but Tiles allows for an\
    \ alternative way of achieving I18n: creating separate XML definition files for\
    \ each locale. Using this strategy, you would have a `tiles_config_en.xml` for\
    \ English, `tiles_config_ru.xml` for Russian, and so on. Using the `ApplicationResources.properties`\
    \ file is an easier way to internationalize your application, because then all\
    \ language changes are available in one file.\n\nEarlier we mentioned that CSS\
    \ stylesheets can be used to greatly improve your layout flexibility. We’ve worked\
    \ on many projects where we used different stylesheets for different pages or\
    \ even for different users. There are two approaches that we’ve used to switch\
    \ stylesheets, the first being on a page basis, and the second for users. The\
    \ first uses Tiles definitions to set the stylesheet for any given page. While\
    \ you’re at it, you might as well add this same feature for including JavaScript\
    \ files. First of all, you can add the files you want to include in your `baseLayout`\
    \ definition:\n\n```\n<definition name=\"baseLayout\" path=\"/layouts/baseLayout.jsp\"\
    >\n    <put name=\"title.key\"/>\n    <put name=\"heading.key\"/>\n    <put name=\"\
    header\" value=\"/common/header.jsp\"/>\n    <put name=\"footer\" value=\"/common/footer.jsp\"\
    />\n    <!-- Default JavaScript File -->\n    <putList name=\"scripts\">\n   \
    \     <add value=\"/scripts/global.js\"/>\n    </putList>\n    <!-- Default Stylesheet\
    \ File -->\n    <putList name=\"styles\">\n        <add value=\"/styles/default.css\"\
    />\n    </putList>\n</definition>\n```\n\nThen in the `baseLayout.jsp` file you\
    \ can use Tiles tags and the JSTL to get these attributes and render them as follows:\n\
    \n```\n<%-- Get JavaScript List --%>\n<tiles:useAttribute id=\"scriptList\" name=\"\
    scripts\"\n    classname=\"java.util.List\" ignore=\"true\"/>\n<c:forEach var=\"\
    js\" items=\"${scriptList}\">\n    <script type=\"text/JavaScript\"\n        src=\"\
    <%=request.getContextPath()%><c:out value=\"${js}\"/>\">\n    </script>\n</c:forEach>\n\
    \n<%-- Get List of Stylesheets --%>\n<tiles:useAttribute id=\"styleList\" name=\"\
    styles\"\n    classname=\"java.util.List\" ignore=\"true\"/>\n<c:forEach var=\"\
    css\" items=\"${styleList}\">\n    <link rel=\"stylesheet\" type=\"text/css\"\
    \ media=\"all\"\n        href=\"<%=request.getContextPath()%><c:out value=\"${css}\"\
    />\" />\n</c:forEach>\n```\n\nWe had to add the scriptlet `<%=request.getContextPath()%>`\
    \ since the `add` value inside a `putList` only renders the literal value. We\
    \ didn’t want to hard-code the `contextPath` in the definitions file, so this\
    \ was a simple solution. If you’re using JSP 2.1, you can replace the `<c:out\
    \ value=\"${variable}\"/>` with `${variable}`. You can also replace the `<link>`\
    \ tag for the stylesheet with the more modern method of importing stylesheets,\
    \ using `@import`. Using this syntax, the stylesheet import would look as follows:\n\
    \n```\n<style type=\"text/css\" media=\"all\">\n    <c:forEach var=\"css\" items=\"\
    ${styleList}\">\n        @import url(<%=request.getContextPath()%><c:out value=\"\
    ${css}\"/>);\n    </c:forEach>\n</style>\n```\n\nThis technique can be used to\
    \ decrease the amount of HTML written as well as to disable stylesheets for older\
