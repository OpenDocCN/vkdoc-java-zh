    由于模块的开发与开发标准 Struts 应用程序非常相似，我们将向您展示如何设置它们，并且我们实际上在 struts-resume 应用程序中实现了一个使用它们的“上传”功能。设置相当简单，包括以下三个步骤：


    **1.** 为您的模块准备一个配置文件。


    **2.** 通知控制器有关模块的信息。


    **3.** 使用转发或操作切换到您的新模块。


    我们不会在这里详细说明第一步，因为这和创建一个新的 Struts 应用程序是一样的。您可能可以使用 XDoclet 为不同的模块创建配置文件，但您必须调整您的
    Ant webdoclet 任务，使其将 `struts-config.xml` 输出到不同的目录。当然，子模块的目的是使开发和配置更容易，而 XDoclet
    已经为您做到了这一点！


    第二步涉及在应用程序的部署描述符 `web.xml` 中，向 `ActionServlet` 的定义添加一个新的初始化参数。在 struts-resume
    应用程序中，此配置位于 `metadata/web/servlets.xml`：

    '
- fmt: "```xml\n<servlet>\n  <servlet-name>action</servlet-name>\n  <servlet-class>org.apache.struts.action.ActionServlet</servlet-class>\n\
    \  <init-param>\n    <param-name>config</param-name>\n    <param-value>/WEB-INF/struts-config.xml</param-value>\n\
    \  </init-param>\n  <init-param>\n    <param-name>config/upload</param-name>\n\
    \    <param-value>/WEB-INF/struts-upload.xml</param-value>\n  </init-param>\n\
    \  <init-param>\n    <param-name>debug</param-name>\n    <param-value>2</param-value>\n\
    \  </init-param>\n  <init-param>\n    <param-name>detail</param-name>\n    <param-value>2</param-value>\n\
    \  </init-param>\n  <load-on-startup>2</load-on-startup>\n</servlet>\n```\n\n\
    This configuration indicates that there are two modules in this application—the\
    \ default module, which has no forward slash (`/`) in its name, and the second,\
    \ our \"upload\" feature. The configuration files for both modules are located\
    \ in the `WEB-INF` directory. The recommended standard for naming module configuration\
    \ files is `struts-module.xml`.\n\nWhile you're looking at the `ActionServlet`'s\
    \ configuration, we want to point out a few changes between 1.0 and 1.1/1.2. In\
    \ 1.0, it was common practice to specify the `ResourceBundle` for messages as\
    \ an \"application\" init parameter. We used this setting, as well as the \"nocache\"\
    \ init parameter. In Struts 1.1, these settings have been deprecated and moved\
    \ to a `<controller>` element in the `struts-config.xml` file. The following setting\
    \ can be found in `metadata/web/struts-controller.xml`:\n\n```xml\n<controller\
    \ nocache=\"true\"\n            inputForward=\"true\"\n            maxFileSize=\"\
    2M\" />\n```\n\nThe `nocache` setting tells the controller to add HTTP headers\
    \ to prevent caching of content—it's off by default. You can also specify a `forwardPattern`\
    \ attribute, such as `WEB-INF/pages/$M$P`, where the `$M` variable indicates the\
    \ module prefix and `$P` indicates the path attribute of the selected `<forward>`\
    \ element, although it isn't used here. The `inputForward` attribute allows you\
    \ to use local or global forwards in the `input` attribute of an action mapping.\
    \ This is a very handy and much needed feature.\n\n> **Note** More information\
    \ on optional values and their meanings can be found online at [http://struts.apache.org/userGuide/configuration.html](http://struts.apache.org/userGuide/configuration.html).\n\
    \nThe application's `ResourceBundle` is now specified in a `<message-resources>`\
    \ element in `struts-config.xml`. If you're using XDoclet, you can place this\
    \ in a `struts-message-resources.xml` file. In the `struts-resume` application,\
    \ this file is located in the same location as the rest of the Struts configuration\
    \ fragments:\n\n```xml\n<message-resources parameter=\"ApplicationResources\"\
    />\n```\n\nSince we keep this file (`ApplicationResources.properties`) directory\
    \ under `WEB-INF/classes`, there is no need to specify a package name. You can\
    \ also specify alternate resource bundles for the application by adding a second\
    \ `<message-resources>` element and specifying a `key` attribute:\n\n```xml\n\
    <message-resources parameter=\"CustomResources\" key=\"custom\"/>\n```\n\nThis\
    \ can be useful if, for instance, you're building a product using Struts and you\
    \ only want to expose a minimal amount of options that customers may change. To\
    \ use this `ResourceBundle` with the `<bean:message>` tag, you only need to specify\
    \ a `bundle` attribute that matches the `key`:\n\n```xml\n<bean:message key=\"\
    webapp.title.prefix\" bundle=\"custom\"/>\n```\n\nNow that you've seen how to\
    \ set up modules for an application, let's see how to switch between them. For\
    \ demonstration purposes, we've added an \"upload\" module to `struts-resume`\
    \ for uploading résumés. This module doesn't demonstrate much more than file upload\
    \ and module switching. It could be developed into a feature that allows for simple\
    \ uploading of existing résumés, but not much more than that. At the time of writing,\
    \ there are two basic techniques to switching modules. The first involves using\
    \ a forward (global or local) with a `contextRelative` attribute set to `true`.\
    \ This will tell the controller and request dispatcher to be module-sensitive,\
    \ rather than simply context-sensitive:\n\n```xml\n<forward name=\"toUpload\"\n\
    \         contextRelative=\"true\"\n         path=\"/upload/index\"\n        \
    \ redirect=\"true\">\n```\n\nIn this example, `index` is a definition in the `tiles-upload.xml`\
    \ document. Adding `redirect=\"true\"` is required to enable the switching to\
    \ execute correctly. The second method is to use the built-in `SwitchAction`.\
    \ Using the `SwitchAction` would result in an `<action-mappings>` such as the\
    \ one you see here:\n\n```xml\n<action-mappings>\n  <action path=\"/switchModule\"\
    \n          type=\"org.apache.struts.actions.SwitchAction\"/>\n  ...\n</action-mappings>\n\
    ```\n\nThen to change to the upload module, you could use a URL such as `http://localhost:8080/struts-resume/switchAction.do?prefix=upload&page=index`.\
    \ We think it's much easier and cleaner to use the global-forward technique, and\
    \ therefore we've configured the following forward in `metadata/web/global-forwards.xml`:\n\
    \n```xml\n<forward name=\"uploadResume\" contextRelative=\"true\"\n         path=\"\
    /upload/index.do\" redirect=\"true\" />\n```\n\nOne thing we noticed when building\
    \ the \"upload\" module for `struts-resume` was that it was possible to share\
    \ configuration settings between the applications. For instance, we've shared\
    \ the same `basicLayout.jsp` template that we used for Tiles. The one problem\
    \ we encountered was that any messages (in `ApplicationResources`) and any forwards\
    \ that you include in your submodule have to be defined in their respective files.\
    \ For instance, we had to define the error page messages, button labels, and Validator\
    \ messages. We expected this, so it wasn't an issue. It's nice to see that there\
    \ is clean separation of modules, but you're also allowed to share pieces of each.\n\
    \nHopefully, you'll find this simple enough to consider using if you think you\
    \ have need for modules in an application. The one limitation of modules at this\
    \ point is that they're only supported when using extension mapping of your `ActionServlet`.\
    \ Which is to say that `*.do` is supported, but `/do/*` isn't; but consult the\
    \ Struts site ([http://struts.apache.org/](http://struts.apache.org/)) or mailing\
    \ lists for the current status of this issue.\n\n## Testing Struts Applications\n\
    \nLike any good Java programmer, you will have heard of testing frameworks and\
    \ you've probably used `JUnit` before. `JUnit` version 3.8.1 (required by `struts-resume`)\
    \ can be downloaded from [http://www.junit.org](http://www.junit.org). Ant can\
    \ be a very powerful tool for running JUnit tests. To run them, you need to have\
    \ JUnit's JAR file (`junit.jar`) in the `$ANT_HOME/lib` directory.\n\n`JUnit`\
    \ works great for testing classes outside a servlet container, but doesn't provide\
    \ the needed structure for testing what a user will actually do. For this, you've\
    \ been blessed with `Cactus` from the Jakarta project. `Cactus` is a simple test\
    \ framework for unit testing server-side Java code. It supports both in-container\
    \ testing and out-of-container testing via *mock objects*. It's pretty slick in\
    \ that you can run a test (for instance, `ant test-cactus -Dtestcase=ActionFilterTest`\
    \ for the `struts-resume` application), and it will start Tomcat, run the test,\
    \ and then stop Tomcat. It also integrates with `HttpUnit` for testing your JSP\
    \ pages and validating that the resulting HTML is correct. More information on\
    \ `Cactus` can be found at [http://jakarta.apache.org/cactus](http://jakarta.apache.org/cactus).\
    \ You can find the `HttpUnit` website at [http://httpunit.sourceforge.net](http://httpunit.sourceforge.net).\n\
    \nThe `struts-resume` example uses a tool called `JUnitDoclet` ([http://www.junitdoclet.org](http://www.junitdoclet.org))\
    \ to generate JUnit-based skeleton test cases and test suites of all your Java\
    \ source files. All you need to do is execute `ant gen-test-module` where `module`\
    \ is `common`, `web`, or `ejb`."
  raw: '<servlet>


    <servlet-name>action</servlet-name>


    <servlet-class>org.apache.struts.action.ActionServlet</servlet-class>


    <init-param>


    <param-name>config</param-name>


    <param-value>/WEB-INF/struts-config.xml</param-value>


    </init-param>


    <init-param>


    <param-name>config/upload</param-name>


    <param-value>/WEB-INF/struts-upload.xml</param-value>


    </init-param>


    <init-param>


    <param-name>debug</param-name>


    <param-value>2</param-value>


    </init-param>


    <init-param>


    <param-name>detail</param-name>


    <param-value>2</param-value>


    </init-param>


    <load-on-startup>2</load-on-startup>


    </servlet>


    This configuration indicates that there are two modules in this application—the
    default module, which has no forward slash (/) in its name, and the second, our
    “upload” feature. The configuration files for both modules are located in the
    WEB-INF directory. The recommended standard for naming module configuration files
    is struts-module.xml.


    While you’re looking at the ActionServlet’s configuration, we want to point out
    a few changes between 1.0 and 1.1/1.2\. In 1.0, it was common practice to specify
    the ResourceBundle


    513-0 ch15.qxd 11/14/05 5:38 PM Page 621


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **621**


    for messages as an “application” init parameter. We used this setting, as well
    as the “nocache”


    init parameter. In Struts 1.1, these settings have been deprecated and moved to
    a <controller> element in the struts-config.xml file. The following setting can
    be found in metadata/web/


    struts-controller.xml:


    <controller nocache="true"


    inputForward="true"


    maxFileSize="2M" />


    The nocache setting tells the controller to add HTTP headers to prevent caching
    of content—


    it’s off by default. You can also specify a forwardPattern attribute, such as
    WEB-INF/pages/$M$P, where the $M variable indicates the module prefix and $P indicates
    the path attribute of the selected <forward> element, although it isn’t used here.
    The inputForward attribute allows you to use local or global forwards in the input
    attribute of an action mapping. This is a very handy and much needed feature.


    ■**Note** More information on optional values and their meanings can be found
    online at http://


    struts.apache.org/userGuide/configuration.html.


    The application’s ResourceBundle is now specified in a <message-resources> element
    in struts-config.xml. If you’re using XDoclet, you can place this in a struts-message-resources.xml
    file. In the struts-resume application, this file is located in the same location
    as the rest of the Struts configuration fragments:


    <message-resources parameter="ApplicationResources"/> Since we keep this file
    (ApplicationResources.properties) directory under WEB-INF/


    classes, there is no need to specify a package name. You can also specify alternate
    resource bundles for the application by adding a second <message-resources> element
    and specifying a key attribute:


    <message-resources parameter="CustomResources" key="custom"/> This can be useful
    if, for instance, you’re building a product using Struts and you only want to
    expose a minimal amount of options that customers may change. To use this ResourceBundle
    with the <bean:message> tag, you only need to specify a bundle attribute that
    matches the key:


    <bean:message key="webapp.title.prefix" bundle="custom"/> Now that you’ve seen
    how to set up modules for an application, let’s see how to switch between them.
    For demonstration purposes, we’ve added an “upload” module to struts-resume for
    uploading résumés. This module doesn’t demonstrate much more than file upload
    and module switching. It could be developed into a feature that allows for simple
    uploading of existing résumés, but not much more than that. At the time of writing,
    there are two basic techniques to switching modules. The first involves using
    a forward (global or local) with a


    513-0 ch15.qxd 11/14/05 5:38 PM Page 622


    **622**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    contextRelative attribute set to true. This will tell the controller and request
    dispatcher to be module-sensitive, rather than simply context-sensitive:


    <forward name="toUpload"


    contextRelative="true"


    path="/upload/index"


    redirect="true">


    In this example, index is a definition in the tiles-upload.xml document. Adding
    redirect="true" is required to enable the switching to execute correctly. The
    second method is to use the built-in SwitchAction. Using the SwitchAction would
    result in an


    <action-mappings> such as the one you see here:


    <action-mappings>


    <action path="/switchModule"


    type="org.apache.struts.actions.SwitchAction"/>


    ...


    </action-mappings>


    Then to change to the upload module, you could use a URL such as http://localhost:8080/


    struts-resume/ switchAction.do?prefix=upload&page=index. We think it’s much easier
    and cleaner to use the global-forward technique, and therefore we’ve configured
    the following forward in metadata/web/global-forwards.xml:


    <forward name="uploadResume" contextRelative="true"


    path="/upload/index.do" redirect="true" /> One thing we noticed when building
    the “upload” module for struts-resume was that it was possible to share configuration
    settings between the applications. For instance, we’ve shared the same basicLayout.jsp
    template that we used for Tiles. The one problem we encountered was that any messages
    (in ApplicationResources) and any forwards that you include in your submodule
    have to be defined in their respective files. For instance, we had to define the
    error page messages, button labels, and Validator messages. We expected this,
    so it wasn’t an issue. It’s nice to see that there is clean separation of modules,
    but you’re also allowed to share pieces of each.


    Hopefully, you’ll find this simple enough to consider using if you think you have
    need for modules in an application. The one limitation of modules at this point
    is that they’re only supported when using extension mapping of your ActionServlet.
    Which is to say that *.do is supported, but /do/* isn’t; but consult the Struts
    site (http://struts.apache.org/) or mailing lists for the current status of this
    issue.


    **Testing Struts Applications**


    Like any good Java programmer, you will have heard of testing frameworks and you’ve
    probably used **JUnit** before. JUnit version 3.8.1 (required by struts-resume)
    can be downloaded from http://www.junit.org. Ant can be a very powerful tool for
    running JUnit tests. To run them, you need to have JUnit’s JAR file (junit.jar)
    in the $ANT_HOME/lib directory.


    JUnit works great for testing classes outside a servlet container, but doesn’t
    provide the needed structure for testing what a user will actually do. For this,
    you’ve been blessed with **Cactus** from the Jakarta project. Cactus is a simple
    test framework for unit testing server-side


    . It supports both in-container testing


    513-0 ch15.qxd 11/14/05 5:38 PM Page 623


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **623**


    and out-of-container testing via *mock objects*. It’s pretty slick in that you
    can run a test (for instance, ant test-cactus -Dtestcase=ActionFilterTest for
    the struts-resume application), and it will start Tomcat, run the test, and then
    stop Tomcat. It also integrates with **HttpUnit** for testing your JSP pages and
    validating that the resulting HTML is correct. More information on Cactus can
    be found at http://jakarta.apache.org/cactus. You can find the HttpUnit website
    at http://httpunit.sourceforge.net.


    The struts-resume example uses a tool called **JUnitDoclet** (http://www.junitdoclet.org)
    to generate JUnit-based skeleton test cases and test suites of all your Java source
    files. All you need to do is execute ant gen-test-module where module is common,
    web, or ejb.'
