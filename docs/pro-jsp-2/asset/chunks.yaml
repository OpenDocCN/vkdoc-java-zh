    You’ve seen that the Java Servlet API allows you to build platform-independent
    server-side Java components to handle user requests. You’ve also seen that servlets
    are protocol-independent but that they can be developed for specific protocols,
    particularly HTTP.


    You’ve also looked at the deployment of servlet-based web applications, with particular
    attention paid to the deployment descriptor. You’ve seen how the deployment descriptor
