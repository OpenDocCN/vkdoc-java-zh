    **267**


    With classic tags, one of the most complex pieces of the tag life cycle is how
    tag handler instances can be pooled by the container and reused. Although this
    tends to increase performance and reduce the number of object instantiations that
    occur, the semantics for reusing tag handlers often causes confusion and hence
    side effects from misunderstanding the tag life cycle. Therefore, simple tags
    are used once and only once before the tag handler reference is discarded. In
    other words, each simple tag invocation causes the creation of a new tag handler
    instance, therefore greatly simplifying the programming model.


    Creating a Tag Handler Instance


    When a custom tag is used on a JSP page, the first thing that the JSP container
    must do is create a new instance of the tag handler class. Later you’ll see just
    how the JSP container locates the correct tag handler class for any given custom
    tag, but for now you should assume that this has been found and an instance is
    created.


    Setting the Context


    Next, the tag handler instance is made aware of the environment in which it’s
    running through the setJspContext() method. This just involves passing a reference
    to the current JspContext into the tag handler.


    One of the useful classes available to JSP developers is PageContext from the
    javax.


    servlet.jsp package. This is available from a JSP page as an implicit object called
    pageContext.


    It’s effectively provided as a convenient way to access various objects that are
    used during JSP


    development. For example, the PageContext class provides an easy way to access
    attributes that are bound to any of the available scopes (request, page, session,
    and application). It can also get a reference to the current output JspWriter
    and programmatically include and forward requests. Although these features are
    available through the standard JSP actions or the JSP EL, the power behind the
    PageContext class is that it can be used within custom tags.


    One of the changes to the JSP API that occurred with JSP 2.0 is that some of the
    functionality previously provided by the PageContext class has been abstracted
    away into a new class called JspContext, which PageContext now extends. This new
    base class provides all the functionality that is not directly related to the
    Java Servlet API, including the methods that allow you to retrieve and set scoped
    attributes and obtain a reference to the current JspWriter. From a tag developer
    perspective, having access to this sort of information and the execution environment
    means that you can write tags utilizing values from the request, page, session,
    or application and write output from the tags directly back to the JSP page. You’ll
    see some examples of how to use the JspContext and PageContext classes throughout
    this and the following chapters.


    Setting the Parent


    During our discussion of body content types, you saw that it’s possible for the
    body content of custom tags to contain regular JSP syntax between the start and
    end tags. This body content can include custom tags, which means that custom tags
    can be nested. The following block of code shows an example of nesting custom
    tags with JSTL. Here, the outer <forEach> tag


    513-0 ch06.qxd 11/17/05 8:41 PM Page 268


    **268**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    iterates over each item in the specified collection, while the inner <out> tag
    outputs the name of each item:


    <c:forEach var="myVar" items="${myItems}">


    <c:out value="${myVar.name}"/>


    </c:forEach>


    As you’ll see in Chapter 8, it’s possible for custom tag handlers to cooperate
    and communicate with one another. Therefore, part of the information about a tag’s
    execution environment includes a reference to the closest enclosing tag handler,
    which is set by calling the setParent() method. That reference is of type JspTag
    (the superinterface for all tag handlers), but can be null if the tag isn’t nested
    within another tag.


    Setting the Body Content


    After the context has been set, an object representing the body content of the
    tag is passed to it. At runtime, the JSP container wraps up the body content between
    the start and end tags, creates a JspFragment object to represent it, and passes
    this JspFragment instance to the tag by calling the setJspBody() method. If there
    is no body content between the start and end tags, a null reference is passed
    to this method instead.


    As you’ll see later in this chapter, having a reference to the body content opens
    up a whole new way that custom tags can be implemented.


    Executing the Functionality


    Finally, with the context and body content set, the only thing left to do is execute
    the functionality that the tag handler embodies. This is achieved by calling the
    doTag() method, and it’s this method that contains the Java code responsible for
    the actions performed by the tag.


    **The SimpleTagSupport Class**


    Although implementing the SimpleTag interface is not a complex task, for convenience,
    the JSP specification provides the javax.servlet.jsp.tagext.SimpleTagSupport class,
    which provides default implementations for all the methods previously described.
    This class can be used as a starting point for building your own simple tags if
    you extend it and override the doTag() method. This, as you’ll see throughout
    this chapter, is the most common way to build simple tags.


    Now that you understand the mechanics behind simple tags, you are now in a position
    to write one.


    **A Simple Example**


    As an example of the type of functionality that might be encapsulated within a
    custom tag, let’s display the current date and time on the page. You could use
    Java code written inside a scriptlet or an EL function. Instead, you’ll use a
    custom tag because it provides flexibility when you later need to add functionality.


    513-0 ch06.qxd 11/17/05 8:41 PM Page 269


