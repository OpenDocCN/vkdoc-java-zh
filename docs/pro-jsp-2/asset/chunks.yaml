    **The SQL Tag Library**


    The use of SQL or any form of direct-data access from inside the presentation
    tier is highly discouraged in production or large-scale applications in favor
    of a three-tier architecture. The benefits of such an architecture are that it
    encourages the presentation of your data (your JSP


    pages) to be cleanly separated from your business logic and data access, thereby
    making your application far more adaptable and maintainable. Embedding SQL into
    your presentation tier is also a bad idea because of the implications it has on
    security.


    However, as mentioned earlier, the JSTL specification was developed as part of
    the Java Community Process (JCP), and because enough developers requested a library
    of actions to access relational databases, their wish was granted. These actions
    form part of the JSTL


    specification.


    Love them or loathe them, the SQL access actions exist. Their intended use is
    recommended for Rapid Application Development (RAD) prototyping or very small-scale
    applications only.


    Let’s take a brief look at the functionality provided by the SQL tag library.


    **The <sql:setDataSource> Action**


    All the actions provided in the SQL tag library operate on a data source defined
    by the java.


    sql.DataSource class. The primary job of the <sql:setDataSource> action is therefore
    to configure a data source that represents an underlying physical data store and
    expose it as either a scoped variable or the data source configuration object
    javax.servlet.jsp.jstl.sql.DataSource.


    The configured data source is used by the remaining actions in the SQL library
    to source database connections so they may perform queries and updates, and so
    on.


    A data source can be configured as follows:


    <sql:setDataSource var="dataSource" driver="org.acme.sql.driver"


    url="jdbc:msql://localhost/tempDB" user="Dan" password="pwd"/> The var attribute
    sets a label by which the data source can be accessed. The driver attribute is
    the fully qualified class name of the JDBC driver class that is used to communicate
    with the data source. The url attribute is the JDBC URL used to connect to the
    data source. The user and password attributes are the username and password used
    to log in to the data source.


    More information on JDBC can be found at http://java.sun.com/products/jdbc.


    Note that it’s also possible to supply a relative path to a Java Naming and Directory
    Interface (JNDI) resource via the optional dataSource attribute. If you have a
    JNDI name for the dataSource, then providing it in the dataSource attribute will
    cause the JSP page to perform a JNDI lookup for the data source. In this case,
    you do not need to provide any of the other attributes because they are provided
    as part of the resource accessed through JNDI.


    **The <sql:query> Action**


    Simple database query functionality is provided by the <sql:query> action:


    <sql:query var="users" dataSource="${dataSource}" > SELECT * FROM User WHERE UserName=''Dan''


    </sql:query>


