    Following this is the <scope> element, which can have one of the following values:


    • AT_BEGIN


    • NESTED (the default value)


    • AT_END


    The <scope> element allows you to define where on the page the scripting variable
    will be accessible. The three possible values mean from the start tag until the
    end of the page, between the start and end tags, and anywhere from the end tag
    until the end of the page, respectively.


    For this example, you want the variable accessible only between the start and
    end tags, so you choose NESTED.


    Using the Cookie Tag


    As with the other examples, using the tag is then just a matter of importing the
    tag library and using the correct prefix:


    <%@ taglib uri="/WEB-INF/tlds/ch08.tld" prefix="ch08" %>


    <ch08:cookie id="myCookie" name="lastVisited"> You last visited this website on
    <%= myCookie.getValue() %>


    </ch08:cookie>


    At request time, this JSP snippet looks for a cookie called lastVisited. If it
    finds lastVisited, the Cookie object is made available as a scripting variable
    called myCookie within the body content of the tag, and the body content is then
    evaluated. If the cookie can’t be found, the body content is skipped. As this
    example demonstrates, this type of functionality is useful for providing customized
    pages to the users of your web application, and it’s another way that custom tags
    can help you build JSP-based web applications.


    **Defining Variables in a TagExtraInfo Class**


    The other method for declaring scripting variables in the page is programmatically,
    by using a TagExtraInfo class. This was the original JSP 1.1 method by which variables
    were introduced into the page, and it allows for an additional level of flexibility
    in the way that variables are defined.


    Although the <variable> element in the TLD file allows you to be flexible in the
    name you give to the scripting variable, it doesn’t provide a way to specify the
    type of that variable to be defined at page creation time; instead, it allows
    you only to statically define the type within the TLD file.


    Consider the <iterate> tag example from Chapter 7\. You might like a scripting
    variable available to access each element of the collection over which you’re
    iterating, as shown in the following JSP snippet:


    <%@ taglib uri="/WEB-INF/tlds/ch08.tld" prefix="ch08" %> Countries :


    <ul>


    <ch08:iterate id="country" type="com.apress.projsp.domain.Country"


    items="${countries}">


    <li><%= country.getName() %>


    </ch08:iterate>


    </ul>


