    The Web Performance Inc. site in particular is a good resource. It includes a
    glossary of performance-testing terms, presentations on performance testing, and
    a report that compares the performance of Java EE servlet engines including Tomcat,
    WebSphere, Orion, Jetty, and Resin.


    **Testing the Performance Techniques**


    Now you’ll put the techniques we covered in this chapter into practice by applying
    them to a realistic example program. You’ll use an enhanced version of the data
    access example from Chapter 9 because it’s a simple but fairly typical database-driven
    web application.


    As you may remember, the Chapter 9 example is a web-based RSS newsreader program
    called Ag. Ag allows you to sign in by entering a username, maintain a list of
    subscriptions to RSS news feeds, fetch the news items for your subscriptions,
    and view the headlines for each of your news feeds.


    For the purposes of this case study, we’ve added a new front page to Ag. This
    new front page displays the most recent news feed items from all users and allows
    visitors to view the items in reverse-chronological order or by the number of
    hits that each item has received. With this new front page, Ag is a lot like the
    popular community news feed aggregation websites JavaBlogs.com (http://javablogs.com)
    and Weblogs at ASP.NET (http://weblogs.asp.net).


    Figure 13-5 shows a screen shot of the new front page.


    With a small number of users hitting the new Ag front page, performance seems
    to be fine. The page is displayed in a second or less. However, when you use JMeter
    to simulate a large number of users hitting the site, the performance drops to
    an unacceptable level. The page takes 5 to 10 seconds to display, and the load
    on the server rises to an unacceptable level (see Figure 13-6.).


    Each page is taking an average of 4 seconds to run. On top of this, during this
    test, the CPU meter is at 100%. Ag is dragging the whole server down. Why is Ag
    performing so poorly?


    For each incoming request, Ag must obtain a database connection, make a database
    query, and render the results as HTML. How can you reduce the amount of work per
    request? Let’s start by applying database connection pooling.


