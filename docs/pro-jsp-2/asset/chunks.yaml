- fmt: '# The cache time is set to 3600 seconds, or 1 hour. This means that the main
    page will be refreshed with new data every hour. The cache key is set to use the
    request parameter `mode` because the page has two modes of operation. In “popular”
    mode, the page displays the items with the most hits first. In “recent” mode,
    the page displays the most recent items first. By using the parameter value as
