    服务器上。在这里，你可以使用 Cactus 提供的测试类来实例化你想要测试的组件并调用它们的方法。例如，你可以选择创建一个新的 servlet 类实例并调用
    doGet() 方法。当然，要实际调用此方法，你需要访问 HTTP 请求和响应对象，那么它们从何而来呢？


    关键在于一个位于客户端和服务器端测试类之间的测试重定向器组件。当客户端启动测试时，会向 Java EE 容器发出一个请求，该请求被一个也必须在服务器上运行的
    Cactus 提供的 servlet 拦截。然后，这个 servlet（测试重定向器）确定需要运行哪个服务器端测试，并启动相应的测试类。由于已经向 Java
    EE 容器发出了一个实际的 HTTP 请求，Cactus 只需将其封装并传递给服务器端测试类以供其按需使用。代表 HTTP 响应的对象也被封装起来供测试类使用。有了这些访问权限，服务器端测试类和被测试的类就可以提取参数、将输出写入响应等。然后可以断言被测试的类按预期工作，这些断言的结果会传回客户端进行报告。


    作为示例，考虑我们在本章前面讨论 MVC 时介绍的 ViewCustomerAction 类。由于此类依赖于服务器获取真实请求，因此它是使用 Cactus
    进行测试的理想候选。清单 14-6 展示了如何实现这一点。


