    \ />`标签用于插入或包含一个JSP页面，但它也可以是应用程序中任何组件的URL。\n\n如果你将JSP页面插入到Tiles模板中，你需要配置这些JSP页面，使它们能够独立于其他页面执行。这意味着它们可以通过动态包含（`<jsp:include>`）而非静态包含（`<%@\
    \ include %>`）来引用。因此，你必须在每个页面的顶部引用相应的标签库。为了更快速、更轻松地进行开发，我们通常会创建一个包含所有标签库声明的JSP文件，然后使用静态包含将其包含在每个页面中。你可以在`struts-resume`应用程序中看到这样一个示例。清单15-1中的模板将渲染出类似于图15-12所示的布局。\n\
    \n![Image 191](index-643_1.png)\n\n**610**  \n第15章 ■ 使用STRUTS、XDOCLET和其他工具\n\n\
