    **The <x:param> Action**


    It’s also possible to pass parameters into XSL transformations by nesting <x:param>
    actions inside the <x:transform> action. This facility is similar to the <sql:param>
    and <sql:dateParam> actions from the SQL tag library, which are used to pass SQL
    parameters to the various actions in the SQL library.


