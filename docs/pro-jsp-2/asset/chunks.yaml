    Directing Traffic in the JSF Application


    Information about the view components in the web application and information about
    how control flows through the application is contained in a special configuration
    file named faces-config.xml, shown in Listing 5-4\. Although faces-config.xml
    can contain a lot of information about a web application, for this example we
    need it to do only two things: identify the flow of control from searchForm.jsp
    to searchResults.jsp, and identify the JavaBean used by the application.


    **Listing 5-4.** *faces-config.xml*


    <?xml version="1.0"?>


    <faces-config


    xsi:schemaLocation= ➥


    "http://java.sun.com/xml/ns/javaee/web-facesconfig_1_2.xsd"


    version="1.2">


    <navigation-rule>


    <from-view-id>/searchForm.jsp</from-view-id>


    <navigation-case>


    <from-outcome>submit</from-outcome>


    <to-view-id>/searchResults.jsp</to-view-id>


    <redirect/>


    </navigation-case>


    </navigation-rule>


    <managed-bean>


    <managed-bean-name>flight</managed-bean-name>


    <managed-bean-class>com.apress.projsp.FlightSearch</managed-bean-class>


    <managed-bean-scope>session</managed-bean-scope>


    </managed-bean>


    </faces-config>


    The faces-config.xml file identifies the JavaBeans used by the web application
    in the


    <managed-bean> element. You will have a <managed-bean> element for every JavaBean
    used by your web application. The <managed-bean> element in Listing 5-4 contains
    three subelements:


    • The first subelement is the name used to identify the JavaBean in a JSP page.
    In Listing 5-4


    the name is given as flight; this is why both searchForm.jsp and searchResults.jsp
    can access an instance of the JavaBean by using the expression #{flight...}.


    • The second element is the fully qualified class name of the JavaBean class.
    This name tells the JSP container which class to load and instantiate to create
    an instance of the JavaBean.


    513-0 ch05.qxd 11/1/05 7:18 PM Page 196


    **196**


    C H A P T E R 5 ■ J AVA S E R V E R FA C E S


    • The third element identifies the scope of the object. Session scope means that
    the object exists for the entire interaction between the user and the application.
    The container must persist the object across multiple request/response cycles,
    until the user’s session is terminated. We will discuss this in more detail in
    the “Using Managed Beans”


    section later in this chapter.


    The faces-config.xml file is also used to tell the controller how to navigate
    through the application. Navigation flow is specified in <navigation-rule> elements.
    Our example needs only one element. In general, a <navigation-rule> element identifies
    the start page, a condition, and the page to navigate to when the condition occurs.


    In our example, the start page is searchForm.jsp. If the page request is submitted
    with an outcome of submit, control is transferred to searchResults.jsp. Looking
    at Listing 5-2, you can see that the <commandButton> element has an action of
    submit; when the button is clicked and the form is submitted, this action matches
    the <from-outcome> of the <navigation-rule>.


    The <navigation-rule> element also includes an empty <redirect> element. With
    this element, the response is created by causing the browser to redirect to the
    searchResults.jsp page, which also updates the address bar in the browser. Without
    this element, the response is still created correctly and sent to the browser,
    but the address bar of the browser will not be updated and will still display
    the address for the originating page. We will look at navigation in more detail
    in the “Controlling Page Navigation” section later in this chapter.


    We need just one final piece for our web application. In many of the examples
    in Chapters 3 and 4, we identified a default page to be served to users when they
    first access the web application. In this example, our default page will be a
    standard HTML page that redirects to the correct URL for a JSF application. Listing
    5-5 shows index.html.


    **Listing 5-5.** *index.html*


    <html>


    <head>


    <meta http-equiv="Refresh" content= "0; URL=searchForm.faces"/>


    </head>


    </html>


    You can see that that the redirect URL is searchForm.faces. However, there is
    no component in our application named searchForm.faces. How then does the web
    application know which page to serve? All requests that are JSF requests are directed
    to the controller for the application, which is a servlet supplied as part of
    the JSF reference implementation. As you will see when we deploy this example,
    we will specify that all URLs of the form *.faces should be sent to the controller
    servlet. This servlet then converts the searchForm.faces request to searchForm.jsp,
    processes the JSP page, and sends the response to the browser.


