    **269**


    Writing the Tag Handler


    Now that you’ve decided that you’re going to build a custom tag, the first step
    is to write the tag handler, which is the Java class that will embody the functionality
    that the custom tag will provide. Listing 6-6 shows the tag handler DateTimeTag.java,
    which extends the SimpleTagSupport class. Because we want to focus on the syntax
    of creating simple tag handlers, and not the semantics or use of tag handlers,
    we’ve deliberately chosen a simplistic example for our first tag handler.


    **Listing 6-6.** *DateTimeTag.java*


    package com.apress.projsp;


    import java.io.IOException;


    import java.text.DateFormat;


    import java.util.Date;


    import javax.servlet.jsp.JspException;


    import javax.servlet.jsp.tagext.SimpleTagSupport;


    public class DateTimeTag extends SimpleTagSupport {


    public void doTag() throws JspException, IOException {


    DateFormat df = DateFormat.getDateTimeInstance(


    DateFormat.MEDIUM, DateFormat.MEDIUM);


    // now write out the formatted date to the page


    getJspContext().getOut().write(df.format(new Date()));


    }


    }


    As you can see, the actual code for the tag handler is pretty straightforward.
    The SimpleTag interface provides the doTag() method, and as defined by the simple
    tag life cycle, this method is called to execute the functionality encapsulated
    within the tag. In this example, a DateFormat object is created and used to format
    the current date. This string is then output back to the page by using the JspContext
    object. The getOut() method on the JspContext object returns a reference to the
    JspWriter instance that is being used to render the JSP page. This is one of the
    reasons why a tag needs to know about the environment in which it’s running. If
    it didn’t, the tag would never be able to output content directly back to the
    page.


    At this point, you may be saying to yourself, “Why would I want to write a 14-line
    Java class file (and a 21-line descriptor in the upcoming Listing 6-7) to do the
    same work that can be accomplished in a 2-line JSP scriptlet?” There are several
    reasons, which we’ve touched on in other parts of the book, and which we’ll repeat
    here.


    First, page developers are often not Java developers. By abstracting Java code
    out of the page, page developers can focus on what they do best. You may find
    it trivial to write a 2-line scriptlet that uses DateFormat and Date objects,
    but the page developer may not find it so trivial.


    Second, by encapsulating this behavior in a tag, you can guarantee that every
    use of the tag will produce the same presentation, something you can’t guarantee
    with cut-and-paste reuse of scriptlets.


    Third, you increase the maintainability of your JSPs. If a change or fix is made,
    you have to edit only the tag handler class, and every page automatically is changed.
    With scriptlets, someone would need to locate and fix every scriptlet.


    513-0 ch06.qxd 11/17/05 8:41 PM Page 270


    **270**


    C H A P T E R 6 ■ TA G F I L E S A N D S I M P L E TA G S


    Finally, this simplistic example hides the true power of tag handlers. Because
    tag handlers are Java classes, they can use all the features of Java to provide
    extremely rich and powerful behavior. For example, the tag handler could connect
    to a database and retrieve some data, then use that data to access a web service,
    and then use the results of the web service to perform some other action. This
    same behavior implemented as scriptlets would result in a JSP


    page that had scriptlet code mixed with template text in a source file that would
    be hard to read and hard to maintain.


    Compiling the Tag Handler


    Compiling tag handlers is a straightforward task and requires that the JSP API
    JAR file is present in your CLASSPATH. The JSP library you need is jsp-api.jar,
    which contains classes that make up the core JSP and tag APIs, including classes
    and interfaces such as SimpleTag, SimpleTagSupport, and JspContext. In Tomcat
    5, this JAR file can be found in the TOMCAT_HOME\ common\lib directory.


    ■**Tip** If you are using a different container, check your container documentation
    to find the JAR file that contains the JSP API classes.


    Writing the Tag Library Descriptor File


    With the tag handler written and compiled, the next step is to write the TLD file,
    which is an XML file that describes the tag, how it will be used on the page,
    the type of body content, whether the tag accepts any attributes, and so on. Listing
    6-7 shows the TLD file for this example.


    **Listing 6-7.** *ch06.tld*


    <?xml version="1.0" encoding="UTF-8" ?>


    <taglib


    xsi:schemaLocation="http://java.sun.com/xml/ns/javaee/web-jsptaglibrary_2_1.xsd"


    version="2.1">


    <description>


    Tag library for Professional JSP 2.1, Chapter 6.


    </description>


    <jsp-version>2.1</jsp-version>


    <tlib-version>1.0</tlib-version>


    <short-name>ch06</short-name>


    <uri>http://www.apress.com/projsp/ch06</uri>


    <tag>


    <name>datetime</name>


    <tag-class>com.apress.projsp.DateTimeTag</tag-class>


    <body-content>empty</body-content>


