    **The <jsp:getProperty> and <jsp:setProperty> Actions** You saw from the <jsp:useBean>
    action how simple it is to work with JavaBeans from inside the JSP pages. It should
    probably be of little surprise to learn that there are also standard actions designed
    to manipulate and retrieve the attributes of these JavaBeans, again without the
    need for scriptlets or expressions!


    513-0 ch01.qxd 9/30/05 4:08 PM Page 39


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **39**


    As the name suggests, the <jsp:getProperty> tag is used to retrieve or access
    the existing properties of a JavaBean instance. Any JavaBean properties that are
    retrieved by using this tag are automatically converted to a string and are placed
    into the implicit out variable, as output.


    The syntax for this tag is as follows:


    <jsp:getProperty name="name" property="propertyName" /> The <jsp:getProperty>
    tag has two attributes: name and property, both of which must be present. The
    name attribute references the name of the JavaBean instance on which the property
    attribute exists. This attribute will search all available JSP scopes until the
    named JavaBean is found. Should the tag fail to locate the requested JavaBean,
    a suitable exception will be thrown at request time.


    This tag is relatively simple in the functionality that it provides, but to use
    it in a JSP, you must ensure that the JavaBean has already been made available
    to the JSP engine through a


    <jsp:useBean> tag. Without the inclusion of this extra tag, neither the <jsp:getProperty>
    nor the <jsp:setProperty> tag will function as expected.


    Although the previous example you saw was a great improvement over the earlier
    scriptlet-based example, you still relied on the use of a JSP expression to access
    the date property from DateFormatBean. You can use the <jsp:getProperty> action
    instead of the expression so that the entire JSP page is XML based.


    Look at Listing 1-11 to see the changes to the earlier example that would be necessary
    (dateBean_getProperty.jsp).


    **Listing 1-11.** *dateBean_getProperty.jsp*


    <html>


    <head>


    <title>Professional JSP 2.1 </title>


    </head>


    <body style="font-family:verdana;font-size:10pt;">


    <jsp:useBean id="date"


    class="com.apress.projsp.DateFormatBean"/>


    <h2>Today''s Date is <jsp:getProperty name="date"


    property="date"/></h2>


    </body>


    </html>


    Again, this is a better solution. Yet you still haven’t changed the content returned,
    just its implementation.


    To complement the <jsp:getProperty> action, the <jsp:setProperty> tag can be used
    to set the value of an attribute inside a JavaBean. The <jsp:setProperty> action
    is somewhat more flexible and provides the ability to set properties based on
    request attributes, and so on.


    In its simplest form, the action may be used as follows:


    <jsp:setProperty name="beanName" property="property" value="value"/> The name
    and property attributes are used in exactly the same way as with the


    <jsp:getProperty> action; the additional value attribute simply indicates the
    new value to set the JavaBean property to.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 40


    **40**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    In addition to the preceding simple syntax, you can use the <jsp:getProperty>
    action in a number of other ways:


    <jsp:setProperty name="beanName" property="*" /> When using this syntax, the JSP
    page will attempt to find request parameters in the request with the same names
    as the JavaBean properties. The JavaBean properties will be set with the value
    of the matching request parameter.


    <jsp:setProperty name="beanName" property="property"


    param="paramName"/>


    When using the param attribute, the JSP page will set the value of the property
    that has the given property name to the value of the parameter given by paramName
    in the set of request parameters.


    <jsp:setProperty name="beanName" property="property" /> When using only the property
    attribute, the JSP page will attempt to set the value of the property by matching
    the property name to the parameter with the same name in the set of request parameters.


    Although the <jsp:setProperty> action can be used anywhere within a JSP page,
    it’s often used as a nested action inside the body content of the <jsp:useBean>
    action. The consequence of this is that the nested <jsp:setProperty> action will
    be executed only the first time the


    <jsp:useBean> instantiates a JavaBean. If an existing JavaBean is located in any
    one of the JSP


    scopes, the nested action won’t be called.


    In Listing 1-9 earlier, there were two methods that additionally set the date
    and the date format properties to custom values. Let’s use the <jsp:setProperty>
    action to set the date format to a different value from that in the previous example
    (see Listing 1-12).


    **Listing 1-12.** *dateBean_setProperty.jsp*


    <html>


    <head>


    <title>Professional JSP 2.1</title>


    </head>


    <body style="font-family:verdana;font-size:10pt;">


    <jsp:useBean id="date" class="com.apress.projsp.DateFormatBean">


    <jsp:setProperty name="date" property="format"


    value="EEE, d MMM yyyy HH:mm:ss z"/>


    </jsp:useBean>


    <h2>Today''s Date is <jsp:getProperty name="date" property="date"/></h2>


    </body>


    </html>


