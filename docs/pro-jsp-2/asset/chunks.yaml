    The BodyTag interface provides a powerful way to transform and manipulate body
    content before it is finally sent to the JSP page and ultimately the user. In
    this example, you specified a body content of scriptless for the tag, meaning
    that the content was evaluated in the typical way by the container.


    Tag-Dependent Body Content


    The other body content type supported by the JSP 2.1 specification is called tagdependent.
    Here, any content between the start and end tags is completely ignored (that is,
    it isn’t processed) by the JSP container, and it’s up to the custom tag to do
    something with it. For example, changing the body content of your <emailAddressFilter>
    tag to tagdependent yields the result shown in Figure 7-9.


    **Figure 7-9.** *When the body content of the tag is tagdependent, processing
    of the body must be performed by the tag handler, not by the JSP implementation
    page.*


    The JSP container simply doesn’t process any expressions, custom tags, or Java
    code, leaving the body content exactly as is. So why is tagdependent body content
    useful?


    One possible use of a custom tag that uses tagdependent body content is a tag
    that provides a way to emulate another programming language. Using tagdependent
    body content, you could write code in this other programming language between
    the start and end tags, and then use the BodyTag interface to extract it and execute
    it in some way. When the code has been run (perhaps through an external interpreter),
    the body content could be cleared of the code and the results inserted instead.


