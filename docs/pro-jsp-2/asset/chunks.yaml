    The include Directive


    You’ve just seen how the page directive can be used to pass information to the
    JSP engine during the translation phase, to control how the page implementation
    class is generated. The include directive also executes at translation time and
    enables the contents of a separate resource to be statically merged inside the
    original page, thus radically affecting the generated servlet.


    After translation, the generated JSP servlet contains the content and logic as
    defined by the two separate resources, in the order that they were specified in
    the original JSP. This makes it seem as though they were from a single JSP file.


    The following is the syntax for the include directive:


    <%@ include file="relativeURL" %>


    513-0 ch01.qxd 9/30/05 4:08 PM Page 29


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **29**


    The directive accepts a single file attribute that is used to indicate the resource
    whose content is to be included in the declaring JSP. The file attribute is interpreted
    as a relative URL: if it starts with a slash, it’s interpreted as relative to
    the context of the web application (namely a context-relative path); otherwise,
    it’s interpreted as relative to the path of the JSP


    page that contains the include directive (namely a page-relative path). The included
    file may contain either static content, such as HTML or XML, or another JSP page.


    For example:


    <%@ include file="/copyright.html"%>


    As you can see from the previous example, a static HTML file located at the root
    of the web-application context will be statically included in the JSP page that
    declares the directive.


    The included file in this case contains important legal copyright information
    that must be included on all pages of a web application. The include directive
    is an excellent mechanism for reusing a predefined component, such as the copyright.html
    file, to save the duplication of code on each page. This makes the JSP pages smaller,
    easier to read, and more maintainable, as changes need to be applied in only one
    place but are reflected throughout the application.


    ■**Caution** When using the include directive, remember that the combined contents
    of the original JSP


    page and all its included resources are translated into the same implementation
    servlet. Therefore, the original JSP page will share its scripting variables and
    declarations with those inside the included resources, and any duplication of
    variable or method names will result in a fatal JSP translation error, because
    the merged file won’t be syntactically correct.


    The include directive is slightly different from the other JSP directives, which
    are typically declared only once at the top of each JSP page. A JSP page may contain
    any number of include directives at any position in the page to indicate the exact
    positions where the content from the included resource should be inserted. Therefore,
    the include directive is well suited to implement simple template mechanisms that
    are so commonly used in today’s modern web applications. This enables all the
    commonly used resources of a web application (such as a header, footer, or navigation
    page) to be encapsulated as separate components (for example, JSP pages or static
    HTML pages) included throughout the application.


    Let’s consider a real-world example of such a templating mechanism that utilizes
    the include directive to provide a consistent page layout for a web application.


    Consider the following two JSP pages, Header.jsp (Listing 1-4) and Footer.jsp
    (Listing 1-5).


    **Listing 1-4.** *Header.jsp*


    <html>


    <head><title>A Very Simple Example</title></head>


    <body style="font-family:verdana,arial;font-size:10pt;">


    <table width="100%" height="100%">


    <tr bgcolor="#99CCCC">


    <td align="right" height="15%">Welcome to this example...</td>


    </tr>


    <tr>


    <td height="75%">


    ![Image 8](index-63_1.png)


    513-0 ch01.qxd 9/30/05 4:08 PM Page 30


    **30**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **Listing 1-5.** *Footer.jsp*


    </td>


    </tr>


    <tr bgcolor=" #99CC99">


    <td align="center" height="10%">Copyright ACompany.com 2005</td>


    </tr>


    </table>


    </body>


    </html>


    Header.jsp declares the starting elements of an HTML table that is to be 100 percent
    of the page size and has two rows, whereas Footer.jsp simply declares the closing
    elements for the table. Used separately, either page will result in partial HTML
    code that will look strange to a user, but when they’re combined by using the
    include directive, it’s easy to create consistent pages as part of a web application.


    Let’s see just how simple this basic template mechanism is to use. Listing 1-6
    shows a JSP


    page that uses the include directive.


    **Listing 1-6.** *Content.jsp*


    <%@ include file=''./Header.jsp''%>


    <p align="center">The Content Goes Here...!!!</p>


    <%@ include file=''./Footer.jsp''%>


    Content.jsp looks like a simple page with only three lines of code: the two include
    directives and the actual body of the page. Notice how the body of the page is
    between the two directives. This ensures that all of this page’s body content
    is included inside the table declared in Header.jsp.


    To run this example, simply copy the three files Content.jsp, Header.jsp, and
    Footer.jsp beneath the test web application directory you created earlier and
    go to the following URL: http://localhost:8080/test/Content.jsp


    You should see something like Figure 1-10.


    **Figure 1-10.** *A common header and footer can easily be included in all JSP
    pages.*


    ![Image 9](index-64_1.png)


