    Formatting Actions


    Ensuring that your clients view your JSP pages in their own language is just the
    tip of the ice-berg with regard to building a fully internationalized and localized
    application. In addition to language, users from different locales have different
    standards regarding the following:


    • Date and time formats


    • Number formats


    • Currency formats


    • Colors


    • Page layouts


    • Address standards (zip codes)


    Fortunately, to make your job easier, the formatting tag library provided by the
    JSTL


    enables various data elements in a JSP page, such as numbers, dates, and times,
    to be formatted and parsed in a locale-sensitive or customized manner.


    513-0 ch04.qxd 11/17/05 8:41 PM Page 164


    **164**


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **The <fmt:timeZone> and <fmt:setTimeZone> Actions** Date-and-time information
    on a JSP page can be displayed in a manner consistent with the preferred time
    zone of a client. This is enormously useful if your server that hosts the page
    and the client reside in different time zones. The JSTL provides two actions to
    enable any I18n-aware date-and-time actions to format or parse their date-and-time
    information in an appropriate manner.


    The <fmt:timeZone> and <fmt:setTimeZone> actions complement each other in a similar
    fashion as the <fmt:bundle> and <fmt:setBundle> actions introduced earlier. The
    <fmt:timeZone> action is used to specify a time zone for any nested I18n-aware
    actions that appear inside its body content, whereas <fmt:setTimeZone> can be
    used to store a reference to a time zone in an exportable variable for use anywhere
    on a JSP page.


    The <fmt:timeZone> action is used as follows:


    <fmt:timeZone value="GMT">


    //...date/time actions go here


    </fmt:timeZone>


    A single attribute called value is used to specify the time zone, which can either
    be a java.util.TimeZone object or a string that represents one of the time zone
    IDs supported by the Java platform (such as “America/Los Angeles” or a custom
    time zone such as “GMT-8”).


    The <fmt:setTimeZone> action is used as follows:


    <fmt:setTimeZone value="GMT" var="myTimeZone" scope="request" /> This action enables
    a java.util.TimeZone object to be stored in a scoped variable that can be utilized
    by any I18n-aware actions such as the <fmt:formatDate> and <fmt:parseDate> actions,
    which you’ll see next.


    **The <fmt:formatDate> and <fmt:parseDate> Actions** The two I18n-aware date actions
    provided by the JSTL are <fmt:formatDate> and


    <fmt:parseDate>. Both actions may be used in conjunction with the time-zone actions
    mentioned earlier.


    The <fmt:formatDate> action provides flexible, time zone–aware formatting of java.


    util.Date objects so that the date and time may be displayed correctly depending
    on the client’s time zone. In its simplest form, the <fmt:formatDate> action applies
    the default formats of the current time zone and outputs them to the current JspWriter
    as follows:


    <jsp:useBean id="now" class="java.util.Date /">


    <fmt:formatDate value="${now}"/>


    As mentioned, the <fmt:formatDate> action is highly flexible and provides the
    ability to display dates and times in predefined or custom formats by using the
    conventions as set out by the java.text.DateFormat class. The ability to store
    the formatted date in a scoped string variable is also provided.


    513-0 ch04.qxd 11/17/05 8:41 PM Page 165


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    **165**


    Listing 4-10 shows just some of the formatting options provided by the <fmt:formatDate>
    action. Notice how the standard <jsp:useBean> action is used here to create an
    instance of the java.util.Date class, which is used by the JSTL actions.


    **Listing 4-10.** *fmt_formatDate.jsp*


    <%@ taglib uri="http://java.sun.com/jstl/fmt" prefix="fmt"%>


    <jsp:useBean id="now" class="java.util.Date" />


    <h1>Examples of Date & Time Formatting</h1>


    <hr>


    <h2>Default Time Zone</H2>


    Default format : <fmt:formatDate value="${now}"/><br> A Date only in a Custom
    dd/MM/yyyy format :


    <fmt:formatDate value="${now}" type="DATE" pattern="dd/MM/yyyy"/><br> A Time only
    in MEDIUM format :


    <fmt:formatDate value="${now}" type="TIME" dateStyle="MEDIUM"/><br> A Date and
    Time in FULL format :


    <fmt:formatDate value="${now}" type="BOTH" dateStyle="FULL"


    timeStyle="FULL"/><br>


    <hr>


    <h2>America/Los_Angeles Time Zone</h2>


    <fmt:timeZone value="America/Los_Angeles"> Default format : <fmt:formatDate value="${now}"/><br>
    A Date only in a Custom MM-dd-yyyy format :


    <fmt:formatDate value="${now}" type="DATE" pattern="MM-dd-yyyy"/><br> A Time only
    in MEDIUM format :


    <fmt:formatDate value="${now}" type="TIME" dateStyle="MEDIUM"/><br> A Date and
    Time in FULL format :


    <fmt:formatDate value="${now}" type="BOTH" dateStyle="FULL"


    timeStyle="FULL"/><br>


    </fmt:timeZone>


    Notice that in the first set of examples a time zone isn’t specified, so the default
    time zone is used instead (MDT in this case). There are several examples that
    demonstrate the predefined date-and-time formats as well as a custom date format
    of dd/MM/yyyy.


    The second set of examples explicitly sets the time zone to America/Los_Angeles
    by using the <fmt:timeZone> action. Notice how the times have been automatically
    altered to their new time zone—clever, eh! Also notice that you’re using a different
    custom format of MM-dd-yyyy instead this time.


