  trans: "\n尽管这种关注点分离的方式看起来确实比简单的以页面为中心的设计要复杂一些，但它使您能够独立地修改这三个组件中的每一个。您可以分别修改数据模式、业务逻辑或表示层。这不仅因为每种特定类型的代码都有集中存放的位置而使得应用程序更易于维护，而且整个系统现在也更具可扩展性。需要添加新的功能流程？只需将逻辑添加到控制器组件中，并添加一个新视图来向用户显示相关信息即可。当然，仍然有可能构建出难以维护的\
    \ MVC Web 应用程序，因此，在设计开发过程中可以使用一系列经过验证的模式。\n\n**设计模式**\n\n对**设计模式**的一个简单描述是：它们是在特定上下文中针对常见问题的可复用解决方案。除此之外，通过其记录方式，模式还提供了一种通用的语言来理解和运用它们。\n\
    \n513-0 ch14.qxd 11/17/05 8:44 PM 第 540 页\n\n**540**\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\
    \n模式真正进入公众视野是在“四人组”（Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides）出版了《设计模式：可复用面向对象软件的基础》（Addison-Wesley，1995\
    \ 年）之后。这本书详细介绍了大量针对结构、行为和创建上下文中常见的、与语言无关的设计问题的可复用解决方案。以这些原始设计模式为基础，许多人扩展了这项工作，为\
    \ Java EE 系统的设计和实现记录了新的模式，其中包括许多与构建基于 Java 的 Web 应用程序相关的模式。\n\n乍一看，模式似乎会使系统的设计复杂化，在某种程度上确实如此。毕竟，当一个类就能解决问题时，为什么要用一组相关的类来实现一个功能呢？嗯，好处体现在多个层面。使用模式及其通用的语言，使我们作为软件开发人员能够轻松地交流应用程序特定部分的工作原理。例如，如果我们有一个负责按需创建其他类型类的类，使用这个模式的通用名称（在这种情况下是“工厂”）就提供了一定程度的共同理解。这很有用，因为它有助于项目团队的其他成员或任何查看代码的人轻松掌握它。\n\
    \n使用模式的能力也有助于确保在应用程序中解决重复出现的问题时具有一定的一致性。这种做法随后促进了代码复用（因此也提高了质量）和可维护性，同样是因为设计更容易理解。此外，由于模式能够为设计引入一定程度的组织结构，因此该设计的可扩展性通常比使用单个类构建相同功能时要大。\n\
    \n**Java EE 模式与 Web 应用程序**\n\n**组件**\n\n迄今为止最著名的 Java EE 模式集合可能是 Sun Java Center\
    \ 在 http://java.sun.com/blueprints/corej2eepatterns 上编录的那些。该目录中包含的模式涵盖了 Java EE\
    \ 5 架构的所有层，如果您正在构建多层企业应用程序，它们非常值得一看。就本章而言，您只对与构建 Java EE 应用程序的 Web 层相关的那些模式感兴趣。让我们来看看其中的一些模式，看看它们如何帮助您构建设计良好的\
    \ Web 应用程序。\n\n**前端控制器**\n\n正如您在 MVC 架构的讨论中所了解到的，控制器组件充当 Web 应用程序的网关，是所有请求得到服务的中心位置。就其本身而言，MVC\
    \ 架构是与编程语言无关的，在将其转化为基于 Java 的 Web 应用程序世界时，Sun Java Center 提出了**前端控制器**模式，这是 MVC\
    \ 中控制器的 Java EE 特定版本。\n\n清单 14-1 展示了此模式的一个原型实现。\n\n513-0 ch14.qxd 11/17/05 8:44\
    \ PM 第 541 页\n\n第 14 章 ■ WEB 应用程序设计与最佳实践\n\n**541**\n\n**清单 14-1.** *FrontController.java*\n\
    \n```java\npackage com.apress.projsp;\n\nimport java.io.IOException;\n\nimport\
    \ javax.servlet.RequestDispatcher;\n\nimport javax.servlet.ServletException;\n\
    \nimport javax.servlet.http.*;\n\npublic class FrontController extends HttpServlet\
    \ {\n\n    protected void processRequest(HttpServletRequest request, HttpServletResponse\
    \ response)\n            throws ServletException, IOException {\n\n        //\
    \ 步骤 1 – 执行业务逻辑并操作模型\n        // someObject.someBusinessLogic();\n\n        //\
    \ 步骤 2 – 分派到适当的视图组件\n        RequestDispatcher dispatcher =\n                getServletContext().\n\
    \                getRequestDispatcher(\"视图组件的名称\");\n        dispatcher.forward(request,\
    \ response);\n    }\n\n    protected void doGet(HttpServletRequest req, HttpServletResponse\
    \ res)\n            throws ServletException, IOException {\n        processRequest(req,\
    \ res);\n    }\n\n    protected void doPost(HttpServletRequest req, HttpServletResponse\
    \ res)\n            throws ServletException, IOException {\n        processRequest(req,\
    \ res);\n    }\n}\n```\n\n正如这个示例实现所示，前端控制器可以简单到只是一个响应 HTTP GET 和 POST 请求的 Servlet。尽管代码实际上没有显示任何被调用的真实业务逻辑，但它确实展示了处理请求的步骤。首先，通过执行一些业务逻辑来处理请求，然后重定向到或分派到将向用户呈现信息的视图组件。此实现的主要问题是，如果应用程序的所有业务逻辑都封装在一个单一的控制器中，那么该控制器很快就会变得臃肿并承担大量职责。为了克服这个问题，您可以使用命令与控制器策略。\n\
    \n命令与控制器策略\n\n实现前端控制器模式的方法有很多种，每种方法都称为一种**策略**。例如，在前面的示例中，前端控制器是作为 Java Servlet\
    \ 实现的，尽管这并不妨碍该实现可以是一个 JSP 页面。为了克服控制器因包含特定系统的所有应用程序逻辑而变得臃肿的问题，命令与控制器策略将控制器 Servlet\
    \ 与实现**命令**设计模式的类结合起来。（命令模式是一种更通用的面向对象设计模式。）本质上，命令模式指出，执行特定任务所需的逻辑被封装到一个具有标准接口的单个类中，以执行该代码。例如，您可以将查找客户详细信息的逻辑封装到一个单独的类中，放在一个名为\
    \ `execute()` 的方法内。首先，您可以为前端控制器将要使用的所有命令定义一个标准接口。清单 14-2 展示了一个实现此功能的接口。\n\n**清单\
    \ 14-2.** *Action.java*\n\n```java\npackage com.apress.projsp;\n\nimport javax.servlet.ServletException;\n\
    \nimport javax.servlet.http.HttpServletRequest;\n\nimport javax.servlet.http.HttpServletResponse;\n\
    \npublic interface Action {\n\n    public String execute(HttpServletRequest request,\n\
    \                          HttpServletResponse response)\n            throws ServletException;\n\
    }\n```\n"
- fmt: "# This interface contains a single method with which to execute the logic\
    \ that will be encapsulated within concrete implementations of this interface.\
    \ Essentially, all you want to do is delegate the servicing of requests to an\
    \ `Action` instance instead of putting that code inside the controller. Therefore,\
    \ the method signature is defined to take references to the same request and response\
    \ objects that are used when processing an HTTP request with a servlet. By using\
    \ this interface, you can then supply an implementation that, given a customer\
    \ ID, looks up that customer and places the corresponding domain object into the\
    \ HTTP request to be displayed by the view component (see Listing 14-3).\n\n**Listing\
    \ 14-3.** *ViewCustomerAction.java*\n\n```\npackage com.apress.projsp;\n\nimport\
    \ javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    import javax.servlet.ServletException;\n\npublic class ViewCustomerAction implements\
    \ Action {\n    public String execute(HttpServletRequest request,\n          \
    \                HttpServletResponse response)\n            throws ServletException\
    \ {\n        String id = request.getParameter(\"id\");\n        Customer customer\
    \ = CustomerFactory.getInstance().getCustomer(id);\n        request.setAttribute(\"\
    customer\", customer);\n        return \"/view-customer.jsp\";\n    }\n}\n```\n\
    \nAssuming that all the necessary code to look up customers has been written,\
    \ when a `Customer` instance is found, you can use the `request` object as an\
    \ area in which to place any objects that are relevant for the lifetime of this\
    \ request via the `setAttribute()` method. The final point to note about this\
    \ implementation is that the value returned from the `execute()` method is the\
    \ name of the JSP page representing the view component. In other words, this is\
    \ the name of the JSP page that will be used to render, or present, the information\
    \ back to the user.\n\nWith all the business logic then wrapped up inside `Action`\
    \ instances, the front controller itself becomes very small and hence much more\
    \ cohesive, as Listing 14-4 shows.\n\n**Listing 14-4.** *FrontController.java*\n\
    \n```\npackage com.apress.projsp;\n\nimport java.io.IOException;\nimport javax.servlet.http.*;\n\
    import javax.servlet.ServletException;\nimport javax.servlet.RequestDispatcher;\n\
    \npublic class FrontController extends HttpServlet {\n    private ActionFactory\
    \ actionFactory = new ActionFactory();\n\n    protected void processRequest(HttpServletRequest\
    \ request,\n                                  HttpServletResponse response)\n\
    \            throws ServletException, IOException {\n        Action action;\n\
    \        try {\n            action = actionFactory.getAction(request);\n     \
    \   } catch (ActionNotFoundException anfe) {\n            throw new ServletException(anfe);\n\
    \        }\n\n        // Now process action, finding out which view to show the\
    \ user next\n        String nextView = action.execute(request, response);\n\n\
    \        // and finally redirect to appropriate view,\n        // remembering\
    \ to prefix the path\n        try {\n            if (nextView != null) {\n   \
    \             RequestDispatcher dispatcher =\n                        getServletContext().getRequestDispatcher(nextView);\n\
    \                dispatcher.forward(request, response);\n            }\n     \
    \   } catch (Exception e) {\n            e.printStackTrace();\n            throw\
    \ new ServletException(e);\n        }\n    }\n\n    protected void doGet(HttpServletRequest\
    \ req, HttpServletResponse res)\n            throws ServletException, IOException\
    \ {\n        processRequest(req, res);\n    }\n\n    protected void doPost(HttpServletRequest\
    \ req, HttpServletResponse res)\n            throws ServletException, IOException\
    \ {\n        processRequest(req, res);\n    }\n}\n```\n\nIn this version of the\
    \ front controller, you’re simply using a helper class to find which `Action`\
    \ implementation should be used to service this particular request. How does the\
    \ controller know which action to use? Well, there are various ways to communicate\
    \ the name of the action to the controller. These range from using a named parameter\
    \ within the query string to encoding the name of the action inside specially\
    \ mapped URLs. One such example might be as follows:\n\n`http://www.mycompany.com/controller/ViewCustomer?id=123456`\n\
    \nThe key benefit of using the command and controller strategy is that it allows\
    \ you to maintain a central place for accepting requests, while keeping the logic\
    \ to actually service an individual request separate from that needed to service\
    \ other types of requests.\n\n## View Components\n\nBefore we move on to other\
    \ patterns, we need to spend a little time discussing **View Components** within\
    \ Java EE patterns. With the controller responsible for the business logic related\
    \ to servicing a request, you may be asking how to implement the view components.\
    \ In the simplest case, the views are implemented as JSP pages that are forwarded\
    \ by the controller component. The job of the controller (or an action class if\
    \ you’re using that strategy) is to perform any processing and set up the environment\
    \ for the view to present the information. In Chapter 9, you saw that it’s quite\
    \ possible for JSP pages to contain database code so that they can find the data\
    \ they’re supposed to display. However, the MVC architecture turns this on its\
    \ head because it’s now the responsibility of the controller to find that data.\
    \ As you saw in the previous sample action implementation, it’s possible to use\
    \ the `request` object to store information that’s required for the lifetime of\
    \ the current request: `request.setAttribute(\"customer\", customer);`\n\nHere,\
    \ you’re just placing a `Customer` instance into the map of objects maintained\
    \ by the `request`. When it comes to presenting the information from the view,\
    \ you can use the JSP EL to locate that `Customer` instance and display it. For\
    \ example, you can use the following expression to display the name of the customer\
    \ (assuming that a method called `getName()` exists): `${customer.name}`\n\nThis\
    \ separation of business and presentation logic gives you the ability to easily\
    \ change one or the other independently if necessary. Should you need to change\
    \ the way that the customer is presented to the user, this is no problem. You\
    \ can just modify the JSP page without danger of breaking the existing business\
    \ logic of locating that customer.\n\n### View Helper\n\nAlthough the front controller\
    \ is responsible (possibly through delegation to commands) for executing the business\
    \ logic required to service a given request, there is still often logic that is\
    \ related to only the presentation of that information. View components such as\
    \ JSP pages are great at displaying information, but sometimes some more code\
    \ is needed. Perhaps a list of objects needs to be sorted prior to being displayed,\
    \ or perhaps the information needs to be formatted in some specific way. Although\
    \ that code can simply be embedded into the view components, the **View Helper**\
    \ pattern describes a way to wrap up this code and make it reusable over multiple\
    \ views.\n\nYou have already seen many examples of view helpers. If you look back\
    \ to Chapter 7, one of the tags you saw filtered the domain of e-mail addresses,\
    \ making it harder for spammers to obtain addresses. Although extremely useful,\
    \ such logic isn’t really classed as business logic. Instead, this is presentation\
    \ logic—code that helps the view present information back to the users. Of course,\
    \ such code could have been written and embedded into the JSP page, but this is\
    \ considered bad practice for reasons of quality, maintainability, and so on.\
    \ Instead, that code is wrapped inside a custom tag so that it can be used and\
    \ reused throughout the pages of the web application. In effect, this custom tag\
    \ is an implementation of the View Helper pattern. In this case, the tag is a\
    \ component that the view uses to help it perform its task.\n\n### Service to\
    \ Worker"
