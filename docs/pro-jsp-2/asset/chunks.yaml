    <servlet>


    <servlet-name>action</servlet-name>


    <servlet-class>org.apache.struts.action.ActionServlet</servlet-class>


    <init-param>


    <param-name>config</param-name>


    <param-value>/WEB-INF/struts-config.xml</param-value>


    </init-param>


    <init-param>


    <param-name>config/upload</param-name>


    <param-value>/WEB-INF/struts-upload.xml</param-value>


    </init-param>


    <init-param>


    <param-name>debug</param-name>


    <param-value>2</param-value>


    </init-param>


    <init-param>


    <param-name>detail</param-name>


    <param-value>2</param-value>


    </init-param>


    <load-on-startup>2</load-on-startup>


    </servlet>


    该配置表明此应用程序包含两个模块——默认模块（其名称中不含正斜杠 /）和第二个模块，即我们的“上传”功能。两个模块的配置文件均位于 WEB-INF 目录下。命名模块配置文件的推荐标准格式为
    struts-module.xml。


    在查看 ActionServlet 的配置时，我们想指出 1.0 版本与 1.1/1.2 版本之间的一些变化。在 1.0 版本中，通常的做法是将 ResourceBundle
    指定为“application”初始化参数。我们曾使用过此设置以及“nocache”初始化参数。在 Struts 1.1 中，这些设置已被弃用，并移至 struts-config.xml
    文件中的 <controller> 元素内。以下设置可在 metadata/web/struts-controller.xml 中找到：


    <controller nocache="true"


    inputForward="true"


    maxFileSize="2M" />


    nocache 设置指示控制器添加 HTTP 头以防止内容缓存——默认情况下该功能是关闭的。您还可以指定一个 forwardPattern 属性，例如 WEB-INF/pages/$M$P，其中
    $M 变量表示模块前缀，$P 表示所选 <forward> 元素的路径属性，不过此处并未使用该属性。inputForward 属性允许您在动作映射的 input
    属性中使用本地或全局转发。这是一个非常实用且备受期待的功能。


    ■**注意** 有关可选值及其含义的更多信息，可在线查阅 http://struts.apache.org/userGuide/configuration.html。


    现在，应用程序的 ResourceBundle 在 struts-config.xml 文件的 <message-resources> 元素中指定。如果您使用
    XDoclet，可以将其放在 struts-message-resources.xml 文件中。在 struts-resume 应用程序中，该文件与其他 Struts
    配置片段位于同一位置：


    <message-resources parameter="ApplicationResources"/> 由于我们将此文件（ApplicationResources.properties）保存在
    WEB-INF/classes 目录下，因此无需指定包名。您还可以通过添加第二个 <message-resources> 元素并指定 key 属性，为应用程序指定备用的资源包：


    <message-resources parameter="CustomResources" key="custom"/> 例如，如果您正在使用 Struts
    构建一个产品，并且只想暴露客户可能更改的最少选项，这将非常有用。要配合 <bean:message> 标签使用此 ResourceBundle，您只需指定一个与
    key 匹配的 bundle 属性：


    <bean:message key="webapp.title.prefix" bundle="custom"/> 现在您已经了解了如何为应用程序设置模块，接下来让我们看看如何在模块之间切换。为了演示，我们在
    struts-resume 中添加了一个用于上传简历的“upload”模块。该模块主要演示文件上传和模块切换功能。它可以发展成一个允许简单上传现有简历的功能，但功能不止于此。在撰写本文时，有两种基本技术可用于切换模块。第一种是使用一个设置了
    contextRelative 属性为 true 的转发（全局或本地）。这将指示控制器和请求分发器对模块敏感，而不仅仅是上下文敏感：


    <forward name="toUpload"


    contextRelative="true"


    path="/upload/index"


    redirect="true">


    在此示例中，index 是 tiles-upload.xml 文档中的一个定义。需要添加 redirect="true" 才能确保切换正确执行。第二种方法是使用内置的
    SwitchAction。使用 SwitchAction 会产生如下所示的 <action-mappings>：


    <action-mappings>


    <action path="/switchModule"


    type="org.apache.struts.actions.SwitchAction"/>


    ...


    </action-mappings>


    然后，要切换到上传模块，您可以使用类似 http://localhost:8080/struts-resume/switchAction.do?prefix=upload&page=index
    的 URL。我们认为使用全局转发技术更简单、更清晰，因此我们在 metadata/web/global-forwards.xml 中配置了以下转发：


    <forward name="uploadResume" contextRelative="true"


    path="/upload/index.do" redirect="true" /> 在为 struts-resume 构建“upload”模块时，我们注意到可以在应用程序之间共享配置设置。例如，我们共享了用于
    Tiles 的同一个 basicLayout.jsp 模板。我们遇到的一个问题是，子模块中包含的任何消息（在 ApplicationResources 中）和任何转发都必须在其各自的文件中定义。例如，我们必须定义错误页面消息、按钮标签和验证器消息。我们预料到了这一点，所以这不成问题。很高兴看到模块之间有清晰的分离，但同时也允许共享每个模块的部分内容。


    希望您觉得这足够简单，如果您认为应用程序中需要模块，可以考虑使用。目前模块的一个限制是，它们仅在您使用 ActionServlet 的扩展映射时才受支持。也就是说，支持
    *.do，但不支持 /do/*；但请查阅 Struts 网站 (http://struts.apache.org/) 或邮件列表以了解此问题的当前状态。


    **测试 Struts 应用程序**


    像任何优秀的 Java 程序员一样，您一定听说过测试框架，并且可能使用过 **JUnit**。JUnit 3.8.1 版本（struts-resume 所需）可从
    http://www.junit.org 下载。Ant 可以成为运行 JUnit 测试的非常强大的工具。要运行它们，您需要将 JUnit 的 JAR 文件
    (junit.jar) 放在 $ANT_HOME/lib 目录中。


    JUnit 非常适合测试 Servlet 容器外部的类，但无法提供测试用户实际行为所需的结构。为此，您有幸拥有来自 Jakarta 项目的 **Cactus**。Cactus
    是一个用于单元测试服务器端代码的简单测试框架。它通过*模拟对象*支持容器内测试和容器外测试。它非常巧妙，您可以运行一个测试（例如，针对 struts-resume
    应用程序运行 ant test-cactus -Dtestcase=ActionFilterTest），它会启动 Tomcat，运行测试，然后停止 Tomcat。它还与
    **HttpUnit** 集成，用于测试您的 JSP 页面并验证生成的 HTML 是否正确。有关 Cactus 的更多信息，请访问 http://jakarta.apache.org/cactus。您可以在
    http://httpunit.sourceforge.net 找到 HttpUnit 网站。


    struts-resume 示例使用一个名为 **JUnitDoclet** (http://www.junitdoclet.org) 的工具来生成基于 JUnit
    的骨架测试用例和所有 Java 源文件的测试套件。您只需执行 ant gen-test-module 命令，其中 module 可以是 common、web
    或 ejb。

