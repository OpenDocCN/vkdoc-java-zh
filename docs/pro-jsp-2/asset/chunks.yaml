    **Filter 3: A Filter for Adapting to Legacy Resources**


    The next filter you will examine addresses a common problem in the real world
    that occurs when two independent systems refer to each other through hyperlinks.
    Over time, the requirement and access changes because of independent evolution.
    Imagine that because of the size of the independent projects, or because of political
    situations, you can’t change the links to either one of the systems. To keep them
    working, you’ll create a filter that adapts one system to another, without modifying
    a single line of code in either system. Figure 11-10 shows the action of just
