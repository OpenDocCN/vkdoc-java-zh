    **A More Complex Function**


    Having looked at a very simple function that takes no parameters, you are now
    in a position to look at a more complex function. This function allows you to
    view the untranslated source of a JSP page presented in HTML format. To do this,
    the function will accept two parameters. Add the method shown in Listing 3-19
    to the Functions.java source file that was first presented in Listing 3-15.


    **Listing 3-19.** *source() (Addition to Functions.java)* import java.io.BufferedReader;


    import java.io.IOException;


    import java.io.InputStream;


    import java.io.InputStreamReader;


    import javax.servlet.jsp.PageContext;


    //...


    public static String source(String filename, PageContext pageContext) throws IOException
    {


