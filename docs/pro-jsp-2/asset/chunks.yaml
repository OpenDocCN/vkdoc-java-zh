- fmt: "# Using Struts, XDoclet, and Other Tools\n\nNow that we’ve reminded you of\
    \ the architecture of a typical Struts application and provided an overview of\
    \ an example `struts-resume` application, let’s review some techniques, tools,\
    \ and frameworks that you may not be aware of, which can enhance or speed up your\
    \ Struts application development. We’ll focus on Struts version 1.2 and mainly\
    \ on its advanced features.\n\nStruts has many great features, extensions, and\
    \ plug-ins available for developers. Some of these plug-ins can seem intimidating\
    \ at first, because they’re very powerful and extremely configurable. When we\
    \ first discovered some of them, we asked ourselves, “Who ordered the kitchen\
    \ sink?” However, there’s nothing wrong with using just a small piece of them\
    \ if that’s all you need.\n\nWe’ll start off by looking at two open-source tools\
    \ you can use to build and generate code respectively: Ant and XDoclet. Then we’ll\
    \ work through a series of techniques or tools you can use as you write code.\n\
    \n## Using Ant to Build Struts Applications\n\nApache Ant (available from http://ant.apache.org/)\
    \ is a powerful Java-based build tool. Using Ant will make your compile, assemble,\
    \ or deploy process much easier.\n\nAnt is by far our favorite tool to use with\
    \ Struts and Java as a whole. Yet we’ve met too many developers who either haven’t\
    \ heard of it or aren’t using it. *JavaWorld’s* readers voted it the “Most Useful\
    \ Java Community-Developed Technology” of 2002. Also, in 2003, it won the *JavaPro*\
    \ Readers’ Choice Award for “Most Valuable Java Deployment Technology.” In 2003\
    \ and 2004, it won the *Java Developer’s Journal* Editors’ Choice Award. Finally,\
    \ in 2003, it won the *JavaWorld* Editors’ Choice Award for “Most Useful Java\
    \ Community-Developed Technology.”\n\nIt won’t surprise us if it continues to\
    \ win awards in the future. We used to be trapped within the confines of an IDE\
    \ to compile our code, and now that we use Ant, we feel like we’ve been set free.\n\
    \nAnt is basically a technology that, at its very core, compiles your `.java`\
    \ files into `.class` files using a build file (commonly named `build.xml`). Using\
    \ Ant, it’s much easier to configure your class path for compiling files, as illustrated\
    \ by the following example:\n\n```\n<!-- Set a path reference that points to all\
    \ Struts' JAR files -->\n<path id=\"web.compile.classpath\">\n  <fileset dir=\"\
    /lib/jakarta-struts-1.1\" includes=\"*.jar\"/>\n</path>\n\n<target name=\"compile\"\
    \ description=\"compiles .java files into .class files\">\n  <mkdir dir=\"${build.dir}/web/classes\"\
    />\n  <javac srcdir=\"src/web\"\n         destdir=\"${build.dir}/web/classes\"\
    \n         debug=\"false\"\n         deprecation=\"true\"\n         optimize=\"\
    true\"\n         classpathref=\"web.compile.classpath\"\n  />\n</target>\n```\n\
    \nThe `<path>` element in the preceding snippet tells Ant to build a name-value\
    \ pair with the name `web.compile.classpath`; the value is constructed as a list\
    \ of all the JAR files in the `/lib/Jakarta-struts-1.1` directory. With a simple\
    \ declarative statement, Ant creates the compile classpath for you.\n\nFor this\
    \ chapter’s example application, version 1.5.1 (or higher) of Ant is required.\
    \ After downloading, you’ll need to extract it to a location on your hard drive\
    \ (for example, `c:\\Tools\\jakarta-ant-1.5.1` on Windows or `/usr/local/jakarta-ant-1.5.1`\
    \ on Linux and Unix). After extraction, you’ll need to set `ANT_HOME` as an environment\
    \ variable that points to this extracted location and also add `$ANT_HOME/bin`\
    \ to your `$PATH` environment variable.\n\n### Ant Tasks\n\nExecuting `ant -projecthelp`\
    \ will display the basic Ant tasks, but the following are ones you’ll use most\
    \ often:\n\n- `ant deploy`: Generates and compiles everything, then deploys to\
    \ Tomcat (if you have it installed).\n- `ant compile-module`: Where `module` is\
    \ `ejb`, `web`, or `common`.\n- `ant ejbdoclet`: Generates ValidatorForms and\
    \ Hibernate’s XML-based mapping file.\n- `ant webdoclet`: Generates `web.xml`,\
    \ `struts-config.xml`, `validation.xml`, and the TLD.\n- `ant test-module`: Where\
    \ `module` may have the same values as for the compile option mentioned previously.\
    \ This recursively runs all tests in the `test/module` directory. We recommend\
    \ using `ant test-module -Dtestcase=ClassName`, where `ClassName` is the name\
    \ of your test class.\n- `ant test-cactus -Dtestcase=ClassName`: Starts Tomcat\
    \ before tests are run and stops it once they’re complete. Use `ant test-web -Dtestcase=ClassName`\
    \ if Tomcat is already running.\n\nMany third-party libraries in `struts-resume`\
    \ require that you define a *task definition* for them to integrate with Ant.\
    \ For instance, to use XDoclet to generate the Struts configuration file `struts-config.xml`,\
    \ you must define the `\"webdoclet\"` task:\n\n```\n<taskdef name=\"webdoclet\"\
    \n         classname=\"xdoclet.modules.web.WebDocletTask\">\n  <classpath>\n \
    \   <path refid=\"xdoclet.classpath\"/>\n    <path refid=\"web.compile.classpath\"\
    />\n  </classpath>\n</taskdef>\n```\n\nAfter defining this task, it can be used\
    \ in your `build.xml` file, just like the `<javac>` task (see the previous example)\
    \ is used. You can see the available attributes for this task in the section “Using\
    \ XDoclet to Generate Configuration Files.”\n\n### Using Ant in the Example Application\n\
    \nWithin `struts-resume`, Ant performs all of the following tasks:\n\n- Generates\
    \ Java code and XML files (via XDoclet)\n- Builds (compiles) the entire source\
    \ tree (`.java` files)\n- Assembles the components into JAR and Web ARchive (WAR)\
    \ files\n- Deploys the WAR file to Tomcat\n- Runs unit tests and in-container\
    \ testing (via Cactus)\n\nAnt is one of those technologies that we love because\
    \ it *just works*. We’ve modeled the `build.xml` file in the `struts-resume` application\
    \ to fit with the Ant Best Practices recommended by Erik Hatcher in his book *Java\
    \ Development with Ant*. We’ve used much of his architecture from his book’s sample\
    \ application and exchanged quite a few e-mails with him about it. The flexibility\
    \ granted by having a test source-code directory (`test/src`) separate from the\
    \ regular source-code directory (`src`) makes it easy to exclude test classes\
    \ from a production deployment.\n\nFinally, to us Struts has been an extremely\
    \ stable framework—even the nightly builds. When you look at the Ant build file\
    \ for your example application, you’ll see we’ve created it so that you can easily\
    \ switch versions of any third-party library, including Struts. All you need to\
    \ do is download and extract a new version into the `lib` directory and change\
    \ the version number given in `lib/lib.properties`. This really makes it easy\
    \ to test a new version of a library and see whether your application still works.\
    \ You can also override library directories from the command line using something\
    \ like `ant -Dstruts-dir=/path/to/struts/jars`.\n\n## Using XDoclet to Generate\
    \ Configuration Files\n\nXDoclet is a code-generation engine. It enables attribute-oriented\
    \ programming for Java. In short, this means that you can add more significance\
    \ to your code by adding metadata (attributes) to your Java sources. This is done\
    \ in special JavaDoc tags. XDoclet will parse your source files and generate many\
    \ artifacts such as XML descriptors and/or source code from it.\n\nThese files\
    \ are generated from templates that use the information provided in the source\
    \ code and its Javadocs tags. At the time of this writing, XDoclet can only be\
    \ used as part of a build process utilizing Ant. Documentation and downloads for\
    \ XDoclet are available from http://xdoclet.sourceforge.net/."
  raw: 'Now that we’ve reminded you of the architecture of a typical Struts application
    and provided an overview of an example struts-resume application, let’s review
    some techniques, tools, and frameworks that you may not be aware of, which can
    enhance or speed up your Struts application development. We’ll focus on Struts
    version 1.2 and mainly on its advanced features.


    Struts has many great features, extensions, and plug-ins available for developers.
    Some of these plug-ins can seem intimidating at first, because they’re very powerful
    and extremely configurable. When we first discovered some of them, we asked ourselves,
    “Who ordered the kitchen sink?” However, there’s nothing wrong with using just
    a small piece of them if that’s all you need.


    We’ll start off by looking at two open-source tools you can use to build and generate
    code respectively: Ant and XDoclet. Then we’ll work through a series of techniques
    or tools you can use as you write code.


    **Using Ant to Build Struts Applications**


    Apache Ant (available from http://ant.apache.org/) is a powerful Java-based build
    tool.


    Using Ant will make your compile, assemble, or deploy process much easier.


    Ant is by far our favorite tool to use with Struts and Java as a whole. Yet we’ve
    met too many developers who either haven’t heard of it or aren’t using it. *JavaWorld’s*
    readers voted it


    513-0 ch15.qxd 11/14/05 5:38 PM Page 583


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **583**


    the “Most Useful Java Community-Developed Technology” of 2002\. Also, in 2003,
    it won the *JavaPro* Readers’ Choice Award for “Most Valuable Java Deployment
    Technology.” In 2003 and 2004, it won the *Java Developer’s Journal* Editors’
    Choice Award. Finally, in 2003, it won the *JavaWorld* Editors’ Choice Award for
    “Most Useful Java Community-Developed Technology.”


    It won’t surprise us if it continues to win awards in the future. We used to be
    trapped within the confines of an IDE to compile our code, and now that we use
    Ant, we feel like we’ve been set free.


    Ant is basically a technology that, at its very core, compiles your .java files
    into .class files using a build file (commonly named build.xml). Using Ant, it’s
    much easier to configure your class path for compiling files, as illustrated by
    the following example:


    <!-- Set a path reference that points to all Struts'' JAR files -->


    <path id="web.compile.classpath">


    <fileset dir="/lib/jakarta-struts-1.1" includes="*.jar"/>


    </path>


    <target name="compile" description="compiles .java files into .class files">


    <mkdir dir="${build.dir}/web/classes"/>


    <javac srcdir="src/web"


    destdir="${build.dir}/web/classes"


    debug="false"


    deprecation="true"


    optimize="true"


    classpathref="web.compile.classpath"


    />


    </target>


    The <path> element in the preceding snippet tells Ant to build a name-value pair
    with the name web.compile.classpath; the value is constructed as a list of all
    the JAR files in the


    /lib/Jakarta-struts-1.1 directory. With a simple declarative statement, Ant creates
    the compile classpath for you.


    For this chapter’s example application, version 1.5.1 (or higher) of Ant is required.
    After downloading, you’ll need to extract it to a location on your hard drive
    (for example, c:\Tools\ jakarta-ant-1.5.1 on Windows or /usr/local/jakarta-ant-1.5.1
    on Linux and Unix). After extraction, you’ll need to set ANT_HOME as an environment
    variable that points to this extracted location and also add $ANT_HOME/bin to
    your $PATH environment variable.


    Ant Tasks


    Executing ant -projecthelp will display the basic Ant tasks, but the following
    are ones you’ll use most often:


    • ant deploy: Generates and compiles everything, then deploys to Tomcat (if you
    have it installed).


    • ant compile-module: Where module is ejb, web, or common.


    • ant ejbdoclet: Generates ValidatorForms and Hibernate’s XML-based mapping file.


    • ant webdoclet: Generates web.xml, struts-config.xml, validation.xml, and the
    TLD.


    513-0 ch15.qxd 11/14/05 5:38 PM Page 584


    **584**


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    • ant test-module: Where module may have the same values as for the compile option
    mentioned previously. This recursively runs all tests in the test/module directory.
    We recommend using ant test-module -Dtestcase=ClassName, where ClassName is the
    name of your test class.


    • ant test-cactus -Dtestcase=ClassName: Starts Tomcat before tests are run and
    stops it once they’re complete. Use ant test-web -Dtestcase=ClassName if Tomcat
    is already running.


    Many third-party libraries in struts-resume require that you define a *task definition*
    for them to integrate with Ant. For instance, to use XDoclet to generate the Struts
    configuration file struts-config.xml, you must define the "webdoclet" task:


    <taskdef name="webdoclet"


    classname="xdoclet.modules.web.WebDocletTask">


    <classpath>


    <path refid="xdoclet.classpath"/>


    <path refid="web.compile.classpath"/>


    </classpath>


    </taskdef>


    After defining this task, it can be used in your build.xml file, just like the
    <javac> task (see the previous example) is used. You can see the available attributes
    for this task in the section


    “Using XDoclet to Generate Configuration Files.”


    Using Ant in the Example Application


    Within struts-resume, Ant performs all of the following tasks:


    • Generates Java code and XML files (via XDoclet)


    • Builds (compiles) the entire source tree (.java files)


    • Assembles the components into JAR and Web ARchive (WAR) files


    • Deploys the WAR file to Tomcat


    • Runs unit tests and in-container testing (via Cactus) Ant is one of those technologies
    that we love because it *just works*. We’ve modeled the build.xml file in the
    struts-resume application to fit with the Ant Best Practices recommended by Erik
    Hatcher in his book *Java Development with Ant*.2 We’ve used much of his architecture
    from his book’s sample application and exchanged quite a few e-mails with him
    about it. The flexibility granted by having a test source-code directory (test/src)
    separate from the regular source-code directory (src) makes it easy to exclude
    test classes from a production deployment.


    Finally, to us Struts has been an extremely stable framework—even the nightly
    builds.


    When you look at the Ant build file for your example application, you’ll see we’ve
    created it so that you can easily switch versions of any third-party library,
    including Struts. All you need to do is download and extract a new version into
    the lib directory and change the version number given in lib/lib.properties. This
    really makes it easy to test a new version of a library and 2\. Hatcher, Erik
    and Steve Loughran, *Java Development with Ant* (Greenwich, CT: Manning Publications


    513-0 ch15.qxd 11/14/05 5:38 PM Page 585


    C H A P T E R 1 5 ■ U S I N G S T R U T S, X D O C L E T, A N D OT H E R TO O
    L S


    **585**


    see whether your application still works. You can also override library directories
    from the command line using something like ant -Dstruts-dir=/ path/to/struts/jars.


    **Using XDoclet to Generate Configuration Files**


    XDoclet is a code-generation engine. It enables **attribute-oriented programming**
    for Java.


    In short, this means that you can add more significance to your code by adding
    metadata (attributes) to your Java sources. This is done in special JavaDoc tags.
    XDoclet will parse your source files and generate many artifacts such as XML descriptors
    and/or source code from it.


    These files are generated from templates that use the information provided in
    the source code and its Javadocs tags. At the time of this writing, XDoclet can
    only be used as part of a build process utilizing Ant. Documentation and downloads
    for XDoclet are available from http://xdoclet.sourceforge.net/.'
