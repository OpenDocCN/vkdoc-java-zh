    <p>


    <h:commandButton value="Search" action="submit"/>


    </p>


    </h:form>


    </body>


    </f:view>


    </html>


    Throughout Chapters 3 and 4, we talked about ways to remove Java code from JSP
    pages.


    And as we stated at the beginning of this chapter, JSF provides another way to
    do this. Looking at Listing 5-2, you can see there is not a single declaration
    or scriptlet within the page. There are only two taglib directives, some standard
    HTML tags, and some tags that look like tags for custom actions. The tags that
    begin with f: or h: come from the tag libraries defined in the taglib directives.


    As you might guess from the taglib directive, the tags that use the prefix f:
    provide the core JSF functionality for the page, and tags that use the prefix
    h: provide HTML elements for the page. There is one JSF core tag in the page:
    the <view> tag. Any page that includes JSF elements must have the <view> tag as
    the outermost JSF tag. The rest of the JSF tags in the page create HTML elements
    in the page. The <form> tag creates an HTML form. The <input> tags create input
    text fields in the form. The <commandButton> tag creates a button in the form.


    If you are familiar with HTML forms, you know that every HTML form requires an
    action attribute and can include an optional method attribute. The action attribute
    tells the web browser where to submit the form data. The method attribute tells
    the browser whether to submit a GET request or a POST request. The JSF tag does
    not use either of these attributes.


    The JSF specification requires that all JSF forms post to the same URL from which
    they were served. (If form data is submitted to the same page, how then does the
    application process the data and move between pages in the application? This question
    will be answered in Listing 5-4 and in detail in the “Controlling Page Navigation”
    section later in this chapter.) The specification also requires that all JSF forms
    use the POST method for submitting form data to web applications. Because both
    the method and action have mandatory values that the programmer cannot change,
    they do not need to be specified in the JSF tag.


    Also note that the <input> tags have a different syntax than standard HTML for
    the value attribute. If you read the coverage of the EL in Chapter 3, you will
    recognize the #{} syntax as EL


    syntax. With EL, an expression such as #{flight.origination} is used when the
    JSP page wants to access a property of an object in the page. In Listing 5-1,
    you can see a property named origination with associated set and get methods.
    When this JavaBean is made available to a


