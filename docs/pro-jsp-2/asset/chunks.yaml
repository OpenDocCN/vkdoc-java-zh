    **The javax.servlet Interfaces**


    The javax.servlet package is composed of fourteen interfaces. The web container
    implements these seven interfaces:


    • ServletContext


    • ServletConfig


    • ServletResponse


    • ServletRequest


    • RequestDispatcher


    • FilterChain


    • FilterConfig


