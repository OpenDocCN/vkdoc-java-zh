- fmt: 'JUnit (`http://www.junit.org`), now the de facto standard for building automated
    tests within the Java language, is widely used on projects ranging from desktop
    applications to enterprise-scale distributed servers. JUnit provides a lightweight
    framework with which to write tests. At a high level, you simply extend one of
    the provided classes and write one or more methods to test each aspect of the
    class or classes that you wish to test. After you’ve compiled the test classes,
    you then run the tests through one of the JUnit test runners, and it’s this that
    keeps a tally of the passes and fails, issuing a result at the end of the process.


    `Listing 14-5` illustrates how easy it is to write automated unit tests in JUnit
    by showing how you might test a simple JavaBean representing a customer having
    two properties, `firstName` and `lastName`. In this example, the class has an
    additional method called `getFullName()` that simply joins the first and last
    names together with a space between them. With JUnit, you might want to test that
    the various get methods function as expected by setting the appropriate properties
    and performing assertions on the results of accessing those properties.


    **Listing 14-5.** *CustomerTest.java*


    ```java

    import junit.framework.TestCase;


    public class CustomerTest extends TestCase {


    public void testFirstName() {


    Customer customer = new Customer();


    customer.setFirstName("Simon");


    assertEquals("Simon", customer.getFirstName());


    }


    public void testLastName() {


    Customer customer = new Customer();


    customer.setLastName("Brown");


    assertEquals("Brown", customer.getLastName());


    }


    public void testFullName() {


    Customer customer = new Customer();


    customer.setFirstName("Simon");


    customer.setLastName("Brown");


    assertEquals("Simon Brown", customer.getFullName());


    }


    }

    ```


    All that you’re doing here is extending one of the classes provided by JUnit and
    implementing `testXXX()` methods for the various pieces of functionality that
    you’d like to test. In this case, you’re testing the ability to set/get the first,
    last, and full names. Of course, this is a simple example and it doesn’t cover
    exceptional cases such as null values. However, it does demonstrate how easy it
    is to write unit tests with JUnit and shows its potential.


    Getting started with JUnit can sometimes be tricky, particularly with respect
    to finding the motivation to write the tests in the first place. However, after
    they’ve gotten over the learning curve and experienced the benefit of JUnit, most
    people become hooked or, to use a phrase coined by the JUnit team, “test infected.”


    Seeing JUnit for the first time is a little daunting, especially when you start
    to think about how much more Java code you have to write for each and every class
    that you’re building. However, based on our experience of using JUnit, we’ve found
    that after you use JUnit for a while you will start to appreciate the power of
    automated unit tests and the confidence that it can give you when refactoring
    or redesigning parts of a system. The feeling of confidence you get when you make
    a big design change and the tests still work is amazing!


    When using JUnit, the types of classes that you can test include those representing
    the business domain, the business logic, MVC-style action classes, helper classes,
    and so on. Essentially, anything that stands alone can be tested using JUnit.
    In many web applications, this set of classes will cover the majority of the code
    being developed and should hopefully lead to a good level of confidence that the
    code works correctly. However, at times you may have stand-alone classes that
    still need to be run and therefore tested inside of a Java EE container environment.
    For these situations, JUnitEE is useful.


    ## JUnitEE


    JUnitEE (`http://www.junitee.org`) provides a way to run regular JUnit tests inside
    of a Java EE container. Why would you want to do this? Well, perhaps you have
    some classes that require the use of a database connection that is set up and
    made available to those classes through the container’s JNDI tree. Or perhaps
    those classes need access to some other enterprise resource to function properly.
    With JUnitEE, you can bundle up all of your classes and their tests into a WAR
    file that you can then deploy onto a Java EE web container such as Tomcat. To
    execute those tests, you then point your web browser to the newly deployed web
    application and a servlet runs behind the scenes to execute the JUnit tests and
    presents the results back to you.


    JUnitEE is effectively a lightweight test runner that allows you to execute tests
    within a server environment. However, it doesn’t allow you to test components
    such as servlets and JSPs any easier than JUnit. For this you have to look at
    other options such as Cactus.


    ## Cactus


    Cactus (`http://jakarta.apache.org/cactus/`) is an extension to JUnit that provides
    a mechanism for running unit tests inside of a running Java EE container. Although
    you’re able to run regular JUnit tests within a server environment when using
    JUnitEE, you still don’t have the complete infrastructure necessary to test those
    classes that depend on information delivered to them on a request-by-request basis.
    For example, to be able to truly test a servlet, you need to have a live request
    and response object available to you because the code inside the servlet might
    extract parameters from the request or push out information into the response.
    Cactus gives you the ability to test these types of components with the confidence
    that they’re running within their real environment.


    In Cactus, the testing functionality is broken into two halves. First is a client
    part. This looks just like a normal JUnit test and is used to initiate the test.
    The second part of Cactus lives on the server. Here, you can use Cactus-provided
    test classes to instantiate the components that you wish to test and invoke their
    methods. For example, you might choose to create a new instance of a servlet class
    and call the `doGet()` method. Of course, to actually call this method you need
    to have access to the HTTP request and response objects, so where do they come
    from?


    The key here is a test redirector component that sits between the client and server
    test classes. When a test is initiated by the client, a request is made to the
    Java EE container and this is intercepted by a Cactus-provided servlet that must
    also be running on the server. This servlet (the test redirector) then determines
    which server-side test needs to be run and initiates the appropriate test class.
    As an actual HTTP request has been made to the Java EE container, Cactus simply
    wraps this up and passes it on to the server-side test class to use as necessary.
    The object representing the HTTP response is also wrapped up for use by the test
    class. With access to these, the server-side test class and the class being tested
    can extract parameters, write output to the response, and so on. Assertions can
    then be made that the class being tested works as expected, with the results of
    these assertions being passed back to the client for reporting.


    As an example, consider the `ViewCustomerAction` class that we introduced during
    our discussion of MVC earlier in the chapter. Because this class relies on the
    server for a real request, it’s a great candidate for testing with Cactus. `Listing
    14-6` shows how you might achieve this.


    **Listing 14-6.** *ViewCustomerTest.java*


    ```java

    import javax.servlet.ServletException;


    import junit.framework.Test;


    import junit.framework.TestSuite;


    import org.apache.cactus.ServletTestCase;


    import org.apache.cactus.WebRequest;

    ```'
