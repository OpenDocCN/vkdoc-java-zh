    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


    As mentioned earlier, the <x:set> action is also very close to the <c:set> action
    from the Core tag library. Instead of evaluating an XPath expression and returning
    it to the current JspWriter, the <x:set> actions simply store the values inside
    scoped variables.


    Just to demonstrate all three tags working together, let’s see how the <x:set>
    action can be used in the previous example:


    <%@ taglib uri="http://java.sun.com/jstl/core" prefix="c" %>


    <%@ taglib uri="http://java.sun.com/jstl/xml" prefix="x" %>


    <c:import url="book.xml" var="url" />


    <x:parse xml="${url}" var="book" scope="session" />


    <x:set select="$book/book/title" var="title" scope="session"/>


    <x:set select="$book/book/author" var="author" scope="session"/>


    <x:set select="$book/book/url" var="bookUrl" scope="session"/>


    <b><x:out select="$title" /></b><br>


    <x:out select="$author" /><br>


    <x:out select="$bookUrl" /><br>


    Instead of using the <x:out> action to retrieve the values from the XML directly,
    you use the <x:set> action to store the values to scoped variables first and then
    output them via the


    <x:out> action.


    XML Flow Control Actions


    Now that you’ve seen how you can parse, store, and retrieve XML data, you can
    take a look at the XML flow control actions that conditionally process JSP code
    based on the result of an XPath expression and iterate over elements inside an
    XML document.


    Again, the XML flow control actions bear a striking resemblance to the flow control
    actions from the Core tag library. The only difference is—yes, you’ve guessed
    it—they work with XML documents!


    **The <x:if> Action**


    Like the <c:if> action from the Core tag library, the <x:if> action conditionally
    processes some JSP code based on a Boolean expression. The only difference is
    that the <x:if> action uses an XPath expression that is evaluated and converted
    into a Boolean according to the semantics of the XPath boolean() function:


    • A number is true if and only if it’s neither zero (positive or negative) nor
    NaN (Not A Number).


    • A nodeset is true if and only if it’s nonempty.


    • A string is true if and only if its length is nonzero.


    The <x:if> action processes its body content only if the Boolean condition evaluates
    to true.


    Let’s use the book.xml example again to work on the marketing tactics for new
    Apress titles! Listing 4-13 shows a JSP page that uses the <x:if> action.


    ![Image 48](index-208_1.png)


    513-0 ch04.qxd 11/17/05 8:41 PM Page 175


    C H A P T E R 4 ■ J AVA S E R V E R PA G E S S TA N D A R D TA G L I B R A RY


