    **73**


    <param-value>admin@apress.com</param-value>


    </context-param>


    This parameter represents the e-mail address of the application’s administrator.
    This can be pulled into any servlet in the application so that the e-mail address
    used is consistent throughout the system. To obtain this parameter from any particular
    servlet, you can use the following code:


    ...


    String adminEmail = getServletContext().getInitParameter("adminEmail");


    ...


    **Error Pages**


    In the bad old days of web development, if an error occurred in an application,
    you would see the familiar HTTP error 500, or worse still, a nasty stack trace
    on the browser. For example, if your servlet performed an operation that resulted
    in an exception, it was quite common to see the output shown in Figure 2-9 in
    the client browser.


    **Figure 2-9.** *When your application does not define error handling, it is possible
    that the user* *could see stack traces or other user-unfriendly error messages.*


    ![Image 19](index-107_1.png)


    513-0 ch02.qxd 10/3/05 4:22 PM Page 74


    **74**


    C H A P T E R 2 ■ S E R V L E T S A N D D E P L OY M E N T


    In a production system, this sort of page does not inspire much confidence in
    the end user of the application! You can prevent such pages from appearing through
    the use of error pages.


    Error pages allow you to respond to problems with custom pages that offer specific
    information about the trouble at hand. These errors can include Java exceptions
    as well as HTTP


    errors (for example, the result of a page not being found).


    Our sample deployment descriptor defines two error pages. The first error page
    is shown whenever the server encounters a java.lang.ArithmeticException (as shown
    previously). The tags to define this are shown here:


    <error-page>


    <exception-type>java.lang.ArithmeticException</exception-type>


    <location>/error.html</location>


    </error-page>


    The <error-page> tag has two children: <exception-type> and <location>. The


    <exception-type> child tag defines the exception to catch, and <location> defines
    the page or resource to display on encountering the error defined.


    After adjusting your deployment descriptor, if you were to run the same servlet
    that produced the earlier error, error.html would be called and displayed (Figure
    2-10) instead of the nasty Java stack trace.


    **Figure 2-10.** *By defining error handling in your application, you can control
    what the user sees* *when an error occurs.*


    As most users will agree, they would rather be presented with a human-readable
    error page than a huge, meaningless (to some anyway!) Java stack trace.


    ■**Tip** In testing these error-handling examples with Microsoft Internet Explorer,
    you may find that Internet Explorer does not display the error pages properly.
    Instead it displays its own default error page. When Tomcat 5 encounters an error,
    it sends an HTTP status code of 500 along with the error page (see Table 2-2).


    When the error page that is sent is less than a certain size, Internet Explorer
    displays its own error page rather than the one sent by the server. Most often,
    the critical size is 512 bytes (although we have seen situations where 1024 bytes
    seems to be the critical size). So, if everything seems correct, but Internet
    Explorer won’t display error.html or 404.html, try adding an HTML comment so that
    the file size (and thus response size) exceeds 512 or 1024 bytes.


