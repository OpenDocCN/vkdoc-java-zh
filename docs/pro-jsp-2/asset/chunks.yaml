    仅对登录使用安全套接字层


    如前所述，使用 SSL 会降低应用程序的性能，因此明智的做法是仅在需要时使用它。SSL 的一个良好用途是在用户登录时。这意味着，当用户名和密码通过网络发送时，使用
    HTTP 协议（http://）访问登录页面的用户将被切换到 HTTPS（https://）。在此示例中，您将使用一个 Login servlet 来处理初始登录请求，切换到
    SSL，然后重定向到容器的身份验证机制。


    本书的代码下载附带了一个功能齐全的应用程序，用于演示安全技术。不幸的是，它太长了，无法在此完整列出。在接下来的页面中解释应用程序时，我们会提供摘录。这个应用程序，为简单起见我们称之为
    security-example.war，旨在包含本章描述的所有安全机制。该应用程序的源代码和二进制版本均可下载。您可以通过使用二进制版本并调整 security-example.xml
    文件和应用程序的 web.xml 文件来完成大部分练习。


