    让我们来看看程序化加密。好消息是，你已经创建了一个 `LoginServlet`，因此可以用它来加密密码。由于该功能默认是关闭的，你需要


    513-0 ch12.qxd 11/17/05 4:15 PM 第 508 页


    **508**


    第 12 章 ■ **Web 应用程序的安全性**


    在 `build.properties` 文件中添加 `encrypt.password=true`，或者通过命令行使用 `ant –Dencrypt.password=true`
    传入该参数，也可以编辑 `app-settings.xml` 中的默认设置。如果你使用的是本应用程序的二进制版本（`.war` 文件），只需编辑 `web.xml`
    文件中 `LoginServlet` 的以下 `<init-param>` 配置：


    <init-param>


    <param-name>encrypt-password</param-name>


    <param-value>true</param-value>


    </init-param>


    接下来，你需要在你的 Servlet 中实际加密密码。为此，请在 `StringUtil.java` 类中创建一个 `encodePassword(String
    password, String algorithm)` 方法。该方法使用 JSSE 中的 `MessageDigest` 类来加密字符串：`import
    java.security.MessageDigest;`


    public static String encodePassword(String password, String algorithm) {


    byte[] unencodedPassword = password.getBytes();


    MessageDigest md = null;


    try {


    // 首先，根据给定的提供者创建一个实例


    md = MessageDigest.getInstance(algorithm);


    } catch (Exception e) {


    log.error("Exception: " + e);


    return password;


    }


    md.reset();


    // 调用 update 方法一次或多次


    // （当你不知道数据大小时很有用，例如流） md.update(unencodedPassword);


    // 现在计算哈希值


    byte[] encodedPassword = md.digest();


    StringBuffer buf = new StringBuffer();


    for (int i = 0; i < encodedPassword.length; i++) {


    if (((int) encodedPassword[i] & 0xff) < 0x10) {


    buf.append("0");


    }


    buf.append(Long.toString((int) encodedPassword[i] & 0xff, 16));


    }


    return buf.toString();


    }


    此方法根据你传入的算法对字符串进行加密。该算法在 `LoginServlet` 中定义，并且在构建时可通过 `${encrypt-algorithm}` 变量进行配置。默认设置为
    SHA。


    ■**注意** 有关这些算法及其工作原理的更多信息，请访问 http://theory.lcs.mit.edu/~rivest/crypto-security.html#Algorithms。


    513-0 ch12.qxd 11/17/05 4:15 PM 第 509 页


    第 12 章 ■ **Web 应用程序的安全性**


    **509**


    如果你正在使用密码加密，并且还提供了“找回密码”功能，你可能需要在用户存储中添加一个 `password_hint` 列。记住所有密码已经够难了，而当你不得不创建一个新密码时更是令人烦恼，因此“发送提示”策略非常有用。


    **Servlet 2.5 安全变更**


    Servlet 2.5 规范有一整章关于安全的内容，但变化不大。JSP 2.1 规范不包含任何与安全相关的信息。它只是指出了通过 `HttpServletRequest`
    接口进行安全编程的有用信息，为你提供了以下方法：


    • `getRemoteUser()`


    • `isUserInRole(String roleName)`


    • `getUserPrincipal()`


    `getRemoteUser()` 方法返回已验证用户的登录名，如果不存在已验证用户则返回 `null`。`isUserInRole()` 方法有助于确定某个角色对特定资源的授权。


    关于角色，如果你将它们硬编码到 Servlet 中，需要记住一件重要的事情：使用 `web.xml` 中的 `<security-role-ref>` 元素来创建链接。示例如下：


    <security-role-ref>


    <role-name>admin</role-name>


    <role-link>accounting</role-name>


    </security-role-ref>


    这样，你就可以编写 Servlet 代码，而无需担心 admin 角色是否会从会计部门变更为 IT 部门。你只需使用 `admin` 进行配置/编码，并知道你的代码将安全地应对变更。当然，我们建议将此值放在
    `Constants.java` 文件中，以便在确实需要时能够轻松更改。


    `HttpSession` 接口提供了 `session.invalidate()` 方法用于用户登出。这对我们来说一直很好用。当你调用 `session.invalidate()`
    时，它会使会话失效，然后解绑所有绑定到该会话的对象。

