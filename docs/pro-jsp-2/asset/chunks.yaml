    <c:import url="book.xml" var="url" />


    <x:parse xml="${url}" var="book" scope="session" />


    <x:choose>


    <x:when select="$book/book/publisher=''Apress''"> Another great title from Apress!


    </x:when>


    <x:when select="$book/book/publisher=''Bloggs Publisher''"> A reasonable title
    from Bloggs Publisher!


    </x:when>


    <x:otherwise>


    A title from an unknown publisher


    </x:otherwise>


    </x:choose>


    <p>


    <b><x:out select="$book/book/title"/></b><br>


    <x:out select="$book/book/author"/><br>


    <x:out select="$book/book/url"/><br> By using the <x:choose> action, you can provide
    different content depending on the value of an XPath expression, or the value
    of the <Publisher> element in this case. If the value is Apress, you provide the
    flagship introduction but provide books by Bloggs Publisher with a separate but
    toned-down introduction. Any titles by other publishers are handled by the


    <x:otherwise> action to give a low-key introduction.


