- fmt: '# Chapter 14: Web-Application Design and Best Practices


    Although this works and it’s widely used, these manual tests must be reexecuted
    whenever a new version of the software is released for whatever reason. Although
    tools do exist that allow testers to capture the process of manually testing an
    application for automatic playback, many of these tools can be expensive and cumbersome
    to use. On the other hand, many open-source options are now available, although
    these tend to be oriented toward the developer community and require tests to
    be written with programming languages, scripting languages, or XML. This is an
    area of flux at the moment and it’s worth bearing in mind your testing audience
    before you make a definitive tools selection. Let’s see how functional level testing
    can be automated with another widely used open-source framework: `HttpUnit`.


    ## HttpUnit


    `HttpUnit` (http://www.httpunit.org) is another extension to `JUnit`, but it’s
    different from the others that we’ve discussed because it allows you to write
    tests at a slightly different level.


    Whereas you can use tools such as `JUnit` and `Cactus` to test that individual
    classes and components work correctly, `HttpUnit` is a framework that you can
    use to test the functionality provided by a web application. As you’ve seen, unit
    testing classes is easy, but how do you test the functionality of a web application?


    The answer lies in the tools that `HttpUnit` gives you. The framework provides
    a collection of classes that allows you to simulate the process of a user using
    a web browser to connect to and use a website. Under the covers, it does this
    by making HTTP requests to the website, passing information that the user would
    typically type in manually. As far as the functionality available to you through
    the framework, `HttpUnit` allows you to access individual web pages and perform
    assertions that the web page contains certain elements. For example, if you’re
    testing an online store, you might want to test that all pages contain the current
    total of your shopping cart. In addition to these basic features, `HttpUnit` provides
    a way to look for HTML forms on a page and programmatically fill out those forms
    to be sent back to the server, where the response can then be checked. Again,
    for an online store, you might want to test that a user can add an item to his
    cart and that the subsequent page shows the user the updated cart state.


    `HttpUnit` provides a way to use Java code to programmatically test the functionality
    provided by a website, and the real benefit of this is that these tests can be
    rerun to regression test the web application when new versions are available.
    In fact, because `HttpUnit` uses the HTTP protocol, it can be used to test any
    other sort of HTML-based web application, including those written with Active
    Server Pages (ASP), Perl, PHP, and so on.


    ## Other Functional Testing Tools


    To round off your look at functional testing tools, a couple of other frameworks
    are worth a quick mention. The first of these is `jWebUnit` (http://jwebunit.sourceforge.net),
    which is really an extension of `HttpUnit`. The team behind `jWebUnit` was using
    `HttpUnit` on a project and realized that many of the tests contained duplicate
    code to set up request objects and perform assertions. Therefore, the team built
    a collection of wrapper classes for `HttpUnit` that simplified the API for its
    purposes. This has been refined over time and released into the open-source community.
    Some people like the control that `HttpUnit` gives them, whereas others prefer
    the simpler interface provided by `jWebUnit`. At the end of the day, it’s all
    up to personal preference.


    The other framework worth mentioning is called `Jameleon` (http://jameleon.sourceforge.net).
    This framework provides a way to functional test an application, but from the
    perspective of the features that the application provides. `Jameleon` differs
    from `HttpUnit` and `jWebUnit` in that it breaks out testing of the features from
    the actual test cases. A feature can be something as fine-grained as logging in,
    and it might be something that has to happen before every test. With `Jameleon`,
    you write the feature tests separately and then script them together into a reusable
    test case. These test cases can then be made data-driven by associating them with
    a particular dataset at runtime, which provides an easy way of running specific
    tests on specific environments. `Jameleon` itself is not specifically designed
    to test web applications; instead, it has a plug-in architecture in which testing
    code can be plugged in and executed. At the time of this writing, `Jameleon` provides
    a plug-in for `HttpUnit`/`jWebUnit`; hence it can be used to functional test web
    applications. This is a great idea and is something that has typically been found
    only in commercial testing tools. As always, the open-source testing space is
    worth keeping an eye on as new tools and enhancements are released on a regular
    basis.


    Now that we’ve presented the various ways that web applications can be tested,
    let’s look at how the design can influence the ability to test web applications.


    ## Designing Web Applications for Testing


    Although unit testing individual classes is straightforward, as we’ve hinted at,
    sometimes unit testing classes within web applications can be tricky. This is
    particularly true when the various flavors of business and presentation logic
    have all been mixed up with components such as servlets that need to be executed
    within a web server. To solve such problems, we must again turn to architecture
    and design.


    ### Architectural Layering


    Although we haven’t explicitly talked about architectural layering, we have talked
    about the MVC architecture and how it helps achieve a separation of concerns between
    the various components. For example, the controller is the overall component responsible
    for managing requests, the model represents the domain information being operated
    upon, and the views present information back to the user. Compare this with the
    Model 1 architecture, in which all of these responsibilities are embedded in a
    single component, and you can start to see how separating these responsibilities
    can lead to easier testing.


    We’ve already said that the hardest part of unit testing web applications is testing
    those components that are reliant on the context of a Java EE web server, and
    one of the things that you can do to aid testing is to try to make these components
    as small and lightweight as possible. By making these components lightweight wrappers
    for functionality that’s encapsulated within Java classes, you give yourself a
    much better chance of being able to unit test the application. For example, cast
    your mind back to the MVC architecture and, specifically, to the command and controller
    strategy in which the functionality to service incoming requests was split among
    individual command objects. Because each of these is just a stand-alone Java class,
    you can now use the same techniques for unit testing as you do with ordinary Java
    classes—you can use `JUnit` to create new instances and call methods on those
    instances.'
