    Custom Actions


    Earlier you learned about the potential problems created by introducing too much
    (if any at all!) scriptlet code into a JSP page. Overuse of scriptlets complicates
    the lives of JSP developers and non-Java-speaking UI designers alike.


    You’ve also seen how many of the problems associated with scriptlet code can be
    allevi-ated by encapsulating some of the ugly scriptlet code into JavaBeans components
    and manipulating them by using some of the standard actions. Although this approach
    is far superior to the scriptlets approach, it’s not the only available solution.


    Custom actions are another mechanism for encapsulating functionality into reusable
    components for use inside JSP pages. Unlike JavaBeans components, custom actions
    have full access to their environment (such as the request and session objects),
    which makes it far easier to provide functionality suitable for a website. A good
    example of a custom action is performing calculations where the result is locale
    sensitive, such as being dependent on the language or number format. A JavaBeans
    component has no idea about the environment in which it’s run, and therefore a
    developer would have to work a little harder to get the same functionality. That
    isn’t to say that JavaBeans components have no advantages. For one, they’re by
    far the best mechanism for representing business objects and storing state, because
    they don’t care about their environment!


    Custom actions are packaged together (usually with several similar or complementary
    actions) into a tag library that must be registered with a JSP container via its
    TLD file, which advertises the services provided by the tag library. After a tag
    library is successfully installed inside a JSP container, the library must be
    imported by using the taglib directive you saw earlier before any of the action
    it provides may be used.


    The following example demonstrates the use of a custom action called foo from
    a tag library configured by a web application’s deployment descriptor called myTagLib:


    <%@ taglib uri="/myTagLib" prefix="myPrefix" %>


    <myPrefix:foo>


    ...


    </myPrefix:foo>


    You can see how a tag library must be imported before any of the actions it provides
    (in this case the foo action) may be used on the page. Notice how a prefix is
    used to provide a namespace for actions from one tag library to another.


    You’ll learn more about creating and using custom actions, including some of the
    new features for simplifying their creation, in Chapters 6, 7, and 8.


    JavaServer Pages Standard Tag Library Actions


    You saw previously how useful the standard actions included in the JSP specification
    are to page authors; well, the JSTL takes this idea a step further and signifies
    a new phase for JSP


    page authors.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 43


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **43**


    The JSTL specification was first released in June 2002 with the sole purpose of
    making JSP


    pages easier to write. The JSTL provides four new tag libraries that may be used
    in a similar manner to the standard tags you saw earlier:


    • Core


    • Internationalization (I18n) and Formatting


    • XML


    • SQL


    As the names suggest, each library contains a host of useful actions that are
    suitable for many tasks that JSP page authors are continually having to code manually,
    such as conditional statements and looping, formatting based on locales, XML manipulation,
    and database access.


    The JSTL also uses the EL, which makes the actions even easier to use, especially
    for a developer unfamiliar with Java syntax. For a more in-depth look at the JSTL
    and how its tags can be controlled, take a look at Chapter 4.


    **Summary**


    Hopefully this chapter has provided you with a general feel for where JSP technology
    fits within the Java Platform, Enterprise Edition 5, and how it fits with regard
    to the other web components such as servlets, tag libraries, and JavaBeans, which
    exist in the web tier for providing dynamic web-based content.


    You were also introduced to some of the most popular JSP architectures that are
    regularly used for designing modern web applications so that you can see the bigger
    picture next time you’re confronted with design choices. Or maybe this chapter
    will help you analyze an existing application.


    Last, and most important, you were introduced to all the core syntax-level attributes
    that are available to a JSP page author, including custom actions and the JSTL.
    This grounding will give you a head start when approaching some of the more complex
    chapters, which will build on the JSP basics that you’ve learned so far.


