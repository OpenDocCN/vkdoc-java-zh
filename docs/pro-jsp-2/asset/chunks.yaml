- fmt: "# 使用 Struts、XDoclet 和其他工具\n\n我们认为这是因为有太多选择。实际上，你可以将几乎任何基于 Java 的持久化框架与 Struts\
    \ 一起使用。毕竟都是 Java。当没有一个框架被证明是占主导地位且广泛使用的框架时，很难做出选择。这是 Struts 的一个优势，它允许你选择任何框架——但我们猜测这对许多开发者来说也是一个很大的困扰。\n\
    \n然而，如果你坚持使用自己熟悉的技术，为 Struts 应用程序选择持久化框架可以很简单。如果你打算选择开源实现，请确保文档质量良好、开发邮件列表活跃，并且有示例应用程序。复制现有示例比从头开发要容易得多。花时间研究现有的数据库代码生成工具是值得的，因为从长远来看这会节省大量时间。最重要的是，学习并使用\
    \ XDoclet（我们稍后会讨论）来帮助处理持久化层。我们相信你会对它非常满意。\n\n## 持久化选项\n\n在第 9 章中，你已经花了很多时间评估不同的持久化选项，所以我们不再重复讨论。相反，我们只想告诉你，我们在示例项目\
    \ `struts-resume` 中选择了使用 Hibernate。到目前为止，我们对它非常满意。\n\n它似乎有很好的文档，并且也支持 XDoclet。XDoclet\
    \ 支持对我们来说是一个很大的卖点，因为我们希望生成大部分数据库访问代码。\n\n> **注意** `struts-resume` 中的示例借鉴了 Dave\
    \ Johnson（第 9 章作者）在他的示例应用程序中的例子，以及我们从 Hibernate 开发邮件列表中获得的帮助。\n\n## 增强 Struts\
    \ ActionForm 开发\n\nStruts 有一些经常被忽视但可能在开发 `ActionForm` 时很有用的特性。让我们来看看它们。\n\n###\
    \ 使用 DynaActionForm\n\n`DynaActionForm` 是作为 Struts 1.1 的一部分添加的。它基本上允许你通过 XML 声明表单的属性，而不是使用\
    \ Java 编写表单。对开发者来说，好处是你不需要编写和编译 `ActionForm`。然而，如果你使用 XDoclet 生成 `ActionForm`，那么你可能不需要\
    \ `DynaActionForm`。它们对于提供不持久化的简单表单很方便——例如用于发送电子邮件的 `MessageForm`。让我们以此为例，看看它的设置：\n\
    \n```xml\n<form-bean name=\"messageForm\"\n    type=\"org.apache.struts.action.DynaActionForm\"\
    >\n    <form-property name=\"name\" type=\"java.lang.String\"/>\n    <form-property\
    \ name=\"email\" type=\"java.lang.String\"/>\n    <form-property name=\"subject\"\
    \ type=\"java.lang.String\"/>\n    <form-property name=\"content\" type=\"java.lang.String\"\
    />\n</form-bean>\n```\n\n就像 `ActionForm` 一样，所有属性都应该是字符串类型，以便与 Web 层交互。只有对象类型（`String`、`Integer`\
    \ 或 `Boolean`）可以用作 `<form-property>` 元素的类型。不允许使用基本类型。指定表单属性后，你可以像使用常规 `ActionForm`\
    \ 或 `ValidatorForm` 一样，在动作映射中引用该表单。`DynaActionForm` 也可以通过使用类型 `org.apache.struts.action.DynaValidatorActionForm`\
    \ 来利用 Validator。\n\n然后，你可以在 `Action` 类中使用以下代码检索此表单：\n\n```java\nDynaActionForm\
    \ msgForm = (DynaActionForm) form;\n```\n\n要从表单中检索值，你必须使用 `form.get(propertyName)`\
