    the Apply Request Values phase. The Process Validations phase is next, but because
    the values are all String types, no conversion is needed, and no validation occurs.
    Next, the JavaBean is updated with the values from the view in the Update Model
    Values phase. Nothing occurs in the Invoke Application phase. Finally, in the


