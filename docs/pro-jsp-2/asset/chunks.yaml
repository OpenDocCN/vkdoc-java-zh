    JSP page, because you’ve now encapsulated the logic to generate the appropriate
    HTML and made it reusable. By looking at the source code for the page, you can
    see that the generated HTML is as follows: Countries : <select name="country"><option
    value="1">England</option>➥


    <option value="2">Wales</option><option value="3">Scotland</option></select> Admittedly,
    the generated HTML isn’t as neat, tidy, and well laid out as if you had written
    it yourself, but the important point is that you have a component that you can
    reuse to generate HTML select lists on other pages and within other web applications.
    There is, however, an inherent problem with the tag: this custom tag cannot be
    used to customize the HTML select control.


    One of the most common uses for custom tags since their inception has been to
    write custom tag versions of the standard HTML form controls such as text fields,
    lists, and buttons.


    However, this use has always been contentious because it provides advantages at
    the cost of introducing limitations.


    On the plus side, custom tags provide a great way to automate the creation of
    HTML


    form controls. For example, you can automatically set default values for text
    fields, automatically set the current selection in a list, and so on. A great
    way to implement this is through Jakarta Struts. Struts provide a complete framework
    for handling requests and linking up JavaBean instances with HTML form controls
    so that the information contained within the JavaBean is automatically populated
    into the form. For further information about Struts, please see Chapters 14 and
    15.


    On the negative side, building a set of tags to mimic the standard HTML form controls
    means that page authors are no longer using standard HTML tags and are therefore
    limited in the tools that they can use to help build the page. Many page authors
    use visual editors such as Macromedia Dreamweaver to help them lay out and configure
    the HTML tags, but generally these types of editors are not able to use these
    custom tags.


    Probably the most important issue, though, is that unless HTML tags are properly
    implemented, the ability to customize the generated HTML is reduced. Each HTML
    form control tag has many, many attributes that can be used to customize how it
    looks and behaves on the page. For example, there are attributes that can be used
    to specify the CSS style to be used, and others that can be used to specify JavaScript
    event handlers that fire when actions occur to the controls. To customize all
    the possible attributes through a mimicked tag such as that in Listing 7-5 would
    mean providing fields for every attribute, and methods to set and get the fields
    in the tag handler class. Struts achieves this, but it’s no small task.


    So, coming back to the <select> tag that you’ve just built, the inherent problem
    is that you’ve effectively stopped people from customizing the HTML that’s being
    generated. What would happen if you wanted to change the drop-down list, which
    displays a single item when not selected, into a list box that displays multiple
    items? Well, if you were writing the HTML, it would be as simple as specifying
    an attribute called size when you used the HTML <select> tag. Previously for your
    custom tag implementation, this would have meant going back to the tag handler,
    adding a new instance variable and setter method, amending the TLD file, and


    513-0 ch07.qxd 11/9/05 4:49 PM Page 305


    C H A P T E R 7 ■ C L A S S I C TA G S


    **305**


    then redeploying the tag. Fortunately, the JSP specification provides a great
    new feature to help you solve just this problem: dynamic attributes.


    **Dynamic Attributes**


    All the attributes that you’ve seen up to this point have been static. In other
    words, a tag’s attributes have all been defined up front within the TLD file,
    and support for those attributes has been specifically implemented within the
    tag handler class. The JSP 2.0 specification introduced the concept of **dynamic
    attributes**, in which the attributes for any tag don’t have to be determined
    and defined in the TLD file. The benefit of dynamic attributes is increased flexibility,
    particularly when the full set of attributes is either very large or unknown at
    the time of development. Let’s see how your own tag handlers can take advantage
    of this functionality.


    **The DynamicAttributes Interface**


    The ability to support dynamic attributes is provided through an interface called
    DynamicAttributes within the javax.servlet.jsp.tagext package. The interface shown
    in Listing 7-7 is fairly straightforward and provides a single method through
    which a dynamic attribute can be set.


    **Listing 7-7.** *DynamicAttributes.java*


    package javax.servlet.jsp.tagext;


    import javax.servlet.jsp.JspException;


    public interface DynamicAttributes {


    public void setDynamicAttribute(


    String uri, String localName, Object value) throws JspException


    }


    You can have a mixture of static and dynamic attributes for any specific tag.
    When that tag is used on the page, the JSP container looks at the attributes that
    have been (statically) defined in the TLD file. If an attribute is statically
    defined, the regular setter method is called in the same way that you’ve seen
    before. However, if the attribute isn’t defined, the setDynamicAttribute() method
    on the tag handler is called instead.


    The parameters of the setDynamicAttribute() method provide information about the
    namespace, name, and value of the attribute. The name and value of an attribute
    are self-explanatory, and the namespace simply provides a way to prevent attributes
    with the same name from clashing. For example, dynamic attributes could be used
    to customize some underlying content that’s generated by the tag, or perhaps passed
    through to another JavaBean or component in order to configure it. In this situation,
    the same attribute name might be used more than once. To prevent attributes from
    clashing, a namespace can be applied to the attribute. The final point to note
    about this method is that it can throw a JspException, and this can be used to
    indicate to the JSP container that the tag doesn’t support the specified attribute.
    If this is the case, no more methods on the tag handler will be called, effectively
    stopping invocation of the tag. To illustrate how dynamic attributes work in practice,
    let’s look at an example.


