    **337**


    is the <jsp:useBean> tags that you saw in Chapter 1\. To demonstrate this, you’ll
    use a simple JavaBean called Forum that has id and name properties:


    <jsp:useBean id="forum"


    class="com.apress.projsp.domain.Forum" scope="page">


    <jsp:setProperty name="forum" property="id" value="1"/>


    <jsp:setProperty name="forum" property="name" value="Servlets"/>


    </jsp:useBean>


    Here, the <jsp:useBean> tag is setting up a page-scoped variable called forum,
    and the name of this object is being passed to the <jsp:setProperty> tags so that
    they can find the object for themselves. To achieve this type of functionality
    within your own tags, you need to use the setAttribute() and getAttribute() methods
    on the JspContext and PageContext classes for simple tags and classic tags, respectively.
    Essentially, information is being shared in a specific scope, under a name that
    is well known to both tags.


    With the introduction of the JSP EL, the second way that tags commonly share information
    is through EL expressions. Let’s again look at an example, this time from the
    JSTL:


    <c:forEach var="forum" items="${forums}">


    <c:out value="${forum.name}"/>


    </c:forEach>


    Here, assuming that a collection of Forum JavaBeans is accessible with the EL
    expression ${forums}, this small snippet provides iteration over that collection
    and displays the name of each forum. You’re using the <c:out> tag to actually
    write out the information, and this information is being specified by another
    EL expression. Although behind the scenes a Forum bean is being placed into page
    scope upon each iteration, instead of simply passing the name of the object, you’re
    now using an EL expression to pass the actual information that the tag needs to
    perform its processing. In this case, the processing is to output the specified
    information.


    Although these two techniques differ slightly, they’re very useful and commonly
    used in sharing information between custom tags, therefore allowing them to cooperate
    to achieve a common goal. However, sometimes a little more flexibility is required
    in that the child (nested) tags should pass information on to their parents. In
    this situation, you can use a tag’s ability to directly access its parent tag
    or tags.


    **Cooperating by Accessing Other Tag Handlers**


    Something that happens early in the tag life cycle is that a tag is passed a reference
    to its closest enclosing parent via the setParent() method on the tag handler
    class. Using this reference to a JspTag or a Tag on a simple or classic tag, respectively,
    you can directly access the parent tag handler instance and directly call methods
    on it. So, why is this useful?


    In the previous example of how tags can cooperate on the page, you saw that it’s
    easy for a parent tag to pass an object to its child tags, effectively using one
    of the available scopes as a shared area. However, a side effect of this technique
    is that unless the information is removed from the scope when it’s finished, that
    information is readily available to other tags on the page.


    Although this generally isn’t a problem, having all this information lying around
    could interfere with other parts of the page—or worse, the application—making
    debugging more difficult.


    Another situation in which sharing information isn’t appropriate is when you’d
    like to use nested tags to configure the characteristics of the enclosing parent
    tag. If you look back to the


