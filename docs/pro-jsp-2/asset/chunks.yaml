    ### Other Unit Testing Tools\n\nThe tools that we’ve mentioned in this chapter\
    \ are just a sample of the wide variety of testing tools available. For more information\
    \ on the tools available to unit test web applications, take a look at the JUnit\
    \ web extensions page at http://www.junit.org/news/extension/web/index.htm.\n\n\
    Now that we’ve covered how to perform unit testing with respect to web applications,\
    \ let’s now switch gears and look at functional testing.\n\n## Functional/Acceptance\
    \ Testing Web Applications\n\nThe other key method to test web applications is\
    \ **functional testing**. In contrast to unit testing, functional testing treats\
    \ the application as a black box (you can’t see inside it) and tests that the\
    \ outputs are correct given a set of inputs. For example, this might include the\
    \ request to add an item to your shopping cart in an online store. Here you’re\
    \ not interested in how the request works—you just want to know that it does work\
    \ and that the desired result is achieved.\n\nFunctional testing is often broken\
    \ down into two categories, with the tests being written by two types of people.\
    \ The first category is written by developers in addition to the unit tests that\
    \ they might write for the classes and components that they’re writing. Unit testing\
    \ classes in isolation is undoubtedly useful, but at times developers want to\
    \ run some functional tests that span multiple classes and components. Typically,\
    \ these tests are written with the internal flows of the application in mind and\
    \ really help back up the unit tests in proving that the software works for a\
    \ given set of inputs. The second category contains functional tests that are\
    \ written by dedicated testing teams. Their responsibilities range from system\
    \ testing (in which the end-to-end flows throughout the system are exercised)\
    \ to writing tests that will be used to formally state that the functionality\
    \ meets the requirements and will be accepted by the project sponsor or end users.\n\
    \nOne of the problems associated with acceptance is that traditionally acceptance\
    \ testing, sometimes called user acceptance testing, was performed manually following\
    \ a textual script."
