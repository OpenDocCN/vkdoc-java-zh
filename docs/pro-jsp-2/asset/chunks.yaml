    (Controller)


    Data


    Response


    Browser


    JSP (View)


    JavaBean


    Data


    **Figure 1-4.** *In a Model 2 architecture, different components handle the application
    processing* *and the presentation of data.*


    There are, as always, varying versions of this architecture, such as providing
    multiple controllers to distribute the request-handling functionality across multiple
    servlets. Although not recommended, it’s also possible to provide JSP-based controllers
    and servlet-based view components; the choice is yours! Remember that the best
    designs select a component based on its suitability for its job. JSP pages make
    poor controllers because they’re designed to render content, whereas servlets
    are best suited to request processing and computations instead of generating content.


    Whatever components you select, you cannot fail to appreciate how much cleaner
    this architecture is than the Model 1 architecture; each component has a definite,
    well-defined role.


    Let’s revisit some of the problems that the Model 1 architecture faced and see
    how this new design helps solve some of them.


    Maintainability


    Many of the maintainability problems associated with the Model 1 architecture
    were a direct result of implementing a controller and view as part of the same
    component: the JSP page.


    Because all the business processing and content generation were forced together,
    the result was messy pages that could be hard to maintain. By separating your
    application’s logic from its presentation by using MVC components, it’s far easier
    to develop cleaner code that focuses specifically on the job at hand, resulting
    ultimately in a more flexible and maintainable application.


    Security


    By providing an initial single point of access for potential requests, a servlet-based
    controller component is an excellent place to provide some form of authentication.
    If the user making the request can pass the authentication mechanism (perhaps
    a username or password test), the controller can continue with the request as
    usual or alternatively forward it to an appropriate page (perhaps a login page!)
    where the error can be dealt with.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 12


    **12**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    Because the controller component is responsible for handling every request, security
    checks have to exist in only a single place, and of course any changes to the
    security mechanism have to be made only once. By implementing your security constraints
    in a single place, it’s far easier to take advantage of declarative security mechanisms.
    Recall that the Model 1


    architecture required each page to provide similar security checks by itself,
    which provides a significant security hole if the developer forgets to provide
    it!


    Extensibility


    One of the best points about the Model 2 architecture is that all the processing
    logic is centralized. No longer does such code have to be placed in a scriptlet
    located deep within a JSP page, where it’s so much more difficult to access.


    This centralization helps to provide a more component-based solution. By utilizing
    JavaBeans components and custom or standard actions, and enabling software components
    to be reused and extended, you greatly reduce the chance of making a change that
    causes a


    “ripple” effect to other dependent components.


    **JSP Fundamentals—Hands On**


    Before you take an in-depth look at the individual components that compose a JSP
    page, you should have a basic idea of how JSP applications are deployed and structured
    inside a JSP


    container.


    **Basic Deployment**


    Although all JSP and servlet containers have their own specific deployment processes,
    generally the basic techniques are still the same: you copy your web application
    (JSP pages, servlets, and static HTML) in a predefined structure into a special
    deployment directory specified by the container.


    The Java Servlet specification defines a special structure that all web applications
    must follow so that servlet/JSP containers know exactly where to find the resources
    that compose the web application. Most containers allow web applications to be
    deployed in one of the following two forms:


    • **Expanded directory format**: The web application in its predefined structure
    is simply copied into the container’s deployment directory.


    • **Web ARchive file (WAR)**: The web application in its predefined structure
    is archived into a compressed WAR before being copied to the container’s deployment
    directory.


    The web-application structure defines the exact locations inside your web applications
    to locate deployment descriptors, HTML and JSP pages, and compiled Java classes
    as well as third-party Java ARchive (JAR) files that are required by your web
    applications. We won’t explain the intricacies of the web-application structure
    because this will be covered in far greater detail in later chapters. For now
    we will explain the structure of a minimal but fully functional web application
    that you can use to test the simple JSP examples you will learn about throughout
    this chapter.


