- fmt: 'SSL 是世界上最广泛使用的安全协议，内置于所有商业 Web 浏览器和 Web 服务器中。当前版本为版本 2。由于原始版本的 `SSL` 在技术上是专有协议，`Internet
    Engineering Task Force (IETF)` 接管了升级 `SSL` 的职责，并将其重命名为 `Transport Layer Security
    (TLS)`。`TLS` 的第一个版本是版本 3.1，与原始规范相比仅有微小改动。


    `SSL` 是一种允许 Web 浏览器和 Web 服务器通过安全通道进行通信的技术。在 `SSL` 中，数据在浏览器端（传输前）加密，然后在服务器端读取前解密。当服务器向客户端返回数据时，也会执行相同的过程。此过程称为
    `SSL handshake`。该协议目前支持三种加密级别：40 位、56 位和 128 位。


    所需安全性越高，应使用的位数就越多。有关 `SSL handshake` 的更多信息，请访问 `http://medialab.di.unipi.it/doc/JNetSec/jns_ch11.htm`。


    理解 `SSL` 的最佳方式是实现它。在 Web 服务器（本例中为 `Tomcat`）上设置 `SSL` 的第一步是生成证书。请记住，如果您通过传统 Web
    服务器（如 `Apache` 或 `IIS`）代理 `JSP`/`servlet` 请求，则需要在这些服务器上设置 `SSL`。`Tomcat` 的 `SSL`
    支持文档非常出色，但我们将在此处进行介绍，以便您熟悉。


    ## Tomcat 上的安全套接字层


    如果您使用的是 `Java 1.4` 或 `Java 5 Standard Edition`，`Java Secure Socket Extension (JSSE)`
    已集成到其核心中，因此无需额外下载。


    > **注意**：有关 `JSSE` 的更多信息，请访问 `http://java.sun.com/products/jsse/`。


    通过执行以下命令创建证书密钥库：`$JAVA_HOME/bin/keytool -genkey -alias tomcat -keyalg RSA`。指定密码值为
    `changeit`。此过程应类似于图 12-10 所示的会话。


    **图 12-10.** *为 Tomcat 创建证书密钥库时 keytool 程序的输出*


    `keytool` 应用程序将提示您输入信息，例如名字和姓氏、城市、州等。我们使用 `localhost` 作为名字和姓氏的值，因为这是浏览器在验证证书真实性时匹配的值。它实际上会作为
    *certification path* 出现在生成的证书中。出于测试目的，您可以接受大多数其他提示的默认值。当工具提示您验证数据时，输入 `yes` 并按
    Enter。最后，按 Enter 接受密钥库密码作为用户密码。


    这仍然不是有效的证书，因为您是自行生成的。要获得有效证书，您必须从 `certificate authority (CA)`（例如 `VeriSign`）购买一个。在此示例中，使用
    `localhost` 将使用户浏览器中的警告减少一个。


    现在，编辑 `%TOMCAT_HOME%/conf/server.xml` 并移除 `SSL HTTP/1.1 Connector` 条目周围的注释。设置完成后，您应该能够通过
    `https://localhost:8443` 访问 `Tomcat`。不要忘记 `http` 后面的 `s`。必须指定端口，因为它不是 `HTTPS`
    的默认端口（端口 443）。


    `Tomcat` 期望由 `keytool` 工具创建的 `.keystore` 文件位于特定位置（用户的主目录）。如果您在通过 `SSL` 访问 `Tomcat`
    时遇到问题（特别是错误日志中包含无法访问 `.keystore` 文件的消息），您可以通过向 `server.xml` 中的 `SSL <Connector>`
    元素添加以下属性来告诉 `Tomcat` `.keystore` 文件的位置：


    ```

    keystoreFile="path_to_keystore\.keystore"

    ```


    如果您在使用 `Tomcat` 时不想在 `URL` 中指定端口号，可以轻松地在 `server.xml` 文件中更改它们。首次通过 `SSL` 端口访问
    `Tomcat` 时，系统会提示您一个安全警报（见图 12-11）。


    **图 12-11.** *当使用非 CA 创建的证书通过 SSL 访问安全站点时，浏览器将显示安全警报，告知您这一事实。*


    如果您在生成此证书时使用真实姓名而不是 `localhost`，安全警报将警告您证书的名称与您尝试查看的页面名称不匹配（见图 12-12）。


    **图 12-12.** *如果证书名称有问题，安全警报也会显示该信息。*


    > **警告**：我们在同一台 Windows 机器上同时运行 `Tomcat`（80/443 端口）和 `IIS` 时遇到了问题。关闭 `IIS` 后，我们可以在
    443 端口上运行 `Tomcat`。奇怪的是，`IIS` 运行在 81 端口，并且我们没有运行安全端口。当您看到 `Tomcat` 启动后立即关闭时，端口冲突通常是问题的原因。


    设置完成后，您可能会注意到浏览器会警告您有关证书的信息。这是因为证书的颁发者未知（即您自己），并且浏览器不将您识别为 `CA`。`CA`，例如 `VeriSign`（`http://www.verisign.com`）、`Thawte`（`http://thawte.com`）和
    `TC TrustCenter`（`http://www.trustcenter.de/set_en.htm`），是受信任的组织，它们验证并证明服务器身份的真实性。此外，如果您想同时设置客户端和服务器证书，可以获取客户端证书。这在高度安全、绝密的、类似
    *X Files* 风格的应用程序中可能是必需的，但对于大多数 Web 应用程序来说并非必要。


    在 Web 应用程序中使用 `SSL` 的一个缺点是它往往会显著降低服务器的吞吐量。这主要是由于连接两端的加密和解密过程造成的。因此，我们建议仅在应用程序真正需要的部分使用
    `SSL`——例如，当用户登录或用户提交信用卡号时。


    > **注意**：您可以在 `http://www.computerworld.com/securitytopics/security/story/0,10801,58978,00.html`
    找到有关 `SSL` 性能下降的更多信息。该文章还包含指向其他文章和 `SSL` 加速选项的链接。


    在本章后面，我们将向您展示如何在用户登录时以及用户登录之前进行 `SSL` 切换。


    ## Java 认证和授权服务


    您可能想知道 `Java Authentication and Authorization Service (JAAS)` 如何融入这一切。`JAAS` 提供了一个用于认证用户和分配权限的框架和标准编程接口。结合
    `Java 2`，应用程序可以提供以代码为中心的访问控制、以用户为中心的访问控制或两者的组合。`JAAS` 的发明是为了使登录服务独立于认证技术，并允许 `Pluggable
    Authentication Modules (PAM)`。大多数现代应用服务器在底层使用 `JAAS` 来配置容器管理的安全性——您甚至可能在使用它而自己并未察觉！'
  raw: 'It’s most likely the widest-spoken security protocol in the world, and is
    built into all commercial web browsers and web servers. The current version is
    version 2\. Since the original version of SSL is technically a proprietary protocol,
    the **Internet Engineering Task Force (IETF)** took over responsibilities for
    upgrading SSL, and have now renamed it **Transport Layer Security** **(TLS)**.
    The first version of TLS is version 3.1, and has only minor changes from the original
    specification.”


    SSL is a technology that allows web browsers and web servers to communicate over
    a secure channel. In SSL, data is encrypted at the browser (before transmission)
    and then decrypted at the server before reading the data. This same process takes
    place when the server returns data to the client. This process is known as the
    **SSL handshake**. There currently are three levels of encryption supported by
    this protocol: 40-bit, 56-bit, and 128-bit.


    The more security you need, the more bits you should use. For more on the SSL
    handshake, visit http://medialab.di.unipi.it/doc/JNetSec/jns_ch11.htm.


    The best way to gain a good understanding of SSL is to implement it. The first
    step to setting up SSL on your web server (in this case, Tomcat) is to generate
    a certificate. Keep in mind


    ![Image 173](index-522_1.png)


    513-0 ch12.qxd 11/17/05 4:15 PM Page 489


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    **489**


    that if you are proxying your JSP/servlet requests through a traditional web server
    (such as Apache or IIS), you’ll need to set up SSL on those servers. The documentation
    for setting up Tomcat’s SSL support is excellent, but we’ll go over it here so
    it’s familiar to you.


    Secure Sockets Layer on Tomcat


    If you’re using Java 1.4, or Java 5 Standard Edition, Java Secure Socket Extension
    (JSSE) has been integrated into its core, so no additional download is needed.


    ■**Note** More information about JSSE can be found at http://java.sun.com/products/jsse/.


    Create a certificate keystore by executing the following command: $JAVA_HOME/bin/keytool
    -genkey -alias tomcat -keyalg RSA Specify a password value of changeit. This process
    should resemble the session shown in Figure 12-10.


    **Figure 12-10.** *The output of the keytool program when creating a certificate
    keystore for Tomcat* The keytool application will prompt you for information such
    as first and last name, city, state, and so on. We’ve used **localhost** as the
    first and last name values, because this is the value matched by your browser
    when verifying authenticity of the certificate. It actually shows


    ![Image 174](index-523_1.png)


    513-0 ch12.qxd 11/17/05 4:15 PM Page 490


    **490**


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    up as the *certification path* in the resulting certificate. For testing purposes,
    you can accept the default values for most of the other prompts. When the tool
    prompts you to verify the data, type **yes** and press Enter. Finally, press Enter
    to accept the keystore password as the user password.


    This is still not a valid certificate because you’re generating it yourself. To
    get a valid certificate, you must purchase one from a **certificate authority
    (CA)** such as VeriSign. In this example, using localhost will result in one less
    warning in the user’s browser.


    Now, edit %TOMCAT_HOME%/conf/server.xml and remove the comments around the SSL


    HTTP/1.1 Connector entry. After you’ve set this up, you should be able to access
    Tomcat by using https://localhost:8443\. Don’t forget the s after http. The port
    has to be specified because it isn’t the default port for HTTPS (port 443).


    Tomcat expects the .keystore file that was created by the keystore tool to be
    in a particular location (the user’s home directory). If you are having trouble
    accessing Tomcat over SSL


    (particularly if the error log has messages about not being able to access the
    .keystore file), you can tell Tomcat where the .keystore file is by adding this
    attribute to the SSL <Connector> element of servler.xml:


    keystoreFile="path_to_keystore\.keystore"


    If you don’t want to specify your port numbers on your URLs when using Tomcat,
    you can easily change them in the server.xml file. When accessing Tomcat for the
    first time on its SSL


    port, you should be prompted with a security alert (see Figure 12-11).


    **Figure 12-11.** *When accessing a secure site over SSL by using a certificate
    that was created by* *someone other than a CA, the browser will display a security
    alert informing you of that fact.*


    If you use your real name rather than localhost when generating this certificate,
    the security alert will warn you that the certificate’s name doesn’t match the
    name of the page you’re trying to view (see Figure 12-12).


    ![Image 175](index-524_1.png)


    513-0 ch12.qxd 11/17/05 4:15 PM Page 491


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    **491**


    **Figure 12-12.** *If the name on the certificate has a problem, the security
    alert will also display* *that information.*


    ■**Caution** We’ve encountered problems when running Tomcat on 80/443 and IIS
    on a Windows machine at the same time. Shutting down IIS allowed us to run Tomcat
    on 443\. The strange part is that IIS was running on port 81 and we had no secure
    port running. When you see Tomcat start and then immediately shut down, a port
    conflict is often the cause of the problem.


    One thing you’ll probably notice after setting this up is that your browser warns
    you about the certificate. This is because the issuer of the certificate is unknown
    (you) and the browser doesn’t recognize you as a CA. CAs, such as VeriSign (http://www.verisign.com),
    Thawte (http://thawte.com), and TC TrustCenter (http://www.trustcenter.de/set_en.htm),
    are trusted organizations that verify and certify that a server is who it says
    it is. Also, you can obtain client certificates if you want to set up both client
    and server certificates. This may be necessary in highly secure, top-secret, *X
    Files*–flavored applications, but it’s not necessary for most web applications.


    One drawback to using SSL in a web application is that it tends to significantly
    decrease the throughput of the server. This is mainly due to the encryption and
    decryption process on each end of the connection. Therefore, we recommend that
    you use SSL only for the parts of your application that really need it—for instance,
    when a user logs in or when a user submits a credit card number.


    ■**Note** You can find more information on performance degradation with SSL at
    http://


    www.computerworld.com/securitytopics/security/story/0,10801,58978,00.html. This
    article also contains links to other articles and options for SSL acceleration.


