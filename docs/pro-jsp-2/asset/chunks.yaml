    The <jsp:param> tag has two attributes: name and value. The attribute name gives
    the name of the parameter, which can be used by the included page to access the
    parameter. The attribute value, which can be a request-time expression, gives
    the value of the attribute.


    **The <jsp:useBean> Action**


    Before any JavaBeans component can be manipulated from a JSP page, it’s first
    necessary to obtain an instance of the JavaBean, either by retrieving a preexisting
    JavaBean from one of the available JSP scopes or by creating a new instance. Either
    option could take several lines of scripting code, especially if the JavaBean
    needs to be initialized before use, which as you’ve seen, can clutter the JSP
    page.


    The <jsp:useBean> action is specifically designed to simplify this process. This
    standard action associates an instance of a Java object (our JavaBean) that is
    defined with a given scope and id and makes it available as a scripting variable
    of the same id. The <jsp:useBean> action is highly flexible, and its exact functionality
    is controlled by the attributes passed to the action.


    When used correctly, this action can greatly reduce the amount of scriptlet code
    that would otherwise be required.


    The syntax for the <jsp:useBean> action is as follows:


    <jsp:useBean id="name" scope="page|request|session|application" typeSpec/> where


    typeSpec ::= class="className" |


    class="className" type="typeName" |


    type="typeName" class="className" |


    beanName="beanName" type="typeName" |


    type="typeName" beanName="beanName" |


    type="typeName"


    Before you see an example of the action at work, first consider Listing 1-8, a
    scriptlet-based alternative that will print the current time of day (dateScriptlet.jsp):
    **Listing 1-8.** *dateScriptlet.jsp*


    <%@ page import="java.util.Date, java.text.DateFormat"%>


    <html>


    <head>


    <title>Professional JSP 2.1</title>


    </head>


    <body style="font-family:verdana;font-size:10pt;">


    <%


    DateFormat df = DateFormat.getInstance();


    Date today = new Date();


    %>


    <h2>Today''s Date is <%= df.format(today) %></h2>


    </body>


    </html>


