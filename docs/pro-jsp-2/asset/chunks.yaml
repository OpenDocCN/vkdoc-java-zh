- fmt: "# Web Application Design and Best Practices\n\nAlthough this separation of\
    \ concerns does seem slightly more complicated than simple page-centric designs,\
    \ it gives you the ability to modify each of the three components in isolation.\
    \ You can modify the data schema, the business logic, or the presentation separately.\
    \ Not only is the application more maintainable because there is a centralized\
    \ place for locating each specific type of code, but also the system as a whole\
    \ is now much more extensible. Need to add a new flow of functionality? Simply\
    \ add the logic into the controller component and add a new view to display the\
    \ relevant information back to the user. Of course, it’s still possible to build\
    \ unmaintainable MVC web applications, and for this reason there is a collection\
    \ of proven patterns that can be used during design and development.\n\n## Design\
    \ Patterns\n\nA simple way to describe **design patterns** is that they’re reusable\
    \ solutions to common problems within a given context. In addition to this, and\
    \ through the way that they’re documented, patterns provide a common language\
    \ with which to understand and use them.\n\nPatterns really came into the limelight\
    \ with the release of *Design Patterns: Elements of Reusable Object-Oriented Software*\
    \ (Addison-Wesley, 1995) by the \"Gang of Four\" (Erich Gamma, Richard Helm, Ralph\
    \ Johnson, and John Vlissides). This book details a large number of reusable solutions\
    \ to common, language-independent design problems related to structural, behavioral,\
    \ and creational contexts. Using these original design patterns as a basis, many\
    \ people have extended this work to document new patterns for the design and implementation\
    \ of Java EE systems, including many that are relevant to building Java-based\
    \ web applications.\n\nAt first sight, patterns can be seen to complicate the\
    \ design of a system, and to a degree this is true. After all, why implement a\
    \ feature with a handful of related classes when just a single class will do?\
    \ Well, the benefits come at several levels. Using patterns and the common language\
    \ that they use allows us, as software developers, to easily communicate about\
    \ how a particular part of the application works. For example, if we have a class\
    \ that’s responsible for creating other types of classes on demand, using the\
    \ common name for this pattern (in this case, \"factory\") provides a certain\
    \ level of common understanding. This is useful, as it helps other members of\
    \ the project team, or anybody looking at the code, to come to grips with it easily.\n\
    \nThe ability to use patterns also helps ensure that there’s some consistency\
    \ in the way that recurring problems are solved within the application. This practice\
    \ subsequently promotes code reuse (and therefore quality) and maintainability,\
    \ again because the design is easier to understand. Furthermore, because patterns\
    \ have the ability to introduce a certain degree of structure to a design, the\
    \ extensibility of that design is often greater than if the same functionality\
    \ were built using a single class.\n\n## Java EE Patterns and Web-Application\
    \ Components\n\nProbably the most well-known collection of Java EE patterns available\
    \ to date is that cataloged by the Sun Java Center at `http://java.sun.com/blueprints/corej2eepatterns`.\
    \ The patterns contained within this catalog cover all tiers of the Java EE 5\
    \ architecture, and if you’re building multitier enterprise applications, they’re\
    \ well worth taking a look at. For the purpose of this chapter, you’re interested\
    \ in only those patterns that are relevant to building the web tier of Java EE\
    \ applications. Let’s take a look at some of these and see how they can help you\
    \ build well-designed web applications.\n\n### Front Controller\n\nAs you learned\
    \ in the discussion of the MVC architecture, the controller component acts as\
    \ the gateway into the web application and is the central place from which all\
    \ requests are serviced. As it stands, the MVC architecture is programming language\
    \ independent, and in translating this to the world of Java-based web applications,\
    \ the Sun Java Center came up with the **Front Controller** pattern, a Java EE–specific\
    \ version of the controller in MVC.\n\nListing 14-1 shows a prototypical implementation\
    \ of this pattern.\n\n**Listing 14-1.** *FrontController.java*\n\n```java\npackage\
    \ com.apress.projsp;\n\nimport java.io.IOException;\n\nimport javax.servlet.RequestDispatcher;\n\
    \nimport javax.servlet.ServletException;\n\nimport javax.servlet.http.*;\n\npublic\
    \ class FrontController extends HttpServlet {\n\n    protected void processRequest(HttpServletRequest\
    \ request, HttpServletResponse response)\n            throws ServletException,\
    \ IOException {\n\n        // Step 1 – perform business logic and manipulate the\
    \ model\n        // someObject.someBusinessLogic();\n\n        // Step 2 – dispatch\
    \ to the appropriate view component\n        RequestDispatcher dispatcher =\n\
    \                getServletContext().\n                getRequestDispatcher(\"\
    name of a view component\");\n        dispatcher.forward(request, response);\n\
    \    }\n\n    protected void doGet(HttpServletRequest req, HttpServletResponse\
    \ res)\n            throws ServletException, IOException {\n        processRequest(req,\
    \ res);\n    }\n\n    protected void doPost(HttpServletRequest req, HttpServletResponse\
    \ res)\n            throws ServletException, IOException {\n        processRequest(req,\
    \ res);\n    }\n}\n```\n\nAs this example implementation shows, a front controller\
    \ can be as simple as a servlet that responds to HTTP GET and POST requests. Although\
    \ the code doesn’t actually show any real business logic being called, it does\
    \ show the steps in servicing the request. First, you process the request by executing\
    \ some business logic, and then you redirect to, or dispatch to, the view component\
    \ that will be presenting the user with information. The main problem with this\
    \ implementation is that if all business logic for an application is wrapped up\
    \ inside a single controller, that controller will quickly become bloated and\
    \ have a vast set of responsibilities. To overcome this problem, you can use the\
    \ command and controller strategy.\n\n### The Command and Controller Strategy\n\
    \nThere are many ways in which the Front Controller pattern can be implemented,\
    \ each of which is called a **strategy**. For example, in the previous example\
    \ the front controller was implemented as a Java servlet, although there’s nothing\
    \ stopping that implementation from being a JSP page. To overcome the problem\
    \ of the controller becoming bloated with all the application logic for a particular\
    \ system, the command and controller strategy combines the controller servlet\
    \ with classes that implement the **Command** design pattern. (The Command pattern\
    \ is a more general object-oriented design pattern.) Essentially, the Command\
    \ pattern says that the logic required to perform a specific task is wrapped up\
    \ into a single class with a standard interface to execute that code. For example,\
    \ you might wrap up the logic to locate a customer’s details into a single class,\
    \ inside a method called `execute()`. First, you might define a standard interface\
    \ for all of the commands to be used by the front controller. Listing 14-2 shows\
    \ an interface that does this.\n\n**Listing 14-2.** *Action.java*\n\n```java\n\
    package com.apress.projsp;\n\nimport javax.servlet.ServletException;\n\nimport\
    \ javax.servlet.http.HttpServletRequest;\n\nimport javax.servlet.http.HttpServletResponse;\n\
    \npublic interface Action {\n\n    public String execute(HttpServletRequest request,\n\
    \                          HttpServletResponse response)\n            throws ServletException;\n\
    }\n```"
