    environment, the build-deploy-test cycles are generally very short, and this is
    one reason this mechanism for deploying tags is often adopted—it’s very quick
    and lightweight.


    However, a drawback to this method is that it makes tag libraries harder to reuse.
    You have to copy all the tag handler and dependent classes along with the TLD
    file into a new web-application structure and place them in the correct directories.
    Although this procedure isn’t complicated, individual files could easily get lost.
    What happens when new versions of the tags are available? Also, you haven’t considered
    reusing tag files that simply reside underneath the WEB-INF\tags directory.


    Thankfully, the JSP specification addresses these issues by providing an alternative
    mechanism for packaging and deploying tag libraries containing all types of tags.


    **Deploying a Tag Library for Reuse**


    The key to achieving reuse with tag libraries, as with many other Java technologies,
    is the JAR


    file. Packaging a tag library for reuse requires creating a JAR file that contains
    the following items:


    • The (compiled) tag handler classes, along with any dependent classes you’ve
    created


    • The TLD file that describes the tag library


    As with other JAR files, the classes must be stored within the JAR file, with
    the directory structure mirroring the package structure maintained. As for the
    TLD file, this must reside inside the JAR file in a directory called META-INF.
    The only requirement here is that the TLD file must have a file extension of .tld
    so the JSP container can find it.


    ■**Note** A requirement of previous versions of the JSP specification was that
    the TLD file would have to be called taglib.tld. This requirement has since been
    lifted. In fact, it’s possible to place more than one TLD


    file in the META-INF directory for distributing more than one tag library in the
    same JAR file.


    Creating the JAR File


    Creating the JAR file is a fairly simple process that can be achieved with the
    regular jar command-line tool or via a build tool such as Jakarta Ant. To learn
    how you might create such a JAR file to contain a tag library, you’ll take the
    examples from Chapter 6 and package them.


    First, create an empty directory. In this directory, place the class files that
    are required for the tag library, and don’t forget to maintain the directory structure
    representing the packages to which these classes belong. Next, create a META-INF
    directory and place the TLD file inside it. Figure 8-3 shows the directory structure
    for the tags from Chapter 6.


