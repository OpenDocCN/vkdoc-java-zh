    **Step 2: Creating an Object-Relational Mapping**


    The next step in the development of the RSS newsreader is the development of the
    data layer to store and retrieve the business objects developed in step 1.


    This step is a little more difficult because you must learn the ins and outs of
    your persistence choice—in our case the Hibernate O/R persistence framework. Luckily,
    the Hibernate documentation is very good and Hibernate is fairly easy to use.


    Before you can use Hibernate to store Java objects in a relational database, you
    have to create an object-relational mapping for each object to be stored. A mapping
    specification is an XML file that describes how to map one or more Java classes
    to tables in a database. For example, the mapping for the com.apress.projsp.Newsfeed
    class, from the file Newsfeed.hbm.xml, is shown in Listing 9-5.


    **Listing 9-5.** *Newsfeed.hbm.xml*


    <?xml version="1.0"?>


    <!DOCTYPE hibernate-mapping PUBLIC


    "-//Hibernate/Hibernate Mapping DTD 2.0//EN"


    "http://hibernate.sourceforge.net/hibernate-mapping-2.0.dtd">


    <hibernate-mapping>


    <!-- ag.Newsfeed root -->


    <class name="com.apress.projsp.Newsfeed" table="newsfeed">


    <id column="id" name="id" >


    <generator class="uuid.hex"/>


    </id>


    <property name="url" column="url" type="string"


    not-null="true" unique="true" />


    <set name="items" table="item" cascade="delete" >


    <key column="newsfeed_id" />


    <one-to-many class="com.apress.projsp.Item" />


    </set>


    <set name="subscriptions" table="subscription" cascade="delete">


    <key column="newsfeed_id" />


    <one-to-many class="com.apress.projsp.Subscription" />


    </set>


    </class>


    </hibernate-mapping>


