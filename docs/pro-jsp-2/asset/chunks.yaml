    This simple example of basic authentication in an application brings us to the
    authentication options.


    **Authentication Options**


    Using a deployment descriptor, a web client can authenticate to a web server by
    using one of the mechanisms listed in Table 12-1.


    **Table 12-1.** *Authentication Mechanisms for Web Applications* **Mechanism**


    **Configuration**


    HTTP basic authentication


    <auth-method>BASIC</auth-method>


    HTTP digest authentication


    <auth-method>DIGEST</auth-method>


    HTTPS client authentication


    <auth-method>CLIENT-CERT</auth-method>


    Form-based authentication


    <auth-method>FORM</auth-method>


    When using HTTP basic authentication, the server will authenticate a user by using
    a username and password from the client. In a web environment, the client browser
    uses a pop-up dialog box (see Figure 12-2) to collect the user’s username and
    password. Figure 12-3 shows the sequence of interactions between a client and
    server when basic authentication is used.


    The authentication is based on a username and password, and the password is sent
    by using simple base64 encoding, but it isn’t encrypted.


    **Figure 12-3.** *When a client requests a protected page, the server returns
    the HTTP status 401.*


    *The client collects username and password data from the user and sends the data
    to the server.*


    *If the user is authorized to view the resource, the server sends the requested
    resource.*


    ![Image 95](index-509_1.png)


    513-0 ch12.qxd 11/17/05 4:15 PM Page 476


    **476**


    C H A P T E R 1 2 ■ S E C U R I T Y I N W E B A P P L I C AT I O N S


    The target server isn’t authenticated; therefore, this isn’t a secure mechanism.
    The client has no proof that the server is who it says it is. For a server to
    prove its identity, it needs to obtain an SSL certificate from a certificate authority
    (such as VeriSign). If you need greater security but still wish to use basic authentication,
    you can combine it with SSL or a virtual private network (VPN).


    HTTP digest authentication also authenticates a user on the basis of a username
    and password. However, the client transmits the password in an encrypted form,
    such as Secure Hash Algorithm (SHA) or Message Digest 5 (MD5). In the web arena,
    HTTP 1.1–enabled browsers will support this. According to the Servlet 2.5 specification,
    HTTP digest authentication isn’t currently in widespread use; therefore, servlet
    containers are encouraged but not required to support it. Tomcat, JBoss, and Resin
    support this authentication method. When you use HTTP digest authentication, the
    user is prompted with a username/password dialog box that looks similar to the
    basic authentication dialog box shown in Figure 12-4\. However, the digest authentication
    dialog box indicates that the user is accessing a secure site.


    **Figure 12-4.** *When digest authentication is used, the dialog box indicates
    that the user is* *accessing a secure site.*


    HTTPS client authentication requires the user to possess a **Public Key Certificate
    (PKC)** and is based on HTTP over SSL, hence the name HTTPS. To use this, users
    will have to apply for, receive, and then install into their browser a certificate.
    This verifies the browser’s identity and often prompts the user for a password
    even if the certificate is present. PKCs are useful in applications with strict
    security requirements and also for single sign-on from within the browser. Servlet
    containers that you want to be Java EE compliant are required to support the HTTPS
    protocol.


    Form-based authentication is the final option when using declarative security.
    It seems to be the most desirable and it’s also our favorite. Unlike the others,
    it allows the developer (or web designer) to customize the look and feel of the
    login screen. This is what most people expect when using a web application, so
    it fits into the web paradigm nicely. It also allows for simple instructions on
    the login screen and usability features such as password hints and help links.
    All the web applications that we’ve developed (that required user authentication)
