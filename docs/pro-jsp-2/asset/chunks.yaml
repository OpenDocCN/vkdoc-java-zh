    A container, such as Tomcat 5.5, allows filtering to occur with both the include
    and forward action of the request dispatcher. Consider the following filter mapping:


    <filter-mapping>


    <filter-name>F1</filter-name>


    <url-pattern>/*</url-pattern>


    <dispatcher>REQUEST</dispatcer>


    <dispatcher>INCLUDE</dispatcher>


    </filter-mapping>


    <filter-mapping>


    <filter-name>F2</filter-name>


    <url-pattern>/*</url-pattern>


    <dispatcher>REQUEST</dispatcer>


    <dispatcher>INCLUDE</dispatcher>


    </filter-mapping>


    <filter-mapping>


    <filter-name>F3</filter-name>


    <url-pattern>/*</url-pattern>


    <dispatcher>REQUEST</dispatcer>


    <dispatcher>INCLUDE</dispatcher>


    </filter-mapping>


    The <dispatcher> subelement of a filter mapping allows you to specify that filtering
    is to be performed during regular request dispatch as well as when the request
    dispatcher is called to include additional web resources. Figure 10-8 illustrates
