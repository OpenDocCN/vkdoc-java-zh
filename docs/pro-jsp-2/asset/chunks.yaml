    ■ ■ ■


    The Anatomy of a


    JavaServer Page


    **T**he Java Platform, Enterprise Edition 5 (Java EE 5) has two different but
    complementary technologies for producing dynamic web content in the presentation
    tier—namely **Java** **Servlet** and **JavaServer Pages (JSP)**.


    Java Servlet, the first of these technologies to appear, was initially described
    as extensions to a web server for producing dynamic web content. JSP, on the other
    hand, is a newer technology but is equally capable of generating the same dynamic
    content. However, the way in which a servlet and a JSP page produce their content
    is fundamentally different; servlets embed content into logic, whereas JSP pages
    embed logic into content.


    JSP pages contain markup interlaced with special JSP elements that provide logic
    for controlling the dynamic content. Servlets are built using Java classes that
    contain statements to output markup code. Of these two paradigms, JSP pages are
    preferred for presenting dynamic content in the presentation tier due to their
    greater readability, maintainability, and simplicity.


    Further increasing the simplicity and ease of use of JSP pages was one of the
    main objectives of the JSP 2.0 specification, which included several new features
    to make it easier than ever to embrace JSP technology, especially for developers
    who aren’t fluent in the Java syntax.


    The inclusion of a new **expression language (EL)** enables JavaScript-style JSP
    code to be embedded within pages, which makes it much easier for web developers
    not familiar with the Java syntax to understand the JSP logic. A library of standard
    actions known as the **JavaServer** **Pages Standard Tag Library (JSTL)** is also
    included to provide a host of useful, reusable actions such as conditional statements,
    iteration, and XML integration to name a few. These actions are applicable in
    some shape or form to most JSP web applications, and their use will greatly improve
    the reliability and ease of development for JSP page authors. Custom actions (also
    known as custom tags) also benefit from changes in the JSP specification, and
    it’s now possible to write a custom action entirely in JSP syntax instead of Java
    syntax!


    JSP 2.1 further eases the development of JSP pages by unifying the JSP expression
    language with the JavaServer Faces (JSF) expression language. These new features
    will help make JSP pages easier to write and maintain and are discussed in detail
    in the following chapters:


    • The JSP 2.1 expression language (EL) (see Chapter 3)


    • The JavaServer Pages Standard Tag Library (JSTL) (see Chapter 4)


    • The JavaServer Faces custom tags (see Chapter 5)


    • JSP custom tags (see Chapters 6, 7, and 8)


    **1**


    513-0 ch01.qxd 9/30/05 4:08 PM Page 2


    **2**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    In this chapter, you’ll take a look at some of the fundamental concepts based
    around JSP


    technology, such as the following:


    • The mechanics of a JSP page


    • Typical JSP architectures


    • Core JSP syntax


    • Tag libraries


    The aim of this chapter is to help you gain a grounding in the basics of JSP technology
    so you can make full use of the rest of the chapters in this book that build on
    these basic principles.


    **Before You Begin**


    To begin examining the basics of JSP technology, it’s essential that you have
    a cursory familiarity with the alternative and complementary presentation-tier
    web component, Java servlets.


    The next chapter will discuss servlets in more detail.


    **Java Servlets**


    As mentioned earlier, servlets can most simply be described as custom web-server
    extensions, whose jobs are to process requests and dynamically construct appropriate
    responses. In practice, such responses are usually returned in the form of HTML
    or XML and are the result of a user making an HTTP request via a web browser.
    Servlet technology has been an extremely popular choice for building dynamic web
    applications such as e-commerce sites, online banking, and news portals, for reasons
    of simplicity, extensibility, efficiency, and performance over alternative technologies
    such as Common Gateway Interface (CGI) scripts.


    Some of the most basic advantages of servlet technology are as follows:


    • **Simplicity:** Servlets are easy to write, and all the complicated threading
    and request delegating is managed by the servlet container.


    • **Extensibility:** The Servlet API is completely protocol independent.


    • **Efficiency:** Unlike CGI scripts, the execution of a servlet doesn’t require
    a separate process to be spawned by the web server each time.


    • **Performance:** Servlets are persistent, and their life cycle extends beyond
    that of each HTTP request.


    Servlets are simply Java classes that inherit from the javax.servlet.Servlet interface.


    These servlets are compiled and deployed inside a servlet container, which is
    a Java environment that manages the life cycle of the servlet and deals with the
    lower-level socket-based communication. The servlet container may be part of an
    existing Java-enabled web server itself or may be used as a stand-alone product
    that is integrated with a third-party web server.


    The servlet Reference Implementation container, Apache Jakarta Tomcat for example,
    may be used as a stand-alone web server or as a separate servlet container inside
    a larger commercial web server such as the Apache web server.


    513-0 ch01.qxd 9/30/05 4:08 PM Page 3


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    **3**


    Servlets are typically used for returning text-based content such as HTML, XML,
    WML, and so on. However, they are equally at home returning binary data such as
    images or serialized Java objects, which are often used by further servlets to
    generate some appropriate dynamic response.


    **JSP Under the Hood**


    A JSP page is simply a regular text file that contains markup (usually HTML) suitable
    for display inside a browser. Within this markup are special JSP elements that
    you’ll learn more about later. These are used to provide processing logic that
    enables dynamic content to be produced on a request-by-request basis.


    In JSP terms, any markup that isn’t a JSP element is known as template text, and
    this really can be any form of text-based content such as HTML, WML, XML, or even
    plain text! Of course the mixture of JSP elements and template text cannot simply
    be sent to the browser without any form of processing by the server. We mentioned
    earlier how JSP technology is an extension of servlet technology, and so you probably
    won’t be surprised to learn that each JSP page is, in fact, converted into a servlet
    in order to provide this processing logic. Figure 1-1 shows a JSP page being translated
    and compiled into a servlet in response to a request. This servlet is known as
    the JSP **implementation servlet**.


    JSP Page Request


    <%@ taglib uri=”http://java.sun.com/jstl/core” prefix=”C”%>


    <HTML>


    <HEAD>


    <TITLE>A Very Simple Page!</TITLE>


    <HEAD>


    <BODY>


    Welcome: <c:out value=”$(param.userName)” />


    <BODY>


    </HTML>


    JSP Transformation


    and Compilation


    JSP Implementation Servlet


    Servlet/JSP Container


    JSP Page Response


    **Figure 1-1.** *The JSP container translates and compiles the JSP source into
    an implementation* *class, which is used to process all requests.*


    513-0 ch01.qxd 9/30/05 4:08 PM Page 4


    **4**


    C H A P T E R 1 ■ T H E A N ATO M Y O F A J AVA S E R V E R PA G E


    A request for a JSP page is handled initially by the web server, which then delegates
    the request to the JSP container. The JSP engine will translate the contents of
    the JSP into its implementation servlet, which the container then uses to service
    the request. Usually a JSP


    container will check whether the contents of a JSP page have changed before deciding
    if it needs to retranslate the page in response to a request. This feature can
    make on-the-spot changes to JSP pages easy because the next request will automatically
    cause a retranslation and the most up-to-date content will be returned. Compare
    this with a purely servlet-based approach, which would require the servlet container
    to be shut down in order to have the necessary changes made, such as recompilation,
    testing, and finally, a restart!


    Let’s take a closer look at the process of taking a plain JSP text file and turning
    it into a dynamic web component; this process is also known as the JSP life cycle.


    **The JSP Life Cycle**


    As you’ve just seen, JSP pages don’t directly return content to the client browser
    themselves.


    Instead, they rely on some initial server-side processing that converts the JSP
    page into the JSP


    page implementation class (see Figure 1-2), which handles all requests made of
    the JSP.


    HTTP Request


    Web Container


    New or


    Yes—locate JSP


