    **516**


    第 13 章 ■ 提升 Web 应用的性能与可扩展性


    那么，如何确保您的 JSP 应用满足其性能和可扩展性要求呢？作为一名软件开发人员，您可能熟悉以下引用自唐纳德·克努特（Donald Knuth）的经典性能名言：


    *我们应当忘记微小的效率提升，大约 97% 的情况下：过早优化是万恶之源。*


    在本章中，我们不会关注微小的效率提升，也会避免过早优化；相反，我们将专注于您可以采取的更大步骤，以确保达到 JSP 应用的性能目标。我们将首先介绍两种能够显著增强
    JSP 应用性能和可扩展性特性的具体技术：**页面缓存**和**数据库连接池**。接着，我们将讨论更通用的性能技巧和最佳实践，最后讨论如何实际测试应用的性能和可扩展性，以确保您确实满足了要求。


    **通用原则**


    以下内容适用于高性能 Web 应用的开发，因此是您 JSP 应用设计的指导原则：


    • **不要执行不必要的代码。** 提升代码性能的最佳方法之一就是简单地避免执行它。除非绝对必要，否则不要执行代码。我们将讨论页面缓存如何在这方面提供帮助。


    • **不要创建不必要的对象。** 创建新对象是一项昂贵的操作，无论是创建它们所需的处理时间，还是存储它们所需的内存。在编写代码时，尽量最小化创建对象的数量。尽可能重用您创建的对象。JSP
    应用中最昂贵的对象之一是数据库连接对象。在本章中，我们将讨论如何使用数据库连接池来避免重复创建数据库连接对象。


    • **当必须创建对象时，在正确的范围内创建它们。** 在 Web 应用中，有三个作用域级别：**请求**、**会话**和**应用**。为了扩展 Web 应用以满足大量用户的需求，请仔细考虑哪些内容应存储在会话作用域中。我们将讨论这一点以及其他确保应用准备好扩展的方法。


    现在我们已经介绍了通用原则，接下来将详细讨论如何将页面缓存和数据库连接池的概念应用于 JSP 应用。


    **页面缓存**


    在典型的 JSP 应用中，网页由 Java 代码动态生成，这些代码从数据库提取数据并格式化数据以供显示。此处理过程需要时间，会导致 Java 对象的创建，并消耗网络资源。如果我们能找到一种方法，避免为每个传入的页面请求重新生成页面，那么不仅可以加快页面响应时间，还能提升
    JSP 应用的整体性能和可扩展性。我们真正想做的是将每个动态生成的页面保存在缓存内存中。当收到一个我们已经生成过的页面的请求时，我们可以直接从缓存中取出该页面并发送给浏览器。这种技术称为**页面缓存**，它可以显著提升
    JSP 应用的性能。


    **何时应使用页面缓存？**


    您可能以前使用过缓存，也许是通过编写自己的简单缓存。如果您使用的是像 Struts 这样的 MVC 框架，您可以为从数据库数据构建的对象使用简单缓存，而很少需要页面缓存。那么何时需要页面缓存呢？


    当您无法在负责输出页面的 JSP 页面或 Servlet 被调用之前，将网页所需的所有数据放入上下文中时，页面缓存就很有用。此外，当您的 JSP 页面由多个
    JSP 标签或其他组件组成，而这些组件本身负责执行诸如获取数据或渲染复杂 HTML 等昂贵操作时，页面缓存也很有用。


    **数据应缓存多久？**

    '
- fmt: '为了减轻服务器负载，您应尽可能长时间地缓存页面。那么，缓存时间应该多长呢？答案取决于应用程序的性质。当然，对于高度交互的页面，您可能根本无法使用缓存，或者只能缓存页面中一些较小且相对静态的部分。您可能会决定将某些页面缓存很长时间，但每次网站数据库更新时，会刷新部分或全部缓存。


    为了更好地理解页面缓存技术，让我们仔细看看最流行的开源 Java 缓存包之一：`OSCache`。


    ## OSCache


    `OSCache`是一个开源缓存库，可从 OpenSymphony 组织免费获取（下载和安装说明请访问 `http://www.opensymphony.com/oscache`）。`OSCache`包含一组
    JSP 标签，可让您在 JSP 应用程序中轻松实现页面缓存，同时还提供了一个基于 `ServletFilter` 的缓存实现，以便您可以缓存由任何 Servlet（不仅仅是
    JSP 页面）生成的内容。


    `OSCache`应用了以下通用页面缓存概念：


    - **缓存条目**：存储在页面缓存中的对象称为缓存条目。在 JSP 应用程序中，缓存条目通常是 JSP 页面、JSP 页面的一部分或 Servlet 的输出。

    - **缓存键**：页面缓存类似于哈希表。当您在页面缓存中保存缓存条目时，必须提供一个缓存键来标识该条目。在 JSP 应用程序中，您可以将多个请求参数组合在一起形成缓存键，或者使用页面的请求
    URI 作为其缓存键。

    - **缓存持续时间**：这是缓存条目在过期之前保留在页面缓存中的时间段。当缓存条目过期时，它会从缓存中移除，并且将其放入缓存的应用程序将被迫重新生成它。对于显示频繁更新数据的
    JSP 页面，您应设置较短的缓存持续时间，以便缓存频繁更新，用户不会看到过时信息。对于显示不常更新数据的 JSP 页面，您可以设置更长的缓存持续时间。

    - **缓存范围**：这是存储缓存的范围。在 JSP 应用程序中，将缓存条目存储在应用程序范围（以便所有用户共享缓存条目）或会话范围（以便按用户存储缓存条目）是有意义的。


    ## OSCache JSP 标签


    使用 `OSCache` 标签很简单。假设您已经安装并配置了 `OSCache`，您需要做的就是在希望缓存的 JSP 页面部分周围放置 `<os:cache>`
    标签。清单 13-1 中的示例 JSP 页面说明了如何执行此操作。


    **清单 13-1.** *longop-cached.jsp*


    ```

    <%@ page language="java" %>

    <%@ taglib uri="/WEB-INF/oscache.tld" prefix="os" %>

    <!DOCTYPE HTML PUBLIC "-//w3c//dtd html 4.0 transitional//en">

    <html>

    <head><title>Long operation - cached</title></head>

    <body>

    <h1>Long operation - cached</h1>

    <os:cache time="60">

    <% Thread.sleep(10000); %>

    <p>Woke up at: <%= new java.util.Date().toString() %></p>

    </os:cache>

    <p>

    The reason this JSP page took so long to load is because it contains a 10 second
    sleep.

    </p>

    <p>

    This page uses page cache with a 60 second timeout,

    so if you run this page again in the next 60 seconds

    it will take less than a second to run.

    </p>

    </body>

    </html>

    ```


    在前面的示例中，您有一个 JSP 页面，它会休眠 10 秒，然后显示唤醒时间和其他一些文本。如您所见，对 `sleep()` 方法的调用和唤醒时间消息被包含在缓存时间为
    60 秒的 `<os:cache>` 标签内。'
  raw: 'To reduce the load on your servers, you’ll want to cache pages for as long
    as possible. How long is that? The answer depends on the nature of your application.
    Of course, for highly interactive pages, you might not be able to use caching
    at all, or you may be able to cache only some small, fairly static portions of
    the pages. You might decide to cache some pages for a very long time but to flush
    some portion or all of the cache every time your site’s database is updated.


    To get a better understanding of page caching technology, let’s take a closer
    look at one of the most popular open-source Java caching packages: OSCache.


    **OSCache**


    **OSCache** is an open-source caching library that’s available free of charge
    from the OpenSymphony organization (the downloading and installation instructions
    can be found at http://www.opensymphony.com/oscache). OSCache includes a set of
    JSP tags that make it easy to implement page caching in your JSP application,
    along with a ServletFilter-based cache implementation so that you can cache content
    that’s generated by any servlet, not just JSP pages.


    OSCache applies the following general page caching concepts:


    **• Cache entry**: An object that’s stored into a page cache is known as a cache
    entry. In a JSP application, a cache entry is typically the output of a JSP page,
    a portion of a JSP


    page, or a servlet.


    • **Cache key:** A page cache is like a hash table. When you save a cache entry
    in a page cache, you must provide a cache key to identify the entry. In a JSP
    application, you might combine several request parameters together to form a cache
    key, or you might use a page’s request URI as its cache key.


    513-0 ch13.qxd 11/16/05 12:07 PM Page 518


    **518**


    C H A P T E R 1 3 ■ I M P R OV I N G W E B - A P P L I C AT I O N P E R F O R
    M A N C E A N D S C A L A B I L I T Y


    • **Cache duration:** This is the period of time that a cache entry will remain
    in a page cache before it expires. When a cache entry expires, it’s removed from
    the cache, and the application that placed it in the cache will be forced to regenerate
    it. For a JSP page that displays frequently updated data, you should set a short
    cache duration so that the cache is updated frequently and users aren’t presented
    with stale information. For a JSP page that displays data that’s infrequently
    updated, you can set a longer cache duration.


    • **Cache scope:** This is the scope at which the cache is stored. In a JSP application,
    it makes sense to store cache entries at either the application scope, so that
    cache entries are shared by all users, or at the session scope, so that cache
    entries are stored on a per-user basis.


    **OSCache JSP Tags**


    Using the OSCache tags is simple. Assuming you have installed and configured OSCache,
    all you need to do is place the <os:cache> tag around the sections of your JSP
    pages that you wish to have cached. The example JSP page in Listing 13-1 indicates
    how to do this.


    **Listing 13-1.** *longop-cached.jsp*


    <%@ page language="java" %>


    <%@ taglib uri="/WEB-INF/oscache.tld" prefix="os" %>


    <!DOCTYPE HTML PUBLIC "-//w3c//dtd html 4.0 transitional//en">


    <html>


    <head><title>Long operation - cached</title></head>


    <body>


    <h1>Long operation - cached</h1>


    <os:cache time="60">


    <% Thread.sleep(10000); %>


    <p>Woke up at: <%= new java.util.Date().toString() %></p>


    </os:cache>


    <p>


    The reason this JSP page took so long to load is because it contains a 10 second
    sleep.


    </p>


    <p>


    This page uses page cache with a 60 second timeout,


    so if you run this page again in the next 60 seconds


    it will take less than a second to run.


    </p>


    </body>


    </html>


    In the preceding example, you have a JSP page that sleeps for 10 seconds and then
    displays a wake-up time and some other text. As you can see, the call to the sleep()
    method and the wake-up time message are enclosed inside <os:cache> tags with a
    cache time of 60 seconds.


