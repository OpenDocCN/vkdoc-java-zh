    **635**


    **Directives**


    Directives are instructions to the JSP container regarding page properties, importing
    tag libraries, and including content within a JSP. Because directives are instructions
    rather than in-out processes, they cannot produce any output via the out stream.


    **The page Directive**


    The page directive specifies attributes for the page—all the attributes are optional,
    because the essential ones have default values, shown in bold.


    <%@ page language=" **java**"


    extends="package.class"


    import="package.class, package.*, ..."


    session=" **true**|false"


    buffer="none|**default**|sizekb"


    autoFlush=" **true**|false"


    isThreadSafe=" **true**|false"


    info="Sample JSP to show tags"


    isErrorPage="true|**false**"


    errorPage="ErrorPage.jsp"


    contentType="TYPE|


    TYPE; charset=CHARSET|


    **text/html; charset=ISO-8859-1**"


    pageEncoding=" **default**"


    isELIgnored="true|**false**"


    deferredSyntaxAllowedAsLiteral="true|**false**"


    trimDirectiveWhitespaces="true|**false**"


    %>


    • The default buffer size is defined to be at least 8 KB.


    • The errorPage attribute contains the relative URL for the error page to which
    this page should go if there’s an unhandled error on this page.


    • The specified error page file must declare isErrorPage="true" to have access
    to the Exception object. This is an example of the code that may be used for an
    error page:


    <%@ page language="java"


    isErrorPage="true" %>


    <html>


    <body>


    <!-- This displays fully-qualified name of the exception -->


    <%= exception.toString() %>


    <br>


    <!-- This displays the exception''s descriptive message -->


    <%= exception.getMessage() %>


    </body>


    </html>


    The page will print out the error message received.


