    the view components, the **View Helper** pattern describes a way to wrap up this
    code and make it reusable over multiple views.


    You have already seen many examples of view helpers. If you look back to Chapter
    7, one of the tags you saw filtered the domain of e-mail addresses, making it
    harder for spammers to obtain addresses. Although extremely useful, such logic
    isn’t really classed as business logic.


    Instead, this is presentation logic—code that helps the view present information
    back to the users. Of course, such code could have been written and embedded into
    the JSP page, but this is considered bad practice for reasons of quality, maintainability,
    and so on. Instead, that code is wrapped inside a custom tag so that it can be
    used and reused throughout the pages of the web application. In effect, this custom
    tag is an implementation of the View Helper pattern. In this case, the tag is
    a component that the view uses to help it perform its task.


