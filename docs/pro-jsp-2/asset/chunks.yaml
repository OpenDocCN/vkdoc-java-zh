- fmt: "If you’re using `Struts`, we’d recommend `Tiles` because it offers many built-in\
    \ interoperability features with `Struts`. Just like the `Validator`, it can be\
    \ used on its own by simply making a servlet entry in your application’s `web.xml`.\
    \ However, we won’t explore this configuration because this chapter focuses on\
    \ `Struts`-based solutions. We will illustrate the templating system used in the\
    \ example résumé application and how we’ve implemented `Tiles` in this particular\
    \ application. The architecture and techniques we’ll be using have been tried\
    \ and proven in production applications. `Tiles` can be used in many different\
    \ ways for building portal sites and menuing systems as well as customization.\n\
    \nDetailed online documentation for `Tiles` can be found at `http://www.lifl.fr/~dumoulin/tiles/`.\n\
    \n## Using Tiles in the Example Application\n\nFirst of all, let’s see how to\
    \ integrate `Tiles` into the `Struts` application. With `Struts`, it’s much like\
    \ the `Validator` and only needs to be registered as a plug-in in your `struts-config.xml`\
    \ file:\n\n```\n<plug-in className=\"org.apache.struts.tiles.TilesPlugin\" >\n\
    \    <set-property property=\"definitions-config\"\n                  value=\"\
    /WEB-INF/tiles-config.xml\" />\n    <set-property property=\"moduleAware\" value=\"\
    true\" />\n    <set-property property=\"definitions-parser-validate\" value=\"\
    true\" />\n</plug-in>\n```\n\nIf you’re using `XDoclet`, this will need to go\
    \ in a `struts-plugins.xml` file in your merge directory. There are basically\
    \ two ways to use `Tile`:\n\n- The first is through a JSP page that includes other\
    \ pages as a template.\n- The second is to use an XML file to define the different\
    \ components in a given page, also known as a `definition`.\n\nWe highly recommend\
    \ the XML-configuration route because it enables you to change page definitions\
    \ in one location, rather than on a page-by-page basis. It also supports inheritance\
    \ so you can define a base definition with the same header and footer, and then\
    \ you don’t need to specify these in the child definitions. The first property,\
    \ `definitions-config`, points to the file you use to define your definitions.\
    \ It also supports a comma-delimited list of file paths, which might be handy\
    \ if you have many pages or definitions in your application. The second property,\
    \ `moduleAware`, allows `Tiles` to recognize modules (formerly known as subapplications).\n\
    \nWe’ll describe these further in an upcoming section.\n\nThe basis of `Tiles`\
    \ is that it allows you to define a “template” for your entire application, or\
    \ several templates depending on your needs. This template will generally look\
    \ like a regular HTML file, with all the basic elements, such as `<html>`, `<head>`,\
    \ `<body>`, and any layout elements, such as `<div>` or `<table>`. If you’re still\
    \ using tables for laying out your web applications, we implore you to try a tableless\
    \ layout with `<div>` and CSS because it will make your pages much lighter and\
    \ smaller for your clients. XHTML and CSS, and a modern browser of course, make\
    \ this much easier. Listing 15-1 presents a very simple template for `Tiles`.\n\
    \n**Listing 15-1.** *template.jsp*\n\n```\n<!DOCTYPE html PUBLIC \"-//W3C//DTD\
    \ XHTML 1.0 Strict//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags/struts-tiles\"\n   \
    \ prefix=\"tiles\" %>\n<%@ taglib uri=\"http://jakarta.apache.org/struts/tags/struts-bean\"\
    \n    prefix=\"bean\" %>\n<html:html xhtml=\"true\" locale=\"true\">\n<head>\n\
    \    <%-- Push tiles attributes in page context --%>\n    <tiles:importAttribute\
    \ />\n    <title><bean:message name=\"title.key\"/></title>\n</head>\n<body>\n\
    \    <div id=\"header\">\n        <tiles:insert attribute=\"header\"/>\n    </div>\n\
    \    <div id=\"menu\">\n        <tiles:insert attribute=\"menu\" ignore=\"true\"\
    />\n    </div>\n    <div id=\"content\">\n        <%@ include file=\"/common/messages.jsp\"\
    \ %>\n        <h1><bean:message name=\"heading.key\"/></h1>\n        <tiles:insert\
    \ attribute=\"content\"/>\n    </div>\n    <div id=\"footer\">\n        <tiles:insert\
    \ attribute=\"footer\"/>\n    </div>\n</body>\n</html:html>\n```"
  raw: 'If you’re using Struts, we’d recommend Tiles because it offers many built-in
    interoper-ability features with Struts. Just like the Validator, it can be used
    on its own by simply making a servlet entry in your application’s web.xml. However,
    we won’t explore this configuration because this chapter focuses on Struts-based
    solutions. We will illustrate the templating system used in the example résumé
    application and how we’ve implemented Tiles in this particular application. The
    architecture and techniques we’ll be using have been tried and proven in production
    applications. Tiles can be used in many different ways for building portal sites
    and menuing systems as well as customization.


    Detailed online documentation for Tiles can be found at http://www.lifl.fr/~dumoulin/


    tiles/.


    Using Tiles in the Example Application


    First of all, let’s see how to integrate Tiles into the Struts application. With
    Struts, it’s much like the Validator and only needs to be registered as a plug-in
    in your struts-config.xml file:


    <plug-in className="org.apache.struts.tiles.TilesPlugin" >


    <set-property property="definitions-config"


    value="/WEB-INF/tiles-config.xml" />


    <set-property property="moduleAware" value="true" />


    <set-property property="definitions-parser-validate" value="true" />


    </plug-in>


    If you’re using XDoclet, this will need to go in a struts-plugins.xml file in
    your merge directory. There are basically two ways to use Tile:


    • The first is through a JSP page that includes other pages as a template.


    • The second is to use an XML file to define the different components in a given
    page, also known as a **definition**.


    We highly recommend the XML-configuration route because it enables you to change
    page definitions in one location, rather than on a page-by-page basis. It also
    supports inheritance so you can define a base definition with the same header
    and footer, and then you don’t need to specify these in the child definitions.
    The first property, definitions-config, points to the file you use to define your
    definitions. It also supports a comma-delimited list of file paths, which might
    be handy if you have many pages or definitions in your application. The second
    property, moduleAware, allows Tiles to recognize modules (formerly known as subapplications).


    We’ll describe these further in an upcoming section.


    The basis of Tiles is that it allows you to define a “template” for your entire
    application, or several templates depending on your needs. This template will
    generally look like a regular HTML file, with all the basic elements, such as
    <html>, <head>, <body>, and any layout elements, such as <div> or <table>. If
    you’re still using tables for laying out your web applications, we implore you
    to try a tableless layout with <div> and CSS because it will make your pages much
    lighter and smaller for your clients. XHTML and CSS, and a modern browser of course,
    make this much easier. Listing 15-1 presents a very simple template for Tiles.


