- fmt: '# 性能测试资源


    有关 Web 应用程序性能测试的更多信息，请访问以下产品网站：


    - **Apache JMeter:** `http://jakarta.apache.org/jmeter/`

    - **Mercury LoadRunner:** `http://www.mercury.com/us/products/performance-center/loadrunner/`

    - **Web Performance Inc.:** `http://www.webperformanceinc.com/`


    `Web Performance Inc.` 网站尤其是一个很好的资源。它包含性能测试术语表、性能测试演示文稿，以及一份比较 Java EE Servlet
    引擎（包括 `Tomcat`、`WebSphere`、`Orion`、`Jetty` 和 `Resin`）性能的报告。


    # 测试性能技术


    现在，您将通过将这些技术应用于一个实际的示例程序来实践本章介绍的技术。您将使用第 9 章中数据访问示例的增强版本，因为它是一个简单但相当典型的数据库驱动 Web
    应用程序。


    您可能还记得，第 9 章的示例是一个名为 `Ag` 的基于 Web 的 RSS 新闻阅读器程序。`Ag` 允许您通过输入用户名登录，维护 RSS 新闻源订阅列表，获取订阅的新闻项，并查看每个新闻源的标题。


    出于本案例研究的目的，我们为 `Ag` 添加了一个新的首页。这个新首页显示来自所有用户的最新新闻源条目，并允许访问者按时间倒序或按每个条目获得的点击次数查看条目。有了这个新首页，`Ag`
    非常类似于流行的社区新闻源聚合网站 `JavaBlogs.com` (`http://javablogs.com`) 和 `Weblogs at ASP.NET`
    (`http://weblogs.asp.net`)。


    图 13-5 显示了新首页的屏幕截图。


    当少量用户访问新的 `Ag` 首页时，性能似乎还不错。页面在一秒或更短时间内显示。但是，当您使用 `JMeter` 模拟大量用户访问该网站时，性能下降到不可接受的水平。页面需要
    5 到 10 秒才能显示，服务器负载上升到不可接受的水平（见图 13-6）。


    每个页面平均需要 4 秒才能运行。除此之外，在此测试期间，CPU 使用率为 100%。`Ag` 拖慢了整个服务器。为什么 `Ag` 的性能如此糟糕？


    对于每个传入请求，`Ag` 必须获取数据库连接、进行数据库查询并将结果渲染为 HTML。如何减少每个请求的工作量？让我们从应用数据库连接池开始。


    ![Image 180](index-563_1.png)

    ![Image 181](index-563_2.png)


    **图 13-5.** *第 9 章中新闻阅读器应用程序的首页*


    **图 13-6.** *`JMeter` 显示了新闻阅读器应用程序在负载下的糟糕性能。*


    # 应用数据库连接池


    数据库连接池应该有助于提高性能，因为它将消除打开和关闭数据库连接的开销。当应用程序需要数据库连接时，它将从已打开的数据库连接池中获取。


    那么，如何将数据库连接池应用于 `Ag` 应用程序呢？


    事实证明，因为 `Ag` 使用 `Hibernate` 进行所有数据库访问，所以 `Ag` 已经在使用数据库连接池。`Hibernate` 内置了连接池。`Hibernate`
    连接池在 `Hibernate` 配置文件 `hibernate.properties` 中配置，您可以在其中指定应用程序的数据库连接参数。以下是 `Ag`
    应用程序的 `Hibernate` 配置文件：


    ```

    hibernate.connection.driver_class=org.hsqldb.jdbcDriver

    hibernate.connection.url=jdbc:hsqldb:hsql://localhost

    hibernate.connection.username=sa

    hibernate.connection.password=

    hibernate.connection.pool_size=30

    hibernate.statement_cache.size=6

    hibernate.dialect=net.sf.hibernate.dialect.HSQLDialect

    ```


    `Hibernate` 内置的连接池无疑很方便，但它并不总是正确的答案。您的应用程序服务器管理员可能更希望您将应用程序配置为使用应用程序服务器或 JDBC
    驱动程序的数据库连接池功能。您该怎么做呢？


    如果您使用 `Hibernate`，您可以在 `Hibernate` 配置文件中指定由应用程序服务器管理员提供的 JNDI 数据源名称。您还必须指定数据库方言。以下示例配置用于访问绑定到
    JNDI 名称 `java:comp/env/jdbc/oracle` 的 Oracle 数据源。无需指定 JDBC 驱动类、连接 URL 或其他任何内容，因为这些已由您的服务器管理员在配置数据源时指定。有关数据源使用和配置的更多信息，请参阅第
    9 章中的“在 Web 应用程序中获取 JDBC 连接”部分。


    ```

    hibernate.connection.datasource=java:comp/env/jdbc/oracle

    hibernate.dialect=net.sf.hibernate.dialect.Oracle9Dialect

    ```


    添加数据库连接池对您没有任何好处，因为您已经在使用它了，所以让我们继续应用页面缓存。


    # 应用页面缓存


    新的 `Ag` 首页由 JSP 文件 `main.jsp` 渲染，因此您将在此处添加缓存。您将使用本章前面讨论过的 `OSCache` JSP 标签。


    您已经将 `OSCache` JAR 文件放在应用程序的 `WEB-INF\lib` 目录中，并将 `oscache.properties` 文件放在 `WEB-INF\classes`
    中，因此您需要做的就是将 `OSCache` JSP 标签库声明添加到 `main.jsp` 的顶部，并将 `OSCache` 标签放在您希望缓存的页面部分周围。清单
    13-5 显示了添加了新的 `OSCache` 后的 `main.jsp` 代码。


    **清单 13-5.** *main.jsp*


    ```jsp

    <%@ page language="java" %>

    <%@ taglib uri="/WEB-INF/c-rt.tld" prefix="c" %>

    <%@ taglib uri="/WEB-INF/oscache.tld" prefix="os"%>

    <!DOCTYPE HTML PUBLIC "-//w3c//dtd html 4.0 transitional//en">

    <html>

    <head>

    <style type="text/css"><jsp:include page="/ag.jsp" /></style>

    <title>Ag - RSS Newsreader and Aggregator</title>

    </head>

    <body bgcolor="#FFFFFF">

    <h1>Ag - RSS Newsreader and Aggregator</h1>

    <hr />

    <p>News Items from all users Subscriptions are aggregated below.</p>

    <p>You may login to <a href="subs">Manage your Subscriptions</a>.</p>

    <os:cache time="3600" key="${param.mode}">

    <c:choose>

    <c:when test="${param.mode == ''popular''}" >

    <h2>Most Popular Newsfeed Items</h2>

    View: Popular | <a href="main?mode=recent">Recent</a>

    <c:set var="items" value="${ag.popularItems}" />

    </c:when>

    <c:otherwise>

    <h2>Recent Newsfeed Items</h2>

    View: <a href="main?mode=popular">Popular</a> | Recent

    <c:set var="items" value="${ag.recentItems}" />

    </c:otherwise>

    </c:choose>

    <c:forEach var="item" items="${items}">

    <c:url var="url" value="/ag/link">

    <c:param name="link" value="${item.link}"/>

    </c:url>

    <h3><a href="${url}">${item.title}</a></h3> ${item.description} <br />

    <b>Posted: ${item.time}, Hits: ${item.hits}</b>

    </c:forEach>

    </os:cache>

    <hr />

    </body>

    </html>

    ```


    ![Image 182](index-566_1.png)


    `OSCache` 标签被添加在负责获取要显示的条目以及显示这些条目的页面部分周围。让我们关注 `OSCache` 标签：


    ```jsp

    <os:cache time="3600" key="${mode.param}">

    ...

    </os:cache>

    ```'
