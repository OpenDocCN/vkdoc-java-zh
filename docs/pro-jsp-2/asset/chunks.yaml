    `getMajorVersion()` returns the major version of the Java Servlet API that the
    server supports. For servers supporting version 2.5 of the Servlet specification,
    this method will return 2.


    `public String getMimeType(String file)`


    `getMimeType()` returns the MIME type of the specified file or null if the MIME
    type cannot be ascertained. Typical return values will be `"text/plain"`, `"text/html"`,
    or `"image/jpg"`.


    `public int getMinorVersion()`


    `getMinorVersion()` returns the minor version of the Java Servlet API that the
    server supports. For servers supporting version 2.5 of the Servlet specification,
    this method will return 5.


    `public RequestDispatcher getNamedDispatcher(String name)`


    `getNamedDispatcher()` returns a `RequestDispatcher` object that will be wrapped
    around the named servlet.


    `public String getRealPath(String path)`


    `getRealPath()` returns a `String` object containing the real path, in a form
    appropriate to the platform on which the servlet is running, corresponding to
    the given virtual path. An example of a virtual path might be `"/blah.html"`.


    `public RequestDispatcher getRequestDispatcher(String path)`


    `getRequestDispatcher()` returns a `RequestDispatcher` object that acts as a wrapper
    around the resource located at the specified path. The path must begin with `"/"`
    and is interpreted relative to the current context root.


    `public java.net.URL getResource(String path) throws java.net.MalformedURLException`


    `getResource()` returns a `URL` object that is mapped to the specified path or
    null if there is no resource mapped to the path. The path must begin with `"/"`
    and is interpreted relative to the current context root.


    `public java.io.InputStream getResourceAsStream(String path)`


    `getResourceAsStream()` returns the resource at the specified path as an `InputStream`
    object.


    `public java.util.Set getResourcePaths()`


    `getResourcePaths()` returns all the paths to resources held in the web application
    as Strings beginning with a `"/"`.


    `public String getServerInfo()`


    `getServerInfo()` returns a `String` object containing information on the server
    on which the servlet is running. At a minimum, the String will contain the servlet
    container name and version number.


