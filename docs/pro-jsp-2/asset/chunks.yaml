    **• 缓存持续时间**：这是缓存条目在过期之前保留在页面缓存中的时间段。当缓存条目过期时，它会从缓存中移除，并且将其放入缓存的应用程序将被迫重新生成它。对于显示频繁更新数据的
    JSP 页面，您应该设置较短的缓存持续时间，以便缓存频繁更新，用户不会看到过时信息。对于显示不常更新数据的 JSP 页面，您可以设置较长的缓存持续时间。


    **• 缓存作用域**：这是缓存存储的作用域。在 JSP 应用程序中，将缓存条目存储在应用程序作用域（以便所有用户共享缓存条目）或会话作用域（以便按用户存储缓存条目）是合理的。


    **OSCache JSP 标签**


    使用 OSCache 标签很简单。假设您已经安装并配置了 OSCache，您需要做的就是在希望缓存的 JSP 页面部分周围放置 `<os:cache>` 标签。清单
    13-1 中的示例 JSP 页面说明了如何执行此操作。


    **清单 13-1.** *longop-cached.jsp*


    <%@ page language="java" %>


    <%@ taglib uri="/WEB-INF/oscache.tld" prefix="os" %>


    <!DOCTYPE HTML PUBLIC "-//w3c//dtd html 4.0 transitional//en">


    <html>


    <head><title>长时间操作 - 已缓存</title></head>


    <body>


    <h1>长时间操作 - 已缓存</h1>


    <os:cache time="60">


    <% Thread.sleep(10000); %>


    <p>唤醒时间：<%= new java.util.Date().toString() %></p>


    </os:cache>


    <p>


    这个 JSP 页面加载时间长的原因是它包含一个 10 秒的休眠。


    </p>


    <p>


    此页面使用超时时间为 60 秒的页面缓存，


    因此，如果您在接下来的 60 秒内再次运行此页面，


    其运行时间将不到一秒钟。


    </p>


    </body>


    </html>


    在上面的示例中，您有一个 JSP 页面，它会休眠 10 秒，然后显示唤醒时间和其他一些文本。如您所见，对 `sleep()` 方法的调用和唤醒时间消息被包含在缓存时间为
    60 秒的 `<os:cache>` 标签内。

