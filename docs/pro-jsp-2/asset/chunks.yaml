    **Application**


    The struts-resume application we’re going to use as an example throughout this
    chapter uses Ant (an open-source build tool) and XDoclet (an open-source code
    generation too) as its core engines. They will generate a significant portion
    of the application for you as well as run any JUnit and Cactus tests you may have.'
