    它很可能是全球使用最广泛的安全协议，并内置于所有商业网络浏览器和网络服务器中。当前版本为第 2 版。由于 SSL 的原始版本在技术上是专有协议，**互联网工程任务组（IETF）**
    接管了升级 SSL 的职责，并将其重新命名为**传输层安全协议（TLS）**。TLS 的第一个版本是 3.1 版，与原始规范相比仅有微小改动。


    SSL 是一种允许网络浏览器和网络服务器通过安全通道进行通信的技术。在 SSL 中，数据在浏览器端（传输前）进行加密，然后在服务器端读取数据前进行解密。当服务器向客户端返回数据时，也会经历同样的过程。这个过程被称为**SSL
    握手**。该协议目前支持三种加密级别：40 位、56 位和 128 位。


    所需的安全性越高，应使用的位数就越多。有关 SSL 握手的更多信息，请访问 http://medialab.di.unipi.it/doc/JNetSec/jns_ch11.htm。


