    **375**


    • **Difficult to reuse:** The business logic cannot easily be separated from the
    presentation logic. If you need to create a new application or a web service that
    uses your business logic, you’re out of luck because your business logic is mixed
    in with your JSP and servlet-based presentation code.


    • **Not resilient to change:** If you need to switch to a new data access technology,
    you’ll have to make sweeping changes in your code. You cannot change the persistence
    logic without putting the business logic and presentation logic at risk.


    **Two-Layer Architecture**


    Splitting your application into a presentation layer and a business layer can
    solve the one-layer problems previously mentioned. This is a more difficult task
    because it requires designing business objects to model the business concepts
    and entities in your application. It also requires creating an interface or a
    set of interfaces through which your presentation layer can invoke business operations
    and access business objects.


    Figure 9-6 illustrates the two-layer architecture. As you can see, the presentation
    layer depends on the Servlet API but it calls upon the business layer to perform
    business operations and data access. The business layer depends on data access
    technology, which again can be JDBC, JDO, or some other persistence framework.
    Looking at Figure 9-6, you can see that the business layer is now an independent
    and reusable software entity. You could take that business layer and place it
    in a desktop application or you could take it and build a SOAP-accessible web
    service around it.


