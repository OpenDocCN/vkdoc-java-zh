    **295**


    **The TagSupport Class**


    Although the Tag interface contains more methods than the SimpleTag interface,
    providing an implementation is trivial. However, for convenience and in the same
    way that the SimpleTagSupport class provides a default implementation of the SimpleTag
    interface, the JSP


    specification provides the TagSupport class that you can use as a starting point
    for your own tag handlers. Here, the default implementations of the doStartTag()
    and doEndTag() methods return SKIP_BODY and EVAL_PAGE, respectively. We use this
    in many of this chapter’s examples.


    **A Simple Example**


    You’re now ready to build a small classic tag. To help provide a direct comparison
    with simple tags, you’ll rebuild the <datetime> tag example from the previous
    chapter.


    Building the <datetime> Tag Handler


    The first step is, of course, to build the tag handler class. You’ll extend the
    TagSupport class as shown in Listing 7-2.


    **Listing 7-2.** *DateTimeTag*


    package com.apress.projsp;


    import java.io.IOException;


    import java.text.DateFormat;


    import java.util.Date;


    import javax.servlet.jsp.JspException;


    import javax.servlet.jsp.JspTagException;


    import javax.servlet.jsp.tagext.TagSupport;


    public class DateTimeTag extends TagSupport {


    public int doStartTag() throws JspException {


    DateFormat df = DateFormat.getDateTimeInstance(


    DateFormat.MEDIUM, DateFormat.MEDIUM);


    try {


    pageContext.getOut().write(df.format(new Date()));


    } catch (IOException ioe) {


    throw new JspTagException(ioe.getMessage());


    }


    return SKIP_BODY;


    }


    }


    The functionality provided by the tag is implemented within the doStartTag() method.
    In situations when it doesn’t matter whether a custom tag will be used in the
    long or shortened form on the page (in other words, when the tag has no body),
    the functionality associated with the tag can be implemented within either the
    doStartTag() or the doEndTag() method.


    513-0 ch07.qxd 11/9/05 4:49 PM Page 296


    **296**


    C H A P T E R 7 ■ C L A S S I C TA G S


    As you can see, the code that provides the functionality of the tag is pretty
    much the same as that you used with the simple tag example in the previous chapter.
    The only real difference is in the way that this code is packaged within the tag
    handler. One point to note is that unlike the doTag() method on the SimpleTag
    interface, the doStartTag() and doEndTag() methods don’t declare that they throw
    IOException; therefore, you must catch and handle this exception.


    In this example, you’re throwing a JspTagException (a subclass of JspException)
    to tell the JSP page that something went wrong. Throwing a JspTagException instead
    of a more generic JspException is a useful way to specify that the problem may
    be related to a custom tag rather than the page itself, during development and
    debugging.


    Finally, because you’re not interested in the body content of this tag, the doStartTag()
    method returns SKIP_BODY. Note that the tag handler does not supply an implementation
    of the doEndTag() method. Because we are not providing any special behavior for
    the closing tag, we can simply let the default implementation in TagSupport handle
    the closing tag. Alternatively, we could have implemented the needed behavior
    in doEndTag() and let the default doStartTag() handle the opening tag.


    Describing the <datetime> Tag


