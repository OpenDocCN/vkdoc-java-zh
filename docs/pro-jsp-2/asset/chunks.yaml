    我们认为这是因为选择太多了。实际上，你几乎可以将任何基于 Java 的持久化框架与 Struts 配合使用。毕竟它们都是 Java 技术。当没有一个框架被证明是占主导地位且广泛使用的框架时，选择起来确实很困难。这也是
    Struts 的一个优势，它允许你选择任何框架——但我们猜测这对许多开发者来说也是一个令人头疼的问题。


    不过，如果你坚持使用自己熟悉的技术，为 Struts 应用选择持久化框架也可以很简单。如果你打算选择开源实现，请确保文档质量良好、开发邮件列表活跃，并且有示例应用。复制现有示例比从头开发要容易得多。花时间研究现有的数据库代码生成工具是值得的，因为从长远来看这会节省大量时间。最重要的是，学习并使用
    XDoclet（我们稍后会讨论）来辅助你的持久化层。我们相信你会对它非常满意。


    持久化选项


    在第 9 章中，你已经花了大量时间评估各种可用的持久化选项，因此我们不再赘述。这里我们只想告诉你，在 struts-resume 示例项目中我们选择了使用
    Hibernate。到目前为止，我们对它非常满意。


    它似乎拥有出色的文档，并且支持 XDoclet。XDoclet 支持对我们来说是一个很大的卖点，因为我们希望生成大部分数据库访问代码。


    ■**注意** struts-resume 中的示例借鉴了 Dave Johnson（第 9 章作者）在其示例应用中的范例，以及我们从 Hibernate
    开发邮件列表中获得的帮助。


    **增强 Struts ActionForm 开发**


    Struts 有一些经常被忽视的特性，但在你开发 ActionForm 时可能会很有用。让我们来看看它们。


    使用 DynaActionForm


    DynaActionForm 是作为 Struts 1.1 的一部分添加的。它基本上允许你通过 XML 声明表单的属性，而不是用 Java 编写表单。对开发者来说，好处是不必编写和编译
    ActionForm。然而，如果你使用 XDoclet 生成 ActionForm，那么可能就用不到 DynaActionForm。它们对于提供不需要持久化的简单表单非常方便——例如用于发送电子邮件的
    MessageForm。让我们以此为例，看看它的设置：


    <form-bean name="messageForm"


    type="org.apache.struts.action.DynaActionForm">


    <form-property name="name" type="java.lang.String"/>


    <form-property name="email" type="java.lang.String"/>


    <form-property name="subject" type="java.lang.String"/>


    <form-property name="content" type="java.lang.String"/>


    </form-bean>


    就像 ActionForm 一样，为了与 Web 层交互，你所有的属性都应该是字符串类型。


    只有对象类型（String、Integer 或 Boolean）可以用作 `<form-property>` 元素的类型。不允许使用基本类型。指定表单属性后，你可以像使用常规
    ActionForm 或 ValidatorForm 一样，在动作映射中引用该表单。DynaActionForm 也可以通过使用 `org.apache.struts.action.DynaValidatorActionForm`
    类型来利用 Validator。


    然后，你可以在 Action 类中使用以下代码获取该表单：`DynaActionForm msgForm = (DynaActionForm) form;`


    要从表单中获取值，你必须使用 `form.get(propertyName)` 语法（类似于从 HashMap 中获取值的方式）：


    `String subject = (String) theForm.get("subject");` 你还可以在 Action 类中创建并初始化一个 DynaActionForm（或
    DynaValidatorActionForm）：


    `DynaActionForm msgForm = (DynaActionForm) DynaActionFormClass`

