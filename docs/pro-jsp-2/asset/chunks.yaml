    **Converting Data**


    Looking at the FlightSearch and Flight objects, we notice that it would probably
    make more sense for the departDate and returnDate fields to be actual Date objects
    rather than String objects. (To be honest, we noticed this much earlier, but did
    not want to address that issue until this point in the chapter.)


    Modify the FlightSearch and Flight objects so that the departDate and returnDate
    fields are java.util.Date objects and redeploy the application. Now, bring up
    the search page, enter data into the fields, and click the Search button. If the
    application works correctly, you should see the search page again.


    At this point, you should be wondering why the search page was redisplayed, especially
    if you entered valid data into all the input fields. The redisplay of the search
    page indicates that there was an error in the data.


    When an error occurs in a JSF page, the JSF implementation redisplays the originating
    page. In this case, the problem is that the JSF implementation does not know how
    to convert a string into a Date object, which is what is required for the FlightSearch
    object. Unfortunately, with the sample JSP pages we have deployed so far, we did
