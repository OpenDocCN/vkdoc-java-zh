    The ReplaceContentOutputStream Class


    The custom stream, VisAuditOutStream, depends on the ReplaceContentOutputStream
    class (Listing 11-7) to do a lot of its magic. This class wraps an OutputStream
    and does the following:


    • Supplies its own byte array–based stream for the write() method, called by downstream
    filters and the resource processor.


    • Handles the close() method by calling a child’s replaceContent() method to transform
    the byte array stream.


    • Provides the transformed content through the getResult() method. This method
    is called by the filter when the filter writes the response.


    This class can be used for any filter that transforms or replaces the response
    content.


    **Listing 11-7.** *ReplaceContentOutputStream.java* package com.apress.projsp;


    import java.io.*;


    import javax.servlet.*;


    public abstract class ReplaceContentOutputStream


    513-0 ch11.qxd 11/17/05 8:39 PM Page 444


    **444**


    C H A P T E R 1 1 ■ A D VA N C E D F I LT E R I N G T E C H N I Q U E S


    extends ServletOutputStream


    {


    byte[] result;


    private ByteArrayOutputStream baStream;


    private boolean closed = false;


    public ReplaceContentOutputStream() {


    baStream = new ByteArrayOutputStream();


    }


    public void write(int i) throws java.io.IOException {


    baStream.write(i);


    }


    public void close() throws java.io.IOException {


    if (!closed) {


    processStream();


    closed = true;


    }


    }


    public abstract byte[] replaceContent(byte[] inBytes)


    throws java.io.IOException;


    public void processStream() throws java.io.IOException {


    result = replaceContent(baStream.toByteArray());


    }


    public byte[] getResult() {


    return result;


    }


    }


    This abstract class extends another abstract class, called ServletOutputStream,
    which is the base class of the OutputStream returned by getOutputStream() on a
    response. ServletOutputStream requires the write(int) method to be implemented
    by its subclass. It implements all the other write() variants based on this method.
    The ReplaceContentOutputStream requires the replaceContent() method to be implemented
    by all its subclasses.


    Note the use of the flag variable closed: Initially false, this variable is used
    to ensure that the wrapped stream is closed only once, regardless of how many
    times the close() method may be called.


    The constructor creates the memory-based ByteArrayOutputStream for the downstream
    processors.


    Next, the class implements the required write(int) method, which writes to the
    in-memory byte array stream called baStream. This ensures that all writes on this
    stream write to baStream (essentially a buffer).


    ![Image 83](index-478_1.png)


    513-0 ch11.qxd 11/17/05 8:39 PM Page 445


    C H A P T E R 1 1 ■ A D VA N C E D F I LT E R I N G T E C H N I Q U E S


    **445**


    When close() is called for the first time, the class transforms the output in
    the in-memory stream. After the transformation, the class stores the results so
    the filter can retrieve them later. Multiple calls to close() don’t cause a problem
    in this case.


    The processStream() method calls the replaceContent() method to transform the
    in-memory stream and write the transformed output to the wrapped output stream.
    The replaceContent() method is abstract. Subclasses of this class will provide
    an implementation for the method. The intention is for subclasses to transform
    the input byte array and return the transformed array. As you saw in Listing 11-4,
    VisAuditOutStream.java, that subclass transforms the inBytes byte array by adding
    additional data to the stream.


    This is the end of the code analysis for the ReplaceContentOutputStream abstract
    class.


    You’ll rely on this class for two subsequent filters that transform their outgoing
    response’s content.


