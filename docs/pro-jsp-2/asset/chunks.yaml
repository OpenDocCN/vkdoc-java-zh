    As mentioned earlier, using SSL can slow the performance of your application,
    so it’s wise to use it only when it’s needed. A good use of SSL is when a user
    logs in. This means that a user who accesses the login page by using the HTTP
    protocol (http://) will be switched over to HTTPS (https://) when the username
    and password are sent across the wire. In this example, you’ll use a Login servlet
