    **247**


    Save this file somewhere in the CLASSPATH for your application. In the Flight
    Search example, we could save it in the com\apress\projsp directory. When we cause
    the properties file to be loaded, we will reference it by a name that includes
    the CLASSPATH.


    The properties file is included in a JSP page with the <loadBundle> custom action:


    <f:loadBundle basename="com.apress.projsp.messages" var="msgs"/> The <loadBundle>
    custom action has two required attributes: basename and var. The basename attribute
    is the CLASSPATH qualified base name of the properties file. We reference the
    messages.properties file by using the same package qualified name as if it were
    a Java class file. Notice that we do not need to provide the .properties extension
    of the file. When combined with locale information, the basename is the initial
    part of the name of the file to be loaded. A locale code is appended with an underscore,
    followed by the .properties extension, to create the full filename. With no locale
    information, the basename shown in the preceding example tells the JSF implementation
    to look for the file messages.properties in the directory com\apress\projsp of
    the application. The var attribute is the name that you will use in the JSP


    page to access the messages stored in the messages.properties file.


    You can use these strings in your application by using a value-binding expression.
    For example, to add the page header to the searchForm.jsp page, you would replace
    the original page header element:


    <h2>Search Flights</h2>


    with the following <outputText> element:


    <h2><h:outputText value="#{msgs.head}"/></h2> In elements such as <commandButton>,
    you can use the value-binding expression directly in the value attribute of the
    <commandButton> element:


    <h:commandButton value="#{msgs.searchButton}" action="#{flight.search}"/> This
    provides two big advantages. First, if you want to change the text used in the
    web application, you need to change only the messages.properties message bundle.
    Second, and the big reason for message bundles, is that you can easily internationalize
    your application by providing additional message bundles for other languages.
