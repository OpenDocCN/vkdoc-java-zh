    ■ ■ ■


    Web 应用程序设计


    与最佳实践


    **前**几章涵盖了 JSP 规范提供的大量功能。现在，你已经具备了利用这些知识开始构建基于 Java 的 Web 应用程序的良好基础。那么，为什么还需要阅读本章呢？虽然了解类和
    API 对于充分利用 JSP 和 Servlet 至关重要，但还有一些其他关键因素能真正帮助你取得成功。本章将整合本书前面介绍的技术，并向你展示如何构建可维护、可扩展的基于
    Java 的 Web 应用程序。


    在本章中，你将了解良好设计的重要性，以及它如何帮助你构建高质量、易于维护和未来易于扩展的 Web 应用程序。为此，你将学习一些已被证明有助于实现这些目标的标准架构。延续良好设计的主题，我们将从更底层的角度探讨如何使用设计模式来实现这些架构。具体来说，我们将展示一些构建基于
    Java 的 Web 应用程序的最佳实践是如何被记录为模式的，并解释如何将它们应用到你自己的 Web 应用程序中。


    当然，拥有良好的设计至关重要，但这并不意味着可以忽视 Web 应用程序的实际实现工作。因此，我们将介绍一些开发和测试的最佳实践。内容涵盖从日志记录和调试的使用，到如何实际测试
    Web 应用程序并使其具备可测试性。最后，我们将讨论一些通用指南，包括如何增强用户在使用你的 Web 应用程序时的体验等主题。到本章结束时，你将能够以更有条理的方式运用已有的知识，从而构建出更好的
    Web 应用程序。


    **设计的重要性**


    当我们谈论**设计**时，无论它是在软件工程还是其他领域的语境下，本质上我们指的是在创建某物之前所进行的思考过程。这种前置思考有助于我们找到实现最终目标的最佳途径。例如，你通常不会在未考虑水管、电源插座、窗户、门等物品位置的情况下，就直接去建造一个新厨房。虽然你可以直接动手建造厨房，但如果没有一些前置思考，你可能无法得出最佳方案。这一点同样适用于软件。你可以直接投入开发，但确实需要一些预先规划。


    软件行业常被比作许多其他形式的行业，不过最广为人知的类比可能是建筑业。虽然这种比较在许多层面上都成立，但制作软件和建造建筑之间存在几个关键差异。建筑是为特定目的而设计的，并且必须设计成能够承受环境造成的已知公差。而软件则更具动态性。毕竟，总的来说，目前软件开发并不像建造房屋那样精确。这并不是说它不应该如此——只是这个行业尚未达到那个阶段。你上次看到没有缺陷的软件是什么时候？这里要指出的另一点是，软件在其生命周期中通常会发生变化。有时这些变化只是简单的缺陷修复；但更多时候，它们是重大的功能变更或新增。正是软件行业的这一特性使得设计变得重要。为了量化设计的重要性，让我们看看它能够直接影响的一些特性。


    **可维护性**


    **可维护性**是指维护一个软件的能力。它在多个层面上发挥作用。在最基本的层面上，可维护性涉及保持该特定软件正常运行所需的工作（清理日志、归档旧数据等）。在另一个层面上，维护应用程序可以包括修复报告的缺陷，以及进行性能优化以应对业务日益增长的需求。可维护性虽然不易衡量，但它与软件设计和实现的好坏程度相关。设计良好的软件更容易让任何维护它的人理解，并且这些人可以在确信不会破坏不相关功能的前提下进行所需的小改动。而对于设计糟糕的软件，情况则截然不同。


    **可扩展性**

    '
- fmt: '系统设计影响的另一个方面是**可扩展性**，即扩展和增强软件的能力。同样，设计良好的软件通常具有明确的结构，以便可以轻松更改现有功能并添加新功能，而不会对系统的其余部分产生副作用。特别是对于关键任务业务系统，可扩展性非常重要，因为它允许软件以最低的成本和开销跟上它所实现的业务流程。


    **Web 应用架构**


    既然您已经理解设计——即使只是一点点设计——很重要，那么让我们来看看两种常见且经过验证的基于 Java 的 Web 应用架构。


    **页面中心（Model 1）**


    构建 Web 应用的第一个常见架构是**页面中心**，在 Java Web 应用圈子中通常称为 **Model 1 架构**（见图 14-1）。我们在本书中多次提到过这种架构。这种架构提供了构建
    Web 应用的最简单方法。它涉及将应用构建为一组 JSP 页面。


    **图 14-1.** *在 Model 1 架构中，所有请求都在应用的单个层中处理。例如，所有显示逻辑、业务逻辑和数据都包含在 JSP 页面中。*


    当然，应用通常是为了与用户共享信息（通常来自某种数据库）而构建的，在页面中心的应用中，信息通常以几种方式表示。


    第一种方式是页面所需的任何信息都通过使用嵌入式结构化查询语言（SQL）语句直接从数据库访问。通常，这些 SQL 代码直接写入页面，同时还有用于建立数据库连接和检索结果的代码。作为这种范式的一种变体，处理数据库连接的代码通常被推送到可重用的
    Java 类或自定义标签中，例如 JSTL 中的那些。在各种构建 Web 应用的方法中，这可能是最不可维护的，因为所有访问数据的逻辑都嵌入在 JSP 页面内部。对数据库模式的任何更改都意味着可能需要打开应用中的每个页面进行修复。


    页面中心应用中访问数据的另一种机制是使用 JavaBean 来表示系统中的持久化实体。例如，您可能有一个名为 `Customer` 的 JavaBean 来表示系统中的客户。通过采用这种方法，数据访问代码被保留在各个页面之外，并且可以被推回到可重用的
    Java 类中（见图 14-2）。您可以立即在整个应用中实现更高程度的代码重用，同时提高应用的可维护性。例如，当数据访问被移到一个单独的层时，对数据库模式的更改只需要更改少数几个
    Java 类。


    **图 14-2.** *即使是对应用进行简单的更改，例如将数据访问移到一个单独的层，也可以提高应用的可重用性和可维护性。*


    因此，尽管您可以采取措施来提高页面中心应用的可维护性，但真正的限制在于您更改或修改系统提供的端到端功能的能力。在页面中心的应用中，用户看到的页面都是作为独立的
    JSP 实现的。实际上，您也可以使用 Servlet，但原理是一样的：以这种方式构建应用存在局限性。如果您想为每个页面添加一些功能（例如日志记录），您必须打开每个页面并进行编辑。想要通过应用添加新的功能流程？您很可能必须打开大量页面来编辑链接，并确保所需的数据对页面可用。主要问题是应用的页面承担了过多的职责。它们包含收集适当信息（并对这些信息进行更改）的业务逻辑，以及向用户显示这些信息的表示逻辑。理想情况下，业务逻辑的更改应该独立于表示逻辑，反之亦然。


    **模型-视图-控制器（Model 2）**


    用于构建 Web 应用的另一个主要架构基于经典的**模型-视图-控制器（MVC）**架构，有时也称为 **Model 2**。在页面中心 Web 应用中，单个请求通常由包含业务和表示逻辑的单个页面处理。然而，MVC
    在处理请求时使用三个主要组件，如图 14-3 所示。


    第一个是**控制器**，所有请求都通过它进行路由以得到处理。它充当 Web 应用所提供功能的网关，通常实现为 Java Servlet。在系统中拥有所有请求的单一入口点有几个好处。首先，它为系统级方面（如安全性、日志记录等）提供了一个公共位置。其次，控制器负责查找并执行业务逻辑，这些逻辑将用于处理请求。这个职责范围可以从简单地定位要显示的信息，到处理更新请求并修改数据库中驻留的某些数据。关于控制器需要注意的重要一点是，它与向用户呈现信息无关。


    **图 14-3.** *在 MVC 应用中，单独的层处理显示逻辑（视图）、数据访问（模型）以及业务逻辑（控制器和模型）。*


    MVC 架构使用的下一个组件或组件集代表**模型**。对于模型组件，有几种广泛接受的定义，但我们倾向于将它们视为控制器用于执行其处理的信息。换句话说，控制器包含业务逻辑，而模型代表该逻辑所操作的业务/领域对象。如果您做过任何
    Swing 编程，可以将模型视为 Swing 模型组件，它们仅提供被操作和显示的数据的表示。与 Swing 一样，模型组件通常实现为 JavaBean。


    MVC 架构中的最后一个组件是**视图**组件。它们仅负责向用户呈现信息。因为所有业务逻辑都由控制器执行，所以视图组件只需将模型提供的信息呈现给用户。因此，视图组件通常使用
    JSP 页面实现，因为这些页面最易于向用户呈现信息（例如，使用 HTML 等标记语言）。'
