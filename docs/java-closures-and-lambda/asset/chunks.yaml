- fmt: "# Partial Function Application and Mr. Curry’s Verb\n\nEvery culture and subculture\
    \ has its own language that identifies members of the tribe. One of the weird\
    \ tribal codewords in the functional programming tribe is “currying,” which is\
    \ a verb coined after the logician Haskell Curry. To understand what it means\
    \ to curry a function and why one might want to do it, let’s start in another\
    \ place: partial function application.\n\nPartial function application is exactly\
    \ what it says it is: the application of part of a function. Consider, for instance,\
    \ the string concatenation bifunction given in Listing 2-9. What if you wanted\
    \ to concatenate the same thing to the front of a number of strings? Repeating\
    \ yourself is one of the cardinal sins of programming (“DRY”), and passing the\
    \ same argument in over and over and over again is certainly repeating yourself.\
    \ What you want is a version of the bifunction with the first argument fixed to\
    \ a certain value. Fixing that first argument is called “applying” the argument,\
    \ and since you’re only fixing the first of two possible arguments, the application\
    \ is “partial.” In Listing 2-10, we demonstrate what we are doing when we do partial\
    \ function application: we are creating a `Function` that applies a fixed first\
    \ argument to a `BiFunction`. The resulting `Function` can then be applied over\
    \ and over again to multiple arguments. In Listing 2-11, we see how this is implemented:\
    \ although Java does not provide a built-in partial function application method,\
    \ it is simple to write one. We simply accept the bifunction that we want to apply\
    \ along with the first argument, and then return a function that calls back to\
    \ that bifunction with the first argument already set.\n\nListing 2-10. Implicit\
    \ Partial Function Application of String Concatenation\n\n```\npublic static void\
    \ main(String[] args) {\n  BiFunction<String, String, String> concat = (a,b) ->\
    \ a + b;\n  greetFolks(whom -> concat.apply(\"Hello, \", whom));\n}\n\npublic\
    \ static void greetFolks(Function<String, String> greeter) {\n  for(String name\
    \ : Arrays.asList(\"Alice\", \"Bob\", \"Cathy\")) {\n    System.out.println(greeter.apply(name));\n\
    \  }\n}\n```\n\nListing 2-11. Explicit Partial Function Application of String\
    \ Concatenation\n\n```\npublic static void main(String[] args) {\n  BiFunction<String,\
    \ String, String> concat = (a,b) -> a + b;\n  greetFolks(applyPartial(concat,\
    \ \"Hello, \"));\n}\n\npublic static <T,U,V> Function<U,V> applyPartial(\n  BiFunction<T,U,V>\
    \ bif, T firstArgument\n) {\n  return u -> bif.apply(firstArgument, u);\n}\n\n\
    public static void greetFolks(Function<String, String> greeter) {\n  for(String\
    \ name : Arrays.asList(\"Alice\", \"Bob\", \"Cathy\")) {\n    System.out.println(greeter.apply(name));\n\
    \  }\n}\n```\n\n## Mr. Curry’s Verb and Functional Shape\n\nPartial function application\
    \ acts on one function and takes another. Programming at the level of functions\
    \ like this is where “functional programming” got its name, and functional programming\
    \ languages encourage you to think at this level instead of at the level of data\
    \ and instructions. Think of functional arguments as voids in a jigsaw puzzle.\
    \ Only a specific shape will fill that void. Every method you have access to is\
    \ a piece of that jigsaw puzzle, and they each have a shape. The shape of those\
    \ methods is defined by the arguments that they take and the arguments that they\
    \ return. Like jigsaw puzzle pieces, you can also connect the shapes together\
    \ to make new shapes. Functional programming is the art of connecting the appropriate\
    \ method shapes together to fit the functional void.\n\nFor instance, the `greetFolks`\
    \ method in Listing 2-10 and 2-11 provides a void with the shape of `String ➤\
    \ String`: to call that method, we need to provide a function that takes a string\
    \ and returns a string. Unfortunately, we only had `(String ➤ String) ➤ String`:\
    \ we only had a function that takes two strings as arguments and returns a string.\
    \ That shape does not quite fit. So what we did was partially apply the first\
    \ argument, which shaved that first argument off the shape of the method. This\
    \ left us with a function with the required shape of `String ➤ String`.\n\nYou\
    \ could think of the `applyPartial` method in Listing 2-11 as fixing the first\
    \ argument. However, the `applyPartial` method is really changing a function of\
    \ the form `(x,y)->z` into a function of the form `x->(y->z)`. The method takes\
    \ a function with two arguments that returns a value, and it produces a function\
    \ with one argument that returns a function. That returned function takes another\
    \ argument and returns a value. Conceptually, the `applyPartial` method then applies\
    \ `x` to that new function and returns `y->z`. There are two distinct steps here:\
    \ first, the change of the shape of the function to `x->(y->z)`; second, the application\
    \ of the first argument, `x`.\n\nLet’s say that you wanted to create a lot of\
    \ different greeter functions. Perhaps you want to do internationalization, so\
    \ now you have many different ways of saying “Hello.” You could partially apply\
    \ each different “Hello” each time, but then you are performing the shape-changing\
    \ first step of `applyPartial` over and over again. If you wanted to save that\
    \ repeated effort, you would get your hands on the intermediate function that\
    \ `applyPartial` creates. That would allow you to generate greeter functions yourself.\
    \ Creating the function shaped `x->(y->z)` from the function shaped `(x,y)->z`\
    \ is called currying. The more you work with functional shapes, the more common\
    \ this maneuver will become. We demonstrate currying to create intermediate greeter\
    \ functions in Listing 2-12.\n\nThis may seem like a strange stunt at this point,\
    \ but we will see this in use later in the book. It is such a useful stunt, in\
    \ fact, that functional programming languages usually ship their functions pre-curried:\
    \ in OCaml, for instance, defining a function using the expression `\"let add\
    \ x y = x + y\"` will create a function named `add` with type `x->y->z` [⁶](#A978-1-4302-5999-2_2_Chapter.html#Fn6),\
    \ which can be used either as a bifunction producing `z` or as function producing\
    \ `y->z`. The reason functional programming languages have this implicit currying\
    \ is because the shape of functions matters more than their content in functional\
    \ programming. The shape of `(x,y)->z` is a bifunction: it takes two arguments\
    \ to produce a value. Bifunctions appear very rarely, and they are hard to fit\
    \ into the program. The shape of `x->y->z`, however, is still a function: you\
    \ can think of it as `x->w`, where `w` is the `y->z` function. While bifunctions\
    \ are rare, functions crop up everywhere. Therefore, you can often use currying\
    \ to make a bifunction fit into a function’s slot.\n\nListing 2-12. Explicit Currying\
    \ of String Concatenation Bifunction\n\n```\npublic static void main(String[]\
    \ args) {\n  BiFunction<String, String, String> concat = (a, b) -> a + b;\n  Function<String,\
    \ Function<String, String>> curriedConcat = curry(concat);\n  for (String greetings\
    \ : Arrays.asList(\"Hello\", \"Guten Tag\", \"Bonjour\")) {\n    greetFolks(curriedConcat.apply(greetings\
    \ + \", \"));\n  }\n}\n\npublic static <T,U,V> Function<T,Function<U,V>> curry(BiFunction<T,U,V>\
    \ bif) {\n  return t -> (u -> bif.apply(t,u));\n}\n\npublic static void greetFolks(Function<String,\
    \ String> greeter) {\n  for (String name : Arrays.asList(\"Alice\", \"Bob\", \"\
    Cathy\")) {\n    System.out.println(greeter.apply(name));\n  }\n}\n```"
