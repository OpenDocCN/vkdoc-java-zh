    \ inference, so you can write this code:\n\n`Runnable r = () -> System.out.println(\"\
    Hello, World!\");`\n\nThe `Thread` class has a constructor that takes a `Runnable`.\
    \ In the world with Java 8 lambdas, this means that the `Thread` class has a constructor\
    \ that takes a lambda: that lambda is converted into a `Runnable` by the compiler.\
    \ This means that lambdas make writing `Thread` code much simpler: instead of\
    \ having an anonymous inner class or some distant interface implementation, you\
    \ can simply pass your lambda right in.\n\nA naïve approach to using the `Thread`\
    \ class to solve our kata is to spawn a thread for each value to be calculated.\
    \ Unfortunately, threads are not cheap, and you will quickly exhaust the resources\
    \ of your virtual machine that way. Instead, we will spawn a certain number of\
