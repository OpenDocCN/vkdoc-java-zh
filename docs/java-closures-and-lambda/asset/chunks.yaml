    # 5. 使用 Lambda 进行数据访问


    在上一章中，我们了解了 Lambda 如何帮助我们处理文件和流。在本章中，我们将探讨如何与数据库进行交互。早在第 1 章中，我们就看到了 Lambda 如何通过简化回调接口的实现来帮助
    Spring 的 JDBCTemplate。在第 3 章中，我们介绍了流，而在第 4 章中，我们看到了流如何简化文件数据的处理。在本章中，我们将详细了解如何使用
    Java 的数据访问结构（`java.sql` 包）。这还将让我们有机会认识 Java 8 标准库中的另一个新数据结构：分割迭代器（spliterator）。


    如果我们要进行数据访问，就需要处理一个具有一定规模的数据库。在本章中，我们将使用一个 H2 内存数据库，其中包含莎士比亚所有作品中的所有单词索引。这些单词按行号进行组织。这意味着我们有一个
    `text` 表、一个 `line` 表、一个 `word` 表，以及一个连接 `line` 和 `word` 的 `line_word` 表。这些表的 UML
    图如下所示：


    ![A978-1-4302-5999-2_5_Figa_HTML.jpg](img/A978-1-4302-5999-2_5_Figa_HTML.jpg)


    该数据库的数据来源于古腾堡计划提供的文本，网址为 [`http://www.gutenberg.org/ebooks/100`](http://www.gutenberg.org/ebooks/100)。总共有
    38 个文本（十四行诗被归为一个文本）。大约有 113,000 行，约 36,000 个不同的单词，以及近百万个单词的使用实例。虽然按照企业标准，这仍然是一个相对较小的数据库，但它已经足够大，会拖慢处理速度，需要一些特殊处理。我们将在附录
    A 中逐步介绍如何加载该数据库，届时会对比命令式、面向对象和后函数式方法。在本章中，我们将从一个已填充数据的数据库开始，并逐步深入。


    在数据库加载完毕并准备就绪后，让我们思考如何（以及为什么）将流引入其中。从一个简单的需求开始：我们希望打印出所有单词的使用情况，每行一个，并附带所有相关的元数据。例如，如果你正在为
    Hadoop 的 MapReduce 运行生成输入数据，就可能需要这样做。我们将要运行的 SQL（以及一些示例结果）如下：


    `SELECT t.name, l."offset", w."value", lw."offset"`


    `FROM "text" t, word w`


    `INNER JOIN line l ON (t.id = l.text_id)`


    `INNER JOIN line_word lw ON (lw.line_id = l.id AND lw.word_id = w.id)`


    | 文本标题 | 行偏移量 | 单词 | 单词偏移量 |

    | --- | --- | --- | --- |

    | 情人的怨诉 | 328 | Betray | 5 |

    | 冬天的故事 | 3326 | interpose | 5 |

    | 维洛那二绅士 | 2041 | expedition | 7 |

    | 终成眷属 | 23 | Second | 12 |

    | 安东尼与克莉奥佩特拉 | 3840 | solemnity | 7 |


    既然我们可以利用 Lambda，那么如何处理这个查询呢？我们可以将问题分解为下面流程中的步骤。通过使用流，这四个步骤中的每一个都可以独立开发。流实例及其元素类型将把这些独立开发的步骤连接起来。因此，我们可以按任意顺序开发这些步骤，最后再将它们组合在一起。如果我们有多个开发人员，我们甚至可以将不同的步骤分配给不同的开发人员，每个步骤都与前一个步骤相关联。所以，流和
    Lambda 不仅使执行过程更加异步和并发，也使开发过程如此。我们将通过从中间开始，逐步推进到末尾，然后再填充前端并将所有部分整合在一起来证明这一点。


    ![A978-1-4302-5999-2_5_Figb_HTML.jpg](img/A978-1-4302-5999-2_5_Figb_HTML.jpg)


    ## 表示中间查询结果


    Java 的标准 SQL 库将查询的结果集表示为 `java.sql.ResultSet`。结果集提供了一组流式结果，因此我们将使用 `java.util.function.Stream`
    以函数式方式表示它。但是，该流的元素类型是什么呢？传统上，答案是一个 Java Bean，查询结果中的每个字段都成为 Java Bean 的一个属性：你需要为
    SQL 查询中的所有四个字段提供 getter 和 setter 方法。然而，在 Lambda 的世界中，我们将改用不可变的 Java 对象，如清单 5-1
    所示。


    **清单 5-1. 表示结果的 Java 对象**


    `/**`


    `* 用于存储查询单词使用数据库结果的函数式友好类。`


    `*/`


    `public class WordUsage {`


    `private final String textName;`


    `private final int lineOffset;`


    `private final String word;`


    `private final int wordOffset;`


    `public WordUsage(`


    `final String textName, final int lineOffset,`


    `final String word, final int wordOffset`


    `) {`


    `this.textName = textName;`


    `this.lineOffset = lineOffset;`


    `this.word = word;`


    `this.wordOffset = wordOffset;`


    `}`


    `public String getTextName() {`


    `return textName;`


    `}`


    `public WordUsage withTextName(String textName) {`


    `return new WordUsage(textName, lineOffset, word, wordOffset);`


    `}`


    `public int getLineOffset() {`


    `return lineOffset;`


    `}`


    `public WordUsage withLineOffset(int lineOffset) {`


    `return new WordUsage(textName, lineOffset, word, wordOffset);`


    `}`


    `public String getWord() {`


    `return word;`


    `}`


    `public WordUsage withWord(String word) {`


    `return new WordUsage(textName, lineOffset, word, wordOffset);`


    `}`


    `public int getWordOffset() {`


    `return wordOffset;`


    `}`


    `public WordUsage withWordOffset(int wordOffset) {`


    `return new WordUsage(textName, lineOffset, word, wordOffset);`


    `}`


    `}`


    清单 5-1 中 Java Bean 的不可变性非常重要，因为流可以快速（并且通常透明地）切换到多线程处理。Java 内存模型并不保证在线程 A 中构造但在线程
    B 中访问的对象，其字段一定完整。如果你在一个线程中构造对象并在另一个线程中访问它，任何给定的字段访问都可能返回 `null`，即使你在构造函数中为其赋值。原因在于不同线程维护着各自独立的内存空间，如果每当线程修改字段时，Java
    虚拟机都必须遍历整个树并复制对象，那将带来显著的性能损失。关于这一点，最令人头疼的是，这条规则很少有人理解，而且错误可能直到系统处于负载状态时才会出现，此时系统会抛出一个毫无帮助的
    `NullPointerException`，而它出现在本不该出现的地方。这对于可怜的开发人员来说简直是调试的噩梦，尤其是在并发性被隐藏的情况下。

    '
- fmt: "# 解决 Java 内存管理问题\n\n为了解决这个问题，Java 虚拟机提供了三种选择。首先，你可以对访问的每个对象使用同步块（`synchronized`\
    \ block）。这种方法笨拙且容易出错。另外两种选择是使用`volatile`或`final`注解字段，这两种方法都能解决内存管理问题。`volatile`关键字告诉\
    \ Java，每次访问字段时，运行时都需要检查线程本地缓存与数据源的一致性。这会对性能造成一定影响，但只要对象的字段本身是线程安全的，这种方法就能正常工作。`final`关键字告诉\
    \ Java，该字段的值不能改变，因此你在某个时刻找到的值将始终是未来的值。由于字段值不能改变，运行时无需在缓存间复制该字段，也无需检查缓存与数据源的一致性。除了在没有`volatile`性能损失的情况下解决内存管理问题外，它还使对象更容易推理，因为类的每个实例都有一个固定、永久的值。如果对象的字段值不改变，那么其他线程就无法破坏你当前线程对对象的推理，因此即使在多线程环境中，你也可以假装自己处于单线程执行环境中。\n\
    \n旧式 Java 对象被称为 POJO（“Plain Old Java Objects”），而这种新的不可变风格的对象有时被称为 PIJO（“Plain\
    \ Immutable Java Objects”），发音为“PEE-johs”。就个人而言，我更喜欢 FuJI（“Functional Java Instances”）这个术语。\n\
    \n请注意，FuJI 比 POJO 更适合与流（streams）配合使用。POJO 的 setter 方法类型接受一个参数并返回`void`，而 FuJI\
    \ 的“setter”方法返回被修改的类型。这意味着你可以将 setter 方法用作流中的映射（mapping）。例如，如果你想为流中的所有条目将文本名称设置为单个值，FuJI\
    \ 代码明显比 POJO 代码更短、更易读，如清单 5-2 所示。\n\n**清单 5-2. 为 POJO 流与 FuJI 流的每个元素赋值**\n\n```java\n\
    import java.util.stream.*;\n\npublic class Listing2 {\n    public static void\
    \ main(String[] args) {\n        // Set Constant Value on a Stream of POJOs\n\
    \        Stream<PojoWordUsage> pojos = Stream.of(/* INSERT POJOS HERE */);\n \
    \       pojos.map(pojo -> {\n            pojo.setTextName(\"New Text Name\");\n\
    \            return pojo;\n        });\n\n        // Set Constant Value on a Stream\
    \ of FuJIs\n        Stream<WordUsage> fujis = Stream.of(/* INSERT FUJIS HERE */);\n\
    \        fujis.map(fuji -> fuji.withTextName(\"New Text Name\"));\n    }\n}\n\
    ```\n\n如果你有一个模板对象，并希望使用流分配的数据，那么 FuJI 的效率要高得多：相关代码见清单 5-3。在这种情况下，我们有一个 POJO，其值被不断重新赋值，只要保证流是单线程的，并且与对象分配在同一线程中执行，这种方法通常能正常工作。而\
    \ FuJI 则会在流的每次遍历中生成对象的新实例，无论流并发程度如何，这种方法都能正常工作。FuJI 代码也更短、更易读。\n\n**清单 5-3. 将输入数据流映射到模板\
    \ POJO 与模板 FuJI**\n\n```java\nimport java.util.stream.*;\n\npublic class Listing3\
    \ {\n    public static void main(String[] args) {\n        WordUsage template\
    \ = new WordUsage(\"some text\", 0, \"word\", 1);\n        PojoWordUsage pojoTemplate\
    \ = new PojoWordUsage(\"some text\", 0, \"word\", 1);\n        Stream<Integer>\
    \ lineOffsets = Stream.of(/* INSERT LINE OFFSETS HERE*/);\n\n        // Using\
    \ POJO Template (not threadsafe)\n        Stream<PojoWordUsage> assignedPojos\
    \ = lineOffsets.map(offset -> {\n            pojoTemplate.setLineOffset(offset);\n\
    \            return pojoTemplate;\n        });\n\n        // Using FuJI Template\
    \ (threadsafe)\n        Stream<WordUsage> assignedFujis =\n            lineOffsets.map(template::withLineOffset);\n\
    \    }\n}\n```\n\n## 打印结果\n\n要实现打印行的功能，我们只需要知道我们正在处理一个`WordUsage`实例的流。如果我们知道我们在处理一个流，并且知道`WordUsage`类的定义，那么我们就可以实现下一步。我们不需要更多细节。这种区分曾是面向对象软件承诺的一部分，并且在这个后函数式世界中确实已经实现。之所以能够实现，是因为流为应用程序的控制流提供了抽象。以前，Java\
    \ 提供了对数据的抽象。有了流，你现在可以将控制流本身传递给应用程序的一部分，而应用程序的那部分决定如何处理它。\n\n在这种情况下，我们将接收处理后的`WordUsage`实例，并负责首先将`WordUsage`实例转换为制表符分隔值（TSV）输出格式，然后将生成的流传递到某处以打印输出。打印输出字符串实例的流很容易，所以我们将其留到最后处理。首先，让我们弄清楚如何转换`WordUsage`实例。我们可以采用两种简单的方法，我们将对它们进行考虑。\n\
    \n如果我们能够操作`WordUsage`类，那么我们可以直接将该方法添加到类中。然后，生成的方法可以作为映射函数传递到流中。我们将添加到`WordUsage`类的方法如下所示：\n\
    \n```java\npublic String toTSV() {\n    return String.format(\"%s\\t%d\\t%s\\\
    t%d\",\n        textName, lineOffset, word, wordOffset);\n}\n```\n\n给定一个`WordUsage`实例的流，我们只需将`WordUsage::toTSV`作为映射函数传递。这将指示流将实例方法应用于流的每个元素。如果`WordUsage`实例的流名为`source`，那么映射调用将如下所示：\n\
    \n```java\nsource.map(WordUsage::toTSV)\n```\n\n这无疑是最简单的方法，它将如何将`WordUsage`转换为\
    \ TSV 的实现细节保留在`WordUsage`类本身中。这将有助于防止“代码腐烂”，即代码随着时间的推移而变得功能减弱。代码腐烂的主要原因之一是调用代码站点对正在调用的对象做出了假设。这些假设在当前时刻可能成立，但如果类发生变化，你可能不会明显意识到需要更改代码。为了了解这一点，让我们考虑另一种方法：使用\
    \ lambda 将`WordUsage`映射为 TSV。\n\n在这种情况下，原本成为`toTSV()`方法的代码将改为内联定义。这种方法通常是刚接触后函数式语言的非函数式程序员以及最近发现并迷恋上\
    \ lambda 的 Java 开发人员的默认选择。如果`WordUsage`实例的源流名为`source`，那么内联 lambda 将如下所示：\n\n\
    ```java\nsource.map(wordUsage ->\n    String.format(\"%s\\t%d\\t%s\\t%d\",\n \
    \       wordUsage.getTextName(), wordUsage.getLineOffset(),\n        wordUsage.getWord(),\
    \ wordUsage.getWordOffset()\n    )\n);\n```\n\n这种方法目前可以正常工作。但它不如方法版本易读，因为你无法使用语义化的`toTSV`方法名。如果开发者想弄清楚输出值是\
    \ TSV，他们必须能够读取格式字符串，然后识别出那是 TSV。因此，方法版本具有这一优势。但这种方法还有一个更大（但更隐蔽）的问题。"
  raw: 'To solve this problem, the Java virtual machine gives you three options. First,
    you can use a synchronized block on every object that you access. This is unwieldy
    and error-prone. Your other two options are to annotate the field with `volatile`
    or `final`, either of which will solve the memory management problem. The `volatile`
    keyword tells Java that the runtime needs to check its thread-local cache against
    the source of truth every time you access the field. This is a bit of a performance
    hit, but it works as long as the object’s fields are themselves thread-safe. The
    `final` keyword tells Java that the field cannot change value, and so whatever
    value you find at one point will be the value in the future. Since the field cannot
    change value, there’s no need for the run time to be copying the field around
    the caches or checking the cache against the source of truth. In addition to solving
    the memory management problem without the performance hit of `volatile`, it also
    makes the object much easier to reason about, because each instance of the class
    has a fixed, permanent value. If the field values of an object don’t change, then
    there is nothing that another thread can do to break your thread’s reasoning about
    the object, so you can pretend as though you are in a single thread of execution
    even in a multi-threaded environment.


    Whereas old style Java objects are referred to as POJOs (“Plain Old Java Objects”),
    objects in this new immutable style are sometimes called PIJOs (“Plain Immutable
    Java Objects”), pronounced “PEE-johs.” Personally, I prefer the term FuJIs (“Functional
    Java Instances”).


    Note that FuJIs fit better with streams than POJOs do. Whereas as POJO’s setter
    has a type that takes an argument and returns void, FuJI’s “setters” return the
    type that was being modified. This means that you can use the setter as a mapping
    in the stream. For instance, if you wanted to set the text name to a single value
    for all the entries of the stream, the FuJI code is notably shorter and more readable
    than the POJO code, as demonstrated in Listing 5-2.


    Listing 5-2\. Assigning a Value to Each Element of a Stream of POJOs vs. a Stream
    of FuJIs


    `import java.util.stream.*;`


    `public class Listing2 {`


    `public static void main(String[] args) {`


    `// Set Constant Value on a Stream of POJOs`


    `Stream<PojoWordUsage> pojos = Stream.of(/* INSERT POJOS HERE */);`


    `pojos.map(pojo -> {`


    `pojo.setTextName("New Text Name");`


    `return pojo;`


    `}`


    `);`


    `// Set Constant Value on a Stream of FuJIs`


    `Stream<WordUsage> fujis = Stream.of(/* INSERT FUJIS HERE */);`


    `fujis.map(fuji -> fuji.withTextName("New Text Name"));`


    `}`


    `}`


    If you have a template object and want to work with data assigned by the stream,
    then the FuJI is significantly more efficient: that code is given in Listing 5-3\.
    In that case, we have a single POJO whose value we keep assigning, which will
    probably work fine as long as we guarantee that the stream is single threaded
    and executing in the same thread as the allocation of the object. The FuJI, on
    the other hand, will produce new instances of the object on every pass of the
    stream, which will work no matter how concurrent the stream may be. The FuJI code
    also happens to be shorter and more readable, too.


    Listing 5-3\. Mapping a Stream of Input Data to a Template POJO vs. a Template
    FuJI


    `import java.util.stream.*;`


    `public class Listing3 {`


    `public static void main(String[] args) {`


    `WordUsage template = new WordUsage("some text", 0, "word", 1);`


    `PojoWordUsage pojoTemplate = new PojoWordUsage("some text", 0, "word", 1);`


    `Stream<Integer> lineOffsets = Stream.of(/* INSERT LINE OFFSETS HERE*/);`


    `// Using POJO Template (not threadsafe)`


    `Stream<PojoWordUsage> assignedPojos = lineOffsets.map(offset -> {`


    `pojoTemplate.setLineOffset(offset);`


    `return pojoTemplate;`


    `}`


    `);`


    `// Using FuJI Template (threadsafe)`


    `Stream<WordUsage> assignedFujis =`


    `lineOffsets.map(template::withLineOffset);`


    `}`


    `}`


    ## Printing Out the Results


    To implement the functionality to print out the lines, all we need to know is
    that we are working with a Stream of WordUsage instances. If we know that we are
    working with a stream, and we know the definition of the WordUsage class, then
    we can implement the next step. We do not need any more details. This kind of
    distinction was part of the promise of object-oriented software, and it has really
    come to pass in this postfunctional world. The reason it can happen is because
    the stream provides an abstraction for the flow of control of the application.
    Before, Java provided abstractions over data. With streams, you can now pass in
    the flow of control itself to a part of the application, and that part of the
    application decides what to do with it.


    In this case, we will be receiving the processed WordUsage instances, and we will
    be responsible for first converting the WordUsage instances into a tab-separated
    value (TSV) output format, and then passing the resulting stream somewhere to
    print the output. Printing out the stream of output string instances is easy enough,
    so we will leave that to the end. First, let’s figure out how to convert the WordUsage
    instances. There are two simple approaches we could take, and we’ll consider both
    of them.


    If we have the ability to manipulate to the WordUsage class, then we can add that
    method right onto the class. The resulting method can then be passed into the
    stream as a mapping function. The method that we would add to the WordUsage class
    would look like this:


    `public String toTSV() {`


    `return String.format("%s\t%d\t%s\t%d",`


    `textName, lineOffset, word, wordOffset);`


    `}`


    Given a stream of WordUsage instances, we would then just pass in `WordUsage::toTSV`
    as a mapping function. This will instruct the stream to apply the instance method
    to each element of the stream. If the stream of WordUsage instances was named
    `source`, then the mapping call would look like this:


    `source.map(WordUsage::toTSV)`


    That is certainly the easiest way to do it, and it keeps the implementation details
    of how to convert a WordUsage into a TSV within the WordUsage class itself. This
    will help prevent “code rot,” where code becomes less functional over time. One
    of the major causes of code rot is when a calling code site makes assumptions
    about the object being called. Those assumptions may hold in the present moment,
    but if the class changes, it may not be obvious you need to change the code. To
    see how this plays out, let’s consider our alternative approach: using a lambda
    to map a WordUsage to a TSV.


    In this case, the code that became our `to` `TSV()` method would instead be defined
    inline. This approach is commonly the default for non-functional programmers coming
    into a postfunctional language, and also for Java developers who have recently
    discovered and become enamored with lambdas. If the source stream of WordUsage
    instances was called `source`, then the inline lambdas would look like this:


    `source.map(wordUsage ->`


    `String.format("%s\t%d\t%s\t%d",`


    `wordUsage.getTextName(), wordUsage.getLineOffset(),`


    `wordUsage.getWord(), wordUsage.getWordOffset()`


    `)`


    `);`


    This would work just fine for the moment. It is less readable than the method
    version, because you do not get to use the semantic `toTSV` method name. If you
    want to figure out that the output value is TSV, the developer has to be able
    to read the format string and then recognize that is TSV. So the method approach
    has that advantage. But there is an even bigger (yet more subtle) problem with
    this approach.'
