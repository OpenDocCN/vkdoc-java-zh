- fmt: "# Lambdas and Fork/Join\n\nWhen we last left our bitlength prime generator,\
    \ we had gotten a significant performance improvement by leveraging Java’s executors.\
    \ However, this took a lot of set-up and noise. Wouldn’t it be nicer if you could\
    \ just specify the work that you wanted to do, and not have to worry about the\
    \ concurrency details? The good news is that you can, using Java’s Fork/Join pools.\
    \ In Java 7, that functionality existed in the SDK. In Java 8, lambdas make that\
    \ functionality user friendly.\n\nThe basic concept of the Fork/Join pool is that\
    \ you work on tasks that can fork additional work, and then can join that work\
    \ back into the main thread. You can create and manage the underlying thread pool\
    \ if you really care by using the `ForkJoinPool` class. However, you can also\
    \ ignore the pool management entirely: you can simply provide the work to perform\
    \ concurrently, fire off that work, and join that work back into your thread at\
    \ some later point. It is really that simple: Java handles the rest.\n\nOf course,\
    \ there are a lot of caveats to the kind of work that you should pass into the\
    \ Fork/Join framework: long-blocking work, for instance, requires some careful\
    \ handling. You can read about these details in the JavaDoc for the `ForkJoinTask`\
    \ and `ForkJoinPool` classes. However, for the kind of work that we are dealing\
    \ with, it is absolutely perfect.\n\nWhat is even better is that the Fork/Join\
    \ framework works extremely nicely with streams: you can fork the work at one\
    \ stage of the stream and join it in another. To implement our solution, we will\
    \ define a parallel stream of numbers, ranging from 1 to our maximum bitlength.\
    \ We will then map our parallel stream into a parallel stream of forked `ForkJoinTask`\
    \ instances, each of which is generating a prime. Then we will join those tasks\
    \ back (handling the errors), and then print the result to standard out. This\
    \ code is given in Listing 6-5.\n\n**Listing 6-5.** Using Lambdas to Define Fork/Join\
    \ Tasks\n\n```\nimport java.util.concurrent.*;\nimport java.util.stream.*;\n\n\
    public class Listing5 {\n  public static void printPrimes(int maxBitLength) {\n\
    \    Stream.iterate(1, i -> i+1).limit(maxBitLength).parallel()\n      .map(i\
    \ ->\n            ForkJoinTask.adapt(() -> PrimeFactory.ofLength(i)).fork()\n\
    \      )\n      .map(ForkJoinTask::join)\n      .forEach(System.out::println);\n\
    \  }\n\n  public static void main(String[] args) {\n    DemoRunner.run(Listing5::printPrimes);\n\
    \  }\n}\n```\n\nThis code executes in about 14 seconds on my machine. That means\
    \ this code is just as performant as the hand-rolled executor code before, and\
    \ it is strikingly shorter. If all you are doing is CPU-intensive work, or if\
    \ it is primarily CPU-intensive work with some very brief blocking work (such\
    \ as reading from a private file on a local disk), then this is a perfect solution\
    \ for you.\n\n# Stream Parallelism\n\nIn the last chapter, we discovered that\
    \ there were sequential and parallel streams, and sequential streams were the\
    \ default. And in the last section, we used a parallel stream for maximum concurrency.\
    \ But what exactly is going on when we switch from sequential to parallel streams?\
    \ To see the difference, we can run the code in Listing 6-6.\n\n**Listing 6-6.**\
    \ Code to Demonstrate the Difference Between Sequential and Parallel Streams\n\
    \n```\n// NumberStreamFactory.java\nimport java.util.stream.*;\n\npublic class\
    \ NumberStreamFactory {\n/**\n * Returns a parallel stream which returns the {@code\
    \ int} values from 1 to {@code value}.\n *\n * @param value The value to count\
    \ up to; must be positive.\n * @return A stream that returns 1, 2, ..., {@code\
    \ value}.\n */\npublic static Stream<Integer> countTo(int value) {\n  if (value\
    \ <= 0) {\n    throw new IllegalArgumentException(\"Need a positive value to count\
    \ up to, but we were given \" + value);\n  }\n  return Stream.iterate(1, i ->\
    \ i + 1).limit(value).parallel();\n}\n}\n\n// Listing6.java\npublic class Listing6\
    \ {\npublic static void main(String[] args) {\n  System.out.println(\"\\n\\n\\\
    nPARALLEL\");\n  NumberStreamFactory.countTo(200).parallel().map(i -> {\n    System.out.println(\"\
    map: \" + i +\n    \" Thread: \" + Thread.currentThread().getName());\n    return\
    \ i;\n  }\n  ).forEach(i ->\n    System.out.println(\"forEach: \" + i +\n    \"\
    \ Thread: \" + Thread.currentThread().getName())\n  );\n  System.out.println(\"\
    \\n\\n\\nSEQUENTIAL\");\n  NumberStreamFactory.countTo(200).sequential().map(i\
    \ -> {\n    System.out.println(\"map: \" + i +\n    \" Thread: \" + Thread.currentThread().getName());\n\
    \    return i;\n  }\n  ).forEach(i ->\n    System.out.println(\"forEach: \" +\
    \ i +\n    \" Thread: \" + Thread.currentThread().getName())\n  );\n}\n}\n\n/*\
    \ SAMPLE RESULT\nPARALLEL\nmap: 13 Thread: ForkJoinPool.commonPool-worker-4\n\
    map: 132 Thread: main\nmap: 163 Thread: ForkJoinPool.commonPool-worker-1\nmap:\
    \ 32 Thread: ForkJoinPool.commonPool-worker-3\nforEach: 32 Thread: ForkJoinPool.commonPool-worker-3\n\
    map: 182 Thread: ForkJoinPool.commonPool-worker-2\nforEach: 182 Thread: ForkJoinPool.commonPool-worker-2\n\
    map: 33 Thread: ForkJoinPool.commonPool-worker-3\n...\nSEQUENTIAL\nmap: 1 Thread:\
    \ main\nforEach: 1 Thread: main\nmap: 2 Thread: main\nforEach: 2 Thread: main\n\
    map: 3 Thread: main\nforEach: 3 Thread: main\nmap: 4 Thread: main\nforEach: 4\
    \ Thread: main\nmap: 5 Thread: main\nforEach: 5 Thread: main\nmap: 6 Thread: main\n\
    forEach: 6 Thread: main\nmap: 7 Thread: main\nforEach: 7 Thread: main\n...\n*/\n\
    ```\n\nAs we can see, sequential streams are simple: they execute in the caller’s\
    \ thread. As much as possible, they perform the entire stream of operations for\
    \ an element before moving onto the next. There are, however, some operations\
    \ (such as `stream.sorted()`) that require processing the entire stream: the stream\
    \ can’t know if the current element is the smallest until it has consumed the\
    \ entire stream. Therefore, this call acts as a barrier: the particular element\
    \ of the stream cannot move beyond it before the subsequent elements are processed.\n\
    \nThe parallel streams are more interesting. If you have sufficient elements,\
    \ they will delegate some of their work into the common `ForkJoinPool` instance.\
    \ This is the same thread pool in which our Fork/Join tasks executed, which shows\
    \ how nicely those frameworks play together. Some of the work may still done locally\
    \ (such as number 132), but in any case, the same thread will execute as far along\
    \ the stream as possible (as demonstrated by numbers 32 and 182)."
  raw: '## Lambdas and Fork/Join


    When we last left our bitlength prime generator, we had gotten a significant performance
    improvement by leveraging Java’s executors. However, this took a lot of set-up
    and noise. Wouldn’t it be nicer if you could just specify the work that you wanted
    to do, and not have to worry about the concurrency details? The good news is that
    you can, using Java’s Fork/Join pools. In Java 7, that functionality existed in
    the SDK. In Java 8, lambdas make that functionality user friendly.


    The basic concept of the Fork/Join pool is that you work on tasks that can fork
    additional work, and then can join that work back into the main thread. You can
    create and manage the underlying thread pool if you really care by using the `ForkJoinPool`
    class. However, you can also ignore the pool management entirely: you can simply
    provide the work to perform concurrently, fire off that work, and join that work
    back into your thread at some later point. It is really that simple: Java handles
    the rest.


    Of course, there are a lot of caveats to the kind of work that you should pass
    into the Fork/Join framework: long-blocking work, for instance, requires some
    careful handling. You can read about these details in the JavaDoc for the `ForkJoinTask`
    and `ForkJoinPool` classes. However, for the kind of work that we are dealing
    with, it is absolutely perfect.


    What is even better is that the Fork/Join framework works extremely nicely with
    streams: you can fork the work at one stage of the stream and join it in another.
    To implement our solution, we will define a parallel stream of numbers, ranging
    from 1 to our maximum bitlength. We will then map our parallel stream into a parallel
    stream of forked `ForkJoinTask` instances, each of which is generating a prime.
    Then we will join those tasks back (handling the errors), and then print the result
    to standard out. This code is given in Listing 6-5.


    Listing 6-5\. Using Lambdas to Define Fork/Join Tasks


    `import java.util.concurrent.*;`


    `import java.util.stream.*;`


    `public class Listing5 {`


      `public static void printPrimes(int maxBitLength) {`


        `Stream.iterate(1, i -> i+1).limit(maxBitLength).parallel()`


          `.map(i ->`


                `ForkJoinTask.adapt(() -> PrimeFactory.ofLength(i)).fork()`


          `)`


          `.map(ForkJoinTask::join)`


          `.forEach(System.out::println);`


      `}`


      `public static void main(String[] args) {`


        `DemoRunner.run(Listing5::printPrimes);`


      `}`


    `}`


    This code executes in about 14 seconds on my machine. That means this code is
    just as performant as the hand-rolled executor code before, and it is strikingly
    shorter. If all you are doing is CPU-intensive work, or if it is primarily CPU-intensive
    work with some very brief blocking work (such as reading from a private file on
    a local disk), then this is a perfect solution for you.


    ## Stream Parallelism


    In the last chapter, we discovered that there were sequential and parallel streams,
    and sequential streams were the default. And in the last section, we used a parallel
    stream for maximum concurrency. But what exactly is going on when we switch from
    sequential to parallel streams? To see the difference, we can run the code in
    Listing 6-6.


    Listing 6-6\. Code to Demonstrate the Difference Between Sequential and Parallel
    Streams


    `// NumberStreamFactory.java`


    `import java.util.stream.*;`


    `public class NumberStreamFactory {`


    `/**`


    `* Returns a parallel stream which returns the {@code int} values from 1 to {@code
    value}.`


    `*`


    `* @param value The value to count up to; must be positive.`


    `* @return A stream that returns 1, 2, ..., {@code value}.`


    `*/`


    `public static Stream<Integer> countTo(int value) {`


    `if (value <= 0) {`


    `throw new IllegalArgumentException("Need a positive value to count up to, but
    we were given " + value);`


    `}`


    `return Stream.iterate(1, i -> i + 1).limit(value).parallel();`


    `}`


    `}`


    `// Listing6.java`


    `public class Listing6 {`


    `public static void main(String[] args) {`


    `System.out.println("\n\n\nPARALLEL");`


    `NumberStreamFactory.countTo(200).parallel().map(i -> {`


    `System.out.println("map: " + i +`


    `" Thread: " + Thread.currentThread().getName());`


    `return i;`


    `}`


    `).forEach(i ->`


    `System.out.println("forEach: " + i +`


    `" Thread: " + Thread.currentThread().getName())`


    `);`


    `System.out.println("\n\n\nSEQUENTIAL");`


    `NumberStreamFactory.countTo(200).sequential().map(i -> {`


    `System.out.println("map: " + i +`


    `" Thread: " + Thread.currentThread().getName());`


    `return i;`


    `}`


    `).forEach(i ->`


    `System.out.println("forEach: " + i +`


    `" Thread: " + Thread.currentThread().getName())`


    `);`


    `}`


    `}`


    `/* SAMPLE RESULT`


    `PARALLEL`


    `map: 13 Thread: ForkJoinPool.commonPool-worker-4`


    `map: 132 Thread: main`


    `map: 163 Thread: ForkJoinPool.commonPool-worker-1`


    `map: 32 Thread: ForkJoinPool.commonPool-worker-3`


    `forEach: 32 Thread: ForkJoinPool.commonPool-worker-3`


    `map: 182 Thread: ForkJoinPool.commonPool-worker-2`


    `forEach: 182 Thread: ForkJoinPool.commonPool-worker-2`


    `map: 33 Thread: ForkJoinPool.commonPool-worker-3`


    `...`


    `SEQUENTIAL`


    `map: 1 Thread: main`


    `forEach: 1 Thread: main`


    `map: 2 Thread: main`


    `forEach: 2 Thread: main`


    `map: 3 Thread: main`


    `forEach: 3 Thread: main`


    `map: 4 Thread: main`


    `forEach: 4 Thread: main`


    `map: 5 Thread: main`


    `forEach: 5 Thread: main`


    `map: 6 Thread: main`


    `forEach: 6 Thread: main`


    `map: 7 Thread: main`


    `forEach: 7 Thread: main`


    `...`


    `*/`


    As we can see, sequential streams are simple: they execute in the caller’s thread.
    As much as possible, they perform the entire stream of operations for an element
    before moving onto the next. There are, however, some operations (such as `stream.sorted()`)
    that require processing the entire stream: the stream can’t know if the current
    element is the smallest until it has consumed the entire stream. Therefore, this
    call acts as a barrier: the particular element of the stream cannot move beyond
    it before the subsequent elements are processed.


    The parallel streams are more interesting. If you have sufficient elements, they
    will delegate some of their work into the common `ForkJoinPool` instance. This
    is the same thread pool in which our Fork/Join tasks executed, which shows how
    nicely those frameworks play together. Some of the work may still done locally
    (such as number 132), but in any case, the same thread will execute as far along
    the stream as possible (as demonstrated by numbers 32 and 182).'
