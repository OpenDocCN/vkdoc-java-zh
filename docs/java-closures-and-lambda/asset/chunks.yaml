- fmt: "`getOrDie()`方法提供了一种便捷方式来获取结果，前提是我们确信结果存在。如果调用者判断错误且结果不存在，该方法将抛出一个`NoSuchElementException`，并将原始异常作为抑制异常包含在内。这是通过`orElseThrown`方法实现的，该方法要么返回结果，要么抛出由`Supplier`提供的异常。我们的`Supplier`实现会将异常放入`NoSuchElementException`的堆栈跟踪中，这有助于调试。（`\"\
    INTERNAL ERROR\"`异常仅在异常和结果最初都被填充为`null`时才会被触发，而这理论上根本不会发生。）\n\n`map`函数会在结果存在时对其进行转换；否则，它将构造一个新结果并传递异常。这提供了一种在不丢失异常信息的情况下对结果进行操作的方式。在大多数情况下，当你需要使用`getOrDie()`时，你实际上更想要`map()`。\n\
    \n`ifPresent`和`ifNotPresent`方法提供了一种便捷方式来消费结果或异常（如果它们存在）。这些方法连同`map()`，允许用户指定实现而无需关心结果的状态，从而构建出非常易读的API。请注意，`ifPresent()`/`ifNotPresent()`与`map()`的主要区别在于返回值：`ifPresent()`/`ifNotPresent()`会丢失信息，但转换为更常见的`Optional`类型；而`map()`则保留信息，但保持为当前的结果类型。\n\
    \n`when`方法为流畅API提供了支持，允许你编写在读者看来像命令式代码的函数式代码。它们返回当前对象以支持链式调用，因此你可以按顺序调用这些方法，提供一种看起来非常像带有异常处理的`try/catch`块的结构。\n\
    \n最后一个`when`方法用于捕获多种类型的异常，它是Java 8强大功能的一个绝佳示例。得益于类型推断，消费者的参数将自动设置为待捕获方法的最宽公共超类。传统的实现会涉及`null`、`if`块和循环，但这些都被`Optional`和`Stream`类的方法所取代。\n\
    \n使用这个`Result`类，我们可以封装方法调用的结果。我们不返回`RETURN_T`，而是返回`Result<RETURN_T>`。当方法执行时，它会构造一个`Result`实例，其中包含用户函数的返回值，或者抛出的`IOException`。代码的初步实现可能如下所示：\n\
    \n```\n<RETURN_T> Result<RETURN_T> withTempFile(Function<File, RETURN_T> function)\
    \ {\n    Objects.requireNonNull(function, \"function to apply to temp file\");\n\
    \    Optional<File> file = Optional.empty();\n    try {\n        file = Optional.of(File.createTempFile(\"\
    funfile\", \"tmp\"));\n        return new Result<>(file.map(function).get());\n\
    \    } catch (IOException e) {\n        return new Result<>(e);\n    } finally\
    \ {\n        file.ifPresent(File::delete);\n    }\n} // This code would work,\
    \ but could do with improvement: read on!\n```\n\n这段代码与清单4-1中的代码惊人地相似。如果你稍微模糊视线，只关注空白区域中函数的轮廓，你会发现该方法具有相同的结构。任何时候，当你发现两个方法具有相同的结构时，你就错过了代码复用的机会。在这个例子中，除了`return`行之外，代码几乎完全相同：在清单4-1中，`return`行委托给了用户提供的代码。在我们的新方法中，我们希望在那一点调用`Return`类的构造函数。我们可以将`Return`类的构造函数作为用户提供的代码传入清单4-1的代码中，从而将临时文件的实际实现委托到一个单一位置。最终的委托代码如清单4-3所示，并且极其简单。这再次证明了在后函数式Java世界中，新范式有多么强大。\n\
    \n**清单4-3. 临时文件创建，异常封装在返回值中**\n\n```\n/**\n * Creates a temporary file, passes\
    \ it into the given function, and\n * deletes the temporary file when the function\
    \ is complete.\n *\n * @param function The behavior to implement with the temporary\
    \ file,\n *                 which may not return {@code null}; may not be {@code\
    \ null}\n * @return The result of the given function\n */\npublic static <RETURN_T>\
    \ Result<RETURN_T> withTempFile(\n    Function<File, RETURN_T> function\n) {\n\
    \    Objects.requireNonNull(function, \"function to apply to temp file\");\n \
    \   Function<File, Result<RETURN_T>> resultify = function.andThen(Result::new);\n\
    \    return withTempFile(Result::new, resultify);\n}\n```"
  raw: 'The `getOrDie()` method provides a convenient way for us to get at the result
    if we really know that the result is present. If the caller is wrong and the result
    is not present, it will throw a `NoSuchElementException` with the resulting exception
    as a suppressed exception. This is implemented via the `orElseThrown` method,
    which either returns the result or throws the exception provided by a `Supplier`.
    Our `Supplier` implementation will put the exception into the stack trace of the
    `NoSuchElementException`, which should help debugging. (The `“INTERNAL ERROR”`
    exception is only ever reached if both the exception and the result were initially
    populated as `null`, which should simply never happen.)


    The `map` function will transform the result, if it exists; otherwise, it will
    construct a new result and pass the exception along. This creates a way to act
    upon the result without losing the exception information. In most case when you
    reach for `getOrDie()`, you really want `map()`.


    The `ifPresent` and `ifNotPresent` methods provide a convenient way to consume
    the result or the exception if they are present. This, along with `map()`, allows
    the user to specify an implementation without having to worry about the state
    of the result, which makes for a very readable API. Note that the big difference
    with `ifPresent()`/`ifNotPresent()` and `map()` is the return value: `ifPresent()`/`ifNotPresent()`
    loses information but converts to the more common Optional type, while `map()`
    retains information but stays with the present type.


    The `when` methods provide support for a fluent API, which allows you to write
    functional code that looks like imperative code to the reader. They return the
    current object for chaining, so you can call the methods in order, providing something
    that looks a lot like a try/catch block with exceptions at the end.


    The very last `when` method is for catching multiple types of exceptions, and
    it is a great demonstration of the power of Java 8\. Thanks to type inference,
    the consumer’s argument will be automatically set to the broadest common superclass
    of the methods to be caught. The traditional implementation would involve `null`,
    `if` blocks, and loops, but those are all replaced by the `Optional` and `Stream`
    class methods.


    Using this `Result` class, we can encapsulate the result of a method call. Instead
    of returning a `RETURN_T`, we return a `Result<RETURN_T>`. When the method executes,
    it will construct a Result instance with either the return value of the user’s
    function, or with the IOException that was thrown. An initial pass at the code
    might look something like this:


    `<RETURN_T> Result<RETURN_T> withTempFile(Function<File, RETURN_T> function) {`


    `Objects.requireNonNull(function, "function to apply to temp file");`


    `Optional<File> file = Optional.empty();`


    `try {`


    `file = Optional.of(File.createTempFile("funfile", "tmp"));`


    `return new Result<>(file.map(function).get());`


    `} catch (IOException e) {`


    `return new Result<>(e);`


    `} finally {`


    `file.ifPresent(File::delete);`


    `}`


    `} // This code would work, but could do with improvement: read on!`


    This code bears a striking resemblance to the code in Listing 4-1\. If you let
    your eyes blur a little bit and just look at the profile of the function in the
    whitespace, you will see that the method has the same shape. Any time that you
    have two methods with the same shape, you are missing an opportunity for code
    reuse. In this case, the code is almost identical except on the `return` lines:
    in Listing 4-1, the `return` lines delegate to user-given code. In our new method,
    we want to call the `Return` class constructors at that point. We can pass the
    Return class constructors into the Listing 4-1 code as the user-given code, thereby
    delegating the actual implementation of the temp file into a single place. The
    resulting delegation code is given in Listing 4-3, and it is extremely simple.
    This demonstrates again how powerful the new paradigm is in our postfunctional
    Java world.


    Listing 4-3\. Temp File Creation with Exceptions Encapsulated in the Return Value


    `/**`


    `* Creates a temporary file, passes it into the given function, and`


    `* deletes the temporary file when the function is complete.`


    `*`


    `* @param function The behavior to implement with the temporary file,`


    `*                 which may not return {@code null}; may not be {@code null}`


    `* @return The result of the given function`


    `*/`


    `public static <RETURN_T> Result<RETURN_T> withTempFile(`


    `Function<File, RETURN_T> function`


    `) {`


    `Objects.requireNonNull(function, "function to apply to temp file");`


    `Function<File, Result<RETURN_T>> resultify = function.andThen(Result::new);`


    `return withTempFile(Result::new, resultify);`


    `}`'
