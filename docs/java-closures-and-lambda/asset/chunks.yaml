    \ that always return a value. A very common type of lambda, however, returns no\
    \ value at all: these are terminal lambdas. You see them, for instance, when consuming\
    \ every element of a collection or when terminating a stream of values. They are\
    \ the opposite of suppliers; they take a value and produce nothing as a result.\
    \ Predictably, the functional interface for these consuming lambdas is `Consumer`.\
    \ An example of a consumer is given in Listing 2-13: there, we use a consumer\
    \ to represent how we print out the greeting. A more idiomatic Java 8 way of writing\
    \ this code will be given when we get to collections in [Chapter 3](#A978-1-4302-5999-2_3_Chapter.html).\n\
    \n**Listing 2-13.** Example of a `Consumer` and `BiConsumer`\n\n```\npublic static\
    \ void greetFolks() {\n  Consumer<String> doGreet = name -> System.out.println(\"\
    Hello, \" + name);\n  for (String name : Arrays.asList(\"Alice\", \"Bob\", \"\
    Cathy\")) {\n    doGreet.accept(name);\n  }\n}\n\npublic static void concat()\
    \ {\n  BiConsumer<String,String> printConcat = (left,right) ->\n    System.out.println(left\
    \ + right);\n  for (String name : Arrays.asList(\"Alice\", \"Bob\", \"Cathy\"\
    )) {\n    printConcat.accept(\"Goodbye, \", name);\n  }\n}\n```\n\n### Lambdas\
    \ with Complex Bodies\n\nUsually, lambdas are simple, single-element affairs.\
    \ Occasionally, however, you need to do something a bit more involved. This is\
    \ especially common when you are writing code that interfaces with a pre-lambda\
    \ API, such as working with an `Autocloseable`. If you need to create a complex\
    \ body on a lambda, you can specify the body within brackets. When you do so,\
    \ however, you take on responsibility for explicitly calling a `return`. An example\
    \ of a lambda wrapping an `Autocloseable` is given in Listing 2-14. As you can\
    \ see there, this approach makes your lambda look a lot more like a method, and\
    \ you may be better off defining a method and referring to it explicitly. There’s\
    \ even a nice syntax for turning a method back into a lambda if you need to: see\
    \ “Making Methods into Lambdas” below.\n\n**Listing 2-14.** Lambda with a Complex\
    \ Body That Wraps an `Autocloseable`\n\n```\nFunction<File, Byte> firstByte =\
    \ file -> {\n  try (InputStream is = new FileInputStream(file)) {\n    return\
    \ (byte) is.read();\n  } catch (IOException ioe) {\n    throw new RuntimeException(\"\
    Could not read \" + file, ioe);\n  }\n};\n\nfor (String filename : args) {\n \
    \ File file = new File(filename);\n  int byte1 = firstByte.apply(file);\n  System.out.println(filename\
    \ + \"\\t=>\\t\" + byte1);\n}\n```\n\n### Lambdas with Explicit Typing\n\nSome\
    \ Java developers just can’t bear to part with explicit typing, some code analysis\
    \ tools (such as IDEs) need a little extra help from time to time, and sometimes\
    \ you may even manage to confuse the compiler.[⁷](#A978-1-4302-5999-2_2_Chapter.html#Fn7)\
    \ In these cases, you need to provide the compiler with explicit types to help\
    \ it out. When you get to these cases, it is a sign that something is probably\
    \ wrong with your API, and you might be best off fixing whatever ambiguity it\
    \ is that caused the problem. If you really want to specify your types explicitly,\
    \ though, you can do so by using the parenthesized argument list. If you put parentheses\
    \ around your arguments (even if there is only one), then you can add explicit\
    \ types. In Listing 2-15, we see a case that raises some confusion, and how we\
    \ can add explicit types to solve it.\n\n**Listing 2-15.** Using Explicit Typing\
    \ to Resolve Overloaded Method Ambiguity\n\n```\npublic static void main(String[]\
    \ args) {\n  // .toUpperCase() exists in String, but not on CharSequence\n  transform(args[0],\
    \ (String str) -> str.toUpperCase());\n}\n\npublic static String transform(\n\
    \  String str,\n  Function<String, String> transformer\n) {\n  return transformer.apply(str);\n\
    }\n\npublic static CharSequence transform(\n  CharSequence str,\n  Function<CharSequence,\
    \ CharSequence> transformer\n) {\n  return transformer.apply(str);\n}\n```\n\n\
    ### Lambdas as Operators\n\nJava 8 provides a bit of shorthand for the common\
    \ case when the types of the arguments and return values are the same. In this\
    \ case, you can save repeating yourself by using the “operator functional interfaces.”[⁸](#A978-1-4302-5999-2_2_Chapter.html#Fn8)\
    \ There are two of these that work on objects: `BinaryOperator` and `UnaryOperator`.\
    \ `BinaryOperator` is a `BiFunction` whose arguments and return types are all\
    \ the same type; `UnaryOperator` is a `Function` whose arguments and return types\
    \ are all the same type. Aside from the much more succinct type signature, there’s\
    \ no difference between these operators and their corresponding functional interfaces.\
    \ Listing 2-16 demonstrates using the operator types to capture the uppercase\
    \ and string concatenation lambdas that we have seen throughout this chapter.\n\
    \n**Listing 2-16.** Using Operator Types to Capture Familiar Lambdas\n\n```\n\
    UnaryOperator<String> upperCase = str -> str.toUpperCase();\nBinaryOperator<String>\
    \ concat = (left,right) -> left + right;\n```\n\n### Lambdas as Predicates\n\n\
    This book opened up with a story about the usefulness of predicate types. Java\
    \ has implemented predicates as a special case of the `Function` functional interface:\
    \ specifically, one that takes any type and returns a `boolean`. This is an extremely\
    \ common functional type that simply returns `true` or `false` and that is used\
    \ any time your functional program has a conditional branch, a filter, or a guard.\
