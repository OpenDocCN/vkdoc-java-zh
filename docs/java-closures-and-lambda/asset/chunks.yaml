    这段代码实现了与纯面向对象方案相同的功能，但代码量显著减少，处理流程也更加清晰。如果你想在某个环节插入额外的处理（例如将查找文本 ID、行 ID 和单词 ID
    分为不同的步骤），那么插入点显而易见。面向对象与函数式模型的结合使得代码更加简洁、可读性更强。


    这种处理方式的一个更高级、更利于并行的版本，可以将文本生成为一个包含标题、年份以及带有偏移量的行流的对象。然后，该对象可以被映射到文本 ID，其行流可以并行映射为行
    ID、单词 ID，最后存入数据库。这将是一个两阶段的方法：第一阶段将选集中的行解析为这些文本对象的流，第二阶段则处理每个文本对象及其行流。如果需要，这将是该方法的自然演进。


    后函数式方法有两个主要缺点，它们都源于你必须以类型、类型之间的映射以及像`.map`和`.filter`这样的钩子函数来思考。第一个困难是，这需要更抽象、更高阶的思维方式，因此你会花更多时间在纸上涂涂画画，而不是编写代码。有些开发者对此感到非常不适，因为他们只想以思维的速度持续产出代码。这种方法的另一个困难在于，当解决方案不适合逐元素处理时，例如我们关于年份指示标题的规则。在这种情况下，我们被迫顺序执行，并且必须处理可变状态，这重新引入了面向对象代码中一些固有的问题。

