    `}`

    `);`

    `}`


    ### Map 计算


    `Map` 类本身已通过一些函数式风格的操作进行了扩展，使您能够处理特定的键。这些方法并非直接受函数式编程技术启发，而是作为常见代码（如下所示）的简写形式：


    `// 默认值`

    `String value = map.get(key);`

    `if(value == null) {`

    `value = computeValue(key);`

    `map.put(key, value);`

    `}`

    `// 递增值`

    `Integer value = map.get(key);`

    `if(value != null) {`

    `value += 1;`

    `map.put(key, value);`

    `}`


    这段代码实际上用了四行来完成一个逻辑：获取键对应的值，如果缺失则设置该值。除了冗长之外，这段代码也不清晰；在 `get` 之后，`value` 是否仍处于生成过程中并不明确。更甚的是，这段代码效率低下：它先执行
    get 再执行 put，需要对键进行重复查找。


    相反，`Map` 类现在为您提供了一种方式，可以在单个方法调用中访问映射并实现这种特殊处理，这确保了返回的值在您接收时已完全配置好，并为您节省了重复查找的开销。这是一个完美的例子，展示了
    lambda 如何让开发者编写出更高效、更具表现力且更安全的代码——所有这些优点集于一身。


    我遇到的最常见用例是默认值。例如，让我们创建一个方法，该方法将获取精选图书消息，如果未设置则提供默认值。我们将沿用清单 3-7 中创建的相同默认消息，但在键查找时提供默认值。我们将使用
    `computeIfAbsent` 方法来实现这一点，这是计算默认值的简便方法。请注意，`computeIfAbsent` 方法也是实现多值映射或规范化映射的便捷方式，这些只是默认值的特殊情况。


    `map.computeIfAbsent(key, k -> new HashMap<>()); // 多值映射`

    `map.computeIfAbsent(key, Function.identity());  // 规范化映射`


    清单 3-7\. 使用 `Map.computeIfAbsent` 提供精选图书消息的库实例方法


    `/**`

    `* 为给定的图书提供精选图书消息。如果该图书之前不是精选图书，`

