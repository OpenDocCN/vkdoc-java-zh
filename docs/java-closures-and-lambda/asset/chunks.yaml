    ## 函数式迭代


    后函数式语言社区引以为傲的标志之一，就是没人再使用 `for` 循环了。摒弃 `for` 关键字已成为代码的最低可接受标准，并以正义的热忱加以执行。取而代之的是，这些语言提供了迭代器方法。Java
    8 通过 `forEach` 和 `forEachRemaining` 方法，加入了这些后函数式语言的行列。


    `Iterable` 接口现在提供了一个 `forEach` 方法。有些 Java 开发者仍然不知道 `Iterable` 接口，它是在 Java 5 中引入的。它是所有能够提供
    `Iterator` 的 Java SDK 类的基类，也是支持 Java 5 中引入的增强型 `for` 循环的类。由于新的 `forEach` 方法位于这个广泛实现的接口上，因此所有实现该接口的类现在也都拥有了
    `forEach` 方法。


    从语义上讲，`forEach` 方法与 `for` 循环是相同的：它接受一个 `Consumer`，并针对循环中的每个元素执行它。然而，在实践中，它是一个“由内向外”的
    `for` 循环。`forEach` 方法不是创建一个遍历集合并为每次迭代执行一系列步骤的结构，而是将一系列步骤提供给集合，然后集合按顺序将其应用于每个元素。这使得集合实现能够以最高效的方式执行迭代。更棒的是，代码更加简洁易读，如清单
    3-2 所示。


    **清单 3-2. 使用增强型 for 循环和 forEach 打印每本书**


    `for (Book book : library.getBooks()) {`


    `System.out.println(book);`


    `}`


    `library.getBooks().forEach(System.out::println);`


    不过，如果你有一些遗留代码，其中提供了一个 `Iterator`，你仍然可以使用函数式替代方案来替代循环。在这种情况下，方法是 `forEachRemaining`，它将
    lambda 应用于迭代器中所有剩余的元素，并在过程中耗尽迭代器。


    对于 `Map.forEach` 来说，情况略有不同。从历史上看，Java 希望你将其视为提供对 `Map.Entry` 对象集合的访问。随着 Java 8
    lambda 的出现，它们正在打破这种模式：`Map.forEach` 方法不接受 `Map.Entry` 对象的 `Consumer`，而是接受键值对的
    `BiConsumer`。一方面，这使得内联实现看起来相当不错，例如清单 3-3 所示：不再需要调用 `entry.getKey()` 和 `entry.getValue()`。另一方面，`BiConsumer`
    是一种特殊的函数式类型，很少有 lambda 操作或现有的方法定义能很好地与之配合。


    **清单 3-3. 使用 Map 版本的 forEach 打印每本精选书籍**


    `library.getFeaturedBooks().forEach(`


    `(book, msg) ->  System.out.println(book + ": " + msg)`


    `);`


    了解了这些方法后，你现在可以编写再也不使用 `for` 循环的 Java 代码，使你的代码符合后函数式程序员的标准。这种对迭代器方法的热情中具有讽刺意味的是，在函数式编程中你几乎从不使用迭代器方法。原因在于返回值：它在
    Java 中是 `void`，在几乎所有语言中同样毫无用处。这意味着它是函数构建的一个硬性障碍：对于函数式程序员来说，从迭代器方法出发无处可去。因此，它的实用性完全依赖于副作用，这与整个函数式编程范式背道而驰。例如，在清单
    3-3 中，函数式程序员会将 `Book` 映射为 `String`，然后将其管道传输到 `String` 连接中，再将结果管道传输到 `System.out.println`。不幸的是，`Consumer`
    类型阻止了这种链式操作，因为它依赖于 `Consumer` 实现的副作用来完成任何有意义的事情。


    这是后函数式语言和函数式语言分歧最大的地方之一。后函数式语言接受副作用作为实现程序员目标的合理方式，而函数式语言则惩罚试图使用副作用进行编码的程序员。虽然后函数式语言为程序员提供了显著更大的灵活性，但它们也使得阅读代码、推理代码或提供其行为保证（例如线程安全）变得更加困难。这是典型的“能力越大，责任越大”的情况。


    对于 Java 8 开发者来说，要吸取的教训是，使用 `forEach`/`forEachRemaining` 方法是可以的。然而，每当你使用这些方法时，请仔细考虑你是否真的想要使用其他某种推导方式。为任务选择正确的方法将提高代码的可读性，赋予运行时和库开发者适当优化它的能力，并锻炼你以更强大的函数式方式进行编程的习惯。


    同样值得注意的是，如果你想操作集合，例如添加或删除成员，这不是正确的方法。尝试在 `forEach` 方法内部修改集合可能会导致 `ConcurrentModificationException`
    异常。由于 `forEach` 的约定只是说可能发生异常，因此可以安全地假设该异常会等到最糟糕的情况下才发生，然后才让你的代码崩溃。如果你想通过传入 lambda
    来操作集合或映射，则必须使用专门的方法。


    ## 使用 Lambda 操作集合和映射


    在数学中，不存在可变性：真永远为真，假永远为假。函数式编程遵循数学的指引，并假定域不能被改变。当你将集合或映射用作 lambda 的域时，结果将是一个新的集合、映射或对象。在本节中，我们将探讨可用的特定类型的操作。

