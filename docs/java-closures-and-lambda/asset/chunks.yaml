    然而，你绝不能假设流中的元素会按顺序处理，也不能假设它们生成后会立即被处理——我们在处理第六个元素（编号 33）之前，已经从流中生成了 182 个元素。如果流中的每个元素大小都是
    1GB，那我们就麻烦了！流的生成速度可能远超处理速度，这些元素会一直缓存在内存中，直到被处理。因此，并行流最好生成非常小的元素（例如索引或文本行），并在流处理过程中将这些小元素构建成更大的元素，这始终是最佳实践。


    另一个需要注意的问题是，你的 Fork/Join 任务将与流操作本身共享公共的 Fork/Join 池。因此，除非你使用 `ForkJoinTask.join()`
    或 `ForkJoinTask.invoke()`，否则绝不能让你的流操作等待 Fork/Join 任务解析——如果任务尚未启动，这两个方法会让当前线程自行处理该任务。任何其他对
    Fork/Join 任务解析的直接或间接依赖，都可能导致死锁。


    然而，如果你能生成小元素流，流操作不会长时间阻塞，并且你对 Fork/Join 任务稍加注意，那么流并行性就是让你的 Java 应用获得显著并发收益的简单方法。你只需指定你想要发生的事情，让运行时为你处理并发管理和优化。所有这些都可以通过可读性强的代码实现，因为
    lambda 表达式使得像传递数据一样传递行为成为可能。


    ## 结论


    我希望你现在能认识到 lambda 表达式和流在简化并发代码方面的强大能力。代码变得非常易读，并且你将执行细节与待完成的工作分离开来。这确实是后函数式代码中最令人印象深刻的部分之一。


    请注意，其他方法仍有其适用的时机和场景。单线程适用于一次性“发射后不管”的钩子，或长时间运行的后台守护任务。当你需要处理各种工作并对线程池有更多控制时，Executor
    非常有用。Fork/Join 框架在处理递归问题时表现出色。但对于连接一系列操作这种非常常见的情况，lambda 表达式和流框架是 Java SDK 中强大且受欢迎的补充。


    # 7. Lambda 表达式与遗留代码


    在本书的这一部分，你已经看到了 lambda 表达式能为你的代码库带来的所有美妙之处。但那些大量的遗留代码呢？有很多代码需要融入这个新的现实，许多 Java
    开发者都致力于那些不得不拖着这些“泥球”前进的项目。Lambda 表达式如何让他们的生活更轻松？


    此外，新的 Java 8 API 令人印象深刻，但 Java SDK 中还有许多 API 尚未为这个勇敢的新 lambda 世界进行更新。你如何利用那些完全不打算支持
    lambda 的 API 来使用 lambda 呢？


    好消息是，Java 语言的开发者们长期以来一直关注这个问题。Java 本质上是一种保守的语言，因此语言开发者不能通过激进的语法更改来破坏任何现有的 Java
    代码。然而，语言开发者可以添加新功能，提供新的能力和新的 API。最重要的是，他们提供了关键功能，将遗留代码桥接到我们的新世界。这些功能，结合一些关键实践，意味着只需少量代码就能获得
    lambda 的所有能力，即使是从那些对 lambda 一无所知的代码中也能做到。


    ## 资源与异常


    Java 中最尴尬的遗留模式是“try-with-resource”模式。在这种模式中，一个有状态对象（通常是 I/O 对象或池）需要从初始状态进入可操作状态，然后才能使用它，并且当用户操作完成后，还需要清理这个有状态对象。这种模式被广泛采用，并且在概念上与面向对象编程配合得很好。然而，这种模式的实现在
    Java 中一直效果不佳，并且该语言从一开始就一直在努力寻找改进的方法。


    最初，这种模式要求你在作用域外声明一个变量，然后进入 try/catch 块。每个资源需要额外的 14 行代码，看起来像这样：


    `InputStream in = null;`


    `try {`


    `in = acquireInputStream();`


    `// 对“in”执行某些操作`


    `} finally {`


    `if (in != null) {`


    `try {`


    `in.close();`


    `} catch (IOException closeException) {`


    `// 现在怎么办？`


    `}`


    `in = null;`


    `}`


    `}`


    这就产生了一个问题：如何处理可能抛出的 `closeException`。如果在使用资源时抛出一个异常，然后在关闭资源时又抛出另一个异常，该怎么办？如果你抛出
    `closeException`，原始异常（可能实际上很有用）就会丢失。通常的解决方案是简单地忽略 `closeException`，通常将其隐藏在一个名为
    `closeQuietly(InputStream in)` 的方法中。这个方法也可以忽略空值。这使得代码显著缩短，并且可读性稍好：


    `InputStream in = null;`


    `try {`


    `in = acquireInputStream();`


    `// 执行某些操作`


    `} finally {`


    `closeQuiety(in);`


    `in = null;`


    `}`


    然而，这段代码存在一些微妙的问题。乍一看，它们可能微不足道，但当它们出现在你的生产代码中时，就绝非小事了。这些微妙问题中最显著的是，这段代码忽略了关闭时发生的任何异常，而正是在关闭时，缓冲流、压缩流和加密流会抛出它们的异常。这段代码会静默地丢弃这些异常，让调用代码（以及调试的开发者）认为一切正常。这种代码模式还会将资源的变量泄漏到周围的作用域中。如果你忘记将资源赋值为
    `null`，就会泄漏对象本身，阻止其及时进行垃圾回收。如果 try 块附带了 catch 子句，资源处理也容易丢失或混淆，并且多个资源需要将这些结构相互嵌套。整个事情仍然显得有些丑陋。


    为了解决这种丑陋，Java 7 引入了“try-with-resources”语法结构。这允许你在 try 块的开头声明资源，并且它会自动关闭资源。你可以将任何实现了
    `java.lang.AutoCloseable` 的对象分配为资源。当 try 块完成时，该资源将自动关闭。如果在关闭时抛出异常，则该异常会向上传播给调用者。如果已经抛出了一个异常，并且在关闭时又抛出了一个额外的异常，那么该额外异常会作为抑制异常附加到第一个异常上：堆栈跟踪会显示原始异常是主要原因，而关闭异常是附加的抑制异常。另一个好处是，你为变量划定了清晰的边界，并且编译器保证在退出块时它们会被关闭。总的来说，这提供了人们所期望的那种异常处理，代码看起来像这样：


    `public void closeQuietlyTryWithResource() {`


    `try(InputStream in = acquireInputStream()) {`


    `// 执行某些操作`


    `} catch(IOException exception) {`


    `// 处理异常，可能包括关闭异常`


    `}`


    `}`

