- fmt: "# The Transparent Optional Trick\n\nThere is one last very useful trick for\
    \ working with legacy code. This trick is a way to deal with null values. When\
    \ Java encounters a null value, it throws the obnoxiously omnipresent `NullPointerException`.\
    \ The message for the `NullPointerException` looks like this:\n\n`Exception in\
    \ thread \"main\" java.lang.NullPointerException`\n\nAs a Java developer with\
    \ practically any experience understands, that is a totally unhelpful message.\
    \ For one thing, it’s not even clear what is null, so it could be anything on\
    \ that line that caused the problem. There is also no state of the application\
    \ that is communicated in that error message. This message is of extremely limited\
    \ utility, and it is part of the reason why null should be driven entirely from\
    \ your codebase as quickly as possible. Now that we have `Optional`, there is\
    \ absolutely no need for null.\n\nOf course, legacy code did not have `Optional`,\
    \ and the legacy developers may not have been so enlightened as we now are. However,\
    \ we can be rid of the null values and provide more useful error messaging at\
    \ the same time in a transparent way. The trick is to use an optional value internally,\
    \ while providing a (mostly) consistent API externally. The requirement for the\
    \ consistent API is that we throw a `NullPointerException` if the value is null,\
    \ which we can do using the `Optional.orElseThrow(Supplier<Exception>)` method.\
    \ Additionally, we provide a way to get the value as an `Optional`, so people\
    \ who really do want to check whether or not the value exists can do so that way.\
    \ The intent would be that the code would eventually migrate over to the accessors\
    \ acting directly on the `Optional` type instead, so we can deprecate the old\
    \ setter. As a syntactic convenience, it is nice to leave a setter that directly\
    \ sets the value via `Optional.ofNullable(Object)`: if you provide that overload\
    \ of the setter, then the caller doesn’t have to do their own wrapping of the\
    \ raw value. An example of this implementation is given in Listing 7-14.\n\n**Listing\
    \ 7-14.** Example of a Bean Migrating Toward Optionals\n\n```\nimport java.util.*;\n\
    \npublic class SomeBean {\n\n    private int id = 0;\n    private Optional<String>\
    \ name = Optional.empty();\n\n    public SomeBean() {\n    }\n\n    public SomeBean(final\
    \ int id, final String name) {\n      this.id = id;\n      this.name = Optional.ofNullable(name);\n\
    \    }\n\n    public int getId() {\n      return id;\n    }\n\n    public void\
    \ setId(final int id) {\n      this.id = id;\n    }\n\n    @Deprecated\n    public\
    \ String getName() {\n      return name.orElseThrow(\n        () -> new NullPointerException(\n\
    \                    \"No name provided for: \" + this.toString()\n          \
    \    )\n      );\n    }\n\n    public Optional<String> getNameOptional() {\n \
    \     return name;\n    }\n\n    public void setName(final String name) {\n  \
    \    this.name = Optional.ofNullable(name);\n    }\n\n    public void setName(final\
    \ Optional<String> name) {\n      this.name = (name == null ? Optional.empty()\
    \ : name);\n    }\n\n    @Override\n    public String toString() {\n      return\
    \ \"SomeBean{\" +\n          \"id=\" + id +\n          \", name=\" + name.orElse(null)\
    \ +\n          '}';\n    }\n\n}\n```\n\n## Developing Backwards\n\nBefore we close\
    \ out this conversation, it is also worth noting that it is often important to\
    \ develop backwards. If you are working on an open source library or are otherwise\
    \ unsure about the skill of the developer reading your code, then you need to\
    \ take special care. Not every Java developer has read this book yet, and so this\
    \ new post-functional programming paradigm can seem very strange to them. For\
    \ instance, this line of code recently came up in a project that I was working\
    \ on:\n\n`(impl == null ? defaultImpl : impl).apply(arg);`\n\nIf you know that\
    \ `impl` and `defaultImpl` are both `Function` values, then it is very easy to\
    \ understand what is going on there. On the other hand, it looks somewhat bizarre.\
    \ It looks even stranger in the middle of a series of stream transformations.\
    \ Even simple `forEach` calls can throw people for a loop sometimes.\n\nGiven\
    \ that, care needs to be taken to be as clear as possible. If you are going to\
    \ work with developers who may not be familiar with post-functional programming,\
    \ be nice to them. Implement interfaces for the arguments where you expect a lambda,\
    \ so that they can pass in interface implementations and have an obvious place\
    \ to look for documentation. Limit the number of lambdas that you take in a method,\
    \ because having too many lambdas results in a maze of callbacks. Generally, be\
    \ very clear that the code you are writing really is clearer and easier for them\
    \ to read. Not only will this reduce the number of questions (and buggy changes!)\
    \ that you are going to get, but it creates an opportunity for those developers\
    \ to learn and move along.\n\n# Lambdas in Java Bytecode\n\nThis chapter is for\
    \ those who want to go deeper and understand how lambdas really work. This is\
    \ your red pill vs. blue pill moment: do you want to live in a world where Java\
    \ has lambdas and they work great and everything is slick and awesome, or do you\
    \ want to see what is really going on beneath the surface and discover the magic\
    \ of the compiler pulls? If you are happy with the lambdas as you know and love\
    \ them, then skip this chapter and enjoy. If you need to know what your code really\
    \ means, then hold on tight: it’s time to go down the rabbit hole.\n\nThe reality\
    \ is that lambdas are an illusion. Java lambdas are entirely a construct of the\
    \ compiler. The compiler converts your Java code with its lambdas into more primitive\
    \ operations within a lower-level language. Understanding that conversion can\
    \ help you understand exactly what is going on, which can be useful in situations\
    \ such as debugging and optimization.\n\nHowever, before we step into this new\
    \ world, there are some necessary caveats. This chapter is written based on Oracle’s\
    \ Java compiler, and specifically version 1.8.0_05. It is entirely possible (although\
    \ extremely unlikely) that Oracle will completely overhaul their lambda implementation\
    \ in a future release, and certainly likely that there will be refinements as\
    \ we go along. Alternative Java compilers might well have very different implementations,\
    \ as well. So if you are following along with your own Java compiler at home,\
    \ and you notice some subtle difference, then that is what happened. Those kinds\
    \ of changes are what you have to expect to see when you look under the hood.\n\
    \nWe also need to be up front that this chapter is not a comprehensive introduction\
    \ to Java compilers and the resulting underlying bytecode language. That language\
    \ has its own semantics, and those semantics are tricky and technical. We will\
    \ just start to get into some of those semantics through the course of this chapter.\
    \ We are staying focused on lambdas and what they do, so anything extraneous to\
    \ lambdas is irrelevant to this excursion.\n\nIf you are still with me after all\
    \ that warning, then you probably know that Java code itself does not compile\
    \ directly to bytes that are executed by the operating system. Instead, the Java\
    \ compiler (henceforth, “javac”) compiles to another intermediate form, which\
    \ is executed by the Java Virtual Machine (henceforth, “JVM”). This intermediate\
    \ form is called the Java bytecode. Bytecode, however, has no concept of lambdas.\
    \ It also has no concept of try-with-resources blocks, enhanced for-loops, or\
    \ many of the other structures within Java. Instead, the compiler converts those\
    \ Java structures into an underlying form in bytecode.\n\nIn this chapter, we\
    \ will see how the compiler converts lambda commands in the Java language into\
    \ structures within the Java bytecode language. We will begin by getting comfortable\
    \ with reading bytecode, and then we will move on to seeing how particular kinds\
    \ of lambda structures are converted into bytecode. But before we get to the lambdas,\
    \ we need to get the basics."
  raw: '## The Transparent Optional Trick


    There is one last very useful trick for working with legacy code. This trick is
    a way to deal with null values. When Java encounters a null value, it throws the
    obnoxiously omnipresent `NullPointerException`. The message for the `NullPointerException`
    looks like this:


    `Exception in thread "main" java.lang.NullPointerException`


    As a Java developer with practically any experience understands, that is a totally
    unhelpful message. For one thing, it’s not even clear what is null, so it could
    be anything on that line that caused the problem. There is also no state of the
    application that is communicated in that error message. This message is of extremely
    limited utility, and it is part of the reason why null should be driven entirely
    from your codebase as quickly as possible. Now that we have `Optional`, there
    is absolutely no need for null.


    Of course, legacy code did not have `Optional`, and the legacy developers may
    not have been so enlightened as we now are. However, we can be rid of the null
    values and provide more useful error messaging at the same time in a transparent
    way. The trick is to use an optional value internally, while providing a (mostly)
    consistent API externally. The requirement for the consistent API is that we throw
    a `NullPointerException` if the value is null, which we can do using the `Optional.orElseThrow(Supplier<Exception>)`
    method. Additionally, we provide a way to get the value as an Optional, so people
    who really do want to check whether or not the value exists can do so that way.
    The intent would be that the code would eventually migrate over to the accessors
    acting directly on the Optional type instead, so we can deprecate the old setter.
    As a syntactic convenience, it is nice to leave a setter that directly sets the
    value via `Optional.ofNullable(Object)`: if you provide that overload of the setter,
    then the caller doesn’t have to do their own wrapping of the raw value. An example
    of this implementation is given in Listing 7-14.


    Listing 7-14\. Example of a Bean Migrating Toward Optionals


    `import java.util.*;`


    `public class SomeBean {`


        `private int id = 0;`


        `private Optional<String> name = Optional.empty();`


        `public SomeBean() {`


        `}`


        `public SomeBean(final int id, final String name) {`


          `this.id = id;`


          `this.name = Optional.ofNullable(name);`


        `}`


        `public int getId() {`


          `return id;`


        `}`


        `public void setId(final int id) {`


          `this.id = id;`


        `}`


        `@Deprecated`


        `public String getName() {`


          `return name.orElseThrow(`


            `() -> new NullPointerException(`


                        `"No name provided for: " + this.toString()`


                  `)`


          `);`


        `}`


        `public Optional<String> getNameOptional() {`


          `return name;`


        `}`


        `public void setName(final String name) {`


          `this.name = Optional.ofNullable(name);`


        `}`


        `public void setName(final Optional<String> name) {`


          `this.name = (name == null ? Optional.empty() : name);`


        `}`


        `@Override`


        `public String toString() {`


          `return "SomeBean{" +`


              `"id=" + id +`


              `", name=" + name.orElse(null) +`


              `''}'';`


        `}`


    `}`


    ## Developing Backwards


    Before we close out this conversation, it is also worth noting that it is often
    important to develop backwards. If you are working on an open source library or
    are otherwise unsure about the skill of the developer reading your code, then
    you need to take special care. Not every Java developer has read this book yet,
    and so this new post-functional programming paradigm can seem very strange to
    them. For instance, this line of code recently came up in a project that I was
    working on:


    `(impl == null ? defaultImpl : impl).apply(arg);`


    If you know that `impl` and `defaultImpl` are both `Function` values, then it
    is very easy to understand what is going on there. On the other hand, it looks
    somewhat bizarre. It looks even stranger in the middle of a series of stream transformations.
    Even simple `forEach` calls can throw people for a loop sometimes.


    Given that, care needs to be taken to be as clear as possible. If you are going
    to work with developers who may not be familiar with post-functional programming,
    be nice to them. Implement interfaces for the arguments where you expect a lambda,
    so that they can pass in interface implementations and have an obvious place to
    look for documentation. Limit the number of lambdas that you take in a method,
    because having too many lambdas results in a maze of callbacks. Generally, be
    very clear that the code you are writing really is clearer and easier for them
    to read. Not only will this reduce the number of questions (and buggy changes!)
    that you are going to get, but it creates an opportunity for those developers
    to learn and move along.


    # 8. Lambdas in Java Bytecode


    This chapter is for those who want to go deeper and understand how lambdas really
    work. This is your red pill vs. blue pill moment: do you want to live in a world
    where Java has lambdas and they work great and everything is slick and awesome,
    or do you want to see what is really going on beneath the surface and discover
    the magic of the compiler pulls? If you are happy with the lambdas as you know
    and love them, then skip this chapter and enjoy. If you need to know what your
    code really means, then hold on tight: it’s time to go down the rabbit hole.


    The reality is that lambdas are an illusion. Java lambdas are entirely a construct
    of the compiler. The compiler converts your Java code with its lambdas into more
    primitive operations within a lower-level language. Understanding that conversion
    can help you understand exactly what is going on, which can be useful in situations
    such as debugging and optimization.


    However, before we step into this new world, there are some necessary caveats.
    This chapter is written based on Oracle’s Java compiler, and specifically version
    1.8.0_05\. It is entirely possible (although extremely unlikely) that Oracle will
    completely overhaul their lambda implementation in a future release, and certainly
    likely that there will be refinements as we go along. Alternative Java compilers
    might well have very different implementations, as well. So if you are following
    along with your own Java compiler at home, and you notice some subtle difference,
    then that is what happened. Those kinds of changes are what you have to expect
    to see when you look under the hood.


    We also need to be up front that this chapter is not a comprehensive introduction
    to Java compilers and the resulting underlying bytecode language. That language
    has its own semantics, and those semantics are tricky and technical. We will just
    start to get into some of those semantics through the course of this chapter.
    We are staying focused on lambdas and what they do, so anything extraneous to
    lambdas is irrelevant to this excursion.


    If you are still with me after all that warning, then you probably know that Java
    code itself does not compile directly to bytes that are executed by the operating
    system. Instead, the Java compiler (henceforth, “javac”) compiles to another intermediate
    form, which is executed by the Java Virtual Machine (henceforth, “JVM”). This
    intermediate form is called the Java bytecode. Bytecode, however, has no concept
    of lambdas. It also has no concept of try-with-resources blocks, enhanced for-loops,
    or many of the other structures within Java. Instead, the compiler converts those
    Java structures into an underlying form in bytecode.


    In this chapter, we will see how the compiler converts lambda commands in the
    Java language into structures within the Java bytecode language. We will begin
    by getting comfortable with reading bytecode, and then we will move on to seeing
    how particular kinds of lambda structures are converted into bytecode. But before
    we get to the lambdas, we need to get the basics.'
