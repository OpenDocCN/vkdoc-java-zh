    ### 映射与过滤流


    创建流之后，你能用它做什么呢？对流操作可分为两类：中间操作和终端操作。中间步骤可以链式组合，而终端步骤则会终止流。流的处理直到遇到终端步骤才会启动，因此在流启动任何重量级活动之前，中间步骤可以链式组合并进行操作。中间步骤有两种基本类型：映射步骤和过滤步骤。


    这里的“映射”一词取其函数式含义：接收输入并产生输出。在这种情况下，映射操作会获取流中的每个元素，对该流应用一个函数（“映射值”），并产生输出。这允许你获取一种类型的流，并生成一个新类型的流：例如，你可以获取一个
    ID 流，并通过数据库调用生成实例化对象的流。回到我们的`Library`示例，我们可以生成图书馆书籍的流，并轻松地将其映射到流派流上。具体代码如下：


    `Stream<Book.Genre> genres =`


    `library.getBooks().parallelStream().map(Book::getGenre);`


    `map`函数假定每个输入元素都会产生一个输出元素。如果每个输入元素可能产生零个或多个输出元素，则应使用`flatMap`函数。`flatMap`函数的工作方式与`map`函数相同，区别在于它产生的不是单个元素，而是一个元素`Stream`。例如，假设你有一个文件名流，并且想要将所有文件的内容连接起来。首先，你可以将字符串映射为`Path`实例，然后使用`Files.lines`方法，该方法接收一个`Path`实例并生成其内容的流。现在你有了一个从流到流之流的映射：这时`flatMap`会为你将其展平。实现此功能的代码如清单
    3-11 所示。由于`Files.lines`方法会抛出受检异常，这段代码稍微复杂了一些，但我们将在第 7 章中讨论如何优化这段代码。


    清单 3-11. 通过 Stream.flatMap 从给定文件名列表创建包含所有文件行的流


    `Function<Path, Stream<String>> readLines = path -> {`


    `try {`


    `return Files.lines(path);`


    `} catch (IOException ioe) {`


    `throw new RuntimeException("Error reading " + path, ioe);`


    `}`


    `};`


    `Stream<String> lines = Stream.of("foo.txt", "bar.txt", "baz.txt")`


    `.map(Paths::get)`


    `.flatMap(readLines);`


    另一种常见的中间步骤是过滤步骤。过滤确保流中的所有元素都满足某个测试条件，这允许你筛除不需要的元素。要进行过滤，你需要将一个`Predicate`传递给`Stream.filter`方法。流中的每个元素都会经过测试。如果测试返回`true`，流会生成该元素；如果测试返回`false`，流会静默丢弃该元素。对于我们的`Library`类，我们可以通过传递`Genre.TECHNICAL::equals`作为过滤谓词，仅获取技术类书籍的流。代码如下：


    `Stream<Book> techBooks =`


    `library.getBooks().parallelStream().filter(Book.Genre.TECHNICAL::equals);`


    请注意，过滤不会改变流的元素类型：我们不对元素本身进行任何转换，只是决定保留还是丢弃每个流元素。这非常有用，因为当你在处理过程中拥有合适的类型时，可以在中间添加过滤器来执行测试。例如，我们可以扩展清单
    3-11 的示例，通过传递一个过滤器，仅读取已存在文件的内容；只有`Files.exists`返回`true`的路径才会被保留。我们在清单 3-12 中实现了这一点。在这里，我们首先创建`Path`实例，然后将这些临时实例传递给`Files.exists`，再将满足条件的`Path`实例传递给我们的
    readLines lambda，以生成`String`实例。我们的输入是`String`实例，输出也是`String`实例，但我们是在仅存在于流内部的`Path`实例上执行处理逻辑。


    清单 3-12. 通过 Stream.filter 从给定文件名列表创建仅包含已存在文件所有行的流


    `Function<Path, Stream<String>> readLines = path -> {`


    `try {`


    `return Files.lines(path);`


    `} catch (IOException ioe) {`


    `throw new RuntimeException("Error reading " + path, ioe);`


    `}`


    `};`


    `Stream<String> lines = Stream.of("foo.txt", "bar.txt", "baz.txt")`


    `.map(Paths::get)`


    `.filter(Files::exists)`


    `.flatMap(readLines);`

    '
- fmt: '### Collecting, Processing, or Reducing Streams


    The mapping and filtering operations that we just discussed are the intermediary
    operations; you can continue to chain them together to your heart’s content. Sooner
    or later, though, you will want to stop massaging your stream and actually do
    something with it. This is where the terminal operations come in. You only get
    one terminal operation per stream, and the stream is actually executed when the
    terminal operation is applied. There are three basic ways to terminate a stream:
    by collecting its elements, by generating side effects based on its elements,
    or by performing a calculation on its elements. These three ways are referred
    to as collection, processing, and reducing, respectively.


    To collect streams, you need to specify what kind of collection you want as a
    result, and how you want to collect the elements. The Java SDK ships with many
    options in the `Collectors` class. This class produces various kinds of `Collector`
    instances. A `Collector` instance is responsible for consuming elements of a stream,
    updating some internal state based on those elements, and generating a result
    at the end. The built-in collectors are truly impressive: you can get the average,
    count the number of elements, get the min or max based on some `Comparator`, group
    elements based on some key (returning a `Map` of `List` instances), concatenate
    the string representation of all the results into a single `String` (optionally
    with some delimiter), and more. In Listing 3-13, we could go from our `Library`
    instance’s books to a `Map` sorting those books by genre. Note that we use the
    `groupingByConcurrent` method in order to maintain the permission to execute in
    parallel. This is one of those moments where comparing the Stream API code to
    more traditional Java code truly exposes the power of functional programming.


    **Listing 3-13.** Grouping Books by Genre Using Streams


    ```

    Map<Book.Genre, List<Book>> booksByGenre =

    library.getBooks().parallelStream()

    .collect(Collectors.groupingByConcurrent(Book::getGenre));

    ```


    Sometimes you do not want to collect together the results, but you just want to
    generate some side effect. The classic example would be printing out the results
    of a stream execution. To do this, you use the `Stream.forEach` method, just as
    you would do on a `Collection`. The one major difference is that the `Stream.forEach`
    method makes no guarantees about the order of execution: a parallel stream may
    well generate results in any order it chooses. If you really want to ensure ordering,
    you need to use the `Stream.forEachOrdered` method. This method provides the same
    functionality as `forEach`, but with the added contract that the elements are
    processed in the order the stream generates them (called “encounter order”). In
    general, if you are reaching for `Stream.forEach` (and especially if you are reaching
    for `Stream.forEachOrdered`), you should take a long breath and reconsider if
    there is a better way for you to be handling the situation, such as a custom `Collector`.
    Programming by side effects is almost never the right answer, and is always a
    long-term hindrance for maintenance.


    The last common terminal operation is called reducing, and it is an initially
    strange maneuver coming from functional programming.[²](#A978-1-4302-5999-2_3_Chapter.html#Fn2)
    The idea is that you pass in some initial value, and a function takes an element
    and returns an element with the same type as the initial value. The result of
    that function is passed along to the next element. The results of these executions
    are daisy-chained until the entire stream is consumed, and then the final result
    is returned. This chained execution is extremely powerful, and once you get the
    knack of it, it becomes easy to implement very complicated operations with very
    simple code. If you wanted to roll your own string concatenation, for instance,
    you could implement your reduction this way:


    ```

    String booksString =

    library.getBooks().parallelStream()

    .map(Book::toString)

    .map(str -> str + "\n")

    .reduce("", String::concat);

    ```


    Conceptually, what this will do is generate a stream of books, convert each book
    to its string representation, append a carriage return to each of those string
    representations, and then reduce that resulting stream. The reduction step will
    start with an empty string and concatenate the results. The first concatenation
    will concatenate the empty string with the first book; the next concatenation
    will take the result from the first and concatenate the second book; the next
    concatenation will take the result from the second and concatenate the third book;
    and it will go on like this until there are no more books, finally returning the
    result.


    This warrants a word to the wise. The `reduce` operation is an extremely powerful
    operation, and it will almost certainly become a Golden Hammer[³](#A978-1-4302-5999-2_3_Chapter.html#Fn3)
    for you at some point; as you become more proficient with it, you will start reaching
    for `reduce` to terminate all your strings. This is not a bad impulse, because
    it shows that you are thinking in a functional way. If, however, you start wanting
    to pass in more state to your reduce operation than simply the previous result,
    then what you really want is a custom `Collector` instance or a wrapped `Collector`
    instance (c.f. `Collectors.collectingAndThen`). Keep this in mind, and you will
    keep your code readable and functional while also producing more reusable code.


    ### Primitive Streams


    Before we leave this introduction to streams, it is important to know that there
    are specific streams for the `int`, `long`, and `double` primitive types. You
    generate these streams by using `Stream` class methods: `mapToInt`/`flatMapToInt`,
    `mapToLong`/`flatMapToLong`, `mapToDouble`/`flatMapToDouble`. As you might expect,
    they provide some performance overhead compared to passing around object wrappers,
    although it’s generally not enough to be significant for application code. More
    importantly, they provide APIs that fit the shape of many existing methods. For
    instance, `IntStream` has a method called `mapToObj` that takes a function that
    maps an `int` to an `Object`. The shape of that function perfectly fits the method
    `List.get(int)`, so you can call `intStream.map(List::get)`.


    ## Lambda’s Domain in Review


    Java 8 provides a new abstraction: you can now abstract away the concept of processing
    a domain. You begin with a stream, and whether that value is coming from a map,
    a collection, or somewhere else, the resulting processing code is exactly the
    same. You can now get away from the logic of iterating over your source, and focus
    on what you want to do with the elements that it provides. As we have seen in
    this chapter, streams are this abstraction. In addition, there are some convenient
    shorthand methods. These shorthand methods are especially useful for converting
    legacy code to a more functional style. In the next chapter, we will look at how
    to handle data sources that are outside of our applications: interacting with
    the outside world makes these functional structures more complicated. This complication
    will actually show the power of functional programming to deal with awkward code
    and let you focus on the attention.


    **Footnotes**


    [1](#A978-1-4302-5999-2_3_Chapter.html#Fn1_source) For information on how to bridge
    back to the `Collection API` from the `Stream API`, see the collecting/reducing
    step description below and the `Collectors` class.


    [2](#A978-1-4302-5999-2_3_Chapter.html#Fn2_source) While talking to functional
    programmers, they may also refer to the reduce operation as inject or fold.


    [3](#A978-1-4302-5999-2_3_Chapter.html#Fn3_source) The term “Golden Hammer” comes
    from the popular quip: “If all you have is a hammer, everything looks like a nail.”
    If you only have a hammer, and you are really excited about having it, then what
    you have is a Golden Hammer.'
