- fmt: "# Java 字节码常量池与方法签名解析\n\n常量池条目中的数字是字节码其余部分引用每个常量的方式。例如，如果你想引用类“`Listing1`”，那么你会引用常量\
    \ `#3`。常量池的大部分是使用 `utf8` 编码的字符串。常量 `#2` 和 `#3` 表示 Java 类名：注意它们实现的类名由字符串常量给出。因此，解读方式是：常量\
    \ `#2` 是名称由常量 `#18` 处的字符串给出的类。方便的是，`javap` 会提供注释来解释对应的值是什么，因此你无需自行完成这项工作。常量 `#17`\
    \ 的类型是 `NameAndType`，它表示方法的名称和签名。与类名类似，特定的名称和类型信息由常量池中的其他字符串表示。在本例中，名称是 `\"<init>\"\
    `，这是构造函数的魔法字节码名称。方法的签名是它不接受任何参数（即空括号 `()`）并返回 `void`（`V`）。常量池中的最后一个常量是方法引用，它将是一个\
    \ `Class` 与一个 `NameAndType` 的组合。该组合将唯一定义要调用的方法。常量 `#1` 的值定义了 `Object` 默认构造函数的方法引用——当我们转到类文件的下一元素时，我们将看到原因。\n\
    \n## 类体与方法声明\n\n类体定义在花括号内，就像在 Java 语言中一样。方法名类似于 Java 声明：在我们的例子中，我们有 `public static\
    \ void main(java.lang.String[]);` 和 `public Listing1();`。字节码中有两个方法，但我们的 Java 代码中只声明了一个方法。第二个方法是什么？答案是\
    \ Java 要求每个类都有一个构造函数。如果你没有构造函数，编译器会为你提供一个：即一个不接受任何参数并允许所有字段值为默认值的默认构造函数。由于我们没有声明构造函数，编译器给了我们一个，这就是\
    \ `\"public Listing1();.\"` 的含义。不过，在查看其实现之前，让我们先看看我们确实声明的方法。我们在 Java 代码中声明的 `main`\
    \ 方法是空的，但字节码中有相当多的内容（第 56–71 行）：\n\n```\npublic static void main(java.lang.String[]);\n\
    descriptor: ([Ljava/lang/String;)V\nflags: ACC_PUBLIC, ACC_STATIC\nLineNumberTable:\n\
    \  line 3: 0\nLocalVariableTable:\n  Start  Length  Slot  Name   Signature\n \
    \     0       1     0  args   [Ljava/lang/String;\nCode:\n  stack=0, locals=1,\
    \ args_size=1\n     0: return\n  LineNumberTable:\n    line 3: 0\n  LocalVariableTable:\n\
    \    Start  Length  Slot  Name   Signature\n        0       1     0  args   [Ljava/lang/String;\n\
    ```\n\n## 方法描述符与签名\n\n在方法声明之后是描述符。这是方法签名的官方字节码声明。声明的参数位于括号内：在本例中，它是一个类型为 `java.lang.String`\
    \ 的数组。字节码中的对象类型由字符“`L`”和字符“`;`”给出。包由正斜杠而不是句点分隔。因此，`java.lang.String` 变为 `Ljava.lang.String;`。数组由左方括号“`[`”指定。由于\
    \ `main` 方法接受一个字符串类型的数组，其参数类型因此是 `([Ljava.lang.String;)`。我们再次看到末尾悬垂的“`V`”表示 `void`\
    \ 返回类型。这给出了整个描述符，即方法的签名。用编程语言行话来说，方法的签名描述了方法的“形状”：签名描述了方法如何作为整体融入程序，就像拼图块的形状决定了该块如何拼入拼图一样。\n\
    \n## 标志与调试表\n\n下一行又是标志。在本例中，它们对应于 Java 中的 `public` 和 `static` 关键字。接下来，我们有一个方法的\
    \ `LineNumberTable`，它在下面的 `Code` 部分中实际上重复了。这个表是调试器知道哪行代码对应什么操作的方式。在本例中，它表示源文件的第\
    \ 3 行是声明方法的位置。在 `LineNumberTable` 之后是 `LocalVariableTable`，它存储局部变量，并且在 `Code`\
    \ 部分中也重复了。我们的 Java 代码没有声明任何局部变量，但字节码中有一个：提示由名称 `args` 给出。方法的参数也算作局部变量：它们恰好是在方法被调用时设置的局部变量。\n\
    \n## Code 部分与栈机制\n\n最后一部分是“`Code`”部分。这是定义方法体的地方。数字是偏移量，它告诉你方法在字节码中的长度。在我们的例子中，该方法唯一要做的事情就是返回，因此索引\
    \ 0 处只有一条指令：`return`。`locals` 值是该方法使用的局部变量数量，`args_size` 是参数的大小。这只剩下 `stack=0`\
    \ 需要解释。\n\nJava 字节码是一种基于栈的语言。存在更复杂的基于栈的语言（例如 Factor），因此不要因为你使用 Java 字节码的经验而对你对所有基于栈的语言的看法产生偏见。尽管如此，Java\
    \ 字节码是基于栈的语言这一事实意味着每条指令都在栈上操作。你在字节码中做的每件事要么是非操作（“`nop`”），要么是将元素推入栈，要么是将元素弹出栈。因此，Java\
    \ 中的每个行为（例如，引用变量）都对应于一系列栈操作（例如，将变量的值推入栈）。可能存在副作用，最显著的是在流程控制中：例如，当你调用一个方法时，你正在从栈中弹出元素以调用该方法，而当方法返回时，它可能会将一个元素推回栈。\n\
    \n在字节码中，每个方法必须声明其特定栈的最大深度。这允许运行时优化栈的分配：它可以在进入方法时一次性分配单个内存块，而不是在元素被推入栈时可能需要分配更多内存。在我们的\
    \ `main` 方法的情况下，我们不需要栈上的任何空间，因为我们只是要返回 `void`。因此，我们的字节码通过设置 `stack=0` 告诉运行时我们需要栈大小为\
    \ 0。这就是我们的 `main` 方法的全部内容。\n\n## 构造函数分析\n\n然而，构造函数（第 37–49 行）稍微复杂一些：\n\n```\n\
    public Listing1();\ndescriptor: ()V\nflags: ACC_PUBLIC\nLineNumberTable:\n  line\
    \ 1: 0\nLocalVariableTable:\n  Start  Length  Slot  Name   Signature\n      0\
    \       5     0  this   LListing1;\nCode:\n  stack=1, locals=1, args_size=1\n\
    \     0: aload_0\n     1: invokespecial #1                  // Method java/lang/Object.\"\
    <init>\":()V\n     4: return\n```\n\n首先要注意的是构造函数不是静态方法：没有设置 `ACC_STATIC` 标志。构造函数是一个实例方法，在类的实例上调用。由于它是实例方法，它可以访问\
    \ `this` 变量，该变量在 `LocalVariableTable` 中声明。其类型是 `LListing1;`——开头的两个“`L`”字符不是笔误。同样，类型名称在“`L`”和“`;`”之间声明，这导致了我们最初的重复。`this`\
    \ 的存在再次给出了我们的值 `locals=1` 和 `args_size=1`，尽管我们在 `descriptor` 中没有声明任何参数。同样有趣的是，Java\
    \ 不希望你将构造函数视为具有返回类型，但就字节码方法描述符而言，构造函数返回 `void`。"
  raw: 'The numbers on the constant pool entries are how the rest of the bytecode
    will refer to each constant. For example, if you wanted to refer to the class
    “Listing1,” then you would refer to constant #3\. Most of the constant pool is
    character strings encoded using utf8\. Constants #2 and #3 represent Java class
    names: note that which class name they implement is given by a string constant.
    So the way you read this is that constant #2 is the class whose name is given
    by the string at constant #18\. Helpfully, javap will provide a comment explaining
    what the corresponding value is, so you don’t have to do that work yourself. Constant
    #17 is of type `NameAndType`, which is the name and shape of the method. Like
    the class names, the particular name and type information is represented by other
    strings in the constant pool. In this case, the name is `"<init>,"` which is the
    magic bytecode name for constructors. The method’s shape is that it takes no arguments
    (that’s the empty parenthesis, `()`) and returns void (`V`). The last constant
    in the pool is a method reference, which is going to be a `Class` combined with
    a `NameAndType`. That combination will uniquely define a method to invoke. The
    value of constant #1 is defining to the `Object` default constructor method reference
    –we will see why when we move to the next element of the classfile.


    The body of the class is defined within brackets, just like in the Java language.
    The method names are similar to the Java declaration: in our case, we have `public
    static void main(java.lang.String[]);` and `public Listing1();`. We have two methods
    in the bytecode, but we only have one method declared in our Java code. What’s
    the second method? The answer is that Java requires each class to have a constructor.
    If you don’t have a constructor, one will be provided to you by the compiler:
    namely, a default constructor that takes no arguments and allows all the field
    values to be the default. Since we did not declare a constructor, the compiler
    gave us one, and that is what `"public Listing1();."` is. Before we look into
    its implementation, though, let’s take a look at the method we did declare. The
    main method that we declared in the Java code was empty, but there is a fair bit
    going on in the bytecode (lines 56–71):


    `public static void main(java.lang.String[]);`


    `descriptor: ([Ljava/lang/String;)V`


    `flags: ACC_PUBLIC, ACC_STATIC`


    `LineNumberTable:`


    `line 3: 0`


    `LocalVariableTable:`


    `Start  Length  Slot  Name   Signature`


    `0       1     0  args   [Ljava/lang/String;`


    `Code:`


    `stack=0, locals=1, args_size=1`


    `0: return`


    `LineNumberTable:`


    `line 3: 0`


    `LocalVariableTable:`


    `Start  Length  Slot  Name   Signature`


    `0       1     0  args   [Ljava/lang/String;`


    After the declaration of the method is the descriptor. This is the official bytecode
    declaration of the shape of the method. The arguments of the declaration are within
    parentheses: in this case, it is an array of type `java.lang.String`. Object types
    in bytecode are given between the character “L” and the character “;”. Packages
    are delimited by forward slashes instead of periods. Therefore, `java.lang.String`
    becomes `Ljava.lang.String;`. Arrays are specified by an open square brace: “[”.
    Since the main method takes a single array of type string, its argument type is
    therefore `([Ljava.lang.String;)`. We again see the “V” dangling at the end to
    represent the void return type. That gives you the whole descriptor, which is
    the signature of the method. In programming language geek parlance, the signature
    of a method describes the method’s “shape”: the signature describes how the method
    can fit into the program as a whole, the same way a shape of a puzzle piece determines
    how the piece fits into the puzzle.


    The next line is again the flags. In this case, they correspond to the `public`
    and `static` keywords in Java. Following that, we have a LineNumberTable for the
    method, which is effectively repeated in the Code section below. This table is
    how debuggers know what line of code corresponds to what operation. In this case,
    it is saying that line 3 of the source file is where the method is declared. After
    the LineNumberTable is the LocalVariableTable, which stores the local variables,
    and which is also repeated in the Code section. Our Java code does not declare
    any local variables, but we have one here in the bytecode: the hint why is given
    by the name, `args`. The arguments for a method also count as local variables:
    they just happen to be local variables that are set when the method is invoked.


    The last section is the “Code” section. This is where the body of the method is
    defined. The numbers are offsets, which tells you how long your method is within
    bytecode. In our case, the only thing that the method is going to do is return,
    so there is only the single instruction at index 0: `return`. The `locals` value
    is the number of local variables used by the method, and the `args_size` is the
    size of the arguments. This just leaves `stack=0` to explain.


    Java bytecode is a stack-based language. There are more sophisticated stack-based
    languages (such as Factor), so do not base your opinion of all stack-based languages
    on your experience with Java bytecode. Nonetheless, the fact that Java bytecode
    is a stack-based language means that each instruction acts on a stack. Everything
    you do in bytecode is either a non-operation (“nop”), pushing elements on a stack,
    or popping elements off. Therefore, every behavior in Java (e.g., referring to
    a variable) corresponds to some sequence of stack operations (e.g., pushing the
    variable’s value onto the stack). There can be side effects, most notably in flow
    control: for instance, when you invoke a method, you are popping elements off
    the stack to invoke the method, and when the method returns, it may push an element
    back onto the stack.


    In bytecode, each method has to declare the maximum depth of its particular stack.
    This allows the runtime to optimize allocation for the stack: it can allocate
    a single block of memory once when it enters the method, instead of potentially
    needing to allocate more when elements are pushed onto the stack. In the case
    of our main method, we do not need any space on the stack since we are simply
    going to return void. Therefore, our bytecode tells the runtime that we need a
    stack size of 0 by setting `stack=0`. And that is it for our main method. The
    constructor (lines 37–49), however, is somewhat more complicated:


    `public Listing1();`


    `descriptor: ()V`


    `flags: ACC_PUBLIC`


    `LineNumberTable:`


    `line 1: 0`


    `LocalVariableTable:`


    `Start  Length  Slot  Name   Signature`


    `0       5     0  this   LListing1;`


    `Code:`


    `stack=1, locals=1, args_size=1`


    `0: aload_0`


    `1: invokespecial #1                  // Method java/lang/Object."<init>":()V`


    `4: return`


    The first thing to note is that the constructor is not a static method: there
    is no `ACC_STATIC` flag set. The constructor is an instance method that is invoked
    on an instance of the class. Since it is an instance method, it has access to
    the variable, which is declared in the `LocalVariableTable`. Its type is `LListing1;`—the
    two “L” characters at the front is not a typo. Again, the type name is declared
    between “L” and “;”, which gives our initial duplication. The existence of `this`
    again gives us our values `locals=1` and `args_size=1`, even though we have no
    arguments declared in our `descriptor`. It is also interesting to note that Java
    does not want you to think of constructors as having a return type, but as far
    as the bytecode method descriptor is concerned, the constructor returns void.'
