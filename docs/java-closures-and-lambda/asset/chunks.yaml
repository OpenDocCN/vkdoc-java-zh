- fmt: '另一方面，如果你希望编写一个执行流程清晰、同时仍能获得面向对象代码主要优势的并发程序，那么后函数式范式就是你所需要的。只要你的应用程序——甚至是你应用程序中的某个片段——具有清晰的流程，并且流程中的步骤之间有明确的映射关系，那么这就是一个极佳的范式。这种情况非常常见，这也是为什么在
    Java 中引入 Lambda 表达式和后函数式编程如此令人兴奋，也正是本书存在的原因。


    ## 其他编程范式


    上述三种范式——命令式、面向对象和后函数式——是 Java 8 良好支持的三种范式。然而，还有许多其他编程范式存在，了解其中一些主流范式非常重要。学习新的范式有助于你以不同的方式思考问题，从而更好地解决问题。更重要的是，了解其他范式能让你与来自不同背景的开发者进行交流，这将帮助你避免智力和职业上的停滞。在程序员职业生涯的几年后，可能会悄然出现一种停滞感：对特定工具集的熟悉和相对满意，会导致一种错误的印象，即这些工具（及其衍生品）定义了整个编程世界。如果你开始有这种想法，以下是一些帮助你摆脱这种陷阱的方法。


    ### 逻辑/数学范式


    大多数对“函数式编程”的引用指的都是这种范式。在这种范式中，程序是一组数学函数，程序员的工作是定义和操作这些函数本身。在应用程序中流动的数据在很大程度上是无关紧要的：函数是基于这些数据的类型和形状来定义的。这些函数如何应用的具体实现细节则留给运行时或编译器处理。我是通过编程语言
    `OCaml` 接触到逻辑/数学范式的，它是元语言（`ML`）的一个衍生品。如果你想看看这种方法在并发方面表现如何，可以了解一下 `JoCaml` 编程语言，它是连接演算（即
    fork/join）与 `OCaml` 的结合。`Haskell` 可能是当前这种范式的典型代表，`Erlang` 也很有说服力。这种范式还包括 `Mathematica`
    和其他“计算机代数系统”，以及 `Coq` 和其他“交互式定理证明器”。


    当输入/输出（I/O）只是工作中的附带部分，并且可以快速抽象掉时，这种范式效果非常好。如果你大部分时间都在处理纯粹在内部定义和操作的数据，那么这种范式能很好地确保代码快速、安全地执行。


    ### 同像性范式


    这被认为是函数式编程的另一种形式，尽管它与逻辑/数学范式非常不同。相反，同像性范式源于可计算性理论的数学基础。（对于数学爱好者来说，同像性编程就是将 Lambda
    演算作为一种编程语言。）在同像性编程语言中，程序会处理自身，对应用程序执行机械归约，直到只剩下答案为止。


    这对人们来说是一个非常难以理解的概念，但很容易看到它的实际应用。要看到它的实际应用，首先假设我定义了这样一个转换：


    `For All x, Replace sq(x) With x*x.`


    请注意，我并没有定义一个函数或任何语义：这不是一个函数的定义。我的意思是，当在程序中遇到一组特定的字符时，我们应该用另一组不同的字符来替换它们。现在，假设我再定义几个转换：


    `For All f x y z, Replace map(f (x y z)) With (f(x) f(y) f(z)).`


    `For All x y z, Replace sum(x y z) With x+y+z.`


    同样，这是一个直接的文本替换规则。当你看到那个奇怪的“`map`”单词后面跟着一些括号时，就用一组特定的字符替换它及其括号。类似地，当你看到那个奇怪的“`sum`”单词后面跟着一些括号时，就用另一组特定的字符替换它及其括号。有了这些，我们就可以有下面这个简单的程序。


    `INITIAL PROGRAM > sum(map(sq (1 2 3)))`


    `REDUCTION 1 > sum(sq(1) sq(2) sq(3))`


    `REDUCTION 2 > sum(1*1 2*2 3*3)`


    `REDUCTION 3 > sum(1   4   9  )`


    `REDUCTION 4 > 1+4+9`


    `REDUCTION 5 > 14`


    这里唯一发生的“执行”是算术运算。其他所有内容都是简单的文本转换。这对你来说可能看起来很奇怪，但这实际上是一种极其强大的编程方式。无可争议的主流同像性编程语言是
    `Lisp`。基于宏的语言，如 `(La)TeX` 和一些预处理器，也属于这种范式。在这些语言中，它们的强大之处在于这些文本转换的灵活性以及重新定义和操作它们的能力。这使得代码非常易于操作：早在
    `Ruby` 提供开放类、`JavaScript` 允许你定义 `undefined` 之前，`Lisp` 和 `(La)TeX` 就已经有了猴子补丁。在同像性程序中，如果你想重新定义或操作任何给定的宏，这都不是什么大问题。这使得同像性编程语言对于构建面向开发者的工具和接口特别有用，因为开发者倾向于进行这类更改，并且愿意承担事情失败时的后果。


    ### 声明式范式


    这种范式经常受到批评，并且常常被忽视，但它也可能是所有编程范式中应用最广泛、使用最多的。当你听到有人说 `HTML` 或 `CSS` “不是真正的编程语言”时，那是因为他们否定了声明式范式。在声明式范式中，程序员只是声明事物的存在，而由程序的消费者来决定如何处理它。用户界面编程语言绝大多数是声明式的，配置文件（例如，`Spring`
    上下文文件）和优秀构建工具的构建脚本也是如此。如果你经历过 21 世纪初面向方面编程（`AOP`）的热潮，那么你可能会认识到面向方面编程是一种声明式编程。Java
    中最近对“可选类型系统”和“注解驱动配置”的兴趣，正是将声明式范式引入 Java 的努力。


    声明式范式适用于任何你只想创建和配置许多组件的情况。这些组件可能是相互关联的，也可能是独立的；无论如何，组件只是被声明为存在。对组件的任何定制或逻辑都应限于配置属性。通常可以在这里或那里偷偷插入一些代码片段，或者使用事件、回调或钩子，但这些是进入其他范式（通常是命令式或响应式范式）的逃生口。'
  raw: 'On the other hand, if you want to write a concurrent program with a clear
    flow of execution that still gets the primary benefits of object-oriented code,
    then the post-functional paradigm is what you want. As long as your application
    – or even your segment of an application – has a clear flow and a clear mapping
    between the steps in the flow, then this is a great paradigm to use. That occurs
    very often, which is why the introduction of lambdas and post-functional programming
    in Java is so exciting. It’s why this book exists.


    ## Other Programming Paradigms


    Those three paradigms – imperative, object-oriented, and post-functional – are
    the three that Java 8 supports nicely. However, there are many other programming
    paradigms out there, and it is important to know about some of the dominant ones.
    Learning new paradigms helps you think about problems in different ways, which
    means that you are better at solving your problems. Even more, however, knowing
    about other paradigms allows you to have conversations with developers coming
    from different contexts, which is how you will avoid intellectual and professional
    stagnation. There is a kind of stagnation that can creep into a programmer’s life
    after a few years: familiarity and relative satisfaction with a particular set
    of tools can lead to the mistaken impression that those tools (and derivations
    from them) define the universe. If you are starting to think that way, here are
    some ways to shake yourself loose of that trap.


    ### Logical/Mathematical


    Most of the references to “functional programming” are referring to this paradigm.
    In this paradigm, the program is a set of mathematical functions, and the programmer’s
    job is to define and manipulate the functions themselves. The data that is moving
    through the application is largely irrelevant: the functions are defined based
    on the types and shapes of that data. The particular implementation details of
    how these functions are applied are left to the runtime or compiler. I was introduced
    to the logical/mathematical paradigm through the programming language OCaml, which
    is a derivative of MetaLanguage (ML). If you want to see how well this approach
    works with concurrency, see the programming language JoCaml, which is the join
    calculus (i.e., fork/join) mixed with OCaml. Haskell is probably the current poster
    child for this paradigm, and there is a strong case to be made for Erlang, too.
    This paradigm also includes Mathematica and other “computer algebra systems,”
    as well as Coq and other “interactive theorem provers.”


    This paradigm works very well when I/O is incidental to the work being done, and
    so it can be quickly abstracted out of existence. If most of your time is spent
    in doing heavy lifting with data defined and manipulated purely internally, then
    this paradigm works very well for ensuring that your code is executed quickly
    and safely.


    ### Homoiconic


    This is considered another form of functional programming, although it is very
    different from the logical/mathematical paradigm. Instead, the homoiconic paradigm
    draws from the mathematics of computability theory. (For the mathematically inclined,
    homoiconic programming is the lambda calculus as a programming language.) In the
    case of a homoiconic programming language, the program processs itself, performing
    mechanical reductions on the application until there is nothing left except the
    answer.


    This is a very strange concept for people to wrap their head around, but it is
    easy to see it in action. To see it in action, start by assuming that I define
    this transformation:


    `For All x, Replace sq(x) With x*x.`


    Note that I am not defining a function or any kind of semantics: this is not a
    definition of a function. I am saying that when a particular set of characters
    is encountered within the program, we should replace them with a different set
    of characters. Now let’s say that I define another couple of transformations:


    `For All f x y z, Replace map(f (x y z)) With (f(x) f(y) f(z)).`


    `For All x y z, Replace sum(x y z) With x+y+z.`


    Again, this is a straight text replacement rule. When you see that funny “`map`”
    word followed by some parenthesis, replace it and its parenthesis with a specific
    set of characters. Similarly, when you see that funny “`sum`” word followed by
    some parenthesis, replace it and its parenthesis with another specific set of
    characters. Given that, we can have this simple program.


    `INITIAL PROGRAM > sum(map(sq (1 2 3)))`


    `REDUCTION 1 > sum(sq(1) sq(2) sq(3))`


    `REDUCTION 2 > sum(1*1 2*2 3*3)`


    `REDUCTION 3 > sum(1   4   9  )`


    `REDUCTION 4 > 1+4+9`


    `REDUCTION 5 > 14`


    The only “execution” happening here are the arithmetic operations. Everything
    else in here is a simple text transformation. It may seem very strange to you,
    but this is actually an incredibly powerful way of doing programming. The undeniably
    dominant homoiconic programming language is Lisp. Macro-based languages such as
    (La)TeX and some pre-processors are also in this paradigm. In these languages,
    their power comes from the flexibility of these text transformations and the ability
    to redefine and manipulate them. This makes code very easy to manipulate: Lisp
    and (La)TeX had monkey-patching long before Ruby provided open classes and JavaScript
    let you define `undefined`. In homoiconic programs, it is no big deal if you want
    to redefine or manipulate any given macro. This makes homoiconic programming languages
    especially useful for building tools and interfaces for developers, who are prone
    to want to make those kinds of changes and are willing to deal with the consequences
    when things fail.


    ### Declarative


    This paradigm gets a lot of flak and is often dismissed, but it is also probably
    the most widely adopted and used programming paradigm of them all. When you hear
    someone say that HTML or CSS “aren’t really programming languages,” it is because
    they are dismissing the declarative paradigm. In the declarative paradigm, the
    programmer simply declares things as existing, and it is up the the consumer of
    the program to figure out what to do with it. UI programming languages are overwhelmingly
    declarative, as are configuration files (e.g., Spring context files), and the
    build scripts for good build tools. If you were around for the Aspect Oriented
    Programming flare-up around the turn of the 21st century, then you probably recognize
    Aspect Oriented Programming as a kind of declarative programming. The more contemporary
    interest in “optional type systems” and “annotation-driven configuration” in Java
    are efforts to draw the declarative paradigm more into Java.


    The declarative paradigm is good for any case where you want to just create and
    configure many components. These components may be interrelated, or may be distinct;
    in any case, the components are simply declared into being. Any customization
    or logic for the components should be limited to configuring attributes. It is
    usually possible to sneak in snippets of code here or there, or to use events,
    callbacks, or hooks, but those are escape hatches into other paradigms, usually
    the imperative or reactive paradigms.'
  trans: '

    另一方面，如果你希望编写一个执行流程清晰、同时仍能获得面向对象代码主要优势的并发程序，那么后函数式范式正是你所需要的。只要你的应用程序——甚至是你负责的应用程序片段——具有清晰的流程，并且流程中的各个步骤之间存在明确的映射关系，那么这就是一个绝佳的范式。这种情况非常常见，这也是为什么在
    Java 中引入 lambda 表达式和后函数式编程如此令人兴奋，也正是本书存在的原因。


    ## 其他编程范式


    上述三种范式——命令式、面向对象和后函数式——是 Java 8 良好支持的三种范式。然而，还有许多其他编程范式存在，了解其中一些主流范式非常重要。学习新的范式有助于你从不同角度思考问题，这意味着你能更好地解决问题。更重要的是，了解其他范式能让你与来自不同背景的开发者进行交流，这将帮助你避免在知识和职业上陷入停滞。在程序员职业生涯的几年后，可能会悄然滋生一种停滞感：对特定工具集的熟悉和相对满意，会导致错误地认为这些工具（及其衍生品）定义了整个世界。如果你开始有这种想法，以下是一些帮助你摆脱这种陷阱的方法。


    ### 逻辑/数学范式


    大多数对“函数式编程”的引用指的都是这种范式。在这种范式中，程序是一组数学函数，程序员的工作是定义和操作这些函数本身。在应用程序中流动的数据在很大程度上是无关紧要的：函数是基于这些数据的类型和形状来定义的。这些函数如何应用的具体实现细节则留给运行时或编译器处理。我是通过编程语言
    OCaml（它是元语言 ML 的一个衍生品）接触到逻辑/数学范式的。如果你想看看这种方法在并发方面表现如何，可以了解一下 JoCaml 语言，它是连接演算（即
    fork/join）与 OCaml 的结合体。Haskell 可能是当前这种范式的典型代表，Erlang 也很有说服力。这种范式还包括 Mathematica
    和其他“计算机代数系统”，以及 Coq 和其他“交互式定理证明器”。


    当输入/输出（I/O）只是工作中的附带部分，并且可以快速抽象掉时，这种范式效果非常好。如果你大部分时间都花在对纯粹内部定义和操作的数据进行繁重处理上，那么这种范式能很好地确保你的代码快速、安全地执行。


    ### 同像性范式


    这被认为是函数式编程的另一种形式，尽管它与逻辑/数学范式截然不同。相反，同像性范式源于可计算性理论的数学基础。（对于数学爱好者来说，同像性编程就是将 lambda
    演算作为一种编程语言。）在同像性编程语言中，程序会处理自身，对应用程序执行机械化的归约，直到只剩下答案为止。


    这是一个让人难以理解的概念，但很容易看到它的实际应用。为了演示，首先假设我定义了这样一个转换规则：


    `对于所有 x，将 sq(x) 替换为 x*x。`


    请注意，我并不是在定义一个函数或任何语义：这不是函数的定义。我是在说，当在程序中遇到一组特定的字符时，我们应该将它们替换为另一组不同的字符。现在，假设我再定义几个转换规则：


    `对于所有 f x y z，将 map(f (x y z)) 替换为 (f(x) f(y) f(z))。`


    `对于所有 x y z，将 sum(x y z) 替换为 x+y+z。`


    再次强调，这是一个直接的文本替换规则。当你看到那个奇怪的“`map`”单词后跟一些括号时，就将其及其括号替换为一组特定的字符。同样，当你看到那个奇怪的“`sum`”单词后跟一些括号时，就将其及其括号替换为另一组特定的字符。基于此，我们可以有下面这个简单的程序。


    `初始程序 > sum(map(sq (1 2 3)))`


    `归约 1 > sum(sq(1) sq(2) sq(3))`


    `归约 2 > sum(1*1 2*2 3*3)`


    `归约 3 > sum(1   4   9  )`


    `归约 4 > 1+4+9`


    `归约 5 > 14`


    这里唯一发生的“执行”是算术运算。其他所有内容都只是简单的文本转换。这对你来说可能看起来很奇怪，但这实际上是一种极其强大的编程方式。无可争议的主流同像性编程语言是
    Lisp。基于宏的语言，如 (La)TeX 和一些预处理器，也属于这种范式。在这些语言中，其力量来源于这些文本转换的灵活性以及重新定义和操作它们的能力。这使得代码非常易于操作：早在
    Ruby 提供开放类、JavaScript 允许你定义 `undefined` 之前，Lisp 和 (La)TeX 就已经有了猴子补丁。在同像性程序中，如果你想重新定义或操作任何给定的宏，这都不是什么大问题。这使得同像性编程语言对于构建面向开发者的工具和接口特别有用，因为开发者倾向于进行这类修改，并且愿意承担失败时的后果。


    ### 声明式范式


    这种范式备受诟病，经常被忽视，但它很可能也是所有编程范式中应用最广泛、使用最多的。当你听到有人说 HTML 或 CSS“不是真正的编程语言”时，那是因为他们忽视了声明式范式。在声明式范式中，程序员只是声明事物的存在，而由程序的消费者来决定如何处理它。UI
    编程语言绝大多数是声明式的，配置文件（例如 Spring 上下文文件）和优秀构建工具的构建脚本也是如此。如果你经历过 21 世纪初面向方面编程（AOP）的热潮，那么你可能会认识到
    AOP 是一种声明式编程。近年来 Java 中对“可选类型系统”和“注解驱动配置”的兴趣，正是将声明式范式引入 Java 的努力。


    声明式范式适用于任何你只想创建和配置许多组件的情况。这些组件可能相互关联，也可能彼此独立；无论如何，组件只是被声明为存在。对组件的任何定制或逻辑都应限于配置属性。通常可以在这里或那里偷偷插入一些代码片段，或者使用事件、回调或钩子，但这些是通往其他范式（通常是命令式或响应式范式）的逃生出口。

