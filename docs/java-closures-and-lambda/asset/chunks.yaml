    method implementation to a lambda. That lambda is passed into the constructor.
    That is the basic pattern for using lambdas to implement abstract methods. You
    may be tempted to accept multiple lambdas into a constructor, and thereby to implement
    more and more abstract elements. Don’t do this for two reasons: first, because
    it encourages people to create ad hoc classes when they should have reusable classes;
    second, because it is hard to read, and Java already has an inline class definition
