- fmt: "# The Maximum Stack Size for Constructors\n\nThe maximum stack size for our\
    \ constructor is 1, and that is because the constructor is going to do something\
    \ interesting. In the Java language, the first line of the constructor may be\
    \ a call to `this()` or `super()` (possibly with arguments). Those calls delegate\
    \ to another constructor. In bytecode, the first line of a constructor must be\
    \ a delegation to another constructor: it is optional in the Java language, but\
    \ required in the bytecode. Our parent class for `Listing1` is the `Object` class,\
    \ so the bytecode delegates our constructor to the `Object` class super constructor.\
    \ The bytecode accomplishes this by loading the `this` local variable and then\
    \ invoking the superclass constructor on it. The command `aload_0` pushes onto\
    \ the stack the local variable at offset 0 in the local variable table: that is\
    \ our `this` variable. At that point, we have a stack whose top element is our\
    \ `this` variable. Constructors are strange kinds of beasts, so you invoke them\
    \ in bytecode by saying `invokespecial`. You need to tell the runtime what constructor\
    \ you are invoking, so you call `invokespecial` with a method reference: in our\
    \ code, the method reference is the `Object` class constructor. With all of that\
    \ accomplished, we `return`. (Remember, a constructor is a void method according\
    \ to bytecode.)\n\nAt this point, I do not expect that you feel like a bytecode\
    \ expert. However, you should no longer be overwhelmed or lost when looking at\
    \ Listing 8-1. You should have a general sense as to how to read a basic class.\
    \ With that skill, we can move into reading the bytecode that backs lambdas.\n\
    \n## Inline Lambda Definitions and Lambda Lifting\n\nThe last kind of lambda that\
    \ you can have is a lambda with an inline definition. We are not talking about\
    \ a reference to an existing method here, but instead defining an entirely new\
    \ unit of functionality right inline. You may consider code like this:\n\n```\n\
    public Supplier<String> getSupplier() {\n    return () -> \"Hello, World!\";\n\
    }\n```\n\nWhat the compiler will do in this case is create a method for you with\
    \ that implementation. That is called a “synthetic method.” This will be a static\
    \ method that takes no arguments and returns the string, “Hello, World!” Once\
    \ that is created, the compiler has now reduced the problem of the inline lambda\
    \ into the static method reference problem that we saw before. It is a quite clever\
    \ solution, and ultimately quite trivial an implementation – which means it is\
    \ boring for us.\n\nThe more interesting case is when you have variables in the\
    \ mix. Let’s create a method that calls an instance method (requiring access to\
    \ `this`) along with a local variable in the scope. After all, these lambdas are\
    \ closures: they enclose their scope. This kind of stuff is their job! How is\
    \ the compiler going to deal with that complexity? The answer is in Listing 8-5.\n\
