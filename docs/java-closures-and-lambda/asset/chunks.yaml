  raw: '### Method Four: Building a Stream from an Iterator


    Although building out a spliterator was very educational, it was also a lot of
    work. If you do not need that level of control, you can build a spliterator from
    an iterator, and then build a stream from there. There are two bridge methods
    that get from an Iterator to a Spliterator: `Spliterators.spliterator (Iterator,
    long, int)` and `Spliterators.spliteratorUnknownSize (Iterator, int)`. The former
    is used when you know the size of the elements that will be iterated over; the
    latter is for when you do not know the size. The former is notably more efficient
    than the latter, so if you can figure out the size ahead of time, definitely use
    it. In both cases, you pass the characteristics of the spliterator as the final
    argument.


    Building an iterator for a ResultSet is notably simpler than building a spliterator.
    Our iterator implementation is therefore a simplification of our spliterator implementation
    in Listing 5-11\. The only catch is that the single tryAdvance method of the Spliterator
    is two distinct methods in the Iterator class: `hasNext()` and then `next()`.
    Because of this, we will need to be able to store some state about whether or
    not there is a next element. This is a ternary variable: it can either be true,
    false, or unknown. This is one of the few legitimate uses of `null`: by using
    the Boolean type, we can get those three states. The implementation of our iterator
    is given in Listing 5-13.


    Listing 5-13\. ResultSetIterator Implementation


    `import java.sql.ResultSet;`


    `import java.sql.SQLException;`


    `import java.util.*;`


    `/**`


    `* An {@link java.util.Iterator} that traverses a {@link java.sql.ResultSet}.`


    `* When the result set is exhausted,`


    `* it will be automatically closed. Implementing classes should extend`


    `* {@link #processRow(java.sql.ResultSet)} to`


    `* specify how to convert a row into a result object.`


    `*/`


    `public abstract class ResultSetIterator<RESULT_T>`


    `implements Iterator<RESULT_T>`


    `{`


    `private final ResultSet resultSet;`


    `private final AutoCloseable[] toClose;`


    `private volatile Boolean hasNext = null;`


    `/**`


    `* Constructor.`


    `*`


    `* @param resultSet The result set to process; may not be {@code null}.`


    `* @param toClose   Optional additional autocloseables (such as`


    `*                  {@link java.sql.Connection}) to close`


    `*                  when the result set is exhausted; may be {@code null}`


    `*                  (equivalent to empty).`


    `*/`


    `public ResultSetIterator(final ResultSet resultSet, final AutoCloseable... toClose)
    {`


    `Objects.requireNonNull(resultSet, "result set");`


    `this.resultSet = resultSet;`


    `if (toClose == null) {`


    `this.toClose = new AutoCloseable[0];`


    `} else {`


    `this.toClose = toClose;`


    `}`


    `}`


    `/**`


    `* Given a {@link java.sql.ResultSet} instance on a current row,`


    `* return a {@code RESULT_T} instance for that row.`


    `* This code should not call {@link java.sql.ResultSet#next()} or`


    `* otherwise mutate the result set: it should`


    `* be treated as read-only.`


    `*`


    `* @param resultSet The result set to load.`


    `* @return The result instance.`


    `* @throws java.sql.SQLException If an error occurs.`


    `*/`


    `protected abstract RESULT_T processRow(ResultSet resultSet)`


    `throws SQLException;`


    `private void doClose() {`


    `try {`


    `if (!resultSet.isClosed()) resultSet.close();`


    `} catch (SQLException ignore) {}`


    `for (int i = 0; i < toClose.length; i++) {`


    `try {`


    `AutoCloseable closeMe = toClose[i];`


    `toClose[i] = null;`


    `if (closeMe != null && closeMe != resultSet) closeMe.close();`


    `} catch (Exception ignore) {}`


    `}`


    `}`


    `/**`


    `* Returns {@code true} if the iteration has more elements.`


    `* (In other words, returns {@code true} if {@link #next} would`


    `* return an element rather than throwing an exception.)`


    `*`


    `* @return {@code true} if the iteration has more elements`


    `*/`


    `@Override`


    `public boolean hasNext() {`


    `try {`


    `if (hasNext == null) {`


    `hasNext = !resultSet.isClosed() && resultSet.next();`


    `}`


    `} catch (SQLException sqle) {`


    `throw new RuntimeException(`


    `"Could not determine if we have a next element", sqle`


    `);`


    `}`


    `if (!hasNext) doClose();`


    `return hasNext;`


    `}`


    `/**`


    `* Returns the next element in the iteration.`


    `*`


    `* @return the next element in the iteration`


    `* @throws java.util.NoSuchElementException if the iteration has no`


    `*                                          more elements`


    `*/`


    `@Override`


    `public RESULT_T next() {`


    `if (!hasNext()) {`


    `throw new NoSuchElementException("No elements remaining");`


    `}`


    `try {`


    `return processRow(resultSet);`


    `} catch (SQLException sqle) {`


    `throw new RuntimeException("Error while processing elements", sqle);`


    `} finally {`


    `hasNext = null;`


    `}`


    `}`


    `}`


    With this iterator, it is now the user’s responsibility to know what characteristics
    to pass in when creating the spliterator. We saw from the last section that we
    can pass in DISTINCT, IMMUTABLE, and NONNULL. Once we create that spliterator,
    we will pass it into the `StreamSupport.stream` just like last time. This code
    is in Listing 5-14.


    Listing 5-14\. Creating a Stream from a ResultSetIterator


    `public static Stream<WordUsage> createStream(`


    `Connection conn, ResultSet resultSet`


    `) throws SQLException {`


    `Iterator<WordUsage> usages =`


    `new ResultSetIterator<WordUsage>(resultSet, conn) {`


    `@Override`


    `protected WordUsage processRow(final ResultSet resultSet)`


    `throws SQLException`


    `{`


    `return WordUsage.fromResultSet(resultSet);`


    `}`


    `};`


    `Spliterator<WordUsage> spliterator =`


    `Spliterators.spliteratorUnknownSize(usages,`


    `Spliterator.NONNULL | Spliterator.DISTINCT | Spliterator.IMMUTABLE`


    `);`


    `Stream<WordUsage> stream = StreamSupport.stream(spliterator, true);`


    `return stream;`


    `}`


    In this case, this final solution is just as fast as the solution before. From
    an API standpoint, we have moved the responsibility for understanding and deciding
    the characteristics to the user, and we have forced him to make the call to `Spliterators.spliteratorUnknownSize`.
    Those are both less than optimal, but they are hardly onerous. Given the situation,
    this is the solution that I would go with in my code. But it won’t work in all
    situations.


    Specifically, you will want to implement your own spliterator if you can be very
    efficient with the splits. If you can split your work load in an intelligent and
    efficient way, then providing your own implementation for `Spliterator.trySplit`
    is a huge win. A `ResultSet` — and any other kind of single-stream processing,
    like any `java.io.Stream` — does not really give you much to work with. But if
    you do encounter a situation where you can be smart about `trySplit`, then certainly
    implement your own `Spliterator`.'
  trans: '

    ### 方法四：从迭代器构建流


    尽管构建一个可拆分迭代器（spliterator）很有教育意义，但工作量也很大。如果你不需要那种程度的控制，你可以从迭代器构建一个可拆分迭代器，然后再从那里构建流。有两个桥接方法可以从迭代器获取可拆分迭代器：`Spliterators.spliterator(Iterator,
    long, int)` 和 `Spliterators.spliteratorUnknownSize(Iterator, int)`。前者在你已知将要迭代的元素数量时使用；后者则在你不知道数量时使用。前者的效率明显高于后者，因此如果你能提前确定数量，请务必使用前者。在这两种情况下，你都需要将可拆分迭代器的特性作为最后一个参数传入。


    为 ResultSet 构建迭代器比构建可拆分迭代器要简单得多。因此，我们的迭代器实现是清单 5-11 中可拆分迭代器实现的一个简化版本。唯一需要注意的是，可拆分迭代器中的单个
    `tryAdvance` 方法在迭代器类中分成了两个不同的方法：`hasNext()` 和 `next()`。因此，我们需要能够存储一些状态，以判断是否还有下一个元素。这是一个三态变量：它可以是
    true、false 或 unknown。这是 `null` 为数不多的合理用途之一：通过使用 Boolean 类型，我们可以获得这三种状态。我们的迭代器实现如清单
    5-13 所示。


    **清单 5-13. ResultSetIterator 实现**


    `import java.sql.ResultSet;`


    `import java.sql.SQLException;`


    `import java.util.*;`


    `/**`


    `* 一个遍历 {@link java.sql.ResultSet} 的 {@link java.util.Iterator}。`


    `* 当结果集耗尽时，`


    `* 它将被自动关闭。实现类应扩展`


    `* {@link #processRow(java.sql.ResultSet)} 以`


    `* 指定如何将一行转换为结果对象。`


    `*/`


    `public abstract class ResultSetIterator<RESULT_T>`


    `implements Iterator<RESULT_T>`


    `{`


    `private final ResultSet resultSet;`


    `private final AutoCloseable[] toClose;`


    `private volatile Boolean hasNext = null;`


    `/**`


    `* 构造函数。`


    `*`


    `* @param resultSet 要处理的结果集；不能为 {@code null}。`


    `* @param toClose   可选的额外自动关闭资源（例如`


    `*                 {@link java.sql.Connection}），在结果集耗尽时关闭；`


    `*                 可以为 {@code null}（等同于空数组）。`


    `*/`


    `public ResultSetIterator(final ResultSet resultSet, final AutoCloseable... toClose)
    {`


    `Objects.requireNonNull(resultSet, "result set");`


    `this.resultSet = resultSet;`


    `if (toClose == null) {`


    `this.toClose = new AutoCloseable[0];`


    `} else {`


    `this.toClose = toClose;`


    `}`


    `}`


    `/**`


    `* 给定一个位于当前行的 {@link java.sql.ResultSet} 实例，`


    `* 返回该行的 {@code RESULT_T} 实例。`


    `* 此代码不应调用 {@link java.sql.ResultSet#next()} 或`


    `* 以其他方式改变结果集：应将其视为只读。`


    `*`


    `* @param resultSet 要加载的结果集。`


    `* @return 结果实例。`


    `* @throws java.sql.SQLException 如果发生错误。`


    `*/`


    `protected abstract RESULT_T processRow(ResultSet resultSet)`


    `throws SQLException;`


    `private void doClose() {`


    `try {`


    `if (!resultSet.isClosed()) resultSet.close();`


    `} catch (SQLException ignore) {}`


    `for (int i = 0; i < toClose.length; i++) {`


    `try {`


    `AutoCloseable closeMe = toClose[i];`


    `toClose[i] = null;`


    `if (closeMe != null && closeMe != resultSet) closeMe.close();`


    `} catch (Exception ignore) {}`


    `}`


    `}`


    `/**`


    `* 如果迭代还有更多元素，则返回 {@code true}。`


    `* （换句话说，如果 {@link #next} 会返回一个元素而不是抛出异常，则返回 {@code true}。）`


    `*`


    `* @return 如果迭代还有更多元素，则返回 {@code true}。`


    `*/`


    `@Override`


    `public boolean hasNext() {`


    `try {`


    `if (hasNext == null) {`


    `hasNext = !resultSet.isClosed() && resultSet.next();`


    `}`


    `} catch (SQLException sqle) {`


    `throw new RuntimeException(`


    `"无法确定是否还有下一个元素", sqle`


    `);`


    `}`


    `if (!hasNext) doClose();`


    `return hasNext;`


    `}`


    `/**`


    `* 返回迭代中的下一个元素。`


    `*`


    `* @return 迭代中的下一个元素`


    `* @throws java.util.NoSuchElementException 如果迭代没有更多元素`


    `*/`


    `@Override`


    `public RESULT_T next() {`


    `if (!hasNext()) {`


    `throw new NoSuchElementException("没有剩余元素");`


    `}`


    `try {`


    `return processRow(resultSet);`


    `} catch (SQLException sqle) {`


    `throw new RuntimeException("处理元素时出错", sqle);`


    `} finally {`


    `hasNext = null;`


    `}`


    `}`


    `}`


    有了这个迭代器，现在用户需要负责在创建可拆分迭代器时知道要传入哪些特性。我们从上一节看到，可以传入 `DISTINCT`、`IMMUTABLE` 和 `NONNULL`。一旦创建了可拆分迭代器，我们将像上次一样将其传入
    `StreamSupport.stream`。此代码见清单 5-14。


    **清单 5-14. 从 ResultSetIterator 创建流**


    `public static Stream<WordUsage> createStream(`


    `Connection conn, ResultSet resultSet`


    `) throws SQLException {`


    `Iterator<WordUsage> usages =`


    `new ResultSetIterator<WordUsage>(resultSet, conn) {`


    `@Override`


    `protected WordUsage processRow(final ResultSet resultSet)`


    `throws SQLException`


    `{`


