    ### 默认方法


    内联定义接口的能力使得接口更加简洁易用。然而，Java 8 通过允许接口为其方法定义默认实现，进一步简化了操作。这开始严重模糊接口与抽象类之间的界限：例如，`java.util.AbstractCollection`
    抽象类现在可以纯粹作为接口来实现。


    举个例子，我们可以通过提供一个 lambda 来内联定义一个 `Iterator` 类型。该 lambda 负责提供“下一个元素”，或许还会消费该元素。当所有元素都被消费完时，会使用一个特殊值来发出信号。用户只需提供这个
    lambda；所有其他的 `Iterator` 方法都作为默认方法提供。该类的代码如清单 2-24 所示。从中可以看到，默认方法使用 `default` 关键字提供。与接口的任何其他成员一样，所有默认方法都是
    `public` 的。并且与接口的任何其他成员一样，如果你愿意，可以指定 `public`，尽管这是多余的，这样做也没有任何效果。


    默认方法是 Java 生态系统的一个重大变化，看起来你似乎再也不会使用抽象类了。然而，默认方法也有一些注意事项。首先，无法继承默认方法的实现：如果你重写了该方法，就必须自己实现它。（不过，请参阅下一节了解可能的变通方法。）其次，如果一个类有两个接口提供了冲突的默认方法，你将不得不重写该方法并自己实现。


    默认方法在 Java 8 代码中扮演着重要角色，并且已经被改造并应用于许多标准 Java 接口。在后续章节中讨论这些领域时，我们将探讨它们出现在哪里。


    **清单 2-24. FunIterator 类，演示默认方法**


    `/**`


    `* 一个 {@link java.util.Iterator} 的实现，可以作为 lambda 实现。`


    `* 你也可以使用此类作为实现 {@code Iterator} 的更简单方式。`


    `* <p>`


    `* 此接口默认不支持 {@link #remove()}。`


    `*/`


    `public interface FunIterator<E> extends Iterator<E> {`


      `/**`


       `* 提供下一个元素，并可选择消费它。这是要作为 lambda 实现的抽象方法。`


       `* 如果传入 {@code false} 作为参数，此方法应始终返回相同的值，并且永远不应耗尽迭代器。如果`


       `* 传入 {@code true} 作为参数，迭代器应在返回值后前进到下一个元素。在任何时候，如果没有更多元素，`


       `* 迭代器应返回 {@link java.util.Optional#empty()}。此方法绝不应抛出异常或返回 {@code null}。`


       `*`


       `* @param consume  元素返回后是否应被消费。`


       `* @return 如果没有其他元素，则返回 {@link java.util.Optional#empty()}；`


       `*         否则，返回包含下一个元素的 {@link java.util.Optional}。绝不为 {@code null}。`


       `*/`


      `Optional<E> nextElement(boolean consume);`


      `@Override`


      `default boolean hasNext() {`


        `return nextElement(false).isPresent();`


      `}`


      `@Override`


      `default E next() {`


        `return nextElement(true).orElseThrow(`


          `() -> new NoSuchElementException("迭代器已耗尽")`


        `);`


      `}`


    `}`


    ### 静态方法


    这与 lambda 没有直接关系，但现在是提及它的好时机：从 Java 8 开始，接口现在也可以提供静态方法，就像任何具体类或抽象类可以提供静态方法一样。如果你想向外部世界提供默认方法实现，可以使用静态方法来实现：只需让默认方法调用该静态方法即可。


    既然接口可以有静态方法，一些 Java 接口已经被扩展以提供实用方法。在我看来，最值得注意的是 `Comparator`，它已经获得了大量的实用方法。例如，在清单
    2-25 中，我们定义了一个 `Comparator`，它将 null 的 `File` 实例放在最后，并按文件名对其余部分进行排序。通过允许静态方法，Java
    8 已经使“工具类”约定过时了，在该约定中，接口 `Foo` 会有一个工具类 `Foos` 或 `FooUtils`。现在这些实用方法直接驻留在接口本身上。


    **清单 2-25. 使用 Comparator 静态方法生成一个 Comparator**


    `Comparator<File> fileComparator =`


        `Comparator.nullsLast(`


          `Comparator.comparing(File::getName)`


        `);`


    ## 函数式接口辅助方法


    函数式接口本身带有许多静态方法和默认方法，以帮助你构建所需的函数。在本节中，我们将研究这些方法，并了解何时以及为何要使用它们。


    ### Function.identity() 和 UnaryOperator.identity()


    最容易理解的可能是 `Function.identity()`。它提供了一个简单地返回其参数的函数。在测试中，当你想要测试一个接受函数并对其执行操作的东西时，它非常有用。它也可以作为一个占位函数：假设你有五种类型，对于其中四种，你想要执行某种转换；对于第五种，你不想执行转换。在这种情况下，你可以通过使用此方法来维护代码库的对称性，并避免使用
    `null`（以及 `NullPointerException`）。¹⁰ 此方法也可在 `UnaryOperator` 类型下使用，这样你可以继续使用该 `Function`
    子类并节省一些输入。


    ### Function.compose 和 Function.andThen


    这两个默认方法提供了在给定函数之前和之后添加功能的能力。这些方法允许你以一种相当流畅的 API 创建管道效果，并且对于将函数的类型转换为你想要的类型特别有用；你可以内联地在函数前后添加转换函数。


    如果你想更改结果类型，请使用 `andThen`。给定函数 `X->Y`，`andThen` 允许你通过指定一个接受结果 `Y` 并生成 `Z` 的函数来创建
    `X->Z`。参数 `X` 将被输入到实例函数，然后实例函数的结果 `Y` 被输入到参数函数。例如，考虑这一系列方法调用：


    `Function<Integer,String> f = Integer::toString;`


    `f = f.andThen("10"::concat).andThen(Integer::parseInt);`


    这将创建一个函数，该函数将一个 `int` 转换为一个 `String`，然后在其前面加上“10”，然后将该值解析回一个 `int`。最初是 `int->String`
    类型，现在变成了 `int(->String->String)->int`，在 Java 类型中返回为 `int->int`。


    如果你想更改参数类型，请使用 `compose`。这个方法本应叫做 `butFirst`，因为它的工作方式与 `andThen` 类似，但作用于前端而不是后端。给定函数
    `X->Y`，`butFirst` 允许你通过指定一个接受某个 `W` 并生成 `X` 的函数来创建 `W->Y`。指定函数的结果作为参数输入到实例函数。我们可以通过以下方式“反向”指定前面的示例：


    `Function<String,Integer> f = Integer::parseInt;`


    `f = f.compose("10"::concat).compose(Integer::toString);`

    '
- fmt: '### `Consumer.andThen`


    Java SDK 没有提供`Consumer.compose`来修改接受的类型，[^(11)](#A978-1-4302-5999-2_2_Chapter.html#Fn11)
    但提供了`Consumer.andThen`。由于消费者接受参数但不产生结果，`andThen`所做的只是添加额外的处理：给定两个相同类型的消费者，它提供一个同时执行这两个消费者的单一消费者。这让你可以在处理流的末尾添加额外的处理。它对于向消费者中添加日志记录或其他通知特别有用。


    ### `Predicate.and`和`Predicate.or`


    谓词负责提供布尔检查，而这些通常是复合类型的结构。尽管我们在本书开头讨论了一个简单案例（“非空”谓词），但你很少能幸运地拥有简单的谓词逻辑。通常，你会遇到复杂的逻辑链。事实上，使用`Predicate`类的主要优势之一就是可以在高层构建这个复杂的链，然后在后续对对象执行它。要连接两个谓词，你需要决定是使用`&&`风格的连接还是`||`风格的连接。前者由`Predicate.and`处理，后者由`Predicate.or`处理。


    在这两种情况下，谓词都是短路求值的：如果我们已经知道答案，则不会执行谓词。如果你有`foo.and(bar).test(baz)`，并且`foo.test(bar)`求值为`false`，那么`bar.test(baz)`永远不会被执行。类似地，如果你有`foo.or(bar).test(baz)`，并且`foo.test(bar)`求值为`true`，那么`bar.test(baz)`永远不会被执行。这正是
    Java 对其布尔运算符的处理方式。


    ### `Predicate.isEqual`


    如果你有某个特定的值，并且想要一个测试来判断其他值是否与之相等，那么请使用`Predicate.isEqual`。它使用 Java 自身的`Objects.equals(left,
    right)`方法，该方法首先执行`null`检查，然后返回`left.equals(right)`，因此`Predicate.isEqual`可以安全地与`null`一起使用。


    ### `Predicate.negate`


    如果你想要给定谓词的逻辑否定，可以使用`Predicate.negate`来获取。将`Predicate.negate`与`Predicate.isEqual`结合使用，就得到了[第1章](#A978-1-4302-5999-2_1_Chapter.html)开头提到的非空检查：`Predicate.isEqual(null).negate()`。


    ### `BinaryOperator.minBy`和`BinaryOperator.maxBy`


    这是两个非常有用的方法，但很多人没有意识到它们的存在，因为这些方法隐藏在函数式接口类型中。这两个方法都提供了一个`BinaryOperator`，它是一个`BiFunction`，其参数和返回值类型都相同。由于`BinaryOperator`扩展了`BiFunction`，只要你的`BiFunction`类型签名匹配，你就可以传入这些`BinaryOperator`。所提供的`BinaryOperator`接受两个相同类型的参数，并返回最大（`maxBy`）或最小（`minBy`）的参数。


    这看起来可能没什么大不了的，但实际上非常重要。在下一章中，我们将看到这如何与对象集合和流一起工作，以及这些方法如何自然地融入其中。更棒的是，由于这两个方法都接受一个`Comparator`作为参数，我们可以利用`Comparator`上提供的所有有用的实用方法，这些也将在下一章中介绍。


    明显的用例是在众多元素中找出最小和最大的元素。然而，你可以使用那个`Comparator`来挑选出最接近你想要的值的元素。你也可以使用`Comparator`来提供一个评分算法，然后使用这个`BinaryOperator`来获取得分最高或最低的元素。任何时候，只要你有一个合适的排序或“与目标的距离”的概念，`BinaryOperator.minBy`和`BinaryOperator.maxBy`很可能都会帮到你。


    ## Lambda 最佳实践


    当人们刚开始学习面向对象编程时，往往倾向于过度使用继承。这个语言特性太酷了，以至于你最终会构建出层层叠叠的继承结构，导致代码变得极其难以理解和维护。Lambda
    表达式也会发生类似的情况。现在，你对 lambda 的了解已经足以让你“玩火”，你可能会过于兴奋地应用这些新知识，到处使用函数式接口。这种热情是好的，但在你出去将所有代码都
    lambda 化之前，请允许我给你一些忠告。


    ### 使用接口


    一个过于热心的函数式程序员最常犯的错误是在类型签名中直接使用函数式接口。通常，你应该避免直接使用函数式接口类型，而是为你的方法提供单方法接口作为参数。这些接口成为创建自文档化代码和提供有意义的类型信息的一种方式，同时也为用户提供了提供实际
    Java 类型的机会。如果他们想使用 lambda 和方法引用来实现你的接口，他们仍然可以这样做，但不要强迫他们。


    考虑这两个方法签名：`processFile(LineHandler handler)`和`processFile(Consumer<String> handler)`。在后一种情况下，`String`提供了什么，或者消费者预期要做什么，并不明显。更重要的是，如果你以后想提供一个`processFile(FileHandler
    handler)`方法，你可以做到，而在另一种情况下，你会遇到类型冲突。


    ### 内联定义 Lambda


    当你使用 lambda 时，请内联定义它们。除非你对 lambda 进行某种花哨的操作，否则没有理由将它们赋值给变量。你想要内联定义 lambda 的原因是，它能让你的代码在类型变化时更加灵活：你让类型推断为你承担更多繁重的工作，并使你的代码适应不断变化的上下文。如果你开始将
    lambda 赋值给变量，你就必须开始显式指定类型，这会不必要地固化你的类型。


    ### Lambda 应始终是线程安全的


    在本书的后续内容中，我们将看到许多 lambda 使并发编程变得更加容易的地方。许多基于 lambda 构建的结构会执行并发操作，有时甚至没有太多警告。因此，你的
    lambda 始终需要是线程安全的。请特别注意实例方法句柄，因为线程危险的状态通常隐藏在这些实例中。


    ### 不要使用 `null`


    `null`关键字永远不应该在你的代码中使用。既然 Java 有了`Optional`类型，就完全没有必要使用它了。每当你有一个方法时，你应该明确是否接受`null`，并且通常不应该接受它。这将使你免于`NullPointerException`在令人讨厌的地方突然出现，远离实际错误发生的位置。当你开始使用流和
    lambda 时，这是一个特别痛苦的问题，因为当你去调试时，堆栈跟踪可能对你没什么用。解决方案是永远不接受`null`，并积极检查它，一旦出现就立即大声报错。一些开发者担心这会增加代码开销并影响性能，但这种担忧是过早优化的极致表现。一方面，不防范`null`可能导致代码严重崩溃，因此确保正确性很重要：我可以无限快地给你错误的答案。同时，添加这些防护措施将从你的代码中移除大量`null`，因此这些`null`检查将成为冷分支，Java
    高度优化的运行时将使它们几乎零成本。因此，这些空检查既价值高又成本低。'
  raw: '### Consumer.andThen


    The Java SDK does not provide a `Consumer.compose` to modify the accepted type,[^(11)](#A978-1-4302-5999-2_2_Chapter.html#Fn11)
    but there is a `Consumer.andThen`. Since the consumer takes in an argument but
    produces no result, all that `andThen` does is add additional processing; given
    two consumers of the same type, it provides a single consumer that executes both
    the given consumers. This lets you add additional processing to the end of your
    stream of processing. It is particularly useful for adding logging or other notifications
    into your consumer.


    ### Predicate.and and Predicate.or


    Predicates are responsible for supplying Boolean checks, and those are usually
    composite kinds of structures. Although we opened the book talking about a simple
    case (a “not null” predicate), you are rarely so lucky as to have a simple predicate
    logic. Usually, you have complex chains of logic. In fact, one of the major advantages
    of using the `predicate` class is that you can construct this complex chain at
    a high level, and then execute it upon objects later. To join two predicates,
    you have to decide if you are joining them using an `&&`-style join or a `||`-style
    join. The former case is handled by `Predicate.` and the latter case by `Predicate.or`.


    In both these cases, the predicate is short circuiting: a predicate won’t be executed
    if we already know the answer. If you have `foo.and(bar).test(baz)`, and `foo.test(bar)`
    evaluates to `false`, then `bar.test(baz)` is never executed. Similarly, if you
    have `foo.or(bar).test(baz)`, and `foo.test(bar)` evaluates to `true`, then `bar.test(baz)`
    is never executed. This is exactly how Java works with its Boolean operators.


    ### Predicate.isEqual


    If you have some specific value, and you want a test that will tell you if other
    values are equivalent to it, then use `Predicate.isEqual`. It uses Java’s own
    `Objects.equals(left,right)` method, which first performs `null` checks and then
    returns `left.equals(right)`, and so `Predicate.isEqual` can safely be used with
    `null`.


    ### Predicate.negate


    If you want the logical opposite of a given predicate, you can use `Predicate.negate`
    to get one. Combining `Predicate.negate` with `Predicate.isEqual` gives you the
    not-null check that started off [Chapter 1](#A978-1-4302-5999-2_1_Chapter.html):
    `Predicate.isEqual(null).negate()`.


    ### BinaryOperator.minBy and BinaryOperator.maxBy


    These are two very useful methods, but many people do not realize they are there,
    since these methods are hidden out of the way among the functional interface types.
    Both of these methods provide a `BinaryOperator`, which is a `BiFunction` whose
    arguments and return value are all the same. Since `BinaryOperator` extends `BiFunction`,
    you can pass in these `BinaryOperators` any time your `BiFunction` type signature
    matches. The `BinaryOperator` that is supplied takes in two arguments of the same
    type, and returns the argument that is largest (`maxBy`) or smallest (`minBy`).


    This may not seem like a big deal, but it very much is. In the next chapter, we
    will see how this works with collections and streams of objects, and how these
    methods fit naturally in. Even better, since these methods both take a `Comparator`
    as an argument, we can hook into all the useful utility methods provided on `Comparator`,
    which will also be covered in the next chapter.


    The obvious use case is finding the smallest and largest element among many. However,
    you can use that `Comparator` to pick out the element that is closest to the value
    you want. You can also use the `Comparator` to provide a scoring algorithm, and
    then use this `BinaryOperator` to grab elements with the largest or smallest score.
    Any time that you have a proper ordering or a concept of “distance from a target,”
    `BinaryOperator.minBy` and `BinaryOperator.maxBy` will probably help you out.


    ## Lambda Best Practices


    When people are first picking up object-oriented programming, there is a tendency
    to go nuts with inheritance. The language feature is so cool that you end up with
    layers upon layers of inheritance, and as a result, code becomes extremely difficult
    to follow and maintain. A similar thing happens with lambdas. At this point, you
    know enough about lambdas to be dangerous, and you will probably be overexcited
    to apply this newfound knowledge and use functional interfaces everywhere. That
    enthusiasm is great, but before you go out and lamdify all your code, let me give
    you some words of caution.


    ### Use Interfaces


    The most common misstep taken by an over-eager functional programmer is the use
    of functional interfaces in type signatures. In general, you should avoid using
    the functional interface types directly and instead provide single-method interfaces
    as arguments to your methods. These interfaces become a way to create self-documenting
    code and to provide meaningful type information, as well as leaving open the opportunity
    for your user to provide an actual Java type. If they want to implement your interface
    using lambdas and method references, they can still do that, but don’t force them
    to.


    Consider the two method signatures: `processFile(LineHandler handler)` and `processFile(Consumer<String>
    handler)`. In the latter case, it’s not obvious what the `String` provides, or
    what the consumer is expected to do. Even more than that, though, if you later
    want to provide a `processFile(FileHandler handler)` method, then you can, whereas
    you would end up with conflicting types in the other case.


    ### Define Lambdas Inline


    When you do use lambdas, define them inline. Unless you are doing some kind of
    fancy manipulation of your lambda, there is no reason to be assigning them to
    a variable. The reason that you want to define your lambdas inline is that it
    will allow your code to be more flexible when types change: you are letting type
    inference do more heavy lifting for you, and adapting your code to changing contexts.
    If you start assigning your lambdas to variables, you will have to start being
    explicit with types, and that is needlessly solidifying your types.


    ### Lambdas Should Always Be Threadsafe


    As we go through the rest of this book, we will see many places where lambdas
    make concurrent programming much easier. Many of the structures built off of lambdas
    will perform concurrent executions, sometimes without much warning. Because of
    this, your lambdas always need to be threadsafe. Pay particular attention to this
    with instance method handles, since thread-dangerous state can often be hiding
    within those instances.


    ### Don’t Use Null


    The `null` keyword should never be used in your code. Now that Java has the `Optional`
    type, there is simply no need for it. Whenever you have a method, you should be
    explicit about whether or not you accept `null`, and you generally shouldn’t accept
    it. This will save you from `NullPointerException` cropping up in obnoxious places,
    far from the site of the actual error. This is an especially painful problem when
    you start working with streams and lambdas, because the stack trace may not be
    very useful for you when you go to debug. The solution is to never accept `null`
    and to aggressively check for it, exploding loudly as soon as it occurs. Some
    developers are concerned that this is adding overhead to their code and hindering
    performance, but that concern is the height of premature optimizations. On the
    one hand, not guarding against null can lead your code to break badly, and so
    it is important to ensure correctness: I can give you the wrong answer infinitely
    fast. At the same time, adding in these guards will remove a lot of `null` from
    your code, and so those `null` checks will become cold branches and Java’s highly
    optimized runtime will make them effectively costless. So these null checks are
    both high value and low cost.'
  trans: '

    ### Consumer.andThen


    Java SDK 并未提供用于修改接受类型的 `Consumer.compose` 方法，¹¹ 但提供了 `Consumer.andThen` 方法。由于消费者接受一个参数但不产生结果，`andThen`
    所做的只是添加额外的处理流程：给定两个相同类型的消费者，它会提供一个单一的消费者，依次执行这两个给定的消费者。这让你可以在处理流的末尾添加额外的处理。这对于在消费者中添加日志记录或其他通知特别有用。


    ### Predicate.and 与 Predicate.or


    谓词负责提供布尔检查，而这些检查通常是复合类型的结构。尽管我们在本书开头讨论了一个简单案例（一个“非空”谓词），但你很少能幸运到拥有简单的谓词逻辑。通常，你会遇到复杂的逻辑链。事实上，使用
    `predicate` 类的主要优势之一就是你可以高层级地构建这个复杂链，然后稍后对对象执行它。要连接两个谓词，你必须决定是使用 `&&` 风格的连接还是
    `||` 风格的连接。前者由 `Predicate.and` 处理，后者由 `Predicate.or` 处理。


    在这两种情况下，谓词都是短路求值的：如果我们已经知道结果，谓词将不会被执行。如果你有 `foo.and(bar).test(baz)`，并且 `foo.test(bar)`
    求值为 `false`，那么 `bar.test(baz)` 永远不会被执行。类似地，如果你有 `foo.or(bar).test(baz)`，并且 `foo.test(bar)`
    求值为 `true`，那么 `bar.test(baz)` 永远不会被执行。这正是 Java 处理其布尔运算符的方式。


    ### Predicate.isEqual


    如果你有某个特定的值，并且想要一个能告诉你其他值是否与之相等的测试，那么请使用 `Predicate.isEqual`。它使用 Java 自身的 `Objects.equals(left,right)`
    方法，该方法首先执行 `null` 检查，然后返回 `left.equals(right)`，因此 `Predicate.isEqual` 可以安全地与 `null`
    一起使用。


    ### Predicate.negate


    如果你想要给定谓词的逻辑相反值，可以使用 `Predicate.negate` 来获取。将 `Predicate.negate` 与 `Predicate.isEqual`
    结合使用，就得到了第 1 章开头提到的非空检查：`Predicate.isEqual(null).negate()`。


    ### BinaryOperator.minBy 与 BinaryOperator.maxBy


    这是两个非常有用的方法，但很多人并没有意识到它们的存在，因为这些方法隐藏在函数式接口类型中。这两个方法都提供了一个 `BinaryOperator`，它是一个
    `BiFunction`，其参数和返回值类型都相同。由于 `BinaryOperator` 扩展了 `BiFunction`，只要你的 `BiFunction`
    类型签名匹配，你就可以随时传入这些 `BinaryOperator`。所提供的 `BinaryOperator` 接受两个相同类型的参数，并返回最大（`maxBy`）或最小（`minBy`）的参数。


    这看起来可能没什么大不了的，但实际上非常重要。在下一章中，我们将看到它如何与对象集合和流一起工作，以及这些方法如何自然地融入其中。更棒的是，由于这两个方法都将
    `Comparator` 作为参数，我们可以利用 `Comparator` 上提供的所有有用的实用方法，这些也将在下一章中介绍。


    明显的用例是在众多元素中找出最小和最大的元素。然而，你可以使用那个 `Comparator` 来挑选出最接近你想要的值的元素。你也可以使用 `Comparator`
    来提供一个评分算法，然后使用这个 `BinaryOperator` 来获取得分最高或最低的元素。任何时候，只要你有一个合适的排序或“与目标的距离”的概念，`BinaryOperator.minBy`
    和 `BinaryOperator.maxBy` 很可能都会帮到你。


    ## Lambda 最佳实践


    当人们初次接触面向对象编程时，往往倾向于过度使用继承。这个语言特性如此酷炫，以至于你最终会构建出层层叠叠的继承结构，导致代码变得极其难以理解和维护。Lambda
    表达式也会发生类似的情况。现在，你对 lambda 的了解已经足以“搞出事情”，你可能会过于兴奋地应用这些新知识，到处使用函数式接口。这种热情是好的，但在你出去把所有代码都“lambda
    化”之前，请允许我给你一些忠告。


    ### 使用接口


    过于热心的函数式程序员最常犯的错误是在类型签名中使用函数式接口。通常，你应该避免直接使用函数式接口类型，而应该提供单一方法接口作为你方法的参数。这些接口成为创建自文档化代码、提供有意义的类型信息的一种方式，同时也为用户提供了提供实际
    Java 类型的可能性。如果他们想使用 lambda 和方法引用来实现你的接口，他们仍然可以这样做，但不要强迫他们。


    考虑这两个方法签名：`processFile(LineHandler handler)` 和 `processFile(Consumer<String> handler)`。在后一种情况下，`String`
    提供了什么，或者期望消费者做什么，并不明显。更重要的是，如果你以后想提供一个 `processFile(FileHandler handler)` 方法，你可以做到，而在另一种情况下，你最终会遇到类型冲突。


    ### 内联定义 Lambda


    当你确实使用 lambda 时，请内联定义它们。除非你对 lambda 进行某种花哨的操作，否则没有理由将它们赋值给变量。你想要内联定义 lambda 的原因是，当类型发生变化时，它能让你的代码更加灵活：你让类型推断为你承担更多繁重的工作，并使你的代码适应不断变化的上下文。如果你开始将
    lambda 赋值给变量，你就必须开始显式地指定类型，这就不必要地固化了你的类型。


    ### Lambda 应始终是线程安全的


    在本书的后续章节中，我们将看到许多 lambda 使并发编程变得更加容易的地方。许多基于 lambda 构建的结构会执行并发操作，有时甚至没有太多警告。因此，你的
    lambda 必须始终是线程安全的。对于实例方法句柄要特别留意这一点，因为线程危险的状态通常可能隐藏在这些实例中。


    ### 不要使用 Null


    你的代码中永远不应该使用 `null` 关键字。既然 Java 有了 `Optional` 类型，就完全没有必要使用它了。每当你有一个方法时，你应该明确说明你是否接受
    `null`，并且通常你不应该接受它。这将使你免于 `NullPointerException` 在远离实际错误源头的令人讨厌的地方突然出现。当你开始使用流和
    lambda 时，这尤其是一个痛苦的问题，因为当你去调试时，堆栈跟踪可能对你没什么用。解决方案是永远不接受 `null`，并积极检查它，一旦出现就立即大声报错。一些开发者担心这会增加代码开销并影响性能，但这种担忧是过早优化的极致表现。一方面，不防范
    null 可能导致代码严重崩溃，因此确保正确性很重要：我可以无限快地给你错误的答案。同时，添加这些防护措施将从你的代码中移除大量的 `null`，因此这些
    null 检查将成为冷分支，而 Java 高度优化的运行时将使它们实际上零成本。所以这些 null 检查既价值高又成本低。

