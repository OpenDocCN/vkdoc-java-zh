    other arguments into a constructor. We can certainly accept the size as an argument
    in the constructor, which leaves the `iterator()` method for our lambda implementation.
    We will therefore require the user to provide us something like a `Supplier<Iterator<E>>`
    as our lambda argument. Of course, we will provide an interface type for that
    supplier, so that users understand exactly what we need. We will call this kind
    of a `Collection`, `LambdaCollection`.


    To demonstrate using our `LambdaCollection`, let’s consider that we wanted to
    be able to treat the lines of a file as a Collection, and we were willing to do
    it in an inefficient (yet effective) way. In that case, we could define a way
    to go from the lines of the files to an iterator over the lines of the files,
    and this would be our lambda. We would also have to do one trip through the file
    at the outset to get the size. We demonstrate the code for `LambdaCollection`
    and this case in Listing 7-13.


    Listing 7-13\. Using a Lambda to Implement an Abstract Type


    `import java.io.File;`


    `import java.io.IOException;`


    `import java.io.UncheckedIOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.util.*;`


    `public class Listing14 {`


    `public static class LambdaCollection<E> extends AbstractCollection<E> {`


    `private final int size;`


    `private final Listing14.LambdaCollection.IteratorFactory<E> factory;`


    `/**`


    `* Defines the means of acquiring an {@link java.util.Iterator}.`


    `*/`


    `public interface IteratorFactory<E> {`


    `/**`


    `* Creates a new instance of an {@link java.util.Iterator}.`


    `* The iterator should be a fresh iterator each time this`


    `* method is called, but it should always iterate over the`


    `* same source.`


    `*`


    `* @return A new {@code Iterator}; never {@code null}.`


    `*/`


    `Iterator<E> create();`


    `}`


    `public LambdaCollection(int size, IteratorFactory<E> factory) {`


    `this.size = size;`


    `this.factory = factory;`


    `}`


    `/**`


    `* Returns an iterator over the elements contained in this collection.`


    `*`


    `* @return an iterator over the elements contained in this collection`


    `*/`


    `@Override`


    `public Iterator<E> iterator() {`


    `return factory.create();`


    `}`


    `@Override`


    `public int size() {`


    `return size;`


    `}`


    `}`


    `public static Path generateFile() throws IOException {`


    `File file = File.createTempFile("example", "tmp");`


    `file.deleteOnExit();`


    `Path path = file.toPath();`


    `Files.write(path, "this\nis\nour\nfile".getBytes("UTF-8"));`


    `return path;`


    `}`


    `public static void main(String[] args) throws Exception {`


    `Path file = generateFile();`


    `Collection<String> collection = new LambdaCollection<>(`


    `(int) Files.lines(file).count(),`


    `() -> {`


    `try {`


    `return Files.lines(file).iterator();`


    `} catch (IOException ioe) {`


    `throw new UncheckedIOException(`


    `"Error reading lines from " + file, ioe);`


    `}`


    `}`


    `);`


    `}`


    `}`


