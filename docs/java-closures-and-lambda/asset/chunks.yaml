- fmt: "### Default Methods\n\nThe ability to define an interface inline makes interfaces\
    \ much more succinct and pleasant to use. Yet Java 8 makes things even easier\
    \ by allowing an interface to define a default implementation for its methods.\
    \ This begins to seriously blur the lines between an interface and an abstract\
    \ class: the `java.util.AbstractCollection` abstract class, for instance, could\
    \ now be implemented purely as an interface.\n\nAs an example, let’s create an\
    \ `Iterator` type that can be defined inline by providing a lambda. The lambda\
    \ is responsible for providing a “next element,” perhaps consuming that element.\
    \ A special value is used to signal when the elements have all been consumed.\
    \ The user just provides that lambda; all the other `Iterator` methods are provided\
    \ as default methods. The code for this class is given in Listing 2-24. As you\
    \ can see there, default methods are provided using the `default` keyword. Just\
    \ like any other member of an interface, all default methods are `public`. And\
    \ just like any other member of an interface, you can specify `public` if you\
    \ would like, although it is redundant and doing so has no effect.\n\nDefault\
    \ methods are a major change to the Java ecosystem, and it seems like you would\
    \ never use an abstract class again. However, there are a few caveats with default\
    \ methods. First of all, there is no way to inherit a default method implementation:\
    \ if you override the method, you have to implement it yourself. (Although, see\
    \ the next section for a potential workaround.) Second, if you have a class with\
    \ two interfaces that provided conflicting default methods, you will have to override\
    \ the method and implement it yourself.\n\nDefault methods play a major part in\
    \ Java 8 code, and have been retrofitted onto a number of standard Java interfaces.\
    \ We will look into where they appear as we address each of these areas in later\
    \ chapters.\n\n**Listing 2-24.** The `FunIterator` Class, Demonstrating Default\
    \ Methods\n\n```\n/**\n * An implementation of {@link java.util.Iterator} that\
    \ can be implemented\n * as a lambda. You can also use this class as a simpler\
    \ way to implement\n * an {@code Iterator}.\n * <p>\n * This interface does not\
    \ support {@link #remove()} out of the box.\n */\npublic interface FunIterator<E>\
    \ extends Iterator<E> {\n\n  /**\n   * Provides the next element, optionally consuming\
    \ it. This is the abstract\n   * method to implement as a lambda.\n   * If {@code\
    \ false} is passed in as an argument, this method should always\n   * return the\
    \ same value, and should never exhaust the iterator. If\n   * {@code true} is\
    \ passed in as an argument, the iterator should advance to\n   * the next element\
    \ after returning the value. At any point in time, if there\n   * are no more\
    \ elements, the iterator should return\n   * {@link java.util.Optional#empty()}.\
    \ This method should never throw an\n   * exception or return {@code null}.\n\
    \   *\n   * @param consume  Whether the element should be consumed after being\n\
    \   *                 returned.\n   * @return {@link java.util.Optional#empty()}\
    \ if there are no other elements;\n   *         otherwise, an {@link java.util.Optional}\
    \ containing the next\n   *         element. Never {@code null}.\n   */\n  Optional<E>\
    \ nextElement(boolean consume);\n\n  @Override\n  default boolean hasNext() {\n\
    \    return nextElement(false).isPresent();\n  }\n\n  @Override\n  default E next()\
    \ {\n    return nextElement(true).orElseThrow(\n      () -> new NoSuchElementException(\"\
    Iterator is exhausted\")\n    );\n  }\n\n}\n```\n\n### Static Methods\n\nIt’s\
    \ not directly related to lambdas, but now is a good time to mention it: as of\
    \ Java 8, interfaces can also now provide static methods, just as any concrete\
    \ or abstract class could provide static methods. If you want to provide a default\
    \ method implementation to the outside world, you can use a static method to do\
    \ so: simply have the default method call the static method.\n\nNow that interfaces\
    \ can have static methods, some Java interfaces have been extended to provide\
    \ utility methods. The most notable to my mind is `Comparator`, which has picked\
    \ up a large number of utility methods. For instance, in Listing 2-25, we define\
    \ a `Comparator` that puts `null` `File` instances last and sorts the rest by\
    \ file name. By allowing static methods, Java 8 has outdated the “utility class”\
    \ convention, where an interface `Foo` would have utility class `Foos` or `FooUtils`.\
    \ Now those utility methods reside directly on the interface itself.\n\n**Listing\
    \ 2-25.** Using `Comparator` Static Methods to Generate a `Comparator`\n\n```\n\
    Comparator<File> fileComparator =\n    Comparator.nullsLast(\n      Comparator.comparing(File::getName)\n\
    \    );\n```\n\n## Functional Interface Helper Methods\n\nThe functional interfaces\
    \ themselves carry a number of static and default methods to help you build the\
    \ functions that you are looking for. Through this section, we will look at those\
    \ methods, and get a sense as to when and why you want to use them.\n\n### `Function.identity()`\
    \ and `UnaryOperator.identity()`\n\nPerhaps the simplest to understand is `Function.identity()`.\
    \ This provides a function that simply returns its argument. It is very useful\
    \ in testing, when you want to test something that takes a function and acts on\
    \ it. This can also be useful as a placeholder function: say that you have five\
    \ types, and with four of them, you want to perform some transformation; with\
    \ the fifth, you don’t want to perform a transformation. In that case, you can\
    \ maintain the symmetry of your codebase and avoid using `null` (and `NullPointerException`s)\
    \ by using this method. This method is also available under the `UnaryOperator`\
