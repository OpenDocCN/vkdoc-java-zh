    ## 连接集合与流


    在 Java 引入流之前，其主要的大批量操作模式是通过集合 API 进行的。曾有人尝试创建批量集合操作（称为“推导式”），甚至有人尝试将 `Iterator`
    类转变为与当代流非常相似的东西。然而，该 API 实际上并不适用于后函数式风格的工作，并且始终存在一些与流方法配合不佳的粗糙边缘：这就是 Java 引入一套全新
    API 的原因。


    好消息是，从 `collection` 类型的实例转换为流非常容易：只需分别调用 `collection.stream()` 或 `collection.parallelStream()`
    方法即可获得顺序流或并行流。对于 `Map` 类型的实例，你首先需要指定是要获取映射的键集、条目集还是值集合，然后就可以从中获取你选择的流。`Map` 类型和
    `Collection` 类型都有一个接受消费者的 `forEach` 方法：它实际上是 `collection.stream().forEach(Consumer)`
    的简写，并且当你不需要知道索引时，在任何情况下，此方法都应该取代你的 for 循环。


    然而，从流转换回集合则稍微棘手一些。`Stream` 类型上没有 `.toList()` 方法，尽管这本来会很方便。一种选择是使用将流转换为数组的方法之一，然后使用
    `Arrays.asList(Array)` 来获取你想要的列表。结果将是一个包含所有流元素的固定大小（但非不可变）的列表。清单 7-7 给出了该方法的基本演示，如果你打算采用这种方法，请务必阅读下一节关于数组的内容。


    **清单 7-7. 通过 toArray() 将流连接到集合**


    `import java.util.*;`


    `import java.util.stream.*;`


    `public class Listing7 {`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList<>(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static void main(String[] args) {`


    `// 执行流处理`


    `List<Object> list = Arrays.asList(generateParallelStream().toArray());`


    `}`


    `}`


    如果你有一些现有的列表想要向其中添加元素，那么你可以简单地使用 `List.add` 方法作为你的消费者。该方法从技术上讲返回 `boolean`，因此它并不完全符合
    `Consumer` 的精确形状，但 Java 允许你在此处变通规则。如果你在流操作之前就有一个列表，那么只需将该列表的 `list::add` 方法传递给流的
    `forEach` 即可。类似的方法也适用于将流元素添加到现有集合。唯一的注意事项是，如果你使用的是并行流，则需要确保使用的是线程安全的集合，因为它的 add
    方法将从多个线程中被调用。清单 7-8 演示了这种方法。


    **清单 7-8. 使用 Add 将流连接到集合**


    `import java.util.*;`


    `import java.util.concurrent.*;`


    `import java.util.stream.*;`


    `public class Listing8 {`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList<>(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static void main(String[] args) {`


    `// 执行流处理`


    `List<Integer> list = new CopyOnWriteArrayList<>();`


    `generateParallelStream().forEach(list::add);`


    `}`


    `}`


    请注意，如果你要添加元素的集合不是线程安全的，并且你的流是并行流，那么你可以使用 `Collection.synchronizedList(List)`（或相关方法）来同步它。这可以内联完成，从而创建如下代码行：


    `generateParallelStream().forEach(Collections.synchronizedList(list)::add);`


    如果你希望你的流生成一个不可变列表或集合，那么最简单的方法是使用 Google 的 Guava 库。在其他不可变类型中，Guava 库提供了 `ImmutableList`
    和 `ImmutableSet`（以及其他不可变类型），并且为这些不可变类型中的每一种都提供了构建器类型。这些构建器类型的 add 方法与我们之前看到的列表的
    add 方法一样好用。这些构建器也都是线程安全的，因此可以安全地与并行流一起使用。清单 7-9 给出了这种用法的一个示例。如果你只是在一个方法内构建你的集合，然后将其作为最后一步返回给用户，这种方法尤其有效。


    **清单 7-9. 使用构建器将流连接到集合**


    `import com.google.common.collect.ImmutableList;`


    `import java.util.*;`


    `import java.util.stream.*;`


    `public class Listing9 {`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList<>(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static void main(String[] args) {`


    `// 执行流处理`


    `ImmutableList.Builder<Integer> builder = ImmutableList.builder();`


    `generateParallelStream().forEach(builder::add);`


    `ImmutableList list = builder.build();`


    `}`


    `}`


    最后，如果你想要特别精巧且高效地处理事情，你可以使用 Stream API 的 `Collector` 部分。Stream API 的 `Collector`
    部分提供了一种专门的归约逻辑，其结果是对现有元素的组合。在 `java.util.stream.Collectors` 类中可以找到许多 `Collector`
    实现的示例。其中包括 `Collectors.toList()`、`Collectors.toSet()` 和 `Collectors.toCollection(Supplier)`。这些方法中的每一个都返回一个
    `Collector` 实例，并将其传递给 `stream.collect(Collector)`。`Collectors.toList()` 和 `Collectors.toSet()`
    都如其名：它们返回一个 `List` 或 `Set`。但是，不保证结果集合的可变性程度、其可序列化性或其线程安全性。如果你想要更具体地指定返回的内容，可以调用
    `Collectors.toCollection(Supplier)`。`Supplier` 负责提供你所需类型的集合，并且假定每次调用该供应器时，它都会提供一个新实例。因此，作为供应器传递的最简单的东西就是构造函数本身，例如
    `CopyOnWriteArrayList::new`。这会产生如清单 7-10 所示的代码，该代码既简洁又高效。


    **清单 7-10. 使用收集器将流连接到集合**


    `import java.util.*;`


    `import java.util.concurrent.*;`


    `import java.util.stream.*;`


    `public class Listing10 {`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList<>(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static void main(String[] args) {`


    `// 执行流处理`


    `List<Integer> list = generateParallelStream()`


    `.collect(Collectors.toCollection(CopyOnWriteArrayList::new));`


    `}`


    `}`

