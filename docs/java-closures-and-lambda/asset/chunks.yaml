    `getOrDie()` 方法为我们提供了一种便捷的方式来获取结果，前提是我们确实知道结果存在。如果调用者判断错误，结果并不存在，该方法将抛出一个 `NoSuchElementException`，并将产生的异常作为抑制异常包含在内。这是通过
    `orElseThrown` 方法实现的，该方法要么返回结果，要么抛出由 `Supplier` 提供的异常。我们的 `Supplier` 实现会将异常放入
    `NoSuchElementException` 的堆栈跟踪中，这有助于调试。（只有当异常和结果最初都被填充为 `null` 时，才会到达 `“INTERNAL
    ERROR”` 异常，而这根本不应该发生。）


    `map` 函数会转换结果（如果存在）；否则，它将构造一个新的结果并传递异常。这创建了一种在不丢失异常信息的情况下对结果进行操作的方式。在大多数情况下，当你需要使用
    `getOrDie()` 时，你实际上想要的是 `map()`。


    `ifPresent` 和 `ifNotPresent` 方法提供了一种便捷的方式来消费结果或异常（如果它们存在）。这些方法，连同 `map()`，允许用户指定实现，而无需担心结果的状态，这使得
    API 非常易读。请注意，`ifPresent()`/`ifNotPresent()` 与 `map()` 的主要区别在于返回值：`ifPresent()`/`ifNotPresent()`
    会丢失信息，但会转换为更常见的 `Optional` 类型；而 `map()` 则保留信息，但保持为当前的 `Result` 类型。


    `when` 方法为流畅的 API 提供了支持，允许你编写在读者看来像命令式代码的函数式代码。它们返回当前对象以支持链式调用，因此你可以按顺序调用这些方法，提供一种看起来很像带有异常处理的
    try/catch 块的结构。


    最后一个 `when` 方法用于捕获多种类型的异常，它是 Java 8 强大功能的一个绝佳展示。得益于类型推断，消费者的参数将自动设置为要捕获的方法的最宽泛的公共超类。传统的实现会涉及
    `null`、`if` 块和循环，但这些都被 `Optional` 和 `Stream` 类的方法所取代。


    使用这个 `Result` 类，我们可以封装方法调用的结果。我们不返回 `RETURN_T`，而是返回一个 `Result<RETURN_T>`。当方法执行时，它会构造一个
    `Result` 实例，该实例要么包含用户函数的返回值，要么包含抛出的 `IOException`。代码的初步版本可能如下所示：


    `<RETURN_T> Result<RETURN_T> withTempFile(Function<File, RETURN_T> function) {`


    `Objects.requireNonNull(function, "function to apply to temp file");`


    `Optional<File> file = Optional.empty();`


    `try {`


    `file = Optional.of(File.createTempFile("funfile", "tmp"));`


    `return new Result<>(file.map(function).get());`


    `} catch (IOException e) {`


    `return new Result<>(e);`


    `} finally {`


    `file.ifPresent(File::delete);`


    `}`


    `} // 这段代码可以工作，但还有改进空间：请继续阅读！`


    这段代码与清单 4-1 中的代码惊人地相似。如果你稍微模糊视线，只看空白区域中函数的轮廓，你会发现该方法具有相同的形状。任何时候，当你拥有两个形状相同的方法时，你就错过了代码复用的机会。在这种情况下，除了
    `return` 行之外，代码几乎完全相同：在清单 4-1 中，`return` 行委托给了用户提供的代码。在我们的新方法中，我们希望在此处调用 `Result`
    类的构造函数。我们可以将 `Result` 类的构造函数作为用户提供的代码传入清单 4-1 的代码中，从而将临时文件的实际实现委托到一个单一位置。由此产生的委托代码如清单
    4-3 所示，并且极其简单。这再次证明了新范式在我们后函数式 Java 世界中的强大之处。


    清单 4-3\. 创建临时文件，异常封装在返回值中


    `/**`

    `* 创建一个临时文件，将其传递给给定的函数，并在函数完成时删除该临时文件。`

    `*`

    `* @param function 使用临时文件实现的行为，`

    `*                 可能不返回 {@code null}；不能为 {@code null}`

    `* @return 给定函数的结果`

    `*/`

    `public static <RETURN_T> Result<RETURN_T> withTempFile(`

    `Function<File, RETURN_T> function`

    `) {`

    `Objects.requireNonNull(function, "function to apply to temp file");`

    `Function<File, Result<RETURN_T>> resultify = function.andThen(Result::new);`

    `return withTempFile(Result::new, resultify);`

    `}`

