  raw: '### Lambdas with Primitive Arguments


    In Listing 2-8, we saw a `Supplier` that returned a given integer value, `1`.
    However, that value was returned as an object extending `Number`, not as the primitive
    value. This is an example of a “boxed integer,” and the implicit conversion that
    just happened is called “autoboxing.” Many developers have an allergy to boxing
    primitive values, even though the real performance impact of boxing is largely
    negated through compiler optimizations, standard library performance tricks, and
    Java’s excellent garbage collector. However, there are still cases when the performance
    cost of autoboxing is significant; and if you are dealing with a lot of integer
    values, you might as well avoid the autoboxing. For those cases, you can create
    lambdas that use primitives.


    There are primitive functional interfaces for the `double`, `int`, and `long`
    primitive types. There are also functional interfaces that take one of those primitive
    types and produce another of those primitive types, such as `DoubleToIntFunction`.
    Java provides primitive versions of most of the functional interfaces. The most
    notable missing entry in this list is `ObjIntBifunction`: I don’t know why Java
    didn’t provide this interface.


    While we only take a look at the `int` interfaces in Listing 2-18, rest assured,
    there are corresponding versions of each of these interfaces for the `double`
    and `long` primitive types, too. Just replace `"Int"` with `"Double"` in the class
    name, and you have the corresponding functional type for the `double` type.


    Listing 2-18\. Predicate Lambda Checking if a String Is Null or Empty


    `IntFunction<String> intToString = i -> Integer.toString(i);`


    `ToIntFunction<String> parseInt = str -> Integer.valueOf(str);`


    `IntPredicate isEven = i -> i % 2 == 0;`


    `ToIntBiFunction<String,String> maxLength =`


      `(left,right) -> Math.max(left.length(), right.length());`


    `IntConsumer printInt = i -> System.out.println(Integer.toString(i));`


    `ObjIntConsumer<String> printParsedIntWithRadix =`


      `(str,radix) -> System.out.println(Integer.parseInt(str,radix));`


    `IntSupplier randomInt = () -> new Random().nextInt();`


    `IntUnaryOperator negateInt = i -> -1 * i;`


    `IntBinaryOperator multiplyInt = (x,y) -> x*y;`


    `IntToDoubleFunction intAsDouble = i -> Integer.valueOf(i).doubleValue();`


    `DoubleToIntFunction doubleAsInt = d -> Double.valueOf(d).intValue();`


    `I` `ntToLongFunction intAsLong = i -> Integer.valueOf(i).longValue();`


    `LongToIntFunction longAsInt = x -> Long.valueOf(x).intValue();`


    Note that there is now a new way to have ambiguity in methods: you can have an
    overloaded method that accepts both a `Function<Integer,X>` and an `IntFunction<X>`,
    such as in Figure 2-19\. If you do this, the compiler’s error message will almost
    certainly confuse you. There are two error messages you could get at this point,
    and which one depends on details of the lambda implementation.[⁹](#A978-1-4302-5999-2_2_Chapter.html#Fn9)
    Both of these messages compete for least helpful error messages in Java 8, and
    they are `"Cannot resolve method"` and `"Argument cannot be applied to <lambda
    parameter>`." In this case, you will need to provide explicit typing, as we discussed
    in “Lambdas with Explicit Typing.” If your explicit typing references the primitive
    type, you will get the `IntFunction` variant; if your explicit typing references
    the boxed type, you will get the `Function` variant.


    Listing 2-19\. Ambiguous Method Types When Using Primitive Functional Interfaces


    `static void methodBeingCalled(Function<Integer, String> function) {}`


    `static void methodBeingCalled(IntFunction<String> function) {}`


    `public static void main(String[] args) {`


      `// This will throw an exception`


      `methodBeingCalled(i -> Integer.toString(i));`


      `// This will not`


      `methodBeingCalled((int i) -> Integer.toString(i));`


    `}`


    ## Making Methods into Lambdas


    Throughout this chapter, we have been constructing all of our lambdas explicitly:
    we have been constructing our lambdas as anonymous functions. You can, however,
    also take any method call and turn it into a lambda. When I say “any method call,”
    I mean it: static methods, instance methods, and constructors are all fair game.
    This tiny little bit of syntactic glue makes transitioning from object-oriented
    code into functional code very easy, and really provides a powerful way to get
    the best of both paradigms.


    The structure that creates a lambda from a method is called a “method reference.”
    You create a method reference much like you call a method, but use double colons
    (`::`) instead of a period (`.`). I like to think of the period as a single dot
    meaning, “let me call this method once,” whereas the colons are lots of dots meaning,
    “let me call this method many times.” Once you create the method reference using
    the double colons, you can work with the method reference just as you would work
    with an explicit lambda. The details of making methods into lambda calls are handled
    in each of the subsections below.


    ### Making Static Methods into Lambdas


    The simplest case is turning a static method into a lambda. To do this, you will
    simply follow the formula we laid out above: take the method call, and replace
    the period with a colon. The compiler will look into the signature of that method
    and perform type inference, constructing the appropriate interface implementation
    for you. Listing 2-20 shows static alternatives to a couple of the lambdas that
    we saw in 2-18: note that the compiler successfully discovers that we want an
    `IntFunction<String>`, not a `Function<Integer,String>`, and provides the appropriate
    type. If the target type signature is ambiguous, such as in Listing 2-19, then
    you have to get an explicit type signature in place. There are two ways to do
    this: either use an explicit lambda with explicit typing to resolve it, or assign
    the method reference to a variable with the desired type and then pass the variable
    in. As of Java 8, there is no way to do an inline cast operation on a method reference.


    Listing 2-20\. Lambdas Made from Static Methods


    `IntFunction<String> intToString = Integer::toString;`


    `ToIntFunction<String> parseInt = Integer::valueOf;`


    ### Making Constructors into Lambdas


    Constructors live in that weird realm between static methods and instance methods:
    they are static methods whose implementation acts on an instance. Depending on
    where you are looking, they could be called `"new`," `"<init>`," or share their
    name with the class. Getting a method reference to a constructor is the same as
    getting a method reference to a static method: just use `"new"` as the name of
    the method. From the user’s standpoint, it’s really that simple. However, many
    classes have multiple constructors, so type inference does a lot of heavy lifting
    here. See Listing 2-22 for an example of `BigInteger`’s `String` constructor as
    a `Function`.


    Listing 2-21\. Lambdas Made from a Constructor


    `Function<String,BigInteger> newBigInt = BigInteger::new;`'
