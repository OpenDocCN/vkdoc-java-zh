    ### 善用类型与编译器


    Scala 和 Java 等语言相较于所有其他后函数式语言的主要优势在于其类型系统。类型系统能捕获你的许多错误。例如，在我们“不要释放 Zalgo”的例子中，我们本可以返回一个
    `Future` 类型，而不是委托给回调函数。该类型会表明我们正在异步执行，并在我们尝试同步执行时提醒我们。类似地，如果你从代码库中消除了 `null`，`Optional`
    类型就能表示一个值可能存在也可能不存在，从而确保你更明确地处理“可能不存在”的情况。当编译器告诉我们类型不匹配时，我们更容易从复杂类型构建出简单类型：如果没有编译器的帮助，我们很容易在
    `andThen` 实例的链条中迷失方向。


    编译器还有其他方式可以帮助你。例如，如果你将一个变量声明为 `final`，编译器会确保你在使用它之前已经为其赋值。这对于确保变量在进入 `if/else`
    块时被赋值一次（且仅一次）非常有用。以下是该代码的一个示例：


    `final Function<String,Integer> converter;`


    `if(str == null || str.isEmpty()) {`


    `converter = s -> 0;`


    `} else if(str.matches("\\d+")) {`


    `converter = Integer::parseInt;`


    `} else {`


    `Function<String,String> eliminateNondigits = s -> {`


    `return s.replaceAll("[^\\d]", "");`


    `};`


    `Function<String,String> defaultString = s -> {`


    `if(s.isEmpty()) {`


    `return "0";`


    `} else {`


    `return s;`


    `}`


    `};`


    `converter = eliminateNondigits`


    `.andThen(defaultString);`


    `.andThen(Integer::parseInt);`


    `}`


    在这个例子中，编译器确保我们在离开 `if/else` 链之前已经设置了 `converter`。无论我们有多少种情况，也无论每种情况下的代码可能变得多么复杂，我们都知道每一种情况都会设置一个
    `converter`。


    类型系统是函数式程序员手中的一个强大工具，因为它允许你强制执行系统的约束，并推理这些约束是如何应用的。请尽可能充分利用类型系统，并避免绕过它。


    脚注 1


    这个奇怪的事实提供了一个相当烦人、学究气但又有用的面试问题：“请用有效的 Java 7 语法编写一个闭包。”


    2


    我们将在下面“Lambda 应始终是线程安全的”一节中解释为什么 `final` 变量是必要的。


    3


    Lambda 函数的参数数量上限实际上是没有限制的。如果你在正常开发过程中发现了这个上限，那你肯定做错了什么。


    4


    这是 Java 明显不是函数式语言的地方之一：函数类型仍然通过接口来传达，而不是内置于语言本身。


    5


    有些人认为 lambda 中的可变参数是不必要的，尝试使用它们表明你做错了什么。如果你想了解可变参数 lambda 的优点和缺点，可以看看 JavaScript
    的 `arguments` 对象以及直接使用它的地方。


    6


    如果你是那种懂 OCaml 的人，你可能刚刚发现我在教学上撒了谎。对于其他人来说，发现我如何对你撒谎的任务留给读者作为练习。


    7


    正如我们将在清单 2-15 中看到的，混淆编译器的最佳方法是使用重载方法，尤其是当你将重载方法与继承结合使用时。除此之外，Oracle SDK 中的类型推断实际上相当不错。


    8


    如果你期望 Java 允许你重写像 `+` 和 `-` 这样的运算符，那你将会非常失望。就目前情况而言，这根本不可能通过 Java 社区流程。不过，你可能想看看
    Java-OO `javac` 插件：[`http://amelentev.github.io/java-oo/`](http://amelentev.github.io/java-oo/)


    9


    即，显式 lambda 与方法引用之间的区别。有关方法引用的信息，请参阅下一节。


    10


    请参阅下面的“不要使用 Null”。


    11


    请参阅 FunJava 项目的 `Functions` 类：它提供了一个 `compose` 方法，该方法接受一个 `Function` 和一个 `Consumer`，并返回一个
    `Consumer`。


    12


    有关更多信息，请参见 [`​blog.​enfranchisedmind​.​com/​2007/​09/​use-vrs-reuse-or-the-second-derivitive-of-programming/​`](http://blog.enfranchisedmind.com/2007/09/use-vrs-reuse-or-the-second-derivitive-of-programming/)
    和 [`​blog.​enfranchisedmind​.​com/​2007/​09/​development-acceleration-the-second-derivative-of-functionality/​`](http://blog.enfranchisedmind.com/2007/09/development-acceleration-the-second-derivative-of-functionality/)。


    # 3. Lambda 的领域：集合、映射和流


    在上一章中，我们了解了 lambda 本身是如何工作的，但我们明确地专注于 lambda，而没有为它们的使用创建上下文。我们将 lambda 从其自然环境中提取出来，以便在显微镜下分析它们。在本章中，我们将开始看到
    lambda 在现实世界中的应用。


    具体来说，我们将看到 lambda 如何与熟悉的集合和映射结构一起使用。然而，集合和映射实际上限制了 lambda 的能力。为了发挥其真正的威力，Java
    引入了一个使用旧词的新概念：流。本章将以对 Java 8 流的分析作为结尾，并探讨这些函数式流如何实现新的代码复用和表达能力形式。


    本章将比上一章更具体，我们将围绕一个特定的例子展开。这个特定的例子将包含一些特定的用例，在这些用例中 lambda 将帮助我们。然而，要理解这一切，我们首先必须了解
    Java 8 的 lambda 从何而来。这要求我们快速返回函数式编程语言的奇异世界。

    '
- fmt: '## Lambdas and Functional Programming


    Java 8’s lambdas come out of the world of functional programming. Functional programming
    models computer programs based on mathematical functions. In functional programming,
    lambdas represent the functions themselves. But, every mathematical function acts
    over a particular set of possible inputs, and produces a particular set of possible
    outputs. The inputs are called the “domain of the function,” and the outputs are
    called the “range of the function.”


    Abstractly, the types of the lambda represent the function’s domain and range.
    The Java type of the `Function` interface is `Function<T,U>`: `T` is its domain,
    and `U` is its range. This is why types are so useful in the world of functional
    programming: types allow you to clearly communicate the definition of the function.
    For the developers reading the API, types allow them to succinctly describe what
    you expect to receive and what you will return. The compiler also reads these
    types, and it reasons about your code using those types, providing optimizations
    not otherwise available.


    However, abstractions only take you so far. Sooner or later, you have to execute
    your code against real data. You might build up the most beautiful chain of function
    applications ever conceived, but they won’t accomplish anything for you until
    you apply them to something. In the functional programming approach, the goal
    of your application is simple: collect up all the domain objects that you care
    about and feed them through the function. So what kind of thing provides those
    domain objects for the functions to operate upon?


    If you talk to your average Java developer about collecting up objects, he will
    reach to the `Collection` class and its related APIs. Historically, this has been
    how functional Java code has been written: you take a collection, apply a function
    to each element, and return the resulting collection. A function that acts on
    a collection this way is called a “comprehension.” Java 8 makes comprehensions
    possible, and we will go through the APIs enabling comprehensions in this chapter.
    This approach works very well for relatively small collections of known items,
    and it is a very natural evolution for a Java developer.


    There are, however, some serious limitations. The most obvious limitation is that
    the `Collection` API presumes to have all the data in memory, or at least readily
    at hand. This may not be the case if you are acting on all the rows in a database
    or all the words in a file. A more subtle consequence is that chaining together
    a series of these operations creates a series of intermediary collections, each
    of roughly the same size, and that is simply wasteful. Finally, most of the `Collection`
    API is not thread safe, or has only limited thread safety characteristics, which
    hamstrings the concurrent capabilities of lambdas.


    To solve this, Java 8 introduced a concept of “functional streams.” The term “stream”
    already has an established usage in Java, and functional streams are a new application
    of this old concept. Traditionally, the term “stream” refers to Java’s I/O world,
    where we have an I/O stream representing a sequence of bytes. Most Java developers
    are used to working with these streams, and know how their bytes can be wrapped
    and contorted and manipulated through the decorator pattern, all while staying
    within the `InputStream` API. This is a powerful way to gain significant code
    reuse.


    Functional streams are like these I/O streams, but they act on a sequence of objects
    instead of a sequence of bytes. Objects can be wrapped and contorted and manipulated
    as they pass through the stream, and we can gain the same kind of reuse. Thanks
    to the introduction of lambdas, we don’t need the decorator pattern anymore: we
    can simply pass our implementations into the `Stream` object itself and get a
    new `Stream` back.'
