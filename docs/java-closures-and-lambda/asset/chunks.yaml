- fmt: '# Streams


    So far, everything we have discussed has been about editing an existing `Collection`
    or `Map` in place. Throughout the rest of the book, however, we will focus on
    the true power of lambdas: functional streams (hereafter just “streams”). The
    classes for supporting streams are primarily collected in the new `java.util.stream`
    package, but there are little gems of stream APIs sprinked throughout the rest
    of the Java SDK API. The next few chapters will all circle around how those APIs
    (or their unfortunate lack) will change the way that you write code with Java
    8. Before we can do that, though, we need to get a handle on what a stream is
    and how it works.


    Streams are like iterators but have explicitly broader capabilities. There was
    always an assumption with an interator that you were only iterating through it
    once, and always on the same thread, and that there was always an underlying collection
    that was being iterated over. There were a few attempts to build iterators off
    of things other than collections (such as the lines of a file), and even a few
    attempts to make iterators act like lazy lists or suppliers. Making that desired
    functionality fit into the `Iterator` API always felt like attempting to shove
    a square peg into a round hole. Even more, you were always rather limited with
    what you could do with an iterator. Unlike I/O streams, for instance, there never
    developed significant and widely adopted support for wrapping iterators or manipulating
    what they returned. An iterator was something that you used to simply iterate
    over the elements in a very imperative style, and that was that.


    With streams, however, things are entirely different. Streams can be explicitly
    parallelizable, which enables the user code and the library itself to read from
    them and execute them on multiple threads. Streams are designed to be transformed
    by `Function` lambdas, filtered by `Predicate` lambdas, and generally manipulated
    in the functional style that we have grown to love. Even better, they can be collected
    together in a variety of ways, enabling them to be plugged into any of the legacy
    APIs or to efficiently implement complex processing.


    The life cycle of a stream is slightly more complicated than the life cycle of
    an iterator, because a lot more is going on. The life cycle of a stream is:


    Creation → Mapping and Filtering (called the Intermediate Steps) → Collecting,
    Processing, or Reducing (called the Terminal Step)


    Each of these three steps can take a wide variety of forms, and you can mix and
    match them like building blocks to construct practically any flow that you can
    envision. This is extreme flexibility and relatively easy to manage, thanks to
    the type systems. What is even better is that the parallelism of steps 2 and 3
    are automatically handled for you by Java, so the Java runtime and libraries themselves
    automatically optimize your implementation.


    ## Stream Creation


    The first step, “Creation,” is where you generate a stream. When generated, a
    stream has not yet done anything with the underlying data, just as an I/O stream
    has not read any bytes when you create it. The stream simply understands how to
    start generating data, and it provides a rich API and a significant amount of
    metadata for the generation of that data.


    You can generate a stream from a `Collection` using the `stream()` or `parallelStream()`
    method. The `stream()` method generates a sequential (non-parallel) stream, which
    is useful when you need elements of the `Collection` to be processed in iteration
    order. If you do not have any order-of-execution requirements, however, it is
    always better to ask for a stream using `parallelStream()`. That method gives
    permission to the generated stream to process the elements in any order, including
    processing them concurrently.


    It is worth noting that you may still get a sequential stream from `parallelStream()`
    if the `Collection` can’t support parallelism: calling `parallelStream` is not
    demanding a stream that is parallelizable, but is giving permission for the returned
    stream to be parallelizable. These methods provide a bridge from the `Collection`
    API to the `Stream` API, so it is easy to migrate your code. Similarly, if you
    want to generate a stream from an array, then use the `Stream.of(array)` method.


    At the lowest level, streams can be generated using the static methods on the
    `Stream` interface. In particular, you can generate a `Stream` based on the `Supplier`
    functional interface using the `generate` method, and you can create a stream
    that iterates based on some initial value and an incrementing lambda using the
    `iterate` method (e.g., pass in `0` and `x->x+1` as the lambda to create a stream
    that counts up from zero). Finally, the `Stream` class provides a builder class
    via the `builder()` method, so you can pass in elements to the builder and then
    generate the stream based on the results.


    When we get into stream generation, we are entering into the lair of these strange
    beasts called “spliterators.” Spliterators can be thought of as the larval form
    of streams: they enter into the cocoon through the `StreamSupport.stream` method
    and emerge as a fully formed `Stream` instance. They are complex enough in their
    own right to warrant a lengthier discussion, though, so we will get into spliterators
    at length when we talk about lambda and stream implementation details in Chapter
    9. For the most part, users can and should stick to the `Stream` interface itself:
    rely on library support to obscure away the spliterator implementation details.


    The streams you see here and in the Java SDK are not the only possibilities. Webonise
    Lab’s `FunJava` library provides other ways to generate streams: In specific,
    that library provides a stream based on a database `ResultSet`, based on file
    contents, based on directory structures, and based on `InputStream` and `Reader`
    instances. We will get into the details about those stream generators in the chapters
    on processing files and processing database calls using streams, and you can use
    those implementations as models for your own stream implementations. For the sake
    of focus, however, in this chapter we will stick to those simpler streams provided
    by Java itself.'
  raw: '## Streams


    So far, everything we have discussed has been about editing an existing `Collection`
    or `Map` in place. Throughout the rest of the book, however, we will focus on
    the true power of lambdas: functional streams (hereafter just “streams”). The
    classes for supporting streams are primarily collected in the new `java.util.stream`
    package, but there are little gems of stream APIs sprinked throughout the rest
    of the Java SDK API. The next few chapters will all circle around how those APIs
    (or their unfortunate lack) will change the way that you write code with Java
    8\. Before we can do that, though, we need to get a handle on what a stream is
    and how it works.


    Streams are like iterators but have explicitly broader capabilities. There was
    always an assumption with an interator that you were only iterating through it
    once, and always on the same thread, and that there was always an underlying collection
    that was being iterated over. There were a few attempts to build iterators off
    of things other than collections (such as the lines of a file), and even a few
    attempts to make iterators act like lazy lists or suppliers. Making that desired
    functionality fit into the `Iterator` API always felt like attempting to shove
    a square peg into a round hole. Even more, you were always rather limited with
    what you could do with an iterator. Unlike I/O streams, for instance, there never
    developed significant and widely adopted support for wrapping iterators or manipulating
    what they returned. An iterator was something that you used to simply iterate
    over the elements in a very imperative style, and that was that.


    With streams, however, things are entirely different. Streams can be explicitly
    parallelizable, which enables the user code and the library itself to read from
    them and execute them on multiple threads. Streams are designed to be transformed
    by `Function` lambdas, filtered by `Predicate` lambdas, and generally manipulated
    in the functional style that we have grown to love. Even better, they can be collected
    together in a variety of ways, enabling them to be plugged into any of the legacy
    APIs or to efficiently implement complex processing.


    The life cycle of a stream is slightly more complicated than the life cycle of
    an iterator, because a lot more is going on. The life cycle of a stream is:


    Creation   Mapping and Filtering (called the Intermediate Steps)   Collecting,
    Processing, or Reducing (called the Terminal Step)  


    Each of these three steps can take a wide variety of forms, and you can mix and
    match them like building blocks to construct practically any flow that you can
    envision. This is extreme flexibility and relatively easy to manage, thanks to
    the type systems. What is even better is that the parallelism of steps 2 and 3
    are automatically handled for you by Java, so the Java runtime and libraries themselves
    automatically optimize your implementation.


    ### Stream Creation


    The first step, “Creation,” is where you generate a stream. When generated, a
    stream has not yet done anything with the underlying data, just as an I/O stream
    has not read any bytes when you create it. The stream simply understands how to
    start generating data, and it provides a rich API and a significant amount of
    metadata for the generation of that data.


    You can generate a stream from a `Collection` using the `stream()` or `parallelStream()`
    method. The `stream()` method generates a sequential (non-parallel) stream, which
    is useful when you need elements of the `Collection` to be processed in iteration
    order. If you do not have any order-of-execution requirements, however, it is
    always better to ask for a stream using `parallelStream()`. That method gives
    permission to the generated stream to process the elements in any order, including
    processing them concurrently.


    It is worth noting that you may still get a sequential stream from `parallelStream()`
    if the Collection can’t support parallelism: calling `parallelStream` is not demanding
    a stream that is parallelizable, but is giving permission for the returned stream
    to be parallelizable. These methods provide a bridge from the `Collection` API
    to the `Stream` API, so it is easy to migrate your code.[¹](#A978-1-4302-5999-2_3_Chapter.html#Fn1)
    Similarly, if you want to generate a stream from an array, then use the `Stream.of(array)`
    method.


    At the lowest level, streams can be generated using the static methods on the
    `Stream` interface. In particular, you can generate a `Stream` based on the `Supplier`
    functional interface using the `generate` method, and you can create a stream
    that iterates based on some initial value and an incrementing lambda using the
    `iterate` method (e.g., pass in `0` and `x->x+1` as the lambda to create a stream
    that counts up from zero). Finally, the `Stream` class provides a builder class
    via the `builder()` method, so you can pass in elements to the builder and then
    generate the stream based on the results.


    When we get into stream generation, we are entering into the lair of these strange
    beasts called “spliterators.” Spliterators can be thought of as the larval form
    of streams: they enter into the cocoon through the `StreamSupport.stream` method
    and emerge as a fully formed `Stream` instance. They are complex enough in their
    own right to warrant a lengthier discussion, though, so we will get into spliterators
    at length when we talk about lambda and stream implementation details in [Chapter
    9](#A978-1-4302-5999-2_9_Chapter.html). For the most part, users can and should
    stick to the `Stream` interface itself: rely on library support to obscure away
    the spliterator implementation details.


    The streams you see here and in the Java SDK are not the only possibilities. Webonise
    Lab’s `FunJava` library provides other ways to generate streams: In specific,
    that library provides a stream based on a database `ResultSet`, based on file
    contents, based on directory structures, and based on `InputStream` and `Reader`
    instances. We will get into the details about those stream generators in the chapters
    on processing files and processing database calls using streams, and you can use
    those implementations as models for your own stream implementations. For the sake
    of focus, however, in this chapter we will stick to those simpler streams provided
    by Java itself.'
