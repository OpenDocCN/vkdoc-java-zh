    \            try (InputStream in = createInputStream()) {\n                throw\
    \ new IOException(\"And with a kiss, I die!\");\n            } catch (IOException\
    \ e) {\n                throw new UncheckedIOException(\n                    \"\
    Error working with input stream\", e);\n            }\n        });\n    }\n}\n\
