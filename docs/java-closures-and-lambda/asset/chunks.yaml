    \ consumer = null;`\n\n`try (InputStream in = acquireInputStream()) {`\n\n`consumer\
    \ = it -> {`\n\n`try {`\n\n`System.out.println(\"尝试读取！\");`\n\n`in.read();`\n\n\
    `} catch (IOException ioe) {`\n\n`throw new UncheckedIOException(\"读取错误\", ioe);`\n\
    \n`}`\n\n`};`\n\n`} catch (IOException ioe) {`\n\n`throw new UncheckedIOException(\"\
    输入流错误\", ioe);`\n\n`}`\n\n`consumer.accept(new Object());`\n\n`}`\n\n`public static\
    \ InputStream acquireInputStream() {`\n\n`return new InputStream() {`\n\n`@Override`\n\
    \n`public int read() throws IOException {`\n\n`return 1;`\n\n`}`\n\n`@Override`\n\
    \n`public void close() throws IOException {`\n\n`System.out.println(\"正在关闭！\"\
    );`\n\n`super.close();`\n\n`}`\n\n`};`\n\n`}`\n\n`}`\n\n`/* 结果`\n\n`正在关闭！`\n\n\
    `尝试读取！`\n\n`*/`\n\n总而言之，try-with-resources 方法还算不错，尽管它已经开始显得有些杂乱。你必须小心哪些块以何种方式嵌套，但这还是相当可控的。更大的问题是，如果你的函数有返回值，那么\
    \ catch 块中的返回必须与 try 块中的返回匹配。许多 Java 开发者的自然反应是在此时返回 `null`，但这只会增加遇到 `NullPointerException`\
    \ 的可能性，因为它期望调用者处理这种情况，同时又让调用者很容易忽略它。根据你的具体情况，有三种更好的选择：非受检异常、异常处理调用者，或者 `Result`\
    \ 对象。\n\n### 通过抛出非受检异常来处理资源\n\n一种非常流行且常见的解决方案是将受检异常转换为非受检异常并重新抛出。这将处理问题的责任交回给调用者，并且异常可能会在遇到异常处理器之前，沿着执行栈向上回溯相当长的距离。希望无论异常处理器在哪里，它都能以智能的方式处理这种异常情况。\n\
    \nJava 8 为这种编程惯例引入了一些支持：`java.io.UncheckedIOException` 类，它的存在明确是为了将受检的 `IOException`\
    \ 实例包装在非受检的包装器中。由于 `IOException` 是最常见异常类的根源，这个类提供了一种将大多数常见异常转换为非受检形式的方法。最好的做法是使用\
    \ `UncheckedIOException(String,IOException)` 构造函数，它允许你在转换点附加一条供人类阅读的消息；一般来说，在发生异常时你能提供的信息越多，情况就越好。有关此用法的示例，请参见清单\
    \ 7-2。\n\n**清单 7-2. 包装 IOException 的 UncheckedIOException**\n\n`import java.io.ByteArrayInputStream;`\n\
    \n`import java.io.IOException;`\n\n`import java.io.InputStream;`\n\n`import java.io.UncheckedIOException;`\n\
    \n`import java.util.function.*;`\n\n`public class Listing2 {`\n\n`public static\
    \ InputStream createInputStream() throws IOException {`\n\n`return new ByteArrayInputStream(\"\
    foobar\".getBytes());`\n\n`}`\n\n`public static void call(Consumer<Object> c)\
    \ {`\n\n`c.accept(new Object());`\n\n`}`\n\n`public static void main(String[]\
    \ args) {`\n\n`call(it -> {`\n\n`try (InputStream in = createInputStream()) {`\n\
    \n`throw new IOException(\"一吻便杀一人！\");`\n\n`} catch (IOException e) {`\n\n`throw\
    \ new UncheckedIOException(`\n\n`\"处理输入流时出错\", e);`\n\n`}`\n\n`}`\n\n`);`\n\n\
    `}`\n\n`}`\n\n`/* 结果`\n\n`Exception in thread \"main\" java.io.UncheckedIOException:\
    \ 处理输入流时出错`\n\n`at Listing1.lambda$main$0(Listing1.java:22)`\n\n`at Listing1$$Lambda$1/558638686.accept(Unknown\
    \ Source)`\n\n`at Listing1.call(Listing1.java:14)`\n\n`at Listing1.main(Listing1.java:18)`\n\
    \n`Caused by: java.io.IOException: 一吻便杀一人！`\n\n`at Listing1.lambda$main$0(Listing1.java:20)`\n\
    \n`... 4 more`\n\n`*/`\n\n如果你查看清单 7-2 中的堆栈跟踪，你会开始看到 Java 的 lambda 实现产生的一些堆栈跟踪噪音。我们将在下一章讨论为什么会这样以及如何解读它。然而，我们现在已经可以看出，我们得到了\
    \ lambda 本身的确切源代码行（`lambda$main$0` 行），以及调用 lambda 的位置（`Listing1.call` 行）。这应该是合理的，因为调用\
    \ lambda 就是执行它的函数接口方法（`Listing1$$Lambda$1/558638686.accept` 行）。原始异常也像我们习惯的那样，在“Caused\
    \ by”行中给出。总而言之，这非常熟悉且舒适。\n\n然而，当你开始使用并行流时，情况就变得有趣多了。在这种情况下，异常将从 `ForkJoinWorkThread`\
    \ 实例的上下文中抛出。这会在堆栈跟踪中产生显著更多的噪音，并削弱我们回溯调用栈的能力。为了看清困难所在，让我们构建一个示例。在这个示例中，我们将在执行第\
    \ 100 行时触发异常。让我们看看清单 7-3 中的结果。\n\n**清单 7-3. 未处理异常终止流**\n\n`import java.io.ByteArrayInputStream;`\n\
    \n`import java.io.IOException;`\n\n`import java.io.InputStream;`\n\n`import java.io.UncheckedIOException;`\n\
    \n`import java.util.*;`\n\n`import java.util.concurrent.atomic.*;`\n\n`import\
    \ java.util.function.*;`\n\n`import java.util.stream.*;`\n\n`public class Listing3\
    \ {`\n\n`public static InputStream generateInputStream() {`\n\n`return new ByteArrayInputStream(\"\
    foobar\".getBytes());`\n\n`}`\n"
