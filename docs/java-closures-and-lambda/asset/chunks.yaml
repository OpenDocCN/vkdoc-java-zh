    The stack trace in Listing 7-3 is not nearly as nice as the version in Listing
    7-2. We still have the lambda references in our stack trace, but they are references
    to where the lambda is declared; there is no reference at all to the `main` method,
    which is where our lambda is wired into the stream. The code goes straight from
    rather generic stream infrastructure to the place in the source where the lambda
    was declared. This can make it tricky to figure out where the code is actually
    called; imagine if the lambda was defined in some other class and reused in multiple
    streams – from experience, that exception would be very tricky to debug based
    on the stack trace.


    The other thing to note is that we have gotten well into our processing before
    this failed: we exploded on the 304th execution. That means we had 303 executions
    that completed successfully. Some of those were printed out. Some of those, however,
    may not have been; it depends on how far down the pipeline they got when the explosion
    occurred. Worse, we did not even try any of the numbers after we saw the explosion:
    a single explosion will terminate the entire stream. So we have some of our elements
    in a completed state, some in an intermediate state, and some that were never
    even initiated. The explosion just left things in an ugly place.


    The final issue with this approach is that we have reintroduced exception swallowing,
    although we a very sneaky about it. The good news is that we will always get an
    exception. However, if multiple threads have exceptions, then we will only see
    the first. It is possible that multiple threads threw exceptions simultaneously:
    for instance, if they were all doing database queries when the database went down.
    Yet, in that case, you will only see the first exception, even though there were
    multiple problems.


    Sometimes, these limitations are okay. Sometimes, your work really is all-or-nothing,
    or it is safe to rerun multiple times, even if things were in indeterminate states.
    In these cases, the mapping of exceptions to unchecked exceptions works just fine.
    However, if you want to try to salvage work from intermittent errors, then you
    are going to need something more clever.'
