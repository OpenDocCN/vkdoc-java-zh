    `);`


    `}`


    `}`


    这种方法更安全、更清晰，因为它要求用户在错误处理方面更加有意识，同时也为他们提供了执行该错误处理所需的信息。它还允许你在流处理过程中处理错误，而不必等到之后。这种方法的缺点是，它不太容易包装现有的基于资源的代码：你必须首先将结果包装在
    `Result` 对象中，而不是将你想要实现的整个方法包装在某个辅助对象中。


    当你在 Java 中处理资源时，你是在使用一种不同风格的语法糖：它对后函数式代码并不特别友好，但对于之前的命令式代码来说，它是一个非常好的好处。你连接范式所采用的具体方法取决于你特定系统的需求，但你越早能够封装丑陋之处并完全进入后函数式世界，你的代码就会越令人满意。'
- fmt: "# Bridging Collections and Streams\n\nBefore Java introduced streams, its\
    \ primary bulk mode of operation was through the Collection API. There were efforts\
    \ to create bulk collection operations (called “comprehensions”), and even some\
    \ efforts to turn the `Iterator` class into something strongly resembling the\
    \ contemporary stream. However, the API is really not intended for post-functional\
    \ kinds of work, and there were consistently rough edges that worked poorly with\
    \ the stream approach: this is why Java introduced an entirely new set of APIs.\n\
    \nThe good news is that it is easy to go from an instance of the `Collection`\
    \ type to a stream: simply call the `collection.stream()` or `collection.parallelStream()`\
    \ method for a sequential or parallel stream, respectively. For an instance of\
    \ the `Map` type, you will first need to specify whether you want the map’s key\
    \ set, entry set, or values collection, and then you can get the stream of your\
    \ choice from there. Both the `Map` type and the `Collection` type also have a\
    \ `forEach` method that takes a consumer: it is effectively a shorthand for `collection.stream().forEach(Consumer)`,\
    \ and this method should probably supplant your for loops in any case when you\
    \ do not need to know the index.\n\nGoing from a stream back to a collection,\
    \ however, is somewhat trickier. There is no `.toList()` method on the `Stream`\
    \ type, as nice as that would be. One option is to use one of the methods of converting\
    \ the stream into an array, and then using `Arrays.asList(Array)` to get your\
    \ desired list. The result will be a fixed-sized (but not immutable) list of all\
    \ the stream elements. A basic demonstration of that approach is given in Listing\
    \ 7-7, and if that is the approach that you want to take, be sure to read the\
    \ next section on arrays.\n\n**Listing 7-7.** Bridging Streams to Collections\
    \ via `toArray()`\n\n```java\nimport java.util.*;\nimport java.util.stream.*;\n\
    \npublic class Listing7 {\n    public static Stream<Integer> generateParallelStream()\
    \ {\n        final int elements = 1000;\n        List<Integer> toReturn = new\
    \ ArrayList<>(elements);\n        for (int i = 0; i < elements; i++) {\n     \
    \       toReturn.add(i);\n        }\n        return toReturn.parallelStream();\n\
    \    }\n\n    public static void main(String[] args) {\n        // Perform the\
    \ stream processing\n        List<Object> list = Arrays.asList(generateParallelStream().toArray());\n\
    \    }\n}\n```\n\nIf you have some existing list that you want to add an element\
    \ into, then you can simply use the `List.add` method as your consumer. That method\
    \ technically returns `boolean`, and so it is not precisely the accurate shape\
    \ for the `Consumer`, but Java will allow you to bend the rules here. If you have\
    \ a list that exists before your stream operations, then simply pass that list’s\
    \ `list::add` method into the stream’s `forEach`, and you are fine. A similar\
    \ approach will work for adding stream elements to an existing set. The only caveat\
    \ is that if you are using a parallel stream, you want to make sure that you are\
    \ using a thread-safe collection, since its `add` method will be called from multiple\
    \ threads. This approach is demonstrated in Listing 7-8.\n\n**Listing 7-8.** Bridging\
    \ Streams to Collections Using `add`\n\n```java\nimport java.util.*;\nimport java.util.concurrent.*;\n\
    import java.util.stream.*;\n\npublic class Listing8 {\n    public static Stream<Integer>\
    \ generateParallelStream() {\n        final int elements = 1000;\n        List<Integer>\
    \ toReturn = new ArrayList<>(elements);\n        for (int i = 0; i < elements;\
    \ i++) {\n            toReturn.add(i);\n        }\n        return toReturn.parallelStream();\n\
    \    }\n\n    public static void main(String[] args) {\n        // Perform the\
    \ stream processing\n        List<Integer> list = new CopyOnWriteArrayList<>();\n\
    \        generateParallelStream().forEach(list::add);\n    }\n}\n```\n\nNote that\
    \ if the collection you want to add elements to is not thread-safe, and your stream\
    \ is a parallel stream, then you can use a `Collections.synchronizedList(List)`\
    \ (or related method) to synchronize it. This can be done inline, which would\
    \ create a line like this:\n\n```java\ngenerateParallelStream().forEach(Collections.synchronizedList(list)::add);\n\
    ```\n\nIf you want your stream to produce an immutable list or set, then the simplest\
    \ approach is to use Google’s Guava library. Among other immutable types, the\
    \ Guava library provides an `ImmutableList` and `ImmutableSet` (among other immutable\
    \ types), and it provides builder types for each of these immutable types. The\
    \ `add` method for these builder types works just as well as the `add` method\
    \ of the list that we saw before. These builders are also all thread-safe, so\
    \ they are safe to use with parallel streams. An example of this usage is given\
    \ in Listing 7-9. This approach works particularly well if you simply build up\
    \ your collection within one method and then return it to the user as your final\
    \ step.\n\n**Listing 7-9.** Bridging Streams to Collections Using a Builder\n\n\
    ```java\nimport com.google.common.collect.ImmutableList;\nimport java.util.*;\n\
    import java.util.stream.*;\n\npublic class Listing9 {\n    public static Stream<Integer>\
    \ generateParallelStream() {\n        final int elements = 1000;\n        List<Integer>\
    \ toReturn = new ArrayList<>(elements);\n        for (int i = 0; i < elements;\
    \ i++) {\n            toReturn.add(i);\n        }\n        return toReturn.parallelStream();\n\
    \    }\n\n    public static void main(String[] args) {\n        // Perform the\
    \ stream processing\n        ImmutableList.Builder<Integer> builder = ImmutableList.builder();\n\
    \        generateParallelStream().forEach(builder::add);\n        ImmutableList\
    \ list = builder.build();\n    }\n}\n```\n\nFinally, if you want to get particularly\
    \ fancy and highly efficient about things, you can use the `Collector` part of\
    \ the Stream API. The `Collector` part of the Stream API provides a kind of specialized\
    \ reduce logic, where the result is a composite of the existing elements. Many\
    \ examples of `Collector` implementations can be found in the `java.util.stream.Collectors`\
    \ class. Among these are `Collectors.toList()`, `Collectors.toSet()`, and `Collectors.toCollection(Supplier)`.\
    \ Each of those methods returns a `Collector` instance, and that is passed to\
    \ `stream.collect(Collector)`. Both `Collectors.toList()` and `Collectors.toSet()`\
    \ do exactly what they sound like: they return a `List` or `Set`. However, there\
    \ is no guarantee given about the extent of the mutability of the resulting collection,\
    \ nor its serializability, nor its thread safety. If you want to be more specific\
    \ about what you are getting back, you call `Collectors.toCollection(Supplier)`.\
    \ The `Supplier` is responsible for supplying collections of the type you want,\
    \ and it is presumed that each time the supplier is called, it will supply a new\
    \ instance. Because of that, the simplest thing to pass as a supplier is the constructor\
    \ itself, such as `CopyOnWriteArrayList::new`. This results in code that looks\
    \ like Listing 7-10, which is both terse and highly performant.\n\n**Listing 7-10.**\
    \ Bridging Streams to Collections Using a `Collector`\n\n```java\nimport java.util.*;\n\
    import java.util.concurrent.*;\nimport java.util.stream.*;\n\npublic class Listing10\
    \ {\n    public static Stream<Integer> generateParallelStream() {\n        final\
    \ int elements = 1000;\n        List<Integer> toReturn = new ArrayList<>(elements);\n\
    \        for (int i = 0; i < elements; i++) {\n            toReturn.add(i);\n\
    \        }\n        return toReturn.parallelStream();\n    }\n\n    public static\
    \ void main(String[] args) {\n        // Perform the stream processing\n     \
    \   List<Integer> list = generateParallelStream()\n            .collect(Collectors.toCollection(CopyOnWriteArrayList::new));\n\
    \    }\n}\n```"
  raw: '## Bridging Collections and Streams


    Before Java introduced streams, its primary bulk mode of operation was through
    the Collection API. There were efforts to create bulk collection operations (called
    “comprehensions”), and even some efforts to turn the `Iterator` class into something
    strongly resembling the contemporary stream. However, the API is really not intended
    for post-functional kinds of work, and there were consistently rough edges that
    worked poorly with the stream approach: this is why Java introduced an entirely
    new set of APIs.


    The good news is that it is easy to go from an instance of the `collection` type
    to a stream: simply call the `collection.stream()` or `collection.parallelStream()`
    method for a sequential or parallel stream, respectively. For an instance of the
    `Map` type, you will first need to specify whether you want the map’s key set,
    entry set, or values collection, and then you can get the stream of your choice
    from there. Both the Map type and the Collection type also have a `forEach` method
    that takes a consumer: it is effectively a shorthand for `collection.stream().forEach(Consumer)`,
    and this method should probably supplant your for loops in any case when you do
    not need to know the index.


    Going from a stream back to a collection, however, is somewhat trickier. There
    is no `.toList()` method on the Stream type, as nice as that would be. One option
    is to use one of the methods of converting the stream into an array, and then
    using `Arrays.asList(Array)` to get your desired list. The result will be a fixed-sized
    (but not immutable) list of all the stream elements. A basic demonstration of
    that approach is given in Listing 7-7, and if that is the approach that you want
    to take, be sure to read the next section on arrays.


    Listing 7-7\. Bridging Streams to Collections via toArray()


    `import java.util.*;`


    `import java.util.stream.*;`


    `public class Listing7 {`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList<>(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static void main(String[] args) {`


    `// Perform the stream processing`


    `List<Object> list = Arrays.asList(generateParallelStream().toArray());`


    `}`


    `}`


    If you have some existing list that you want to add an element into, then you
    can simply use the `List.add` method as your consumer. That method technically
    returns `boolean`, and so it is not precisely the accurate shape for the `Consumer`,
    but Java will allow you to bend the rules here. If you have a list that exists
    before your stream operations, then simply pass that list’s `list::add` method
    into the stream’s `forEach`, and you are fine. A similar approach will work for
    adding stream elements to an existing set. The only caveat is that if you are
    using a parallel stream, you want to make sure that you are using a thread-safe
    collection, since its add method will be called from multiple threads. This approach
    is demonstrated in Listing 7-8.


    Listing 7-8\. Bridging Streams to Collections Using Add


    `import java.util.*;`


    `import java.util.concurrent.*;`


    `import java.util.stream.*;`


    `public class Listing8 {`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList<>(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static void main(String[] args) {`


    `// Perform the stream processing`


    `List<Integer> list = new CopyOnWriteArrayList<>();`


    `generateParallelStream().forEach(list::add);`


    `}`


    `}`


    Note that if the collection you want to add elements to is not thread-safe, and
    your stream is a parallel stream, then you can use a `Collection.synchronizedList(List)`
    (or related method) to synchronize it. This can be done inline, which would create
    a line like this:


    `generateParallelStream().forEach(Collections.synchronizedList(list)::add);`


    If you want your stream to produce an immutable list or set, then the simplest
    approach is to use Google’s Guava library. Among other immutable types, the Guava
    library provides an ImmutableList and ImmutableSet (among other immutable types),
    and it provides builder types for each of these immutable types. The add method
    for these builder types works just as well as the add method of the list that
    we saw before. These builders are also all thread-safe, so they are safe to use
    with parallel streams. An example of this usage is given in Listing 7-9\. This
    approach works particularly well if you simply build up your collection within
    one method and then return it to the user as your final step.


    Listing 7-9\. Bridging Streams to Collections Using a Builder


    `import com.google.common.collect.ImmutableList;`


    `import java.util.*;`


    `import java.util.stream.*;`


    `public class Listing9 {`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList<>(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static void main(String[] args) {`


    `// Perform the stream processing`


    `ImmutableList.Builder<Integer> builder = ImmutableList.builder();`


    `generateParallelStream().forEach(builder::add);`


    `ImmutableList list = builder.build();`


    `}`


    `}`


    Finally, if you want to get particularly fancy and highly efficient about things,
    you can use the Collector part of the Stream API. The Collector part of the Stream
    API provides a kind of specialized reduce logic, where the result is a composite
    of the existing elements. Many examples of Collector implementations can be found
    in the `java.util.stream.Collectors` class. Among these are `Collectors.toList()`,
    `Collectors.toSet()`, and `Collectors.toCollection(Supplier)`. Each of those methods
    returns a Collector instance, and that is passed to `stream.collect(Collector)`.
    Both `Collectors.toList()` and `Collectors.toSet()` do exactly what they sound
    like: they return a `List` or `Set`. However, there is no guarantee given about
    the extent of the mutability of the resulting collection, nor its serializability,
    nor its thread safety. If you want to be more specific about what you are getting
    back, you call `Collectors.toCollection(Supplier)`. The `Supplier` is responsible
    for supplying collections of the type you want, and it is presumed that each time
    the supplier is called, it will supply a new instance. Because of that, the simplest
    thing to pass as a supplier is the constructor itself, such as `CopyOnWriteArrayList::new`.
    This results in code that looks like Listing 7-10, which is both terse and highly
    performant.


    Listing 7-10\. Bridging Streams to Collections Using a Collector


    `import java.util.*;`


    `import java.util.concurrent.*;`


    `import java.util.stream.*;`


    `public class Listing10 {`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList<>(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static void main(String[] args) {`


    `// Perform the stream processing`


    `List<Integer> list = generateParallelStream()`


    `.collect(Collectors.toCollection(CopyOnWriteArrayList::new));`


    `}`


    `}`'
