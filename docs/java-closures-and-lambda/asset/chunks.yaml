- fmt: "### Handling Resources with an Exception-Handling Caller\n\nSince Java 8 is\
    \ a post-functional language, we can apply an object-oriented solution to our\
    \ problem. The object that we want will encapsulate the try-with-resources logic\
    \ and the error handling, so that the user can provide just the desired implementation.\
    \ The object can then be queried after the map has run to deal with any exceptions\
    \ that arise.\n\nThe idea here is that we will have some code up front and some\
    \ code at the end, and an opening for user-defined code in the middle. My friend,\
    \ mentor, and co-blogger, Brian Hurt, refers to this as the “hole in the middle\
    \ pattern.” Spring calls this “inversion of control,” and it was one of the key\
    \ strengths of the early Spring APIs, most especially Spring JDBC. In our case,\
    \ the code up front is the creation of the resource (the “try” part of the try-with-resources\
    \ block) and the exception handling (the “catch” part of the try-with-resources\
    \ block). The opening for user-defined code in the middle is the code that takes\
    \ the resource and the stream value and returns the mapped value for the stream.\n\
    \nFor the implementation, we will create this class along with two single-method\
    \ interfaces: one that defines how to make a resource, and one that defines how\
    \ to process the resource. We will intend for the user to implement these interfaces\
    \ using lambdas. These interface methods will allow the user to throw checked\
    \ exceptions, so the user is totally free to do what they would like. The class\
    \ itself will encapsulate the creation of the resource and the handling of return\
    \ values and exceptions.\n\nThere is a catch to this very neat theory: we have\
    \ to return something in the case of an exception. A legacy Java developer is\
    \ again going to reach for `null` out of habit, but this is a bad habit. Java\
    \ 8 provides the `Optional` class, which represents a value that may or may not\
    \ be set. This is a better option, because the `Optional` class cannot lead you\
    \ to accidentally raise a `NullPointerException`; the API provides many better\
    \ alternatives for getting the value, including representing the common get-and-if-null-explode\
    \ code pattern.\n\nThe result of our stream will therefore be an `Optional` container\
    \ of the type that the map itself would normally return. We can filter out empty\
    \ `Optional` types using the `filter` method for streams, which makes it very\
    \ easy to clean up the streams from any exceptional elements. The empty elements\
    \ do provide some value, too: they enable us to discover that an error occurred\
    \ in our stream, so we could provide somewhat more intelligent behaviors.\n\n\
    This class, its interfaces, and a demonstration of its call are all given in Listing\
    \ 7-4. The class implementation itself is rather ugly. This is because there are\
    \ a lot of type variables and strange syntax floating around, and it is made worse\
    \ by the fact that interfaces cannot be members of classes: they are always static.\
    \ However, the resulting API and usage is actually quite nice.\n\n**Listing 7-4.**\
    \ Handling Resources with an Object Using `Optional`\n\n```java\nimport java.io.ByteArrayInputStream;\n\
    import java.io.IOException;\nimport java.io.InputStream;\nimport java.util.*;\n\
    import java.util.concurrent.*;\nimport java.util.concurrent.atomic.*;\nimport\
