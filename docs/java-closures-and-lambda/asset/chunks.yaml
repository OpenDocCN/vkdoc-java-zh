    `Thread` 类有一个接受 `Runnable` 的构造函数。在 Java 8 Lambda 表达式的世界中，这意味着 `Thread` 类有一个接受
    Lambda 表达式的构造函数：该 Lambda 表达式会被编译器转换为 `Runnable`。这意味着 Lambda 表达式使得编写 `Thread` 代码更加简单：无需使用匿名内部类或某个遥远的接口实现，你可以直接将
    Lambda 表达式传入。


    使用 `Thread` 类解决我们 kata 问题的一种简单方法是为每个要计算的值生成一个线程。不幸的是，线程并不廉价，这样做会很快耗尽虚拟机的资源。相反，我们将生成一定数量的线程，并将工作均匀地分配给他们。这些线程将执行
