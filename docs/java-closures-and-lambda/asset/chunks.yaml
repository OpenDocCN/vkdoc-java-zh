    `*`


    `* @param featuredBook The book whose message is desired; never {@code null}`


    `* @return The message for the featured book; never {@code null}`


    `*/`


    `public String getFeaturedBookMessage(Book featuredBook) {`


    `Objects.requireNonNull(featuredBook, "featured book");`


    `return this.getFeaturedBooks().computeIfAbsent(featuredBook, book ->`


    `"Featured " + book.getGenre().toString().toLowerCase() + " book by "`


    `+ book.getAuthor()`


    `);`


    `}`


    Another common task with maps is to keep track of instance counts. For instance,
    consider if we wanted to generate genre counts for certain user-specified genres.
    For this, we can specify `computeIfPresent`. This method is the complement to
    `computeIfAbsent`: it only executes its lambda if the value already exists. This
    functionality is very useful for updating certain existing values without creating
    additional values in the map. To provide these genre counts, we will first initialize
    the desired keys to zero, and then we will iterate over all the books, incrementing
    the count if it already exists. We do this in Listing 3-8\. The `computeIfPresent`
    method is also useful for providing any kind of initialization or wrapping code
    on the values of the method while sidestepping the `null` check.


    Listing 3-8\. A Library instance method to provided featured book messages using
    Map.computeIfAbsent


    `public Map<Book.Genre, Integer> getGenreCounts(Book.Genre... genres) {`


    `Map<Book.Genre, Integer> toReturn = new HashMap<>();`


    `Arrays.asList(genres).forEach(genre -> toReturn.put(genre, 0));`


    `getBooks().forEach(book ->`


    `toReturn.computeIfPresent(book.getGenre(), (key, count) -> count + 1 )`


    `);`


    `return toReturn;`


    `}`


    It is also possible to use a single manipulator method to handle both missing
    and existing values. This method is simply called `compute`, and the lambda is
    applied with the current value for that key: if the key was not in the map before
    the method was called, the lambda is passed null as the value. If the lambda passed
    in does not return `null`, then the `compute` method is effectively the same as
    this:


    `map.put(key, f(key, map.get(key));`


    Obviously, this adds some complexity to the code, because you have to handle both
    the case when the key is already defined and the case when it is not. In exchange
    for handling this complexity, however, you get maximum flexibility. If we wanted
    to extend our code in Listing 3-6 to provide all the default message functionality
