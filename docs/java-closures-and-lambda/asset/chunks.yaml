- fmt: 'When Java 7 rolled out, it introduced the `invokedynamic` keyword (which we
    cover in chapter 8). The keyword was touted as being support for dynamic languages,
    but I recognized it for what it was: JVM support for those same functional stunts.
    There was no longer any technical reason why you could not perform the same functional
    stunts in Java itself. The Java language’s syntax, however, simply could not keep
    up with its underlying implementation. We had to wait until Java 8. With Java
    8, we finally got lambdas into the Java language itself, along with basic support
    for some of the most powerful functional stunts.


    This is a truly exciting language change. I think it is as transformative to the
    Java language as the introduction of object oriented programming in the first
    place, and it shows that the functional stunts, which were esoteric yet impressive
    back in perl, are truly primed to become industry standard practices. That is
    why this book is so critical: it is no exaggeration to say that learning the content
    in this book will help you program throughout the remainder of your career. Sooner
    or later, you are going to have to learn to harness the power of lambdas. Might
    as well start now.


    ## Acknowledgments


    It’s hard for non-writers to appreciate the sheer amount of work that goes into
    writing a text. From the long-suffering publisher, to the family members who see
    you only by ghastly screenlight, to friends who get tired of hearing you talk
    it through, writing is truly a corporate event. The author’s name may be on the
    cover, but it is the community of people behind the author who truly allowed the
    book to come into being.


    For this book, the team at Apress is made up of Steve Anglin, Anamika Panchoo,
    Mark Powers, and their group of editors. Thanks to them for giving me the opportunity
    to write this book, and for patience throughout the process. They made this book
    look and read better than I could have done on my own, and you are seeing it because
    of their work.


    Thanks to my friend, mentor, and co-blogger, Brian Hurt, who had the wisdom in
    the late twentieth century to recognize functional programming as the transformative
    technology of the early twenty-first. This was one time, of many others, where
    he has set me on the right course early on.


    Thanks also to the JRuby guru, Charlie Nutter (aka: Headius), who well-tolerated
    a young, starry-eyed developer with no love for Ruby but a deep interest in the
    JVM technology underlying JRuby.


    More broadly, thanks to the various tech communities who made programming seem
    cool, and to the friends that I made there. Thanks to Object Technology Users
    Group (OTUG), Ruby.MN, Groovy.MN, NFJS, and TriJug. Thanks specifically to Hamlet
    d’Arcy, Ted Naleid, Shaun Jurgemeyer, Ben Edwards, Jesse O’Neill-Oine, Scott Vlamnick,
    Ryan Applegate, Brian Sletten, and David Hussman.


    Thanks to my Other Mother, who did well reminding me that there was more to life
    than programming. If there is any charm, grace, and wit in this book, it’s because
    she demonstrated that one can both be a geek and have social skills.


    Thanks to my parents, whose Apple Macintosh was the first computer I broke, and
    who kicked me off the computer late at night more times than I care to remember.
    They banned me from the computer just enough to make it overwhelmingly enticing.
    The magical world constructed by computers in software has never lost its glamour.


    Thanks to my wife, Ashley, who gave me the time to write the book even as our
    child was growing through her first year. I could not have done it without her
    support.'
  raw: 'When Java 7 rolled out, it introduced the invokedynamic keyword (which we
    cover in chapter 8). The keyword was touted as being support for dynamic languages,
    but I recognized it for what it was: JVM support for those same functional stunts.
    There was no longer any technical reason why you could not perform the same functional
    stunts in Java itself. The Java language’s syntax, however, simply could not keep
    up with its underlying implementation. We had to wait until Java 8\. With Java
    8, we finally got lambdas into the Java language itself, along with basic support
    for some of the most powerful functional stunts.


    This is a truly exciting language change. I think it is as transformative to the
    Java language as the introduction of object oriented programming in the first
    place, and it shows that the functional stunts, which were esoteric yet impressive
    back in perl, are truly primed to become industry standard practices. That is
    why this book is so critical: it is no exaggeration to say that learning the content
    in this book will help you program throughout the remainder of your career. Sooner
    or later, you are going to have to learn to harness the power of lambdas. Might
    as well start now.


    Acknowledgments


    It’s hard for non-writers to appreciate the sheer amount of work that goes into
    writing a text. From the long-suffering publisher, to the family members who see
    you only by ghastly screenlight, to friends who get tired of hearing you talk
    it through, writing is truly a corporate event. The author’s name may be on the
    cover, but it is the community of people behind the author who truly allowed the
    book to come into being.


    For this book, the team at Apress is made up of Steve Anglin, Anamika Panchoo,
    Mark Powers, and their group of editors. Thanks to them for giving me the opportunity
    to write this book, and for patience throughout the process. They made this book
    look and read better than I could have done on my own, and you are seeing it because
    of their work.


    Thanks to my friend, mentor, and co-blogger, Brian Hurt, who had the wisdom in
    the late twentieth century to recognize functional programming as the transformative
    technology of the early twenty-first. This was one time, of many others, where
    he has set me on the right course early on.


    Thanks also to the JRuby guru, Charlie Nutter (aka: Headius), who well-tolerated
    a young, starry-eyed developer with no love for Ruby but a deep interest in the
    JVM technology underlying JRuby.


    More broadly, thanks to the various tech communities who made programming seem
    cool, and to the friends that I made there. Thanks to Object Technology Users
    Group (OTUG), Ruby.MN, Groovy.MN, NFJS, and TriJug. Thanks specifically to Hamlet
    d’Arcy, Ted Naleid, Shaun Jurgemeyer, Ben Edwards, Jesse O’Neill-Oine, Scott Vlamnick,
    Ryan Applegate, Brian Sletten, and David Hussman.


    Thanks to my Other Mother, who did well reminding me that there was more to life
    than programming. If there is any charm, grace, and wit in this book, it’s because
    she demonstrated that one can both be a geek and have social skills.


    Thanks to my parents, whose Apple Macintosh was the first computer I broke, and
    who kicked me off the computer late at night more times than I care to remember.
    They banned me from the computer just enough to make it overwhelmingly enticing.
    The magical world constructed by computers in software has never lost its glamour.


    Thanks to my wife, Ashley, who gave me the time to write the book even as our
    child was growing through her first year. I could not have done it without her
    support.'
  trans: '

    当 Java 7 推出时，它引入了 `invokedynamic` 关键字（我们将在第 8 章中介绍）。该关键字被标榜为对动态语言的支持，但我认清了它的本质：JVM
    对同样那些函数式技巧的支持。在 Java 本身中无法实现同样的函数式技巧，这已不再有任何技术上的理由。然而，Java 语言的语法却无法跟上其底层实现的步伐。我们不得不一直等到
    Java 8。随着 Java 8 的到来，我们终于将 lambda 引入了 Java 语言本身，并同时为一些最强大的函数式技巧提供了基础支持。


    这是一次真正令人兴奋的语言变革。我认为它对 Java 语言的变革意义，不亚于当初面向对象编程的引入，并且它表明，那些在 Perl 中曾显得深奥却令人印象深刻的函数式技巧，如今已真正准备好成为行业标准实践。这就是为什么这本书如此关键：毫不夸张地说，学习本书的内容将帮助你在整个职业生涯中进行编程。迟早，你将不得不学会驾驭
    lambda 的力量。不妨从现在开始。


    致谢


    非写作人士很难体会撰写一本书所付出的巨大工作量。从长期忍受煎熬的出版商，到只能在惨淡屏幕光线下见到你的家人，再到听你反复谈论而厌倦的朋友，写作确实是一项集体事业。封面上印着作者的名字，但真正让这本书得以问世的，是作者背后的一群支持者。


    对于本书，Apress 的团队由 Steve Anglin、Anamika Panchoo、Mark Powers 及其编辑团队组成。感谢他们给予我撰写本书的机会，并感谢他们在整个过程中的耐心。他们让这本书的外观和可读性都比我独自完成时更好，而你现在能看到它，正是因为他们付出的努力。


    感谢我的朋友、导师兼博客合著者 Brian Hurt，他在二十世纪末就富有远见地认识到函数式编程是二十一世纪初的变革性技术。这只是他多次让我及早走上正确道路的其中一次。


    还要感谢 JRuby 大师 Charlie Nutter（又名：Headius），他非常包容一位年轻、充满幻想、对 Ruby 并无热爱但对 JRuby 底层的
    JVM 技术有浓厚兴趣的开发者。


    更广泛地说，感谢那些让编程看起来很酷的各种技术社区，以及我在那里结识的朋友们。感谢对象技术用户组（OTUG）、Ruby.MN、Groovy.MN、NFJS
    和 TriJug。特别感谢 Hamlet d''Arcy、Ted Naleid、Shaun Jurgemeyer、Ben Edwards、Jesse O''Neill-Oine、Scott
    Vlamnick、Ryan Applegate、Brian Sletten 和 David Hussman。


    感谢我的另一位母亲，她很好地提醒了我，生活中还有比编程更重要的事情。如果这本书中有什么魅力、优雅和智慧，那都是因为她证明了，一个人既可以是个极客，也可以拥有社交技能。


    感谢我的父母，他们那台 Apple Macintosh 是我弄坏的第一台电脑，他们无数次在深夜把我从电脑前赶开，多到我不愿去回忆。他们恰到好处地禁止我使用电脑，反而让它变得无比诱人。计算机通过软件构建的魔法世界，从未失去它的魅力。


    感谢我的妻子 Ashley，她给了我时间写这本书，即使那时我们的孩子正在度过她的第一年。没有她的支持，我无法完成这本书。

