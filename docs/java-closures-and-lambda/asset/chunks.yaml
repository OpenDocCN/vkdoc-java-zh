    ## Conclusion


    I hope that you can now see the power of lambdas and streams to make concurrent
    code relatively easy. The code becomes very readable, and you separate out the
    execution details from the work to be done. This is truly one of the most impressive
    parts of post-functional code.


    Note that there is still a time and a place for the other approaches. A single
    thread is useful as a one-time fire-and-forget hook, or long-running background
    daemon tasks. Executors are useful when you have a variety of work to be done
    and need more control over the thread pooling. The fork/join framework works extremely
    well for recursive problems. But for the very common case of tying together a
    stream of operations, lambdas and the stream frameworks are a powerful and welcome
    addition to the Java SDK.


    # 7. Lambdas and Legacy Code


    At this point in this book, you have seen all the wonderful things that lambdas
    can do for your codebase. But what about the huge pile of legacy code that is
    out there? There is a lot of code to be merged into this new reality, and a lot
    of Java developers are commited to projects that have to drag forward those balls
    of mud. How can lambdas make their life easier?


    Furthermore, the new Java 8 APIs are very impressive, but there are many APIs
    in the Java SDK that have not yet been updated for the brave new lambda world.
    How do you take advantage of lambdas with APIs that are not at all intended to
    support it?


    The good news is that the Java language’s developers have been long concerned
    about this issue. Java is by its nature a conservative language, so the language
    developers could not break any of the existing Java code with radical language
    changes. The language developers could, however, add in new features and provide
    new powers and new APIs. Most important, they provided key functionality to bridge
    legacy code into our new world. That functionality, combined with a few key practices,
    means there is only a minor bit of code necessary to gain all the power of lambdas,
    even from code that has no idea about them.


    ## Resources and Exceptions


    The most awkward legacy pattern in Java is the “try-with-resource” pattern. This
    is where a stateful object – usually either an I/O object or a pool – needs to
    be put from an initial condition into an operational condition before you can
    use it, and then that stateful object also needs to be cleaned up when your user
    operation is completed on it. This pattern is widely adopted and conceptually
    works quite nicely with object-oriented programming. However, the implementation
    of this pattern has never worked well in Java, and the language has struggled
    with ways to improve it since the start.


    Initially, this pattern required you to declare a variable outside of a scope,
    then enter into a try/catch block. It was 14 additional lines of code required
    for each resource, which looked something like this:


    `InputStream in = null;`


    `try {`


    `in = acquireInputStream();`


    `// Do something with “in”`


    `} finally {`


    `if (in != null) {`


    `try {`


    `in.close();`


    `} catch (IOException closeException) {`


    `// What now?`


    `}`


    `in = null;`


    `}`


    `}`


    This creates the question of what to do with the `closeException` that may be
    thrown. If an exception is thrown while working with the resource, and then another
    exception is thrown while closing the resource, then what? If you throw `closeException`,
    the original exception (which is probably actually useful) is lost. The usual
    solution was to simply ignore the `closeException`, often hidden inside a method
    called something like `closeQuietly(InputStream in)`. This method could also then
    ignore null values. This made the code significantly shorter and somewhat more
    readable:


    `InputStream in = null;`


    `try {`


    `in = acquireInputStream();`


    `// Do something`


    `} finally {`


    `closeQuiety(in);`


    `in = null;`


    `}`


    There are some subtle problems with this code, however. At first glance, they
    may seem trivial, but they won’t be trivial when they crop up in your production
    code. The most significant of these subtle problems is that this code ignores
    any exception that occurs on close, which is exactly when buffered streams, compression
    streams, and cryptographic streams will throw their exceptions. This code will
    silently discard those exceptions, leaving the calling code (and the debugging
    developer) to think everything is just fine. This code pattern also still leaks
    the resource’s variable into the surrounding scope. If you forgot to assign the
    resource to `null`, you would then leak the object itself, preventing its timely
    garbage collection. The resource handling can also get lost or confused easily
    if there are catch clauses attached to the try, as well, and multiple resources
    would require nesting these structures within each other. The whole thing just
    has a kind of ugliness to it still.


    In an attempt to resolve this ugliness, Java 7 introduced the “try-with-resources”
    syntax structure. This allows you to declare your resources at the start of the
    try block, and it would automatically close the resources. You can assign anything
    that implements `java.lang.AutoCloseable` as a resource. That resource will be
    closed automatically when the try block completes. If an exception is thrown on
    close, then the exception will be propagated up to the caller. If there was already
    an exception thrown and an additional exception is thrown on close, than that
    additional exception is attached to the first as a suppressed exception: the stack
    trace will reveal the original exception as the primary cause, and the close exception
    as an additional suppressed exception. As an added benefit, you have clearly delimited
    boundaries for your variables, and the compiler guarnatees that they will be closed
    when you exit the block. Overall, this gives the kind of exception handling that
    people are looking for, and the code looks like this:


    `public void closeQuietlyTryWithResource() {`


    `try(InputStream in = acquireInputStream()) {`


    `// Do something`


    `} catch(IOException exception) {`


    `// Handle exception, which may include close exceptions`


    `}`


    `}`'
