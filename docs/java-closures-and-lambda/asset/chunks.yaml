    \ Stream<Result<String>>> onResult =\n        FunFile::getLines;\n    return listFiles(recurse).flatMap(\n\
    \        result -> result.map(onError, onResult)\n    );\n}\n```\n\n## 总结\n\n\
    在本章中，我们看到了Lambda在实际世界中的应用。我们了解了它们如何与检查型异常交互，以及如何通过接受回调和返回封装结果来处理这些异常情况。更重要的是，我们看到了如何通过使用Lambda工具处理流，来思考并解决一个非平凡问题。\n\
    \n在下一章中，我们将探讨另一个Lambda和流可以极大简化工作的难点领域：数据库访问。我们将扩展本章提出的方法，并进一步了解如何处理和转换数据元素本身。"
  raw: 'Before we leave the `getLines()` method, it is worth taking a sidebar to discuss
    the error condition handling in this method. If the underlying file is not a “plain
    file” (e.g., it is a directory), we return an `IOException` in the stream. The
    API requires that the file is a plain file, and so it not being a plain file is
    a violation of the API. The general rule is that checked exceptions are used for
    errors caused by changes in the execution environment, and unchecked exceptions
    are used for API violations. If a really good programmer wouldn’t see the exception,
    it is an unchecked exception; if the exception occurs because of something beyond
    the control of the program, it’s a checked exception. In this case, it’s arguably
    appropriate to use an unchecked exception, because it is a violation of the API.
    However, it is also possible that the file is not a plain file because it no longer
    exists. It might also return `false` because Java couldn’t determine the file
    type from the file system for some reason, which can happen with NFS. As a result,
    we are going with the standard checked exception error approach, even if it is
    an API violation.


    Now that we have the `getLines()` method, we need the `Walk` method to walk the
    tree. This reveals a slight ambiguity in our API definition: when we say “all
    the files in the directory,” do we mean “all the files that are immediate children
    of the directory,” or do we mean “all the files that are children of the directory,
    regardless of intervening directory depth”? In other words, is this a recursive
    listing or a simple listing? We can code it easily enough to support both approaches
    by taking an extra parameter: if `true`, we will recourse into subdirectories;
    if `false`, we won’t.


    The implementation of the `Walk` method is very straightforward, and given in
    Listing 4-9\. We use `Files.list(Path)` to implement the walk, and then `map`
    the results into a `FunFile` using the `new FunFile(Path)` constructor. The bulk
    of the method (in terms of lines of code) is spent implementing the recursion:
    in addition to handling directories and files distinctly, we also want to ensure
    that we don’t end up in an endless loop, so we have to check the canonical path.


    Listing 4-9\. The FunFile.listFiles(boolean) Method


    `/**`


    `* Returns a stream of the plain files in the directory, recursing into`


    `* subdirectories if the {@code recurse} argument is {@code true}.`


    `*`


    `* @param recurse Whether to recurse into subdirectories`


    `* @return The plain files in the directory; never {@code null}`


    `*/`


    `public Stream<Result<FunFile>> listFiles(boolean recurse) {`


    `if (!isDirectory()) {`


    `return Stream.of(new Result<>(new IOException(`


    `"File is not a directory: " + toString()`


    `)));`


    `}`


    `try {`


    `final String thisPath = this.getCanonicalPath();`


    `return Files.list(toPath()).map(FunFile::new).flatMap(file -> {`


    `if (recurse && file.isDirectory()) {`


    `final String filePath;`


    `try {`


    `filePath = file.getCanonicalPath();`


    `} catch (IOException ioe) {`


    `return Stream.of(new Result<>(ioe));`


    `}`


    `if (!thisPath.equals(filePath)) {`


    `return file.listFiles(true);`


    `} else {`


    `return Stream.empty();`


    `}`


    `} else if (file.isFile()) {`


    `return Stream.of(new Result<>(file));`


    `} else {`


    `return Stream.empty();`


    `}`


    `}`


    `);`


    `} catch (IOException ioe) {`


    `return Stream.of(new Result<>(ioe));`


    `}`


    `}`


    Now we just have to glue the two together. Again, we will take a `boolean` to
    determine whether or not we will recurse into subdirectories. The stream of files
    that we will be consuming is a `Stream` of `Result` instances, so we have to decide
    what to do with errors and what to do with results. Errors will just get passed
    along, wrapped as a `Stream` and then flattened back into the stream. The `FunFile`
    instances in the stream, however, will have their `getLines()` method called,
    which will return a stream and then that stream will be flattened into the stream.
    The result will be a flat stream of lines (and errors) generated by reading the
    lines out of all of the files. That is Listing 4-10\. All the work of this chapter
    built up to that one, simple method.


    Listing 4-10\. The FunFile. getLinesInDirectory(boolean) Method


    `/**`


    `* Provides all the lines of all the files in a directory. If this file`


    `* is not a directory, return a stream with a single element, which is a`


    `* single {@link Result} instance with an {@link IOException}. Otherwise,`


    `* return the concatenated stream of trying to read all the lines of all`


    `* the files in the directory using {@link #getLines()}, recursing into`


    `* subdirectories if the {@code recurse} argument is {@code true}.`


    `*`


    `* @param recurse Whether to recurse into subdirectories`


    `* @return The lines of all the files; never {@code null}`


    `*/`


    `public Stream<Result<String>> getLinesInDirectory(boolean recurse) {`


    `if (!isDirectory()) {`


    `return Stream.of(new Result<>(new IOException(`


    `"File is not a directory: " + toString()`


    `)));`


    `}`


    `Function<Exception, Stream<Result<String>>> onError =`


    `ex -> Stream.of(new Result<>(ex));`


    `Function<FunFile, Stream<Result<String>>> onResult =`


    `FunFile::getLines;`


    `return listFiles(recurse).flatMap(`


    `result -> result.map(onError, onResult)`


    `);`


    `}`


    ## Summary


    In this chapter, we saw lambdas in the real world. We saw how they interacted
    with checked exceptions, and how to work with those exceptional cases by accepting
    callbacks and returning encapsulated results. More importantly, we saw how to
    think through and develop a solution for a non-trivial problem by processing streams
    using our lambda tools.


    In the next chapter, we will address another difficult space where lambdas and
    streams can make life a lot easier: database access. We will extend the approach
    that we laid out here, but we will get to see more about working with and transforming
    data elements themselves.'
