    `                            boolean createdWord = createWord.executeUpdate()
    == 1;`

    `                            assert createdWord : "Could not create word: " +
    word;`

    `                            rs = createWord.getGeneratedKeys();`

    `                            hasNext = rs.next();`

    `                            assert hasNext : "Created word but still could not
