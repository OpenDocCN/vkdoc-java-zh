  raw: '### Lambdas as Closures


    Java 8’s lambdas act as closures. Although the term “lambda” and “closure” are
    effectively interchangeable in most programming conversations, there is a technical
    difference. The good news is that Java 8’s lambdas are also closures, so you can
    call them either and be technically correct. Understanding the distinction, however,
    helps you be clear about what you are saying.


    The term lambda comes from a branch of mathematics exploring what can and cannot
    be computed, specifically from a structure called the lambda calculus. The lambda
    calculus explores function application as the primary action in computation, and
    so it works with functions in the most abstract sense, without any consideration
    of what the function itself might represent or calculate. Functions themselves
    are the relevant values in the lambda calculus. When programming languages borrow
    the term lambda from the lambda calculus, they mean functions that can be treated
    as values. A lambda can be assigned to a variable (or multiple variables), passed
    around as method arguments, and generally manipulated like one might manipulate
    the values `2`, `true`, or `"foo"`.


    The term closure, however, refers to a later innovation of the lambda. For Java
    developers, it is easiest to think of the term closure as meaning encapsulating
    function. In the same way that an object can encapsulate state and expose it through
    a particular API (such as properties exposing fields), a closure can also encapsulate
    some state and then act on that state wherever and whenever the closure is invoked.
    The “close” part of closure refers to “open” versus “closed” variables. This idea
    comes directly from mathematics: a variable that does not have a value bound to
    it is said to be “open,” while a variable that does have a value bound to it is
    said to be “closed.” A closure is a lambda that closes certain variables, and
    it does this by enclosing a variable environment.


    This may sound like a strange and technical concept, but it is actually quite
    familiar in practice. Before Java 8 introduced lambdas, Java arguably already
    had closures in the form of anonymous inner classes.[¹](#A978-1-4302-5999-2_2_Chapter.html#Fn1)
    Anonymous inner classes could capture variable state in one context and execute
    on it in another: see Listing 2-6 as an example. In that case, the anonymous inner
    class implementing `Greeter` closes the variable `greeting`. You knew you were
    creating a closure in Java whenever the compiler would insist that you add `final`
    to your variable or parameter declaration.


    Java 8’s lambdas also act as closures, meaning that they will capture variables
    that are in scope. This is just like how the anonymous inner classes did it, and
    an equivalent example of a lambda as a closure is given in Listing 2-7\. As a
    bit of syntactic sugar, though, you no longer have to explicitly declare your
    variables as `final`: the compiler implicitly makes enclosed variables final,
    and will raise a compiler error if they are not treated as final.[²](#A978-1-4302-5999-2_2_Chapter.html#Fn2)


    Listing 2-6\. Anonymous Inner Classes as a Closure


    `public interface Greeter {`


    `String createGreeting(String whom);`


    `}`


    `public static void main(String[] args) {`


    `// Create variable in this scope`


    `final String greeting = "Hello, ";`


    `Greeter greeter = new Greeter() {`


    `@Override`


    `public String createGreeting(String whom) {`


    `// Close (ie: capture) the variable here`


    `return greeting + whom + "!";`


    `}`


    `};`


    `greetWorld(greeter);`


    `}`


    `public static void greetWorld(Greeter greeter) {`


    `// Have the greeter use the closed variable here`


    `// Note that the "greeting" variable is out of scope`


    `System.out.println(greeter.createGreeting("World"));`


    `}`


    Listing 2-7\. Lava 8’s Lambda as a Closure


    `public static void main(String[] args) {`


    `String greeting = "Hello, ";`


    `Function<String, String> greeter = whom -> greeting + whom + "!";`


    `greetWorld(greeter);`


    `}`


    `public static void greetWorld(Function<String, String> greeter) {`


    `System.out.println(greeter.apply("World"));`


    `}`


    ### No-Argument and Multi-Argument Lambdas


    The basic lambda is one that takes a single argument, but Java does not limit
    you to that case: you can have zero-argument lambdas, and you can have many-argument
    lambdas.[³](#A978-1-4302-5999-2_2_Chapter.html#Fn3) The syntax for each of these
    cases is slightly different and more complicated than the simple case.


    The syntax for a lambda with zero arguments is strange: how do you represent the
    absence of any arguments? Simply using the right arrow without any arguments would
    lead to many ambiguous cases in the Java syntax, so that is not an option. Instead,
    they introduced a placeholder for zero-argument functions, just like numbers have
    a placeholder symbol for zero. That placeholder is a left parenthesis immediately
    followed by a right parenthesis, which even looks like zero: `()`. An example
    of using it is in Listing 2-8; in that listing, we create a lambda that takes
    no arguments and always returns 1 as a `Number`.


    Listing 2-8\. Constant Supplier of Number Instances


    `Supplier<Number> function = () -> 1;`


    Note that we have a different type: the method signature that we want is no arguments
    and returning `Number`, but `Function` is an interface whose only method has a
    signature with a single argument, and so we need a different interface to represent
    this different signature.[⁴](#A978-1-4302-5999-2_2_Chapter.html#Fn4) For lambdas
    without arguments, the functional interface is `Supplier`: the name was picked
    because they are used to supply values without needing any input.


    It is also possible to have multi-argument lambdas. At this point, the syntax
    should be predictable: we will again use parentheses to demarcate the argument
    list, and we will again use type inference to specify our types. An example of
    a two-argument function (called a bifunction) is given in Listing 2-9. The functional
    type for these kinds of methods is `BiFunction`. Java’s SDK does not contain support
    for lambdas with more than two arguments, because you really shouldn’t be using
    lambdas for that kind of complex case. If you really want to have a lambda with
    lots of arguments, see “Lambdas as Interface Implementations” below for how to
    handle that case. It is also worth noting that you cannot use varargs (e.g., `String...
    strings`) as a lambda argument type: you have to treat the varargs parameter as
    an array. This sad fact is due to an unfortunate limitation in Java’s type system.[⁵](#A978-1-4302-5999-2_2_Chapter.html#Fn5)
    The good news is that there are limited cases when you need to have three or more
    arguments or varargs: zero-, one-, and two-argument functions handle most of your
    cases. Streams (covered in the next chapter) and currying (covered in the next
    subsection) provide for almost all these cases.


    Listing 2-9\. String Concatenation Bifunction


    `BiFunction<String, String, String> concat = (a, b) -> a + b;`'
