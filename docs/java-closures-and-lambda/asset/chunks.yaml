    for more on this.


    # 3. Lambda’s Domain: Collections, Maps, and Streams


    In the last chapter, we saw how lambdas themselves work, but we explicitly focused
    on lambdas without creating a context for their use. We extracted lambdas from
    their natural environment in order to analyze them under a microscope. In this
    chapter, we will begin to see lambdas in the wild.


    Specifically, we will see how lambdas can be used with the familiar structures
    of collections and maps. However, collections and maps actually limit the power
    of lambdas. To get at their true power, Java introduced a new concept using an
    old word: streams. This chapter will close with an analysis of Java 8’s streams,
    and how these functional streams allow for new forms of code reuse and expressiveness.


    This chapter will be more concrete than the last, and we will stay tied to a particular
    example. This particular example will have specific use cases where lambdas will
    help us out. However, to understand all of this, we first have to understand where
    Java 8’s lambdas are coming from. This requires us to make a quick return trip
    back into the strange world of functional programming languages.'
