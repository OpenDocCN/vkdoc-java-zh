    在 Java 8 中，人们很容易想将 `threadFactory` 和 `handler` 内联提供。不幸的是，这会导致代码看起来像这样：


    `ThreadPoolExecutor tpe = new ThreadPoolExecutor(`


    `processorCount,`


    `processorCount * 2 + 1,`


    `1L, TimeUnit.SECONDS,`


