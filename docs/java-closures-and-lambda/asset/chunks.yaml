  raw: '### Method Two: Building a Stream Using Stream.of and Stream.flatMap


    When we are looking to move from a ResultSet to a Stream, our problem is that
    we have trouble getting into the Stream API. This approach gets into the Stream
    API by constructing a single-element stream holding just the ResultSet. We will
    then use the `Stream.flatMap` method that we saw last chapter to explode the ResultSet
    into the resulting objects.


    In this approach, the stream consisting of a single element will be constructed
    through `Stream.of(resultSet)`. The `Stream.of` method takes any number of arguments,
    and will construct a highly efficient stream containing those elements in argument
    order. Unlike the `Stream.Builder` approach, where objects can be determined and
    passed in at run time after the builder is initiated, the elements of `Stream.of`
    all need to be provided immediately at the point when the method is invoked.


    To convert the stream from a single ResultSet into the mapped elements, we will
    use `Stream.flatMap`. As we saw in the last chapter, this allows each element
    of the source stream to be mapped into zero or more elements of the result stream.
    In our case, the single ResultSet element of the source stream is mapped into
    one WordUsage element for each row of the ResultSet.


    The catch we have here is that we will need to leave the ResultSet open until
    all the rows are processed. In order to close the ResultSet at the appropriate
    time, we can use `Stream.onClose(Runnable)`. This method allows you to hook a
    callback to be executed when the stream is closed. It is not often used, but it
    does enable you to delegate responsibility for resource management to stream itself.
    This is very useful for keeping your code clean and not threading resources through
    calls in your codebase.


    The one catch with using `Stream.onClose(Runnable)` is that you need to use the
    returned `Stream`. Some Java developers will register the handler with onClose
    and presume that the stream instance itself has been modified. This may, in fact,
    be the case. However, the Stream API allows the stream implementation to return
    an entirely new instance with the handler attached, and so you want to be sure
    that you use that returned instance.


    So we can now pull all this together. We will use Stream.of to create the single-element
    stream with a ResultSet. That stream will have the ResultSet registered with it,
    so that the stream will close the ResultSet. We will have a flatMap call that
    will be passed the iteration and stream building code: that code will be just
    like we had in the previous section. This code is given in Listing 5-6.


    Listing 5-6\. Using Stream.of and Stream.flatMap to Convert a ResultSet to a Stream


    `public static Stream<WordUsage> createStream(ResultSet resultSet)`


    `throws SQLException`


    `{`


    `Stream<ResultSet> rsStream = Stream.of(resultSet).onClose(() -> {`


    `try {`


    `resultSet.close();`


    `} catch (SQLException ignore) {}`


    `}`


    `);`


    `return rsStream.flatMap(rs -> {`


    `Stream.Builder<WordUsage> builder = Stream.builder();`


    `try {`


    `while (rs.next()) {`


    `WordUsage usage = WordUsage.fromResultSet(rs);`


    `builder.add(usage);`


    `}`


    `} catch (SQLException sqle) {`


    `// TODO Handle exceptions`


    `}`


    `return builder.build();`


    `}`


    `);`


    `}`


    There are a number of advantages to this approach. The ResultSet is not processed
    until the stream is actually exercised, which defers the expensive read from the
    ResultSet until and unless it is actually needed. Exceptions that arise while
    reading the data are moved from the caller’s flow into the flow of the stream,
    which is a more appropriate place for them to be. The resulting stream will be
    the highly optimized stream coming out of the Stream.Builder still, which is a
    major payoff. Finally, all the setup work for the stream handling is allowed to
    take place before the execution of the result set and the processing, which will
    streamline the execution.


    The disadvantage of this approach is that it is still a hog, even if it is a deferred
    hog. All the results have to be cached into memory before any of them can be processed.
    Also, the ResultSet must be fully read before any result can be processed. This
    means that we cannot leverage the time waiting for the database processing and
    network latency to process results that have already come in. We would like to
    start our processing as quickly as possible, and that is where the next couple
    of alternatives come into play.


    #### Mapping the ResultSet with Result-Based Error Handling


    Another issue with this approach in Listing 5-6 is error handling: we are going
    to have a SQLException instance being thrown, but what are we supposed to do with
    it? In Listing 5-6, we left a TODO and silently swallowed it. We could wrap it
    in a RuntimeException and throw the unchecked exception, but then we are ignoring
    an exception that we almost certainly want to be handling, and probably making
    a mess of our types in the process. We can use the `funjava.Result` type from
    the FunJava library to solve this problem.


    In the last chapter, we started working with `Funjava Result`_type in order to
    capture the error handling and make it an explicit part of the stream flow. We
    can take advantage of that result again. Instead of our createStream method taking
    just a ResultSet, we will also require it to provide us an error handler. Instead
    of registering the close with the Stream’s `onClose` handler, we will perform
    the close immediately in the processing flow. The caller will provide the implementation
    of error handling, and we will apply it using the ResultErrorHandler class, just
    as we saw in the last chapter. The result is a much more robust implementation
    of that method, and it is given in Listing 5-7.


    Listing 5-7\. Using the Result Type for a More Robust Stream.of and Stream.flatMap
    Conversion


    `public static Stream<WordUsage> createStream(`


      `ResultSet resultSet, Consumer<Exception> errorHandler`


    `)`


        `throws SQLException {`


      `return Stream.of(resultSet).flatMap(rs -> {`


            `Stream.Builder<Result<WordUsage>> builder = Stream.builder();`


            `try {`


              `while (rs.next()) {`


                `try {`


                  `WordUsage usage = WordUsage.fromResultSet(rs);`


                  `builder.add(Result.of(usage));`


                `} catch(SQLException sqle) {`


                  `builder.add(Result.of(sqle));`


                `}`


              `}`


            `} catch (SQLException sqle) {`


              `builder.add(Result.of(sqle));`


            `} finally {`


              `try {`


                `rs.close();`


              `} catch (SQLException sqle) {`


                `builder.add(Result.of(sqle));`


              `}`


            `}`


            `return builder.build();`


          `}`


      `).flatMap(new ResultErrorHandler<>(errorHandler));`


    `}`'
  trans: '

    ### 方法二：使用 Stream.of 和 Stream.flatMap 构建流


    当我们试图从 ResultSet 迁移到 Stream 时，问题在于难以进入 Stream API。本方法通过构建一个仅包含 ResultSet 的单元素流来进入
    Stream API。随后，我们将使用上一章学到的 `Stream.flatMap` 方法，将 ResultSet 展开为结果对象。


    在此方法中，由单个元素构成的流将通过 `Stream.of(resultSet)` 构建。`Stream.of` 方法接受任意数量的参数，并会构建一个高效流，其中包含按参数顺序排列的元素。与
    `Stream.Builder` 方法不同（后者可以在构建器启动后，在运行时确定并传入对象），`Stream.of` 的所有元素都必须在调用该方法时立即提供。


    为了将单个 ResultSet 流转换为映射后的元素，我们将使用 `Stream.flatMap`。正如我们在上一章所见，这允许源流中的每个元素被映射到结果流中的零个或多个元素。在我们的场景中，源流中的单个
    ResultSet 元素会被映射为 ResultSet 中每一行对应的一个 WordUsage 元素。


    这里我们面临的问题是，需要保持 ResultSet 处于打开状态，直到所有行都被处理完毕。为了在适当时机关闭 ResultSet，我们可以使用 `Stream.onClose(Runnable)`。此方法允许你挂载一个回调，该回调会在流关闭时执行。虽然不常用，但它确实能让你将资源管理的责任委托给流本身。这对于保持代码整洁，以及避免在代码库的调用中传递资源非常有用。


    使用 `Stream.onClose(Runnable)` 的一个注意事项是，你需要使用返回的 `Stream`。一些 Java 开发者会通过 onClose
    注册处理器，并认为流实例本身已被修改。实际情况可能确实如此。然而，Stream API 允许流实现返回一个附加了处理器的全新实例，因此你需要确保使用的是那个返回的实例。


    现在我们可以将所有内容整合起来。我们将使用 Stream.of 创建一个包含 ResultSet 的单元素流。该流会注册 ResultSet，以便流在关闭时能关闭
    ResultSet。我们将有一个 flatMap 调用，其中会传入迭代和流构建代码：这段代码将与上一节中的代码类似。具体代码见清单 5-6。


    **清单 5-6. 使用 Stream.of 和 Stream.flatMap 将 ResultSet 转换为 Stream**


    `public static Stream<WordUsage> createStream(ResultSet resultSet)`


    `throws SQLException`


    `{`


    `Stream<ResultSet> rsStream = Stream.of(resultSet).onClose(() -> {`


    `try {`


    `resultSet.close();`


    `} catch (SQLException ignore) {}`


    `}`


    `);`


    `return rsStream.flatMap(rs -> {`


    `Stream.Builder<WordUsage> builder = Stream.builder();`


    `try {`


    `while (rs.next()) {`


    `WordUsage usage = WordUsage.fromResultSet(rs);`


    `builder.add(usage);`


    `}`


    `} catch (SQLException sqle) {`


    `// TODO 处理异常`


    `}`


    `return builder.build();`


    `}`


    `);`


    `}`


    这种方法有许多优点。ResultSet 只有在流实际被使用时才会被处理，这将从 ResultSet 读取数据的昂贵操作推迟到真正需要时才执行。读取数据时产生的异常会从调用者的流程转移到流的流程中，这对它们来说是更合适的位置。最终生成的流仍然是来自
    Stream.Builder 的高度优化流，这是一个重要的回报。最后，流处理的所有设置工作都可以在执行结果集和处理之前完成，这将简化执行流程。


    这种方法的缺点是，即使它是延迟处理的，它仍然是一个资源消耗大户。所有结果都必须先缓存到内存中，然后才能处理其中任何一个。此外，在处理任何结果之前，必须完整读取
    ResultSet。这意味着我们无法利用等待数据库处理和网络延迟的时间来处理已经到达的结果。我们希望尽快开始处理，这正是接下来几种替代方案发挥作用的地方。


    #### 使用基于结果的错误处理来映射 ResultSet


    清单 5-6 中这种方法的另一个问题是错误处理：我们会抛出一个 SQLException 实例，但我们该如何处理它呢？在清单 5-6 中，我们留下了一个 TODO
    并默默地吞掉了它。我们可以将其包装在 RuntimeException 中并抛出这个非受检异常，但这样我们就忽略了一个几乎肯定需要处理的异常，并且可能会在这个过程中搞乱我们的类型。我们可以使用
    FunJava 库中的 `funjava.Result` 类型来解决这个问题。


    在上一章中，我们开始使用 `Funjava Result` 类型来捕获错误处理，并将其作为流流程中明确的一部分。我们可以再次利用这个结果。我们的 createStream
    方法不仅接受一个 ResultSet，还需要调用者提供一个错误处理器。我们不会在流的 `onClose` 处理器中注册关闭操作，而是在处理流程中立即执行关闭。调用者将提供错误处理的实现，我们将使用
    ResultErrorHandler 类来应用它，就像我们在上一章中看到的那样。结果是该方法的一个更健壮的实现，如清单 5-7 所示。


    **清单 5-7. 使用 Result 类型实现更健壮的 Stream.of 和 Stream.flatMap 转换**


    `public static Stream<WordUsage> createStream(`


      `ResultSet resultSet, Consumer<Exception> errorHandler`


    `)`


        `throws SQLException {`


      `return Stream.of(resultSet).flatMap(rs -> {`


            `Stream.Builder<Result<WordUsage>> builder = Stream.builder();`


            `try {`


              `while (rs.next()) {`


                `try {`


                  `WordUsage usage = WordUsage.fromResultSet(rs);`


                  `builder.add(Result.of(usage));`


                `} catch(SQLException sqle) {`


                  `builder.add(Result.of(sqle));`


                `}`


              `}`


            `} catch (SQLException sqle) {`


              `builder.add(Result.of(sqle));`


            `} finally {`


              `try {`


                `rs.close();`


              `} catch (SQLException sqle) {`


                `builder.add(Result.of(sqle));`


              `}`


            `}`


            `return builder.build();`


          `}`


      `).flatMap(new ResultErrorHandler<>(errorHandler));`


    `}`

