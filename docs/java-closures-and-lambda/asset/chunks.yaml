- fmt: "该类的构造函数需要扩展`AbstractSpliterator`构造函数。该构造函数接受两个参数：`spliterator`的预估大小和`spliterator`的特征。`spliterator`的预估大小顾名思义，是对返回元素数量的粗略估计。如果`spliterator`的大小完全未知，则使用魔法值`Long.MAX_VALUE`。第二个参数是`spliterator`的特征，通过它你可以向运行时建议你的`spliterator`应如何使用。\n\
    \n`spliterator`有多种特征，它们被视为一个位字段。其中最重要的两个是`IMMUTABLE`和`CONCURRENT`，它们指定了`spliterator`与数据源的关系。如果`spliterator`对数据源的视图不可更改，则应指定`IMMUTABLE`。我们的`ResultSet`的`spliterator`就属于这种情况，因为SQL查询的结果不可更改。或者，如果`spliterator`对数据源的视图可以被并发修改，则应指定`CONCURRENT`。这适用于操作线程安全集合或内存映射文件的`spliterator`。\n\
    \n`spliterator`还可以具有其他几种特征。与互斥的`IMMUTABLE`和`CONCURRENT`不同，这些特征更加独立：以下任何特征都不排斥其他特征。最重要的是`ORDERED`。该特征保证元素将按“遭遇顺序”处理，即`spliterator`的迭代顺序。如果你向`spliterator`传递`ORDERED`，你将获得一个类似于顺序流的API——实现中仍有一些并行化的余地，但不多。如果你指定了`ORDERED`，还可以指定`SORTED`。如果你的`spliterator`是`SORTED`，那么要么你的`spliterator`附加了一个比较器，要么元素根据其自然顺序排序。这允许对排序进行一些优化，并且允许并行处理`spliterator`的结果，然后再按顺序排序。`DISTINCT`标志表示`spliterator`的每个元素都与其他元素不同。这表示无需额外工作来过滤重复值，例如在`Stream.distinct()`中。`NONNULL`特征断言`spliterator`的任何结果都不会为`null`，从而可以绕过一些安全检查。最后，`SIZED`和`SUBSIZED`特征都断言`spliterator`的预估大小是准确的。`SUBSIZED`额外保证从此`spliterator`拆分出的`spliterator`本身也将是`SIZED`和`SUBSIZED`：换句话说，`SUBSIZED`意味着不仅已知元素总数，而且如果元素被分解到不同的`spliterator`中，则部分大小也是已知的。\n\
    \n在我们的案例中，每一行都会创建一个实例，因此我们可以使用`NONNULL`特征。由于最好避免使用`null`，我们可以直接在类中实现这一点。在我们的特定案例中，我们还知道每个生成的`WordUsage`实例都与其他实例不同，因此我们可以使用`DISTINCT`特征。然而，并非每个SQL查询都必然如此。我们不知道将要创建的实例总数，因此不能使用`SIZED`。我们当前的查询也没有任何排序，并且确实不需要排序，因此我们不会使用`ORDERED`。最后，SQL查询的结果在迭代期间无法修改，因此我们可以返回`IMMUTABLE`选项。确定这些之后，我们可以构建构造函数，得到清单5-10中的类。\n\
    \n清单5-10. 带构造函数的`ResultSetSpliterator`\n\n```\nimport java.sql.ResultSet;\nimport\
    \ java.sql.SQLException;\nimport java.util.*;\nimport java.util.function.*;\n\n\
    /**\n * A {@link java.util.Spliterator} that traverses a\n * {@link java.sql.ResultSet}.\
    \ When the result set is exhausted,\n```"
  raw: 'The constructor for this class will have to extend the AbstractSpliterator
    constructor. That constructor takes two arguments: the estimated size of the spliterator
    and the characteristics of the spliterator. The estimated size of the spliterator
    is just that: it is a vague estimation of the number of elements returned. If
    the size of the spliterator is not known at all, then the magic value `Long.MAX_VALUE`
    is used. The second argument is the characteristics of the spliterator, and this
    is how you suggest to the runtime how your spliterator can be used.


    There are a number of characteristics, and they are treated as a bitfield. The
    two most important are `IMMUTABLE` and `CONCURRENT`, and those specify the relationship
    of the spliterator to the source. If the spliterator’s view of the source cannot
    be changed, then the spliterator should specify `IMMUTABLE`. This will be the
    case with our ResultSet spliterator, since the results of a SQL query cannot be
    changed. Alternatively, if the spliterator’s view of the source can be concurrently
    modified, then the spliterator should specify CONCURRENT. This could be the case
    in a spliterator that acted on a thread-safe collection or a memory-mapped file.


    There are a few other characteristics that a spliterator can have. Unlike IMMUTABLE
    and CONCURRENT, which are mutually exclusive, these are more distinct: none of
    the following characteristics excludes the others. The most significant is ORDERED.
    This characteristic guarantees that elements will be processed in “encounter order,”
    which is the iteration order for the spliterator. If you pass ORDERED to a spliterator,
    you will have an API that is akin to a sequential stream — there’s still some
    wiggle room for parallelism in the implementation, but not much. If you are ORDERED,
    you can also be SORTED. If your spliterator is SORTED, then either your spliterator
    has a comparator attached, or the elements are sorted according to their natural
    ordering. This allows some optimizations for sorting, and also allows the results
    of the spliterator to be processed in parallel and then sorted back into order.
    The DISTINCT flag signals that each element of the spliterator is distinct from
    every other element. This signals that no additional work is needed to filter
    out redundant values, such as in `Stream.distinct()`. The NONNULL characteristic
    asserts that no result from the spliterator will ever be null, which allows some
    safety checks to be bypassed. Finally, the SIZED and SUBSIZED characteristics
    both assert that the estimated size for the spliterator is accurate. SUBSIZED
    additionally guarantees that spliterators that are split off this spliterator
    will themselves be SIZED and SUBSIZED: in other words, SUBSIZED means that not
    only is the total number of elements known, but if there is a breakout of elements
    into distinct spliterators, then the partial sizes are also known.


    In our case, every row will create an instance, so we can use the NONNULL characteristic.
    Since it is best to avoid `null` in general, we can make this directly in our
    class. In our particular case, we also know that every resulting WordUsage instance
    is distinct from the others, so we can use the DISTINCT characteristic. However,
    this is not necessarily the case for every SQL query. We do not know the total
    number of instances we will create, so we cannot be SIZED. We also don’t have
    any ordering in our current query and don’t really have any need for an ordering,
    so we won’t be ORDERED. Finally, the results of the SQL query cannot be modified
    during our iteration, so we can return the IMMUTABLE option. With that decided,
    we can build out the constructor, giving us the class in Listing 5-10.


