    \    }\n}\n```\n\nThe timing given by our `DemoRunner` is not scientific, but\
    \ it will do for basic comparisons. On my computer, `Listing1.printPrimes` takes\
    \ roughly 50 seconds to complete. (On your computer, it could take much longer;\
    \ if you are running the code at home and it takes too long, reduce `MAX_BITLENGTH`\
    \ to get a more reasonable result.) My computer, however, is barely breaking a\
    \ sweat: only four of my eight cores are busied at all, and they hang out at about\
    \ 50% utilization each. Let’s see if we can use concurrency to make better use\
    \ of our hardware.\n\nWe will start by using classic Java threads; those are what\
    \ most developers are probably familiar with. Lambdas help somewhat here. However,\
    \ thread management was tricky, and people wanted to use thread pools, so Java\
    \ introduced the concept of Executors to simplify things. Lambdas help even more\
    \ with executors. Most important, however, we get the concept of streams of execution\
