    ## 流


    到目前为止，我们所讨论的一切都围绕着原地编辑现有的 `Collection` 或 `Map`。然而，在本书的剩余部分，我们将聚焦于 lambda 的真正力量：函数式流（以下简称“流”）。支持流的类主要收集在全新的
    `java.util.stream` 包中，但 Java SDK API 的其他部分也散布着一些流 API 的精华。接下来的几章都将围绕这些 API（或它们不幸的缺失）将如何改变你使用
    Java 8 编写代码的方式。不过，在此之前，我们需要先理解什么是流以及它是如何工作的。


    流类似于迭代器，但具有明显更广泛的能力。对于迭代器，一直存在一个假设：你只会遍历它一次，并且总是在同一个线程上，而且总是有一个底层的集合被遍历。曾有过一些尝试，试图基于集合之外的东西（例如文件的行）构建迭代器，甚至还有一些尝试让迭代器表现得像惰性列表或供应者。将这种期望的功能塞进
    `Iterator` API 中，总感觉像是试图把方钉塞进圆孔里。更重要的是，你能用迭代器做的事情总是相当有限。例如，与 I/O 流不同，从未发展出广泛采用的、用于包装迭代器或操作其返回值的支持。迭代器就是你用来以非常命令式的风格简单遍历元素的东西，仅此而已。


    然而，对于流来说，情况完全不同。流可以显式地并行化，这使得用户代码和库本身能够从多个线程读取流并执行它们。流被设计为可以通过 `Function` lambda
    进行转换，通过 `Predicate` lambda 进行过滤，并且通常以我们喜爱的函数式风格进行操作。更棒的是，它们可以通过多种方式收集在一起，从而能够接入任何遗留
    API，或高效地实现复杂处理。


    流的生命周期比迭代器的生命周期稍微复杂一些，因为涉及的事情要多得多。流的生命周期是：


    创建 → 映射和过滤（称为中间步骤） → 收集、处理或归约（称为终端步骤）


    这三个步骤中的每一个都可以采用多种形式，你可以像搭积木一样混合搭配它们，以构建几乎任何你能想象到的流程。这提供了极大的灵活性，并且由于类型系统的存在，相对容易管理。更棒的是，步骤
    2 和步骤 3 的并行性由 Java 自动为你处理，因此 Java 运行时和库本身会自动优化你的实现。


    ### 流的创建


    第一步，“创建”，是你生成流的地方。生成时，流尚未对底层数据做任何操作，就像 I/O 流在你创建它时尚未读取任何字节一样。流仅仅知道如何开始生成数据，并且它提供了一个丰富的
    API 和大量的元数据用于生成这些数据。


    你可以使用 `stream()` 或 `parallelStream()` 方法从 `Collection` 生成流。`stream()` 方法生成一个顺序（非并行）流，当你需要按迭代顺序处理
    `Collection` 的元素时，这很有用。但是，如果你没有任何执行顺序的要求，那么始终最好使用 `parallelStream()` 请求一个流。该方法允许生成的流以任何顺序处理元素，包括并发处理它们。


    值得注意的是，如果 `Collection` 不支持并行性，你仍然可能从 `parallelStream()` 得到一个顺序流：调用 `parallelStream`
    并不是要求一个可并行的流，而是允许返回的流是可并行的。这些方法提供了从 `Collection` API 到 `Stream` API 的桥梁，因此很容易迁移你的代码。¹
    类似地，如果你想从数组生成流，则使用 `Stream.of(array)` 方法。


    在最底层，可以使用 `Stream` 接口上的静态方法来生成流。特别是，你可以使用 `generate` 方法基于 `Supplier` 函数式接口生成一个
    `Stream`，并且你可以使用 `iterate` 方法基于某个初始值和一个递增 lambda 创建一个迭代的流（例如，传入 `0` 和 `x->x+1`
    作为 lambda，创建一个从零开始计数的流）。最后，`Stream` 类通过 `builder()` 方法提供了一个构建器类，因此你可以将元素传入构建器，然后基于结果生成流。


    当我们进入流生成时，我们就进入了这些被称为“分割迭代器”的奇怪生物的巢穴。分割迭代器可以被视为流的幼虫形态：它们通过 `StreamSupport.stream`
    方法进入茧中，然后作为完全成形的 `Stream` 实例出现。它们本身足够复杂，值得进行更详细的讨论，不过，我们将在第 9 章讨论 lambda 和流实现细节时，详细探讨分割迭代器。在大多数情况下，用户可以并且应该坚持使用
    `Stream` 接口本身：依赖库支持来隐藏分割迭代器的实现细节。


    你在这里和 Java SDK 中看到的流并非唯一可能。Webonise Lab 的 `FunJava` 库提供了其他生成流的方式：具体来说，该库提供了基于数据库
    `ResultSet`、基于文件内容、基于目录结构以及基于 `InputStream` 和 `Reader` 实例的流。我们将在关于使用流处理文件和数据库调用的章节中详细介绍这些流生成器，并且你可以将这些实现用作你自己流实现的模型。然而，为了聚焦重点，本章我们将坚持使用
    Java 本身提供的那些更简单的流。

