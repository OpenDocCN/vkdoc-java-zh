    `try {`


    `boolean submitted = fullQueue.offer(`


    `rejected,`


    `1L, TimeUnit.SECONDS`


    `);`


    `if (submitted) return;`


    `} catch (InterruptedException e) {`


    `// 继续执行`


    `}`


    `// 如果执行到这里，说明队列确实已经满了`


