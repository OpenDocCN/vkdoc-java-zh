    ### Map Computations


    The `Map` class itself has been extended with some functional-style manipulations
    that allow you to work with particular keys. These methods are not directly inspired
    by functional programming techniques, but rather are shorthand for common code
    such as the following:


    `// Default values`


    `String value = map.get(key);`


    `if(value == null) {`


    `value = computeValue(key);`


    `map.put(key, value);`


