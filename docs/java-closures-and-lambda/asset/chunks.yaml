    The main class just delegates to `printPrimes`. That method defines our exception
    handler and creates a queue for the prime strings. We then launch a thread for
    each processor. Each of those threads will generate an even portion of the primes,
    and put them into a blocking queue. Then we launch another thread whose sole job
    it is to read off that queue and print out the values. We need some way to tell
    that printer thread that we are done, so we have to declare a signal that the
    printer is required to monitor on each loop. This whole thing feels rather like
    a Rube Goldberg machine.


    On my computer, this code runs in about 14.5 seconds, and we are happily saturating
    all the processors. However, this code is pretty ugly: we are doing something
    extremely simple, and there is a bunch of ceremony and noise obscuring that simple
    effort. All of that ceremony and noise is necessary because of the fact that we
    are working with the `Thread` class directly. Working with threads this way is
    incredibly awkward, which is why Java introduced executors. In the next section,
    we will see that lambdas help clean those up, too.


    ## Lambdas and Executors


    The `ExecutorService` and its related classes are convenient wrappers around the
    `Thread` class. They provide the proven and standard patterns of thread execution:
    there are executors for responsively sized thread pools, executors for fixed sized
    thread pools, executors that will generate threads on demand and then cache them,
    and executors that wrap a single thread. If you find yourself wanting to do something
    with threads fancier than the executors can support, then you are either working
    on a PhD thesis or doing something wrong.


    In all these cases, the usage is the same: you pass an instance of the `Callable`
    interface into the executor, and it returns a `Future` instance that is a handle
    on the result. That `Future` instance also provides access to any error that occurred
    during the processing. This usage has three major advantages over the `Runnable`
    approach done by threads: first, you can return a value from your concurrent processing;
    second, your errors are not silently swallowed (assuming you get the result from
    the `Future`); and third, a thread can only run one `Runnable` instance, but an
    executor’s thread can run handle multiple `Callable` instances. Just like with
    the `Thread`’s inline `Runnable` implementation, though, we can provide our `Callable`
    implementation inline using lambdas. This makes the code much simpler to read.


    We can see these advantages in play when we rewrite our kata using the executors.
    Instead of coming up with a clever way to divvy up the work evenly, we will simply
    add all the work to be done into our primary processing executor. Just like before,
    that executor will have as many threads as we have processors, and it will be
    responsible for the CPU-intensive work. We will hand the I/O intensive work off
    to another executor, which will be a single thread. Since the hand-off is cleaner,
    we can set the I/O intensive thread to be maximum priority, ensuring that it executes
    as much as possible: we see again there that lambdas make the code much more readable,
    since we can specify the `ThreadFactory` implementation inline. The code for this
    kata is given in Listing 6-3.


    Listing 6-3\. Using Lambdas to Define ExecutorService Work Instances


    `import java.math.BigInteger;`


    `import java.util.*;`


    `import java.util.concurrent.*;`


    `public class Listing3 {`


    `public static void printPrimes(int maxBitLength) {`


    `ExecutorService executor =`


    `Executors.newFixedThreadPool(Runtime.getRuntime().availableProcessors());`


    `ExecutorService printExecutor = Executors.newSingleThreadExecutor(r -> {`


    `Thread t = new Thread(r);`


    `t.setPriority(Thread.MAX_PRIORITY);`


    `return t;`


    `}`


    `);`


    `// The resulting work`


    `List<Future<?>> futures = new ArrayList<>(maxBitLength);`


    `for (int i = 0; i < maxBitLength; i++) {`


    `int bitLength = i + 1;`


    `Future<String> stringFuture = executor.submit(() -> {`


    `BigInteger prime = PrimeFactory.ofLength(bitLength);`


    `return prime.toString();`


    `}`


    `);`


    `futures.add(printExecutor.submit(() -> {`


    `String primeString = stringFuture.get();`


    `System.out.println(primeString);`


    `return null;`


    `}`


    `)`


    `);`


    `}`


    `// Signal that there will be no more tasks added`


    `executor.shutdown();`


    `printExecutor.shutdown();`


    `// Wait for everything to complete and check for errors`


    `futures.parallelStream().forEach(future -> {`


    `try {`


    `future.get();`


    `} catch (InterruptedException | ExecutionException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `);`


    `}`


    `public static void main(String[] args) {`


    `DemoRunner.run(Listing3::printPrimes);`


    `}`


    `}`


    This code is much nicer compared to Listing 6-2\. There is no need for us to declare
    flags or hand-off queues; instead, we just pass one Future into the work for another,
    and we work with the resulting futures. We still get our saturated processor cores,
    and we still get our dedicated thread to I/O. You may be concerned about the overhead
    incurred by the executor classes as opposed to our “hand-tuned” implementation,
    but the result is actually half a second faster on my computer, coming in at 14.0
    seconds.


    If you were paying close attention, you probably caught the invocation of `futures.parallelStream()`.
    We saw in the last chapter how streams can be set to process in parallel, with
    the result being some additional transparent concurrency. Here, the parallelism
    allows us to check the futures for errors very quickly, and all it cost was a
    method call. That is very powerful, but we are not quite ready to get into that
    concurrency approach: we will get there in a later section of this chapter. There
    is still more to be done here with Java’s preexisting concurrency tools!'
