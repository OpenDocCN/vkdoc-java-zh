- fmt: "# A Tour of Paradigms\n\nMany books, articles, and conversations will wax\
    \ poetic about programming language paradigms, comparing and contrasting “imperative,”\
    \ “object-oriented,” and “functional” without explaining what they are. Worse,\
    \ when people go to explain these particular styles, the result is often rather\
    \ vague. This appendix will provide an overview of the three dominant paradigms\
    \ in post-functional programming by implementing the same functionality three\
    \ different ways: we will use a database set-up process as a common problem, and\
    \ show how you would solve that problem in each of the different paradigms. All\
    \ of this will be done directly from within Java, so you can see how Java looks\
    \ when forced to be strongly in one single paradigm. At the end of the chapter,\
    \ we will highlight some additional programming paradigms and styles so that you\
    \ are at least familiar with the terms.\n\nThe database that we will be setting\
    \ up is the database we used in [chapter 5](#A978-1-4302-5999-2_5_Chapter.html).\
    \ This is a collection of the words used in all the works of Shakespeare, indexed\
    \ by line. The database looks like Figure [A-1](#A978-1-4302-5999-2_9_Chapter.html#Fig1).\
    \ The data comes from the Project Gutenberg text at [`http://www.gutenberg.org/ebooks/100`](http://www.gutenberg.org/ebooks/100).\
    \ To create this database, we will have to perform the following steps:\n\n- Create\
    \ the schema, including the tables.\n- Parse and insert the works of Shakespeare\
    \ file. Empty lines and comments should be skipped.\n- Text breaks (i.e., where\
    \ a new text begins) need to be recognized, and a text entry created.\n- Each\
    \ line needs to be parsed, and a line entry created.\n- Each word in the line\
    \ needs to be parsed. If the word does not previously exist, a word entry needs\
    \ to be created.\n- A `line_word` entry needs to be created.\n\nMost of the text\
    \ breaks look like the sample given in Figure [A-2](#A978-1-4302-5999-2_9_Chapter.html#Fig2):\
    \ it is the date of publication, the title, and then “by William Shakespeare.”\
    \ However, the sonnets are numbered, and so they follow a slightly different format.\
    \ This format is shown in Figure [A-3](#A978-1-4302-5999-2_9_Chapter.html#Fig3).\
    \ “THE SONNETS” is the title, and when we see that title, we need to start looking\
    \ for lines that are only numbers – those lines denote the start of a new sonnet.\
    \ So parsing texts is slightly different for the Sonnets than for everything else,\
    \ which adds a wrinkle of complexity.\n\nThis is not a hugely difficult problem,\
    \ but it is complex enough that we can see how different paradigms approach the\
    \ problems in different ways. The paradigms are all theoretically equivalent:\
    \ that is, there is no problem that one paradigm can solve that another can’t\
    \ solve. However, each paradigm is best suited to address particular kinds of\
    \ problems. It is easy to see these differences when you see the paradigms at\
    \ work.\n\n![A978-1-4302-5999-2_9_Fig3_HTML.jpg](A978-1-4302-5999-2_9_Fig3_HTML.jpg)\n\
    \nFigure A-3. Sonnets Start\n\n![A978-1-4302-5999-2_9_Fig2_HTML.jpg](A978-1-4302-5999-2_9_Fig2_HTML.jpg)\n\
    \nFigure A-2. A Sample Text Start\n\n![A978-1-4302-5999-2_9_Fig1_HTML.jpg](A978-1-4302-5999-2_9_Fig1_HTML.jpg)\n\
    \nFigure A-1. The Database Layout\n\n## Imperative Programming Paradigm\n\nThe\
    \ first computer programming languages were assembly languages. These are strange\
    \ and low-level beasts, and are arguably a paradigm unto themselves. Once computer\
    \ programmers began to work in higher levels of abstractions, the first batch\
    \ of languages they invented were imperative. The word “imperative” here comes\
    \ from the human language structure: in the sentence, “Pick up that garbage,”\
    \ the command, “Pick up,” is the imperative. Imperatives are commands to perform\
    \ some action. An imperative programming language is a language that executes\
    \ a system of instructions. If that sounds like a description of all programming\
    \ languages, it is because almost all the most popular programming languages are\
    \ of this type, so you can go through your entire career working in imperative\
    \ (or near-imperative) code.\n\nJava is fundamentally object oriented, but a lot\
    \ of Java code can look quite imperative. Imperative programming is a natural\
    \ way for people to think about problems: even the pseudocode given in the introduction\
    \ was implicitly imperative. Because it is so natural, it is easy for a programmer\
    \ to go from a gut understanding of how to solve the problem into a series of\
    \ instructions, entirely bypassing the design phase. The result is imperative\
    \ code. This approach works very well for simple scripts, especially when those\
    \ scripts are mimicking the interaction of a human being. This is why imperative\
    \ languages such as `perl`, `bash`, and `Power Shell` dominate shell scripting.\n\
    \nYou can recognize imperative code in Java by looking at the methods. The dead\
    \ giveaway is if the codebase is dominated by static methods: if so, chances are\
    \ you are seeing very imperative code. Imperative code also lends itself to long\
    \ methods with many arguments, and those methods will tend to call out to other\
    \ long methods with many arguments. What is going on is that the entire state\
    \ of the application is being passed around, including various signals for exceptional\
    \ conditions. Everything needs to know everything about everything in an imperative\
    \ language.\n\nFor the imperative implementation, we will start by executing the\
    \ schema creation. When that is done, we will prepare all the statements that\
    \ we will use throughout our execution. When that is done, we will load the text\
    \ stream. Then, for each line in the text stream, we will drop into a big `if-else`\
    \ block. That block will be responsible for determining where we are at in the\
    \ processing, and how to process the current line. If we are in the sonnets and\
    \ the line is just a digit, we will create the new text in the database representing\
    \ our new sonnet. Otherwise, if the line is a year, that is signifying a start\
    \ of a new text, and we will check to see if we are in the sonnets, and we will\
    \ handle things appropriately. Otherwise, if we are in a comment, we will scroll\
    \ to a comment. Otherwise, if it’s the end, we’ll note that we are definitely\
    \ no longer in the sonnets. Otherwise, we will break the line up into words and\
    \ store each of the words into the database. The code for this is given in Listing\
    \ A-1.\n\n**Listing A-1. Imperative Database Loading**\n\n```java\nimport java.io.BufferedReader;\n\
    import java.io.IOException;\nimport java.io.InputStream;\nimport java.io.InputStreamReader;\n\
    import java.sql.*;\nimport java.util.*;\nimport java.util.concurrent.*;\nimport\
    \ java.util.function.*;\nimport java.util.regex.*;\n\npublic class Database {\n\
    \    private static final String SOURCE = \"shakespeare.txt\";\n    private static\
    \ final String SCHEMA = \"shakespeare\";\n    private static final Predicate<String>\
    \ IS_WHITESPACE =\n        Pattern.compile(\"^\\\\s*$\").asPredicate();\n    private\
    \ static final Predicate<String> IS_YEAR =\n        Pattern.compile(\"^1(5|6)\\\
    \\d\\\\d$\").asPredicate();\n    private static final Predicate<String> IS_COMMENT_START\
    \ =\n        Pattern.compile(\"^<<\").asPredicate();\n    private static final\
    \ Predicate<String> IS_COMMENT_END =\n        Pattern.compile(\">>$\").asPredicate();\n\
    \    private static final Predicate<String> IS_THE_END =\n```"
  raw: '# A Tour of Paradigms


    Many books, articles, and conversations will wax poetic about programming language
    paradigms, comparing and contrasting “imperative,” “object-oriented,” and “functional”
    without explaining what they are. Worse, when people go to explain these particular
    styles, the result is often rather vague. This appendix will provide an overview
    of the three dominant paradigms in post-functional programming by implementing
    the same functionality three different ways: we will use a database set-up process
    as a common problem, and show how you would solve that problem in each of the
    different paradigms. All of this will be done directly from within Java, so you
    can see how Java looks when forced to be strongly in one single paradigm. At the
    end of the chapter, we will highlight some additional programming paradigms and
    styles so that you are at least familiar with the terms.


    The database that we will be setting up is the database we used in [chapter 5](#A978-1-4302-5999-2_5_Chapter.html).
    This is a collection of the words used in all the works of Shakespeare, indexed
    by line. The database looks like Figure [A-1](#A978-1-4302-5999-2_9_Chapter.html#Fig1).
    The data comes from the Project Gutenberg text at [`http://www.gutenberg.org/ebooks/100`](http://www.gutenberg.org/ebooks/100)
    . To create this database, we will have to perform the following steps:


    Create the schema, including the tables.   Parse and insert the works of Shakespeare
    file. Empty lines and comments should be skipped.   Text breaks (i.e., where a
    new text begins) need to be recognized, and a text entry created.   Each line
    needs to be parsed, and a line entry created.   Each word in the line needs to
    be parsed. If the word does not previously exist, a word entry needs to be created.
      A line_word entry needs to be created.      


    Most of the text breaks look like the sample given in Figure [A-2](#A978-1-4302-5999-2_9_Chapter.html#Fig2):
    it is the date of publication, the title, and then “by William Shakespeare.” However,
    the sonnets are numbered, and so they follow a slightly different format. This
    format is shown in Figure [A-3](#A978-1-4302-5999-2_9_Chapter.html#Fig3). “THE
    SONNETS” is the title, and when we see that title, we need to start looking for
    lines that are only numbers – those lines denote the start of a new sonnet. So
    parsing texts is slightly different for the Sonnets than for everything else,
    which adds a wrinkle of complexity.


    This is not a hugely difficult problem, but it is complex enough that we can see
    how different paradigms approach the problems in different ways. The paradigms
    are all theoretically equivalent: that is, there is no problem that one paradigm
    can solve that another can’t solve. However, each paradigm is best suited to address
    particular kinds of problems. It is easy to see these differences when you see
    the paradigms at work.


    ![A978-1-4302-5999-2_9_Fig3_HTML.jpg](A978-1-4302-5999-2_9_Fig3_HTML.jpg)


    Figure A-3.


    Sonnets Start


    ![A978-1-4302-5999-2_9_Fig2_HTML.jpg](A978-1-4302-5999-2_9_Fig2_HTML.jpg)


    Figure A-2.


    A Sample Text Start


    ![A978-1-4302-5999-2_9_Fig1_HTML.jpg](A978-1-4302-5999-2_9_Fig1_HTML.jpg)


    Figure A-1.


    The Database Layout


    ## Imperative Programming Paradigm


    The first computer programming languages were assembly languages. These are strange
    and low-level beasts, and are arguably a paradigm unto themselves. Once computer
    programmers began to work in higher levels of abstractions, the first batch of
    languages they invented were imperative. The word “imperative” here comes from
    the human language structure: in the sentence, “Pick up that garbage,” the command,
    “Pick up,” is the imperative. Imperatives are commands to perform some action.
    An imperative programming language is a language that executes a system of instructions.
    If that sounds like a description of all programming languages, it is because
    almost all the most popular programming languages are of this type, so you can
    go through your entire career working in imperative (or near-imperative) code.


    Java is fundamentally object oriented, but a lot of Java code can look quite imperative.
    Imperative programming is a natural way for people to think about problems: even
    the pseudocode given in the introduction was implicitly imperative. Because it
    is so natural, it is easy for a programmer to go from a gut understanding of how
    to solve the problem into a series of instructions, entirely bypassing the design
    phase. The result is imperative code. This approach works very well for simple
    scripts, especially when those scripts are mimicking the interaction of a human
    being. This is why imperative languages such as perl, bash, and Power Shell dominate
    shell scripting.


    You can recognize imperative code in Java by looking at the methods. The dead
    giveaway is if the codebase is dominated by static methods: if so, chances are
    you are seeing very imperative code. Imperative code also lends itself to long
    methods with many arguments, and those methods will tend to call out to other
    long methods with many arguments. What is going on is that the entire state of
    the application is being passed around, including various signals for exceptional
    conditions. Everything needs to know everything about everything in an imperative
    language.


    For the imperative implementation, we will start by executing the schema creation.
    When that is done, we will prepare all the statements that we will use throughout
    our execution. When that is done, we will load the text stream. Then, for each
    line in the text stream, we will drop into a big if-else block. That block will
    be responsible for determining where we are at in the processing, and how to process
    the current line. If we are in the sonnets and the line is just a digit, we will
    create the new text in the database representing our new sonnet. Otherwise, if
    the line is a year, that is signifying a start of a new text, and we will check
    to see if we are in the sonnets, and we will handle things appropriately. Otherwise,
    if we are in a comment, we will scroll to a comment. Otherwise, if it’s the end,
    we’ll note that we are definitely no longer in the sonnets. Otherwise, we will
    break the line up into words and store each of the words into the database. The
    code for this is given in Listing A-1.


    Listing A-1\. Imperative Database Loading


    `import java.io.BufferedReader;`


    `import java.io.IOException;`


    `import java.io.InputStream;`


    `import java.io.InputStreamReader;`


    `import java.sql.*;`


    `import java.util.*;`


    `import java.util.concurrent.*;`


    `import java.util.function.*;`


    `import java.util.regex.*;`


    `public class Database {`


    `private static final String SOURCE = "shakespeare.txt";`


    `private static final String SCHEMA = "shakespeare";`


    `private static final Predicate<String> IS_WHITESPACE =`


    `Pattern.compile("^\\s*$").asPredicate();`


    `private static final Predicate<String> IS_YEAR =`


    `Pattern.compile("^1(5|6)\\d\\d$").asPredicate();`


    `private static final Predicate<String> IS_COMMENT_START =`


    `Pattern.compile("^<<").asPredicate();`


    `private static final Predicate<String> IS_COMMENT_END =`


    `Pattern.compile(">>$").asPredicate();`


    `private static final Predicate<String> IS_THE_END =`'
  trans: "\n# 范式概览\n\n许多书籍、文章和讨论都会对编程语言范式大加赞赏，比较和对比“命令式”、“面向对象”和“函数式”，却没有解释它们究竟是什么。更糟糕的是，当人们试图解释这些特定风格时，结果往往相当模糊。本附录将通过以三种不同方式实现相同的功能，概述后函数式编程中的三种主要范式：我们将使用一个数据库设置过程作为常见问题，并展示如何在每种不同范式中解决该问题。所有这些都将在\
    \ Java 中直接完成，因此你可以看到当 Java 被强制严格遵循单一范式时是什么样子。在本章末尾，我们将重点介绍一些额外的编程范式和风格，以便你至少熟悉这些术语。\n\
    \n我们将要设置的数据库是我们在第 5 章中使用的数据库。这是一个按行索引的、包含莎士比亚所有作品中使用过的单词的集合。该数据库如图 A-1 所示。数据来自古腾堡计划文本\
    \ [`http://www.gutenberg.org/ebooks/100`](http://www.gutenberg.org/ebooks/100)。要创建此数据库，我们必须执行以下步骤：\n\
    \n创建模式，包括表。  \n解析并插入莎士比亚作品文件。应跳过空行和注释。  \n需要识别文本分隔符（即新文本开始的位置），并创建文本条目。  \n需要解析每一行，并创建行条目。\
    \  \n需要解析行中的每个单词。如果该单词之前不存在，则需要创建单词条目。  \n需要创建一个 line_word 条目。  \n\n大多数文本分隔符看起来像图\
    \ A-2 中给出的示例：它是出版日期、标题，然后是“by William Shakespeare”。然而，十四行诗是编号的，因此它们遵循略有不同的格式。这种格式如图\
    \ A-3 所示。“THE SONNETS”是标题，当我们看到该标题时，我们需要开始寻找仅包含数字的行——这些行表示新十四行诗的开始。因此，解析十四行诗的文本与其他所有文本略有不同，这增加了一层复杂性。\n\
    \n这不是一个非常困难的问题，但它足够复杂，以至于我们可以看到不同的范式如何以不同的方式处理问题。这些范式在理论上都是等价的：也就是说，不存在一个范式能解决而另一个范式不能解决的问题。然而，每种范式最适合解决特定类型的问题。当你看到这些范式在实际工作中时，很容易看出这些差异。\n\
    \n![A978-1-4302-5999-2_9_Fig3_HTML.jpg](img/A978-1-4302-5999-2_9_Fig3_HTML.jpg)\n\
    \n图 A-3.\n\n十四行诗开始\n\n![A978-1-4302-5999-2_9_Fig2_HTML.jpg](img/A978-1-4302-5999-2_9_Fig2_HTML.jpg)\n\
    \n图 A-2.\n\n一个示例文本开始\n\n![A978-1-4302-5999-2_9_Fig1_HTML.jpg](img/A978-1-4302-5999-2_9_Fig1_HTML.jpg)\n\
    \n图 A-1.\n\n数据库布局\n\n## 命令式编程范式\n\n最初的计算机编程语言是汇编语言。这些是奇怪且低级的语言，可以说它们本身就是一个范式。一旦计算机程序员开始在更高的抽象层次上工作，他们发明的第一批语言就是命令式的。这里的“命令式”一词源于人类语言结构：在句子“捡起那个垃圾”中，命令“捡起”是祈使语气。命令式是执行某些动作的命令。命令式编程语言是一种执行指令系统的语言。如果这听起来像是对所有编程语言的描述，那是因为几乎所有最流行的编程语言都属于这种类型，因此你可以在整个职业生涯中编写命令式（或接近命令式）的代码。\n\
    \nJava 本质上是面向对象的，但很多 Java 代码看起来可能非常命令式。命令式编程是人们思考问题的一种自然方式：即使是引言中给出的伪代码也隐含着命令式。因为它如此自然，程序员很容易从对如何解决问题的直觉理解直接进入一系列指令，完全绕过设计阶段。结果就是命令式代码。这种方法对于简单的脚本非常有效，尤其是当这些脚本模仿人类交互时。这就是为什么像\
    \ perl、bash 和 Power Shell 这样的命令式语言在 shell 脚本中占主导地位的原因。\n\n你可以通过查看方法来识别 Java 中的命令式代码。一个明显的标志是代码库是否以静态方法为主：如果是，那么你很可能看到的是非常命令式的代码。命令式代码也倾向于使用带有许多参数的长方法，并且这些方法往往会调用其他带有许多参数的长方法。其本质是应用程序的整个状态（包括各种异常情况的信号）都在被传递。在命令式语言中，一切都需要了解关于一切的一切。\n\
    \n对于命令式实现，我们将从执行模式创建开始。完成后，我们将准备在执行过程中使用的所有语句。完成后，我们将加载文本流。然后，对于文本流中的每一行，我们将进入一个大的\
    \ if-else 块。该块将负责确定我们在处理过程中的位置，以及如何处理当前行。如果我们在十四行诗部分并且该行只是一个数字，我们将在数据库中创建代表新十四行诗的新文本。否则，如果该行是一个年份，表示新文本的开始，我们将检查我们是否在十四行诗部分，并适当处理。否则，如果我们在注释中，我们将滚动到注释。否则，如果是结尾，我们将记录我们肯定不再处于十四行诗部分。否则，我们将把该行拆分成单词，并将每个单词存储到数据库中。此代码在清单\
    \ A-1 中给出。\n\n清单 A-1. 命令式数据库加载\n\n`import java.io.BufferedReader;`\n\n`import\
    \ java.io.IOException;`\n\n`import java.io.InputStream;`\n\n`import java.io.InputStreamReader;`\n\
    \n`import java.sql.*;`\n\n`import java.util.*;`\n\n`import java.util.concurrent.*;`\n\
    \n`import java.util.function.*;`\n\n`import java.util.regex.*;`\n\n`public class\
    \ Database {`\n\n`private static final String SOURCE = \"shakespeare.txt\";`\n\
    \n`private static final String SCHEMA = \"shakespeare\";`\n\n`private static final\
    \ Predicate<String> IS_WHITESPACE =`\n\n`Pattern.compile(\"^\\\\s*$\").asPredicate();`\n\
    \n`private static final Predicate<String> IS_YEAR =`\n\n`Pattern.compile(\"¹(5|6)\\\
    \\d\\\\d$\").asPredicate();`\n\n`private static final Predicate<String> IS_COMMENT_START\
    \ =`\n\n`Pattern.compile(\"^<<\").asPredicate();`\n\n`private static final Predicate<String>\
    \ IS_COMMENT_END =`\n\n`Pattern.compile(\">>$\").asPredicate();`\n\n`private static\
    \ final Predicate<String> IS_THE_END =`\n"
