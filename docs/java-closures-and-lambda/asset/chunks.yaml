  trans: '

    ### 收集、处理或归约流


    我们刚刚讨论的映射和过滤操作是中间操作；你可以随心所欲地将它们链式组合。不过，迟早你会想要停止对流进行加工，并真正对其执行一些操作。这时终端操作就派上用场了。每个流只能有一个终端操作，并且流实际上是在应用终端操作时执行的。终止流有三种基本方式：通过收集其元素、基于其元素产生副作用，或对其元素执行计算。这三种方式分别被称为收集、处理和归约。


    要收集流，你需要指定你想要的结果是什么类型的集合，以及你希望如何收集元素。Java SDK 在 `Collectors` 类中提供了许多选项。该类生成各种类型的
    `Collector` 实例。一个 `Collector` 实例负责消费流中的元素，基于这些元素更新某些内部状态，并在最后生成一个结果。内置的收集器确实令人印象深刻：你可以获取平均值、统计元素数量、基于某个
    `Comparator` 获取最小值或最大值、基于某个键对元素进行分组（返回一个 `List` 实例的 `Map`）、将所有结果的字符串表示连接成一个单独的
    `String`（可选地带有分隔符），等等。在清单 3-13 中，我们可以从 `Library` 实例的书籍出发，得到一个按类型对这些书籍进行排序的 `Map`。请注意，我们使用了
    `groupingByConcurrent` 方法，以保持并行执行的权限。这正是将 Stream API 代码与更传统的 Java 代码进行比较时，能够真正展现函数式编程威力的时刻之一。


    **清单 3-13. 使用流按类型对书籍进行分组**


    `Map<Book.Genre, List<Book>> booksByGenre =`


    `library.getBooks().parallelStream()`


    `.collect(Collectors.groupingByConcurrent(Book::getGenre));`


    有时你并不想收集结果，而只是想产生一些副作用。经典的例子是打印流执行的结果。为此，你可以使用 `Stream.forEach` 方法，就像在 `Collection`
    上使用一样。一个主要区别是 `Stream.forEach` 方法不保证执行顺序：并行流可能会以任意顺序生成结果。如果你确实想确保顺序，你需要使用 `Stream.forEachOrdered`
    方法。该方法提供与 forEach 相同的功能，但附加了一个约定：元素按照流生成它们的顺序（称为“遭遇顺序”）进行处理。通常，如果你打算使用 `Stream.forEach`（尤其是
    `Stream.forEachOrdered`），你应该深吸一口气，重新考虑是否有更好的方式来处理这种情况，例如自定义 `Collector`。通过副作用进行编程几乎从来都不是正确的答案，并且始终是长期维护的障碍。


    最后一个常见的终端操作称为归约，它最初是来自函数式编程的一种略显陌生的操作。² 其思想是，你传入某个初始值，然后一个函数接收一个元素并返回一个与初始值类型相同的元素。该函数的结果会被传递给下一个元素。这些执行结果像菊花链一样串联起来，直到整个流被消费完毕，然后返回最终结果。这种链式执行非常强大，一旦你掌握了窍门，就能用非常简单的代码实现非常复杂的操作。例如，如果你想自己实现字符串连接，你可以这样实现归约：


    `String booksString =`


    `library.getBooks().parallelStream()`


    `.map(Book::toString)`


    `.map(str -> str + "\n")`


    `.reduce("", String::concat);`


    从概念上讲，这将生成一个书籍流，将每本书转换为其字符串表示，为每个字符串表示追加一个回车符，然后归约生成的流。归约步骤将从空字符串开始，并连接结果。第一次连接会将空字符串与第一本书连接；下一次连接将获取第一次的结果并与第二本书连接；再下一次连接将获取第二次的结果并与第三本书连接；如此继续，直到没有更多书籍，最后返回结果。


    这里需要给智者一句忠告。归约操作是一个非常强大的操作，它几乎肯定会成为你某个时候的“金锤”³；随着你对它越来越熟练，你会开始倾向于使用 `reduce` 来终止所有流。这并不是一个坏冲动，因为它表明你在以函数式的方式思考。然而，如果你开始想要向归约操作传递比简单的前一个结果更多的状态，那么你真正需要的是一个自定义的
    `Collector` 实例或一个包装后的 `Collector` 实例（参见 `Collectors.collectingAndThen`）。请记住这一点，你将能够保持代码的可读性和函数式风格，同时也能生成更可重用的代码。


    ### 原始类型流


    在结束对流的介绍之前，了解存在针对 `int`、`long` 和 `double` 原始类型的特定流是很重要的。你可以通过使用 `Stream` 类的方法来生成这些流：`mapToInt`/`flatMapToInt`、`mapToLong`/`flatMapToLong`、`mapToDouble`/`flatMapToDouble`。正如你所料，与传递对象包装器相比，它们提供了一些性能优势，尽管对于应用程序代码来说，这种优势通常不足以产生显著影响。更重要的是，它们提供了与许多现有方法形状相匹配的
    API。例如，`IntStream` 有一个名为 `mapToObj` 的方法，它接受一个将 `int` 映射到 `Object` 的函数。该函数的形状完美匹配
    `List.get(int)` 方法，因此你可以调用 `intStream.map(List::get)`。


    ## Lambda 领域回顾


    Java 8 提供了一种新的抽象：你现在可以抽象出处理某个领域的概念。你从一个流开始，无论该值是来自映射、集合还是其他地方，最终的处理代码都是完全相同的。你现在可以摆脱遍历数据源的逻辑，专注于你想对其提供的元素做什么。正如我们在本章中所看到的，流就是这种抽象。此外，还有一些方便的简写方法。这些简写方法对于将遗留代码转换为更函数式的风格特别有用。在下一章中，我们将研究如何处理应用程序外部的数据源：与外部世界交互会使这些函数式结构变得更加复杂。这种复杂性实际上将展示函数式编程在处理棘手代码方面的威力，并让你能够专注于核心关注点。


    脚注 ¹


    关于如何从 `Stream API` 桥接回 `Collection API` 的信息，请参见下面的收集/归约步骤描述以及 `Collectors` 类。


      ²


    在与函数式程序员交谈时，他们也可能将归约操作称为注入或折叠。


      ³


    术语“金锤”源自一句流行的俏皮话：“如果你只有一把锤子，那么所有东西看起来都像钉子。”如果你只有一把锤子，并且对它感到非常兴奋，那么你拥有的就是一把金锤。

    '
- fmt: "# 4. I/O with Lambdas\n\nSo far, our exploration of lambdas and streams has\
    \ existed in the well-controlled world of code. Sometimes, however, your code\
    \ has to talk to the outside world. This chapter is where we enter into lambdas\
    \ in the real world: instead of showing what is possible with lambdas in the abstract,\
    \ we are getting into what programming with lambdas looks like in the grittiness\
    \ of real code. This is a world where you end up having to work around a lot of\
    \ unfortunate legacy code in Java, and where the nice theory and simple examples\
    \ of lambdas give way to some of the gritty complexity. The important part for\
    \ you is to understand how to work with that complexity in order to create a nicer\
    \ development experience and more productive, stable code.\n\nFor our first case,\
    \ we will be interacting with files. Through this chapter, we will implement a\
    \ number of useful file utilities. We will implement code that will handle all\
    \ the boilerplate for constructing and cleaning up a temporary file, allowing\
    \ the user of the code to focus on working with the temporary file. And we will\
    \ implement a method that will read through all the lines of the file, and another\
    \ that will read through all the lines of certain files in the directory.\n\n\
    We chose files as a starting point because the file system is an obnoxiously unstable\
    \ bit of reality. Many inexperienced developers will write file system code with\
    \ many undocumented assumptions about the world outside the codebase and beyond\
    \ the type system. These assumptions hold true throughout development, but then\
    \ explode on production. The developer, confused, then utters the infamous words:\
    \ \"It works on my machine.\"\n\nTo deal with this problem, Java introduced the\
    \ idea of checked exceptions. A checked exception is a way of stating that the\
    \ method depends on some reality that is beyond the state of the program itself.\
    \ Unchecked exceptions are there for when the programmer screwed up and passed\
    \ something they shouldn't have or called a method at the wrong time. Checked\
    \ exceptions, on the other hand, are for when something went wrong beyond the\
    \ control of the application itself. The `IOException` type hierarchy describes\
    \ various different ways that trying to perform I/O can fail for an application.\
    \ The checked exception is the way of requiring the programmer to deal with the\
    \ instability of the outside world.\n\nLanguages with less expressive type systems\
    \ ignore this instability, and unwise developers circumvent the handling for these\
    \ potential errors. This creates an illusion of clean code, but that illusion\
    \ will be brutally shattered when a virus scanner locks a file that your code\
    \ is trying to write, or some other oddity of the outside world deviates from\
    \ the pristine presumptions of your code. Forcing you to deal with certain exceptions\
    \ was a wise design, although many developers seem quick to dismiss it. I would\
    \ dismiss it, too, except that I keep encountering programs that explode unhelpfully\
    \ on I/O errors because people, languages, and tools circumvented the safety check.\n\
    \nChecked exceptions exist for a reason: sometimes you really do need to be responsive\
    \ to an error condition. Unfortunately, they are not amenable to functional code\
    \ at all. A mathematical function has an input and an output and no side effects:\
    \ functional code wants to be as close to a mathematical function as possible.\
    \ In Java 8 terms, this means that lambdas should not throw exceptions, and you\
    \ cannot pass methods throwing a checked exception as an implementation for a\
    \ functional interface (`Function`, `Consumer`, or `Supplier`). Upon encountering\
    \ this, many programmers will simply turn the checked exception into an unchecked\
    \ exception and move on. This is circumventing the safety of your system. Instead,\
    \ we'd like to retain the safety while still behaving nicely in our functional\
    \ world.\n\nIn the functional world, you only have two options for handling a\
    \ situation: you will deal with it either upon input or upon output. If you are\
    \ dealing with exceptional circumstances in a functional world, this means that\
    \ you are either going to be passing exception handlers as an argument, or you\
    \ will be passing information about exception occurrences as part of the return\
    \ value. Working with exceptions this way may seem strange, but that is simply\
    \ the experience of learning a new paradigm. This way of working with exceptions\
    \ may also seem complicated, but the reality is that it is handling the complication\
    \ intrinsic in I/O. The difference between engineers and artists is that engineers\
    \ are punished for ignoring the real world.\n\nThroughout the rest of this chapter,\
    \ we will begin with a simple task: working with a temporary file. We will see\
    \ where the exceptions arise, and work with both input and output styles of handling\
    \ them. Then we will build our more advanced file systems from there. So let's\
    \ get started.\n\n## Temporary Files and the Hole in the Middle\n\nIn the first\
    \ chapter, we saw how inversion of control was an object-oriented way of performing\
    \ a functional callback. There's a common pattern in the functional world where\
    \ a function performs some setup at the beginning, some cleanup at the end, and\
    \ then calls back into the user code to figure out what to do in the middle. My\
    \ friend, mentor, and co-blogger, Brian Hurt, refers to this as the \"hole in\
    \ the middle\" pattern. When dealing with temporary files, that's exactly what\
    \ we want: we want to create the temporary file at the start, and we want to ensure\
    \ the temporary file is cleaned up at the end, and allow the users to do what\
    \ they would like with the file in the middle. The basic pattern will look like\
    \ this:\n\n```\n<RETURN_T> RETURN_T withTempFile(Function<FunFile, RETURN_T> function)\
    \ {\n\n    File file = null;\n\n    try {\n\n      file = File.createTempFile(\"\
    funfile\", \"tmp\");\n\n      return function.apply(file);\n\n    } finally {\n\
    \n      if (file != null) file.delete();\n\n    }\n\n  }\n\n// This is not valid\
    \ Java code: read on!\n```\n\nThe setup of the temporary file is our `File.createTempFile(String,String)`\
    \ call. The cleanup is the `file.delete()` call. The `function.apply` call is\
    \ the hole in the middle, which the caller will fill in for us. But, of course,\
    \ this is not valid Java code: there is the unhandled `IOException` that needs\
    \ to be addressed. As we discussed previously, we have two options: handling the\
    \ exception on input via a callback, and handing the exception on output via the\
    \ return value. Let's take a look at both of these approaches in turn."
  raw: '# 4. I/O with Lambdas


    So far, our exploration of lambdas and streams has existed in the well-controlled
    world of code. Sometimes, however, your code has to talk to the outside world.
    This chapter is where we enter into lambdas in the real world: instead of showing
    what is possible with lambdas in the abstract, we are getting into what programming
    with lambdas looks like in the grittiness of real code. This is a world where
    you end up having to work around a lot of unfortunate legacy code in Java, and
    where the nice theory and simple examples of lambdas give way to some of the gritty
    complexity. The important part for you is to understand how to work with that
    complexity in order to create a nicer development experience and more productive,
    stable code.


    For our first case, we will be interacting with files. Through this chapter, we
    will implement a number of useful file utilities. We will implement code that
    will handle all the boilerplate for constructing and cleaning up a temporary file,
    allowing the user of the code to focus on working with the temporary file. And
    we will implement a method that will read through all the lines of the file, and
    another that will read through all the lines of certain files in the directory.


    We chose files as a starting point because the file system is an obnoxiously unstable
    bit of reality. Many inexperienced developers will write file system code with
    many undocumented assumptions about the world outside the codebase and beyond
    the type system. These assumptions hold true throughout development, but then
    explode on production. The developer, confused, then utters the infamous words:
    “It works on my machine.”


    To deal with this problem, Java introduced the idea of checked exceptions. A checked
    exception is a way of stating that the method depends on some reality that is
    beyond the state of the program itself. Unchecked exceptions are there for when
    the programmer screwed up and passed something they shouldn’t have or called a
    method at the wrong time. Checked exceptions, on the other hand, are for when
    something went wrong beyond the control of the application itself. The `IOException`
    type hierarchy describes various different ways that trying to perform I/O can
    fail for an application. The checked exception is the way of requiring the programmer
    to deal with the instability of the outside world.


    Languages with less expressive type systems ignore this instability, and unwise
    developers circumvent the handling for these potential errors. This creates an
    illusion of clean code, but that illusion will be brutally shattered when a virus
    scanner locks a file that your code is trying to write, or some other oddity of
    the outside world deviates from the pristine presumptions of your code. Forcing
    you to deal with certain exceptions was a wise design, although many developers
    seem quick to dismiss it. I would dismiss it, too, except that I keep encountering
    programs that explode unhelpfully on I/O errors because people, languages, and
    tools circumvented the safety check.


    Checked exceptions exist for a reason: sometimes you really do need to be responsive
    to an error condition. Unfortunately, they are not amenable to functional code
    at all. A mathematical function has an input and an output and no side effects:
    functional code wants to be as close to a mathematical function as possible. In
    Java 8 terms, this means that lambdas should not throw exceptions, and you cannot
    pass methods throwing a checked exception as an implementation for a functional
    interface (`Function`, `Consumer`, or `Supplier`). Upon encountering this, many
    programmers will simply turn the checked exception into an unchecked exception
    and move on. This is circumventing the safety of your system. Instead, we’d like
    to retain the safety while still behaving nicely in our functional world.


    In the functional world, you only have two options for handling a situation: you
    will deal with it either upon input or upon output. If you are dealing with exceptional
    circumstances in a functional world, this means that you are either going to be
    passing exception handlers as an argument, or you will be passing information
    about exception occurrences as part of the return value. Working with exceptions
    this way may seem strange, but that is simply the experience of learning a new
    paradigm. This way of working with exceptions may also seem complicated, but the
    reality is that it is handling the complication intrinsic in I/O. The difference
    between engineers and artists is that engineers are punished for ignoring the
    real world.


    Throughout the rest of this chapter, we will begin with a simple task: working
    with a temporary file. We will see where the exceptions arise, and work with both
    input and output styles of handling them. Then we will build our more advanced
    file systems from there. So let’s get started.


    ## Temporary Files and the Hole in the Middle


    In the first chapter, we saw how inversion of control was an object-oriented way
    of performing a functional callback. There’s a common pattern in the functional
    world where a function performs some setup at the beginning, some cleanup at the
    end, and then calls back into the user code to figure out what to do in the middle.
    My friend, mentor, and co-blogger, Brian Hurt, refers to this as the “hole in
    the middle” pattern. When dealing with temporary files, that’s exactly what we
    want: we want to create the temporary file at the start, and we want to ensure
    the temporary file is cleaned up at the end, and allow the users to do what they
    would like with the file in the middle. The basic pattern will look like this:


    `<RETURN_T> RETURN_T withTempFile(Function<FunFile, RETURN_T> function) {`


        `File file = null;`


        `try {`


          `file = File.createTempFile("funfile", "tmp");`


          `return function.apply(file);`


        `} finally {`


          `if (file != null) file.delete();`


        `}`


      `}`


    `// This is not valid Java code: read on!`


    The setup of the temporary file is our `File.createTempFile(String,String)` call.
    The cleanup is the `file.delete()` call. The `function.apply` call is the hole
    in the middle, which the caller will fill in for us. But, of course, this is not
    valid Java code: there is the unhandled `IOException` that needs to be addressed.
    As we discussed previously, we have two options: handling the exception on input
    via a callback, and handing the exception on output via the return value. Let’s
    take a look at both of these approaches in turn.'
  trans: '

    # 4. 使用 Lambda 进行 I/O 操作


    到目前为止，我们对 Lambda 和 Stream 的探索都停留在代码这个可控的世界里。然而，有时你的代码必须与外部世界交互。本章我们将进入现实世界中的 Lambda：不再抽象地展示
    Lambda 能做什么，而是深入探讨在真实代码的复杂性中，使用 Lambda 编程是怎样的体验。在这个世界里，你最终不得不处理 Java 中大量遗留代码带来的麻烦，而
    Lambda 那些美好的理论和简单的示例，也会让位于一些棘手的复杂性。对你来说，关键在于理解如何应对这种复杂性，从而创造更佳的开发体验，并编写出更高效、更稳定的代码。


    第一个案例是与文件交互。通过本章，我们将实现一系列实用的文件工具。我们将编写代码来处理创建和清理临时文件的所有样板代码，让代码使用者能够专注于临时文件的操作。我们还将实现一个方法，用于读取文件的所有行，以及另一个方法，用于读取目录中特定文件的所有行。


    我们选择文件作为起点，是因为文件系统是外部世界中极其不稳定的部分。许多经验不足的开发者在编写文件系统代码时，会隐含大量关于代码库之外、类型系统之外世界的未文档化假设。这些假设在开发过程中一直成立，但在生产环境中却会引发问题。困惑的开发者随后会说出那句臭名昭著的话：“在我的机器上能跑啊。”


    为了解决这个问题，Java 引入了受检异常（checked exception）的概念。受检异常是一种声明方式，表明该方法依赖于程序自身状态之外的某些现实条件。非受检异常（unchecked
    exception）则用于程序员搞砸了，传入了不该传的参数，或在错误的时间调用了方法的情况。而受检异常则用于应用程序自身无法控制的事情出错时。`IOException`
    类型层次结构描述了应用程序执行 I/O 操作可能失败的各种不同方式。受检异常是一种要求程序员处理外部世界不稳定性的机制。


    类型系统表达能力较弱的语言会忽略这种不稳定性，而不明智的开发者则会绕过对这些潜在错误的处理。这会造成代码整洁的假象，但当病毒扫描程序锁定了你的代码正在尝试写入的文件，或者外部世界的其他异常情况偏离了你代码中那些完美的假设时，这种假象就会被无情地粉碎。强制你处理某些异常是一个明智的设计，尽管许多开发者似乎急于否定它。我也会否定它，除非我不断遇到那些因为人们、语言和工具绕过了安全检查，而在
    I/O 错误时毫无帮助地崩溃的程序。


    受检异常的存在是有原因的：有时你确实需要对错误情况做出响应。不幸的是，它们完全不适合函数式代码。一个数学函数有输入和输出，没有副作用：函数式代码希望尽可能接近数学函数。在
    Java 8 中，这意味着 Lambda 不应该抛出异常，并且你不能将抛出受检异常的方法作为函数式接口（`Function`、`Consumer` 或 `Supplier`）的实现。遇到这种情况，许多程序员会简单地将受检异常转换为非受检异常，然后继续。这绕过了系统的安全性。相反，我们希望既保留安全性，又能在函数式世界中良好地运作。


    在函数式世界中，处理情况只有两种选择：要么在输入时处理，要么在输出时处理。如果在函数式世界中处理异常情况，这意味着你要么将异常处理器作为参数传递，要么将异常发生的信息作为返回值的一部分传递。以这种方式处理异常可能看起来很奇怪，但这只是学习新范式过程中的体验。这种处理异常的方式可能看起来也很复杂，但现实是，它正在处理
    I/O 本身固有的复杂性。工程师和艺术家之间的区别在于，工程师会因为忽视现实世界而受到惩罚。


    在本章的剩余部分，我们将从一个简单的任务开始：处理临时文件。我们将看到异常在哪里出现，并尝试使用输入和输出两种风格来处理它们。然后，我们将在此基础上构建更高级的文件系统。那么，让我们开始吧。


    ## 临时文件与“中间空洞”


    在第一章中，我们看到了控制反转是如何以面向对象的方式执行函数式回调的。在函数式世界中，有一种常见的模式：函数在开始时执行一些设置，在结束时执行一些清理，然后回调用户代码来决定中间要做什么。我的朋友、导师兼合著者
    Brian Hurt 将这种模式称为“中间空洞”模式。在处理临时文件时，这正是我们想要的：我们希望在开始时创建临时文件，确保在结束时清理临时文件，并允许用户在中间阶段对文件进行他们想要的操作。基本模式如下所示：


    `<RETURN_T> RETURN_T withTempFile(Function<FunFile, RETURN_T> function) {`


        `File file = null;`


        `try {`


          `file = File.createTempFile("funfile", "tmp");`


          `return function.apply(file);`


        `} finally {`


          `if (file != null) file.delete();`


        `}`


      `}`


    `// 这不是有效的 Java 代码：请继续阅读！`


    临时文件的设置是我们的 `File.createTempFile(String,String)` 调用。清理是 `file.delete()` 调用。`function.apply`
    调用就是中间的“空洞”，由调用者为我们填充。但是，当然，这不是有效的 Java 代码：存在一个未处理的 `IOException` 需要解决。正如我们之前讨论的，我们有两种选择：通过回调在输入时处理异常，以及通过返回值在输出时处理异常。让我们依次看看这两种方法。

    '
- fmt: "### Exception Handling via Input: Passing in an Exception Handler\n\nIf you\
    \ take a look at the basic pattern above, you can actually think of it as having\
    \ two holes in the middle: one that is the standard behavior, and one that is\
    \ the exceptional behavior. Therefore, you could take two callbacks: one implementing\
    \ the standard behavior, and one implementing the exceptional behavior. A naïve\
    \ implementation would look like this:\n\n```\n<RETURN_T> RETURN_T withTempFile(\n\
    \    Function<FunFile, RETURN_T> function,\n    Consumer<IOException> exceptionHandler\n\
    ) {\n    File file = null;\n    try {\n        file = File.createTempFile(\"funfile\"\
    , \"tmp\");\n        return function.apply(file);\n    } catch(IOException ioe)\
    \ {\n        exceptionHandler.consume(ioe);\n    } finally {\n        if(file\
    \ == null) file.delete();\n    }\n}\n// This is not valid Java code: read on!\n\
    ```\n\nThere are three problems with this code. One problem is that it uses `null`\
    \ for the file, when `null` is not a valid value. Another is a problem with the\
    \ logic of this code. The last problem is an API problem. The compiler would catch\
    \ the second problem. The first problem should be caught by your newfound sensibility,\
    \ where reading `null` in code is like hearing nails on a chalkboard. The third\
    \ problem is by far the subtlest, and will only be caught once you have experience\
    \ manipulating methods as lambdas.\n\nThe first problem is the fact that we are\
    \ using `null`. Starting in Java 8, you should only use `null` if you want to\
    \ get a `NullPointerException`. In all other cases when you would use `null`,\
    \ you should use the `Optional` class instead. The `Optional` class is the implementation\
    \ of the “option” or “maybe” pattern common in functional programming, and it\
    \ is how functional languages avoid even having a concept of `null` or any equivalent\
    \ to the `NullPointerException`. The `Optional` class is a container that holds\
    \ up to one single element, and provides convenient ways to act on the contained\
    \ element if it exists. If we rewrite the code using `Optional`, we eliminate\
    \ the possibility of a `NullPointerException` and get more readable code. It looks\
    \ like this:\n\n```\n<RETURN_T> RETURN_T withTempFile(\n    Function<FunFile,\
    \ RETURN_T> function,\n    Consumer<IOException> exceptionHandler\n) {\n    Optional<File>\
    \ file = Optional.empty();\n    try {\n        file = Optional.of(File.createTempFile(\"\
    funfile\", \"tmp\"));\n        return file.map(function).get();\n    } catch(IOException\
    \ ioe) {\n        exceptionHandler.consume(ioe);\n    } finally {\n        file.ifPresent(File::delete);\n\
    \    }\n}\n// This is still not valid Java code: read on!\n```\n\nThis code still\
    \ won’t compile, however, which brings us to our second problem. The second problem\
    \ in our code is that we do not have a return value in the case of the exception\
    \ handler. If you get into the `catch` block, and you execute the consumer, then\
    \ what is there return value of the method? An old-school Java sensibility would\
    \ be to return `null` in this case, but `null` is how you get to the hated `NullPointerException`.\
    \ We can do better. Instead of taking a `Consumer`, we can take a `Function`,\
    \ and so the user specifies the return value in either case. The resulting code\
    \ looks like this:\n\n```\n<RETURN_T> RETURN_T withTempFile(\n    Function<FunFile,\
    \ RETURN_T> function,\n    Function<IOException, RETURN_T> exceptionHandler\n\
    ) {\n    File file = null;\n    try {\n        file = File.createTempFile(\"funfile\"\
    , \"tmp\");\n        return function.apply(file);\n    } catch(IOException ioe)\
    \ {\n        return exceptionHandler.apply(ioe);\n    } finally {\n        if\
    \ (file != null) file.delete();\n    }\n}\n// This is not the Java code you are\
    \ looking for: read on!\n```\n\nAt this point, the users can specify the return\
    \ value in either case, which means they can do what they would like with the\
    \ method. If they realize how evil `null` is, they can return `null`. If they\
    \ want to return `Optional.empty()` or some other default value, they can do that.\
    \ It is maximal flexibility.\n\nThere is just one remaining problem with the code\
    \ above: the order of the arguments is wrong. In traditional Java code, the order\
    \ of arguments was largely an implementation detail. When you are writing a function\
    \ in a functional style, the order of arguments is very significant. Consider\
    \ the functional contract for this method: it is a bifunction that takes two functions\
    \ as arguments. The first argument is the standard implementation callback, and\
    \ the second argument is the error handling callback. Consider how this works\
    \ as a lambda, however. If you want to do partial function application, you do\
    \ it on the first argument, which is the specification of how to process the file.\
    \ That implementation is likely to be very specific to the caller’s context. On\
    \ the other hand, the error handling is more likely to be common throughout an\
    \ application. Therefore, it is more useful to have the error handling as the\
    \ first argument, so that the error handling can be partially applied, leaving\
    \ the temp file processing free to be implemented. The resulting method is in\
    \ Listing 4-1.\n\nForcing the caller to handle the exception is more intuitive\
    \ to the classical Java programmer. However, there are two major issues with this\
    \ approach. The first is that the calling code is rather ugly, since you have\
    \ two functional callbacks on top of each other. It just reads funny to a programmer\
    \ used to the imperative style in idiomatic Java. The second and more significant\
    \ issue is that the functional interface is a bifunction, which does not fit in\
    \ many cases. You can’t call `Stream.map` on a bifunction: you need a function\
    \ for that. To address both of these issues, we can handle the exception in the\
    \ return value, which is what we will do in the next section.\n\n**Listing 4-1.\
