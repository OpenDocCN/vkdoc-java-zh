    `if(value != null) {`


    `value += 1;`


    `map.put(key, value);`


    `}`


    This code is really four lines to accomplish a single piece of logic: get the
    value for the key, setting the value if it is missing. Aside from being lengthy,
    this code is also unclear; it’s not clear that `value` is still effectively in
    the process of being generated after the `get`. Even more, this code is inefficient:
    it does a get followed by a put, requiring a duplicate lookup of the key.


