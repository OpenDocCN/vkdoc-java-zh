  raw: 'Unfortunately, this plays poorly with the syntax of lambdas. The try-with-resources
    block is not a single statement, so if you want your try-with-resources as a body
    of a lambda, you immediately have to wrap that call in a pair of brackets, such
    as this:


    `Consumer<Object> consumer = it -> {`


    `try (InputStream in = acquireInputStream()) {`


    `// Do something`


    `} catch (IOException exception) {`


    `// Handle exception, which may include close exceptions`


    `}`


    `};`


    Note also that we have to put the lambda within the try-with-resources block itself,
    or we have to execute the lambda before we exit the try-with-resources block.
    If you assign the lambda within the try-with-resources block, exit the try-with-resources
    block, and then try to call the lambda, the input stream will be closed. The order
    of operations will be as follows:


    Enter try-with-resources block.   Assign the lambda.   Exit try-with-resources
    block, closing the input stream.   Call the lambda.


    A demonstration of this error is in Listing 7-1\. When you walk through it in
    this way, the error seems obvious. However, this is an easy mistake to make, and
    it can be quite tricky to detect in practice. It can be especially tricky to detect
    if you are calling into code that releases Zalgo. If you remember from [chapter
    2](#A978-1-4302-5999-2_2_Chapter.html), a developer “releases Zalgo” any time
    calling code sometimes executes immediately and sometimes executes in a deferred
    manner. If your code releases Zalgo, then you might pass your resource into that
    code expecting it to be executed immediately. However, when it executes in that
    deferred manner, you will have a race condition: the try-with-resource block will
    call at some point in the future, and the calling code will read the input stream
    at some other point in the future. Which one comes first is at the capricious
    whim of the thread scheduler. The result will be intermittent closed input streams:
    you will get exceptions when the reading code occasionally loses the race.


    Listing 7-1\. Calling a Lambda after Its Resources Are Closed


    `import java.io.IOException;`


    `import java.io.InputStream;`


    `import java.io.UncheckedIOException;`


    `import java.util.function.*;`


    `public class Listing1 {`


    `public static void main(String[] args) {`


    `Consumer<Object> consumer = null;`


    `try (InputStream in = acquireInputStream()) {`


    `consumer = it -> {`


    `try {`


    `System.out.println("Trying to read!");`


    `in.read();`


    `} catch (IOException ioe) {`


    `throw new UncheckedIOException("read error", ioe);`


    `}`


    `};`


    `} catch (IOException ioe) {`


    `throw new UncheckedIOException("input stream error", ioe);`


    `}`


    `consumer.accept(new Object());`


    `}`


    `public static InputStream acquireInputStream() {`


    `return new InputStream() {`


    `@Override`


    `public int read() throws IOException {`


    `return 1;`


    `}`


    `@Override`


    `public void close() throws IOException {`


    `System.out.println("Closing!");`


    `super.close();`


    `}`


    `};`


    `}`


    `}`


    `/* RESULT`


    `Closing!`


    `Trying to read!`


    `*/`


    All in all, the try-with-resources approach is not too bad, although it is already
    getting a bit noisy. You have to be careful about which blocks are nested in which
    way, but that is very manageable. The bigger problem is that if you have a return
    value from your function, then the return from the catch block has to match the
    return from the try block. The natural reaction for many Java developers will
    be to return `null` at this point, but that is just opening up the possibility
    of encountering a `NullPointerException`, since it expects the consumer to handle
    the situation while making it easy for them to ignore the situation. There are
    three better options depending on your circumstance: unchecked exceptions, an
    exception-handling caller, or a `Result` object.


    ### Handling Resources by Throwing an Unchecked Exception


    A very popular and very common solution is to handle checked exceptions by converting
    them to unchecked exceptions and rethrowing them. This passes the responsibility
    for addressing the situation back to the caller, and the exception will probably
    traverse quite a ways back up through the execution stack before it encounters
    an exception handler. Hopefully, wherever that is will be well-suited for handling
    the exceptional circumstance in an intelligent way.


    Java 8 introduced some support for this programming convention: the `java.io.UncheckedIOException`
    class, which explicitly exists to wrap checked `IOException` instances in an unchecked
    wrapper. Since `IOExceptions` are at the root of the most common exception classes,
    this class provides a means to convert most common exceptions into the unchecked
    form. The best way to do this is to use the `UncheckedIOException(String,IOException)`
    constructor, which allows you to also attach a message for human consumption to
    the point of conversion; in general, the more information you can provide in the
    case of an exception, the better off you will be. For an example of this usage,
    see Listing 7-2.


    Listing 7-2\. An UncheckedIOException Wrapping an IOException


    `import java.io.ByteArrayInputStream;`


    `import java.io.IOException;`


    `import java.io.InputStream;`


    `import java.io.UncheckedIOException;`


    `import java.util.function.*;`


    `public class Listing2 {`


    `public static InputStream createInputStream() throws IOException {`


    `return new ByteArrayInputStream("foobar".getBytes());`


    `}`


    `public static void call(Consumer<Object> c) {`


    `c.accept(new Object());`


    `}`


    `public static void main(String[] args) {`


    `call(it -> {`


    `try (InputStream in = createInputStream()) {`


    `throw new IOException("And with a kiss, I die!");`


    `} catch (IOException e) {`


    `throw new UncheckedIOException(`


    `"Error working with input stream", e);`


    `}`


    `}`


    `);`


    `}`


    `}`


    `/* RESULT`


    `Exception in thread "main" java.io.UncheckedIOException: Error working with input
    stream`


    `at Listing1.lambda$main$0(Listing1.java:22)`


    `at Listing1$$Lambda$1/558638686.accept(Unknown Source)`


    `at Listing1.call(Listing1.java:14)`


    `at Listing1.main(Listing1.java:18)`


    `Caused by: java.io.IOException: And with a kiss, I die!`


    `at Listing1.lambda$main$0(Listing1.java:20)`


    `... 4 more`


    `*/`


    If you look at the stack trace in Listing 7-2, you can begin to see some of the
    stack trace noise generated by Java’s lambda implementation. We will get into
    why that is there and how to read it in the next chapter. What we can tell already,
    however, is that we get the exact source lines from the lambda itself (the `lambda$main$0`
    lines), along with the location where the lambda was called (the `Listing1.call`
    line). This should make sense, since calling the lambda is simply executing the
    function interface method for it (the `Listing1$$Lambda$1/558638686.accept` line).
    The original exception is also given to us in the “Caused by” line, just like
    we are used to. All in all, this is very familiar and comfortable.


    However, things become much more interesting when you start using parallel streams.
    In this case, the exception will be thrown from the context of the `ForkJoinWorkThread`
    instances. This is going to create significantly more noise in the stack trace,
    and it obscures our ability to backtrack the call stack. To see where the difficulty
    lies, let’s build out an example. In this example, we will explode when we execute
    the 100th line. Let’s take a look at the result in Listing 7-3.


    Listing 7-3\. Unhandled Exception Terminating a Stream


    `import java.io.ByteArrayInputStream;`


    `import java.io.IOException;`


    `import java.io.InputStream;`


    `import java.io.UncheckedIOException;`


    `import java.util.*;`


    `import java.util.concurrent.atomic.*;`


    `import java.util.function.*;`


    `import java.util.stream.*;`


    `public class Listing3 {`


    `public static InputStream generateInputStream() {`


    `return new ByteArrayInputStream("foobar".getBytes());`


    `}`'
