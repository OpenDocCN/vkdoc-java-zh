    Twitter 上关注他：[`http://twitter.com/javajohnz`](http://twitter.com/javajohnz)。


    引言


    这本书是我多年莽撞探索和惨痛教训的结晶。故事要从我从 C++ 转向 perl 说起。与 C++ 的低级操作和繁琐管理相比，perl 编程语言强大得惊人。（它“慢”这一点从未困扰过我——我宁愿编写强大、有效的慢代码，也不愿编写脆弱、有漏洞的快代码。）在
    perl 的世界里，有一种“匿名子程序”的概念，可以传递和操作。你还可以直接操作符号表。符号表是程序可用的函数名称集合。通过这两点，我意识到我可以进行更高级别的编码：我可以编写返回子程序的子程序，并将它们存储到符号表中，从而让我的代码在运行时编写代码。在
    perl 中，这些子程序工厂被称为“模板函数”。我接着编写了一些真正难以阅读——但确实强大——的 perl 代码。


    我与我的朋友兼导师布莱恩·赫特分享了这一发现。他是一位经验丰富的资深开发者，似乎见多识广。布莱恩告诉我，我所做的事情叫做“函数式编程”，并鼓励我研究真正的函数式语言，特别是
    OCaml 及其衍生语言 JoCaml。我立刻被吸引了。到 2008 年，我在明尼苏达州 Ruby 用户组（Ruby.MN）做了题为“为什么 Ruby 开发者应该学习
    OCaml”的演讲。¹ 与当时标准的编码方式相比，函数式编程具有真正令人难以置信的力量。此外，我的数学背景与函数式编程非常契合：状态不变意味着我可以对程序运用与数学方程相同的推理方式。我当时认为，一种函数式编程语言将会崛起，并从根本上改变编程的意义，就像
    Java 崛起并使面向对象编程无处不在一样。但到目前为止，这还没有发生。


    下一章随着 Groovy 编程语言的兴起而到来。Groovy 的 MetaClass 功能为我提供了一种在 perl 中执行相同技巧的方法，但这种方式利用了所有现有的
    Java 代码。这真是鱼与熊掌兼得。所有那些为 Java 存在的开源软件，以及所有在 JVM 上积累的技术专长，终于可以与这些“函数式特技”相结合。这并非函数式编程——我在互联网上因为这么说而惹了不少麻烦——但它确实从函数式编程中借鉴了一些强大的技巧。我们将在第
    1 章中深入探讨当时的情况。

