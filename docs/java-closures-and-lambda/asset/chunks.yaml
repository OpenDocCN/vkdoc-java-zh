    ### 方法三：使用 AbstractSpliterator 构建流


    在前两种方法中，我们都在内存中构建了结果流，然后返回整个流。这意味着我们必须等待所有 I/O 操作完成才能开始处理，并且必须同时将所有结果存储在内存中。如果你的数据量足够大，以至于需要使用外部数据库，那么这些特性在解决方案中可能就无法接受了。本方案以及下一个方案都提供了一种替代方法。这些方案会将结果集的迭代过程集成到流处理本身中，这意味着结果可以分批处理。


    本方案将遵循更传统的 Java 方法：如果你想实现一个接口，就找到实现了该接口的抽象类，并通过扩展该抽象类来构建你的实现。然而，并没有一个现成的 `AbstractStream`
    可以继承。相反，我们需要深入一层。这就是我们遇到 `Spliterator` 的地方。


    Java 8 引入了一种名为 `Spliterator` 的新类型。`Spliterator` 类似于迭代器，其职责是生成一个元素序列。与迭代器一样，元素序列可以是有限的，也可以是无限的，但通常是有限的。迭代器和
    `Spliterator` 之间的主要区别在于，`Spliterator` 具有“拆分”的能力。拆分 `Spliterator` 的概念是，将一个 `Spliterator`
    分成两个，原始 `Spliterator` 返回一部分元素，新的 `Spliterator` 返回另一部分元素。


    假设你有一个包含英文字母“A”到“Z”的 `Spliterator`。你可以从你的 `Spliterator` 中取出“A”、“B”和“C”，然后进行拆分。此时，原始
    `Spliterator` 可能开始只提供剩余的辅音字母（“d”、“f”、“g”、“h”、“j”……），并返回一个新的 `Spliterator` 用于处理剩余的元音字母（“e”、“i”、“u”……）。这两个
    `Spliterator` 将完全独立，可以以任何顺序执行，彼此之间没有任何依赖关系。规则是，拆分过程中不能丢失任何元素，并且拆分后的 `Spliterator`
    不能重复产生任何元素。


    在 Java 8 中，`Spliterator` 提供将成为流元素的元素。所有各种流操作实际上都是对 `Spliterator` 及其产生的元素进行的操作。你可以通过将
    `Spliterator` 实例传递给 `StreamSupport.stream(Spliterator, boolean)` 方法来从 `Spliterator`
    生成流。第二个参数指定生成的流是“并行”还是“顺序”：并行流允许以任意顺序操作元素，并同时操作多个元素；顺序流则始终在调用者的线程内执行，并且会在处理下一个元素之前完成对前一个元素的处理。如果前一个元素可能会改变后一个元素的解释方式，那么你必须创建一个顺序流。如果元素能够被独立处理，那么你应该创建一个并行流。默认情况下，Java
    中的流是顺序的，因为这是最安全的做法。但是，如果可能的话，你应该通过调用 `stream.parallel()` 并使用返回的流来使用并行流。清单 5-8
    给出了这些不同模式的具体示例。


    **清单 5-8\. 并行流与顺序流运行结果对比**


    `import java.util.stream.*;`


    `public class Listing8 {`


    `public static void main(String[] args) throws Exception {`


    `IntStream stream;`


    `// 顺序流——通常是默认模式`


    `stream = IntStream.range(1, Integer.MAX_VALUE);`


    `stream.sequential().mapToObj(i -> {`


    `System.out.println("Mapping " + i + " to string");`


    `return Integer.toString(i);`


    `}`


    `).forEach(System.out::println);`


