    清单 3-6\. 使用 `Map.replaceAll` 清理精选图书消息的库实例方法


    `/**`

    `* 对所有精选消息执行各种清理任务。`

    `*/`

    `public void cleanUpFeaturedMessages() {`

    `this.getFeaturedBooks().replaceAll((book, msg) -> {`

    `// 设置默认消息`

    `if (msg == null || msg.isEmpty()) {`

    `msg = "Featured " + book.getGenre().toString().toLowerCase() +`

