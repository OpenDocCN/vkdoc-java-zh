- fmt: "在离开`getLines()`方法之前，有必要花点时间讨论该方法中的错误条件处理。如果底层文件不是“普通文件”（例如，它是一个目录），我们会在流中返回一个`IOException`。API要求文件是普通文件，因此文件不是普通文件就违反了API。一般规则是：检查型异常用于执行环境变化引起的错误，非检查型异常用于API违规。如果一位非常优秀的程序员也无法预见该异常，则它是非检查型异常；如果异常的发生超出了程序的控制范围，则它是检查型异常。在这种情况下，使用非检查型异常是合理的，因为它属于API违规。然而，文件也可能因为不再存在而不再是普通文件。Java也可能因为某些原因（例如NFS）无法从文件系统确定文件类型而返回`false`。因此，我们采用标准的检查型异常错误处理方法，即使它属于API违规。\n\
    \n现在我们有了`getLines()`方法，还需要`Walk`方法来遍历树。这揭示了API定义中的一个细微歧义：当我们说“目录中的所有文件”时，是指“目录的直接子文件”，还是指“目录的所有后代文件，无论中间有多少层目录”？换句话说，这是递归列出还是简单列出？我们可以通过增加一个额外参数轻松支持两种方式：如果参数为`true`，我们将递归进入子目录；如果为`false`，则不递归。\n\
    \n`Walk`方法的实现非常简单，如清单4-9所示。我们使用`Files.list(Path)`来实现遍历，然后通过`new FunFile(Path)`构造函数将结果`map`为`FunFile`。该方法的大部分代码（按代码行数计算）用于实现递归：除了要区分处理目录和文件外，我们还需要确保不会陷入无限循环，因此必须检查规范路径。\n\
    \n**清单4-9. `FunFile.listFiles(boolean)`方法**\n\n```\n/**\n * Returns a stream of\
    \ the plain files in the directory, recursing into\n * subdirectories if the {@code\
    \ recurse} argument is {@code true}.\n *\n * @param recurse Whether to recurse\
    \ into subdirectories\n * @return The plain files in the directory; never {@code\
    \ null}\n */\npublic Stream<Result<FunFile>> listFiles(boolean recurse) {\n  \
    \  if (!isDirectory()) {\n        return Stream.of(new Result<>(new IOException(\n\
    \            \"File is not a directory: \" + toString()\n        )));\n    }\n\
    \    try {\n        final String thisPath = this.getCanonicalPath();\n       \
    \ return Files.list(toPath()).map(FunFile::new).flatMap(file -> {\n          \
    \  if (recurse && file.isDirectory()) {\n                final String filePath;\n\
    \                try {\n                    filePath = file.getCanonicalPath();\n\
    \                } catch (IOException ioe) {\n                    return Stream.of(new\
    \ Result<>(ioe));\n                }\n                if (!thisPath.equals(filePath))\
    \ {\n                    return file.listFiles(true);\n                } else\
    \ {\n                    return Stream.empty();\n                }\n         \
    \   } else if (file.isFile()) {\n                return Stream.of(new Result<>(file));\n\
    \            } else {\n                return Stream.empty();\n            }\n\
    \        });\n    } catch (IOException ioe) {\n        return Stream.of(new Result<>(ioe));\n\
    \    }\n}\n```\n\n现在只需将两者结合起来。同样，我们将使用一个`boolean`参数来决定是否递归进入子目录。我们将要消费的文件流是一个`Result`实例的`Stream`，因此必须决定如何处理错误和结果。错误将直接传递，包装成`Stream`后再扁平化回流中。而流中的`FunFile`实例将调用其`getLines()`方法，该方法会返回一个流，然后该流会被扁平化到主流中。最终结果是一个扁平的流，包含从所有文件中读取的行（以及错误）。这就是清单4-10。本章的所有工作最终都汇聚到这个简单的方法上。\n\
    \n**清单4-10. `FunFile.getLinesInDirectory(boolean)`方法**\n\n```\n/**\n * Provides\
    \ all the lines of all the files in a directory. If this file\n * is not a directory,\
    \ return a stream with a single element, which is a\n * single {@link Result}\
    \ instance with an {@link IOException}. Otherwise,\n * return the concatenated\
    \ stream of trying to read all the lines of all\n * the files in the directory\
    \ using {@link #getLines()}, recursing into\n * subdirectories if the {@code recurse}\
    \ argument is {@code true}.\n *\n * @param recurse Whether to recurse into subdirectories\n\
    \ * @return The lines of all the files; never {@code null}\n */\npublic Stream<Result<String>>\
