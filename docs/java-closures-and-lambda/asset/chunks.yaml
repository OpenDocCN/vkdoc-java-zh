    在我的电脑上，这段代码运行大约需要 14.5 秒，并且我们愉快地占用了所有处理器。然而，这段代码相当丑陋：我们在做一件极其简单的事情，却有大量仪式性的代码和噪音掩盖了这种简单的努力。所有这些仪式和噪音之所以必要，是因为我们直接使用了
    `Thread` 类。以这种方式处理线程非常笨拙，这也是 Java 引入执行器（executors）的原因。在下一节中，我们将看到 lambda 表达式也有助于清理这些代码。


    ## Lambda 表达式与执行器


    `ExecutorService` 及其相关类是 `Thread` 类的便捷包装器。它们提供了经过验证且标准的线程执行模式：有用于动态调整大小的线程池的执行器、用于固定大小线程池的执行器、按需生成线程然后缓存它们的执行器，以及包装单个线程的执行器。如果你发现自己想用线程做一些比执行器支持的功能更花哨的事情，那么你要么是在攻读博士学位，要么是做错了什么。


    在所有情况下，用法都是一样的：你将 `Callable` 接口的一个实例传递给执行器，它会返回一个 `Future` 实例，该实例是结果的一个句柄。这个 `Future`
    实例还提供了对处理过程中发生的任何错误的访问。这种用法相比线程采用的 `Runnable` 方法有三个主要优点：第一，你可以从并发处理中返回一个值；第二，你的错误不会被静默吞没（假设你从
    `Future` 中获取了结果）；第三，一个线程只能运行一个 `Runnable` 实例，但执行器的线程可以处理多个 `Callable` 实例。不过，就像线程的内联
    `Runnable` 实现一样，我们可以使用 lambda 表达式内联提供我们的 `Callable` 实现。这使得代码更易于阅读。


    当我们使用执行器重写我们的练习时，可以看到这些优势。我们不会想出一个巧妙的方法来均匀分配工作，而是简单地将所有待完成的工作添加到我们的主处理执行器中。和之前一样，该执行器将拥有与我们拥有的处理器数量一样多的线程，并负责
    CPU 密集型工作。我们将 I/O 密集型工作交给另一个执行器，该执行器将是一个单线程。由于交接更清晰，我们可以将 I/O 密集型线程设置为最高优先级，确保它尽可能多地执行：我们再次看到
    lambda 表达式使代码更具可读性，因为我们可以内联指定 `ThreadFactory` 实现。此练习的代码在清单 6-3 中给出。


    清单 6-3\. 使用 Lambda 表达式定义 ExecutorService 工作实例


    `import java.math.BigInteger;`


    `import java.util.*;`


    `import java.util.concurrent.*;`


    `public class Listing3 {`


    `public static void printPrimes(int maxBitLength) {`


    `ExecutorService executor =`


    `Executors.newFixedThreadPool(Runtime.getRuntime().availableProcessors());`


    `ExecutorService printExecutor = Executors.newSingleThreadExecutor(r -> {`


    `Thread t = new Thread(r);`


    `t.setPriority(Thread.MAX_PRIORITY);`


    `return t;`


    `}`


    `);`


    `// 最终的工作结果`


    `List<Future<?>> futures = new ArrayList<>(maxBitLength);`


    `for (int i = 0; i < maxBitLength; i++) {`


    `int bitLength = i + 1;`


    `Future<String> stringFuture = executor.submit(() -> {`


    `BigInteger prime = PrimeFactory.ofLength(bitLength);`


    `return prime.toString();`


    `}`


    `);`


    `futures.add(printExecutor.submit(() -> {`


    `String primeString = stringFuture.get();`


    `System.out.println(primeString);`


    `return null;`


    `}`


    `)`


    `);`


    `}`


    `// 发出信号，表示不再添加新任务`


    `executor.shutdown();`


    `printExecutor.shutdown();`


    `// 等待所有任务完成并检查错误`


    `futures.parallelStream().forEach(future -> {`


    `try {`


    `future.get();`


    `} catch (InterruptedException | ExecutionException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `);`


    `}`


    `public static void main(String[] args) {`


    `DemoRunner.run(Listing3::printPrimes);`


    `}`


    `}`


    与清单 6-2 相比，这段代码要好得多。我们无需声明标志或交接队列；相反，我们只需将一个 `Future` 传递给另一个任务的工作，然后处理生成的 futures。我们仍然能饱和处理器核心，并且仍然拥有专用的
    I/O 线程。你可能会担心执行器类相对于我们“手动调优”的实现所带来的开销，但实际上，在我的电脑上，结果反而快了半秒，达到了 14.0 秒。


    如果你仔细观察，可能已经注意到了 `futures.parallelStream()` 的调用。我们在上一章中看到，流可以设置为并行处理，从而带来一些额外的透明并发性。在这里，并行性使我们能够非常快速地检查
    futures 中的错误，而代价仅仅是一个方法调用。这非常强大，但我们还没有准备好深入探讨这种并发方法：我们将在本章后面部分讨论。Java 现有的并发工具还有更多可以探索的地方！

