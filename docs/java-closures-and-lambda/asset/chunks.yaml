    \ This results in more semantically meaningful code, but also frees the runtime\
    \ to decide the best way to execute the transformations. The result is improved\
    \ performance for little to no cost, especially when executing in a concurrent\
    \ environment.\n\nIf you have read this book, then you should hopefully be able\
