- fmt: "### Don’t Release Zalgo\n\nIt’s popular wisdom that programmers should learn\
    \ multiple programming languages. The reasons for this are numerous, but one is\
    \ often overlooked: programming languages form ecosystems with different people\
    \ and different cultures, and you can often learn things in those cultures that\
    \ enrich how you think about programming in general.\n\nThe JavaScript community,\
    \ for instance, has discovered a monstrous entity named “Zalgo.” Zalgo is an incomprehensible\
    \ horror that seeks to consume and destroy you. Programmers are at risk, because\
    \ Zalgo lurks beneath your code, waiting to be released by unwary programmers\
    \ who write code that is impossible to reason about. Every programmer of functional\
    \ code must be vigilant against the threat of Zalgo.\n\nWhen you are passing around\
    \ lambdas, it is easy to release Zalgo if you mix synchronous and asynchronous\
    \ styles. When your code executes a user’s lambda, it needs to be clear about\
    \ whether the lambda will execute before the method resolves (“synchronous”),\
    \ or at some point in the future (“asynchronous”). You must never mix the two\
    \ approaches.\n\nConsider, for instance, the following code:\n\n```\nList<Number>\
    \ numbers = Arrays.asList(1, 2, 3);\nnumbers.forEach(i -> System.out.println(i));\n\
    System.out.println(\"Done\");\n```\n\nWhat will print first in that code, \"`3`,\"\
    \ or \"`Done?`\" If you look up the API for `Iterable.forEach`, it tells you that\
    \ it executes the lambda “until all elements have been processed or an exception\
    \ is thrown,” which tells you that it is synchronous. Therefore, you know that\
    \ `\"Done\"` will come before `\"3\"`.\n\nOn the other hand, consider this code:\n\
    \n```\nFiles.lines(Paths.get(\"build.gradle\")).forEach(\n    s -> System.out.println(s)\n\
    );\nSystem.out.println(\"Done\");\n```\n\nIn this case, there is no guarantee\
    \ about whether `\"Done\"` will come before the contents of `build.gradle` — the\
    \ API for the `Stream.forEach` method explicitly states, “For any given element,\
    \ the action may be performed at whatever time and in whatever thread the library\
    \ chooses,” which tells you that it is asynchronous.\n\nIt may seem obvious enough\
    \ at this point to avoid Zalgo, but the path to Zalgo is easy to tread for the\
    \ unwary.\n\nThe story often goes something like this. Let’s say you have a method\
    \ that is going to do some expensive work, such as going to the database. Instead\
    \ of having your code block for the trip, you have the user pass you a callback\
    \ that executes when the data returns. The code looks something like this:\n\n\
    ```\npublic void readData(String key, ResultsHandler handler) {\n    threadPool.submit(()\
    \ -> {\n        SomeModel resultingModel = null;\n        /* Do expensive query\
    \ setting \"resultingModel\"... */\n        handler.accept(resultingModel);\n\
    \    });\n}\n```\n\nLater on, you decide to add a caching layer in front of this\
    \ method, because that is even more efficient, and some slightly stale data is\
    \ just fine. So you update your code to read something like this:\n\n```\npublic\
    \ void readData(String key, ResultsHandler handler) {\n    SomeModel cachedModel\
    \ = cache.get(key);\n    if (cachedModel != null) {\n        handler.accept(cachedModel);\n\
    \    } else {\n        threadPool.submit(() -> {\n            SomeModel resultingModel\
    \ = null;\n            /* Do expensive query setting \"resultingModel\"... */\n\
    \            cache.put(key, resultingModel);\n            handler.accept(resultingModel);\n\
    \        });\n    }\n}\n```\n\nNow we’re mixing asynchronous and synchronous styles:\
    \ the handler may be executed either in the current thread (before we return)\
    \ or in another thread (at some arbitrary point). Zalgo has been released. I have\
    \ told you that it’s horrifically evil, but it seems innocuous enough. If it is\
    \ going to block the thread for a long time, it executes the code in another thread.\
    \ If it won’t block, it executes in this thread. Seems helpful. What’s the problem\
    \ with that?\n\nThat, my child, is how Zalgo will consume you.\n\nThe problem\
    \ is that you don’t know how the callback code will behave. The handler can do\
    \ whatever it wants, including doing very expensive blocking computations. If\
    \ the method resolves asynchronously — as it did before — then that is fine, since\
    \ the primary execution thread of your application will continue along. Now that\
    \ you changed the method to sometimes resolve asynchronously but sometimes resolve\
    \ synchronously, that means that it will now sometimes block your primary execution\
    \ thread with very expensive blocking computations. Sometimes it won’t, of course.\
    \ This is going to make for an infuriating debugging experience.\n\nWhen the developer\
    \ reasons about this code, mixing asynchronous and synchronous execution creates\
    \ a branch with two very different but equally possible realities: one where the\
    \ code executes synchronously and one where the code executes asynchronously.\
    \ The way the application behaves in these two cases can vary wildly, so the developer\
    \ has to hold both possibilities in mind. Each time the developer encounters this\
    \ code, it creates another fork, doubling the complexity of the application. In\
    \ some cases, both these branches are pretty much the same, but mark my words:\
    \ the differences in those branches will crop up in surprising, unfortunate, and\
    \ hard-to-debug circumstances.\n\nIf you are going to execute asynchronously,\
    \ always execute asynchronously. If you are going to execute synchronously, always\
    \ execute synchronously. Don’t mix synchronous and asynchronous styles. Don’t\
    \ release Zalgo!\n\n### Build Complexity from Simple Parts\n\nWhen we looked at\
    \ `Function.compose` and `Function.andThen`, we built a function in one line that\
    \ will give you the integer whose value in decimal is “10” concatenated with the\
    \ given value. So if you give it “0,” you get “100.” If you give it “10,” you\
    \ get “1010.” That’s a nontrivial piece of logic, but we built it up by gluing\
    \ together three method references, and then we got a handle on a single function\
    \ that performed that behavior.\n\nIn the same way that we build up methods by\
    \ delegating to other methods, we can build up functions by delegating to and\
    \ wrapping other functions: find some way to perform the core logic, then prepend\
    \ the function with type conversions and argument manipulation, and then append\
    \ the function with result conversions.\n\nThis approach lets us do what aspect-oriented\
    \ programming was aiming at: you can wrap your simple pieces of logic in handlers\
    \ that perform additional processing without muddying up the core implementation\
    \ with ancillary details. This approach allows us to continue to write focused,\
    \ limited, type-specific methods that do one thing and do it well. These methods\
    \ are easier to write and provide fewer nasty corners where bugs can reside.\n\
    \nMost importantly, these simple parts are more apt to be reused. Code reuse is\
    \ the second derivative of code: it is through code reuse that we not only accelerate\
    \ our development, but accelerate the acceleration of our development. The old\
    \ acronym is “KISS”: “Keep It Simple, Silly,” and as developers, we KISS for speed."
  raw: '### Don’t Release Zalgo


    It’s popular wisdom that programmers should learn multiple programming languages.
    The reasons for this are numerous, but one is often overlooked: programming languages
    form ecosystems with different people and different cultures, and you can often
    learn things in those cultures that enrich how you think about programming in
    general.


    The JavaScript community, for instance, has discovered a monstrous entity named
    “Zalgo.” Zalgo is an incomprehensible horror that seeks to consume and destroy
    you. Programmers are at risk, because Zalgo lurks beneath your code, waiting to
    be released by unwary programmers who write code that is impossible to reason
    about. Every programmer of functional code must be vigilant against the threat
    of Zalgo.


    When you are passing around lambdas, it is easy to release Zalgo if you mix synchronous
    and asynchronous styles. When your code executes a user’s lambda, it needs to
    be clear about whether the lambda will execute before the method resolves (“synchronous”),
    or at some point in the future (“asynchronous”). You must never mix the two approaches.


    Consider, for instance, the following code:


    `List<Number> numbers = Arrays.asList(1, 2, 3);`


    `numbers.forEach(i -> System.out.println(i));`


    `System.out.println("Done");`


    What will print first in that code, " `3`," or " `Done?` " If you look up the
    API for `Iterable.forEach`, it tells you that it executes the lambda “until all
    elements have been processed or an exception is thrown,” which tells you that
    it is synchronous. Therefore, you know that `"Done"` will come before `"3`."


    On the other hand, consider this code:


    `Files.lines(Paths.get("build.gradle")).forEach(`


    `s -> System.out.println(s)`


    `);`


    `System.out.println("Done");`


    In this case, there is no guarantee about whether `"Done"` will come before the
    contents of `build.gradle` — the API for the `Stream.forEach` method explicitly
    states, “For any given element, the action may be performed at whatever time and
    in whatever thread the library choses,” which tells you that it is asynchronous.


    It may seem obvious enough at this point to avoid Zalgo, but the path to Zalgo
    is easy to tread for the unwary.


    The story often goes something like this. Let’s say you have a method that is
    going to do some expensive work, such as going to the database. Instead of having
    your code block for the trip, you have the user pass you a callback that executes
    when the data returns. The code looks something like this:


    `public void readData(String key, ResultsHandler handler) {`


    `threadPool.submit(() -> {`


    `SomeModel resultingModel = null;`


    `/* Do expensive query setting "resultingModel"... */`


    `handler.accept(resultingModel);`


    `}`


    `);`


    `}`


    Later on, you decide to add a caching layer in front of this method, because that
    is even more efficient, and some slightly stale data is just fine. So you update
    your code to read something like this:


    `public void readData(String key, ResultsHandler handler) {`


    `SomeModel cachedModel = cache.get(key);`


    `if (cachedModel != null) {`


    `handler.accept(cachedModel);`


    `} else {`


    `threadPool.submit(() -> {`


    `SomeModel resultingModel = null;`


    `/* Do expensive query setting "resultingModel"... */`


    `cache.put(key, resultingModel);`


    `handler.accept(resultingModel);`


    `}`


    `);`


    `}`


    `}`


    Now we’re mixing asynchronous and synchronous styles: the handler may be executed
    either in the current thread (before we return) or in another thread (at some
    arbitrary point). Zalgo has been released. I have told you that it’s horrifically
    evil, but it seems innocuous enough. If it is going to block the thread for a
    long time, it executes the code in another thread. If it won’t block, it executes
    in this thread. Seems helpful. What’s the problem with that?


    That, my child, is how Zalgo will consume you.


    The problem is that you don’t know how the callback code will behave. The handler
    can do whatever it wants, including doing very expensive blocking computations.
    If the method resolves asynchronously — as it did before — then that is fine,
    since the primary execution thread of your application will continue along. Now
    that you changed the method to sometimes resolve asynchronously but sometimes
    resolve synchronously, that means that it will now sometimes block your primary
    execution thread with very expensive blocking computations. Sometimes it won’t,
    of course. This is going to make for an infuriating debugging experience.


    When the developer reasons about this code, mixing asynchronous and synchronous
    execution creates a branch with two very different but equally possible realities:
    one where the code executes synchronously and one where the code executes asynchronously.
    The way the application behaves in these two cases can vary wildly, so the developer
    has to hold both possibilities in mind. Each time the developer encounters this
    code, it creates another fork, doubling the complexity of the application. In
    some cases, both these branches are pretty much the same, but mark my words: the
    differences in those branches will crop up in surprising, unfortunate, and hard-to-debug
    circumstances.


    If you are going to execute asynchronously, always execute asynchronously. If
    you are going to execute synchronously, always execute synchronously. Don’t mix
    synchronous and asynchronous styles. Don’t release Zalgo!


    ### Build Complexity from Simple Parts


    When we looked at `Function.compose` and `Function.andThen`, we built a function
    in one line that will give you the integer whose value in decimal is “10” concatenated
    with the given value. So if you give it “0,” you get “100.” If you give it “10,”
    you get “1010.” That’s a nontrivial piece of logic, but we built it up by gluing
    together three method references, and then we got a handle on a single function
    that performed that behavior.


    In the same way that we build up methods by delegating to other methods, we can
    build up functions by delegating to and wrapping other functions: find some way
    to perform the core logic, then prepend the function with type conversions and
    argument manipulation, and then append the function with result conversions.


    This approach lets us do what aspect-oriented programming was aiming at: you can
    wrap your simple pieces of logic in handlers that perform additional processing
    without muddying up the core implementation with ancillary details. This approach
    allows us to continue to write focused, limited, type-specific methods that do
    one thing and do it well. These methods are easier to write and provide fewer
    nasty corners where bugs can reside.


    Most importantly, these simple parts are more apt to be reused. Code reuse is
    the second derivative of code:[^(12)](#A978-1-4302-5999-2_2_Chapter.html#Fn12);
    it is through code reuse that we not only accelerate our development, but accelerate
    the acceleration of our development. The old acronym is “KISS”: “Keep It Simple,
    Silly,” and as developers, we KISS for speed.'
