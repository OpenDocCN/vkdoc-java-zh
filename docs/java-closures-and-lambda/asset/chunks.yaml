    ### 流式处理目录中所有文件的所有行


    有了我们的支持类，我们现在可以转向功能的主要部分。我们希望处理一个 `java.io.File` 并返回一个 `Result` 实例的 `Stream`，每个实例要么包含一个
    `IOException`，要么包含文件的一行 `String`。实现的大致分解如下：


    `File` `dir` `=> Stream<Result<String>>:`


    `对于` `dir` `中的每个文件，执行...`


    `File` `file` `=> Stream<Result<String>>:`


    `返回` `file` `中的所有行`


    这将是一个相当命令式的实现。从函数式的角度来看，我们实际上需要三个方法。你能看出是哪三个吗？关键在于要认识到遍历目录是一个有用的技巧，并且没有理由将这个有用的技巧与到达目录后要做什么的细节耦合在一起。实现这种函数式分解的一个有用方法是，严格遵循一个方法只做一件事的原则，同时要记住，普通
    Java 开发者对“一件事”的理解可能过于宽泛：打印目录中所有文件的所有行不是一件事；遍历目录中的文件才是一件事——即使这样也已经是一件相当大的事了。在编写任何代码之前，先在草稿纸上进行设计会很有帮助。如果描述一个函数需要超过一行，那你就做错了。这个问题的一种函数式分解如下：


    `给定：`


    `[行] File` `file` `=> Stream<Result<String>>`


    `返回` `file` `中的所有行`


    `[遍历] File` `dir` `=> Stream<File>`


    `对于` `dir` `中的每个文件，在流中返回该文件`


    `实现：`


    `File` `dir` `=> Stream<Result<String>>`


    `将` `dir` `应用于` `遍历` `，并将结果通过 flatMap 映射到` `行`


    这就是我们现在将要实现的三个函数。由于这三个函数都将 `File` 作为第一个参数，我们将在 `File` 的一个子类上实现它们，这个子类我们称之为 `FunFile`。（如果你想在生产环境中看到它，这个类在
    `also` 项目中可用。）


    让我们从 `Lines` 方法开始，因为它将是最简单的。Java 7 中引入的 `java.nio.file.Files` 类已经扩展了许多有用的生成 `Stream`
    的静态方法，包括 `Files.lines`。不幸的是，尽管名字如此，`Files` 类主要作用于 `Path` 实例。此外，该 API 生成一个 `String`
    对象的 `Stream` 并抛出 `IOException`。这个方法签名使得该方法不适合在流中工作，但其核心功能正是我们想要的：我们只需要让 API 符合我们的需求。我们的包装器实现如清单
    4-8 所示。请记住，这是附加到一个继承自 `java.io.File` 的类上的。


    清单 4-8\. FunFile.getLines( )


    `/**`


