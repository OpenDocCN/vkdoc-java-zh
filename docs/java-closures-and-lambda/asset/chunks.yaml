- fmt: "### Lambdas as Closures\n\nJava 8 的 lambdas 充当闭包。虽然在大多数编程讨论中，“lambda”和“closure”这两个术语实际上可以互换使用，但它们在技术上存在差异。好消息是，Java\
    \ 8 的 lambdas 也是闭包，因此你可以任选其一称呼，并且在技术上都是正确的。然而，理解它们之间的区别有助于你更清晰地表达自己的意思。\n\n“lambda”一词源于数学中一个探索可计算与不可计算问题的分支，具体来说，源自一种称为\
    \ lambda 演算的结构。lambda 演算将函数应用视为计算中的主要行为，因此它从最抽象的意义上处理函数，完全不考虑函数本身可能代表或计算什么。在 lambda\
    \ 演算中，函数本身就是相关的值。当编程语言从 lambda 演算中借用“lambda”一词时，它们指的是可以被当作值来处理的函数。一个 lambda 可以被赋值给一个变量（或多个变量），作为方法参数传递，并且通常可以像操作值`2`、`true`或`\"\
    foo\"`一样进行操作。\n\n然而，“closure”一词指的是 lambda 的后续创新。对于 Java 开发者来说，最容易将“closure”理解为“封装函数”。就像对象可以封装状态并通过特定的\
    \ API（例如，暴露字段的属性）暴露它一样，闭包也可以封装一些状态，然后在闭包被调用的任何地方和任何时间对该状态进行操作。“closure”中的“close”部分指的是“开放”变量与“封闭”变量。这个想法直接来源于数学：一个没有绑定值的变量被称为“开放的”，而一个有绑定值的变量被称为“封闭的”。闭包是一个封闭了某些变量的\
    \ lambda，它通过封装一个变量环境来实现这一点。\n\n这听起来可能是一个奇怪且技术性的概念，但在实践中其实非常常见。在 Java 8 引入 lambdas\
    \ 之前，可以说 Java 已经以匿名内部类的形式拥有了闭包。匿名内部类可以在一个上下文中捕获变量状态，并在另一个上下文中执行它：参见清单 2-6 中的示例。在该示例中，实现`Greeter`的匿名内部类封闭了变量`greeting`。每当编译器坚持要求你在变量或参数声明中添加`final`时，你就知道你在\
    \ Java 中创建了一个闭包。\n\nJava 8 的 lambdas 也充当闭包，这意味着它们会捕获作用域内的变量。这与匿名内部类的做法类似，清单 2-7\
    \ 给出了一个 lambda 作为闭包的等效示例。不过，作为一种语法糖，你不再需要显式地将变量声明为`final`：编译器会隐式地将封闭的变量视为 final，如果它们没有被当作\
    \ final 处理，则会引发编译器错误。\n\n**清单 2-6. 作为闭包的匿名内部类**\n\n```\npublic interface Greeter\
    \ {\n    String createGreeting(String whom);\n}\n\npublic static void main(String[]\
    \ args) {\n    // 在此作用域中创建变量\n    final String greeting = \"Hello, \";\n\n   \
    \ Greeter greeter = new Greeter() {\n        @Override\n        public String\
    \ createGreeting(String whom) {\n            // 在此处封闭（即捕获）变量\n            return\
    \ greeting + whom + \"!\";\n        }\n    };\n\n    greetWorld(greeter);\n}\n\
    \npublic static void greetWorld(Greeter greeter) {\n    // 在此处让 greeter 使用封闭的变量\n\
    \    // 注意，\"greeting\" 变量已超出作用域\n    System.out.println(greeter.createGreeting(\"\
    World\"));\n}\n```\n\n**清单 2-7. Java 8 的 lambda 作为闭包**\n\n```\npublic static void\
    \ main(String[] args) {\n    String greeting = \"Hello, \";\n\n    Function<String,\
    \ String> greeter = whom -> greeting + whom + \"!\";\n\n    greetWorld(greeter);\n\
    }\n\npublic static void greetWorld(Function<String, String> greeter) {\n    System.out.println(greeter.apply(\"\
    World\"));\n}\n```\n\n### 无参数与多参数 Lambdas\n\n基本的 lambda 是接受单个参数的，但 Java 并不局限于此：你可以拥有零参数的\
    \ lambda，也可以拥有多参数的 lambda。每种情况的语法都略有不同，并且比简单情况更复杂。\n\n零参数 lambda 的语法有些奇怪：如何表示没有任何参数呢？仅仅使用右箭头而不带任何参数会导致\
