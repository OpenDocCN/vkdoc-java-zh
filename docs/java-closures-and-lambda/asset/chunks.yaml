    ## Lambdas and Classic Java Threading


    The first Java concurrency structure was the `Thread` class, and it still underlies
    all the other concurrency structures in the Java language. Lambdas work well with
    the `Thread` class, because the `Thread` class is built around the `Runnable`
    interface. As we saw in [chapter 2](#A978-1-4302-5999-2_2_Chapter.html), a lambda
    is implicitly converted into an interface implementation through type inference,
    so you can write this code:


    `Runnable r = () -> System.out.println("Hello, World!");`


    The `Thread` class has a constructor that takes a `Runnable`. In the world with
    Java 8 lambdas, this means that the `Thread` class has a constructor that takes
    a lambda: that lambda is converted into a `Runnable` by the compiler. This means
    that lambdas make writing `Thread` code much simpler: instead of having an anonymous
    inner class or some distant interface implementation, you can simply pass your
    lambda right in.


    A naïve approach to using the `Thread` class to solve our kata is to spawn a thread
    for each value to be calculated. Unfortunately, threads are not cheap, and you
    will quickly exhaust the resources of your virtual machine that way. Instead,
    we will spawn a certain number of threads, and split the work to be done evenly
    among them. Those threads will do the CPU-intensive work, so we will have one
    of those per processor core. We will have another thread that will be responsible
    for printing the values to standard out, since that is the I/O intensive work,
    and having multiple threads attempting to write to standard out is a bottleneck.
    Both these threads will be defined by passing the lambda right in.


