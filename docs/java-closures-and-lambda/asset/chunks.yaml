    ### 桥接数组与流


    在数组和流之间来回转换实际上非常简单。要从数组获取流，请使用 `Stream.of(array)`。要从流获取数组，你有两种选择：要么接受一个 `Object`
    实例数组并调用 `Stream.toArray()`；要么向该方法传递一种构造指定大小数组的方式，它将返回构造好的数组。定义供应器最简单的方法是传入数组构造器，例如
    `Integer[]::new`。清单 7-11 演示了如何从数组转换为流以及从流转换为数组。


    **清单 7-11\. 桥接数组与流**


    `import java.util.stream.*;`


    `public class Listing11 {`


      `public static Integer[] generateArray() {`


        `final Integer[] elements = new Integer[1000];`


        `for (int i = 0; i < elements.length; i++) {`


          `elements[i] = i;`


        `}`


        `return elements;`


      `}`


      `public static void main(String[] args) {`


        `Integer[] array = generateArray();`


        `Stream<Integer> stream = Stream.of(array);`


        `array = stream.toArray(Integer[]::new);`


      `}`


    `}`


    ## 让接口对 Lambda 更友好


    Java SDK 中的许多接口都只有一个非默认方法。`Runnable`、`Callable`、`AutoCloseable` 以及许多其他最常见的接口都是如此。这些接口可以直接使用
    lambda 来实现，只需在需要该接口的地方使用 lambda 即可。我们在代码中经常看到这种技巧，最近一次是在清单 7-5 中，我们在 `generateMap()`
    中返回了一个 lambda 作为 `ResourceExceptionHandler.FunctionWithResource` 的实现。因此，这些单方法接口已经可以很好地与
    lambda 配合使用。其余的大部分接口都非常庞大，例如 `Collection`，显然无法通过单个 lambda 来实现其全部功能。


    然而，SDK 中有一小部分接口——以及用户代码中的相当一部分接口——只有少数几个非默认方法，你可能非常希望能够通过 lambda 内联定义其实现。这是一个非常有用的技巧，但你无法使用
    lambda 同时定义多个方法，而我们需要同时定义多个方法。我们该怎么做呢？


    这就需要发挥一些创造力了。技巧在于定义一个新的单一方法，该方法可用于驱动所有其他方法的实现。然后用户指定这个新方法，我们的代码将委托给该新方法的实现。这个新方法和委托实现被放入一个扩展了目标接口的新接口中。


    例如，假设我们想要创建一个可以用 lambda 定义的 `Iterator`。`Iterator` 上有两个非默认方法：`hasNext()` 和 `next()`。两者都与下一个元素有关，但前者测试是否存在而不前进，而后者则前进。因此，我们的单一方法需要能够在前进和非前进两种模式下运行。由于
    `hasNext` 也可能查看迭代器的末尾之外（那里没有元素），我们的单一方法需要可选地返回其结果。结果就是这个方法：


    `Optional<E> maybeNext(boolean advance);`


    有了这个方法，我们就可以使用默认方法在迭代器中定义其他两个方法。对于 `next()`，我们调用 `maybeNext` 并传入 `true` 以进行前进。我们得到一个
    `Optional` 结果，并使用 Optional API 要么返回其包含的值，要么抛出 `NoSuchElement` 异常。对于 `hasNext()`，我们调用
    `maybeNext` 并传入 `false` 以避免前进。然后我们只需让调用者知道结果是否存在。所有这些都放入我们扩展了 `Iterator` 的新接口中。现在，用户可以将
    lambda 赋值给这个类型，从而得到一个 Iterator。这段代码以及其工作原理的演示，见清单 7-12。


    **清单 7-12\. 让 Iterator 对 Lambda 更友好**


    `import java.util.*;`


    `import java.util.concurrent.atomic.*;`


    `public class Listing12 {`


    `public interface LambdaIterator<E> extends Iterator<E> {`


    `Optional<E> maybeNext(boolean advance);`


    `default E next() {`


    `return maybeNext(true).orElseThrow(NoSuchElementException::new);`


    `}`


    `default boolean hasNext() {`


    `return maybeNext(false).isPresent();`


    `}`


    `}`


    `public static Iterator<String> generateIterator() {`


    `String[] values = new String[]{"Hello", " ", "World"};`


    `AtomicInteger nextI = new AtomicInteger(0);`


    `LambdaIterator<String> it = advance -> {`


    `if (nextI.get() >= values.length) return Optional.empty();`


    `String result = values[nextI.get()];`


    `if (advance) nextI.incrementAndGet();`


    `return Optional.of(result);`


    `};`


    `return it;`


    `}`


    `public static void main(String[] args) {`


    `Iterator<String> it = generateIterator();`


    `}`


    `}`


    这种方法的最大技巧在于，你必须想出一个巧妙的单一方法，能够处理任何给定方法的所有需求。你的超级方法确实可以访问接口中的其他方法，但如果你使用了这些其他方法，就需要格外小心，以免产生递归循环。想出一个好的单一方法，是那种应该能让你作为开发者感到兴奋的问题。

