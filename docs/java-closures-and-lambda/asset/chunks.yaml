    instance, let’s create a method that will get the featured book message, providing
    the default value if it is not set. We’ll follow the same default message created
    in Listing 3-7, but provide the default value on key lookup. We will do this using
    the `computeIfAbsent` method, which is the easy way of calculating defaults. Note
    that the `computeIfAbsent` method is also a convenient way to implement multimaps
    or canonicalized mappings, which are simply special cases of defaulted values.


    `map.computeIfAbsent(key, k -> new HashMap<>()); // Multimap`


    `map.computeIfAbsent(key, Function.identity());  // Canonicalized mapping`


    Listing 3-7\. A Library instance method to provide featured book messages using
    Map.computeIfAbsent


    `/**`


