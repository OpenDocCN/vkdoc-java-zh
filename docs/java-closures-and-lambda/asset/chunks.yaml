  raw: '### Handling Resources Using a Result Object


    Consider a stream where you want to process files. The files, however, may or
    may not exist, and if they do not exist, that has a specific meaning, as well.
    For instance, the files may be optional user-specified files, and if the file
    is not uploaded, then you want to use a default. In this case, you will want to
    keep the information about an IO error within the stream itself, so that you can
    process that error within the stream. This makes the handler approach we saw in
    the last section ill-suited, because you do not want to be querying another object
    to find out what happened earlier in the same stream. The unchecked exception
    situation would break consistently and get you nowhere. Instead, what you are
    looking for is a `Result` object.


    We saw the `Result` object before. It is a cousin of the `Optional` type, in that
    it holds a value that may or may not exist. However, the `Result` object will
    hold either the return value or an exception. These are the only two options out
    of any non-void Java computation. The `Result` type, like the `Optional` type,
    can provide a convenient API for accessing its contents.


    We used the `Result` object before, but let’s look at how such a type could be
    reimplemented now. What we want is to store either a return value or an exception,
    which means that we can have two fields. We expect only one of them to be null
    at any point in time; the other should be non-null. If you pass in a return value,
    we call that a “successful” Result instance. If you pass in an exception, we call
    that a “failure” Result instance. Since the type of the result and exception fields
    will depend on the caller’s contexts, we will make them type variables. In order
    to make for a nicer usage for the user, we can use static methods instead of exposing
    constructors: the static methods trick the Java type system into doing more type
    inference work for you, instead of having to repeat type information all over
    your code. We will also provide five accessors into our state: two boolean accessors
    that just check if the result is successful or a failure; two direct accessors
    that return the state of their field; and a combined accessor that returns the
    successful value if it is successful and explodes with the failure value if it
    is a failure. Using this type, we can then implement our basic inline stream error
    handling. The Result implementation and the error handling are demonstrated in
    Listing 7-6.


    Listing 7-6\. Handling Resources with a Result Type


    `import java.io.ByteArrayInputStream;`


    `import java.io.IOException;`


    `import java.io.InputStream;`


    `import java.util.*;`


    `import java.util.concurrent.atomic.*;`


    `import java.util.function.*;`


    `import java.util.stream.*;`


    `public class Listing6 {`


    `public static class Result<SUCCESS_T, FAILURE_T extends Exception> {`


    `private final SUCCESS_T success;`


    `private final FAILURE_T failure;`


    `private Result(final SUCCESS_T success, final FAILURE_T failure) {`


    `if (success == null && failure == null) {`


    `throw new IllegalArgumentException(`


    `"Success and failure cannot both be null");`


    `}`


    `if (success != null && failure != null) {`


    `throw new IllegalArgumentException(`


    `"Success and failure cannot both be non-null");`


    `}`


    `this.success = success;`


    `this.failure = failure;`


    `}`


    `public static <SUCCESS_T, FAILURE_T extends Exception>`


    `Result<SUCCESS_T, FAILURE_T> ofFailure(FAILURE_T failure)`


    `{`


    `Objects.requireNonNull(failure, "failure to assign is null");`


    `return new Result(null, failure);`


    `}`


    `public static <SUCCESS_T, FAILURE_T extends Exception>`


    `Result<SUCCESS_T, FAILURE_T> ofSuccess(SUCCESS_T success)`


    `{`


    `Objects.requireNonNull(success, "success to assign is null");`


    `return new Result<>(success, null);`


    `}`


    `public boolean isSuccess() { return success != null; }`


    `public boolean isFailure() { return failure != null; }`


    `/**`


    `* Provides the result on successful, or throws the failure exception`


    `* on failure.`


    `*`


    `* @return The success value on successful.`


    `* @throws FAILURE_T If this result is not successful.`


    `*/`


    `public SUCCESS_T get() throws FAILURE_T {`


    `if (success != null) return success;`


    `throw failure;`


    `}`


    `/**`


    `* Returns the success value, or {@code null} if this result is a failure.`


    `*`


    `* @return The success value or {@code null}.`


    `*/`


    `public SUCCESS_T getSuccess() {`


    `return success;`


    `}`


    `/**`


    `* Returns the failure, or {@code null} if this result is successful.`


    `*`


    `* @return The failure value or {@code null}.`


    `*/`


    `public FAILURE_T getFailure() {`


    `return failure;`


    `}`


    `@Override`


    `public String toString() {`


    `if (isSuccess()) {`


    `return "SUCCESS[" + success + "]";`


    `} else {`


    `return "FAILURE[" + failure + "]";`


    `}`


    `}`


    `}`


    `public static InputStream generateInputStream() {`


    `return new ByteArrayInputStream("foobar".getBytes());`


    `}`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static Function<Integer, Result<Integer, IOException>> generateMap() {`


    `AtomicInteger counter = new AtomicInteger(0);`


    `return i -> {`


    `int count = counter.incrementAndGet();`


    `try (InputStream in = Listing3.generateInputStream()) {`


    `if (i == 100) {`


    `return Result.ofFailure(`


    `new IOException(`


    `"And with a kiss, I die! (After " + count + " executions)")`


    `);`


    `}`


    `return Result.ofSuccess(i);`


    `} catch (IOException ioe) {`


    `return Result.ofFailure(ioe);`


    `}`


    `};`


    `}`


    `public static void main(String[] args) {`


    `// Perform the stream processing`


    `generateParallelStream()`


    `.map(generateMap())`


    `.forEach(result -> {`


    `if (result.isFailure()) {`


    `result.getFailure().printStackTrace(System.err);`


    `System.err.flush();`


    `} else {`


    `System.out.println(result.getSuccess());`


    `System.out.flush();`


    `}`


    `}`


    `);`


    `}`


    `}`


    This approach is safer and cleaner in that it requires the user to be more intentional
    about error handling, while also giving them the information necessary to perform
    that error handling. It also allows you to handle errors while the stream is being
    processed, instead of having to wait until afterwards. The downside of this approach
    is that it is not as easy to wrap existing resource-based code: you have to wrap
    your results in the `Result` object in the first place, as opposed to wrapping
    the whole method that you are trying to implement in some helper object.


    When you are working with resources in Java, you are working with syntactic sugar
    of a different flavor: it is not especially kind to post-functional code, but
    it was a very nice benefit for the imperative code that came before it. Your particular
    approach to bridging the paradigm depends on the needs of your particular system,
    but the sooner you can encapsulate the ugliness and move entirely into the post-functional
    world, the happier your code will be.'
  trans: '

    ### 使用结果对象处理资源


    设想一个需要处理文件的流。这些文件可能存在，也可能不存在；如果不存在，这本身也具有特定含义。例如，这些文件可能是用户可选指定的文件，如果文件未上传，那么你希望使用默认文件。在这种情况下，你需要在流内部保留关于
    IO 错误的信息，以便能够在流中处理该错误。这使得我们在上一节中看到的处理器方法变得不合适，因为你不想查询另一个对象来了解同一流中之前发生了什么。非受检异常的情况会持续中断，让你毫无进展。相反，你真正需要的是一个
    `Result` 对象。


    我们之前见过 `Result` 对象。它与 `Optional` 类型是近亲，因为它持有一个可能存在也可能不存在的值。然而，`Result` 对象要么持有返回值，要么持有一个异常。这是任何非
    void 的 Java 计算中仅有的两种可能。`Result` 类型，如同 `Optional` 类型，可以提供便捷的 API 来访问其内容。


    我们之前使用过 `Result` 对象，但现在让我们看看如何重新实现这样一个类型。我们想要存储一个返回值或一个异常，这意味着我们可以有两个字段。我们期望在任何时刻，其中一个字段为
    null，另一个字段非 null。如果你传入一个返回值，我们称之为“成功”的 Result 实例。如果你传入一个异常，我们称之为“失败”的 Result 实例。由于结果和异常字段的类型取决于调用者的上下文，我们将它们设为类型变量。为了给用户提供更好的使用体验，我们可以使用静态方法而不是暴露构造函数：静态方法可以欺骗
    Java 类型系统为你做更多的类型推断工作，而不必在整个代码中重复类型信息。我们还将提供五个访问器来访问我们的状态：两个布尔访问器，仅检查结果是成功还是失败；两个直接访问器，返回其字段的状态；以及一个组合访问器，如果成功则返回成功值，如果失败则抛出失败值。使用这个类型，我们就可以实现基本的行内流错误处理。Result
    的实现和错误处理如清单 7-6 所示。


    **清单 7-6. 使用 Result 类型处理资源**


    `import java.io.ByteArrayInputStream;`


    `import java.io.IOException;`


    `import java.io.InputStream;`


    `import java.util.*;`


    `import java.util.concurrent.atomic.*;`


    `import java.util.function.*;`


    `import java.util.stream.*;`


    `public class Listing6 {`


    `public static class Result<SUCCESS_T, FAILURE_T extends Exception> {`


    `private final SUCCESS_T success;`


    `private final FAILURE_T failure;`


    `private Result(final SUCCESS_T success, final FAILURE_T failure) {`


    `if (success == null && failure == null) {`


    `throw new IllegalArgumentException(`


    `"Success and failure cannot both be null");`


    `}`


    `if (success != null && failure != null) {`


    `throw new IllegalArgumentException(`


    `"Success and failure cannot both be non-null");`


    `}`


    `this.success = success;`


    `this.failure = failure;`


    `}`


    `public static <SUCCESS_T, FAILURE_T extends Exception>`


    `Result<SUCCESS_T, FAILURE_T> ofFailure(FAILURE_T failure)`


    `{`


    `Objects.requireNonNull(failure, "failure to assign is null");`


    `return new Result(null, failure);`


    `}`


    `public static <SUCCESS_T, FAILURE_T extends Exception>`


    `Result<SUCCESS_T, FAILURE_T> ofSuccess(SUCCESS_T success)`


    `{`


    `Objects.requireNonNull(success, "success to assign is null");`


    `return new Result<>(success, null);`


    `}`


    `public boolean isSuccess() { return success != null; }`


    `public boolean isFailure() { return failure != null; }`


    `/**`


    `* 成功时提供结果，失败时抛出失败异常。`


    `*`


    `* @return 成功时的成功值。`


    `* @throws FAILURE_T 如果此结果不成功。`


    `*/`


    `public SUCCESS_T get() throws FAILURE_T {`


    `if (success != null) return success;`


    `throw failure;`


    `}`


    `/**`


    `* 返回成功值，如果此结果是失败则返回 {@code null}。`


    `*`


    `* @return 成功值或 {@code null}。`


    `*/`


    `public SUCCESS_T getSuccess() {`


    `return success;`


    `}`


    `/**`


    `* 返回失败值，如果此结果是成功则返回 {@code null}。`


    `*`


    `* @return 失败值或 {@code null}。`


    `*/`


    `public FAILURE_T getFailure() {`


    `return failure;`


    `}`


    `@Override`


    `public String toString() {`


    `if (isSuccess()) {`


    `return "SUCCESS[" + success + "]";`


    `} else {`


    `return "FAILURE[" + failure + "]";`


    `}`


    `}`


    `}`


    `public static InputStream generateInputStream() {`


    `return new ByteArrayInputStream("foobar".getBytes());`


    `}`


    `public static Stream<Integer> generateParallelStream() {`


    `final int elements = 1000;`


    `List<Integer> toReturn = new ArrayList(elements);`


    `for (int i = 0; i < elements; i++) {`


    `toReturn.add(i);`


    `}`


    `return toReturn.parallelStream();`


    `}`


    `public static Function<Integer, Result<Integer, IOException>> generateMap() {`


    `AtomicInteger counter = new AtomicInteger(0);`


    `return i -> {`


    `int count = counter.incrementAndGet();`


    `try (InputStream in = Listing3.generateInputStream()) {`


    `if (i == 100) {`


    `return Result.ofFailure(`


    `new IOException(`


    `"And with a kiss, I die! (After " + count + " executions)")`


    `);`


    `}`


    `return Result.ofSuccess(i);`


    `} catch (IOException ioe) {`


    `return Result.ofFailure(ioe);`


    `}`


    `};`


    `}`


    `public static void main(String[] args) {`


    `// 执行流处理`


    `generateParallelStream()`


    `.map(generateMap())`


    `.forEach(result -> {`


    `if (result.isFailure()) {`


    `result.getFailure().printStackTrace(System.err);`


    `System.err.flush();`


