    2-19 所示。如果你这样做，编译器的错误信息几乎肯定会让你困惑。此时你可能会收到两种错误信息，具体取决于 Lambda 实现的细节。⁹ 这两种信息都在争夺
    Java 8 中最无帮助的错误信息称号，它们是 `"Cannot resolve method"` 和 `"Argument cannot be applied
    to <lambda parameter>"`。在这种情况下，你需要提供显式类型，正如我们在“带有显式类型的 Lambda 表达式”中讨论的那样。如果你的显式类型引用了原始类型，你将得到
    `IntFunction` 变体；如果你的显式类型引用了装箱类型，你将得到 `Function` 变体。


    **清单 2-19\. 使用原始函数式接口时的歧义方法类型**


    `static void methodBeingCalled(Function<Integer, String> function) {}`


    `static void methodBeingCalled(IntFunction<String> function) {}`


    `public static void main(String[] args) {`


      `// 这会抛出异常`


      `methodBeingCalled(i -> Integer.toString(i));`


      `// 这不会`


      `methodBeingCalled((int i) -> Integer.toString(i));`


    `}`


    ## 将方法转换为 Lambda 表达式


    在本章中，我们一直在显式地构造所有 Lambda 表达式：我们将 Lambda 表达式构造为匿名函数。然而，你也可以将任何方法调用转换为 Lambda 表达式。当我说“任何方法调用”时，我是认真的：静态方法、实例方法和构造函数都可以。这种微小的语法粘合剂使得从面向对象代码过渡到函数式代码变得非常容易，并真正提供了一种强大的方式来获得两种范式的最佳效果。


    从方法创建 Lambda 表达式的结构称为“方法引用”。创建方法引用的方式与调用方法非常相似，但使用双冒号（`::`）代替点号（`.`）。我喜欢将点号视为一个点，意思是“让我调用这个方法一次”，而冒号是许多点，意思是“让我多次调用这个方法”。一旦你使用双冒号创建了方法引用，你就可以像使用显式
    Lambda 表达式一样使用该方法引用。将方法转换为 Lambda 调用的细节将在下面的各个小节中介绍。


    ### 将静态方法转换为 Lambda 表达式


    最简单的情况是将静态方法转换为 Lambda 表达式。为此，你只需遵循我们上面列出的公式：获取方法调用，并将点号替换为冒号。编译器将查看该方法的签名并执行类型推断，为你构建适当的接口实现。清单
    2-20 展示了我们在 2-18 中看到的几个 Lambda 表达式的静态替代方案：请注意，编译器成功发现我们需要一个 `IntFunction<String>`，而不是
    `Function<Integer,String>`，并提供了适当的类型。如果目标类型签名存在歧义，例如在清单 2-19 中，那么你必须获得一个显式的类型签名。有两种方法可以做到这一点：要么使用带有显式类型的显式
    Lambda 表达式来解决它，要么将方法引用分配给具有所需类型的变量，然后将该变量传入。在 Java 8 中，无法对方法引用执行内联强制转换操作。


    **清单 2-20\. 由静态方法创建的 Lambda 表达式**


    `IntFunction<String> intToString = Integer::toString;`


    `ToIntFunction<String> parseInt = Integer::valueOf;`


    ### 将构造函数转换为 Lambda 表达式


    构造函数存在于静态方法和实例方法之间的奇怪领域：它们是实现作用于实例的静态方法。取决于你从哪个角度看，它们可能被称为 `"new"`、`"<init>"`，或者与类同名。获取构造函数的方法引用与获取静态方法的方法引用相同：只需使用
    `"new"` 作为方法名。从用户的角度来看，这确实很简单。然而，许多类有多个构造函数，因此类型推断在这里承担了大量繁重的工作。请参见清单 2-22，了解
    `BigInteger` 的 `String` 构造函数作为 `Function` 的示例。


    **清单 2-21\. 由构造函数创建的 Lambda 表达式**


    `Function<String,BigInteger> newBigInt = BigInteger::new;`

    '
- fmt: "### Making Instance Methods into Lambdas\n\nThe most interesting and clever\
    \ method reference is the instance method reference: you can literally package\
    \ up any object and pass its method call around. That object can then fall out\
    \ of scope, but its method is still available for use by way of this lambda. In\
    \ Listing 2-22, we show a variety of different kinds of instance method references.\
    \ In `print`, we use a static field reference to construct the method reference.\
    \ For `makeGreeting`, we are using a `String` constant value. Both `lookup` and\
    \ `randomInt` demonstrate a clever way to have a variable that is only accessible\
    \ through the lambda: in the case of `lookup`, it is the return value of a method;\
    \ in the case of `randomIt`, the object is constructed inline; `resolvePath` works\
    \ off the `base` field value; the `compareAgainst` method uses the argument to\
    \ generate a method reference. In all these cases, the instance is captured when\
    \ the lambda is created. This means that if `base` is reassigned, for instance,\
    \ `resolvePath` will still resolve against the previous `base`. Also, `randomInt`\
    \ always acts on the exact same `Random` instances, no matter how many times it\
    \ is called. Using instance methods this way allows you to configure an object,\
    \ and then use a key piece of functionality provided by that object without worrying\
    \ that someone will mess with the configuration.\n\n**Listing 2-22\\. Lambdas\
    \ Made from an Instance Method**\n\n```\nConsumer<String> print = System.out::println;\n\
    UnaryOperator<String> makeGreeting = \"Hello, \"::concat;\nIntFunction<String>\
    \ lookup = Arrays.asList(\"a\",\"b\",\"c\")::get;\nIntSupplier randomInt = new\
    \ Random()::nextInt;\nPath base = Paths.get(\".\");\nFunction<String,Path> resolvePath\
    \ = base::resolve;\npublic IntUnaryOperator compareAgainst(Integer compareLeft)\
    \ {\n  return compareLeft::compareTo;\n}\n```\n\n### Specifying a Method to Be\
    \ Used Later\n\nThe final way to use method references is perhaps the strangest\
    \ in Java’s object-oriented world: you can specify a method to be executed later\
    \ on some arbitrary instance. The idea here is that you specify the name of an\
    \ instance method, and that becomes a function whose first argument is the one\
    \ that is implemented.\n\nSo this:\n\n```\nUnaryOperator<String> stringOp = String::concat\n\
    ```\n\nIs equivalent to:\n\n```\nUnaryOperator<String> stringOp = (x,y) -> x.concat(y);\n\
    ```\n\nAs you can see, the method reference is constructed exactly the same way\
    \ as the static method. Java recognizes it as an instance method, and therefore\
    \ constructs the appropriate kind of lambda. Again, type inference is doing a\
    \ lot of heavy lifting for us in order to maintain a nice syntax.\n\nThis use\
    \ of a method reference is very common as an alternative to iteration: you can\
    \ pass in a method that is executed for each element of a collection. Most developers\
    \ familiar with this kind of stunt are used to seeing it in dynamically typed\
    \ languages: for instance, this is the “star-dot operator” in Groovy. In Java\
    \ 8, you can now pull off a similar stunt while retaining type safety.\n\n## Lambdas\
    \ as Interface Implementations\n\nIf you are following along at home, you may\
    \ have noticed the error when we attempted to assign a lambda to an `Object` way\
    \ back in Listing 2-3\\. That error read, “Target type of a lambda conversion\
    \ must be an interface.” That is some highly precise jargon, so let’s unpack it.\
    \ When the compiler encounters a lambda, it attempts to make that lambda into\
    \ a type that is sensical within Java’s type system. That process is called “lambda\
    \ conversion,” and the destination for the lambda’s conversion is called the “target\
    \ type.” The compiler only knows how to convert lambdas into interfaces—it cannot\
    \ convert into primitive types, abstract types, or concrete types. So far, we\
    \ have been exclusively using Java’s functional interfaces, but lambdas can also\
    \ be used to implement other interfaces, including interfaces that you define.\
    \ This is very powerful, especially when combined with the ability to make any\
    \ method call into a lambda. We already saw this at work in the previous chapter,\
    \ in Listing 1-11 and 1-12\\. Here, we will get into the details and limitations.\n\
    \nThe basic idea is that if you have an interface with a single abstract method,\
    \ you can use a lambda to provide an implementation of that interface. This means\
    \ that it is easy to provide a lambda as an implementation of `Comparable`, `Iterable`,\
    \ and `Autocloseable`, but not `Iterator` or `Collection`. In Listing 2-23, we\
    \ see a few useful and common tricks.\n\n**Listing 2-23\\. Various Examples of\
    \ Useful Interfaces Implemented by Lambdas**\n\n```\n/**\n * Given a {@link java.sql.Connection}\
    \ in transactional mode, automatically\n * commit a transaction using Java's {@code\
    \ try-with-resources}.\n */\npublic static AutoCloseable autoCommit(Connection\
    \ c) throws SQLException {\n  if (c == null) return () -> {};\n  return c::commit;\n\
    }\n\n// Create concurrency interfaces from lambdas\nRunnable runMe = () -> System.out.println(\"\
    Ran!\");\nCallable<Long> callMe = System::currentTimeMillis;\nThreadFactory t\
    \ = Thread::new;\n\n// Implement listener interfaces\nExceptionListener listener\
    \ = Exception::printStackTrace;\n```"
  raw: '### Making Instance Methods into Lambdas


    The most interesting and clever method reference is the instance method reference:
    you can literally package up any object and pass its method call around. That
    object can then fall out of scope, but its method is still available for use by
    way of this lambda. In Listing 2-22, we show a variety of different kinds of instance
    method references. In `print`, we use a static field reference to construct the
    method reference. For `makeGreeting`, we are using a `String` constant value.
    Both `lookup` and `randomInt` demonstrate a clever way to have a variable that
    is only accessible through the lambda: in the case of `lookup`, it is the return
    value of a method; in the case of `randomIt`, the object is constructed inline;
    `resolvePath` works off the `base` field value; the `compareAgainst` method uses
    the argument to generate a method reference. In all these cases, the instance
    is captured when the lambda is created. This means that if `base` is reassigned,
    for instance, `resolvePath` will still resolve against the previous `base`. Also,
    `randomInt` always acts on the exact same `Random` instances, no matter how many
    times it is called. Using instance methods this way allows you to configure an
    object, and then use a key piece of functionality provided by that object without
    worrying that someone will mess with the configuration.


    Listing 2-22\. Lambdas Made from an Instance Method


    `Consumer<String> print = System.out::println;`


    `UnaryOperator<String> makeGreeting = "Hello, "::concat;`


    `IntFunction<String> lookup = Arrays.asList("a","b","c")::get;`


    `IntSupplier randomInt = new Random()::nextInt;`


    `Path base = Paths.get(".");`


    `Function<String,Path> resolvePath = base::resolve;`


    `public IntUnaryOperator compareAgainst(Integer compareLeft) {`


      `return compareLeft::compareTo;`


    `}`


    ### Specifying a Method to Be Used Later


    The final way to use method references is perhaps the strangest in Java’s object-oriented
    world: you can specify a method to be executed later on some arbitrary instance.
    The idea here is that you specify the name of an instance method, and that becomes
    a function whose first argument is the one that is implemented.


    So this:


    `UnaryOperator<String> stringOp = String::concat`


    Is equivalent to:


    `UnaryOperator<String> stringOp = (x,y) -> x.concat(y);`


    As you can see, the method reference is constructed exactly the same way as the
    static method. Java recognizes it as an instance method, and therefore constructs
    the appropriate kind of lambda. Again, type inference is doing a lot of heavy
    lifting for us in order to maintain a nice syntax.


    This use of a method reference is very common as an alternative to iteration:
    you can pass in a method that is executed for each element of a collection. Most
    developers familiar with this kind of stunt are used to seeing it in dynamically
    typed languages: for instance, this is the “star-dot operator” in Groovy. In Java
    8, you can now pull off a similar stunt while retaining type safety.


    ## Lambdas as Interface Implementations


    If you are following along at home, you may have noticed the error when we attempted
    to assign a lambda to an `Object` way back in Listing 2-3\. That error read, “Target
    type of a lambda conversion must be an interface.” That is some highly precise
    jargon, so let’s unpack it. When the compiler encounters a lambda, it attempts
    to make that lambda into a type that is sensical within Java’s type system. That
    process is called “lambda conversion,” and the destination for the lambda’s conversion
    is called the “target type.” The compiler only knows how to convert lambdas into
    interfaces—it cannot convert into primitive types, abstract types, or concrete
    types. So far, we have been exclusively using Java’s functional interfaces, but
    lambdas can also be used to implement other interfaces, including interfaces that
    you define. This is very powerful, especially when combined with the ability to
    make any method call into a lambda. We already saw this at work in the previous
    chapter, in Listing 1-11 and 1-12\. Here, we will get into the details and limitations.


    The basic idea is that if you have an interface with a single abstract method,
    you can use a lambda to provide an implementation of that interface. This means
    that it is easy to provide a lambda as an implementation of `Comparable`, `Iterable`,
    and `Autocloseable`, but not `Iterator` or `Collection`. In Listing 2-23, we see
    a few useful and common tricks.


    Listing 2-23\. Various Examples of Useful Interfaces Implemented by Lambdas


    `/**`


    `* Given a {@link java.sql.Connection} in transactional mode, automatically`


    `* commit a transaction using Java''s {@code try-with-resources}.`


    `*/`


    `public static AutoCloseable autoCommit(Connection c) throws SQLException {`


      `if (c == null) return () -> {};`


      `return c::commit;`


    `}`


    `// Create concurrency interfaces from lambdas`


    `Runnable runMe = () -> System.out.println("Ran!");`


    `Callable<Long> callMe = System::currentTimeMillis;`


    `ThreadFactory t = Thread::new;`


    `// Implement listener interfaces`


    `ExceptionListener listener = Exception::printStackTrace;`'
  trans: '

    ### 将实例方法转换为 Lambda


    最有趣且最巧妙的方法引用是实例方法引用：你可以将任何对象打包，并将其方法调用传递出去。该对象随后可能超出作用域，但其方法仍可通过此 lambda 使用。在清单
    2-22 中，我们展示了多种不同类型的实例方法引用。在 `print` 中，我们使用静态字段引用来构造方法引用。对于 `makeGreeting`，我们使用了一个
    `String` 常量值。`lookup` 和 `randomInt` 都展示了一种巧妙的方式，让变量只能通过 lambda 访问：在 `lookup` 的例子中，它是一个方法的返回值；在
    `randomInt` 的例子中，对象是内联构造的；`resolvePath` 基于 `base` 字段值工作；`compareAgainst` 方法则使用参数来生成一个方法引用。在所有这些情况下，实例都是在创建
    lambda 时被捕获的。这意味着，例如，如果 `base` 被重新赋值，`resolvePath` 仍然会基于之前的 `base` 进行解析。此外，无论调用多少次，`randomInt`
    始终作用于完全相同的 `Random` 实例。以这种方式使用实例方法，你可以配置一个对象，然后使用该对象提供的某个关键功能，而无需担心有人会篡改配置。


    **清单 2-22\. 由实例方法创建的 Lambda**


    `Consumer<String> print = System.out::println;`


    `UnaryOperator<String> makeGreeting = "Hello, "::concat;`


    `IntFunction<String> lookup = Arrays.asList("a","b","c")::get;`


    `IntSupplier randomInt = new Random()::nextInt;`


    `Path base = Paths.get(".");`


    `Function<String,Path> resolvePath = base::resolve;`


    `public IntUnaryOperator compareAgainst(Integer compareLeft) {`


      `return compareLeft::compareTo;`


    `}`


    ### 指定稍后使用的方法


    使用方法引用的最后一种方式在 Java 的面向对象世界中或许是最奇怪的：你可以指定一个方法，稍后在某个任意实例上执行。其思路是，你指定一个实例方法的名称，它就会变成一个函数，该函数的第一个参数就是被调用的那个实例。


    所以这段代码：


    `UnaryOperator<String> stringOp = String::concat`


    等价于：


    `UnaryOperator<String> stringOp = (x,y) -> x.concat(y);`


    如你所见，方法引用的构造方式与静态方法完全相同。Java 会将其识别为实例方法，并因此构造出相应类型的 lambda。同样，类型推断为我们承担了大量繁重的工作，以保持语法的简洁性。


    这种使用方法引用的方式作为迭代的替代方案非常常见：你可以传入一个方法，该方法会对集合中的每个元素执行。大多数熟悉这种技巧的开发人员通常会在动态类型语言中看到它：例如，在
    Groovy 中这就是“星点运算符”。在 Java 8 中，你现在可以在保持类型安全的同时实现类似的技巧。


    ## 作为接口实现的 Lambda


    如果你在家跟着操作，可能会注意到在清单 2-3 中，当我们试图将 lambda 赋值给一个 `Object` 时出现的错误。该错误信息是：“Lambda 转换的目标类型必须是接口。”
    这是一个非常精确的术语，让我们来解读一下。当编译器遇到 lambda 时，它会尝试将该 lambda 转换为 Java 类型系统中一个有意义的类型。这个过程被称为“lambda
    转换”，而 lambda 转换的目标被称为“目标类型”。编译器只知道如何将 lambda 转换为接口——它不能转换为原始类型、抽象类型或具体类型。到目前为止，我们一直只使用
    Java 的函数式接口，但 lambda 也可以用于实现其他接口，包括你自定义的接口。这非常强大，尤其是与将任何方法调用转换为 lambda 的能力结合使用时。我们在前一章的清单
    1-11 和 1-12 中已经看到了这一点。在这里，我们将深入探讨其细节和限制。


    基本思想是，如果你有一个包含单个抽象方法的接口，你可以使用 lambda 来提供该接口的实现。这意味着，很容易将 lambda 作为 `Comparable`、`Iterable`
    和 `Autocloseable` 的实现提供，但不能用于 `Iterator` 或 `Collection`。在清单 2-23 中，我们看到了一些有用且常见的技巧。


    **清单 2-23\. 由 Lambda 实现的有用接口的各种示例**


    `/**`


    `* 给定一个处于事务模式的 {@link java.sql.Connection}，`


    `* 使用 Java 的 {@code try-with-resources} 自动提交事务。`


    `*/`


    `public static AutoCloseable autoCommit(Connection c) throws SQLException {`


      `if (c == null) return () -> {};`


      `return c::commit;`


    `}`


    `// 从 lambda 创建并发接口`


    `Runnable runMe = () -> System.out.println("Ran!");`


    `Callable<Long> callMe = System::currentTimeMillis;`


    `ThreadFactory t = Thread::new;`


    `// 实现监听器接口`


    `ExceptionListener listener = Exception::printStackTrace;`

