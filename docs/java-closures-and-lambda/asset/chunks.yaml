    \ be defined by passing the lambda right in.\n\nNow, one catch with threads is\
    \ that they swallow errors by default. If you provide some work for a thread to\
    \ do, and that work explodes with a `RuntimeException`, then the thread just silently\
    \ dies. In order to get some kind of error messaging, you have to set a `Thread.UncaughtExceptionHandler`\
    \ instance. This can be set either on the thread or globally, but the same type\
