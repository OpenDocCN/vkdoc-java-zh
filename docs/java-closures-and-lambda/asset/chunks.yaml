    \ `catch` 块中的 `return` 必须与 `try` 块中的 `return` 匹配。许多 Java 开发人员的自然反应是在此时返回 `null`，但这只会增加遇到\
    \ `NullPointerException` 的可能性，因为它期望调用者处理这种情况，同时又让他们很容易忽略这种情况。根据你的具体情况，有三种更好的选择：非受检异常、异常处理调用者或\
    \ `Result` 对象。\n\n### 通过抛出非受检异常来处理资源\n\n一种非常流行且常见的解决方案是通过将受检异常转换为非受检异常并重新抛出它们来处理。这将处理异常情况的责任交回给调用者，并且异常可能会在执行栈中回溯相当长的距离，直到遇到异常处理器。希望无论异常处理器在哪里，它都能以智能的方式处理异常情况。\n\
