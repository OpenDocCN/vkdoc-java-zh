    最后一部分是“Code”部分。这是定义方法主体的地方。数字是偏移量，它告诉你方法在字节码中的长度。在我们的例子中，该方法唯一要做的事情就是返回，所以索引 0
    处只有一条指令：`return`。`locals` 值是该方法使用的局部变量数量，`args_size` 是参数的大小。剩下要解释的就是 `stack=0`。


    Java 字节码是一种基于栈的语言。存在更复杂的基于栈的语言（例如 Factor），所以不要因为你使用 Java 字节码的经验而对所有基于栈的语言形成看法。尽管如此，Java
    字节码是一种基于栈的语言这一事实意味着每条指令都在栈上操作。你在字节码中做的一切要么是非操作（“nop”），要么是将元素推入栈，要么是将元素弹出。因此，Java
    中的每个行为（例如，引用一个变量）都对应一些栈操作序列（例如，将变量的值推入栈）。可能会有副作用，最显著的是在流程控制中：例如，当你调用一个方法时，你正在从栈中弹出元素来调用该方法，而当方法返回时，它可能会将一个元素推回栈。


    在字节码中，每个方法都必须声明其特定栈的最大深度。这允许运行时优化栈的分配：它可以在进入方法时一次性分配一个内存块，而不是在元素被推入栈时可能需要分配更多内存。在我们的
    main 方法的情况下，我们不需要栈上的任何空间，因为我们只是要返回 void。因此，我们的字节码通过设置 `stack=0` 告诉运行时我们需要一个大小为
    0 的栈。这就是我们的 main 方法的全部内容。然而，构造函数（第 37–49 行）则稍微复杂一些：


