- fmt: "# Java 8 Returns Java to the Forefront\n\nSoftware development is exciting\
    \ because its core problems have not been solved yet: the practices, processes,\
    \ and tools that go into software development are in a state of constant evolution\
    \ and development. We can see this in the way that the dominant programming paradigm\
    \ has changed: in the late ‘80s and through the ‘90s, the answer to every question\
    \ was objects; now, programmers expect a wider palette with which to express code.\n\
    \nOver the course of the last decade, programmers have begun borrowing more from\
    \ a paradigm called “functional programming.” Whereas an object-oriented paradigm\
    \ thinks about objects, and objects have behaviors, functional programming thinks\
    \ in terms of verbs (functions), which act on nouns (arguments). Whereas object-oriented\
    \ programming builds up a mechanism of interacting objects, functional programming\
    \ builds up a function that is resolved through composite functions.\n\nAn object-oriented\
    \ program can be thought of as a corporate environment. You have a CEO (the “Main\
    \ Class”), who issues high-level orders. Subordinates take up these orders. Although\
    \ these subordinates each have some of their own data (their own files on their\
    \ computer and their own stickie notes on their desk), these subordinates mostly\
    \ delegate to their own subordinates. As you get farther down this chain, the\
    \ subordinates become more technical (implementation-specific), with the end of\
    \ the chain performing the last precise bit of work. Then the result of the action\
    \ (either an exception or a return value) is communicated back up through the\
    \ chain of subordinates to the CEO, who may then issue another command.\n\n![A978-1-4302-5999-2_1_Figa_HTML.jpg](A978-1-4302-5999-2_1_Figa_HTML.jpg)\n\
    \nA functional program, however, is modeled on mathematics. The idea is that the\
    \ inputs to the application are the arguments to a function, and the outputs of\
    \ the application are the value that the function returns. Whereas the object-oriented\
    \ subordinates may contain their own state, mathematical functions are stateless:\
    \ they will always return the same value and have no side effects. A mathematical\
    \ function is not so much a behavior as a statement of eternal truth: `\"f(2)\"\
    ` does not mean “apply 2 to f”, but rather “the value when f’s argument is bound\
    \ to 2”. In functional programming, the goal is to have all the functions in the\
    \ application behave like these mathematical functions. This function may be defined\
    \ in terms of other functions, but the program is ultimately a single function\
    \ application, not a series of executive commands.\n\n![A978-1-4302-5999-2_1_Figb_HTML.jpg](A978-1-4302-5999-2_1_Figb_HTML.jpg)\n\
    \nAlthough functional programming and object-oriented programming are theoretically\
    \ equivalent, some solutions are more naturally expressed in one paradigm versus\
    \ the other: for a given problem, the intuitive solution within each paradigm\
    \ can be quite different. In the example I gave at the start of this chapter,\
    \ object oriented required us to create a “Predicate” object with the behavior\
    \ of returning true if the argument is not null. In functional programming, we\
    \ simply provide a function that returns true if the argument is not null: there’s\
    \ no need for an object to hold onto that behavior. In this case, functional programming\
    \ was the more intuitive solution to the problem because there was no state, nothing\
    \ to encapsulate, and inheritance was nonsensical.\n\nThroughout the early 21st\
    \ century, many forward-looking developers saw the value in the functional programming\
    \ style. That style melds especially well with many development techniques that\
    \ were then becoming popularized, such as test-driven development, and it was\
    \ especially useful in highly distributed or highly concurrent environments. Many\
    \ of the problems people were encountering—such as how to send not just data but\
    \ also commands over a line—have natural solutions within functional programming\
    \ style. Some technology pundits, including your humble author, predicted that\
    \ a new functional programming language would arise that would render Java obsolete\
    \ in much the way that Java has rendered C++ obsolete. Obviously, this did not\
    \ happen on the Java Virtual Machine.[²](#A978-1-4302-5999-2_1_Chapter.html#Fn2)\n\
    \nWhat happened was actually stranger than we expected. Instead of a pure functional\
    \ programming language arising, new object-oriented languages populated the development\
    \ environment. These languages, although undoubtedly object oriented, also integrated\
    \ techniques and capabilities from the functional programming styles. In these\
    \ hybrid languages, the developer can work with functions like in the functional\
    \ languages, but those functions can have state, making them more like objects.\
    \ Ruby, Groovy, Scala, and JavaScript are all examples of this kind of language.\
    \ After many years, Java has now joined the ranks with Java 8. Starting with Java\
    \ 8, Java integrates some of these popular techniques into the core Java language\
    \ itself.\n\nWithin the functional programming paradigm, one of the most popular\
    \ techniques is lambdas, which are more informally called closures.[³](#A978-1-4302-5999-2_1_Chapter.html#Fn3)\
    \ A lambda is a set of instructions that can be saved as a variable, passed about\
    \ through the program, and executed at a later time (possibly multiple times).\
    \ To understand what this means, consider a simple `for` loop, such as in Listing\
    \ 1-8: when the program execution encounters this loop, it executes the loop immediately\
    \ and then moves on. Imagine, instead, that you could store the loop into a variable,\
    \ and then pass it around, executing it later at some faraway location, such as\
    \ in the made-up code in Listing 1-9. That is what lambdas allow you to do; Java\
    \ 8’s version of this code is in Listing 1-10.\n\n**Listing 1-8. Simple Loop**\n\
    \n```\nfor(Object it : list) {\n    System.out.println(it);\n}\n```\n\n**Listing\
    \ 1-9. Storing a Simple Loop (Not Real Code)**\n\n```\n// This is not Java code\n\
    Loop printObjects = for(Object it : list) {\n    System.out.println(it);\n}\n\
    ```\n\n**Listing 1-10. Storing a Simple Loop in Java 8**\n\n```\nConsumer<Iterable>\
    \ printObjects = list -> {\n    for(Object it : list) {\n        System.out.println(it);\n\
    \    }\n};\n\n// For the record, this is the same result in more idiomatic Java\
    \ 8 code:\nConsumer<Iterable> printObjects = list -> list.forEach(System.out::println);\n\
    ```\n\nThis may seem like a relatively minor language feature, but the impact\
    \ of introducing lambdas was so significant that the lambdas were too big to be\
    \ a part of Java 7’s Project Coin,[⁴](#A978-1-4302-5999-2_1_Chapter.html#Fn4)\
    \ and instead became the driving feature of Java 8. This language feature is so\
    \ significant because it enables a new way of interacting with the objects that\
    \ make up a Java program: now, we can have behaviors without needing to reference\
    \ an object; and we can define verbs without first having to define a noun.\n\n\
    The rest of this book will explore the implications of this new language feature,\
    \ and how we can change the way that we write Java code to take advantage of this\
    \ change. The result will be more functional code in both respects: both more\
    \ function-oriented code, and also code that works better. The reason is because\
    \ we can now express more directly and succinctly our intent in certain very common\
    \ cases, and we have a powerful new tool for decomposing our code into more maintainable\
    \ pieces. To understand how this works, let’s turn to a very specific and likely\
    \ familiar situation in Java."
  raw: '## Java 8 Returns Java to the Forefront


    Software development is exciting because its core problems have not been solved
    yet: the practices, processes, and tools that go into software development are
    in a state of constant evolution and development. We can see this in the way that
    the dominant programming paradigm has changed: in the late ‘80s and through the
    ‘90s, the answer to every question was objects; now, programmers expect a wider
    palette with which to express code.


    Over the course of the last decade, programmers have begun borrowing more from
    a paradigm called “functional programming.” Whereas an object-oriented paradigm
    thinks about objects, and objects have behaviors, functional programming thinks
    in terms of verbs (functions), which act on nouns (arguments). Whereas object-oriented
    programming builds up a mechanism of interacting objects, functional programming
    builds up a function that is resolved through composite functions.


    An object-oriented program can be thought of as a corporate environment. You have
    a CEO (the “Main Class”), who issues high-level orders. Subordinates take up these
    orders. Although these subordinates each have some of their own data (their own
    files on their computer and their own stickie notes on their desk), these subordinates
    mostly delegate to their own subordinates. As you get farther down this chain,
    the subordinates become more technical (implementation-specific), with the end
    of the chain performing the last precise bit of work. Then the result of the action
    (either an exception or a return value) is communicated back up through the chain
    of subordinates to the CEO, who may then issue another command.


    ![A978-1-4302-5999-2_1_Figa_HTML.jpg](A978-1-4302-5999-2_1_Figa_HTML.jpg)


    A functional program, however, is modeled on mathematics. The idea is that the
    inputs to the application are the arguments to a function, and the outputs of
    the application are the value that the function returns. Whereas the object-oriented
    subordinates may contain their own state, mathematical functions are stateless:
    they will always return the same value and have no side effects. A mathematical
    function is not so much a behavior as a statement of eternal truth: `"f(2)"` does
    not mean “apply 2 to f”, but rather “the value when f’s argument is bound to 2”.
    In functional programming, the goal is to have all the functions in the application
    behave like these mathematical functions. This function may be defined in terms
    of other functions, but the program is ultimately a single function application,
    not a series of executive commands.


    ![A978-1-4302-5999-2_1_Figb_HTML.jpg](A978-1-4302-5999-2_1_Figb_HTML.jpg)


    Although functional programming and object-oriented programming are theoretically
    equivalent, some solutions are more naturally expressed in one paradigm versus
    the other: for a given problem, the intuitive solution within each paradigm can
    be quite different. In the example I gave at the start of this chapter, object
    oriented required us to create a “Predicate” object with the behavior of returning
    true if the argument is not null. In functional programming, we simply provide
    a function that returns true if the argument is not null: there’s no need for
    an object to hold onto that behavior. In this case, functional programming was
    the more intuitive solution to the problem because there was no state, nothing
    to encapsulate, and inheritance was nonsensical.


    Throughout the early 21st century, many forward-looking developers saw the value
    in the functional programming style. That style melds especially well with many
    development techniques that were then becoming popularized, such as test-driven
    development, and it was especially useful in highly distributed or highly concurrent
    environments. Many of the problems people were encountering—such as how to send
    not just data but also commands over a line—have natural solutions within functional
    programming style. Some technology pundits, including your humble author, predicted
    that a new functional programming language would arise that would render Java
    obsolete in much the way that Java has rendered C++ obsolete. Obviously, this
    did not happen on the Java Virtual Machine.[²](#A978-1-4302-5999-2_1_Chapter.html#Fn2)


    What happened was actually stranger than we expected. Instead of a pure functional
    programming language arising, new object-oriented languages populated the development
    environment. These languages, although undoubtedly object oriented, also integrated
    techniques and capabilities from the functional programming styles. In these hybrid
    languages, the developer can work with functions like in the functional languages,
    but those functions can have state, making them more like objects. Ruby, Groovy,
    Scala, and JavaScript are all examples of this kind of language. After many years,
    Java has now joined the ranks with Java 8\. Starting with Java 8, Java integrates
    some of these popular techniques into the core Java language itself.


    Within the functional programming paradigm, one of the most popular techniques
    is lambdas, which are more informally called closures.[³](#A978-1-4302-5999-2_1_Chapter.html#Fn3)
    A lambda is a set of instructions that can be saved as a variable, passed about
    through the program, and executed at a later time (possibly multiple times). To
    understand what this means, consider a simple `for` loop, such as in Listing 1-8:
    when the program execution encounters this loop, it executes the loop immediately
    and then moves on. Imagine, instead, that you could store the loop into a variable,
    and then pass it around, executing it later at some faraway location, such as
    in the made-up code in Listing 1-9\. That is what lambdas allow you to do; Java
    8’s version of this code is in Listing 1-10.


    Listing 1-8\. Simple Loop


    `for(Object it : list) {`


    `System.out.println(it);`


    `}`


    Listing 1-9\. Storing a Simple Loop (Not Real Code)


    `// This is not Java code`


    `Loop printObjects = for(Object it : list) {`


    `System.out.println(it);`


    `}`


    Listing 1-10\. Storing a Simple Loop in Java 8


    `Consumer<Iterable> printObjects = list -> {`


    `for(Object it : list) {`


    `System.out.println(it);`


    `}`


    `};`


    `// For the record, this is the same result in more idiomatic Java 8 code:`


    `Consumer<Iterable> printObjects = list -> list.forEach(System.out::println);`


    This may seem like a relatively minor language feature, but the impact of introducing
    lambdas was so significant that the lambdas were too big to be a part of Java
    7’s Project Coin,[⁴](#A978-1-4302-5999-2_1_Chapter.html#Fn4) and instead became
    the driving feature of Java 8\. This language feature is so significant because
    it enables a new way of interacting with the objects that make up a Java program:
    now, we can have behaviors without needing to reference an object; and we can
    define verbs without first having to define a noun.


    The rest of this book will explore the implications of this new language feature,
    and how we can change the way that we write Java code to take advantage of this
    change. The result will be more functional code in both respects: both more function-oriented
    code, and also code that works better. The reason is because we can now express
    more directly and succinctly our intent in certain very common cases, and we have
    a powerful new tool for decomposing our code into more maintainable pieces. To
    understand how this works, let’s turn to a very specific and likely familiar situation
    in Java.'
  trans: '

    ## Java 8 将 Java 重新带回前沿


    软件开发之所以激动人心，是因为其核心问题尚未解决：软件开发中的实践、流程和工具始终处于不断演进和发展的状态。这一点可以从主流编程范式的变迁中看出：在 80
    年代末到 90 年代，所有问题的答案都是对象；而现在，程序员需要更丰富的表达方式来编写代码。


    在过去十年间，程序员开始更多地借鉴一种名为“函数式编程”的范式。面向对象范式关注的是对象，而对象拥有行为；函数式编程则关注动词（函数），这些动词作用于名词（参数）。面向对象编程构建了一套对象交互的机制，而函数式编程则构建了一个通过复合函数来解析的函数。


    面向对象程序可以想象成一个企业环境。你有一位 CEO（“主类”），他发布高层指令。下属们接手这些指令。尽管这些下属各自拥有一些数据（自己电脑上的文件、办公桌上的便利贴），但他们大多会将任务委派给自己的下属。沿着这个链条向下，下属变得越来越技术化（实现细节化），链条末端则执行最后一项精确的工作。然后，操作的结果（要么是异常，要么是返回值）会沿着下属链条向上传递回
    CEO，CEO 随后可能再发布另一条指令。


    ![A978-1-4302-5999-2_1_Figa_HTML.jpg](img/A978-1-4302-5999-2_1_Figa_HTML.jpg)


    然而，函数式程序是以数学为模型的。其理念是：应用程序的输入是函数的参数，应用程序的输出是函数返回的值。面向对象中的下属可能包含自身状态，而数学函数是无状态的：它们总是返回相同的值，并且没有副作用。数学函数与其说是一种行为，不如说是一种永恒真理的陈述：`"f(2)"`
    并不意味着“将 2 应用于 f”，而是“当 f 的参数绑定到 2 时的值”。在函数式编程中，目标是让应用程序中的所有函数都像这些数学函数一样运作。这个函数可能由其他函数定义，但程序最终是一个单一的函数应用，而不是一系列执行命令。


    ![A978-1-4302-5999-2_1_Figb_HTML.jpg](img/A978-1-4302-5999-2_1_Figb_HTML.jpg)


    尽管函数式编程和面向对象编程在理论上是等价的，但某些解决方案在一种范式下比另一种范式表达得更自然：对于给定的问题，每种范式下的直观解决方案可能大相径庭。在本章开头给出的例子中，面向对象要求我们创建一个“Predicate”对象，其行为是当参数不为
    null 时返回 true。在函数式编程中，我们只需提供一个函数，当参数不为 null 时返回 true：不需要一个对象来持有该行为。在这种情况下，函数式编程是更直观的解决方案，因为没有状态，没有需要封装的内容，继承也毫无意义。


    在 21 世纪初期，许多有远见的开发者看到了函数式编程风格的价值。这种风格与当时正在流行的许多开发技术（如测试驱动开发）融合得特别好，并且在高度分布式或高度并发的环境中尤其有用。人们遇到的许多问题——例如如何在线路上不仅发送数据，还发送命令——在函数式编程风格中都有自然的解决方案。一些技术权威人士，包括鄙人，曾预测会出现一种新的函数式编程语言，使
    Java 过时，就像 Java 使 C++ 过时一样。显然，这在 Java 虚拟机上并没有发生。²


    实际发生的情况比我们预期的更奇怪。并没有出现纯粹的函数式编程语言，而是新的面向对象语言占据了开发环境。这些语言虽然无疑是面向对象的，但也整合了函数式编程风格的技术和能力。在这些混合语言中，开发者可以像在函数式语言中一样使用函数，但这些函数可以拥有状态，使它们更像对象。Ruby、Groovy、Scala
    和 JavaScript 都是这类语言的例子。多年之后，Java 现在也通过 Java 8 加入了这一行列。从 Java 8 开始，Java 将其中一些流行技术整合到了核心
    Java 语言本身中。


    在函数式编程范式中，最流行的技术之一是 lambda，它更非正式地被称为闭包。³ Lambda 是一组可以保存为变量、在程序中传递、并在稍后（可能多次）执行的指令。要理解这意味着什么，考虑一个简单的
    `for` 循环，如清单 1-8 所示：当程序执行遇到这个循环时，它会立即执行循环，然后继续。想象一下，你可以将循环存储到一个变量中，然后传递它，稍后在某个遥远的位置执行它，比如清单
    1-9 中的虚构代码。这就是 lambda 允许你做的事情；Java 8 中这段代码的版本见清单 1-10。


    **清单 1-8. 简单循环**


    `for(Object it : list) {`


    `System.out.println(it);`


    `}`


    **清单 1-9. 存储一个简单循环（非真实代码）**


    `// 这不是 Java 代码`


    `Loop printObjects = for(Object it : list) {`


    `System.out.println(it);`


    `}`


    **清单 1-10. 在 Java 8 中存储一个简单循环**


    `Consumer<Iterable> printObjects = list -> {`


    `for(Object it : list) {`


    `System.out.println(it);`


    `}`


    `};`


    `// 需要说明的是，以下是用更地道的 Java 8 代码实现的相同结果：`


    `Consumer<Iterable> printObjects = list -> list.forEach(System.out::println);`


    这看起来可能是一个相对较小的语言特性，但引入 lambda 的影响如此重大，以至于 lambda 无法成为 Java 7 的 Project Coin⁴ 的一部分，反而成为了
    Java 8 的驱动特性。这个语言特性之所以如此重要，是因为它启用了一种与构成 Java 程序的对象交互的新方式：现在，我们可以在不引用对象的情况下拥有行为；我们可以在不先定义名词的情况下定义动词。


    本书的其余部分将探讨这一新语言特性的影响，以及我们如何改变编写 Java 代码的方式以利用这一变化。结果将是代码在两个层面上都更具函数式风格：既更面向函数，也运行得更好。原因在于，我们现在可以在某些非常常见的情况下更直接、更简洁地表达我们的意图，并且我们拥有一个强大的新工具来将代码分解成更易于维护的部分。为了理解这是如何工作的，让我们转向
    Java 中一个非常具体且可能很熟悉的情况。

    '
- fmt: "# Java Has Had Functional Programming All Along\n\nIf you ask around about\
    \ Java 8 and lambdas, you may hear someone say that Java 8 makes it possible to\
    \ “do functional programming” in Java. Yet the reality is that Java has always\
    \ been capable of functional programming: it’s just been disguised and awkward.\
    \ What lambdas do is remove the disguise and make it easier to work with functions\
    \ directly. Although I could (and many do) try to explain this fact through abstract\
    \ arguments, this is best demonstrated through an example of practical Java code\
    \ and how it changes with the introduction of lambdas.\n\nWe will draw our example\
    \ from the world of database access, since it is a place near to my heart. Before\
    \ the rise and fall of Object-Relational Mapping (ORM) frameworks[⁵](#A978-1-4302-5999-2_1_Chapter.html#Fn5)\
    \ and the innovation of other data access tools such as `JOOQ`,[⁶](#A978-1-4302-5999-2_1_Chapter.html#Fn6)\
    \ there was the venerable `JdbcTemplate` from Spring’s JDBC support library.[⁷](#A978-1-4302-5999-2_1_Chapter.html#Fn7)\
    \ This class—with help from a broad family of interfaces and supporting classes—allows\
    \ developers to avoid the coding overhead of interacting with a database, and\
    \ keeping both developers and the code focused on the relevant and interesting\
    \ bits of code.\n\n`JdbcTemplate` does this through a pattern called “Inversion\
    \ of Control.” The basic idea is that you can get rid of boilerplate by having\
    \ some library execute the boilerplate, and then calling back to client code with\
    \ the relevant pieces of context. The “control” is “inverted” because calling\
    \ into a library normally gives control to that library, but in this case the\
    \ library is giving control back to the caller.[⁸](#A978-1-4302-5999-2_1_Chapter.html#Fn8)\n\
    \nA standard example of using `JdbcTemplate` this way (before Java 8) is given\
    \ in Listing 1-11. The boilerplate creation of the statement, execution of the\
    \ statement, iteration over the result set, closing of objects, and handling of\
    \ errors is all managed by `JdbcTemplate`. The arguments to the `JdbcTemplate`\
    \ call fill in the gaps: the SQL given as the first argument is used to prepare\
    \ a statement; the interface implementation passed as the second argument is used\
    \ to assign the parameters; and the interface implementation passed as the third\
    \ argument is used to consume each row of the result set.\n\nThe lambdas introduced\
    \ in Java 8 make this kind of code much easier to write, much more succinct, and\
    \ much more expressive. The Java 8 example is given in Listing 1-12. Using lambdas\
    \ drops the code from 16 lines to 4. How? Why did Java once require this overhead,\
    \ and how does the introduction of lambdas enable shorter code?\n\n**Listing 1-11.**\
    \ Example of `JdbcTemplate` usage before lambdas\n\n```\njdbcTemplate.query(\"\
    SELECT bar FROM Foo WHERE baz = ?\",\n    new PreparedStatementSetter() {\n  \
    \      @Override\n        public void setValues(PreparedStatement ps)\n      \
    \      throws SQLException\n        {\n            ps.setString(1, \"some value\
    \ for baz\");\n        }\n    },\n    new RowMapper<SomeModel>() {\n        @Override\n\
    \        public SomeModel mapRow(ResultSet rs, int rowNum)\n            throws\
    \ SQLException\n        {\n            return new SomeModel(rs.getInt(1));\n \
    \       }\n    }\n);\n```\n\n**Listing 1-12.** Example of `JdbcTemplate` usage\
    \ with lambdas\n\n```\njdbcTemplate.query(\"SELECT bar FROM Foo WHERE baz = ?\"\
    ,\n    ps -> ps.setString(1, \"some value for baz\"),\n    (rs, rowNum) -> new\
    \ SomeModel(rs.getInt(1))\n);\n```\n\nWith Java 8, Java has opened up its syntactic\
    \ purview. When Java started, it was a cutting-edge implementation of a cutting-edge\
    \ programming paradigm: object-oriented programming. Java went solidly into object-oriented\
    \ programming, which meant that you were to no longer think of “implementing functions,”\
    \ but of “defining behavior.” Conceptually, all activity within a program was\
    \ the behavior of an object,[⁹](#A978-1-4302-5999-2_1_Chapter.html#Fn9) with similar\
    \ objects implementing interfaces. The theory is that this encourages reuse and\
    \ testability: a good object-oriented programming team would define discrete,\
    \ extensible, well-exercised, and well-tested implementations of these interfaces.\
    \ Anonymous inner classes, like the ones we used above, are not reusable and aren’t\
    \ discrete at all. They are therefore fighting against the object-oriented paradigm\
    \ and sacrificing its major advantages.[^(10)](#A978-1-4302-5999-2_1_Chapter.html#Fn10)\n\
    \nBut if anonymous inner classes are so bad, why does everyone use them in this\
    \ circumstance? The reason is because the logic is extremely contextual and therefore\
    \ not much eligible for reuse. Furthermore, defining an additional type would\
    \ be more obfuscating than clarifying by creating “spaghetti code”; the call stack\
    \ would wander into and out of a variety of source files, which makes it hard\
    \ for the developer to understand the program flow. These anonymous inner classes\
    \ are therefore the best solution within the object-oriented paradigm, but they\
    \ are obviously not great.\n\nThe fundamental problem is that within the object-oriented\
    \ paradigm, it is not possible to directly express, “Give me a way to assign the\
    \ parameters on the JDBC Statement instance I will create.” That is what the `JdbcTemplate`\
    \ wants, but that isn’t an object-oriented kind of question. What the `JdbcTemplate`\
    \ has to do is define an interface, and the user has to define a function that\
    \ fulfills that interface. This means that the `JdbcTemplate` is asking, “Give\
    \ me an object fulfilling a certain API contract that I can trigger to assign\
    \ the parameters on the JDBC Statement that I will create.” Since requiring an\
    \ object requires a type, requiring an object therefore requires the syntactic\
    \ overhead of the anonymous inner class.\n\nThe lambdas in Java 8 actually step\
    \ out of the object-oriented paradigm, and therefore allow the syntax to express\
    \ precisely what the `JdbcTemplate` is asking for. The functional paradigm does\
    \ not create the rich and descriptive API that the object-oriented program has,[^(11)](#A978-1-4302-5999-2_1_Chapter.html#Fn11)\
    \ but the trade-off is that the code itself becomes much more succinct and self-expressive.\
    \ This is the same trade-off used by many of the alternative languages on Java’s\
    \ virtual machine, and now Java has joined that club.[^(12)](#A978-1-4302-5999-2_1_Chapter.html#Fn12)\n\
    \nThere is a neat feature snuck into this example, though, which makes Java’s\
    \ take on functional programming very interesting. Did you see it? Note that the\
    \ `JdbcTemplate` code that we called in both Figures 1-11 and 1-12 was the same,\
    \ and it is code that predates Java 8 and was written before lambdas were a part\
    \ of the Java spec. In one case, we had to specify the types that we were passing\
    \ in through anonymous inner classes; in the other case, we specified no types\
    \ at all, but the compiler still figured out what types we meant. The compiler\
    \ not only figured out what interfaces we implemented, but also figured out the\
    \ types of the parameters that we were passing in, saving us substantially on\
    \ code noise."
  raw: '## Java Has Had Functional Programming All Along


    If you ask around about Java 8 and lambdas, you may hear someone say that Java
    8 makes it possible to “do functional programming” in Java. Yet the reality is
    that Java has always been capable of functional programming: it’s just been disguised
    and awkward. What lambdas do is remove the disguise and make it easier to work
    with functions directly. Although I could (and many do) try to explain this fact
    through abstract arguments, this is best demonstrated through an example of practical
    Java code and how it changes with the introduction of lambdas.


    We will draw our example from the world of database access, since it is a place
    near to my heart. Before the rise and fall of Object-Relational Mapping (ORM)
    frameworks[⁵](#A978-1-4302-5999-2_1_Chapter.html#Fn5) and the innovation of other
    data access tools such as JOOQ,[⁶](#A978-1-4302-5999-2_1_Chapter.html#Fn6) there
    was the venerable JdbcTemplate from Spring’s JDBC support library.[⁷](#A978-1-4302-5999-2_1_Chapter.html#Fn7)
    This class—with help from a broad family of interfaces and supporting classes—allows
    developers to avoid the coding overhead of interacting with a database, and keeping
    both developers and the code focused on the relevant and interesting bits of code.


    JdbcTemplate does this through a pattern called “Inversion of Control.” The basic
    idea is that you can get rid of boilerplate by having some library execute the
    boilerplate, and then calling back to client code with the relevant pieces of
    context. The “control” is “inverted” because calling into a library normally gives
    control to that library, but in this case the library is giving control back to
    the caller.[⁸](#A978-1-4302-5999-2_1_Chapter.html#Fn8)


    A standard example of using JdbcTemplate this way (before Java 8) is given in
    Listing 1-11\. The boilerplate creation of the statement, execution of the statement,
    iteration over the result set, closing of objects, and handling of errors is all
    managed by JdbcTemplate. The arguments to the JdbcTemplate call fill in the gaps:
    the SQL given as the first argument is used to prepare a statement; the interface
    implementation passed as the second argument is used to assign the parameters;
    and the interface implementation passed as the third argument is used to consume
    each row of the result set.


    The lambdas introduced in Java 8 make this kind of code much easier to write,
    much more succinct, and much more expressive. The Java 8 example is given in Listing
    1-12\. Using lambdas drops the code from 16 lines to 4\. How? Why did Java once
    require this overhead, and how does the introduction of lambdas enable shorter
    code?


    Listing 1-11\. Example of JdbcTemplate usage before lambdas


    `jdbcTemplate.query("SELECT bar FROM Foo WHERE baz = ?",`


    `new PreparedStatementSetter() {`


    `@Override`


    `public void setValues(PreparedStatement ps)`


    `throws SQLException`


    `{`


    `ps.setString(1, "some value for baz");`


    `}`


    `},`


    `new RowMapper<SomeModel>() {`


    `@Override`


    `public SomeModel mapRow(ResultSet rs, int rowNum)`


    `throws SQLException`


    `{`


    `return new SomeModel(rs.getInt(1));`


    `}`


    `}`


    `);`


    Listing 1-12\. Example of JdbcTemplate usage with lambdas


    `jdbcTemplate.query("SELECT bar FROM Foo WHERE baz = ?",`


    `ps -> ps.setString(1, "some value for baz"),`


    `(rs, rowNum) -> new SomeModel(rs.getInt(1))`


    `);`


    With Java 8, Java has opened up its syntactic purview. When Java started, it was
    a cutting-edge implementation of a cutting-edge programming paradigm: object-oriented
    programming. Java went solidly into object-oriented programming, which meant that
    you were to no longer think of “implementing functions,” but of “defining behavior.”
    Conceptually, all activity within a program was the behavior of an object,[⁹](#A978-1-4302-5999-2_1_Chapter.html#Fn9)
    with similar objects implementing interfaces. The theory is that this encourages
    reuse and testability: a good object-oriented programming team would define discrete,
    extensible, well-exercised, and well-tested implementations of these interfaces.
    Anonymous inner classes, like the ones we used above, are not reusable and aren’t
    discrete at all. They are therefore fighting against the object-oriented paradigm
    and sacrificing its major advantages.[^(10)](#A978-1-4302-5999-2_1_Chapter.html#Fn10)


    But if anonymous inner classes are so bad, why does everyone use them in this
    circumstance? The reason is because the logic is extremely contextual and therefore
    not much eligible for reuse. Furthermore, defining an additional type would be
    more obfuscating than clarifying by creating “spaghetti code”; the call stack
    would wander into and out of a variety of source files, which makes it hard for
    the developer to understand the program flow. These anonymous inner classes are
    therefore the best solution within the object-oriented paradigm, but they are
    obviously not great.


    The fundamental problem is that within the object-oriented paradigm, it is not
    possible to directly express, “Give me a way to assign the parameters on the JDBC
    Statement instance I will create.” That is what the JdbcTemplate wants, but that
    isn’t an object-oriented kind of question. What the JdbcTemplate has to do is
    define an interface, and the user has to define a function that fulfills that
    interface. This means that the JdbcTemplate is asking, “Give me an object fulfilling
    a certain API contract that I can trigger to assign the parameters on the JDBC
    Statement that I will create.” Since requiring an object requires a type, requiring
    an object therefore requires the syntactic overhead of the anonymous inner class.


    The lambdas in Java 8 actually step out of the object-oriented paradigm, and therefore
    allow the syntax to express precisely what the JdbcTemplate is asking for. The
    functional paradigm does not create the rich and descriptive API that the object-oriented
    program has,[^(11)](#A978-1-4302-5999-2_1_Chapter.html#Fn11) but the trade-off
    is that the code itself becomes much more succinct and self-expressive. This is
    the same trade-off used by many of the alternative languages on Java’s virtual
    machine, and now Java has joined that club.[^(12)](#A978-1-4302-5999-2_1_Chapter.html#Fn12)


    There is a neat feature snuck into this example, though, which makes Java’s take
    on functional programming very interesting. Did you see it? Note that the JdbcTemplate
    code that we called in both Figures 1-11 and 1-12 was the same, and it is code
    that predates Java 8 and was written before lambdas were a part of the Java spec.
    In one case, we had to specify the types that we were passing in through anonymous
    inner classes; in the other case, we specified no types at all, but the compiler
    still figured out what types we meant. The compiler not only figured out what
    interfaces we implemented, but also figured out the types of the parameters that
    we were passing in, saving us substantially on code noise.'
  trans: '

    ## Java 一直都有函数式编程


    如果你问起 Java 8 和 Lambda 表达式，可能会听到有人说 Java 8 让在 Java 中“进行函数式编程”成为可能。然而事实是，Java 一直都能进行函数式编程：只是它一直被伪装着，用起来很别扭。Lambda
    表达式的作用就是揭开这层伪装，让直接使用函数变得更加容易。虽然我可以通过抽象论证（很多人也这么做）来解释这一点，但最好的方式还是通过一个实际的 Java 代码示例，以及它随着
    Lambda 表达式的引入而发生的变化来展示。


    我们将从数据库访问领域选取示例，因为这是我最熟悉的领域。在对象关系映射（ORM）框架⁵的兴衰以及其他数据访问工具（如 JOOQ⁶）的创新之前，Spring
    的 JDBC 支持库中就已经有了备受尊敬的 `JdbcTemplate`⁷。这个类——借助一系列广泛的接口和支持类——使开发者能够避免与数据库交互时的编码开销，让开发者和代码都专注于相关且有趣的部分。


    `JdbcTemplate` 通过一种称为“控制反转”的模式来实现这一点。其基本思想是，你可以让某个库来执行样板代码，然后将相关的上下文回调给客户端代码，从而摆脱样板代码。“控制”被“反转”了，因为通常调用一个库会将控制权交给该库，但在这里，库将控制权交还给了调用者⁸。


    在 Java 8 之前，以这种方式使用 `JdbcTemplate` 的一个标准示例如清单 1-11 所示。语句的样板创建、语句的执行、结果集的迭代、对象的关闭以及错误的处理，全部由
    `JdbcTemplate` 管理。`JdbcTemplate` 调用的参数填补了空白：第一个参数提供的 SQL 用于准备语句；第二个参数传递的接口实现用于分配参数；第三个参数传递的接口实现用于消费结果集的每一行。


    Java 8 引入的 Lambda 表达式使这类代码编写起来更加容易、更加简洁、更具表现力。Java 8 的示例如清单 1-12 所示。使用 Lambda
    表达式将代码从 16 行缩减到了 4 行。这是如何做到的？为什么 Java 曾经需要这种开销，而 Lambda 表达式的引入又如何实现了更短的代码？


    **清单 1-11. Lambda 表达式出现前 JdbcTemplate 的使用示例**


    `jdbcTemplate.query("SELECT bar FROM Foo WHERE baz = ?",`


    `new PreparedStatementSetter() {`


    `@Override`


    `public void setValues(PreparedStatement ps)`


    `throws SQLException`


    `{`


    `ps.setString(1, "some value for baz");`


    `}`


    `},`


    `new RowMapper<SomeModel>() {`


    `@Override`


    `public SomeModel mapRow(ResultSet rs, int rowNum)`


    `throws SQLException`


    `{`


    `return new SomeModel(rs.getInt(1));`


    `}`


    `}`


    `);`


    **清单 1-12. 使用 Lambda 表达式的 JdbcTemplate 示例**


    `jdbcTemplate.query("SELECT bar FROM Foo WHERE baz = ?",`


    `ps -> ps.setString(1, "some value for baz"),`


    `(rs, rowNum) -> new SomeModel(rs.getInt(1))`


    `);`


    随着 Java 8 的到来，Java 扩展了其语法范畴。Java 诞生之初，它就是一种前沿编程范式——面向对象编程——的前沿实现。Java 坚定地走向了面向对象编程，这意味着你不再考虑“实现函数”，而是考虑“定义行为”。从概念上讲，程序中的所有活动都是对象的行为⁹，相似的对象则实现接口。理论上，这鼓励了代码复用和可测试性：一个优秀的面向对象编程团队会为这些接口定义离散、可扩展、经过充分实践和测试的实现。而我们上面使用的匿名内部类既不可复用，也完全不离散。因此，它们与面向对象范式背道而驰，并牺牲了其主要优势¹⁰。


    但如果匿名内部类如此糟糕，为什么每个人在这种情况下都使用它们呢？原因在于逻辑具有极强的上下文相关性，因此不太适合复用。此外，定义额外的类型与其说能澄清问题，不如说会因创建“意大利面条式代码”而增加混淆；调用栈会在各种源文件中进进出出，使开发者难以理解程序流程。因此，这些匿名内部类是面向对象范式下的最佳解决方案，但它们显然并不理想。


    根本问题在于，在面向对象范式中，无法直接表达：“给我一种方法，让我能在我将要创建的 JDBC Statement 实例上分配参数。”这正是 `JdbcTemplate`
    想要的，但这并非面向对象式的问题。`JdbcTemplate` 必须做的是定义一个接口，而用户必须定义一个满足该接口的函数。这意味着 `JdbcTemplate`
    在要求：“给我一个满足特定 API 契约的对象，我可以触发它来在我将要创建的 JDBC Statement 上分配参数。”由于要求一个对象就需要一个类型，因此要求一个对象就带来了匿名内部类的语法开销。


    Java 8 中的 Lambda 表达式实际上跳出了面向对象范式，因此允许语法精确地表达 `JdbcTemplate` 所要求的内容。函数式范式没有创建面向对象程序所具有的丰富且描述性的
    API¹¹，但作为交换，代码本身变得更加简洁和自表达。这也是 Java 虚拟机上许多替代语言所使用的相同权衡，而现在 Java 也加入了这一行列¹²。


    不过，这个示例中还隐藏着一个巧妙的功能，它使得 Java 对函数式编程的处理变得非常有趣。你注意到了吗？请注意，我们在图 1-11 和图 1-12 中调用的
    `JdbcTemplate` 代码是相同的，而且这段代码在 Java 8 之前就已存在，是在 Lambda 表达式成为 Java 规范一部分之前编写的。在一种情况下，我们必须通过匿名内部类指定传入的类型；在另一种情况下，我们根本没有指定任何类型，但编译器仍然推断出了我们意图使用的类型。编译器不仅推断出了我们实现的接口，还推断出了我们传入的参数类型，从而大大减少了代码中的噪音。

    '
- fmt: "# Java 8 类型推断与函数式编程\n\nThis capability is called type inference, and it’s\
    \ an extremely powerful programming language feature. Historically, Java has done\
    \ very little type inference. Generics introduced some very limited type inference.\
    \ Java 7’s Project Coin gave us the empty generic (`<>`), such as in `List<Integer>\
    \ ints = new ArrayList<>()`, which is also an example of limited type inference.\
    \ Java 8 introduces substantially expanded type inference capabilities, especially\
    \ when it comes to the Java’s lambdas. In Java 8, any time that you could pass\
    \ an interface with a single method, you can pass in a function that is an implementation\
    \ of that method, and the compiler will infer what type you are talking about.\n\
    \nThis type inference allows the API authors to use the rich, object-oriented\
    \ style of API. The API can provide hints to both the developer and the developer’s\
    \ tools through meaningful interfaces with useful documentation and informative\
    \ method names. The consumer of the API, meanwhile, can simply pass in the functional\
    \ implementations of these interfaces, just as we passed in a `PreparedStatementSetter`\
    \ as `ps -> ps.setString(1, \"some value for baz\")`. This means that Java gives\
    \ us the best of both worlds. We get our descriptive object-oriented API and leave\
    \ the door open for reusable implementations; we also enable users with strongly\
    \ contextual logic to pass in succinct inline implementations. It’s a very clever,\
    \ very useful, and very much underestimated feature of Java’s functional programming\
    \ capabilities.\n\nThe fact that legacy APIs are automatically promoted to support\
    \ functional-style calls demonstrates well that Java has always had functional\
    \ programming capabilities. Before now, though, those capabilities required messy\
    \ syntactic glue; the dominant object-oriented paradigm got in the way of the\
    \ functional programming capabilities that exist within Java. With Java 8, the\
    \ effective functional programming techniques that existed beneath Java’s object-oriented\
    \ crust can finally come out.\n\n## Java 8 Is Not Just Syntactic Sugar\n\nAs far\
    \ as we have seen, lambdas are just a more succinct way to express an anonymous\
    \ inner class. While this is both powerful and useful, it is hardly sufficient\
    \ grounds for an entire book. Where is this revolution that was advertised at\
    \ the beginning of the chapter?\n\nThe revolution happens when these functions\
    \ meet the new APIs scattered throughout the SDK. Most of the changes are integrated\
    \ into existing classes or packages, but there is one very striking addition.\
    \ One the new APIs is the introduction of the concept of a “stream,” which is\
    \ kind of like an `Iterator` and kind of like a grown-up `Reader`. Streams provide\
    \ a huge stage for the functional syntax changes to perform their magic.\n\nTo\
    \ tackle streams, let’s return to the `JdbcTemplate` example. In that case, the\
    \ second argument is a `RowMapper` interface implementation, which is responsible\
    \ for translating the results coming from the database into a collection of the\
    \ resulting objects. It is not possible at this point to filter out certain results;\
    \ attempts to do so involve hacks such as returning `null` and then filtering\
    \ out the `null`s at the end. It is also not simple to partition the results or\
    \ to calculate statistics from them. It’s not easy to work with the elements as\
    \ a whole, and working with any given element requires loading the entire result\
    \ set into memory. When you think about it, both result sets and collections of\
    \ models are really a rather awkward way to deal with database results.\n\nStreams\
    \ provide a reinvention of the standard Java processing model. Instead of working\
    \ directly on data, your program builds up a set of instructions about how to\
    \ work the stream. These instructions can range from simple filtering and conversion\
    \ rules to complex map/reduce structures and everything in between. They work\
    \ by passing functions onto the methods of the `Stream` object.\n\nFor instance,\
    \ in the FunJava library, there is a `JdbcTemplate`-like class that provides the\
    \ results as a stream of `ResultMap` objects. These objects are the raw JDBC object\
    \ types that come out of the database, indexed by column name and by column index.\
    \ Whatever you want to do with the data is up to you. The great news is that the\
    \ JVM will automatically optimize the stream processing in order to keep your\
    \ memory load down and your concurrent processes up: this means that the JVM is\
    \ getting efficiency out of your code for free!\n\nSay that you queried the database,\
    \ and for some reason you couldn’t do reasonable SQL work in the database, but\
    \ had to do it programmatically instead. (I wish this were as hypothetical as\
    \ it sounds.) Perhaps you wanted to find the salary statistics for people whose\
    \ first name was “Robert.” The stream code for this using the FunJava library\
    \ is given in Listing 1-13. This example demonstrates how lambdas and streams\
    \ work together to make expressive code. The JVM has a lot of freedom to implement\
    \ that code, as well, which enables it to make significant optimizations on our\
    \ behalf. In Chapter 3, we will explore the power of streams further and look\
    \ into exactly what those optimizations are.\n\n**Listing 1-13.** Using streams\
    \ for processing database results\n\n```\nfunConnection.queryToStream(\"/* SQL\
    \ HERE */\")\n  .filter(it -> it.get(\"firstName\").equals(\"Robert\"))\n  .collectors(Collectors.summarizingInt(it\
    \ -> it.getSalary()));\n```"
  raw: 'This capability is called type inference, and it’s an extremely powerful programming
    language feature. Historically, Java has done very little type inference. Generics
    introduced some very limited type inference. Java 7’s Project Coin gave us the
    empty generic (<>), such as in `"List<Integer> ints = new ArrayList<>();"`, which
    is also an example of limited type inference. Java 8 introduces substantially
    expanded type inference capabilities, especially when it comes to the Java’s lambdas.
    In Java 8, any time that you could pass an interface with a single method, you
    can pass in a function that is an implementation of that method, and the compiler
    will infer what type you are talking about.[^(13)](#A978-1-4302-5999-2_1_Chapter.html#Fn13)


    This type inference allows the API authors to use the rich, object-oriented style
    of API. The API can provide hints to both the developer and the developer’s tools
    through meaningful interfaces with useful documentation and informative method
    names. The consumer of the API, meanwhile, can simply pass in the functional implementations
    of these interfaces, just as we passed in a `PreparedStatementSetter` as `"ps
    -> ps.setString(1, "some value for baz")"`. This means that Java gives us the
    best of both worlds. We get our descriptive object-oriented API and leave the
    door open for reusable implementations; we also enable users with strongly contextual
    logic to pass in succinct inline implementations. It’s a very clever, very useful,
    and very much underestimated feature of Java’s functional programming capabilities.


    The fact that legacy APIs are automatically promoted to support functional-style
    calls demonstrates well that Java has always had functional programming capabilities.
    Before now, though, those capabilities required messy syntactic glue; the dominant
    object-oriented paradigm got in the way of the functional programming capabilities
    that exist within Java. With Java 8, the effective functional programming techniques
    that existed beneath Java’s object-oriented crust can finally come out.


    ## Java 8 Is Not Just Syntactic Sugar


    As far as we have seen, lambdas are just a more succinct way to express an anonymous
    inner class. While this is both powerful and useful, it is hardly sufficient grounds
    for an entire book. Where is this revolution that was advertised at the beginning
    of the chapter?


    The revolution happens when these functions meet the new APIs scattered throughout
    the SDK. Most of the changes are integrated into existing classes or packages,
    but there is one very striking addition. One the new APIs is the introduction
    of the concept of a “stream,” which is kind of like an Iterator and kind of like
    a grown-up Reader. Streams provide a huge stage for the functional syntax changes
    to perform their magic.


    To tackle streams, let’s return to the JdbcTemplate example. In that case, the
    second argument is a RowMapper interface implementation, which is responsible
    for translating the results coming from the database into a collection of the
    resulting objects. It is not possible at this point to filter out certain results;
    attempts to do so involve hacks such as returning null and then filtering out
    the nulls at the end. It is also not simple to partition the results or to calculate
    statistics from them. It’s not easy to work with the elements as a whole, and
    working with any given element requires loading the entire result set into memory.
    When you think about it, both result sets and collections of models are really
    a rather awkward way to deal with database results.


    Streams provide a reinvention of the standard Java processing model. Instead of
    working directly on data, your program builds up a set of instructions about how
    to work the stream. These instructions can range from simple filtering and conversion
    rules to complex map/reduce structures and everything in between. They work by
    passing functions onto the methods of the `Stream` object.


    For instance, in the FunJava library,[^(14)](#A978-1-4302-5999-2_1_Chapter.html#Fn14)
    there is a JdbcTemplate-like class that provides the results as a stream of `ResultMap`
    objects. These objects are the raw JDBC object types that come out of the database,
    indexed by column name and by column index. Whatever you want to do with the data
    is up to you. The great news is that the JVM will automatically optimize the stream
    processing in order to keep your memory load down and your concurrent processes
    up: this means that the JVM is getting efficiency out of your code for free!


    Say that you queried the database, and for some reason you couldn’t do reasonable
    SQL work in the database, but had to do it programmatically instead. (I wish this
    were as hypothetical as it sounds.) Perhaps you wanted to find the salary statistics
    for people whose first name was “Robert.” The stream code for this using the FunJava
    library is given in Listing 1-13\. This example demonstrates how lambdas and streams
    work together to make expressive code. The JVM has a lot of freedom to implement
    that code, as well, which enables it to make significant optimizations on our
    behalf. In [Chapter 3](#A978-1-4302-5999-2_3_Chapter.html), we will explore the
    power of streams further and look into exactly what those optimizations are.


    Listing 1-13\. Using streams for processing database results


    `funConnection.queryToStream("/* SQL HERE */")`


      `.filter(it -> it.get("firstName").equals("Robert"))`


      `.c` `ollectors(Collectors.summarizingInt(it -> it.getSalary()));`'
  trans: '

    这种能力被称为类型推断，是一项极其强大的编程语言特性。从历史上看，Java 在类型推断方面做得很少。泛型引入了一些非常有限的类型推断。Java 7 的 Project
    Coin 为我们提供了空泛型（`<>`），例如 `"List<Integer> ints = new ArrayList<>();"`，这也是有限类型推断的一个例子。Java
    8 引入了大幅扩展的类型推断能力，尤其是在 Java 的 lambda 表达式方面。在 Java 8 中，任何时候你可以传递一个包含单个方法的接口，你都可以传递一个作为该方法实现的函数，编译器会推断出你所指的类型。¹³


    这种类型推断允许 API 作者使用丰富的、面向对象的 API 风格。API 可以通过有意义的接口（附带有用的文档和信息量丰富的函数名）为开发者及其工具提供提示。与此同时，API
    的使用者可以简单地传入这些接口的函数式实现，就像我们传入一个 `PreparedStatementSetter` 作为 `"ps -> ps.setString(1,
    "some value for baz")"` 一样。这意味着 Java 为我们提供了两全其美的方案。我们既获得了描述性的面向对象 API，并为可复用的实现留出了空间；也允许具有强上下文逻辑的用户传入简洁的内联实现。这是
    Java 函数式编程能力中一个非常巧妙、非常有用且被严重低估的特性。


    遗留 API 被自动升级以支持函数式调用风格，这一事实很好地证明了 Java 一直具备函数式编程能力。然而在此之前，这些能力需要混乱的语法粘合剂；占主导地位的面向对象范式阻碍了
    Java 内部存在的函数式编程能力。随着 Java 8 的到来，那些隐藏在 Java 面向对象外壳之下的有效函数式编程技术终于得以展现。


    ## Java 8 不仅仅是语法糖


    就我们目前所见，lambda 表达式只是表达匿名内部类的一种更简洁的方式。虽然这既强大又实用，但还不足以成为整本书的立论基础。本章开头所宣传的那场革命在哪里呢？


    当这些函数与遍布 SDK 的新 API 相遇时，革命就发生了。大多数更改都集成到了现有的类或包中，但有一个非常引人注目的新增内容。其中一个新 API 引入了“流”（stream）的概念，它有点像迭代器（Iterator），又有点像升级版的读取器（Reader）。流为函数式语法变化施展其魔力提供了一个巨大的舞台。


    为了处理流，让我们回到 `JdbcTemplate` 的例子。在那个例子中，第二个参数是一个 `RowMapper` 接口的实现，负责将数据库返回的结果转换为结果对象的集合。此时无法过滤掉某些结果；尝试这样做需要采用一些技巧，比如返回
    `null`，然后在最后过滤掉这些空值。对结果进行分区或从中计算统计数据也并不简单。将元素作为一个整体来处理并不容易，而处理任何特定元素都需要将整个结果集加载到内存中。仔细想想，结果集和模型集合实际上都是处理数据库结果的一种相当笨拙的方式。


    流重新定义了标准的 Java 处理模型。你的程序不是直接操作数据，而是构建一组关于如何处理流的指令。这些指令的范围可以从简单的过滤和转换规则，到复杂的 map/reduce
    结构，以及介于两者之间的所有内容。它们通过将函数传递给 `Stream` 对象的方法来工作。


    例如，在 FunJava 库中¹⁴，有一个类似 `JdbcTemplate` 的类，它将结果作为 `ResultMap` 对象的流提供。这些对象是从数据库中提取的原始
    JDBC 对象类型，按列名和列索引进行索引。你想对数据做什么完全取决于你。好消息是，JVM 会自动优化流处理，以降低内存负载并提高并发进程效率：这意味着 JVM
    可以免费从你的代码中榨取效率！


    假设你查询了数据库，并且由于某种原因，你无法在数据库中进行合理的 SQL 操作，而必须以编程方式完成。（我希望这听起来像是假设性的。）也许你想找出名字为“Robert”的人的薪资统计信息。使用
    FunJava 库实现此功能的流代码如清单 1-13 所示。这个例子演示了 lambda 表达式和流如何协同工作，以生成富有表现力的代码。JVM 也有很大的自由度来实现该代码，这使其能够代表我们进行显著的优化。在第
    3 章中，我们将进一步探索流的能力，并深入了解这些优化具体是什么。


    **清单 1-13.** 使用流处理数据库结果


    `funConnection.queryToStream("/* SQL HERE */")`


      `.filter(it -> it.get("firstName").equals("Robert"))`


      `.collect(Collectors.summarizingInt(it -> it.getSalary()));`

    '
- fmt: '# Is Java 8 a Functional Programming Language?


    Now that Java is borrowing such a powerful feature from functional programming,
    does that make Java a functional programming language? Many developers that I
    talk to have “Learn a functional programming language” on their bucket list, so
    does learning to code in idiomatic Java 8 count as learning a functional programming
    language?


    Martin Odersky, the creator of Scala, weighed in on what made a “functional programming
    language.” With the introduction of Java 8, Java now has all those features in
    an obvious way. Yet, just as Martin pointed out about Scala, idiomatic Java 8
    still does not strongly resemble idiomatic code in the functional programming
    languages. The term Martin coined to describe this kind of language is “postfunctional,”
    which works well enough: Java 8 brings Java into the ranks of the postfunctional
    languages.


    Part of the difficulty when talking about “functional programming” is that it’s
    a strategy for programming. Some languages more naturally express this strategy
    than others, but it is possible to do functional programming in any language,
    just as it is possible to do object-oriented programming in any language. This
    means that we have been able to do functional programming in Java all along.


    In fact, many of the innovations that have entered the Java ecosystem are actually
    functional programming maneuvers in an object-oriented guise. This is exactly
    what we are seeing with our inversion-of-control example: those interface implementations
    providing callbacks to `JdbcTemplate` are actually just an object-oriented way
    of passing in a function. All `JdbcTemplate` wants is that function. In the object-oriented
    world, we needed to create a structure to support it; in the functional world,
    we can just pass the function in. What lambdas enable us to do is to express these
    programming strategies using a more natural language.


    Since Java 8 code does not look like idiomatic code in more functional programming
    languages, however, there is still much to be gained by learning those other functional
    programming languages. So if learning a functional programming language is on
    your to-do list, stick with it. When you do learn that language, you will be introduced
    into its new ideas, and you will develop a new sense of what is natural. What
    Java 8 allows you to do is to bring those new ideas and that new sensibility back
    into the Java world without feeling constrained, or feeling like the language
    is getting in your way of doing what you want.


    Java 8 does not make Java a “functional programming language.” It does allow you
    to more naturally do functional programming in Java, however. Java 8 is a huge
    evolution of Java, making it a flexible and multi-paradigm language, and it makes
    Java competitive with the other JVM programming language forerunners such as Groovy,
    Scala, Ruby, and Clojure.


    # Enough with the Theory; onto the Implementation!


    It is impressive just how naturally Java 8’s lambdas fit into the Java syntax,
    and how easy they are to read. This chapter took advantage of this fact to introduce
    lambdas informally and indirectly; we learned the basics of lambdas gradually
    by comparing them to imaginary Java code and to legacy Java code. We also spent
    a lot of time examining what lambdas are at a high level, and how they impact
    what kind of language Java is.


    In the next chapter, we will look into what lambdas are from a technical standpoint,
    both from the standpoint of computer science theory, and from the standpoint of
    Java’s implementation. We will expand on our examples to see how we can perform
    even cooler stunts, and we will begin to interact with streams at the most basic
    level in order to discover how they really work. In short, things are about to
    get real.


    ## Footnotes


    1. Unfortunately, they don’t have the same capability with Lists specifically,
    so I had to do some work to get to the right type.


    2. It has happened on Apple’s platform, where Swift is replacing Objective-C.
    It’s also worth noting that Clojure has made a valiant effort on the JVM front.
    Some of my peers will defend themselves by pointing to the relative success of
    Scala, but Scala is not actually a functional programming language: [`http://blog.enfranchisedmind.com/2009/05/scala-not-functional/`](http://blog.enfranchisedmind.com/2009/05/scala-not-functional/).


    3. We will get into the language of “closure” vs. “lambda” later on. In general,
    a developer can get along just fine treating them as synonyms. Java prefers “lambda,”
    whereas most other languages on the Java Virtual Machine prefer “closure.” Ruby,
    notably, has seven variations on “lambda” and “closure,” leading to this quite
    entertaining exploration of the programming language: [`http://innig.net/software/ruby/closures-in-ruby`](http://innig.net/software/ruby/closures-in-ruby).


    4. Project Coin was a project for small change. (Get it?) Introducing lambdas
    was initially proposed as a bit of syntactic sugar, but it quickly became clear
    that the implications of having lambdas would have wide-reaching ramifications
    for the Java SDK’s API.


    5. E.g., Hibernate.


    6. [`http://www.jooq.org/`](http://www.jooq.org/).


    7. API at [`http://bit.ly/jdbcTemplate`](http://bit.ly/jdbcTemplate).


    8. The more generalized version of the “Inversion of Control” pattern is the “Hole
    in the Middle” pattern. [`http://blog.enfranchisedmind.com/2007/07/the-hole-in-the-middle-pattern/`](http://blog.enfranchisedmind.com/2007/07/the-hole-in-the-middle-pattern/).


    9. Static methods are the obvious exception to this rule, although you can think
    of the static members of a class as implementing a singleton object. This way
    of thinking is demonstrated best by Scala’s “object” keyword.


    10. It’s worth noting at this point that inner classes—including anonymous inner
    classes—were not part of the Java 1.0 specification. They arrived in Java 1.1.


    11. Is there any question what an implementation of the `PreparedStatementSetter`
    interface is supposed to do?'
