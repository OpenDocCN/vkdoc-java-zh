    # 6. Lambda 并发


    Java 编程语言的核心是一系列指令。这些指令按顺序执行。默认情况下，任何时候你只能运行一个这样的指令序列。然而，如果你的机器有多个处理核心，或者有任何类型的
    I/O 操作，那么这种单一的指令序列就会变得非常低效。如果你的程序有很多事情要做，但其单一的指令流必须等待“读取”I/O 指令完成后才能执行其他操作，那么你的程序就是在浪费时间。如果你有四个处理核心，却只有一个指令流，那么你最多只能利用四分之一的计算能力。解决方案是在你的程序中同时执行多个指令流，这被称为并发。


    如果你读过任何关于 Java 8 中 Lambda 的内容，你可能已经听过“Lambda”和“并发”被同时提及。并发似乎是采用 Lambda 的主要驱动力之一，但
    Lambda 究竟为何有助于并发，通常留给读者自行思考。在本章中，我们将了解 Lambda 如何以及为何能与并发如此完美地协同工作。我们将研究主要的 Java
    并发技术，从历史悠久的 `Thread` 类开始，最终构建一个使用流的高度并发系统。这些流不是 I/O 流：它们是处理流。我们将看到，Lambda 使得传递可以在多个流中执行的指令变得容易：虽然
    Java 在技术上一直具备这种能力，但 Lambda 使代码可读，而流则使其易于实现。


