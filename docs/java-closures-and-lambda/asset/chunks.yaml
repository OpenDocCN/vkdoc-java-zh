    `                            wordId = rs.getInt(1);`

    `                            rs.close();`

    `                            wordMap.put(word, wordId);`

    `                        }`

    `                        createLineWord.setInt(1, lineId);`

    `                        createLineWord.setInt(2, wordId);`

    `                        createLineWord.setInt(3, wordOffset);`

    `                        boolean createdLineWord = createLineWord.executeUpdate()
    == 1;`

    `                        assert createdLineWord : "Could not create line-word";`

    `                    }`

    `                }`

    `            }`

    `        }`

    `    } finally {`

    `        executor.shutdown();`

    `        executor.awaitTermination(1L, TimeUnit.MINUTES);`

    `    }`

    `}`


    `/**`

    ` * Returns the next`

    ` */`

    `public static String nextLine(BufferedReader reader) throws IOException {`

    `    String line;`

    `    while ((line = reader.readLine()) != null) {`

    `        line = BAD_CHARS.matcher(line).replaceAll("");`

    `        line = line.trim();`

    `        if (line.isEmpty() || IS_WHITESPACE.test(line)) {`

    `            continue;`

    `        } else {`

    `            break;`

    `        }`

    `    }`

    `    return line;`

    `}`


    `private static int doCreateBook(`

    `    PreparedStatement createBook, String title, int year,`

    `    ExecutorService executor) throws SQLException {`

    `    createBook.setString(1, title);`

    `    createBook.setInt(2, year);`

    `    boolean createdBook = createBook.executeUpdate() == 1;`

    `    assert createdBook : "Could not create book";`

    `    ResultSet rs = createBook.getGeneratedKeys();`

    `    boolean hasNext = rs.next();`

    `    assert hasNext : "No result when getting generated keys for " + title;`

    `    int textId = rs.getInt(1);`

    `    rs.close();`

    `    executor.submit(() -> System.out.println(title));`

    `    return textId;`

    `}`


    `public static void main(String[] args) throws Exception {`

    `    createDatabase();`

    `}`


    This code is accomplishing a relatively simple task, but it’s already becoming
    impossible to follow. This reveals the problem with imperative code: it has limited
    semantic structure. A lot is happening, but not a lot is communicated to the reader
    about why those things are happening. Instead, the script’s gritty details are
    entirely exposed in a mostly unstructured stream of instructions.


    Despite the obvious drawbacks of imperative programming, there are still a number
    of places where it is very useful. Because imperative code is so quickly written,
    it works well for very short bits of code with a clear and simple purpose. Unit
    tests, for instances, are almost universally imperative in Java. Most method bodies
    in Java are imperative, as well, which is part of the motivation for keeping them
    very short. Other languages and contexts also make the imperative paradigm a more
    natural fit, such as `bash` or `perl` for system administration scripts. In general,
    if you can keep the whole thing in your head at the same time without any confusion,
    then the imperative style is a nice way to go.'
