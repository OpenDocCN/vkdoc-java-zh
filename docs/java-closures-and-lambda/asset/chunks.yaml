    \ an `Iterator` to a `Spliterator`: `Spliterators.spliterator(Iterator, long,\
    \ int)` and `Spliterators.spliteratorUnknownSize(Iterator, int)`. The former is\
    \ used when you know the size of the elements that will be iterated over; the\
    \ latter is for when you do not know the size. The former is notably more efficient\
    \ than the latter, so if you can figure out the size ahead of time, definitely\
    \ use it. In both cases, you pass the characteristics of the `Spliterator` as\
    \ the final argument.\n\nBuilding an `Iterator` for a `ResultSet` is notably simpler\
    \ than building a `Spliterator`. Our iterator implementation is therefore a simplification\
    \ of our `Spliterator` implementation in Listing 5-11. The only catch is that\
    \ the single `tryAdvance` method of the `Spliterator` is two distinct methods\
    \ in the `Iterator` class: `hasNext()` and then `next()`. Because of this, we\
    \ will need to be able to store some state about whether or not there is a next\
    \ element. This is a ternary variable: it can either be `true`, `false`, or `unknown`.\
    \ This is one of the few legitimate uses of `null`: by using the `Boolean` type,\
    \ we can get those three states. The implementation of our iterator is given in\
    \ Listing 5-13.\n\n**Listing 5-13. `ResultSetIterator` Implementation**\n\n```java\n\
    import java.sql.ResultSet;\nimport java.sql.SQLException;\nimport java.util.*;\n\
    \n/**\n * An {@link java.util.Iterator} that traverses a {@link java.sql.ResultSet}.\n\
    \ * When the result set is exhausted,\n * it will be automatically closed. Implementing\
    \ classes should extend\n * {@link #processRow(java.sql.ResultSet)} to\n * specify\
    \ how to convert a row into a result object.\n */\npublic abstract class ResultSetIterator<RESULT_T>\n\
    \    implements Iterator<RESULT_T>\n{\n    private final ResultSet resultSet;\n\
    \    private final AutoCloseable[] toClose;\n    private volatile Boolean hasNext\
    \ = null;\n\n    /**\n     * Constructor.\n     *\n     * @param resultSet The\
    \ result set to process; may not be {@code null}.\n     * @param toClose   Optional\
    \ additional autocloseables (such as\n     *                  {@link java.sql.Connection})\
    \ to close\n     *                  when the result set is exhausted; may be {@code\
    \ null}\n     *                  (equivalent to empty).\n     */\n    public ResultSetIterator(final\
    \ ResultSet resultSet, final AutoCloseable... toClose) {\n        Objects.requireNonNull(resultSet,\
    \ \"result set\");\n        this.resultSet = resultSet;\n        if (toClose ==\
    \ null) {\n            this.toClose = new AutoCloseable[0];\n        } else {\n\
    \            this.toClose = toClose;\n        }\n    }\n\n    /**\n     * Given\
    \ a {@link java.sql.ResultSet} instance on a current row,\n     * return a {@code\
    \ RESULT_T} instance for that row.\n     * This code should not call {@link java.sql.ResultSet#next()}\
    \ or\n     * otherwise mutate the result set: it should\n     * be treated as\
    \ read-only.\n     *\n     * @param resultSet The result set to load.\n     *\
    \ @return The result instance.\n     * @throws java.sql.SQLException If an error\
    \ occurs.\n     */\n    protected abstract RESULT_T processRow(ResultSet resultSet)\n\
    \        throws SQLException;\n\n    private void doClose() {\n        try {\n\
    \            if (!resultSet.isClosed()) resultSet.close();\n        } catch (SQLException\
    \ ignore) {}\n        for (int i = 0; i < toClose.length; i++) {\n           \
