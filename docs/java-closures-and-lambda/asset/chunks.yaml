- fmt: "### Listing 3-6. A Library instance method to clean up featured book messages\
    \ using `Map.replaceAll`\n\n```\n/**\n * Performs various clean-up tasks on all\
    \ the features messages.\n */\npublic void cleanUpFeaturedMessages() {\n    this.getFeaturedBooks().replaceAll((book,\
    \ msg) -> {\n        // Set a default message\n        if (msg == null || msg.isEmpty())\
    \ {\n            msg = \"Featured \" + book.getGenre().toString().toLowerCase()\
    \ +\n                  \" book by \" + book.getAuthor();\n        }\n        //\
    \ Remove trailing periods unless they are an elipsis\n        if (msg.endsWith(\"\
    .\") && !msg.endsWith(\"...\")) {\n            msg = msg.substring(0, msg.length()\
    \ - 1);\n        }\n        return msg;\n    }\n    );\n}\n```\n\n### Map Computations\n\
    \nThe `Map` class itself has been extended with some functional-style manipulations\
    \ that allow you to work with particular keys. These methods are not directly\
    \ inspired by functional programming techniques, but rather are shorthand for\
