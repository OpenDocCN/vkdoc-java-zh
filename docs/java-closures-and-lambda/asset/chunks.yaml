    我们的构造器的最大栈深度为 1，这是因为构造器将要执行一些有趣的操作。在 Java 语言中，构造器的第一行可以是调用`this()`或`super()`（可能带有参数）。这些调用会委托给另一个构造器。在字节码中，构造器的第一行必须是对另一个构造器的委托：这在
    Java 语言中是可选的，但在字节码中是必需的。`Listing1`的父类是`Object`类，因此字节码将我们的构造器委托给了`Object`类的父构造器。字节码通过加载`this`局部变量，然后在其上调用父类构造器来实现这一点。指令`aload_0`将局部变量表中偏移量为
    0 的局部变量压入栈：也就是我们的`this`变量。此时，栈顶元素就是我们的`this`变量。构造器是一种特殊的存在，因此在字节码中通过`invokespecial`来调用它们。你需要告诉运行时你正在调用哪个构造器，因此通过方法引用来调用`invokespecial`：在我们的代码中，方法引用是`Object`类的构造器。完成所有这些操作后，我们执行`return`。（请记住，根据字节码，构造器是一个返回类型为`void`的方法。）


    此时，我并不期望你觉得自己已经成了字节码专家。不过，当你查看清单 8-1 时，应该不会再感到不知所措或迷失方向了。你应该对如何阅读一个基本的类有了大致的了解。掌握了这项技能，我们就可以继续学习如何阅读支持
    lambda 表达式的字节码了。


    ## 内联 Lambda 定义与 Lambda 提升


    最后一种 lambda 表达式是带有内联定义的 lambda。这里我们讨论的不是对现有方法的引用，而是直接内联定义一个全新的功能单元。你可以考虑如下代码：


    `public Supplier<String> getSupplier() {`


    `return () -> "Hello, World!";`


    `}`


    在这种情况下，编译器会为你创建一个包含该实现的方法。这被称为“合成方法”。这将是一个静态方法，不接受任何参数，并返回字符串“Hello, World!”。创建完成后，编译器就将内联
    lambda 的问题简化为我们之前见过的静态方法引用问题。这是一个相当巧妙的解决方案，而且实现起来最终也非常简单——这意味着对我们来说它很无趣。


    更有趣的情况是当混合了变量时。让我们创建一个方法，它调用一个实例方法（需要访问`this`）以及作用域内的一个局部变量。毕竟，这些 lambda 表达式是闭包：它们封闭了自身的作用域。这正是它们的职责所在！编译器将如何处理这种复杂性？答案在清单
