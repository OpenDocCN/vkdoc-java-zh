- fmt: "Because of Java’s adamant object-oriented roots, the language itself is still\
    \ a bit awkward with this trade-off: for instance, the `java.util.function` documentation\
    \ specifies that it’s okay to refer to a lambda as “this function” instead of\
    \ “the function represented by this object.” Nonetheless, lambdas are a powerful\
    \ feature borrowed from the functional programming paradigm, and integrated well\
    \ into Java 8.\n\n[13](#A978-1-4302-5999-2_1_Chapter.html#Fn13_source)\n\nThere\
    \ are, of course, corner cases to this claim, especially when you’re calling a\
    \ method overloaded with similar interface type structures. We will get into these\
    \ boundary cases later.\n\n[14](#A978-1-4302-5999-2_1_Chapter.html#Fn14_source)\n\
    \n[`http://github.com/webonise/funjava`](http://github.com/webonise/funjava) .\n\
    \n[15](#A978-1-4302-5999-2_1_Chapter.html#Fn15_source)\n\nThe author does grant\
    \ that this could be selection bias.\n\n[16](#A978-1-4302-5999-2_1_Chapter.html#Fn16_source)\n\
    \n[`http://www.scala-lang.org/old/node/4960`](http://www.scala-lang.org/old/node/4960)\
    \ .\n\n[17](#A978-1-4302-5999-2_1_Chapter.html#Fn17_source)\n\nE.g., Haskell,\
    \ OCaml, Lisp.\n\n[18](#A978-1-4302-5999-2_1_Chapter.html#Fn18_source)\n\nIf you\
    \ would like to see object-oriented programming done in C, for instance, see the\
    \ GMP library’s C API.\n\n[19](#A978-1-4302-5999-2_1_Chapter.html#Fn19_source)\n\
    \nMight I suggest picking up OCaml over the course of an evening or two?\n\n#\
    \ 2. Understanding Lambdas in Java 8\n\nThe core new functionality in Java 8 is\
    \ the introduction of lambdas. However, most introductions will show a couple\
    \ of examples of lambdas, and then they leave it to the developer to figure out\
