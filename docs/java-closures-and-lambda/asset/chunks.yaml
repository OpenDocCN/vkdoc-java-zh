  raw: '### Bridging Arrays and Streams


    Going back and forth between arrays and streams is really quite wonderfully simple.
    To get a stream from an array, use `Stream.of(array)`. To get an array from a
    stream, you have two choices: either accept an array of `Object` instances and
    call `Stream.toArray()`; or pass that method a way to construct an array of a
    given size, and it will return the constructed array. The simplest way to define
    the supplier is to pass in the array constructor, such as `Integer[]::new`. Both
    going into and out of arrays is demonstrated in Listing 7-11.


    Listing 7-11\. Bridging Arrays and Streams


    `import java.util.stream.*;`


    `public class Listing11 {`


      `public static Integer[] generateArray() {`


        `final Integer[] elements = new Integer[1000];`


        `for (int i = 0; i < elements.length; i++) {`


          `elements[i] = i;`


        `}`


        `return elements;`


      `}`


      `public static void main(String[] args) {`


        `Integer[] array = generateArray();`


        `Stream<Integer> stream = Stream.of(array);`


        `array = stream.toArray(Integer[]::new);`


      `}`


    `}`


    ## Making Interfaces More Lambda Friendly


    Many of the interfaces in the Java SDK only have one non-default method on them.
    This is true of `Runnable`, `Callable`, `AutoCloseable`, and many of the other
    most common interfaces. These interfaces can be implemented directly using a lambda
    by simply using the lambda where the interface is expected. We have seen this
    trick regularly in our code, most recently in Listing 7-5, where we returned a
    lambda as our implementation of `ResourceExceptionHandler.FunctionWithResource`
    in `generateMap()`. So those single-method interfaces work quite nicely with lambdas
    already. Most of the remaining interfaces are very large, such as `Collection`,
    and clearly out of reach of a single lambda as its entire implementation.


    However, there are a small number of interfaces in the SDK – and quite a few in
    user code – which have only a few non-default methods, and you might really want
    to be able to define its implementation inline through lambdas. This is a very
    useful trick, but you can’t define more than one method at a time using a lambda,
    and we need to define multiple methods at the same time. How do we do it?


    This is where some serious creativity comes in. The trick is to define a new single
    method that can be used to drive the implementation of all the other methods.
    The user then specifies that new method, and our code will delegate to that new
    method’s implementation. This new method and the delegating implementations go
    into a new interface that extends our target interface.


    For instance, let’s say that we wanted to create an `Iterator` that you could
    define with a lambda. There are two non-default methods on `Iterator`: `hasNext()`
    and `next()`. Both have to do with the next element, but the former tests for
    existence without advancing while the latter advances. Therefore, our single method
    will need to operate in both an advancing and non-advancing mode. Since hasNext
    also may look beyond the end of the iterator, where there are no elements, our
    single method will need to return its result optionally. The result is this method:


    `Optional<E> maybeNext(boolean advance);`


    With that method in hand, we can define the other two methods in the iterator
    using default methods. For `next()`, we call `maybeNext` and pass in `true` to
    advance. We get back an `Optional` result, and we use the Optional API to either
    return its contained value or throw a `NoSuchElement` exception. For `hasNext()`,
    we call `maybeNext` and pass in `false` to avoid advancing. Then we simply let
    the caller know if the result is present. All of this goes into our new interface,
    which extends `Iterator`. Now users can assign the lambda into this type in order
    to get an Iterator out. This code, and a demonstration of how it works, is in
    Listing 7-12.


    Listing 7-12\. Making Iterator More Lambda Friendly


    `import java.util.*;`


    `import java.util.concurrent.atomic.*;`


    `public class Listing12 {`


    `public interface LambdaIterator<E> extends Iterator<E> {`


    `Optional<E> maybeNext(boolean advance);`


    `default E next() {`


    `return maybeNext(true).orElseThrow(NoSuchElementException::new);`


    `}`


    `default boolean hasNext() {`


    `return maybeNext(false).isPresent();`


    `}`


    `}`


    `public static Iterator<String> generateIterator() {`


    `String[] values = new String[]{"Hello", " ", "World"};`


    `AtomicInteger nextI = new AtomicInteger(0);`


    `LambdaIterator<String> it = advance -> {`


    `if (nextI.get() >= values.length) return Optional.empty();`


    `String result = values[nextI.get()];`


    `if (advance) nextI.incrementAndGet();`


    `return Optional.of(result);`


    `};`


    `return it;`


    `}`


    `public static void main(String[] args) {`


    `Iterator<String> it = generateIterator();`


    `}`


    `}`


    The big trick with this approach is that you have to come up with the clever single
    method that can handle all the needs of any given method. Your super-method does
    have access to the other methods in the interface, but if you use those other
    methods, then you need to be extremely careful not to produce a recursive loop.
    Coming up with a good, single method is the kind of problem that should excite
    you as a developer.'
