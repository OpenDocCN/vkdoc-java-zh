- fmt: "### Consuming Our Temp File Function\n\nIn a purely functional world, there\
    \ is always a return value: a program is simply a function that takes the string\
    \ arguments and system environment variables as input and produces an exit code\
    \ as output. However, in a postfunctional language such as Java 8, we often want\
    \ to use side effects instead of return values. This is why the `Consumer` class\
    \ is useful. Unfortunately, the API that we have provided so far only accepts\
    \ functions, which means that the user always has to specify a return value. Furthermore,\
    \ when you take a reference to a method with one argument but returning void,\
    \ you get an instance of the `Consumer` interface. If we want to allow users to\
    \ pass in methods with that shape, we need to accept the `Consumer` interface.\n\
    \nThis isn’t too tricky, but it does require a bit of finagling. Of course, we\
    \ want to build off of our existing APIs instead of duplicating functionality.\
    \ This means that we will need some bridge from the `Consumer` that our user passes\
    \ into the `Function` that our API desires. The difference between `Consumer`\
    \ and `Function` is the return value: `Consumer` returns void while `Function`\
    \ returns a value. For our bridge, we will return a default value. We could return\
    \ `null`, but `null` is the evil path to `NullPointerException`. The other default\
    \ non-value is `Optional.empty()`, so we can use that. The resulting code looks\
    \ like Listing 4-4.\n\n**Listing 4-4. Bridge from a Consumer to a Function**\n\
    \n```\n/**\n * Convert a consumer to a function that consumes the argument and\
    \ returns\n * {@link java.util.Optional#empty()}.\n *\n * @return A function that\
    \ consumes the argument and returns the\n *         empty option.\n */\nstatic\
    \ <T> Function<T, Optional<A>> functionise(Consumer<T> consumer) {\n    return\
    \ a -> {\n        consumer.accept(a);\n        return Optional.empty();\n    };\n\
    }\n```\n\nNow that we have that method, we can create our new API. The simple\
    \ case is one where we require the user to pass the `IOException` handler. In\
    \ this case, we have an API just like our previous version in Listing 4-1, but\
    \ we take two `Consumer` instances instead of two `Function` instances. The user\
    \ is responsible for deciding how to handle the `IOException`, should it occur,\
    \ as well as how to handle the normal case. The code for this is in Listing 4-5.\n\
    \n**Listing 4-5. Method Accepting a Consumer to Process a Temporary File, and\
    \ Calling a Callback on Error**\n\n```\n/**\n * Creates a temporary file, passes\
    \ it into the given consumer, and\n * deletes the temporary file when the function\
    \ is complete.\n *\n * @param consumer The consumer to call with the temporary\
    \ file, which is\n *        never {@code null}; may not be {@code null}\n * @param\
    \ exceptionHandler The handler for when an {@code IOException}\n *        occurs;\
    \ may not be {@code null}\n */\npublic static void withTempFile(\n    Consumer<IOException>\
    \ exceptionHandler,\n    Consumer<FunFile> consumer\n) {\n    Objects.requireNonNull(exceptionHandler,\n\
    \        \"exception handler for I/O exceptions\");\n    Objects.requireNonNull(consumer,\n\
    \        \"consumer to apply to temp file\");\n    Function<IOException, Optional<Object>>\
    \ exceptionFunction =\n        functionise(exceptionHandler);\n    Function<File,\
    \ Optional<Object>> consumerFunction = functionise(consumer);\n    withTempFile(exceptionFunction,\
    \ consumerFunction);\n}\n```\n\nWith all this functional niceness in place, we\
    \ should really finish with an API that will feel natural to the Java traditionalists.\
    \ This would mean that a function that takes a consumer, and throws an exception\
    \ if an `IOException` occurs. In this case, we will create a container for the\
    \ exception. The exception handler will store the exception into the consumer.\
    \ When the method returns, we can check to see if the container is set, and throw\
    \ the exception if it is. We need the container because variables used in lambdas\
    \ are implicitly `final`, which means that we cannot set a variable that is defined\
    \ outside of the lambda. This implementation will actually use `null`, because\
    \ `Optional` is immutable, and other options (such as using a `List`) are more\
    \ obscuring than clear. The code is given in Listing 4-6.\n\n**Listing 4-6. Method\
    \ Accepting a Consumer to Process a Temporary File, and Throwing an Exception\
    \ on Error**\n\n```\n/**\n * Creates a temporary file, passes it into the given\
    \ consumer, and\n * deletes the temporary file when the function is complete.\n\
    \ *\n * @param consumer The consumer to call with the temporary file, and\n *\
    \                 it is never {@code null}; may not be {@code null}.\n * @throws\
    \ java.io.IOException If an exception occurs.\n */\npublic static void withTempFile(Consumer<File>\
    \ consumer) throws IOException {\n    AtomicReference<IOException> reference =\
    \ new AtomicReference<>(null);\n    Consumer<IOException> exceptionHandler = reference::set;\n\
    \    withTempFile(exceptionHandler, consumer);\n    if (reference.get() != null)\
    \ throw reference.get();\n}\n```\n\nListing 4-6 is also an excellent example about\
    \ why you shouldn’t release Zalgo. (See the “Don’t Release Zalgo” in [chapter\
    \ 2](#A978-1-4302-5999-2_2_Chapter.html).) The `withTempFile` method guarantees\
    \ that if it will execute its argument, then that argument will be executed before\
    \ the method returns. Because of that, we know that the `if(reference.get() !=\
    \ null)` line will execute after the `exceptionHandler` implementation executes.\
    \ If the `exceptionHandler` sometimes executed later, then our code would break\
    \ under some uncertain (undoubtedly surprising and unfortunate) circumstances."
  raw: '### Consuming Our Temp File Function


    In a purely functional world, there is always a return value: a program is simply
    a function that takes the string arguments and system environment variables as
    input and produces an exit code as output. However, in a postfunctional language
    such as Java 8, we often want to use side effects instead of return values. This
    is why the `Consumer` class is useful. Unfortunately, the API that we have provided
    so far only accepts functions, which means that the user always has to specify
    a return value. Furthermore, when you take a reference to a method with one argument
    but returning void, you get an instance of the `Consumer` interface. If we want
    to allow users to pass in methods with that shape, we need to accept the `Consumer`
    interface.


    This isn’t too tricky, but it does require a bit of finagling. Of course, we want
    to build off of our existing APIs instead of duplicating functionality. This means
    that we will need some bridge from the `Consumer` that our user passes into the
    `Function` that our API desires. The difference between `Consumer` and `Function`
    is the return value: `Consumer` returns void while `Function` returns a value.
    For our bridge, we will return a default value. We could return `null`, but `null`
    is the evil path to `NullPointerException`. The other default non-value is `Optional.empty()`,
    so we can use that. The resulting code looks like Listing 4-4.


    Listing 4-4\. Bridge from a Consumer to a Function


    `/**`


    `* Convert a consumer to a function that consumes the argument and returns`


    `* {@link java.util.Optional#empty()}.`


    `*`


    `* @return A function that consumes the argument and returns the`


    `*         empty option.`


    `*/`


    `static <T> Function<T, Optional<A>> functionise(Consumer<T> consumer) {`


    `return a -> {`


    `consumer.accept(a);`


    `return Optional.empty();`


    `};`


    `}`


    Now that we have that method, we can create our new API. The simple case is one
    where we require the user to pass the `IOException` handler. In this case, we
    have an API just like our previous version in Listing 4-1, but we take two `Consumer`
    instances instead of two `Function` instances. The user is responsible for deciding
    how to handle the `IOException`, should it occur, as well as how to handle the
    normal case. The code for this is in Listing 4-5.


    Listing 4-5\. Method Accepting a Consumer to Process a Temporary File, and Calling
    a Callback on Error


    `/**`


    `* Creates a temporary file, passes it into the given consumer, and`


    `* deletes the temporary file when the function is complete.`


    `*`


    `* @param consumer The consumer to call with the temporary file, which is`


    `*        never {@code null}; may not be {@code null}`


    `* @param exceptionHandler The handler for when an {@code IOException}`


    `*        occurs; may not be {@code null}`


    `*/`


    `public static void withTempFile(`


    `Consumer<IOException> exceptionHandler,`


    `Consumer<FunFile> consumer`


    `) {`


    `Objects.requireNonNull(exceptionHandler,`


    `"exception handler for I/O exceptions");`


    `Objects.requireNonNull(consumer,`


    `"consumer to apply to temp file");`


    `Function<IOException, Optional<Object>> exceptionFunction =`


    `functionise(exceptionHandler);`


    `Function<File, Optional<Object>> consumerFunction = functionise(consumer);`


    `withTempFile(exceptionFunction, consumerFunction);`


    `}`


    With all this functional niceness in place, we should really finish with an API
    that will feel natural to the Java traditionalists. This would mean that a function
    that takes a consumer, and throws an exception if an `IOException` occurs. In
    this case, we will create a container for the exception. The exception handler
    will store the exception into the consumer. When the method returns, we can check
    to see if the container is set, and throw the exception if it is. We need the
    container because variables used in lambdas are implicitly `final`, which means
    that we cannot set a variable that is defined outside of the lambda. This implementation
    will actually use `null`, because `Optional` is immutable, and other options (such
    as using a `List`) are more obscuring than clear. The code is given in Listing
    4-6.


    Listing 4-6\. Method Accepting a Consumer to Process a Temporary File, and Throwing
    an Exception on Error


    `/**`


    `* Creates a temporary file, passes it into the given consumer, and`


    `* deletes the temporary file when the function is complete.`


    `*`


    `* @param consumer The consumer to call with the temporary file, and`


    `*                 it is never {@code null}; may not be {@code null}.`


    `* @throws java.io.IOException If an exception occurs.`


    `*/`


    `public static void withTempFile(Consumer<File> consumer) throws IOException {`


    `AtomicReference<IOException> reference = new AtomicReference<>(null);`


    `Consumer<IOException> exceptionHandler = reference::set;`


    `withTempFile(exceptionHandler, consumer);`


    `if (reference.get() != null) throw reference.get();`


    `}`


    Listing 4-6 is also an excellent example about why you shouldn’t release Zalgo.
    (See the “Don’t Release Zalgo” in [chapter 2](#A978-1-4302-5999-2_2_Chapter.html).)
    The `withTempFile` method guarantees that if it will execute its argument, then
    that argument will be executed before the method returns. Because of that, we
    know that the `if(reference.get() != null)` line will execute after the `exceptionHandler`
    implementation executes. If the `exceptionHandler` sometimes executed later, then
    our code would break under some uncertain (undoubtedly surprising and unfortunate)
    circumstances.'
  trans: '

    ### 使用我们的临时文件函数


    在纯函数式世界中，始终存在一个返回值：程序本质上是一个函数，它接收字符串参数和系统环境变量作为输入，并产生一个退出码作为输出。然而，在像 Java 8 这样的后函数式语言中，我们通常希望使用副作用而非返回值。这就是
    `Consumer` 类派上用场的原因。不幸的是，我们目前提供的 API 只接受函数，这意味着用户总是需要指定一个返回值。此外，当你引用一个带有一个参数但返回
    void 的方法时，你会得到一个 `Consumer` 接口的实例。如果我们希望允许用户传入这种形式的方法，就需要接受 `Consumer` 接口。


    这并不太难，但确实需要一些技巧。当然，我们希望基于现有的 API 进行构建，而不是重复实现功能。这意味着我们需要一个桥梁，将用户传入的 `Consumer`
    转换为我们的 API 所需的 `Function`。`Consumer` 和 `Function` 之间的区别在于返回值：`Consumer` 返回 void，而
    `Function` 返回一个值。对于我们的桥梁，我们将返回一个默认值。我们可以返回 `null`，但 `null` 是通往 `NullPointerException`
    的邪恶之路。另一个默认的非值选项是 `Optional.empty()`，因此我们可以使用它。最终的代码如清单 4-4 所示。


    **清单 4-4\. 从 Consumer 到 Function 的桥梁**


    `/**`


    `* 将消费者转换为一个函数，该函数消费参数并返回`


    `* {@link java.util.Optional#empty()}.`


    `*`


    `* @return 一个消费参数并返回空选项的函数。`


    `*/`


    `static <T> Function<T, Optional<A>> functionise(Consumer<T> consumer) {`


    `return a -> {`


    `consumer.accept(a);`


    `return Optional.empty();`


    `};`


    `}`


    现在我们有了这个方法，就可以创建新的 API 了。简单的情况是要求用户传入 `IOException` 处理器。在这种情况下，我们的 API 与之前清单 4-1
    中的版本类似，但我们接受两个 `Consumer` 实例，而不是两个 `Function` 实例。用户负责决定如何处理可能发生的 `IOException`，以及如何处理正常情况。相关代码见清单
    4-5。


    **清单 4-5\. 接受 Consumer 处理临时文件，并在出错时调用回调的方法**


    `/**`


    `* 创建一个临时文件，将其传递给给定的消费者，并在函数完成时删除该临时文件。`


    `*`


    `* @param consumer 要使用临时文件调用的消费者，`


    `*        永远不会是 {@code null}；不能为 {@code null}`


    `* @param exceptionHandler 当发生 {@code IOException}`


    `*        时的处理器；不能为 {@code null}`


    `*/`


    `public static void withTempFile(`


    `Consumer<IOException> exceptionHandler,`


    `Consumer<FunFile> consumer`


    `) {`


    `Objects.requireNonNull(exceptionHandler,`


    `"I/O 异常的异常处理器");`


    `Objects.requireNonNull(consumer,`


    `"应用于临时文件的消费者");`


    `Function<IOException, Optional<Object>> exceptionFunction =`


    `functionise(exceptionHandler);`


    `Function<File, Optional<Object>> consumerFunction = functionise(consumer);`


    `withTempFile(exceptionFunction, consumerFunction);`


    `}`


    有了所有这些函数式的优雅特性，我们最终应该提供一个让 Java 传统主义者感到自然的 API。这意味着一个函数接受一个消费者，并在发生 `IOException`
    时抛出异常。在这种情况下，我们将为异常创建一个容器。异常处理器会将异常存储到该容器中。当方法返回时，我们可以检查容器是否已设置，如果已设置则抛出异常。我们需要这个容器，因为在
    lambda 中使用的变量隐式地是 `final` 的，这意味着我们无法设置一个在 lambda 外部定义的变量。这个实现实际上会使用 `null`，因为
    `Optional` 是不可变的，而其他选项（例如使用 `List`）会显得更加晦涩而非清晰。代码如清单 4-6 所示。


    **清单 4-6\. 接受 Consumer 处理临时文件，并在出错时抛出异常的方法**


    `/**`


    `* 创建一个临时文件，将其传递给给定的消费者，并在函数完成时删除该临时文件。`


    `*`


    `* @param consumer 要使用临时文件调用的消费者，`


    `*                 它永远不会是 {@code null}；不能为 {@code null}.`


    `* @throws java.io.IOException 如果发生异常。`


    `*/`


    `public static void withTempFile(Consumer<File> consumer) throws IOException {`


    `AtomicReference<IOException> reference = new AtomicReference<>(null);`


    `Consumer<IOException> exceptionHandler = reference::set;`


    `withTempFile(exceptionHandler, consumer);`


    `if (reference.get() != null) throw reference.get();`


    `}`


    清单 4-6 也是一个极好的例子，说明了为什么你不应该释放 Zalgo。（请参阅第 2 章中的“不要释放 Zalgo”。）`withTempFile` 方法保证，如果它要执行其参数，那么该参数将在方法返回之前被执行。正因如此，我们知道
    `if(reference.get() != null)` 这行代码会在 `exceptionHandler` 实现执行之后执行。如果 `exceptionHandler`
    有时会延迟执行，那么我们的代码就会在某些不确定的（无疑是令人惊讶且不幸的）情况下崩溃。

