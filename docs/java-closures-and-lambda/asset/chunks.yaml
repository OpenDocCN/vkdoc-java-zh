    `"文件不是普通文件: " + toString()`


    `)));`


    `}`


    `try {`


    `return Files.lines(toPath()).map(Result::new);`


    `} catch (IOException ioe) {`


    `return Stream.of(new Result<>(ioe));`


    `}`


    `}`

