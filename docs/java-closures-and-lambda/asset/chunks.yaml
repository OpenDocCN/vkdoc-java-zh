    \n# 1. Java 8: It’s a Whole New Java\n\nThis book is about lambdas (closures)\
    \ in Java 8. More than that, though, it’s about the new language that Java has\
    \ become. The revolution was not televised, and it was met with little fanfare,\
    \ but it has happened. It is possible for you to continue to write the same old\
    \ Java code in our new Java 8 world, but unless you get onboard with the revolution,\
    \ you will increasingly discover code that is called “Java,” but which has language,\
    \ syntax, and customs that are foreign to you.\n\nThis book is here to help you\
    \ enter into this exciting new world. You should be eager to join this brave new\
    \ Java 8 world, because it will actually enable you to write code that is more\
    \ succinct, more readable, and more performant: it’s rare that you get all three\
    \ of these wins together, but lambdas in Java 8 bring all this to the table.\n\
    \nTo understand exactly where the new Java is coming from, let me go back into\
    \ history. A long time ago in an old version of Java, a member of my team wrote\
    \ a piece of code that would clone a list, but without including any of the null\
    \ elements that may have been in the original list. That team member’s implementation\
    \ looked something like Listing 1-1. The tech lead saw that code and was not impressed,\
    \ and so he rewrote it into Listing 1-2, which was longer, but both more readable\
    \ and more efficient.\n\n**Listing 1-1. Original Implementation of `cloneWithoutNulls(List)`**\n\
    \n```\npublic static <A> List<A> cloneWithoutNulls(final List<A> list) {\n   \
    \ List<A> out = new ArrayList<A>(list);\n    while(out.remove(null)) {}\n    return\
    \ out;\n}\n```\n\n**Listing 1-2. Refined Implementation of `cloneWithoutNulls(List)`**\n\
    \n```\npublic static <A> List<A> cloneWithoutNulls(final List<A> list) {\n   \
    \ List<A> out = new ArrayList<A>(list.size());\n    for(A elt : list) {\n    \
    \    if(elt != null) out.add(e);\n    }\n    return out;\n}\n```\n\nThis is when\
    \ I became responsible for that code. I reimplemented the method as something\
    \ more readable to my eyes. I did so by leveraging Apache’s Commons-Collections\
    \ library. This creates the implementation given in Listing 1-3. The additional\
    \ readability is because Commons-Collections has a way of saying, “Give me all\
    \ of the collection’s elements where some predicate is true.” Because they had\
    \ this predicate infrastructure, you can express that idea succinctly. I thought\
    \ that I had really made some progress in clarifying and simplifying the code.\
    \ Plus, if we ever needed to add another criterion to filter on, it’s easy to\
    \ extend the `Predicate` to make that happen.\n\n**Listing 1-3. Apache Commons-Collections\
    \ Implementation of `cloneWithoutNulls(List)`**\n\n```\npublic static <A> List<A>\
    \ cloneWithoutNulls(final List<A> list) {\n    Collection<A> nonNulls = CollectionUtils.select(list,\
    \ PredicateUtils.notNullPredicate());\n    return new ArrayList<>(nonNulls);\n\
    }\n```\n\nUnfortunately, the time came when the new hot library, Google’s Guava,\
    \ replaced Apache Commons-Collections on this project. Guava also contains a `Predicate`\
    \ infrastructure, but it has an entirely different package name, inheritance tree,\
    \ and API than the Commons-Collections `Predicate` infrastructure. Because of\
    \ that, we had to change the method to the new code in Listing 1-4.\n\n**Listing\
    \ 1-4. Google Guava Implementation of `cloneWithoutNulls(List)`**\n\n```\npublic\
    \ static <A> List<A> cloneWithoutNulls(final List<A> list) {\n    Collection<A>\
    \ nonNulls = Collections2.filter(list, Predicates.notNull());\n    return new\
    \ ArrayList<>(nonNulls);\n}\n```\n\nThe problem is that the `Predicate` infrastructure\
    \ was useful, but Java didn’t have it in its core, and so extensions to the standard\
    \ library such as Guava and Apache Commons each ended up building their own implementations.\
    \ Of course, none of these implementations are compatible with the others. The\
    \ alternative JVM languages also started shipping their own (universally mutually\
    \ incompatible) implementations. With Java 8, we finally have a canonical implementation\
    \ of that infrastructure and a lot more with it. The directly converted Java 8\
    \ version of this code looks like Listing 1-5.\n\n**Listing 1-5. Java 8 `Predicate`\
    \ Implementation of `cloneWithoutNulls(List)`**\n\n```\npublic static <A> List<A>\
    \ cloneWithoutNulls(final List<A> list) {\n    List<A> toReturn = new ArrayList<>(list);\n\
    \    toReturn.removeIf(Predicate.isEqual(null));\n    return toReturn;\n}\n```\n\
    \nBut these predicates are not the extent of what Java 8 introduces. There’s a\
    \ whole new syntax to succinctly express this idea: see Listing 1-6. That right\
    \ arrow? That’s an example of the most exciting new feature of Java 8: it’s a\
    \ lambda. But it goes even further. You will increasingly see Java code that looks\
    \ like Listing 1-7. In this example, we have an interface (`Comparator`) with\
    \ static and instance methods, and some real strangeness happening involving two\
    \ colons. What is going on? That’s the Java 8 revolution, and that’s what this\
    \ book is all about.\n\n**Listing 1-6. Java 8 Lambda Implementation of `cloneWithoutNulls(List)`**\n\
    \n```\npublic static <A> List<A> cloneWithoutNulls(final List<A> list) {\n   \
    \ List<A> toReturn = new ArrayList<>(list);\n    toReturn.removeIf(it -> it ==\
    \ null);\n    return toReturn;\n}\n```\n\n**Listing 1-7. Example of Defining a\
    \ `Comparator` of Java 8**\n\n```\nComparator c =\n    Comparator\n        .comparing(User::getLastName)\n\
    \        .thenComparing(User::getFirstName);\n```"
