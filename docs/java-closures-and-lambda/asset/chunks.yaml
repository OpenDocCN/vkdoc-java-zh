- fmt: "# Implementing Abstract Classes via Lambdas\n\nLambdas and interfaces go hand\
    \ in hand in Java 8. They are really two different syntaxes for the same underlying\
    \ functionality. However, abstract classes can also get some help from the addition\
    \ of lambdas. The syntax is not as nice, but it is more clear than the classic\
    \ inline class definition.\n\nLike with interfaces, the goal is going to be to\
    \ reduce the implementation of all the undefined methods into a single statement.\
    \ In this case, however, we will be attempting to build a constructor that takes\
    \ a lambda instead of simply a lambda. The user will have to call our constructor\
    \ (which is less nice), but this gives us significantly more to work with: in\
    \ addition to the implementation lambda, we can also accept other configuration\
    \ values.\n\nTo see how this works specifically, let’s look at `AbstractCollection`.\
    \ Let’s say that we wanted to be able to implement an `AbstractCollection` through\
    \ a lambda. The two abstract methods on `AbstractCollection` are the following:\n\
    \n`public abstract Iterator<E> iterator()`\n\n`public abstract int size()`\n\n\
    We will want to implement both of those by passing a lambda and possibly some\
    \ other arguments into a constructor. We can certainly accept the size as an argument\
    \ in the constructor, which leaves the `iterator()` method for our lambda implementation.\
    \ We will therefore require the user to provide us something like a `Supplier<Iterator<E>>`\
    \ as our lambda argument. Of course, we will provide an interface type for that\
    \ supplier, so that users understand exactly what we need. We will call this kind\
    \ of a `Collection`, `LambdaCollection`.\n\nTo demonstrate using our `LambdaCollection`,\
    \ let’s consider that we wanted to be able to treat the lines of a file as a `Collection`,\
    \ and we were willing to do it in an inefficient (yet effective) way. In that\
    \ case, we could define a way to go from the lines of the files to an iterator\
    \ over the lines of the files, and this would be our lambda. We would also have\
    \ to do one trip through the file at the outset to get the size. We demonstrate\
    \ the code for `LambdaCollection` and this case in Listing 7-13.\n\n**Listing\
    \ 7-13.** Using a Lambda to Implement an Abstract Type\n\n```\nimport java.io.File;\n\
    import java.io.IOException;\nimport java.io.UncheckedIOException;\nimport java.nio.file.Files;\n\
    import java.nio.file.Path;\nimport java.util.*;\n\npublic class Listing14 {\n\
    \    public static class LambdaCollection<E> extends AbstractCollection<E> {\n\
    \        private final int size;\n        private final Listing14.LambdaCollection.IteratorFactory<E>\
    \ factory;\n\n        /**\n         * Defines the means of acquiring an {@link\
    \ java.util.Iterator}.\n         */\n        public interface IteratorFactory<E>\
    \ {\n            /**\n             * Creates a new instance of an {@link java.util.Iterator}.\n\
    \             * The iterator should be a fresh iterator each time this\n     \
    \        * method is called, but it should always iterate over the\n         \
    \    * same source.\n             *\n             * @return A new {@code Iterator};\
    \ never {@code null}.\n             */\n            Iterator<E> create();\n  \
    \      }\n\n        public LambdaCollection(int size, IteratorFactory<E> factory)\
    \ {\n            this.size = size;\n            this.factory = factory;\n    \
    \    }\n\n        /**\n         * Returns an iterator over the elements contained\
    \ in this collection.\n         *\n         * @return an iterator over the elements\
    \ contained in this collection\n         */\n        @Override\n        public\
    \ Iterator<E> iterator() {\n            return factory.create();\n        }\n\n\
    \        @Override\n        public int size() {\n            return size;\n  \
    \      }\n    }\n\n    public static Path generateFile() throws IOException {\n\
    \        File file = File.createTempFile(\"example\", \"tmp\");\n        file.deleteOnExit();\n\
    \        Path path = file.toPath();\n        Files.write(path, \"this\\nis\\nour\\\
    nfile\".getBytes(\"UTF-8\"));\n        return path;\n    }\n\n    public static\
    \ void main(String[] args) throws Exception {\n        Path file = generateFile();\n\
    \        Collection<String> collection = new LambdaCollection<>(\n           \
    \ (int) Files.lines(file).count(),\n            () -> {\n                try {\n\
    \                    return Files.lines(file).iterator();\n                } catch\
    \ (IOException ioe) {\n                    throw new UncheckedIOException(\n \
    \                       \"Error reading lines from \" + file, ioe);\n        \
    \        }\n            }\n        );\n    }\n}\n```\n\nThe key thing to recognize\
    \ from Listing 7-13 is that we delegate our abstract method implementation to\
    \ a lambda. That lambda is passed into the constructor. That is the basic pattern\
    \ for using lambdas to implement abstract methods. You may be tempted to accept\
    \ multiple lambdas into a constructor, and thereby to implement more and more\
    \ abstract elements. Don’t do this for two reasons: first, because it encourages\
    \ people to create ad hoc classes when they should have reusable classes; second,\
    \ because it is hard to read, and Java already has an inline class definition\
    \ format that works well for this case. That is one particular case where lambdas\
    \ make things less readable, not more."
  raw: '## Implementing Abstract Classes via Lambdas


    Lambdas and interfaces go hand in hand in Java 8\. They are really two different
    syntaxes for the same underlying functionality. However, abstract classes can
    also get some help from the addition of lambdas. The syntax is not as nice, but
    it is more clear than the classic inline class definition.


    Like with interfaces, the goal is going to be to reduce the implementation of
    all the undefined methods into a single statement. In this case, however, we will
    be attempting to build a constructor that takes a lambda instead of simply a lambda.
    The user will have to call our constructor (which is less nice), but this gives
    us significantly more to work with: in addition to the implementation lambda,
    we can also accept other configuration values.


    To see how this works specifically, let’s look at `AbstractCollection`. Let’s
    say that we wanted to be able to implement an `AbstractCollection` through a lambda.
    The two abstract methods on `AbstractCollection` are the following:


    `public abstract Iterator<E> iterator()`


    `public abstract int size()`


