- fmt: "# Functional Iteration\n\nOne of the marks of pride in post-functional language\
    \ communities is that nobody uses a `for` loop anymore. The abandonment of the\
    \ `for` keyword has become a minimally acceptable criteria for code, enforced\
    \ with righteous zeal. Instead, these languages provide an iterator method. Java\
    \ 8 joins the ranks of these post-functional languages with the `forEach` and\
    \ `forEachRemaining` methods.\n\nThe `Iterable` interface now provides a `forEach`\
    \ method. Some Java developers still don’t know about the `Iterable` interface,\
    \ which was introduced in Java 5. It is the base class underlying all the Java\
    \ SDK classes that can provide an `Iterator`, and it is the class that enabled\
    \ the enhanced `for` loop introduced in Java 5. Since the new `forEach` method\
    \ is on this widely implemented interface, all those implementing classes now\
    \ have a `forEach` method, as well.\n\nSemantically, the `forEach` method is the\
    \ same thing as a `for` loop: it takes a `Consumer` and executes it for each element\
    \ in the loop. Practically, however, it’s an inside-out `for` loop. Instead of\
    \ creating a structure where you iterate over the collection and then execute\
    \ a series of steps for each iteration, the `forEach` method provides the series\
    \ of steps to the collection, and the collection applies it to each element in\
    \ order. This allows the collection implementation to perform the iteration in\
    \ the most efficient way possible. Even better, the code is much more succinct\
    \ and readable, as Listing 3-2 shows.\n\nListing 3-2. Printing out each of the\
    \ books using an enhanced for loop and forEach\n\n```\nfor (Book book : library.getBooks())\
    \ {\n    System.out.println(book);\n}\n\nlibrary.getBooks().forEach(System.out::println);\n\
    ```\n\nIf you do have some legacy code where you are provided an `Iterator`, however,\
    \ you can still use a functional alternative to the loop. In this case, the method\
    \ is `forEachRemaining`, which applies the lambda to all the remaining elements\
    \ of the iterator and exhausts it in the process.\n\nThe situation is slightly\
    \ different for `Map.forEach`. Historically, Java has wanted you to think of a\
    \ `Map` as providing access to a `Collection` of `Map.Entry` objects. With Java\
    \ 8 lambdas, they are breaking away from that: the `Map.forEach` method does not\
    \ take a `Consumer` of `Map.Entry` objects, but rather a `BiConsumer` of the key\
    \ and value pairs. On the one hand, this makes for reasonably nice-looking inline\
    \ implementations, such as in Listing 3-3: there is no more having to call `entry.getKey()`\
    \ and `entry.getValue()`. On the other hand, `BiConsumer` is an exotic functional\
    \ type, and very few lambda manipulations or existing method definitions play\
    \ nicely with it.\n\nListing 3-3. Printing out each of the featured books using\
    \ the Map version of forEach\n\n```\nlibrary.getFeaturedBooks().forEach(\n   \
    \ (book, msg) -> System.out.println(book + \": \" + msg)\n);\n```\n\nWith knowledge\
    \ of those methods, you can now write Java code that never again uses the `for`\
    \ loop, making your code post-functional programmer compliant. The ironic part\
    \ of this zeal for the iterator method is that you almost never use the iterator\
    \ method in functional programming. The reason is the return value: it is `void`\
    \ in Java and is equally useless in almost all languages. This means that it is\
    \ a hard stop on function building: for the functional programmer, there is nowhere\
    \ to go from the iterator method. Its usefulness is therefore dependent entirely\
    \ on side effects, which is antithetical to the entire functional programming\
    \ paradigm. In Listing 3-3, for instance, a functional programmer would map the\
    \ `Book` to a `String`, then pipe that into `String` concatenation, then pipe\
    \ the result into `System.out.println`. Unfortunately, the `Consumer` type prevents\
    \ that kind of chaining, because it is depending on the side effect of the `Consumer`\
    \ implementation to accomplish anything interesting.\n\nThis is one of the places\
    \ where post-functional languages and functional languages part ways most strongly.\
    \ Post-functional languages accept side effects as a reasonable way to accomplish\
    \ the programmer’s goals, whereas functional languages punish the programmer for\
    \ trying to code with side effects. While post-functional languages provide significantly\
    \ more flexibility to the programmer, they also make it harder to read the code,\
    \ reason about the code, or provide guarantees about its behavior (such as thread\
    \ safety). It’s the classic case of great power bringing great responsibility.\n\
    \nThe takeaway lesson for the Java 8 developer is that it is fine to use the `forEach`/`forEachRemaining`\
    \ methods. However, any time you reach for these methods, consider carefully whether\
    \ you really want one of the other comprehensions. Using the right method for\
    \ the job will improve your code’s readability, give power to the runtime and\
    \ library developers to optimize it appropriately, and exercise your habit of\
    \ programming in a more powerfully functional way.\n\nIt is also worth noting\
    \ that if you want to manipulate the collection, such as adding and removing members,\
    \ this is not the way to do it. Attempting to modify the collection from within\
    \ the `forEach` method may result in a `ConcurrentModificationException` occurring.\
    \ Since the contract for `forEach` just says that the exception may occur, it\
    \ is safe to assume that the exception will wait to occur until the worst possible\
    \ circumstance, and only then bring your code down. If you want to manipulate\
    \ the collection or map by passing in a lambda, you will have to use special methods\
    \ for that.\n\n# Manipulating Collections and Maps with Lambdas\n\nWithin mathematics,\
    \ there is no mutability: something that is true is always true; something that\
    \ is false is always false. Functional programming follows mathematics’ lead on\
    \ this, and presumes that the domain cannot be changed. When you use a collection\
    \ or a map as the domain of a lambda, the result will be a new collection, map,\
    \ or object. In this section, we will explore the particular kinds of operations\
    \ that are available."
  raw: '## Functional Iteration


    One of the marks of pride in post-functional language communities is that nobody
    uses a `for` loop anymore. The abandonment of the `for` keyword has become a minimally
    acceptable criteria for code, enforced with righteous zeal. Instead, these languages
    provide an iterator method. Java 8 joins the ranks of these post-functional languages
    with the `forEach` and `forEachRemaining` methods.


    The `Iterable` interface now provides a `forEach` method. Some Java developers
    still don’t know about the `Iterable` interface, which was introduced in Java
    5\. It is the base class underlying all the Java SDK classes that can provide
    an `Iterator`, and it is the class that enabled the enhanced `for` loop introduced
    in Java 5\. Since the new `forEach` method is on this widely implemented interface,
    all those implementing classes now have a `forEach` method, as well.


    Semantically, the `forEach` method is the same thing as a `for` loop: it takes
    a `Consumer` and executes it for each element in the loop. Practically, however,
    it’s an inside-out `for` loop. Instead of creating a structure where you iterate
    over the collection and then execute a series of steps for each iteration, the
    `forEach` method provides the series of steps to the collection, and the collection
    applies it to each element in order. This allows the collection implementation
    to perform the iteration in the most efficient way possible. Even better, the
    code is much more succinct and readable, as Listing 3-2 shows.


    Listing 3-2\. Printing out each of the books using an enhanced for loop and forEach


    `for (Book book : library.getBooks()) {`


    `System.out.println(book);`


    `}`


    `library.getBooks().forEach(System.out::println);`


    If you do have some legacy code where you are provided an `Iterator`, however,
    you can still use a functional alternative to the loop. In this case, the method
    is `forEachRemaining`, which applies the lambda to all the remaining elements
    of the iterator and exhausts it in the process.


    The situation is slightly different for `Map.forEach`. Historically, Java has
    wanted you to think of a `Map` as providing access to a `Collection` of `Map.Entry`
    objects. With Java 8 lambdas, they are breaking away from that: the `Map.forEach`
    method does not take a `Consumer` of `Map.Entry` objects, but a rather `BiConsumer`
    of the key and value pairs. On the one hand, this makes for reasonably nice-looking
    inline implementations, such as in Listing 3-3: there is no more having to call
    `entry.getKey()` and `entry.getValue()`. On the other hand, `BiConsumer` is an
    exotic functional type, and very few lambda manipulations or existing method definitions
    play nicely with it.


    Listing 3-3\. Printing out each of the featured books using the Map version of
    forEach


    `library.getFeaturedBooks().forEach(`


    `(book, msg) ->  System.out.println(book + ": " + msg)`


    `);`


    With knowledge of those methods, you can now write Java code that never again
    uses the `for` loop, making your code post-functional programmer compliant. The
    ironic part of this zeal for the iterator method is that you almost never use
    the iterator method in functional programming. The reason is the return value:
    it is `void` in Java and is equally useless in almost all languages. This means
    that it is a hard stop on function building: for the functional programmer, there
    is nowhere to go from the iterator method. Its usefulness is therefore dependent
    entirely on side effects, which is antithetical to the entire functional programming
    paradigm. In Listing 3-3, for instance, a functional programmer would map the
    `Book` to a `String`, then pipe that into `String` concatenation, then pipe the
    result into `System.out.println`. Unfortunately, the `Consumer` type prevents
    that kind of chaining, because it is depending on the side effect of the `Consumer`
    implementation to accomplish anything interesting.


    This is one of the places where post-functional languages and functional languages
    part ways most strongly. Post-functional languages accept side effects as a reasonable
    way to accomplish the programmer’s goals, whereas functional languages punish
    the programmer for trying to code with side effects. While post-functional languages
    provide significantly more flexibility to the programmer, they also make it harder
    to read the code, reason about the code, or provide guarantees about its behavior
    (such as thread safety). It’s the classic case of great power bringing great responsibility.


    The takeaway lesson for the Java 8 developer is that it is fine to use the `forEach`/`forEachRemaining`
    methods. However, any time you reach for these methods, consider carefully whether
    you really want one of the other comprehensions. Using the right method for the
    job will improve your code’s readability, give power to the runtime and library
    developers to optimize it appropriately, and exercise your habit of programming
    in a more powerfully functional way.


    It is also worth noting that if you want to manipulate the collection, such as
    adding and removing members, this is not the way to do it. Attempting to modify
    the collection from within the `forEach` method may result in a `ConcurrentModificationException`
    occurring. Since the contract for `forEach` just says that the exception may occur,
    it is safe to assume that the exception will wait to occur until the worst possible
    circumstance, and only then bring your code down. If you want to manipulate the
    collection or map by passing in a lambda, you will have to use special methods
    for that.


    ## Manipulating Collections and Maps with Lambdas


    Within mathematics, there is no mutability: something that is true is always true;
    something that is false is always false. Functional programming follows mathematics’
    lead on this, and presumes that the domain cannot be changed. When you use a collection
    or a map as the domain of a lambda, the result will be a new collection, map,
    or object. In this section, we will explore the particular kinds of operations
    that are available.'
