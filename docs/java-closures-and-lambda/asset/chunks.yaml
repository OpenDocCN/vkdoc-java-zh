    \ We will see precisely how by the end of the chapter.\n\n## Lambdas and Classic\
    \ Java Threading\n\nThe first Java concurrency structure was the `Thread` class,\
    \ and it still underlies all the other concurrency structures in the Java language.\
    \ Lambdas work well with the `Thread` class, because the `Thread` class is built\
    \ around the `Runnable` interface. As we saw in [chapter 2](#A978-1-4302-5999-2_2_Chapter.html),\
