    \ Dedication.\n\n## About the Author\n\n![A978-1-4302-5999-2_BookFrontmatter_Fig1_HTML.jpg](A978-1-4302-5999-2_BookFrontmatter_Fig1_HTML.jpg)\
    \ Robert Fischer is a software developer, open source software contributor, technical\
