    ## 通过 Lambda 实现抽象类


    在 Java 8 中，Lambda 表达式与接口相辅相成。它们实际上是同一底层功能的两种不同语法。不过，抽象类也能从 Lambda 的引入中获益。虽然语法不如接口那么优雅，但比传统的匿名内部类定义方式更加清晰。


    与接口类似，其目标是将所有未定义方法的实现缩减为单个语句。但在此场景下，我们将尝试构建一个接受 Lambda 的构造函数，而非直接使用 Lambda。用户需要调用我们的构造函数（这不如直接使用
    Lambda 方便），但这为我们提供了更大的操作空间：除了实现 Lambda 外，我们还可以接受其他配置值。


    为了具体了解其工作原理，让我们看看 `AbstractCollection`。假设我们希望通过 Lambda 来实现一个 `AbstractCollection`。`AbstractCollection`
    的两个抽象方法如下：


    `public abstract Iterator<E> iterator()`


    `public abstract int size()`


    我们将通过向构造函数传递一个 Lambda 以及可能的其他参数来实现这两个方法。我们当然可以在构造函数中接受 size 作为参数，这样 `iterator()`
    方法就留给 Lambda 实现。因此，我们需要用户提供类似 `Supplier<Iterator<E>>` 的东西作为 Lambda 参数。当然，我们会为该供应者提供一个接口类型，以便用户确切了解我们的需求。我们将这种集合称为
    `LambdaCollection`。


    为了演示如何使用我们的 `LambdaCollection`，假设我们希望将文件的行视为一个集合，并且愿意以低效（但有效）的方式实现。在这种情况下，我们可以定义一种方法，将文件的行转换为文件行的迭代器，这就是我们的
    Lambda。此外，我们还需要在开始时遍历一次文件以获取大小。我们在清单 7-13 中展示了 `LambdaCollection` 的代码以及此用例。


    **清单 7-13. 使用 Lambda 实现抽象类型**


    `import java.io.File;`


    `import java.io.IOException;`


    `import java.io.UncheckedIOException;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.util.*;`


    `public class Listing14 {`


    `public static class LambdaCollection<E> extends AbstractCollection<E> {`


    `private final int size;`


    `private final Listing14.LambdaCollection.IteratorFactory<E> factory;`


    `/**`


    `* 定义获取 {@link java.util.Iterator} 的方式。`


    `*/`


    `public interface IteratorFactory<E> {`


    `/**`


    `* 创建 {@link java.util.Iterator} 的新实例。`


    `* 每次调用此方法时，迭代器都应是全新的，`


    `* 但它应始终迭代相同的源。`


    `*`


    `* @return 一个新的 {@code Iterator}；绝不能为 {@code null}。`


    `*/`


    `Iterator<E> create();`


    `}`


    `public LambdaCollection(int size, IteratorFactory<E> factory) {`


    `this.size = size;`


    `this.factory = factory;`


    `}`


    `/**`


    `* 返回此集合中元素的迭代器。`


    `*`


    `* @return 此集合中元素的迭代器`


    `*/`


    `@Override`


    `public Iterator<E> iterator() {`


    `return factory.create();`


    `}`


    `@Override`


    `public int size() {`


    `return size;`


    `}`


    `}`


    `public static Path generateFile() throws IOException {`


    `File file = File.createTempFile("example", "tmp");`


    `file.deleteOnExit();`


    `Path path = file.toPath();`


    `Files.write(path, "this\nis\nour\nfile".getBytes("UTF-8"));`


    `return path;`


    `}`


    `public static void main(String[] args) throws Exception {`


    `Path file = generateFile();`


    `Collection<String> collection = new LambdaCollection<>(`


    `(int) Files.lines(file).count(),`


    `() -> {`


    `try {`


    `return Files.lines(file).iterator();`


    `} catch (IOException ioe) {`


    `throw new UncheckedIOException(`


    `"从 " + file + " 读取行时出错", ioe);`


    `}`


    `}`


    `);`


    `}`


    `}`


    从清单 7-13 中需要认识到关键点是：我们将抽象方法的实现委托给了 Lambda。该 Lambda 被传递到构造函数中。这是使用 Lambda 实现抽象方法的基本模式。你可能会倾向于在构造函数中接受多个
    Lambda，从而实现更多的抽象元素。但不要这样做，原因有二：首先，这会鼓励人们在应该使用可重用类时创建临时类；其次，这会导致代码难以阅读，而 Java 已有的匿名内部类定义格式在此场景下已经足够好用。这正是
    Lambda 反而会降低可读性的一个特例。

