  raw: '### Default Methods


    The ability to define an interface inline makes interfaces much more succinct
    and pleasant to use. Yet Java 8 makes things even easier by allowing an interface
    to define a default implementation for its methods. This begins to seriously blur
    the lines between an interface and an abstract class: the `java.util.AbstractCollection`
    abstract class, for instance, could now be implemented purely as an interface.


    As an example, let’s create an `Iterator type that can` be defined inline by providing
    a lambda. The lambda is responsible for providing a “next element,” perhaps consuming
    that element. A special value is used to signal when the elements have all been
    consumed. The user just provides that lambda; all the other `Iterator` methods
    are provided as default methods. The code for this class is given in Listing 2-24\.
    As you can see there, default methods are provided using the `default` keyword.
    Just like any other member of an interface, all default methods are `public`.
    And just like any other member of an interface, you can specify `public` if you
    would like, although it is redundant and doing so has no effect.


    Default methods are a major change to the Java ecosystem, and it seems like you
    would never use an abstract class again. However, there are a few caveats with
    default methods. First of all, there is no way to inherit a default method implementation:
    if you override the method, you have to implement it yourself. (Although, see
    the next section for a potential workaround.) Second, if you have a class with
    two interfaces that provided conflicting default methods, you will have to override
    the method and implement it yourself.


    Default methods play a major part in Java 8 code, and have been retrofitted onto
    a number of standard Java interfaces. We will look into where they appear as we
    address each of these areas in later chapters.


    Listing 2-24\. The FunIterator Class, Demonstrating Default Methods


    `/**`


    `* An implementation of {@link java.util.Iterator} that can be implemented`


    `* as a lambda. You can also use this class as a simpler way to implement`


    `* an {@code Iterator}.`


    `* <p>`


    `* This interface does not support {@link #remove()} out of the box.`


    `*/`


    `public interface FunIterator<E> extends Iterator<E> {`


      `/**`


       `* Provides the next element, optionally consuming it. This is the abstract`


       `* method to implement as a lambda.`


       `* If {@code false} is passed in as an argument, this method should always`


       `* return the same value, and should never exhaust the iterator. If`


       `* {@code true} is passed in as an argument, the iterator should advance to`


       `* the next element after returning the value. At any point in time, if there`


       `* are no more elements, the iterator should return`


       `* {@link java.util.Optional#empty()}. This method should never throw an`


       `* exception or return {@code null}.`


       `*`


       `* @param consume  Whether the element should be consumed after being`


       `*                 returned.`


       `* @return {@link java.util.Optional#empty()} if there are no other elements;`


       `*         otherwise, an {@link java.util.Optional} containing the next`


       `*         element. Never {@code null}.`


       `*/`


      `Optional<E> nextElement(boolean consume);`


      `@Override`


      `default boolean hasNext() {`


        `return nextElement(false).isPresent();`


      `}`


      `@Override`


      `default E next() {`


        `return nextElement(true).orElseThrow(`


          `() -> new NoSuchElementException("Iterator is exhausted")`


        `);`


      `}`


    `}`


    ### Static Methods


    It’s not directly related to lambdas, but now is a good time to mention it: as
    of Java 8, interfaces can also now provide static methods, just as any concrete
    or abstract class could provide static methods. If you want to provide a default
    method implementation to the outside world, you can use a static method to do
    so: simply have the default method call the static method.


    Now that interfaces can have static methods, some Java interfaces have been extended
    to provide utility methods. The most notable to my mind is `Comparator`, which
    has picked up a large number of utility methods. For instance, in Listing 2-25,
    we define a Comparator that puts null File instances last and sorts the rest by
    file name. By allowing static methods, Java 8 has outdated the “utility class”
    convention, where an interface `Foo` would have utility class `Foos` or `FooUtils`.
    Now those utility methods reside directly on the interface itself.


    Listing 2-25\. Using Comparator Static Methods to Generate a Comparator


    `Comparator<File> fileComparator =`


        `Comparator.nullsLast(`


          `Comparator.comparing(File::getName)`


        `);`


    ## Functional Interface Helper Methods


    The functional interfaces themselves carry a number of static and default methods
    to help you build the functions that you are looking for. Through this section,
    we will look at those methods, and get a sense as to when and why you want to
    use them.


    ### Function.identity() and UnaryOperator.identity()


    Perhaps the simplest to understand is `Function.identity()`. This provides a function
    that simply returns its argument. It is very useful in testing, when you want
    to test something that takes a function and acts on it. This can also be useful
    as a placeholder function: say that you have five types, and with four of them,
    you want to perform some transformation; with the fifth, you don’t want to perform
    a transformation. In that case, you can maintain the symmetry of your codebase
    and avoid using `null` (and `NullPointerException`s) by using this method.[^(10)](#A978-1-4302-5999-2_2_Chapter.html#Fn10)
    This method is also available under the `UnaryOperator` type, so that you can
    keep using that `Function` subclass and save yourself some typing.


    ### Function.compose and Function.andThen


    These two default methods provide the ability to take on functionality before
    and after a given function. The methods allow you to create a pipeline effect
    in a rather fluent API, and are especially useful for converting the types of
    a function to what you want them to be; you can prepend or append conversion functions
    inline.


    If you want to change the result type, use `andThen`. Given the function `X->Y`,
    `andThen` allows you to create `X->Z` by specifying a function that takes the
    result, `Y`, and produces a `Z`. The argument, `X`, will be fed to the instance
    function, and then the results of the instance function, `Y`, are fed into the
    argument function. As an example, consider this series of method calls:


    `Function<Integer,String> f = Integer::toString;`


    `f = f.andThen("10"::concat).andThen(Integer::parseInt);`


    These will create a function that will turn an `int` into a `String`, and then
    prepend “10,” and then parse the value back out into an `int`. What started as
    an `int->String` type is now an `int(->String->String)->int`, returned in Java
    types as an `int->int`.


    If you want to change the argument type, use `compose`. This method should have
    been called `butFirst`, because it works just like `andThen`, but on the front
    end instead of the back end. Given the function `X->Y`, butFirst allows you to
    create `W->Y` by specifying a function that takes some `W` and produces an `X`.
    The result of the specified function is fed as the argument to the instance function.
    We can specify the previous example “backwards” by doing this:


    `Function<String,Integer> f = Integer::parseInt;`


    `f = f.compose("10"::concat).compose(Integer::toString);`'
