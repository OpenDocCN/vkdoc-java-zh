- fmt: "### Method Two: Building a Stream Using `Stream.of` and `Stream.flatMap`\n\
    \nWhen we are looking to move from a `ResultSet` to a `Stream`, our problem is\
    \ that we have trouble getting into the `Stream` API. This approach gets into\
    \ the `Stream` API by constructing a single-element stream holding just the `ResultSet`.\
    \ We will then use the `Stream.flatMap` method that we saw last chapter to explode\
    \ the `ResultSet` into the resulting objects.\n\nIn this approach, the stream\
    \ consisting of a single element will be constructed through `Stream.of(resultSet)`.\
    \ The `Stream.of` method takes any number of arguments, and will construct a highly\
    \ efficient stream containing those elements in argument order. Unlike the `Stream.Builder`\
    \ approach, where objects can be determined and passed in at run time after the\
    \ builder is initiated, the elements of `Stream.of` all need to be provided immediately\
    \ at the point when the method is invoked.\n\nTo convert the stream from a single\
    \ `ResultSet` into the mapped elements, we will use `Stream.flatMap`. As we saw\
    \ in the last chapter, this allows each element of the source stream to be mapped\
    \ into zero or more elements of the result stream. In our case, the single `ResultSet`\
