- fmt: "# Reading All the Lines of Files in a Directory\n\nNow that we have exercised\
    \ our real-world lambda skills, it is time to take on something more involved.\
    \ For our next goal, we will print out all the lines of the files in a directory.\
    \ This will give us a chance to decompose a more complex problem, and to see how\
    \ to combine streams. By the time we are done with this exercise, you should have\
    \ a good sense for how streams can be manipulated, both while working with I/O\
    \ and more generally.\n\nWhen programming in a functional style, it really pays\
    \ to first stop and think about what you really want to accomplish. First, let’s\
    \ consider the shape of the function that we want. We know that we want to act\
    \ on a `java.io.File` instance, so we should either take that a file as input\
    \ or make it as a method of something that extends the `File` class. The output\
    \ side is trickier. We do not know what a user is going to do with the lines of\
    \ the file. We could take a `Consumer` to process them, but it’s both simpler\
    \ and more flexible to return the lines. We could read all the lines into some\
    \ kind of `Collection`, but that requires all the lines to be read into memory,\
    \ and it prevents any processing from occurring until the lines are done being\
    \ read. So it is best to return a `Stream`, which provides flexibility and support\
    \ for concurrent processing. But a stream of what?\n\nThe return value may not\
    \ be as obvious at it initially seems. A `Stream` of `String` instances seems\
    \ like the obvious choice, but that is only kind of right. At any point in time,\
    \ we could have an `IOException` thrown, and when you are dealing with things\
    \ like navigating directories, you should absolutely expect them. Our pattern\
    \ so far in this chapter has been to create two methods: one that accepts a `Consumer`\
    \ to process the errors, and one that returns `Result` objects. Although duplication\
    \ of the API is made simple through functional programming, it is certainly annoying\
    \ and it clutters the class. Let’s try for a different approach.\n\nThe new approach\
