    \ to realize is that declaring a lambda that uses variables is a lot like declaring\
    \ a new type that refers to those variables: we will end up instantiating a new\
    \ instance that will hold onto those variables, and it will end up referring to\
    \ those member fields when it executes. Therefore, defining a lambda inline and\
    \ defining your own anonymous inner class have practically identical performance\
    \ characteristics. Use whichever approach is more natural for the space you are\
    \ in.\n\n## Conclusion\n\nLambdas are extremely powerful, but under the hood,\
    \ they are conceptually simple: the Java SDK has a method which will take in your\
    \ lambda and return an instance of whatever type your lambda is targeting. It\
    \ performs that binding just once using the `invokedynamic` bytecode instruction,\
    \ and after the first execution, it is equivalent to instantiating the interface\
    \ implementation directly. If you define a lambda inline, then you are going to\
    \ get a synthetic method, but everything else is practically the same. There is\
    \ a lot of noise in the bytecode and some careful bookkeeping to make this all\
    \ happen right, but the concept of the implementation is actually rather simple.\
    \ Most importantly, there is nothing innate in this implementation that makes\
    \ lambdas slow or heavyweight compared to other ways to solve the same problem:\
