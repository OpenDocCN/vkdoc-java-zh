- fmt: "### Filtering Collections and Maps\n\nWhen you are working with collections,\
    \ the most common manipulation that you will want to do is to remove certain elements.\
    \ In other post-functional languages (and in Java’s `Stream` API), this is referred\
    \ to as “`filter`.” When you want to modify the collection by removing the elements\
    \ directly, the method to use is `Collection.removeIf`. The `removeIf` method\
    \ takes a `Predicate` and will remove from the collection all those elements for\
    \ which the `Predicate` tests `true`. Java does not provide any `Map` equivalent,\
    \ but you can use `removeIf` on the collections returned by `Map.entrySet()`,\
    \ `Map.values()`, and `Map.keySet()` in order to change the underlying `Map`.\
    \ The method returns `true` if there was a change made to the collection but `false`\
    \ if the collection remained unchanged.\n\nIn Listing 3-4, we use the `removeIf`\
    \ functionality to extend our `Library` class, providing the ability to remove\
    \ all the books of the given genre. Since we want to perform a test on the result\
    \ of some processing, we define a utility method here: `mapThenTest`. This provides\
    \ us a predicate that performs some mapping and tests the result of the mapping:\
    \ in our case, we want to get the genre and then perform a test of the genre.\
    \ With that predicate defined, we then pass it into `removeIf` for the books set\
    \ and the featured books set.\n\nThere are a few key things to notice in Listing\
    \ 3-4. Note that using the functional interfaces allows us to ensure we are using\
    \ the same code for both the books list and the featured books set: any change\
    \ to the predicate would be reliably applied in both cases. Also notice that the\
    \ `removeIf` call entirely removes the iteration code in both places, leaving\
    \ us with much cleaner and descriptive code. Since the featured books set is a\
    \ strict subset of the books list, we can use the return value of the first call\
    \ as an optimization to short-circuit our removal: if we found no books matching\
    \ the genre, then there is no reason to check the featured books list. The use\
    \ of functional code here saves us a lot of boilerplate and noise, and the variable\
    \ names become labels describing what the function does. When you have behavior\
    \ as variables, it is a lot easier to produce self-documenting code.\n\n**Listing\
    \ 3-4.** A Library instance method to remove genres using `removeIf`\n\n```\n\
    /**\n * Maps an element to a value and then tests that mapped value.\n *\n * @param\
    \ map The function that defines the map; never {@code null}\n * @param test The\
    \ function that defines the test; never {@code null}\n * @return A predicate that\
    \ tests the result of the mapping of its argument.\n */\nprivate static <T,U>\
    \ Predicate<T> mapThenTest(\n  Function<T,U> map, Predicate<U> test\n) {\n  Objects.requireNonNull(map,\
    \ \"the map implementation\");\n  Objects.requireNonNull(test, \"the test implementation\"\
    );\n  return t -> test.test(map.apply(t));\n}\n\n/**\n * Removes all books of\
    \ the given genre from both the library collection\n * and the featured collection.\n\
    \ *\n * @param genre The genre to compare against; never {@code null}.\n */\n\
    public void removeGenre(Book.Genre genre) {\n  Objects.requireNonNull(genre, \"\
    the genre to compare against\");\n  Predicate<Book> hasGenre = mapThenTest(Book::getGenre,\
    \ genre::equals);\n  if (this.getBooks().removeIf(hasGenre)) {\n    this.getFeaturedBooks().keySet().removeIf(hasGenre);\n\
    \  }\n}\n```\n\n### Mapping Collections and Maps\n\nIf you have embraced a more\
    \ functional style of development, you are probably using a lot of immutable objects.\
    \ In this chapter, we are taking that approach with our `Book` class. However,\
    \ this leads to a problem when we want to manipulate the objects: for instance,\
    \ say that we want to add a star after the title if it is featured. Since the\
    \ `Book` instances are immutable, we will need to replace the old instances with\
    \ our new instances. To do this, we can use the `List.replaceAll` method. The\
    \ method is attached to `List` and not to `Collection` because replacing elements\
    \ in some kinds of collections raises awkward situations for their API, such as\
    \ in the case of `SortedSet`. (If you transform the sorted elements of a `SortedSet`,\
    \ what sorting do you apply to the result?)\n\nIf we want to add a star after\
    \ the title if the book is featured, we will start by needing to define what it\
    \ means to “add a star after the title.” Given our available API for the `Book`\
    \ class, we will have to define an inline lambda to do this. (This is a sign that\
    \ our `Book` API is probably missing something useful, but that is another conversation.)\
    \ Thinking functionally, we want to apply a transformation when certain criterion\
    \ is true. This calls for another utility function: `applyIf`. That will take\
    \ a predicate and a function, and apply the function only when the predicate is\
    \ true. Since we are only working with a single data type, we can use the `UnaryOperator`\
    \ shorthand to save some typing and some type variables. With that utility method\
    \ available to us, we then need to get a handle on a `Predicate` to determine\
    \ if the book is featured, as well as the function to perform the transformation.\
    \ The resulting `UnaryOperator` does exactly what we are looking for: if the `Predicate`\
    \ test returns `true`, we will execute our “add a star after the title” function;\
    \ if the test returns `false`, we will return the `Book` instance we were provided.\
    \ The code for this approach is given in Listing 3-5.\n\n**Listing 3-5.** A Library\
    \ instance method to star featured books using `List.replaceAll`\n\n```\n/**\n\
    \ * Applies a mapping operation to the argument only when {@code test}\n * returns\
    \ {@code true} for that argument.\n *\n * @param test Test determining if mapping\
    \ is applied; never {@code null}\n * @param ifTrue Mapping to apply when the test\
    \ is true; never {@code null}\n * @return Operator appling {@code ifTrue} when\
    \ {@code test} is true\n *         and otherwise returning the argument.\n */\n\
    private static <T> UnaryOperator<T> applyIf(\nPredicate<T> test, UnaryOperator<T>\
    \ ifTrue\n) {\nObjects.requireNonNull(test, \"the predicate to test\");\nObjects.requireNonNull(ifTrue,\
    \ \"the method to apply if true\");\nreturn t -> {\nif(test.test(t)) {\nreturn\
    \ ifTrue.apply(t);\n} else {\nreturn t;\n}\n};\n}\n\n/**\n * Updates the library,\
    \ replacing each book that is featured with a book\n * with the same title plus\
    \ {@code *}.\n */\npublic void starFeatureBooks() {\nUnaryOperator<Book> starBook\
    \ = book ->\nnew Book(book.getTitle() + \"*\", book.getAuthor(), book.getGenre());\n\
    Predicate<Book> isFeatured = getFeaturedBooks().keySet()::contains;\nUnaryOperator<Book>\
    \ starIfFeatured = applyIf(isFeatured, starBook);\ngetBooks().replaceAll(starIfFeatured);\n\
    }\n```\n\nThere is also a way to perform this kind of manipulation on a `Map`\
    \ instance, although you can only change the value: the keys cannot be changed\
    \ through these manipulation calls for the same reason that `replaceAll` is hard\
    \ for `Set` to implement. The method is still quite useful: consider, for instance,\
    \ that we want to execute a hygiene method on the featured book messages: we would\
    \ like to clean up the messages by providing a default message and remove trailing\
    \ periods. We can do this by executing the `replaceAll` method and returning the\
    \ updated value, which we do in Listing 3-6. The complexity of this body does\
    \ not lend itself particularly nicely to a functional solution, so we went ahead\
    \ with an inline function definition."
  raw: '### Filtering Collections and Maps


    When you are working with collections, the most common manipulation that you will
    want to do is to remove certain elements. In other post-functional languages (and
    in Java’s `Stream` API), this is referred to as “`filter`.” When you want to modify
    the collection by removing the elements directly, the method to use is `Collection.removeIf`.
    The `removeIf` method takes a `Predicate` and will remove from the collection
    all those elements for which the `Predicate` tests `true`. Java does not provide
    any `Map` equivalent, but you can use `removeIf` on the collections returned by
    `Map.entrySet()`, `Map.values()`, and `Map.keySet()` in order to change the underlying
    `Map`. The method returns `true` if there was a change made to the collection
    but `false` if the collection remained unchanged.


    In Listing 3-4, we use the `removeIf` functionality to extend our `Library` class,
    providing the ability to remove all the books of the given genre. Since we want
    to perform a test on the result of some processing, we define a utility method
    here: `mapThenTest`. This provides us a predicate that performs some mapping and
    tests the result of the mapping: in our case, we want to get the genre and then
    perform a test of the genre. With that predicate defined, we then pass it into
    `removeIf` for the books set and the featured books set.


    There are a few key things to notice in Listing 3-4\. Note that using the functional
    interfaces allows us to ensure we are using the same code for both the books list
    and the featured books set: any change to the predicate would be reliably applied
    in both cases. Also notice that the `removeIf` call entirely removes the iteration
    code in both places, leaving us with much cleaner and descriptive code. Since
    the featured books set is a strict subset of the books list, we can use the return
    value of the first call as an optimization to short-circuit our removal: if we
    found no books matching the genre, then there is no reason to check the featured
    books list. The use of functional code here saves us a lot of boilerplate and
    noise, and the variable names become labels describing what the function does.
    When you have behavior as variables, it is a lot easier to produce self-documenting
    code.


    Listing 3-4\. A Library instance method to remove genres using removeIf


    `/**`


    `* Maps an element to a value and then tests that mapped value.`


    `*`


    `* @param map The function that defines the map; never {@code null}`


    `* @param test The function that defines the test; never {@code null}`


    `* @return A predicate that tests the result of the mapping of its argument.`


    `*/`


    `private static <T,U> Predicate<T> mapThenTest(`


      `Function<T,U> map, Predicate<U> test`


    `) {`


      `Objects.requireNonNull(map, "the map implementation");`


      `Objects.requireNonNull(test, "the test implementation");`


      `return t -> test.test(map.apply(t));`


    `}`


    `/**`


    `* Removes all books of the given genre from both the library collection`


    `* and the featured collection.`


    `*`


    `* @param genre The genre to compare against; never {@code null}.`


    `*/`


    `public void removeGenre(Book.Genre genre) {`


      `Objects.requireNonNull(genre, "the genre to compare against");`


      `Predicate<Book> hasGenre = mapThenTest(Book::getGenre, genre::equals);`


      `if (this.getBooks().removeIf(hasGenre)) {`


        `this.getFeaturedBooks().keySet().removeIf(hasGenre);`


      `}`


    `}`


    ### Mapping Collections and Maps


    If you have embraced a more functional style of development, you are probably
    using a lot of immutable objects. In this chapter, we are taking that approach
    with our `Book` class. However, this leads to a problem when we want to manipulate
    the objects: for instance, say that we want to add a star after the title if it
    is featured. Since the `Book` instances are immutable, we will need to replace
    the old instances with our new instances. To do this, we can use the `List.replaceAll`
    method. The method is attached to `List` and not to `Collection` because replacing
    elements in some kinds of collections raises awkward situations for their API,
    such as in the case of `SortedSet`. (If you transform the sorted elements of a
    SortedSet, what sorting do you apply to the result?)


    If we want to add a star after the title if the book is featured, we will start
    by needing to define what it means to “add a star after the title.” Given our
    available API for the `Book` class, we will have to define an inline lambda to
    do this. (This is a sign that our `Book` API is probably missing something useful,
    but that is another conversation.) Thinking functionally, we want to apply a transformation
    when certain criterion is true. This calls for another utility function: `applyIf`.
    That will take a predicate and a function, and apply the function only when the
    predicate is true. Since we are only working with a single data type, we can use
    the `UnaryOperator` shorthand to save some typing and some type variables. With
    that utility method available to us, we then need to get a handle on a `Predicate`
    to determine if the book is featured, as well as the function to perform the transformation.
    The resulting `UnaryOperator` does exactly what we are looking for: if the `Predicate`
    test returns `true`, we will execute our “add a star after the title” function;
    if the test returns `false`, we will return the `Book` instance we were provided.
    The code for this approach is given in Listing 3-5.


    Listing 3-5\. A Library instance method to star featured books using List.replaceAll


    `/**`


    `* Applies a mapping operation to the argument only when {@code test}`


    `* returns {@code true} for that argument.`


    `*`


    `* @param test Test determining if mapping is applied; never {@code null}`


    `* @param ifTrue Mapping to apply when the test is true; never {@code null}`


    `* @return Operator appling {@code ifTrue} when {@code test} is true`


    `*         and otherwise returning the argument.`


    `*/`


    `private static <T> UnaryOperator<T> applyIf(`


    `Predicate<T> test, UnaryOperator<T> ifTrue`


    `) {`


    `Objects.requireNonNull(test, "the predicate to test");`


    `Objects.requireNonNull(ifTrue, "the method to apply if true");`


    `return t -> {`


    `if(test.test(t)) {`


    `return ifTrue.apply(t);`


    `} else {`


    `return t;`


    `}`


    `};`


    `}`


    `/**`


    `* Updates the library, replacing each book that is featured with a book`


    `* with the same title plus {@code *}.`


    `*/`


    `public void starFeatureBooks() {`


    `UnaryOperator<Book> starBook = book ->`


    `new Book(book.getTitle() + "*", book.getAuthor(), book.getGenre());`


    `Predicate<Book> isFeatured = getFeaturedBooks().keySet()::contains;`


    `UnaryOperator<Book> starIfFeatured = applyIf(isFeatured, starBook);`


    `getBooks().replaceAll(starIfFeatured);`


    `}`


    There is also a way to perform this kind of manipulation on a `Map` instance,
    although you can only change the value: the keys cannot be changed through these
    manipulation calls for the same reason that `replaceAll` is hard for `Set` to
    implement. The method is still quite useful: consider, for instance, that we want
    to execute a hygiene method on the featured book messages: we would like to clean
    up the messages by providing a default message and remove trailing periods. We
    can do this by executing the `replaceAll` method and returning the updated value,
    which we do in Listing 3-6\. The complexity of this body does not lend itself
    particularly nicely to a functional solution, so we went ahead with an inline
    function definition.'
  trans: '

    ### 过滤集合与映射


    在处理集合时，最常见的操作就是移除某些元素。在其他后函数式语言（以及 Java 的 `Stream` API）中，这被称为“`filter`”。当你想要通过直接移除元素来修改集合时，应使用
    `Collection.removeIf` 方法。`removeIf` 方法接受一个 `Predicate`，并会从集合中移除所有使该 `Predicate`
    测试结果为 `true` 的元素。Java 没有为 `Map` 提供直接等价的方法，但你可以对 `Map.entrySet()`、`Map.values()`
    和 `Map.keySet()` 返回的集合使用 `removeIf`，从而修改底层的 `Map`。如果集合发生了更改，该方法返回 `true`；如果集合未发生更改，则返回
    `false`。


    在清单 3-4 中，我们使用 `removeIf` 功能来扩展我们的 `Library` 类，提供了移除所有指定类型图书的能力。由于我们希望对某些处理的结果进行测试，因此在此定义了一个实用方法：`mapThenTest`。这为我们提供了一个谓词，该谓词执行某些映射并测试映射的结果：在我们的例子中，我们希望获取类型，然后对该类型进行测试。定义好该谓词后，我们将其传递给
    `books` 集合和 `featured books` 集合的 `removeIf` 方法。


    在清单 3-4 中，有几点需要注意。请注意，使用函数式接口使我们能够确保对 `books` 列表和 `featured books` 集合使用相同的代码：对谓词的任何更改都将可靠地应用于两种情况。还要注意，`removeIf`
    调用完全移除了两处的迭代代码，使我们的代码更加简洁且更具描述性。由于 `featured books` 集合是 `books` 列表的严格子集，我们可以利用第一次调用的返回值作为优化手段来短路移除操作：如果没有找到匹配类型的图书，则无需检查
    `featured books` 列表。在此使用函数式代码为我们节省了大量样板代码和冗余信息，而变量名则成为了描述函数功能的标签。当行为作为变量存在时，编写自文档化的代码会容易得多。


    **清单 3-4. 使用 removeIf 移除类型的 Library 实例方法**


    `/**`


    `* 将元素映射为一个值，然后测试该映射后的值。`


    `*`


    `* @param map 定义映射的函数；不能为 {@code null}`


    `* @param test 定义测试的函数；不能为 {@code null}`


    `* @return 一个谓词，用于测试其参数映射后的结果。`


    `*/`


    `private static <T,U> Predicate<T> mapThenTest(`


      `Function<T,U> map, Predicate<U> test`


    `) {`


      `Objects.requireNonNull(map, "映射实现");`


      `Objects.requireNonNull(test, "测试实现");`


      `return t -> test.test(map.apply(t));`


    `}`


    `/**`


    `* 从图书馆馆藏和精选馆藏中移除所有指定类型的图书。`


    `*`


    `* @param genre 要比较的类型；不能为 {@code null}。`


    `*/`


    `public void removeGenre(Book.Genre genre) {`


      `Objects.requireNonNull(genre, "要比较的类型");`


      `Predicate<Book> hasGenre = mapThenTest(Book::getGenre, genre::equals);`


      `if (this.getBooks().removeIf(hasGenre)) {`


        `this.getFeaturedBooks().keySet().removeIf(hasGenre);`


      `}`


    `}`


    ### 映射集合与映射


    如果你已经接受了更函数式的开发风格，那么你可能会大量使用不可变对象。在本章中，我们对 `Book` 类采用了这种方法。然而，当我们想要操作这些对象时，这会导致一个问题：例如，假设我们想要在精选图书的标题后添加一个星号。由于
    `Book` 实例是不可变的，我们需要用新实例替换旧实例。为此，我们可以使用 `List.replaceAll` 方法。该方法属于 `List` 而非 `Collection`，因为在某些类型的集合（例如
    `SortedSet`）中替换元素会为其 API 带来尴尬的情况。（如果你转换了 `SortedSet` 中已排序的元素，那么结果应该应用哪种排序规则？）


    如果我们想要在精选图书的标题后添加一个星号，我们首先需要定义“在标题后添加一个星号”的含义。鉴于 `Book` 类可用的 API，我们必须定义一个内联 lambda
    来实现这一点。（这表明我们的 `Book` API 可能缺少某些有用的功能，但这是另一个话题了。）从函数式角度思考，我们希望在满足特定条件时应用一个转换。这需要另一个实用函数：`applyIf`。它将接受一个谓词和一个函数，并且仅当谓词为
    `true` 时才应用该函数。由于我们只处理单一数据类型，我们可以使用 `UnaryOperator` 简写来节省一些输入和类型变量。有了这个实用方法，我们需要获取一个
    `Predicate` 来判断图书是否为精选，以及执行转换的函数。最终的 `UnaryOperator` 完全符合我们的需求：如果 `Predicate`
    测试返回 `true`，我们将执行“在标题后添加一个星号”的函数；如果测试返回 `false`，我们将返回传入的 `Book` 实例。这种方法的代码如清单
    3-5 所示。


    **清单 3-5. 使用 List.replaceAll 为精选图书加星标的 Library 实例方法**


    `/**`


    `* 仅当 {@code test} 对参数返回 {@code true} 时，才对该参数应用映射操作。`


    `*`


    `* @param test 决定是否应用映射的测试；不能为 {@code null}`


    `* @param ifTrue 测试为 true 时应用的映射；不能为 {@code null}`


    `* @return 当 {@code test} 为 true 时应用 {@code ifTrue}`


    `*         否则返回参数本身的运算符。`


    `*/`


    `private static <T> UnaryOperator<T> applyIf(`


    `Predicate<T> test, UnaryOperator<T> ifTrue`


    `) {`


    `Objects.requireNonNull(test, "用于测试的谓词");`


    `Objects.requireNonNull(ifTrue, "条件为真时应用的方法");`


    `return t -> {`


    `if(test.test(t)) {`


    `return ifTrue.apply(t);`


    `} else {`


    `return t;`


    `}`


    `};`


    `}`


    `/**`


    `* 更新图书馆，将每本精选图书替换为标题后加 {@code *} 的图书。`


    `*/`


    `public void starFeatureBooks() {`


    `UnaryOperator<Book> starBook = book ->`


    `new Book(book.getTitle() + "*", book.getAuthor(), book.getGenre());`


    `Predicate<Book> isFeatured = getFeaturedBooks().keySet()::contains;`


    `UnaryOperator<Book> starIfFeatured = applyIf(isFeatured, starBook);`


    `getBooks().replaceAll(starIfFeatured);`


    `}`


    还有一种方法可以对 `Map` 实例执行此类操作，尽管你只能更改值：由于与 `Set` 难以实现 `replaceAll` 相同的原因，无法通过这些操作调用更改键。但该方法仍然非常有用：例如，假设我们想对精选图书的消息执行一个清理方法：我们希望通过提供默认消息并移除末尾句点来清理消息。我们可以通过执行
    `replaceAll` 方法并返回更新后的值来实现这一点，如清单 3-6 所示。此方法体的复杂性不太适合采用函数式解决方案，因此我们直接使用了内联函数定义。

