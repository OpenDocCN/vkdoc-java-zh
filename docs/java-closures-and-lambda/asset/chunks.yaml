- fmt: "假设我们修改了`WordUsage`，使其包含一个“片段编号”。对于十四行诗，这个编号就是十四行诗编号。对于戏剧，这个编号是幕号，序言材料的片段编号为0。实现这一功能的人需要进入`WordUsage`，并更新该类，使其在整个代码中使用片段编号，然后所有测试都会通过，该类看起来也会很棒。我们的Lambda代码可以正常编译和执行，所有测试也都能通过。但生成的数据将是损坏的：对于任何给定的文本，在行偏移量1、单词偏移量1处，看起来会有两个不同的单词。除非有人分析和验证数据，否则无法检测到这种损坏。曾几何时，代码运行得很好。由于代码随时间发生了变化，代码不再正常工作。这就是代码腐化。\n\
    \n我们在这里看到的是面向对象封装原则的优势。事实上，`WordUsage`实例上的getter方法在精神上（即使不是在技术上）违反了封装原则：它们直接暴露了类的实现细节。我们有可能在未来某个时候更改这些实现细节，但任何重大的更改——例如添加一个新字段并重新定义现有字段的含义——都会招致代码腐化。\n\
    \n这里的教训是，Lambda是强大的工具。然而，比Lambda本身更强大的是，Java 8能够将面向对象的最佳实践（如封装）与函数式行为（如映射流元素）结合起来。这就是后函数式语言在正确使用时如此强大的原因：它确实融合了两种范式的最佳之处。\n\
    \n现在我们已经将`WordUsage`实例流转换为制表符分隔值（TSV）字符串流，我们需要将它们打印出来。这很简单：我们将获取一个`PrintWriter`或`PrintStream`实例，然后让流对其每个元素执行`println`方法。在我们的例子中，我们将使用`System.out`作为`PrintStream`实例，并使用`output`作为字符串元素的输出流。在这种情况下，生成的代码如下所示：\n\
    \n`output.forEach(System.out::println);`\n\n这演示了如何使用给定实例的方法作为Lambda：我们实际上是将`System.out`这个特定实例，以及在该特定实例上调用`println`，转换为一个Lambda。这对于一对冒号来说做了很多工作，而这正是Java\
    \ 8的强大之处。有了这些基础，我们可以回到起点：从数据库下载。\n\n## 将`ResultSet`映射到`Stream`\n\n将`ResultSet`实例映射到`Stream`实例的任务并不像我们可能希望的那么简单。如果我们查看`Stream`类，它是一个接口。如果它是一个像`Iterator`类那样小巧且定义良好的接口，我们可以直接实现一个桥接。不幸的是，它是一个庞大的接口，包含一些非常棘手（且模棱两可）的定义，因此我们不会想直接实现它。我们将探讨四种实现从`ResultSet`到`Stream`的桥接的方法：\n\
    \n- 使用`Stream.Builder`预先构建一个流。\n- 使用`Stream.of`和`Stream.flatMap`按需构建流。\n- 实现基于`Spliterators.AbstractSpliterator`的`Stream`。\n\
    - 将`ResultSet`映射到`Iterator`，再映射到`Spliterator`，最后映射到`Stream`。\n\n这四种方法各有优缺点，我们将在考虑它们的实现时看到。所有四种方法的结果都将是一个`WordUsage`实例的`Stream`，并且该流可以立即插入到我们在本章其他部分所做的所有工作中。\n\
    \n在每种情况下，我们都需要将当前`ResultSet`行映射到`WordUsage`实例。这部分实现是相同的，因此我们将其直接添加到`WordUsage`类中，作为一个静态方法，并从那里引用它。这将使代码示例更明显地专注于基础设施。该方法在清单5-4中给出。有了这个方法，我们就可以开始我们的四种实现了。\n\
    \n**清单5-4. 从`ResultSet`映射`WordUsage`的方法**\n\n```\n/**\n * Returns a new instance\
    \ of this class based on the current row of a\n * result set. The results within\
    \ the result set are expected to be\n * as follows:\n * <p>\n * <b>1.</b> The\
    \ string title of the text<br />\n * <b>2.</b> The line offset within the text<br\
    \ />\n * <b>3.</b> The word itself<br />\n * <b>4.</b> The word offset within\
    \ the line<br />\n *\n * @param rs The result set whose current row should be\
    \ read;\n *           never {@code null}.\n * @return A {@link WordUsage} constructed\
    \ from the query results.\n */\npublic static WordUsage fromResultSet(ResultSet\
    \ rs) throws SQLException {\n  Objects.requireNonNull(rs, \"result set to read\
    \ from\");\n  return new WordUsage(\n      rs.getString(1),  // title\n      rs.getInt(2),\
    \     // line offset\n      rs.getString(3),  // word\n      rs.getInt(4)    \
    \  // word offset\n  );\n}\n```\n\n### 方法一：使用`Stream.Builder`构建流\n\n动态构建`Stream`的最简单方法是使用`Stream.Builder`。`Stream.Builder`类遵循标准的“构建器”设计模式。这种设计模式是一个具有两个阶段的对象：累积阶段和构建阶段。对象从累积阶段开始。在此阶段，它接收元素。在某个时刻，会调用一个触发方法，将构建器转换为构建阶段。在构建阶段，构建器是一个工厂，并生成所需类的实例。\n\
    \n在我们的例子中，我们将向`Stream.Builder`提供`WordUsage`实例。我们将通过以熟悉的方式遍历结果集、构造实例并将它们传入来实现这一点。所有这些都发生在调用代码的执行线程中，并且一个完全填充的流被返回给调用者。如果在填充此流时出现任何异常，它将直接传播给调用者。`Stream.Builder`方法的代码在清单5-5中。\n\
    \n**清单5-5. 使用`Stream.Builder`将`ResultSet`转换为`Stream`**\n\n```\npublic static Stream<WordUsage>\
    \ createStream(ResultSet rs)\n  throws SQLException\n{\n  Stream.Builder<WordUsage>\
    \ builder = Stream.builder();\n  while (rs.next()) {\n    WordUsage usage = WordUsage.fromResultSet(rs);\n\
    \    builder.add(usage);\n  }\n  return builder.build();\n}\n```\n\n这种方法的主要优点是它对Java开发人员来说非常熟悉。这是构建集合的标准方式。它的另一个主要优点是，由流构建器构建的流非常灵活，允许并行执行和其他幕后优化。最后，这种方法还使得对`ResultSet`和流的推理变得非常容易：您知道一旦此方法返回，就不会出现数据访问或数据转换错误，并且结果集（及其资源）可以在方法返回时关闭。\n\
    \n这种方法的主要缺点是它非常消耗资源。它会占用执行线程，阻止该线程执行任何其他操作，直到所有结果都被读取完毕。它还会占用内存，因为整个流必须在处理任何部分之前被缓冲到内存中。如果数据集很小，这两个缺点都是次要的，并且随着数据集变大，它们会变得更加严重。对于即使是中等大小的数据集（例如我们的数据集），这也不是一个好的选择。然而，对于较小的数据集，这种方法的简单性可能足以弥补其低效。"
  raw: 'Imagine that we changed WordUsage to have a “segment number.” For the sonnets,
    this would be the sonnet number. For the plays, this would be the act number,
    with preface material having segment number 0\. Someone implementing this would
    go into WordUsage, and he would update that class to use the segment number throughout
    its code, and then all its tests would pass and the class would generally look
    great. Our lambda code would compile and execute just fine, and all our tests
    would pass. But the resulting data would be corrupt: for any given text, it would
    look like there were two different words at line offset 1, word offset 1\. Until
    someone analyzed and validated the data, there would be no way to detect that
    corruption. Once upon a time, the code worked very well. Due to a change in the
    code over time, the code ceased to work properly. That is code rot.


    What we are seeing is the advantage of the object-oriented principle of encapsulation.
    The fact is that the getters on our WordUsage instance are a violation of encapsulation
    in spirit, if not technically: they directly expose implementation details about
    the class. It is possible for us to change those implementation details sometime
    in the future, but doing so in any significant way—such as adding a new field
    and redefining what an existing field means—invites code rot.


    The lesson here is that lambdas are powerful things. Even more powerful than lambdas
    themselves, however, is the ability for Java 8 to leverage object-oriented best
    practices (such as encapsulation) in combination with functional behaviors (such
    as mapping stream elements). This is why postfunctional languages are so incredibly
    powerful when used properly: it really does mix the best of both paradigms.


    Now that we have converted our stream of WordUsage instances into a stream of
    tab-separated value (TSV) strings, we need to print them out. Doing this is simple:
    we will get our hands on a `PrintWriter` or `PrintStream` instance, and then have
    the stream execute in its `println` method for each element. In our case, we will
    use `System.out` for our `PrintStream` instance, and `output` as the output stream
    of String elements. In that case, the resulting code looks like this:


    `output.forEach(System.out::println);`


    This demonstrates the use of a given instance’s method as a lambda: we are literally
    taking the particular instance of `System.out`, and the invocation of `println`
    on that particular instance, and converting that into a lambda. That’s a lot of
    lifting for a couple of colons, and that’s the power of Java 8\. With all of this
    established, we can return to the start: downloading from the database.


    ## Mapping the ResultSet to a Stream


    The task of mapping the `ResultSet` instance to a `Stream` instance is not as
    trivial as we may perhaps like. If we take a look at the Stream class, it is an
    interface. If it were a small, well-defined interface such as the Iterator class,
    we could just implement a direct bridge. Unfortunately, it’s a huge interface
    with some very tricky (and ambiguous) definitions, so it is not something we are
    going to want to implement directly. We will take a look at four ways of implementing
    our bridge from ResultSet to Stream:


    Using `Stream.Builder` to construct a stream up front.   Using `Stream.of` and
    `Stream.flatMap` to construct the stream on demand.   Implementing the `Stream`
    built on `Spliterators.AbstractSpliterator`.   Mapping the `ResultSet` into an
    `Iterator` and then into a `Spliterator` and then into a `Stream`.  


    Each of these four approaches has advantages and disadvantages, which we will
    see when we consider their implementations. The result of all four approaches
    will be a Stream of WordUsage instances, and that stream can get plugged immediately
    into all the work that we have done in the other sections of this chapter.


    In each of these cases, we will have the specific mapping from the current ResultSet
    row to the WordUsage instance. This part of the implementation is the same throughout,
    so we will add it directly onto our WordUsage class as a static method and reference
    it from there. This will allow the code samples to stay more obviously focused
    on the infrastructure. This method is given in Listing 5-4\. With the method in
    place, we can start into our four implementations.


    Listing 5-4\. The WordUsage-from-ResultSet Mapping Method


    `/**`


    `* Returns a new instance of this class based on the current row of a`


    `* result set. The results within the result set are expected to be`


    `* as follows:`


    `* <p>`


    `* <b>1.</b> The string title of the text<br />`


    `* <b>2.</b> The line offset within the text<br />`


    `* <b>3.</b> The word itself<br />`


    `* <b>4.</b> The word offset within the line<br />`


    `*`


    `* @param rs The result set whose current row should be read;`


    `*           never {@code null}.`


    `* @return A {@link WordUsage} constructed from the query results.`


    `*/`


    `public static WordUsage fromResultSet(ResultSet rs) throws SQLException {`


      `Objects.requireNonNull(rs, "result set to read from");`


      `return new WordUsage(`


          `rs.getString(1),  // title`


          `rs.getInt(2),     // line offset`


          `rs.getString(3),  // word`


          `rs.getInt(4)      // word offset`


      `);`


    `}`


    ### Method One: Building a Stream Using the Stream Builder


    The simplest way to dynamically build a Stream is using `Stream.Builder`. The
    Stream.Builder class follows the standard “builder” design pattern. This design
    pattern is an object with two phases: an accumulation phase and a build phase.
    The object starts in the accumulation phase. During this phase, it takes in elements.
    At some point, a trigger method is called that converts the builder into the build
    phase. In the build phase, the builder is a factory, and produces instances of
    the desired class.


    In our case, we will provide WordUsage instances into the Stream.Builder. We will
    do this by iterating through the result set in the familiar way, constructing
    the instances, and passing them in. All of this happens in the calling code’s
    thread of execution, and a fully populated stream is returned to the caller. If
    there is any exception in populating this stream, it is propagated directly to
    the caller. The code for the Stream.Builder approach is in Listing 5-5.


    Listing 5-5\. Using a Stream Builder to Convert a ResultSet to a Stream


    `public static Stream<WordUsage> createStream(ResultSet rs)`


      `throws SQLException`


    `{`


      `Stream.Builder<WordUsage> builder = Stream.builder();`


      `while (rs.next()) {`


        `WordUsage usage = WordUsage.fromResultSet(rs);`


        `builder.add(usage);`


      `}`


      `return builder.build();`


    `}`


    The primary advantage of this approach is that it is very familiar to Java developers.
    This is your standard way of building up a collection. Its next major advantage
    is that the stream built by the stream builder is extremely flexible, allowing
    parallel execution and other behind-the-scenes optimizations. Finally, this approach
    also makes reasoning about the ResultSet and the stream very easy: you know that
    there will not be a data access or data conversion error once this method returns,
    and the result set (and its resources) can be closed with the method returns.


    The primary disadvantage of this approach is that it is a resource hog. It hogs
    the thread of execution, preventing anything else from being done by that thread
    until all the results are read. It also hogs memory, because the entire stream
    has to be buffered into memory before any of it can be processed. Both of these
    disadvantages are minor if the data set is small, and they get more serious as
    the data set becomes larger. With even a moderately large data set (such as ours),
    this is not a good fit. With a smaller data set, however, the simplicity of the
    approach might well outweigh its inefficiencies.'
  trans: '

    假设我们将 WordUsage 改为包含一个“段落编号”。对于十四行诗，这将是十四行诗编号。对于戏剧，这将是幕号，序言材料的段落编号为 0。实现这一功能的人会进入
    WordUsage，并更新该类，使其在整个代码中使用段落编号，然后所有测试都会通过，该类看起来也一切正常。我们的 lambda 代码也能正常编译和执行，所有测试都会通过。但最终的数据会被破坏：对于任何给定的文本，在行偏移量
    1、单词偏移量 1 处，看起来会有两个不同的单词。除非有人分析和验证数据，否则根本无法检测到这种破坏。曾几何时，代码运行得很好。但由于代码随时间发生了变化，代码不再正常工作。这就是代码腐化。


    我们在这里看到的是面向对象封装原则的优势。事实上，我们 WordUsage 实例上的 getter 方法在精神上（即使技术上并非如此）违反了封装原则：它们直接暴露了类的实现细节。我们有可能在未来的某个时候更改这些实现细节，但任何重大的更改——例如添加一个新字段并重新定义现有字段的含义——都会招致代码腐化。


    这里的教训是，lambda 表达式是强大的工具。然而，比 lambda 表达式本身更强大的是 Java 8 将面向对象最佳实践（如封装）与函数式行为（如映射流元素）相结合的能力。这就是后函数式语言在正确使用时如此强大的原因：它确实融合了两种范式的最佳之处。


    现在我们已经将 WordUsage 实例的流转换为制表符分隔值（TSV）字符串的流，我们需要将它们打印出来。这很简单：我们将获取一个 `PrintWriter`
    或 `PrintStream` 实例，然后让流对每个元素执行其 `println` 方法。在我们的例子中，我们将使用 `System.out` 作为我们的
    `PrintStream` 实例，并使用 `output` 作为字符串元素的输出流。在这种情况下，生成的代码如下所示：


    `output.forEach(System.out::println);`


    这演示了如何使用给定实例的方法作为 lambda 表达式：我们实际上是将 `System.out` 这个特定实例，以及在该特定实例上调用 `println`
    的操作，转换成了一个 lambda 表达式。这对于一对冒号来说，承担了相当多的功能，而这正是 Java 8 的强大之处。有了这些基础，我们可以回到起点：从数据库下载。


    ## 将 ResultSet 映射到 Stream


    将 `ResultSet` 实例映射到 `Stream` 实例的任务并不像我们可能希望的那么简单。如果我们看一下 Stream 类，它是一个接口。如果它是一个像
    Iterator 类那样小巧且定义明确的接口，我们可以直接实现一个桥接。不幸的是，它是一个庞大的接口，包含一些非常棘手（且模棱两可）的定义，因此我们不会想直接实现它。我们将探讨四种将
    ResultSet 桥接到 Stream 的实现方法：


    *   使用 `Stream.Builder` 预先构建一个流。

    *   使用 `Stream.of` 和 `Stream.flatMap` 按需构建流。

    *   实现基于 `Spliterators.AbstractSpliterator` 的 `Stream`。

    *   将 `ResultSet` 映射到 `Iterator`，再映射到 `Spliterator`，最后映射到 `Stream`。


    这四种方法各有优缺点，我们将在考虑其实现时看到。所有四种方法的结果都将是一个 WordUsage 实例的 Stream，并且该流可以立即接入我们在本章其他部分完成的所有工作。


    在每种情况下，我们都需要将当前 ResultSet 行映射到 WordUsage 实例。这部分实现在所有方法中都是相同的，因此我们将其作为静态方法直接添加到
    WordUsage 类中，并从那里引用它。这将使代码示例更明显地专注于基础设施。该方法如清单 5-4 所示。有了这个方法，我们就可以开始我们的四种实现了。


    **清单 5-4. 从 ResultSet 映射 WordUsage 的方法**


    `/**`


    `* 基于结果集的当前行返回此类的一个新实例。`


    `* 结果集中的结果预期如下：`


    `* <p>`


    `* <b>1.</b> 文本的字符串标题<br />`


    `* <b>2.</b> 文本内的行偏移量<br />`


    `* <b>3.</b> 单词本身<br />`


    `* <b>4.</b> 行内的单词偏移量<br />`


    `*`


    `* @param rs 应读取其当前行的结果集；`


    `*           绝不为 {@code null}。`


    `* @return 从查询结果构造的 {@link WordUsage}。`


    `*/`


    `public static WordUsage fromResultSet(ResultSet rs) throws SQLException {`


      `Objects.requireNonNull(rs, "要读取的结果集");`


      `return new WordUsage(`


          `rs.getString(1),  // 标题`


          `rs.getInt(2),     // 行偏移量`


          `rs.getString(3),  // 单词`


          `rs.getInt(4)      // 单词偏移量`


      `);`


    `}`


    ### 方法一：使用 Stream Builder 构建流


    动态构建 Stream 的最简单方法是使用 `Stream.Builder`。Stream.Builder 类遵循标准的“构建器”设计模式。这种设计模式是一个具有两个阶段的对象：累积阶段和构建阶段。对象从累积阶段开始。在此阶段，它接收元素。在某个时刻，会调用一个触发方法，将构建器转换为构建阶段。在构建阶段，构建器充当工厂，生成所需类的实例。


    在我们的例子中，我们将向 Stream.Builder 提供 WordUsage 实例。我们将通过以熟悉的方式遍历结果集、构造实例并将它们传入来实现。所有这些都发生在调用代码的执行线程中，并且一个完全填充的流被返回给调用者。如果在填充此流时出现任何异常，它将直接传播给调用者。Stream.Builder
    方法的代码如清单 5-5 所示。


    **清单 5-5. 使用 Stream Builder 将 ResultSet 转换为 Stream**


    `public static Stream<WordUsage> createStream(ResultSet rs)`


      `throws SQLException`


    `{`


      `Stream.Builder<WordUsage> builder = Stream.builder();`


      `while (rs.next()) {`


        `WordUsage usage = WordUsage.fromResultSet(rs);`


        `builder.add(usage);`


      `}`


      `return builder.build();`


    `}`


    这种方法的主要优点是 Java 开发人员非常熟悉。这是构建集合的标准方式。它的另一个主要优点是，由流构建器构建的流非常灵活，允许并行执行和其他后台优化。最后，这种方法还使得对
    ResultSet 和流进行推理变得非常容易：你知道一旦此方法返回，就不会出现数据访问或数据转换错误，并且结果集（及其资源）可以在方法返回时关闭。


    这种方法的主要缺点是它非常消耗资源。它会占用执行线程，在该线程读取完所有结果之前，阻止该线程执行任何其他操作。它还会占用内存，因为整个流必须先缓冲到内存中，然后才能处理其中的任何部分。如果数据集很小，这两个缺点都不明显，但随着数据集变大，它们会变得更加严重。对于即使是中等大小的数据集（例如我们的数据集），这也不是一个好的选择。然而，对于较小的数据集，这种方法的简单性很可能胜过其低效性。

