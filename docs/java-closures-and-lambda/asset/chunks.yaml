    If the key is not already assigned, it uses the value; if the key is assigned,
    it passes the argument value and the current value in the map into the remapping
    function and assigns that to the key. After all that, the method returns the new
    value mapped to the given key. As arcane as it may seem, this strange dance is
    exactly what you want for tracking counts in the map: you pass in the key, and
