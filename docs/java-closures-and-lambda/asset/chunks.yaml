    \ Technical Reviewer\n\n![A978-1-4302-5999-2_BookFrontmatter_Fig2_HTML.jpg](A978-1-4302-5999-2_BookFrontmatter_Fig2_HTML.jpg)\
    \ John Zukowski is currently a software engineer with TripAdivsor, the world's\
    \ largest travel site ([`www.tripadvisor.com`](http://www.tripadvisor.com/)).\
    \ He has been playing with Java technologies for twenty years now and is the author\
    \ of ten Java-related books. His books cover Java 6, Java Swing, Java Collections,\
    \ and JBuilder from Apress, Java AWT from O'Reilly, and introductory Java from\
    \ Sybex. He lives outside Boston, Massachusetts, and has a master's degree in\
    \ software engineering from The Johns Hopkins University. You can follow him on\
    \ Twitter at [`http://twitter.com/javajohnz`](http://twitter.com/javajohnz).\n\
    \n## Introduction\n\nThis book is the culmination of many brash years and hard\
    \ lessons. The story starts all the way back when I migrated from C++ into perl.\
    \ The perl programming language was amazingly powerful compared to the low-level\
    \ manipulations and bookkeeping of C++. (The fact that it was “slow” never bothered\
    \ me – I would rather write powerful, effective slow code than weak, buggy fast\
    \ code.) In the world of perl, there was the idea of an “anonymous subroutine”\
    \ that could be passed around and manipulated. You could also directly manipulate\
    \ the symbol table. The symbol table is the collection of function names available\
    \ to the program. Between these two things, I realized that I could code at a\
    \ higher level: I could write subroutines that returned subroutines and store\
    \ those into the symbol table, effectively having my code write code at runtime.\
    \ In perl, these subroutine factories are called “template functions.” I proceeded\
    \ to write some truly unreadable – but truly powerful – perl.\n\nI shared this\
    \ revelation with my friend and mentor, Brian Hurt. He was the grizzled veteran\
    \ developer who seemed to have seen it all. Brian told me that what I was doing\
    \ was this thing called “functional programming,” and encouraged me to look into\
    \ proper functional languages, specifically OCaml, and its derivative, JoCaml.\
    \ I was immediately hooked. By 2008, I presented “Why Rubyists Should Learn OCaml”\
    \ to the Ruby Users Group of Minnesota (Ruby.MN).[¹](#A978-1-4302-5999-2_BookFrontmatter.html#Fn1)\
    \ There was a power in functional programming that was truly incredible compared\
    \ to the then-standard way of writing code. Moreover, my mathematical background\
    \ played very nicely with functional programming: the fact that state did not\
    \ change meant that I could employ the same kind of reasoning to my programs that\
    \ I employed with mathematical equations. I presumed at the time that a functional\
    \ programming language would rise and fundamentally transform what it means to\
    \ program, much as Java ascended and made Object Oriented Programming ubiquitous.\
    \ So far, this hasn’t happened.\n\nThe next chapter came with the rise of the\
    \ Groovy programming language. Groovy’s MetaClass functionality provided a way\
    \ for me to perform the same tricks as in perl, but in a way that leveraged all\
    \ that existing Java code. This was having my cake and eating it, too. All that\
    \ open source software that existed for Java, and all that technical expertise\
    \ that had been built up on the JVM could finally mix with these “functional stunts.”\
    \ It wasn’t functional programming – and I got in quite a bit of trouble on the\
    \ Internet for saying as much – but it was certainly borrowing some powerful tricks\
    \ from functional programming. We get into what was happening in chapter 1."
