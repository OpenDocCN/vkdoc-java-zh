- fmt: "### Method Three: Building a Stream Using an `AbstractSpliterator`\n\nIn both\
    \ of the previous cases, we built out the stream of results in memory, and then\
    \ returned the entire stream. This meant that we had to wait for all of the I/O\
    \ to resolve before doing any processing, and we had to store all the results\
    \ in memory at the same time. If you have enough data to warrant an external database,\
    \ then those are probably not acceptable qualities in a solution. This solution,\
    \ as well as the next, both offer an alternative approach. These solutions will\
    \ integrate the iteration of the result set into the stream processing itself,\
    \ meaning that the results can be processed piecemeal.\n\nThis solution will follow\
    \ the more traditional Java approach: if you want to implement an interface, find\
    \ the abstract class which implements the interface, and build your implementation\
    \ by extending that abstract class. However, there is no `AbstractStream` to inherit\
    \ from. Instead, we have to go a bit deeper. This is where we meet the `Spliterator`.\n\
    \nJava 8 introduces a new type called `Spliterator`. A spliterator is like an\
    \ iterator, in that its job is to produce a sequence of elements. Just like an\
    \ iterator, the sequence of elements could be finite or infinite, but it’s usually\
    \ finite. The big difference between an iterator and a spliterator is that the\
    \ spliterator has the ability to “split.” The concept of splitting a spliterator\
    \ is that you break one spliterator into two, with some portion of the elements\
    \ returned by the original spliterator and some portion of the elements returned\
    \ by a new spliterator.\n\nAssume that you had a spliterator of English letters,\
    \ “A” to “Z.” You could draw “A,” “B,” and “C” from your spliterator, and then\
    \ split it. At this point, the spliterator might start to provide only the remaining\
    \ consonants (“d,” “f,” “g,” “h,” “j”…) and return a new spliterator for the remaining\
    \ vowels (“e,” “i,” “u”…). These two spliterators would then be entirely independent,\
    \ and could be executed in any order without any interdependency. The rule is\
    \ just that no element should be lost in the split, and no element should be duplicated\
    \ by the split spliterators.\n\nIn Java 8, spliterators provide the elements that\
    \ will become the stream elements. All the various stream operations are really\
    \ operations on spliterators and the elements that come out of them. You generate\
    \ a stream from a spliterator by passing in the spliterator instance into the\
    \ `StreamSupport.stream(Spliterator, boolean)` method. The second argument specifies\
    \ whether the resulting stream is “parallel” or “sequential”: a parallel stream\
    \ is allowed to operate on elements in any order and operate on multiple elements\
    \ at the same time; a sequential stream will always execute within the caller’s\
    \ thread, and will conclude processing an earlier element before processing the\
    \ next. If a previous element might alter the interpretation of a later element,\
    \ then you have to create a sequential stream. If the elements are capable of\
    \ being processed distinctly, then you should create a parallel stream. By default,\
    \ streams in Java are sequential, because that is the safe answer. If it is at\
    \ all possible, however, you should use parallel streams by calling `stream.parallel()`\
    \ and using the returned stream. A concrete example of these different modes is\
    \ given in Listing 5-8.\n\n**Listing 5-8.** Results of Running a Stream in Parallel\
    \ vs. in Sequence\n\n```\nimport java.util.stream.*;\n\npublic class Listing8\
    \ {\n\n    public static void main(String[] args) throws Exception {\n\n     \
    \   IntStream stream;\n\n        // Sequential stream—commonly default mode\n\
    \        stream = IntStream.range(1, Integer.MAX_VALUE);\n        stream.sequential().mapToObj(i\
    \ -> {\n            System.out.println(\"Mapping \" + i + \" to string\");\n \
    \           return Integer.toString(i);\n        }\n        ).forEach(System.out::println);\n\
    \n        /* Example output sampling\n        Mapping 34438924 to string\n   \
    \     34438924\n        Mapping 34438925 to string\n        34438925\n       \
    \ Mapping 34438926 to string\n        34438926\n        Mapping 34438927 to string\n\
    \        34438927\n        Mapping 34438928 to string\n        */\n    }\n}\n\
    ```"
  raw: '### Method Three: Building a Stream Using an AbstractSpliterator


    In both of the previous cases, we built out the stream of results in memory, and
    then returned the entire stream. This meant that we had to wait for all of the
    I/O to resolve before doing any processing, and we had to store all the results
    in memory at the same time. If you have enough data to warrant an external database,
    then those are probably not acceptable qualities in a solution. This solution,
    as well as the next, both offer an alternative approach. These solutions will
    integrate the iteration of the result set into the stream processing itself, meaning
    that the results can be processed piecemeal.


    This solution will follow the more traditional Java approach: if you want to implement
    an interface, find the abstract class which implements the interface, and build
    your implementation by extending that abstract class. However, there is no AbstractStream
    to inherit from. Instead, we have to go a bit deeper. This is where we meet the
    Spliterator.


    Java 8 introduces a new type called Spliterator. A spliterator is like an iterator,
    in that its job is to produce a sequence of elements. Just like an iterator, the
    sequence of elements could be finite or infinite, but it’s usually finite. The
    big difference between an iterator and a spliterator is that the spliterator has
    the ability to “split.” The concept of splitting a spliterator is that you break
    one spliterator into two, with some portion of the elements returned by the original
    spliterator and some portion of the elements returned by a new spliterator.


    Assume that you had a spliterator of English letters, “A” to “Z.” You could draw
    “A,” “B,” and “C” from your spliterator, and then split it. At this point, the
    spliterator might start to provide only the remaining consonants (“d,” “f,” “g,”
    “h,” “j”…) and return a new spliterator for the remaining vowels (“e,” “i,” “u”…).
    These two spliterators would then be entirely independent, and could be executed
    in any order without any interdependency. The rule is just that no element should
    be lost in the split, and no element should be duplicated by the split spliterators.


    In Java 8, spliterators provide the elements that will become the stream elements.
    All the various stream operations are really operations on spliterators and the
    elements that come out of them. You generate a stream from a spliterator by passing
    in the spliterator instance into the `StreamSupport.stream(Spliterator, boolean)`
    method. The second argument specifies whether the resulting stream is “parallel”
    or “sequential”: a parallel stream is allowed to operate on elements in any order
    and operate on multiple elements at the same time; a sequential stream will always
    execute within the caller’s thread, and will conclude processing an earlier element
    before processing the next. If a previous element might alter the interpretation
    of a later element, then you have to create a sequential stream. If the elements
    are capable of being processed distinctly, then you should create a parallel stream.
