    ### Lambda 表达式与 ThreadPoolExecutor


    以上内容让你对 lambda 如何让执行器（executor）的使用变得如此便捷有了基本了解。然而，有一个特定场景，内联定义接口实现的能力极其有用，那就是与
    `ThreadPoolExecutor` 配合使用时。


    `ThreadPoolExecutor` 是 `ExecutorService` 类的一个高度可定制的实现。许多程序员（包括本书作者）都非常喜欢调整各种参数，而这个类提供了大量可供调节的“旋钮”。其中一些旋钮是数值，但该类也提供了许多回调方法。每个回调都是一个接口，这意味着突然之间，有很多地方
    lambda 表达式能让你的工作轻松许多。然而，好事过头也可能变成坏事。这很好地展示了 lambda 表达式在提升代码清晰度方面的局限性。


    问题在于 `ThreadPoolExecutor` 拥有这样一个构造函数：


    `public ThreadPoolExecutor( int corePoolSize,`


