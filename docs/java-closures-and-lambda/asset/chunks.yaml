  raw: '## Reading All the Lines of Files in a Directory


    Now that we have exercised our real-world lambda skills, it is time to take on
    something more involved. For our next goal, we will print out all the lines of
    the files in a directory. This will give us a chance to decompose a more complex
    problem, and to see how to combine streams. By the time we are done with this
    exercise, you should have a good sense for how streams can be manipulated, both
    while working with I/O and more generally.


    When programming in a functional style, it really pays to first stop and think
    about what you really want to accomplish. First, let’s consider the shape of the
    function that we want. We know that we want to act on a `java.io.File` instance,
    so we should either take that a file as input or make it as a method of something
    that extends the `File` class. The output side is trickier. We do not know what
    a user is going to do with the lines of the file. We could take a `Consumer` to
    process them, but it’s both simpler and more flexible to return the lines. We
    could read all the lines into some kind of `Collection`, but that requires all
    the lines to be read into memory, and it prevents any processing from occurring
    until the lines are done being read. So it is best to return a `Stream`, which
    provides flexibility and support for concurrent processing. But a stream of what?


    The return value may not be as obvious at it initially seems. A `Stream` of `String`
    instances seems like the obvious choice, but that is only kind of right. At any
    point in time, we could have an `IOException` thrown, and when you are dealing
    with things like navigating directories, you should absolutely expect them. Our
    pattern so far in this chapter has been to create two methods: one that accepts
    a `Consumer` to process the errors, and one that returns `Result` objects. Although
    duplication of the API is made simple through functional programming, it is certainly
    annoying and it clutters the class. Let’s try for a different approach.


    The new approach to processing the class will still use the `Result` class for
    elements in the `Stream`, but we will give our users a new tool. We will provide
    a class that is constructed with a `Consumer`, and which processes a Stream of
    Result instances to remove the exceptional cases. This gives the user the ability
    to specify how to handle exceptions after the fact, and convert the `Stream` of
    `Result`s of `String`s into the much more familiar `Stream` of `String`s. So now
    we have two things to write: the method that will take a `File` and produce a
    `Stream` of `Result`s of `String`s, and a post-processor class that will turn
    a `Stream` of `Result`s of `String`s into a `Stream` of `String`s. Now it is time
    to start thinking about implementations, starting with the post-processor.


    ### Complex Stream Processing Using Creative Flattening


    This is where we will really get into a fancy `Stream` stunt, and the real power
    of a `Stream` will come out. The difficulty is that we have a fairly complex operation
    on a stream. We want to handle and then remove elements from the stream meeting
    a certain criteria: in this case, we want to handle and remove `Result` instances
    that contain exceptions.


    If you glance over the `Stream` API, it first seems like we want to perform a
    `map` operation: we want to take in types of `Result<String>` and return a `String`,
    and the `map` method is how you transform the type if the `Stream`. The `map`
    method looks like this:


    `<R> Stream<R> map(Function<? super T,? extends R> mapper)`


    The problem is that we do not have a one-to-one mapping: not every input will
    produce an output. We could return an `Option`, but what does that gain us? Why
    wouldn’t we just stick with our `Result` type instead? If we get fixated with
    the `map` method, we could then create a two-part system, first performing the
    `map` and then performing the `filter` to remove elements. If we were to go down
    that point, we would not be leveraging the type system to tell us that the `Result`
    has been handled, and we would be creating a possibility for an error to creep
    in between when the `Result` is handled and where it is removed. A better alternative
    is to use `flatMap`.


    The `flatMap` method is based on the concept of “flattening,” which is a functional
    structure that takes in a container of containers, and produces a single “flat”
    container with all the elements of all the containers. Consider that you had a
    list that looked like this:


    `List<List<String>> list = Arrays.asList(`


    `Arrays.asList("Eddard Stark", "Catelyn Tully", "Benjen Stark"),`


    `Arrays.asList("Lysa Telly", "Jon Arryn", "Robin Arryn"),`


    `Arrays.asList("Cersei Lannister", "Robert Baratheon")`


    `);`


    Then the flattened list contains all the elements of those inner lists, but without
    the inner list structure. It would look like this:


    `List<String> flatList = Arrays.asList(`


    `"Eddard Stark", "Catelyn Tully", "Benjen Stark",`


    `"Lysa Telly", "Jon Arryn", "Robin Arryn",`


    `"Cersei Lannister", "Robert Baratheon"`


    `);`


    The `flatMap` method allows you to perform a corresponding operation on a `Stream`.
    This is the API:


    `<R> Stream<R> flatMap(Function<? super` `T` `,? extends Stream<? extends R>>
    mapper)`


    You can pass in a function that takes an element of the stream and returns a new
    `Stream` of any type. All those returned streams are concatenated together and
    processed. This is how we will concatenate the results together for the files
    that we read, which is what the API is really designed for. However, it can also
    be used when you have an optional return value from a mapping operation. To do
    this, we will return `Stream.empty()` when there is no result, and `Stream.of(element)`
    when we have a result. Here is the resulting class:


    Listing 4-7\. Result Mapping Function


    `import java.util.*;`


    `import java.util.function.*;`


    `import java.util.stream.*;`


    `/**`


    `* A class intended to be passed to`


    `* {@link Stream#flatMap(java.util.function.Function)} to process`


    `* {@link Result} instances. The class is constructed with an exception handler`


    `* that will be passed any exceptions, and the {@link #apply(Result)} method`


    `* will return a stream containing the result (if any). The stream has 0`


    `* elements if the {@link Result} instance had no result, and has 1 element if`


    `* the instance had a result.`


    `*/`


    `public class ResultMap<RESULT_T>`


    `implements Function<Result<RESULT_T>, Stream<RESULT_T>>`


    `{`


    `private final Consumer<Exception> exceptionHandler;`


    `/**`


    `* Constructs an instance that will delegate to the given exception handler.`


    `*`


    `* @param exceptionHandler The handler for exceptions in the stream; never`


    `*                         {@code null}`


    `*/`


    `public ResultMap(final Consumer<Exception> exceptionHandler) {`


    `Objects.requireNonNull(exceptionHandler, "exception handler");`'
  trans: '

    ## 读取目录中所有文件的行


    在实践了现实世界中的 lambda 技能之后，是时候处理更复杂的问题了。我们的下一个目标是打印出目录中所有文件的所有行。这将让我们有机会分解一个更复杂的问题，并了解如何组合流。完成这个练习后，你应该能很好地理解如何操作流，无论是在处理
    I/O 时还是在更通用的场景中。


    当使用函数式风格编程时，首先停下来思考你真正想要完成什么是非常有益的。首先，让我们考虑一下我们想要实现的函数的形态。我们知道我们要操作一个 `java.io.File`
    实例，因此我们应该要么将该文件作为输入，要么将其作为扩展 `File` 类的某个方法。输出方面则更棘手。我们不知道用户将如何处理文件中的行。我们可以使用一个
    `Consumer` 来处理它们，但返回这些行既更简单也更灵活。我们可以将所有行读入某种 `Collection`，但这需要将所有行读入内存，并且在读取完所有行之前无法进行任何处理。因此，最好返回一个
    `Stream`，它提供了灵活性和对并发处理的支持。但是，流的元素类型是什么呢？


    返回值可能并不像最初看起来那么明显。`String` 实例的 `Stream` 似乎是显而易见的选择，但这只是部分正确。在任何时候，都可能抛出 `IOException`，当处理诸如导航目录之类的事情时，你绝对应该预料到这一点。到目前为止，本章的模式是创建两个方法：一个接受
    `Consumer` 来处理错误，另一个返回 `Result` 对象。虽然通过函数式编程可以轻松实现 API 的重复，但这无疑很烦人，并且会使类变得杂乱。让我们尝试一种不同的方法。


    处理类的新方法仍然会在 `Stream` 中使用 `Result` 类作为元素，但我们会给用户提供一个新工具。我们将提供一个类，该类通过 `Consumer`
    构造，并处理 `Result` 实例的流以移除异常情况。这使用户能够在事后指定如何处理异常，并将 `Result<String>` 的 `Stream` 转换为更熟悉的
    `String` 的 `Stream`。所以现在我们有两件事要写：一个方法，它接受一个 `File` 并生成一个 `Result<String>` 的 `Stream`；以及一个后处理器类，它将
    `Result<String>` 的 `Stream` 转换为 `String` 的 `Stream`。现在是时候开始考虑实现了，先从后处理器开始。


    ### 使用创造性展平进行复杂流处理


    这就是我们真正要展示 `Stream` 技巧的地方，`Stream` 的真正威力将显现出来。难点在于我们要对流执行一个相当复杂的操作。我们想要处理然后移除流中满足特定条件的元素：在这种情况下，我们想要处理并移除包含异常的
    `Result` 实例。


    如果你快速浏览一下 `Stream` API，最初看起来我们想要执行一个 `map` 操作：我们想要接收 `Result<String>` 类型并返回一个
    `String`，而 `map` 方法正是你在 `Stream` 中转换类型的方式。`map` 方法看起来像这样：


    `<R> Stream<R> map(Function<? super T,? extends R> mapper)`


    问题在于我们并非是一对一的映射：并非每个输入都会产生一个输出。我们可以返回一个 `Option`，但这能给我们带来什么好处呢？为什么不直接使用我们的 `Result`
    类型呢？如果我们执着于 `map` 方法，我们可以创建一个两部分系统，先执行 `map`，然后执行 `filter` 来移除元素。如果我们走那条路，我们就无法利用类型系统来告诉我们
    `Result` 已经被处理了，并且我们会在 `Result` 被处理和它被移除之间制造一个错误潜入的可能性。一个更好的替代方案是使用 `flatMap`。


    `flatMap` 方法基于“展平”的概念，这是一种函数式结构，它接收一个包含容器的容器，并生成一个包含所有容器中所有元素的单一“扁平”容器。假设你有一个像这样的列表：


    `List<List<String>> list = Arrays.asList(`


    `Arrays.asList("Eddard Stark", "Catelyn Tully", "Benjen Stark"),`


    `Arrays.asList("Lysa Telly", "Jon Arryn", "Robin Arryn"),`


    `Arrays.asList("Cersei Lannister", "Robert Baratheon")`


    `);`


    那么展平后的列表包含所有这些内部列表的所有元素，但没有内部列表结构。它看起来像这样：


    `List<String> flatList = Arrays.asList(`


    `"Eddard Stark", "Catelyn Tully", "Benjen Stark",`


    `"Lysa Telly", "Jon Arryn", "Robin Arryn",`


    `"Cersei Lannister", "Robert Baratheon"`


    `);`


    `flatMap` 方法允许你在 `Stream` 上执行相应的操作。这是它的 API：


    `<R> Stream<R> flatMap(Function<? super` `T` `,? extends Stream<? extends R>>
    mapper)`


    你可以传入一个函数，该函数接受流的一个元素并返回一个任意类型的新 `Stream`。所有这些返回的流被连接在一起并处理。这就是我们将如何把我们读取的文件的各个结果连接在一起的方式，这也是该
    API 的真正设计目的。然而，当映射操作有可选返回值时，它也可以被使用。为此，当没有结果时，我们将返回 `Stream.empty()`，当有结果时，返回
    `Stream.of(element)`。以下是最终的类：


    清单 4-7\. 结果映射函数


    `import java.util.*;`


    `import java.util.function.*;`


    `import java.util.stream.*;`


    `/**`


    `* 一个旨在传递给`


    `* {@link Stream#flatMap(java.util.function.Function)} 以处理`


    `* {@link Result} 实例的类。该类通过一个异常处理器构造，`


    `* 该处理器将接收任何异常，并且 {@link #apply(Result)} 方法`


    `* 将返回一个包含结果（如果有）的流。如果 {@link Result} 实例`


    `* 没有结果，则流包含 0 个元素；如果实例有结果，则包含 1 个元素。`


    `*/`


    `public class ResultMap<RESULT_T>`


    `implements Function<Result<RESULT_T>, Stream<RESULT_T>>`


    `{`


    `private final Consumer<Exception> exceptionHandler;`


    `/**`


    `* 构造一个将委托给给定异常处理器的实例。`


    `*`


    `* @param exceptionHandler 流中异常的处理程序；绝不能`


    `*                         是 {@code null}`


    `*/`


    `public ResultMap(final Consumer<Exception> exceptionHandler) {`


    `Objects.requireNonNull(exceptionHandler, "exception handler");`

