  raw: '### Use Types and the Compiler to Your Advantage


    The major advantage that languages such as Scala and Java have over all other
    postfunctional languages is their type system. The type system will catch many
    of your errors. In our “Don’t Release Zalgo” example, for instance, we could have
    returned a `Future` type instead of delegating to the callback. That type would
    denote that we execute asynchronously and would have given us pause when we went
    to execute synchronously. Similarly, if you drive `null` out of your codebase,
    the `Optional` type denotes when a value may or may not exist, ensuring that you
    handle the “may not exist” case more explicitly. It is easier for us to build
    up simple types from complex ones when the compiler tells us if our types mismatch:
    it is easy to get lost in a chain of `andThen` instances without compiler assistance.


    There are other ways in which the compiler can help you out. For instance, if
    you declare a variable `final`, the compiler will ensure that you have it assigned
    before you use it. This is useful for ensuring that a variable is assigned once
    (and only once) when you enter into an `if/else` block. Here is an example of
    that code:


    `final Function<String,Integer> converter;`


    `if(str == null || str.isEmpty()) {`


    `converter = s -> 0;`


    `} else if(str.matches("\\d+")) {`


    `converter = Integer::parseInt;`


    `} else {`


    `Function<String,String> eliminateNondigits = s -> {`


    `return s.replaceAll("[^\\d]", "");`


    `};`


    `Function<String,String> defaultString = s -> {`


    `if(s.isEmpty()) {`


    `return "0";`


    `} else {`


    `return s;`


    `}`


    `};`


    `converter = eliminateNondigits`


    `.andThen(defaultString);`


    `.andThen(Integer::parseInt);`


    `}`


    In that example, the compiler ensures us that `converter` is set before we leave
    the `if/else` chain. No matter how many cases we have, and no matter how complex
    the code may get in each case, we know that each and every case will set a `converter`.


    The type system is a powerful tool in the hands of a functional programmer because
    it allows you to enforce the constraints of the system and reason about how they
    are applied. Use the type system to the best advantage that you can, and avoid
    circumventing it.


