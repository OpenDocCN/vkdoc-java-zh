- fmt: "# 5. Data Access with Lambdas\n\nIn the last chapter, we saw how lambdas enable\
    \ us to work with files and streams. In this chapter, we will look at interacting\
    \ with the database. Way back in [chapter 1](#A978-1-4302-5999-2_1_Chapter.html),\
    \ we saw how lambdas can help Spring’s `JDBCTemplate` by making it easy to implement\
    \ its callback interfaces. In [chapter 3](#A978-1-4302-5999-2_3_Chapter.html),\
    \ we were introduced to streams, and in [chapter 4](#A978-1-4302-5999-2_4_Chapter.html),\
    \ we saw how streams can make it easier to work with file data. In this chapter,\
    \ we will see the specifics of working with Java’s data access structures (the\
    \ `java.sql` package). This will give us an opportunity to meet another new data\
    \ structure in Java 8’s standard library: the spliterator.\n\nIf we are going\
    \ to work with data access, we need to be working with some non-trivial database.\
    \ In this chapter, we will be working with an H2 in-memory database containing\
    \ an index of all the words in all the works of Shakespeare. These words are organized\
    \ by line number. This means that we have a `text` table, a `line` table, a `word`\
    \ table, and a `line_word` table joining `line` and `word`. The UML diagram for\
    \ the tables looks like this:\n\n![A978-1-4302-5999-2_5_Figa_HTML.jpg](A978-1-4302-5999-2_5_Figa_HTML.jpg)\n\
    \nThis database was loaded from the texts provided by Project Gutenberg at [`http://www.gutenberg.org/ebooks/100`](http://www.gutenberg.org/ebooks/100).\
    \ In total, there are 38 texts (the sonnets are grouped as a single text). There\
    \ are about 113,000 lines, about 36,000 distinct words, and almost a million words\
    \ used. While this is still a relatively tiny database by corporate standards,\
    \ it is big enough to slow down processing and warrant some special handling.\
    \ We will walk through loading the database in Appendix A, where we will contrast\
    \ imperative, object-oriented, and postfunctional approaches. For the sake of\
    \ this chapter, we will start with a populated database and move through there.\n\
    \nWith this database loaded and ready to go, let’s figure out how (and why) to\
    \ bring streams into the mix. Let’s start with a simple request: we would like\
    \ to print out all the word usages, one per line, with all the associated metadata.\
    \ This might be done, for instance, if you are generating input for a Hadoop map-reduce\
    \ run. The SQL we are going to run (and some sample results) are as follows:\n\
    \n```\nSELECT t.name, l.\"offset\", w.\"value\", lw.\"offset\"\nFROM \"text\"\
    \ t, word w\nINNER JOIN line l ON (t.id = l.text_id)\nINNER JOIN line_word lw\
    \ ON (lw.line_id = l.id AND lw.word_id = w.id)\n```\n\n| Text Title | Line Offset\
    \ | Word | Word Offset |\n| --- | --- | --- | --- |\n| A LOVER’S COMPLAINT | 328\
    \ | Betray | 5 |\n| THE WINTER’S TALE | 3326 | interpose | 5 |\n| THE TWO GENTLEMEN\
    \ OF VERONA | 2041 | expedition | 7 |\n| ALLS WELL THAT ENDS WELL | 23 | Second\
    \ | 12 |\n| THE TRAGEDY OF ANTONY AND CLEOPATRA | 3840 | solemnity | 7 |\n\nHow\
    \ do we work with this query now that we can leverage lambdas? We can decompose\
    \ the problem into the steps in the flow given below. By using streams, each of\
    \ those four steps can be developed individually. The stream instance and its\
    \ element type will bridge those independently developed steps. Because of that,\
    \ we can develop the steps in whichever order and put them together at the end.\
    \ If we had multiple developers, we could even assign the different steps to be\
    \ built out by different developers, with each step being tied to the previous.\
    \ So it’s not just the execution that is made more asynchronous and concurrent\
    \ by streams and lambdas: it’s development, too. We will prove this out by starting\
    \ in the middle, working our way to the end, and then filling in the front and\
    \ tying it all together.\n\n![A978-1-4302-5999-2_5_Figb_HTML.jpg](A978-1-4302-5999-2_5_Figb_HTML.jpg)\n\
    \n## Representing the Intermediary Query Results\n\nJava’s standard SQL library\
    \ represents the result set of the query as a `java.sql.ResultSet`. A result set\
    \ provides a streaming set of results, so we will represent it functionally using\
    \ the `java.util.function.Stream`. But what is the type of the elements of that\
    \ stream? Traditionally, the answer would be a Java bean, with each field in the\
    \ query result becoming a property of the Java bean: you would have getters and\
    \ setters for all four of the fields in the SQL query. In a world with lambdas,\
    \ however, we will instead use an immutable Java object, as given in Listing 5-1.\n\
    \n**Listing 5-1.** The Java Object Representing the Results\n\n```\n/**\n * Functional-friendly\
    \ class for storing results of querying the word\n * usage database.\n */\npublic\
    \ class WordUsage {\n    private final String textName;\n    private final int\
    \ lineOffset;\n    private final String word;\n    private final int wordOffset;\n\
    \n    public WordUsage(\n        final String textName, final int lineOffset,\n\
    \        final String word, final int wordOffset\n    ) {\n        this.textName\
    \ = textName;\n        this.lineOffset = lineOffset;\n        this.word = word;\n\
    \        this.wordOffset = wordOffset;\n    }\n\n    public String getTextName()\
    \ {\n        return textName;\n    }\n\n    public WordUsage withTextName(String\
    \ textName) {\n        return new WordUsage(textName, lineOffset, word, wordOffset);\n\
    \    }\n\n    public int getLineOffset() {\n        return lineOffset;\n    }\n\
    \n    public WordUsage withLineOffset(int lineOffset) {\n        return new WordUsage(textName,\
    \ lineOffset, word, wordOffset);\n    }\n\n    public String getWord() {\n   \
    \     return word;\n    }\n\n    public WordUsage withWord(String word) {\n  \
    \      return new WordUsage(textName, lineOffset, word, wordOffset);\n    }\n\n\
    \    public int getWordOffset() {\n        return wordOffset;\n    }\n\n    public\
    \ WordUsage withWordOffset(int wordOffset) {\n        return new WordUsage(textName,\
    \ lineOffset, word, wordOffset);\n    }\n}\n```\n\nThe immutability of the Java\
    \ bean in Listing 5-1 is significant, because streams can quickly (and often transparently)\
    \ move into processing on multiple threads. The Java memory model does not guarantee\
    \ that an object constructed in Thread A but accessed in Thread B will necessarily\
    \ have its fields intact. If you construct an object in one thread and access\
    \ it in another, any given field access may return `null`, even if you assign\
    \ it in the constructor. The reason is because different threads maintain their\
    \ own distinct memory space, and the Java virtual machine will take a significant\
    \ performance hit if it has to walk the entire tree and copy the objects whenever\
    \ a thread modifies a field. The really obnoxious part about this is that this\
    \ rule is poorly understood, and the error may not crop up until the system is\
    \ under load, at which point the system is a rather unhelpful `NullPointerException`\
    \ that appears where it should be impossible. That’s a nightmare for a poor developer\
    \ to debug, especially if the concurrency is obscured."
  raw: '# 5. Data Access with Lambdas


    In the last chapter, we saw how lambdas enable us to work with files and streams.
    In this chapter, we will look at interacting with the database. Way back in [chapter
    1](#A978-1-4302-5999-2_1_Chapter.html), we saw how lambdas can help Spring’s JDBCTemplate
    by making it easy to implement its callback interfaces. In [chapter 3](#A978-1-4302-5999-2_3_Chapter.html),
    we were introduced to streams, and in [chapter 4](#A978-1-4302-5999-2_4_Chapter.html),
    we saw how streams can make it easier to work with file data. In this chapter,
    we will see the specifics of working with Java’s data access structures (the `java.sql`
    package). This will give us an opportunity to meet another new data structure
    in Java 8’s standard library: the spliterator.


    If we are going to work with data access, we need to be working with some non-trivial
    database. In this chapter, we will be working with an H2 in-memory database containing
    an index of all the words in all the works of Shakespeare. These words are organized
    by line number. This means that we have a `text` table, a `line` table, a `word`
    table, and a `line_word` table joining `line` and `word`. The UML diagram for
    the tables looks like this:


    ![A978-1-4302-5999-2_5_Figa_HTML.jpg](A978-1-4302-5999-2_5_Figa_HTML.jpg)


    This database was loaded from the texts provided by Project Gutenberg at [`http://www.gutenberg.org/ebooks/100`](http://www.gutenberg.org/ebooks/100)
    . In total, there are 38 texts (the sonnets are grouped as a single text). There
    are about 113,000 lines, about 36,000 distinct words, and almost a million words
    used. While this is still a relatively tiny database by corporate standards, it
    is big enough to slow down processing and warrant some special handling. We will
    walk through loading the database in Appendix A, where we will contrast imperative,
    object-oriented, and postfunctional approaches. For the sake of this chapter,
    we will start with a populated database and move through there.


    With this database loaded and ready to go, let’s figure out how (and why) to bring
    streams into the mix. Let’s start with a simple request: we would like to print
    out all the word usages, one per line, with all the associated metadata. This
    might be done, for instance, if you are generating input for a Hadoop map-reduce
    run. The SQL we are going to run (and some sample results) are as follows:


    `SELECT t.name, l."offset", w."value", lw."offset"`


    `FROM "text" t, word w`


    `INNER JOIN line l ON (t.id = l.text_id)`


    `INNER JOIN line_word lw ON (lw.line_id = l.id AND lw.word_id = w.id)`


    | Text Title | Line Offset | Word | Word Offset |

    | --- | --- | --- | --- |

    | A LOVER’S COMPLAINT | 328 | Betray | 5 |

    | THE WINTER’S TALE | 3326 | interpose | 5 |

    | THE TWO GENTLEMEN OF VERONA | 2041 | expedition | 7 |

    | ALLS WELL THAT ENDS WELL | 23 | Second | 12 |

    | THE TRAGEDY OF ANTONY AND CLEOPATRA | 3840 | solemnity | 7 |


    How do we work with this query now that we can leverage lambdas? We can decompose
    the problem into the steps in the flow given below. By using streams, each of
    those four steps can be developed individually. The stream instance and its element
    type will bridge those independently developed steps. Because of that, we can
    develop the steps in whichever order and put them together at the end. If we had
    multiple developers, we could even assign the different steps to be built out
    by different developers, with each step being tied to the previous. So it’s not
    just the execution that is made more asynchronous and concurrent by streams and
    lambdas: it’s development, too. We will prove this out by starting in the middle,
    working our way to the end, and then filling in the front and tying it all together.


    ![A978-1-4302-5999-2_5_Figb_HTML.jpg](A978-1-4302-5999-2_5_Figb_HTML.jpg)


    ## Representing the Intermediary Query Results


    Java’s standard SQL library represents the result set of the query as a `java.sql.ResultSet`.
    A result set provides a streaming set of results, so we will represent it functionally
    using the `java.util.function.Stream`. But what is the type of the elements of
    that stream? Traditionally, the answer would be a Java bean, with each field in
    the query result becoming a property of the Java bean: you would have getters
    and setters for all four of the fields in the SQL query. In a world with lambdas,
    however, we will instead use an immutable Java object, as given in Listing 5-1.


    Listing 5-1\. The Java Object Representing the Results


    `/**`


    `* Functional-friendly class for storing results of querying the word`


    `* usage database.`


    `*/`


    `public class WordUsage {`


    `private final String textName;`


    `private final int lineOffset;`


    `private final String word;`


    `private final int wordOffset;`


    `public WordUsage(`


    `final String textName, final int lineOffset,`


    `final String word, final int wordOffset`


    `) {`


    `this.textName = textName;`


    `this.lineOffset = lineOffset;`


    `this.word = word;`


    `this.wordOffset = wordOffset;`


    `}`


    `public String getTextName() {`


    `return textName;`


    `}`


    `public WordUsage withTextName(String textName) {`


    `return new WordUsage(textName, lineOffset, word, wordOffset);`


    `}`


    `public int getLineOffset() {`


    `return lineOffset;`


    `}`


    `public WordUsage withLineOffset(int lineOffset) {`


    `return new WordUsage(textName, lineOffset, word, wordOffset);`


    `}`


    `public String getWord() {`


    `return word;`


    `}`


    `public WordUsage withWord(String word) {`


    `return new WordUsage(textName, lineOffset, word, wordOffset);`


    `}`


    `public int getWordOffset() {`


    `return wordOffset;`


    `}`


    `public WordUsage withWordOffset(int wordOffset) {`


    `return new WordUsage(textName, lineOffset, word, wordOffset);`


    `}`


    `}`


    The immutability of the Java bean in Listing 5-1 is significant, because streams
    can quickly (and often transparently) move into processing on multiple threads.
    The Java memory model does not guarantee that an object constructed in Thread
    A but accessed in Thread B will necessarily have its fields intact. If you construct
    an object in one thread and access it in another, any given field access may return
    `null`, even if you assign it in the constructor. The reason is because different
    threads maintain their own distinct memory space, and the Java virtual machine
    will take a significant performance hit if it has to walk the entire tree and
    copy the objects whenever a thread modifies a field. The really obnoxious part
    about this is that this rule is poorly understood, and the error may not crop
    up until the system is under load, at which point the system is a rather unhelpful
    `NullPointerException` that appears where it should be impossible. That’s a nightmare
    for a poor developer to debug, especially if the concurrency is obscured.'
