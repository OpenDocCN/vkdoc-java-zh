    ## Lambda 表达式与函数式编程


    Java 8 的 lambda 表达式源自函数式编程的世界。函数式编程基于数学函数来构建计算机程序。在函数式编程中，lambda 表达式本身就代表了函数。然而，每个数学函数都作用于一组特定的可能输入，并产生一组特定的可能输出。这些输入被称为“函数的定义域”，输出则被称为“函数的值域”。


    从抽象层面来看，lambda 表达式的类型代表了函数的定义域和值域。`Function` 接口的 Java 类型是 `Function<T,U>`：`T`
    是其定义域，`U` 是其值域。这就是类型在函数式编程世界中如此有用的原因：类型让你能够清晰地传达函数的定义。对于阅读 API 的开发者来说，类型允许他们简洁地描述你期望接收什么以及你将返回什么。编译器也会读取这些类型，并利用这些类型对你的代码进行推理，从而提供其他方式无法实现的优化。


    然而，抽象只能带你走到一定程度。迟早，你必须针对真实数据执行你的代码。你可能会构建出有史以来最优雅的函数应用链，但在将它们应用到某些东西上之前，它们不会为你完成任何任务。在函数式编程方法中，你的应用程序目标很简单：收集所有你关心的领域对象，并将它们输入到函数中。那么，是什么东西提供了这些供函数操作的领域对象呢？


    如果你与普通的 Java 开发者谈论收集对象，他会想到 `Collection` 类及其相关 API。从历史上看，这就是函数式 Java 代码的编写方式：你获取一个集合，对每个元素应用一个函数，然后返回结果集合。以这种方式作用于集合的函数被称为“推导式”。Java
    8 使得推导式成为可能，我们将在本章中介绍支持推导式的 API。这种方法对于已知项目的相对较小的集合非常有效，并且对于 Java 开发者来说是一个非常自然的演进。


    然而，也存在一些严重的局限性。最明显的局限性是 `Collection` API 假定所有数据都在内存中，或者至少是随手可得的。如果你正在处理数据库中的所有行或文件中的所有单词，情况可能并非如此。一个更微妙的后果是，将一系列这样的操作链接在一起会创建一系列中间集合，每个集合的大小大致相同，这纯粹是一种浪费。最后，大多数
    `Collection` API 不是线程安全的，或者只有有限的线程安全特性，这限制了 lambda 表达式的并发能力。


    为了解决这个问题，Java 8 引入了“函数式流”的概念。“流”这个术语在 Java 中已有既定用法，而函数式流是这个旧概念的新应用。传统上，“流”指的是
    Java 的 I/O 世界，其中 I/O 流代表一个字节序列。大多数 Java 开发者习惯于使用这些流，并且知道如何通过装饰器模式对它们的字节进行包装、扭曲和操作，同时始终保持在
    `InputStream` API 的范围内。这是一种实现显著代码复用的强大方式。


    函数式流类似于这些 I/O 流，但它们作用于对象序列而不是字节序列。对象在流经流时可以被包装、扭曲和操作，我们可以获得同样的复用性。得益于 lambda 表达式的引入，我们不再需要装饰器模式：我们可以简单地将我们的实现传递给
    `Stream` 对象本身，并得到一个新的 `Stream` 作为返回。

    '
- fmt: "Functional streams work better than the collection approach because you don’t\
    \ need all the data in a collection up front, and the Java runtime is free to\
    \ automatically leverage opportunities for concurrent execution when it can. The\
    \ resulting API is extremely powerful, although it can be somewhat intimidating\
    \ for Java developers: it is coming from a different world, so it may be unintuitive\
    \ at the start. The rest of this chapter is about making streams make sense; by\
    \ the time we are finished, they should be as intuitive for you to use as the\
    \ `Collection` and `Iterator` classes.\n\nTo get there, let’s start back with\
    \ the `Collection` interface that is already familiar. Unlike the previous chapter,\
    \ where we discussed things in the abstract, let’s set a more concrete example.\
    \ Let’s say that we have a `Library` class. Instances of this class store `Book`\
    \ objects in an arbitrary but significant order; the user of the class sets the\
    \ order of the books, and we don’t want to mess with that. Based on that requirement,\
    \ we store a `List<Book>` instance in each `Library` instance. In addition, the\
    \ `Library` has to provide functionality for “featured books.” Some books are\
    \ specially featured optionally with a particular feature message. To provide\
    \ that functionality, we store a `Map<Book,String>` instance in each `Library`\
    \ instance.\n\nThe starting code for `Library` and `Book` is given in Listing\
    \ 3-1. Throughout the rest of this chapter, we will build out functionality for\
    \ our `Library` class using the new functional tools provided in Java 8.\n\n##\
    \ Listing 3-1. The Library and Book classes\n\n```\nimport java.util.Objects;\n\
    \n/**\n * Class representing an element of a {@link Library}.\n */\npublic class\
    \ Book {\n\n    /**\n     * Represents the allowed genres of a book.\n     */\n\
    \    public static enum Genre {\n        HORROR, COMEDY, TECHNICAL;\n    }\n\n\
    \    private final String title;\n    private final String author;\n    private\
    \ final Genre genre;\n\n    /**\n     * Constructor.\n     *\n     * @param title\
    \  The title of the book; may not be {@code null}.\n     * @param author The author\
    \ of the book; may not be {@code null}.\n     * @param genre  The genre of the\
    \ book; may not be {@code null}.\n     */\n    public Book(final String title,\
    \ final String author, final Genre genre) {\n        Objects.requireNonNull(title,\
    \ \"title of the book\");\n        this.title = title;\n        Objects.requireNonNull(author,\
    \ \"author of the book\");\n        this.author = author;\n        Objects.requireNonNull(genre,\
    \ \"genre of the book\");\n        this.genre = genre;\n    }\n\n    @Override\n\
    \    public String toString() {\n        return \"\\\"\" + title + \"\\\" by \"\
    \ + author +\n                \" (\" + genre.toString().toLowerCase() + \")\"\
    ;\n    }\n\n    @Override\n    public int hashCode() {\n        int result = title.hashCode();\n\
    \        result = 17 * result + author.hashCode();\n        result = 31 * result\
    \ + genre.hashCode();\n        return result;\n    }\n\n    @Override\n    public\
    \ boolean equals(final Object o) {\n        if (o == null) return false;\n   \
    \     if (this == o) return true;\n        if (!(o instanceof Book)) return false;\n\
    \        final Book book = (Book) o;\n        if (!author.equals(book.author))\
    \ return false;\n        if (genre != book.genre) return false;\n        if (!title.equals(book.title))\
    \ return false;\n        return true;\n    }\n}\n\nimport java.util.List;\nimport\
    \ java.util.Map;\nimport java.util.Objects;\nimport java.util.ArrayList;\nimport\
    \ java.util.HashMap;\n\n/**\n * Class representing a collection of {@link Book}\
    \ objects. The {@code Book}\n * objects are stored in a user-defined order, which\
    \ defaults to insertion\n * order. A given {@code Book} can also be specified\
    \ by the user as\n * <i>featured</i>, optionally with a <i>featured message</i>.\n\
    \ */\npublic class Library {\n\n    private final List<Book> books = new ArrayList<>();\n\
    \    private final Map<Book, String> featuredBooks = new HashMap<>();\n\n    /**\n\
    \     * Adds a book to the end of the books list.\n     *\n     * @param book\
    \ The book to add; may not be {@code null}.\n     */\n    public void addBook(Book\
    \ book) {\n        Objects.requireNonNull(book, \"book to add\");\n        this.books.add(book);\n\
    \    }\n\n    /**\n     * Adds a book to the end of the books list, and adds it\
    \ as a featured book\n     * with the given message.\n     *\n     * @param book\
    \    The book to add; may not be {@code null}.\n     * @param message The featured\
    \ message, which may be {@code null}.\n     */\n    public void addFeaturedBook(Book\
    \ book, String message) {\n        this.addBook(book);\n        this.featuredBooks.put(book,\
    \ message);\n    }\n\n    /**\n     * Provides direct access to the listing of\
    \ books. Modifying the returned\n     * collection will modify the books in the\
    \ library.\n     *\n     * @return The books in this library; never {@code null}.\n\
    \     */\n    public List<Book> getBooks() {\n        return this.books;\n   \
    \ }\n\n    /**\n     * Provides direct access to the listing of featured books.\
    \ Modifying the\n     * returned map will modify the featured books and their\
    \ messages.\n     *\n     * @return The featured books in this library mapped\
    \ to their\n     *         (possibly {@code null}) message; never {@code null}.\n\
    \     */\n    public Map<Book, String> getFeaturedBooks() {\n        return this.featuredBooks;\n\
    \    }\n}\n```"
  raw: 'Functional streams work better than the collection approach because you don’t
    need all the data in a collection up front, and the Java runtime is free to automatically
    leverage opportunities for concurrent execution when it can. The resulting API
    is extremely powerful, although it can be somewhat intimidating for Java developers:
    it is coming from a different world, so it may be unintuitive at the start. The
    rest of this chapter is about making streams make sense; by the time we are finished,
    they should be as intuitive for you to use as the `Collection` and `Iterator`
    classes.


    To get there, let’s start back with the `Collection` interface that is already
    familiar. Unlike the previous chapter, where we discussed things in the abstract,
    let’s set a more concrete example. Let’s say that we have a `Library` class. Instances
    of this class store `Book` objects in an arbitrary but significant order; the
    user of the class sets the order of the books, and we don’t want to mess with
    that. Based on that requirement, we store a `List<Book>` instance in each `Library`
    instance. In addition, the `Library` has to provide functionality for “featured
    books.” Some books are specially featured optionally with a particular feature
    message. To provide that functionality, we store a `Map<Book,String>` instance
    in each `Library` instance.


    The starting code for `Library` and `Book` is given in Listing 3-1\. Throughout
    the rest of this chapter, we will build out functionality for our `Library` class
    using the new functional tools provided in Java 8.


    Listing 3-1\. The Library and Book classes


