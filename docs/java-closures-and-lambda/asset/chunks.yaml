    在 Java 8 中有多种方式实现分割器（spliterator）。创建分割器的大部分功能都包含在 `Spliterators`（注意末尾的“s”）类中。另一种常见的创建分割器的方式是从一个流开始，然后调用
    `stream.spliterator()`。最后一种常见的创建分割器的方式是从迭代器构建，我们将在下一节中探讨。在本节中，我们将使用 `Spliterators`
    类中提供的 `AbstractSpliterator` 基类来实现一个分割器。然后，我们将利用该结果来构建流。


    对于 `AbstractSpliterator` 基类，需要实现的核心方法是 `tryAdvance`。该方法接收一个 `Consumer` 参数，该参数代表下游行为。代码负责将任何新生成的元素传递给该消费者。如果生成了新元素，则方法返回
    `true`；如果已耗尽，则返回 `false`。


    我们不希望将此代码直接绑定到特定的实现中。这样做有两个原因：首先，我们希望简化类并保持代码中清晰的职责划分；其次，通过保持专注，我们将创建一段有价值的可复用代码。在这种情况下，我们的类可以依赖用户来指定转换逻辑。由于
    `ResultSet` 类型上几乎所有有趣的方法都会抛出 `SQLException`，因此我们不能使用简单的函数式接口：相反，我们将提供一个会抛出 `SQLException`
    的抽象方法，然后在我们的 `tryAdvance` 方法中处理该异常。假设我们的类将 `ResultSet` 存储在一个名为 `resultSet` 的字段中，那么最终的方法如清单
    5-9 所示。


    **清单 5-9. ResultSetSpliterator 的 tryAdvance 方法**


