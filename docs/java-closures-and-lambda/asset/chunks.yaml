    ## 透明可选技巧


    这是处理遗留代码的最后一个非常有用的技巧。这个技巧是一种处理空值的方法。当 Java 遇到空值时，它会抛出令人厌烦且无处不在的 `NullPointerException`。`NullPointerException`
    的消息如下所示：


    `Exception in thread "main" java.lang.NullPointerException`


    任何有经验的 Java 开发人员都知道，这是一条完全没有帮助的消息。首先，甚至不清楚哪个值是空值，因此该行上的任何内容都可能导致问题。该错误消息中也没有传达应用程序的任何状态。这条消息的效用极其有限，这也是应尽快将空值从代码库中彻底清除的原因之一。既然我们已经有了
    `Optional`，就完全没有必要使用空值了。


    当然，遗留代码没有 `Optional`，而且遗留开发人员可能不像我们现在这样开明。但是，我们可以摆脱空值，同时以一种透明的方式提供更有用的错误消息。这个技巧是在内部使用可选值，同时在外部提供（基本）一致的
    API。实现一致 API 的要求是，如果值为空，则抛出 `NullPointerException`，我们可以使用 `Optional.orElseThrow(Supplier<Exception>)`
    方法来实现。此外，我们提供一种将值作为 Optional 获取的方法，这样真正想检查值是否存在的人就可以通过这种方式进行检查。其意图是代码最终会迁移到直接对
    Optional 类型进行操作的访问器上，因此我们可以弃用旧的 setter。作为一种语法上的便利，最好保留一个通过 `Optional.ofNullable(Object)`
    直接设置值的 setter：如果你提供了该 setter 的重载，那么调用者就不必自己包装原始值了。清单 7-14 给出了此实现的一个示例。


    **清单 7-14\. 向 Optional 迁移的 Bean 示例**


    `import java.util.*;`


    `public class SomeBean {`


        `private int id = 0;`


        `private Optional<String> name = Optional.empty();`


        `public SomeBean() {`


        `}`


        `public SomeBean(final int id, final String name) {`


          `this.id = id;`


          `this.name = Optional.ofNullable(name);`


        `}`


        `public int getId() {`


          `return id;`


        `}`


        `public void setId(final int id) {`


          `this.id = id;`


        `}`


        `@Deprecated`


        `public String getName() {`


          `return name.orElseThrow(`


            `() -> new NullPointerException(`


                        `"No name provided for: " + this.toString()`


                  `)`


          `);`


        `}`


        `public Optional<String> getNameOptional() {`


          `return name;`


        `}`


        `public void setName(final String name) {`


          `this.name = Optional.ofNullable(name);`


        `}`


        `public void setName(final Optional<String> name) {`


          `this.name = (name == null ? Optional.empty() : name);`


        `}`


        `@Override`


        `public String toString() {`


          `return "SomeBean{" +`


              `"id=" + id +`


              `", name=" + name.orElse(null) +`


              `''}'';`


        `}`


    `}`


    ## 逆向开发


    在结束本次讨论之前，同样值得注意的是，逆向开发通常很重要。如果你正在开发一个开源库，或者不确定阅读你代码的开发者的技能水平，那么你需要特别小心。并非每个 Java
    开发人员都读过这本书，因此这种新的后函数式编程范式对他们来说可能非常陌生。例如，我最近参与的一个项目中出现了这样一行代码：


    `(impl == null ? defaultImpl : impl).apply(arg);`


    如果你知道 `impl` 和 `defaultImpl` 都是 `Function` 值，那么很容易理解这里发生了什么。另一方面，它看起来有些奇怪。在一系列流转换中间，它看起来就更奇怪了。即使是简单的
    `forEach` 调用有时也会让人摸不着头脑。


    鉴于此，需要尽可能清晰地编写代码。如果你要与可能不熟悉后函数式编程的开发人员合作，请对他们友好一些。在你期望 lambda 的地方为参数实现接口，这样他们就可以传入接口实现，并有一个明显的地方来查找文档。限制一个方法中接受的
    lambda 数量，因为过多的 lambda 会导致回调迷宫。总的来说，要非常明确地表明你编写的代码对他们来说确实更清晰、更容易阅读。这不仅会减少你将遇到的问题（以及有问题的更改！）的数量，而且还会为这些开发人员提供学习和进步的机会。


    # 8. Java 字节码中的 Lambda


    本章面向那些想要更深入地了解 lambda 实际工作原理的人。这是你的红色药丸与蓝色药丸时刻：你是想生活在一个 Java 拥有 lambda、它们运行良好、一切流畅而精彩的世界里，还是想看看表面之下究竟发生了什么，发现编译器魔法的奥秘？如果你对你所了解和喜爱的
    lambda 感到满意，那么请跳过本章，尽情享受吧。如果你需要知道你的代码真正意味着什么，那么请抓紧了：是时候深入探索了。


    现实情况是，lambda 是一种幻觉。Java lambda 完全是编译器的构造。编译器将带有 lambda 的 Java 代码转换为更底层语言中的更原始操作。理解这种转换可以帮助你准确理解正在发生的事情，这在调试和优化等情况下非常有用。


    然而，在踏入这个新世界之前，有一些必要的注意事项。本章基于 Oracle 的 Java 编译器编写，具体版本是 1.8.0_05。Oracle 完全有可能（尽管可能性极小）在未来的版本中彻底改造其
    lambda 实现，而且随着时间推移，肯定会有改进。其他 Java 编译器也可能有非常不同的实现。因此，如果你在家中使用自己的 Java 编译器并注意到一些细微的差异，那正是这种情况。当你深入探究时，必须预料到这类变化。


    我们还需要坦率地说明，本章并非对 Java 编译器及其生成的底层字节码语言的全面介绍。该语言有其自身的语义，这些语义既复杂又技术性强。在本章中，我们只是开始接触其中一些语义。我们专注于
    lambda 及其功能，因此任何与 lambda 无关的内容都与本次探索无关。


    在所有这些警告之后，如果你仍然愿意跟随我，那么你可能知道 Java 代码本身并不会直接编译成由操作系统执行的字节。相反，Java 编译器（以下简称“javac”）会编译成另一种中间形式，由
    Java 虚拟机（以下简称“JVM”）执行。这种中间形式称为 Java 字节码。然而，字节码没有 lambda 的概念。它也没有 try-with-resources
    块、增强型 for 循环或 Java 中许多其他结构的概念。相反，编译器会将这些 Java 结构转换为字节码中的底层形式。


    在本章中，我们将看到编译器如何将 Java 语言中的 lambda 命令转换为 Java 字节码语言中的结构。我们将从熟悉阅读字节码开始，然后继续了解特定类型的
    lambda 结构如何转换为字节码。但在讨论 lambda 之前，我们需要了解一些基础知识。

