    \ 2-17.\n\n**Listing 2-17.** Predicate Lambda Checking if a String Is Null or\
    \ Empty\n\n```\nPredicate<String> notNullOrEmpty = s -> s != null && s.length()\
    \ > 0;\n```"
  raw: '### Lambdas with No Return Value


    So far, we have been addressing lambdas that always return a value. A very common
    type of lambda, however, returns no value at all: these are terminal lambdas.
    You see them, for instance, when consuming every element of a collection or when
    terminating a stream of values. They are the opposite of suppliers; they take
    a value and produce nothing as a result. Predictably, the functional interface
    for these consuming lambdas is `Consumer`. An example of a consumer is given in
    Listing 2-13: there, we use a consumer to represent how we print out the greeting.
    A more idiomatic Java 8 way of writing this code will be given when we get to
    collections in [Chapter 3](#A978-1-4302-5999-2_3_Chapter.html).


    Listing 2-13\. Example of a Consumer and BiConsumer


    `public static void greetFolks() {`


      `Consumer<String> doGreet = name -> System.out.println("Hello, " + name);`


      `for (String name : Arrays.asList("Alice", "Bob", "Cathy")) {`


        `doGreet.accept(name);`


      `}`


    `}`


    `public static void concat() {`


      `BiConsumer<String,String> printConcat = (left,right) ->`


        `System.out.println(left + right);`


      `for (String name : Arrays.asList("Alice", "Bob", "Cathy")) {`


        `printConcat.accept("Goodbye, ", name);`


      `}`


    `}`


    ### Lambdas with Complex Bodies


    Usually, lambdas are simple, single-element affairs. Occasionally, however, you
    need to do something a bit more involved. This is especially common when you are
    writing code that interfaces with a pre-lambda API, such as working with an `Autocloseable`.
    If you need to create a complex body on a lambda, you can specify the body within
    brackets. When you do so, however, you take on responsibility for explicitly calling
    a `return`. An example of a lambda wrapping an `Autocloseable` is given in Listing
    2-14\. As you can see there, this approach makes your lambda look a lot more like
    a method, and you may be better off defining a method and referring to it explicitly.
    There’s even a nice syntax for turning a method back into a lambda if you need
    to: see “Making Methods into Lambdas” below.


    Listing 2-14\. Lambda with a Complex Body That Wraps an Autocloseable


    `Function<File, Byte> firstByte = file -> {`


      `try (InputStream is = new FileInputStream(file)) {`


        `return (byte) is.read();`


      `} catch (IOException ioe) {`


        `throw new RuntimeException("Could not read " + file, ioe);`


      `}`


    `};`


    `for (String filename : args) {`


      `File file = new File(filename);`


      `int byte1 = firstByte.apply(file);`


      `System.out.println(filename + "\t=>\t" + byte1);`


    `}`


    ### Lambdas with Explicit Typing


    Some Java developers just can’t bear to part with explicit typing, some code analysis
    tools (such as IDEs) need a little extra help from time to time, and sometimes
    you may even manage to confuse the compiler.[⁷](#A978-1-4302-5999-2_2_Chapter.html#Fn7)
    In these cases, you need to provide the compiler with explicit types to help it
    out. When you get to these cases, it is a sign that something is probably wrong
    with your API, and you might be best off fixing whatever ambiguity it is that
    caused the problem. If you really want to specify your types explicitly, though,
    you can do so by using the parenthesized argument list. If you put parentheses
    around your arguments (even if there is only one), then you can add explicit types.
    In Listing 2-15, we see a case that raises some confusion, and how we can add
    explicit types to solve it.


    Listing 2-15\. Using Explicit Typing to Resolve Overloaded Method Ambiguity


    `public static void main(String[] args) {`


      `// .toUpperCase() exists in String, but not on CharSequence`


      `transform(args[0], (String str) -> str.toUpperCase());`


    `}`


    `public st` `atic String transform(`


      `String str,`


      `Function<String, String> transformer`


    `) {`


      `return transformer.apply(str);`


    `}`


    `public static CharSequence transform(`


      `CharSequence str,`


      `Function<CharSequence, CharSequence> transformer`


    `) {`


      `return transformer.apply(str);`


    `}`


    ### Lambdas as Operators


    Java 8 provides a bit of shorthand for the common case when the types of the arguments
    and return values are the same. In this case, you can save repeating yourself
    by using the “operator functional interfaces.”[⁸](#A978-1-4302-5999-2_2_Chapter.html#Fn8)
    There are two of these that work on objects: `BinaryOperator` and `UnaryOperator`.
    `BinaryOperator` is a `BiFunction` whose arguments and return types are all the
