  `map: 3 线程: main`


  `forEach: 3 线程: main`


  `map: 4 线程: main`


  `forEach: 4 线程: main`


  `map: 5 线程: main`


  `forEach: 5 线程: main`


  `map: 6 线程: main`


  `forEach: 6 线程: main`


  `map: 7 线程: main`


  `forEach: 7 线程: main`


  `...`


  `*/`


  正如我们所见，顺序流很简单：它们在调用者的线程中执行。它们会尽可能地对一个元素执行完整个操作流，然后再处理下一个元素。然而，有些操作（例如 `stream.sorted()`）需要处理整个流：流在消费完整个流之前，无法知道当前元素是否是最小的。因此，这个调用充当了一个屏障：流中的特定元素在后续元素被处理之前，无法越过它。


  并行流则更有趣。如果你有足够的元素，它们会将部分工作委托给公共的 `ForkJoinPool` 实例。这与我们的 Fork/Join 任务执行的线程池是同一个，这很好地展示了这些框架如何协同工作。部分工作可能仍在本地执行（例如数字
  132），但无论如何，同一个线程会尽可能地在流中执行下去（如数字 32 和 182 所示）。




  然而，你绝不能假设流中的元素会按顺序处理，也不能假设它们生成后会立即被处理——我们在处理第六个元素（编号 33）之前，已经从流中生成了 182 个元素。如果流中的每个元素大小都是
  1GB，那我们就麻烦了！流的生成速度可能远超处理速度，这些元素会一直缓存在内存中，直到被处理。因此，并行流最好生成非常小的元素（例如索引或文本行），并在流处理过程中将这些小元素构建成更大的元素，这始终是最佳实践。


  另一个需要注意的问题是，你的 Fork/Join 任务将与流操作本身共享公共的 Fork/Join 池。因此，除非你使用 `ForkJoinTask.join()`
  或 `ForkJoinTask.invoke()`，否则绝不能让你的流操作等待 Fork/Join 任务解析——如果任务尚未启动，这两个方法会让当前线程自行处理该任务。任何其他对
  Fork/Join 任务解析的直接或间接依赖，都可能导致死锁。


  然而，如果你能生成小元素流，流操作不会长时间阻塞，并且你对 Fork/Join 任务稍加注意，那么流并行性就是让你的 Java 应用获得显著并发收益的简单方法。你只需指定你想要发生的事情，让运行时为你处理并发管理和优化。所有这些都可以通过可读性强的代码实现，因为
  lambda 表达式使得像传递数据一样传递行为成为可能。


  ## 结论


  我希望你现在能认识到 lambda 表达式和流在简化并发代码方面的强大能力。代码变得非常易读，并且你将执行细节与待完成的工作分离开来。这确实是后函数式代码中最令人印象深刻的部分之一。


  请注意，其他方法仍有其适用的时机和场景。单线程适用于一次性“发射后不管”的钩子，或长时间运行的后台守护任务。当你需要处理各种工作并对线程池有更多控制时，Executor
  非常有用。Fork/Join 框架在处理递归问题时表现出色。但对于连接一系列操作这种非常常见的情况，lambda 表达式和流框架是 Java SDK 中强大且受欢迎的补充。


