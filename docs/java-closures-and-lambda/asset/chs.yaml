  \n`val.printStackTrace(System.err);`\n\n`}`\n\n`);`\n\n`}`\n\n`}`\n\n在这两种情况下，我们都实现了良好的关注点分离：流处理正常路径，然后稍后再处理异常。代码本身相当丑陋且敏感，因此最好只编写一次并一劳永逸。上面提供的\
  \ API 以及其他 API，在 FunJava 项目中以`funjava.io.FunResource`的名称提供。\n\n虽然这种方法在流的“正常路径”和后续的异常处理之间提供了清晰的区分，但有时这种区分无法保持清晰。有时你希望能够在处理过程中处理异常。在这种情况下，你希望将异常信息保留在同一个流中。这就是我们使用`Result`对象的时候了。\n\
  \n\n\n### 使用结果对象处理资源\n\n设想一个需要处理文件的流。这些文件可能存在，也可能不存在；如果不存在，这本身也具有特定含义。例如，这些文件可能是用户可选指定的文件，如果文件未上传，那么你希望使用默认文件。在这种情况下，你需要在流内部保留关于\
  \ IO 错误的信息，以便能够在流中处理该错误。这使得我们在上一节中看到的处理器方法变得不合适，因为你不想查询另一个对象来了解同一流中之前发生了什么。非受检异常的情况会持续中断，让你毫无进展。相反，你真正需要的是一个\
  \ `Result` 对象。\n\n我们之前见过 `Result` 对象。它与 `Optional` 类型是近亲，因为它持有一个可能存在也可能不存在的值。然而，`Result`\
  \ 对象要么持有返回值，要么持有一个异常。这是任何非 void 的 Java 计算中仅有的两种可能。`Result` 类型，如同 `Optional` 类型，可以提供便捷的\
  \ API 来访问其内容。\n\n我们之前使用过 `Result` 对象，但现在让我们看看如何重新实现这样一个类型。我们想要存储一个返回值或一个异常，这意味着我们可以有两个字段。我们期望在任何时刻，其中一个字段为\
  \ null，另一个字段非 null。如果你传入一个返回值，我们称之为“成功”的 Result 实例。如果你传入一个异常，我们称之为“失败”的 Result 实例。由于结果和异常字段的类型取决于调用者的上下文，我们将它们设为类型变量。为了给用户提供更好的使用体验，我们可以使用静态方法而不是暴露构造函数：静态方法可以欺骗\
  \ Java 类型系统为你做更多的类型推断工作，而不必在整个代码中重复类型信息。我们还将提供五个访问器来访问我们的状态：两个布尔访问器，仅检查结果是成功还是失败；两个直接访问器，返回其字段的状态；以及一个组合访问器，如果成功则返回成功值，如果失败则抛出失败值。使用这个类型，我们就可以实现基本的行内流错误处理。Result\
  \ 的实现和错误处理如清单 7-6 所示。\n\n**清单 7-6. 使用 Result 类型处理资源**\n\n`import java.io.ByteArrayInputStream;`\n\
  \n`import java.io.IOException;`\n\n`import java.io.InputStream;`\n\n`import java.util.*;`\n\
  \n`import java.util.concurrent.atomic.*;`\n\n`import java.util.function.*;`\n\n\
  `import java.util.stream.*;`\n\n`public class Listing6 {`\n\n`public static class\
  \ Result<SUCCESS_T, FAILURE_T extends Exception> {`\n\n`private final SUCCESS_T\
  \ success;`\n\n`private final FAILURE_T failure;`\n\n`private Result(final SUCCESS_T\
  \ success, final FAILURE_T failure) {`\n\n`if (success == null && failure == null)\
  \ {`\n\n`throw new IllegalArgumentException(`\n\n`\"Success and failure cannot both\
  \ be null\");`\n\n`}`\n\n`if (success != null && failure != null) {`\n\n`throw new\
  \ IllegalArgumentException(`\n\n`\"Success and failure cannot both be non-null\"\
  );`\n\n`}`\n\n`this.success = success;`\n\n`this.failure = failure;`\n\n`}`\n\n\
  `public static <SUCCESS_T, FAILURE_T extends Exception>`\n\n`Result<SUCCESS_T, FAILURE_T>\
  \ ofFailure(FAILURE_T failure)`\n\n`{`\n\n`Objects.requireNonNull(failure, \"failure\
  \ to assign is null\");`\n\n`return new Result(null, failure);`\n\n`}`\n\n`public\
  \ static <SUCCESS_T, FAILURE_T extends Exception>`\n\n`Result<SUCCESS_T, FAILURE_T>\
  \ ofSuccess(SUCCESS_T success)`\n\n`{`\n\n`Objects.requireNonNull(success, \"success\
  \ to assign is null\");`\n\n`return new Result<>(success, null);`\n\n`}`\n\n`public\
  \ boolean isSuccess() { return success != null; }`\n\n`public boolean isFailure()\
  \ { return failure != null; }`\n\n`/**`\n\n`* 成功时提供结果，失败时抛出失败异常。`\n\n`*`\n\n`* @return\
  \ 成功时的成功值。`\n\n`* @throws FAILURE_T 如果此结果不成功。`\n\n`*/`\n\n`public SUCCESS_T get()\
  \ throws FAILURE_T {`\n\n`if (success != null) return success;`\n\n`throw failure;`\n\
  \n`}`\n\n`/**`\n\n`* 返回成功值，如果此结果是失败则返回 {@code null}。`\n\n`*`\n\n`* @return 成功值或\
  \ {@code null}。`\n\n`*/`\n\n`public SUCCESS_T getSuccess() {`\n\n`return success;`\n\
  \n`}`\n\n`/**`\n\n`* 返回失败值，如果此结果是成功则返回 {@code null}。`\n\n`*`\n\n`* @return 失败值或\
  \ {@code null}。`\n\n`*/`\n\n`public FAILURE_T getFailure() {`\n\n`return failure;`\n\
  \n`}`\n\n`@Override`\n\n`public String toString() {`\n\n`if (isSuccess()) {`\n\n\
  `return \"SUCCESS[\" + success + \"]\";`\n\n`} else {`\n\n`return \"FAILURE[\" +\
  \ failure + \"]\";`\n\n`}`\n\n`}`\n\n`}`\n\n`public static InputStream generateInputStream()\
  \ {`\n\n`return new ByteArrayInputStream(\"foobar\".getBytes());`\n\n`}`\n\n`public\
  \ static Stream<Integer> generateParallelStream() {`\n\n`final int elements = 1000;`\n\
  \n`List<Integer> toReturn = new ArrayList(elements);`\n\n`for (int i = 0; i < elements;\
  \ i++) {`\n\n`toReturn.add(i);`\n\n`}`\n\n`return toReturn.parallelStream();`\n\n\
  `}`\n\n`public static Function<Integer, Result<Integer, IOException>> generateMap()\
  \ {`\n\n`AtomicInteger counter = new AtomicInteger(0);`\n\n`return i -> {`\n\n`int\
  \ count = counter.incrementAndGet();`\n\n`try (InputStream in = Listing3.generateInputStream())\
  \ {`\n\n`if (i == 100) {`\n\n`return Result.ofFailure(`\n\n`new IOException(`\n\n\
  `\"And with a kiss, I die! (After \" + count + \" executions)\")`\n\n`);`\n\n`}`\n\
  \n`return Result.ofSuccess(i);`\n\n`} catch (IOException ioe) {`\n\n`return Result.ofFailure(ioe);`\n\
  \n`}`\n\n`};`\n\n`}`\n\n`public static void main(String[] args) {`\n\n`// 执行流处理`\n\
  \n`generateParallelStream()`\n\n`.map(generateMap())`\n\n`.forEach(result -> {`\n\
  \n`if (result.isFailure()) {`\n\n`result.getFailure().printStackTrace(System.err);`\n\
  \n`System.err.flush();`\n\n`} else {`\n\n`System.out.println(result.getSuccess());`\n\
  \n`System.out.flush();`\n\n`}`\n\n`}`\n\n`);`\n\n`}`\n\n`}`\n\n这种方法更安全、更清晰，因为它要求用户在错误处理方面更加有意识，同时也为他们提供了执行该错误处理所需的信息。它还允许你在流处理过程中处理错误，而不必等到之后。这种方法的缺点是，它不太容易包装现有的基于资源的代码：你必须首先将结果包装在\
  \ `Result` 对象中，而不是将你想要实现的整个方法包装在某个辅助对象中。\n\n当你在 Java 中处理资源时，你是在使用一种不同风格的语法糖：它对后函数式代码并不特别友好，但对于之前的命令式代码来说，它是一个非常好的好处。你连接范式所采用的具体方法取决于你特定系统的需求，但你越早能够封装丑陋之处并完全进入后函数式世界，你的代码就会越令人满意。\n\
  \n\n## 连接集合与流\n\n在 Java 引入流之前，其主要的大批量操作模式是通过集合 API 进行的。曾有人尝试创建批量集合操作（称为“推导式”），甚至有人尝试将\
  \ `Iterator` 类转变为与当代流非常相似的东西。然而，该 API 实际上并不适用于后函数式风格的工作，并且始终存在一些与流方法配合不佳的粗糙边缘：这就是\
  \ Java 引入一套全新 API 的原因。\n\n好消息是，从 `collection` 类型的实例转换为流非常容易：只需分别调用 `collection.stream()`\
  \ 或 `collection.parallelStream()` 方法即可获得顺序流或并行流。对于 `Map` 类型的实例，你首先需要指定是要获取映射的键集、条目集还是值集合，然后就可以从中获取你选择的流。`Map`\
  \ 类型和 `Collection` 类型都有一个接受消费者的 `forEach` 方法：它实际上是 `collection.stream().forEach(Consumer)`\
  \ 的简写，并且当你不需要知道索引时，在任何情况下，此方法都应该取代你的 for 循环。\n\n然而，从流转换回集合则稍微棘手一些。`Stream` 类型上没有\
  \ `.toList()` 方法，尽管这本来会很方便。一种选择是使用将流转换为数组的方法之一，然后使用 `Arrays.asList(Array)` 来获取你想要的列表。结果将是一个包含所有流元素的固定大小（但非不可变）的列表。清单\
  \ 7-7 给出了该方法的基本演示，如果你打算采用这种方法，请务必阅读下一节关于数组的内容。\n\n**清单 7-7. 通过 toArray() 将流连接到集合**\n\
  \n`import java.util.*;`\n\n`import java.util.stream.*;`\n\n`public class Listing7\
  \ {`\n\n`public static Stream<Integer> generateParallelStream() {`\n\n`final int\
  \ elements = 1000;`\n\n`List<Integer> toReturn = new ArrayList<>(elements);`\n\n\
  `for (int i = 0; i < elements; i++) {`\n\n`toReturn.add(i);`\n\n`}`\n\n`return toReturn.parallelStream();`\n\
  \n`}`\n\n`public static void main(String[] args) {`\n\n`// 执行流处理`\n\n`List<Object>\
  \ list = Arrays.asList(generateParallelStream().toArray());`\n\n`}`\n\n`}`\n\n如果你有一些现有的列表想要向其中添加元素，那么你可以简单地使用\
  \ `List.add` 方法作为你的消费者。该方法从技术上讲返回 `boolean`，因此它并不完全符合 `Consumer` 的精确形状，但 Java 允许你在此处变通规则。如果你在流操作之前就有一个列表，那么只需将该列表的\
  \ `list::add` 方法传递给流的 `forEach` 即可。类似的方法也适用于将流元素添加到现有集合。唯一的注意事项是，如果你使用的是并行流，则需要确保使用的是线程安全的集合，因为它的\
  \ add 方法将从多个线程中被调用。清单 7-8 演示了这种方法。\n\n**清单 7-8. 使用 Add 将流连接到集合**\n\n`import java.util.*;`\n\
  \n`import java.util.concurrent.*;`\n\n`import java.util.stream.*;`\n\n`public class\
  \ Listing8 {`\n\n`public static Stream<Integer> generateParallelStream() {`\n\n\
  `final int elements = 1000;`\n\n`List<Integer> toReturn = new ArrayList<>(elements);`\n\
  \n`for (int i = 0; i < elements; i++) {`\n\n`toReturn.add(i);`\n\n`}`\n\n`return\
  \ toReturn.parallelStream();`\n\n`}`\n\n`public static void main(String[] args)\
  \ {`\n\n`// 执行流处理`\n\n`List<Integer> list = new CopyOnWriteArrayList<>();`\n\n`generateParallelStream().forEach(list::add);`\n\
  \n`}`\n\n`}`\n\n请注意，如果你要添加元素的集合不是线程安全的，并且你的流是并行流，那么你可以使用 `Collection.synchronizedList(List)`（或相关方法）来同步它。这可以内联完成，从而创建如下代码行：\n\
  \n`generateParallelStream().forEach(Collections.synchronizedList(list)::add);`\n\
  \n如果你希望你的流生成一个不可变列表或集合，那么最简单的方法是使用 Google 的 Guava 库。在其他不可变类型中，Guava 库提供了 `ImmutableList`\
  \ 和 `ImmutableSet`（以及其他不可变类型），并且为这些不可变类型中的每一种都提供了构建器类型。这些构建器类型的 add 方法与我们之前看到的列表的\
  \ add 方法一样好用。这些构建器也都是线程安全的，因此可以安全地与并行流一起使用。清单 7-9 给出了这种用法的一个示例。如果你只是在一个方法内构建你的集合，然后将其作为最后一步返回给用户，这种方法尤其有效。\n\
  \n**清单 7-9. 使用构建器将流连接到集合**\n\n`import com.google.common.collect.ImmutableList;`\n\
  \n`import java.util.*;`\n\n`import java.util.stream.*;`\n\n`public class Listing9\
  \ {`\n\n`public static Stream<Integer> generateParallelStream() {`\n\n`final int\
  \ elements = 1000;`\n\n`List<Integer> toReturn = new ArrayList<>(elements);`\n\n\
  `for (int i = 0; i < elements; i++) {`\n\n`toReturn.add(i);`\n\n`}`\n\n`return toReturn.parallelStream();`\n\
  \n`}`\n\n`public static void main(String[] args) {`\n\n`// 执行流处理`\n\n`ImmutableList.Builder<Integer>\
  \ builder = ImmutableList.builder();`\n\n`generateParallelStream().forEach(builder::add);`\n\
  \n`ImmutableList list = builder.build();`\n\n`}`\n\n`}`\n\n最后，如果你想要特别精巧且高效地处理事情，你可以使用\
  \ Stream API 的 `Collector` 部分。Stream API 的 `Collector` 部分提供了一种专门的归约逻辑，其结果是对现有元素的组合。在\
  \ `java.util.stream.Collectors` 类中可以找到许多 `Collector` 实现的示例。其中包括 `Collectors.toList()`、`Collectors.toSet()`\
  \ 和 `Collectors.toCollection(Supplier)`。这些方法中的每一个都返回一个 `Collector` 实例，并将其传递给 `stream.collect(Collector)`。`Collectors.toList()`\
  \ 和 `Collectors.toSet()` 都如其名：它们返回一个 `List` 或 `Set`。但是，不保证结果集合的可变性程度、其可序列化性或其线程安全性。如果你想要更具体地指定返回的内容，可以调用\
  \ `Collectors.toCollection(Supplier)`。`Supplier` 负责提供你所需类型的集合，并且假定每次调用该供应器时，它都会提供一个新实例。因此，作为供应器传递的最简单的东西就是构造函数本身，例如\
  \ `CopyOnWriteArrayList::new`。这会产生如清单 7-10 所示的代码，该代码既简洁又高效。\n\n**清单 7-10. 使用收集器将流连接到集合**\n\
  \n`import java.util.*;`\n\n`import java.util.concurrent.*;`\n\n`import java.util.stream.*;`\n\
  \n`public class Listing10 {`\n\n`public static Stream<Integer> generateParallelStream()\
  \ {`\n\n`final int elements = 1000;`\n\n`List<Integer> toReturn = new ArrayList<>(elements);`\n\
  \n`for (int i = 0; i < elements; i++) {`\n\n`toReturn.add(i);`\n\n`}`\n\n`return\
  \ toReturn.parallelStream();`\n\n`}`\n\n`public static void main(String[] args)\
  \ {`\n\n`// 执行流处理`\n\n`List<Integer> list = generateParallelStream()`\n\n`.collect(Collectors.toCollection(CopyOnWriteArrayList::new));`\n\
  \n`}`\n\n`}`\n\n\n\n### 桥接数组与流\n\n在数组和流之间来回转换实际上非常简单。要从数组获取流，请使用 `Stream.of(array)`。要从流获取数组，你有两种选择：要么接受一个\
  \ `Object` 实例数组并调用 `Stream.toArray()`；要么向该方法传递一种构造指定大小数组的方式，它将返回构造好的数组。定义供应器最简单的方法是传入数组构造器，例如\
  \ `Integer[]::new`。清单 7-11 演示了如何从数组转换为流以及从流转换为数组。\n\n**清单 7-11\\. 桥接数组与流**\n\n`import\
  \ java.util.stream.*;`\n\n`public class Listing11 {`\n\n  `public static Integer[]\
  \ generateArray() {`\n\n    `final Integer[] elements = new Integer[1000];`\n\n\
      `for (int i = 0; i < elements.length; i++) {`\n\n      `elements[i] = i;`\n\n\
      `}`\n\n    `return elements;`\n\n  `}`\n\n  `public static void main(String[]\
  \ args) {`\n\n    `Integer[] array = generateArray();`\n\n    `Stream<Integer> stream\
  \ = Stream.of(array);`\n\n    `array = stream.toArray(Integer[]::new);`\n\n  `}`\n\
  \n`}`\n\n## 让接口对 Lambda 更友好\n\nJava SDK 中的许多接口都只有一个非默认方法。`Runnable`、`Callable`、`AutoCloseable`\
  \ 以及许多其他最常见的接口都是如此。这些接口可以直接使用 lambda 来实现，只需在需要该接口的地方使用 lambda 即可。我们在代码中经常看到这种技巧，最近一次是在清单\
  \ 7-5 中，我们在 `generateMap()` 中返回了一个 lambda 作为 `ResourceExceptionHandler.FunctionWithResource`\
  \ 的实现。因此，这些单方法接口已经可以很好地与 lambda 配合使用。其余的大部分接口都非常庞大，例如 `Collection`，显然无法通过单个 lambda\
  \ 来实现其全部功能。\n\n然而，SDK 中有一小部分接口——以及用户代码中的相当一部分接口——只有少数几个非默认方法，你可能非常希望能够通过 lambda\
  \ 内联定义其实现。这是一个非常有用的技巧，但你无法使用 lambda 同时定义多个方法，而我们需要同时定义多个方法。我们该怎么做呢？\n\n这就需要发挥一些创造力了。技巧在于定义一个新的单一方法，该方法可用于驱动所有其他方法的实现。然后用户指定这个新方法，我们的代码将委托给该新方法的实现。这个新方法和委托实现被放入一个扩展了目标接口的新接口中。\n\
  \n例如，假设我们想要创建一个可以用 lambda 定义的 `Iterator`。`Iterator` 上有两个非默认方法：`hasNext()` 和 `next()`。两者都与下一个元素有关，但前者测试是否存在而不前进，而后者则前进。因此，我们的单一方法需要能够在前进和非前进两种模式下运行。由于\
  \ `hasNext` 也可能查看迭代器的末尾之外（那里没有元素），我们的单一方法需要可选地返回其结果。结果就是这个方法：\n\n`Optional<E> maybeNext(boolean\
  \ advance);`\n\n有了这个方法，我们就可以使用默认方法在迭代器中定义其他两个方法。对于 `next()`，我们调用 `maybeNext` 并传入\
  \ `true` 以进行前进。我们得到一个 `Optional` 结果，并使用 Optional API 要么返回其包含的值，要么抛出 `NoSuchElement`\
  \ 异常。对于 `hasNext()`，我们调用 `maybeNext` 并传入 `false` 以避免前进。然后我们只需让调用者知道结果是否存在。所有这些都放入我们扩展了\
  \ `Iterator` 的新接口中。现在，用户可以将 lambda 赋值给这个类型，从而得到一个 Iterator。这段代码以及其工作原理的演示，见清单 7-12。\n\
  \n**清单 7-12\\. 让 Iterator 对 Lambda 更友好**\n\n`import java.util.*;`\n\n`import java.util.concurrent.atomic.*;`\n\
  \n`public class Listing12 {`\n\n`public interface LambdaIterator<E> extends Iterator<E>\
  \ {`\n\n`Optional<E> maybeNext(boolean advance);`\n\n`default E next() {`\n\n`return\
  \ maybeNext(true).orElseThrow(NoSuchElementException::new);`\n\n`}`\n\n`default\
  \ boolean hasNext() {`\n\n`return maybeNext(false).isPresent();`\n\n`}`\n\n`}`\n\
  \n`public static Iterator<String> generateIterator() {`\n\n`String[] values = new\
  \ String[]{\"Hello\", \" \", \"World\"};`\n\n`AtomicInteger nextI = new AtomicInteger(0);`\n\
  \n`LambdaIterator<String> it = advance -> {`\n\n`if (nextI.get() >= values.length)\
  \ return Optional.empty();`\n\n`String result = values[nextI.get()];`\n\n`if (advance)\
  \ nextI.incrementAndGet();`\n\n`return Optional.of(result);`\n\n`};`\n\n`return\
  \ it;`\n\n`}`\n\n`public static void main(String[] args) {`\n\n`Iterator<String>\
  \ it = generateIterator();`\n\n`}`\n\n`}`\n\n这种方法的最大技巧在于，你必须想出一个巧妙的单一方法，能够处理任何给定方法的所有需求。你的超级方法确实可以访问接口中的其他方法，但如果你使用了这些其他方法，就需要格外小心，以免产生递归循环。想出一个好的单一方法，是那种应该能让你作为开发者感到兴奋的问题。\n\
  \n\n\n## 通过 Lambda 实现抽象类\n\n在 Java 8 中，Lambda 表达式与接口相辅相成。它们实际上是同一底层功能的两种不同语法。不过，抽象类也能从\
  \ Lambda 的引入中获益。虽然语法不如接口那么优雅，但比传统的匿名内部类定义方式更加清晰。\n\n与接口类似，其目标是将所有未定义方法的实现缩减为单个语句。但在此场景下，我们将尝试构建一个接受\
  \ Lambda 的构造函数，而非直接使用 Lambda。用户需要调用我们的构造函数（这不如直接使用 Lambda 方便），但这为我们提供了更大的操作空间：除了实现\
  \ Lambda 外，我们还可以接受其他配置值。\n\n为了具体了解其工作原理，让我们看看 `AbstractCollection`。假设我们希望通过 Lambda\
  \ 来实现一个 `AbstractCollection`。`AbstractCollection` 的两个抽象方法如下：\n\n`public abstract\
  \ Iterator<E> iterator()`\n\n`public abstract int size()`\n\n我们将通过向构造函数传递一个 Lambda\
  \ 以及可能的其他参数来实现这两个方法。我们当然可以在构造函数中接受 size 作为参数，这样 `iterator()` 方法就留给 Lambda 实现。因此，我们需要用户提供类似\
  \ `Supplier<Iterator<E>>` 的东西作为 Lambda 参数。当然，我们会为该供应者提供一个接口类型，以便用户确切了解我们的需求。我们将这种集合称为\
  \ `LambdaCollection`。\n\n为了演示如何使用我们的 `LambdaCollection`，假设我们希望将文件的行视为一个集合，并且愿意以低效（但有效）的方式实现。在这种情况下，我们可以定义一种方法，将文件的行转换为文件行的迭代器，这就是我们的\
  \ Lambda。此外，我们还需要在开始时遍历一次文件以获取大小。我们在清单 7-13 中展示了 `LambdaCollection` 的代码以及此用例。\n\n\
  **清单 7-13. 使用 Lambda 实现抽象类型**\n\n`import java.io.File;`\n\n`import java.io.IOException;`\n\
  \n`import java.io.UncheckedIOException;`\n\n`import java.nio.file.Files;`\n\n`import\
  \ java.nio.file.Path;`\n\n`import java.util.*;`\n\n`public class Listing14 {`\n\n\
  `public static class LambdaCollection<E> extends AbstractCollection<E> {`\n\n`private\
  \ final int size;`\n\n`private final Listing14.LambdaCollection.IteratorFactory<E>\
  \ factory;`\n\n`/**`\n\n`* 定义获取 {@link java.util.Iterator} 的方式。`\n\n`*/`\n\n`public\
  \ interface IteratorFactory<E> {`\n\n`/**`\n\n`* 创建 {@link java.util.Iterator} 的新实例。`\n\
  \n`* 每次调用此方法时，迭代器都应是全新的，`\n\n`* 但它应始终迭代相同的源。`\n\n`*`\n\n`* @return 一个新的 {@code Iterator}；绝不能为\
  \ {@code null}。`\n\n`*/`\n\n`Iterator<E> create();`\n\n`}`\n\n`public LambdaCollection(int\
  \ size, IteratorFactory<E> factory) {`\n\n`this.size = size;`\n\n`this.factory =\
  \ factory;`\n\n`}`\n\n`/**`\n\n`* 返回此集合中元素的迭代器。`\n\n`*`\n\n`* @return 此集合中元素的迭代器`\n\
  \n`*/`\n\n`@Override`\n\n`public Iterator<E> iterator() {`\n\n`return factory.create();`\n\
  \n`}`\n\n`@Override`\n\n`public int size() {`\n\n`return size;`\n\n`}`\n\n`}`\n\n\
  `public static Path generateFile() throws IOException {`\n\n`File file = File.createTempFile(\"\
  example\", \"tmp\");`\n\n`file.deleteOnExit();`\n\n`Path path = file.toPath();`\n\
  \n`Files.write(path, \"this\\nis\\nour\\nfile\".getBytes(\"UTF-8\"));`\n\n`return\
  \ path;`\n\n`}`\n\n`public static void main(String[] args) throws Exception {`\n\
  \n`Path file = generateFile();`\n\n`Collection<String> collection = new LambdaCollection<>(`\n\
  \n`(int) Files.lines(file).count(),`\n\n`() -> {`\n\n`try {`\n\n`return Files.lines(file).iterator();`\n\
  \n`} catch (IOException ioe) {`\n\n`throw new UncheckedIOException(`\n\n`\"从 \"\
  \ + file + \" 读取行时出错\", ioe);`\n\n`}`\n\n`}`\n\n`);`\n\n`}`\n\n`}`\n\n从清单 7-13 中需要认识到关键点是：我们将抽象方法的实现委托给了\
  \ Lambda。该 Lambda 被传递到构造函数中。这是使用 Lambda 实现抽象方法的基本模式。你可能会倾向于在构造函数中接受多个 Lambda，从而实现更多的抽象元素。但不要这样做，原因有二：首先，这会鼓励人们在应该使用可重用类时创建临时类；其次，这会导致代码难以阅读，而\
  \ Java 已有的匿名内部类定义格式在此场景下已经足够好用。这正是 Lambda 反而会降低可读性的一个特例。\n\n\n\n## 透明可选技巧\n\n这是处理遗留代码的最后一个非常有用的技巧。这个技巧是一种处理空值的方法。当\
  \ Java 遇到空值时，它会抛出令人厌烦且无处不在的 `NullPointerException`。`NullPointerException` 的消息如下所示：\n\
  \n`Exception in thread \"main\" java.lang.NullPointerException`\n\n任何有经验的 Java 开发人员都知道，这是一条完全没有帮助的消息。首先，甚至不清楚哪个值是空值，因此该行上的任何内容都可能导致问题。该错误消息中也没有传达应用程序的任何状态。这条消息的效用极其有限，这也是应尽快将空值从代码库中彻底清除的原因之一。既然我们已经有了\
  \ `Optional`，就完全没有必要使用空值了。\n\n当然，遗留代码没有 `Optional`，而且遗留开发人员可能不像我们现在这样开明。但是，我们可以摆脱空值，同时以一种透明的方式提供更有用的错误消息。这个技巧是在内部使用可选值，同时在外部提供（基本）一致的\
  \ API。实现一致 API 的要求是，如果值为空，则抛出 `NullPointerException`，我们可以使用 `Optional.orElseThrow(Supplier<Exception>)`\
  \ 方法来实现。此外，我们提供一种将值作为 Optional 获取的方法，这样真正想检查值是否存在的人就可以通过这种方式进行检查。其意图是代码最终会迁移到直接对\
  \ Optional 类型进行操作的访问器上，因此我们可以弃用旧的 setter。作为一种语法上的便利，最好保留一个通过 `Optional.ofNullable(Object)`\
  \ 直接设置值的 setter：如果你提供了该 setter 的重载，那么调用者就不必自己包装原始值了。清单 7-14 给出了此实现的一个示例。\n\n**清单\
  \ 7-14\\. 向 Optional 迁移的 Bean 示例**\n\n`import java.util.*;`\n\n`public class SomeBean\
  \ {`\n\n    `private int id = 0;`\n\n    `private Optional<String> name = Optional.empty();`\n\
