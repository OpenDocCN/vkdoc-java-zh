- '# 3. Lambda 的领域：集合、映射和流


  在上一章中，我们了解了 lambda 本身是如何工作的，但我们明确地专注于 lambda，而没有为它们的使用创建上下文。我们将 lambda 从其自然环境中提取出来，以便在显微镜下分析它们。在本章中，我们将开始看到
  lambda 在现实世界中的应用。


  具体来说，我们将看到 lambda 如何与熟悉的集合和映射结构一起使用。然而，集合和映射实际上限制了 lambda 的能力。为了发挥其真正的威力，Java 引入了一个使用旧词的新概念：流。本章将以对
  Java 8 流的分析作为结尾，并探讨这些函数式流如何实现新的代码复用和表达能力形式。


  本章将比上一章更具体，我们将围绕一个特定的例子展开。这个特定的例子将包含一些特定的用例，在这些用例中 lambda 将帮助我们。然而，要理解这一切，我们首先必须了解
  Java 8 的 lambda 从何而来。这要求我们快速返回函数式编程语言的奇异世界。




  ## Lambda 表达式与函数式编程


  Java 8 的 lambda 表达式源自函数式编程的世界。函数式编程基于数学函数来构建计算机程序。在函数式编程中，lambda 表达式本身就代表了函数。然而，每个数学函数都作用于一组特定的可能输入，并产生一组特定的可能输出。这些输入被称为“函数的定义域”，输出则被称为“函数的值域”。


  从抽象层面来看，lambda 表达式的类型代表了函数的定义域和值域。`Function` 接口的 Java 类型是 `Function<T,U>`：`T` 是其定义域，`U`
  是其值域。这就是类型在函数式编程世界中如此有用的原因：类型让你能够清晰地传达函数的定义。对于阅读 API 的开发者来说，类型允许他们简洁地描述你期望接收什么以及你将返回什么。编译器也会读取这些类型，并利用这些类型对你的代码进行推理，从而提供其他方式无法实现的优化。


  然而，抽象只能带你走到一定程度。迟早，你必须针对真实数据执行你的代码。你可能会构建出有史以来最优雅的函数应用链，但在将它们应用到某些东西上之前，它们不会为你完成任何任务。在函数式编程方法中，你的应用程序目标很简单：收集所有你关心的领域对象，并将它们输入到函数中。那么，是什么东西提供了这些供函数操作的领域对象呢？


  如果你与普通的 Java 开发者谈论收集对象，他会想到 `Collection` 类及其相关 API。从历史上看，这就是函数式 Java 代码的编写方式：你获取一个集合，对每个元素应用一个函数，然后返回结果集合。以这种方式作用于集合的函数被称为“推导式”。Java
  8 使得推导式成为可能，我们将在本章中介绍支持推导式的 API。这种方法对于已知项目的相对较小的集合非常有效，并且对于 Java 开发者来说是一个非常自然的演进。


  然而，也存在一些严重的局限性。最明显的局限性是 `Collection` API 假定所有数据都在内存中，或者至少是随手可得的。如果你正在处理数据库中的所有行或文件中的所有单词，情况可能并非如此。一个更微妙的后果是，将一系列这样的操作链接在一起会创建一系列中间集合，每个集合的大小大致相同，这纯粹是一种浪费。最后，大多数
  `Collection` API 不是线程安全的，或者只有有限的线程安全特性，这限制了 lambda 表达式的并发能力。


  为了解决这个问题，Java 8 引入了“函数式流”的概念。“流”这个术语在 Java 中已有既定用法，而函数式流是这个旧概念的新应用。传统上，“流”指的是 Java
  的 I/O 世界，其中 I/O 流代表一个字节序列。大多数 Java 开发者习惯于使用这些流，并且知道如何通过装饰器模式对它们的字节进行包装、扭曲和操作，同时始终保持在
  `InputStream` API 的范围内。这是一种实现显著代码复用的强大方式。


  函数式流类似于这些 I/O 流，但它们作用于对象序列而不是字节序列。对象在流经流时可以被包装、扭曲和操作，我们可以获得同样的复用性。得益于 lambda 表达式的引入，我们不再需要装饰器模式：我们可以简单地将我们的实现传递给
  `Stream` 对象本身，并得到一个新的 `Stream` 作为返回。




  函数式流比集合方法更有效，因为你不需要预先在集合中准备好所有数据，而且 Java 运行时可以在可能时自动利用并发执行的机会。由此产生的 API 非常强大，尽管对于
  Java 开发者来说可能有些令人生畏：它来自一个不同的世界，因此一开始可能不太直观。本章的其余部分将致力于让流变得易于理解；当我们完成时，你应该能像使用 `Collection`
  和 `Iterator` 类一样直观地使用它们。


  为此，让我们从已经熟悉的 `Collection` 接口开始。与上一章抽象地讨论不同，这里我们设定一个更具体的例子。假设我们有一个 `Library` 类。该类的实例以任意但有意义的顺序存储
  `Book` 对象；类的使用者设定书籍的顺序，我们不想打乱它。基于这个需求，我们在每个 `Library` 实例中存储一个 `List<Book>` 实例。此外，`Library`
  必须提供“特色书籍”的功能。有些书籍会被特别标记为特色，并可选地附带一条特定的特色信息。为了提供这个功能，我们在每个 `Library` 实例中存储一个 `Map<Book,String>`
  实例。


  `Library` 和 `Book` 的起始代码如清单 3-1 所示。在本章的其余部分，我们将使用 Java 8 提供的新函数式工具为我们的 `Library`
  类构建功能。


  **清单 3-1. Library 和 Book 类**


  `import java.util.Objects;`


  `/**`


  `* 表示 {@link Library} 中元素的类。`


  `*/`


  `public class Book {`


  `/**`


  `* 表示书籍允许的体裁。`


  `*/`


  `public static enum Genre {`


  `HORROR, COMEDY, TECHNICAL;`


  `}`


  `private final String title;`


  `private final String author;`


  `private final Genre genre;`


  `/**`


  `* 构造函数。`


  `*`


  `* @param title  书籍的标题；不能为 {@code null}。`


  `* @param author 书籍的作者；不能为 {@code null}。`


  `* @param genre  书籍的体裁；不能为 {@code null}。`


  `*/`


  `public Book(final String title, final String author, final Genre genre) {`


  `Objects.requireNonNull(title, "title of the book");`


  `this.title = title;`


  `Objects.requireNonNull(author, "author of the book");`


  `this.author = author;`


  `Objects.requireNonNull(genre, "genre of the book");`


  `this.genre = genre;`


  `}`


  `@Override`


  `public String toString() {`


  `return "\"" + title + "\" by " + author +`


  `" (" + genre.toString().toLowerCase() + ")";`


  `}`


  `@Override`


  `public int hashCode() {`


  `int result = title.hashCode();`


  `result = 17 * result + author.hashCode();`


  `result = 31 * result + genre.hashCode();`


  `return result;`


  `}`


  `@Override`


  `public boolean equals(final Object o) {`


  `if (o == null) return false;`


  `if (this == o) return true;`


  `if (!(o instanceof Book)) return false;`


  `final Book book = (Book) o;`


  `if (!author.equals(book.author)) return false;`


  `if (genre != book.genre) return false;`


  `if (!title.equals(book.title)) return false;`


  `return true;`


  `}`


  `}`


  `import java.util.List;`


  `import java.util.Map;`


  `import java.util.Objects;`


  `import java.util.ArrayList;`


  `import java.util.HashMap;`


  `/**`


  `* 表示 {@link Book} 对象集合的类。{@code Book}`


  `* 对象以用户定义的顺序存储，默认为插入顺序。`


  `* 用户还可以将某个 {@code Book} 指定为 <i>特色</i>，`


  `* 并可选择附带一条 <i>特色信息</i>。`


  `*/`


  `public class Library {`


  `private final List<Book> books = new ArrayList<>();`


  `private final Map<Book, String> featuredBooks = new HashMap<>();`


  `/**`


  `* 将一本书添加到书籍列表的末尾。`


  `*`


  `* @param book 要添加的书籍；不能为 {@code null}。`


  `*/`


  `public void addBook(Book book) {`


  `Objects.requireNonNull(book, "book to add");`


  `this.books.add(book);`


  `}`


  `/**`


  `* 将一本书添加到书籍列表的末尾，并将其作为特色书籍添加，附带给定的信息。`


  `*`


  `* @param book    要添加的书籍；不能为 {@code null}。`


  `* @param message 特色信息，可以为 {@code null}。`


  `*/`


  `public void addFeaturedBook(Book book, String message) {`


  `this.addBook(book);`


  `this.featuredBooks.put(book, message);`


  `}`


  `/**`


  `* 提供对书籍列表的直接访问。修改返回的集合将修改图书馆中的书籍。`


  `*`


  `* @return 此图书馆中的书籍；绝不会为 {@code null}。`


  `*/`


  `public List<Book> getBooks() {`


  `return this.books;`


  `}`


  `/**`


  `* 提供对特色书籍列表的直接访问。修改返回的映射将修改特色书籍及其信息。`


  `*`


  `* @return 此图书馆中的特色书籍映射到它们的（可能为 {@code null}）信息；绝不会为 {@code null}。`


  `*/`


  `public Map<Book, String> getFeaturedBooks() {`


  `return this.featuredBooks;`


  `}`


  `}`




  ## 函数式迭代


  后函数式语言社区引以为傲的标志之一，就是没人再使用 `for` 循环了。摒弃 `for` 关键字已成为代码的最低可接受标准，并以正义的热忱加以执行。取而代之的是，这些语言提供了迭代器方法。Java
  8 通过 `forEach` 和 `forEachRemaining` 方法，加入了这些后函数式语言的行列。


  `Iterable` 接口现在提供了一个 `forEach` 方法。有些 Java 开发者仍然不知道 `Iterable` 接口，它是在 Java 5 中引入的。它是所有能够提供
  `Iterator` 的 Java SDK 类的基类，也是支持 Java 5 中引入的增强型 `for` 循环的类。由于新的 `forEach` 方法位于这个广泛实现的接口上，因此所有实现该接口的类现在也都拥有了
  `forEach` 方法。


  从语义上讲，`forEach` 方法与 `for` 循环是相同的：它接受一个 `Consumer`，并针对循环中的每个元素执行它。然而，在实践中，它是一个“由内向外”的
  `for` 循环。`forEach` 方法不是创建一个遍历集合并为每次迭代执行一系列步骤的结构，而是将一系列步骤提供给集合，然后集合按顺序将其应用于每个元素。这使得集合实现能够以最高效的方式执行迭代。更棒的是，代码更加简洁易读，如清单
  3-2 所示。


  **清单 3-2. 使用增强型 for 循环和 forEach 打印每本书**


  `for (Book book : library.getBooks()) {`


  `System.out.println(book);`


  `}`


  `library.getBooks().forEach(System.out::println);`


  不过，如果你有一些遗留代码，其中提供了一个 `Iterator`，你仍然可以使用函数式替代方案来替代循环。在这种情况下，方法是 `forEachRemaining`，它将
  lambda 应用于迭代器中所有剩余的元素，并在过程中耗尽迭代器。


  对于 `Map.forEach` 来说，情况略有不同。从历史上看，Java 希望你将其视为提供对 `Map.Entry` 对象集合的访问。随着 Java 8 lambda
  的出现，它们正在打破这种模式：`Map.forEach` 方法不接受 `Map.Entry` 对象的 `Consumer`，而是接受键值对的 `BiConsumer`。一方面，这使得内联实现看起来相当不错，例如清单
  3-3 所示：不再需要调用 `entry.getKey()` 和 `entry.getValue()`。另一方面，`BiConsumer` 是一种特殊的函数式类型，很少有
  lambda 操作或现有的方法定义能很好地与之配合。


  **清单 3-3. 使用 Map 版本的 forEach 打印每本精选书籍**


  `library.getFeaturedBooks().forEach(`


  `(book, msg) ->  System.out.println(book + ": " + msg)`


  `);`


  了解了这些方法后，你现在可以编写再也不使用 `for` 循环的 Java 代码，使你的代码符合后函数式程序员的标准。这种对迭代器方法的热情中具有讽刺意味的是，在函数式编程中你几乎从不使用迭代器方法。原因在于返回值：它在
  Java 中是 `void`，在几乎所有语言中同样毫无用处。这意味着它是函数构建的一个硬性障碍：对于函数式程序员来说，从迭代器方法出发无处可去。因此，它的实用性完全依赖于副作用，这与整个函数式编程范式背道而驰。例如，在清单
  3-3 中，函数式程序员会将 `Book` 映射为 `String`，然后将其管道传输到 `String` 连接中，再将结果管道传输到 `System.out.println`。不幸的是，`Consumer`
  类型阻止了这种链式操作，因为它依赖于 `Consumer` 实现的副作用来完成任何有意义的事情。


  这是后函数式语言和函数式语言分歧最大的地方之一。后函数式语言接受副作用作为实现程序员目标的合理方式，而函数式语言则惩罚试图使用副作用进行编码的程序员。虽然后函数式语言为程序员提供了显著更大的灵活性，但它们也使得阅读代码、推理代码或提供其行为保证（例如线程安全）变得更加困难。这是典型的“能力越大，责任越大”的情况。


  对于 Java 8 开发者来说，要吸取的教训是，使用 `forEach`/`forEachRemaining` 方法是可以的。然而，每当你使用这些方法时，请仔细考虑你是否真的想要使用其他某种推导方式。为任务选择正确的方法将提高代码的可读性，赋予运行时和库开发者适当优化它的能力，并锻炼你以更强大的函数式方式进行编程的习惯。


  同样值得注意的是，如果你想操作集合，例如添加或删除成员，这不是正确的方法。尝试在 `forEach` 方法内部修改集合可能会导致 `ConcurrentModificationException`
  异常。由于 `forEach` 的约定只是说可能发生异常，因此可以安全地假设该异常会等到最糟糕的情况下才发生，然后才让你的代码崩溃。如果你想通过传入 lambda
  来操作集合或映射，则必须使用专门的方法。


  ## 使用 Lambda 操作集合和映射


  在数学中，不存在可变性：真永远为真，假永远为假。函数式编程遵循数学的指引，并假定域不能被改变。当你将集合或映射用作 lambda 的域时，结果将是一个新的集合、映射或对象。在本节中，我们将探讨可用的特定类型的操作。




  ### 过滤集合与映射


  在处理集合时，最常见的操作就是移除某些元素。在其他后函数式语言（以及 Java 的 `Stream` API）中，这被称为“`filter`”。当你想要通过直接移除元素来修改集合时，应使用
  `Collection.removeIf` 方法。`removeIf` 方法接受一个 `Predicate`，并会从集合中移除所有使该 `Predicate`
  测试结果为 `true` 的元素。Java 没有为 `Map` 提供直接等价的方法，但你可以对 `Map.entrySet()`、`Map.values()`
  和 `Map.keySet()` 返回的集合使用 `removeIf`，从而修改底层的 `Map`。如果集合发生了更改，该方法返回 `true`；如果集合未发生更改，则返回
  `false`。


  在清单 3-4 中，我们使用 `removeIf` 功能来扩展我们的 `Library` 类，提供了移除所有指定类型图书的能力。由于我们希望对某些处理的结果进行测试，因此在此定义了一个实用方法：`mapThenTest`。这为我们提供了一个谓词，该谓词执行某些映射并测试映射的结果：在我们的例子中，我们希望获取类型，然后对该类型进行测试。定义好该谓词后，我们将其传递给
  `books` 集合和 `featured books` 集合的 `removeIf` 方法。


  在清单 3-4 中，有几点需要注意。请注意，使用函数式接口使我们能够确保对 `books` 列表和 `featured books` 集合使用相同的代码：对谓词的任何更改都将可靠地应用于两种情况。还要注意，`removeIf`
  调用完全移除了两处的迭代代码，使我们的代码更加简洁且更具描述性。由于 `featured books` 集合是 `books` 列表的严格子集，我们可以利用第一次调用的返回值作为优化手段来短路移除操作：如果没有找到匹配类型的图书，则无需检查
  `featured books` 列表。在此使用函数式代码为我们节省了大量样板代码和冗余信息，而变量名则成为了描述函数功能的标签。当行为作为变量存在时，编写自文档化的代码会容易得多。


  **清单 3-4. 使用 removeIf 移除类型的 Library 实例方法**


  `/**`


  `* 将元素映射为一个值，然后测试该映射后的值。`


  `*`


  `* @param map 定义映射的函数；不能为 {@code null}`


  `* @param test 定义测试的函数；不能为 {@code null}`


  `* @return 一个谓词，用于测试其参数映射后的结果。`


  `*/`


  `private static <T,U> Predicate<T> mapThenTest(`


    `Function<T,U> map, Predicate<U> test`


  `) {`


    `Objects.requireNonNull(map, "映射实现");`


    `Objects.requireNonNull(test, "测试实现");`


    `return t -> test.test(map.apply(t));`


  `}`


  `/**`


  `* 从图书馆馆藏和精选馆藏中移除所有指定类型的图书。`


  `*`


  `* @param genre 要比较的类型；不能为 {@code null}。`


  `*/`


  `public void removeGenre(Book.Genre genre) {`


    `Objects.requireNonNull(genre, "要比较的类型");`


    `Predicate<Book> hasGenre = mapThenTest(Book::getGenre, genre::equals);`


    `if (this.getBooks().removeIf(hasGenre)) {`


      `this.getFeaturedBooks().keySet().removeIf(hasGenre);`


    `}`


  `}`


  ### 映射集合与映射


  如果你已经接受了更函数式的开发风格，那么你可能会大量使用不可变对象。在本章中，我们对 `Book` 类采用了这种方法。然而，当我们想要操作这些对象时，这会导致一个问题：例如，假设我们想要在精选图书的标题后添加一个星号。由于
  `Book` 实例是不可变的，我们需要用新实例替换旧实例。为此，我们可以使用 `List.replaceAll` 方法。该方法属于 `List` 而非 `Collection`，因为在某些类型的集合（例如
  `SortedSet`）中替换元素会为其 API 带来尴尬的情况。（如果你转换了 `SortedSet` 中已排序的元素，那么结果应该应用哪种排序规则？）


  如果我们想要在精选图书的标题后添加一个星号，我们首先需要定义“在标题后添加一个星号”的含义。鉴于 `Book` 类可用的 API，我们必须定义一个内联 lambda
  来实现这一点。（这表明我们的 `Book` API 可能缺少某些有用的功能，但这是另一个话题了。）从函数式角度思考，我们希望在满足特定条件时应用一个转换。这需要另一个实用函数：`applyIf`。它将接受一个谓词和一个函数，并且仅当谓词为
  `true` 时才应用该函数。由于我们只处理单一数据类型，我们可以使用 `UnaryOperator` 简写来节省一些输入和类型变量。有了这个实用方法，我们需要获取一个
  `Predicate` 来判断图书是否为精选，以及执行转换的函数。最终的 `UnaryOperator` 完全符合我们的需求：如果 `Predicate` 测试返回
  `true`，我们将执行“在标题后添加一个星号”的函数；如果测试返回 `false`，我们将返回传入的 `Book` 实例。这种方法的代码如清单 3-5 所示。


  **清单 3-5. 使用 List.replaceAll 为精选图书加星标的 Library 实例方法**


  `/**`


  `* 仅当 {@code test} 对参数返回 {@code true} 时，才对该参数应用映射操作。`


  `*`


  `* @param test 决定是否应用映射的测试；不能为 {@code null}`


  `* @param ifTrue 测试为 true 时应用的映射；不能为 {@code null}`


  `* @return 当 {@code test} 为 true 时应用 {@code ifTrue}`


  `*         否则返回参数本身的运算符。`


  `*/`


  `private static <T> UnaryOperator<T> applyIf(`


  `Predicate<T> test, UnaryOperator<T> ifTrue`


  `) {`


  `Objects.requireNonNull(test, "用于测试的谓词");`


  `Objects.requireNonNull(ifTrue, "条件为真时应用的方法");`


  `return t -> {`


  `if(test.test(t)) {`


  `return ifTrue.apply(t);`


  `} else {`


  `return t;`


  `}`


  `};`


  `}`


  `/**`


  `* 更新图书馆，将每本精选图书替换为标题后加 {@code *} 的图书。`


  `*/`


  `public void starFeatureBooks() {`


  `UnaryOperator<Book> starBook = book ->`


  `new Book(book.getTitle() + "*", book.getAuthor(), book.getGenre());`


  `Predicate<Book> isFeatured = getFeaturedBooks().keySet()::contains;`


  `UnaryOperator<Book> starIfFeatured = applyIf(isFeatured, starBook);`


  `getBooks().replaceAll(starIfFeatured);`


  `}`


  还有一种方法可以对 `Map` 实例执行此类操作，尽管你只能更改值：由于与 `Set` 难以实现 `replaceAll` 相同的原因，无法通过这些操作调用更改键。但该方法仍然非常有用：例如，假设我们想对精选图书的消息执行一个清理方法：我们希望通过提供默认消息并移除末尾句点来清理消息。我们可以通过执行
  `replaceAll` 方法并返回更新后的值来实现这一点，如清单 3-6 所示。此方法体的复杂性不太适合采用函数式解决方案，因此我们直接使用了内联函数定义。




  清单 3-6\. 使用 `Map.replaceAll` 清理精选图书消息的库实例方法


  `/**`

  `* 对所有精选消息执行各种清理任务。`

  `*/`

  `public void cleanUpFeaturedMessages() {`

  `this.getFeaturedBooks().replaceAll((book, msg) -> {`

  `// 设置默认消息`

  `if (msg == null || msg.isEmpty()) {`

  `msg = "Featured " + book.getGenre().toString().toLowerCase() +`

  `" book by " + book.getAuthor();`

  `}`

  `// 移除末尾句点，除非是省略号`

  `if (msg.endsWith(".") && !msg.endsWith("...")) {`

  `msg = msg.substring(0, msg.length() - 1);`

  `}`

  `return msg;`

  `}`

  `);`

  `}`


  ### Map 计算


  `Map` 类本身已通过一些函数式风格的操作进行了扩展，使您能够处理特定的键。这些方法并非直接受函数式编程技术启发，而是作为常见代码（如下所示）的简写形式：


  `// 默认值`

  `String value = map.get(key);`

  `if(value == null) {`

  `value = computeValue(key);`

  `map.put(key, value);`

  `}`

  `// 递增值`

  `Integer value = map.get(key);`

  `if(value != null) {`

  `value += 1;`

  `map.put(key, value);`

  `}`


  这段代码实际上用了四行来完成一个逻辑：获取键对应的值，如果缺失则设置该值。除了冗长之外，这段代码也不清晰；在 `get` 之后，`value` 是否仍处于生成过程中并不明确。更甚的是，这段代码效率低下：它先执行
  get 再执行 put，需要对键进行重复查找。


  相反，`Map` 类现在为您提供了一种方式，可以在单个方法调用中访问映射并实现这种特殊处理，这确保了返回的值在您接收时已完全配置好，并为您节省了重复查找的开销。这是一个完美的例子，展示了
  lambda 如何让开发者编写出更高效、更具表现力且更安全的代码——所有这些优点集于一身。


  我遇到的最常见用例是默认值。例如，让我们创建一个方法，该方法将获取精选图书消息，如果未设置则提供默认值。我们将沿用清单 3-7 中创建的相同默认消息，但在键查找时提供默认值。我们将使用
  `computeIfAbsent` 方法来实现这一点，这是计算默认值的简便方法。请注意，`computeIfAbsent` 方法也是实现多值映射或规范化映射的便捷方式，这些只是默认值的特殊情况。


  `map.computeIfAbsent(key, k -> new HashMap<>()); // 多值映射`

  `map.computeIfAbsent(key, Function.identity());  // 规范化映射`


  清单 3-7\. 使用 `Map.computeIfAbsent` 提供精选图书消息的库实例方法


  `/**`

  `* 为给定的图书提供精选图书消息。如果该图书之前不是精选图书，`

  `* 则在此方法解析后将成为精选图书。如果它之前没有精选图书消息，`

  `* 则在此方法解析后将拥有一个。`

  `*`

  `* @param featuredBook 需要其消息的图书；绝不能为 {@code null}`

  `* @return 精选图书的消息；绝不能为 {@code null}`

  `*/`

  `public String getFeaturedBookMessage(Book featuredBook) {`

  `Objects.requireNonNull(featuredBook, "featured book");`

  `return this.getFeaturedBooks().computeIfAbsent(featuredBook, book ->`

  `"Featured " + book.getGenre().toString().toLowerCase() + " book by "`

  `+ book.getAuthor()`

  `);`

  `}`


  另一个与映射相关的常见任务是跟踪实例计数。例如，考虑我们想要为某些用户指定的类型生成类型计数。为此，我们可以指定 `computeIfPresent`。此方法是
  `computeIfAbsent` 的补充：它仅在值已存在时才执行其 lambda。此功能对于更新某些现有值而不在映射中创建额外值非常有用。为了提供这些类型计数，我们首先将所需键初始化为零，然后遍历所有图书，如果计数已存在则递增。我们在清单
  3-8 中执行此操作。`computeIfPresent` 方法对于在方法的值上提供任何类型的初始化或包装代码，同时绕过 `null` 检查也很有用。


  清单 3-8\. 使用 `Map.computeIfAbsent` 提供精选图书消息的库实例方法


  `public Map<Book.Genre, Integer> getGenreCounts(Book.Genre... genres) {`

  `Map<Book.Genre, Integer> toReturn = new HashMap<>();`

  `Arrays.asList(genres).forEach(genre -> toReturn.put(genre, 0));`

  `getBooks().forEach(book ->`

  `toReturn.computeIfPresent(book.getGenre(), (key, count) -> count + 1 )`

  `);`

  `return toReturn;`

  `}`


  也可以使用单个操作方法来处理缺失值和现有值。此方法简称为 `compute`，lambda 会应用于该键的当前值：如果在调用该方法之前该键不在映射中，则 lambda
  会接收到 null 作为值。如果传入的 lambda 不返回 `null`，那么 `compute` 方法实际上等同于以下代码：


  `map.put(key, f(key, map.get(key));`


  显然，这给代码增加了一些复杂性，因为您必须同时处理键已定义和未定义的情况。然而，作为处理这种复杂性的交换，您获得了最大的灵活性。如果我们想扩展清单 3-6 中的代码，以提供我们在清单
  3-5 中实现的所有默认消息功能，那么我们可以使用 `compute` 方法，它将如清单 3-9 所示。


  清单 3-9\. 使用 `Map.compute` 提供精选图书消息的库实例方法


  `public String getFeaturedBookMessage(final Book featuredBook) {`

  `return getFeaturedBooks().compute(featuredBook, (book, msg) -> {`

  `// 设置默认消息`

  `if (msg == null || msg.isEmpty()) {`

  `msg = "Featured " + book.getGenre().toString().toLowerCase()`

  `+ " book by " + book.getAuthor();`

  `}`

  `// 移除末尾句点，除非是错误的省略号`

  `if (msg.endsWith(".") && !msg.endsWith("...")) {`

  `msg = msg.substring(0, msg.length() - 1);`

  `}`

  `return msg;`

  `}`

  `);`

  `}`


  `Map` 中最后一个操作 API 是 `merge`。此方法的实现乍看之下有些奇怪：它接受一个键、一个值和一个“重映射函数”。如果该键尚未分配，则使用该值；如果该键已分配，则将参数值和映射中的当前值传递给重映射函数，并将结果分配给该键。完成所有这些后，该方法返回映射到给定键的新值。尽管看起来可能很神秘，但这种奇怪的舞蹈正是您在映射中跟踪计数时所需要的：您传入键，将计数作为值传入，然后将加法作为
  lambda 传入。它也适用于跟踪位掩码、连接列表以及任何其他基于键合并值的情况。在清单 3-10 中，我们基于此方法提供了一个通用的类型计数方法。


  清单 3-10\. 使用 `Map.merge` 计数的库实例方法


  `public Map<Book.Genre, Integer> getGenreCounts() {`

  `Map<Book.Genre, Integer> counts = new HashMap<>();`

  `getBooks().forEach(book ->`

  `counts.merge(book.getGenre(), 1, (i, j) -> i + j)`

  `);`

  `return counts;`

  `}`


  在 `Map.compute` 和 `Map.merge` 之间做选择时，重要的问题是您的新值关心的是键还是旧值。如果新值基于键，请使用 `Map.compute`（或其变体之一）；如果新值关心旧值，请使用
  `Map.merge`。不过，如果您忘记了区别，类型签名可以帮助您。




  ## 流


  到目前为止，我们所讨论的一切都围绕着原地编辑现有的 `Collection` 或 `Map`。然而，在本书的剩余部分，我们将聚焦于 lambda 的真正力量：函数式流（以下简称“流”）。支持流的类主要收集在全新的
  `java.util.stream` 包中，但 Java SDK API 的其他部分也散布着一些流 API 的精华。接下来的几章都将围绕这些 API（或它们不幸的缺失）将如何改变你使用
  Java 8 编写代码的方式。不过，在此之前，我们需要先理解什么是流以及它是如何工作的。


  流类似于迭代器，但具有明显更广泛的能力。对于迭代器，一直存在一个假设：你只会遍历它一次，并且总是在同一个线程上，而且总是有一个底层的集合被遍历。曾有过一些尝试，试图基于集合之外的东西（例如文件的行）构建迭代器，甚至还有一些尝试让迭代器表现得像惰性列表或供应者。将这种期望的功能塞进
  `Iterator` API 中，总感觉像是试图把方钉塞进圆孔里。更重要的是，你能用迭代器做的事情总是相当有限。例如，与 I/O 流不同，从未发展出广泛采用的、用于包装迭代器或操作其返回值的支持。迭代器就是你用来以非常命令式的风格简单遍历元素的东西，仅此而已。


  然而，对于流来说，情况完全不同。流可以显式地并行化，这使得用户代码和库本身能够从多个线程读取流并执行它们。流被设计为可以通过 `Function` lambda
  进行转换，通过 `Predicate` lambda 进行过滤，并且通常以我们喜爱的函数式风格进行操作。更棒的是，它们可以通过多种方式收集在一起，从而能够接入任何遗留
  API，或高效地实现复杂处理。


  流的生命周期比迭代器的生命周期稍微复杂一些，因为涉及的事情要多得多。流的生命周期是：


  创建 → 映射和过滤（称为中间步骤） → 收集、处理或归约（称为终端步骤）


  这三个步骤中的每一个都可以采用多种形式，你可以像搭积木一样混合搭配它们，以构建几乎任何你能想象到的流程。这提供了极大的灵活性，并且由于类型系统的存在，相对容易管理。更棒的是，步骤
  2 和步骤 3 的并行性由 Java 自动为你处理，因此 Java 运行时和库本身会自动优化你的实现。


  ### 流的创建


  第一步，“创建”，是你生成流的地方。生成时，流尚未对底层数据做任何操作，就像 I/O 流在你创建它时尚未读取任何字节一样。流仅仅知道如何开始生成数据，并且它提供了一个丰富的
  API 和大量的元数据用于生成这些数据。


  你可以使用 `stream()` 或 `parallelStream()` 方法从 `Collection` 生成流。`stream()` 方法生成一个顺序（非并行）流，当你需要按迭代顺序处理
  `Collection` 的元素时，这很有用。但是，如果你没有任何执行顺序的要求，那么始终最好使用 `parallelStream()` 请求一个流。该方法允许生成的流以任何顺序处理元素，包括并发处理它们。


  值得注意的是，如果 `Collection` 不支持并行性，你仍然可能从 `parallelStream()` 得到一个顺序流：调用 `parallelStream`
  并不是要求一个可并行的流，而是允许返回的流是可并行的。这些方法提供了从 `Collection` API 到 `Stream` API 的桥梁，因此很容易迁移你的代码。¹
  类似地，如果你想从数组生成流，则使用 `Stream.of(array)` 方法。


  在最底层，可以使用 `Stream` 接口上的静态方法来生成流。特别是，你可以使用 `generate` 方法基于 `Supplier` 函数式接口生成一个 `Stream`，并且你可以使用
  `iterate` 方法基于某个初始值和一个递增 lambda 创建一个迭代的流（例如，传入 `0` 和 `x->x+1` 作为 lambda，创建一个从零开始计数的流）。最后，`Stream`
  类通过 `builder()` 方法提供了一个构建器类，因此你可以将元素传入构建器，然后基于结果生成流。


  当我们进入流生成时，我们就进入了这些被称为“分割迭代器”的奇怪生物的巢穴。分割迭代器可以被视为流的幼虫形态：它们通过 `StreamSupport.stream`
  方法进入茧中，然后作为完全成形的 `Stream` 实例出现。它们本身足够复杂，值得进行更详细的讨论，不过，我们将在第 9 章讨论 lambda 和流实现细节时，详细探讨分割迭代器。在大多数情况下，用户可以并且应该坚持使用
  `Stream` 接口本身：依赖库支持来隐藏分割迭代器的实现细节。


  你在这里和 Java SDK 中看到的流并非唯一可能。Webonise Lab 的 `FunJava` 库提供了其他生成流的方式：具体来说，该库提供了基于数据库
  `ResultSet`、基于文件内容、基于目录结构以及基于 `InputStream` 和 `Reader` 实例的流。我们将在关于使用流处理文件和数据库调用的章节中详细介绍这些流生成器，并且你可以将这些实现用作你自己流实现的模型。然而，为了聚焦重点，本章我们将坚持使用
  Java 本身提供的那些更简单的流。




  ### 映射与过滤流


  创建流之后，你能用它做什么呢？对流操作可分为两类：中间操作和终端操作。中间步骤可以链式组合，而终端步骤则会终止流。流的处理直到遇到终端步骤才会启动，因此在流启动任何重量级活动之前，中间步骤可以链式组合并进行操作。中间步骤有两种基本类型：映射步骤和过滤步骤。


  这里的“映射”一词取其函数式含义：接收输入并产生输出。在这种情况下，映射操作会获取流中的每个元素，对该流应用一个函数（“映射值”），并产生输出。这允许你获取一种类型的流，并生成一个新类型的流：例如，你可以获取一个
  ID 流，并通过数据库调用生成实例化对象的流。回到我们的`Library`示例，我们可以生成图书馆书籍的流，并轻松地将其映射到流派流上。具体代码如下：


  `Stream<Book.Genre> genres =`


  `library.getBooks().parallelStream().map(Book::getGenre);`


  `map`函数假定每个输入元素都会产生一个输出元素。如果每个输入元素可能产生零个或多个输出元素，则应使用`flatMap`函数。`flatMap`函数的工作方式与`map`函数相同，区别在于它产生的不是单个元素，而是一个元素`Stream`。例如，假设你有一个文件名流，并且想要将所有文件的内容连接起来。首先，你可以将字符串映射为`Path`实例，然后使用`Files.lines`方法，该方法接收一个`Path`实例并生成其内容的流。现在你有了一个从流到流之流的映射：这时`flatMap`会为你将其展平。实现此功能的代码如清单
  3-11 所示。由于`Files.lines`方法会抛出受检异常，这段代码稍微复杂了一些，但我们将在第 7 章中讨论如何优化这段代码。


  清单 3-11. 通过 Stream.flatMap 从给定文件名列表创建包含所有文件行的流


  `Function<Path, Stream<String>> readLines = path -> {`


  `try {`


  `return Files.lines(path);`


  `} catch (IOException ioe) {`


  `throw new RuntimeException("Error reading " + path, ioe);`


  `}`


  `};`


  `Stream<String> lines = Stream.of("foo.txt", "bar.txt", "baz.txt")`


  `.map(Paths::get)`


  `.flatMap(readLines);`


  另一种常见的中间步骤是过滤步骤。过滤确保流中的所有元素都满足某个测试条件，这允许你筛除不需要的元素。要进行过滤，你需要将一个`Predicate`传递给`Stream.filter`方法。流中的每个元素都会经过测试。如果测试返回`true`，流会生成该元素；如果测试返回`false`，流会静默丢弃该元素。对于我们的`Library`类，我们可以通过传递`Genre.TECHNICAL::equals`作为过滤谓词，仅获取技术类书籍的流。代码如下：


  `Stream<Book> techBooks =`


  `library.getBooks().parallelStream().filter(Book.Genre.TECHNICAL::equals);`


  请注意，过滤不会改变流的元素类型：我们不对元素本身进行任何转换，只是决定保留还是丢弃每个流元素。这非常有用，因为当你在处理过程中拥有合适的类型时，可以在中间添加过滤器来执行测试。例如，我们可以扩展清单
  3-11 的示例，通过传递一个过滤器，仅读取已存在文件的内容；只有`Files.exists`返回`true`的路径才会被保留。我们在清单 3-12 中实现了这一点。在这里，我们首先创建`Path`实例，然后将这些临时实例传递给`Files.exists`，再将满足条件的`Path`实例传递给我们的
  readLines lambda，以生成`String`实例。我们的输入是`String`实例，输出也是`String`实例，但我们是在仅存在于流内部的`Path`实例上执行处理逻辑。


  清单 3-12. 通过 Stream.filter 从给定文件名列表创建仅包含已存在文件所有行的流


  `Function<Path, Stream<String>> readLines = path -> {`


  `try {`


  `return Files.lines(path);`


  `} catch (IOException ioe) {`


  `throw new RuntimeException("Error reading " + path, ioe);`


  `}`


  `};`


  `Stream<String> lines = Stream.of("foo.txt", "bar.txt", "baz.txt")`


  `.map(Paths::get)`


  `.filter(Files::exists)`


  `.flatMap(readLines);`




  ### 收集、处理或归约流


  我们刚刚讨论的映射和过滤操作是中间操作；你可以随心所欲地将它们链式组合。不过，迟早你会想要停止对流进行加工，并真正对其执行一些操作。这时终端操作就派上用场了。每个流只能有一个终端操作，并且流实际上是在应用终端操作时执行的。终止流有三种基本方式：通过收集其元素、基于其元素产生副作用，或对其元素执行计算。这三种方式分别被称为收集、处理和归约。


  要收集流，你需要指定你想要的结果是什么类型的集合，以及你希望如何收集元素。Java SDK 在 `Collectors` 类中提供了许多选项。该类生成各种类型的
  `Collector` 实例。一个 `Collector` 实例负责消费流中的元素，基于这些元素更新某些内部状态，并在最后生成一个结果。内置的收集器确实令人印象深刻：你可以获取平均值、统计元素数量、基于某个
  `Comparator` 获取最小值或最大值、基于某个键对元素进行分组（返回一个 `List` 实例的 `Map`）、将所有结果的字符串表示连接成一个单独的 `String`（可选地带有分隔符），等等。在清单
  3-13 中，我们可以从 `Library` 实例的书籍出发，得到一个按类型对这些书籍进行排序的 `Map`。请注意，我们使用了 `groupingByConcurrent`
  方法，以保持并行执行的权限。这正是将 Stream API 代码与更传统的 Java 代码进行比较时，能够真正展现函数式编程威力的时刻之一。


  **清单 3-13. 使用流按类型对书籍进行分组**


  `Map<Book.Genre, List<Book>> booksByGenre =`


  `library.getBooks().parallelStream()`


  `.collect(Collectors.groupingByConcurrent(Book::getGenre));`


  有时你并不想收集结果，而只是想产生一些副作用。经典的例子是打印流执行的结果。为此，你可以使用 `Stream.forEach` 方法，就像在 `Collection`
  上使用一样。一个主要区别是 `Stream.forEach` 方法不保证执行顺序：并行流可能会以任意顺序生成结果。如果你确实想确保顺序，你需要使用 `Stream.forEachOrdered`
  方法。该方法提供与 forEach 相同的功能，但附加了一个约定：元素按照流生成它们的顺序（称为“遭遇顺序”）进行处理。通常，如果你打算使用 `Stream.forEach`（尤其是
  `Stream.forEachOrdered`），你应该深吸一口气，重新考虑是否有更好的方式来处理这种情况，例如自定义 `Collector`。通过副作用进行编程几乎从来都不是正确的答案，并且始终是长期维护的障碍。


  最后一个常见的终端操作称为归约，它最初是来自函数式编程的一种略显陌生的操作。² 其思想是，你传入某个初始值，然后一个函数接收一个元素并返回一个与初始值类型相同的元素。该函数的结果会被传递给下一个元素。这些执行结果像菊花链一样串联起来，直到整个流被消费完毕，然后返回最终结果。这种链式执行非常强大，一旦你掌握了窍门，就能用非常简单的代码实现非常复杂的操作。例如，如果你想自己实现字符串连接，你可以这样实现归约：


  `String booksString =`


  `library.getBooks().parallelStream()`


  `.map(Book::toString)`


  `.map(str -> str + "\n")`


  `.reduce("", String::concat);`


  从概念上讲，这将生成一个书籍流，将每本书转换为其字符串表示，为每个字符串表示追加一个回车符，然后归约生成的流。归约步骤将从空字符串开始，并连接结果。第一次连接会将空字符串与第一本书连接；下一次连接将获取第一次的结果并与第二本书连接；再下一次连接将获取第二次的结果并与第三本书连接；如此继续，直到没有更多书籍，最后返回结果。


  这里需要给智者一句忠告。归约操作是一个非常强大的操作，它几乎肯定会成为你某个时候的“金锤”³；随着你对它越来越熟练，你会开始倾向于使用 `reduce` 来终止所有流。这并不是一个坏冲动，因为它表明你在以函数式的方式思考。然而，如果你开始想要向归约操作传递比简单的前一个结果更多的状态，那么你真正需要的是一个自定义的
  `Collector` 实例或一个包装后的 `Collector` 实例（参见 `Collectors.collectingAndThen`）。请记住这一点，你将能够保持代码的可读性和函数式风格，同时也能生成更可重用的代码。


  ### 原始类型流


  在结束对流的介绍之前，了解存在针对 `int`、`long` 和 `double` 原始类型的特定流是很重要的。你可以通过使用 `Stream` 类的方法来生成这些流：`mapToInt`/`flatMapToInt`、`mapToLong`/`flatMapToLong`、`mapToDouble`/`flatMapToDouble`。正如你所料，与传递对象包装器相比，它们提供了一些性能优势，尽管对于应用程序代码来说，这种优势通常不足以产生显著影响。更重要的是，它们提供了与许多现有方法形状相匹配的
  API。例如，`IntStream` 有一个名为 `mapToObj` 的方法，它接受一个将 `int` 映射到 `Object` 的函数。该函数的形状完美匹配
  `List.get(int)` 方法，因此你可以调用 `intStream.map(List::get)`。


  ## Lambda 领域回顾


  Java 8 提供了一种新的抽象：你现在可以抽象出处理某个领域的概念。你从一个流开始，无论该值是来自映射、集合还是其他地方，最终的处理代码都是完全相同的。你现在可以摆脱遍历数据源的逻辑，专注于你想对其提供的元素做什么。正如我们在本章中所看到的，流就是这种抽象。此外，还有一些方便的简写方法。这些简写方法对于将遗留代码转换为更函数式的风格特别有用。在下一章中，我们将研究如何处理应用程序外部的数据源：与外部世界交互会使这些函数式结构变得更加复杂。这种复杂性实际上将展示函数式编程在处理棘手代码方面的威力，并让你能够专注于核心关注点。


  脚注 ¹


  关于如何从 `Stream API` 桥接回 `Collection API` 的信息，请参见下面的收集/归约步骤描述以及 `Collectors` 类。


    ²


  在与函数式程序员交谈时，他们也可能将归约操作称为注入或折叠。


    ³


  术语“金锤”源自一句流行的俏皮话：“如果你只有一把锤子，那么所有东西看起来都像钉子。”如果你只有一把锤子，并且对它感到非常兴奋，那么你拥有的就是一把金锤。




  '
- '# 4. 使用 Lambda 进行 I/O 操作


  到目前为止，我们对 Lambda 和 Stream 的探索都停留在代码这个可控的世界里。然而，有时你的代码必须与外部世界交互。本章我们将进入现实世界中的 Lambda：不再抽象地展示
  Lambda 能做什么，而是深入探讨在真实代码的复杂性中，使用 Lambda 编程是怎样的体验。在这个世界里，你最终不得不处理 Java 中大量遗留代码带来的麻烦，而
  Lambda 那些美好的理论和简单的示例，也会让位于一些棘手的复杂性。对你来说，关键在于理解如何应对这种复杂性，从而创造更佳的开发体验，并编写出更高效、更稳定的代码。


  第一个案例是与文件交互。通过本章，我们将实现一系列实用的文件工具。我们将编写代码来处理创建和清理临时文件的所有样板代码，让代码使用者能够专注于临时文件的操作。我们还将实现一个方法，用于读取文件的所有行，以及另一个方法，用于读取目录中特定文件的所有行。


  我们选择文件作为起点，是因为文件系统是外部世界中极其不稳定的部分。许多经验不足的开发者在编写文件系统代码时，会隐含大量关于代码库之外、类型系统之外世界的未文档化假设。这些假设在开发过程中一直成立，但在生产环境中却会引发问题。困惑的开发者随后会说出那句臭名昭著的话：“在我的机器上能跑啊。”


  为了解决这个问题，Java 引入了受检异常（checked exception）的概念。受检异常是一种声明方式，表明该方法依赖于程序自身状态之外的某些现实条件。非受检异常（unchecked
  exception）则用于程序员搞砸了，传入了不该传的参数，或在错误的时间调用了方法的情况。而受检异常则用于应用程序自身无法控制的事情出错时。`IOException`
  类型层次结构描述了应用程序执行 I/O 操作可能失败的各种不同方式。受检异常是一种要求程序员处理外部世界不稳定性的机制。


  类型系统表达能力较弱的语言会忽略这种不稳定性，而不明智的开发者则会绕过对这些潜在错误的处理。这会造成代码整洁的假象，但当病毒扫描程序锁定了你的代码正在尝试写入的文件，或者外部世界的其他异常情况偏离了你代码中那些完美的假设时，这种假象就会被无情地粉碎。强制你处理某些异常是一个明智的设计，尽管许多开发者似乎急于否定它。我也会否定它，除非我不断遇到那些因为人们、语言和工具绕过了安全检查，而在
  I/O 错误时毫无帮助地崩溃的程序。


  受检异常的存在是有原因的：有时你确实需要对错误情况做出响应。不幸的是，它们完全不适合函数式代码。一个数学函数有输入和输出，没有副作用：函数式代码希望尽可能接近数学函数。在
  Java 8 中，这意味着 Lambda 不应该抛出异常，并且你不能将抛出受检异常的方法作为函数式接口（`Function`、`Consumer` 或 `Supplier`）的实现。遇到这种情况，许多程序员会简单地将受检异常转换为非受检异常，然后继续。这绕过了系统的安全性。相反，我们希望既保留安全性，又能在函数式世界中良好地运作。


  在函数式世界中，处理情况只有两种选择：要么在输入时处理，要么在输出时处理。如果在函数式世界中处理异常情况，这意味着你要么将异常处理器作为参数传递，要么将异常发生的信息作为返回值的一部分传递。以这种方式处理异常可能看起来很奇怪，但这只是学习新范式过程中的体验。这种处理异常的方式可能看起来也很复杂，但现实是，它正在处理
  I/O 本身固有的复杂性。工程师和艺术家之间的区别在于，工程师会因为忽视现实世界而受到惩罚。


  在本章的剩余部分，我们将从一个简单的任务开始：处理临时文件。我们将看到异常在哪里出现，并尝试使用输入和输出两种风格来处理它们。然后，我们将在此基础上构建更高级的文件系统。那么，让我们开始吧。


  ## 临时文件与“中间空洞”


  在第一章中，我们看到了控制反转是如何以面向对象的方式执行函数式回调的。在函数式世界中，有一种常见的模式：函数在开始时执行一些设置，在结束时执行一些清理，然后回调用户代码来决定中间要做什么。我的朋友、导师兼合著者
  Brian Hurt 将这种模式称为“中间空洞”模式。在处理临时文件时，这正是我们想要的：我们希望在开始时创建临时文件，确保在结束时清理临时文件，并允许用户在中间阶段对文件进行他们想要的操作。基本模式如下所示：


  `<RETURN_T> RETURN_T withTempFile(Function<FunFile, RETURN_T> function) {`


      `File file = null;`


      `try {`


        `file = File.createTempFile("funfile", "tmp");`


        `return function.apply(file);`


      `} finally {`


        `if (file != null) file.delete();`


      `}`


    `}`


  `// 这不是有效的 Java 代码：请继续阅读！`


  临时文件的设置是我们的 `File.createTempFile(String,String)` 调用。清理是 `file.delete()` 调用。`function.apply`
  调用就是中间的“空洞”，由调用者为我们填充。但是，当然，这不是有效的 Java 代码：存在一个未处理的 `IOException` 需要解决。正如我们之前讨论的，我们有两种选择：通过回调在输入时处理异常，以及通过返回值在输出时处理异常。让我们依次看看这两种方法。




  ### 通过输入进行异常处理：传入异常处理器


  如果你仔细观察上述基本模式，实际上可以将其视为中间有两个"空洞"：一个用于标准行为，另一个用于异常行为。因此，你可以采用两个回调函数：一个实现标准行为，另一个实现异常行为。一个简单的实现如下所示：


  `<RETURN_T> RETURN_T withTempFile(`


  `Function<FunFile, RETURN_T> function,`


  `Consumer<IOException> exceptionHandler`


  `) {`


  `File file = null;`


  `try {`


  `file = File.createTempFile("funfile", "tmp");`


  `return function.apply(file);`


  `} catch(IOException ioe) {`


  `exceptionHandler.consume(ioe);`


  `} finally {`


  `if(file == null) file.delete();`


  `}`


  `}`


  `// 这不是有效的 Java 代码：请继续阅读`


  这段代码存在三个问题。第一个问题是它使用了 `null` 作为文件值，而 `null` 并非有效值。第二个问题涉及代码逻辑。最后一个问题是 API 设计问题。编译器会发现第二个问题。第一个问题应该被你新培养的敏感性所察觉——在代码中看到
  `null` 就像听到指甲刮黑板的声音一样刺耳。第三个问题最为微妙，只有当你积累了将方法作为 lambda 表达式使用的经验后才会发现。


  第一个问题是我们使用了 `null`。从 Java 8 开始，只有在你想触发 `NullPointerException` 时才应使用 `null`。在其他所有需要使用
  `null` 的情况下，你应该改用 `Optional` 类。`Optional` 类实现了函数式编程中常见的"选项"或"可能"模式，这也是函数式语言避免出现
  `null` 概念或任何与 `NullPointerException` 等价物的方式。`Optional` 类是一个容器，最多容纳一个元素，并提供了便捷的方法来对容器中的元素（如果存在）进行操作。如果我们用
  `Optional` 重写代码，就能消除 `NullPointerException` 的可能性，并获得更易读的代码。修改后如下：


  `<RETURN_T> RETURN_T withTempFile(`


  `Function<FunFile, RETURN_T> function,`


  `Consumer<IOException> exceptionHandler`


  `) {`


  `Optional<File> file = Optional.empty();`


  `try {`


  `file = Optional.of(File.createTempFile("funfile", "tmp"));`


  `return file.map(function).get();`


  `} catch(IOException ioe) {`


  `exceptionHandler.consume(ioe);`


  `} finally {`


  `file.ifPresent(File::delete);`


  `}`


  `}`


  `// 这仍然不是有效的 Java 代码：请继续阅读`


  然而，这段代码仍然无法编译，这就引出了我们的第二个问题。代码中的第二个问题是，在异常处理的情况下我们没有返回值。如果进入 `catch` 块并执行了消费者，那么方法的返回值是什么？传统的
  Java 思维会在此返回 `null`，但 `null` 正是导致令人厌恶的 `NullPointerException` 的根源。我们可以做得更好。与其使用
  `Consumer`，不如改用 `Function`，这样用户在任何情况下都能指定返回值。修改后的代码如下：


  `<RETURN_T> RETURN_T withTempFile(`


  `Function<FunFile, RETURN_T> function,`


  `Function<IOException, RETURN_T> exceptionHandler`


  `) {`


  `File file = null;`


  `try {`


  `file = File.createTempFile("funfile", "tmp");`


  `return function.apply(file);`


  `} catch(IOException ioe) {`


  `return exceptionHandler.apply(ioe);`


  `} finally {`


  `if (file != null) file.delete();`


  `}`


  `}`


  `// 这不是你想要的 Java 代码：请继续阅读`


  至此，用户可以在两种情况下指定返回值，这意味着他们可以按自己的意愿使用该方法。如果他们意识到 `null` 的危害，可以返回 `null`；如果他们想返回 `Optional.empty()`
  或其他默认值，也可以做到。这提供了最大的灵活性。


  上述代码只剩下一个问题：参数的顺序是错误的。在传统的 Java 代码中，参数顺序在很大程度上是一个实现细节。但当以函数式风格编写函数时，参数顺序就变得非常重要。考虑一下这个方法的函数式契约：它是一个双函数，接受两个函数作为参数。第一个参数是标准实现回调，第二个参数是错误处理回调。然而，考虑一下它作为
  lambda 表达式的工作方式。如果你想进行部分函数应用，你会对第一个参数进行操作，即指定如何处理文件。该实现很可能与调用者的上下文高度相关。另一方面，错误处理在整个应用程序中更可能是通用的。因此，将错误处理作为第一个参数更为有用，这样错误处理可以被部分应用，而临时文件处理则可以自由实现。最终的方法如清单
  4-1 所示。


  强制调用者处理异常对传统的 Java 程序员来说更直观。然而，这种方法有两个主要问题。第一个问题是调用代码相当丑陋，因为你需要将两个函数式回调叠在一起。对于习惯了惯用
  Java 中命令式风格的程序员来说，读起来会感觉很奇怪。第二个也是更重要的问题是，函数式接口是一个双函数，这在许多情况下并不适用。你不能在 `Stream.map`
  上使用双函数：你需要的是一个普通函数。为了解决这两个问题，我们可以在返回值中处理异常，这将在下一节中进行。


  **清单 4-1. 带异常回调的临时文件创建**


  `<RETURN_T> RETURN_T withTempFile(`


  `Function<IOException, RETURN_T> exceptionHandler,`


  `Function<FunFile, RETURN_T> function`


  `) {`


  `Objects.requireNonNull(exceptionHandler,`


  `"I/O 异常处理器");`


  `Objects.requireNonNull(function, "应用于临时文件的函数");`


  `Optional<File> file = Optional.empty();`


  `try {`


  `file = Optional.of(File.createTempFile("funfile", "tmp"));`


  `return file.map(function).get();`


  `} catch (IOException e) {`


  `return exceptionHandler.apply(e);`


  `} finally {`


  `file.ifPresent(File::delete);`


  `}`


  `}`




  ### 通过输出进行异常处理：捕获执行结果


  这并非人们通常的思考方式，但你可以将受检异常视为方法 API 的一部分。从后置条件角度来思考：当方法执行完成时，要么方法返回一个值，要么抛出一个异常。作为优秀的面向对象程序员，你可以将这些备选方案封装到一个对象中。其结果是一种更函数式（且对函数友好）的编程风格。


  我们首先需要一个类来捕获这些结果。可以使用 `Optional` 类，但它无法传达异常是什么。因此，让我们构建一个类似 `Optional` 的类，但可以选择性地包含我们的异常。我们可以将其命名为
  `Result` 类。但在使用它之前，先来理解一下它的用途。清单 4-2 包含了完整的类定义，但别被它吓到：我们将逐段分析，它实际上非常简单。在这个过程中，我们还将看到
  `Optional` 类 API 的强大之处。


  **清单 4-2. Result 类**


  `import java.util.*;`


  `import java.util.function.*;`


  `/**`


  `* 一个表示某些处理结果的类，该结果要么是`


  `* 一个异常，要么是给定类型的对象。`


  `*/`


  `public class Result<RESULT_T> {`


  `private final Optional<RESULT_T> result;`


  `private final Optional<Exception> exception;`


  `/**`


  `* 构造一个实例来包装给定的结果。`


  `*`


  `* @param result 结果；不能为 {@code null}`


  `*/`


  `public Result(RESULT_T result) {`


  `Objects.requireNonNull(result, "要包装的结果");`


  `this.result = Optional.of(result);`


  `this.exception = Optional.empty();`


  `}`


  `/**`


  `* 构造一个实例来包装给定的异常。`


  `*`


  `* @param e 异常；不能为 {@code null}。`


  `*/`


  `public Result(Exception e) {`


  `Objects.requireNonNull(e, "要包装的异常");`


  `this.result = Optional.empty();`


  `this.exception = Optional.of(e);`


  `}`


  `/**`


  `* 将结果作为可选值提供。`


  `*`


  `* @return 如果存在结果，则返回包含结果的可选值；否则返回`


  `* 空的可选值。绝不会为 {@code null}。`


  `*/`


  `public Optional<RESULT_T> getResult() {`


  `return result;`


  `}`


  `/**`


  `* 提供此结果所表示的异常，如果没有此类异常，则返回空的可选值。`


  `*`


  `* @return 此结果所表示的异常。`


  `*/`


  `public Optional<Exception> getException() {`


  `return exception;`


  `}`


  `/**`


  `* 返回此实例是否是用结果构造的。`


  `*`


  `* @return 我们是否有结果。`


  `*/`


  `public boolean hasResult() {`


  `return result.isPresent();`


  `}`


  `/**`


  `* 如果存在结果，则获取结果；否则，抛出一个`


  `* {@link java.util.NoSuchElementException}，并将异常`


  `* 放入其抑制字段中。`


  `*`


  `* @return 结果（如果存在）。`


  `* @throws java.util.NoSuchElementException 如果没有结果。`


  `*/`


  `public RESULT_T getOrDie() {`


  `return result.orElseThrow(() -> {`


  `NoSuchElementException ex = new NoSuchElementException(`


  `"结果中无元素"`


  `);`


  `ex.addSuppressed(getException().orElseThrow(() ->`


  `new RuntimeException("内部错误"))`


  `);`


  `return ex;`


  `}`


  `);`


  `}`


  `/**`


  `* 如果存在结果，则对当前结果执行给定的函数。`


  `*`


  `* @param function 要应用的函数；绝不能为 {@code null}`


  `* @return 如果存在结果，则返回函数结果（包装在 {@link java.util.Optional} 中）；`


  `*         如果没有结果，则返回空的可选值。`


  `*/`


  `public <RETURN_T> Optional<RETURN_T> ifPresent(`


  `Function<? super RESULT_T, RETURN_T> function`


  `) {`


  `Objects.requireNonNull(function, "要应用的函数");`


  `return result.map(function);`


  `}`


  `/**`


  `* 如果存在结果，则对当前结果执行给定的消费者。`


  `* 否则，不执行任何操作。`


  `*`


  `* @param consumer 要应用的消费者；绝不能为 {@code null}`


  `*/`


  `public void ifPresent(Consumer<? super RESULT_T> consumer) {`


  `Objects.requireNonNull(consumer, "要应用的消费者");`


  `result.ifPresent(consumer);`


  `}`


  `/**`




  `* 如果存在此异常，则对其执行给定的函数。`


  `*`


  `* @param function 要应用的函数；绝不能为 {@code null}`


  `* @return 如果存在异常，则返回包含函数执行结果的 {@link java.util.Optional}；`


  `* 如果没有异常，则返回空的 Optional。`


  `*/`


  `public <RETURN_T> Optional<RETURN_T> ifNotPresent(`


  `Function<? super Exception, RETURN_T> function`


  `) {`


  `Objects.requireNonNull(function, "要应用的函数");`


  `return exception.map(function);`


  `}`


  `/**`


  `* 如果存在异常，则对当前异常执行给定的消费者操作。`


  `* 否则，不执行任何操作。`


  `*`


  `* @param consumer 要应用的消费者；绝不能为 {@code null}`


  `*/`


  `public void ifNotPresent(Consumer<? super Exception> consumer) {`


  `Objects.requireNonNull(consumer, "要应用的消费者");`


  `exception.ifPresent(consumer);`


  `}`


  `/**`


  `* 如果存在结果，则对结果执行给定的函数。`


  `*`


  `* @param function 要应用的函数；绝不能为 {@code null}。`


  `* @return 处理函数的结果，可能是当前异常、处理过程中的异常，`


  `* 或函数返回的对象；绝不会为 {@code null}。`


  `*/`


  `public <RESULT2_T> Result<RESULT2_T> map(`


  `Function<RESULT_T, RESULT2_T> function`


  `) {`


  `Objects.requireNonNull(function, "映射函数");`


  `try {`


  `return new Result<>(function.apply(getOrDie()));`


  `} catch (Exception e) {`


  `return new Result<>(e);`


  `}`


  `}`


  `/**`


  `* 如果存在结果，则应用给定的消费者；否则，不执行任何操作。`


  `*`


  `* @param resultHandler 结果处理器；绝不能为 {@code null}`


  `* @return {@code this} 以支持链式调用`


  `*/`


  `public Result<RESULT_T> whenResult(Consumer<RESULT_T> resultHandler) {`


  `Objects.requireNonNull(resultHandler, "结果处理器");`


  `result.ifPresent(resultHandler);`


  `return this;`


  `}`


  `/**`


  `* 如果存在异常，则应用给定的消费者；否则，不执行任何操作。`


  `*`


  `* @param exceptionHandler 异常处理器；绝不能为 {@code null}`


  `* @return {@code this} 以支持链式调用`


  `*/`


  `public Result<RESULT_T> whenException(Consumer<Exception> exceptionHandler) {`


  `Objects.requireNonNull(exceptionHandler, "异常处理器");`


  `exception.ifPresent(exceptionHandler);`


  `return this;`


  `}`


  `/**`


  `* 如果存在指定类型的异常，则应用给定的消费者；否则，不执行任何操作。`


  `*`


  `* @param exceptionHandler 异常处理器；绝不能为 {@code null}`


  `* @param exceptionClasses 此处理器要处理的异常类；`


  `*                         绝不能为 {@code null}`


  `* @return {@code this} 以支持链式调用`


  `*/`


  `public <EXCEPTION_T extends Exception> Result<RESULT_T> whenException(`


  `Consumer<? super EXCEPTION_T> exceptionHandler,`


  `Class<? extends EXCEPTION_T>... exceptionClasses`


  `) {`


  `Objects.requireNonNull(exceptionHandler, "异常处理器");`


  `Objects.requireNonNull(exceptionClasses, "要处理的异常类");`


  `exception.ifPresent(e -> {`


  `Stream<Class<? extends EXCEPTION_T>> classesStream =`


  `Stream.of(exceptionClasses);`


  `Optional<Class<? extends EXCEPTION_T>> match = classesStream.filter(`


  `c -> c.isInstance(e)`


  `).findAny();`


  `match.ifPresent(exceptionClass -> {`


  `EXCEPTION_T ex = exceptionClass.cast(e);`


  `exceptionHandler.accept(ex);`


  `}`


  `);`


  `}`


  `);`


  `return this;`


  `}`


  `}`


  首先要注意的是构造函数和访问器：该类封装了两个 `Optional` 实例：一个表示结果，另一个表示抛出的异常。给定的结果要么是结果，要么是抛出的异常，因此其中一个会是空的
  Optional，另一个则会被填充。


  `hasResult()` 方法展示了一个常见的模式。它只是委托给 `result.isPresent()` 方法，而该类通常会最终简单地委托给相应的 `Optional`
  实例方法。在这种情况下，我们通过检查结果是否存在来判断是否拥有一个结果。




  `getOrDie()` 方法为我们提供了一种便捷的方式来获取结果，前提是我们确实知道结果存在。如果调用者判断错误，结果并不存在，该方法将抛出一个 `NoSuchElementException`，并将产生的异常作为抑制异常包含在内。这是通过
  `orElseThrown` 方法实现的，该方法要么返回结果，要么抛出由 `Supplier` 提供的异常。我们的 `Supplier` 实现会将异常放入 `NoSuchElementException`
  的堆栈跟踪中，这有助于调试。（只有当异常和结果最初都被填充为 `null` 时，才会到达 `“INTERNAL ERROR”` 异常，而这根本不应该发生。）


  `map` 函数会转换结果（如果存在）；否则，它将构造一个新的结果并传递异常。这创建了一种在不丢失异常信息的情况下对结果进行操作的方式。在大多数情况下，当你需要使用
  `getOrDie()` 时，你实际上想要的是 `map()`。


  `ifPresent` 和 `ifNotPresent` 方法提供了一种便捷的方式来消费结果或异常（如果它们存在）。这些方法，连同 `map()`，允许用户指定实现，而无需担心结果的状态，这使得
  API 非常易读。请注意，`ifPresent()`/`ifNotPresent()` 与 `map()` 的主要区别在于返回值：`ifPresent()`/`ifNotPresent()`
  会丢失信息，但会转换为更常见的 `Optional` 类型；而 `map()` 则保留信息，但保持为当前的 `Result` 类型。


  `when` 方法为流畅的 API 提供了支持，允许你编写在读者看来像命令式代码的函数式代码。它们返回当前对象以支持链式调用，因此你可以按顺序调用这些方法，提供一种看起来很像带有异常处理的
  try/catch 块的结构。


  最后一个 `when` 方法用于捕获多种类型的异常，它是 Java 8 强大功能的一个绝佳展示。得益于类型推断，消费者的参数将自动设置为要捕获的方法的最宽泛的公共超类。传统的实现会涉及
  `null`、`if` 块和循环，但这些都被 `Optional` 和 `Stream` 类的方法所取代。


  使用这个 `Result` 类，我们可以封装方法调用的结果。我们不返回 `RETURN_T`，而是返回一个 `Result<RETURN_T>`。当方法执行时，它会构造一个
  `Result` 实例，该实例要么包含用户函数的返回值，要么包含抛出的 `IOException`。代码的初步版本可能如下所示：


  `<RETURN_T> Result<RETURN_T> withTempFile(Function<File, RETURN_T> function) {`


  `Objects.requireNonNull(function, "function to apply to temp file");`


  `Optional<File> file = Optional.empty();`


  `try {`


  `file = Optional.of(File.createTempFile("funfile", "tmp"));`


  `return new Result<>(file.map(function).get());`


  `} catch (IOException e) {`


  `return new Result<>(e);`


  `} finally {`


  `file.ifPresent(File::delete);`


  `}`


  `} // 这段代码可以工作，但还有改进空间：请继续阅读！`


  这段代码与清单 4-1 中的代码惊人地相似。如果你稍微模糊视线，只看空白区域中函数的轮廓，你会发现该方法具有相同的形状。任何时候，当你拥有两个形状相同的方法时，你就错过了代码复用的机会。在这种情况下，除了
  `return` 行之外，代码几乎完全相同：在清单 4-1 中，`return` 行委托给了用户提供的代码。在我们的新方法中，我们希望在此处调用 `Result`
  类的构造函数。我们可以将 `Result` 类的构造函数作为用户提供的代码传入清单 4-1 的代码中，从而将临时文件的实际实现委托到一个单一位置。由此产生的委托代码如清单
  4-3 所示，并且极其简单。这再次证明了新范式在我们后函数式 Java 世界中的强大之处。


  清单 4-3\. 创建临时文件，异常封装在返回值中


  `/**`

  `* 创建一个临时文件，将其传递给给定的函数，并在函数完成时删除该临时文件。`

  `*`

  `* @param function 使用临时文件实现的行为，`

  `*                 可能不返回 {@code null}；不能为 {@code null}`

  `* @return 给定函数的结果`

  `*/`

  `public static <RETURN_T> Result<RETURN_T> withTempFile(`

  `Function<File, RETURN_T> function`

  `) {`

  `Objects.requireNonNull(function, "function to apply to temp file");`

  `Function<File, Result<RETURN_T>> resultify = function.andThen(Result::new);`

  `return withTempFile(Result::new, resultify);`

  `}`




  ### 使用我们的临时文件函数


  在纯函数式世界中，始终存在一个返回值：程序本质上是一个函数，它接收字符串参数和系统环境变量作为输入，并产生一个退出码作为输出。然而，在像 Java 8 这样的后函数式语言中，我们通常希望使用副作用而非返回值。这就是
  `Consumer` 类派上用场的原因。不幸的是，我们目前提供的 API 只接受函数，这意味着用户总是需要指定一个返回值。此外，当你引用一个带有一个参数但返回
  void 的方法时，你会得到一个 `Consumer` 接口的实例。如果我们希望允许用户传入这种形式的方法，就需要接受 `Consumer` 接口。


  这并不太难，但确实需要一些技巧。当然，我们希望基于现有的 API 进行构建，而不是重复实现功能。这意味着我们需要一个桥梁，将用户传入的 `Consumer` 转换为我们的
  API 所需的 `Function`。`Consumer` 和 `Function` 之间的区别在于返回值：`Consumer` 返回 void，而 `Function`
  返回一个值。对于我们的桥梁，我们将返回一个默认值。我们可以返回 `null`，但 `null` 是通往 `NullPointerException` 的邪恶之路。另一个默认的非值选项是
  `Optional.empty()`，因此我们可以使用它。最终的代码如清单 4-4 所示。


  **清单 4-4\. 从 Consumer 到 Function 的桥梁**


  `/**`


  `* 将消费者转换为一个函数，该函数消费参数并返回`


  `* {@link java.util.Optional#empty()}.`


  `*`


  `* @return 一个消费参数并返回空选项的函数。`


  `*/`


  `static <T> Function<T, Optional<A>> functionise(Consumer<T> consumer) {`


  `return a -> {`


  `consumer.accept(a);`


  `return Optional.empty();`


  `};`


  `}`


  现在我们有了这个方法，就可以创建新的 API 了。简单的情况是要求用户传入 `IOException` 处理器。在这种情况下，我们的 API 与之前清单 4-1
  中的版本类似，但我们接受两个 `Consumer` 实例，而不是两个 `Function` 实例。用户负责决定如何处理可能发生的 `IOException`，以及如何处理正常情况。相关代码见清单
  4-5。


  **清单 4-5\. 接受 Consumer 处理临时文件，并在出错时调用回调的方法**


  `/**`


  `* 创建一个临时文件，将其传递给给定的消费者，并在函数完成时删除该临时文件。`


  `*`


  `* @param consumer 要使用临时文件调用的消费者，`


  `*        永远不会是 {@code null}；不能为 {@code null}`


  `* @param exceptionHandler 当发生 {@code IOException}`


  `*        时的处理器；不能为 {@code null}`


  `*/`


  `public static void withTempFile(`


  `Consumer<IOException> exceptionHandler,`


  `Consumer<FunFile> consumer`


  `) {`


  `Objects.requireNonNull(exceptionHandler,`


  `"I/O 异常的异常处理器");`


  `Objects.requireNonNull(consumer,`


  `"应用于临时文件的消费者");`


  `Function<IOException, Optional<Object>> exceptionFunction =`


  `functionise(exceptionHandler);`


  `Function<File, Optional<Object>> consumerFunction = functionise(consumer);`


  `withTempFile(exceptionFunction, consumerFunction);`


  `}`


  有了所有这些函数式的优雅特性，我们最终应该提供一个让 Java 传统主义者感到自然的 API。这意味着一个函数接受一个消费者，并在发生 `IOException`
  时抛出异常。在这种情况下，我们将为异常创建一个容器。异常处理器会将异常存储到该容器中。当方法返回时，我们可以检查容器是否已设置，如果已设置则抛出异常。我们需要这个容器，因为在
  lambda 中使用的变量隐式地是 `final` 的，这意味着我们无法设置一个在 lambda 外部定义的变量。这个实现实际上会使用 `null`，因为 `Optional`
  是不可变的，而其他选项（例如使用 `List`）会显得更加晦涩而非清晰。代码如清单 4-6 所示。


  **清单 4-6\. 接受 Consumer 处理临时文件，并在出错时抛出异常的方法**


  `/**`


  `* 创建一个临时文件，将其传递给给定的消费者，并在函数完成时删除该临时文件。`


  `*`


  `* @param consumer 要使用临时文件调用的消费者，`


  `*                 它永远不会是 {@code null}；不能为 {@code null}.`


  `* @throws java.io.IOException 如果发生异常。`


  `*/`


  `public static void withTempFile(Consumer<File> consumer) throws IOException {`


  `AtomicReference<IOException> reference = new AtomicReference<>(null);`


  `Consumer<IOException> exceptionHandler = reference::set;`


  `withTempFile(exceptionHandler, consumer);`


  `if (reference.get() != null) throw reference.get();`


  `}`


  清单 4-6 也是一个极好的例子，说明了为什么你不应该释放 Zalgo。（请参阅第 2 章中的“不要释放 Zalgo”。）`withTempFile` 方法保证，如果它要执行其参数，那么该参数将在方法返回之前被执行。正因如此，我们知道
  `if(reference.get() != null)` 这行代码会在 `exceptionHandler` 实现执行之后执行。如果 `exceptionHandler`
  有时会延迟执行，那么我们的代码就会在某些不确定的（无疑是令人惊讶且不幸的）情况下崩溃。




  ## 读取目录中所有文件的行


  在实践了现实世界中的 lambda 技能之后，是时候处理更复杂的问题了。我们的下一个目标是打印出目录中所有文件的所有行。这将让我们有机会分解一个更复杂的问题，并了解如何组合流。完成这个练习后，你应该能很好地理解如何操作流，无论是在处理
  I/O 时还是在更通用的场景中。


  当使用函数式风格编程时，首先停下来思考你真正想要完成什么是非常有益的。首先，让我们考虑一下我们想要实现的函数的形态。我们知道我们要操作一个 `java.io.File`
  实例，因此我们应该要么将该文件作为输入，要么将其作为扩展 `File` 类的某个方法。输出方面则更棘手。我们不知道用户将如何处理文件中的行。我们可以使用一个 `Consumer`
  来处理它们，但返回这些行既更简单也更灵活。我们可以将所有行读入某种 `Collection`，但这需要将所有行读入内存，并且在读取完所有行之前无法进行任何处理。因此，最好返回一个
  `Stream`，它提供了灵活性和对并发处理的支持。但是，流的元素类型是什么呢？


  返回值可能并不像最初看起来那么明显。`String` 实例的 `Stream` 似乎是显而易见的选择，但这只是部分正确。在任何时候，都可能抛出 `IOException`，当处理诸如导航目录之类的事情时，你绝对应该预料到这一点。到目前为止，本章的模式是创建两个方法：一个接受
  `Consumer` 来处理错误，另一个返回 `Result` 对象。虽然通过函数式编程可以轻松实现 API 的重复，但这无疑很烦人，并且会使类变得杂乱。让我们尝试一种不同的方法。


  处理类的新方法仍然会在 `Stream` 中使用 `Result` 类作为元素，但我们会给用户提供一个新工具。我们将提供一个类，该类通过 `Consumer`
  构造，并处理 `Result` 实例的流以移除异常情况。这使用户能够在事后指定如何处理异常，并将 `Result<String>` 的 `Stream` 转换为更熟悉的
  `String` 的 `Stream`。所以现在我们有两件事要写：一个方法，它接受一个 `File` 并生成一个 `Result<String>` 的 `Stream`；以及一个后处理器类，它将
  `Result<String>` 的 `Stream` 转换为 `String` 的 `Stream`。现在是时候开始考虑实现了，先从后处理器开始。


  ### 使用创造性展平进行复杂流处理


  这就是我们真正要展示 `Stream` 技巧的地方，`Stream` 的真正威力将显现出来。难点在于我们要对流执行一个相当复杂的操作。我们想要处理然后移除流中满足特定条件的元素：在这种情况下，我们想要处理并移除包含异常的
  `Result` 实例。


  如果你快速浏览一下 `Stream` API，最初看起来我们想要执行一个 `map` 操作：我们想要接收 `Result<String>` 类型并返回一个 `String`，而
  `map` 方法正是你在 `Stream` 中转换类型的方式。`map` 方法看起来像这样：


  `<R> Stream<R> map(Function<? super T,? extends R> mapper)`


  问题在于我们并非是一对一的映射：并非每个输入都会产生一个输出。我们可以返回一个 `Option`，但这能给我们带来什么好处呢？为什么不直接使用我们的 `Result`
  类型呢？如果我们执着于 `map` 方法，我们可以创建一个两部分系统，先执行 `map`，然后执行 `filter` 来移除元素。如果我们走那条路，我们就无法利用类型系统来告诉我们
  `Result` 已经被处理了，并且我们会在 `Result` 被处理和它被移除之间制造一个错误潜入的可能性。一个更好的替代方案是使用 `flatMap`。


  `flatMap` 方法基于“展平”的概念，这是一种函数式结构，它接收一个包含容器的容器，并生成一个包含所有容器中所有元素的单一“扁平”容器。假设你有一个像这样的列表：


  `List<List<String>> list = Arrays.asList(`


  `Arrays.asList("Eddard Stark", "Catelyn Tully", "Benjen Stark"),`


  `Arrays.asList("Lysa Telly", "Jon Arryn", "Robin Arryn"),`


  `Arrays.asList("Cersei Lannister", "Robert Baratheon")`


  `);`


  那么展平后的列表包含所有这些内部列表的所有元素，但没有内部列表结构。它看起来像这样：


  `List<String> flatList = Arrays.asList(`


  `"Eddard Stark", "Catelyn Tully", "Benjen Stark",`


  `"Lysa Telly", "Jon Arryn", "Robin Arryn",`


  `"Cersei Lannister", "Robert Baratheon"`


  `);`


  `flatMap` 方法允许你在 `Stream` 上执行相应的操作。这是它的 API：


  `<R> Stream<R> flatMap(Function<? super` `T` `,? extends Stream<? extends R>> mapper)`


  你可以传入一个函数，该函数接受流的一个元素并返回一个任意类型的新 `Stream`。所有这些返回的流被连接在一起并处理。这就是我们将如何把我们读取的文件的各个结果连接在一起的方式，这也是该
  API 的真正设计目的。然而，当映射操作有可选返回值时，它也可以被使用。为此，当没有结果时，我们将返回 `Stream.empty()`，当有结果时，返回 `Stream.of(element)`。以下是最终的类：


  清单 4-7\. 结果映射函数


  `import java.util.*;`


  `import java.util.function.*;`


  `import java.util.stream.*;`


  `/**`


  `* 一个旨在传递给`


  `* {@link Stream#flatMap(java.util.function.Function)} 以处理`


  `* {@link Result} 实例的类。该类通过一个异常处理器构造，`


  `* 该处理器将接收任何异常，并且 {@link #apply(Result)} 方法`


  `* 将返回一个包含结果（如果有）的流。如果 {@link Result} 实例`


  `* 没有结果，则流包含 0 个元素；如果实例有结果，则包含 1 个元素。`


  `*/`


  `public class ResultMap<RESULT_T>`


  `implements Function<Result<RESULT_T>, Stream<RESULT_T>>`


  `{`


  `private final Consumer<Exception> exceptionHandler;`


  `/**`


  `* 构造一个将委托给给定异常处理器的实例。`


  `*`


  `* @param exceptionHandler 流中异常的处理程序；绝不能`


  `*                         是 {@code null}`


  `*/`


  `public ResultMap(final Consumer<Exception> exceptionHandler) {`


  `Objects.requireNonNull(exceptionHandler, "exception handler");`




  `this.exceptionHandler = exceptionHandler;`


  `}`


  `/**`


  `* 将此函数应用于给定的参数。`


  `* 如果结果容器包含结果，则返回仅包含该结果的流。`


  `* 如果结果容器包含异常，则调用异常处理器并返回空流。`


  `* 如果参数为 {@code null}，则返回空流。`


  `*`


  `* @param resultContainer 结果容器；可能为 {@code null}。`


  `* @return 包含结果（如果有）的 0 或 1 个元素的流。`


  `*/`


  `@Override`


  `public Stream<RESULT_T> apply(final Result<RESULT_T> resultContainer) {`


  `// 通过短路处理来处理任何棘手的边界情况`


  `if (resultContainer == null) return Stream.empty();`


  `// 第一个参数是处理异常的方式，`


  `// 第二个参数是处理结果的方式`


  `return resultContainer.map(`


  `error -> {`


  `exceptionHandler.accept(error);`


  `return Stream.empty();`


  `},`


  `Stream::of`


  `);`


  `}`


  `}`


  函数式编程让这类处理变得如此简洁，真是美妙。额外的好处是，考虑一下对这类类进行单元测试、完整地测试其 API 是多么简单。（如果你想亲自看看，可以在 Webonise
  Lab 的 FunJava 库中查找这个类。）有了我们的类，让我们通过生成流来创建一个使用它的地方。


  ### 流式处理目录中所有文件的所有行


  有了我们的支持类，我们现在可以转向功能的主要部分。我们希望处理一个 `java.io.File` 并返回一个 `Result` 实例的 `Stream`，每个实例要么包含一个
  `IOException`，要么包含文件的一行 `String`。实现的大致分解如下：


  `File` `dir` `=> Stream<Result<String>>:`


  `对于` `dir` `中的每个文件，执行...`


  `File` `file` `=> Stream<Result<String>>:`


  `返回` `file` `中的所有行`


  这将是一个相当命令式的实现。从函数式的角度来看，我们实际上需要三个方法。你能看出是哪三个吗？关键在于要认识到遍历目录是一个有用的技巧，并且没有理由将这个有用的技巧与到达目录后要做什么的细节耦合在一起。实现这种函数式分解的一个有用方法是，严格遵循一个方法只做一件事的原则，同时要记住，普通
  Java 开发者对“一件事”的理解可能过于宽泛：打印目录中所有文件的所有行不是一件事；遍历目录中的文件才是一件事——即使这样也已经是一件相当大的事了。在编写任何代码之前，先在草稿纸上进行设计会很有帮助。如果描述一个函数需要超过一行，那你就做错了。这个问题的一种函数式分解如下：


  `给定：`


  `[行] File` `file` `=> Stream<Result<String>>`


  `返回` `file` `中的所有行`


  `[遍历] File` `dir` `=> Stream<File>`


  `对于` `dir` `中的每个文件，在流中返回该文件`


  `实现：`


  `File` `dir` `=> Stream<Result<String>>`


  `将` `dir` `应用于` `遍历` `，并将结果通过 flatMap 映射到` `行`


  这就是我们现在将要实现的三个函数。由于这三个函数都将 `File` 作为第一个参数，我们将在 `File` 的一个子类上实现它们，这个子类我们称之为 `FunFile`。（如果你想在生产环境中看到它，这个类在
  `also` 项目中可用。）


  让我们从 `Lines` 方法开始，因为它将是最简单的。Java 7 中引入的 `java.nio.file.Files` 类已经扩展了许多有用的生成 `Stream`
  的静态方法，包括 `Files.lines`。不幸的是，尽管名字如此，`Files` 类主要作用于 `Path` 实例。此外，该 API 生成一个 `String`
  对象的 `Stream` 并抛出 `IOException`。这个方法签名使得该方法不适合在流中工作，但其核心功能正是我们想要的：我们只需要让 API 符合我们的需求。我们的包装器实现如清单
  4-8 所示。请记住，这是附加到一个继承自 `java.io.File` 的类上的。


  清单 4-8\. FunFile.getLines( )


  `/**`


  `* 如果此文件是普通文件，则提供该文件的行（以 UTF-8 读取）`


  `* 不带行终止字符，作为流返回。`


  `* 否则，返回一个包含 {@link IOException} 的单个 {@link Result} 实例。`


  `*`


  `* @return 文件的行；永远不会是 {@code null}`


  `*/`


  `public Stream<Result<String>> getLines() {`


  `if (!isFile()) {`


  `return Stream.of(new Result<>(new IOException(`


  `"文件不是普通文件: " + toString()`


  `)));`


  `}`


  `try {`


  `return Files.lines(toPath()).map(Result::new);`


  `} catch (IOException ioe) {`


  `return Stream.of(new Result<>(ioe));`


  `}`


  `}`




  在结束对 `getLines()` 方法的讨论之前，有必要花点时间探讨一下该方法中的错误条件处理。如果底层文件不是“普通文件”（例如，它是一个目录），我们会在流中返回一个
  `IOException`。API 要求文件必须是普通文件，因此文件不是普通文件就违反了 API 的约定。通用规则是：受检异常用于执行环境变化导致的错误，非受检异常用于
  API 违规。如果一个真正优秀的程序员不会预料到该异常，那么它就是非受检异常；如果异常的发生超出了程序的控制范围，那么它就是受检异常。在这种情况下，使用非受检异常是合理的，因为这属于
  API 违规。然而，文件不是普通文件也可能是因为它已不存在。此外，由于 Java 可能因某些原因（例如 NFS 环境下）无法从文件系统确定文件类型，该方法也可能返回
  `false`。因此，我们决定采用标准的受检异常错误处理方法，即使这属于 API 违规。


  现在我们有了 `getLines()` 方法，还需要 `Walk` 方法来遍历目录树。这暴露了 API 定义中的一个细微歧义：当我们说“目录中的所有文件”时，是指“目录的直接子文件”，还是指“目录的所有后代文件，无论中间有多少层目录”？换句话说，这是递归列出还是简单列出？我们可以通过增加一个额外参数来轻松支持这两种方式：如果参数为
  `true`，我们将递归进入子目录；如果为 `false`，则不递归。


  `Walk` 方法的实现非常直接，如代码清单 4-9 所示。我们使用 `Files.list(Path)` 来实现遍历，然后通过 `new FunFile(Path)`
  构造函数将结果 `map` 为 `FunFile`。该方法的大部分代码（按行数计）都用于实现递归：除了要明确区分目录和文件外，我们还需要确保不会陷入无限循环，因此必须检查规范路径。


  **代码清单 4-9. FunFile.listFiles(boolean) 方法**


  `/**`


  `* 返回目录中普通文件的流，如果 {@code recurse} 参数为 {@code true}，`


  `* 则递归进入子目录。`


  `*`


  `* @param recurse 是否递归进入子目录`


  `* @return 目录中的普通文件；绝不会是 {@code null}`


  `*/`


  `public Stream<Result<FunFile>> listFiles(boolean recurse) {`


  `if (!isDirectory()) {`


  `return Stream.of(new Result<>(new IOException(`


  `"File is not a directory: " + toString()`


  `)));`


  `}`


  `try {`


  `final String thisPath = this.getCanonicalPath();`


  `return Files.list(toPath()).map(FunFile::new).flatMap(file -> {`


  `if (recurse && file.isDirectory()) {`


  `final String filePath;`


  `try {`


  `filePath = file.getCanonicalPath();`


  `} catch (IOException ioe) {`


  `return Stream.of(new Result<>(ioe));`


  `}`


  `if (!thisPath.equals(filePath)) {`


  `return file.listFiles(true);`


  `} else {`


  `return Stream.empty();`


  `}`


  `} else if (file.isFile()) {`


  `return Stream.of(new Result<>(file));`


  `} else {`


  `return Stream.empty();`


  `}`


  `}`


  `);`


  `} catch (IOException ioe) {`


  `return Stream.of(new Result<>(ioe));`


  `}`


  `}`


  现在，我们只需将两者结合起来。同样，我们将使用一个 `boolean` 参数来决定是否递归进入子目录。我们将要消费的文件流是一个 `Result` 实例的 `Stream`，因此我们必须决定如何处理错误和结果。错误将被直接传递，包装成一个
  `Stream`，然后再扁平化回主流中。而对于流中的 `FunFile` 实例，将调用其 `getLines()` 方法，该方法会返回一个流，然后该流会被扁平化到主流中。最终结果是一个扁平的流，其中包含从所有文件中读取的行（以及错误）。这就是代码清单
  4-10。本章的所有工作都是为了构建这个简单的方法。


  **代码清单 4-10. FunFile.getLinesInDirectory(boolean) 方法**


  `/**`


  `* 提供目录中所有文件的所有行。如果此文件不是目录，则返回一个包含单个元素的流，`


  `* 该元素是一个包含 {@link IOException} 的 {@link Result} 实例。否则，`


  `* 返回尝试使用 {@link #getLines()} 读取目录中所有文件的所有行后拼接而成的流，`


  `* 如果 {@code recurse} 参数为 {@code true}，则递归进入子目录。`


  `*`


  `* @param recurse 是否递归进入子目录`


  `* @return 所有文件的行；绝不会是 {@code null}`


  `*/`


  `public Stream<Result<String>> getLinesInDirectory(boolean recurse) {`


  `if (!isDirectory()) {`


  `return Stream.of(new Result<>(new IOException(`


  `"File is not a directory: " + toString()`


  `)));`


  `}`


  `Function<Exception, Stream<Result<String>>> onError =`


  `ex -> Stream.of(new Result<>(ex));`


  `Function<FunFile, Stream<Result<String>>> onResult =`


  `FunFile::getLines;`


  `return listFiles(recurse).flatMap(`


  `result -> result.map(onError, onResult)`


  `);`


  `}`


  ## 总结


  在本章中，我们看到了 lambda 在实际应用中的使用。我们了解了它们如何与受检异常交互，以及如何通过接受回调和返回封装结果来处理这些异常情况。更重要的是，我们看到了如何利用
  lambda 工具处理流，从而为一个非平凡问题构思并开发出解决方案。


  在下一章中，我们将探讨另一个 lambda 和流可以大大简化工作的难点领域：数据库访问。我们将扩展本章提出的方法，但会更多地关注数据元素本身的处理与转换。




  '
- '# 5. 使用 Lambda 进行数据访问


  在上一章中，我们了解了 Lambda 如何帮助我们处理文件和流。在本章中，我们将探讨如何与数据库进行交互。早在第 1 章中，我们就看到了 Lambda 如何通过简化回调接口的实现来帮助
  Spring 的 JDBCTemplate。在第 3 章中，我们介绍了流，而在第 4 章中，我们看到了流如何简化文件数据的处理。在本章中，我们将详细了解如何使用
  Java 的数据访问结构（`java.sql` 包）。这还将让我们有机会认识 Java 8 标准库中的另一个新数据结构：分割迭代器（spliterator）。


  如果我们要进行数据访问，就需要处理一个具有一定规模的数据库。在本章中，我们将使用一个 H2 内存数据库，其中包含莎士比亚所有作品中的所有单词索引。这些单词按行号进行组织。这意味着我们有一个
  `text` 表、一个 `line` 表、一个 `word` 表，以及一个连接 `line` 和 `word` 的 `line_word` 表。这些表的 UML
  图如下所示：


  ![A978-1-4302-5999-2_5_Figa_HTML.jpg](img/A978-1-4302-5999-2_5_Figa_HTML.jpg)


  该数据库的数据来源于古腾堡计划提供的文本，网址为 [`http://www.gutenberg.org/ebooks/100`](http://www.gutenberg.org/ebooks/100)。总共有
  38 个文本（十四行诗被归为一个文本）。大约有 113,000 行，约 36,000 个不同的单词，以及近百万个单词的使用实例。虽然按照企业标准，这仍然是一个相对较小的数据库，但它已经足够大，会拖慢处理速度，需要一些特殊处理。我们将在附录
  A 中逐步介绍如何加载该数据库，届时会对比命令式、面向对象和后函数式方法。在本章中，我们将从一个已填充数据的数据库开始，并逐步深入。


  在数据库加载完毕并准备就绪后，让我们思考如何（以及为什么）将流引入其中。从一个简单的需求开始：我们希望打印出所有单词的使用情况，每行一个，并附带所有相关的元数据。例如，如果你正在为
  Hadoop 的 MapReduce 运行生成输入数据，就可能需要这样做。我们将要运行的 SQL（以及一些示例结果）如下：


  `SELECT t.name, l."offset", w."value", lw."offset"`


  `FROM "text" t, word w`


  `INNER JOIN line l ON (t.id = l.text_id)`


  `INNER JOIN line_word lw ON (lw.line_id = l.id AND lw.word_id = w.id)`


  | 文本标题 | 行偏移量 | 单词 | 单词偏移量 |

  | --- | --- | --- | --- |

  | 情人的怨诉 | 328 | Betray | 5 |

  | 冬天的故事 | 3326 | interpose | 5 |

  | 维洛那二绅士 | 2041 | expedition | 7 |

  | 终成眷属 | 23 | Second | 12 |

  | 安东尼与克莉奥佩特拉 | 3840 | solemnity | 7 |


  既然我们可以利用 Lambda，那么如何处理这个查询呢？我们可以将问题分解为下面流程中的步骤。通过使用流，这四个步骤中的每一个都可以独立开发。流实例及其元素类型将把这些独立开发的步骤连接起来。因此，我们可以按任意顺序开发这些步骤，最后再将它们组合在一起。如果我们有多个开发人员，我们甚至可以将不同的步骤分配给不同的开发人员，每个步骤都与前一个步骤相关联。所以，流和
  Lambda 不仅使执行过程更加异步和并发，也使开发过程如此。我们将通过从中间开始，逐步推进到末尾，然后再填充前端并将所有部分整合在一起来证明这一点。


