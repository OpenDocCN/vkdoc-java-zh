  \n`generateParallelStream()`\n\n`.map(mapFunction)`\n\n`.filter(Optional::isPresent).map(Optional::get)`\n\
  \n`.forEach(System.out::println);`\n\n`// 处理异常`\n\n`Map<Object, Exception> exceptions\
  \ = handler.getExceptions();`\n\n`exceptions.forEach((key, val) -> {`\n\n`System.out.println(key\
  \ + \": \" + val);`\n\n`val.printStackTrace(System.err);`\n\n`}`\n\n`);`\n\n`}`\n\
  \n`}`\n\n然而，这种方法要求我们额外进行处理，以便从`Optional`容器中提取值。还有另一种基于`flatMap`的替代方案，我们最早在第 3 章中见过：我们可以让值返回一个流，这个流可以是空的，也可以包含单个元素。这让我们能够避开`Optional`类型及其提取过程，尽管它向流本身隐藏了错误的任何迹象。不过，即使你必须调用`flatMap`方法来执行实际上只是一个简单的映射操作，这个\
  \ API 总体上还是更优雅一些。这段代码如清单 7-5 所示。\n\n**清单 7-5. 使用`flatMap`处理带资源的对象**\n\n`import java.io.ByteArrayInputStream;`\n\
  \n`import java.io.IOException;`\n\n`import java.io.InputStream;`\n\n`import java.util.*;`\n\
