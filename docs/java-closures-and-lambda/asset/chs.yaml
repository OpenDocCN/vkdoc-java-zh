  在 Java 8 中有多种方式实现分割器（spliterator）。创建分割器的大部分功能都包含在 `Spliterators`（注意末尾的“s”）类中。另一种常见的创建分割器的方式是从一个流开始，然后调用
  `stream.spliterator()`。最后一种常见的创建分割器的方式是从迭代器构建，我们将在下一节中探讨。在本节中，我们将使用 `Spliterators`
  类中提供的 `AbstractSpliterator` 基类来实现一个分割器。然后，我们将利用该结果来构建流。


  对于 `AbstractSpliterator` 基类，需要实现的核心方法是 `tryAdvance`。该方法接收一个 `Consumer` 参数，该参数代表下游行为。代码负责将任何新生成的元素传递给该消费者。如果生成了新元素，则方法返回
  `true`；如果已耗尽，则返回 `false`。


  我们不希望将此代码直接绑定到特定的实现中。这样做有两个原因：首先，我们希望简化类并保持代码中清晰的职责划分；其次，通过保持专注，我们将创建一段有价值的可复用代码。在这种情况下，我们的类可以依赖用户来指定转换逻辑。由于
  `ResultSet` 类型上几乎所有有趣的方法都会抛出 `SQLException`，因此我们不能使用简单的函数式接口：相反，我们将提供一个会抛出 `SQLException`
  的抽象方法，然后在我们的 `tryAdvance` 方法中处理该异常。假设我们的类将 `ResultSet` 存储在一个名为 `resultSet` 的字段中，那么最终的方法如清单
  5-9 所示。


  **清单 5-9. ResultSetSpliterator 的 tryAdvance 方法**


  `/**`


  `* 给定一个位于当前行的 {@link ResultSet} 实例，返回该行的`


  `* {@code RESULT_T} 实例。`


  `* 此代码不应调用 {@link java.sql.ResultSet#next()} 或`


  `* 以其他方式改变结果集：应将其视为只读。`


  `*`


  `* @param resultSet 要加载的结果集。`


  `* @return 结果实例。`


  `* @throws SQLException 如果发生错误。`


  `*/`


  `protected abstract RESULT_T processRow(ResultSet resultSet)`


  `throws SQLException;`


  `/**`


  `* 如果存在剩余元素，则对其执行给定操作，`


  `* 返回 {@code true}；否则返回 {@code false}。如果此`


  `* Spliterator 是 {@link #ORDERED} 的，则按遇到顺序对`


  `* 下一个元素执行操作。操作抛出的异常会传递给调用者。`


  `*`


  `* @param action 要执行的操作`


  `* @return 如果进入此方法时没有剩余元素，则返回 {@code false}，`


  `* 否则返回 {@code true}。`


  `* @throws NullPointerException 如果指定的操作为 null`


  `*/`


  `@Override`


  `public boolean tryAdvance(final Consumer<? super RESULT_T> action) {`


  `Objects.requireNonNull(action, "要执行的操作");`


  `try {`


  `if (resultSet.isClosed() || !resultSet.next()) {`


  `return false;`


  `}`


  `RESULT_T result = processRow(resultSet);`


  `if (result == null) {`


  `throw new NullPointerException("processRow 返回了 null");`


  `} else {`


  `action.accept(result);`


  `return true;`


  `}`


  `} catch (SQLException sqle) {`


  `throw new RuntimeException("处理结果集时发生 SQL 异常",`


  `sqle);`


  `}`


  `}`




  该类的构造函数需要扩展 `AbstractSpliterator` 构造函数。该构造函数接受两个参数：分割器的预估大小和分割器的特性。分割器的预估大小顾名思义：即对返回元素数量的粗略估计。如果完全不知道分割器的大小，则使用魔法值
  `Long.MAX_VALUE`。第二个参数是分割器的特性，通过它你可以向运行时建议如何使用你的分割器。


  特性有多种，它们被当作位域来处理。其中最重要的两个是 `IMMUTABLE` 和 `CONCURRENT`，它们指定了分割器与数据源之间的关系。如果分割器对数据源的视图不可更改，则分割器应指定
  `IMMUTABLE`。我们的 `ResultSet` 分割器就属于这种情况，因为 SQL 查询的结果无法更改。或者，如果分割器对数据源的视图可以被并发修改，则分割器应指定
  `CONCURRENT`。这适用于操作线程安全集合或内存映射文件的分割器。


  分割器还可以拥有其他一些特性。与互斥的 `IMMUTABLE` 和 `CONCURRENT` 不同，这些特性更加独立：以下特性之间互不排斥。最重要的是 `ORDERED`。该特性保证元素将按“遭遇顺序”处理，即分割器的迭代顺序。如果你将
  `ORDERED` 传递给分割器，你将得到一个类似于顺序流的 API——实现中仍有一些并行化的余地，但不多。如果你指定了 `ORDERED`，还可以指定 `SORTED`。如果你的分割器是
  `SORTED`，那么要么分割器附带了一个比较器，要么元素根据其自然顺序排序。这允许对排序进行一些优化，也允许分割器的结果被并行处理后再按顺序排序。`DISTINCT`
  标志表示分割器的每个元素都与其他元素不同。这表示无需额外工作来过滤重复值，例如在 `Stream.distinct()` 中。`NONNULL` 特性断言分割器的任何结果都不会为
  null，这允许绕过一些安全检查。最后，`SIZED` 和 `SUBSIZED` 特性都断言分割器的预估大小是准确的。`SUBSIZED` 额外保证从该分割器拆分出的分割器本身也是
  `SIZED` 和 `SUBSIZED` 的：换句话说，`SUBSIZED` 意味着不仅已知元素总数，而且如果元素被拆分到不同的分割器中，部分大小也是已知的。


  在我们的案例中，每一行都会创建一个实例，因此我们可以使用 `NONNULL` 特性。由于通常最好避免使用 `null`，我们可以直接在类中实现这一点。在我们的特定案例中，我们还知道每个生成的
  `WordUsage` 实例都与其他实例不同，因此我们可以使用 `DISTINCT` 特性。然而，这并非适用于所有 SQL 查询。我们不知道将要创建的实例总数，因此不能使用
  `SIZED`。我们当前的查询也没有任何排序，并且确实不需要排序，因此我们不会使用 `ORDERED`。最后，SQL 查询的结果在我们的迭代过程中无法修改，因此我们可以返回
  `IMMUTABLE` 选项。确定这些之后，我们可以构建构造函数，从而得到清单 5-10 中的类。


  **清单 5-10\. 带构造函数的 ResultSetSpliterator**


  `import java.sql.ResultSet;`


  `import java.sql.SQLException;`


  `import java.util.*;`


  `import java.util.function.*;`


  `/**`


  `* 一个遍历{@link java.sql.ResultSet}的{@link java.util.Spliterator}。当结果集耗尽时，`




  `* 它将被自动关闭。实现类必须实现`


  `* {@link #processRow(java.sql.ResultSet)} 来`


  `* 指定如何将一行转换为结果对象。`


  `*/`


  `public abstract class ResultSetSpliterator<RESULT_T>`


  `extends Spliterators.AbstractSpliterator<RESULT_T>`


  `{`


  `private static final int CHARACTERISTICS =`


  `Spliterator.IMMUTABLE | Spliterator.DISTINCT | Spliterator.NONNULL;`


  `private final ResultSet resultSet;`


  `/**`


  `* 构造函数。`


  `*`


  `* @param resultSet 要处理的结果集；不能为 {@code null}。`


  `* @param additionalCharacteristics 除`


  `{@link java.util.Spliterator#IMMUTABLE}`


  `*                                 和 {@link java.util.Spliterator#NONNULL} 之外的相关特性，`


  `*                                 如果没有则为 {@code 0}`


  `*/`


  `public ResultSetSpliterator(`


  `final ResultSet resultSet,`


  `final int additionalCharacteristics`


  `) {`


  `super(Long.MAX_VALUE, CHARACTERISTICS | additionalCharacteristics);`


  `Objects.requireNonNull(resultSet, "result set");`


  `this.resultSet = resultSet;`


  `}`


  `// 此处后续代码请参见清单 5-9`


  `}`


  现在只剩下一个问题需要解决：关闭 ResultSet。如果用户将 ResultSet 传入此对象，然后关闭了 ResultSet，那么这个 spliterator
  可能尚未被调用。我们在 streams 中曾遇到过这个问题，当时我们使用 onClose 回调来处理它。与 streams 不同，spliterators 没有“被关闭”的概念，因此我们必须自己构建这个功能。我们希望的是，当我们完成对
  ResultSet 的处理后，它能够被关闭。ResultSet 也可能持有一个 Statement 或 Connection，因此我们也希望让用户能够选择关闭这些资源。为了支持这一点，我们的构造函数将接受可变数量的
  AutoCloseable 实例，并且当我们耗尽结果集时，将关闭它们。这涉及到添加一个 `doClose()` 方法，并在 ResultSet 耗尽时调用该方法。更新后的类结果如清单
  5-11 所示。


  清单 5-11\. 完整的 ResultSetSpliterator 类


  `import java.sql.ResultSet;`


  `import java.sql.SQLException;`


  `import java.util.*;`


  `import java.util.function.*;`


  `/**`


  `* 一个遍历 {@link java.sql.ResultSet} 的 {@link java.util.Spliterator}。`


  `* 当结果集耗尽时，它将被自动关闭。`


  `* 实现类必须扩展 {@link #processRow(java.sql.ResultSet)} 来`


  `* 指定如何将一行转换为结果对象。`


  `*/`


  `public abstract class ResultSetSpliterator<RESULT_T>`


  `extends Spliterators.AbstractSpliterator<RESULT_T>`


  `{`


  `private static final int CHARACTERISTICS =`


  `Spliterator.IMMUTABLE | Spliterator.NONNULL;`


  `private final ResultSet resultSet;`


  `private final AutoCloseable[] toClose;`


  `/**`


  `* 构造函数。`


  `*`


  `* @param resultSet 要处理的结果集；不能为 {@code null}。`


  `* @param additionalCharacteristics 除`


  `*                                 {@link java.util.Spliterator#IMMUTABLE}`


  `*                                 和 {@link java.util.Spliterator#NONNULL} 之外的相关特性，`


  `*                                 如果没有则为 {@code 0}`


  `* @param toClose 可选的额外自动关闭资源（例如`


  `*                {@link java.sql.Connection}），在结果集`


  `*                耗尽时关闭；可以为 {@code null}`


  `*                （等同于空数组）。`


  `*/`


  `public ResultSetSpliterator(`


  `final ResultSet resultSet, final int additionalCharacteristics,`


  `final AutoCloseable… toClose`


  `) {`


  `super(Long.MAX_VALUE, CHARACTERISTICS | additionalCharacteristics);`


  `Objects.requireNonNull(resultSet, "result set");`


  `this.resultSet = resultSet;`


  `if (toClose == null) {`


  `this.toClose = new AutoCloseable[0];`


  `} else {`


  `this.toClose = toClose;`


  `}`


  `}`


  `/**`


  `* 给定一个位于当前行的 {@link ResultSet} 实例，返回该行的`


  `* {@code RESULT_T} 实例。`


  `* 此代码不应调用 {@link java.sql.ResultSet#next()} 或`


  `* 以其他方式改变结果集：应将其`


  `* 视为只读。`


  `*`


  `* @param resultSet 要加载的结果集。`


  `* @return 结果实例。`


  `* @throws SQLException 如果发生错误。`


  `*/`


  `protected abstract RESULT_T processRow(ResultSet resultSet)`


  `throws SQLException;`


  `/**`


  `* 如果存在剩余元素，则对其执行给定操作，`


  `* 返回 {@code true}；否则返回 {@code false}。如果此`


  `* Spliterator 是 {@link #ORDERED}，则按遇到顺序对`


  `* 下一个元素执行操作。操作抛出的异常`


  `* 会传递给调用者。`


  `*`


  `* @param action 要执行的操作`


  `* @return 如果进入此方法时没有剩余元素则返回 {@code false}，`


  `* 否则返回 {@code true}。`


  `* @throws NullPointerException 如果指定的操作为 null`


  `*/`


  `@Override`


  `public boolean tryAdvance(final Consumer<? super RESULT_T> action) {`


  `Objects.requireNonNull(action, "要执行的操作");`


  `try {`


  `if (resultSet.isClosed() || !resultSet.next()) {`


  `doClose();`


  `return false;`


  `}`


  `RESULT_T result = processRow(resultSet);`


  `if (result == null) {`


  `throw new NullPointerException("processRow 返回了 null");`


  `} else {`


  `action.accept(result);`


  `return true;`


  `}`


  `} catch (SQLException sqle) {`


  `throw new RuntimeException(`


  `"处理结果集时发生 SQL 异常", sqle);`


  `}`


  `}`


  `private void doClose() {`


  `try {`


  `if (resultSet != null && !resultSet.isClosed()) resultSet.close();`


  `} catch (SQLException ignore) {}`


  `for (int i = 0; i < toClose.length; i++) {`


  `try {`


  `AutoCloseable closeMe = toClose[i];`


  `toClose[i] = null;`


  `if (closeMe != null && closeMe != resultSet) closeMe.close();`


  `} catch (Exception ignore) {}`


  `}`


  `}`


  `}`


  我们的工具类终于构建完成，现在可以为 WordUsage 查询构建 stream 了。我们只需声明一个 ResultSetSpliterator 实例，将其 ResultSet
  处理委托给我们的 `WordUsage.fromResultSet` 工具方法。由于我们每次都会返回一个不同的 WordUsage，因此可以传入 DISTINCT
  特性。我们还将 ResultSet 的 connection 传给它，这样一旦 spliterator 耗尽，它就会关闭连接。构建好该 spliterator
  后，我们将传入该 spliterator 以生成一个并行 stream。最终的代码如清单 5-12 所示。


  清单 5-12\. 使用 ResultSetSpliterator 生成新 Stream


  `public static Stream<WordUsage> createStream(`


  `Connection conn, ResultSet resultSet`


  `) throws SQLException {`


  `Spliterator<WordUsage> usages =`


  `new ResultSetSpliterator<WordUsage>(`


  `resultSet, Spliterator.DISTINCT, conn`


  `) {`


  `@Override`


  `protected WordUsage processRow(final ResultSet resultSet)`


  `throws SQLException`


  `{`


  `return WordUsage.fromResultSet(resultSet);`


  `}`


  `};`


  `Stream<WordUsage> stream = StreamSupport.stream(usages, true);`


  `return stream;`


  `}`




  ### 方法四：从迭代器构建流


  尽管构建一个可拆分迭代器（spliterator）很有教育意义，但工作量也很大。如果你不需要那种程度的控制，你可以从迭代器构建一个可拆分迭代器，然后再从那里构建流。有两个桥接方法可以从迭代器获取可拆分迭代器：`Spliterators.spliterator(Iterator,
  long, int)` 和 `Spliterators.spliteratorUnknownSize(Iterator, int)`。前者在你已知将要迭代的元素数量时使用；后者则在你不知道数量时使用。前者的效率明显高于后者，因此如果你能提前确定数量，请务必使用前者。在这两种情况下，你都需要将可拆分迭代器的特性作为最后一个参数传入。


  为 ResultSet 构建迭代器比构建可拆分迭代器要简单得多。因此，我们的迭代器实现是清单 5-11 中可拆分迭代器实现的一个简化版本。唯一需要注意的是，可拆分迭代器中的单个
  `tryAdvance` 方法在迭代器类中分成了两个不同的方法：`hasNext()` 和 `next()`。因此，我们需要能够存储一些状态，以判断是否还有下一个元素。这是一个三态变量：它可以是
  true、false 或 unknown。这是 `null` 为数不多的合理用途之一：通过使用 Boolean 类型，我们可以获得这三种状态。我们的迭代器实现如清单
  5-13 所示。


  **清单 5-13. ResultSetIterator 实现**


  `import java.sql.ResultSet;`


  `import java.sql.SQLException;`


  `import java.util.*;`


  `/**`


  `* 一个遍历 {@link java.sql.ResultSet} 的 {@link java.util.Iterator}。`


  `* 当结果集耗尽时，`


  `* 它将被自动关闭。实现类应扩展`


  `* {@link #processRow(java.sql.ResultSet)} 以`


  `* 指定如何将一行转换为结果对象。`


  `*/`


  `public abstract class ResultSetIterator<RESULT_T>`


  `implements Iterator<RESULT_T>`


  `{`


  `private final ResultSet resultSet;`


  `private final AutoCloseable[] toClose;`


  `private volatile Boolean hasNext = null;`


  `/**`


  `* 构造函数。`


  `*`


  `* @param resultSet 要处理的结果集；不能为 {@code null}。`


  `* @param toClose   可选的额外自动关闭资源（例如`


  `*                 {@link java.sql.Connection}），在结果集耗尽时关闭；`


  `*                 可以为 {@code null}（等同于空数组）。`


  `*/`


  `public ResultSetIterator(final ResultSet resultSet, final AutoCloseable... toClose)
  {`


  `Objects.requireNonNull(resultSet, "result set");`


  `this.resultSet = resultSet;`


  `if (toClose == null) {`


  `this.toClose = new AutoCloseable[0];`


  `} else {`


  `this.toClose = toClose;`


  `}`


  `}`


  `/**`


  `* 给定一个位于当前行的 {@link java.sql.ResultSet} 实例，`


  `* 返回该行的 {@code RESULT_T} 实例。`


  `* 此代码不应调用 {@link java.sql.ResultSet#next()} 或`


  `* 以其他方式改变结果集：应将其视为只读。`


  `*`


  `* @param resultSet 要加载的结果集。`


  `* @return 结果实例。`


  `* @throws java.sql.SQLException 如果发生错误。`


  `*/`


  `protected abstract RESULT_T processRow(ResultSet resultSet)`


  `throws SQLException;`


  `private void doClose() {`


  `try {`


  `if (!resultSet.isClosed()) resultSet.close();`


  `} catch (SQLException ignore) {}`


  `for (int i = 0; i < toClose.length; i++) {`


  `try {`


  `AutoCloseable closeMe = toClose[i];`


  `toClose[i] = null;`


  `if (closeMe != null && closeMe != resultSet) closeMe.close();`


  `} catch (Exception ignore) {}`


  `}`


  `}`


  `/**`


  `* 如果迭代还有更多元素，则返回 {@code true}。`


  `* （换句话说，如果 {@link #next} 会返回一个元素而不是抛出异常，则返回 {@code true}。）`


  `*`


  `* @return 如果迭代还有更多元素，则返回 {@code true}。`


  `*/`


  `@Override`


  `public boolean hasNext() {`


  `try {`


  `if (hasNext == null) {`


  `hasNext = !resultSet.isClosed() && resultSet.next();`


  `}`


  `} catch (SQLException sqle) {`


  `throw new RuntimeException(`


  `"无法确定是否还有下一个元素", sqle`


  `);`


  `}`


  `if (!hasNext) doClose();`


  `return hasNext;`


  `}`


  `/**`


  `* 返回迭代中的下一个元素。`


  `*`


  `* @return 迭代中的下一个元素`


  `* @throws java.util.NoSuchElementException 如果迭代没有更多元素`


  `*/`


  `@Override`


  `public RESULT_T next() {`


  `if (!hasNext()) {`


  `throw new NoSuchElementException("没有剩余元素");`


  `}`


  `try {`


  `return processRow(resultSet);`


  `} catch (SQLException sqle) {`


  `throw new RuntimeException("处理元素时出错", sqle);`


  `} finally {`


  `hasNext = null;`


  `}`


  `}`


  `}`


  有了这个迭代器，现在用户需要负责在创建可拆分迭代器时知道要传入哪些特性。我们从上一节看到，可以传入 `DISTINCT`、`IMMUTABLE` 和 `NONNULL`。一旦创建了可拆分迭代器，我们将像上次一样将其传入
  `StreamSupport.stream`。此代码见清单 5-14。


  **清单 5-14. 从 ResultSetIterator 创建流**


  `public static Stream<WordUsage> createStream(`


  `Connection conn, ResultSet resultSet`


  `) throws SQLException {`


  `Iterator<WordUsage> usages =`


  `new ResultSetIterator<WordUsage>(resultSet, conn) {`


  `@Override`


  `protected WordUsage processRow(final ResultSet resultSet)`


  `throws SQLException`


  `{`


  `return WordUsage.fromResultSet(resultSet);`


  `}`


  `};`


  `Spliterator<WordUsage> spliterator =`


  `Spliterators.spliteratorUnknownSize(usages,`


  `Spliterator.NONNULL | Spliterator.DISTINCT | Spliterator.IMMUTABLE`


  `);`


  `Stream<WordUsage> stream = StreamSupport.stream(spliterator, true);`


  `return stream;`


  `}`


  在这种情况下，这个最终解决方案与之前的解决方案一样快。从 API 的角度来看，我们将理解和决定特性的责任转移给了用户，并迫使他调用 `Spliterators.spliteratorUnknownSize`。这两点都不是最优的，但也算不上繁重。考虑到这种情况，这是我在代码中会采用的解决方案。但它并非在所有情况下都适用。


  具体来说，如果你能非常高效地进行拆分，那么你应该实现自己的可拆分迭代器。如果你能以智能且高效的方式拆分工作负载，那么提供你自己的 `Spliterator.trySplit`
  实现将是一个巨大的优势。一个 `ResultSet` —— 以及任何其他类型的单流处理，比如任何 `java.io.Stream` —— 并不会给你提供太多可操作的空间。但如果你确实遇到了可以在
  `trySplit` 上发挥聪明才智的情况，那么当然要实现你自己的 `Spliterator`。




  ## 整合所有内容


  我们终于准备好将所有内容整合在一起：流及其各个组成部分。我们将使用 `ResultSetSpliterator` 实现，因为它已经存在且拥有最友好的用户 API。然后，我们将使用
  `WordUsage.toTSV()` 方法将其映射为制表符分隔的值。最后，我们将把制表符分隔的值作为字符串打印到标准输出。相关代码见清单 5-15。


  **清单 5-15\. 带映射和打印输出的查询**


  `import java.sql.Connection;`


  `import java.sql.ResultSet;`


  `import java.sql.SQLException;`


  `import java.util.*;`


  `import java.util.stream.*;`


