  现在情况变得相当奇怪了。我们看到了一个带有奇怪名字的合成方法示例：`lambda$getSupplier$0(java.lang.String);`。这是一个实例方法，它接受一个
  String，并使用该实例在该字符串上调用`provideMessage`：它加载`aload_0`（即`this`），然后加载`aload_1`（即参数），接着执行`invokevirtual`。我们的`getSupplier`方法做了类似的事情：它加载`message`和`this`，然后执行我们熟悉的`invokedynamic`调用来生成
  supplier。


  请注意，现在我们在`invokedynamic`的签名中传递了两个参数：所有需要在 lambda 实现内部引用的变量都成为了`invokedynamic`的参数。这被称为“lambda
  提升”：我们将绑定变量从 lambda 中提升出来，并将它们作为实例化 lambda 的参数。我们执行了 lambda 提升的信号是使用`invokespecial`作为方法调用方式：我们之前看到它用于表示构造器，但现在我们用它来向引导方法发出信号，表明我们必须使用提升后的参数来构造一个新实例。


  需要认识到的重要一点是，声明一个使用变量的 lambda 在很大程度上类似于声明一个引用这些变量的新类型：我们最终会实例化一个新实例，该实例将持有这些变量，并在执行时引用这些成员字段。因此，内联定义
  lambda 和定义自己的匿名内部类在性能特性上几乎完全相同。根据你所处的场景，选择更自然的方式即可。


  ## 结论


  Lambda 表达式非常强大，但在底层，它们在概念上很简单：Java SDK 有一个方法，它会接收你的 lambda 并返回一个实例，该实例的类型就是你的 lambda
  所针对的目标类型。它使用`invokedynamic`字节码指令仅执行一次绑定，在首次执行之后，就等同于直接实例化接口实现。如果你内联定义 lambda，那么你会得到一个合成方法，但其他方面几乎完全相同。字节码中有很多噪音，并且需要仔细的簿记工作才能让这一切正确运行，但实现的概念实际上相当简单。最重要的是，与解决相同问题的其他方式相比，这种实现中没有任何内在因素会使
  lambda 变得缓慢或沉重：你永远不可能通过将 lambda 重写为其他形式来获得显著的性能提升。实现比那要聪明得多！




