  (?!')\\\\p{Punct}\", \"\");`\n\n`final int wordId;`\n\n`if (wordMap.containsKey(word))\
  \ {`\n\n`wordId = wordMap.get(word);`\n\n`} else {`\n\n`createWord.setString(1,\
  \ word);`\n\n`boolean createdWord = createWord.executeUpdate() == 1;`\n\n`assert\
  \ createdWord : \"无法创建单词: \" + word;`\n\n`rs = createWord.getGeneratedKeys();`\n\
  \n`hasNext = rs.next();`\n\n`assert hasNext : \"已创建单词但仍无法找到它!\";`\n\n`String newWord\
  \ = word;`\n\n`executor.submit(() ->`\n\n`System.out.println(\"新单词: \" + newWord));`\n\
  \n`wordId = rs.getInt(1);`\n\n`rs.close();`\n\n`wordMap.put(word, wordId);`\n\n\
  `}`\n\n`createLineWord.setInt(1, lineId);`\n\n`createLineWord.setInt(2, wordId);`\n\
  \n`createLineWord.setInt(3, wordOffset);`\n\n`boolean createdLineWord = createLineWord.executeUpdate()\
  \ == 1;`\n\n`assert createdLineWord : \"无法创建行-单词关联\";`\n\n`}`\n\n`}`\n\n`}`\n\n\
  `}`\n\n`} finally {`\n\n`executor.shutdown();`\n\n`executor.awaitTermination(1L,\
  \ TimeUnit.MINUTES);`\n\n`}`\n\n`}`\n\n`/**`\n\n`* 返回下一行`\n\n`*/`\n\n`public static\
  \ String nextLine(BufferedReader reader) throws IOException {`\n\n`String line;`\n\
  \n`while ((line = reader.readLine()) != null) {`\n\n`line = BAD_CHARS.matcher(line).replaceAll(\"\
  \");`\n\n`line = line.trim();`\n\n`if (line.isEmpty() || IS_WHITESPACE.test(line))\
  \ {`\n\n`continue;`\n\n`} else {`\n\n`break;`\n\n`}`\n\n`}`\n\n`return line;`\n\n\
  `}`\n\n`private static int doCreateBook(`\n\n`PreparedStatement createBook, String\
  \ title, int year,`\n\n`ExecutorService executor`\n\n`) throws SQLException {`\n\
  \n`createBook.setString(1, title);`\n\n`createBook.setInt(2, year);`\n\n`boolean\
  \ createdBook = createBook.executeUpdate() == 1;`\n\n`assert createdBook : \"无法创建书籍\"\
  ;`\n\n`ResultSet rs = createBook.getGeneratedKeys();`\n\n`boolean hasNext = rs.next();`\n\
  \n`assert hasNext : \"获取 \" + title + \" 的生成键时无结果\";`\n\n`int textId = rs.getInt(1);`\n\
  \n`rs.close();`\n\n`executor.submit(() -> System.out.println(title));`\n\n`return\
  \ textId;`\n\n`}`\n\n`public static void main(String[] args) throws Exception {`\n\
  \n`createDatabase();`\n\n`}`\n\n`}`\n\n这段代码完成的任务相对简单，但已经变得难以理解。这揭示了命令式代码的问题：其语义结构有限。虽然发生了很多事情，但并未向读者传达这些事件发生的原因。相反，脚本的繁琐细节完全暴露在一种基本无结构的指令流中。\n\
  \n尽管命令式编程存在明显的缺点，但在许多场景下它仍然非常有用。由于命令式代码编写速度很快，因此非常适合用途清晰简单的短小代码片段。例如，单元测试在 Java\
  \ 中几乎都是命令式的。Java 中的大多数方法体也是命令式的，这也是保持方法体简短的部分动机。其他语言和上下文也使命令式范式更为自然，例如用于系统管理脚本的\
  \ bash 或 perl。总的来说，如果你能毫不费力地将整个逻辑记在脑中，那么命令式风格是一个不错的选择。\n\n\n\n## 面向对象编程范式\n\n命令式编程范式在可维护性、可组合性和可重用性方面带来了诸多挑战。正是这些挑战催生了该范式的一个改进版本，即面向对象范式。实际上，从诞生之初，Java\
  \ 就是面向对象编程的典型代表。在命令式编程中，你的应用程序是一系列指令。而在面向对象编程中，你的应用程序仍然是一系列指令，但应用程序在决定调用哪些指令时可以相当智能。应用程序为一系列指令（即对象）提供了许多容器，程序员在运行时指定要调用哪个容器中的指令。在面向对象范式中，一个命令式程序可以被看作是一个拥有一个全局对象的程序，所有方法都位于该单一对象上。\n\
  \n面向对象编程是命令式编程的衍生，但它带来了许多优势。最大的优势在于你可以封装状态：不再需要所有东西都了解其他所有东西的一切。相反，开发者可以将所有相关信息捕获到单个对象内部，并公开使用该状态的指令，同时不暴露该状态本身。面向对象编程的其他优势都源于这种封装技巧：例如，我可以指定一个关于你必须实现的指令的契约，然后你可以提供任何你喜欢的实现来满足该契约。\n\
  \n尽管 Java 本质上是一种面向对象的编程语言，但并非所有 Java 代码都是面向对象的。你会通过大量小型、可扩展的类型来识别面向对象的 Java 代码，这些类型被组合在一起以构建更高级的对象。方法将是对象属性的薄包装器，只附带最少的业务逻辑用于委托。在面向对象编程中，每个类都像一个懒惰的管理者：它尽可能快地将工作委托给其下属。\n\
  \n为了实现我们的面向对象解决方案，我们将把问题分解为多个对象，每个对象只做一小部分工作，然后委托给另一个对象。因此，我们将从一个 `ShakespeareLineIterator`\
  \ 开始，它将遍历文本的行。这个迭代器将被传递给一个 `ShakespeareAnthologyParser`，后者负责将迭代的行分解为文本。每个文本将被传递给一个\
  \ `ShakespeareTextParser`，后者负责解析文本。它将有一个方法，返回一个 `ShakespeareText` 实例的集合。这些 `ShakespeareText`\
  \ 实例将各自提供其标题，以及一系列 `ShakespeareLine` 实例。这些行中的每一行将包含一系列 `ShakespeareWord` 实例。这些类的代码见清单\
  \ A-2。\n\n**清单 A-2. 面向对象文本解析**\n\n`### ShakespeareLineIterator.java`\n\n`import\
  \ java.io.*;`\n\n`import java.util.*;`\n\n`import java.util.function.*;`\n\n`import\
  \ java.util.regex.*;`\n\n`/**`\n\n`* 遍历莎士比亚选集，提供选集中的各行。`\n\n`*/`\n\n`public class\
  \ ShakespeareLineIterator implements Iterator<String> {`\n\n`private static final\
  \ String SOURCE = \"shakespeare.txt\";`\n\n`private static final Predicate<String>\
  \ IS_WHITESPACE =`\n\n`Pattern.compile(\"^\\\\s*$\").asPredicate();`\n\n`private\
  \ static final Pattern BAD_CHARS =`\n\n`Pattern.compile(\"\\uFEFF|\\\\p{Cntrl}\"\
  ); // BOM 和控制字符`\n\n`private static final Predicate<String> IS_COMMENT_START =`\n\
  \n`Pattern.compile(\"^<<\").asPredicate();`\n\n`private static final Predicate<String>\
  \ IS_COMMENT_END =`\n\n`Pattern.compile(\">>$\").asPredicate();`\n\n`private final\
  \ BufferedReader reader;`\n\n`private volatile boolean closed = false;`\n\n`private\
  \ volatile String nextElement = null;`\n\n`private volatile IOException exception\
  \ = null;`\n\n`/**`\n\n`* 构造该类的一个实例，该实例从打包的莎士比亚全集文本中读取数据。`\n\n`*`\n\n`* @throws\
  \ IOException 如果访问时出现异常`\n\n\n\n`*                     资源。`\n\n`*/`\n\n`public ShakespeareLineIterator()\
  \ throws IOException {`\n\n`InputStream inputStream =`\n\n`ShakespeareLineIterator.class`\n\
  \n`.getClassLoader()`\n\n`.getResourceAsStream(SOURCE);`\n\n`this.reader =`\n\n\
  `new BufferedReader(`\n\n`new InputStreamReader(`\n\n`inputStream, \"UTF-8\"`\n\n\
  `)`\n\n`);`\n\n`}`\n\n`private void explodeIfException() {`\n\n`if (exception !=\
  \ null) {`\n\n`throw new UncheckedIOException(\"读取流时出错\", exception);`\n\n`}`\n\n\
  `}`\n\n`/**`\n\n`* 返回文本的下一行，过滤掉空白字符、错误字符、注释等。`\n\n`* 将 {@link #nextElement} 赋值为下一行，如果没有剩余行则赋值为\
  \ {@code null}。`\n\n`*/`\n\n`private String nextLine() {`\n\n`explodeIfException();`\n\
  \n`if (closed) return nextElement = null;`\n\n`try {`\n\n`String line;`\n\n`while\
  \ ((line = reader.readLine()) != null) {`\n\n`line = BAD_CHARS.matcher(line).replaceAll(\"\
  \");`\n\n`line = line.trim();`\n\n`if (line.isEmpty() || IS_WHITESPACE.test(line))\
  \ {`\n\n`continue;`\n\n`} else {`\n\n`break;`\n\n`}`\n\n`}`\n\n`if (line != null\
  \ && IS_COMMENT_START.test(line)) {`\n\n`while ((line = reader.readLine()) != null)\
  \ {`\n\n`if (IS_COMMENT_END.test(line)) break;`\n\n`}`\n\n`if (line != null) return\
  \ nextLine();`\n\n`}`\n\n`if (line == null) {`\n\n`reader.close();`\n\n`closed =\
  \ true;`\n\n`}`\n\n`return nextElement = line;`\n\n`} catch (IOException ioe) {`\n\
  \n`this.exception = ioe;`\n\n`explodeIfException();`\n\n`throw new IllegalStateException(\"\
  此代码不应被执行！\");`\n\n`}`\n\n`}`\n\n`/**`\n\n`* 如果迭代还有更多元素，则返回 {@code true}。`\n\n`*\
  \ （换句话说，如果 {@link #next} 会返回一个元素而不是抛出异常，则返回 {@code true}。）`\n\n`*`\n\n`* @return\
  \ 如果迭代还有更多元素，则返回 {@code true}`\n\n`*/`\n\n`@Override`\n\n`public boolean hasNext()\
  \ {`\n\n`explodeIfException();`\n\n`if (nextElement != null) return true;`\n\n`if\
  \ (closed) return false;`\n\n`if (nextLine() != null) return true;`\n\n`return false;`\n\
  \n`}`\n\n`/**`\n\n`* 返回迭代中的下一个元素。`\n\n`*`\n\n`* @return 迭代中的下一个元素`\n\n`* @throws\
  \ java.util.NoSuchElementException 如果迭代没有更多元素`\n\n`*/`\n\n`@Override`\n\n`public\
  \ String next() {`\n\n`explodeIfException();`\n\n`if (nextElement != null || nextLine()\
  \ != null) {`\n\n`String toReturn = nextElement;`\n\n`nextElement = null;`\n\n`return\
  \ toReturn;`\n\n`}`\n\n`throw new NoSuchElementException(\"没有更多行可读取！\");`\n\n`}`\n\
  \n`/**`\n\n`* 提供 {@link #next()} 将返回的元素，但不推进迭代器。`\n\n`*`\n\n`* @return 下一个元素是什么，如果没有下一个元素则返回\
  \ {@code null}`\n\n`*/`\n\n`public String peek() {`\n\n`explodeIfException();`\n\
  \n`if (nextElement != null) return nextElement;`\n\n`if (closed) return null;`\n\
  \n`return nextLine();`\n\n`}`\n\n`}`\n\n`### ShakespeareAnthologyParser.java`\n\n\
  `import java.io.IOException;`\n\n`import java.util.*;`\n\n`import java.util.function.*;`\n\
  \n`import java.util.regex.*;`\n\n`/**`\n\n`* 负责将莎士比亚选集解析为文本。`\n\n`*/`\n\n`public\
  \ class ShakespeareAnthologyParser {`\n\n`private static final Predicate<String>\
  \ IS_YEAR =`\n\n`Pattern.compile(\"¹(5|6)\\\\d\\\\d$\").asPredicate();`\n\n`private\
  \ static final Predicate<String> IS_AUTHOR =`\n\n`Pattern.compile(\"^by\\\\s+William\\\
  \\s+Shakespeare$\").asPredicate();`\n\n`private static final Predicate<String> IS_THE_END\
  \ =`\n\n`Pattern.compile(\"^THE\\\\s+END$\").asPredicate();`\n\n`private static\
  \ final Predicate<String> IS_DIGITS =`\n\n`Pattern.compile(\"^\\\\d+$\").asPredicate();`\n\
  \n`private static final String SONNETS_TITLE = \"THE SONNETS\";`\n\n`/**`\n\n`*\
  \ 基于内存中的莎士比亚选集解析文本。`\n\n`*`\n\n`* @return 解析后的文本`\n\n`* @throws IOException 如果在读取文本时发生异常`\n\
  \n`*/`\n\n`public Collection<ShakespeareText> parseTexts() throws IOException {`\n\
  \n`List<ShakespeareText> texts = new ArrayList<>();`\n\n`ShakespeareLineIterator\
  \ lines = new ShakespeareLineIterator();`\n\n`while (lines.hasNext()) {`\n\n`int\
  \ year = parseYear(lines);`\n\n`String title = parseTitle(lines);`\n\n`parseAuthor(lines);`\n\
  \n`if (SONNETS_TITLE.equalsIgnoreCase(title)) {`\n\n`texts.addAll(parseSonnets(lines));`\n\
  \n`} else {`\n\n`texts.add(parseText(title, year, lines));`\n\n`}`\n\n`}`\n\n\n\n\
  `return texts;`\n\n`}`\n\n`private ShakespeareText parseText(`\n\n`final String\
  \ title, final int year,`\n\n`final ShakespeareLineIterator lines`\n\n`) {`\n\n\
  `List<ShakespeareLine> parsedLines = new ArrayList<>();`\n\n`int lineNumber = 0;`\n\
  \n`String line;`\n\n`while (lines.hasNext() && !IS_THE_END.test(line = lines.next()))\
  \ {`\n\n`lineNumber += 1;`\n\n`parsedLines.add(new ShakespeareLine(lineNumber, line));`\n\
  \n`}`\n\n`return new ShakespeareText(title, year, parsedLines);`\n\n`}`\n\n`private\
  \ Collection<ShakespeareSonnet> parseSonnets(`\n\n`final ShakespeareLineIterator\
  \ lines`\n\n`) {`\n\n`List<ShakespeareSonnet> sonnets = new ArrayList<>();`\n\n\
  `while (lines.hasNext() && !IS_THE_END.test(lines.peek())) {`\n\n`sonnets.add(parseSonnet(lines));`\n\
  \n`}`\n\n`if (lines.hasNext()) lines.next(); // 跳过“结束”标记`\n\n`return sonnets;`\n\
  \n`}`\n\n`private ShakespeareSonnet parseSonnet(final ShakespeareLineIterator lines)\
  \ {`\n\n`List<ShakespeareLine> parsedLines = new ArrayList<>();`\n\n`int number\
  \ = parseSonnetNumber(lines);`\n\n`int lineNumber = 0;`\n\n`while (`\n\n`lines.hasNext()\
  \ &&`\n\n`!IS_DIGITS.test(lines.peek()) &&`\n\n`!IS_THE_END.test(lines.peek())`\n\
  \n`) {`\n\n`lineNumber += 1;`\n\n`parsedLines.add(new ShakespeareLine(lineNumber,\
  \ lines.next()));`\n\n`}`\n\n`return new ShakespeareSonnet(number, parsedLines);`\n\
  \n`}`\n\n`private static int parseSonnetNumber(ShakespeareLineIterator lines) {`\n\
  \n`String number = lines.next();`\n\n`boolean isNumber = IS_DIGITS.test(number);`\n\
  \n`assert isNumber : \"期望一个十四行诗编号，但得到：\" + number;`\n\n`return Integer.parseInt(number);`\n\
  \n`}`\n\n`private static String parseTitle(ShakespeareLineIterator lines) {`\n\n\
  `String title = lines.next();`\n\n`boolean isTitle = title != null && !title.isEmpty();`\n\
  \n`isTitle = isTitle && !IS_AUTHOR.test(title);`\n\n`isTitle = isTitle && !IS_THE_END.test(title);`\n\
  \n`isTitle = isTitle && !IS_YEAR.test(title);`\n\n`assert isTitle : \"期望一个标题，但得到：\"\
  \ + title;`\n\n`return title;`\n\n`}`\n\n`private static String parseAuthor(ShakespeareLineIterator\
  \ lines) {`\n\n`String author = lines.next();`\n\n`boolean isAuthor = IS_AUTHOR.test(author);`\n\
  \n`assert isAuthor : \"期望作者，但得到：\" + author;`\n\n`return author;`\n\n`}`\n\n`private\
  \ static int parseYear(ShakespeareLineIterator lines) {`\n\n`String year = lines.next();`\n\
  \n`boolean isYear = IS_YEAR.test(year);`\n\n`assert isYear : \"期望年份，但得到：\" + year;`\n\
  \n`return Integer.parseInt(year);`\n\n`}`\n\n`}`\n\n`### ShakespeareText.java`\n\
  \n`import java.util.*;`\n\n`/**`\n\n`* 代表莎士比亚一部作品的对象。`\n\n`*/`\n\n`public class\
  \ ShakespeareText {`\n\n`private final String name;`\n\n`private final int year;`\n\
  \n`private final List<ShakespeareLine> lines;`\n\n`public ShakespeareText(String\
  \ name, int year, List<ShakespeareLine> lines) {`\n\n`Objects.requireNonNull(name,\
  \ \"作品名称\");`\n\n`this.name = name;`\n\n`if (year < 1500 || year > 1699) {`\n\n\
  `throw new IllegalArgumentException(`\n\n`\"为 \" + name + \" 提供的年份严重错误：\" + year`\n\
  \n`);`\n\n`}`\n\n`this.year = year;`\n\n`Objects.requireNonNull(lines, \"行内容\");`\n\
  \n`if (lines.isEmpty()) {`\n\n`throw new IllegalArgumentException(\"为 \" + name\
  \ + \" 提供了空的行内容\");`\n\n`}`\n\n`this.lines = lines;`\n\n`}`\n\n`public String getName()\
  \ {`\n\n`return name;`\n\n`}`\n\n`public int getYear() {`\n\n`return year;`\n\n\
  `}`\n\n`public List<ShakespeareLine> getLines() {`\n\n`return lines;`\n\n`}`\n\n\
  `}`\n\n`### ShakespeareSonnet.java`\n\n`import java.util.*;`\n\n`/**`\n\n`* {@link\
  \ ShakespeareText} 的一个特例，包含十四行诗的特定信息。`\n\n`*/`\n\n`public class ShakespeareSonnet\
  \ extends ShakespeareText {`\n\n`public ShakespeareSonnet(int number, List<ShakespeareLine>\
  \ lines) {`\n\n`super(\"十四行诗 #\" + number, 1609, lines);`\n\n`if (number < 1 ||\
  \ number > 175) {`\n\n`throw new IllegalArgumentException(`\n\n`\"为十四行诗提供的编号严重错误：\"\
  \ + number`\n\n`);`\n\n`}`\n\n`}`\n\n`}`\n\n`### ShakespeareLine.java`\n\n`import\
  \ java.util.*;`\n\n`/**`\n\n`* 由 RCFischer 于 14/11/11 创建。`\n\n`*/`\n\n`public class\
  \ ShakespeareLine {`\n\n`private final int position;`\n\n`private final String[]\
  \ words;`\n\n`public ShakespeareLine(final int textPosition, final String line)\
  \ {`\n\n`Objects.requireNonNull(line, \"行内容\");`\n\n`words = line.split(\"\\\\s+\"\
  );`\n\n`if(textPosition < 1) {`\n\n`throw new IllegalArgumentException(`\n\n`\"\
  无效的文本位置：\" + textPosition`\n\n`);`\n\n`}`\n\n\n\n`this.position = textPosition;`\n\
  \n`}`\n\n`public int getTextPosition() {`\n\n`return position;`\n\n`}`\n\n`public\
  \ List<ShakespeareWord> getWords() {`\n\n`List<ShakespeareWord> swords = new ArrayList<>();`\n\
  \n`for(int i = 0; i < words.length; i++) {`\n\n`swords.add(new ShakespeareWord(i+1,\
  \ words[i]));`\n\n`}`\n\n`return swords;`\n\n`}`\n\n`}`\n\n`### ShakespeareWord.java`\n\
  \n`import java.util.*;`\n\n`/**`\n`* 表示莎士比亚作品中某一行内的一个单词位置。`\n`*/`\n\n`public class\
  \ ShakespeareWord {`\n\n`private final int linePosition;`\n\n`private final String\
  \ word;`\n\n`public ShakespeareWord(final int linePosition, final String word) {`\n\
  \n`if (linePosition < 1) {`\n\n`throw new IllegalArgumentException(\"行位置错误: \" +\
  \ linePosition);`\n\n`}`\n\n`this.linePosition = linePosition;`\n\n`Objects.requireNonNull(word,\
  \ \"word\");`\n\n`this.word = word;`\n\n`}`\n\n`public int getLinePosition() {`\n\
  \n`return linePosition;`\n\n`}`\n\n`public String getWord() {`\n\n`return word;`\n\
  \n`}`\n\n`}`\n\n至此，我们仍然只解析了内容。我们还需要将其加载到数据库中。为此，我们将创建一个`TextDatabase`类。它包含一个用于配置数据库模式的方法，以及另一个用于根据`ShakespeareText`集合加载数据库的方法。当然，这个方法会立即委托给`TextDatabaseTextLoader`实例，该实例负责加载文本。它会进一步委托给`TextDatabaseLineLoader`实例，该实例负责加载一行。接着，它会再委托给`TextDatabaseWordLoader`实例，该实例负责加载单词。然后，所有数据就都加载完成了！所有这些类的代码（以及一个用于测试的`Main`类）见清单\
  \ A-3。\n\n清单 A-3\\. 面向对象的数据库加载\n\n`### Main.java`\n\n`import java.sql.Connection;`\n\
  \n`import java.sql.ResultSet;`\n\n`import java.sql.SQLException;`\n\n`import java.sql.Statement;`\n\
  \n`import java.util.*;`\n\n`public class Main {`\n\n`public static void printDatabaseSizing(Connection\
  \ conn) throws SQLException {`\n\n`System.out.println(\"数据量统计\");`\n\n`System.out.println(\"\
  --------\");`\n\n`Statement stmt = conn.createStatement();`\n\n`for (String table\
  \ : new String[]{\"\\\"text\\\"\", \"line\", \"word\", \"line_word\"})`\n\n`{`\n\
  \n`try (ResultSet rs = stmt.executeQuery(\"SELECT COUNT(*) FROM \" + table)) {`\n\
  \n`boolean hasNext = rs.next();`\n\n`assert hasNext : \"表 \" + table + \" 的计数查询无结果\"\
  ;`\n\n`System.out.println(table + \" => \" + rs.getInt(1));`\n\n`}`\n\n`}`\n\n`}`\n\
  \n`public static ResultSet queryResults(Connection conn) throws SQLException {`\n\
  \n`return conn.createStatement().executeQuery(`\n\n`\"SELECT t.name, l.\\\"offset\\\
  \", w.\\\"value\\\", lw.\\\"offset\\\" \" +`\n\n`\"FROM \\\"text\\\" t, word w \"\
  \ +`\n\n`\"INNER JOIN line l ON (t.id = l.text_id) \" +`\n\n`\"INNER JOIN line_word\
  \ lw ON (\" +`\n\n`\"lw.line_id = l.id AND lw.word_id = w.id\" +`\n\n`\")\"`\n\n\
  `);`\n\n`}`\n\n`public static void printWordUsages(Connection conn) throws SQLException\
  \ {`\n\n`int lineNumber = 0;`\n\n`try (ResultSet rs = queryResults(conn)) {`\n\n\
  `String lastText = null;`\n\n`int lastLine = -1;`\n\n`while (rs.next()) {`\n\n`if\
  \ (lineNumber % 20 == 0) {`\n\n`System.out.println(\"文本\\t 行偏移\\t 单词\\t 单词偏移\");`\n\
  \n`System.out.println(\"----\\t----\\t----\\t----\");`\n\n`}`\n\n`lineNumber +=\
  \ 1;`\n\n`String text = rs.getString(1);`\n\n`if (!text.equals(lastText)) {`\n\n\
  `lastText = text;`\n\n`}`\n\n`int lineOffset = rs.getInt(2);`\n\n`String word =\
  \ rs.getString(3);`\n\n`int wordOffset = rs.getInt(4);`\n\n`if (lineOffset != lastLine)\
  \ {`\n\n`lastLine = lineOffset;`\n\n`}`\n\n`System.out.println(`\n\n`String.format(\"\
  %s\\t%d\\t%s\\t%d\", text, lineOffset, word, wordOffset));`\n\n`}`\n\n`}`\n\n`}`\n\
  \n`public static void main(String[] args) throws Exception {`\n\n`ShakespeareAnthologyParser\
  \ textParser = new ShakespeareAnthologyParser();`\n\n`Collection<ShakespeareText>\
  \ texts = textParser.parseTexts();`\n\n`TextDatabase db = new TextDatabase(\"shakespeare\"\
  );`\n\n`db.createDatabase();`\n\n`db.insertTexts(texts);`\n\n`printWordUsages(db.getConnection());`\n\
  \n`printDatabaseSizing(db.getConnection());`\n\n`}`\n\n`}`\n\n`### TextDatabase.java`\n\
  \n`import java.sql.Connection;`\n\n`import java.sql.DriverManager;`\n\n`import java.sql.SQLException;`\n\
  \n`import java.sql.Statement;`\n\n`import java.util.*;`\n\n`/**`\n`* 表示用于存储文本、文本行及单词的数据库。`\n\
  `*/`\n\n\n\n`public class TextDatabase {`\n\n`private final String schema;`\n\n\
  `/**`\n\n`* 定义一个文本库，该文本库将在给定的模式上运行。`\n\n`*`\n\n`* @param schema 要操作的模式；不能为 {@code\
  \ null}。`\n\n`*/`\n\n`public TextDatabase(String schema) {`\n\n`Objects.requireNonNull(schema,\
  \ \"schema name\");`\n\n`this.schema = schema;`\n\n`}`\n\n`/**`\n\n`* 提供到文本数据库的新连接。`\n\
  \n`*/`\n\n`public Connection getConnection() throws SQLException {`\n\n`return DriverManager.getConnection(`\n\
  \n`\"jdbc:h2:mem:shakespeare;INIT=CREATE SCHEMA IF NOT EXISTS \" +`\n\n`schema +\
  \ \"\\\\; \" +`\n\n`\"SET SCHEMA \" + schema + \";DB_CLOSE_DELAY=-1\",`\n\n`\"sa\"\
  , \"\"`\n\n`);`\n\n`}`\n\n`/**`\n\n`* 创建数据库，如果模式之前存在则将其删除。`\n\n`*/`\n\n`public void\
  \ createDatabase() throws SQLException {`\n\n`try (Connection conn = getConnection())\
  \ {`\n\n`try (Statement stmt = conn.createStatement()) {`\n\n`stmt.execute(\"DROP\
  \ SCHEMA \" + schema);`\n\n`stmt.execute(\"CREATE SCHEMA \" + schema);`\n\n`stmt.execute(\"\
  SET SCHEMA \" + schema);`\n\n`}`\n\n`TextDatabaseTextLoader.createTables(conn);`\n\
  \n`}`\n\n`}`\n\n`public void insertTexts(Collection<ShakespeareText> texts)`\n\n\
  `throws SQLException`\n\n`{`\n\n`try (Connection conn = getConnection()) {`\n\n\
  `try (`\n\n`TextDatabaseTextLoader textLoader = new TextDatabaseTextLoader(conn)`\n\
  \n`) {`\n\n`for (ShakespeareText text : texts) {`\n\n`textLoader.insertText(text);`\n\
  \n`}`\n\n`}`\n\n`}`\n\n`}`\n\n`}`\n\n`### TextDatabaseTextLoader.java`\n\n`import\
  \ java.sql.*;`\n\n`import java.util.*;`\n\n`/**`\n\n`* 负责加载文本。`\n\n`*/`\n\n`public\
  \ class TextDatabaseTextLoader implements AutoCloseable {`\n\n`private final PreparedStatement\
  \ createBook;`\n\n`private final TextDatabaseLineLoader lineLoader;`\n\n`public\
  \ TextDatabaseTextLoader(Connection conn) throws SQLException {`\n\n`Objects.requireNonNull(conn,\
  \ \"connection for loading texts\");`\n\n`createBook = conn.prepareStatement(`\n\
  \n`\"INSERT INTO \\\"text\\\" (name, year) VALUES (?,?)\",`\n\n`Statement.RETURN_GENERATED_KEYS`\n\
  \n`);`\n\n`lineLoader = new TextDatabaseLineLoader(conn);`\n\n`}`\n\n`/**`\n\n`*\
  \ 创建用于填充文本的表。`\n\n`*`\n\n`* @param conn 要使用的连接；不能为 {@code null}`\n\n`*/`\n\n`public\
  \ static void createTables(final Connection conn) throws SQLException {`\n\n`Objects.requireNonNull(conn,\
  \ \"connection\");`\n\n`try (Statement stmt = conn.createStatement()) {`\n\n`stmt.execute(`\n\
  \n`\"CREATE TABLE \\\"text\\\" \" +`\n\n`\"(id INT PRIMARY KEY AUTO_INCREMENT, name\
  \ VARCHAR UNIQUE, year INT)\"`\n\n`);`\n\n`}`\n\n`TextDatabaseLineLoader.createTables(conn);`\n\
  \n`}`\n\n`public void insertText(ShakespeareText text) throws SQLException {`\n\n\
  `int textId = insertTextRecord(text.getName(), text.getYear());`\n\n`for (ShakespeareLine\
  \ line : text.getLines()) {`\n\n`lineLoader.insertLine(textId, line);`\n\n`}`\n\n\
  `}`\n\n`private int insertTextRecord(String title, int year) throws SQLException\
  \ {`\n\n`createBook.setString(1, title);`\n\n`createBook.setInt(2, year);`\n\n`boolean\
  \ createdBook = createBook.executeUpdate() == 1;`\n\n`assert createdBook : \"Could\
  \ not create book\";`\n\n`try (ResultSet rs = createBook.getGeneratedKeys()) {`\n\
  \n`boolean hasNext = rs.next();`\n\n`assert hasNext : \"No result when getting generated\
  \ keys for \" + title;`\n\n`return rs.getInt(1);`\n\n`}`\n\n`}`\n\n`public void\
  \ close() throws SQLException {`\n\n`createBook.close();`\n\n`lineLoader.close();`\n\
  \n`}`\n\n`}`\n\n`### TextDatabaseLineLoader.java`\n\n`import java.sql.*;`\n\n`import\
  \ java.util.*;`\n\n`/**`\n\n`* 负责将行加载到数据库中。`\n\n`*/`\n\n`public class TextDatabaseLineLoader\
  \ implements AutoCloseable {`\n\n`private final PreparedStatement createLine;`\n\
  \n`private final TextDatabaseWordLoader wordLoader;`\n\n`public TextDatabaseLineLoader(final\
  \ Connection conn) throws SQLException {`\n\n`Objects.requireNonNull(conn, \"connection\"\
  );`\n\n`createLine = conn.prepareStatement(`\n\n`\"INSERT INTO line (text_id, \\\
  \"offset\\\") VALUES (?,?)\",`\n\n`Statement.RETURN_GENERATED_KEYS`\n\n`);`\n\n\
  `wordLoader = new TextDatabaseWordLoader(conn);`\n\n`}`\n\n`public static void createTables(final\
  \ Connection conn) throws SQLException {`\n\n`try (Statement stmt = conn.createStatement())\
  \ {`\n\n`stmt.execute(\"CREATE TABLE line \" +`\n\n`\"(id INT PRIMARY KEY AUTO_INCREMENT,\
  \ text_id INT, \\\"offset\\\" INT)\"`\n\n`);`\n\n`}`\n\n`TextDatabaseWordLoader.createTables(conn);`\n\
  \n`}`\n\n`public void insertLine(int textId, ShakespeareLine line)`\n\n`throws SQLException`\n\
  \n`{`\n\n`int lineId = insertLineRecord(textId, line.getTextPosition());`\n\n`for\
  \ (ShakespeareWord word : line.getWords()) {`\n\n`wordLoader.insertWord(lineId,\
  \ word);`\n\n`}`\n\n`}`\n\n`private int insertLineRecord(final int textId, final\
  \ int textPosition)`\n\n`throws SQLException`\n\n`{`\n\n`createLine.setInt(1, textId);`\n\
  \n`createLine.setInt(2, textPosition);`\n\n`boolean createdLine = createLine.executeUpdate()\
  \ == 1;`\n\n`assert createdLine : \"Could not create line\";`\n\n`try (ResultSet\
  \ rs = createLine.getGeneratedKeys()) {`\n\n`boolean hasNext = rs.next();`\n\n`assert\
  \ hasNext :`\n\n`\"No result when getting generated keys for line in text id \"\
  \ +`\n\n`textId + \", \" + \"offset \" + textPosition;`\n\n`return rs.getInt(1);`\n\
  \n`}`\n\n`}`\n\n`public void close() throws SQLException {`\n\n`createLine.close();`\n\
  \n`wordLoader.close();`\n\n`}`\n\n`}`\n\n`### TextDatabaseWordLoader.java`\n\n`import\
  \ java.sql.*;`\n\n`import java.util.*;`\n\n`/**`\n\n`* 负责将单词加载到数据库中`\n\n`*/`\n\n\
  `public class TextDatabaseWordLoader implements AutoCloseable {`\n\n`private final\
  \ PreparedStatement createWord;`\n\n`private final PreparedStatement createLineWord;`\n\
  \n`private final Map<String, Integer> wordIds = new HashMap<>();`\n\n`public TextDatabaseWordLoader(final\
  \ Connection conn) throws SQLException {`\n\n`Objects.requireNonNull(conn, \"connection\"\
  );`\n\n`createWord = conn.prepareStatement(`\n\n`\"INSERT INTO word (\\\"value\\\
  \") VALUES (?)\",`\n\n`Statement.RETURN_GENERATED_KEYS`\n\n`);`\n\n`createLineWord\
  \ = conn.prepareStatement(`\n\n`\"INSERT INTO line_word \" +`\n\n`\" (line_id, word_id,\
  \ \\\"offset\\\") \" +`\n\n`\" VALUES (?,?,?)\",`\n\n`Statement.NO_GENERATED_KEYS`\n\
  \n`);`\n\n`}`\n\n`public static void createTables(final Connection conn) throws\
  \ SQLException {`\n\n`try (Statement stmt = conn.createStatement()) {`\n\n`stmt.execute(\"\
  CREATE TABLE word \" +`\n\n`\"(id INT PRIMARY KEY AUTO_INCREMENT, \\\"value\\\"\
  \ VARCHAR UNIQUE)\"`\n\n`);`\n\n`stmt.execute(\"CREATE TABLE line_word \" +`\n\n\
  `\"(id INT PRIMARY KEY AUTO_INCREMENT, line_id INT, word_id INT, \" +`\n\n`\"\\\"\
  offset\\\" INT)\"`\n\n`);`\n\n`}`\n\n`}`\n\n`public void insertWord(final int lineId,\
  \ final ShakespeareWord word)`\n\n`throws SQLException`\n\n`{`\n\n`int wordId =\
  \ determineWordId(word.getWord());`\n\n`createLineWord.setInt(1, lineId);`\n\n`createLineWord.setInt(2,\
  \ wordId);`\n\n`createLineWord.setInt(3, word.getLinePosition());`\n\n`boolean createdLineWord\
  \ = createLineWord.executeUpdate() == 1;`\n\n`assert createdLineWord : \"Could not\
  \ create line-word\";`\n\n`}`\n\n`private int determineWordId(String word) throws\
  \ SQLException {`\n\n`if(wordIds.containsKey(word)) {`\n\n`return wordIds.get(word);`\n\
  \n`} else {`\n\n`int wordId = insertWordRecord(word);`\n\n`wordIds.put(word, wordId);`\n\
  \n`return wordId;`\n\n`}`\n\n`}`\n\n`private int insertWordRecord(String word) throws\
  \ SQLException {`\n\n`createWord.setString(1, word);`\n\n`boolean createdWord =\
  \ createWord.executeUpdate() == 1;`\n\n`assert createdWord : \"Could not create\
  \ word: \" + word;`\n\n`try(ResultSet rs = createWord.getGeneratedKeys()) {`\n\n\
  `boolean hasWord = rs.next();`\n\n`assert hasWord : \"Created word but still could\
  \ not find it!\";`\n\n`return rs.getInt(1);`\n\n`}`\n\n`}`\n\n`public void close()\
  \ throws SQLException {`\n\n`createWord.close();`\n\n`createLineWord.close();`\n\
  \n`}`\n\n`}`\n\n\n\n面向对象编程的主要难点应该显而易见：在这种范式下，我们的任务需要大量代码，并且存在大量相互协作的部件。在命令式代码中，我们只见树木不见森林：实现细节变得混乱，干扰了对整体图景的把握。面向对象编程旨在通过整理这些“树木”来解决这个问题。实现细节清晰了很多，但仍然容易迷失方向。对于新开发者来说，进入一个面向对象项目却对系统如何工作感到茫然，是一种常见体验，尤其是当系统没有一个明显的入口点（例如\
  \ main 方法）时。问题在于很难追踪应用的流程：很难理解这些部件在系统执行过程中是如何相互交互的。例如，单词加载器需要一个行 ID，但如果你是系统新手，很可能不清楚那个行\
  \ ID 是什么，或者它是如何计算出来的。\n\n这并不是说面向对象编程不好。如果你需要一个高度模块化、高度解耦的系统，它就是完美的范式。像接口和抽象基类这样的工具允许你提供清晰的契约，同时对你的使用者保持友好。如果你需要一个高度可测试的系统，它也是一种极好的方法：测试驱动开发等实践源于面向对象语言并非巧合。可测试性的优势来自于功能完全包含在单个对象内，因此可以将该对象视为其独立的微观现实世界。面向对象模型也比命令式或其他一些范式更适合并发执行，因为更清晰的关注点分离提供了明确的断点。借鉴函数式编程的关键实践使得面向对象的并发更加出色：正是这一发现催生了后函数式范式。\n\
  \n## 后函数式编程范式\n\n面向对象编程曾被誉为编程领域的一次重大革命，它确实在提高大型代码库的可维护性和可重用性方面做出了巨大贡献。然而，可变性成为了面向对象编程中的一个主要问题。另一个常见问题源于数据和流程的混合：面向对象范式的基础仍然是命令式范式，但数据的封装也导致了对作用于这些数据的逻辑的模糊化。这两个问题都通过将底层执行模型从命令式改为函数式来解决：也就是说，不再考虑执行一系列步骤，而是考虑应用转换和映射。这催生了后函数式编程范式。\n\
  \n后函数式编程使得推理你的面向对象应用变得更加容易。通过严格限制可变性并专注于组合小型转换，我们可以最大限度地减少面向对象编程的缺点，同时利用其优势。从技术上讲，后函数式范式脱离了命令式范式，因此程序员关心的是实现什么，而不是如何执行。这产生了语义更丰富的代码，同时也让运行时环境可以自由决定执行转换的最佳方式。其结果是几乎无需成本就能提升性能，尤其是在并发环境中执行时。\n\
  \n如果你读过这本书，那么你应该能够识别出 Java 中的后函数式代码。无处不在的流和 lambda 使用是明显的标志。`final` 关键字的使用是另一个主要线索，尤其是当该关键字出现在大量非常小的类中时，每个类都对数据执行非常有限且非常精确的转换。在\
  \ Java 8 之前，后函数式 Java 代码的关键标志是集合推导：即接收一个集合并对其执行某些用户指定操作的方法。\n\n为了实现我们的后函数式解决方案，我们将首先通过在一个\
  \ DDL 语句流中执行每个字符串来构建我们的模式。这将使我们的数据库进入正确的格式。然后，我们将获取文集文本作为一个流，并从该流中过滤掉不需要的元素。现在我们有了一个干净的流和一个已初始化的数据库，因此我们的目标是生成一个要插入数据库的数据流。中间形式将是一个来自输入的行的流。因此，我们将从一个字符串流，到一个已解析行的流，再到一个要插入数据库的单词流。然后，这最终形式可以被插入到数据库中。实现此功能的代码见清单\
  \ A-4。\n\n清单 A-4. 后函数式数据库加载\n\n`### Main.java`\n\n`import java.sql.*;`\n\n`import\
  \ java.util.*;`\n\n`public class Main {`\n\n`public static void printDatabaseSizing(Database\
  \ database)`\n\n`throws SQLException`\n\n`{`\n\n`System.out.println(\"SIZES\");`\n\
  \n`System.out.println(\"-----\");`\n\n`try (Connection conn = database.getConnection())\
  \ {`\n\n`Statement stmt = conn.createStatement();`\n\n`for (String table : new String[]{`\n\
  \n`\"\\\"text\\\"\", \"line\", \"word\", \"line_word\"`\n\n`}) {`\n\n`try (ResultSet\
  \ rs = stmt.executeQuery(`\n\n`\"SELECT COUNT(*) FROM \" + table)`\n\n`) {`\n\n\
  `boolean hasNext = rs.next();`\n\n`assert hasNext : \"No result in count from table\
  \ \" + table;`\n\n`System.out.println(table + \" => \" + rs.getInt(1));`\n\n`}`\n\
  \n`}`\n\n`}`\n\n`}`\n\n`public static ResultSet queryResults(Connection conn) throws\
  \ SQLException {`\n\n`return conn.createStatement().executeQuery(`\n\n`\"SELECT\
  \ t.name, l.\\\"offset\\\", w.\\\"value\\\", lw.\\\"offset\\\" \" +`\n\n`\"FROM\
  \ \\\"text\\\" t, word w \" +`\n\n`\"INNER JOIN line l ON (t.id = l.text_id) \"\
  \ +`\n\n`\"INNER JOIN line_word lw ON \" +`\n\n`\" (lw.line_id = l.id AND lw.word_id\
  \ = w.id)\"`\n\n`);`\n\n`}`\n\n`public static void printWordUsages(Database database)\
  \ throws SQLException {`\n\n`int lineNumber = 0;`\n\n`try (Connection conn = database.getConnection())\
  \ {`\n\n`try (ResultSet rs = queryResults(conn)) {`\n\n`String lastText = null;`\n\
  \n`int lastLine = -1;`\n\n\n\n`while (rs.next()) {`\n\n`if (lineNumber % 20 == 0)\
  \ {`\n\n`System.out.println(\"text\\tline-offset\\tword\\tword-offset\");`\n\n`System.out.println(\"\
  ----\\t-----------\\t----\\t-----------\");`\n\n`}`\n\n`lineNumber += 1;`\n\n`String\
  \ text = rs.getString(1);`\n\n`if (!text.equals(lastText)) {`\n\n`lastText = text;`\n\
  \n`}`\n\n`int lineOffset = rs.getInt(2);`\n\n`String word = rs.getString(3);`\n\n\
  `int wordOffset = rs.getInt(4);`\n\n`if (lineOffset != lastLine) {`\n\n`lastLine\
  \ = lineOffset;`\n\n`}`\n\n`System.out.println(String.format(`\n\n`\"%s\\t%d\\t%s\\\
  t%d\", text, lineOffset, word, wordOffset));`\n\n`}`\n\n`}`\n\n`}`\n\n`}`\n\n`public\
  \ static void main(String[] args) throws Exception {`\n\n`Database database = new\
  \ Database();`\n\n`database.initializeDb();`\n\n`new ShakespeareTextSource().getStream().sequential()`\n\
  \n`.map(new TextMapper())`\n\n`.filter(Optional::isPresent).map(Optional::get)`\n\
  \n`// 在更长的示例中，下一行可能会被拆分为`\n\n`// 不同的中间形式，用于提供文本 ID、行 ID 和单词 ID。`\n\n`.map(new DatabaseLineMapper(database))`\n\
  \n`.forEach(database::insertLine);`\n\n`printWordUsages(database);`\n\n`printDatabaseSizing(database);`\n\
  \n`}`\n\n`}`\n\n`### Database.java`\n\n`import java.sql.*;`\n\n`import java.util.*;`\n\
  \n`import java.util.function.*;`\n\n`/**`\n\n`* 表示存储文本信息的数据库`\n\n`*/`\n\n`public\
  \ class Database {`\n\n`private static final String SCHEMA = \"shakespeare\";`\n\
  \n`public Connection getConnection() throws SQLException {`\n\n`return DriverManager.getConnection(`\n\
  \n`\"jdbc:h2:mem:shakespeare;INIT=CREATE SCHEMA IF NOT EXISTS \" + SCHEMA`\n\n`+\
  \ \"\\\\; SET SCHEMA \" + SCHEMA + \";DB_CLOSE_DELAY=-1\", \"sa\", \"\"`\n\n`);`\n\
  \n`}`\n\n`public void initializeDb() throws SQLException {`\n\n`try (Connection\
  \ c = getConnection()) {`\n\n`try (Statement stmt = c.createStatement()) {`\n\n\
  `BiFunction<SQLException, String, SQLException> exec = (ex, s) -> {`\n\n`// 如果有异常，则返回该异常（暂不处理）`\n\
  \n`if (ex != null) return ex;`\n\n`// 执行此命令`\n\n`try {`\n\n`stmt.execute(s);`\n\n\
  `return null;`\n\n`} catch (SQLException e) {`\n\n`return e;`\n\n`}`\n\n`};`\n\n\
  `// 如何管理多个异常`\n\n`BinaryOperator<SQLException> pickNonnull = (e1, e2) -> {`\n\n\
  `if (e1 == null) return e2;`\n\n`if (e2 == null) return e1;`\n\n`e1.addSuppressed(e2);`\n\
  \n`return e1;`\n\n`};`\n\n`// 执行语句`\n\n`SQLException e = Arrays.asList(`\n\n`\"\
  DROP SCHEMA \" + SCHEMA,`\n\n`\"CREATE SCHEMA \" + SCHEMA,`\n\n`\"SET SCHEMA \"\
  \ + SCHEMA,`\n\n`\"CREATE TABLE \\\"text\\\" \" +`\n\n`\" (id INT PRIMARY KEY AUTO_INCREMENT,\
  \ name VARCHAR UNIQUE, \" +`\n\n`\"  year INT)\",`\n\n`\"CREATE TABLE line \" +`\n\
  \n`\"(id INT PRIMARY KEY AUTO_INCREMENT, text_id INT, \" +`\n\n`\" \\\"offset\\\"\
  \ INT)\",`\n\n`\"CREATE TABLE word \" +`\n\n`\"(id INT PRIMARY KEY AUTO_INCREMENT,\
  \ \" +`\n\n`\" \\\"value\\\" VARCHAR UNIQUE)\",`\n\n`\"CREATE TABLE line_word \"\
  \ +`\n\n`\" (id INT PRIMARY KEY AUTO_INCREMENT, line_id INT, \" +`\n\n`\"  word_id\
  \ INT, \\\"offset\\\" INT)\"`\n\n`).stream().reduce(null, exec, pickNonnull);`\n\
  \n`// 如果出现异常，则抛出该异常`\n\n`if (e != null) throw e;`\n\n`}`\n\n`}`\n\n`}`\n\n`/**`\n\
  \n`* 将数据库行插入到数据库中。`\n\n`*`\n\n`* @param databaseLine 要插入的行；绝不能为 {@code null}。`\n\
  \n`*/`\n\n`public void insertLine(final DatabaseLine databaseLine) {`\n\n`Objects.requireNonNull(databaseLine,\
  \ \"database line\");`\n\n`try (Connection conn = getConnection()) {`\n\n`PreparedStatement\
  \ createLineWord = conn.prepareStatement(`\n\n`\"INSERT INTO line_word \" +`\n\n\
  `\" (line_id, word_id, \\\"offset\\\") \" +`\n\n`\" VALUES (?,?,?)\",`\n\n`Statement.NO_GENERATED_KEYS`\n\
  \n`);`\n\n`createLineWord.setInt(1, databaseLine.getLineId());`\n\n`int[] words\
  \ = databaseLine.getWords();`\n\n`for (int i = 0; i < words.length; i++) {`\n\n\
  `createLineWord.setInt(2, words[i]);`\n\n`createLineWord.setInt(3, i + 1);`\n\n\
  `boolean createdLineWord = createLineWord.executeUpdate() == 1;`\n\n`assert createdLineWord\
  \ : \"无法创建行-单词关联\";`\n\n`}`\n\n`} catch (SQLException sqle) {`\n\n`throw new RuntimeException(\"\
  插入数据库行时出错\", sqle);`\n\n`}`\n\n`}`\n\n`}`\n\n`### ShakespeareTextSource.java`\n\n\
  `import java.io.BufferedReader;`\n\n`import java.io.IOException;`\n\n`import java.io.InputStream;`\n\
  \n`import java.io.InputStreamReader;`\n\n`import java.util.concurrent.atomic.*;`\n\
  \n`import java.util.function.*;`\n\n`import java.util.regex.*;`\n\n`import java.util.stream.*;`\n\
  \n`/**`\n\n\n\n`* 莎士比亚文本的源文件`\n\n`*/`\n\n`public class ShakespeareTextSource {`\n\
  \n`private static final String SOURCE = \"shakespeare.txt\";`\n\n`/**`\n\n`* 提供内存中选集的一个读取器。此读取器不执行任何过滤。`\n\
  \n`*`\n\n`* @return 内存中选集的读取器；绝不会是 {@code null}`\n\n`* @throws IOException 如果检索内存中选集时出现异常`\n\
  \n`*/`\n\n`public BufferedReader getReader() throws IOException {`\n\n`InputStream\
  \ inputStream =`\n\n`this.getClass()`\n\n`.getClassLoader()`\n\n`.getResourceAsStream(SOURCE);`\n\
  \n`return new BufferedReader(new InputStreamReader(inputStream, \"UTF-8\"));`\n\n\
  `}`\n\n`private static UnaryOperator<String> filterBadChars() {`\n\n`Pattern BAD_CHARS\
  \ =`\n\n`Pattern.compile(\"\\uFEFF|\\\\p{Cntrl}\"); // BOM 和控制字符`\n\n`return string\
  \ -> BAD_CHARS.matcher(string).replaceAll(\"\");`\n\n`}`\n\n`private static Predicate<String>\
  \ notInComment() {`\n\n`final Predicate<String> IS_COMMENT_START =`\n\n`Pattern.compile(\"\
  ^<<\").asPredicate();`\n\n`final Predicate<String> IS_COMMENT_END =`\n\n`Pattern.compile(\"\
  >>$\").asPredicate();`\n\n`final AtomicBoolean inComment = new AtomicBoolean(false);`\n\
  \n`return line -> {`\n\n`if (IS_COMMENT_START.test(line)) {`\n\n`inComment.set(true);`\n\
  \n`return false;`\n\n`} else if (inComment.get() && IS_COMMENT_END.test(line)) {`\n\
  \n`inComment.set(false);`\n\n`return false;`\n\n`} else {`\n\n`return !inComment.get();`\n\
  \n`}`\n\n`};`\n\n`}`\n\n`private static Predicate<String> notEmptyOrWhitespace()\
  \ {`\n\n`return Pattern.compile(\"^\\\\s*$\").asPredicate().negate();`\n\n`}`\n\n\
  `/**`\n\n`* 提供文本源的顺序流。该流会过滤掉坏字符、空白行和注释。每行也会被修剪。`\n\n`*`\n\n`* @return 一个必须按顺序处理的流`\n\
  \n`* @throws IOException 如果获取资源时出现异常`\n\n`*/`\n\n`public Stream<String> getStream()\
  \ throws IOException {`\n\n`return getReader().lines()`\n\n`.sequential()`\n\n`.map(filterBadChars())`\n\
  \n`.map(String::trim)`\n\n`.filter(notEmptyOrWhitespace())`\n\n`.filter(notInComment())`\n\
  \n`;`\n\n`}`\n\n`}`\n\n`### TextLine.java`\n\n`import java.util.*;`\n\n`/**`\n\n\
  `* 表示文本中一行的类`\n\n`*/`\n\n`public class TextLine {`\n\n`private final String title;`\n\
  \n`private final int lineNumber;`\n\n`private final String line;`\n\n`private final\
  \ int year;`\n\n`public TextLine(`\n\n`final String title, final int year,`\n\n\
  `final int lineNumber, final String line`\n\n`) {`\n\n`Objects.requireNonNull(title,\
  \ \"title\");`\n\n`this.title = title;`\n\n`if (lineNumber < 1) {`\n\n`throw new\
  \ IllegalArgumentException(`\n\n`\"行偏移量必须为正数，但实际为 \" + lineNumber);`\n\n`}`\n\n\
  `this.lineNumber = lineNumber;`\n\n`Objects.requireNonNull(line, \"line\");`\n\n\
  `if (line.isEmpty()) {`\n\n`throw new IllegalArgumentException(`\n\n`\"行内容为空，位于\
  \ \" + title + \"，行号 \" + lineNumber);`\n\n`}`\n\n`this.line = line;`\n\n`if (year\
  \ < 1500 || year > 1699) {`\n\n`throw new IllegalArgumentException(\"年份严重偏离： \"\
  \ + year);`\n\n`}`\n\n`this.year = year;`\n\n`}`\n\n`public String getTitle() {`\n\
  \n`return title;`\n\n`}`\n\n`public int getLineNumber() {`\n\n`return lineNumber;`\n\
  \n`}`\n\n`public String getLine() {`\n\n`return line;`\n\n`}`\n\n`public int getYear()\
  \ {`\n\n`return year;`\n\n`}`\n\n`public List<String> getWords() {`\n\n`return Arrays.asList(line.split(\"\
  \\\\s+\"));`\n\n`}`\n\n`}`\n\n`### TextMapper.java`\n\n`import java.util.*;`\n\n\
  `import java.util.function.*;`\n\n`import java.util.regex.*;`\n\n`/**`\n\n`* 一个映射器，假定按顺序遍历文本选集。`\n\
  \n`*/`\n\n`public class TextMapper implements java.util.function.Function<String,\
  \ Optional<TextLine>> {`\n\n`private volatile String currentTitle;`\n\n`private\
  \ volatile int currentYear;`\n\n`private volatile int currentOffset = 0;`\n\n`private\
  \ volatile boolean inSonnets = false;`\n\n`private static final Optional<TextLine>\
  \ SKIP_THIS_LINE = Optional.empty();`\n\n`private static final Predicate<String>\
  \ IS_YEAR =`\n\n`Pattern.compile(\"¹(5|6)\\\\d\\\\d$\").asPredicate();`\n\n`private\
  \ static final Predicate<String> IS_AUTHOR =`\n\n`Pattern.compile(\"^by\\\\s+William\\\
  \\s+Shakespeare$\").asPredicate();`\n\n`private static final Predicate<String> IS_DIGITS\
  \ =`\n\n`Pattern.compile(\"^\\\\d+$\").asPredicate();`\n\n`private static final\
  \ Predicate<String> IS_THE_END =`\n\n\n\n`Pattern.compile(\"^THE\\\\s+END$\").asPredicate();`\n\
  \n`private static final String SONNETS_TITLE = \"THE SONNETS\";`\n\n`/**`\n\n`*\
  \ 创建一个文本行，如果字符串不对应于某一行，则返回 {@link java.util.Optional#empty()}。`\n\n`*`\n\n`* @param\
  \ s 函数参数`\n\n`* @return 函数结果`\n\n`*/`\n\n`@Override`\n\n`public Optional<TextLine>\
  \ apply(final String s) {`\n\n`if (s == null || s.isEmpty()) return SKIP_THIS_LINE;`\n\
  \n`// 跳过作者行`\n\n`if (IS_AUTHOR.test(s)) return SKIP_THIS_LINE;`\n\n`// 跳过“THE END”行，并标记文本结束`\n\
  \n`if (IS_THE_END.test(s)) {`\n\n`currentOffset = Integer.MIN_VALUE;`\n\n`currentTitle\
  \ = null;`\n\n`inSonnets = false;`\n\n`return SKIP_THIS_LINE;`\n\n`}`\n\n`// 如果是年份，下一行应为标题`\n\
  \n`if (IS_YEAR.test(s)) {`\n\n`currentYear = Integer.parseInt(s);`\n\n`currentTitle\
  \ = null;`\n\n`return SKIP_THIS_LINE;`\n\n`}`\n\n`// 如果正在查找标题，那么现在找到了！`\n\n`if (currentTitle\
  \ == null || (inSonnets && IS_DIGITS.test(s))) {`\n\n`if (inSonnets) {`\n\n`currentTitle\
  \ = \"Sonnet #\" + s;`\n\n`} else {`\n\n`currentTitle = s;`\n\n`inSonnets = SONNETS_TITLE.equalsIgnoreCase(s);`\n\
  \n`}`\n\n`currentOffset = 0;`\n\n`return SKIP_THIS_LINE;`\n\n`}`\n\n`// 普通行`\n\n\
  `currentOffset += 1;`\n\n`return Optional.of(`\n\n`new TextLine(currentTitle, currentYear,\
  \ currentOffset, s)`\n\n`);`\n\n`}`\n\n`}`\n\n`### DatabaseLineMapper.java`\n\n\
  `import java.sql.*;`\n\n`import java.util.*;`\n\n`import java.util.concurrent.*;`\n\
  \n`import java.util.function.*;`\n\n`/**`\n\n`* 负责将文本行映射到数据库行。`\n\n`*/`\n\n`public\
  \ class DatabaseLineMapper implements Function<TextLine, DatabaseLine> {`\n\n`private\
  \ final ConcurrentMap<String, Integer> textIds =`\n\n`new ConcurrentHashMap<>();`\n\
  \n`private final ConcurrentMap<Integer, ConcurrentMap<Integer, Integer>>`\n\n`textLineIds\
  \ = new ConcurrentHashMap<>();`\n\n`private final ConcurrentMap<String, Integer>\
  \ wordIds =`\n\n`new ConcurrentHashMap<>();`\n\n`private final Database database;`\n\
  \n`public DatabaseLineMapper(Database database) throws SQLException {`\n\n`Objects.requireNonNull(database,\
  \ \"database\");`\n\n`this.database = database;`\n\n`}`\n\n`private int computeTextId(String\
  \ title, int year) {`\n\n`try (Connection conn = database.getConnection()) {`\n\n\
  `PreparedStatement createBook = conn.prepareStatement(`\n\n`\"INSERT INTO \\\"text\\\
  \" (name, year) VALUES (?,?)\",`\n\n`Statement.RETURN_GENERATED_KEYS`\n\n`);`\n\n\
  `createBook.setString(1, title);`\n\n`createBook.setInt(2, year);`\n\n`boolean createdBook\
  \ = createBook.executeUpdate() == 1;`\n\n`assert createdBook : \"无法创建书籍\";`\n\n\
  `try (ResultSet rs = createBook.getGeneratedKeys()) {`\n\n`boolean hasNext = rs.next();`\n\
  \n`assert hasNext : \"获取 \" + title + \" 的生成键时无结果\";`\n\n`return rs.getInt(1);`\n\
  \n`}`\n\n`} catch (SQLException e) {`\n\n`throw new RuntimeException(`\n\n`\"计算文本\
  \ ID 时出错: \" + title, e);`\n\n`}`\n\n`}`\n\n`private int computeLineId(final int\
  \ textId, final int lineNumber) {`\n\n`try (Connection conn = database.getConnection())\
  \ {`\n\n`PreparedStatement createLine = conn.prepareStatement(``\n\n`\"INSERT INTO\
  \ line (text_id, \\\"offset\\\") VALUES (?,?)\",`\n\n`Statement.RETURN_GENERATED_KEYS`\n\
  \n`);`\n\n`createLine.setInt(1, textId);`\n\n`createLine.setInt(2, lineNumber);`\n\
  \n`boolean createdLine = createLine.executeUpdate() == 1;`\n\n`assert createdLine\
  \ : \"无法创建行\";`\n\n`try (ResultSet rs = createLine.getGeneratedKeys()) {`\n\n`boolean\
  \ hasNext = rs.next();`\n\n`assert hasNext :`\n\n`\"获取行 \" + textId + \"-\" + lineNumber\
  \ + \" 的生成键时无结果\";`\n\n`return rs.getInt(1);`\n\n`}`\n\n`} catch (SQLException e)\
  \ {`\n\n`throw new RuntimeException(\"计算行 ID 时出错: \"`\n\n`+ textId + \" - \" + lineNumber,\
  \ e);`\n\n`}`\n\n`}`\n\n`private int computeWordId(final String word) {`\n\n`try\
  \ (Connection conn = database.getConnection()) {`\n\n`PreparedStatement createWord\
  \ = conn.prepareStatement(`\n\n`\"INSERT INTO word (\\\"value\\\") VALUES (?)\"\
  ,`\n\n`Statement.RETURN_GENERATED_KEYS`\n\n`);`\n\n`createWord.setString(1, word);`\n\
  \n`boolean createdWord = createWord.executeUpdate() == 1;`\n\n`assert createdWord\
  \ : \"无法创建单词: \" + word;`\n\n`try (ResultSet rs = createWord.getGeneratedKeys())\
  \ {`\n\n`boolean hasNext = rs.next();`\n\n`assert hasNext : \"已创建单词但仍无法找到！\";`\n\
  \n`return rs.getInt(1);`\n\n`}`\n\n`} catch (SQLException e) {`\n\n`throw new RuntimeException(`\n\
  \n`\"计算单词 ID 时出错: \" + word, e);`\n\n`}`\n\n`}`\n\n`/**`\n\n`* 将此函数应用于给定参数。`\n\n\
  `*`\n\n`* @param textLine 函数参数`\n\n`* @return 函数结果`\n\n`*/`\n\n`@Override`\n\n`public\
  \ DatabaseLine apply(final TextLine textLine) {`\n\n`// 获取文本 ID`\n\n`int textId\
  \ = lookupTextId(textLine);`\n\n`// 获取行 ID`\n\n`int lineId = lookupLineId(textId,\
  \ textLine);`\n\n`// 获取单词 ID`\n\n`int[] words = textLine.getWords().parallelStream()`\n\
  \n`.mapToInt(this::lookupWord)`\n\n`.toArray();`\n\n`return new DatabaseLine(lineId,\
  \ words);`\n\n`}`\n\n`private int lookupWord(final String word) {`\n\n`return wordIds.computeIfAbsent(word,\
  \ this::computeWordId);`\n\n`}`\n\n`private int lookupLineId(int textId, final TextLine\
  \ textLine) {`\n\n`ConcurrentMap<Integer, Integer> lineIds =`\n\n`textLineIds.computeIfAbsent(textId,\
  \ i -> new ConcurrentHashMap());`\n\n`return lineIds.computeIfAbsent(`\n\n`textLine.getLineNumber(),`\n\
  \n`i -> this.computeLineId(textId, i)`\n\n`);`\n\n`}`\n\n`private int lookupTextId(final\
  \ TextLine textLine) {`\n\n`return textIds.computeIfAbsent(`\n\n`textLine.getTitle(),`\n\
  \n`s -> this.computeTextId(s, textLine.getYear())`\n\n`);`\n\n`}`\n\n`}`\n\n`###\
  \ DatabaseLine.java`\n\n`import java.util.*;`\n\n`/**`\n\n`* 数据库所理解的文本行。`\n\n`*/`\n\
  \n`public class DatabaseLine {`\n\n`private final int lineId;`\n\n`private final\
  \ int[] words;`\n\n`public DatabaseLine(final int lineId, final int[] words) {`\n\
  \n`this.lineId = lineId;`\n\n`Objects.requireNonNull(words, \"words\");`\n\n`if\
  \ (words.length == 0) {`\n\n`throw new IllegalArgumentException(\"该行中没有单词！\");`\n\
  \n`}`\n\n`this.words = words;`\n\n`}`\n\n`public int getLineId() {`\n\n`return lineId;`\n\
  \n`}`\n\n`public int[] getWords() {`\n\n`return words;`\n\n`}`\n\n`}`\n\n这段代码实现了与纯面向对象方案相同的功能，但代码量显著减少，处理流程也更加清晰。如果你想在某个环节插入额外的处理（例如将查找文本\
  \ ID、行 ID 和单词 ID 分为不同的步骤），那么插入点显而易见。面向对象与函数式模型的结合使得代码更加简洁、可读性更强。\n\n这种处理方式的一个更高级、更利于并行的版本，可以将文本生成为一个包含标题、年份以及带有偏移量的行流的对象。然后，该对象可以被映射到文本\
  \ ID，其行流可以并行映射为行 ID、单词 ID，最后存入数据库。这将是一个两阶段的方法：第一阶段将选集中的行解析为这些文本对象的流，第二阶段则处理每个文本对象及其行流。如果需要，这将是该方法的自然演进。\n\
  \n后函数式方法有两个主要缺点，它们都源于你必须以类型、类型之间的映射以及像`.map`和`.filter`这样的钩子函数来思考。第一个困难是，这需要更抽象、更高阶的思维方式，因此你会花更多时间在纸上涂涂画画，而不是编写代码。有些开发者对此感到非常不适，因为他们只想以思维的速度持续产出代码。这种方法的另一个困难在于，当解决方案不适合逐元素处理时，例如我们关于年份指示标题的规则。在这种情况下，我们被迫顺序执行，并且必须处理可变状态，这重新引入了面向对象代码中一些固有的问题。\n\
  \n\n\n另一方面，如果你希望编写一个执行流程清晰、同时仍能获得面向对象代码主要优势的并发程序，那么后函数式范式正是你所需要的。只要你的应用程序——甚至是你负责的应用程序片段——具有清晰的流程，并且流程中的各个步骤之间存在明确的映射关系，那么这就是一个绝佳的范式。这种情况非常常见，这也是为什么在\
  \ Java 中引入 lambda 表达式和后函数式编程如此令人兴奋，也正是本书存在的原因。\n\n## 其他编程范式\n\n上述三种范式——命令式、面向对象和后函数式——是\
  \ Java 8 良好支持的三种范式。然而，还有许多其他编程范式存在，了解其中一些主流范式非常重要。学习新的范式有助于你从不同角度思考问题，这意味着你能更好地解决问题。更重要的是，了解其他范式能让你与来自不同背景的开发者进行交流，这将帮助你避免在知识和职业上陷入停滞。在程序员职业生涯的几年后，可能会悄然滋生一种停滞感：对特定工具集的熟悉和相对满意，会导致错误地认为这些工具（及其衍生品）定义了整个世界。如果你开始有这种想法，以下是一些帮助你摆脱这种陷阱的方法。\n\
  \n### 逻辑/数学范式\n\n大多数对“函数式编程”的引用指的都是这种范式。在这种范式中，程序是一组数学函数，程序员的工作是定义和操作这些函数本身。在应用程序中流动的数据在很大程度上是无关紧要的：函数是基于这些数据的类型和形状来定义的。这些函数如何应用的具体实现细节则留给运行时或编译器处理。我是通过编程语言\
  \ OCaml（它是元语言 ML 的一个衍生品）接触到逻辑/数学范式的。如果你想看看这种方法在并发方面表现如何，可以了解一下 JoCaml 语言，它是连接演算（即\
  \ fork/join）与 OCaml 的结合体。Haskell 可能是当前这种范式的典型代表，Erlang 也很有说服力。这种范式还包括 Mathematica\
  \ 和其他“计算机代数系统”，以及 Coq 和其他“交互式定理证明器”。\n\n当输入/输出（I/O）只是工作中的附带部分，并且可以快速抽象掉时，这种范式效果非常好。如果你大部分时间都花在对纯粹内部定义和操作的数据进行繁重处理上，那么这种范式能很好地确保你的代码快速、安全地执行。\n\
  \n### 同像性范式\n\n这被认为是函数式编程的另一种形式，尽管它与逻辑/数学范式截然不同。相反，同像性范式源于可计算性理论的数学基础。（对于数学爱好者来说，同像性编程就是将\
  \ lambda 演算作为一种编程语言。）在同像性编程语言中，程序会处理自身，对应用程序执行机械化的归约，直到只剩下答案为止。\n\n这是一个让人难以理解的概念，但很容易看到它的实际应用。为了演示，首先假设我定义了这样一个转换规则：\n\
  \n`对于所有 x，将 sq(x) 替换为 x*x。`\n\n请注意，我并不是在定义一个函数或任何语义：这不是函数的定义。我是在说，当在程序中遇到一组特定的字符时，我们应该将它们替换为另一组不同的字符。现在，假设我再定义几个转换规则：\n\
  \n`对于所有 f x y z，将 map(f (x y z)) 替换为 (f(x) f(y) f(z))。`\n\n`对于所有 x y z，将 sum(x y\
  \ z) 替换为 x+y+z。`\n\n再次强调，这是一个直接的文本替换规则。当你看到那个奇怪的“`map`”单词后跟一些括号时，就将其及其括号替换为一组特定的字符。同样，当你看到那个奇怪的“`sum`”单词后跟一些括号时，就将其及其括号替换为另一组特定的字符。基于此，我们可以有下面这个简单的程序。\n\
  \n`初始程序 > sum(map(sq (1 2 3)))`\n\n`归约 1 > sum(sq(1) sq(2) sq(3))`\n\n`归约 2 > sum(1*1\
  \ 2*2 3*3)`\n\n`归约 3 > sum(1   4   9  )`\n\n`归约 4 > 1+4+9`\n\n`归约 5 > 14`\n\n这里唯一发生的“执行”是算术运算。其他所有内容都只是简单的文本转换。这对你来说可能看起来很奇怪，但这实际上是一种极其强大的编程方式。无可争议的主流同像性编程语言是\
  \ Lisp。基于宏的语言，如 (La)TeX 和一些预处理器，也属于这种范式。在这些语言中，其力量来源于这些文本转换的灵活性以及重新定义和操作它们的能力。这使得代码非常易于操作：早在\
  \ Ruby 提供开放类、JavaScript 允许你定义 `undefined` 之前，Lisp 和 (La)TeX 就已经有了猴子补丁。在同像性程序中，如果你想重新定义或操作任何给定的宏，这都不是什么大问题。这使得同像性编程语言对于构建面向开发者的工具和接口特别有用，因为开发者倾向于进行这类修改，并且愿意承担失败时的后果。\n\
  \n### 声明式范式\n\n这种范式备受诟病，经常被忽视，但它很可能也是所有编程范式中应用最广泛、使用最多的。当你听到有人说 HTML 或 CSS“不是真正的编程语言”时，那是因为他们忽视了声明式范式。在声明式范式中，程序员只是声明事物的存在，而由程序的消费者来决定如何处理它。UI\
  \ 编程语言绝大多数是声明式的，配置文件（例如 Spring 上下文文件）和优秀构建工具的构建脚本也是如此。如果你经历过 21 世纪初面向方面编程（AOP）的热潮，那么你可能会认识到\
  \ AOP 是一种声明式编程。近年来 Java 中对“可选类型系统”和“注解驱动配置”的兴趣，正是将声明式范式引入 Java 的努力。\n\n声明式范式适用于任何你只想创建和配置许多组件的情况。这些组件可能相互关联，也可能彼此独立；无论如何，组件只是被声明为存在。对组件的任何定制或逻辑都应限于配置属性。通常可以在这里或那里偷偷插入一些代码片段，或者使用事件、回调或钩子，但这些是通往其他范式（通常是命令式或响应式范式）的逃生出口。\n\
  \n\n\n### 响应式\n\n在响应式范式中，程序放弃了主导权。程序不再由贯穿应用的流程或执行的函数构成，而是由事件处理器组成。当满足特定条件时，该条件对应的事件处理器就会被执行。响应式编程目前备受关注，这也让\
  \ Erlang 等编程语言以及 Akka 和 RxJava 等库获得了更多关注。响应式编程范式在前端 JavaScript 中也很常见，尽管有时不太容易识别出来。\n\
  \n响应式编程的优势在于，你完全无需担心执行过程，这便消除了一整类可能产生错误的地方。此外，运行时环境可以进行大幅优化，因为它在决定如何执行代码方面拥有极大的自由度。其中一个例子是，（从概念上讲）很容易将响应式程序分布到各种其他机器上，这使得它非常适用于云端环境。\n\
  \n### 基于栈的（串联式）\n\n从某种程度上说，基于栈的范式是一种命令式编程。基于栈的编程是一系列按顺序执行的指令。然而，这些指令都操作一个栈：整个程序就是在操作这个栈。这个栈中同时包含命令和数据，它们被压入和弹出，这使得基于栈的编程更接近于同像性编程，而非传统的命令式编程。我遇到过的最有趣的基于栈的编程语言是\
  \ Factor，但遗憾的是它似乎发展艰难。Java 虚拟机字节码本身也是一种基于栈的编程语言，这使得基于栈的范式可以说是 JVM 生态系统的“原生”或“自然”范式。\n\
  \n### 后现代\n\n有许多尝试旨在创建元评论并探索编程语言的边界，我将它们统称为“后现代”编程语言。Perl 编程语言的发明者拉里·沃尔曾著名地将 Perl\
  \ 称为“后现代”语言，意指你可以用多种不同的范式来使用它。还有其他一些语言致力于让你能够以任何你喜欢的范式进行编码：在 JVM 上，Scala 就属于这种类型。它无疑是后函数式的，但它也允许你以声明式风格进行编码（参见\
  \ ScalaCheck），并且拥有许多高级特性，其主要目的是支持“内部领域特定语言”和替代性（无点）风格。\n\n除了这种高度灵活的后现代语言流派之外，还有达达主义流派的后现代编程语言：这些语言以自我指涉的方式嘲弄编程语言的概念。Whitespace\
  \ 就是这类语言的完美例子。在 Whitespace 中，只有空白字符是有意义的：任何非空白字符都被视为注释，编译器会忽略它们。整个语言由空格、制表符、回车符和其他空白字符组成。另一个例子是\
  \ Brainf#ck，它旨在成为一种功能完备但编译器尽可能小的语言：结果就是，它实际上无法用于任何有意义的开发。它有一个衍生语言 Ook!，号称是专为猩猩设计的编程语言。\n\
  \n## 范式、风格与后函数式编程\n\n学习一门编程语言并不容易。这几乎像是一种入会仪式，尤其是对于那些比较深奥的编程语言来说。深入理解一种新的编程语言范式，确实是一种变革性的体验。这意味着，那些致力于学习一门新语言和新范式的人，会对此投入巨大，并深受其影响。不幸的是，有些人——通常是年轻男性，尤其包括早年间的鄙人——倾向于围绕这种来之不易且具有变革性的知识，形成小团体和精英主义。根据经验，这很容易做到，甚至是在不经意间。同样根据经验，让我告诉你：这是一条糟糕的路。\n\
  \n重要的是要记住，这些工具仅仅是工具而已。有些时候你需要一种工具，有些时候你需要另一种。有时你需要射钉枪，有时你需要羊角锤。智慧更在于知道何时使用哪种工具。在\
  \ Java 8 中引入后函数式编程，就像是将射钉枪引入了一个只有羊角锤的世界：对于许多任务来说，后函数式编程会更高效，效果也更好。然而，有些时候你仍然需要使用面向对象编程：在我们的类比中，有些时候你仍然需要使用羊角锤。\n\
  \n你会有自己的风格、自己的偏好，以及自己对什么是“自然解决方案”的理解。其他人也有他们自己的风格、偏好和理解。正是这种认识催生了后现代编程语言。不幸的是，试图让一种语言成为所有人的万能钥匙，最终只会是一团糟。然而，在任何团队的共同理解以及编程语言的边界之内，仍然存在着大量的自由。这种自由是宝贵的：它让团队中的每个程序员都能发挥出自己最大的效率。所以，请珍惜拥有独特风格的自由，也请珍惜他人拥有同样自由的权利。\n\
  \n这也为体验新事物创造了机会。你永远、永远不要拒绝深入接触一种新做事方式的机会。持续让自己沉浸其中，直到它不再显得异常奇怪、不必要的困难或不可理喻的愚蠢。那时，你就成为了一名更好的程序员：当你变得更广博时，你就变得更优秀了。\n\
