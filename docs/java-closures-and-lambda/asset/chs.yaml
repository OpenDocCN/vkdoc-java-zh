  \n清单 7-3 中的堆栈跟踪远不如清单 7-2 中的版本那么友好。堆栈跟踪中仍然存在 lambda 引用，但这些引用指向的是 lambda 声明的位置；完全没有对\
  \ `main` 方法的引用，而我们的 lambda 正是在 `main` 方法中接入流的。代码直接从相当通用的流基础设施跳转到源代码中 lambda 声明的位置。这可能会让定位代码实际被调用的位置变得棘手；想象一下，如果\
  \ lambda 是在其他类中定义的，并在多个流中重用——根据经验，基于这样的堆栈跟踪来调试该异常会非常困难。\n\n另一件需要注意的事情是，我们在处理过程深入之后才遇到这次失败：我们在第\
  \ 304 次执行时崩溃了。这意味着有 303 次执行是成功完成的。其中一些结果被打印了出来。然而，有些结果可能并未打印；这取决于崩溃发生时它们在管道中已经处理到了哪个阶段。更糟糕的是，在崩溃发生后，我们甚至没有尝试处理任何后续的数字：一次崩溃就会终止整个流。因此，我们的一部分元素处于已完成状态，一部分处于中间状态，还有一部分从未被启动。这次崩溃让一切陷入了一个糟糕的境地。\n\
  \n这种方法的最后一个问题是，我们重新引入了异常吞没的问题，尽管方式非常隐蔽。好消息是，我们总是会得到一个异常。然而，如果多个线程都发生了异常，那么我们只会看到第一个异常。有可能多个线程同时抛出异常：例如，当数据库宕机时，它们都在执行数据库查询。但在这种情况下，即使存在多个问题，你也只会看到第一个异常。\n\
  \n有时，这些限制是可以接受的。有时，你的工作确实是“要么全有，要么全无”，或者即使事情处于不确定状态，多次重新运行也是安全的。在这些情况下，将异常映射为未检查异常的做法完全可行。然而，如果你想尝试从间歇性错误中挽救工作成果，那么你就需要更巧妙的方法了。\n\
  \n\n\n### 使用异常处理调用者管理资源\n\n由于 Java 8 是一种后函数式语言，我们可以针对问题采用面向对象的解决方案。我们想要的对象将封装 try-with-resources\
  \ 逻辑和错误处理，这样用户只需提供所需的实现即可。在映射运行后，可以查询该对象以处理出现的任何异常。\n\n这里的思路是，我们会在开头和结尾各有一段代码，中间留出一个供用户自定义代码的开口。我的朋友、导师兼合著者\
  \ Brian Hurt 将此称为“中间空洞模式”。Spring 称之为“控制反转”，这也是早期 Spring API（尤其是 Spring JDBC）的关键优势之一。在我们的场景中，开头的代码是资源的创建（try-with-resources\
  \ 块中的“try”部分）和异常处理（try-with-resources 块中的“catch”部分）。中间供用户自定义代码的开口，则是接收资源与流值，并返回流映射值的代码。\n\
  \n在实现中，我们将创建这个类以及两个单方法接口：一个定义如何创建资源，另一个定义如何处理资源。我们期望用户使用 lambda 表达式来实现这些接口。这些接口方法允许用户抛出受检异常，因此用户可以完全自由地执行他们想要的操作。该类本身将封装资源的创建以及返回值与异常的处理。\n\
  \n这个非常简洁的理论有一个陷阱：在出现异常时，我们必须返回一些内容。传统的 Java 开发者又会习惯性地使用 `null`，但这是一个坏习惯。Java 8 提供了\
  \ `Optional` 类，它表示一个可能已设置也可能未设置的值。这是一个更好的选择，因为 `Optional` 类不会导致你意外引发 `NullPointerException`；该\
  \ API 提供了许多更好的替代方法来获取值，包括表示常见的“获取并判空否则爆炸”的代码模式。\n\n因此，我们流的结果将是一个 `Optional` 容器，其类型与映射本身通常返回的类型相同。我们可以使用流的\
  \ `filter` 方法过滤掉空的 `Optional` 类型，这使得从流中清除任何异常元素变得非常容易。空的元素也提供了一些价值：它们使我们能够发现流中发生了错误，因此我们可以提供更智能的行为。\n\
  \n这个类、它的接口以及调用演示都在清单 7-4 中给出。类实现本身相当丑陋。这是因为存在大量类型变量和奇怪的语法，而且由于接口不能是类的成员（它们始终是静态的），情况变得更糟。然而，最终的\
  \ API 和用法实际上相当不错。\n\n**清单 7-4. 使用对象通过 Optional 管理资源**\n\n`import java.io.ByteArrayInputStream;`\n\
  \n`import java.io.IOException;`\n\n`import java.io.InputStream;`\n\n`import java.util.*;`\n\
  \n`import java.util.concurrent.*;`\n\n`import java.util.concurrent.atomic.*;`\n\n\
  `import java.util.function.*;`\n\n`import java.util.stream.*;`\n\n`public class\
  \ Listing4 {`\n\n`public static class ResourceExceptionHandler`\n\n`<RESOURCE_T\
  \ extends AutoCloseable>`\n\n`{`\n\n`public static interface FunctionWithResource`\n\
  \n`<RESOURCE_T extends AutoCloseable, IN_T, OUT_T>`\n\n`{`\n\n`OUT_T apply(RESOURCE_T\
  \ resource, IN_T value) throws Exception;`\n\n`}`\n\n`public static interface ResourceMaker`\n\
  \n`<RESOURCE_T extends AutoCloseable>`\n\n`{`\n\n`RESOURCE_T create() throws Exception;`\n\
  \n`}`\n\n`private final ResourceMaker<RESOURCE_T> init;`\n\n`private final ConcurrentMap<Object,\
  \ Exception> exceptions =`\n\n`new ConcurrentSkipListMap<>();`\n\n`public ResourceExceptionHandler(final\
  \ ResourceMaker<RESOURCE_T> init) {`\n\n`Objects.requireNonNull(init,`\n\n`\"ResourceMaker\
  \ (initialization code for resource)\");`\n\n\n\n`this.init = init;`\n\n`}`\n\n\
  `public Map<Object, Exception> getExceptions() {`\n\n`return exceptions;`\n\n`}`\n\
  \n`public Function<Integer, Optional<Integer>> map(`\n\n`FunctionWithResource<RESOURCE_T,\
  \ Integer, Integer> f`\n\n`) {`\n\n`return i -> {`\n\n`try (RESOURCE_T resource\
  \ = init.create()) {`\n\n`return Optional.of(f.apply(resource, i));`\n\n`} catch\
  \ (Exception e) {`\n\n`exceptions.put(i, e);`\n\n`return Optional.empty();`\n\n\
  `}`\n\n`};`\n\n`}`\n\n`}`\n\n`public static InputStream generateInputStream() {`\n\
  \n`return new ByteArrayInputStream(\"foobar\".getBytes());`\n\n`}`\n\n`public static\
  \ Stream<Integer> generateParallelStream() {`\n\n`final int elements = 1000;`\n\n\
  `List<Integer> toReturn = new ArrayList<>(elements);`\n\n`for (int i = 0; i < elements;\
  \ i++) {`\n\n`toReturn.add(i);`\n\n`}`\n\n`return toReturn.parallelStream();`\n\n\
  `}`\n\n`public static ResourceExceptionHandler.FunctionWithResource`\n\n`<InputStream,\
  \ Integer, Integer> generateMap()`\n\n`{`\n\n`AtomicInteger counter = new AtomicInteger(0);`\n\
  \n`return (in, i) -> {`\n\n`int count = counter.incrementAndGet();`\n\n`if (i ==\
  \ 100) {`\n\n`throw new IOException(`\n\n`\"And with a kiss, I die! (After \" +\
