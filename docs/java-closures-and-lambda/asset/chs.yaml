- "# 7. Lambda 表达式与遗留代码\n\n在本书的这一部分，你已经看到了 lambda 表达式能为你的代码库带来的所有美妙之处。但那些大量的遗留代码呢？有很多代码需要融入这个新的现实，许多\
  \ Java 开发者都致力于那些不得不拖着这些“泥球”前进的项目。Lambda 表达式如何让他们的生活更轻松？\n\n此外，新的 Java 8 API 令人印象深刻，但\
  \ Java SDK 中还有许多 API 尚未为这个勇敢的新 lambda 世界进行更新。你如何利用那些完全不打算支持 lambda 的 API 来使用 lambda\
  \ 呢？\n\n好消息是，Java 语言的开发者们长期以来一直关注这个问题。Java 本质上是一种保守的语言，因此语言开发者不能通过激进的语法更改来破坏任何现有的\
  \ Java 代码。然而，语言开发者可以添加新功能，提供新的能力和新的 API。最重要的是，他们提供了关键功能，将遗留代码桥接到我们的新世界。这些功能，结合一些关键实践，意味着只需少量代码就能获得\
  \ lambda 的所有能力，即使是从那些对 lambda 一无所知的代码中也能做到。\n\n## 资源与异常\n\nJava 中最尴尬的遗留模式是“try-with-resource”模式。在这种模式中，一个有状态对象（通常是\
  \ I/O 对象或池）需要从初始状态进入可操作状态，然后才能使用它，并且当用户操作完成后，还需要清理这个有状态对象。这种模式被广泛采用，并且在概念上与面向对象编程配合得很好。然而，这种模式的实现在\
  \ Java 中一直效果不佳，并且该语言从一开始就一直在努力寻找改进的方法。\n\n最初，这种模式要求你在作用域外声明一个变量，然后进入 try/catch 块。每个资源需要额外的\
  \ 14 行代码，看起来像这样：\n\n`InputStream in = null;`\n\n`try {`\n\n`in = acquireInputStream();`\n\
  \n`// 对“in”执行某些操作`\n\n`} finally {`\n\n`if (in != null) {`\n\n`try {`\n\n`in.close();`\n\
  \n`} catch (IOException closeException) {`\n\n`// 现在怎么办？`\n\n`}`\n\n`in = null;`\n\
  \n`}`\n\n`}`\n\n这就产生了一个问题：如何处理可能抛出的 `closeException`。如果在使用资源时抛出一个异常，然后在关闭资源时又抛出另一个异常，该怎么办？如果你抛出\
  \ `closeException`，原始异常（可能实际上很有用）就会丢失。通常的解决方案是简单地忽略 `closeException`，通常将其隐藏在一个名为\
  \ `closeQuietly(InputStream in)` 的方法中。这个方法也可以忽略空值。这使得代码显著缩短，并且可读性稍好：\n\n`InputStream\
  \ in = null;`\n\n`try {`\n\n`in = acquireInputStream();`\n\n`// 执行某些操作`\n\n`} finally\
  \ {`\n\n`closeQuiety(in);`\n\n`in = null;`\n\n`}`\n\n然而，这段代码存在一些微妙的问题。乍一看，它们可能微不足道，但当它们出现在你的生产代码中时，就绝非小事了。这些微妙问题中最显著的是，这段代码忽略了关闭时发生的任何异常，而正是在关闭时，缓冲流、压缩流和加密流会抛出它们的异常。这段代码会静默地丢弃这些异常，让调用代码（以及调试的开发者）认为一切正常。这种代码模式还会将资源的变量泄漏到周围的作用域中。如果你忘记将资源赋值为\
  \ `null`，就会泄漏对象本身，阻止其及时进行垃圾回收。如果 try 块附带了 catch 子句，资源处理也容易丢失或混淆，并且多个资源需要将这些结构相互嵌套。整个事情仍然显得有些丑陋。\n\
  \n为了解决这种丑陋，Java 7 引入了“try-with-resources”语法结构。这允许你在 try 块的开头声明资源，并且它会自动关闭资源。你可以将任何实现了\
  \ `java.lang.AutoCloseable` 的对象分配为资源。当 try 块完成时，该资源将自动关闭。如果在关闭时抛出异常，则该异常会向上传播给调用者。如果已经抛出了一个异常，并且在关闭时又抛出了一个额外的异常，那么该额外异常会作为抑制异常附加到第一个异常上：堆栈跟踪会显示原始异常是主要原因，而关闭异常是附加的抑制异常。另一个好处是，你为变量划定了清晰的边界，并且编译器保证在退出块时它们会被关闭。总的来说，这提供了人们所期望的那种异常处理，代码看起来像这样：\n\
  \n`public void closeQuietlyTryWithResource() {`\n\n`try(InputStream in = acquireInputStream())\
  \ {`\n\n`// 执行某些操作`\n\n`} catch(IOException exception) {`\n\n`// 处理异常，可能包括关闭异常`\n\
  \n`}`\n\n`}`\n\n\n\n遗憾的是，这种写法与 lambda 表达式的语法配合不佳。try-with-resources 块并非单条语句，因此若想将其作为\
  \ lambda 的主体，你必须在调用外层立即加上一对花括号，如下所示：\n\n`Consumer<Object> consumer = it -> {`\n\n\
  `try (InputStream in = acquireInputStream()) {`\n\n`// 执行某些操作`\n\n`} catch (IOException\
  \ exception) {`\n\n`// 处理异常，可能包含关闭异常`\n\n`}`\n\n`};`\n\n另请注意，我们必须将 lambda 放在 try-with-resources\
  \ 块内部，或者在退出 try-with-resources 块之前执行该 lambda。如果你在 try-with-resources 块内赋值 lambda，然后退出该块，之后再尝试调用\
  \ lambda，此时输入流将被关闭。操作的顺序如下：\n\n进入 try-with-resources 块。  \n赋值 lambda。  \n退出 try-with-resources\
  \ 块，关闭输入流。  \n调用 lambda。\n\n清单 7-1 演示了这种错误。当你这样逐步分析时，错误似乎显而易见。然而，这是一个很容易犯的错误，并且在实践中可能相当难以察觉。如果你调用的代码会“释放\
  \ Zalgo”，那么检测起来尤其棘手。如果你还记得第 2 章的内容，当调用代码有时立即执行、有时延迟执行时，开发者就“释放了 Zalgo”。如果你的代码释放了\
  \ Zalgo，那么你可能会将资源传入该代码，期望它立即执行。但是，当它以延迟方式执行时，就会出现竞态条件：try-with-resources 块将在未来的某个时刻调用关闭操作，而调用代码将在未来的另一个时刻读取输入流。哪个先发生，完全取决于线程调度器的随机决定。结果将是间歇性的已关闭输入流：当读取代码偶尔在竞态中失败时，你会收到异常。\n\
  \n**清单 7-1. 在资源关闭后调用 Lambda**\n\n`import java.io.IOException;`\n\n`import java.io.InputStream;`\n\
  \n`import java.io.UncheckedIOException;`\n\n`import java.util.function.*;`\n\n`public\
  \ class Listing1 {`\n\n`public static void main(String[] args) {`\n\n`Consumer<Object>\
  \ consumer = null;`\n\n`try (InputStream in = acquireInputStream()) {`\n\n`consumer\
  \ = it -> {`\n\n`try {`\n\n`System.out.println(\"尝试读取！\");`\n\n`in.read();`\n\n\
  `} catch (IOException ioe) {`\n\n`throw new UncheckedIOException(\"读取错误\", ioe);`\n\
  \n`}`\n\n`};`\n\n`} catch (IOException ioe) {`\n\n`throw new UncheckedIOException(\"\
  输入流错误\", ioe);`\n\n`}`\n\n`consumer.accept(new Object());`\n\n`}`\n\n`public static\
  \ InputStream acquireInputStream() {`\n\n`return new InputStream() {`\n\n`@Override`\n\
  \n`public int read() throws IOException {`\n\n`return 1;`\n\n`}`\n\n`@Override`\n\
  \n`public void close() throws IOException {`\n\n`System.out.println(\"正在关闭！\");`\n\
  \n`super.close();`\n\n`}`\n\n`};`\n\n`}`\n\n`}`\n\n`/* 结果`\n\n`正在关闭！`\n\n`尝试读取！`\n\
  \n`*/`\n\n总而言之，try-with-resources 方法还算不错，尽管它已经开始显得有些杂乱。你必须小心哪些块以何种方式嵌套，但这还是相当可控的。更大的问题是，如果你的函数有返回值，那么\
  \ catch 块中的返回必须与 try 块中的返回匹配。许多 Java 开发者的自然反应是在此时返回 `null`，但这只会增加遇到 `NullPointerException`\
  \ 的可能性，因为它期望调用者处理这种情况，同时又让调用者很容易忽略它。根据你的具体情况，有三种更好的选择：非受检异常、异常处理调用者，或者 `Result`\
  \ 对象。\n\n### 通过抛出非受检异常来处理资源\n\n一种非常流行且常见的解决方案是将受检异常转换为非受检异常并重新抛出。这将处理问题的责任交回给调用者，并且异常可能会在遇到异常处理器之前，沿着执行栈向上回溯相当长的距离。希望无论异常处理器在哪里，它都能以智能的方式处理这种异常情况。\n\
  \nJava 8 为这种编程惯例引入了一些支持：`java.io.UncheckedIOException` 类，它的存在明确是为了将受检的 `IOException`\
  \ 实例包装在非受检的包装器中。由于 `IOException` 是最常见异常类的根源，这个类提供了一种将大多数常见异常转换为非受检形式的方法。最好的做法是使用\
  \ `UncheckedIOException(String,IOException)` 构造函数，它允许你在转换点附加一条供人类阅读的消息；一般来说，在发生异常时你能提供的信息越多，情况就越好。有关此用法的示例，请参见清单\
  \ 7-2。\n\n**清单 7-2. 包装 IOException 的 UncheckedIOException**\n\n`import java.io.ByteArrayInputStream;`\n\
