  \ 对象负责将日志信息发布到各种目标位置——文件、控制台、内存缓冲区等。\n\n*   `Filter`：`java.util.logging.Filter`\
  \ 对象被 `Logger` 对象用来决定日志信息是应该传递给 `Handler` 进行处理，还是应该被忽略。`Handler` 对象也可以使用 `Filter`\
  \ 对象，在将日志请求发布到最终目标位置之前对其执行更多检查。\n\n*   `Formatter`：`java.util.logging.Formatter`\
  \ 对象负责为正在发布的日志信息提供所需的结构。如果配置了相应的设置，格式化器还会对日志信息进行本地化处理。\n\n日志 API 从一个系统范围的配置文件中获取各种配置参数。JDK\
  \ 1.4 提供了一个默认的配置文件，位于 \"/jre/lib/logging.properties\" 文件中。它也可以使用任何其他用户指定的配置文件，以实现更强的控制，最重要的是，支持以编程方式控制日志框架的行为。\n\
  \n日志 API 的基本架构定义了多个日志信息级别。这些级别描述了日志请求的优先级，并且日志框架可以被调整，以显示与特定级别相关的日志信息。所定义的级别可以按优先级降序排列如下：\n\
  \n*   *SEVERE（最高）：* 此级别用于记录关于对应用程序至关重要且需要立即关注以进行纠正的问题的消息。\n\n*   *WARNING：* 此级别用于记录指示应用程序存在潜在问题的消息。\n\
  \n*   *INFO：* 此级别是日志 API 使用的默认级别。以此级别发布的日志消息通常是普通的调试语句，在应用程序的开发阶段和日常维护中很有帮助。\n\n\
  *   *CONFIG：* 此级别指定与应用程序配置阶段相关的日志消息。例如，在应用程序启动时，我们可以使用此级别来打印与配置相关的信息。\n\n*   *FINE/FINER/FINEST（最低）：*\
  \ 这些级别表示日志消息的详细程度，从不太详细到非常详细。使用这些日志级别将导致大量日志信息被发布到日志目标位置。\n\n*   *ALL：* 此级别表示应记录所有消息。\n\
  \n上述所有级别都在 `java.util.logging.Level` 类中定义为 `static final int` 原始类型，并且每个定义的级别都关联一个唯一的整数值。如果我们想定义自己的级别，可以通过扩展\
