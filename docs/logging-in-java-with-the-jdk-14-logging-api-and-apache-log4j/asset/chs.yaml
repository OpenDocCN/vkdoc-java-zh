  \ 对象用于记录特定于应用程序或应用程序组件的消息。它捕获指定的日志消息并创建一个 `LogRecord` 对象，该对象封装了与日志请求相关的所有信息。日志 API\
  \ 提供了一个根日志记录器，它作为默认日志记录器存在，没有关联命名空间。根日志记录器能够将日志信息打印到应用程序的控制台。与 `Logger` 对象关联的默认级别是\
