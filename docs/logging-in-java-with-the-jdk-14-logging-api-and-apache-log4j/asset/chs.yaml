  <td title=\"级别\">INFO</td>\n<td title=\"com.apress.logging.log4j 类别\">com.apress.logging.log4j</td>\n\
  <td>LayoutDemo.java:35</td>\n<td title=\"消息\">平方根值: 6.6332495807108</td>\n</tr>\n\
  <tr><td bgcolor=\"#EEEEEE\" style=\"font-size : xx-small;\" colspan=\"6\"\ntitle=\"\
  嵌套诊断上下文\">NDC: 44.0</td></tr>\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n请注意，头部信息包含\
  \ `<html>` 和 `<body>` 标签，但 `</body>` 和 `</html>` 标签的尾部信息完全缺失。显然，这不是一个格式良好的 HTML\
  \ 文件。某些浏览器可能允许使用这种风格的 HTML 源代码，但有些则可能不允许。问题是，为什么尾部信息（即结束标签）会缺失呢？\n\n答案在于 `HTMLLayout`\
  \ 的 `getFooter()` 方法被调用的时机。按照 log4j 1.2.6 版本的当前实现，任何 `Layout` 对象的 `getFooter()`\
  \ 方法都是在相关 `Appender` 对象的 `close()` 方法被调用时才会被调用。这可能是 API 中的一个小错误，也可能不是，具体取决于应用程序执行日志记录活动的方式。\n\
  \n想象一个作为服务器组件、处理多个客户端调用的应用程序模块。对于每次调用，我们都希望将日志信息写入一个 HTML 文件。我们希望头部信息仅在 `HTMLLayout`\
  \ 对象初始化时包含一次。这已在初始化时通过 `HTMLLayout` 的 `setWriter()` 方法完成。现在的问题是我们何时写入尾部信息。当然不是在每条日志信息追加到文件之后。等等——如果我们希望每次日志请求都打开一个新文件并在日志记录结束后关闭文件，那么可能确实需要这样做。在这种情况下，如果在每次日志请求格式化后调用\
  \ `getFooter()` 方法，那将完全没问题。但在正常情况下，如果我们希望将所有日志信息包含在一个文件中，或者更严格地说，该文件包含多个日志请求的日志信息，我们就不能每次都追加尾部信息。\n\
  \n显然，调用 `getFooter()` 的最佳时机是当 `Appender` 对象本身不再需要时。在这种情况下，当我们退出服务器组件（例如 servlet\
  \ 中的 `destroy()` 方法）时，我们会调用 `LogManager.shutdown()` 方法来关闭所有 `Appender` 对象。这确保了尾部信息被写入生成的\
  \ HTML 文件的末尾。\n\n在这个特定示例中，在 `computeSquareRoot()` 方法中，就在离开该方法之前，如果我们调用\n\n```\n\
  LogManager.shutDown()\n```\n\n我们会看到尾部信息被包含在最终的 HTML 文件中。这可能不是理想的情况，但这就是我们目前必须处理的方式。\n\
  \n### XMLLayout 对象\n\nHTML 格式的日志信息友好且易于阅读，但不易于重用。数据是结构化的，但*并非*以描述性的方式呈现。HTML 风格的日志信息无法在多个应用程序模块之间移植。为了以可移植的\
  \ XML 格式呈现日志信息，log4j 提供了 `org.apache.log4j.xml.XMLLayout` 对象。\n\n`XMLLayout` 对象可以在最终输出中包含来自\
  \ `LoggingEvent` 的以下项目：\n\n*   日志记录器名称\n*   时间戳\n*   与日志请求关联的级别\n*   调用线程名称\n* \
  \  日志消息\n*   `NDC` 信息\n*   `LoggingEvent` 中包含的 `java.lang.Throwable` 实例\n*   日志请求的位置信息（默认情况下，位置信息功能是关闭的）\n\
  \n`XMLLayout` 遵循 \"log4j.dtd\" 文件中包含的文档类型定义来创建 XML 输出。需要注意的是，最终输出*不是*一个格式良好的 XML\
  \ 文件。这听起来可能令人惊讶，但此对象的目的是将日志信息生成为一系列 `<log4j:event>` 元素。然后，最终输出可以作为实体被另一个正确的 XML\
  \ 文件引用。\n\n|  | 注意 | 请参考 Apache log4j 二进制发行版附带的 \"log4j.dtd\" 文件。 |\n\n为了说明这个概念，让我们再次重用清单\
  \ 6-1 中的程序，并使用清单 6-5 中定义的 `XMLLayout` 配置文件 \"xml.properties\"。\n\n**清单 6-5：xml.properties**\n\
  \n| **![示例开始](img/_1.gif)** |\n\n```\n#配置自定义日志记录器\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
  \ FILE\n\nlog4j.appender.FILE=org.apache.log4j.FileAppender\nlog4j.appender.FILE.File=xmlLayout.xml\n\
  \nlog4j.appender.FILE.layout=org.apache.log4j.xml.XMLLayout\nlog4j.appender.FILE.layout.LocationInfo=true\n\
  ```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n该配置使用 `FileAppender` 和 `XMLLayout`\
  \ 来格式化日志信息。\n\n使用此配置文件执行程序会将格式化后的日志信息写入 \"xmlLayout.xml\" 文件。该文件的内容类似于以下内容：\n\n\
  ```\n<log4j:event logger=\"com.apress.logging.log4j\" timestamp=\"1035061552691\"\
  \nlevel=\"INFO\" thread=\"main\">\n<log4j:message><![CDATA[平方根值: 4.69041575982343]]></log4j:message>\n\
  <log4j:NDC><![CDATA[22.0]]></log4j:NDC>\n<log4j:locationInfo class=\"com.apress.logging.log4j.LayoutDemo\"\
  \nmethod=\"computeSquareRoot\" file=\"LayoutDemo.java\" line=\"35\"/>\n</log4j:event>\n\
  \n<log4j:event logger=\"com.apress.logging.log4j\" timestamp=\"1035061552711\"\n\
  level=\"INFO\" thread=\"main\">\n<log4j:message><![CDATA[平方根值: 6.6332495807108]]></log4j:message>\n\
  <log4j:NDC><![CDATA[44.0]]></log4j:NDC>\n<log4j:locationInfo class=\"com.apress.logging.log4j.LayoutDemo\"\
  \nmethod=\"computeSquareRoot\" file=\"LayoutDemo.java\" line=\"35\"/>\n</log4j:event>\n\
  ```\n\n显而易见，XML 输出是一系列 `<log4j:event>` 元素，其中包含其他子元素来呈现日志信息。下面描述的代码片段展示了如何将此信息包含在一个格式良好的\
  \ XML 文件中：\n\n```\n <?xml version=\"1.0\" ?>\n\n<!DOCTYPE log4j:eventSet SYSTEM\
  \ \"log4j.dtd\" [<!ENTITY logEntity SYSTEM\n\"xmlLayout.xml\">]>\n\n<log4j:eventSet\
  \ version=\"1.2\" xmlns:log4j=\"http://jakarta.apache.org/log4j/\">\n &logEntity;\n\
  </log4j:eventSet>\n```\n\n乍一看，这可能会令人困惑。但其背后的原理是，它使得将日志消息渲染为 XML 格式的 `Layout` 对象和使用此\
  \ `Layout` 的 `Appender` 对象彼此独立。\n\n\n\n为了进一步说明，假设你正在编写一个自定义的附加器（appender）。你希望该附加器在每次日志输出时都包含公司信息头，并且希望日志信息以\
  \ XML 格式发布。在这种情况下，你需要在自定义附加器中重写 `doAppend()` 方法，将日志信息写入 XML 文件。同时，你可以包含一个包含公司信息的标准头部，并仍然使用现有的\
  \ `XMLLayout` 对象，以其自身的风格格式化日志信息。然后，你可以在整个 XML 文件中，将 `XMLLayout` 对象生成的文件引用为外部 `ENTITY`。显然，你实现了将\
  \ `XMLLayout` 对象生成的 XML 日志信息作为任何其他 XML 内容的 `ELEMENT` 包含进来的灵活性。\n\n### PatternLayout\
  \ 对象\n\n格式化任何信息片段意味着赋予它一种能被某些外部实体理解和识别的模式。通过为日志信息提供一种模式，该信息将被人类或程序识别。模式进一步意味着，如果产生日志信息的模块和接收信息的模块事先就某种模式达成一致，那么该信息就可以被处理。这就是\
  \ `PatternLayout` 发挥作用的地方。\n\n`org.apache.log4j.PatternLayout` 扩展了基础的 `abstract`\
  \ 类 `Layout`，并重写了 `format()` 方法，以根据提供的模式来结构化日志信息。我们可以通过配置文件或编程方式提供该模式。`PatternLayout`\
  \ 对象具有表 6-9 中列出的 bean 属性。\n\n表 6-9：PatternLayout 中的 Bean 属性\n\n| Bean 属性 | 方法 |\
  \ 描述 | 默认值 |\n| --- | --- | --- | --- |\n| `conversionPattern` | `setConversionPattern()`\
  \ | 设置转换模式 | 默认为 `%r [%t] %p %c %x - %m%n` |\n\n`PatternLayout` 可以在最终消息中包含 `LoggingEvent`\
  \ 对象中的所有信息。它可以处理的项目列表见表 6-10。注意，`java.lang.Throwable` 实例是例外情况。\n\n表 6-10：PatternLayout\
  \ 的转换字符\n\n| 转换字符 | 含义 |\n| --- | --- |\n| `c` | 用于调用此日志请求的 `Logger`。它可以选择性地接受一个精度说明符。例如，在我们的示例中，Logger\
  \ 名称是 `com.apress.logging.log4`。使用精度说明符 `c{2}`，logger 将被打印为 \"logging.log4j\"。注意，最终输出中只包含从右侧算起的相应数量的元素。\
  \ |\n| `C` | 调用此日志请求的 `Logger` 的完全限定名称。它也可以接受如转换字符 `c` 所述的精度说明符。生成 logger 的完全限定名称可能非常慢。\
  \ |\n| `d` | 日志请求的日期。它也可以接受一个可选的日期说明符。例如，`%d{yyyy-MM-dd}` 将以年-月-日格式打印日期。如果未指定日期格式，则使用\
  \ log4j 内部定义的 ISO8601 格式。由于 `java.text.SimpleDateFormat` 的性能较差，为了获得更好的结果，请使用 log4j\
  \ API 提供的 `DateFormat` 对象。 |\n| `F` | 发出日志请求的文件名。 |\n| `l` | 位置信息。在处理任何异常堆栈跟踪时，此信息非常有用。但是，使用\
  \ log4j 生成此信息可能非常慢。在使用此功能之前需要权衡利弊。 |\n| `L` | 发出日志请求的程序文件中的行号。 |\n| `m` | 日志消息。\
  \ |\n| `M` | 发出日志请求的程序中的方法。 |\n| `n` | 平台相关的行分隔符。 |\n| `p` | 与日志请求关联的级别。 |\n| `r`\
  \ | 相对日期格式，显示从应用程序启动到发出此日志请求所经过的毫秒数。 |\n| `t` | 调用线程。 |\n| `x` | `NDC` 信息。 |\n|\
  \ `X` | `MDC` 信息。`X` 转换字符后跟 `MDC` 的键。例如，`X{clientIP}` 将打印存储在 `MDC` 中键为 `clientIP`\
  \ 的信息。 |\n| `%` | 字面百分号。`%%` 将打印一个 % 符号。 |\n\n`PatternLayout` 根据给定的模式格式化日志信息。提供的模式主要规定了以下项目：\n\
  \n*   格式化信息由*格式修饰符*决定。\n*   要显示的信息由*转换字符*决定。\n\n表 6-10 显示了所有可与 `PatternLayout` 一起使用的转换字符。\n\
  \n与 `PatternLayout` 一起使用的格式修饰符在表 6-11 中描述。\n\n表 6-11：PatternLayout 中使用的格式修饰符\n\n\
  | 修饰符 | 左对齐 | 最小宽度 | 最大宽度 | 含义 |\n| --- | --- | --- | --- | --- |\n| `%10c` | 否\
  \ | 10 个字符 | 无 | 显示 logger 名称。如果名称少于 10 个字符，则在左侧填充空格。 |\n| `%-10c` | 是 | 10 个字符\
  \ | 无 | 显示 logger 名称。如果名称少于 10 个字符，则在右侧填充空格。 |\n| `%.20c` | 否 | 无 | 20 个字符 | 显示\
  \ logger 名称。如果名称超过 20 个字符，则从开头截断。 |\n| `%20.30c` | 否 | 20 个字符 | 30 个字符 | 显示 logger\
  \ 名称。如果名称小于最小宽度（20 个字符），则在左侧填充空格；如果名称超过 30 个字符，则从开头截断。 |\n| `%-20.30c` | 是 | 20\
  \ 个字符 | 30 个字符 | 显示 logger 名称。如果名称短于 20 个字符，则在右侧填充空格以保持左对齐。如果名称长于 30 个字符，则从开头截断。\
  \ |\n\n为了说明转换模式的能力，让我们尝试使用 `LayoutDemo.java`（清单 6-1）并向其传递以下配置文件。该配置将指定 `PatternLayout`\
  \ 作为与 `ConsoleAppender` 一起使用的 `Layout` 对象，并且我们将向 `PatternLayout` 传递一个适当的转换模式。\n\n\
  ```\n#配置自定义 logger\nlog4j.logger.com.apress.logging.log4j=DEBUG, CONSOLE\n\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\n\
  \nlog4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout\nlog4j.appender.CONSOLE.layout.ConversionPattern=%d{yyyy-MM-dd}-%t-%x-%-5p-%-\n\
  10c:%m%n\n```\n\n使用此配置文件执行程序将向控制台产生以下输出：\n\n```\n2002-10-20-main-22.0-INFO -com.apress.logging.log4j:The\
  \ sqrt value:\n4.69041575982343\n2002-10-20-main-44.0-INFO -com.apress.logging.log4j:The\
  \ sqrt value:\n6.6332495807108\n```\n\n既然你已经理解了转换模式，你应该能够看出转换模式 `%r [%t] %p %c %x\
  \ - %m%n` 实际上就是 `TTCCLayout`。\n\n## 结论\n\n在本章中，我们详细讨论了每个 `Layout` 对象的行为方式，以及如何通过配置文件配置这些对象。log4j\
  \ API 提供了一套全面的 `Layout` 对象，足以满足大多数应用程序的需求。如果你的应用程序需要更复杂的 `Layout` 对象，则需要自己创建一个。我们将在第\
  \ 8 章中了解如何编写一个新的 `Layout` 对象。在下一章中，我们将继续讨论 log4j，探讨如何在分布式计算领域交付日志信息。\n\n# 第 7 章：使用\
  \ log4j 进行高级日志记录\n\n\n\n## 概述\n\n本章专门介绍使用 log4j API 进行日志记录的高级主题。将日志信息写入控制台或文件在灵活性和可重用性方面存在局限。打印到控制台的日志信息相当短暂，一旦应用程序退出当前运行实例，这些信息很可能会消失。因此，基于控制台的日志信息更适合开发阶段的调试消息。\n\
  \n另一方面，将日志信息打印到系统本地文件效率低下，因为其他可能使用相同日志信息的应用程序很难访问它。要使这些信息对其他应用程序模块可访问，将需要额外的工作。\n\
  \n尽管日志记录的一个重要方面是支持应用程序模块的远程调试和套接字管理，但使日志数据可被远程应用程序模块访问也同样重要。有时，日志数据的性质是敏感的，可能需要在数据库中维护日志信息的历史记录。在其他场景中，当我们想要实时处理任何敏感的日志数据时，我们可能希望通过\
  \ TCP/IP 套接字将数据发布到另一个准备响应发送给它的信息的服务器组件。此外，我们可能需要维护一个订单处理系统，其中某些特定于客户的日志信息会通过电子邮件发送给相应的客户。这些只是我们可能希望用日志信息实现的众多可能性中的一小部分。\n\
  \n可以说，在大多数正常的应用场景中，基于文件的日志记录就足够了。然而，在分布式计算场景中，可能会出现我们需要分布式日志记录功能的情况。在这种情况下，log4j\
  \ 的强大功能使我们能够充分利用其日志记录特性。\n\nlog4j API 通过提供不同的 `Appender` 对象来处理所讨论的许多情况。这个列表可能并不详尽，也可能无法满足不同应用程序可能出现的所有特定情况，但对于大多数常见的应用场景来说已经足够了。如果应用程序需要不同的功能，该\
  \ API 提供了灵活的设计，使我们能够在 API 中集成自定义对象，或扩展现有框架以满足应用程序的特定需求。\n\n在本章中，我们将讨论如何通过以下方式分发和存储日志数据：\n\
  \n*   将日志信息写入数据库\n*   使用 Java 消息服务 (JMS) 分发日志数据\n*   通过简单邮件传输协议 (SMTP) 分发日志数据\n\
  *   通过 TCP/IP 套接字发送日志数据\n*   使用 Telnet 协议将日志数据上传到远程机器\n*   将日志数据存储在特定于操作系统的事件日志中\n\
  \n在接下来的几节中，我们将逐一讨论 log4j API 中提供的不同 `Appender` 对象，以及它们如何完成管理和分发日志数据的任务。\n\n## 一个高级日志记录示例应用\n\
  \n我们将首先创建一个简单的程序，在本章中我们将使用它来演示不同高级 `Appender` 对象的功能。该程序获取一个命名的日志记录器实例 `com.apress.logging.log4j`。`deposit()`\
  \ 和 `withdraw()` 方法分别向账户存入和取出一些金额。存入的金额会加到余额中。`withdraw()` 方法仅在资金充足时才允许取款，然后从当前余额中扣除取出的金额。如果余额不足，该程序将向用户打印一条消息。\n\
  \n该应用程序为这两个方法记录活动，并使用用户名作为 `NDC` 信息。该应用程序还记录每个操作的成功和失败。清单 7-1 `AdvancedLogging.java`\
  \ 是所描述业务过程的一个示例实现。\n\n清单 7-1: AdvancedLogging.java\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.Logger;\n\
  import org.apache.log4j.NDC;\npublic class AdvancedLogging\n{\n    private static\
  \ Logger logger =\nLogger.getLogger(AdvancedLogging.class.getPackage().getName());\n\
  \    private String userName = null;\n    private double balance;\n\n    /** 创建\
  \ AdvancedLogging 的一个新实例 */\n    public AdvancedLogging(String user)\n    {\n  \
  \      this.userName = user;\n    }\n    /**\n     *存入一些金额\n     */\n    public\
  \ void deposit(double amount)\n    {\n        NDC.push(userName);\n        balance\
  \ += amount;\n        logger.info(\"存入 \"+amount+\" 新余额: \"+balance);\n        NDC.pop();\n\
  \    }\n    /**\n     *取出一些金额\n     */\n    public void withdraw(double amount)\n\
  \    {\n        NDC.push(userName);\n        if(balance>=amount)\n        {\n  \
  \          balance -= amount;\n            logger.info(\"取出 \"+amount+\" 新余额: \"\
  +balance);\n        }else\n        {\n            System.out.println(\"余额不足\");\n\
  \            logger.error(\"取款失败: 余额: \"+balance+\" 尝试取款: \"+amount);\n        }\n\
  \        NDC.pop();\n    }\n    public static void main(String args[])\n    {\n\
  \        AdvancedLogging demo = new AdvancedLogging(\"sam\");\n        demo.depositBalance(100.50);\n\
  \        demo.withDraw(80);\n        demo.withDraw(50);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n\n\n## 使用 JDBCAppender 将日志记录到数据库\n\n将所需的日志数据存储在数据库中通常是一种良好的实践。这有两个目的：第一，数据得以持久化；第二，位于被记录日志的应用程序域之外的其他应用程序可以访问和分析这些数据。\n\
  \nlog4j API 提供了 `org.apache.log4j.jdbc.JDBCAppender` 对象，它能够将日志信息放入指定的数据库。它执行一些简单的任务，例如通过读取传递给它的\
  \ JDBC 连接参数来打开数据库连接，按照指定的 SQL 语句将数据写入一个或多个表，然后关闭连接。我们可以扩展 `JDBCAppender` 对象的功能以满足我们的需求。目前，`JDBCAppender`\
  \ 按以下方式运行：\n\n*   它具有缓冲实现。传递给它的日志事件存储在一个预定义大小的缓冲区中。一旦达到缓冲区的最大大小，缓冲区就会被刷新，并按照指定的\
  \ SQL 语句将数据写入表中。\n\n*   它会打开一个到数据库的单一连接，并保持该连接直到 appender 被关闭。\n\n*   由于针对特定记录的\
  \ SQL 操作可以是 INSERT、UPDATE 或 DELETE，`JDBCAppender` 巧妙地使用了 `java.sql.Statement` 对象的\
  \ `executeUpdate()` 方法。这提供了执行任何类型 SQL 语句的灵活性。是否插入、更新或删除特定日志记录的决定由应用程序开发者决定，并通过配置文件中的\
  \ SQL 语句指定。`JDBCAppender` 不会对 SQL 语句的性质做出任何决定。它仅仅执行传递给它的 SQL 语句。\n\n*   尽管 `JDBCAppender`\
  \ 不决定要执行的 SQL 语句的性质，但它负责维护正在记录的日志事件的完整性。`JDBCAppender` 中的方法不是 `synchronized` 的，以保持其性能不受影响。这可能会产生数据完整性问题。在缓冲区中的所有元素被写入数据库之前，可能会有另一个日志请求到达。缓冲区会追加新的日志事件。`JDBCAppender`\
  \ 识别到缓冲区中的这个新数据后，会再次尝试遍历缓冲区，将其中的所有元素写入数据库。这可能导致尝试在数据库中写入重复数据，这必然会导致数据库错误。\n\n* \
  \  为了避免刚才提到的问题，在缓冲区的每个元素被写入数据库后，`JDBCAppender` 会将其存储在一个二级缓冲区中。最后，它会比较主缓冲区与二级缓冲区中的元素，并从主缓冲区中移除所有存在于二级缓冲区中的元素。这确保了主缓冲区中不会保留重复的元素。\n\
  \n*   `JDBCAppender` 提供了一个 `close()` 方法来释放任何获取到的数据库资源。理论上，`close()` 方法可以在应用程序生命周期的任何时候被调用。此外，当应用程序通过调用\
  \ `LogManager.shutdown()` 方法终止时，系统中所有活跃的 appender 的 `close()` 方法都会被调用。如果在 `JDBCAppender`\
  \ 实例完成其写入操作之前调用了 `close()` 方法，这可能会导致数据丢失。为了确保数据不丢失，`JDBCAppender` 中的 `close()` 方法会刷新主缓冲区，以确保缓冲区中已有的数据被写入数据库。\n\
  \n### 配置 JDBCAppender\n\n在我们进入 `JDBCAppender` 的实际示例之前，首先理解如何配置 `JDBCAppender` 对象非常重要。`JDBCAppender`\
  \ 具有 表 7-1 中列出的可配置 bean 属性。\n\n表 7-1：JDBCAppender 类中的 Bean 属性\n\n| Bean 属性 | 方法\
  \ | 描述 | 默认值 |\n| --- | --- | --- | --- |\n| `bufferSize` | `setBufferSize(int)`\
  \ | 设置缓冲区大小 | 默认大小为 1。 |\n| `driver` | `setDriver(String)` | 将驱动程序类设置为指定的字符串 | 如果未指定驱动程序类，则默认为\
  \ \"sun.jdbc.odbc.JdbcOdbcDriver\"。 |\n| `layout` | `setLayout(String)` | 设置要使用的布局\
  \ | 默认为 `org.apache.log4j.PatternLayout`。 |\n| `password` | `setPassword(String)`\
  \ | 根据指定的用户名设置密码以获取数据库连接 | 用户必须指定一个有效的密码才能访问数据库。 |\n| `URL` | `setURL(String)` |\
  \ 设置 JDBC URL | 默认为某个任意值。用户必须指定一个正确的 JDBC URL。 |\n| `user` | `setUser(String)` |\
  \ 设置用于获取指定数据库连接的用户名 | 用户必须指定一个有效的用户名才能访问数据库。 |\n\n### 创建用于存储日志信息的表\n\n清单 7-2 描述了用于创建名为\
  \ LOGGING_DATA 的表以存储日志信息的 SQL 语句。\n\n清单 7-2：创建 LOGGING_DATA 表的 SQL\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nCREATE TABLE LOGGING_DATA\n(\"USER_ID\" VARCHAR2(10) NOT NULL,\n\"DATE\"\
  \ VARCHAR2(10) NOT NULL,\n\"LOGGER\" VARCHAR2(50) NOT NULL,\n\"LEVEL\" VARCHAR2(10)\
  \ NOT NULL,\n\"MESSAGE\" VARCHAR2(1000) NOT NULL)\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n### 与 JDBCAppender 配合使用的配置文件\n\n清单 7-3 \"jdbc.properties\" 描述了我们将用于将消息记录到数据库表的配置文件。\n\
  \n清单 7-3：jdbc.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\n#配置自定义日志记录器\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
  \ DB\n\nlog4j.appender.DB=org.apache.log4j.jdbc.JDBCAppender\nlog4j.appender.DB.URL=jdbc:odbc:dbdef\n\
  log4j.appender.DB.user=system\nlog4j.appender.DB.password=manager\nlog4j.appender.DB.sql=INSERT\
  \ INTO LOGGING_DATA VALUES('%x','%d{yyyy-MM-\ndd}','%C','%p','%m')\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n在配置文件中，我们为名为 `com.apress.logging.log4j` 的日志记录器分配了 DEBUG 级别和一个 `JDBCAppender`。`JDBCAppender`\
  \ 对象被赋予以下配置参数：\n\n*   要连接的数据库 URL 是 `jdbc:odbc:dbdef`，其中 `dbdef` 是我们正在连接的数据库名称。\n\
  \n*   连接数据库的用户 ID 是 `system`，密码是 `manager`。\n\n*   要执行的 SQL 是一个 INSERT 语句，表名为 LOGGING_DATA，以及要插入表中的值。请注意，这些值是按照\
  \ `PatternLayout` 指定的（有关 `PatternLayout` 对象的详细信息，请参阅上一章）。指定的值遵循与表列相同的顺序，并插入 `NDC`、日志日期、日志记录器的完全限定名称、日志级别，最后是日志消息本身。\n\
  \n使用 \"jdbc.properties\" 文件作为配置文件执行此程序会将数据写入数据库。图 7-1 展示了存储在 LOGGING_DATA 表中的数据的\
  \ HTML 报告。\n\n![点击展开](img/fig7-1_0.jpg)\n图 7-1：LOGGING_DATA 表\n\n也许您已经注意到，无需进行任何\
  \ JDBC 编程即可将数据写入数据库。这一切都在 `JDBCAppender` 内部完成。此外，请注意，此示例展示了 log4j 的强大功能，即只需更改传递给它的配置文件即可更改日志信息的目标位置，而无需更改任何代码。\n\
  \n\n\n### 扩展 JDBCAppender\n\n`JDBCAppender` 足以执行简单的 SQL 操作。它从配置文件中读取 SQL 查询和其他与\
  \ JDBC 相关的参数，并执行 SQL 操作。SQL 优化的一个关键因素是能够执行动态 SQL 查询。在 Java 语言中，动态 SQL 通过 `java.sql.PreparedStatement\
  \ interface` 类型的对象来处理。如果你熟悉 JDBC 编程，就会知道如何使用 `PreparedStatement` 对象。`JDBCAppender`\
  \ 本身并*不*使用 `PreparedStatement` 对象来处理与数据库相关的操作。\n\n可以通过创建 `JDBCAppender` 的子类来扩展其功能。我们将看一个自定义\
  \ `JDBCAppender` 的示例，使其能够灵活地与 `PreparedStatement` 对象一起工作。除了 `JDBCAppender` 标准配置参数外，我们将在初始化时接受以下配置参数：\n\
  \n*   `sqlString`：表示动态 SQL 结构的 SQL 字符串。这与 JDBC 中 `PreparedStatement` 对象使用的结构类似。\n\
  \n*   `values`：构建 `PreparedStatement` 对象后，我们需要为不同的列设置值。这些值将以 `PatternLayout` 结构的形式包含日志信息的不同方面。例如，`%p-%m`\
  \ 将被转换为 LEVEL-MESSAGE 格式的字符串。\n\n|  | 注意 | 在接下来的示例中，我们将重用清单 7-2 中描述的数据库表 LOGGING_DATA。\
  \ |\n\n现在，我们将编写一个执行 JDBC 操作的自定义 `Appender` 对象示例。启动时，此 `Appender` 对象将通过传递给 log4j\
  \ 运行时的配置文件中指定的 bean 属性值进行初始化。`CustomJDBCAppender` 对象从其基类 `JDBCAppender` 继承所有属性和一些方法。具体来说，它仅覆盖了\
  \ `JDBCAppender` 类中的以下方法：\n\n*   `execute(String sql)`：重写此方法以使用 `PreparedStatement`\
  \ 对象。\n\n*   `doAppend(LoggingEvent event)`：重写此方法以执行正常的 appender 活动。\n\n`CustomJDBCAppender`\
  \ 提供了自己的方法来设置和检索其特定的 bean 属性。这里需要注意的一点是，我们使用 `PatternLayout` 来转换日志信息，并且需要告诉 `PatternLayout`\
  \ 要处理的模式。在此上下文中，我们希望通过 `PatternLayout` 转换通过 `CustomJDBCAppender` 的 `values` bean\
  \ 属性传递的信息。因此，在 `setValues()` 方法中，我们使用 `values` bean 属性中包含的信息创建一个 `PatternLayout`。最后，我们将创建的\
  \ `PatternLayout` 对象设置为 `CustomJDBCAppender` 的布局。\n\n重写的 `execute()` 方法执行以下工作：\n\
  \n1.  它通过调用 `CustomJDBCAppender` 的 `private` 方法 `getPreparedStatement()` 来获取 `PreparedStatement`\
  \ 对象的实例。\n\n2.  然后，此方法将格式化的日志信息进行分词，每个分词代表表中每一列的值。\n\n3.  值的提供顺序必须与表列的顺序相同。这个条件可能不理想，但有助于简化此示例。\n\
  \n4.  然后，它使用 `PreparedStatement` 对象的 `setString(int, Object)` 方法为每一列设置值。同样，这段代码假设表中的所有列都是\
  \ VARCHAR 类型，这对于我们在此示例中使用的表来说是成立的。但在现实中，列类型可以是任何类型，程序需要能够处理这种情况。\n\n5.  最后，通过调用\
  \ `PreparedStatement` 的 `executeUpdate()` 方法来执行 SQL 操作。\n\n清单 7-4 `CustomJDBCAppender.java`\
  \ 是一个自定义 `JDBCAppender` 的实现示例。\n\n清单 7-4：CustomJDBCAppender.java\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\npackage com.apress.logging.log4j.appender;\n\nimport org.apache.log4j.jdbc.JDBCAppender;\n\
  import java.sql.PreparedStatement;\nimport java.sql.Connection;\nimport java.sql.SQLException;\n\
  import org.apache.log4j.spi.LoggingEvent;\nimport org.apache.log4j.PatternLayout;\n\
  import java.util.StringTokenizer;\n\npublic class CustomJDBCAppender extends JDBCAppender\
  \ {\n\n/** 保存属性 values 的值。 */\n    private String values;\n\n/** prepared statement\
  \ 对象 **/\n    private PreparedStatement stmt = null;\n\n/** 保存属性 preparedSQL 的值。\
  \ */\n    private String preparedSQL;\n\n/** 创建 CustomJDBCAppender 的新实例 */\n   \
  \ public CustomJDBCAppender() {\n    }\n\npublic void doAppend(LoggingEvent event)\
  \ {\n        buffer.add(event);\n        if(buffer.size()>=bufferSize) {\n     \
  \     flushBuffer();\n        }\n    }\n\n/**\n     * 从 JDBCAppender 重写的方法。此方法在执行语句之前\n\
  \     * 设置 prepared statement 的参数\n     **/\n    public void execute(String sql)\
  \ throws SQLException {\n        PreparedStatement stmt = getPreparedStatement();\n\
  \        StringTokenizer tokenizer = new StringTokenizer(sql, \",\");\n        int\
  \ i=1;\n        while(tokenizer.hasMoreTokens()) {\n            String token = tokenizer.nextToken();\n\
  \            stmt.setString(i, token);\n            i++;\n        }\n        stmt.executeUpdate();\n\
  \n}\n\n/**\n     * 此方法获取 prepared statement 对象\n     **/\n    private PreparedStatement\
  \ getPreparedStatement() throws SQLException {\n        // 重用父类中的 getConnection()\
  \ 方法\n        Connection conn = getConnection();\n        if(stmt==null) {\n   \
  \         stmt = conn.prepareStatement(getPreparedSQL());\n        }\n        return\
  \ stmt;\n    }\n\n/** 属性 values 的 getter 方法。\n     * @return 属性 values 的值。\n   \
  \  */\n    public String getValues() {\n        return this.values;\n    }\n\n/**\
  \ 属性 values 的 setter 方法。\n     * @param values 属性 values 的新值。\n     */\n    public\
  \ void setValues(String values) {\n        PatternLayout layout = new PatternLayout(values);\n\
  \        this.setLayout(layout);\n        this.values = values;\n    }\n\n/** 属性\
  \ preparedSQL 的 getter 方法。\n     * @return 属性 preparedSQL 的值。\n     */\n    public\
  \ String getPreparedSQL() {\n        return this.preparedSQL;\n    }\n\n/** 属性 preparedSQL\
  \ 的 setter 方法。\n     * @param preparedSQL 属性 preparedSQL 的新值。\n     */\n    public\
  \ void setPreparedSQL(String preparedSQL) {\n        this.preparedSQL = preparedSQL;\n\
  \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 7-5 `customjdbc.properties`\
  \ 描述了此示例的配置文件。请注意，除了 `JDBCAppender` 使用的 bean 属性外，它还定义了 `CustomJDBCAppender` 使用的自定义\
  \ bean 属性。\n\n清单 7-5：customjdbc.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
  #配置自定义日志记录器\nlog4j.logger.com.apress.logging.log4j=DEBUG, DB\n\n#log4j.appender.DB=org.apache.log4j.jdbc.JDBCAppender\n\
  log4j.appender.DB=com.apress.logging.log4j.appender.CustomJDBCAppender\n\n#配置自定义\
  \ jdbc appender\nlog4j.appender.DB.URL=jdbc:odbc:dbdef\nlog4j.appender.DB.user=system\n\
  log4j.appender.DB.password=manager\nlog4j.appender.DB.preparedSQL=INSERT INTO LOGGING_DATA\
  \ VALUES(?,?,?,?,?)\nlog4j.appender.DB.values=%x,%d{yyyy-MM-dd},%c,%p,%m\nlog4j.appender.DB.bufferSize=3\n\
  ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n使用 `customjdbc.properties` 配置文件执行此程序将导致数据照常插入到数据库中。唯一的区别是程序现在使用了带有\
  \ `PreparedStatement` 对象的动态 SQL。图 7-2 展示了 LOGGING_DATA 表中的结果数据。\n\n![点击展开](img/fig7-2_0.jpg)\n\
  图 7-2：通过 CustomJDBCAppender 存储在 LOGGING_DATA 表中的数据\n\n\n\n|  | 注意 | 使用默认的 `JDBCAppender`\
  \ 和 `CustomJDBCAppender` 对象存储的日志信息是相同的。前述示例（清单 7-1 和清单 7-4）的区别在于 SQL 语句的执行方式。使用\
  \ `CustomJDBCAppender` 时，SQL 语句会被预编译一次，并存储在数据库中以便复用。然而，使用普通的 `JDBCAppender` 对象时，SQL\
  \ 语句每次都会被预编译。使用 `CustomJDBCAppender` 的主要优势在于，通过引入 `PreparedStatement` 对象来执行动态 SQL，从而提升性能。\
  \ |\n\n最后，您可以看到，这个示例只是 `JDBCAppender` 所能实现功能的简化版本。在数据库相关编程中，最关键的问题之一是连接池。如今大多数 Java\
  \ 程序员都熟悉连接池，并且可能自己实现过一两个。与其一起逐步讲解如何使用 `JDBCAppender` 实现连接池的示例，不如将其作为练习留给您自行实现，以巩固您目前学到的关于\
  \ log4j 的知识。\n\n## 使用 JMSAppender 实现基于 JMS 的日志记录\n\n在上一章中，我们讨论了将日志信息写入应用程序运行所在本地机器的\
  \ `Appender` 对象。这些 `Appender` 对象大多是*同步*的。上一节提到 `JDBCAppender` 具有缓冲实现，这意味着调用方应用程序在将日志事件提交给\
  \ `JDBCAppender` 后即可收回控制权，无需等待实际写入数据库的操作完成。\n\n但在现实世界中，我们可能希望实现完全的*异步*日志记录活动——也就是说，日志记录应用程序可以发送一条日志消息，然后完全不再关心它。接收方应用程序可以在稍后时间拾取该日志消息，并在其自己的时间内处理该消息。这正是面向消息的软件的核心所在。Apache\
  \ log4j 利用这一消息传递概念，结合 Java 消息服务（JMS）来实现面向消息的日志记录。\n\n对于基于文件的日志记录等本地化日志记录概念，日志信息分散在单个应用程序组件所在的各个位置。当我们希望从各种分布式组件收集日志信息并集中存储时，基于\
  \ JMS 的日志记录就变得非常有用。\n\n### 什么是 JMS？\n\n由于对 JMS 的详细讨论超出了本书的范围，我们只讨论 log4j 如何融入 JMS\
  \ 范式。JMS 允许应用程序开发人员创建、发送、接收和读取消息。从这个意义上说，JMS 或任何消息传递 API 的重要特性如下：\n\n*   **异步：**\
  \ 发送消息的应用程序模块和接收消息的应用程序模块可以彼此独立运行，无需了解对方的可用接口。发送方和接收方应用程序无需同时启动并运行。\n\n*   **可靠：**\
  \ JMS 确保消息只发送一次且仅一次。\n\n面向消息的 JMS 实现在消息发布方式、消息消费方式以及发送方和接收方之间的时间依赖性方面可能有所不同。在接下来的两节中，我们将探讨\
  \ JMS 实现的两种最流行的消息传递域。\n\n#### 点对点消息传递\n\n点对点消息传递围绕消息、队列、发送者和接收者这些概念构建。它具有以下特性：\n\
  \n*   发送者将消息发送到队列。\n*   队列保留消息，直到它们被消费。\n*   队列中的每条消息有且仅有一个消费者（接收者）。\n*   发送者和接收者之间没有时间依赖性。即使接收者在消息发送时未运行，它也可以获取消息。\n\
  *   接收者或消费者确认收到消息。\n\n#### 发布-订阅消息传递\n\n发布-订阅消息传递围绕消息、主题、发布者和订阅者这些概念展开。它具有以下特性：\n\
  \n*   发送者将消息发布到一个主题。\n*   每条消息可以有零个或多个订阅者。\n*   系统负责将消息分发给订阅者。\n*   发布者和订阅者之间存在时间依赖性。订阅者只有在消息发布到主题时处于启动并运行状态，才能订阅该消息。\n\
  *   主题仅在将消息分发给订阅同一主题的订阅者所需的时间内保留消息。\n\n### JMS 与 log4j\n\nApache log4j 提供了 `org.apache.log4j.net.JMSAppender`\
  \ 对象来执行基于 JMS 的日志记录活动。`JMSAppender` 使用发布-订阅消息传递域将日志事件相关消息发送到指定的主题。任何对发布到指定主题的日志事件感兴趣的应用程序都必须订阅同一主题，并监听到达的消息以进行处理。\n\
  \n要连接到 JMS 主题，`JMSAppender` 对象必须执行以下步骤：\n\n*   它必须获取到 JMS 提供者的连接。\n*   它必须订阅目标主题。\n\
  *   成功获取到提供者和主题的连接后，它需要创建一个会话来与提供者和主题进行交互。\n\nJMS 提供者自行管理 `Connection` 和 `Topic`\
  \ 对象，而不是由应用程序控制它们。这些被称为“受管对象”。由于不同的提供者以不同的方式管理 `Connection` 和其他核心对象，因此最好由提供者自身来管理这些对象。应用程序模块通过可移植接口访问这些对象，并且不受提供者底层技术的影响。\n\
  \n每当应用程序需要引用受管对象时，它通过检索 `JNDIContext` 对象来实现。`JNDIContext` 对象的检索方式同样因提供者而异。为了说明这一点，让我们看两个场景：使用默认的\
  \ J2EE 提供者和 BEA WebLogic 应用服务器。\n\n#### 使用 J2EE 的 JNDIContext\n\nJ2EE 环境提供了一个默认的\
  \ \"jndi.properties\" 文件，其中包含检索 JNDI 上下文所需的所有信息。如果您使用的是 J2EE 轻量级应用服务器，则需要使用以下命令来获取\
  \ JNDI 上下文：\n\n```\nInitialContext jndiContext = new InitialContext();\n```\n\n\
  使用无参构造函数将使用在所使用的任何 JMS API 本地的 \"jndi.properties\" 文件中指定的默认属性来初始化上下文。对于其他 JMS 提供者，您需要传递多个其他配置参数才能获取初始上下文。\n\
  \n|  | 注意 | 对于 J2SDKEE 1.3.1，\"jndi.properties\" 文件捆绑在 \"j2ee.jar\" 中。 |\n\n####\
  \ 使用 WebLogic 的 JNDIContext\n\n正如我们在前几节中讨论的，`Connection` 和 `Topic` 等受管对象的底层技术因供应商而异。因此，为了从提供者获取初始\
  \ JNDI 上下文，我们需要向其传递不同的配置属性。例如，要从 WebLogic 获取初始上下文，我们将使用以下代码：\n\n```\nProperties\
  \ env = new Properties( );\nenv.put(Context.INITIAL_CONTEXT_FACTORY,\"weblogic.jndi.WLInitialContextFactory);\n\
  env.put(Context.PROVIDER_URL, \"t3://localhost:7001\");\nInitialContext jndiContext\
  \ = new InitialContext(env);\n```\n\n其他 JMS 提供者（如 JBoss）将需要向其传递不同的配置参数。\n\n\n\n\
  #### 配置 JMSAppender\n\n`JMSAppender` 通过可配置的 Bean 属性收集所有必要参数，以获取 JMS 连接，这些属性如表 7-2\
  \ 所示。\n\n表 7-2：JMSAppender 中的可配置 Bean 属性\n\n| Bean 属性 | 方法 | 描述 | 默认值 |\n| --- |\
  \ --- | --- | --- |\n| `initialContextFactoryName` | `setInitialContextFactoryName\
  \ (String)` | 设置初始上下文工厂名称 | 无 |\n| `locationInfo` | `setLocationInfo(Boolean)` |\
  \ 若为 true，则包含调用者的位置信息 | false |\n| `password` | `setPassword(String)` | 设置使用 JMS\
  \ 连接的密码 | 无 |\n| `providerURL` | `setProviderURL(String)` | 指定提供者的 URL（不同提供者各不相同）\
  \ | 无 |\n| `securityCredentials` | `setSecurityCredentials(String)` | 设置少数 JMS 提供者所需的安全凭证属性\
  \ | 无 |\n| `securityPrincipalName` | `setSecurityPrincipalName (String)` | 设置特定提供者的安全主体名称\
  \ | 无 |\n| `topicBindingName` | `setTopicBindingName(String)` | 设置要连接的 Topic 名称\
  \ | 无 |\n| `topicConnectionFactory-BindingName` | `setTopicConnectionFactory-BindingName(String)`\
  \ | 设置用于获取 Topic 连接的连接工厂对象名称 | 无 |\n| `URLPkgPrefixes` | `setURLPkgPrefixes(String)`\
  \ | 设置包前缀属性 | 无 |\n| `userName` | `setUserName(String)` | 设置用于获取提供者连接的用户名 | 无 |\n\
  \n并非所有配置参数都是我们可能使用的每个 JMS 提供者所必需的。`JMSAppender` 力求满足市场上大量 JMS 提供者的需求。\n\n\n\n###\
  \ 使用 JMSAppender 的示例\n\n为了演示 `JMSAppender` 的工作方式，我们复用清单 7-1 中的示例。要将日志信息定向到 JMS 目的地，我们只需更改传递给\
  \ log4j 运行时的配置文件。清单 7-6 \"jms.properties\" 展示了我们将用于配置 `JMSAppender` 的示例配置文件。\n\n\
  清单 7-6: jms.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\n#配置自定义日志记录器\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
  \ JMS\n\n#配置 JMS 附加器\nlog4j.appender.JMS=org.apache.log4j.net.JMSAppender\nlog4j.appender.JMS.topicConnectionFactoryBindingName=TopicConnectionFactory\n\
  log4j.appender.JMS.topicBindingName=loggingTopic\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n在此示例中，我们使用由 J2EE 1.3.1 实现的 JMS 提供程序。为了与 J2EE 配合使用，`JMSAppender` 对象只需通过以下代码行创建一个默认的\
  \ `JNDIContext` 对象：\n\n```\nInitialContext jndiContext = new InitialContext();\n\
  ```\n\n这就是我们无需将其他配置信息传递给 `JMSAppender` 的原因。我们传递给 `JMSAppender` 的唯一配置项是 `topicConnectionFactoryBindingName`\
  \ 和 `topicBindingName`。请注意，我们使用的主题名称是 `loggingTopic`。\n\n通过这种最小配置，我们就能在示例应用程序中使用\
  \ `JMSAppender`。我们还需要一个订阅者应用程序，用于读取发布到名为 `loggingTopic` 的主题中的消息。我们将创建一个 JMS 示例程序，该程序监听名为\
  \ `loggingTopic` 的主题，并将相关信息打印到控制台。它执行以下步骤来订阅指定的 JMS 主题，然后读取发送到该主题的消息：\n\n1.  程序首先获取一个初始的\
  \ JNDI 上下文。\n\n2.  它创建一个名为 `TopicConnectionFactory` 的连接工厂对象。\n\n3.  然后，程序使用在启动时通过命令行传递的主题名称，并创建一个主题对象。\n\
  \n4.  它获取到该主题的连接，并以 `AUTO_ACKNOWLEDGE` 模式打开一个会话。这意味着订阅者将自动确认收到消息。一旦发送此确认，主题将不再保留该消息。\n\
  \n5.  程序订阅该主题。\n\n6.  一个自定义的消息监听器对象 `LogMessageListener` 被附加到使用主题会话创建的订阅者对象上。\n\n\
  7.  订阅者现在已准备好监听该主题的任何消息。\n\n清单 7-7 `JMSLogSubscriber.java` 是一个 JMS 订阅者的示例实现。\n\n\
  清单 7-7: JMSLogSubscriber.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\
  \nimport javax.jms.*;\nimport javax.naming.*;\n\npublic class JMSLogSubscriber {\n\
  \n    /** 创建 JMSLogSubscriber 的新实例 */\n    public JMSLogSubscriber() {\n    }\n\n\
  \    public static void main(String args[]) {\n        Context ctx;\n        Topic\
  \ topic;\n        TopicSubscriber topicSubscriber;\n        TextMessage message;\n\
  \        TopicConnectionFactory topicFactory;\n        TopicConnection topicConnection;\n\
  \        TopicSession topicSession;\n        //从命令行收集主题名称\n        String topicName\
  \ = args[0];\n        try {\n            //创建默认的 J2EE 初始上下文\n            ctx = new\
  \ InitialContext();\n            //获取主题连接工厂\n            topicFactory =\n(TopicConnectionFactory)ctx.lookup(\"\
  TopicConnectionFactory\");\n            //创建主题\n            topic = (Topic)ctx.lookup(topicName);\n\
  \            //打开一个主题连接\n            topicConnection = topicFactory.createTopicConnection();\n\
  \            //创建一个会话以自动确认收到消息\n            topicSession = topicConnection.createTopicSession(false,\n\
  \            Session.AUTO_ACKNOWLEDGE);\n            //订阅主题\n            topicSubscriber\
  \ = topicSession.createSubscriber(topic);\n            //自定义监听器，用于监听主题的任何消息并进行处理\n\
  \            LogMessageListener listener = new LogMessageListener();\n         \
  \   //将监听器添加到此订阅者\n            topicSubscriber.setMessageListener(listener);\n \
  \           //启动会话\n            topicConnection.start();\n        }catch(Exception\
  \ e) {\n            System.out.println(e.toString());\n        }\n    }\n}\n```\n\
  \n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n该程序使用一个自定义监听器对象来监听主题的任何消息。还有一种替代技术。订阅者可以调用\
  \ `receive()` 方法从主题获取任何消息。然而，这是一种*同步*的接收和处理消息模式。`receive()` 方法显式地从主题获取消息。此方法可能会阻塞直到消息到达，或者如果在指定时间限制内没有消息到达则会超时。通过将\
  \ `MessageListener` 对象附加到订阅者，订阅者可以*异步*接收消息。一旦消息到达，JMS 提供程序将通过调用其 `onMessage()` 方法来通知\
  \ `MessageListener`。\n\n清单 7-8 `LogMessageListener.java` 是一个用于监听主题的 `MessageListener`\
  \ 实现。它提供了 `onMessage()` 方法的实现。在 `onMessage()` 方法内部，它检查消息类型。`JMSAppender` 将 `LoggingEvent`\
  \ 对象作为 `ObjectMessage` 类型发布到主题。因此，`LogMessageListener` 检查 `ObjectMessage`，将其强制转换回\
  \ `LoggingEvent` 对象，并从 `LoggingEvent` 对象中获取所有信息。\n\n清单 7-8: LogMessageListener.java\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\nimport\
  \ javax.jms.*;\nimport org.apache.log4j.spi.LoggingEvent;\n\npublic class LogMessageListener\
  \ implements MessageListener{\n\n    /** 创建 LogMessageListener 的新实例 */\n    public\
  \ LogMessageListener() {\n    }\n\n    /**\n     * 此方法监听发送到订阅主题的任何消息，\n     * 检查类型是否正确\n\
  \     * 并打印内容。\n     ***/\n    public void onMessage(Message message) {\n      \
  \  TextMessage msg = null;\n        try {\n            if(message instanceof ObjectMessage){\n\
  \            System.out.println(\"收到消息: \");\n            ObjectMessage obj = (ObjectMessage)message;\n\
  \            LoggingEvent event = (LoggingEvent)obj.getObject();\n            System.out.println(\"\
  日志记录器名称:\n\"+event.getLoggerName());\n            System.out.println(\"消息:\n\"+event.getMessage().toString());\n\
  \        }else {\n\n            System.out.println(\"错误类型的消息: \" +\n           \
  \ message.getClass().getName());\n        }\n    } catch (JMSException e) {\n  \
  \      System.out.println(\"onMessage() 中的 JMSException: \" +\n        e.toString());\n\
  \        } catch (Throwable t) {\n            System.out.println(\"onMessage() 中的异常:\"\
  \ +\n            t.getMessage());\n        }\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n`LogMessageListener` 仅打印日志记录器名称和封装在 `LoggingEvent` 对象中的消息。可以说，它可以提取\
  \ `LoggingEvent` 对象中的所有信息，并以它想要的方式进行处理。此示例保持简单，以演示 JMS 如何与 log4j 协同工作。\n\n#### 执行基于\
  \ JMS 的日志记录示例\n\n要查看实际运行中的示例，我们需要按照接下来几节中介绍的步骤进行操作。\n\n\n\n##### 启动 J2EE JMS 提供者\n\
  \n首先，我们必须确保 `j2ee.jar` 已包含在类路径中。现在，使用以下命令启动 J2EE 应用服务器：\n\n```\nj2ee -verbose\n\
  ```\n\n|  | 注意 | 请记得设置 J2EE_HOME 环境变量，使其指向 j2ee 的安装位置。 |\n\n##### 创建主题\n\n接下来，我们创建一个名为\
  \ `loggingTopic` 的新主题，并使用以下命令将其添加到 JMS 目标中：\n\n```\nj2eeadmin --addJmsDestination\
  \ loggingTopic topic\n```\n\n##### 运行订阅者\n\n将主题添加到 JMS 目标后，我们使用以下命令启动 `JMSLogSubscriber`：\n\
  \n```\n java -Djms.properties=%J2EE_HOME%config/jms_client.properties\ncom.apress.logging.log4j.JMSLogSubscriber\
  \ loggingTopic\n```\n\n请注意，我们将主题名称 `loggingTopic` 作为命令行参数传递给程序。同时，我们通过 J2EE 自带的\
  \ `jms_client.properties` 文件向 J2EE 运行时提供 JMS 配置参数。\n\n##### 运行客户端\n\n现在，我们准备执行示例程序。我们将\
  \ `jms.properties` 文件作为 log4j 配置文件传递给运行时。同时，我们通过 J2EE 自带的 `jms_client.properties`\
  \ 文件向 J2EE 运行时提供 JMS 配置参数。\n\n```\njava -Dlog4j.configuration=jms.properties -\n\
  Djms.properties=%J2EE_HOME%config/jms_client.properties\ncom.apress.logging.log4j.AdvancedLogging\n\
  ```\n\n执行此程序会将所有日志信息发布到名为 `loggingTopic` 的主题。在订阅者控制台中，我们将看到以下消息到达：\n\n```\nMessage\
  \ received...\nMessage received:\nThe logger name: com.apress.logging.log4j\nThe\
  \ message: Deposited 100.5\nnew balance: 100.5 Message received...\nMessage received:\n\
  The logger name: com.apress.logging.log4j\nThe message: Withdrawn 80.0 new balance:\
  \ 20.5\nMessage received...\nMessage received:\nThe logger name: com.apress.logging.log4j\n\
  The message: Failed to withdraw: balance: 20.5 attempted withdraw: 50.0\n```\n\n\
  请注意，所有日志消息都会打印在控制台中，并且即使在日志消息传递到主题后，应用程序也不会终止。这是因为主题连接仅在 `JMSAppender` 的 `close()`\
  \ 方法中关闭。如果我们在完成后显式调用 `JMSAppender` 的 `close()` 方法或调用 `LogManager.shutdown()` 方法，主题连接将被关闭，控制台将被释放。\n\
  \n这就是你需要了解的关于 `JMSAppender` 的全部内容。如你所见，令人印象深刻的是，无需对应用程序进行任何代码更改即可轻松实现。只需一个不同的配置文件，我们就大功告成了！\n\
  \n|  | 注意 | 基于 JMS 的日志记录能确保将日志信息传递给接收者，但不保证时间顺序。传递给接收者的日志信息可能不是按时间顺序排列的。解决此问题的一种方法是为每个日志请求使用带有每个发送者时间戳的\
  \ `NDC` 信息。不过，具体采用哪种最佳方式来处理此问题，取决于你的特定情况。 |\n\n## 使用 SocketAppender\n\n当我们希望将日志信息从一台机器传输到另一台机器时，就构成了分布式日志记录场景。我们已经了解了\
  \ `JMSAppender` 在将分布式应用程序组件的日志信息传递到中心位置方面非常有用。也可以使用基于 TCP/IP 的原始套接字连接将日志信息从一个位置传递到另一个位置。\n\
  \n在选择使用基于 JMS 还是基于套接字的机制来将日志信息从一台机器传输到另一台机器时，可能会有些棘手。尽管任何分布式架构的底层实现都是基于 TCP/IP 的，但区别在于它们的运行方式。选择基于\
  \ JMS 还是原始套接字的通信方式来传输日志信息，或多或少取决于应用程序本身的架构。当你在决定是使用基于 JMS 还是基于套接字的日志记录时，以下几点可能会对你有所帮助：\n\
  \n*   当应用程序采用分布式架构时，应使用基于 JMS 的日志记录。请记住，支持客户端-服务器技术的应用程序不一定是分布式的。真正的分布式架构会拥有分布在多个不同位置的服务器端组件，供客户端使用。在这种情况下，基于\
  \ JMS 的日志记录更有效。\n\n*   在真正的分布式应用程序场景中，你总会有一个正在运行的应用服务器。基于 Java 的应用服务器通常都带有 JMS 支持。因此，如果你的应用程序使用了任何应用服务器（出于某些正当理由），请考虑使用基于\
  \ JMS 的日志记录。\n\n*   基于套接字的日志记录适用于普通的客户端-服务器场景，即许多客户端与同一个服务器组件通信。如果你作为应用程序的一部分需要编写服务器组件，那么使用基于套接字的日志记录可能会更容易。请记住，在不使用分布式计算的情况下采用基于\
  \ JMS 的解决方案，将需要额外部署一个 JMS 提供者的成本。\n\n*   在任何你想要实现异步日志记录机制的应用程序场景中，基于 JMS 的解决方案都是理想且易于实现的。如果你不需要异步机制，那么基于套接字的日志记录机制可能会优于\
  \ JMS，前提是满足前面讨论的其他条件。\n\n`org.apache.log4j.net.SocketAppender` 提供了一种通过 TCP/IP 将日志信息传输到远程服务器的方法。它基本上是将序列化后的\
  \ `LoggingEvent` 对象通过 TCP/IP 发送到远程日志服务器。`SocketAppender` 对象具有以下相关特性：\n\n*   远程日志记录是*非侵入式的*。时间戳、`NDC`\
  \ 信息和位置信息都会根据生成日志请求的客户端进行保留。\n\n*   `SocketAppender` 对象不使用任何 `Layout` 对象来格式化其数据。这是可以理解的，因为它以序列化形式将\
  \ `LoggingEvent` 对象传输到服务器端。\n\n*   日志事件由原生 TCP 实现自动缓冲。\n\n### 容错性\n\n`SocketAppender`\
  \ 的实现具有容错性。它可以处理或尝试解决不同的网络相关问题，例如链路断开或链路速度慢。通常，在出现故障时，`SocketAppender` 会尝试执行以下操作：\n\
  \n*   如果服务器可达，日志事件最终会到达服务器。\n\n*   如果远程服务器宕机且不可达，日志事件将被丢弃。但一旦服务器恢复，日志记录活动就会透明地重新开始。这种透明连接是通过一个连接器线程实现的，该线程会定期尝试连接到远程服务器。\n\
  \n*   如果与服务器的连接速度较慢，但快于日志事件的生成速率，客户端将受益于原生 TCP/IP 缓冲实现，并且不会受到链路速度的影响。\n\n*   如果链路速度慢于日志事件的生成速率，客户端将受到影响，因为它只能以网络速度运行。\n\
  \n*   如果网络链路正常但服务器宕机，客户端不会被阻塞，但日志事件会因服务器不可用而丢失。\n\n*   如果网络链路断开但服务器仍在运行，客户端将被阻塞，直到超时（正常的\
  \ TCP/IP 超时）或网络链路恢复。\n\n*   `SocketAppender` 不会自动被垃圾回收。在退出应用程序之前，务必显式调用 `SocketAppender`\
  \ 的 `close()` 方法或 `LogManager.shutdown()` 方法，以确保 `SocketAppender` 被关闭。但是，如果在 `SocketAppender`\
  \ 能够正常关闭之前 JVM 就退出了，管道中可能存在未传输的数据，这些数据可能会丢失。\n\n\n\n### 配置 SocketAppender\n\n`SocketAppender`\
  \ 具有表 7-3 中列出的可配置 Bean 属性。\n\n表 7-3: SocketAppender 中的可配置 Bean 属性\n\n| Bean 属性 |\
  \ 方法 | 描述 | 默认值 |\n| --- | --- | --- | --- |\n| `locationInfo` | `setLocationInfo(boolean)`\
  \ | 将位置信息参数设置为 `true` 或 `false` | `false` |\n| `port` | `setPort(int)` | 设置要连接的端口号\
  \ | 4560 |\n| `reconnectionDelay` | `setReconnectionDelay(int)` | 连接器线程在服务器宕机后尝试重新连接服务器之前的等待毫秒数\
  \ | 30,000 毫秒 |\n| `remoteHost` | `setRemoteHost(String)` | 设置远程主机名 | 无 |\n\n###\
  \ SocketAppender 示例\n\n将日志事件数据写入远程服务器很容易——`SocketAppender` 会为我们完成这项工作。我们只需将主机名、端口等作为可配置\
  \ Bean 属性的一部分传递给它。在另一端，我们需要一个服务器程序，该程序能够接受由 `SocketAppender` 打开的套接字连接并处理传入的数据。代码清单\
  \ 7-9 `LoggingServer.java` 是一个示例服务器端程序，用于接受发送给它的数据。它监听任意端口 1000。在从套接字连接接收到数据后，它会将数据转换为约定的\
  \ `LoggingEvent` 对象，并从中提取所有数据。\n\n代码清单 7-9: LoggingServer.java\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\npackage com.apress.logging.log4j;\n\nimport java.net.ServerSocket;\n\
  import java.net.Socket;\nimport java.io.ObjectInputStream;\nimport java.io.BufferedInputStream;\n\
  \nimport org.apache.log4j.spi.LoggingEvent;\n\npublic class SocketServer implements\
  \ Runnable{\n\n    private String portNumber = null;\n    private ServerSocket serverSocket\
  \ = null;\n    private Socket socket = null;\n    private ObjectInputStream inStream\
  \ = null;\n    private LoggingEvent event = null;\n    /** Creates a new instance\
  \ of SocketServer */\n    public SocketServer(String portNumber) {\n        this.portNumber\
  \ = portNumber;\n        try {\n            //listen to the port specified\n   \
  \         serverSocket = new ServerSocket(Integer.parseInt(portNumber));\n     \
  \       socket = serverSocket.accept();\n            //creating a ObjectInputStream\
  \ from the socket input stream\n            inStream = new ObjectInputStream(new\n\
  \            BufferedInputStream(socket.getInputStream()));\n            new Thread(this).start();\n\
  \        }catch(Exception e) {\n            System.out.println(\"Error: \"+e.toString());\n\
  \        }\n    }\n    public void run() {\n        try {\n\n            while(true)\
  \ {\n\n                //cast back to the LoggingEvent object\n                event\
  \ = (LoggingEvent)inStream.readObject();\n                //print the message and\
  \ logger name in this logging event\n                System.out.println(\"THE LOGGER\
  \ NAME: \"+event.getLoggerName());\n                System.out.println(\"THE MESSAGE:\
  \ \"+event.getMessage().toString());\n            }\n        }catch(Exception e)\
  \ {\n            System.out.println(\"Error: here\"+e.toString());\n        }\n\
  \    }\n\n    public static void main(String args[]) {\n        String port = args[0];\n\
  \        new SocketServer(port);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\
  \n|  |\n\n请注意，`SocketServer` 是一个基于线程的程序，在 `run()` 方法中，它持续监听端口以接收任何传入的消息。一旦有消息到达，它就能打印出消息的内容。\n\
  \n代码清单 7-10 `socket.properties` 展示了从代码清单 7-1 中的示例程序发送日志信息所需的配置文件。\n\n代码清单 7-10:\
  \ socket.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\n#configuring the custom\
  \ logger\nlog4j.logger.com.apress.logging.log4j=DEBUG, SOCKET\n\n#configuring the\
  \ SOCKET appender\nlog4j.appender.SOCKET=org.apache.log4j.net.SocketAppender\nlog4j.appender.SOCKET.remoteHost=oemcomputer\n\
  log4j.appender.SOCKET.port=1000\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n\
  ### 运行 SocketAppender 示例程序\n\n要查看 `SocketAppender` 的实际运行效果，我们需要首先运行 `SocketServer`\
  \ 程序，并让它监听与 `socket.properties` 中指定的相同端口（即 1000）。确保 `SocketServer` 和 `SocketAppender`\
  \ 都使用同一个端口进行通信。本示例中的主机是一台名为 `oemcomputer` 的机器，`ServerSocket` 程序正在其上运行。\n\n使用以下命令启动服务器程序：\n\
  \n```\njava com.apress.logging.log4j.SocketServer 1000\n```\n\n现在，尝试运行客户端程序，并将 `socket.properties`\
  \ 作为配置文件传递给它。\n\n```\njava -Dlog4j.configuration=socket.properties\ncom.apress.logging.log4j.AdvancvedLogging\n\
  ```\n\n我们将在服务器端控制台中看到以下消息：\n\n```\nTHE LOGGER NAME: com.apress.logging.log4j\nTHE\
  \ MESSAGE: Deposited 100.5 new balance: 100.5\nTHE LOGGER NAME: com.apress.logging.log4j\n\
  THE MESSAGE: Withdrawn 80.0 new balance: 20.5\nTHE LOGGER NAME: com.apress.logging.log4j\n\
  THE MESSAGE: Failed to withdraw: balance: 20.5 attempted withdraw: 50.0\n```\n\n\
  ## 使用 NTEventLogAppender 记录到 Windows NT 事件日志\n\n对于执行系统级操作的程序，我们可能需要将日志信息发送到特定操作系统的**事件日志**。在\
  \ Java 中，我们可以通过 Java 本地接口（JNI）与操作系统进行交互。`org.apache.log4j.net.NTEventLogAppender`\
  \ 为我们提供了实现此功能的灵活性。\n\n由于 log4j API 是用 Java 编写的，为了访问 Windows NT 事件日志，它使用 JNI 与 `NTEventLogAppender.dll`\
  \ 文件进行通信。该文件与 Windows NT 事件日志交互，并将日志信息写入其中。\n\n`NTEventLogAppender` 对象使用起来非常简单，并具有表\
  \ 7-4 中所示的可配置 Bean 属性。\n\n表 7-4: NTEventLogAppender 中的可配置 Bean 属性\n\n| Bean 属性 |\
  \ 方法 | 描述 | 默认值 |\n| --- | --- | --- | --- |\n| `layout` | `SetLayout(String)` |\
  \ 设置此附加器使用的布局 | 默认布局为 `TTCCLayout`。 |\n| `source` | `setSource(String)` | 设置此事件日志的源名称\
  \ | 默认源名称设置为 `Log4j`。 |\n\n我们将重用代码清单 7-1 中的程序，以查看日志信息如何存储在 NT 事件日志中。我们还将使用代码清单 7-11\
  \ `nt.properties` 中的配置文件来配置此示例中使用的记录器和附加器。\n\n代码清单 7-11: nt.properties\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\n#configuring the custom logger\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
  \ NT\n\n#configuring the NT appender\nlog4j.appender.NT=org.apache.log4j.nt.NTEventLogAppender\n\
  log4j.appender.NT.layout=org.apache.log4j.SimpleLayout\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n此示例配置文件为 `NTEventLogAppender` 提供了一个 `SimpleLayout` 对象。只需使用此配置文件执行示例程序即可。完成后，如果打开\
  \ Windows NT/Windows 2000/Windows XP 系统的**事件查看器**，我们将在应用程序日志部分看到针对源名称 `Log4j` 记录的事件。在每个事件中，我们都会找到存储的日志信息。\n\
  \n\n\n## 通过 SMTPAppender 分发日志信息\n\n上一章提到，像 log4j 这样的日志 API 最大的特点在于，它不将日志活动局限于简单的调试跟踪。此外，正如我们从对几个\
  \ `Appender` 对象的讨论中所看到的，这些对象构成了一个强大的功能，可以将日志信息分发到各种组件，例如数据库、NT 事件日志、套接字等。可以利用这一有用的功能来实现数据分发能力，而无需编写单独的应用程序模块来完成相同的工作。\n\
  \n这一强大功能的一个例子是 `SMTPAppender`。想象一下，你正在编写一个订单处理应用程序，在收到每个订单后，客户会收到所收到订单的详细信息更新。解决此问题的一种传统方法是收集订单信息，并将其传递给一个单独的邮件应用程序，以便通过电子邮件发送给用户。借助\
  \ `SMTPAppender`，我们甚至无需编写一行额外的代码就能做到这一点。\n\n`org.apache.log4j.net.SMTPAppender`\
  \ 是一个强大的 `Appender` 对象，能够使用简单邮件传输协议 (SMTP) 发送日志信息。`SMTPAppender` 对象具有表 7-5 中所示的可配置\
  \ Bean 属性。\n\n表 7-5：SocketAppender 中的可配置 Bean 属性\n\n| Bean 属性 | 方法 | 描述 | 默认值 |\n\
  | --- | --- | --- | --- |\n| `bufferSize` | `setBufferSize(int)` | 设置存储日志事件的循环缓冲区的大小\
  \ | 默认为 512 个事件 |\n| `evaluatorClass` | `setEvaluatorClass(String)` | 设置用于检查任何触发条件的评估器类的名称\
  \ | 默认为内部类 `DefaultEvaluator` |\n| `from` | `setFrom(String)` | 设置发件人的电子邮件地址 | 无\
  \ |\n| `layout` | `setLayout(String)` | 设置用于格式化日志信息的布局 | 无 |\n| `locationInfo` |\
  \ `setLocationInfo(boolean)` | 指定是否应在日志信息中包含位置信息 | `false` |\n| `SMTPHost` | `setSMTPHost(String)`\
  \ | 设置用于发送电子邮件的 SMTP 主机名称 | 无 |\n| `subject` | `setSubject(String)` | 设置电子邮件的主题\
  \ | 无 |\n| `to` | `setTo(String)` | 设置收件人的电子邮件地址 | 无 |\n\n表 7-5 中的最后一个配置参数值得讨论。`SMTPAppender`\
  \ 可以附加一个评估器类。此评估器类可以评估每个日志事件，并决定一个触发条件来告知 `SMTPAppender` 触发电子邮件发送活动。触发条件可以是任何特定于应用程序的条件，例如当日志事件的消息级别为\
  \ ERROR 时。`SMTPAppender` 使用的默认评估器类是一个名为 `DefaultEvaluator` 的内部类。`DefaultEvaluator`\
  \ 类仅检查与日志事件关联的级别是否大于或等于级别值 ERROR。\n\n如果不满足触发条件，则该事件将存储在一个默认大小为 512 个事件的循环缓冲区中。一旦有满足触发条件的日志事件到达，缓冲区中的所有事件都会被检索出来并通过电子邮件发送给收件人。\n\
  \n要查看 `SMTPAppender` 的实际运行示例，我们将重用清单 7-1 中的程序，并使用清单 7-12 \"smtp.properties\" 中所示的配置文件。`SMTPAppender`\
  \ 的配置使用 `smtp.mail.yahoo.com` 作为 SMTP 服务器。你可以将其替换为你正在使用的任何其他 SMTP 服务器。`to` 属性定义收件人的电子邮件地址，`from`\
  \ 定义发件人的电子邮件地址。`subject` 属性定义电子邮件的主题，最后我们分配一个 `org.apache.log4j.SimpleLayout` 对象来格式化日志信息，使其显示在电子邮件的正文中。\n\
  \n清单 7-12：smtp.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\n#配置自定义日志记录器\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
  \ SMTP\n\n#配置 SMTP 附加器\nlog4j.appender.SMTP=org.apache.log4j.net.SMTPAppender\n\
  log4j.appender.SMTP.SMTPHost=smtp.mail.yahoo.com\nlog4j.appender.SMTP.to=clientname@mailserver.com\n\
  log4j.appender.SMTP.subject=测试附加器\nlog4j.appender.SMTP.from=yourname@mailserver.com\n\
  log4j.appender.SMTP.layout=org.apache.log4j.SimpleLayout\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n使用此配置文件，执行示例程序。请记住，`SMTPAppender` 依赖于 Java Mail API（\"mail.jar\"\
  ）和 Java Activation API（\"activation.jar\"）。确保这两个 .jar 文件与 log4j 特定的 .jar 文件一起位于你的类路径中。\n\
  \n一旦执行，我们将看到消息被发送到客户端电子邮件地址。在我们的示例程序中，有一条级别为 ERROR 的消息满足触发条件，因此 `SMTPAppender` 会将包含所有日志事件的电子邮件发送到指定的客户端电子邮件地址。\n\
  \n## 通过 TelnetAppender 使消息可通过 Telnet 获取\n\n在某些情况下，我们可能希望允许远程用户访问我们从应用程序生成的日志信息。当我们想要远程管理应用程序时，这一点尤其重要。在这种情况下，我们在本地发布日志数据，并希望向远程用户提供只读访问权限。最好的方法是使用现有的\
  \ Telnet 协议。远程用户可以使用 Telnet 协议登录到本地机器，并读取我们希望他们看到的日志信息。\n\nlog4j API 提供了 `org.apache.log4j.net.TelnetAppender`\
  \ 来启用此功能。`TelnetAppender` 将数据写入一个只读套接字。`TelnetAppender` 是一个多线程程序，它打开一个服务器套接字连接到某个端口，并监听对该同一端口的任何连接。一旦连接信号到达，它会将连接源信息添加到一个缓冲区中。接下来，每当有日志请求到达\
  \ `TelnetAppender` 时，它会将数据写入所有活动的连接套接字。\n\n`TelnetAppender` 对象使用默认的 Telnet 端口 23。也可以选择指定任何其他端口。它可以同时处理的最大连接数为\
  \ 20。`TelnetAppender` 需要一个特定的布局来相应地格式化日志数据。\n\n一个非常适合使用 `TelnetAppender` 的场景是与 Servlet\
  \ 结合使用。Servlet 在某个时间点处理多个客户端连接。此外，将 `TelnetAppender` 用于服务器日志活动允许多个远程管理员实时获取日志信息。当应用程序的远程管理至关重要时，这非常有用。\n\
  \n这里不包含将 `TelnetAppender` 与 Servlet 结合使用的示例，而是将其留作练习供你实现。请记住，`TelnetAppender` 并没有什么神奇之处。你只需要配置你的\
  \ `Logger` 对象来使用 `TelnetAppender` 即可。\n\n\n\n## 结论\n\n在本章中，我们讨论了 log4j 的一些高级日志记录概念。现在，我们已经看到了\
  \ log4j API 在实现分布式日志记录活动方面的强大能力。当应用程序规模庞大、分布广泛，并且与多个其他自定义或遗留应用程序交互时，这一点尤为重要。通过远程管理和查看日志跟踪，应用程序的远程管理变得更加容易。这使我们能够更好地控制应用程序的日常维护。\n\
  \n正如我们所见，log4j 的大部分日志记录框架都是可配置的。在我们所有的示例中，只需将应用程序指向不同的配置文件，就能改变日志记录行为。毫无疑问，您能够体会到\
  \ log4j 的强大之处，并从中受益，将其应用于您自己的应用程序中。\n\n在下一章中，我们将探讨如何利用 log4j 的现有框架，并对其进行扩展，以编写特定于应用程序的组件。\n\
  \n# 第 8 章：扩展 log4j 以创建自定义日志记录组件\n\n## 概述\n\n在前几章中，我们介绍了 log4j 的核心框架。我们讨论了 `Logger`、`Appender`、`Layout`\
  \ 和 `Filter` 对象如何相互交互，并将日志信息发布到首选目标。Apache log4j 提供了大量的 `Appender` 对象。这些对象使我们能够将日志数据发布到本地机器，并通过网络分发日志数据。此外，log4j\
  \ 灵活且高度可配置的特性允许我们仅通过更改配置文件就能完全改变日志记录行为。\n\n这一切都非常出色且实用。尽管如此，在某些情况下，log4j 的默认功能可能无法完全满足应用程序的需求。这种限制更多是由于应用程序本身的复杂性，而非\
  \ log4j 的设计问题。在这种情况下，我们必须扩展 log4j 框架，设计自己的日志记录组件，以满足应用程序的需求。\n\n在本章中，我们将讨论如何扩展 log4j\
  \ 框架以创建特定于应用程序的组件。本文讨论的主题和提供的示例将作为开发特定于应用程序的自定义日志记录组件的指南。\n\n## 创建自定义 WindowAppender\n\
  \n在本节中，让我们探讨如何创建我们自己的 `Appender` 对象。在应用程序中，我们可能需要基于 Java 窗口的日志记录。通过某种 GUI 控件（例如一个小窗口）来监控日志信息是一个常见的应用程序需求。这意味着应用程序中的\
  \ `Logger` 对象应配置为将日志信息发送到 Java 窗口。为了实现这一点，我们可以创建一个名为 `WindowAppender` 的自定义附加器，它能够将所有日志信息打印到一个基于\
  \ Java 的小窗口中。\n\n### 自定义 WindowAppender 的特性\n\n正如在第 5 章中讨论 log4j API 中可用的几个 `Appender`\
  \ 对象时提到的，这些对象都继承自一个名为 `AppenderSkeleton` 的基类。我们想要创建的任何自定义 `Appender` 对象都必须遵循这个附加器层次结构。log4j\
  \ 框架在调用任何指定的附加器之前会检查此条件，并忽略任何不遵循附加器层次结构的附加器。\n\n遵循附加器层次结构使得编写自定义 `Appender` 对象变得相当容易。在本例中，我们将创建一个\
  \ `WindowAppender` 对象。在编写 `WindowAppender` 对象的代码之前，让我们先看看我们将包含的特性：\n\n*   `WindowAppender`\
  \ 将创建一个基于 Java `Frame` 的小窗口。\n*   该窗口将在可滚动区域中显示日志信息。\n*   窗口的 `title`、`width` 和\
  \ `height` 属性应可通过 bean 属性进行配置。\n\n这看起来很简单，但我们必须意识到这个 `WindowAppender` 存在一些瓶颈。我们需要决定任何应用程序中的不同\
  \ `Logger` 对象将如何访问 `WindowAppender`。在创建 `WindowAppender` 对象之前，以下几点是需要考虑的重要因素：\n\n\
  *   一个应用程序可能有多个 `Logger` 对象，每个对象都可能尝试使用 `WindowAppender` 对象来记录信息。\n*   我们需要确保对于所有创建的\
  \ `WindowAppender` 实例，只有一个窗口是活动的。\n*   如果每个使用 `WindowAppender` 对象的 `Logger` 对象都创建一个单独的日志窗口，系统很快就会充满日志窗口，这是不可取的。\n\
  \n### 自定义 WindowAppender 的架构\n\n考虑到我们需要提供的特性以及应该注意的瓶颈，我们需要找到一种方法来创建日志窗口的单个实例，并使其对所有\
  \ `WindowAppender` 实例可用。创建日志窗口的最佳时机是在附加器初始化时。\n\n为了理解这一点，让我们回顾一下附加器的初始化过程：\n\n*\
  \   如果附加器配置在配置文件中指定，log4j 框架将从该文件中读取附加器配置。\n*   log4j 框架首先通过调用指定附加器类的默认构造函数来创建该类的实例。\n\
  *   如果配置文件中指定了其他 bean 属性，则会调用相应 bean 属性的 `set()` 方法来设置属性值。\n*   最后，调用指定附加器类的 `activateOptions()`\
  \ 方法来初始化附加器的任何可选配置。此方法对于任何附加器都是可选的，因此特定 `Appender` 对象中可能存在也可能不存在。\n\n现在回到 `WindowAppender`，初始化日志窗口的最佳位置在哪里？因为我们有用于设置日志窗口\
  \ `title`、`height` 和 `width` 属性的 bean 属性，所以我们不能在初始化过程设置这些 bean 属性之前创建日志窗口的实例。因此，在\
  \ bean 属性设置之后创建日志窗口实例的最佳位置是在 `activateOptions()` 方法中。\n\n此外，我们需要确保不会创建超过一个日志窗口实例。因此，我们应该将日志窗口的创建和实例化移到一个\
  \ `synchronized` 方法中，以返回日志窗口的 `static` 单例实例。\n\n\n\n### 自定义 WindowAppender 的实现\n\
  \n清单 8-1 展示了 `WindowAppender.java`，这是一个基于窗口的自定义 `Appender` 对象。\n\n清单 8-1：WindowAppender.java\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j.appender;\n\
  \nimport org.apache.log4j.AppenderSkeleton;\nimport org.apache.log4j.spi.LoggingEvent;\n\
  import javax.swing.JFrame;\nimport javax.swing.JTextArea;\nimport javax.swing.JScrollPane;\n\
  \n/** 这是一个自定义的 Appender 对象，用于将日志信息发布到 Java 窗口。\n * 该日志 Java 窗口是该 Appender 对象所有实例共享的单例实例。\n\
  \ */\npublic class WindowAppender extends AppenderSkeleton{\n\nprivate static JFrame\
  \ frame = null;\n    private static JTextArea area = null;\n    private static JScrollPane\
  \ pane = null;\n\n/** 保存 title 属性的值。 */\n    private static String title;\n\n/**\
  \ 保存 height 属性的值。 */\n    private static int height;\n\n/** 保存 width 属性的值。 */\n\
  \    private static int width;\n\n/** 创建 WindowAppender 的新实例 */\n    public WindowAppender()\
  \ {\n    }\n    /**\n     * 此方法作为 appender 初始化过程的一部分被调用\n     */\n    public void\
  \ activateOptions() {\n        getWindowInstance();\n    }\n    /**\n     * 用于初始化日志窗口的私有方法\n\
  \     */\n    private synchronized JFrame getWindowInstance() {\n        area =\
  \ new JTextArea();\n        pane = new JScrollPane(area);\n        if(frame == null)\
  \ {\n            frame = new JFrame(title);\n            frame.setSize(width, height);\n\
  \            frame.getContentPane().add(pane);\n            frame.setVisible(true);\n\
  \        }\n        return frame;\n    }\n\n/** 此方法重写自父类，并将日志消息打印到日志窗口。\n     *\
  \ 注意：如果没有为此 Appender 指定布局，则不会显示任何消息。\n     * 日志信息将根据指定的布局和转换模式进行格式化。\n     * @param\
  \ loggingEvent 封装日志信息。\n     */\n    protected void append(LoggingEvent loggingEvent)\
  \ {\n        // 简单地提取消息并显示\n        JScrollPane pane =\n(JScrollPane)frame.getContentPane().getComponent(0);\n\
  \        JTextArea area = (JTextArea)pane.getViewport().getView();\n        if(this.layout\
  \ !=null) {\n            area.append(this.layout.format(loggingEvent));\n      \
  \  }\n    }\n\n/** 此方法重写自父类，并释放日志窗口。\n     */\n    public void close() {\n     \
  \   frame.dispose();\n    }\n\n/** 此方法重写自父类，始终返回 true，以表明此 appender 需要 Layout。\n\
  \     * 如果在配置文件中未指定，则不会在日志窗口中打印任何消息。\n     */\n    public boolean requiresLayout()\
  \ {\n        return true;\n    }\n\n/** title 属性的 getter 方法。\n     * @return title\
  \ 属性的值。\n     */\n    public String getTitle() {\n        return this.title;\n \
  \   }\n\n/** title 属性的 setter 方法。\n     * @param title title 属性的新值。\n     */\n \
  \   public void setTitle(String title) {\n        this.title = title;\n    }\n\n\
  /** height 属性的 getter 方法。\n     * @return height 属性的值。\n     */\n    public int\
  \ getHeight() {\n        return this.height;\n    }\n\n/** height 属性的 setter 方法。\n\
  \     * @param height height 属性的新值。\n     */\n    public void setHeight(int height)\
  \ {\n        this.height = height;\n    }\n\n/** width 属性的 getter 方法。\n     * @return\
  \ width 属性的值。\n     */\n    public int getWidth() {\n        return this.width;\n\
  \    }\n\n/** width 属性的 setter 方法。\n     * @param width width 属性的新值。\n     */\n\
  \    public void setWidth(int width) {\n        this.width = width;\n    }\n}\n\
  ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n正如我们在 `WindowAppender` 中所见，`getWindowInstance()`\
  \ 是一个 `private synchronized` 方法，负责使用指定的 `title`、`width` 和 `height` bean 属性创建 `JFrame`\
  \ 实例。我们提供了一个重写的 `append()` 方法，该方法将日志数据写入嵌入在 `JScrollPane` 中的 `JTextArea`，而 `JScrollPane`\
  \ 则附加到 `JFrame` 上。每次有日志请求到达时，日志消息都会被打印到 `JTextArea`。请注意，`WindowAppender` 中的 `requiresLayout()`\
  \ 方法返回 `true`。这意味着 `WindowAppender` 需要一个 `Layout` 对象与之关联，并且在显示消息之前，它会使用该 `Layout`\
  \ 对象来格式化日志事件。如果未指定 `Layout` 对象，则窗口中不会显示任何日志消息。`activateOptions()` 方法会调用 `getWindowInstance()`\
  \ 方法，该方法会创建一个新的日志窗口 `JFrame` 实例，或者返回一个已存在的实例。\n\n如果以编程方式进行配置，我们必须显式调用 `activateOptions()`\
  \ 方法来创建日志窗口。由于 `getWindowInstance()` 方法是 `synchronized` 的，并且只返回一个且仅一个 `JFrame` 对象实例，因此它可以防止多个程序同时调用\
  \ `WindowAppender` 的 `activateOptions()` 方法。无论配置方式如何，每个应用程序实例始终只会获得一个日志窗口实例。\n\n\
  \n\n### 测试自定义 WindowAppender\n\n为了测试 `WindowAppender`，我们将使用 `WindowAppender` 对象作为两个不同应用类文件中出现的两个独立\
  \ `Logger` 对象的附加器。这些文件如清单 8-2 和清单 8-3 所示。\n\n清单 8-2 `AnotherClass.java` 创建了一个名为\
  \ `Logger1` 的命名日志记录器，而清单 8-3 `WindowAppenderDemo` 创建了另一个名为 `Logger2` 的命名日志记录器。这两个类都执行一些简单的日志记录活动。\n\
  \n清单 8-2: AnotherClass.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j.appender;\n\
