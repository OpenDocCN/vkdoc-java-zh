  \n|  |\n\n### 编写配置类\n\n从数据库加载 log4j 配置信息后，我们需要某种方式来访问这些信息并配置 log4j。为此，我们必须编写一个自定义配置类，从数据库读取数据并配置\
  \ log4j 框架。log4j API 已经提供了两个用于配置的类：`BasicConfigurator`（能够为 log4j 框架提供非常基础的配置）和 `DOMConfigurator`（能够从\
  \ XML 文件加载配置信息）。我们可以编写自己的配置类，从数据库配置 log4j 框架。在开始之前，我们先看看配置在 log4j 框架内部是如何进行的。\n\n\
  图 8-3 展示了 log4j 初始化的序列。每次我们通过调用 `Logger.getLogger(loggerName)` 获取 `Logger` 时，`LogManager`\
  \ 类都会被初始化。`LogManager` 收集并检查从命令行提供给 log4j 的系统属性。请记住，这是在 `LogManager` 的类加载时，在一个 `static`\
  \ 块中发生的，并且只发生一次。`LogManager` 检测通过命令行系统属性指定的配置文件，然后调用 `OptionConverter` 辅助类来解析文件中包含的信息。`OptionConverter`\
  \ 类实例化一个合适的 `Configurator` 类，并调用 `doConfigure()` 方法来完成配置过程。\n\n![点击展开](img/fig8-3_0.jpg)\n\
  图 8-3：log4j 配置过程\n\nlog4j 的当前状态依赖于这样一个事实：配置信息应在一个可通过 URL 访问的配置文件中指定。如果没有指定配置资源文件，它会在应用程序的类路径中查找默认配置文件\
  \ \"log4j.properties\"。\n\n|  | 注意  | 从版本 1.2.7 开始，log4j 会在类路径中查找 \"log4j.xml\"\
  \ 或 \"log4j.properties\" 文件。 |\n\n如果无法找到任何配置文件，log4j 将退出，应用程序日志记录将不再工作。可以通过编写一个自定义配置类，从网络上的某个位置读取配置文件，来覆盖配置的方式。但这仅限于\
  \ `java.net.URL` 对象支持的协议。\n\n我们编写的任何自定义配置类都必须实现 log4j 中名为 `Configurator` 的接口。`Configurator`\
  \ 接口定义了一个方法 `doConfigure(URL, LoggerRepository)`，配置过程就在这个方法中完成。\n\n我们已经看到 log4j\
  \ 框架使用基于 URL 的配置。在我们的示例中，我们希望从数据库读取配置信息来配置 log4j。显然，这里存在利益冲突。但我们可以巧妙地利用现有框架来完成工作。我们将使用一个配置文件，其中包含获取数据库连接的相关信息。`DBConfigurator`\
  \ 将解析这个配置文件，并使用 `DBConfigLoader` 类从数据库读取配置信息。然后，它从 `DBConfigLoader` 获取包含所有配置信息的\
  \ `java.util.Properties` 对象。接着，`DBConfigurator` 类使用 `org.apache.log4j.PropertyConfigurator`\
  \ 类，通过向其传递 `Properties` 对象来实际配置 log4j。\n\n清单 8-6 `DBConfigurator.java` 展示了我们将用于配置\
  \ log4j 框架的自定义配置类。\n\n清单 8-6：DBConfigurator.java\n\n| **![开始示例](img/_1.gif)** |\n\
  \n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.spi.Configurator;\n\
  import org.apache.log4j.spi.LoggerRepository;\nimport org.apache.log4j.PropertyConfigurator;\n\
  import org.apache.log4j.helpers.LogLog;\n\nimport java.net.URL;\nimport java.util.Properties;\n\
  \n\n\npublic class DBConfigurator implements Configurator\n{\n    private String\
  \ dbURL = null;\n    private String dbUser = null;\n    private String dbPwd = null;\n\
  \    private String dbDriver = null;\n    private DBConfigLoader configLoader =\
  \ null;\n    private Properties log4jProps = null;\n\npublic DBConfigurator()\n\
  \    {\n        configLoader = new DBConfigLoader();\n    }\n\npublic void doConfigure(URL\
  \ url, LoggerRepository repos)\n    {\n        Properties props = new Properties();\n\
  \        try\n        {\n        //从配置文件中收集数据库访问信息\n        props.load(url.openStream());\n\
  \        dbURL = (String)props.get(\"DB_URL\");\n        dbUser = (String)props.get(\"\
  DB_USER\");\n        dbPwd = (String)props.get(\"DB_PWD\");\n        dbDriver =\
  \ (String)props.get(\"DB_DRIVER\");\n        //配置配置加载器\n        configLoader.setDbDriver(dbDriver);\n\
  \        configLoader.setDbUrl(dbURL);\n        configLoader.setDbUser(dbUser);\n\
  \        configLoader.setDbPwd(dbPwd);\n\n//获取 log4j 属性\n        log4jProps = configLoader.getConfigData();\n\
  \        //使用 PropertyConfigurator 进行配置\n        PropertyConfigurator.configure(log4jProps);\n\
  \        }catch(Exception e)\n        {\n            LogLog.error(\"无法加载配置 \", e);\n\
  \        }\n    }\n}\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n`DBConfigurator`\
  \ 实现了 `Configurator` 接口。一旦配置类被指定为 `DBConfigurator`，`LogManager` 类就会将配置类的名称传递给 `OptionConverter`。然后\
  \ `OptionConverter` 会创建一个 `DBConfigurator` 的新实例，并调用其中的 `doConfigure()` 方法。当控制权进入\
  \ `DBConfigurator` 类后，`DBConfigurator` 使用 `DBConfigLoader` 获取配置数据，然后使用 `PropertyConfigurator`\
  \ 执行实际的 log4j 配置。\n\n理论上，我们可以通过在 `DBConfigLoader` 类内部直接调用 `PropertyConfigurator`\
  \ 来配置 log4j。但这意味着在应用程序中，我们必须显式地实例化并调用 `DBConfigLoader` 的配置方法来进行配置，这并非理想情况。如果将来需要使用不同的配置类，你将不得不修改应用程序的源代码。实现\
  \ `DBConfigurator` 类解决了这个问题，并将 `DBConfigLoader` 的使用集成到了 log4j 框架中。反过来，你可能会认为 `DBConfigLoader`\
  \ 在 `DBConfigurator` 类中被硬编码了。确实如此，但我们可以轻松地扩展 `DBConfigurator`，使其读取一个系统参数来指示它应该使用的数据库访问类，或者我们也可以在配置文件中指定该参数。\n\
  \n### 使用基于数据库的配置的示例\n\n现在我们已经准备好了从数据库配置 log4j 的基础设施。让我们来看一个小型演示程序 `LoggingDemo.java`，如清单\
  \ 8-7 所述。该类仅包含一个方法，用于写入两条不同级别的日志消息，级别分别为 ERROR 和 INFO。\n\n清单 8-7: LoggingDemo.java\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\n package com.apress.logging.log4j;\nimport\
  \ org.apache.log4j.Logger;\n\npublic class LoggingDemo\n{\n    private static Logger\
  \ logger = Logger.getLogger(\"APPLICATION1\");\n    public LoggingDemo()\n    {\n\
  \    }\n\n    public void doLogging()\n    {\n        logger.info(\"信息消息...\");\n\
  \        logger.error(\"错误消息...\");\n    }\n\n    public static void main(String\
  \ args[])\n    {\n        LoggingDemo demo = new LoggingDemo();\n        demo.doLogging();\n\
  \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n#### 在数据库中创建配置数据\n\n在这个示例程序中，我们尝试使用一个名为\
  \ `APPLICATION1` 的 `Logger` 对象。我们需要在数据库中为这个命名记录器创建一个样式。以下 SQL 脚本将为名为 `APPLICATION1`\
  \ 的记录器插入一条记录，并插入相应的附加器记录：\n\n```\nINSERT INTO LOGGER_REPOSITORY VALUES ('APPLICATION1,'1,'ERROR');\n\
  ```\n\n现在，我们将在 APPENDER_DEF 表中创建一些附加器配置数据。以下脚本将为 ID 为 1 的 `Appender` 对象插入数据。\n\n\
  ```\nINSERT INTO APPENDER_DEF VALUES\n(1,'org.apache.log4j.ConsoleAppender', 'org.apache.log4j.\
  \ SimpleLayout',\n'CONSOLE', 'DEBUG');\n```\n\n名为 `APPLICATION1` 的记录器现在将具有 ERROR\
  \ 级别，并将使用 APPENDER_DEF 表中 APPENDER_ID 为 1 所定义的 `Appender`。参照我们放入 APPENDER_DEF 表的数据，ID\
  \ 值为 1 的 `Appender` 是一个 `ConsoleAppender`。因此，来自此应用程序的任何日志都将打印到控制台。我们可以随时切换 LOGGER_REPOSITORY\
  \ 表中的条目，将 `Appender` 指向 ID 2，这将使用 `JDBCAppender` 对象将日志数据写入数据库。\n\n#### 配置文件\n\n\
  我们还需要一个定义数据库访问参数的配置文件。清单 8-8 \"dbConfig.properties\" 是本示例的配置文件。\n\n清单 8-8: dbConfig.properties\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\nDB_DRIVER=sun.jdbc.odbc.JdbcOdbcDriver\nDB_URL=jdbc:odbc:dbdef\n\
  DB_USER=system\nDB_PWD=manager\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n####\
  \ 执行基于数据库的配置程序\n\n现在，我们需要以如下方式执行程序 `LoggingDemo`，并将所有必需的系统参数传递给它：\n\n```\njava -Dlog4j.configuration=dbConfig.properties\
  \ -\nDlog4j.configuratorClass=com.apress.logging.log4j.DBConfigurator\ncom.apress.logging.log4j.LoggingDemo\n\
  ```\n\n请注意，只有级别为 ERROR 的消息被打印到控制台。将表中的记录器级别更改为 INFO，则两条消息都会被打印。\n\n## 自定义日志框架\n\n\
  假设在一个应用程序中，我们希望在代码优化阶段跟踪每个方法的进入和退出。此外，我们希望这类消息的级别低于 log4j 的 DEBUG 级别，因为我们不希望这些消息在代码优化阶段结束后被发布。使用\
  \ DEBUG 级别来处理这类消息有些不合适，因为将来可能需要开启 DEBUG 级别的消息来调试应用程序。在这种情况下，与方法进入和退出相关的消息更有可能使日志跟踪变得混乱。考虑到所有这些因素，我们决定在应用程序中引入一个新的级别：TRACE。\n\
  \n\n### 创建自定义级别类\n\n接下来我们将探讨如何编写自定义级别类。如第 5 章所述，每个级别基本上对应一个`static final`的唯一整数值。我们需要为要创建的自定义\
  \ TRACE 级别分配一个唯一的整数值。此外，log4j 能够通过`SysLogAppender`将日志消息委托给 UNIX Syslog。在此背景下，每个定义的日志级别还需要定义对应的\
  \ Syslog 级别。Syslog 规范中定义了用于 Syslog 的常量整数值。例如，来自 UNIX 实现的一个示例\"syslog.h\"文件包含以下为不同日志级别定义的\
  \ Syslog 常量：\n\n```\n#define LOG_EMERG 0 /* 系统不可用 */\n#define LOG_ALERT 1 /* 必须立即采取行动\
  \ */\n#define LOG_CRIT 2 /* 严重状况 */\n#define LOG_ERR 3 /* 错误状况 */\n#define LOG_WARNING\
  \ 4 /* 警告状况 */\n#define LOG_NOTICE 5 /* 正常但重要状况 */\n#define LOG_INFO 6 /* 信息性 */\n\
  #define LOG_DEBUG 7 /* 调试级别消息 */\n```\n\nTRACE 级别应对应于 Syslog 实现中的 LOG_DEBUG 级别，该级别的`sysLogEquivalent`应为\
  \ 7。最后，`CustomLevel`类需要提供方法来返回适当的`Level`对象，并根据给定的`int`或`String`值创建 TRACE 级别。\n\n\
  清单 8-9 `CustomLevel.java`演示了如何实现自定义`Level`类。\n\n清单 8-9：CustomLevel.java\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.Level;\n\
  \npublic class CustomLevel extends Level {\n\n  static public final int TRACE_INT\
  \ = Level.DEBUG_INT - 1;\n  private static String TRACE_STR = \"TRACE\";\n  public\
  \ static final CustomLevel TRACE = new CustomLevel(TRACE_INT,\nTRACE_STR, 7);\n\n\
  \  protected CustomLevel(int level, String strLevel, int syslogEquiv) {\n    super(level,\
  \ strLevel, syslogEquiv);\n  }\n\n  public static Level toLevel(String sArg) {\n\
  \    return (Level) toLevel(sArg, CustomLevel.TRACE);\n  }\n\n  public static Level\
  \ toLevel(String sArg, Level defaultValue) {\n\n    if(sArg == null) {\n      return\
  \ defaultValue;\n    }\n    String stringVal = sArg.toUpperCase();\n\n    if(stringVal.equals(TRACE_STR))\
  \ {\n      return CustomLevel.TRACE;\n    }\n    return Level.toLevel(sArg, (Level)\
  \ defaultValue);\n  }\n\n  public static Level toLevel(int i) {\n    switch(i) {\n\
  \    case TRACE_INT: return CustomLevel.TRACE;\n    }\n    return Level.toLevel(i);\n\
  \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在这个`CustomLevel`对象中，我们定义了一个新级别\
  \ TRACE，其唯一整数值比与 DEBUG 级别关联的唯一整数值小 1，以保持该级别的优先级低于 DEBUG。这表明 TRACE 级别应使用在优先级最低的场景中。在\
  \ Syslog 上下文中，我们为其分配 Syslog 等效值 7，以对应 Syslog 实现中的 LOG_DEBUG。\n\n### 创建自定义日志记录器\n\
  \n一旦我们定义了代表 TRACE 级别的`CustomLevel`对象，就需要一个自定义的`Logger`对象来使用该级别。`Logger`对象本质上承担两项职责：通过将日志请求委托给具有适当级别的不同`Appender`对象来生成日志消息，以及向调用应用程序返回命名`Logger`对象的实例。在\
  \ log4j 讨论中提供的示例中，我们一直使用包名来命名日志记录器。实际上，日志记录器的名称可以是任何内容，用于标识在预定义目标中生成日志跟踪的日志记录器。\n\
  \n在复杂的应用场景中，我们可能会决定创建多个自定义`Logger`类。根据指定的日志记录器名称，我们将向调用应用程序返回适当的`Logger`对象。此外，我们还可以考虑使用工厂对象来决定返回哪个`Logger`对象。判断标准同样可以是日志记录器的名称。\n\
  \n清单 8-10 `CustomLogger.java`展示了一个自定义`Logger`对象，其中包含一个生成 TRACE 级别消息的方法。它还使用`CustomLoggerFactory`对象来创建并返回适当的自定义`Logger`对象。\n\
  \n清单 8-10：CustomLogger.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\
  \nimport org.apache.log4j.Logger;\nimport com.apress.logging.log4j.CustomLevel;\n\
  \npublic class CustomLogger extends Logger {\n    private String FQCN = CustomLogger.class.getName()+\"\
  .\";\n    private static CustomLoggerFactory factory = new CustomLoggerFactory();\n\
  \    public CustomLogger(String name) {\n        super(name);\n    }\n\n    public\
  \ void trace(Object message) {\n        //调用父类的 log 方法，并将 throwable 实例设为 null\n\
  \        super.log(FQCN, CustomLevel.TRACE, message, null);\n    }\n    public static\
  \ Logger getLogger(String name) {\n        return Logger.getLogger(name, factory);\n\
  \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n这个`CustomLogger`示例引入了一个新方法，用于将\
  \ TRACE 级别的消息发布到通过与此`Logger`关联的任何`Appender`对象指定的目标。\n\n### 生成自定义日志记录器工厂\n\n继续我们关于编写自定义`Logger`对象的讨论，清单\
  \ 8-11 `CustomLoggerFactory.java`是生成自定义日志记录器工厂对象的代码。如果你想知道为什么需要工厂对象，答案将在本节末尾揭晓。`CustomLoggerFactory`类实现了`LoggerFactory`接口，并提供了`makeNewLoggerInstance(String\
  \ name)`方法的实现。该示例实现展示了工厂对象如何用于返回不同类型的日志记录器对象的框架。\n\n清单 8-11：CustomLoggerFactory.java\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\nimport\
  \ org.apache.log4j.spi.LoggerFactory;\nimport org.apache.log4j.Logger;\n\npublic\
  \ class CustomLoggerFactory implements LoggerFactory {\n    public Logger makeNewLoggerInstance(String\
  \ name) {\n        return new CustomLogger(name);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n`CustomLoggerFactory`根据传递给它的`Logger`对象的名称返回一个单独的`CustomLogger`实例。这是最简单的场景。拥有工厂对象的优势在于，我们可以控制`Logger`对象如何提供给调用应用程序。\n\
  \n\n\n### 使用自定义日志组件\n\n接下来我们将通过一个小示例，演示如何使用前几节创建的自定义级别、日志记录器和工厂对象。与往常一样，使用日志机制的应用程序将获取一个`CustomLogger`类的实例。然后，应用程序可以通过`CustomLogger`类提供的`trace()`方法，使用自定义级别\
  \ TRACE 生成消息。\n\n清单 8-12 `CustomLoggerDemo.java` 演示了`CustomLogger`类的使用。请注意，`CustomLogger`类的`getLogger(String)`方法实际上返回的是`Logger`类的一个实例。因此，在应用程序中，我们需要将返回的实例强制转换为`CustomLogger`。\n\
  \n清单 8-12：CustomLoggerDemo.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\
  \nimport org.apache.log4j.Logger;\n\npublic class CustomLoggerDemo {\n    private\
  \ static CustomLogger logger =\n(CustomLogger)CustomLogger.getLogger(CustomLoggerDemo.class.getPackage()\n\
  .getName());\n\n/** 创建 CustomLoggerDemo 的新实例 */\n    public CustomLoggerDemo()\n\
  \    {\n    }\n\npublic void doLogging()\n    {\n        logger.trace(\"这是一条 TRACE\
  \ 级别的消息...\");\n    }\n\npublic static void main(String args[])\n    {\n       \
  \ CustomLoggerDemo demo = new CustomLoggerDemo();\n        demo.doLogging();\n \
  \   }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n`doLogging()`方法使用获取到的`CustomLogger`实例，并通过`CustomLogger`类的`trace()`方法生成一条\
  \ TRACE 级别的消息。\n\n这一切都简洁明了。但我们仍需解决一些关于使用自定义级别、日志记录器和工厂对象的配置设置问题。当 log4j 初始化时，框架倾向于使用`DefaultCategoryFactory`对象来配置日志记录器。这个`DefaultCategory`对象会返回一个`Logger`类的命名实例。为了使用`CustomLoggerFactory`类，我们需要在配置文件中指定`CustomLoggerFactory`类作为框架内使用的工厂类。如果框架使用了`DefaultCategoryFactory`类，那么在调用应用程序中尝试将获取到的日志记录器实例强制转换为`CustomLogger`时，将会抛出`ClassCastException`异常。\n\
  \n此外，由于我们使用了自定义级别 TRACE，配置要求也必须定义该级别的实现类。自定义级别应以`level#classname`格式定义。否则，框架将无法使用任何超出标准\
  \ log4j 定义级别范围之外的级别。\n\n清单 8-13 \"customlogger.properties\" 是清单 8-12 中示例的配置文件。\n\
  \n清单 8-13：customlogger.properties\n\n| **![示例开始](img/_1.gif)** |\n\n```\n# 配置 log4j\
  \ 使用 CustomLoggerFactory 作为工厂对象\nlog4j.loggerFactory=com.apress.logging.log4j.CustomLoggerFactory\n\
  \n# 设置级别为 TRACE，附加器为 ConsoleAppender\nlog4j.logger.com.apress.logging.log4j=TRACE#com.apress.logging.log4j\n\
  .CustomLevel, CONSOLE\n\n# 定义附加器\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\n\
  log4j.appender.CONSOLE.layout=org.apache.log4j.SimpleLayout\n```\n\n| **![示例结束](img/_1.gif)**\
  \ |\n\n|  |\n\n该示例的等效 XML 风格配置如下面的清单 8-14 所示。\n\n清单 8-14：customlogger.xml\n\n| **![示例开始](img/_1.gif)**\
  \ |\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE log4j:configuration\
  \ SYSTEM \"log4j.dtd\">\n\n<log4j:configuration xmlns:log4j=\"http://jakarta.apache.org/log4j/\"\
  >\n\n<appender name=\"A1\" class=\"org.apache.log4j.ConsoleAppender\">\n\n<layout\
  \ class=\"org.apache.log4j.PatternLayout\">\n     <param name=\"ConversionPattern\"\
  \ value=\"%t %-5p %c{2} - %m%n\"/>\n   </layout>\n\n</appender>\n\n<logger name=\"\
  com.apress.logging.log4j\">\n   <level value=\"TRACE\" class=\"com.apress.logging.log4j.CustomLevel\"\
  />\n   <appender-ref ref=\"A1\"/>\n </logger>\n\n<categoryFactory class=\"com.apress.logging.log4j.CustomLoggerFactory\"\
  />\n\n</log4j:configuration>\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n请注意自定义`Level`和自定义`LoggerFactory`类是如何配置的。\n\
  \n|  | 警告  | 目前，log4j 1.2.6 版本存在一个错误，即`DOMConfigurator`完全忽略了`<categoryFactory>`元素。因此，在\
  \ XML 风格配置下，无法同时使用自定义日志记录器和自定义日志记录器工厂。希望这个错误能尽快得到修复。 |\n\n我们已经看到，通过创建新的级别和`Logger`类，我们能够自定义日志消息的优先级。\n\
  \n|  | 警告  | log4j 的创建团队强烈不鼓励使用自定义日志记录器和自定义日志记录器工厂对象。 |\n\n\n\n### 使用自定义级别的更简单方法\n\
  \n在上一节中，我们了解了如何扩展现有的 `Logger` 类来创建我们自己的自定义 `Logger` 类。子类化 `Logger` 类的主要动机之一，是引入一个使用自定义级别\
  \ TRACE 的新日志记录方法。为了使用扩展后的 `Logger` 类，我们需要创建并向 log4j 框架提供一个自定义的 `LoggerFactory` 类。毫无疑问，对于像向现有\
  \ `Logger` 类添加一个新方法这样简单的事情，这一切看起来都有些复杂。\n\n一种更简单的方法是围绕现有的 `Logger` 类编写一个包装类。包装类可以提供计划用于新日志记录功能的所需日志记录方法。例如，清单\
  \ 8-15 `LoggerWrapper.java` 是一个经典示例，展示了我们如何在不陷入子类化 `Logger` 类的复杂性的情况下，仍然使用自定义级别\
  \ TRACE。\n\n清单 8-15: LoggerWrapper.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\n\
  package com.apress.logging.log4j;\n\nimport org.apache.log4j.Logger;\nimport org.apache.log4j.Level;\n\
  \npublic class LoggerWrapper\n{\n  private final String name;\n  private Logger\
  \ log;\n  protected LoggerWrapper(String name)\n  {\n      this.name = name;\n \
  \     log = Logger.getLogger(name);\n  }\n\npublic String getName()\n  {\n     \
  \ return name;\n  }\n\npublic boolean isTraceEnabled()\n  {\n      if(!log.isEnabledFor(CustomLevel.TRACE))\n\
  \          return false;\n      else\n          return\n          CustomLevel.TRACE.isGreaterOrEqual(log.getEffectiveLevel());\n\
  \  }\n\npublic void trace(Object message)\n  {\n      log.log(CustomLevel.TRACE,\
  \ message);\n  }\n\npublic void trace(Object message, Throwable t)\n  {\n      log.log(CustomLevel.TRACE,\
  \ message, t);\n  }\n\npublic boolean isDebugEnabled()\n  {\n      Level p = Level.DEBUG;\n\
  \      if(!log.isEnabledFor(p))\n          return false;\n      else\n         \
  \ return p.isGreaterOrEqual(log.getEffectiveLevel());\n  }\n\npublic void debug(Object\
  \ message)\n  {\n      log.log(Level.DEBUG, message);\n  }\n\npublic void debug(Object\
  \ message, Throwable t)\n  {\n      log.log(Level.DEBUG, message, t);\n  }\n\npublic\
  \ boolean isInfoEnabled()\n  {\n      Level p = Level.INFO;\n      if(!log.isEnabledFor(p))\n\
  \          return false;\n      else\n          return p.isGreaterOrEqual(log.getEffectiveLevel());\n\
  \  }\n\npublic void info(Object message)\n  {\n      log.log(Level.INFO, message);\n\
  \  }\n\npublic void info(Object message, Throwable t)\n  {\n      log.log(Level.INFO,\
  \ message, t);\n  }\n\npublic void warn(Object message)\n  {\n      log.log(Level.WARN,\
  \ message);\n  }\n\npublic void warn(Object message, Throwable t)\n  {\n      log.log(Level.WARN,\
  \ message, t);\n  }\n\npublic void error(Object message)\n  {\n      log.log(Level.ERROR,\
  \ message);\n  }\n\npublic void error(Object message, Throwable t)\n  {\n      log.log(Level.ERROR,\
  \ message, t);\n  }\n\npublic void fatal(Object message)\n  {\n      log.log(Level.FATAL,\
  \ message);\n  }\n\npublic void fatal(Object message, Throwable t)\n  {\n      log.log(Level.FATAL,\
  \ message, t);\n  }\n\npublic void log(Level p, Object message)\n  {\n      log.log(p,\
  \ message);\n  }\n\npublic void log(Level p, Object message, Throwable t)\n  {\n\
  \      log.log(p, message, t);\n  }\n\npublic static LoggerWrapper getLogger(String\
  \ name)\n  {\n      LoggerWrapper logger = new LoggerWrapper(name);\n      return\
  \ logger;\n  }\n\npublic static LoggerWrapper getLogger(Class clazz)\n  {\n    \
  \  LoggerWrapper logger = new LoggerWrapper(clazz.getName());\n      return logger;\n\
  \  }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n这个实现非常直接。它只是使用了 `org.apache.log4j.Logger`\
  \ 类的一个内部成员。它还模仿了 `Logger` 类的所有方法。在内部，它将方法调用委托给 `Logger` 类的实例。值得注意的是，它提供了一个使用自定义\
  \ TRACE 级别的方法，并且还提供了 `isTraceEnabled()` 方法来检查 TRACE 级别是否对任何特定的日志记录器实例启用。\n\n清单 8-16\
  \ `LoggerWrapperDemo.java` 演示了我们刚刚实现的包装类的一个非常简单的用法。\n\n清单 8-16: LoggerWrapperDemo.java\n\
  \n| **![示例开始](img/_1.gif)** |\n\n```\n package com.apress.logging.log4j;\n\npublic\
  \ class LoggerWrapperDemo\n{\n    private static LoggerWrapper logger =\nLoggerWrapper.getLogger(LoggerWrapperDemo.class.getPackage().getName());\n\
  \    public LoggerWrapperDemo()\n    {\n\n}\n\npublic void doLogging(String message)\n\
  \    {\n        logger.trace(message);\n    }\n\npublic static void main(String\
  \ args[])\n    {\n        LoggerWrapperDemo demo = new LoggerWrapperDemo();\n  \
  \      demo.doLogging(\"USING LOGGER WRAPPER TO DISPLAY TRACE LEVEL\n        MESSAGE\"\
  );\n    }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n要执行这个示例程序，我们需要使用与清单\
  \ 8-13 中描述的几乎相同的配置文件，只是此示例不需要使用日志记录器工厂。修改后的配置文件应如清单 8-17 \"loggerWrapper.properties\"\
  \ 所示。\n\n清单 8-17: loggerWrapper.properties\n\n| **![示例开始](img/_1.gif)** |\n\n```\n\
  #将级别设置为 TRACE，并将附加器设置为 ConsoleAppender\nlog4j.logger.com.apress.logging.log4j=\n\
  TRACE#com.apress.logging.log4j.CustomLevel, CONSOLE\n\n#定义附加器\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\n\
  log4j.appender.CONSOLE.layout=org.apache.log4j.SimpleLayout\n```\n\n| **![示例结束](img/_1.gif)**\
  \ |\n\n|  |\n\n使用此配置文件执行清单 8-16 中的示例程序，将在控制台打印以下 TRACE 级别消息：\n\n```\nTRACE - USING\
  \ LOGGER WRAPPER TO DISPLAY TRACE LEVEL MESSAGE\n```\n\n通过为日志记录器编写一个简单的包装类，我们避免了编写自定义\
  \ `Logger` 和自定义 `LoggerFactory` 类的复杂性。这是一种非常有用的技术，可以在保留默认 `Logger` 类常规功能的同时，为自定义\
  \ `Logger` 类添加自定义功能。\n\n\n\n## 关于过滤的更多内容\n\n设计良好的日志代码的一个重要方面，在于控制最终生成的日志信息。在大型应用场景中，日志信息量巨大是常有的事。此时，基于级别的常规过滤可能不足以将日志信息精确限制到分析系统所需的类型。这时，`Filter`\
  \ 对象就变得非常有用。`Filter` 对象能够根据某些特定于应用、更贴近业务逻辑的复杂标准来过滤日志信息。Apache log4j 提供了将任意特定于应用的\
  \ `Filter` 对象附加到框架的灵活性。有了这些 `Filter` 对象，我们就能以更贴近应用和业务的方式控制生成的日志信息。\n\n过滤日志请求有两种方式。一种是执行基于级别的检查，另一种是将\
  \ `Filter` 对象附加到 `Appender` 对象上。基于级别的检查仅限于将日志请求的级别与相应 `Logger` 和 `Appender` 对象的指定级别进行比较。而\
  \ `Filter` 对象则可以根据任何特定于应用的标准来检查日志请求。我们在第 5 章中讨论过 `Filter` 对象，并了解了如何开发自定义的 `Filter`\
  \ 对象。我们可以编写任意类型的 `Filter` 对象，并将其添加到 `Appender` 对象的过滤器链中。过滤器在链中按顺序执行，根据对日志请求的批准或拒绝，日志消息会被相应处理。\n\
  \n由 `Logger` 和 `Appender` 对象应用的基于级别的过滤，其原理很简单。如果日志请求的级别低于 `Logger` 和 `Appender`\
  \ 对象的级别，该日志请求就会被丢弃。这很有用。但如果我们遇到只想打印属于某些级别的日志消息，而丢弃其余消息的情况，该怎么办？例如，我们可能只想打印级别在 DEBUG\
  \ 和 WARN 之间的消息。如果我们将记录器级别设置为 DEBUG，记录器会打印直到 FATAL 级别的所有消息。这时，`org.apache.log4j.varia.LevelRangeFilter`\
  \ 就派上用场了。\n\n### 使用 LevelRangeFilter\n\n借助 `LevelRangeFilter`，我们可以指定日志框架应批准的日志级别下限和上限。`LevelRangeFilter`\
  \ 具有表 8-1 中列出的可配置 Bean 属性。\n\n表 8-1：LevelRangeFilter 中的 Bean 属性\n\n| Bean 属性 | 方法\
  \ | 描述 | 默认值 |\n| --- | --- | --- | --- |\n| `LevelMin` | `setLevelMin(Level)` |\
  \ 设置要考虑进行日志记录的最低级别。 | 无 |\n| `LevelMax` | `setLevelMax(Level)` | 设置应处理日志请求的最高级别。\
  \ | 无 |\n| `acceptOnMatch` | `setAcceptOn-Match(boolean)` | 如果为 `true`，过滤器返回 `ACCEPT`，并且链中的后续过滤器将不被考虑。\
  \ | `false` |\n\n`Filter` 对象目前可通过 XML 配置文件进行配置。清单 8-18 \"customFilter.xml\" 是一个使用\
  \ `LevelRangeFilter` 的示例配置文件。\n\n清单 8-18：customFilter.xml\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE log4j:configuration\
  \ SYSTEM \"log4j.dtd\">\n\n<log4j:configuration xmlns:log4j=\"http://jakarta.apache.org/log4j/\"\
  >\n\n<appender name=\"A1\" class=\"org.apache.log4j.ConsoleAppender\">\n\n<layout\
  \ class=\"org.apache.log4j.PatternLayout\">\n   <param name=\"ConversionPattern\"\
  \ value=\"%t %-5p %c{2} - %m%n\"/>\n  </layout>\n\n<filter class=\"org.apache.log4j.varia.LevelRangeFilter\"\
  >\n    <param name=\"LevelMin\" value=\"DEBUG\"/>\n    <param name=\"LevelMax\"\
  \ value=\"WARN\"/>\n    <param name=\"acceptOnMatch\" value=\"true\"/>\n\n</filter>\n\
  \ </appender>\n\n<logger name=\"com.apress.logging.log4j\">\n  <level value=\"debug\"\
  />\n  <appender-ref ref=\"A1\"/>\n </logger>\n\n</log4j:configuration>\n```\n\n\
  | **![结束示例](img/_1.gif)** |\n\n|  |\n\n请注意，在此配置文件中，我们为 `ConsoleAppender` 对象分配了一个\
  \ `PatternLayout`。`ConsoleAppender` 还使用了 `LevelRangeFilter` 对象，其最低日志级别设置为 DEBUG，最高日志级别设置为\
  \ WARN。`acceptOnMatch` 属性设置为 `true`。这意味着，如果事件的级别在指定范围内，该事件将立即被记录，而无需咨询链中的任何其他 `Filter`\
  \ 对象。如果 `acceptOnMatch` 设置为 `false`，则意味着即使事件级别在指定范围内，也会返回 Filter.NEUTRAL。这为链中的其他\
  \ `Filter` 对象提供了检查该事件的机会。\n\n现在，我们将编写一个简单的程序来演示 `LevelRangeFilter` 的工作原理。清单 8-19\
  \ `FilterDemo.java` 是一个示例程序，它会打印所有级别的日志消息。借助 `LevelRangeFilter`，我们将过滤掉任何不在 DEBUG\
  \ 和 WARN 级别范围内的消息。\n\n清单 8-19：FilterDemo.java\n\n| **![开始示例](img/_1.gif)** |\n\n\
  ```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.Logger;\npublic\
  \ class FilterDemo\n{\n    private static Logger logger =\nLogger.getLogger(FilterDemo.class.getPackage().getName());\n\
  \npublic FilterDemo()\n    {\n    }\n    public void doLogging()\n    {\n      \
  \  logger.debug(\"DEBUG MESSAGE..\");\n        logger.info(\"INFO MESSAGE..\");\n\
  \        logger.error(\"ERROR MESSAGE..\");\n        logger.warn(\"WARN MESSAGE..\"\
  );\n        logger.fatal(\"FATAL MESSAGE...\");\n    }\n\npublic static void main(String\
  \ args[])\n    {\n        FilterDemo demo = new FilterDemo();\n        demo.doLogging();\n\
  \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n执行此程序将把所有消息打印到控制台，但级别为\
  \ ERROR 和 FATAL 的消息除外，因为它们超出了指定的范围。\n\n```\nmain DEBUG logging.log4j - DEBUG MESSAGE..\n\
  main INFO logging.log4j - INFO MESSAGE..\nmain WARN logging.log4j - WARN MESSAGE..\n\
  ```\n\n|  | 注意  | 请回忆，日志级别顺序为 ALL<DEBUG<INFO<WARN<ERROR<FATAL<OFF。 |\n\n如我们所见，为\
  \ `Logger` 对象分配级别以及为 `Appender` 对象分配阈值级别，始终可以限制级别的下限。`LevelRangeFilter` 仅在我们想要限制级别的上限时才变得有用。\n\
  \n\n\n### 使用 SelectedLevelFilter\n\n我们已经了解了 `LevelRangeFilter` 如何帮助我们为日志级别设置上下限。在另一种场景下，我们可能希望有一个\
  \ `Filter` 只允许指定级别的消息出现在目标位置。这比指定一个级别范围更加精确。例如，在某个场景中，我们可能只想打印级别为 FATAL 和 INFO 的消息。一个直接的解决方案是编写一个自定义的\
  \ `Filter` 对象来处理这种情况。\n\n现在，我们将探索一个示例 `Filter` 对象，它旨在根据特定级别过滤消息。`SelectedLevelFilter`\
  \ 类继承了 `abstract` 类 `org.apache.log4j.spi.Filter`，并实现了 `abstract` 方法 `decide(LoggingEvent\
  \ event)` 来判断某个日志事件。\n\n`SelectedLevelFilter` 定义了两个可配置的 bean 属性：`acceptOnMatch`\
  \ 和 `levelsToMatch`。`acceptOnMatch` 属性定义了当找到匹配条件时，过滤器是否应接受此请求。如果 `acceptOnMatch`\
  \ 设置为 `true`，`SelectedLevelFilter` 在找到级别匹配时返回 Filter.ACCEPT，否则返回 Filter.NEUTRAL。如果未找到匹配，则返回\
  \ Filter.DENY。`levelsToMatch` 属性接受一个以逗号分隔的字符串，表示我们想要匹配的级别。例如，如果我们想查找级别为 DEBUG 和\
  \ FATAL 的消息，我们会将 `levelsToMatch` 定义为 \"DEBUG, FATAL\"。这里的顺序无关紧要。\n\n在初始化时，`SelectedLevelFilter`\
  \ 对象会将 `levelsToMatch` 参数中指定的所有级别存储在一个内部的 `java.util.ArrayList` 对象中。当日志事件到达时，它会将其级别与\
  \ `levelsToMatch` 中指定的所有级别进行比较。然后，`SelectedLevelFilter` 根据比较结果和 `acceptOnMatch`\
  \ 的值返回一个适当的返回值——Filter.ACCEPT、Filter.DENY 或 Filter.NEUTRAL。\n\n清单 8-20 `SelectedLevelFilter.java`\
  \ 展示了本节讨论的自定义 `Filter` 对象的示例实现。\n\n清单 8-20: SelectedLevelFilter.java\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.spi.Filter;\n\
  import org.apache.log4j.spi.LoggingEvent;\nimport org.apache.log4j.Level;\nimport\
  \ org.apache.log4j.helpers.OptionConverter;\nimport java.util.ArrayList;\nimport\
  \ java.util.Iterator;\nimport java.util.StringTokenizer;\n\npublic class SelectedLevelFilter\
  \ extends Filter {\n    private ArrayList levels = new ArrayList();\n    private\
  \ boolean acceptOnMatch;\n    private String levelsToMatch;\n\npublic SelectedLevelFilter()\
  \ {\n    }\n\npublic int decide(LoggingEvent event)\n    {\n        if(levels.size()\
  \ == 0)\n        {\n            return Filter.NEUTRAL;\n        }\n        Level\
  \ eventLevel = event.getLevel();\n        Iterator iterator = levels.iterator();\n\
  \        boolean matchFound = false;\n\nwhile(iterator.hasNext())\n        {\n \
  \           Level level = (Level)iterator.next();\n            if(level.equals(eventLevel))\n\
  \            {\n                matchFound = true;\n                break;\n   \
  \         }\n        }\n        if(matchFound)\n        {\n            if(acceptOnMatch)\n\
  \            {\n                return Filter.ACCEPT;\n            }else\n     \
  \       {\n                return Filter.NEUTRAL;\n            }\n        }else\n\
  \        {\n            return Filter.DENY;\n        }\n    }\n\npublic boolean\
  \ getAcceptOnMatch() {\n        return this.acceptOnMatch;\n    }\n\npublic void\
  \ setAcceptOnMatch(boolean acceptOnMatch) {\n        this.acceptOnMatch = acceptOnMatch;\n\
  \    }\n\npublic String getLevelsToMatch() {\n        return this.levelsToMatch;\n\
  \    }\n\npublic void setLevelsToMatch(String levelsToMatch) {\n        this.levelsToMatch\
  \ = levelsToMatch;\n        if(levelsToMatch !=null)\n        {\n            StringTokenizer\
  \ tokenizer = new StringTokenizer(levelsToMatch,\n\",\");\n            while(tokenizer.hasMoreTokens())\n\
  \            {\n                String token = tokenizer.nextToken().trim();\n \
  \               Level level = OptionConverter.toLevel(token, null);\n          \
  \      levels.add(level);\n            }\n        }\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n让我们复用清单 8-19 中的程序 `FilterDemo.java` 来演示 `SelectedLevelFilter` 的应用。由于\
  \ `Filter` 对象只能通过 XML 配置文件进行配置，我们也将复用清单 8-18 中显示的配置文件 \"customFilter.xml\"。对 XML\
  \ 文件中的 `<filter>` 属性进行以下更改，以将 `SelectedLevelFilter` 指定为所定义日志记录器的指定过滤器：\n\n```\n\
  <filter class=\"com.apress.logging.log4j.SelectedLevelFilter\">\n    <param name=\"\
  LevelsToMatch\" value=\"FATAL, INFO\"/>\n    <param name=\"acceptOnMatch\" value=\"\
  true\"/>\n</filter>\n```\n\n在 `levelsToMatch` 属性中，我们将级别 FATAL 和 INFO 指定为要发布消息的所需级别。现在使用更改后的配置文件执行\
  \ `FilterDemo` 程序。只有级别为 FATAL 和 INFO 的消息才会打印到控制台。\n\n```\nmain INFO logging.log4j\
  \ - INFO MESSAGE..\nmain FATAL logging.log4j - FATAL MESSAGE…\n```\n\n### 过滤器链\n\
  \nApache log4j API 提供了许多针对不同目的的 `Filter` 对象。正如我们所见，如果某个特定的 `Filter` 对象返回 Filter.NEUTRAL\
  \ 值，则会考虑链中的下一个过滤器。这被称为过滤器链。通过将多个 `Filter` 对象链接起来，我们可以针对多个过滤条件比较特定的日志请求。有时，这可以作为编写自定义\
  \ `Filter` 对象的替代方案，以组合不同 `Filter` 对象提供的功能。例如，之前仅过滤级别为 INFO 和 FATAL 的消息的示例，可以通过链接两个\
  \ `LevelMatchFilter` 实例来实现。让我们看看当我们将 XML 配置文件更改为用以下条目替换 `SelectedLevelFilter` 时会发生什么：\n\
  \n```\n<filter class=\"org.apache.log4j.varia.LevelMatchFilter\">\n    <param name=\"\
  levelToMatch\" value=\"FATAL\"/>\n    <param name=\"acceptOnMatch\" value=\"true\"\
  />\n</filter>\n<filter class=\"org.apache.log4j.varia.LevelMatchFilter\">\n    <param\
  \ name=\"levelToMatch\" value=\"INFO\"/>\n    <param name=\"acceptOnMatch\" value=\"\
  true\"/>\n</filter>\n<filter class=\"org.apache.log4j.varia.DenyAllFilter\"/>\n\
  ```\n\n`LevelMatchFilter` 有两个配置属性：`levelToMatch` 和 `acceptOnMatch`。我们使用两个 `LevelMatchFilter`\
  \ 实例来仅过滤级别为 FATAL 和 INFO 的消息。链中最后一个过滤器是最重要的条目。`DenyAllFilter` 用于拒绝所有之前由链中其他附加器处理并返回\
  \ Filter.NEUTRAL 值的日志请求。如果 `acceptOnMatch` 属性设置为 `true`，`LevelMatchFilter` 对象在未找到匹配时返回\
  \ Filter.NEUTRAL。如果找到匹配，则返回 Filter.ACCEPT，并且日志事件被记录。所有不匹配的日志事件最终都会到达 `DenyAllFilter`，它会消耗所有这些不匹配的事件而不打印它们。\n\
  \n类似地，我们可以使用 `org.apache.log4j.varia.StringMatchFilter` 对象来记录仅包含 \"Hello\" 或 \"\
  World\" 的消息。不要忘记在链的末尾添加 `DenyAllFilter`，以忽略所有其他不匹配条件的消息。\n\n\n\n## 错误处理\n\n无论应用程序的代码多么健壮，实际上都不可能预测并处理所有潜在的错误情况。一个优秀的系统取决于其弹性以及处理错误情况的效率。到目前为止，我们已经了解了如何记录应用程序运行实例内部状态的信息。通过\
  \ log4j，我们看到日志信息可以发送到本地或网络上的各种目标。这些操作在发布日志信息的过程中，很有可能会产生一些错误情况。\n\n问题是，当日志组件之一遇到问题时应该怎么办。以下是一些建议：\n\
  \n*   主应用程序本身不应仅仅因为日志活动出现问题而崩溃。\n\n*   用 Java 的术语来说，这意味着日志组件应在内部处理错误，而不要将错误或异常抛回给调用方应用程序。这使调用方应用程序无需担心日志组件。\n\
  \n*   日志组件应允许应用程序开发人员在这种错误情况下灵活地选择处理方式。\n\nApache log4j 是一个具有弹性的日志框架。它处理了我们之前讨论的涉及错误日志情况的所有方面。默认情况下，log4j\
  \ 的 `Appender` 对象使用 `OnlyOnceErrorHandler` 对象，该对象仅向 `System.err` 输出一次错误消息，然后忽略后续的错误消息。这是一种优雅的错误处理方式，因为它不会导致主应用程序崩溃，并且管理员可以看到产生的错误消息并尝试及时修复问题。\n\
  \n图 8-4 展示了 log4j 中不同的错误处理对象及其关系。请注意，所有错误处理对象都实现了一个公共接口 `org.apache.log4j.spi.ErrorHandler`。该接口定义了错误处理方法，这些方法随后在特定的错误处理对象中实现。\n\
  \n![点击展开](img/fig8-4_0.jpg)\n图 8-4: ErrorHandler 类图\n\n除了错误处理方法之外，`ErrorHandler`\
  \ 接口还定义了一些其他方法。这些方法如表 8-2 所示。\n\n表 8-2: ErrorHandler 接口中的方法\n\n| 方法 | 描述 |\n| ---\
  \ | --- |\n| `error(String)` | 通过发布传递给它的消息来处理错误 |\n| `error(String, Exception, int)`\
  \ | 通过发布错误信息来处理错误，包括抛出的 Java 异常和描述问题的整数错误代码 |\n| `error(String, Exception, int,\
  \ LoggingEvent)` | 通过发布错误消息、异常、整数错误代码以及生成错误的日志事件来处理错误 |\n| `setLogger(Logger)` |\
  \ 设置可能附加了失败 appender 的日志记录器的引用 |\n| `setAppender(Appender)` | 设置为其处理错误的 appender\
  \ |\n| `setBackupAppender(Appender)` | 设置在主 appender 失败时回退使用的备用 appender |\n\nApache\
  \ log4j 默认提供两个错误处理对象：\n\n*   `org.apache.log4j.helpers.OnlyOnceErrorHandler`：这是\
  \ log4j 的 `Appender` 对象中使用的默认错误处理器。它仅向 `System.err` 打印一次来自 appender 的错误消息，然后忽略后续的错误消息。\n\
  \n*   `org.apache.log4j.varia.FallbackErrorHandler`：此错误处理器也会向 `System.err` 打印错误消息。此外，它可以配置一个辅助\
  \ appender，作为所有使用此 appender 的日志记录器的备用 appender。这实质上意味着，当第一个错误到达时，它会遍历与定义为 `FallbackErrorHandler`\
  \ 配置一部分的主 appender 相关联的所有日志记录器引用。对于找到的每个 `Logger` 对象，它会移除它们的主 appender，并将备用 appender\
  \ 设置为主 appender。这确保了对于这些日志记录器，后续的日志记录请求将定向到备用 appender。这也确保了不会因 appender 操作而产生进一步的错误情况。\n\
  \n对于你自己的应用程序，你可能不会总是对默认的 log4j 错误处理感到满意。例如，当你真正希望将所有日志事件重定向到使用不同的 appender 以将信息发送到辅助目标时，你可能不希望将错误消息输出到控制台。假设你正在使用\
  \ `JDBCAppender` 将日志信息记录到数据库，而数据库在你的应用程序仍在运行时宕机了。你现在想做什么？你可能希望记录错误报告，然后继续将日志信息记录到文件中。如何实现这一点？你可以编写自己的自定义错误处理器来完成这项工作，并配置\
  \ log4j 使用你的自定义错误处理器。\n\n### ErrorCode 接口\n\n为了系统地识别错误，log4j 为不同类型的错误分配了错误代码。这些错误代码封装在\
  \ `ErrorCode` 接口中。错误代码在 `Appender` 对象内部使用，用于将生成的错误传递给附加到该 `Appender` 的相应 `ErrorHandler`\
  \ 类。如果需要，我们可以扩展此接口来定义我们自己的错误代码。\n\n### 编写自定义 ErrorHandler\n\n让我们编写一个自定义的错误处理器对象。我们希望这个自定义错误处理器实现以下目标：\n\
  \n*   错误处理器必须实现 `ErrorHandler` 接口。\n\n*   必须为错误处理器提供一个日志记录器引用。\n\n*   必须为错误处理器提供一个\
  \ appender 引用。\n\n*   appender 引用标识了将处理错误情况的备用 appender。日志记录器引用标识了指定 `Appender`\
  \ 所附加到的日志记录器。\n\n*   错误处理器将保留对所有指定为与主 `Appender` 对象关联的日志记录器的引用。\n\n*   在错误情况下，错误处理器将从指定的日志记录器中移除主\
  \ appender，并将备用 appender 对象设置为主 appender。\n\n清单 8-21 `CustomErrorHandler.java` 旨在完成前面几点中列出的工作。这是一个非常简单的错误处理器。`error(message,\
  \ exception, errorCode, LoggingEvent)` 的实现是完成大部分工作的方法。\n\n清单 8-21: CustomErrorHandler.java\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\nimport\
  \ org.apache.log4j.spi.ErrorHandler;\nimport org.apache.log4j.spi.LoggingEvent;\n\
  import org.apache.log4j.Logger;\nimport org.apache.log4j.Appender;\n\nimport java.util.Vector;\n\
  \npublic class CustomErrorHandler implements ErrorHandler\n{\n    private Appender\
  \ primary;\n    private Appender backup;\n    private Vector loggers = new Vector();\n\
  \n    public CustomErrorHandler()\n    {\n\n    }\n\n    public void activateOptions()\n\
  \    {\n\n    }\n\n    public void setLogger(Logger logger)\n    {\n        if (logger\
  \ != null)\n        {\n            loggers.add(logger);\n        }\n    }\n\n  \
  \  public void error(String message, Exception e, int errorCode)\n    {\n      \
  \  error(message, e, errorCode, null);\n    }\n\n    public void error(String message)\n\
  \    {\n        error(message, null, 0, null);\n    }\n\n    public void error(String\
  \ message, Exception e, int errorCode,\nLoggingEvent event)\n    {\n        for\
  \ (int i = 0; i < loggers.size(); i++)\n        {\n            Logger l = (Logger)\
  \ loggers.elementAt(i);\n            l.removeAppender(primary);\n            l.addAppender(backup);\n\
  \            l.error(message, e);\n        }\n    }\n\n    public void setAppender(Appender\
  \ appender)\n    {\n        this.primary = appender;\n    }\n\n    public void setBackupAppender(Appender\
  \ appender)\n    {\n        this.backup = appender;\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n\n\n### 配置 ErrorHandler\n\n目前，在 log4j 中，错误处理器只能通过 XML 风格的配置文件或编程方式进行配置。此处我们将使用\
  \ XML 风格的配置，因为它比硬编码的编程配置更灵活。清单 8-22 \"errorHandler.xml\" 展示了示例配置文件的代码。\n\n清单 8-22:\
  \ errorHandler.xml\n\n| **![示例开始](img/_1.gif)** |\n\n```\n <?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<!DOCTYPE log4j:configuration SYSTEM \"log4j.dtd\">\n\n\
  <log4j:configuration xmlns:log4j=\"http://jakarta.apache.org/log4j/\">\n\n <appender\
  \ name=\"FILE\" class=\"org.apache.log4j.FileAppender\">\n    <param name=\"file\"\
  \ value=\"${user.home}/backup.log\"/>\n    <param name=\"append\" value=\"true\"\
  />\n\n    <layout class=\"org.apache.log4j.SimpleLayout\"/>\n\n </appender>\n\n\
  \ <appender name=\"JDBC\" class=\"org.apache.log4j.jdbc.JDBCAppender\">\n\n    <errorHandler\
  \ class=\"com.apress.logging.log4j.CustomErrorHandler\">\n     <logger-ref ref=\"\
  com.apress.logging.log4j\"/>\n     <appender-ref ref=\"FILE\"/>\n    </errorHandler>\n\
  \n  <param name=\"URL\" value=\"jdbc:odbc:dbdef\"/>\n  <param name=\"user\" value=\"\
  system\"/>\n  <param name=\"password\" value=\"manager\"/>\n  <param name=\"sql\"\
  \ value=\"INSERT INTO LOGGING_DATA VALUES('%x','%d{yyyy-MM- dd}','%C','%p','%m')\"\
  />\n\n </appender>\n\n <logger name=\"com.apress.logging.log4j\">\n  <level value=\"\
  debug\"/>\n  <appender-ref ref=\"JDBC\"/>\n </logger>\n</log4j:configuration>\n\
  ```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n`errorHandler` 元素被定义为 `JDBC` appender\
  \ 元素的子元素。这意味着定义的错误处理器将与名为 `JDBC` 的 appender 关联使用。`JDBC` appender 通过使用定义的配置参数将数据写入数据库。\n\
  \n在此示例配置中，错误处理器被设置为自定义错误处理器 `com.apress.logging.log4j.CustomErrorHandler`。`CustomErrorHandler`\
  \ 被定义为 `JDBC` appender 的子元素。这意味着 `CustomErrorHandler` 的主 appender 被设置为 `JDBC` appender。\n\
  \n`logger-ref` 元素定义了正在使用 `JDBC` appender 的记录器。`appender-ref` 元素定义了 `JDBC` appender\
  \ 的备用 appender。在此示例中，备用 appender 是名为 `FILE` 的 appender。而 `FILE` appender 又被配置为 `org.apache.log4j.FileAppender`。\n\
  \n最后，`FILE` appender 的配置表明日志信息将被定向到 \"user.home\" 目录下的 \"backup.log\" 文件中。\n\n###\
  \ 运行示例\n\n运行示例非常简单。要观察 `CustomErrorHandler` 的工作情况，请将配置文件 \"errorHandler.xml\"（清单\
  \ 8-22）中的数据库配置参数更改为一些无效值。这将导致 `JDBCAppender` 失败。此时，`CustomErrorHandler` 将接管并执行备份工作。最后，前往\
  \ \"user.home\" 目录检查 \"backup.log\" 文件中写入了什么内容。\n\n## 结论\n\n在本章中，我们研究了如何扩展现有的 log4j\
  \ 框架来编写我们自己的特定于应用程序的日志记录组件。log4j 即插即用的特性使其易于将自定义组件集成到现有框架中。log4j 的默认功能非常通用，能够满足日志记录活动中的大多数常规需求。然而，如果你确实需要，也可以尝试扩展现有框架。本章为实现与\
  \ log4j 配合使用的自定义日志记录组件提供了指导。\n\n在下一章中，我们将学习如何在 Java 服务器页面（JSP）的上下文中使用 log4j。我们将研究\
  \ Apache 的一个新的 JSP 标签库 `Log (1.1)`，并了解如何将其应用于在 JSP 中使用 log4j。此外，我们还将探讨一些将 log4j\
  \ 与企业 Java Bean（EJB）结合使用的思路。\n\n"
- "# 第 9 章：使用 Apache Log 标签库\n\n## 概述\n\n像 Apache log4j 这样强大的日志记录框架的众多优势之一，是它不受限于任何特定的应用场景。Apache\
  \ log4j 是一个健壮且可扩展的日志记录框架，可以根据任何特定应用的需求进行定制。使这个日志记录框架如此健壮的一个特性是 `Log` 标签库，它是 Apache\
  \ TagLibs 项目的一部分。\n\n`Log` 标签库允许开发者在 Java 服务器页面（JSP）中嵌入基于 log4j 的日志记录活动。本质上，它提供了与\
  \ log4j 声明的所有日志级别相关的标签，并使用配置文件来配置执行日志记录活动所需的 log4j 框架。\n\n在本章中，我们将研究 `Log` 标签库的使用，并了解如何扩展它以合并我们自己的日志记录标签。\n\
  \n## 安装 Log 标签库\n\n在 JSP 中安装和使用 `Log` 非常简单。请按照以下步骤在 Web 应用程序中设置和使用 `Log`：\n\n1.\
  \  首先，从 Apache 网站 ([`jakarta.apache.org/taglibs/doc/log-doc/intro.html`](http://jakarta.apache.org/taglibs/doc/log-doc/intro.html))\
  \ 获取 `Log (1.1)` 的二进制发行版。\n\n2.  将归档文件解压到本地机器。\n\n3.  将标签库描述符文件 \"taglibs-log.tld\"\
  \ 复制到应用程序特定的 \"/WEB-INF\" 子目录。\n\n4.  将 \"taglibs-log.jar\" 文件复制到 Web 应用程序的 \"/WEB-INF/lib\"\
  \ 子目录。\n\n5.  在 Web 应用程序的 \"web.xml\" 文件中添加一个 `<taglib>` 元素，以指定标签库描述符的位置，如下所示：\n\
  \n    ```\n    <taglib>\n      <taglib-uri>http://jakarta.apache.org/taglibs/log-1.0</taglib-uri>\n\
  \      <taglib-location>/WEB-INF/log.tld</taglib-location>\n    </taglib>\n    ```\n\
  \n这就是在 Web 应用程序中使用 `Log` 所需做的全部工作。现在，我们将看到一个在 JSP 中使用 `Log` 的简单示例。\n\n|  | 注意  |\
  \ 本节描述的安装过程特定于 Apache Tomcat Web 服务器环境。要与其他 Web 服务器一起使用 `Log (1.1)`，你需要根据所使用的 Web\
  \ 服务器进行特定配置。 |\n\n\n\n## 使用日志标签库的简单示例\n\n首先，让我们看一个简单的示例，演示如何在 JSP 中使用 `Log` 标签库通过\
  \ log4j 执行日志记录。清单 9-1 `SimpleLog.jsp` 是一个简单的 JSP，它使用 `Log` 标签库将日志信息打印到 Web 服务器的控制台。本示例使用\
  \ Tomcat 3.2.1 进行演示。\n\n清单 9-1：SimpleLog.jsp\n\n| **![示例开始](img/_1.gif)** |\n\n\
  ```\n<html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\" prefix=\"\
  log\" %>\n<BODY>\n<h1>测试日志标签库</h1>\n<log:debug>嵌入在开闭标签之间的消息。</log:debug>\n<log:debug\
  \ message=\"作为属性传递给标签的消息\" />\n<log:info category=\"test\">使用 category 属性。</log:info>\n\
  现在您应该在调试日志中看到输出。\n</BODY>\n</html>\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\
  \n如您所见，这个 JSP 虽然非常简单，但足以展示 `Log` 标签库的工作方式。在此示例中，我们使用 `<debug>` 和 `<info>` 标签来打印日志信息。`Log`\
  \ 标签库提供了与 log4j 中定义的所有日志级别相关的标签。本章稍后我们将看到 `Log` 提供的所有可用标签。现在，让我们探讨在 JSP 中使用 `Log`\
  \ 的基础知识：\n\n*   首先，我们需要在 JSP 中导入 `Log` 标签库，以使这些标签在页面上下文中可用。这通过 JSP 中的以下代码行实现：\n\n\
  \    ```\n    <%@ taglib uri=http://jakarta.apache.org/taglibs/log-1.0\n      prefix=\"\
  log\" %>\n    ```\n\n    这行代码从指定位置导入标签库，并将 `log` 设置为库中标签的标签名前缀。实际上，此前缀可以是任何唯一的文本。\n\
  \n*   `Log` 标签库中的标签需要以导入标签库到页面时定义的前缀开头。在本示例中，标签以 `log` 为前缀。\n\n*   这些标签接受可选属性，并且每个标签都需要开闭标签。\n\
  \n有了对使用 `Log` 标签库的简单理解，让我们来看看此示例的配置要求。\n\n### 日志标签库的配置文件\n\n`Log` 标签库使用 log4j 将日志信息打印到所需位置。如第\
  \ 5 章所述，log4j 不对应用程序环境做任何假设。为了以所需格式和位置获取日志信息，log4j 需要一个配置文件，指定有关日志信息格式和目标的全部信息。\n\
  \n`Log` 提供了一个名为 \"log4j.properties\" 的默认配置文件。清单 9-2 描述了随 `Log` 发行版附带的默认 log4j 配置文件。\n\
  \n清单 9-2：log4j.properties，Log 的默认配置文件\n\n| **![示例开始](img/_1.gif)** |\n\n```\n# 用于初始化\
  \ log4j 的示例属性\nlog4j.rootCategory=debug, stdout\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\n\
  log4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\n# 用于输出调用者文件名和行号的模式。\n\
  log4j.appender.stdout.layout.ConversionPattern=%5p [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
  log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# 保留一个备份文件\n\
  log4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
  log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\n| **![示例结束](img/_1.gif)**\
  \ |\n\n|  |\n\n此配置文件非常简单。它使用 `ConsoleAppender` 和 `RollingFileAppender` 对象将日志信息输出到\
  \ Web 服务器控制台和文件。它还使用 `PatternLayout` 来格式化日志信息。指定用于打印到控制台的日志信息的模式包括级别、线程名称、文件名、位置信息和消息，后跟换行符。\n\
  \n写入文件的模式略有不同，包括级别、线程名称、记录器名称和消息，后跟换行符。尽管此配置文件看起来很简单，但它突出了关于 `Log` 工作方式的以下重要点：\n\
  \n*   `Log` 使用 log4j 根记录器（与前面示例中的 `Category` 同义）来发布日志信息。根记录器的阈值级别为 DEBUG。\n\n* \
  \  默认情况下，`Log` 将日志信息写入 Web 服务器控制台。理论上，可以通过更改配置文件将 `Log` 配置为将日志信息发送到任何首选目标。它提供了一个示例配置，用于通过使用\
  \ `RollingFileAppender` 对象将日志信息重定向到滚动文件。\n\n*   如果我们想使用根记录器以外的记录器，则需要在配置文件中配置 `Logger`\
  \ 对象。忘记这样做可能导致日志信息不会打印到任何指定目标。\n\n*   更改根记录器或与任何标签一起使用的其他自定义记录器的阈值级别可能会导致日志输出发生变化。\n\
  \n|  | 注意  | 如果没有显式地将单独的记录器（`Category`）指定为任何 `Log` 标签的属性，这些标签将依赖 log4j 的根记录器来发布日志信息。因此，即使我们在标签属性中指定了自定义记录器（`Category`）名称并在同一配置文件中单独配置它们，保留根记录器配置也始终是安全的。\
  \ |\n\n### 设置环境\n\n按照“安装日志标签库”部分中的说明操作后，我们已经准备好从 JSP 中使用 `Log` 标签库。在我们可以实际运行清单 9-1\
  \ 中的示例 JSP 之前，我们需要按照接下来的几个步骤配置 Web 服务器以使用 JSP 和 log4j 配置文件：\n\n1.  首先，将清单 9-1 中描述的\
  \ JSP 放入 Tomcat 安装目录下 \"webapps\" 目录中名为 \"TestLogTags\"（或您选择的任何文件夹）的文件夹中。\n\n2.\
  \  在 Tomcat 中，任何 Web 应用程序通常都包含一个 \"WEB-INF\" 目录和一个 \"WEB-INF/classes\" 目录。将 \"log4j.properties\"\
  \ 文件放在这些位置之一。例如，您可以决定将其放在 \"WEB-INF/classes\" 目录中。\n\n3.  指定 Tomcat 可以在哪里找到上一节中显示的\
  \ log4j 配置文件。\n\n4.  将 \"log4j.properties\" 文件作为系统变量传递给 Tomcat 的执行环境。\n\n5.  转到\
  \ \"%TOMCAT_HOME%\\bin\" 中的 \"tomcat.bat\" 文件。\n\n6.  添加一个条目，将 classpath 变量设置为指向包含\
  \ \"log4j.properties\" 文件的目录。对于此示例，该条目可能如下所示：\n\n    ```\n    set CP=%CP%;C:\\Jakarta-tomcat-3.2.1\\\
  webapps\\\n          TestLogTags\\WEB-INF\\classes\n    ```\n\n7.  将以下条目添加到 \"tomcat.bat\"\
  \ 文件中：\n\n    ```\n    set TOMCAT_OPTS=-Dlog4j.configuration=log4j.properties\n\
  \    ```\n\n|  | 注意  | 我们也可以通过初始化 servlet 来配置 log4j。有关此主题的更多信息，请参阅第 5 章。 |\n\n这就是我们在运行示例之前需要做的所有事情，接下来我们将看到如何运行它。\n\
  \n\n\n### 日志示例的实际应用\n\n现在启动 Tomcat 并访问该 JSP 页面，如图 Figure 9-1 所示。Tomcat 将加载 \"log4j.properties\"\
  \ 文件，而 `Log` 将使用此配置文件来打印日志信息。\n\n![点击展开](img/fig9-1_0.jpg)\n图 9-1：SimpleLog.jsp\
  \ 页面\n\n如果我们现在查看 Tomcat 控制台，将会看到以下日志信息被打印出来：\n\n```\nDEBUG [Thread-11] (LoggerTag.java:109)\
  \ - Message embedded within open and\nclose tags.\nDEBUG [Thread-11] (LoggerTag.java:97)\
  \ - Message passed as an attribute to\nthe tag\n INFO [Thread-11] (LoggerTag.java:109)\
  \ - Using category attribute.\n```\n\n## 在日志标签库中使用自定义日志记录器\n\n在 Listing 9-1 列出的\
  \ JSP 中，我们使用了 `<log:info>` 标签，并将 `category` 属性指定为 `test`。这是作为日志信息一部分生成的日志记录器的名称。如果我们更改日志信息的输出模式以包含日志记录器的信息，我们将看到类别\
  \ `test` 作为日志输出的一部分出现。指定 `category` 属性的全部意义在于能够为该类别或日志记录器包含一组不同的配置参数。\n\nListing\
  \ 9-3 展示了一个修改后的 \"log4j.properties\" 文件，其中包含了名为 `test` 的类别的配置。\n\nListing 9-3: 修改后的\
  \ log4j.properties 文件\n\n| **![开始示例](img/_1.gif)** |\n\n```\n# Sample properties\
  \ to initialize log4j\nlog4j.rootCategory=debug, stdout\nlog4j.logger.test=debug,\
  \ R\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\nlog4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\
  \n# Pattern to output the caller's file name and line number.\nlog4j.appender.stdout.layout.ConversionPattern=%5p\
  \ [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
  log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# Keep\
  \ one backup file\nlog4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
  log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n此配置文件定义了日志记录器 `test` 的配置。`test` 日志记录器的阈值级别为 DEBUG，并使用 `RollingFileAppender`\
  \ 对象将日志信息打印到名为 \"logtags.log\" 的文件中。请注意，用于格式化日志信息的 `conversionPattern` 包含了日志记录器的名称（`%c`）。\n\
  \n将此配置文件用于 `Log` 会将信息写入 \"%TOMCAT_HOME%\\bin\" 目录下的 \"logtags.log\" 文件中。如果我们使用此修改后的配置文件执行示例\
  \ JSP，我们将在 \"logtags.log\" 文件中看到以下输出：\n\n```\n DEBUG Thread-11 root - Message embedded\
  \ within open and close <log> tags.\nDEBUG Thread-11 root - Message passed as an\
  \ attribute to the <log> tag\nINFO Thread-11 test - Hello how are you?\n```\n\n\
  这就是我们如何使用具有自定义配置的不同日志记录器来处理日志信息。如果我们在 JSP 中指定了 `category` 属性，但没有为其指定配置，`Log` 将使用根日志记录器配置来处理日志请求。\n\
  \n## 日志标签描述\n\n`Log` 标签库提供了与 log4j 中声明的级别相对应的标签。Table 9-1 总结了所有 `Log` 标签库的标签及其属性。\n\
  \n表 9-1：日志标签汇总\n\n| 标签名称 | 标签描述 | 属性名称 | 是否必需 |\n| --- | --- | --- | --- |\n| `debug`\
  \ | 显示 DEBUG 级别的消息 | `category message` | 否 否 |\n| `info` | 显示 INFO 级别的消息 | `category\
  \ message` | 否 否 |\n| `warn` | 显示 WARN 级别的消息 | `category message` | 否 否 |\n| `error`\
  \ | 显示 ERROR 级别的消息 | `category message` | 否~ 否 |\n| `fatal` | 显示 FATAL 级别的消息 | `category\
  \ message` | 否 否 |\n| `dump` | 显示指定范围内的所有变量 | `scope` | 是 |\n\n如您所见，这些 `Log` 标签的使用非常简单。除\
  \ `dump` 之外的所有标签都有两个可选属性：`category` 和 `message`。可以将日志信息指定为 `message` 属性的值，也可以将其包含在标签内。例如，我们可以通过以下两种方式使用\
  \ `error` 标签：\n\n```\n<log:error message=\"This is an error message\"> </log:error>\n\
  <log:error>This is an error message</log:error>\n```\n\nTable 9-1 中提到的 `dump` 标签旨在打印通过\
  \ `scope` 属性指定的范围内的所有变量。Listing 9-4 `SimpleLogDump.jsp` 是 Listing 9-1 中 JSP 的修改版本，并在页面中添加了一个\
  \ `dump` 标签。\n\nListing 9-4: SimpleLogDump.jsp\n\n| **![开始示例](img/_1.gif)** |\n\n\
  ```\n<html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\" prefix=\"\
  log\" %>\n<BODY>\n<h1>Test Log Tag Library</h1>\n<log:debug>Message embedded within\
  \ open and close tags.</log:debug>\n<log:debug message=\"Message passed as an attribute\
  \ to the tag\" />\n<log:info category=\"test\">Using category attribute.</log:info>\n\
  You should see output in the debug logs now.\n<H4>request</H4>\n<log:dump scope=\"\
  request\" />\n<H4>page</H4>\n<log:dump scope=\"page\" />\n<H4>session</H4>\n<log:dump\
  \ scope=\"session\" />\n<H4>application</H4>\n<log:dump scope=\"application\" />\n\
  </BODY>\n</html>\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在此 JSP 中，我们展示了 `dump`\
  \ 标签在所有可能的 `scope` 属性值下的输出。Figure 9-2 显示了页面上显示的内容。\n\n![点击展开](img/fig9-2_0.jpg)\n\
  图 9-2：SimpleLogDump.jsp 页面\n\n## 使用日志标签库创建自定义标签以使用自定义级别\n\n在 第 8 章 中，我们了解了如何编写自定义的\
  \ `Level` 类 TRACE，并将其与 log4j 一起使用。如果我们想将 TRACE 自定义级别与 `Log` 标签库一起使用，则必须扩展 `Log`\
  \ 标签库框架。通常，我们可以通过执行以下任务来实现：\n\n*   编写一个新的 `Tag` 类来表示自定义级别 TRACE。\n*   使新的 `Tag`\
  \ 和 `Level` 类对应用程序可用。\n*   修改 \"taglib-descriptor\" 文件以描述新标签。\n\n在接下来的章节中，我们将探讨如何实现这些任务，以便将\
  \ TRACE 级别与 `Log` 标签库一起使用。\n\n\n\n### 创建新标签\n\n在 `Log` 标签库中，所有标签类都继承自 `abstract`\
  \ 类 `LoggerTag`。`LoggerTag` 类本身是 `BodyTagSupport` 类的子类，负责处理与标签相关的所有操作。它还定义了一个 `abstract`\
  \ 方法 `getPriority()`，该方法在 `LoggerTag` 类的所有其他子类中实现。所有其他标签类，如 `ErrorTag`、`InfoTag`\
  \ 等，都是 `LoggerTag` 的子类，并为 `getPriority()` 方法提供实现。因此，要定义一个新标签，我们只需扩展 `LoggerTag`\
  \ 类，并提供一个返回自定义级别 TRACE 的 `getPriority()` 方法实现。清单 9-5 `TraceTag.java` 演示了如何使用自定义级别\
  \ TRACE 编写自定义标签。\n\n清单 9-5: TraceTag.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
  package com.apress.logging.log4j.customtag;\n\nimport org.apache.taglibs.log.LoggerTag;\n\
  import org.apache.log4j.Priority;\nimport com.apress.logging.log4j.CustomLevel;\n\
  \npublic class TraceTag extends LoggerTag\n{\n    protected Priority getPriority()\n\
  \    {\n        return CustomLevel.TRACE;\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n要开发这个自定义标签，我们复用了第 8 章中开发的自定义级别 TRACE（参见清单 8-9）。如您所见，创建一个使用新级别的新标签非常简单。清单\
  \ 9-6 显示了需要添加到现有 \"taglibs-log.tld\" 文件中的标签库描述。（该文件随 `Log` 发行版一起提供。）\n\n清单 9-6:\
  \ 自定义 Trace 标签的标签描述\n\n| **![开始示例](img/_1.gif)** |\n\n```\n <tag>\n    <name>trace</name>\n\
  \    <tagclass>com.apress.logging.log4j.customtag.TraceTag</tagclass>\n    <attribute>\n\
  \      <name>category</name>\n      <required>false</required>\n      <rtexprvalue>true</rtexprvalue>\n\
  \    </attribute>\n    <attribute>\n      <name>message</name>\n      <required>false</required>\n\
  \      <rtexprvalue>true</rtexprvalue>\n    </attribute>\n</tag>\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n|  | 注意  | 标签的名称指定为 `trace`。因此，在 JSP 中，我们需要使用名称 `trace` 来访问此标签。 |\n\
  \n### 自定义 Trace 标签的实际应用\n\n一旦我们准备好了用于级别 TRACE 的标签类，并修改了 \"taglibs-log.tld\" 文件以包含新\
  \ `trace` 标签的定义，我们就可以开始在 JSP 中使用它了。为了设置 Tomcat 以使用这个新标签，我们需要执行以下步骤：\n\n1.  将所需的新\
  \ `TraceTag` 和 `CustomLevel` 类复制到 Web 应用程序中适当的目录结构下。例如，如果 Web 应用程序目录是 \"TestLogTags\"\
  ，则需要在 \"TestLogTags\\WEB-INF\\classes\" 目录下创建相应的包结构。\n\n2.  编辑 \"Tomcat.bat\" 文件，将\
  \ \"taglibs-log.jar\" 文件包含到 classpath 中。\n\n3.  修改 \"log4j.properties\" 文件，将阈值级别设置为\
  \ TRACE。根日志记录器的默认阈值级别是 DEBUG，它高于 TRACE 级别。因此，在默认配置下，TRACE 级别的消息将不会被发布。清单 9-7 展示了为使用\
  \ TRACE 级别而修改后的 \"log4j.properties\" 文件。\n\n清单 9-7: 为使用 TRACE 级别修改后的 log4j.properties\
  \ 文件\n\n| **![开始示例](img/_1.gif)** |\n\n```\nlog4j.rootCategory=trace#com.apress.logging.log4j.CustomLevel,\
  \ stdout\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\nlog4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\
  \n# 输出调用者文件名和行号的模式。\nlog4j.appender.stdout.layout.ConversionPattern=%5p [%t] (%F:%L)\
  \ - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\nlog4j.appender.R.File=logtags.log\n\
  \nlog4j.appender.R.MaxFileSize=100KB\n# 保留一个备份文件\nlog4j.appender.R.MaxBackupIndex=2\n\
  \nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\nlog4j.appender.R.layout.ConversionPattern=%p\
  \ %t %c - %m%n\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n完成这些设置后，执行清单 9-8 中展示的\
  \ JSP。该 JSP 包含一条 TRACE 级别的消息。\n\n清单 9-8: SimpleLogTrace.jsp\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\n<html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\"\
  \ prefix=\"log\" %>\n<BODY>\n<h1>测试日志标签库</h1>\n<log:trace>Trace 级别消息。</log:trace>\n\
  您现在应该在调试日志中看到输出。\n</BODY>\n</html>\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
  \n执行此 JSP 将在 Web 服务器控制台中产生以下带有 TRACE 级别的消息：\n\n```\nTRACE [Thread-11] (LoggerTag.java:109)\
  \ - Trace 级别消息。\n```\n\n## 结论\n\n在本章中，我们讨论了 Apache 新发布的标签库 `Log`，用于在 JSP 中使用 log4j\
  \ 执行日志记录。这解决了长期以来在 JSP 内部进行可控日志记录的问题。通过更改配置，可以将日志信息重定向到任何首选目标，并以任何期望的格式输出。但是，在将\
  \ CPU 密集型日志记录操作（例如将日志数据写入数据库）包含到 Web 应用程序中之前，需要仔细考虑，因为这可能会影响该应用程序的性能。\n\n至此，log4j\
  \ 的讨论就结束了。第 5 章 到第 9 章 中解释的所有主题应该能帮助您理解 log4j 的内部机制以及如何在实际应用中使用它。提供的小示例应该能让您掌握所介绍的概念，并快速看到结果，从而更好地理解\
  \ log4j 的使用。更广泛的示例应该能帮助您将 log4j 的使用与实际应用程序联系起来。\n\n关于任何主题，总有一些东西需要学习。但我们创建了一个框架并赋予了它形状，现在您已经具备了在此基础上进行构建的能力。不过，在结束之前，我们肯定需要在下一章中探讨一些涉及使用不同日志记录\
  \ API 的最佳实践。\n\n"
- "# 第 10 章：最佳实践\n\n\n\n## 概述\n\n在本书中，我们讨论了两种最流行的基于 Java 的日志记录 API：JDK 1.4 日志记录 API\
  \ 和 Apache log4j API。这两种日志记录 API 在功能上相似，但 log4j API 提供了更大的灵活性和更强大的日志记录能力。这两种 API\
  \ 都允许我们通过配置文件来配置和控制日志记录行为。这些 API 还提供了一系列我们可以用来在应用程序内部记录任何消息的方法。例如，我们可以通过编程方式覆盖日志记录框架中不同组件的状态。我们已经看到，在这两种日志记录\
  \ API 中，扩展现有的日志记录框架也是可能的，并且我们可以在框架内集成自己的自定义日志记录组件。这有助于我们在应用程序中实现特定的日志记录行为。尽管这非常有用，但在使用现有日志记录框架或通过添加自定义组件来扩展它时，仍有一些要点需要考虑。\n\
  \n请记住，日志记录并非大多数应用程序的主要目标。它仅仅是为了帮助我们跟踪应用程序的内部状态。它帮助我们更快地发现问题，发布消息以确定系统运行状况，并以更少的时间和成本维护和调试应用程序。另一方面，错误地使用日志记录可能会影响应用程序的速度和功能。因此，在为日志记录过程选择正确的组件以及使用这些组件的最佳方式时，需要格外小心。检查自定义日志记录组件是否以任何方式影响现有组件的速度和完整性也非常重要。\n\
  \n在本章中，我们将讨论一些对日志记录性能至关重要的要点。除非另有说明，这些要点对于 JDK 1.4 日志记录 API 和 Apache log4j API 均适用。\n\
  \n最后，本章将从内部工作机制和性能方面对 log4j 和 JDK 1.4 日志记录 API 进行比较，以便在您自己的应用程序中实现日志记录时，您能知道哪个 API\
  \ 最能满足您的需求。\n\n## 获取日志记录器\n\n在 JDK 1.4 日志记录 API 和 log4j 中，日志记录框架的入口点是 `Logger` 对象。我们获取一个\
  \ `Logger` 对象的实例，并让它以不同的级别记录不同的消息。通常，在应用程序中，我们会获取命名的日志记录器。这些 `Logger` 对象应该使用什么命名约定呢？\n\
  \n对于日志记录器的名称应该是什么，并没有严格的规定。尽管如此，我们在为应用程序中的 `Logger` 对象选择命名约定时仍需格外小心。我们通过配置文件来配置一个\
  \ `Logger`。我们如何知道哪个应用程序组件正在使用哪个 `Logger` 对象？如果我们更改某个特定日志记录器的配置，它将如何影响整个应用程序？想象一下，我们有一个包含数百个不同组件的应用程序，它们都使用一个公共的日志记录配置文件。在这种情况下，我们肯定需要为日志记录器对象制定一个命名策略，以便我们知道每个组件正在使用哪些单独的日志记录器。通过采用设计良好的命名约定，我们可以轻松评估对特定日志记录器配置所做的任何更改所产生的影响。\n\
  \n|  | 最佳实践 | 对 `Logger` 对象使用基于包的命名约定。 |\n\n一个很好的命名约定思路是基于包的命名。通常，应用程序组件被划分到多个包中。每个包又包含应用程序特定方面的相关类。使用基于包名的\
  \ `Logger` 对象是一个好习惯，因为这种约定易于维护。\n\n|  | 最佳实践 | 当同一包中的组件可能需要不同的日志记录行为时，应根据组件执行的任务来区分日志记录器。\
  \ |\n\n紧接着出现的问题是，一个包是否包含执行多种不同活动的类。例如，包 `com.apress.logging.log4j.util` 可能包含许多工具类。如果所有这些类都使用名为\
  \ `com.apress.logging.log4j.util` 的同一个日志记录器，那么更改此日志记录器的配置将影响该包内的所有工具类。这可能是不希望的。例如，`util`\
  \ 包中的一个类可能正在将数据写入文件，而另一个类可能正在将数据发送到远程 TCP/IP 服务器。我们可能需要为执行 TCP/IP 操作的类启用详细的日志记录，但可能不需要为执行文件\
  \ I/O 的类提供相同级别的详细日志记录。在这种情况下，使用两个不同的日志记录器并根据它们执行的工作来命名可能会有所帮助。\n\n要点在于为应用程序中使用的日志记录器制定一个合适的命名约定。这将提高日志记录器的可维护性。同时，它也有助于避免一个日志记录器的配置更改影响其他日志记录器这种不期望的情况发生。\n\
  \n## 使用日志记录器层次结构\n\nJDK 1.4 日志记录 API 和 log4j 都支持日志记录器层次结构。日志记录器以父子关系组织。例如，名为 `com.foo`\
  \ 的日志记录器是子日志记录器 `com.foo.bar` 的父日志记录器。在日志记录器层次结构中，子日志记录器从其直接父日志记录器继承属性和日志记录器组件。简而言之，这意味着子日志记录器捕获的所有日志记录事件将由子日志记录器本身及其父日志记录器共同处理。这也可能意味着，如果子日志记录器和父日志记录器使用相同的日志记录目标，日志消息将出现两次，这可能是不希望的。当然，在这两种\
  \ API 中，我们都可以关闭层次结构中对父日志记录器的使用。在 JDK 1.4 日志记录 API 中，使用以下代码：\n\n```\nsetUseParentHandlers(false);\n\
  ```\n\n在 log4j 中，使用\n\n```\nsetAdditivity(false);\n```\n\n或者通过配置文件添加以下行：\n\n```\n\
  log4j.logger.[logger name].additivity=false\n```\n\n同样，在某些情况下，我们可能希望启用此日志记录器层次结构。\n\
  \n|  | 最佳实践 | 当一个应用程序组件试图通过使用属于同一包的不同组件将相同的信息记录到不同的目标时，尝试使用日志记录器层次结构。 |\n\n想象一个订单处理应用程序，其中组件\
  \ `A` 接收订单。它处理订单，现在需要将特定于订单的日志记录信息存储到文件中，并且还希望将相同的信息发送回公司日志记录数据库。应用程序组件 `B` 将数据写入本地文件，组件\
  \ `C` 将日志记录信息写入公司数据库。现在需要考虑的重要点是，应用程序组件 `A`、`B` 和 `C` 是否属于一个包层次结构。例如，组件 `B` 和 `C`\
  \ 可能属于包 `com.processor`，而组件 `A` 可能属于包 `com.processor.order`。另一个组件 `D` 可能处理基于电子邮件的订单，并且可能位于包\
  \ `com.processor.order.email` 中。在这种情况下，我们可以利用父子日志记录器关系。\n\n要点在于，我们需要判断日志记录器是否能够基于日志记录活动（而不仅仅是包结构）来证明父子关系的合理性。如果它们在日志记录行为方面是父子关系，那么就使用这种关系。\n\
  \n|  | 最佳实践 | 如果启用了日志记录器层次结构，日志记录框架需要确定父日志记录器（在日志记录器树中递归向上查找）。这可能会降低性能。 |\n\n使用\
  \ log4j 的基准测试结果表明，遍历日志记录器层次结构比正常的日志记录活动慢三倍。因此，在确定是否在应用程序中使用日志记录器层次结构时需要格外小心。本书提供的示例旨在保持父子关系关闭，除非有必要演示父子关系是如何工作的。\n\
  \n\n\n## 高效记录日志信息\n\n记录什么以及如何记录？这些问题的答案决定了特定应用程序日志记录的有效性。请谨慎选择并制定策略，明确哪些信息用于调试，哪些信息用于日常维护。仔细决定在何处记录信息。还要决定日志消息的格式，以便将来其他应用程序能够处理和分析这些信息。\n\
  \n|  | 最佳实践 | 避免记录不必要的信息。这会使日志跟踪变得混乱，增加分析难度。 |\n\n冗余且不必要的日志信息会在性能和实用性方面影响应用程序。即使我们在已部署的应用程序中关闭了某个日志级别，日志框架仍需为每条日志消息执行额外的级别检查。这种针对包含冗余和不必要信息的日志请求进行的级别检查，会影响整体日志记录的性能。因此，最好避免在应用程序中包含此类日志请求。\n\
  \n|  | 最佳实践 | 避免在日志请求中使用参数构造。 |\n\n在开发自己的应用程序时，您可能认为已经避免了不必要的日志请求；然而，您可能仍然会遇到类似下面的日志请求：\n\
  \n```\nlogger.info(\"这是 \"+var1+\" 来自方法 \"+var2+\" 的日志\");\n```\n\n这里涉及的成本是参数构造。请使用简单的\
  \ Java 技术，例如使用 `StringBuffer` 来拼接 `String` 对象，避免使用 \"+\" 连接两个 `String` 对象。这只是一个例子。一个编码糟糕的应用程序可能包含多个此类语句。\n\
  \n|  | 最佳实践 | 在尝试记录日志之前，先检查日志是否已启用。 |\n\n假设我们有一个应用程序，它会记录客户订单列表中的所有条目（这几乎不可能！）。所有级别为\
  \ DEBUG 的信息都会被打印出来：\n\n```\nArrayList list;\nint length = list.size();\n\nfor(int\
  \ k=0;k<size;k++)\n{\n    logger.debug(\"客户: \"+ ( (Customer)list.get(k) ).toString()\
  \ );\n}\n```\n\n如果 DEBUG 级别被关闭了会发生什么？在 `for` 循环内部，参数构造仍然会发生，日志记录器会检查 DEBUG 级别是否启用，如果未启用，则会丢弃该请求。为了避免这种情况，我们可以这样写：\n\
  \n```\nif(logger.isDebugEnabled())\n{\n    //在此处执行 for 循环\n}\n```\n\n这将节省不必要的参数构造开销。另一方面，如果\
  \ DEBUG 级别已启用，则评估 DEBUG 级别是否启用可能会产生额外的开销。但与参数构造相比，这是一个微不足道的开销，因为它只占实际日志记录时间的 1%\
  \ 左右。\n\n## 本地化问题\n\n通过 `java.util.ResourceBundle` 对象实现日志信息的本地化，是一个以不同语言发布日志信息的优秀特性。然而，决定在\
  \ log4j 中使用本地化功能可能比较棘手。\n\n|  | 最佳实践 | 当您不使用本地化功能时，不要使用 `ResourceBundle` 对象。 |\n\
  \n构造和使用 `ResourceBundle` 对象的成本很高。如果您的应用程序目前只支持一种语言，请避免在代码中使用本地化。您将来随时可以启用此功能以支持不同的语言。\n\
  \n## 使用位置信息\n\nJDK 1.4 日志 API 和 log4j 都支持日志请求的位置信息。JDK 1.4 日志 API 尝试从堆栈跟踪中确定日志请求的类和方法的名称。log4j\
  \ API 则尝试检测发出日志请求的代码的确切行号。\n\n|  | 最佳实践 | 确定位置信息是一项成本高昂的操作。如果可能，最好在应用程序日志记录中避免使用它。\
  \ |\n\n动态生成位置信息并不可靠。它可能无法与许多使用优化技术的编译器正常工作。此外，日志框架需要遍历堆栈跟踪来确定位置信息，这会带来大量的额外开销。\n\
  \n## 格式化日志信息\n\n日志信息的格式化很重要。一方面，信息越多越好。另一方面，每一点信息都会消耗 CPU。我们需要仔细决定日志信息的格式。有多种选择。XML\
  \ 格式比简单的基于文本的输出成本更高，但 XML 格式的日志信息更具可重用性和可移植性。\n\nlog4j 中的 `PatternLayout` 对象在定义最终日志信息的元素和格式化指令方面提供了极大的灵活性。使用\
  \ `PatternLayout`，我们可以精确控制任何目标位置中日志信息的内容。对于基于 XML/HTML 的日志信息，我们需要使用单独的 `Layout`\
  \ 对象。`PatternLayout` 负责格式化日志信息的内容，不参与日志信息的呈现。\n\n日期是格式化时的主要关注点之一，因为它们很复杂且性能成本高昂。log4j\
  \ API 提供了多种日期格式化对象，例如 `DateLayout` 和 `ISO8601DateFormat`。在所有可用的日期格式中，`ISO8601DateFormat`\
  \ 是最便宜且最快的。\n\n## 使用渲染器对象\n\n在 log4j 中，`Renderer` 对象用于为传递给日志框架进行记录的任意 `Object` 构建一个\
  \ `String` 表示形式。\n\n|  | 最佳实践 | `Renderer` 对象遵循类层次结构。任何超类 `Renderer` 都能够渲染其子类。 |\n\
  \n例如，如果我们有一个 `VehicleRenderer` 对象，只要 `Car` 是 `Vehicle` 的子类，它就能渲染 `Car` 对象。\n\n|\
  \  | 最佳实践 | 对于子类的专门化渲染，请注册一个特定于子类的 `Renderer`。在这种情况下，不会调用超类 `Renderer`。 |\n\n例如，我们可以注册一个\
  \ `CarRenderer` 对象来渲染所有 `Car` 对象，在这种情况下，`VehicleRenderer` 将不会被用来渲染 `Car` 对象。\n\n\
  ## 使用异步日志记录\n\nlog4j API 提供了 `AsyncAppender` 对象来执行异步日志记录。该对象将日志事件存储在一个有界缓冲区中，并在达到最大缓冲区大小时释放这些事件。JDK\
  \ 1.4 日志 API 也通过 `MemoryHandler` 对象提供了类似的功能。\n\n|  | 最佳实践 | `AsyncAppender` 和 `MemoryHandler`\
  \ 并不总能提高性能。 |\n\n如果有界缓冲区很快被填满，那么管理有界缓冲区会产生额外的开销，从而降低性能。但是，在涉及长时间阻塞的网络或 I/O 访问，或者\
  \ CPU 密集型操作较少的情况下，使用 `AsyncAppender` 或 `MemoryHandler` 是非常有效的。\n\n\n\n## 使用过滤器对象\n\
  \n在第 5 章关于 log4j 的讨论中，我们看到了 `Filter` 对象的示例，它们除了根据日志级别进行过滤外，还能根据某些特定于应用程序的标准来过滤日志请求。我们还了解了过滤器链如何使得根据多个标准检查日志请求成为可能。\n\
  \n但过滤器链涉及加载多个 `Filter` 对象，并调用每个对象的 `decide()` 方法来过滤日志请求。我们在第 8 章中演示的一种替代方案是编写一个自定义的\
  \ `Filter` 对象。\n\n|  | 最佳实践  | 尽量在一个 `Filter` 对象中完成尽可能多的操作。 |\n\n在需要创建多个自定义 `Filter`\
  \ 对象的情况下，请尝试将它们设计成这样一个 `Filter` 对象可以服务于多种常见的过滤目的。毫无疑问，在一个 `Filter` 对象中嵌入各种应用程序逻辑会使其难以复用，并将其限制在特定的应用场景中。尽管如此，在某些情况下，这种做法仍然值得考虑。\n\
  \n假设我们正尝试将日志信息记录到文件中。我们想要检查日志事件是否由某个特定应用程序生成，以及它是否拥有执行文件 I/O 操作所需的必要安全权限。理论上，我们可以设计两个\
  \ `Filter` 对象：一个用于检查应用程序来源，另一个用于权限检查。这样，我们就有了两个可复用的 `Filter` 对象，分别用于事件来源检查和文件 I/O\
  \ 权限检查，这很好。但是，如果我们并非在编写供其他应用程序使用的通用日志组件，那么这可能就没那么必要了。尝试将这两个检查过程合并到一个 `Filter` 对象中。这将节省加载和调用两个\
  \ `Filter` 对象所需的时间。\n\n依作者之见，`Filter` 对象的设计是特定于应用程序的，并且通常需要一些耐心和时间来决定如何设计 `Filter`\
  \ 对象。有时，你可能需要设计出能被许多其他应用程序组件复用的通用 `Filter` 对象；而有时，你则会编写特定于某个应用领域的 `Filter` 对象。在决定编写单个还是多个\
  \ `Filter` 对象之前，你需要进行权衡。\n\n## 使用嵌套诊断上下文\n\nlog4j API 提供了嵌套诊断上下文（NDC）对象，用于用客户端特定的信息来填充日志信息。例如，处理多个客户端的基于服务器的应用程序（例如\
  \ servlet）通常需要区分由不同客户端活动产生的日志跟踪信息。\n\n|  | 最佳实践  | 在处理多个客户端的服务器端组件中使用 `NDC` 来区分客户端。\
  \ |\n\n`NDC` 的核心理念是包含唯一的客户端特定信息。在决定将哪些信息放入 `NDC` 以及其唯一性程度时需谨慎。\n\n## 配置问题\n\nlog4j\
  \ API 同时支持属性样式和 XML 样式的配置文件。还有一种通过编程方式配置每个 log4j 组件的方法。但是，如果不修改源代码，就无法更改编程式配置。为了充分利用\
  \ log4j 高度可配置的特性，我们必须通过配置文件来配置 log4j。\n\n这一点同样适用于 JDK 1.4 日志 API。尽管 JDK 1.4 日志 API\
  \ 不像 log4j 那样高度可配置，但我们仍然必须坚持通过配置文件来配置它。目前，JDK 1.4 日志 API 仅支持属性样式的配置。\n\n并非 log4j\
  \ 中的所有组件都可以通过属性样式的配置进行配置。因此，使用 XML 样式的配置文件通常是一个更好的实践。\n\n如果你需要在系统运行期间更改配置，则必须为 log4j\
  \ 配置实现 `configureAndWatch` 选项。这样，你就可以在不关闭系统的情况下更改配置文件。log4j 框架会在指定的时间间隔（默认为 60 秒）内检查配置是否发生更改，如果配置已更改，则会重新初始化框架。\n\
  \n可以通过在应用程序的起始点调用以下代码来使用 `ConfigureAndWatch` 属性：\n\n```\nPropertyConfigurator.configureAndWatch(props);\n\
  ```\n\n或\n\n```\nDOMConfigurator.configureAndWatch(configFileName);\n```\n\nlog4j\
  \ 框架将使用相同的配置文件来配置自身，只是额外增加了一个监视配置更改的功能。在基于服务器的应用程序中使用 log4j 时，如果每次日志配置更改都关闭服务器可能很困难，那么这一功能通常非常有用。\n\
  \n## 比较 log4j 和 JDK 1.4 日志 API\n\n也许你已经注意到 log4j 和 JDK 1.4 日志实现之间惊人的相似之处。它们共享相同的基本组件，例如\
  \ `Logger`、`Level`、`Appender`/`Handler`、`Layout`/`Formatter`。这两个 API 在内部架构上也高度相似。然而，有一些基本的差异值得一提，其中一些差异在选择使用哪个日志\
  \ API 时可能至关重要。表 10-1 总结了这两个日志 API 之间的差异，随后将对每一点进行更详细的讨论。\n\n表 10-1：JDK 1.4 日志 API\
  \ 与 Apache log4j 的比较\n\n| 特性 | JDK 1.4 日志 API | Apache log4j |\n| --- | --- | ---\
  \ |\n| 配置 | JDK 1.4 日志 API 从 JDK 提供的默认配置文件开始。在 JDK 1.4 日志 API 中，配置文件中的配置顺序是顺序性的。父记录器必须在子记录器之前配置。JDK\
  \ 1.4 日志 API 仅支持属性样式配置。 | Apache log4j 不假定任何默认配置。它会在类路径中查找 \"log4j.properties\"\
  \ 或 \"log4j.xml\" 文件来初始化自身。在 log4j 中，配置顺序对初始化没有影响。Apache log4j 同时支持属性和 XML 样式的配置。\
  \ |\n| 日志信息格式化 | JDK 1.4 日志 API 仅以文本格式或 XML 格式呈现日志信息。 | Apache log4j 支持多种输出格式，例如\
  \ HTML、XML、文本等。可以通过指定模式来控制日志信息的内容。 |\n| 输出目标 | JDK 1.4 日志 API 仅支持套接字、控制台、文件和内存缓冲区作为输出目标。\
  \ | Apache log4j 支持更广泛的日志输出目标，包括 JMS 和数据库，以及 Telnet、SMTP 等协议。 |\n| 过滤 | JDK 1.4\
  \ 日志 API 允许将过滤器附加到 `Logger` 和 `Handler` 对象上。JDK 1.4 日志 API 无法实现针对多个标准的过滤器链。 | Apache\
  \ log4j 仅将过滤器附加到 `Appender` 对象上。Apache log4j 支持过滤器链。 |\n| 位置信息 | JDK 1.4 日志 API\
  \ 会自动尝试确定日志请求的位置信息。无法控制此行为。 | 在 log4j 中，可以配置是否将位置信息包含在日志信息中。 |\n| 错误处理 | JDK 1.4\
  \ 日志 API 会将任何运行时异常抛回给调用应用程序。除非处理这些异常，否则可能导致应用程序崩溃。 | 在 log4j 中，错误在内部处理，不会抛回给调用应用程序。这使得应用程序和日志功能相互独立。\
  \ |\n\n\n\n### 配置选项对比\n\n与 log4j 不同，JDK 1.4 为日志记录 API 自带了一个默认配置文件。即使是应用程序开发者也无需定义任何自定义配置文件；JDK\
  \ 1.4 日志记录 API 会使用默认配置文件自行配置。然而，log4j 不会对日志记录环境做任何假设。如果在执行环境的类路径中未找到配置文件，log4j 将无法正确初始化。\n\
  \n在配置选项方面，log4j 更加灵活，因为它同时支持属性样式和 XML 样式的配置。而 JDK 1.4 日志记录 API 仅支持属性样式的配置。\n\n此外，JDK\
  \ 1.4 的配置是顺序相关的——也就是说，配置的顺序很重要。例如，请看以下配置顺序：\n\n```\na.b.level=SEVERE\na.level=INFO\n\
  ```\n\n你可能会惊讶地发现，日志记录器 `a.b` 将被分配其父日志记录器的级别 INFO。这是因为父日志记录器是在子日志记录器之后配置的，并且所有子日志记录器的配置都已根据父日志记录器的配置进行了更新。因此，在\
  \ JDK 1.4 日志记录 API 中，子日志记录器的设置应出现在父日志记录器的设置之后。父日志记录器会更新其子日志记录器的设置。\n\nlog4j 的配置与顺序无关。在\
  \ log4j 中，子日志记录器通过向上遍历层次结构，自动从其直接父日志记录器继承设置。\n\n### 格式化器与布局对象对比\n\n两种日志记录 API 都提供了格式化待生成日志信息的机制。在\
  \ log4j 中，这些对象被称为 `Layout` 对象，而在 JDK 1.4 日志记录 API 中，它们被称为 `Formatter` 对象。然而，JDK\
  \ 1.4 日志记录 API 仅提供了两个 `Formatter` 对象：`SimpleFormatter` 和 `XMLFormatter`。log4j API\
  \ 则提供了大量的 `Layout` 对象，能够以多种格式（如 HTML、XML、文本等）格式化信息。log4j API 还提供了 `PatternLayout`，这是一种强大的机制，用于在最终的日志输出中包含或排除日志事件的不同部分。\n\
  \n### 处理器与附加器对象对比\n\nJDK 1.4 日志记录 API 提供了 `Handler` 对象，用于将日志信息发布到首选目标。类似地，log4j\
  \ 提供了 `Appender` 对象来发布日志信息。目前，JDK 1.4 日志记录 API 只能发布到控制台、文件、套接字和内存缓冲区。然而，log4j 为日志记录目标提供了更多选择。使用\
  \ log4j，我们可以将日志信息发布到各种目标，例如控制台、文件、数据库、JMS、NT 事件日志、UNIX Syslog 等。\n\n当然，两种 API 都可以扩展，以提供任意数量的自定义\
  \ `Handler` 和 `Formatter` 对象，从而支持记录到任何其他特定于应用程序的目标。但默认情况下，log4j 几乎涵盖了所有常用的日志记录目标。\n\
  \n### 过滤器对象对比\n\nJDK 1.4 日志记录 API 提供了将 `Filter` 对象附加到 `Logger` 和 `Handler` 对象的功能。借助\
  \ `Filter` 对象，可以对日志记录决策进行更精细的控制。JDK 1.4 日志记录 API 只允许一个 `Filter` 对象与一个日志记录器关联。\n\n\
  然而，在 log4j 中，`Filter` 对象只能附加到 `Appender` 对象上。但 log4j 的 `Filter` 对象提供了更强大的功能。正如我们在第\
  \ 8 章中讨论的，可以链接多个 `Filter` 对象来实现复杂的日志记录决策。我们还可以为特定的 `Appender` 对象配置多个 `Filter` 对象。JDK\
  \ 1.4 日志记录 API 在这些 `Filter` 对象特性方面有所欠缺。JDK 1.4 日志记录 API 中的 `Filter` 对象要么接受要么拒绝一个日志记录请求，但它不能忽略一个日志记录请求并将其委托给其他\
  \ `Filter` 对象。因此，在 JDK 1.4 日志记录 API 中无法实现 `Filter` 链。\n\n### 位置信息选项对比\n\nJDK 1.4\
  \ 日志记录 API 和 log4j 都能够生成关于日志记录请求产生位置的信息。然而，生成位置信息在性能方面代价非常高。\n\n在 log4j 中，我们可以根据应用程序的需要启用或禁用位置信息。默认情况下，位置信息不是日志输出的一部分。我们可以通过在\
  \ `PatternLayout` 对象中指定位置信息属性来启用它，如第 6 章所述。\n\n与 log4j 不同，JDK 1.4 日志记录 API 总是试图确定位置信息，并且这是无法避免的。此外，JDK\
  \ 1.4 日志记录 API 用于动态生成位置信息的技术并非完全可靠。通常，这是通过分析应用程序的堆栈跟踪来完成的。但许多编译器采用不同的优化技术，这可能导致堆栈跟踪分析失败或产生错误信息。因此，应用程序开发者倾向于避免将位置信息作为日志输出的一部分。\n\
  \n### 错误处理对比\n\nJDK 1.4 日志记录 API 的主要缺点在于它会将 `RunTimeException` 抛回给应用程序中的调用类。如果这些异常未在应用程序内部得到处理，应用程序将会崩溃。如果应用程序崩溃是由于日志记录本身的问题而非应用程序自身的问题，这种情况尤其不受欢迎。\n\
  \n然而，log4j API 在处理日志记录操作中产生的错误和异常方面更加优雅。log4j 中的所有 `Appender` 对象都有一个关联的 `ErrorHandler`\
  \ 对象。诸如 `OnlyOnceErrorHandler` 之类的 `ErrorHandler` 对象会在错误首次发生时向控制台输出一条消息，并忽略后续的错误。这使得即使日志记录出现问题，应用程序也能继续正常运行。可以通过分析控制台消息来检测日志记录功能的问题，然后最终予以纠正。\n\
  \n此外，在 log4j 中，可以定义自定义的错误处理组件，这些组件可以执行各种操作来优雅地处理错误情况。这只需通过更改配置文件来使用任何 `ErrorHandler`\
  \ 对象即可实现，完全不需要更改代码。\n\n## 结论\n\n至此，本书已接近尾声。我希望本书讨论的主题能为您提供关于两种最常用的基于 Java 的日志记录\
  \ API——JDK 1.4 日志记录 API 和 Apache log4j API——足够坚实的基础。两者都设计良好且易于使用。考虑到这两种 API 的现状，在我看来，log4j\
  \ 略胜一筹。但同样，您并非总是需要如此复杂的日志记录机制。重要的是要理解，随着时间的推移，软件应用程序正变得越来越具有业务关键性。在这种背景下，具有更好可维护性和快速修复能力的应用程序将在市场中胜出。应用程序中精心规划的日志记录框架无疑将帮助其在竞争激烈的市场中占据优势。因此，现在是我们所有人重新考虑日志记录在应用程序中重要性的时候了。\n\
  \n随着大量建议不断通过 Sun 和 Apache 的邮件列表针对各自的日志记录 API 提出，我们很快将看到这两种 API 的改进和新特性。无论这些新特性是什么，本书中介绍的基础知识将保持不变，我希望本书现在和将来都能对您有所帮助。\n\
  \n"
