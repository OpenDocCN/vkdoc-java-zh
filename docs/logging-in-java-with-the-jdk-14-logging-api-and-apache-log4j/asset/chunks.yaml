  trans: "\n##### 启动 J2EE JMS 提供者\n\n首先，我们必须确保 `j2ee.jar` 已包含在类路径中。现在，使用以下命令启动 J2EE\
    \ 应用服务器：\n\n```\nj2ee -verbose\n```\n\n|  | 注意 | 请记得设置 J2EE_HOME 环境变量，使其指向 j2ee\
    \ 的安装位置。 |\n\n##### 创建主题\n\n接下来，我们创建一个名为 `loggingTopic` 的新主题，并使用以下命令将其添加到 JMS\
    \ 目标中：\n\n```\nj2eeadmin --addJmsDestination loggingTopic topic\n```\n\n#####\
    \ 运行订阅者\n\n将主题添加到 JMS 目标后，我们使用以下命令启动 `JMSLogSubscriber`：\n\n```\n java -Djms.properties=%J2EE_HOME%config/jms_client.properties\n\
    com.apress.logging.log4j.JMSLogSubscriber loggingTopic\n```\n\n请注意，我们将主题名称 `loggingTopic`\
    \ 作为命令行参数传递给程序。同时，我们通过 J2EE 自带的 `jms_client.properties` 文件向 J2EE 运行时提供 JMS 配置参数。\n\
    \n##### 运行客户端\n\n现在，我们准备执行示例程序。我们将 `jms.properties` 文件作为 log4j 配置文件传递给运行时。同时，我们通过\
    \ J2EE 自带的 `jms_client.properties` 文件向 J2EE 运行时提供 JMS 配置参数。\n\n```\njava -Dlog4j.configuration=jms.properties\
    \ -\nDjms.properties=%J2EE_HOME%config/jms_client.properties\ncom.apress.logging.log4j.AdvancedLogging\n\
    ```\n\n执行此程序会将所有日志信息发布到名为 `loggingTopic` 的主题。在订阅者控制台中，我们将看到以下消息到达：\n\n```\nMessage\
    \ received...\nMessage received:\nThe logger name: com.apress.logging.log4j\n\
    The message: Deposited 100.5\nnew balance: 100.5 Message received...\nMessage\
    \ received:\nThe logger name: com.apress.logging.log4j\nThe message: Withdrawn\
    \ 80.0 new balance: 20.5\nMessage received...\nMessage received:\nThe logger name:\
    \ com.apress.logging.log4j\nThe message: Failed to withdraw: balance: 20.5 attempted\
    \ withdraw: 50.0\n```\n\n请注意，所有日志消息都会打印在控制台中，并且即使在日志消息传递到主题后，应用程序也不会终止。这是因为主题连接仅在\
    \ `JMSAppender` 的 `close()` 方法中关闭。如果我们在完成后显式调用 `JMSAppender` 的 `close()` 方法或调用\
    \ `LogManager.shutdown()` 方法，主题连接将被关闭，控制台将被释放。\n\n这就是你需要了解的关于 `JMSAppender` 的全部内容。如你所见，令人印象深刻的是，无需对应用程序进行任何代码更改即可轻松实现。只需一个不同的配置文件，我们就大功告成了！\n\
    \n|  | 注意 | 基于 JMS 的日志记录能确保将日志信息传递给接收者，但不保证时间顺序。传递给接收者的日志信息可能不是按时间顺序排列的。解决此问题的一种方法是为每个日志请求使用带有每个发送者时间戳的\
    \ `NDC` 信息。不过，具体采用哪种最佳方式来处理此问题，取决于你的特定情况。 |\n\n## 使用 SocketAppender\n\n当我们希望将日志信息从一台机器传输到另一台机器时，就构成了分布式日志记录场景。我们已经了解了\
    \ `JMSAppender` 在将分布式应用程序组件的日志信息传递到中心位置方面非常有用。也可以使用基于 TCP/IP 的原始套接字连接将日志信息从一个位置传递到另一个位置。\n\
    \n在选择使用基于 JMS 还是基于套接字的机制来将日志信息从一台机器传输到另一台机器时，可能会有些棘手。尽管任何分布式架构的底层实现都是基于 TCP/IP\
    \ 的，但区别在于它们的运行方式。选择基于 JMS 还是原始套接字的通信方式来传输日志信息，或多或少取决于应用程序本身的架构。当你在决定是使用基于 JMS\
    \ 还是基于套接字的日志记录时，以下几点可能会对你有所帮助：\n\n*   当应用程序采用分布式架构时，应使用基于 JMS 的日志记录。请记住，支持客户端-服务器技术的应用程序不一定是分布式的。真正的分布式架构会拥有分布在多个不同位置的服务器端组件，供客户端使用。在这种情况下，基于\
    \ JMS 的日志记录更有效。\n\n*   在真正的分布式应用程序场景中，你总会有一个正在运行的应用服务器。基于 Java 的应用服务器通常都带有 JMS\
    \ 支持。因此，如果你的应用程序使用了任何应用服务器（出于某些正当理由），请考虑使用基于 JMS 的日志记录。\n\n*   基于套接字的日志记录适用于普通的客户端-服务器场景，即许多客户端与同一个服务器组件通信。如果你作为应用程序的一部分需要编写服务器组件，那么使用基于套接字的日志记录可能会更容易。请记住，在不使用分布式计算的情况下采用基于\
    \ JMS 的解决方案，将需要额外部署一个 JMS 提供者的成本。\n\n*   在任何你想要实现异步日志记录机制的应用程序场景中，基于 JMS 的解决方案都是理想且易于实现的。如果你不需要异步机制，那么基于套接字的日志记录机制可能会优于\
    \ JMS，前提是满足前面讨论的其他条件。\n\n`org.apache.log4j.net.SocketAppender` 提供了一种通过 TCP/IP\
    \ 将日志信息传输到远程服务器的方法。它基本上是将序列化后的 `LoggingEvent` 对象通过 TCP/IP 发送到远程日志服务器。`SocketAppender`\
    \ 对象具有以下相关特性：\n\n*   远程日志记录是*非侵入式的*。时间戳、`NDC` 信息和位置信息都会根据生成日志请求的客户端进行保留。\n\n*\
    \   `SocketAppender` 对象不使用任何 `Layout` 对象来格式化其数据。这是可以理解的，因为它以序列化形式将 `LoggingEvent`\
    \ 对象传输到服务器端。\n\n*   日志事件由原生 TCP 实现自动缓冲。\n\n### 容错性\n\n`SocketAppender` 的实现具有容错性。它可以处理或尝试解决不同的网络相关问题，例如链路断开或链路速度慢。通常，在出现故障时，`SocketAppender`\
    \ 会尝试执行以下操作：\n\n*   如果服务器可达，日志事件最终会到达服务器。\n\n*   如果远程服务器宕机且不可达，日志事件将被丢弃。但一旦服务器恢复，日志记录活动就会透明地重新开始。这种透明连接是通过一个连接器线程实现的，该线程会定期尝试连接到远程服务器。\n\
    \n*   如果与服务器的连接速度较慢，但快于日志事件的生成速率，客户端将受益于原生 TCP/IP 缓冲实现，并且不会受到链路速度的影响。\n\n*   如果链路速度慢于日志事件的生成速率，客户端将受到影响，因为它只能以网络速度运行。\n\
    \n*   如果网络链路正常但服务器宕机，客户端不会被阻塞，但日志事件会因服务器不可用而丢失。\n\n*   如果网络链路断开但服务器仍在运行，客户端将被阻塞，直到超时（正常的\
    \ TCP/IP 超时）或网络链路恢复。\n\n*   `SocketAppender` 不会自动被垃圾回收。在退出应用程序之前，务必显式调用 `SocketAppender`\
    \ 的 `close()` 方法或 `LogManager.shutdown()` 方法，以确保 `SocketAppender` 被关闭。但是，如果在 `SocketAppender`\
    \ 能够正常关闭之前 JVM 就退出了，管道中可能存在未传输的数据，这些数据可能会丢失。\n"
- fmt: "### Configuring SocketAppender\n\n`SocketAppender` has the configurable bean\
    \ properties listed in [Table 7-3](#LiB0055.html#ch07table03).\n\nTable 7-3: Configurable\
    \ Bean Properties in SocketAppender\n\n| Bean Property | Method | Description\
    \ | Default |\n| --- | --- | --- | --- |\n| `locationInfo` | `setLocationInfo(boolean)`\
    \ | Sets the location information parameter to `true` or `false` | `false` |\n\
    | `port` | `setPort(int)` | Sets the port number to connect to | 4560 |\n| `reconnectionDelay`\
    \ | `setReconnectionDelay(int)` | Number of milliseconds after which the connector\
    \ thread should try to reconnect to the server, in case it is down | 30,000 milliseconds\
    \ |\n| `remoteHost` | `setRemoteHost(String)` | Sets the remote host name | None\
    \ |\n\n### A SocketAppender Example\n\nWriting logging event data to a remote\
    \ server is easy—`SocketAppender` will do the job for us. We just need to pass\
    \ to it the host name, the port, etc., as a part of the configurable bean properties.\
    \ On the other side of the fence, we need a server program that can accept the\
    \ socket connection opened by `SocketAppender` and process the incoming data.\
    \ [Listing 7-9](#LiB0055.html#ch07ls09), `LoggingServer.java`, is an example server-side\
    \ program that accepts the data sent to it. It listens to an arbitrary port, 1000.\
    \ After it receives data from the socket connection, it converts the data to the\
    \ agreed `LoggingEvent` object and extracts all the data from it.\n\nListing 7-9:\
    \ LoggingServer.java\n\n```\npackage com.apress.logging.log4j;\n\nimport java.net.ServerSocket;\n\
    import java.net.Socket;\nimport java.io.ObjectInputStream;\nimport java.io.BufferedInputStream;\n\
    \nimport org.apache.log4j.spi.LoggingEvent;\n\npublic class SocketServer implements\
    \ Runnable{\n\n    private String portNumber = null;\n    private ServerSocket\
    \ serverSocket = null;\n    private Socket socket = null;\n    private ObjectInputStream\
    \ inStream = null;\n    private LoggingEvent event = null;\n    /** Creates a\
    \ new instance of SocketServer */\n    public SocketServer(String portNumber)\
    \ {\n        this.portNumber = portNumber;\n        try {\n            //listen\
    \ to the port specified\n            serverSocket = new ServerSocket(Integer.parseInt(portNumber));\n\
    \            socket = serverSocket.accept();\n            //creating a ObjectInputStream\
    \ from the socket input stream\n            inStream = new ObjectInputStream(new\n\
    \            BufferedInputStream(socket.getInputStream()));\n            new Thread(this).start();\n\
    \        }catch(Exception e) {\n            System.out.println(\"Error: \"+e.toString());\n\
    \        }\n    }\n    public void run() {\n        try {\n\n            while(true)\
    \ {\n\n                //cast back to the LoggingEvent object\n              \
    \  event = (LoggingEvent)inStream.readObject();\n                //print the message\
    \ and logger name in this logging event\n                System.out.println(\"\
    THE LOGGER NAME: \"+event.getLoggerName());\n                System.out.println(\"\
    THE MESSAGE: \"+event.getMessage().toString());\n            }\n        }catch(Exception\
    \ e) {\n            System.out.println(\"Error: here\"+e.toString());\n      \
    \  }\n    }\n\n    public static void main(String args[]) {\n        String port\
    \ = args[0];\n        new SocketServer(port);\n    }\n}\n```\n\nNotice that `SocketServer`\
    \ is a thread-based program, and in the `run()` method it is constantly listening\
    \ to the port for any incoming messages. As soon as a message arrives, it is capable\
    \ of printing the content of the message.\n\n[Listing 7-10](#LiB0055.html#ch07ls10),\
    \ `socket.properties`, shows the configuration file required to send the logging\
    \ information from the example program in [Listing 7-1](#LiB0052.html#446).\n\n\
    Listing 7-10: socket.properties\n\n```\n#configuring the custom logger\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
    \ SOCKET\n\n#configuring the SOCKET appender\nlog4j.appender.SOCKET=org.apache.log4j.net.SocketAppender\n\
    log4j.appender.SOCKET.remoteHost=oemcomputer\nlog4j.appender.SOCKET.port=1000\n\
    ```\n\n### Running the SocketAppender Example Program\n\nTo see `SocketAppender`\
    \ in action, we will need to first run the `SocketServer` program and have it\
    \ listen to the same port as specified in `socket.properties` (i.e., 1000). Make\
    \ sure that `SocketServer` and `SocketAppender` both talk to the same port. The\
    \ host in this example is a machine named `oemcomputer` where the `ServerSocket`\
    \ program is running.\n\nStart up the server program with the following command:\n\
    \n```\njava com.apress.logging.log4j.SocketServer 1000\n```\n\nNow try the client\
    \ program by passing it `socket.properties` as the configuration file.\n\n```\n\
    java -Dlog4j.configuration=socket.properties\ncom.apress.logging.log4j.AdvancvedLogging\n\
    ```\n\nWe will see the following messages arriving in the server-side console:\n\
    \n```\nTHE LOGGER NAME: com.apress.logging.log4j\nTHE MESSAGE: Deposited 100.5\
    \ new balance: 100.5\nTHE LOGGER NAME: com.apress.logging.log4j\nTHE MESSAGE:\
    \ Withdrawn 80.0 new balance: 20.5\nTHE LOGGER NAME: com.apress.logging.log4j\n\
    THE MESSAGE: Failed to withdraw: balance: 20.5 attempted withdraw: 50.0\n```\n\
    \n## Logging to Windows NT Event Log with NTEventLogAppender\n\nFor programs that\
    \ perform system-level operations, we might need to send log information to the\
    \ event log of a particular OS. In Java, we might interact with an OS by using\
    \ Java Native Interface (JNI). `org.apache.log4j.net.NTEventLogAppender` offers\
    \ us the flexibility to do this.\n\nAs log4j API is written in Java, to access\
    \ the Windows NT event log, it uses JNI to talk to an `NTEventLogAppender.dll`\
    \ file. This file interacts with the Windows NT event log and writes the logging\
    \ information there.\n\nThe `NTEventLogAppender` object is very simple to use\
    \ and has the configurable bean properties shown in [Table 7-4](#LiB0056.html#ch07table04).\n\
    \nTable 7-4: Configurable Bean Properties in NTEventLogAppender\n\n| Bean Property\
    \ | Method | Description | Default |\n| --- | --- | --- | --- |\n| `layout` |\
    \ `SetLayout(String)` | Sets the layout to be used with this appender | The default\
    \ layout is `TTCCLayout`. |\n| `source` | `setSource(String)` | Sets the source\
    \ name for this event log | The default source name is set to `Log4j`. |\n\nWe\
    \ will reuse the program in [Listing 7-1](#LiB0052.html#446) to see how logging\
    \ information is stored in the NT event log. We will also use the configuration\
    \ file in [Listing 7-11](#LiB0056.html#ch07ls11), `nt.properties`, to configure\
    \ the logger and appenders used in this example.\n\nListing 7-11: nt.properties\n\
    \n```\n#configuring the custom logger\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
    \ NT\n\n#configuring the NT appender\nlog4j.appender.NT=org.apache.log4j.nt.NTEventLogAppender\n\
    log4j.appender.NT.layout=org.apache.log4j.SimpleLayout\n```\n\nThis example configuration\
    \ file provides a `SimpleLayout` object to `NTEventLogAppender`. Simply execute\
    \ the example program with this configuration file. Once finished, if we open\
    \ the Event Viewer of a Windows NT/Windows 2000/Window XP system, and we will\
    \ see the events logged against the source name `Log4j` in the application log\
    \ section. In each event we will find the logging information being stored."
