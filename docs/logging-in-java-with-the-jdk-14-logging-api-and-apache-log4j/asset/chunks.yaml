  trans: '

    ## 使用过滤器对象


    在第 5 章关于 log4j 的讨论中，我们看到了 `Filter` 对象的示例，它们除了根据日志级别进行过滤外，还能根据某些特定于应用程序的标准来过滤日志请求。我们还了解了过滤器链如何使得根据多个标准检查日志请求成为可能。


    但过滤器链涉及加载多个 `Filter` 对象，并调用每个对象的 `decide()` 方法来过滤日志请求。我们在第 8 章中演示的一种替代方案是编写一个自定义的
    `Filter` 对象。


    |  | 最佳实践  | 尽量在一个 `Filter` 对象中完成尽可能多的操作。 |


    在需要创建多个自定义 `Filter` 对象的情况下，请尝试将它们设计成这样一个 `Filter` 对象可以服务于多种常见的过滤目的。毫无疑问，在一个 `Filter`
    对象中嵌入各种应用程序逻辑会使其难以复用，并将其限制在特定的应用场景中。尽管如此，在某些情况下，这种做法仍然值得考虑。


    假设我们正尝试将日志信息记录到文件中。我们想要检查日志事件是否由某个特定应用程序生成，以及它是否拥有执行文件 I/O 操作所需的必要安全权限。理论上，我们可以设计两个
    `Filter` 对象：一个用于检查应用程序来源，另一个用于权限检查。这样，我们就有了两个可复用的 `Filter` 对象，分别用于事件来源检查和文件 I/O
    权限检查，这很好。但是，如果我们并非在编写供其他应用程序使用的通用日志组件，那么这可能就没那么必要了。尝试将这两个检查过程合并到一个 `Filter` 对象中。这将节省加载和调用两个
    `Filter` 对象所需的时间。


    依作者之见，`Filter` 对象的设计是特定于应用程序的，并且通常需要一些耐心和时间来决定如何设计 `Filter` 对象。有时，你可能需要设计出能被许多其他应用程序组件复用的通用
    `Filter` 对象；而有时，你则会编写特定于某个应用领域的 `Filter` 对象。在决定编写单个还是多个 `Filter` 对象之前，你需要进行权衡。


    ## 使用嵌套诊断上下文


    log4j API 提供了嵌套诊断上下文（NDC）对象，用于用客户端特定的信息来填充日志信息。例如，处理多个客户端的基于服务器的应用程序（例如 servlet）通常需要区分由不同客户端活动产生的日志跟踪信息。


    |  | 最佳实践  | 在处理多个客户端的服务器端组件中使用 `NDC` 来区分客户端。 |


    `NDC` 的核心理念是包含唯一的客户端特定信息。在决定将哪些信息放入 `NDC` 以及其唯一性程度时需谨慎。


    ## 配置问题


    log4j API 同时支持属性样式和 XML 样式的配置文件。还有一种通过编程方式配置每个 log4j 组件的方法。但是，如果不修改源代码，就无法更改编程式配置。为了充分利用
    log4j 高度可配置的特性，我们必须通过配置文件来配置 log4j。


    这一点同样适用于 JDK 1.4 日志 API。尽管 JDK 1.4 日志 API 不像 log4j 那样高度可配置，但我们仍然必须坚持通过配置文件来配置它。目前，JDK
    1.4 日志 API 仅支持属性样式的配置。


    并非 log4j 中的所有组件都可以通过属性样式的配置进行配置。因此，使用 XML 样式的配置文件通常是一个更好的实践。


    如果你需要在系统运行期间更改配置，则必须为 log4j 配置实现 `configureAndWatch` 选项。这样，你就可以在不关闭系统的情况下更改配置文件。log4j
    框架会在指定的时间间隔（默认为 60 秒）内检查配置是否发生更改，如果配置已更改，则会重新初始化框架。


    可以通过在应用程序的起始点调用以下代码来使用 `ConfigureAndWatch` 属性：


    ```

    PropertyConfigurator.configureAndWatch(props);

    ```


    或


    ```

    DOMConfigurator.configureAndWatch(configFileName);

    ```


    log4j 框架将使用相同的配置文件来配置自身，只是额外增加了一个监视配置更改的功能。在基于服务器的应用程序中使用 log4j 时，如果每次日志配置更改都关闭服务器可能很困难，那么这一功能通常非常有用。


    ## 比较 log4j 和 JDK 1.4 日志 API


    也许你已经注意到 log4j 和 JDK 1.4 日志实现之间惊人的相似之处。它们共享相同的基本组件，例如 `Logger`、`Level`、`Appender`/`Handler`、`Layout`/`Formatter`。这两个
    API 在内部架构上也高度相似。然而，有一些基本的差异值得一提，其中一些差异在选择使用哪个日志 API 时可能至关重要。表 10-1 总结了这两个日志 API
    之间的差异，随后将对每一点进行更详细的讨论。


    表 10-1：JDK 1.4 日志 API 与 Apache log4j 的比较


    | 特性 | JDK 1.4 日志 API | Apache log4j |

    | --- | --- | --- |

    | 配置 | JDK 1.4 日志 API 从 JDK 提供的默认配置文件开始。在 JDK 1.4 日志 API 中，配置文件中的配置顺序是顺序性的。父记录器必须在子记录器之前配置。JDK
    1.4 日志 API 仅支持属性样式配置。 | Apache log4j 不假定任何默认配置。它会在类路径中查找 "log4j.properties" 或
    "log4j.xml" 文件来初始化自身。在 log4j 中，配置顺序对初始化没有影响。Apache log4j 同时支持属性和 XML 样式的配置。 |

    | 日志信息格式化 | JDK 1.4 日志 API 仅以文本格式或 XML 格式呈现日志信息。 | Apache log4j 支持多种输出格式，例如 HTML、XML、文本等。可以通过指定模式来控制日志信息的内容。
    |

    | 输出目标 | JDK 1.4 日志 API 仅支持套接字、控制台、文件和内存缓冲区作为输出目标。 | Apache log4j 支持更广泛的日志输出目标，包括
    JMS 和数据库，以及 Telnet、SMTP 等协议。 |

    | 过滤 | JDK 1.4 日志 API 允许将过滤器附加到 `Logger` 和 `Handler` 对象上。JDK 1.4 日志 API 无法实现针对多个标准的过滤器链。
    | Apache log4j 仅将过滤器附加到 `Appender` 对象上。Apache log4j 支持过滤器链。 |

    | 位置信息 | JDK 1.4 日志 API 会自动尝试确定日志请求的位置信息。无法控制此行为。 | 在 log4j 中，可以配置是否将位置信息包含在日志信息中。
    |

    | 错误处理 | JDK 1.4 日志 API 会将任何运行时异常抛回给调用应用程序。除非处理这些异常，否则可能导致应用程序崩溃。 | 在 log4j 中，错误在内部处理，不会抛回给调用应用程序。这使得应用程序和日志功能相互独立。
    |

    '
- fmt: '### Comparing Configuration Options


    Unlike log4j, JDK 1.4 ships with a default configuration file for the logging
    API. Even application developers need not define any custom configuration file;
    the JDK 1.4 logging API will configure itself with the default configuration file.
    However, log4j does not make any assumption about the logging environment. If
    a configuration file is not found in the classpath of the execution environment,
    log4j fails to initialize properly.


    In terms of configuration options, log4j is much more versatile in that it supports
    both properties-style and XML-style configuration. The JDK 1.4 logging API only
    supports properties-style configuration.


    Also, the JDK 1.4 configuration is sequential—that is, the order of configuration
    matters. For example, look at the following configuration order:


    ```

    a.b.level=SEVERE

    a.level=INFO

    ```


    You might be surprised to discover that the logger `a.b` will be assigned its
    parent logger''s level `INFO`. This is because the parent logger has been configured
    after the child logger, and the configuration for all the child loggers have been
    updated according to the configuration of the parent logger. Thus, in the JDK
    1.4 logging API, the settings for the child loggers should appear after the settings
    of the parent logger. The parent logger updates the settings of its child loggers.


    The log4j configuration is independent of the order. In log4j, the child loggers
    automatically inherit from their immediate parent logger by traversing the hierarchy
    upwards.


    ### Comparing Formatter and Layout Objects


    Both logging APIs provide mechanisms to format the logging information to be produced.
    In log4j, these objects are called `Layout` objects, and in the JDK 1.4 logging
    API, they are called `Formatter` objects. The JDK 1.4 logging API, however, only
    provides two `Formatter` objects: `SimpleFormatter` and `XMLFormatter`. The log4j
    API provides a vast range of `Layout` objects capable of formatting information
    in various formats such as HTML, XML, text, etc. The log4j API also provides `PatternLayout`,
    which is a powerful mechanism for including or excluding various parts of logging
    events in the final logging output.


    ### Comparing Handler and Appender Objects


    The JDK 1.4 logging API provides `Handler` objects to publish logging information
    to a preferred destination. Similarly, log4j provides `Appender` objects to publish
    logging information. Currently, the JDK 1.4 logging API can only publish to consoles,
    files, sockets, and memory buffers. However, log4j provides more choices for logging
    destinations. With log4j, we can publish logging information to various destinations
    such as consoles, files, databases, JMSs, NT event logs, UNIX Syslogs, and so
    on.


    Of course, both APIs can be extended to provide any number of customized `Handler`
    and `Formatter` objects to support logging to any other application-specific destination.
    But by default, log4j covers almost all commonly required logging destinations.


    ### Comparing Filter Objects


    The JDK 1.4 logging API offers the facility to attach `Filter` objects to `Logger`
    and `Handler` objects. With the help of `Filter` objects, it is possible to obtain
    more fine-grained control over logging decisions. The JDK 1.4 logging API allows
    only one `Filter` object to be associated with a logger.


    With log4j, however, `Filter` objects can only be attached to `Appender` objects.
    But log4j offers more capabilities with its `Filter` objects. As we discussed
    in [Chapter 8](#LiB0060_split_000.html#525), it is possible to chain several `Filter`
    objects to achieve complex logging decisions. We can also configure more than
    one `Filter` object for a particular `Appender` object. The JDK 1.4 logging API
    is lacking in terms of these `Filter` object features. A `Filter` object in the
    JDK 1.4 logging API can either accept or reject a logging request, but it cannot
    ignore a logging request and delegate it to any other `Filter` objects. Thus,
    `Filter` chaining is not possible with the JDK 1.4 logging API.


    ### Comparing Location Information Options


    The JDK 1.4 logging API and log4j both are capable of producing information about
    the location from which the logging request was generated. However, the production
    of location information is very costly in terms of performance.


    In log4j, we can enable or disable location information according to the application''s
    needs. By default, location information is not part of the logging output. We
    can enable it by specifying the location information attribute in the `PatternLayout`
    object as described in [Chapter 6](#LiB0047_split_000.html#389).


    Unlike log4j, the JDK 1.4 logging API always tries to determine the location information,
    and this cannot be avoided. Also, the techniques used by the JDK 1.4 logging API
    for dynamic location information generation are not totally reliable. Normally,
    this is done by analyzing the stack trace of the application. But many compilers
    employ different optimization techniques that may cause this stack trace analysis
    to fail or produce incorrect information. Thus, application developers tend to
    avoid including location information as a part of the logging output.


    ### Comparing Error Handling


    The main drawback of the JDK 1.4 logging API is that it throws `RunTimeException`s
    back to the caller classes in the application. If these exceptions are not handled
    within the application, the application will crash. This is particularly undesirable
    if the application is crashing because of some problem with the logging rather
    than some problem with the application itself.


    The log4j API, however, is more elegant in handling the errors and exceptions
    generated in the logging operation. All `Appender` objects in log4j have an associated
    `ErrorHandler` object. `ErrorHandler` objects such `OnlyOnceErrorHandler` produce
    a message to the console on the first occurrence of an error and ignore the following
    errors. This enables the application to continue functioning normally even though
    there is some problem with the logging. The problem with the logging function
    can be detected by analyzing the console messages and then corrected eventually.


    Also in log4j, it is possible to define customized error handler components that
    can perform all sorts of operations to handle the error condition gracefully.
    This can be achieved simply by changing the configuration file to use any `ErrorHandler`
    object and requires no coding change at all.


    ## Conclusion


    This brings us to the end of this book. I hope the topics discussed in this book
    provide you with a sufficiently solid foundation for the two most common Java-based
    logging APIs, the JDK 1.4 logging API and the Apache log4j API. Both are well
    designed and easy to use. Considering the present status of both APIs, log4j,
    in my opinion, has a slight edge over the other. But again, you are not always
    going to need such a sophisticated logging mechanism. The important point is to
    understand that with every day spent, software applications are becoming more
    and more business critical. In this context, an application with better maintainability
    and quick-fix capability wins the market. A well-planned logging framework within
    an application will no doubt help it to gain some advantage in a competitive market.
    Hence, it is time for all of us to reconsider the importance of logging in our
    applications.


    As numerous suggestions continue to flow through the mailing lists of Sun and
    Apache for their individual logging APIs, shortly we will see improvements and
    new features in both logging APIs. Whatever these new features may be, the basics
    presented in this book will remain the same, and I hope this book will prove useful
    to you now and in the future.


    # Index'
