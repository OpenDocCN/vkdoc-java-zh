    | `public RollingFileAppender(Layout layout, String fileName, boolean append)\
    \ throws IOException` | 此构造函数接受 `Layout`、文件名和 `append` 属性。如果 `append` 属性为 `true`，它会将日志信息追加到文件，直到达到最大大小。\
    \ |\n\n`RollingFileAppender` 类有几个有用的方法来控制其行为，这些方法列在表 5-8 中。\n\n表 5-8：RollingFileAppender\
    \ 类中的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `public void rollOver()` | 此方法执行常规的滚动操作。当达到最大文件大小时，滚动操作被激活，或者应用程序开发人员可以在操作的任何阶段强制进行。调用时：如果\
    \ `maxBackupIndex` > 0，则文件 \"log.1\" 被重命名为 \"log.2\"，依此类推以保留备份。然后关闭 \"log.1\"\
    \ 文件，并打开一个新文件 \"log.2\" 以记录下一条信息。如果 `maxBackupIndex` = 0，则一旦达到最大文件大小，日志文件就会被截断，并且不会创建备份文件。\
    \ |\n| `public void setMaxBackupIndex(int maxBackupIndex)` | 此方法接受一个正值，设置最大备份索引，超过该索引后最旧的备份文件将被删除。如果设置为零，则不会创建备份文件。\
    \ |\n| `public void setMaxFileSize(long size)` | 此方法与上一个方法相同，只是它接受一个 `long` 类型的文件大小。\
    \ |\n| `public void setMaxFileSize(String size)` | 此方法接受最大文件大小，超过该大小后文件将滚动。我们可以使用后缀\
    \ \"KB\"、\"MB\" 等来指定文件大小，以表示千字节和兆字节。例如，我们可以使用 \"20MB\" 指定 20 兆字节的文件大小。 |\n| `public\
    \ void subAppend(LoggingEvent event)` | 这是从父类 `WriterAppender` 重写的方法，它实现了向滚动文件写入的大部分功能。\
    \ |\n\n以下属性文件演示了如何配置 `RollingFileAppender` 属性：\n\n```\n log4j.appender.dest =\
    \ org.apache.log4j.RollingFileAppender\n#设置文件名\nlog4j.appender.dest.File=${user.home}/log.out\n\
    #设置立即刷新为 true（默认）\nlog4j.appender.dest.ImmediateFlush=true\n#设置阈值\nlog4j.appender.dest.Threshold=ERROR\n\
    #设置追加为 false，即覆盖\nlog4j.appender.dest.Append=false\n#设置滚动前的最大文件大小\nlog4j.appender.dest.MaxFileSize=10KB\n\
    #设置备份索引\nlog4j.appender.dest.MaxBackupIndex=2\n```\n\n此配置文件定义了一个名为 `dest` 的 `RollingFileAppender`。然后，它为此\
    \ appender 设置了其他配置参数。\n\n### DailyRollingFileAppender\n\n基于大小的日志文件滚动对于管理大量日志数据并将其分散到多个文件中非常有用。但在实际生活中，当应用程序日复一日地运行时，我们需要实现一些基于日期的日志记录能力。`org.apache.log4j.DailyRollingFileAppender`\
    \ 对象为我们实现了这一点。它扩展了 `FileAppender` 类并继承了其所有属性。文件的滚动通过 `DatePattern` 配置参数完成。`DatePattern`\
    \ 指示何时滚动文件以及要遵循的命名约定。例如，配置了 `DatePattern ‘.’ yyyy-MM-dd` 的 `DailyRollingFileAppender`\
    \ 将在 2002 年 9 月 17 日午夜将日志文件重命名为 \"log.out-2002-09-17\"，并继续向名为 \"log.out\" 的文件记录日志。\n\
    \n`DatePattern` 遵循 `java.text.SimpleDateFormat` 对象的格式化风格。可以通过 `DatePattern` 定义文件滚动的确切日期和时间。表\
    \ 5-9 演示了如何使用 `DatePattern` 来控制滚动计划，假设日志文件名设置为 \"log.out\"。\n\n表 5-9：DatePattern\
    \ 约定\n\n| DatePattern | 滚动计划 | 示例 |\n| --- | --- | --- |\n| `‘.’ yyyy-MM` | 在每个月末和下个月初滚动\
    \ | 日志文件将在 2002 年 5 月 31 日滚动到 \"log.out-2002-05\"，类似地，将在 2002 年 9 月 30 日滚动到 \"\
    log.out.2002-09\"。 |\n| `‘.’ yyyy-MM-dd` | 每天午夜滚动 | 在 2002 年 9 月 30 日午夜，\"log.out\"\
    \ 文件将滚动到 \"log.out.2002-09-30\"。 |\n| `‘.’ yyyy-MM-dd-a` | 每天中午和午夜滚动 | 在 2002\
    \ 年 9 月 30 日中午，\"log.out\" 文件将滚动到 \"log.out-2002-09-30-AM\"，并在午夜该文件将依次滚动到 \"log.out.2002-09-30-PM\"\
    。 |\n| `‘.’ yyyy-MM-dd-HH` | 每小时整点滚动。 | 在 2002 年 9 月 30 日 10:00:000 时，\"log.out\"\
    \ 文件将滚动到 \"log.out.2002-09-30-09\"。请注意，它以前一个小时为前缀。 |\n| `‘.’ yyyy-MM-dd-HH-mm`\
    \ | 每分钟滚动。 | 在 2002 年 9 月 30 日 10:20:000 时，\"log.out\" 文件将滚动到 \"log.out.2002-09-30-10-19\"\
    。 |\n| `‘.’ yyyy-ww` | 根据区域设置，在每周的第一天滚动 | 如果一周的第一天是星期一，那么在 12 月 28 日（星期日）午夜，\"\
    log.out\" 文件将滚动到 \"log.out.2002-52\"。 |\n\n|  | 注意  | 不要在 `DatePattern` 中的任何地方使用\
    \ \":\"。\":\" 字符用于指定协议，这与我们处理日期格式的意图不完全一致。 |\n\n`DailyRollingFilteAppender` 有两个构造函数。第一个是不执行任何操作的默认构造函数：\n\
    \n```\npublic void DailyRollingFileAppender()\n```\n\n第二个，如下代码行所示，接受用于滚动的 `Layout`、文件名和\
    \ `DatePattern`：\n\n```\npublic void DailyRollingFileAppender(Layout layout, String\
    \ fileName,\nString datePattern)\n```\n\n`subAppend(LoggingEvent event)` 方法是从\
    \ `WriterAppender` 类重写的，它实现了每日滚动活动。\n\n正如我们所见，`DailyRollingFileAppender` 是一种非常强大的机制，可以精细控制日志记录过程。在实际生活中，日志信息的组织方式与记录哪些信息同等重要。`DailyRollingFileAppender`\
    \ 在按小时、天和月发布日志信息方面非常有用，这有助于在很大程度上分析应用程序性能，而无需处理过多或过旧的信息。\n\n以下属性文件演示了如何配置 `DailyRollingFileAppender`：\n"
- fmt: "```properties\nlog4j.appender.dest = org.apache.log4j.DailyRollingFileAppender\n\
    #set the name of the file\nlog4j.appender.dest.File=${user.home}/log.out\n#setting\
    \ the immediate flush to true (default)\nlog4j.appender.dest.ImmediateFlush=true\n\
    #setting the threshold\nlog4j.appender.dest.Threshold=ERROR\n#setting the append\
    \ to false, overwrite\nlog4j.appender.dest.Append=false\n#set the DatePattern\n\
    log4j.appender.dest.DatePattern='.' yyyy-MM-dd\n```\n\nThis configuration file\
    \ defines the configuration parameters for a `DailyRollingFileAppender` object.\
    \ The `DatePattern` conversion pattern will follow the convention defined in [Table\
    \ 5-9](#LiB0041.html#ch05table09).\n\n## File-Based Logging Example\n\nThe program\
    \ shown later in this section, `FileBasedLoggingDemo.java`, will demonstrate how\
    \ the different file-based `Appender` objects handle logging information. We have\
    \ seen that the file-based `Appender` objects can write data to a file and roll\
    \ the logging output file daily or after a specified period. In order to demonstrate\
    \ how different files are rolled, in the following example we will see how to\
    \ create a thread that will log messages to the file in a repeated manner. We\
    \ will also see how to create a configuration file defining all the required logger,\
    \ appender, and layout information. The properties file `file_logging.properties`,\
    \ which appears in [Listing 5-7](#LiB0041.html#ch05ls07), defines the properties\
    \ required for this file-based logging example.\n\n**Listing 5-7: file_logging.properties**\n\
    \n```\n#set the level of the root logger to DEBUG (the lowest level)\n#and set\
    \ its appenders named DEBUG and CONSOLE\nlog4j.rootLogger = DEBUG, CONSOLE\n\n\
    #set your own logger\nlog4j.logger.com.apress.logging.log4j=DEBUG, FILE, ROLLING,\
    \ DAILY\n\n#set the appender CONSOLE\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\n\
    \n#set the appender FILE\nlog4j.appender.FILE=org.apache.log4j.FileAppender\n\
    log4j.appender.FILE.File=${user.home}/out.log\n\n#set the appender ROLLING\nlog4j.appender.ROLLING=org.apache.log4j.RollingFileAppender\n\
    log4j.appender.ROLLING.File=${user.home}/rolling.log\nlog4j.appender.ROLLING.MaxFileSize=1KB\n\
    \n#set the appender DAILY\nlog4j.appender.DAILY=org.apache.log4j.DailyRollingFileAppender\n\
    log4j.appender.DAILY.File=${user.home}/daily.log\nlog4j.appender.DAILY.DatePattern='.'\
    \ yyyy-MM-dd-HH-mm\n\n#set the layout for the appenders\nlog4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.CONSOLE.layout.conversionPattern=%p - %m%n\n\nlog4j.appender.FILE.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.FILE.layout.conversionPattern=%p - %m%n\n\nlog4j.appender.ROLLING.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.ROLLING.layout.conversionPattern=%p - %m%n\n\nlog4j.appender.DAILY.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.DAILY.layout.conversionPattern=%p - %m%n\n```\n\nThe destination\
    \ files are defined in the configuration file `file_logging.properties`, and the\
    \ location of the files is defined by `${user.home}`, which means the log files\
    \ will be created in the location `user.home` system property.\n\nNow that we\
    \ have seen the properties required for the file-based logging example, let's\
    \ take a look at `FileBasedLoggingDemo.java`, shown in [Listing 5-8](#LiB0041.html#ch05ls08).\n\
    \n**Listing 5-8: FileBasedLoggingDemo.java**\n\n```java\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.*;\n\npublic class FileBasedLoggingDemo implements Runnable{\n\
    \nprivate static Logger logger =\nLogger.getLogger(FileBasedLoggingDemo.class.getPackage().getName());\n\
    \    /** Creates a new instance of FileBasedLoggingDemo */\n    public FileBasedLoggingDemo()\n\
    \    {\n    }\n\n/** This method is called by the application. This method creates\n\
    \     * a new thread to start logging\n     */\n    public void doLogging()\n\
    \    {\n        Thread t = new Thread(this);\n        t.start();\n    }\n\n/**\
    \ The thread's run() method, which does repeated logging\n     * at an interval\
    \ of 60secs.\n     */\n    public void run()\n    {\n        int count=1;\n  \
    \      while(true) {\n            //logging information\n            try {\n \
    \               logger.debug(\"Logging the information...\"+count);\n        \
    \        Thread.sleep(60*1000);\n                count++;\n            }catch(Exception\
    \ e) {\n                logger.warn(\"Exception occured\", e);\n            }\n\
    \        }\n    }\n    /** the main method\n     */\n    public static void main(String\
    \ args[])\n    {\n        FileBasedLoggingDemo demo = new FileBasedLoggingDemo();\n\
    \        demo.doLogging();\n    }\n}\n```\n\nThis program will publish logging\
    \ information to three different files— `out.log`, `rolling.log`, and `daily.log`—through\
    \ three different appenders—`FILE`, `ROLLING`, and `DAILY`, respectively. The\
    \ `DailyRollingFileAppender` is configured to log information and roll at every\
    \ minute. All the appenders have the `append` property set to `true` and will\
    \ append any logging message to the same file until the rollover criteria is reached.\
    \ When executed, this program will create files like the following in the location\
    \ defined by the `user.home` system property:\n\n| Filename | Description |\n\
    | --- | --- |\n| `daily.log. 2002-09-30-21-35` | Logged on September 30, 2002\
    \ at 21:35 |\n| `daily.log. 2002-09-30-21-36` | Logged on September 30, 2002 at\
    \ 21:36 |\n| `out.log` | Normal log file |\n| `rolling.log` | Initial rolling\
    \ file |\n| `rolling.log.1` | Rollover file once the maximum file size is reached\
    \ |"
