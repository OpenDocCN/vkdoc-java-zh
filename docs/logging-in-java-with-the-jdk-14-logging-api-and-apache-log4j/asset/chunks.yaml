  trans: '

    ## 通过 SMTPAppender 分发日志信息


    上一章提到，像 log4j 这样的日志 API 最大的特点在于，它不将日志活动局限于简单的调试跟踪。此外，正如我们从对几个 `Appender` 对象的讨论中所看到的，这些对象构成了一个强大的功能，可以将日志信息分发到各种组件，例如数据库、NT
    事件日志、套接字等。可以利用这一有用的功能来实现数据分发能力，而无需编写单独的应用程序模块来完成相同的工作。


    这一强大功能的一个例子是 `SMTPAppender`。想象一下，你正在编写一个订单处理应用程序，在收到每个订单后，客户会收到所收到订单的详细信息更新。解决此问题的一种传统方法是收集订单信息，并将其传递给一个单独的邮件应用程序，以便通过电子邮件发送给用户。借助
    `SMTPAppender`，我们甚至无需编写一行额外的代码就能做到这一点。


    `org.apache.log4j.net.SMTPAppender` 是一个强大的 `Appender` 对象，能够使用简单邮件传输协议 (SMTP) 发送日志信息。`SMTPAppender`
    对象具有表 7-5 中所示的可配置 Bean 属性。


    表 7-5：SocketAppender 中的可配置 Bean 属性


    | Bean 属性 | 方法 | 描述 | 默认值 |

    | --- | --- | --- | --- |

    | `bufferSize` | `setBufferSize(int)` | 设置存储日志事件的循环缓冲区的大小 | 默认为 512 个事件 |

    | `evaluatorClass` | `setEvaluatorClass(String)` | 设置用于检查任何触发条件的评估器类的名称 | 默认为内部类
    `DefaultEvaluator` |

    | `from` | `setFrom(String)` | 设置发件人的电子邮件地址 | 无 |

    | `layout` | `setLayout(String)` | 设置用于格式化日志信息的布局 | 无 |

    | `locationInfo` | `setLocationInfo(boolean)` | 指定是否应在日志信息中包含位置信息 | `false` |

    | `SMTPHost` | `setSMTPHost(String)` | 设置用于发送电子邮件的 SMTP 主机名称 | 无 |

    | `subject` | `setSubject(String)` | 设置电子邮件的主题 | 无 |

    | `to` | `setTo(String)` | 设置收件人的电子邮件地址 | 无 |


    表 7-5 中的最后一个配置参数值得讨论。`SMTPAppender` 可以附加一个评估器类。此评估器类可以评估每个日志事件，并决定一个触发条件来告知 `SMTPAppender`
    触发电子邮件发送活动。触发条件可以是任何特定于应用程序的条件，例如当日志事件的消息级别为 ERROR 时。`SMTPAppender` 使用的默认评估器类是一个名为
    `DefaultEvaluator` 的内部类。`DefaultEvaluator` 类仅检查与日志事件关联的级别是否大于或等于级别值 ERROR。


    如果不满足触发条件，则该事件将存储在一个默认大小为 512 个事件的循环缓冲区中。一旦有满足触发条件的日志事件到达，缓冲区中的所有事件都会被检索出来并通过电子邮件发送给收件人。


    要查看 `SMTPAppender` 的实际运行示例，我们将重用清单 7-1 中的程序，并使用清单 7-12 "smtp.properties" 中所示的配置文件。`SMTPAppender`
    的配置使用 `smtp.mail.yahoo.com` 作为 SMTP 服务器。你可以将其替换为你正在使用的任何其他 SMTP 服务器。`to` 属性定义收件人的电子邮件地址，`from`
    定义发件人的电子邮件地址。`subject` 属性定义电子邮件的主题，最后我们分配一个 `org.apache.log4j.SimpleLayout` 对象来格式化日志信息，使其显示在电子邮件的正文中。


    清单 7-12：smtp.properties


    | **![开始示例](img/_1.gif)** |


    ```

    #配置自定义日志记录器

    log4j.logger.com.apress.logging.log4j=DEBUG, SMTP


    #配置 SMTP 附加器

    log4j.appender.SMTP=org.apache.log4j.net.SMTPAppender

    log4j.appender.SMTP.SMTPHost=smtp.mail.yahoo.com

    log4j.appender.SMTP.to=clientname@mailserver.com

    log4j.appender.SMTP.subject=测试附加器

    log4j.appender.SMTP.from=yourname@mailserver.com

    log4j.appender.SMTP.layout=org.apache.log4j.SimpleLayout

    ```


    | **![结束示例](img/_1.gif)** |


    |  |


    使用此配置文件，执行示例程序。请记住，`SMTPAppender` 依赖于 Java Mail API（"mail.jar"）和 Java Activation
    API（"activation.jar"）。确保这两个 .jar 文件与 log4j 特定的 .jar 文件一起位于你的类路径中。


    一旦执行，我们将看到消息被发送到客户端电子邮件地址。在我们的示例程序中，有一条级别为 ERROR 的消息满足触发条件，因此 `SMTPAppender` 会将包含所有日志事件的电子邮件发送到指定的客户端电子邮件地址。


    ## 通过 TelnetAppender 使消息可通过 Telnet 获取


    在某些情况下，我们可能希望允许远程用户访问我们从应用程序生成的日志信息。当我们想要远程管理应用程序时，这一点尤其重要。在这种情况下，我们在本地发布日志数据，并希望向远程用户提供只读访问权限。最好的方法是使用现有的
    Telnet 协议。远程用户可以使用 Telnet 协议登录到本地机器，并读取我们希望他们看到的日志信息。


    log4j API 提供了 `org.apache.log4j.net.TelnetAppender` 来启用此功能。`TelnetAppender` 将数据写入一个只读套接字。`TelnetAppender`
    是一个多线程程序，它打开一个服务器套接字连接到某个端口，并监听对该同一端口的任何连接。一旦连接信号到达，它会将连接源信息添加到一个缓冲区中。接下来，每当有日志请求到达
    `TelnetAppender` 时，它会将数据写入所有活动的连接套接字。


    `TelnetAppender` 对象使用默认的 Telnet 端口 23。也可以选择指定任何其他端口。它可以同时处理的最大连接数为 20。`TelnetAppender`
    需要一个特定的布局来相应地格式化日志数据。


    一个非常适合使用 `TelnetAppender` 的场景是与 Servlet 结合使用。Servlet 在某个时间点处理多个客户端连接。此外，将 `TelnetAppender`
    用于服务器日志活动允许多个远程管理员实时获取日志信息。当应用程序的远程管理至关重要时，这非常有用。


    这里不包含将 `TelnetAppender` 与 Servlet 结合使用的示例，而是将其留作练习供你实现。请记住，`TelnetAppender` 并没有什么神奇之处。你只需要配置你的
    `Logger` 对象来使用 `TelnetAppender` 即可。

    '
- fmt: '# Conclusion


    In this chapter, we have discussed some of the advanced logging concepts of log4j.
    We have now seen the power of the log4j API to make logging activity distributed.
    This is of great importance when an application is large, distributed, and interacting
    with several other custom or legacy applications. The remote management of the
    application becomes easier with log traces being managed and viewed remotely.
    This gives us better control over the day-to-day maintenance of our applications.


    As we have also seen, most of the logging framework with log4j is configurable.
    In all our examples, we could change the logging behavior just by pointing the
    application to a different configuration file. No doubt you can appreciate the
    power of log4j and benefit from using it within your own applications.


    In the [next chapter](#LiB0060_split_000.html#525), we will investigate how we
    can leverage the existing framework of log4j and extend it to write application-specific
    components.


    # Chapter 8: Extending log4j to Create Custom Logging Components


    ## Overview


    In The previous chapters, we covered the core log4j framework. We have discussed
    how the `Logger`, `Appender`, `Layout`, and `Filter` objects interact with each
    other and publish logging information to a preferred destination. Apache log4j
    offers a vast range of `Appender` objects. These give us the power to publish
    logging data to a local machine and to distribute logging data over a network.
    Moreover, the flexible and highly configurable nature of log4j allows us to change
    logging behavior completely by merely changing the configuration file.


    All this is great and useful. Still, there may be situations in which the default
    log4j capabilities do not quite fit an application''s requirements. This sort
    of limitation is more due to the sophisticated nature of the application rather
    than the design of log4j. In such situations, we have to extend the log4j framework
    to devise our own logging components to meet our applications'' requirements.


    In this chapter, we will discuss how we can extend the log4j framework to create
    application-specific components. The topics discussed and examples provided herein
    will serve as a guideline for developing custom logging components specific to
    applications.


    ## Creating the Custom WindowAppender


    In this section, let''s explore how we can create our own `Appender` objects.
    It is possible that in an application we may want Java window-based logging. It
    is a common application requirement to monitor log information in some sort of
    GUI control such as a small window. This means that the `Logger` objects in an
    application should be configured to send logging information to a Java window.
    To achieve this, we can create a custom appender named `WindowAppender` that is
    capable of printing all logging information to a small Java-based window.


    ### Features of the Custom WindowAppender


    As mentioned in the discussion in [Chapter 5](#LiB0032_split_000.html#266) of
    several `Appender` objects available within the log4j API, these objects all inherit
    from a base class called `AppenderSkeleton`. Any custom `Appender` object we want
    to create must adhere to this appender hierarchy. The log4j framework checks for
    this criterion before invoking any appender specified and ignores any that do
    not adhere to the appender hierarchy.


    Sticking to the appender hierarchy makes it fairly easy to write custom `Appender`
    objects. In this example, we will create a `WindowAppender` object. Before writing
    the code for the `WindowAppender` object, let''s take a look at the features we
    will include:


    *   The `WindowAppender` will create a small Java `Frame`-based window.

    *   The window will display logging information in a scrollable area.

    *   The `title`, `width`, and `height` properties of the window should be configurable
    through bean properties.


    This looks simple, but we have to be aware of a few bottlenecks with this `WindowAppender`.
    We need to decide how different `Logger` objects within any application will access
    `WindowAppender`. The following points are important to consider before we create
    the `WindowAppender` object:


    *   An application may have several `Logger` objects, and each of them may try
    to use the `WindowAppender` object to log information.

    *   We need to make sure that for all the created instances of `WindowAppender`
    one and only one window is active.

    *   If for every `Logger` object using the `WindowAppender` object a separate
    logging window is created, the system will soon be full of logging windows, which
    is not desirable.


    ### Architecture of the Custom WindowAppender


    Considering the features we need to provide and the bottlenecks we should be aware
    of, we need to find a way to create a single instance of the logging window and
    make it available to all instances of `WindowAppender`. The best time to create
    the logging window is when the appender is initialized.


    To understand this, let''s go through the appender initialization process:


    *   If the appender configuration is specified in a configuration file, the log4j
    framework will read the appender configuration from that file.

    *   The log4j framework first creates an instance of the specified appender class
    by calling the default constructor of that class.

    *   If other bean properties are specified in the configuration file, the `set()`
    methods of the corresponding bean property are invoked to set the property values.

    *   Finally, the `activateOptions()` method of the specified appender class is
    invoked to initialize any optional configuration for the appender. This method
    is optional to any appender and therefore may or may not be present in a particular
    `Appender` object.


    Now coming back to `WindowAppender`, what is the best place to initialize the
    logging window? Because we have the bean properties to set the `title`, `height`,
    and `width` attribute of the logging window, we cannot create an instance of the
    logging window before the initialization process sets these bean properties. Thus,
    the best place to create an instance of the logging window after the bean properties
    are set is in the `activateOptions()` method.


    Also, we need to make sure that no more than one instance of the logging window
    gets created. So we should move the creation and instantiation of the logging
    window to a `synchronized` method to return a `static` singleton instance of the
    logging window.'
