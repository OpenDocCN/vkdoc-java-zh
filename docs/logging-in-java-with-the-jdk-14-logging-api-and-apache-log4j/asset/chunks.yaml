  trans: "\n## 默认格式化器对象\n\n在详细讨论`Formatter`对象之前，了解 JDK 1.4 日志 API 的架构非常重要，因此我们先简要回顾一下。我们在上一章中已经看到，该框架的核心是`Logger`对象。`Logger`对象在内部创建一个`LogRecord`对象。`LogRecord`对象封装了日志信息。`Logger`对象关联着一个`Handler`对象，该对象负责管理日志消息的分发。每个`Handler`对象都会关联一个`Formatter`对象，该对象负责以适当的格式样式格式化日志消息。如果没有为`Handler`对象显式指定`Formatter`，它将使用与相应`Handler`对象关联的默认`Formatter`对象，或与父级`Handler`对象关联的任何其他`Formatter`对象。\n\
    \n图 3-1 展示了日志框架内不同对象的协作关系。\n\n![点击展开](img/fig3-1_0.jpg)\n图 3-1: JDK 1.4 日志对象的序列图\n\
    \n除了以不同结构生成日志消息外，`Formatter`对象还负责数据的本地化。日志信息的本地化是通过将`java.util.ResourceBundle`对象附加到`LogRecord`对象上来完成的。`Formatter`对象使用与每个`LogRecord`对象关联的`ResourceBundle`，大部分格式化和本地化工作都在`Formatter`对象的`formatMessage()`方法中完成。大多数日志记录方法都使用消息字符串作为参数。此消息参数也可以表示本地化键。如果`LogRecord`对象关联了`ResourceBundle`，并且该`ResourceBundle`包含消息字符串的映射，则消息字符串将被替换为本地化值。如果在`ResourceBundle`中未找到映射，则消息字符串本身将用作输出消息。\n\
    \n`Formatter`对象通常使用`java.text.MessageFormat`风格的格式化。`Formatter`对象首先尝试使用活动线程的`ContextClassLoader`定位指定的`ResourceBundle`对象。如果`ContextClassLoader`为`null`，则它会尝试使用`SystemClassLoader`定位`ResourceBundle`。我们将在本章后面看到如何开发一个本地化示例。\n\
    \nJDK 1.4 日志 API 中定义了两类`Formatter`对象：\n\n*   `java.util.logging.SimpleFormatter`：生成日志信息的简要、人类可读摘要。\n\
    *   `java.util.logging.XMLFormatter`：以结构化的 XML 格式生成日志信息。\n\n图 3-2 展示了 JDK 1.4\
    \ 日志 API 中两个默认`Formatter`对象的类层次结构。\n\n![点击展开](img/fig3-2_0.jpg)\n图 3-2: JDK 1.4\
    \ 日志 API 中 Formatter 对象的类层次结构\n\n我们将在以下章节中更详细地讨论这些内容。\n\n### SimpleFormatter 对象\n\
    \n`SimpleFormatter`类代表了以人类可读格式呈现日志信息的最简单方式。它以一至两行信息的形式输出结果。代码清单 3-1 `BasicLogging.java`是一个旨在生成非常基本的日志信息的简单程序。\n\
    \n代码清单 3-1: BasicLogging.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage sam.logging;\n\
    import java.util.logging.*;\n\npublic class BasicLogging\n{\n\n public static\
    \ void main(String args[])\n {\n   Logger logger = Logger.getLogger(\"current.package\"\
    );\n   logger.info(\"简单格式化的消息..\");\n }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\
    \n|  |\n\n执行此程序将在控制台产生以下输出——一个遵循`SimpleFormatter`模式的日志消息示例：\n\n```\n12-Aug-2002\
    \ 21:16:23 sam.logging.BasicLogging main\nINFO: 简单格式化的消息..\n```\n\n第一行显示日志活动的日期和时间戳，以及发布日志的类的完全限定名和方法名。第二行显示日志级别和日志消息。信息的结构分为表\
    \ 3-1 中显示的各个部分。\n\n表 3-1: 使用 SimpleFormatter 的消息结构\n\n| 时间戳 | 类名 | 方法名 | 级别和消息\
    \ |\n| --- | --- | --- | --- |\n| `12-Aug-2002 22:51:50` | `sam.logging.BasicLogging`\
    \ | `main` | `INFO: 简单格式化的消息` |\n\n`SimpleFormatter`类继承自`abstract Formatter`类，并为`abstract\
    \ String format(LogRecord record)`方法提供了实现。它格式化给定的`LogRecord`对象并返回格式化后的字符串。`SimpleFormatter`类中`format()`方法的实现是`synchronized`的。`format()`方法内部使用`StringBuffer`对象来构建和格式化日志消息。通过将此方法声明为`synchronized`，确保了`StringBuffer`构建过程的线程安全。`SimpleFormatter`通过分别调用`LogRecord`对象的`getSourceClassName()`和`getSourceMethodName()`方法，获取调用日志记录的源类和源方法的运行时信息，并将这些信息包含在要生成的日志信息中。该对象使用`java.text.MessageFormat`风格来输出日志消息。\n\
    \n`SimpleFormatter`对象的格式化风格特别适用于将日志消息输出到控制台或单独的日志应用程序（如日志窗口），在这些场景中我们可能只想显示一些非常基本的日志信息。如果某个应用程序特别需要通过记录不同的方法入口和退出来追踪程序流程的控制，那么`SimpleFormatter`是最合适的格式化器。我们最有可能将`SimpleFormatter`对象与任何旨在将日志输出到控制台的`Handler`对象一起使用。JDK\
    \ 1.4 日志 API 中提供的`ConsoleHandler`使用`SimpleFormatter`对象将日志信息输出到控制台。可以通过扩展该类并重写其`format()`方法来更改与`SimpleFormatter`对象关联的格式化样式。\n"
- fmt: "### `XMLFormatter` Object\n\nThe `XMLFormatter` object produces logging information\
    \ in a standard XML format. The formatted XML-encoded logging information can\
    \ be stored in an external file or output to any other device such as a console.\
    \ While formatting the log message, the `XMLFormatter` object uses the default\
    \ document type definition (DTD) as specified in the Java logging specification.\
    \ The specified DTD can be located in the URL `http://java.sun.com/j2se/1.4.1/docs/guide/util/logging/overview.html`.\
    \ The top-level element of the XML data is the `<log>` element. The immediate\
    \ child element to the `<log>` element is the `<record>` element, which contains\
    \ the bulk of the logging information.\n\nThe `<record>` element consists of several\
    \ child elements, of which `<date>`, `<millis>`, `<sequence>`, `<level>`, `<thread>`,\
    \ and `<message>` are compulsory and will always be present in logging information\
    \ formatted through the `XMLFormatter` object. The other optional elements are\
    \ constructed depending on certain situations, which we will discuss later. The\
    \ recommended character encoding with the `XMLFormatter` object is UTF-8, but\
    \ in theory any character-encoding scheme can be used.\n\nIn the sample program\
    \ shown in [Listing 3-2](#LiB0022_split_001.html#ch03ls02), `XMLLogging.java`,\
    \ we will see how we can send the XML-formatted output to a file and also how\
    \ we can use the `ConsoleHandler` object along with the `XMLFormatter` object\
    \ to produce the output on a console. Here we are using `ConsoleHandler` to produce\
    \ messages related to any exception that may occur because the `ConsoleHandler`\
    \ class by default writes the output to the `System.err` stream.\n\n**Listing\
    \ 3-2: XMLLogging.java**\n\n```\npackage sam.logging;\nimport java.util.logging.*;\n\
    import java.io.*;\n\npublic class XMLLogging\n{\n    private     ConsoleHandler\
    \ ch ;\n    private     XMLFormatter formatter ;\n    private     FileHandler\
    \ handler = null;\n\n/**\n     * constructor\n     */\n    public XMLLogging()\
    \ {\n        ch = new ConsoleHandler();\n        formatter = new XMLFormatter();\n\
    \    }\n\n/**\n     * This method demonstrates the logging using XMLFormatter\n\
    \     * and should there be an exception, the exception\n     * is logged into\
    \ the console with ConsoleHandler and formatted\n     * withXMLFormatter.\n  \
    \   */\n\npublic void logMessage()\n    {\n        //creating a LogRecord object\
    \ with level and message\n        LogRecord record = new LogRecord(Level.INFO,\
    \ \"XML message..\");\n\ntry\n        {\n            //creating a StreamHandler\
    \ object to file output the xml message\n            handler = new FileHandler(\"\
    newxml.xml\");\n            handler.setFormatter(formatter);\n\n//publishing the\
    \ log message to the file and flushing the buffer\n            handler.publish(record);\n\
    \            handler.flush();\n        }catch(Exception e) {\n            //creating\
    \ a log record object with the WARNING level\n            //and exception message\n\
    \            LogRecord rec = new LogRecord(Level.WARNING, e.toString());\n\n//setting\
    \ the formatter for the consolehandler as\n            //XMLFormatter and publishing\
    \ the message\n            ch.setFormatter(formatter);\n            ch.publish(rec);\n\
    \        }\n    }\n    public static void main(String args[]) {\n        XMLLogging\
    \ logging = new XMLLogging();\n        logging.logMessage();\n    }\n}\n```\n\n\
    |  | Caution | Although the previous program uses the `Handler` object and its\
    \ `publish()` method to print logging information, this is not the recommended\
    \ way of logging information. The application should use the `Logger` object to\
    \ print the logging information. The reason for adopting a nonstandard way in\
    \ this example is to demonstrate the difference in the logging output, as will\
    \ be explained in the following sections. |\n\nThe bulk of the work in this program\
    \ is done in the `logMessage()` method of the `XMLLogging` class. It starts with\
    \ creating a `LogRecord` object with the level of the logging and the message\
    \ to be published, and then instantiates a `FileHandler` object with `\"newxml.xml\"\
    ` as the output filename. It then sets the `XMLFormatter` object instance as the\
    \ associated `Formatter` object to the `FileHandler`. Finally, it invokes the\
    \ `publish()` method of the `FileHandler` class to log the message.\n\nSimilarly,\
    \ in the exception block, we create a new `LogRecord` object with the log message\
    \ containing the exception message. We set the `XMLFormatter` object instance\
    \ as the `Formatter` associated with the `ConsoleHandler` object. If any exception\
    \ is thrown, the `ConsoleHandler` will publish the exception information to the\
    \ console.\n\nIf we want the class and method names to be a part of the `LogRecord`\
    \ object, then we have to explicitly specify them with the setter methods defined\
    \ in the `LogRecord` class. If no source class name or source method name is set,\
    \ then that information will be omitted from the log messages.\n\nPerhaps you\
    \ noticed in the earlier example of the `SimpleFormatter` object (in [Listing\
    \ 3-1](#LiB0022_split_001.html#ch03ls01)) that we use a `Logger` object and its\
    \ `info()` method to produce simple formatted logging information. This displays\
    \ the source class name and the method name, even though we never explicitly specified\
    \ them, because the logging framework finds out the calling class and the method\
    \ by analyzing the stack trace of the application. However, this is unreliable\
    \ due to its being subject to the level of optimization performed by the Java\
    \ Virtual Machine in question, which in some cases might completely remove the\
    \ stack trace and can make it impossible for the logging framework to determine\
    \ the source class and method from which the logging was invoked. In order to\
    \ reliably contain this information as a part of the log message, we have to pass\
    \ the source class and method names explicitly to the `LogRecord` object.\n\n\
    Next, we create a `StreamHandler` object that will be responsible for writing\
    \ the XML-formatted data to a `java.io.OutputStream` object. Within the constructor,\
    \ we define and pass a `java.io.FileOutputStream` object that points to the `\"\
    logmessage.xml\"` file as the destination, and pass a default `XMLFormatter` object\
    \ to it. Each `Handler` object inherits from an abstract superclass called `Handler`,\
    \ which has an `abstract` method named `publish(LogRecord)`. The `StreamHandler`\
    \ class provides a stream-based implementation of the same and writes the `LogRecord`\
    \ object to the destination. At the end, we need to call the `flush()` method,\
    \ which flushes any buffered messages. The `\"logmessage.xml\"` file will contain\
    \ the following XML data:\n\n```\n<?xml version=\"1.0\" encoding=\"windows-1252\"\
    \ standalone=\"no\"?>\n<!DOCTYPE log SYSTEM \"logger.dtd\">\n<log>\n<record>\n\
    \  <date>2002-08-15T20:40:38</date>\n  <millis>1029440438292</millis>\n  <sequence>0</sequence>\n\
    \  <level>INFO</level>\n  <thread>10</thread>\n  <message>XML message..</message>\n\
    </record>\n</log>\n```\n\nWe also define a `ConsoleHandler` object to demonstrate\
    \ how the XML-formatted logs can be sent to a console. As the `ConsoleHandler`\
    \ object by default writes logging information to the `System.err` stream, we\
    \ utilize it to log any exception generated in the program. If we just specify\
    \ the filename used to construct the `FileOutputStream` object as `\"\"` or `null`,\
    \ then we will simulate a faulty situation, and an exception will be thrown. The\
    \ `ConsoleHandler` will use the passed `XMLFormatter` object to format the log\
    \ message before printing it to the console, as shown here:"
