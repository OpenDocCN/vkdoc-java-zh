    log4j.appender.CONSOLE.layout=org.apache.log4j.SimpleLayout\n```\n\n| **![End\
    \ example](_1.gif)** |\n\n|  |\n\nThe equivalent XML-style configuration for this\
    \ example is as follows in [Listing 8-14](#LiB0063.html#ch08ls14).\n\nListing\
    \ 8-14: customlogger.xml\n\n| **![Start example](_1.gif)** |\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE log4j:configuration SYSTEM \"log4j.dtd\"\
    >\n\n<log4j:configuration xmlns:log4j=\"http://jakarta.apache.org/log4j/\">\n\n\
    <appender name=\"A1\" class=\"org.apache.log4j.ConsoleAppender\">\n\n<layout class=\"\
    org.apache.log4j.PatternLayout\">\n     <param name=\"ConversionPattern\" value=\"\
    %t %-5p %c{2} - %m%n\"/>\n   </layout>\n\n</appender>\n\n<logger name=\"com.apress.logging.log4j\"\
    >\n   <level value=\"TRACE\" class=\"com.apress.logging.log4j.CustomLevel\"/>\n\
    \   <appender-ref ref=\"A1\"/>\n </logger>\n\n<categoryFactory class=\"com.apress.logging.log4j.CustomLoggerFactory\"\
    />\n\n</log4j:configuration>\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n\
    Watch how the custom `Level` and custom `LoggerFactory` classes are configured.\n\
    \n|  | Caution  | At the moment, there is a bug in log4j version 1.2.6 in that\
    \ `DOMConfigurator` completely ignores the `<categoryFactory>` element. As a result,\
    \ the use of custom loggers along with a custom logger Factory is not possible\
    \ with XML-style configuration. Hopefully this bug will be resolved soon. |\n\n\
    We have seen that by creating new levels and `Logger` classes, we are able to\
    \ customize the priority of our logging messages.\n\n|  | Caution  | The creator\
    \ group of log4j strongly discourages the use of custom logger and custom logger\
    \ Factory objects. |"
  trans: "\n### 使用自定义日志组件\n\n接下来我们将通过一个小示例，演示如何使用前几节创建的自定义级别、日志记录器和工厂对象。与往常一样，使用日志机制的应用程序将获取一个`CustomLogger`类的实例。然后，应用程序可以通过`CustomLogger`类提供的`trace()`方法，使用自定义级别\
    \ TRACE 生成消息。\n\n清单 8-12 `CustomLoggerDemo.java` 演示了`CustomLogger`类的使用。请注意，`CustomLogger`类的`getLogger(String)`方法实际上返回的是`Logger`类的一个实例。因此，在应用程序中，我们需要将返回的实例强制转换为`CustomLogger`。\n\
    \n清单 8-12：CustomLoggerDemo.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\npackage\
    \ com.apress.logging.log4j;\n\nimport org.apache.log4j.Logger;\n\npublic class\
    \ CustomLoggerDemo {\n    private static CustomLogger logger =\n(CustomLogger)CustomLogger.getLogger(CustomLoggerDemo.class.getPackage()\n\
    .getName());\n\n/** 创建 CustomLoggerDemo 的新实例 */\n    public CustomLoggerDemo()\n\
    \    {\n    }\n\npublic void doLogging()\n    {\n        logger.trace(\"这是一条 TRACE\
    \ 级别的消息...\");\n    }\n\npublic static void main(String args[])\n    {\n     \
    \   CustomLoggerDemo demo = new CustomLoggerDemo();\n        demo.doLogging();\n\
    \    }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n`doLogging()`方法使用获取到的`CustomLogger`实例，并通过`CustomLogger`类的`trace()`方法生成一条\
    \ TRACE 级别的消息。\n\n这一切都简洁明了。但我们仍需解决一些关于使用自定义级别、日志记录器和工厂对象的配置设置问题。当 log4j 初始化时，框架倾向于使用`DefaultCategoryFactory`对象来配置日志记录器。这个`DefaultCategory`对象会返回一个`Logger`类的命名实例。为了使用`CustomLoggerFactory`类，我们需要在配置文件中指定`CustomLoggerFactory`类作为框架内使用的工厂类。如果框架使用了`DefaultCategoryFactory`类，那么在调用应用程序中尝试将获取到的日志记录器实例强制转换为`CustomLogger`时，将会抛出`ClassCastException`异常。\n\
    \n此外，由于我们使用了自定义级别 TRACE，配置要求也必须定义该级别的实现类。自定义级别应以`level#classname`格式定义。否则，框架将无法使用任何超出标准\
    \ log4j 定义级别范围之外的级别。\n\n清单 8-13 \"customlogger.properties\" 是清单 8-12 中示例的配置文件。\n\
    \n清单 8-13：customlogger.properties\n\n| **![示例开始](img/_1.gif)** |\n\n```\n# 配置\
    \ log4j 使用 CustomLoggerFactory 作为工厂对象\nlog4j.loggerFactory=com.apress.logging.log4j.CustomLoggerFactory\n\
    \n# 设置级别为 TRACE，附加器为 ConsoleAppender\nlog4j.logger.com.apress.logging.log4j=TRACE#com.apress.logging.log4j\n\
    .CustomLevel, CONSOLE\n\n# 定义附加器\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\n\
    log4j.appender.CONSOLE.layout=org.apache.log4j.SimpleLayout\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n该示例的等效 XML 风格配置如下面的清单 8-14 所示。\n\n清单 8-14：customlogger.xml\n\n\
    | **![示例开始](img/_1.gif)** |\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
    <!DOCTYPE log4j:configuration SYSTEM \"log4j.dtd\">\n\n<log4j:configuration xmlns:log4j=\"\
    http://jakarta.apache.org/log4j/\">\n\n<appender name=\"A1\" class=\"org.apache.log4j.ConsoleAppender\"\
    >\n\n<layout class=\"org.apache.log4j.PatternLayout\">\n     <param name=\"ConversionPattern\"\
    \ value=\"%t %-5p %c{2} - %m%n\"/>\n   </layout>\n\n</appender>\n\n<logger name=\"\
    com.apress.logging.log4j\">\n   <level value=\"TRACE\" class=\"com.apress.logging.log4j.CustomLevel\"\
    />\n   <appender-ref ref=\"A1\"/>\n </logger>\n\n<categoryFactory class=\"com.apress.logging.log4j.CustomLoggerFactory\"\
    />\n\n</log4j:configuration>\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n请注意自定义`Level`和自定义`LoggerFactory`类是如何配置的。\n\
    \n|  | 警告  | 目前，log4j 1.2.6 版本存在一个错误，即`DOMConfigurator`完全忽略了`<categoryFactory>`元素。因此，在\
    \ XML 风格配置下，无法同时使用自定义日志记录器和自定义日志记录器工厂。希望这个错误能尽快得到修复。 |\n\n我们已经看到，通过创建新的级别和`Logger`类，我们能够自定义日志消息的优先级。\n\
    \n|  | 警告  | log4j 的创建团队强烈不鼓励使用自定义日志记录器和自定义日志记录器工厂对象。 |\n"
- fmt: "### A Simpler Approach to Use Custom Level\n\nIn the [previous section](#LiB0063.html#ch08lev2sec12),\
    \ we saw how to extend the existing `Logger` class to create our own custom `Logger`\
    \ class. One of the main motivations in subclassing the `Logger` class was to\
    \ introduce a new logging method using a custom level, `TRACE`. To use the extended\
    \ `Logger` class, we needed to create and supply a custom `LoggerFactory` class\
    \ to the log4j framework. No doubt this all seems a bit complicated to achieve\
    \ such a simple thing as adding a new method to the existing `Logger` class.\n\
    \nA simpler approach is to write a wrapper class around the existing `Logger`\
    \ class. The wrapper class can provide the desired logging methods that are planned\
    \ for the new logging features. For instance, [Listing 8-15](#LiB0063.html#ch08ls15),\
    \ `LoggerWrapper.java`, is a classical example of how we can still use the custom\
    \ level `TRACE` without getting into the complexities of subclassing the `Logger`\
    \ class.\n\n**Listing 8-15: LoggerWrapper.java**\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.Logger;\nimport org.apache.log4j.Level;\n\npublic class\
    \ LoggerWrapper\n{\n  private final String name;\n  private Logger log;\n  protected\
    \ LoggerWrapper(String name)\n  {\n      this.name = name;\n      log = Logger.getLogger(name);\n\
    \  }\n\npublic String getName()\n  {\n      return name;\n  }\n\npublic boolean\
    \ isTraceEnabled()\n  {\n      if(!log.isEnabledFor(CustomLevel.TRACE))\n    \
    \      return false;\n      else\n          return\n          CustomLevel.TRACE.isGreaterOrEqual(log.getEffectiveLevel());\n\
    \  }\n\npublic void trace(Object message)\n  {\n      log.log(CustomLevel.TRACE,\
    \ message);\n  }\n\npublic void trace(Object message, Throwable t)\n  {\n    \
    \  log.log(CustomLevel.TRACE, message, t);\n  }\n\npublic boolean isDebugEnabled()\n\
    \  {\n      Level p = Level.DEBUG;\n      if(!log.isEnabledFor(p))\n         \
    \ return false;\n      else\n          return p.isGreaterOrEqual(log.getEffectiveLevel());\n\
    \  }\n\npublic void debug(Object message)\n  {\n      log.log(Level.DEBUG, message);\n\
    \  }\n\npublic void debug(Object message, Throwable t)\n  {\n      log.log(Level.DEBUG,\
    \ message, t);\n  }\n\npublic boolean isInfoEnabled()\n  {\n      Level p = Level.INFO;\n\
    \      if(!log.isEnabledFor(p))\n          return false;\n      else\n       \
    \   return p.isGreaterOrEqual(log.getEffectiveLevel());\n  }\n\npublic void info(Object\
    \ message)\n  {\n      log.log(Level.INFO, message);\n  }\n\npublic void info(Object\
    \ message, Throwable t)\n  {\n      log.log(Level.INFO, message, t);\n  }\n\n\
    public void warn(Object message)\n  {\n      log.log(Level.WARN, message);\n \
    \ }\n\npublic void warn(Object message, Throwable t)\n  {\n      log.log(Level.WARN,\
    \ message, t);\n  }\n\npublic void error(Object message)\n  {\n      log.log(Level.ERROR,\
    \ message);\n  }\n\npublic void error(Object message, Throwable t)\n  {\n    \
    \  log.log(Level.ERROR, message, t);\n  }\n\npublic void fatal(Object message)\n\
    \  {\n      log.log(Level.FATAL, message);\n  }\n\npublic void fatal(Object message,\
    \ Throwable t)\n  {\n      log.log(Level.FATAL, message, t);\n  }\n\npublic void\
    \ log(Level p, Object message)\n  {\n      log.log(p, message);\n  }\n\npublic\
    \ void log(Level p, Object message, Throwable t)\n  {\n      log.log(p, message,\
    \ t);\n  }\n\npublic static LoggerWrapper getLogger(String name)\n  {\n      LoggerWrapper\
    \ logger = new LoggerWrapper(name);\n      return logger;\n  }\n\npublic static\
    \ LoggerWrapper getLogger(Class clazz)\n  {\n      LoggerWrapper logger = new\
    \ LoggerWrapper(clazz.getName());\n      return logger;\n  }\n}\n```\n\nThis implementation\
    \ is pretty straightforward. It just uses an internal member of the `org.apache.log4j.Logger`\
    \ class. It also mimics all the methods from the `Logger` class. Internally, it\
    \ delegates the method calls to the instance of the `Logger` class. Notably, it\
    \ provides a method to use the custom `TRACE` level and also provides the method\
    \ `isTraceEnabled()` to check if the level `TRACE` is enabled for any particular\
    \ logger instance.\n\n[Listing 8-16](#LiB0063.html#ch08ls16), `LoggerWrapperDemo.java`,\
    \ demonstrates a very simple use of the wrapper class we have just implemented.\n\
    \n**Listing 8-16: LoggerWrapperDemo.java**\n\n```\n package com.apress.logging.log4j;\n\
    \npublic class LoggerWrapperDemo\n{\n    private static LoggerWrapper logger =\n\
    LoggerWrapper.getLogger(LoggerWrapperDemo.class.getPackage().getName());\n   \
    \ public LoggerWrapperDemo()\n    {\n\n}\n\npublic void doLogging(String message)\n\
    \    {\n        logger.trace(message);\n    }\n\npublic static void main(String\
    \ args[])\n    {\n        LoggerWrapperDemo demo = new LoggerWrapperDemo();\n\
    \        demo.doLogging(\"USING LOGGER WRAPPER TO DISPLAY TRACE LEVEL\n      \
    \  MESSAGE\");\n    }\n}\n```\n\nTo execute this example program, we need almost\
    \ the same configuration file described in [Listing 8-13](#LiB0063.html#ch08ls13),\
    \ except that there is no logger Factory to be used for this example. The modified\
    \ configuration file should read like the one listed in [Listing 8-17](#LiB0063.html#ch08ls17),\
    \ `loggerWrapper.properties`.\n\n**Listing 8-17: loggerWrapper.properties**\n\n\
    ```\n#set the level to TRACE and appender to ConsoleAppender\nlog4j.logger.com.apress.logging.log4j=\n\
    TRACE#com.apress.logging.log4j.CustomLevel, CONSOLE\n\n#define the appender\n\
    log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\nlog4j.appender.CONSOLE.layout=org.apache.log4j.SimpleLayout\n\
    ```\n\nExecuting the example program in [Listing 8-16](#LiB0063.html#ch08ls16)\
    \ with this configuration file will print the following `TRACE`-level message\
    \ to the console:\n\n```\nTRACE - USING LOGGER WRAPPER TO DISPLAY TRACE LEVEL\
    \ MESSAGE\n```\n\nBy writing a simple wrapper class for the logger, we have avoided\
    \ the complexities of writing custom `Logger` and custom `LoggerFactory` classes.\
    \ This can be quite a useful technique for adding custom features to a custom\
    \ `Logger` class while retaining the normal features of the default `Logger` class."
