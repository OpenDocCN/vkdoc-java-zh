- fmt: '# Evaluating a Logging Package


    In a large-scale development process, it is crucial that we implement a proper
    logging mechanism. Whether we develop the logging component in-house or use any
    third-party logging component, there are certain criteria against which the logging
    component should be evaluated. In a nutshell, we can summarize the following criteria
    as features of a good logging package:


    - **Configuration:** Logging components may support programmatic and file-based
    configuration. The latter is better, as it allows us to avoid changing our source
    code to switch to a different type of logging behavior. Also, the logging package
    should support dynamic configuration as opposed to static configuration. Dynamic
    configuration enables us to change logging behavior without taking an application
    down.


    - **Flexibility:** A logging package should provide flexibility in terms of what
    to log and where to log. Also, we should be able to prioritize logging information
    based on its level of importance. We require a logging package that supports multiple
    loggers and multiple levels of messages, and is also capable of publishing logging
    messages to various destinations.


    - **Output:** The way that logging information can be output to a preferred destination
    is important for the success of any logging package. We must carefully consider
    how flexible the logging package is in terms of output formats and destinations.


    - **Ease of use:** However good the design of a logging package may be, if it
    is not easy to use, chances are that anyone working on or using the application
    will not use it. So we need to evaluate any logging package in terms of its ease
    of use.


    # Popular Java-Based Logging APIs


    Experience has taught people how important application logging is and how to write
    well-designed logging code. Once logging concepts had been proven successful,
    they were put into use as generic logging APIs. There are a few Java-based logging
    APIs available in the market. Some of them are proprietary, and some are open
    source. Out of all the available APIs, the following are most popular in the Java
    community.


    ## JDK 1.4 Logging API


    Version 1.4 of JDK has its own logging API in its `java.util.logging` package.
    This API originated from the JSR 47. The JDK 1.4 logging API in essence is a scaled-down
    version of `log4j` (discussed in the next section). The logging concepts captured
    in this API involve logging levels and different logging destinations and formats.
    The JDK 1.4 logging API is well suited for simple applications with simple logging
    requirements. Despite a few limitations, this API provides all the basic features
    that you need to produce effective logging information. Chapters 2 to 4 cover
    the JDK 1.4 logging API.


    ## Apache log4j


    Apache `log4j` is an open-source logging API from Apache. This API, which evolved
    from the E.U. SEMPER project, is a popular logging package in Java. It allows
    great control over the granularity of logging statements. One main benefit of
    this API is that it is highly configurable through external configuration files
    at runtime. It views the logging process in terms of different levels of priorities
    and offers mechanisms to direct logging information to a great variety of destinations
    such as a database, file, console, Windows NT Event log, UNIX Syslog, Java Message
    Service (JMS), and so on. It also allows application developers to choose from
    various formatting styles such as XML, HTML, etc.


    Overall, `log4j` is a feature-rich, well-designed extendible logging framework,
    and provides more capabilities than the JDK 1.4 logging API. For example, the
    configuration of `log4j` is much more flexible than that of the JDK 1.4 logging
    API. The JDK 1.4 logging API can only be configured through a properties-style
    configuration file, but `log4j` supports both properties- and XML-style configuration.


    In this book, Chapters 5 to 9 are devoted to a discussion of `log4j`.


    ## Commons Logging API


    The Commons logging API is another logging effort from Apache. The goal of this
    API is to provide a seamless transition from one logging API to another. Depending
    upon the presence of a logging framework in the classpath, the Commons logging
    API will try to use the available API to carry out application logging. The Commons
    logging API runs its own discovery process to find out which logging API is available
    in the classpath. It tends to provide the lowest common denominator of any two
    logging APIs. For example, between `log4j` and the JDK 1.4 logging API, it will
    provide seamless transition for the features common in both—so we would miss any
    extra features used in `log4j`.


    In terms of operation, the Commons logging API creates a wrapper for all the objects
    in the logging API. Automatic discovery and the wrapper generation are heavyweight
    processes and tend to slow down the overall performance. This is a more complex
    logging framework, as this API tries to combine the efforts of more than one logging
    API. In reality, it offers the flexibility to switch between different logging
    APIs without changing the source code. But before using it, determine whether
    you need such flexibility in exchange for added complexity and performance degradation
    due to the heavyweight nature of the Commons logging API.


    The Commons logging API is a great effort to offer a common interface to logging
    in that it enables an application to switch to different logging APIs without
    changes to the application code. Once you understand and appreciate the methodologies
    adopted by the JDK 1.4 logging API and Apache `log4j`, it will be fairly easy
    to understand the philosophy behind the Commons logging API. For this reason,
    we will not be discussing the Commons logging API further in this book.


    # The Road Ahead


    With this introduction in mind, we will now see how two of the logging APIs mentioned
    in the previous section, the JDK 1.4 logging API and Apache `log4j`, implement
    a robust logging framework for Java-based applications. This book will deal with
    these two different logging APIs separately. Apache `log4j` was evolving quicker
    than the chapters in this book were being written, so we will focus on the 1.2.6
    version of `log4j`. The later versions will have the same foundation and thus
    this book can be a good starting point for using them. After you finish this book,
    you will be able to compare and decide for yourself which logging API you want
    to use in your next project.


    # Chapter 2: JDK 1.4 Logging API


    ## Highlights


    The logging API included in the `java.util.logging` package of the 1.4 version
    of JDK offers a comprehensive way of managing logging information from within
    an application. This API provides us with different levels and styles of logging
    that are vitally important for debugging and auditing any application. The JDK
    1.4 logging mechanism concept is centered around different logging levels, configurable
    logging parameters, flexibility in producing logging information for various destinations,
    and adaptability of logging messages to different formatting styles.


    The highly configurable architecture of the JDK 1.4 logging API offers some great
    benefits such as the capability to turn logging activity off and on depending
    on various stages of the project. This enables post-release software to be easily
    configured to produce detailed logging messages, which makes debugging applications
    faster and cheaper. In addition, the flexibility of this logging API can be utilized
    to vary the detail level of logging messages as needed.


    In this chapter, we will first look at an overview of the architecture of the
    JDK 1.4 logging API and examine in detail how the different objects within the
    API interact with each other to accomplish logging activity.'
