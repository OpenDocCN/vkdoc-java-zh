  trans: "\n## 嵌套诊断上下文 (NDC)\n\n日志记录在复杂的分布式应用中最为有用。大多数现实中的复杂分布式系统都是多线程的。一个很好的例子是使用\
    \ Java Servlet 技术编写的 Web 应用。每个 Servlet 同时处理多个客户端，但 Servlet 内编写的日志代码却是相同的。几乎总是需要将某个客户端的日志输出与其他客户端区分开来。一种方法是为每个客户端执行不同的日志线程。但这种解决方案可能并不总是理想的。另一种更简单的方法可能是用一些特定于客户端的信息来唯一标记每个日志输出。这就是*嵌套诊断上下文*\
    \ (NDC) 发挥作用的地方。\n\nlog4j 中的 `NDC` 类拥有 表 5-3 中列出的方法来管理 `NDC` 堆栈中的信息。\n\n表 5-3：NDC\
    \ 类中的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `public static void pop();` | 在退出某个上下文时调用此方法。\
    \ |\n| `public static void push(String message);` | 此方法为当前线程添加诊断上下文。 |\n| `public\
    \ static void remove();` | 在退出线程时调用此方法。它会移除特定线程的诊断上下文。 |\n\n请注意，`NDC` 类中的所有方法都是\
    \ `static` 的。`NDC` 在每个线程中作为上下文信息的堆栈进行管理。确保在退出线程的 `run()` 方法时调用 `NDC` 的 `remove()`\
    \ 方法非常重要。这可以确保线程的垃圾回收。有趣的是，一个线程可以通过调用 `NDC` 类的 `inherit(Stack stack)` 方法从另一个线程继承\
    \ `NDC`。当我们想要比较两个不同线程的上下文信息时，这非常有用。\n\n## 消息诊断上下文 (MDC)\n\n*消息诊断上下文* (MDC) 是一种使用\
    \ `java.util.Map` 格式存储客户端特定数据的机制。此 `Map` 的键可以在与附加器一起使用的 `Layout` 对象指定的转换模式中替换为其值。`MDC`\
    \ 类提供了 表 5-4 中的方法来操作存储在 `Map` 中的键和值。\n\n表 5-4：MDC 类中的方法\n\n| 方法 | 描述 |\n| ---\
    \ | --- |\n| `public static Object get(String key);` | 此方法检索存储在该键下的 `Object`。\
    \ |\n| `public static void put(String key, Object o);` | 此方法将 `Object o` 存储在该键下。\
    \ |\n| `public static void remove(String key)` | 此方法移除任何 `Object` 与该键的映射。 |\n\n\
    下面的示例将有助于更清晰地说明与 `MDC` 和 `NDC` 对象相关的概念。假设我们有一个多线程且同时处理多个客户端的 Java Servlet 程序。我们可能希望用一些特定于客户端的信息（例如客户端的\
    \ IP 地址）来标记每个日志输出。让我们修改 `LoggingServlet.java`（之前展示在 代码清单 5-5 中），以使用 `MDC` 和 `NDC`\
    \ 来分离每个客户端请求的日志输出。首先，在 `doPost()` 方法中插入以下代码：\n\n```\n public void doPost(HttpServletRequest\
    \ req, HttpServletResponse res)\n                       throws IOException, ServletException\n\
    \    {\n        String remoteAddress = req.getRemoteAddr();\n        String remoteHost\
    \ = req.getRemoteHost();\n\n        //推送到 NDC\n        NDC.push(remoteHost);\n\
    \        //在 MDC 中映射\n        MDC.put(\"remoteAddress\", remoteAddress);\n   \
    \     logger.info(\"invoked the LoggingServlet...\");\n        PrintWriter writer\
    \ = res.getWriter();\n        writer.println(\"Check your web server console...\"\
    );\n        writer.flush();\n        writer.close();\n    }\n```\n\n在上面的代码片段中，我们获取了远程主机名和远程主机地址。`NDC`\
    \ 包含远程主机名，而 `MDC` 包含远程主机地址。现在我们将按如下方式修改 \"log4j.properties\" 文件，以更改附加器使用的转换模式，从而显示\
    \ `MDC` 和 `NDC` 信息：\n\n```\nlog4j.appender.X.layout.conversionPattern=%x -%X{remoteAddress}\
    \ %m%n\n```\n\n`%x` 显示 `NDC` 信息，`%X{variable name}` 显示 `MDC` 信息。请注意，在 `MDC` 模式中指定的变量名必须与代码中分配的变量名匹配。现在日志输出将包含\
    \ `NDC` 和 `MDC` 信息，如下所示：\n\n```\nhostname1 - host address1 invoked the LoggingServlet...\n\
    hostname2 - host address2 invoked the LoggingServlet...\n```\n\n很明显，尽管打印的是相同的信息，但\
    \ `NDC` 和 `MDC` 信息对于区分日志输出是多么有用。\n\n## Appender 对象\n\n过滤日志信息以及在 `Logger` 类中使用不同方法的能力对于应用程序开发者来说是一个很棒的特性。但\
    \ `Logger` 本身并不能打印日志消息。它需要借助 `Appender` 对象来完成。`Appender` 对象主要负责将日志消息打印到不同的目标，例如控制台、文件、套接字、NT\
    \ 事件日志等。有时，`Appender` 对象可以关联 `Filter` 对象，以便对特定消息的日志记录做出进一步的决定。\n\n将信息写入附加到任何特定附加器的首选目标可以是同步的或异步的，这取决于应用程序开发者如何使用附加器。`Appender`\
    \ 对象在日志信息的目标方面非常灵活，这是一个主要优势。可以创建 `Appender` 对象来写入数据库和 JMS，以实现分布式日志记录框架。我们将在本节讨论能够在同一\
    \ JVM 上下文中处理日志信息的常规 `Appender` 对象；相关的分布式日志记录 `Appender` 对象将在后面的第 7 章 中介绍。在 log4j\
    \ 的上下文中，图 5-3 中的类图描述了 `Appender` 对象的关系以及它们的组织方式。\n\n![点击展开](img/fig5-3_0.jpg)\n\
    图 5-3：log4j 中的 Appender 类层次结构\n\n每个 `Appender` 对象都有与之关联的不同属性，这些属性指示了该对象的行为。通常，`Appender`\
    \ 对象将具有以下属性：\n\n*   `layout`：每个 `Appender` 对象需要知道如何格式化传递给它的日志信息。它使用 `Layout` 对象及其关联的转换模式来格式化日志信息。\n\
    \n*   `target`：每个 `Appender` 对象都会有一个与之关联的目标目的地。目标可以是控制台、文件或其他项目，具体取决于附加器。\n\n\
    *   `level`：每个 `Appender` 对象都可以有一个与之关联的阈值 `Level`。日志信息会与阈值级别进行比较，如果日志请求级别等于或大于此阈值，则进一步处理日志信息；否则忽略。\n\
    \n*   `filter`：可以将 `Filter` 对象附加到 `Appenders`。`Filter` 对象可以分析超出级别匹配的日志信息，并决定日志请求应由特定的\
    \ `Appender` 处理还是忽略。\n\n根据 `Appender` 对象的类型，每个 `Appender` 可以具有其他特殊属性。我们将在接下来的章节中讨论每个\
    \ `Appender` 对象，但首先我们将了解如何将 `Appender` 对象添加到 `Logger` 对象。\n"
- fmt: '### Adding Appenders to Loggers


    `Logger` objects require one or more `Appender` objects to be associated with
    them in order to print logging information to a particular destination. We can
    add an `Appender` object to a `Logger` with the following method:


    ```

    public void addAppender(Appender appender);

    ```


    or by including the following setting in the configuration file:


    ```

    log4j.logger.loggerName.appender=appenderName

    ```


    The `addAppender()` method adds an `Appender` to the `Logger` object. It is possible
    to add many `Appender` objects to a logger, each printing logging information
    to separate destinations. But there is an important point to be noted about adding
    `Appender`s to loggers: `Appender`s are additive. Each logging request to a logger
    will be forwarded to all the `Appender` objects associated with it and also to
    all the `Appender` objects associated with its parent loggers up in the logger
    hierarchy.


    If you recall the discussion about the logger hierarchy in the "[Logger Object](#LiB0037.html#303)"
    section, you have probably figure out that you can turn the additivity feature
    off by setting the `additivity` flag to `false`, which is done by calling the
    `setAdditivity(Boolean flag)`. If the `additivity` flag is set to `false`, the
    logging information will only be forwarded to the `Appender` objects associated
    with a particular `Logger` object.


    #### A Better Way of Adding Appenders to Loggers


    Although it is perfectly feasible to add `Appender` objects with the `addAppender()`
    method of the `Logger` class, this hard codes the `Logger` and `Appender` relationship;
    as a result, future changes to this relationship mean changing the code, recompiling
    it, and then redeploying it. To avoid this undesirable situation, it is recommended
    you associate `Appender`s to `Logger`s via configuration properties.


    Referring back to the "log4j.properties" configuration file ([Listing 5-1](#LiB0035.html#277)),
    note that we have attached a `ConsoleAppender` to the root logger. In real life,
    this approach is much more flexible and maintainable, as the configuration can
    be changed when needed without changing the code (and even without redeploying
    the application if we have included `ConfigureAndWatch` with the `Configurator`
    classes).


    ### Logger to Appender Collaboration


    So far we have seen how `Logger` objects encapsulate logging information and how
    different `Appender` objects are capable of printing logging information to different
    destinations. But how do `Logger` objects pass logging information to `Appender`
    objects? Creating an intermediate link object named `LoggingEvent` does the trick.
    The `org.apache.log4j.spi.LoggingEvent` class encapsulates all the relevant logging
    information such as the fully qualified name of the caller class, the level of
    the logging message, the message itself, the `Logger` instance, the timestamp,
    and optionally a `java.lang.Throwable` instance. Before proceeding to hand over
    the logging request to any associated `Appender`, the `Logger` creates an instance
    of the `LoggingEvent` object with the logging-related information.


    The `Logger` object then calls the `doAppend(LoggingEvent event)` method of the
    `Appender` objects. Notice from the `Appender` class diagram shown earlier in
    [Figure 5-3](#LiB0041.html#ch05fig03) that all the `Appender` objects inherit
    from the base class `AppenderSkeleton`. The `doAppend()` method is in reality
    implemented within the `AppenderSkeleton` class and inherited by all other `Appender`
    objects. It is important to note that the `doAppend()` method is `synchronized`,
    which means publishing of the logging event happens in a synchronous manner. Therefore,
    log4j is thread-safe.


    The `doAppend()` method performs some crucial checks on the logging request such
    as comparing the requested logging level with the threshold level of any `Appender`
    associated with the `Logger`, checking if the `Appender` is open, and also checking
    any associated `Filter` object with the `Appender`. If it finds a `Filter` object,
    it invokes that `Filter` object to make further decisions about the logging request.
    Once approved, the `append()` method of the associated subclass `Appender` object
    takes over and publishes the logging information.


    ### WriterAppender


    `WriterAppender` is a high-level `Appender` object that extends the `org.apache.log4j.AppenderSkeleton`
    object and writes logging information to a `java.io.Writer` object or `java.io.OutputStream`
    object depending on whether the application developer using this appender has
    set the target to either a `Writer` object or an `OutputStream` object. The `WriterAppender`
    class can have the following properties:


    *   `immediateFlush`: This property indicates if the output stream should be flushed
    each time there is a request to write certain logging information. By default,
    this option is set to `true`. If the flag is set to `false`, then the underlying
    stream can defer the writing of logging information to physical media to a later
    time


    *   `encoding`: It is possible to use any encoding scheme for writing logging
    information. By default, `WriterAppender` uses the system-specific encoding scheme.


    *   `threshold`: This denotes the cutoff level of logging for `WriterAppender`.
    Any logging request with a level below this level will be ignored. There is no
    threshold level set as default, which means that level filtering is not active
    for this `Appender` object.


    *   `target`: This specifies any `java.io.Writer` object or `java.io.OutputStream`
    object.


    |  | Note | Flushing the stream for every logging request is costly and can slow
    up performance by 10 to 20 percent, but it guarantees that all the information
    is logged. If the `immediateFlush` property is set to `false`, then there is chance
    that some logging information will be missing if there is an arbitrary exit from
    the application or the application crashes. |


    The `WriterAppender` class has the constructors shown in [Table 5-5](#LiB0041.html#ch05table05).


    Table 5-5: Constructors in the WriterAppender Class


    | Constructor | Description |

    | --- | --- |

    | `public WriterAppender();` | This is the default constructor. |

    | `public WriterAppender(Layout layout, OutputStream os)` | This constructor accepts
    a given `Layout` and constructs an `OutputStreamWriter` object with the given
    `OutputStream`. |

    | `public WriterAppender(Layout layout, Writer writer)` | This constructor accepts
    the given `Layout` and the output destination as the `Writer` object. |


    The principal method in the `WriterAppender` class is


    ```

    public void append(LoggingEvent event);

    ```


    This serves as the entry point for this `WriterAppender`. Whenever a logging request
    is made via the `append()` method, it invokes the `protected boolean checkEntryConditions
    ()` method to check if the conditions for logging are valid. It also checks if
    there is a set output target and a layout attached to it. If these conditions
    are not met, then the writing operation returns and prints the appropriate error
    message to the console. Remember that threshold-level checking and any filtering
    of the logging request through any of the associated `Filter` objects has already
    been done by the base class, `AppenderSkeleton`, before the request has been delegated
    to any particular `Appender` object. Otherwise, if everything is appropriate,
    it proceeds to write the logging information to the associated target.


    `WriterAppender` again has two subclasses, `ConsoleAppender` and `FileAppender`,
    which write to a console and any file object respectively. In real life, we will
    hardly use `WriterAppender` directly. Instead, we will use one of the subclasses
    as described next.'
  raw: '### Adding Appenders to Loggers


    `Logger` objects require one or more `Appender` objects to be associated with
    them in order to print logging information to a particular destination. We can
    add an `Appender` object to a `Logger` with the following method:


    ```

    public void addAppender(Appender appender);

    ```


    or by including the following setting in the configuration file:


    ```

    log4j.logger.loggerName.appender=appenderName

    ```


    The `addAppender()` method adds an `Appender` to the `Logger` object. It is possible
    to add many `Appender` objects to a logger, each printing logging information
    to separate destinations. But there is an important point to be noted about adding
    `Appender`s to loggers: `Appender`s are additive. Each logging request to a logger
    will be forwarded to all the `Appender` objects associated with it and also to
    all the `Appender` objects associated with its parent loggers up in the logger
    hierarchy.


    If you recall the discussion about the logger hierarchy in the "[Logger Object](#LiB0037.html#303)"
    section, you have probably figure out that you can turn the additivity feature
    off by setting the `additivity` flag to `false`, which is done by calling the
    `setAdditivity(Boolean flag)`. If the `additivity` flag is set to `false`, the
    logging information will only be forwarded to the `Appender` objects associated
    with a particular `Logger` object.


    #### A Better Way of Adding Appenders to Loggers


    Although it is perfectly feasible to add `Appender` objects with the `addAppender()`
    method of the `Logger` class, this hard codes the `Logger` and `Appender` relationship;
    as a result, future changes to this relationship mean changing the code, recompiling
    it, and then redeploying it. To avoid this undesirable situation, it is recommended
    you associate `Appender`s to `Logger`s via configuration properties.


    Referring back to the "log4j.properties" configuration file ([Listing 5-1](#LiB0035.html#277)),
    note that we have attached a `ConsoleAppender` to the root logger. In real life,
    this approach is much more flexible and maintainable, as the configuration can
    be changed when needed without changing the code (and even without redeploying
    the application if we have included `ConfigureAndWatch` with the `Configurator`
    classes).


    ### Logger to Appender Collaboration


    So far we have seen how `Logger` objects encapsulate logging information and how
    different `Appender` objects are capable of printing logging information to different
    destinations. But how do `Logger` objects pass logging information to `Appender`
    objects? Creating an intermediate link object named `LoggingEvent` does the trick.
    The `org.apache.log4j.spi.LoggingEvent` class encapsulates all the relevant logging
    information such as the fully qualified name of the caller class, the level of
    the logging message, the message itself, the `Logger` instance, the timestamp,
    and optionally a `java.lang.Throwable` instance. Before proceeding to hand over
    the logging request to any associated `Appender`, the `Logger` creates an instance
    of the `LoggingEvent` object with the logging-related information.


    The `Logger` object then calls the `doAppend(LoggingEvent event)` method of the
    `Appender` objects. Notice from the `Appender` class diagram shown earlier in
    [Figure 5-3](#LiB0041.html#ch05fig03) that all the `Appender` objects inherit
    from the base class `AppenderSkeleton`. The `doAppend()` method is in reality
    implemented within the `AppenderSkeleton` class and inherited by all other `Appender`
    objects. It is important to note that the `doAppend()` method is `synchronized`,
    which means publishing of the logging event happens in a synchronous manner. Therefore,
    log4j is thread-safe.


    The `doAppend()` method performs some crucial checks on the logging request such
    as comparing the requested logging level with the threshold level of any `Appender`
    associated with the `Logger`, checking if the `Appender` is open, and also checking
    any associated `Filter` object with the `Appender`. If it finds a `Filter` object,
    it invokes that `Filter` object to make further decisions about the logging request.
    Once approved, the `append()` method of the associated subclass `Appender` object
    takes over and publishes the logging information.


    ### WriterAppender


    `WriterAppender` is a high-level `Appender` object that extends the `org.apache.log4j.AppenderSkeleton`
    object and writes logging information to a `java.io.Writer` object or `java.io.OutputStream`
    object depending on whether the application developer using this appender has
    set the target to either a `Writer` object or an `OutputStream` object. The `WriterAppender`
    class can have the following properties:


    *   `immediateFlush`: This property indicates if the output stream should be flushed
    each time there is a request to write certain logging information. By default,
    this option is set to `true`. If the flag is set to `false`, then the underlying
    stream can defer the writing of logging information to physical media to a later
    time


    *   `encoding`: It is possible to use any encoding scheme for writing logging
    information. By default, `WriterAppender` uses the system-specific encoding scheme.


    *   `threshold`: This denotes the cutoff level of logging for `WriterAppender`.
    Any logging request with a level below this level will be ignored. There is no
    threshold level set as default, which means that level filtering is not active
    for this `Appender` object.


    *   `target`: This specifies any `java.io.Writer` object or `java.io.OutputStream`
    object.


    |  | Note  | Flushing the stream for every logging request is costly and can slow
    up performance by 10 to 20 percent, but it guarantees that all the information
    is logged. If the `immediateFlush` property is set to `false`, then there is chance
    that some logging information will be missing if there is an arbitrary exit from
    the application or the application crashes. |


    The `WriterAppender` class has the constructors shown in [Table 5-5](#LiB0041.html#ch05table05).


    Table 5-5: Constructors in the WriterAppender Class


    | Constructor | Description |

    | --- | --- |

    | `public WriterAppender();` | This is the default constructor. |

    | `public WriterAppender(Layout layout, OutputStream os)` | This constructor accepts
    a given `Layout` and constructs an `OutputStreamWriter` object with the given
    `OutputStream`. |

    | `public WriterAppender(Layout layout, Writer writer)` | This constructor accepts
    the given `Layout` and the output destination as the `Writer` object. |


    The principal method in the `WriterAppender` class is


    ```

    public void append(LoggingEvent event);

    ```


    This serves as the entry point for this `WriterAppender`. Whenever a logging request
    is made via the `append()` method, it invokes the `protected boolean checkEntryConditions
    ()` method to check if the conditions for logging are valid. It also checks if
    there is a set output target and a layout attached to it. If these conditions
    are not met, then the writing operation returns and prints the appropriate error
    message to the console. Remember that threshold-level checking and any filtering
    of the logging request through any of the associated `Filter` objects has already
    been done by the base class, `AppenderSkeleton`, before the request has been delegated
    to any particular `Appender` object. Otherwise, if everything is appropriate,
    it proceeds to write the logging information to the associated target.


    `WriterAppender` again has two subclasses, `ConsoleAppender` and `FileAppender`,
    which write to a console and any file object respectively. In real life, we will
    hardly use `WriterAppender` directly. Instead, we will use one of the subclasses
    as described next.'
  trans: '

    ### 为日志记录器添加附加器


    `Logger` 对象需要关联一个或多个 `Appender` 对象，才能将日志信息打印到特定目标。我们可以通过以下方法为 `Logger` 添加 `Appender`
    对象：


    ```

    public void addAppender(Appender appender);

    ```


    或者在配置文件中包含以下设置：


    ```

    log4j.logger.loggerName.appender=appenderName

    ```


    `addAppender()` 方法会向 `Logger` 对象添加一个 `Appender`。可以为同一个日志记录器添加多个 `Appender` 对象，每个对象将日志信息打印到不同的目标。但关于为日志记录器添加
    `Appender`，有一个重要点需要注意：`Appender` 具有累加性。每个发送给日志记录器的日志请求，都会被转发给与其关联的所有 `Appender`
    对象，同时也会转发给其父日志记录器（在日志记录器层级结构中向上）所关联的所有 `Appender` 对象。


    如果你还记得“Logger 对象”一节中关于日志记录器层级结构的讨论，你可能已经想到，可以通过将 `additivity` 标志设置为 `false` 来关闭累加特性，这可以通过调用
    `setAdditivity(Boolean flag)` 方法实现。如果 `additivity` 标志被设置为 `false`，日志信息将只会被转发给与特定
    `Logger` 对象关联的 `Appender` 对象。


    #### 为日志记录器添加附加器的更好方法


    虽然使用 `Logger` 类的 `addAppender()` 方法来添加 `Appender` 对象是完全可行的，但这会将 `Logger` 和 `Appender`
    的关系硬编码在代码中；因此，未来对此关系的任何更改都意味着需要修改代码、重新编译并重新部署。为了避免这种不理想的情况，建议你通过配置属性来将 `Appender`
    与 `Logger` 关联起来。


    回顾一下“log4j.properties”配置文件（清单 5-1），注意我们为根日志记录器附加了一个 `ConsoleAppender`。在实际应用中，这种方法更加灵活且易于维护，因为可以在需要时更改配置而无需修改代码（如果我们使用了
    `Configurator` 类中的 `ConfigureAndWatch`，甚至无需重新部署应用程序）。


    ### 日志记录器与附加器的协作


    到目前为止，我们已经了解了 `Logger` 对象如何封装日志信息，以及不同的 `Appender` 对象如何将日志信息打印到不同的目标。但是，`Logger`
    对象是如何将日志信息传递给 `Appender` 对象的呢？创建一个名为 `LoggingEvent` 的中间链接对象就能实现这一目的。`org.apache.log4j.spi.LoggingEvent`
    类封装了所有相关的日志信息，例如调用者类的完全限定名、日志消息的级别、消息本身、`Logger` 实例、时间戳，以及可选的 `java.lang.Throwable`
    实例。在将日志请求移交给任何关联的 `Appender` 之前，`Logger` 会使用与日志相关的信息创建一个 `LoggingEvent` 对象实例。


    然后，`Logger` 对象会调用 `Appender` 对象的 `doAppend(LoggingEvent event)` 方法。从前面图 5-3 所示的
    `Appender` 类图中可以注意到，所有 `Appender` 对象都继承自基类 `AppenderSkeleton`。`doAppend()` 方法实际上是在
    `AppenderSkeleton` 类中实现的，并被所有其他 `Appender` 对象继承。需要注意的是，`doAppend()` 方法是 `synchronized`
    的，这意味着日志事件的发布是以同步方式进行的。因此，log4j 是线程安全的。


    `doAppend()` 方法会对日志请求执行一些关键检查，例如将请求的日志级别与 `Logger` 关联的任何 `Appender` 的阈值级别进行比较，检查
    `Appender` 是否已打开，以及检查与 `Appender` 关联的任何 `Filter` 对象。如果发现 `Filter` 对象，它会调用该 `Filter`
    对象来对日志请求做出进一步决策。一旦获得批准，关联的子类 `Appender` 对象的 `append()` 方法就会接管并发布日志信息。


    ### WriterAppender


    `WriterAppender` 是一个高级 `Appender` 对象，它扩展了 `org.apache.log4j.AppenderSkeleton`
    对象，并根据使用此附加器的应用程序开发者是将目标设置为 `Writer` 对象还是 `OutputStream` 对象，将日志信息写入 `java.io.Writer`
    对象或 `java.io.OutputStream` 对象。`WriterAppender` 类可以具有以下属性：


    *   `immediateFlush`：此属性指示每次有写入特定日志信息的请求时，是否应该刷新输出流。默认情况下，此选项设置为 `true`。如果该标志设置为
    `false`，则底层流可以将日志信息的写入推迟到稍后的时间点再写入物理介质。


    *   `encoding`：可以使用任何编码方案来写入日志信息。默认情况下，`WriterAppender` 使用系统特定的编码方案。


    *   `threshold`：这表示 `WriterAppender` 的日志记录截止级别。任何级别低于此级别的日志请求都将被忽略。默认情况下没有设置阈值级别，这意味着对于此
    `Appender` 对象，级别过滤未激活。


    *   `target`：指定任何 `java.io.Writer` 对象或 `java.io.OutputStream` 对象。


    |  | 注意 | 每次日志请求都刷新流的开销很大，可能会使性能降低 10% 到 20%，但它能保证所有信息都被记录下来。如果 `immediateFlush`
    属性设置为 `false`，那么当应用程序意外退出或崩溃时，某些日志信息可能会丢失。 |


    `WriterAppender` 类具有表 5-5 中所示的构造函数。


    表 5-5：WriterAppender 类中的构造函数


    | 构造函数 | 描述 |

    | --- | --- |

    | `public WriterAppender();` | 这是默认构造函数。 |

    | `public WriterAppender(Layout layout, OutputStream os)` | 此构造函数接受给定的 `Layout`，并使用给定的
    `OutputStream` 构造一个 `OutputStreamWriter` 对象。 |

    | `public WriterAppender(Layout layout, Writer writer)` | 此构造函数接受给定的 `Layout`
    并将输出目标指定为 `Writer` 对象。 |


    `WriterAppender` 类中的主要方法是：


    ```

    public void append(LoggingEvent event);

    ```


    这作为此 `WriterAppender` 的入口点。每当通过 `append()` 方法发出日志请求时，它会调用 `protected boolean checkEntryConditions
    ()` 方法来检查日志记录的条件是否有效。它还会检查是否设置了输出目标以及是否附加了布局。如果这些条件不满足，则写入操作返回并将相应的错误消息打印到控制台。请记住，在请求被委托给任何特定的
    `Appender` 对象之前，基类 `AppenderSkeleton` 已经完成了阈值级别检查以及通过任何关联的 `Filter` 对象对日志请求进行的过滤。否则，如果一切正常，它会继续将日志信息写入关联的目标。


    `WriterAppender` 还有两个子类：`ConsoleAppender` 和 `FileAppender`，它们分别写入控制台和任何文件对象。在实际应用中，我们几乎不会直接使用
    `WriterAppender`。相反，我们会使用接下来描述的子类之一。

    '
- fmt: '### ConsoleAppender


    `org.apache.log4j.ConsoleAppender` is a very simple class designed to write logging
    information to either `System.out` or `System.err`. It extends the `org.apache.log4j.WriterAppender`
    class. Any logging application intended to print logging information to a console
    should use this `Appender`. Interestingly, it overrides the `closeWriter()` method
    from its superclass, `WriterAppender`, and does nothing, as the console stream
    should not be closed. It has the following properties:


    *   `immediateFlush`: This flag is by default set to `true`, which results in
    the console stream being flushed with each logging output request.

    *   `encoding`: It is possible to use any character encoding scheme, but the default
    is the platform-specific encoding scheme.

    *   `threshold`: This is the cutoff logging level. Any logging request with a
    level below the threshold will be ignored. There is no default threshold level
    specified.

    *   `target`: The target destination of the logging output—either `System.out`
    or `System.err`. The default is `System.out`.


    ### FileAppender


    `org.apache.log4j.FileAppender` extends the `org.apache.log4j.WriterAppender`
    class and provides the facility to write logging information to a file. `FileAppender`
    is flexible in terms of how information should be logged to the destination file.
    It can enable buffered writing, append or overwrite information to the same file,
    and roll the filenames depending on data and time. It has the following properties:


    *   `immediateFlush`: This flag is by default set to `true`, which results in
    the output stream to the file being flushed with each append operation.

    *   `encoding`: It is possible to use any character encoding scheme, but the default
    is the platform-specific encoding scheme.

    *   `threshold`: This is the cutoff logging level. Any logging request with a
    level below the threshold will be ignored. There is no default threshold level
    specified.

    *   `fileName`: The name of the file to which the logging information will be
    written. The filename can be specified with a UNIX-style variable name such as
    `${user.home}/log.out`, which means the location of the file `log.out` should
    be in the system-specific `user.home` directory.

    *   `fileAppend`: This is by default set to `true`, which results in the logging
    information being appended to the end of the same file.

    *   `bufferedIO`: This flag indicates whether we need buffered writing enabled.
    It is set to `false` by default.

    *   `bufferSize`: If `bufferedIO` is enabled, this indicates the buffer size.


    [Table 5-6](#LiB0041.html#ch05table06) lists the constructors for the `FileAppender`
    class.


    **Table 5-6: Constructors in the FileAppender Class**


    | Constructor | Description |

    | --- | --- |

    | `public FileAppender()` | The default constructor |

    | `public FileAppender(Layout layout, String fileName);` | The constructor with
    the layout information and the name of the file |

    | `public FileAppender(Layout layout, String fileName, boolean append);` | Same
    as the previous constructor, with an additional Boolean flag for append mode.
    |

    | `public FileAppender(Layout layout, String fileName, boolean append, boolean
    bufferedIO, int bufferSize);` | Constructor with all the parameters set |


    `FileAppender` delegates the printing of logging information to its superclass,
    `WriterAppender`. Interestingly, it sets the `Writer` object of the `WriterAppender`
    to a custom writer, `org.apache.log4j.helpers.QuietWriter`. The `QuietWriter`
    is a normal `java.io.Writer` except that it does not throw any exception if there
    is a problem in I/O operation. Instead, it passes the problem to an `org.apache.log4j.spi.ErrorHandler`
    type of object. The `ErrorHandler` is declared as an interface; one concrete implementation
    of this interface is `org.apache.log4j.helpers.OnlyOnceErrorHandler`. The `OnlyOnceErrorHandler`
    only logs the first error message to `System.err` and silently ignores the rest.
    This is helpful to avoid flooding of the logging destination with error messages.


    The configuration parameters of the `FileAppender` class can be set via the methods
    inherited from the `AppenderSkeleton` class. However, as mentioned previously,
    this ties up the code with the configuration information. It is recommended that
    you separate the configuration information from the source code and specify this
    information through the configuration file settings. For example, a configuration
    file can set the `FileAppender`-specific configuration information in the following
    manner:


    ```

    log4j.appender.dest = org.apache.log4j.FileAppender

    #set the name of the file

    log4j.appender.dest.File=${user.home}/log.out

    #setting the immediate flush to true (default)

    log4j.appender.dest.ImmediateFlush=true

    #setting the threshold

    log4j.appender.dest.Threshold=ERROR

    #setting the append to false, overwrite

    log4j.appender.dest.Append=false

    ```


    This configuration file configures an appender named `dest`. The appender `dest`
    is set to be a `FileAppender` object. The configuration file then sets different
    properties for this `FileAppender` object.'
