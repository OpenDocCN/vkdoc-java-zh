    to a file and also wants to send the same information back to a corporate logging
    database. Application component `B` writes the data to the local file and component
    `C` writes the logging information to the corporate database. Now the important
    point to consider is whether the application components `A`, `B`, and `C` belong
    to a package hierarchy. For example, components `B` and `C` may belong to package
    `com.processor` and component `A` may belong to package `com.processor.order`.
    Another component, `D`, might deal with e-mail–based orders and may be in package
    `com.processor.order.email`. In such situations, we are in a position to use the
    parent-child logger relationship.


    The main point is we need to judge if the loggers are able to justify the parent-child
    relationship on the basis of logging activity and not only by the package structure.
    If they are parent and child in terms of logging behavior, then use the relationship.


    |  | BEST PRACTICE  | If the logger hierarchy is turned on, the logging framework
    needs to determine the parent logger (recursively up the logger tree). This may
    reduce performance. |


    The benchmark result with log4j shows that walking through the logger hierarchy
    is three times slower than normal logging activity. So take great care in determining
    whether to use the logger hierarchy in your applications. The examples provided
    in this book aimed to keep the parent-child relationship turned off unless it
    was necessary to demonstrate how the parent-child relationship works.'
  trans: '

    ## 概述


    在本书中，我们讨论了两种最流行的基于 Java 的日志记录 API：JDK 1.4 日志记录 API 和 Apache log4j API。这两种日志记录
    API 在功能上相似，但 log4j API 提供了更大的灵活性和更强大的日志记录能力。这两种 API 都允许我们通过配置文件来配置和控制日志记录行为。这些
    API 还提供了一系列我们可以用来在应用程序内部记录任何消息的方法。例如，我们可以通过编程方式覆盖日志记录框架中不同组件的状态。我们已经看到，在这两种日志记录
    API 中，扩展现有的日志记录框架也是可能的，并且我们可以在框架内集成自己的自定义日志记录组件。这有助于我们在应用程序中实现特定的日志记录行为。尽管这非常有用，但在使用现有日志记录框架或通过添加自定义组件来扩展它时，仍有一些要点需要考虑。


    请记住，日志记录并非大多数应用程序的主要目标。它仅仅是为了帮助我们跟踪应用程序的内部状态。它帮助我们更快地发现问题，发布消息以确定系统运行状况，并以更少的时间和成本维护和调试应用程序。另一方面，错误地使用日志记录可能会影响应用程序的速度和功能。因此，在为日志记录过程选择正确的组件以及使用这些组件的最佳方式时，需要格外小心。检查自定义日志记录组件是否以任何方式影响现有组件的速度和完整性也非常重要。


    在本章中，我们将讨论一些对日志记录性能至关重要的要点。除非另有说明，这些要点对于 JDK 1.4 日志记录 API 和 Apache log4j API 均适用。


    最后，本章将从内部工作机制和性能方面对 log4j 和 JDK 1.4 日志记录 API 进行比较，以便在您自己的应用程序中实现日志记录时，您能知道哪个 API
    最能满足您的需求。


    ## 获取日志记录器


    在 JDK 1.4 日志记录 API 和 log4j 中，日志记录框架的入口点是 `Logger` 对象。我们获取一个 `Logger` 对象的实例，并让它以不同的级别记录不同的消息。通常，在应用程序中，我们会获取命名的日志记录器。这些
    `Logger` 对象应该使用什么命名约定呢？


    对于日志记录器的名称应该是什么，并没有严格的规定。尽管如此，我们在为应用程序中的 `Logger` 对象选择命名约定时仍需格外小心。我们通过配置文件来配置一个
    `Logger`。我们如何知道哪个应用程序组件正在使用哪个 `Logger` 对象？如果我们更改某个特定日志记录器的配置，它将如何影响整个应用程序？想象一下，我们有一个包含数百个不同组件的应用程序，它们都使用一个公共的日志记录配置文件。在这种情况下，我们肯定需要为日志记录器对象制定一个命名策略，以便我们知道每个组件正在使用哪些单独的日志记录器。通过采用设计良好的命名约定，我们可以轻松评估对特定日志记录器配置所做的任何更改所产生的影响。


    |  | 最佳实践 | 对 `Logger` 对象使用基于包的命名约定。 |


    一个很好的命名约定思路是基于包的命名。通常，应用程序组件被划分到多个包中。每个包又包含应用程序特定方面的相关类。使用基于包名的 `Logger` 对象是一个好习惯，因为这种约定易于维护。


    |  | 最佳实践 | 当同一包中的组件可能需要不同的日志记录行为时，应根据组件执行的任务来区分日志记录器。 |


    紧接着出现的问题是，一个包是否包含执行多种不同活动的类。例如，包 `com.apress.logging.log4j.util` 可能包含许多工具类。如果所有这些类都使用名为
    `com.apress.logging.log4j.util` 的同一个日志记录器，那么更改此日志记录器的配置将影响该包内的所有工具类。这可能是不希望的。例如，`util`
    包中的一个类可能正在将数据写入文件，而另一个类可能正在将数据发送到远程 TCP/IP 服务器。我们可能需要为执行 TCP/IP 操作的类启用详细的日志记录，但可能不需要为执行文件
    I/O 的类提供相同级别的详细日志记录。在这种情况下，使用两个不同的日志记录器并根据它们执行的工作来命名可能会有所帮助。


    要点在于为应用程序中使用的日志记录器制定一个合适的命名约定。这将提高日志记录器的可维护性。同时，它也有助于避免一个日志记录器的配置更改影响其他日志记录器这种不期望的情况发生。


    ## 使用日志记录器层次结构


    JDK 1.4 日志记录 API 和 log4j 都支持日志记录器层次结构。日志记录器以父子关系组织。例如，名为 `com.foo` 的日志记录器是子日志记录器
    `com.foo.bar` 的父日志记录器。在日志记录器层次结构中，子日志记录器从其直接父日志记录器继承属性和日志记录器组件。简而言之，这意味着子日志记录器捕获的所有日志记录事件将由子日志记录器本身及其父日志记录器共同处理。这也可能意味着，如果子日志记录器和父日志记录器使用相同的日志记录目标，日志消息将出现两次，这可能是不希望的。当然，在这两种
    API 中，我们都可以关闭层次结构中对父日志记录器的使用。在 JDK 1.4 日志记录 API 中，使用以下代码：


    ```

    setUseParentHandlers(false);

    ```


    在 log4j 中，使用


    ```

    setAdditivity(false);

    ```


    或者通过配置文件添加以下行：


    ```

    log4j.logger.[logger name].additivity=false

    ```


    同样，在某些情况下，我们可能希望启用此日志记录器层次结构。


    |  | 最佳实践 | 当一个应用程序组件试图通过使用属于同一包的不同组件将相同的信息记录到不同的目标时，尝试使用日志记录器层次结构。 |


    想象一个订单处理应用程序，其中组件 `A` 接收订单。它处理订单，现在需要将特定于订单的日志记录信息存储到文件中，并且还希望将相同的信息发送回公司日志记录数据库。应用程序组件
    `B` 将数据写入本地文件，组件 `C` 将日志记录信息写入公司数据库。现在需要考虑的重要点是，应用程序组件 `A`、`B` 和 `C` 是否属于一个包层次结构。例如，组件
    `B` 和 `C` 可能属于包 `com.processor`，而组件 `A` 可能属于包 `com.processor.order`。另一个组件 `D`
    可能处理基于电子邮件的订单，并且可能位于包 `com.processor.order.email` 中。在这种情况下，我们可以利用父子日志记录器关系。


    要点在于，我们需要判断日志记录器是否能够基于日志记录活动（而不仅仅是包结构）来证明父子关系的合理性。如果它们在日志记录行为方面是父子关系，那么就使用这种关系。


    |  | 最佳实践 | 如果启用了日志记录器层次结构，日志记录框架需要确定父日志记录器（在日志记录器树中递归向上查找）。这可能会降低性能。 |


    使用 log4j 的基准测试结果表明，遍历日志记录器层次结构比正常的日志记录活动慢三倍。因此，在确定是否在应用程序中使用日志记录器层次结构时需要格外小心。本书提供的示例旨在保持父子关系关闭，除非有必要演示父子关系是如何工作的。

