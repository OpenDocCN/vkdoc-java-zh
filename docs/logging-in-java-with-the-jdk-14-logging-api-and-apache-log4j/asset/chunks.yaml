    \ implements Runnable{\n\nprivate static Logger logger =\nLogger.getLogger(FileBasedLoggingDemo.class.getPackage().getName());\n\
    \    /** 创建 FileBasedLoggingDemo 的新实例 */\n    public FileBasedLoggingDemo()\n\
    \    {\n    }\n\n/** 此方法由应用程序调用。该方法创建一个新线程来开始日志记录\n     */\n    public void doLogging()\n\
    \    {\n        Thread t = new Thread(this);\n        t.start();\n    }\n\n/**\
    \ 线程的 run()方法，以 60 秒的间隔重复进行日志记录\n     */\n    public void run()\n    {\n     \
    \   int count=1;\n        while(true) {\n            //记录信息\n            try {\n\
    \                logger.debug(\"正在记录信息...\"+count);\n                Thread.sleep(60*1000);\n\
    \                count++;\n            }catch(Exception e) {\n               \
    \ logger.warn(\"发生异常\", e);\n            }\n        }\n    }\n    /** 主方法\n  \
    \   */\n    public static void main(String args[])\n    {\n        FileBasedLoggingDemo\
    \ demo = new FileBasedLoggingDemo();\n        demo.doLogging();\n    }\n}\n```\n\
    \n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n该程序将通过三个不同的附加器——`FILE`、`ROLLING`和`DAILY`——将日志信息发布到三个不同的文件：\"\
    out.log\"、\"rolling.log\"和\"daily.log\"。`DailyRollingFileAppender`被配置为每分钟记录信息并滚动一次。所有附加器的`append`属性都设置为`true`，在达到滚动条件之前，它们会将所有日志消息追加到同一个文件中。执行时，该程序将在`user.home`系统属性定义的位置创建如下文件：\n\
    \n| 文件名 | 描述 |\n| --- | --- |\n| daily.log. 2002-09-30-21-35 | 记录于 2002 年 9 月\
    \ 30 日 21:35 |\n| daily.log. 2002-09-30-21-36 | 记录于 2002 年 9 月 30 日 21:36 |\n\
    | out.log | 普通日志文件 |\n| rolling.log | 初始滚动文件 |\n| rolling.log.1 | 达到最大文件大小后的滚动文件\
    \ |\n"
- fmt: "### AsyncAppender\n\n当应用程序产生大量日志信息时，异步生成日志消息可能至关重要，这可以显著提升性能。正如我们在之前讨论`Appender`对象时提到的，`doAppend()`方法是`synchronized`的。当数千个`Logger`对象试图使用同一个`Appender`对象打印日志信息时，这可能会降低性能。`AsyncAppender`对象使用一个有界缓冲区来存储日志事件。一旦缓冲区大小达到限制，日志事件就会被分派到特定的`Appender`对象。可以将多个`Appender`对象附加到`AsyncAppender`上。`AsyncAppender`对象为缓冲区中的每个`LoggingEvent`对象使用一个单独的线程。\n\
    \n`org.apache.log4j.AsyncAppender`类继承自`org.apache.log4j.AppenderSkeleton`类，并实现了`org.apache.log4j.spi.AppenderAttachable`接口。`AppenderAttachable`接口定义了一组方法，任何接受`Appender`对象的类都应实现这些方法。这组方法包括向该类附加和移除`Appender`对象的方法。默认情况下，`AsyncAppender`的缓冲区大小可以容纳128个`LoggingEvent`对象。在log4j\
    \ 1.2.6版本之前，`AsyncAppender`只能通过`DOMConfigurator`使用XML风格的配置文件进行配置。\n\n[清单5-9](#LiB0041.html#ch05ls09)展示了`AsyncAppender`的XML配置文件。该配置定义了一个`ConsoleAppender`作为所定义`AsyncAppender`的目标`Appender`。`ConsoleAppender`被赋予一个带有转换模式的`PatternLayout`，用于格式化日志消息。名为`com.apress.logging.log4j`的记录器和根记录器都使用名为`ASYNC`的附加器来实现异步日志记录。\n\
    \n**清单5-9: async.xml**\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ log4j:configuration SYSTEM \"log4j.dtd\">\n\n<log4j:configuration xmlns:log4j=\"\
    http://jakarta.apache.org/log4j/\"\ndebug=\"true\">\n\n<appender name=\"ASYNC\"\
    \ class=\"org.apache.log4j.AsyncAppender\">\n        <appender-ref ref=\"CONSOLE\"\
    />\n</appender>\n\n<appender name=\"CONSOLE\" class=\"org.apache.log4j.ConsoleAppender\"\
    >\n <layout class=\"org.apache.log4j.PatternLayout\">\n        <param name=\"\
    ConversionPattern\"\n                           value=\"%d %-5p [%t] - %m%n\"\
    />\n </layout>\n</appender>\n    <logger name=\"com.apress.logging.log4j\" additivity=\"\
    false\">\n         <level value=\"debug\"/>\n         <appender-ref ref=\"ASYNC\"\
    />\n    </logger>\n <root>\n  <priority value=\"debug\"/>\n  <appender-ref ref=\"\
    ASYNC\"/>\n </root>\n</log4j:configuration>\n```\n\n[清单5-10](#LiB0041.html#ch05ls10)中的程序`AsyncLogging.java`使用[清单5-9](#LiB0041.html#ch05ls09)中定义的`async.xml`文件作为其配置源。此示例简单地将所使用的`AsyncAppender`的缓冲区大小设置为4。只要日志事件的数量小于缓冲区大小，`AsyncAppender`就不会打印任何消息。一旦日志事件的数量超过缓冲区大小，缓冲区就会被刷新，所有消息都会被打印出来。\n\
    \n**清单5-10: AsyncLogging.java**\n\n```\npackage com.apress.logging.log4j;\n\n\
    import org.apache.log4j.*;\nimport org.apache.log4j.xml.DOMConfigurator;\npublic\
    \ class AsyncLogging\n{\n\n//private static Logger logger\n    Logger.getLogger(AsyncLogging.class.getPackage().getName());\n\
    \        private AsyncAppender asyncAppender = null;\n    private ConsoleAppender\
    \ consoleAppender = null;\n\n/** Creates a new instance of AsyncLogging */\n \
    \   public AsyncLogging()\n    {\n        try {\n            logger.setAdditivity(false);\n\
    \            asyncAppender =\n(AsyncAppender)logger.getRootLogger().getAppender(\"\
    ASYNC\");\n            asyncAppender.setBufferSize(4);\n        }catch(Exception\
    \ e) {\n            System.out.println(\"error: \"+e.toString());\n        }\n\
    \n}\n\n/** This method simply logs the messages\n     */ \n    public void doLogging()\n\
    \    {\n        logger.debug(\"Hello 1\");\n        logger.debug(\"Hello 2\");\n\
    \        logger.debug(\"Hello 3\");\n        //logger.debug(\"Hello 4\");\n  \
    \      //logger.debug(\"Hello 5\");\n    }\n\n/** the main method\n     */\n \
    \   public static void main(String args[])\n    {\n        AsyncLogging demo =\
    \ new AsyncLogging();\n        demo.doLogging();\n    }\n}\n```\n\n执行此程序不会产生任何日志消息，因为`AsyncAppender`的缓冲区大小设置为4，而我们只记录了3个事件。如果我们取消注释另外两个编号为4和5的日志事件，我们将看到这些消息在控制台中打印如下：\n\
    \n```\n2002-10-13 14:05:34,198 DEBUG [main] - Hello 1\n2002-10-13 14:05:34,218\
    \ DEBUG [main] - Hello 2\n2002-10-13 14:05:34,218 DEBUG [main] - Hello 3\n2002-10-13\
    \ 14:05:34,218 DEBUG [main] - Hello 4\n2002-10-13 14:05:34,218 DEBUG [main] -\
    \ Hello 5\n```"
  raw: "### AsyncAppender\n\nWhen an application produces a huge amount of logging\
    \ information, it may be critical to produce logging messages asynchronously,\
    \ which might improve performance by a considerable amount. As mentioned in our\
    \ discussion of the previous `Appender` objects, the `doAppend()` method is `synchronized`.\
    \ This might reduce performance when thousands of `Logger` objects are trying\
    \ to use the same `Appender` object to print logging information. The `AsyncAppender`\
    \ object uses a bounded buffer to store logging events. Once the size limit of\
    \ the buffer is reached, the logging events are dispatched to specific `Appender`\
    \ objects. It is possible to attach multiple `Appender` objects to `AsyncAppender`.\
    \ The `AsyncAppender` object uses a separate thread for each `LoggingEvent` object\
    \ contained in the buffer.\n\nThe `org.apache.log4j. AysncAppender` class extends\
    \ the `org.apache.log4j.AppenderSkeleton` class and also implements an interface,\
    \ `org.apache.log4j.spi.AppenderAttachable`. The interface `AppenderAttachable`\
    \ defines a set of methods that any object accepting an `Appender` object should\
    \ implement. The set of methods includes those for attaching and removing `Appender`\
    \ objects to the class. By default, the `AsyncAppender`'s buffer size can contain\
    \ 128 `LoggingEvent` objects. Until release 1.2.6 of log4j, `AsyncAppender` could\
    \ only be configured by `DOMConfigurator` through an XML-style configuration file.\n\
    \n[Listing 5-9](#LiB0041.html#ch05ls09) demonstrates the XML configuration file\
    \ for `AsyncAppender`. The configuration defines a `ConsoleAppender` as the target\
    \ `Appender` for the defined `AsyncAppender`. The `ConsoleAppender` is given a\
    \ `PatternLayout` with a conversion pattern to format the logging message. The\
    \ named logger `com.apress.logging.log4j` and the root logger both use the appender\
    \ named `ASYNC` to implement asynchronous logging.\n\nListing 5-9: async.xml\n\
    \n| **![Start example](_1.gif)** |\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<!DOCTYPE log4j:configuration SYSTEM \"log4j.dtd\">\n\n<log4j:configuration\
    \ xmlns:log4j=\"http://jakarta.apache.org/log4j/\"\ndebug=\"true\">\n\n<appender\
    \ name=\"ASYNC\" class=\"org.apache.log4j.AsyncAppender\">\n        <appender-ref\
    \ ref=\"CONSOLE\"/>\n</appender>\n\n<appender name=\"CONSOLE\" class=\"org.apache.log4j.ConsoleAppender\"\
    >\n <layout class=\"org.apache.log4j.PatternLayout\">\n        <param name=\"\
    ConversionPattern\"\n                           value=\"%d %-5p [%t] - %m%n\"\
    />\n </layout>\n</appender>\n    <logger name=\"com.apress.logging.log4j\" additivity=\"\
    false\">\n         <level value=\"debug\"/>\n         <appender-ref ref=\"ASYNC\"\
    />\n    </logger>\n <root>\n  <priority value=\"debug\"/>\n  <appender-ref ref=\"\
    ASYNC\"/>\n </root>\n</log4j:configuration>\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nThe program in [Listing 5-10](#LiB0041.html#ch05ls10), `AsyncLogging.java`,\
    \ uses the \"async.xml\" file defined in [Listing 5-9](#LiB0041.html#ch05ls09)\
    \ as its configuration source. This example simply sets the buffer size for the\
    \ `AsyncAppender` being used to 4\\. The `AsyncAppender` will not print any message\
    \ so long as the number of logging events is less than the buffer size. Once the\
    \ number of logging events exceeds the buffer size, the buffer is flushed and\
    \ all the messages will be printed.\n\nListing 5-10: AsyncLogging.java\n\n| **![Start\
    \ example](_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.*;\n\
    import org.apache.log4j.xml.DOMConfigurator;\npublic class AsyncLogging\n{\n\n\
    //private static Logger logger\n    Logger.getLogger(AsyncLogging.class.getPackage().getName());\n\
    \        private AsyncAppender asyncAppender = null;\n    private ConsoleAppender\
    \ consoleAppender = null;\n\n/** Creates a new instance of AsyncLogging */\n \
    \   public AsyncLogging()\n    {\n        try {\n            logger.setAdditivity(false);\n\
    \            asyncAppender =\n(AsyncAppender)logger.getRootLogger().getAppender(\"\
    ASYNC\");\n            asyncAppender.setBufferSize(4);\n        }catch(Exception\
    \ e) {\n            System.out.println(\"error: \"+e.toString());\n        }\n\
    \n}\n\n/** This method simply logs the messages\n     */ \n    public void doLogging()\n\
    \    {\n        logger.debug(\"Hello 1\");\n        logger.debug(\"Hello 2\");\n\
    \        logger.debug(\"Hello 3\");\n        //logger.debug(\"Hello 4\");\n  \
    \      //logger.debug(\"Hello 5\");\n    }\n\n/** the main method\n     */\n \
    \   public static void main(String args[])\n    {\n        AsyncLogging demo =\
    \ new AsyncLogging();\n        demo.doLogging();\n    }\n}\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nExecuting this program will not produce any logging messages, as\
    \ the buffer size for the `AsyncAppender` is set to 4, and we are only logging\
    \ 3 events. If we uncomment the two other logging events, numbered 4 and 5, and\
    \ we will see these messages printed in the console as follows:\n\n```\n2002-10-13\
    \ 14:05:34,198 DEBUG [main] - Hello 1\n2002-10-13 14:05:34,218 DEBUG [main] -\
    \ Hello 2\n2002-10-13 14:05:34,218 DEBUG [main] - Hello 3\n2002-10-13 14:05:34,218\
    \ DEBUG [main] - Hello 4\n2002-10-13 14:05:34,218 DEBUG [main] - Hello 5\n```"
