    \ 的架构、使用和扩展。我们还看到了一个实际示例，展示了日志 API 如何在跟踪和调试应用程序中非常有用。在需要时发布日志消息的灵活性以及我们选择的粒度，对应用程序开发人员和管理员来说意义重大。从下一章开始，我们将以类似的详细程度探讨\
