    \ JVM 中，如果我们将 `WindowHandler` 的级别更改为 Level.INFO，那么我们将看到如图 4-6 所示的日志信息。\n\n![点击展开](img/fig4-6_0.jpg)\n\
    图 4-6：客户端日志窗口中的日志信息\n\n显然，更改级别减少了信息量。日志现在更易读了。但请注意，我们仅仅通过更改配置文件就实现了这一点——这正是拥有像\
