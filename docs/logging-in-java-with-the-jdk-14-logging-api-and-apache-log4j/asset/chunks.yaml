    public void log(LogRecord record);\n```\n\n如前所述，日志记录方法的可选`Object`参数可以被`Filter`对象使用。例如，如果我们想记录金额超过\
    \ 100 美元的订单信息，我们可以将一个`Order`对象作为可选参数传递给日志记录方法。任何与`Handler`或`Logger`对象关联的`Filter`对象随后都可以检查订单值，并相应地接受或拒绝日志记录请求。\n\
    \n#### 精确日志记录方法\n\n以下方法与基本日志记录方法相同，只是它们显式指定了源类名和源方法名。表面上，这似乎是日志记录信息的一个简单方面，但在日志记录中可能是一个非常重要的问题。JDK\
    \ 1.4 日志记录 API 默认尝试通过分析堆栈跟踪来确定任何特定日志记录请求的位置信息。这是一个 CPU 密集型操作，其结果通常不可信。因此，无论何时你希望源类和源方法名称成为日志记录信息的一部分，都应该使用精确日志记录方法。\n\
    \n```\npublic void logp(Level level, String sourceClass, String sourceMethod,\n\
    Stringmessage);\npublic void logp(Level level, String sourceClass,\nString sourceMethod,\
    \ String message, Object param1);\npublic void logp(Level level, String sourceClass,\n\
    String sourceMethod, String message, Object[] params);\npublic void logp(Level\
    \ level, String sourceClass,\nString sourceMethod, String message, Throwable thrown);\n\
    ```\n\n#### 使用 ResourceBundle 进行日志记录\n\n以下方法与精确日志记录方法相同，只是它们接受一个`ResourceBundle`名称，该名称将由`Formatter`对象用于本地化目的。\n\
    \n`java.util.ResourceBundle`是一种使我们的程序与语言无关的技术。使用这种技术，在最简单的层面上，我们在程序中使用某些键。这些键映射到某些消息（值），并在属性文件中定义。`ResourceBundle`属性文件是特定于区域设置的。例如，我们可以在两个独立的属性文件“MyResources_en.properties”和“MyResources_de.properties”中定义英语和德语消息。在程序中，我们可以使用名称为`MyResource.properties`的`ResourceBundle`对象。在需要德语区域设置的情况下，我们的程序将自动选取名为`MyResources_de.properties`的资源。\n\
    \n在`Logger`类的基于`ResourceBundle`的日志记录方法中，消息参数用作资源包的键，以定位本地化的消息值。\n\n```\n public\
    \ void logrb(Level level, String sourceClass,\nString sourceMethod, String bundleName,\
    \ String message);\npublic void logrb(Level level, String sourceClass,\nString\
    \ sourceMethod, String bundleName, String message,\nObject param1);\npublic void\
    \ logrb(Level level, String sourceClass,\nString sourceMethod, String bundleName,\n\
    String message, Object[] params);\npublic void logrb(Level level, String sourceClass,\n\
    String sourceMethod, String bundleName, String message,\nThrowable thrown);\n\
    ```\n"
- fmt: "### Level-Based Logging\n\nThe `Logger` class provides logging methods that\
    \ use a particular logging level. The methods that fall into this category are\
    \ discussed in this section.\n\nThe following method prints the message parameter\
    \ with the `Level.INFO` logging level:\n\n```\npublic void info(String message);\n\
    ```\n\nThe following set of methods print messages with `Level.FINE`, `Level.FINER`,\
    \ and `Level.FINEST` logging levels. The only difference among these methods is\
    \ in the granularity of the logging message.\n\n```\npublic void fine(String message);\n\
    public void finer(String message);\npublic void finest(String message);\n```\n\
    \nThe following method prints messages with the `Level.CONFIG` logging level and\
    \ is generally used to print the configuration-related information:\n\n```\npublic\
    \ void config(String message);\n```\n\nThe following method prints messages with\
    \ the `Level.WARNING` logging level. Such messages usually contain any information\
    \ about potential risks to the system that should be attended to immediately.\n\
    \n```\npublic void warning(String message);\n```\n\nThe following method prints\
    \ messages with the `Level.SEVERE` logging level. These messages often contain\
    \ information that is extremely critical to the system about problems that may\
    \ be causing the system to malfunction.\n\n```\npublic void severe(String message);\n\
    ```\n\nHowever, it purely depends on the application developers to decide which\
    \ level to use for logging a certain piece of information. It is often a good\
    \ practice to decide the levels that should be used to publish certain categories\
    \ of information. For example, messages indicating problems related to database\
    \ access operation are crucial to the system. These sorts of messages can be published\
    \ with the level `SEVERE`. On the other hand, the debug traces from within an\
    \ application can be published with the level `INFO`.\n\nThe appropriate separation\
    \ of levels for messages becomes beneficial at the deployment stage of the application.\
    \ You can configure loggers to publish messages that are crucial to the system\
    \ only with `SEVERE` or `WARNING` levels. However, you will likely configure to\
    \ a lower level the loggers that provide detailed information for debugging the\
    \ application.\n\n### Method-Related Logging\n\nThe following are convenience\
    \ methods for tracking method-level activities such as the entry and exit to any\
    \ method.\n\n```\npublic void entering(String sourceClass, String sourceMethod);\n\
    public void entering(String sourceClass, String sourceMethod, Object param1);\n\
    public void entering(String sourceClass, String sourceMethod, Object params[]);\n\
    public void exiting(String sourceClass, String sourceMethod);\npublic void exiting(String\
    \ sourceClass, String sourceMethod, Object param);\npublic void exiting(String\
    \ sourceClass, String sourceMethod, Object[] params);\n```\n\nThese methods internally\
    \ use the `Level.FINER` logging level to log messages, and as a result should\
    \ only be used to create debug traces.\n\n### Logger Example\n\nAs discussed in\
    \ the previous sections, the `Logger` class provides various convenience methods\
    \ for logging. Application developers can choose to use any of the methods depending\
    \ on various other conditions within the application. [Listing 2-5](#LiB0016.html#ch02ls05),\
    \ `LogMethods.java`, will demonstrate the use of different logging methods within\
    \ the `Logger` class.\n\n**Listing 2-5: LogMethods.java**\n\n```\npackage sam.logging;\n\
    \nimport java.util.logging.*;\nimport java.io.IOException;\npublic class LogMethods\n\
    {\n    private static Logger logger = Logger.getLogger(\"sam.logging\");\n   \
    \ public LogMethods()\n    {\n        //first obtain the logmanager instance\n\
    \        LogManager manager = LogManager.getLogManager();\n        //remove all\
    \ the associated handlers with this manager\n        manager.reset();\n      \
    \  //create a new handler for the logger to write messages\n        // to the\
    \ console\n        ConsoleHandler ch = new ConsoleHandler();\n        ch.setLevel(Level.FINEST);\n\
    \n//setting the logger level and handler\n        logger.setLevel(Level.FINEST);\n\
    \        logger.addHandler(ch);\n\n}\n\n/**\n     * This method demonstrates the\
    \ basic logging methods\n     */\n    public void printBasicMethods()\n    {\n\
    \        logger.log(Level.INFO, \"THIS IS INFO LEVEL MESSAGE\");\n\n//creating\
    \ a log record on our own\n        LogRecord record = new LogRecord(Level.SEVERE,\
    \ \"OUR OWN LOGRECORD OBJECT\");\n\n//logging the log record object\n        logger.log(record);\n\
    \    }\n\n/**\n     * This method demonstrates the precise logging methods\n \
    \    */\n\npublic void printPreciseMethods()\n    {\n        logger.logp(Level.INFO,\
    \ \"LogMethods\", \"printPreciseMethods\",\n\"PRECISE METHODS..\");\n    }\n\n\
    /**\n     * This method demonstrates the level based logging methods\n     */\n\
    \    public void printLevelMethods()\n    {\n\nlogger.fine(\"THIS IS A FINE LEVEL\
    \ MESSAGE\");\n        logger.finer(\"THIS IS A FINER LEVEL MESSAGE\");\n    \
    \    logger.finest(\"THIS IS A FINEST LEVEL MESSAGE\");\n        logger.config(\"\
    THIS IS CONFIG LEVEL MESSAGE\");\n    }\n    /**\n     *This method demonstrates\
    \ the method level logging methods\n     */\n    public void printMethod()\n \
    \   {\n\nlogger.entering(\"LogMethods\", \"printMethod\");\n        logger.exiting(\"\
    LogMethods\", \"printMethod\");\n    }\n\npublic static void main(String[] args)\n\
    \    {\n        LogMethods lm = new LogMethods();\n        lm.printBasicMethods();\n\
    \        lm.printPreciseMethods();\n        lm.printLevelMethods();\n        lm.printMethod();\n\
    \    }\n}\n```\n\nThis program demonstrates some important concepts about how\
    \ the logging framework works in real life. By default, the logging framework\
    \ sets up a default root logger, which is always present. The root logger has\
    \ a `ConsoleHandler` object associated with it as the default handler, capable\
    \ of printing information to `System.err`. The application can obtain any other\
    \ named or anonymous `Logger` instance, and can then potentially attach any other\
    \ `Handler` object to the `Logger`. If no `Handler` object is explicitly attached\
    \ to the `Logger` instance, and the use of parent handlers is enabled, the `Logger`\
    \ then will use the `Handler` objects associated with its parent loggers.\n\n\
    The default level associated with the `ConsoleHandler` is `Level.INFO`, which\
    \ means that this handler will ignore any message with a lower level. In this\
    \ scenario, logging methods such as `log.fine()`, `log.finer()`, etc., will not\
    \ print any message. To avoid this problem, we can programmatically remove any\
    \ handler associated with the `LogManager` of the current Java VM instance, and\
    \ assign our own `Handler` object to the logger with the appropriate logging level\
    \ associated with it."
