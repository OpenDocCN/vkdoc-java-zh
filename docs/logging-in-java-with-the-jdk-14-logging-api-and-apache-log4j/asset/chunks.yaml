- fmt: "### A Logger Example\n\nThe program shown in [Listing 5-6](#LiB0037.html#ch05ls06),\
    \ `LoggerDemo.java`, will demonstrate the basic logging methods and also experiment\
    \ with localizing the logging information.\n\n**Listing 5-6:** `LoggerDemo.java`\n\
    \n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.*;\n\n/**\
    \ This class demonstrates the basic use of Logger class methods\n */\npublic class\
    \ LoggerDemo {\n\nprivate static Logger logger =\nLogger.getLogger(LoggerDemo.class.getPackage().getName());\n\
    /** Creates a new instance of LoggerDemo */\npublic LoggerDemo(String rbName)\
    \ {\n        //setting the use of parent handler to false\n        logger.setAdditivity(false);\n\
    \        logger.debug(\"Set the parent additivity to false...\");\n        logger.setResourceBundle(java.util.ResourceBundle.getBundle(rbName));\n\
    \        logger.debug(\"Set the resource bundle...\");\n    }\n\n/** demonstrates\
    \ the basic level based logging methods\n     * @param name name to say hello\
    \ to\n     */\n    public void doLogging(String name) {\n        logger.debug(\"\
    Entered the doLogging method..\");\n        String str = \"Hello \";\n       \
    \ String output = null;\n\nif(name == null) {\n            output = \"Anonymous\"\
    ;\n            logger.warn(\"No name passed, set to anonymous...\");\n       \
    \ }else {\n            output = str.concat(name);\n            logger.info(\"\
    Constructed the string object...\"+output);\n        }\n\nlogger.info(\"printing\
    \ the message...\");\n        logger.debug(\"Exiting the doLogging method...\"\
    );\n    }\n\n/** demonstrates the localized logging methods\n     */\n    public\
    \ void doLocalizedLogging() {\n\nlogger.l7dlog(Level.DEBUG, \"Entry\", null);\n\
    \        logger.l7dlog(Level.DEBUG, \"Exit\", null);\n    }\n\npublic static void\
    \ main(String args[]) {\n        String name = args[0];\n        String rbName\
    \ = args[1];\n        LoggerDemo demo = new LoggerDemo(rbName);\n        demo.doLogging(name);\n\
    \        demo.doLocalizedLogging();\n    }\n}\n```\n\nTo execute this program,\
    \ we use the same `\"log4j.properties\"` file described in [Listing 5-3](#LiB0035.html#285).\
    \ First, we obtain a `Logger` instance with the name of the package of the `LoggerDemo`\
    \ class as a class variable. In the constructor, we set the `additivity` property\
    \ of this logger to `false`, which means that this logger will not forward any\
    \ logging requests to its immediate parent logger. Next, we set the `ResourceBundle`\
    \ for this logger, which will be used for the localization of the logging information.\
    \ The `doLogging()` method uses several logging methods from the `Logger` class.\
    \ Logging information with less severity is printed with the `debug()` method,\
    \ and other important messages are printed with the `info()` and `warn()` methods\
    \ of the `Logger` class.\n\nThe `doLocalizedLogging()` method simply prints two\
    \ messages to demonstrate how a message passed to the logging methods is interpreted\
    \ as the localization key and the corresponding message value is printed. Consider\
    \ the following `\"logging_fr.properties\"` file containing the localization key\
    \ and value:\n\n```\nEntry=Entrer\nExit=Sortir\n```\n\nWhen the `17dlog()` method\
    \ is called by passing the messages `\"Entry\"` and `\"Exit\"` respectively, the\
    \ log4j framework looks into `\"logging_fr.properties\"` and prints the corresponding\
    \ values as the logging information.\n\nIf we execute the program with the following\
    \ command:\n\n```\n java -Dlog4j.configuration=log4j.properties\ncom.apress.logging.log4j.LoggerDemo\
    \ sam logging_fr\n```\n\nwe will see the following information being printed in\
    \ the console:\n\n```\nDEBUG - Set the parent additivity to false...\nDEBUG -\
    \ Set the resource bundle...\nDEBUG - Entered the doLogging method..\nINFO - Constructed\
    \ the string object...Hello sam\nINFO - printing the message...\nDEBUG - Exiting\
    \ the doLogging method...\nDEBUG - Entrer\nDEBUG - Sortir\n```\n\nNotice that\
    \ the last two lines of the logging message are printed as localized messages.\
    \ The information with the level `DEBUG` is only intended to be printed during\
    \ development to provide a better understanding of the control flow of the application.\
    \ We can easily turn off `DEBUG`-level messages by changing the level in the `\"\
    log4j.properties\"` file as follows:\n\n```\nlog4j.logger.com.apress.logging.log4j=INFO,\
    \ X\n```\n\nWith the new level set to `INFO`, the logger will only print messages\
    \ with a priority equal to or greater than `INFO`. If we reexecute the program\
    \ with the preceding settings, we will see the following output to the console:\n\
    \n```\nINFO - Constructed the string object...Hello sam\nINFO - printing the message...\n\
    ```\n\nNotice that `DEBUG`-level messages are omitted this time.\n\n## LogManager\
    \ Object\n\nThe `org.apache.log4j.LogManager` class manages the creation and storage\
    \ of each named logger created from within an application. Internally it uses\
    \ another helper class, `org.apache.log4j.Hierarchy`, to store the reference of\
    \ each `Logger` object created. The hierarchy is such that every child logger\
    \ created will have a pointer to its parent logger, but a parent logger will not\
    \ have any reference to its child logger. Also, log4j does not restrict application\
    \ developers from instantiating a child logger before its parent. In such scenarios,\
    \ the child logger instance is created, and in the `Hierarchy` class it is stored\
    \ with an empty node for the future assignment of a parent logger whenever it\
    \ is created.\n\nApplication developers normally do not have to bother about using\
    \ the `Hierarchy` class. Instead, they use the convenience methods provided by\
    \ the `LogManager` and `Logger` classes to create and obtain any named logger.\
    \ It is also interesting to note that when we change the property of any existing\
    \ named logger, a new instance is never created. The existing reference is obtained\
    \ from the `Hierarchy` class, and the properties are changed to that reference.\
    \ This is the reason why methods in the `Logger` class such as\n\n```\npublic\
    \ void addAppender(Appender appender)\n```\n\nare `synchronized` in order to make\
    \ sure that two threads do not operate on the same instance of a named logger\
    \ at the same time.\n\nThe `LogManager` class provides the useful methods described\
    \ in [Table 5-2](#LiB0038.html#ch05table02).\n\n**Table 5-2:** Methods in the\
    \ `LogManager` Class\n\n| Method | Description |\n| --- | --- |\n| `public static\
    \ Enumeration getCurrentLoggers();` | This method returns an enumeration of the\
    \ existing named loggers. |\n| `public static Logger exists(String name);` | This\
    \ method checks for the existence of a particular named logger. |\n| `public static\
    \ Logger getLogger(String name);` | This method obtains an existing named logger.\
    \ |\n\nIn the [next section](#LiB0039.html#326), we will explore the other aspects\
    \ of log4j that help us deal with client-specific logging information."
