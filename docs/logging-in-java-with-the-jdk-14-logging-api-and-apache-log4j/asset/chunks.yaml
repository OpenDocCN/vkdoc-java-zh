    \    {\n        this.rbName = rbName;\n\n    }\n\n    public void logMessage()\n\
    \    {\n        logger.logrb(Level.INFO, \"LocalizeLogging\", \"logMessage\",\
    \ rbName,\n\"success\");\n    }\n\n    public static void main(String args[])\
    \ {\n        //collect the name of the resource bundle\n        String rbName\
    \ = args[0];\n        LocalizeLogging lLogging = new LocalizeLogging(rbName);\n\
    \        lLogging.logMessage();\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\
    \n|  |\n\n我们创建了两个 `ResourceBundle` 属性文件，分别命名为 \"localizeText.properties\"（用于英文消息）和\
    \ \"localizeText_fr.properties\"（用于法文消息），如下所示：\n\n| localizeText.properties |\
    \ localizeText_fr.properties |\n| --- | --- |\n| `progress = \"Progressing\"`\
    \ | `progress = \"Tres Bein\"` |\n| `success = \"Done\"` | `success = \"Fini\"\
    ` |\n\n清单 3-4 中的应用程序接受 `ResourceBundle` 的名称作为命令行参数或来自其他配置源。应用程序获取一个名为 `sam.logging`\
