- fmt: '**Jeff Heaton** is an author, college instructor, and consultant. Jeff lives
    in Chesterfield, Missouri. The author of three books and over a dozen journal
    and magazine articles, Jeff specializes in Internet, socket-level/spidering, and
    artificial intelligence programming. A Sun-certified Java programmer and a member
    of the IEEE, Jeff has a masters degree in information management from Washington
    University in St. Louis.


    **Acknowledgments**


    Although there appears only one name on the cover of this book, the credit for
    this accomplishment goes to many. I would first of all like to thank everybody
    in the Apress family for making a dream come true for me by publishing this book.
    Special thanks go to John Zukowski, Editorial Director, Apress, for signing me
    to write this book and suggesting many ideas during the course of putting the
    manuscript together to make this book a better one. Grace Wong, Assistant Publisher,
    deserves all the credit for her guidance from the manuscript stage to the production
    stage of this book. Tracy Brown Collins and Ami Knox both have done a splendid
    job with development and copyediting of this book, contributing so many valuable
    ideas and making this book coherent and consistent throughout. Without their great
    efforts, many mistakes might have made their way into this book. I also thank
    the production team at Apress—Kari Brooks, Production Manager, as well as Susan
    Glinert Stevens, Lori Bring, and Ann Rogers—for their commendable job in the final
    production of this book.


    I am greatly thankful to Jeff Heaton, Technical Reviewer, who suggested numerous
    improvements to make this book more accurate and useful. I feel honored to have
    his name associated with this book. My heartfelt thanks must also go to Paul Burden
    and Ashish Patel, two of the great programmers I have had the privilege to work
    with, for contributing their most valuable ideas from the initial stages of this
    book.


    I take this opportunity to express my deepest gratitude and convey my most humble
    regards to Doctor T. V. Prabhakar, Department of Computer Science and Engineering,
    Indian Institute of Technology, Kanpur, India, who initiated me into the world
    of computer science. Without his most valuable and affectionate guidance, it just
    could not have been the same. My special thanks go to Mr. N. V. Brahmaji Rao,
    Doctor Amit Neogi, and Doctor Chaitali Roy for encouraging me throughout my efforts
    in writing this book. Without their encouragement, I might not have ventured to
    do so.


    Lastly, my parents and my elder brother (whom I call Dadabhai) have been a source
    of constant inspiration and encouragement throughout. I offer them my sincerest
    regards, and words cannot express my gratitude to them. In the end, I say a big
    "thank you" to all my friends, too many to name individually, and you know who
    you are.


    # Preface


    This book deals with the concept of building a flexible and robust application
    logging framework for Java-based applications. After an introduction to application
    logging, this book covers the two most popular Java-based logging APIs: the JDK
    1.4 logging API and Apache log4j version 1.2.6. The text provides a comprehensive
    study of these two APIs, and in the final chapter you will find a comparative
    study of the two logging APIs and a few best practices for using them.


    This book is aimed at providing an in-depth guide to the use of the JDK 1.4 logging
    API and Apache log4j with an emphasis on


    *   Understanding the internals of these APIs and how they work

    *   Working with the extremely useful, robust logging features available in these
    APIs

    *   Extending the existing logging framework for certain specialized, application-specific
    needs


    The book provides numerous examples, ranging from simple programs to complex ones,
    written in the Java language. The simple examples explain how the logging APIs
    work and what they are capable of producing in terms of logging output. The complex
    examples resemble real-life application scenarios and demonstrate how useful logging
    can be to maintaining large-scale distributed application components. Finally,
    the comparison between the JDK 1.4 logging API and Apache log4j will act as a
    guideline for deciding which of the two discussed APIs to use in your project.


    ## Target Audience


    This book, which discusses logging APIs based in the Java language, targets beginning-to-advanced
    Java language application developers. It provides many simple and straightforward
    examples that demand only minimal familiarity with the Java language. Thus this
    book can also be helpful to non–Java language application developers, who can
    still benefit from the ideas presented in this book.


    ## Chapter Synopsis


    This book is mainly divided into two sections: one for the JDK 1.4 logging API,
    and the other for Apache log4j version 1.2.6. Readers interested in only one particular
    API can skip the chapters discussing the other. In general, the book comprises
    the following chapters:


    ### [Chapter 1](#LiB0004_split_000.html#19): [Introduction to Application Logging](#LiB0004_split_000.html#19)


    This chapter discusses application logging. It describes the advantages and disadvantages
    related to the various concepts of application logging. This chapter also discusses
    a few criteria for a good logging framework.


    ### [Chapter 2](#LiB0012_split_000.html#44): [JDK 1.4 Logging API](#LiB0012_split_000.html#44)


    This chapter introduces the JDK 1.4 logging API and provides an in-depth discussion
    about the internals and use of this API.


    ### [Chapter 3](#LiB0022_split_000.html#136): [Formatting JDK 1.4 Logging Information](#LiB0022_split_000.html#136)


    This chapter explores the issues related to the formatting of logging output.
    It discusses the available formatting options within the JDK 1.4 logging API and
    also shows how to write custom formatters to do customized formatting.


    ### [Chapter 4](#LiB0026_split_000.html#166): [Extending the Logging Framework](#LiB0026_split_000.html#166)


    This chapter is dedicated to explaining and demonstrating how to extend the existing
    JDK 1.4 logging framework to write custom, application-specific logging components.
    It provides some real-life examples to illustrate how custom logging components
    can be developed and used.


    ### [Chapter 5](#LiB0032_split_000.html#266): [Understanding Apache log4j](#LiB0032_split_000.html#266)


    This chapter provides an in-depth discussion of Apache log4j based on version
    1.2.6. It explains the core objects involved in the log4j framework, and how they
    work and interact with each other to finally produce logging output.


    ### [Chapter 6](#LiB0047_split_000.html#389): [Formatting Logging Information
    in log4j](#LiB0047_split_000.html#389)


    This chapter discusses different formatting options available within log4j to
    structure the final logging output. It also shows how to use configurable patterns
    to format logging information.


    ### [Chapter 7](#LiB0051_split_000.html#441): [Advanced Logging with log4j](#LiB0051_split_000.html#441)


    This chapter is dedicated to the advanced logging features of log4j. It details
    the process of distributing logging information via a database, a Java Message
    Service (JMS), the Simple Mail Transfer Protocol (SMTP), and various other options
    available within log4j.


    ### [Chapter 8](#LiB0060_split_000.html#525): [Extending log4j to Create Custom
    Logging Components](#LiB0060_split_000.html#525)


    This chapter focuses on the techniques to extend the existing log4j framework
    in order to write custom, application-specific logging components. It provides
    some real-life examples to demonstrate how effective custom logging components
    can be in certain application scenarios.'
