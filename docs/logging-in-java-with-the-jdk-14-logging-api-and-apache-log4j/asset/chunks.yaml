- fmt: "### Extending JDBCAppender\n\n`JDBCAppender` is good enough to perform simple\
    \ SQL operations. It reads the SQL query and other JDBC-related parameters from\
    \ a configuration file and executes the SQL operation. One of the prime factors\
    \ for SQL optimization is the ability to execute dynamic SQL queries. In Java\
    \ language, the dynamic SQL is handled through `java.sql.PreparedStatement` interface-type\
    \ objects. If you are familiar with JDBC programming, you will know how to use\
    \ the `PreparedStatement` object. `JDBCAppender` on its own does *not* use the\
    \ `PreparedStatement` object to handle database-related operations.\n\nIt is possible\
    \ to extend the functionality of `JDBCAppender` by subclassing it. We will take\
    \ a look at an example of customizing `JDBCAppender` by giving it the flexibility\
    \ to work with `PreparedStatement` objects. We will accept the following configuration\
    \ parameters at initialization, in addition to the configuration parameters standard\
    \ to `JDBCAppender`:\n\n- `sqlString`: The SQL string representing the dynamic\
    \ SQL construct. This is similar to the constructs used by the `PreparedStatement`\
    \ objects in JDBC.\n- `values`: Once the `PreparedStatement` object is constructed,\
    \ we need to set the values for different columns. The values will contain different\
    \ aspects of the logging information in a `PatternLayout` construct. For example,\
    \ `%p-%m` will be converted to a string in the form of LEVEL-MESSAGE.\n\n| Note\
    \ | We are going to reuse the database table `LOGGING_DATA` as described in [Listing\
    \ 7-2](#LiB0053.html#ch07ls02) in the upcoming example. |\n\nWe will now write\
    \ a sample custom `Appender` object that performs a JDBC operation. At startup,\
    \ this `Appender` object will get initialized through the bean property values\
    \ specified in the configuration file passed to the log4j runtime. The `CustomJDBCAppender`\
    \ object inherits all the properties and a few methods from its base class `JDBCAppender`.\
    \ Specifically, it overrides only the following methods from the `JDBCAppender`\
    \ class:\n\n- `execute(String sql)`: This method is overridden to use a `PreparedStatement`\
    \ object.\n- `doAppend(LoggingEvent event)`: This method is overridden to perform\
    \ the normal appender activity.\n\nThe `CustomJDBCAppender` provides its own methods\
    \ to set and retrieve the bean properties specific to it. One important thing\
    \ to note here is that we are using `PatternLayout` to convert the logging information,\
    \ and we need to tell the `PatternLayout` the pattern to process. In this context,\
    \ we want to convert the information passed through the `values` bean property\
    \ of `CustomJDBCAppender` via `PatternLayout`. Therefore, in the `setValues()`\
    \ method, we create a `PatternLayout` with the information contained in the `values`\
    \ bean property. At the end, we set the created `PatternLayout` object as the\
    \ layout for `CustomJDBCAppender`.\n\nThe overridden `execute()` method does the\
    \ following jobs:\n\n1. It obtains an instance of the `PreparedStatement` object\
    \ by calling the `getPreparedStatement()` method that is `private` to `CustomJDBCAppender`.\n\
    2. This method then tokenizes the formatted logging information, and each token\
    \ represents the values for each column in the table.\n3. The values must be supplied\
    \ in the same sequence as the table columns. This condition may not be ideal,\
    \ but it helps to simplify this example.\n4. It then uses the `setString(int,\
    \ Object)` method of the `PreparedStatement` object to set the values for each\
    \ column. Again, this bit of code assumes all the columns in the table have the\
    \ type `VARCHAR`, which is true for the table we are using for this example. But\
    \ in reality, the column type can be anything, and the program needs to be able\
    \ to handle that.\n5. Finally, the SQL operation is performed by invoking the\
    \ `executeUpdate()` method of `PreparedStatement`.\n\n[Listing 7-4](#LiB0053.html#ch07ls04),\
    \ `CustomJDBCAppender.java`, is an example implementation of a customized `JDBCAppender`.\n\
    \n**Listing 7-4: CustomJDBCAppender.java**\n\n```\npackage com.apress.logging.log4j.appender;\n\
    \nimport org.apache.log4j.jdbc.JDBCAppender;\nimport java.sql.PreparedStatement;\n\
    import java.sql.Connection;\nimport java.sql.SQLException;\nimport org.apache.log4j.spi.LoggingEvent;\n\
    import org.apache.log4j.PatternLayout;\nimport java.util.StringTokenizer;\n\n\
    public class CustomJDBCAppender extends JDBCAppender {\n\n/** Holds value of property\
    \ values. */\n    private String values;\n\n/**the prepared statement object**/\n\
    \    private PreparedStatement stmt = null;\n\n/** Holds value of property preparedSQL.\
    \ */\n    private String preparedSQL;\n\n/** Creates a new instance of CustomJDBCAppender\
    \ */\n    public CustomJDBCAppender() {\n    }\n\npublic void doAppend(LoggingEvent\
    \ event) {\n        buffer.add(event);\n        if(buffer.size()>=bufferSize)\
    \ {\n          flushBuffer();\n        }\n    }\n\n/**\n     * overridden method\
    \ from the JDBCAppender. This method sets the\n     * parameters for the prepared\
    \ statement\n     * before executing the statement\n     **/\n    public void\
    \ execute(String sql) throws SQLException {\n        PreparedStatement stmt =\
    \ getPreparedStatement();\n        StringTokenizer tokenizer = new StringTokenizer(sql,\
    \ \",\");\n        int i=1;\n        while(tokenizer.hasMoreTokens()) {\n    \
    \        String token = tokenizer.nextToken();\n            stmt.setString(i,\
    \ token);\n            i++;\n        }\n        stmt.executeUpdate();\n\n}\n\n\
    /**\n     * This method obtains the prepared statement object\n     **/\n    private\
    \ PreparedStatement getPreparedStatement() throws SQLException {\n        //resuse\
    \ the getConnection() method from the super class\n        Connection conn = getConnection();\n\
    \        if(stmt==null) {\n            stmt = conn.prepareStatement(getPreparedSQL());\n\
    \        }\n        return stmt;\n    }\n\n/** Getter for property values.\n \
    \    * @return Value of property values.\n     */\n    public String getValues()\
    \ {\n        return this.values;\n    }\n\n/** Setter for property values.\n \
    \    * @param values New value of property values.\n     */\n    public void setValues(String\
    \ values) {\n        PatternLayout layout = new PatternLayout(values);\n     \
    \   this.setLayout(layout);\n        this.values = values;\n    }\n\n/** Getter\
    \ for property preparedSQL.\n     * @return Value of property preparedSQL.\n \
    \    */\n    public String getPreparedSQL() {\n        return this.preparedSQL;\n\
    \    }\n\n/** Setter for property preparedSQL.\n     * @param preparedSQL New\
    \ value of property preparedSQL.\n     */\n    public void setPreparedSQL(String\
    \ preparedSQL) {\n        this.preparedSQL = preparedSQL;\n    }\n}\n```\n\n[Listing\
    \ 7-5](#LiB0053.html#ch07ls05), `customjdbc.properties`, describes the configuration\
    \ file for this example. Note that it defines the custom bean properties used\
    \ by `CustomJDBCAppender` in addition to the bean properties used by `JDBCAppender`.\n\
    \n**Listing 7-5: customjdbc.properties**\n\n```\n#configuring the custom logger\n\
    log4j.logger.com.apress.logging.log4j=DEBUG, DB\n\n#log4j.appender.DB=org.apache.log4j.jdbc.JDBCAppender\n\
    log4j.appender.DB=com.apress.logging.log4j.appender.CustomJDBCAppender\n\n#configuring\
    \ the custom jdbc appender\nlog4j.appender.DB.URL=jdbc:odbc:dbdef\nlog4j.appender.DB.user=system\n\
    log4j.appender.DB.password=manager\nlog4j.appender.DB.preparedSQL=INSERT INTO\
    \ LOGGING_DATA VALUES(?,?,?,?,?)\nlog4j.appender.DB.values=%x,%d{yyyy-MM-dd},%c,%p,%m\n\
    log4j.appender.DB.bufferSize=3\n```\n\nExecuting this program with the `customjdbc.properties`\
    \ configuration file will result in the data being inserted into in the database\
    \ as usual. The only difference is that the program has now used dynamic SQL with\
    \ the `PreparedStatement` object. [Figure 7-2](#LiB0053.html#ch07fig02) presents\
    \ the resulting data in the `LOGGING_DATA` table.\n\n[![Click To expand](fig7-2.jpg)](fig7-2_0.jpg)\n\
    \n**Figure 7-2: The data in the LOGGING_DATA table stored via CustomJDBCAppender**"
