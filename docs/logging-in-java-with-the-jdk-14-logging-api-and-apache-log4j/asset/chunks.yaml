    ## About the Author and Technical Reviewer


    ### About the Author


    **Samudra Gupta** holds a postgraduate degree in information technology and management
    from All India Management Association, India, and has around six years of experience
    in designing and developing Web-based applications ranging from research-based
    projects to e-commerce applications. He started his career as a research engineer
    at the Indian Institute of Technology, Kanpur, India, and he is presently working
    as an independent Java consultant in the United Kingdom, architecting and developing
    several e-commerce–based applications, content management system software, and
    retail-based software. Samudra also writes articles for *JavaWorld* and *Java
    Developer''s Journal*, and is a monthly contributor to Java Boutique ([http://javaboutique.internet.com](http://javaboutique.internet.com)).
    When not programming, he plays a lot of contract bridge.


