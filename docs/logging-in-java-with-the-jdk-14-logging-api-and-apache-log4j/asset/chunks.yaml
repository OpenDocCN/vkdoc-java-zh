- fmt: "# Overview\n\nThis chapter is dedicated to the advanced topics of logging\
    \ with `log4j` API. Writing logging information to a console or to a file is limited\
    \ in terms of flexibility and reuse. The logging information printed to a console\
    \ is pretty volatile and likely to disappear once the application exits its present\
    \ running instance. Therefore, the console-based logging information is more suitable\
    \ for development-stage debugging messages.\n\nOn the other hand, logging information\
    \ printed to a file local to the system is inefficient because it is hardly accessible\
    \ to other applications that might be able to use the same logging information.\
    \ It is going to be extra work to make this information accessible to the other\
    \ application modules.\n\nAlthough an important point of logging is to enable\
    \ remote debugging and socket management of application modules, it is equally\
    \ important to make the logging data accessible to remote application modules.\
    \ Sometimes, the nature of logging data is sensitive, and it may be required to\
    \ maintain the history of the logging information in a database. In other scenarios,\
    \ when we want to process any sensitive logging data in real time, we might want\
    \ to post the data over a TCP/IP socket to another server component ready to respond\
    \ to the information sent to it. Also, it is possible that we might need to maintain\
    \ an order-processing system, where certain customer-specific logging information\
    \ is e-mailed to respective customers. These are few of the many possibilities\
    \ that we may want to implement with logging information.\n\nArguably, in most\
    \ of the normal application scenarios, file-based logging proves sufficient. However,\
    \ in a distributed computing scenario, situations may arise in which we might\
    \ need distributed logging functionality. In such situations, the power of `log4j`\
    \ enables us to make best of its logging features.\n\nThe `log4j` API handles\
    \ many of the situations discussed by providing different `Appender` objects.\
    \ The list may not be exhaustive and may not cater to every situation that can\
    \ arise specific to different applications, but it is sufficient for most common\
    \ application scenarios. In case an application needs something different, the\
    \ API provides a flexible design for us to integrate custom objects within the\
    \ API or extend the existing framework to suit an application's specific needs.\n\
    \nIn this chapter, we will discuss how to distribute and store logging data in\
    \ the following ways:\n\n* Writing logging information to a database\n* Distributing\
    \ logging data using Java Message Service (JMS)\n* Distributing logging data over\
    \ Simple Mail Transfer Protocol (SMTP)\n* Sending logging data over a TCP/IP socket\n\
    * Using Telnet protocol to upload logging data to a remote machine\n* Storing\
    \ logging data in OS-specific event logs\n\nIn the next few sections, we will\
    \ discuss one by one the different `Appender` objects provided within the `log4j`\
    \ API and how they accomplish the task of managing and distributing logging data.\n\
    \n## A Sample Advanced Logging Application\n\nWe will first create a simple program\
    \ that we will use throughout this chapter to demonstrate the capabilities of\
    \ different advanced `Appender` objects. The program obtains a named logger instance,\
    \ `com.apress.logging.log4j`. The `deposit()` and `withdraw()` methods deposit\
    \ and withdraw some money to and from an account. The amount deposited gets added\
    \ to the balance. The `withdraw()` method allows withdrawing only if there are\
    \ sufficient funds available and then deducts the amount withdrawn from the current\
    \ balance. If the balance is not enough, this program will print a message to\
    \ the user.\n\nThe application logs activities for both these methods and uses\
    \ the user name as the `NDC` information. The application also logs both the success\
    \ and failure of each operation. [Listing 7-1](#LiB0052.html#ch07ls01), `AdvancedLogging.java`,\
    \ is an example implementation of the described business process.\n\n**Listing\
    \ 7-1: AdvancedLogging.java**\n\n```\npackage com.apress.logging.log4j;\n\nimport\
    \ org.apache.log4j.Logger;\nimport org.apache.log4j.NDC;\npublic class AdvancedLogging\n\
    {\n    private static Logger logger =\nLogger.getLogger(AdvancedLogging.class.getPackage().getName());\n\
    \    private String userName = null;\n    private double balance;\n\n    /** Creates\
    \ a new instance of AdvancedLogging */\n    public AdvancedLogging(String user)\n\
    \    {\n        this.userName = user;\n    }\n    /**\n     *Deposit some amount\n\
    \     */\n    public void deposit(double amount)\n    {\n        NDC.push(userName);\n\
    \        balance += amount;\n        logger.info(\"Deposited \"+amount+\" new\
    \ balance: \"+balance);\n        NDC.pop();\n    }\n    /**\n     *withdraw some\
    \ amount\n     */\n    public void withdraw(double amount)\n    {\n        NDC.push(userName);\n\
    \        if(balance>=amount)\n        {\n            balance -= amount;\n    \
    \        logger.info(\"Withdrawn \"+amount+\" new balance: \"+balance);\n    \
    \    }else\n        {\n            System.out.println(\"Not enough balance\");\n\
    \            logger.error(\"Failed to withdraw: balance: \"+balance+\" attempted\n\
    withdraw: \"+amount);\n        }\n        NDC.pop();\n    }\n    public static\
    \ void main(String args[])\n    {\n        AdvancedLogging demo = new AdvancedLogging(\"\
    sam\");\n        demo.depositBalance(100.50);\n        demo.withDraw(80);\n  \
    \      demo.withDraw(50);\n    }\n}\n```"
