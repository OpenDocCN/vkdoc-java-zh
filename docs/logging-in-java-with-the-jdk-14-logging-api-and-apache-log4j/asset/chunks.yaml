    "my.package".


    We can obtain another `Logger` instance with the namespace "my.package.io". This
    gives us the freedom to separately manage logging from two packages. However,
    it is also possible to create an anonymous logger without any namespace attached
    to it.


    ```

    Logger anoLogger = Logger.getAnonymousLogger();

    ```


    This code will obtain an anonymous logger.


    Anonymous logger objects are not stored in the logger namespace. They can operate
    without being affected by any logging hierarchy. They become particularly useful
    when we want to share the same logger across different classes within the same
    application. We can create an anonymous logger, store it in a central location,
    and then refer to the same logger from each class. This is suitable for small
    applications where the logging requirement is not hugely complicated. But for
    large-scale applications, often we will need to maintain different sets of loggers
    logging different information to different destinations. In such cases, we need
    to work with several named loggers to identify and segregate the logging information.
    As a rule, namespaced `Logger` objects are organized within the framework in a
    namespace hierarchy, which almost resembles the package hierarchy of the Java
    language. [Figure 2-2](#LiB0016.html#ch02fig02) depicts the hierarchical architecture
    of named `Logger` objects.


    [![Click To expand](fig2-2.jpg)](fig2-2_0.jpg)

    Figure 2-2: The Logger object hierarchy


    The parent-child hierarchy shown in [Figure 2-2](#LiB0016.html#ch02fig02) signifies
    the dependency and separation of different loggers acting within the same application.
    It is interesting to note that the top-level root logger object has no namespace
    associated with it. The hierarchical relationship of the loggers also means that
    the child loggers inherit several properties from the parent logger. Typically,
    a child logger inherits the following properties from its parent logger:


    *   `level`: When the child logger has no level specified explicitly or the level
    is null, it inherits the level of its immediate parent logger or recursively up
    the tree until it finds an appropriate level to use.


    *   `handler`: Each logger can have a `Handler` object explicitly specified to
    it. If one is not specified for a particular logger, then it obtains a suitable
    `Handler` from its immediate parent or recursively up the tree.


    *   `ResourceBundle`: If a logger does not have any `ResourceBundle` explicitly
    attached to it, it uses the `ResourceBundle` associated with its parents recursively
    up the tree. `ResourceBundle` is used for the localization of logging messages,
    which we will discuss in [Chapter 3](#LiB0022_split_000.html#136).


    |  | Note  | Because of this hierarchical relationship, it is important to note
    that a child logger can be affected by changing any of the preceding properties
    of a parent logger when the child logger implicitly uses the properties of its
    parent loggers. |'
  trans: '

    ## Logger 对象


    `Logger` 对象是日志记录框架的基础。要记录一条消息，我们总是需要显式或隐式地获取一个 `Logger` 对象。`Logger` 对象提供了多种日志记录方法，这些方法以不同的方式发布日志信息。此外，`Logger`
    对象可以附加一个 `java.util.ResourceBundle`，用于日志信息的本地化。


    要使用日志记录 API 记录消息，首先需要获取一个 `Logger` 对象的引用。日志记录框架不允许我们自行实例化 `Logger` 对象。相反，我们使用一个名为
    `getLogger()` 的工厂方法来获取 `Logger` 对象的引用。`getLogger()` 方法要么创建一个新的 `Logger` 对象，要么通过从
    `LogManager` 中获取来返回一个现有的实例。`getLogger(String name)` 工厂方法为系统中具有指定名称的不同日志记录器创建一个分层命名空间。通常，`Logger`
    对象的名称是包名或类名，但理论上可以是任意字符串。获取 `Logger` 对象的引用相当简单。


    ```

    Logger logger = Logger.getLogger("my.package");

    ```


    这段代码将获取一个命名空间为 "my.package" 的 `Logger` 对象的引用。


    我们可以获取另一个命名空间为 "my.package.io" 的 `Logger` 实例。这使我们能够自由地分别管理来自两个包的日志记录。然而，也可以创建一个不附加任何命名空间的匿名日志记录器。


    ```

    Logger anoLogger = Logger.getAnonymousLogger();

    ```


    这段代码将获取一个匿名日志记录器。


    匿名日志记录器对象不存储在日志记录器命名空间中。它们可以在不受任何日志记录层次结构影响的情况下运行。当我们希望在同一个应用程序的不同类之间共享同一个日志记录器时，它们变得特别有用。我们可以创建一个匿名日志记录器，将其存储在一个中心位置，然后从每个类中引用同一个日志记录器。这适用于日志记录需求不太复杂的小型应用程序。但对于大型应用程序，我们通常需要维护不同的日志记录器集合，将不同的信息记录到不同的目标位置。在这种情况下，我们需要使用多个命名日志记录器来识别和隔离日志信息。通常，带命名空间的
    `Logger` 对象在框架内按命名空间层次结构组织，这几乎类似于 Java 语言的包层次结构。图 2-2 描述了命名 `Logger` 对象的层次结构。


    ![点击展开](img/fig2-2_0.jpg)

    图 2-2：Logger 对象层次结构


    图 2-2 中显示的父子层次结构表示在同一应用程序中运行的不同日志记录器之间的依赖关系和分离。值得注意的是，顶层的根日志记录器对象没有关联的命名空间。日志记录器的层次关系还意味着子日志记录器会从父日志记录器继承多个属性。通常，子日志记录器会从其父日志记录器继承以下属性：


    *   `level`：当子日志记录器没有显式指定级别或级别为 null 时，它会继承其直接父日志记录器的级别，或者递归向上查找树，直到找到合适的级别为止。


    *   `handler`：每个日志记录器都可以显式指定一个 `Handler` 对象。如果某个特定的日志记录器没有指定处理程序，那么它会从其直接父日志记录器或递归向上查找树来获取合适的
    `Handler`。


    *   `ResourceBundle`：如果日志记录器没有显式附加任何 `ResourceBundle`，它会递归向上使用其父日志记录器关联的 `ResourceBundle`。`ResourceBundle`
    用于日志消息的本地化，我们将在第 3 章中讨论。


    |  | 注意 | 由于这种层次关系，需要注意的是，当子日志记录器隐式使用其父日志记录器的属性时，更改父日志记录器的上述任何属性都可能影响子日志记录器。 |'
- fmt: "### A Basic JDK 1.4 Logging Example\n\nIn reality, writing logging code with\
    \ the JDK 1.4 logging API is fairly simple. Let's take the following example.\
    \ [Listing 2-1](#LiB0016.html#ch02ls01), `BasicLogging.java`, demonstrates the\
    \ very basic use of the logging feature with the JDK 1.4 logging API.\n\n**Listing\
    \ 2-1: BasicLogging.java**\n\n```\npackage sam.logging;\n\nimport java.util.logging.*;\n\
    import java.io.*;\npublic class BasicLogging\n{\n    private static Logger logger\
    \ = Logger.getLogger(\"MyLogger\");\n    private ConsoleHandler console = null;\n\
    \    private FileHandler file = null;\n    public BasicLogging()\n    {\n    \
    \    //create a new handler to write to the console\n        console = new ConsoleHandler();\n\
    \        //create a new handler to write to a named file\n        try\n      \
    \  {\n            file = new FileHandler(\"basicLogging.out\");\n        }catch(IOException\
    \ ioe)\n        {\n            logger.warning(\"Could not create a file...\");\n\
    \        }\n\n//add the handlers to the logger\n        logger.addHandler(console);\n\
    \        logger.addHandler(file);\n    }\n\npublic void logMessage()\n    {\n\
    \      //log a message\n      logger.info(\"I am logging test message..\");\n\
    \    }\n\npublic static void main(String args[])\n  {\n      BasicLogging demo\
    \ = new BasicLogging();\n      demo.logMessage();\n  }\n}\n```\n\nAs mentioned\
    \ in the previous sections, the central point of logging activity is the `Logger`\
    \ object. In the beginning of the program, we obtain a named `Logger` object instance—`MyLogger`.\
    \ There is one important consideration to keep in mind while obtaining the `Logger`\
    \ instance: Try to obtain it once and only once in the program, and reuse the\
    \ `Logger` instance throughout the scope of the program. No matter how many times\
    \ you try to obtain an instance of a particular named logger, the JDK logging\
    \ framework will return the single instance of that named logger. However, attempting\
    \ to obtain the same named logger several times will make your program inefficient,\
    \ as it will need to use the JDK logging framework each time to determine the\
    \ existing instance of the named logger and return it.\n\nWithin the constructor,\
    \ we create instances of `ConsoleHandler` and `FileHandler` objects. We add these\
    \ `Handler` objects to the named logger. The named logger has two separate `Handler`\
    \ objects attached to it. One will log the information to the console and the\
    \ other to a file named `\"basicLogging.out\"`.\n\nThe `doLogging()` method simply\
    \ calls the `info()` method on the `Logger` object. The `info()` method is designed\
    \ to publish messages with a level of `INFO`. We will discuss different logging\
    \ methods in detail in the relevant sections. Once we execute the program, we\
    \ will see the following messages printed to the console:\n\n```\n18-Dec-2002\
    \ 20:39:18 sam.logging.BasicLogging logMessage\nINFO: I am logging test message..\n\
    18-Dec-2002 20:39:18 sam.logging.BasicLogging logMessage\nINFO: I am logging test\
    \ message..\n```\n\nAlso, a file named `\"basicLogging.out\"` will be created\
    \ in the directory from which we execute the program. The file, shown in the following\
    \ code snippet, will be in XML format and will contain the same logging information\
    \ as printed in the console.\n\n```\n<?xml version=\"1.0\" encoding=\"windows-1252\"\
    \ standalone=\"no\"?>\n<!DOCTYPE log SYSTEM \"logger.dtd\">\n<log>\n<record>\n\
    \  <date>2002-12-18T20:39:18</date>\n  <millis>1040243958817</millis>\n  <sequence>0</sequence>\n\
    \  <logger>MyLogger</logger>\n  <level>INFO</level>\n  <class>sam.logging.BasicLogging</class>\n\
    \  <method>logMessage</method>\n  <thread>10</thread>\n  <message>I am logging\
    \ test message..</message>\n</record>\n</log>\n```\n\nAt this point, we have examined\
    \ how to use the `Logger` and `Handler` objects to publish information to different\
    \ destinations of our choice. In the following sections, we will look at the internals\
    \ of how the framework works and provide more examples related to the use of different\
    \ objects available within the JDK 1.4 logging API.\n\n### Logger Relationship\
    \ Example\n\nIn the previous sections, we have seen that `Logger` objects exist\
    \ in a namespace hierarchy for a given application instance. At this point, we\
    \ will see how to develop a sample program that will illustrate the parent-child\
    \ relationship of `Logger` objects. [Listing 2-2](#LiB0016.html#ch02ls02), `ParentLogger.java`,\
    \ shows a program that has a package named `sam.logging` and contains a method\
    \ named `aMethod()` that prints logging information to a console.\n\n**Listing\
    \ 2-2: ParentLogger.java**\n\n```\npackage sam.logging;\nimport java.util.logging.*;\n\
    \npublic class ParentLogger\n{\n  private Logger logger = Logger.getLogger(\"\
    sam.logging\");\n  private Level level = null;\n  public ParentLogger()\n  {\n\
    \    level = Level.SEVERE;\n    //setting the level as SEVERE\n    logger.setLevel(level);\n\
    \  }\n\npublic void aMethod()\n  {\n    logger.log(level, \"Severe message from\
    \ Parent Logger\");\n  }\n}\n```\n\nThis program obtains a reference to the `Logger`\
    \ object with the namespace `\"sam.logging\"`. It also assigns `SEVERE` as the\
    \ level of logging, which means that this logger will only log messages with the\
    \ priority `SEVERE`. All other logging requests will be discarded, as `SEVERE`\
    \ is the highest level. When we instantiate the `ParentLogger` class and invoke\
    \ the method `aMethod()`, it will print the logging information to the console.\n\
    \n```\n22-Aug-2002 23:08:28 sam.logging.ParentLogger aMethod\nSEVERE: Severe message\
    \ from Parent Logger\n```\n\nAs is evident, the logging information contains the\
    \ date and timestamp of the logging activity, and the names of the class and method\
    \ from which the logging was invoked. The next line contains information about\
    \ the level of logging and the logging message itself. We will further explore\
    \ the formatting of logging information in [Chapter 3](#LiB0022_split_000.html#136).\n\
    \nIn the sample code shown in [Listing 2-3](#LiB0016.html#ch02ls03), we will see\
    \ how to develop a program called `ChildLogger.java`. This program is packaged\
    \ in `sam.logging.child`. The program is similar to `ParentLogger.java` except\
    \ the `Logger` object obtained in the `ParentLogger` class will now be the parent\
    \ logger of the `Logger` object obtained in the `ChildLogger` class. This is due\
    \ to the fact that the namespace `\"sam.logging.child\"` resides below the namespace\
    \ `\"sam.logging\"`.\n\n**Listing 2-3: ChildLogger.java**\n\n```\npackage sam.logging.child;\n\
    \nimport java.util.logging.*;\nimport sam.logging.ParentLogger;\npublic class\
    \ ChildLogger\n{\n    private Logger logger = Logger.getLogger(\"sam.logging.child\"\
    );\n\nprivate Level level = null;\n    public ChildLogger()\n    {\n        //level\
    \ = Level.INFO;\n        //setting the level of this child logger, if not specified,\
    \ it\n        // will use the level of the parent logger\n        logger.setLevel(level);\n\
    \    }\n\npublic void aMethod()\n    {\n        logger.log(Level.INFO, \"Info\
    \ message from Child Logger\");\n        logger.log(Level.SEVERE, \"Severe message\
    \ from Child Logger\");\n    }\n}\n```\n\nIn the constructor, we specify the level\
    \ associated with the `Logger` object obtained as `INFO`. Within the `aMethod()`,\
    \ we print two logging messages, one with the level `INFO` and the other with\
    \ the level `SEVERE`. [Listing 2-4](#LiB0016.html#ch02ls04), `LoggingMonitor.java`,\
    \ uses both `ParentLogger` and `ChildLogger`.\n\n**Listing 2-4: LoggingMonitor.java**\n\
    \n```\n package sam.logging;\nimport java.util.logging.*;\nimport sam.logging.child.ChildLogger;\n\
    \npublic class LoggingMonitor\n{\n    public static void main(String[] args)\n\
    \    {\n        ParentLogger pLogger = new ParentLogger();\n        ChildLogger\
    \ cLogger = new ChildLogger();\n        cLogger.aMethod();\n    }\n}\n```\n\n\
    Executing the previous program will print both messages to the console."
