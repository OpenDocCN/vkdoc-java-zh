    16-Aug-2002 22:33:12 LocalizeLogging logMessage\nINFO: \"Fini\"\n```\n"
- fmt: "# Writing Custom Formatters\n\nWhile it is useful to apply the default `Formatter`\
    \ objects available within the JDK 1.4 logging API, different applications might\
    \ need to produce logging messages in a more application-specific manner. For\
    \ these situations, it is possible to define custom `Formatter` objects. To write\
    \ a custom `Formatter` object, we just need to extend the `java.util.logging.Formatter`\
    \ class and override the `format()` method in it. For example, let's imagine an\
    \ application that needs to store different method entries and logging messages\
    \ used in those method calls in a Java properties-style format. To achieve this,\
    \ we will design a very simple custom `Formatter` object that will format the\
    \ message and return it to the appropriate `Handler` object being used by the\
    \ application. [Listing 3-5](#LiB0024.html#ch03ls05), `CustomFormatter.java`,\
    \ shows how to develop a custom `Formatter` object for this scenario.\n\n**Listing\
    \ 3-5: CustomFormatter.java**\n\n```\npackage sam.logging;\nimport java.util.logging.*;\n\
    public class CustomFormatter extends Formatter\n{\n\npublic CustomFormatter()\n\
    \  {\n  }\n\n/**\n This method formats the given log record, in a java properties\
    \ file style\n */\n  public synchronized String format(LogRecord record)\n  {\n\
    \    String methodName = record.getSourceMethodName();\n    String message = record.getMessage();\n\
    \    StringBuffer buffer = new StringBuffer(50);\n    buffer.append(methodName);\n\
    \    buffer.append(\"=\");\n    buffer.append(message);\n    return buffer.toString();\n\
    \  }\n}\n```\n\nThe `CustomFormatter` object defined in [Listing 3-5](#LiB0024.html#ch03ls05)\
    \ overrides the `abstract format(LogRecord record)` method of the parent class\
    \ `Formatter`. It simply constructs a string in key-value format and returns to\
    \ the parent handler. We can see from the code that it totally depends on the\
    \ `LogRecord` object to obtain the name of the method from which the logging was\
    \ invoked, and this object does not attempt to determine the source method from\
    \ the stack trace. Thus, it is the sole responsibility of the user of this custom\
    \ `Formatter` object to supply the source method name as a part of the `LogRecord`\
    \ object. Of course, we can write a more complex formatter that can potentially\
    \ do much more complicated formatting activity.\n\nThe client program in [Listing\
    \ 3-6](#LiB0024.html#ch03ls06), `CustomFormatterTest.java`, uses the `CustomFormatter`\
    \ object. It attempts to write the information in a properties file so that a\
    \ Java program can pick up the information at a later date in a `java.util.Properties`\
    \ object. The client application first obtains an instance of the named logger,\
    \ `sam.logging`. It then creates a `FileHandler` object to write to a given file\
    \ and assigns a new instance of the `CustomFormatter` object as the `Formatter`\
    \ object associated to the `FileHandler` instance. Finally, the `Logger` invokes\
    \ the `info()` method to log any logging message.\n\n**Listing 3-6: CustomFormatterTest.java**\n\
    \n```\npackage sam.logging;\nimport java.util.logging.*;\nimport java.io.*;\n\n\
    public class CustomFormatterTest\n{\n    private static Logger logger = Logger.getLogger(\"\
    sam.logging\");\n    private String fileName = null;\n\npublic CustomFormatterTest(String\
    \ fileName)\n    {\n        this.fileName = fileName;\n        try\n        {\n\
    \            FileHandler fh = new FileHandler(fileName);\n            CustomFormatter\
    \ formatter = new CustomFormatter();\n            fh.setFormatter(formatter);\n\
    \nlogger.addHandler(fh);\n        }catch(IOException ioe)\n        {\n       \
    \     ioe.printStackTrace();\n        }\n    }\n    /**\n     * This method performs\
    \ the logging activity\n     */\n\npublic void logMessage()\n    {\n        logger.info(\"\
    log this message\");\n\n}\n\npublic static void main(String args[]) {\n      \
    \  CustomFormatterTest test = new CustomFormatterTest(args[0]);\n        test.logMessage();\n\
    \    }\n}\n```\n\nExecuting this client application will output the logging information\
    \ to a file specified on the command line.\n\n```\n>>java sam.logging.CustomFormatterTest\
    \ custom.properties\n```\n\nThe final properties file obtained, `custom.properties`,\
    \ contains the method name and the message in a key-value pair format.\n\n```\n\
    CustomFormatterTest.logMessage=log this message\n```\n\n## Conclusion\n\nIn this\
    \ chapter, we have seen how different `Formatter` objects work, their internals,\
    \ and how to write custom `Formatter` objects and use them. We have also explored\
    \ the localization aspect of log messages. Now it is time to start using this\
    \ logging framework in real-life applications. Often we will find that we require\
    \ a custom-logging framework tailored to an application's needs. In the [next\
    \ chapter](#LiB0026_split_000.html#166), we will examine how to extend the existing\
    \ logging API framework to meet more application-specific needs.\n\n# Chapter\
    \ 4: Extending the Logging Framework\n\n## Overview\n\nIn the previous chapters,\
    \ we dealt in great detail with the different objects available in the JDK 1.4\
    \ logging API and how they operate. We also analyzed different formatting techniques\
    \ that can be applied along with the logging framework, and developed our own\
    \ `Formatter` object. The API already provides a great number of logging features\
    \ sufficient for small-scale applications. Using the logging framework in an effective\
    \ way, it is possible to enhance the maintainability of any application.\n\nHowever,\
    \ in other more complicated cases, the default capabilities of the JDK 1.4 logging\
    \ API might fall a little short. This is the time when we need to extend the framework\
    \ to suit our needs—after all, a good object-oriented API means a framework that\
    \ is always extendible.\n\nIn this chapter, we will first discuss configuration\
    \ issues involving the JDK 1.4 logging API and develop custom `Handler` objects.\
    \ Later, we will explore remote logging with the JDK 1.4 logging API and see a\
    \ real-life example to demonstrate a practical application of the logging framework.\n\
    \n## Configuring the Logging Framework\n\nIn [Chapter 2](#LiB0012_split_000.html#44),\
    \ we saw how to configure the JDK 1.4 logging API programmatically. Using different\
    \ methods exposed by different objects in the logging API, we can configure individual\
    \ `Logger` and `Handler` objects. The main drawback of programmatic configuration\
    \ is that it makes it impossible to change the configuration without changing\
    \ the source code. To avoid such bottlenecks, the JDK 1.4 logging API also supports\
    \ configuration via configuration files. In general, the configuration of the\
    \ JDK 1.4 logging API can be achieved in the following ways:\n\n*   By using different\
    \ methods available within the API\n*   By defining the configuration parameters\
    \ in a configuration file\n*   By writing a separate configuration class that\
    \ has the responsibility of configuring the logging components\n\nBy now, you\
    \ are familiar with the first option—that is, how to configure logging components\
    \ programmatically. In the coming sections, we will explore the other two options\
    \ for configuring the JDK 1.4 logging API."
  raw: "## Writing Custom Formatters\n\nWhile it is useful to apply the default `Formatter`\
    \ objects available within the JDK 1.4 logging API, different applications might\
    \ need to produce logging messages in a more application-specific manner. For\
    \ these situations, it is possible to define custom `Formatter` objects. To write\
    \ a custom `Formatter` object, we just need to extend the `java.util.logging.Formatter`\
    \ class and override the `format()` method in it. For example, let's imagine an\
    \ application that needs to store different method entries and logging messages\
    \ used in those method calls in a Java properties-style format. To achieve this,\
    \ we will design a very simple custom `Formatter` object that will format the\
    \ message and return it to the appropriate `Handler` object being used by the\
    \ application. [Listing 3-5](#LiB0024.html#ch03ls05), `CustomFormatter.java`,\
    \ shows how to develop a custom `Formatter` object for this scenario.\n\nListing\
    \ 3-5: CustomFormatter.java\n\n| **![Start example](_1.gif)** |\n\n```\npackage\
    \ sam.logging;\nimport java.util.logging.*;\npublic class CustomFormatter extends\
    \ Formatter\n{\n\npublic CustomFormatter()\n  {\n  }\n\n/**\n This method formats\
    \ the given log record, in a java properties file style\n */\n  public synchronized\
    \ String format(LogRecord record)\n  {\n    String methodName = record.getSourceMethodName();\n\
    \    String message = record.getMessage();\n    StringBuffer buffer = new StringBuffer(50);\n\
    \    buffer.append(methodName);\n    buffer.append(\"=\");\n    buffer.append(message);\n\
    \    return buffer.toString();\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\
    \n|  |\n\nThe `CustomFormatter` object defined in [Listing 3-5](#LiB0024.html#ch03ls05)\
    \ overrides the `abstract format(LogRecord record)` method of the parent class\
    \ `Formatter`. It simply constructs a string in key-value format and returns to\
    \ the parent handler. We can see from the code that it totally depends on the\
    \ `LogRecord` object to obtain the name of the method from which the logging was\
    \ invoked, and this object does not attempt to determine the source method from\
    \ the stack trace. Thus, it is the sole responsibility of the user of this custom\
    \ `Formatter` object to supply the source method name as a part of the `LogRecord`\
    \ object. Of course, we can write a more complex formatter that can potentially\
    \ do much more complicated formatting activity.\n\nThe client program in [Listing\
    \ 3-6](#LiB0024.html#ch03ls06), `CustomFormatterTest.java`, uses the `CustomFormatter`\
    \ object. It attempts to write the information in a properties file so that a\
    \ Java program can pick up the information at a later date in a `java.util.Properties`\
    \ object. The client application first obtains an instance of the named logger,\
    \ `sam.logging`. It then creates a `FileHandler` object to write to a given file\
    \ and assigns a new instance of the `CustomFormatter` object as the `Formatter`\
    \ object associated to the `FileHandler` instance. Finally, the `Logger` invokes\
    \ the `info()` method to log any logging message.\n\nListing 3-6: CustomFormatterTest.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\npackage sam.logging;\nimport java.util.logging.*;\n\
    import java.io.*;\n\npublic class CustomFormatterTest\n{\n    private static Logger\
    \ logger = Logger.getLogger(\"sam.logging\");\n    private String fileName = null;\n\
    \npublic CustomFormatterTest(String fileName)\n    {\n        this.fileName =\
    \ fileName;\n        try\n        {\n            FileHandler fh = new FileHandler(fileName);\n\
    \            CustomFormatter formatter = new CustomFormatter();\n            fh.setFormatter(formatter);\n\
    \nlogger.addHandler(fh);\n        }catch(IOException ioe)\n        {\n       \
    \     ioe.printStackTrace();\n        }\n    }\n    /**\n     * This method performs\
    \ the logging activity\n     */\n\npublic void logMessage()\n    {\n        logger.info(\"\
    log this message\");\n\n}\n\npublic static void main(String args[]) {\n      \
    \  CustomFormatterTest test = new CustomFormatterTest(args[0]);\n        test.logMessage();\n\
    \    }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nExecuting this client\
    \ application will output the logging information to a file specified on the command\
    \ line.\n\n```\n>>java sam.logging.CustomFormatterTest custom.properties\n```\n\
    \nThe final properties file obtained, \"custom.properties\", contains the method\
    \ name and the message in a key-value pair format.\n\n```\nCustomFormatterTest.logMessage=log\
    \ this message\n```\n\n## Conclusion\n\nIn this chapter, we have seen how different\
    \ `Formatter` objects work, their internals, and how to write custom `Formatter`\
    \ objects and use them. We have also explored the localization aspect of log messages.\
    \ Now it is time to start using this logging framework in real-life applications.\
    \ Often we will find that we require a custom-logging framework tailored to an\
    \ application's needs. In the [next chapter](#LiB0026_split_000.html#166), we\
    \ will examine how to extend the existing logging API framework to meet more application-specific\
    \ needs.\n\n# Chapter 4: Extending the Logging Framework\n\n## Overview\n\nIn\
    \ the previous chapters, we dealt in great detail with the different objects available\
    \ in the JDK 1.4 logging API and how they operate. We also analyzed different\
    \ formatting techniques that can be applied along with the logging framework,\
    \ and developed our own `Formatter` object. The API already provides a great number\
    \ of logging features sufficient for small-scale applications. Using the logging\
    \ framework in an effective way, it is possible to enhance the maintainability\
    \ of any application.\n\nHowever, in other more complicated cases, the default\
    \ capabilities of the JDK 1.4 logging API might fall a little short. This is the\
    \ time when we need to extend the framework to suit our needs—after all, a good\
    \ object-oriented API means a framework that is always extendible.\n\nIn this\
    \ chapter, we will first discuss configuration issues involving the JDK 1.4 logging\
    \ API and develop custom `Handler` objects. Later, we will explore remote logging\
    \ with the JDK 1.4 logging API and see a real-life example to demonstrate a practical\
    \ application of the logging framework.\n\n## Configuring the Logging Framework\n\
    \nIn [Chapter 2](#LiB0012_split_000.html#44), we saw how to configure the JDK\
    \ 1.4 logging API programmatically. Using different methods exposed by different\
    \ objects in the logging API, we can configure individual `Logger` and `Handler`\
    \ objects. The main drawback of programmatic configuration is that it makes it\
    \ impossible to change the configuration without changing the source code. To\
    \ avoid such bottlenecks, the JDK 1.4 logging API also supports configuration\
    \ via configuration files. In general, the configuration of the JDK 1.4 logging\
    \ API can be achieved in the following ways:\n\n*   By using different methods\
    \ available within the API\n\n*   By defining the configuration parameters in\
    \ a configuration file\n\n*   By writing a separate configuration class that has\
    \ the responsibility of configuring the logging components\n\nBy now, you are\
    \ familiar with the first option—that is, how to configure logging components\
    \ programmatically. In the coming sections, we will explore the other two options\
    \ for configuring the JDK 1.4 logging API."
  trans: "\n## 编写自定义格式化器\n\n虽然使用 JDK 1.4 日志记录 API 中提供的默认 `Formatter` 对象非常有用，但不同的应用程序可能需要以更特定于应用程序的方式生成日志消息。针对这些情况，可以定义自定义的\
    \ `Formatter` 对象。要编写自定义的 `Formatter` 对象，我们只需扩展 `java.util.logging.Formatter` 类并重写其中的\
    \ `format()` 方法即可。例如，假设有一个应用程序需要以 Java 属性文件格式存储不同的方法入口以及这些方法调用中使用的日志消息。为了实现这一点，我们将设计一个非常简单的自定义\
    \ `Formatter` 对象，该对象将格式化消息并将其返回给应用程序正在使用的相应 `Handler` 对象。清单 3-5 中的 `CustomFormatter.java`\
    \ 展示了如何为此场景开发自定义的 `Formatter` 对象。\n\n清单 3-5: CustomFormatter.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\npackage sam.logging;\nimport java.util.logging.*;\npublic class CustomFormatter\
    \ extends Formatter\n{\n\npublic CustomFormatter()\n  {\n  }\n\n/**\n 此方法以 Java\
    \ 属性文件样式格式化给定的日志记录\n */\n  public synchronized String format(LogRecord record)\n\
    \  {\n    String methodName = record.getSourceMethodName();\n    String message\
    \ = record.getMessage();\n    StringBuffer buffer = new StringBuffer(50);\n  \
    \  buffer.append(methodName);\n    buffer.append(\"=\");\n    buffer.append(message);\n\
    \    return buffer.toString();\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n\
    |  |\n\n清单 3-5 中定义的 `CustomFormatter` 对象重写了父类 `Formatter` 的 `abstract format(LogRecord\
    \ record)` 方法。它简单地构造一个键值格式的字符串并返回给父处理器。从代码中可以看出，它完全依赖 `LogRecord` 对象来获取调用日志记录的方法名称，并且该对象不会尝试从堆栈跟踪中确定源方法。因此，使用此自定义\
    \ `Formatter` 对象的用户有责任将源方法名称作为 `LogRecord` 对象的一部分提供。当然，我们可以编写更复杂的格式化器，它可能执行更复杂的格式化活动。\n\
    \n清单 3-6 中的客户端程序 `CustomFormatterTest.java` 使用了 `CustomFormatter` 对象。它尝试将信息写入属性文件，以便\
    \ Java 程序稍后可以在 `java.util.Properties` 对象中获取这些信息。客户端应用程序首先获取一个名为 `sam.logging`\
    \ 的命名日志记录器实例。然后，它创建一个 `FileHandler` 对象以写入给定文件，并将 `CustomFormatter` 对象的新实例分配为与\
    \ `FileHandler` 实例关联的 `Formatter` 对象。最后，`Logger` 调用 `info()` 方法来记录任何日志消息。\n\n\
    清单 3-6: CustomFormatterTest.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage\
    \ sam.logging;\nimport java.util.logging.*;\nimport java.io.*;\n\npublic class\
    \ CustomFormatterTest\n{\n    private static Logger logger = Logger.getLogger(\"\
    sam.logging\");\n    private String fileName = null;\n\npublic CustomFormatterTest(String\
    \ fileName)\n    {\n        this.fileName = fileName;\n        try\n        {\n\
    \            FileHandler fh = new FileHandler(fileName);\n            CustomFormatter\
    \ formatter = new CustomFormatter();\n            fh.setFormatter(formatter);\n\
    \nlogger.addHandler(fh);\n        }catch(IOException ioe)\n        {\n       \
    \     ioe.printStackTrace();\n        }\n    }\n    /**\n     * 此方法执行日志记录活动\n\
    \     */\n\npublic void logMessage()\n    {\n        logger.info(\"log this message\"\
    );\n\n}\n\npublic static void main(String args[]) {\n        CustomFormatterTest\
    \ test = new CustomFormatterTest(args[0]);\n        test.logMessage();\n    }\n\
    }\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n执行此客户端应用程序会将日志信息输出到命令行指定的文件中。\n\
    \n```\n>>java sam.logging.CustomFormatterTest custom.properties\n```\n\n最终获得的属性文件\
    \ \"custom.properties\" 包含键值对格式的方法名称和消息。\n\n```\nCustomFormatterTest.logMessage=log\
    \ this message\n```\n\n## 结论\n\n在本章中，我们了解了不同的 `Formatter` 对象如何工作、它们的内部机制，以及如何编写自定义的\
    \ `Formatter` 对象并使用它们。我们还探讨了日志消息的本地化方面。现在是时候开始在实际应用程序中使用这个日志记录框架了。我们经常会发现需要一个根据应用程序需求定制的自定义日志记录框架。在下一章中，我们将研究如何扩展现有的日志记录\
    \ API 框架以满足更多特定于应用程序的需求。\n\n# 第 4 章：扩展日志记录框架\n\n## 概述\n\n在前面的章节中，我们详细讨论了 JDK 1.4\
    \ 日志记录 API 中可用的不同对象及其操作方式。我们还分析了可以随日志记录框架一起应用的不同格式化技术，并开发了我们自己的 `Formatter` 对象。该\
    \ API 已经提供了大量足以满足小型应用程序的日志记录功能。通过有效使用日志记录框架，可以增强任何应用程序的可维护性。\n\n然而，在其他更复杂的情况下，JDK\
    \ 1.4 日志记录 API 的默认功能可能稍显不足。这时，我们需要扩展框架以满足我们的需求——毕竟，一个好的面向对象 API 意味着一个始终可扩展的框架。\n\
    \n在本章中，我们将首先讨论涉及 JDK 1.4 日志记录 API 的配置问题，并开发自定义的 `Handler` 对象。之后，我们将探索使用 JDK 1.4\
    \ 日志记录 API 进行远程日志记录，并查看一个实际示例来演示日志记录框架的实际应用。\n\n## 配置日志记录框架\n\n在第 2 章中，我们了解了如何以编程方式配置\
    \ JDK 1.4 日志记录 API。通过使用日志记录 API 中不同对象公开的不同方法，我们可以配置单独的 `Logger` 和 `Handler` 对象。编程式配置的主要缺点是，如果不更改源代码，就无法更改配置。为了避免此类瓶颈，JDK\
    \ 1.4 日志记录 API 还支持通过配置文件进行配置。通常，JDK 1.4 日志记录 API 的配置可以通过以下方式实现：\n\n*   通过使用 API\
    \ 中可用的不同方法\n*   通过在配置文件中定义配置参数\n*   通过编写一个单独的配置类，负责配置日志记录组件\n\n到目前为止，您已经熟悉了第一种选项——即如何以编程方式配置日志记录组件。在接下来的章节中，我们将探讨配置\
    \ JDK 1.4 日志记录 API 的其他两种选项。\n"
- fmt: '### File-Based Configuration


    The `java.util.logging.LogManager` class in the logging framework is the core
    class responsible for reading the configuration file and initializing different
    objects with defined configuration parameters. The logging API relies on the configuration
    information being passed to it from a standard configuration file. The `LogManager`
    class uses the `java.util.logging.config.file` system property to read the initial
    configuration information from a configuration file.


    If this property is not passed to the logging framework at startup, by default,
    `LogManager` reads a configuration file located in the `JAVA_HOME/jre/lib/logging.properties`
    file. This configuration file defines the default configuration parameters for
    the logging framework to work. It is possible to override the default location
    and specify our own configuration file by passing a command line option to the
    Java runtime as:


    ```

    java -Djava.util.logging.config.file=configuration file name

    ```


    The logging configuration in a configuration file is divided into two sections.
    One section holds the global configuration information, and the other includes
    the `Handler` object-specific configuration information. The global configuration
    properties are loaded at Java VM startup, and the `Handler`-specific configuration
    properties are loaded when respective `Handler` objects are initialized. Each
    property defined is preceded by the fully qualified name of the `Handler` class
    (e.g., `java.util.logging.FileHandler.formatter`). We will take a closer look
    at these two parts of the logging configuration in the next sections.


    ### Global Configuration


    The global configuration has only two parameters to define: the global `Handler`
    objects to be loaded and the global level of the logging. These parameters are
    defined as follows:


    ```

    handlers= java.util.logging.ConsoleHandler

    .level= INFO

    ```


    The `handlers` property defines the global `Handler` object to be loaded. Although
    the default configuration defines the `java.util.logging.ConsoleHandler` object
    as the only `Handler` to initialize, we can define several `Handler` objects for
    initialization as a comma-separated list. For example, the following line can
    load the `java.util.logging.ConsoleHandler` and the `java.util.logging.FileHandler`
    objects as the default global `Handler`s:


    ```

    handlers= java.util.logging.FileHandler, java.util.logging.ConsoleHandler

    ```


    This means that the root logger will now use two separate `Handler` objects to
    write the logging information to two separate destinations, such as a console
    and a file.


    |  | Note | The defined global `Handler` object class needs to be in the system
    classpath. At JVM startup, the class file is located in the classpath and loaded
    into the VM, and a new instance of the class is created with any configuration
    parameter defined specific to the global `Handler` object. |


    The `level` property defines the global level of logging to be used. This level
    acts as a threshold level to the global `Handler` objects defined and blocks any
    message with a lower level.


    The global configuration of `level` is inherited by all the `Logger` objects within
    the same instance of the application. However, it is possible to configure each
    individual `Logger` object used within an application. For example, the following
    line defines the level for a `Logger` named `com.abc.myapp`:


    ```

    com.abc.myapp.level=INFO

    ```


    It is important to note that any subpackage of `com.abc.myapp` will inherit this
    level if not configured individually.


    ### Configuration Order


    The configuration order of different `Logger` objects within the same configuration
    file must be sequential. In other words, the parent logger must be configured
    before the child logger. In the JDK 1.4 logging API, the parent configuration
    always overrides the child configuration. This becomes crucial for the `Logger`
    objects having a parent-child relationship.


    For example, the following configuration does NOT configure the `Logger` objects
    as we expect:


    ```

    com.abc.myapp.net.level=INFO

    com.abc.myapp.level=SEVERE

    ```


    This configuration order does not set the level for the logger `com.abc.myapp.net`
    to INFO. This is because the parent logger `com.abc.myapp` is later assigned a
    level SEVERE. The logger `com.abc.myapp.net` will also have a level SEVERE.


    ### Handler-Specific Configuration


    The different `Handler` objects provided within the JDK 1.4 logging API have the
    following common properties present in all of them:


    *   `level`

    *   `filter`


    Apart from the preceding properties, which are common to all the `Handler`s, specific
    `Handler`s such as `java.util.logging.FileHandler` can use some other properties
    such as `pattern`, `limit`, etc., to publish logging information.


    Here is a sample configuration file for the logger `com.abc.io`. Assume that the
    logger uses a `SocketHandler`. The configuration file first defines the level
    for the logger. Next, the configuration parameters for the `SocketHandler` are
    defined:


    ```

    #setting the level of the logger

    com.abc.io.level=INFO


    #setting the handler properties

    java.util.logging.SocketHandler.level=INFO

    java.util.logging.SocketHandler.formatter=java.util.logging.SimpleFormatter

    java.util.logging.SocketHandler.filter=com.apress.logging.AgeCheckFilter

    java.util.logging.SocketHandler.host=localhost

    java.util.logging.SocketHandler.port=2020

    ```


    The preceding configuration for the `SocketHandler` defines the basic properties
    such as `level`, `formatter`, and `filter`. In addition, it defines its own parameters
    for connection information such as `host` and `port`.


    Once the parameters are defined for a `Handler`, the `LogManager` class stores
    the configuration key and configuration value in a `java.util.Properties` object.
    When each `Handler` is initialized by an application, the appropriate configuration
    information is extracted from the `LogManager` class and used within the specific
    `Handler` class. If any of the configuration parameters are missing, then properties
    of the parent handler are used.


    |  | Note | We need to make sure that all the values specified are valid, or else
    they will be ignored and parent properties will be used. |


    We will now explore the configuration options available for each of the `Handler`
    objects in the next few sections.


    #### ConsoleHandler Parameters


    `java.util.logging.ConsoleHandler` has the configurable properties defined in
    [Table 4-1](#LiB0027.html#ch04table01).


    **Table 4-1: ConsoleHandler Configuration Parameters**


    | Property | Meaning | Default |

    | --- | --- | --- |

    | `encoding` | Character encoding to use | Default platform-specific encoding
    |

    | `filter` | Filter to attach | No filter |

    | `formatter` | Formatting for the logging information | `java.util.logging.SimpleFormatter`
    |

    | `level` | The level of logging | Level.INFO |


    A sample configuration for `ConsoleHandler` might look like the following:


    ```

    #configuration for the ConsoleHandler

    java.util.logging.ConsoleHandler.level = INFO

    java.util.logging.ConsoleHandler.formatter =java.util.logging.SimpleFormatter

    ```


    This configuration sets the threshold level of the `ConsoleHandler` to Level.INFO
    and the formatter associated with the `ConsoleHandler` is a `SimpleFormatter`
    object. Any message with a level equal to or above Level.INFO will be published
    to `System.err` (the default destination for the `ConsoleHandler`) in a `SimpleFormatter`
    formatting style.'
