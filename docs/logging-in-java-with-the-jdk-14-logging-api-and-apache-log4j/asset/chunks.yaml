  trans: "\n### 配置 SocketAppender\n\n`SocketAppender` 具有表 7-3 中列出的可配置 Bean 属性。\n\n\
    表 7-3: SocketAppender 中的可配置 Bean 属性\n\n| Bean 属性 | 方法 | 描述 | 默认值 |\n| --- | ---\
    \ | --- | --- |\n| `locationInfo` | `setLocationInfo(boolean)` | 将位置信息参数设置为 `true`\
    \ 或 `false` | `false` |\n| `port` | `setPort(int)` | 设置要连接的端口号 | 4560 |\n| `reconnectionDelay`\
    \ | `setReconnectionDelay(int)` | 连接器线程在服务器宕机后尝试重新连接服务器之前的等待毫秒数 | 30,000 毫秒 |\n\
    | `remoteHost` | `setRemoteHost(String)` | 设置远程主机名 | 无 |\n\n### SocketAppender\
    \ 示例\n\n将日志事件数据写入远程服务器很容易——`SocketAppender` 会为我们完成这项工作。我们只需将主机名、端口等作为可配置 Bean\
    \ 属性的一部分传递给它。在另一端，我们需要一个服务器程序，该程序能够接受由 `SocketAppender` 打开的套接字连接并处理传入的数据。代码清单\
    \ 7-9 `LoggingServer.java` 是一个示例服务器端程序，用于接受发送给它的数据。它监听任意端口 1000。在从套接字连接接收到数据后，它会将数据转换为约定的\
    \ `LoggingEvent` 对象，并从中提取所有数据。\n\n代码清单 7-9: LoggingServer.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\npackage com.apress.logging.log4j;\n\nimport java.net.ServerSocket;\n\
    import java.net.Socket;\nimport java.io.ObjectInputStream;\nimport java.io.BufferedInputStream;\n\
    \nimport org.apache.log4j.spi.LoggingEvent;\n\npublic class SocketServer implements\
    \ Runnable{\n\n    private String portNumber = null;\n    private ServerSocket\
    \ serverSocket = null;\n    private Socket socket = null;\n    private ObjectInputStream\
    \ inStream = null;\n    private LoggingEvent event = null;\n    /** Creates a\
    \ new instance of SocketServer */\n    public SocketServer(String portNumber)\
    \ {\n        this.portNumber = portNumber;\n        try {\n            //listen\
    \ to the port specified\n            serverSocket = new ServerSocket(Integer.parseInt(portNumber));\n\
    \            socket = serverSocket.accept();\n            //creating a ObjectInputStream\
    \ from the socket input stream\n            inStream = new ObjectInputStream(new\n\
    \            BufferedInputStream(socket.getInputStream()));\n            new Thread(this).start();\n\
    \        }catch(Exception e) {\n            System.out.println(\"Error: \"+e.toString());\n\
    \        }\n    }\n    public void run() {\n        try {\n\n            while(true)\
    \ {\n\n                //cast back to the LoggingEvent object\n              \
    \  event = (LoggingEvent)inStream.readObject();\n                //print the message\
    \ and logger name in this logging event\n                System.out.println(\"\
    THE LOGGER NAME: \"+event.getLoggerName());\n                System.out.println(\"\
    THE MESSAGE: \"+event.getMessage().toString());\n            }\n        }catch(Exception\
    \ e) {\n            System.out.println(\"Error: here\"+e.toString());\n      \
    \  }\n    }\n\n    public static void main(String args[]) {\n        String port\
    \ = args[0];\n        new SocketServer(port);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n请注意，`SocketServer` 是一个基于线程的程序，在 `run()` 方法中，它持续监听端口以接收任何传入的消息。一旦有消息到达，它就能打印出消息的内容。\n\
    \n代码清单 7-10 `socket.properties` 展示了从代码清单 7-1 中的示例程序发送日志信息所需的配置文件。\n\n代码清单 7-10:\
    \ socket.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\n#configuring the custom\
    \ logger\nlog4j.logger.com.apress.logging.log4j=DEBUG, SOCKET\n\n#configuring\
    \ the SOCKET appender\nlog4j.appender.SOCKET=org.apache.log4j.net.SocketAppender\n\
    log4j.appender.SOCKET.remoteHost=oemcomputer\nlog4j.appender.SOCKET.port=1000\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n### 运行 SocketAppender 示例程序\n\n要查看\
    \ `SocketAppender` 的实际运行效果，我们需要首先运行 `SocketServer` 程序，并让它监听与 `socket.properties`\
    \ 中指定的相同端口（即 1000）。确保 `SocketServer` 和 `SocketAppender` 都使用同一个端口进行通信。本示例中的主机是一台名为\
    \ `oemcomputer` 的机器，`ServerSocket` 程序正在其上运行。\n\n使用以下命令启动服务器程序：\n\n```\njava com.apress.logging.log4j.SocketServer\
    \ 1000\n```\n\n现在，尝试运行客户端程序，并将 `socket.properties` 作为配置文件传递给它。\n\n```\njava -Dlog4j.configuration=socket.properties\n\
    com.apress.logging.log4j.AdvancvedLogging\n```\n\n我们将在服务器端控制台中看到以下消息：\n\n```\n\
    THE LOGGER NAME: com.apress.logging.log4j\nTHE MESSAGE: Deposited 100.5 new balance:\
    \ 100.5\nTHE LOGGER NAME: com.apress.logging.log4j\nTHE MESSAGE: Withdrawn 80.0\
    \ new balance: 20.5\nTHE LOGGER NAME: com.apress.logging.log4j\nTHE MESSAGE: Failed\
    \ to withdraw: balance: 20.5 attempted withdraw: 50.0\n```\n\n## 使用 NTEventLogAppender\
    \ 记录到 Windows NT 事件日志\n\n对于执行系统级操作的程序，我们可能需要将日志信息发送到特定操作系统的**事件日志**。在 Java 中，我们可以通过\
    \ Java 本地接口（JNI）与操作系统进行交互。`org.apache.log4j.net.NTEventLogAppender` 为我们提供了实现此功能的灵活性。\n\
    \n由于 log4j API 是用 Java 编写的，为了访问 Windows NT 事件日志，它使用 JNI 与 `NTEventLogAppender.dll`\
    \ 文件进行通信。该文件与 Windows NT 事件日志交互，并将日志信息写入其中。\n\n`NTEventLogAppender` 对象使用起来非常简单，并具有表\
    \ 7-4 中所示的可配置 Bean 属性。\n\n表 7-4: NTEventLogAppender 中的可配置 Bean 属性\n\n| Bean 属性\
    \ | 方法 | 描述 | 默认值 |\n| --- | --- | --- | --- |\n| `layout` | `SetLayout(String)`\
    \ | 设置此附加器使用的布局 | 默认布局为 `TTCCLayout`。 |\n| `source` | `setSource(String)` | 设置此事件日志的源名称\
    \ | 默认源名称设置为 `Log4j`。 |\n\n我们将重用代码清单 7-1 中的程序，以查看日志信息如何存储在 NT 事件日志中。我们还将使用代码清单\
    \ 7-11 `nt.properties` 中的配置文件来配置此示例中使用的记录器和附加器。\n\n代码清单 7-11: nt.properties\n\n\
    | **![开始示例](img/_1.gif)** |\n\n```\n#configuring the custom logger\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
    \ NT\n\n#configuring the NT appender\nlog4j.appender.NT=org.apache.log4j.nt.NTEventLogAppender\n\
    log4j.appender.NT.layout=org.apache.log4j.SimpleLayout\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n此示例配置文件为 `NTEventLogAppender` 提供了一个 `SimpleLayout` 对象。只需使用此配置文件执行示例程序即可。完成后，如果打开\
    \ Windows NT/Windows 2000/Windows XP 系统的**事件查看器**，我们将在应用程序日志部分看到针对源名称 `Log4j`\
    \ 记录的事件。在每个事件中，我们都会找到存储的日志信息。\n"
- fmt: '# Distributing Logging Information via SMTPAppender


    The [previous chapter](#LiB0047_split_000.html#389) mentioned that the greatest
    feature of a logging API like log4j is that it does not restrict logging activity
    to mere debug traces. Moreover, as we have seen from the discussions of several
    `Appender` objects, these objects constitute a powerful feature for distributing
    logging information to various components such as databases, NT event logs, sockets,
    etc. This useful feature can be exploited to achieve data distribution capability
    without having to write a separate application module to do the same.


    One example of this great feature is `SMTPAppender`. Imagine you are writing an
    order processing application in which upon receiving each order the customer is
    subsequently updated with the details of the order received. One traditional solution
    to this problem is to collect the order information and pass it to a separate
    mailing application to e-mail it to the user. With the help of `SMTPAppender`,
    we can do this without even writing a single line of extra code.


    `org.apache.log4j.net.SMTPAppender` is a powerful `Appender` object capable of
    sending logging information using the Simple Mail Transfer Protocol (SMTP). The
    `SMTPAppender` object has the configurable bean properties shown in [Table 7-5](#LiB0057.html#ch07table05).


    **Table 7-5: Configurable Bean Properties in SocketAppender**


    | Bean Property | Method | Description | Default |

    | --- | --- | --- | --- |

    | `bufferSize` | `setBufferSize(int)` | Sets the size of the cyclic buffer storing
    the logging event | Defaults to 512 events |

    | `evaluatorClass` | `setEvaluatorClass(String)` | Sets the name of the evaluator
    class to use to check for any triggering condition | Defaults to inner class `DefaultEvaluator`
    |

    | `from` | `setFrom(String)` | Sets the e-mail address of the sender | None |

    | `layout` | `setLayout(String)` | Sets the layout to format the logging information
    | None |

    | `locationInfo` | `setLocationInfo(boolean)` | Specifies whether the location
    information should be included in the logging information | `false` |

    | `SMTPHost` | `setSMTPHost(String)` | Sets the name of the SMTP host to be used
    to send e-mails | None |

    | `subject` | `setSubject(String)` | Sets the subject of the e-mail | None |

    | `to` | `setTo(String)` | Sets the e-mail address of the recipient | None |


    The last of the configuration parameters in [Table 7-5](#LiB0057.html#ch07table05)
    is worth discussing. `SMTPAppender` can have an evaluator class attached to it.
    This evaluator class can evaluate each logging event and decide on a triggering
    condition to tell the `SMTPAppender` to fire the e-mail activity. The triggering
    condition can be anything application specific, such as when a logging event has
    a message with a level of ERROR. The default evaluator class that `SMTPAppender`
    uses is an inner class named `DefaultEvaluator`. The `DefaultEvaluator` class
    only checks if the level associated with the logging event is greater or equal
    to the level value ERROR.


    If the triggering condition is not met, the event is stored in a cyclic buffer
    with a default size of 512 events. As soon as a logging event arrives that satisfies
    the triggering condition, all the events from the buffer are retrieved and e-mailed
    to the recipient.


    To see an example of `SMTPAppender` in action, we will reuse the program in [Listing
    7-1](#LiB0052.html#446) with the configuration file shown in [Listing 7-12](#LiB0057.html#ch07ls12),
    "smtp.properties". The configuration for `SMTPAppender` uses `smtp.mail.yahoo.com`
    as the SMTP server. You can replace this with any other SMTP server you are using.
    The `to` attribute defines the e-mail address for the recipient and `from` defines
    the e-mail address of the sender. The `subject` attribute defines the subject
    of the e-mail, and finally we assign an `org.apache.log4j.SimpleLayout` object
    to format the logging information to appear within the body of the e-mail.


    **Listing 7-12: smtp.properties**


    ```

    #configuring the custom logger

    log4j.logger.com.apress.logging.log4j=DEBUG, SMTP


    #configuring the SMTP appender

    log4j.appender.SMTP=org.apache.log4j.net.SMTPAppender

    log4j.appender.SMTP.SMTPHost=smtp.mail.yahoo.com

    log4j.appender.SMTP.to=clientname@mailserver.com

    log4j.appender.SMTP.subject=Testing the appender

    log4j.appender.SMTP.from=yourname@mailserver.com

    log4j.appender.SMTP.layout=org.apache.log4j.SimpleLayout

    ```


    With this configuration file, execute the sample program. Remember, `SMTPAppender`
    relies on the Java Mail API ("mail.jar") and Java Activation API ("activation.jar").
    Make sure that these two .jar files are in your classpath along with the log4j-specific
    .jar file.


    Once executed, we will see the messages are going to the client e-mail address.
    In our example program, there is a message with a level of ERROR that meets the
    triggering condition, and thus `SMTPAppender` sends the e-mail with all the logging
    events to the specified client e-mail address.


    # Making Messages Available Through Telnet with TelnetAppender


    On certain occasions we might want to give remote users access to the logging
    information we produce from an application. This is particularly important when
    we want to manage an application remotely. In this case, we are publishing logging
    data locally and want to give read-only access to the remote user. The best way
    of doing this is to use the existing Telnet protocol. Remote users can log in
    to the local machine using Telnet protocol and can read the logging information
    we want them to see.


    The log4j API provides `org.apache.log4j.net.TelnetAppender` for us to enable
    this feature. `TelnetAppender` writes the data to a read-only socket. `TelnetAppender`
    is a multithreaded program that opens a server socket connection to a port and
    listens for any connection made to the same port. As soon as a connection signal
    arrives, it adds the connection source information to a buffer. Next, whenever
    a logging request arrives to the `TelnetAppender`, it writes the data to all the
    active connection sockets.


    The `TelnetAppender` object uses the default Telnet port 23. Optionally, any other
    port can be specified. The maximum number of connections it can handle simultaneously
    is 20. `TelnetAppender` requires a specific layout to format logging data accordingly.


    A good example of a situation ideal for using `TelnetAppender` is in conjunction
    with a servlet. A servlet handles multiple client connections at one point in
    time. Also, using `TelnetAppender` for server logging activity allows multiple
    remote managers to obtain logging information real time. This is great when remote
    management of an application is critical.


    Instead of including an example of using `TelnetAppender` with a servlet here,
    this is left for you to implement as an exercise. Remember, there is not much
    magic to `TelnetAppender`. You only need to configure your `Logger` object to
    use the `TelnetAppender`.'
