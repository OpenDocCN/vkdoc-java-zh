    -->\n</style>\n</head>\n<body bgcolor=\"#FFFFFF\" topmargin=\"6\" leftmargin=\"\
    6\">\n<hr size=\"1\" noshade>\n日志会话开始时间 2002 年 10 月 19 日 星期六 22:01:40 BST<br>\n\
    <br>\n<table cellspacing=\"0\" cellpadding=\"4\" border=\"1\" bordercolor=\"#224466\"\
    \nwidth=\"100%\">\n<tr>\n<th>时间</th>\n<th>线程</th>\n<th>级别</th>\n<th>类别</th>\n\
    <th>文件:行号</th>\n<th>消息</th>\n</tr>\n\n<tr>\n<td>0</td>\n<td title=\"主线程\">main</td>\n\
    <td title=\"级别\">INFO</td>\n<td title=\"com.apress.logging.log4j 类别\">com.apress.logging.log4j</td>\n\
    <td>LayoutDemo.java:35</td>\n<td title=\"消息\">平方根值: 4.69041575982343</td>\n</tr>\n\
    <tr><td bgcolor=\"#EEEEEE\" style=\"font-size : xx-small;\" colspan=\"6\"\ntitle=\"\
    嵌套诊断上下文\">NDC: 22.0</td>xs</tr>\n<tr>\n<td>20</td>\n<td title=\"主线程\">main</td>\n\
    <td title=\"级别\">INFO</td>\n<td title=\"com.apress.logging.log4j 类别\">com.apress.logging.log4j</td>\n\
    <td>LayoutDemo.java:35</td>\n<td title=\"消息\">平方根值: 6.6332495807108</td>\n</tr>\n\
    <tr><td bgcolor=\"#EEEEEE\" style=\"font-size : xx-small;\" colspan=\"6\"\ntitle=\"\
    嵌套诊断上下文\">NDC: 44.0</td></tr>\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n\
    请注意，头部信息包含 `<html>` 和 `<body>` 标签，但 `</body>` 和 `</html>` 标签的尾部信息完全缺失。显然，这不是一个格式良好的\
    \ HTML 文件。某些浏览器可能允许使用这种风格的 HTML 源代码，但有些则可能不允许。问题是，为什么尾部信息（即结束标签）会缺失呢？\n\n答案在于\
    \ `HTMLLayout` 的 `getFooter()` 方法被调用的时机。按照 log4j 1.2.6 版本的当前实现，任何 `Layout` 对象的\
    \ `getFooter()` 方法都是在相关 `Appender` 对象的 `close()` 方法被调用时才会被调用。这可能是 API 中的一个小错误，也可能不是，具体取决于应用程序执行日志记录活动的方式。\n\
    \n想象一个作为服务器组件、处理多个客户端调用的应用程序模块。对于每次调用，我们都希望将日志信息写入一个 HTML 文件。我们希望头部信息仅在 `HTMLLayout`\
    \ 对象初始化时包含一次。这已在初始化时通过 `HTMLLayout` 的 `setWriter()` 方法完成。现在的问题是我们何时写入尾部信息。当然不是在每条日志信息追加到文件之后。等等——如果我们希望每次日志请求都打开一个新文件并在日志记录结束后关闭文件，那么可能确实需要这样做。在这种情况下，如果在每次日志请求格式化后调用\
    \ `getFooter()` 方法，那将完全没问题。但在正常情况下，如果我们希望将所有日志信息包含在一个文件中，或者更严格地说，该文件包含多个日志请求的日志信息，我们就不能每次都追加尾部信息。\n\
    \n显然，调用 `getFooter()` 的最佳时机是当 `Appender` 对象本身不再需要时。在这种情况下，当我们退出服务器组件（例如 servlet\
    \ 中的 `destroy()` 方法）时，我们会调用 `LogManager.shutdown()` 方法来关闭所有 `Appender` 对象。这确保了尾部信息被写入生成的\
    \ HTML 文件的末尾。\n\n在这个特定示例中，在 `computeSquareRoot()` 方法中，就在离开该方法之前，如果我们调用\n\n```\n\
    LogManager.shutDown()\n```\n\n我们会看到尾部信息被包含在最终的 HTML 文件中。这可能不是理想的情况，但这就是我们目前必须处理的方式。\n\
    \n### XMLLayout 对象\n\nHTML 格式的日志信息友好且易于阅读，但不易于重用。数据是结构化的，但*并非*以描述性的方式呈现。HTML 风格的日志信息无法在多个应用程序模块之间移植。为了以可移植的\
    \ XML 格式呈现日志信息，log4j 提供了 `org.apache.log4j.xml.XMLLayout` 对象。\n\n`XMLLayout` 对象可以在最终输出中包含来自\
    \ `LoggingEvent` 的以下项目：\n\n*   日志记录器名称\n*   时间戳\n*   与日志请求关联的级别\n*   调用线程名称\n\
    *   日志消息\n*   `NDC` 信息\n*   `LoggingEvent` 中包含的 `java.lang.Throwable` 实例\n*  \
    \ 日志请求的位置信息（默认情况下，位置信息功能是关闭的）\n\n`XMLLayout` 遵循 \"log4j.dtd\" 文件中包含的文档类型定义来创建\
    \ XML 输出。需要注意的是，最终输出*不是*一个格式良好的 XML 文件。这听起来可能令人惊讶，但此对象的目的是将日志信息生成为一系列 `<log4j:event>`\
    \ 元素。然后，最终输出可以作为实体被另一个正确的 XML 文件引用。\n\n|  | 注意 | 请参考 Apache log4j 二进制发行版附带的 \"\
    log4j.dtd\" 文件。 |\n\n为了说明这个概念，让我们再次重用清单 6-1 中的程序，并使用清单 6-5 中定义的 `XMLLayout` 配置文件\
    \ \"xml.properties\"。\n\n**清单 6-5：xml.properties**\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\n#配置自定义日志记录器\nlog4j.logger.com.apress.logging.log4j=DEBUG, FILE\n\n\
    log4j.appender.FILE=org.apache.log4j.FileAppender\nlog4j.appender.FILE.File=xmlLayout.xml\n\
    \nlog4j.appender.FILE.layout=org.apache.log4j.xml.XMLLayout\nlog4j.appender.FILE.layout.LocationInfo=true\n\
    ```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n该配置使用 `FileAppender` 和 `XMLLayout`\
    \ 来格式化日志信息。\n\n使用此配置文件执行程序会将格式化后的日志信息写入 \"xmlLayout.xml\" 文件。该文件的内容类似于以下内容：\n\n\
    ```\n<log4j:event logger=\"com.apress.logging.log4j\" timestamp=\"1035061552691\"\
    \nlevel=\"INFO\" thread=\"main\">\n<log4j:message><![CDATA[平方根值: 4.69041575982343]]></log4j:message>\n\
    <log4j:NDC><![CDATA[22.0]]></log4j:NDC>\n<log4j:locationInfo class=\"com.apress.logging.log4j.LayoutDemo\"\
    \nmethod=\"computeSquareRoot\" file=\"LayoutDemo.java\" line=\"35\"/>\n</log4j:event>\n\
    \n<log4j:event logger=\"com.apress.logging.log4j\" timestamp=\"1035061552711\"\
    \nlevel=\"INFO\" thread=\"main\">\n<log4j:message><![CDATA[平方根值: 6.6332495807108]]></log4j:message>\n\
    <log4j:NDC><![CDATA[44.0]]></log4j:NDC>\n<log4j:locationInfo class=\"com.apress.logging.log4j.LayoutDemo\"\
    \nmethod=\"computeSquareRoot\" file=\"LayoutDemo.java\" line=\"35\"/>\n</log4j:event>\n\
    ```\n\n显而易见，XML 输出是一系列 `<log4j:event>` 元素，其中包含其他子元素来呈现日志信息。下面描述的代码片段展示了如何将此信息包含在一个格式良好的\
    \ XML 文件中：\n\n```\n <?xml version=\"1.0\" ?>\n\n<!DOCTYPE log4j:eventSet SYSTEM\
    \ \"log4j.dtd\" [<!ENTITY logEntity SYSTEM\n\"xmlLayout.xml\">]>\n\n<log4j:eventSet\
    \ version=\"1.2\" xmlns:log4j=\"http://jakarta.apache.org/log4j/\">\n &logEntity;\n\
    </log4j:eventSet>\n```\n\n乍一看，这可能会令人困惑。但其背后的原理是，它使得将日志消息渲染为 XML 格式的 `Layout` 对象和使用此\
    \ `Layout` 的 `Appender` 对象彼此独立。\n"
- fmt: '为了进一步说明，假设您正在编写一个自定义的附加器（appender）。您希望该附加器在每次日志输出中都包含公司信息头，并且希望日志信息以 XML 格式发布。在这种情况下，您将在自定义附加器中重写`doAppend()`方法，将日志信息写入
    XML 文件。此外，您可以包含一个包含公司信息的标准头部，并且仍然可以使用现有的`XMLLayout`对象以其自身风格格式化日志信息。然后，您可以在整个 XML
    文件中引用`XMLLayout`对象生成的文件，将其作为外部`ENTITY`。显然，您已经实现了将`XMLLayout`对象生成的 XML 日志信息作为`ELEMENT`包含在任何其他
    XML 内容中的灵活性。


    ### `PatternLayout`对象


    格式化任何信息都意味着赋予它一种能被外部实体理解和识别的模式。通过为日志信息提供一种模式，该信息将被人类或程序识别。模式进一步意味着，如果产生日志信息的模块和接收信息的模块事先就某种模式达成一致，那么该信息就可以被处理。这就是`PatternLayout`发挥作用的地方。


    `org.apache.log4j.PatternLayout`扩展了基础抽象类`Layout`，并重写了`format()`方法，以根据提供的模式结构化日志信息。我们可以通过配置文件或编程方式提供该模式。`PatternLayout`对象具有表
    6-9 中列出的 bean 属性。


    **表 6-9：`PatternLayout`中的 Bean 属性**


    | Bean 属性 | 方法 | 描述 | 默认值 |

    | --- | --- | --- | --- |

    | `conversionPattern` | `setConversionPattern()` | 设置转换模式 | 默认为`%r [%t] %p %c
    %x - %m%n` |


    `PatternLayout`可以在最终消息中包含`LoggingEvent`对象中的所有信息。它可以处理的项目列表见表 6-10。请注意，`java.lang.Throwable`实例是例外情况。


    **表 6-10：`PatternLayout`的转换字符**


    | 转换字符 | 含义 |

    | --- | --- |

    | `c` | 用于调用此日志请求的`Logger`。它可以选择性地接受一个精度说明符。例如，在我们的示例中，Logger 名称是`com.apress.logging.log4`。使用精度说明符`c{2}`，logger
    将被打印为“logging.log4j”。请注意，只有右侧相应数量的元素会包含在最终输出中。 |

    | `C` | 调用此日志请求的`Logger`的完全限定名称。它也可以接受一个精度说明符，如转换字符`c`所述。生成 logger 的完全限定名称可能非常慢。
    |

    | `d` | 日志请求的日期。它也可以接受一个可选的日期说明符。例如，`%d{yyyy-MM-dd}`将以年-月-日格式打印日期。如果未指定日期格式，则使用
    log4j 中定义的 ISO8601 格式。由于`java.text.SimpleDateFormat`的性能相当差，为了获得更好的结果，请使用 log4j
    API 提供的`DateFormat`对象。 |

    | `F` | 发出日志请求的文件名。 |

    | `l` | 位置信息。在处理任何异常堆栈跟踪时，此信息非常有用。但是，使用 log4j 生成此信息可能非常慢。在使用此功能之前需要权衡利弊。 |

    | `L` | 发出日志请求的程序文件中的行号。 |

    | `m` | 日志消息。 |

    | `M` | 发出日志请求的程序中的方法。 |

    | `n` | 平台相关的行分隔符。 |

    | `p` | 与日志请求关联的级别。 |

    | `r` | 相对日期格式，显示从应用程序启动到发出此日志请求所经过的毫秒数。 |

    | `t` | 调用线程。 |

    | `x` | `NDC`信息。 |

    | `X` | `MDC`信息。`X`转换字符后跟`MDC`的键。例如，`X{clientIP}`将打印存储在`MDC`中针对键`clientIP`的信息。
    |

    | `%` | 字面百分号。`%%`将打印一个`%`符号。 |


    `PatternLayout`根据给定的模式格式化日志信息。提供的模式主要规定以下项目：


    *   格式化信息由*格式修饰符*决定。

    *   要显示的信息由*转换字符*决定。


    表 6-10 显示了所有可以与`PatternLayout`一起使用的转换字符。


    与`PatternLayout`一起使用的格式修饰符在表 6-11 中描述。


    **表 6-11：`PatternLayout`中使用的格式修饰符**


    | 修饰符 | 左对齐 | 最小宽度 | 最大宽度 | 含义 |

    | --- | --- | --- | --- | --- |

    | `%10c` | 否 | 10 个字符 | 无 | 显示 logger 名称。如果名称少于 10 个字符，则在左侧应用填充。 |

    | `%-10c` | 是 | 10 个字符 | 无 | 显示 logger 名称。如果名称少于 10 个字符，则在右侧应用填充。 |

    | `%.20c` | 否 | 无 | 20 个字符 | 显示 logger 名称。如果名称超过 20 个字符，则从开头截断。 |

    | `%20.30c` | 否 | 20 个字符 | 30 个字符 | 显示 logger 名称。如果名称小于最小宽度（20 个字符），则在左侧应用填充；如果名称超过
    30 个字符，则从开头截断。 |

    | `%-20.30c` | 是 | 20 个字符 | 30 个字符 | 显示 logger 名称。如果名称短于 20 个字符，则在右侧应用填充以保持左对齐。如果名称长于
    30 个字符，则从开头截断。 |


    为了说明转换模式的功能，让我们尝试使用`LayoutDemo.java`（清单 6-1）并向其传递以下配置文件。该配置将指定`PatternLayout`作为与`ConsoleAppender`一起使用的`Layout`对象，并且我们将向`PatternLayout`传递一个适当的转换模式。


    ```

    #configuring the custom logger

    log4j.logger.com.apress.logging.log4j=DEBUG, CONSOLE


    log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender


    log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout

    log4j.appender.CONSOLE.layout.ConversionPattern=%d{yyyy-MM-dd}-%t-%x-%-5p-%-

    10c:%m%n

    ```


    使用此配置文件执行程序将向控制台产生以下输出：


    ```

    2002-10-20-main-22.0-INFO -com.apress.logging.log4j:The sqrt value:

    4.69041575982343

    2002-10-20-main-44.0-INFO -com.apress.logging.log4j:The sqrt value:

    6.6332495807108

    ```


    既然您已经理解了转换模式，您应该能够判断出转换模式`%r [%t] %p %c %x - %m%n`的含义与`TTCCLayout`完全相同。


    ## 结论


    在本章中，我们详细讨论了每个`Layout`对象的行为方式，以及如何通过配置文件配置这些对象。log4j API 提供了一套全面的`Layout`对象，足以满足大多数应用程序的需求。如果您的应用程序需要更复杂的`Layout`对象，则需要自己创建一个。我们将在第
    8 章中了解如何编写一个新的`Layout`对象。在下一章中，我们将继续讨论 log4j，研究如何在分布式计算领域交付日志信息。


    # 第 7 章：使用 log4j 进行高级日志记录'
  raw: 'To further illustrate, let''s say that you are writing a custom appender.
    You want the appender to include your company information header with every logging
    output. You also want the logging information to be published in XML format. In
    such scenarios, you will override the `doAppend()` method in your custom appender
    to write the logging information into a XML file. Also, you can include a standard
    header containing your company information and can still use the existing `XMLLayout`
    object to format the logging information in its own style. You can then include
    a reference to the file that the `XMLLayout` object produced as an external `ENTITY`
    within your overall XML file. Clearly, you have achieved the flexibility of including
    the XML logging information produced by the `XMLLayout` object as an `ELEMENT`
    of any other XML content.


    ### PatternLayout Object


    Formatting any piece of information means giving it a pattern that is understandable
    and recognizable by some external entity. By providing a pattern to the logging
    information, that information will be recognized by a human or a program. A pattern
    further means that if the module producing the logging information and a module
    receiving the information agrees on a pattern beforehand, that information can
    be processed. This is where `PatternLayout` becomes useful.


    `org.apache.log4j.PatternLayout` extends the base `abstract` class `Layout` and
    overrides the `format()` method to structure logging information according to
    a supplied pattern. We can supply the pattern either through a configuration file
    or programmatically. The `PatternLayout` object has the bean property listed in
    [Table 6-9](#LiB0049.html#ch06table09).


    Table 6-9: Bean Property in PatternLayout


    | Bean Property | Method | Description | Default |

    | --- | --- | --- | --- |

    | `conversionPattern` | `setConversionPattern()` | Sets the conversion pattern
    | Defaults to `%r [%t] %p %c %x - %m%n` |


    `PatternLayout` can include all the information within the `LoggingEvent` object
    in the final message. The list of items that it can handle is presented in [Table
    6-10](#LiB0049.html#ch06table10). Notice the exception is the `java.lang.Throwable`
    instance.


    Table 6-10: The Conversion Characters for PatternLayout


    | Conversion Character | Meaning |

    | --- | --- |

    | `c` | The `Logger` used to invoke this logging request. This can optionally
    take a precision specifier. For instance, in our example the Logger name is `com.apress.logging.log4`.
    With a precision specifier `c{2}`, the logger will be printed as "logging.log4j".
    Notice that only the corresponding number of elements from the right-hand side
    are included in the final output. |

    | `C` | The fully qualified name of the `Logger` invoking this logging request.
    This can also accept a precision specifier as describe with conversion character
    `c`. Generating the fully qualified name of the logger can be very slow. |

    | `d` | The date of the logging request. This can also take an optional date specifier.
    For example, `%d{yyyy-MM-dd}` will print the date in year-month-day format. If
    no date format is specified, this uses the ISO8601 format defined within log4j.
    As the performance of `java.text.SimpleDateFormat` is quite poor, for better results
    use the `DateFormat` objects provided with the log4j API. |

    | `F` | The name of the file from which the logging request was issued. |

    | `l` | The location information. This information can be quite useful when dealing
    with any exception stack trace. However, generating this information with log4j
    can be quite slow. A trade-off has to be made before this feature is used. |

    | `L` | The line number in the program file from which the logging request was
    issued. |

    | `m` | The logging message. |

    | `M` | The method in the program from which the logging request was issued. |

    | `n` | Platform-dependent line separator. |

    | `p` | The level associated with the logging request. |

    | `r` | The RELATIVE date format displaying the number of milliseconds elapsed
    from the start of the application before this logging request was issued. |

    | `t` | The invoking thread. |

    | `x` | The `NDC` information. |

    | `X` | The `MDC` information. The `X` conversion character is followed by the
    key for the `MDC`. For example, `X{clientIP}` will print the information stored
    in the `MDC` against the key `clientIP`. |

    | `%` | The literal percent sign. `%%` will print a % sign. |


    `PatternLayout` formats the logging information against a given pattern. The pattern
    supplied essentially dictates the following items:


    *   The formatting information is dictated by *format modifiers.*


    *   The information to be displayed is dictated by *conversion characters.*


    [Table 6-10](#LiB0049.html#ch06table10) displays all the conversion characters
    that can be used with `PatternLayout`.


    The format modifiers used along with `PatternLayout` are described in [Table 6-11](#LiB0049.html#ch06table11).


    Table 6-11: Format Modifiers Used in PatternLayout


    | Modifiers | Left Justified | Minimum Width | Maximum Width | Meaning |

    | --- | --- | --- | --- | --- |

    | `%10c` | No | 10 characters | None | Displays the logger name. If the name is
    less than 10 characters, then padding is applied to the left side. |

    | `%-10c` | Yes | 10 characters | None | Displays the logger name. If the name
    is less than 10 characters, then padding is applied to the right side. |

    | `%.20c` | No | None | 20 characters | Displays the logger name. If the name
    is more than 20 characters, then it is truncated from the beginning. |

    | `%20.30c` | No | 20 characters | 30 characters | Displays the logger name. If
    the name is less than the minimum width (20 chars), then padding is applied to
    the left side; if the name is more than 30 characters, then it is truncated from
    the beginning. |

    | `%-20.30c` | Yes | 20 characters | 30 characters | Displays the logger name.
    If the name is shorter than 20 characters, then padding is applied to the right
    side to keep it left justified. If the name is longer than 30 characters, then
    it is truncated from the beginning. |


    To illustrate the power of the conversion patterns, let''s try to use `LayoutDemo.java`
    ([Listing 6-1](#LiB0049.html#ch06ls01)) and pass it the following configuration
    file. The configuration will specify `PatternLayout` as the `Layout` object used
    with the `ConsoleAppender`, and we will pass an appropriate conversion pattern
    to `PatternLayout`.


    ```

    #configuring the custom logger

    log4j.logger.com.apress.logging.log4j=DEBUG, CONSOLE


    log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender


    log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout

    log4j.appender.CONSOLE.layout.ConversionPattern=%d{yyyy-MM-dd}-%t-%x-%-5p-%-

    10c:%m%n

    ```


    Executing the program with this configuration file will produce the following
    output to the console:


    ```

    2002-10-20-main-22.0-INFO -com.apress.logging.log4j:The sqrt value:

    4.69041575982343

    2002-10-20-main-44.0-INFO -com.apress.logging.log4j:The sqrt value:

    6.6332495807108

    ```


    Now that you have an understanding of conversion patterns, you should be able
    to tell that the conversion pattern `%r [%t] %p %c %x - %m%n` means nothing other
    than `TTCCLayout`.


    ## Conclusion


    In this chapter, we have discussed in detail how each `Layout` object behaves
    and how these objects can be configured through a configuration file. The log4j
    API provides a comprehensive set of `Layout` objects, which is sufficient for
    most applications. If your application needs a more sophisticated `Layout` object,
    you need to create one for yourself. We will see how to write a new `Layout` object
    in [Chapter 8](#LiB0060_split_000.html#525). In the [next chapter](#LiB0051_split_000.html#441),
    we will continue our discussion of log4j by examining how we can deliver logging
    information in the arena of distributed computing.


    # Chapter 7: Advanced Logging with log4j'
