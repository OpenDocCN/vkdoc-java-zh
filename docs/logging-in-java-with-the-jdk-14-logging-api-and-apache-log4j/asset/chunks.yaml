    \ `LoggerTag` 类的所有其他子类中实现。所有其他标签类，如 `ErrorTag`、`InfoTag` 等，都是 `LoggerTag` 的子类，并为\
    \ `getPriority()` 方法提供实现。因此，要定义一个新标签，我们只需扩展 `LoggerTag` 类，并提供一个返回自定义级别 TRACE 的\
    \ `getPriority()` 方法实现。清单 9-5 `TraceTag.java` 演示了如何使用自定义级别 TRACE 编写自定义标签。\n\n\
    清单 9-5: TraceTag.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j.customtag;\n\
    \nimport org.apache.taglibs.log.LoggerTag;\nimport org.apache.log4j.Priority;\n\
    import com.apress.logging.log4j.CustomLevel;\n\npublic class TraceTag extends\
    \ LoggerTag\n{\n    protected Priority getPriority()\n    {\n        return CustomLevel.TRACE;\n\
    \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n要开发这个自定义标签，我们复用了第 8 章中开发的自定义级别\
    \ TRACE（参见清单 8-9）。如您所见，创建一个使用新级别的新标签非常简单。清单 9-6 显示了需要添加到现有 \"taglibs-log.tld\"\
    \ 文件中的标签库描述。（该文件随 `Log` 发行版一起提供。）\n\n清单 9-6: 自定义 Trace 标签的标签描述\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\n <tag>\n    <name>trace</name>\n    <tagclass>com.apress.logging.log4j.customtag.TraceTag</tagclass>\n\
    \    <attribute>\n      <name>category</name>\n      <required>false</required>\n\
    \      <rtexprvalue>true</rtexprvalue>\n    </attribute>\n    <attribute>\n  \
    \    <name>message</name>\n      <required>false</required>\n      <rtexprvalue>true</rtexprvalue>\n\
    \    </attribute>\n</tag>\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n|  |\
    \ 注意  | 标签的名称指定为 `trace`。因此，在 JSP 中，我们需要使用名称 `trace` 来访问此标签。 |\n\n### 自定义 Trace\
    \ 标签的实际应用\n\n一旦我们准备好了用于级别 TRACE 的标签类，并修改了 \"taglibs-log.tld\" 文件以包含新 `trace` 标签的定义，我们就可以开始在\
    \ JSP 中使用它了。为了设置 Tomcat 以使用这个新标签，我们需要执行以下步骤：\n\n1.  将所需的新 `TraceTag` 和 `CustomLevel`\
    \ 类复制到 Web 应用程序中适当的目录结构下。例如，如果 Web 应用程序目录是 \"TestLogTags\"，则需要在 \"TestLogTags\\\
    WEB-INF\\classes\" 目录下创建相应的包结构。\n\n2.  编辑 \"Tomcat.bat\" 文件，将 \"taglibs-log.jar\"\
    \ 文件包含到 classpath 中。\n\n3.  修改 \"log4j.properties\" 文件，将阈值级别设置为 TRACE。根日志记录器的默认阈值级别是\
