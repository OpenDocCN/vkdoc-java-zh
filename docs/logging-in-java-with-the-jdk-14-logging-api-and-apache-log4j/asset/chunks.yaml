- fmt: "### A Caution About Using `HTMLLayout`\n\nOur discussion of `HTMLLayout` is\
    \ not quite finished without a quick look at a possible problem with the source\
    \ file that was generated in the previous example. If we open this file, we will\
    \ see the HTML code shown in [Listing 6-4](#LiB0049.html#ch06ls04).\n\n**Listing\
    \ 6-4: The HTML Source Code Produced by `HTMLLayout`**\n\n```\n<!DOCTYPE HTML\
    \ PUBLIC \"-//W3C//DTD HTML 4.01 Transitional//EN\"\n\"http://www.w3.org/TR/html4/loose.dtd\"\
    >\n<html>\n<head>\n<title>Log4J Log Messages</title>\n<style type=\"text/css\"\
    >\n<!--\nbody, table {font-family: arial, sans-serif; font-size: x-small;}\nth\
    \ {background: #336699; color: #FFFFFF; text-align: left;}\n-->\n</style>\n</head>\n\
    <body bgcolor=\"#FFFFFF\" topmargin=\"6\" leftmargin=\"6\">\n<hr size=\"1\" noshade>\n\
    Log session start time Sat Oct 19 22:01:40 BST 2002<br>\n<br>\n<table cellspacing=\"\
    0\" cellpadding=\"4\" border=\"1\" bordercolor=\"#224466\"\nwidth=\"100%\">\n\
    <tr>\n<th>Time</th>\n<th>Thread</th>\n<th>Level</th>\n<th>Category</th>\n<th>File:Line</th>\n\
    <th>Message</th>\n</tr>\n\n<tr>\n<td>0</td>\n<td title=\"main thread\">main</td>\n\
    <td title=\"Level\">INFO</td>\n<td title=\"com.apress.logging.log4j category\"\
    >com.apress.logging.log4j</td>\n<td>LayoutDemo.java:35</td>\n<td title=\"Message\"\
    >The sqrt value: 4.69041575982343</td>\n</tr>\n<tr><td bgcolor=\"#EEEEEE\" style=\"\
    font-size : xx-small;\" colspan=\"6\"\ntitle=\"Nested Diagnostic Context\">NDC:\
    \ 22.0</td>xs</tr>\n<tr>\n<td>20</td>\n<td title=\"main thread\">main</td>\n<td\
    \ title=\"Level\">INFO</td>\n<td title=\"com.apress.logging.log4j category\">com.apress.logging.log4j</td>\n\
    <td>LayoutDemo.java:35</td>\n<td title=\"Message\">The sqrt value: 6.6332495807108</td>\n\
    </tr>\n<tr><td bgcolor=\"#EEEEEE\" style=\"font-size : xx-small;\" colspan=\"\
    6\"\ntitle=\"Nested Diagnostic Context\">NDC: 44.0</td></tr>\n```\n\nNotice that\
    \ the header information contains the `<html>` and the `<body>` tags, but the\
    \ footer for the `</body>` and `</html>` tags is completely missing. Clearly,\
    \ this is not a well-formed HTML file. Some browsers might allow us to use this\
    \ style of HTML source, but some may not. The question is, why is the footer (i.e.,\
    \ the closing tags) missing?\n\nThe answer lies in when the `getFooter()` method\
    \ of the `HTMLLayout` is called. As it stands at the moment in version 1.2.6 of\
    \ log4j, the `getFooter()` method of any `Layout` object is called when the `close()`\
    \ method of the related `Appender` object is called. This may or may not be a\
    \ small bug in the API, depending on how the application is performing the logging\
    \ activity.\n\nImagine an application module that is a server component handling\
    \ multiple client calls. For every call we want to write down the logging information\
    \ to an HTML file. We want the header to be included only once when the `HTMLLayout`\
    \ object is initialized. This is done in the `setWriter()` method of `HTMLLayout`\
    \ at initialization. Now the issue is when we want to write the footer. Certainly\
    \ not after every bit of logging information is appended to the file. Hang on—we\
    \ might want this to happen if for every logging request we want to open a new\
    \ file and close the file after the logging is over. In this situation, we will\
    \ be perfectly fine if we call the `getFooter()` method after every logging request\
    \ is formatted. But in normal scenarios, if we want to include all the logging\
    \ information in a single file or to be more strict, and that file contains logging\
    \ information for more than one logging request, we cannot append the footer information\
    \ every time.\n\nClearly, the best place to call the `getFooter()` is when the\
    \ `Appender` objects themselves are no longer needed. For this situation, when\
    \ we exit our server component (such as the `destroy()` method in a servlet),\
    \ we would call the `LogManager.shutdown()` method to close all the `Appender`\
    \ objects. This ensures that the footer is written to the end of the HTML file\
    \ produced.\n\nIn this particular example, in the `computeSquareRoot()` method\
    \ just before leaving the method, if we call\n\n```\nLogManager.shutDown()\n```\n\
    \nwe would see that the footer information is included in the final HTML file.\
    \ This may not be the ideal situation, but this is how we have to deal with it\
    \ at the moment.\n\n### `XMLLayout` Object\n\nLogging information in HTML format\
    \ is nice and user friendly, but not precisely reusable. The data is structured\
    \ but *not* in a descriptive way. HTML-style logging information is not portable\
    \ across multiple application modules. To render logging information in XML format,\
    \ which is portable, log4j provides the `org.apache.log4j.xml.XMLLayout` object.\n\
    \nThe `XMLLayout` object may include the following items from `LoggingEvent` in\
    \ the final output:\n\n*   The logger name\n*   The timestamp\n*   The level associated\
    \ with the logging request\n*   The invoking thread name\n*   The logging message\n\
    *   The `NDC` information\n*   The `java.lang.Throwable` instance included within\
    \ the `LoggingEvent`\n*   The location info for the logging request (By default,\
    \ the location info feature is turned off.)\n\n`XMLLayout` follows the document\
    \ type definition contained in the \"log4j.dtd\" file to create the XML output.\
    \ It is important to note that the final output is *not* a well-formed XML file.\
    \ It may sound surprising, but the purpose of this object is to produce logging\
    \ information as a series of `<log4j:event>` elements. The final output then can\
    \ be referenced as an entity to another proper XML file.\n\n> **Note:** Please\
    \ refer to the \"log4j.dtd\" file that comes with the Apache log4j binary distribution.\n\
    \nTo illustrate this concept, let's again reuse the program in [Listing 6-1](#LiB0049.html#ch06ls01)\
    \ with the configuration file for `XMLLayout`, \"xml.properties\", defined in\
    \ [Listing 6-5](#LiB0049.html#ch06ls05).\n\n**Listing 6-5: xml.properties**\n\n\
    ```\n#configuring the custom logger\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
    \ FILE\n\nlog4j.appender.FILE=org.apache.log4j.FileAppender\nlog4j.appender.FILE.File=xmlLayout.xml\n\
    \nlog4j.appender.FILE.layout=org.apache.log4j.xml.XMLLayout\nlog4j.appender.FILE.layout.LocationInfo=true\n\
    ```\n\nThe configuration uses a `FileAppender` along with `XMLLayout` to format\
    \ the logging information.\n\nExecuting the program with this configuration file\
    \ will write the formatted logging information to the \"xmlLayout.xml\" file.\
    \ The content of the file looks similar to the following:\n\n```\n<log4j:event\
    \ logger=\"com.apress.logging.log4j\" timestamp=\"1035061552691\"\nlevel=\"INFO\"\
    \ thread=\"main\">\n<log4j:message><![CDATA[The sqrt value: 4.69041575982343]]></log4j:message>\n\
    <log4j:NDC><![CDATA[22.0]]></log4j:NDC>\n<log4j:locationInfo class=\"com.apress.logging.log4j.LayoutDemo\"\
    \nmethod=\"computeSquareRoot\" file=\"LayoutDemo.java\" line=\"35\"/>\n</log4j:event>\n\
    \n<log4j:event logger=\"com.apress.logging.log4j\" timestamp=\"1035061552711\"\
    \nlevel=\"INFO\" thread=\"main\">\n<log4j:message><![CDATA[The sqrt value: 6.6332495807108]]></log4j:message>\n\
    <log4j:NDC><![CDATA[44.0]]></log4j:NDC>\n<log4j:locationInfo class=\"com.apress.logging.log4j.LayoutDemo\"\
    \nmethod=\"computeSquareRoot\" file=\"LayoutDemo.java\" line=\"35\"/>\n</log4j:event>\n\
    ```\n\nAs is evident, the XML output is a series of `<log4j:event>` elements containing\
    \ other child elements to present the logging information. The code snippet described\
    \ next shows how to include this information in a well-formed XML file:\n\n```\n\
    <?xml version=\"1.0\" ?>\n\n<!DOCTYPE log4j:eventSet SYSTEM \"log4j.dtd\" [<!ENTITY\
    \ logEntity SYSTEM\n\"xmlLayout.xml\">]>\n\n<log4j:eventSet version=\"1.2\" xmlns:log4j=\"\
    http://jakarta.apache.org/log4j/\">\n &logEntity;\n</log4j:eventSet>\n```\n\n\
    At first sight, this might seem confusing. But the rationale behind this is it\
    \ makes the `Layout` object rendering the logging message into XML format and\
    \ the `Appender` object using this `Layout` independent of each other."
