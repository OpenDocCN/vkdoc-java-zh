  trans: "\n### 自定义窗口处理器\n\n假设你想创建一个应用程序，能够将所有日志信息打印到一个小窗口中。为了实现这一目标，本节将介绍如何开发一个自定义的\
    \ `Handler` 对象。清单 4-2 `LogWindow.java` 是一个示例程序，它创建了一个用于显示日志信息的小型 Java 窗口。该程序使用了一个\
    \ `javax.swing.JFrame` 对象，并将消息显示在附加的 `javax.swing.JTextArea` 对象上。\n\n清单 4-2: LogWindow.java\n\
    \n| **![示例开始](img/_1.gif)** |\n\n```\npackage sam.logging.handler;\n\nimport javax.swing.JFrame;\n\
    import javax.swing.JTextArea;\nimport javax.swing.JScrollPane;\n\npublic class\
    \ LogWindow extends JFrame\n{\n private int width;\n private int height;\n private\
    \ JTextArea textArea = null;\n private JScrollPane pane = null;\n\npublic LogWindow(String\
    \ title, int width, int height)\n {\n  super(title);\n  setSize(width, height);\n\
    \  textArea = new JTextArea();\n  pane = new JScrollPane(textArea);\n  getContentPane().add(pane);\n\
    \  setVisible(true);\n }\n /**\n  * 此方法将数据追加到文本区域。\n  *@param data 日志信息数据\n  */\n\
    \ public void showInfo(String data)\n {\n  textArea.append(data);\n  this.getContentPane().validate();\n\
    \ }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n`LogWindow` 是一个继承自 `javax.swing.JFrame`\
    \ 类的简单组件。它通过构造函数定义了窗口的 `title`（标题）和 `dimension`（尺寸）。它还定义了一个包含 `javax.swing.JTextArea`\
    \ 对象的 `javax.swing.JScrollPane` 实例。日志信息将包含在定义的 `JTextArea` 中。`showInfo()` 方法将日志信息作为\
    \ `String` 参数接收，并将其追加到 `JTextArea` 中的现有数据之后。每次写入数据后，都会对窗口的内容面板进行验证。\n\n有了这个简单的输出设备，我们现在来看看如何开发一个\
    \ `WindowHandler` 类，它将日志信息打印到 `LogWindow` 中。清单 4-3 `WindowHandler.java` 是一个自定义的\
    \ `Handler` 对象，它使用日志窗口并将日志信息打印到该窗口。\n\n清单 4-3: WindowHandler.java\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\npackage sam.logging.handler;\n\nimport java.util.logging.*;\n\npublic\
    \ class WindowHandler extends Handler\n{\n //执行日志记录的窗口\n private LogWindow window\
    \ = null;\n private Formatter formatter = null;\n private Level level = null;\n\
    \ //单例实例\n private static WindowHandler handler = null;\n\n/**\n  * 私有构造函数，防止初始化\n\
    \  */\n private WindowHandler()\n {\n  configure();\n  if(window == null)\n  \
    \ window = new LogWindow(\"日志窗口\",500,200);\n }\n /**\n  * getInstance 方法返回 WindowHandler\
    \ 对象的单例实例。\n  * 该方法已同步，以防止两个线程同时尝试创建实例。\n  * @return WindowHandler 对象\n  */\n\n\
    public static synchronized WindowHandler getInstance()\n {\n\nif(handler == null)\n\
    \  {\n   handler = new WindowHandler();\n  }\n  return handler;\n }\n /**\n  *\
    \ 此方法借助 LogManager 类从 JDK 级别的配置文件中加载配置属性。\n  * 然后设置其 level、filter 和 formatter\
    \ 属性。\n  */\n private void configure()\n {\n  LogManager manager = LogManager.getLogManager();\n\
    \  String className = this.getClass().getName();\n  String level = manager.getProperty(className+\"\
    .level\");\n  String filter = manager.getProperty(className+\".filter\");\n  String\
    \ formatter =\nmanager.getProperty(className+\".formatter\");\n\n//访问父类方法以设置参数\n\
    \  setLevel(level !=null ? Level.parse(level):Level.INFO);\n  setFilter(makeFilter(filter));\n\
    \  setFormatter(makeFormatter(formatter));\n\n}\n /**\n  * 私有方法，使用过滤器名称构造一个 Filter\
    \ 对象。\n  *@param filterName 过滤器的名称\n  *@return Filter 对象\n  */\n private Filter\
    \ makeFilter(String filterName)\n {\n  Class c = null;\n  Filter f = null;\n \
    \  try\n   {\n    c = Class.forName(filterName);\n    f = (Filter)c.newInstance();\n\
    \   }catch(Exception e)\n   {\n    System.out.println(\"加载过滤器类时出现问题: \"+filterName);\n\
    \   }\n   return f;\n  }\n  /**\n   *私有方法，使用格式化器名称创建一个 Formatter 对象。如果未指定名称，\n\
    \   *则返回一个 SimpleFormatter 对象。\n   *@param formatterName 格式化器的名称\n   *@return\
    \ Formatter 对象\n   */\n  private Formatter makeFormatter(String formatterName)\n\
    \  {\n   Class c = null;\n   Formatter f = null;\n\ntry\n   {\n    c = Class.forName(formatterName);\n\
    \    f = (Formatter)c.newInstance();\n   }catch(Exception e)\n   {\n    f = new\
    \ SimpleFormatter();\n   }\n   return f;\n  }\n  /**\n   *这是抽象父类 Handler 中重写的\
    \ publish 方法。\n   * 此方法将日志信息写入关联的 Java 窗口。\n   *此方法已同步以保证线程安全。如果出现问题，\n   * 它会通过\
    \ ErrorManager 报告问题，仅报告一次，并静默忽略其他问题。\n   *@record LogRecord 对象\n   *\n   */\n\
    \  public synchronized void publish(LogRecord record)\n  {\n   String message\
    \ = null;\n   //检查记录是否可记录\n   if( !isLoggable(record))\n    return;\n   try\n\
    \   {\n    message = getFormatter().format(record);\n   }catch(Exception e)\n\
    \   {\n    reportError(null, e, ErrorManager.FORMAT_FAILURE);\n   }\n\ntry\n \
    \  {\n    window.showInfo(message);\n   }catch(Exception ex)\n   {\n    reportError(null,\
    \ ex, ErrorManager.WRITE_FAILURE);\n   }\n\n}\n\npublic void close()\n  {\n  }\n\
    \npublic void flush()\n  {\n  }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\
    \n按照前面描述的编写自定义 `Handler` 对象的步骤，`WindowHandler` 类继承了 `java.util.logging.Handler`\
    \ 类并重写了 `abstract`（抽象）方法。值得注意的是，它将 `publish()` 方法定义为 `synchronized`（同步的），以确保日志记录的线程安全。`WindowHandler`\
    \ 对象的设计和实现受以下因素指导：\n\n*   它使用 `LogWindow` 对象实例来发布消息。\n\n*   在应用程序上下文中，我们需要且仅需要一个\
    \ `LogWindow` 实例处于活动状态。因此，在创建 `LogWindow` 实例之前，`WindowHandler` 对象会检查 `LogWindow`\
    \ 实例是否为 `null`。\n\n*   `LogWindow` 类的实例化是在 `WindowHandler` 的构造函数中执行的。因此，每次创建实例时，都有可能创建一个独立的\
    \ `LogWindow` 实例；这可能导致在应用程序生命周期内存在多个 `LogWindow` 实例的问题，最终会显示多个日志窗口。\n\n*   为了避免这个问题，我们将\
    \ `WindowHandler` 对象设为单例。因此，在一个应用程序上下文中，只有一个 `WindowHandler` 对象实例可用。\n\n*   由于\
    \ `publish()` 方法是 `synchronized`（同步的），我们安全地避免了发布顺序错误消息的风险。\n\n*   另一种方法是将 `LogWindow`\
    \ 实例设为单例。但在某些情况下，这可能不够充分，例如当我们决定创建两个 `LogWindow` 实例来显示来自两个不同 `Handler` 的消息时，这两个\
    \ `Handler` 都需要在基于窗口的输出屏幕上显示日志信息的功能。\n\n|  | 注意  | 单例实例意味着每个 JVM 实例中，所讨论的类只有一个实例。因此，每个\
    \ JVM 实例中只有一个 `WindowHandler` 实例可用。 |\n"
- fmt: "`WindowHandler`类有一个`private configure()`方法，该方法从位于`/jre/lib/logging.properties`的默认JDK日志配置文件中读取此特定`Handler`的配置信息。它借助`java.util.logging.LogManager`类读取配置信息。`WindowHandler`类依赖于以下配置属性：\n\
    \n*   `level`\n*   `filter`\n*   `formatter`\n\n这些属性应以以下键值对方式在配置文件中定义：\n\n```\n\
    sam.logging.handler.WindowHandler.level = some value\nsam.logging.handler.WindowHandler.filter\
    \ = some value\nsam.logging.handler.WindowHandler.formatter = some value\n```\n\
    \n|  | 注意 | `WindowHandler`并非必须从默认JDK配置文件中读取配置。实际上，我们可以在单独的配置文件中定义配置并将其传递给运行时。我们在“[基于文件的配置](#LiB0027.html#171)”一节中探讨了这一概念。此处旨在说明，也可以更改默认配置文件以容纳我们自己的配置。在这种情况下，请务必保留备份！\
    \ |\n\n如果未定义任何配置信息，则`level`属性将设置为`Level.INFO`，作为此`Handler`的阈值级别。只有级别大于或等于`WindowHandler`级别的`LogRecord`对象才会被处理。如果未定义`filter`属性，则`filter`设置将设置为无过滤器；如果未设置`formatter`属性，则默认格式化程序将设置为`java.util.logging.SimpleFormatter`。\n\
    \n抽象方法`close()`和`flush()`被实现为无操作（do-nothing）方法，因为此`WindowHandler`对象没有关联的流。在`publish()`方法内部，我们通过调用`Formatter`类的`format()`方法，获取使用关联的`Formatter`对象格式化后的日志信息。这将执行日志信息的格式化以及任何需要完成的本地化，并将格式化后的日志信息返回给`WindowHandler`类。然后，`WindowHandler`类调用`LogWindow`类的`showInfo()`方法将消息打印到输出窗口。\n\
    \n您应该了解的其他两个有趣方法是`makeFilter()`和`makeFormatter()`。`makeFilter()`方法尝试加载并实例化配置中指定的`Filter`。如果失败，它会在控制台打印一条失败消息。`makeFormatter()`方法尝试加载并实例化配置文件中指定的任何`Formatter`。如果失败，则将`SimpleFormatter`设置为默认的`Formatter`。\n\
    \n[清单 4-4](#LiB0028.html#ch04ls04)，`CustomHandlerDemo.java`，是一个演示程序，它将使用`WindowHandler`对象发布日志信息。\n\
    \n**清单 4-4: CustomHandlerDemo.java**\n\n| **![开始示例](_1.gif)** |\n\n```\npackage\
    \ sam.logging.handler;\nimport java.util.logging.*;\n\npublic class CustomHandlerDemo\n\
    {\n private WindowHandler handler = null;\n private Logger logger = null;\n\n\
    public CustomHandlerDemo()\n {\n  handler = WindowHandler.getInstance();\n  //obtaining\
    \ a logger instance and setting the handler\n  logger = Logger.getLogger(\"sam.logging.handler\"\
    );\n  logger.addHandler(handler);\n }\n /**\n  *This method publishes the log\
    \ message\n  */\n public void logMessage()\n {\n  logger.info(\"Hello from WindowHandler...\"\
    );\n }\n\npublic static void main(String args[])\n {\n  //logging with the help\
    \ of a logger\n  CustomHandlerDemo demo = new CustomHandlerDemo();\n  demo.logMessage();\n\
    \  //using the handler.publish() to log\n  WindowHandler h = WindowHandler.getInstance();\n\
    \  LogRecord r = new LogRecord(Level.WARNING, \"The Handler\npublish method...\"\
    );\n  h.publish(r);\n }\n}\n```\n\n| **![结束示例](_1.gif)** |\n\n|  |\n\n此演示程序展示了`WindowHandler`的两种用途。首先，它获取一个包名为`sam.logging.handler`的`Logger`实例，将与`Logger`关联的`Handler`对象设置为`WindowHandler`实例，然后使用`Logger`的`info()`方法记录消息。`Logger`将在内部创建一个包含给定消息且级别为`Level.INFO`的`LogRecord`对象（因为调用的方法是`logger.info()`），并将该`LogRecord`对象传递给`WindowHandler`进行发布。\n\
    \n第二种方式是获取`WindowHandler`对象的单例引用，创建一个具有适当级别的`LogRecord`对象，然后调用`WindowHandler`的`publish()`方法将消息打印到窗口。上述程序将按照[图\
    \ 4-1](#LiB0028.html#ch04fig01) 所示的顺序将消息打印到输出窗口。\n\n[![点击展开](fig4-1.jpg)](fig4-1_0.jpg)\n\
    **图 4-1: 自定义日志窗口**\n\n|  | 警告 | 尽管创建`LogRecord`对象并直接调用`Handler`类的`publish()`方法完全可行，但这并非最佳实践。建议使用`Logger`对象发布任何日志信息。\
    \ |\n\n要更改`WindowHandler`对象的行为，我们可以通过更改配置文件或以编程方式设置参数来修改`WindowHandler`对象的参数。例如，如果我们将`formatter`属性更改为`java.util.logging.XMLFormatter`，则日志窗口中的输出将是XML格式的。[图\
    \ 4-2](#LiB0028.html#ch04fig02) 显示了XML格式的输出。\n\n[![点击展开](fig4-2.jpg)](fig4-2_0.jpg)\n\
    **图 4-2: XML格式的日志输出**\n\n## 远程日志记录\n\n在客户端-服务器应用场景中，日志信息通常需要分布到不同的机器上。想象一下，您在不同的机器上运行几个不同的RMI组件。每个应用程序可以有独立的消息日志，但您可能希望将所有日志信息集中到一个中心位置，以便更好地管理系统。在这种情况下，您需要将日志信息从客户端或组件机器来回传递到中心位置。\n\
    \n理想情况下，对于基于Java的应用程序，中心日志记录位置也会运行一个Java RMI应用程序，该应用程序接收来自不同组件的不同日志信息，以适当的格式记录它们，并将它们发送到所需的目标位置。使用JDK\
    \ 1.4日志记录API，只有通过使用`java.util.logging.LogRecord`对象（它是`serializable`的）才能实现这种灵活性。\n\
    \n有两种可能的方法来使用`serializable LogRecord`对象实现远程日志记录。首先，应用程序中的不同组件必须将日志信息封装在`LogRecord`对象中，并将它们序列化到所需远程位置中监听的RMI组件。其次，我们可以开发一个自定义的`Handler`对象，该对象将处理日志记录的RMI部分。通过将此自定义`Handler`附加到应用程序组件中获取的`Logger`对象，我们可以实现所需的远程日志记录。借助以下各节中的示例程序，我们将了解远程日志记录机制如何在JDK\
    \ 1.4日志记录框架内工作。"
  raw: "The `WindowHandler` class has a `private configure()` method that reads the\
    \ configuration information for this particular `Handler` from the default JDK\
    \ logging configuration file located in \"/jre/lib/logging.properties\". It reads\
    \ the configuration information with the help of the `java.util.logging.LogManager`\
    \ class. The `WindowHandler` class relies on the following configuration properties:\n\
    \n*   `level`\n\n*   `filter`\n\n*   `formatter`\n\nThese properties should be\
    \ defined in the configuration file in the following key-value fashion:\n\n```\n\
    sam.logging.handler.WindowHandler.level = some value\nsam.logging.handler.WindowHandler.filter\
    \ = some value\nsam.logging.handler.WindowHandler.formatter = some value\n```\n\
    \n|  | Note  | It is not mandatory that `WindowHandler` should read the configuration\
    \ from the default JDK configuration file. In fact, we may define the configuration\
    \ in a separate configuration file and pass it to the runtime. We have explored\
    \ this concept in the \"[File-Based Configuration](#LiB0027.html#171)\" section.\
    \ The intention here is to show that it is also possible to change the default\
    \ configuration file to accommodate our own configuration. Don't forget to keep\
    \ a backup in situations like these!!! |\n\nIf no configuration information is\
    \ defined, then the `level` property is set to Level.INFO, which acts as the threshold\
    \ level for this `Handler`. Only `LogRecord` objects with levels greater than\
    \ or equal to the `WindowHandler` level will be processed. If no `filter` property\
    \ is defined, the `filter` setting gets set to no filter and if no `formatter`\
    \ property is set, then the default formatter is set to `java.util.logging.SimpleFormatter`.\n\
    \nThe `abstract` methods `close()` and `flush()` are implemented as do-nothing\
    \ methods, as there is no stream associated with this `WindowHandler` object.\
    \ Inside the `publish()` method, we obtain the logging information formatted with\
    \ the associated `Formatter` object by calling the `format()` method of the `Formatter`\
    \ class. This performs the formatting of the logging information and any localization\
    \ to be done and returns formatted logging information to the `WindowHandler`\
    \ class. The `WindowHandler` class then calls the `showInfo()` method of the `LogWindow`\
    \ class to print the message to the output window.\n\nTwo other interesting methods\
    \ you should know about are `makeFilter()` and `makeFormatter()`. The `makeFilter()`\
    \ method tries to load and instantiate the `Filter` specified in the configuration.\
    \ If it fails, it prints a failure message to the console. The `makeFormatter()`\
    \ method attempts to load and instantiate any `Formatter` specified in the configuration\
    \ file. If it fails, then it sets `SimpleFormatter` as the default `Formatter`.\n\
    \n[Listing 4-4](#LiB0028.html#ch04ls04), `CustomHandlerDemo.java`, is a demo program\
    \ that will use the `WindowHandler` object to publish logging information.\n\n\
    Listing 4-4: CustomHandlerDemo.java\n\n| **![Start example](_1.gif)** |\n\n```\n\
    \ package sam.logging.handler;\nimport java.util.logging.*;\n\npublic class CustomHandlerDemo\n\
    {\n private WindowHandler handler = null;\n private Logger logger = null;\n\n\
    public CustomHandlerDemo()\n {\n  handler = WindowHandler.getInstance();\n  //obtaining\
    \ a logger instance and setting the handler\n  logger = Logger.getLogger(\"sam.logging.handler\"\
    );\n  logger.addHandler(handler);\n }\n /**\n  *This method publishes the log\
    \ message\n  */\n public void logMessage()\n {\n  logger.info(\"Hello from WindowHandler...\"\
    );\n }\n\npublic static void main(String args[])\n {\n  //logging with the help\
    \ of a logger\n  CustomHandlerDemo demo = new CustomHandlerDemo();\n  demo.logMessage();\n\
    \  //using the handler.publish() to log\n  WindowHandler h = WindowHandler.getInstance();\n\
    \  LogRecord r = new LogRecord(Level.WARNING, \"The Handler\npublish method...\"\
    );\n  h.publish(r);\n }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n\
    This demo program demonstrates two uses of the `WindowHandler`. First, it obtains\
    \ a `Logger` instance with the package name `sam.logging.handler`, sets the `Handler`\
    \ object associated with the `Logger` as the `WindowHandler` instance, and then\
    \ uses the `info()` method of the `Logger` to log the message. The `Logger` will\
    \ internally create a `LogRecord` object with the given message and with the level\
    \ as Level.INFO (as the method invoked was `logger.info()`) and pass the `LogRecord`\
    \ object to the `WindowHandler` to publish.\n\nThe second way is to obtain the\
    \ singleton reference of the `WindowHandler` object, create a `LogRecord` object\
    \ with the appropriate level, and then call the `publish()` method of the `WindowHandler`\
    \ to print the message to the window. The preceding program will print messages\
    \ in the order shown in [Figure 4-1](#LiB0028.html#ch04fig01) to the output window.\n\
    \n[![Click To expand](fig4-1.jpg)](fig4-1_0.jpg)\nFigure 4-1: The custom logging\
    \ window\n\n|  | Caution  | Although it is perfectly feasible to create a `LogRecord`\
    \ object and directly call the `publish()` method of the `Handler` class, this\
    \ is not the best practice. It is advisable to use a `Logger` object to publish\
    \ any logging information. |\n\nTo alter the behavior of the `WindowHandler` object,\
    \ we can change the parameters of the `WindowHandler` object by either changing\
    \ the configuration file or programmatically setting the parameters. For example,\
    \ if we change the `formatter` property to `java.util.logging.XMLFormatter`, then\
    \ the output in the logging window will be XML formatted. [Figure 4-2](#LiB0028.html#ch04fig02)\
    \ shows the output in XML format.\n\n[![Click To expand](fig4-2.jpg)](fig4-2_0.jpg)\n\
    Figure 4-2: The logging output in XML format\n\n## Remote Logging\n\nIn the client-server\
    \ application scenario, often logging information needs to be distributed across\
    \ different machines. Imagine a situation where you are running several different\
    \ RMI components on different machines. Each application can have independent\
    \ message logs, but you may like to get all the log information in a central place\
    \ from where you can better manage the system. In such cases, you will need to\
    \ pass back and forth the logging information from the client or component machines\
    \ to a central place.\n\nIdeally for a Java-based application, the central logging\
    \ location would also run a Java RMI application accepting different logging information\
    \ from different components, logging them with appropriate formatting, and sending\
    \ them to the desired destination. With the JDK 1.4 logging API, this flexibility\
    \ is achievable only by using the `java.util.logging.LogRecord` object, which\
    \ is `serializable`.\n\nThere are two possible ways to use the `serializable LogRecord`\
    \ objects to achieve remote logging. First, different components within the application\
    \ will have to encapsulate the logging information in `LogRecord` objects and\
    \ serialize them to the listening RMI component in the desired remote location.\
    \ Secondly, we can develop a custom `Handler` object that will take care of the\
    \ RMI part of the logging. By attaching this custom `Handler` to the obtained\
    \ `Logger` object in the application component, we can achieve the desired remote\
    \ logging. With the help of the following sample programs in the following sections,\
    \ we will see how the remote logging mechanism works within the JDK 1.4 logging\
    \ framework."
