    \ RMIManager {\n\n    /** 创建 RMIManager 的新实例 */\n    public RMIManager() {\n \
    \   }\n\n    /**\n     * @param args 命令行参数\n     */\n    public static void main(String[]\
    \ args) {\n        try {\n            if(args[0].equalsIgnoreCase(\"start\"))\
    \ {\n                // 通过创建注册表来绑定服务\n                // 默认端口为 1099\n        \
    \        Registry reg = LocateRegistry.createRegistry(1099);\n               \
    \ Naming.rebind(\"rmi://oemcomputer/AppServer\",\nnew ServerComponent());\n  \
    \              Naming.rebind(\"rmi://oemcomputer/LoggingServer\",\nnew RemoteLoggingServer());\n\
    \                System.out.println(\"AppServer 已启动...\");\n            }else\
    \ if(args[0].equalsIgnoreCase(\"stop\")) {\n                // 解绑服务\n        \
    \        Naming.unbind(\"rmi://oemcomputer/AppServer\");\n                Naming.unbind(\"\
    rmi://oemcomputer/LoggingServer\");\n                System.exit(1);\n       \
    \     }\n\n        }catch(Exception e) {\n            System.out.println(e.toString());\n\
    \        }\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n### 客户端组件\n\
