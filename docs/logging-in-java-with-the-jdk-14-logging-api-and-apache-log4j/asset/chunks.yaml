- fmt: "### TTCCLayout Object\n\n`TTCCLayout` is much more effective in a multiuser\
    \ environment than the other `Layout` objects. Before moving on to the other `Layout`\
    \ objects available within log4j API, we will see how log4j handles the multiuser\
    \ logging environment through `TTCCLayout`.\n\nThe formatting style adopted by\
    \ the `SimpleLayout` object is very simplistic. In some cases it might prove useful,\
    \ and in other cases we may want to publish more detailed information about the\
    \ logging event. Particularly in multithreaded applications, where multiple clients\
    \ are accessing the same application module, it is important to publish the time\
    \ of logging, the active thread, etc., to distinguish between two separate client\
    \ activities. One other technique to differentiate between each client is the\
    \ *Nested Diagnostic Context* (NDC). All this information can be put into the\
    \ `LoggingEvent` object before passing it to the `Layout` objects.\n\n`org.apache.log4j.TTCCLayout`\
    \ does the job of presenting detailed information about a logging event. It extends\
    \ the `org.apache.log4j.helpers.DateLayout` class. Typically, it contains the\
    \ following information as part of the logging message:\n\n*   *Thread:* The invoking\
    \ thread.\n*   *Time:* The time in terms of number of milliseconds elapsed since\
    \ the application was started.\n*   *Category:* The category or the logger used\
    \ to create this logging event.\n*   *Context:* The `NDC` information. This information\
    \ is not automatically included in the `LoggingEvent` object. We have to deliberately\
    \ include this information in the `LoggingEvent` as explained in the [previous\
    \ chapter](#LiB0032_split_000.html#266). Thus, this parameter is optional output\
    \ from `TTCCLayout` in the sense that it might not display any `NDC` data, although\
    \ the `NDC` setting is enabled in case the `LoggingEvent` does not contain any\
    \ `NDC` data.\n\n| Note | The `TTCCLayout` object ignores any `java.lang.Throwable`\
    \ instance passed to the `LoggingEvent`. |\n\nWe will now see how to write a simple\
    \ program to illustrate the formatting provided by the `TTCCLayout` object. For\
    \ the sake of completeness, we will first configure the logger used in this example\
    \ programmatically, and also configure it through a configuration file later in\
    \ this section.\n\nTo perform the programmatic configuration, we will obtain an\
    \ instance of a named `Logger` and attach a `ConsoleAppender` to the logger instance.\
    \ To format the logging message, we will also attach a `TTCCLayout` object to\
    \ the `ConsoleAppender`. In this example, we will instantiate a `TTCCLayout` object\
    \ with the `yyyy-MM-dd` date pattern. This will cause the date to be formatted\
    \ as \"2002-10-20\", for example. In the `computeSquareRoot()` method, we will\
    \ create one `NDC`, and the `String` value of the `double` argument will be passed\
    \ to it. After computing the square root, we will print the square root value\
    \ with the `logger.info()` method. Now that we have discussed the particulars\
    \ of the example demonstrating `TTCCLayout`, let's take a look at the code as\
    \ presented in [Listing 6-1](#LiB0049.html#ch06ls01), `LayoutDemo.java`.\n\n**Listing\
    \ 6-1: LayoutDemo.java**\n\n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.Logger;\n\
    import org.apache.log4j.ConsoleAppender;\nimport org.apache.log4j.TTCCLayout;\n\
    import org.apache.log4j.NDC;\npublic class LayoutDemo\n{\n     private static\
    \ Logger logger =\nLogger.getLogger(LayoutDemo.class.getPackage().getName());\n\
    \    private ConsoleAppender appender = null;\n     private TTCCLayout layout\
    \ = null;\n\n/** Creates a new instance of LayoutDemo */\n     public LayoutDemo()\n\
    \     {\n         //set the parent additivity to false\n         logger.setAdditivity(false);\n\
    \n//initialize the layout\n         layout = new TTCCLayout(\"yyyy-MM-dd\");\n\
    \n//initialize the console appender with the layout\n         appender = new ConsoleAppender(layout,\"\
    System.out\");\n\n//adding the console appender to the logger\n         logger.addAppender(appender);\n\
    \     }\n\npublic void computeSquareRoot(double number)\n     {\n         NDC.push(new\
    \ Double(number).toString());\n         double sqrt = Math.sqrt(number);\n   \
    \      logger.info(\"The sqrt value: \"+sqrt);\n         NDC.pop();\n     }\n\n\
    public static void main(String args[])\n     {\n         LayoutDemo demo = new\
    \ LayoutDemo();\n         demo.computeSquareRoot(22);\n         demo.computeSquareRoot(44);\n\
    \     }\n}\n```\n\n| Note | Notice the use of `NDC.push()` in the beginning of\
    \ the `computeSquareRoot()` method and `NDC.pop()` before leaving the `computeSquareRoot()`\
    \ method. |\n\nExecuting this program will produce the following output to `System.out`\
    \ in a console:\n\n```\n2002-10-17 [main] INFO com.apress.logging.log4j 44.0 -\
    \ The sqrt value:\n6.6332495807108\n```\n\nThe output can be divided into the\
    \ parts described in [Table 6-3](#LiB0049.html#ch06table03).\n\n**Table 6-3: TTCCLayout\
    \ Formatting Structure**\n\n| Information | Meaning |\n| --- | --- |\n| `2002-10-17`\
    \ | The date of the logging activity (Time elapsed from the start of the application\
    \ can also be displayed.) |\n| `[main]` | The thread invoking the logging request\
    \ |\n| `INFO` | The logging level |\n| `com.apress.logging.log4j` | The name of\
    \ the logger |\n| `44.00` | The NDC value |\n| `-` | The separator |\n| `The sqrt\
    \ value`… | The logging message |\n\nAs is evident from the structure of the logging\
    \ information, `TTCCLayout` has seven constituents for the logging information\
    \ it publishes. The appearance of each constituent in the final logging information\
    \ depends on whether the information has been supplied as a part of the `LoggingEvent`\
    \ object to the `TTCCLayout` object. The `TTCCLayout` object controls the appearance\
    \ of the different parts of the logging messages through the bean properties listed\
    \ in [Table 6-4](#LiB0049.html#ch06table04).\n\n**Table 6-4: Bean Properties in\
    \ the TTCCLayout Class**\n\n| Bean Property | Method | Description | Default |\n\
    | --- | --- | --- | --- |\n| `categoryPrefixing` | `setCategoryPrefixing(boolean)`\
    \ | Specifies whether the name of the category or the logger should be a part\
    \ of the logging information | Defaults to `true` |\n| `contextPrinting` | `setContextPrinting(boolean)`\
    \ | Specifies whether the `NDC` should be a part of the logging information |\
    \ Defaults to `true` |\n| `threadPrinting` | `setThreadPrinting(boolean)` | Specifies\
    \ whether the thread information should be a part of the logging information |\
    \ Defaults to `true` |\n\nAs the `TTCCLayout` class is a direct subclass of `DateLayout`,\
    \ it also inherits the bean properties listed in [Table 6-5](#LiB0049.html#ch06table05)\
    \ from the `DateLayout` class.\n\n**Table 6-5: Bean Properties Inherited from\
    \ DateLayout**\n\n| Bean Property | Method | Description | Default |\n| --- |\
    \ --- | --- | --- |\n| `dateFormat` | `setDateFormat(String)` | Sets the date\
    \ format to be used in Java `SimpleDateFormat` style (e.g., `yyyy-MM-dd`) or one\
    \ of the strings NULL, RELATIVE, DATE, ABSOLUTE, or ISO8601 | Defaults to RELATIVE\
    \ |\n| `timeZone` | `setTimeZone(String)` | Time zone specified in the `java.util.TimeZone.getTimeZone(String)`\
    \ method (e.g., GMT-8:00) | Defaults to nothing |\n\nThe log4j `Layout` objects\
    \ can also be configured through configuration files by setting the bean property\
    \ values. For example, [Listing 6-2](#LiB0049.html#ch06ls02) demonstrates how\
    \ to use a configuration file, \"ttcc.properties\", in this example to re-create\
    \ the logger and layout configuration created programmatically in [Listing 6-1](#LiB0049.html#ch06ls01).\n\
    \n**Listing 6-2: ttcc.properties**\n\n```\n#configuring the root logger\nlog4j.rootLogger=DEBUG,\
    \ CONSOLE\n\n#configuring the named logger\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
    \ CONSOLE\n\n#configuring the appender CONSOLE\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\n\
    log4j.appender.CONSOLE.layout=org.apache.log4j.TTCCLayout\n```"
