  trans: '

    ### 配置选项对比


    与 log4j 不同，JDK 1.4 为日志记录 API 自带了一个默认配置文件。即使是应用程序开发者也无需定义任何自定义配置文件；JDK 1.4 日志记录
    API 会使用默认配置文件自行配置。然而，log4j 不会对日志记录环境做任何假设。如果在执行环境的类路径中未找到配置文件，log4j 将无法正确初始化。


    在配置选项方面，log4j 更加灵活，因为它同时支持属性样式和 XML 样式的配置。而 JDK 1.4 日志记录 API 仅支持属性样式的配置。


    此外，JDK 1.4 的配置是顺序相关的——也就是说，配置的顺序很重要。例如，请看以下配置顺序：


    ```

    a.b.level=SEVERE

    a.level=INFO

    ```


    你可能会惊讶地发现，日志记录器 `a.b` 将被分配其父日志记录器的级别 INFO。这是因为父日志记录器是在子日志记录器之后配置的，并且所有子日志记录器的配置都已根据父日志记录器的配置进行了更新。因此，在
    JDK 1.4 日志记录 API 中，子日志记录器的设置应出现在父日志记录器的设置之后。父日志记录器会更新其子日志记录器的设置。


    log4j 的配置与顺序无关。在 log4j 中，子日志记录器通过向上遍历层次结构，自动从其直接父日志记录器继承设置。


    ### 格式化器与布局对象对比


    两种日志记录 API 都提供了格式化待生成日志信息的机制。在 log4j 中，这些对象被称为 `Layout` 对象，而在 JDK 1.4 日志记录 API
    中，它们被称为 `Formatter` 对象。然而，JDK 1.4 日志记录 API 仅提供了两个 `Formatter` 对象：`SimpleFormatter`
    和 `XMLFormatter`。log4j API 则提供了大量的 `Layout` 对象，能够以多种格式（如 HTML、XML、文本等）格式化信息。log4j
    API 还提供了 `PatternLayout`，这是一种强大的机制，用于在最终的日志输出中包含或排除日志事件的不同部分。


    ### 处理器与附加器对象对比


    JDK 1.4 日志记录 API 提供了 `Handler` 对象，用于将日志信息发布到首选目标。类似地，log4j 提供了 `Appender` 对象来发布日志信息。目前，JDK
    1.4 日志记录 API 只能发布到控制台、文件、套接字和内存缓冲区。然而，log4j 为日志记录目标提供了更多选择。使用 log4j，我们可以将日志信息发布到各种目标，例如控制台、文件、数据库、JMS、NT
    事件日志、UNIX Syslog 等。


    当然，两种 API 都可以扩展，以提供任意数量的自定义 `Handler` 和 `Formatter` 对象，从而支持记录到任何其他特定于应用程序的目标。但默认情况下，log4j
    几乎涵盖了所有常用的日志记录目标。


    ### 过滤器对象对比


    JDK 1.4 日志记录 API 提供了将 `Filter` 对象附加到 `Logger` 和 `Handler` 对象的功能。借助 `Filter` 对象，可以对日志记录决策进行更精细的控制。JDK
    1.4 日志记录 API 只允许一个 `Filter` 对象与一个日志记录器关联。


    然而，在 log4j 中，`Filter` 对象只能附加到 `Appender` 对象上。但 log4j 的 `Filter` 对象提供了更强大的功能。正如我们在第
    8 章中讨论的，可以链接多个 `Filter` 对象来实现复杂的日志记录决策。我们还可以为特定的 `Appender` 对象配置多个 `Filter` 对象。JDK
    1.4 日志记录 API 在这些 `Filter` 对象特性方面有所欠缺。JDK 1.4 日志记录 API 中的 `Filter` 对象要么接受要么拒绝一个日志记录请求，但它不能忽略一个日志记录请求并将其委托给其他
    `Filter` 对象。因此，在 JDK 1.4 日志记录 API 中无法实现 `Filter` 链。


    ### 位置信息选项对比


    JDK 1.4 日志记录 API 和 log4j 都能够生成关于日志记录请求产生位置的信息。然而，生成位置信息在性能方面代价非常高。


    在 log4j 中，我们可以根据应用程序的需要启用或禁用位置信息。默认情况下，位置信息不是日志输出的一部分。我们可以通过在 `PatternLayout`
    对象中指定位置信息属性来启用它，如第 6 章所述。


    与 log4j 不同，JDK 1.4 日志记录 API 总是试图确定位置信息，并且这是无法避免的。此外，JDK 1.4 日志记录 API 用于动态生成位置信息的技术并非完全可靠。通常，这是通过分析应用程序的堆栈跟踪来完成的。但许多编译器采用不同的优化技术，这可能导致堆栈跟踪分析失败或产生错误信息。因此，应用程序开发者倾向于避免将位置信息作为日志输出的一部分。


    ### 错误处理对比


    JDK 1.4 日志记录 API 的主要缺点在于它会将 `RunTimeException` 抛回给应用程序中的调用类。如果这些异常未在应用程序内部得到处理，应用程序将会崩溃。如果应用程序崩溃是由于日志记录本身的问题而非应用程序自身的问题，这种情况尤其不受欢迎。


    然而，log4j API 在处理日志记录操作中产生的错误和异常方面更加优雅。log4j 中的所有 `Appender` 对象都有一个关联的 `ErrorHandler`
    对象。诸如 `OnlyOnceErrorHandler` 之类的 `ErrorHandler` 对象会在错误首次发生时向控制台输出一条消息，并忽略后续的错误。这使得即使日志记录出现问题，应用程序也能继续正常运行。可以通过分析控制台消息来检测日志记录功能的问题，然后最终予以纠正。


    此外，在 log4j 中，可以定义自定义的错误处理组件，这些组件可以执行各种操作来优雅地处理错误情况。这只需通过更改配置文件来使用任何 `ErrorHandler`
    对象即可实现，完全不需要更改代码。


    ## 结论


    至此，本书已接近尾声。我希望本书讨论的主题能为您提供关于两种最常用的基于 Java 的日志记录 API——JDK 1.4 日志记录 API 和 Apache
    log4j API——足够坚实的基础。两者都设计良好且易于使用。考虑到这两种 API 的现状，在我看来，log4j 略胜一筹。但同样，您并非总是需要如此复杂的日志记录机制。重要的是要理解，随着时间的推移，软件应用程序正变得越来越具有业务关键性。在这种背景下，具有更好可维护性和快速修复能力的应用程序将在市场中胜出。应用程序中精心规划的日志记录框架无疑将帮助其在竞争激烈的市场中占据优势。因此，现在是我们所有人重新考虑日志记录在应用程序中重要性的时候了。


    随着大量建议不断通过 Sun 和 Apache 的邮件列表针对各自的日志记录 API 提出，我们很快将看到这两种 API 的改进和新特性。无论这些新特性是什么，本书中介绍的基础知识将保持不变，我希望本书现在和将来都能对您有所帮助。


