  trans: "\n### 通过配置加载器从数据库读取配置信息\n\n在数据库表中定义了配置信息后，我们需要某种机制来读取这些信息。现在我们将开发一个小程序，用于从数据库中读取配置数据。该程序还会创建一个\
    \ `java.util.Properties` 对象，其中包含所有 log4j 配置信息的键和值，并将其返回给调用者。一旦数据被读取并加载到 `Properties`\
    \ 对象中，与数据库的连接就会被关闭。\n\n您可能会疑惑为什么需要将数据加载到 `Properties` 对象中。等我们看完这个示例，原因就会变得清晰。目前，您只需要知道我们想利用现有的\
    \ `org.apache.log4j.PropertyConfigurator` 类来完成实际的配置工作。`PropertyConfigurator` 类能够根据\
    \ `Properties` 对象来配置 log4j 框架。\n\n请注意，从数据库中检索配置数据的 SQL 语句是硬编码在 `DBConfigLoader`\
    \ 类中的。我们还通过引用表中的列名来检索数据。这样做是为了保持示例的简洁性；您可以随意改进这个程序，在任何您认为合适的地方修改其基础架构。\n\n清单 8-5\
    \ `DBConfigLoader.java` 是一个从数据库读取配置信息的示例实现。\n\n清单 8-5：DBConfigLoader.java\n\n\
    | **![示例开始](img/_1.gif)** |\n\n```\n package com.apress.logging.log4j;\n\nimport\
    \ java.util.Properties;\nimport java.sql.Connection;\nimport java.sql.DriverManager;\n\
    import java.sql.Statement;\nimport java.sql.ResultSet;\nimport java.sql.SQLException;\n\
    \npublic class DBConfigLoader\n{\n    private Connection conn = null;\n    private\
    \ String dbUrl = null;\n    private String dbDriver = null;\n    private String\
    \ dbUser = null;\n    private String dbPwd = null;\n\n/**\n     * 构造函数，初始化数据库访问参数\n\
    \     */\n    public DBConfigLoader()\n    {\n        this.setDbDriver(\"sun.jdbc.odbc.JdbcOdbcDriver\"\
    );\n        this.setDbUrl(\"jdbc:odbc:dbdef\");\n        this.setDbUser(\"system\"\
    );\n        this.setDbPwd(\"manager\");\n    }\n\n/**\n     * 设置数据库访问的驱动类\n  \
    \   */\n    private void setDriver()\n    {\n        try\n        {\n        \
    \    //加载驱动\n            Class.forName(dbDriver);\n        } catch (ClassNotFoundException\
    \ cnfe)\n        {\n            System.out.println(\"无法找到驱动类 \" +\ndbDriver);\n\
    \        }\n    }\n\n/**\n     * 获取数据库连接的方法\n     * @return Connection 对象\n  \
    \   * @throws SQLException\n     */\n    private Connection getConnection() throws\
    \ SQLException\n    {\n        System.out.println(\"连接参数: \");\n        System.out.println(\"\
    驱动: \" + dbDriver);\n        System.out.println(\"URL: \" + dbUrl);\n        System.out.println(\"\
