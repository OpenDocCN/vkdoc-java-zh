- fmt: "### Class-Based Configuration\n\nIn the JDK 1.4 logging API, the `LogManager`\
    \ class is capable of reading a configuration file located on the same machine.\
    \ But with this logging API, it is also possible to load the configuration information\
    \ located on a remote machine from any data source such as a file or database.\
    \ In order to do that, we need a custom configuration class that is responsible\
    \ for reading configuration information from the relevant data source and populating\
    \ the configuration parameters required by the logging framework. It is important\
    \ to note that the configuration class specified is only loaded and instantiated\
    \ by the `LogManager` without attempting to invoke any other method in the configuration\
    \ class. Hence, all the initialization work needs to be completed within the scope\
    \ of class instantiation only.\n\nIf we want to defer the initialization to any\
    \ other method of the configuration class, we have to override the `LogManager`\
    \ functionality to invoke the method after the instantiation of the configuration\
    \ class. Note that this is quite unnecessary and possibly overkill, as we tend\
    \ to perform the initialization operation within the constructor of the configuration\
    \ class only. To use a custom configuration class, we can pass the name of the\
    \ configuration class as a system property in the command line as follows:\n\n\
    ```\njava -Djava.util.logging.config.class=MyClass\n```\n\nwhere `myClass` is\
    \ the class responsible for reading the configuration information from the relevant\
    \ data source. For example, let's assume that the configuration file is situated\
    \ in a remote location—http://www.XYZ.com/config.properties.\n\n[Listing 4-1](#LiB0027.html#ch04ls01),\
    \ `RemoteConfigReader.java`, is a sample program that will read configuration\
    \ information from the remote location over HTTP and populate the initialization\
    \ parameters of the `LogManager` class.\n\n**Listing 4-1: RemoteConfigReader.java**\n\
    \n```\npackage sam.logging.config;\n\nimport java.util.logging.LogManager;\nimport\
    \ java.net.URL;\nimport java.net.URLConnection;\nimport java.net.MalformedURLException;\n\
    import java.io.InputStream;\nimport java.io.IOException;\n\npublic class RemoteConfigReader\n\
    {\n private String urlString = \"http://www.xyz.com/config.properties\";\n private\
    \ URL url = null;\n private URLConnection urlConn = null;\n private InputStream\
    \ inStream = null;\n private LogManager manager = null;\n /**\n  * The constructor\
    \ obtains a connection to the URL specified in the\n  * urlString object, obtains\
    \ an InputStream on the URL and\n  * calls the readConfiguration(InputStream)\
    \ of the LogManager class\n  * to perform the initialization\n  */\n public RemoteConfigReader()\n\
    \ {\n  try\n  {\n   url = new URL(urlString);\n   urlConn = url.openConnection();\n\
    \   inStream = urlConn.getInputStream();\n   manager = LogManager.getLogManager();\n\
    \   manager.readConfiguration(inStream);\n  }catch(MalformedURLException mue)\n\
    \  {\n   System.out.println(\"could not open url: \"+urlString);\n  }catch(IOException\
    \ ioe)\n  {\n   System.out.println(\"IOException occured in reading: \"+urlString);\n\
    \  }catch(SecurityException se)\n  {\n   System.out.println(\"Security exception\
    \ occured in\n   class RemoteConfigLoader\");\n  }\n }\n}\n```\n\nThis class is\
    \ a simple one that constructs a `URL` object out of the `urlString` specifying\
    \ the location of the remote configuration file. It opens a `java.net.URLConnection`\
    \ object to the remote location and obtains a `java.io.InputStream` object from\
    \ the `URLConnection` object. It then passes the `InputStream` object to the `readConfiguration(InputStream)`\
    \ method of the `LogManager` class to perform the initialization.\n\nThe `config.properties`\
    \ file located in the remote location http://www.XYZ.com/config.properties defines\
    \ the level of the `ConsoleHandler` class as `Level.WARNING`. Assume that the\
    \ configuration file has a line like this:\n\n```\njava.util.logging.ConsoleHandler.level\
    \ = WARNING\n```\n\nThe `LogManager` will be initialized with the preceding property.\
    \ Now start up an application with the system property `java.util.logging.config.class`\
    \ set as `sam.logging.config.RemoteConfigReader` and print the `level` property\
    \ of the `java.util.logging.ConsoleHandler` class as follows:\n\n```\npublic class\
    \ RemoteLoaderTest\n{\n    public static void main(String args[])\n    {\n   \
    \     LogManager manager = LogManager.getLogManager();\n        String level =\n\
    \        manager.getProperty(\"java.util.logging.ConsoleHandler.level\");\n  \
    \      System.out.println(\"The ConsoleHandler level: \"+level);\n    }\n}\n```\n\
    \nIf we run the previous program with the following command:\n\n```\njava -Djava.util.logging.config.class=sam.logging.config.RemoteConfigReader\n\
    \ RemoteLoaderTest\n```\n\nwe will see the level being printed as `WARNING`. This\
    \ shows that the initialization parameters are obtained from the remote HTTP location\
    \ instead of the default JDK location.\n\n## Writing Custom Handlers\n\nThe default\
    \ `Handler` objects provided by the JDK 1.4 logging API are capable of printing\
    \ information in a console, to a file, to any stream, and to a socket. In most\
    \ applications, logging activity is directed to one of these destinations. But\
    \ in complex applications, sometimes logging activity demands more than the capabilities\
    \ of the default `Handler` objects provided with the API.\n\nImagine a situation\
    \ where you are doing some distributed computing, and logging information is required\
    \ to be sent to a remote location to be logged. In such situations, you may want\
    \ to pass logging information to the remote location using Java RMI. But this\
    \ mandates that the object that encapsulates the logging information must be `serializable`\
    \ in order to be transferred over RMI. Within the JDK 1.4 logging API, the only\
    \ object that is `serializable` is the `LogRecord` object. Thus, one solution\
    \ is to use the `LogRecord` object and serialize it to some Java RMI component\
    \ every time you are interested in logging some information. This can easily become\
    \ a big pain in the process of application development and can shift the focus\
    \ to writing code for logging activity rather than concentrating on application\
    \ coding.\n\nIn such scenarios, often it is advised to develop a custom `Handler`\
    \ object to cater to such needs. We can then just associate the custom `Handler`\
    \ object to the obtained `Logger` objects and continue performing the normal logging\
    \ activity without being worried about the underlying RMI implementation of the\
    \ logging. In complex application scenarios, developing a custom `Handler` object\
    \ can be worth the time spent and often is a good design practice.\n\nWriting\
    \ a custom `Handler` object can be a fairly simple task depending on what we want\
    \ the `Handler` to do with the given `LogRecord` object. In essence, we just need\
    \ to inherit the `abstract Handler` class and override the `abstract` methods\
    \ defined in the `Handler` base class.\n\nIn JDK 1.4 logging API, the methods\
    \ discussed next are declared `abstract` in the `Handler` base class.\n\nThe following\
    \ method does the bulk of the work of publishing the logging information encapsulated\
    \ within the `LogRecord` object to the destination defined within the `Handler`\
    \ object:\n\n```\npublic abstract void publish(LogRecord record)\n```\n\nThis\
    \ next method closes the `Handler` and frees all the acquired resources:\n\n```\n\
    public abstract void close()\n```\n\nThe following method flushes any buffered\
    \ output in any associated stream with the `Handler` object:\n\n```\npublic abstract\
    \ void flush()\n```\n\nThe custom `Handler` class can inherit all other methods\
    \ from the base `Handler` class.\n\n> **Note:** It is important to emphasize that\
    \ several methods in the base `Handler` class are implemented as `synchronized`\
    \ to make the `Handler` thread-safe. The overridden `publish()` method has to\
    \ be specially `synchronized` in order to avoid multiple threads acting on the\
    \ method at the same time, which might lead to a disordered sequence of messages\
    \ being published."
