  trans: "\n## 基于文件的配置\n\n在前几节的示例中，我们已经了解了如何通过不同对象中可用的方法，以编程方式配置 JDK 1.4 日志记录 API。然而，编程式配置并不灵活。每当您决定更改配置（例如特定日志记录器的级别）时，都需要返回源代码并进行必要的修改。\n\
    \nJDK 1.4 日志记录 API 支持通过配置文件进行配置。该配置文件支持以键值对格式定义配置参数。例如，回顾清单 2-9 中的示例 `SocketHandlerDemo.java`。我们可以通过在配置文件中定义所需的配置，重写该程序，而无需在程序内为\
    \ `Logger` 提供任何配置。\n\n清单 2-14 中的 `ConfigDemo.java` 重写了 `SocketHandlerDemo`，但移除了配置代码。\n\
    \n清单 2-14：ConfigDemo.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\n package sam.logging;\n\
    \nimport java.util.logging.Logger;\nimport java.util.logging.SocketHandler;\n\n\
    public class ConfigDemo\n{\n    private static Logger logger = Logger.getLogger(\"\
    sam.logging\");\n    public ConfigDemo()\n    {\n        try\n        {\n    \
    \        logger.addHandler(new SocketHandler());\n        }catch(Exception e)\n\
    \        {\n            e.printStackTrace();\n        }\n    }\n    /**\n    \
    \ * This method logs the logging information\n     */\n    public void logMessage()\n\
    \    {\n        logger.warning(\"SocketHandler is working...\");\n    }\n\n  \
    \  public static void main(String args[]) {\n        //creating a SocketHandlerDemo\
    \ with localhost and 2020 port\n        ConfigDemo demo = new ConfigDemo();\n\
    \        demo.logMessage();\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n\
    |  |\n\n现在我们可以创建一个配置文件，与 `ConfigDemo` 配合使用。清单 2-15 中的 \"config.properties\" 是一个示例配置文件。\n\
    \n清单 2-15：config.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\n #define the\
    \ logger level\nsam.logging.level=INFO\n\n#define the properties for the SocketHandler\n\
    java.util.logging.SocketHandler.level=INFO\njava.util.logging.SocketHandler.host=localhost\n\
    java.util.logging.SocketHandler.port=2020\n```\n\n| **![结束示例](img/_1.gif)** |\n\
    \n|  |\n\n请注意，我们在配置文件中（而非应用程序中）为 `SocketHandler` 定义了主机、端口和级别配置。这使我们能够在不更改源代码的情况下更改任何配置。\n\
    \n使用以下命令执行清单 2-14 中的程序：\n\n```\njava -Djava.util.logging.config.file=config.properties\
    \ sam.logging.ConfigDemo\n```\n\n按照清单 2-10 示例中的说明运行服务器程序后，我们将在服务器的控制台上看到以下 XML\
    \ 格式的输出：\n\n```\n<?xml version=\"1.0\" encoding=\"windows-1252\" standalone=\"\
    no\"?>\n<!DOCTYPE log SYSTEM \"logger.dtd\">\n<log>\n<record>\n  <date>2002-12-22T15:47:22</date>\n\
    \  <millis>1040572042929</millis>\n  <sequence>0</sequence>\n  <logger>sam.logging</logger>\n\
    \  <level>WARNING</level>\n  <class>sam.logging.ConfigDemo</class>\n  <method>logMessage</method>\n\
    \  <thread>10</thread>\n  <message>SocketHandler is working...</message>\n</record>\n\
    </log>\n```\n\n开个玩笑，让我们通过添加以下行来更改配置文件，以便在 `SocketHandler` 中使用 `SimpleFormatter`：\n\
    \n```\njava.util.logging.SocketHandler.formatter=java.util.logging.SimpleFormatter\n\
    ```\n\n我们将看到以下输出：\n\n```\n22-Dec-2002 15:59:49 sam.logging.ConfigDemo logMessage\n\
    WARNING: SocketHandler is working...\n```\n\n这就是通过配置文件指定配置的优势所在。我们将在第 4 章中更详细地讨论配置。\n\
    \n## 格式化器对象\n\n`Handler` 对象能够过滤日志记录请求并将其打印到不同的目标位置。在最终打印日志信息之前，`Handler` 对象会使用\
    \ `Formatter` 对象将日志信息转换为不同的人类可读表示形式。`Formatter` 对象有助于以对应用程序有用的任何格式样式来组织数据。以结构良好且有意义的方式呈现日志信息也至关重要，以便用于未来的分析。我们将在第\
    \ 3 章中详细讨论 `Formatter` 对象。\n\n## 结论\n\n在本章中，我们研究了 JDK 1.4 日志记录 API 中的各种对象。我们讨论了框架中不同对象如何相互交互。我们还看到了每个对象的使用示例。现在，您应该对日志记录\
    \ API 的工作原理有了适当的理解。在下一章中，我们将探讨 API 中可用的 `Formatter` 对象所使用的不同格式化样式，并开发我们自己的自定义\
    \ `Formatter` 对象。\n\n# 第 3 章：格式化 JDK 1.4 日志信息\n\nJDK 1.4 日志记录 API 的目标是提供一种在适当的详细级别封装日志信息的方法。在上一章中，我们探讨了用于捕获日志信息的各种对象，如何告知日志记录\
    \ API 应执行的日志记录活动的详细级别，以及如何在运行时更改并向 API 传递不同的配置参数以控制日志信息。然而，任何日志记录机制的另一个重要方面是日志的生成和维护方式。对于应用程序来说，构建和生成可供后续分析和处理的日志信息至关重要。为了实现日志记录的这方面功能，必须能够以不同格式生成日志信息。JDK\
    \ 1.4 日志记录 API 提供了两种基本机制来生成人类可读且适用于任何未来处理的日志信息。完成以不同格式生成日志信息任务的对象称为 `Formatter`\
    \ 对象。在本章中，我们将研究 API 中提供的默认 `Formatter` 对象，并探讨如何编写新的 `Formatter` 对象。\n"
- fmt: "# Default Formatter Objects\n\nIt is important you have an understanding of\
    \ the architecture of the JDK 1.4 logging API before we discuss `Formatter` objects\
    \ in detail, so let's briefly review it. We have seen in the [previous chapter](#LiB0012_split_000.html#44)\
    \ that the central point of the framework is the `Logger` object. The `Logger`\
    \ object internally creates a `LogRecord` object. The `LogRecord` object encapsulates\
    \ the logging information. The `Logger` object has an associated `Handler` object,\
    \ which manages the distribution of log messages. Each `Handler` object will have\
    \ a `Formatter` object associated with it that is responsible for formatting the\
    \ log messages with appropriate formatting styles. If a `Formatter` is not explicitly\
    \ specified with the `Handler` object, it uses the default `Formatter` object\
    \ associated with the respective `Handler` objects or any other `Formatter` object\
    \ associated with the parent `Handler` object.\n\n[Figure 3-1](#LiB0022_split_001.html#ch03fig01)\
    \ depicts the collaboration of different objects within the logging framework.\n\
    \n[![Click To expand](fig3-1.jpg)](fig3-1_0.jpg)\nFigure 3-1: The sequence diagram\
    \ of the JDK 1.4 logging objects\n\nApart from producing log messages in different\
    \ structures, the `Formatter` objects are also responsible for localization of\
    \ data. The localization of logging information is performed by attaching a `java.util.ResourceBundle`\
    \ object to the `LogRecord` object. `Formatter` objects use the `ResourceBundle`\
    \ associated with each `LogRecord` object, and the bulk of the formatting and\
    \ localization work is done within the `formatMessage()` method of the `Formatter`\
    \ object. Most of the logger methods use a message string as a parameter. This\
    \ message parameter can also represent the localization key. If the `LogRecord`\
    \ object has a `ResourceBundle` associated with it, and the `ResourceBundle` has\
    \ a mapping for the message string, the message string is replaced by the localized\
    \ values. If no mapping is found in the `ResourceBundle`, then the message string\
    \ itself is used as the output message.\n\n`Formatter` objects typically use the\
    \ `java.text.MessageFormat` style of formatting. A `Formatter` object first tries\
    \ to locate the specified `ResourceBundle` objects with the active thread's `ContextClassLoader`.\
    \ If the `ContextClassLoader` is `null`, then it tries to locate the `ResourceBundle`\
    \ with the `SystemClassLoader`. We will see how to develop a localization example\
    \ later in this chapter.\n\nThere are two types of `Formatter` objects defined\
    \ in the JDK 1.4 logging API:\n\n*   `java.util.logging.SimpleFormatter`: This\
    \ produces a brief, human-readable summary of the logging information.\n*   `java.util.logging.XMLFormatter`:\
    \ This produces logging information in a structured XML format.\n\n[Figure 3-2](#LiB0022_split_001.html#ch03fig02)\
    \ shows the class hierarchy of the two default `Formatter` objects in the JDK\
    \ 1.4 logging API.\n\n[![Click To expand](fig3-2.jpg)](fig3-2_0.jpg)\nFigure 3-2:\
    \ The class hierachy of the `Formatter` objects in the JDK 1.4 logging API\n\n\
    We will discuss these in more detail in the following sections.\n\n## SimpleFormatter\
    \ Object\n\nThe `SimpleFormatter` class represents the simplest way of presenting\
    \ logging information in a human-readable format. It produces the output in one\
    \ or two lines of information. [Listing 3-1](#LiB0022_split_001.html#ch03ls01),\
    \ `BasicLogging.java`, is a simple program intended to produce very basic logging\
    \ information.\n\nListing 3-1: `BasicLogging.java`\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\npackage sam.logging;\nimport java.util.logging.*;\n\npublic class\
    \ BasicLogging\n{\n\n public static void main(String args[])\n {\n   Logger logger\
    \ = Logger.getLogger(\"current.package\");\n   logger.info(\"Simple formatted\
    \ message..\");\n }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nExecuting\
    \ this program will produce the following output in the console—an example of\
    \ a log message following the `SimpleFormatter` pattern:\n\n```\n12-Aug-2002 21:16:23\
    \ sam.logging.BasicLogging main\nINFO: Simple formatted message..\n```\n\nThe\
    \ first line shows the date and timestamp of the logging activity, and the fully\
    \ qualified name of the class and name of the method from which the logging was\
    \ posted. The second line shows the logging level and the logging message. The\
    \ structure of the information is divided into the segments displayed in [Table\
    \ 3-1](#LiB0022_split_001.html#ch03table01).\n\nTable 3-1: Message Structure with\
    \ `SimpleFormatter`\n\n| Timestamp | Class Name | Method Name | Level and Message\
    \ |\n| --- | --- | --- | --- |\n| `12-Aug-2002 22:51:50` | `sam.logging.BasicLogging`\
    \ | `main` | `INFO: Simple formatted message` |\n\nThe `SimpleFormatter` class\
    \ extends the `abstract Formatter` class and provides an implementation for the\
    \ `abstract String format(LogRecord record)` method. It formats the given `LogRecord`\
    \ object and returns the formatted string. The implementation of the `format()`\
    \ method in the `SimpleFormatter` class is `synchronized`. The `format()` method\
    \ internally uses a `StringBuffer` object to construct and format log messages.\
    \ The construction of the `StringBuffer` is kept thread-safe by declaring this\
    \ method as `synchronized`. The `SimpleFormatter` obtains the runtime information\
    \ about the source class and the source method from which the logging is invoked\
    \ by calling the `getSourceClassName()` and `getSourceMethodName()` methods respectively\
    \ on the `LogRecord` object and includes these in the logging information to be\
    \ produced. This object uses the `java.text.MessageFormat` style to output the\
    \ logging messages.\n\nThe formatting style of the `SimpleFormatter` object is\
    \ particularly useful for outputting logging messages to a console or a separate\
    \ logging application such as a logger window, in which we might want to show\
    \ some very basic logging information. If an application is particularly interested\
    \ in tracing the control of the program flow by logging different method entries\
    \ and exits, then `SimpleFormatter` is the most suitable formatter. We are most\
    \ likely to use a `SimpleFormatter` object with any `Handler` object intended\
    \ to produce logging output to a console. The `ConsoleHandler` provided within\
    \ the JDK 1.4 logging API uses the `SimpleFormatter` object to output logging\
    \ information to consoles. It is possible to change the formatting style associated\
    \ with a `SimpleFormatter` object by extending the class and overriding the `format()`\
    \ method of the class."
