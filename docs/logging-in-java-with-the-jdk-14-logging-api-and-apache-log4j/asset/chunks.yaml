  trans: "\n### 基于类的配置\n\n在 JDK 1.4 日志 API 中，`LogManager` 类能够读取位于本机上的配置文件。但借助此日志 API，也可以从任何数据源（如文件或数据库）加载位于远程机器上的配置信息。为此，我们需要一个自定义配置类，负责从相关数据源读取配置信息，并填充日志框架所需的配置参数。需要注意的是，指定的配置类仅由\
    \ `LogManager` 加载和实例化，而不会尝试调用配置类中的任何其他方法。因此，所有初始化工作都必须在类实例化的范围内完成。\n\n如果我们希望将初始化推迟到配置类的其他方法中执行，则必须重写\
    \ `LogManager` 的功能，以便在配置类实例化后调用该方法。请注意，这完全没有必要，甚至可能有些过度设计，因为我们通常只在配置类的构造函数中执行初始化操作。要使用自定义配置类，可以在命令行中将其名称作为系统属性传递，如下所示：\n\
    \n```\njava -Djava.util.logging.config.class=MyClass\n```\n\n其中 `myClass` 是负责从相关数据源读取配置信息的类。例如，假设配置文件位于远程位置——http://www.XYZ.com/config.properties。\n\
    \n清单 4-1 `RemoteConfigReader.java` 是一个示例程序，它将通过 HTTP 从远程位置读取配置信息，并填充 `LogManager`\
    \ 类的初始化参数。\n\n清单 4-1：RemoteConfigReader.java\n\n| **![开始示例](img/_1.gif)** |\n\n\
    ```\npackage sam.logging.config;\n\nimport java.util.logging.LogManager;\nimport\
    \ java.net.URL;\nimport java.net.URLConnection;\nimport java.net.MalformedURLException;\n\
    import java.io.InputStream;\nimport java.io.IOException;\n\npublic class RemoteConfigReader\n\
    {\n private String urlString = \"http://www.xyz.com/config.properties\";\n private\
    \ URL url = null;\n private URLConnection urlConn = null;\n private InputStream\
    \ inStream = null;\n private LogManager manager = null;\n /**\n  * 构造函数获取与 urlString\
    \ 对象中指定 URL 的连接，\n  * 获取该 URL 上的 InputStream，\n  * 并调用 LogManager 类的 readConfiguration(InputStream)\
    \ 方法执行初始化\n  */\n public RemoteConfigReader()\n {\n  try\n  {\n   url = new URL(urlString);\n\
    \   urlConn = url.openConnection();\n   inStream = urlConn.getInputStream();\n\
    \   manager = LogManager.getLogManager();\n   manager.readConfiguration(inStream);\n\
    \  }catch(MalformedURLException mue)\n  {\n   System.out.println(\"无法打开 URL: \"\
    +urlString);\n  }catch(IOException ioe)\n  {\n   System.out.println(\"读取时发生 IOException:\
    \ \"+urlString);\n  }catch(SecurityException se)\n  {\n   System.out.println(\"\
    类 RemoteConfigLoader 中发生安全异常\");\n  }\n }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n这个类很简单，它根据指定远程配置文件位置的 `urlString` 构造一个 `URL` 对象。它打开一个指向远程位置的 `java.net.URLConnection`\
    \ 对象，并从该 `URLConnection` 对象获取一个 `java.io.InputStream` 对象。然后，它将 `InputStream` 对象传递给\
    \ `LogManager` 类的 `readConfiguration(InputStream)` 方法以执行初始化。\n\n位于远程位置 http://www.XYZ.com/config.properties\
    \ 的 `config.properties` 文件将 `ConsoleHandler` 类的级别定义为 Level.WARNING。假设配置文件中有这样一行：\n\
    \n```\njava.util.logging.ConsoleHandler.level = WARNING\n```\n\n`LogManager` 将使用上述属性进行初始化。现在，启动一个应用程序，将系统属性\
    \ `java.util.logging.config.class` 设置为 `sam.logging.config.RemoteConfigReader`，并打印\
    \ `java.util.logging.ConsoleHandler` 类的 `level` 属性，如下所示：\n\n```\npublic class\
    \ RemoteLoaderTest\n{\n    public static void main(String args[])\n    {\n   \
    \     LogManager manager = LogManager.getLogManager();\n        String level =\n\
    \        manager.getProperty(\"java.util.logging.ConsoleHandler.level\");\n  \
    \      System.out.println(\"ConsoleHandler 级别: \"+level);\n    }\n}\n```\n\n如果我们使用以下命令运行上述程序：\n\
    \n```\njava -Djava.util.logging.config.class=sam.logging.config.RemoteConfigReader\n\
    \ RemoteLoaderTest\n```\n\n我们将看到打印出的级别为 WARNING。这表明初始化参数是从远程 HTTP 位置获取的，而不是默认的\
    \ JDK 位置。\n\n## 编写自定义处理器\n\nJDK 1.4 日志 API 提供的默认 `Handler` 对象能够将信息打印到控制台、文件、任何流以及套接字。在大多数应用程序中，日志活动都定向到这些目标之一。但在复杂的应用程序中，有时日志活动的要求超出了\
    \ API 提供的默认 `Handler` 对象的能力。\n\n想象一个场景：你正在进行一些分布式计算，需要将日志信息发送到远程位置进行记录。在这种情况下，你可能希望使用\
    \ Java RMI 将日志信息传递到远程位置。但这要求封装日志信息的对象必须是 `可序列化` 的，以便通过 RMI 传输。在 JDK 1.4 日志 API\
    \ 中，唯一 `可序列化` 的对象是 `LogRecord` 对象。因此，一种解决方案是每次需要记录某些信息时，使用 `LogRecord` 对象并将其序列化到某个\
    \ Java RMI 组件。这在应用程序开发过程中很容易成为一个大麻烦，并可能将重点转移到编写日志活动的代码上，而不是专注于应用程序编码。\n\n在这种情况下，通常建议开发一个自定义的\
    \ `Handler` 对象来满足此类需求。然后，我们可以将自定义的 `Handler` 对象关联到获取的 `Logger` 对象，并继续执行正常的日志活动，而无需担心底层的\
    \ RMI 日志实现。在复杂的应用程序场景中，开发一个自定义的 `Handler` 对象是值得投入时间的，并且通常是一种良好的设计实践。\n\n编写自定义的\
    \ `Handler` 对象可能是一项相当简单的任务，具体取决于我们希望 `Handler` 对给定的 `LogRecord` 对象执行什么操作。本质上，我们只需要继承\
    \ `abstract Handler` 类并重写 `Handler` 基类中定义的 `abstract` 方法。\n\n在 JDK 1.4 日志 API\
    \ 中，接下来讨论的方法在 `Handler` 基类中被声明为 `abstract`。\n\n以下方法完成了将 `LogRecord` 对象中封装的日志信息发布到\
    \ `Handler` 对象内定义的目标的主要工作：\n\n```\npublic abstract void publish(LogRecord record)\n\
    ```\n\n下一个方法关闭 `Handler` 并释放所有获取的资源：\n\n```\npublic abstract void close()\n```\n\
    \n以下方法刷新与 `Handler` 对象关联的任何流中的缓冲输出：\n\n```\npublic abstract void flush()\n```\n\
    \n自定义的 `Handler` 类可以继承基类 `Handler` 中的所有其他方法。\n\n|  | 注意  | 需要强调的是，基类 `Handler`\
    \ 中的几个方法被实现为 `synchronized`，以使 `Handler` 线程安全。重写的 `publish()` 方法必须特别使用 `synchronized`，以避免多个线程同时操作该方法，这可能导致发布的消息序列混乱。\
    \ |\n"
- fmt: "### Custom Window Handler\n\nImagine you want to create an application that\
    \ can print all its logging messages to a small window. In order to achieve this,\
    \ we will see how to develop a custom `Handler` object in this section. [Listing\
    \ 4-2](#LiB0028.html#ch04ls02), `LogWindow.java`, is a sample program that creates\
    \ a small Java window to display logging information. It uses a `javax.swing.JFrame`\
    \ object, and displays the messages to an attached `javax.swing.JTextArea` object.\n\
    \n**Listing 4-2: LogWindow.java**\n\n```\npackage sam.logging.handler;\n\nimport\
    \ javax.swing.JFrame;\nimport javax.swing.JTextArea;\nimport javax.swing.JScrollPane;\n\
    \npublic class LogWindow extends JFrame\n{\n private int width;\n private int\
    \ height;\n private JTextArea textArea = null;\n private JScrollPane pane = null;\n\
    \npublic LogWindow(String title, int width, int height)\n {\n  super(title);\n\
    \  setSize(width, height);\n  textArea = new JTextArea();\n  pane = new JScrollPane(textArea);\n\
    \  getContentPane().add(pane);\n  setVisible(true);\n }\n /**\n  * This method\
    \ appends the data to the text area.\n  *@param data the Logging information data\n\
    \  */\n public void showInfo(String data)\n {\n  textArea.append(data);\n  this.getContentPane().validate();\n\
    \ }\n}\n```\n\nThe `LogWindow` is a simple component extending the `javax.swing.JFrame`\
    \ class. It defines the `title` and the `dimension` of the frame through the constructor.\
    \ It also defines a `javax.swing.JScrollPane` instance that contains a `javax.swing.JTextArea`\
    \ object. The logging information will be contained in the defined `JTextArea`.\
    \ The `showInfo()` method takes the logging information as a `String` parameter\
    \ and appends it to the existing data within the `JTextArea`. The content pane\
    \ of the frame is validated after each piece of data is written.\n\nWith this\
    \ simple output device in place, we will now see how to develop a `WindowHandler`\
    \ class that will print the logging information to the `LogWindow`. [Listing 4-3](#LiB0028.html#ch04ls03),\
    \ `WindowHandler.java`, is a custom `Handler` object that uses the logging window\
    \ and prints logging information to that window.\n\n**Listing 4-3: WindowHandler.java**\n\
    \n```\npackage sam.logging.handler;\n\nimport java.util.logging.*;\n\npublic class\
    \ WindowHandler extends Handler\n{\n //the window to which the logging is done\n\
    \ private LogWindow window = null;\n private Formatter formatter = null;\n private\
    \ Level level = null;\n //the singleton instance\n private static WindowHandler\
    \ handler = null;\n\n/**\n  * private constructor, preventing initialization\n\
    \  */\n private WindowHandler()\n {\n  configure();\n  if(window == null)\n  \
    \ window = new LogWindow(\"Logging window\",500,200);\n }\n /**\n  * The getInstance\
    \ method returns the singleton instance of the\n     * WindowHandler object\n\
    \  * It is synchronized to prevent two threads trying to create an\n     * instance\
    \ simultaneously.\n  * @ return WindowHandler object\n  */\n\npublic static synchronized\
    \ WindowHandler getInstance()\n {\n\nif(handler == null)\n  {\n   handler = new\
    \ WindowHandler();\n  }\n  return handler;\n }\n /**\n  * This method loads the\
    \ configuration properties from the\n       *JDK level configuration\n  * file\
    \ with the help of the LogManager class. It then\n       * sets its level, filter\
    \ and formatter\n  * properties.\n  */\n private void configure()\n {\n  LogManager\
    \ manager = LogManager.getLogManager();\n  String className = this.getClass().getName();\n\
    \  String level = manager.getProperty(className+\".level\");\n  String filter\
    \ = manager.getProperty(className+\".filter\");\n  String formatter =\nmanager.getProperty(className+\"\
    .formatter\");\n\n//accessing super class methods to set the parameters\n  setLevel(level\
    \ !=null ? Level.parse(level):Level.INFO);\n  setFilter(makeFilter(filter));\n\
    \  setFormatter(makeFormatter(formatter));\n\n}\n /**\n  * private method constructing\
    \ a Filter object with the filter name.\n  *@param filterName the name of the\
    \ filter\n  *@return the Filter object\n  */\n private Filter makeFilter(String\
    \ filterName)\n {\n  Class c = null;\n  Filter f = null;\n   try\n   {\n    c\
    \ = Class.forName(filterName);\n    f = (Filter)c.newInstance();\n   }catch(Exception\
    \ e)\n   {\n    System.out.println(\"There was a problem to load the\nfilter class:\
    \ \"+filterName);\n   }\n   return f;\n  }\n  /**\n   *private method creating\
    \ a Formatter object with the\n         * formatter name. If no name is\n   *specified,\
    \ it returns a SimpleFormatter object\n   *@param formatterName the name of the\
    \ formatter\n   *@return Formatter object\n   */\n  private Formatter makeFormatter(String\
    \ formatterName)\n  {\n   Class c = null;\n   Formatter f = null;\n\ntry\n   {\n\
    \    c = Class.forName(formatterName);\n    f = (Formatter)c.newInstance();\n\
    \   }catch(Exception e)\n   {\n    f = new SimpleFormatter();\n   }\n   return\
    \ f;\n  }\n  /**\n   *This is the overridden publish method of the abstract\n\
    \      * super class Handler.\n   * This method writes the logging information\
    \ to the\n      * associated Java window.\n   *This method is synchronized to\
    \ make it thread-safe. In case\n      * there is a problem,\n   * it reports the\
    \ problem with the ErrorManager, only once and\n      * silently ignores the others.\n\
    \   *@record the LogRecord object\n   *\n   */\n  public synchronized void publish(LogRecord\
    \ record)\n  {\n   String message = null;\n   //check if the record is loggable\n\
    \   if( !isLoggable(record))\n    return;\n   try\n   {\n    message = getFormatter().format(record);\n\
    \   }catch(Exception e)\n   {\n    reportError(null, e, ErrorManager.FORMAT_FAILURE);\n\
    \   }\n\ntry\n   {\n    window.showInfo(message);\n   }catch(Exception ex)\n \
    \  {\n    reportError(null, ex, ErrorManager.WRITE_FAILURE);\n   }\n\n}\n\npublic\
    \ void close()\n  {\n  }\n\npublic void flush()\n  {\n  }\n}\n```\n\nFollowing\
    \ the steps to write a custom `Handler` object, as described previously, the `WindowHandler`\
    \ class extends the `java.util.logging.Handler` class and overrides the `abstract`\
    \ methods. Notably, it has defined the `publish()` method as `synchronized` to\
    \ make the logging thread-safe. The design and implementation of the `WindowHandler`\
    \ object is guided by the following factors:\n\n- It uses the `LogWindow` object\
    \ instance to publish the message.\n- We need one and only one instance of the\
    \ `LogWindow` to be active in the application context. Hence, before creating\
    \ an instance of the `LogWindow`, the `WindowHandler` object checks if the `LogWindow`\
    \ instance is `null`.\n- The instantiation of the `LogWindow` class is performed\
    \ in the constructor of the `WindowHandler`. So with every instance creation,\
    \ there is a chance that a separate instance of the `LogWindow` is created; this\
    \ could result in the problem of having several `LogWindow` instances being alive\
    \ within the application lifetime, which will end up showing multiple logging\
    \ windows.\n- To avoid this problem, we make the `WindowHandler` object a singleton.\
    \ Thus, in one application context, one and only instance of the `WindowHandler`\
    \ object is available.\n- Since the `publish()` method is `synchronized`, we safely\
    \ avoid the risk of wrongly sequenced messages being published.\n- The alternative\
    \ could be to make the `LogWindow` instance a singleton. This might prove inadequate\
    \ in cases where we decide to create two `LogWindow` instances to display messages\
    \ from two different `Handler`s, which require the same functionality of displaying\
    \ logging information in a window-based output screen.\n\n> **Note:** A singleton\
    \ instance means only one instance of the class in question is available per JVM\
    \ instance. Thus, only one instance of the `WindowHandler` will be available per\
    \ JVM instance."
