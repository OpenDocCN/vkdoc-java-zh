    \ |\n\n```\n<html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\"\
    \ prefix=\"log\" %>\n<BODY>\n<h1>测试日志标签库</h1>\n<log:trace>Trace 级别消息。</log:trace>\n\
    您现在应该在调试日志中看到输出。\n</BODY>\n</html>\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
    \n执行此 JSP 将在 Web 服务器控制台中产生以下带有 TRACE 级别的消息：\n\n```\nTRACE [Thread-11] (LoggerTag.java:109)\
    \ - Trace 级别消息。\n```\n\n## 结论\n\n在本章中，我们讨论了 Apache 新发布的标签库 `Log`，用于在 JSP 中使用 log4j\
    \ 执行日志记录。这解决了长期以来在 JSP 内部进行可控日志记录的问题。通过更改配置，可以将日志信息重定向到任何首选目标，并以任何期望的格式输出。但是，在将\
    \ CPU 密集型日志记录操作（例如将日志数据写入数据库）包含到 Web 应用程序中之前，需要仔细考虑，因为这可能会影响该应用程序的性能。\n\n至此，log4j\
    \ 的讨论就结束了。第 5 章 到第 9 章 中解释的所有主题应该能帮助您理解 log4j 的内部机制以及如何在实际应用中使用它。提供的小示例应该能让您掌握所介绍的概念，并快速看到结果，从而更好地理解\
    \ log4j 的使用。更广泛的示例应该能帮助您将 log4j 的使用与实际应用程序联系起来。\n\n关于任何主题，总有一些东西需要学习。但我们创建了一个框架并赋予了它形状，现在您已经具备了在此基础上进行构建的能力。不过，在结束之前，我们肯定需要在下一章中探讨一些涉及使用不同日志记录\
    \ API 的最佳实践。\n\n# 第 10 章：最佳实践\n"
- fmt: '# Overview


    In this book, we have discussed the two most popular Java-based logging APIs:
    the JDK 1.4 logging API and the Apache log4j API. Both logging APIs are similar
    in features, with the log4j API providing greater flexibility and more powerful
    logging capabilities. Both APIs allow us to configure and control logging behavior
    via configuration files. These APIs also offer a range of things we can do to
    log any message from within an application. For example, we can programmatically
    override the state of different components in the logging framework. We have seen
    that it is also possible to extend the existing logging framework in both logging
    APIs, and we can integrate our own custom logging components within the framework.
    This might help us to achieve specific logging behavior in our applications. Although
    this is very useful, there still remains a few points that need to be considered
    while using the existing logging framework or extending it by adding custom components.


    Remember, logging is not the primary goal of most applications. It is there only
    to help us follow the internal status of the application. It helps us detect problems
    faster, publish messages to determine how the system is functioning, and maintain
    and debug the application with less time and cost. On the other hand, using logging
    incorrectly might affect the speed and functioning of an application. Hence, great
    care is needed in choosing the right components for the logging process and the
    best way to use those components. It is also very important to check that custom
    logging components do not affect the speed and integrity of existing components
    in any way.


    In this chapter, we will discuss a few points that are critical to the performance
    of logging. These points are valid for both the JDK 1.4 logging API and the Apache
    log4j API unless otherwise mentioned.


    Finally, this chapter will present a comparison between log4j and the JDK 1.4
    logging API in terms of their internal workings and performance so that when it
    comes time to implement logging in your own applications, you know which API best
    serves your needs.


    # Obtaining a Logger


    In both the JDK 1.4 logging API and log4j, the entry point to the logging framework
    is the `Logger` object. We obtain an instance of the `Logger` object and ask it
    to log different messages with different levels. Normally, in applications we
    will obtain named loggers. What naming convention should be used for these `Logger`
    objects?


    There is no strict rule about what a logger''s name should be. Still, we need
    to take great care in choosing a naming convention for the `Logger` objects in
    our applications. We configure a `Logger` through the configuration file. How
    do we know which application component is using which `Logger` object? How will
    it impact the whole application, if we change the configuration of a particular
    logger? Imagine that we have an application with hundreds of different components
    using a common logging configuration file. In this case, we would certainly need
    to come up with a naming strategy for logger objects so that we know the individual
    loggers each component is using. By having a well-designed naming convention,
    it is easy for us to assess the impact of any change we make to a particular logger
    configuration.


    |  | BEST PRACTICE | Use a package-based naming convention for `Logger` objects.
    |


    One great idea for a naming convention is package-based naming. Generally, application
    components are divided into several packages. Each package in turn contains related
    classes for certain aspects of the application. It is a good practice to use package
    name–based `Logger` objects, as this convention is easy to maintain.


    |  | BEST PRACTICE | In situations where components in the same package may require
    separate logging behavior, separate loggers on the basis of the tasks the components
    perform. |


    Immediately the question arises of whether a package contains classes that perform
    several distinct activities. For example, the package `com.apress.logging.log4j.util`
    can contain many utility classes. If all of them are using the same logger named
    `com.apress.logging.log4j.util`, then changing the configuration for this logger
    will affect all the utilities within this package. This may be undesirable. For
    example, one of the classes in the `util` package may be writing data to a file
    and another class may be sending data to a remote TCP/IP server. We might need
    detailed logging enabled for the class doing TCP/IP, but may not need the same
    level of detailed logging for the class doing file I/O. In such situations, it
    may be helpful to use two different loggers and name them according to the job
    they do.


    The main point is to come up with an appropriate naming convention for loggers
    used within an application. This will increase the maintainability of the loggers.
    Also, it will help avoid the undesirable event of a configuration change in one
    logger affecting the others.


    # Using Logger Hierarchy


    Both the JDK 1.4 logging API and log4j support logger hierarchy. The loggers are
    organized in a parent-child relationship. For example, a logger named `com.foo`
    is the parent logger of the child logger `com.foo.bar`. In the logger hierarchy,
    the child logger inherits the properties and the logger components from its immediate
    parent. In short, this means that all the logging events captured by the child
    logger will be processed by the child logger itself and also by its parent logger.
    This may also mean that logging messages will appear twice if both the child and
    parent logger use the same logging destinations, which may be undesirable. Of
    course, in both APIs, we can turn off the use of the parent logger in the hierarchy.
    To do so in the JDK 1.4 logging API, use the following:


    ```

    setUseParentHandlers(false);

    ```


    In log4j, use


    ```

    setAdditivity(false);

    ```


    or via the configuration file, add this line:


    ```

    log4j.logger.[logger name].additivity=false

    ```


    Again, there are situations when we might want this logger hierarchy enabled.


    |  | BEST PRACTICE | In situations where one application component tries to log
    the same information to different destinations by using separate components belonging
    to the same package, try to use the logger hierarchy. |


    Imagine an order-processing application where component `A` receives an order.
    It processes the order and now needs to store the order-specific logging information
    to a file and also wants to send the same information back to a corporate logging
    database. Application component `B` writes the data to the local file and component
    `C` writes the logging information to the corporate database. Now the important
    point to consider is whether the application components `A`, `B`, and `C` belong
    to a package hierarchy. For example, components `B` and `C` may belong to package
    `com.processor` and component `A` may belong to package `com.processor.order`.
    Another component, `D`, might deal with e-mail–based orders and may be in package
    `com.processor.order.email`. In such situations, we are in a position to use the
    parent-child logger relationship.


    The main point is we need to judge if the loggers are able to justify the parent-child
    relationship on the basis of logging activity and not only by the package structure.
    If they are parent and child in terms of logging behavior, then use the relationship.


    |  | BEST PRACTICE | If the logger hierarchy is turned on, the logging framework
    needs to determine the parent logger (recursively up the logger tree). This may
    reduce performance. |


    The benchmark result with log4j shows that walking through the logger hierarchy
    is three times slower than normal logging activity. So take great care in determining
    whether to use the logger hierarchy in your applications. The examples provided
    in this book aimed to keep the parent-child relationship turned off unless it
    was necessary to demonstrate how the parent-child relationship works.'
