    \ return false;\n      else\n          return p.isGreaterOrEqual(log.getEffectiveLevel());\n\
    \  }\n\npublic void debug(Object message)\n  {\n      log.log(Level.DEBUG, message);\n\
    \  }\n\npublic void debug(Object message, Throwable t)\n  {\n      log.log(Level.DEBUG,\
