    \ 类，因此框架会尝试确定调用者的源类和源方法。\n\n## 日志消息的本地化\n\n本地化是 Java 中用于适应不同语言而无需更改源代码的一种技术。日志消息的本地化是通过使用\
    \ Java 的 `ResourceBundle` 技术实现的。我们将日志消息以键值对格式定义在适当的属性文件中，并将该属性文件传递给 Java 运行时。日志\
    \ API 中的大多数 logger 方法都接受一个消息参数。如果指定了 `ResourceBundle` 名称，`Logger` 对象将尝试根据传入的消息字符串（作为键）查找映射的文本。Logger\
    \ 会首先在线程的 `ContextClassLoader` 中查找指定的 `ResourceBundle`。如果找不到，则会在 `SystemClassLoader`\
    \ 中查找 `ResourceBundle`。一旦找到 `ResourceBundle` 并且其中包含消息字符串的映射，则消息字符串将被替换为本地化的值；否则，将直接打印消息字符串。清单\
