    \ property is set to `true`.\n\n*   `public FileHandler(String pattern, int limit,\
    \ int count)`: Constructor specifying the pattern, the size limit of each log\
    \ file, and the number of files to be created for rotation. Once the number of\
    \ files required to write the complete amount of log information exceeds the specified\
    \ count, the log messages are rotated back to the first file. The count value\
    \ must be at least 1.\n\n*   `public FileHandler(String pattern, int limit, int\
    \ count, Boolean append)`: Same as the preceding constructor, except it includes\
    \ a specific appending instruction.\n\n[Listing 2-7](#LiB0017.html#ch02ls07),\
    \ `FileHandlerDemo.java`, demonstrates the use of a pattern with the `FileHandler`\
    \ class.\n\nListing 2-7: FileHandlerDemo.java\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\npackage sam.logging;\n\nimport java.util.logging.*;\nimport java.io.IOException;\n\
    \npublic class FileHandlerDemo\n{\n    private FileHandler handler = null;\n \
    \   private static Logger logger = Logger.getLogger(\"sam.logging\");\n\npublic\
    \ FileHandlerDemo(String pattern)\n    {\n        try\n        {\n           \
    \ //creating a file handler object with 1000 bytes limit for\n            //each\
    \ file and with count 2\n            handler = new FileHandler(pattern,1000, 2);\n\
    \            //adding the handler to the logger\n            logger.addHandler(handler);\n\
    \        }catch(IOException ioe) {\n            ioe.printStackTrace();\n     \
    \   }\n    }\n\n/**\n     * This method logs the message with the FileHandler\n\
    \     */\n    public void logMessage()\n    {\n        LogRecord record = new\
    \ LogRecord(Level.INFO, \"Logged in a file..22.\");\n        logger.log(record);\n\
    \        handler.flush();\n        handler.close();\n    }\n\npublic static void\
    \ main(String[] args)\n    {\n        FileHandlerDemo demo = new FileHandlerDemo(\"\
    %h/log%g.out\");\n        demo.logMessage();\n    }\n}\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nIn this example, we use the constructor with a pattern, size of\
    \ each logging file, and count of files. We specify the pattern to be `%h/log%g.out`.\
    \ According to [Table 2-1](#LiB0017.html#ch02table01), `%h` denotes the `user.home`\
    \ system property. Once we go to the same location, we will find the log files\
    \ are created. If we have exceeded the limit of each file (one way of doing so\
    \ is to run the program in [Listing 2-7](#LiB0017.html#ch02ls07) a couple of times\
    \ in a loop), then the log file will be rotated; in that case, we will get files\
    \ \"log0.out\" and \"log1.out\", as the count is specified as 2.\n\n`FileHandler`\
    \ by default uses the `XMLFormatter` object to write logging information. We will\
    \ look at the `XMLFormatter` object in detail in [Chapter 3](#LiB0022_split_000.html#136).\
    \ But in short, the logging information will be XML formatted and the XML data\
    \ will be logged into the logging files. For the preceding application, the log\
    \ file will contain the following logging information:"
  trans: "\n### FileHandler\n\n`FileHandler` 是 JDK 1.4 日志 API 中提供的一个非常有用的 `Handler`\
    \ 对象。它将日志信息写入文件。它扩展了 `StreamHandler` 对象，并重写了必要的方法以实现基于文件的日志记录。`FileHandler` 具有一些有用的特性，用于管理记录日志信息的文件，并以独立于操作系统的方式在文件系统中定位该文件。作为一个功能丰富的基于文件的处理器，它具有以下特点：\n\
    \n*   它可以将日志信息写入单个文件，也可以写入一组轮换的文件。当某个特定文件达到最大大小限制时，日志信息会继续写入另一个文件。日志文件的历史记录通过一个顺序编号方案来维护，例如在基本文件名后添加\
    \ \"0, 1, 2 …\"。\n\n*   可以通过使用模式而不是指定绝对路径来指定日志文件。该模式是一个字符串，可以包含表 2-1 中所示的表达式。\n\
    \n表 2-1：FileHandler 中的模式\n\n| 表达式 | 含义 |\n| --- | --- |\n| `/` | 本地操作系统的路径分隔符\
    \ |\n| `%t` | 适合存储临时日志文件的目录，例如操作系统的临时目录 |\n| `%h` | 适合在系统中存储用户特定数据的目录，例如 \"user.home\"\
    \ 位置 |\n| `%g` | 用于轮换日志文件的日志生成编号 |\n| `%u` | 用于使日志文件唯一以避免任何冲突的编号 |\n| `%%` | 字面百分号\
    \ |\n\n`FileHandler` 将使用模式字符串按以下方式解析日志文件的名称和位置：\n\n*   如果模式表达式包含 `/` 或 `%t`，则日志文件的位置要么是当前工作目录，要么是特定于操作系统的临时文件目录。例如，如果模式是\
    \ `%t/logging/info.out`，那么在 Solaris 操作系统中，它将被解析为 \"/var/tmp/logging/info.out\"\
    ，而在 Windows 中，它将被解析为 \"c:/temp/logging/info.out\"。\n\n*   如果模式包含表达式 `%t/logging/info%g.out`，则日志信息将被写入\
    \ \"/var/tmp/logging/info0.out\"，并轮换到 \"/var/tmp/logging/info1.out\" 等。\n\n* \
    \  `%u` 是一个唯一的标识号，用于解决与日志文件的任何冲突。如果 `FileHandler` 尝试打开一个文件并发现它已被另一个进程使用，那么它会倾向于使用\
    \ `%u` 生成一些唯一编号，并将该编号添加到基本文件名的末尾（在点号之后）。例如，模式 `%t/logging/info%u.%g.out`，计数为 2，可能会生成诸如\
    \ \"/var/tmp/logging/info0.0.out\"、\"/var/tmp/logging/info0.1.out\" 和 \"/var/tmp/logging/info0.2.out\"\
    \ 之类的日志文件名。如果 \"info0.2.out\" 产生冲突，日志信息将被轮换到 \"info1.2.out\"。\n\n与其他 `Handler`\
    \ 对象一样，`FileHandler` 对象也使用 `LogManager` 属性进行初始化。默认情况下，`FileHandler` 获取以下属性：\n\n\
    *   `level`：读取 `java.util.logging.FileHandler.level` 属性，默认为 Level.ALL。\n\n*  \
    \ `filter`：读取 `java.util.logging.FileHandler.filter` 属性，默认为无过滤器。\n\n*   `formatter`：读取\
    \ `java.util.logging.FileHandler.formatter` 属性，默认为 `java.util.logging.XMLFormatter`\
    \ 格式化样式。\n\n*   `encoding`：读取 `java.util.logging.FileHandler.encoding` 属性，默认为特定于平台的编码样式。\n\
    \n*   `limit`：读取 `java.util.logging.FileHandler.limit` 属性。`limit` 属性指定要写入文件的大致数据量（以字节为单位）。如果设置为零，则对数据大小没有限制。此属性默认为无限制。需要注意的是，限制是以字节为单位指定的，*而不是*以千字节或兆字节或其他任何单位。如果数据超过文件大小限制属性，则文件会被轮换。\n\
    \n*   `count`：读取 `java.util.logging.FileHandler.count` 属性，表示要循环使用的输出文件数量。默认为 1。\n\
    \n*   `pattern`：读取 `java.util.logging.FileHandler.pattern` 属性。默认为 `%h/java%u.log`。\n\
    \n*   `append`：读取 `java.util.logging.FileHandler.append` 属性。默认为 `false`。如果设置为\
    \ `true`，则日志消息将追加到日志文件中，直到达到限制。否则，日志信息将被覆盖写入文件。\n\n`FileHandler` 类提供了以下构造函数来创建对象：\n\
    \n*   `public FileHandler()`：这是默认构造函数，完全使用 `LogManager` 属性进行初始化。\n\n*   `public\
    \ FileHandler(String pattern)`：使用指定模式的构造函数。文件大小限制设置为无，文件计数设置为 1。将只创建一个文件来写入日志消息。`append`\
    \ 属性设置为 `false`。\n\n*   `public FileHandler(String pattern, Boolean append)`：使用指定模式的构造函数，如果\
    \ `append` 属性设置为 `true`，则追加到日志文件。\n\n*   `public FileHandler(String pattern, int\
    \ limit, int count)`：指定模式、每个日志文件的大小限制以及为轮换而创建的文件数量的构造函数。一旦写入完整日志信息所需的文件数量超过指定的计数，日志消息将轮换回第一个文件。计数值必须至少为\
    \ 1。\n\n*   `public FileHandler(String pattern, int limit, int count, Boolean\
    \ append)`：与前面的构造函数相同，只是包含了一个特定的追加指令。\n\n清单 2-7 `FileHandlerDemo.java` 演示了如何在\
    \ `FileHandler` 类中使用模式。\n\n清单 2-7：FileHandlerDemo.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\npackage sam.logging;\n\nimport java.util.logging.*;\nimport java.io.IOException;\n\
    \npublic class FileHandlerDemo\n{\n    private FileHandler handler = null;\n \
    \   private static Logger logger = Logger.getLogger(\"sam.logging\");\n\npublic\
    \ FileHandlerDemo(String pattern)\n    {\n        try\n        {\n           \
    \ //创建一个文件处理器对象，每个文件限制为 1000 字节\n            //计数为 2\n            handler = new\
    \ FileHandler(pattern,1000, 2);\n            //将处理器添加到日志记录器\n            logger.addHandler(handler);\n\
    \        }catch(IOException ioe) {\n            ioe.printStackTrace();\n     \
    \   }\n    }\n\n/**\n     * 此方法使用 FileHandler 记录消息\n     */\n    public void logMessage()\n\
    \    {\n        LogRecord record = new LogRecord(Level.INFO, \"Logged in a file..22.\"\
    );\n        logger.log(record);\n        handler.flush();\n        handler.close();\n\
    \    }\n\npublic static void main(String[] args)\n    {\n        FileHandlerDemo\
    \ demo = new FileHandlerDemo(\"%h/log%g.out\");\n        demo.logMessage();\n\
    \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在这个例子中，我们使用了带有模式、每个日志文件大小和文件计数的构造函数。我们将模式指定为\
    \ `%h/log%g.out`。根据表 2-1，`%h` 表示 `user.home` 系统属性。一旦我们进入相同的位置，就会发现日志文件已被创建。如果我们超过了每个文件的限制（一种方法是在循环中多次运行清单\
    \ 2-7 中的程序），那么日志文件将被轮换；在这种情况下，由于计数指定为 2，我们将得到文件 \"log0.out\" 和 \"log1.out\"。\n\
    \n`FileHandler` 默认使用 `XMLFormatter` 对象来写入日志信息。我们将在第 3 章中详细查看 `XMLFormatter` 对象。但简而言之，日志信息将被格式化为\
    \ XML，并且 XML 数据将被记录到日志文件中。对于上述应用程序，日志文件将包含以下日志信息：\n"
- fmt: "```xml\n<?xml version=\"1.0\" encoding=\"windows-1252\" standalone=\"no\"\
    ?>\n<!DOCTYPE log SYSTEM \"logger.dtd\">\n<log>\n<record>\n  <date>2002-08-30T22:19:02</date>\n\
    \  <millis>1030742342998</millis>\n  <sequence>0</sequence>\n  <level>INFO</level>\n\
    \  <thread>10</thread>\n  <message>Logged in a file...</message>\n</record>\n\
    </log>\n```\n\nThe XML logging information is structured data and therefore can\
    \ be a very useful way of maintaining logging information for further processing.\
    \ For example, any other customized error manager can parse the XML data and produce\
    \ user-friendly, meaningful error messages to the user of the application. It\
    \ is also possible to specify any other formatting style to be associated with\
    \ the `FileHandler` object by using the `setFormatter()` method. We can specify\
    \ any existing `Formatter` objects in the JDK 1.4 logging API, or we can create\
    \ our own formatter and attach it to `FileHandler`.\n\n`FileHandler` can prove\
    \ useful in various situations. With the concept of patterns, it is possible to\
    \ specify a location without indicating the absolute path, which helps in implementing\
    \ a file-based logging system in an OS-independent way. Arguably, this bit of\
    \ information can be made configurable, but that means we need to change the configuration\
    \ file every time the logging platform changes. Thus, the way `FileHandler` reads\
    \ the system properties and determines the location of the logging files can be\
    \ very helpful.\n\n## MemoryHandler\n\nImagine a situation in which you want to\
    \ log messages only when a certain triggering condition is achieved and discard\
    \ any logging information that doesn't meet the triggering condition. `MemoryHandler`\
    \ is the answer for these types of logging activity. A `MemoryHandler` object\
    \ writes data to a circular buffer in the memory. By condition, a `MemoryHandler`\
    \ is not itself capable of publishing information to any destination and will\
    \ have another `Handler` object associated with it as a target `Handler`. When\
    \ the triggering condition is reached, the logging information is passed to the\
    \ target `Handler` object for further processing.\n\nBy default, the `MemoryHandler`\
    \ acquires the following default properties by using the `LogManager` properties:\n\
    \n*   `level`: This reads the `java.util.logging.MemoryHandler.level` property\
    \ and defaults to `Level.ALL`.\n*   `filter`: This reads the `java.util.logging.MemoryHandler.filter`\
    \ property and defaults to no filter.\n*   `size`: This reads the `java.util.logging.MemoryHandler.size`\
    \ property, which defines the size of the memory buffer. It defaults to 1000 bytes.\n\
    *   `pushLevel`: This reads the `java.util.logging.MemoryHandler.pushLevel` property.\
    \ This defines the triggering condition with respect to the logging level for\
    \ the `MemoryHandler` to release its buffer to the specified target `Handler`\
    \ object.\n*   `target`: This reads the `java.util.logging.MemoryHandler.target`\
    \ property and defines the target `Handler` to be used for publishing the logging\
    \ information.\n\nIt is interesting to note that the `MemoryHandler` has no `Formatter`\
    \ object associated with it. Instead, it uses the `Formatter` object associated\
    \ with its target `Handler` object. The `MemoryHandler` object has the following\
    \ constructor other than the default constructor:\n\n```\npublic MemoryHandler(Handler\
    \ target, int size, Level pushLevel)\n```\n\nThis constructor creates a `MemoryHandler`\
    \ with the specified target `Handler`, the number of `LogRecords` to buffer, and\
    \ also the push level. Note that the size argument has no relation to the length\
    \ of the memory buffer. These values will override any default values specified\
    \ in the logging configuration file. Also, the `MemoryHandler` object provides\
    \ us with various convenience methods to control the memory buffer and the associated\
    \ target `Handler` object.\n\nThe following method pushes any buffered output\
    \ to the associated target `Handler`:\n\n```\npublic void push()\n```\n\nThis\
    \ next method flushes any output buffer used by the associated `Handler`:\n\n\
    ```\npublic void flush()\n```\n\nIt is important to note that `MemoryHandler`\
    \ itself has no output stream to write to and uses the associated target `Handler`\
    \ to open any stream and write the logging information.\n\nThe following method\
    \ closes any output stream used by the associated target `Handler` object:\n\n\
    ```\npublic void close()\n```\n\nIt eventually closes the associated `Handler`\
    \ and all its resources.\n\nThere are three possible situations in which `MemoryHandler`\
    \ will try to release its buffered content to the associated target `Handler`\
    \ object:\n\n*   When the incoming `LogRecord` object has a level greater than\
    \ the push level of the `MemoryHandler` object. Here level matching is the triggering\
    \ condition.\n*   When any external class calls the `push()` method of the `MemoryHandler`\
    \ object.\n*   When any subclass of the `MemoryHandler` object overrides the method\
    \ `publish(LogRecord record)`, checks certain conditions, and decides to release\
    \ the buffered content.\n\n[Listing 2-8](#LiB0017.html#ch02ls08), `MemoryHandlerDemo.java`,\
    \ illustrates the use of `MemoryHandler`.\n\n**Listing 2-8: MemoryHandlerDemo.java**\n\
    \n```\npackage sam.logging;\nimport java.util.logging.*;\n\npublic class MemoryHandlerDemo\n\
    {\n    private ConsoleHandler handler = null;\n    private MemoryHandler mHandler\
    \ = null;\n    private static Logger logger = Logger.getLogger(\"sam.logging\"\
    );\n```"
