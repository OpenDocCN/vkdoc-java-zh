  trans: "\n## 关于过滤的更多内容\n\n设计良好的日志代码的一个重要方面，在于控制最终生成的日志信息。在大型应用场景中，日志信息量巨大是常有的事。此时，基于级别的常规过滤可能不足以将日志信息精确限制到分析系统所需的类型。这时，`Filter`\
    \ 对象就变得非常有用。`Filter` 对象能够根据某些特定于应用、更贴近业务逻辑的复杂标准来过滤日志信息。Apache log4j 提供了将任意特定于应用的\
    \ `Filter` 对象附加到框架的灵活性。有了这些 `Filter` 对象，我们就能以更贴近应用和业务的方式控制生成的日志信息。\n\n过滤日志请求有两种方式。一种是执行基于级别的检查，另一种是将\
    \ `Filter` 对象附加到 `Appender` 对象上。基于级别的检查仅限于将日志请求的级别与相应 `Logger` 和 `Appender` 对象的指定级别进行比较。而\
    \ `Filter` 对象则可以根据任何特定于应用的标准来检查日志请求。我们在第 5 章中讨论过 `Filter` 对象，并了解了如何开发自定义的 `Filter`\
    \ 对象。我们可以编写任意类型的 `Filter` 对象，并将其添加到 `Appender` 对象的过滤器链中。过滤器在链中按顺序执行，根据对日志请求的批准或拒绝，日志消息会被相应处理。\n\
    \n由 `Logger` 和 `Appender` 对象应用的基于级别的过滤，其原理很简单。如果日志请求的级别低于 `Logger` 和 `Appender`\
    \ 对象的级别，该日志请求就会被丢弃。这很有用。但如果我们遇到只想打印属于某些级别的日志消息，而丢弃其余消息的情况，该怎么办？例如，我们可能只想打印级别在\
    \ DEBUG 和 WARN 之间的消息。如果我们将记录器级别设置为 DEBUG，记录器会打印直到 FATAL 级别的所有消息。这时，`org.apache.log4j.varia.LevelRangeFilter`\
    \ 就派上用场了。\n\n### 使用 LevelRangeFilter\n\n借助 `LevelRangeFilter`，我们可以指定日志框架应批准的日志级别下限和上限。`LevelRangeFilter`\
    \ 具有表 8-1 中列出的可配置 Bean 属性。\n\n表 8-1：LevelRangeFilter 中的 Bean 属性\n\n| Bean 属性 |\
    \ 方法 | 描述 | 默认值 |\n| --- | --- | --- | --- |\n| `LevelMin` | `setLevelMin(Level)`\
    \ | 设置要考虑进行日志记录的最低级别。 | 无 |\n| `LevelMax` | `setLevelMax(Level)` | 设置应处理日志请求的最高级别。\
    \ | 无 |\n| `acceptOnMatch` | `setAcceptOn-Match(boolean)` | 如果为 `true`，过滤器返回 `ACCEPT`，并且链中的后续过滤器将不被考虑。\
    \ | `false` |\n\n`Filter` 对象目前可通过 XML 配置文件进行配置。清单 8-18 \"customFilter.xml\" 是一个使用\
    \ `LevelRangeFilter` 的示例配置文件。\n\n清单 8-18：customFilter.xml\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE log4j:configuration\
    \ SYSTEM \"log4j.dtd\">\n\n<log4j:configuration xmlns:log4j=\"http://jakarta.apache.org/log4j/\"\
    >\n\n<appender name=\"A1\" class=\"org.apache.log4j.ConsoleAppender\">\n\n<layout\
    \ class=\"org.apache.log4j.PatternLayout\">\n   <param name=\"ConversionPattern\"\
    \ value=\"%t %-5p %c{2} - %m%n\"/>\n  </layout>\n\n<filter class=\"org.apache.log4j.varia.LevelRangeFilter\"\
    >\n    <param name=\"LevelMin\" value=\"DEBUG\"/>\n    <param name=\"LevelMax\"\
    \ value=\"WARN\"/>\n    <param name=\"acceptOnMatch\" value=\"true\"/>\n\n</filter>\n\
    \ </appender>\n\n<logger name=\"com.apress.logging.log4j\">\n  <level value=\"\
    debug\"/>\n  <appender-ref ref=\"A1\"/>\n </logger>\n\n</log4j:configuration>\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n请注意，在此配置文件中，我们为 `ConsoleAppender`\
    \ 对象分配了一个 `PatternLayout`。`ConsoleAppender` 还使用了 `LevelRangeFilter` 对象，其最低日志级别设置为\
    \ DEBUG，最高日志级别设置为 WARN。`acceptOnMatch` 属性设置为 `true`。这意味着，如果事件的级别在指定范围内，该事件将立即被记录，而无需咨询链中的任何其他\
    \ `Filter` 对象。如果 `acceptOnMatch` 设置为 `false`，则意味着即使事件级别在指定范围内，也会返回 Filter.NEUTRAL。这为链中的其他\
    \ `Filter` 对象提供了检查该事件的机会。\n\n现在，我们将编写一个简单的程序来演示 `LevelRangeFilter` 的工作原理。清单 8-19\
    \ `FilterDemo.java` 是一个示例程序，它会打印所有级别的日志消息。借助 `LevelRangeFilter`，我们将过滤掉任何不在 DEBUG\
    \ 和 WARN 级别范围内的消息。\n\n清单 8-19：FilterDemo.java\n\n| **![开始示例](img/_1.gif)** |\n\
    \n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.Logger;\n\
    public class FilterDemo\n{\n    private static Logger logger =\nLogger.getLogger(FilterDemo.class.getPackage().getName());\n\
    \npublic FilterDemo()\n    {\n    }\n    public void doLogging()\n    {\n    \
    \    logger.debug(\"DEBUG MESSAGE..\");\n        logger.info(\"INFO MESSAGE..\"\
    );\n        logger.error(\"ERROR MESSAGE..\");\n        logger.warn(\"WARN MESSAGE..\"\
    );\n        logger.fatal(\"FATAL MESSAGE...\");\n    }\n\npublic static void main(String\
    \ args[])\n    {\n        FilterDemo demo = new FilterDemo();\n        demo.doLogging();\n\
    \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n执行此程序将把所有消息打印到控制台，但级别为\
    \ ERROR 和 FATAL 的消息除外，因为它们超出了指定的范围。\n\n```\nmain DEBUG logging.log4j - DEBUG MESSAGE..\n\
    main INFO logging.log4j - INFO MESSAGE..\nmain WARN logging.log4j - WARN MESSAGE..\n\
    ```\n\n|  | 注意  | 请回忆，日志级别顺序为 ALL<DEBUG<INFO<WARN<ERROR<FATAL<OFF。 |\n\n如我们所见，为\
    \ `Logger` 对象分配级别以及为 `Appender` 对象分配阈值级别，始终可以限制级别的下限。`LevelRangeFilter` 仅在我们想要限制级别的上限时才变得有用。\n"
- fmt: "### Using `SelectedLevelFilter`\n\nWe have seen how `LevelRangeFilter` can\
    \ help us set upper and lower bounds for logging levels. In another situation,\
    \ we might want to have a `Filter` that only allows messages with specified levels\
    \ to appear in the destination. This is more precise than specifying a range of\
    \ levels. For example, in one scenario, we might want only the messages with levels\
    \ `FATAL` and `INFO` to be printed. One immediate solution is to write a custom\
    \ `Filter` object to handle such situations.\n\nWe will now explore a sample `Filter`\
    \ object designed to filter messages based on specific levels. The `SelectedLevelFilter`\
    \ class extends the `abstract` class `org.apache.log4j.spi.Filter` and implements\
    \ the `abstract` method `decide(LoggingEvent event)` to determine a certain logging\
    \ event.\n\n`SelectedLevelFilter` defines two configurable bean properties, `acceptOnMatch`\
    \ and `levelsToMatch`. The `acceptOnMatch` property defines whether the filter\
    \ should accept this request if a matching criterion is found. If `acceptOnMatch`\
    \ is set to `true`, `SelectedLevelFilter` returns `Filter.ACCEPT` upon finding\
    \ a level match, or else it returns `Filter.NEUTRAL`. If no match is found, it\
    \ returns `Filter.DENY`. The `levelsToMatch` property accepts a comma-delimited\
    \ string representation of levels we want to match. For example, if we wanted\
    \ to find messages with the levels `DEBUG` and `FATAL`, we would define `levelsToMatch`\
    \ as `\"DEBUG, FATAL\"`. The sequence is immaterial here.\n\nAt initialization,\
    \ the `SelectedLevelFilter` object stores all the specified levels in the `levelsToMatch`\
    \ parameter in an internal `java.util.ArrayList` object. When a logging event\
    \ arrives, it compares its level against all those specified with `levelsToMatch`.\
    \ `SelectedLevelFilter` then returns an appropriate return value— `Filter.ACCEPT`,\
    \ `Filter.DENY`, or `Filter.NEUTRAL`—depending on the result of the comparison\
    \ and the value of `acceptOnMatch`.\n\n[Listing 8-20](#LiB0064.html#ch08ls20),\
    \ `SelectedLevelFilter.java`, presents a sample implementation of the custom `Filter`\
    \ object discussed in this section.\n\n**Listing 8-20: SelectedLevelFilter.java**\n\
    \n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.spi.Filter;\n\
    import org.apache.log4j.spi.LoggingEvent;\nimport org.apache.log4j.Level;\nimport\
    \ org.apache.log4j.helpers.OptionConverter;\nimport java.util.ArrayList;\nimport\
    \ java.util.Iterator;\nimport java.util.StringTokenizer;\n\npublic class SelectedLevelFilter\
    \ extends Filter {\n    private ArrayList levels = new ArrayList();\n    private\
    \ boolean acceptOnMatch;\n    private String levelsToMatch;\n\npublic SelectedLevelFilter()\
    \ {\n    }\n\npublic int decide(LoggingEvent event)\n    {\n        if(levels.size()\
    \ == 0)\n        {\n            return Filter.NEUTRAL;\n        }\n        Level\
    \ eventLevel = event.getLevel();\n        Iterator iterator = levels.iterator();\n\
    \        boolean matchFound = false;\n\nwhile(iterator.hasNext())\n        {\n\
    \            Level level = (Level)iterator.next();\n            if(level.equals(eventLevel))\n\
    \            {\n                matchFound = true;\n                break;\n \
    \           }\n        }\n        if(matchFound)\n        {\n            if(acceptOnMatch)\n\
    \            {\n                return Filter.ACCEPT;\n            }else\n   \
    \         {\n                return Filter.NEUTRAL;\n            }\n        }else\n\
    \        {\n            return Filter.DENY;\n        }\n    }\n\npublic boolean\
    \ getAcceptOnMatch() {\n        return this.acceptOnMatch;\n    }\n\npublic void\
    \ setAcceptOnMatch(boolean acceptOnMatch) {\n        this.acceptOnMatch = acceptOnMatch;\n\
    \    }\n\npublic String getLevelsToMatch() {\n        return this.levelsToMatch;\n\
    \    }\n\npublic void setLevelsToMatch(String levelsToMatch) {\n        this.levelsToMatch\
    \ = levelsToMatch;\n        if(levelsToMatch !=null)\n        {\n            StringTokenizer\
    \ tokenizer = new StringTokenizer(levelsToMatch,\n\",\");\n            while(tokenizer.hasMoreTokens())\n\
    \            {\n                String token = tokenizer.nextToken().trim();\n\
    \                Level level = OptionConverter.toLevel(token, null);\n       \
    \         levels.add(level);\n            }\n        }\n    }\n}\n```\n\nLet's\
    \ reuse the program `FilterDemo.java` from [Listing 8-19](#LiB0064.html#ch08ls19)\
    \ to demonstrate the application of `SelectedLevelFilter`. As the `Filter` objects\
    \ can only be configured with an XML configuration file, we will also reuse the\
    \ configuration file `\"customFilter.xml\"` shown in [Listing 8-18](#LiB0064.html#ch08ls18).\
    \ Make the following changes to the `<filter>` attribute in the XML file to specify\
    \ `SelectedLevelFilter` as the designated filter for the defined logger:\n\n```\n\
    <filter class=\"com.apress.logging.log4j.SelectedLevelFilter\">\n    <param name=\"\
    LevelsToMatch\" value=\"FATAL, INFO\"/>\n    <param name=\"acceptOnMatch\" value=\"\
    true\"/>\n</filter>\n```\n\nIn the `levelsToMatch` property, we specify levels\
    \ `FATAL` and `INFO` as the desired levels for the messages to be published. Now\
    \ execute the `FilterDemo` program with the changed configuration file. Only the\
    \ messages with level `FATAL` and `INFO` will be printed to the console.\n\n```\n\
    main INFO logging.log4j - INFO MESSAGE..\nmain FATAL logging.log4j - FATAL MESSAGE…\n\
    ```\n\n### Filter Chaining\n\nThe Apache log4j API provides many `Filter` objects\
    \ targeted for different purposes. As we have seen, if a particular `Filter` object\
    \ returns a value of `Filter.NEUTRAL`, then the next filter in the chain is considered.\
    \ This is called filter chaining. By chaining several `Filter` objects, we can\
    \ compare a particular logging request against many filtering conditions. Sometimes,\
    \ this serves as the alternative to writing a custom `Filter` object to combine\
    \ the features offered by different `Filter` objects. For instance, the previous\
    \ example of filtering messages only with levels `INFO` and `FATAL` can be achieved\
    \ by chaining two instances of `LevelMatchFilter`. Let's see what happens when\
    \ we change the XML configuration file to replace `SelectedLevelFilter` with the\
    \ following entries:\n\n```\n<filter class=\"org.apache.log4j.varia.LevelMatchFilter\"\
    >\n    <param name=\"levelToMatch\" value=\"FATAL\"/>\n    <param name=\"acceptOnMatch\"\
    \ value=\"true\"/>\n</filter>\n<filter class=\"org.apache.log4j.varia.LevelMatchFilter\"\
    >\n    <param name=\"levelToMatch\" value=\"INFO\"/>\n    <param name=\"acceptOnMatch\"\
    \ value=\"true\"/>\n</filter>\n<filter class=\"org.apache.log4j.varia.DenyAllFilter\"\
    />\n```\n\n`LevelMatchFilter` has two configuration properties, `levelToMatch`\
    \ and `acceptOnMatch`. We use two instances of `LevelMatchFilter` to filter on\
    \ messages with level `FATAL` and `INFO` only. The most important entry is the\
    \ last filter in the chain. `DenyAllFilter` is there to deny all logging requests\
    \ previously dealt with by other appenders in the chain with the return value\
    \ `Filter.NEUTRAL`. If the `acceptOnMatch` property is set to `true`, the `LevelMatchFilter`\
    \ object returns `Filter.NEUTRAL` if it finds no match. If a match is found, then\
    \ `Filter.ACCEPT` is returned and the logging event is logged. All the mismatched\
    \ logging events then end up in `DenyAllFilter`, and it consumes all these mismatched\
    \ events without printing them.\n\nIn a similar fashion, we can use the `org.apache.log4j.varia.StringMatchFilter`\
    \ object to log messages containing only `\"Hello\"` or `\"World\"`. Do not forget\
    \ to add `DenyAllFilter` at the end of the chain to ignore all other messages\
    \ not matching the criteria."
