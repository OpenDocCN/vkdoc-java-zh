  trans: '

    ## 评估日志记录包


    在大型开发过程中，实施恰当的日志记录机制至关重要。无论我们是内部开发日志记录组件，还是使用任何第三方日志记录组件，都需要依据某些标准对其进行评估。简而言之，我们可以将以下标准总结为一个优秀日志记录包的特性：


    *   *配置：* 日志记录组件可能支持基于编程和基于文件的配置。后者更好，因为它允许我们避免更改源代码来切换到不同类型的日志记录行为。此外，日志记录包应支持动态配置，而非静态配置。动态配置使我们无需关闭应用程序即可更改日志记录行为。


    *   *灵活性：* 日志记录包应在记录什么内容以及记录到何处方面提供灵活性。同时，我们应该能够根据信息的重要程度对日志信息进行优先级排序。我们需要一个支持多个日志记录器和多种消息级别，并且能够将日志消息发布到各种目标的日志记录包。


    *   *输出：* 日志信息能够以何种方式输出到首选目标，对于任何日志记录包的成功都至关重要。我们必须仔细考虑日志记录包在输出格式和目标方面的灵活性。


    *   *易用性：* 无论日志记录包的设计多么出色，如果它不易使用，那么任何参与或使用该应用程序的人很可能都不会使用它。因此，我们需要从易用性的角度来评估任何日志记录包。


    ## 流行的基于 Java 的日志记录 API


    经验告诉人们应用程序日志记录的重要性，以及如何编写设计良好的日志记录代码。一旦日志记录概念被证明是成功的，它们就被用作通用的日志记录 API。市场上有一些基于
    Java 的日志记录 API。其中一些是专有的，一些是开源的。在所有可用的 API 中，以下是在 Java 社区中最流行的。


    ### JDK 1.4 日志记录 API


    JDK 1.4 版本在其 `java.util.logging` 包中拥有自己的日志记录 API。此 API 源于 JSR 47。JDK 1.4 日志记录
    API 本质上是 log4j（在下一节中讨论）的精简版本。此 API 中捕获的日志记录概念涉及日志级别以及不同的日志记录目标和格式。JDK 1.4 日志记录
    API 非常适合具有简单日志记录需求的简单应用程序。尽管有一些限制，但此 API 提供了生成有效日志信息所需的所有基本功能。第 2 章 到第 4 章 涵盖了
    JDK 1.4 日志记录 API。


    ### Apache log4j


    Apache log4j 是来自 Apache 的一个开源日志记录 API。此 API 源自 E.U. SEMPER 项目，是 Java 中流行的日志记录包。它允许对日志语句的粒度进行出色的控制。此
    API 的一个主要优点是它可以在运行时通过外部配置文件进行高度配置。它根据不同的优先级级别来看待日志记录过程，并提供将日志信息定向到各种目标的机制，例如数据库、文件、控制台、Windows
    NT 事件日志、UNIX Syslog、Java 消息服务 (JMS) 等。它还允许应用程序开发人员从各种格式化样式中进行选择，例如 XML、HTML 等。


    总的来说，log4j 是一个功能丰富、设计良好、可扩展的日志记录框架，并且提供了比 JDK 1.4 日志记录 API 更多的功能。例如，log4j 的配置比
    JDK 1.4 日志记录 API 灵活得多。JDK 1.4 日志记录 API 只能通过属性样式的配置文件进行配置，但 log4j 同时支持属性和 XML 样式的配置。


    在本书中，第 5 章 到第 9 章 专门讨论 log4j。


    ### Commons Logging API


    Commons Logging API 是 Apache 的另一个日志记录成果。此 API 的目标是提供从一个日志记录 API 到另一个的无缝过渡。根据类路径中是否存在日志记录框架，Commons
    Logging API 将尝试使用可用的 API 来执行应用程序日志记录。Commons Logging API 运行自己的发现过程来找出类路径中可用的日志记录
    API。它倾向于提供任意两个日志记录 API 的最小公分母。例如，在 log4j 和 JDK 1.4 日志记录 API 之间，它将为两者共有的功能提供无缝过渡——因此我们会错过
    log4j 中使用的任何额外功能。


    在操作方面，Commons Logging API 为日志记录 API 中的所有对象创建一个包装器。自动发现和包装器生成是重量级的过程，往往会降低整体性能。这是一个更复杂的日志记录框架，因为此
    API 试图结合多个日志记录 API 的功能。实际上，它提供了在不更改源代码的情况下在不同日志记录 API 之间切换的灵活性。但在使用它之前，请确定您是否需要这种灵活性来换取因
    Commons Logging API 的重量级特性而增加的复杂性和性能下降。


    Commons Logging API 是为日志记录提供通用接口的一项伟大努力，因为它使应用程序能够切换到不同的日志记录 API，而无需更改应用程序代码。一旦您理解并领会了
    JDK 1.4 日志记录 API 和 Apache log4j 所采用的方法，就很容易理解 Commons Logging API 背后的理念。因此，本书将不再进一步讨论
    Commons Logging API。


    ## 未来之路


    有了这些介绍，我们现在将看到上一节中提到的两个日志记录 API，即 JDK 1.4 日志记录 API 和 Apache log4j，如何为基于 Java 的应用程序实现一个健壮的日志记录框架。本书将分别讨论这两个不同的日志记录
    API。Apache log4j 的演进速度比本书章节的编写速度要快，因此我们将重点介绍 log4j 的 1.2.6 版本。后续版本将具有相同的基础，因此本书可以作为使用它们的一个良好起点。读完本书后，您将能够自行比较并决定在下一个项目中使用哪个日志记录
    API。


    # 第 2 章：JDK 1.4 日志记录 API


    ## 要点


    JDK 1.4 版本的 `java.util.logging` 包中包含的日志记录 API 提供了一种从应用程序内部管理日志信息的全面方法。此 API 为我们提供了不同级别和样式的日志记录，这对于调试和审计任何应用程序都至关重要。JDK
    1.4 日志记录机制的概念围绕不同的日志级别、可配置的日志参数、为各种目标生成日志信息的灵活性以及日志消息对不同格式化样式的适应性。


    JDK 1.4 日志记录 API 高度可配置的架构提供了一些巨大的好处，例如能够根据项目的不同阶段打开和关闭日志记录活动。这使得发布后的软件可以轻松配置以生成详细的日志消息，从而使调试应用程序更快、成本更低。此外，可以利用此日志记录
    API 的灵活性根据需要改变日志消息的详细程度。


    在本章中，我们将首先概述 JDK 1.4 日志记录 API 的架构，并详细检查 API 中的不同对象如何相互交互以完成日志记录活动。

    '
- fmt: '# JDK 1.4 Logging API Overview


    The JDK 1.4 logging API (also referred to henceforth as the logging API) consists
    of several objects that capture logging information and process and publish the
    intended logging information to any preferred destination. The logging framework
    essentially consists of the following core objects:


    *   `LogManager`: The `java.util.logging.LogManager` object is a singleton that
    is responsible for managing the logger namespace hierarchy. This class reads a
    system-wide configuration file to set the initial properties for the logging framework.


    |  | Note | A *singleton* is a class that is available only once per Java Virtual
    Machine (JVM) instance of an application. |


    *   `Logger`: The `java.util.logging.Logger` object is responsible for carrying
    out the logging activity. This object provides a number of logging methods to
    publish logging information.


    *   `LogRecord`: The `java.util.logging.LogRecord` object encapsulates all the
    logging information. Typically, it contains the date and timestamp of the logging
    message, the origin of the logging activity, and the granularity and priority
    level of the logging message.


    *   `Handler`: The `java.util.logging.Handler` object is responsible for publishing
    logging information to various destinations—a file, console, memory buffers, etc.


    *   `Filter`: The `java.util.logging.Filter` object is used by `Logger` objects
    to decide whether logging information should be passed to a `Handler` to deal
    with it or be ignored. `Handler` objects can also use `Filter` objects to perform
    more checks on a logging request before publishing it to the final destination.


    *   `Formatter`: The `java.util.logging.Formatter` object is responsible for providing
    required structure to the logging information being published. Formatters also
    perform the localization of logging information, if configured to do so.


    The logging API obtains various configuration parameters from a system-wide configuration
    file. JDK 1.4 supplies a default configuration file, located in the `/jre/lib/logging.properties`
    file. It can also use any other user-specified configuration file for greater
    control and, above all, to support programmatic control of the behavior of the
    logging framework.


    The basic architecture of the logging API defines several levels of logging information.
    The levels describe the priority of a log request, and the logging framework can
    be tuned to display logging information related to a certain level(s). The levels
    defined can be categorized in the descending order of priority as follows:


    *   *SEVERE (highest):* This level is used to log messages about problems that
    are very critical to the application and need immediate attention to rectify.


    *   *WARNING:* This level is used to log messages that indicate potential problems
    with the application.


    *   *INFO:* This level is the default level used by the logging API. Log messages
    published with this level are generally normal debug statements helpful in the
    development phase and day-to-day maintenance of the application.


    *   *CONFIG:* This level specifies log messages related to the configuration stage
    of the application. For example, at startup of an application, we could use this
    level to print configuration-related information.


    *   *FINE/FINER/FINEST (lowest):* These levels denote the detail of the log messages
    from less detailed to highly detailed. Use of these logging levels will result
    in a vast amount of logging information being published in the logging destination.


    *   *ALL:* This level indicates that all messages should be logged.


    All the aforementioned levels are defined in the `java.util.logging.Level` class
    as `static final int` primitive types with a unique integer value associated with
    each defined level. If we want to define our own level, then we can do that by
    extending the `java.util.logging.Level` class and declaring a level with a unique
    integer value attached to it.


    The most essential component of the logging framework is the `Logger` object.
    The `Logger` object is used to log messages specific to an application or application
    component. It captures the specified logging messages and creates a `LogRecord`
    object, which encapsulates all the information related to a logging request. The
    logging API provides a root logger, which exists as the default logger, without
    a namespace attached to it. The root logger is capable of printing logging information
    to the application''s console. The default level associated with a `Logger` object
    is INFO. The amount of information that a logger can publish depends on the level
    associated with the logger.


    Each `Logger` object can also have one or more `Handler` objects associated with
    it, which are responsible for publishing logging information to different destinations
    such as consoles, files, streams, sockets, etc. A `Handler` object in turn may
    have a `Formatter` object associated with it. A `Formatter` object is responsible
    for structuring logging information in various formats and also localizing logging
    information whenever needed. The `Handler` object formats logging messages with
    the associated `Formatter` object(s) before publishing them. It is also interesting
    to note that `Logger` and `Handler` objects can have one or more `Filter` objects
    associated with them to help decide whether any particular logging request is
    logged or ignored. The filtering decision can be made based on any predefined
    criteria such as levels associated with the log messages or any other application-specific
    filtering criteria.


    The overall control flow of the framework is shown in the UML sequence diagram
    in [Figure 2-1](#LiB0013.html#ch02fig01).


    [![Click To expand](fig2-1.jpg)](fig2-1_0.jpg)

    Figure 2-1: The JDK 1.4 logging API sequence diagram


    The overall framework works like this:


    1.  The application component makes a call to one of the logging methods available
    in the `Logger` object and passes the logging information to it.


    2.  The `Logger` object checks the level associated with the message against its
    own assigned level. If the level of the incoming logging message is the same or
    above its level, then the `Logger` object internally creates a `LogRecord` object
    and uses any `Filter` object associated with it to determine whether to process
    the request or ignore it. The `Logger` will reject any logging request based on
    the filtering criteria defined through the associated `Filter` object or if the
    message''s level falls below the level associated with the `Logger`.


    3.  If it decides to process the message, the `Logger` then passes the internally
    created `LogRecord` object to the associated `Handler` object. The `Handler` object
    in turn checks the level of the `LogRecord` object with its own assigned level.


    4.  If the level condition is satisfied, the record is passed to any `Filter`
    object(s) associated with the `Handler` object. If the associated `Filter` object
    approves the record, then the message is passed to the appropriate `Formatter`
    object attached to that particular `Handler`.


    5.  The `Formatter` object then localizes (if required) and returns the formatted
    logging information back to the `Handler`. Finally, the `Handler` prints the logging
    information to the preferred destination associated with it.


    Note that the `Filter` and `Formatter` objects as shown in [Figure 2-1](#LiB0013.html#ch02fig01)
    are optional to the framework. Often, if these objects are not specified, the
    framework uses the default `Filter` and `Formatter` objects. The default configuration
    of the JDK 1.4 logging API specifies the `SimpleFormatter` object as the default
    `Formatter` to use, and no `Filter` object is used with the root logger. The only
    default filtering activity of the logging API is the level-based filtering.'
