    ## Back Cover


    *Logging in Java with the JDK 1.4 Logging API and Apache log4j* is the first book
    to discuss the two foremost logging APIs: JDK 1.4.0 logging API and Apache log4j
    1.2.6 logging API for application developers. The internals of each API are examined,
    contrasted, and compared in exhaustive depth. Programmers will find a wealth of
    information simply not available elsewhere—not even on the Internet.


    Each concept explained is accompanied by code example written in Java language.
    The book also provides guidelines for extending the existing logging frameworks
    to cater to application-specific needs. This is an essential handbook for logging-related
    information and techniques needed for developing applications in the Java language.


    **About the Author**


    Samudra Gupta holds a post graduate degree in information technology and management
    from All India Management Association, India, and has more than 6 years of experience
    in designing and developing web-based applications ranging from research-based
    projects to e-commerce applications. He started his career as a research engineer
    at the Indian Institute of Technology, Kanpur, India, and is presently working
    as an independent Java consultant in the UK, architecting and developing e-commerce-based
    applications and content management system and retail-based software. Samudra
    also contributes articles to JavaWorld and *Java Developer''s Journal*.


