    \ Double(number).toString());\n         double sqrt = Math.sqrt(number);\n   \
    \      logger.info(\"The sqrt value: \"+sqrt);\n         NDC.pop();\n     }\n\n\
    public static void main(String args[])\n     {\n         LayoutDemo demo = new\
    \ LayoutDemo();\n         demo.computeSquareRoot(22);\n         demo.computeSquareRoot(44);\n\
    \     }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n|  | Note  | Notice\
    \ the use of `NDC.push()` in the beginning of the `computeSquareRoot()` method\
    \ and `NDC.pop()` before leaving the `computeSquareRoot()` method. |\n\nExecuting\
    \ this program will produce the following output to `System.out` in a console:\n\
    \n```\n2002-10-17 [main] INFO com.apress.logging.log4j 44.0 - The sqrt value:\n\
    6.6332495807108\n```\n\nThe output can be divided into the parts described in\
    \ [Table 6-3](#LiB0049.html#ch06table03).\n\nTable 6-3: TTCCLayout Formatting\
    \ Structure\n\n| Information | Meaning |\n| --- | --- |\n| `2002-10-17` | The\
    \ date of the logging activity (Time elapsed from the start of the application\
    \ can also be displayed.) |\n| `[main]` | The thread invoking the logging request\
    \ |\n| `INFO` | The logging level |\n| `com.apress.logging.log4j` | The name of\
    \ the logger |\n| `44.00` | The NDC value |\n| `-` | The separator |\n| `The sqrt\
    \ value`… | The logging message |\n\nAs is evident from the structure of the logging\
    \ information, `TTCCLayout` has seven constituents for the logging information\
    \ it publishes. The appearance of each constituent in the final logging information\
    \ depends on whether the information has been supplied as a part of the `LoggingEvent`\
    \ object to the `TTCCLayout` object. The `TTCCLayout` object controls the appearance\
    \ of the different parts of the logging messages through the bean properties listed\
    \ in [Table 6-4](#LiB0049.html#ch06table04).\n\nTable 6-4: Bean Properties in\
    \ the TTCCLayout Class\n\n| Bean Property | Method | Description | Default |\n\
    | --- | --- | --- | --- |\n| `categoryPrefixing` | `setCategoryPrefixing(boolean)`\
    \ | Specifies whether the name of the category or the logger should be a part\
    \ of the logging information | Defaults to `true` |\n| `contextPrinting` | `setContextPrinting(boolean)`\
    \ | Specifies whether the `NDC` should be a part of the logging information |\
    \ Defaults to `true` |\n| `threadPrinting` | `setThreadPrinting(boolean)` | Specifies\
    \ whether the thread information should be a part of the logging information |\
    \ Defaults to `true` |\n\nAs the `TTCCLayout` class is a direct subclass of `DateLayout`,\
    \ it also inherits the bean properties listed in [Table 6-5](#LiB0049.html#ch06table05)\
    \ from the `DateLayout` class.\n\nTable 6-5: Bean Properties Inherited from DateLayout\n\
    \n| Bean Property | Method | Description | Default |\n| --- | --- | --- | ---\
    \ |\n| `dateFormat` | `setDateFormat(String)` | Sets the date format to be used\
    \ in Java `SimpleDateFormat` style (e.g., `yyyy-MM-dd`) or one of the strings\
    \ NULL, RELATIVE, DATE, ABSOLUTE, or ISO8601 | Defaults to RELATIVE |\n| `timeZone`\
    \ | `setTimeZone(String)` | Time zone specified in the `java.util.TimeZone. getTimeZone(String)`\
    \ method (e.g., GMT-8:00) | Defaults to nothing |\n\nThe log4j `Layout` objects\
    \ can also be configured through configuration files by setting the bean property\
    \ values. For example, [Listing 6-2](#LiB0049.html#ch06ls02) demonstrates how\
    \ to use a configuration file, \"ttcc.properties\", in this example to re-create\
    \ the logger and layout configuration created programmatically in [Listing 6-1](#LiB0049.html#ch06ls01).\n\
    \nListing 6-2: ttcc.properties\n\n| **![Start example](_1.gif)** |\n\n```\n#configuring\
    \ the root logger\nlog4j.rootLogger=DEBUG, CONSOLE\n\n#configuring the named logger\n\
    log4j.logger.com.apress.logging.log4j=DEBUG, CONSOLE\n\n#configuring the appender\
    \ CONSOLE\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\nlog4j.appender.CONSOLE.layout=org.apache.log4j.TTCCLayout"
  trans: "\n### TTCCLayout 对象\n\n`TTCCLayout` 在多用户环境中的效率远高于其他 `Layout` 对象。在继续介绍 log4j\
    \ API 中可用的其他 `Layout` 对象之前，我们先来看看 log4j 如何通过 `TTCCLayout` 处理多用户日志记录环境。\n\n`SimpleLayout`\
    \ 对象采用的格式化风格非常简单。在某些情况下它可能很有用，但在其他情况下，我们可能希望发布关于日志事件的更详细信息。特别是在多线程应用程序中，当多个客户端访问同一个应用程序模块时，发布日志记录的时间、活动线程等信息对于区分两个独立的客户端活动至关重要。另一种区分每个客户端的技术是*嵌套诊断上下文*\
    \ (NDC)。所有这些信息都可以在传递给 `Layout` 对象之前放入 `LoggingEvent` 对象中。\n\n`org.apache.log4j.TTCCLayout`\
    \ 负责呈现日志事件的详细信息。它扩展了 `org.apache.log4j.helpers.DateLayout` 类。通常，它包含以下信息作为日志消息的一部分：\n\
    \n*   *线程：* 发起调用的线程。\n*   *时间：* 自应用程序启动以来经过的毫秒数。\n*   *类别：* 用于创建此日志事件的类别或记录器。\n\
    *   *上下文：* `NDC` 信息。此信息不会自动包含在 `LoggingEvent` 对象中。我们必须按照上一章中的说明，有意将此信息包含在 `LoggingEvent`\
    \ 中。因此，此参数是 `TTCCLayout` 的可选输出，因为它可能不显示任何 `NDC` 数据，尽管如果 `LoggingEvent` 不包含任何 `NDC`\
    \ 数据，`NDC` 设置也会启用。\n\n|  | 注意 | `TTCCLayout` 对象会忽略传递给 `LoggingEvent` 的任何 `java.lang.Throwable`\
    \ 实例。 |\n\n现在，我们将了解如何编写一个简单的程序来说明 `TTCCLayout` 对象提供的格式化功能。为了完整性，我们首先以编程方式配置此示例中使用的记录器，然后在本节后面通过配置文件进行配置。\n\
    \n为了执行编程配置，我们将获取一个命名 `Logger` 的实例，并将一个 `ConsoleAppender` 附加到该记录器实例。为了格式化日志消息，我们还将把一个\
    \ `TTCCLayout` 对象附加到 `ConsoleAppender`。在此示例中，我们将使用 `yyyy-MM-dd` 日期模式实例化一个 `TTCCLayout`\
    \ 对象。这将导致日期被格式化为例如 \"2002-10-20\"。在 `computeSquareRoot()` 方法中，我们将创建一个 `NDC`，并将\
    \ `double` 参数的 `String` 值传递给它。计算平方根后，我们将使用 `logger.info()` 方法打印平方根值。现在我们已经讨论了演示\
    \ `TTCCLayout` 的示例的细节，让我们看一下清单 6-1 `LayoutDemo.java` 中呈现的代码。\n\n清单 6-1: LayoutDemo.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\nimport\
    \ org.apache.log4j.Logger;\nimport org.apache.log4j.ConsoleAppender;\nimport org.apache.log4j.TTCCLayout;\n\
    import org.apache.log4j.NDC;\npublic class LayoutDemo\n{\n     private static\
    \ Logger logger =\nLogger.getLogger(LayoutDemo.class.getPackage().getName());\n\
    \    private ConsoleAppender appender = null;\n     private TTCCLayout layout\
    \ = null;\n\n/** 创建 LayoutDemo 的新实例 */\n     public LayoutDemo()\n     {\n   \
    \      //将父级可加性设置为 false\n         logger.setAdditivity(false);\n\n//初始化布局\n \
    \        layout = new TTCCLayout(\"yyyy-MM-dd\");\n\n//使用布局初始化控制台附加器\n       \
    \  appender = new ConsoleAppender(layout,\"System.out\");\n\n//将控制台附加器添加到记录器\n\
    \         logger.addAppender(appender);\n     }\n\npublic void computeSquareRoot(double\
    \ number)\n     {\n         NDC.push(new Double(number).toString());\n       \
    \  double sqrt = Math.sqrt(number);\n         logger.info(\"平方根值: \"+sqrt);\n\
    \         NDC.pop();\n     }\n\npublic static void main(String args[])\n     {\n\
    \         LayoutDemo demo = new LayoutDemo();\n         demo.computeSquareRoot(22);\n\
    \         demo.computeSquareRoot(44);\n     }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n|  | 注意 | 请注意在 `computeSquareRoot()` 方法开头使用了 `NDC.push()`，并在离开\
    \ `computeSquareRoot()` 方法之前使用了 `NDC.pop()`。 |\n\n执行此程序将在控制台的 `System.out` 中产生以下输出：\n\
    \n```\n2002-10-17 [main] INFO com.apress.logging.log4j 44.0 - 平方根值:\n6.6332495807108\n\
    ```\n\n输出可以分为表 6-3 中描述的部分。\n\n表 6-3: TTCCLayout 格式化结构\n\n| 信息 | 含义 |\n| --- |\
    \ --- |\n| `2002-10-17` | 日志活动的日期（也可以显示从应用程序启动开始经过的时间） |\n| `[main]` | 发起日志请求的线程\
    \ |\n| `INFO` | 日志级别 |\n| `com.apress.logging.log4j` | 记录器的名称 |\n| `44.00` | NDC\
    \ 值 |\n| `-` | 分隔符 |\n| `平方根值`… | 日志消息 |\n\n从日志信息的结构可以明显看出，`TTCCLayout` 为其发布的日志信息包含七个组成部分。每个组成部分在最终日志信息中的出现取决于该信息是否已作为\
    \ `LoggingEvent` 对象的一部分提供给 `TTCCLayout` 对象。`TTCCLayout` 对象通过表 6-4 中列出的 bean 属性来控制日志消息不同部分的显示。\n\
    \n表 6-4: TTCCLayout 类中的 Bean 属性\n\n| Bean 属性 | 方法 | 描述 | 默认值 |\n| --- | --- |\
    \ --- | --- |\n| `categoryPrefixing` | `setCategoryPrefixing(boolean)` | 指定类别或记录器的名称是否应作为日志信息的一部分\
    \ | 默认为 `true` |\n| `contextPrinting` | `setContextPrinting(boolean)` | 指定 `NDC`\
    \ 是否应作为日志信息的一部分 | 默认为 `true` |\n| `threadPrinting` | `setThreadPrinting(boolean)`\
    \ | 指定线程信息是否应作为日志信息的一部分 | 默认为 `true` |\n\n由于 `TTCCLayout` 类是 `DateLayout` 的直接子类，因此它也从\
    \ `DateLayout` 类继承了表 6-5 中列出的 bean 属性。\n\n表 6-5: 从 DateLayout 继承的 Bean 属性\n\n\
    | Bean 属性 | 方法 | 描述 | 默认值 |\n| --- | --- | --- | --- |\n| `dateFormat` | `setDateFormat(String)`\
    \ | 设置要使用的日期格式，采用 Java `SimpleDateFormat` 样式（例如 `yyyy-MM-dd`）或字符串 NULL、RELATIVE、DATE、ABSOLUTE\
    \ 或 ISO8601 之一 | 默认为 RELATIVE |\n| `timeZone` | `setTimeZone(String)` | 在 `java.util.TimeZone.\
    \ getTimeZone(String)` 方法中指定的时区（例如 GMT-8:00） | 默认为空 |\n\nlog4j `Layout` 对象也可以通过配置文件进行配置，方法是设置\
    \ bean 属性值。例如，清单 6-2 演示了如何在此示例中使用配置文件 \"ttcc.properties\" 来重新创建在清单 6-1 中以编程方式创建的记录器和布局配置。\n\
    \n清单 6-2: ttcc.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\n#配置根记录器\nlog4j.rootLogger=DEBUG,\
    \ CONSOLE\n\n#配置命名记录器\nlog4j.logger.com.apress.logging.log4j=DEBUG, CONSOLE\n\n\
    #配置附加器 CONSOLE\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\nlog4j.appender.CONSOLE.layout=org.apache.log4j.TTCCLayout\n"
- fmt: '# Configuring the Layout `TTCCLayout`


    `log4j.appender.CONSOLE.layout.ThreadPrinting=false`

    `log4j.appender.CONSOLE.layout.ContextPrinting=false`

    `log4j.appender.CONSOLE.layout.CategoryPrefixing=false`

    `log4j.appender.CONSOLE.layout.DateFormat=RELATIVE`


    > **Note:** While executing the program with this configuration file, please remember
    to turn off the configuration code in the constructor of the program. It makes
    no sense to do the same configuration in two places.


    In this configuration, we disable the `ThreadPrinting` and `ContextPrinting` bean
    properties. As mentioned in [Table 6-5](#LiB0049.html#ch06table05), the `DateFormat`
    bean property defaults to `RELATIVE`, which means this program will print the
    time elapsed in milliseconds since the program has started.


    Executing the example program in [Listing 6-1](#LiB0049.html#ch06ls01) with this
    configuration file will result in displaying the following logging information
    in the console:


    ```

    40 INFO 22.0 - The sqrt value: 4.69041575982343

    50 INFO 44.0 - The sqrt value: 6.6332495807108

    ```


    Notice the thread and the `NDC` information are now not displayed as a part of
    the logging information, as we have disabled the `ContextPrinting` property.


    > **Caution:** Do not use the same `TTCCLayout` instance in two different `Appender`
    objects. This is not thread-safe.


    ## `DateLayout` Object


    As we have seen in the [previous section](#LiB0049.html#ch06lev2sec2), the `TTCCLayout`
    class uses another class, `DateLayout`, to format its date- and timestamp-related
    information. `DateLayout` is an `abstract` class that extends the `org.apache.log4j.Layout`
    class. It is also a convenience class for handling all date-related formatting
    tasks, and it accepts a `LoggingEvent` object and a date format to format the
    timestamp included in the `LoggingEvent` object.


    The `DateLayout` class has the bean properties listed in [Table 6-6](#LiB0049.html#ch06table06)
    for setting the parameters of date-related formatting tasks.


    **Table 6-6: Bean Properties in the `DateLayout` Class**


    | Bean Property | Method | Description | Default |

    | --- | --- | --- | --- |

    | `dateFormat` | `setDateFormat(String)` | Sets the date format to be used in
    Java `SimpleDateFormat` style (e.g., `yyyy-MM-dd`) or one of the strings `NULL`,
    `RELATIVE`, `DATE`, `ABSOLUTE`, or `ISO8601` | Defaults to `RELATIVE` |

    | `timeZone` | `setTimeZone(String)` | Time zone specified in `java.util.TimeZone.getTimeZone(String)`
    method (e.g., `GMT-8:00`) | Defaults to nothing |


    The date formats used with `DateLayout` have the properties listed in [Table 6-7](#LiB0049.html#ch06table07).


    **Table 6-7: Date Formats in the `DateLayout` Class**


    | Date Format | Meaning |

    | --- | --- |

    | `NULL` | No date or time is displayed. |

    | `RELATIVE` | Displays the time elapsed after the application was started. |

    | `DATE` | Formats the date with the `dd MMM YYYY HH:mm:ss, SSS` pattern— for
    example, `10 Oct 2002 15:30:39,450`. The final `SSS` represents the time elapsed
    after the application was started. |

    | `ABSOLUTE` | Formats a date with the `HH:mm:ss, SSS` pattern—for example, `10:49:33,
    459`. The final `SSS` represents the time elapsed after the application was started.
    |

    | `ISO8601` | Formats a date with the `YYYY-mm-dd HH:mm:ss, SSS` pattern—for example,
    `2002-10-20 10:49:33,459`. |


    Any `Layout` object we want to format and publish the date and timestamp information
    related to logging could potentially use this class to do the formatting of this
    type of information.


    ## `HTMLLayout` Object


    The goal of a well-designed system is to make users comfortable with how information
    is presented to them. In this respect, your application might need to produce
    logging information in a nice HTML-formatted file. `org.apache.log4j.HTMLLayout`
    is an object dedicated to formatting logging information in HTML.


    The `HTMLLayout` class extends the `abstract org.apache.log4j.Layout` class and
    overrides the `format()` method from its base class to provide HTML-style formatting.
    This is a very simple `Layout` object that has the configurable bean properties
    listed in [Table 6-8](#LiB0049.html#ch06table08).


    **Table 6-8: Bean Properties in `HTMLLayout`**


    | Bean Property | Method | Description | Default |

    | --- | --- | --- | --- |

    | `contentType` | `setContentType(String)` | Sets the content type of the HTML
    content. | Defaults to `"text/html"` |

    | `locationInfo` | `setLocationInfo(String)` | Sets the location information for
    the logging event. | Defaults to `false` |

    | `title` | `setTitle(String)` | Sets the title for the HTML content. | Defaults
    to `"Log4j Log Messages"` |


    The `HTMLLayout` object includes the following as a part of the logging information
    it displays:


    * The time elapsed from the start of the application before a particular logging
    event was generated

    * The name of the thread that invoked the logging request

    * The level associated with this logging request

    * The name of the logger

    * The optional location information for the program file and the line number from
    which this logging was invoked

    * The logging message

    * The `NDC` information

    * Any exception that is generated in the application and needs to be logged (This
    is due to the object being able to handle a `java.lang.Throwable` instance.)


    To demonstrate the formatting capability of the `HTMLLayout` object, we will use
    the same program presented in [Listing 6-1](#LiB0049.html#ch06ls01), but pass
    a different configuration file to configure the logger with `HTMLLayout`. [Listing
    6-3](#LiB0049.html#ch06ls03) describes this configuration file, `"html.properties"`.


    **Listing 6-3: `html.properties`**


    ```

    #configuring the custom logger

    log4j.logger.com.apress.logging.log4j=DEBUG, FILE


    log4j.appender.FILE=org.apache.log4j.FileAppender

    log4j.appender.FILE.File=htmlLayout.html


    log4j.appender.FILE.layout=org.apache.log4j.HTMLLayout

    log4j.appender.FILE.layout.Title=HTML Layout Demo

    log4j.appender.FILE.layout.LocationInfo=true

    ```


    In the configuration file, we assign the `FileAppender` object the filename `"htmlLayout.html"`,
    and the logging information will be written to this file. The file will be created
    in the path from which you run the application. The `FileAppender` in turn uses
    `HTMLLayout` to format the logging information. The `HTMLLayout` object has its
    bean properties `LocationInfo` set to `true` and `Title` set to `"HTML Layout
    Demo"`.


    Executing the program with this configuration file will create the `"htmlLayout.html"`
    file containing all the logging information. [Figure 6-2](#LiB0049.html#ch06fig02)
    shows this HTML file.


    [![Click To expand](fig6-2.jpg)](fig6-2_0.jpg)

    **Figure 6-2: The HTML file produced with `HTMLLayout`**'
