- fmt: '#### Level-Based Logging Methods


    The methods listed in [Table 5-1](#LiB0037.html#ch05table01) are level-based logging
    methods in the sense that each method assigns a particular level to the message
    being logged.


    **Table 5-1: Logging Methods in the Logger Class**


    | Method | Description |

    | --- | --- |

    | `public void debug(Object message);` | This method prints messages with the
    level `Level.DEBUG`. |

    | `public void error(Object message);` | This method prints messages with the
    level `Level.ERROR`. |

    | `public void fatal(Object message);` | This method prints messages with the
    level `Level.FATAL`. |

    | `public void info(Object message);` | This method prints messages with the level
    `Level.INFO`. |

    | `public void warn(Object message);` | This method prints messages with the level
    `Level.WARN`. |


    A similar set of methods exists with the message and an instance of the `java.lang.Throwable`
    object. The `Throwable` object denotes the error condition that should be logged
    and contains the stack trace of the application. The `Throwable` instance can
    be `null`. This set of methods helps us log any particularly erroneous situation
    arising within the application, and the stack trace enables us to determine the
    exact location of the error.


    #### Localized Logging


    One thing that makes the Java language so flexible is its localization feature.
    Apache log4j uses this feature to publish localized logging messages, which means
    application logging becomes language independent. This is done through a `java.util.ResourceBundle`
    object and by attaching separate locale-specific message properties files to the
    application.


    The `java.util.ResourceBundle` is a technique to make our program language independent.
    With this technique at the simplest level, we use certain keys within our program.
    These keys map to certain messages (values) and are defined within a properties
    file. The `ResourceBundle` properties files are locale specific. For example,
    we can define messages in English and German in two separate properties files
    named `MyResources_en.properties` and `MyResources_de.properties`. In the program
    we can use the `ResourceBundle` object with the name `MyResource.properties`.
    In a situation where the locale requires German, our program will automatically
    pick up the resource named `MyResources_de.properties`.


    The `ResourceBundle` is specified by invoking the method `Logger.setResourceBundle(ResourceBundle
    name)`. It can also be set via the configuration file as follows:


    ```

    log4j.logger.loggerName.resourceBundle=resourceBundle name

    ```


    The `ResourceBundle` loads the locale-specific properties file containing the
    message key and the localized message value, which the application uses to publish
    messages. The `Logger` class provides the following methods for localized logging,
    and they accept the `Priority` or `Level` object of the logging message, the localization
    key, and a `Throwable` instance:


    ```

    public void 17dlog(Priority p, String key, Throwable t);

    public void 17dlog(Priority p, String key, Object params[], Throwable t);

    ```


    The first method is a straightforward one. It looks for the localized message
    with `key` as the localization key. If the key cannot fetch any value from the
    `ResourceBundle`, then the key itself is used as the message string. The second
    method accepts an array of `Object`, which contains all the parameters to be localized.
    The formatting pattern is obtained that matches the key, and all the parameters
    passed in the array are localized using the `java.text.MessageFormat.format(String,
    Object[])` method.


    #### Generic Logging


    The `Logger` class also allows us to use generic logging methods in situations
    where the level of logging is not predefined. The following sets of methods are
    generic logging methods:


    ```

    public void log(Priority p, Object message);

    public void log(Priority p, Object message, Throwable t);

    public void log(String fqcn, Priority p, Object message, Throwable t);

    ```


    The first two methods are obvious in the sense that they accept the logging level
    and the message object as the argument and optionally a `java.lang.Throwable`
    instance. The last method is the most generic one, and it takes an extra argument,
    `fqcn`, which is the fully qualified name of the caller class. The generic logging
    methods are rarely used directly from an application. But any wrapper class in
    the `Logger` class may tend to use these generic methods internally to print logging
    information.


    All the preceding methods accept a `java.lang.Object` as a parameter, which is
    the message to be printed. This potentially can represent any arbitrary object.
    The `Logger` object passes this object to the associated `Appender` object(s),
    and `Appender` objects in turn pass the message to the `Layout` objects. The `Layout`
    objects will interpret the object and render it into a human-readable format.
    We will discuss this process with the help of `org.apache.log4j.or.ObjectRenderer`
    in [Chapter 6](#LiB0047_split_000.html#389).


    ### Configuration Methods


    The `Logger` class offers a couple of methods to configure the `Logger` instance.
    These methods can add or remove `Appenders` and can set the `Level` of the `Logger`
    instance.


    ```

    public void addAppender(Appender appender)

    public void removeAppender(Appender appender)

    public void removeAppender(String name)

    public void removeAllAppenders()

    public void setLevel(Level level)

    ```


    All these methods are very much self-explanatory. We must be careful in using
    these methods, as they override the default configuration.


    |  | Caution | You should not directly use these methods to set the configuration
    information, as doing so pretty much hard codes the configuration parameters with
    the source code. A better approach is to configure the `Logger` with the external
    configuration file. |


    ### Conditions of Successful Logging


    Use of the logging methods does not guarantee that logging information will be
    published. Logging information is filtered through at various layers before it
    gets printed to a preferred destination, as you may recall from the discussion
    in the "[Overview of the log4j Architecture](#LiB0034.html#271)" section. With
    respect to `Logger`, the main filtering happens at the logging levels. As discussed
    earlier, a logger will have its own level or will inherit the level of its immediate
    parent up in the logger hierarchy recursively. Any logging information will only
    be approved by a logger if and only if the level *p* associated with the logging
    message is equal to or greater than the level *q* assigned to the logger. In other
    words, if *p* >= *q* is satisfied, the logger will approve the message and pass
    it on to the associated `Appender` objects.


    Thus, if a `Logger` has a default level of `WARN`, any attempt to do logging with
    the `info()` method will not produce any logging information.'
