- fmt: '# Overview


    In the [Previous Chapter](#LiB0032_split_000.html#266), we discussed the core
    objects in the log4j API, and learned how they interact with each other to produce
    flexible logging messages. We saw that the initiation of a logging process starts
    with `Logger` objects. The encapsulated logging information is passed to `Appender`
    objects, and `Appender` objects use `Layout` objects to format the logging information
    in a human-readable way before publishing the logging information to a destination.


    How logging information is structured is very important. In a real-life application,
    logging information constitutes more than just debugging messages—it can contain
    vital data about software modules, how they are interacting with each other, and
    other useful information. This information can be reused to maintain and debug
    the application modules. Often it may be necessary to post logging information
    to another error processing program running on a remote machine. In such scenarios,
    it becomes important to agree on a structure for the logging information. This
    is where `Layout` objects come into the picture.


    Apache log4j provides various `Layout` objects, each of which can format logging
    data according to various layouts. It is also possible to create an application-specific
    `Layout` object that formats logging data in an application-specific way. In this
    chapter, we will examine the various `Layout` objects within log4j and learn how
    to use them within an application.


    # The Layout Hierarchy


    The structure of logging information can vary in terms of the message content,
    the type of content, and the way the information is presented. But in abstract
    terms, all logging information can be organized into a header, body, and footer.
    The header may present an introduction to the message; the body contains the logging
    information; and the footer section can contain some hint about the content of
    the message. You can see how this resembles the physical documents that people
    deal with everyday. Bearing this idea in mind, log4j provides an `abstract` class
    called `Layout` that offers a skeleton implementation of all the common operations.
    All other individual `Layout` objects are basically subtypes of this `abstract`
    superclass.


    Individual `Layout` objects differ in the styles they use to format the logging
    information passed to them. These individual `Layout` objects inherit all the
    common operations from their `abstract` superclass and implement their own formatting
    methods. They may optionally override and provide their own implementation of
    any method in the base class. [Figure 6-1](#LiB0048.html#ch06fig01) depicts the
    class diagram of different `Layout` objects within the log4j API.


    [![Click To expand](fig6-1.jpg)](fig6-1_0.jpg)

    Figure 6-1: The Layout object hierarchy


    All `Layout` objects receive a `LoggingEvent` object from the `Appender` objects.
    The `Layout` objects then retrieve the message argument from the `LoggingEvent`
    and apply the appropriate `ObjectRenderer` to obtain the `String` representation
    of the message, as discussed in the [previous chapter](#LiB0032_split_000.html#266).


    # The Layout Objects in log4j


    The top-level class in the hierarchy is the `abstract` class `org.apache.log4j.Layout`.
    This is the base class for all other `Layout` classes in the log4j API. This class
    provides a skeleton implementation of all the common operations across all other
    `Layout` objects and declares two `abstract` methods, listed in [Table 6-1](#LiB0049.html#ch06table01),
    specifically for the subclasses to override.


    Table 6-1: Abstract Methods in the Layout Class


    | Method | Description |

    | --- | --- |

    | `public abstract boolean ignoresThrowable()` | This method indicates whether
    the logging information handles any `java.lang.Throwable` object passed to it
    as a part of the logging event. If the `Layout` object handles the `Throwable`
    object, then the `Layout` object does not ignore it, and returns `false`. |

    | `public abstract String format(LoggingEvent event)` | Individual layout subclasses
    will implement this method for layout-specific formatting. |


    Apart from these `abstract` methods, the `Layout` class provides concrete implementation
    for the methods listed in [Table 6-2](#LiB0049.html#ch06table02).


    Table 6-2: Other Methods in the Layout Class


    | Method | Description |

    | --- | --- |

    | `public String getContentType()` | Returns the content-type used by the `Layout`
    objects. The base class returns text/plain as the default content-type. |

    | `public String getFooter()` | Specifies the footer information of the logging
    message. |

    | `public String getHeader()` | Specifies the header information of the logging
    message. |


    Each subclass can return class-specific information by overriding the concrete
    implementation of these methods.


    As the `Layout` class is defined `abstract` within an application, we never use
    this class directly; instead, we work with its subclasses.


    ## SimpleLayout Object


    `org.apache.log4j.SimpleLayout` provides a very basic structure for the logging
    message. It includes only the level of the logging information and the logging
    message itself. As we saw in the [previous chapter](#LiB0032_split_000.html#266),
    the `LoggingEvent` object can contain other information related to the logging
    activity, such as the time, thread, location information, etc., and producing
    all this information can clutter the logging output.


    It can be a painstaking process to cull the necessary information from the large
    amount of information that is contained within a logging event. In this case,
    `SimpleLayout` proves very useful for publishing quick debugging-style messages.


    In short, the `SimpleLayout` object performs the following actions:


    * It formats the `LoggingEvent` object by only including the level information
    and the message and ignores all other information.


    * It does not handle the `java.lang.Throwable` instance passed through the logging
    event, and the `ignoresThrowable()` method returns `true`.


    An example message formatted with `SimpleLayout` can look like the following:


    ```

    INFO - "A Message"

    ```


    The structure of the formatting is the level information, followed by a hyphen
    sign (-), and the logging message.


    |  | Note | As `SimpleLayout` is a closed system, there is no configuration parameter
    for this layout. This object always formats the logging information the same way,
    with the same style. |'
  raw: '## Overview


    In the [Previous Chapter](#LiB0032_split_000.html#266), we discussed the core
    objects in the log4j API, and learned how they interact with each other to produce
    flexible logging messages. We saw that the initiation of a logging process starts
    with `Logger` objects. The encapsulated logging information is passed to `Appender`
    objects, and `Appender` objects use `Layout` objects to format the logging information
    in a human-readable way before publishing the logging information to a destination.


    How logging information is structured is very important. In a real-life application,
    logging information constitutes more than just debugging messages—it can contain
    vital data about software modules, how they are interacting with each other, and
    other useful information. This information can be reused to maintain and debug
    the application modules. Often it may be necessary to post logging information
    to another error processing program running on a remote machine. In such scenarios,
    it becomes important to agree on a structure for the logging information. This
    is where `Layout` objects come into the picture.


    Apache log4j provides various `Layout` objects, each of which can format logging
    data according to various layouts. It is also possible to create an application-specific
    `Layout` object that formats logging data in an application-specific way. In this
    chapter, we will examine the various `Layout` objects within log4j and learn how
    to use them within an application.


    ## The Layout Hierarchy


    The structure of logging information can vary in terms of the message content,
    the type of content, and the way the information is presented. But in abstract
    terms, all logging information can be organized into a header, body, and footer.
    The header may present an introduction to the message; the body contains the logging
    information; and the footer section can contain some hint about the content of
    the message. You can see how this resembles the physical documents that people
    deal with everyday. Bearing this idea in mind, log4j provides an `abstract` class
    called `Layout` that offers a skeleton implementation of all the common operations.
    All other individual `Layout` objects are basically subtypes of this `abstract`
    superclass.


    Individual `Layout` objects differ in the styles they use to format the logging
    information passed to them. These individual `Layout` objects inherit all the
    common operations from their `abstract` superclass and implement their own formatting
    methods. They may optionally override and provide their own implementation of
    any method in the base class. [Figure 6-1](#LiB0048.html#ch06fig01) depicts the
    class diagram of different `Layout` objects within the log4j API.


    [![Click To expand](fig6-1.jpg)](fig6-1_0.jpg)

    Figure 6-1: The Layout object hierarchy


    All `Layout` objects receive a `LoggingEvent` object from the `Appender` objects.
    The `Layout` objects then retrieve the message argument from the `LoggingEvent`
    and apply the appropriate `ObjectRenderer` to obtain the `String` representation
    of the message, as discussed in the [previous chapter](#LiB0032_split_000.html#266).


    ## The Layout Objects in log4j


    The top-level class in the hierarchy is the `abstract` class `org.apache.log4j.Layout`.
    This is the base class for all other `Layout` classes in the log4j API. This class
    provides a skeleton implementation of all the common operations across all other
    `Layout` objects and declares two `abstract` methods, listed in [Table 6-1](#LiB0049.html#ch06table01),
    specifically for the subclasses to override.


    Table 6-1: Abstract Methods in the Layout Class


    | Method | Description |

    | --- | --- |

    | `public abstract boolean ignoresThrowable()` | This method indicates whether
    the logging information handles any `java.lang.Throwable` object passed to it
    as a part of the logging event. If the `Layout` object handles the `Throwable`
    object, then the `Layout` object does not ignore it, and returns `false`. |

    | `public abstract String format(LoggingEvent event)` | Individual layout subclasses
    will implement this method for layout-specific formatting. |


    Apart from these `abstract` methods, the `Layout` class provides concrete implementation
    for the methods listed in [Table 6-2](#LiB0049.html#ch06table02).


    Table 6-2: Other Methods in the Layout Class


    | Method | Description |

    | --- | --- |

    | `public String getContentType()` | Returns the content-type used by the `Layout`
    objects. The base class returns text/plain as the default content-type. |

    | `public String getFooter()` | Specifies the footer information of the logging
    message. |

    | `public String getHeader()` | Specifies the header information of the logging
    message. |


    Each subclass can return class-specific information by overriding the concrete
    implementation of these methods.


    As the `Layout` class is defined `abstract` within an application, we never use
    this class directly; instead, we work with its subclasses.


    ### SimpleLayout Object


    `org.apache.log4j.SimpleLayout` provides a very basic structure for the logging
    message. It includes only the level of the logging information and the logging
    message itself. As we saw in the [previous chapter](#LiB0032_split_000.html#266),
    the `LoggingEvent` object can contain other information related to the logging
    activity, such as the time, thread, location information, etc., and producing
    all this information can clutter the logging output.


    It can be a painstaking process to cull the necessary information from the large
    amount of information that is contained within a logging event. In this case,
    `SimpleLayout` proves very useful for publishing quick debugging-style messages.


    In short, the `SimpleLayout` object performs the following actions:


    *   It formats the `LoggingEvent` object by only including the level information
    and the message and ignores all other information.


    *   It does not handle the `java.lang.Throwable` instance passed through the logging
    event, and the `ignoresThrowable()` method returns `true`.


    An example message formatted with `SimpleLayout` can look like the following:


    ```

    INFO - "A Message"

    ```


    The structure of the formatting is the level information, followed by a hyphen
    sign (-), and the logging message.


    |  | Note  | As `SimpleLayout` is a closed system, there is no configuration parameter
    for this layout. This object always formats the logging information the same way,
    with the same style. |'
  trans: '

    ## 概述


    在上一章中，我们讨论了 log4j API 中的核心对象，并了解了它们如何相互交互以生成灵活的日志消息。我们看到，日志记录过程的启动始于 `Logger`
    对象。封装后的日志信息被传递给 `Appender` 对象，而 `Appender` 对象则使用 `Layout` 对象将日志信息格式化为人类可读的形式，然后再将日志信息发布到目标位置。


    日志信息的结构非常重要。在实际应用中，日志信息不仅仅包含调试消息——它还可能包含关于软件模块、模块间交互方式以及其他有用信息的关键数据。这些信息可被重复用于维护和调试应用程序模块。通常，可能需要将日志信息发布到远程机器上运行的另一个错误处理程序。在这种情况下，就日志信息的结构达成一致变得至关重要。这正是
    `Layout` 对象发挥作用的地方。


    Apache log4j 提供了多种 `Layout` 对象，每种对象都能根据不同的布局格式化日志数据。此外，还可以创建特定于应用程序的 `Layout`
    对象，以特定于应用程序的方式格式化日志数据。在本章中，我们将研究 log4j 中的各种 `Layout` 对象，并学习如何在应用程序中使用它们。


    ## 布局层次结构


    日志信息的结构在消息内容、内容类型以及信息呈现方式上可能有所不同。但抽象来说，所有日志信息都可以组织为页眉、正文和页脚。页眉可能呈现消息的引言；正文包含日志信息；页脚部分可以包含关于消息内容的一些提示。你可以看到这与人们日常处理的物理文档何其相似。基于这一理念，log4j
    提供了一个名为 `Layout` 的 `abstract` 类，它为所有常见操作提供了骨架实现。所有其他单独的 `Layout` 对象本质上都是这个 `abstract`
    超类的子类型。


    各个 `Layout` 对象在格式化传递给它们的日志信息时所使用的样式有所不同。这些单独的 `Layout` 对象从其 `abstract` 超类继承所有常见操作，并实现自己的格式化方法。它们可以选择性地重写基类中的任何方法，并提供自己的实现。图
    6-1 展示了 log4j API 中不同 `Layout` 对象的类图。


    ![点击展开](img/fig6-1_0.jpg)

    图 6-1：Layout 对象层次结构


    所有 `Layout` 对象都从 `Appender` 对象接收一个 `LoggingEvent` 对象。然后，`Layout` 对象从 `LoggingEvent`
    中检索消息参数，并应用适当的 `ObjectRenderer` 来获取消息的 `String` 表示形式，如上一章所述。


    ## log4j 中的 Layout 对象


    层次结构中的顶层类是 `abstract` 类 `org.apache.log4j.Layout`。这是 log4j API 中所有其他 `Layout`
    类的基类。该类为所有其他 `Layout` 对象的常见操作提供了骨架实现，并声明了两个 `abstract` 方法，列于表 6-1 中，专门供子类重写。


    表 6-1：Layout 类中的抽象方法


    | 方法 | 描述 |

    | --- | --- |

    | `public abstract boolean ignoresThrowable()` | 此方法指示日志信息是否处理作为日志事件一部分传递给它的任何
    `java.lang.Throwable` 对象。如果 `Layout` 对象处理 `Throwable` 对象，则 `Layout` 对象不会忽略它，并返回
    `false`。 |

    | `public abstract String format(LoggingEvent event)` | 各个布局子类将实现此方法以进行特定于布局的格式化。
    |


    除了这些 `abstract` 方法之外，`Layout` 类还为表 6-2 中列出的方法提供了具体实现。


    表 6-2：Layout 类中的其他方法


    | 方法 | 描述 |

    | --- | --- |

    | `public String getContentType()` | 返回 `Layout` 对象使用的内容类型。基类返回 text/plain 作为默认内容类型。
    |

    | `public String getFooter()` | 指定日志消息的页脚信息。 |

    | `public String getHeader()` | 指定日志消息的页眉信息。 |


    每个子类可以通过重写这些方法的具体实现来返回特定于类的信息。


    由于 `Layout` 类在应用程序中被定义为 `abstract`，我们从不直接使用此类；相反，我们使用其子类。


    ### SimpleLayout 对象


    `org.apache.log4j.SimpleLayout` 为日志消息提供了非常基础的结构。它仅包含日志信息的级别和日志消息本身。正如我们在上一章中所见，`LoggingEvent`
    对象可以包含与日志活动相关的其他信息，例如时间、线程、位置信息等，而生成所有这些信息可能会使日志输出变得杂乱。


    从日志事件中包含的大量信息中筛选出必要信息可能是一个繁琐的过程。在这种情况下，`SimpleLayout` 对于发布快速的调试风格消息非常有用。


    简而言之，`SimpleLayout` 对象执行以下操作：


    *   它通过仅包含级别信息和消息来格式化 `LoggingEvent` 对象，并忽略所有其他信息。


    *   它不处理通过日志事件传递的 `java.lang.Throwable` 实例，并且 `ignoresThrowable()` 方法返回 `true`。


    使用 `SimpleLayout` 格式化的示例消息可能如下所示：


    ```

    INFO - "A Message"

    ```


    格式化的结构是级别信息，后跟连字符 (-)，然后是日志消息。


    |  | 注意  | 由于 `SimpleLayout` 是一个封闭系统，此布局没有配置参数。此对象始终以相同的方式、相同的样式格式化日志信息。 |

