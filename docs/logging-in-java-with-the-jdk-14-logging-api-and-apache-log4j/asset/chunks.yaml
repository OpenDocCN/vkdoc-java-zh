  trans: "\n## 概述\n\n本章专门介绍使用 log4j API 进行日志记录的高级主题。将日志信息写入控制台或文件在灵活性和可重用性方面存在局限。打印到控制台的日志信息相当短暂，一旦应用程序退出当前运行实例，这些信息很可能会消失。因此，基于控制台的日志信息更适合开发阶段的调试消息。\n\
    \n另一方面，将日志信息打印到系统本地文件效率低下，因为其他可能使用相同日志信息的应用程序很难访问它。要使这些信息对其他应用程序模块可访问，将需要额外的工作。\n\
    \n尽管日志记录的一个重要方面是支持应用程序模块的远程调试和套接字管理，但使日志数据可被远程应用程序模块访问也同样重要。有时，日志数据的性质是敏感的，可能需要在数据库中维护日志信息的历史记录。在其他场景中，当我们想要实时处理任何敏感的日志数据时，我们可能希望通过\
    \ TCP/IP 套接字将数据发布到另一个准备响应发送给它的信息的服务器组件。此外，我们可能需要维护一个订单处理系统，其中某些特定于客户的日志信息会通过电子邮件发送给相应的客户。这些只是我们可能希望用日志信息实现的众多可能性中的一小部分。\n\
    \n可以说，在大多数正常的应用场景中，基于文件的日志记录就足够了。然而，在分布式计算场景中，可能会出现我们需要分布式日志记录功能的情况。在这种情况下，log4j\
    \ 的强大功能使我们能够充分利用其日志记录特性。\n\nlog4j API 通过提供不同的 `Appender` 对象来处理所讨论的许多情况。这个列表可能并不详尽，也可能无法满足不同应用程序可能出现的所有特定情况，但对于大多数常见的应用场景来说已经足够了。如果应用程序需要不同的功能，该\
    \ API 提供了灵活的设计，使我们能够在 API 中集成自定义对象，或扩展现有框架以满足应用程序的特定需求。\n\n在本章中，我们将讨论如何通过以下方式分发和存储日志数据：\n\
    \n*   将日志信息写入数据库\n*   使用 Java 消息服务 (JMS) 分发日志数据\n*   通过简单邮件传输协议 (SMTP) 分发日志数据\n\
    *   通过 TCP/IP 套接字发送日志数据\n*   使用 Telnet 协议将日志数据上传到远程机器\n*   将日志数据存储在特定于操作系统的事件日志中\n\
    \n在接下来的几节中，我们将逐一讨论 log4j API 中提供的不同 `Appender` 对象，以及它们如何完成管理和分发日志数据的任务。\n\n##\
    \ 一个高级日志记录示例应用\n\n我们将首先创建一个简单的程序，在本章中我们将使用它来演示不同高级 `Appender` 对象的功能。该程序获取一个命名的日志记录器实例\
    \ `com.apress.logging.log4j`。`deposit()` 和 `withdraw()` 方法分别向账户存入和取出一些金额。存入的金额会加到余额中。`withdraw()`\
    \ 方法仅在资金充足时才允许取款，然后从当前余额中扣除取出的金额。如果余额不足，该程序将向用户打印一条消息。\n\n该应用程序为这两个方法记录活动，并使用用户名作为\
    \ `NDC` 信息。该应用程序还记录每个操作的成功和失败。清单 7-1 `AdvancedLogging.java` 是所描述业务过程的一个示例实现。\n\
    \n清单 7-1: AdvancedLogging.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage\
    \ com.apress.logging.log4j;\n\nimport org.apache.log4j.Logger;\nimport org.apache.log4j.NDC;\n\
    public class AdvancedLogging\n{\n    private static Logger logger =\nLogger.getLogger(AdvancedLogging.class.getPackage().getName());\n\
    \    private String userName = null;\n    private double balance;\n\n    /** 创建\
    \ AdvancedLogging 的一个新实例 */\n    public AdvancedLogging(String user)\n    {\n\
    \        this.userName = user;\n    }\n    /**\n     *存入一些金额\n     */\n    public\
    \ void deposit(double amount)\n    {\n        NDC.push(userName);\n        balance\
    \ += amount;\n        logger.info(\"存入 \"+amount+\" 新余额: \"+balance);\n      \
    \  NDC.pop();\n    }\n    /**\n     *取出一些金额\n     */\n    public void withdraw(double\
    \ amount)\n    {\n        NDC.push(userName);\n        if(balance>=amount)\n \
    \       {\n            balance -= amount;\n            logger.info(\"取出 \"+amount+\"\
    \ 新余额: \"+balance);\n        }else\n        {\n            System.out.println(\"\
    余额不足\");\n            logger.error(\"取款失败: 余额: \"+balance+\" 尝试取款: \"+amount);\n\
    \        }\n        NDC.pop();\n    }\n    public static void main(String args[])\n\
    \    {\n        AdvancedLogging demo = new AdvancedLogging(\"sam\");\n       \
    \ demo.depositBalance(100.50);\n        demo.withDraw(80);\n        demo.withDraw(50);\n\
    \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n"
- fmt: '# Logging to a Database with JDBCAppender


    It is often a good practice to store the required logging data in a database.
    This serves two purposes: First, the data is persisted, and second, the data can
    be accessed and analyzed by the applications residing outside the domain of the
    application being logged.


    The log4j API provides the `org.apache.log4j.jdbc.JDBCAppender` object, which
    is capable of putting logging information in a specified database. It does simplistic
    jobs such as opening a database connection by reading JDBC connection parameters
    passed to it, writing the data to one or more tables following a specified SQL
    statement, and closing the connection. We can extend the functionality of the
    `JDBCAppender` object to meet our needs. At the present moment, `JDBCAppender`
    operates in the following manner:


    * It has a buffered implementation. The logging events passed to it are stored
    in a buffer of a predefined size. Once the maximum size of the buffer is reached,
    the buffer is flushed, and the data is written to the table, following the specified
    SQL statement.


    * It opens a single connection to the database and maintains the connection until
    the appender is closed.


    * As the SQL operation can be INSERT, UPDATE, or DELETE for a particular record,
    `JDBCAppender` cleverly uses the `executeUpdate()` method of the `java.sql.Statement`
    object. This gives the flexibility to execute any type of SQL statement. The decision
    whether to insert, update, or delete a particular logging record is up to the
    application developer to decide and is specified by the SQL statement in the configuration
    file. `JDBCAppender` will make no decision regarding the nature of the SQL statement.
    It merely executes the SQL statement passed to it.


    * Although `JDBCAppender` does not decide the nature of the SQL statement to be
    executed, it is responsible for maintaining the integrity of the logging event
    that is being logged. The methods in `JDBCAppender` are not `synchronized` to
    keep its performance intact. This can potentially create a problem of data integrity.
    Before all the elements of the buffer are written to the database, another logging
    request might arrive. The buffer will get the new logging event appended to it.
    Recognizing this new data in the buffer, `JDBCAppender` will again try to iterate
    through the buffer to write all the elements in it to the database. This can lead
    to attempting to write duplicate data in the database, which will surely result
    in database error.


    * To avoid the problem just mentioned, after each element of the buffer is written
    to the database, `JDBCAppender` stores it in a secondary buffer. In the end, it
    compares the primary buffer with the elements in the secondary buffer, and removes
    from the primary buffer all the elements that are present in the secondary buffer.
    This ensures that no duplicate element is retained in the primary buffer.


    * `JDBCAppender` provides a `close()` method to release any database resource
    obtained. In theory, the `close()` method can be called at any time in an application''s
    lifetime. Moreover, when the application terminates by calling the `LogManager.shutdown()`
    method, the `close()` method of every appender active in the system is called.
    This might result in a loss of data if the `close()` method is called before a
    `JDBCAppender` instance can finish its writing operation. To make sure that data
    is not lost, the `close()` method in the `JDBCAppender` flushes the primary buffer
    to ensure that the data already in the buffer gets written to the database.


    ## Configuring JDBCAppender


    Before we proceed to an example of `JDBCAppender` in action, it is important to
    first understand how to configure `JDBCAppender` objects. `JDBCAppender` has the
    configurable bean properties listed in [Table 7-1](#LiB0053.html#ch07table01).


    **Table 7-1: Bean Properties in the JDBCAppender Class**


    | Bean Property | Method | Description | Default |

    | --- | --- | --- | --- |

    | `bufferSize` | `setBufferSize(int)` | Sets the buffer size | Default size is
    1. |

    | `driver` | `setDriver(String)` | Sets the driver class to the specified string
    | If no driver class is specified, defaults to `sun.jdbc.odbc.JdbcOdbcDriver`.
    |

    | `layout` | `setLayout(String)` | Sets the layout to be used | Defaults to `org.apache.log4j.PatternLayout`.
    |

    | `password` | `setPassword(String)` | Sets the password against the user name
    specified to obtain a connection to the database | User must specify a valid password
    to access the database. |

    | `URL` | `setURL(String)` | Sets the JDBC URL | Defaults to some arbitrary value.
    User must specify a proper JDBC URL. |

    | `user` | `setUser(String)` | Sets the user name to be used to obtain a connection
    to the specified database | User must specify a valid user name to access the
    database. |


    ## Creating a Table for Storing Logging Information


    [Listing 7-2](#LiB0053.html#ch07ls02) describes the SQL statement to create a
    table named `LOGGING_DATA` to store logging information.


    **Listing 7-2: SQL for Creating the LOGGING_DATA Table**


    ```

    CREATE TABLE LOGGING_DATA

    ("USER_ID" VARCHAR2(10) NOT NULL,

    "DATE" VARCHAR2(10) NOT NULL,

    "LOGGER" VARCHAR2(50) NOT NULL,

    "LEVEL" VARCHAR2(10) NOT NULL,

    "MESSAGE" VARCHAR2(1000) NOT NULL)

    ```


    ## Configuration File for Using with JDBCAppender


    [Listing 7-3](#LiB0053.html#ch07ls03), "jdbc.properties", describes the configuration
    file we will be using to log messages to a database table.


    **Listing 7-3: jdbc.properties**


    ```

    #configuring the custom logger

    log4j.logger.com.apress.logging.log4j=DEBUG, DB


    log4j.appender.DB=org.apache.log4j.jdbc.JDBCAppender

    log4j.appender.DB.URL=jdbc:odbc:dbdef

    log4j.appender.DB.user=system

    log4j.appender.DB.password=manager

    log4j.appender.DB.sql=INSERT INTO LOGGING_DATA VALUES(''%x'',''%d{yyyy-MM-

    dd}'',''%C'',''%p'',''%m'')

    ```


    In the configuration file we assign a level of `DEBUG` and a `JDBCAppender` to
    the named logger `com.apress.logging.log4j`. The `JDBCAppender` object is given
    the following configuration parameters:


    * Database URL to connect to is `jdbc:odbc:dbdef`, where `dbdef` is the name of
    the database we are connecting to.


    * The user ID to connect to the database is `system` and the password is `manager`.


    * The SQL to execute is an INSERT statement with the table name `LOGGING_DATA`
    and values to be entered into the table. Notice that the values are specified
    following a `PatternLayout` (refer to the [previous chapter](#LiB0047_split_000.html#389)
    for details on `PatternLayout` objects). The values specified follow the same
    order as the table columns and inserts the `NDC`, the date of logging, the fully
    qualified name of the logger, the level of logging, and finally the logging message
    itself.


    Executing this program with the "jdbc.properties" file as the configuration file
    will write the data to the database. [Figure 7-1](#LiB0053.html#ch07fig01) presents
    an HTML report of the data stored in the table `LOGGING_DATA`.


    [![Click To expand](fig7-1.jpg)](fig7-1_0.jpg)

    **Figure 7-1: The LOGGING_DATA table**


    Perhaps you have noticed that no JDBC programming has to be done to write the
    data to the database. It is all done within `JDBCAppender`. Also, notice this
    example demonstrates the power of log4j in that the destination of the logging
    information can be changed by merely changing the configuration file passed to
    it, requiring no code change at all.'
