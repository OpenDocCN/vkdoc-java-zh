- fmt: "### An Example of Using `JMSAppender`\n\nTo see an example of how `JMSAppender`\
    \ works, let's reuse the example in [Listing 7-1](#LiB0052.html#446). To direct\
    \ logging information to a JMS destination, we merely need to change the configuration\
    \ file passed to the log4j runtime. [Listing 7-6](#LiB0054.html#ch07ls06), \"\
    jms.properties\", shows the sample configuration file we will use to configure\
    \ `JMSAppender`.\n\n**Listing 7-6: jms.properties**\n\n```\n#configuring the custom\
    \ logger\nlog4j.logger.com.apress.logging.log4j=DEBUG, JMS\n\n#configuring the\
    \ JMS appender\nlog4j.appender.JMS=org.apache.log4j.net.JMSAppender\nlog4j.appender.JMS.topicConnectionFactoryBindingName=TopicConnectionFactory\n\
    log4j.appender.JMS.topicBindingName=loggingTopic\n```\n\nIn this example, we use\
    \ the JMS provider implemented by the J2EE 1.3.1. To work with J2EE, the `JMSAppender`\
    \ object will just need to create a default `JNDIContext` object by using the\
    \ following line of code:\n\n```\nInitialContext jndiContext = new InitialContext();\n\
    ```\n\nThis is the reason we do not need to pass the other configuration information\
    \ to `JMSAppender`. The only configuration items that we pass to `JMSAppender`\
    \ are `topicConnectionFactoryBindingName` and `topicBindingName`. Notice the Topic\
    \ name we are using is `loggingTopic`.\n\nWith this minimum configuration, we\
    \ will be able to use `JMSAppender` in our example application. We also need a\
    \ Subscriber application that will read the messages posted in the Topic named\
    \ `loggingTopic`. We will create a JMS sample program that listens to the Topic\
    \ named `loggingTopic` and prints the relevant information to the console. It\
    \ performs the following steps to subscribe to the named JMS Topic and then read\
    \ the message sent to it:\n\n1.  The program first obtains an initial JNDI context.\n\
    2.  It creates a connection Factory object with the name `TopicConnectionFactory`.\n\
    3.  The program then uses the Topic name passed through the command line at the\
    \ startup of this program and creates a Topic object.\n4.  It obtains a connection\
    \ to the Topic and opens a session with the `AUTO_ACKNOWLEDGE` mode. This means\
    \ that the Subscriber will automatically acknowledge the receipt of the message.\
    \ As soon as this receipt is sent, the Topic will no longer retain the message.\n\
    5.  The program subscribes to the Topic.\n6.  A custom message listener object,\
    \ `LogMessageListener`, is attached to the Subscriber object created with the\
    \ Topic session.\n7.  The Subscriber is now ready to listen to the Topic for any\
    \ messages.\n\n[Listing 7-7](#LiB0054.html#ch07ls07), `JMSLogSubscriber.java`,\
    \ is an example implementation of a JMS Subscriber.\n\n**Listing 7-7: JMSLogSubscriber.java**\n\
    \n```\npackage com.apress.logging.log4j;\n\nimport javax.jms.*;\nimport javax.naming.*;\n\
    \npublic class JMSLogSubscriber {\n\n    /** Creates a new instance of JMSLogSubscriber\
    \ */\n    public JMSLogSubscriber() {\n    }\n\n    public static void main(String\
    \ args[]) {\n        Context ctx;\n        Topic topic;\n        TopicSubscriber\
    \ topicSubscriber;\n        TextMessage message;\n        TopicConnectionFactory\
    \ topicFactory;\n        TopicConnection topicConnection;\n        TopicSession\
    \ topicSession;\n        //collect the topic name from command line\n        String\
    \ topicName = args[0];\n        try {\n            //creating a default J2EE initial\
    \ context\n            ctx = new InitialContext();\n            //obtaining the\
    \ topic connection factory\n            topicFactory =\n(TopicConnectionFactory)ctx.lookup(\"\
    TopicConnectionFactory\");\n            //creating the topic\n            topic\
    \ = (Topic)ctx.lookup(topicName);\n            //opening a topic connection\n\
    \            topicConnection = topicFactory.createTopicConnection();\n       \
    \     //creating a session to AUTO_ACKNOWLEDGE the receipt of the\n          \
    \  //message\n            topicSession = topicConnection.createTopicSession(false,\n\
    \            Session.AUTO_ACKNOWLEDGE);\n            //subscribe to the topic\n\
    \            topicSubscriber = topicSession.createSubscriber(topic);\n       \
    \     //custom listener to listen to the topic for any message and\n         \
    \   //handle it\n            LogMessageListener listener = new LogMessageListener();\n\
    \            //adding the listener to this subscriber\n            topicSubscriber.setMessageListener(listener);\n\
    \            //start the session\n            topicConnection.start();\n     \
    \   }catch(Exception e) {\n            System.out.println(e.toString());\n   \
    \     }\n    }\n}\n```\n\nThis program uses a custom listener object to listen\
    \ to the Topic for any message. There is an alternative to this technique. The\
    \ Subscriber can call the `receive()` method to obtain any message from the Topic.\
    \ However, this is a *synchronous* mode of receiving and processing messages.\
    \ The `receive()` method explicitly fetches the messages from the Topic. This\
    \ method can block until a message arrives or can timeout if a message does not\
    \ arrive within a specified time limit. By attaching a `MessageListener` object\
    \ to the Subscriber, the Subscriber can *asynchronously* receive the message.\
    \ As soon as a message arrives, the JMS provider will notify the `MessageListener`\
    \ by invoking its `onMessage()` method.\n\n[Listing 7-8](#LiB0054.html#ch07ls08),\
    \ `LogMessageListener.java`, is a `MessageListener` implementation for listening\
    \ to a Topic. It provides an implementation for the `onMessage()` method. Within\
    \ the `onMessage()` method, it checks for the message type. `JMSAppender` posts\
    \ `LoggingEvent` objects as the `ObjectMessage` type to the Topic. Thus, `LogMessageListener`\
    \ checks for the `ObjectMessage`, casts it back to the `LoggingEvent` object,\
    \ and obtains all the information from the `LoggingEvent` object.\n\n**Listing\
    \ 7-8: LogMessageListener.java**\n\n```\npackage com.apress.logging.log4j;\n\n\
    import javax.jms.*;\nimport org.apache.log4j.spi.LoggingEvent;\n\npublic class\
    \ LogMessageListener implements MessageListener{\n\n    /** Creates a new instance\
    \ of LogMessageListener */\n    public LogMessageListener() {\n    }\n\n    /**\n\
    \     * This method listens to any message coming to the subscribe topic,\n  \
    \   * checks if correct type\n     * and prints the content.\n     ***/\n    public\
    \ void onMessage(Message message) {\n        TextMessage msg = null;\n       \
    \ try {\n            if(message instanceof ObjectMessage){\n            System.out.println(\"\
    Message received: \");\n            ObjectMessage obj = (ObjectMessage)message;\n\
    \            LoggingEvent event = (LoggingEvent)obj.getObject();\n           \
    \ System.out.println(\"The logger name:\n\"+event.getLoggerName());\n        \
    \    System.out.println(\"The message:\n\"+event.getMessage().toString());\n \
    \       }else {\n\n            System.out.println(\"Message of wrong type: \"\
    \ +\n            message.getClass().getName());\n        }\n    } catch (JMSException\
    \ e) {\n        System.out.println(\"JMSException in onMessage(): \" +\n     \
    \   e.toString());\n        } catch (Throwable t) {\n            System.out.println(\"\
    Exception in onMessage():\" +\n            t.getMessage());\n        }\n    }\n\
    }\n```\n\nThe `LogMessageListener` prints only the logger name and the message\
    \ encapsulated within the `LoggingEvent` object. Arguably, it can extract all\
    \ the information from the `LoggingEvent` object and process it in the way it\
    \ wants to. This example has been kept simple to demonstrate how the JMS works\
    \ with log4j.\n\n### Executing the JMS-Based Logging Example\n\nTo see the example\
    \ in action, we need to go through the steps presented in the next sections."
