    ### Writing the Configuration Class\n\nOnce we have loaded log4j configuration\
    \ information from the database, we need some way to access that information and\
    \ configure log4j. In order to do this, we must write a custom configuration class\
    \ to read the data from the database and configure the log4j framework. The log4j\
    \ API already provides two classes for configuration: `BasicConfigurator`, which\
    \ is capable of providing very basic configuration to the log4j framework, and\
    \ `DOMConfigurator`, which is capable of loading configuration information from\
    \ an XML file. We can write our own configuration class to configure the log4j\
    \ framework from a database. Before we proceed to do that, let's see how the configuration\
    \ takes place within the log4j framework.\n\n[Figure 8-3](#LiB0062.html#ch08fig03)\
    \ shows the sequence of the log4j initialization. Each time we try to obtain a\
    \ `Logger` by calling `Logger.getLogger(loggerName)`, the `LogManager` class gets\
    \ initialized. `LogManager` collects and inspects the system properties supplied\
    \ to log4j from the command line. Remember, this is happening at class loading\
    \ time of the `LogManager` in a `static` block, and this takes place once and\
    \ only once. `LogManager` detects the configuration files specified via the command\
    \ line system properties. It then calls the `OptionConverter` helper class to\
    \ parse the information contained in the files. The `OptionConverter` class instantiates\
    \ an appropriate `Configurator` class and calls the `doConfigure()` method to\
    \ complete the configuration process.\n\n[![Click To expand](fig8-3.jpg)](fig8-3_0.jpg)\n\
    Figure 8-3: The log4j configuration process\n\nThe present state of log4j relies\
    \ on the fact that configuration information should be specified in a configuration\
    \ file accessible through a URL. If no configuration resource file is specified,\
    \ it tries to look for its default configuration file, `log4j.properties`, in\
    \ the classpath of your application.\n\n> **Note:** Starting with version 1.2.7,\
    \ log4j looks for a `log4j.xml` or `log4j.properties` file in the classpath.\n\
    \nIn case it cannot locate any configuration file, log4j exits, and application\
    \ logging will no longer work. It is possible to override the way configuration\
    \ is done by writing a custom configuration class that reads the configuration\
    \ file from a location over the network. But this is restricted only to the protocols\
    \ supported by the `java.net.URL` object.\n\nAny custom configuration class we\
    \ write must implement an interface named `Configurator` in log4j. The `Configurator`\
    \ interface defines a single method, `doConfigure(URL, LoggerRepository)`, which\
    \ is the method in which the configuration takes place.\n\nWe have already seen\
    \ that the log4j framework uses URL-based configuration. In our example, we wish\
    \ to configure log4j by reading the configuration information from a database.\
    \ Apparently, there is a conflict of interest here. But we will be a little bit\
    \ clever by exploiting the existing framework to do our job. We will use a configuration\
    \ file that will contain information related to obtaining a connection to the\
    \ database. `DBConfigurator` will parse this configuration file and use the `DBConfigLoader`\
    \ class to read the configuration information from the database. It will then\
    \ obtain the `java.util.Properties` object from `DBConfigLoader`, which contains\
    \ all the configuration information. The `DBConfigurator` class then uses the\
    \ `org.apache.log4j.PropertyConfigurator` class to actually configure log4j by\
    \ passing it the `Properties` object.\n\n[Listing 8-6](#LiB0062.html#ch08ls06),\
    \ `DBConfigurator.java`, shows the custom configuration class we will use to configure\
    \ the log4j framework.\n\n**Listing 8-6: DBConfigurator.java**\n\n```java\npackage\
    \ com.apress.logging.log4j;\n\nimport org.apache.log4j.spi.Configurator;\nimport\
    \ org.apache.log4j.spi.LoggerRepository;\nimport org.apache.log4j.PropertyConfigurator;\n\
    import org.apache.log4j.helpers.LogLog;\n\nimport java.net.URL;\nimport java.util.Properties;\n\
    ```"
