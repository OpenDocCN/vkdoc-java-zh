    custom tags within this tag library.


    ### [Chapter 10](#LiB0074_split_000.html#672): [Best Practices](#LiB0074_split_000.html#672)


    This chapter provides a guideline to the best practices involved in using the
    JDK 1.4 logging API and Apache `log4j`. It also provides a comparative study of
    these two logging APIs.


    # Chapter 1: Introduction to Application Logging


    ## Overview


    Imagine it is late at night and you are still busy debugging your application.
    Worse— you are debugging another person''s code! You have no clue what is wrong
    with the system. You are not sure where the problem lies. You cannot find any
    error trace. You do not know what to do, but you do know what is next—the raging
    managers, the anxious clients, and still it will take time to debug a piece of
    code without a trace of what is going on.


    What is the problem? It is a well-known fact that no software is bug free. Therefore,
    we need to assume that application modules may malfunction from time to time,
    and we need some mechanism to trace what is going wrong. This is precisely the
    role of application logging. Any commercial application will need logging capability.
    Debugging an application without any logging trace is time consuming and costly.
    Indirectly, a hard-to-debug application loses its market value. Indeed, the impact
    of well-controlled application logging is multilevel. It improves the quality
    of the code produced, it increases the maintainability of the application, and
    all this means more market for the product.


    In this chapter, we will see what application logging is and its benefits, and
    also explore a few available Java language–based logging APIs. We will begin with
    a more detailed definition of logging and its value.


    ## What Is Logging?


    Logging in any application generally means some way to indicate the state of the
    system at runtime. However, we all use logging during development to debug and
    test our modules. The logging activity carried out during the development phase
    generally holds no value in the deployment stage, and normally we take out those
    logging traces after we have successfully tested our modules. The logging activity
    that should be a part of the application in the deployment phase demands much
    more thought and care. We almost always want to produce logging that is informative
    and effective but involves least effort.


    Keeping all these points in mind, let''s define application logging in the following
    manner:


    > Logging is a systematic and controlled way of representing the state of an application
    in a human-readable fashion.


    One important point about logging to note is that it is not synonymous to debugging
    traces in an application. Logging information can potentially offer more than
    mere debugging information. However, its usefulness totally depends on how we
    apply logging within an application. Logging information may be of immense value
    in analyzing the performance of an application. Moreover, we can bundle internal
    states of the application in logging information and store that information in
    a structured manner to reuse in the future.


    This definition of logging highlights the following important points:


    - It is systematic.

    - It is controlled.

    - It represents an application''s state.


    In the following sections, we will examine each of these features one by one.


    ### Logging Is Systematic


    Logging should be a systematic approach rather than an arbitrary way of producing
    information. More often than not, we will need to define a strategy for our logging
    activity. We need to decide beforehand what information to log, yet these decisions
    are not always easy. We should look at this problem from more than one angle.
    Typically, we need to produce logs for debugging and day-to-day maintenance of
    an application. We may also need to produce detailed logs for system administrators
    monitoring the performance of the system. Again, we may need to distribute logging
    information to various remote places to facilitate remote management of the application.
    The issues are endless. Hence, we need a logging strategy before we embark on
    writing an application.


    ### Logging Is Controlled


    There is one and only one way to log the information we require: We have to write
    some logging code within our applications. The logging code needs to go through
    the same controls as the main application code. Like every piece of application
    code, the logging code can be well written or badly written. Keep in mind that
    logging is there to support and improve the quality of the application being written.
    Therefore, the logging code should be written in such a way that it has least
    impact on the overall performance of the system.


    Also, we need to exercise some control over where the logging information is stored
    and the format of the logging information. The logging information needs to be
    structured so that is easily readable and can be processed at a future date with
    the least effort. One example is to prefer logs in XML format rather than in simple
    text format. Although text format for logging may be desirable in the development
    stage, XML format is much more reusable and portable when the application is deployed.
    In other situations, we may need to store logging information in a database to
    maintain a history of the logs produced.


    ### Logging Information Represents the Application State


    The logging information produced may be quite useless if sufficient care is not
    taken about what to log. To make logging activity most effective, we should aim
    to represent the internal state of the system wherever required and also to present
    a clear idea of what stage of control the application is at and what it is doing.
    If you can visualize your system as a collection of distinct components performing
    several related and sequential tasks, you may well need to log the state of the
    system before and after each task is performed.'
