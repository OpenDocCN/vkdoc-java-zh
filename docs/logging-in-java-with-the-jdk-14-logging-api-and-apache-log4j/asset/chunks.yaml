    |  | 注意 | 使用默认的 `JDBCAppender` 和 `CustomJDBCAppender` 对象存储的日志信息是相同的。前述示例（清单 7-1
    和清单 7-4）的区别在于 SQL 语句的执行方式。使用 `CustomJDBCAppender` 时，SQL 语句会被预编译一次，并存储在数据库中以便复用。然而，使用普通的
    `JDBCAppender` 对象时，SQL 语句每次都会被预编译。使用 `CustomJDBCAppender` 的主要优势在于，通过引入 `PreparedStatement`
    对象来执行动态 SQL，从而提升性能。 |


    最后，您可以看到，这个示例只是 `JDBCAppender` 所能实现功能的简化版本。在数据库相关编程中，最关键的问题之一是连接池。如今大多数 Java 程序员都熟悉连接池，并且可能自己实现过一两个。与其一起逐步讲解如何使用
    `JDBCAppender` 实现连接池的示例，不如将其作为练习留给您自行实现，以巩固您目前学到的关于 log4j 的知识。


    ## 使用 JMSAppender 实现基于 JMS 的日志记录


    在上一章中，我们讨论了将日志信息写入应用程序运行所在本地机器的 `Appender` 对象。这些 `Appender` 对象大多是*同步*的。上一节提到 `JDBCAppender`
    具有缓冲实现，这意味着调用方应用程序在将日志事件提交给 `JDBCAppender` 后即可收回控制权，无需等待实际写入数据库的操作完成。


    但在现实世界中，我们可能希望实现完全的*异步*日志记录活动——也就是说，日志记录应用程序可以发送一条日志消息，然后完全不再关心它。接收方应用程序可以在稍后时间拾取该日志消息，并在其自己的时间内处理该消息。这正是面向消息的软件的核心所在。Apache
    log4j 利用这一消息传递概念，结合 Java 消息服务（JMS）来实现面向消息的日志记录。


    对于基于文件的日志记录等本地化日志记录概念，日志信息分散在单个应用程序组件所在的各个位置。当我们希望从各种分布式组件收集日志信息并集中存储时，基于 JMS
    的日志记录就变得非常有用。


    ### 什么是 JMS？


    由于对 JMS 的详细讨论超出了本书的范围，我们只讨论 log4j 如何融入 JMS 范式。JMS 允许应用程序开发人员创建、发送、接收和读取消息。从这个意义上说，JMS
    或任何消息传递 API 的重要特性如下：


    *   **异步：** 发送消息的应用程序模块和接收消息的应用程序模块可以彼此独立运行，无需了解对方的可用接口。发送方和接收方应用程序无需同时启动并运行。


    *   **可靠：** JMS 确保消息只发送一次且仅一次。


    面向消息的 JMS 实现在消息发布方式、消息消费方式以及发送方和接收方之间的时间依赖性方面可能有所不同。在接下来的两节中，我们将探讨 JMS 实现的两种最流行的消息传递域。


    #### 点对点消息传递


    点对点消息传递围绕消息、队列、发送者和接收者这些概念构建。它具有以下特性：


    *   发送者将消息发送到队列。

    *   队列保留消息，直到它们被消费。

    *   队列中的每条消息有且仅有一个消费者（接收者）。

    *   发送者和接收者之间没有时间依赖性。即使接收者在消息发送时未运行，它也可以获取消息。

    *   接收者或消费者确认收到消息。


    #### 发布-订阅消息传递


    发布-订阅消息传递围绕消息、主题、发布者和订阅者这些概念展开。它具有以下特性：


    *   发送者将消息发布到一个主题。

    *   每条消息可以有零个或多个订阅者。

    *   系统负责将消息分发给订阅者。

    *   发布者和订阅者之间存在时间依赖性。订阅者只有在消息发布到主题时处于启动并运行状态，才能订阅该消息。

    *   主题仅在将消息分发给订阅同一主题的订阅者所需的时间内保留消息。


    ### JMS 与 log4j


    Apache log4j 提供了 `org.apache.log4j.net.JMSAppender` 对象来执行基于 JMS 的日志记录活动。`JMSAppender`
    使用发布-订阅消息传递域将日志事件相关消息发送到指定的主题。任何对发布到指定主题的日志事件感兴趣的应用程序都必须订阅同一主题，并监听到达的消息以进行处理。


    要连接到 JMS 主题，`JMSAppender` 对象必须执行以下步骤：


    *   它必须获取到 JMS 提供者的连接。

    *   它必须订阅目标主题。

    *   成功获取到提供者和主题的连接后，它需要创建一个会话来与提供者和主题进行交互。


    JMS 提供者自行管理 `Connection` 和 `Topic` 对象，而不是由应用程序控制它们。这些被称为“受管对象”。由于不同的提供者以不同的方式管理
    `Connection` 和其他核心对象，因此最好由提供者自身来管理这些对象。应用程序模块通过可移植接口访问这些对象，并且不受提供者底层技术的影响。


    每当应用程序需要引用受管对象时，它通过检索 `JNDIContext` 对象来实现。`JNDIContext` 对象的检索方式同样因提供者而异。为了说明这一点，让我们看两个场景：使用默认的
    J2EE 提供者和 BEA WebLogic 应用服务器。


    #### 使用 J2EE 的 JNDIContext


    J2EE 环境提供了一个默认的 "jndi.properties" 文件，其中包含检索 JNDI 上下文所需的所有信息。如果您使用的是 J2EE 轻量级应用服务器，则需要使用以下命令来获取
    JNDI 上下文：


    ```

    InitialContext jndiContext = new InitialContext();

    ```


    使用无参构造函数将使用在所使用的任何 JMS API 本地的 "jndi.properties" 文件中指定的默认属性来初始化上下文。对于其他 JMS 提供者，您需要传递多个其他配置参数才能获取初始上下文。


    |  | 注意 | 对于 J2SDKEE 1.3.1，"jndi.properties" 文件捆绑在 "j2ee.jar" 中。 |


    #### 使用 WebLogic 的 JNDIContext


    正如我们在前几节中讨论的，`Connection` 和 `Topic` 等受管对象的底层技术因供应商而异。因此，为了从提供者获取初始 JNDI 上下文，我们需要向其传递不同的配置属性。例如，要从
    WebLogic 获取初始上下文，我们将使用以下代码：


    ```

    Properties env = new Properties( );

    env.put(Context.INITIAL_CONTEXT_FACTORY,"weblogic.jndi.WLInitialContextFactory);

    env.put(Context.PROVIDER_URL, "t3://localhost:7001");

    InitialContext jndiContext = new InitialContext(env);

    ```


    其他 JMS 提供者（如 JBoss）将需要向其传递不同的配置参数。

    '
