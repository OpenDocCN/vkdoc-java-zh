- fmt: '### FileHandler Parameters


    `java.util.logging.FileHandler` has the configurable properties defined in [Table
    4-2](#LiB0027.html#ch04table02).


    Table 4-2: FileHandler Configuration Parameters


    | Property | Meaning | Default |

    | --- | --- | --- |

    | `append` | Item to append to the existing file | `false` |

    | `count` | The number of files to rotate through | Defaults to 1 |

    | `encoding` | Character encoding to use | Default platform-specific encoding
    |

    | `filter` | Any filter to attach | No filter |

    | `formatter` | Formatting for the logging information | `java.util.logging.XMLFormatter`
    |

    | `level` | The level of logging | `Level.ALL` |

    | `limit` | The approximate maximum number of bytes to write to a file | No limit
    (If set to zero, it means no limit.) |

    | `pattern` | Pattern for generating the output filename | `%h/java%u.log` |


    Here is a sample configuration file for the `FileHandler`:


    ```

    #configuration for the FileHandler

    java.util.logging.FileHandler.pattern = %h/java%u.log

    java.util.logging.FileHandler.limit = 5000

    java.util.logging.FileHandler.count = 1

    java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter

    ```


    We have already discussed the patterns related to the `FileHandler` in [Chapter
    2](#LiB0012_split_000.html#44). The default configuration parameters just shown
    for the `FileHandler` object define the location of the logging output file to
    be the "/user-home" directory, and each logging file will be named with a unique
    number added to its base name such as "java0.log", "java1.log", etc. The `limit`
    property defines the size limit for each file and is set to 5000 bytes. Exceeding
    the limit will force the creation of a new logging file with the pattern defined
    in the `pattern` configuration property. The `count` property defines the number
    of `LogRecord` objects to be logged, and the `formatter` property defines `SimpleFormatter`
    to be the default `Formatter` object for the `FileHandler`.


    ### SocketHandler Parameters


    `java.util.logging.SocketHandler` has the configurable properties defined in [Table
    4-3](#LiB0027.html#ch04table03).


    Table 4-3: SocketHandler Configuration Parameters


    | Property | Meaning | Default |

    | --- | --- | --- |

    | `encoding` | Character encoding to use | Default platform-specific encoding
    |

    | `filter` | Filter to attach | No filter |

    | `formatter` | Formatting for the logging information | `java.util.logging.XMLFormatter`
    |

    | `host` | The host to connect to | No default |

    | `level` | The level of logging | `Level.ALL` |

    | `port` | The port to connect to | No default |


    Here is a sample configuration file for the `SocketHandler`:


    ```

    #configuration for SocketHandler

    java.util.logging.SocketHandler.level=INFO

    java.util.logging.SocketHandler.formatter=java.util.logging.SimpleFormatter

    java.util.logging.SocketHandler.filter=com.apress.logging.AgeCheckFilter

    java.util.logging.SocketHandler.host=localhost

    java.util.logging.SocketHandler.port=2020

    ```


    This configuration sets a `Filter` named `AgeCheckFilter` as part of the `SocketHandler`
    configuration. This means that this `SocketHandler` instance will verify with
    the `Filter` that it can proceed to log the information. The destination host
    and port are also defined in the configuration file. A server program running
    in the defined host and listening to the defined port will receive logging information
    from this `Handler` instance.


    ### MemoryHandler Parameters


    `java.util.logging.MemoryHandler` has the configurable properties defined in [Table
    4-4](#LiB0027.html#ch04table04).


    Table 4-4: MemoryHandler Configuration Parameters


    | Property | Meaning | Default |

    | --- | --- | --- |

    | `filter` | Filter to attach | No filter |

    | `level` | The level of logging | `Level.ALL` |

    | `push` | The push level to release the buffer | `Level.SEVERE` |

    | `size` | The buffer size | 1000 records |

    | `target` | The target `Handler` to use | No default |


    Here is a sample configuration file for the `MemoryHandler`:


    ```

    #configuration for MemoryHandler

    java.util.logging.MemoryHandler.level=INFO

    java.util.logging.MemoryHandler.size=2000

    java.util.logging.MemoryHandler.push=WARN

    java.util.logging.MemoryHandler.target=java.util.logging.ConsoleHandler

    ```


    We have already discussed `MemoryHandler` in great detail in [Chapter 2](#LiB0012_split_000.html#44).
    Knowing what we do about `MemoryHandler`, this configuration has an interesting
    aspect. The `level` and `push` properties both define the level for the `MemoryHandler`
    to work. However, the subtle distinction is that the `level` property is the level
    for the `MemoryHandler` itself, and any logging message with a lower level will
    always be ignored. On the other hand, the `push` property defines the level criteria
    for messages to be pushed to the associated `Handler` objects for publishing.


    Besides the default `Handler` objects, if we develop some new custom `Handler`
    objects and want to define the initialization parameters for the `Handler`s, we
    can do so in the default "logging.properties" file or in any custom configuration
    file we specify at startup, in the same fashion as other `Handler`s are defined.
    We will see an example of this later in this chapter.'
