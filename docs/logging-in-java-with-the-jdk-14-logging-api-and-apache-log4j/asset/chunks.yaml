  trans: '

    ## 使用 JDBCAppender 将日志记录到数据库


    将所需的日志数据存储在数据库中通常是一种良好的实践。这有两个目的：第一，数据得以持久化；第二，位于被记录日志的应用程序域之外的其他应用程序可以访问和分析这些数据。


    log4j API 提供了 `org.apache.log4j.jdbc.JDBCAppender` 对象，它能够将日志信息放入指定的数据库。它执行一些简单的任务，例如通过读取传递给它的
    JDBC 连接参数来打开数据库连接，按照指定的 SQL 语句将数据写入一个或多个表，然后关闭连接。我们可以扩展 `JDBCAppender` 对象的功能以满足我们的需求。目前，`JDBCAppender`
    按以下方式运行：


    *   它具有缓冲实现。传递给它的日志事件存储在一个预定义大小的缓冲区中。一旦达到缓冲区的最大大小，缓冲区就会被刷新，并按照指定的 SQL 语句将数据写入表中。


    *   它会打开一个到数据库的单一连接，并保持该连接直到 appender 被关闭。


    *   由于针对特定记录的 SQL 操作可以是 INSERT、UPDATE 或 DELETE，`JDBCAppender` 巧妙地使用了 `java.sql.Statement`
    对象的 `executeUpdate()` 方法。这提供了执行任何类型 SQL 语句的灵活性。是否插入、更新或删除特定日志记录的决定由应用程序开发者决定，并通过配置文件中的
    SQL 语句指定。`JDBCAppender` 不会对 SQL 语句的性质做出任何决定。它仅仅执行传递给它的 SQL 语句。


    *   尽管 `JDBCAppender` 不决定要执行的 SQL 语句的性质，但它负责维护正在记录的日志事件的完整性。`JDBCAppender` 中的方法不是
    `synchronized` 的，以保持其性能不受影响。这可能会产生数据完整性问题。在缓冲区中的所有元素被写入数据库之前，可能会有另一个日志请求到达。缓冲区会追加新的日志事件。`JDBCAppender`
    识别到缓冲区中的这个新数据后，会再次尝试遍历缓冲区，将其中的所有元素写入数据库。这可能导致尝试在数据库中写入重复数据，这必然会导致数据库错误。


    *   为了避免刚才提到的问题，在缓冲区的每个元素被写入数据库后，`JDBCAppender` 会将其存储在一个二级缓冲区中。最后，它会比较主缓冲区与二级缓冲区中的元素，并从主缓冲区中移除所有存在于二级缓冲区中的元素。这确保了主缓冲区中不会保留重复的元素。


    *   `JDBCAppender` 提供了一个 `close()` 方法来释放任何获取到的数据库资源。理论上，`close()` 方法可以在应用程序生命周期的任何时候被调用。此外，当应用程序通过调用
    `LogManager.shutdown()` 方法终止时，系统中所有活跃的 appender 的 `close()` 方法都会被调用。如果在 `JDBCAppender`
    实例完成其写入操作之前调用了 `close()` 方法，这可能会导致数据丢失。为了确保数据不丢失，`JDBCAppender` 中的 `close()` 方法会刷新主缓冲区，以确保缓冲区中已有的数据被写入数据库。


    ### 配置 JDBCAppender


    在我们进入 `JDBCAppender` 的实际示例之前，首先理解如何配置 `JDBCAppender` 对象非常重要。`JDBCAppender` 具有
    表 7-1 中列出的可配置 bean 属性。


    表 7-1：JDBCAppender 类中的 Bean 属性


    | Bean 属性 | 方法 | 描述 | 默认值 |

    | --- | --- | --- | --- |

    | `bufferSize` | `setBufferSize(int)` | 设置缓冲区大小 | 默认大小为 1。 |

    | `driver` | `setDriver(String)` | 将驱动程序类设置为指定的字符串 | 如果未指定驱动程序类，则默认为 "sun.jdbc.odbc.JdbcOdbcDriver"。
    |

    | `layout` | `setLayout(String)` | 设置要使用的布局 | 默认为 `org.apache.log4j.PatternLayout`。
    |

    | `password` | `setPassword(String)` | 根据指定的用户名设置密码以获取数据库连接 | 用户必须指定一个有效的密码才能访问数据库。
    |

    | `URL` | `setURL(String)` | 设置 JDBC URL | 默认为某个任意值。用户必须指定一个正确的 JDBC URL。 |

    | `user` | `setUser(String)` | 设置用于获取指定数据库连接的用户名 | 用户必须指定一个有效的用户名才能访问数据库。 |


    ### 创建用于存储日志信息的表


    清单 7-2 描述了用于创建名为 LOGGING_DATA 的表以存储日志信息的 SQL 语句。


    清单 7-2：创建 LOGGING_DATA 表的 SQL


    | **![开始示例](img/_1.gif)** |


    ```

    CREATE TABLE LOGGING_DATA

    ("USER_ID" VARCHAR2(10) NOT NULL,

    "DATE" VARCHAR2(10) NOT NULL,

    "LOGGER" VARCHAR2(50) NOT NULL,

    "LEVEL" VARCHAR2(10) NOT NULL,

    "MESSAGE" VARCHAR2(1000) NOT NULL)

    ```


    | **![结束示例](img/_1.gif)** |


    |  |


    ### 与 JDBCAppender 配合使用的配置文件


    清单 7-3 "jdbc.properties" 描述了我们将用于将消息记录到数据库表的配置文件。


    清单 7-3：jdbc.properties


    | **![开始示例](img/_1.gif)** |


    ```

    #配置自定义日志记录器

    log4j.logger.com.apress.logging.log4j=DEBUG, DB


    log4j.appender.DB=org.apache.log4j.jdbc.JDBCAppender

    log4j.appender.DB.URL=jdbc:odbc:dbdef

    log4j.appender.DB.user=system

    log4j.appender.DB.password=manager

    log4j.appender.DB.sql=INSERT INTO LOGGING_DATA VALUES(''%x'',''%d{yyyy-MM-

    dd}'',''%C'',''%p'',''%m'')

    ```


    | **![结束示例](img/_1.gif)** |


    |  |


    在配置文件中，我们为名为 `com.apress.logging.log4j` 的日志记录器分配了 DEBUG 级别和一个 `JDBCAppender`。`JDBCAppender`
    对象被赋予以下配置参数：


    *   要连接的数据库 URL 是 `jdbc:odbc:dbdef`，其中 `dbdef` 是我们正在连接的数据库名称。


    *   连接数据库的用户 ID 是 `system`，密码是 `manager`。


    *   要执行的 SQL 是一个 INSERT 语句，表名为 LOGGING_DATA，以及要插入表中的值。请注意，这些值是按照 `PatternLayout`
    指定的（有关 `PatternLayout` 对象的详细信息，请参阅上一章）。指定的值遵循与表列相同的顺序，并插入 `NDC`、日志日期、日志记录器的完全限定名称、日志级别，最后是日志消息本身。


    使用 "jdbc.properties" 文件作为配置文件执行此程序会将数据写入数据库。图 7-1 展示了存储在 LOGGING_DATA 表中的数据的 HTML
    报告。


    ![点击展开](img/fig7-1_0.jpg)

    图 7-1：LOGGING_DATA 表


    也许您已经注意到，无需进行任何 JDBC 编程即可将数据写入数据库。这一切都在 `JDBCAppender` 内部完成。此外，请注意，此示例展示了 log4j
    的强大功能，即只需更改传递给它的配置文件即可更改日志信息的目标位置，而无需更改任何代码。

