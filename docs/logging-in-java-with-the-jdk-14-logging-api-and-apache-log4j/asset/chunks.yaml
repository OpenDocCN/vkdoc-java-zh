  trans: "\n### 使用 JMSAppender 的示例\n\n为了演示 `JMSAppender` 的工作方式，我们复用清单 7-1 中的示例。要将日志信息定向到\
    \ JMS 目的地，我们只需更改传递给 log4j 运行时的配置文件。清单 7-6 \"jms.properties\" 展示了我们将用于配置 `JMSAppender`\
    \ 的示例配置文件。\n\n清单 7-6: jms.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\n#配置自定义日志记录器\n\
    log4j.logger.com.apress.logging.log4j=DEBUG, JMS\n\n#配置 JMS 附加器\nlog4j.appender.JMS=org.apache.log4j.net.JMSAppender\n\
    log4j.appender.JMS.topicConnectionFactoryBindingName=TopicConnectionFactory\n\
    log4j.appender.JMS.topicBindingName=loggingTopic\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n在此示例中，我们使用由 J2EE 1.3.1 实现的 JMS 提供程序。为了与 J2EE 配合使用，`JMSAppender`\
    \ 对象只需通过以下代码行创建一个默认的 `JNDIContext` 对象：\n\n```\nInitialContext jndiContext = new\
    \ InitialContext();\n```\n\n这就是我们无需将其他配置信息传递给 `JMSAppender` 的原因。我们传递给 `JMSAppender`\
    \ 的唯一配置项是 `topicConnectionFactoryBindingName` 和 `topicBindingName`。请注意，我们使用的主题名称是\
    \ `loggingTopic`。\n\n通过这种最小配置，我们就能在示例应用程序中使用 `JMSAppender`。我们还需要一个订阅者应用程序，用于读取发布到名为\
    \ `loggingTopic` 的主题中的消息。我们将创建一个 JMS 示例程序，该程序监听名为 `loggingTopic` 的主题，并将相关信息打印到控制台。它执行以下步骤来订阅指定的\
    \ JMS 主题，然后读取发送到该主题的消息：\n\n1.  程序首先获取一个初始的 JNDI 上下文。\n\n2.  它创建一个名为 `TopicConnectionFactory`\
    \ 的连接工厂对象。\n\n3.  然后，程序使用在启动时通过命令行传递的主题名称，并创建一个主题对象。\n\n4.  它获取到该主题的连接，并以 `AUTO_ACKNOWLEDGE`\
    \ 模式打开一个会话。这意味着订阅者将自动确认收到消息。一旦发送此确认，主题将不再保留该消息。\n\n5.  程序订阅该主题。\n\n6.  一个自定义的消息监听器对象\
    \ `LogMessageListener` 被附加到使用主题会话创建的订阅者对象上。\n\n7.  订阅者现在已准备好监听该主题的任何消息。\n\n清单\
    \ 7-7 `JMSLogSubscriber.java` 是一个 JMS 订阅者的示例实现。\n\n清单 7-7: JMSLogSubscriber.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\nimport\
    \ javax.jms.*;\nimport javax.naming.*;\n\npublic class JMSLogSubscriber {\n\n\
    \    /** 创建 JMSLogSubscriber 的新实例 */\n    public JMSLogSubscriber() {\n    }\n\
    \n    public static void main(String args[]) {\n        Context ctx;\n       \
    \ Topic topic;\n        TopicSubscriber topicSubscriber;\n        TextMessage\
    \ message;\n        TopicConnectionFactory topicFactory;\n        TopicConnection\
    \ topicConnection;\n        TopicSession topicSession;\n        //从命令行收集主题名称\n\
    \        String topicName = args[0];\n        try {\n            //创建默认的 J2EE\
    \ 初始上下文\n            ctx = new InitialContext();\n            //获取主题连接工厂\n   \
    \         topicFactory =\n(TopicConnectionFactory)ctx.lookup(\"TopicConnectionFactory\"\
    );\n            //创建主题\n            topic = (Topic)ctx.lookup(topicName);\n  \
    \          //打开一个主题连接\n            topicConnection = topicFactory.createTopicConnection();\n\
    \            //创建一个会话以自动确认收到消息\n            topicSession = topicConnection.createTopicSession(false,\n\
    \            Session.AUTO_ACKNOWLEDGE);\n            //订阅主题\n            topicSubscriber\
    \ = topicSession.createSubscriber(topic);\n            //自定义监听器，用于监听主题的任何消息并进行处理\n\
    \            LogMessageListener listener = new LogMessageListener();\n       \
    \     //将监听器添加到此订阅者\n            topicSubscriber.setMessageListener(listener);\n\
    \            //启动会话\n            topicConnection.start();\n        }catch(Exception\
    \ e) {\n            System.out.println(e.toString());\n        }\n    }\n}\n```\n\
    \n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n该程序使用一个自定义监听器对象来监听主题的任何消息。还有一种替代技术。订阅者可以调用\
    \ `receive()` 方法从主题获取任何消息。然而，这是一种*同步*的接收和处理消息模式。`receive()` 方法显式地从主题获取消息。此方法可能会阻塞直到消息到达，或者如果在指定时间限制内没有消息到达则会超时。通过将\
    \ `MessageListener` 对象附加到订阅者，订阅者可以*异步*接收消息。一旦消息到达，JMS 提供程序将通过调用其 `onMessage()`\
    \ 方法来通知 `MessageListener`。\n\n清单 7-8 `LogMessageListener.java` 是一个用于监听主题的 `MessageListener`\
    \ 实现。它提供了 `onMessage()` 方法的实现。在 `onMessage()` 方法内部，它检查消息类型。`JMSAppender` 将 `LoggingEvent`\
    \ 对象作为 `ObjectMessage` 类型发布到主题。因此，`LogMessageListener` 检查 `ObjectMessage`，将其强制转换回\
    \ `LoggingEvent` 对象，并从 `LoggingEvent` 对象中获取所有信息。\n\n清单 7-8: LogMessageListener.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\nimport\
    \ javax.jms.*;\nimport org.apache.log4j.spi.LoggingEvent;\n\npublic class LogMessageListener\
    \ implements MessageListener{\n\n    /** 创建 LogMessageListener 的新实例 */\n    public\
    \ LogMessageListener() {\n    }\n\n    /**\n     * 此方法监听发送到订阅主题的任何消息，\n     *\
    \ 检查类型是否正确\n     * 并打印内容。\n     ***/\n    public void onMessage(Message message)\
    \ {\n        TextMessage msg = null;\n        try {\n            if(message instanceof\
    \ ObjectMessage){\n            System.out.println(\"收到消息: \");\n            ObjectMessage\
    \ obj = (ObjectMessage)message;\n            LoggingEvent event = (LoggingEvent)obj.getObject();\n\
    \            System.out.println(\"日志记录器名称:\n\"+event.getLoggerName());\n     \
    \       System.out.println(\"消息:\n\"+event.getMessage().toString());\n       \
    \ }else {\n\n            System.out.println(\"错误类型的消息: \" +\n            message.getClass().getName());\n\
    \        }\n    } catch (JMSException e) {\n        System.out.println(\"onMessage()\
    \ 中的 JMSException: \" +\n        e.toString());\n        } catch (Throwable t)\
    \ {\n            System.out.println(\"onMessage() 中的异常:\" +\n            t.getMessage());\n\
    \        }\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n`LogMessageListener`\
    \ 仅打印日志记录器名称和封装在 `LoggingEvent` 对象中的消息。可以说，它可以提取 `LoggingEvent` 对象中的所有信息，并以它想要的方式进行处理。此示例保持简单，以演示\
    \ JMS 如何与 log4j 协同工作。\n\n#### 执行基于 JMS 的日志记录示例\n\n要查看实际运行中的示例，我们需要按照接下来几节中介绍的步骤进行操作。\n"
- fmt: '### Start the J2EE JMS Provider


    First, we must make sure that the `j2ee.jar` is included in the classpath. Now,
    start up the J2EE application server with the following command:


    ```

    j2ee -verbose

    ```


    | Note | Remember to set the `J2EE_HOME` environment to point to the j2ee location.
    |


    ### Creating the Topic


    Next we create a new Topic named `loggingTopic` and add it to the JMS destination
    with the following command:


    ```

    j2eeadmin --addJmsDestination loggingTopic topic

    ```


    ### Running the Subscriber


    Once the Topic is added to the JMS destination, we start `JMSLogSubscriber` with
    the following command:


    ```

    java -Djms.properties=%J2EE_HOME%config/jms_client.properties

    com.apress.logging.log4j.JMSLogSubscriber loggingTopic

    ```


    Notice that we pass the Topic name `loggingTopic` as a command line parameter
    to the program. Also, we provide the JMS configuration parameters to the J2EE
    runtime via the `jms_client.properties` file, which is bundled with the J2EE.


    ### Running the Client


    Now we are ready to execute our example program. We will pass the `jms.properties`
    file as the log4j configuration file to the runtime. Also, we will provide the
    JMS configuration parameters to the J2EE runtime via the `jms_client.properties`
    file, which is bundled with the J2EE.


    ```

    java -Dlog4j.configuration=jms.properties -

    Djms.properties=%J2EE_HOME%config/jms_client.properties

    com.apress.logging.log4j.AdvancedLogging

    ```


    Executing this program will post all the logging information to the Topic named
    `loggingTopic`. In the Subscriber console, we will see the following messages
    arriving:


    ```

    Message received...

    Message received:

    The logger name: com.apress.logging.log4j

    The message: Deposited 100.5

    new balance: 100.5 Message received...

    Message received:

    The logger name: com.apress.logging.log4j

    The message: Withdrawn 80.0 new balance: 20.5

    Message received...

    Message received:

    The logger name: com.apress.logging.log4j

    The message: Failed to withdraw: balance: 20.5 attempted withdraw: 50.0

    ```


    Note that all the logging messages are printed in the console, and the application
    does not terminate even after the logging message is passed to the Topic. This
    is because the Topic connection is closed only within the `close()` method of
    the `JMSAppender`. If we explicitly call the `close()` method of the `JMSAppender`
    or call the `LogManager.shutdown()` method as soon as we finish, the Topic connection
    will be closed and the console will be released.


    This is all you need to know about `JMSAppender`. As you can see, the impressive
    part is it''s so easy to implement without having to make any code changes in
    the application. With a different configuration file, we are there!


    | Note | JMS-based logging ensures the delivery of logging information to the
    receiver but does not guarantee time. The logging information passed to the receiver
    may not be chronological. One way to get around this problem is to use `NDC` information
    for each logging request with the timestamp from each sender. However, it is up
    to you to decide which is the best way to deal with this problem for your particular
    situation. |


    ## Working with SocketAppender


    A situation in which we want to transfer logging information from one machine
    to another represents a distributed logging scenario. We have already seen how
    `JMSAppender` is very useful for passing logging information from distributed
    application components to a central location. It is also possible to pass logging
    information from one location to another using TCP/IP-based raw socket connections.


    It may be tricky to choose between using JMS- or socket-based mechanisms to transfer
    logging information from one machine to another. Although the underlying implementation
    of any distributed architecture is TCP/IP based, the difference is in how they
    operate. The choice between JMS- and raw socket-based communication to transfer
    logging information more or less depends on the architecture of the application
    itself. The following few points may help you when you are faced with deciding
    whether to use JMS- or socket-based logging:


    - JMS-based logging should be employed when the application follows a distributed
    architecture. Remember, an application supporting client-server technology is
    not necessarily distributed. True distributed architecture will have server-side
    components that the client(s) uses distributed across different locations. In
    such scenarios, JMS-based logging is more effective.

    - In a true distributed application scenario, you will always have an application
    server running. Java-based application servers will often come with JMS support.
    So if your application is using any application server (for some legitimate reason),
    consider using JMS-based logging.

    - Socket-based logging is suitable for normal client-server situations where many
    clients are talking to the same server component. If as a part of an application
    you have to write the server component, it would probably be easier for you to
    use socket-based logging. Remember, going for a JMS-based solution when you are
    not using distributed computing will require the extra cost of deploying a JMS
    provider.

    - In any application scenario where you want to implement an asynchronous logging
    mechanism, a JMS-based solution would be ideal and easy to implement. If you do
    not need it, then a socket-based logging mechanism may win over JMS, provided
    other conditions discussed previously are satisfied.


    `org.apache.log4j.net.SocketAppender` provides a means for transferring logging
    information to a remote server over TCP/IP. It basically sends the serialized
    `LoggingEvent` object over the TCP/IP to a remote log server. The `SocketAppender`
    object has the following features associated with it:


    - The remote logging is nonintrusive. The timestamp, the `NDC` information, and
    the location information are preserved according to the client where the logging
    request was generated.

    - The `SocketAppender` object does not use any `Layout` object to format its data.
    This is understandable as it transmits the `LoggingEvent` object to the server
    side in a serialized form.

    - Logging events are automatically buffered by the native TCP implementation.


    ### Fault Tolerance


    The `SocketAppender` implementation is fault tolerant. It can handle or tries
    to resolve different network-related problems such as a link being down or link
    speed being slow. Typically, `SocketAppender` attempts to do the following things
    in case there is a fault:


    - If the server is reachable, log events will eventually arrive at the server.

    - If the remote server is down and not reachable, logging events are dropped.
    But as soon as the server comes back, logging activity starts transparently. This
    transparent connection is accomplished by a connector thread, which periodically
    attempts to connect to the remote server.

    - If the connection to the server is slow but faster than the rate of logging
    event production, the client will benefit from the native TCP/IP buffered implementation,
    and it will not be affected by the link speed.

    - If the link speed is slower than the rate of logging event production, the client
    will suffer because it can only go with the network speed.

    - If the network link is up but the server is down, the client will not be blocked,
    but log events will be lost due to server unavailability.

    - If the network link is down but the server is alive, the client will be blocked
    until it times out (normal TCP/IP timeout) or the network link comes back to life.

    - `SocketAppender` does not get garbage collected automatically. It is important
    that the `close()` method of `SocketAppender` or the `LogManager.shutdown()` method
    has been explicitly called before exiting the application to make sure that `SocketAppender`
    is closed. However, if the JVM exits before `SocketAppender` can close gracefully,
    there might be untransmitted data in the pipe that might be lost.'
