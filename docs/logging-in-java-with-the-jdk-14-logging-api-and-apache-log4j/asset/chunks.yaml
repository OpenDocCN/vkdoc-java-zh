    ## Implementing JMS-Based Logging with JMSAppender


    In the [previous chapter](#LiB0047_split_000.html#389), we discussed `Appender`
    objects that write logging information to the local machine on which an application
    is running. Most of these `Appender` objects are *synchronous*. The [previous
    section](#LiB0053.html#461) mentioned that `JDBCAppender` has buffered implementation,
    which means the caller application gets back the control after submitting a logging
    event to `JDBCAppender` and need not wait for the actual writing to the database
    to finish.


    But in the real world, we might want to achieve a complete *asynchronous* logging
    activity—that is, the logger application can send a logging message and completely
    forget about it. A receiver application can pick up the logging message at a later
    time and process that message in its own time. This is what message-oriented software
    is all about. Apache log4j uses this concept of messaging together with the Java
    Message Service to implement message-oriented logging.


    With localized logging concepts such as file-based logging, logging information
    is scattered across the various locations in which individual application components
    reside. JMS-based logging becomes very useful in situations where we want to collect
    logging information from various distributed components and store the logging
    information centrally.


    ### What Is JMS?


    Because a detailed discussion about JMS is outside the scope of this book, we
    will only discuss how log4j fits into the JMS paradigm. JMS allows application
    developers to create, send, receive, and read messages. The important features
    of JMS or any messaging API in this sense are as follows:


    *   *Asynchronous:* The application module issuing messages and the application
    module receiving messages can operate independently of each other without knowing
    each other''s available interfaces. The sender and receiver applications need
    not be up and running simultaneously.


    *   *Reliable:* JMS ensures that messages are sent once and only once.


    Message-oriented JMS implementations can differ in the way messages are published,
    the way messages are consumed, and the time dependency between the sender and
    the receiver. In the next two sections, we will explore the two most popular messaging
    domains implemented by JMS.


    #### Point-to-Point Messaging


    Point-to-Point messaging is built around the concepts of messages, queues, senders,
    and receivers. It has the following features:


    *   The sender sends the messages to the queue.


    *   The queue retains the messages until they are consumed.


    *   Each message in the queue has one and only one consumer (the receiver).


    *   The sender and the receiver have no time dependency. The receiver can fetch
    the message even if it was not running at the time the message was sent.


    *   The receiver or the consumer acknowledges the receipt of the message.


    #### Publish-Subscribe Messaging


    Publish-Subscribe messaging is centered on the concept of messages, Topics, Publisher,
    and Subscriber. It has the following features:


    *   The sender publishes the messages to a Topic.


    *   Each message can have zero or multiple Subscribers.


    *   The system takes care of distributing messages to Subscribers.


    *   Publishers and Subscribers have a time dependency. A Subscriber can only subscribe
    to messages if it is up and running at the time the message is published to a
    Topic.


    *   Topics retain messages only as long it takes to distribute them to Subscribers
    subscribing to the same Topic.


    ### JMS and log4j


    Apache log4j provides the `org.apache.log4j.net.JMSAppender` object to perform
    JMS-based logging activity. `JMSAppender` uses the Publish-Subscribe messaging
    domain to send logging event–related messages to a specified Topic. Any application
    interested in a logging event published in a specified Topic will have to subscribe
    to the same Topic and listen for any messages arriving to process them.


    To connect to a JMS Topic, the `JMSAppender` object will have to perform these
    steps:


    *   It has to obtain a connection to the JMS provider.


    *   It has to subscribe to the Topic destination.


    *   After it successfully obtains a connection to the provider and to the Topic,
    it needs to create a session to interact with the provider and the Topic.


    The JMS provider manages the `Connection` and `Topic` objects itself rather than
    the application program controlling them. These are called `Administered` objects.
    As the various providers manage `Connection` and other core objects differently,
    it is best that the providers themselves manage the objects. The application module
    gains access to these objects through portable interfaces and remain unaffected
    by the underlying technology of a provider.


    Whenever the application requires a reference to the `Administered` objects, it
    does so by retrieving the `JNDIContext` object. The retrieval of the `JNDIContext`
    object again varies from provider to provider. To illustrate this, let''s look
    at two scenarios using the default J2EE provider and the BEA WebLogic application
    server.


    #### JNDIContext with J2EE


    The J2EE environment provides a default `jndi.properties` file containing all
    the information required to retrieve a JNDI context. If you are using the J2EE
    lightweight application server, you need to use the following command to obtain
    a JNDI context:


    ```

    InitialContext jndiContext = new InitialContext();

    ```


    Using a no-argument constructor will initialize a context with the default properties
    specified within the `jndi.properties` file local to any JMS API being used. For
    other JMS providers, you need to pass several other configuration parameters to
    obtain an initial context.


    |  | Note | For J2SDKEE 1.3.1, the `jndi.properties` file is bundled within `j2ee.jar`.
    |


    #### JNDIContext with WebLogic


    As we discussed in the previous sections, the underlying technology for `Administered`
    objects such as `Connection` and `Topic` is different from one vendor to the next.
    For this reason, in order to obtain an initial JNDI context from a provider, we
    need to pass to it different configuration properties. For example, to obtain
    an initial context from WebLogic, we would use the following:


    ```

    Properties env = new Properties( );

    env.put(Context.INITIAL_CONTEXT_FACTORY,"weblogic.jndi.WLInitialContextFactory);

    env.put(Context.PROVIDER_URL, "t3://localhost:7001");

    InitialContext jndiContext = new InitialContext(env);

    ```


    Other JMS providers such as JBoss will require different configuration parameters
    passed to them.'
