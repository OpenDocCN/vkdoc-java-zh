  trans: '

    ## JDK 1.4 日志 API 概述


    JDK 1.4 日志 API（下文简称日志 API）由多个对象组成，这些对象负责捕获日志信息，处理并将预期的日志信息发布到任意首选目标位置。日志框架主要包含以下核心对象：


    *   `LogManager`：`java.util.logging.LogManager` 对象是一个单例，负责管理日志记录器的命名空间层次结构。该类会读取一个系统范围的配置文件，为日志框架设置初始属性。


    |  | 注意 | *单例*是指在应用程序的每个 Java 虚拟机（JVM）实例中仅存在一次的类。 |


    *   `Logger`：`java.util.logging.Logger` 对象负责执行日志记录活动。该对象提供了许多日志记录方法来发布日志信息。


    *   `LogRecord`：`java.util.logging.LogRecord` 对象封装了所有日志信息。通常，它包含日志消息的日期和时间戳、日志记录活动的来源，以及日志消息的粒度和优先级级别。


    *   `Handler`：`java.util.logging.Handler` 对象负责将日志信息发布到各种目标位置——文件、控制台、内存缓冲区等。


    *   `Filter`：`java.util.logging.Filter` 对象被 `Logger` 对象用来决定日志信息是应该传递给 `Handler`
    进行处理，还是应该被忽略。`Handler` 对象也可以使用 `Filter` 对象，在将日志请求发布到最终目标位置之前对其执行更多检查。


    *   `Formatter`：`java.util.logging.Formatter` 对象负责为正在发布的日志信息提供所需的结构。如果配置了相应的设置，格式化器还会对日志信息进行本地化处理。


    日志 API 从一个系统范围的配置文件中获取各种配置参数。JDK 1.4 提供了一个默认的配置文件，位于 "/jre/lib/logging.properties"
    文件中。它也可以使用任何其他用户指定的配置文件，以实现更强的控制，最重要的是，支持以编程方式控制日志框架的行为。


    日志 API 的基本架构定义了多个日志信息级别。这些级别描述了日志请求的优先级，并且日志框架可以被调整，以显示与特定级别相关的日志信息。所定义的级别可以按优先级降序排列如下：


    *   *SEVERE（最高）：* 此级别用于记录关于对应用程序至关重要且需要立即关注以进行纠正的问题的消息。


    *   *WARNING：* 此级别用于记录指示应用程序存在潜在问题的消息。


    *   *INFO：* 此级别是日志 API 使用的默认级别。以此级别发布的日志消息通常是普通的调试语句，在应用程序的开发阶段和日常维护中很有帮助。


    *   *CONFIG：* 此级别指定与应用程序配置阶段相关的日志消息。例如，在应用程序启动时，我们可以使用此级别来打印与配置相关的信息。


    *   *FINE/FINER/FINEST（最低）：* 这些级别表示日志消息的详细程度，从不太详细到非常详细。使用这些日志级别将导致大量日志信息被发布到日志目标位置。


    *   *ALL：* 此级别表示应记录所有消息。


    上述所有级别都在 `java.util.logging.Level` 类中定义为 `static final int` 原始类型，并且每个定义的级别都关联一个唯一的整数值。如果我们想定义自己的级别，可以通过扩展
    `java.util.logging.Level` 类并声明一个带有唯一整数值的级别来实现。


    日志框架中最基本的组件是 `Logger` 对象。`Logger` 对象用于记录特定于应用程序或应用程序组件的消息。它捕获指定的日志消息并创建一个 `LogRecord`
    对象，该对象封装了与日志请求相关的所有信息。日志 API 提供了一个根日志记录器，它作为默认日志记录器存在，没有关联命名空间。根日志记录器能够将日志信息打印到应用程序的控制台。与
    `Logger` 对象关联的默认级别是 INFO。日志记录器可以发布的信息量取决于与该日志记录器关联的级别。


    每个 `Logger` 对象还可以关联一个或多个 `Handler` 对象，这些对象负责将日志信息发布到不同的目标位置，例如控制台、文件、流、套接字等。`Handler`
    对象反过来可能关联一个 `Formatter` 对象。`Formatter` 对象负责以各种格式构建日志信息，并在需要时对日志信息进行本地化。`Handler`
    对象在发布日志消息之前，会使用关联的 `Formatter` 对象对其进行格式化。同样值得注意的是，`Logger` 和 `Handler` 对象可以关联一个或多个
    `Filter` 对象，以帮助决定是否记录或忽略任何特定的日志请求。过滤决策可以基于任何预定义的标准，例如与日志消息关联的级别，或任何其他特定于应用程序的过滤标准。


    框架的整体控制流程如 图 2-1 中的 UML 时序图所示。


    ![点击展开](img/fig2-1_0.jpg)

    图 2-1：JDK 1.4 日志 API 时序图


    整个框架的工作方式如下：


    1.  应用程序组件调用 `Logger` 对象中可用的某个日志记录方法，并将日志信息传递给它。


    2.  `Logger` 对象将消息关联的级别与其自身分配的级别进行比较。如果传入日志消息的级别等于或高于其级别，则 `Logger` 对象会在内部创建一个
    `LogRecord` 对象，并使用与其关联的任何 `Filter` 对象来确定是处理该请求还是忽略它。`Logger` 将拒绝任何基于通过关联的 `Filter`
    对象定义的过滤标准，或者消息级别低于与 `Logger` 关联的级别的日志请求。


    3.  如果决定处理该消息，`Logger` 随后会将内部创建的 `LogRecord` 对象传递给关联的 `Handler` 对象。`Handler` 对象反过来会将
    `LogRecord` 对象的级别与其自身分配的级别进行比较。


    4.  如果级别条件满足，该记录将被传递给与 `Handler` 对象关联的任何 `Filter` 对象。如果关联的 `Filter` 对象批准了该记录，则消息将被传递给附加到该特定
    `Handler` 的相应 `Formatter` 对象。


    5.  `Formatter` 对象随后进行本地化（如果需要），并将格式化后的日志信息返回给 `Handler`。最后，`Handler` 将日志信息打印到与其关联的首选目标位置。


    请注意，如 图 2-1 所示的 `Filter` 和 `Formatter` 对象对于框架是可选的。通常，如果未指定这些对象，框架会使用默认的 `Filter`
    和 `Formatter` 对象。JDK 1.4 日志 API 的默认配置指定 `SimpleFormatter` 对象作为要使用的默认 `Formatter`，并且根日志记录器未使用任何
    `Filter` 对象。日志 API 唯一的默认过滤活动是基于级别的过滤。

    '
- fmt: '在接下来的几个小节中，我们将探讨日志 API 中涉及的不同对象，首先从`LogManager`开始。在[第 3 章](#LiB0022_split_000.html#136)中，我们将深入探讨`Formatter`对象，因为日志信息的结构化方式极大地影响了日志信息的可重用性。


    ## LogManager 对象


    想象一个大型系统，其中多个日志记录器协同工作，将日志消息记录到各种目标，例如套接字、内存、文件、控制台、自定义日志窗口等。每个日志记录器可能都有各自独立的过滤器、处理器、格式化程序和级别。管理这么多日志记录器的所有配置和执行问题可能相当复杂。日志
    API 提供了一种集中管理所有这些配置问题的方式，即通过`java.util.logging.LogManager`类。


    `LogManager`类以单例对象的形式运行，每个 Java 虚拟机实例只有一个实例。我们通过`LogManager.getLogManager()`静态方法获取对`LogManager`的引用。`LogManager`对象通过在类初始化时读取系统范围的配置文件来创建，因此之后无法更改。


    默认情况下，`LogManager`类具有以下职责：


    *   它在一个`java.util.logging.Hashtable`对象中，以键值对的形式管理一个位于分层命名空间中的日志记录器池。每当请求一个日志记录器引用时，如果该引用已存在，`LogManager`将返回现有实例；否则，它会创建一个新实例，将其返回给调用方应用程序，并将新创建的实例存储在池中。


    *   它还管理一个全局`Handler`对象池。


    `LogManager`类提供了用于添加、移除和获取`Logger`对象的方法，以及用于读取配置属性和移除从任何配置参数源获取的任何默认设置的方法。以下静态方法返回对`LogManager`对象的单例引用：


    ```

    public static LogManager getLogManager()

    ```


    下一个方法将一个已命名的日志记录器添加到由`LogManager`类维护的日志记录器命名空间层次结构中：


    ```

    public boolean addLogger(Logger logger)

    ```


    如果已命名的日志记录器已存在，则返回`false`。使用已命名日志记录器的应用程序负责保留其自身的`Logger`对象本地引用，以避免干扰`LogManager`类的垃圾回收。


    以下方法获取已命名的日志记录器引用：


    ```

    public Logger getLogger(String name)

    ```


    请注意，此方法不是静态的，不能直接调用。`Logger`类在内部使用此方法来获取现有已命名`Logger`实例的引用。


    下一个方法检查当前应用程序上下文是否具有修改任何`LogManager`属性所需的权限：


    ```

    public void checkAccess()

    ```


    目前，在默认安全管理器中只定义了一个名为“control”的日志记录权限级别。因此，任何尝试修改任何`LogManager`属性的应用程序都必须具有`LoggingPermission("control")`。如果尝试修改`LogManager`属性的应用程序没有所需的权限，则会抛出`java.lang.SecurityException`。


    以下方法获取命名属性的值：


    ```

    public String getProperty(String name)

    ```


    如果未找到命名属性，则返回 null。


    下一个方法通过读取启动时指定的配置文件来读取并初始化配置参数：


    ```

    public void readConfiguration()

    ```


    此方法在调用时会触发一个`java.beans.PropertyChangeEvent`，该事件由内部定义的`PropertyChangeListener`处理，以更新配置信息。如果读取配置文件时出现问题，则会抛出`java.io.IOException`。如果调用方应用程序没有指示日志记录框架读取任何配置文件的所需权限，则会抛出`java.lang.SecurityException`。


    以下方法从`java.io.InputStream`源读取配置信息：


    ```

    public void readConfiguration(InputStream inStream)

    ```


    如果读取输入流时出现问题，则会抛出`java.io.IOException`；如果存在权限问题，则会抛出`java.lang.SecurityException`。从给定输入流读取属性后，会触发一个`java.beans.PropertyChangeEvent`。


    以下方法移除并最终关闭所有与已命名日志记录器关联的`Handler`对象：


    ```

    public void reset()

    ```


    `reset()`方法受日志 API 的默认`SecurityManager`保护，如果调用该方法的调用方没有所需的权限，则会抛出`java.lang.SecurityException`。它将任何已命名日志记录器关联的级别设置为
    null，并将根日志记录器的级别设置为`Level.INFO`。然后，我们可以创建自己的`Logger`，并通知`LogManager`管理这些创建的日志记录器。当应用程序需要重新定义新的日志记录组件并摆脱旧的组件时，这通常很有用。


    `LogManager`类在启动时通过查找`java.util.logging.manager`系统属性来定位。`LogManager`类的初始配置文件定义在`JAVA_HOME`目录下的`/jre/lib/logging.properties`文件中。可以通过更改配置文件来改变日志记录框架的行为。我们将在[第
    4 章](#LiB0026_split_000.html#166)中详细探讨`LogManager`的配置问题。


    ## LogRecord 对象


    `Logger`对象将传递给它的消息字符串以及任何其他相关信息（如级别等）封装在一个`LogRecord`对象中。`LogRecord`对象是日志记录框架的信息池。一旦创建了`LogRecord`对象，对其进行的任何修改都可能导致意外的日志记录行为。`LogRecord`对象是*可序列化的*，这意味着它可以通过远程方法调用（RMI）传输到远程组件。`LogRecord`对象的这一特性使得日志记录框架具有分布式特性。我们将在[第
    4 章](#LiB0026_split_000.html#166)中探讨`LogRecord`类与 RMI 的序列化。


    `LogRecord`类包含以下元素：


    *   日志记录消息字符串

    *   日志记录器名称

    *   日志记录器级别

    *   日志记录活动的时间戳

    *   源类名称和源方法名称

    *   唯一的序列号

    *   生成`LogRecord`对象的线程 ID

    *   可选的参数对象（这些对象可以被`Filter`对象用于对日志记录过程做出进一步决策）

    *   用于本地化的可选`java.util.ResourceBundle`对象

    *   用于指示应用程序中任何错误情况的可选`java.lang.Throwable`对象实例


    当没有显式的源类名称和源方法名称附加到`LogRecord`对象时，`Logger`对象会尝试通过分析堆栈跟踪来确定此信息。然而，这不是一种可靠的技术，并且在编译器使用可能完全移除任何堆栈跟踪的优化技术的情况下，可能不会产生正确的结果。'
  raw: 'In the next few sections, we will explore the different objects involved in
    the logging API starting with the `LogManager`. In [Chapter 3](#LiB0022_split_000.html#136),
    we will take an in-depth look at `Formatter` objects, because how the logging
    information is structured greatly influences the reusability of the logging information.


    ## LogManager Object


    Imagine a big system where several loggers are acting together to log messages
    in various destinations such as sockets, memory, files, consoles, custom logging
    windows, etc. Each logger may have separate filters, handlers, formatters, and
    levels associated with them. Managing all these configuration and execution issues
    with so many loggers can be quite complex. The logging API provides a centralized
    way of managing all these configuration issues with the `java.util.logging.LogManager`
    class.


    The `LogManager` class operates as a singleton object and has only one instance
    operating per Java VM instance. We obtain a reference to `LogManager` with the
    `LogManager.getLogManager()` static method. The `LogManager` object is created
    by reading a system-wide configuration file at class initialization, and thus
    cannot be changed afterward.


    By default, the `LogManager` class has the following responsibilities:


    *   It manages a pool of loggers in a hierarchical namespace in a key-value format
    within a `java.util.logging.Hashtable` object. Whenever a logger reference is
    requested, if it already exists, the `LogManager` returns the existing instance
    or else creates a new instance, returns it to the caller application, and stores
    the newly created instance in the pool.


    *   It also manages a pool of global `Handler` objects.


    The `LogManager` class provides methods for adding, removing, and obtaining `Logger`
    objects and also for reading configuration properties and removing any default
    settings acquired from any configuration parameter source. The following static
    method returns the singleton reference to the `LogManager` object:


    ```

    public static LogManager getLogManager()

    ```


    This next method adds a named logger to the logger namespace hierarchy maintained
    by the `LogManager` class:


    ```

    public boolean addLogger(Logger logger)

    ```


    If the named logger already exists, it returns `false`. The application using
    the named logger is responsible for keeping its own local reference of the `Logger`
    object to avoid any interference with the garbage collection of the `LogManager`
    class.


    The following method obtains the named logger reference:


    ```

    public Logger getLogger(String name)

    ```


    Notice that this method is not static and can''t be called directly. The `Logger`
    class uses this method internally to obtain the reference of an existing named
    `Logger` instance.


    This next method checks if the current application context has the required permission
    to modify any of the `LogManager` properties:


    ```

    public void checkAccess()

    ```


    Currently, only one logging permission level, named "control", is defined with
    the default security manager. So any application trying to modify any of the `LogManager`
    properties is required to have `LoggingPermission`(`"control")`. If the application
    trying to modify the `LogManager` properties does not have the required permission,
    a `java.lang.SecurityException` is thrown.


    The following method obtains the value of the named property:


    ```

    public String getProperty(String name)

    ```


    It returns null if the named property is not found.


    This next method reads and initializes the configuration parameters by reading
    the configuration file specified at startup:


    ```

    public void readConfiguration()

    ```


    This method fires a `java.beans.PropertyChangeEvent` once this method is invoked,
    which is handled with a `PropertyChangeListener` defined internally to update
    the configuration information. If there is a problem reading the configuration
    file, a `java.io.IOException` is thrown. If the caller application does not have
    the required permission to instruct the logging framework to read any configuration
    file, a `java.lang.SecurityException` is thrown.


    The following method reads the configuration information from a `java.io.InputStream`
    source:


    ```

    public void readConfiguration(InputStream inStream)

    ```


    If there is a problem in reading the input stream, a `java.io.IOException` is
    thrown, and if there is a permission problem, a `java.lang.SecurityException`
    is thrown. A `java.beans.PropertyChangeEvent` is fired once the properties are
    read from the given input stream.


    The following method removes and eventually closes all the `Handler` objects associated
    with all the named loggers:


    ```

    public void reset()

    ```


    The `reset()` method is protected by the default `SecurityManager` of the logging
    API and throws a `java.lang.SecurityException` in case the caller invoking the
    method does not have the required permission to do so. It sets the level associated
    with any named logger to null and sets the level of the root logger to Level.INFO.
    We can then create our own `Logger`s and notify the `LogManager` to manage the
    created loggers. This is often useful when an application needs to redefine new
    logging components and get rid of the old ones.


    The `LogManager` class is located at startup by looking into the `java.util.logging.manager`
    system property. The initial configuration file for the `LogManager` class is
    defined in the "/jre/lib/logging.properties" file in the "JAVA_HOME" directory.
    It is possible to change the behavior of the logging framework by changing the
    configuration file. We will take a detailed look at the configuration issues with
    `LogManager` in [Chapter 4](#LiB0026_split_000.html#166).


    ## LogRecord Object


    The `Logger` object encapsulates the message string passed to it and any other
    related information such as the level, etc., within a `LogRecord` object. The
    `LogRecord` object is the information pool for the logging framework. Once the
    `LogRecord` object has been created, any modification to it might lead to unexpected
    logging behavior. The `LogRecord` object is *serializable*, which means it can
    be transferred to a remote component over the Remote Method Invocation (RMI).
    This feature of the `LogRecord` object makes the logging framework distributed.
    We will explore serialization of the `LogRecord` class with RMI in [Chapter 4](#LiB0026_split_000.html#166).


    The `LogRecord` class consists of the following elements:


    *   The logging message string


    *   A logger name


    *   The logger level


    *   The timestamp of the logging activity


    *   The source class name and the source method name


    *   A unique sequence number


    *   The ID of the thread that generated the `LogRecord` object


    *   Optional argument objects (these objects can be used by the `Filter` object
    to make further decisions about the logging process)


    *   Optional `java.util.ResourceBundle` object used for localization


    *   Optional `java.lang.Throwable` object instance to indicate any erroneous conditions
    in the application


    When no explicit source class name and source method name is attached to the `LogRecord`
    object, the `Logger` object tries to determine this information by analyzing the
    stack trace. However, this is not a reliable technique and might not produce correct
    results in cases where the compiler uses any optimization techniques that might
    completely remove any stack trace.'
