- fmt: "### Remote Logging Server\n\n[Listing 4-5](#LiB0029.html#ch04ls05), `RemoteLoggingServer.java`,\
    \ is a Java RMI–based remote logging server component that listens to any incoming\
    \ logging request and then logs it on the server machine.\n\n**Listing 4-5:**\
    \ `RemoteLoggingServer.java`\n\n```\npackage sam.logging.rmi;\nimport java.rmi.RemoteException;\n\
    import java.rmi.server.UnicastRemoteObject;\nimport java.rmi.Naming;\nimport java.util.logging.LogManager;\n\
    import java.util.logging.LogRecord;\nimport java.util.logging.Logger;\nimport\
    \ java.util.logging.Level;\nimport java.util.logging.FileHandler;\npublic class\
    \ RemoteLoggingServer extends UnicastRemoteObject\nimplements Logging {\n    private\
    \ Logger logger = null;\n    private FileHandler handler = null;\n    private\
    \ String defaultPattern = null;\n    private String defaultAppend = null;\n  \
    \  private String defaultLevel = null;\n    private LogManager manager = LogManager.getLogManager();;\n\
    \npublic RemoteLoggingServer() throws RemoteException {\n        super();\n\n\
    defaultPattern =\nmanager.getProperty(\"java.util.logging.FileHandler.pattern\"\
    );\n        defaultAppend =\nmanager.getProperty(\"java.util.logging.FileHandler.append\"\
    );\n        setLoggerConfig(defaultPattern, new\nBoolean(defaultAppend).booleanValue());\n\
    \    }\n    /**\n     * constructor with the file handler pattern and append mode\n\
    \     */\n    public RemoteLoggingServer(String pattern, boolean append) throws\n\
    RemoteException {\n        super();\n        setLoggerConfig(pattern, append);\n\
    \    }\n\nprivate void setLoggerConfig(String pattern, boolean append) {\n   \
    \     try {\n            //obtain a package specific logger\n            logger\
    \ = Logger.getLogger(\"sam.logging.rmi\");\n            //create the file handler\
    \ with the given pattern\n            handler = new FileHandler(pattern, append);\n\
    \            //associate the handler with the logger\n            logger.addHandler(handler);\n\
    \n//setting the level of the logger via remote handler property\n            defaultLevel\
    \ =\nmanager.getProperty(RemoteLoggingServer.class.getName()+\".level\");\n\n\
    logger.setLevel(Level.parse(defaultLevel!=null?defaultLevel:\"INFO\"));\n    \
    \        //debug messages\n            logger.info(\"started with logging level:\
    \ \"+logger.getLevel());\n\n}catch(Exception e) {\n            System.out.println(e.toString());\n\
    \            System.exit(1);\n        }\n    }\n\n/**\n     * This method is the\
    \ core method which publishes the logging\n     * information to the desired file.\n\
    \     */\n    public void logMessage(LogRecord record) throws RemoteException\
    \ {\n        try {\n            //logging the message\n            logger.log(record);\n\
    \        }catch(Exception e) {\n            throw new RemoteException(e.toString());\n\
    \        }\n    }\n\npublic static void main(String args[]) {\n        //pattern\
    \ to store in the current directory in log0.out, log1.out etc.\n        String\
    \ pattern = \"log%u.out\";\n        boolean append = true;\n        RemoteLoggingServer\
    \ server = null;\n        try {\n            server = new RemoteLoggingServer();\n\
    \            Naming.bind(\"rmi://oemcomputer/LoggingServer\", server);\n     \
    \       System.out.println(\"Server started...\");\n        }catch(Exception re)\
    \ {\n            re.printStackTrace();\n        }\n    }\n}\n```\n\nThe `RemoteLoggingServer`\
    \ component is a simple RMI server-side component that implements an interface\
    \ named `Logging`, declared as shown here:\n\n```\npackage sam.logging.rmi;\n\n\
    import java.rmi.Remote;\nimport java.rmi.RemoteException;\nimport java.util.logging.LogRecord;\n\
    \npublic interface Logging extends Remote\n{\n  public void logMessage(LogRecord\
    \ record) throws RemoteException;\n}\n```\n\nThe `RemoteLoggingServer` class provides\
    \ an implementation of the `logMessage()` remote method in which it basically\
    \ publishes the logging information to the specified destination with the help\
    \ of the associated `Handler` object. The `Handler` object attached to the `RemoteLoggingServer`\
    \ component is a `java.util.logging.FileHandler` object. The `FileHandler` uses\
    \ a default `append` property to decide whether to append the logging information\
    \ to the specified logging file; it also uses as a default `pattern` of `%h/java%u.log`,\
    \ which means the logging information will be stored in a sequential series of\
    \ files such as \"java0.log\", \"java1.log\", etc., in the system's \"user.home\"\
    \ directory. The location and structure of the logging file can be changed at\
    \ startup by passing a different pattern from the `main()` method of the component\
    \ to the constructor of the `RemoteLoggingServer` component. The `RemoteLoggingServer`\
    \ component obtains the `level` property from the configuration file by reading\
    \ the `sam.logging.rmi.RemoteLoggingServer.level` property. At startup the component\
    \ is bound to the registry with the name \"LoggingServer\" and listens to the\
    \ RMI default port 1099:\n\n```\nNaming.bind(\"rmi://oemcomputer/LoggingServer\"\
    , server);\n```\n\nwhere `oemcomputer` is the name of the remote machine. As a\
    \ normal RMI development procedure, make sure you generate the `Stubs` and `Skeletons`\
    \ of the `RemoteLoggingServer` component, and set the classpath environment variable\
    \ to include all the required classes.\n\nAs per the Java 2 requirement, the `RMISecurityManager`\
    \ requires a policy file to be passed to the Java runtime. This policy file describes\
    \ permissions for class(es) to be able to access certain remote objects. We will\
    \ define a policy file, \"myPolicy.txt\", to grant permission to all classes.\n\
    \n```\ngrant\n{\n //allow permission to everything\n      permission java.security.AllPermission;\n\
    };\n```\n\nAt this point, we need to start the `rmiregistry` and then start the\
    \ `RemoteLoggingServer` with the following command:\n\n```\njava -Djava.security.policy=myPolicy.txt\
    \ sam.logging.rmi.RemoteLoggingServer\n```\n\n| Note | As per Java 2, the `SecurityManager`\
    \ needs to be configured properly in order to perform RMI operation to any remote\
    \ machine. The simplest way to achieve this to write a custom policy file and\
    \ pass it to the Java runtime. For example, \"myPolicy.txt\", the sample policy\
    \ file used for this example, grants permission to all requests. In theory, granting\
    \ permission to all requests is not the best practice. You need to consult RMI\
    \ books to learn more about policy files. For the time being, we are granting\
    \ permission to all requests. |\n\nThe `RemoteLoggingServer` component is now\
    \ up and running to receive any logging request."
