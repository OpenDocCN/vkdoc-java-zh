    Interestingly, if we comment out the setting of level in the `ChildLogger` class
    constructor, according to the package structure the logger in the `ChildLogger`
    class will try to use the `Logger` and its associated level defined in the `ParentLogger`
    class in the parent package `sam.logging`. In this case, the level associated
    with the parent logger is `SEVERE`.


    Executing the program in [Listing 2-4](#LiB0016.html#ch02ls04) with no level attached
    to the `Logger` object in the `ChildLogger` class will result in only the message
    with level `SEVERE` printing.


    ```

    26-Aug-2002 19:08:22 sam.logging.child.ChildLogger aMethod

    SEVERE: Severe message from Child Logger

    ```


    This example highlights how the parent-child relationship between `Logger` objects
    can affect the logging from within an application. Often, for your own purposes
    you will discover that this relationship is undesirable, and you will use the
    `setUseParentHandlers()` method in the `Logger` class to set the use of the parent
    logger and the associated `Handlers` to `false`. However, in some cases this parent-child
    relationship can be judicially employed to log the same message in two different
    destinations. For example, imagine a situation where the logger `sam.logging`
    is designed to write log messages to a file. The program `ChildLogger` is required
    to write the information to both console and file. In this situation, the child
    logger `sam.logging.child` can use a `ConsoleHandler` to write to the console,
    whereas the logging requests will automatically be delegated to the parent logger
    `sam.logging`. The parent logger will log the same information to a file.


    This example also highlights the fact that the change of configuration in the
    parent logger can affect the behavior of the child logger. Thus, the use of this
    parent-child relationship is case specific, and we need to consider this aspect
    before using it.


    ## Logging Information with Logger Objects


    Each `Logger` provides a number of different logging methods. The design of different
    logging methods is governed by the fact that a `LogRecord` can contain a simple
    text message and a few other logging parameters. These additional parameters can
    be used by the `Filter` and `Formatter` objects for any logging decision or localization
    information; or, if the logging is intended to highlight some error condition,
    the logging information might carry the information about the exception. The `Object`
    argument to the `log()` methods is typically used by `Filter` objects to achieve
    fine-grained control over the information. The `Filter` objects then can analyze
    the `Object` argument and decide whether it should be logged or not, depending
    on any criteria set by the application and defined within the `Filter` objects.
    The `Object` argument can be any Java type, which will by default always extend
    the `java.lang.Object`.


    The methods provided in the `Logger` class can be divided into the categories
    discussed in the following sections.


    ### Basic Logging Methods


    The following methods allow us to specify a logging level, the message string,
    the optional log record parameters, and an instance of `java.lang.Throwable`,
    which contains any error and exception details. The last method in this category
    accepts a `LogRecord` object and processes any information attached to the `LogRecord`
    object.


    ```

    public void log(Level level, String message);

    public void log(Level level, String message, Object param1);

    public void log(Level level, String message, Object[]params);

    public void log(Level level, String message, Throwable thrown);

    public void log(LogRecord record);

    ```


    As previously pointed out, the optional `Object` parameter to the logging methods
    can be used by `Filter` objects. For example, if we want to record the information
    for orders more than $100, we can pass an `Order` object to the logging methods
    as an optional parameter. Any `Filter` object associated with the `Handler` or
    `Logger` objects can then check for the order value and accordingly accept or
    reject the logging request.


    ### Precise Logging Methods


    The following methods are the same as the basic logging methods, except they explicitly
    specify the source class name and the source method name. On the surface this
    seems a simple aspect of logging information, but it can be a very important issue
    in logging. The JDK 1.4 logging API by default attempts to determine the location
    information for any particular logging request by analyzing the stack trace. This
    is a CPU-intensive operation and the outcome often cannot be trusted. Therefore,
    wherever you want the source class and source method names to be part of the logging
    information, you should use the precise logging methods.


    ```

    public void logp(Level level, String sourceClass, String sourceMethod,

    Stringmessage);

    public void logp(Level level, String sourceClass,

    String sourceMethod, String message, Object param1);

    public void logp(Level level, String sourceClass,

    String sourceMethod, String message, Object[] params);

    public void logp(Level level, String sourceClass,

    String sourceMethod, String message, Throwable thrown);

    ```


    ### Logging with ResourceBundle


    The following methods are the same as the precise logging methods, except they
    take a `ResourceBundle` name that will be used for localization purposes by the
    `Formatter` objects.


    The `java.util.ResourceBundle` is a technique to make our program language independent.
    With this technique, at the simplest level we use certain keys within our program.
    These keys map to certain messages (values) and are defined within a properties
    file. The `ResourceBundle` properties files are locale specific. For example,
    we can define messages in English and German in two separate properties files
    named `MyResources_en.properties` and `MyResources_de.properties`. In the program
    we can use the `ResourceBundle` object with the name `MyResource.properties`.
    In a situation where the locale requires German, our program will automatically
    pick up the resource named `MyResources_de.properties`.


    In the `ResourceBundle`-based logging methods of the `Logger` class, the message
    parameter is used as the key for the resource bundle to locate the localized message
    value.


    ```

    public void logrb(Level level, String sourceClass,

    String sourceMethod, String bundleName, String message);

    public void logrb(Level level, String sourceClass,

    String sourceMethod, String bundleName, String message,

    Object param1);

    public void logrb(Level level, String sourceClass,

    String sourceMethod, String bundleName,

    String message, Object[] params);

    public void logrb(Level level, String sourceClass,

    String sourceMethod, String bundleName, String message,

    Throwable thrown);

    ```'
