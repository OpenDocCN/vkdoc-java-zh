    \ propFile = args[0];\n        String fileName = args[1];\n        ClientComponent\
    \ comp = new ClientComponent(propFile);\n        try {\n            comp.setEmployeeData(\"\
    employee.xml\");\n        }catch(SQLException sqle) {\n            sqle.printStackTrace();\n\
    \        }\n    }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nThe `ClientComponent`\
    \ obtains its own named logger with the namespace \"com.apress.client\" and attaches\
    \ two separate `Handler`s for logging information to a remote place and to a small\
    \ Java window on the client machine.\n\n### Creating the Employee Data File\n\n\
    Now we are ready to execute our little demo application. Let's create a small\
    \ XML file, as shown in [Listing 4-13](#LiB0030.html#ch04ls13), containing the\
    \ employee data.\n\nListing 4-13: employee.xml\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\n<record>\n<employee>\n  <code>100</code>\n  <name>Sam</name>\n  <dept>Dev</dept>\n\
    \  <age>22</age>\n</employee>\n<employee>\n  <code>101</code>\n  <name>paul</name>\n\
    \  <dept>Dev</dept>\n  <age>38</age>\n</employee>\n<employee>\n  <code>102</code>\n\
    \  <name>derek</name>\n  <dept>Sales</dept>\n  <age>43</age>\n</employee>\n</record>\n\
    ```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n### Configuring the Database\n\
    \nThe previous program will require a table called EMPLOYEE to be defined in a\
    \ database. The following SQL command will create this table with \"CODE\" being\
    \ the primary key.\n\n```\nCREATE TABLE EMPLOYEE(\"CODE\" NUMBER NOT NULL,\"NAME\"\
    \ VARCHAR(10)\nNOT NULL,\"DEPT\" VARCHAR(10) NOT NULL, \"AGE\" NUMBER NOT NULL,\n\
    PRIMARY KEY(\"CODE\"));\n```\n\nThe following configuration file, \"db.properties\"\
    , will pass the database connection parameters to the `ClientComponent` at startup:\n\
    \n```\n DriverName=sun.jdbc.odbc.JdbcOdbcDriver\nURL=jdbc:odbc:dbdef\nuserName=system\n\
    Password=manager\n```\n\nAs we are using JDBC-ODBC driver for this simple example,\
    \ we need to create a Data Source Name (DNS) with the name \"dbdef\" and configure\
    \ it to point to the right data source.\n\n### Starting Up the Server\n\nWe need\
    \ to generate the `Stub` and `Skeleton` classes for the server component. This\
    \ can be done by the following command:\n\n```\nrmic com.apress.server.ServerComponent\n\
    ```\n\nWe can start the server component by executing the `RMIManager` class:\n\
    \n```\njava com.apress.server.RMIManager start\n```\n\n### Running the Client\n\
    \nYou probably have noticed that we are using the `RemoteHandler` and `WindowHandler`\
    \ objects developed in [Chapter 2](#LiB0012_split_000.html#44). Both these `Handler`s\
    \ have the ability to read the initialization parameters from the configuration\
    \ file specified via the command line option `-Djava.util.logging.config.file`\
    \ or from the default JDK \"logging.properties\" configuration file. We can design\
    \ a custom configuration file with the following entry, setting the level used\
    \ by the `RemoteHandler` and the `WindowHandler`:\n\n```\n############################################################\n\
    # RemoteHandler configuration\n# This is a custom handler developed to enable\
    \ remote logging\n#############################################################\n\
    sam.logging.handler.RemoteHandler.level=FINEST\n\n############################################################\n\
    #WindowHandler configuration\n#This is a custom handler which passes the logging\
    \ info\n#to a Java based logging window\n#############################################################\n\
    \nsam.logging.handler.WindowHandler.level = FINEST\n```\n\nThe `ClientComponent`\
    \ is designed to acquire the database connection properties from a configuration\
    \ file and also the name of the employee data XML file in the remote server as\
    \ a command line option. The \"db.properties\" file specified previously defines\
    \ the database connection properties, and we pass \"employee.xml\" as the name\
    \ of the remote file from which to obtain the employee data.\n\n```\nJava -Djava.util.logging.config.file=/your-path/config.properties\n\
    com.apress.db.ClientComponent /your-path/db.properties employee.xml\n```\n\nThe\
    \ logging information related to the `ClientComponent` will appear in a small\
    \ Java window as shown in [Figure 4-5](#LiB0030.html#ch04fig05).\n\n[![Click To\
    \ expand](fig4-5.jpg)](fig4-5_0.jpg)\nFigure 4-5: Logging information in the client-side\
    \ logging window\n\nOn the server side, the `ServerComponent` will store its own\
    \ logging information as well as the logging information being passed from the\
    \ `ClientComponent`. The `ServerComponent`, as discussed earlier, has its own\
    \ logging enabled with a `FileHandler` object that has the fixed pattern `%h/employeeLog%g.out`.\
    \ Hence, the `ServerComponent` logging information will be located in the \"user.home\"\
    \ directory under the names `employeeLog0.out`, `employeeLog1.out`, etc. On the\
    \ other hand, the `RemoteLoggingServer` is responsible for configuring the location\
    \ for the remote logging information enabled by any client application using the\
    \ `RemoteHandler`. If no pattern is specified with `RemoteLoggingServer`, the\
    \ default `FileHandler` pattern is used.\n\nWe can limit the amount of information\
    \ being printed in any of the logging destinations by changing the level associated\
    \ with the `Handler`. For example, in the `ClientComponent` JVM, if we change\
    \ the level of the `WindowHandler` to Level.INFO, then we will see the logging\
    \ information being printed as shown in [Figure 4-6](#LiB0030.html#ch04fig06).\n\
    \n[![Click To expand](fig4-6.jpg)](fig4-6_0.jpg)\nFigure 4-6: The logging information\
    \ in the client-side logging window\n\nClearly, changing the level has reduced\
    \ the amount of information. The log is now more readable. But notice that we\
    \ have achieved this by merely changing the configuration file—this is the beauty\
    \ of having a configurable logging API like the JDK 1.4 logging API.\n\n## Conclusion\n\
    \nIn the previous chapters, we have examined the architecture, use, and extension\
    \ of the JDK 1.4 logging API. We have also seen one practical example of how the\
    \ logging API can be very useful in tracing and debugging applications. The flexibility\
    \ of publishing log messages when needed and the granularity of our choices means\
    \ a great deal to application developers and administrators. Beginning in the\
    \ [next chapter](#LiB0032_split_000.html#266), we will explore in similar detail\
    \ log4j, another popular Java-based logging API from Apache.\n\n# Chapter 5: Understanding\
    \ Apache log4j"
