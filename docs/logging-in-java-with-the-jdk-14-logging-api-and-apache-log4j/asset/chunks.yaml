  trans: "\n### 远程日志服务器\n\n清单 4-5 中的 `RemoteLoggingServer.java` 是一个基于 Java RMI 的远程日志服务器组件，它监听所有传入的日志记录请求，然后在服务器机器上记录日志。\n\
    \n清单 4-5：RemoteLoggingServer.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\npackage\
    \ sam.logging.rmi;\nimport java.rmi.RemoteException;\nimport java.rmi.server.UnicastRemoteObject;\n\
    import java.rmi.Naming;\nimport java.util.logging.LogManager;\nimport java.util.logging.LogRecord;\n\
    import java.util.logging.Logger;\nimport java.util.logging.Level;\nimport java.util.logging.FileHandler;\n\
    public class RemoteLoggingServer extends UnicastRemoteObject\nimplements Logging\
    \ {\n    private Logger logger = null;\n    private FileHandler handler = null;\n\
    \    private String defaultPattern = null;\n    private String defaultAppend =\
    \ null;\n    private String defaultLevel = null;\n    private LogManager manager\
    \ = LogManager.getLogManager();;\n\npublic RemoteLoggingServer() throws RemoteException\
    \ {\n        super();\n\ndefaultPattern =\nmanager.getProperty(\"java.util.logging.FileHandler.pattern\"\
    );\n        defaultAppend =\nmanager.getProperty(\"java.util.logging.FileHandler.append\"\
    );\n        setLoggerConfig(defaultPattern, new\nBoolean(defaultAppend).booleanValue());\n\
    \    }\n    /**\n     * 带有文件处理器模式和追加模式的构造函数\n     */\n    public RemoteLoggingServer(String\
    \ pattern, boolean append) throws\nRemoteException {\n        super();\n     \
    \   setLoggerConfig(pattern, append);\n    }\n\nprivate void setLoggerConfig(String\
    \ pattern, boolean append) {\n        try {\n            //获取一个包特定的日志记录器\n   \
    \         logger = Logger.getLogger(\"sam.logging.rmi\");\n            //使用给定的模式创建文件处理器\n\
    \            handler = new FileHandler(pattern, append);\n            //将处理器与日志记录器关联\n\
    \            logger.addHandler(handler);\n\n//通过远程处理器属性设置日志记录器的级别\n          \
    \  defaultLevel =\nmanager.getProperty(RemoteLoggingServer.class.getName()+\"\
    .level\");\n\nlogger.setLevel(Level.parse(defaultLevel!=null?defaultLevel:\"INFO\"\
    ));\n            //调试消息\n            logger.info(\"started with logging level:\
    \ \"+logger.getLevel());\n\n}catch(Exception e) {\n            System.out.println(e.toString());\n\
    \            System.exit(1);\n        }\n    }\n\n/**\n     * 此方法是核心方法，用于将日志信息发布到目标文件。\n\
    \     */\n    public void logMessage(LogRecord record) throws RemoteException\
    \ {\n        try {\n            //记录消息\n            logger.log(record);\n    \
    \    }catch(Exception e) {\n            throw new RemoteException(e.toString());\n\
    \        }\n    }\n\npublic static void main(String args[]) {\n        //模式，用于将日志存储在当前目录的\
    \ log0.out、log1.out 等文件中\n        String pattern = \"log%u.out\";\n        boolean\
    \ append = true;\n        RemoteLoggingServer server = null;\n        try {\n\
    \            server = new RemoteLoggingServer();\n            Naming.bind(\"rmi://oemcomputer/LoggingServer\"\
    , server);\n            System.out.println(\"Server started...\");\n        }catch(Exception\
    \ re) {\n            re.printStackTrace();\n        }\n    }\n}\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n`RemoteLoggingServer` 组件是一个简单的 RMI 服务器端组件，它实现了一个名为 `Logging` 的接口，该接口声明如下：\n\
    \n```\npackage sam.logging.rmi;\n\nimport java.rmi.Remote;\nimport java.rmi.RemoteException;\n\
    import java.util.logging.LogRecord;\n\npublic interface Logging extends Remote\n\
    {\n  public void logMessage(LogRecord record) throws RemoteException;\n}\n```\n\
    \n`RemoteLoggingServer` 类提供了 `logMessage()` 远程方法的实现，该方法主要通过关联的 `Handler` 对象将日志信息发布到指定的目标位置。附加到\
    \ `RemoteLoggingServer` 组件的 `Handler` 对象是一个 `java.util.logging.FileHandler` 对象。`FileHandler`\
    \ 使用默认的 `append` 属性来决定是否将日志信息追加到指定的日志文件中；它还使用默认的 `pattern` 属性 `%h/java%u.log`，这意味着日志信息将以一系列顺序文件的形式存储在系统的\
    \ \"user.home\" 目录中，例如 \"java0.log\"、\"java1.log\" 等。日志文件的位置和结构可以在启动时通过从组件的 `main()`\
    \ 方法向 `RemoteLoggingServer` 组件的构造函数传递不同的模式来更改。`RemoteLoggingServer` 组件通过读取 `sam.logging.rmi.RemoteLoggingServer.level`\
    \ 属性从配置文件中获取 `level` 属性。启动时，该组件以名称 \"LoggingServer\" 绑定到注册表，并监听 RMI 默认端口 1099：\n\
    \n```\nNaming.bind(\"rmi://oemcomputer/LoggingServer\", server);\n```\n\n其中 `oemcomputer`\
    \ 是远程机器的名称。作为正常的 RMI 开发流程，请确保生成 `RemoteLoggingServer` 组件的 `Stubs` 和 `Skeletons`，并设置\
    \ classpath 环境变量以包含所有必需的类。\n\n根据 Java 2 的要求，`RMISecurityManager` 需要一个策略文件传递给 Java\
    \ 运行时。此策略文件描述了类访问某些远程对象的权限。我们将定义一个策略文件 \"myPolicy.txt\"，以授予所有类权限。\n\n```\ngrant\n\
    {\n //允许所有权限\n      permission java.security.AllPermission;\n};\n```\n\n此时，我们需要启动\
    \ `rmiregistry`，然后使用以下命令启动 `RemoteLoggingServer`：\n\n```\njava -Djava.security.policy=myPolicy.txt\
    \ sam.logging.rmi.RemoteLoggingServer\n```\n\n|  | 注意  | 根据 Java 2 的要求，需要正确配置\
    \ SecurityManager 才能对任何远程机器执行 RMI 操作。实现此目的的最简单方法是编写一个自定义策略文件并将其传递给 Java 运行时。例如，本示例中使用的示例策略文件\
    \ \"myPolicy.txt\" 授予所有请求权限。理论上，授予所有请求权限并非最佳实践。您需要查阅 RMI 相关书籍以了解更多关于策略文件的信息。目前，我们暂时授予所有请求权限。\
    \ |\n\n`RemoteLoggingServer` 组件现已启动并运行，可以接收任何日志记录请求。\n"
- fmt: "### Remote Logging Handler\n\n[Listing 4-6](#LiB0029.html#ch04ls06), `RemoteHandler.java`,\
    \ creates a custom `Handler` object to delegate logging activity to the remote\
    \ logging server developed in [Listing 4-5](#LiB0029.html#ch04ls05).\n\n**Listing\
    \ 4-6: RemoteHandler.java**\n\n```\npackage sam.logging.handler;\n\nimport java.util.logging.*;\n\
    import java.rmi.Naming;\nimport java.rmi.Remote;\nimport java.rmi.RemoteException;\n\
    import sam.logging.rmi.*;\n\npublic class RemoteHandler extends Handler {\n  \
    \  private static RemoteHandler handler = null;\n    private Logging remoteLogger\
    \ = null;\n    private LogManager manager = null;\n    private RemoteHandler(String\
    \ serverName) {\n        config();\n        try {\n            //obtain the remote\
    \ server reference\n            remoteLogger = (Logging)Naming.lookup(serverName);\n\
    \        }catch(Exception re) {\n            re.printStackTrace();\n         \
    \   System.exit(1);\n        }\n    }\n\n    private void config() {\n       \
    \ manager = LogManager.getLogManager();\n\nsetLevel(Level.parse(\nmanager.getProperty(\"\
    sam.logging.handler.RemoteHandler.level\")));\n    }\n\n    /**\n     * This method\
    \ returns a singleton instance of the\n     * present Handler object.\n     *@param\
    \ serverName name of the remote server\n     *@return RemoteHandler object\n \
    \    */\n    public static synchronized RemoteHandler getInstance(String serverName)\
    \ {\n        if(handler ==null) {\n            handler = new RemoteHandler(serverName);\n\
    \        }\n        return handler;\n    }\n    /**\n     * This is the overridden\
    \ publish() method\n     */\n    public synchronized void publish(LogRecord record)\
    \ {\n        try {\n          remoteLogger.logMessage(record);\n        }catch(RemoteException\
    \ re) {\n          reportError(null, re, ErrorManager.WRITE_FAILURE);\n      \
    \  }\n    }\n    //overridden close() and publish() methods\n    public void close(){\
    \ };\n    public void flush(){ };\n}\n```\n\nThe `RemoteHandler` object described\
    \ in [Listing 4-6](#LiB0029.html#ch04ls06) is a singleton. We need to ensure that\
    \ we only obtain the reference to the `RemoteLoggingServer` component once and\
    \ use the same reference throughout the application context to perform remote\
    \ logging. The remote reference to `RemoteLoggingServer` is obtained in the `private`\
    \ constructor of the `RemoteHandler` class. The client to this program is prohibited\
    \ from invoking the constructor directly to create a new instance of it. Alternatively,\
    \ `RemoteHandler` provides the following `static` method:\n\n```\npublic static\
    \ synchronized RemoteHandler getInstance(String serverName)\n```\n\nwhich returns\
    \ an already existing instance of the `RemoteHandler` object or creates a new\
    \ one and returns that. The constructor calls a `private` method, `config()`,\
    \ to configure the initialization parameters for the `Handler` by reading the\
    \ logging configuration file properties via the `LogManager`.\n\nThe `RemoteHandler`\
    \ class extends the `abstract` base class `java.util.logging.Handler`. The overridden\
    \ `publish()` method of the `RemoteHandler` class uses the remote reference of\
    \ the `RemoteLoggingServer` object and passes the `LogRecord` object to the remote\
    \ `logMessage()` method to publish the logging information. The `publish()` method\
    \ of the `RemoteHandler` is `synchronized` to make it thread-safe.\n\n### Remote\
    \ Logging Client\n\n[Listing 4-7](#LiB0029.html#ch04ls07), `RemoteLoggingDemo`,\
    \ is a client program that uses the `RemoteHandler` object developed in [Listing\
    \ 4-6](#LiB0029.html#ch04ls06) to enable remote logging. This application makes\
    \ use of the `RemoteHandler` object to log information to a remote machine.\n\n\
    **Listing 4-7: RemoteHandlerDemo.java**\n\n```\npackage sam.logging.handler;\n\
    \nimport java.util.logging.*;\npublic class RemoteHandlerDemo\n{\n private Logger\
    \ logger = null;\n private RemoteHandler handler = null;\n\n public RemoteHandlerDemo()\n\
    \ {\n  logger = Logger.getLogger(\"sam.logging.handler\");\n  handler = RemoteHandler.getInstance(\"\
    LoggingServer\");\n  logger.addHandler(handler);\n }\n\n public void logMessage()\n\
    \ {\n  LogRecord record = new LogRecord(Level.SEVERE, \"Severe\n message....\"\
    );\n  logger.log(record);\n }\n public static void main(String args[])\n {\n \
    \ RemoteHandlerDemo demo = new RemoteHandlerDemo();\n  demo.logMessage();\n }\n\
    }\n```\n\nThe `RemoteHandlerDemo` class is a very simple class that obtains a\
    \ package-specific logger, obtains an instance of the `RemoteHandler` object,\
    \ and attaches the `RemoteHandler` to the logger as the preferred `Handler`. It\
    \ then creates a simple `LogRecord` object and logs the message to the remote\
    \ location. Although the logging activity is carried out remotely, the applications\
    \ need *not* know any details about the remote objects or how it is done. In that\
    \ sense, the application carries on using the normal logging activity, and the\
    \ custom `RemoteHandler` takes care of the rest.\n\n## Logging in Practice\n\n\
    Let's consider an application scenario in which several components are distributed\
    \ across different machines in order to implement an employee data management\
    \ system. Imagine that one of the components is a Java RMI component that reads\
    \ XML employee data stored in a file local to the machine on which the RMI program\
    \ is running. There is also an application component client to the RMI program\
    \ that obtains the XML-formatted employee information from the RMI component,\
    \ parses the data, and inserts the data into a database.\n\nThe information being\
    \ accessed and stored to the database is critical to the functioning of the employee\
    \ management system. We need to maintain traces of user activity with the data\
    \ and log every success and failure in the whole process. Also, it will be useful\
    \ to provide users with information about their activity. The client program executes\
    \ on a completely different machine in a separate JVM environment interacting\
    \ with RMI components and the database. Hence, it is required that the client\
    \ program should produce traces of its activity in the client environment. In\
    \ order to achieve a centralized control system, critical logging information\
    \ would also need to be passed to the remote logging component, which will log\
    \ the information to a predefined destination.\n\nThe diagram in [Figure 4-3](#LiB0030.html#ch04fig03)\
    \ presents the overall architecture of the system.\n\n[![Click To expand](fig4-3.jpg)](fig4-3_0.jpg)\n\
    **Figure 4-3: The employee data management architecture**\n\nIn a nutshell, the\
    \ implemented system will perform the following operations:\n\n*   The RMI server\
    \ component will read the XML employee data.\n*   The server component implements\
    \ a logging mechanism that stores the logging information to a predefined destination.\n\
    *   The client component will obtain the employee data by invoking a remote method\
    \ on the RMI server component.\n*   The client component will store the data in\
    \ the database via JDBC.\n*   The client component will produce its own debug\
    \ trace to a small Java window. The client component will also pass critical logging\
    \ information to a remote logging server.\n*   The remote logging server is a\
    \ separate RMI component that will store the logging information in XML format.\n\
    \nThe different components involved in the whole system are as follows:\n\n* \
    \  The `Employee` object\n*   The remote server interface\n*   The remote server\
    \ component\n*   The remote logging server\n*   The RMI manager component\n* \
    \  The client component\n\n[Figure 4-4](#LiB0030.html#ch04fig04) presents the\
    \ UML diagram for these components. The diagram explains how these components\
    \ are related to one another and how the objects interact.\n\n[![Click To expand](fig4-4.jpg)](fig4-4_0.jpg)\n\
    **Figure 4-4: UML diagram for the components**"
  raw: "### Remote Logging Handler\n\n[Listing 4-6](#LiB0029.html#ch04ls06), `RemoteHandler.java`,\
    \ creates a custom `Handler` object to delegate logging activity to the remote\
    \ logging server developed in [Listing 4-5](#LiB0029.html#ch04ls05).\n\nListing\
    \ 4-6: RemoteHandler.java\n\n| **![Start example](_1.gif)** |\n\n```\npackage\
    \ sam.logging.handler;\n\nimport java.util.logging.*;\nimport java.rmi.Naming;\n\
    import java.rmi.Remote;\nimport java.rmi.RemoteException;\nimport sam.logging.rmi.*;\n\
    \npublic class RemoteHandler extends Handler {\n    private static RemoteHandler\
    \ handler = null;\n    private Logging remoteLogger = null;\n    private LogManager\
    \ manager = null;\n    private RemoteHandler(String serverName) {\n        config();\n\
    \        try {\n            //obtain the remote server reference\n           \
    \ remoteLogger = (Logging)Naming.lookup(serverName);\n        }catch(Exception\
    \ re) {\n            re.printStackTrace();\n            System.exit(1);\n    \
    \    }\n    }\n\n    private void config() {\n        manager = LogManager.getLogManager();\n\
    \nsetLevel(Level.parse(\nmanager.getProperty(\"sam.logging.handler.RemoteHandler.level\"\
    )));\n    }\n\n    /**\n     * This method returns a singleton instance of the\n\
    \     * present Handler object.\n     *@param serverName name of the remote server\n\
    \     *@return RemoteHandler object\n     */\n    public static synchronized RemoteHandler\
    \ getInstance(String serverName) {\n        if(handler ==null) {\n           \
    \ handler = new RemoteHandler(serverName);\n        }\n        return handler;\n\
    \    }\n    /**\n     * This is the overridden publish() method\n     */\n   \
    \ public synchronized void publish(LogRecord record) {\n        try {\n      \
    \    remoteLogger.logMessage(record);\n        }catch(RemoteException re) {\n\
    \          reportError(null, re, ErrorManager.WRITE_FAILURE);\n        }\n   \
    \ }\n    //overridden close() and publish() methods\n    public void close(){\
    \ };\n    public void flush(){ };\n}\n```\n\n| **![End example](_1.gif)** |\n\n\
    |  |\n\nThe `RemoteHandler` object described in [Listing 4-6](#LiB0029.html#ch04ls06)\
    \ is a singleton. We need to ensure that we only obtain the reference to the `RemoteLoggingServer`\
    \ component once and use the same reference throughout the application context\
    \ to perform remote logging. The remote reference to `RemoteLoggingServer` is\
    \ obtained in the `private` constructor of the `RemoteHandler` class. The client\
    \ to this program is prohibited from invoking the constructor directly to create\
    \ a new instance of it. Alternatively, `RemoteHandler` provides the following\
    \ `static` method:\n\n```\npublic static synchronized RemoteHandler getInstance(String\
    \ serverName)\n```\n\nwhich returns an already existing instance of the `RemoteHandler`\
    \ object or creates a new one and returns that. The constructor calls a `private`\
    \ method, `config()`, to configure the initialization parameters for the `Handler`\
    \ by reading the logging configuration file properties via the `LogManager`.\n\
    \nThe `RemoteHandler` class extends the `abstract` base class `java.util.logging.Handler`.\
    \ The overridden `publish()` method of the `RemoteHandler` class uses the remote\
    \ reference of the `RemoteLoggingServer` object and passes the `LogRecord` object\
    \ to the remote `logMessage()` method to publish the logging information. The\
    \ `publish()` method of the `RemoteHandler` is `synchronized` to make it thread-safe.\n\
    \n### Remote Logging Client\n\n[Listing 4-7](#LiB0029.html#ch04ls07), `RemoteLoggingDemo`,\
    \ is a client program that uses the `RemoteHandler` object developed in [Listing\
    \ 4-6](#LiB0029.html#ch04ls06) to enable remote logging. This application makes\
    \ use of the `RemoteHandler` object to log information to a remote machine.\n\n\
    Listing 4-7: RemoteHandlerDemo.java\n\n| **![Start example](_1.gif)** |\n\n```\n\
    package sam.logging.handler;\n\nimport java.util.logging.*;\npublic class RemoteHandlerDemo\n\
    {\n private Logger logger = null;\n private RemoteHandler handler = null;\n\n\
    \ public RemoteHandlerDemo()\n {\n  logger = Logger.getLogger(\"sam.logging.handler\"\
    );\n  handler = RemoteHandler.getInstance(\"LoggingServer\");\n  logger.addHandler(handler);\n\
    \ }\n\n public void logMessage()\n {\n  LogRecord record = new LogRecord(Level.SEVERE,\
    \ \"Severe\n message....\");\n  logger.log(record);\n }\n public static void main(String\
    \ args[])\n {\n  RemoteHandlerDemo demo = new RemoteHandlerDemo();\n  demo.logMessage();\n\
    \ }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nThe `RemoteHandlerDemo`\
    \ class is a very simple class that obtains a package-specific logger, obtains\
    \ an instance of the `RemoteHandler` object, and attaches the `RemoteHandler`\
    \ to the logger as the preferred `Handler`. It then creates a simple `LogRecord`\
    \ object and logs the message to the remote location. Although the logging activity\
    \ is carried out remotely, the applications need *not* know any details about\
    \ the remote objects or how it is done. In that sense, the application carries\
    \ on using the normal logging activity, and the custom `RemoteHandler` takes care\
    \ of the rest.\n\n## Logging in Practice\n\nLet's consider an application scenario\
    \ in which several components are distributed across different machines in order\
    \ to implement an employee data management system. Imagine that one of the components\
    \ is a Java RMI component that reads XML employee data stored in a file local\
    \ to the machine on which the RMI program is running. There is also an application\
    \ component client to the RMI program that obtains the XML-formatted employee\
    \ information from the RMI component, parses the data, and inserts the data into\
    \ a database.\n\nThe information being accessed and stored to the database is\
    \ critical to the functioning of the employee management system. We need to maintain\
    \ traces of user activity with the data and log every success and failure in the\
    \ whole process. Also, it will be useful to provide users with information about\
    \ their activity. The client program executes on a completely different machine\
    \ in a separate JVM environment interacting with RMI components and the database.\
    \ Hence, it is required that the client program should produce traces of its activity\
    \ in the client environment. In order to achieve a centralized control system,\
    \ critical logging information would also need to be passed to the remote logging\
    \ component, which will log the information to a predefined destination.\n\nThe\
    \ diagram in [Figure 4-3](#LiB0030.html#ch04fig03) presents the overall architecture\
    \ of the system.\n\n[![Click To expand](fig4-3.jpg)](fig4-3_0.jpg)\nFigure 4-3:\
    \ The employee data management architecture\n\nIn a nutshell, the implemented\
    \ system will perform the following operations:\n\n*   The RMI server component\
    \ will read the XML employee data.\n\n*   The server component implements a logging\
    \ mechanism that stores the logging information to a predefined destination.\n\
    \n*   The client component will obtain the employee data by invoking a remote\
    \ method on the RMI server component.\n\n*   The client component will store the\
    \ data in the database via JDBC.\n\n*   The client component will produce its\
    \ own debug trace to a small Java window. The client component will also pass\
    \ critical logging information to a remote logging server.\n\n*   The remote logging\
    \ server is a separate RMI component that will store the logging information in\
    \ XML format.\n\nThe different components involved in the whole system are as\
    \ follows:\n\n*   The `Employee` object\n\n*   The remote server interface\n\n\
    *   The remote server component\n\n*   The remote logging server\n\n*   The RMI\
    \ manager component\n\n*   The client component\n\n[Figure 4-4](#LiB0030.html#ch04fig04)\
    \ presents the UML diagram for these components. The diagram explains how these\
    \ components are related to one another and how the objects interact.\n\n[![Click\
    \ To expand](fig4-4.jpg)](fig4-4_0.jpg)\nFigure 4-4: UML diagram for the components"
  trans: "\n### 远程日志处理器\n\n代码清单 4-6 中的 `RemoteHandler.java` 创建了一个自定义的 `Handler` 对象，用于将日志记录活动委托给代码清单\
    \ 4-5 中开发的远程日志服务器。\n\n代码清单 4-6：RemoteHandler.java\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\npackage sam.logging.handler;\n\nimport java.util.logging.*;\nimport\
    \ java.rmi.Naming;\nimport java.rmi.Remote;\nimport java.rmi.RemoteException;\n\
    import sam.logging.rmi.*;\n\npublic class RemoteHandler extends Handler {\n  \
    \  private static RemoteHandler handler = null;\n    private Logging remoteLogger\
    \ = null;\n    private LogManager manager = null;\n    private RemoteHandler(String\
    \ serverName) {\n        config();\n        try {\n            //获取远程服务器引用\n \
    \           remoteLogger = (Logging)Naming.lookup(serverName);\n        }catch(Exception\
    \ re) {\n            re.printStackTrace();\n            System.exit(1);\n    \
    \    }\n    }\n\n    private void config() {\n        manager = LogManager.getLogManager();\n\
    \nsetLevel(Level.parse(\nmanager.getProperty(\"sam.logging.handler.RemoteHandler.level\"\
    )));\n    }\n\n    /**\n     * 此方法返回当前 Handler 对象的单例实例。\n     *@param serverName\
    \ 远程服务器的名称\n     *@return RemoteHandler 对象\n     */\n    public static synchronized\
    \ RemoteHandler getInstance(String serverName) {\n        if(handler ==null) {\n\
    \            handler = new RemoteHandler(serverName);\n        }\n        return\
    \ handler;\n    }\n    /**\n     * 这是重写的 publish() 方法\n     */\n    public synchronized\
    \ void publish(LogRecord record) {\n        try {\n          remoteLogger.logMessage(record);\n\
    \        }catch(RemoteException re) {\n          reportError(null, re, ErrorManager.WRITE_FAILURE);\n\
    \        }\n    }\n    //重写的 close() 和 publish() 方法\n    public void close(){\
    \ };\n    public void flush(){ };\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|\
    \  |\n\n代码清单 4-6 中描述的 `RemoteHandler` 对象是一个单例。我们需要确保只获取一次 `RemoteLoggingServer`\
    \ 组件的引用，并在整个应用程序上下文中使用相同的引用来执行远程日志记录。对 `RemoteLoggingServer` 的远程引用是在 `RemoteHandler`\
    \ 类的 `private` 构造函数中获取的。该程序的客户端被禁止直接调用构造函数来创建它的新实例。相反，`RemoteHandler` 提供了以下 `static`\
    \ 方法：\n\n```\npublic static synchronized RemoteHandler getInstance(String serverName)\n\
    ```\n\n该方法返回一个已存在的 `RemoteHandler` 对象实例，或者创建一个新实例并返回。构造函数调用一个 `private` 方法 `config()`，通过\
    \ `LogManager` 读取日志配置文件属性，来配置 `Handler` 的初始化参数。\n\n`RemoteHandler` 类继承了 `abstract`\
    \ 基类 `java.util.logging.Handler`。`RemoteHandler` 类重写的 `publish()` 方法使用 `RemoteLoggingServer`\
    \ 对象的远程引用，并将 `LogRecord` 对象传递给远程的 `logMessage()` 方法来发布日志信息。`RemoteHandler` 的 `publish()`\
    \ 方法是 `synchronized` 的，以确保其线程安全。\n\n### 远程日志客户端\n\n代码清单 4-7 中的 `RemoteLoggingDemo`\
    \ 是一个客户端程序，它使用代码清单 4-6 中开发的 `RemoteHandler` 对象来实现远程日志记录。该应用程序利用 `RemoteHandler`\
    \ 对象将日志信息记录到远程机器上。\n\n代码清单 4-7：RemoteHandlerDemo.java\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\npackage sam.logging.handler;\n\nimport java.util.logging.*;\npublic\
    \ class RemoteHandlerDemo\n{\n private Logger logger = null;\n private RemoteHandler\
    \ handler = null;\n\n public RemoteHandlerDemo()\n {\n  logger = Logger.getLogger(\"\
    sam.logging.handler\");\n  handler = RemoteHandler.getInstance(\"LoggingServer\"\
    );\n  logger.addHandler(handler);\n }\n\n public void logMessage()\n {\n  LogRecord\
    \ record = new LogRecord(Level.SEVERE, \"Severe\n message....\");\n  logger.log(record);\n\
    \ }\n public static void main(String args[])\n {\n  RemoteHandlerDemo demo = new\
    \ RemoteHandlerDemo();\n  demo.logMessage();\n }\n}\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n`RemoteHandlerDemo` 类是一个非常简单的类，它获取一个特定包的日志记录器，获取一个 `RemoteHandler`\
    \ 对象的实例，并将 `RemoteHandler` 作为首选的 `Handler` 附加到该日志记录器上。然后，它创建一个简单的 `LogRecord`\
    \ 对象，并将消息记录到远程位置。尽管日志记录活动是远程执行的，但应用程序*无需*了解远程对象或具体实现方式的任何细节。从这个意义上说，应用程序继续使用正常的日志记录活动，而自定义的\
    \ `RemoteHandler` 负责处理其余部分。\n\n## 日志记录实践\n\n让我们考虑一个应用场景，其中多个组件分布在不同机器上，以实现一个员工数据管理系统。假设其中一个组件是一个\
    \ Java RMI 组件，它读取存储在运行 RMI 程序的机器本地文件中的 XML 员工数据。还有一个 RMI 程序的应用程序组件客户端，它从 RMI 组件获取\
    \ XML 格式的员工信息，解析数据，并将数据插入到数据库中。\n\n被访问并存储到数据库中的信息对于员工管理系统的运行至关重要。我们需要维护用户与数据交互的痕迹，并记录整个过程中的每一次成功和失败。此外，向用户提供有关其活动的信息也很有用。客户端程序在完全不同的机器上、独立的\
    \ JVM 环境中执行，与 RMI 组件和数据库进行交互。因此，要求客户端程序在客户端环境中生成其活动的痕迹。为了实现集中控制系统，关键的日志信息也需要传递给远程日志组件，该组件会将信息记录到预定义的目标位置。\n\
    \n图 4-3 中的图表展示了系统的整体架构。\n\n![点击展开](img/fig4-3_0.jpg)\n图 4-3：员工数据管理架构\n\n简而言之，实现的系统将执行以下操作：\n\
    \n*   RMI 服务器组件将读取 XML 员工数据。\n\n*   服务器组件实现一种日志记录机制，将日志信息存储到预定义的目标位置。\n\n*   客户端组件将通过调用\
    \ RMI 服务器组件上的远程方法来获取员工数据。\n\n*   客户端组件将通过 JDBC 将数据存储到数据库中。\n\n*   客户端组件将生成自己的调试跟踪信息，显示在一个小型\
    \ Java 窗口中。客户端组件还将把关键的日志信息传递给远程日志服务器。\n\n*   远程日志服务器是一个独立的 RMI 组件，它将日志信息以 XML\
    \ 格式存储。\n\n整个系统中涉及的不同组件如下：\n\n*   `Employee` 对象\n\n*   远程服务器接口\n\n*   远程服务器组件\n\
    \n*   远程日志服务器\n\n*   RMI 管理器组件\n\n*   客户端组件\n\n图 4-4 展示了这些组件的 UML 图。该图解释了这些组件如何相互关联以及对象如何交互。\n\
    \n![点击展开](img/fig4-4_0.jpg)\n图 4-4：组件的 UML 图\n"
- fmt: "### Employee Object\n\n[Listing 4-8](#LiB0030.html#ch04ls08), `Employee.java`,\
    \ is a business object that represents employee data. This class is a Java Bean.\
    \ As the `Employee` object is used for the RMI, it implements the `java.io.Serializable`\
    \ interface to make it possible to transport logging information over the RMI\
    \ protocol.\n\nListing 4-8: `Employee.java`\n\n```\npackage com.apress.business;\n\
    \npublic class Employee implements java.io.Serializable{\n\n    /** Holds value\
    \ of property name. */\n    private String name;\n\n    /** Holds value of property\
    \ age. */\n    private int age;\n\n    /** Holds value of property department.\
    \ */\n    private String department;\n\n    /** Holds value of property code.\
    \ */\n    private int code;\n\n    /** Creates a new instance of Employee */\n\
    \    public Employee() {\n    }\n\n    /** Getter for property name.\n     * @return\
    \ Value of property name.\n     */\n    public String getName() {\n        return\
    \ this.name;\n    }\n\n    /** Setter for property name.\n     * @param name New\
    \ value of property name.\n     */\n    public void setName(String name) {\n \
    \       this.name = name;\n    }\n\n    /** Getter for property age.\n     * @return\
    \ Value of property age.\n     */\n    public int getAge() {\n        return this.age;\n\
    \    }\n\n    /** Setter for property age.\n     * @param age New value of property\
    \ age.\n     */\n    public void setAge(int age) {\n        this.age = age;\n\
    \    }\n\n    /** Getter for property department.\n     * @return Value of property\
    \ department.\n     */\n    public String getDepartment() {\n        return this.department;\n\
    \    }\n\n    /** Setter for property department.\n     * @param department New\
    \ value of property department.\n     */\n    public void setDepartment(String\
    \ department) {\n        this.department = department;\n    }\n\n    /** Getter\
    \ for property code.\n     * @return Value of property code.\n     */\n    public\
    \ int getCode() {\n        return this.code;\n    }\n\n    /** Setter for property\
    \ code.\n     * @param code New value of property code.\n     */\n    public void\
    \ setCode(int code) {\n        this.code = code;\n    }\n\n}\n```\n\n### Remote\
    \ Server Interface\n\n[Listing 4-9](#LiB0030.html#ch04ls09), `ServerInterface.java`,\
    \ defines the remote interface for the server component responsible for reading\
    \ the XML employee data. It defines a single remote method, `readDocument(String\
    \ docId)`. The defined method throws a `java.rmi.RemoteException` in accordance\
    \ with the Java RMI specification if there is a problem.\n\nListing 4-9: `ServerInterface.java`\n\
    \n```\npackage com.apress.server;\nimport java.rmi.Remote;\nimport java.rmi.RemoteException;\n\
    import java.util.List;\npublic interface ServerInterface extends Remote\n{\n \
    \   public List readDocument(String docId) throws RemoteException\n        }\n\
    ```\n\n### Remote Server Component\n\n[Listing 4-10](#LiB0030.html#ch04ls10),\
    \ `ServerComponent.java`, is the implementation of the remote `ServerInterface`\
    \ and provides implementation for the only declared remote method, `readDocument(String\
    \ docID)`. It parses the specified XML file and creates a `java.util.List` of\
    \ `Employee` objects and returns the `List` object back to the caller. It also\
    \ has its own logging enabled—it does so by obtaining a separate `Logger` with\
    \ the namespace `\"com.apress.server\"` and using a `FileHandler` to publish the\
    \ logging information. The `FileHandler` is initialized with the pattern `%h/employeeLog%g.out`,\
    \ which means the log files will be created in the `\"user.home\"` directory with\
    \ the name `\"employeeLog(n).out\"` where `\"n\"` represents the unique ID.\n\n\
    Listing 4-10: `ServerComponent.java`\n\n```\npackage com.apress.server;\n\nimport\
    \ java.rmi.server.UnicastRemoteObject;\nimport java.rmi.Naming;\nimport java.rmi.RemoteException;\n\
    import java.io.File;\nimport java.util.Vector;\nimport java.util.List;\nimport\
    \ java.util.Iterator;\nimport java.io.IOException;\nimport org.jdom.Document;\n\
    import org.jdom.input.SAXBuilder;\nimport org.jdom.JDOMException;\nimport org.jdom.Element;\n\
    import java.util.logging.*;\nimport com.apress.business.Employee;\n\npublic class\
    \ ServerComponent extends UnicastRemoteObject\nimplements ServerInterface{\n\n\
    private Document doc = null;\n    private SAXBuilder builder = null;\n    private\
    \ Vector empList = null;\n    private Logger logger = null;\n    private FileHandler\
    \ handler = null;\n    /** Creates a new instance of ServerComponent */\n    public\
    \ ServerComponent() throws RemoteException {\n        super();\n        builder\
    \ = new SAXBuilder();\n        empList = new Vector();\n\ntry {\n            //obtain\
    \ a logger instance\n            logger = Logger.getLogger(\"com.apress.server\"\
    );\n            //creating a FileHandler object with pattern\n            handler\
    \ = new FileHandler(\"%h/employeeLog%g.out\");\n            //setting the handler\
    \ to the logger\n            logger.addHandler(handler);\n        }catch(IOException\
    \ ioe) {\n            ioe.printStackTrace();\n        }\n    }\n    /**\n    \
    \ * This method reads the specified XML document from the current working\n  \
    \   * directory. It creates a list of Employee objects out of the XML data\n \
    \    * file and returns it to the caller.\n     * @param docId the name of the\
    \ XML document file\n     * @return the list of the Employee object\n     * @exception\
    \ RemoteException in case there is a problem in\n     * reading the file\n   \
    \  */\n    public List readDocument(String docId) throws RemoteException {\n \
    \       logger.entering(\"com.apress.server.ServerComponent\", \"readDocument\"\
    );\n        String name= null;\n        String code=null;\n        String dept\
    \ = null;\n        String age = null;\n        try {\n            //obtaining\
    \ a DOM instance from the document\n            doc = builder.build(new File(docId));\n\
    \            //finding the root element\n            Element root = doc.getRootElement();\n\
    \            //getting all the children\n            List list = root.getChildren();\n\
    \            Iterator iterator = list.iterator();\n            //iterating through\
    \ the records and creating the Employee objects\n            while(iterator.hasNext())\
    \ {\n                Element element = (Element)iterator.next();\n           \
    \     name = element.getChildText(\"name\");\n                code = element.getChildText(\"\
    code\");\n                dept = element.getChildText(\"dept\");\n           \
    \     age = element.getChildText(\"age\");\n                Employee emp = new\
    \ Employee();\n                emp.setName(name);\n                emp.setCode(Integer.parseInt(code));\n\
    \                emp.setAge(Integer.parseInt(age));\n                emp.setDepartment(dept);\n\
    \                empList.add(emp);\n            }\n        }catch(JDOMException\
    \ jdome) {\n         logger.severe(\"Exception in parsing the\nXML file: \"+jdome.toString());\n\
    \        }\n        logger.exiting(\"com.apress.server.ServerComponent\", \"readDocument\"\
    );\n\nreturn empList;\n    }\n}\n```\n\n### Remote Logging Server\n\nFor this\
    \ example, we are going to use the remote logging server component we developed\
    \ in [Listing 4-5](#LiB0029.html#215). We will view the data reader RMI component\
    \ developed in the [previous section](#LiB0030.html#ch04lev2sec9) and the remote\
    \ logging server as a combined entity. Accordingly, we will create a RMI manager\
    \ service that will manage both of these RMI components."
  raw: "### Employee Object\n\n[Listing 4-8](#LiB0030.html#ch04ls08), `Employee.java`,\
    \ is a business object that represents employee data. This class is a Java Bean.\
    \ As the `Employee` object is used for the RMI, it implements the `java.io.Serializable`\
    \ interface to make it possible to transport logging information over the RMI\
    \ protocol.\n\nListing 4-8: Employee.java\n\n| **![Start example](_1.gif)** |\n\
    \n```\npackage com.apress.business;\n\npublic class Employee implements java.io.Serializable{\n\
    \n    /** Holds value of property name. */\n    private String name;\n\n    /**\
    \ Holds value of property age. */\n    private int age;\n\n    /** Holds value\
    \ of property department. */\n    private String department;\n\n    /** Holds\
    \ value of property code. */\n    private int code;\n\n    /** Creates a new instance\
    \ of Employee */\n    public Employee() {\n    }\n\n    /** Getter for property\
    \ name.\n     * @return Value of property name.\n     */\n    public String getName()\
    \ {\n        return this.name;\n    }\n\n    /** Setter for property name.\n \
    \    * @param name New value of property name.\n     */\n    public void setName(String\
    \ name) {\n        this.name = name;\n    }\n\n    /** Getter for property age.\n\
    \     * @return Value of property age.\n     */\n    public int getAge() {\n \
    \       return this.age;\n    }\n\n    /** Setter for property age.\n     * @param\
    \ age New value of property age.\n     */\n    public void setAge(int age) {\n\
    \        this.age = age;\n    }\n\n    /** Getter for property department.\n \
    \    * @return Value of property department.\n     */\n    public String getDepartment()\
    \ {\n        return this.department;\n    }\n\n    /** Setter for property department.\n\
    \     * @param department New value of property department.\n     */\n    public\
    \ void setDepartment(String department) {\n        this.department = department;\n\
    \    }\n\n    /** Getter for property code.\n     * @return Value of property\
    \ code.\n     */\n    public int getCode() {\n        return this.code;\n    }\n\
    \n    /** Setter for property code.\n     * @param code New value of property\
    \ code.\n     */\n    public void setCode(int code) {\n        this.code = code;\n\
    \    }\n\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n### Remote Server\
    \ Interface\n\n[Listing 4-9](#LiB0030.html#ch04ls09), `ServerInterface.java`,\
    \ defines the remote interface for the server component responsible for reading\
    \ the XML employee data. It defines a single remote method, `readDocument(String\
    \ docId)`. The defined method throws a `java.rmi.RemoteException` in accordance\
    \ with the Java RMI specification if there is a problem.\n\nListing 4-9: ServerInterface.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\npackage com.apress.server;\nimport\
    \ java.rmi.Remote;\nimport java.rmi.RemoteException;\nimport java.util.List;\n\
    public interface ServerInterface extends Remote\n{\n    public List readDocument(String\
    \ docId) throws RemoteException\n        }\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\n### Remote Server Component\n\n[Listing 4-10](#LiB0030.html#ch04ls10),\
    \ `ServerComponent.java`, is the implementation of the remote `ServerInterface`\
    \ and provides implementation for the only declared remote method, `readDocument(String\
    \ docID)`. It parses the specified XML file and creates a `java.util.List` of\
    \ `Employee` objects and returns the `List` object back to the caller. It also\
    \ has its own logging enabled—it does so by obtaining a separate `Logger` with\
    \ the namespace \"com.apress.server\" and using a `FileHandler` to publish the\
    \ logging information. The `FileHandler` is initialized with the pattern `%h/employeeLog%g.out`,\
    \ which means the log files will be created in the \"user.home\" directory with\
    \ the name \"employeeLog(n).out\" where \"n\" represents the unique ID.\n\nListing\
    \ 4-10: ServerComponent.java\n\n| **![Start example](_1.gif)** |\n\n```\npackage\
    \ com.apress.server;\n\nimport java.rmi.server.UnicastRemoteObject;\nimport java.rmi.Naming;\n\
    import java.rmi.RemoteException;\nimport java.io.File;\nimport java.util.Vector;\n\
    import java.util.List;\nimport java.util.Iterator;\nimport java.io.IOException;\n\
    import org.jdom.Document;\nimport org.jdom.input.SAXBuilder;\nimport org.jdom.JDOMException;\n\
    import org.jdom.Element;\nimport java.util.logging.*;\nimport com.apress.business.Employee;\n\
    \npublic class ServerComponent extends UnicastRemoteObject\nimplements ServerInterface{\n\
    \nprivate Document doc = null;\n    private SAXBuilder builder = null;\n    private\
    \ Vector empList = null;\n    private Logger logger = null;\n    private FileHandler\
    \ handler = null;\n    /** Creates a new instance of ServerComponent */\n    public\
    \ ServerComponent() throws RemoteException {\n        super();\n        builder\
    \ = new SAXBuilder();\n        empList = new Vector();\n\ntry {\n            //obtain\
    \ a logger instance\n            logger = Logger.getLogger(\"com.apress.server\"\
    );\n            //creating a FileHandler object with pattern\n            handler\
    \ = new FileHandler(\"%h/employeeLog%g.out\");\n            //setting the handler\
    \ to the logger\n            logger.addHandler(handler);\n        }catch(IOException\
    \ ioe) {\n            ioe.printStackTrace();\n        }\n    }\n    /**\n    \
    \ * This method reads the specified XML document from the current working\n  \
    \   * directory. It creates a list of Employee objects out of the XML data\n \
    \    * file and returns it to the caller.\n     * @param docId the name of the\
    \ XML document file\n     * @return the list of the Employee object\n     * @exception\
    \ RemoteException in case there is a problem in\n     * reading the file\n   \
    \  */\n    public List readDocument(String docId) throws RemoteException {\n \
    \       logger.entering(\"com.apress.server.ServerComponent\", \"readDocument\"\
    );\n        String name= null;\n        String code=null;\n        String dept\
    \ = null;\n        String age = null;\n        try {\n            //obtaining\
    \ a DOM instance from the document\n            doc = builder.build(new File(docId));\n\
    \            //finding the root element\n            Element root = doc.getRootElement();\n\
    \            //getting all the children\n            List list = root.getChildren();\n\
    \            Iterator iterator = list.iterator();\n            //iterating through\
    \ the records and creating the Employee objects\n            while(iterator.hasNext())\
    \ {\n                Element element = (Element)iterator.next();\n           \
    \     name = element.getChildText(\"name\");\n                code = element.getChildText(\"\
    code\");\n                dept = element.getChildText(\"dept\");\n           \
    \     age = element.getChildText(\"age\");\n                Employee emp = new\
    \ Employee();\n                emp.setName(name);\n                emp.setCode(Integer.parseInt(code));\n\
    \                emp.setAge(Integer.parseInt(age));\n                emp.setDepartment(dept);\n\
    \                empList.add(emp);\n            }\n        }catch(JDOMException\
    \ jdome) {\n         logger.severe(\"Exception in parsing the\nXML file: \"+jdome.toString());\n\
    \        }\n        logger.exiting(\"com.apress.server.ServerComponent\", \"readDocument\"\
    );\n\nreturn empList;\n    }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\
    \n### Remote Logging Server\n\nFor this example, we are going to use the remote\
    \ logging server component we developed in [Listing 4-5](#LiB0029.html#215). We\
    \ will view the data reader RMI component developed in the [previous section](#LiB0030.html#ch04lev2sec9)\
    \ and the remote logging server as a combined entity. Accordingly, we will create\
    \ a RMI manager service that will manage both of these RMI components."
  trans: "\n### 员工对象\n\n清单 4-8 中的 `Employee.java` 是一个代表员工数据的业务对象。该类是一个 Java Bean。由于\
    \ `Employee` 对象用于 RMI，它实现了 `java.io.Serializable` 接口，以便能够通过 RMI 协议传输日志信息。\n\n\
    清单 4-8: Employee.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\npackage com.apress.business;\n\
    \npublic class Employee implements java.io.Serializable{\n\n    /** Holds value\
    \ of property name. */\n    private String name;\n\n    /** Holds value of property\
    \ age. */\n    private int age;\n\n    /** Holds value of property department.\
    \ */\n    private String department;\n\n    /** Holds value of property code.\
    \ */\n    private int code;\n\n    /** Creates a new instance of Employee */\n\
    \    public Employee() {\n    }\n\n    /** Getter for property name.\n     * @return\
    \ Value of property name.\n     */\n    public String getName() {\n        return\
    \ this.name;\n    }\n\n    /** Setter for property name.\n     * @param name New\
    \ value of property name.\n     */\n    public void setName(String name) {\n \
    \       this.name = name;\n    }\n\n    /** Getter for property age.\n     * @return\
    \ Value of property age.\n     */\n    public int getAge() {\n        return this.age;\n\
    \    }\n\n    /** Setter for property age.\n     * @param age New value of property\
    \ age.\n     */\n    public void setAge(int age) {\n        this.age = age;\n\
    \    }\n\n    /** Getter for property department.\n     * @return Value of property\
    \ department.\n     */\n    public String getDepartment() {\n        return this.department;\n\
    \    }\n\n    /** Setter for property department.\n     * @param department New\
    \ value of property department.\n     */\n    public void setDepartment(String\
    \ department) {\n        this.department = department;\n    }\n\n    /** Getter\
    \ for property code.\n     * @return Value of property code.\n     */\n    public\
    \ int getCode() {\n        return this.code;\n    }\n\n    /** Setter for property\
    \ code.\n     * @param code New value of property code.\n     */\n    public void\
    \ setCode(int code) {\n        this.code = code;\n    }\n\n}\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n### 远程服务器接口\n\n清单 4-9 中的 `ServerInterface.java` 定义了负责读取 XML 员工数据的服务器组件的远程接口。它定义了一个远程方法\
    \ `readDocument(String docId)`。根据 Java RMI 规范，如果出现问题，定义的方法会抛出 `java.rmi.RemoteException`。\n\
    \n清单 4-9: ServerInterface.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\npackage\
    \ com.apress.server;\nimport java.rmi.Remote;\nimport java.rmi.RemoteException;\n\
    import java.util.List;\npublic interface ServerInterface extends Remote\n{\n \
    \   public List readDocument(String docId) throws RemoteException\n        }\n\
    ```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n### 远程服务器组件\n\n清单 4-10 中的 `ServerComponent.java`\
    \ 是远程 `ServerInterface` 的实现，并为唯一声明的远程方法 `readDocument(String docID)` 提供了实现。它解析指定的\
    \ XML 文件，创建一个 `Employee` 对象的 `java.util.List`，并将该 `List` 对象返回给调用者。它还启用了自身的日志记录功能——通过获取一个命名空间为\
    \ \"com.apress.server\" 的独立 `Logger`，并使用 `FileHandler` 来发布日志信息。`FileHandler` 使用模式\
    \ `%h/employeeLog%g.out` 进行初始化，这意味着日志文件将在 \"user.home\" 目录下创建，文件名为 \"employeeLog(n).out\"\
    ，其中 \"n\" 代表唯一 ID。\n\n清单 4-10: ServerComponent.java\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\npackage com.apress.server;\n\nimport java.rmi.server.UnicastRemoteObject;\n\
    import java.rmi.Naming;\nimport java.rmi.RemoteException;\nimport java.io.File;\n\
    import java.util.Vector;\nimport java.util.List;\nimport java.util.Iterator;\n\
    import java.io.IOException;\nimport org.jdom.Document;\nimport org.jdom.input.SAXBuilder;\n\
    import org.jdom.JDOMException;\nimport org.jdom.Element;\nimport java.util.logging.*;\n\
    import com.apress.business.Employee;\n\npublic class ServerComponent extends UnicastRemoteObject\n\
    implements ServerInterface{\n\nprivate Document doc = null;\n    private SAXBuilder\
    \ builder = null;\n    private Vector empList = null;\n    private Logger logger\
    \ = null;\n    private FileHandler handler = null;\n    /** Creates a new instance\
    \ of ServerComponent */\n    public ServerComponent() throws RemoteException {\n\
    \        super();\n        builder = new SAXBuilder();\n        empList = new\
    \ Vector();\n\ntry {\n            //obtain a logger instance\n            logger\
    \ = Logger.getLogger(\"com.apress.server\");\n            //creating a FileHandler\
    \ object with pattern\n            handler = new FileHandler(\"%h/employeeLog%g.out\"\
    );\n            //setting the handler to the logger\n            logger.addHandler(handler);\n\
    \        }catch(IOException ioe) {\n            ioe.printStackTrace();\n     \
    \   }\n    }\n    /**\n     * This method reads the specified XML document from\
    \ the current working\n     * directory. It creates a list of Employee objects\
    \ out of the XML data\n     * file and returns it to the caller.\n     * @param\
    \ docId the name of the XML document file\n     * @return the list of the Employee\
    \ object\n     * @exception RemoteException in case there is a problem in\n  \
    \   * reading the file\n     */\n    public List readDocument(String docId) throws\
    \ RemoteException {\n        logger.entering(\"com.apress.server.ServerComponent\"\
    , \"readDocument\");\n        String name= null;\n        String code=null;\n\
    \        String dept = null;\n        String age = null;\n        try {\n    \
    \        //obtaining a DOM instance from the document\n            doc = builder.build(new\
    \ File(docId));\n            //finding the root element\n            Element root\
    \ = doc.getRootElement();\n            //getting all the children\n          \
    \  List list = root.getChildren();\n            Iterator iterator = list.iterator();\n\
    \            //iterating through the records and creating the Employee objects\n\
    \            while(iterator.hasNext()) {\n                Element element = (Element)iterator.next();\n\
    \                name = element.getChildText(\"name\");\n                code\
    \ = element.getChildText(\"code\");\n                dept = element.getChildText(\"\
    dept\");\n                age = element.getChildText(\"age\");\n             \
    \   Employee emp = new Employee();\n                emp.setName(name);\n     \
    \           emp.setCode(Integer.parseInt(code));\n                emp.setAge(Integer.parseInt(age));\n\
    \                emp.setDepartment(dept);\n                empList.add(emp);\n\
    \            }\n        }catch(JDOMException jdome) {\n         logger.severe(\"\
    Exception in parsing the\nXML file: \"+jdome.toString());\n        }\n       \
    \ logger.exiting(\"com.apress.server.ServerComponent\", \"readDocument\");\n\n\
    return empList;\n    }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n### 远程日志服务器\n\
    \n在本例中，我们将使用在清单 4-5 中开发的远程日志服务器组件。我们将把上一节中开发的数据读取器 RMI 组件和远程日志服务器视为一个组合实体。因此，我们将创建一个\
    \ RMI 管理器服务来管理这两个 RMI 组件。\n"
- fmt: "### The `RMIManager`\n\n[Listing 4-11](#LiB0030.html#ch04ls11), `RMIManager.java`,\
    \ is a simple utility that manages two remote services for `RemoteLoggingServer`\
    \ and `ServerComponent`. It can start the services by binding them to the `rmiregistry`\
    \ or stop the services by unbinding them from the `rmiregistry`, depending on\
    \ whether the command line option `\"start\"` or `\"stop\"` has been passed to\
    \ it.\n\n**Listing 4-11: `RMIManager.java`**\n\n```\npackage com.apress.server;\n\
    \nimport java.rmi.registry.*;\nimport java.rmi.Naming;\nimport sam.logging.rmi.RemoteLoggingServer;\n\
    public class RMIManager {\n\n    /** Creates a new instance of RMIManager */\n\
    \    public RMIManager() {\n    }\n\n    /**\n     * @param args the command line\
    \ arguments\n     */\n    public static void main(String[] args) {\n        try\
    \ {\n            if(args[0].equalsIgnoreCase(\"start\")) {\n                //binding\
    \ the services by creating a registry\n                //at port 1099(default)\n\
    \                Registry reg = LocateRegistry.createRegistry(1099);\n       \
    \         Naming.rebind(\"rmi://oemcomputer/AppServer\",\nnew ServerComponent());\n\
    \                Naming.rebind(\"rmi://oemcomputer/LoggingServer\",\nnew RemoteLoggingServer());\n\
    \                System.out.println(\"AppServer started...\");\n            }else\
    \ if(args[0].equalsIgnoreCase(\"stop\")) {\n                //unbinding the services\n\
    \                Naming.unbind(\"rmi://oemcomputer/AppServer\");\n           \
    \     Naming.unbind(\"rmi://oemcomputer/LoggingServer\");\n                System.exit(1);\n\
    \            }\n\n        }catch(Exception e) {\n            System.out.println(e.toString());\n\
    \        }\n    }\n}\n```\n\n### Client Component\n\n[Listing 4-12](#LiB0030.html#ch04ls12),\
    \ `ClientComponent.java`, is the client program that will use the RMI component\
    \ to receive the employee data and write the required information to the database.\
    \ It is mainly responsible for the following:\n\n*   First, it obtains a reference\
    \ to the remote server component and obtains the `List` of the `Employee` objects\
    \ to be inserted into the database.\n*   It obtains a JDBC connection to a specified\
    \ database and inserts the data to the database table(s).\n*   It obtains the\
    \ database configuration parameters from a configuration file passed to the Java\
    \ runtime as a command line option.\n*   It obtains a reference to the remote\
    \ logging server component, which is responsible for receiving logging information\
    \ and publishing it to the specified destination.\n*   It also publishes the client-side\
    \ logging information to a small Java window.\n\n**Listing 4-12: `ClientComponent.java`**\n\
    \n```\n package com.apress.db;\n\nimport java.sql.*;\nimport java.util.Properties;\n\
    import java.io.FileInputStream;\nimport java.io.FileNotFoundException;\nimport\
    \ java.io.IOException;\nimport java.util.List;\nimport java.util.Iterator;\nimport\
    \ java.util.logging.*;\nimport java.rmi.Naming;\nimport java.rmi.NotBoundException;\n\
    import java.rmi.RemoteException;\nimport com.apress.business.Employee;\nimport\
    \ com.apress.server.ServerInterface;\nimport sam.logging.handler.RemoteHandler;\n\
    import sam.logging.handler.WindowHandler;\n\npublic class ClientComponent {\n\n\
    private String driverName = null;\n    private String jdbcURL = null;\n    private\
    \ String userName = null;\n    private String password = null;\n    private Properties\
    \ props = null;\n    private Logger logger = null;\n    private RemoteHandler\
    \ remoteHandler = null;\n    private WindowHandler windowHandler = null;\n   \
    \ private ServerInterface server = null;\n\n/** Creates a new instance of ClientComponent\
    \ */\n    public ClientComponent(String propFile) {\n        props = new Properties();\n\
    \        try {\n            props.load(new FileInputStream(propFile));\n     \
    \       driverName = props.getProperty(\"DriverName\");\n            jdbcURL =\
    \ props.getProperty(\"URL\");\n            userName = props.getProperty(\"userName\"\
    );\n            password = props.getProperty(\"Password\");\n            System.out.println(\"\
    driver name: \"+driverName);\n            System.out.println(\"url: \"+jdbcURL);\n\
    \            System.out.println(\"user name: \"+userName);\n            System.out.println(\"\
    password: \"+password);\n            //obtain the reference to the rmi server\n\
    \            server= (ServerInterface)\nNaming.lookup(\"rmi://oemcomputer/AppServer\"\
    );\n            //obtain an instance of the logger\n\nlogger = Logger.getLogger(\"\
    com.apress.db\");\n            //obtain an instance of the remote handler\n  \
    \          //talking to the logging server named LoggingServer\n            remoteHandler=\n\
    RemoteHandler.getInstance(\"rmi://oemcomputer/LoggingServer\");\n            //getting\
    \ an instance of the window handler\n            windowHandler = WindowHandler.getInstance();\n\
    \            //adding the remote handler to the logger\n            logger.addHandler(remoteHandler);\n\
    \            //adding the window handler to the logger\n            logger.addHandler(windowHandler);\n\
    \            //set the logger level the same as the handler level\n          \
    \  logger.setLevel(remoteHandler.getLevel());\n\n//configuration done\n      \
    \      logger.config(\"client configuration done...\");\n        }catch(FileNotFoundException\
    \ fnfe) {\n            fnfe.printStackTrace();\n            System.out.println(\"\
    Could not find the properties\nfile: \"+propFile);\n            System.exit(1);\n\
    \        }catch(IOException ioe) {\n            ioe.printStackTrace();\n     \
    \       System.out.println(\"Problem in reading the\nprop file: \"+propFile);\n\
    \            System.exit(1);\n        }catch(NotBoundException re)\n        {\n\
    \            logger.severe(\"servert named AppServer is\nnot bound \"+re.toString());\n\
    \        }\n    }\n    //private helper method for obtaining a connection\n  \
    \  private Connection makeConnection()throws SQLException {\n        Connection\
    \ conn = null;\n        try {\n            Class.forName(driverName);\n      \
    \      conn = DriverManager.getConnection(jdbcURL, userName, password);\n    \
    \    }catch(ClassNotFoundException cnfe) {\n            System.out.println(\"\
    Class not found: \"+driverName);\n            System.exit(1);\n        }catch(SQLException\
    \ sqle) {\n            throw sqle;\n        }\n        System.out.println(\"evaluation:\n\
    \"+(logger.getLevel().intValue()<Level.INFO.intValue()));\n        logger.info(\"\
    Connection obtained as: \"+conn);\n        return conn;\n    }\n\n//private method\
    \ for closing the connection\n    private void closeConnection(Connection conn)\
    \ {\n        try {\n            if(conn !=null)\n                conn.close();\n\
    \        }catch(SQLException sqle) {\n            //WARNING\n            logger.warning(\"\
    Could not close the connection..\");\n        }\n        logger.info(\"connection\
    \ closed..\");\n    }\n\n/**\n     * This is a private method responsible for\
    \ writing the\n     * employee object datato the database.\n     * @param conn\
    \ the Connection object\n     * @param employee the Employee object\n     * @exception\
    \ SQLException is thrown in case there is a problem\n     */\n    private void\
    \ insertData(Connection conn, Employee employee)\nthrows SQLException {\n    \
    \    logger.entering(ClientComponent.class.getName(), \"insertData()\");\n   \
    \     Statement stmt =null;\n        StringBuffer queryString = new StringBuffer(\"\
    INSERT INTO\nEMPLOYEE VALUES(\");\n        try {\n            stmt = conn.createStatement();\n\
    \            queryString.append(employee.getCode());\n            queryString.append(\"\
    ,'\");\n            queryString.append(employee.getName());\n            queryString.append(\"\
    ','\");\n            queryString.append(employee.getDepartment());\n         \
    \   queryString.append(\"',\");\n            queryString.append(employee.getAge());\n\
    \            queryString.append(\")\");\n\nlogger.info(\"The queryString is ;\
    \ \"+queryString.toString());\n            stmt.execute(queryString.toString());\n\
    \            logger.fine(\"inserted data..\");\n            conn.commit();\n \
    \           stmt.close();\n        }catch(SQLException sqle) {\n            throw\
    \ sqle;\n        }\n\nlogger.exiting(ClientComponent.class.getName(), \"insertData()\"\
    );\n    }\n```"
  raw: "### The RMIManager\n\n[Listing 4-11](#LiB0030.html#ch04ls11), `RMIManager.java`,\
    \ is a simple utility that manages two remote services for `RemoteLoggingServer`\
    \ and `ServerComponent`. It can start the services by binding them to the `rmiregistry`\
    \ or stop the services by unbinding them from the `rmiregistry`, depending on\
    \ whether the command line option \"start\" or \"stop\" has been passed to it.\n\
    \nListing 4-11: RMIManager.java\n\n| **![Start example](_1.gif)** |\n\n```\npackage\
    \ com.apress.server;\n\nimport java.rmi.registry.*;\nimport java.rmi.Naming;\n\
