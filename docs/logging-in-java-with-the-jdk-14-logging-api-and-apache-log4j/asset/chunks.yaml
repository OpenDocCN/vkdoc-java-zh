    \ |\n\n```\npackage sam.logging;\n\npublic class Person\n{\n  private String name\
    \ = null;\n  private int age;\n\npublic Person(String name, int age)\n  {\n  \
    \ this.name = name;\n   this.age = age;\n  }\n\npublic void setName(String name)\n\
    \  {\n   this.name = name;\n  }\n\npublic String getName()\n  {\n   return name;\n\
    \  }\n\npublic void setAge(int age)\n  {\n   this.age = age;\n  }\n\npublic int\
    \ getAge()\n  {\n   return age;\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\
    \n|  |\n\n[Listing 2-12](#LiB0018.html#ch02ls12), `AgeFilter.java`, implements\
    \ the `java.util.logging.Filter` interface and provides an implementation for\
    \ the method `public boolean is` `Loggable(LogRecord record)`. For simplicity,\
    \ let's assume that the `LogRecord` object passed to it will have only one `Person`\
    \ object associated with it. We then obtain and check the age from the `Person`\
    \ object and return `true` if the age is greater than 30; otherwise, we return\
    \ `false`. If the return value is `true`, then the `LogRecord` object is passed\
    \ to the next processor in the line, or else the `LogRecord` object is discarded.\n\
    \nListing 2-12: AgeFilter.java\n\n| **![Start example](_1.gif)** |\n\n```\npackage\
    \ sam.logging;\n\nimport java.util.logging.*;\n\npublic class AgeFilter implements\
    \ Filter {\n    public AgeFilter() {\n    }\n    /**\n     * This is the overridden\
    \ method from the Filter interface.\n     * It checks the Person object associated\
    \ with the LogRecord\n     * checks the age>30, and returns true\n     *@param\
    \ record the LogRecord object\n     *@return boolean true/false\n     */\n   \
    \ public boolean isLoggable(LogRecord record) {\n        boolean result = false;\n\
    \        //obtaining the Person object from the record\n        Object[] objs\
    \ = record.getParameters();\n        Person person = (Person)objs[0];\n\n//check\
    \ if person is not null\n        if(person !=null) {\n            //obtain the\
    \ age\n            int age = person.getAge();\n            if(age>30)\n      \
    \          result = true;\n            else\n                result = false;\n\
    \        }\n        return result;\n    }\n}\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nOnce we have the infrastructure ready, we next create the program\
    \ in [Listing 2-13](#LiB0018.html#ch02ls13), `FilterDemo.java`, that will use\
    \ the `AgeFilter`. In the constructor, we obtain a `Logger` object with the `sam.logging`\
    \ package structure. We then instantiate a `AgeFilter` object, and assign the\
    \ `Filter` to the `Logger`. Now we will create two `Person` objects with age 32\
    \ and 29 and try to log some messages with the `logger.log()` method by passing\
    \ the reference to the respective created `Person` objects.\n\nListing 2-13: FilterDemo.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\npackage sam.logging;\n\nimport java.util.logging.*;\n\
    \npublic class FilterDemo\n{\n  private Logger logger = null;\n  private AgeFilter\
    \ filter = null;\n\npublic FilterDemo()\n  {\n    //obtaining a logger object\n\
    \    logger = Logger.getLogger(\"sam.logging\");\n    //creating a AgeFilter object\n\
    \    filter = new AgeFilter();\n    //attaching the filter to the logger\n   \
    \ logger.setFilter(filter);\n  }\n\n/**\n   * This method logs the message\n \
    \  */\n  public void logMessage(Person person)\n  {\n    //logging the message\
    \ with Person object as parameter\n    logger.log(Level.INFO, \"Person has age\
    \ \"+person.getAge(), person);\n  }\n\npublic static void main(String args[])\n\
    \  {\n    FilterDemo demo = new FilterDemo();\n    //creating Person objects\n\
    \    Person person1 = new Person(\"Paul\", 32);\n    Person person2 = new Person(\"\
    sam\", 29);\n    //logging with each Person object\n    demo.logMessage(person1);\n\
    \    demo.logMessage(person2);\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\
    \n|  |\n\nThe `Logger` object in [Listing 2-13](#LiB0018.html#ch02ls13) has the\
    \ `AgeFilter` attached to it, which only allows a `Person` object with age greater\
    \ than 30 to be logged. Therefore, executing this program will print the following\
    \ logging information to the console:\n\n```\n01-Sep-2002 13:01:06 sam.logging.FilterDemo\
    \ logMessage\nINFO: Person has age 32\n```\n\nThe preceding listing is a very\
    \ simplistic example of the usage of `Filter` objects in the logging framework.\
    \ You can easily figure out how useful `Filter` objects might become to greatly\
    \ reduce the number of log messages being published and also how they can help\
    \ to log only the information that is needed. `Filter` objects become really beneficial\
    \ when you need to print only selected logging information at the time of debugging."
  trans: "\n## 过滤器对象\n\n当我们希望对日志记录进行更细粒度的控制时，`java.util.logging.Filter` 对象就非常有用。我们已经了解到，日志信息会根据其关联的日志级别进行过滤。但在某些情况下，我们需要在最终决定是否记录某条日志之前，先对日志记录进行分析，这时就需要实现独立的\
    \ `Filter` 对象。`Filter` 可以附加到 `Logger` 对象和 `Handler` 对象上。在记录日志之前，每个对象都可以对特定的 `LogRecord`\
    \ 应用独立的 `Filter` 对象。可以通过 `setFilter()` 方法以编程方式设置 `Filter` 对象，也可以在配置文件中指定它们。\n\n\
    按照规则，`Filter` 对象必须实现 `java.util.logging.Filter` 接口，该接口定义了一个单一方法 `isLoggable(LogRecord\
    \ record)`，返回一个布尔值。在 `Logger` 将 `LogRecord` 对象传递给其关联的 `Handler` 之前，它会调用任何已附加 `Filter`\
    \ 上的 `isLoggable()` 方法，并且仅当 `Filter` 批准时，才将 `LogRecord` 传递给 `Handler`。类似地，`Handler`\
    \ 对象在将日志发送到最终目的地之前，也会调用其关联 `Filter` 上的 `isLoggable()` 方法。清单 2-11 `Person.java`\
    \ 定义了一个 `Person` 对象，而清单 2-12 `AgeFilter.java` 创建了一个能够根据人的年龄做出一些日志记录决策的 `Filter`。\n\
    \n清单 2-11: Person.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage sam.logging;\n\
    \npublic class Person\n{\n  private String name = null;\n  private int age;\n\n\
    public Person(String name, int age)\n  {\n   this.name = name;\n   this.age =\
    \ age;\n  }\n\npublic void setName(String name)\n  {\n   this.name = name;\n \
    \ }\n\npublic String getName()\n  {\n   return name;\n  }\n\npublic void setAge(int\
    \ age)\n  {\n   this.age = age;\n  }\n\npublic int getAge()\n  {\n   return age;\n\
    \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 2-12 `AgeFilter.java`\
    \ 实现了 `java.util.logging.Filter` 接口，并为 `public boolean isLoggable(LogRecord record)`\
    \ 方法提供了实现。为简单起见，我们假设传递给它的 `LogRecord` 对象只关联了一个 `Person` 对象。然后我们从 `Person` 对象中获取并检查年龄，如果年龄大于\
    \ 30 则返回 `true`；否则返回 `false`。如果返回值为 `true`，则 `LogRecord` 对象被传递给链中的下一个处理器，否则 `LogRecord`\
    \ 对象被丢弃。\n\n清单 2-12: AgeFilter.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage\
    \ sam.logging;\n\nimport java.util.logging.*;\n\npublic class AgeFilter implements\
    \ Filter {\n    public AgeFilter() {\n    }\n    /**\n     * 这是从 Filter 接口重写的方法。\n\
    \     * 它检查与 LogRecord 关联的 Person 对象，\n     * 检查年龄是否 > 30，并返回 true。\n     * @param\
    \ record LogRecord 对象\n     * @return boolean true/false\n     */\n    public\
    \ boolean isLoggable(LogRecord record) {\n        boolean result = false;\n  \
    \      // 从记录中获取 Person 对象\n        Object[] objs = record.getParameters();\n\
    \        Person person = (Person)objs[0];\n\n// 检查 person 是否不为 null\n        if(person\
    \ !=null) {\n            // 获取年龄\n            int age = person.getAge();\n   \
    \         if(age>30)\n                result = true;\n            else\n     \
    \           result = false;\n        }\n        return result;\n    }\n}\n```\n\
    \n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n一旦基础设施准备就绪，我们接下来在清单 2-13 `FilterDemo.java`\
    \ 中创建程序，该程序将使用 `AgeFilter`。在构造函数中，我们获取一个具有 `sam.logging` 包结构的 `Logger` 对象。然后实例化一个\
    \ `AgeFilter` 对象，并将该 `Filter` 分配给 `Logger`。现在我们将创建两个年龄分别为 32 和 29 的 `Person` 对象，并尝试通过传递各自创建的\
    \ `Person` 对象的引用来使用 `logger.log()` 方法记录一些消息。\n\n清单 2-13: FilterDemo.java\n\n|\
    \ **![开始示例](img/_1.gif)** |\n\n```\npackage sam.logging;\n\nimport java.util.logging.*;\n\
    \npublic class FilterDemo\n{\n  private Logger logger = null;\n  private AgeFilter\
    \ filter = null;\n\npublic FilterDemo()\n  {\n    // 获取一个 logger 对象\n    logger\
    \ = Logger.getLogger(\"sam.logging\");\n    // 创建一个 AgeFilter 对象\n    filter =\
    \ new AgeFilter();\n    // 将过滤器附加到 logger\n    logger.setFilter(filter);\n  }\n\
    \n/**\n   * 此方法记录消息\n   */\n  public void logMessage(Person person)\n  {\n   \
    \ // 使用 Person 对象作为参数记录消息\n    logger.log(Level.INFO, \"Person has age \"+person.getAge(),\
    \ person);\n  }\n\npublic static void main(String args[])\n  {\n    FilterDemo\
    \ demo = new FilterDemo();\n    // 创建 Person 对象\n    Person person1 = new Person(\"\
    Paul\", 32);\n    Person person2 = new Person(\"sam\", 29);\n    // 使用每个 Person\
    \ 对象进行日志记录\n    demo.logMessage(person1);\n    demo.logMessage(person2);\n  }\n\
    }\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 2-13 中的 `Logger` 对象附加了 `AgeFilter`，该过滤器只允许记录年龄大于\
    \ 30 的 `Person` 对象。因此，执行此程序将在控制台打印以下日志信息：\n\n```\n01-Sep-2002 13:01:06 sam.logging.FilterDemo\
    \ logMessage\nINFO: Person has age 32\n```\n\n上面的清单是一个非常简单的示例，说明了在日志记录框架中使用 `Filter`\
    \ 对象。您可以很容易地看出 `Filter` 对象在极大地减少发布的日志消息数量方面有多么有用，以及它们如何帮助仅记录所需的信息。当您需要在调试时只打印选定的日志信息时，`Filter`\
    \ 对象会变得非常有益。\n"
- fmt: "# File-Based Configuration\n\nIn the examples provided in previous sections,\
    \ we have seen how to configure the JDK 1.4 logging API programmatically by using\
    \ the methods available in different objects. However, programmatic configuration\
    \ is not flexible. Anytime you decide to change the configuration such as the\
    \ level for a particular logger, you will need to go back to the source code and\
    \ make necessary changes.\n\nThe JDK 1.4 logging API supports configuration via\
    \ a configuration file. The configuration file supports the configuration parameters\
    \ to be defined in a key-value format. For example, recall the example in [Listing\
    \ 2-9](#LiB0017.html#115), `SocketHandlerDemo.java`. We can rewrite the program\
    \ without providing any configuration for the `Logger` within the program by defining\
    \ the required configuration in a configuration file.\n\n[Listing 2-14](#LiB0019.html#ch02ls14),\
    \ `ConfigDemo.java`, rewrites `SocketHandlerDemo` without the code for the configuration.\n\
    \n**Listing 2-14: ConfigDemo.java**\n\n```\npackage sam.logging;\n\nimport java.util.logging.Logger;\n\
    import java.util.logging.SocketHandler;\n\npublic class ConfigDemo\n{\n    private\
    \ static Logger logger = Logger.getLogger(\"sam.logging\");\n    public ConfigDemo()\n\
    \    {\n        try\n        {\n            logger.addHandler(new SocketHandler());\n\
    \        }catch(Exception e)\n        {\n            e.printStackTrace();\n  \
    \      }\n    }\n    /**\n     * This method logs the logging information\n  \
    \   */\n    public void logMessage()\n    {\n        logger.warning(\"SocketHandler\
    \ is working...\");\n    }\n\n    public static void main(String args[]) {\n \
    \       //creating a SocketHandlerDemo with localhost and 2020 port\n        ConfigDemo\
    \ demo = new ConfigDemo();\n        demo.logMessage();\n    }\n}\n```\n\nWe can\
    \ now create a configuration file to use with `ConfigDemo`. [Listing 2-15](#LiB0019.html#ch02ls15),\
    \ \"config.properties\", is the sample configuration file.\n\n**Listing 2-15:\
    \ config.properties**\n\n```\n#define the logger level\nsam.logging.level=INFO\n\
    \n#define the properties for the SocketHandler\njava.util.logging.SocketHandler.level=INFO\n\
    java.util.logging.SocketHandler.host=localhost\njava.util.logging.SocketHandler.port=2020\n\
    ```\n\nNotice that we have defined the host, port, and level configurations for\
    \ the `SocketHandler` in the configuration file rather than the application. This\
    \ gives us the power to change any configuration without changing the source code.\n\
    \nExecute the program in [Listing 2-14](#LiB0019.html#ch02ls14) with the following\
    \ command:\n\n```\njava -Djava.util.logging.config.file=config.properties sam.logging.ConfigDemo\n\
    ```\n\nWith the server program running as explained in the example in [Listing\
    \ 2-10](#LiB0017.html#117), we will see the following output printed to the console\
    \ of the server in XML format:\n\n```\n<?xml version=\"1.0\" encoding=\"windows-1252\"\
    \ standalone=\"no\"?>\n<!DOCTYPE log SYSTEM \"logger.dtd\">\n<log>\n<record>\n\
    \  <date>2002-12-22T15:47:22</date>\n  <millis>1040572042929</millis>\n  <sequence>0</sequence>\n\
    \  <logger>sam.logging</logger>\n  <level>WARNING</level>\n  <class>sam.logging.ConfigDemo</class>\n\
    \  <method>logMessage</method>\n  <thread>10</thread>\n  <message>SocketHandler\
    \ is working...</message>\n</record>\n</log>\n```\n\nFor a giggle, let's change\
    \ the configuration file to use `SimpleFormatter` with `SocketHandler` by adding\
    \ the following line:\n\n```\njava.util.logging.SocketHandler.formatter=java.util.logging.SimpleFormatter\n\
    ```\n\nWe will see the following output:\n\n```\n22-Dec-2002 15:59:49 sam.logging.ConfigDemo\
    \ logMessage\nWARNING: SocketHandler is working...\n```\n\nThis is the advantage\
    \ of specifying the configuration via a configuration file. We will discuss configuration\
    \ in more detail in [Chapter 4](#LiB0026_split_000.html#166).\n\n# Formatter Object\n\
    \n`Handler` objects are capable of filtering logging requests and printing them\
    \ to different destinations. Before finally printing logging information, `Handler`\
    \ objects use `Formatter` objects to convert logging information to different\
    \ human-readable representations. `Formatter` objects help structure data in any\
    \ formatting style that is useful for the application. It is also vitally important\
    \ to render logging information in a well-structured and meaningful manner so\
    \ that it can be used for future analysis. We will discuss `Formatter` objects\
    \ in detail in [Chapter 3](#LiB0022_split_000.html#136).\n\n# Conclusion\n\nIn\
    \ this chapter, we have examined various objects in the JDK 1.4 logging API. We\
    \ have discussed how the different objects in the framework interact with each\
    \ other. We have also seen sample usage of each object. By now, you should have\
    \ a proper understanding of the working of the logging API. In the [next chapter](#LiB0022_split_000.html#136),\
    \ we will explore the different formatting styles used by the `Formatter` objects\
    \ available within the API and develop our own custom `Formatter` object.\n\n\
    # Chapter 3: Formatting JDK 1.4 Logging Information\n\nThe goal of the JDK 1.4\
    \ logging API is to provide a way to encapsulate logging information at the appropriate\
    \ level of detail. In the [previous chapter](#LiB0012_split_000.html#44), we explored\
    \ various objects that are utilized to capture logging information, how to tell\
    \ the logging API the detail level of the logging activity that should be performed,\
    \ and also how to change and pass different configuration parameters to the API\
    \ at runtime to control logging information. However, another important aspect\
    \ of any logging mechanism is the way the logs are produced and maintained. It\
    \ is vitally important for an application to structure and produce logging information\
    \ that can be analyzed and processed later. In order to achieve this aspect of\
    \ logging, it is essential that logging information can be produced in different\
    \ formats. The JDK 1.4 logging API provides two basic mechanisms for producing\
    \ logging information that is human readable and appropriate for any future processing.\
    \ The objects that accomplish the task of producing log information in different\
    \ formats are called `Formatter` objects. In this chapter, we will examine the\
    \ default `Formatter` objects provided within the API and explore how to write\
    \ new `Formatter` objects."
