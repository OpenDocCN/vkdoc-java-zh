    write the logging information to two separate destinations, such as a console
    and a file.


    |  | Note  | The defined global `Handler` object class needs to be in the system
    classpath. At JVM startup, the class file is located in the classpath and loaded
    into the VM, and a new instance of the class is created with any configuration
    parameter defined specific to the global `Handler` object. |


    The `level` property defines the global level of logging to be used. This level
    acts as a threshold level to the global `Handler` objects defined and blocks any
    message with a lower level.


    The global configuration of `level` is inherited by all the `Logger` objects within
    the same instance of the application. However, it is possible to configure each
    individual `Logger` object used within an application. For example, the following
    line defines the level for a `Logger` named `com.abc.myapp`:


    ```

    com.abc.myapp.level=INFO

    ```


    It is important to note that any subpackage of `com.abc.myapp` will inherit this
    level if not configured individually.


    #### Configuration Order


    The configuration order of different `Logger` objects within the same configuration
    file must be sequential. In other words, the parent logger must be configured
    before the child logger. In the JDK 1.4 logging API, the parent configuration
    always overrides the child configuration. This becomes crucial for the `Logger`
    objects having a parent-child relationship.


    For example, the following configuration does NOT configure the `Logger` objects
    as we expect:


    ```

    com.abc.myapp.net.level=INFO

    com.abc.myapp.level=SEVERE

    ```


    This configuration order does not set the level for the logger `com.abc.myapp.net`
    to INFO. This is because the parent logger `com.abc.myapp` is later assigned a
    level SEVERE. The logger `com.abc.myapp.net` will also have a level SEVERE.


    #### Handler-Specific Configuration


    The different `Handler` objects provided within the JDK 1.4 logging API have the
    following common properties present in all of them:


    *   `level`


    *   `filter`


    Apart from the preceding properties, which are common to all the `Handler`s, specific
    `Handler`s such as `java.util.logging.FileHandler` can use some other properties
    such as `pattern`, `limit`, etc., to publish logging information.


    Here is a sample configuration file for the logger `com.abc.io`. Assume that the
    logger uses a `SocketHandler`. The configuration file first defines the level
    for the logger. Next, the configuration parameters for the `SocketHandler` are
    defined:


    ```

    #setting the level of the logger

    com.abc.io.level=INFO


    #setting the handler properties

    java.util.logging.SocketHandler.level=INFO

    java.util.logging.SocketHandler.formatter=java.util.logging.SimpleFormatter

    java.util.logging.SocketHandler.filter=com.apress.logging.AgeCheckFilter

    java.util.logging.SocketHandler.host=localhost

    java.util.logging.SocketHandler.port=2020

    ```


    The preceding configuration for the `SocketHandler` defines the basic properties
    such as `level`, `formatter`, and `filter`. In addition, it defines its own parameters
    for connection information such as `host` and `port`.


    Once the parameters are defined for a `Handler`, the `LogManager` class stores
    the configuration key and configuration value in a `java.util.Properties` object.
    When each `Handler` is initialized by an application, the appropriate configuration
    information is extracted from the `LogManager` class and used within the specific
    `Handler` class. If any of the configuration parameters are missing, then properties
    of the parent handler are used.


    |  | Note  | We need to make sure that all the values specified are valid, or
    else they will be ignored and parent properties will be used. |


    We will now explore the configuration options available for each of the `Handler`
    objects in the next few sections.


    ##### ConsoleHandler Parameters


    `java.util.logging.ConsoleHandler` has the configurable properties defined in
    [Table 4-1](#LiB0027.html#ch04table01).


    Table 4-1: ConsoleHandler Configuration Parameters


    | Property | Meaning | Default |

    | --- | --- | --- |

    | `encoding` | Character encoding to use | Default platform-specific encoding
    |

    | `filter` | Filter to attach | No filter |

    | `formatter` | Formatting for the logging information | `java.util.logging.SimpleFormatter`
    |

    | `level` | The level of logging | Level.INFO |


    A sample configuration for `ConsoleHandler` might look like the following:


    ```

    #configuration for the ConsoleHandler

    java.util.logging.ConsoleHandler.level = INFO

    java.util.logging.ConsoleHandler.formatter =java.util.logging.SimpleFormatter

    ```


    This configuration sets the threshold level of the `ConsoleHandler` to Level.INFO
    and the formatter associated with the `ConsoleHandler` is a `SimpleFormatter`
    object. Any message with a level equal to or above Level.INFO will be published
    to `System.err` (the default destination for the `ConsoleHandler`) in a `SimpleFormatter`
    formatting style.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    ### 基于文件的配置


    日志框架中的 `java.util.logging.LogManager` 类是核心类，负责读取配置文件并使用定义的配置参数初始化不同的对象。日志 API
    依赖于从标准配置文件传递给它的配置信息。`LogManager` 类使用 `java.util.logging.config.file` 系统属性从配置文件中读取初始配置信息。


    如果在启动时未将此属性传递给日志框架，默认情况下，`LogManager` 会读取位于 `JAVA_HOME/jre/lib/logging.properties`
    文件中的配置文件。此配置文件定义了日志框架运行所需的默认配置参数。我们可以通过向 Java 运行时传递命令行选项来覆盖默认位置并指定我们自己的配置文件，如下所示：


    ```

    java -Djava.util.logging.config.file=configuration file name

    ```


    配置文件中的日志配置分为两部分。一部分保存全局配置信息，另一部分包含特定于 `Handler` 对象的配置信息。全局配置属性在 Java VM 启动时加载，而特定于
    `Handler` 的配置属性在相应的 `Handler` 对象初始化时加载。定义的每个属性前面都带有 `Handler` 类的完全限定名称（例如，`java.util.logging.FileHandler.formatter`）。我们将在接下来的章节中详细探讨日志配置的这两个部分。


    #### 全局配置


    全局配置只需定义两个参数：要加载的全局 `Handler` 对象和日志记录的全局级别。这些参数定义如下：


    ```

    handlers= java.util.logging.ConsoleHandler

    .level= INFO

    ```


    `handlers` 属性定义了要加载的全局 `Handler` 对象。虽然默认配置将 `java.util.logging.ConsoleHandler`
    对象定义为唯一要初始化的 `Handler`，但我们可以定义多个 `Handler` 对象进行初始化，以逗号分隔的列表形式提供。例如，以下行可以加载 `java.util.logging.ConsoleHandler`
    和 `java.util.logging.FileHandler` 对象作为默认的全局 `Handler`：


    ```

    handlers= java.util.logging.FileHandler, java.util.logging.ConsoleHandler

    ```


    这意味着根记录器现在将使用两个独立的 `Handler` 对象将日志信息写入两个独立的目标，例如控制台和文件。


    |  | 注意 | 定义的全局 `Handler` 对象类需要位于系统类路径中。在 JVM 启动时，类文件会在类路径中被定位并加载到 VM 中，并且会使用为全局
    `Handler` 对象定义的任何配置参数创建该类的一个新实例。 |


    `level` 属性定义了要使用的全局日志记录级别。此级别作为已定义的全局 `Handler` 对象的阈值级别，并会阻止任何级别较低的消息。


    全局的 `level` 配置会被同一应用程序实例中的所有 `Logger` 对象继承。但是，可以为应用程序中使用的每个单独的 `Logger` 对象进行配置。例如，以下行为名为
    `com.abc.myapp` 的 `Logger` 定义了级别：


    ```

    com.abc.myapp.level=INFO

    ```


    需要注意的是，`com.abc.myapp` 的任何子包，如果未单独配置，都将继承此级别。


    #### 配置顺序


    同一配置文件中不同 `Logger` 对象的配置顺序必须是顺序的。换句话说，父记录器必须在子记录器之前配置。在 JDK 1.4 日志 API 中，父配置始终会覆盖子配置。这对于具有父子关系的
    `Logger` 对象至关重要。


    例如，以下配置**不会**按我们期望的方式配置 `Logger` 对象：


    ```

    com.abc.myapp.net.level=INFO

    com.abc.myapp.level=SEVERE

    ```


    此配置顺序不会将记录器 `com.abc.myapp.net` 的级别设置为 INFO。这是因为父记录器 `com.abc.myapp` 稍后被分配了级别
    SEVERE。记录器 `com.abc.myapp.net` 也将具有级别 SEVERE。


    #### 特定于处理器的配置


    JDK 1.4 日志 API 中提供的不同 `Handler` 对象都具有以下通用属性：


    *   `level`

    *   `filter`


    除了上述所有 `Handler` 共有的属性外，特定的 `Handler`（例如 `java.util.logging.FileHandler`）可以使用其他一些属性（例如
    `pattern`、`limit` 等）来发布日志信息。


    以下是记录器 `com.abc.io` 的示例配置文件。假设该记录器使用 `SocketHandler`。配置文件首先定义了记录器的级别。接下来，定义了 `SocketHandler`
    的配置参数：


    ```

    #设置记录器的级别

    com.abc.io.level=INFO


    #设置处理器属性

    java.util.logging.SocketHandler.level=INFO

    java.util.logging.SocketHandler.formatter=java.util.logging.SimpleFormatter

    java.util.logging.SocketHandler.filter=com.apress.logging.AgeCheckFilter

    java.util.logging.SocketHandler.host=localhost

    java.util.logging.SocketHandler.port=2020

    ```


    上述针对 `SocketHandler` 的配置定义了基本属性，例如 `level`、`formatter` 和 `filter`。此外，它还定义了用于连接信息的自身参数，例如
    `host` 和 `port`。


    一旦为 `Handler` 定义了参数，`LogManager` 类就会将配置键和配置值存储在 `java.util.Properties` 对象中。当应用程序初始化每个
    `Handler` 时，会从 `LogManager` 类中提取相应的配置信息，并在特定的 `Handler` 类中使用。如果缺少任何配置参数，则将使用父处理器的属性。


    |  | 注意 | 我们需要确保指定的所有值都有效，否则它们将被忽略，并使用父属性。 |


    接下来，我们将在接下来的几个小节中探讨每个 `Handler` 对象可用的配置选项。


    ##### ConsoleHandler 参数


    `java.util.logging.ConsoleHandler` 具有在 表 4-1 中定义的可配置属性。


    表 4-1：ConsoleHandler 配置参数


    | 属性 | 含义 | 默认值 |

    | --- | --- | --- |

    | `encoding` | 要使用的字符编码 | 默认的平台特定编码 |

    | `filter` | 要附加的过滤器 | 无过滤器 |

    | `formatter` | 日志信息的格式化 | `java.util.logging.SimpleFormatter` |

    | `level` | 日志记录级别 | Level.INFO |


    `ConsoleHandler` 的示例配置可能如下所示：


    ```

    #ConsoleHandler 的配置

    java.util.logging.ConsoleHandler.level = INFO

    java.util.logging.ConsoleHandler.formatter =java.util.logging.SimpleFormatter

    ```


    此配置将 `ConsoleHandler` 的阈值级别设置为 Level.INFO，并且与 `ConsoleHandler` 关联的格式化程序是一个 `SimpleFormatter`
    对象。任何级别等于或高于 Level.INFO 的消息都将以 `SimpleFormatter` 格式发布到 `System.err`（`ConsoleHandler`
    的默认目标）。

