    \ log4j 框架提供一个自定义的 `LoggerFactory` 类。毫无疑问，对于像向现有 `Logger` 类添加一个新方法这样简单的事情，这一切看起来都有些复杂。\n\
    \n一种更简单的方法是围绕现有的 `Logger` 类编写一个包装类。包装类可以提供计划用于新日志记录功能的所需日志记录方法。例如，清单 8-15 `LoggerWrapper.java`\
