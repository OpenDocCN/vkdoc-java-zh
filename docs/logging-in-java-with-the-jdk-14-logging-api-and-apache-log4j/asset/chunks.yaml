  trans: "\npublic class DBConfigurator implements Configurator\n{\n    private String\
    \ dbURL = null;\n    private String dbUser = null;\n    private String dbPwd =\
    \ null;\n    private String dbDriver = null;\n    private DBConfigLoader configLoader\
    \ = null;\n    private Properties log4jProps = null;\n\npublic DBConfigurator()\n\
    \    {\n        configLoader = new DBConfigLoader();\n    }\n\npublic void doConfigure(URL\
    \ url, LoggerRepository repos)\n    {\n        Properties props = new Properties();\n\
    \        try\n        {\n        //从配置文件中收集数据库访问信息\n        props.load(url.openStream());\n\
    \        dbURL = (String)props.get(\"DB_URL\");\n        dbUser = (String)props.get(\"\
    DB_USER\");\n        dbPwd = (String)props.get(\"DB_PWD\");\n        dbDriver\
    \ = (String)props.get(\"DB_DRIVER\");\n        //配置配置加载器\n        configLoader.setDbDriver(dbDriver);\n\
    \        configLoader.setDbUrl(dbURL);\n        configLoader.setDbUser(dbUser);\n\
    \        configLoader.setDbPwd(dbPwd);\n\n//获取 log4j 属性\n        log4jProps =\
    \ configLoader.getConfigData();\n        //使用 PropertyConfigurator 进行配置\n    \
    \    PropertyConfigurator.configure(log4jProps);\n        }catch(Exception e)\n\
    \        {\n            LogLog.error(\"无法加载配置 \", e);\n        }\n    }\n}\n\n\
    | **![结束示例](img/_1.gif)** |\n\n|  |\n\n`DBConfigurator` 实现了 `Configurator` 接口。一旦配置类被指定为\
    \ `DBConfigurator`，`LogManager` 类就会将配置类的名称传递给 `OptionConverter`。然后 `OptionConverter`\
    \ 会创建一个 `DBConfigurator` 的新实例，并调用其中的 `doConfigure()` 方法。当控制权进入 `DBConfigurator`\
    \ 类后，`DBConfigurator` 使用 `DBConfigLoader` 获取配置数据，然后使用 `PropertyConfigurator` 执行实际的\
    \ log4j 配置。\n\n理论上，我们可以通过在 `DBConfigLoader` 类内部直接调用 `PropertyConfigurator` 来配置\
    \ log4j。但这意味着在应用程序中，我们必须显式地实例化并调用 `DBConfigLoader` 的配置方法来进行配置，这并非理想情况。如果将来需要使用不同的配置类，你将不得不修改应用程序的源代码。实现\
    \ `DBConfigurator` 类解决了这个问题，并将 `DBConfigLoader` 的使用集成到了 log4j 框架中。反过来，你可能会认为 `DBConfigLoader`\
    \ 在 `DBConfigurator` 类中被硬编码了。确实如此，但我们可以轻松地扩展 `DBConfigurator`，使其读取一个系统参数来指示它应该使用的数据库访问类，或者我们也可以在配置文件中指定该参数。\n\
    \n### 使用基于数据库的配置的示例\n\n现在我们已经准备好了从数据库配置 log4j 的基础设施。让我们来看一个小型演示程序 `LoggingDemo.java`，如清单\
    \ 8-7 所述。该类仅包含一个方法，用于写入两条不同级别的日志消息，级别分别为 ERROR 和 INFO。\n\n清单 8-7: LoggingDemo.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\n package com.apress.logging.log4j;\nimport\
    \ org.apache.log4j.Logger;\n\npublic class LoggingDemo\n{\n    private static\
    \ Logger logger = Logger.getLogger(\"APPLICATION1\");\n    public LoggingDemo()\n\
    \    {\n    }\n\n    public void doLogging()\n    {\n        logger.info(\"信息消息...\"\
    );\n        logger.error(\"错误消息...\");\n    }\n\n    public static void main(String\
    \ args[])\n    {\n        LoggingDemo demo = new LoggingDemo();\n        demo.doLogging();\n\
    \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n#### 在数据库中创建配置数据\n\n\
    在这个示例程序中，我们尝试使用一个名为 `APPLICATION1` 的 `Logger` 对象。我们需要在数据库中为这个命名记录器创建一个样式。以下 SQL\
    \ 脚本将为名为 `APPLICATION1` 的记录器插入一条记录，并插入相应的附加器记录：\n\n```\nINSERT INTO LOGGER_REPOSITORY\
    \ VALUES ('APPLICATION1,'1,'ERROR');\n```\n\n现在，我们将在 APPENDER_DEF 表中创建一些附加器配置数据。以下脚本将为\
    \ ID 为 1 的 `Appender` 对象插入数据。\n\n```\nINSERT INTO APPENDER_DEF VALUES\n(1,'org.apache.log4j.ConsoleAppender',\
    \ 'org.apache.log4j. SimpleLayout',\n'CONSOLE', 'DEBUG');\n```\n\n名为 `APPLICATION1`\
    \ 的记录器现在将具有 ERROR 级别，并将使用 APPENDER_DEF 表中 APPENDER_ID 为 1 所定义的 `Appender`。参照我们放入\
    \ APPENDER_DEF 表的数据，ID 值为 1 的 `Appender` 是一个 `ConsoleAppender`。因此，来自此应用程序的任何日志都将打印到控制台。我们可以随时切换\
    \ LOGGER_REPOSITORY 表中的条目，将 `Appender` 指向 ID 2，这将使用 `JDBCAppender` 对象将日志数据写入数据库。\n\
    \n#### 配置文件\n\n我们还需要一个定义数据库访问参数的配置文件。清单 8-8 \"dbConfig.properties\" 是本示例的配置文件。\n\
    \n清单 8-8: dbConfig.properties\n\n| **![开始示例](img/_1.gif)** |\n\n```\nDB_DRIVER=sun.jdbc.odbc.JdbcOdbcDriver\n\
    DB_URL=jdbc:odbc:dbdef\nDB_USER=system\nDB_PWD=manager\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n#### 执行基于数据库的配置程序\n\n现在，我们需要以如下方式执行程序 `LoggingDemo`，并将所有必需的系统参数传递给它：\n\
    \n```\njava -Dlog4j.configuration=dbConfig.properties -\nDlog4j.configuratorClass=com.apress.logging.log4j.DBConfigurator\n\
    com.apress.logging.log4j.LoggingDemo\n```\n\n请注意，只有级别为 ERROR 的消息被打印到控制台。将表中的记录器级别更改为\
    \ INFO，则两条消息都会被打印。\n\n## 自定义日志框架\n\n假设在一个应用程序中，我们希望在代码优化阶段跟踪每个方法的进入和退出。此外，我们希望这类消息的级别低于\
    \ log4j 的 DEBUG 级别，因为我们不希望这些消息在代码优化阶段结束后被发布。使用 DEBUG 级别来处理这类消息有些不合适，因为将来可能需要开启\
    \ DEBUG 级别的消息来调试应用程序。在这种情况下，与方法进入和退出相关的消息更有可能使日志跟踪变得混乱。考虑到所有这些因素，我们决定在应用程序中引入一个新的级别：TRACE。"
- fmt: "### Creating a Custom Level Class\n\nWe will now examine how to write a custom\
    \ level class. As mentioned in [Chapter 5](#LiB0032_split_000.html#266), each\
    \ level basically corresponds to a `static final` unique integer value. We need\
    \ to assign a unique integer value to the custom `TRACE` level we want to create.\
    \ Also, log4j is capable of delegating logging messages to the UNIX Syslog via\
    \ `SysLogAppender`. In this context, each logging level defined also needs to\
    \ define a Syslog equivalent. The constant integer values used for Syslog are\
    \ defined in the Syslog specification. For example, one sample `syslog.h` file\
    \ from the UNIX implementation contains the following Syslog constants defined\
    \ for different levels of logging:\n\n```\n#define LOG_EMERG 0 /* system is unusable\
    \ */\n#define LOG_ALERT 1 /* action must be taken immediately */\n#define LOG_CRIT\
    \ 2 /* critical conditions */\n#define LOG_ERR 3 /* error conditions */\n#define\
    \ LOG_WARNING 4 /* warning conditions */\n#define LOG_NOTICE 5 /* normal but signification\
    \ conditions */\n#define LOG_INFO 6 /* informational */\n#define LOG_DEBUG 7 /*\
    \ debug level messages */\n```\n\nThe `TRACE` level should correspond to the `LOG_DEBUG`\
    \ level of the Syslog implementation, and the `sysLogEquivalent` for this level\
    \ should be 7. Finally, the `CustomLevel` class needs to provide methods to return\
    \ the appropriate `Level` object and to create a `TRACE` level from a given `int`\
    \ or `String` value.\n\n[Listing 8-9](#LiB0063.html#ch08ls09), `CustomLevel.java`,\
    \ demonstrates how to implement a custom `Level` class.\n\n**Listing 8-9: CustomLevel.java**\n\
    \n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.Level;\n\n\
    public class CustomLevel extends Level {\n\n  static public final int TRACE_INT\
    \ = Level.DEBUG_INT - 1;\n  private static String TRACE_STR = \"TRACE\";\n  public\
    \ static final CustomLevel TRACE = new CustomLevel(TRACE_INT,\nTRACE_STR, 7);\n\
    \n  protected CustomLevel(int level, String strLevel, int syslogEquiv) {\n   \
    \ super(level, strLevel, syslogEquiv);\n  }\n\n  public static Level toLevel(String\
    \ sArg) {\n    return (Level) toLevel(sArg, CustomLevel.TRACE);\n  }\n\n  public\
    \ static Level toLevel(String sArg, Level defaultValue) {\n\n    if(sArg == null)\
    \ {\n      return defaultValue;\n    }\n    String stringVal = sArg.toUpperCase();\n\
    \n    if(stringVal.equals(TRACE_STR)) {\n      return CustomLevel.TRACE;\n   \
    \ }\n    return Level.toLevel(sArg, (Level) defaultValue);\n  }\n\n  public static\
    \ Level toLevel(int i) {\n    switch(i) {\n    case TRACE_INT: return CustomLevel.TRACE;\n\
    \    }\n    return Level.toLevel(i);\n  }\n}\n```\n\nIn this `CustomLevel` object,\
    \ we define a new level, `TRACE`, with a unique integer value that is one less\
    \ than the unique integer value associated with the `DEBUG` level to keep the\
    \ priority of this level below `DEBUG`. This indicates that the `TRACE` level\
    \ should be used in places where the priority is lowest. In the Syslog context,\
    \ we assign it the Syslog equivalent 7 to correspond to `LOG_DEBUG` in the Syslog\
    \ implementation.\n\n### Creating a Custom Logger\n\nOnce we have defined the\
    \ `CustomLevel` object representing the level `TRACE`, we need a custom `Logger`\
    \ object to use this level. `Logger` objects in essence have two responsibilities:\
    \ They produce logging messages by delegating the logging request to different\
    \ `Appender` objects with appropriate levels, and they return the instance of\
    \ a named `Logger` object to the caller application. In the examples provided\
    \ throughout the discussion of log4j, we have used the package name to name loggers.\
    \ In reality, the name of a logger can be anything to identify the logger producing\
    \ logging traces in a predefined destination.\n\nIn sophisticated application\
    \ scenarios, we might decide to create several custom `Logger` classes. Depending\
    \ on the name of the logger specified, we will return the appropriate `Logger`\
    \ object to the caller application. We might in addition think about using a Factory\
    \ object to decide which `Logger` object to return. The deciding criterion again\
    \ may be the name of the logger.\n\n[Listing 8-10](#LiB0063.html#ch08ls10), `CustomLogger.java`,\
    \ represents a custom `Logger` object with a method to produce `TRACE`-level messages.\
    \ It also uses a `CustomLoggerFactory` object to create and return an appropriate\
    \ custom `Logger` object.\n\n**Listing 8-10: CustomLogger.java**\n\n```\npackage\
    \ com.apress.logging.log4j;\n\nimport org.apache.log4j.Logger;\nimport com.apress.logging.log4j.CustomLevel;\n\
    \npublic class CustomLogger extends Logger {\n    private String FQCN = CustomLogger.class.getName()+\"\
    .\";\n    private static CustomLoggerFactory factory = new CustomLoggerFactory();\n\
    \    public CustomLogger(String name) {\n        super(name);\n    }\n\n    public\
    \ void trace(Object message) {\n        //call the super log method with throwable\
    \ instance as null\n        super.log(FQCN, CustomLevel.TRACE, message, null);\n\
    \    }\n    public static Logger getLogger(String name) {\n        return Logger.getLogger(name,\
    \ factory);\n    }\n}\n```\n\nThis example of `CustomLogger` introduces a new\
    \ method to publish `TRACE`-level messages to the destination specified through\
    \ any `Appender` object associated with this `Logger`.\n\n### Generating a Custom\
    \ Logger Factory\n\nContinuing on with our discussion of writing a custom `Logger`\
    \ object, [Listing 8-11](#LiB0063.html#ch08ls11), `CustomLoggerFactory.java`,\
    \ is the code for generating a custom logger Factory object. If you are wondering\
    \ why we need a Factory object, this will be answered towards the end of this\
    \ section. The `CustomLoggerFactory` class implements the interface `LoggerFactory`\
    \ and provides an implementation of the method `makeNewLoggerInstance(String name)`.\
    \ The example implementation shows a skeleton of how the Factory object can be\
    \ used to return different types of logger objects.\n\n**Listing 8-11: CustomLoggerFactory.java**\n\
    \n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.spi.LoggerFactory;\n\
    import org.apache.log4j.Logger;\n\npublic class CustomLoggerFactory implements\
    \ LoggerFactory {\n    public Logger makeNewLoggerInstance(String name) {\n  \
    \      return new CustomLogger(name);\n    }\n}\n```\n\n`CustomLoggerFactory`\
    \ returns a separate `CustomLogger` instance based on the name of the `Logger`\
    \ objects passed to it. This is the simplest possible scenario. The advantage\
    \ of having a Factory object is that we can control how the `Logger` objects are\
    \ made available to the caller application."
  raw: "### Creating a Custom Level Class\n\nWe will now examine how to write a custom\
    \ level class. As mentioned in [Chapter 5](#LiB0032_split_000.html#266), each\
    \ level basically corresponds to a `static final` unique integer value. We need\
    \ to assign a unique integer value to the custom TRACE level we want to create.\
    \ Also, log4j is capable of delegating logging messages to the UNIX Syslog via\
    \ `SysLogAppender`. In this context, each logging level defined also needs to\
    \ define a Syslog equivalent. The constant integer values used for Syslog are\
    \ defined in the Syslog specification. For example, one sample \"syslog.h\" file\
    \ from the UNIX implementation contains the following Syslog constants defined\
    \ for different levels of logging:\n\n```\n#define LOG_EMERG 0 /* system is unusable\
    \ */\n#define LOG_ALERT 1 /* action must be taken immediately */\n#define LOG_CRIT\
    \ 2 /* critical conditions */\n#define LOG_ERR 3 /* error conditions */\n#define\
    \ LOG_WARNING 4 /* warning conditions */\n#define LOG_NOTICE 5 /* normal but signification\
    \ conditions */\n#define LOG_INFO 6 /* informational */\n#define LOG_DEBUG 7 /*\
    \ debug level messages */\n```\n\nThe TRACE level should correspond to the LOG_DEBUG\
    \ level of the Syslog implementation, and the `sysLogEquivalent` for this level\
    \ should be 7. Finally, the `CustomLevel` class needs to provide methods to return\
    \ the appropriate `Level` object and to create a TRACE level from a given `int`\
    \ or `String` value.\n\n[Listing 8-9](#LiB0063.html#ch08ls09), `CustomLevel.java`,\
    \ demonstrates how to implement a custom `Level` class.\n\nListing 8-9: CustomLevel.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.Level;\n\npublic class CustomLevel extends Level {\n\
    \n  static public final int TRACE_INT = Level.DEBUG_INT - 1;\n  private static\
    \ String TRACE_STR = \"TRACE\";\n  public static final CustomLevel TRACE = new\
    \ CustomLevel(TRACE_INT,\nTRACE_STR, 7);\n\n  protected CustomLevel(int level,\
    \ String strLevel, int syslogEquiv) {\n    super(level, strLevel, syslogEquiv);\n\
    \  }\n\n  public static Level toLevel(String sArg) {\n    return (Level) toLevel(sArg,\
    \ CustomLevel.TRACE);\n  }\n\n  public static Level toLevel(String sArg, Level\
    \ defaultValue) {\n\n    if(sArg == null) {\n      return defaultValue;\n    }\n\
    \    String stringVal = sArg.toUpperCase();\n\n    if(stringVal.equals(TRACE_STR))\
    \ {\n      return CustomLevel.TRACE;\n    }\n    return Level.toLevel(sArg, (Level)\
    \ defaultValue);\n  }\n\n  public static Level toLevel(int i) {\n    switch(i)\
    \ {\n    case TRACE_INT: return CustomLevel.TRACE;\n    }\n    return Level.toLevel(i);\n\
    \  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nIn this `CustomLevel`\
    \ object, we define a new level, TRACE, with a unique integer value that is one\
    \ less than the unique integer value associated with the DEBUG level to keep the\
    \ priority of this level below DEBUG. This indicates that the TRACE level should\
    \ be used in places where the priority is lowest. In the Syslog context, we assign\
    \ it the Syslog equivalent 7 to correspond to LOG_DEBUG in the Syslog implementation.\n\
    \n### Creating a Custom Logger\n\nOnce we have defined the `CustomLevel` object\
    \ representing the level TRACE, we need a custom `Logger` object to use this level.\
    \ `Logger` objects in essence have two responsibilities: They produce logging\
    \ messages by delegating the logging request to different `Appender` objects with\
    \ appropriate levels, and they return the instance of a named `Logger` object\
    \ to the caller application. In the examples provided throughout the discussion\
    \ of log4j, we have used the package name to name loggers. In reality, the name\
    \ of a logger can be anything to identify the logger producing logging traces\
    \ in a predefined destination.\n\nIn sophisticated application scenarios, we might\
    \ decide to create several custom `Logger` classes. Depending on the name of the\
    \ logger specified, we will return the appropriate `Logger` object to the caller\
    \ application. We might in addition think about using a Factory object to decide\
    \ which `Logger` object to return. The deciding criterion again may be the name\
    \ of the logger.\n\n[Listing 8-10](#LiB0063.html#ch08ls10), `CustomLogger.java`,\
    \ represents a custom `Logger` object with a method to produce TRACE-level messages.\
    \ It also uses a `CustomLoggerFactory` object to create and return an appropriate\
    \ custom `Logger` object.\n\nListing 8-10: CustomLogger.java\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.Logger;\n\
    import com.apress.logging.log4j.CustomLevel;\n\npublic class CustomLogger extends\
    \ Logger {\n    private String FQCN = CustomLogger.class.getName()+\".\";\n  \
    \  private static CustomLoggerFactory factory = new CustomLoggerFactory();\n \
    \   public CustomLogger(String name) {\n        super(name);\n    }\n\n    public\
    \ void trace(Object message) {\n        //call the super log method with throwable\
    \ instance as null\n        super.log(FQCN, CustomLevel.TRACE, message, null);\n\
    \    }\n    public static Logger getLogger(String name) {\n        return Logger.getLogger(name,\
    \ factory);\n    }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nThis example\
    \ of `CustomLogger` introduces a new method to publish TRACE-level messages to\
    \ the destination specified through any `Appender` object associated with this\
    \ `Logger`.\n\n### Generating a Custom Logger Factory\n\nContinuing on with our\
    \ discussion of writing a custom `Logger` object, [Listing 8-11](#LiB0063.html#ch08ls11),\
    \ `CustomLoggerFactory.java`, is the code for generating a custom logger Factory\
    \ object. If you are wondering why we need a Factory object, this will be answered\
    \ towards the end of this section. The `CustomLoggerFactory` class implements\
    \ the interface `LoggerFactory` and provides an implementation of the method `makeNewLoggerInstance(String\
    \ name)`. The example implementation shows a skeleton of how the Factory object\
    \ can be used to return different types of logger objects.\n\nListing 8-11: CustomLoggerFactory.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.spi.LoggerFactory;\nimport org.apache.log4j.Logger;\n\
    \npublic class CustomLoggerFactory implements LoggerFactory {\n    public Logger\
    \ makeNewLoggerInstance(String name) {\n        return new CustomLogger(name);\n\
    \    }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n`CustomLoggerFactory`\
    \ returns a separate `CustomLogger` instance based on the name of the `Logger`\
    \ objects passed to it. This is the simplest possible scenario. The advantage\
    \ of having a Factory object is that we can control how the `Logger` objects are\
    \ made available to the caller application."
  trans: "\n### 创建自定义级别类\n\n接下来我们将探讨如何编写自定义级别类。如第 5 章所述，每个级别基本上对应一个`static final`的唯一整数值。我们需要为要创建的自定义\
    \ TRACE 级别分配一个唯一的整数值。此外，log4j 能够通过`SysLogAppender`将日志消息委托给 UNIX Syslog。在此背景下，每个定义的日志级别还需要定义对应的\
    \ Syslog 级别。Syslog 规范中定义了用于 Syslog 的常量整数值。例如，来自 UNIX 实现的一个示例\"syslog.h\"文件包含以下为不同日志级别定义的\
    \ Syslog 常量：\n\n```\n#define LOG_EMERG 0 /* 系统不可用 */\n#define LOG_ALERT 1 /* 必须立即采取行动\
    \ */\n#define LOG_CRIT 2 /* 严重状况 */\n#define LOG_ERR 3 /* 错误状况 */\n#define LOG_WARNING\
    \ 4 /* 警告状况 */\n#define LOG_NOTICE 5 /* 正常但重要状况 */\n#define LOG_INFO 6 /* 信息性\
    \ */\n#define LOG_DEBUG 7 /* 调试级别消息 */\n```\n\nTRACE 级别应对应于 Syslog 实现中的 LOG_DEBUG\
    \ 级别，该级别的`sysLogEquivalent`应为 7。最后，`CustomLevel`类需要提供方法来返回适当的`Level`对象，并根据给定的`int`或`String`值创建\
    \ TRACE 级别。\n\n清单 8-9 `CustomLevel.java`演示了如何实现自定义`Level`类。\n\n清单 8-9：CustomLevel.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\nimport\
    \ org.apache.log4j.Level;\n\npublic class CustomLevel extends Level {\n\n  static\
    \ public final int TRACE_INT = Level.DEBUG_INT - 1;\n  private static String TRACE_STR\
    \ = \"TRACE\";\n  public static final CustomLevel TRACE = new CustomLevel(TRACE_INT,\n\
    TRACE_STR, 7);\n\n  protected CustomLevel(int level, String strLevel, int syslogEquiv)\
    \ {\n    super(level, strLevel, syslogEquiv);\n  }\n\n  public static Level toLevel(String\
    \ sArg) {\n    return (Level) toLevel(sArg, CustomLevel.TRACE);\n  }\n\n  public\
    \ static Level toLevel(String sArg, Level defaultValue) {\n\n    if(sArg == null)\
    \ {\n      return defaultValue;\n    }\n    String stringVal = sArg.toUpperCase();\n\
    \n    if(stringVal.equals(TRACE_STR)) {\n      return CustomLevel.TRACE;\n   \
    \ }\n    return Level.toLevel(sArg, (Level) defaultValue);\n  }\n\n  public static\
    \ Level toLevel(int i) {\n    switch(i) {\n    case TRACE_INT: return CustomLevel.TRACE;\n\
    \    }\n    return Level.toLevel(i);\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n在这个`CustomLevel`对象中，我们定义了一个新级别 TRACE，其唯一整数值比与 DEBUG 级别关联的唯一整数值小\
    \ 1，以保持该级别的优先级低于 DEBUG。这表明 TRACE 级别应使用在优先级最低的场景中。在 Syslog 上下文中，我们为其分配 Syslog 等效值\
    \ 7，以对应 Syslog 实现中的 LOG_DEBUG。\n\n### 创建自定义日志记录器\n\n一旦我们定义了代表 TRACE 级别的`CustomLevel`对象，就需要一个自定义的`Logger`对象来使用该级别。`Logger`对象本质上承担两项职责：通过将日志请求委托给具有适当级别的不同`Appender`对象来生成日志消息，以及向调用应用程序返回命名`Logger`对象的实例。在\
    \ log4j 讨论中提供的示例中，我们一直使用包名来命名日志记录器。实际上，日志记录器的名称可以是任何内容，用于标识在预定义目标中生成日志跟踪的日志记录器。\n\
    \n在复杂的应用场景中，我们可能会决定创建多个自定义`Logger`类。根据指定的日志记录器名称，我们将向调用应用程序返回适当的`Logger`对象。此外，我们还可以考虑使用工厂对象来决定返回哪个`Logger`对象。判断标准同样可以是日志记录器的名称。\n\
    \n清单 8-10 `CustomLogger.java`展示了一个自定义`Logger`对象，其中包含一个生成 TRACE 级别消息的方法。它还使用`CustomLoggerFactory`对象来创建并返回适当的自定义`Logger`对象。\n\
    \n清单 8-10：CustomLogger.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.Logger;\nimport com.apress.logging.log4j.CustomLevel;\n\
    \npublic class CustomLogger extends Logger {\n    private String FQCN = CustomLogger.class.getName()+\"\
    .\";\n    private static CustomLoggerFactory factory = new CustomLoggerFactory();\n\
    \    public CustomLogger(String name) {\n        super(name);\n    }\n\n    public\
    \ void trace(Object message) {\n        //调用父类的 log 方法，并将 throwable 实例设为 null\n\
    \        super.log(FQCN, CustomLevel.TRACE, message, null);\n    }\n    public\
    \ static Logger getLogger(String name) {\n        return Logger.getLogger(name,\
    \ factory);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n这个`CustomLogger`示例引入了一个新方法，用于将\
    \ TRACE 级别的消息发布到通过与此`Logger`关联的任何`Appender`对象指定的目标。\n\n### 生成自定义日志记录器工厂\n\n继续我们关于编写自定义`Logger`对象的讨论，清单\
    \ 8-11 `CustomLoggerFactory.java`是生成自定义日志记录器工厂对象的代码。如果你想知道为什么需要工厂对象，答案将在本节末尾揭晓。`CustomLoggerFactory`类实现了`LoggerFactory`接口，并提供了`makeNewLoggerInstance(String\
    \ name)`方法的实现。该示例实现展示了工厂对象如何用于返回不同类型的日志记录器对象的框架。\n\n清单 8-11：CustomLoggerFactory.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\nimport\
    \ org.apache.log4j.spi.LoggerFactory;\nimport org.apache.log4j.Logger;\n\npublic\
    \ class CustomLoggerFactory implements LoggerFactory {\n    public Logger makeNewLoggerInstance(String\
    \ name) {\n        return new CustomLogger(name);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n`CustomLoggerFactory`根据传递给它的`Logger`对象的名称返回一个单独的`CustomLogger`实例。这是最简单的场景。拥有工厂对象的优势在于，我们可以控制`Logger`对象如何提供给调用应用程序。\n"
- fmt: "### Using Custom Logging Components\n\nWe will now see a small example that\
    \ demonstrates the use of the custom level, logger, and `Factory` object we created\
    \ in the previous sections. As usual, the application that uses the logging mechanism\
    \ will obtain an instance of the `CustomLogger` class. The application can then\
    \ produce messages with the custom level `TRACE` by using the `trace()` method\
    \ provided within the `CustomLogger` class.\n\n[Listing 8-12](#LiB0063.html#ch08ls12),\
    \ `CustomLoggerDemo.java`, demonstrates the use of the `CustomLogger` class. Notice\
    \ that the `getLogger(String)` method of the `CustomLogger` class actually returns\
    \ an instance of the `Logger` class. For this reason, within the application,\
    \ we need to cast the returned instance to `CustomLogger`.\n\n**Listing 8-12:**\
    \ `CustomLoggerDemo.java`\n\n```\npackage com.apress.logging.log4j;\n\nimport\
    \ org.apache.log4j.Logger;\n\npublic class CustomLoggerDemo {\n    private static\
    \ CustomLogger logger =\n(CustomLogger)CustomLogger.getLogger(CustomLoggerDemo.class.getPackage()\n\
    .getName());\n\n/** Creates a new instance of CustomLoggerDemo */\n    public\
    \ CustomLoggerDemo()\n    {\n    }\n\npublic void doLogging()\n    {\n       \
    \ logger.trace(\"THIS IS A TRACE LEVEL MESSAGE...\");\n    }\n\npublic static\
    \ void main(String args[])\n    {\n        CustomLoggerDemo demo = new CustomLoggerDemo();\n\
    \        demo.doLogging();\n    }\n}\n```\n\nThe `doLogging()` method uses the\
    \ obtained `CustomLogger` instance and produces a `TRACE`-level message by using\
    \ the `trace()` method of the `CustomLogger` class.\n\nAll this is nice and simple.\
    \ But we still need to address a few things regarding the configuration settings\
    \ for using the custom level, logger, and `Factory` object. When log4j is initialized,\
    \ the framework tends to use a `DefaultCategoryFactory` object to configure the\
    \ loggers. This `DefaultCategory` object returns a named instance of the `Logger`\
    \ class. In order to use the `CustomLoggerFactory` class, we need to specify in\
    \ the configuration file the `CustomLoggerFactory` class as the `Factory` class\
    \ to be used within the framework. In case the framework uses the `DefaultCategoryFactory`\
    \ class, we will get a `ClassCastException` in the caller application while attempting\
    \ to cast the obtained logger instance to `CustomLogger`.\n\nAlso, as we are using\
    \ the custom level `TRACE`, the configuration demands that the implementation\
    \ class for this level also be defined. The custom level should be defined in\
    \ `level#classname` format. Otherwise, the framework will not be able to use any\
    \ level outside the domain of normal log4j-defined levels.\n\n[Listing 8-13](#LiB0063.html#ch08ls13),\
    \ `customlogger.properties`, is the configuration file for the example provided\
    \ in [Listing 8-12](#LiB0063.html#ch08ls12).\n\n**Listing 8-13:** `customlogger.properties`\n\
    \n```\n#configure log4j to use the CustomLoggerFactory as the factory object\n\
    log4j.loggerFactory=com.apress.logging.log4j.CustomLoggerFactory\n\n#set the level\
    \ to TRACE and appender to ConsoleAppender\nlog4j.logger.com.apress.logging.log4j=TRACE#com.apress.logging.log4j\n\
    .CustomLevel, CONSOLE\n\n#define the appender\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\n\
    log4j.appender.CONSOLE.layout=org.apache.log4j.SimpleLayout\n```\n\nThe equivalent\
    \ XML-style configuration for this example is as follows in [Listing 8-14](#LiB0063.html#ch08ls14).\n\
    \n**Listing 8-14:** `customlogger.xml`\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<!DOCTYPE log4j:configuration SYSTEM \"log4j.dtd\">\n\n<log4j:configuration\
    \ xmlns:log4j=\"http://jakarta.apache.org/log4j/\">\n\n<appender name=\"A1\" class=\"\
    org.apache.log4j.ConsoleAppender\">\n\n<layout class=\"org.apache.log4j.PatternLayout\"\
    >\n     <param name=\"ConversionPattern\" value=\"%t %-5p %c{2} - %m%n\"/>\n \
    \  </layout>\n\n</appender>\n\n<logger name=\"com.apress.logging.log4j\">\n  \
    \ <level value=\"TRACE\" class=\"com.apress.logging.log4j.CustomLevel\"/>\n  \
    \ <appender-ref ref=\"A1\"/>\n </logger>\n\n<categoryFactory class=\"com.apress.logging.log4j.CustomLoggerFactory\"\
    />\n\n</log4j:configuration>\n```\n\nWatch how the custom `Level` and custom `LoggerFactory`\
    \ classes are configured.\n\n> **Caution:** At the moment, there is a bug in log4j\
    \ version 1.2.6 in that `DOMConfigurator` completely ignores the `<categoryFactory>`\
    \ element. As a result, the use of custom loggers along with a custom logger Factory\
    \ is not possible with XML-style configuration. Hopefully this bug will be resolved\
    \ soon.\n\nWe have seen that by creating new levels and `Logger` classes, we are\
    \ able to customize the priority of our logging messages.\n\n> **Caution:** The\
    \ creator group of log4j strongly discourages the use of custom logger and custom\
    \ logger Factory objects."
