    \        AnotherClass anc = new AnotherClass();\n        anc.logAnotherMessage();\n\
    \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n我们将编写一个小的配置文件 \"customappender.properties\"\
    \ 来配置这两个类中使用的两个 `Logger` 对象。该文件如清单 8-4 所示，展示了此示例使用的配置。\n\n清单 8-4: customappender.properties\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\n#配置自定义日志记录器\nlog4j.logger.Logger1=DEBUG,\
    \ WINDOW\nlog4j.logger.Logger2=DEBUG, WINDOW\n\n#配置 WINDOW 附加器\nlog4j.appender.WINDOW=com.apress.logging.log4j.appender.WindowAppender\n\
    log4j.appender.WINDOW.layout=org.apache.log4j.SimpleLayout\nlog4j.appender.WINDOW.title=自定义日志窗口\n\
    log4j.appender.WINDOW.width=200\nlog4j.appender.WINDOW.height=200\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n在此配置文件中，我们为 `WindowAppender` 传递了 `title`、`width` 和 `height` 的值。我们还指定了\
    \ `SimpleLayout` 作为 `WindowAppender` 使用的布局。\n\n执行清单 8-3 中的程序，我们将看到一个小型日志窗口出现，其中显示日志消息，如图\
    \ 8-1 所示。\n\n![点击展开](img/fig8-1_0.jpg)\n图 8-1: WindowAppender 生成的日志信息\n\n## 从数据库配置\
    \ log4j\n\n正如我们之前讨论过的，log4j 最重要的特性之一是其高度可配置性。我们可以定义特定于应用程序的配置文件，可以是属性样式，也可以是 XML\
    \ 样式。此外，配置文件可以位于远程位置，只要资源可以通过 URL 访问，我们仍然可以加载配置信息。\n\n日志行为可以通过配置文件控制这一事实，使得无需修改源代码即可轻松更改日志记录风格，只需更改配置信息或将应用程序指向一组不同的配置文件即可。\n\
    \n在某些应用场景中，我们可能更倾向于从中央数据库控制 log4j 配置信息。这使我们能够将集中控制的日志记录风格应用于不同的应用程序组件。在这种场景下，我们很可能认为应用程序中的所有组件都采用特定的日志记录风格。`Logger`、`Appender`、`Level`、`Layout`\
    \ 和 `Filter` 对象共同定义了一种日志记录风格。这些日志记录元素的不同组合将产生另一种日志记录风格。如果我们决定所有应用程序组件共同采用一种特定的日志记录风格，并且当它们切换到另一种日志记录风格时也共同切换，那么将配置信息以关系方式存储在数据库中可能是一个解决方案。这意味着每个应用程序组件无需维护和加载自己的配置信息，在数据库中集中更改配置信息即可控制日志记录行为。\n\
    \n能够如此轻松地更改日志记录行为固然很好，但实际中我们多久需要这样做一次呢？通常，我们事先知道需要记录哪些信息来维护应用程序。几乎总是如此：在开发和测试阶段我们需要更多的日志信息，而在部署阶段只需要某些特定的日志信息。log4j\
    \ 的强大之处不在于我们可以随时更改应用程序的日志记录行为，而在于我们可以在应用程序中隐藏生成不同级别日志信息的能力，并在需要时将其展现出来。只有当我们进入需要更多或更少信息的阶段时，我们才会切换到不同的日志记录风格。\n\
    \n### 用于存储日志配置的数据库表设计\n\n回想一下，我们在整个 log4j 讨论中使用的配置文件和 XML 配置文件的结构是基于键值对的。要从数据库配置\
    \ log4j，需要在数据库中复制相同的信息结构。在实际情况下，可能需要花费整个下午来决定采用何种数据库结构。但为了本示例的考虑，我们将使用一个相当简单的结构，包含两个表：`LOGGER_REPOSITORY`\
    \ 和 `APPENDER_DEF`，它们分别包含关于日志记录器和附加器的信息。\n\n图 8-2 显示了我们将用于此示例的表的简单模式图。\n\n![点击展开](img/fig8-2_0.jpg)\n\
    图 8-2: log4j 配置模式图\n\n这个结构非常简单，排除了诸如 `Filter` 对象和 `Renderer` 对象等元素。我们可以看到 `APPENDER_DEF`\
    \ 表包含了与不同 `Appender` 对象相关的可能属性，尽管为了保持示例简单，它并未包含所有 `Appender` 对象。目前它可以包含三个附加器对象：`ConsoleAppender`、`DailyRollingFileAppender`\
    \ 和 `JDBCAppender`。\n"
- fmt: "### Reading Configuration Information from the Database via the Configuration\
    \ Loader\n\nOnce we have the configuration information defined in the database\
    \ tables, we need some mechanism to read the information. We will now develop\
    \ a small program that reads the configuration data from the database. It also\
    \ creates a `java.util.Properties` object with the key and value of all the log4j\
    \ configuration information and returns it to the caller. Once the data is read\
    \ and loaded into the `Properties` object, the connection to the database is closed.\n\
    \nYou might be wondering why we need to load the data in a `Properties` object.\
    \ The reason will be clear once we go through this example. For the time being,\
    \ you just need to know that we want to use the existing `org.apache.log4j.PropertyConfigurator`\
    \ class to do the actual configuration job. The `PropertyConfigurator` class is\
    \ capable of configuring the log4j framework from a `Properties` object.\n\nNotice\
    \ that the SQL to retrieve configuration data from the database is hard coded\
    \ within the `DBConfigLoader` class. We also retrieve the data by referencing\
    \ the column names in the tables. All this is done to keep the example simple;\
    \ feel free to improve this program by changing the infrastructure wherever you\
    \ like.\n\n[Listing 8-5](#LiB0062.html#ch08ls05), `DBConfigLoader.java`, is a\
    \ sample implementation for reading configuration information from the database.\n\
    \n**Listing 8-5: DBConfigLoader.java**\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport java.util.Properties;\nimport java.sql.Connection;\nimport java.sql.DriverManager;\n\
    import java.sql.Statement;\nimport java.sql.ResultSet;\nimport java.sql.SQLException;\n\
    \npublic class DBConfigLoader\n{\n    private Connection conn = null;\n    private\
    \ String dbUrl = null;\n    private String dbDriver = null;\n    private String\
    \ dbUser = null;\n    private String dbPwd = null;\n\n    /**\n     * Constructor\
    \ initializing the db access params\n     */\n    public DBConfigLoader()\n  \
    \  {\n        this.setDbDriver(\"sun.jdbc.odbc.JdbcOdbcDriver\");\n        this.setDbUrl(\"\
    jdbc:odbc:dbdef\");\n        this.setDbUser(\"system\");\n        this.setDbPwd(\"\
    manager\");\n    }\n\n    /**\n     * Sets the driver class for the db access\n\
    \     */\n    private void setDriver()\n    {\n        try\n        {\n      \
    \      //load the driver\n            Class.forName(dbDriver);\n        } catch\
    \ (ClassNotFoundException cnfe)\n        {\n            System.out.println(\"\
    Could not find the driver class \" + dbDriver);\n        }\n    }\n\n    /**\n\
    \     * Method to obtain a db connection\n     * @return Connection object\n \
    \    * @throws SQLException\n     */\n    private Connection getConnection() throws\
    \ SQLException\n    {\n        System.out.println(\"CONNECTION PARAMS: \");\n\
    \        System.out.println(\"DRIVER: \" + dbDriver);\n        System.out.println(\"\
    URL: \" + dbUrl);\n        System.out.println(\"USER: \" + dbUser);\n        System.out.println(\"\
    PWD: \" + dbPwd);\n        //load the driver\n        setDriver();\n        //getting\
    \ the connection\n        conn = DriverManager.getConnection(dbUrl, dbUser, dbPwd);\n\
    \        return conn;\n    }\n\n    /**\n     * Obtain the configuration data\
    \ from the db\n     * @param sql The sql to execute to get the data\n     * @return\
    \ ResultSet object containing the data\n     * @throws SQLException\n     */\n\
    \    private ResultSet getConfigData(String sql) throws SQLException\n    {\n\
    \        //obtain a connection to the database\n        conn = getConnection();\n\
    \        //create a statement object to execute the query\n        Statement stmt\
    \ = conn.createStatement();\n        //execute the query to get the resultset\n\
    \        ResultSet rs = stmt.executeQuery(sql);\n        return rs;\n    }\n\n\
    \    /**\n     * constructs the SQL statement to execute\n     * @return String\
    \ the SQL statement\n     */\n    private String getSQL()\n    {\n        StringBuffer\
    \ buffer = new StringBuffer(\"SELECT * FROM APPENDER_DEF AD, LOGGER_REPOSITORY\
    \ LR WHERE \");\n        buffer.append(\" LR.APPENDER_ID=AD.APPENDER_ID\");\n\
    \        System.out.println(\"The SQL: \" + buffer.toString());\n        return\
    \ buffer.toString();\n    }\n\n    /**\n     * Loads all the configuration data\
    \ in a Properties object\n     * and returns the Properties object back to the\
    \ caller\n     */\n    public Properties getConfigData()\n    {\n        //properties\
    \ object to store the config data\n        Properties props = new Properties();\n\
    \        String loggerName = null;\n        String loggerLevel = null;\n     \
    \   String appenderName = null;\n        String appenderClass = null;\n      \
    \  String appenderLevel = null;\n        String fileName = null;\n        String\
    \ maxFileSize = null;\n        String jdbcURL = null;\n        String jdbcUser\
    \ = null;\n        String jdbcPwd = null;\n        String jdbcSQL = null;\n  \
    \      String layout = null;\n\n        //get the sql to obtain the config data\n\
    \        String sql = getSQL();\n        try\n        {\n            //get the\
    \ result set\n            ResultSet rs = getConfigData(sql);\n            while\
    \ (rs.next())\n            {\n                //getting the appender class\n \
    \               appenderClass = rs.getString(\"APPENDER_CLASS\");\n          \
    \      //getting the file name properties (can be null)\n                fileName\
    \ = rs.getString(\"FILE_NAME\");\n                //getting the max file size\
    \ (can be null)\n                maxFileSize = rs.getString(\"MAX_FILE_SIZE\"\
    );\n                //getting the jdbc url (can be null)\n                jdbcURL\
    \ = rs.getString(\"DB_URL\");\n                //getting the jdbc user id (can\
    \ be null)\n                jdbcUser = rs.getString(\"USER_ID\");\n          \
    \      //getting the jdbc password (can be null)\n                jdbcPwd = rs.getString(\"\
    USER_PWD\");\n                //getting the SQL string\n                jdbcSQL\
    \ = rs.getString(\"DB_SQL\");\n                //getting the layout information\n\
    \                layout = rs.getString(\"LAYOUT\");\n                //getting\
    \ the appender name\n                appenderName = rs.getString(\"APPENDER_NAME\"\
    );\n                //getting the level of the appender\n                appenderLevel\
    \ = rs.getString(\"APPENDER_LEVEL\");\n\n                //getting the logger\
    \ name\n                loggerName = rs.getString(\"LOGGER_NAME\");\n        \
    \        //getting the logger level\n                loggerLevel = rs.getString(\"\
    LOGGER_LEVEL\");\n\n                //constructing the properties with key and\
    \ value\n                String loggerKey = \"log4j.logger.\" + loggerName;\n\
    \                String appenderKey = \"log4j.appender.\" + appenderName;\n\n\
    \                //properties for the logger level and the appender\n        \
    \        props.put(loggerKey, loggerLevel + \",\" + appenderName);\n         \
    \       props.put(getKey(appenderKey, null), appenderClass);\n\n             \
    \   if (fileName != null)\n                {\n                    props.put(getKey(appenderKey,\
    \ \"File\"), fileName);\n                }\n                if (maxFileSize !=\
    \ null)\n                {\n                    props.put(getKey(appenderKey,\
    \ \"MaxFileSize\"), maxFileSize);\n                }\n                if (jdbcURL\
    \ != null)\n                {\n                    props.put(getKey(appenderKey,\
    \ \"URL\"), jdbcURL);\n                }\n                if (jdbcUser != null)\n\
    \                {\n                    props.put(getKey(appenderKey, \"user\"\
    ), jdbcUser);\n                }\n                if (jdbcPwd != null)\n     \
    \           {\n                    props.put(getKey(appenderKey, \"password\"\
    ), jdbcPwd);\n                }\n                if (layout != null)\n       \
    \         {\n                    props.put(getKey(appenderKey, \"layout\"), layout);\n\
    \                }\n            }\n        } catch (SQLException sqle)\n     \
    \   {\n            System.out.println(\"FAILED TO GET CONFIG DATA: \" + sqle.toString());\n\
    \            sqle.printStackTrace();\n        }\n        // ... (remaining code\
    \ omitted for brevity)\n    }\n}\n```"
