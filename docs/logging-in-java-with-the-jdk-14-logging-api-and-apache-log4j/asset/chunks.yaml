  trans: "\n### 日志记录器示例\n\n清单 5-6 中的程序`LoggerDemo.java`将演示基本的日志记录方法，并尝试对日志信息进行本地化。\n\
    \n清单 5-6：LoggerDemo.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.*;\n\n/** 此类演示了 Logger 类方法的基本用法\n */\npublic class LoggerDemo\
    \ {\n\nprivate static Logger logger =\nLogger.getLogger(LoggerDemo.class.getPackage().getName());\n\
    /** 创建 LoggerDemo 的新实例 */\npublic LoggerDemo(String rbName) {\n        //将父级处理器的使用设置为\
    \ false\n        logger.setAdditivity(false);\n        logger.debug(\"将父级可加性设置为\
    \ false...\");\n        logger.setResourceBundle(java.util.ResourceBundle.getBundle(rbName));\n\
    \        logger.debug(\"设置资源包...\");\n    }\n\n/** 演示基于基本级别的日志记录方法\n     * @param\
    \ name 要问候的名称\n     */\n    public void doLogging(String name) {\n        logger.debug(\"\
    进入 doLogging 方法..\");\n        String str = \"Hello \";\n        String output\
    \ = null;\n\nif(name == null) {\n            output = \"Anonymous\";\n       \
    \     logger.warn(\"未传入名称，设置为匿名...\");\n        }else {\n            output =\
    \ str.concat(name);\n            logger.info(\"构建了字符串对象...\"+output);\n      \
    \  }\n\nlogger.info(\"打印消息...\");\n        logger.debug(\"退出 doLogging 方法...\"\
    );\n    }\n\n/** 演示本地化的日志记录方法\n     */\n    public void doLocalizedLogging() {\n\
    \nlogger.l7dlog(Level.DEBUG, \"Entry\", null);\n        logger.l7dlog(Level.DEBUG,\
    \ \"Exit\", null);\n    }\n\npublic static void main(String args[]) {\n      \
    \  String name = args[0];\n        String rbName = args[1];\n        LoggerDemo\
    \ demo = new LoggerDemo(rbName);\n        demo.doLogging(name);\n        demo.doLocalizedLogging();\n\
    \    }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n要执行此程序，我们使用清单 5-3 中描述的同一个\"\
    log4j.properties\"文件。首先，我们获取一个`Logger`实例，其名称为`LoggerDemo`类所在包的包名，并将其作为类变量。在构造函数中，我们将此日志记录器的`additivity`属性设置为`false`，这意味着此日志记录器不会将任何日志记录请求转发给其直接父级日志记录器。接下来，我们为此日志记录器设置`ResourceBundle`，该资源包将用于日志信息的本地化。`doLogging()`方法使用了`Logger`类中的几个日志记录方法。严重性较低的日志信息通过`debug()`方法打印，其他重要消息则通过`Logger`类的`info()`和`warn()`方法打印。\n\
    \n`doLocalizedLogging()`方法仅打印两条消息，以演示如何将传递给日志记录方法的消息解释为本地化键，并打印相应的消息值。考虑以下包含本地化键和值的\"\
    logging_fr.properties\"文件：\n\n```\nEntry=Entrer\nExit=Sortir\n```\n\n当通过分别传递消息\"\
    Entry\"和\"Exit\"来调用`17dlog()`方法时，log4j 框架会查找\"logging_fr.properties\"文件，并打印相应的值作为日志信息。\n\
    \n如果我们使用以下命令执行程序：\n\n```\n java -Dlog4j.configuration=log4j.properties\ncom.apress.logging.log4j.LoggerDemo\
    \ sam logging_fr\n```\n\n我们将在控制台中看到打印出以下信息：\n\n```\nDEBUG - Set the parent additivity\
    \ to false...\nDEBUG - Set the resource bundle...\nDEBUG - Entered the doLogging\
    \ method..\nINFO - Constructed the string object...Hello sam\nINFO - printing\
    \ the message...\nDEBUG - Exiting the doLogging method...\nDEBUG - Entrer\nDEBUG\
    \ - Sortir\n```\n\n请注意，日志消息的最后两行是作为本地化消息打印的。级别为 DEBUG 的信息仅用于在开发期间打印，以便更好地理解应用程序的控制流程。我们可以通过更改\"\
    log4j.properties\"文件中的级别来轻松关闭 DEBUG 级别的消息，如下所示：\n\n```\nlog4j.logger.com.apress.logging.log4j=INFO,\
    \ X\n```\n\n将新级别设置为 INFO 后，日志记录器将仅打印优先级等于或高于 INFO 的消息。如果我们使用上述设置重新执行程序，将在控制台中看到以下输出：\n\
    \n```\nINFO - Constructed the string object...Hello sam\nINFO - printing the message...\n\
    ```\n\n请注意，这次省略了 DEBUG 级别的消息。\n\n## LogManager 对象\n\n`org.apache.log4j.LogManager`类管理从应用程序内部创建的每个命名日志记录器的创建和存储。它在内部使用另一个辅助类`org.apache.log4j.Hierarchy`来存储所创建的每个`Logger`对象的引用。这种层次结构使得每个创建的子日志记录器都有一个指向其父级日志记录器的指针，但父级日志记录器不会有任何对其子日志记录器的引用。此外，log4j\
    \ 不限制应用程序开发人员在实例化父级日志记录器之前实例化子日志记录器。在这种情况下，子日志记录器实例会被创建，并在`Hierarchy`类中存储，同时为其预留一个空节点，以便将来在创建父级日志记录器时进行分配。\n\
    \n应用程序开发人员通常不必关心`Hierarchy`类的使用。相反，他们使用`LogManager`和`Logger`类提供的便捷方法来创建和获取任何命名日志记录器。同样值得注意的是，当我们更改任何现有命名日志记录器的属性时，永远不会创建新实例。而是从`Hierarchy`类中获取现有引用，并将属性更改应用到该引用。这就是为什么`Logger`类中的方法（例如\n\
    \n```\npublic void addAppender(Appender appender)\n```\n\n是`synchronized`（同步）的，以确保两个线程不会同时操作同一个命名日志记录器的实例。\n\
    \n`LogManager`类提供了表 5-2 中描述的有用方法。\n\n表 5-2：LogManager 类中的方法\n\n| 方法 | 描述 |\n|\
    \ --- | --- |\n| `public static Enumeration getCurrentLoggers();` | 此方法返回现有命名日志记录器的枚举。\
    \ |\n| `public static Logger exists(String name);` | 此方法检查特定命名日志记录器是否存在。 |\n|\
    \ `public static Logger getLogger(String name);` | 此方法获取一个现有的命名日志记录器。 |\n\n在下一节中，我们将探讨\
    \ log4j 的其他方面，这些方面有助于我们处理特定于客户端的日志信息。\n"
- fmt: "# Nested Diagnostic Context (NDC)\n\nLogging is most useful in complex distributed\
    \ applications. The majority of real-life complex distributed systems are multithreaded.\
    \ A good example of such is a Web application written with Java servlet technology.\
    \ Each servlet handles multiple clients at the same time, yet the logging code\
    \ written within the servlet is the same. It is almost always required that the\
    \ logging output of one client be differentiated from another. One approach is\
    \ to execute a different logging thread per client. But this solution may not\
    \ always be ideal. Another less complex approach may be to uniquely stamp each\
    \ logging output with some client-specific information. This is where the *Nested\
    \ Diagnostic Context* (NDC) comes into the picture.\n\nThe `NDC` class in log4j\
    \ has the methods listed in [Table 5-3](#LiB0039.html#ch05table03) to manage the\
    \ information in the `NDC` stack.\n\n**Table 5-3: Methods in the NDC Class**\n\
    \n| Method | Description |\n| --- | --- |\n| `public static void pop();` | This\
    \ method is called when exiting a context. |\n| `public static void push(String\
    \ message);` | This method adds the diagnostic context for the current thread.\
    \ |\n| `public static void remove();` | This method is called when exiting a thread.\
    \ It removes the diagnostic context for the particular thread. |\n\nNotice that\
    \ all the methods in the `NDC` class are `static`. The `NDC` is managed per thread\
    \ as a stack of contextual information. It is important to make sure that the\
    \ `remove()` method of `NDC` is called when leaving the `run()` method of a thread.\
    \ This ensures the garbage collection of the thread. Interestingly, a thread can\
    \ inherit the `NDC` from another thread by calling the `inherit(Stack stack)`\
    \ method of the `NDC` class. This is very useful when we want to compare the contextual\
    \ information of two different threads.\n\n## Message Diagnostic Context (MDC)\n\
    \nThe *Message Diagnostic Context* (MDC) is a mechanism to store client-specific\
    \ data, using the `java.util.Map` format. The key of this `Map` can be replaced\
    \ by its value in the conversion pattern specified with the `Layout` object used\
    \ with an appender. The `MDC` class provides the methods in [Table 5-4](#LiB0040.html#ch05table04)\
    \ to manipulate the key and the value stored within the `Map`.\n\n**Table 5-4:\
    \ Methods in the MDC Class**\n\n| Method | Description |\n| --- | --- |\n| `public\
    \ static Object get(String key);` | This method retrieves the `Object` stored\
    \ against the key. |\n| `public static void put(String key, Object o);` | This\
    \ method stores the `Object o` against the key. |\n| `public static void remove(String\
    \ key)` | This method removes the mapping of any `Object` with the key. |\n\n\
    The following example will help illustrate the concepts associated with the `MDC`\
    \ and `NDC` objects in a much clearer way. Imagine that we have a Java servlet\
    \ program that is multithreaded and handles multiple clients at the same time.\
    \ We might wish to stamp each logging output with some client-specific information\
    \ such as the client's IP address. Let's modify the `LoggingServlet.java` (shown\
    \ previously in [Listing 5-5](#LiB0035.html#294)) to use `MDC` and `NDC` in order\
    \ to separate out each logging output for each client request. To start, insert\
    \ the following code within the `doPost()` method:\n\n```\n public void doPost(HttpServletRequest\
    \ req, HttpServletResponse res)\n                       throws IOException, ServletException\n\
    \    {\n        String remoteAddress = req.getRemoteAddr();\n        String remoteHost\
    \ = req.getRemoteHost();\n\n        //pushing to NDC\n        NDC.push(remoteHost);\n\
    \        //mapping in MDC\n        MDC.put(\"remoteAddress\", remoteAddress);\n\
    \        logger.info(\"invoked the LoggingServlet...\");\n        PrintWriter\
    \ writer = res.getWriter();\n        writer.println(\"Check your web server console...\"\
    );\n        writer.flush();\n        writer.close();\n    }\n```\n\nIn the preceding\
    \ piece of code, we obtain the remote host name and the remote host address. The\
    \ `NDC` contains the remote host name and the `MDC` contains the remote host address.\
    \ Now we will modify the `log4j.properties` file as follows to change the conversion\
    \ pattern used by the appender to display the `MDC` and `NDC` information:\n\n\
    ```\nlog4j.appender.X.layout.conversionPattern=%x -%X{remoteAddress} %m%n\n```\n\
    \nThe `%x` displays the `NDC` information and `%X{variable name}` displays the\
    \ `MDC` information. Note that the variable name specified within the `MDC` pattern\
    \ has to match the variable name assigned within the code. Now the logging output\
    \ will contain the `NDC` and `MDC` information as follows:\n\n```\nhostname1 -\
    \ host address1 invoked the LoggingServlet...\nhostname2 - host address2 invoked\
    \ the LoggingServlet...\n```\n\nIt is evident how useful the `NDC` and `MDC` information\
    \ can be to distinguish the logging output although the same information is being\
    \ printed.\n\n## Appender Object\n\nThe ability to filter logging information\
    \ and using different methods in the `Logger` class is a great feature for application\
    \ developers. But the `Logger` itself is not capable of printing logging messages.\
    \ It does so with the help of `Appender` objects. `Appender` objects are primarily\
    \ responsible for printing logging messages to different destinations such as\
    \ consoles, files, sockets, NT event logs, etc. Occasionally, `Appender` objects\
    \ can have `Filter` objects associated with them to make further decisions about\
    \ the logging of a particular message.\n\nThe writing of information to the preferred\
    \ destination attached to any particular appender can be synchronous or asynchronous\
    \ depending on how the application developer uses the appender. It is a major\
    \ benefit that `Appender` objects are quite flexible in terms of destination of\
    \ the logging information. It is possible to create `Appender` objects to write\
    \ to a database and JMS in order to achieve a distributed logging framework. We\
    \ will discuss in this section the normal `Appender` objects capable of handling\
    \ logging information within the same JVM context; the relevant distributed logging\
    \ `Appender` objects appear later in [Chapter 7](#LiB0051_split_000.html#441).\
    \ In the context of log4j, the class diagram in [Figure 5-3](#LiB0041.html#ch05fig03)\
    \ depicts the relationship of `Appender` objects and how they are organized.\n\
    \n[![Click To expand](fig5-3.jpg)](fig5-3_0.jpg)\n**Figure 5-3: The Appender class\
    \ hierarchy in log4j**\n\nEach `Appender` object has different properties associated\
    \ with it, and these properties indicate the behavior of that object. In general,\
    \ `Appender` objects will have the following properties:\n\n*   `layout`: Each\
    \ `Appender` object needs to know how to format the logging information passed\
    \ to it. It uses the `Layout` objects and the conversion pattern associated with\
    \ them to format the logging information.\n\n*   `target`: Each `Appender` object\
    \ will have a target destination attached to it. The target may be a console,\
    \ a file, or other item depending on the appender.\n\n*   `level`: Each `Appender`\
    \ object can have a threshold `Level` associated with it. Logging information\
    \ is compared with the threshold level, and if the logging request level is equal\
    \ to or greater than this threshold, the logging information is processed further;\
    \ otherwise it is ignored.\n\n*   `filter`: It is possible to attach `Filter`\
    \ objects to `Appenders`. The `Filter` objects can analyze logging information\
    \ beyond level matching and decide whether logging requests should be handled\
    \ by a particular `Appender` or ignored.\n\nDepending on the type of `Appender`\
    \ object, each `Appender` can have other special attributes. We will discuss each\
    \ `Appender` object in upcoming sections, but first we will take a look at adding\
    \ `Appender` objects to `Logger` objects."
  raw: "## Nested Diagnostic Context (NDC)\n\nLogging is most useful in complex distributed\
    \ applications. The majority of real-life complex distributed systems are multithreaded.\
    \ A good example of such is a Web application written with Java servlet technology.\
    \ Each servlet handles multiple clients at the same time, yet the logging code\
    \ written within the servlet is the same. It is almost always required that the\
    \ logging output of one client be differentiated from another. One approach is\
    \ to execute a different logging thread per client. But this solution may not\
    \ always be ideal. Another less complex approach may be to uniquely stamp each\
    \ logging output with some client-specific information. This is where the *Nested\
    \ Diagnostic Context* (NDC) comes into the picture.\n\nThe `NDC` class in log4j\
    \ has the methods listed in [Table 5-3](#LiB0039.html#ch05table03) to manage the\
    \ information in the `NDC` stack.\n\nTable 5-3: Methods in the NDC Class\n\n|\
    \ Method | Description |\n| --- | --- |\n| `public static void pop();` | This\
    \ method is called when exiting a context. |\n| `public static void push(String\
    \ message);` | This method adds the diagnostic context for the current thread.\
    \ |\n| `public static void remove();` | This method is called when exiting a thread.\
    \ It removes the diagnostic context for the particular thread. |\n\nNotice that\
    \ all the methods in the `NDC` class are `static`. The `NDC` is managed per thread\
    \ as a stack of contextual information. It is important to make sure that the\
    \ `remove()` method of `NDC` is called when leaving the `run()` method of a thread.\
    \ This ensures the garbage collection of the thread. Interestingly, a thread can\
    \ inherit the `NDC` from another thread by calling the `inherit(Stack stack)`\
    \ method of the `NDC` class. This is very useful when we want to compare the contextual\
    \ information of two different threads.\n\n## Message Diagnostic Context (MDC)\n\
    \nThe *Message Diagnostic Context* (MDC) is a mechanism to store client-specific\
    \ data, using the `java.util.Map` format. The key of this `Map` can be replaced\
    \ by its value in the conversion pattern specified with the `Layout` object used\
    \ with an appender. The `MDC` class provides the methods in [Table 5-4](#LiB0040.html#ch05table04)\
    \ to manipulate the key and the value stored within the `Map`.\n\nTable 5-4: Methods\
    \ in the MDC Class\n\n| Method | Description |\n| --- | --- |\n| `public static\
    \ Object get(String key);` | This method retrieves the `Object` stored against\
    \ the key. |\n| `public static void put(String key, Object o);` | This method\
    \ stores the `Object o` against the key. |\n| `public static void remove(String\
    \ key)` | This method removes the mapping of any `Object` with the key. |\n\n\
    The following example will help illustrate the concepts associated with the `MDC`\
    \ and `NDC` objects in a much clearer way. Imagine that we have a Java servlet\
    \ program that is multithreaded and handles multiple clients at the same time.\
    \ We might wish to stamp each logging output with some client-specific information\
    \ such as the client's IP address. Let's modify the `LoggingServlet.java` (shown\
    \ previously in [Listing 5-5](#LiB0035.html#294)) to use `MDC` and `NDC` in order\
    \ to separate out each logging output for each client request. To start, insert\
    \ the following code within the `doPost()` method:\n\n```\n public void doPost(HttpServletRequest\
    \ req, HttpServletResponse res)\n                       throws IOException, ServletException\n\
    \    {\n        String remoteAddress = req.getRemoteAddr();\n        String remoteHost\
    \ = req.getRemoteHost();\n\n        //pushing to NDC\n        NDC.push(remoteHost);\n\
    \        //mapping in MDC\n        MDC.put(\"remoteAddress\", remoteAddress);\n\
    \        logger.info(\"invoked the LoggingServlet...\");\n        PrintWriter\
    \ writer = res.getWriter();\n        writer.println(\"Check your web server console...\"\
    );\n        writer.flush();\n        writer.close();\n    }\n```\n\nIn the preceding\
    \ piece of code, we obtain the remote host name and the remote host address. The\
    \ `NDC` contains the remote host name and the `MDC` contains the remote host address.\
    \ Now we will modify the \"log4j.properties\" file as follows to change the conversion\
    \ pattern used by the appender to display the `MDC` and `NDC` information:\n\n\
    ```\nlog4j.appender.X.layout.conversionPattern=%x -%X{remoteAddress} %m%n\n```\n\
    \nThe `%x` displays the `NDC` information and `%X{variable name}` displays the\
    \ `MDC` information. Note that the variable name specified within the `MDC` pattern\
    \ has to match the variable name assigned within the code. Now the logging output\
    \ will contain the `NDC` and `MDC` information as follows:\n\n```\nhostname1 -\
    \ host address1 invoked the LoggingServlet...\nhostname2 - host address2 invoked\
    \ the LoggingServlet...\n```\n\nIt is evident how useful the `NDC` and `MDC` information\
    \ can be to distinguish the logging output although the same information is being\
    \ printed.\n\n## Appender Object\n\nThe ability to filter logging information\
    \ and using different methods in the `Logger` class is a great feature for application\
    \ developers. But the `Logger` itself is not capable of printing logging messages.\
    \ It does so with the help of `Appender` objects. `Appender` objects are primarily\
    \ responsible for printing logging messages to different destinations such as\
    \ consoles, files, sockets, NT event logs, etc. Occasionally, `Appender` objects\
    \ can have `Filter` objects associated with them to make further decisions about\
    \ the logging of a particular message.\n\nThe writing of information to the preferred\
    \ destination attached to any particular appender can be synchronous or asynchronous\
    \ depending on how the application developer uses the appender. It is a major\
    \ benefit that `Appender` objects are quite flexible in terms of destination of\
    \ the logging information. It is possible to create `Appender` objects to write\
    \ to a database and JMS in order to achieve a distributed logging framework. We\
