    `JMSAppender` collects information about all the required parameters to obtain
    a JMS connection through configurable bean properties, which are shown in [Table
    7-2](#LiB0054.html#ch07table02).


    Table 7-2: Configurable Bean Properties in `JMSAppender`


    | Bean Property | Method | Description | Default |

    | --- | --- | --- | --- |

    | `initialContextFactoryName` | `setInitialContextFactoryName(String)` | Sets
    the initial context factory name | None |

    | `locationInfo` | `setLocationInfo(Boolean)` | If true, the caller''s location
    information is included | false |

    | `password` | `setPassword(String)` | Sets the password for using a JMS connection
    | None |

    | `providerURL` | `setProviderURL(String)` | Specifies the URL for the provider
    (This varies from provider to provider.) | None |

    | `securityCredentials` | `setSecurityCredentials(String)` | Sets the security
    credential attribute required by a few JMS providers | None |

    | `securityPrincipalName` | `setSecurityPrincipalName(String)` | Sets the security
    principal name for the particular provider | None |

    | `topicBindingName` | `setTopicBindingName(String)` | Sets the name of the Topic
    to connect to | None |

    | `topicConnectionFactory-BindingName` | `setTopicConnectionFactory-BindingName(String)`
    | Sets the name of the connection factory object to use to obtain the Topic connection
    | None |

    | `URLPkgPrefixes` | `setURLPkgPrefixes(String)` | Sets the package prefix property
    | None |

    | `userName` | `setUserName(String)` | Sets the user name for obtaining a connection
    to the provider | None |


    Not all the configuration parameters are required for every JMS provider we might
    use. The `JMSAppender` tries to cater to a large number of the JMS providers available
    in the market.'
