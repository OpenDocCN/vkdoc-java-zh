- fmt: '# Overview


    The Apache log4j implementation is a highly scalable, robust, and versatile logging
    framework. This API simplifies the writing of logging code within an application,
    yet allows the flexibility of controlling logging activity from an external configuration
    file. It also allows us to publish logging information to desired granularity
    depending on the detail of the logging information suitable to each application.


    We can tailor the granularity of logging activity suitable for the development
    phase or the deployment phase of an application without having to change the source
    code. It is possible to switch over to a different logging behavior by only changing
    a few configuration parameters.


    Apache log4j is also capable of publishing logging information to various destinations
    such as files, consoles, and NT event logs. Moreover, logging information can
    even be distributed over Java Message Service (JMS) or JDBC, or can be output
    to a TCP/IP socket. This API lets us take logging information and publish or print
    it in different formats and layouts that are human readable and reusable by any
    error handling and analyzer program at a future date. The scalability aspect of
    log4j allows developers to enhance the capability of logging by creating new logging
    destinations and unique formats and layouts, which is done by extending the existing
    framework.


    Although the application of the log4j framework is easy, it demands certain methods
    and practices be adopted for the best possible results. In this chapter, we will
    discuss the overall architecture of the log4j framework and different objects
    involved within the API, and examine in detail the application and usage of the
    core logging objects. This chapter uses the Apache log4j version 1.2.6 release
    as the basis for the concepts and examples presented herein. Although the subsequent
    releases of log4j will incorporate more features, the basic concepts discussed
    in this book will remain unchanged and will prove useful to mastering any subsequent
    release.


    # Installing log4j


    Apache log4j is an open-source project from Apache group. You need to meet the
    following criteria to successfully install and use log4j:


    * Get the latest version of the log4j binary distribution from [http://jakarta.apache.org](http://jakarta.apache.org).
    The examples and concepts in this book are based on the log4j version 1.2.6 release.
    You may obtain any later version of log4j, if available, and still be able to
    follow the examples in this book.

    * Apache log4j is JDK 1.1.x compatible. Make sure you have the appropriate JDK
    version downloaded to your machine.

    * You need a JAXP-compatible XML parser to use log4j. Make sure you have `"Xerces.jar"`
    installed on your machine.

    * The e-mail–based logging feature in log4j requires the Java Mail API (`"mail.jar"`)
    to be installed in your machine. Apache log4j is tested against version 1.2 of
    the Java Mail API.

    * The Java Mail API will also require the JavaBeans Activation Framework (`"activation.jar"`)
    be installed in your machine.

    * The JMS-compatible features of log4j will require that JMS is installed on your
    machine as well as JNDI.


    Once you have acquired and installed all the required `.jar` files, you must make
    sure that all these resources are available within the classpath of the Java runtime.


    # Overview of the log4j Architecture


    The architecture of the log4j API is layered. Each layer consists of different
    objects performing different tasks. The top layer captures the logging information,
    the middle layer is involved in analyzing and authorizing the logging information,
    and the bottom layer is responsible for formatting and publishing the logging
    information to a destination. In essence, log4j consists of three types of primary
    objects:


    * `Logger`: The `Logger` object (formerly known as the `Category` object in releases
    prior to log4j 1.2) is responsible for capturing logging information. `Logger`
    objects are stored in a namespace hierarchy.

    * `Appender`: The `Appender` object is responsible for publishing logging information
    to various preferred destinations. Each `Appender` object will have at least one
    target destination attached to it. For example, a `ConsoleAppender` object is
    capable of printing logging information to a console.

    * `Layout`: The `Layout` object is used to format logging information in different
    styles. `Appender` objects utilize `Layout` objects before publishing logging
    information. `Layout` objects play an important role in publishing logging information
    in a way that is human readable and reusable.


    The preceding core objects are central to the architecture of log4j. Apart from
    them, there are several auxiliary objects that are plug and play to any layer
    of the API. These objects help manage the different `Logger` objects active within
    an application and fine-tune the logging process.


    Next, let''s go over the principal auxiliary objects in the log4j framework that
    play a vital role in the logging framework:


    * `Level`: The `Level` object, previously referred to as the `Priority` object,
    defines the granularity and priority of any logging information. Each piece of
    logging information is accompanied with its appropriate `Level` object, which
    tells the `Logger` object about the priority of the information. There are seven
    levels of logging defined within the API: OFF, DEBUG, INFO, ERROR, WARN, FATAL,
    and ALL. Each level defined has a unique integer value associated with it.

    * `Filter`: The `Filter` object is used to analyze logging information and make
    further decisions on whether that information should be logged or not. In the
    log4j context, `Appender` objects can have several `Filter` objects associated
    with them. If logging information is passed to a particular `Appender` object,
    all the `Filter` objects associated with that `Appender` need to approve the logging
    information before it can be published to the preferred destination attached to
    the `Appender`. `Filter` objects are very helpful in filtering out unwanted logging
    information based on any application-specific criteria.

    * `ObjectRenderer`: The `ObjectRenderer` object is specialized in providing a
    `String` representation of different objects passed to the logging framework.
    More precisely, when the application passes a custom `Object` to the logging framework,
    the logging framework will use the corresponding `ObjectRenderer` to obtain a
    `String` representation of the passed `Object`. This is used by `Layout` objects
    to prepare the final logging information.

    * `LogManager`: The `LogManager` object performs the management of the logging
    framework. It is responsible for reading the initial configuration parameters
    from a system-wide configuration file or a configuration class. Each `Logger`
    instance created with a namespace within an application is stored in a namespace
    hierarchy by the `LogManager`. When we try to obtain the reference named logger,
    the `LogManager` class returns the already created instance of it, or else creates
    a new instance of the named logger, stores it in a repository for future reference,
    and returns the new instance to the caller application.'
