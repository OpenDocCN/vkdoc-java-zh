  trans: "\n#### 基于级别的日志记录\n\n`Logger` 类提供了使用特定日志级别的日志记录方法。本节将讨论属于此类别的方法。\n\n以下方法使用\
    \ `Level.INFO` 日志级别打印消息参数：\n\n```\npublic void info(String message);\n```\n\n\
    以下一组方法使用 `Level.FINE`、`Level.FINER` 和 `Level.FINEST` 日志级别打印消息。这些方法之间的唯一区别在于日志消息的粒度。\n\
    \n```\npublic void fine(String message);\npublic void finer(String message);\n\
    public void finest(String message);\n```\n\n以下方法使用 `Level.CONFIG` 日志级别打印消息，通常用于打印与配置相关的信息：\n\
    \n```\npublic void config(String message);\n```\n\n以下方法使用 `Level.WARNING` 日志级别打印消息。此类消息通常包含任何关于系统潜在风险的信息，这些风险应立即处理。\n\
    \n```\npublic void warning(String message);\n```\n\n以下方法使用 `Level.SEVERE` 日志级别打印消息。这些消息通常包含对系统极为关键的信息，涉及可能导致系统故障的问题。\n\
    \n```\n public void severe(String message);\n```\n\n然而，完全取决于应用程序开发人员来决定使用哪个级别来记录特定信息。通常，一个好的做法是确定应该用于发布某些类别信息的级别。例如，指示与数据库访问操作相关问题的消息对系统至关重要。这类消息可以使用\
    \ `SEVERE` 级别发布。另一方面，应用程序内部的调试跟踪可以使用 `INFO` 级别发布。\n\n在应用程序的部署阶段，消息级别的适当划分会变得非常有益。您可以配置日志记录器，使其仅以\
    \ `SEVERE` 或 `WARNING` 级别发布对系统至关重要的消息。但是，您可能会将提供详细调试信息的日志记录器配置为较低的级别。\n\n####\
    \ 与方法相关的日志记录\n\n以下是用于跟踪方法级活动（例如任何方法的进入和退出）的便捷方法。\n\n```\npublic void entering(String\
    \ sourceClass, String sourceMethod);\npublic void entering(String sourceClass,\
    \ String sourceMethod, Object param1);\npublic void entering(String sourceClass,\
    \ String sourceMethod, Object params[]);\npublic void exiting(String sourceClass,\
    \ String sourceMethod);\npublic void exiting(String sourceClass, String sourceMethod,\
    \ Object param);\npublic void exiting(String sourceClass, String sourceMethod,\
    \ Object[] params);\n```\n\n这些方法内部使用 `Level.FINER` 日志级别来记录消息，因此应仅用于创建调试跟踪。\n\n\
    #### 日志记录器示例\n\n如前几节所述，`Logger` 类提供了各种用于日志记录的便捷方法。应用程序开发人员可以根据应用程序内的各种其他条件选择使用任何方法。清单\
    \ 2-5 `LogMethods.java` 将演示 `Logger` 类中不同日志记录方法的使用。\n\n清单 2-5: LogMethods.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\n package sam.logging;\n\nimport java.util.logging.*;\n\
    import java.io.IOException;\npublic class LogMethods\n{\n    private static Logger\
    \ logger = Logger.getLogger(\"sam.logging\");\n    public LogMethods()\n    {\n\
    \        //首先获取日志管理器实例\n        LogManager manager = LogManager.getLogManager();\n\
    \        //移除与此管理器关联的所有处理器\n        manager.reset();\n        //为日志记录器创建一个新的处理器，用于将消息写入控制台\n\
    \        ConsoleHandler ch = new ConsoleHandler();\n        ch.setLevel(Level.FINEST);\n\
    \n//设置日志记录器级别和处理器\n        logger.setLevel(Level.FINEST);\n        logger.addHandler(ch);\n\
    \n}\n\n/**\n     * 此方法演示基本的日志记录方法\n     */\n    public void printBasicMethods()\n\
    \    {\n        logger.log(Level.INFO, \"这是信息级别消息\");\n\n//自行创建日志记录\n        LogRecord\
    \ record = new LogRecord(Level.SEVERE, \"我们自己的日志记录对象\");\n\n//记录日志记录对象\n     \
    \   logger.log(record);\n    }\n\n/**\n     * 此方法演示精确的日志记录方法\n     */\n\npublic\
    \ void printPreciseMethods()\n    {\n        logger.logp(Level.INFO, \"LogMethods\"\
    , \"printPreciseMethods\",\n\"精确方法..\");\n    }\n\n/**\n     * 此方法演示基于级别的日志记录方法\n\
    \     */\n    public void printLevelMethods()\n    {\n\nlogger.fine(\"这是一条精细级别消息\"\
    );\n        logger.finer(\"这是一条更精细级别消息\");\n        logger.finest(\"这是一条最精细级别消息\"\
    );\n        logger.config(\"这是配置级别消息\");\n    }\n    /**\n     *此方法演示方法级别的日志记录方法\n\
    \     */\n    public void printMethod()\n    {\n\nlogger.entering(\"LogMethods\"\
    , \"printMethod\");\n        logger.exiting(\"LogMethods\", \"printMethod\");\n\
    \    }\n\npublic static void main(String[] args)\n    {\n        LogMethods lm\
    \ = new LogMethods();\n        lm.printBasicMethods();\n        lm.printPreciseMethods();\n\
    \        lm.printLevelMethods();\n        lm.printMethod();\n    }\n}\n```\n\n\
    | **![结束示例](img/_1.gif)** |\n\n|  |\n\n此程序演示了日志记录框架在实际中如何工作的一些重要概念。默认情况下，日志记录框架会设置一个始终存在的默认根日志记录器。根日志记录器关联了一个\
    \ `ConsoleHandler` 对象作为默认处理器，能够将信息打印到 `System.err`。应用程序可以获取任何其他命名或匿名的 `Logger`\
    \ 实例，然后可以潜在地将任何其他 `Handler` 对象附加到该 `Logger`。如果没有显式地将 `Handler` 对象附加到 `Logger`\
    \ 实例，并且启用了父级处理器的使用，那么 `Logger` 将使用与其父级日志记录器关联的 `Handler` 对象。\n\n与 `ConsoleHandler`\
    \ 关联的默认级别是 `Level.INFO`，这意味着此处理器将忽略任何级别更低的消息。在这种情况下，诸如 `log.fine()`、`log.finer()`\
    \ 等日志记录方法将不会打印任何消息。为了避免此问题，我们可以通过编程方式移除与当前 Java VM 实例的 `LogManager` 关联的任何处理器，并为日志记录器分配我们自己的\
    \ `Handler` 对象，并为其关联适当的日志级别。\n"
- fmt: '在`[Listing 2-5](#LiB0016.html#ch02ls05)`中，我们首先获取一个名为`sam.logging`的`Logger`实例。在构造函数中，我们通过调用`LogManager`类的`reset()`方法，移除所有与`LogManager`实例关联的预设`Handler`和`Formatter`对象。我们创建了一个`ConsoleHandler`实例，它默认将日志信息打印到`System.err`。我们将`Handler`和`Logger`对象的级别设置为最低级别`Level.FINEST`。


    |  | 注意 | 示例中展示了`reset()`方法的使用，以说明其功能。但必须记住，该方法具有重置整个日志框架的全局影响。若要禁用与特定日志记录器关联的根日志记录器或任何父日志记录器，最佳实践是使用`setUseParentHandlers(false)`方法。`LogManager`类的`reset()`方法在全局层面也能达到同样的效果，但使用此方法也会影响应用程序中任何其他希望使用父日志记录器的日志记录器。
    |


    经过这样的小调整，我们将能够看到所有打印到控制台的消息。请注意，基本级别的日志记录方法会自动确定源类名和源方法名。精确的日志记录方法会打印传递给日志记录方法的源类名和源方法名。尽管基本级别的日志记录方法能够确定源类名和源方法名，但这并不可靠。值得再次提及的是，编译器使用的多种优化技术可以完全移除堆栈跟踪，在这种情况下，日志记录器将无法识别源类和源方法，或者可能完全错误地识别。因此，建议在需要时显式指定源类和源方法名。


    执行`[Listing 2-5](#LiB0016.html#ch02ls05)`中的示例程序后，以下输出将打印到控制台：


    ```

    07-Oct-2002 19:06:04 sam.logging.LogMethods printBasicMethods

    INFO: THIS IS INFO LEVEL MESSAGE

    07-Oct-2002 19:06:04 sam.logging.LogMethods printBasicMethods

    SEVERE: OUR OWN LOGRECORD OBJECT

    07-Oct-2002 19:06:04 LogMethods printPreciseMethods

    INFO: PRECISE METHODS..

    07-Oct-2002 19:06:04 sam.logging.LogMethods printLevelMethods

    FINE: THIS IS A FINE LEVEL MESSAGE

    07-Oct-2002 19:06:04 sam.logging.LogMethods printLevelMethods

    FINER: THIS IS A FINER LEVEL MESSAGE

    07-Oct-2002 19:06:04 sam.logging.LogMethods printLevelMethods

    FINEST: THIS IS A FINEST LEVEL MESSAGE

    07-Oct-2002 19:06:04 sam.logging.LogMethods printLevelMethods

    CONFIG: THIS IS CONFIG LEVEL MESSAGE

    07-Oct-2002 19:06:04 LogMethods printMethod

    FINER: ENTRY

    07-Oct-2002 19:06:04 LogMethods printMethod

    FINER: RETURN

    ```


    看起来`Logger`对象本身似乎能够通过其便捷方法发布日志信息；但实际上，它是通过其关联的`Handler`对象来实现的，我们将在[下一节](#LiB0017.html#89)中讨论这些对象。


    `Logger`对象可以通过`addHandler()`方法与任意数量的首选`Handler`关联。如果未指定`Handler`，它将使用默认的`Handler`，根据JDK配置文件中指定的默认参数，该默认`Handler`是一个`ConsoleHandler`。需要注意的是，`Logger`不仅使用自己的`Handler`，还会使用其父日志记录器注册的任何`Handler`，并将`LogRecord`传递给父日志记录器。可以通过日志记录器的`setUseParentHandlers()`方法控制父日志记录器的使用。


    |  | 注意 | 在前面的示例中，我们没有禁用父日志记录器的使用。但是，通过对`LogManager`使用`reset()`方法，我们从父日志记录器（本例中为根日志记录器）中移除了所有关联的默认`Handler`对象。因此，日志信息不会在控制台中重复输出。有关父子日志记录器关系的更多详细信息，请参阅“[日志记录器关系示例](#LiB0016.html#ch02lev2sec2)”一节。
    |


    ## Handler


    `Handler`对象主要负责将日志信息发布到各种目标位置。它从`Logger`接收`LogRecord`对象，并将其发送到适当的目标位置。目标位置可以是文件、控制台、流等，具体取决于所使用的`Handler`类型。每个`Handler`对象都有其自身的默认日志记录级别设置，以及`Filter`和`Formatter`对象。日志记录`Level`、`Filter`和`Formatter`对象的默认值由`LogManager`通过读取配置文件获取的属性决定。每个`Handler`可能根据其类型具有不同的默认设置。


    在日志记录API中，根据日志信息的目标位置，定义了以下五类`Handler`对象：


    *   `java.util.logging.FileHandler`：将日志信息写入文件。

    *   `java.util.logging.ConsoleHandler`：将日志信息打印到控制台或命令行shell。

    *   `java.util.logging.StreamHandler`：将日志信息写入任何特定的流。

    *   `java.util.logging.MemoryHandler`：将日志信息写入内存缓冲区。

    *   `java.util.logging.SocketHandler`：使用TCP/IP将日志信息写入监听特定端口的服务器组件。


    上述所有类型的`Handler`对象都继承自一个名为`Handler`的`abstract`类。该类定义了用于发布封装在`LogRecord`对象中的日志信息、关闭和刷新`Handler`用于发布日志消息的任何流的`abstract`方法。任何`Logger`对象都会在内部调用其注册的`Handler`的重写方法`publish(LogRecord
    record)`来发布日志信息。重要的是要知道，所有`Handler`中的`publish()`方法都是同步的。这使得日志记录活动是线程安全的。我们也可以编写自己的自定义`Handler`对象；为此，我们必须从抽象类`Handler`扩展我们的`Handler`对象，并重写上述方法。我们将在[第4章](#LiB0026_split_000.html#166)中讨论如何开发自定义`Handler`。


    日志记录API中不同`Handler`对象之间的关系如[图2-3](#LiB0017.html#ch02fig03)中的UML类图所示。


    [![点击展开](fig2-3.jpg)](fig2-3_0.jpg)

    图2-3：Handler类层次结构'
  raw: "In [Listing 2-5](#LiB0016.html#ch02ls05), we first obtain a named `Logger`\
    \ instance, `sam.logging`. In the constructor, we remove all the preset `Handler`\
    \ and `Formatter` objects associated with the `LogManager` instance by calling\
    \ the `reset()` method of the `LogManager` class. We create an instance of the\
    \ `ConsoleHandler`, which by default prints the logging information to `System.err`.\
    \ We set the level of the `Handler` and the `Logger` objects to the lowest level,\
    \ Level.FINEST.\n\n|  | Note  | The use of the `reset()` method is shown in the\
    \ example to illustrate what it does. You have to remember it has the global effect\
    \ of resetting the whole logging framework. To disable the use of the root logger\
    \ or any parent logger associated with a particular logger, the best practice\
    \ is to use the `setUseParentHandlers(false)` method. The same effect is apparently\
    \ achieved by the `reset()` method of the `LogManager` class at a global level.\
    \ Using this method will also affect any other logger in the application willing\
    \ to use the parent logger. |\n\nWith this little arrangement, we will be able\
    \ to see all the messages being printed to the console. Note that the basic level\
    \ logging methods automatically determine the source class name and source method\
    \ name. The precise logging methods print the source class name and the source\
    \ method name as supplied to the logging methods. Although the basic level logging\
    \ methods are capable of determining the source class name and the source method\
    \ name, this is not reliable. It is worth mentioning again that several optimization\
    \ techniques used with compilers can completely remove stack traces, in which\
    \ case the logger will not be able to identify the source class and methods or\
    \ may do it completely wrong. Hence, it is advised to explicitly specify the source\
    \ class and source method names wherever needed.\n\nAfter executing the example\
    \ program in [Listing 2-5](#LiB0016.html#ch02ls05), the following output will\
    \ be printed to the console:\n\n```\n 07-Oct-2002 19:06:04 sam.logging.LogMethods\
    \ printBasicMethods\nINFO: THIS IS INFO LEVEL MESSAGE\n07-Oct-2002 19:06:04 sam.logging.LogMethods\
    \ printBasicMethods\nSEVERE: OUR OWN LOGRECORD OBJECT\n07-Oct-2002 19:06:04 LogMethods\
    \ printPreciseMethods\nINFO: PRECISE METHODS..\n07-Oct-2002 19:06:04 sam.logging.LogMethods\
    \ printLevelMethods\nFINE: THIS IS A FINE LEVEL MESSAGE\n07-Oct-2002 19:06:04\
    \ sam.logging.LogMethods printLevelMethods\nFINER: THIS IS A FINER LEVEL MESSAGE\n\
    07-Oct-2002 19:06:04 sam.logging.LogMethods printLevelMethods\nFINEST: THIS IS\
    \ A FINEST LEVEL MESSAGE\n07-Oct-2002 19:06:04 sam.logging.LogMethods printLevelMethods\n\
    CONFIG: THIS IS CONFIG LEVEL MESSAGE\n07-Oct-2002 19:06:04 LogMethods printMethod\n\
    FINER: ENTRY\n07-Oct-2002 19:06:04 LogMethods printMethod\nFINER: RETURN\n```\n\
    \nIt might seem that a `Logger` object itself is capable of publishing the logging\
    \ information with its convenience methods; but in reality, it does so through\
    \ its associated `Handler` objects, which we will look at in the [next section](#LiB0017.html#89).\n\
    \nThe `Logger` object can be associated with any number of preferred `Handler`\
    \ through the `addHandler()` method. If no `Handler` is specified, it uses its\
    \ default `Handler`, which is a `ConsoleHandler` according to the default parameters\
    \ specified in the JDK configuration file. It is important to note that a `Logger`\
    \ uses its own `Handler` as well as any `Handler` registered with its parent logger\
    \ and passes on the `LogRecord` to the parent. The use of the parent logger can\
    \ be controlled through the logger's `setUseParentHandlers()` method.\n\n|  |\
    \ Note  | In the previous example, we did not disable the use of the parent logger.\
    \ But by using the `reset()` method on the `LogManager`, we have removed all the\
    \ associated default `Handler` objects from the parent logger (the root logger,\
    \ in this case). Hence, the logging information is not duplicated in the console.\
    \ Refer back to the section \"[Logger Relationship Example](#LiB0016.html#ch02lev2sec2)\"\
    \ for more details on the parent-child logger relationship. |\n\n## Handler\n\n\
    The `Handler` object is mainly responsible for publishing logging information\
    \ to various destinations. It receives a `LogRecord` object from the `Logger`\
    \ and sends it to the appropriate destination. The destination can be a file,\
    \ console, stream, etc., depending on the type of handler being used. Each `Handler`\
    \ object has its own default setting for its level of logging, as well as `Filter`\
    \ and `Formatter` objects. The default values of the logging `Level`, `Filter`,\
    \ and `Formatter` objects are determined by using the `LogManager` properties\
    \ that the `LogManager` acquires by reading the configuration file. Each `Handler`\
    \ may have different default settings depending on its type.\n\nIn the logging\
    \ API, depending on the intended destination of the logging information, the following\
    \ five categories of `Handler` objects are defined:\n\n*   `java.util.logging.FileHandler`:\
    \ This writes the logging information to a file.\n\n*   `java.util.logging.ConsoleHandler`:\
    \ This prints the logging information to the console or the command line shell.\n\
    \n*   `java.util.logging.StreamHandler`: This writes the logging information to\
    \ any particular stream.\n\n*   `java.util.logging.MemoryHandler`: This writes\
    \ the logging information to a memory buffer.\n\n*   `java.util.logging.SocketHandler`:\
    \ This writes the logging information to a server component listening to a particular\
    \ port using TCP/IP.\n\nAll the preceding types of `Handler` objects basically\
    \ subclass an `abstract` class called `Handler`. This class defines `abstract`\
    \ methods for publishing the logging information encapsulated within a `LogRecord`\
    \ object and closing and flushing any stream being used by the `Handler` to publish\
    \ the logging messages. Any `Logger` object internally calls the overridden `publish(LogRecord\
    \ record)` method of its registered `Handler` to publish the logging information.\
    \ It is important to know that the `publish()` method in all `Handlers` is synchronized.\
    \ This makes the logging activity thread-safe. It is also possible to write our\
    \ own customized `Handler` object; to do so we have to extend our `Handler` object\
    \ from the abstract `Handler` class and override the preceding methods. We will\
    \ discuss how to develop a custom `Handler` in [Chapter 4](#LiB0026_split_000.html#166).\n\
    \nThe relationship of different `Handler` objects within the logging API is shown\
    \ in the UML class diagram in [Figure 2-3](#LiB0017.html#ch02fig03).\n\n[![Click\
    \ To expand](fig2-3.jpg)](fig2-3_0.jpg)\nFigure 2-3: The Handler class hierarchy"
