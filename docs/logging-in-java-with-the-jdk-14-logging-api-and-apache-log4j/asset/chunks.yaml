    \  <age>38</age>\n</employee>\n<employee>\n  <code>102</code>\n  <name>derek</name>\n\
    \  <dept>Sales</dept>\n  <age>43</age>\n</employee>\n</record>\n```\n\n| **![结束示例](img/_1.gif)**\
