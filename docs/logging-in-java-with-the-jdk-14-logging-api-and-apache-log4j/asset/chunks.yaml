  trans: "\n### RMIManager\n\n清单 4-11 `RMIManager.java` 是一个简单的实用工具，用于管理 `RemoteLoggingServer`\
    \ 和 `ServerComponent` 这两个远程服务。它可以根据传递给它的命令行参数是 \"start\" 还是 \"stop\"，通过将服务绑定到\
    \ `rmiregistry` 来启动服务，或通过从 `rmiregistry` 解绑来停止服务。\n\n清单 4-11: RMIManager.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.server;\n\nimport java.rmi.registry.*;\n\
