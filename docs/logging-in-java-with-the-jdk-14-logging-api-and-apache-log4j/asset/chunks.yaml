    \ object with size limit 1000 bytes\n        // and pushLevel as Level.SEVERE\n\
    \        MemoryHandlerDemo demo = new MemoryHandlerDemo(2, Level.SEVERE);\n  \
    \      demo.logMessage();\n    }\n}\n```\n\nThis program looks very simple. In\
    \ essence, we create a `MemoryHandler` object with 2 as the specified number of\
    \ `LogRecord` objects to be logged and the push level as `Level.SEVERE`. Within\
    \ the constructor we assign a `ConsoleHandler` object as the target `Handler`\
    \ object. Within the `logMessage()` method, we create two `LogRecord` objects,\
    \ `record1` and `record2`, with two different logging levels, `Level.SEVERE` and\
    \ `Level.WARNING`. We then attempt to publish the record objects.\n\nThe `MemoryHandler`\
    \ object will internally check the level of each record with the specified push\
    \ level. If the level of the record is greater or equal to the push level, then\
    \ the record is passed to the associated target `Handler` object (in this example,\
    \ the `ConsoleHandler` object). Upon execution of the preceding program, we will\
    \ only see the record with level `SEVERE` being printed to the console.\n\n```\n\
    31-Aug-2002 17:48:50 null\nSEVERE: This is SEVERE level message\n```\n\nIt all\
    \ looks so simple, but there is an order to the messaging that is important. If\
    \ we try reversing the order of the record object, then we will get the following\
    \ output:\n\n```\n31-Aug-2002 17:53:11 null\nWARNING: This is WARNING level message\n\
    31-Aug-2002 17:53:11 null\nSEVERE: This is SEVERE level message\n```\n\nThis is\
    \ no nasty surprise. What is important is the order of messaging. When we reverse\
    \ the order of publishing the record as:\n\n```\n//publishing the logging information\n\
    logger.log(record2);\nlogger.log(record1);\n```\n\n`record2` has a level of `Level.WARNING`\
    \ and `record1` has a level of `Level.SEVERE`. When `MemoryHandler` processes\
    \ the publishing request with `record2`, it finds the level is lower than the\
    \ push level (`Level.SEVERE`) and therefore decides not to pass it to the target\
    \ `Handler` object. But when it processes the publish request with the `record1`\
    \ object, it finds the level is equal to the push level and hence decides to pass\
    \ it to the target `Handler` object. At this point of time, it loops through an\
    \ internal storage of all the `LogRecord` objects that have issued a publish request\
    \ and passes all the `LogRecord` objects to the target `Handler`. The target `Handler`\
    \ object then prints all the records to the destination. This is the reason why\
    \ with the reversing of logging sequence both messages with level `WARNING` and\
    \ `SEVERE` appear in the console.\n\nOne last thing to discuss is the role of\
    \ the size parameter in the constructor of the `MemoryHandler` object. The size\
    \ parameter as discussed restricts the number of `LogRecord`s to be logged in\
    \ memory. In our previous example, we specify the number of log records to be\
    \ buffered as 2. When the triggering condition is reached, such as the level of\
    \ a log record being greater or equal to the push level of the `MemoryHandler`,\
    \ then the `MemoryHandler` tries to release all the previous log records within\
    \ the range of the specified size parameter. If we try to print the log record\
    \ in the following sequence:\n\n```\n//sequence that will discard one record according\
    \ to the size\nlogger.log(record2);\nlogger.log(record2);\nlogger.log(record1);\n\
    ```\n\nwe will see the following output:\n\n```\n31-Aug-2002 18:27:13 null\nWARNING:\
    \ This is WARNING level message\n31-Aug-2002 18:27:13 null\nSEVERE: This is SEVERE\
    \ level message\n```\n\nOnly one of the `record2` objects is printed along with\
    \ the `record3` object, as the size argument is specified as 2. If we change the\
    \ size parameter now to 3, we will see all the messages being printed."
