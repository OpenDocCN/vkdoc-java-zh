  trans: "\n## 高效记录日志信息\n\n记录什么以及如何记录？这些问题的答案决定了特定应用程序日志记录的有效性。请谨慎选择并制定策略，明确哪些信息用于调试，哪些信息用于日常维护。仔细决定在何处记录信息。还要决定日志消息的格式，以便将来其他应用程序能够处理和分析这些信息。\n\
    \n|  | 最佳实践 | 避免记录不必要的信息。这会使日志跟踪变得混乱，增加分析难度。 |\n\n冗余且不必要的日志信息会在性能和实用性方面影响应用程序。即使我们在已部署的应用程序中关闭了某个日志级别，日志框架仍需为每条日志消息执行额外的级别检查。这种针对包含冗余和不必要信息的日志请求进行的级别检查，会影响整体日志记录的性能。因此，最好避免在应用程序中包含此类日志请求。\n\
    \n|  | 最佳实践 | 避免在日志请求中使用参数构造。 |\n\n在开发自己的应用程序时，您可能认为已经避免了不必要的日志请求；然而，您可能仍然会遇到类似下面的日志请求：\n\
    \n```\nlogger.info(\"这是 \"+var1+\" 来自方法 \"+var2+\" 的日志\");\n```\n\n这里涉及的成本是参数构造。请使用简单的\
    \ Java 技术，例如使用 `StringBuffer` 来拼接 `String` 对象，避免使用 \"+\" 连接两个 `String` 对象。这只是一个例子。一个编码糟糕的应用程序可能包含多个此类语句。\n\
    \n|  | 最佳实践 | 在尝试记录日志之前，先检查日志是否已启用。 |\n\n假设我们有一个应用程序，它会记录客户订单列表中的所有条目（这几乎不可能！）。所有级别为\
    \ DEBUG 的信息都会被打印出来：\n\n```\nArrayList list;\nint length = list.size();\n\nfor(int\
    \ k=0;k<size;k++)\n{\n    logger.debug(\"客户: \"+ ( (Customer)list.get(k) ).toString()\
    \ );\n}\n```\n\n如果 DEBUG 级别被关闭了会发生什么？在 `for` 循环内部，参数构造仍然会发生，日志记录器会检查 DEBUG 级别是否启用，如果未启用，则会丢弃该请求。为了避免这种情况，我们可以这样写：\n\
    \n```\nif(logger.isDebugEnabled())\n{\n    //在此处执行 for 循环\n}\n```\n\n这将节省不必要的参数构造开销。另一方面，如果\
    \ DEBUG 级别已启用，则评估 DEBUG 级别是否启用可能会产生额外的开销。但与参数构造相比，这是一个微不足道的开销，因为它只占实际日志记录时间的 1%\
    \ 左右。\n\n## 本地化问题\n\n通过 `java.util.ResourceBundle` 对象实现日志信息的本地化，是一个以不同语言发布日志信息的优秀特性。然而，决定在\
    \ log4j 中使用本地化功能可能比较棘手。\n\n|  | 最佳实践 | 当您不使用本地化功能时，不要使用 `ResourceBundle` 对象。 |\n\
    \n构造和使用 `ResourceBundle` 对象的成本很高。如果您的应用程序目前只支持一种语言，请避免在代码中使用本地化。您将来随时可以启用此功能以支持不同的语言。\n\
    \n## 使用位置信息\n\nJDK 1.4 日志 API 和 log4j 都支持日志请求的位置信息。JDK 1.4 日志 API 尝试从堆栈跟踪中确定日志请求的类和方法的名称。log4j\
    \ API 则尝试检测发出日志请求的代码的确切行号。\n\n|  | 最佳实践 | 确定位置信息是一项成本高昂的操作。如果可能，最好在应用程序日志记录中避免使用它。\
    \ |\n\n动态生成位置信息并不可靠。它可能无法与许多使用优化技术的编译器正常工作。此外，日志框架需要遍历堆栈跟踪来确定位置信息，这会带来大量的额外开销。\n\
    \n## 格式化日志信息\n\n日志信息的格式化很重要。一方面，信息越多越好。另一方面，每一点信息都会消耗 CPU。我们需要仔细决定日志信息的格式。有多种选择。XML\
    \ 格式比简单的基于文本的输出成本更高，但 XML 格式的日志信息更具可重用性和可移植性。\n\nlog4j 中的 `PatternLayout` 对象在定义最终日志信息的元素和格式化指令方面提供了极大的灵活性。使用\
    \ `PatternLayout`，我们可以精确控制任何目标位置中日志信息的内容。对于基于 XML/HTML 的日志信息，我们需要使用单独的 `Layout`\
    \ 对象。`PatternLayout` 负责格式化日志信息的内容，不参与日志信息的呈现。\n\n日期是格式化时的主要关注点之一，因为它们很复杂且性能成本高昂。log4j\
    \ API 提供了多种日期格式化对象，例如 `DateLayout` 和 `ISO8601DateFormat`。在所有可用的日期格式中，`ISO8601DateFormat`\
    \ 是最便宜且最快的。\n\n## 使用渲染器对象\n\n在 log4j 中，`Renderer` 对象用于为传递给日志框架进行记录的任意 `Object`\
    \ 构建一个 `String` 表示形式。\n\n|  | 最佳实践 | `Renderer` 对象遵循类层次结构。任何超类 `Renderer` 都能够渲染其子类。\
    \ |\n\n例如，如果我们有一个 `VehicleRenderer` 对象，只要 `Car` 是 `Vehicle` 的子类，它就能渲染 `Car` 对象。\n\
    \n|  | 最佳实践 | 对于子类的专门化渲染，请注册一个特定于子类的 `Renderer`。在这种情况下，不会调用超类 `Renderer`。 |\n\n\
    例如，我们可以注册一个 `CarRenderer` 对象来渲染所有 `Car` 对象，在这种情况下，`VehicleRenderer` 将不会被用来渲染 `Car`\
    \ 对象。\n\n## 使用异步日志记录\n\nlog4j API 提供了 `AsyncAppender` 对象来执行异步日志记录。该对象将日志事件存储在一个有界缓冲区中，并在达到最大缓冲区大小时释放这些事件。JDK\
    \ 1.4 日志 API 也通过 `MemoryHandler` 对象提供了类似的功能。\n\n|  | 最佳实践 | `AsyncAppender` 和\
    \ `MemoryHandler` 并不总能提高性能。 |\n\n如果有界缓冲区很快被填满，那么管理有界缓冲区会产生额外的开销，从而降低性能。但是，在涉及长时间阻塞的网络或\
    \ I/O 访问，或者 CPU 密集型操作较少的情况下，使用 `AsyncAppender` 或 `MemoryHandler` 是非常有效的。\n"
- fmt: '# Using Filter Objects


    In the examples of `Filter` objects in our log4j discussion in [Chapter 5](#LiB0032_split_000.html#266),
    we have seen that they are useful for filtering a logging request against some
    application-specific criteria other than the level of logging. We have also seen
    how filter chaining makes it possible to check a logging request against multiple
    criteria.


    But filter chaining involves loading more than one `Filter` object and invoking
    the `decide()` method in each of them to filter the logging request. One alternative
    we demonstrated in [Chapter 8](#LiB0060_split_000.html#525) is to write a custom
    `Filter` object.


    |  | BEST PRACTICE | Try to do as much possible in one `Filter` object. |


    In situations where multiple custom `Filter` objects need to be created, try to
    design them in such a way that one `Filter` object can serve various common filtering
    purposes. No doubt, embedding various application logics within one `Filter` object
    makes it difficult to reuse and restricts it to a particular application scenario.
    Still, there may be situations in which this is worth considering.


    Imagine we are trying to log information to a file. We want to perform checks
    against whether the logging event was generated from a certain application and
    also if it has the necessary security privileges to do the file I/O. In theory,
    we can come up with two `Filter` objects: one for checking the origin of the application
    and the other for the permission checking. This way, we have two reusable `Filter`
    objects for event origin checking and file I/O permission checking, which is good.
    But if we are not writing generic logging components to be used by other applications,
    this might not be that necessary. Try to combine both checking processes within
    one `Filter` object. This will save the time it takes to load and invoke two `Filter`
    objects.


    In this author''s opinion, the design of `Filter` objects is specific to an application
    and often requires some patience and time to decide how to design the `Filter`
    objects. Sometimes, you might need to come up with generic `Filter` objects reusable
    by many other application components, and sometimes you will write `Filter` objects
    specific to one application area. You need to make a trade-off before you decide
    to write single or multiple `Filter` objects.


    # Using Nested Diagnostic Context


    The log4j API provides Nested Diagnostic Context (NDC) objects to populate the
    logging information with client-specific information. For example, server-based
    applications handling multiple clients (servlet is an example) often require that
    logging traces produced by different client activities be differentiated.


    |  | BEST PRACTICE | Use `NDC` in server-side components handling multiple clients
    to distinguish clients. |


    The whole idea of `NDC` is to include unique client-specific information. Take
    care in deciding which information to put in the `NDC` and its degree of uniqueness.


    # Configuration Issues


    The log4j API supports both properties-style and XML-style configuration files.
    There is also a programmatic way of configuring every log4j component. But programmatic
    configuration is impossible to change without modifying the source code. In order
    to benefit from the highly configurable nature of log4j, we must configure log4j
    via a configuration file.


    This applies to the JDK 1.4 logging API. Although the JDK 1.4 logging API is not
    as highly configurable as log4j, we still must adhere to configuring it via a
    configuration file. Currently, the JDK 1.4 logging API supports only the properties-style
    of configuration.


    Not all the components in log4j are configurable through the properties-style
    of configuration. So it is more often a good practice to use an XML-style configuration
    file.


    If you ever need to change the configuration while your system is up and running,
    you must implement the `configureAndWatch` options for the log4j configuration.
    This way you can change the configuration file without bringing the system down.
    The log4j framework will look for any configuration change in a certain specified
    time interval (default 60 seconds) and reinitialize the framework if the configuration
    has changed.


    The `ConfigureAndWatch` property can be used by calling


    ```

    PropertyConfigurator.configureAndWatch(props);

    ```


    or


    ```

    DOMConfigurator.configureAndWatch(configFileName);

    ```


    at the starting point of an application. The log4j framework will use the same
    configuration file to configure itself only with an extra facility that watches
    for any configuration change. This often proves quite useful when using log4j
    in server-based applications for situations where it may be difficult to bring
    the server down for every logging configuration change.


    # Comparing log4j and JDK 1.4 Logging API


    Perhaps you have noticed the startling similarities between the log4j and JDK
    1.4 logging implementations. They share the same basic components such as `Logger`,
    `Level`, `Appender`/`Handler`, `Layout`/`Formatter`. The two APIs also strongly
    resemble each other in their internal architecture. However, there are a few basic
    differences that are worth mentioning, some of which may be critical when choosing
    one logging API over the other. [Table 10-1](#LiB0086.html#ch10table01) summarizes
    the difference between these two logging APIs, and each point is discussed in
    more detail subsequently.


    **Table 10-1: Comparison Between the JDK 1.4 Logging API and Apache log4j**


    | Features | JDK 1.4 Logging API | Apache log4j |

    | --- | --- | --- |

    | Configuration | The JDK 1.4 logging API starts with a default configuration
    file supplied by JDK. In the JDK 1.4 logging API, the configuration order in a
    configuration file is sequential. The parent logger must be configured before
    the child logger. The JDK 1.4 logging API supports only properties-style configuration.
    | Apache log4j does not assume any default configuration. It looks for a `log4j.properties`
    or `log4j.xml` file in the classpath to initialize itself. In log4j, the order
    of configuration has no impact on the initialization. Apache log4j supports both
    properties- and XML-style configuration. |

    | Formatting of logging information | The JDK 1.4 logging API only renders logging
    information in text format or XML format. | Apache log4j supports a wide variety
    of output formats such as HTML, XML, text, etc. The content of the logging information
    can be controlled by specifying patterns. |

    | Output destination | The JDK 1.4 logging API only supports sockets, consoles,
    files, and memory buffers as output destinations. | Apache log4j supports a much
    wider variety of logging destinations including JMSs and databases, as well as
    protocols such as Telnet, SMTP, etc. |

    | Filtering | The JDK 1.4 logging API allows attaching filters to `Logger` and
    `Handler` objects. Filter chaining to filter against multiple criteria is not
    possible with the JDK 1.4 logging API. | Apache log4j attaches filters to `Appender`
    objects only. Apache log4j supports filter chaining. |

    | Location information | The JDK 1.4 logging API automatically tries to determine
    the location information for the logging request. There is no way to control this
    behavior. | In log4j, location information can be configured to be included in
    the logging information or not. |

    | Error handling | The JDK 1.4 logging API throws back any runtime exceptions
    to the caller application. This may cause the application to crash unless these
    exceptions are handled. | In log4j, errors are handled internally without throwing
    them back to the caller application. This makes the application and the logging
    function independent of each other. |'
