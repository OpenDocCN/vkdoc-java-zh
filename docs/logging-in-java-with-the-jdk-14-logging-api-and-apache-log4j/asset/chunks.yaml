    \ 连接，并将数据插入到数据库表中。\n*   它从作为命令行参数传递给 Java 运行时的配置文件中获取数据库配置参数。\n*   它获取远程日志服务器组件的引用，该组件负责接收日志信息并将其发布到指定的目标位置。\n\
    *   它还将客户端的日志信息发布到一个小型 Java 窗口中。\n\n清单 4-12: ClientComponent.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\n package com.apress.db;\n\nimport java.sql.*;\nimport java.util.Properties;\n\
