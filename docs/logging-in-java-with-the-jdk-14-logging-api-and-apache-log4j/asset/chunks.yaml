- fmt: '# Benefits of Logging


    Almost all projects in software development run on strict schedules. In this context,
    incorporating logging code in an application demands extra time and effort. Again,
    all software projects are aimed at success and producing a good end product. To
    meet such criteria, any application must implement some sort of logging methodology.
    The benefits offered by incorporating robust logging within an application makes
    it a worthwhile effort to plan ahead for this capability.


    In short, logging within an application can offer the following benefits:


    *   *Problem diagnosis:* No matter how well written our code is, there may be
    some problems hidden in it. As soon as the triggering conditions occur, the hidden
    problems come to the surface. If our applications have well-written code for logging
    the internal state of the system, we will be able to detect the problems precisely
    and quickly.

    *   *Quick debugging:* Once it is easy to diagnose the problem, we know exactly
    how to solve the problem. The logging trace should be aimed at precisely showing
    the location of the problem, which means we will be able to debug the application
    in less time. The overall cost of debugging the application is reduced greatly
    by well-planned and well-written logging code.

    *   *Easy maintenance:* Applications with a good logging feature are easy to debug
    and therefore easily maintainable compared to any application without a similar
    logging feature. The logging information typically contains more information than
    the debugging trace.

    *   *History:* A good logging feature in an application results in logging information
    being preserved in a structured way at a desired location. The location may be
    a file, database, or remote machine. All this enables system administrators to
    retrieve the logging information at a future date by going through the logging
    history.

    *   *Cost and time effective:* As explained, well-written logging code offers
    quick debugging, easy maintenance, and structured storage of an application''s
    runtime information. This makes the process of installation, day-to-day maintenance,
    and debugging much more cost and time effective.


    # Disadvantages of Logging


    In the [previous section](#LiB0006.html#28), we discussed the benefits of logging.
    In reality, these benefits do not come without a cost. Some of the disadvantages
    are inherent in the logging activity itself, and some may arise from improper
    use of logging. Whatever is the case, in general the following disadvantages can
    occur with any logging process:


    *   Logging adds runtime overhead due to the generation of logging information
    and the device I/O related to publishing logging information.

    *   Logging adds programming overhead due to the extra code required for producing
    logging information. The logging process increases the size of the code.

    *   Badly produced logging information can cause confusion.

    *   Badly written logging code can seriously affect the performance of the application.

    *   Last not but not the least, logging requires planning ahead, as adding logging
    code at a later stage of development is difficult.


    However, considering the benefits incurred and the disadvantages involved, logging
    is considered to be one of the essential elements of producing quality applications.
    Carefully planned and well-written logging code will often remove some of the
    demerits that can otherwise be prominent in poorly programmed logging code.


    # How Logging Works


    In the previous sections we discussed the process, benefits, and some of the disadvantages
    associated with logging. We all want to write an application with a well-designed
    logging feature. But the question is how to achieve an effective logging mechanism.


    You are probably acquainted with the most familiar Java syntax, `System.out.println()`,
    and similarly you might know in languages like C the famous `printf()`. These
    produce a piece of information that is printed to a console, and they represent
    the most primitive type of logging that can be embedded within an application.
    Such items will produce what we want in a nice and simple fashion. But they defeat
    the purpose of controlled logging in that there is no way we can turn off any
    of these statements.


    You might be wondering why you need to turn off logging statements when you plan
    and put so much effort into including them. A complex application may have complicated
    logging activities. One goal of logging may be to produce enough information about
    the internal state and functioning of the system. Another goal may be to produce
    enough detail so that in case of malfunction the problem can be detected and debugged
    quickly. On a good day, when an application is running without any problems, any
    debugging-related logging information appearing in the logging trace may prevent
    the logging information from being clean and easily understandable. So we need
    some mechanism to turn off the debug-related logging trace. On a not-so-good day,
    we may wish to turn on the debug-related logging to see exactly what is going
    wrong.


    The normal `System.out.println()` style of logging methodology is not capable
    of offering such flexibility, because it does not provide a way to modify the
    behavior of the static logging code. Even if we accept that we always want to
    see what we produce, the other problem is that it is very difficult to segregate
    logging messages into different levels of priority. Surely, messages related to
    a database operation problem are more crucial than messages related to the method
    entries and exits.


    In essence, a robust logging framework means that the messages should be categorized
    in terms of their severity. Also, we should be able to switch over to any severity
    level to see messages with that level of severity only. But this sort of flexibility
    should not mean changes to the source code. We need to achieve this flexibility
    via some configuration parameters. Thus, a good logging system needs to be highly
    configurable.


    It is also very important that we should be able to redirect logging information
    to a chosen destination such as a database, file, etc., so that we can reuse that
    information. Console-based logging activity is pretty much limited, as it is volatile.
    A robust logging framework should offer flexibility in terms of the logging destination
    and formatting of the messages.


    While it is true that a good logging API will provide a flexible, robust, and
    feature-rich logging environment, it also demands appropriate and efficient use
    of all these logging features. In this book, after we examine basic logging techniques
    with the JDK 1.4 logging API and Apache log4j, we will focus on the best practices
    involved in using these logging APIs in [Chapter 10](#LiB0074_split_000.html#672).


    From the architectural point of view, software application modules and logging
    components reside in two separate layers. The application makes a call to the
    logging components in the logging layer and delegates the logging responsibility
    to those components. The logging components receive the logging request and publish
    the logging information at preferred destinations. [Figure 1-1](#LiB0008.html#ch01fig01)
    represents the collaboration of a software module and its logging components.


    [![Click To expand](fig1-1.jpg)](fig1-1_0.jpg)

    Figure 1-1: The application logging process


    As shown in the diagram, the logging components have the freedom to publish logging
    information to any destination of choice such as a file, console, database, or
    remote location. The logging components can in turn make use of any other available
    technologies to achieve localized and distributed logging.'
