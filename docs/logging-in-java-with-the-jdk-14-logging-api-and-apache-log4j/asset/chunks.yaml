    为了进一步说明，假设你正在编写一个自定义的附加器（appender）。你希望该附加器在每次日志输出时都包含公司信息头，并且希望日志信息以 XML 格式发布。在这种情况下，你需要在自定义附加器中重写
    `doAppend()` 方法，将日志信息写入 XML 文件。同时，你可以包含一个包含公司信息的标准头部，并仍然使用现有的 `XMLLayout` 对象，以其自身的风格格式化日志信息。然后，你可以在整个
    XML 文件中，将 `XMLLayout` 对象生成的文件引用为外部 `ENTITY`。显然，你实现了将 `XMLLayout` 对象生成的 XML 日志信息作为任何其他
    XML 内容的 `ELEMENT` 包含进来的灵活性。


    ### PatternLayout 对象


    格式化任何信息片段意味着赋予它一种能被某些外部实体理解和识别的模式。通过为日志信息提供一种模式，该信息将被人类或程序识别。模式进一步意味着，如果产生日志信息的模块和接收信息的模块事先就某种模式达成一致，那么该信息就可以被处理。这就是
    `PatternLayout` 发挥作用的地方。


    `org.apache.log4j.PatternLayout` 扩展了基础的 `abstract` 类 `Layout`，并重写了 `format()`
    方法，以根据提供的模式来结构化日志信息。我们可以通过配置文件或编程方式提供该模式。`PatternLayout` 对象具有表 6-9 中列出的 bean 属性。


    表 6-9：PatternLayout 中的 Bean 属性


    | Bean 属性 | 方法 | 描述 | 默认值 |

    | --- | --- | --- | --- |

    | `conversionPattern` | `setConversionPattern()` | 设置转换模式 | 默认为 `%r [%t] %p %c
    %x - %m%n` |


    `PatternLayout` 可以在最终消息中包含 `LoggingEvent` 对象中的所有信息。它可以处理的项目列表见表 6-10。注意，`java.lang.Throwable`
    实例是例外情况。


    表 6-10：PatternLayout 的转换字符


    | 转换字符 | 含义 |

    | --- | --- |

    | `c` | 用于调用此日志请求的 `Logger`。它可以选择性地接受一个精度说明符。例如，在我们的示例中，Logger 名称是 `com.apress.logging.log4`。使用精度说明符
    `c{2}`，logger 将被打印为 "logging.log4j"。注意，最终输出中只包含从右侧算起的相应数量的元素。 |

    | `C` | 调用此日志请求的 `Logger` 的完全限定名称。它也可以接受如转换字符 `c` 所述的精度说明符。生成 logger 的完全限定名称可能非常慢。
    |

    | `d` | 日志请求的日期。它也可以接受一个可选的日期说明符。例如，`%d{yyyy-MM-dd}` 将以年-月-日格式打印日期。如果未指定日期格式，则使用
    log4j 内部定义的 ISO8601 格式。由于 `java.text.SimpleDateFormat` 的性能较差，为了获得更好的结果，请使用 log4j
    API 提供的 `DateFormat` 对象。 |

    | `F` | 发出日志请求的文件名。 |

    | `l` | 位置信息。在处理任何异常堆栈跟踪时，此信息非常有用。但是，使用 log4j 生成此信息可能非常慢。在使用此功能之前需要权衡利弊。 |

    | `L` | 发出日志请求的程序文件中的行号。 |

    | `m` | 日志消息。 |

    | `M` | 发出日志请求的程序中的方法。 |

    | `n` | 平台相关的行分隔符。 |

    | `p` | 与日志请求关联的级别。 |

    | `r` | 相对日期格式，显示从应用程序启动到发出此日志请求所经过的毫秒数。 |

    | `t` | 调用线程。 |

    | `x` | `NDC` 信息。 |

    | `X` | `MDC` 信息。`X` 转换字符后跟 `MDC` 的键。例如，`X{clientIP}` 将打印存储在 `MDC` 中键为 `clientIP`
    的信息。 |

    | `%` | 字面百分号。`%%` 将打印一个 % 符号。 |


    `PatternLayout` 根据给定的模式格式化日志信息。提供的模式主要规定了以下项目：


    *   格式化信息由*格式修饰符*决定。

    *   要显示的信息由*转换字符*决定。


    表 6-10 显示了所有可与 `PatternLayout` 一起使用的转换字符。


    与 `PatternLayout` 一起使用的格式修饰符在表 6-11 中描述。


    表 6-11：PatternLayout 中使用的格式修饰符


    | 修饰符 | 左对齐 | 最小宽度 | 最大宽度 | 含义 |

    | --- | --- | --- | --- | --- |

    | `%10c` | 否 | 10 个字符 | 无 | 显示 logger 名称。如果名称少于 10 个字符，则在左侧填充空格。 |

    | `%-10c` | 是 | 10 个字符 | 无 | 显示 logger 名称。如果名称少于 10 个字符，则在右侧填充空格。 |

    | `%.20c` | 否 | 无 | 20 个字符 | 显示 logger 名称。如果名称超过 20 个字符，则从开头截断。 |

    | `%20.30c` | 否 | 20 个字符 | 30 个字符 | 显示 logger 名称。如果名称小于最小宽度（20 个字符），则在左侧填充空格；如果名称超过
    30 个字符，则从开头截断。 |

    | `%-20.30c` | 是 | 20 个字符 | 30 个字符 | 显示 logger 名称。如果名称短于 20 个字符，则在右侧填充空格以保持左对齐。如果名称长于
    30 个字符，则从开头截断。 |


    为了说明转换模式的能力，让我们尝试使用 `LayoutDemo.java`（清单 6-1）并向其传递以下配置文件。该配置将指定 `PatternLayout`
    作为与 `ConsoleAppender` 一起使用的 `Layout` 对象，并且我们将向 `PatternLayout` 传递一个适当的转换模式。


    ```

    #配置自定义 logger

    log4j.logger.com.apress.logging.log4j=DEBUG, CONSOLE


    log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender


    log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout

    log4j.appender.CONSOLE.layout.ConversionPattern=%d{yyyy-MM-dd}-%t-%x-%-5p-%-

    10c:%m%n

    ```


    使用此配置文件执行程序将向控制台产生以下输出：


    ```

    2002-10-20-main-22.0-INFO -com.apress.logging.log4j:The sqrt value:

    4.69041575982343

    2002-10-20-main-44.0-INFO -com.apress.logging.log4j:The sqrt value:

    6.6332495807108

    ```


    既然你已经理解了转换模式，你应该能够看出转换模式 `%r [%t] %p %c %x - %m%n` 实际上就是 `TTCCLayout`。


    ## 结论


    在本章中，我们详细讨论了每个 `Layout` 对象的行为方式，以及如何通过配置文件配置这些对象。log4j API 提供了一套全面的 `Layout` 对象，足以满足大多数应用程序的需求。如果你的应用程序需要更复杂的
    `Layout` 对象，则需要自己创建一个。我们将在第 8 章中了解如何编写一个新的 `Layout` 对象。在下一章中，我们将继续讨论 log4j，探讨如何在分布式计算领域交付日志信息。


    # 第 7 章：使用 log4j 进行高级日志记录

