- fmt: "Now that we have seen the log4j core components, it is time to briefly discuss\
    \ how they interact with each other. The central part of the log4j framework is\
    \ the `Logger` object. An application instantiates a named `Logger` instance and\
    \ passes different logging information to it. A `Logger` object has a designated\
    \ `Level` object associated with it. The `Logger` object provides several logging\
    \ methods that are capable of logging information categorized into different levels.\n\
    \nA `Logger` only logs the messages with `Level`s equal to or greater than its\
    \ assigned `Level` or else rejects the logging request. Once the `Level` condition\
    \ has been met, the `Logger` object passes the logging information to all its\
    \ associated `Appender` objects and also to all the `Appender` objects associated\
    \ to its parent `Logger`, recursively up the logging hierarchy.\n\nSimilar to\
    \ `Logger` objects, `Appender` objects can also have threshold `Level`s attached\
    \ to them. The logging information is validated against the threshold `Level`\
    \ attached to the `Appender`. If the log message has a `Level` equal to or greater\
    \ than the threshold `Level`, the logging message is passed to the next stage.\
    \ The `Appender` objects then look for any `Filter` object associated with them.\
    \ If there are any, the logging information is passed through all the `Filter`\
    \ objects in a chain. Once a message is approved by all the `Filter` objects,\
    \ the `Appender` then utilizes any `Layout` object associated with it to format\
    \ the message, and finally it publishes the logging information to the preferred\
    \ destination. [Figure 5-1](#LiB0034.html#ch05fig01) depicts the overall flow\
    \ of the log4j logging architecture in a UML sequence diagram.\n\n[![Click To\
    \ expand](fig5-1.jpg)](fig5-1_0.jpg)\nFigure 5-1: Overview of the log4j framework\n\
    \nIf you have gone through the JDK 1.4 logging API discussion in [Chapters 2](#LiB0012_split_000.html#44)\
    \ through [4](#LiB0026_split_000.html#166), you might be wondering about the similarities\
    \ and the differences between these two logging APIs. On the surface, the architecture\
    \ of both APIs look strikingly similar. However, subtle but vital differences\
    \ exist between these two APIS, which we will discuss in [Chapter 10](#LiB0074_split_000.html#672).\n\
    \n## Configuring log4j\n\nBefore we can use log4j in an application, we need to\
    \ configure log4j in an application-specific manner. Configuring log4j typically\
    \ involves assigning `Level`, defining `Appender`, and specifying `Layout` objects.\
    \ The configuration information is conventionally defined within a properties\
    \ file in a key-value pattern. It is also possible to define the log4j configuration\
    \ in an XML format, which we will discuss later in this section. By default, the\
    \ `LogManager` class will look for a file named `log4j.properties` in the classpath\
    \ used for loading the log4j classes.\n\nUsing an external configuration file\
    \ as a means to control logging behavior is a particularly useful feature, because\
    \ it requires no source code change to switch to a completely different logging\
    \ scheme.\n\n[Listing 5-1](#LiB0035.html#ch05ls01) shows a simple log4j configuration.\
    \ It defines the level and appender for the root logger.\n\nListing 5-1: Example\
    \ log4j Configuration File\n\n```\n#set the level of the root logger to DEBUG\
    \ and set its appender\nas an appender named X\nlog4j.rootLogger = DEBUG, X\n\n\
    #set the appender named X to be a console appender\nlog4j.appender.X=org.apache.log4j.ConsoleAppender\n\
    \n#set the layout for the appender X\nlog4j.appender.X.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.X.layout.conversionPattern=%m%n\n```\n\nThe preceding configuration\
    \ defines the level of the root logger as DEBUG and specifies the appender to\
    \ use as `X`. Next, we define the appender `X` as referencing the `org.apache.log4j.ConsoleAppender`\
    \ object and specify the layout of the appender as `org.apache.log4j.PatternLayout`.\
    \ A `PatternLayout` also requires a conversion pattern or a format to be supplied.\
    \ We supply the conversion pattern `%m%n` in this case, which means the logging\
    \ message will be printed followed by a newline character. It is possible to define\
    \ much more complicated and descriptive conversion patterns, which we will discuss\
    \ in detail in [Chapter 6](#LiB0047_split_000.html#389).\n\n> **Note:** Within\
    \ the conversion pattern, `%m` represents the message string and `%n` represents\
    \ a newline character. We will learn more about these conversion patterns in [Chapter\
    \ 6](#LiB0047_split_000.html#389).\n\nA more complex configuration can attach\
    \ multiple appenders to a particular logger. Each appender in turn can have a\
    \ different layout, and that layout can have a conversion pattern associated with\
    \ it. [Listing 5-2](#LiB0035.html#ch05ls02) is an example of a more complex configuration\
    \ file.\n\nListing 5-2: Complex log4j Configuration File\n\n```\n# define the\
    \ root logger with two appenders writing to console and file\nlog4j.rootLogger\
    \ = DEBUG, CONSOLE, FILE\n\n#define your own logger named com.foo\nlog4j.logger.com.foo=com.foo.MyLogger\n\
    #assign appender to your own logger\nlog4j.logger.com.foo.appender=FILE\n\n#define\
    \ the appender named\nFILE log4j.appender.FILE=org.apache.log4j.FileAppender\n\
    log4j.appender.FILE.File=${user.home}/log.out\n\n#define the appender named CONSOLE\n\
    log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\nlog4j.appender.CONSOLE.conversionPattern=%m%n\n\
    ```\n\nThis configuration file defines the root logger as having level DEBUG and\
    \ attaches two appenders named `CONSOLE` and `FILE` to it. We define one of our\
    \ own custom loggers with the name `com.foo` and define the Java class file representing\
    \ the custom logger. We then attach an appender named `FILE` to the custom logger.\
    \ The appender `FILE` is defined as `org.apache.log4j.FileAppender`. The `FILE`\
    \ appender writes to a file named `log.out` located in the `user.home` system\
    \ path. It is important to note that log4j supports UNIX-style variable substitution\
    \ such as `${variableName}`. The variable name defined is considered the key and\
    \ first searched in the system properties. If not found, the log4j framework then\
    \ looks for the value for the variable in the properties file being parsed. The\
    \ `CONSOLE` appender is then assigned to the `org.apache.log4j.ConsoleAppender`\
    \ and the conversion pattern defined is `%m%n`, which means the printed logging\
    \ message will be followed by a newline character.\n\n### XML-Style Configuration\n\
    \nWith log4j, it is also possible to define configuration parameters in an XML\
    \ file and pass that file to the application at startup to configure different\
    \ logging components. The XML configuration follows a document type definition\
    \ (DTD) named `log4j.dtd`. The configuration parameters and values are described\
    \ in tag formats. For example, the configuration information listed in [Listing\
    \ 5-1](#LiB0035.html#ch05ls01) can be defined in XML format as follows:\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<!DOCTYPE log4j:configuration SYSTEM\
    \ \"log4j.dtd\">\n<log4j:configuration>\n  <root>\n    <priority value =\"debug\"\
    \ />\n    <appender-ref ref=\"X\"/>\n  </root>\n  <appender name=\"X\" class=\"\
    org.apache.log4j.ConsoleAppender\">\n    <param name=\"conversionPattern\" value=\"\
    %m%n\"/>\n  </appender>\n</log4j:configuration>\n```\n\nBoth the XML-style configuration\
    \ and properties-style configuration are quite effective in configuring log4j.\
    \ Both are flexible and good styles of configuration. However, it seems that a\
    \ few components in log4j such as `Filter`, `AsyncAppender`, etc., can only be\
    \ configured through XML-style configuration. It seems that log4j is evolving\
    \ from properties-style configuration towards XML-style configuration, and gradually\
    \ it will embrace XML-style configuration as the standard. For the time being,\
    \ we need to master both of these configuration styles."
