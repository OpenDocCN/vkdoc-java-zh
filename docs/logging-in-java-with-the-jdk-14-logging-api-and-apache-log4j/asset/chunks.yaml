  trans: "\n### 使用 SelectedLevelFilter\n\n我们已经了解了 `LevelRangeFilter` 如何帮助我们为日志级别设置上下限。在另一种场景下，我们可能希望有一个\
    \ `Filter` 只允许指定级别的消息出现在目标位置。这比指定一个级别范围更加精确。例如，在某个场景中，我们可能只想打印级别为 FATAL 和 INFO\
    \ 的消息。一个直接的解决方案是编写一个自定义的 `Filter` 对象来处理这种情况。\n\n现在，我们将探索一个示例 `Filter` 对象，它旨在根据特定级别过滤消息。`SelectedLevelFilter`\
    \ 类继承了 `abstract` 类 `org.apache.log4j.spi.Filter`，并实现了 `abstract` 方法 `decide(LoggingEvent\
    \ event)` 来判断某个日志事件。\n\n`SelectedLevelFilter` 定义了两个可配置的 bean 属性：`acceptOnMatch`\
    \ 和 `levelsToMatch`。`acceptOnMatch` 属性定义了当找到匹配条件时，过滤器是否应接受此请求。如果 `acceptOnMatch`\
    \ 设置为 `true`，`SelectedLevelFilter` 在找到级别匹配时返回 Filter.ACCEPT，否则返回 Filter.NEUTRAL。如果未找到匹配，则返回\
    \ Filter.DENY。`levelsToMatch` 属性接受一个以逗号分隔的字符串，表示我们想要匹配的级别。例如，如果我们想查找级别为 DEBUG\
    \ 和 FATAL 的消息，我们会将 `levelsToMatch` 定义为 \"DEBUG, FATAL\"。这里的顺序无关紧要。\n\n在初始化时，`SelectedLevelFilter`\
    \ 对象会将 `levelsToMatch` 参数中指定的所有级别存储在一个内部的 `java.util.ArrayList` 对象中。当日志事件到达时，它会将其级别与\
    \ `levelsToMatch` 中指定的所有级别进行比较。然后，`SelectedLevelFilter` 根据比较结果和 `acceptOnMatch`\
    \ 的值返回一个适当的返回值——Filter.ACCEPT、Filter.DENY 或 Filter.NEUTRAL。\n\n清单 8-20 `SelectedLevelFilter.java`\
    \ 展示了本节讨论的自定义 `Filter` 对象的示例实现。\n\n清单 8-20: SelectedLevelFilter.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.spi.Filter;\n\
    import org.apache.log4j.spi.LoggingEvent;\nimport org.apache.log4j.Level;\nimport\
    \ org.apache.log4j.helpers.OptionConverter;\nimport java.util.ArrayList;\nimport\
    \ java.util.Iterator;\nimport java.util.StringTokenizer;\n\npublic class SelectedLevelFilter\
    \ extends Filter {\n    private ArrayList levels = new ArrayList();\n    private\
    \ boolean acceptOnMatch;\n    private String levelsToMatch;\n\npublic SelectedLevelFilter()\
    \ {\n    }\n\npublic int decide(LoggingEvent event)\n    {\n        if(levels.size()\
    \ == 0)\n        {\n            return Filter.NEUTRAL;\n        }\n        Level\
    \ eventLevel = event.getLevel();\n        Iterator iterator = levels.iterator();\n\
    \        boolean matchFound = false;\n\nwhile(iterator.hasNext())\n        {\n\
    \            Level level = (Level)iterator.next();\n            if(level.equals(eventLevel))\n\
    \            {\n                matchFound = true;\n                break;\n \
    \           }\n        }\n        if(matchFound)\n        {\n            if(acceptOnMatch)\n\
    \            {\n                return Filter.ACCEPT;\n            }else\n   \
    \         {\n                return Filter.NEUTRAL;\n            }\n        }else\n\
    \        {\n            return Filter.DENY;\n        }\n    }\n\npublic boolean\
    \ getAcceptOnMatch() {\n        return this.acceptOnMatch;\n    }\n\npublic void\
    \ setAcceptOnMatch(boolean acceptOnMatch) {\n        this.acceptOnMatch = acceptOnMatch;\n\
    \    }\n\npublic String getLevelsToMatch() {\n        return this.levelsToMatch;\n\
    \    }\n\npublic void setLevelsToMatch(String levelsToMatch) {\n        this.levelsToMatch\
    \ = levelsToMatch;\n        if(levelsToMatch !=null)\n        {\n            StringTokenizer\
    \ tokenizer = new StringTokenizer(levelsToMatch,\n\",\");\n            while(tokenizer.hasMoreTokens())\n\
    \            {\n                String token = tokenizer.nextToken().trim();\n\
    \                Level level = OptionConverter.toLevel(token, null);\n       \
    \         levels.add(level);\n            }\n        }\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n让我们复用清单 8-19 中的程序 `FilterDemo.java` 来演示 `SelectedLevelFilter` 的应用。由于\
    \ `Filter` 对象只能通过 XML 配置文件进行配置，我们也将复用清单 8-18 中显示的配置文件 \"customFilter.xml\"。对 XML\
    \ 文件中的 `<filter>` 属性进行以下更改，以将 `SelectedLevelFilter` 指定为所定义日志记录器的指定过滤器：\n\n```\n\
    <filter class=\"com.apress.logging.log4j.SelectedLevelFilter\">\n    <param name=\"\
    LevelsToMatch\" value=\"FATAL, INFO\"/>\n    <param name=\"acceptOnMatch\" value=\"\
    true\"/>\n</filter>\n```\n\n在 `levelsToMatch` 属性中，我们将级别 FATAL 和 INFO 指定为要发布消息的所需级别。现在使用更改后的配置文件执行\
    \ `FilterDemo` 程序。只有级别为 FATAL 和 INFO 的消息才会打印到控制台。\n\n```\nmain INFO logging.log4j\
    \ - INFO MESSAGE..\nmain FATAL logging.log4j - FATAL MESSAGE…\n```\n\n### 过滤器链\n\
    \nApache log4j API 提供了许多针对不同目的的 `Filter` 对象。正如我们所见，如果某个特定的 `Filter` 对象返回 Filter.NEUTRAL\
    \ 值，则会考虑链中的下一个过滤器。这被称为过滤器链。通过将多个 `Filter` 对象链接起来，我们可以针对多个过滤条件比较特定的日志请求。有时，这可以作为编写自定义\
    \ `Filter` 对象的替代方案，以组合不同 `Filter` 对象提供的功能。例如，之前仅过滤级别为 INFO 和 FATAL 的消息的示例，可以通过链接两个\
    \ `LevelMatchFilter` 实例来实现。让我们看看当我们将 XML 配置文件更改为用以下条目替换 `SelectedLevelFilter`\
    \ 时会发生什么：\n\n```\n<filter class=\"org.apache.log4j.varia.LevelMatchFilter\">\n\
    \    <param name=\"levelToMatch\" value=\"FATAL\"/>\n    <param name=\"acceptOnMatch\"\
    \ value=\"true\"/>\n</filter>\n<filter class=\"org.apache.log4j.varia.LevelMatchFilter\"\
    >\n    <param name=\"levelToMatch\" value=\"INFO\"/>\n    <param name=\"acceptOnMatch\"\
    \ value=\"true\"/>\n</filter>\n<filter class=\"org.apache.log4j.varia.DenyAllFilter\"\
    />\n```\n\n`LevelMatchFilter` 有两个配置属性：`levelToMatch` 和 `acceptOnMatch`。我们使用两个\
    \ `LevelMatchFilter` 实例来仅过滤级别为 FATAL 和 INFO 的消息。链中最后一个过滤器是最重要的条目。`DenyAllFilter`\
    \ 用于拒绝所有之前由链中其他附加器处理并返回 Filter.NEUTRAL 值的日志请求。如果 `acceptOnMatch` 属性设置为 `true`，`LevelMatchFilter`\
    \ 对象在未找到匹配时返回 Filter.NEUTRAL。如果找到匹配，则返回 Filter.ACCEPT，并且日志事件被记录。所有不匹配的日志事件最终都会到达\
    \ `DenyAllFilter`，它会消耗所有这些不匹配的事件而不打印它们。\n\n类似地，我们可以使用 `org.apache.log4j.varia.StringMatchFilter`\
    \ 对象来记录仅包含 \"Hello\" 或 \"World\" 的消息。不要忘记在链的末尾添加 `DenyAllFilter`，以忽略所有其他不匹配条件的消息。\n"
- fmt: "# Error Handling\n\nHowever robust an application's code is, it is virtually\
    \ impossible to predict and handle all potential error conditions. A good system\
    \ is weighed against its resilience and how efficiently an error condition is\
    \ handled. So far we have seen how to log information about the internal state\
    \ of the running instance of an application. We have seen with `log4j` that logging\
    \ information can be sent out to various destinations locally or over a network.\
    \ There is every chance that these operations may generate some erroneous conditions\
    \ in their process of publishing logging information.\n\nThe question is what\
    \ should happen when one of the logging components encounters some problem. Here\
    \ are some suggestions:\n\n- The primary application itself should not crash just\
    \ because there is some problem with the logging activity.\n- In Java terms, this\
    \ means that the logging component should handle errors internally without throwing\
    \ the errors or exceptions back to the caller application. This saves the caller\
    \ application from having to worry about the logging components.\n- The logging\
    \ components should allow flexibility in what the application developer might\
    \ want to do in such error conditions.\n\nApache `log4j` is a resilient logging\
    \ framework. It takes care of all the aspects involving erroneous logging conditions\
    \ we discussed earlier. By default, the `log4j` `Appender` objects use the `OnlyOnceErrorHandler`\
    \ object, which outputs an error message once and only once to `System.err` and\
    \ ignores the subsequent error messages. This is graceful error handling in that\
    \ it does not cause the main application to crash, and the administrator can see\
    \ the error message produced and try to fix the problem in time.\n\n[Figure 8-4](#LiB0065.html#ch08fig04)\
    \ presents the different error handling objects within `log4j` and their relationships.\
    \ Note that all the error-handling objects implement a common interface, `org.apache.log4j.spi.ErrorHandler`.\
    \ This interface defines the error handling methods that are subsequently implemented\
    \ in the specific error-handling objects.\n\n[![Click To expand](fig8-4.jpg)](fig8-4_0.jpg)\n\
    Figure 8-4: The ErrorHandler class diagram\n\nThe `ErrorHandler` interface also\
    \ defines a couple of other methods in addition to the error handling methods.\
    \ These methods are shown in [Table 8-2](#LiB0065.html#ch08table02).\n\nTable\
    \ 8-2: Methods in the ErrorHandler Interface\n\n| Method | Description |\n| ---\
    \ | --- |\n| `error(String)` | Handles the error by publishing the message passed\
    \ to it |\n| `error(String, Exception, int)` | Handles the error by publishing\
    \ the error information, including the Java exception being thrown and the integer\
    \ error code describing the problem |\n| `error(String, Exception, int, LoggingEvent)`\
    \ | Handles the error by publishing the error message, the exception, the integer\
    \ error code, and the logging event that generated the error |\n| `setLogger(Logger)`\
    \ | Sets the reference of the logger to which the failing appender might be attached\
    \ |\n| `setAppender(Appender)` | Sets the appender for which the error is handled\
    \ |\n| `setBackupAppender(Appender)` | Sets the backup appender to fall back to\
    \ in case the primary appender fails |\n\nApache `log4j` by default provides two\
    \ error handling objects:\n\n- `org.apache.log4j.helpers.OnlyOnceErrorHandler`:\
    \ This is the default error handler used within `log4j` `Appender` objects. It\
    \ prints the error message from the appender once and only once to `System.err`\
    \ and ignores subsequent error messages.\n- `org.apache.log4j.varia.FallbackErrorHandler`:\
    \ This error handler also prints error messages to `System.err`. In addition,\
    \ it can configure a secondary appender to be the backup appender for all the\
    \ loggers that use this appender. This in essence means that when the first error\
    \ arrives, it iterates through all the logger references associated with the primary\
    \ appender defined as a part of the `FallbackErrorHandler` configuration. For\
    \ each of the `Logger` objects found, it removes their primary appenders and sets\
    \ the backup appender as the primary appender. This ensures for the loggers that\
    \ subsequent logging requests will now be directed to the backup appender. This\
    \ also ensures that no further error conditions arise due to the appender operation.\n\
    \nWhen it comes to your own applications, you won't be happy all the time with\
    \ the default `log4j` error handling. For example, you might not be happy about\
    \ producing error messages to a console, when you really want to redirect all\
    \ logging events to use a different appender to send information to a secondary\
    \ destination. Say you are using `JDBCAppender` to log information to a database,\
    \ and the database goes down while your application is still running. What do\
    \ you want to do now? You may want to log the error report and then continue logging\
    \ information in a file instead. How to achieve this? You can write your own custom\
    \ error handler to do the job and configure `log4j` to use your custom error handler.\n\
    \n## ErrorCode Interface\n\nTo identify errors in a systematic way, `log4j` allocates\
    \ error codes to different types of errors. These are encapsulated within the\
    \ `ErrorCode` interface. The error codes are used within an `Appender` object\
    \ to pass generated errors to the appropriate `ErrorHandler` class attached to\
    \ the `Appender`. We can extend this interface to define our own error codes in\
    \ case we need them.\n\n## Writing a Custom ErrorHandler\n\nLet's write a custom\
    \ error handler object. We want this custom error handler to achieve the following:\n\
    \n- The error handler must implement the `ErrorHandler` interface.\n- The error\
    \ handler must be given a logger reference.\n- The error handler must be given\
    \ an appender reference.\n- The appender reference identifies the backup appender\
    \ that will handle the error condition. The logger reference identifies the logger\
    \ to which the specified `Appender` is attached.\n- The error handler will keep\
    \ a reference to all the loggers specified as having the primary `Appender` object\
    \ associated with them.\n- In the error condition, the error handler will remove\
    \ the primary appender from the loggers specified and set the backup appender\
    \ object to be the primary appender thereafter.\n\n[Listing 8-21](#LiB0065.html#ch08ls21),\
    \ `CustomErrorHandler.java`, is designed to do the jobs iterated in the previous\
    \ points. This is a very simple error handler. The implementation of `error(message,\
    \ exception, errorCode, LoggingEvent)` is the method to do the bulk of the work.\n\
    \nListing 8-21: CustomErrorHandler.java\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.spi.ErrorHandler;\nimport org.apache.log4j.spi.LoggingEvent;\n\
    import org.apache.log4j.Logger;\nimport org.apache.log4j.Appender;\n\nimport java.util.Vector;\n\
    \npublic class CustomErrorHandler implements ErrorHandler\n{\n    private Appender\
    \ primary;\n    private Appender backup;\n    private Vector loggers = new Vector();\n\
    \n    public CustomErrorHandler()\n    {\n\n    }\n\n    public void activateOptions()\n\
    \    {\n\n    }\n\n    public void setLogger(Logger logger)\n    {\n        if\
    \ (logger != null)\n        {\n            loggers.add(logger);\n        }\n \
    \   }\n\n    public void error(String message, Exception e, int errorCode)\n \
    \   {\n        error(message, e, errorCode, null);\n    }\n\n    public void error(String\
    \ message)\n    {\n        error(message, null, 0, null);\n    }\n\n    public\
    \ void error(String message, Exception e, int errorCode,\nLoggingEvent event)\n\
    \    {\n        for (int i = 0; i < loggers.size(); i++)\n        {\n        \
    \    Logger l = (Logger) loggers.elementAt(i);\n            l.removeAppender(primary);\n\
    \            l.addAppender(backup);\n            l.error(message, e);\n      \
    \  }\n    }\n\n    public void setAppender(Appender appender)\n    {\n       \
    \ this.primary = appender;\n    }\n\n    public void setBackupAppender(Appender\
    \ appender)\n    {\n        this.backup = appender;\n    }\n}\n```"
  raw: "## Error Handling\n\nHowever robust an application's code is, it is virtually\
    \ impossible to predict and handle all potential error conditions. A good system\
    \ is weighed against its resilience and how efficiently an error condition is\
    \ handled. So far we have seen how to log information about the internal state\
    \ of the running instance of an application. We have seen with log4j that logging\
    \ information can be sent out to various destinations locally or over a network.\
    \ There is every chance that these operations may generate some erroneous conditions\
    \ in their process of publishing logging information.\n\nThe question is what\
    \ should happen when one of the logging components encounters some problem. Here\
    \ are some suggestions:\n\n*   The primary application itself should not crash\
    \ just because there is some problem with the logging activity.\n\n*   In Java\
    \ terms, this means that the logging component should handle errors internally\
    \ without throwing the errors or exceptions back to the caller application. This\
    \ saves the caller application from having to worry about the logging components.\n\
    \n*   The logging components should allow flexibility in what the application\
    \ developer might want to do in such error conditions.\n\nApache log4j is a resilient\
    \ logging framework. It takes care of all the aspects involving erroneous logging\
    \ conditions we discussed earlier. By default, the log4j `Appender` objects use\
    \ the `OnlyOnceErrorHandler` object, which outputs an error message once and only\
    \ once to `System.err` and ignores the subsequent error messages. This is graceful\
    \ error handling in that it does not cause the main application to crash, and\
    \ the administrator can see the error message produced and try to fix the problem\
    \ in time.\n\n[Figure 8-4](#LiB0065.html#ch08fig04) presents the different error\
    \ handling objects within log4j and their relationships. Note that all the error-handling\
    \ objects implement a common interface, `org.apache.log4j.spi.ErrorHandler`. This\
    \ interface defines the error handling methods that are subsequently implemented\
    \ in the specific error-handling objects.\n\n[![Click To expand](fig8-4.jpg)](fig8-4_0.jpg)\n\
    Figure 8-4: The ErrorHandler class diagram\n\nThe `ErrorHandler` interface also\
    \ defines a couple of other methods in addition to the error handling methods.\
    \ These methods are shown in [Table 8-2](#LiB0065.html#ch08table02).\n\nTable\
    \ 8-2: Methods in the ErrorHandler Interface\n\n| Method | Description |\n| ---\
    \ | --- |\n| `error(String)` | Handles the error by publishing the message passed\
    \ to it |\n| `error(String, Exception, int)` | Handles the error by publishing\
    \ the error information, including the Java exception being thrown and the integer\
    \ error code describing the problem |\n| `error(String, Exception, int, LoggingEvent)`\
    \ | Handles the error by publishing the error message, the exception, the integer\
    \ error code, and the logging event that generated the error |\n| `setLogger(Logger)`\
    \ | Sets the reference of the logger to which the failing appender might be attached\
    \ |\n| `setAppender(Appender)` | Sets the appender for which the error is handled\
    \ |\n| `setBackupAppender(Appender)` | Sets the backup appender to fall back to\
    \ in case the primary appender fails |\n\nApache log4j by default provides two\
    \ error handling objects:\n\n*   `org.apache.log4j.helpers.OnlyOnceErrorHandler`:\
    \ This is the default error handler used within log4j `Appender` objects. It prints\
    \ the error message from the appender once and only once to `System.err` and ignores\
    \ subsequent error messages.\n\n*   `org.apache.log4j.varia.FallbackErrorHandler`:\
    \ This error handler also prints error messages to `System.err`. In addition,\
    \ it can configure a secondary appender to be the backup appender for all the\
    \ loggers that use this appender. This in essence means that when the first error\
    \ arrives, it iterates through all the logger references associated with the primary\
    \ appender defined as a part of the `FallbackErrorHandler` configuration. For\
    \ each of the `Logger` objects found, it removes their primary appenders and sets\
    \ the backup appender as the primary appender. This ensures for the loggers that\
    \ subsequent logging requests will now be directed to the backup appender. This\
    \ also ensures that no further error conditions arise due to the appender operation.\n\
    \nWhen it comes to your own applications, you won't be happy all the time with\
    \ the default log4j error handling. For example, you might not be happy about\
    \ producing error messages to a console, when you really want to redirect all\
    \ logging events to use a different appender to send information to a secondary\
    \ destination. Say you are using `JDBCAppender` to log information to a database,\
    \ and the database goes down while your application is still running. What do\
    \ you want to do now? You may want to log the error report and then continue logging\
    \ information in a file instead. How to achieve this? You can write your own custom\
    \ error handler to do the job and configure log4j to use your custom error handler.\n\
    \n### ErrorCode Interface\n\nTo identify errors in a systematic way, log4j allocates\
    \ error codes to different types of errors. These are encapsulated within the\
    \ `ErrorCode` interface. The error codes are used within an `Appender` object\
    \ to pass generated errors to the appropriate `ErrorHandler` class attached to\
    \ the `Appender`. We can extend this interface to define our own error codes in\
    \ case we need them.\n\n### Writing a Custom ErrorHandler\n\nLet's write a custom\
    \ error handler object. We want this custom error handler to achieve the following:\n\
    \n*   The error handler must implement the `ErrorHandler` interface.\n\n*   The\
    \ error handler must be given a logger reference.\n\n*   The error handler must\
    \ be given an appender reference.\n\n*   The appender reference identifies the\
    \ backup appender that will handle the error condition. The logger reference identifies\
    \ the logger to which the specified `Appender` is attached.\n\n*   The error handler\
    \ will keep a reference to all the loggers specified as having the primary `Appender`\
    \ object associated with them.\n\n*   In the error condition, the error handler\
    \ will remove the primary appender from the loggers specified and set the backup\
    \ appender object to be the primary appender thereafter.\n\n[Listing 8-21](#LiB0065.html#ch08ls21),\
    \ `CustomErrorHandler.java`, is designed to do the jobs iterated in the previous\
    \ points. This is a very simple error handler. The implementation of `error(message,\
    \ exception, errorCode, LoggingEvent)` is the method to do the bulk of the work.\n\
    \nListing 8-21: CustomErrorHandler.java\n\n| **![Start example](_1.gif)** |\n\n\
    ```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.spi.ErrorHandler;\n\
    import org.apache.log4j.spi.LoggingEvent;\nimport org.apache.log4j.Logger;\nimport\
    \ org.apache.log4j.Appender;\n\nimport java.util.Vector;\n\npublic class CustomErrorHandler\
    \ implements ErrorHandler\n{\n    private Appender primary;\n    private Appender\
    \ backup;\n    private Vector loggers = new Vector();\n\n    public CustomErrorHandler()\n\
    \    {\n\n    }\n\n    public void activateOptions()\n    {\n\n    }\n\n    public\
    \ void setLogger(Logger logger)\n    {\n        if (logger != null)\n        {\n\
    \            loggers.add(logger);\n        }\n    }\n\n    public void error(String\
    \ message, Exception e, int errorCode)\n    {\n        error(message, e, errorCode,\
    \ null);\n    }\n\n    public void error(String message)\n    {\n        error(message,\
    \ null, 0, null);\n    }\n\n    public void error(String message, Exception e,\
    \ int errorCode,\nLoggingEvent event)\n    {\n        for (int i = 0; i < loggers.size();\
    \ i++)\n        {\n            Logger l = (Logger) loggers.elementAt(i);\n   \
    \         l.removeAppender(primary);\n            l.addAppender(backup);\n   \
    \         l.error(message, e);\n        }\n    }\n\n    public void setAppender(Appender\
    \ appender)\n    {\n        this.primary = appender;\n    }\n\n    public void\
    \ setBackupAppender(Appender appender)\n    {\n        this.backup = appender;\n\
    \    }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |"
  trans: "\n## 错误处理\n\n无论应用程序的代码多么健壮，实际上都不可能预测并处理所有潜在的错误情况。一个优秀的系统取决于其弹性以及处理错误情况的效率。到目前为止，我们已经了解了如何记录应用程序运行实例内部状态的信息。通过\
    \ log4j，我们看到日志信息可以发送到本地或网络上的各种目标。这些操作在发布日志信息的过程中，很有可能会产生一些错误情况。\n\n问题是，当日志组件之一遇到问题时应该怎么办。以下是一些建议：\n\
    \n*   主应用程序本身不应仅仅因为日志活动出现问题而崩溃。\n\n*   用 Java 的术语来说，这意味着日志组件应在内部处理错误，而不要将错误或异常抛回给调用方应用程序。这使调用方应用程序无需担心日志组件。\n\
    \n*   日志组件应允许应用程序开发人员在这种错误情况下灵活地选择处理方式。\n\nApache log4j 是一个具有弹性的日志框架。它处理了我们之前讨论的涉及错误日志情况的所有方面。默认情况下，log4j\
    \ 的 `Appender` 对象使用 `OnlyOnceErrorHandler` 对象，该对象仅向 `System.err` 输出一次错误消息，然后忽略后续的错误消息。这是一种优雅的错误处理方式，因为它不会导致主应用程序崩溃，并且管理员可以看到产生的错误消息并尝试及时修复问题。\n\
    \n图 8-4 展示了 log4j 中不同的错误处理对象及其关系。请注意，所有错误处理对象都实现了一个公共接口 `org.apache.log4j.spi.ErrorHandler`。该接口定义了错误处理方法，这些方法随后在特定的错误处理对象中实现。\n\
    \n![点击展开](img/fig8-4_0.jpg)\n图 8-4: ErrorHandler 类图\n\n除了错误处理方法之外，`ErrorHandler`\
    \ 接口还定义了一些其他方法。这些方法如表 8-2 所示。\n\n表 8-2: ErrorHandler 接口中的方法\n\n| 方法 | 描述 |\n|\
    \ --- | --- |\n| `error(String)` | 通过发布传递给它的消息来处理错误 |\n| `error(String, Exception,\
    \ int)` | 通过发布错误信息来处理错误，包括抛出的 Java 异常和描述问题的整数错误代码 |\n| `error(String, Exception,\
    \ int, LoggingEvent)` | 通过发布错误消息、异常、整数错误代码以及生成错误的日志事件来处理错误 |\n| `setLogger(Logger)`\
    \ | 设置可能附加了失败 appender 的日志记录器的引用 |\n| `setAppender(Appender)` | 设置为其处理错误的 appender\
    \ |\n| `setBackupAppender(Appender)` | 设置在主 appender 失败时回退使用的备用 appender |\n\n\
    Apache log4j 默认提供两个错误处理对象：\n\n*   `org.apache.log4j.helpers.OnlyOnceErrorHandler`：这是\
    \ log4j 的 `Appender` 对象中使用的默认错误处理器。它仅向 `System.err` 打印一次来自 appender 的错误消息，然后忽略后续的错误消息。\n\
    \n*   `org.apache.log4j.varia.FallbackErrorHandler`：此错误处理器也会向 `System.err` 打印错误消息。此外，它可以配置一个辅助\
    \ appender，作为所有使用此 appender 的日志记录器的备用 appender。这实质上意味着，当第一个错误到达时，它会遍历与定义为 `FallbackErrorHandler`\
    \ 配置一部分的主 appender 相关联的所有日志记录器引用。对于找到的每个 `Logger` 对象，它会移除它们的主 appender，并将备用 appender\
    \ 设置为主 appender。这确保了对于这些日志记录器，后续的日志记录请求将定向到备用 appender。这也确保了不会因 appender 操作而产生进一步的错误情况。\n\
    \n对于你自己的应用程序，你可能不会总是对默认的 log4j 错误处理感到满意。例如，当你真正希望将所有日志事件重定向到使用不同的 appender 以将信息发送到辅助目标时，你可能不希望将错误消息输出到控制台。假设你正在使用\
    \ `JDBCAppender` 将日志信息记录到数据库，而数据库在你的应用程序仍在运行时宕机了。你现在想做什么？你可能希望记录错误报告，然后继续将日志信息记录到文件中。如何实现这一点？你可以编写自己的自定义错误处理器来完成这项工作，并配置\
    \ log4j 使用你的自定义错误处理器。\n\n### ErrorCode 接口\n\n为了系统地识别错误，log4j 为不同类型的错误分配了错误代码。这些错误代码封装在\
    \ `ErrorCode` 接口中。错误代码在 `Appender` 对象内部使用，用于将生成的错误传递给附加到该 `Appender` 的相应 `ErrorHandler`\
    \ 类。如果需要，我们可以扩展此接口来定义我们自己的错误代码。\n\n### 编写自定义 ErrorHandler\n\n让我们编写一个自定义的错误处理器对象。我们希望这个自定义错误处理器实现以下目标：\n\
    \n*   错误处理器必须实现 `ErrorHandler` 接口。\n\n*   必须为错误处理器提供一个日志记录器引用。\n\n*   必须为错误处理器提供一个\
    \ appender 引用。\n\n*   appender 引用标识了将处理错误情况的备用 appender。日志记录器引用标识了指定 `Appender`\
    \ 所附加到的日志记录器。\n\n*   错误处理器将保留对所有指定为与主 `Appender` 对象关联的日志记录器的引用。\n\n*   在错误情况下，错误处理器将从指定的日志记录器中移除主\
    \ appender，并将备用 appender 对象设置为主 appender。\n\n清单 8-21 `CustomErrorHandler.java`\
    \ 旨在完成前面几点中列出的工作。这是一个非常简单的错误处理器。`error(message, exception, errorCode, LoggingEvent)`\
    \ 的实现是完成大部分工作的方法。\n\n清单 8-21: CustomErrorHandler.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\npackage com.apress.logging.log4j;\n\nimport org.apache.log4j.spi.ErrorHandler;\n\
    import org.apache.log4j.spi.LoggingEvent;\nimport org.apache.log4j.Logger;\nimport\
    \ org.apache.log4j.Appender;\n\nimport java.util.Vector;\n\npublic class CustomErrorHandler\
    \ implements ErrorHandler\n{\n    private Appender primary;\n    private Appender\
    \ backup;\n    private Vector loggers = new Vector();\n\n    public CustomErrorHandler()\n\
    \    {\n\n    }\n\n    public void activateOptions()\n    {\n\n    }\n\n    public\
    \ void setLogger(Logger logger)\n    {\n        if (logger != null)\n        {\n\
    \            loggers.add(logger);\n        }\n    }\n\n    public void error(String\
    \ message, Exception e, int errorCode)\n    {\n        error(message, e, errorCode,\
    \ null);\n    }\n\n    public void error(String message)\n    {\n        error(message,\
    \ null, 0, null);\n    }\n\n    public void error(String message, Exception e,\
    \ int errorCode,\nLoggingEvent event)\n    {\n        for (int i = 0; i < loggers.size();\
    \ i++)\n        {\n            Logger l = (Logger) loggers.elementAt(i);\n   \
    \         l.removeAppender(primary);\n            l.addAppender(backup);\n   \
    \         l.error(message, e);\n        }\n    }\n\n    public void setAppender(Appender\
    \ appender)\n    {\n        this.primary = appender;\n    }\n\n    public void\
    \ setBackupAppender(Appender appender)\n    {\n        this.backup = appender;\n\
    \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n"
- fmt: "### Configuring ErrorHandler\n\nAt the moment in log4j, error handlers can\
    \ only be configured via an XML-style configuration file or programmatically.\
    \ Here we will use the XML-style configuration, as it is more flexible compared\
    \ to the hard-coded programmatic configuration. [Listing 8-22](#LiB0065.html#ch08ls22),\
    \ \"errorHandler.xml\", shows the code for the sample configuration file.\n\n\
    **Listing 8-22:** `errorHandler.xml`\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<!DOCTYPE log4j:configuration SYSTEM \"log4j.dtd\">\n\n<log4j:configuration\
    \ xmlns:log4j=\"http://jakarta.apache.org/log4j/\">\n\n <appender name=\"FILE\"\
    \ class=\"org.apache.log4j.FileAppender\">\n    <param name=\"file\" value=\"\
    ${user.home}/backup.log\"/>\n    <param name=\"append\" value=\"true\"/>\n\n \
    \   <layout class=\"org.apache.log4j.SimpleLayout\"/>\n\n </appender>\n\n <appender\
    \ name=\"JDBC\" class=\"org.apache.log4j.jdbc.JDBCAppender\">\n\n    <errorHandler\
    \ class=\"com.apress.logging.log4j.CustomErrorHandler\">\n     <logger-ref ref=\"\
    com.apress.logging.log4j\"/>\n     <appender-ref ref=\"FILE\"/>\n    </errorHandler>\n\
    \n  <param name=\"URL\" value=\"jdbc:odbc:dbdef\"/>\n  <param name=\"user\" value=\"\
    system\"/>\n  <param name=\"password\" value=\"manager\"/>\n  <param name=\"sql\"\
    \ value=\"INSERT INTO LOGGING_DATA VALUES('%x','%d{yyyy-MM- dd}','%C','%p','%m')\"\
    />\n\n </appender>\n\n <logger name=\"com.apress.logging.log4j\">\n  <level value=\"\
    debug\"/>\n  <appender-ref ref=\"JDBC\"/>\n </logger>\n</log4j:configuration>\n\
    ```\n\nThe `errorHandler` element is defined as a child element of the `JDBC`\
    \ appender element. This means that the defined error handler will be used in\
    \ connection with the appender named `JDBC`. The `JDBC` appender writes the data\
    \ to the database by using the configuration parameters defined.\n\nIn this example\
    \ configuration, the error handler is set to the custom error handler `com.apress.logging.log4j.CustomErrorHandler`.\
    \ `CustomErrorHandler` is defined as a child element to the `JDBC` appender. This\
    \ means that the primary appender for `CustomErrorHandler` is set to be the `JDBC`\
    \ appender.\n\nThe `logger-ref` element defines the logger that is using the appender\
    \ `JDBC`. The `appender-ref` element defines the backup appender for the `JDBC`\
    \ appender. In this example, the backup appender is the appender named `FILE`.\
    \ The `FILE` appender in turn is configured to be `org.apache.log4j.FileAppender`.\n\
    \nFinally, the configuration of the `FILE` appender indicates that the logging\
    \ information will be directed to the \"backup.log\" file in the \"user.home\"\
    \ directory.\n\n### Running the Example\n\nRunning the example is very simple.\
    \ To see `CustomErrorHandler` at work, change the database configuration parameters\
    \ in the configuration file \"errorHandler.xml\" ([Listing 8-22](#LiB0065.html#ch08ls22))\
    \ to some invalid values. This will cause the `JDBCAppender` to fail. This is\
    \ when `CustomErrorHandler` will take charge and do the backup job. Finally, go\
    \ to the \"user.home\" directory to check what is written in the \"backup.log\"\
    \ file.\n\n## Conclusion\n\nIn this chapter, we have examined how to extend the\
    \ existing log4j framework to write our own application-specific logging components.\
    \ The plug-and-play nature of log4j makes it easy to integrate custom components\
    \ into the existing framework. The default capability of log4j is versatile and\
    \ meets most of the routine requirements in logging activity. However, you might\
    \ venture to extend the existing framework should you really need it. This chapter\
    \ provides a guideline for implementing custom logging components to use with\
    \ log4j.\n\nIn the [next chapter](#LiB0067_split_000.html#634), we will learn\
    \ how to use log4j in the context of Java Server Pages (JSP). We will examine\
    \ a new JSP tag library, `Log (1.1)`, from Apache and see how we can apply it\
    \ to using log4j in JSP. Also, we will explore some ideas for using log4j along\
    \ with Enterprise Java Beans (EJB).\n\n# Chapter 9: Using the Apache Log Tag Library\n\
    \n## Overview\n\nOne of the many advantages of a powerful logging framework such\
    \ as Apache log4j is that it is not restricted to any particular application scenario.\
    \ Apache log4j is a robust and extendible logging framework that can be tailored\
    \ to any application-specific need. One feature that makes this logging framework\
    \ so robust is the `Log` tag library, which is part of the Apache TagLibs project.\n\
    \nThe `Log` tag library allows developers to embed log4j-based logging activity\
    \ within a Java Server Page (JSP). In essence, it provides tags pertaining to\
    \ all the logging levels declared by log4j and uses a configuration file to configure\
    \ the log4j framework required to perform the logging activity.\n\nIn this chapter,\
    \ we will examine the use of the `Log` tag library and also see how we can extend\
    \ it to incorporate our own logging tags.\n\n## Installing the Log Tag Library\n\
    \nInstalling and using `Log` with JSP is pretty straightforward. Follow these\
    \ steps to set up and use `Log` in a Web application:\n\n1.  First, obtain the\
    \ binary distribution of `Log (1.1)` from the Apache Web site ([http://jakarta.apache.org/taglibs/doc/log-doc/intro.html](http://jakarta.apache.org/taglibs/doc/log-doc/intro.html)).\n\
    \n2.  Extract the archive file to the local machine.\n\n3.  Copy the tag library\
    \ descriptor file, \"taglibs-log.tld\", to the application-specific \"/WEB-INF\"\
    \ subdirectory.\n\n4.  Copy the \"taglibs-log.jar\" file to the \"/WEB-INF/lib\"\
    \ subdirectory of the Web application.\n\n5.  Add a `<taglib>` element to the\
    \ \"web.xml\" file of the Web application to specify the location of the tag library\
    \ descriptor as shown here:\n\n    ```\n    <taglib>\n      <taglib-uri>http://jakarta.apache.org/taglibs/log-1.0</taglib-uri>\n\
    \      <taglib-location>/WEB-INF/log.tld</taglib-location>\n    </taglib>\n  \
    \  ```\n\nThis is all we need to do to use `Log` in a Web application. Now we\
    \ will see a simple example of using `Log` from within a JSP.\n\n| Note | The\
    \ installation procedure described in this section is specific to the Apache Tomcat\
    \ Web server environment. For using `Log (1.1)` with other Web servers, you need\
    \ to configure it to work specifically with the Web server you are using. |"
  raw: "### Configuring ErrorHandler\n\nAt the moment in log4j, error handlers can\
    \ only be configured via an XML-style configuration file or programmatically.\
    \ Here we will use the XML-style configuration, as it is more flexible compared\
    \ to the hard-coded programmatic configuration. [Listing 8-22](#LiB0065.html#ch08ls22),\
    \ \"errorHandler.xml\", shows the code for the sample configuration file.\n\n\
    Listing 8-22: errorHandler.xml\n\n| **![Start example](_1.gif)** |\n\n```\n <?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE log4j:configuration SYSTEM \"\
    log4j.dtd\">\n\n<log4j:configuration xmlns:log4j=\"http://jakarta.apache.org/log4j/\"\
    >\n\n <appender name=\"FILE\" class=\"org.apache.log4j.FileAppender\">\n    <param\
    \ name=\"file\" value=\"${user.home}/backup.log\"/>\n    <param name=\"append\"\
    \ value=\"true\"/>\n\n    <layout class=\"org.apache.log4j.SimpleLayout\"/>\n\n\
    \ </appender>\n\n <appender name=\"JDBC\" class=\"org.apache.log4j.jdbc.JDBCAppender\"\
    >\n\n    <errorHandler class=\"com.apress.logging.log4j.CustomErrorHandler\">\n\
    \     <logger-ref ref=\"com.apress.logging.log4j\"/>\n     <appender-ref ref=\"\
    FILE\"/>\n    </errorHandler>\n\n  <param name=\"URL\" value=\"jdbc:odbc:dbdef\"\
    />\n  <param name=\"user\" value=\"system\"/>\n  <param name=\"password\" value=\"\
    manager\"/>\n  <param name=\"sql\" value=\"INSERT INTO LOGGING_DATA VALUES('%x','%d{yyyy-MM-\
    \ dd}','%C','%p','%m')\"/>\n\n </appender>\n\n <logger name=\"com.apress.logging.log4j\"\
    >\n  <level value=\"debug\"/>\n  <appender-ref ref=\"JDBC\"/>\n </logger>\n</log4j:configuration>\n\
    ```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nThe `errorHandler` element is\
    \ defined as a child element of the `JDBC` appender element. This means that the\
    \ defined error handler will be used in connection with the appender named `JDBC`.\
    \ The `JDBC` appender writes the data to the database by using the configuration\
    \ parameters defined.\n\nIn this example configuration, the error handler is set\
    \ to the custom error handler `com.apress.logging.log4j.CustomErrorHandler`. `CustomErrorHandler`\
    \ is defined as a child element to the `JDBC` appender. This means that the primary\
    \ appender for `CustomErrorHandler` is set to be the `JDBC` appender.\n\nThe `logger-ref`\
    \ element defines the logger that is using the appender `JDBC`. The `appender-ref`\
    \ element defines the backup appender for the `JDBC` appender. In this example,\
    \ the backup appender is the appender named `FILE`. The `FILE` appender in turn\
    \ is configured to be `org.apache.log4j.FileAppender`.\n\nFinally, the configuration\
    \ of the `FILE` appender indicates that the logging information will be directed\
    \ to the \"backup.log\" file in the \"user.home\" directory.\n\n### Running the\
    \ Example\n\nRunning the example is very simple. To see `CustomErrorHandler` at\
    \ work, change the database configuration parameters in the configuration file\
    \ \"errorHandler.xml\"([Listing 8-22](#LiB0065.html#ch08ls22)) to some invalid\
    \ values. This will cause the `JDBCAppender` to fail. This is when `CustomErrorHandler`\
    \ will take charge and do the backup job. Finally, go to the \"user.home\" directory\
    \ to check what is written in the \"backup.log\" file.\n\n## Conclusion\n\nIn\
    \ this chapter, we have examined how to extend the existing log4j framework to\
    \ write our own application-specific logging components. The plug-and-play nature\
    \ of log4j makes it easy to integrate custom components into the existing framework.\
    \ The default capability of log4j is versatile and meets most of the routine requirements\
    \ in logging activity. However, you might venture to extend the existing framework\
    \ should you really need it. This chapter provides a guideline for implementing\
    \ custom logging components to use with log4j.\n\nIn the [next chapter](#LiB0067_split_000.html#634),\
    \ we will learn how to use log4j in the context of Java Server Pages (JSP). We\
    \ will examine a new JSP tag library, `Log (1.1)`, from Apache and see how we\
    \ can apply it to using log4j in JSP. Also, we will explore some ideas for using\
    \ log4j along with Enterprise Java Beans (EJB).\n\n# Chapter 9: Using the Apache\
    \ Log Tag Library\n\n## Overview\n\nOne of the many advantages of a powerful logging\
    \ framework such as Apache log4j is that it is not restricted to any particular\
    \ application scenario. Apache log4j is a robust and extendible logging framework\
    \ that can be tailored to any application-specific need. One feature that makes\
    \ this logging framework so robust is the `Log` tag library, which is part of\
    \ the Apache TagLibs project.\n\nThe `Log` tag library allows developers to embed\
    \ log4j-based logging activity within a Java Server Page (JSP). In essence, it\
    \ provides tags pertaining to all the logging levels declared by log4j and uses\
    \ a configuration file to configure the log4j framework required to perform the\
    \ logging activity.\n\nIn this chapter, we will examine the use of the `Log` tag\
    \ library and also see how we can extend it to incorporate our own logging tags.\n\
    \n## Installing the Log Tag Library\n\nInstalling and using `Log` with JSP is\
    \ pretty straightforward. Follow these steps to set up and use `Log` in a Web\
    \ application:\n\n1.  First, obtain the binary distribution of `Log (1.1)` from\
    \ the Apache Web site ([http://jakarta.apache.org/taglibs/doc/log-doc/intro.html](http://jakarta.apache.org/taglibs/doc/log-doc/intro.html)).\n\
    \n2.  Extract the archive file to the local machine.\n\n3.  Copy the tag library\
    \ descriptor file, \"taglibs-log.tld\", to the application-specific \"/WEB-INF\"\
    \ subdirectory.\n\n4.  Copy the \"taglibs-log.jar\" file to the \"/WEB-INF/lib\"\
    \ subdirectory of the Web application.\n\n5.  Add a `<taglib> ELEMENT` to the\
    \ \"web.xml\" file of the Web application to specify the location of the tag library\
    \ descriptor as shown here:\n\n    ```\n    <taglib>\n      <taglib-uri>http://jakarta.apache.org/taglibs/log-1.0</taglib-uri>\n\
    \      <taglib-location>/WEB-INF/log.tld</taglib-location>\n    </taglib>\n  \
    \  ```\n\nThis is all we need to do to use `Log` in a Web application. Now we\
    \ will see a simple example of using `Log` from within a JSP.\n\n|  | Note  |\
    \ The installation procedure described in this section is specific to the Apache\
    \ Tomcat Web server environment. For using `Log (1.1)` with other Web servers,\
    \ you need to configure it to work specifically with the Web server you are using.\
    \ |"
  trans: "\n### 配置 ErrorHandler\n\n目前，在 log4j 中，错误处理器只能通过 XML 风格的配置文件或编程方式进行配置。此处我们将使用\
    \ XML 风格的配置，因为它比硬编码的编程配置更灵活。清单 8-22 \"errorHandler.xml\" 展示了示例配置文件的代码。\n\n清单 8-22:\
    \ errorHandler.xml\n\n| **![示例开始](img/_1.gif)** |\n\n```\n <?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<!DOCTYPE log4j:configuration SYSTEM \"log4j.dtd\">\n\n\
    <log4j:configuration xmlns:log4j=\"http://jakarta.apache.org/log4j/\">\n\n <appender\
    \ name=\"FILE\" class=\"org.apache.log4j.FileAppender\">\n    <param name=\"file\"\
    \ value=\"${user.home}/backup.log\"/>\n    <param name=\"append\" value=\"true\"\
    />\n\n    <layout class=\"org.apache.log4j.SimpleLayout\"/>\n\n </appender>\n\n\
    \ <appender name=\"JDBC\" class=\"org.apache.log4j.jdbc.JDBCAppender\">\n\n  \
    \  <errorHandler class=\"com.apress.logging.log4j.CustomErrorHandler\">\n    \
    \ <logger-ref ref=\"com.apress.logging.log4j\"/>\n     <appender-ref ref=\"FILE\"\
    />\n    </errorHandler>\n\n  <param name=\"URL\" value=\"jdbc:odbc:dbdef\"/>\n\
    \  <param name=\"user\" value=\"system\"/>\n  <param name=\"password\" value=\"\
    manager\"/>\n  <param name=\"sql\" value=\"INSERT INTO LOGGING_DATA VALUES('%x','%d{yyyy-MM-\
    \ dd}','%C','%p','%m')\"/>\n\n </appender>\n\n <logger name=\"com.apress.logging.log4j\"\
    >\n  <level value=\"debug\"/>\n  <appender-ref ref=\"JDBC\"/>\n </logger>\n</log4j:configuration>\n\
    ```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n`errorHandler` 元素被定义为 `JDBC` appender\
    \ 元素的子元素。这意味着定义的错误处理器将与名为 `JDBC` 的 appender 关联使用。`JDBC` appender 通过使用定义的配置参数将数据写入数据库。\n\
    \n在此示例配置中，错误处理器被设置为自定义错误处理器 `com.apress.logging.log4j.CustomErrorHandler`。`CustomErrorHandler`\
    \ 被定义为 `JDBC` appender 的子元素。这意味着 `CustomErrorHandler` 的主 appender 被设置为 `JDBC`\
    \ appender。\n\n`logger-ref` 元素定义了正在使用 `JDBC` appender 的记录器。`appender-ref` 元素定义了\
    \ `JDBC` appender 的备用 appender。在此示例中，备用 appender 是名为 `FILE` 的 appender。而 `FILE`\
    \ appender 又被配置为 `org.apache.log4j.FileAppender`。\n\n最后，`FILE` appender 的配置表明日志信息将被定向到\
    \ \"user.home\" 目录下的 \"backup.log\" 文件中。\n\n### 运行示例\n\n运行示例非常简单。要观察 `CustomErrorHandler`\
    \ 的工作情况，请将配置文件 \"errorHandler.xml\"（清单 8-22）中的数据库配置参数更改为一些无效值。这将导致 `JDBCAppender`\
    \ 失败。此时，`CustomErrorHandler` 将接管并执行备份工作。最后，前往 \"user.home\" 目录检查 \"backup.log\"\
    \ 文件中写入了什么内容。\n\n## 结论\n\n在本章中，我们研究了如何扩展现有的 log4j 框架来编写我们自己的特定于应用程序的日志记录组件。log4j\
    \ 即插即用的特性使其易于将自定义组件集成到现有框架中。log4j 的默认功能非常通用，能够满足日志记录活动中的大多数常规需求。然而，如果你确实需要，也可以尝试扩展现有框架。本章为实现与\
    \ log4j 配合使用的自定义日志记录组件提供了指导。\n\n在下一章中，我们将学习如何在 Java 服务器页面（JSP）的上下文中使用 log4j。我们将研究\
    \ Apache 的一个新的 JSP 标签库 `Log (1.1)`，并了解如何将其应用于在 JSP 中使用 log4j。此外，我们还将探讨一些将 log4j\
    \ 与企业 Java Bean（EJB）结合使用的思路。\n\n# 第 9 章：使用 Apache Log 标签库\n\n## 概述\n\n像 Apache\
    \ log4j 这样强大的日志记录框架的众多优势之一，是它不受限于任何特定的应用场景。Apache log4j 是一个健壮且可扩展的日志记录框架，可以根据任何特定应用的需求进行定制。使这个日志记录框架如此健壮的一个特性是\
    \ `Log` 标签库，它是 Apache TagLibs 项目的一部分。\n\n`Log` 标签库允许开发者在 Java 服务器页面（JSP）中嵌入基于\
    \ log4j 的日志记录活动。本质上，它提供了与 log4j 声明的所有日志级别相关的标签，并使用配置文件来配置执行日志记录活动所需的 log4j 框架。\n\
    \n在本章中，我们将研究 `Log` 标签库的使用，并了解如何扩展它以合并我们自己的日志记录标签。\n\n## 安装 Log 标签库\n\n在 JSP 中安装和使用\
    \ `Log` 非常简单。请按照以下步骤在 Web 应用程序中设置和使用 `Log`：\n\n1.  首先，从 Apache 网站 ([`jakarta.apache.org/taglibs/doc/log-doc/intro.html`](http://jakarta.apache.org/taglibs/doc/log-doc/intro.html))\
    \ 获取 `Log (1.1)` 的二进制发行版。\n\n2.  将归档文件解压到本地机器。\n\n3.  将标签库描述符文件 \"taglibs-log.tld\"\
    \ 复制到应用程序特定的 \"/WEB-INF\" 子目录。\n\n4.  将 \"taglibs-log.jar\" 文件复制到 Web 应用程序的 \"\
    /WEB-INF/lib\" 子目录。\n\n5.  在 Web 应用程序的 \"web.xml\" 文件中添加一个 `<taglib>` 元素，以指定标签库描述符的位置，如下所示：\n\
    \n    ```\n    <taglib>\n      <taglib-uri>http://jakarta.apache.org/taglibs/log-1.0</taglib-uri>\n\
    \      <taglib-location>/WEB-INF/log.tld</taglib-location>\n    </taglib>\n  \
    \  ```\n\n这就是在 Web 应用程序中使用 `Log` 所需做的全部工作。现在，我们将看到一个在 JSP 中使用 `Log` 的简单示例。\n\n\
    |  | 注意  | 本节描述的安装过程特定于 Apache Tomcat Web 服务器环境。要与其他 Web 服务器一起使用 `Log (1.1)`，你需要根据所使用的\
    \ Web 服务器进行特定配置。 |\n"
- fmt: "# A Simple Example of Using the Log Tag Library\n\nFirst, let's see a simple\
    \ example of how we can use the `Log` tag library within a JSP to perform logging\
    \ through log4j. [Listing 9-1](#LiB0069.html#ch09ls01), `SimpleLog.jsp`, is a\
    \ straightforward JSP that uses the `Log` tag library to print logging information\
    \ to the console of a Web server. This example is demonstrated using Tomcat 3.2.1.\n\
    \n**Listing 9-1: SimpleLog.jsp**\n\n```\n<html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\"\
    \ prefix=\"log\" %>\n<BODY>\n<h1>Test Log Tag Library</h1>\n<log:debug>Message\
    \ embedded within open and close tags.</log:debug>\n<log:debug message=\"Message\
    \ passed as an attribute to the tag\" />\n<log:info category=\"test\">Using category\
    \ attribute.</log:info>\nYou should see output in the debug logs now.\n</BODY>\n\
    </html>\n```\n\nAs you can see, this JSP, although very simple, is enough to show\
    \ how the `Log` tag libraries work. In this example, we are using the `<debug>`\
    \ and `<info>` tags to print logging information. The `Log` tag library provides\
    \ tags related to all the levels of logging defined in log4j. We will see all\
    \ the tags available with `Log` later in this chapter. For the time being, let's\
    \ explore the basics of using `Log` from within a JSP:\n\n- First, we need to\
    \ import the `Log` tag library in our JSP to make the tags available to the page\
    \ context. This is achieved by the following line of code within the JSP:\n\n\
    \    ```\n    <%@ taglib uri=http://jakarta.apache.org/taglibs/log-1.0\n     \
    \ prefix=\"log\" %>\n    ```\n\n    This line of code imports the tag library\
    \ from the specified location and sets `log` as the tag name prefix for the tags\
    \ in the library. In reality, this prefix can be any unique text.\n\n- The tags\
    \ from the `Log` tag library need to begin with the prefix that is defined while\
    \ importing the tag library to the page. In this example, the tags are prefixed\
    \ by `log`.\n\n- The tags accept optional attributes and require open and close\
    \ tags for each of them.\n\nWith this simple understanding of using the `Log`\
    \ tag library, let's take a look at the configuration requirements for this example.\n\
    \n## Configuration File for the Log Tag Library\n\nThe `Log` tag library uses\
    \ log4j to print logging information to a desired location. As mentioned in [Chapter\
    \ 5](#LiB0032_split_000.html#266), log4j does not make any assumptions about the\
    \ application environment. In order to obtain logging information in a desired\
    \ format and at a desired location, log4j needs a configuration file specifying\
    \ all the information about the formatting and the destination of the logging\
    \ information.\n\n`Log` supplies a default configuration file named `log4j.properties`.\
    \ [Listing 9-2](#LiB0069.html#ch09ls02) describes the default log4j configuration\
    \ file that is shipped with the `Log` distribution.\n\n**Listing 9-2: log4j.properties,\
    \ the Default Configuration File for Log**\n\n```\n# Sample properties to initialize\
    \ log4j\nlog4j.rootCategory=debug, stdout\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\n\
    log4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\n# Pattern to output\
    \ the caller's file name and line number.\nlog4j.appender.stdout.layout.ConversionPattern=%5p\
    \ [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
    log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# Keep\
    \ one backup file\nlog4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\nThis configuration\
    \ file is quite simple. It uses `ConsoleAppender` and `RollingFileAppender` objects\
    \ to output logging information to a Web server console and to a file. It also\
    \ uses `PatternLayout` to format the logging information. The pattern specified\
    \ for the logging information to be printed to the console includes the level,\
    \ thread name, filename, location information, and message followed by a newline\
    \ character.\n\nThe pattern for writing to a file is slightly different and includes\
    \ the level, thread name, logger name, and message followed by a newline character.\
    \ Although this configuration file looks simple, it highlights the following important\
    \ points as to how `Log` works:\n\n- `Log` uses the log4j root logger (synonymous\
    \ to `Category` in the preceding example) to publish the logging information.\
    \ The root logger has the threshold level DEBUG.\n\n- `Log` by default writes\
    \ logging information to the Web server console. In theory, `Log` can be configured\
    \ to send logging information to any preferred destination by changing the configuration\
    \ file. It provides a sample configuration for redirecting logging information\
    \ to a rolling file by using the `RollingFileAppender` object.\n\n- If we want\
    \ to use a logger other than the root logger, then we need to configure the `Logger`\
    \ object in the configuration file. Forgetting to do that may result in no logging\
    \ information printing to any of the specified destinations.\n\n- Changing the\
    \ threshold level for the root logger or other custom loggers used with any of\
    \ the tags can cause changes in the logging output.\n\n> **Note:** If no separate\
    \ logger (`Category`) is explicitly specified as an attribute of any of the `Log`\
    \ tags, the tags rely on the root logger of log4j to publish logging information.\
    \ Hence, it is always safe to keep the root logger configuration even though we\
    \ may specify custom logger (`Category`) names within the tag attributes and configure\
    \ them separately in the same configuration file.\n\n## Setting the Environment\n\
    \nHaving followed the instructions in the \"[Installing the Log Tag Library](#LiB0068.html#637)\"\
    \ section, we are all ready to use the `Log` tag library from within a JSP. Before\
    \ we can see the example JSP in [Listing 9-1](#LiB0069.html#ch09ls01) in action,\
    \ we need to configure the Web server to use the JSP and the log4j configuration\
    \ file as described in next few steps:\n\n1. First, put the JPS described in [Listing\
    \ 9-1](#LiB0069.html#ch09ls01) into a folder named `TestLogTags` (or any folder\
    \ of your choice) under the `webapps` directory of the Tomcat installation.\n\n\
    2. In Tomcat, any Web application typically contains a `WEB-INF` directory and\
    \ one `WEB-INF/classes` directory. Place the `log4j.properties` file in one of\
    \ these locations. For example, you may decide to put it in the `WEB-INF/classes`\
    \ directory.\n\n3. Specify where Tomcat can find the configuration file shown\
    \ in the preceding section for log4j.\n\n4. Pass the `log4j.properties` file as\
    \ a system variable to the execution environment of Tomcat.\n\n5. Go to the `tomcat.bat`\
    \ file in `%TOMCAT_HOME%\\bin`.\n\n6. Add an entry to set the classpath variable\
    \ to point to the directory containing the `log4j.properties` file. For this example,\
    \ the entry may read as follows:\n\n    ```\n    set CP=%CP%;C:\\Jakarta-tomcat-3.2.1\\\
    webapps\\\n          TestLogTags\\WEB-INF\\classes\n    ```\n\n7. Add the following\
    \ entry to the `tomcat.bat` file:\n\n    ```\n    set TOMCAT_OPTS=-Dlog4j.configuration=log4j.properties\n\
    \    ```\n\n> **Note:** We can also configure log4j through an initialization\
    \ servlet. Consult [Chapter 5](#LiB0032_split_000.html#266) for more on this topic.\n\
    \nThis is all we need to do before we can run the example, which we will see how\
    \ to do next."
  raw: "## A Simple Example of Using the Log Tag Library\n\nFirst, let's see a simple\
    \ example of how we can use the `Log` tag library within a JSP to perform logging\
    \ through log4j. [Listing 9-1](#LiB0069.html#ch09ls01), `SimpleLog.jsp`, is a\
    \ straightforward JSP that uses the `Log` tag library to print logging information\
    \ to the console of a Web server. This example is demonstrated using Tomcat 3.2.1.\n\
    \nListing 9-1: SimpleLog.jsp\n\n| **![Start example](_1.gif)** |\n\n```\n<html>\n\
    <%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\" prefix=\"log\" %>\n\
    <BODY>\n<h1>Test Log Tag Library</h1>\n<log:debug>Message embedded within open\
    \ and close tags.</log:debug>\n<log:debug message=\"Message passed as an attribute\
    \ to the tag\" />\n<log:info category=\"test\">Using category attribute.</log:info>\n\
    You should see output in the debug logs now.\n</BODY>\n</html>\n```\n\n| **![End\
    \ example](_1.gif)** |\n\n|  |\n\nAs you can see, this JSP, although very simple,\
    \ is enough to show how the `Log` tag libraries work. In this example, we are\
    \ using the `<debug>` and `<info>` tags to print logging information. The `Log`\
    \ tag library provides tags related to all the levels of logging defined in log4j.\
    \ We will see all the tags available with `Log` later in this chapter. For the\
    \ time being, let's explore the basics of using `Log` from within a JSP:\n\n*\
    \   First, we need to import the `Log` tag library in our JSP to make the tags\
    \ available to the page context. This is achieved by the following line of code\
    \ within the JSP:\n\n    ```\n    <%@ taglib uri=http://jakarta.apache.org/taglibs/log-1.0\n\
    \      prefix=\"log\" %>\n    ```\n\n    This line of code imports the tag library\
    \ from the specified location and sets `log` as the tag name prefix for the tags\
    \ in the library. In reality, this prefix can be any unique text.\n\n*   The tags\
    \ from the `Log` tag library need to begin with the prefix that is defined while\
    \ importing the tag library to the page. In this example, the tags are prefixed\
    \ by `log`.\n\n*   The tags accept optional attributes and require open and close\
    \ tags for each of them.\n\nWith this simple understanding of using the `Log`\
    \ tag library, let's take a look at the configuration requirements for this example.\n\
    \n### Configuration File for the Log Tag Library\n\nThe `Log` tag library uses\
    \ log4j to print logging information to a desired location. As mentioned in [Chapter\
    \ 5](#LiB0032_split_000.html#266), log4j does not make any assumptions about the\
    \ application environment. In order to obtain logging information in a desired\
    \ format and at a desired location, log4j needs a configuration file specifying\
    \ all the information about the formatting and the destination of the logging\
    \ information.\n\n`Log` supplies a default configuration file named \"log4j.properties\"\
    . [Listing 9-2](#LiB0069.html#ch09ls02) describes the default log4j configuration\
    \ file that is shipped with the `Log` distribution.\n\nListing 9-2: log4j.properties,\
    \ the Default Configuration File for Log\n\n| **![Start example](_1.gif)** |\n\
    \n```\n# Sample properties to initialize log4j\nlog4j.rootCategory=debug, stdout\n\
    \nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\nlog4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\
    \n# Pattern to output the caller's file name and line number.\nlog4j.appender.stdout.layout.ConversionPattern=%5p\
    \ [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
    log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# Keep\
    \ one backup file\nlog4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nThis configuration file is quite simple. It uses `ConsoleAppender`\
    \ and `RollingFileAppender` objects to output logging information to a Web server\
    \ console and to a file. It also uses `PatternLayout` to format the logging information.\
    \ The pattern specified for the logging information to be printed to the console\
    \ includes the level, thread name, filename, location information, and message\
    \ followed by a newline character.\n\nThe pattern for writing to a file is slightly\
    \ different and includes the level, thread name, logger name, and message followed\
    \ by a newline character. Although this configuration file looks simple, it highlights\
    \ the following important points as to how `Log` works:\n\n*   `Log` uses the\
    \ log4j root logger (synonymous to `Category` in the preceding example) to publish\
    \ the logging information. The root logger has the threshold level DEBUG.\n\n\
    *   `Log` by default writes logging information to the Web server console. In\
    \ theory, `Log` can be configured to send logging information to any preferred\
    \ destination by changing the configuration file. It provides a sample configuration\
    \ for redirecting logging information to a rolling file by using the `RollingFileAppender`\
    \ object.\n\n*   If we want to use a logger other than the root logger, then we\
    \ need to configure the `Logger` object in the configuration file. Forgetting\
    \ to do that may result in no logging information printing to any of the specified\
    \ destinations.\n\n*   Changing the threshold level for the root logger or other\
    \ custom loggers used with any of the tags can cause changes in the logging output.\n\
    \n|  | Note  | If no separate logger (`Category`) is explicitly specified as an\
    \ attribute of any of the `Log` tags, the tags rely on the root logger of log4j\
    \ to publish logging information. Hence, it is always safe to keep the root logger\
    \ configuration even though we may specify custom logger (`Category`) names within\
    \ the tag attributes and configure them separately in the same configuration file.\
    \ |\n\n### Setting the Environment\n\nHaving followed the instructions in the\
    \ \"[Installing the Log Tag Library](#LiB0068.html#637)\" section, we are all\
    \ ready to use the `Log` tag library from within a JSP. Before we can see the\
    \ example JSP in [Listing 9-1](#LiB0069.html#ch09ls01) in action, we need to configure\
    \ the Web server to use the JSP and the log4j configuration file as described\
    \ in next few steps:\n\n1.  First, put the JPS described in [Listing 9-1](#LiB0069.html#ch09ls01)\
    \ into a folder named \"TestLogTags\" (or any folder of your choice) under the\
    \ \"webapps\" directory of the Tomcat installation.\n\n2.  In Tomcat, any Web\
    \ application typically contains a \"WEB-INF\" directory and one \"WEB-INF/classes\"\
    \ directory. Place the \"log4j.properties\" file in one of these locations. For\
    \ example, you may decide to put it in the \"WEB-INF/classes\" directory.\n\n\
    3.  Specify where Tomcat can find the configuration file shown in the preceding\
    \ section for log4j.\n\n4.  Pass the \"log4j.properties\" file as a system variable\
    \ to the execution environment of Tomcat.\n\n5.  Go to the \"tomcat.bat\" file\
    \ in \"%TOMCAT_HOME%\\bin\".\n\n6.  Add an entry to set the classpath variable\
    \ to point to the directory containing the \"log4j.properties\" file. For this\
    \ example, the entry may read as follows:\n\n    ```\n    set CP=%CP%;C:\\Jakarta-tomcat-3.2.1\\\
    webapps\\\n          TestLogTags\\WEB-INF\\classes\n    ```\n\n7.  Add the following\
    \ entry to the \"tomcat.bat\" file:\n\n    ```\n    set TOMCAT_OPTS=-Dlog4j.configuration=log4j.properties\n\
    \    ```\n\n|  | Note  | We can also configure log4j through an initialization\
    \ servlet. Consult [Chapter 5](#LiB0032_split_000.html#266) for more on this topic.\
    \ |\n\nThis is all we need to do before we can run the example, which we will\
    \ see how to do next."
  trans: "\n## 使用日志标签库的简单示例\n\n首先，让我们看一个简单的示例，演示如何在 JSP 中使用 `Log` 标签库通过 log4j 执行日志记录。清单\
    \ 9-1 `SimpleLog.jsp` 是一个简单的 JSP，它使用 `Log` 标签库将日志信息打印到 Web 服务器的控制台。本示例使用 Tomcat\
    \ 3.2.1 进行演示。\n\n清单 9-1：SimpleLog.jsp\n\n| **![示例开始](img/_1.gif)** |\n\n```\n\
    <html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\" prefix=\"\
    log\" %>\n<BODY>\n<h1>测试日志标签库</h1>\n<log:debug>嵌入在开闭标签之间的消息。</log:debug>\n<log:debug\
    \ message=\"作为属性传递给标签的消息\" />\n<log:info category=\"test\">使用 category 属性。</log:info>\n\
    现在您应该在调试日志中看到输出。\n</BODY>\n</html>\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\
    \n如您所见，这个 JSP 虽然非常简单，但足以展示 `Log` 标签库的工作方式。在此示例中，我们使用 `<debug>` 和 `<info>` 标签来打印日志信息。`Log`\
    \ 标签库提供了与 log4j 中定义的所有日志级别相关的标签。本章稍后我们将看到 `Log` 提供的所有可用标签。现在，让我们探讨在 JSP 中使用 `Log`\
    \ 的基础知识：\n\n*   首先，我们需要在 JSP 中导入 `Log` 标签库，以使这些标签在页面上下文中可用。这通过 JSP 中的以下代码行实现：\n\
    \n    ```\n    <%@ taglib uri=http://jakarta.apache.org/taglibs/log-1.0\n    \
    \  prefix=\"log\" %>\n    ```\n\n    这行代码从指定位置导入标签库，并将 `log` 设置为库中标签的标签名前缀。实际上，此前缀可以是任何唯一的文本。\n\
    \n*   `Log` 标签库中的标签需要以导入标签库到页面时定义的前缀开头。在本示例中，标签以 `log` 为前缀。\n\n*   这些标签接受可选属性，并且每个标签都需要开闭标签。\n\
    \n有了对使用 `Log` 标签库的简单理解，让我们来看看此示例的配置要求。\n\n### 日志标签库的配置文件\n\n`Log` 标签库使用 log4j\
    \ 将日志信息打印到所需位置。如第 5 章所述，log4j 不对应用程序环境做任何假设。为了以所需格式和位置获取日志信息，log4j 需要一个配置文件，指定有关日志信息格式和目标的全部信息。\n\
    \n`Log` 提供了一个名为 \"log4j.properties\" 的默认配置文件。清单 9-2 描述了随 `Log` 发行版附带的默认 log4j\
    \ 配置文件。\n\n清单 9-2：log4j.properties，Log 的默认配置文件\n\n| **![示例开始](img/_1.gif)** |\n\
    \n```\n# 用于初始化 log4j 的示例属性\nlog4j.rootCategory=debug, stdout\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\n\
    log4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\n# 用于输出调用者文件名和行号的模式。\n\
    log4j.appender.stdout.layout.ConversionPattern=%5p [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
    log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# 保留一个备份文件\n\
    log4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n此配置文件非常简单。它使用 `ConsoleAppender` 和 `RollingFileAppender` 对象将日志信息输出到\
    \ Web 服务器控制台和文件。它还使用 `PatternLayout` 来格式化日志信息。指定用于打印到控制台的日志信息的模式包括级别、线程名称、文件名、位置信息和消息，后跟换行符。\n\
    \n写入文件的模式略有不同，包括级别、线程名称、记录器名称和消息，后跟换行符。尽管此配置文件看起来很简单，但它突出了关于 `Log` 工作方式的以下重要点：\n\
    \n*   `Log` 使用 log4j 根记录器（与前面示例中的 `Category` 同义）来发布日志信息。根记录器的阈值级别为 DEBUG。\n\n\
    *   默认情况下，`Log` 将日志信息写入 Web 服务器控制台。理论上，可以通过更改配置文件将 `Log` 配置为将日志信息发送到任何首选目标。它提供了一个示例配置，用于通过使用\
    \ `RollingFileAppender` 对象将日志信息重定向到滚动文件。\n\n*   如果我们想使用根记录器以外的记录器，则需要在配置文件中配置\
    \ `Logger` 对象。忘记这样做可能导致日志信息不会打印到任何指定目标。\n\n*   更改根记录器或与任何标签一起使用的其他自定义记录器的阈值级别可能会导致日志输出发生变化。\n\
    \n|  | 注意  | 如果没有显式地将单独的记录器（`Category`）指定为任何 `Log` 标签的属性，这些标签将依赖 log4j 的根记录器来发布日志信息。因此，即使我们在标签属性中指定了自定义记录器（`Category`）名称并在同一配置文件中单独配置它们，保留根记录器配置也始终是安全的。\
    \ |\n\n### 设置环境\n\n按照“安装日志标签库”部分中的说明操作后，我们已经准备好从 JSP 中使用 `Log` 标签库。在我们可以实际运行清单\
    \ 9-1 中的示例 JSP 之前，我们需要按照接下来的几个步骤配置 Web 服务器以使用 JSP 和 log4j 配置文件：\n\n1.  首先，将清单\
    \ 9-1 中描述的 JSP 放入 Tomcat 安装目录下 \"webapps\" 目录中名为 \"TestLogTags\"（或您选择的任何文件夹）的文件夹中。\n\
    \n2.  在 Tomcat 中，任何 Web 应用程序通常都包含一个 \"WEB-INF\" 目录和一个 \"WEB-INF/classes\" 目录。将\
    \ \"log4j.properties\" 文件放在这些位置之一。例如，您可以决定将其放在 \"WEB-INF/classes\" 目录中。\n\n3.\
    \  指定 Tomcat 可以在哪里找到上一节中显示的 log4j 配置文件。\n\n4.  将 \"log4j.properties\" 文件作为系统变量传递给\
    \ Tomcat 的执行环境。\n\n5.  转到 \"%TOMCAT_HOME%\\bin\" 中的 \"tomcat.bat\" 文件。\n\n6. \
    \ 添加一个条目，将 classpath 变量设置为指向包含 \"log4j.properties\" 文件的目录。对于此示例，该条目可能如下所示：\n\n\
    \    ```\n    set CP=%CP%;C:\\Jakarta-tomcat-3.2.1\\webapps\\\n          TestLogTags\\\
    WEB-INF\\classes\n    ```\n\n7.  将以下条目添加到 \"tomcat.bat\" 文件中：\n\n    ```\n   \
    \ set TOMCAT_OPTS=-Dlog4j.configuration=log4j.properties\n    ```\n\n|  | 注意 \
    \ | 我们也可以通过初始化 servlet 来配置 log4j。有关此主题的更多信息，请参阅第 5 章。 |\n\n这就是我们在运行示例之前需要做的所有事情，接下来我们将看到如何运行它。\n"
- fmt: "### The Log Example in Action\n\nNow start up Tomcat and access the JSP page,\
    \ as shown in [Figure 9-1](#LiB0069.html#ch09fig01). Tomcat will load the `log4j.properties`\
    \ file, and `Log` will use this configuration file to print the logging information.\n\
    \n[![Click To expand](fig9-1.jpg)](fig9-1_0.jpg)  \nFigure 9-1: The SimpleLog.jsp\
    \ page\n\nIf we now look at the Tomcat console, we will see the following logging\
    \ information printed:\n\n```\nDEBUG [Thread-11] (LoggerTag.java:109) - Message\
    \ embedded within open and\nclose tags.\nDEBUG [Thread-11] (LoggerTag.java:97)\
    \ - Message passed as an attribute to\nthe tag\n INFO [Thread-11] (LoggerTag.java:109)\
    \ - Using category attribute.\n```\n\n## Using a Custom Logger with the Log Tag\
    \ Library\n\nIn the JSP listed in [Listing 9-1](#LiB0069.html#640), we use the\
    \ `<log:info>` tag with the `category` attribute specified as `test`. This is\
    \ the name of the logger to be produced as part of the logging information. If\
    \ we change the output pattern for the logging information to include information\
    \ about the logger, we will see the category `test` appearing as part of the logging\
    \ output. The whole point of specifying the `category` attribute is to be able\
    \ to include a different set of configuration parameters for the category or logger.\n\
    \n[Listing 9-3](#LiB0070.html#ch09ls03) presents a modified `log4j.properties`\
    \ file that includes configuration for the category named `test`.\n\nListing 9-3:\
    \ Modified log4j.properties File\n\n| **![Start example](_1.gif)** |\n\n```\n\
    # Sample properties to initialize log4j\nlog4j.rootCategory=debug, stdout\nlog4j.logger.test=debug,\
    \ R\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\nlog4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\
    \n# Pattern to output the caller's file name and line number.\nlog4j.appender.stdout.layout.ConversionPattern=%5p\
    \ [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
    log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# Keep\
    \ one backup file\nlog4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\n| **![End example](_1.gif)**\
    \ |\n\nThis configuration file defines the configuration for the logger `test`.\
    \ The `test` logger has a threshold level of DEBUG and uses a `RollingFileAppender`\
    \ object to print logging information to a file named `logtags.log`. Notice that\
    \ the `conversionPattern` to format the logging information includes the name\
    \ of the logger (`%c`).\n\nUsing this configuration file for `Log` will write\
    \ information to the `logtags.log` file in the `%TOMCAT_HOME%\\bin` directory.\
    \ If we execute the example JSP with this modified configuration file, we will\
    \ see the following output in the `logtags.log` file:\n\n```\n DEBUG Thread-11\
    \ root - Message embedded within open and close <log> tags.\nDEBUG Thread-11 root\
    \ - Message passed as an attribute to the <log> tag\nINFO Thread-11 test - Hello\
    \ how are you?\n```\n\nThis is how we can use different loggers with custom configuration\
    \ to handle logging information. If we specify the `category` attribute in the\
    \ JSP but do not specify a configuration for it, `Log` will use the root logger\
    \ configuration to handle the logging request.\n\n## Description of Log Tags\n\
    \nThe `Log` tag library provides tags corresponding to the levels declared in\
    \ log4j. [Table 9-1](#LiB0071.html#ch09table01) summarizes all the `Log` tag library\
    \ tags and their attributes.\n\nTable 9-1: Summary of Log Tags\n\n| Tag Name |\
    \ Tag Description | Attribute Name | Required |\n| --- | --- | --- | --- |\n|\
    \ `debug` | Displays a DEBUG-level message | `category` `message` | No No |\n\
    | `info` | Displays an INFO-level message | `category` `message` | No No |\n|\
    \ `warn` | Displays a WARN-level message | `category` `message` | No No |\n| `error`\
    \ | Displays an ERROR-level message | `category` `message` | No No |\n| `fatal`\
    \ | Displays a FATAL-level message | `category` `message` | No No |\n| `dump`\
    \ | Displays all the variables in a specified scope | `scope` | Yes |\n\nAs you\
    \ can see, the use of these `Log` tags is very simple. All the tags except `dump`\
    \ have two optional attributes, `category` and `message`. It is possible to specify\
    \ the logging information as a value of the `message` attribute or by enclosing\
    \ it within the tag. For example, we can use the `error` tag in following two\
    \ ways:\n\n```\n<log:error message=\"This is an error message\"> </log:error>\n\
    <log:error>This is an error message</log:error>\n```\n\nThe `dump` tag mentioned\
    \ in [Table 9-1](#LiB0071.html#ch09table01) is designed to print all variables\
    \ within the scope specified through the `scope` attribute. [Listing 9-4](#LiB0071.html#ch09ls04),\
    \ `SimpleLogDump.jsp`, is a modified version of the JSP in [Listing 9-1](#LiB0069.html#640)\
    \ and adds a `dump` tag within the page.\n\nListing 9-4: SimpleLogDump.jsp\n\n\
    | **![Start example](_1.gif)** |\n\n```\n<html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\"\
    \ prefix=\"log\" %>\n<BODY>\n<h1>Test Log Tag Library</h1>\n<log:debug>Message\
    \ embedded within open and close tags.</log:debug>\n<log:debug message=\"Message\
    \ passed as an attribute to the tag\" />\n<log:info category=\"test\">Using category\
    \ attribute.</log:info>\nYou should see output in the debug logs now.\n<H4>request</H4>\n\
    <log:dump scope=\"request\" />\n<H4>page</H4>\n<log:dump scope=\"page\" />\n<H4>session</H4>\n\
    <log:dump scope=\"session\" />\n<H4>application</H4>\n<log:dump scope=\"application\"\
    \ />\n</BODY>\n</html>\n```\n\n| **![End example](_1.gif)** |\n\nIn this JSP,\
    \ we are displaying the output of the `dump` tag with all the possible `scope`\
    \ attribute values. [Figure 9-2](#LiB0071.html#ch09fig02) shows what is displayed\
    \ on the page.\n\n[![Click To expand](fig9-2.jpg)](fig9-2_0.jpg)  \nFigure 9-2:\
    \ The SimpleLogDump.jsp page\n\n## Creating Custom Tags with the Log Tag Library\
    \ to Use a Custom Level\n\nIn [Chapter 8](#LiB0060_split_000.html#525), we saw\
    \ how to write a custom `Level` class, TRACE, and use it with log4j. If we want\
    \ to use the TRACE custom level along with the `Log` tag library, we have to extend\
    \ the `Log` tag library framework. Typically, we can do so by performing these\
    \ tasks:\n\n*   Write a new `Tag` class to represent the custom level TRACE.\n\
    *   Make the new `Tag` and `Level` classes available to the application.\n*  \
    \ Modify the `taglib-descriptor` file to describe the new tag.\n\nIn the next\
    \ sections, we will examine how we can achieve these tasks to use the TRACE level\
    \ with the `Log` tag library."
  raw: "### The Log Example in Action\n\nNow start up Tomcat and access the JSP page,\
    \ as shown in [Figure 9-1](#LiB0069.html#ch09fig01). Tomcat will load the \"log4j.properties\"\
    \ file, and `Log` will use this configuration file to print the logging information.\n\
    \n[![Click To expand](fig9-1.jpg)](fig9-1_0.jpg)\nFigure 9-1: The SimpleLog.jsp\
    \ page\n\nIf we now look at the Tomcat console, we will see the following logging\
    \ information printed:\n\n```\nDEBUG [Thread-11] (LoggerTag.java:109) - Message\
    \ embedded within open and\nclose tags.\nDEBUG [Thread-11] (LoggerTag.java:97)\
    \ - Message passed as an attribute to\nthe tag\n INFO [Thread-11] (LoggerTag.java:109)\
    \ - Using category attribute.\n```\n\n## Using a Custom Logger with the Log Tag\
    \ Library\n\nIn the JSP listed in [Listing 9-1](#LiB0069.html#640), we use the\
    \ `<log:info>` tag with the `category` attribute specified as `test`. This is\
    \ the name of the logger to be produced as part of the logging information. If\
    \ we change the output pattern for the logging information to include information\
    \ about the logger, we will see the category `test` appearing as part of the logging\
    \ output. The whole point of specifying the `category` attribute is to be able\
    \ to include a different set of configuration parameters for the category or logger.\n\
    \n[Listing 9-3](#LiB0070.html#ch09ls03) presents a modified \"log4j.properties\"\
    \ file that includes configuration for the category named `test`.\n\nListing 9-3:\
    \ Modified log4j.properties File\n\n| **![Start example](_1.gif)** |\n\n```\n\
    # Sample properties to initialize log4j\nlog4j.rootCategory=debug, stdout\nlog4j.logger.test=debug,\
    \ R\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\nlog4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\
    \n# Pattern to output the caller's file name and line number.\nlog4j.appender.stdout.layout.ConversionPattern=%5p\
    \ [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
    log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# Keep\
    \ one backup file\nlog4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nThis configuration file defines the configuration for the logger\
    \ `test`. The `test` logger has a threshold level of DEBUG and uses a `RollingFileAppender`\
    \ object to print logging information to a file named \"logtags.log\". Notice\
    \ that the `conversionPattern` to format the logging information includes the\
    \ name of the logger (`%c`).\n\nUsing this configuration file for `Log` will write\
    \ information to the \"logtags.log\" file in the \"%TOMCAT_HOME%\\bin\" directory.\
    \ If we execute the example JSP with this modified configuration file, we will\
    \ see the following output in the \"logtags.log\" file:\n\n```\n DEBUG Thread-11\
    \ root - Message embedded within open and close <log> tags.\nDEBUG Thread-11 root\
    \ - Message passed as an attribute to the <log> tag\nINFO Thread-11 test - Hello\
    \ how are you?\n```\n\nThis is how we can use different loggers with custom configuration\
    \ to handle logging information. If we specify the `category` attribute in the\
    \ JSP but do not specify a configuration for it, `Log` will use the root logger\
    \ configuration to handle the logging request.\n\n## Description of Log Tags\n\
    \nThe `Log` tag library provides tags corresponding to the levels declared in\
    \ log4j. [Table 9-1](#LiB0071.html#ch09table01) summarizes all the `Log` tag library\
    \ tags and their attributes.\n\nTable 9-1: Summary of Log Tags\n\n| Tag Name |\
    \ Tag Description | Attribute Name | Required |\n| --- | --- | --- | --- |\n|\
    \ `debug` | Displays a DEBUG-level message | `category message` | No No |\n| `info`\
    \ | Displays an INFO-level message | `category message` | No No |\n| `warn` |\
    \ Displays a WARN-level message | `category message` | No No |\n| `error` | Displays\
    \ a ERROR-level message | `category message` | No~ No |\n| `fatal` | Displays\
    \ a FATAL-level message | `category message` | No No |\n| `dump` | Displays all\
    \ the variables in a specified scope | `scope` | Yes |\n\nAs you can see, the\
    \ use of these `Log` tags is very simple. All the tags except `dump` have two\
    \ optional attributes, `category` and `message`. It is possible to specify the\
    \ logging information as a value of the `message` attribute or by enclosing it\
    \ within the tag. For example, we can use the `error` tag in following two ways:\n\
    \n```\n<log:error message=\"This is an error message\"> </log:error>\n<log:error>This\
    \ is an error message</log:error>\n```\n\nThe `dump` tag mentioned in [Table 9-1](#LiB0071.html#ch09table01)\
    \ is designed to print all variables within the scope specified through the `scope`\
    \ attribute. [Listing 9-4](#LiB0071.html#ch09ls04), `SimpleLogDump.jsp`, is a\
    \ modified version of the JSP in [Listing 9-1](#LiB0069.html#640) and adds a `dump`\
    \ tag within the page.\n\nListing 9-4: SimpleLogDump.jsp\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\n<html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\"\
    \ prefix=\"log\" %>\n<BODY>\n<h1>Test Log Tag Library</h1>\n<log:debug>Message\
    \ embedded within open and close tags.</log:debug>\n<log:debug message=\"Message\
    \ passed as an attribute to the tag\" />\n<log:info category=\"test\">Using category\
    \ attribute.</log:info>\nYou should see output in the debug logs now.\n<H4>request</H4>\n\
    <log:dump scope=\"request\" />\n<H4>page</H4>\n<log:dump scope=\"page\" />\n<H4>session</H4>\n\
    <log:dump scope=\"session\" />\n<H4>application</H4>\n<log:dump scope=\"application\"\
    \ />\n</BODY>\n</html>\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nIn this\
    \ JSP, we are displaying the output of the `dump` tag with all the possible `scope`\
    \ attribute values. [Figure 9-2](#LiB0071.html#ch09fig02) shows what is displayed\
    \ on the page.\n\n[![Click To expand](fig9-2.jpg)](fig9-2_0.jpg)\nFigure 9-2:\
    \ The SimpleLogDump.jsp page\n\n## Creating Custom Tags with the Log Tag Library\
    \ to Use a Custom Level\n\nIn [Chapter 8](#LiB0060_split_000.html#525), we saw\
    \ how to write a custom `Level` class, TRACE, and use it with log4j. If we want\
    \ to use the TRACE custom level along with the `Log` tag library, we have to extend\
    \ the `Log` tag library framework. Typically, we can do so by performing these\
    \ tasks:\n\n*   Write a new `Tag` class to represent the custom level TRACE.\n\
    \n*   Make the new `Tag` and `Level` classes available to the application.\n\n\
    *   Modify the \"taglib-descriptor\" file to describe the new tag.\n\nIn the next\
    \ sections, we will examine how we can achieve these tasks to use the TRACE level\
    \ with the `Log` tag library."
  trans: "\n### 日志示例的实际应用\n\n现在启动 Tomcat 并访问该 JSP 页面，如图 Figure 9-1 所示。Tomcat 将加载 \"\
    log4j.properties\" 文件，而 `Log` 将使用此配置文件来打印日志信息。\n\n![点击展开](img/fig9-1_0.jpg)\n\
    图 9-1：SimpleLog.jsp 页面\n\n如果我们现在查看 Tomcat 控制台，将会看到以下日志信息被打印出来：\n\n```\nDEBUG [Thread-11]\
    \ (LoggerTag.java:109) - Message embedded within open and\nclose tags.\nDEBUG\
    \ [Thread-11] (LoggerTag.java:97) - Message passed as an attribute to\nthe tag\n\
    \ INFO [Thread-11] (LoggerTag.java:109) - Using category attribute.\n```\n\n##\
    \ 在日志标签库中使用自定义日志记录器\n\n在 Listing 9-1 列出的 JSP 中，我们使用了 `<log:info>` 标签，并将 `category`\
    \ 属性指定为 `test`。这是作为日志信息一部分生成的日志记录器的名称。如果我们更改日志信息的输出模式以包含日志记录器的信息，我们将看到类别 `test`\
    \ 作为日志输出的一部分出现。指定 `category` 属性的全部意义在于能够为该类别或日志记录器包含一组不同的配置参数。\n\nListing 9-3\
    \ 展示了一个修改后的 \"log4j.properties\" 文件，其中包含了名为 `test` 的类别的配置。\n\nListing 9-3: 修改后的\
    \ log4j.properties 文件\n\n| **![开始示例](img/_1.gif)** |\n\n```\n# Sample properties\
    \ to initialize log4j\nlog4j.rootCategory=debug, stdout\nlog4j.logger.test=debug,\
    \ R\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\nlog4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\
    \n# Pattern to output the caller's file name and line number.\nlog4j.appender.stdout.layout.ConversionPattern=%5p\
    \ [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
    log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# Keep\
    \ one backup file\nlog4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n此配置文件定义了日志记录器 `test` 的配置。`test` 日志记录器的阈值级别为 DEBUG，并使用 `RollingFileAppender`\
    \ 对象将日志信息打印到名为 \"logtags.log\" 的文件中。请注意，用于格式化日志信息的 `conversionPattern` 包含了日志记录器的名称（`%c`）。\n\
    \n将此配置文件用于 `Log` 会将信息写入 \"%TOMCAT_HOME%\\bin\" 目录下的 \"logtags.log\" 文件中。如果我们使用此修改后的配置文件执行示例\
    \ JSP，我们将在 \"logtags.log\" 文件中看到以下输出：\n\n```\n DEBUG Thread-11 root - Message\
    \ embedded within open and close <log> tags.\nDEBUG Thread-11 root - Message passed\
    \ as an attribute to the <log> tag\nINFO Thread-11 test - Hello how are you?\n\
    ```\n\n这就是我们如何使用具有自定义配置的不同日志记录器来处理日志信息。如果我们在 JSP 中指定了 `category` 属性，但没有为其指定配置，`Log`\
    \ 将使用根日志记录器配置来处理日志请求。\n\n## 日志标签描述\n\n`Log` 标签库提供了与 log4j 中声明的级别相对应的标签。Table 9-1\
    \ 总结了所有 `Log` 标签库的标签及其属性。\n\n表 9-1：日志标签汇总\n\n| 标签名称 | 标签描述 | 属性名称 | 是否必需 |\n|\
    \ --- | --- | --- | --- |\n| `debug` | 显示 DEBUG 级别的消息 | `category message` | 否\
    \ 否 |\n| `info` | 显示 INFO 级别的消息 | `category message` | 否 否 |\n| `warn` | 显示 WARN\
    \ 级别的消息 | `category message` | 否 否 |\n| `error` | 显示 ERROR 级别的消息 | `category message`\
    \ | 否~ 否 |\n| `fatal` | 显示 FATAL 级别的消息 | `category message` | 否 否 |\n| `dump`\
    \ | 显示指定范围内的所有变量 | `scope` | 是 |\n\n如您所见，这些 `Log` 标签的使用非常简单。除 `dump` 之外的所有标签都有两个可选属性：`category`\
    \ 和 `message`。可以将日志信息指定为 `message` 属性的值，也可以将其包含在标签内。例如，我们可以通过以下两种方式使用 `error`\
    \ 标签：\n\n```\n<log:error message=\"This is an error message\"> </log:error>\n\
    <log:error>This is an error message</log:error>\n```\n\nTable 9-1 中提到的 `dump`\
    \ 标签旨在打印通过 `scope` 属性指定的范围内的所有变量。Listing 9-4 `SimpleLogDump.jsp` 是 Listing 9-1\
    \ 中 JSP 的修改版本，并在页面中添加了一个 `dump` 标签。\n\nListing 9-4: SimpleLogDump.jsp\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\n<html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\"\
    \ prefix=\"log\" %>\n<BODY>\n<h1>Test Log Tag Library</h1>\n<log:debug>Message\
    \ embedded within open and close tags.</log:debug>\n<log:debug message=\"Message\
    \ passed as an attribute to the tag\" />\n<log:info category=\"test\">Using category\
    \ attribute.</log:info>\nYou should see output in the debug logs now.\n<H4>request</H4>\n\
    <log:dump scope=\"request\" />\n<H4>page</H4>\n<log:dump scope=\"page\" />\n<H4>session</H4>\n\
    <log:dump scope=\"session\" />\n<H4>application</H4>\n<log:dump scope=\"application\"\
    \ />\n</BODY>\n</html>\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在此 JSP 中，我们展示了\
    \ `dump` 标签在所有可能的 `scope` 属性值下的输出。Figure 9-2 显示了页面上显示的内容。\n\n![点击展开](img/fig9-2_0.jpg)\n\
    图 9-2：SimpleLogDump.jsp 页面\n\n## 使用日志标签库创建自定义标签以使用自定义级别\n\n在 第 8 章 中，我们了解了如何编写自定义的\
    \ `Level` 类 TRACE，并将其与 log4j 一起使用。如果我们想将 TRACE 自定义级别与 `Log` 标签库一起使用，则必须扩展 `Log`\
    \ 标签库框架。通常，我们可以通过执行以下任务来实现：\n\n*   编写一个新的 `Tag` 类来表示自定义级别 TRACE。\n*   使新的 `Tag`\
    \ 和 `Level` 类对应用程序可用。\n*   修改 \"taglib-descriptor\" 文件以描述新标签。\n\n在接下来的章节中，我们将探讨如何实现这些任务，以便将\
    \ TRACE 级别与 `Log` 标签库一起使用。\n"
- fmt: "### Creating a New Tag\n\nIn the `Log` tag library world, all tag classes\
    \ subclass from the `abstract` class `LoggerTag`. The `LoggerTag` class itself\
    \ is a subclass of the `BodyTagSupport` class and does the entire job of handling\
    \ tag-related operations. It also defines an `abstract` method, `getPriority()`,\
    \ that is implemented in all other subclasses of the `LoggerTag` class. All other\
    \ tag classes such as `ErrorTag`, `InfoTag`, etc., are subclasses of `LoggerTag`\
    \ and provide implementations for the `getPriority()` method. Thus, to define\
    \ a new tag, we simply need to extend the `LoggerTag` class and provide an implementation\
    \ of the `getPriority()` method that returns the custom level `TRACE`. [Listing\
    \ 9-5](#LiB0072.html#ch09ls05), `TraceTag.java`, demonstrates how to write a custom\
    \ tag using the custom level `TRACE`.\n\n**Listing 9-5: TraceTag.java**\n\n```\n\
    package com.apress.logging.log4j.customtag;\n\nimport org.apache.taglibs.log.LoggerTag;\n\
    import org.apache.log4j.Priority;\nimport com.apress.logging.log4j.CustomLevel;\n\
    \npublic class TraceTag extends LoggerTag\n{\n    protected Priority getPriority()\n\
    \    {\n        return CustomLevel.TRACE;\n    }\n}\n```\n\nTo develop this custom\
    \ tag, we reuse the custom level `TRACE` developed in [Chapter 8](#LiB0060_split_000.html#525)\
    \ (refer to [Listing 8-9](#LiB0063.html#578)). As you can see, creating a new\
    \ tag to use a new level is straightforward. [Listing 9-6](#LiB0072.html#ch09ls06)\
    \ shows the tag library description that needs to be added to the existing `taglibs-log.tld`\
    \ file. (This file is shipped with the `Log` distribution.)\n\n**Listing 9-6:\
    \ Tag Description for the Custom Trace Tag**\n\n```\n <tag>\n    <name>trace</name>\n\
    \    <tagclass>com.apress.logging.log4j.customtag.TraceTag</tagclass>\n    <attribute>\n\
    \      <name>category</name>\n      <required>false</required>\n      <rtexprvalue>true</rtexprvalue>\n\
    \    </attribute>\n    <attribute>\n      <name>message</name>\n      <required>false</required>\n\
    \      <rtexprvalue>true</rtexprvalue>\n    </attribute>\n</tag>\n```\n\n> **Note:**\
    \ The name of the tag is specified as `trace`. Therefore, within a JSP, we need\
    \ to use the name `trace` to access this tag.\n\n### Custom Trace Tag in Action\n\
    \nOnce we have the tag class for the level `TRACE` ready and also modify the `taglibs-log.tld`\
    \ file to incorporate the definition of the new `trace` tag, we can start using\
    \ it in a JSP. In order to set up Tomcat to use this new tag, we will need to\
    \ go through the following steps:\n\n1. Copy the required new `TraceTag` and `CustomLevel`\
    \ class in the appropriate directory structure within the Web application. For\
    \ example, if the Web application directory is `TestLogTags`, then the appropriate\
    \ package structure for the classes will need to be created under the `TestLogTags\\\
    WEB-INF\\classes` directory.\n\n2. Edit the `Tomcat.bat` file to include the `taglibs-log.jar`\
    \ file in the classpath.\n\n3. Modify the `log4j.properties` file to set the threshold\
    \ level to `TRACE`. The default threshold level set for the root logger is `DEBUG`,\
    \ which is above the level of `TRACE`. So with default configuration, `TRACE`-level\
    \ messages will not be published. [Listing 9-7](#LiB0072.html#ch09ls07) presents\
    \ the modified `log4j.properties` file for using the `TRACE` level.\n\n**Listing\
    \ 9-7: Modified log4j.properties File for Using the TRACE Level**\n\n```\nlog4j.rootCategory=trace#com.apress.logging.log4j.CustomLevel,\
    \ stdout\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\nlog4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\
    \n# Pattern to output the caller's file name and line number.\nlog4j.appender.stdout.layout.ConversionPattern=%5p\
    \ [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
    log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# Keep\
    \ one backup file\nlog4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\nWith these settings\
    \ in place, execute the JSP presented in [Listing 9-8](#LiB0072.html#ch09ls08).\
    \ This JSP includes a `TRACE`-level message.\n\n**Listing 9-8: SimpleLogTrace.jsp**\n\
    \n```\n<html>\n<%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\" prefix=\"\
    log\" %>\n<BODY>\n<h1>Test Log Tag Library</h1>\n<log:trace>Trace level message.</log:trace>\n\
    You should see output in the debug logs now.\n</BODY>\n</html>\n```\n\nExecuting\
    \ this JSP will produce the following message with the `TRACE` level in the Web\
    \ server console:\n\n```\nTRACE [Thread-11] (LoggerTag.java:109) - Trace level\
    \ message.\n```\n\n## Conclusion\n\nIn this chapter, we discussed a newly released\
    \ tag library, `Log`, from Apache, for using log4j within a JSP to perform logging.\
    \ This solves the age-old problem of having controlled logging from within a JSP.\
    \ By changing the configuration, it is possible to redirect logging information\
    \ to any preferred destination in any desired format. But careful consideration\
    \ is required before you include in your Web application CPU-intensive logging\
    \ operations such as writing logging data to a database, as it might affect the\
    \ performance of that application.\n\nThis brings us to the end of the log4j discussion.\
    \ All the topics explained in [Chapters 5](#LiB0032_split_000.html#266) through\
    \ [9](#LiB0067_split_000.html#634) should help you understand the internals of\
    \ log4j and how to use it in practical applications. The smaller examples provided\
    \ should enable you to grasp the concepts presented and see quick results to better\
    \ understand the use of log4j. The more extensive examples should help you to\
    \ correlate the use of log4j with real-life applications.\n\nThere is always one\
    \ more thing to learn about any topic. But we have created a skeleton and given\
    \ it a shape, and now you are in a position to build on it. But before we finish,\
    \ we will definitely need to look at some of the best practices involved in using\
    \ different logging APIs in the [next chapter](#LiB0074_split_000.html#672).\n\
    \n# Chapter 10: Best Practices"
