    \ In the context of log4j, the class diagram in [Figure 5-3](#LiB0041.html#ch05fig03)\
    \ depicts the relationship of `Appender` objects and how they are organized.\n\
    \n[![Click To expand](fig5-3.jpg)](fig5-3_0.jpg)\nFigure 5-3: The Appender class\
    \ hierarchy in log4j\n\nEach `Appender` object has different properties associated\
    \ with it, and these properties indicate the behavior of that object. In general,\
    \ `Appender` objects will have the following properties:\n\n*   `layout`: Each\
    \ `Appender` object needs to know how to format the logging information passed\
    \ to it. It uses the `Layout` objects and the conversion pattern associated with\
