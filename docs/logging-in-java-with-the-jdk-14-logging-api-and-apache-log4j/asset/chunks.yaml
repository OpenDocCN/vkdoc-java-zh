- fmt: "# Filter Object\n\nThe process of making decisions about printing the logging\
    \ information associated with each logging request is known as filtering. The\
    \ decision whether to accept or reject a particular logging request can be taken\
    \ at several stages of the whole logging process. Typically, the application developer\
    \ can decide whether to log certain information and reject the rest. From the\
    \ point of view of log4j, the filtering of log requests can be based on the level\
    \ or any other application-specific criteria.\n\nThe `Filter` objects help to\
    \ filter logging requests by analyzing the information encapsulated within the\
    \ `LoggingEvent` object. `org.apache.log4j.spi.Filter` is an `abstract` class\
    \ and the base class for all other `Filter` objects that can be present within\
    \ the log4j framework. It defines an `abstract` method, `public int decide(LoggingEvent\
    \ event)`, that is overridden by all the `Filter` subclasses. The `decide()` method\
    \ does the analysis on the `LoggingEvent` object and returns an integer value\
    \ indicating the result of the analysis. The `Filter` objects are organized in\
    \ a linear chain in a sequential manner, and they are invoked sequentially. It\
    \ is possible to add or remove any `Filter` object from the chain.\n\nThe filtering\
    \ process within log4j typically follows these steps:\n\n1. The application makes\
    \ a logging request by invoking one of the logging methods of the `Logger` object.\n\
    2. The `Logger` object internally constructs a `LoggingEvent` object by encapsulating\
    \ the logging message and other logging-related information.\n3. The `Logger`\
    \ object then passes the `LoggingEvent` object to any `Appender` object associated\
    \ with it.\n4. The `Appender` object then passes the `LoggingEvent` object to\
    \ any of the `Filter` objects associated with it.\n5. The `Filter` objects decide\
    \ on the validity of the logging request based on any predefined criteria and\
    \ return an integer value indicating the result of the analysis. Each `Filter`\
    \ object can possibly return three integer values:\n   * If the integer value\
    \ `DENY` is returned, then the logging request is stopped without passing it to\
    \ any other `Filter` object in the chain.\n   * If the integer value `ACCEPT`\
    \ is returned, the logging request is accepted, and logging information is published\
    \ without consulting any other `Filter` in the chain.\n   * If the integer value\
    \ `NEUTRAL` is returned, the next `Filter` in the chain is consulted.\n6. If there\
    \ are no more `Filter` objects in the chain, then the log event is logged.\n\n\
    The `Filter` objects are configurable only through `DOMConfigurator`. However,\
    \ the `PropertyConfigurator` object does not support `DOMConfigurator` at the\
    \ moment, which means these objects can only be configured through an XML configuration\
    \ file instead of a properties-style configuration file. But it is possible to\
    \ instantiate a `Filter` object and add it to the filter chain using the `addFilter(Filter\
    \ filter)` method of any `Appender` object.\n\nIn the \"[A Complete Example](#LiB0045.html#376)\"\
    \ section, we will see an example of using log4j in a real-life application. In\
    \ the example, we will all also see how custom `Filter` objects can be used effectively\
    \ to achieve desired logging activity.\n\n# Layout Object\n\nAs we have learned\
    \ in the previous sections, `Logger` objects and `Appender` objects are the heart\
    \ and soul of the log4j framework. Those objects capture the logging request and\
    \ encapsulate the logging information, and are capable of sending the logging\
    \ output to various destinations. But in order to convert logging information\
    \ to any human-readable pattern, `Appender` objects use `Layout` objects to format\
    \ the logging information. The layout of the logging information is quite important\
    \ in the light of future analysis of this information. We will discuss in great\
    \ detail the different `Layout` objects available in log4j in [Chapter 6](#LiB0047_split_000.html#389).\n\
    \n# ObjectRenderer\n\nThe logging information that we intend to publish can be\
    \ of various types and in various formats. Typically, in an object-oriented application\
    \ where several objects hold data and interact with each other, more often than\
    \ not we need to publish whole objects and their contents in a human-readable\
    \ format. Inspecting the current status of the object and the attribute values\
    \ a particular object holds makes it easier to understand how that object is behaving\
    \ in response to certain messages sent to it and possible to define the corrective\
    \ actions required in case it is not behaving appropriately.\n\nIn the context\
    \ of log4j, a `Logger` class has several logging methods, all of which can accept\
    \ an `Object` argument as the logging message. This `Object` argument can be a\
    \ simple `String` representing the exact text information we wish to publish or\
    \ a custom `Object` such as a `Customer`, a `Person`, etc. When we pass a custom\
    \ `Object` to be logged, the intention is to publish the state and the content\
    \ of the object. The `org.apache.log4j.or.ObjectRenderer` interface defines the\
    \ way to associate any `ObjectRenderer` with any `Object` and obtain a `String`\
    \ representation of the content of the object.\n\n`Layout` objects call the `ObjectRenderer`\
    \ to obtain a `String` representation of the `Object` content before they attempt\
    \ to format the `Object` argument passed to the `Logger`. If the message argument\
    \ is passed to the `Logger` is a `String`, no `ObjectRenderer` is required to\
    \ convert the message, and the `Layout` object processes the message.\n\nThe `ObjectRenderer`\
    \ objects can only be configured with `DOMConfigurator` and thereby can be defined\
    \ in an XML-style configuration file. The configuration information of a `ObjectRenderer`\
    \ defines the rendering class, which is an implementation of the `org.apache.log4j.or.ObjectRenderer`\
    \ interface, and also defines the rendered class, which is the custom `Object`\
    \ that needs to be rendered as a `String` representation. The section \"[A Complete\
    \ Example](#LiB0045.html#376)\" will demonstrate the use of a custom `ObjectRenderer`."
  raw: "## Filter Object\n\nThe process of making decisions about printing the logging\
    \ information associated with each logging request is known as filtering. The\
    \ decision whether to accept or reject a particular logging request can be taken\
    \ at several stages of the whole logging process. Typically, the application developer\
    \ can decide whether to log certain information and reject the rest. From the\
    \ point of view of log4j, the filtering of log requests can be based on the level\
    \ or any other application-specific criteria.\n\nThe `Filter` objects help to\
    \ filter logging requests by analyzing the information encapsulated within the\
    \ `LoggingEvent` object. `org.apache.log4j.spi.Filter` is an `abstract` class\
    \ and the base class for all other `Filter` objects that can be present within\
    \ the log4j framework. It defines an `abstract` method, `public int decide(LoggingEvent\
    \ event)`, that is overridden by all the `Filter` subclasses. The `decide()` method\
    \ does the analysis on the `LoggingEvent` object and returns an integer value\
    \ indicating the result of the analysis. The `Filter` objects are organized in\
    \ a linear chain in a sequential manner, and they are invoked sequentially. It\
    \ is possible to add or remove any `Filter` object from the chain.\n\nThe filtering\
    \ process within log4j typically follows these steps:\n\n1.  The application makes\
    \ a logging request by invoking one of the logging methods of the `Logger` object.\n\
    \n2.  The `Logger` object internally constructs a `LoggingEvent` object by encapsulating\
    \ the logging message and other logging-related information.\n\n3.  The `Logger`\
    \ object then passes the `LoggingEvent` object to any `Appender` object associated\
    \ with it.\n\n4.  The `Appender` object then passes the `LoggingEvent` object\
    \ to any of the `Filter` objects associated with it.\n\n5.  The `Filter` objects\
    \ decide on the validity of the logging request based on any predefined criteria\
    \ and return an integer value indicating the result of the analysis. Each `Filter`\
    \ object can possibly return three integer values:\n\n    *   If the integer value\
    \ DENY is returned, then the logging request is stopped without passing it to\
    \ any other `Filter` object in the chain.\n\n    *   If the integer value ACCEPT\
    \ is returned, the logging request is accepted, and logging information is published\
    \ without consulting any other `Filter` in the chain.\n\n    *   If the integer\
    \ value NEUTRAL is returned, the next `Filter` in the chain is consulted.\n\n\
    6.  If there are no more `Filter` objects in the chain, then the log event is\
    \ logged.\n\nThe `Filter` objects are configurable only through `DOMConfigurator`.\
    \ However, the `PropertyConfigurator` object does not support `DOMConfigurator`\
    \ at the moment, which means these objects can only be configured through an XML\
    \ configuration file instead of a properties-style configuration file. But it\
    \ is possible to instantiate a `Filter` object and add it to the filter chain\
    \ using the `addFilter(Filter filter)` method of any `Appender` object.\n\nIn\
    \ the \"[A Complete Example](#LiB0045.html#376)\" section, we will see an example\
    \ of using log4j in a real-life application. In the example, we will all also\
    \ see how custom `Filter` objects can be used effectively to achieve desired logging\
    \ activity.\n\n## Layout Object\n\nAs we have learned in the previous sections,\
    \ `Logger` objects and `Appender` objects are the heart and soul of the log4j\
    \ framework. Those objects capture the logging request and encapsulate the logging\
    \ information, and are capable of sending the logging output to various destinations.\
    \ But in order to convert logging information to any human-readable pattern, `Appender`\
    \ objects use `Layout` objects to format the logging information. The layout of\
    \ the logging information is quite important in the light of future analysis of\
    \ this information. We will discuss in great detail the different `Layout` objects\
    \ available in log4j in [Chapter 6](#LiB0047_split_000.html#389).\n\n## ObjectRenderer\n\
    \nThe logging information that we intend to publish can be of various types and\
    \ in various formats. Typically, in an object-oriented application where several\
    \ objects hold data and interact with each other, more often than not we need\
    \ to publish whole objects and their contents in a human-readable format. Inspecting\
    \ the current status of the object and the attribute values a particular object\
    \ holds makes it easier to understand how that object is behaving in response\
    \ to certain messages sent to it and possible to define the corrective actions\
    \ required in case it is not behaving appropriately.\n\nIn the context of log4j,\
    \ a `Logger` class has several logging methods, all of which can accept an `Object`\
    \ argument as the logging message. This `Object` argument can be a simple `String`\
    \ representing the exact text information we wish to publish or a custom `Object`\
    \ such as a `Customer`, a `Person`, etc. When we pass a custom `Object` to be\
    \ logged, the intention is to publish the state and the content of the object.\
    \ The `org.apache.log4j.or.ObjectRenderer` interface defines the way to associate\
    \ any `ObjectRenderer` with any `Object` and obtain a `String` representation\
    \ of the content of the object.\n\n`Layout` objects call the `ObjectRenderer`\
    \ to obtain a `String` representation of the `Object` content before they attempt\
    \ to format the `Object` argument passed to the `Logger`. If the message argument\
    \ is passed to the `Logger` is a `String`, no `ObjectRenderer` is required to\
    \ convert the message, and the `Layout` object processes the message.\n\nThe `ObjectRenderer`\
    \ objects can only be configured with `DOMConfigurator` and thereby can be defined\
    \ in an XML-style configuration file. The configuration information of a `ObjectRenderer`\
    \ defines the rendering class, which is an implementation of the `org.apache.log4j.or.ObjectRenderer`\
    \ interface, and also defines the rendered class, which is the custom `Object`\
    \ that needs to be rendered as a `String` representation. The section \"[A Complete\
    \ Example](#LiB0045.html#376)\" will demonstrate the use of a custom `ObjectRenderer`."
  trans: "\n## 过滤器对象\n\n对每条日志请求是否打印相关信息进行决策的过程称为过滤。在整个日志记录过程中，可以在多个阶段决定接受或拒绝特定的日志请求。通常，应用程序开发者可以决定记录某些信息并拒绝其余信息。从\
    \ log4j 的角度来看，日志请求的过滤可以基于级别或任何其他特定于应用程序的标准。\n\n`Filter` 对象通过分析封装在 `LoggingEvent`\
    \ 对象中的信息来帮助过滤日志请求。`org.apache.log4j.spi.Filter` 是一个 `abstract` 类，也是 log4j 框架中所有其他\
    \ `Filter` 对象的基类。它定义了一个 `abstract` 方法 `public int decide(LoggingEvent event)`，所有\
    \ `Filter` 子类都会重写该方法。`decide()` 方法对 `LoggingEvent` 对象进行分析，并返回一个表示分析结果的整数值。`Filter`\
    \ 对象以顺序方式组织成线性链，并按顺序被调用。可以从链中添加或移除任何 `Filter` 对象。\n\nlog4j 中的过滤过程通常遵循以下步骤：\n\n\
    1.  应用程序通过调用 `Logger` 对象的某个日志记录方法来发起日志请求。\n2.  `Logger` 对象通过封装日志消息和其他日志相关信息，在内部构造一个\
    \ `LoggingEvent` 对象。\n3.  然后，`Logger` 对象将 `LoggingEvent` 对象传递给与其关联的任何 `Appender`\
    \ 对象。\n4.  `Appender` 对象随后将 `LoggingEvent` 对象传递给与其关联的任何 `Filter` 对象。\n5.  `Filter`\
    \ 对象根据任何预定义标准决定日志请求的有效性，并返回一个表示分析结果的整数值。每个 `Filter` 对象可能返回三个整数值：\n\n    *   如果返回整数值\
    \ DENY，则日志请求被停止，不会传递给链中的任何其他 `Filter` 对象。\n    *   如果返回整数值 ACCEPT，则日志请求被接受，并且日志信息会被发布，无需咨询链中的任何其他\
    \ `Filter`。\n    *   如果返回整数值 NEUTRAL，则会咨询链中的下一个 `Filter`。\n\n6.  如果链中没有更多的 `Filter`\
    \ 对象，则记录该日志事件。\n\n`Filter` 对象只能通过 `DOMConfigurator` 进行配置。然而，`PropertyConfigurator`\
    \ 对象目前不支持 `DOMConfigurator`，这意味着这些对象只能通过 XML 配置文件进行配置，而不能使用属性风格的配置文件。但是，可以实例化一个\
    \ `Filter` 对象，并使用任何 `Appender` 对象的 `addFilter(Filter filter)` 方法将其添加到过滤器链中。\n\n\
    在“一个完整示例”部分，我们将看到一个在实际应用中使用 log4j 的示例。在该示例中，我们还将看到如何有效地使用自定义 `Filter` 对象来实现所需的日志记录活动。\n\
    \n## 布局对象\n\n正如我们在前面章节中学到的，`Logger` 对象和 `Appender` 对象是 log4j 框架的核心和灵魂。这些对象捕获日志请求并封装日志信息，并且能够将日志输出发送到各种目标。但是，为了将日志信息转换为任何人类可读的格式，`Appender`\
    \ 对象使用 `Layout` 对象来格式化日志信息。考虑到未来对这些信息的分析，日志信息的布局非常重要。我们将在第 6 章中详细讨论 log4j 中可用的不同\
    \ `Layout` 对象。\n\n## ObjectRenderer\n\n我们打算发布的日志信息可以有多种类型和多种格式。通常，在一个多个对象持有数据并相互交互的面向对象应用程序中，我们往往需要以人类可读的格式发布整个对象及其内容。检查对象的当前状态以及特定对象持有的属性值，可以更容易地理解该对象如何响应发送给它的特定消息，并有可能在对象行为不当时定义所需的纠正措施。\n\
    \n在 log4j 的上下文中，`Logger` 类有多个日志记录方法，所有这些方法都可以接受一个 `Object` 参数作为日志消息。这个 `Object`\
    \ 参数可以是一个简单的 `String`，代表我们希望发布的确切文本信息，也可以是一个自定义的 `Object`，例如 `Customer`、`Person`\
    \ 等。当我们传递一个自定义 `Object` 进行记录时，目的是发布该对象的状态和内容。`org.apache.log4j.or.ObjectRenderer`\
    \ 接口定义了将任何 `ObjectRenderer` 与任何 `Object` 关联，并获取对象内容的 `String` 表示形式的方式。\n\n`Layout`\
    \ 对象在尝试格式化传递给 `Logger` 的 `Object` 参数之前，会调用 `ObjectRenderer` 来获取 `Object` 内容的 `String`\
    \ 表示形式。如果传递给 `Logger` 的消息参数是一个 `String`，则不需要 `ObjectRenderer` 来转换消息，`Layout` 对象会直接处理该消息。\n\
    \n`ObjectRenderer` 对象只能通过 `DOMConfigurator` 进行配置，因此可以在 XML 风格的配置文件中定义。`ObjectRenderer`\
    \ 的配置信息定义了渲染类（即 `org.apache.log4j.or.ObjectRenderer` 接口的实现），以及被渲染类（即需要被渲染为 `String`\
    \ 表示形式的自定义 `Object`）。“一个完整示例”部分将演示自定义 `ObjectRenderer` 的使用。\n"
- fmt: "# A Complete log4j Example\n\nTo reinforce the concepts we have discussed\
    \ thus far, let's consider an application dealing with several customer orders.\
    \ The application processes the orders and sends appropriate responses back to\
    \ the customers. All the orders processed by the system are logged and can be\
    \ used for future reference. Let's also assume that the system requires flexibility\
    \ in terms of logging such that it can decide to log only orders with product\
    \ codes falling within a certain range. The application will typically pass to\
    \ the logging framework the order information to be printed. From a design point\
    \ of view, the application will need to keep the logging methods generic and will\
    \ have configurable appenders, filters, layouts, etc.\n\nThe application will\
    \ use certain `Logger(s)`, each of which will have its own set of appenders, filters,\
    \ and layouts. It will be possible to change logging behavior completely by switching\
    \ the `Logger` being used or by changing the associated appenders, filters, and\
    \ layouts. This design will offer more flexibility for and maintainability of\
    \ the system. From the logging point of view, this system will need the following\
    \ objects to be in place:\n\n*   `CustomerOrder`: This object will hold the basic\
    \ information about the order each customer is placing.\n*   `OrderRenderer`:\
    \ This object is capable of rendering the `CustomerOrder` object as a `String`\
    \ representation.\n*   `ProductFilter`: This object is capable of filtering the\
    \ logging information based on a predefined product code range.\n\n[Listing 5-11](#LiB0045.html#ch05ls11),\
    \ `CustomerOrder.java`, represents the business object holding the customer order\
    \ information.\n\n## Listing 5-11: CustomerOrder.java\n\n```\npackage com.apress.business;\n\
    \npublic class CustomerOrder {\n\n/** Holds value of property productName. */\n\
    \    private String productName;\n\n/** Holds value of property productCode. */\n\
    \    private int productCode;\n\n/** Holds value of property productPrice. */\n\
    \    private int productPrice;\n\n/** Creates a new instance of CustomerOrder\
    \ */\n    public CustomerOrder() {\n    }\n\npublic CustomerOrder(String name,\
    \ int code, int price)\n    {\n        this.productCode = code;\n        this.productPrice\
    \ = price;\n        this.productName = name;\n    }\n\n/** Getter for property\
    \ productName.\n     * @return Value of property productName.\n     */\n    public\
    \ String getProductName() {\n        return this.productName;\n    }\n\n/** Setter\
    \ for property productName.\n     * @param productName New value of property productName.\n\
    \     */\n    public void setProductName(String productName) {\n        this.productName\
    \ = productName;\n    }\n\n/** Getter for property productCode.\n     * @return\
    \ Value of property productCode.\n     */\n    public int getProductCode() {\n\
    \        return this.productCode;\n    }\n\n/** Setter for property productCode.\n\
    \     * @param productCode New value of property productCode.\n     */\n    public\
    \ void setProductCode(int productCode) {\n        this.productCode = productCode;\n\
    \    }\n\n/** Getter for property productPrice.\n     * @return Value of property\
    \ productPrice.\n     */\n    public int getProductPrice() {\n        return this.productPrice;\n\
    \    }\n\n/** Setter for property productPrice.\n     * @param productPrice New\
    \ value of property productPrice.\n     */\n    public void setProductPrice(int\
    \ productPrice) {\n        this.productPrice = productPrice;\n    }\n}\n```\n\n\
    The program in [Listing 5-12](#LiB0045.html#ch05ls12), `ProductFilter.java`, demonstrates\
    \ the custom `Filter` object. The `ProductFilter` object overrides the `decide(LoggingEvent\
    \ event)` method from the `Filter` class and inspects the product code of the\
    \ `CustomerOrder`. If the product code is greater than 100, `ProductFilter` accepts\
    \ the logging request or else denies it. If the object passed to `ProductFilter`\
    \ is not an instance of the `CustomerOrder`, it remains neutral and allows the\
    \ framework to invoke the next filter in the chain.\n\n## Listing 5-12: ProductFilter.java"
  raw: "## A Complete log4j Example\n\nTo reinforce the concepts we have discussed\
    \ thus far, let's consider an application dealing with several customer orders.\
    \ The application processes the orders and sends appropriate responses back to\
    \ the customers. All the orders processed by the system are logged and can be\
    \ used for future reference. Let's also assume that the system requires flexibility\
    \ in terms of logging such that it can decide to log only orders with product\
    \ codes falling within a certain range. The application will typically pass to\
    \ the logging framework the order information to be printed. From a design point\
    \ of view, the application will need to keep the logging methods generic and will\
    \ have configurable appenders, filters, layouts, etc.\n\nThe application will\
    \ use certain `Logger(s)`, each of which will have its own set of appenders, filters,\
    \ and layouts. It will be possible to change logging behavior completely by switching\
    \ the `Logger` being used or by changing the associated appenders, filters, and\
    \ layouts. This design will offer more flexibility for and maintainability of\
    \ the system. From the logging point of view, this system will need the following\
    \ objects to be in place:\n\n*   `CustomerOrder`: This object will hold the basic\
    \ information about the order each customer is placing.\n\n*   `OrderRenderer`:\
    \ This object is capable of rendering the `CustomerOrder` object as a `String`\
    \ representation.\n\n*   `ProductFilter`: This object is capable of filtering\
    \ the logging information based on a predefined product code range.\n\n[Listing\
    \ 5-11](#LiB0045.html#ch05ls11), `CustomerOrder.java`, represents the business\
    \ object holding the customer order information.\n\nListing 5-11: CustomerOrder.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\n package com.apress.business;\n\npublic\
    \ class CustomerOrder {\n\n/** Holds value of property productName. */\n    private\
    \ String productName;\n\n/** Holds value of property productCode. */\n    private\
    \ int productCode;\n\n/** Holds value of property productPrice. */\n    private\
    \ int productPrice;\n\n/** Creates a new instance of CustomerOrder */\n    public\
    \ CustomerOrder() {\n    }\n\npublic CustomerOrder(String name, int code, int\
    \ price)\n    {\n        this.productCode = code;\n        this.productPrice =\
    \ price;\n        this.productName = name;\n    }\n\n/** Getter for property productName.\n\
    \     * @return Value of property productName.\n     */\n    public String getProductName()\
    \ {\n        return this.productName;\n    }\n\n/** Setter for property productName.\n\
    \     * @param productName New value of property productName.\n     */\n    public\
    \ void setProductName(String productName) {\n        this.productName = productName;\n\
    \    }\n\n/** Getter for property productCode.\n     * @return Value of property\
    \ productCode.\n     */\n    public int getProductCode() {\n        return this.productCode;\n\
    \    }\n\n/** Setter for property productCode.\n     * @param productCode New\
    \ value of property productCode.\n     */\n    public void setProductCode(int\
    \ productCode) {\n        this.productCode = productCode;\n    }\n\n/** Getter\
    \ for property productPrice.\n     * @return Value of property productPrice.\n\
    \     */\n    public int getProductPrice() {\n        return this.productPrice;\n\
    \    }\n\n/** Setter for property productPrice.\n     * @param productPrice New\
    \ value of property productPrice.\n     */\n    public void setProductPrice(int\
    \ productPrice) {\n        this.productPrice = productPrice;\n    }\n}\n```\n\n\
    | **![End example](_1.gif)** |\n\n|  |\n\nThe program in [Listing 5-12](#LiB0045.html#ch05ls12),\
    \ `ProductFilter.java`, demonstrates the custom `Filter` object. The `ProductFilter`\
    \ object overrides the `decide(LoggingEvent event)` method from the `Filter` class\
    \ and inspects the product code of the `CustomerOrder`. If the product code is\
    \ greater than 100, `ProductFilter` accepts the logging request or else denies\
    \ it. If the object passed to `ProductFilter` is not an instance of the `CustomerOrder`,\
    \ it remains neutral and allows the framework to invoke the next filter in the\
    \ chain.\n\nListing 5-12: ProductFilter.java"
  trans: "\n## 完整的 log4j 示例\n\n为了巩固我们目前讨论的概念，让我们考虑一个处理多个客户订单的应用程序。该应用程序处理订单并向客户发送相应的响应。系统处理的所有订单都会被记录，并可用于将来参考。我们还假设系统在日志记录方面需要灵活性，以便能够决定只记录产品代码在特定范围内的订单。应用程序通常会将要打印的订单信息传递给日志记录框架。从设计的角度来看，应用程序需要保持日志记录方法的通用性，并具有可配置的附加器、过滤器和布局等。\n\
    \n该应用程序将使用某些 `Logger(s)`，每个日志记录器都有自己的附加器、过滤器和布局集。通过切换所使用的 `Logger` 或更改相关的附加器、过滤器和布局，可以完全改变日志记录行为。这种设计将为系统提供更高的灵活性和可维护性。从日志记录的角度来看，该系统需要具备以下对象：\n\
    \n*   `CustomerOrder`：此对象将保存每个客户所下订单的基本信息。\n\n*   `OrderRenderer`：此对象能够将 `CustomerOrder`\
    \ 对象渲染为 `String` 表示形式。\n\n*   `ProductFilter`：此对象能够根据预定义的产品代码范围过滤日志信息。\n\n清单 5-11\
    \ `CustomerOrder.java` 表示保存客户订单信息的业务对象。\n\n清单 5-11：CustomerOrder.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\n package com.apress.business;\n\npublic class CustomerOrder {\n\n\
    /** 保存属性 productName 的值。 */\n    private String productName;\n\n/** 保存属性 productCode\
    \ 的值。 */\n    private int productCode;\n\n/** 保存属性 productPrice 的值。 */\n    private\
    \ int productPrice;\n\n/** 创建 CustomerOrder 的新实例 */\n    public CustomerOrder()\
    \ {\n    }\n\npublic CustomerOrder(String name, int code, int price)\n    {\n\
    \        this.productCode = code;\n        this.productPrice = price;\n      \
    \  this.productName = name;\n    }\n\n/** 属性 productName 的获取器。\n     * @return\
    \ 属性 productName 的值。\n     */\n    public String getProductName() {\n        return\
    \ this.productName;\n    }\n\n/** 属性 productName 的设置器。\n     * @param productName\
    \ 属性 productName 的新值。\n     */\n    public void setProductName(String productName)\
    \ {\n        this.productName = productName;\n    }\n\n/** 属性 productCode 的获取器。\n\
    \     * @return 属性 productCode 的值。\n     */\n    public int getProductCode() {\n\
    \        return this.productCode;\n    }\n\n/** 属性 productCode 的设置器。\n     * @param\
    \ productCode 属性 productCode 的新值。\n     */\n    public void setProductCode(int\
    \ productCode) {\n        this.productCode = productCode;\n    }\n\n/** 属性 productPrice\
    \ 的获取器。\n     * @return 属性 productPrice 的值。\n     */\n    public int getProductPrice()\
    \ {\n        return this.productPrice;\n    }\n\n/** 属性 productPrice 的设置器。\n \
    \    * @param productPrice 属性 productPrice 的新值。\n     */\n    public void setProductPrice(int\
    \ productPrice) {\n        this.productPrice = productPrice;\n    }\n}\n```\n\n\
    | **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 5-12 `ProductFilter.java` 中的程序演示了自定义的\
    \ `Filter` 对象。`ProductFilter` 对象重写了 `Filter` 类中的 `decide(LoggingEvent event)`\
    \ 方法，并检查 `CustomerOrder` 的产品代码。如果产品代码大于 100，`ProductFilter` 接受日志记录请求，否则拒绝。如果传递给\
    \ `ProductFilter` 的对象不是 `CustomerOrder` 的实例，则保持中立，并允许框架调用链中的下一个过滤器。\n\n清单 5-12：ProductFilter.java\n"
- fmt: "# 排版后的内容\n\n`ProductFilter`批准日志请求后，日志事件被传递给关联的`Appender`对象。`Appender`对象随后将事件传递给关联的`Layout`对象，该对象尝试将日志消息对象渲染为`String`表示形式，然后根据任何转换模式进行格式化。为了使`Layout`对象成功渲染消息，我们需要为`CustomerOrder`对象提供一个`ObjectRenderer`。[清单5-13](#LiB0045.html#ch05ls13)中的程序`OrderRenderer.java`实现了`ObjectRenderer`接口，并提供了`doRender(Object\
    \ obj)`方法的实现。为简化示例，它返回`CustomerOrder`对象属性值的连字符分隔列表。\n\n**清单5-13: OrderRenderer.java**\n\
    \n```\npackage com.apress.logging.log4j.renderer;\n\nimport org.apache.log4j.or.ObjectRenderer;\n\
    import com.apress.business.CustomerOrder;\n\npublic class OrderRenderer implements\
    \ ObjectRenderer\n{\n    private static final String separator = \"-\";\n\n/**\
    \ Creates a new instance of OrderRenderer */\n    public OrderRenderer() {\n \
    \   }\n\npublic String doRender(Object obj)\n    {\n        StringBuffer buffer\
    \ = new StringBuffer(50);\n        CustomerOrder order = null;\n        String\
    \ productName = null;\n        int productCode = 0;\n        int productPrice\
    \ = 0;\n        //check if the instance is of correct type CustomerOrder\n   \
    \     if(obj instanceof CustomerOrder)\n        {\n            order = (CustomerOrder)obj;\n\
    \            productName = order.getProductName();\n            productCode =\
    \ order.getProductCode();\n            productPrice = order.getProductPrice();\n\
    \nbuffer.append(productName);\n            buffer.append(separator);\n       \
    \     buffer.append(new Integer(productCode).toString());\n            buffer.append(separator);\n\
    \            buffer.append(new Integer(productPrice).toString());\n        }\n\
    \nreturn buffer.toString();\n    }\n}\n```\n\n现在，一旦我们准备好所有对象，就需要将对象层次结构传递给log4j框架。如前所述，`ObjectRenderer`只能通过`DOMConfigurator`进行配置，我们将通过XML风格的配置文件定义日志记录器配置。[清单5-14](#LiB0045.html#ch05ls14)显示了此示例使用的配置文件`filter_properties.xml`。\n\
    \n**清单5-14: filter_properties.xml**\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<!DOCTYPE log4j:configuration SYSTEM \"log4j.dtd\">\n\n<log4j:configuration\
    \ xmlns:log4j=\"http://jakarta.apache.org/log4j/\">\n\n<renderer renderedClass=\"\
    com.apress.business.CustomerOrder\"\nrenderingClass=\"com.apress.logging.log4j.renderer.OrderRenderer\"\
    >\n </renderer>\n\n<appender name=\"A1\" class=\"org.apache.log4j.ConsoleAppender\"\
    >\n\n<layout class=\"org.apache.log4j.PatternLayout\">\n     <param name=\"ConversionPattern\"\
    \ value=\"%t %-5p %c{2} - %m%n\"/>\n   </layout>\n   <filter class=\"com.apress.logging.log4j.filter.ProductFilter\"\
    />\n </appender>\n\n<logger name=\"com.apress.logging.log4j\">\n   <level value=\"\
    debug\"/>\n   <appender-ref ref=\"A1\"/>\n </logger>\n</log4j:configuration>\n\
    ```\n\n最后，[清单5-15](#LiB0045.html#ch05ls15)展示了一个示例应用程序，用于演示日志消息的过滤和`CustomerOrder`对象的渲染。\n\
    \n**清单5-15: ProductFilterDemo.java**\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.Logger;\nimport com.apress.business.CustomerOrder;\n\
    import com.apress.logging.log4j.filter.ProductFilter;\nimport com.apress.logging.log4j.renderer.OrderRenderer;\n\
    public class ProductFilterDemo\n{\n    private static Logger logger =\nLogger.getLogger(ProductFilterDemo.class.getPackage().getName());\n\
    \n/** Creates a new instance of ProductFilterDemo */\n    public ProductFilterDemo()\
    \ {\n    }\n\npublic void processOrder(CustomerOrder order)\n    {\n        logger.info(order);\n\
    \    }\n\npublic static void main(String args[])\n    {\n        CustomerOrder\
    \ order1 = new CustomerOrder(\"Beer\", 101, 20);\n        CustomerOrder order2\
    \ = new CustomerOrder(\"Lemonade\", 95, 10);\n        CustomerOrder order3 = new\
    \ CustomerOrder(\"Chocolate\", 223, 5);\n\nProductFilterDemo demo = new ProductFilterDemo();\n\
    \        demo.processOrder(order1);\n        demo.processOrder(order2);\n    \
    \    demo.processOrder(order3);\n    }\n}\n```\n\n此应用程序创建了三个不同的`CustomerOrder`对象，它们具有不同的产品名称、产品代码和产品价格。`processOrder()`方法简单地记录传递给它的`CustomerOrder`对象。在`ProductFilter`对象就位的情况下，执行[清单5-15](#LiB0045.html#ch05ls15)中的应用程序将打印以下日志消息，排除任何产品代码低于100的消息：\n\
    \n```\nmain INFO logging.log4j - Beer-101-20\nmain INFO logging.log4j - Chocolate-223-5\n\
    ```\n\n## 结论\n\n在本章中，我们研究了log4j框架中的各种关键对象，并探讨了这些对象如何交互以捕获、过滤日志信息并将其生成到各种目标。除了关键对象之外，log4j还涉及许多辅助对象，这些对象有助于处理日志信息。在[下一章](#LiB0047_split_000.html#389)中，我们将了解log4j中不同的`Layout`对象。\n\
    \n# 第6章：在log4j中格式化日志信息"
  raw: "| **![Start example](_1.gif)** |\n\n```\npackage com.apress.logging.log4j.filter;\n\
    \nimport org.apache.log4j.spi.Filter;\nimport org.apache.log4j.spi.LoggingEvent;\n\
    import com.apress.business.CustomerOrder;\n\npublic class ProductFilter extends\
    \ Filter\n{\n    /** Creates a new instance of ProductFilter */\n    public ProductFilter()\
    \ {\n    }\n\npublic int decide(LoggingEvent event)\n    {\n        int result=this.ACCEPT;\n\
    \        //obtaining the message object passed through Logger\n        Object\
    \ message = event.getMessage();\n        //checking if the message object is of\
    \ correct type\n        if(message instanceof CustomerOrder)\n        {\n    \
    \        CustomerOrder order = (CustomerOrder)message;\n            int productCode\
    \ = order.getProductCode();\n            //checking for the product code greater\
    \ than 100 only\n            if(productCode<100)\n            {\n            \
    \    result = this.DENY;\n            }\n        }else\n        {\n          \
    \  //this filter can ignore this, pass to next filter\n            result = this.NEUTRAL;\n\
    \        }\n\nreturn result;\n    }\n}\n```\n\n| **![End example](_1.gif)** |\n\
    \n|  |\n\nOnce the `ProductFilter` approves the logging request, the logging event\
    \ is passed to the associated `Appender` object. The `Appender` object will then\
    \ pass the event to the associated `Layout` object, which then tries to render\
    \ the logging message object into a `String` representation before formatting\
    \ it according to any conversion pattern. In order for the `Layout` objects to\
    \ successfully render the message, we need to have an `ObjectRenderer` for the\
    \ `CustomerOrder` object. The program in [Listing 5-13](#LiB0045.html#ch05ls13),\
    \ `OrderRenderer.java`, implements the `ObjectRenderer` interface and provides\
    \ an implementation of the `doRender(Object obj)` method. To keep the example\
    \ simple, it returns a hyphen-separated list of the attribute values of the `CustomerOrder`\
    \ object.\n\nListing 5-13: OrderRenderer.java\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\n package com.apress.logging.log4j.renderer;\n\nimport org.apache.log4j.or.ObjectRenderer;\n\
    import com.apress.business.CustomerOrder;\n\npublic class OrderRenderer implements\
    \ ObjectRenderer\n{\n    private static final String separator = \"-\";\n\n/**\
    \ Creates a new instance of OrderRenderer */\n    public OrderRenderer() {\n \
    \   }\n\npublic String doRender(Object obj)\n    {\n        StringBuffer buffer\
    \ = new StringBuffer(50);\n        CustomerOrder order = null;\n        String\
    \ productName = null;\n        int productCode = 0;\n        int productPrice\
    \ = 0;\n        //check if the instance is of correct type CustomerOrder\n   \
    \     if(obj instanceof CustomerOrder)\n        {\n            order = (CustomerOrder)obj;\n\
    \            productName = order.getProductName();\n            productCode =\
    \ order.getProductCode();\n            productPrice = order.getProductPrice();\n\
    \nbuffer.append(productName);\n            buffer.append(separator);\n       \
    \     buffer.append(new Integer(productCode).toString());\n            buffer.append(separator);\n\
    \            buffer.append(new Integer(productPrice).toString());\n        }\n\
    \nreturn buffer.toString();\n    }\n}\n```\n\n| **![End example](_1.gif)** |\n\
    \n|  |\n\nNow, once we have all the objects ready, we need to pass the object\
    \ hierarchy to the log4j framework. As discussed before, the `ObjectRenderer`\
    \ can only be configured through `DOMConfigurator`, and we will define the logger\
    \ configuration through an XML-style configuration file. [Listing 5-14](#LiB0045.html#ch05ls14)\
    \ shows the configuration file used for this example, \"filter_properties.xml\"\
    .\n\nListing 5-14: filter_properties.xml\n\n| **![Start example](_1.gif)** |\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE log4j:configuration\
    \ SYSTEM \"log4j.dtd\">\n\n<log4j:configuration xmlns:log4j=\"http://jakarta.apache.org/log4j/\"\
    >\n\n<renderer renderedClass=\"com.apress.business.CustomerOrder\"\nrenderingClass=\"\
    com.apress.logging.log4j.renderer.OrderRenderer\">\n </renderer>\n\n<appender\
    \ name=\"A1\" class=\"org.apache.log4j.ConsoleAppender\">\n\n<layout class=\"\
    org.apache.log4j.PatternLayout\">\n     <param name=\"ConversionPattern\" value=\"\
    %t %-5p %c{2} - %m%n\"/>\n   </layout>\n   <filter class=\"com.apress.logging.log4j.filter.ProductFilter\"\
    />\n </appender>\n\n<logger name=\"com.apress.logging.log4j\">\n   <level value=\"\
    debug\"/>\n   <appender-ref ref=\"A1\"/>\n </logger>\n</log4j:configuration>\n\
    ```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nFinally, [Listing 5-15](#LiB0045.html#ch05ls15)\
    \ presents a sample application to demonstrate the filtering of the log messages\
    \ and rendering of the `CustomerOrder` object.\n\nListing 5-15: ProductFilterDemo.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.Logger;\nimport com.apress.business.CustomerOrder;\n\
    import com.apress.logging.log4j.filter.ProductFilter;\nimport com.apress.logging.log4j.renderer.OrderRenderer;\n\
    public class ProductFilterDemo\n{\n    private static Logger logger =\nLogger.getLogger(ProductFilterDemo.class.getPackage().getName());\n\
    \n/** Creates a new instance of ProductFilterDemo */\n    public ProductFilterDemo()\
    \ {\n    }\n\npublic void processOrder(CustomerOrder order)\n    {\n        logger.info(order);\n\
    \    }\n\npublic static void main(String args[])\n    {\n        CustomerOrder\
    \ order1 = new CustomerOrder(\"Beer\", 101, 20);\n        CustomerOrder order2\
    \ = new CustomerOrder(\"Lemonade\", 95, 10);\n        CustomerOrder order3 = new\
    \ CustomerOrder(\"Chocolate\", 223, 5);\n\nProductFilterDemo demo = new ProductFilterDemo();\n\
    \        demo.processOrder(order1);\n        demo.processOrder(order2);\n    \
    \    demo.processOrder(order3);\n    }\n}\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nThis application creates three different `CustomerOrder` objects\
    \ with different product names, product codes, and product prices. The `processOrder()`\
    \ method simply logs the `CustomerOrder` object passed to it. With the `ProductFilter`\
    \ object in place, executing the application in [Listing 5-15](#LiB0045.html#ch05ls15)\
    \ will result in the following log messages being printed, excluding any having\
    \ product codes below 100:\n\n```\nmain INFO logging.log4j - Beer-101-20\nmain\
    \ INFO logging.log4j - Chocolate-223-5\n```\n\n## Conclusion\n\nIn this chapter,\
    \ we have examined the various key objects in the log4j framework and also explored\
    \ how these objects interact to capture, filter, and produce logging information\
    \ to various destinations. Besides the key objects, log4j involves many more auxiliary\
    \ objects that help handle the logging information. In the [next chapter](#LiB0047_split_000.html#389),\
    \ we will learn about different `Layout` objects in log4j.\n\n# Chapter 6: Formatting\
    \ Logging Information in log4j"
