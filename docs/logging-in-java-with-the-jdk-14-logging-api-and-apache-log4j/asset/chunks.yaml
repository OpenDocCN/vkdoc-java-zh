  trans: "\n### 扩展 JDBCAppender\n\n`JDBCAppender` 足以执行简单的 SQL 操作。它从配置文件中读取 SQL 查询和其他与\
    \ JDBC 相关的参数，并执行 SQL 操作。SQL 优化的一个关键因素是能够执行动态 SQL 查询。在 Java 语言中，动态 SQL 通过 `java.sql.PreparedStatement\
    \ interface` 类型的对象来处理。如果你熟悉 JDBC 编程，就会知道如何使用 `PreparedStatement` 对象。`JDBCAppender`\
    \ 本身并*不*使用 `PreparedStatement` 对象来处理与数据库相关的操作。\n\n可以通过创建 `JDBCAppender` 的子类来扩展其功能。我们将看一个自定义\
    \ `JDBCAppender` 的示例，使其能够灵活地与 `PreparedStatement` 对象一起工作。除了 `JDBCAppender` 标准配置参数外，我们将在初始化时接受以下配置参数：\n\
    \n*   `sqlString`：表示动态 SQL 结构的 SQL 字符串。这与 JDBC 中 `PreparedStatement` 对象使用的结构类似。\n\
    \n*   `values`：构建 `PreparedStatement` 对象后，我们需要为不同的列设置值。这些值将以 `PatternLayout` 结构的形式包含日志信息的不同方面。例如，`%p-%m`\
    \ 将被转换为 LEVEL-MESSAGE 格式的字符串。\n\n|  | 注意 | 在接下来的示例中，我们将重用清单 7-2 中描述的数据库表 LOGGING_DATA。\
    \ |\n\n现在，我们将编写一个执行 JDBC 操作的自定义 `Appender` 对象示例。启动时，此 `Appender` 对象将通过传递给 log4j\
    \ 运行时的配置文件中指定的 bean 属性值进行初始化。`CustomJDBCAppender` 对象从其基类 `JDBCAppender` 继承所有属性和一些方法。具体来说，它仅覆盖了\
    \ `JDBCAppender` 类中的以下方法：\n\n*   `execute(String sql)`：重写此方法以使用 `PreparedStatement`\
    \ 对象。\n\n*   `doAppend(LoggingEvent event)`：重写此方法以执行正常的 appender 活动。\n\n`CustomJDBCAppender`\
    \ 提供了自己的方法来设置和检索其特定的 bean 属性。这里需要注意的一点是，我们使用 `PatternLayout` 来转换日志信息，并且需要告诉 `PatternLayout`\
    \ 要处理的模式。在此上下文中，我们希望通过 `PatternLayout` 转换通过 `CustomJDBCAppender` 的 `values` bean\
    \ 属性传递的信息。因此，在 `setValues()` 方法中，我们使用 `values` bean 属性中包含的信息创建一个 `PatternLayout`。最后，我们将创建的\
    \ `PatternLayout` 对象设置为 `CustomJDBCAppender` 的布局。\n\n重写的 `execute()` 方法执行以下工作：\n\
    \n1.  它通过调用 `CustomJDBCAppender` 的 `private` 方法 `getPreparedStatement()` 来获取 `PreparedStatement`\
    \ 对象的实例。\n\n2.  然后，此方法将格式化的日志信息进行分词，每个分词代表表中每一列的值。\n\n3.  值的提供顺序必须与表列的顺序相同。这个条件可能不理想，但有助于简化此示例。\n\
    \n4.  然后，它使用 `PreparedStatement` 对象的 `setString(int, Object)` 方法为每一列设置值。同样，这段代码假设表中的所有列都是\
    \ VARCHAR 类型，这对于我们在此示例中使用的表来说是成立的。但在现实中，列类型可以是任何类型，程序需要能够处理这种情况。\n\n5.  最后，通过调用\
    \ `PreparedStatement` 的 `executeUpdate()` 方法来执行 SQL 操作。\n\n清单 7-4 `CustomJDBCAppender.java`\
    \ 是一个自定义 `JDBCAppender` 的实现示例。\n\n清单 7-4：CustomJDBCAppender.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\npackage com.apress.logging.log4j.appender;\n\nimport org.apache.log4j.jdbc.JDBCAppender;\n\
    import java.sql.PreparedStatement;\nimport java.sql.Connection;\nimport java.sql.SQLException;\n\
    import org.apache.log4j.spi.LoggingEvent;\nimport org.apache.log4j.PatternLayout;\n\
    import java.util.StringTokenizer;\n\npublic class CustomJDBCAppender extends JDBCAppender\
    \ {\n\n/** 保存属性 values 的值。 */\n    private String values;\n\n/** prepared statement\
    \ 对象 **/\n    private PreparedStatement stmt = null;\n\n/** 保存属性 preparedSQL 的值。\
    \ */\n    private String preparedSQL;\n\n/** 创建 CustomJDBCAppender 的新实例 */\n \
    \   public CustomJDBCAppender() {\n    }\n\npublic void doAppend(LoggingEvent\
    \ event) {\n        buffer.add(event);\n        if(buffer.size()>=bufferSize)\
    \ {\n          flushBuffer();\n        }\n    }\n\n/**\n     * 从 JDBCAppender\
    \ 重写的方法。此方法在执行语句之前\n     * 设置 prepared statement 的参数\n     **/\n    public void\
    \ execute(String sql) throws SQLException {\n        PreparedStatement stmt =\
    \ getPreparedStatement();\n        StringTokenizer tokenizer = new StringTokenizer(sql,\
    \ \",\");\n        int i=1;\n        while(tokenizer.hasMoreTokens()) {\n    \
    \        String token = tokenizer.nextToken();\n            stmt.setString(i,\
