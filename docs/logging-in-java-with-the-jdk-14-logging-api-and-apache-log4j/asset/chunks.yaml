    \ from the HTML page, we can see the following output in the Tomcat console:\n\
    \n```\ninvoked the LoggingServlet...\n```\n\n|  | Note  | We can redirect logging\
    \ information anywhere we would like to by changing the log4j configuration file.\
    \ |\n\nWe have now finished looking at the various aspects of configuring log4j.\
    \ Starting with the [next section](#LiB0036.html#301), we will explore different\
    \ log4j objects in detail."
  trans: "\n### 配置的动态加载\n\n如果使用外部配置文件来配置日志框架，一个令人沮丧的问题是每次修改属性文件后都需要重启应用程序。为了避免这种情况，`PropertyConfigurator`\
    \ 和 `DOMConfigurator` 类都可以实现配置文件的动态加载。这在两个配置类的以下方法中得到了演示：\n\n```\npublic void\
    \ configureAndWatch(String filename, long delay);\npublic void configureAndWatch(String\
    \ filename);\n```\n\n这些方法使用另一个辅助类 `org.apache.log4j.helpers.FileWatchDog`，该类用于判断配置文件是否存在。如果文件存在，它会创建一个单独的线程，并在指定的时间间隔（或默认的\
    \ 60 秒间隔）后检查文件是否被修改。如果配置文件被修改，则会重新读取配置以配置日志框架。\n\n在基于服务器的应用程序中，此特性非常有用，因为在这些场景下，我们可能不希望关闭任何网站，但又需要更改应用程序的日志配置。\n\
    \n|  | 注意 | 从现在开始，本章后续所有示例都将使用清单 5-3 中列出的 \"log4j.properties\" 配置文件。这是因为我们将在所有示例中使用相同的包结构，从而使用同名的日志记录器。除非另有说明，否则相关章节（例如我们关于附加不同附加器的讨论）中提到的任何额外配置信息都必须包含在\
    \ \"log4j.properties\" 中。 |\n\n### 使用 Servlet 配置 log4j\n\nlog4j 的使用并不局限于独立应用程序，它可以广泛应用于任何类型的应用程序部署环境。最常见的基于服务器的部署环境之一是\
    \ Web 服务器和 Servlet 环境。清单 5-5 `LoggingServlet.java` 展示了一个简单的 Servlet，用于演示在 Web\
    \ 服务器环境中使用 log4j。\n\n|  | 注意 | 要编译 Java Servlet 程序，你需要在类路径中包含 1.x 版本的 servlet.jar。如果你像本例中那样使用\
    \ Tomcat，你可以在 Tomcat 安装目录的 /lib 目录下找到 \"servlet.jar\"。 |\n\n清单 5-5: LoggingServlet.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.servlet.*;\nimport javax.servlet.http.*;\n\
    import java.io.PrintWriter;\nimport java.io.IOException;\nimport org.apache.log4j.*;\n\
    \npublic class LoggingServlet extends HttpServlet {\n    private static Logger\
    \ logger =\nLogger.getLogger(LoggingServlet.class);\n\n    public void doPost(HttpServletRequest\
    \ req, HttpServletResponse res)\n                       throws IOException, ServletException\n\
    \    {\n        logger.info(\"invoked the LoggingServlet...\");\n        PrintWriter\
    \ writer = res.getWriter();\n        writer.println(\"Check your web server console...\"\
    );\n        writer.flush();\n        writer.close();\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n接下来，我们将编写一个简单的 HTML 文件来调用这个 Servlet：\n\n```\n <html>\n<body>\n\
    <h1>Please enter value and press submit</h1>\n<form method=\"POST\"\naction=\"\
    http://localhost:8080/logdemo/servlet/LoggingServlet\">\n<input type=submit value=Invoke>\n\
    </bodY>\n</html>\n```\n\n请注意，名为 \"action\" 的表单指向 `LoggingServlet`，该 Servlet 在名为\
    \ \"localhost\" 的主机上执行，并监听 8080 端口。这是 HTTP 请求的默认端口。\n\n在 Servlet 内部，我们获取一个 `Logger`\
    \ 实例，并在 `doPost()` 方法中使用 `Logger.info()` 方法打印日志信息。为了使日志记录正常工作，我们需要为我们所使用的 Web\
    \ 服务器环境配置 log4j。我们将在下一节中以 Tomcat Web 服务器配置为例，介绍如何执行此操作。\n\n### 设置 Tomcat\n\n在本节中，我们将演示在\
    \ Windows 操作系统下使用 Tomcat 3.2.1 Web 服务器配置。你可以很容易地找出 UNIX 环境中用于配置 Tomcat 的相应文件。\n\
    \n|  | 注意 | Tomcat 是 Apache 的一个开源 Servlet 引擎，而不是一个全功能的 Web 服务器。Tomcat 也可以与 Apache\
    \ Web 服务器集成。虽然我们在本书的示例中使用 Tomcat，但你也可以尝试其他支持 Java Servlet 的 Web 服务器。 |\n\n首先，将示例\
    \ Servlet 和 HTML 文件构建成一个 .war 文件，并将该 Servlet 部署到 Tomcat 默认目录下名为 \"logdemo\" 的文件夹中。成功部署\
    \ Servlet 后，你应该能够在浏览器窗口中输入 Web 服务器 URL（例如 `http://localhost:8080/logdemo/logging.html`）来查看你的\
    \ HTML 文件。\n\n|  | 注意 | 要构建 .war 文件，我们需要使用带有自定义构建脚本的 ANT。.war 文件，即 Web 应用程序归档文件，是\
    \ .jar 文件的一种变体，Tomcat 使用它来进行 Web 应用程序部署。有关使用 ANT 构建应用程序的详细信息，请查阅 ANT 文档。创建 .war\
    \ 文件后，我们需要将其放入 Tomcat 安装目录的 \"/webapps\" 文件夹中。一旦我们重启 Tomcat，它会自动从 .war 文件中提取文件。\
    \ |\n\n基本上有两种方法可以配置 log4j 以使其与 Tomcat 协同工作，下面将介绍这两种方法。\n\n#### 通过系统参数配置\n\n在 Tomcat\
    \ 环境中配置 log4j 并不困难。按照此处描述的步骤，我们可以设置 Tomcat 以使用 log4j：\n\n1.  我们可以将 \"log4j.properties\"\
    \ 文件作为系统变量传递给 Tomcat 的执行环境。\n\n2.  转到 \"%TOMCAT_HOME%\\bin\" 目录下的 \"tomcat.bat\"\
    \ 文件。\n\n3.  添加一个条目，将 CLASSPATH 变量设置为指向包含 \"log4j.properties\" 文件的目录。例如，在以下示例配置中：\n\
    \n    `set CP=%CP%;C:\\Jakarta-tomcat-3.2.1\\webapps\\logdemo\\`\n\n4.  我们将在 \"\
    tomcat.bat\" 文件中添加如下条目：\n\n    ```\n    set TOMCAT_OPTS=-Dlog4j.configuration=log4j.properties\n\
    \    ```\n\n5.  启动 Tomcat，它将加载 \"log4j.properties\" 文件并使用它来打印 log4j 日志信息。\n\n\
    #### 通过 Servlet 初始化配置\n\nApache log4j 可以在 Servlet 初始化时进行配置，方法是通过特定于应用程序的 \"web.xml\"\
    \ 文件传递属性文件的名称。\n\n1.  转到 Tomcat 的 \"logdemo/WEB-INF\" 文件夹。\n\n2.  打开 \"web.xml\"\
    \ 文件并输入以下 Servlet 配置：\n\n    ```\n     <servlet>\n          <servlet-name>LoggingServlet</servlet-name>\n\
    \          <servlet-class>LoggingServlet.class</servlet-class>\n\n          <init-param>\n\
    \          <param-name>log4j-conf</param-name>\n          <param-value>log4j.properties</param-value>\n\
    \          </init-param>\n\n          <load-on-startup>1</load-on-startup>\n \
    \       </servlet>\n    ```\n\n3.  在 `LoggingServlet` 中重写 `init()` 方法，如下所示：\n\n\
    \    ```\n     public void init()throws ServletException\n          {\n      \
    \      super.init();\n            String configFile = getInitParameter(\"log4j-conf\"\
    );\n            PropertyConfigurator.configure(configFile);\n          }\n   \
    \ ```\n\n4.  启动 Tomcat，`LoggingServlet` 将通过 \"log4j.properties\" 文件进行配置。\n\n一旦我们从\
    \ HTML 页面调用 `LoggingServlet`，我们就可以在 Tomcat 控制台中看到以下输出：\n\n```\ninvoked the LoggingServlet...\n\
    ```\n\n|  | 注意 | 我们可以通过更改 log4j 配置文件，将日志信息重定向到任何我们想要的地方。 |\n\n至此，我们已经了解了配置 log4j\
    \ 的各个方面。从下一节开始，我们将详细探讨不同的 log4j 对象。\n"
- fmt: '## Level Object


    `org.apache.log4j.Level`对象取代了log4j旧版本中的`org.apache.log4j.Priority`对象。它表示日志消息的优先级或严重程度。`Logger`和`Appender`可以关联阈值级别。日志消息会根据其级别与`Logger`和`Appender`对象的级别比较结果进行过滤。因此，通过更改与`Logger`及这些对象关联的级别，可以开启或关闭特定级别的日志记录。`Level`类定义了以下级别：


    *   **ALL（最低）：** 此级别具有最低可能的等级，并开启所有日志信息的记录。

    *   **DEBUG：** 此级别用于打印开发阶段有帮助的调试信息。

    *   **INFO：** 此级别用于打印有助于我们确定应用程序内控制流的信息性消息。

    *   **ERROR：** 此级别用于打印与错误相关的消息。

    *   **WARN：** 此级别用于打印与系统某些错误和意外行为相关的信息，这些行为需要立即关注以防止应用程序发生故障。

    *   **FATAL：** 此级别用于打印关于导致应用程序崩溃问题的系统关键信息。

    *   **OFF（最高）：** 这是最高级别，使用此级别将关闭所有日志信息的打印。


    这些级别具有唯一的整数值，可以按从最低到最高的值排列如下：


    `ALL < DEBUG < INFO < WARN < ERROR < FATAL < OFF`


    ## Logger Object


    `Logger`对象是应用程序开发者用于记录任何消息的主要对象。一旦日志信息传递给记录器，其余工作便在后台完成。`Logger`对象仅封装日志消息，不了解这些消息的目标或格式。这就是`Appender`和`Layout`对象发挥作用的地方，我们将在本章后面看到。


    在特定应用程序实例中运行的`Logger`对象遵循父子层次结构。为了说明这个概念，请参考[图5-2](#LiB0037.html#ch05fig02)。


    [![点击展开](fig5-2.jpg)](fig5-2_0.jpg)

    图5-2：Logger对象的父子关系


    层次结构的顶部存在一个根记录器。根记录器存在于我们可能提出的任何自定义记录器层次结构范围之外。它始终作为所有可能记录器层次结构的根记录器存在，并且没有命名空间。所有其他特定于应用程序的`Logger`对象都是根记录器的子对象。记录器的父子关系表示在同一应用程序中运行的记录器之间的依赖性和分离性。这意味着子记录器可以递归地向上继承其父记录器的属性。通常，子记录器将从其父记录器继承以下属性：


    *   `Level`：如果子记录器没有指定显式的树级别，它将使用其直接父级的级别，或者递归向上查找层次结构找到的第一个合适的级别。

    *   `Appender`：如果没有附加到记录器的追加器，则它使用其直接父记录器的追加器，或者递归向上查找树找到的第一个追加器。

    *   `ResourceBundle`：`ResourceBundle`是用于日志消息本地化的键值对模式属性文件。子记录器也会继承其父记录器指定的任何`ResourceBundle`。


    这种层次关系也意味着，当子记录器使用其父记录器的属性时，对父记录器属性的任何更改都会影响子记录器的行为。另一方面，对子记录器属性的更改不会影响父记录器。这种父子关系由log4j上下文中的`additivity`属性决定。


    默认情况下，`Logger`对象的`additivity`标志设置为`true`。可以通过将`additivity`标志设置为`false`来为子记录器禁用`additivity`属性，在这种情况下，它将不会继承父记录器的任何属性。这由`Logger`对象中的以下方法控制：


    ```

    public boolean setAdditivity(boolean value)

    ```


    或者通过设置配置：


    ```

    log4j.logger.loggerName.additivity=false

    ```


    我们可以使用`Logger`对象的各种便捷方法来创建新的命名记录器、获取现有的命名记录器以及在不同优先级级别记录消息。`Logger`类不允许我们实例化一个新的`Logger`实例，而是提供了两个用于获取`Logger`对象实例的`static`方法：


    ```

    public static Logger getRootLogger();

    public static Logger getLogger(String name);

    ```


    第一个方法返回应用程序实例的根记录器。如前所述，根记录器始终存在且没有名称。任何其他命名的`Logger`对象实例都通过第二个方法传入记录器名称来获取。记录器的名称可以是任意字符串。为了使应用程序日志记录更有效且不言自明，记录器的命名起着重要作用。通常，`Logger`对象应被赋予与其所属包对应的名称，或者创建`Logger`实例的完全限定类名。同样，此名称可以强类型化为包含包名或类名的字符串。但更灵活的做法如下例所示（该例也曾在[清单5-4](#LiB0035.html#287)中展示）：


    ```

    Logger logger = Logger.getLogger(SimpleLogging.class.getPackage().getName());

    ```


    这种方法在重构方面是安全的，因为将来如果我们出于任何原因决定更改包结构，日志记录代码无需更改。显然，与强类型化记录器名称相比，您可以看到这种方法的好处，强类型化不太可能为应用程序带来太多好处。


    |  | 注意 | *重构*是在不影响代码外部行为的情况下改进代码内部设计的过程。 |


    当创建一个新的`Logger`实例时，`LogManager`将该实例存储在命名空间存储中，并以命名空间作为键。如果在应用程序运行过程中我们尝试再次创建相同的`Logger`实例，则会返回现有的实例。在实际应用程序中，我们可能*不会*使用根记录器，而是获取我们自己的命名记录器。默认情况下，所有命名记录器都递归地从根记录器继承属性。


    ### 记录日志信息


    一旦我们获得了一个命名记录器的实例，就可以使用记录器的多种方法来记录消息。`Logger`类有以下用于打印日志信息的方法。我们必须记住，`Logger`类从之前的`Category`类继承了所有这些方法。从`Category`类继承的方法有时会引用另一个历史类`Priority`，它现在已被`Level`类取代。我们可以互换使用`Category`与`Logger`以及`Priority`与`Level`，而不会影响任何应用程序的完整性。


    |  | 注意 | 由于`Logger`对象已取代了之前的`Category`对象，因此`Category`对象中的一些方法已被弃用。我们在使用这些方法时必须谨慎，并可能避免直接使用`Category`类中的任何方法。
    |'
  raw: '## Level Object


    The `org.apache.log4j.Level` object replaces the `org.apache.log4j.Priority` object
    in previous versions of log4j. It denotes the priority or severity associated
    with a logging message. A `Logger` and `Appender` can have threshold levels associated
    with them. Logging messages get filtered according to how their levels compare
    to those of both the `Logger` and `Appender` objects. Hence, it is possible to
    turn off or on a certain level of logging by changing the levels associated with
    the `Logger` and these objects. The `Level` class defines the following levels:


    *   *ALL (lowest):* This level has the lowest possible rank and turns on the logging
    of all logging information.


    *   *DEBUG:* This level is used to print debugging information helpful in the
    development stage.


    *   *INFO:* This level is used to print informational messages that help us to
    determine the flow of control within an application.


    *   *ERROR:* This level is used for printing error-related messages.


    *   *WARN:* This level is used for printing information related to some faulty
    and unexpected behavior of the system that needs immediate attention to forestall
    malfunctioning of the application.


    *   *FATAL:* This level is used to print system-critical information about problems
    that are causing the application to crash.


    *   *OFF (highest):* This is the highest level, and using this level turns off
    all the logging information printing.


    The levels have unique integer values attached to them and can be arranged from
    lowest to highest value as follows:


    ALL<DEBUG<INFO<WARN<ERROR<FATAL<OFF


    ## Logger Object


    The `Logger` object is the main object that an application developer uses to log
    any message. Once the logging information is passed to a logger, the rest is done
    behind the scenes. `Logger` objects only encapsulate logging messages and do not
    have any knowledge about the destination or the formatting of those messages.
    This is where the `Appender` and `Layout` objects come into picture, as we will
    see later in this chapter.


    The `Logger` objects acting within a particular instance of an application follow
    a parent-child hierarchy. To illustrate this concept, consider [Figure 5-2](#LiB0037.html#ch05fig02).


    [![Click To expand](fig5-2.jpg)](fig5-2_0.jpg)

    Figure 5-2: The parent-child relationship of Logger objects


    At the top of the hierarchy exists a root logger. The root logger exists outside
    the scope of any custom logger hierarchy that we may come up with. It always exists
    as the root logger for all possible logger hierarchies, and it has no namespace.
    All the other application-specific `Logger` objects are child objects to the root
    logger. The parent-child relationship of loggers signifies the dependency and
    the separation of the loggers acting within the same application. It means that
    a child logger can inherit properties of its parent logger recursively up the
    tree. Typically, a child logger will inherit the following properties from its
    parent logger(s):


    *   `Level`: If the child logger has no explicit tree level specified, it will
    use the level of its immediate parent or the first proper level it finds recursively
    up the hierarchy.


    *   `Appender`: If there is no appender attached to a logger, then it uses the
    appender of its immediate parent logger or the first appender it finds recursively
    up the tree.


    *   `ResourceBundle`: `ResourceBundle`s are key-value pattern properties files
    used for the localization of logging messages. A child logger also inherits any
    `ResourceBundle` specified with its parent logger.


    This hierarchical relationship also means that when a child logger is using the
    properties of its parent logger, any change to the property of the parent logger
    will affect the behavior of the child logger. Changes to properties of child loggers,
    on the other hand, do not affect parent loggers. This parent-child relationship
    is dictated by the `additivity` property in the context of log4j.


    By default, `Logger` objects have the `additivity` flag set to `true`. The `additivity`
    property can be disabled for a child logger by setting the `additivity` flag to
    `false`, in which case it will not inherit any of the parent logger''s properties.
    This is controlled by the following method in the `Logger` object:


    ```

    public boolean setAdditivity(boolean value)

    ```


    or by setting the configuration as:


    ```

    log4j.logger.loggerName.additivity=false

    ```


    We can use various convenience methods of the `Logger` object to create new named
    loggers, obtain an existing named logger, and log messages at various levels of
    priority. The `Logger` class does not allow us to instantiate a new `Logger` instance,
    rather it provides two `static` methods for obtaining a `Logger` object instance:


    ```

    public static Logger getRootLogger();

    public static Logger getLogger(String name);

    ```


    The first of these methods returns the root logger of the application instance.
    As said before, the root logger always exists and does not have a name. Any other
    named `Logger` object instance is obtained through the second method by passing
    the name of the logger. The name of the logger can be any arbitrary string. To
    make application logging more effective and self-explanatory, the naming of loggers
    plays an important role. Generally speaking, a `Logger` object should be given
    a name corresponding to the package it belongs to or a fully qualified class name
    from which the `Logger` instance is created. Again, this name can be strongly
    typed as a string containing the name of the package or the class. But a more
    flexible way of doing so is as depicted in the following example (which was also
    presented earlier in [Listing 5-4](#LiB0035.html#287)):


    ```

    Logger logger = Logger.getLogger(SimpleLogging.class.getPackage().getName());

    ```


    This approach is refactoring proof in the sense that in the future if for any
    reason we decide to change the package structure, the logging code need not change.
    Clearly, you can see the benefit of this approach, as opposed to strongly typing
    the logger name, which is unlikely to render much benefit to the application.


    |  | Note  | *Refactoring* is the process of improving the internal design of
    the code without affecting the external behavior of the code. |


    When a new `Logger` instance is created, the `LogManager` stores the instance
    in namespace storage with the namespace as the key. If during the course of the
    application we try to create the same `Logger` instance again, the existing instance
    is returned. In a real-life application, we would probably *not* use the root
    logger, but instead obtain our own named loggers. All the named loggers by default
    inherit the properties from the root logger recursively.


    ### Logging Information


    Once we obtain an instance of a named logger, we can use several methods of the
    logger to log messages. The `Logger` class has the following methods for printing
    the logging information. We have to remember that the `Logger` class inherits
    all these methods from the previous `Category` class. The methods inherited from
    the `Category` class will sometimes refer to another historic class, `Priority`,
    which is now replaced by the `Level` class. We can interchange the use of `Category`
    with `Logger` and `Priority` with `Level` without affecting any application integrity.


    |  | Note  | As the `Logger` object has replaced the previous `Category` object,
    so too have some methods in the `Category` object been deprecated. We have to
    be cautious in using those methods and possibly avoid using any method directly
    from the `Category` class. |'
  trans: '

    ## Level 对象


    `org.apache.log4j.Level` 对象取代了 log4j 旧版本中的 `org.apache.log4j.Priority` 对象。它表示与日志消息关联的优先级或严重性。`Logger`
    和 `Appender` 可以关联阈值级别。日志消息会根据其级别与 `Logger` 和 `Appender` 对象的级别比较结果进行过滤。因此，通过更改与
    `Logger` 和这些对象关联的级别，可以开启或关闭特定级别的日志记录。`Level` 类定义了以下级别：


    *   *ALL（最低）：* 此级别具有最低的可能等级，并开启所有日志信息的记录。


    *   *DEBUG：* 此级别用于打印在开发阶段有帮助的调试信息。


    *   *INFO：* 此级别用于打印有助于我们确定应用程序内控制流程的信息性消息。


    *   *ERROR：* 此级别用于打印与错误相关的消息。


    *   *WARN：* 此级别用于打印与系统某些错误和意外行为相关的信息，这些行为需要立即关注以防止应用程序发生故障。


    *   *FATAL：* 此级别用于打印关于导致应用程序崩溃的问题的系统关键信息。


    *   *OFF（最高）：* 这是最高级别，使用此级别将关闭所有日志信息的打印。


    这些级别具有与之关联的唯一整数值，并且可以按从最低到最高的值排列如下：


    ALL<DEBUG<INFO<WARN<ERROR<FATAL<OFF


    ## Logger 对象


    `Logger` 对象是应用程序开发者用于记录任何消息的主要对象。一旦日志信息传递给记录器，其余工作就在后台完成。`Logger` 对象仅封装日志消息，不了解这些消息的目标位置或格式。这就是
    `Appender` 和 `Layout` 对象发挥作用的地方，我们将在本章后面看到。


    在特定应用程序实例中运行的 `Logger` 对象遵循父子层次结构。为了说明这个概念，请参考图 5-2。


    ![点击展开](img/fig5-2_0.jpg)

    图 5-2：Logger 对象的父子关系


    层次结构的顶部存在一个根记录器。根记录器存在于我们可能提出的任何自定义记录器层次结构范围之外。它始终作为所有可能记录器层次结构的根记录器存在，并且没有命名空间。所有其他特定于应用程序的
    `Logger` 对象都是根记录器的子对象。记录器的父子关系表明了在同一应用程序中运行的记录器的依赖性和分离性。这意味着子记录器可以递归地向上继承其父记录器的属性。通常，子记录器将从其父记录器继承以下属性：


    *   `Level`：如果子记录器没有指定显式的树级别，它将使用其直接父级的级别，或者递归向上在层次结构中找到的第一个合适的级别。


    *   `Appender`：如果没有附加到记录器的追加器，则它使用其直接父记录器的追加器，或者递归向上在树中找到的第一个追加器。


    *   `ResourceBundle`：`ResourceBundle` 是用于日志消息本地化的键值对模式属性文件。子记录器也会继承其父记录器指定的任何
    `ResourceBundle`。


    这种层次关系还意味着，当子记录器使用其父记录器的属性时，对父记录器属性的任何更改都会影响子记录器的行为。另一方面，对子记录器属性的更改不会影响父记录器。这种父子关系由
    log4j 上下文中的 `additivity` 属性决定。


    默认情况下，`Logger` 对象的 `additivity` 标志设置为 `true`。可以通过将 `additivity` 标志设置为 `false`
    来禁用子记录器的 `additivity` 属性，在这种情况下，它将不会继承父记录器的任何属性。这由 `Logger` 对象中的以下方法控制：


    ```

    public boolean setAdditivity(boolean value)

    ```


    或者通过将配置设置为：


    ```

    log4j.logger.loggerName.additivity=false

    ```


    我们可以使用 `Logger` 对象的各种便捷方法来创建新的命名记录器、获取现有的命名记录器，以及在不同优先级级别记录消息。`Logger` 类不允许我们实例化一个新的
    `Logger` 实例，而是提供了两个用于获取 `Logger` 对象实例的 `static` 方法：


    ```

    public static Logger getRootLogger();

    public static Logger getLogger(String name);

    ```


    这些方法中的第一个返回应用程序实例的根记录器。如前所述，根记录器始终存在并且没有名称。任何其他命名的 `Logger` 对象实例都通过第二个方法传入记录器的名称来获取。记录器的名称可以是任意字符串。为了使应用程序日志记录更有效且不言自明，记录器的命名起着重要作用。通常，`Logger`
    对象应被赋予一个与其所属包相对应的名称，或者创建 `Logger` 实例的完全限定类名。同样，此名称可以强类型化为包含包名或类名的字符串。但更灵活的做法如下例所示（该例也曾在清单
    5-4 中给出）：


    ```

    Logger logger = Logger.getLogger(SimpleLogging.class.getPackage().getName());

    ```


    这种方法在重构方面是安全的，因为将来如果我们出于任何原因决定更改包结构，日志记录代码无需更改。显然，与强类型化记录器名称相比，您可以看到这种方法的好处，强类型化不太可能为应用程序带来太多好处。


    |  | 注意 | *重构* 是在不影响代码外部行为的情况下改进代码内部设计的过程。 |


    当创建一个新的 `Logger` 实例时，`LogManager` 将该实例存储在命名空间存储中，并以命名空间作为键。如果在应用程序运行过程中我们尝试再次创建相同的
    `Logger` 实例，则会返回现有的实例。在实际应用程序中，我们可能*不会*使用根记录器，而是获取我们自己的命名记录器。所有命名记录器默认递归地从根记录器继承属性。


    ### 记录日志信息


    一旦我们获得了一个命名记录器的实例，就可以使用记录器的多种方法来记录消息。`Logger` 类有以下用于打印日志信息的方法。我们必须记住，`Logger`
    类从之前的 `Category` 类继承了所有这些方法。从 `Category` 类继承的方法有时会引用另一个历史类 `Priority`，它现在已被 `Level`
    类取代。我们可以互换使用 `Category` 与 `Logger`，以及 `Priority` 与 `Level`，而不会影响任何应用程序的完整性。


    |  | 注意 | 由于 `Logger` 对象已取代了之前的 `Category` 对象，因此 `Category` 对象中的某些方法也已被弃用。我们在使用这些方法时必须谨慎，并尽可能避免直接使用
    `Category` 类中的任何方法。 |

