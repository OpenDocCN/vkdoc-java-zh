    \        try {\n            props.load(new FileInputStream(propFile));\n     \
    \       driverName = props.getProperty(\"DriverName\");\n            jdbcURL =\
    \ props.getProperty(\"URL\");\n            userName = props.getProperty(\"userName\"\
    );\n            password = props.getProperty(\"Password\");\n            System.out.println(\"\
    驱动名称: \"+driverName);\n            System.out.println(\"URL: \"+jdbcURL);\n  \
    \          System.out.println(\"用户名: \"+userName);\n            System.out.println(\"\
    密码: \"+password);\n            // 获取 rmi 服务器的引用\n            server= (ServerInterface)\n\
    Naming.lookup(\"rmi://oemcomputer/AppServer\");\n            // 获取日志记录器的实例\n\n\
    logger = Logger.getLogger(\"com.apress.db\");\n            // 获取远程处理程序的实例\n  \
    \          // 与名为 LoggingServer 的日志服务器通信\n            remoteHandler=\nRemoteHandler.getInstance(\"\
    rmi://oemcomputer/LoggingServer\");\n            // 获取窗口处理程序的实例\n            windowHandler\
    \ = WindowHandler.getInstance();\n            // 将远程处理程序添加到日志记录器\n           \
    \ logger.addHandler(remoteHandler);\n            // 将窗口处理程序添加到日志记录器\n        \
    \    logger.addHandler(windowHandler);\n            // 将日志记录器级别设置为与处理程序级别相同\n\
    \            logger.setLevel(remoteHandler.getLevel());\n\n//配置完成\n          \
    \  logger.config(\"客户端配置完成...\");\n        }catch(FileNotFoundException fnfe)\
    \ {\n            fnfe.printStackTrace();\n            System.out.println(\"找不到属性文件:\
    \ \"+propFile);\n            System.exit(1);\n        }catch(IOException ioe)\
    \ {\n            ioe.printStackTrace();\n            System.out.println(\"读取属性文件时出现问题:\
    \ \"+propFile);\n            System.exit(1);\n        }catch(NotBoundException\
    \ re)\n        {\n            logger.severe(\"名为 AppServer 的服务器未绑定 \"+re.toString());\n\
    \        }\n    }\n    // 用于获取连接的私有辅助方法\n    private Connection makeConnection()throws\
    \ SQLException {\n        Connection conn = null;\n        try {\n           \
    \ Class.forName(driverName);\n            conn = DriverManager.getConnection(jdbcURL,\
    \ userName, password);\n        }catch(ClassNotFoundException cnfe) {\n      \
    \      System.out.println(\"未找到类: \"+driverName);\n            System.exit(1);\n\
    \        }catch(SQLException sqle) {\n            throw sqle;\n        }\n   \
    \     System.out.println(\"评估结果: \"+(logger.getLevel().intValue()<Level.INFO.intValue()));\n\
    \        logger.info(\"获取到的连接为: \"+conn);\n        return conn;\n    }\n\n//用于关闭连接的私有方法\n\
    \    private void closeConnection(Connection conn) {\n        try {\n        \
    \    if(conn !=null)\n                conn.close();\n        }catch(SQLException\
    \ sqle) {\n            //警告\n            logger.warning(\"无法关闭连接..\");\n     \
    \   }\n        logger.info(\"连接已关闭..\");\n    }\n\n/**\n     * 这是一个私有方法，负责将\n\
    \     * 员工对象数据写入数据库。\n     * @param conn Connection 对象\n     * @param employee\
    \ Employee 对象\n     * @exception SQLException 如果出现问题则抛出\n     */\n    private\
    \ void insertData(Connection conn, Employee employee)\nthrows SQLException {\n\
    \        logger.entering(ClientComponent.class.getName(), \"insertData()\");\n\
    \        Statement stmt =null;\n        StringBuffer queryString = new StringBuffer(\"\
    INSERT INTO\nEMPLOYEE VALUES(\");\n        try {\n            stmt = conn.createStatement();\n\
    \            queryString.append(employee.getCode());\n            queryString.append(\"\
    ,'\");\n            queryString.append(employee.getName());\n            queryString.append(\"\
    ','\");\n            queryString.append(employee.getDepartment());\n         \
    \   queryString.append(\"',\");\n            queryString.append(employee.getAge());\n\
    \            queryString.append(\")\");\n\nlogger.info(\"查询字符串为: \"+queryString.toString());\n\
    \            stmt.execute(queryString.toString());\n            logger.fine(\"\
    数据已插入..\");\n            conn.commit();\n            stmt.close();\n        }catch(SQLException\
    \ sqle) {\n            throw sqle;\n        }\n\nlogger.exiting(ClientComponent.class.getName(),\
    \ \"insertData()\");\n    }\n"
- fmt: "```java\n/**\n * This method is responsible for obtaining the employee data\n\
    \ * from the specified file and writing it to the database\n * @param docId the\
    \ document name in the remote place containing\n * the XML data.\n */\npublic\
    \ void setEmployeeData(String docId) throws SQLException {\n    Connection conn\
    \ = null;\n    List empList = null;\n    Iterator iterator = null;\n    logger.entering(ClientComponent.class.getName(),\
    \ \"setEmployeeData()\");\n    try {\n        conn = makeConnection();\n     \
    \   empList = server.readDocument(docId);\n        iterator = empList.iterator();\n\
    \        while(iterator.hasNext()) {\n            Employee emp = (Employee)iterator.next();\n\
    \            insertData(conn, emp);\n        }\n        logger.info(\"Job done...\"\
    );\n    } catch(SQLException sqle) {\n        logger.severe(\"SQL problem: \"\
    +sqle.toString());\n    } catch(RemoteException re) {\n        logger.severe(\"\
    Remote exception in invoking the method readDocument() \"+re.toString());\n  \
    \  } finally {\n        closeConnection(conn);\n    }\n    logger.exiting(ClientComponent.class.getName(),\
    \ \"setEmployeeData()\");\n}\n\n/**\n * @param args the command line arguments\n\
    \ */\npublic static void main(String[] args) {\n    String propFile = args[0];\n\
    \    String fileName = args[1];\n    ClientComponent comp = new ClientComponent(propFile);\n\
    \    try {\n        comp.setEmployeeData(\"employee.xml\");\n    } catch(SQLException\
    \ sqle) {\n        sqle.printStackTrace();\n    }\n}\n```\n\n`ClientComponent`\
    \ obtains its own named logger with the namespace `\"com.apress.client\"` and\
    \ attaches two separate `Handler`s for logging information to a remote place and\
    \ to a small Java window on the client machine.\n\n## Creating the Employee Data\
    \ File\n\nNow we are ready to execute our little demo application. Let's create\
    \ a small XML file, as shown in [Listing 4-13](#LiB0030.html#ch04ls13), containing\
    \ the employee data.\n\n**Listing 4-13: employee.xml**\n\n```xml\n<record>\n<employee>\n\
    \  <code>100</code>\n  <name>Sam</name>\n  <dept>Dev</dept>\n  <age>22</age>\n\
    </employee>\n<employee>\n  <code>101</code>\n  <name>paul</name>\n  <dept>Dev</dept>\n\
    \  <age>38</age>\n</employee>\n<employee>\n  <code>102</code>\n  <name>derek</name>\n\
    \  <dept>Sales</dept>\n  <age>43</age>\n</employee>\n</record>\n```\n\n## Configuring\
    \ the Database\n\nThe previous program will require a table called `EMPLOYEE`\
    \ to be defined in a database. The following SQL command will create this table\
    \ with `\"CODE\"` being the primary key.\n\n```sql\nCREATE TABLE EMPLOYEE(\"CODE\"\
    \ NUMBER NOT NULL,\"NAME\" VARCHAR(10)\nNOT NULL,\"DEPT\" VARCHAR(10) NOT NULL,\
    \ \"AGE\" NUMBER NOT NULL,\nPRIMARY KEY(\"CODE\"));\n```\n\nThe following configuration\
    \ file, `\"db.properties\"`, will pass the database connection parameters to the\
    \ `ClientComponent` at startup:\n\n```\nDriverName=sun.jdbc.odbc.JdbcOdbcDriver\n\
    URL=jdbc:odbc:dbdef\nuserName=system\nPassword=manager\n```\n\nAs we are using\
    \ JDBC-ODBC driver for this simple example, we need to create a Data Source Name\
    \ (DNS) with the name `\"dbdef\"` and configure it to point to the right data\
    \ source.\n\n## Starting Up the Server\n\nWe need to generate the `Stub` and `Skeleton`\
    \ classes for the server component. This can be done by the following command:\n\
    \n```\nrmic com.apress.server.ServerComponent\n```\n\nWe can start the server\
    \ component by executing the `RMIManager` class:\n\n```\njava com.apress.server.RMIManager\
    \ start\n```\n\n## Running the Client\n\nYou probably have noticed that we are\
    \ using the `RemoteHandler` and `WindowHandler` objects developed in [Chapter\
    \ 2](#LiB0012_split_000.html#44). Both these `Handler`s have the ability to read\
    \ the initialization parameters from the configuration file specified via the\
    \ command line option `-Djava.util.logging.config.file` or from the default JDK\
    \ `\"logging.properties\"` configuration file. We can design a custom configuration\
    \ file with the following entry, setting the level used by the `RemoteHandler`\
    \ and the `WindowHandler`:\n\n```\n############################################################\n\
    # RemoteHandler configuration\n# This is a custom handler developed to enable\
    \ remote logging\n#############################################################\n\
    sam.logging.handler.RemoteHandler.level=FINEST\n\n############################################################\n\
    #WindowHandler configuration\n#This is a custom handler which passes the logging\
    \ info\n#to a Java based logging window\n#############################################################\n\
    \nsam.logging.handler.WindowHandler.level = FINEST\n```\n\nThe `ClientComponent`\
    \ is designed to acquire the database connection properties from a configuration\
    \ file and also the name of the employee data XML file in the remote server as\
    \ a command line option. The `\"db.properties\"` file specified previously defines\
    \ the database connection properties, and we pass `\"employee.xml\"` as the name\
    \ of the remote file from which to obtain the employee data.\n\n```\nJava -Djava.util.logging.config.file=/your-path/config.properties\n\
    com.apress.db.ClientComponent /your-path/db.properties employee.xml\n```\n\nThe\
    \ logging information related to the `ClientComponent` will appear in a small\
    \ Java window as shown in [Figure 4-5](#LiB0030.html#ch04fig05).\n\n[![Click To\
    \ expand](fig4-5.jpg)](fig4-5_0.jpg)\n**Figure 4-5:** Logging information in the\
    \ client-side logging window\n\nOn the server side, the `ServerComponent` will\
    \ store its own logging information as well as the logging information being passed\
    \ from the `ClientComponent`. The `ServerComponent`, as discussed earlier, has\
    \ its own logging enabled with a `FileHandler` object that has the fixed pattern\
    \ `%h/employeeLog%g.out`. Hence, the `ServerComponent` logging information will\
    \ be located in the `\"user.home\"` directory under the names `employeeLog0.out`,\
    \ `employeeLog1.out`, etc. On the other hand, the `RemoteLoggingServer` is responsible\
    \ for configuring the location for the remote logging information enabled by any\
    \ client application using the `RemoteHandler`. If no pattern is specified with\
    \ `RemoteLoggingServer`, the default `FileHandler` pattern is used.\n\nWe can\
    \ limit the amount of information being printed in any of the logging destinations\
    \ by changing the level associated with the `Handler`. For example, in the `ClientComponent`\
    \ JVM, if we change the level of the `WindowHandler` to `Level.INFO`, then we\
    \ will see the logging information being printed as shown in [Figure 4-6](#LiB0030.html#ch04fig06).\n\
    \n[![Click To expand](fig4-6.jpg)](fig4-6_0.jpg)\n**Figure 4-6:** The logging\
    \ information in the client-side logging window\n\nClearly, changing the level\
    \ has reduced the amount of information. The log is now more readable. But notice\
    \ that we have achieved this by merely changing the configuration file—this is\
    \ the beauty of having a configurable logging API like the JDK 1.4 logging API.\n\
    \n## Conclusion\n\nIn the previous chapters, we have examined the architecture,\
    \ use, and extension of the JDK 1.4 logging API. We have also seen one practical\
    \ example of how the logging API can be very useful in tracing and debugging applications.\
    \ The flexibility of publishing log messages when needed and the granularity of\
    \ our choices means a great deal to application developers and administrators.\
    \ Beginning in the [next chapter](#LiB0032_split_000.html#266), we will explore\
    \ in similar detail log4j, another popular Java-based logging API from Apache.\n\
    \n# Chapter 5: Understanding Apache log4j"
