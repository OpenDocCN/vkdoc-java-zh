    ### DateLayout 对象


    正如我们在上一节中所见，`TTCCLayout` 类使用另一个类 `DateLayout` 来格式化其日期和时间戳相关信息。`DateLayout` 是一个
    `abstract` 类，它扩展了 `org.apache.log4j.Layout` 类。它也是一个用于处理所有日期相关格式化任务的便捷类，它接受一个 `LoggingEvent`
    对象和一个日期格式，用于格式化 `LoggingEvent` 对象中包含的时间戳。


    `DateLayout` 类具有表 6-6 中列出的 bean 属性，用于设置日期相关格式化任务的参数。


    表 6-6：DateLayout 类中的 Bean 属性


    | Bean 属性 | 方法 | 描述 | 默认值 |

    | --- | --- | --- | --- |

    | `dateFormat` | `setDateFormat(String)` | 设置日期格式，使用 Java `SimpleDateFormat` 样式（例如
    `yyyy-MM-dd`）或字符串 NULL、RELATIVE、DATE、ABSOLUTE 或 ISO8601 之一 | 默认为 RELATIVE |

    | `timeZone` | `setTimeZone(String)` | 以 `java.util.TimeZone.getTimeZone(String)`
    方法指定的时区（例如 GMT-8:00） | 默认为空 |


    与 `DateLayout` 一起使用的日期格式具有表 6-7 中列出的属性。


    表 6-7：DateLayout 类中的日期格式


    | 日期格式 | 含义 |

    | --- | --- |

    | NULL | 不显示任何日期或时间。 |

    | RELATIVE | 显示应用程序启动后经过的时间。 |

    | DATE | 使用 `dd MMM YYYY HH:mm:ss, SSS` 模式格式化日期——例如，2002 年 10 月 10 日 15:30:39,450。最后的
    `SSS` 表示应用程序启动后经过的时间。 |

    | ABSOLUTE | 使用 `HH:mm:ss, SSS` 模式格式化日期——例如，10:49:33,459。最后的 `SSS` 表示应用程序启动后经过的时间。
    |

    | ISO8601 | 使用 `YYYY-mm-dd HH:mm:ss, SSS` 模式格式化日期——例如，2002-10-20 10:49:33,459。
    |


    任何我们想要格式化和发布与日志相关的日期和时间戳信息的 `Layout` 对象，都可能使用此类来格式化此类信息。


    ### HTMLLayout 对象


    一个设计良好的系统的目标是让用户对信息的呈现方式感到舒适。在这方面，您的应用程序可能需要以漂亮的 HTML 格式文件生成日志信息。`org.apache.log4j.HTMLLayout`
    是一个专门用于以 HTML 格式格式化日志信息的对象。


    `HTMLLayout` 类扩展了 `abstract org.apache.log4j.Layout` 类，并重写了其基类中的 `format()` 方法以提供
    HTML 样式的格式化。这是一个非常简单的 `Layout` 对象，具有表 6-8 中列出的可配置 bean 属性。


    表 6-8：HTMLLayout 中的 Bean 属性


    | Bean 属性 | 方法 | 描述 | 默认值 |

    | --- | --- | --- | --- |

    | `contentType` | `setContentType(String)` | 设置 HTML 内容的内容类型。 | 默认为 "text/html"
    |

    | `locationInfo` | `setLocationInfo(String)` | 设置日志事件的位置信息。 | 默认为 `false` |

    | `title` | `setTitle(String)` | 设置 HTML 内容的标题。 | 默认为 "Log4j Log Messages" |


    `HTMLLayout` 对象在其显示的日志信息中包含以下内容：


    *   从应用程序启动到生成特定日志事件之前经过的时间

    *   调用日志请求的线程名称

    *   与此日志请求关联的级别

    *   日志记录器的名称

    *   程序文件和调用此日志的行号的可选位置信息

    *   日志消息

    *   `NDC` 信息

    *   应用程序中生成并需要记录的任何异常（这是因为该对象能够处理 `java.lang.Throwable` 实例。）


    为了演示 `HTMLLayout` 对象的格式化能力，我们将使用清单 6-1 中提供的相同程序，但传递一个不同的配置文件来使用 `HTMLLayout` 配置日志记录器。清单
    6-3 描述了此配置文件 "html.properties"。


    清单 6-3：html.properties


    | **![开始示例](img/_1.gif)** |


    ```

    #配置自定义日志记录器

    log4j.logger.com.apress.logging.log4j=DEBUG, FILE


    log4j.appender.FILE=org.apache.log4j.FileAppender

    log4j.appender.FILE.File=htmlLayout.html


    log4j.appender.FILE.layout=org.apache.log4j.HTMLLayout

    log4j.appender.FILE.layout.Title=HTML 布局演示

    log4j.appender.FILE.layout.LocationInfo=true

    ```


    | **![结束示例](img/_1.gif)** |


    |  |


    在配置文件中，我们为 `FileAppender` 对象分配了文件名 "htmlLayout.html"，日志信息将写入此文件。该文件将在您运行应用程序的路径中创建。`FileAppender`
    反过来使用 `HTMLLayout` 来格式化日志信息。`HTMLLayout` 对象的 bean 属性 `LocationInfo` 设置为 `true`，`Title`
    设置为 "HTML 布局演示"。


    使用此配置文件执行程序将创建包含所有日志信息的 "htmlLayout.html" 文件。图 6-2 显示了此 HTML 文件。


    ![点击展开](img/fig6-2_0.jpg)

    图 6-2：使用 HTMLLayout 生成的 HTML 文件

