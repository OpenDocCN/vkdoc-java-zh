    ## 结论


    在本章中，我们讨论了 log4j 的一些高级日志记录概念。现在，我们已经看到了 log4j API 在实现分布式日志记录活动方面的强大能力。当应用程序规模庞大、分布广泛，并且与多个其他自定义或遗留应用程序交互时，这一点尤为重要。通过远程管理和查看日志跟踪，应用程序的远程管理变得更加容易。这使我们能够更好地控制应用程序的日常维护。


    正如我们所见，log4j 的大部分日志记录框架都是可配置的。在我们所有的示例中，只需将应用程序指向不同的配置文件，就能改变日志记录行为。毫无疑问，您能够体会到
    log4j 的强大之处，并从中受益，将其应用于您自己的应用程序中。


    在下一章中，我们将探讨如何利用 log4j 的现有框架，并对其进行扩展，以编写特定于应用程序的组件。


    # 第 8 章：扩展 log4j 以创建自定义日志记录组件


    ## 概述


    在前几章中，我们介绍了 log4j 的核心框架。我们讨论了 `Logger`、`Appender`、`Layout` 和 `Filter` 对象如何相互交互，并将日志信息发布到首选目标。Apache
    log4j 提供了大量的 `Appender` 对象。这些对象使我们能够将日志数据发布到本地机器，并通过网络分发日志数据。此外，log4j 灵活且高度可配置的特性允许我们仅通过更改配置文件就能完全改变日志记录行为。


    这一切都非常出色且实用。尽管如此，在某些情况下，log4j 的默认功能可能无法完全满足应用程序的需求。这种限制更多是由于应用程序本身的复杂性，而非 log4j
    的设计问题。在这种情况下，我们必须扩展 log4j 框架，设计自己的日志记录组件，以满足应用程序的需求。


    在本章中，我们将讨论如何扩展 log4j 框架以创建特定于应用程序的组件。本文讨论的主题和提供的示例将作为开发特定于应用程序的自定义日志记录组件的指南。


    ## 创建自定义 WindowAppender


    在本节中，让我们探讨如何创建我们自己的 `Appender` 对象。在应用程序中，我们可能需要基于 Java 窗口的日志记录。通过某种 GUI 控件（例如一个小窗口）来监控日志信息是一个常见的应用程序需求。这意味着应用程序中的
    `Logger` 对象应配置为将日志信息发送到 Java 窗口。为了实现这一点，我们可以创建一个名为 `WindowAppender` 的自定义附加器，它能够将所有日志信息打印到一个基于
    Java 的小窗口中。


    ### 自定义 WindowAppender 的特性


    正如在第 5 章中讨论 log4j API 中可用的几个 `Appender` 对象时提到的，这些对象都继承自一个名为 `AppenderSkeleton`
    的基类。我们想要创建的任何自定义 `Appender` 对象都必须遵循这个附加器层次结构。log4j 框架在调用任何指定的附加器之前会检查此条件，并忽略任何不遵循附加器层次结构的附加器。


    遵循附加器层次结构使得编写自定义 `Appender` 对象变得相当容易。在本例中，我们将创建一个 `WindowAppender` 对象。在编写 `WindowAppender`
    对象的代码之前，让我们先看看我们将包含的特性：


    *   `WindowAppender` 将创建一个基于 Java `Frame` 的小窗口。

    *   该窗口将在可滚动区域中显示日志信息。

    *   窗口的 `title`、`width` 和 `height` 属性应可通过 bean 属性进行配置。


    这看起来很简单，但我们必须意识到这个 `WindowAppender` 存在一些瓶颈。我们需要决定任何应用程序中的不同 `Logger` 对象将如何访问 `WindowAppender`。在创建
    `WindowAppender` 对象之前，以下几点是需要考虑的重要因素：


    *   一个应用程序可能有多个 `Logger` 对象，每个对象都可能尝试使用 `WindowAppender` 对象来记录信息。

    *   我们需要确保对于所有创建的 `WindowAppender` 实例，只有一个窗口是活动的。

    *   如果每个使用 `WindowAppender` 对象的 `Logger` 对象都创建一个单独的日志窗口，系统很快就会充满日志窗口，这是不可取的。


    ### 自定义 WindowAppender 的架构


    考虑到我们需要提供的特性以及应该注意的瓶颈，我们需要找到一种方法来创建日志窗口的单个实例，并使其对所有 `WindowAppender` 实例可用。创建日志窗口的最佳时机是在附加器初始化时。


    为了理解这一点，让我们回顾一下附加器的初始化过程：


    *   如果附加器配置在配置文件中指定，log4j 框架将从该文件中读取附加器配置。

    *   log4j 框架首先通过调用指定附加器类的默认构造函数来创建该类的实例。

    *   如果配置文件中指定了其他 bean 属性，则会调用相应 bean 属性的 `set()` 方法来设置属性值。

    *   最后，调用指定附加器类的 `activateOptions()` 方法来初始化附加器的任何可选配置。此方法对于任何附加器都是可选的，因此特定 `Appender`
    对象中可能存在也可能不存在。


    现在回到 `WindowAppender`，初始化日志窗口的最佳位置在哪里？因为我们有用于设置日志窗口 `title`、`height` 和 `width`
    属性的 bean 属性，所以我们不能在初始化过程设置这些 bean 属性之前创建日志窗口的实例。因此，在 bean 属性设置之后创建日志窗口实例的最佳位置是在
    `activateOptions()` 方法中。


    此外，我们需要确保不会创建超过一个日志窗口实例。因此，我们应该将日志窗口的创建和实例化移到一个 `synchronized` 方法中，以返回日志窗口的 `static`
    单例实例。

