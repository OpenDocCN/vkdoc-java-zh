  trans: "\n现在我们已经了解了 log4j 的核心组件，是时候简要讨论一下它们如何相互交互了。log4j 框架的核心部分是 `Logger` 对象。应用程序实例化一个命名的\
    \ `Logger` 实例，并向其传递不同的日志信息。`Logger` 对象有一个与之关联的指定 `Level` 对象。`Logger` 对象提供了多种日志记录方法，能够记录按不同级别分类的信息。\n\
    \n一个 `Logger` 只会记录 `Level` 等于或大于其指定 `Level` 的消息，否则会拒绝日志记录请求。一旦满足 `Level` 条件，`Logger`\
    \ 对象会将日志信息传递给所有与其关联的 `Appender` 对象，以及递归地传递给其父 `Logger` 关联的所有 `Appender` 对象，直至日志层次结构的顶层。\n\
    \n与 `Logger` 对象类似，`Appender` 对象也可以附加阈值 `Level`。日志信息会根据 `Appender` 附加的阈值 `Level`\
    \ 进行验证。如果日志消息的 `Level` 等于或大于阈值 `Level`，则日志消息会传递到下一阶段。然后，`Appender` 对象会查找与其关联的任何\
    \ `Filter` 对象。如果存在，日志信息会依次通过链中的所有 `Filter` 对象。一旦消息被所有 `Filter` 对象批准，`Appender`\
    \ 就会利用与其关联的任何 `Layout` 对象来格式化消息，最后将日志信息发布到首选目标。图 5-1 以 UML 时序图的形式描述了 log4j 日志架构的整体流程。\n\
    \n![点击展开](img/fig5-1_0.jpg)\n图 5-1：log4j 框架概述\n\n如果你已经阅读过第 2 章到第 4 章中关于 JDK 1.4\
    \ 日志 API 的讨论，你可能会好奇这两种日志 API 之间的异同。从表面上看，这两种 API 的架构惊人地相似。然而，这两种 API 之间存在着微妙但至关重要的差异，我们将在第\
    \ 10 章中讨论这些差异。\n\n## 配置 log4j\n\n在应用程序中使用 log4j 之前，我们需要以特定于应用程序的方式配置 log4j。配置\
    \ log4j 通常涉及分配 `Level`、定义 `Appender` 和指定 `Layout` 对象。配置信息通常以键值对的形式定义在属性文件中。也可以使用\
    \ XML 格式定义 log4j 配置，我们将在本节后面讨论。默认情况下，`LogManager` 类会在用于加载 log4j 类的类路径中查找名为 \"\
    log4j.properties\" 的文件。\n\n使用外部配置文件作为控制日志行为的手段是一个特别有用的特性，因为切换到完全不同的日志方案无需更改源代码。\n\
    \n清单 5-1 展示了一个简单的 log4j 配置。它定义了根日志记录器的级别和附加器。\n\n清单 5-1：示例 log4j 配置文件\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\n# 将根日志记录器的级别设置为 DEBUG，并将其附加器设置为名为 X 的附加器\nlog4j.rootLogger = DEBUG,\
    \ X\n\n# 将名为 X 的附加器设置为控制台附加器\nlog4j.appender.X=org.apache.log4j.ConsoleAppender\n\
    \n# 为附加器 X 设置布局\nlog4j.appender.X.layout=org.apache.log4j.PatternLayout\nlog4j.appender.X.layout.conversionPattern=%m%n\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n上述配置将根日志记录器的级别定义为 DEBUG，并指定要使用的附加器为\
    \ `X`。接下来，我们将附加器 `X` 定义为引用 `org.apache.log4j.ConsoleAppender` 对象，并将附加器的布局指定为 `org.apache.log4j.PatternLayout`。`PatternLayout`\
    \ 还需要提供一个转换模式或格式。在本例中，我们提供了转换模式 `%m%n`，这意味着日志消息打印后会跟一个换行符。可以定义更复杂和更具描述性的转换模式，我们将在第\
    \ 6 章中详细讨论。\n\n|  | 注意  | 在转换模式中，`%m` 代表消息字符串，`%n` 代表换行符。我们将在第 6 章中了解更多关于这些转换模式的内容。\
    \ |\n\n更复杂的配置可以为特定的日志记录器附加多个附加器。每个附加器又可以有不同布局，并且该布局可以关联一个转换模式。清单 5-2 是一个更复杂配置文件的示例。\n\
    \n清单 5-2：复杂的 log4j 配置文件\n\n| **![开始示例](img/_1.gif)** |\n\n```\n# 定义根日志记录器，带有两个附加器，分别写入控制台和文件\n\
    log4j.rootLogger = DEBUG, CONSOLE, FILE\n\n# 定义你自己的名为 com.foo 的日志记录器\nlog4j.logger.com.foo=com.foo.MyLogger\n\
    # 为你的日志记录器分配附加器\nlog4j.logger.com.foo.appender=FILE\n\n# 定义名为 FILE 的附加器\nlog4j.appender.FILE=org.apache.log4j.FileAppender\n\
    log4j.appender.FILE.File=${user.home}/log.out\n\n# 定义名为 CONSOLE 的附加器\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\n\
    log4j.appender.CONSOLE.conversionPattern=%m%n\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n此配置文件将根日志记录器定义为具有 DEBUG 级别，并为其附加了两个名为 `CONSOLE` 和 `FILE` 的附加器。我们定义了一个名为\
    \ `com.foo` 的自定义日志记录器，并定义了代表该自定义日志记录器的 Java 类文件。然后，我们为自定义日志记录器附加了一个名为 `FILE` 的附加器。附加器\
    \ `FILE` 被定义为 `org.apache.log4j.FileAppender`。`FILE` 附加器写入位于 `user.home` 系统路径下名为\
    \ \"log.out\" 的文件。需要注意的是，log4j 支持 UNIX 风格的变量替换，例如 `${variableName}`。定义的变量名被视为键，并首先在系统属性中搜索。如果未找到，log4j\
    \ 框架随后会在正在解析的属性文件中查找该变量的值。然后，`CONSOLE` 附加器被分配给 `org.apache.log4j.ConsoleAppender`，定义的转换模式是\
    \ `%m%n`，这意味着打印的日志消息后面会跟一个换行符。\n\n### XML 风格配置\n\n使用 log4j，还可以在 XML 文件中定义配置参数，并在启动时将该文件传递给应用程序以配置不同的日志组件。XML\
    \ 配置遵循一个名为 \"log4j.dtd\" 的文档类型定义 (DTD)。配置参数和值以标签格式描述。例如，清单 5-1 中列出的配置信息可以用 XML\
    \ 格式定义如下：\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<!DOCTYPE log4j:configuration\
    \ SYSTEM \"log4j.dtd\">\n<log4j:configuration>\n  <root>\n    <priority value\
    \ =\"debug\" />\n    <appender-ref ref=\"X\"/>\n  </root>\n  <appender name=\"\
    X\" class=\"org.apache.log4j.ConsoleAppender\">\n    <param name=\"conversionPattern\"\
    \ value=\"%m%n\"/>\n  </appender>\n</log4j:configuration>\n```\n\nXML 风格配置和属性风格配置在配置\
    \ log4j 方面都非常有效。两者都是灵活且优秀的配置风格。然而，log4j 中的一些组件，如 `Filter`、`AsyncAppender` 等，似乎只能通过\
    \ XML 风格配置进行配置。看起来 log4j 正在从属性风格配置向 XML 风格配置演进，并逐渐将 XML 风格配置作为标准。就目前而言，我们需要掌握这两种配置风格。\n"
- fmt: "### Default Initialization\n\nIn general, log4j makes no assumption about\
    \ the environment it is running in. Therefore, it is the application developer's\
    \ responsibility to configure log4j. Configuring log4j essentially means specifying\
    \ loggers, appenders, layouts, etc. The `LogManager` class performs the initialization\
    \ operation at startup only once through a class-level `static` initializer block.\
    \ The default initialization operation essentially consists of the following steps:\n\
    \n1.  The `LogManager` class looks for the system property `log4j.configuration`.\n\
    2.  If the `log4j.configuration` property is not defined, then it tries to look\
    \ for a resource named `log4j.properties` in the application classpath.\n3.  It\
    \ then attempts to convert the defined configuration resource string to an `URL`\
    \ object. If the resource string cannot be converted into a valid `java.net.URL`\
    \ object, then a `java.net.MalformedURLException` is thrown.\n4.  If no resource\
    \ can be found, then the initialization is aborted.\n5.  If the resource is found\
    \ and if it is a normal Java properties-style file containing configuration information\
    \ in a key-value format, then the `org.apache.log4j.PropertyConfigurator` class\
    \ is used to parse the configuration file. If the configuration file is an XML\
    \ file, then the `org.apache.log4j.xml.DOMConfigurator` class is used to parse\
    \ the XML file and initialize the logging objects.\n\nIt is also possible to avoid\
    \ the default initialization classes such as `LogManager` and write your own configuration\
    \ class. The custom configuration class can be specified as a `log4j.configurationClass`\
    \ to the Java runtime at application startup. Any custom configuration class by\
    \ default should implement the `org.apache.log4j.spi.Configurator` interface.\n\
    \nFor example, we can pass the configuration file and configuration class respectively\
    \ to the Java runtime with the following commands:\n\n```\njava -Dlog4j.configuration=config\
    \ file yourApp\njava -Dlog4j.configurationClass=config class yourApp\n```\n\n\
    ### Creating a Configuration File\n\nWe will now see how to write a small program\
    \ that will print very basic logging information with the help of a `Logger` object.\
    \ We will create our own configuration properties file as defined in [Listing\
    \ 5-3](#LiB0035.html#ch05ls03), give it the name `log4j.properties`, and pass\
    \ it to the Java runtime as a system property.\n\n**Listing 5-3: log4j.properties**\n\
    \n```\n#set the level of the root logger to DEBUG (the lowest level) and\nset\
    \ its appender\n#as an appender named X\nlog4j.rootLogger = DEBUG, X\n\n#set your\
    \ own logger\nlog4j.logger.com.apress.logging.log4j=DEBUG, X\n\n#set the appender\
    \ named X to be a console appender\nlog4j.appender.X=org.apache.log4j.ConsoleAppender\n\
    #set the layout for the appender X\nlog4j.appender.X.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.X.layout.conversionPattern=%p-%m%n\n```\n\nIn this configuration\
    \ file, we have defined our own logger, `com.apress.logging.log4j`, and assigned\
    \ it the level DEBUG and the appender `X`. The appender `X` is again defined to\
    \ be a `org.apache.log4j.ConsoleAppender` with a conversion pattern of `%m%n`,\
    \ which means the logging message will be followed by a newline character and\
    \ printed to its default output stream, `System.out`. The `%p` sign will print\
    \ the level of the logging message as a part of the output.\n\nThe program in\
    \ [Listing 5-4](#LiB0035.html#ch05ls04), `SimpleLogging.java`, is intended to\
    \ print a simple debugging message. The main point to take away is that the `Logger`\
    \ will be configured through the `log4j.properties` file defined earlier in [Listing\
    \ 5-3](#LiB0035.html#ch05ls03).\n\n**Listing 5-4: SimpleLogging.java**\n\n```\n\
    package com.apress.logging.log4j;\n\nimport org.apache.log4j.*;\n\npublic class\
    \ SimpleLogging {\n    /** Creates a new instance of SimpleLogging */\n    public\
    \ SimpleLogging() {\n    }\n\n    /**\n     * @param args the command line arguments\n\
    \     */\n    public static void main(String[] args) {\n        Logger logger\
    \ =\nLogger.getLogger(SimpleLogging.class.getPackage().getName());\n        logger.info(\"\
    Hello this is an info message\");\n    }\n}\n```\n\nOne important item to note\
    \ in this simple program is how we obtain the `Logger` object reference. We create\
    \ a logger with a namespace the same as the package name of the class, which in\
    \ this case is `com.apress.logging.log4j`. The strategy for creating a logger\
    \ namespace will be discussed in detail later in the \"[Logger Object](#LiB0037.html#303)\"\
    \ section. For the time being, it is enough to notice that in the configuration\
    \ file we have also created a logger with the same name as the package name (`com.apress.logging.log4j`)\
    \ of the `SimpleLogging` class. Once the logger is obtained, we then call the\
    \ `info()` method on the `Logger` object to print the message.\n\n### Running\
    \ the Program\n\nWe are now ready to run this program. It is important to make\
    \ sure the classpath system variable contains all the classes as well as the `log4j.properties`\
    \ file. We can then run the program with the following command by passing the\
    \ name of the configuration file to load as a system parameter:\n\n```\njava -Dlog4j.configuration=log4j.properties\
    \ com.apress.logging.log4j.SimpleLogging\n```\n\nThe appender attached to the\
    \ obtained logger is `org.apache.log4j.ConsoleAppender`. Hence, the program in\
    \ [Listing 5-4](#LiB0035.html#ch05ls04) will print the following message to the\
    \ console:\n\n```\nINFO-Hello this is an info message\nINFO-Hello this is an info\
    \ message\n```\n\nYou may be wondering why the same information is printed twice.\
    \ This leads to another interesting point about the `Logger` object hierarchy,\
    \ which we will discuss in great detail in the `Logger` section. The simple answer\
    \ is that the message is printed twice because the message is propagated to the\
    \ named logger and also to the root logger for handling. Both loggers have printed\
    \ the message through their respective appenders.\n\nApache log4j also allows\
    \ us to configure the logging framework programmatically without specifying any\
    \ system property. As mentioned earlier, the properties-style configuration files\
    \ are parsed with the `org.apache.log4j.PropertyConfigurator` object; we can use\
    \ the same object within an application to read and parse the configuration file.\
    \ For example, in the program in [Listing 5-4](#LiB0035.html#ch05ls04), we could\
    \ have used the following to configure the logging framework:\n\n```\npublic static\
    \ void main(String args[])\n  {\n    PropertyConfigurator.configure(args[0]);\n\
    \  }\n```\n\nwhere `args[0]` is the name of the configuration file supplied as\
    \ a command line parameter. This will also configure the framework correctly by\
    \ reading any configuration file specified. The only important thing to note about\
    \ this method is that ideally the configuration should be loaded at the entry\
    \ point of the application such as in the `main()` method. Otherwise, the application\
    \ might be loading the configuration information several times and slow down performance.\n\
    \nIn a more simplistic situation, the `Logger` object can assume a very basic\
    \ configuration through the `org.apache.log4j.BasicConfigurator` class.\n\n```\n\
    \ BasicConfigurator.configure()\n```\n\nThis instruction configures the root logger\
    \ to a level of DEBUG and assigns `org.apache.log4j.ConsoleAppender` as default\
    \ appender with the conversion pattern `%-4r[%t]%-5p%c%x - %m%n`. By default,\
    \ log4j is configured to propagate the logging request up through the logger hierarchy.\
    \ If we use the default setting in an application, and we obtain our own named\
    \ logger but do not use any external configuration file to configure it, then\
    \ it will automatically inherit and use the properties of the root logger set\
    \ by the `BasicConfigurator`."
