- fmt: "### Implementation of the Custom `WindowAppender`\n\n[Listing 8-1](#LiB0061.html#ch08ls01)\
    \ demonstrates `WindowAppender.java`, the custom window-based `Appender` object.\n\
    \n**Listing 8-1: `WindowAppender.java`**\n\n```\npackage com.apress.logging.log4j.appender;\n\
    \nimport org.apache.log4j.AppenderSkeleton;\nimport org.apache.log4j.spi.LoggingEvent;\n\
    import javax.swing.JFrame;\nimport javax.swing.JTextArea;\nimport javax.swing.JScrollPane;\n\
    \n/** This is a custom Appender object publishing the logging\n * information\
    \ to a Java window. The logging Java window is a\n * singleton instance across\
    \ all the instances of this Appender\n * object.\n */\npublic class WindowAppender\
    \ extends AppenderSkeleton{\n\nprivate static JFrame frame = null;\n    private\
    \ static JTextArea area = null;\n    private static JScrollPane pane = null;\n\
    \n/** Holds value of property title. */\n    private static String title;\n\n\
    /** Holds value of property height. */\n    private static int height;\n\n/**\
    \ Holds value of property width. */\n    private static int width;\n\n/** Creates\
    \ a new instance of WindowAppender */\n    public WindowAppender() {\n    }\n\
    \    /**\n     *This method is called as a part of the appender initialization\
    \ process\n     */\n    public void activateOptions() {\n        getWindowInstance();\n\
    \    }\n    /**\n     * private method to initialize the logging window\n    \
    \ */\n    private synchronized JFrame getWindowInstance() {\n        area = new\
    \ JTextArea();\n        pane = new JScrollPane(area);\n        if(frame == null)\
    \ {\n            frame = new JFrame(title);\n            frame.setSize(width,\
    \ height);\n            frame.getContentPane().add(pane);\n            frame.setVisible(true);\n\
    \        }\n        return frame;\n    }\n\n/** This method is overridden from\
    \ the super class and\n     * prints the logging message to the logging window.\n\
    \     * NOTE: If there is no layout specified for this Appender,\n     * no message\
    \ will be displayed. The logging information is\n     * formatted according to\
    \ the layout and the conversion pattern\n     * specified.\n     * @param loggingEvent\
    \ encapsulates the logging information.\n     */\n    protected void append(LoggingEvent\
    \ loggingEvent) {\n        //simply extract the message and display it\n     \
    \   JScrollPane pane =\n(JScrollPane)frame.getContentPane().getComponent(0);\n\
    \        JTextArea area = (JTextArea)pane.getViewport().getView();\n        if(this.layout\
    \ !=null) {\n            area.append(this.layout.format(loggingEvent));\n    \
    \    }\n    }\n\n/** This method is overridden from the super class and disposes\n\
    \     * the logging window.\n     */\n    public void close() {\n        frame.dispose();\n\
    \    }\n\n/** This method is overridden from the super class and always\n    \
    \ * returns true to indicate that a Layout is required for\n     * this appender.\
    \ If not specified in the conf. file, then it\n     * will not print any message\
    \ in the log window.\n     */\n    public boolean requiresLayout() {\n       \
    \ return true;\n    }\n\n/** Getter for property title.\n     * @return Value\
    \ of property title.\n     */\n    public String getTitle() {\n        return\
    \ this.title;\n    }\n\n/** Setter for property title.\n     * @param title New\
    \ value of property title.\n     */\n    public void setTitle(String title) {\n\
    \        this.title = title;\n    }\n\n/** Getter for property height.\n     *\
    \ @return Value of property height.\n     */\n    public int getHeight() {\n \
    \       return this.height;\n    }\n\n/** Setter for property height.\n     *\
    \ @param height New value of property height.\n     */\n    public void setHeight(int\
    \ height) {\n        this.height = height;\n    }\n\n/** Getter for property width.\n\
    \     * @return Value of property width.\n     */\n    public int getWidth() {\n\
    \        return this.width;\n    }\n\n/** Setter for property width.\n     * @param\
    \ width New value of property width.\n     */\n    public void setWidth(int width)\
    \ {\n        this.width = width;\n    }\n}\n```\n\nAs we can see in this `WindowAppender`,\
    \ `getWindowInstance()` is a `private synchronized` method responsible for creating\
    \ a `JFrame` instance with the specified `title`, `width`, and `height` bean properties.\
    \ We have provided an overridden `append()` method that writes logging data to\
    \ the `JTextArea` embedded within a `JScrollPane` attached to the `JFrame`. Each\
    \ time a logging request arrives, the logging message is printed to the `JTextArea`.\
    \ Notice that the `requiresLayout()` method in `WindowAppender` returns `true`.\
    \ This means `WindowAppender` requires a `Layout` object to be associated with\
    \ it, and it uses the `Layout` object to format the logging event before displaying\
    \ the message. If no `Layout` object is specified, no logging message will be\
    \ displayed in the window. The `activateOptions()` method calls the `getWindowInstance()`\
    \ method, which creates a new logging window `JFrame` instance or returns an already\
    \ existing one.\n\nIf we are configuring programmatically, we have to explicitly\
    \ call the `activateOptions()` method to get a logging window created. As the\
    \ `getWindowInstance()` method is `synchronized` and returns one and only one\
    \ instance of the `JFrame` object, it is protected against multiple programs calling\
    \ the `activateOptions()` method of the `WindowAppender`. No matter how the configuration\
    \ is done, we will always get one instance of the logging window per application\
    \ instance."
