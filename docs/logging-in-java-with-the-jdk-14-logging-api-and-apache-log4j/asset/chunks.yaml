    \ message)\n  {\n      log.log(Level.INFO, message);\n  }\n\npublic void info(Object\
    \ message, Throwable t)\n  {\n      log.log(Level.INFO, message, t);\n  }\n\n\
    public void warn(Object message)\n  {\n      log.log(Level.WARN, message);\n \
    \ }\n\npublic void warn(Object message, Throwable t)\n  {\n      log.log(Level.WARN,\
    \ message, t);\n  }\n\npublic void error(Object message)\n  {\n      log.log(Level.ERROR,\
    \ message);\n  }\n\npublic void error(Object message, Throwable t)\n  {\n    \
    \  log.log(Level.ERROR, message, t);\n  }\n\npublic void fatal(Object message)\n\
    \  {\n      log.log(Level.FATAL, message);\n  }\n\npublic void fatal(Object message,\
    \ Throwable t)\n  {\n      log.log(Level.FATAL, message, t);\n  }\n\npublic void\
    \ log(Level p, Object message)\n  {\n      log.log(p, message);\n  }\n\npublic\
    \ void log(Level p, Object message, Throwable t)\n  {\n      log.log(p, message,\
    \ t);\n  }\n\npublic static LoggerWrapper getLogger(String name)\n  {\n      LoggerWrapper\
    \ logger = new LoggerWrapper(name);\n      return logger;\n  }\n\npublic static\
    \ LoggerWrapper getLogger(Class clazz)\n  {\n      LoggerWrapper logger = new\
    \ LoggerWrapper(clazz.getName());\n      return logger;\n  }\n}\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n这个实现非常直接。它只是使用了 `org.apache.log4j.Logger` 类的一个内部成员。它还模仿了 `Logger`\
    \ 类的所有方法。在内部，它将方法调用委托给 `Logger` 类的实例。值得注意的是，它提供了一个使用自定义 TRACE 级别的方法，并且还提供了 `isTraceEnabled()`\
    \ 方法来检查 TRACE 级别是否对任何特定的日志记录器实例启用。\n\n清单 8-16 `LoggerWrapperDemo.java` 演示了我们刚刚实现的包装类的一个非常简单的用法。\n\
    \n清单 8-16: LoggerWrapperDemo.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\n package\
    \ com.apress.logging.log4j;\n\npublic class LoggerWrapperDemo\n{\n    private\
    \ static LoggerWrapper logger =\nLoggerWrapper.getLogger(LoggerWrapperDemo.class.getPackage().getName());\n\
    \    public LoggerWrapperDemo()\n    {\n\n}\n\npublic void doLogging(String message)\n\
    \    {\n        logger.trace(message);\n    }\n\npublic static void main(String\
    \ args[])\n    {\n        LoggerWrapperDemo demo = new LoggerWrapperDemo();\n\
    \        demo.doLogging(\"USING LOGGER WRAPPER TO DISPLAY TRACE LEVEL\n      \
    \  MESSAGE\");\n    }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n要执行这个示例程序，我们需要使用与清单\
    \ 8-13 中描述的几乎相同的配置文件，只是此示例不需要使用日志记录器工厂。修改后的配置文件应如清单 8-17 \"loggerWrapper.properties\"\
    \ 所示。\n\n清单 8-17: loggerWrapper.properties\n\n| **![示例开始](img/_1.gif)** |\n\n\
    ```\n#将级别设置为 TRACE，并将附加器设置为 ConsoleAppender\nlog4j.logger.com.apress.logging.log4j=\n\
    TRACE#com.apress.logging.log4j.CustomLevel, CONSOLE\n\n#定义附加器\nlog4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender\n\
    log4j.appender.CONSOLE.layout=org.apache.log4j.SimpleLayout\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n使用此配置文件执行清单 8-16 中的示例程序，将在控制台打印以下 TRACE 级别消息：\n\n```\nTRACE - USING\
    \ LOGGER WRAPPER TO DISPLAY TRACE LEVEL MESSAGE\n```\n\n通过为日志记录器编写一个简单的包装类，我们避免了编写自定义\
    \ `Logger` 和自定义 `LoggerFactory` 类的复杂性。这是一种非常有用的技术，可以在保留默认 `Logger` 类常规功能的同时，为自定义\
    \ `Logger` 类添加自定义功能。\n"
- fmt: "## More on Filtering\n\nOne important aspect of well-designed logging code\
    \ is the control over what gets produced as the final logging information. In\
    \ large application scenarios, there is always a chance that the amount of information\
    \ being logged is enormous. In such situations, normal level-based filtering may\
    \ become inadequate to restrict logging information to exactly the type required\
    \ to analyze the system. This is when `Filter` objects become very useful. `Filter`\
    \ objects are capable of filtering out logging information based on some application-specific,\
    \ complex criteria that is more business logic specific. Apache log4j offers the\
    \ flexibility of attaching any application-specific `Filter` object to the framework.\
    \ With these `Filter` objects in place, we can control the logging information\
    \ being produced in a more application- and business-specific way.\n\nThere are\
    \ two ways to filter a logging request. One is to perform level-based checking,\
    \ and the other is to attach a `Filter` object to the `Appender` objects. Level-based\
    \ checking is limited to comparing the level of a logging request with the designated\
    \ level of the corresponding `Logger` and `Appender` objects. A `Filter` object,\
    \ however, can check a logging request against any application-specific criteria.\
    \ We discussed `Filter` objects in [Chapter 5](#LiB0032_split_000.html#266) and\
    \ also saw how to develop a custom `Filter` object. We can write any sort of `Filter`\
    \ object we want and add it to a filter chain of the `Appender` object. The filters\
    \ get executed sequentially in the chain, and depending on the approval or disapproval\
    \ of the logging request, the log messages are processed.\n\nThe level-based filtering\
    \ applied by the `Logger` and `Appender` objects is simple in principle. If a\
    \ logging request falls below the level of the `Logger` and the `Appender` object,\
    \ the logging request is discarded. This is useful. But what happens if we face\
    \ a situation in which we want only logging messages belonging to certain level(s)\
    \ to print and the rest to be discarded? For example, we might want only messages\
    \ with levels between DEBUG and WARN to be printed. If we set the logger level\
    \ to DEBUG, the logger will print all the messages up to the level FATAL. This\
    \ is the situation where `org.apache.log4j.varia.LevelRangeFilter` comes into\
    \ play.\n\n### Using LevelRangeFilter\n\nWith `LevelRangeFilter`, we can specify\
    \ the lower range and the upper range of logging levels that should be approved\
    \ by the logging framework. `LevelRangeFilter` has the configurable bean properties\
    \ listed in [Table 8-1](#LiB0064.html#ch08table01).\n\nTable 8-1: Bean Properties\
    \ in LevelRangeFilter\n\n| Bean Property | Method | Description | Default |\n\
    | --- | --- | --- | --- |\n| `LevelMin` | `setLevelMin(Level)` | Sets the minimum\
    \ level to consider for logging. | None |\n| `LevelMax` | `setLevelMax(Level)`\
    \ | Sets the maximum level for which the logging request should be handled. |\
    \ None |\n| `acceptOnMatch` | `setAcceptOn-Match(boolean)` | If `true`, the filter\
    \ returns `ACCEPT`, and the next filters in the chain will not be considered.\
    \ | `false` |\n\nThe `Filter` objects are currently configurable via an XML configuration\
    \ file. [Listing 8-18](#LiB0064.html#ch08ls18), \"customFilter.xml\", is a sample\
    \ configuration file that uses `LevelRangeFilter`.\n\nListing 8-18: customFilter.xml\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE log4j:configuration\
    \ SYSTEM \"log4j.dtd\">\n\n<log4j:configuration xmlns:log4j=\"http://jakarta.apache.org/log4j/\"\
    >\n\n<appender name=\"A1\" class=\"org.apache.log4j.ConsoleAppender\">\n\n<layout\
    \ class=\"org.apache.log4j.PatternLayout\">\n   <param name=\"ConversionPattern\"\
    \ value=\"%t %-5p %c{2} - %m%n\"/>\n  </layout>\n\n<filter class=\"org.apache.log4j.varia.LevelRangeFilter\"\
    >\n    <param name=\"LevelMin\" value=\"DEBUG\"/>\n    <param name=\"LevelMax\"\
    \ value=\"WARN\"/>\n    <param name=\"acceptOnMatch\" value=\"true\"/>\n\n</filter>\n\
    \ </appender>\n\n<logger name=\"com.apress.logging.log4j\">\n  <level value=\"\
    debug\"/>\n  <appender-ref ref=\"A1\"/>\n </logger>\n\n</log4j:configuration>\n\
    ```\n\nNotice that in this configuration file, we assign a `PatternLayout` to\
    \ the `ConsoleAppender` object. `ConsoleAppender` also uses the `LevelRangeFilter`\
    \ object with the minimum logging level set as DEBUG and maximum logging level\
    \ set as WARN. The `acceptOnMatch` property is set to `true`. This means that\
    \ if an event's level is within the specified range, the event will be logged\
    \ straight away without consulting any more `Filter` objects in the chain. If\
    \ `acceptOnMatch` is set to `false`, it means that `Filter.NEUTRAL` will be returned\
    \ even if the event level is within the specified range. This gives the other\
    \ `Filter` objects in the chain an opportunity to inspect the event.\n\nNow we\
    \ will write a simple program to demonstrate how `LevelRangeFilter` works. [Listing\
    \ 8-19](#LiB0064.html#ch08ls19), `FilterDemo.java`, is a sample program that prints\
    \ logging messages with all the levels. With the help of `LevelRangeFilter`, we\
    \ will filter out any message that is not within the range of the DEBUG and WARN\
    \ levels.\n\nListing 8-19: FilterDemo.java\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.Logger;\npublic class FilterDemo\n{\n    private static\
    \ Logger logger =\nLogger.getLogger(FilterDemo.class.getPackage().getName());\n\
    \npublic FilterDemo()\n    {\n    }\n    public void doLogging()\n    {\n    \
    \    logger.debug(\"DEBUG MESSAGE..\");\n        logger.info(\"INFO MESSAGE..\"\
    );\n        logger.error(\"ERROR MESSAGE..\");\n        logger.warn(\"WARN MESSAGE..\"\
    );\n        logger.fatal(\"FATAL MESSAGE...\");\n    }\n\npublic static void main(String\
    \ args[])\n    {\n        FilterDemo demo = new FilterDemo();\n        demo.doLogging();\n\
    \    }\n}\n```\n\nExecuting this program will print all the messages to the console\
    \ except the messages with levels ERROR and FATAL, as they fall outside the range\
    \ specified.\n\n```\nmain DEBUG logging.log4j - DEBUG MESSAGE..\nmain INFO logging.log4j\
    \ - INFO MESSAGE..\nmain WARN logging.log4j - WARN MESSAGE..\n```\n\n|  | Note\
    \ | Recall that the logging level sequence is ALL<DEBUG<INFO<WARN<ERROR<FATAL<OFF.\
    \ |\n\nAs we can see, assigning a level to the `Logger` objects and a threshold\
    \ level to the `Appender` objects can always restrict the lower range of the level.\
    \ `LevelRangeFilter` becomes useful only when we want to restrict the upper range\
    \ of the level."
