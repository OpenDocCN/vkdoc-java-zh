- fmt: "# Logging Messages Efficiently\n\nWhat to log and how to log? The answers\
    \ to these questions determine how effective a particular application's logging\
    \ is. Choose carefully and come up with a strategy as to what information is needed\
    \ for debugging and what information is needed for routine maintenance. Decide\
    \ carefully about where to log information. Decide about the formatting of the\
    \ log messages so that the information can be processed and analyzed in the future\
    \ by other applications.\n\n|  | BEST PRACTICE | Avoid logging unnecessary information.\
    \ This will convolute the logging trace and make it harder to analyze. |\n\nRedundant\
    \ and unnecessary logging information affects an application in terms of performance\
    \ and usefulness. Even if we use a level that is turned off in the deployed application,\
    \ the logger framework will have to do the extra work of checking the levels for\
    \ each logging message. This level checking for logging requests with redundant\
    \ and unnecessary information will affect the performance of the overall logging.\
    \ So it is best to avoid having such logging requests within an application.\n\
    \n|  | BEST PRACTICE | Avoid using parameter construction within the logging request.\
    \ |\n\nWhen developing your own applications, you might think that you have avoided\
    \ making unnecessary logging requests in your application; however, you still\
    \ may have a logging request that looks like the following:\n\n```\nlogger.info(\"\
    This is \"+var1+\" logging from the method\"+var2);\n```\n\nThe cost involved\
    \ here is the parameter construction. Use simple Java techniques such as `StringBuffer`\
    \ for the concatenation of `String` objects and avoid using `+` for joining two\
    \ `String` objects. This is just one example. A badly coded application might\
    \ have several of these sorts of statements.\n\n|  | BEST PRACTICE | Check if\
    \ logging is enabled before trying to log. |\n\nSuppose we have an application\
    \ that logs all the entries of a list of customer orders (highly unlikely!). All\
    \ information with a level of `DEBUG` is printed:\n\n```\nArrayList list;\nint\
    \ length = list.size();\n\nfor(int k=0;k<size;k++)\n{\n    logger.debug(\"The\
    \ customer: \"+ ( (Customer)list.get(k) ).toString() );\n}\n```\n\nWhat happens\
    \ if the `DEBUG` level is turned off? Inside the `for` loop, the parameter construction\
    \ will still take place, the logger will check if the `DEBUG` level is enabled,\
    \ and if not, it will discard the request. To avoid this sort of situation, we\
    \ could write\n\n```\nif(logger.isDebugEnabled())\n{\n    //do the for loop here\n\
    }\n```\n\nThis will save the cost of unnecessary parameter construction. On the\
    \ other hand, if the `DEBUG` level is turned on, there may be an extra cost for\
    \ evaluating whether the `DEBUG` level is enabled. But this is an insignificant\
    \ overhead compared to the parameter construction, as it takes about 1 percent\
    \ of the time of actual logging.\n\n## Issues with Localization\n\nThe localization\
    \ of logging information through the `java.util.ResourceBundle` object is a great\
    \ feature for publishing logging information in different languages. However,\
    \ the decision to use the localization feature within log4j can be tricky.\n\n\
    |  | BEST PRACTICE | Do not use `ResourceBundle` objects when you are not using\
    \ the localization feature. |\n\nConstructing and using `ResourceBundle` objects\
    \ is costly. If your application is presently supporting one language, refrain\
    \ from using localization within your code. You can always enable this feature\
    \ in the future to support different languages.\n\n## Using Location Information\n\
    \nThe JDK 1.4 logging API and log4j both support location information for a logging\
    \ request. The JDK 1.4 logging API tries to determine the class and method name\
    \ for the logging request from the stack trace. The log4j API tries to detect\
    \ the exact line number of the code from which the logging request was issued.\n\
    \n|  | BEST PRACTICE | Determining location information is a costly operation.\
    \ It is best to avoid this in application logging, if possible. |\n\nDynamic location\
    \ information generation is not reliable. It might not work properly with many\
    \ compilers that use optimization techniques. Moreover, it takes a great deal\
    \ of extra overhead for the logging framework to go through the stack trace to\
    \ determine location information.\n\n## Formatting Logging Information\n\nThe\
    \ formatting of logging information is important. On one hand, the more information,\
    \ the better. On the other hand, each bit of information costs CPU. We need to\
    \ decide carefully about the formatting of logging information. There are choices\
    \ available. XML formatting is costlier than simple text-based output, yet XML-formatted\
    \ logging information is more reusable and portable.\n\n`PatternLayout` objects\
    \ in log4j provide extreme flexibility in terms of defining the elements of the\
    \ final logging information and the formatting instructions. Using `PatternLayout`,\
    \ we can precisely control the content of the logging information in any destination.\
    \ For XML/HTML-based logging information, we need to use separate `Layout` objects.\
    \ `PatternLayout` is responsible for formatting the content of the logging information\
    \ and is not involved in the presentation of the logging information.\n\nDates\
    \ are one of the main concerns when it comes to formatting, as they are complicated\
    \ and costly in terms of performance. The log4j API provides several date formatting\
    \ objects such as `DateLayout` and `ISO8601DateFormat`. The `ISO8601DateFormat`\
    \ is the cheapest and fastest among all the date formats available.\n\n## Using\
    \ Renderer Objects\n\nIn log4j, `Renderer` objects are used to construct a `String`\
    \ representation of any `Object` passed to the logging framework to log.\n\n|\
    \  | BEST PRACTICE | `Renderer` objects follow a class hierarchy. Any superclass\
    \ `Renderer` is capable of rendering the subclass. |\n\nFor example, if we have\
    \ a `VehicleRenderer` object, it will be able to render the `Car` object so long\
    \ as `Car` is a subclass of `Vehicle`.\n\n|  | BEST PRACTICE | For a specialized\
    \ rendering with the subclass, register a subclass-specific `Renderer`. In such\
    \ cases, the superclass `Renderer` is not invoked. |\n\nFor example, we could\
    \ register a `CarRenderer` object to render all the `Car` objects, in which case\
    \ `VehicleRenderer` will not be used to render the `Car` objects.\n\n## Using\
    \ Asynchronous Logging\n\nThe log4j API offers the `AsyncAppender` object to perform\
    \ asynchronous logging. This object stores logging events in a bounded buffer\
    \ and releases the events when the maximum buffer size is reached. The JDK 1.4\
    \ logging API also provides similar functionality with the `MemoryHandler` object.\n\
    \n|  | BEST PRACTICE | `AsyncAppender` and `MemoryHandler` do not always increase\
    \ performance. |\n\nIf the bounded buffer gets filled up quickly, then there is\
    \ an extra overhead for managing the bounded buffer, which slows down performance.\
    \ But the use of `AsyncAppender` or `MemoryHandler` is quite effective in situations\
    \ involving long blocking networks or I/O access or less CPU-intensive operations."
