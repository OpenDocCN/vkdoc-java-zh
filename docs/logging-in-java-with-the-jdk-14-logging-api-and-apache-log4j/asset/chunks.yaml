    ?>\n<!DOCTYPE log SYSTEM \"logger.dtd\">\n<log>\n<record>\n  <date>2002-08-15T21:19:09</date>\n\
    \  <millis>1029442749165</millis>\n  <sequence>1</sequence>\n  <level>WARNING</level>\n\
    \  <thread>10</thread>\n  <message>java.io.FileNotFoundException: (The system\
    \ cannot find the path\nspecified)</message>\n</record>\n</log>\n```\n\nThe preceding\
    \ sample program demonstrates a deliberate use of `XMLFormatter` with different\
    \ `Handler` objects. The API provides another convenient handler called `FileHandler`,\
    \ which by default uses the `XMLFormatter` object to format the log messages associated\
    \ with it. The program in [Listing 3-3](#LiB0022_split_001.html#ch03ls03), `AlternateXML.java`,\
    \ demonstrates the use and output of the `FileHandler`.\n\n**Listing 3-3: AlternateXML.java**\n\
    \n```\npackage sam.logging;\n\nimport java.util.logging.*;\n\npublic class AlternateXML\n\
    {\n\npublic static void main(String args[])\n {\n  try\n  {\n    FileHandler handler\
    \ = new FileHandler(\"alterxml.xml\");\n    Logger logger = Logger.getLogger(\"\
    sam.logging\");\n    logger.addHandler(handler);\n    logger.log(Level.INFO, \"\
    alternative xml\");\n  }catch(Exception e)\n  {\n    e.printStackTrace();\n  }\n\
    \ }\n}\n```\n\nThe use of `FileHandler` is simple. However, it would be interesting\
    \ to look at the difference in the final XML output of the first program and the\
    \ second. The `AlternateXMLLogging` class writes the XML output in the `alterxml.xml`\
    \ file as shown here:\n\n```\n<?xml version=\"1.0\" encoding=\"windows-1252\"\
    \ standalone=\"no\"?>\n<!DOCTYPE log SYSTEM \"logger.dtd\">\n<log>\n<record>\n\
    \  <date>2002-08-16T20:23:20</date>\n  <millis>1029525800176</millis>\n  <sequence>0</sequence>\n\
    \  <logger>current.package</logger>\n  <level>INFO</level>\n  <class>AlternateXML</class>\n\
    \  <method>main</method>\n  <thread>10</thread>\n  <message>alternative xml</message>\n\
    </record>\n</log>\n</record>\n```\n\nThere is a subtle but very important difference\
    \ in the output produced by `XMLLogging.java` and by `AlternateXML.java`. The\
    \ `AlternateXML.java` example ([Listing 3-3](#LiB0022_split_001.html#ch03ls03)),\
    \ which includes the `FileHandler` object along with a `Logger` object to produce\
    \ log messages, contains the source class name and the source method name of the\
    \ logging activity. The XML produced by the `XMLLogging.java` program ([Listing\
    \ 3-2](#LiB0022_split_001.html#ch03ls02)) omits the information about the source\
    \ class and source method name. This is due to the way the logging framework tries\
    \ to determine the source class and source method name when they are not explicitly\
    \ specified.\n\nThe `LogRecord` class only determines the caller class and method\
    \ names if it finds a `java.util.logging.Logger` class instance in the stack trace.\
    \ In the example in [Listing 3-2](#LiB0022_split_001.html#ch03ls02), we avoid\
    \ using the `Logger` class by including the `StreamHandler` and `XMLFormatter`\
    \ classes, and hence the logging framework does not encounter the `java.util.logging.Logger`\
    \ class in the stack trace and does not attempt to determine the caller source\
    \ class and method. In the example in [Listing 3-3](#LiB0022_split_001.html#ch03ls03),\
    \ we include the `Logger` class, and hence the framework attempts to determine\
    \ the caller source class and method.\n\n## Localization of Logging Messages\n\
    \nLocalization is a technique used in Java to cater to different languages without\
    \ having to change the source code. The localization of logging messages is accomplished\
    \ by using the Java `ResourceBundle` technique. We define log messages in an appropriate\
    \ properties file in a key-value format, and pass the properties file to the Java\
    \ runtime. Most logger methods in the logging API take a message argument. If\
    \ a `ResourceBundle` name is specified, the `Logger` objects will try to find\
    \ a mapped text against the passed message string as the key. The logger will\
    \ first look in the thread's `ContextClassLoader` for the specified `ResourceBundle`.\
    \ If this is null, then it looks in the `SystemClassLoader` for the `ResourceBundle`.\
    \ Once a `ResourceBundle` is located and it contains a mapping for the message\
    \ string, then the message string is replaced by the localized value; otherwise,\
    \ the message string is printed. [Listing 3-4](#LiB0023.html#ch03ls04), `LocalizeLogging.java`,\
    \ demonstrates the localization technique with the JDK 1.4 logging API.\n\n**Listing\
    \ 3-4: LocalizeLogging.java**\n\n```\npackage sam.logging;\nimport java.util.logging.*;\n\
    import java.io.*;\nimport java.util.ResourceBundle;\n\npublic class LocalizeLogging\n\
    {\n    private static Logger logger = Logger.getLogger(\"sam.logging\");\n   \
    \ private String rbName = null;\n\n    public LocalizeLogging(String rbName)\n\
    \    {\n        this.rbName = rbName;\n\n    }\n\n    public void logMessage()\n\
    \    {\n        logger.logrb(Level.INFO, \"LocalizeLogging\", \"logMessage\",\
    \ rbName,\n\"success\");\n    }\n\n    public static void main(String args[])\
    \ {\n        //collect the name of the resource bundle\n        String rbName\
    \ = args[0];\n        LocalizeLogging lLogging = new LocalizeLogging(rbName);\n\
    \        lLogging.logMessage();\n    }\n}\n```\n\nWe create two `ResourceBundle`\
    \ properties files named `localizeText.properties` and `localizeText_fr.properties`\
    \ for English and French messages, respectively, as shown here:\n\n| localizeText.properties\
    \ | localizeText_fr.properties |\n| --- | --- |\n| `progress = \"Progressing\"\
    ` | `progress = \"Tres Bein\"` |\n| `success = \"Done\"` | `success = \"Fini\"\
    ` |\n\nThe application in [Listing 3-4](#LiB0023.html#ch03ls04) accepts the name\
    \ of the `ResourceBundle` as a command line parameter or any other configuration\
    \ source. The application obtains a `Logger` instance with the name `sam.logging`\
    \ and then sets the `ResourceBundle` name. It then invokes the `logrb()` method\
    \ of the `Logger` class with the logging message and the `ResourceBundle` name.\
    \ The logging message string will be considered the localization key and the corresponding\
    \ value from the `ResourceBundle` file will be displayed as the logging message.\n\
    \nExecuting the preceding application with the French text version will produce\
    \ the following output message to the console:\n\n```\n>> java sam.logging.LocalizeLogging\
    \ localizeText_fr\n16-Aug-2002 22:33:12 LocalizeLogging logMessage\nINFO: \"Fini\"\
    \n```"
