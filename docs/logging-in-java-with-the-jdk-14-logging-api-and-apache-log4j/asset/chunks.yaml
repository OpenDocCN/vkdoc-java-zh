    \ it will automatically inherit and use the properties of the root logger set\
    \ by the `BasicConfigurator`."
  trans: "\n### 默认初始化\n\n通常，log4j 不会对其运行环境做任何假设。因此，配置 log4j 是应用程序开发者的责任。配置 log4j 本质上是指定日志记录器、附加器、布局等。`LogManager`\
    \ 类通过一个类级别的 `static` 初始化块，在启动时仅执行一次初始化操作。默认的初始化操作主要包括以下步骤：\n\n1.  `LogManager`\
    \ 类会查找系统属性 `log4j.configuration`。\n\n2.  如果未定义 `log4j.configuration` 属性，则它会尝试在应用程序类路径中查找名为\
    \ `log4j.properties` 的资源。\n\n3.  然后，它会尝试将已定义的配置资源字符串转换为 `URL` 对象。如果资源字符串无法转换为有效的\
    \ `java.net.URL` 对象，则会抛出 `java.net.MalformedURLException` 异常。\n\n4.  如果找不到任何资源，则初始化过程终止。\n\
    \n5.  如果找到了资源，并且它是一个包含键值格式配置信息的普通 Java 属性样式文件，则使用 `org.apache.log4j.PropertyConfigurator`\
    \ 类来解析该配置文件。如果配置文件是 XML 文件，则使用 `org.apache.log4j.xml.DOMConfigurator` 类来解析 XML\
    \ 文件并初始化日志记录对象。\n\n也可以避免使用像 `LogManager` 这样的默认初始化类，并编写自己的配置类。自定义配置类可以在应用程序启动时作为\
    \ `log4j.configurationClass` 指定给 Java 运行时。默认情况下，任何自定义配置类都应实现 `org.apache.log4j.spi.Configurator`\
    \ 接口。\n\n例如，我们可以使用以下命令分别将配置文件和配置类传递给 Java 运行时：\n\n```\njava -Dlog4j.configuration=config\
    \ file yourApp\njava -Dlog4j.configurationClass=config class yourApp\n```\n\n\
    #### 创建配置文件\n\n现在，我们将了解如何编写一个小程序，该程序将借助 `Logger` 对象打印非常基本的日志信息。我们将按照清单 5-3 中的定义创建自己的配置属性文件，将其命名为\
    \ \"log4j.properties\"，并将其作为系统属性传递给 Java 运行时。\n\n清单 5-3: log4j.properties\n\n\
    | **![开始示例](img/_1.gif)** |\n\n```\n# 将根日志记录器的级别设置为 DEBUG（最低级别），并设置其附加器\n# 为一个名为\
    \ X 的附加器\nlog4j.rootLogger = DEBUG, X\n\n# 设置你自己的日志记录器\nlog4j.logger.com.apress.logging.log4j=DEBUG,\
    \ X\n\n# 将名为 X 的附加器设置为控制台附加器\nlog4j.appender.X=org.apache.log4j.ConsoleAppender\n\
    # 为附加器 X 设置布局\nlog4j.appender.X.layout=org.apache.log4j.PatternLayout\nlog4j.appender.X.layout.conversionPattern=%p-%m%n\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在此配置文件中，我们定义了自己的日志记录器 `com.apress.logging.log4j`，并为其分配了级别\
    \ DEBUG 和附加器 `X`。附加器 `X` 又被定义为 `org.apache.log4j.ConsoleAppender`，其转换模式为 `%m%n`，这意味着日志消息后跟一个换行符，并打印到其默认输出流\
    \ `System.out`。`%p` 符号将把日志消息的级别作为输出的一部分打印出来。\n\n清单 5-4 中的程序 `SimpleLogging.java`\
    \ 旨在打印一条简单的调试消息。需要掌握的重点是，`Logger` 将通过前面清单 5-3 中定义的 \"log4j.properties\" 文件进行配置。\n\
    \n清单 5-4: SimpleLogging.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage com.apress.logging.log4j;\n\
    \nimport org.apache.log4j.*;\n\npublic class SimpleLogging {\n    /** 创建 SimpleLogging\
    \ 的一个新实例 */\n    public SimpleLogging() {\n    }\n\n    /**\n     * @param args\
    \ 命令行参数\n     */\n    public static void main(String[] args) {\n        Logger\
    \ logger =\nLogger.getLogger(SimpleLogging.class.getPackage().getName());\n  \
    \      logger.info(\"你好，这是一条信息消息\");\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n在这个简单程序中需要注意的一个重要事项是我们如何获取 `Logger` 对象引用。我们创建了一个命名空间与类包名相同的日志记录器，在本例中为\
    \ `com.apress.logging.log4j`。创建日志记录器命名空间的策略将在后面的 \"Logger 对象\" 部分详细讨论。目前，只需注意在配置文件中，我们也创建了一个与\
    \ `SimpleLogging` 类的包名（`com.apress.logging.log4j`）同名的日志记录器。一旦获取了日志记录器，我们就在 `Logger`\
    \ 对象上调用 `info()` 方法来打印消息。\n\n#### 运行程序\n\n我们现在准备运行这个程序。确保类路径系统变量包含所有类以及 \"log4j.properties\"\
    \ 文件非常重要。然后，我们可以使用以下命令运行程序，将要加载的配置文件名作为系统参数传递：\n\n```\njava -Dlog4j.configuration=log4j.properties\
    \ com.apress.logging.log4j.SimpleLogging\n```\n\n附加到所获取日志记录器的附加器是 `org.apache.log4j.ConsoleAppender`。因此，清单\
    \ 5-4 中的程序将向控制台打印以下消息：\n\n```\nINFO-你好，这是一条信息消息\nINFO-你好，这是一条信息消息\n```\n\n你可能会好奇为什么相同的信息被打印了两次。这引出了关于\
    \ `Logger` 对象层次结构的另一个有趣点，我们将在 `Logger` 部分详细讨论。简单的答案是，消息被打印两次是因为该消息被传播到命名的日志记录器，同时也被传播到根日志记录器进行处理。两个日志记录器都通过它们各自的附加器打印了该消息。\n\
    \nApache log4j 还允许我们以编程方式配置日志框架，而无需指定任何系统属性。如前所述，属性样式的配置文件由 `org.apache.log4j.PropertyConfigurator`\
    \ 对象解析；我们可以在应用程序中使用同一个对象来读取和解析配置文件。例如，在清单 5-4 的程序中，我们可以使用以下代码来配置日志框架：\n\n```\n\
    public static void main(String args[])\n  {\n    PropertyConfigurator.configure(args[0]);\n\
    \  }\n```\n\n其中 `args[0]` 是作为命令行参数提供的配置文件名。这也会通过读取指定的任何配置文件来正确配置框架。关于此方法唯一需要注意的重要事项是，理想情况下，配置应在应用程序的入口点（例如\
    \ `main()` 方法）加载。否则，应用程序可能会多次加载配置信息，从而降低性能。\n\n在更简单的情况下，`Logger` 对象可以通过 `org.apache.log4j.BasicConfigurator`\
    \ 类采用非常基本的配置。\n\n```\n BasicConfigurator.configure()\n```\n\n此指令将根日志记录器配置为 DEBUG\
    \ 级别，并将 `org.apache.log4j.ConsoleAppender` 分配为默认附加器，其转换模式为 `%-4r[%t]%-5p%c%x -\
    \ %m%n`。默认情况下，log4j 被配置为将日志请求沿日志记录器层次结构向上传播。如果我们在应用程序中使用默认设置，并且获取了自己的命名日志记录器，但未使用任何外部配置文件对其进行配置，那么它将自动继承并使用由\
    \ `BasicConfigurator` 设置的根日志记录器的属性。\n"
- fmt: "### Dynamic Loading of Configuration\n\nIf we are configuring the logging\
    \ framework with an external configuration file, one frustrating thing we may\
    \ encounter is having to restart the application every time we change the properties\
    \ file. To avoid this, both the `PropertyConfigurator` and the `DOMConfigurator`\
    \ classes can implement dynamic loading of the configuration file. This is demonstrated\
    \ in the following methods in both configuration classes:\n\n```\npublic void\
    \ configureAndWatch(String filename, long delay);\npublic void configureAndWatch(String\
    \ filename);\n```\n\nThese methods use another helper class, `org.apache.log4j.helpers.FileWatchDog`,\
    \ that determines if the configuration file exists. If the file exists, it then\
    \ creates a separate thread and searches for any modification in the file after\
    \ a specified interval or after a default interval of 60 seconds. If the configuration\
    \ file is modified, then the configuration is reread to configure the logging\
    \ framework.\n\nThis property becomes very useful in the context of server-based\
    \ applications, where taking any Web site down may not be desired, yet we need\
    \ to change the application's logging configuration.\n\n|  | Note | From this\
    \ point on, we will be using the `log4j.properties` configuration file listed\
    \ in [Listing 5-3](#LiB0035.html#ch05ls03) for all future examples created in\
    \ this chapter. This is because we will be using the same package structure for\
    \ all the examples and thereby the same named logger. Any extra configuration\
    \ information mentioned in relevant sections, such as our discussion on attaching\
    \ different appenders, will have to be included in the `log4j.properties`, if\
    \ not mentioned otherwise. |\n\n### Configuring log4j with Servlet\n\nThe use\
    \ of log4j is not restricted to standalone applications, and it can be widely\
    \ applied to any type of application deployment environment. One of the most frequently\
    \ encountered server-based deployment environments is the Web server and servlet\
    \ environment. [Listing 5-5](#LiB0035.html#ch05ls05), `LoggingServlet.java`, shows\
    \ a simple servlet to demonstrate the use of log4j within the Web server environment.\n\
    \n|  | Note | To compile the Java servlet program, you need a 1.x version of `servlet.jar`\
    \ in your classpath. If you are using Tomcat as explained in this example, you\
    \ will find `servlet.jar` in the `/lib` directory of the Tomcat installation.\
    \ |\n\nListing 5-5: `LoggingServlet.java`\n\n```\nimport javax.servlet.*;\nimport\
    \ javax.servlet.http.*;\nimport java.io.PrintWriter;\nimport java.io.IOException;\n\
    import org.apache.log4j.*;\n\npublic class LoggingServlet extends HttpServlet\
    \ {\n    private static Logger logger =\nLogger.getLogger(LoggingServlet.class);\n\
    \n    public void doPost(HttpServletRequest req, HttpServletResponse res)\n  \
    \                     throws IOException, ServletException\n    {\n        logger.info(\"\
    invoked the LoggingServlet...\");\n        PrintWriter writer = res.getWriter();\n\
    \        writer.println(\"Check your web server console...\");\n        writer.flush();\n\
    \        writer.close();\n    }\n}\n```\n\nNext, we will write a small HTML file\
    \ to invoke this servlet:\n\n```\n<html>\n<body>\n<h1>Please enter value and press\
    \ submit</h1>\n<form method=\"POST\"\naction=\"http://localhost:8080/logdemo/servlet/LoggingServlet\"\
    >\n<input type=submit value=Invoke>\n</body>\n</html>\n```\n\nNotice that the\
    \ form named `action` is pointing to the `LoggingServlet`, which is executed in\
    \ a host named `localhost` that listens to port 8080. This is the default port\
    \ for the HTTP request.\n\nWithin the servlet we obtain a `Logger` instance, and\
    \ within the `doPost()` method we use the `Logger.info()` method to print the\
    \ logging information. To make the logging work properly, we need to configure\
    \ log4j for the Web server environment we are using. We will take a look at how\
    \ to do this using the Tomcat Web server configuration as an example in the [next\
    \ section](#LiB0035.html#ch05lev2sec5).\n\n### Setting Up Tomcat\n\nIn this section,\
    \ we will demonstrate the use of the Tomcat 3.2.1 Web server configuration under\
    \ the Windows operating system. You can easily figure out the corresponding files\
    \ in the UNIX environment to configure Tomcat.\n\n|  | Note | Tomcat is an open-source\
    \ servlet engine from Apache, rather than a full-scale Web server. Tomcat can\
    \ also be integrated with the Apache Web server. Although we are using Tomcat\
    \ for the examples in this book, you can experiment with other Web servers that\
    \ support Java servlets. |\n\nFirst build the example servlet along with the HTML\
    \ file into a `.war` file and deploy the servlet into a folder named `logdemo`\
    \ under your default Tomcat directory. After deploying the servlet successfully,\
    \ you should be able to see your HTML file by entering your Web server URL in\
    \ the browser window (e.g., `http://localhost:8080/logdemo/logging.html`).\n\n\
    |  | Note | To build a `.war` file, we need to use ANT with a custom build script.\
    \ A `.war` file, or Web application archive, is a variant of the `.jar` file that\
    \ is used by Tomcat for Web application deployment. Consult some ANT documentation\
    \ for details on building applications with ANT. Once we have created the `.war`\
    \ file, we need to drop it in the `/webapps` folder of the Tomcat installation.\
    \ Once we restart Tomcat, it will automatically extract the files from within\
    \ the `.war` file. |\n\nThere are basically two ways to configure log4j to work\
    \ with Tomcat, and these are described next.\n\n#### Configuring Through a System\
    \ Parameter\n\nThe log4j configuration within the Tomcat environment is not a\
    \ difficult one. By following the steps described here, we can set up Tomcat to\
    \ use log4j:\n\n1.  We can pass the `log4j.properties` file as a system variable\
    \ to the execution environment of the tomcat.\n2.  Go to the `tomcat.bat` file\
    \ in `%TOMCAT_HOME%\\bin`.\n3.  Add an entry to set the `CLASSPATH` variable pointing\
    \ to the directory containing the `log4j.properties` file. For example, in the\
    \ following example configuration:\n\n    `set CP=%CP%;C:\\Jakarta-tomcat-3.2.1\\\
    webapps\\logdemo\\`\n\n4.  we would add an entry to the `tomcat.bat` file as follows:\n\
    \n    ```\n    set TOMCAT_OPTS=-Dlog4j.configuration=log4j.properties\n    ```\n\
    \n5.  Start up Tomcat, and it will load the `log4j.properties` file and use it\
    \ to print log4j logging information.\n\n#### Configuring Through the Servlet\
    \ Initialization\n\nApache log4j can be configured at initialization of the servlet\
    \ by passing it the name of the properties file through the application-specific\
    \ `web.xml` file.\n\n1.  Go to the `logdemo/WEB-INF` folder of Tomcat.\n2.  Open\
    \ the `web.xml` file and enter the following servlet configuration:\n\n    ```\n\
    \    <servlet>\n        <servlet-name>LoggingServlet</servlet-name>\n        <servlet-class>LoggingServlet.class</servlet-class>\n\
    \n        <init-param>\n        <param-name>log4j-conf</param-name>\n        <param-value>log4j.properties</param-value>\n\
    \        </init-param>\n\n        <load-on-startup>1</load-on-startup>\n    </servlet>\n\
    \    ```\n\n3.  Override the `init()` method in the `LoggingServlet` as follows:\n\
    \n    ```\n    public void init()throws ServletException\n    {\n        super.init();\n\
    \        String configFile = getInitParameter(\"log4j-conf\");\n        PropertyConfigurator.configure(configFile);\n\
    \    }\n    ```\n\n4.  Start up Tomcat, and the `LoggingServlet` will configure\
    \ it through the `log4j.properties` file.\n\nOnce we invoke the `LoggingServlet`\
    \ from the HTML page, we can see the following output in the Tomcat console:\n\
    \n```\ninvoked the LoggingServlet...\n```\n\n|  | Note | We can redirect logging\
    \ information anywhere we would like to by changing the log4j configuration file.\
    \ |\n\nWe have now finished looking at the various aspects of configuring log4j.\
    \ Starting with the [next section](#LiB0036.html#301), we will explore different\
    \ log4j objects in detail."
