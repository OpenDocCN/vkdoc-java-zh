    \        try\n        {\n        //collect the db access information from the\
    \ config file\n        props.load(url.openStream());\n        dbURL = (String)props.get(\"\
    DB_URL\");\n        dbUser = (String)props.get(\"DB_USER\");\n        dbPwd =\
    \ (String)props.get(\"DB_PWD\");\n        dbDriver = (String)props.get(\"DB_DRIVER\"\
    );\n        //configure the config loader\n        configLoader.setDbDriver(dbDriver);\n\
    \        configLoader.setDbUrl(dbURL);\n        configLoader.setDbUser(dbUser);\n\
    \        configLoader.setDbPwd(dbPwd);\n\n//get the log4j properties\n       \
    \ log4jProps = configLoader.getConfigData();\n        //use the PropertyConfigurator\
    \ to configure\n        PropertyConfigurator.configure(log4jProps);\n        }catch(Exception\
    \ e)\n        {\n            LogLog.error(\"could not load the configuration \"\
    , e);\n        }\n    }\n}\n```\n\n`DBConfigurator` implements the interface `Configurator`.\
    \ Once the configuration class is specified as `DBConfigurator`, the `LogManager`\
    \ class will pass the name of the configuration class to `OptionConverter`. `OptionConverter`\
    \ will then create a new instance of `DBConfigurator` and call the `doConfigure()`\
    \ method in it. Once the control is within the `DBConfigurator` class, `DBConfigurator`\
    \ uses `DBConfigLoader` to obtain the configuration data and then uses `PropertyConfigurator`\
    \ to do the actual log4j configuration.\n\nIn theory, we could configure log4j\
    \ by calling `PropertyConfigurator` from within the `DBConfigLoader` class itself.\
    \ But this means in the application we have to explicitly instantiate and call\
    \ the configuration method of `DBConfigLoader` to do the configuration, which\
    \ is not the ideal situation. If ever you need to use a different configuration\
    \ class, you will have to change the source of your application to do so. Implementing\
    \ the `DBConfigurator` class solves the problem and integrates the use of `DBConfigLoader`\
    \ within the log4j framework. In turn you might argue that `DBConfigLoader` is\
    \ hard coded within the `DBConfigurator` class. True, but we can easily extend\
    \ `DBConfigurator` to read a system parameter indicating the database access class\
    \ it should use, or we can specify the parameter within the configuration file.\n\
    \n## An Example of Using Database-Based Configuration\n\nWe now have the infrastructure\
    \ ready to configure log4j from a database. Let's take a look at a small demo\
    \ program, `LoggingDemo.java`, described in [Listing 8-7](#LiB0062.html#ch08ls07).\
    \ The class simply has a method to write two different logging messages with levels\
    \ ERROR and INFO.\n\n**Listing 8-7: LoggingDemo.java**\n\n```java\npackage com.apress.logging.log4j;\n\
    import org.apache.log4j.Logger;\n\npublic class LoggingDemo\n{\n    private static\
    \ Logger logger = Logger.getLogger(\"APPLICATION1\");\n    public LoggingDemo()\n\
    \    {\n    }\n\n    public void doLogging()\n    {\n        logger.info(\"INFO\
    \ MESSAGE...\");\n        logger.error(\"ERROR MESSAGE...\");\n    }\n\n    public\
    \ static void main(String args[])\n    {\n        LoggingDemo demo = new LoggingDemo();\n\
    \        demo.doLogging();\n    }\n}\n```\n\n### Creating Configuration Data in\
    \ the Database\n\nIn this example program, we are trying to use a `Logger` object\
    \ named `APPLICATION1`. We need to create a style for this named logger in the\
    \ database. The following SQL script will insert a record for the logger named\
    \ `APPLICATION1` and the corresponding appender record:\n\n```sql\nINSERT INTO\
    \ LOGGER_REPOSITORY VALUES ('APPLICATION1,'1,'ERROR');\n```\n\nNow we will create\
    \ some appender configuration data in the `APPENDER_DEF` table. The following\
    \ script will insert data for the `Appender` object with the ID 1.\n\n```sql\n\
    INSERT INTO APPENDER_DEF VALUES\n(1,'org.apache.log4j.ConsoleAppender', 'org.apache.log4j.SimpleLayout',\n\
    'CONSOLE', 'DEBUG');\n```\n\nThe logger named `APPLICATION1` will now have a level\
    \ of ERROR and will use the `Appender` defined with the `APPENDER_ID` of 1 in\
    \ the `APPENDER_DEF` table. Referring to the data we put in the `APPENDER_DEF`\
    \ table, the `Appender` with ID value 1 is a `ConsoleAppender`. So any logging\
    \ from this application will be printed to the console. We can switch the entry\
    \ in the `LOGGER_REPOSITORY` table any time to point the `Appender` to ID 2, which\
    \ will then write logging data to the database using the `JDBCAppender` object.\n\
    \n### The Configuration File\n\nWe also need a configuration file defining the\
    \ database access parameters. [Listing 8-8](#LiB0062.html#ch08ls08), `dbConfig.properties`,\
    \ is the configuration file for this example.\n\n**Listing 8-8: dbConfig.properties**\n\
    \n```properties\nDB_DRIVER=sun.jdbc.odbc.JdbcOdbcDriver\nDB_URL=jdbc:odbc:dbdef\n\
    DB_USER=system\nDB_PWD=manager\n```\n\n### Executing the Database-Based Configuration\
    \ Program\n\nNow we need to execute the program `LoggingDemo` with all the required\
    \ system parameters passed to it in the following manner:\n\n```bash\njava -Dlog4j.configuration=dbConfig.properties\
    \ -\nDlog4j.configuratorClass=com.apress.logging.log4j.DBConfigurator\ncom.apress.logging.log4j.LoggingDemo\n\
    ```\n\nNotice that only the message with the level ERROR is printed to the console.\
    \ Change the logger level in the table to INFO, and both messages will be printed.\n\
    \n## Custom Logging Framework\n\nLet's consider that in an application we want\
    \ to trace every method entry and exit at the code optimization stage. Also, we\
    \ want the level for these sorts of messages to be something below even the DEBUG\
    \ level of log4j, as we do not want these messages to be published anytime at\
    \ all after finishing the code optimization phase. It is a little inappropriate\
    \ to use the DEBUG level for these sorts of messages, because of the likelihood\
    \ that in the future the DEBUG level of messaging may need to be turned on in\
    \ order to debug the application. In such cases, the messages related to method\
    \ entry and exit are more likely to convolute the logging trace. Considering all\
    \ these factors, we decide to introduce a new level, TRACE, to an application."
