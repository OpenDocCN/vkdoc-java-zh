    import com.apress.logging.log4j.CustomLevel;\n\npublic class TraceTag extends\
    \ LoggerTag\n{\n    protected Priority getPriority()\n    {\n        return CustomLevel.TRACE;\n\
    \    }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nTo develop this custom\
    \ tag, we reuse the custom level TRACE developed in [Chapter 8](#LiB0060_split_000.html#525)\
    \ (refer to [Listing 8-9](#LiB0063.html#578)). As you can see, creating a new\
    \ tag to use a new level is straightforward. [Listing 9-6](#LiB0072.html#ch09ls06)\
    \ shows the tag library description that needs to be added to the existing \"\
    taglibs-log.tld\" file. (This file is shipped with the `Log` distribution.)\n\n\
    Listing 9-6: Tag Description for the Custom Trace Tag\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\n <tag>\n    <name>trace</name>\n    <tagclass>com.apress.logging.log4j.customtag.TraceTag</tagclass>\n\
    \    <attribute>\n      <name>category</name>\n      <required>false</required>\n\
    \      <rtexprvalue>true</rtexprvalue>\n    </attribute>\n    <attribute>\n  \
    \    <name>message</name>\n      <required>false</required>\n      <rtexprvalue>true</rtexprvalue>\n\
    \    </attribute>\n</tag>\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n|\
    \  | Note  | The name of the tag is specified as `trace`. Therefore, within a\
    \ JSP, we need to use the name `trace` to access this tag. |\n\n### Custom Trace\
    \ Tag in Action\n\nOnce we have the tag class for the level TRACE ready and also\
    \ modify the \"taglibs-log.tld\" file to incorporate the definition of the new\
    \ `trace` tag, we can start using it in a JSP. In order to set up Tomcat to use\
    \ this new tag, we will need to go through the following steps:\n\n1.  Copy the\
    \ required new `TraceTag` and `CustomLevel` class in the appropriate directory\
    \ structure within the Web application. For example, if the Web application directory\
    \ is \"TestLogTags\", then the appropriate package structure for the classes will\
    \ need to be created under the \"TestLogTags\\WEB-INF\\classes directory\".\n\n\
    2.  Edit the \"Tomcat.bat\" file to include the \"taglibs-log.jar\" file in the\
    \ classpath.\n\n3.  Modify the \"log4j.properties\" file to set the threshold\
    \ level to TRACE. The default threshold level set for the root logger is DEBUG,\
    \ which is above the level of TRACE. So with default configuration, TRACE-level\
    \ messages will not be published. [Listing 9-7](#LiB0072.html#ch09ls07) presents\
    \ the modified \"log4j.properties\" file for using the TRACE level.\n\nListing\
    \ 9-7: Modified log4j.properties File for Using the TRACE Level\n\n| **![Start\
    \ example](_1.gif)** |\n\n```\nlog4j.rootCategory=trace#com.apress.logging.log4j.CustomLevel,\
    \ stdout\n\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\nlog4j.appender.stdout.layout=org.apache.log4j.PatternLayout\n\
    \n# Pattern to output the caller's file name and line number.\nlog4j.appender.stdout.layout.ConversionPattern=%5p\
    \ [%t] (%F:%L) - %m%n\n\nlog4j.appender.R=org.apache.log4j.RollingFileAppender\n\
    log4j.appender.R.File=logtags.log\n\nlog4j.appender.R.MaxFileSize=100KB\n# Keep\
    \ one backup file\nlog4j.appender.R.MaxBackupIndex=2\n\nlog4j.appender.R.layout=org.apache.log4j.PatternLayout\n\
    log4j.appender.R.layout.ConversionPattern=%p %t %c - %m%n\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nWith these settings in place, execute the JSP presented in [Listing\
    \ 9-8](#LiB0072.html#ch09ls08). This JSP includes a TRACE-level message.\n\nListing\
    \ 9-8: SimpleLogTrace.jsp\n\n| **![Start example](_1.gif)** |\n\n```\n<html>\n\
    <%@ taglib uri=\"http://jakarta.apache.org/taglibs/log-1.0\" prefix=\"log\" %>\n\
    <BODY>\n<h1>Test Log Tag Library</h1>\n<log:trace>Trace level message.</log:trace>\n\
    You should see output in the debug logs now.\n</BODY>\n</html>\n```\n\n| **![End\
    \ example](_1.gif)** |\n\n|  |\n\nExecuting this JSP will produce the following\
    \ message with the TRACE level in the Web server console:\n\n```\nTRACE [Thread-11]\
    \ (LoggerTag.java:109) - Trace level message.\n```\n\n## Conclusion\n\nIn this\
    \ chapter, we discussed a newly released tag library, `Log`, from Apache, for\
    \ using log4j within a JSP to perform logging. This solves the age-old problem\
    \ of having controlled logging from within a JSP. By changing the configuration,\
    \ it is possible to redirect logging information to any preferred destination\
    \ in any desired format. But careful consideration is required before you include\
    \ in your Web application CPU-intensive logging operations such as writing logging\
    \ data to a database, as it might affect the performance of that application.\n\
    \nThis brings us to the end of the log4j discussion. All the topics explained\
    \ in [Chapters 5](#LiB0032_split_000.html#266) through [9](#LiB0067_split_000.html#634)\
    \ should help you understand the internals of log4j and how to use it in practical\
    \ applications. The smaller examples provided should enable you to grasp the concepts\
    \ presented and see quick results to better understand the use of log4j. The more\
    \ extensive examples should help you to correlate the use of log4j with real-life\
    \ applications.\n\nThere is always one more thing to learn about any topic. But\
    \ we have created a skeleton and given it a shape, and now you are in a position\
    \ to build on it. But before we finish, we will definitely need to look at some\
    \ of the best practices involved in using different logging APIs in the [next\
    \ chapter](#LiB0074_split_000.html#672).\n\n# Chapter 10: Best Practices"
