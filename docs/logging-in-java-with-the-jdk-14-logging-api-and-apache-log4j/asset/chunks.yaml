    \ If not specified in the conf. file, then it\n     * will not print any message\
    \ in the log window.\n     */\n    public boolean requiresLayout() {\n       \
    \ return true;\n    }\n\n/** Getter for property title.\n     * @return Value\
    \ of property title.\n     */\n    public String getTitle() {\n        return\
    \ this.title;\n    }\n\n/** Setter for property title.\n     * @param title New\
    \ value of property title.\n     */\n    public void setTitle(String title) {\n\
    \        this.title = title;\n    }\n\n/** Getter for property height.\n     *\
    \ @return Value of property height.\n     */\n    public int getHeight() {\n \
    \       return this.height;\n    }\n\n/** Setter for property height.\n     *\
    \ @param height New value of property height.\n     */\n    public void setHeight(int\
    \ height) {\n        this.height = height;\n    }\n\n/** Getter for property width.\n\
    \     * @return Value of property width.\n     */\n    public int getWidth() {\n\
    \        return this.width;\n    }\n\n/** Setter for property width.\n     * @param\
    \ width New value of property width.\n     */\n    public void setWidth(int width)\
    \ {\n        this.width = width;\n    }\n}\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nAs we can see in this `WindowAppender`, `getWindowInstance()` is\
    \ a `private synchronized` method responsible for creating a `JFrame` instance\
    \ with the specified `title`, `width`, and `height` bean properties. We have provided\
    \ an overridden `append()` method that writes logging data to the `JTextArea`\
    \ embedded within a `JScrollPane` attached to the `JFrame`. Each time a logging\
    \ request arrives, the logging message is printed to the `JTextArea`. Notice that\
    \ the `requiresLayout()` method in `WindowAppender` returns `true`. This means\
    \ `WindowAppender` requires a `Layout` object to be associated with it, and it\
    \ uses the `Layout` object to format the logging event before displaying the message.\
    \ If no `Layout` object is specified, no logging message will be displayed in\
    \ the window. The `activateOptions()` method calls the `getWindowInstance()` method,\
    \ which creates a new logging window `JFrame` instance or returns an already existing\
    \ one.\n\nIf we are configuring programmatically, we have to explicitly call the\
    \ `activateOptions()` method to get a logging window created. As the `getWindowInstance()`\
    \ method is `synchronized` and returns one and only one instance of the `JFrame`\
    \ object, it is protected against multiple programs calling the `activateOptions()`\
    \ method of the `WindowAppender`. No matter how the configuration is done, we\
    \ will always get one instance of the logging window per application instance."
  trans: "\n### 自定义 WindowAppender 的实现\n\n清单 8-1 展示了 `WindowAppender.java`，这是一个基于窗口的自定义\
    \ `Appender` 对象。\n\n清单 8-1：WindowAppender.java\n\n| **![开始示例](img/_1.gif)** |\n\
    \n```\npackage com.apress.logging.log4j.appender;\n\nimport org.apache.log4j.AppenderSkeleton;\n\
    import org.apache.log4j.spi.LoggingEvent;\nimport javax.swing.JFrame;\nimport\
    \ javax.swing.JTextArea;\nimport javax.swing.JScrollPane;\n\n/** 这是一个自定义的 Appender\
    \ 对象，用于将日志信息发布到 Java 窗口。\n * 该日志 Java 窗口是该 Appender 对象所有实例共享的单例实例。\n */\npublic\
    \ class WindowAppender extends AppenderSkeleton{\n\nprivate static JFrame frame\
    \ = null;\n    private static JTextArea area = null;\n    private static JScrollPane\
    \ pane = null;\n\n/** 保存 title 属性的值。 */\n    private static String title;\n\n\
    /** 保存 height 属性的值。 */\n    private static int height;\n\n/** 保存 width 属性的值。 */\n\
    \    private static int width;\n\n/** 创建 WindowAppender 的新实例 */\n    public WindowAppender()\
    \ {\n    }\n    /**\n     * 此方法作为 appender 初始化过程的一部分被调用\n     */\n    public void\
    \ activateOptions() {\n        getWindowInstance();\n    }\n    /**\n     * 用于初始化日志窗口的私有方法\n\
    \     */\n    private synchronized JFrame getWindowInstance() {\n        area\
    \ = new JTextArea();\n        pane = new JScrollPane(area);\n        if(frame\
    \ == null) {\n            frame = new JFrame(title);\n            frame.setSize(width,\
    \ height);\n            frame.getContentPane().add(pane);\n            frame.setVisible(true);\n\
    \        }\n        return frame;\n    }\n\n/** 此方法重写自父类，并将日志消息打印到日志窗口。\n    \
    \ * 注意：如果没有为此 Appender 指定布局，则不会显示任何消息。\n     * 日志信息将根据指定的布局和转换模式进行格式化。\n     *\
    \ @param loggingEvent 封装日志信息。\n     */\n    protected void append(LoggingEvent\
    \ loggingEvent) {\n        // 简单地提取消息并显示\n        JScrollPane pane =\n(JScrollPane)frame.getContentPane().getComponent(0);\n\
    \        JTextArea area = (JTextArea)pane.getViewport().getView();\n        if(this.layout\
    \ !=null) {\n            area.append(this.layout.format(loggingEvent));\n    \
    \    }\n    }\n\n/** 此方法重写自父类，并释放日志窗口。\n     */\n    public void close() {\n \
    \       frame.dispose();\n    }\n\n/** 此方法重写自父类，始终返回 true，以表明此 appender 需要 Layout。\n\
    \     * 如果在配置文件中未指定，则不会在日志窗口中打印任何消息。\n     */\n    public boolean requiresLayout()\
    \ {\n        return true;\n    }\n\n/** title 属性的 getter 方法。\n     * @return title\
    \ 属性的值。\n     */\n    public String getTitle() {\n        return this.title;\n\
    \    }\n\n/** title 属性的 setter 方法。\n     * @param title title 属性的新值。\n     */\n\
    \    public void setTitle(String title) {\n        this.title = title;\n    }\n\
    \n/** height 属性的 getter 方法。\n     * @return height 属性的值。\n     */\n    public\
    \ int getHeight() {\n        return this.height;\n    }\n\n/** height 属性的 setter\
    \ 方法。\n     * @param height height 属性的新值。\n     */\n    public void setHeight(int\
    \ height) {\n        this.height = height;\n    }\n\n/** width 属性的 getter 方法。\n\
    \     * @return width 属性的值。\n     */\n    public int getWidth() {\n        return\
    \ this.width;\n    }\n\n/** width 属性的 setter 方法。\n     * @param width width 属性的新值。\n\
    \     */\n    public void setWidth(int width) {\n        this.width = width;\n\
    \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n正如我们在 `WindowAppender`\
    \ 中所见，`getWindowInstance()` 是一个 `private synchronized` 方法，负责使用指定的 `title`、`width`\
    \ 和 `height` bean 属性创建 `JFrame` 实例。我们提供了一个重写的 `append()` 方法，该方法将日志数据写入嵌入在 `JScrollPane`\
    \ 中的 `JTextArea`，而 `JScrollPane` 则附加到 `JFrame` 上。每次有日志请求到达时，日志消息都会被打印到 `JTextArea`。请注意，`WindowAppender`\
    \ 中的 `requiresLayout()` 方法返回 `true`。这意味着 `WindowAppender` 需要一个 `Layout` 对象与之关联，并且在显示消息之前，它会使用该\
    \ `Layout` 对象来格式化日志事件。如果未指定 `Layout` 对象，则窗口中不会显示任何日志消息。`activateOptions()` 方法会调用\
    \ `getWindowInstance()` 方法，该方法会创建一个新的日志窗口 `JFrame` 实例，或者返回一个已存在的实例。\n\n如果以编程方式进行配置，我们必须显式调用\
    \ `activateOptions()` 方法来创建日志窗口。由于 `getWindowInstance()` 方法是 `synchronized` 的，并且只返回一个且仅一个\
    \ `JFrame` 对象实例，因此它可以防止多个程序同时调用 `WindowAppender` 的 `activateOptions()` 方法。无论配置方式如何，每个应用程序实例始终只会获得一个日志窗口实例。\n"
- fmt: "### Testing the Custom `WindowAppender`\n\nTo test `WindowAppender`, we will\
    \ use the `WindowAppender` object as the appender for two separate `Logger` objects\
    \ appearing in two different application class files. These files are shown in\
    \ [Listing 8-2](#LiB0061.html#ch08ls02) and [Listing 8-3](#LiB0061.html#ch08ls03).\n\
    \n[Listing 8-2](#LiB0061.html#ch08ls02), `AnotherClass.java`, creates a named\
    \ logger, `Logger1`, and [Listing 8-3](#LiB0061.html#ch08ls03), `WindowAppenderDemo`,\
    \ creates another named logger, `Logger2`. Both of the classes perform some simple\
    \ logging activity.\n\n**Listing 8-2: `AnotherClass.java`**\n\n```\npackage com.apress.logging.log4j.appender;\n\
    \nimport org.apache.log4j.Logger;\n\npublic class AnotherClass {\n    private\
    \ static Logger logger = Logger.getLogger(\"Logger2\");\n\n    /** Creates a new\
    \ instance of AnotherClass */\n    public AnotherClass() {\n    }\n\n    public\
    \ void logAnotherMessage()\n    {\n        logger.info(\"Message from Another\
    \ class..\");\n    }\n}\n```\n\n**Listing 8-3: `WindowAppenderDemo.java`**\n\n\
    ```\n package com.apress.logging.log4j.appender;\n\nimport org.apache.log4j.Logger;\n\
    \npublic class WindowAppenderDemo {\n\n    private static Logger logger1 = Logger.getLogger(\"\
    Logger1\");\n    private static Logger logger2 = Logger.getLogger(\"Logger2\"\
    );\n\n    /** Creates a new instance of WindowAppenderDemo */\n    public WindowAppenderDemo()\
    \ {\n    }\n\n    public void doLogging()\n    {\n        logger1.info(\"Message\
    \ from logger1\");\n        logger2.info(\"Message from logger2\");\n    }\n\n\
    \    /**\n     * @param args the command line arguments\n     */\n    public static\
    \ void main(String[] args) {\n        WindowAppenderDemo demo = new WindowAppenderDemo();\n\
    \        demo.doLogging();\n        AnotherClass anc = new AnotherClass();\n \
    \       anc.logAnotherMessage();\n    }\n}\n```\n\nWe will write a small configuration\
    \ file, `\"customappender.properties\"`, to configure both the `Logger` objects\
    \ used in these two classes. This file, shown in [Listing 8-4](#LiB0061.html#ch08ls04),\
    \ exhibits the configuration to use for this example.\n\n**Listing 8-4: `customappender.properties`**\n\
    \n```\n#configuring the custom logger\nlog4j.logger.Logger1=DEBUG, WINDOW\nlog4j.logger.Logger2=DEBUG,\
    \ WINDOW\n\n#configuring the WINDOW appender\nlog4j.appender.WINDOW=com.apress.logging.log4j.appender.WindowAppender\n\
    log4j.appender.WINDOW.layout=org.apache.log4j.SimpleLayout\nlog4j.appender.WINDOW.title=Custom\
    \ Logging Window\nlog4j.appender.WINDOW.width=200\nlog4j.appender.WINDOW.height=200\n\
    ```\n\nIn this configuration file, we pass the values for `title`, `width`, and\
    \ `height` for `WindowAppender`. We also specify `SimpleLayout` as the layout\
    \ to be used by `WindowAppender`.\n\nExecuting the program in [Listing 8-3](#LiB0061.html#ch08ls03),\
    \ we will see a small logging window appearing with logging messages displayed\
    \ in it, as shown in [Figure 8-1](#LiB0061.html#ch08fig01).\n\n[![Click To expand](fig8-1.jpg)](fig8-1_0.jpg)\n\
    **Figure 8-1:** Logging information produced by `WindowAppender`\n\n## Configuring\
    \ log4j from a Database\n\nAs we have discussed previously, one of the most important\
    \ features of log4j is its highly configurable nature. We can define application-specific\
    \ configuration files either in properties style or in XML style. Also, the configuration\
    \ files can reside in a remote place, and we can still load configuration information\
    \ provided the resource can be accessed from a URL.\n\nThe fact that logging behavior\
    \ can be controlled through configuration files makes it so easy to change logging\
    \ style without altering the source code, instead changing configuration information\
    \ or pointing the application to a different set of configuration files.\n\nIn\
    \ certain application scenarios, we might prefer to control the log4j configuration\
    \ information from a central database. This can give us the power to apply a centrally\
    \ controlled logging style to different application components. In this scenario,\
    \ we are likely to consider that all the components in an application subscribe\
    \ to a particular logging style. The `Logger`, `Appender`, `Level`, `Layout`,\
    \ and `Filter` objects combined define a logging style. Another combination of\
    \ these logging elements will result in a separate logging style. If we decide\
    \ that all application components will collectively subscribe to a particular\
    \ logging style, and when they switch over to a different logging style they do\
    \ so collectively, storing the configuration information in a database in a relational\
    \ way might be the solution. This means each application component does not need\
    \ to maintain and load its own configuration information, and changing the configuration\
    \ information centrally in a database can control the logging behavior.\n\nIt\
    \ is great that we can change logging behavior so easily, but in reality how often\
    \ do we need to do that? In general, we know beforehand what information we will\
    \ need to log to maintain the application. It is almost always the case that we\
    \ need more logging information during the development and testing phase and need\
    \ only certain logging information in the deployment phase. The power of log4j\
    \ lies not in the fact that we can change our application logging behavior every\
    \ now and then, but in the fact that we can camouflage the capability to produce\
    \ various degrees of logging information within an application, unveiling it when\
    \ required. Only when we come to a stage where we need more or less information\
    \ do we switch over to a different style of logging.\n\n### The Database Table\
    \ Design for Storing the Logging Configuration\n\nRecall that the structure of\
    \ the configuration files and XML configuration files we used throughout the discussion\
    \ of log4j is key-value based. To configure log4j from a database requires replicating\
    \ the same information structure in the database. In a real-life situation, it\
    \ could take a whole afternoon to decide what database structure to adopt. But\
    \ for the sake of this example, we are going to use a pretty simplistic structure\
    \ with two tables, `LOGGER_REPOSITORY` and `APPENDER_DEF`, that contain information\
    \ about loggers and appenders, respectively.\n\n[Figure 8-2](#LiB0062.html#ch08fig02)\
    \ shows the simple schema diagram for the tables we are going to use for this\
    \ example.\n\n[![Click To expand](fig8-2.jpg)](fig8-2_0.jpg)\n**Figure 8-2:**\
    \ The log4j configuration schema diagram\n\nThis structure is a very simple one\
    \ that excludes elements such as `Filter` objects and `Renderer` objects. We can\
    \ see that the `APPENDER_DEF` table contains the possible properties related to\
    \ different `Appender` objects, although it does not include all the `Appender`\
    \ objects in order to keep this example simple. It can at present contain three\
    \ appender objects: `ConsoleAppender`, `DailyRollingFileAppender`, and `JDBCAppender`."
