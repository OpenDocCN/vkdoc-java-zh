  trans: "\npublic MemoryHandlerDemo(int size, Level pushLevel) {\n        handler\
    \ = new ConsoleHandler();\n        //使用指定的大小、推送级别以及一个 ConsoleHandler 作为目标处理器来实例化\
    \ MemoryHandler 对象\n        mHandler = new MemoryHandler(handler, size, pushLevel);\n\
    \        //将内存处理器添加到日志记录器\n        logger.addHandler(mHandler);\n        //将使用父日志记录器的属性设置为\
    \ false\n        logger.setUseParentHandlers(false);\n    }\n    /**\n     *此方法用于发布日志消息\n\
    \     */\n    public void logMessage() {\n        LogRecord record1 = new LogRecord(Level.SEVERE,\
    \ \"这是一条\n严重级别的消息\");\n        LogRecord record2 = new LogRecord(Level.WARNING,\
    \ \"这是一条\n警告级别的消息\");\n\nlogger.log(record1);\n        logger.log(record2);\n\
    \        //这段代码最初被注释掉了。将在下面的讨论中解释这段代码的用途。\n        /*\n        //强制处理两条记录的序列\n\
    \        logger.log(record2);\n        logger.log(record1);\n\n//根据大小会丢弃一条记录的序列\n\
    \        logger.log(record2);\n        logger.log(record2);\n        logger.log(record1);\n\
    \        */\n    }\n\npublic static void main(String args[]) {\n        //创建一个\
    \ MemoryHandler 对象，大小限制为 1000 字节\n        // 并且推送级别为 Level.SEVERE\n        MemoryHandlerDemo\
    \ demo = new MemoryHandlerDemo(2, Level.SEVERE);\n        demo.logMessage();\n\
    \    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n这个程序看起来非常简单。本质上，我们创建了一个\
    \ `MemoryHandler` 对象，指定要记录的 `LogRecord` 对象数量为 2，推送级别为 Level.SEVERE。在构造函数中，我们分配了一个\
    \ `ConsoleHandler` 对象作为目标 `Handler` 对象。在 `logMessage()` 方法中，我们创建了两个 `LogRecord`\
    \ 对象，record1 和 record2，它们具有两个不同的日志记录级别：Level.SEVERE 和 Level.WARNING。然后我们尝试发布这些记录对象。\n\
    \n`MemoryHandler` 对象会在内部将每条记录的级别与指定的推送级别进行比较。如果记录的级别大于或等于推送级别，则该记录会被传递给关联的目标 `Handler`\
    \ 对象（在此示例中为 `ConsoleHandler` 对象）。执行上述程序后，我们只会看到级别为 SEVERE 的记录被打印到控制台。\n\n```\n\
    31-Aug-2002 17:48:50 null\nSEVERE: 这是一条严重级别的消息\n```\n\n这一切看起来很简单，但消息传递的顺序很重要。如果我们尝试颠倒记录对象的顺序，那么我们将得到以下输出：\n\
    \n```\n31-Aug-2002 17:53:11 null\nWARNING: 这是一条警告级别的消息\n31-Aug-2002 17:53:11 null\n\
    SEVERE: 这是一条严重级别的消息\n```\n\n这并不令人意外。重要的是消息的顺序。当我们颠倒发布记录的顺序为：\n\n```\n//发布日志信息\n\
    logger.log(record2);\nlogger.log(record1);\n```\n\nrecord2 的级别是 Level.WARNING，而\
    \ record1 的级别是 Level.SEVERE。当 `MemoryHandler` 处理 record2 的发布请求时，它发现该级别低于推送级别（Level.SEVERE），因此决定不将其传递给目标\
    \ `Handler` 对象。但是，当它处理 record1 对象的发布请求时，它发现该级别等于推送级别，因此决定将其传递给目标 `Handler` 对象。此时，它会遍历内部存储中所有已发出发布请求的\
    \ `LogRecord` 对象，并将所有 `LogRecord` 对象传递给目标 `Handler`。然后，目标 `Handler` 对象将所有记录打印到目标位置。这就是为什么在颠倒日志记录顺序后，级别为\
    \ WARNING 和 SEVERE 的两条消息都会出现在控制台中的原因。\n\n最后要讨论的是 `MemoryHandler` 对象构造函数中 size\
    \ 参数的作用。如前所述，size 参数限制了内存中要记录的 `LogRecord` 的数量。在我们之前的示例中，我们将要缓冲的日志记录数量指定为 2。当触发条件满足时，例如某条日志记录的级别大于或等于\
    \ `MemoryHandler` 的推送级别，那么 `MemoryHandler` 会尝试释放指定 size 参数范围内的所有先前日志记录。如果我们尝试按以下顺序打印日志记录：\n\
    \n```\n//根据大小会丢弃一条记录的序列\nlogger.log(record2);\nlogger.log(record2);\nlogger.log(record1);\n\
    ```\n\n我们将看到以下输出：\n\n```\n31-Aug-2002 18:27:13 null\nWARNING: 这是一条警告级别的消息\n31-Aug-2002\
    \ 18:27:13 null\nSEVERE: 这是一条严重级别的消息\n```\n\n由于 size 参数被指定为 2，因此只有一条 record2 对象与\
    \ record3 对象一起被打印出来。如果现在将 size 参数改为 3，我们将看到所有消息都被打印出来。\n"
- fmt: "### SocketHandler\n\nOften it is the case that in a distributed computing\
    \ scenario we have several components of an application running in different places\
    \ over a network. Although the components are distributed, we tend to manage the\
    \ components centrally. In this scenario, logging information from each individual\
    \ component needs to be wired to a central location. `SocketHandler` is designed\
    \ to send messages across the network using TCP/IP to a server component that\
    \ is listening to a particular port for such messages. `SocketHandler` is a very\
    \ simple network-based `Handler` that extends the `StreamHandler` class. It has\
    \ the following constructor:\n\n```\npublic SocketHandler(String host, int port)\n\
    ```\n\nIf the host or the port is unreachable, it throws a `java.io.IOException`.\
    \ If the host or port number specified is invalid, then a `java.lang.IllegalArgumentException`\
    \ is thrown. By default, `SocketHandler` is initialized with the `LogManager`\
    \ properties, and it acquires the following properties:\n\n* `level`: This reads\
    \ the `java.util.logging.SocketHandler.level` property and defaults to `Level.ALL`.\n\
    * `filter`: This reads the `java.util.logging.SocketHandler.filter` property and\
    \ defaults to no filter.\n* `formatter`: This reads the `java.util.logging.SocketHandler.formatter`\
    \ property and defaults to the `java.util.logging.XMLFormatter`.\n* `encoding`:\
    \ This reads the `java.util.logging.SocketHandler.encoding` property and defaults\
    \ to the platform-specific encoding.\n* `host`: This reads the `java.util.logging.SocketHandler.host`\
    \ property. It specifies the host to which to connect in order to pass the logging\
    \ information.\n* `port`: This reads the `java.util.logging.SocketHandler.port`\
    \ property. It specifies the port number to a particular host to connect to.\n\
    \nThe I/O operation performed by `SocketHandler` is buffered, but the buffer is\
    \ flushed after each `LogRecord` object is written. [Listing 2-9](#LiB0017.html#ch02ls09),\
    \ `SocketHandlerDemo.java`, and [Listing 2-10](#LiB0017.html#ch02ls10), `LoggingServer.java`\
    \ (shown a little later in this section), illustrate the use of the `SocketHandler`\
    \ object.\n\n**Listing 2-9: SocketHandlerDemo.java**\n\n```\npackage sam.logging;\n\
    import java.util.logging.*;\nimport java.io.IOException;\n\npublic class SocketHandlerDemo\n\
    {\n    private SocketHandler handler = null;\n    private static Logger logger\
    \ = Logger.getLogger(\"sam.logging\");\n\npublic SocketHandlerDemo(String host,\
    \ int port)\n    {\n        try {\n            //instantiating a SocketHandler\
    \ with the given host & port\n            handler = new SocketHandler(host, port);\n\
    \            //adding the handler to the logger\n            logger.addHandler(handler);\n\
    \        }catch(IOException ioe) {\n            ioe.printStackTrace();\n     \
    \   }\n    }\n    /**\n     * This method logs the logging information\n     */\n\
    \    public void logMessage()\n    {\n        logger.warning(\"SocketHandler is\
    \ working...\");\n    }\n\npublic static void main(String args[]) {\n        //creating\
    \ a SocketHandlerDemo with localhost and 2020 port\n        SocketHandlerDemo\
    \ demo = new SocketHandlerDemo(\"localhost\", 2020);\n        demo.logMessage();\n\
    \    }\n}\n```\n\nThis program in essence obtains a named `Logger` instance, `sam.logging`,\
    \ creates an instance of the `SocketHandler` object, and assigns it as the `Handler`\
    \ of the `Logger` instance. In the `logMessage()` method, it sends the logging\
    \ message to the server. Notice that we do not disable the use of the parent logger\
    \ property for the newly obtained `Logger` instance. This is just to make sure\
    \ we see the logging information at the client side as well. To avoid printing\
    \ the logging message in the client side, we can disable the use of the parent\
    \ logger by including `setUseParentHandlers(false)`.\n\n[Listing 2-10](#LiB0017.html#ch02ls10),\
    \ `LogginServer.java`, shows the server-side program for accepting this logging\
    \ request.\n\n**Listing 2-10: LoggingServer.java**\n\n```\npackage sam.logging;\n\
    \nimport java.net.*;\nimport java.util.logging.*;\nimport java.io.*;\n\npublic\
    \ class LoggingServer\n{\n  private ServerSocket serverSocket = null;\n  private\
    \ Socket socket = null;\n  public LoggingServer(int port)\n  {\n    try\n    {\n\
    \      serverSocket = new ServerSocket(port);\n      socket = serverSocket.accept();\n\
    \    }catch(IOException ioe)\n    {\n      ioe.printStackTrace();\n    }\n  }\n\
    \  /**\n   *This method starts receiving the messages\n   */\n  public void acceptMessage()\n\
    \  {\n    try\n    {\n      //get the inputStream of the received socket\n   \
    \   InputStream inStream = socket.getInputStream();\n      BufferedReader reader\
    \ =new BufferedReader(new InputStreamReader(inStream));\n      String str = null;\n\
    \      while( (str = reader.readLine()) !=null) {\n        System.out.println(str);\n\
    \      }\n    }catch(IOException ioe)\n    {\n      ioe.printStackTrace();\n \
    \   }\n  }\n\npublic static void main(String args[])\n  {\n    LoggingServer server\
    \ = new LoggingServer(2020);\n    server.acceptMessage();\n  }\n}\n```\n\nIn this\
    \ program we start a server that listens to port 2020. The `accept()` method on\
    \ the `java.net.ServerSocket` object provides us with the `InputStream` of the\
    \ opened socket connection. We then construct a `java.io.BufferedReader` object\
    \ with the `InputStream` obtained to read the content.\n\nThe client program,\
    \ `SocketHandlerDemo`, creates a `java.util.logging.SocketHandler` with the same\
    \ port number to the host named \"localhost\" (which is the current machine by\
    \ default). It then creates a `LogRecord` object and publishes it over the network.\n\
    \nThe server program running listens to the request and receives the `LogRecord`\
    \ object passed to it. Upon receiving the input, it prints out the information\
    \ to the console. As `SocketHandler` uses the `XMLFormatter` object by default,\
    \ we get the following message printed to the console:\n\n```\n<?xml version=\"\
    1.0\" encoding=\"windows-1252\" standalone=\"no\"?>\n<!DOCTYPE log SYSTEM \"logger.dtd\"\
    >\n<log>\n<record>\n  <date>2002-08-31T20:48:47</date>\n  <millis>1030823327564</millis>\n\
    \  <sequence>0</sequence>\n  <level>WARNING</level>\n  <thread>10</thread>\n \
    \ <message>Socket handler is working</message>\n</record>\n</log>\n```\n\nWe will\
    \ discuss the `java.util.logging.XMLFormatter` formatting style in detail in [Chapter\
    \ 3](#LiB0022_split_000.html#136). The fact that `SocketHandler` writes the logging\
    \ information in XML format makes it particularly reusable in the server side.\
    \ It is easier to read the input stream from the socket and parse the incoming\
    \ XML data, which can then be organized into different Java objects for use across\
    \ the application for various purposes. It is important to note that after the\
    \ log record has been passed to the listening server, the `SocketHandler` object\
    \ needs to be closed. If there is a problem connecting to the specified host and\
    \ port number, a `java.io.IOException` is thrown."
  raw: "### SocketHandler\n\nOften it is the case that in a distributed computing\
    \ scenario we have several components of an application running in different places\
    \ over a network. Although the components are distributed, we tend to manage the\
    \ components centrally. In this scenario, logging information from each individual\
    \ component needs to be wired to a central location. `SocketHandler` is designed\
    \ to send messages across the network using TCP/IP to a server component that\
    \ is listening to a particular port for such messages. `SocketHandler` is a very\
    \ simple network-based `Handler` that extends the `StreamHandler` class. It has\
    \ the following constructor:\n\n```\npublic SocketHandler(String host, int port)\n\
    ```\n\nIf the host or the port is unreachable, it throws a `java.io.IOException`.\
    \ If the host or port number specified is invalid, then a `java.lang.IllegalArgumentException`\
    \ is thrown. By default, `SocketHandler` is initialized with the `LogManager`\
    \ properties, and it acquires the following properties:\n\n*   `level`: This reads\
    \ the `java.util.logging.SocketHandler.level` property and defaults to Level.ALL.\n\
    \n*   `filter`: This reads the `java.util.logging.SocketHandler.filter` property\
    \ and defaults to no filter.\n\n*   `formatter`: This reads the `java.util.logging.SocketHandler.formatter`\
    \ property and defaults to the `java.util.logging.XMLFormatter`.\n\n*   `encoding`:\
    \ This reads the `java.util.logging.SocketHandler.encoding` property and defaults\
    \ to the platform-specific encoding.\n\n*   `host`: This reads the `java.util.logging.SocketHandler.host`\
    \ property. It specifies the host to which to connect in order to pass the logging\
    \ information.\n\n*   `port`: This reads the `java.util.logging.SocketHandler.port`\
    \ property. It specifies the port number to a particular host to connect to.\n\
    \nThe I/O operation performed by `SocketHandler` is buffered, but the buffer is\
    \ flushed after each `LogRecord` object is written. [Listing 2-9](#LiB0017.html#ch02ls09),\
    \ `SocketHandlerDemo.java`, and [Listing 2-10](#LiB0017.html#ch02ls10), `LoggingServer.java`\
    \ (shown a little later in this section), illustrate the use of the `SocketHandler`\
    \ object.\n\nListing 2-9: SocketHandlerDemo.java\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\npackage sam.logging;\nimport java.util.logging.*;\nimport java.io.IOException;\n\
    \npublic class SocketHandlerDemo\n{\n    private SocketHandler handler = null;\n\
    \    private static Logger logger = Logger.getLogger(\"sam.logging\");\n\npublic\
    \ SocketHandlerDemo(String host, int port)\n    {\n        try {\n           \
    \ //instantiating a SocketHandler with the given host & port\n            handler\
    \ = new SocketHandler(host, port);\n            //adding the handler to the logger\n\
    \            logger.addHandler(handler);\n        }catch(IOException ioe) {\n\
    \            ioe.printStackTrace();\n        }\n    }\n    /**\n     * This method\
    \ logs the logging information\n     */\n    public void logMessage()\n    {\n\
    \        logger.warning(\"SocketHandler is working...\");\n    }\n\npublic static\
    \ void main(String args[]) {\n        //creating a SocketHandlerDemo with localhost\
    \ and 2020 port\n        SocketHandlerDemo demo = new SocketHandlerDemo(\"localhost\"\
    , 2020);\n        demo.logMessage();\n    }\n}\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nThis program in essence obtains a named `Logger` instance, `sam.logging`,\
    \ creates an instance of the `SocketHandler` object, and assigns it as the `Handler`\
    \ of the `Logger` instance. In the `logMessage()` method, it sends the logging\
    \ message to the server. Notice that we do not disable the use of the parent logger\
    \ property for the newly obtained `Logger` instance. This is just to make sure\
    \ we see the logging information at the client side as well. To avoid printing\
    \ the logging message in the client side, we can disable the use of the parent\
    \ logger by including `setUseParentHandlers(false)`.\n\n[Listing 2-10](#LiB0017.html#ch02ls10),\
    \ `LogginServer.java`, shows the server-side program for accepting this logging\
    \ request.\n\nListing 2-10: LoggingServer.java\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\npackage sam.logging;\n\nimport java.net.*;\nimport java.util.logging.*;\n\
    import java.io.*;\n\npublic class LoggingServer\n{\n  private ServerSocket serverSocket\
    \ = null;\n  private Socket socket = null;\n  public LoggingServer(int port)\n\
    \  {\n    try\n    {\n      serverSocket = new ServerSocket(port);\n      socket\
    \ = serverSocket.accept();\n    }catch(IOException ioe)\n    {\n      ioe.printStackTrace();\n\
    \    }\n  }\n  /**\n   *This method starts receiving the messages\n   */\n  public\
    \ void acceptMessage()\n  {\n    try\n    {\n      //get the inputStream of the\
    \ received socket\n      InputStream inStream = socket.getInputStream();\n   \
    \   BufferedReader reader =new BufferedReader(new InputStreamReader(inStream));\n\
    \      String str = null;\n      while( (str = reader.readLine()) !=null) {\n\
    \        System.out.println(str);\n      }\n    }catch(IOException ioe)\n    {\n\
    \      ioe.printStackTrace();\n    }\n  }\n\npublic static void main(String args[])\n\
    \  {\n    LoggingServer server = new LoggingServer(2020);\n    server.acceptMessage();\n\
    \  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nIn this program we start\
    \ a server that listens to port 2020\\. The `accept()` method on the `java.net.ServerSocket`\
    \ object provides us with the `InputStream` of the opened socket connection. We\
    \ then construct a `java.io.BufferedReader` object with the `InputStream` obtained\
    \ to read the content.\n\nThe client program, `SocketHandlerDemo`, creates a `java.util.logging.SocketHandler`\
    \ with the same port number to the host named \"localhost\" (which is the current\
    \ machine by default). It then creates a `LogRecord` object and publishes it over\
    \ the network.\n\nThe server program running listens to the request and receives\
    \ the `LogRecord` object passed to it. Upon receiving the input, it prints out\
    \ the information to the console. As `SocketHandler` uses the `XMLFormatter` object\
    \ by default, we get the following message printed to the console:\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"windows-1252\" standalone=\"no\"?>\n<!DOCTYPE log\
    \ SYSTEM \"logger.dtd\">\n<log>\n<record>\n  <date>2002-08-31T20:48:47</date>\n\
    \  <millis>1030823327564</millis>\n  <sequence>0</sequence>\n  <level>WARNING</level>\n\
    \  <thread>10</thread>\n  <message>Socket handler is working</message>\n</record>\n\
    </log>\n```\n\nWe will discuss the `java.util.logging.XMLFormatter` formatting\
    \ style in detail in [Chapter 3](#LiB0022_split_000.html#136). The fact that `SocketHandler`\
    \ writes the logging information in XML format makes it particularly reusable\
    \ in the server side. It is easier to read the input stream from the socket and\
    \ parse the incoming XML data, which can then be organized into different Java\
    \ objects for use across the application for various purposes. It is important\
    \ to note that after the log record has been passed to the listening server, the\
    \ `SocketHandler` object needs to be closed. If there is a problem connecting\
    \ to the specified host and port number, a `java.io.IOException` is thrown."
  trans: "\n### SocketHandler\n\n在分布式计算场景中，应用程序的多个组件通常通过网络在不同位置运行。尽管组件是分布式的，但我们倾向于集中管理这些组件。在这种情况下，需要将每个组件的日志信息传输到中心位置。`SocketHandler`\
    \ 旨在通过 TCP/IP 协议将消息发送到监听特定端口的服务器组件。`SocketHandler` 是一个基于网络的非常简单的 `Handler`，它继承了\
    \ `StreamHandler` 类。其构造函数如下：\n\n```\npublic SocketHandler(String host, int port)\n\
    ```\n\n如果主机或端口不可达，则会抛出 `java.io.IOException`。如果指定的主机或端口号无效，则会抛出 `java.lang.IllegalArgumentException`。默认情况下，`SocketHandler`\
    \ 使用 `LogManager` 属性进行初始化，并获取以下属性：\n\n*   `level`：读取 `java.util.logging.SocketHandler.level`\
    \ 属性，默认值为 Level.ALL。\n*   `filter`：读取 `java.util.logging.SocketHandler.filter`\
    \ 属性，默认无过滤器。\n*   `formatter`：读取 `java.util.logging.SocketHandler.formatter` 属性，默认值为\
    \ `java.util.logging.XMLFormatter`。\n*   `encoding`：读取 `java.util.logging.SocketHandler.encoding`\
    \ 属性，默认值为平台特定的编码。\n*   `host`：读取 `java.util.logging.SocketHandler.host` 属性。它指定了要连接以传递日志信息的主机。\n\
    *   `port`：读取 `java.util.logging.SocketHandler.port` 属性。它指定了要连接的特定主机的端口号。\n\n\
    `SocketHandler` 执行的 I/O 操作是带缓冲的，但每次写入 `LogRecord` 对象后都会刷新缓冲区。清单 2-9 `SocketHandlerDemo.java`\
    \ 和清单 2-10 `LoggingServer.java`（稍后在本节中展示）演示了 `SocketHandler` 对象的使用。\n\n清单 2-9：SocketHandlerDemo.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\npackage sam.logging;\nimport java.util.logging.*;\n\
    import java.io.IOException;\n\npublic class SocketHandlerDemo\n{\n    private\
    \ SocketHandler handler = null;\n    private static Logger logger = Logger.getLogger(\"\
    sam.logging\");\n\npublic SocketHandlerDemo(String host, int port)\n    {\n  \
    \      try {\n            //使用给定的主机和端口实例化一个 SocketHandler\n            handler\
    \ = new SocketHandler(host, port);\n            //将处理器添加到日志记录器\n            logger.addHandler(handler);\n\
    \        }catch(IOException ioe) {\n            ioe.printStackTrace();\n     \
    \   }\n    }\n    /**\n     * 此方法记录日志信息\n     */\n    public void logMessage()\n\
    \    {\n        logger.warning(\"SocketHandler is working...\");\n    }\n\npublic\
    \ static void main(String args[]) {\n        //使用本地主机和 2020 端口创建一个 SocketHandlerDemo\n\
    \        SocketHandlerDemo demo = new SocketHandlerDemo(\"localhost\", 2020);\n\
    \        demo.logMessage();\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n\
    |  |\n\n该程序本质上获取了一个名为 `sam.logging` 的 `Logger` 实例，创建了一个 `SocketHandler` 对象实例，并将其分配为该\
    \ `Logger` 实例的 `Handler`。在 `logMessage()` 方法中，它将日志消息发送到服务器。请注意，我们并未禁用新获取的 `Logger`\
    \ 实例对父级日志记录器属性的使用。这只是为了确保我们也能在客户端看到日志信息。为了避免在客户端打印日志消息，我们可以通过包含 `setUseParentHandlers(false)`\
    \ 来禁用对父级日志记录器的使用。\n\n清单 2-10 `LoggingServer.java` 展示了用于接受此日志请求的服务器端程序。\n\n清单 2-10：LoggingServer.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\npackage sam.logging;\n\nimport java.net.*;\n\
    import java.util.logging.*;\nimport java.io.*;\n\npublic class LoggingServer\n\
    {\n  private ServerSocket serverSocket = null;\n  private Socket socket = null;\n\
    \  public LoggingServer(int port)\n  {\n    try\n    {\n      serverSocket = new\
    \ ServerSocket(port);\n      socket = serverSocket.accept();\n    }catch(IOException\
    \ ioe)\n    {\n      ioe.printStackTrace();\n    }\n  }\n  /**\n   *此方法开始接收消息\n\
    \   */\n  public void acceptMessage()\n  {\n    try\n    {\n      //获取接收到的套接字的输入流\n\
    \      InputStream inStream = socket.getInputStream();\n      BufferedReader reader\
    \ =new BufferedReader(new InputStreamReader(inStream));\n      String str = null;\n\
    \      while( (str = reader.readLine()) !=null) {\n        System.out.println(str);\n\
    \      }\n    }catch(IOException ioe)\n    {\n      ioe.printStackTrace();\n \
    \   }\n  }\n\npublic static void main(String args[])\n  {\n    LoggingServer server\
    \ = new LoggingServer(2020);\n    server.acceptMessage();\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n在此程序中，我们启动了一个监听端口 2020 的服务器。`java.net.ServerSocket` 对象上的 `accept()`\
    \ 方法为我们提供了已打开套接字连接的 `InputStream`。然后，我们使用获取到的 `InputStream` 构造一个 `java.io.BufferedReader`\
    \ 对象来读取内容。\n\n客户端程序 `SocketHandlerDemo` 使用相同的端口号创建了一个 `java.util.logging.SocketHandler`，连接到名为\
    \ \"localhost\" 的主机（默认情况下是当前机器）。然后，它创建一个 `LogRecord` 对象并通过网络发布它。\n\n正在运行的服务器程序监听请求并接收传递过来的\
    \ `LogRecord` 对象。收到输入后，它会将信息打印到控制台。由于 `SocketHandler` 默认使用 `XMLFormatter` 对象，我们会在控制台看到以下消息：\n\
    \n```\n<?xml version=\"1.0\" encoding=\"windows-1252\" standalone=\"no\"?>\n<!DOCTYPE\
    \ log SYSTEM \"logger.dtd\">\n<log>\n<record>\n  <date>2002-08-31T20:48:47</date>\n\
    \  <millis>1030823327564</millis>\n  <sequence>0</sequence>\n  <level>WARNING</level>\n\
    \  <thread>10</thread>\n  <message>Socket handler is working</message>\n</record>\n\
    </log>\n```\n\n我们将在第 3 章中详细讨论 `java.util.logging.XMLFormatter` 的格式化风格。`SocketHandler`\
    \ 以 XML 格式写入日志信息这一事实使其在服务器端特别可重用。从套接字读取输入流并解析传入的 XML 数据更容易，然后可以将这些数据组织成不同的 Java\
    \ 对象，以便在应用程序中用于各种目的。需要注意的是，在日志记录传递给监听服务器后，需要关闭 `SocketHandler` 对象。如果连接到指定的主机和端口号时出现问题，则会抛出\
    \ `java.io.IOException`。\n"
- fmt: "# Filter Object\n\n`java.util.logging.Filter` objects are useful when we want\
    \ more fine-grained control over the logging. We have already seen that logging\
    \ information is filtered with its associated logging level. But in situations\
    \ where we need to analyze the log record before making a final decision whether\
    \ it should be logged, we need to implement separate `Filter` objects. A `Filter`\
    \ can be attached to both `Logger` objects and `Handler` objects. Each can apply\
    \ separate `Filter` objects to one particular `LogRecord` before logging it. It\
    \ is possible to set `Filter` objects programmatically through the `setFilter()`\
    \ methods, or they can be specified in the configuration file.\n\n`Filter` objects\
    \ by rule have to implement the `java.util.logging.Filter` interface, which defines\
    \ a single method, `isLoggable(LogRecord record)`, returning a Boolean value.\
    \ Before a `Logger` passes a `LogRecord` object to its associated `Handler`, it\
    \ calls the `isLoggable()` method on any attached `Filter` and passes the `LogRecord`\
    \ to the `Handler` only if the `Filter` approves it. Similarly, the `Handler`\
    \ object invokes the `isLoggable()` method on its associated `Filter` before sending\
    \ it to the final destination. [Listing 2-11](#LiB0018.html#ch02ls11), `Person.java`,\
    \ defines a `Person` object, and [Listing 2-12](#LiB0018.html#ch02ls12), `AgeFilter.java`,\
    \ creates a `Filter` that is capable of making some logging decisions based on\
    \ a person's age.\n\n**Listing 2-11: Person.java**\n\n```\npackage sam.logging;\n\
    \npublic class Person\n{\n  private String name = null;\n  private int age;\n\n\
    public Person(String name, int age)\n  {\n   this.name = name;\n   this.age =\
    \ age;\n  }\n\npublic void setName(String name)\n  {\n   this.name = name;\n \
    \ }\n\npublic String getName()\n  {\n   return name;\n  }\n\npublic void setAge(int\
    \ age)\n  {\n   this.age = age;\n  }\n\npublic int getAge()\n  {\n   return age;\n\
    \  }\n}\n```\n\n[Listing 2-12](#LiB0018.html#ch02ls12), `AgeFilter.java`, implements\
    \ the `java.util.logging.Filter` interface and provides an implementation for\
    \ the method `public boolean isLoggable(LogRecord record)`. For simplicity, let's\
    \ assume that the `LogRecord` object passed to it will have only one `Person`\
    \ object associated with it. We then obtain and check the age from the `Person`\
    \ object and return `true` if the age is greater than 30; otherwise, we return\
    \ `false`. If the return value is `true`, then the `LogRecord` object is passed\
    \ to the next processor in the line, or else the `LogRecord` object is discarded.\n\
    \n**Listing 2-12: AgeFilter.java**\n\n```\npackage sam.logging;\n\nimport java.util.logging.*;\n\
    \npublic class AgeFilter implements Filter {\n    public AgeFilter() {\n    }\n\
    \    /**\n     * This is the overridden method from the Filter interface.\n  \
    \   * It checks the Person object associated with the LogRecord\n     * checks\
    \ the age>30, and returns true\n     *@param record the LogRecord object\n   \
    \  *@return boolean true/false\n     */\n    public boolean isLoggable(LogRecord\
    \ record) {\n        boolean result = false;\n        //obtaining the Person object\
    \ from the record\n        Object[] objs = record.getParameters();\n        Person\
    \ person = (Person)objs[0];\n\n//check if person is not null\n        if(person\
    \ !=null) {\n            //obtain the age\n            int age = person.getAge();\n\
    \            if(age>30)\n                result = true;\n            else\n  \
    \              result = false;\n        }\n        return result;\n    }\n}\n\
    ```\n\nOnce we have the infrastructure ready, we next create the program in [Listing\
    \ 2-13](#LiB0018.html#ch02ls13), `FilterDemo.java`, that will use the `AgeFilter`.\
    \ In the constructor, we obtain a `Logger` object with the `sam.logging` package\
    \ structure. We then instantiate a `AgeFilter` object, and assign the `Filter`\
    \ to the `Logger`. Now we will create two `Person` objects with age 32 and 29\
    \ and try to log some messages with the `logger.log()` method by passing the reference\
    \ to the respective created `Person` objects.\n\n**Listing 2-13: FilterDemo.java**\n\
    \n```\npackage sam.logging;\n\nimport java.util.logging.*;\n\npublic class FilterDemo\n\
    {\n  private Logger logger = null;\n  private AgeFilter filter = null;\n\npublic\
    \ FilterDemo()\n  {\n    //obtaining a logger object\n    logger = Logger.getLogger(\"\
    sam.logging\");\n    //creating a AgeFilter object\n    filter = new AgeFilter();\n\
    \    //attaching the filter to the logger\n    logger.setFilter(filter);\n  }\n\
    \n/**\n   * This method logs the message\n   */\n  public void logMessage(Person\
    \ person)\n  {\n    //logging the message with Person object as parameter\n  \
    \  logger.log(Level.INFO, \"Person has age \"+person.getAge(), person);\n  }\n\
    \npublic static void main(String args[])\n  {\n    FilterDemo demo = new FilterDemo();\n\
    \    //creating Person objects\n    Person person1 = new Person(\"Paul\", 32);\n\
    \    Person person2 = new Person(\"sam\", 29);\n    //logging with each Person\
    \ object\n    demo.logMessage(person1);\n    demo.logMessage(person2);\n  }\n\
    }\n```\n\nThe `Logger` object in [Listing 2-13](#LiB0018.html#ch02ls13) has the\
    \ `AgeFilter` attached to it, which only allows a `Person` object with age greater\
    \ than 30 to be logged. Therefore, executing this program will print the following\
    \ logging information to the console:\n\n```\n01-Sep-2002 13:01:06 sam.logging.FilterDemo\
    \ logMessage\nINFO: Person has age 32\n```\n\nThe preceding listing is a very\
    \ simplistic example of the usage of `Filter` objects in the logging framework.\
    \ You can easily figure out how useful `Filter` objects might become to greatly\
    \ reduce the number of log messages being published and also how they can help\
    \ to log only the information that is needed. `Filter` objects become really beneficial\
    \ when you need to print only selected logging information at the time of debugging."
