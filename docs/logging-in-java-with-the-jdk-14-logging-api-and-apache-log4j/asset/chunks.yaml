- fmt: "### `StreamHandler`\n\n`StreamHandler`类作为任何基于流的处理程序（handler）的基类。可以向`StreamHandler`指定一个`java.io.OutputStream`对象，以便`StreamHandler`将日志信息打印到指定的`OutputStream`。`StreamHandler`的默认配置属性使用`LogManager`配置属性进行初始化。\n\
    \n在默认的JDK 1.4设置下，`StreamHandler`获取以下初始化属性：\n\n- `level`：读取`java.util.logging.StreamHandler.level`属性，默认为`Level.INFO`。\n\
    - `filter`：读取`java.util.logging.StreamHandler.filter`属性，默认为无过滤器。\n- `formatter`：读取`java.util.logging.StreamHandler.formatter`属性，默认为`java.util.logging.SimpleFormatter`。\n\
    - `encoding`：读取`java.util.logging.StreamHandler.encoding`属性，默认为平台特定的编码风格。\n\n\
    `StreamHandler`对象可以写入任何类型的`OutputStream`对象，包括`System.out`。在`StreamHandlerDemo.java`（如[清单2-6](#LiB0017.html#ch02ls06)所示）中，我们将借助`StreamHandler`将日志信息发布到`System.out`。\n\
    \n**清单2-6：`StreamHandlerDemo.java`**\n\n```\npackage sam.logging;\nimport java.util.logging.*;\n\
    import java.io.*;\n\npublic class StreamHandlerDemo\n{\n    private StreamHandler\
    \ handler = null;\n    private OutputStream outStream = null;\n    private static\
    \ Logger logger = Logger.getLogger(\"sam.logging\");\n    public StreamHandlerDemo()\n\
    \    {\n        //creating an outputstream as System.out\n        outStream =\
    \ System.out;\n\n//creating a stream handler\n        handler = new StreamHandler(outStream,\
    \ new SimpleFormatter());\n        //setting the handler to the logger\n     \
    \   logger.addHandler(handler);\n        //setting the user of parent logger to\
    \ false\n        logger.setUseParentHandlers(false);\n    }\n\n/**\n     *This\
    \ method demonstrates the stream handler logging capability\n     */\n    public\
    \ void logMessage()\n    {\n        //publishing the logging information\n   \
    \     logger.info(\"StreamHandler is working…\");\n    }\n\npublic static void\
    \ main(String[] args)\n    {\n        StreamHandlerDemo demo = new StreamHandlerDemo();\n\
    \        demo.logMessage();\n    }\n}\n```\n\n在此示例中，首先我们获取一个命名的`Logger`实例`sam.logging`。在构造函数中，我们通过传递对`System.out`的引用来创建一个`StreamHandler`对象。这作为输出流，用于写入日志信息，同时传递一个`SimpleFormatter`对象实例来格式化日志消息。我们将`StreamHandler`对象作为处理程序分配给记录器（logger）。值得注意的是，我们将父记录器的使用设置为`false`。这将阻止日志请求被转发到父记录器。另一方面，如果启用了父记录器的使用，则日志消息将根据与特定记录器关联的父记录器数量，在输出中出现多次。\n\
    \n在`logMessage()`方法中，我们使用日志消息调用`Logger`类的`info()`方法。需要注意的是，`StreamHandler`对象的级别应等于或大于`Logger`对象使用的级别。默认情况下，`StreamHandler`的级别为`INFO`。如果级别低于`StreamHandler`的阈值级别，日志消息将被忽略。最后，我们使用`Logger`类的`info()`方法发布日志消息。\n\
    \n执行[清单2-6](#LiB0017.html#ch02ls06)中的程序将在控制台产生以下输出：\n\n```\n07-Aug-2002 18:42:30\
    \ sam.logging.StreamHandlerDemo logMessage\nINFO: StreamHandler is working...\n\
    ```\n\n然而，`StreamHandler`对象很少单独使用。`FileHandler`、`ConsoleHandler`和`SocketHandler`是`StreamHandler`的子类，它们为基于流的日志记录提供了更丰富的功能。\n\
    \n### `ConsoleHandler`\n\n`ConsoleHandler`是JDK 1.4日志记录API中的内置处理程序。它用于将日志信息打印到`System.err`（而不是`System.out`），因此它扩展了`StreamHandler`类。当没有为`Logger`对象显式定义处理程序时，`ConsoleHandler`是该对象使用的默认处理程序之一。\n\
    \n默认情况下，`ConsoleHandler`对象通过读取`LogManager`对象的配置属性进行初始化。当未显式设置属性时，它获取以下默认属性：\n\n\
    - `level`：读取`java.util.logging.ConsoleHandler.level`属性，默认为`Level.INFO`。\n- `filter`：读取`java.util.logging.ConsoleHandler.filter`属性，默认为无过滤器。\n\
    - `formatter`：读取`java.util.logging.ConsoleHandler.formatter`属性，默认为`java.util.logging.SimpleFormatter`。\n\
    - `encoding`：读取`java.util.logging.ConsoleHandler.encoding`属性，默认为平台特定的编码风格。\n\n\
    有趣的是，`ConsoleHandler`的重写方法`close()`仅将任何缓冲区刷新到`System.err`流，但保持`System.err`打开。"
  raw: "### StreamHandler\n\nThe `StreamHandler` class acts as a base class for any\
    \ stream-based handler. It is possible to specify a `java.io.OutputStream` object\
    \ to `StreamHandler` so that `StreamHandler` will print the logging information\
    \ to the specified `OutputStream`. The default configuration properties for `StreamHandler`\
    \ are initialized using the `LogManager` configuration properties.\n\nWith the\
    \ default JDK 1.4 setting, a `StreamHandler` acquires the following initialization\
    \ properties:\n\n*   `level`: This reads the `java.util.logging.StreamHandler.level`\
    \ property and defaults to Level.INFO.\n\n*   `filter`: This reads the `java.util.logging.StreamHandler.filter`\
    \ property and defaults to no filter.\n\n*   `formatter`: This reads the `java.util.logging.StreamHandler.formatter`\
    \ property and defaults to `java.util.logging.SimpleFormatter`.\n\n*   `encoding`:\
    \ This reads the `java.util.logging.StreamHandler.encoding` property and defaults\
    \ to platform-specific encoding style.\n\nThe `StreamHandler` object can write\
    \ to any kind of `OutputStream` object including `System.out`. In `StreamHandlerDemo.java`,\
    \ shown in [Listing 2-6](#LiB0017.html#ch02ls06), we will publish logging information\
    \ to `System.out` with the help of a `StreamHandler`.\n\nListing 2-6: StreamHandlerDemo.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\npackage sam.logging;\nimport java.util.logging.*;\n\
    import java.io.*;\n\npublic class StreamHandlerDemo\n{\n    private StreamHandler\
    \ handler = null;\n    private OutputStream outStream = null;\n    private static\
    \ Logger logger = Logger.getLogger(\"sam.logging\");\n    public StreamHandlerDemo()\n\
    \    {\n        //creating an outputstream as System.out\n        outStream =\
    \ System.out;\n\n//creating a stream handler\n        handler = new StreamHandler(outStream,\
    \ new SimpleFormatter());\n        //setting the handler to the logger\n     \
    \   logger.addHandler(handler);\n        //setting the user of parent logger to\
    \ false\n        logger.setUseParentHandlers(false);\n    }\n\n/**\n     *This\
    \ method demonstrates the stream handler logging capability\n     */\n    public\
    \ void logMessage()\n    {\n        //publishing the logging information\n   \
    \     logger.info(\"StreamHandler is working…\");\n    }\n\npublic static void\
    \ main(String[] args)\n    {\n        StreamHandlerDemo demo = new StreamHandlerDemo();\n\
    \        demo.logMessage();\n    }\n}\n```\n\n| **![End example](_1.gif)** |\n\
    \n|  |\n\nIn this example, first we obtain a named `Logger` instance, `sam.logging`.\
    \ In the constructor, we create a `StreamHandler` object by passing a reference\
    \ to `System.out`. This acts as the output stream to which to write the logging\
    \ information and also pass a `SimpleFormatter` object instance to format the\
    \ logging message. We assign the `StreamHandler` object as a handler to the logger.\
    \ Noticeably, we set the use of parent loggers to `false`. This will stop the\
    \ logging request being forwarded to the parent loggers. On the other hand, if\
    \ the use of parent loggers is enabled, the logging message will appear several\
    \ times in the output depending on the number of parent loggers associated with\
    \ a particular logger.\n\nIn the `logMessage()` method, we invoke the `info()`\
    \ method of the `Logger` class with the logging message. It is important to note\
    \ that the level of the `StreamHandler` object should be equal to or greater than\
    \ the level used with the `Logger` object. By default, the `StreamHandler` has\
    \ a level of INFO. If the level falls below the threshold level of the `StreamHandler`,\
    \ the logging message will be ignored. In the end, we publish the logging message\
    \ using the `info()` method of the `Logger` class.\n\nExecuting the program in\
    \ [Listing 2-6](#LiB0017.html#ch02ls06) will produce the following output to the\
    \ console:\n\n```\n07-Aug-2002 18:42:30 sam.logging.StreamHandlerDemo logMessage\n\
    INFO: StreamHandler is working...\n```\n\nHowever, the `StreamHandler` object\
    \ is rarely used in isolation. `FileHandler`, `ConsoleHandler`, and `SocketHandler`\
    \ are subclasses of `StreamHandler` that provide richer functionality for stream-based\
    \ logging.\n\n### ConsoleHandler\n\n`ConsoleHandler` is a built-in handler in\
    \ the JDK 1.4 logging API. It is used to print logging information to `System.err`,\
    \ as opposed to `System.out`, and therefore extends the `StreamHandler` class.\
    \ `ConsoleHandler` is one of the default handlers used by the `Logger` object\
    \ when no handler is explicitly defined for the that object.\n\nBy default, the\
    \ `ConsoleHandler` object is initialized by reading the configuration properties\
    \ of the `LogManager` object. It acquires the following default properties when\
    \ properties are not explicitly set:\n\n*   `level`: This reads the `java.util.logging.ConsoleHandler.level`\
    \ property and defaults to Level.INFO.\n\n*   `filter`: This reads the `java.util.logging.ConsoleHandler.filter`\
    \ property and defaults to no filter.\n\n*   `formatter`: This reads the `java.util.logging.ConsoleHandler.formatter`\
    \ property and defaults to `java.util.logging.SimpleFormatter`.\n\n*   `encoding`:\
    \ This reads the `java.util.logging.ConsoleHandler.encoding` property and defaults\
    \ to platform-specific encoding style.\n\nIt is interesting to note that the overridden\
    \ method `close()` of the `ConsoleHandler` only flushes any buffer to the `System.err`\
    \ stream but leaves `System.err` open."
  trans: "\n### StreamHandler\n\n`StreamHandler` 类作为所有基于流的处理程序（handler）的基类。可以向 `StreamHandler`\
    \ 指定一个 `java.io.OutputStream` 对象，这样 `StreamHandler` 就会将日志信息打印到指定的 `OutputStream`\
    \ 中。`StreamHandler` 的默认配置属性通过 `LogManager` 的配置属性进行初始化。\n\n在默认的 JDK 1.4 设置下，`StreamHandler`\
    \ 会获取以下初始化属性：\n\n*   `level`：读取 `java.util.logging.StreamHandler.level` 属性，默认值为\
    \ Level.INFO。\n*   `filter`：读取 `java.util.logging.StreamHandler.filter` 属性，默认值为无过滤器。\n\
    *   `formatter`：读取 `java.util.logging.StreamHandler.formatter` 属性，默认值为 `java.util.logging.SimpleFormatter`。\n\
    *   `encoding`：读取 `java.util.logging.StreamHandler.encoding` 属性，默认值为平台相关的编码方式。\n\
    \n`StreamHandler` 对象可以向任何类型的 `OutputStream` 对象（包括 `System.out`）写入数据。在 清单 2-6 所示的\
    \ `StreamHandlerDemo.java` 中，我们将借助 `StreamHandler` 将日志信息发布到 `System.out`。\n\n\
    清单 2-6：StreamHandlerDemo.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\npackage sam.logging;\n\
    import java.util.logging.*;\nimport java.io.*;\n\npublic class StreamHandlerDemo\n\
    {\n    private StreamHandler handler = null;\n    private OutputStream outStream\
    \ = null;\n    private static Logger logger = Logger.getLogger(\"sam.logging\"\
    );\n    public StreamHandlerDemo()\n    {\n        //创建一个输出流作为 System.out\n  \
    \      outStream = System.out;\n\n//创建一个流处理程序\n        handler = new StreamHandler(outStream,\
    \ new SimpleFormatter());\n        //将处理程序设置给日志记录器\n        logger.addHandler(handler);\n\
    \        //将使用父日志记录器的选项设为 false\n        logger.setUseParentHandlers(false);\n\
    \    }\n\n/**\n     *此方法演示了流处理程序的日志记录能力\n     */\n    public void logMessage()\n\
    \    {\n        //发布日志信息\n        logger.info(\"StreamHandler 正在工作…\");\n    }\n\
    \npublic static void main(String[] args)\n    {\n        StreamHandlerDemo demo\
    \ = new StreamHandlerDemo();\n        demo.logMessage();\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n在此示例中，我们首先获取一个命名的 `Logger` 实例 `sam.logging`。在构造函数中，我们通过传递一个对 `System.out`\
    \ 的引用来创建一个 `StreamHandler` 对象。这作为写入日志信息的输出流，同时我们还传递了一个 `SimpleFormatter` 对象实例来格式化日志消息。我们将\
    \ `StreamHandler` 对象作为处理程序分配给日志记录器。值得注意的是，我们将使用父日志记录器的选项设置为 `false`。这将阻止日志记录请求被转发给父日志记录器。另一方面，如果启用了使用父日志记录器的选项，则日志消息会根据与特定日志记录器关联的父日志记录器数量，在输出中出现多次。\n\
    \n在 `logMessage()` 方法中，我们调用 `Logger` 类的 `info()` 方法并传入日志消息。需要注意的是，`StreamHandler`\
    \ 对象的级别应等于或高于 `Logger` 对象所使用的级别。默认情况下，`StreamHandler` 的级别为 INFO。如果级别低于 `StreamHandler`\
    \ 的阈值级别，日志消息将被忽略。最后，我们使用 `Logger` 类的 `info()` 方法发布日志消息。\n\n执行 清单 2-6 中的程序将在控制台产生以下输出：\n\
    \n```\n07-Aug-2002 18:42:30 sam.logging.StreamHandlerDemo logMessage\nINFO: StreamHandler\
    \ is working...\n```\n\n然而，`StreamHandler` 对象很少单独使用。`FileHandler`、`ConsoleHandler`\
    \ 和 `SocketHandler` 是 `StreamHandler` 的子类，它们为基于流的日志记录提供了更丰富的功能。\n\n### ConsoleHandler\n\
    \n`ConsoleHandler` 是 JDK 1.4 日志记录 API 中的一个内置处理程序。它用于将日志信息打印到 `System.err`（而不是\
    \ `System.out`），因此它扩展了 `StreamHandler` 类。当没有为 `Logger` 对象显式定义处理程序时，`ConsoleHandler`\
    \ 是该对象使用的默认处理程序之一。\n\n默认情况下，`ConsoleHandler` 对象通过读取 `LogManager` 对象的配置属性进行初始化。当未显式设置属性时，它会获取以下默认属性：\n\
    \n*   `level`：读取 `java.util.logging.ConsoleHandler.level` 属性，默认值为 Level.INFO。\n\
    *   `filter`：读取 `java.util.logging.ConsoleHandler.filter` 属性，默认值为无过滤器。\n*   `formatter`：读取\
    \ `java.util.logging.ConsoleHandler.formatter` 属性，默认值为 `java.util.logging.SimpleFormatter`。\n\
    *   `encoding`：读取 `java.util.logging.ConsoleHandler.encoding` 属性，默认值为平台相关的编码方式。\n\
    \n有趣的是，`ConsoleHandler` 重写的 `close()` 方法仅将任何缓冲区刷新到 `System.err` 流，但保持 `System.err`\
    \ 处于打开状态。\n"
- fmt: "### FileHandler\n\n`FileHandler` is a very useful `Handler` object provided\
    \ within the JDK 1.4 logging API. It writes logging information into a file. It\
    \ extends the `StreamHandler` object and overrides the necessary method to implement\
    \ file-based logging. `FileHandler` has a couple of useful features for managing\
    \ the file to which logging information is logged and to locate the file within\
    \ a file system in an OS-independent manner. As a feature-rich file-based handler,\
    \ it has the following characteristics:\n\n- It can write the logging information\
    \ to a single file, or it can write to a rotating set of files. When a particular\
    \ file reaches the maximum size limit, the logging information is continued in\
    \ a different file. The history of the logging file is maintained with a sequential\
    \ numbering scheme such as \"0, 1, 2 …\" added to the base filename.\n- It is\
    \ possible to specify log files by using a pattern instead of specifying an absolute\
    \ path. The pattern is a string that can contain the expressions shown in [Table\
    \ 2-1](#LiB0017.html#ch02table01).\n\n**Table 2-1: The Patterns in FileHandler**\n\
    \n| Expression | Meaning |\n| --- | --- |\n| `/` | The path separator of the local\
    \ OS |\n| `%t` | A directory suitable for storing temporary logging files, such\
    \ as the temp directory of the OS |\n| `%h` | A directory such as the \"user.home\"\
    \ location, which is suitable to store user-specific data in the system |\n| `%g`\
    \ | A log generation number to rotate log files |\n| `%u` | A number to make a\
    \ log file unique to avoid any conflicts |\n| `%%` | A literal percent sign |\n\
    \n`FileHandler` will use the pattern string to resolve the log file's name and\
    \ location in the following way:\n\n- If the pattern expression contains `/` or\
    \ `%t`, then the location of the log file is either the current working directory\
    \ or the temporary file directory specific to the OS. For example, if the pattern\
    \ is `%t/logging/info.out`, then in Solaris OS, it will be read as `/var/tmp/logging/info.out`\
    \ and in Windows it will be read as `c:/temp/logging/info.out`.\n- If the pattern\
    \ contains the expression `%t/logging/info%g.out`, then the logging information\
    \ will be written to `/var/tmp/logging/info0.out` and rotated to `/var/tmp/logging/info1.out`,\
    \ etc.\n- `%u` is a unique identification number to resolve any conflict with\
    \ the logging file. If `FileHandler` tries to open a file and finds that it is\
    \ already in use by another process, then it tends to use `%u` to generate some\
    \ unique number and adds that number to the end of the base filename after a dot.\
    \ For example, the pattern `%t/logging/info%u.%g.out`, with a count 2, may produce\
    \ log filenames such as `/var/tmp/logging/info0.0.out`, `/var/tmp/logging/info0.1.out`,\
    \ and `/var/tmp/logging/info0.2.out`. If `info0.2.out` generates a conflict, the\
    \ logging information will be rotated to `info1.2.out`.\n\nIn line with other\
    \ `Handler` objects, the `FileHandler` object is also initialized with the `LogManager`\
    \ properties. By default, `FileHandler` acquires the following properties:\n\n\
    - `level`: This reads the `java.util.logging.FileHandler.level` property and defaults\
    \ to `Level.ALL`.\n- `filter`: This reads the `java.util.logging.FileHandler.filter`\
    \ property and defaults to no filter.\n- `formatter`: This reads the `java.util.logging.FileHandler.formatter`\
    \ property and defaults to `java.util.logging.XMLFormatter` formatting style.\n\
    - `encoding`: This reads the `java.util.logging.FileHandler.encoding` property\
    \ and defaults to the platform-specific encoding style.\n- `limit`: This reads\
    \ the `java.util.logging.FileHandler.limit` property. The `limit` property specifies\
    \ an approximate amount of data in bytes to be written to the file. If this is\
    \ set to zero, then there is no limit to the data size. This property defaults\
    \ to no limit. It is important to note that the limit is specified in bytes, *not*\
    \ in kilobytes or megabytes or any other units. If the data exceeds the file size\
    \ limit property, then the file is rotated.\n- `count`: This reads the `java.util.logging.FileHandler.count`\
    \ property and denotes the number of output files to cycle through. It defaults\
    \ to 1.\n- `pattern`: This reads the `java.util.logging.FileHandler.pattern` property.\
    \ It defaults to `%h/java%u.log`.\n- `append`: This reads the `java.util.logging.FileHandler.append`\
    \ property. It defaults to `false`. If it is set to `true`, then log messages\
    \ are appended to the log file until the limit is reached. Otherwise, the logging\
    \ information is overwritten to the file.\n\nThe `FileHandler` class provides\
    \ the following constructors to create the object:\n\n- `public FileHandler()`:\
    \ This is the default constructor, and is initialized entirely with `LogManager`\
    \ properties.\n- `public FileHandler(String pattern)`: Constructor with the pattern\
    \ to use. The file size limit is set to none and the file count is set to 1. Only\
    \ one file will ever be created to write the log messages. The `append` property\
    \ is set to `false`.\n- `public FileHandler(String pattern, Boolean append)`:\
    \ Constructor with the pattern to append to the log file if the `append` property\
    \ is set to `true`.\n- `public FileHandler(String pattern, int limit, int count)`:\
    \ Constructor specifying the pattern, the size limit of each log file, and the\
    \ number of files to be created for rotation. Once the number of files required\
    \ to write the complete amount of log information exceeds the specified count,\
    \ the log messages are rotated back to the first file. The count value must be\
    \ at least 1.\n- `public FileHandler(String pattern, int limit, int count, Boolean\
    \ append)`: Same as the preceding constructor, except it includes a specific appending\
    \ instruction.\n\n[Listing 2-7](#LiB0017.html#ch02ls07), `FileHandlerDemo.java`,\
    \ demonstrates the use of a pattern with the `FileHandler` class.\n\n**Listing\
    \ 2-7: FileHandlerDemo.java**\n\n```\npackage sam.logging;\n\nimport java.util.logging.*;\n\
    import java.io.IOException;\n\npublic class FileHandlerDemo\n{\n    private FileHandler\
    \ handler = null;\n    private static Logger logger = Logger.getLogger(\"sam.logging\"\
    );\n\npublic FileHandlerDemo(String pattern)\n    {\n        try\n        {\n\
    \            //creating a file handler object with 1000 bytes limit for\n    \
    \        //each file and with count 2\n            handler = new FileHandler(pattern,1000,\
    \ 2);\n            //adding the handler to the logger\n            logger.addHandler(handler);\n\
    \        }catch(IOException ioe) {\n            ioe.printStackTrace();\n     \
    \   }\n    }\n\n/**\n     * This method logs the message with the FileHandler\n\
    \     */\n    public void logMessage()\n    {\n        LogRecord record = new\
    \ LogRecord(Level.INFO, \"Logged in a file..22.\");\n        logger.log(record);\n\
    \        handler.flush();\n        handler.close();\n    }\n\npublic static void\
    \ main(String[] args)\n    {\n        FileHandlerDemo demo = new FileHandlerDemo(\"\
    %h/log%g.out\");\n        demo.logMessage();\n    }\n}\n```\n\nIn this example,\
    \ we use the constructor with a pattern, size of each logging file, and count\
    \ of files. We specify the pattern to be `%h/log%g.out`. According to [Table 2-1](#LiB0017.html#ch02table01),\
    \ `%h` denotes the `user.home` system property. Once we go to the same location,\
    \ we will find the log files are created. If we have exceeded the limit of each\
    \ file (one way of doing so is to run the program in [Listing 2-7](#LiB0017.html#ch02ls07)\
    \ a couple of times in a loop), then the log file will be rotated; in that case,\
    \ we will get files `log0.out` and `log1.out`, as the count is specified as 2.\n\
    \n`FileHandler` by default uses the `XMLFormatter` object to write logging information.\
    \ We will look at the `XMLFormatter` object in detail in [Chapter 3](#LiB0022_split_000.html#136).\
    \ But in short, the logging information will be XML formatted and the XML data\
    \ will be logged into the logging files. For the preceding application, the log\
    \ file will contain the following logging information:"
