    `FileAppender` delegates the printing of logging information to its superclass,\
    \ `WriterAppender`. Interestingly, it sets the `Writer` object of the `WriterAppender`\
    \ to a custom writer, `org.apache.log4j.helpers.QuietWriter`. The `QuietWriter`\
    \ is a normal `java.io.Writer` except that it does not throw any exception if\
    \ there is a problem in I/O operation. Instead, it passes the problem to an `org.apache.log4j.spi.ErrorHandler`\
    \ type of object. The `ErrorHandler` is declared as an interface; one concrete\
    \ implementation of this interface is `org.apache.log4j.helpers.OnlyOnceErrorHandler`.\
    \ The `OnlyOnceErrorHandler` only logs the first error message to `System.err`\
    \ and silently ignores the rest. This is helpful to avoid flooding of the logging\
    \ destination with error messages.\n\nThe configuration parameters of the `FileAppender`\
    \ class can be set via the methods inherited from the `AppenderSkeleton` class.\
    \ However, as mentioned previously, this ties up the code with the configuration\
    \ information. It is recommended that you separate the configuration information\
    \ from the source code and specify this information through the configuration\
    \ file settings. For example, a configuration file can set the `FileAppender`-specific\
    \ configuration information in the following manner:\n\n```\n log4j.appender.dest\
    \ = org.apache.log4j.FileAppender\n#set the name of the file\nlog4j.appender.dest.File=${user.home}/log.out\n\
    #setting the immediate flush to true (default)\nlog4j.appender.dest.ImmediateFlush=true\n\
    #setting the threshold\nlog4j.appender.dest.Threshold=ERROR\n#setting the append\
    \ to false, overwrite\nlog4j.appender.dest.Append=false\n```\n\nThis configuration\
    \ file configures an appender named `dest`. The appender `dest` is set to be a\
    \ `FileAppender` object. The configuration file then sets different properties\
    \ for this `FileAppender` object."
  trans: "\n### ConsoleAppender\n\n`org.apache.log4j.ConsoleAppender` 是一个非常简单的类，旨在将日志信息写入\
    \ `System.out` 或 `System.err`。它继承了 `org.apache.log4j.WriterAppender` 类。任何打算将日志信息打印到控制台的日志应用程序都应使用此\
    \ `Appender`。有趣的是，它重写了其父类 `WriterAppender` 中的 `closeWriter()` 方法，并且不执行任何操作，因为控制台流不应被关闭。它具有以下属性：\n\
    \n*   `immediateFlush`：此标志默认设置为 `true`，这会导致每次日志输出请求时刷新控制台流。\n\n*   `encoding`：可以使用任何字符编码方案，但默认是平台特定的编码方案。\n\
    \n*   `threshold`：这是日志记录的截止级别。任何级别低于此阈值的日志请求都将被忽略。未指定默认阈值级别。\n\n*   `target`：日志输出的目标位置——`System.out`\
    \ 或 `System.err`。默认值为 `System.out`。\n\n### FileAppender\n\n`org.apache.log4j.FileAppender`\
    \ 继承了 `org.apache.log4j.WriterAppender` 类，并提供了将日志信息写入文件的功能。`FileAppender` 在信息如何记录到目标文件方面非常灵活。它可以启用缓冲写入、追加或覆盖同一文件中的信息，并根据日期和时间滚动文件名。它具有以下属性：\n\
    \n*   `immediateFlush`：此标志默认设置为 `true`，这会导致每次追加操作时刷新到文件的输出流。\n\n*   `encoding`：可以使用任何字符编码方案，但默认是平台特定的编码方案。\n\
    \n*   `threshold`：这是日志记录的截止级别。任何级别低于此阈值的日志请求都将被忽略。未指定默认阈值级别。\n\n*   `fileName`：将写入日志信息的文件名。文件名可以使用\
    \ UNIX 风格的变量名指定，例如 `${user.home}/log.out`，这意味着文件 \"log.out\" 的位置应在系统特定的 \"user.home\"\
    \ 目录中。\n\n*   `fileAppend`：此标志默认设置为 `true`，这会导致日志信息被追加到同一文件的末尾。\n\n*   `bufferedIO`：此标志指示是否需要启用缓冲写入。默认设置为\
    \ `false`。\n\n*   `bufferSize`：如果启用了 `bufferedI/O`，则此参数指示缓冲区大小。\n\n表 5-6 列出了 `FileAppender`\
    \ 类的构造函数。\n\n表 5-6：FileAppender 类中的构造函数\n\n| 构造函数 | 描述 |\n| --- | --- |\n| `public\
    \ FileAppender()` | 默认构造函数 |\n| `public FileAppender(Layout layout, String fileName);`\
    \ | 包含布局信息和文件名的构造函数 |\n| `public FileAppender(Layout layout, String fileName,\
    \ boolean append);` | 与上一个构造函数相同，但增加了一个用于追加模式的布尔标志。 |\n| `public FileAppender(Layout\
    \ layout, String fileName, boolean append, boolean bufferedIO, int bufferSize);`\
    \ | 设置所有参数的构造函数 |\n\n`FileAppender` 将日志信息的打印委托给其父类 `WriterAppender`。有趣的是，它将 `WriterAppender`\
    \ 的 `Writer` 对象设置为一个自定义写入器 `org.apache.log4j.helpers.QuietWriter`。`QuietWriter`\
    \ 是一个普通的 `java.io.Writer`，不同之处在于，如果 I/O 操作出现问题，它不会抛出任何异常。相反，它会将问题传递给一个 `org.apache.log4j.spi.ErrorHandler`\
    \ 类型的对象。`ErrorHandler` 被声明为一个接口；该接口的一个具体实现是 `org.apache.log4j.helpers.OnlyOnceErrorHandler`。`OnlyOnceErrorHandler`\
    \ 仅将第一条错误消息记录到 `System.err`，并静默忽略其余错误。这有助于避免错误消息淹没日志记录目标。\n\n`FileAppender` 类的配置参数可以通过从\
    \ `AppenderSkeleton` 类继承的方法进行设置。然而，如前所述，这会将代码与配置信息耦合在一起。建议将配置信息与源代码分离，并通过配置文件设置来指定这些信息。例如，配置文件可以通过以下方式设置\
    \ `FileAppender` 特定的配置信息：\n\n```\n log4j.appender.dest = org.apache.log4j.FileAppender\n\
    #设置文件名\nlog4j.appender.dest.File=${user.home}/log.out\n#设置立即刷新为 true（默认值）\nlog4j.appender.dest.ImmediateFlush=true\n\
    #设置阈值\nlog4j.appender.dest.Threshold=ERROR\n#设置追加为 false，即覆盖\nlog4j.appender.dest.Append=false\n\
    ```\n\n此配置文件配置了一个名为 `dest` 的 appender。appender `dest` 被设置为一个 `FileAppender` 对象。然后，配置文件为此\
    \ `FileAppender` 对象设置了不同的属性。\n"
- fmt: '### RollingFileAppender


    `org.apache.log4j.RollingFileAppender` extends the `FileAppender` class. It writes
    the log information to a specified file, but writes, or *rolls over*, to a secondary
    file when the primary file reaches a certain size. The `RollingFileAppender` has
    the following properties in addition to all the properties inherited from the
    `FileAppender` class.


    - `maxFileSize`: This is the critical size of the file above which the file will
    be rolled. The default maximum file size is 10MB.

    - `maxBackupIndex`: This property denotes the number of backup files to be created.
    It defaults to one backup file.


    The `RollingFileAppender` class has the constructors listed in [Table 5-7](#LiB0041.html#ch05table07).


    **Table 5-7: Constructors in the RollingFileAppender Class**


    | Constructor | Description |

    | --- | --- |

    | `public RollingFileAppender()` | This is the default constructor, which internally
    calls the default constructor of the `FileAppender` class. |

    | `public RollingFileAppender(Layout layout, String fileName) throws IOException`
    | This constructor instantiates the `FileAppender` object with the given filename.
    By default, it will append the log information to the given file. |

    | `public RollingFileAppender(Layout layout, String fileName, boolean append)
    throws IOException` | This constructor accepts the `Layout`, the filename and
    the `append` property. If the `append` property is `true`, it appends the log
    information to the file until it reaches the maximum size. |


    The `RollingFileAppender` class has several useful methods to control its behavior,
    and these appear in [Table 5-8](#LiB0041.html#ch05table08).


    **Table 5-8: Methods in the RollingFileAppender Class**


    | Method | Description |

    | --- | --- |

    | `public void rollOver()` | This method performs the usual rollover operation.
    The rollover operation is activated when the maximum file size is reached or can
    be forced at any stage of the operation by the application developer. When called:
    If the `maxBackupIndex` is >0, then the file "log.1" is renamed as "log.2" and
    so on for keeping backups. The "log.1" file is then closed, and a new file "log.2"
    is opened to log the next bit of information. If the `maxBackupIndex` = 0; then
    the log file is truncated as soon as the maximum file size is reached with no
    backup file created. |

    | `public void setMaxBackupIndex(int maxBackupIndex)` | This method, which takes
    a positive value, sets the maximum backup index after which the oldest backup
    file will be erased. If set to zero, no backup file will be created. |

    | `public void setMaxFileSize(long size)` | This method is the same as the previous
    method, except it accepts the file size as a `long` value. |

    | `public void setMaxFileSize(String size)` | This method takes the maximum file
    size after which the file will be rolled over. We can specify the file size with
    the suffix "KB", "MB", etc. to indicate kilobytes and megabytes. For example,
    we can specify a 20-megabyte file size with "20MB". |

    | `public void subAppend(LoggingEvent event)` | This is the overridden method
    from the superclass `WriterAppender`, and it implements the bulk of the writing
    to a rolling file. |


    The following properties file demonstrates how to configure the `RollingFileAppender`
    properties:


    ```

    log4j.appender.dest = org.apache.log4j.RollingFileAppender

    #set the name of the file

    log4j.appender.dest.File=${user.home}/log.out

    #setting the immediate flush to true (default)

    log4j.appender.dest.ImmediateFlush=true

    #setting the threshold

    log4j.appender.dest.Threshold=ERROR

    #setting the append to false, overwrite

    log4j.appender.dest.Append=false

    #set the maximum file size before roll over

    log4j.appender.dest.MaxFileSize=10KB

    #set the backup index

    log4j.appender.dest.MaxBackupIndex=2

    ```


    This configuration file defines a `RollingFileAppender` named `dest`. It then
    sets the other configuration parameters for this appender.


    ### DailyRollingFileAppender


    Size-based rolling of log files is good for managing a huge amount of logging
    data and spreading it across multiple files. But in real life, when applications
    are running day after day, we need to implement some daily-based logging capacity.
    The `org.apache.log4j.DailyRollingFileAppender` object does this for us. It extends
    the `FileAppender` class and inherits all its properties. The rolling of the file
    is accomplished with a `DatePattern` configuration parameter. `DatePattern` indicates
    when to roll over the file and the naming convention to be followed. For example,
    a `DailyRollingFileAppender` configured with the `DatePattern` `‘.’ yyyy-MM-dd`
    will end up in log files being renamed as "log.out-2002-09-17" on September 17,
    2002, at midnight and the logging will continue to a file named "log.out".


    `DatePattern` follows the `java.text.SimpleDateFormat` object formatting style.
    It is possible to define the exact date and time of file rolling through `DatePattern`.
    [Table 5-9](#LiB0041.html#ch05table09) demonstrates how `DatePattern` is used
    to control the rollover schedule assuming that the log filename is set to "log.out".


    **Table 5-9: DatePattern Conventions**


    | DatePattern | Rollover Schedule | Example |

    | --- | --- | --- |

    | `‘.’ yyyy-MM` | Roll over at the end of each month and beginning of the next
    month | The log file will be rolled over to "log.out-2002-05" on May 31, 2002,
    and similarly will be rolled over to "log.out.2002-09" on September 30, 2002.
    |

    | `‘.’ yyyy-MM-dd` | Roll over at midnight each day | On September 30, 2002, at
    midnight, the "log.out" file will be rolled over to "log.out.2002-09-30". |

    | `‘.’ yyyy-MM-dd-a` | Roll over at midday and midnight of each day | On September,
    30, 2002, at midday, the "log.out" file will be rolled over to "log.out-2002-09-30-AM",
    and at midnight that file will in turn be rolled over to "log.out.2002-09-30-PM".
    |

    | `‘.’ yyyy-MM-dd-HH` | Roll over at the top of every hour. | On September 30,
    2002, at 10:00:000 hour, the "log.out" file will be rolled over to "log.out.2002-09-30-09".
    Notice that it is prefixed with the previous hour. |

    | `‘.’ yyyy-MM-dd-HH-mm` | Roll over at every minute. | On September 30, 2002
    at 10:20:000, the "log.out" file will be rolled over to "log.out.2002-09-30-10-19".
    |

    | `‘.’ yyyy-ww` | Roll over on the first day of each week depending upon the locale
    | If the first day of the week is Monday, then at midnight on Sunday, December
    28, the "log.out" file will be rolled over to "log.out.2002-52". |


    |  | Note | Do not use ":" anywhere in `DatePattern`. The ":" character is used
    to specify a protocol, which is not exactly what we want to do with date formats.
    |


    The `DailyRollingFilteAppender` has two constructors. The first is a do-nothing
    default constructor:


    ```

    public void DailyRollingFileAppender()

    ```


    The second, shown in the following line of code, accepts the `Layout`, the filename,
    and the `DatePattern` to be used for the rollover:


    ```

    public void DailyRollingFileAppender(Layout layout, String fileName,

    String datePattern)

    ```


    The `subAppend(LoggingEvent event)` method is overridden from the `WriterAppender`
    class, and it implements the daily rolling activity.


    As we can see, the `DailyRollingFileAppender` is a very powerful mechanism to
    obtain fine-grained control over the logging process. In real life, how the logging
    information is organized is as equally important as which information is logged.
    The `DailyRollingFileAppender` can prove very helpful in publishing logging information
    on an hourly, daily, and monthly basis, which helps analyze application performance
    to a great extent without your having to deal with too much or too old information.


    The following properties file demonstrates how to configure a `DailyRollingFileAppender`:'
