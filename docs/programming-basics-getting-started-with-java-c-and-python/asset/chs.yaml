  \ 用于发现字符串中搜索模式的所有出现位置。我们代码清单中的 *r'* 让 Python 知道一个字符串被视为“原始字符串”，这意味着其中的反斜杠将被解释而不具有特殊功能。例如，在原始字符串中，*\\\
  n* 不会表示换行符。\n\n## 正则表达式的更多乐趣\n\n接下来让我们探索正则表达式的更多高级特性。代码清单 6-10 展示了两个新方法的使用：*group(\
  \ )* 和 *sub( )*（为方便起见，以粗体显示）。此外，我们将使用一种新技术，配合我们的老朋友 search( )。\n\n```\nimport re\n\
  string1 = \"Today's dessert: banana\"\n# 调用 search() 并设置四个匹配选项\nchoice1 = re.search(r\"\
  dessert.*(noni-fruit|banana|cake|toilet-paper)\", string1)\nif choice1:\nprint(\"\
  You'll be having this for\", choice1.group(), \"!\")\nstring2 = \"Have a great day\"\
