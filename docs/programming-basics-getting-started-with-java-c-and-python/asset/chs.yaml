  \ setName(String newName) {\nthis.name = newName;\n}\npublic static void Main(string[]\
  \ args) {\nGeezer some_geezer = new Geezer();\nsome_geezer.setName(\"John\");\n\
  // 下面两行是 Java 和 C# 代码清单中差异最大的地方\nConsole.WriteLine(\"你好，我的名字是 \"+some_geezer.name+\"\
  \ 这个老家伙！\");\nConsole.WriteLine(\"你能重复一遍吗？\"+\"是 \"+some_geezer.getName());\n}\n\
  }\n代码清单 4-3\nC# 中包含 main 方法的类定义（文件名 Geezer.cs）\n```\n\n## Java 和面向对象编程中的静态方法与公共方法\n\
  \n现在我们将深入探讨如何编写各种类型的方法。在面向对象编程中，基本上有两种方法：*静态*方法和*公共*方法。我们在代码清单 4-2 和 4-3 中已经实践过后一种方法。\n\
  \n注意\n\n一个方法实际上可以同时使用这两个限定符，就像著名的 Java main 方法 `public static void main( )` 那样。\n\
  \n现在，这两种方法的主要区别在于，静态方法不需要通过对象来调用；你可以在没有类特定实例的情况下调用它们。但是，静态方法不能使用类变量，如代码清单 4-4 所示。\n\
  \n```\npublic class HappyMethods {\nprivate int x=10, y=10;\n// 静态方法不能使用我们的类变量\n\
  static void myStaticMethod() {\nSystem.out.println(\"你好！我是一个静态方法，我不能使用 x 或 y。\"\
  );\n// System.out.println(x + \" + \" + y + \" = \" + (x+y));\n// 上面这行会返回一个错误\n\
  }\n// 公共方法可以使用我们的类变量进行一些基本的算术运算\npublic void myPublicMethod() {\nSystem.out.println(x\
  \ + \" + \" + y + \" = \" + (x+y));\n}\n// 我们的 main 方法\npublic static void main(String[]\
  \ args) {\nmyStaticMethod(); // 调用静态方法\nHappyMethods myObj = new HappyMethods();\
  \ // 创建 HappyMethods 的一个对象\nmyObj.myPublicMethod(); // 调用该对象的公共方法\n}\n}\n代码清单 4-4\n\
  Java 中包含 main 方法的类定义（HappyMethods.java）\n```\n\n\n\n## 构造方法\n\n对象从其类定义中获取所有变量的初始值。然而，每当创建一个对象时，可以调用构造方法来设置这些变量数据的全部或部分内容。\n\
  \n你可以通过定义接受额外属性的方法来创建新的构造方法。这些属性随后会根据需要传递给每个对象，以替换类中定义的原始值。示例请参见代码清单 4-5。\n\n构造方法必须与其所属的类具有相同的名称。在我们的示例程序中，这两个构造方法都根据其源类命名为\
  \ *Movie*。\n\n```\npublic class Movie {\n// 类变量及其默认值\nprivate String title=\"Jack\
  \ and Jill\";\nprivate int release_year = 2011;\n// 这是一个默认构造方法。如有需要，Java 会自动创建它们\n\
  public Movie() {\n}\n// 这是一个用于同时设置电影标题和发行年份的构造方法\npublic Movie(String name, int\
  \ year) {\nrelease_year = year;\ntitle = name;\n}\n// 这是一个仅用于设置电影标题的构造方法\npublic\
  \ Movie(String name) {\nrelease_year = 2021;\ntitle = name;\n}\npublic static void\
  \ main(String[] args) {\n// 基于类 \"Movie\" 创建三个对象\nMovie myMovie = new Movie(\"Jack\
  \ and Jill 2\");\nMovie myMovie2 = new Movie(\"The Ridiculous 6\", 2015);\nMovie\
  \ myMovie3 = new Movie();\n// 显示这三个对象中存储的数据\nSystem.out.println(myMovie.title +\
  \ \" (\" + myMovie.release_year+\")\");\nSystem.out.println(myMovie2.title + \"\
  \ (\" + myMovie2.release_year+\")\");\nSystem.out.println(myMovie3.title + \" (\"\
  \ + myMovie3.release_year+\")\");\n}\n}\n代码清单 4-5\n一个演示构造方法使用的 Java 代码清单 (Movie.java)\n\
  ```\n\n现在，在代码清单 4-5 中，我们创建了三个基于类 *Movie* 的对象。所有这些对象都使用不同的构造方法来实例化。\n\n第一个对象处理的是假设中的（但无疑是精彩的）电影\
  \ *Jack and Jill 2*，它是通过接受单个字符串的构造方法创建的。代码清单 4-5 中的第二个对象使用了更通用的构造方法，它同时接受一个字符串和一个整数。示例中的第三个也是最后一个对象是使用最基本的构造方法创建的，它不接受任何属性；它会将类定义中输入的默认值（“Jack\
  \ and Jill” 和 2011）赋给我们的对象。\n\n## 方法重载\n\n在面向对象编程中，只要参数的数量和数据类型不同，就可以有多个同名方法而不会出现问题（参见代码清单\
  \ 4-6）。\n\n```\npublic class OverloadingFun {\n// 用于将中间名首字母作为整数返回的方法\nstatic int\
  \ MakeName(int middle) {\nreturn middle;\n}\n// 用于将三个字符串组合成全名的方法\nstatic String\
  \ MakeName(String first, String mid, String last) {\nreturn first + mid + last;\n\
  }\npublic static void main(String[] args) {\n// 使用我们的第一个方法定义一个整数\nint integer_initial\
  \ = MakeName(80); // 80 在 ASCII 系统中代表 'P'\n// 使用类型转换将此整数转换为单个字符类型\nchar middle_initial=(char)integer_initial;\n\
  // 将新的字符变量转换为字符串\nString mid=String.valueOf(middle_initial);\n// 使用第二个方法添加所有三个名称以创建全名\n\
  String fullname = MakeName(\"Rick \", mid, \" Astley\");\nSystem.out.println(\"\
  Full name: \" + fullname);\n}\n}\n代码清单 4-6\n一个演示方法重载的 Java 代码清单 (OverloadingFun.java)\n\
  ```\n\n代码清单 4-6 包含两个名为 *MakeName* 的方法。第一个方法接受整数值，而它的兄弟方法接受三个字符串。为了让后者完成其工作，前述的整数值首先被转换为单个字符变量。这是通过\
  \ Java 的*类型转换*功能完成的，结果是将字母 “P” 存储到变量 *integer_initial* 中。然后，使用 Java 的 *valueOf*\
  \ 函数将此变量转换为字符串。\n\n最后，我们将三个字符串（包括中间名首字母）组合成一位著名英国流行歌手的名字。\n\n## 访问修饰符详解\n\n到目前为止，你已经在我们的代码清单中多次遇到访问修饰符。接下来让我们回顾一下它们；毕竟，它们在面向对象编程中至关重要。此外，它们不仅仅只有\
  \ *private* 或 *public*。请分别参见表 4-2 和 4-3，了解 Java 和 C# 中最常见的访问修饰符。你会注意到，尽管两种语言都基本遵循相同的面向对象编程逻辑，但它们的访问修饰符数量不同。此外，在\
  \ Java 中，类可以访问包。\n\n表 4-2\n\nJava 中最常见的访问修饰符\n\n| 访问修饰符 | 用于 | 可访问性 |\n| --- | ---\
  \ | --- |\n| *public* | 类 | 可被其他类访问 |\n| *protected* |   | 可被声明类、派生类以及同一包中的类访问 |\n\
  | *final* |   | 类不能被任何其他类继承 |\n| *abstract* |   | 类是抽象的；它不能实例化对象 |\n| *public* |\
  \ 变量、方法、构造方法 | 代码可被所有类访问 |\n| *private* |   | 代码仅能被声明类访问 |\n| *default（即未指定）* |\
  \   | 代码仅能在同一包中访问 |\n| *final* |   | 变量和方法不能被修改 |\n\n提醒一下，在 Java 中，*包*指的是一组相关的类。我们在程序代码清单中使用\
  \ *import* 关键字将特定的类（例如，*import package.name.happyclass*）或完整的包（例如，*import package.name.**\
  \ ）引入到我们的项目中以获得额外的功能。在后一种导入类型中使用的星号字符 (*) 称为*通配符*。\n\n## 为什么访问修饰符很重要\n\n你可能想知道访问修饰符究竟提供了哪些具体用途；现在正是回顾一些它们能带来明确好处的场景的好时机。其中一个场景涉及团队协作。封装的数据尤其能保护大型项目免受人为错误的影响。有了封装的代码，程序员不一定需要知道方法*如何*工作；重要的是输出。这通常会加快开发速度。\n\
  \n此外，正确使用访问修饰符通常会使程序从程序员的角度来看更具可读性。更新和维护封装的软件项目通常比过程式（即非面向对象编程）类型的项目更直接。\n\n请记住，面向对象编程中的封装包含两层含义。首先，它是一个术语，用于描述将数据与方法通过类配对的方法。其次，它指的是使用访问修饰符在编程级别上限制对数据的直接访问。\n\
  \n\n\n## C# 程序集与访问修饰符\n\n在探讨 C# 访问修饰符略有不同的面貌之前，我们先回顾一个重要的相关概念。C# 中的*程序集*指的是项目的输出，例如在\
  \ Windows 环境中通常以 *.exe* 为文件扩展名的用户可执行文件（例如 *happyprogram.exe*）。它是该语言中最小的部署单元。程序集通常包含程序使用的其他资源，包括图像数据。它们还承载着项目的元数据，例如版本信息，以及可能列出执行程序所需的其他程序集；较大的项目可能由多个程序集组成。\n\
  \n现在，我们来回顾一下 C# 的六种访问修饰符。目前它们看起来可能非常相似，但当你读完本书时，你将熟悉它们全部，并理解它们各自为何都是必需的（见表 4-3）。\n\
  \n表 4-3\n\nC# 的六种访问修饰符\n\n| 访问修饰符 | 可访问性 |\n| --- | --- |\n| *Public* | 所有其他类均可访问\
  \ |\n| *Private* | 仅可在声明的类内部访问 |\n| *Protected* | 可在声明的类内部以及从该声明类派生的任何类内部访问 |\n\
  | *Internal* | 访问仅限于当前程序集内定义的类 |\n| *protected internal* | 访问仅限于当前程序集内定义的类 AND/OR\
  \ 位于其他程序集中从它们派生的类 |\n| *private protected* | 可在声明的类内部以及从该声明类派生的任何类内部访问，但仅限于同一程序集内\
  \ |\n\n## 使用 C# 访问类\n\n让我们回到编码。到目前为止，本章大部分内容都使用了 Java。接下来，我们为 C# 创建一个原始的面向对象编程清单，以展示其对访问修饰符的处理方式（见清单\
  \ 4-7）。\n\n```\nusing System;\nclass Protected_Class {\n// 定义一个受保护的字符串变量 fruit\n\
  protected String fruit;\npublic Protected_Class()\n{ fruit = \"Noni fruit\"; }\n\
  }\n// 使用冒号运算符创建一个新的派生类\nclass Derived_Class : Protected_Class {\n// 这个来自 Derived_Class\
  \ 的方法可以访问 Protected_Class\npublic String getFruit()\n{ return fruit; }\n}\nclass\
  \ Program {\n// 主执行从这里开始\npublic static void Main(string[] args)\n{\n// 创建两个对象，每个类一个\n\
  Protected_Class Object1 = new Protected_Class();\nDerived_Class Object2 = new Derived_Class();\n\
  // 使用派生类的方法显示我们的字符串变量\nConsole.WriteLine(\"你最喜欢的水果是: {0}\", Object2.getFruit());\n\
  }\n}\n清单 4-7\n一个演示继承和访问修饰符使用的 C# 清单\n```\n\n清单 4-7 首先创建了一个我们称之为 *Protected_Class*\
  \ 的类，以便清晰明了。这个类包含一个构造函数，用于设置一个受保护的变量 *fruit*。接着创建了第二个类 *Derived_Class*，并使用冒号 (:)\
  \ 运算符使其继承第一个类的属性。Derived_Class 现在可以访问 Protected_Class 中的数据，甚至是其受保护的变量。这可以通过使用 get\
  \ 方法来实现，因此我们专门为这个类创建一个方法，并称之为 *getFruit( )*。\n\n接下来，我们进入清单 4-7 的 main 方法。在这里，我们创建了两个对象，分别来自我们之前定义的每个类。注意，C#\
  \ 中创建对象的语法与 Java 使用的语法完全相同。\n\n我们 main 方法中的最后一行显示一条包含字符串变量内容的消息；这被称为*格式化字符串*。在 C#\
  \ 中，变量使用花括号显示在文本中（C 系语言通常非常喜欢它们）。元素 *{0}* 指的是我们将在消息旁边显示的第一个（在此例中也是唯一的）变量。如果我们有第二个变量要在字符串中打印出来，我们会使用\
  \ *{1}*，以此类推。\n\n## 再次使用 UML\n\n为了让你进一步准备好迎接统一建模语言的奇妙之处，让我们把清单 4-7 转换成 UML，好吗？实际上，这种语言不仅仅是类图；使用\
  \ UML，我们还可以可视化对象。在图 4-2 中，我们同时展示了清单 4-7 的类图（左侧）和对象图。\n\n![../images/507458_1_En_4_Chapter/507458_1_En_4_Fig2_HTML.jpg](img/507458_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n\n清单 4-7 的 UML 类图（左）和对象图\n\n关于相当直观的图 4-2，有几点你应该注意。首先，类的受保护成员在其前面用井号 (#)\
  \ 符号表示。在我们的示例中，这指的是字符串变量 *fruit*。此外，UML 中的对象图使用特定的格式。头部包含对象名称、一个两边有空格的冒号运算符 (:)，最后是实例化该对象的类名。另外，头部完全带有下划线。在\
  \ UML 中，对象图的变量需要显示其内容；因此，我们在图中看到了美味的“Noni fruit”，因为这是类的构造函数所指定的内容。\n\nUML 类图整体上表示一个系统，而对象图则表示系统在特定时间点的详细状态。可以将前者视为蓝图，将后者视为系统运行时的快照。\n\
  \n## 受保护访问：Java 与 C# 对比\n\n尽管 Java 和 C# 在语法和逻辑方法上非常接近，但仍存在一些微妙的差异，这些差异起初可能会令人困惑。例如，访问修饰符\
  \ *protected* 在这两种语言中的处理方式就不同。\n\n在 Java 中，*protected* 等同于 C# 中的 *protected internal*，即它只能由声明类或派生类，或者同一*包*（Java\
  \ 中）或*程序集*（C# 中）中的类访问。\n\n正如你可能从表 4-3 中记得的那样，C# 中真正的 *protected* 修饰符只能从声明类内部以及从原始类派生的任何类内部访问。\n\
  \n\n\n## Python 与面向对象编程\n\n我们并没有忘记 Python，而且，是的，它同样是面向对象的。尽管该语言支持所有主要的面向对象编程技术，但其语法与\
  \ Java 和 C# 截然不同。首先，那些可爱的花括号大多不见了。此外，Python 中的构造函数是用关键字 *__init__( )*（每侧各有两个下划线）来定义的。\n\
  \n在 Python 中，空白字符成为了一个非常重要的因素。正如第 2 章所述，缩进是 Python 语法中不可或缺的一部分，用于表示代码清单中的代码块。\n\n\
  现在，让我们用 Python 创建一个简单的类应用。在代码清单 4-8 中，我们创建了一个类和一个构造函数方法，并使用该类实例化了一个对象。\n\n```\n\
  class Publisher:\ndef __init__(self, name):\nself.name = name\n\"Create new object,\
  \ cool_publisher, from the above class\"\ncool_publisher = Publisher(\"Apress\"\
  )\n\"Display its name\"\nprint(cool_publisher.name, \"is cool!\")\n代码清单 4-8\n一个演示面向对象编程的简单\
  \ Python 代码清单\n```\n\n审视代码清单 4-8，你会立刻注意到与 Java 和 C# 的不同之处。首先，*Publisher* 类由三个独立的代码块组成，它们通过三个不同级别的缩进分隔。如果不遵循这种格式化逻辑，Python\
  \ 实际上会抛出错误。值得庆幸的是，大多数 Python 集成开发环境会在适当的位置自动添加空白字符。\n\n在 Python 中，类和构造函数声明以冒号（:）结尾。表达式\
  \ *self* 用于引用类为其生成的每个对象所拥有的变量。在 Python 中创建对象相当直接；我们给它们一个名字，并将一个类与我们选择的构造函数关联起来。在代码清单\
  \ 4-8 中，只有一个构造函数，它接受 publisher 类唯一变量 *name* 的值。\n\n接下来，让我们在 Python 中尝试一些稍微复杂的内容（参见代码清单\
  \ 4-9）。\n\n```\n\"Create and initialize a global variable\"\npotato_count = 0\n\
  class Potato:\n\"Make a constructor\"\ndef __init__(self, *args):\nglobal potato_count\
  \ # point out potato_count is indeed global\n\"country defaults to Finland if no\
  \ value is given\"\nself.country = \"Finland\"\n\"Take the first argument as diameter\"\
  \nself.diameter = args[0]\n\"Take the second argument as cultivar\"\nself.cultivar\
  \ = args[1]\n\"Increase global variable value by one\"\npotato_count += 1\n\"If\
  \ over two arguments are given assume the third one is for country\"\nif len(args)\
  \ > 2:\nself.country = args[2]\n\"Make a method for displaying object information\"\
  \ndef printInfo(self):\nprint(\"My cultivar is\", self.cultivar, \"and my diameter\
  \ is\", self.diameter, \"inches\")\n#If the country-variable is not empty (!= \"\
  \") display it\"\nif self.country != \"\":\nprint(\"I was grown in\", self.country)\n\
  \"Create three objects of class Potato\"\npotato1 = Potato(3, \"Lemin kirjava\"\
  )\npotato2 = Potato(5, \"French Fingerling\", \"France\", \"This does nothing\"\
  )\npotato1.printInfo()\npotato2.printInfo()\nprint(\"Total potato-cultivars listed:\"\
  , potato_count)\n代码清单 4-9\n一个演示类构造的 Python 代码清单\n```\n\n代码清单 4-9 的输出应如下所示：\n\n*My\
  \ cultivar is Lemin kirjava and my diameter is 3 inches*\n\n*I was grown in Finland*\n\
  \n*My cultivar is French Fingerling and my diameter is 5 inches*\n\n*I was grown\
  \ in France*\n\n*Total potato-cultivars listed: 2*\n\n我们稍微复杂的 Python 代码清单引入了几个新概念。其中之一是*全局变量*。这些变量指的是可以在\
  \ Python 代码清单中的任何位置使用的变量，无论是在方法内部还是外部（任何类的方法）。\n\n接下来在代码清单 4-9 中，我们有 *def __init__(self,\
  \ *args):* 这一行，它是我们 Potato 类的唯一构造函数。它不接收特定的数据类型，而是接收一个参数列表，如表达式 **args* 所示。\n\n\
  与 Java 和 C# 不同，Python 本身不支持方法重载。如果我们为了重载目的而在一个类中输入任意数量的方法，每个后续方法都会简单地覆盖前一个方法。\n\n\
  要将参数赋值给变量，我们使用 *args[0]* 表示第一个参数，*args[1]* 表示第二个参数。如你所见，Python 从零开始计数参数。\n\n现在，Python\
  \ 有一个方便的内置函数用于确定列表和其他数据结构的长度，即 *len*。这在我们的代码清单的以下行中得到了应用：*if len(args) > 2:*，这简单地意味着“如果参数的长度超过二”。基本上，我们的程序最多接受三个参数；其余的被直接丢弃。这一点通过对象\
  \ *potato2* 得到了演示，当我们给它总共四个参数时；最后一个参数没有效果。\n\n至于我们的全局变量 *potato_count*，每次从 Potato\
  \ 类实例化一个新对象时，它的值就增加一。这自然相当准确地反映了 Potato 对象的总数。\n\n## Python 中的继承\n\n在结束本章之前，让我们再介绍一个重要的主题。Python\
  \ 中的继承实现起来相当简单（参见代码清单 4-10）。\n\n```\nclass Computer:\ndef __init__(self, *args):\n\
  self.type = args[0]\nself.cpu = args[1]\n\"Define a method for displaying type\"\
  \ndef printType(self):\nprint(\"I use a\", self.type, \"as my daily driver.\")\n\
  \"Create a child class, Desktop\"\nclass Desktop(Computer):\ndef __init__(self,\
  \ *args):\nComputer.__init__(self, *args)\nself.color = args[2]\n\"Create an object\
  \ using Desktop-class\"\ncomputer1 = Desktop(\"Commodore 64\", \"MOS 8500\", \"\
  beige\")\ncomputer1.printType()\nprint(\"It has a\", computer1.cpu, \"CPU.\")\n\
  print(\"It is a wonderful\", computer1.color, \"computer.\")\n代码清单 4-10\n一个演示继承的\
  \ Python 代码清单。子类定义以粗体显示\n```\n\n在代码清单 4-10 中，*class Desktop(Computer):* 这一行表示一个继承类\
