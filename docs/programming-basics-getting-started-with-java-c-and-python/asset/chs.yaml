  \ (JRE)*。这个组件用于将 JDK 中生成的代码输出与一些额外的必要软件库结合起来，从而使 Java 程序能够实际执行。\n\n最后，我们有 *Java\
  \ 虚拟机 (JVM)*。在台式电脑上创建的 Java 程序可以在任何安装了 JVM 的设备上运行。因此，这种在专用虚拟机上运行 Java 的方法实现了高度的平台独立性。\n\
