  \ sub( ) 方法\n```\n\n代码清单 6-10 中的 search 方法用于比较和定位现在作为该方法参数列出的字符串。换句话说，*string1*\
  \ 被搜索总共四种水果。这些水果由逻辑或运算符（用竖线字符 | 表示）分隔。该方法被设置为查找这些字符串/水果中的任何一个，但前提是它们必须出现在字符串“dessert”旁边。如果\
  \ string1 和 choice1 中的某个项之间存在这样的匹配，程序就会显示它。\n\n## Python 中的并发与并行\n\n*并行处理*指的是同时执行多个计算或指令。你可能还记得上一章中多线程的概念。与\
  \ Java 和 C# 一样，Python 能够处理多个执行线程。然而，存在一些重大差异。Python 的多线程实际上并不会以并行方式运行线程。相反，它伪并发地执行这些线程。这源于\
  \ Python 实现的*全局解释器锁 (GIL)*。该机制用于同步线程，并确保整个 Python 项目仅在单个 CPU 上执行；它根本没有利用多核处理器的全部能力。\n\
  \n尽管*并发*和*并行*是相关的术语，但它们并不相同。前者指的是同时运行独立任务的方法，而后者则是指将一个任务拆分为子任务，然后同时执行这些子任务。\n\n\
  ## 多进程 vs. 多线程\n\n在 Python 中实现线程的真正并行处理是通过使用多个进程来实现的，每个进程都有自己的解释器和 GIL。这被称为*多进程*。\n\
  \nPython 对并发的处理方式可能有些复杂（与 Java 相比）。在 Python 中，*进程*与*线程*不同。尽管两者都是独立的代码执行序列，但存在几个差异。进程往往比线程使用更多的系统内存。进程的生命周期通常也更难管理；其创建和销毁需要更多资源。请参阅表\
  \ 6-6 了解线程和进程的比较。\n\n表 6-6\n\nPython 中线程和进程的主要区别（即多进程 vs. 多线程）\n\n|   | 进程 | 线程\
  \ |\n| --- | --- | --- |\n| 使用单个全局解释器锁 (GIL) | 否 | 是 |\n| 多个 CPU 核心和/或 CPU | 支持\
  \ | 不支持 |\n| 代码复杂度 | 较低 | 较高 |\n| 内存占用 | 较大 | 较小 |\n| 可被中断/终止 | 是 | 否 |\n| 最适合用于\
  \ | CPU 密集型应用、3D 渲染、科学建模、数据挖掘、加密货币 | 用户界面、网络应用 |\n\nPython 有三个用于同时处理的代码模块：multiprocessing、asyncio\
  \ 和 threading。对于 CPU 密集型任务，multiprocessing 模块效果最佳。\n\n\n\n## 在 Python 中实现多线程\n\n\
  Python 中的多线程与本章前面讨论的全局解释器锁（GIL）机制密切相关。这种方法利用了*互斥*原则（见图 6-1）。由于 Python 多线程中的调度由操作系统完成，因此不可避免地会产生一些开销（即延迟）；而多进程通常不会受到这个问题的影响。\n\
  \n![../images/507458_1_En_6_Chapter/507458_1_En_6_Fig1_HTML.jpg](img/507458_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\nPython 中使用三个线程实现多线程的部分可视化\n\n是时候动手实践了。让我们来看看如何在 Python 中实现多线程（见代码清单 6-11）。\n\
  \n```\nimport threading\ndef happy_multiply(num, num2):\nprint(\"Multiply\", num,\
  \ \"with\", num2, \"=\", (num * num2))\ndef happy_divide(num, num2):\nprint(\"Divide\"\
  , num, \"with\", num2, \"=\", (num / num2))\nif __name__ == \"__main__\":\n# 创建两个线程\n\
  thread1 = threading.Thread(target=happy_multiply, args=(10,2))\nthread2 = threading.Thread(target=happy_divide,\
  \ args=(10,2))\n# 启动线程..\nthread1.start()\nthread1.join() # ..并确保线程 1 完全执行完毕\nthread2.start()\
  \ # 之后再启动线程 2\nthread2.join()\nprint(\"All done!\")\n代码清单 6-11\n一个演示 threading 模块基本用法的\
  \ Python 代码清单\n```\n\n我们在代码清单 6-11 中创建了两个函数，即 *happy_multiply* 和 *happy_divide*。它们各自接受两个参数。前者将\
  \ *num* 与 *num2* 相乘，后者则将 *num* 除以 *num2*。结果会直接打印在屏幕上。\n\n现在，代码清单 6-11 中有一个函数需要你特别关注；Python\
  \ 的 *join( )* 方法用于确保一个线程在继续执行后续代码之前，已完全完成其处理。如果你删除了 *thread1.join( )* 这一行，代码清单 6-4\
  \ 的输出将会变得混乱不堪。\n\n在并发处理的上下文中，*竞态条件*指的是两个或多个进程同时修改某个资源（例如文件）的场景。最终结果取决于哪个进程先到达。这被认为是一种不期望出现的情况。\n\
  \n## 在 Python 中实现多进程\n\n![../images/507458_1_En_6_Chapter/507458_1_En_6_Fig2_HTML.jpg](img/507458_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\nPython 中使用三个进程实现多进程的部分可视化\n\n尽管多进程方法通常能生成 CPU 效率极高的代码，但仍可能出现轻微的开销问题。如果\
  \ Python 中的多进程项目存在这些问题，它们通常发生在进程的初始化或终止阶段（见图 6-2）。\n\n现在，来看一个 Python 多进程模块的简单演示，见代码清单\
  \ 6-12。\n\n```\nimport time\nimport multiprocessing\ndef counter(): # 定义一个函数，counter()\n\
  name = multiprocessing.current_process().name\nprint (name, \"appears!\")\nfor i\
  \ in range(3):\ntime.sleep(1) # 延迟一秒以增强效果\nprint (name, i+1,\"/ 3\")\nif __name__\
  \ == '__main__': # 将此代码清单定义为 \"main\"，即要执行的主程序\ncounter1 = multiprocessing.Process(name='Counter\
  \ A', target=counter)\ncounter2 = multiprocessing.Process(name='Counter B', target=counter)\n\
  counter3 = multiprocessing.Process(target=counter) # 未指定名称..\ncounter1.start()\n\
  counter2.start()\ncounter3.start() # 这个无名称的计数器仅输出 \"Process-3\"\n代码清单 6-12\n一个演示\
  \ multiprocessing 模块基本用法的 Python 代码清单\n```\n\n从代码清单 6-12 可以看出，Python 中的每个进程都有一个名称变量。如果没有定义名称，则会自动分配一个通用标签，如\
  \ *Process-[进程编号]*。\n\n## 迭代器、生成器和协程\n\nPython 中有三种重要的数据处理机制，有时容易混淆：*可迭代对象、生成器*和*协程*。**列表**（例如\
  \ *happyList[0,1,2]*）是简单的可迭代对象。它们可以按需反复读取，不会出现问题。列表中的所有值都会保留，直到被特别标记为删除。**生成器**是只能访问一次的迭代器，因为它们不会将内容存储在内存中。生成器的创建方式类似于\
  \ Python 中的普通函数，不同之处在于它们使用关键字 *yield* 代替了 *return*。\n\n生成器在读取大型文件属性（例如行数）时非常有用。用于此目的的生成器会生成那些不是最新的、因此不需要的数据，从而避免内存错误，并使\
  \ Python 程序运行更高效。\n\n**协程**是一种独特的函数类型，它可以将控制权交还给调用函数，而不会在此过程中结束自身的上下文；协程会在后台平稳地保持其空闲状态。换句话说，它们用于协作式多任务处理。\n\
  \n## Asyncio：异类？\n\nAsyncio 是 *asynchronous input/output*（异步输入/输出）的缩写，是 Python 中一个用于编写并发运行代码的模块。尽管与线程和多进程有相似之处，但它实际上代表了一种不同的方法，称为*协作式多任务处理*。asyncio\
  \ 模块通过在一个单线程中运行单个进程，提供了一种伪并发。\n\n那么，在 Python 中使用异步代码意味着什么呢？嗯，用这种方法编写的代码可以安全地暂停，以便项目中的其他代码片段执行其任务。一个异步进程会提供其空闲时间让其他进程运行；这正是通过\
  \ asyncio 模块实现某种并发的方式。\n\n\n\n## 异步事件循环\n\n异步 Python 项目的核心组件是*事件循环*；我们通过它来运行子进程。任务在事件循环中调度，并由一个线程管理。基本上，事件循环的作用是协调任务，确保我们在使用\
  \ asyncio 模块时一切顺利运行。让我们通过代码清单 6-13 来看看如何实际实现 asyncio 模块。\n\n```\nimport asyncio\n\
  async def prime_number_checker(x): # 定义一个以 x 为输入的函数\n# 休眠一秒钟，可能让其他函数在我们休眠时执行它们的任务\n\
  await asyncio.sleep(1.0)\nmessage1 = \"%d 不是质数..\" % x # 设置默认消息\nif x > 1:\nfor\
  \ i in range(2, x):\n# 对变量 x 应用取模运算符 (%)。\n# 如果得到的余数不等于零，则更新 \"message1\"\nif (x\
  \ % i) != 0:\nmessage1 = \"%d 是一个质数！\" % x\nbreak # 跳出循环\nreturn message1\nasync\
  \ def print_result(y): # 定义一个以 y 为输入的函数\nresult = await prime_number_checker(y)\
  \ # 等待另一个函数完成\nprint(result) # 打印来自函数 prime_number_checker() 的结果\nhappyloop = asyncio.get_event_loop()\n\
  # 检查 2、11 和 15 是否为质数\nhappyloop.run_until_complete(print_result(2))\nhappyloop.run_until_complete(print_result(11))\n\
  happyloop.run_until_complete(print_result(15))\nhappyloop.close()\n代码清单 6-13\n一个\
  \ Python 代码清单，演示了异步链式协程以及事件循环的使用\n```\n\n在代码清单 6-13 中，我们正在寻找质数（即只有两个因数的数字：自身和 1）。我们定义了两个异步函数/协程，*prime_number_checker(x)*\
  \ 和 *print_result(y)*，它们都带有关键字 *async def*，因为这是使用 asyncio 模块的方式。\n\n现在，我们定义的第一个函数以行\
  \ *await asyncio.sleep(1.0)* 开始。与 Python 中常规的 sleep 方法相比，这种异步变体不会冻结程序；相反，它会给其他任务一个指定的时间在后台完成。\n\
  \n第二个协程中的行 *result = await prime_number_checker(y)* 是为了确保第一个函数已完成执行。*Await* 确实是一个在异步方法中有点不言自明且至关重要的关键字。\n\
  \n为了让我们的异步代码清单完全运行起来，我们需要使用事件循环。我们通过创建一个新的循环对象 *happyloop* 并调用一个名为 *asyncio.get_event_loop()*\
  \ 的函数来实现这一点。尽管有几种用于事件循环管理的函数变体，但为了清晰起见，我们在此示例中只介绍上述方法。\n\n接下来，在代码清单 6-13 中，函数 *run_until_complete*\
  \ 实际上会执行我们的 *print_result(y)* 函数，直到其各自的任务完全完成。最后，我们通过调用 close 方法来结束事件循环。\n\n## Python\
  \ 中的并发：回顾\n\nPython 提供的所有处理方法可能会让人感到困惑。因此，让我们通过回顾其中涉及的一些核心概念来结束本章（见表 6-7）。\n\n表\
  \ 6-7\n\nPython 中并发编程的主要方法\n\n| **多进程** | 同时运行多个进程；为每个进程创建一个带有全局解释器锁（GIL）的独立 Python\
  \ 解释器 | 可以利用系统中的多个 CPU 和/或 CPU 核心 |\n| **多线程** | 由操作系统优先执行的任务调度。受单个 GIL 限制 | 也称为*抢占式多任务处理*。在单个\
  \ CPU/核心上运行 |\n| **异步处理** | 由任务决定调度。受单个 GIL 限制 | 也称为*协作式多任务处理*。在单个 CPU/核心上运行。在 Python\
  \ 3.0 版本中引入 |\n\n## Python Lambda 函数\n\n将 *lambda 函数* 视为一次性函数。Lambda 函数是无名的，并且本质上通常规模较小。它们的语法简单如下：\n\
  \n*   *lambda (参数) : (表达式)*\n\n这是一个简单的 lambda 函数：*sum1 = lambda x, y : x + y*。有关稍微复杂一点的示例，请参见代码清单\
  \ 6-14。\n\n```\ndef happymultiply(b):\nreturn lambda a : a * b\nresult1 = happymultiply(5)\n\
  result2 = happymultiply(10)\nresult3 = happymultiply(50)\nprint(\"结果 1:\", result1(6))\n\
  print(\"结果 2:\", result2(6))\nprint(\"结果 3:\", result3(6))\n代码清单 6-14\n一个演示 Python\
  \ 中 lambda 函数的代码清单\n```\n\n现在，Python 中有三种方法与 lambda 函数配合得非常好：*map( )*、*filter( )*\
  \ 和 *reduce( )*。Filter( ) 接受一个列表并创建一个由所有返回 true 的元素组成的新列表。Map( ) 也根据它处理的可迭代对象创建一个新列表；可以把它看作一个无循环的迭代器函数。最后，我们有\
  \ reduce( )，它将一个函数应用于一个列表（或其他可迭代对象）并返回一个单一值，有时也让我们完全免于使用循环（见代码清单 6-15）。\n\n```\n\
  from functools import reduce # 导入 reduce() 所需的代码模块\n# 创建一个包含七个值的列表\nmiddle_aged\
  \ = [6, 120, 65, 40, 55, 57, 45]\n# 显示操作前的列表\nprint(\"研究中所有人的年龄:\", middle_aged)\n\
  # 筛选出年龄在 40 到 59 岁之间的列表\nmiddle_aged = list(filter(lambda age: age>=40 and age<60,\
  \ middle_aged))\nprint(\"中年人:\", middle_aged)\n# 调用 map() 并将列表 \"middle_aged\" 中的值加倍\n\
  elderly = list(map(lambda x: x * 2, middle_aged))\nprint(\"他们将活到:\", elderly)\n\
  # 调用 reduce() 将 \"middle_aged\" 中的所有元素相加\ntotal_years = reduce(lambda x, y: x +\
  \ y, middle_aged)\nprint(\"他们迄今为止的总存活时间:\", total_years, \"年\")\n代码清单 6-15\n一个将\
  \ lambda 函数应用于 Python 中已筛选列表的代码清单\n```\n\n## Python 中的 Zip 操作\n\n以著名的衣物闭合机制拉链命名，Python\
  \ 中的 *zip* 指的是一种将两个或多个可迭代对象的元素组合起来的方法。例如，Zip 操作是在 Python 中创建字典数据结构的一个很好的工具。不，这种\
  \ zip 与流行的归档文件格式 ZIP 无关，我们将在本章后面介绍后者。\n\n现在，Python 中的 zip 函数接受两个可迭代对象（例如列表）并返回一组元组（见代码清单\
  \ 6-16）。\n\n```\n# 定义两个列表\nletters1 = ['z', 'a', 'r', 'd', 'o', 'z']\nnumbers1 =\
  \ [1, 2, 3, 4, 5, 6]\n# 使用 \"letters1\" 和 \"numbers1\" 创建 zip 对象 zip1\nzip1 = zip(letters1,\
  \ numbers1)\nfor i in zip1: # 显示 zip 内容\nprint(i)\n# 定义新列表 \"letters2\"\nletters2\
  \ = ['Z', 'A', 'R', 'D', 'O', 'Z']\n# 使用 \"letters1\"、\"numbers1\" 和 \"letters2\"\
  \ 创建第二个 zip 对象 zip2\nzip2 = zip(letters2, numbers1, letters1)\nfor i in zip2: #\
  \ 显示第二个 zip 内容\nprint(i)\n代码清单 6-16\n一个演示 Python 中 zip 函数的代码清单\n```\n\n\n\n## 关于压缩的更多内容\n\
  \n在许多场景下，基本的压缩功能无法满足需求。其中一个场景涉及元组不完整的压缩。幸运的是，我们有一个名为 *zip_longest* 的方法。该方法位于代码模块\
  \ *itertools* 中，它会用你选择的占位数据填充所有缺失的元素，毫不含糊。演示请参见代码清单 6-17。\n\n```\nfrom itertools\
  \ import zip_longest\nletterlist = ['a', 'b', 'c']\nnumberlist = [1, 2, 3, 4]\n\
  maximum = range(5) # 定义压缩长度并将其存入\"maximum\"\n# 调用 zip_longest()\nzipped1 = zip_longest(numberlist,\
  \ letterlist, maximum, fillvalue='blank')\n# 显示压缩内容\nfor i in zipped1:\nprint(i)\n\
  代码清单 6-17\n一个演示 zip_longest 方法的 Python 代码清单\n```\n\n你可能会好奇，Python 中的压缩器能否解压。答案是肯定的（参见代码清单\
  \ 6-18）。\n\n```\nletters = ['A', 'B', 'C', 'D']\nnumbers = [1, 2, 3, 4]\nzipped1\
  \ = zip(letters, numbers) # 压缩数据\nzipped_data = list(zipped1)\nprint(\"这是压缩后的数据：\"\
  , zipped_data)\na, b = zip(*zipped_data) # 使用星号运算符解压数据\nprint(\"接下来是解压后的数据！\")\n\
  print('字母：', a)\nprint('数字：', b)\n代码清单 6-18\n一个演示解压的 Python 代码清单。\n```\n\n## 处理另一种\
  \ ZIP\n\n正如本章前面提到的，*zip* 这个词在计算领域至少有两种常见含义。我们探讨了 Python 中的压缩（和解压），涵盖了第一种含义。现在是时候在任意\
  \ Python IDE 中处理另一种 ZIP——即流行的归档文件格式了。\n\n现在，使用 ZIP 软件压缩的目录（及其子目录）最终会变成一个单一文件，其大小通常远小于未压缩的内容。这显然是基于网络的文件传输的绝佳解决方案。当然，市面上有多种文件压缩解决方案，但截至\
  \ 2021 年，ZIP 仍然是一种极其普遍的归档文件格式，适用于所有主流操作系统。\n\nZIP 由 *Phil Katz* 和 *Gary Conway*\
  \ 于 1989 年创建。ZIP 压缩技术后来被用作 *Java 归档 (JAR)* 文件格式的基础——以及其他许多格式的基础。\n\nPython 同样喜欢\
  \ ZIP 文件。我们实际上可以在 Python IDE 中操作它们。有一个专门用于此目的的代码模块，名为 *zipfile*。请参见代码清单 6-19，了解如何在\
  \ Python 中创建 ZIP 文件并显示其内容。\n\n```\nimport os\nfrom os.path import basename\nfrom\
  \ zipfile import ZipFile # 引入 ZipFile 模块\nlookfor = \"thread\" # 为要搜索的字符串创建一个变量\n\
  # 定义一个新函数 make_a_zip\ndef make_a_zip(dirName, zipFileName, filter):\n# 创建一个新的 ZipFile\
  \ 对象，属性 w 表示（覆）写\nwith ZipFile(zipFileName, 'w') as zip_object1:\n# 开始遍历指定目录中的文件\n\
  for folderName, subfolders, filenames in os.walk(dirName):\nfor file in filenames:\n\
  if filter(file):\n# 创建完整的文件路径\nfilePath = os.path.join(folderName, file)\n# 使用 write()\
  \ 方法将文件添加到压缩包\nzip_object1.write(filePath, basename(filePath))\n# 调用 make_a_zip()\
  \ 并指定当前目录作为工作目录\n# 同时只查找文件名中包含字符串 \"thread\" 的文件\nmake_a_zip('..', 'happy.zip',\
  \ lambda name: lookfor in name)\nprint(\"所有名称中包含 > 的文件现在都在 happy.zip 中！\")\n# 创建一个\
  \ ZipFile 对象并将 happy.zip 加载到其中（使用属性 r 表示读取）\nwith ZipFile('happy.zip', 'r') as zip_object2:\n\
  # 调用 namelist() 并将内容存入 \"file_in_zip\" 变量\nfiles_in_zip = zip_object2.namelist()\n\
  # 遍历 files_in_zip 并打印每个元素\nprint(\"\\n 这些文件存储在 happy.zip 中：\")\nfor i in files_in_zip:\n\
  print(i)\n代码清单 6-19\n一个演示在 Python 内部使用 ZIP 文件归档的代码清单\n```\n\n在代码清单 6-19 中，你将看到 Python\
  \ 对 ZIP 支持的两个主要机制：创建新的文件归档（即 *happy.zip*）以及检索其中存储的文件名。该示例还向你展示了在收集文件到归档时如何使用基于通配符的功能。在此例中，我们只查找文件名中某处包含字符串“thread”的文件。\n\
  \n与 *ZipFile* 配合使用的 *with* 语句主要是为了让我们的代码清单更清晰。一方面，它们使我们无需使用关闭方法（例如 *happyfile.close( )*），这些方法通常在文件操作完成后需要调用。\n\
  \n代码清单 6-19 将在你当前的 Python 目录中执行，因此你的结果可能会有所不同。\n\n我们将在本书后面部分继续探讨 Python 语言的复杂性。\n\
