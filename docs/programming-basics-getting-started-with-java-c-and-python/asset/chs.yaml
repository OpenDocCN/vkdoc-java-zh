  \ # summon Display_Address-method\nListing 9-3\nA Python implementation of Figure\
  \ 9-2\n```\n\n\n\n## UML 自行车\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig3_HTML.jpg](img/507458_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n展示 UML 中聚合关系的示意图\n\n接下来，让我们探讨如何在 UML 中为一个基本的脚踏驱动车辆建模。图 9-3 引入了一个新元素。这就是*聚合关联*，用空心菱形符号表示。\n\
  \n聚合关联意味着一个类可以在没有其他类的情况下存在。要拥有一辆功能齐全的自行车，我们需要所有组件。然而，即使我们移除某些组件，其他组件仍然存在。\n\n##\
  \ Python 中的自行车\n\n坚持使用 Python，让我们创建图 9-3 的一种可能的程序化解释（见代码清单 9-4）。\n\n```\nclass Frame:\n\
  # 类构造函数\ndef __init__(self):\nprint('车架就绪。')\nweight = 10.5 # 定义一个类变量\nclass Saddle:\n\
  # 类构造函数\ndef __init__(self):\nprint('车座已安装。')\nmaterial = \"rubber\" # 定义一个类变量\n\
  class Drivetrain:\n# 类构造函数\ndef __init__(self):\nprint('传动系统已安装。')\ntype = \"one-speed\"\
  \ # 定义一个类变量\n# 定义类方法\ndef pedalForward(self):\nprint(\"向前踩踏！\")\ndef brake(self):\n\
  print(\"刹车！\")\nclass Wheels:\ndiameter = 0\n# 类构造函数\ndef __init__(self, diameter):\n\
  print('车轮已安装。')\nself.diameter = diameter\nclass Handlebars:\n# 类构造函数\ndef __init__(self):\n\
  print(\"车把已安装。\")\n# 定义类方法\ndef turnLeft(self):\nprint(\"向左转..\")\ndef turnRight(self):\n\
  print(\"向右转..\")\nclass Bicycle:\n# 定义一个类变量\nmake = \"Helkama\"\n# 设置类构造函数和组合关系\n\
  def __init__(self):\nself.my_Frame = Frame()\nself.my_Saddle = Saddle()\nself.my_Drivetrain\
  \ = Drivetrain()\nself.my_Wheels = Wheels(571) # 传入一个新的直径值\nself.my_Handlebars =\
  \ Handlebars()\ndef main(): # 创建主方法\n# 创建 Bicycle 对象 \"your_bike\"\nyour_bike =\
  \ Bicycle()\nprint(\"你的 \" + your_bike.make + \" 牌自行车的车轮直径为 \" + str(your_bike.my_Wheels.diameter)\
  \ + \" 毫米。车架重 \" + str(your_bike.my_Frame.weight)+\" 磅。\")\nprint(\"这辆自行车有一个 \"\
  \ + your_bike.my_Drivetrain.type + \" 传动系统，车座由最优质的 \" + your_bike.my_Saddle.material+\"\
  \ 制成。\\n\")\n# 调用类方法\nyour_bike.my_Drivetrain.pedalForward()\nyour_bike.my_Handlebars.turnLeft()\n\
  your_bike.my_Drivetrain.pedalForward()\nyour_bike.my_Handlebars.turnRight()\nyour_bike.my_Drivetrain.brake()\n\
  if __name__ == \"__main__\":\nmain() # 执行主方法\n代码清单 9-4\n图 9-3（即自行车的 UML 图）的 Python\
  \ 实现。为简洁起见，此处未实现组件检查单元 A\n```\n\n问题：你本人会如何用 Java 和/或 C# 解释图 9-3？\n\n## UML 中的个人电脑\n\
  \n现在让我们对同时包含组合和聚合关联的事物进行建模。这是为了让您思考需要在 UML 中区分这两种关联类型的场景。\n\n图 9-4 代表一台典型的个人电脑。它旨在描绘一个功能系统所需的所有主要组件。然而，其中只有部分组件使用了组合关联（即实心菱形符号）来描绘。这是因为，理论上，一台个人电脑即使没有它们也能启动并运行。它可能不是最有用的系统，但至少可以开机并显示错误信息。\n\
  \n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig4_HTML.jpg](img/507458_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4\n\n展示 UML 中组合关系的示意图\n\n图 9-4 中使用组合关联描绘的基本计算机组件：\n\n*   电源、主板、CPU 和 RAM 芯片\n\
  \n使用聚合关联描绘的次要组件：\n\n*   存储单元（例如硬盘）、输入设备（例如鼠标和/或键盘）以及显示适配器/显卡（集成显卡芯片可能随 CPU 提供）\n\
  \n有关聚合关联和组合关联之间差异的总结，请参见表 9-2。\n\n表 9-2\n\nUML 中聚合关联和组合关联的主要区别\n\n|   | 聚合 | 组合\
  \ |\n| --- | --- | --- |\n| 关联强度 | 弱 | 强 |\n| 关系 | “拥有” | “部分-整体” |\n| 依赖性 | 子类可以独立于超类存在\
  \ | 子类需要超类才能存在 |\n| 示例 | 即使*学生*班级毕业，*大学*依然存在<br>关闭一个*部门*不会终结整个*公司* | 没有*房子*，*房间*毫无意义<br>*人类*生存需要功能正常的*心脏*\
  \ |\n\n## UML 中的实现和依赖\n\n实现指的是两组元素之间的关系，其中一组代表*规范*，另一组代表其*实现*。实现的实际运作方式取决于上下文，并且在\
  \ UML 中没有严格定义（见图 9-5）。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig5_HTML.jpg](img/507458_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5\n\nUML 中三个简单实现关系的示例\n\n在图 9-5 的示意图中，您将看到三个 UML 实现关系的简单示例。在第一个示例中，搜索算法为在线搜索引擎提供了功能。类似地，显卡需要显卡驱动程序软件才能实际显示任何图像。最后，三种可用的支付方式（现金、银行卡或支票）使得支付事件成为可能。\n\
  \n接下来，我们来看*依赖*（见图 9-6）。这种类型的图表示依赖元素和独立元素之间的连接。依赖关系用虚线和简单箭头表示，本质上是单向的。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig6_HTML.jpg](img/507458_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\nUML 依赖关系的两个示例\n\n## 自反关联\n\n*自反关联*用于表示属于同一类的实例。当一个类可以拆分为多个职责时，我们可以使用这种类型的关联。\n\
  \n在图 9-7 中，我们有一个名为 *Employee* 的类，它与自身存在关联，如现在熟悉的简单线条所示。*Employee* 类既用于代表受人尊敬的主管，也用于代表地位低下的实习生；您会注意到\
  \ UML 的多重性信息也被插入到该图中。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig7_HTML.jpg](img/507458_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n\nUML 中自反关联的示例\n\n现在，图 9-7 以两种不同的方式描绘了相同的场景。左侧的图展示了一种*基于角色*的方法，因为我们确实展示了两种不同的角色（即主管和实习生）。右侧的图使用了*命名关联*。\n\
  \n## UML 类图：基本元素\n\n此时，回顾一下我们到目前为止遇到的 UML 元素会是个好主意（见图 9-8）。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig8_HTML.jpg](img/507458_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\n展示 UML 类图中使用的大部分基本元素的示意图\n\n\n\n## UML 用例图\n\n尽管本书不涉及所有 UML 图类型，但还有一种你应该熟悉。这就是*用例图*，它以最简单的方式展示用户与系统的交互。这些通常是包含少量技术细节的高层图。\n\
  \n现在我们将介绍几个新的 UML 元素，分别是*参与者*、*系统*和*用例*。此外，用例图使用熟悉的简单线条来表示关系。请参见图 9-9 中的简单用例图。\n\
  \n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig9_HTML.jpg](img/507458_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\n一个描述书籍编写过程中章节审阅的 UML 用例图\n\n你会在图 9-9 中看到两个参与者，由可爱的小人图标表示。通常最好保持参与者的类别属性，例如将作者命名为*作者*而不是*约翰*或*梅洛迪·伍利索克斯*。在\
  \ UML 中，发起交互的参与者称为*主要参与者*。*次要参与者*则用于响应主要参与者的操作。\n\n*系统*的第二个元素在 UML 中用一个简单的矩形表示；在图\
  \ 9-9 中，它被称为*章节审阅*。在系统内部，我们有内部的*用例*，用椭圆形表示。这些代表了完成特定用例所需的不同阶段。最后，我们有熟悉的普通线条来表示参与者和用例之间的不同关联。\n\
  \n现在，图 9-9 中的图表描述了以下事件序列：\n\n*   **作者**，主要参与者，撰写章节。\n*   完成的章节由**作者**和**章节审阅者**（次要参与者）共同阅读。这由两个参与者之间的共享关联表示。\n\
  *   章节审阅者提出对章节的修改建议。\n*   最后，作者将修改提交到章节中，结束该场景。\n\n## 更多关于用例的内容\n\n现在来看一个稍微复杂的用例，以介绍两个新元素：*扩展*和*包含*关系（见图\
  \ 9-10）。与 UML 类图一样，我们也可以将这些有用的注释元素融入 UML 用例图中。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig10_HTML.jpg](img/507458_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n一个描述电子邮件服务基本功能的 UML 用例图\n\n图 9-10 描述了一个简单的电子邮件用例场景。我们有*账户所有者*（即人类用户）作为主要参与者，*电子邮件服务器*作为次要参与者。图\
  \ 9-10 包含以下事件序列：\n\n*   **账户所有者**使用密码登录。如果输入错误代码，则会触发一个名为*密码错误*的可选用例；此结果用箭头和关键字\
  \ *<<extends>>* 表示。\n*   账户所有者可能还想阅读一些帮助文件。这也是一个可选场景，因此使用关键字 <<extends>> 表示。\n*\
  \   *登录*用例的成功结果会自动导致另一个名为*验证密码*的用例，如关键字 *<<includes>>* 所示。次要参与者*电子邮件服务器*参与密码验证过程，因此在图\
  \ 9-9 中，该参与者与验证密码用例之间存在一条关联线。\n*   *验证密码*用例又引出三个用例：*查看电子邮件*、*删除电子邮件*和*发送电子邮件*。自然，次要参与者*电子邮件服务器*也参与所有这些操作，尽管只是被动角色；账户所有者根据自己的意愿发起这三个操作。\n\
  \n    在描述用例中的关系时，请注意箭头的方向。\n\n## UML 工具\n\n除了纸笔之外，如果你想在电脑上尝试绘制 UML，有很多优秀的免费选择。现在我们来回顾一些最好的工具示例。\n\
  \n## UMLet 团队开发的 UMLet 和 UMLetino\n\n*UMLet* 是一款免费且出色的开源工具，凭借其直观的拖放用户界面，你可以快速绘制出漂亮的类图。关联线可以很好地吸附到类边缘并保持在那里，使组织图表变得轻而易举。\n\
  \nUMLet 为类图、用例图、时序图等提供了现成的视觉元素选择。该程序可以导出为多种常见的图像文件格式，包括 PNG、GIF 和 SVG。对于需要一款简洁干净的\
  \ UML 设计工具的人来说，UMLet 是绝对必备的。本书中的所有图表均使用 UMLet 创建。\n\nUMLet 的一个有趣特性是其半自动图表创建功能。通过导航到\
  \ *文件* ➤ *从文件或目录生成类元素*，你可以设置 UML 图表的初始阶段。不幸的是，使用此功能时，UMLet 在创建关联方面存在一些问题。\n\nUMLetino\
  \ 是同一软件的基于浏览器的版本。它具备其离线版本的大部分功能。此外，UMLetino 集成了 Dropbox，用于导入和导出图表文件。不过，该软件仅支持输出\
  \ PNG 图像文件。\n\n*   从 [`www.umlet.com`](http://www.umlet.com) 下载适用于任何支持 Java 的操作系统的\
  \ **UMLet**\n*   在任何支持 Java 的浏览器中运行 **UMLetino**，网址为 [`www.umletino.com/umletino.html`](http://www.umletino.com/umletino.html)\n\
  \n## Diagrams.net 团队开发的 Diagrams.net\n\n*Diagrams.net* 由一支专注的团队积极维护，是一款多功能开源工具，提供浏览器版和桌面版。桌面版无需用户注册。Diagrams.net\
  \ 既适用于基本的 UML 工作，也适用于高级用户，具有图层和“插件”等附加功能。\n\n该软件原名“draw.io”，在导出 UML 图表时提供强大的文件格式支持，包括\
  \ Adobe PDF。不仅如此，通过选择 *文件* ➤ *导出为* ➤ *高级*，你还可以设置 DPI（每英寸点数）和边框宽度等属性。\n\n*   从 [`https://github.com/jgraph/drawio-desktop/releases`](https://github.com/jgraph/drawio-desktop/releases)\
  \ 下载 **Diagrams.net** 桌面应用\n*   在浏览器中运行 **Diagrams.net**，网址为 [`https://app.diagrams.net`](https://app.diagrams.net)\n\
  \n## Paul Hensgen 和 Umbrello UML Modeler 作者开发的 Umbrello\n\n*Umbrello* 自 2001 年开始开发，是适用于任何类型\
  \ UML 工作的优秀工具。该软件具有直观的用户界面，并且可以选择从 UML 生成代码。Umbrello 可以将你的图表导出为（通常可用的）Java、C#、Python\
  \ 和许多其他编程语言；只需导航到 *代码* ➤ *代码生成向导*，设置选项，然后点击 *下一步*。该软件还提供出色的格式化功能，包括在正在处理的图表中使用你操作系统中的所有字体。\n\
  \n不要被花哨的默认配色方案所迷惑——Umbrello 是一款对多种图表工作都非常有用的应用程序。\n\n*   从 [`https://umbrello.kde.org`](https://umbrello.kde.org)\
  \ 下载 **Umbrello** 桌面应用\n\n## 结语\n\n完成本章后，你将掌握以下知识：\n\n*   UML 类图和用例图的基本元素\n*   如何将简单的\
  \ UML 图转换为 Java、C# 和 Python\n\n\n\n## 后记\n\n至此，我们已抵达本书的终点。那些曾经让你望而生畏的编程术语，如今已不再那么令人紧张。现在，变量、类和对象对你而言至少已是较为熟悉的概念。你已学会用\
  \ Java、C# 和 Python 编写简单的基于文本的应用程序。或许你甚至能在聚会上随口解释 Python 对缩进的严格要求。但你的程序员之旅远未结束。掌握了三种语言的编程基础模块后，你现在可以开始在该领域积累更多经验。一个充满问题解决的世界正等待着你。\n\
  \n编程有时会令人沮丧。但让一段恼人且无法运行的代码最终成功工作，会带来一种独特的满足感。无论你最终是否在专业环境中编写代码，编程在某个时刻都可能成为一种建设性的“瘾”。它也可以成为治疗失眠和/或无聊的绝佳良方。\n\
  \n要完成有意义的编程项目——无论是电子游戏还是雇主定义的原子化编程任务——都需要投入大量的意图和时间。但当你作为程序员成长时，没有一行代码是浪费的。即使是错误信息，也能教会你最宝贵的东西。\n\
  \n*艾达·洛夫莱斯*，*拜伦勋爵*与*拜伦夫人*的爱情结晶，被认为是世界上最早的程序员之一。她曾与当时多位杰出科学家共事，包括*查尔斯·巴贝奇*和*迈克尔·法拉第*，并最终编写出了被认为是世界上第一个计算机程序的作品。让我们用艾达的话来作结：\n\
  \n> *我能将宇宙四面八方的光线汇聚到一个巨大的焦点上。我的道路如此清晰而明确，想到它如此笔直，便令人愉悦。*\n> \n> ——艾达·洛夫莱斯（1815–1852）\n\
