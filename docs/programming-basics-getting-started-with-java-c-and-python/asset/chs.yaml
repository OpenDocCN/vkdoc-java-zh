  *100 1 2 3 4 5 6 7 8 9*。这是因为最后的 *Console.Write* 没有被明确告知要等待 *thread1* 完成其处理。


  ## C# 中的异步编程


  基本上，*异步编程* 是一门让程序由众多不会相互冲突（或与其他程序冲突）的任务组成的艺术。这种方法通常也让程序员看起来更轻松，因为它能产生相当清晰的代码布局。


  当前 C# 中异步处理的实现利用了一个名为 *ThreadPool* 的类。这个类采用了与 Thread 类（本章前面讨论过）不同的方法。首先，ThreadPool
  只创建优先级较低的后台线程；为线程分配优先级不是这个类的一部分。


  *设计模式* 是针对软件设计中特定上下文中反复出现的问题的一种可重用解决方案。


  现在，C# 中有三种主要的异步编程范式。截至 2021 年，微软仅推荐使用其中一种，即 TAP。


  *   **异步编程模型 (APM)**：APM 方法使用 *IAsyncResult* 接口及其 *BeginOperationName* 和 *EndOperationName*
  方法。微软不再推荐使用这种有些繁琐的设计模式。


  *   **基于事件的异步模式 (EAP)**：EAP 旨在提供异步软件范式的优势，同时从程序员的角度保持相对优雅。这种设计模式也被认为是一种过时的方法。


  *   **基于任务的异步模式 (TAP)**：TAP 是用于编写异步软件的最现代、最优雅的设计模式。与 APM 和 EAP 不同，TAP 使用单个方法来表示异步操作的启动和完成，并以
  *Task* 和 *Task<TResult>* 类为核心。


  有关使用 TAP 的异步模式示例，请参见清单 7-14。


  ```

  using System;

  using System.Threading;

  static async Task Main(string[] args) // 我们的小型异步主线程

  {

  await happyMethod(); // 等待 happyMethod 完成其工作

  Console.WriteLine("程序完成。");

  }

  public static async Task happyMethod() // 创建异步任务 happyMethod()

  {

  int fibo = await Fibonacci(); // 等待 Fibonacci 方法完成

  // 并将其结果赋值给整数 "fibo"

  DisplayFibonacci(fibo); // 调用我们最简单的方法

  }

  public static async Task Fibonacci()

  // 创建异步任务 Fibonacci()，它将返回一个整数

  {

  int x = 0, y = 1, z = 0; // 定义 for 循环中需要的变量

  // 为了清晰起见，此任务保持简单。在实际应用中

  // 你可以在此处与其他异步任务一起执行一些繁重的工作。

  await Task.Run(() =>

  {

  for (int i = 2; i < 5; i++) // 查找斐波那契数

  {

  z = x + y;

  x = y;

  y = z;

  }

  });

  return z; // 返回结果，即第五个斐波那契数

  }

  public static void DisplayFibonacci(int fibo) // 用于显示结果的方法

  {

  Console.WriteLine("第五个斐波那契数是 " + fibo);

  }

  清单 7-14

  使用 TAP 设计模式在 C# 中进行异步处理的演示

  ```


  现在，清单 7-14 被分成四个方法，其中只有一个本质上不是异步的（即 *DisplayFibonacci*）。前三个方法使用了 *async/await* 机制。通过在方法旁边使用定义
  *async*，我们将一个方法指定为异步方法。这允许我们随后使用 await 关键字，该关键字会将控制权交还给其调用方法。


  async/await 机制允许程序在后台处理可能很繁重的计算，这通常会导致更少的用户界面卡顿和/或更快的网络文件传输。


  在创建方法时，TAP 有一些特定的关键字。*Task* 用于表示不返回任何值的方法。在我们的清单中，你还会找到一个 *Task<int>* 的实例；这个表达式表示一个必须返回整数的方法。任务可以返回任何类型的变量。所有创建的异步任务都将被调度到由
  ThreadPool 类管理的线程上运行。


  命令 *await Task.Run* 使用 ThreadPool 类在其自己的线程中启动一个任务。现在，基本上有三种方式来调用这种机制：


  ```

  1        await Task.Run(() => SomeMethod );

  2        await Task.Run(() => SomeOtherMethod(something) );

  3        await Task.Run(() => {

  Console.WriteLine("让我们在这里做点什么");

  return 0;

  });

  ```


  第一种方法接受先前声明的无参数方法；你只需传递方法的名称。第二种方法适用于带参数的方法。我们也可以使用*基于块*的语法，如第三种机制所示。与往常一样，必须注意正确使用括号、花括号和其他特殊字符。你可能已经注意到，清单
  7-7 为其 *await Task.Run( )* 使用了基于块的方法。


  在*斐波那契数列*中，每个数字代表它前面两个数字之和，例如，0, 1, 1, 2, 3, 5, 8。这个概念由意大利数学家*莱昂纳多·波那契（生于 1170 年，卒于约
  1250 年）*在其开创性著作*《计算之书》*中提出。在他生命中的某个时刻，波那契被赋予了斐波那契这个绰号。


