- '# 3. 搭建你的编程环境


  本章旨在向你介绍*集成开发环境*的乐趣。虽然在线编程环境对于你最初的几个程序清单来说还不错，但在你自己的计算机上拥有一些专用的编码软件会让你受益匪浅。幸运的是，有大量免费的
  IDE 可供你下载使用。我们将介绍适用于 2021 年最流行的三个操作系统的各种软件。但首先，我们将讨论另一个基本概念：*计算架构*。


  ## 关于计算架构


  一个*时钟周期*代表 CPU 内执行的一个单一操作。在每个时钟周期内，CPU 执行基本的内部操作，这些操作构成了计算机生态系统中任何更大任务的一部分。现在，*时钟速度*指的是
  CPU 每秒能够完成的时钟周期数，通常以*千兆赫（GHz）* 为单位表示。例如，一个 2.1 GHz 的 CPU 每秒提供 21 亿个时钟周期。CPU 每秒提供的时钟周期越多，系统处理数字的速度就越快。


  现在，术语*计算架构*用于描述 CPU 每个时钟周期可以处理多少数据。当前市场上主要有两种计算架构：32 位和 64 位。后者正迅速成为大多数计算领域的实际标准。为
  64 位架构编写的软件能更好地利用系统资源（如 RAM），同时通常比其 32 位版本执行速度更快。


  架构的实现涉及硬件和软件两个方面。只有 64 位 CPU 才能运行 64 位操作系统，同时仍能兼容较旧的 32 位软件（和操作系统）。然而，64 位操作系统通常甚至无法安装在配备
  32 位 CPU 的计算机上。


  自 21 世纪初以来，支持 64 位计算的 CPU 变得越来越流行。除非你使用的是非常古老的 PC，否则至少在硬件方面，你很可能已经为 64 位计算做好了准备。有关这两种架构的概要信息，请参见表
  3-1。


  大型企业正在逐步完全放弃 32 位技术。事实上，从 *macOS Catalina (10.15)* 开始，苹果公司就完全放弃了对 32 位软件的支持。微软也正在告别
  32 位世界。自 2020 年 5 月起，任何预装好的计算机将只搭载 64 位版本的 *Windows 10*。在这三大操作系统中，只有部分 *Linux* 发行版仍在广泛支持
  32 位硬件。


  表 3-1


  32 位与 64 位计算架构对比


  |   | 32 位架构 | 64 位架构 |

  | --- | --- | --- |

  | 特性 | 仅运行 32 位版本的操作系统，可运行大多数旧版 16 位软件 | 可运行 32 位和 64 位操作系统，通常不支持 16 位软件 |

  | 每台系统的理论最大 RAM | 4 GB 或 4,294,967,296 字节 | 171 亿 GB 或 18,446,744,073,709,551,616
  字节 |

  | 系统中典型的 RAM 容量 | 1 到 4 GB 之间 | 8 到 32 GB 之间 |


  就本书而言，你不需要运行任何 64 位软件；32 位操作系统完全没问题。但是，为了使你的设备在未来保持适用性，你应该考虑尽快迁移到 64 位操作系统。




  ## 位衍生单位详解


  你可能已经知道，计算中最小的单位是比特（bit）。与其他量一样，仅用原子单位来衡量事物是不切实际的。因此，我们有了字节、兆字节和吉字节等，这里仅举三例（见表 3-2）。


  公制单位（即使用十的幂次作为乘数的单位）在个人计算的早期阶段运行良好。然而，使用这些乘数并不完全准确。例如，一个 1 千字节的文件实际上是 1024 字节，而不是公制系统中的
  1000（10³）字节。


  一个标称容量为 250 GB（即 250,000,000,000 字节）的典型硬盘，其实际大小是 232.8 GB。硬件制造商通常不会提及这些细节。你大概心里有数。


  1998 年，*国际电工委员会（IEC）* 创建了一种更精确的度量方案。新系统使用二的幂次乘数。例如，1 千字节变成了大小为 1024 字节的 *kibibyte*（2¹⁰
  = 1024）。这些新单位非常必要，因为它们在测量更大的数据池时更加精确。


  表 3-2


  最常用的公制和基于 IEC 的数据存储单位对比


  | 公制单位 | 值（公制） | IEC 单位 | 值（IEC） |

  | --- | --- | --- | --- |

  | 比特 (b) | 0 或 1（原子/最小单位） |   |   |

  | 字节 (B) | 8 比特 |   |   |

  | 千字节 (kB) | 1,000 字节 | Kibibyte (KiB) | 1024 字节 |

  | 兆字节 (MB) | 1,000,000 字节 | Mebibyte (MiB) | 1,048,576 字节（1024 kibibytes） |

  | 吉字节 (GB) | 1,000,000,000 字节（十亿字节） | Gibibyte (GiB) | 1,073,741,824 字节（1024 mebibytes）
  |

  | 太字节 (TB) | 1,000,000,000,000 字节（一万亿字节） | Tebibyte (TiB) | 1,099,511,627,776 字节（1024
  gibibytes） |


  ## 64 位下的多任务处理


  64 位计算的主要优势之一，是与较旧的 32 位架构相比，*多任务处理*能力得到了极大提升。多任务处理指的是同时运行多个程序。一个典型的程序员可能会在电脑上同时打开一个大型
  IDE、*Photoshop*、*Spotify* 以及 *Firefox* 中的 50 个标签页。安装大量吉字节的 RAM 可以消除通常与运行多个程序场景相关的卡顿和速度下降。升级
  RAM 或许是提升个人电脑性能最常用的方法。


  ## 识别你的操作系统架构


  你可能想检查一下你的操作系统是 32 位还是 64 位架构。这既快捷又简单。


  *   在 Windows 10 中，转到 *设置* ➤ *系统* ➤ *关于*。你会在该页面上看到必要的详细信息。


  *   在 Linux 中，打开一个终端窗口，输入 *arch* 并按回车键，即可显示你的系统架构。输出显示 *x86_64* 表示你拥有 64 位版本的 Linux。对于
  32 位版本的此操作系统，则会显示 *i386* 或 *i686*。


  *   至于 *macOS*，自 2009 年的 *Snow Leopard (10.6)* 以来，该操作系统的每个版本都是 64 位的（对 32 位软件具有不同程度的向后兼容性）。


