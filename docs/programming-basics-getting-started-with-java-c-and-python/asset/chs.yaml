  \n为了回顾 C# 中线程的工作原理，请查看清单 8-6。在这个简短的清单中，三个线程被派去进行一场五米短跑。该程序演示了 C# 语言的以下特性：\n\n* \
  \  简单的线程化以及对共享数据/变量的基于线程的访问\n*   使用锁定对象和 `Interlocked.Decrement( )` 方法\n*   为变量（包括字符串数组）分配随机值\n\
  *   定义方法（例如 `MakeNames`）并从中检索数据\n\n```\nusing System;\nusing System.Threading;\n\
  public class ThreadRacer\n{\n// 定义一个空（即 null）字符串，用于保存比赛的获胜者\nstring winner = null;\n\
  // 定义一个整数，用于检查线程到达终点线的顺序\nint place = 3;\n// 创建一个对象 happylock，用于线程锁定\nstatic object\
  \ happylock = new object();\n// 定义 Racer，一个基于线程的方法\npublic void Racer()\n{\nint\
  \ distance = 5; // 设置比赛距离为 5\n// 将变量 \"handle\" 赋值为当前线程，以便我们读取\n// 线程属性，例如 Name\n\
  Thread handle = Thread.CurrentThread;\n// 当线程的距离大于零时循环\nwhile(distance > 0) {\n\
  Console.WriteLine(handle.Name+\" 距离终点还有 \" + distance + \" 米。\");\n// 使用 Interlocked.Decrement\
  \ 方法将赛手的距离减一\nInterlocked.Decrement(ref distance);\n}\n// 调用我们的锁定对象\nlock(happylock)\
  \ {\n// 如果 winner 变量仍为 \"null\"，则宣布当前线程\n// 为获胜者\nif(winner == null) Console.WriteLine(handle.Name\
  \ + \" 赢得了第 1 名！\");\n// 使用 Interlocked.Decrement 方法从变量 \"place\" 中减去 1\nInterlocked.Decrement(ref\
  \ place);\nwinner = handle.Name;\nif(place==1) Console.WriteLine(handle.Name + \"\
  \ 获得了第 2 名..\");\nif(place==0) Console.WriteLine(handle.Name + \" 获得了第 3 名..\");\n\
  }\n}\npublic static string MakeNames() {\n// 使用 C# Random 类创建新对象 random0\nvar random0\
  \ = new Random();\n// 创建两个字符串数组 first_names 和 last_names\nstring[] first_names =\
  \ { \"Peter\", \"Paul\", \"Patrick\", \"Patricia\", \"Priscilla\", \"Pauline\" };\n\
  string[] last_names = { \"Plonker\", \"Pillock\", \"Prat\", \"Pecker\" };\nint f_index\
  \ = random0.Next(first_names.Length);\nint l_index = random0.Next(last_names.Length);\n\
  // 将名称作为字符串返回：\nreturn (first_names[f_index] + \" \" + last_names[l_index]);\n}\n\
  public static void Main() // Main 函数\n{\nThreadRacer racer = new ThreadRacer();\n\
  Thread thread1 = new Thread(new ThreadStart(racer.Racer));\nThread thread2 = new\
  \ Thread(new ThreadStart(racer.Racer));\nThread thread3 = new Thread(new ThreadStart(racer.Racer));\n\
  thread1.Name = \"[赛手 A] \" + MakeNames();\nthread2.Name = \"[赛手 B] \" + MakeNames();\n\
  thread3.Name = \"[赛手 C] \" + MakeNames();\nConsole.WriteLine(\"欢迎来到线程赛车！\\n\");\n\
  thread1.Start(); // 启动线程\nthread2.Start();\nthread3.Start();\n}\n}\n清单 8-6\n一个演示\
  \ C# 线程的程序\n```\n\n在清单 8-6 中，我们创建了一个锁定对象 `happylock`，用于线程同步。我们还使用了一个新方法 `Interlocked.Decrement`，将“distance”和“place”变量精确地减一。为了在基于线程的项目中进行有效且安全的加法运算，C#\
  \ 还提供了一个名为 `Interlocked.Increment` 的方法（我们在线程赛车中不需要它）。在 C# 中处理基于线程的代码时，这两个方法通常可以替代标准的减法和加法运算符（例如\
  \ `--variable` 或 `++variable`）。\n\n现在，我们在清单 8-6 中自己编写了一个方法；这就是 `MakeNames`。此方法用于演示数组，更具体地说是字符串类型的数组。这些数组填充了名称，并作为单个字符串返回，供主函数使用。\n\
  \n线程赛车中的 `f_index` 和 `l_index` 变量用于存储字符串数组 `first_names` 和 `last_names` 的所需索引位置。这些索引位置又通过在这些数组的长度上应用\
  \ `Next` 方法（一个随机化器）来创建。然后通过调用恰如其名的 `Length` 方法来推导出这些长度。\n\n以下是清单 8-6 中的一行代码：\n\n\
  ```\nint f_index = random0.Next(first_names.Length);\n```\n\n这行代码的意思是：“让整数 `f_index`\
  \ 等于一个**随机数**，其最大值为 `first_names` 数组的**长度**。”读起来朗朗上口。\n\n我们可以将方法的输出直接放入变量中。以清单 8-6\
  \ 中的这行为例：`thread1.Name = “[赛手 A] ” + MakeNames( );` 在这行代码中，我们使用一个简单的加号运算符，将字符串 `“[赛手\
  \ A]”` 与 `MakeNames` 输出的任何内容组合在一起。\n\n线程赛车的线程调度也是由操作系统执行的。这意味着过一段时间后，你可能会得到相同的结果。\n\
  \n\n\n## C# 趣味问答\n\n接下来，清单 8-7 为您呈现一个基于控制台的趣味问答程序。它展示了这门优秀语言的以下特性：\n\n*   基本文件操作和线程处理\n\
  *   字符串格式化\n*   程序流程、用户交互和循环\n*   变量和迭代\n\n趣味问答使用两个独立的文件：*questions.txt* 和 *answers.txt*。这两个文件都从上到下处理，问题文件中的每一行与答案文件中的对应行相匹配。这种方法使得只需编辑这两个文本文件，就能轻松添加新问题或修改现有问题。\n\
  \n用户需要在程序运行期间输入答案。一个线程对象在后台运行，独立于正在进行的问答，每四秒提醒用户“快点！”。每答对一题得十分。问答结束时，会向用户显示其得分以及正确答案的百分比。\n\
  \n```\nusing System;\nusing System.IO;\nusing System.Threading;\nclass JollyQuiz\n\
  {\npublic static void Main()\n{\n// 声明三个整数变量\nint counter=0, score=0, percentage=0;\n\
  // 声明一个布尔变量（取值：true 或 false）\nbool countdown=true;\nConsole.WriteLine(\"欢迎来到趣味问答程序！\\\
  n\");\n// 创建一个新的线程对象 timerthread1\nThread timerthread1 = new Thread(delegate() {\n\
  Thread.Sleep(6000); // 首先休眠 6 秒\nwhile(true) { // 在线程内部创建一个无限循环\nConsole.WriteLine(\"\
  快点！\");\nThread.Sleep(4000);\n// 如果主程序将 countdown 设置为 \"false\"，则结束线程处理\nif(!countdown)\
  \ break; // 这行代码的意思是：如果 countdown 不是 \"true\"，则退出循环\n}\n});\n// 打开问题和答案文件。这些文件应与您的项目文件位于同一目录\n\
  var q = File.ReadAllLines(\"questions.txt\");\nvar a = File.ReadAllLines(\"answers.txt\"\
  );\ntimerthread1.Start(); // 启动计时器线程\nforeach(string lines in q) // 遍历问题文件\n{\n\
  Console.WriteLine(\"{0}\\n 请输入回答：\", lines);\n// 将回答转换为全大写，以消除输入大小写问题\n// 例如，使 \"\
  Helsinki\" 与 \"HeLSiNKI\" 同样有效\nstring response = Console.ReadLine().ToUpper();\n\
  ++counter;\n// 将用户输入与正确答案进行比较\nif(response.Equals(a[counter-1])) {\nConsole.WriteLine(\"\
  {0} 是正确的！\", response); score+=10;\n// 使用 else if 判断用户是输入了错误答案还是直接按了回车\n} else if(response!=\"\
  \") Console.WriteLine(\"{0} 是错误的..\", response);\nelse Console.WriteLine(\"下次请输点东西！\"\
  );\n}\n// 问答结束后无需再提醒用户加快速度；\n// 因此我们接下来告诉 timerthread1 结束处理\ncountdown = false;\n\
  Console.Write(\"\\n 您的得分：{0}。\", score);\npercentage = score*100/(counter*10);\n\
  Console.WriteLine(\"在给出的 {1} 个问题中，您答对了/猜对了 {0}%。\", percentage, counter);\n// 得分低时显示激励信息\n\
  if(percentage = 90) Console.WriteLine(\"做得好！\");\n}\n}\n清单 8-7\n一个用 C# 编写的问答程序，演示了基本文件操作和线程处理\n\
  ```\n\n您会注意到清单 8-6 和 8-7 中有一个特殊的变量类型 *var*。这是 C# 中的*隐式变量定义*，简单来说就是允许编译器程序自行确定变量的类型。对于\
  \ C# 中的小型项目，这种方法通常效果很好。\n\n## Java 食谱书\n\n接下来，我们将通过一个名为 *美味的芬兰食谱* 的小程序回到 Java 的世界。这个相当直接的清单基本上展示了如何显示易于定制的文本文件。\n\
  \n```\nimport java.io.File;\nimport java.io.FileNotFoundException;\nimport java.util.Scanner;\n\
  public class FinnishRecipes {\n// 定义 LoadText，一个用于加载文本文件的方法\n// 它接受文件路径和文件名作为参数\n\
  static void LoadText(String path1, String section) {\ntry {\nFile fileobject1 =\
  \ new File(path1 + section);\n// 创建一个 Scanner 对象 reader1 用于用户输入\nScanner reader1\
  \ = new Scanner(fileobject1);\nwhile (reader1.hasNextLine()) {\nString output1 =\
  \ reader1.nextLine();\nSystem.out.println(output1);\n}\nreader1.close();\n} catch\
  \ (FileNotFoundException e) { // 如果需要，抛出异常/错误\nSystem.out.println(\"文件 \" + section\
  \ + \" 未找到！\");\n}\n}\nstatic void DisplayMenu() {\nSystem.out.println(\"美味的芬兰食谱\\\
  n 请输入选择：\");\nSystem.out.println(\"[1] 沙拉\");\nSystem.out.println(\"[2] 主菜\");\n\
  System.out.println(\"[3] 自定义食谱（自己制作）\");\nSystem.out.println(\"[4] 退出)\");\n}\n\
  // 定义 Main 方法\npublic static void main(String[] args) {\n// 显示主菜单\nDisplayMenu();\n\
  Scanner keyscanner1 = new Scanner(System.in);\nwhile(true) { // 创建一个无限 while 循环\n\
  String input1 = keyscanner1.nextLine();\n// \"C:\\\\\" 指的是最常见的 Windows 根驱动器路径\n\
  // 请根据您的文件位置修改此路径\nif(input1.equals(\"1\")) LoadText(\"\",\"salads.txt\");\nif(input1.equals(\"\
  2\")) LoadText(\"\",\"maincourses.txt\");\nif(input1.equals(\"3\")) LoadText(\"\"\
  ,\"custom.txt\");\nif(input1.equals(\"4\")) break;\n// 如果用户只输入了回车，则再次显示菜单\nif(input1.equals(\"\
  \")) DisplayMenu();\n} System.out.println(\"祝您愉快！\");\n}\n}\n清单 8-8\n一个用 Java 编写的程序，演示了文件访问\n\
  ```\n\n在清单 8-8 中，我们创建了一个方法 *LoadText*，它接受两个参数，即文件路径和文件名。然后它会加载指定的文本文件，并逐行在屏幕上显示其内容。我们还有另一个方法\
  \ *DisplayMenu*，它仅用于向用户显示可用选项。这两个方法都被定义为 *void*，这意味着它们不返回任何信息。\n\n清单 8-8 中有一个 try-catch\
  \ 块，如果找不到文件，它会发出警报，即抛出异常。一个无限 while 循环保持程序运行，直到用户在键盘上输入“4”，此时会执行 break 关键字。\n\n\
  ## Java 秒表\n\n以下程序充当一个简单的秒表。您输入一个秒数让它倒计时，然后它会通知您时间到了。这个程序代表了 Java 中线程的一个非常基本的实现，由一个主线程组成。\n\
  \n```\nimport java.util.Scanner;\npublic class Counter {\npublic static void main(String[]\
  \ args) {\nint counter1=0;\nScanner keyscanner1 = new Scanner(System.in);\n// 当\
  \ counter1 等于零时循环\nwhile(counter1  0) {\nSystem.out.println(\"剩余时间：\" + counter1\
  \ + \" 秒\");\ntry\n{ Thread.sleep(1000); }\ncatch(InterruptedException ex)\n{ Thread.currentThread().interrupt();\
  \ }\n--counter1;\n} // 第二个循环结束\nSystem.out.println(\"全部完成！\");\n}\n}\n清单 8-9\n一个\
  \ Java 秒表程序的清单\n```\n\n清单 8-9 有两个 while 循环。第一个循环用于接收用户输入并确保其符合特定规则。主要是，输入只能由正数组成。如果输入了字母或其他非数字字符，程序会抛出一个异常，准确来说是\
  \ *NumberFormatException*。此外，第一个循环拒绝接受负数，并在必要时显示相关消息。\n\n在第二个循环中，我们使用了一行代码 *Thread.sleep(1000)*\
  \ 来实现所需的延迟时间。请注意，要在 Java 中使用 sleep 方法，您需要检查其异常。在清单 8-9 中，我们为此目的使用了经典的 try-catch\
  \ 块。\n\n\n\n## 结语\n\n完成本章后，你将重温 Python、C# 和 Java 在以下方面的知识：\n\n*   数据结构、程序流程和基本文件操作\n\
  *   基础线程技术\n*   使用 try-catch 块进行异常处理\n*   函数的定义与访问\n\n第 9 章的代码量会少很多，主要围绕一些精美的图表展开，即使用*统一建模语言\
  \ (UML)* 创建的图表。\n\n"
- "# 9. UML 类图\n\n本章将深入探讨统一建模语言的奇妙之处。UML 在软件设计中是一种相当普遍的工具——而且理应如此。本书此前仅触及了 UML 的皮毛，现在我们将更深入地探索\
  \ UML 在类建模方面所提供的更多可能性。\n\n## 可视化面向对象范式\n\n我们在第 4 章介绍了面向对象范式。本书中的大部分代码示例本质上都属于这种范式，包含类、对象和方法。可以将\
  \ UML 视为软件开发编码前阶段的一个宝贵工具。你可以用它来规划所有与 OOP 相关的机制，包括类以及类与其他类之间的关系。\n\n统一建模语言有两个标准，即\
  \ UML 1.x（最初于 1996 年发布）和 UML 2.x（于 2005 年首次发布）。这两个标准都包含多种类型的图表，几乎适用于任何建模目的。\n\n\
  ## UML 图表的分类\n\n本书不涉及 UML 图表类型的完整范围。然而，了解 UML 有哪些种类是很有用的。广义上讲，它通常分为两大类，然后这两大类又细分为许多子类。许多大型项目可能需要用到以下（非详尽）列表中的大部分图表；这些图表之间是互斥的。\n\
  \n*   **行为图**：与结构图不同，行为图侧重于描绘系统在运行时的状态。\n    1.  **用例图**：UML 中的参与者是指与系统交互的一方。用例图描述了（人类）参与者与特定系统之间的交互。用例关注系统提供的特定功能。例如，一个人从\
  \ ATM 取款是用例图的一个潜在场景。\n\n    2.  **序列图**：这些图表侧重于对象发送消息的时间顺序。因此，当需要精确建模对象之间的交互时，我们使用\
  \ UML 序列图。\n\n    3.  **状态图**：UML 中的状态指的是对象所持有的不同种类的信息，而不是其行为。状态图用于对系统状态的变化进行建模。\n\
  \n    4.  **活动图**：当我们需要可视化系统内的控制流时，就会使用这种类型的图表。基本上，活动图提供了系统在执行时如何工作的概念。\n\n*   **结构图**：这类图表用于对系统在静态时的性质进行建模。\n\
  \    1.  **类图**：这可能是 UML 中最常用的图表。本章我们将主要关注类图。你可能已经猜到，它们处理的是作为面向对象编程 (OOP) 范式基础的类方面。\n\
  \n    2.  **对象图**：显然与类图相关，对象图描述了类的实例。这类图表通常用于构建系统原型时。\n\n    3.  **组件图**：这些图表侧重于系统内软件组件的类型以及它们之间的连接。这些组件通常被称为物理资产，尽管从技术上讲，它们往往纯粹存在于数字层面。\n\
  \n    4.  **部署图**：用于可视化系统的完整布局，同时展示系统的物理部分和软件部分。部署图也可以称为系统组件拓扑图。\n\n## 回到 UML：类图\n\
  \n如前所述，UML 几乎可以用于对任何事物进行建模，而*类图*则帮助我们可视化面向对象的软件项目。让我们从一些简单的内容开始（见图 9-1）。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig1_HTML.jpg](img/507458_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n一个简单的 UML 类/对象图\n\n图 9-1 展示了 UML 中的类，包括它们的变量、方法以及类间关系；它还包含一个单一的 UML 对象图。\n\
  \n图 9-1 中的主类名为 Book。它有三个变量（即 title、publisher 和 publication year）。如你所见，我们还需要在类中指定变量的类型（例如\
  \ String）。UML 中属性或方法前的加号 (+) 表示公共访问修饰符。带有减号 (-) 的类成员表示私有访问修饰符。\n\n你可以像我们在图 9-1 中那样，直接在\
  \ UML 图中添加有用的注释；这些注释应采用右上角折角的矩形形式。\n\n现在，简单的线条标记了 UML 中类与其他实体之间的关联。图 9-1 中这些线条旁边的数字和星号展示了\
  \ UML 中的*多重性*。这个概念用于指示一个类可以提供或允许与之交互的实例（即对象）数量。\n\n继续看图 9-1 的对象部分，我们有一个主类的单一实例，名为\
  \ *exampleBook1*。在 UML 中，对象可以表示为带有尖角或圆角的方框；我们选择了后者以增加多样性。\n\n## UML 中的树状继承\n\n继承可以在\
  \ UML 中以简洁的方式表示。为此，我们可以使用*树状*方法（见图 9-2）。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig2_HTML.jpg](img/507458_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n使用树状方法演示 UML 中继承的图表\n\n图 9-2 中的图表展示了三个层次的特化。首先，你有一个通用的 Business 类。接着是三个特化类，即\
  \ Publisher、Bakery 和 Perfumerie。最后，我们拥有最特化的层次：两种不同类型的 Publisher 类，以及一个 Wedding Bakery\
  \ 类和一个 Luxury Perfumerie 类。\n\n在 OOP 术语中，基类也称为*父类*。子类通常被称为*子类*。\n\n图 9-2 中的 Business\
  \ 类被定义为*抽象*类；在 UML 中，斜体的类名表示这一点。这些类用于提供特定的方法供子类继承。抽象类不能直接实例化。相反，你需要使用其非抽象（即具体）子类之一来创建对象。\n\
  \n\n\n## Java 中的图 9-2\n\n如果用 Java 语言实现，图 9-2 会是什么样子？请查看代码清单 9-1 了解一种可能的解决方案。\n\n\
  在代码清单 9-1 中，*Business* 是基类。所有其他类都定义在其文件 Business.java 中，以避免产生多个源文件（例如 *Publisher.java*、*Bakery.java*\
  \ 等）。\n\n```\n// Define abstract base class\nabstract class Business {\n// Define\
  \ class attributes/variables\npublic double turnover = 20000;\npublic String address\
  \ = \"none\";\n// Define method for displaying address attribute/variable\nvoid\
  \ DisplayAddress() {\nSystem.out.println(address);\n}\n// Create main method\npublic\
  \ static void main(String[] args)\n{\n// Uncommenting the next line will throw an\
  \ error\n// Business business1 = new Business();\n// Create new Bakery object, happybakery,\
  \ and display its address\nBakery happybakery = new Bakery();\nSystem.out.println(\"\
  A new bakery is opened at \" + happybakery.address);\n// Create new FictionPublisher\
  \ object, jolly_books, and display its turnover\nFictionPublisher jolly_books =\
  \ new FictionPublisher();\nSystem.out.println(\"Fiction publisher Jolly Books had\
  \ an unfortunate turnover of £\" + jolly_books.turnover + \" in 2020\");\n// Create\
  \ new NonFictionPublisher object, silly_books, set and display its turnover\nNonFictionPublisher\
  \ silly_books = new NonFictionPublisher();\nSystem.out.println((\"Non-fiction publisher\
  \ Silly Books had a great turnover of £\" + (silly_books.turnover + \" in 2020\"\
  )));\n// Create new LuxuryPerfumerie object, exquisite_odors, set and display its\
  \ address\nLuxuryPerfumerie exquisite_odors = new LuxuryPerfumerie();\nexquisite_odors.address\
  \ = \"10 Wacky Avenue\";\nSystem.out.print(\"A wonderful luxury perfumerie is located\
  \ at \");\nexquisite_odors.DisplayAddress(); // Summon method inherited from Business\
  \ class\n}\n}\n// Define the rest of the classes\nclass Bakery extends Business\
  \ { String address = \"2 Happy Street\"; }\nclass WeddingBakery extends Bakery {\
  \ }\nclass Perfumerie extends Business { }\nclass LuxuryPerfumerie extends Perfumerie\
  \ { }\nclass Publisher extends Business { }\nclass FictionPublisher extends Publisher\
  \ { double turnover = 4.55; }\nclass NonFictionPublisher extends Publisher { /*\
  \ turnover is inherited from Business class */ }\nListing 9-1\nA Java implementation\
  \ of Figure 9-2 demonstrating inheritance (filename Business.java)\n```\n\n## C#\
  \ 中的图 9-2\n\n接下来，让我们观察一下图 9-2 在 C# 中的实现。正如你可能从本书前几章中记得的那样，Java 和 C# 是相当相似的语言。\n\n\
  ```\nusing System;\nabstract class Business {\n//  Define class attributes/variables\n\
  public double turnover = 20000;\npublic string address = \"none\";\n// Define method\
