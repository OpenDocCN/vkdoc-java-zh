  \n## Java 字母汤：JDK、JVM 和 JRE\n\n在继续学习面向对象编程之前，让我们先了解一下 Java 开发中三个最关键的软件组件。毫无疑问，在你的编程之旅中，你会相当频繁地遇到这些术语。首先，有\
