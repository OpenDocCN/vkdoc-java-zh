  一个 C# 清单，演示了 FileInfo 类中的一些文件操作

  ```


  让我们详细分析清单 7-8。首先，我们定义了两个字符串：*filename1* 和 *file2*。这些字符串包含完整的文件路径，指向 Windows 根目录
  C: 中的两个文件。我们也可以省略路径，只使用文件名（即 *wackyfile.txt* 和 *wacky_copy.txt*）。


  接下来，我们使用 FileInfo 类创建一个对象，并将其命名为 *ourfile*。然后为文件副本创建另一个对象 *ourfile_copy*。我们需要实例化
  FileInfo，以便稍后使用该类的方法。


  字符串值前的 at 符号（即 @）在 C# 中表示原义字符串。这意味着后续的字符串将不会解析任何转义序列，例如反斜杠的 `"\\"`。比较以下几行（上面一行是原义字符串）：


  `string file1 = @"c:\user\xerxes\documents\text\nincompoop.txt";`


  `string file1 = "c:\\user\\xerxes\\documents\\text\\nincompoop.txt";`


  *if(!ourfile**.**Exists)* 这一行用于检查对象 ourfile 的 Exists 属性，该属性顾名思义。前面加了一个感叹号，条件子句的含义是“如果
  ourfile 不存在”。继续往下，*File.Create(filename1).Dispose();* 这一行包含两条指令。首先，Create 方法用于在你的存储系统上实际创建一个文件。Dispose
  方法则用于释放文件的访问状态。如果没有它，稍后在程序中操作此文件时可能会遇到问题。


  现在，回到我们的条件子句。它以关键字 *else* 结尾，含义是“如果 ourfile 存在”，在这种情况下，它会输出消息“File found.”。接下来，我们尝试复制对象
  *ourfile*。是时候使用另一个条件子句了。*if(!ourfile_copy**.**Exists) { ourfile**.**CopyTo(file2);*
  这一行再次用于检查文件是否存在，这次关注的是我们之前定义的另一个文件 *ourfile_copy*。如果它不存在，我们就调用 CopyTo 方法将 ourfile（即
  *wackyfile.txt*）复制到 file2（即 *wacky_copy.txt*）。在条件子句的末尾，我们再次有一个可选的 else 关键字。这次它用于显示消息“File
  not copied. Duplicate already found.”。


  现在我们进入一些用户交互环节。提示用户按“y”（然后按回车键），如果他们希望删除原始文件及其副本。这是通过 Delete 方法实现的。如果用户输入“y”以外的任何字符，文件将保持不变，并显示消息“Files
  in C:\ not deleted.”。




  ## File 与 FileInfo：有何区别？


  C# 中的 File 和 FileInfo 类非常相似。然而，它们在语言中作为独立实体存在是有原因的。当需要对文件执行多个操作时，FileInfo 类是更优选择，而
  File 类则最适合单个操作。FileInfo 还通过其字节级的文件操作提供了更多的手动控制。


  File 类中的方法是静态的，而 FileInfo 类中的方法则是基于实例的。静态方法需要更多参数，例如完整的目录路径。相应地，在特定场景下（例如为基于网络的环境编码时），略显繁琐的
  File 类反而可能产生更有效的结果（见表 7-4）。


  表 7-4


  C# 中 File 和 FileInfo 类的主要区别


  | File | FileInfo |

  | --- | --- |

  | 使用静态方法 | 使用基于实例的方法 |

  | 无需实例化 | 需要实例化 |

  | 提供更多方法 | 提供较少方法 |

  | 在某些场景下（例如网络流量）可能提供更快的性能 | 对文件读写操作有更精细的控制 |


  要观察 FileInfo 提供的一些手动控制，请参见代码清单 7-9。


  ```

  using System;

  using System.IO;

  // 创建一个新的 FileInfo 对象 "fileobj1"

  FileInfo fileobj1 = new FileInfo(@"c:\apress.txt"); // 此文本文件应包含一些内容

  // 打开文件进行读取：此行仅适用于 FileInfo，不适用于 File

  FileStream filestream1 = fileobj1.Open(FileMode.Open, FileAccess.Read);

  // 创建一个与文件流长度相同的字节数组

  byte[] bytearray1 = new byte[filestream1.Length];

  // 设置字节计数器的变量，并将文件长度赋给它

  int howmanybytes = (int)bytearray1.Length;

  int bytesread = 0;

  // 使用 while 循环逐字节读取文件

  while (howmanybytes > 0)

  {

  int i = filestream1.Read(bytearray1, bytesread, howmanybytes);

  if (i == 0) break; // 当剩余字节为零时，跳出循环

  howmanybytes-=i;

  bytesread+=i;

  }

