  trans: '

    ## C# 程序集与访问修饰符


    在探讨 C# 访问修饰符略有不同的面貌之前，我们先回顾一个重要的相关概念。C# 中的*程序集*指的是项目的输出，例如在 Windows 环境中通常以 *.exe*
    为文件扩展名的用户可执行文件（例如 *happyprogram.exe*）。它是该语言中最小的部署单元。程序集通常包含程序使用的其他资源，包括图像数据。它们还承载着项目的元数据，例如版本信息，以及可能列出执行程序所需的其他程序集；较大的项目可能由多个程序集组成。


    现在，我们来回顾一下 C# 的六种访问修饰符。目前它们看起来可能非常相似，但当你读完本书时，你将熟悉它们全部，并理解它们各自为何都是必需的（见表 4-3）。


    表 4-3


    C# 的六种访问修饰符


    | 访问修饰符 | 可访问性 |

    | --- | --- |

    | *Public* | 所有其他类均可访问 |

    | *Private* | 仅可在声明的类内部访问 |

    | *Protected* | 可在声明的类内部以及从该声明类派生的任何类内部访问 |

    | *Internal* | 访问仅限于当前程序集内定义的类 |

    | *protected internal* | 访问仅限于当前程序集内定义的类 AND/OR 位于其他程序集中从它们派生的类 |

    | *private protected* | 可在声明的类内部以及从该声明类派生的任何类内部访问，但仅限于同一程序集内 |


    ## 使用 C# 访问类


    让我们回到编码。到目前为止，本章大部分内容都使用了 Java。接下来，我们为 C# 创建一个原始的面向对象编程清单，以展示其对访问修饰符的处理方式（见清单
    4-7）。


    ```

    using System;

    class Protected_Class {

    // 定义一个受保护的字符串变量 fruit

    protected String fruit;

    public Protected_Class()

    { fruit = "Noni fruit"; }

    }

    // 使用冒号运算符创建一个新的派生类

    class Derived_Class : Protected_Class {

    // 这个来自 Derived_Class 的方法可以访问 Protected_Class

    public String getFruit()

    { return fruit; }

    }

    class Program {

    // 主执行从这里开始

    public static void Main(string[] args)

    {

    // 创建两个对象，每个类一个

    Protected_Class Object1 = new Protected_Class();

    Derived_Class Object2 = new Derived_Class();

    // 使用派生类的方法显示我们的字符串变量

    Console.WriteLine("你最喜欢的水果是: {0}", Object2.getFruit());

    }

    }

    清单 4-7

    一个演示继承和访问修饰符使用的 C# 清单

    ```


    清单 4-7 首先创建了一个我们称之为 *Protected_Class* 的类，以便清晰明了。这个类包含一个构造函数，用于设置一个受保护的变量 *fruit*。接着创建了第二个类
    *Derived_Class*，并使用冒号 (:) 运算符使其继承第一个类的属性。Derived_Class 现在可以访问 Protected_Class
    中的数据，甚至是其受保护的变量。这可以通过使用 get 方法来实现，因此我们专门为这个类创建一个方法，并称之为 *getFruit( )*。


    接下来，我们进入清单 4-7 的 main 方法。在这里，我们创建了两个对象，分别来自我们之前定义的每个类。注意，C# 中创建对象的语法与 Java 使用的语法完全相同。


    我们 main 方法中的最后一行显示一条包含字符串变量内容的消息；这被称为*格式化字符串*。在 C# 中，变量使用花括号显示在文本中（C 系语言通常非常喜欢它们）。元素
    *{0}* 指的是我们将在消息旁边显示的第一个（在此例中也是唯一的）变量。如果我们有第二个变量要在字符串中打印出来，我们会使用 *{1}*，以此类推。


    ## 再次使用 UML


    为了让你进一步准备好迎接统一建模语言的奇妙之处，让我们把清单 4-7 转换成 UML，好吗？实际上，这种语言不仅仅是类图；使用 UML，我们还可以可视化对象。在图
    4-2 中，我们同时展示了清单 4-7 的类图（左侧）和对象图。


    ![../images/507458_1_En_4_Chapter/507458_1_En_4_Fig2_HTML.jpg](img/507458_1_En_4_Fig2_HTML.jpg)


    图 4-2


    清单 4-7 的 UML 类图（左）和对象图


    关于相当直观的图 4-2，有几点你应该注意。首先，类的受保护成员在其前面用井号 (#) 符号表示。在我们的示例中，这指的是字符串变量 *fruit*。此外，UML
    中的对象图使用特定的格式。头部包含对象名称、一个两边有空格的冒号运算符 (:)，最后是实例化该对象的类名。另外，头部完全带有下划线。在 UML 中，对象图的变量需要显示其内容；因此，我们在图中看到了美味的“Noni
    fruit”，因为这是类的构造函数所指定的内容。


    UML 类图整体上表示一个系统，而对象图则表示系统在特定时间点的详细状态。可以将前者视为蓝图，将后者视为系统运行时的快照。


    ## 受保护访问：Java 与 C# 对比


    尽管 Java 和 C# 在语法和逻辑方法上非常接近，但仍存在一些微妙的差异，这些差异起初可能会令人困惑。例如，访问修饰符 *protected* 在这两种语言中的处理方式就不同。


    在 Java 中，*protected* 等同于 C# 中的 *protected internal*，即它只能由声明类或派生类，或者同一*包*（Java
    中）或*程序集*（C# 中）中的类访问。


    正如你可能从表 4-3 中记得的那样，C# 中真正的 *protected* 修饰符只能从声明类内部以及从原始类派生的任何类内部访问。

