- fmt: '# Implementing Multithreading in Python


    Multithreading in Python goes hand in hand with the global interpreter lock (`GIL`)
    mechanism as discussed earlier in this chapter. This approach uses the principle
    of *mutual exclusion* (see Figure [6-1](#507458_1_En_6_Chapter.xhtml#Fig1)). Since
    the scheduling in Python''s multithreading is done by the operating system, some
    overhead (i.e., delay) is inevitable; this is something multiprocessing generally
    doesn''t suffer from.


    ![../images/507458_1_En_6_Chapter/507458_1_En_6_Fig1_HTML.jpg](images/507458_1_En_6_Chapter/507458_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** A partial visualization of multithreading in Python using three
    threads


    It''s time to get practical. Let''s examine how multithreading is implemented
    in Python (see Listing [6-11](#507458_1_En_6_Chapter.xhtml#PC12)).


    ```

    import threading

    def happy_multiply(num, num2):

    print("Multiply", num, "with", num2, "=", (num * num2))

    def happy_divide(num, num2):

    print("Divide", num, "with", num2, "=", (num / num2))

    if __name__ == "__main__":

    # Create two threads

    thread1 = threading.Thread(target=happy_multiply, args=(10,2))

    thread2 = threading.Thread(target=happy_divide, args=(10,2))

    # Start threads..

    thread1.start()

    thread1.join() # ..and make sure thread 1 is fully executed

    thread2.start() # before we start thread 2

    thread2.join()

    print("All done!")

    ```


    **Listing 6-11** A listing in Python demonstrating elementary use of the `threading`
    module


    We create two functions in Listing [6-11](#507458_1_En_6_Chapter.xhtml#PC12),
    namely, `happy_multiply` and `happy_divide`. These take two arguments each. With
    the former, we multiply `num` with `num2`, while the latter divides `num` by `num2`.
    The results are then simply printed on screen.


    Now, there''s one function in Listing [6-11](#507458_1_En_6_Chapter.xhtml#PC12)
    you should pay close attention to; Python''s `join()` method is there to make
    sure a thread has done its processing fully before moving on with a listing. If
    you were to remove the line `thread1.join()`, the output of Listing [6-4](#507458_1_En_6_Chapter.xhtml#PC5)
    would be a jumbled mess.


    A *race condition* in the context of concurrent processing refers to a scenario
    in which two or more processes are modifying a resource, such as a file, simultaneously.
    The end result depends on which process gets there first. This is considered an
    undesirable scenario.


    # Implementing Multiprocessing in Python


    ![../images/507458_1_En_6_Chapter/507458_1_En_6_Fig2_HTML.jpg](images/507458_1_En_6_Chapter/507458_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2** A partial visualization of multiprocessing in Python using three
    processes


    Although the approach of multiprocessing produces highly CPU-efficient code in
    general, minor issues of overhead may still occur. If a multiprocessing project
    in Python has these issues, they typically take place during the initialization
    or termination of a process (see Figure [6-2](#507458_1_En_6_Chapter.xhtml#Fig2)).


    Now, for a simple demonstration of Python''s `multiprocessing` module, see Listing
    [6-12](#507458_1_En_6_Chapter.xhtml#PC13).


    ```

    import time

    import multiprocessing

    def counter(): # Define a function, counter()

    name = multiprocessing.current_process().name

    print (name, "appears!")

    for i in range(3):

    time.sleep(1) # Delay for one second for dramatic effect

    print (name, i+1,"/ 3")

    if __name__ == ''__main__'': # Define this listing as "main", the one to execute

    counter1 = multiprocessing.Process(name=''Counter A'', target=counter)

    counter2 = multiprocessing.Process(name=''Counter B'', target=counter)

    counter3 = multiprocessing.Process(target=counter) # No name given..

    counter1.start()

    counter2.start()

    counter3.start() # This nameless counter simply outputs "Process-3"

    ```


    **Listing 6-12** A listing in Python demonstrating elementary use of the `multiprocessing`
    module


    Each process in Python has a name variable as is evident from Listing [6-12](#507458_1_En_6_Chapter.xhtml#PC13).
    If none is defined, a generic label of `Process-[process number]` will be automatically
    assigned.


    # Iterators, Generators, and Coroutines


    There are three important types of data-processing mechanisms in Python which
    sometimes get mixed up: *iterables*, *generators*, and *coroutines*. **Lists**
    (e.g., `happyList[0,1,2]`) are simple iterables. They can be read as often as
    needed without a hitch. All values within lists are kept until specifically marked
    for deletion. **Generators** are iterators that can be only accessed once as they
    do not store their contents in memory. Generators are created like common functions
    in Python except they have the keyword `yield` in place of `return`.


    Generators are useful when reading the attributes of large files, such as their
    row counts. Generators put to this use will yield the data that''s not up to date
    and thus not needed, avoiding memory errors and making Python programs run more
    efficiently.


    **Coroutines** are a unique type of function that can yield control over to a
    calling function without ending their context in the process; coroutines maintain
    their idle state smoothly in the background. In other words, they are used for
    cooperative multitasking.


    # Asyncio: The Odd One Out?


    `asyncio`, short for *asynchronous input/output*, is a module in Python designed
    for writing concurrently running code. Despite having similarities with both threading
    and multiprocessing, it actually represents a different approach, referred to
    as *cooperative multitasking*. The `asyncio` module offers a kind of pseudo-concurrency
    using a single process running in a single thread.


    And what does it mean to work with asynchronous code in Python? Well, code written
    with this approach can be safely paused in order for other code snippets within
    a project to execute their tasks. An asynchronous process offers its downtime
    for other processes to run their course; this is how a type of concurrency can
    indeed be attained with the `asyncio` module.'
