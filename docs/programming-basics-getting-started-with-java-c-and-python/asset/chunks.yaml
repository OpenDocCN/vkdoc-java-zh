    | start( ) | Executes a thread | new FruitThreads(“Banana”).start( );myClass CarFactory
    = new myClass( );CarFactory.start( ); |


    ## The Try-Catch Block


    To handle errors in Java, programmers can implement the *try-catch block* . Code
    inside the try block is monitored for errors, and should one occur, the program
    switches over to code inside the catch block. This approach is also referred to
    as *exception handling* . Take a look at Listing [5-2](#507458_1_En_5_Chapter.xhtml#PC2)
    to see the mechanic in action.


    ```

    public class TryCatchDemo {

    public static void main(String[ ] args) {

    int happyNumber = 20;

    try {

    // Divide twenty with zero (uh oh..)

    happyNumber /= 0;

    System.out.println(happyNumber);

    } catch (Exception e) {

    // Display our error message

    System.out.println("We have an error.");

    }

    }

    }

    Listing 5-2

    A simple demonstration of the try-catch block (i.e., exception handling) in Java

    ```


    ## Finally: More Fun with Try-Catch Blocks


    Yes, there’s even more enjoyment to be had with Java’s try-catch blocks. An optional
    block called *finally* is executed whether an exception comes up in the preceding
    try-catch or not; this is great for ensuring any specific critical actions are
    to be run after either event. See Listing [5-3](#507458_1_En_5_Chapter.xhtml#PC3)
    for a simple example of using the finally block in Java.


    ```

    public class TryCatchFinally

    {

    public static void main (String[] args)

    {

    // Begin a try-catch block

    try {

    // happyArray is allocated to hold five integers

    // (The count starts from zero in Java)

    int happyArray[] = new int[4];

    // Be naughty and assign the value of 14 into

    // a non-existent sixth element in happyArray

    happyArray[5] = 14;

    }

    catch(ArrayIndexOutOfBoundsException e) {

    System.out.println("We encountered a medium-sized issue with an array..");

    }

    // Implement a finally-block which is executed regardless of

    // what happened in the try-catch block

    finally {

    System.out.println("You are reading this in Alan Partridge''s voice!");

    }

    }

    }

    Listing 5-3

    A Java listing demonstrating a finally block during exception handling

    ```


    ## Throw: Your Custom Error Message


    To create exceptions/error messages of our own, we can use the throw statement
    in Java (see Listing [5-4](#507458_1_En_5_Chapter.xhtml#PC4)). Using throw, we
    get more detailed error messages pointing out the offending lines in the code.


    ```

    public class FruitChecker {

    // Create method for checking type of fruit

    static void checkFruit(String fruit) {

    // Display our custom error message if fruit does not equal "Lemon"

    if (!fruit.equals("Lemon")) {

    throw new RuntimeException("Only lemons are accepted.");

    }

    else {

    System.out.println("Lemon detected. Thank you!");

    }

    }

    public static void main(String[] args) {

    checkFruit("Lemon");

    checkFruit("Orange");

    }

    }

    Listing 5-4

    A Java listing demonstrating the use of the throw statement

    ```


    Exceptions in Java are basically signals that something has gone wrong during
    the execution of a program. There are numerous types of exceptions available for
    the programmer to implement.


    In Listing [5-4](#507458_1_En_5_Chapter.xhtml#PC4), the term *RuntimeException*
    refers to a general type of error; we chose to throw one out in case we don’t
    encounter a lemon. Since we run the checkFruit() method for both a “Lemon” and
    an “Orange,” we get both an exception-free message as well as one with an exception.
    See the output from Listing [5-4](#507458_1_En_5_Chapter.xhtml#PC4):


    Lemon detected. Thank you!


    Exception in thread “main” java.lang.RuntimeException: Only lemons are accepted.


    ```

    at FruitChecker.checkFruit(FruitChecker.java:8)

    at FruitChecker.main(FruitChecker.java:17)

    ```


    Let’s take a look at some other common exceptions available in Java next:


    *   **ArrayIndexOutOfBoundsException**: This exception is thrown when accessing
    an item of an array at an index which is not there (i.e., the index is outside
    of the allocated size of an array).


    *   **ArithmeticException**: Thrown when an arithmetic operation fails.


    *   **ClassNotFoundException**: As you might guess, this is thrown when trying
    to access a class that is nowhere to be found.


    *   **NumberFormatException**: Thrown when a method is unable to convert a string
    into a numeral.


    *   **NoSuchFieldException**: Thrown when addressing a variable that is missing
    from a class.


    *   **RuntimeException**: As seen in Listing [5-3](#507458_1_En_5_Chapter.xhtml#PC3),
    this exception is be used for any general error during program execution.


    ## Checked and Unchecked Exceptions


    There are basically two categories of exceptions in Java: *checked* and *unchecked*
    . The former is used when addressing errors found outside of the program’s grasp,
    for example, issues with file operations or network transfers. Unchecked exceptions,
    sometimes also called *runtime exceptions* , deal with problems within the programming
    logic such as invalid arguments and unsupported operations. See Table [5-3](#507458_1_En_5_Chapter.xhtml#Tab3)
    for a more detailed rundown on the differences between these two types of exceptions.


    Table 5-3


    The main differences between checked and unchecked exceptions in Java


    |   | Checked exceptions | Unchecked/runtime exceptions |

    | --- | --- | --- |

    | **Main area of effect** | External, outside of program | Internal, within program
    |

    | **Examples** | Issues with file access or network connectivity, problems with
    external databases | Flawed programmatic logic; errors with class definitions,
    arithmetic operations, or variable conversions |

    | **Detection** | During compilation of program | During program execution |

    | **Priority level** | Critical: cannot be ignored. Program will fail to execute
    | Severe: should not be ignoredProgram will run, but remains more or less unstable
    |


    We’ll go into even more detail with Java’s quite exceptional exception handling
    later in the book.'
