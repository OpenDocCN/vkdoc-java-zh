- fmt: '# First Adventures in Java


    Now, in Listing [2-3](#507458_1_En_2_Chapter.xhtml#PC3), we had a program in Python
    where the user was asked for a number. The program then showed a comment on screen
    based on this input. Let’s examine how Java deals with the same ordeal. It’s somewhat
    more complicated, but fear not. We’ll break it down afterward.


    ```

    import java.util.Scanner;

    public class HappyProgram {

    public static void main(String args[]) {

    Scanner input_a = new Scanner(System.in);

    System.out.print("Enter a number: ");

    int YourNumber = input_a.nextInt();

    if (YourNumber > 10) System.out.println("Your number is greater than ten") ;

    if (YourNumber <= 10) System.out.println("Your number is ten or smaller") ;

    }

    }

    Listing 2-4

    A simple listing in Java demonstrating user keyboard input

    ```


    Compared to Python, Java does require more setting up. Programs written in Java
    can be extended using so-called Java Packages; these are basically data containers
    which add new features and functions into your projects. The very first line in
    Listing [2-4](#507458_1_En_2_Chapter.xhtml#PC4) adds interactive functionality
    to any Java program and needs to be there when we require user input.


    Listing [2-4](#507458_1_En_2_Chapter.xhtml#PC4) simply incorporates a Java Package
    called `java.util` into the program. From this package, we retrieve the scanner
    function, which is then used to read keyboard input. We’ll go through some of
    the most commonly used Java Packages as we progress through the book.


    Let’s now break down the mechanics related to user input in Listing [2-4](#507458_1_En_2_Chapter.xhtml#PC4):


    ```

    Scanner input_a = new Scanner(System.in);

    ```


    What happens here is we create a scanner object called `input_a`. We could’ve
    called this object `happy_object` or `pink_tutu`. However, it’s best to stick
    to at least a somewhat logical naming scheme. Moving on, we encounter the following
    lines of code:


    ```

    System.out.print("Enter a number: ");

    int YourNumber = input_a.nextInt();

    ```


    In the preceding snippet, we display a message using Java’s standard print function.
    Notice how different it is from Python. Next, an integer variable (i.e., a whole
    number) called `YourNumber` is initialized. This is then sent to a function called
    `nextInt()`, which awaits user input, expecting a whole number. The aforementioned
    function is a part of the Java Package `java.util.Scanner` we imported on the
    first line of the listing.


    You may have noticed the ample use of the semicolon (`;`) in Listing [2-4](#507458_1_En_2_Chapter.xhtml#PC4).
    Java does indeed expect one after each instruction. Also, the Java syntax requires
    parentheses around variable comparisons and with most functions. All of these
    conventions apply in C#, too.


    ## Once More with C#


    Next we’ll glance at the same listing; only this time, it’s written in C# (see
    Listing [2-5](#507458_1_En_2_Chapter.xhtml#PC7)). You’ll find it somewhat similar
    to the one in Java, but there are a few key differences which will be discussed
    after.


    ```

    using System;

    public class HappyProgram

    {

    public static void Main()

    {

    Console.WriteLine("Enter a number: ");

    int YourNumber = Convert.ToInt16(Console.ReadLine());

    if (YourNumber > 10) Console.WriteLine("Your number is greater than ten");

    if (YourNumber <= 10) Console.WriteLine("Your number is ten or smaller");

    }

    }

    Listing 2-5

    A listing in C# demonstrating user keyboard input

    ```


    The first line in Listing [2-5](#507458_1_En_2_Chapter.xhtml#PC7) (i.e., `using
    System;`) activates a specific namespace. Namespaces in C# are container elements
    which help you organize your code. For one, they help you save time. Without the
    System namespace, instead of `Console.WriteLine`, we would be typing `System.Console.WriteLine`
    every time we printed things on screen. One can also declare their own custom
    namespaces which is something we’ll be doing later in the book. For now, it suffices
    that you’re aware of them.


    Most programming languages need specific declarative statements in the source
    code, which often need not be unique for each project. This is referred to as
    boilerplate code. For example, in Listing [2-4](#507458_1_En_2_Chapter.xhtml#PC4),
    the line `public static void main(String args[])` and, in Listing [2-5](#507458_1_En_2_Chapter.xhtml#PC7),
    `public static void Main()` may be classified as boilerplate code on the Java
    and C# sides of things, respectively. We’ll examine this concept more in later
    chapters.


    Now, compared to Java, C# uses a different lexicon for many of its functions.
    For printing text on screen, we have `Console.WriteLine`. For user input, we have
    `Console.ReadLine` as is demonstrated by the following line:


    ```

    int YourNumber = Convert.ToInt16(Console.ReadLine());

    ```


    What happens here is we initialize an integer variable, `YourNumber`, and pass
    that on to a conversion function `Convert`. We tell it to wait for user input
    and expect a signed 16-bit integer value. These are whole numbers with a range
    from -32,768 to 32,768. That’s ample room for what our user is most likely going
    to input.


    Unsigned 16-bit integers carry values between 0 and 65,536, meaning they can’t
    store negative values. If we need to store really large numbers, we could opt
    to using 32-bit integers, which also have their signed (-2,147,483,647 to 2,147,483,647)
    and unsigned (0 to 4,294,967,295) counterparts. For the purposes of this book,
    we’ll stick firmly to the smaller numbers.


    ## On Classes and Object-Oriented Programming


    You may have noticed the word class appears several times in our listings. This
    is a crucial concept in object-oriented programming (OOP), a popular programming
    paradigm. All of the three languages featured in the book incorporate OOP to varying
    degrees.


    Any real-world or abstract scenario can be elegantly expressed using OOP. The
    two fundamental building blocks in this approach are known as classes and objects.
    Simply put, a class defines a blueprint for objects. For example, you may be developing
    software about gardening and write a class called `Plant`. You could then summon
    individual instances, known as objects, using the `Plant` class to populate your
    virtual garden. The various individual flora you created this way would share
    characteristics and variables with each other as defined in their originating
    class. Changing parts of class `Plant` at a later date would affect all future
    objects belonging to the said class. You could also create subclasses of `Plant`
    to cater for all the various roses and tulips you plan to model (as well as a
    class for garden gnomes).


    OOP offers many benefits to software developers. Among these are the reusability
    of code and development security through class encapsulation. There are many fascinating
    facets to object-oriented programming. We’ll go much deeper into this paradigm
    later in the book.'
