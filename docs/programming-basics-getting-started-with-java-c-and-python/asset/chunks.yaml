- fmt: '## The Three Requirements of Becoming a Decent Programmer


    Let’s next discuss some personal priorities all programmers should have in order
    to advance in their craft, whatever their starting level might be:


    1. **Self-confidence**: Ask yourself this, why do you want to learn to code? Some
    perfectly valid answers include “For professional development,” “To maintain my
    faculties,” and “I want to be a part of something great.” Now, programming is
    sometimes considered a frightening activity by laypeople. It does take some guts
    to sit down, tune out, and enter the world of bit manipulation. Just remember
    that you, too, can achieve competence in this field, even if you’re a complete
    beginner. Confidence comes from experience. Line by line you will obtain more
    good vibes and gain independence from programming books and online tutorials.


    2. **The right language**: Not all of us benefit from becoming fluent in Esperanto
    or Classical Latin. When learning a new language, we tend to go for something
    useful, such as Spanish or French. Similarly, choosing a programming language
    which best suits your intentions is of paramount importance. If you want to eventually
    code recipe apps for mobile users, becoming proficient in, say, `FORTRAN` from
    1957 only gets you so far. For this reason, this book introduces three of the
    most popular programming languages of our times: `Java`, `C#`, and `Python`.


    3. **Patience**: After choosing which programming language you want to specialize
    in, you quite simply just have to stick to it. It takes anything between six months
    and a year of hands-on experience to become proficient in a new language. This
    is actually good news. Coding is great for insomnia and boredom. It may also ward
    off dementia, as it does fire those brain synapses to quite an extent.


    ## A Novice Programmer’s Glossary


    We’ll now delve into some essential terminology related to the hallowed hobby
    of coding. There are hundreds of terms and concepts related to the various programming
    techniques and languages available. However, we’ll only be focusing on the most
    relevant associated keywords, and in no particular order.


    ## Input/Output


    *Input* in the context of programming refers to us entering data for a piece of
    software running on a computer to process. This comes in the form of typed text,
    mouse commands, or various types of files. For example, a word processing program
    (e.g., Microsoft Office) most often takes its input mostly as alphanumerical data
    provided by keystrokes. *Output* refers to data that has been processed by software.
    In a word processor this usually refers to a file document saved with the program.
    Such output can also be directed at printers or other devices. The output from
    programmers (carbon dioxide and other things notwithstanding) is typically a working
    application, whether it’s a completed tutorial file or a bigger project.


    ## Algorithm


    A working program listing basically constitutes an *algorithm,* which refers to
    a set of steps created to solve problems. Most software consists of numerous sub-algorithms.
    In the case of, say, a video game, there are algorithms for displaying graphics,
    saving and loading the game state, and playing audio files to name just a few.


    ## Flowchart


    Programming projects and their algorithms are often visualized using *flowcharts*,
    especially in a team environment. These are a great way to demonstrate basic program
    flow in most instances.


    Flowcharts consist of only a few universal elements (see Figure [1-6](#507458_1_En_1_Chapter.xhtml#Fig6)).
    In their most fundamental form, they use four symbols. These are the *terminal*
    (rounded rectangle), the *process* (rectangle), the *decision* (diamond/rhombus),
    and the *flowline* (arrowhead). The terminal symbol is used to denote the beginning
    and the end of a program flow. Any operations and general data manipulation are
    represented by process rectangles.


    ![../images/507458_1_En_1_Chapter/507458_1_En_1_Fig6_HTML.jpg](images/507458_1_En_1_Chapter/507458_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    A very simple flowchart describing a program for April fools


    Flowcharts are interpreted from top to bottom and left to right in most cases.
    *The American National Standards Institute (ANSI)* created the standards for flowcharts
    and their symbols back in the 1960s. This set of symbols has been expanded on
    during the 1970s and 1980s by the *International Organization for Standardization
    (ISO).* For the purposes of this book, we’ll stick to the originals.


    ## Source Code


    This term refers to the collection of the more or less typed-in programming listings
    each software project is made of. As a programmer, you are a creator of *source
    code.* Simple programs come in the form of a single piece of source code, whereas
    complicated software, such as operating systems (e.g., Windows), potentially consists
    of tens of thousands of listings all constituting a single product.


    ## Syntax


    A *syntax* is a set of rules and principles that govern the structure of sentences
    in a given language, including in the context of programming. Different programming
    languages use different keywords for specific actions. Now, behold actual lines
    of programming which display a string of text in two programming languages:


    Table 1-1


    A demonstration of the syntactical differences between two programming languages


    | Java | FORTRAN |

    | --- | --- |

    | `System.out.print(“Hello! I like Cake!”);` | `1 print *, “Hello! I like Cake!”`
    |


    Java, like you may have gathered already, is one of the main languages featured
    in this book. The other programming language used in Table [1-1](#507458_1_En_1_Chapter.xhtml#Tab1)
    is called *FORTRAN.* Devised mainly for scientific computation, this language
    was created way back in the 1950s by IBM. A lot of industrial hardware runs on
    FORTRAN. Even some geeks still use it for the tech chic (and to a small extent,
    so did we).


    You may notice one of our examples in Table [1-1](#507458_1_En_1_Chapter.xhtml#Tab1)
    started with a number (1). This is known as a *line number* in coding parlance,
    and the practice has been pretty much abandoned a while ago. As a rule, current-generation
    programming languages don’t need line numbering.


    ## Routine


    A *routine* in the context of programming is a term for code which does a specific
    task and is intended to be summoned repeatedly at will by the coder. For example,
    a program may contain a simple routine for playing a sound effect. Instead of
    writing and rewriting the code each time said sound effect is needed, the programmer
    will trigger the same code (i.e., the routine) ad hoc.


    Depending on the context and the programming language in use, a routine is sometimes
    also referred to as *a sub-routine, a function, a procedure,* or a *method.* We’ll
    address the nomenclature in more detail later in this book.


    ## File Formats


    A *file format* is a method of encoding data. By 2021, you’ve encountered many
    a file format already in your daily life. Digital photographs, love letters typed
    in OpenOffice, and those sassy Excel spreadsheets all represent different file
    formats. An image file (e.g., `apress_is_great.jpg`) resting on one’s hard drive
    can only be used with software that deciphers it the way it was intended to, as
    an image. Similarly, opening `love-letter.doc` in a photo-editing suite would
    not provide you with optimal results, displaying gibberish at best. Most operating
    systems associate different available file formats with the right software, so
    you can safely double-click files and expect them to load up just fine.'
