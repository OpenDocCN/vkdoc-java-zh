    Listing 4-12

    A Python listing demonstrating attribute binding for classes

    ```


    Listing [4-12](#507458_1_En_4_Chapter.xhtml#PC12) starts out again by us defining
    an empty class. However, this time we bind attributes to this class and not only
    to its objects. As is evident from the listing’s output, any additions of data
    into a class do not override an object’s previous bindings.


    ## In Closing


    Finishing this chapter, you’ll have hopefully learned the following:


    *   The main differences between procedural and object-oriented programming (OOP)
    paradigms


    *   What abstraction, inheritance, and encapsulation refer to in the context of
    OOP


    *   How to define classes and create objects based on them in both Java and C#


    *   The differences between public and static methods in OOP as well as the basics
    of access modifiers


