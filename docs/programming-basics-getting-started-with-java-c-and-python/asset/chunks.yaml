- fmt: '# Software Vermin: Bugs


    Have you ever ended up with your computer jammed and/or your text document(s)
    lost? Chances are you encountered a *software bug* in action. Bugs in the context
    of software mean glitches caused by a faulty program code; they can come in the
    form of typos by the programmer(s) or more commonly from some arcane design error.
    All those software updates for your operating system are basically there to fix
    bugs (and on occasion offer new features). See Table [3-3](#507458_1_En_3_Chapter.xhtml#Tab3)
    for a rundown on the most common software bugs and issues.


    **Table 3-3** The most common categories of software issues/bugs


    | Software bug | Examples | Software issue | Examples |

    | --- | --- | --- | --- |

    | Syntactic | Incorrect use of language syntax, e.g., using wrong variable comparison
    operators | Interface | Lacking user interface functionality, e.g., missing navigation
    buttons or other critical elements |

    | Arithmetic | Division by zero, variable range overflow | Security | Weak authentication,
    unnecessary exposure of critical system components |

    | Logical | Poor program flow control, e.g., infinite or compromised loops | Communication
    | Lack of user documentation, poor labeling of user interface elements, unintuitive
    error prompts |

    | Resources | Use of uninitialized variables, exhausting system RAM by not freeing
    unneeded variable space | Teamwork neglect | Illogical labeling of code elements/variables,
    poor commenting |


    ## On Debugging and Testing


    *Debugging* is the art of discovering and fixing bugs found in software. A *debugger*
    provides software developers the tools to fix bugs as they happen and before they
    potentially wreak havoc on a user’s computer. This is another feature of a solid
    IDE and naturally belongs in every solution presented in this chapter.


    Debugging can range from simple error highlighting in the IDE editor to exhaustive
    data collection and analysis. A typical debugging component allows the programmer
    to examine the software being developed while it’s running, line by line if necessary.
    Code-written high-level programming languages, like Java and Python, are typically
    easier to debug. Lower-level languages, like procedural C, leave more control
    to the programmer; this can lead to issues like memory corruption more frequently.


    Heavy debugging is absolutely essential for larger software projects. For our
    needs, we needn’t go very deep into this topic. At this point, it suffices you
    are aware of what the term means.


    Debugging is related to the sometimes overlooked area of software development:
    *testing.* Although testing incorporates debugging, there’s much more to it. A
    testing team is responsible for reporting whether the software product functions
    correctly under its intended usage scenarios. However, not even a large-scale
    testing process is expected to find every single flaw in a software project.


    Software testing can be roughly split into *functional* and *nonfunctional* branches.
    The former focuses on comparing the functioning of software and its components
    against a set of specifications. Nonfunctional testing refers to issues related
    (but not limited) to performance, usability, and security. Localization, including
    development for non-Western markets, is also a part of nonfunctional software
    testing. Localization involves incorporating fluent and appropriate translated
    language with varying focus on cultural sensitivity.


    The details of the testing process depend on the type of target audience. Video
    game developers, especially when it comes to the smaller teams, sometimes skimp
    on testing (much to their detriment). Essential software, such as that found in
    banking and finance, is expected to undergo the strictest levels of testing. Larger
    software projects require a highly organized team of testers. Due to economic
    reasons, testing for large-scale software is often outsourced to businesses abroad.


    ## Debugging: Essential Approaches


    We shall now peek at some of the most common methods for debugging code in some
    detail:


    *   **Tracing/print debugging**: This method simply means paying close attention
    to the results of every executed line of code by printing them out on screen,
    one by one. Close attention can be paid to the contents of variables and other
    data structures as they’re altered during a program’s execution. Tracing is something
    that works great for smaller projects, such as the tutorials within this book.


    *   **Record and replay debugging**: With this approach, parts of a program’s
    execution are recorded and played back to examine its potential shortcomings.
    This doesn’t refer to the external or visual playback of software; rather it focuses
    on state-level proceedings within a program.


    *   **Post-mortem debugging**: This method consists of analyzing the post-crash
    log data on a program. Many types of software write log files on disk after serious
    malfunctions, including most operating systems. These files can then be examined
    for clues as to which bugs caused a crash.


    *   **Remote debugging**: Debugging doesn’t have to take place on the device which
    runs the program of focus. Using popular networking methods, such as Wi-Fi or
    USB cabling, devices in different roles and form factors can be connected to work
    together. Doing it remotely is the most common approach when writing and debugging
    software for Android and iOS, as the development machine is almost always a separate
    full-sized computer.


    *   **Bug clustering**: This is a useful approach whenever a particularly large
    amount of bugs are found. The programmer first identifies any and all common characteristics
    in the bugs. The issues are then classified into specific groups which share their
    attributes, the logic being that even if a few bugs within a cluster are solved,
    the rest should follow.


    *   **Code simplification**: Sometimes the best strategy for eliminating bugs
    is to (more or less temporarily) remove portions of the functional code around
    them. This obviously works best for bugs of the more clandestine/shy nature. When
    you are not yet sure of what doesn’t work (i.e., what’s causing a crash), remove
    the parts that obviously do, one by one, and lure the bug out.


    ## In Closing


    Finishing this chapter, you’ll have gained an understanding of the following:


    *   The main differences between 32-bit and 64-bit computing architectures and
    how to identify which variety your operating system is running on


    *   How the most common bit-derived data units are defined


    *   What an *integrated development environment (IDE)* refers to and how to get
    one for your operating system


    *   The core differences between *console applications* and applications utilizing
    a *graphical user interface (GUI)*


    *   The most common types of software bugs/issues


    *   What debugging and software testing refer to


    The next chapter is dedicated to the wonders of object-oriented programming (OOP)
    in detail. As touched on in Chapter [2](#507458_1_En_2_Chapter.xhtml), this is
    a very important paradigm every budding coder should be able to work with.


    # 4. Object-Oriented Programming (OOP)


    This chapter is all about object-oriented programming in detail. This monumental
    paradigm changed the world of programming and has since become somewhat of a de
    facto approach in software design. We’ll next go through many of the concepts
    crucial to the object-oriented paradigm. During this chapter, we’ll present concepts
    related to OOP mostly using the Java language for clarity, not completely forsaking
    C# and Python, of course.'
