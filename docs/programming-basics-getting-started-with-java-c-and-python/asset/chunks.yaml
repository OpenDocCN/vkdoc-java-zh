  trans: '

    ## 成为合格程序员的三个要求


    接下来，我们来讨论所有程序员为了精进技艺都应具备的一些个人优先事项，无论他们起点如何：


    1.  **自信**：问问自己，你为什么想学编程？一些完全合理的答案包括“为了职业发展”、“为了保持心智能力”以及“我想成为伟大事业的一部分”。如今，编程有时被外行人视为一项令人生畏的活动。静下心来，排除杂念，进入位操作的世界确实需要一些勇气。请记住，即使你是一个完全的初学者，你也能在这个领域获得能力。自信源于经验。一行一行地，你将获得更多积极的感觉，并逐渐摆脱对编程书籍和在线教程的依赖。


    2.  **正确的语言**：并非所有人都能从精通世界语或古典拉丁语中受益。学习一门新语言时，我们倾向于选择有用的，比如西班牙语或法语。同样，选择一门最适合你目标的编程语言至关重要。如果你最终想为移动用户编写食谱应用，那么精通
    1957 年的 FORTRAN 语言，其作用也相当有限。因此，本书将介绍我们这个时代最流行的三种编程语言：Java、C#和 Python。


    3.  **耐心**：在选择了你想专攻的编程语言之后，你只需要坚持下去。要精通一门新语言，通常需要六个月到一年的实践经验。这实际上是个好消息。编程对治疗失眠和无聊非常有效。它还可能预防痴呆症，因为它能在很大程度上激发大脑的突触活动。


    ## 新手程序员术语表


    现在，我们将深入探讨一些与编程这一神圣爱好相关的基本术语。与各种可用的编程技术和语言相关的术语和概念有成百上千个。然而，我们只会关注最相关的关键词，且不按特定顺序排列。


    ## 输入/输出


    在编程语境中，*输入*指的是我们输入数据供计算机上运行的软件进行处理。这些数据可以是键入的文本、鼠标命令或各种类型的文件。例如，一个文字处理程序（如 Microsoft
    Office）通常主要通过按键输入字母数字数据。*输出*指的是已被软件处理过的数据。在文字处理器中，这通常指用该程序保存的文档文件。此类输出也可以发送到打印机或其他设备。程序员的输出（二氧化碳等物质除外）通常是一个可运行的应用程序，无论它是一个已完成的教程文件还是一个更大的项目。


    ## 算法


    一个可运行的程序清单基本上构成了一个*算法*，它指的是一组为解决特定问题而创建的步骤。大多数软件都由众多子算法组成。例如，在一个视频游戏中，有用于显示图形、保存和加载游戏状态以及播放音频文件的算法，仅举几例。


    ## 流程图


    编程项目及其算法通常使用*流程图*进行可视化，尤其是在团队环境中。在大多数情况下，这是展示基本程序流程的绝佳方式。


    流程图仅由少数几个通用元素组成（见图 1-6）。在最基本的形式中，它们使用四种符号。分别是*起止框*（圆角矩形）、*处理框*（矩形）、*判断框*（菱形）和*流程线*（箭头）。起止框用于表示程序流程的开始和结束。任何操作和一般数据处理都由处理框矩形表示。


    ![../images/507458_1_En_1_Chapter/507458_1_En_1_Fig6_HTML.jpg](img/507458_1_En_1_Fig6_HTML.jpg)


    图 1-6


    一个描述愚人节程序的非常简单的流程图


    在大多数情况下，流程图是从上到下、从左到右解读的。*美国国家标准协会（ANSI）* 早在 20 世纪 60 年代就为流程图及其符号制定了标准。这套符号在 20
    世纪 70 年代和 80 年代由*国际标准化组织（ISO）* 进行了扩展。就本书而言，我们将沿用最初的符号。


    ## 源代码


    这个术语指的是每个软件项目所包含的、或多或少通过键入方式输入的编程清单的集合。作为一名程序员，你是*源代码*的创造者。简单的程序以单个源代码文件的形式存在，而复杂的软件，如操作系统（例如
    Windows），则可能由成千上万个清单组成，共同构成一个单一产品。


    ## 语法


    *语法*是一套规则和原则，用于支配特定语言（包括编程语言）中句子的结构。不同的编程语言对特定操作使用不同的关键字。现在，请看两个编程语言中显示文本字符串的实际代码行：


    表 1-1


    两种编程语言语法差异的演示


    | Java | FORTRAN |

    | --- | --- |

    | System.out.print(“Hello! I like Cake!”); | 1 print *, “Hello! I like Cake!”
    |


    你可能已经猜到，Java 是本书重点介绍的主要语言之一。表 1-1 中使用的另一种编程语言叫做*FORTRAN*。这种语言主要用于科学计算，由 IBM 早在
    20 世纪 50 年代创建。许多工业硬件都运行在 FORTRAN 上。甚至一些极客仍然为了技术时尚而使用它（我们也在很小程度上使用过）。


    你可能注意到表 1-1 中的一个例子以数字（1）开头。这在编程术语中被称为*行号*，这种做法在很久以前就已经基本被废弃了。通常来说，当代编程语言不需要行号。


    ## 例程


    在编程语境中，*例程*是一个术语，指执行特定任务并被程序员有意反复调用的代码。例如，一个程序可能包含一个用于播放音效的简单例程。程序员无需在每次需要播放该音效时都编写和重写代码，而是会临时调用同一段代码（即例程）。


    根据上下文和所使用的编程语言，例程有时也被称为*子例程*、*函数*、*过程*或*方法*。我们将在本书后面更详细地讨论这些术语。


    ## 文件格式


    *文件格式*是一种编码数据的方法。到 2021 年，你在日常生活中已经遇到过许多文件格式。数码照片、在 OpenOffice 中写的情书，以及那些时髦的 Excel
    电子表格，都代表了不同的文件格式。存储在硬盘上的图像文件（例如，*apress_is_great.jpg*）只能与能够按预期方式将其解读为图像的软件一起使用。同样，在照片编辑套件中打开*love-letter.doc*不会给你带来理想的结果，充其量只会显示一堆乱码。大多数操作系统会将不同的可用文件格式与正确的软件关联起来，因此你可以放心地双击文件，并期望它们能正常加载。

