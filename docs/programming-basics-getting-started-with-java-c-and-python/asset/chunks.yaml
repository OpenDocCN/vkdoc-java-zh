    ```


    The last two listings made use of Java’s file streaming classes. Listing [5-7](#507458_1_En_5_Chapter.xhtml#PC8)
    used a method from the `InputStream` class to print text on screen. In Listing
    [5-8](#507458_1_En_5_Chapter.xhtml#PC9), we have an instance of Java’s `OutputStream`
    writing an array of six characters (i.e., the contents of `Publisher[]`) into
    a file.


    When specifying a directory location, the two listings had differing notation:
    in Listing [5-7](#507458_1_En_5_Chapter.xhtml#PC8), we used a backslash (i.e.,
    `c:\\happyfile.txt`) to denote a directory path, while in Listing [5-8](#507458_1_En_5_Chapter.xhtml#PC9),
    we went with the forward slash, as in `c://HappyDirectory`. Both approaches should
    work in Java.


    ## Java Dating


    Let’s face it: keeping track of time in this world is rather important. There’s
    no reason to not do it in Java as well. Luckily, there’s a great class for that,
    known as `LocalDate`. Also, the `java.time.format.DateTimeFormatter` class is
    there to display dates as per a custom formatting pattern defined by you, the
    programmer. (we encountered these formatting markers in Table [5-5](#507458_1_En_5_Chapter.xhtml#Tab5)).
    Listing [5-9](#507458_1_En_5_Chapter.xhtml#PC10) is here to show you how this
    is done.


    ```

    import java.time.LocalDate;

    import java.time.format.DateTimeFormatter;

    public class HappyDateDemo {

    public static void main(String args[]) {

    // Create an object using the Java LocalDate-class

    LocalDate happyDate = LocalDate.now();

    LocalDate fortnite = happyDate.minusDays(14);

    LocalDate tomorrow = happyDate.plusDays(14);

    System.out.println("Today''s date is " + happyDate);

    System.out.println("Two weeks ago it was " + fortnite);

    System.out.println("Two weeks into the future it''ll be.. " + tomorrow);

    // Create and display three different formatting patterns

    System.out.println("Today''s date in format A: "+happyDate.format(DateTimeFormatter.ofPattern("d.M.uuuu")));

    System.out.println("Today''s date in format B: "+happyDate.format(DateTimeFormatter.ofPattern("MMM
    d uuuu")));

    System.out.println("Today''s date in format C: "+happyDate.format(DateTimeFormatter.ofPattern("d.MMM.uu")));

    }

    }

    Listing 5-9

    A program demonstrating date retrieval and formatting in Java

    ```


    Table 5-5


    Some time pattern–formatting markers from `java.time.format.DateTimeFormatter`


    | `d/dd` | Day of the month | `W` | Week in a month (0–5) |

    | `MM` | Month | `K` | Hour in a day (1–24) |

    | `uuuu`/`uu` | Year (full or last two digits) | `K` | Hour in a day, AM/PM (0–11)
    |

    | `w` | Week in a year (1–53) | `E` | Day of the week (e.g., Monday) |


    ## More on Dating: Leap Years and Time Travel


    Let’s explore more of Java’s dating options. Not only can we travel back and forward
    in time using a day as a unit; months and years are also at our disposal. See
    Listing [5-10](#507458_1_En_5_Chapter.xhtml#PC11) for an example of these two
    in action. Also, we’ll be exploring how to discover leap years in Java.


    ```

    import java.time.LocalDate;

    import java.time.LocalTime;

    public class TimeTravel {

    public static void main(String[] args) {

    // Store current date into rightnow

    LocalDate rightnow = LocalDate.now();

    System.out.println("This is thirty weeks into the future: " + rightnow.plusWeeks(30));

    System.out.println("This is fifty months into the past: " + rightnow.minusMonths(50));

    System.out.println("This is 56 years into the past: " + rightnow.minusYears(56));

    System.out.println("Whoa! This is 373 years into the future: " + rightnow.plusYears(373));

    // Store a future date into futuredate1

    LocalDate futuredate1 = LocalDate.of(2028,1,1);

    // Store a past date into pastdate1

    LocalDate pastdate1 = LocalDate.of(1728,1,1);

    // Check for leap years

    System.out.println("\nWas the year " + pastdate1.getYear() + " a leap year? "
    + pastdate1.isLeapYear());

    System.out.println("Is the year " + rightnow.getYear() + " a leap year? " + rightnow.isLeapYear());

    System.out.println("Is the year " + futuredate1.getYear() + " a leap year? " +
    futuredate1.isLeapYear());

    }

    }

    Listing 5-10

    A listing demonstrating the use of some of the methods in the LocalDate class
    in Java

    ```


    ## Calendars in Java


    There are many approaches when it comes to time travel in Java, specifically within
    the Gregorian calendar which remains the most popular system of organizing our
    days since 1582. We may fetch past and future date rather easily, as demonstrated
    by Listing [5-11](#507458_1_En_5_Chapter.xhtml#PC12).


    ```

    import java.util.Calendar;

    public class HappyCalendar {

    public static void main(String[] args) {

    // Create an object using the Calendar-class

    Calendar calendar1 = Calendar.getInstance();

    // Display current date

    System.out.println("Current date: " + calendar1.getTime());

    // Take a week out of the date and display it

    calendar1.add(Calendar.DATE, -7);

    System.out.println("A week ago it was: " + calendar1.getTime());

    // Fast forward two months

    calendar1.add(Calendar.MONTH, 2);

    System.out.println("Two months into the future: " + calendar1.getTime());

    // Go ten years into the future

    calendar1.add(Calendar.YEAR, 10);

    System.out.println("Ten years into the future: " + calendar1.getTime());

    // Go a century back into the past

    calendar1.add(Calendar.YEAR, -100);

    System.out.println("A century ago: " + calendar1.getTime());

    }

    }

    Listing 5-11

    A listing demonstrating the use of the Calendar class in Java

    ```'
