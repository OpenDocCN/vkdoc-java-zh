    software projects require a highly organized team of testers. Due to economic
    reasons, testing for large-scale software is often outsourced to businesses abroad.


    ## Debugging: Essential Approaches


    We shall now peek at some of the most common methods for debugging code in some
    detail:


    *   **Tracing/print debugging**: This method simply means paying close attention
    to the results of every executed line of code by printing them out on screen,
    one by one. Close attention can be paid to the contents of variables and other
    data structures as they’re altered during a program’s execution. Tracing is something
    that works great for smaller projects, such as the tutorials within this book.


    *   **Record and replay debugging**: With this approach, parts of a program’s
    execution are recorded and played back to examine its potential shortcomings.
    This doesn’t refer to the external or visual playback of software; rather it focuses
    on state-level proceedings within a program.


    *   **Post-mortem** **debugging**: This method consists of analyzing the post-crash
    log data on a program. Many types of software write log files on disk after serious
    malfunctions, including most operating systems. These files can then be examined
    for clues as to which bugs caused a crash.


    *   **Remote debugging** : Debugging doesn’t have to take place on the device
    which runs the program of focus. Using popular networking methods, such as Wi-Fi
    or USB cabling, devices in different roles and form factors can be connected to
    work together. Doing it remotely is the most common approach when writing and
    debugging software for Android and iOS, as the development machine is almost always
    a separate full-sized computer.


    *   **Bug clustering** : This is a useful approach whenever a particularly large
    amount of bugs are found. The programmer first identifies any and all common characteristics
    in the bugs. The issues are then classified into specific groups which share their
    attributes, the logic being that even if a few bugs within a cluster are solved,
    the rest should follow.


    *   **Code simplification** : Sometimes the best strategy for eliminating bugs
    is to (more or less temporarily) remove portions of the functional code around
    them. This obviously works best for bugs of the more clandestine/shy nature. When
    you are not yet sure of what doesn’t work (i.e., what’s causing a crash), remove
    the parts that obviously do, one by one, and lure the bug out.


    ## In Closing


    Finishing this chapter, you’ll have gained an understanding of the following:


    *   The main differences between 32-bit and 64-bit computing architectures and
    how to identify which variety your operating system is running on


    *   How the most common bit-derived data units are defined


    *   What an *integrated development environment (IDE)* refers to and how to get
    one for your operating system


    *   The core differences between *console applications* and applications utilizing
    a *graphical user interface (GUI)*


    *   The most common types of software bugs/issues


    *   What debugging and software testing refer to


    The next chapter is dedicated to the wonders of object-oriented programming (OOP)
    in detail. As touched on in Chapter [2](#507458_1_En_2_Chapter.xhtml), this is
    a very important paradigm every budding coder should be able to work with.


    # 4. Object-Oriented Programming (OOP)


    This chapter is all about object-oriented programming in detail. This monumental
    paradigm changed the world of programming and has since become somewhat of a de
    facto approach in software design. We’ll next go through many of the concepts
    crucial to the object-oriented paradigm. During this chapter, we’ll present concepts
    related to OOP mostly using the Java language for clarity, not completely forsaking
    C# and Python, of course.'
