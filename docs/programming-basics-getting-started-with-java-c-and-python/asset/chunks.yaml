- fmt: "# In Closing\n\nFinishing this chapter, you’ll have refreshed your memory\
    \ on the following aspects of Python, C#, and Java:\n\n- Data structures, program\
    \ flow, and basic file operations\n- Elementary threading techniques\n- Exception\
    \ handling using the `try-catch` block\n- Function definition and access\n\nChapter\
    \ 9 will be much lighter on the code, being all about some lovely diagrams, namely,\
    \ those created with the *Universal Modeling Language (UML)*.\n\n# 9. UML Class\
    \ Diagrams\n\nThis chapter is dedicated to the wonders of the Unified Modeling\
    \ Language, which is a rather ubiquitous tool in software design—and deservedly\
    \ so. Having only touched the surface of UML previously in this book, we’ll now\
    \ go in deeper and explore more of the possibilities UML offers as it pertains\
    \ to class modeling.\n\n## Visualizing the Object-Oriented Paradigm\n\nWe introduced\
    \ the object-oriented paradigm in Chapter 4. Most of the code listings in the\
    \ book are indeed of this paradigm in nature with their classes, objects, and\
    \ methods. Think of UML as a valuable tool in the pre-coding phase of software\
    \ development. You plot out all of the OOP-related mechanisms with it, including\
    \ classes and their relations with other classes.\n\nThe Universal Modeling Language\
    \ comes in two standards, namely, UML 1.x (originally from 1996) and UML 2.x (first\
    \ released in 2005). Both of these standards consist of numerous types of diagrams\
    \ for practically any modeling purpose.\n\n## The Categories of UML Diagrams\n\
    \nThe entire spectrum of UML diagram types is out of the scope of this book. However,\
    \ it’s useful to know what varieties UML comes in. Broadly speaking, it’s usually\
    \ divided into two main categories which are then divided into numerous subcategories.\
    \ Many larger projects might need most of the following (non-exhaustive) list\
    \ of diagrams; they are mutually exclusive with each other.\n\n- **Behavioral\
    \ diagrams**: Unlike those of the structural variety, behavioral diagrams are\
    \ centered on mapping out a system in action.\n    1. **Use cases**: An actor\
    \ in UML is a party who interacts with a system. Use case diagrams depict the\
    \ interactions between (human) actors and specific systems. Use cases focus on\
    \ particular functionalities a system provides. For example, a person withdrawing\
    \ money from an ATM is one potential scenario for a use case diagram.\n    2.\
    \ **Sequence diagrams**: These diagrams focus on the time sequence of messages\
    \ sent by objects. So when the interactions between objects are to be accurately\
    \ modeled, we use a UML sequence diagram.\n    3. **State-chart diagrams**: States\
    \ in UML mean the different varieties of information an object holds, but not\
    \ their behavior. State-chart diagrams are used when modeling changes to the state\
    \ of a system.\n    4. **Activity diagrams**: When we need to visualize the control\
    \ flow within a system, this is the type of diagram to use. Basically, an activity\
    \ diagram provides an idea of how a system will work upon execution.\n\n- **Structural\
    \ diagrams**: These types of diagrams are there to model the nature of a system\
    \ at rest.\n    1. **Class diagrams**: These are perhaps the most commonly used\
    \ diagrams in UML. We will mainly focus on class diagrams in this chapter. As\
    \ you may have guessed, they deal with the class aspect which is the basis for\
    \ the object-oriented programming (OOP) paradigm.\n    2. **Object diagrams**:\
    \ Obviously related to class diagrams, object diagrams describe the instances\
    \ of classes. These types of diagrams are often used when building a prototype\
    \ for a system.\n    3. **Component diagrams**: These diagrams focus on the types\
    \ of software components within a system as well as their connections. These components\
    \ are often referred to as physical assets, although technically they tend to\
    \ reside purely on a digital level.\n    4. **Deployment diagrams**: These are\
    \ used for visualizing a system’s complete layout, with both the physical and\
    \ software parts of a system on display. A deployment diagram can also be called\
    \ a topology of system components.\n\n## Getting Back to UML: Class Diagrams\n\
    \nAs previously discussed, UML can be used to model pretty much anything, and\
    \ a *class diagram* is there to help us visualize an object-oriented software\
    \ project. Let’s start with something simple (see Figure 9-1).\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig1_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nA simple UML class/object diagram\n\nFigure 9-1 demonstrates classes,\
    \ including their variables and methods and interclass relationships in UML; it\
    \ also features a single UML object diagram.\n\nThe main class in Figure 9-1 is\
    \ called `Book`. It has three variables (i.e., `title`, `publisher`, and `publication\
    \ year`). As you can see, we need to specify the type of variable in the classes\
    \ as well (e.g., `String`). A plus (`+`) in front of an attribute or method in\
    \ UML denotes a public access modifier. Class members with a dash (`-`) character\
    \ signify a private access modifier.\n\nYou can add helpful notes straight into\
    \ UML diagrams as we did in Figure 9-1; these are to take the form of rectangles\
    \ with folded upper right corners.\n\nNow, simple lines mark the associations\
    \ between classes and other entities in UML. The numbers and asterisks next to\
    \ these lines in Figure 9-1 are a demonstration of *multiplicity* in UML. This\
    \ concept is used to indicate how many instances (i.e., objects) a class can provide\
    \ or be allowed to interact with.\n\nMoving on to the object part of Figure 9-1,\
    \ we have a single instance of the main class, called `exampleBook1`. Objects\
    \ can be represented as boxes of either sharp or round edges in UML; we opted\
    \ for the latter for variety.\n\n## Tree-Based Inheritance in UML\n\nInheritance\
    \ can be represented in a succinct manner in UML. To do this, we can use a *tree-based*\
    \ approach (see Figure 9-2).\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig2_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\n\nA diagram demonstrating inheritance in UML using a tree-based\
    \ approach\n\nThe diagram in Figure 9-2 demonstrates three levels of specialization.\
    \ First, you have the generic `Business` class. This is followed by three specialized\
    \ classes, namely, `Publisher`, `Bakery`, and `Perfumerie`. Finally, we have the\
    \ most specialized level of two different types of publisher classes, a class\
    \ for `Wedding Bakery` and `Luxury Perfumerie` for good measure.\n\nIn OOP, parlance\
    \ base classes are also known as *parent classes*. Subclasses are often called\
    \ *child classes*.\n\nThe `Business` class in Figure 9-2 is defined as *abstract*;\
    \ in UML, a class name in italics denotes this. These classes are there to provide\
    \ specific methods for the subclasses to inherit. Abstract classes cannot be directly\
    \ instantiated. Instead, you create objects using one of their non-abstract (i.e.,\
    \ concrete) subclasses."
  raw: "## In Closing\n\nFinishing this chapter, you’ll have refreshed your memory\
    \ on the following aspects of Python, C#, and Java:\n\n*   Data structures, program\
    \ flow, and basic file operations\n\n*   Elementary threading techniques\n\n*\
    \   Exception handling using the try-catch block\n\n*   Function definition and\
    \ access\n\nChapter [9](#507458_1_En_9_Chapter.xhtml) will be much lighter on\
    \ the code, being all about some lovely diagrams, namely, those created with the\
    \ *Universal Modeling Language (UML)*.\n\n# 9. UML Class Diagrams\n\nThis chapter\
    \ is dedicated to the wonders of the Unified Modeling Language, which is a rather\
    \ ubiquitous tool in software design—and deservedly so. Having only touched the\
    \ surface of UML previously in this book, we’ll now go in deeper and explore more\
    \ of the possibilities UML offers as it pertains to class modeling.\n\n## Visualizing\
    \ the Object-Oriented Paradigm\n\nWe introduced the object-oriented paradigm in\
    \ Chapter 4\\. Most of the code listings in the book are indeed of this paradigm\
    \ in nature with their classes, objects, and methods. Think of UML as a valuable\
    \ tool in the pre-coding phase of software development. You plot out all of the\
    \ OOP-related mechanisms with it, including classes and their relations with other\
    \ classes.\n\nThe Universal Modeling Language comes in two standards, namely,\
    \ UML 1.x (originally from 1996) and UML 2.x (first released in 2005). Both of\
    \ these standards consist of numerous types of diagrams for practically any modeling\
    \ purpose.\n\n## The Categories of UML Diagrams\n\nThe entire spectrum of UML\
    \ diagram types is out of the scope of this book. However, it’s useful to know\
    \ what varieties UML comes in. Broadly speaking, it’s usually divided into two\
    \ main categories which are then divided into numerous subcategories. Many larger\
    \ projects might need most of the following (non-exhaustive) list of diagrams;\
    \ they are mutually exclusive with each other.\n\n*   **Behavioral diagrams**:\
    \ Unlike those of the structural variety, behavioral diagrams are centered on\
    \ mapping out a system in action.\n    1.  **Use cases**: An actor in UML is a\
    \ party who interacts with a system. Use case diagrams depict the interactions\
    \ between (human) actors and specific systems. Use cases focus on particular functionalities\
    \ a system provides. For example, a person withdrawing money from an ATM is one\
    \ potential scenario for a use case diagram.\n\n    2.  **Sequence diagrams**:\
    \ These diagrams focus on the time sequence of messages sent by objects. So when\
    \ the interactions between objects are to be accurately modeled, we use a UML\
    \ sequence diagram.\n\n    3.  **State-chart diagrams**: States in UML mean the\
    \ different varieties of information an object holds, but not their behavior.\
    \ State-chart diagrams are used when modeling changes to the state of a system.\n\
    \n    4.  **Activity diagrams**: When we need to visualize the control flow within\
    \ a system, this is the type of diagram to use. Basically, an activity diagram\
    \ provides an idea of how a system will work upon execution.\n\n*   **Structural\
    \ diagrams** : These types of diagrams are there to model the nature of a system\
    \ at rest.\n    1.  **Class diagrams**: These are perhaps the most commonly used\
    \ diagrams in UML. We will mainly focus on class diagrams in this chapter. As\
    \ you may have guessed, they deal with the class aspect which is the basis for\
    \ the object-oriented programming (OOP) paradigm.\n\n    2.  **Object diagrams**:\
    \ Obviously related to class diagrams, object diagrams describe the instances\
    \ of classes. These types of diagrams are often used when building a prototype\
    \ for a system.\n\n    3.  **Component diagrams**: These diagrams focus on the\
    \ types of software components within a system as well as their connections. These\
    \ components are often referred to as physical assets, although technically they\
    \ tend to reside purely on a digital level.\n\n    4.  **Deployment diagrams**:\
    \ These are used for visualizing a system’s complete layout, with both the physical\
    \ and software parts of a system on display. A deployment diagram can also be\
    \ called a topology of system components.\n\n## Getting Back to UML: Class Diagrams\n\
    \nAs previously discussed, UML can be used to model pretty much anything, and\
    \ a *class diagram* is there to help us visualize an object-oriented software\
    \ project. Let’s start with something simple (see Figure [9-1](#507458_1_En_9_Chapter.xhtml#Fig1)).\n\
    \n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig1_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nA simple UML class/object diagram\n\nFigure [9-1](#507458_1_En_9_Chapter.xhtml#Fig1)\
    \ demonstrates classes, including their variables and methods and interclass relationships\
    \ in UML; it also features a single UML object diagram.\n\nThe main class in Figure\
    \ [9-1](#507458_1_En_9_Chapter.xhtml#Fig1) is called Book. It has three variables\
    \ (i.e., title, publisher, and publication year). As you can see, we need to specify\
    \ the type of variable in the classes as well (e.g., String). A plus (+) in front\
    \ of an attribute or method in UML denotes a public access modifier. Class members\
    \ with a dash (-) character signify a private access modifier.\n\nYou can add\
    \ helpful notes straight into UML diagrams as we did in Figure [9-1](#507458_1_En_9_Chapter.xhtml#Fig1);\
    \ these are to take the form of rectangles with folded upper right corners.\n\n\
    Now, simple lines mark the associations between classes and other entities in\
    \ UML. The numbers and asterisks next to these lines in Figure [9-1](#507458_1_En_9_Chapter.xhtml#Fig1)\
    \ are a demonstration of *multiplicity* in UML. This concept is used to indicate\
    \ how many instances (i.e., objects) a class can provide or be allowed to interact\
    \ with.\n\nMoving on to the object part of Figure [9-1](#507458_1_En_9_Chapter.xhtml#Fig1),\
    \ we have a single instance of the main class, called *exampleBook1*. Objects\
    \ can be represented as boxes of either sharp or round edges in UML; we opted\
    \ for the latter for variety.\n\n## Tree-Based Inheritance in UML\n\nInheritance\
    \ can be represented in a succinct manner in UML. To do this, we can use a *tree-based*\
    \ approach (see Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2)).\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig2_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\n\nA diagram demonstrating inheritance in UML using a tree-based\
    \ approach\n\nThe diagram in Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2) demonstrates\
    \ three levels of specialization. First, you have the generic Business class.\
    \ This is followed by three specialized classes, namely, Publisher, Bakery, and\
    \ Perfumerie. Finally, we have the most specialized level of two different types\
    \ of publisher classes, a class for Wedding Bakery and Luxury Perfumerie for good\
    \ measure.\n\nIn OOP, parlance base classes are also known as *parent classes*.\
    \ Subclasses are often called *child classes.*\n\nThe Business class in Figure\
    \ [9-2](#507458_1_En_9_Chapter.xhtml#Fig2) is defined as *abstract*; in UML, a\
    \ class name in italics denotes this. These classes are there to provide specific\
    \ methods for the subclasses to inherit. Abstract classes cannot be directly instantiated.\
    \ Instead, you create objects using one of their non-abstract (i.e., concrete)\
    \ subclasses."
  trans: "\n## 结语\n\n完成本章后，你将重温 Python、C# 和 Java 在以下方面的知识：\n\n*   数据结构、程序流程和基本文件操作\n\
    *   基础线程技术\n*   使用 try-catch 块进行异常处理\n*   函数的定义与访问\n\n第 9 章的代码量会少很多，主要围绕一些精美的图表展开，即使用*统一建模语言\
    \ (UML)* 创建的图表。\n\n# 9. UML 类图\n\n本章将深入探讨统一建模语言的奇妙之处。UML 在软件设计中是一种相当普遍的工具——而且理应如此。本书此前仅触及了\
    \ UML 的皮毛，现在我们将更深入地探索 UML 在类建模方面所提供的更多可能性。\n\n## 可视化面向对象范式\n\n我们在第 4 章介绍了面向对象范式。本书中的大部分代码示例本质上都属于这种范式，包含类、对象和方法。可以将\
    \ UML 视为软件开发编码前阶段的一个宝贵工具。你可以用它来规划所有与 OOP 相关的机制，包括类以及类与其他类之间的关系。\n\n统一建模语言有两个标准，即\
    \ UML 1.x（最初于 1996 年发布）和 UML 2.x（于 2005 年首次发布）。这两个标准都包含多种类型的图表，几乎适用于任何建模目的。\n\n\
    ## UML 图表的分类\n\n本书不涉及 UML 图表类型的完整范围。然而，了解 UML 有哪些种类是很有用的。广义上讲，它通常分为两大类，然后这两大类又细分为许多子类。许多大型项目可能需要用到以下（非详尽）列表中的大部分图表；这些图表之间是互斥的。\n\
    \n*   **行为图**：与结构图不同，行为图侧重于描绘系统在运行时的状态。\n    1.  **用例图**：UML 中的参与者是指与系统交互的一方。用例图描述了（人类）参与者与特定系统之间的交互。用例关注系统提供的特定功能。例如，一个人从\
    \ ATM 取款是用例图的一个潜在场景。\n\n    2.  **序列图**：这些图表侧重于对象发送消息的时间顺序。因此，当需要精确建模对象之间的交互时，我们使用\
    \ UML 序列图。\n\n    3.  **状态图**：UML 中的状态指的是对象所持有的不同种类的信息，而不是其行为。状态图用于对系统状态的变化进行建模。\n\
    \n    4.  **活动图**：当我们需要可视化系统内的控制流时，就会使用这种类型的图表。基本上，活动图提供了系统在执行时如何工作的概念。\n\n* \
    \  **结构图**：这类图表用于对系统在静态时的性质进行建模。\n    1.  **类图**：这可能是 UML 中最常用的图表。本章我们将主要关注类图。你可能已经猜到，它们处理的是作为面向对象编程\
    \ (OOP) 范式基础的类方面。\n\n    2.  **对象图**：显然与类图相关，对象图描述了类的实例。这类图表通常用于构建系统原型时。\n\n \
    \   3.  **组件图**：这些图表侧重于系统内软件组件的类型以及它们之间的连接。这些组件通常被称为物理资产，尽管从技术上讲，它们往往纯粹存在于数字层面。\n\
    \n    4.  **部署图**：用于可视化系统的完整布局，同时展示系统的物理部分和软件部分。部署图也可以称为系统组件拓扑图。\n\n## 回到 UML：类图\n\
    \n如前所述，UML 几乎可以用于对任何事物进行建模，而*类图*则帮助我们可视化面向对象的软件项目。让我们从一些简单的内容开始（见图 9-1）。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig1_HTML.jpg](img/507458_1_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1\n\n一个简单的 UML 类/对象图\n\n图 9-1 展示了 UML 中的类，包括它们的变量、方法以及类间关系；它还包含一个单一的 UML\
    \ 对象图。\n\n图 9-1 中的主类名为 Book。它有三个变量（即 title、publisher 和 publication year）。如你所见，我们还需要在类中指定变量的类型（例如\
    \ String）。UML 中属性或方法前的加号 (+) 表示公共访问修饰符。带有减号 (-) 的类成员表示私有访问修饰符。\n\n你可以像我们在图 9-1\
    \ 中那样，直接在 UML 图中添加有用的注释；这些注释应采用右上角折角的矩形形式。\n\n现在，简单的线条标记了 UML 中类与其他实体之间的关联。图 9-1\
    \ 中这些线条旁边的数字和星号展示了 UML 中的*多重性*。这个概念用于指示一个类可以提供或允许与之交互的实例（即对象）数量。\n\n继续看图 9-1 的对象部分，我们有一个主类的单一实例，名为\
    \ *exampleBook1*。在 UML 中，对象可以表示为带有尖角或圆角的方框；我们选择了后者以增加多样性。\n\n## UML 中的树状继承\n\n\
    继承可以在 UML 中以简洁的方式表示。为此，我们可以使用*树状*方法（见图 9-2）。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig2_HTML.jpg](img/507458_1_En_9_Fig2_HTML.jpg)\n\
    \n图 9-2\n\n使用树状方法演示 UML 中继承的图表\n\n图 9-2 中的图表展示了三个层次的特化。首先，你有一个通用的 Business 类。接着是三个特化类，即\
    \ Publisher、Bakery 和 Perfumerie。最后，我们拥有最特化的层次：两种不同类型的 Publisher 类，以及一个 Wedding\
    \ Bakery 类和一个 Luxury Perfumerie 类。\n\n在 OOP 术语中，基类也称为*父类*。子类通常被称为*子类*。\n\n图 9-2\
    \ 中的 Business 类被定义为*抽象*类；在 UML 中，斜体的类名表示这一点。这些类用于提供特定的方法供子类继承。抽象类不能直接实例化。相反，你需要使用其非抽象（即具体）子类之一来创建对象。\n"
- fmt: '## Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2) in Java


    What might Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2) look like if translated
    into Java? Take a peek at Listing [9-1](#507458_1_En_9_Chapter.xhtml#PC1) for
    a possible solution.


    In Listing [9-1](#507458_1_En_9_Chapter.xhtml#PC1), `Business` is the base class.
    All other classes are defined inside its file, `Business.java`, to avoid having
    multiple source files (i.e., `Publisher.java`, `Bakery.java`, etc.).


    ```java

    // Define abstract base class

    abstract class Business {

    // Define class attributes/variables

    public double turnover = 20000;

    public String address = "none";

    // Define method for displaying address attribute/variable

    void DisplayAddress() {

    System.out.println(address);

    }

    // Create main method

    public static void main(String[] args)

    {

    // Uncommenting the next line will throw an error

    // Business business1 = new Business();

    // Create new Bakery object, happybakery, and display its address

    Bakery happybakery = new Bakery();

    System.out.println("A new bakery is opened at " + happybakery.address);

    // Create new FictionPublisher object, jolly_books, and display its turnover

    FictionPublisher jolly_books = new FictionPublisher();

    System.out.println("Fiction publisher Jolly Books had an unfortunate turnover
    of £" + jolly_books.turnover + " in 2020");

    // Create new NonFictionPublisher object, silly_books, set and display its turnover

    NonFictionPublisher silly_books = new NonFictionPublisher();

    System.out.println(("Non-fiction publisher Silly Books had a great turnover of
    £" + (silly_books.turnover + " in 2020")));

    // Create new LuxuryPerfumerie object, exquisite_odors, set and display its address

    LuxuryPerfumerie exquisite_odors = new LuxuryPerfumerie();

    exquisite_odors.address = "10 Wacky Avenue";

    System.out.print("A wonderful luxury perfumerie is located at ");

    exquisite_odors.DisplayAddress(); // Summon method inherited from Business class

    }

    }

    // Define the rest of the classes

    class Bakery extends Business { String address = "2 Happy Street"; }

    class WeddingBakery extends Bakery { }

    class Perfumerie extends Business { }

    class LuxuryPerfumerie extends Perfumerie { }

    class Publisher extends Business { }

    class FictionPublisher extends Publisher { double turnover = 4.55; }

    class NonFictionPublisher extends Publisher { /* turnover is inherited from Business
    class */ }

    Listing 9-1

    A Java implementation of Figure 9-2 demonstrating inheritance (filename Business.java)

    ```


    ## Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2) in C#


    Let’s observe an implementation of Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2)
    on C# next. Like you may remember from previous chapters in this book, Java and
    C# are rather similar languages.


    ```csharp

    using System;

    abstract class Business {

    //  Define class attributes/variables

    public double turnover = 20000;

    public string address = "none";

    // Define method for displaying address attribute/variable

    void DisplayAddress() {

    Console.WriteLine(address);

    }

    // Create main method

    public static void Main() {

    // Uncommenting the next line will throw an error

    // Business business1 = new Business();

    //  Create new Bakery, happybakery, and display its address

    Bakery happybakery = new Bakery();

    Console.WriteLine("A new bakery is opened at " + happybakery.address);

    //  Create new FictionPublisher, jolly_books, and display its turnover

    FictionPublisher jolly_books = new FictionPublisher();

    Console.WriteLine("Jolly Books had an unfortunate turnover of £"

    + jolly_books.turnover + " in 2020");

    // Create NonFictionPublisher, silly_books, set and display its turnover

    NonFictionPublisher silly_books = new NonFictionPublisher();

    Console.WriteLine("Silly Books had a great turnover of £"

    + silly_books.turnover + " in 2020");

    // Create new LuxuryPerfumerie, exquisite_odors, set and display its address

    LuxuryPerfumerie exquisite_odors = new LuxuryPerfumerie();

    exquisite_odors.address = "10 Wacky Avenue";

    Console.Write("A wonderful luxury perfumerie is located at " );

    exquisite_odors.DisplayAddress(); // Summon method inherited from Business class

    }

    }

    //  Create the rest of the classes

    class Bakery : Business { new public string address = "2 Happy Street"; }

    class WeddingBakery : Bakery { }

    class Perfumerie : Business { }

    class LuxuryPerfumerie : Perfumerie { }

    class Publisher : Business { }

    class FictionPublisher : Publisher { new public double turnover=4.55; }

    class NonFictionPublisher : Publisher { /* turnover is inherited from Business
    class */ }

    Listing 9-2

    A C# implementation of Figure 9-2 demonstrating inheritance

    ```


    Listings [9-1](#507458_1_En_9_Chapter.xhtml#PC1) and [9-2](#507458_1_En_9_Chapter.xhtml#PC2)
    are nearly identical. For one, classes are implemented in a very similar fashion
    in both Java and C#. Naturally, there are a few differences (see Table [9-1](#507458_1_En_9_Chapter.xhtml#Tab1)).


    **Table 9-1** The main differences between Listings [9-1](#507458_1_En_9_Chapter.xhtml#PC1)
    and [9-2](#507458_1_En_9_Chapter.xhtml#PC2)


    | Element | Listing [9-1](#507458_1_En_9_Chapter.xhtml#PC1) (Java) | Listing [9-2](#507458_1_En_9_Chapter.xhtml#PC2)
    (C#) |

    | --- | --- | --- |

    | Class inheritance | `class Publisher extends Business { }` | `class Publisher
    : Business { }` |

    | Main method | `public static void main(String[ ] args)` | `public static void
    Main( )` |

    | Console output | `System.out.println( … )` | `Console.WriteLine( … )` |

    | Member declaration | `double turnover = 4.55;` | `new public double turnover
    = 4.55;` |


    ## Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2) in Python


    And now for something somewhat different. Let’s take a glance at what Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2)
    might look in Python (see Listing [9-3](#507458_1_En_9_Chapter.xhtml#PC3)). To
    use abstract classes in Python, we need to import a code module called `ABC`.
    We then make our base class, `Business`, inherit from this module. The line `@abstractmethod`
    is a so-called Python decorator. Like you might’ve guessed, it’s there to tell
    us a method is to be considered abstract.


    ```python

    # import code module for working with abstract classes, ABC

    from abc import ABC, abstractmethod

    # define classes, starting with an abstract Business class

    class Business(ABC):

    def __init__(self): # set class attribute default values

    self.address = "none"

    self.turnover = 20000

    @abstractmethod # define abstract method

    def Display_Address(self):

    pass

    class Publisher(Business):

    def Display_Address(self):

    pass

    class Bakery(Business):

    def Display_Address(self):

    pass

    def __init__(self):

    self.address = "2 Happy Street"

    class Perfumerie(Business):

    def Display_Address(self):

    pass

    class FictionPublisher(Publisher):

    def __init__(self):

    self.turnover = 4.55

    class NonFictionPublisher(Publisher):

    pass

    class WeddingBakery(Bakery):

    pass

    class LuxuryPerfumerie(Perfumerie):

    def __init__(self):

    self.address = "10 Wacky Avenue"

    def Display_Address(self): # override abstract method

    print(self.address)

    happybakery = Bakery() # Create new Bakery object

    print("A new bakery is opened at", happybakery.address)

    jolly_books = FictionPublisher() # Create new FictionPublisher object

    print("Jolly Books had an unfortunate turnover of £", jolly_books.turnover, "in
    2020")

    silly_books = NonFictionPublisher() # Create new NonFictionPublisher object

    print("Silly Books had a great turnover of £", silly_books.turnover, "in 2020")

    exquisite_odors = LuxuryPerfumerie() # Create new LuxuryPerfumerie object

    print("A wonderful luxury perfumerie is located at ", end = '''')

    exquisite_odors.Display_Address() # summon Display_Address-method

    Listing 9-3

    A Python implementation of Figure 9-2

    ```'
  raw: '## Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2) in Java


    What might Figure [9-2](#507458_1_En_9_Chapter.xhtml#Fig2) look like if translated
    into Java? Take a peek at Listing [9-1](#507458_1_En_9_Chapter.xhtml#PC1) for
    a possible solution.


    In Listing [9-1](#507458_1_En_9_Chapter.xhtml#PC1), *Business* is the base class.
    All other classes are defined inside its file, Business.java, to avoid having
    multiple source files (i.e., *Publisher.java*, *Bakery.java*, etc.).


    ```

    // Define abstract base class

    abstract class Business {

    // Define class attributes/variables

    public double turnover = 20000;

    public String address = "none";

    // Define method for displaying address attribute/variable

    void DisplayAddress() {

    System.out.println(address);

    }

    // Create main method

    public static void main(String[] args)

    {

    // Uncommenting the next line will throw an error

    // Business business1 = new Business();

    // Create new Bakery object, happybakery, and display its address

    Bakery happybakery = new Bakery();

    System.out.println("A new bakery is opened at " + happybakery.address);

