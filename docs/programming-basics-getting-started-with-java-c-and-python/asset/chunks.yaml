    \ Linux users might need to input the following Terminal commands:\n\n    ```\n\
    \    sudo dnf install java-latest-openjdk.x86_64\n    sudo dnf install java-latest-openjdk-devel.x86_64\n\
    \    ```\n\n2.  **Next, we use the snappy system to download Eclipse:**\n\n  \
    \  ```\n    sudo snap install --classic eclipse\n    ```\n\nYou might be prompted\
    \ for your password during the installation process. Upon successful installation,\
    \ you should see the following message: *eclipse (version information) from Snapcrafters\
    \ installed.*\n\n# Eclipse First Launch\n\nUpon launching Eclipse, you’ll be prompted\
    \ to select a directory for your Eclipse workspace. The default setting works\
    \ for most purposes. Let’s create a new project. This is done by navigating to\
    \ *File* ➤ *New* ➤ *Java Project* from the top menu bar. Next, you should see\
    \ a window which awaits your project tile. Enter one and click *Create.*\n\nA\
    \ window will appear asking whether you want `module-info.java` to be created\
    \ or not. This file is a *module declaration* used by the modular functionality\
    \ of Java. For simple applications, it’s fine if you choose *Don’t Create.*\n\n\
    You will be taken to the main project view in Eclipse. We don’t quite have a functional\
    \ Java application on our hands yet. Now, on the left, you’ll see the *Project\
    \ Explorer.* Left-click your project name. Select *File* ➤ *New* ➤ *Class* from\
