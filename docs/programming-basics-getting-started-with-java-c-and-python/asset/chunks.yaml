- fmt: '# Dates in C#


    Like Java and Python, C# offers all you need when it comes to working with dates
    and calendars. Let’s peek at a program in where we access dates and calendars,
    shall we? (See Listing [7-1](#507458_1_En_7_Chapter.xhtml#PC1).)


    ```

    using System;

    public class Example

    {

    public static void Main()

    {  // Create a new DateTime-object, "happydate"

    DateTime happydate = new DateTime(1966, 2, 6, 5, 20, 0);

    // Display object data

    Console.WriteLine("Our special date is {0}", happydate.ToString());

    // Fetch and display year and day of the week for our date-object

    Console.WriteLine("Back in {0} it was {1}!", happydate.Year, happydate.DayOfWeek);

    // Create a second DateTime-object

    DateTime happydate2 = DateTime.Now;

    Console.WriteLine("As for right now, it''s a {1} in {0}!", happydate2.Year, happydate2.DayOfWeek);

    }

    }

    Listing 7-1

    A listing in C# demonstrating the use of DateTime objects (the date in question
    is recording artist Rick Astley''s date of birth)

    ```


    We start Listing [7-1](#507458_1_En_7_Chapter.xhtml#PC1) off by creating an object
    we chose to call `happydate`. It shall be an instance of the C# `DateTime` structure
    and use a specific constructor for setting the year, month, and time of day. We
    then display this date using a `Console.WriteLine` with a `{0}` formatting mark
    inside for including the first, and in this case only, parameter. The `happydate`
    object is also converted into currently active *cultural-specific formatting conventions*
    using the `ToString` method.


    The `DateTime` structures are a part of the `System` namespace in C#, so they
    don’t need to be included in our projects using any other way.


    The `DateTime` structure in C# includes a plethora of properties for accessing
    calendar-related data from year down to millisecond. See Table [7-1](#507458_1_En_7_Chapter.xhtml#Tab1)
    for a rundown.


    Table 7-1


    Some core properties included in the `DateTime` structure in C#


    | Now | Day | Millisecond |

    | Date | Hour | TimeOfDay |

    | Year | Minute | DayOfWeek |

    | Month | Second | DayOfYear |


    ## The System.Globalization Namespace


    Global culture is a concept taken quite seriously by C#. *Globalization* refers
    to designing an application for users from any part of the globe. *Localization*
    refers to the process of tailoring an application to conform to the requirements
    of a specific culture. In practice, these concepts deal with the different calendars,
    currencies, languages, and locations our planet offers. In C#, we have a large
    number of methods and properties for presenting localized information with. A
    lot of them originate in the `System.Globalization` namespace.


    ## Working with World Calendars


    The `Calendar` class in C# includes a total of 14 different calendars for your
    localization needs. See Table [7-2](#507458_1_En_7_Chapter.xhtml#Tab2) to glance
    at eight of them.


    Table 7-2


    Some calendars included in C#


    | `GregorianCalendar` | Most widely used calendar in the world | `JulianCalendar`
    | In use by the Russian Orthodox church |

    | `HebrewCalendar` | Official calendar of Israel. Also called the Jewish calendar
    | `PersianCalendar` | Official calendar of Iran and Afghanistan |

    | `HijriCalendar` | Also called the Islamic calendar | `ThaiBuddhistCalendar`
    | Used in Thailand. Is set 543 years ahead of the Gregorian calendar |

    | `JapaneseCalendar` | Similar to the Gregorian calendar, adds year designations
    based on the year of the reign of the current emperor of Japan | `UmAlQuraCalendar`
    | Used in Saudi Arabia, similar to the Hijri |


    In Listing [7-2](#507458_1_En_7_Chapter.xhtml#PC2), you’ll find a program which
    takes a date set in the Gregorian calendar (i.e., the 31st of December 2021) and
    converts that into four other calendars. We’ll access relevant date-related data
    using methods like `GetYear()` and `GetMonth()`. We also specify a custom formatting
    pattern for our Gregorian `DateTime` object using a `ToString` method.


    ```

    using System;

    using System.Globalization;

    public class CalendarsExample

    {

    public static void Main()

    {

    // Create a new Gregorian DateTime-object, date1

    DateTime date1 = new DateTime(2021, 12, 31, new GregorianCalendar());

    // Create four more objects for the four other types of calendars

    JapaneseCalendar japanese = new JapaneseCalendar();

    PersianCalendar persian = new PersianCalendar();

    HijriCalendar hijri = new HijriCalendar();

    ThaiBuddhistCalendar thai = new ThaiBuddhistCalendar();

    Console.WriteLine("When the Gregorian Calendar says it''s {0}..", date1.ToString("dd.MM.yyyy"));

    Console.WriteLine("> The Japanese Calendar says it''s year {0}.", japanese.GetYear(date1));

    Console.WriteLine("> The Persian Calendar says it''s the year {0} and the {1}th
    month of the year.", persian.GetYear(date1), persian.GetMonth(date1));

    Console.WriteLine("> The Hijri Calendar says it''s the year {0} and it''s {1}.",
    hijri.GetYear(date1), hijri.GetDayOfWeek(date1));

    Console.WriteLine("> The Thai Buddhist Calendar says it''s the year {0} and the
    {1}th month of the year.", thai.GetYear(date1), thai.GetMonth(date1));

    }

    }

    Listing 7-2

    A listing demonstrating displaying information using five different calendars
    in C#

    ```'
