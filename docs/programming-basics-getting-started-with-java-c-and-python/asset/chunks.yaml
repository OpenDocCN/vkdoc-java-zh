- fmt: '# ASCII


    *American Standard Code for Information Interchange (ASCII)* is a character-encoding
    standard that assigns letters, numbers, and other characters for use in computing
    and other digital equipment. In essence, what you are reading now is ASCII code.
    As a programmer, you’ll come across the term rather frequently. An “ASCII file”
    is often used as a shorthand for “human-readable text file.” The system dates
    back to 1963.


    On the Internet of today, the most commonly used character-encoding standard is
    the UTF-8, which includes all of the ASCII alphanumericals as well as many other
    symbols.


    # Boilerplate Code


    The term *boilerplate* refers to programming code which is more or less automatically
    inserted into a program, needing little to no editing. When you start a new project
    in, say, a C++ environment, current-generation development tools will usually
    set you up with the necessary boilerplate code needed to run the program. If not,
    you can relatively safely copy-paste boilerplate code from your older working
    projects right into your new one to get started.


    # Software Framework


    A *software framework* **is a set** of generic functionalities which typically
    spare the coder a lot of time. There’s no reason to reinvent the wheel, especially
    in software projects. A framework includes various software libraries of various
    focus, including file manipulation routines, audio playback, and 3D graphics routines
    (in the case of 3D video game development and other highly visual applications).


    For the purposes of this book, we won’t be delving deep in any complicated software
    frameworks, but it’s important you understand the concept.


    # Full Stack


    A *full stack* is the software that makes up a fully working web application,
    such as an online database. A web application is often divided into two areas:
    a *front end* and a *back end.* The front end is made for the user; it contains
    all the user interface elements needed to use the app. The back end consists of
    web servers, frameworks, and databases. *A full stack developer* is therefore
    someone who knows their way across both the front end and the back end of online
    application coding.


    # In Closing


    Finishing this chapter you’ll have hopefully gained some understanding of the
    following:


    *   The basic five hardware components in a computer

    *   The three main requirements for becoming a programmer

    *   Some essential programming concepts, including source code, syntax, and boilerplate
    code

    *   What flowcharts refer to and what their basic building blocks are


    # 2. Java, C#, and Python 101


    In this chapter, we’ll get acquainted with three of the most popular programming
    languages in 2021 (and probably beyond). Several concepts related to programming
    will be presented and discussed in some detail. These terms may seem daunting
    and/or clunky at first, but be aware they are actually rather simple once grasped
    and offer a special path straight into your computer’s very heart. We’ll begin
    by introducing you to these three amazing languages: Java, C#, and Python.


    ## Java


    Created by *Sun Microsystems* and released in 1995, Java quickly became a widely
    adopted general-purpose programming language especially for online environments
    (i.e., cloud computing). Today, software written with Java powers countless smartphones,
    data centers, and ubiquitous online services like Google. As of 2021, it’s among
    the most popular programming languages out there for novices and seasoned coders
    alike.


    Although the programming language known as *JavaScript* shares its first four
    letters with Java, these two have very little in common. JavaScript was created
    by Internet pioneers *Netscape* back in the nineties for use with then-new browser
    technology. The language is still alive and well on the Internet, providing extra
    functionality and usability for a myriad of websites.


    ## C#


    C# (pronounced C sharp) was released to the public in the summer of 2002. Developed
    by Microsoft, the language can be used to create any type of modern application
    from productivity software to video games. C# shares some of its features with
    several other popular programming languages including Java.


    You may have heard of C++, which is an earlier and somewhat more complex language
    compared to C#. Although C++ is capable of producing more efficient output in
    general, with C#, it’s more straightforward to develop mobile and web apps. As
    for the grandparent of both C++ and C#? Say hello to C (sometimes also called
    *Procedural C*), a language dating back to 1972.


    ## Python


    Taking its name from *Monty Python,* a popular light entertainment TV show, Python
    was released in 1991. While Python’s output is often slower than software made
    with C#, Python has nonetheless become quite popular in recent years. It can handle
    pretty much anything from making simple apps for the Web to heavier desktop software.
    Python has even found a niche in the video games industry for game prototyping
    purposes.


    What’s noteworthy about Python is the way it’s sensitive to whitespaces/indentation
    (the invisible characters created by pressing the space bar and/or the tab key).
    We’ll touch on this unique approach and more later in the book.


    ## Ones, Zeros, and You


    Now, you may have heard the spiel on binary digits and how computers love it.
    And yes, on the most fundamental level, microprocessors do chew on ones and zeros
    (they really dig strings like, say, `01011010110`). This closest level fed into
    central processing units is called the level of *machine language* or *machine
    code.* There are several layers of abstraction on top of this binary level to
    help us humans do our thing with computers.


    Now, in programming, there’s a distinction between *high-level* and *low-level
    languages* *.* This has nothing to do with the quality of the tools. This classification
    refers to how close to machine code (i.e., binary) a programming language is working
    on. Basically, high-level languages are closer to human language, while lower-level
    ones tend to look rather obscure to laypeople. C# and Python are considered high-level
    languages, while C++ represents what is known as a middle-level language as it
    offers some pretty solid features for more advanced programmers.


    Wait, are you getting angsty at this point? Don’t worry: in this book we’ll focus
    on the high-level stuff only. Deeper knowledge of binary/machine code is not needed.'
