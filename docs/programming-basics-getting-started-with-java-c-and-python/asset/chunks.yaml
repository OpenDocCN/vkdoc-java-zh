    There are many ways to manipulate values in variables. All basic arithmetic (i.e.,
    addition, subtraction, multiplication, division, exponentiation, and extraction
    of roots) is covered in any programming language. The next small listing demonstrates
    this in Python. Clear your compiler programming space, and type in Listing [2-2](#507458_1_En_2_Chapter.xhtml#PC2)
    if you want to see it in action.


    ```

    favorite_number = 21

    print("My favorite number is", favorite_number)

    favorite_number+=2

    print("No, it was", favorite_number)

    favorite_number-=1

    print("Wait.. it''s actually", favorite_number)

    Listing 2-2

    The variable used is in bold

    ```


    In Listing [2-2](#507458_1_En_2_Chapter.xhtml#PC2), we used *addition* and *subtraction
    assignment operators* for our arithmetic purposes (i.e., `+=` and `-=`). The following
    would’ve had the same result with our addition statement: `favorite_number = favorite_number
    + 2`


    ## Typecasting in Python


    Some scenarios require a program to interpret certain values as specific variable
    types. This might be needed in cases where the user is expected to input an exact
    variety of data types. The process for converting from one data type to another
    is known as *typecasting* or *type conversion*. Luckily Python allows us to do
    just that using some rather simple methods.


    Now, there are two types of typecasting: *implicit* and *explicit*. You might
    already be somewhat familiar with the former. Implicit typecasting simply refers
    to Python deducing the type of variable from the input you first assign to it
    (e.g., a number or a string of characters). In this section, we’ll focus on explicit
    typecasting, in which a programmer assigns not just the value into a variable
    but also converts its data type into another. See Table [2-3](#507458_1_En_2_Chapter.xhtml#Tab3)
    for some core typecasting functions in Python.


    ## Variable Comparisons


    There are other ways of utilizing a variable’s contents, of course. To make usable
    software, we often need to compare values. There are six universal operators for
    this (see Table [2-4](#507458_1_En_2_Chapter.xhtml#Tab4)). These operators work
    for practically all programming languages, including the three featured in this
    book.


    Table 2-4


    The main comparison operators in Java, C#, Python, and most other languages


    | Operator name | Operator symbol | Examples of use |

    | --- | --- | --- |

    | Equal to | `==` | `if (name == "Johnny") ...` |

    | Not equal to | `!=` | `if (age != 21) ...` |

    | Less than | `<` | `if (age < adult_age) ...` |

    | More than | `>` | `if (energy > max_energy) ...` |

    | Less than or equal to | `<=` | `if (pet_snakes <= allowed_snake_amount) ...`
    |

    | More than or equal to | `>=` | `if (gold >= 1000) ...` |


    Let’s now peek at Listing [2-3](#507458_1_En_2_Chapter.xhtml#PC3) for a demonstration
    on how some of these comparisons work in Python.


    ```

    print(''Enter a number:'')

    YourNumber = input()

    YourNumber = int(YourNumber)

    if YourNumber > 10:

    print(''Your number is greater than ten'')

    if YourNumber <= 10:

    print(''Your number is ten or smaller'')

    Listing 2-3

    A simple listing in Python demonstrating comparison operators

    ```


    ## Variable Declarations in Java and C#


    Now we move on to variables in the context of Java and C#. Unlike Python, these
    programming languages require that we define a variable’s data type manually.
    For a detailed rundown on some of the main variable types in Java and C#, see
    Table [2-5](#507458_1_En_2_Chapter.xhtml#Tab5). As you can see, for the most part,
    the variable type declarations are identical for both of these languages.


    Table 2-5


    The main variable types and their declarations for Java and C#


    | Variable type | Java and C# | Variable range |

    | --- | --- | --- |

    | Integer (whole numbers) | `int` | From -2,147,483,648 to 2,147,483,647 |

    | Character | `char` | Single alphanumerical character (e.g., B) |

    | Floating-point number | `float` | Fractional numbers between 6 and 9 decimals
    |

    | Double floating-point number | `double` | Fractional numbers up to 17 decimals
    |

    | Boolean (logical operator) | `bool` | True or false (i.e., one or zero) |

    | String of text | `String` (Java), `string` (C#) | Arbitrary number of alphanumerical
    characters |


    ## Trying Out Java and C#


    Not just limited to covering Python, several online compilers exist for both Java
    and C#. The following is a selection for your choosing pleasure. Pick a favorite
    so you can try out some live coding in these languages, too.


    *   **Jdoodle Java Compiler**: [`www.jdoodle.com/online-java-compiler`](http://www.jdoodle.com/online-java-compiler)

    *   **Paiza.io Java Compiler**: [`https://paiza.io/projects/fjCEFnDQzDWOoS9hYZtVtg?language=java`](https://paiza.io/projects/fjCEFnDQzDWOoS9hYZtVtg%253Flanguage%253Djava)

    *   **Dotnet Fiddle C# Compiler**: [`www.dotnetfiddle.net`](http://www.dotnetfiddle.net)

    *   **Rextester C# Compiler**: [`https://rextester.com`](https://rextester.com)


    ## On Curly Brackets, Variable Scope, and Code Blocks


    You’ll come across several code listings with curly brackets soon in this chapter.
    They are indeed an important element in many programming languages. What these
    curly characters do is they denote *code blocks,* which consist of grouped declarations
    and/or statements. A compiler or interpreter software reads a single code block
    as a single instruction.


    Also, code blocks can limit the *scope* of a variable, that is, the parts of a
    listing in which a specific variable is in effect. Two different code blocks may
    have no access whatsoever into one another’s variable space.


    Python doesn’t treat curly brackets the way Java or C# do. Instead, the language
    uses whitespace (i.e., blank characters or indentation) when denoting code blocks.
    In Python, curly brackets are reserved for defining a dictionary or a set data
    type.'
