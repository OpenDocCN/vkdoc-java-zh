    ## A Personal Computer in UML


    Let’s now model something with both composite and aggregate associations. This
    is to have you contemplate scenarios in which you need to make a distinction between
    these two types of associations in UML.


    Figure [9-4](#507458_1_En_9_Chapter.xhtml#Fig4) represents a typical personal
    computer. It is meant to depict all the main components needed for a functional
    system. However, only some of these components are depicted using the composite
    association (i.e., the filled diamond symbol). This is because, in theory, one
    could have a personal computer up and running without them. It would not be the
    most useful system ever, but it would switch on and display error messages, at
    least.


    ![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig4_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    A diagram demonstrating composition relationships in UML


    Essential computer components depicted with composite associations in Figure [9-4](#507458_1_En_9_Chapter.xhtml#Fig4):


    *   Power supply, motherboard, CPU, and RAM chip(s)


    Less essential components depicted with an aggregate association:


    *   Storage unit (e.g., a hard drive), input device (e.g., mouse and/or keyboard),
    and display adapter/video card (an integrated video chip may come with the CPU)


    See Table [9-2](#507458_1_En_9_Chapter.xhtml#Tab2) for a summary on the differences
    between aggregate and composite associations.


    Table 9-2


    The main differences between aggregate and composite associations in UML


    |   | Aggregate | Composite |

    | --- | --- | --- |

    | Association strength | Weak | Strong |

    | Relationship | “Has-a” | “Part-of” |

    | Dependency | Subclasses can exist whether the superclass exists or not | Subclasses
    need a superclass to exist |

    | Examples | Even when a class of *students* graduate, a *university* remainsClosing
    down a single *department* will not end the entire *corporation* | *Rooms* are
    meaningless without a *house*A functional *heart* is needed for a *human being*
    to live |


    ## Realization and Dependency in UML


    Realization refers to a relationship with two sets of elements, one of which represents
    a *specification* and the other its *implementation.* The actual workings of an
    implementation depend on the context and are not strictly defined in UML (see
    Figure [9-5](#507458_1_En_9_Chapter.xhtml#Fig5)).


    ![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig5_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Three examples of simple realization relationships in UML


    In the diagram in Figure [9-5](#507458_1_En_9_Chapter.xhtml#Fig5), you’ll see
    three simple examples of UML realization relationships. In the first one, a search
    algorithm provides the functionality for an online search engine. Similarly, video
    card driver software is needed for a video card to actually display any visuals.
    Finally, a payment event is made possible by three available types of payment
    method: cash, card, or check.


    Next, we have the *dependency* (see Figure [9-6](#507458_1_En_9_Chapter.xhtml#Fig6)).
    This type of diagram denotes a connection between dependent and independent elements.
    Depicted using a dotted line and a simple arrowhead, dependencies are unidirectional
    in nature.


    ![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig6_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Two examples of UML dependency


    ## Reflexive Association


    A *reflexive association* is there to represent instances belonging into the same
    class. When a class can be split into numerous responsibilities, we can use this
    type of association.


    In Figure [9-7](#507458_1_En_9_Chapter.xhtml#Fig7), we have a class called *Employee*
    with an association with itself as depicted by a now familiar simple line*.* The
    Employee class is used to represent both esteemed supervisors and lowly trainees;
    you’ll notice UML multiplicity information is also inserted into this diagram.


    ![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig7_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    An example of a reflexive association in UML


    Now, Figure [9-7](#507458_1_En_9_Chapter.xhtml#Fig7) depicts the same setting
    in two different ways. The diagram on the left shows a *role-based* approach,
    as we do have the two different roles on display (i.e., supervisor and trainee).
    The right diagram uses a *named association.*


    ## UML Class Diagrams: The Basic Elements


    At this point, it would be a good idea to review the elements of UML we’ve encountered
    so far (see Figure [9-8](#507458_1_En_9_Chapter.xhtml#Fig8)).


    ![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig8_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    A diagram showing most of the basic elements used in UML class diagrams'
