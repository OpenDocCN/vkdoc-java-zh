  trans: "\n## 在 Java 中实现多线程\n\n线程可以归类为多种状态，这些状态共同构成了*线程生命周期*。接下来，我们详细了解一下这五个阶段：\n\
    \n1.  **新建**：线程被创建。\n\n2.  **可运行**：顾名思义，处于此阶段的线程正在执行其任务，无论任务是什么。\n\n3.  **等待**：当线程与其他线程协作，并暂时完成其处理，让其他线程接管时，就会进入此阶段。处于此阶段的线程正在等待其他线程的“许可”以恢复其工作负载。\n\
    \n4.  **定时等待**：当线程暂时完成其任务，但未来需要在特定时间点再次执行时，会进入此非活动阶段。\n\n5.  **终止**：当线程完成其所有任务后，它就会消亡。\n\
    \n    你可能听说过计算领域的*多任务处理*。这个概念指的是多个进程（即软件片段）共享同一组资源，例如 CPU。通过多线程，单个程序内的任务被拆分为独立的执行线程。\n\
    \n让我们看一个演示 Java 多线程的实际程序（参见清单 5-1）。\n\n```\n// 让 HappyThreadClass 继承 Thread 类的方法\n\
    // 使用关键字 \"extends\"\nclass HappyThreadClass extends Thread {\npublic HappyThreadClass(String\
    \ str)\n{\n// super 关键字用于访问父类中的数据\n// （此处为 \"Thread\" 类）\nsuper(str);\n}\n// 使用\
    \ run 方法让线程在执行时执行操作\npublic void run() {\n// 每个线程迭代四次，显示每一步\nfor (int i = 0; i\
    \ < 4; i++) {\nSystem.out.println(\"步骤 \"+ i + \" 属于 \" + getName());\n}\nSystem.out.println(\"\
    完成处理 \" + getName() + \"！\");\n}\n}\npublic class Thread_Demo {\n// 添加 main 方法\n\
    public static void main(String[] args){\n// 创建并执行三个线程\nnew HappyThreadClass(\"\
    线程 A\").start();\nnew HappyThreadClass(\"线程 B\").start();\nnew HappyThreadClass(\"\
    线程 C\").start();\n}\n}\n清单 5-1\n一个演示多线程的 Java 代码清单\n```\n\n在清单 5-1 的第二行，你会看到一个关键字\
    \ *extends*。在 Java 中，这表示一个类继承另一个类的方法和构造器。在我们的例子中，*HappyThreadClass* 获得了 Thread\
    \ 类（在 Java SDK 中称为 *Java.lang.Thread*）的功能。稍后在清单中，我们将看到一些源自 Thread 的方法的实际应用，即 *getName(\
    \ )* 和 *start( )* 方法。前者返回线程的名称，后者则执行一个线程。\n\n尽管清单 5-1 的输出是按顺序呈现的，但其中的三个线程是根据多线程方法的要求并发运行的（参见图\
    \ 5-2）。\n\n此外，连续多次运行该清单，你可能会发现不同的线程以不同的顺序显示其输出。这对于一个未同步的程序来说是完全正常的。\n\n![../images/507458_1_En_5_Chapter/507458_1_En_5_Fig2_HTML.jpg](img/507458_1_En_5_Fig2_HTML.jpg)\n\
    \n图 5-2\n\n清单 5-1 中程序流程的简化示意图\n\nCPU 提供的处理能力是一种有限的资源。因此，多个执行线程被分配了*优先级级别*，这有助于你的操作系统对它们的处理进行优先级排序。这主要是一个自动化过程，取决于计算机资源的当前状态。\n\
    \n## 线程同步\n\n尤其是在大型项目中，多个线程绝对需要协同工作。幸运的是，Java 非常重视这种方法。Java 上下文中的*线程同步*指的是控制多个线程对共享资源的访问。为什么要同步呢？嗯，如果没有这种方法，多个线程可能会同时尝试访问同一数据。这对于数据的有序性和稳定性是不利的。\n\
    \n要在 Java 中简单地实现同步，可以使用 *synchronized* 语句。这种方法可以在三个级别上使用：静态方法、实例方法和代码块。以清单 5-1\
    \ 为例。只需对函数声明稍作修改（即 public *synchronized* void run( )），我们就能从程序中获得更有序的输出。\n\n##\
    \ 同步块\n\n我们甚至不必同步整个方法；我们可以自由选择在何处使用该技术。同步代码块将一个*监视器锁*绑定到一个对象上。然后，同一对象类型的所有同步块只允许单个线程同时执行它们。\n\
    \n要添加简单的块级同步，你可以在方法内部使用 *synchronize(this) { ... }* 来标记一个块。括号内接受一个对象；在我们的示例中，我们使用了关键字\
    \ *this* 来引用它所属的（当前不存在的）方法。\n\n## 关于公平性与饥饿\n\n在 Java 术语中，当一个线程（或一组线程）没有获得足够的 CPU\
    \ 资源来正确执行时，就会发生*饥饿*，因为这些宝贵的“资源”被其他更贪婪的线程霸占了。对这些宝贵 CPU 资源的均衡分配系统称为*公平性*。Java 中饥饿的主要元凶之一实际上在于基于块的同步。处理饥饿的主要方法是通过适当的线程优先级设置和使用*锁*。\n\
    \n## Java 中的锁\n\n现在，Java 中的每个对象都有一个所谓的*锁属性*。这个机制的存在是为了只允许那些被特别授予权限的线程访问对象数据。当这样的线程完成对对象的操作后，它会执行*锁释放*，使锁恢复到可用状态。使用锁是\
    \ Java 中比基于块的方法更复杂的同步形式（参见表 5-1）。\n\n表 5-1\n\nJava 中基于块和基于锁的同步的主要区别\n\n|   | 块同步（例如，*synchronize(this)\
    \ ...)* | 基于锁的同步 |\n| --- | --- | --- |\n| **公平性** | 不支持 | 支持 |\n| **等待状态** |\
    \ 不可中断 | 可中断 |\n| **释放** | 自动 | 手动 |\n| **能否查询锁** | 否 | 能 |\n"
- fmt: "# Some Essential Thread Methods at a Glance\n\nNow would be a good time to\
    \ recap some key methods found in `java.lang.Thread` (see Table 5-2). These and\
    \ many other methods will become increasingly familiar to you as we proceed with\
    \ this book.\n\n**Table 5-2** Some methods from Java’s `Thread`-class (`java.lang.Thread`)\n\
    \n| Method | Description | Example(s) |\n| --- | --- | --- |\n| `getName()` |\
    \ Returns a thread’s name | `System.out.println(\"I am a \" + getName());` |\n\
    | `setPriority()` | Sets a thread’s priority. Takes a number between 1 and 10\
    \ | `Orange.setPriority(10);` `Peach.setPriority(1);` |\n| `getPriority()` | Returns\
    \ a thread’s priority | `System.out.println(\"Priority for \" + getName() + \"\
    : \" + getPriority());` |\n| `getState()` | Returns a thread’s state | `State\
    \ state = currentThread().getState();` `System.out.println(\"Thread: \" + currentThread().getName());`\
    \ `System.out.println(\"State: \" + state);` |\n| `interrupt()` | Stops a running\
    \ thread | `SomeClass.interrupt();` |\n| `interrupted()` | Returns whether a thread\
    \ is interrupted or not | `if (ShoeFactory.interrupted()) { System.out.println(\"\
    The thread has been interrupted!\"); }` |\n| `currentThread()` | Returns a reference\
    \ to the currently executing thread | `Thread gimme = Thread.currentThread();`\
    \ `Thread niceThread = new Thread(this, \"Nice Thread\");` `System.out.println(\"\
    This is the \" + gimme + \" thread\");` |\n| `sleep()` | Puts a thread into sleep\
    \ for a specific amount of milliseconds | `Thread.sleep(50); // 50 milliseconds\
    \ of rest` `Thread.sleep(1000); // One second nap` |\n| `wait()` | Puts a thread\
    \ into waiting until another thread executes the `notify` method on it | `System.out.println(\"\
    Waiting..\");` `try { wait(); } catch(Exception e) { }` |\n| `notify()` | Resumes\
    \ a single thread in waiting state | `synchronized(bananaObject) { bananaObject.notify();\
    \ System.out.println(\"Processing complete!\"); }` |\n| `start()` | Executes a\
    \ thread | `new FruitThreads(\"Banana\").start();` `myClass CarFactory = new myClass();\
    \ CarFactory.start();` |\n\n## The Try-Catch Block\n\nTo handle errors in Java,\
    \ programmers can implement the *try-catch block*. Code inside the `try` block\
    \ is monitored for errors, and should one occur, the program switches over to\
    \ code inside the `catch` block. This approach is also referred to as *exception\
    \ handling*. Take a look at Listing 5-2 to see the mechanic in action.\n\n```\n\
    public class TryCatchDemo {\n    public static void main(String[] args) {\n  \
    \      int happyNumber = 20;\n        try {\n            // Divide twenty with\
    \ zero (uh oh..)\n            happyNumber /= 0;\n            System.out.println(happyNumber);\n\
    \        } catch (Exception e) {\n            // Display our error message\n \
    \           System.out.println(\"We have an error.\");\n        }\n    }\n}\n\
    ```\n\n*Listing 5-2* A simple demonstration of the try-catch block (i.e., exception\
    \ handling) in Java\n\n## Finally: More Fun with Try-Catch Blocks\n\nYes, there’s\
    \ even more enjoyment to be had with Java’s try-catch blocks. An optional block\
    \ called `finally` is executed whether an exception comes up in the preceding\
    \ try-catch or not; this is great for ensuring any specific critical actions are\
    \ to be run after either event. See Listing 5-3 for a simple example of using\
    \ the `finally` block in Java.\n\n```\npublic class TryCatchFinally {\n    public\
    \ static void main(String[] args) {\n        // Begin a try-catch block\n    \
    \    try {\n            // happyArray is allocated to hold five integers\n   \
    \         // (The count starts from zero in Java)\n            int happyArray[]\
    \ = new int[4];\n            // Be naughty and assign the value of 14 into\n \
    \           // a non-existent sixth element in happyArray\n            happyArray[5]\
    \ = 14;\n        } catch(ArrayIndexOutOfBoundsException e) {\n            System.out.println(\"\
    We encountered a medium-sized issue with an array..\");\n        }\n        //\
    \ Implement a finally-block which is executed regardless of\n        // what happened\
    \ in the try-catch block\n        finally {\n            System.out.println(\"\
    You are reading this in Alan Partridge's voice!\");\n        }\n    }\n}\n```\n\
    \n*Listing 5-3* A Java listing demonstrating a `finally` block during exception\
    \ handling\n\n## Throw: Your Custom Error Message\n\nTo create exceptions/error\
    \ messages of our own, we can use the `throw` statement in Java (see Listing 5-4).\
    \ Using `throw`, we get more detailed error messages pointing out the offending\
    \ lines in the code.\n\n```\npublic class FruitChecker {\n    // Create method\
    \ for checking type of fruit\n    static void checkFruit(String fruit) {\n   \
    \     // Display our custom error message if fruit does not equal \"Lemon\"\n\
    \        if (!fruit.equals(\"Lemon\")) {\n            throw new RuntimeException(\"\
    Only lemons are accepted.\");\n        } else {\n            System.out.println(\"\
    Lemon detected. Thank you!\");\n        }\n    }\n\n    public static void main(String[]\
    \ args) {\n        checkFruit(\"Lemon\");\n        checkFruit(\"Orange\");\n \
    \   }\n}\n```\n\n*Listing 5-4* A Java listing demonstrating the use of the `throw`\
    \ statement\n\nExceptions in Java are basically signals that something has gone\
    \ wrong during the execution of a program. There are numerous types of exceptions\
    \ available for the programmer to implement.\n\nIn Listing 5-4, the term `RuntimeException`\
    \ refers to a general type of error; we chose to throw one out in case we don’t\
    \ encounter a lemon. Since we run the `checkFruit()` method for both a “Lemon”\
    \ and an “Orange,” we get both an exception-free message as well as one with an\
    \ exception. See the output from Listing 5-4:\n\n```\nLemon detected. Thank you!\n\
    \nException in thread \"main\" java.lang.RuntimeException: Only lemons are accepted.\n\
    \    at FruitChecker.checkFruit(FruitChecker.java:8)\n    at FruitChecker.main(FruitChecker.java:17)\n\
    ```\n\nLet’s take a look at some other common exceptions available in Java next:\n\
    \n*   **`ArrayIndexOutOfBoundsException`**: This exception is thrown when accessing\
    \ an item of an array at an index which is not there (i.e., the index is outside\
    \ of the allocated size of an array).\n*   **`ArithmeticException`**: Thrown when\
    \ an arithmetic operation fails.\n*   **`ClassNotFoundException`**: As you might\
    \ guess, this is thrown when trying to access a class that is nowhere to be found.\n\
    *   **`NumberFormatException`**: Thrown when a method is unable to convert a string\
    \ into a numeral.\n*   **`NoSuchFieldException`**: Thrown when addressing a variable\
    \ that is missing from a class.\n*   **`RuntimeException`**: As seen in Listing\
    \ 5-3, this exception is used for any general error during program execution.\n\
    \n## Checked and Unchecked Exceptions\n\nThere are basically two categories of\
    \ exceptions in Java: *checked* and *unchecked*. The former is used when addressing\
    \ errors found outside of the program’s grasp, for example, issues with file operations\
    \ or network transfers. Unchecked exceptions, sometimes also called *runtime exceptions*,\
    \ deal with problems within the programming logic such as invalid arguments and\
    \ unsupported operations. See Table 5-3 for a more detailed rundown on the differences\
    \ between these two types of exceptions.\n\n**Table 5-3** The main differences\
    \ between checked and unchecked exceptions in Java\n\n| | Checked exceptions |\
    \ Unchecked/runtime exceptions |\n| --- | --- | --- |\n| **Main area of effect**\
    \ | External, outside of program | Internal, within program |\n| **Examples**\
    \ | Issues with file access or network connectivity, problems with external databases\
    \ | Flawed programmatic logic; errors with class definitions, arithmetic operations,\
    \ or variable conversions |\n| **Detection** | During compilation of program |\
    \ During program execution |\n| **Priority level** | Critical: cannot be ignored.\
    \ Program will fail to execute | Severe: should not be ignored. Program will run,\
    \ but remains more or less unstable |\n\nWe’ll go into even more detail with Java’s\
    \ quite exceptional exception handling later in the book."
