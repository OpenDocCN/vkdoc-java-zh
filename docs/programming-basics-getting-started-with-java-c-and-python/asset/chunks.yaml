- fmt: '# The `CultureInfo` Class


    The `CultureInfo` class provides us with the means of localizing our programs
    in C#. This includes displaying time, calendar, and currency information tailored
    to specific locales. To grant us access to the `CultureInfo` class, we’ll need
    to have our program again use the namespace `System.Globalization`.


    C# uses *language-culture codes* for its localization. In the listing to follow,
    we used four, that is, `en-US`, `fi-FI`, `se-SE`, and `es-ES`. The first two letters
    in this code represent a language, while the second, capitalized pair of letters
    refer to a specific region. For example, the German language (`de`) can be represented
    with additional culture codes, for example, `de-AT` (Austria), `de-CH` (Switzerland),
    and `de-LI` (Lichtenstein). Now, see Listing [7-3](#507458_1_En_7_Chapter.xhtml#PC3)
    for a demonstration.


    The language-culture codes in C# are based on the *ISO 3166-1 Country list*. A
    total of 249 language-culture codes are supported as of 2021.


    ```

    using System;

    using System.Globalization;

    public class CultureInfoExample

    {

    public static void Main()

    {

    // Create an array of four CultureInfo-objects called "jollycultures"

    CultureInfo[] jollycultures = new CultureInfo[] {

    new CultureInfo("en-US"), // US

    new CultureInfo("fi-FI"), // Finnish

    new CultureInfo("se-SE"), // Sami in Northern Sweden

    new CultureInfo("es-ES")}; // Spanish

    // Create a new DateTime-object, "date1", assigning calendar-information into
    it

    DateTime date1 = new DateTime(1952, 12, 1, 15, 30, 00);

    // Display unformatted date

    Console.WriteLine("The special date is " + date1 + " in your current locale.\n");

    // Use the foreach-keyword to loop through all of the jollycultures-objects

    // and display their contents, using "i" as a temporary iterator-variable

    foreach (CultureInfo i in jollycultures)

    {

    Console.WriteLine("This date in {0} is.. {1} ({2})", i.EnglishName, date1.ToString(i),
    i.Name);

    }

    }

    }

    Listing 7-3

    A listing demonstrating the use of localization in C# using the CultureInfo class

    ```


    In Listing [7-3](#507458_1_En_7_Chapter.xhtml#PC3), we created four instances
    of class `CultureInfo` to demonstrate the locales of the United States, Finland,
    Sami (in Northern Sweden), and Spain as they pertain to C#.


    We went with the solution to use a `foreach` element when displaying `CultureInfo`
    objects. A `foreach` in C# is an alternative to the `for`-loop and one that tends
    to be better suited when iterating through arrays. This element works beautifully
    with instances of `CultureInfo`, for one.


    Now it’s time for a small example of currency formatting (see Listing [7-4](#507458_1_En_7_Chapter.xhtml#PC4)).


    ```

    using System.Globalization;

    public class JollyCurrencies

    {

    public static void Main()

    {

    int cash = 10000;

    // Display cash amount without currency-format

    Console.WriteLine("No currency-format: " + cash.ToString());

    // Set CurrentCulture to Finnish in Finland.

    Thread.CurrentThread.CurrentCulture = new CultureInfo("fi-FI");

    // Add the appropriate currency-format using "c"

    Console.WriteLine("Finnish currency-format: " + cash.ToString("c"));

    // Set CurrentCulture to Belarusian in Belarus and display string

    Thread.CurrentThread.CurrentCulture = new CultureInfo("be-BY");

    Console.WriteLine("Belarusian currency-format: " + cash.ToString("c"));

    // Set CurrentCulture to Chinese in People''s Republic of China

    Thread.CurrentThread.CurrentCulture = new CultureInfo("zh-CN");

    Console.WriteLine("Chinese currency-format: " + cash.ToString("c"));

    }

    }

    Listing 7-4

    A listing demonstrating currency formats in the C# CultureInfo class

    ```


    In Listing [7-4](#507458_1_En_7_Chapter.xhtml#PC4), we create and display three
    different currency formats for Finnish, Belarusian, and Chinese languages, respectively.
    The method `ToString("c")` is there to designate a currency.


    ## The `File` Class in C#


    C# offers versatile facilities for all types of file manipulation through a class
    simply called `File`. We can read and display text files, create new ones, and
    retrieve numerous types of attributes such as creation date—and much more.


    In Listing [7-5](#507458_1_En_7_Chapter.xhtml#PC5), we create a new file from
    within C# we’ll call `apress.txt`. Inside it, we’ll write a little message (“Apress
    is the best publisher!”). Not stopping there, we’ll proceed to read and display
    the contents of the file we just created.


    To use the `File` class, we need the `System.IO` namespace in our program.


    ```

    using System;

    using System.IO;

    class HappyTextWriter

    {

    static void Main(string[] args)

    {

    using (TextWriter happywriter = File.CreateText("c:\\apress.txt"))

    {

    happywriter.WriteLine("Apress is the best publisher!");

    }

    Console.WriteLine("Textfile created in C:\n\nIt reads:");

    // Open the file we just created and display its contents

    using (TextReader happyreader1 = File.OpenText("c:\\apress.txt"))

    {

    Console.WriteLine(happyreader1.ReadToEnd());

    }

    }

    }

    Listing 7-5

    A listing demonstrating the TextWriter and TextReader classes in C#

    ```


    Text files aside, there is another file format for us to work with. In Listing
    [7-6](#507458_1_En_7_Chapter.xhtml#PC6), we’ll work with this other main type:
    *binary files*. This format is very versatile and can store text, numbers, and
    basically anything we could ever use. In the next listing, we’ll be creating a
    binary file and storing a floating-point number, a string of text, and a boolean
    variable into it. Again, we need to leverage the `File` class using the `System.IO`
    namespace.


    ```

    using System;

    using System.IO;

    class JollyBinaryTest {

    static void Main(string[] args)

    {

    string filename1 = "c:\\binarystuff.dat"; // Define our path and filename

    /* Create a new BinaryWriter-object (writer1) and save three lines/types of  information
    into it */

    using (BinaryWriter writer1 = new BinaryWriter(File.Open(filename1, FileMode.Create)))

    {

    writer1.Write(55.52F);  // Write a floating point number

    writer1.Write("Oranges are great"); // Write a string

    writer1.Write(true); // Write a boolean (true/false) variable

    }

    Console.WriteLine("Data written into binary file " + filename1 + "!\n");

    /* Create a new BinaryReader-object (reader1) and use it to decipher the binary
    data in our file using the appropriate methods, e.g. ReadSingle() for the floating
    point */

    using (BinaryReader reader1 = new BinaryReader(File.Open(filename1, FileMode.Open)))

    {

    Console.WriteLine("First line: " + reader1.ReadSingle() ); // Read a floating
    point

    Console.WriteLine("Second line: " + reader1.ReadString() ); // Read a string

    Console.WriteLine("Third line: " + reader1.ReadBoolean() ); // Read a boolean
    variable

    }

    }

    }

    Listing 7-6

    A listing demonstrating the BinaryWriter and BinaryReader classes in C#

    ```


    When working with nonspecific binary files, it’s somewhat customary to use the
    file extension `.dat`—as in data.'
