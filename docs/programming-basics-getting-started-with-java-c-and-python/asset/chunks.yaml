    \ Python 代码清单\n```\n\n代码清单 4-12 再次从定义一个空类开始。然而，这次我们将属性绑定到该类，而不仅仅是它的对象。从代码清单的输出可以明显看出，向类中添加任何数据都不会覆盖对象先前已有的绑定。\n\
    \n## 本章小结\n\n完成本章后，希望你已掌握以下内容：\n\n*   面向过程编程与面向对象编程（OOP）范式的主要区别\n*   在 OOP 语境下，抽象、继承和封装分别指代什么\n\
    *   如何在 Java 和 C# 中定义类并基于它们创建对象\n*   OOP 中 public 和 static 方法的区别，以及访问修饰符的基础知识\n\
    *   什么是构造函数，如何使用它们以及如何重载方法\n*   统一建模语言（UML）的基础知识\n\n至此，本书中相当密集的一章——第 4 章——就结束了。在下一章中，我们将深入探讨一些高级\
    \ Java 主题，例如文件操作和多线程。\n\n# 5. 文件操作、多线程及其他 Java 奇妙特性\n\n到现在为止，你可能已经相当熟悉这门名为 Java\
    \ 的强大面向对象语言中至少基本的编程元素了。现在是时候转向更高级的概念了。在本章稍后部分，我们将从 Java 中的多线程和基本错误处理开始。接着，我们最终会讨论到文件操作这个有趣的主题。\n\
    \n## 多线程：核心与线程\n\nJava 支持*多线程*，这基本上是指将一个程序拆分成多个并发运行的部分。这通常会显著加快任何算法的执行时间。多线程有时也被称为*并发*。\n\
    \n多线程的概念与*处理器核心*密切相关，后者指的是硬件层面：中央处理器单元（CPU）。较老一代的 CPU，比如 2005 年之前的，通常只有一个核心。你很难在\
    \ 2021 年找到一款全新的单核处理器。如今大多数 CPU 至少由两个核心组成。这些核心负责处理你输入计算机的所有数据（参见图 5-1）。\n\n![../images/507458_1_En_5_Chapter/507458_1_En_5_Fig1_HTML.jpg](img/507458_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1\n\n一个展示双核 CPU 内部多线程的简单示意图\n\n一般来说，你的系统拥有的核心越多，其数字处理能力就越强。这取决于你的操作系统以及它是否支持多核计算；实际上，所有现代操作系统都具备这样做的能力。然而，并非所有第三方软件都经过编写以充分利用多核处理。在这种情况下，该软件只会使用系统的一个核心。\n\
    \n现在，并发运行的线程数量通常不等于 CPU 可支配的核心数量。请记住，单个软件应用程序可以为各种任务调用大量线程。这意味着一个单核系统可能同时执行多个线程。多核\
    \ CPU 提供的是在多个核心之间分担所有这些线程工作负载的可能性。在拥有六个或更多 CPU 核心的系统上，这可以带来计算速度的巨大提升。\n\n你可能会不时遇到*超线程*这个术语。这指的是英特尔的专有技术，理论上，它可以使处理器物理配备的\
    \ CPU 核心数量翻倍。超线程技术于 2002 年引入，它与操作系统协同工作以增加可用核心数量。英特尔声称，与没有超线程技术的相同 CPU 相比，配备超线程技术的\
    \ CPU 能提供全面的显著性能提升。然而，在实际场景中，超线程带来的收益在很大程度上取决于具体的应用程序。该技术在视频编辑和 3D 建模等 CPU 密集型场景下确实表现出色。\n"
- fmt: '# Implementing Multithreading in Java


    Threads can be categorized into various states, which then constitute a *thread
    life cycle*. Let’s next go through these five stages in detail:


    1. **New**: A thread is born.

    2. **Runnable**: Like the name implies, a thread in this stage is running its
    tasks, whichever they might be.

    3. **Waiting**: A thread enters this stage when it’s working with other threads
    and has completed their processing for the time being, letting others take the
    reins. A thread in this stage is awaiting the “okay” from others to resume its
    workload.

    4. **Timed waiting**: Threads enter this stage of inaction when they have completed
    their task(s) for the time being, but are needed in the future at a specific point
    in time.

    5. **Termination**: When a thread has completed all of its tasks, it dies.


    You may have heard of *multitasking* in the context of computing. This concept
    refers to several processes (i.e., pieces of software) sharing the same set of
    resources, such as a CPU. With multithreading, tasks within a single program are
    split into individual threads of execution.


    Let’s glance at an actual program which demonstrates multithreading in Java (see
    Listing [5-1](#507458_1_En_5_Chapter.xhtml#PC1)).


    ```

    // Make HappyThreadClass inherit methods from Thread-class

    // using the keyword "extends"

    class HappyThreadClass extends Thread {

    public HappyThreadClass(String str)

    {

    // The super-keyword is used to access data from a parent-class

    // (Class "Thread" in this case)

    super(str);

    }

    // Make the thread do things while executing using the run-method

    public void run() {

    // Iterate each thread four times, displaying each step

    for (int i = 0; i < 4; i++) {

    System.out.println("Step "+ i + " of " + getName());

    }

    System.out.println("Done processing " + getName() + "!");

    }

    }

    public class Thread_Demo {

    // Add main method

    public static void main(String[] args){

    // Create and execute three threads

    new HappyThreadClass("Thread A").start();

    new HappyThreadClass("Thread B").start();

    new HappyThreadClass("Thread C").start();

    }

    }

    Listing 5-1

    A listing in Java demonstrating multithreading

    ```


    On the second line in Listing [5-1](#507458_1_En_5_Chapter.xhtml#PC1), you’ll
    see a new keyword, `extends`. In Java, this has a class inherit the methods and
    constructors of another class. In our case, `HappyThreadClass` receives the functionality
    of the `Thread`-class (referred to as `Java.lang.Thread` in the Java SDK). Later
    in our listing, we’ll see some methods derived from thread in action, namely,
    the `getName()` and `start()` methods. The former returns a thread’s name, while
    the latter executes a thread.


    Although the output from Listing [5-1](#507458_1_En_5_Chapter.xhtml#PC1) is presented
    in an ordered fashion, the three threads within are run concurrently as per the
    approach of multithreading dictates (see Figure [5-2](#507458_1_En_5_Chapter.xhtml#Fig2)).


    Also, upon running the listing several times in a row, you may discover the different
    threads display their output in differing orders. This is perfectly normal for
    an unsynchronized program.


    ![../images/507458_1_En_5_Chapter/507458_1_En_5_Fig2_HTML.jpg](images/507458_1_En_5_Chapter/507458_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    A simplified diagram of the programmatic flow in Listing [5-1](#507458_1_En_5_Chapter.xhtml#PC1)


    Processing power afforded by a CPU is a limited resource. Multiple threads of
    execution are therefore assigned *priority levels* which help your operating system
    prioritize their processing. This is a mostly automated process dependent on the
    current state of your computer’s resources.


    ## Thread Synchronization


    Especially in larger projects, multiple threads absolutely need to work together.
    Thankfully, Java takes to this approach seriously. *Thread synchronization* in
    the context of Java refers to controlling the access of multiple threads to a
    shared resource. Why synchronize at all? Well, without the approach, several threads
    might try to access the same data at the same time. This is not good for data
    ordering or stability.


    To implement synchronization in Java the simple way, you use the statement `synchronized`.
    This approach can be used on three levels: static methods, instance methods, and
    code blocks. Take Listing [5-1](#507458_1_En_5_Chapter.xhtml#PC1), for example.
    Just by a slight modification of the function declaration (i.e., `public synchronized
    void run()`), we get a more ordered output from the program.


    ## Synchronizing Blocks


    We don’t have to even synchronize entire methods; we can pretty much pick and
    choose where to use the technique. Synchronized code blocks bind a *monitor lock*
    to an object. All synchronized blocks of the same object variety then allow only
    a single thread to execute them simultaneously.


    To add simple block-level synchronization, you denote a block inside a method
    with `synchronize(this) { ... }`. The parentheses take an object; in our example,
    we used the keyword `this` to refer to a (currently nonexistent) method it’s a
    part of.


    ## On Fairness and Starvation


    In Java parlance, *starvation* comes into effect when a thread (or group of them)
    is not given enough CPU resources to execute properly, as in this “juice” is being
    hogged by other, greedier threads. An equal distribution system of those precious
    CPU resources is called *fairness*. One of the main culprits of Java starvation
    lies actually in block-based synchronization. The primary way of dealing with
    starvation is through proper thread prioritization and the use of *locks*.


    ## Locks in Java


    Now, every object in Java has what is known as a *lock property*. This mechanism
    is there to allow only those threads which are specifically granted permission
    to access object data. After such a thread is done working with an object, it
    performs a *lock release*, which returns the lock into a state of availability.
    Using locks is a more sophisticated form of synchronization in Java than the block-based
    approach (see Table [5-1](#507458_1_En_5_Chapter.xhtml#Tab1)).


    Table 5-1


    The main differences between block- and lock-based synchronization in Java


    | | Block synchronization (e.g., `synchronize(this) ...`) | Lock-based synchronization
    |

    | --- | --- | --- |

    | **Fairness** | Not supported | Supported |

    | **Waiting state** | Cannot be interrupted | Can be interrupted |

    | **Release** | Automatic | Manual |

    | **Can query for lock** | No | Yes |'
