    \ 8-5）。\n\n程序中的计分基于虚拟聊天者发送的聊天消息数量；每条消息价值 3 分。现在，这个模拟器程序有两种结局。在“坏”结局中，观看者只会被告知虚拟聊天主持人的情绪降到了零。另一个更乐观的结局则会给观看者一个价值\
    \ 1000 分的“欣快感奖励”。\n\n```\n# 游戏结束\nscore = messages_sent * 3  # 每条来自聊天的消息价值 3 分\n\
    if mood <= 0:\n    print(\"虚拟主持人的情绪降到了零。游戏结束。\")\nelif mood >= 100:\n    print(\"\
    虚拟主持人欣喜若狂！你获得了 1000 分的欣快感奖励！\")\n    score += 1000\n# 保存最高分\nif score > int(hiscore):\
    \  # 如果当前分数大于存储的最高分\n    print(\"创造了新的最高分！\")\n    scorefile.seek(0)  # \"回退\"\
    到文件开头\n    scorefile.write(str(score))  # 将新分数写入 \"highscore.txt\"\nelse:\n  \
    \  print(\"当前最高分：%s\" % hiscore)\n代码清单 8-5\n通用聊天模拟器（Python 版）代码清单的第五部分，也是最后一部分\n\
    ```\n\n我们在代码清单 8-4 中使用了相当多的方法。作为回顾，让我们记录一下通用聊天模拟器使用的主要 Python 方法（见表 8-1）。\n\n\
