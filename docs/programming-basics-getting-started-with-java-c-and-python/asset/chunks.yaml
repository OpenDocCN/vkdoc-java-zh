- fmt: "# Bit-Derived Units Explained\n\nLike you probably know by now, the smallest\
    \ unit in computing is the bit. As with other quantities, it’s impractical to\
    \ measure things solely with the atomic unit. Therefore, we have bytes, megabytes,\
    \ and gigabytes, to name just three (see Table [3-2](#507458_1_En_3_Chapter.xhtml#Tab2)).\n\
    \nMetric units (i.e., units using multipliers of power of ten) worked fine for\
    \ the early days of personal computing. However, using these multipliers wasn’t\
    \ entirely accurate. For example, a 1 kilobyte file is actually 1024 bytes and\
    \ not 1000 (10³) as per the metric system.\n\nA typical hard drive with the stated\
    \ capacity of, say, 250 GB (i.e., 250,000,000,000 bytes) is actually 232.8 GB\
    \ in size. Hardware manufacturers don’t usually mention these things. Figure you\
    \ may go.\n\nIn 1998, the *International Electrotechnical Commission (IEC)* created\
    \ a more accurate measurement scheme. The new system used power-of-two multipliers.\
    \ For example, a kilobyte became a *kibibyte* of 1024 bytes in size (2^(10) =\
    \ 1024). These new units were sorely needed because they are much more accurate\
    \ for measuring larger data pools.\n\n**Table 3-2**\n\nA comparison of the most\
    \ commonly used metric and IEC-based data storage units\n\n| Metric unit | Value\
    \ (metric) | IEC unit | Value (IEC) |\n| --- | --- | --- | --- |\n| Bit (b) |\
    \ 0 or 1 (atomic/smallest unit) | | |\n| Byte (B) | Eight bits | | |\n| Kilobyte\
    \ (kB) | 1,000 bytes | Kibibyte (KiB) | 1024 bytes |\n| Megabyte (MB) | 1,000,000\
    \ bytes | Mebibyte (MiB) | 1,048,576 bytes (1024 kibibytes) |\n| Gigabyte (GB)\
    \ | 1,000,000,000 bytes (one billion bytes) | Gibibyte (GiB) | 1,073,741,824 bytes\
    \ (1024 mebibytes) |\n| Terabyte (TB) | 1,000,000,000,000 bytes (one trillion\
    \ bytes) | Tebibyte (TiB) | 1,099,511,627,776 bytes (1024 gibibytes) |\n\n# Multitasking\
    \ in 64 Bits\n\nOne of the major benefits of 64-bit computing is the greatly improved\
    \ *multitasking* when compared to older 32-bit architecture. Multitasking refers\
    \ to running several programs simultaneously. A typical programmer might have\
    \ a great big IDE, *Photoshop*, *Spotify*, and 50 tabs open in *Firefox* at the\
    \ same time on their computer. Having numerous gigabytes of RAM installed does\
    \ away with a lot of the stutter and slowdown usually associated with scenarios\
    \ involving running multiple programs. RAM upgrades are perhaps the most common\
    \ way to push one’s PC into higher performance.\n\n# Identifying Your Operating\
    \ System Architecture\n\nYou may want to check whether your operating system is\
    \ 32 or 64 bits in its architecture. It’s quick and easy.\n\n*   In Windows 10,\
    \ go to *Settings* ➤ *System* ➤ *About.* You’ll see the necessary details on this\
    \ page.\n\n*   In Linux, open a terminal window and type `arch` and press enter\
    \ to reveal your system architecture. An output displaying `x86_64` means you\
    \ have a 64-bit edition of Linux. An output of `i386` or `i686` is displayed for\
    \ 32-bit editions of this OS.\n\n*   As for *macOS,* every version of this operating\
    \ system has been 64 bits (with varying degrees of backward compatibility for\
    \ 32-bit software) since *Snow Leopard (10.6)* from 2009.\n\n# Installing Eclipse\
    \ for Java Development\n\nGood development environments provide search features,\
    \ syntax highlighting, and in some cases support for multiple programming languages.\
    \ We’ll first set you up with an environment specially made for Java development,\
    \ the mighty *Eclipse IDE* by the Eclipse Foundation (see Figure [3-1](#507458_1_En_3_Chapter.xhtml#Fig1)).\n\
    \n*The Eclipse Project* was originally created by IBM in November 2001. *The Eclipse\
    \ Foundation* then emerged in 2004 as an independent not-for-profit corporation.\
    \ It was created as an open and transparent community around Eclipse.\n\nEclipse\
    \ is available for *Windows*, *macOS*, and *Linux.* Visit the download page provided\
    \ in the following, and simply click the link which reflects the type of operating\
    \ system you’re running. However, there is one caveat. The newest versions of\
