    # About the Author


    # 1. Wet Toes: The Very Basics of Programming


    What do video games, social networks, and your activity bracelet have in common?
    They run on software a group of (more or less) programmers wrote somewhere far,
    far away. Gadgets and hardware are only one, more visible side of the coin of
    our technology-driven societies. In this chapter, we’ll discuss the very basics
    of programming. We’ll also take a gander at the visible parts of digital systems:
    the hardware.


    ## What Is Programming Anyway?


    Basically, programming is the act of telling digital devices, such as your personal
    computer, what to do. We type in listings of commands, as defined by a programming
    language, in order to have useful or entertaining events occur. Properly programmed
    computers run much of the communications and online services in the world. You
    can mention things like ATMs, ticket readers, and smart phones as gadgets that
    run on software that somebody created in some programming language.


    ## Basic Hardware Rundown


    As a budding programmer, you’ll benefit from understanding the kind of universally
    found electronics you’re working with. It’s a good idea to have at least a basic
    understanding of the most commonly found components inside a computer.


    These hardware components in a computer represent your work force. As a programmer,
    you run this show. Think of the act of programming as telling the factory workers
    what to build. You manufacture applications, whether they be big, complicated
    software projects or tutorials from some awesome book on coding.


    For the purposes of this book, any relatively modern desktop or laptop computer
    works fine. We won’t be needing any expensive hardware while getting our feet
    wet in programming.


    ## 1. Central Processing Unit (CPU)


    Naturally, a digital device can’t run on software alone; a **central processing
    unit (CPU)** is the hardware “brain” which executes code and makes things actually
    happen (see Figure [1-1](#507458_1_En_1_Chapter.xhtml#Fig1)). Even in a less complicated
    piece of electronics, all instructions flow toward and through a CPU (or a bunch
    of them). Being very small in size, these microchips have increasingly been a
    part of our lives since the 1970s. Every digital device has a CPU in it, probably
    even your stationary bicycle/clothes rack.


    ![../images/507458_1_En_1_Chapter/507458_1_En_1_Fig1_HTML.jpg](images/507458_1_En_1_Chapter/507458_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    A top-down view of an older Intel “Pentium 4” CPU used in millions of PCs back
    in 2005. Image by Eric Gaba. CC BY-SA 3.0


    ## 2. Hard Drives (a.k.a. Hard Disks)


    This component is there to store data just about permanently. Within a hard drive,
    you’ll find tens of thousands of files, whether they be pictures, text files,
    or databases. Your operating system (e.g., Windows or macOS), too, rests within
    the confines of a hard drive. These devices come in two varieties: *mechanical
    hard drives* (see Figure [1-2](#507458_1_En_1_Chapter.xhtml#Fig2)) and *solid
    state disks (SSDs).*


    ![../images/507458_1_En_1_Chapter/507458_1_En_1_Fig2_HTML.jpg](images/507458_1_En_1_Chapter/507458_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    A top-down view of a Western Digital mechanical hard drive. Image by “Darkone.”
    Licensed under CC BY-SA 2.5 ([creativecommons.​org/​licenses/​by-sa/​2.​5/​deed.​en](https://www.creativecommons.org/licenses/by-sa/2.5/deed.en))


    Mechanical drives are more affordable, but since they have moving parts inside,
    they are somewhat more easily damaged than SSDs by excessive vibration and extreme
    weather. In addition, solid state disks usually operate much faster.


    ## 3. Video Card


    *Video cards* are responsible for displaying a system’s visuals, whether they
    be plain text or dazzling 3D graphics in a modern video game. These devices come
    in a variety of configurations and prices, ranging from $30 word processor fiends
    to $1000 gaming monsters (see Figure [1-3](#507458_1_En_1_Chapter.xhtml#Fig3)).
    Computer monitors are typically connected directly to a video card.


    ![../images/507458_1_En_1_Chapter/507458_1_En_1_Fig3_HTML.jpg](images/507458_1_En_1_Chapter/507458_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    An Nvidia 7900GS video card from 2006


    The video card business has basically been a duopoly between *Nvidia* and *AMD,*
    two multibillion tech giants, ever since the early 2000s. However, Intel is making
    gains in this sector as well.


    ## 4. Random Access Memory (RAM)


    *Random access memory* , commonly called RAM, is used as a computer’s temporary
    storage. Physically it most often comes in the form of stick-like add-ons (see
    Figure [1-4](#507458_1_En_1_Chapter.xhtml#Fig4)). When running any type of software,
    your computer uses RAM to execute it from. Switching off your device will clear
    out your RAM. By contrast, data written on hard drives isn’t erased when powering
    off a computer. Save your documents on a regular basis.


    ![../images/507458_1_En_1_Chapter/507458_1_En_1_Fig4_HTML.jpg](images/507458_1_En_1_Chapter/507458_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    A typical stick of RAM. Image by Henry Kellner. CC BY-SA 4.0. Source: [`upload.wikimedia.org/wikipedia/commons/3/32/DDR3_RAM_53051.jpg`](https://www.upload.wikimedia.org/wikipedia/commons/3/32/DDR3_RAM_53051.jpg)


    As of 2021, 4 GB (i.e., *four gigabytes*) is an adequate amount of RAM to have
    for most uses. Power users, such as video editors, will benefit from having 16
    GB of RAM or more.


    ## 5. Motherboard


    All of the aforementioned four hardware components (i.e., the CPU, the video card,
    the hard disks, and RAM) come together at the motherboard to create a working
    computer unit. The motherboard also has connectors for keyboard, mice, and other
    control devices (see Figure [1-5](#507458_1_En_1_Chapter.xhtml#Fig5)).


    ![../images/507458_1_En_1_Chapter/507458_1_En_1_Fig5_HTML.jpg](images/507458_1_En_1_Chapter/507458_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    A modern PC motherboard. Image by Evan-Amos. CC BY-SA 3.0. Source: [`upload.wikimedia.org/wikipedia/commons/0/0c/A790GXH-128M-Motherboard.jpg`](https://www.upload.wikimedia.org/wikipedia/commons/0/0c/A790GXH-128M-Motherboard.jpg)'
