    ## 流程控制基础：循环


    除了变量之外，我们还有一系列逻辑结构可供使用，以便通过编码完成任务。这些结构构成了所谓的*流程控制*。当任何程序清单被输入后，计算机会从上到下读取它。很多时候，程序中的处理过程需要重复执行多次。因此，具备循环和条件程序流的能力就显得很有意义。


    编程中的循环可能会让你接触到*迭代*的概念。迭代是为了获得理想结果，通常按预设次数重复特定步骤的过程。在编程语境中，重复的动作序列被称为*循环*。创建这些循环的方法有很多，这也取决于所使用的编程语言。有关这些结构的示例实现，请参见表
    2-6。


    表 2-6


    三种语言中的流程控制示例


    | Java 中的“While 循环” | C# 中的“For 循环” | Python 中的“For 循环” |

    | --- | --- | --- |

    | // 让我们初始化一个变量 int i=3;**while** (i>0) {        System.out.println(“Three hellos”);        --i;}
    | // 这是一个有趣的循环**for**(int i=0; i<3; i++){Console.WriteLine(“Hello!”);} | # 这是一个有趣的循环**for**
    i in range(10):  print(“Hello number”,i) |


    ## While 循环


    表 2-6 中的第一种迭代方法是 Java 中演示的 while 循环。这种方法会持续执行操作，直到 while 函数中的条件得到满足。在我们的示例中，循环在变量
    *i* 大于零时运行。除了在屏幕上打印文本的命令语法存在差异外，表 2-6 中的 while 循环在 Java 和 C# 中是相同的。


    ## For 循环详解


    表 2-6 中 C# 的示例可能看起来有些复杂。这里讨论的结构，即 *for 循环*，是一种古老的技术，由几个元素组成，现在将对其进行讨论。


    头部（即从 *for* 开始的部分）包含了关于循环体（即花括号包围的部分）需要执行多少次的指令。在我们的示例中，头部部分如下所示：


    *   定义一个辅助数值变量 *i* 并将 *i* 的值设为零（int i=0;）。


    *   只要变量 *i* 小于三（i<3;），就执行循环体部分，之后继续执行程序。


    *   将 *i* 的值加一（i++）。


    同样，除了命令语法（即 System.out.println 与 Console.WriteLine）的差异外，表 2-6 中的中间示例在 Java 和 C#
    中是相同的。


    ## Python 中的循环


    你可能会注意到我们的 Python 循环中明显缺少分号和花括号。包含 print 命令的行仅通过缩进被包含在循环的代码块中。此外，与 Java 和 C# 中相对复杂的结构不同，Python
    中的 for 循环可以简单地使用一个名为 *range* 的巧妙函数来设置迭代次数。


    有时我们需要记录对代码的更改。虽然纸笔也可以，但更好的做法是在代码清单内部进行记录。为了添加计算机不会解析的行，我们可以在代码清单中插入特殊字符。对于 Java
    和 C#，我们使用两个正斜杠，而对于 Python，我们使用井号，如清单 2-5 所示。


    ## 结语


    完成本章后，希望你能够理解以下内容：


    *   解释型编程语言与编译型编程语言的主要区别

    *   在编程语境中变量是什么以及如何操作它们

    *   如何使用 Java、C# 和 Python 定义和操作变量并在屏幕上打印文本

    *   六个通用的变量比较运算符是什么

    *   面向对象编程（OOP）中的两个基本概念是什么

    *   程序化流程控制的基础知识，包括 if 语句和 for 循环


    在第 3 章中，我们将超越在线编译器，为你配置一些优秀的可下载软件，并加深你对本章所介绍概念的理解。在软件开发环境方面，我们将涵盖 Windows、macOS
    和 Linux。


    # 3. 搭建你的编程环境


    本章旨在向你介绍*集成开发环境*的乐趣。虽然在线编程环境对于你最初的几个程序清单来说还不错，但在你自己的计算机上拥有一些专用的编码软件会让你受益匪浅。幸运的是，有大量免费的
    IDE 可供你下载使用。我们将介绍适用于 2021 年最流行的三个操作系统的各种软件。但首先，我们将讨论另一个基本概念：*计算架构*。


    ## 关于计算架构


    一个*时钟周期*代表 CPU 内执行的一个单一操作。在每个时钟周期内，CPU 执行基本的内部操作，这些操作构成了计算机生态系统中任何更大任务的一部分。现在，*时钟速度*指的是
    CPU 每秒能够完成的时钟周期数，通常以*千兆赫（GHz）* 为单位表示。例如，一个 2.1 GHz 的 CPU 每秒提供 21 亿个时钟周期。CPU 每秒提供的时钟周期越多，系统处理数字的速度就越快。


    现在，术语*计算架构*用于描述 CPU 每个时钟周期可以处理多少数据。当前市场上主要有两种计算架构：32 位和 64 位。后者正迅速成为大多数计算领域的实际标准。为
    64 位架构编写的软件能更好地利用系统资源（如 RAM），同时通常比其 32 位版本执行速度更快。


    架构的实现涉及硬件和软件两个方面。只有 64 位 CPU 才能运行 64 位操作系统，同时仍能兼容较旧的 32 位软件（和操作系统）。然而，64 位操作系统通常甚至无法安装在配备
    32 位 CPU 的计算机上。


    自 21 世纪初以来，支持 64 位计算的 CPU 变得越来越流行。除非你使用的是非常古老的 PC，否则至少在硬件方面，你很可能已经为 64 位计算做好了准备。有关这两种架构的概要信息，请参见表
    3-1。


    大型企业正在逐步完全放弃 32 位技术。事实上，从 *macOS Catalina (10.15)* 开始，苹果公司就完全放弃了对 32 位软件的支持。微软也正在告别
    32 位世界。自 2020 年 5 月起，任何预装好的计算机将只搭载 64 位版本的 *Windows 10*。在这三大操作系统中，只有部分 *Linux*
    发行版仍在广泛支持 32 位硬件。


    表 3-1


    32 位与 64 位计算架构对比


    |   | 32 位架构 | 64 位架构 |

    | --- | --- | --- |

    | 特性 | 仅运行 32 位版本的操作系统，可运行大多数旧版 16 位软件 | 可运行 32 位和 64 位操作系统，通常不支持 16 位软件 |

    | 每台系统的理论最大 RAM | 4 GB 或 4,294,967,296 字节 | 171 亿 GB 或 18,446,744,073,709,551,616
    字节 |

    | 系统中典型的 RAM 容量 | 1 到 4 GB 之间 | 8 到 32 GB 之间 |


    就本书而言，你不需要运行任何 64 位软件；32 位操作系统完全没问题。但是，为了使你的设备在未来保持适用性，你应该考虑尽快迁移到 64 位操作系统。

