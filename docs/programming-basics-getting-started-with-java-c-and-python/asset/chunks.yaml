    ## Java 和 C# 中的变量声明


    现在我们来看看 Java 和 C# 中的变量。与 Python 不同，这些编程语言要求我们手动定义变量的数据类型。有关 Java 和 C# 中一些主要变量类型的详细说明，请参见表
    2-5。如你所见，在大多数情况下，这两种语言的变量类型声明是相同的。


    表 2-5


    Java 和 C# 的主要变量类型及其声明


    | 变量类型 | Java 和 C# | 变量范围 |

    | --- | --- | --- |

    | 整数（整型数） | *int* | 从 -2,147,483,648 到 2,147,483,647 |

    | 字符 | *char* | 单个字母数字字符（例如 B） |

    | 单精度浮点数 | *float* | 6 到 9 位小数的小数 |

    | 双精度浮点数 | *double* | 最多 17 位小数的小数 |

    | 布尔值（逻辑运算符） | *bool* | 真或假（即 1 或 0） |

    | 文本字符串 | *String (Java), string (C#)* | 任意数量的字母数字字符 |


    ## 尝试 Java 和 C#


    不仅限于 Python，Java 和 C# 也存在多个在线编译器。以下是一些供你选择的编译器。挑选一个你喜欢的，这样你也可以尝试用这些语言进行实时编码。


    *   **Jdoodle Java 编译器**：[`www.jdoodle.com/online-java-compiler`](http://www.jdoodle.com/online-java-compiler)


    *   **Paiza.io Java 编译器**：[`https://paiza.io/projects/fjCEFnDQzDWOoS9hYZtVtg?language=java`](https://paiza.io/projects/fjCEFnDQzDWOoS9hYZtVtg%253Flanguage%253Djava)


    *   **Dotnet Fiddle C# 编译器**：[`www.dotnetfiddle.net`](http://www.dotnetfiddle.net)


    *   **Rextester C# 编译器**：[`https://rextester.com`](https://rextester.com)


    ## 关于花括号、变量作用域和代码块


    在本章中，你很快就会遇到几个包含花括号的代码清单。它们确实是许多编程语言中的一个重要元素。这些花括号的作用是表示*代码块*，代码块由分组的声明和/或语句组成。编译器或解释器软件将单个代码块视为单个指令。


    此外，代码块可以限制变量的*作用域*，即代码清单中特定变量生效的部分。两个不同的代码块可能完全无法访问彼此的变量空间。


    Python 处理花括号的方式与 Java 或 C# 不同。相反，该语言在表示代码块时使用空白字符（即空格或缩进）。在 Python 中，花括号保留用于定义字典或集合数据类型。

