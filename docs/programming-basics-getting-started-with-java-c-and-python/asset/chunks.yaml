    \ little listing, three threads are sent to run a five-meter dash. The program\
    \ demonstrates the following features of the C# language:\n\n- Simple threading\
    \ and thread-based access to shared data/variables\n- Using locking objects and\
    \ the `Interlocked.Decrement()` method\n- Assigning random values to variables,\
    \ including string arrays\n- Defining methods (e.g., `MakeNames`) and retrieving\
    \ data from them\n\n```\nusing System;\nusing System.Threading;\npublic class\
    \ ThreadRacer\n{\n    // Define an empty (i.e. null) string for holding the winner\
    \ of the race\n    string winner = null;\n    // Define an integer for examining\
    \ the threads' arrival order at finishing line\n    int place = 3;\n    // Create\
    \ an object, happylock, for thread-locking purposes\n    static object happylock\
    \ = new object();\n    // Define Racer, a thread-based method\n    public void\
    \ Racer()\n    {\n        int distance = 5; // Set racing distance to 5\n    \
    \    // Assign variable \"handle\" with the current thread so we may read\n  \
    \      // thread properties, such as Name\n        Thread handle = Thread.CurrentThread;\n\
    \        // Loop while a thread's distance is greater than zero\n        while(distance\
    \ > 0) {\n            Console.WriteLine(handle.Name+\" is at \" + distance + \"\
    \ meters from the goal.\");\n            // Reduce racer's distance by one using\
    \ an Interlocked.Decrement-method\n            Interlocked.Decrement(ref distance);\n\
    \        }\n        // Summon our locking object\n        lock(happylock) {\n\
    \            // If the winner-variable is still set to \"null\", announce current\
    \ thread\n            // as the winner\n            if(winner == null) Console.WriteLine(handle.Name\
    \ + \" WON 1st place!\");\n            // Use an Interlocked.Decrement-method\
    \ to subtract 1 from variable \"place\"\n            Interlocked.Decrement(ref\
    \ place);\n            winner = handle.Name;\n            if(place==1) Console.WriteLine(handle.Name\
    \ + \" came in 2ND..\");\n            if(place==0) Console.WriteLine(handle.Name\
    \ + \" came in 3RD..\");\n        }\n    }\n    public static string MakeNames()\
    \ {\n        // create new object, random0, using the C# Random class\n      \
    \  var random0 = new Random();\n        // Create two string-arrays, first_names\
    \ and last_names\n        string[] first_names = { \"Peter\", \"Paul\", \"Patrick\"\
    , \"Patricia\", \"Priscilla\", \"Pauline\" };\n        string[] last_names = {\
    \ \"Plonker\", \"Pillock\", \"Prat\", \"Pecker\" };\n        int f_index = random0.Next(first_names.Length);\n\
    \        int l_index = random0.Next(last_names.Length);\n        // return name\
    \ as a string:\n        return (first_names[f_index] + \" \" + last_names[l_index]);\n\
    \    }\n    public static void Main() // Main function\n    {\n        ThreadRacer\
    \ racer = new ThreadRacer();\n        Thread thread1 = new Thread(new ThreadStart(racer.Racer));\n\
    \        Thread thread2 = new Thread(new ThreadStart(racer.Racer));\n        Thread\
    \ thread3 = new Thread(new ThreadStart(racer.Racer));\n        thread1.Name =\
    \ \"[Racer A] \" + MakeNames();\n        thread2.Name = \"[Racer B] \" + MakeNames();\n\
    \        thread3.Name = \"[Racer C] \" + MakeNames();\n        Console.WriteLine(\"\
    Welcome to THREAD RACER!\\n\");\n        thread1.Start(); // Start threads\n \
    \       thread2.Start();\n        thread3.Start();\n    }\n}\nListing 8-6\nA program\
    \ demonstrating threading in C#\n```\n\nIn Listing [8-6](#507458_1_En_8_Chapter.xhtml#PC6),\
    \ we made a locking object, `happylock`, for thread synchronization. We also used\
    \ a new method, `Interlocked.Decrement`, to decrease the `distance` and `place`\
    \ variables by exactly one. For effective and safe addition in a thread-based\
    \ project, C# also provides a method known as `Interlocked.Increment` (which we\
    \ didn’t need for Thread Racer). These two methods can often replace the standard\
    \ subtraction and addition operators (e.g., `--variable` or `++variable`) when\
    \ working with thread-based code in C#.\n\nNow, we crafted one method of our own\
    \ in Listing [8-6](#507458_1_En_8_Chapter.xhtml#PC6); this would be `MakeNames`.\
    \ This method is there to demonstrate arrays, more specifically those of the string\
    \ variety. These arrays are populated with names and returned as a single string\
    \ for use by the main function.\n\nThe `f_index` and `l_index` variables in Thread\
    \ Racer are there to store the desired index positions of the string arrays `first_names`\
    \ and `last_names`. These index positions are in turn created by applying a `Next`\
    \ method, a randomizer, on the arrays’ lengths. These lengths are then deduced\
    \ by summoning the aptly named `Length` method.\n\nHere’s one of those lines of\
    \ codes in Listing [8-6](#507458_1_En_8_Chapter.xhtml#PC6):\n\n```\nint f_index\
    \ = random0.Next(first_names.Length);\n```\n\nThis reads: “have integer `f_index`\
    \ equal a random number with a maximum value of the length of the `first_names`-array.”\
    \ Rolls right off the tongue.\n\nWe can add output from methods straight into\
    \ variables. Take this line from Listing [8-6](#507458_1_En_8_Chapter.xhtml#PC6),\
    \ for example: `thread1.Name = \"[Racer A] \" + MakeNames();` in which we combine\
    \ the string `\"[Racer A]\"` with whatever `MakeNames` happens to output, using\
    \ but a simple plus operator.\n\nThe thread scheduling for Thread Racer, too,\
    \ is performed by the operating system. This means you may get the same results\
    \ after a while."
  raw: '## Thread Racer for C#


    To refresh your memory on how threading works in C#, take a peek at Listing [8-6](#507458_1_En_8_Chapter.xhtml#PC6).
    In this little listing, three threads are sent to run a five-meter dash. The program
    demonstrates the following features of the C# language:


    *   Simple threading and thread-based access to shared data/variables


    *   Using locking objects and the Interlocked.Decrement( ) method


    *   Assigning random values to variables, including string arrays


    *   Defining methods (e.g., MakeNames) and retrieving data from them


    ```

    using System;

    using System.Threading;

    public class ThreadRacer

    {

    // Define an empty (i.e. null) string for holding the winner of the race

    string winner = null;

    // Define an integer for examining the threads'' arrival order at finishing line

    int place = 3;

    // Create an object, happylock, for thread-locking purposes

    static object happylock = new object();

    // Define Racer, a thread-based method

    public void Racer()

    {

    int distance = 5; // Set racing distance to 5

    // Assign variable "handle" with the current thread so we may read

    // thread properties, such as Name

    Thread handle = Thread.CurrentThread;

    // Loop while a thread''s distance is greater than zero

    while(distance > 0) {

    Console.WriteLine(handle.Name+" is at " + distance + " meters from the goal.");

    // Reduce racer''s distance by one using an Interlocked.Decrement-method

    Interlocked.Decrement(ref distance);

    }

    // Summon our locking object

    lock(happylock) {

    // If the winner-variable is still set to "null", announce current thread

    // as the winner

    if(winner == null) Console.WriteLine(handle.Name + " WON 1st place!");

    // Use an Interlocked.Decrement-method to subtract 1 from variable "place"

    Interlocked.Decrement(ref place);

    winner = handle.Name;

    if(place==1) Console.WriteLine(handle.Name + " came in 2ND..");

    if(place==0) Console.WriteLine(handle.Name + " came in 3RD..");

    }

    }

    public static string MakeNames() {

    // create new object, random0, using the C# Random class

    var random0 = new Random();

    // Create two string-arrays, first_names and last_names

    string[] first_names = { "Peter", "Paul", "Patrick", "Patricia", "Priscilla",
    "Pauline" };

    string[] last_names = { "Plonker", "Pillock", "Prat", "Pecker" };

    int f_index = random0.Next(first_names.Length);

    int l_index = random0.Next(last_names.Length);

    // return name as a string:

    return (first_names[f_index] + " " + last_names[l_index]);

    }

    public static void Main() // Main function

    {

    ThreadRacer racer = new ThreadRacer();

    Thread thread1 = new Thread(new ThreadStart(racer.Racer));

    Thread thread2 = new Thread(new ThreadStart(racer.Racer));

    Thread thread3 = new Thread(new ThreadStart(racer.Racer));

    thread1.Name = "[Racer A] " + MakeNames();

    thread2.Name = "[Racer B] " + MakeNames();

    thread3.Name = "[Racer C] " + MakeNames();

    Console.WriteLine("Welcome to THREAD RACER!\n");

    thread1.Start(); // Start threads

    thread2.Start();

    thread3.Start();

    }

    }

    Listing 8-6

    A program demonstrating threading in C#

    ```


    In Listing [8-6](#507458_1_En_8_Chapter.xhtml#PC6), we made a locking object,
    happylock, for thread synchronization. We also used a new method, Interlocked.Decrement,
    to decrease the “distance” and “place” variables by exactly one. For effective
    and safe addition in a thread-based project, C# also provides a method known as
    Interlocked.Increment (which we didn’t need for Thread Racer). These two methods
    can often replace the standard subtraction and addition operators (e.g., --variable
    or ++variable) when working with thread-based code in C#.


    Now, we crafted one method of our own in Listing [8-6](#507458_1_En_8_Chapter.xhtml#PC6);
    this would be *MakeNames*. This method is there to demonstrate arrays, more specifically
    those of the string variety. These arrays are populated with names and returned
    as a single string for use by the main function.


    The *f_index* and *l_index* variables in Thread Racer are there to store the desired
    index positions of the string arrays *first_names* and *last_names*. These index
    positions are in turn created by applying a Next method, a randomizer, on the
    arrays’ lengths. These lengths are then deduced by summoning the aptly named Length
    method.


    Here’s one of those lines of codes in Listing [8-6](#507458_1_En_8_Chapter.xhtml#PC6):


    ```

    int f_index = random0.Next(first_names.Length);

    ```


    This reads: “have integer *f_index* equal a **random number** with a maximum value
    of the **length** of the *first_names*-array.” Rolls right off the tongue.


    We can add output from methods straight into variables. Take this line from Listing
    [8-6](#507458_1_En_8_Chapter.xhtml#PC6), for example: *thread1.Name = “[Racer
    A] ” + MakeNames( );* in which we combine the string “[Racer A”] with whatever
    MakeNames happens to output, using but a simple plus operator.


    The thread scheduling for Thread Racer, too, is performed by the operating system.
    This means you may get the same results after a while.'
  trans: '

    ## C# 线程赛车


    为了回顾 C# 中线程的工作原理，请查看清单 8-6。在这个简短的清单中，三个线程被派去进行一场五米短跑。该程序演示了 C# 语言的以下特性：


    *   简单的线程化以及对共享数据/变量的基于线程的访问

    *   使用锁定对象和 `Interlocked.Decrement( )` 方法

    *   为变量（包括字符串数组）分配随机值

    *   定义方法（例如 `MakeNames`）并从中检索数据


    ```

    using System;

    using System.Threading;

    public class ThreadRacer

    {

    // 定义一个空（即 null）字符串，用于保存比赛的获胜者

    string winner = null;

    // 定义一个整数，用于检查线程到达终点线的顺序

    int place = 3;

    // 创建一个对象 happylock，用于线程锁定

    static object happylock = new object();

    // 定义 Racer，一个基于线程的方法

    public void Racer()

    {

    int distance = 5; // 设置比赛距离为 5

    // 将变量 "handle" 赋值为当前线程，以便我们读取

    // 线程属性，例如 Name

    Thread handle = Thread.CurrentThread;

    // 当线程的距离大于零时循环

    while(distance > 0) {

    Console.WriteLine(handle.Name+" 距离终点还有 " + distance + " 米。");

    // 使用 Interlocked.Decrement 方法将赛手的距离减一

    Interlocked.Decrement(ref distance);

    }

    // 调用我们的锁定对象

    lock(happylock) {

    // 如果 winner 变量仍为 "null"，则宣布当前线程

    // 为获胜者

    if(winner == null) Console.WriteLine(handle.Name + " 赢得了第 1 名！");

    // 使用 Interlocked.Decrement 方法从变量 "place" 中减去 1

    Interlocked.Decrement(ref place);

    winner = handle.Name;

    if(place==1) Console.WriteLine(handle.Name + " 获得了第 2 名..");

    if(place==0) Console.WriteLine(handle.Name + " 获得了第 3 名..");

    }

    }

    public static string MakeNames() {

    // 使用 C# Random 类创建新对象 random0

    var random0 = new Random();

    // 创建两个字符串数组 first_names 和 last_names

    string[] first_names = { "Peter", "Paul", "Patrick", "Patricia", "Priscilla",
    "Pauline" };

    string[] last_names = { "Plonker", "Pillock", "Prat", "Pecker" };

    int f_index = random0.Next(first_names.Length);

    int l_index = random0.Next(last_names.Length);

    // 将名称作为字符串返回：

    return (first_names[f_index] + " " + last_names[l_index]);

    }

    public static void Main() // Main 函数

    {

    ThreadRacer racer = new ThreadRacer();

    Thread thread1 = new Thread(new ThreadStart(racer.Racer));

    Thread thread2 = new Thread(new ThreadStart(racer.Racer));

    Thread thread3 = new Thread(new ThreadStart(racer.Racer));

    thread1.Name = "[赛手 A] " + MakeNames();

    thread2.Name = "[赛手 B] " + MakeNames();

    thread3.Name = "[赛手 C] " + MakeNames();

    Console.WriteLine("欢迎来到线程赛车！\n");

    thread1.Start(); // 启动线程

    thread2.Start();

    thread3.Start();

    }

    }

    清单 8-6

    一个演示 C# 线程的程序

    ```


    在清单 8-6 中，我们创建了一个锁定对象 `happylock`，用于线程同步。我们还使用了一个新方法 `Interlocked.Decrement`，将“distance”和“place”变量精确地减一。为了在基于线程的项目中进行有效且安全的加法运算，C#
    还提供了一个名为 `Interlocked.Increment` 的方法（我们在线程赛车中不需要它）。在 C# 中处理基于线程的代码时，这两个方法通常可以替代标准的减法和加法运算符（例如
    `--variable` 或 `++variable`）。


    现在，我们在清单 8-6 中自己编写了一个方法；这就是 `MakeNames`。此方法用于演示数组，更具体地说是字符串类型的数组。这些数组填充了名称，并作为单个字符串返回，供主函数使用。


    线程赛车中的 `f_index` 和 `l_index` 变量用于存储字符串数组 `first_names` 和 `last_names` 的所需索引位置。这些索引位置又通过在这些数组的长度上应用
    `Next` 方法（一个随机化器）来创建。然后通过调用恰如其名的 `Length` 方法来推导出这些长度。


    以下是清单 8-6 中的一行代码：


    ```

    int f_index = random0.Next(first_names.Length);

    ```


    这行代码的意思是：“让整数 `f_index` 等于一个**随机数**，其最大值为 `first_names` 数组的**长度**。”读起来朗朗上口。


    我们可以将方法的输出直接放入变量中。以清单 8-6 中的这行为例：`thread1.Name = “[赛手 A] ” + MakeNames( );` 在这行代码中，我们使用一个简单的加号运算符，将字符串
    `“[赛手 A]”` 与 `MakeNames` 输出的任何内容组合在一起。


    线程赛车的线程调度也是由操作系统执行的。这意味着过一段时间后，你可能会得到相同的结果。

