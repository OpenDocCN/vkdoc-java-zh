    (see Table [5-2](#507458_1_En_5_Chapter.xhtml#Tab2)). These and many other methods
    will become increasingly familiar to you as we proceed with this book.


    Table 5-2


    Some methods from Java’s Thread-class (Java.lang.Thread)


    | Method | Description | Example(s) |

    | --- | --- | --- |

    | getName( ) | Returns a thread’s name | System.out.println(“I am a ” + getName(
