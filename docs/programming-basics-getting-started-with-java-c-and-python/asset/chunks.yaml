    \ Knowing the building blocks of coding in three languages, you can now start\
    \ gaining more experience in the field. A world of problem-solving awaits you.\n\
    \nProgramming can be frustrating. But there’s something uniquely satisfying in\
    \ getting a pesky, nonfunctional listing to finally work. Whether you end up coding\
    \ in a professional context or not, programming may become a kind of constructive\
    \ addiction at some point. It can also be a wonderful cure for insomnia and/or\
    \ boredom.\n\nIt takes a lot of intent and time to manifest meaningful coding\
    \ projects, whether they are video games or atomized programming tasks defined\
    \ by one’s employer. But no line is wasted as you grow as a programmer. Even error\
    \ messages can teach you the most valuable things.\n\n*Ada Lovelace*, the love\
    \ child of *Lord* and *Lady Byron*, is considered one of world’s first programmers.\
    \ She worked with several prominent scientists of her day, including *Charles\
    \ Babbage* and *Michael Faraday*, at some point producing what is considered the\
    \ first ever computer program*.* We’ll let Ada have the last words:\n\n> *I can\
    \ throw rays from every quarter of the universe into one vast focus. My course\
    \ is so clear and obvious that it is delightful to think how straight it is.*\n\
    > \n> —Ada Lovelace (1815–1852)\n\nIndex A Abstraction Access modifiers American\
