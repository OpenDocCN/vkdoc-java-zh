- fmt: '# Setting Up Visual Studio for Windows and Mac


    Let’s start with Visual Studio installation for Windows and macOS. First, you
    need to download the correct installer for the completely free Community Edition.
    This is a robust IDE for multiple languages, including C#.


    - **Download Visual Studio Community Edition**: [`https://visualstudio.microsoft.com/free-developer-offers/`](https://visualstudio.microsoft.com/free-developer-offers/)


    Upon launching the Visual Studio installer, you’ll be eventually taken to a screen
    about Workloads. These basically refer to different scenarios of implementation
    for the various languages on offer in Visual Studio. You’ll see four categories
    of Workloads for C# and other languages; they are Web & Cloud, Desktop & Mobile,
    Gaming, and Other Toolsets (see Figure [3-2](#507458_1_En_3_Chapter.xhtml#Fig2)).
    For our coding needs, let’s tick the check box next to `.NET desktop development`.
    This will set us up with C# nicely.


    Finally, click Install on the bottom right corner of the window. You may also
    choose to either install while downloading or to first download all necessary
    files and start the installation process afterward.


    ![../images/507458_1_En_3_Chapter/507458_1_En_3_Fig2_HTML.jpg](images/507458_1_En_3_Chapter/507458_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    The installation screen for Microsoft’s Visual Studio Community Edition


    The first `.NET` was a software framework created by Microsoft in 2002 and released
    under a proprietary license. It offered streamlined development for C#, C++, and
    other popular languages. The framework received a major overhaul in 2016 under
    the name of `.NET Core`. This time it came out as open source and cross-platform
    by including support for macOS (and, to an extent, Linux). Microsoft has since
    deprecated the new version’s name back to .NET.


    ## Starting a New Project in Visual Studio


    After a potentially lengthy installation process, Visual Studio presents you with
    the option of signing in to a developer account (or registering one) for additional
    benefits. Feel free to skip this step. Next, you are to choose a color scheme
    for the IDE and click Start Visual Studio.


    A few moments later, you’ll arrive at the Visual Studio main window. When you
    click Create New Project, you are presented with a variety of programming templates,
    including those specifically for C#. For our needs, the Console App is appropriate.
    After a moment or two, Visual Studio will have created your project files, and
    you can start coding underneath the main function.


    ## Console vs. GUI Applications


    There is a universal distinction between so-called console applications and those
    with a graphical user interface (GUI). The former are presented using a bare-bones
    text-based interface, while the latter provide their users with more visuals and,
    in general, additional input methods (such as a mouse or trackpad). Console apps
    do sometimes utilize text-based pseudographics for emulating geometric shapes.


    Although quaint in their appearance, console apps provide a great degree of efficiency
    for developers; all the resources eaten by (audio)visuals can instead be used
    for the core functionality of a program, after all.


    Console applications are all over our operating systems. They are used for things
    like network-related tasks and, potentially, numerous instances of automation.
    Major console applications include Terminal in macOS, Windows Console, and Linux
    Command Line. Also, one of the most acclaimed role-playing video games of all
    time, Nethack, is a bona fide console app. Who needs 3D graphics?


    You can learn all of the basic programming mechanics from working within the realm
    of console apps. Although we’ll touch on GUI-based development, the focus of this
    book is mostly in the text-based environment.


    ## C# in Linux: Introducing MonoDevelop


    As of Q1 2021, Visual Studio is not available for Linux. However, MonoDevelop
    provides everything you need to get started coding C# within a flexible IDE.


    - **Follow these instructions on the MonoDevelop site**: [`www.monodevelop.com/download`](http://www.monodevelop.com/download)


    Navigate to the Mono repository closest to the Linux distribution and version
    you are currently using from the preceding download page (e.g., Debian). Next,
    you will be copy-pasting a lot of commands into your terminal window. You may
    need to wait several minutes for the installation to complete depending on your
    hardware. Afterward, MonoDevelop should reside safely in your Applications folder.


    Open MonoDevelop by clicking its icon. Navigate to File ➤ New Solution. A new
    window will open. Click `.NET` under Other, and select Console Project. Finally,
    click Next on the bottom right corner. Another window will open prompting you
    for a project name. Enter anything you feel is suitable, and click Create.


    You should next arrive at a listing for a generic hello world application in C#.
    Either navigate to Run ➤ Start Without Debugging or click the play icon on the
    top left part of the MonoDevelop IDE to execute the listing.


    You might have to execute the following additional lines in the terminal window
    if you are prompted by an error ending with “cannot find the specified file” after
    trying to run/debug a program in MonoDevelop:


    ```

    cd /usr/lib

    sudo mkdir gnome-terminal

    cd gnome-terminal

    sudo ln -s /usr/libexec/gnome-terminal-server

    ```


    You’re now all set to develop some dandy console applications for Linux.


    ## PyCharm for Python Development


    When it comes to development with Python, there’s one piece of software which
    stands above the rest. PyCharm is a multi-platform IDE with excellent features
    like intelligent code completion. The suite is available in both paid and free
    editions; we’ll be working with the latter. The following link will direct you
    to the version of PyCharm your OS supports.


    - **Download PyCharm Community Edition**: [*www.jetbrains.com/pycharm/download*](http://www.jetbrains.com/pycharm/download)


    PyCharm’s installation process for both Windows and macOS is quite straightforward.
    For the former, run the executable you downloaded and follow the onscreen instructions.
    With macOS, just double-click the image file (ending in `.dmg`), and drag the
    PyCharm icon into your Applications folder.


    When installing PyCharm on Windows, you might be presented with a password prompt
    even when you are on an account without password protection. Simply click cancel
    to continue with the installation.


    To begin experimenting with PyCharm, click Create Project. You’ll then be given
    the opportunity to name your project as well as to choose some other options for
    it. The project name doubles as the directory location for all of your PyCharm-project
    files. When you’ve settled for an appropriate title, click Create on the bottom
    right of the window.


    To make starting out easier, PyCharm gives you the option of creating a welcome
    script for you. It’s best to enable this option. Make sure the box is ticked next
    to Create a `main.py` welcome script when making a new project.


    PyCharm might download some additional components the first time you create a
    new project. Installation of these components might take a while. When your new
    project files are ready, you’ll be taken into the main coding view in PyCharm.
    You are now free to edit the file `main.py` and experiment with this amazing IDE
    for Python.


    The file `main.py` will be populated with some Python code upon first opening
    your new project. You can erase all of it and type your own code in its place.


    ## Installing PyCharm for Linux


    The best way to get PyCharm running on your Linux is to use snap packages. Simply
    open a terminal window, and feed it the following line:


    ```

    sudo snap install pycharm-community --classic

    ```'
  raw: '## Setting Up Visual Studio for Windows and Mac


    Let’s start with Visual Studio installation for Windows and macOS. First, you
    need to download the correct installer for the completely free Community Edition.
    This is a robust IDE for multiple languages, including C#.


    *   **Download** ***Visual Studio Community Edition***: [`https://visualstudio.microsoft.com/free-developer-offers/`](https://visualstudio.microsoft.com/free-developer-offers/)


    Upon launching the Visual Studio installer, you’ll be eventually taken to a screen
    about *Workloads.* These basically refer to different scenarios of implementation
    for the various languages on offer in Visual Studio. You’ll see four categories
    of Workloads for C# and other languages; they are *Web & Cloud, Desktop & Mobile,
    Gaming,* and *Other Toolsets* (see Figure [3-2](#507458_1_En_3_Chapter.xhtml#Fig2)).
    For our coding needs, let’s tick the check box next to *.NET desktop development.*
    This will set us up with C# nicely.


    Finally, click *Install* on the bottom right corner of the window. You may also
    choose to either install while downloading or to first download all necessary
    files and start the installation process afterward.


    ![../images/507458_1_En_3_Chapter/507458_1_En_3_Fig2_HTML.jpg](images/507458_1_En_3_Chapter/507458_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    The installation screen for Microsoft’s Visual Studio Community Edition


    The first *.NET* was a software framework created by Microsoft in 2002 and released
    under a proprietary license. It offered streamlined development for C#, C++, and
    other popular languages. The framework received a major overhaul in 2016 under
    the name of *.NET Core.* This time it came out as open source and cross-platform
    by including support for macOS (and, to an extent, Linux). Microsoft has since
    deprecated the new version’s name back to .NET.


    ## Starting a New Project in Visual Studio


    After a potentially lengthy installation process, Visual Studio presents you with
    the option of signing in to a developer account (or registering one) for additional
    benefits. Feel free to skip this step. Next, you are to choose a color scheme
    for the IDE and click *Start Visual Studio.*


    A few moments later, you’ll arrive at the Visual Studio main window. When you
    click *Create New Project*, you are presented with a variety of programming templates,
    including those specifically for C#. For our needs, the *Console App* is appropriate.
    After a moment or two, Visual Studio will have created your project files, and
    you can start coding underneath the main function.


    ## Console vs. GUI Applications


    There is a universal distinction between so-called console applications and those
    with a graphical user interface (GUI) *.* The former are presented using a bare-bones
    text-based interface, while the latter provide their users with more visuals and,
    in general, additional input methods (such as a mouse or trackpad). Console apps
    do sometimes utilize text-based *pseudographics* for emulating geometric shapes.


    Although quaint in their appearance, console apps provide a great degree of efficiency
    for developers; all the resources eaten by (audio)visuals can instead be used
    for the core functionality of a program, after all.


    Console applications are all over our operating systems. They are used for things
    like network-related tasks and, potentially, numerous instances of automation.
    Major console applications include *Terminal* in macOS, *Windows Console*, and
    *Linux Command Line*. Also, one of the most acclaimed role-playing video games
    of all time, *Nethack,* is a bona fide console app. Who needs 3D graphics?


    You can learn all of the basic programming mechanics from working within the realm
    of console apps. Although we’ll touch on GUI-based development, the focus of this
    book is mostly in the text-based environment.


    ## C# in Linux: Introducing MonoDevelop


    As of Q1 2021, Visual Studio is not available for Linux. However, *MonoDevelop*
    provides everything you need to get started coding C# within a flexible IDE.


    *   **Follow these instructions on the MonoDevelop site**: [`www.monodevelop.com/download`](http://www.monodevelop.com/download)


    Navigate to the Mono repository closest to the Linux distribution and version
    you are currently using from the preceding download page (e.g., Debian). Next,
    you will be copy-pasting a lot of commands into your terminal window. You may
    need to wait several minutes for the installation to complete depending on your
    hardware. Afterward, MonoDevelop should reside safely in your Applications folder.


    Open MonoDevelop by clicking its icon. Navigate to *File* ➤ *New Solution*. A
    new window will open. Click *.NET* under *Other*, and select *Console Project*.
    Finally, click *Next* on the bottom right corner. Another window will open prompting
    you for a project name. Enter anything you feel is suitable, and click *Create.*


    You should next arrive at a listing for a generic hello world application in C#.
    Either navigate to *Run* ➤ *Start Without Debugging* or click the play icon on
    the top left part of the MonoDevelop IDE to execute the listing.


    You might have to execute the following additional lines in the terminal window
    if you are prompted by an error ending with “cannot find the specified file” after
    trying to run/debug a program in MonoDevelop:


    `cd /usr/lib`


    `sudo mkdir gnome-terminal`


    `cd gnome-terminal`


    `sudo ln -s /usr/libexec/gnome-terminal-server`


    You’re now all set to develop some dandy console applications for Linux.


    ## PyCharm for Python Development


    When it comes to development with Python, there’s one piece of software which
    stands above the rest. *PyCharm* is a multi-platform IDE with excellent features
    like intelligent code completion. The suite is available in both paid and free
    editions; we’ll be working with the latter. The following link will direct you
    to the version of PyCharm your OS supports.


    *   **Download** ***PyCharm Community Edition***: [*www.jetbrains.com/pycharm/download*](http://www.jetbrains.com/pycharm/download)


    PyCharm’s installation process for both Windows and macOS is quite straightforward.
    For the former, run the executable you downloaded and follow the onscreen instructions.
    With macOS, just double-click the image file (ending in .dmg), and drag the PyCharm
    icon into your Applications folder.


    When installing PyCharm on Windows, you might be presented with a password prompt
    even when you are on an account without password protection. Simply click cancel
    to continue with the installation.


    To begin experimenting with PyCharm, click *Create Project.* You’ll then be given
    the opportunity to name your project as well as to choose some other options for
    it. The project name doubles as the directory location for all of your PyCharm-project
    files. When you’ve settled for an appropriate title, click *Create* on the bottom
    right of the window.


    To make starting out easier, PyCharm gives you the option of creating a welcome
    script for you. It’s best to enable this option. Make sure the box is ticked next
    to *Create a main.py welcome script* when making a new project.


    PyCharm might download some additional components the first time you create a
    new project. Installation of these components might take a while. When your new
    project files are ready, you’ll be taken into the main coding view in PyCharm.
    You are now free to edit the file *main.py* and experiment with this amazing IDE
    for Python.


    The file *main.py* will be populated with some Python code upon first opening
    your new project. You can erase all of it and type your own code in its place.


    ## Installing PyCharm for Linux


    The best way to get PyCharm running on your Linux is to use snap packages. Simply
    open a terminal window, and feed it the following line:


    ```

    sudo snap install pycharm-community --classic

    ```'
  trans: '

    ## 为 Windows 和 Mac 设置 Visual Studio


    让我们从 Windows 和 macOS 的 Visual Studio 安装开始。首先，你需要为完全免费的社区版下载正确的安装程序。这是一个支持多种语言（包括
    C#）的强大集成开发环境（IDE）。


    *   **下载** ***Visual Studio 社区版***：[`https://visualstudio.microsoft.com/free-developer-offers/`](https://visualstudio.microsoft.com/free-developer-offers/)


    启动 Visual Studio 安装程序后，你最终会进入一个关于*工作负载*的界面。这些工作负载基本上指的是 Visual Studio 中提供的各种语言的不同实现场景。你会看到
    C# 和其他语言的四类工作负载：*Web 与云、桌面与移动、游戏*以及*其他工具集*（见图 3-2）。为了满足我们的编码需求，请勾选 *.NET 桌面开发*旁边的复选框。这将为我们很好地配置好
    C# 环境。


    最后，点击窗口右下角的*安装*。你也可以选择在下载的同时进行安装，或者先下载所有必要的文件，然后再开始安装过程。


    ![../images/507458_1_En_3_Chapter/507458_1_En_3_Fig2_HTML.jpg](img/507458_1_En_3_Fig2_HTML.jpg)


    图 3-2


    Microsoft Visual Studio 社区版的安装界面


    第一个 *.NET* 是微软于 2002 年创建并在专有许可下发布的软件框架。它为 C#、C++ 和其他流行语言提供了简化的开发流程。该框架在 2016 年以
    *.NET Core* 的名义进行了重大革新。这次它作为开源和跨平台框架发布，增加了对 macOS（以及一定程度上对 Linux）的支持。微软后来已弃用了这个新版本的名称，将其恢复为
    .NET。


    ## 在 Visual Studio 中启动新项目


    经过可能较长的安装过程后，Visual Studio 会提供登录开发者账户（或注册一个）以获得额外福利的选项。你可以随意跳过此步骤。接下来，你需要为 IDE
    选择一种配色方案，然后点击*启动 Visual Studio*。


    稍等片刻，你将进入 Visual Studio 主窗口。当你点击*创建新项目*时，会看到各种编程模板，包括专门用于 C# 的模板。对于我们的需求，*控制台应用*是合适的。过一两分钟后，Visual
    Studio 将创建好你的项目文件，你就可以在主函数下方开始编码了。


    ## 控制台应用与 GUI 应用


    所谓的控制台应用和具有图形用户界面（GUI）的应用之间存在一个普遍的区别。前者使用简陋的基于文本的界面呈现，而后者则为用户提供更多的可视化元素，并且通常提供额外的输入方式（如鼠标或触控板）。控制台应用有时会利用基于文本的*伪图形*来模拟几何形状。


    尽管外观朴素，但控制台应用为开发者提供了极高的效率；毕竟，（音视频）可视化所消耗的所有资源都可以用于程序的核心功能。


    控制台应用遍布我们的操作系统。它们用于网络相关任务以及可能的大量自动化实例。主要的控制台应用包括 macOS 的*终端*、*Windows 控制台*和*Linux
    命令行*。此外，有史以来最受赞誉的角色扮演电子游戏之一 *Nethack* 也是一个名副其实的控制台应用。谁还需要 3D 图形呢？


    你可以通过控制台应用领域的工作来学习所有基本的编程机制。虽然我们会涉及基于 GUI 的开发，但本书的重点主要放在基于文本的环境上。


    ## Linux 上的 C#：介绍 MonoDevelop


    截至 2021 年第一季度，Visual Studio 尚不支持 Linux。然而，*MonoDevelop* 提供了你在一个灵活的 IDE 中开始编写 C#
    所需的一切。


    *   **请遵循 MonoDevelop 网站上的这些说明**：[`www.monodevelop.com/download`](http://www.monodevelop.com/download)


    从上述下载页面导航到与你当前使用的 Linux 发行版和版本（例如 Debian）最接近的 Mono 仓库。接下来，你需要在终端窗口中复制粘贴大量命令。根据你的硬件配置，可能需要等待几分钟才能完成安装。之后，MonoDevelop
    应该会安全地存放在你的应用程序文件夹中。


    点击 MonoDevelop 图标打开它。导航到*文件* ➤ *新建解决方案*。将打开一个新窗口。在*其他*下点击 *.NET*，然后选择*控制台项目*。最后，点击右下角的*下一步*。另一个窗口将打开，提示你输入项目名称。输入任何你认为合适的名称，然后点击*创建*。


    接下来，你应该会看到一个用 C# 编写的通用 hello world 应用程序的代码列表。你可以导航到*运行* ➤ *不调试启动*，或者点击 MonoDevelop
    IDE 左上角的播放图标来执行该代码。


    如果在 MonoDevelop 中尝试运行/调试程序后，出现以“找不到指定文件”结尾的错误提示，你可能需要在终端窗口中执行以下额外命令：


    `cd /usr/lib`


    `sudo mkdir gnome-terminal`


    `cd gnome-terminal`


    `sudo ln -s /usr/libexec/gnome-terminal-server`


    现在，你已经准备好为 Linux 开发一些漂亮的控制台应用程序了。


    ## 用于 Python 开发的 PyCharm


    在 Python 开发方面，有一款软件脱颖而出。*PyCharm* 是一个多平台 IDE，具有智能代码补全等出色功能。该套件有付费版和免费版；我们将使用后者。以下链接将引导你进入适合你操作系统的
    PyCharm 版本。


    *   **下载** ***PyCharm 社区版***：[`www.jetbrains.com/pycharm/download`](http://www.jetbrains.com/pycharm/download)


    PyCharm 在 Windows 和 macOS 上的安装过程都非常简单。对于前者，运行你下载的可执行文件并按照屏幕上的说明操作。对于 macOS，只需双击镜像文件（以
    .dmg 结尾），然后将 PyCharm 图标拖入你的应用程序文件夹。


    在 Windows 上安装 PyCharm 时，即使你的账户没有密码保护，也可能会弹出密码提示。只需点击取消即可继续安装。


    要开始尝试使用 PyCharm，请点击*创建项目*。然后你将有机会为项目命名并选择其他一些选项。项目名称同时也是你所有 PyCharm 项目文件的目录位置。当你确定了一个合适的标题后，点击窗口右下角的*创建*。


    为了让入门更简单，PyCharm 会为你提供创建欢迎脚本的选项。最好启用此选项。在创建新项目时，请确保勾选了*创建一个 main.py 欢迎脚本*旁边的复选框。


    PyCharm 可能会在你第一次创建新项目时下载一些额外的组件。这些组件的安装可能需要一些时间。当你的新项目文件准备就绪后，你将进入 PyCharm 的主编码视图。现在你可以自由编辑
    *main.py* 文件，并尝试使用这个出色的 Python IDE。


    首次打开新项目时，*main.py* 文件中会填充一些 Python 代码。你可以删除所有代码，然后输入你自己的代码。


    ## 为 Linux 安装 PyCharm


    在 Linux 上运行 PyCharm 的最佳方法是使用 snap 包。只需打开一个终端窗口，并输入以下命令：


    ```

    sudo snap install pycharm-community --classic

    ```

