    public class Geezer {

    private String name;

    public String getName() {

    return name;

    }

    public void setName(String newName) {

    this.name = newName;

    }

    // We add a main-method so we can actually experiment with our class

    public static void main(String args[]) {

    // Next we create an object using the geezer-class as a blueprint

    // We''ll call our object "some_geezer"

    // and use Java''s built-in new-method to bring it to life

    Geezer some_geezer = new Geezer();

    // Next we invoke the setName-method to give our geezer a name

    some_geezer.setName("John");

    // Finally we access our geezer-object to print out a name

    // in two different ways

    System.out.println("Hello, my name is "+some_geezer.name+" the geezer!");

    System.out.println("Can you repeat that? "+"It''s "+some_geezer.getName());

    }

    }

    Listing 4-2

    A class definition with a main method in Java (file name Geezer.java)

    ```


    In Listing [4-2](#507458_1_En_4_Chapter.xhtml#PC2), we use both a so-called dot
    operator (i.e., *some_geezer.name*) and the getName method to read data from our
    object. The dot operator is also called the *member operator.*


    The line *public static void main(String[  ] args)* is where each Java program
    begins its processing, and things start appearing on screen for the user. The
    part stating *String[ ] args* basically means that the program accepts a single
    string of text as its input from whoever executes it (e.g., a user might start
    a program by typing in “myProgram hello” instead of “myProgram,” potentially for
    various effects).


    ## Java Alphabet Soup: JDK, JVM, and JRE


    Before continuing with OOP, let’s take a gander at the three of the most crucial
    software components for Java development. There’s no doubt you’ll come across
    these terms rather frequently during your programming adventures. First, there’s
    the *Java Development Kit (JDK)* *.* This is the central core collection of classes
    and tools needed to code in Java. The JDK comes in several varieties.


    Next, we have the *Java Runtime Environment (JRE)* *.* This component is used
    to combine the code output done inside the JDK with some additional required software
    libraries, allowing Java programs to actually execute.


    Finally, we have the *Java Virtual Machine (JVM)* *.* A Java program created on
    a desktop PC can run on any device that has JVM installed. This approach of running
    Java on a dedicated virtual machine therefore creates a great degree of platform
    independence.


    As you may remember from Chapter [2](#507458_1_En_2_Chapter.xhtml), Java is an
    *interpreted language*. When executing a program written in Java, the compiler
    generates *bytecode.* This is an intermediate format which needs the Java Virtual
    Machine (JVM) to run; you cannot start a bytecode program without it. As the JVM
    is available for most modern computers and devices, this approach makes Java almost
    universally platform independent.


    ## Objects in C#


    Having created our (potentially) first object in Java, let’s now do the same in
    C#. See Listing [4-3](#507458_1_En_4_Chapter.xhtml#PC3), which has exactly the
    same functionality as Listing [4-2](#507458_1_En_4_Chapter.xhtml#PC2). This will
    demonstrate the many similarities in syntax which Java and C# share.


    ```

    using System;

    public class Geezer {

    private String name;

    public String getName() {

    return name;

    }

    public void setName(String newName) {

    this.name = newName;

    }

    public static void Main(string[] args) {

    Geezer some_geezer = new Geezer();

    some_geezer.setName("John");

    // The next two lines differ the most between our Java and C# listings

    Console.WriteLine("Hello, my name is "+some_geezer.name+" the geezer!");

    Console.WriteLine("Can you repeat that? "+"It''s "+some_geezer.getName());

    }

    }

    Listing 4-3

    A class definition with a main method in C# (file name Geezer.cs)

    ```


    ## Static and Public Methods in Java and OOP


    We’ll now delve deeper into writing various kinds of methods. There are basically
    two varieties of methods in OOP: *static* and *public*. We already experimented
    with the latter in Listings [4-2](#507458_1_En_4_Chapter.xhtml#PC2) and [4-3](#507458_1_En_4_Chapter.xhtml#PC3).


    Note


    A method can actually use both qualifiers, as is the case with the famous Java
    main method, *public static void main( ).*


    Now, the main difference between the two varieties is that static methods don’t
    need to be summoned using an object; you can call them without any specific instances
    of a class. However, static methods can’t use class variables as demonstrated
    in Listing [4-4](#507458_1_En_4_Chapter.xhtml#PC4).


    ```

    public class HappyMethods {

    private int x=10, y=10;

    // A static method can''t use our class variables

    static void myStaticMethod() {

    System.out.println("Hello! I''m a static method and I can''t use x or y.");

    // System.out.println(x + " + " + y + " = " + (x+y));

    // The line above would return an error

    }

    // A public method can use our class variables for some rudimentary arithmetic

    public void myPublicMethod() {

    System.out.println(x + " + " + y + " = " + (x+y));

    }

    // Our main method

    public static void main(String[] args) {

    myStaticMethod(); // Call the static method

    HappyMethods myObj = new HappyMethods(); // Create an object of HappyMethods

    myObj.myPublicMethod(); // Call the object''s public method

    }

    }

    Listing 4-4

    A class definition with a main method in Java (HappyMethods.java)

    ```'
