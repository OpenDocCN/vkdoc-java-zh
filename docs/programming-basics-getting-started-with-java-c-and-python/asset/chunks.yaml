    \n*   **Download** ***Eclipse for Java Developers*** **(32-bit edition)**: [`www.eclipse.org/downloads/packages/release/helios/sr1/eclipse-ide-java-developers`](http://www.eclipse.org/downloads/packages/release/helios/sr1/eclipse-ide-java-developers)\n\
    \n# Installing Eclipse for Linux\n\nThe Linux Repository may host an outdated\
    \ version of Eclipse. For the installation of the most current version in Linux,\
    \ we’ll use the Snapcraft method offered by Canonical Ltd. This approach should\
    \ work on all major distributions of Linux. Open a terminal window, and enter\
    \ the following lines:\n\n1.  **First, we make sure you have the** ***Java Runtime\
    \ Environment (JRE)*** **on your OS.** Type the following string into the terminal\
