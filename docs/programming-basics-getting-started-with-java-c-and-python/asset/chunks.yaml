- fmt: '# Customizing Your Calendar


    Fun with Java-based calendars doesn’t stop at time travel. Let’s make things truly
    interesting and create our own date format symbols, that is, weekdays and months.
    For this, we’re summoning some exciting new methods and a new class, `Locale`
    (see Listing [5-12](#507458_1_En_5_Chapter.xhtml#PC13)). You’ll notice this listing
    imports the class `java.util.Date`. This is a so-called deprecated class, meaning
    a more up-to-date version of it exists (in this case `java.util.LocalDate`). However,
    you may come across these more historical classes in your coding adventures from
    time to time.


    ```

    import java.text.DateFormatSymbols;

    import java.util.Date;

    import java.util.Locale;

    import java.text.SimpleDateFormat;

    public class SassyCalendar {

    public static void main(String [] args){

    // Create a new object from class Locale

    Locale locale1 = new Locale("en", "US");

    // Create an object for a new set of date format symbols

    DateFormatSymbols sassysymbols = new DateFormatSymbols(locale1);

    // Rename days of the week using setWeekdays() method

    sassysymbols.setWeekdays(new String[]{

    "",

    "Superior Sunday",

    "Mega Monday",

    "Tepid Tuesday",

    "Wonderful Wednesday",

    "Tedious Thursday",

    "Fun Friday",

    "Serious Saturday",

    });

    // Rename months using setMonths() method

    sassysymbols.setMonths(new String[]{

    "",

    "Jolly January", "Fabulous February",

    "Marvelous March", "Amazing April",

    "Joyous June", "Jubilant July",

    "Affable August", "Silly September",

    "Odorous October", "Nasty November",

    "Delightful December",

    });

    // Choose a formatting pattern

    String pattern = "EEEEE'', in ''MMMMM yyyy''!''";

    // Apply this pattern on our object, sassysymbols

    SimpleDateFormat format1 = new SimpleDateFormat(pattern, sassysymbols);

    // Create a new object using Date-class

    String sassydate = format1.format(new Date());

    System.out.println("Today is " + sassydate);

    }

    }

    Listing 5-12

    A Java listing demonstrating customized date symbol creation for a particular
    locale

    ```


    In Listing [5-12](#507458_1_En_5_Chapter.xhtml#PC13), we catered to a specific
    locale, the United States, choosing English as the language using the expressions
    `"US"` and `"en"`. We’ll get more into localization later in this chapter.


    Now, the methods `setWeekdays()` and `setMonths()` both accept arrays of strings,
    which are used to override the default formatting symbols (e.g., Monday, January,
    etc.). The first item in these arrays is left intentionally blank as it doesn’t
    factor into the workings of these methods.


    When it comes to the formatting pattern in Listing [5-12](#507458_1_En_5_Chapter.xhtml#PC13),
    we use `E` to denote the (now modified) day of the week, `M` for month, and `y`
    for year. We also added a bit of space and other punctuation inside single quotation
    marks (e.g., `''!''`).


    If we run Listing [5-12](#507458_1_En_5_Chapter.xhtml#PC13) on the, say, 29th
    of June 2021, we would get the following output:


    `Today is Tepid Tuesday, in Joyous June 2021!`


    ## Internationalization and Localization in Java


    *Internationalization* refers to designing software so that it can be localized
    without major overhaul; *localization* is the act of creating content for a specific
    language and/or region. Java is a great programming language when it comes to
    internationalization, offering the means to localize dates, currencies, and numbers
    rather dynamically.


    The term “internationalization” can be a tad cumbersome to type. Hence, software
    folks sometimes prefer the abbreviation *i18n* instead. Localization, on the other
    hand, is referred to as *L10n* among people in the know. Like you may have guessed,
    the numbers in these abridgements represent the amount of letters in the aforementioned
    two terms.


    The Java `Locale` class, as briefly touched upon in Listing [5-12](#507458_1_En_5_Chapter.xhtml#PC13),
    offers options when it comes to localizing our projects. It’s there to give programmers
    the opportunity to present localized messages or other parts of a program. The
    `Locale` class is used to identify objects while not being a container for objects
    themselves.


    The `Locale` class works with three dimensions: *language*, *country*, and *variant*.
    While the first two are self-explanatory, variant is used for things like the
    type and/or version of an operating system the program runs on.


    Now, in Java, an application can actually have several locales active at the same
    time. For example, it’s possible to combine an Italian date format and a Japanese
    number format. Therefore, Java is a good choice for creating truly multicultural
    applications. Let’s peek at Listing [5-13](#507458_1_En_5_Chapter.xhtml#PC14)
    for a demonstration on how to use localization in Java.


    ```

    import java.util.Locale;

    public class LocalizationDemo {

    public static void main(String[] args) {

    // Create a generic English-speaking locale

    Locale locale1 = new Locale("en");

    // Create an English-speaking locale set in the UK

    Locale locale2 = new Locale("en", "UK");

    // Create a Finnish-speaking, Indian locale in Mumbai

    Locale locale3 = new Locale("fi", "IN", "Mumbai");

    System.out.println("Locale 1\. " + locale1.getDisplayName());

    System.out.println("Locale 2\. " + locale2.getDisplayName());

    System.out.println("Locale 3\. " + locale3.getDisplayName());

    // Retrieve user''s current operating system locale information by creating

    // another instance of Locale-class and summoning the getDefault() method

    Locale yourLocale = Locale.getDefault();

    System.out.println("OS language: " + yourLocale.getDisplayLanguage());

    System.out.println("OS country: " + yourLocale.getDisplayCountry());

    }

    }

    Listing 5-13

    A listing demonstrating the three main dimensions of locales in Java (i.e., language,
    country, and variant)

    ```


    In Listing [5-13](#507458_1_En_5_Chapter.xhtml#PC14), we start off by creating
    three different objects of locale and display some of their contents using the
    `getDisplayName()` method found in the `Locale` class.


    We also summon a fourth object for examining the user’s operating system’s locale
    settings. First, the `getDefault()` method is used to retrieve this data and insert
    it into the object we named `yourLocale`. Then, two other methods are executed,
    namely, `getDisplayLanguage()` and `getDisplayCountry()`, to display the information
    we’re interested in.


    ## In Closing


    Finishing this chapter, you’ll have hopefully learned the following:


    *   How to open, create, and delete files with Java

    *   What multithreading refers to and how it’s implemented in Java

    *   How to implement basic synchronization in Java

    *   The operation of the try-catch block

    *   What exception handling means and how it’s implemented

    *   The difference between checked and unchecked exceptions

    *   Some basic use of date-related classes in Java

    *   The basics of Java-based localization


    Chapter [6](#507458_1_En_6_Chapter.xhtml) will offer something indeed completely
    different; we’ll be exploring the more advanced functionalities of the puissant
    Python language.


    # 6. And Now for Something Completely Different: Advanced Python


    After immersing ourselves deeper in the world of Java in the previous chapter,
    it’s time to do the same with Python. We’ll start off with file operations, moving
    on to multithreading and other more advanced topics later in this chapter. The
    purpose here is to give you a solid foundation on some of the deeper mechanics
    in Python for you to build on later according to your needs.'
