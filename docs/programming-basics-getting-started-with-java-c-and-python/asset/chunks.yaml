- fmt: '# Basic File Operations in Java


    Basically, file operations refer to the reading, writing, and deletion of data
    stored on a device such as a hard disk or a solid state drive. To set up a Java
    project ready for file operations, we should add the following package into the
    beginning of a listing: `import java.io.File`. In fact, let’s see what a simple
    file operation program in Java looks like (see Listing [5-5](#507458_1_En_5_Chapter.xhtml#PC6)).


    ```

    import java.io.File;

    public class JollyFileClass {

    public static void main(String[] args) {

    // Use the imported File class to create a file object, happyfile

    File happyfile = new File("apress_is_great.txt");

    // Begin a try-catch block

    try {

    // Summon the createNewFile-method from File class

    boolean ok = happyfile.createNewFile();

    // ok is a boolean variable, meaning it holds either ''true'' or ''false''

    if (ok == true) {

    System.out.println("File " + happyfile.getName() + " created.");

    }

    else {

    System.out.println("The file already exists.");

    }

    }

    // Display error message in the catch-block if necessary

    catch(Exception e) {

    System.out.println("We have an issue..");

    }

    }

    }

    Listing 5-5

    A Java listing for creating an empty text file

    ```


