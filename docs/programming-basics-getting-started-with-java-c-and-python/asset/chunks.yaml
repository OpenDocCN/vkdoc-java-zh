    \ contains the following sequence of events:\n\n*   **Account owner** logs in\
    \ with a password. If a wrong code is entered, an optional use case called *Incorrect\
    \ password* is visited; this outcome is denoted with an arrow and the keyword\
    \ *<<extends>>*.\n\n*   Account owner may also wish to read some help files. This,\
    \ too, is an optional scenario and thus assigned with the keyword <<extends>>.\n\
    \n*   A successful end result for the use case *Log in* automatically leads to\
    \ another use case called *Verify password*, as depicted by the keyword *<<includes>>*.\
    \ The secondary actor *Email server* is involved in the password authentication\
    \ process, so a line of association is there in Figure [9-9](#507458_1_En_9_Chapter.xhtml#Fig9)\
    \ between said actor and the use case of Verify password.\n\n*   The use case\
    \ Verify password leads to three more use cases: *View email*, *Delete email*,\
    \ and *Send email*. Naturally, the secondary actor *Email server* is involved\
    \ in all of these, too, although only in a passive role; Account owner initiates\
    \ all of the three actions at their will.\n\n    Pay attention to the direction\
    \ of your arrows when describing relationships in use cases.\n\n## Tools for UML\n\
    \nPen and paper aside, if you want to experiment with drawing UML and do so on\
    \ your computer, there are plenty of great free options. We’ll now review some\
    \ of the finest examples of these tools.\n\n## UMLet and UMLetino by UMLet Team\n\
    \nA free and wonderful open source tool, *UMLet* will have you drawing sassy class\
    \ diagrams in no time with its intuitive drag-and-drop user interface. Association\
    \ lines snap nicely onto class edges and stay there, making organizing your diagrams\
    \ a breeze.\n\nUMLet features ready-made selections of visual elements for class\
    \ diagrams, use cases, timing diagrams, and many others. The program exports to\
    \ many common image file formats, including PNG, GIF, and SVG. UMLet is an absolute\
    \ must-have for those in need of a nice, clean UML design tool. All diagrams in\
    \ this book were created with UMLet.\n\nOne interesting feature found in UMLet\
    \ is its semi-automated diagram creation. By navigating to *File* ➤ *Generate\
    \ Class Elements from Files or Directory*, you can set up the initial stage of\
    \ your UML diagram. Unfortunately, UMLet has some issues with creating associations\
    \ when using this feature.\n\nUMLetino is a browser-based version of the same\
    \ software. It features most of the features of its offline sibling. In addition,\
    \ UMLetino has Dropbox integration for importing and exporting diagram files.\
    \ However, the software only supports the output of PNG image files.\n\n*   Download\
    \ **UMLet** for any Java-capable operating system from [`www.umlet.com`](http://www.umlet.com)\n\
    \n*   Run **UMLetino** in any Java-capable browser at [`www.umletino.com/umletino.html`](http://www.umletino.com/umletino.html)\n\
    \n## Diagrams.net by Diagrams.net Team\n\nActively maintained by a dedicated team,\
    \ *Diagrams.net* is a versatile open source tool available in both browser and\
    \ desktop editions. No user registration is needed for the latter. Diagrams.net\
    \ is intended for both basic UML work and for advanced users, having features\
    \ like layers and “plugins” for added functionalities.\n\nFormerly known as “draw.io”,\
    \ the software offers robust file format support when exporting your UML diagrams,\
    \ including Adobe PDF. Not only that, by selecting *File* ➤ *Export as* ➤ *Advanced*,\
    \ you get to set attributes such as DPI (dots per inch) and border width.\n\n\
    *   Download the desktop app for **Diagrams.net** from [`https://github.com/jgraph/drawio-desktop/releases`](https://github.com/jgraph/drawio-desktop/releases)\n\
    \n*   Run **Diagrams.net** on your browser at [`https://app.diagrams.net`](https://app.diagrams.net)\n\
    \n## Umbrello by Paul Hensgen and Umbrello UML Modeler Authors\n\nBeing in development\
    \ since 2001, *Umbrello* is a great tool for any type of UML work. The software\
    \ has an intuitive user interface as well as the option to generate code from\
    \ UML. Umbrello can export your diagrams into (usually) functional Java, C#, Python,\
    \ and many other programming languages; simply navigate to *Code* ➤ *Code Generation\
    \ Wizard,* set your options, and click *Next.* The software also offers excellent\
    \ formatting features, including having all of your operating system fonts available\
    \ for the diagrams you’re working on.\n\nDon’t let the garish default color scheme\
    \ fool you—Umbrello is a highly useful application for many types of diagrammatic\
    \ work.\n\n*   Download the desktop app for **Umbrello** from [`https://umbrello.kde.org`](https://umbrello.kde.org)\n\
    \n## In Closing\n\nFinishing this chapter, you have gained knowledge on the following:\n\
    \n*   The basic elements of UML class and use case diagrams\n\n*   How to translate\
    \ simple UML diagrams into Java, C#, and Python"
  trans: "\n## UML 用例图\n\n尽管本书不涉及所有 UML 图类型，但还有一种你应该熟悉。这就是*用例图*，它以最简单的方式展示用户与系统的交互。这些通常是包含少量技术细节的高层图。\n\
    \n现在我们将介绍几个新的 UML 元素，分别是*参与者*、*系统*和*用例*。此外，用例图使用熟悉的简单线条来表示关系。请参见图 9-9 中的简单用例图。\n\
    \n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig9_HTML.jpg](img/507458_1_En_9_Fig9_HTML.jpg)\n\
    \n图 9-9\n\n一个描述书籍编写过程中章节审阅的 UML 用例图\n\n你会在图 9-9 中看到两个参与者，由可爱的小人图标表示。通常最好保持参与者的类别属性，例如将作者命名为*作者*而不是*约翰*或*梅洛迪·伍利索克斯*。在\
    \ UML 中，发起交互的参与者称为*主要参与者*。*次要参与者*则用于响应主要参与者的操作。\n\n*系统*的第二个元素在 UML 中用一个简单的矩形表示；在图\
    \ 9-9 中，它被称为*章节审阅*。在系统内部，我们有内部的*用例*，用椭圆形表示。这些代表了完成特定用例所需的不同阶段。最后，我们有熟悉的普通线条来表示参与者和用例之间的不同关联。\n\
    \n现在，图 9-9 中的图表描述了以下事件序列：\n\n*   **作者**，主要参与者，撰写章节。\n*   完成的章节由**作者**和**章节审阅者**（次要参与者）共同阅读。这由两个参与者之间的共享关联表示。\n\
    *   章节审阅者提出对章节的修改建议。\n*   最后，作者将修改提交到章节中，结束该场景。\n\n## 更多关于用例的内容\n\n现在来看一个稍微复杂的用例，以介绍两个新元素：*扩展*和*包含*关系（见图\
    \ 9-10）。与 UML 类图一样，我们也可以将这些有用的注释元素融入 UML 用例图中。\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig10_HTML.jpg](img/507458_1_En_9_Fig10_HTML.jpg)\n\
    \n图 9-10\n\n一个描述电子邮件服务基本功能的 UML 用例图\n\n图 9-10 描述了一个简单的电子邮件用例场景。我们有*账户所有者*（即人类用户）作为主要参与者，*电子邮件服务器*作为次要参与者。图\
    \ 9-10 包含以下事件序列：\n\n*   **账户所有者**使用密码登录。如果输入错误代码，则会触发一个名为*密码错误*的可选用例；此结果用箭头和关键字\
    \ *<<extends>>* 表示。\n*   账户所有者可能还想阅读一些帮助文件。这也是一个可选场景，因此使用关键字 <<extends>> 表示。\n\
    *   *登录*用例的成功结果会自动导致另一个名为*验证密码*的用例，如关键字 *<<includes>>* 所示。次要参与者*电子邮件服务器*参与密码验证过程，因此在图\
    \ 9-9 中，该参与者与验证密码用例之间存在一条关联线。\n*   *验证密码*用例又引出三个用例：*查看电子邮件*、*删除电子邮件*和*发送电子邮件*。自然，次要参与者*电子邮件服务器*也参与所有这些操作，尽管只是被动角色；账户所有者根据自己的意愿发起这三个操作。\n\
    \n    在描述用例中的关系时，请注意箭头的方向。\n\n## UML 工具\n\n除了纸笔之外，如果你想在电脑上尝试绘制 UML，有很多优秀的免费选择。现在我们来回顾一些最好的工具示例。\n\
    \n## UMLet 团队开发的 UMLet 和 UMLetino\n\n*UMLet* 是一款免费且出色的开源工具，凭借其直观的拖放用户界面，你可以快速绘制出漂亮的类图。关联线可以很好地吸附到类边缘并保持在那里，使组织图表变得轻而易举。\n\
    \nUMLet 为类图、用例图、时序图等提供了现成的视觉元素选择。该程序可以导出为多种常见的图像文件格式，包括 PNG、GIF 和 SVG。对于需要一款简洁干净的\
    \ UML 设计工具的人来说，UMLet 是绝对必备的。本书中的所有图表均使用 UMLet 创建。\n\nUMLet 的一个有趣特性是其半自动图表创建功能。通过导航到\
    \ *文件* ➤ *从文件或目录生成类元素*，你可以设置 UML 图表的初始阶段。不幸的是，使用此功能时，UMLet 在创建关联方面存在一些问题。\n\n\
    UMLetino 是同一软件的基于浏览器的版本。它具备其离线版本的大部分功能。此外，UMLetino 集成了 Dropbox，用于导入和导出图表文件。不过，该软件仅支持输出\
    \ PNG 图像文件。\n\n*   从 [`www.umlet.com`](http://www.umlet.com) 下载适用于任何支持 Java 的操作系统的\
    \ **UMLet**\n*   在任何支持 Java 的浏览器中运行 **UMLetino**，网址为 [`www.umletino.com/umletino.html`](http://www.umletino.com/umletino.html)\n\
    \n## Diagrams.net 团队开发的 Diagrams.net\n\n*Diagrams.net* 由一支专注的团队积极维护，是一款多功能开源工具，提供浏览器版和桌面版。桌面版无需用户注册。Diagrams.net\
    \ 既适用于基本的 UML 工作，也适用于高级用户，具有图层和“插件”等附加功能。\n\n该软件原名“draw.io”，在导出 UML 图表时提供强大的文件格式支持，包括\
    \ Adobe PDF。不仅如此，通过选择 *文件* ➤ *导出为* ➤ *高级*，你还可以设置 DPI（每英寸点数）和边框宽度等属性。\n\n*   从\
    \ [`https://github.com/jgraph/drawio-desktop/releases`](https://github.com/jgraph/drawio-desktop/releases)\
    \ 下载 **Diagrams.net** 桌面应用\n*   在浏览器中运行 **Diagrams.net**，网址为 [`https://app.diagrams.net`](https://app.diagrams.net)\n\
    \n## Paul Hensgen 和 Umbrello UML Modeler 作者开发的 Umbrello\n\n*Umbrello* 自 2001 年开始开发，是适用于任何类型\
    \ UML 工作的优秀工具。该软件具有直观的用户界面，并且可以选择从 UML 生成代码。Umbrello 可以将你的图表导出为（通常可用的）Java、C#、Python\
    \ 和许多其他编程语言；只需导航到 *代码* ➤ *代码生成向导*，设置选项，然后点击 *下一步*。该软件还提供出色的格式化功能，包括在正在处理的图表中使用你操作系统中的所有字体。\n\
    \n不要被花哨的默认配色方案所迷惑——Umbrello 是一款对多种图表工作都非常有用的应用程序。\n\n*   从 [`https://umbrello.kde.org`](https://umbrello.kde.org)\
    \ 下载 **Umbrello** 桌面应用\n\n## 结语\n\n完成本章后，你将掌握以下知识：\n\n*   UML 类图和用例图的基本元素\n* \
    \  如何将简单的 UML 图转换为 Java、C# 和 Python\n"
- fmt: "# Afterword\n\nAnd so we reach the end of this book. The programming jargon\
    \ which you might’ve found daunting in the past has become less intimidating.\
    \ By now, `variables`, `classes`, and `objects` have become at least somewhat\
    \ familiar concepts to you. You know how to make simple text-based applications\
    \ in `Java`, `C#`, and `Python`. Perhaps you can even casually explain `Python`’s\
    \ strict requirements for indentation at parties. But your journey as a programmer\
    \ is far from over. Knowing the building blocks of coding in three languages,\
    \ you can now start gaining more experience in the field. A world of problem-solving\
    \ awaits you.\n\nProgramming can be frustrating. But there’s something uniquely\
    \ satisfying in getting a pesky, nonfunctional listing to finally work. Whether\
    \ you end up coding in a professional context or not, programming may become a\
    \ kind of constructive addiction at some point. It can also be a wonderful cure\
    \ for insomnia and/or boredom.\n\nIt takes a lot of intent and time to manifest\
    \ meaningful coding projects, whether they are video games or atomized programming\
    \ tasks defined by one’s employer. But no line is wasted as you grow as a programmer.\
    \ Even error messages can teach you the most valuable things.\n\n`Ada Lovelace`,\
    \ the love child of `Lord` and `Lady Byron`, is considered one of world’s first\
    \ programmers. She worked with several prominent scientists of her day, including\
    \ `Charles Babbage` and `Michael Faraday`, at some point producing what is considered\
    \ the first ever computer program. We’ll let Ada have the last words:\n\n> *I\
    \ can throw rays from every quarter of the universe into one vast focus. My course\
    \ is so clear and obvious that it is delightful to think how straight it is.*\n\
