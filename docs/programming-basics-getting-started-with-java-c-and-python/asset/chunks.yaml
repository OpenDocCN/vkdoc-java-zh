    ## 你的（可能是）第一个 Java 对象


    类非常适合组织数据，但它们能做的远不止于此。以 `geezer` 类为起点，让我们添加代码，在 Java 中创建一个实际的对象（参见代码清单 4-2）。


    ```

    public class Geezer {

    private String name;

    public String getName() {

    return name;

    }

    public void setName(String newName) {

    this.name = newName;

    }

    // 我们添加一个 main 方法，以便实际试验我们的类

    public static void main(String args[]) {

    // 接下来，我们以 geezer 类为蓝图创建一个对象

    // 我们将这个对象命名为 "some_geezer"

    // 并使用 Java 内置的 new 方法来创建它

    Geezer some_geezer = new Geezer();

    // 接着，我们调用 setName 方法为我们的 geezer 对象命名

    some_geezer.setName("John");

    // 最后，我们访问 geezer 对象，以两种不同的方式打印出名字

    System.out.println("你好，我的名字是 "+some_geezer.name+" 这个老家伙！");

    System.out.println("你能重复一遍吗？"+"是 "+some_geezer.getName());

    }

    }

    代码清单 4-2

    Java 中包含 main 方法的类定义（文件名 Geezer.java）

    ```


    在代码清单 4-2 中，我们同时使用了所谓的点运算符（即 *some_geezer.name*）和 `getName` 方法来从对象中读取数据。点运算符也被称为*成员运算符*。


    `public static void main(String[ ] args)` 这一行是每个 Java 程序开始处理的地方，用户也能在此看到屏幕上出现内容。`String[
    ] args` 这部分基本上意味着程序接受一个文本字符串作为其执行者的输入（例如，用户可能通过输入“myProgram hello”而不是“myProgram”来启动程序，以达到各种不同的效果）。


    ## Java 字母汤：JDK、JVM 和 JRE


    在继续学习面向对象编程之前，让我们先了解一下 Java 开发中三个最关键的软件组件。毫无疑问，在你的编程之旅中，你会相当频繁地遇到这些术语。首先，有 *Java
    开发工具包 (JDK)*。这是用 Java 编码所需的核心类与工具的集合。JDK 有多个不同的版本。


    接下来，我们有 *Java 运行时环境 (JRE)*。这个组件用于将 JDK 中生成的代码输出与一些额外的必要软件库结合起来，从而使 Java 程序能够实际执行。


    最后，我们有 *Java 虚拟机 (JVM)*。在台式电脑上创建的 Java 程序可以在任何安装了 JVM 的设备上运行。因此，这种在专用虚拟机上运行 Java
    的方法实现了高度的平台独立性。


    你可能还记得第 2 章的内容，Java 是一种*解释型语言*。当执行用 Java 编写的程序时，编译器会生成*字节码*。这是一种中间格式，需要 Java 虚拟机
    (JVM) 才能运行；没有 JVM，你就无法启动字节码程序。由于 JVM 可用于大多数现代计算机和设备，这种方法使得 Java 几乎具有普遍的跨平台性。


    ## C# 中的对象


    在 Java 中创建了我们的（可能是）第一个对象之后，现在让我们在 C# 中做同样的事情。参见代码清单 4-3，其功能与代码清单 4-2 完全相同。这将展示
    Java 和 C# 在语法上的许多相似之处。


    ```

    using System;

    public class Geezer {

    private String name;

    public String getName() {

    return name;

    }

    public void setName(String newName) {

    this.name = newName;

    }

    public static void Main(string[] args) {

    Geezer some_geezer = new Geezer();

    some_geezer.setName("John");

    // 下面两行是 Java 和 C# 代码清单中差异最大的地方

    Console.WriteLine("你好，我的名字是 "+some_geezer.name+" 这个老家伙！");

    Console.WriteLine("你能重复一遍吗？"+"是 "+some_geezer.getName());

    }

    }

