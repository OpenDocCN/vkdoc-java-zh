- fmt: '# Python and OOP


    We have not forgotten about Python, and, yes, it’s as object oriented as it gets.
    Although the language supports all major OOP techniques, the syntax is quite different
    to that of Java and C#. For one, most of those lovely curly brackets remain absent.
    Also, constructors in Python are defined with the keyword `__init__()` (that’s
    two underscores on each side).


    In Python, whitespace becomes a very important factor. As mentioned in Chapter
    [2](#507458_1_En_2_Chapter.xhtml), indentation is an integral part of the Python
    syntax and is used to denote code blocks inside listings.


    Now, let’s make a simple class application in Python. In Listing [4-8](#507458_1_En_4_Chapter.xhtml#PC8),
    we create a class and a constructor method and also instantiate an object using
    the said class.


    ```

    class Publisher:

    def __init__(self, name):

    self.name = name

    "Create new object, cool_publisher, from the above class"

    cool_publisher = Publisher("Apress")

    "Display its name"

    print(cool_publisher.name, "is cool!")

    Listing 4-8

    A simple Python listing demonstrating OOP

    ```


    Gazing upon Listing [4-8](#507458_1_En_4_Chapter.xhtml#PC8), you’ll immediately
    notice the differences to Java and C#. First off, the class `Publisher` consists
    of three separate code blocks, separated by three different levels of indentation.
    Python will actually throw out an error if this formatting logic isn’t followed.
    Thankfully, most Python IDEs add whitespace automatically where applicable.


    In Python, class and constructor declarations end with a colon (`:`). The expression
    `self` is used to address the classes’ variables for each object it produces.
    Creating objects in Python is rather straightforward; we give them a name and
    assign a class with a constructor of our choosing. In Listing [4-8](#507458_1_En_4_Chapter.xhtml#PC8),
    there’s only one constructor which accepts values for the publisher class’s sole
    variable, `name`.


    Let’s next try something a little bit more complicated in Python (see Listing
    [4-9](#507458_1_En_4_Chapter.xhtml#PC9)).


    ```

    "Create and initialize a global variable"

    potato_count = 0

    class Potato:

    "Make a constructor"

    def __init__(self, *args):

    global potato_count # point out potato_count is indeed global

    "country defaults to Finland if no value is given"

    self.country = "Finland"

    "Take the first argument as diameter"

    self.diameter = args[0]

    "Take the second argument as cultivar"

    self.cultivar = args[1]

    "Increase global variable value by one"

    potato_count += 1

    "If over two arguments are given assume the third one is for country"

    if len(args) > 2:

    self.country = args[2]

    "Make a method for displaying object information"

    def printInfo(self):

    print("My cultivar is", self.cultivar, "and my diameter is", self.diameter, "inches")

    #If the country-variable is not empty (!= "") display it"

    if self.country != "":

    print("I was grown in", self.country)

    "Create three objects of class Potato"

    potato1 = Potato(3, "Lemin kirjava")

    potato2 = Potato(5, "French Fingerling", "France", "This does nothing")

    potato1.printInfo()

    potato2.printInfo()

    print("Total potato-cultivars listed:", potato_count)

    Listing 4-9

    A listing in Python demonstrating class construction

    ```


    The output of Listing [4-9](#507458_1_En_4_Chapter.xhtml#PC9) should look like
    this:


    ```

    My cultivar is Lemin kirjava and my diameter is 3 inches

    I was grown in Finland

    My cultivar is French Fingerling and my diameter is 5 inches

    I was grown in France

    Total potato-cultivars listed: 2

    ```


    Our slightly more complicated Python listing introduces several new concepts.
    One of those is *global variables.* These refer to variables which can be used
    at any point within a Python listing, both inside and outside of methods (of any
    class).


    Next in Listing [4-9](#507458_1_En_4_Chapter.xhtml#PC9), we have the line `def
    __init__(self, *args):` which is the sole constructor for our `Potato` class.
    Instead of accepting specific data types, it takes a list of arguments as indicated
    by the expression `*args`.


    Python doesn’t support method overloading per se, unlike Java and C#. If we were
    to enter any number of methods into a class for overloading purposes, each of
    these methods would simply override the previous one.


    To assign an argument into a variable, we use `args[0]` for the first argument
    and `args[1]` for the second. As you can tell, Python begins counting arguments
    from zero.


    Now, Python has a handy built-in function for determining the length of lists
    and other data structures, `len`. This is put to use in the following line in
    our listing `if len(args) > 2:` which simply means “if the length of arguments
    exceeds two.” Basically our program accepts up to three arguments; the rest are
    simply discarded. This in turn is demonstrated with object `potato2` when we give
    it a total of four arguments; the last argument has no effect.


    As for `potato_count`, our global variable, its value is increased by one every
    time a new object is instantiated from the `Potato` class. This naturally reflects
    the total number of `Potato` objects rather accurately.


    ## Inheritance in Python


    Let’s cover one more important topic before closing the chapter. Inheritance in
    Python is quite simple to implement (see Listing [4-10](#507458_1_En_4_Chapter.xhtml#PC10)).


    ```

    class Computer:

    def __init__(self, *args):

    self.type = args[0]

    self.cpu = args[1]

    "Define a method for displaying type"

    def printType(self):

    print("I use a", self.type, "as my daily driver.")

    "Create a child class, Desktop"

    class Desktop(Computer):

    def __init__(self, *args):

    Computer.__init__(self, *args)

    self.color = args[2]

    "Create an object using Desktop-class"

    computer1 = Desktop("Commodore 64", "MOS 8500", "beige")

    computer1.printType()

    print("It has a", computer1.cpu, "CPU.")

    print("It is a wonderful", computer1.color, "computer.")

    Listing 4-10

    A Python listing demonstrating inheritance. The child class definition is in bold

    ```


    In Listing [4-10](#507458_1_En_4_Chapter.xhtml#PC10), the line `class Desktop(Computer):`
    denotes the beginning of an inherited class, `Desktop`, which inherits all of
    the variables of its originating class, `Computer`. In our example, this means
    strings `type` and `cpu` now become a part of class `Desktop`. In addition, we
    declare an additional variable, `color`, inside our inherited class, giving it
    three variables to use in total.


    Naturally, inheritance in Python doesn’t only apply to variables; methods are
    passed on as well. In Listing [4-10](#507458_1_En_4_Chapter.xhtml#PC10), `printType`
    is a method originating in the `Computer` class. However, we can summon it using
    an object instantiated from the `Desktop` class.'
