- fmt: '# Constructor Methods


    An object receives initial values for all of its variables from the class definition.
    However, whenever an object is created, a constructor can be called to set all
    or parts of this variable data instead.


    You can create new constructors simply by defining methods which accept extra
    attributes. These attributes are then passed on to each object, as needed, to
    replace the original values defined in the class. See Listing [4-5](#507458_1_En_4_Chapter.xhtml#PC5)
    for an example.


    A constructor method must have an identical name with the class it’s included
    in. In our example program, the two constructors are both titled `Movie` as per
    their originating class.


    ```

    public class Movie {

    // Class variables and their default values

    private String title="Jack and Jill";

    private int release_year = 2011;

    // This is a default constructor. Java creates them automatically if need be

    public Movie() {

    }

    // This is a constructor-method for setting both movie title and release year

    public Movie(String name, int year) {

    release_year = year;

    title = name;

    }

    // This is a constructor for setting the movie title only

    public Movie(String name) {

    release_year = 2021;

    title = name;

    }

    public static void main(String[] args) {

    // Create three objects based on class "Movie"

    Movie myMovie = new Movie("Jack and Jill 2");

    Movie myMovie2 = new Movie("The Ridiculous 6", 2015);

    Movie myMovie3 = new Movie();

    // Display the data stored in these three objects

    System.out.println(myMovie.title + " (" + myMovie.release_year+")");

    System.out.println(myMovie2.title + " (" + myMovie2.release_year+")");

    System.out.println(myMovie3.title + " (" + myMovie3.release_year+")");

    }

    }

    Listing 4-5

    A listing in Java demonstrating the use of constructor methods (Movie.java)

    ```


    Now, in Listing [4-5](#507458_1_En_4_Chapter.xhtml#PC5), we summon three objects
    all based on the class `Movie`. All of these objects use different constructor
    methods to bring them to life.


    The first object, dealing with the theoretical (but assuredly wonderful) movie
    *Jack and Jill 2*, is created using the constructor method which accepts a single
    string. The second object in Listing [4-5](#507458_1_En_4_Chapter.xhtml#PC5) uses
    the more versatile constructor which accepts both a string and an integer. The
    third and final object in our example is created using the most basic constructor
    available, which accepts no attributes whatsoever; it will assign the default
    values (“Jack and Jill” and 2011) into our object, as entered into the class definition.


    # Overloading Methods


    In OOP, you can have multiple methods of the same name without an issue, as long
    as the quantity and data type of their parameters are different (see Listing [4-6](#507458_1_En_4_Chapter.xhtml#PC6)).


    ```

    public class OverloadingFun {

    // Method for returning a middle-initial as an integer

    static int MakeName(int middle) {

    return middle;

    }

    // Method for combining three strings into a full name

    static String MakeName(String first, String mid, String last) {

    return first + mid + last;

    }

    public static void main(String[] args) {

    // Define an integer using our first method

    int integer_initial = MakeName(80); // 80 stands for ''P'' in the ASCII-system

    // Convert this integer into single character-type using typecasting

    char middle_initial=(char)integer_initial;

    // Convert the new character variable into a string

    String mid=String.valueOf(middle_initial);

    // Add all three names to create full name using the second method

    String fullname = MakeName("Rick ", mid, " Astley");

    System.out.println("Full name: " + fullname);

    }

    }

    Listing 4-6

    A listing in Java demonstrating the overloading of methods (OverloadingFun.java)

    ```


    Listing [4-6](#507458_1_En_4_Chapter.xhtml#PC6) features two methods called `MakeName`.
    The first method accepts integer values, while its sibling takes three strings.
    In order for the latter to do its job, the aforementioned integer value is first
    converted into a single character variable. This is done using Java’s *typecasting*
    functionality and results in the letter “P” being stored into the variable `integer_initial`.
    This variable is then converted into a string using Java’s `valueOf`-function.


    Finally, we combine three strings, including the middle initial, into the name
    of a popular British pop singer.


    # Access Modifiers in More Detail


    By now, you have encountered access modifiers several times in our listings. Let’s
    recap them next; they are very crucial in OOP, after all. Also, there’s more to
    them than `private` or `public`. See Tables [4-2](#507458_1_En_4_Chapter.xhtml#Tab2)
    and [4-3](#507458_1_En_4_Chapter.xhtml#Tab3) for rundowns on the most common access
    modifiers in Java and C#, respectively. You will notice both languages have a
    different number of access modifiers, although they both basically adhere to the
    same OOP logic. Also, classes can have access to packages in Java.


    **Table 4-2** The most common access modifiers in Java


    | Access modifier | When used with | Accessibility |

    | --- | --- | --- |

    | `public` | Classes | Accessible by other classes |

    | `protected` | | Accessible by the declaring and derived classes, and classes
    in the same package |

    | `final` | | Class cannot inherited by any others |

    | `abstract` | | Class is abstract; it cannot instantiate objects |

    | `public` | Variables, methods, constructors | Code is accessible by all classes
    |

    | `private` | | Code is only accessible by the declared class |

    | `default` (i.e., none specified) | | Code is only accessible in the same package
    |

    | `final` | | Variables and methods can’t be modified |


    As a reminder, in Java, a *package* refers to a group of related classes. We use
    the `import` keyword in our program listings to bring specific classes (e.g.,
    `import package.name.happyclass`) or full packages (e.g., `import package.name.*`)
    into our projects for additional functionality. The asterisk character (`*`) used
    in the latter type of imports is called a *wildcard*.


    # Why Access Modifiers Matter


    You may be wondering what specific uses access modifiers actually offer; now would
    be a good time to review some scenarios in which they provide definite benefits.
    One such scenario involves teamwork. Encapsulated data protects especially larger
    projects against human errors. With encapsulated code programmers need not necessarily
    know *how* a method works; what matters is the output. This often speeds up development
    time.


    Also, the correct use of access modifiers makes programs more readable from the
    programmer’s point of view in general. Updating and maintaining encapsulated software
    projects is usually more straightforward than those of the procedural (i.e., non-OOP)
    kind.


    Remember, encapsulation in OOP covers two meanings. First, it’s a term used to
    describe the approach of pairing data with methods using classes. Second, it refers
    to restricting direct access to data on the programming level using access modifiers.'
