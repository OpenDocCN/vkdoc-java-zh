    ## 过程式范式与面向对象范式


    如第 2 章所述，目前主要有两大编程范式：过程式编程和面向对象编程。20 世纪 70 年代末是计算机科学领域激动人心的时代。在此之前，大多数编程严格遵循过程式语言的范畴，这些语言采用所谓的“自顶向下”设计范式。基本上，采用这种方法时，程序员最后才处理细节问题，大部分精力都集中在程序的主函数上。


    面向对象革命是由 C++的发布引发的。该语言于 1985 年发布，迅速被广泛应用于大多数场景。采用“自底向上”的设计方法，C++和其他面向对象语言侧重于首先定义数据，这些数据通常以现实生活中的现象为模型。此外，与过程式语言相比，它们提供了大量额外的功能。这包括*封装*，这是一种通过实现访问说明符来隔离代码各部分的技术。接下来我们将更详细地探讨封装及其他面向对象的特性。


    过程式编程语言与面向对象编程语言的主要区别见表 4-1。


    表 4-1


    两大编程范式的主要区别


    |   | 过程式编程 | 面向对象编程 |

    | --- | --- | --- |

    | 示例语言 | (过程式) C、Pascal、BASIC | C#、C++、Java、Python |

    | 基于 | 抽象世界 | 现实场景 |

    | 方法 | 自顶向下：将主要问题分解为子过程 | 自底向上：首先创建数据类 |

    | 重点 | 函数（即过程） | 数据（即类） |

    | 继承 | 不支持 | 支持 |

    | 封装（数据安全性） | 低：无访问修饰符 | 高：多级访问修饰符 |

    | 方法重载（多个同名方法） | 不支持 | 支持 |


    ## 类、继承与 UML


    让我们重新审视面向对象编程（OOP）中最基本的概念，因为我们在第 2 章中仅触及了其中一部分。我们将继续探讨*类*和*对象*的概念。现在你可能已经知道，在
    OOP 中，类是一种用于创建代码对象的蓝图。


    尤其是在大型软件项目中，在编写一行代码之前，先动笔规划通常是个好主意。可视化面向对象软件的最佳且最流行的工具之一就是使用*统一建模语言（UML）*。UML
    由*Rational Software*公司在 20 世纪 90 年代中期创建，此后已成为软件工程中无处不在的工具。让我们通过一个关于冰淇淋的*类图*来体验一下（见图
    4-1）。


    ![../images/507458_1_En_4_Chapter/507458_1_En_4_Fig1_HTML.jpg](img/507458_1_En_4_Fig1_HTML.jpg)


    图 4-1


    一个展示 UML 基础的简单类图


    图 4-1 中最顶部的方框（即*Ice Cream*）是一个*抽象类*。基本上，这些类不能用于创建对象。那为什么还要有它们呢？嗯，抽象类可以保存与普通类相同类型的信息。它们也可以有子类。抽象类的目的是为其子类提供一些共享信息，以便子类继承并用于创建对象。在许多情况下，使用抽象类可以简化设计过程。


    抽象类下方的三个方框被称为*子类*。它们展示了*继承*，这是 OOP 中的一个关键概念。*Vanilla*、*Chocolate*和*Ghost Pepper*接收了其*超类*
    Ice Cream 内置的所有变量和方法。请注意这些方框是如何连接的。在 UML 中，不同类型的箭头描述不同的事物。如图 4-1 所示的空心箭头表示简单的继承。在
    UML 中，还必须注意箭头的方向。


    现在，在 UML 中，通过将类名设为斜体来表示抽象类；普通类通常没有任何特殊样式。接下来，一个类方框会列出其变量及其数据类型。变量前的加号（+）表示它是公有的，而减号（-）表示私有变量。最后，我们列出类中的所有方法，就像我们在图
    4-1 中对`Display_Flavor( )`和其他方法所做的那样。


    UML 的内容远不止我们目前介绍的元素。在本书后续章节中，我们将更详细地探讨这种出色的建模语言。目前，你只需理解 UML 如何帮助你可视化软件项目就足够了。


    ## 封装


    在 OOP 的语境中，*抽象*和*封装*的概念密切相关。前者指的是对程序的用户/编码者隐藏不相关信息的技术。后者则涉及软件的内部运作；在封装中，用于操作的数据和函数都存储在类内部。然后，每个类都设有控制机制，以决定哪些数据可以被其他类访问。让我们用
    Java 来演示一下封装，好吗？（见代码清单 4-1。）


    *Get*和*Set*是 Java 乃至整个 OOP 中非常重要的关键字。它们与*return*命令结合使用，用于在类内部检索和定义数据。提醒一下，函数（也称为方法）是一段仅在调用时运行的代码。


    ```

    public class Geezer {

    // 私有访问修饰符用于限制其他类的访问

    private String name;

    // Get 函数用于检索 name 变量

    // 其命名规范是“get”小写开头，变量名大写开头

    public String getName() {

    return name;

    }

    // Set 函数用于定义数据

    public void setName(String newName) {

    this.name = newName;

    }

    }

    代码清单 4-1

    一个包含 Get 和 Set 函数的 Java 类定义（文件名：Geezer.java）

    ```


    代码清单 4-1 无法在 IDE 或在线开发环境中执行，因为它缺少 Java 的 main 方法。该代码清单仅用于演示目的。我们很快就会进入实际可执行的 Java
    代码。


    我们通过给类定义命名来开始，该名称也将作为文件名。在我们的示例中，它将是*Geezer*。我们对其做的第一件事是定义一个*String*类型的变量（显然用于存储老家伙的名字）。变量定义前的关键字*private*被称为*访问修饰符*。私有方法和变量只能在其定义的类内部访问（在我们的例子中，只能从
    Geezer 内部访问）。


    getName 方法使用 return 关键字来检索老家伙的名字。该方法被创建为公有的，并且返回值为 String 类型。这仅仅是因为它预期返回一个 String
    变量的值。


    接下来，让我们分解一下我们在代码清单 4-1 中定义的 setName 方法。关键字对*public void*指定了一个不返回任何值的方法。它通常与 set
    函数配合得很好，因为 set 函数用于定义变量，而不是从中检索值。在 Java 中，关键字*this*仅指代包含该方法的对象。

