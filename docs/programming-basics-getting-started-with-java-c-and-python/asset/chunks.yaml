- fmt: '# Procedural vs. Object-Oriented Paradigms


    As mentioned in Chapter [2](#507458_1_En_2_Chapter.xhtml), there are currently
    basically two major programming paradigms: procedural and object oriented. The
    late 1970s were an exciting time in computer science. Prior to that, most of programming
    was done strictly in the realm of procedural languages, which operates under a
    so-called “top-down” design paradigm. Basically, with this approach, the programmer
    takes care of the details last. Most focus goes into the main function of the
    program.


    The object-oriented revolution was kicked off by the release of `C++`. Released
    in 1985, the language quickly became widely adopted for most purposes. Using a
    “bottom-up” design approach, `C++` and other object-oriented languages focus on
    defining the data first which is often modeled after real-life phenomena. In addition,
    they provide plenty of additional functionality compared to their procedural counterparts.
    This includes *encapsulation*, a technique which is used to isolate parts of the
    code from one and other by implementing access specifiers. We’ll look at encapsulation
    and other object-oriented specifics in more detail next.


    See Table [4-1](#507458_1_En_4_Chapter.xhtml#Tab1) for the main differences between
    procedural and object-oriented programming languages.


    **Table 4-1** The main differences between the two main programming paradigms


    | | Procedural programming | Object-oriented programming |

    | --- | --- | --- |

    | Example languages | (Procedural) `C`, `Pascal`, `BASIC` | `C#`, `C++`, `Java`,
    `Python` |

    | Based on | The abstract world | Real-world scenarios |

    | Approach | Top down: the main problem is broken down into sub-procedures | Bottom
    up: data classes are created first |

    | Emphasis | Functions (i.e., procedures) | Data (i.e., classes) |

    | Inheritance | Not supported | Supported |

    | Encapsulation (data security) | Low: no access modifiers | High: multiple levels
    of access modifiers |

    | Method overloading (multiple methods with the same name) | Not supported | Supported
    |


    ## Classes, Inheritance, and UML


    Let’s revisit the most fundamental concepts of object-oriented programming (OOP)
    as we only touched on some of those in Chapter [2](#507458_1_En_2_Chapter.xhtml).
    We’ll continue with the concepts of *classes* and *objects.* By now you may know
    that in OOP, a class is a kind of blueprint for creating code objects.


    Now, with larger software projects especially, it’s often a good idea to put pen
    to paper, so to speak, before writing a line of code. One of the best and most
    popular tools for visualizing object-oriented software is to use *Universal Modeling
    Language (UML)*. Created by *Rational Software* in the mid-1990s, UML has since
    become a ubiquitous tool in software engineering. Let’s sample some with a *class
    diagram* about ice cream (see Figure [4-1](#507458_1_En_4_Chapter.xhtml#Fig1)).


    ![../images/507458_1_En_4_Chapter/507458_1_En_4_Fig1_HTML.jpg](images/507458_1_En_4_Chapter/507458_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1** A simple class diagram demonstrating the basics of UML


    The topmost box in Figure [4-1](#507458_1_En_4_Chapter.xhtml#Fig1) (i.e., *Ice
    Cream*) is an *abstract class*. Basically, these are classes which cannot be used
    to create objects with. Why have them then? Well, abstract classes can hold the
    same type of information as regular classes. They can have subclasses, too. The
    purpose of an abstract class is to provide some shared information for its subclasses
    to inherit and create objects with. In many cases, their use simplifies the design
    process.


    The three boxes below our abstract class are known as *subclasses.* They demonstrate
    *inheritance,* a crucial concept in OOP. *Vanilla*, *Chocolate*, and *Ghost Pepper*
    receive all the variables and methods which their *superclass,* Ice Cream, has
    built in. Pay attention to how the boxes are connected. Different varieties of
    arrows describe different things in UML. An empty arrowhead, as shown in Figure
    [4-1](#507458_1_En_4_Chapter.xhtml#Fig1), connotes simple inheritance. In UML,
    one must also pay attention to the direction of the arrow(s).


    Now, you denote abstract classes in UML by italicizing their name; regular classes
    are not generally stylized in any way. Next, a class box lists its variables and
    their data types. A plus (`+`) before a variable denotes that it’s public, while
    a minus (`-`) refers to a private variable. Finally, we list any methods found
    in our classes, like we did with `Display_Flavor()` and all the others in Figure
    [4-1](#507458_1_En_4_Chapter.xhtml#Fig1).


    There’s more to UML than the elements we’ve introduced so far. We’ll go into much
    more detail with this incredible modeling language in later chapters of the book.
    For now, it suffices you understand how UML can help you visualize a software
    project.


    ## Encapsulation


    The concepts of *abstraction* and *encapsulation* in the context of OOP are closely
    related. The former refers to the technique of hiding irrelevant information from
    the user/coder of a program. The latter deals with the internal workings of software;
    in encapsulation, both data and functions for their manipulation are stored inside
    classes. Each class then has controls in place for which data can be accessed
    from other classes. Let’s demonstrate encapsulation in Java, shall we? (See Listing
    [4-1](#507458_1_En_4_Chapter.xhtml#PC1).)


    `Get` and `Set` are very important keywords in Java and OOP in general. In conjunction
    with the `return` command, they are used for the retrieval and definition of data
    within classes. As a reminder, a function (a.k.a. a method) is a piece of code
    which runs only when called.


    ```

    public class Geezer {

    // The private-access modifier is used to limit access from other classes

    private String name;

    // The Get-function is used to retrieve name variable

    // Its naming convention is non-capitalized "get" and capitalized variable

    public String getName() {

    return name;

    }

    // The Set-function defines data

    public void setName(String newName) {

    this.name = newName;

    }

    }

    ```


    **Listing 4-1** A class definition in Java with Get- and Set-functions (file name
    `Geezer.java`)


    Listing [4-1](#507458_1_En_4_Chapter.xhtml#PC1) cannot be executed in IDEs or
    online development environments as it lacks the Java `main` method. The listing
    is provided for demonstrative purposes only. We’ll move into actually executable
    Java code shortly.


    We start out our class definition by giving it a name, which is also to be its
    file name. In our example, it shall be `Geezer`. The first thing we do with it
    is to define a variable of the type `String` (obviously for storing geezers’ names).
    The keyword `private` before the variable definition is known as an *access modifier*.
    Private methods and variables can only be accessed within the class they are defined
    in (in our case only from within `Geezer`).


    The `getName` method uses the `return` keyword to retrieve a geezer’s name. The
    method is created both public and of the value `String`. This is simply because
    it’s expected to return the value of a `String` variable.


    Let’s next break down the `setName` method we defined in Listing [4-1](#507458_1_En_4_Chapter.xhtml#PC1).
    The keyword pair `public void` specifies a method which doesn’t return a value.
    It goes well with set functions in general since they are used to define variables
    and not to retrieve values from them. The keyword `this` in Java simply addresses
    the object containing the method.'
