    ```


    In Listing [4-11](#507458_1_En_4_Chapter.xhtml#PC11), we use the keyword *pass*
    to create a class with no variables or methods. In Python, we can even instantiate
    these blank classes, which is what is done next. And now for the moderately fun
    part, say hello to ad hoc object modification. In Python, by referencing nonexistent
    variables within instances of blank classes, you create new data structures for
    said instances. We call this *attribute binding.*


    Attribute binding works for classes, too (see Listing [4-12](#507458_1_En_4_Chapter.xhtml#PC12)).


    ```

    class ToiletPaper:

    pass

    "Create object and add cost and brand -variables into it"

    type1 = ToiletPaper()

    type1.cost = 400

    type1.brand ="Sandpaper"

    "Add cost and brand into the class"

    ToiletPaper.cost = 4

    ToiletPaper.brand = "Supersoft"

    "Create an object from modified class ToiletPaper"

    type2 = ToiletPaper()

    print("We sell", type1.brand, "for", type1.cost, "dollars")

