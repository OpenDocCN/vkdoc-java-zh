- fmt: '# The FileInfo Class


    The `File` class has an alternative in C#; `FileInfo` offers more control and
    is more useful under certain conditions. Let’s take a peek at how to access file
    attributes with `FileInfo` with Listing [7-7](#507458_1_En_7_Chapter.xhtml#PC7).


    ```

    using System;

    using System.IO;

    class FileInfoAttributeFun

    {

    public static void Main()

    {

    string fileName1 = @"C:\apress.txt"; // Set our target file

    FileInfo ourfile = new FileInfo(fileName1);

    string na = ourfile.FullName;

    Console.WriteLine("Attributes for " + na + ":");

    string ex = ourfile.Extension;

    Console.WriteLine("File extension: " + ex);

    bool ro = ourfile.IsReadOnly;

    Console.WriteLine("Read-only file: " + ro);

    long sz = ourfile.Length;

    Console.WriteLine("Size: " + sz + " bytes");

    DateTime ct = ourfile.CreationTime;

    Console.WriteLine("Creation time: " + ct);

    DateTime la = ourfile.LastAccessTime;

    Console.WriteLine("Last access: " + la);

    }

    }

    Listing 7-7

    A listing demonstrating file-attribute access using the C# FileInfo class

    ```


    Listing [7-7](#507458_1_En_7_Chapter.xhtml#PC7) expects you to have a text file,
    `apress.txt`, in the root directory of your Windows hard drive. You can modify
    `filename1` to point at a different location and/or a different text file to make
    Listing [7-7](#507458_1_En_7_Chapter.xhtml#PC7) work its magic.


    Now would be a good time to take a peek at some of the most commonly used attributes
    accessible by the `FileInfo`. See Table [7-3](#507458_1_En_7_Chapter.xhtml#Tab3)
    for a rundown.


    **Table 7-3** Some properties included in the `FileInfo` class in C#.


    | Name | Returns a file’s name | Exists | Is used to determine if a specific file
    exists |

    | --- | --- | --- | --- |

    | `FullName` | Returns a file’s full name and directory path (e.g., `C:\MyFolder\myfile.txt`)
    | `Length` | Returns a file’s size in bytes |

    | `CreationTime` | Returns or changes a file’s “date of birth” | `Directory` |
    Returns an instance of the parent directory |

    | `LastAccessTime` | Returns or changes the time of last access of a file or directory
    | `Attributes` | Returns or changes a file’s attributes |


    Let’s next look at a somewhat more thorough example of C# file operations. In
    Listing [7-8](#507458_1_En_7_Chapter.xhtml#PC8), we use the `FileInfo` class somewhat
    more extensively. This includes copying a file using the `CopyTo` method as well
    as file removal using the `Delete` method.


    ```

    using System;

    using System.IO;

    class FileInfoExample

    {

    public static void Main()

    {

    string filename1 = @"C:\wackyfile.txt"; // Path to main file

    string file2 = @"c:\wacky_copy.txt"; // Path to copy of main file

    FileInfo ourfile = new FileInfo(filename1); // Create new FileInfo-object, "ourfile"

    FileInfo ourfile_copy = new FileInfo(file2); // Do the same for "ourfile_copy"

    // Use Exists-property to determine if file has already been created

    if(!ourfile.Exists) {

    File.Create(filename1).Dispose(); // Create file and disable file-lock on "ourfile"

    Console.WriteLine("File not found. Creating " + filename1);

    } else Console.WriteLine("File found.");

    // Display full name of our file

    Console.WriteLine("Attempting to make a copy of " + ourfile.FullName);

    // See if copy exists. If it doesn''t, duplicate file

    if(!ourfile_copy.Exists) { ourfile.CopyTo(file2);

    Console.WriteLine("{0} has been copied as {1}", ourfile, file2);

    } else Console.WriteLine("File not copied. Duplicate already found.");

    // Prompt user for input

    Console.WriteLine("Would you like to delete these files? (y/n)");

    char input1 = (char)Console.Read(); // Assign a Console.Read() to character "input1"

    if(input1==''y'') { // If user inputs ''y'' delete both files

    Console.WriteLine("Deleting files..");

    ourfile.Delete();

    ourfile_copy.Delete();

    } else Console.WriteLine("Files in C:\\ not deleted.");

    }

    }

    Listing 7-8

    A listing in C# demonstrating some file operations found in the FileInfo class

    ```


    Let’s go through Listing [7-8](#507458_1_En_7_Chapter.xhtml#PC8) in detail. First,
    we define two strings: `filename1` and `file2`. These strings contain full file
    paths and point to two files in the Windows root directory `C:`. We could also
    simply leave the paths out and stick with the file name only (i.e., `wackyfile.txt`
    and `wacky_copy.txt`).


    Next, we create an object using the `FileInfo` class, calling it `ourfile`. Another
    object, `ourfile_copy`, is then created for the file duplicate. We needed to instantiate
    `FileInfo` in order to use the class methods later on.


    The at sign, that is, `@`, before a string value indicates a literal string in
    C#. This means the strings which follow will not be parsed for any escape sequences,
    such as `"\\"` for a backslash. Compare the following lines (the top one being
    the literal string):


    `string file1 = @"c:\user\xerxes\documents\text\nincompoop.txt";`


    `string file1 = "c:\\user\\xerxes\\documents\\text\\nincompoop.txt";`


    The line `if(!ourfile.Exists)` is there to examine the rather self-explanatory
    `Exists` property of object `ourfile`. With an exclamation mark in front of it,
    the conditional clause reads “if `ourfile` does NOT exist.” Moving on, the line
    `File.Create(filename1).Dispose();` contains two instructions. First, the `Create`
    method is there to make an actual file on your storage system. The `Dispose` method
    basically releases the file’s access status. Without it, we may run into issues
    later in the program when manipulating this file.


    Now, back to our conditional clause. It ends with the keyword `else`, reading
    “if `ourfile` DOES exist,” and in this scenario, it outputs the message “File
    found.” Next, we attempt to copy the object `ourfile`. It’s time for another conditional
    clause. The line `if(!ourfile_copy.Exists) { ourfile.CopyTo(file2);` is there
    to again examine the existence of a file, this time focusing on the other file
    we defined earlier, `ourfile_copy`. If it does not exist, we summon the `CopyTo`
    method to copy `ourfile` (i.e., `wackyfile.txt`) onto `file2` (i.e., `wacky_copy.txt`).
    We again have an optional `else` keyword at the end of our conditional clause.
    This time it’s there to display the message “File not found. Duplicate already
    found.”


    We now move on to some user interaction. The user is prompted to press “y” (and
    hit return) if they wish to delete both the original file and its duplicate. This
    is achieved with the `Delete` method. Should the user enter any other character
    instead of “y,” the files remain intact and a message stating “Files in `C:\`
    not deleted.” is displayed instead.'
