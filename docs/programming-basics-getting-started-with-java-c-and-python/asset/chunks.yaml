  raw: '## Bit-Derived Units Explained


    Like you probably know by now, the smallest unit in computing is the bit. As with
    other quantities, it’s impractical to measure things solely with the atomic unit.
    Therefore, we have bytes, megabytes, and gigabytes, to name just three (see Table
    [3-2](#507458_1_En_3_Chapter.xhtml#Tab2)).


    Metric units (i.e., units using multipliers of power of ten) worked fine for the
    early days of personal computing. However, using these multipliers wasn’t entirely
    accurate. For example, a 1 kilobyte file is actually 1024 bytes and not 1000 (10³)
    as per the metric system.


    A typical hard drive with the stated capacity of, say, 250 GB (i.e., 250,000,000,000
    bytes) is actually 232.8 GB in size. Hardware manufacturers don’t usually mention
    these things. Figure you may go.


    In 1998, the *International Electrotechnical Commission (IEC)* created a more
    accurate measurement scheme. The new system used power-of-two multipliers. For
    example, a kilobyte became a *kibibyte* of 1024 bytes in size (2^(10) = 1024).
    These new units were sorely needed because they are much more accurate for measuring
    larger data pools.


    Table 3-2


    A comparison of the most commonly used metric and IEC-based data storage units


    | Metric unit | Value (metric) | IEC unit | Value (IEC) |

    | --- | --- | --- | --- |

    | Bit (b) | 0 or 1 (atomic/smallest unit) |   |   |

    | Byte (B) | Eight bits |   |   |

    | Kilobyte (kB) | 1,000 bytes | Kibibyte (KiB) | 1024 bytes |

    | Megabyte (MB) | 1,000,000 bytes | Mebibyte (MiB) | 1,048,576 bytes(1024 kibibytes)
    |

    | Gigabyte (GB) | 1,000,000,000 bytes(one billion bytes) | Gibibyte (GiB) | 1,073,741,824
    bytes(1024 mebibytes) |

    | Terabyte (TB) | 1,000,000,000,000 bytes(one trillion bytes) | Tebibyte (TiB)
    | 1,099,511,627,776 bytes(1024 gibibytes) |


    ## Multitasking in 64 Bits


    One of the major benefits of 64-bit computing is the greatly improved *multitasking*
    when compared to older 32-bit architecture. Multitasking refers to running several
    programs simultaneously. A typical programmer might have a great big IDE, *Photoshop*,
    *Spotify*, and 50 tabs open in *Firefox* at the same time on their computer. Having
    numerous gigabytes of RAM installed does away with a lot of the stutter and slowdown
    usually associated with scenarios involving running multiple programs. RAM upgrades
    are perhaps the most common way to push one’s PC into higher performance.


    ## Identifying Your Operating System Architecture


    You may want to check whether your operating system is 32 or 64 bits in its architecture.
    It’s quick and easy.


    *   In Windows 10, go to *Settings* ➤ *System* ➤ *About.* You’ll see the necessary
    details on this page.


    *   In Linux, open a terminal window and type *arch* and press enter to reveal
    your system architecture. An output displaying *x86_64* means you have a 64-bit
    edition of Linux. An output of *i386* or *i686* is displayed for 32-bit editions
    of this OS.


    *   As for *macOS,* every version of this operating system has been 64 bits (with
    varying degrees of backward compatibility for 32-bit software) since *Snow Leopard
    (10.6)* from 2009.


    ## Installing Eclipse for Java Development


    Good development environments provide search features, syntax highlighting, and
    in some cases support for multiple programming languages. We’ll first set you
    up with an environment specially made for Java development, the mighty *Eclipse
    IDE* by the Eclipse Foundation (see Figure [3-1](#507458_1_En_3_Chapter.xhtml#Fig1)).


    *The Eclipse Project* was originally created by IBM in November 2001\. *The Eclipse
    Foundation* then emerged in 2004 as an independent not-for-profit corporation.
    It was created as an open and transparent community around Eclipse.


    Eclipse is available for *Windows*, *macOS*, and *Linux.* Visit the download page
    provided in the following, and simply click the link which reflects the type of
    operating system you’re running. However, there is one caveat. The newest versions
    of Eclipse are only available for 64-bit editions of modern operating systems.
    In case you’re still rocking a 32-bit OS, see a dedicated link for an older version
    of Eclipse. They too will suit our purposes just fine.


    ![../images/507458_1_En_3_Chapter/507458_1_En_3_Fig1_HTML.jpg](images/507458_1_En_3_Chapter/507458_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Eclipse in action


    *   **Download and install** ***Eclipse for Java Developers*** **(64-bit edition)**:
    [`www.eclipse.org/downloads/packages/release/2020-12/r/eclipse-ide-java-developers`](http://www.eclipse.org/downloads/packages/release/2020-12/r/eclipse-ide-java-developers)


    *   **Download** ***Eclipse for Java Developers*** **(32-bit edition)**: [`www.eclipse.org/downloads/packages/release/helios/sr1/eclipse-ide-java-developers`](http://www.eclipse.org/downloads/packages/release/helios/sr1/eclipse-ide-java-developers)


    ## Installing Eclipse for Linux


    The Linux Repository may host an outdated version of Eclipse. For the installation
    of the most current version in Linux, we’ll use the Snapcraft method offered by
    Canonical Ltd. This approach should work on all major distributions of Linux.
    Open a terminal window, and enter the following lines:


    1.  **First, we make sure you have the** ***Java Runtime Environment (JRE)***
    **on your OS.** Type the following string into the terminal window:


    1.  **Next, we use the snappy system to download Eclipse:**


    ```

    sudo apt install default-jre

    Fedora Linux users might need to input the following Terminal-commands:

    sudo dnf install java-latest-openjdk.x86_64

    sudo dnf install java-latest-openjdk-devel.x86_64

    ```


    ```

    sudo snap install --classic eclipse

    ```


    You might be prompted for your password during the installation process. Upon
    successful installation, you should see the following message: *eclipse (version
    information) from Snapcrafters installed.*


    ## Eclipse First Launch


    Upon launching Eclipse, you’ll be prompted to select a directory for your Eclipse
    workspace. The default setting works for most purposes. Let’s create a new project.
    This is done by navigating to *File* ➤ *New* ➤ *Java Project* from the top menu
    bar. Next, you should see a window which awaits your project tile. Enter one and
    click *Create.*


    A window will appear asking whether you want *module-info.java* to be created
    or not. This file is a *module declaration* used by the modular functionality
    of Java. For simple applications, it’s fine if you choose *Don’t Create.*


    You will be taken to the main project view in Eclipse. We don’t quite have a functional
    Java application on our hands yet. Now, on the left, you’ll see the *Project Explorer.*
    Left-click your project name. Select *File* ➤ *New* ➤ *Class* from the top menu.
    Enter a name for this new class; it doesn’t have to share your project’s name.


    Next, make absolutely sure you have ticked the box next to *public static void
    main(String args).* This gives your project a *Java main method.* Without it,
    you can’t execute your project. Finally, click *Finish* to go to your brand new
    Java code listing. You can now start coding under the main method.


    ## Great IDEs for C# Development


    Let’s now review some choices for your go-to C# needs. We’ll start off with Microsoft’s
    *Visual Studio* which is a popular multi-platform IDE chock full of great features,
    including on-the-fly error underlining. The software is available for Windows
    and macOS.'
  trans: '

    ## 位衍生单位详解


    你可能已经知道，计算中最小的单位是比特（bit）。与其他量一样，仅用原子单位来衡量事物是不切实际的。因此，我们有了字节、兆字节和吉字节等，这里仅举三例（见表
    3-2）。


    公制单位（即使用十的幂次作为乘数的单位）在个人计算的早期阶段运行良好。然而，使用这些乘数并不完全准确。例如，一个 1 千字节的文件实际上是 1024 字节，而不是公制系统中的
    1000（10³）字节。


    一个标称容量为 250 GB（即 250,000,000,000 字节）的典型硬盘，其实际大小是 232.8 GB。硬件制造商通常不会提及这些细节。你大概心里有数。


    1998 年，*国际电工委员会（IEC）* 创建了一种更精确的度量方案。新系统使用二的幂次乘数。例如，1 千字节变成了大小为 1024 字节的 *kibibyte*（2¹⁰
    = 1024）。这些新单位非常必要，因为它们在测量更大的数据池时更加精确。


    表 3-2


    最常用的公制和基于 IEC 的数据存储单位对比


    | 公制单位 | 值（公制） | IEC 单位 | 值（IEC） |

    | --- | --- | --- | --- |

    | 比特 (b) | 0 或 1（原子/最小单位） |   |   |

    | 字节 (B) | 8 比特 |   |   |

    | 千字节 (kB) | 1,000 字节 | Kibibyte (KiB) | 1024 字节 |

    | 兆字节 (MB) | 1,000,000 字节 | Mebibyte (MiB) | 1,048,576 字节（1024 kibibytes） |

    | 吉字节 (GB) | 1,000,000,000 字节（十亿字节） | Gibibyte (GiB) | 1,073,741,824 字节（1024 mebibytes）
    |

    | 太字节 (TB) | 1,000,000,000,000 字节（一万亿字节） | Tebibyte (TiB) | 1,099,511,627,776
    字节（1024 gibibytes） |


    ## 64 位下的多任务处理


    64 位计算的主要优势之一，是与较旧的 32 位架构相比，*多任务处理*能力得到了极大提升。多任务处理指的是同时运行多个程序。一个典型的程序员可能会在电脑上同时打开一个大型
    IDE、*Photoshop*、*Spotify* 以及 *Firefox* 中的 50 个标签页。安装大量吉字节的 RAM 可以消除通常与运行多个程序场景相关的卡顿和速度下降。升级
    RAM 或许是提升个人电脑性能最常用的方法。


    ## 识别你的操作系统架构


    你可能想检查一下你的操作系统是 32 位还是 64 位架构。这既快捷又简单。


    *   在 Windows 10 中，转到 *设置* ➤ *系统* ➤ *关于*。你会在该页面上看到必要的详细信息。


    *   在 Linux 中，打开一个终端窗口，输入 *arch* 并按回车键，即可显示你的系统架构。输出显示 *x86_64* 表示你拥有 64 位版本的
    Linux。对于 32 位版本的此操作系统，则会显示 *i386* 或 *i686*。


    *   至于 *macOS*，自 2009 年的 *Snow Leopard (10.6)* 以来，该操作系统的每个版本都是 64 位的（对 32 位软件具有不同程度的向后兼容性）。


    ## 安装用于 Java 开发的 Eclipse


    优秀的开发环境提供搜索功能、语法高亮，并且在某些情况下支持多种编程语言。我们首先为你设置一个专为 Java 开发打造的环境，即由 Eclipse 基金会开发的强大的
    *Eclipse IDE*（见图 3-1）。


    *Eclipse 项目*最初由 IBM 于 2001 年 11 月创建。随后，*Eclipse 基金会*于 2004 年作为一家独立的非营利性公司成立。它是围绕
    Eclipse 创建的一个开放透明的社区。


    Eclipse 可用于 *Windows*、*macOS* 和 *Linux*。请访问下面提供的下载页面，然后只需点击反映你所运行操作系统类型的链接即可。不过，有一个注意事项。最新版本的
    Eclipse 仅适用于现代操作系统的 64 位版本。如果你仍在运行 32 位操作系统，请查看旧版本 Eclipse 的专用链接。它们也完全能够满足我们的需求。


    ![../images/507458_1_En_3_Chapter/507458_1_En_3_Fig1_HTML.jpg](img/507458_1_En_3_Fig1_HTML.jpg)


    图 3-1


    运行中的 Eclipse


    *   **下载并安装** ***Eclipse for Java Developers*** **（64 位版本）**：[`www.eclipse.org/downloads/packages/release/2020-12/r/eclipse-ide-java-developers`](http://www.eclipse.org/downloads/packages/release/2020-12/r/eclipse-ide-java-developers)


    *   **下载** ***Eclipse for Java Developers*** **（32 位版本）**：[`www.eclipse.org/downloads/packages/release/helios/sr1/eclipse-ide-java-developers`](http://www.eclipse.org/downloads/packages/release/helios/sr1/eclipse-ide-java-developers)


    ## 在 Linux 上安装 Eclipse


    Linux 软件仓库可能托管着过时版本的 Eclipse。为了在 Linux 上安装最新版本，我们将使用 Canonical Ltd. 提供的 Snapcraft
    方法。此方法应适用于所有主要的 Linux 发行版。打开一个终端窗口，并输入以下命令：


    1.  **首先，确保你的操作系统上安装了** ***Java 运行时环境 (JRE)***。在终端窗口中输入以下字符串：


    1.  **接下来，我们使用 snappy 系统下载 Eclipse：**


    ```

    sudo apt install default-jre

    Fedora Linux 用户可能需要输入以下终端命令：

    sudo dnf install java-latest-openjdk.x86_64

    sudo dnf install java-latest-openjdk-devel.x86_64

    ```


    ```

    sudo snap install --classic eclipse

    ```


    在安装过程中，系统可能会提示你输入密码。安装成功后，你应该会看到以下消息：*eclipse (版本信息) from Snapcrafters installed.*


    ## Eclipse 首次启动


    启动 Eclipse 后，系统会提示你为 Eclipse 工作区选择一个目录。默认设置适用于大多数用途。让我们创建一个新项目。这可以通过从顶部菜单栏导航到
    *文件* ➤ *新建* ➤ *Java 项目* 来完成。接下来，你应该会看到一个等待你输入项目名称的窗口。输入一个名称并点击 *创建*。


    将出现一个窗口，询问你是否要创建 *module-info.java*。此文件是 Java 模块化功能使用的 *模块声明*。对于简单的应用程序，选择 *不创建*
    也没问题。


    你将被带到 Eclipse 中的主项目视图。我们手上还没有一个功能完整的 Java 应用程序。现在，在左侧，你会看到 *项目资源管理器*。左键单击你的项目名称。从顶部菜单中选择
    *文件* ➤ *新建* ➤ *类*。为这个新类输入一个名称；它不必与你的项目名称相同。


    接下来，务必确保你勾选了 *public static void main(String args)* 旁边的复选框。这为你的项目提供了一个 *Java main
    方法*。没有它，你就无法执行你的项目。最后，点击 *完成* 进入你全新的 Java 代码列表。你现在就可以开始在 main 方法下编写代码了。


    ## 用于 C# 开发的优秀 IDE


    现在让我们回顾一些满足你 C# 开发需求的选择。我们从微软的 *Visual Studio* 开始，它是一个流行的多平台 IDE，充满了强大的功能，包括即时错误下划线。该软件可用于
    Windows 和 macOS。

