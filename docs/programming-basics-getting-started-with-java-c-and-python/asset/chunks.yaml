- fmt: '# The Asynchronous Event Loop


    The main component of an asynchronous Python project is the *event loop*; we run
    our subprocesses from this construct. Tasks are scheduled in an event loop and
    managed by a thread. Basically, the event loop is there to coordinate tasks and
    make sure everything runs smoothly when we’re working with the `asyncio` module.
    Let’s see how to actually implement the `asyncio` module with Listing [6-13](#507458_1_En_6_Chapter.xhtml#PC14).


    ```

    import asyncio

    async def prime_number_checker(x): # Define a function which takes x as input

    # Go to sleep for one second, potentially letting other functions

    # do their thing while we''re asleep

    await asyncio.sleep(1.0)

    message1 = "%d isn''t a prime number.." % x # Set default message

    if x > 1:

    for i in range(2, x):

    # Apply the modulo-operator (%) on variable x.

    # If the ensuing remainder does not equal zero, update "message1"

    if (x % i) != 0:

    message1 = "%d is a prime number!" % x

    break # Break out of the loop

    return message1

    async def print_result(y): # Define a function which takes y as input

    result = await prime_number_checker(y) # Await for other function to finish

    print(result) # Print results from function prime_number_checker()

    happyloop = asyncio.get_event_loop()

    # See if 2, 11, and 15 are prime numbers

    happyloop.run_until_complete(print_result(2))

    happyloop.run_until_complete(print_result(11))

    happyloop.run_until_complete(print_result(15))

    happyloop.close()

    Listing 6-13

    A listing in Python demonstrating asynchronous chained coroutines and the use
    of an event loop

    ```


    In Listing [6-13](#507458_1_En_6_Chapter.xhtml#PC14), we are looking for prime
    numbers (i.e., numbers that have only two factors: themselves and 1). We define
    two asynchronous functions/coroutines, `prime_number_checker(x)` and `print_result(y)`,
    both of them with the keywords `async def` as that’s how it’s done with the `asyncio`
    module.


    Now, the first function we defined begins with the line `await asyncio.sleep(1.0)`.
    Compared to the regular sleep method in Python, this asynchronous variety doesn’t
    freeze the program; instead, it gives a specified time period for other tasks
    to complete in the background.


    The line `result = await prime_number_checker(y)` in the second coroutine is there
    to make sure the first function has completed its execution. `Await` is indeed
    a somewhat self-explanatory and crucial keyword in the asynchronous approach.


    To get our asynchronous listing fully running, we need to work with the event
    loop. We do this by creating a new loop object, `happyloop`, and summoning a function
    called `asyncio.get_event_loop()`. Although there are several varieties of functions
    for event loop management, for the sake of clarity, we’ll only cover the aforementioned
    approach in this example.


