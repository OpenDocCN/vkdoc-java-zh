- fmt: '# The C# Assembly and Access Modifiers


    Before we get to the slightly different landscape of C# access modifiers, let’s
    review an important and related concept. An *assembly* in C# refers to the output
    of your project, as in a user-executable file usually with the file extension
    of `.exe` in the Windows environment (e.g., `happyprogram.exe`). It is the smallest
    unit of deployment in the language. Assemblies usually contain other resources
    used by a program, including image data. They also host your project metadata,
    such as its version information, and potentially a list of which other assemblies
    are needed to execute the program; larger projects may consist of numerous assemblies.


    Now, let’s review the six C# access modifiers. They may seem quite interchangeable
    right now, but by the time you finish this book, you’ll have gotten familiar with
    them all with an understanding of how they’re all needed (see Table [4-3](#507458_1_En_4_Chapter.xhtml#Tab3)).


    **Table 4-3** The six access modifiers of C#


    | Access modifier | Accessibility |

    | --- | --- |

    | `Public` | Accessible by all other classes |

    | `Private` | Only accessible from within the declared class |

    | `Protected` | Accessible from within the declaring class and from within any
    class derived from this declaring class |

    | `Internal` | Access is limited to classes defined within the current assembly
    |

    | `protected internal` | Access is limited to classes defined within the current
    assembly AND/OR classes derived from them residing in other assemblies |

    | `private protected` | Accessible from within the declaring class and from within
    any class derived from this declaring class, but only within the same assembly
    |


    ## Accessing Classes with C#


    Let’s get back to coding. Most of this chapter has used Java so far. Let’s next
    create an original OOP listing for C# instead to demonstrate its take on access
    modifiers (see Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7)).


    ```

    using System;

    class Protected_Class {

    // Define a protected string variable, fruit

    protected String fruit;

    public Protected_Class()

    { fruit = "Noni fruit"; }

    }

    // Make a new derived class using the colon-operator

    class Derived_Class : Protected_Class {

    // This method from Derived_Class can access Protected_Class

    public String getFruit()

    { return fruit; }

    }

    class Program {

    // Main execution begins below

    public static void Main(string[] args)

    {

    // Create two objects, one from each class

    Protected_Class Object1 = new Protected_Class();

    Derived_Class Object2 = new Derived_Class();

    // Display our string variable using a method from the derived class

    Console.WriteLine("Your favorite fruit is: {0}", Object2.getFruit());

    }

    }

    ```


    **Listing 4-7** A C# listing demonstrating inheritance and the use of access modifiers


    Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7) starts off with the creation of
    a class we’ll call `Protected_Class` for clarity’s sake. This class holds one
    constructor which sets a protected variable, `fruit`. A second class, `Derived_Class`,
    is created next and made to inherit the attributes of the first class using the
    colon (`:`) operator. `Derived_Class` may now access data from `Protected_Class`,
    even its protected variable. This can be done using a get method, so we’ll make
    one just for this class and call it `getFruit()`.


    Next, we’re moving on to the main method of Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7).
    Here, we create two objects, one from each class we defined earlier. Notice how
    the syntax for creating objects in C# is identical to the one Java uses.


    The last line in our main method displays a message with the contents of the string
    variable; this is known as a *formatted string*. In C#, variables are displayed
    in text using curly brackets (C-derived languages really love them in general).
    The element `{0}` refers to the first (and, in this case, the only) variable we
    are going to display next to the message. If we had a second variable to print
    out in our string, we would do it with `{1}`—and so on.


    ## Once More, with UML


    To further prepare you for the wonders of the Unified Modeling Language, let’s
    turn Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7) into UML, shall we? Actually,
    there’s more to this language than class diagrams; with UML, we can also visualize
    objects. In Figure [4-2](#507458_1_En_4_Chapter.xhtml#Fig2), we have both the
    class (left) and object diagrams of Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7).


    ![../images/507458_1_En_4_Chapter/507458_1_En_4_Fig2_HTML.jpg](images/507458_1_En_4_Chapter/507458_1_En_4_Fig2_HTML.jpg)


    **Figure 4-2** Class (left) and object diagrams of Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7)
    in UML


    There’s a couple of things you should take away from the rather straightforward
    Figure [4-2](#507458_1_En_4_Chapter.xhtml#Fig2). First of all, protected members
    of a class are represented with the hashtag (`#`) symbol in front of them. In
    our example, this refers to the string-variable `fruit`. Also, object diagrams
    in UML use a specific format. The header has the object name, a colon operator
    (`:`) surrounded by spaces, and, finally, the name of the class this object is
    instantiated from. In addition, the header is fully underlined. In UML, object
    diagrams’ variables are expected to display their contents; hence, we have the
    delicious “Noni fruit” in ours since that’s what the constructor method of the
    class stated.


    UML class diagrams represent a system as a whole, while object diagrams represent
    a system’s detailed state at a specific point in time. Think of the former as
    a blueprint and the latter as a snapshot of a system in action.


    ## Protected Access: Java vs. C#


    As close as Java and C# are in syntax and their logical approaches, there are
    some subtle differences which can be confusing at first. For example, the access
    modifier `protected` is treated differently between the two languages.


    In Java, `protected` is equivalent to `protected internal` in C# as in it’s accessible
    only by the declaring or derived class, or a class in the same *package* (in Java)
    or *assembly* (in C#).


    As you may remember from Table [4-3](#507458_1_En_4_Chapter.xhtml#Tab3), a bona
    fide `protected` modifier in C# is only accessible from within the declaring class
    and from within any class derived from the original class.'
  raw: '## The C# Assembly and Access Modifiers


    Before we get to the slightly different landscape of C# access modifiers , let’s
    review an important and related concept. An *assembly* in C# refers to the output
    of your project, as in a user-executable file usually with the file extension
    of *.exe* in the Windows environment (e.g., *happyprogram.exe*). It is the smallest
    unit of deployment in the language. Assemblies usually contain other resources
    used by a program, including image data. They also host your project metadata,
    such as its version information, and potentially a list of which other assemblies
    are needed to execute the program; larger projects may consist of numerous assemblies.


    Now, let’s review the six C# access modifiers. They may seem quite interchangeable
    right now, but by the time you finish this book, you’ll have gotten familiar with
    them all with an understanding of how they’re all needed (see Table [4-3](#507458_1_En_4_Chapter.xhtml#Tab3)).


    Table 4-3


    The six access modifiers of C#


    | Access modifier | Accessibility |

    | --- | --- |

    | *Public* | Accessible by all other classes |

    | *Private* | Only accessible from within the declared class |

    | *Protected* | Accessible from within the declaring class and from within any
    class derived from this declaring class |

    | *Internal* | Access is limited to classes defined within the current assembly
    |

    | *protected internal* | Access is limited to classes defined within the current
    assembly AND/OR classes derived from them residing in other assemblies |

    | *private protected* | Accessible from within the declaring class and from within
    any class derived from this declaring class, but only within the same assembly
    |


    ## Accessing Classes with C#


    Let’s get back to coding. Most of this chapter has used Java so far. Let’s next
    create an original OOP listing for C# instead to demonstrate its take on access
    modifiers (see Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7)).


    ```

    using System;

    class Protected_Class {

    // Define a protected string variable, fruit

    protected String fruit;

    public Protected_Class()

    { fruit = "Noni fruit"; }

    }

    // Make a new derived class using the colon-operator

    class Derived_Class : Protected_Class {

    // This method from Derived_Class can access Protected_Class

    public String getFruit()

    { return fruit; }

    }

    class Program {

    // Main execution begins below

    public static void Main(string[] args)

    {

    // Create two objects, one from each class

    Protected_Class Object1 = new Protected_Class();

    Derived_Class Object2 = new Derived_Class();

    // Display our string variable using a method from the derived class

    Console.WriteLine("Your favorite fruit is: {0}", Object2.getFruit());

    }

    }

    Listing 4-7

    A C# listing demonstrating inheritance and the use of access modifiers

    ```


    Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7) starts off with the creation of
    a class we’ll call *Protected_Class* for clarity’s sake. This class holds one
    constructor which sets a protected variable, *fruit.* A second class, *Derived_Class*,
    is created next and made to inherit the attributes of the first class using the
    colon (:) operator. Derived_Class may now access data from Protected_Class, even
    its protected variable. This can be done using a get method, so we’ll make one
    just for this class and call it *getFruit( ).*


    Next, we’re moving on to the main method of Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7).
    Here, we create two objects, one from each class we defined earlier. Notice how
    the syntax for creating objects in C# is identical to the one Java uses.


    The last line in our main method displays a message with the contents of the string
    variable; this is known as a *formatted string.* In C#, variables are displayed
    in text using curly brackets (C-derived languages really love them in general).
    The element *{0}* refers to the first (and, in this case, the only) variable we
    are going to display next to the message. If we had a second variable to print
    out in our string, we would do it with *{1}—*and so on.


    ## Once More, with UML


    To further prepare you for the wonders of the Unified Modeling Language , let’s
    turn Listing [4-7](#507458_1_En_4_Chapter.xhtml#PC7) into UML, shall we? Actually,
