  raw: "## Afterword\n\nAnd so we reach the end of this book. The programming jargon\
    \ which you might’ve found daunting in the past has become less intimidating.\
    \ By now, variables, classes, and objects have become at least somewhat familiar\
    \ concepts to you. You know how to make simple text-based applications in Java,\
    \ C#, and Python. Perhaps you can even casually explain Python’s strict requirements\
