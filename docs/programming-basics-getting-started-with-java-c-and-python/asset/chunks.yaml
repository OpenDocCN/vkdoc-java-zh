    # 5. File Operations, Multithreading, and Other Wonders of Java


    By now you’re probably rather familiar with at least the basic elements of programming
    in the mighty object-oriented language they call Java. Now is the time to move
    on to more advanced concepts. We’ll start off with multithreading and basic error
    handling in Java later in this chapter. Moving on, we’ll eventually get to the
    jolly topic of file operations.


    ## Multithreading: Cores and Threads


    Java supports *multithreading*, which basically refers to splitting a program
    in several concurrently running parts. This usually speeds up the execution time
    of any algorithms considerably. Multithreading is sometimes also called *concurrency*.


    Multiple threads are a concept which goes hand in hand with *processor cores*
    , which refer to the hardware side of things: the central processor units (CPUs).
    An older generation, say, pre-2005 CPU typically has just one core. You’re hard
    pressed to find a brand new single-core manufactured in 2021\. Most CPUs today
    consist of two cores at the very minimum. These cores crunch all the data you
    feed into a computer (see Figure [5-1](#507458_1_En_5_Chapter.xhtml#Fig1)).


    ![../images/507458_1_En_5_Chapter/507458_1_En_5_Fig1_HTML.jpg](images/507458_1_En_5_Chapter/507458_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    A simple diagram demonstrating multithreading inside a dual-core CPU


    Generally speaking, the more cores your system has, the more effective its number
    crunching is. This depends on your operating system as well as on whether it supports
    multi-core computing; virtually all modern operating systems have what it takes
    to do so. However, not all third-party software is written to fully take advantage
    of multi-core processing. In that case, the software only uses a single core from
    the system.


    Now, the number of concurrently running threads doesn’t usually equal the number
    of cores a CPU has at its disposal. Remember, a single software application can
    summon numerous threads for various tasks. This means a single-core system might
    have several threads executing on it simultaneously. What multiple-core CPUs offer
    is the possibility of sharing the workload of all of these threads between numerous
    cores. On systems with six CPU cores or more, this can lead to tremendous boosts
    in computational speed.


    You may come across the term *hyper-threading* every now and then. This refers
    to Intel’s proprietary technology which, on paper, can offer double the CPU cores
    a processor is physically equipped with. Introduced in 2002, hyper-threading works
    in tandem with the operating system to increase the number of cores available.
    Intel claims a CPU equipped with hyper-threading offers a considerable performance
    boost across the board compared to an identical CPU without it. In real-life scenarios,
    however, the gains from hyper-threading are largely application dependent. The
    technology does indeed flourish under CPU-intense scenarios like video editing
    and 3D modeling.'
