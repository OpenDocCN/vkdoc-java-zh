- fmt: '# The UML Use Case


    Although some UML diagram types are out of the scope of this book, there’s one
    more you should be familiar with. This is the *use case*, which exists to demonstrate
    a user’s interaction with a system in the most simple way possible. These are
    typically high-level diagrams containing few technical details.


    We’ll now introduce a few new UML elements. These are the *actor*, the *system*,
    and the *use case*. In addition, the use case diagram features familiar simple
    lines to depict relationships. Take a look at Figure [9-9](#507458_1_En_9_Chapter.xhtml#Fig9)
    for a simple use case diagram.


    ![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig9_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig9_HTML.jpg)


    **Figure 9-9** A UML use case depicting chapter review during a book-writing process


    You’ll see two actors in Figure [9-9](#507458_1_En_9_Chapter.xhtml#Fig9), represented
    by some lovely stick figures. It’s often a good idea to keep the actors categorical
    in nature as in naming an author `Author` instead of `John` or `Melody Woolysocks`.
    In UML, the actor initiating an interaction is known as a *primary actor*. A *secondary
    actor* is there to react to the actions of the primary actor.


    The second element of *system* is represented by a simple rectangle in UML; in
    the case of Figure [9-9](#507458_1_En_9_Chapter.xhtml#Fig9), it’s called `Chapter
    review`. Inside the system, we have the inner *use cases*, denoted by oval shapes.
    These represent the different stages required to complete a specific use case.
    Finally, we have the familiar plain lines to represent the different associations
    of the actors and the use cases.


    Now, the diagram in Figure [9-9](#507458_1_En_9_Chapter.xhtml#Fig9) portrays the
    following sequence of events:


    *   `Author`, the primary actor, writes a chapter.

    *   The finished chapter is read by both the `Author` and a `Chapter reviewer`,
    the secondary actor. This is denoted by a shared association between the two actors.

    *   The `Chapter reviewer` proposes changes into the chapter.

    *   Finally, the `Author` commits changes into a chapter to end the scenario.


    ## More on Use Cases


    It’s time to take a look at a slightly more complicated use case to introduce
    two new elements: the *extends* and *includes* relationships (see Figure [9-10](#507458_1_En_9_Chapter.xhtml#Fig10)).
    As was the case with UML class diagrams, we can incorporate those helpful comment
    elements into UML use cases, too.


    ![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig10_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig10_HTML.jpg)


    **Figure 9-10** A UML use case depicting the basic functions of an email service


    Figure [9-10](#507458_1_En_9_Chapter.xhtml#Fig10) depicts a simple email use case
    scenario. We have the `account owner` (i.e., the human user) as the primary actor
    and an `email server` as the secondary actor. Figure [9-10](#507458_1_En_9_Chapter.xhtml#Fig10)
    contains the following sequence of events:


    *   `Account owner` logs in with a password. If a wrong code is entered, an optional
    use case called `Incorrect password` is visited; this outcome is denoted with
    an arrow and the keyword `<<extends>>`.

    *   `Account owner` may also wish to read some help files. This, too, is an optional
    scenario and thus assigned with the keyword `<<extends>>`.

    *   A successful end result for the use case `Log in` automatically leads to another
    use case called `Verify password`, as depicted by the keyword `<<includes>>`.
    The secondary actor `Email server` is involved in the password authentication
    process, so a line of association is there in Figure [9-9](#507458_1_En_9_Chapter.xhtml#Fig9)
    between said actor and the use case of `Verify password`.

    *   The use case `Verify password` leads to three more use cases: `View email`,
    `Delete email`, and `Send email`. Naturally, the secondary actor `Email server`
    is involved in all of these, too, although only in a passive role; `Account owner`
    initiates all of the three actions at their will.


    Pay attention to the direction of your arrows when describing relationships in
    use cases.


    ## Tools for UML


    Pen and paper aside, if you want to experiment with drawing UML and do so on your
    computer, there are plenty of great free options. We’ll now review some of the
    finest examples of these tools.


    ### UMLet and UMLetino by UMLet Team


    A free and wonderful open source tool, `UMLet` will have you drawing sassy class
    diagrams in no time with its intuitive drag-and-drop user interface. Association
    lines snap nicely onto class edges and stay there, making organizing your diagrams
    a breeze.


    `UMLet` features ready-made selections of visual elements for class diagrams,
    use cases, timing diagrams, and many others. The program exports to many common
    image file formats, including `PNG`, `GIF`, and `SVG`. `UMLet` is an absolute
    must-have for those in need of a nice, clean UML design tool. All diagrams in
    this book were created with `UMLet`.


    One interesting feature found in `UMLet` is its semi-automated diagram creation.
    By navigating to `File` ➤ `Generate Class Elements from Files or Directory`, you
    can set up the initial stage of your UML diagram. Unfortunately, `UMLet` has some
    issues with creating associations when using this feature.


    `UMLetino` is a browser-based version of the same software. It features most of
    the features of its offline sibling. In addition, `UMLetino` has Dropbox integration
    for importing and exporting diagram files. However, the software only supports
    the output of `PNG` image files.


    *   Download `UMLet` for any Java-capable operating system from [`www.umlet.com`](http://www.umlet.com)

    *   Run `UMLetino` in any Java-capable browser at [`www.umletino.com/umletino.html`](http://www.umletino.com/umletino.html)


    ### Diagrams.net by Diagrams.net Team


    Actively maintained by a dedicated team, `Diagrams.net` is a versatile open source
    tool available in both browser and desktop editions. No user registration is needed
    for the latter. `Diagrams.net` is intended for both basic UML work and for advanced
    users, having features like layers and “plugins” for added functionalities.


    Formerly known as “draw.io”, the software offers robust file format support when
    exporting your UML diagrams, including Adobe PDF. Not only that, by selecting
    `File` ➤ `Export as` ➤ `Advanced`, you get to set attributes such as `DPI` (dots
    per inch) and border width.


    *   Download the desktop app for `Diagrams.net` from [`https://github.com/jgraph/drawio-desktop/releases`](https://github.com/jgraph/drawio-desktop/releases)

    *   Run `Diagrams.net` on your browser at [`https://app.diagrams.net`](https://app.diagrams.net)


    ### Umbrello by Paul Hensgen and Umbrello UML Modeler Authors


    Being in development since 2001, `Umbrello` is a great tool for any type of UML
    work. The software has an intuitive user interface as well as the option to generate
    code from UML. `Umbrello` can export your diagrams into (usually) functional Java,
    C#, Python, and many other programming languages; simply navigate to `Code` ➤
    `Code Generation Wizard`, set your options, and click `Next`. The software also
    offers excellent formatting features, including having all of your operating system
    fonts available for the diagrams you’re working on.


    Don’t let the garish default color scheme fool you—`Umbrello` is a highly useful
    application for many types of diagrammatic work.


    *   Download the desktop app for `Umbrello` from [`https://umbrello.kde.org`](https://umbrello.kde.org)


    ## In Closing


    Finishing this chapter, you have gained knowledge on the following:


    *   The basic elements of UML class and use case diagrams

    *   How to translate simple UML diagrams into Java, C#, and Python'
