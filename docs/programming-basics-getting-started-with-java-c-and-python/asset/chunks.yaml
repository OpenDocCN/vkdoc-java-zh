    5-12）。你会注意到该清单导入了 `java.util.Date` 类。这是一个所谓的已弃用类，意味着存在一个更新的版本（此处为 `java.util.LocalDate`）。不过，你在编程冒险中偶尔也会遇到这些更早期的类。


