    ## Working with the Other ZIP


    As previously mentioned in this chapter, `zip` is a word with at least two popular
    meanings in the context of computing. We explored zipping (and unzipping) in Python,
    covering the first meaning. Now it’s time to work with the other ZIP, the popular
    archive file format, from within any Python IDE.


    Now, directories (and their subdirectories) compressed with ZIP software end up
    as a single file which also tends to be considerably smaller in size than its
    uncompressed contents. This is obviously a great solution for network-based file
    delivery. Naturally, there are several file compression solutions available, but
    as of 2021, ZIP is still a fantastically ubiquitous file archive format, available
    for all popular operating systems.


    ZIP was created by `Phil Katz` and `Gary Conway` back in 1989. The ZIP compression
    technology has been more recently used as the basis for the `Java Archive (JAR)`
    file format—and many others.


    Python, too, likes its ZIP files. We can actually operate them from within a Python
    IDE. There’s a code module for it aptly called `zipfile`. See Listing [6-19](#507458_1_En_6_Chapter.xhtml#PC20)
    for a demonstration on how to create a ZIP file and how to display its contents
    in Python.


    ```

    import os

    from os.path import basename

    from zipfile import ZipFile # Include ZipFile module

    lookfor = "thread" # Create a variable for the string we plan to look for

    # Define a new function, make_a_zip

    def make_a_zip(dirName, zipFileName, filter):

    # Create a new ZipFile-object with attribute w for (over)writing

    with ZipFile(zipFileName, ''w'') as zip_object1:

    # Start iteration of files in the directory specified

    for folderName, subfolders, filenames in os.walk(dirName):

    for file in filenames:

    if filter(file):

    # Create full file-path

    filePath = os.path.join(folderName, file)

    # Add file to zip using write() method

    zip_object1.write(filePath, basename(filePath))

    # Summon make_a_zip() and give it the current directory to work with

    # Also only look for filenames with the string "thread" in them

    make_a_zip(''..'', ''happy.zip'', lambda name: lookfor in name)

    print("All files containing > in their name are now inside happy.zip!")

    # Create a ZipFile Object and load happy.zip into it (using attribute r for reading)

    with ZipFile(''happy.zip'', ''r'') as zip_object2:

    # Summon namelist() and store contents in "file_in_zip" variable

    files_in_zip = zip_object2.namelist()

    # Iterate through files_in_zip and print each element

    print("\nThese files were stored in happy.zip:")

    for i in files_in_zip:

    print(i)

    Listing 6-19

    A listing demonstrating the use of ZIP file archives from inside Python

    ```


    In Listing [6-19](#507458_1_En_6_Chapter.xhtml#PC20), you’ll see two major mechanics
    of Python’s ZIP support at play: making a new file archive (i.e., `happy.zip`)
    and retrieving the names of the files stored inside it. The example also shows
    you how to use wildcard-based functionality when gathering files to an archive.
    In this case, we’ll only look for files with the string “thread” somewhere in
    their file name.


    The `with` statements used in tandem with a `ZipFile` are basically there to provide
    clarity into our listing. For one, they’re freeing us from using closing methods
