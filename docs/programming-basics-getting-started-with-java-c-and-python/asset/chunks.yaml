    \ Python 中执行正则表达式操作。你可以使用正则表达式来定位具有非常特定搜索模式的文件，也可以在众多类型的文本文件中查找特定术语。请参见代码清单 6-6\
    \ 了解其工作原理的首次演示。\n\n```\nimport re\ntext1 = \"Apress is the best publisher\"\n\
    regex1 = re.findall(\"es\", text1) # 创建一个带有搜索模式的 RegEx 对象\nprint(\"查找所有 'es' 的实例\"\
    )\nprint(\"我们在\", text1, \"中找到了\", len(regex1), \"个匹配项\")\n代码清单 6-6\n一个在 Python\
    \ 中使用正则表达式的简单示例\n```\n\n在代码清单 6-6 中，我们调用了 `findall` 方法来查找字符串变量 `text1` 中“es”的实例。我们还使用了\
    \ Python 的 `len()` 方法来统计存储在列表 `regex1` 中的实例数量。现在，是时候看看另一个演示正则表达式魔法的示例了（参见代码清单\
    \ 6-7）。\n\n正则表达式实际上可以追溯到 1951 年，由美国数学家 *斯蒂芬·科尔·克莱尼（1909–1994）* 提出。如今，正则表达式是许多流行编程语言（包括\
    \ Perl、C# 和 Java）中的标配。本书稍后将探讨后两种语言中正则表达式的实现。\n\n```\nimport re\n# 从正则表达式模块 re\
    \ 中调用 search 方法\nmatch1 = re.search('Apress', 'Apress is the best')\nif match1:\
    \ # 这是 \"if match1 == True:\" 的简写\n    print(match1) # 如果找到匹配，则显示对象内容\nhappytext\
    \ = \"My name is Jimmy\" # 创建一个字符串变量\nmatch2 = re.search('Jimmy', happytext)\n\
    if match2:\n    print(match2)\n# 对字符串 \"happytext\" 使用 re 模块的 fullmatch 方法\nmatch3\
    \ = re.fullmatch('Jimmy', happytext)\nif match3:\n    print(\"找到 'Jimmy' 的匹配！\"\
    ) # 此消息不会显示\nelse:\n    print(\"未找到 'Jimmy' 的匹配\")\nmatch3 = re.fullmatch('My\
    \ name is Jimmy', happytext)\nif match3:\n    print(match3)\n# 使用 match 方法\nmatch4\
    \ = re.match('the', 'Apress is the best')\nif match4:\n    print(match4) # 此消息不会显示\n\
    # match() 仅从字符串开头查找模式\nelse:\n    print(\"未找到 'the' 的匹配\")\nmatch5 = re.match('Apress',\
    \ 'Apress is the best')\nif match5:\n    print(match5) # 此消息会显示\n代码清单 6-7\n一个演示\
    \ Python 中 search() 和 fullmatch() 正则表达式方法的 Python 代码清单\n```\n\n在代码清单 6-7 中，我们使用了\
    \ `search()`、`match()` 和 `fullmatch()`。你可能会问它们之间有什么区别。`search` 方法会在整个字符串中查找给定的模式，而\
    \ `fullmatch` 仅当字符串完全匹配某个模式时才返回 true。`match` 方法则只从字符串的开头查找模式。\n"
- fmt: '# Metacharacters


    Regular expressions are best used with *metacharacters*. These are basically the
    building blocks for more advanced string-related searches. See Table [6-4](#507458_1_En_6_Chapter.xhtml#Tab4)
    for a rundown of some important metacharacters and Listing [6-8](#507458_1_En_6_Chapter.xhtml#PC9)
    for a little demonstration of their use.


    **Table 6-4** Some important Python metacharacters


    | `\w` | Any word. Usually refers to alphanumericals | `\s` | Whitespace |

    | `\W` | Any non-word | `\S` | Non-whitespace |

    | `\d` | Any digit | `.` | Any single character |

    | `\D` | Any non-digit | `*` | Zero or more characters |


    ```

    import re

    match1 = re.search(''.....'', ''Hello there!'')

    if match1: # This is shorthand for "if match1 == True:"

    print(match1) # Displays "Hello"

    match2 = re.search(''\d..'', ''ABC123'')

    if match2:

    print(match2) # Displays "123"

    match3 = re.search(''\D*'', ''My name is Reginald123456.'')

    if match3:

    print(match3) # Displays "My name is Reginald"

    match4 = re.search(''y *\w*'', ''Hello. How are you?'')

    if match4:

    print(match4) # Displays "you"

    match5 = re.search(''\S+'', ''Hello. Whats up?'')

    if match5:

    print(match5) # Displays "Hello."

    Listing 6-8

    A listing in Python demonstrating the use of metacharacters in regular expressions

    ```


    In Listing [6-8](#507458_1_En_6_Chapter.xhtml#PC9), with `match4`, we’re using
    the metacharacter `\w` which refers to seeking matches with any full words. Without
    this character in place, we’d see an output of “y” instead of “you.”


    Let’s learn some more about metacharacters in Python. See Table [6-5](#507458_1_En_6_Chapter.xhtml#Tab5)
    for eight more important RegEx markers and Listing [6-9](#507458_1_En_6_Chapter.xhtml#PC10)
    for a second demonstration.


    **Table 6-5** Some more important Python metacharacters


    | `\.` | Literal dot (as in, a full stop character) | `$` | Match end of line
    |

    | `?` | Zero or one character | `{ n }` | Occurs for n times |

    | `+` | One or more characters | `[a-z]` | Character set |

    | `^` | Match beginning of line | `[0-9]` | Numeric character set |


    ```

    import re

    string1 = ''Beezow Doo-doo Zopittybop-bop-bop''

    patterns = [r''Do*'', # D and zero or more o''s (*)

    r''Be+'', # B and one or more e''s (+)

    r''Do?'', # D and zero or one o''s (?)

    r''it{2}'', # i and two t''s

    r''[BDZ]\w*'', # Look for full words starting with B, D, or Z

    r''^Be\w*'', # Look for a full word starting with "Be"

    r''...$'' # Look for the three last digits in the string

    ]

    def discover_patterns(patterns, string1): # Create our method

    for pattern in patterns:

    newpattern = re.compile(pattern) # Summon compile()

    print(''Looking for {} in''.format(pattern), string1)

    print(re.findall(newpattern, string1)) # Summon findall()

    discover_patterns(patterns, string1) # Execute our method

    Listing 6-9

    Another listing in Python demonstrating the use of metacharacters in regular expressions

    ```


    The list-structure `patterns` in Listing [6-9](#507458_1_En_6_Chapter.xhtml#PC10)
    contain seven searches, while `string1` stores our source material. These two
    data structures are to be fed into the method `discover_patterns` which we created
    next.


    Inside this new method of ours, we use two of Python’s RegEx functions: `compile()`
    and `findall()`. With the former, we are converting RegEx patterns into pattern
    objects, which are then used for pattern matching. This approach is most efficient
    in scenarios where search patterns are to be reused, such as database access.


    `findall` is used to discover all occurrences of a search pattern inside strings.
    The `r''` in our listing lets Python know a string is considered a “raw string,”
    meaning backlashes in it will be interpreted without special functions. For example,
    `\n` will not denote a newline in a raw string.


    # More Merriment with Regular Expressions


    Let’s explore yet more of the advanced features of RegEx next. Listing [6-10](#507458_1_En_6_Chapter.xhtml#PC11)
    exhibits the use of two new methods: `group()` and `sub()` (displayed in bold
    for your convenience). In addition, we’ll be using a new technique with our old
    friend in RegEx, `search()`.


    ```

    import re

    string1 = "Today''s dessert: banana"

    # Summon search() with four options for a match

    choice1 = re.search(r"dessert.*(noni-fruit|banana|cake|toilet-paper)", string1)

    if choice1:

    print("You''ll be having this for", choice1.group(), "!")

    string2 = "Have a great day"

    string2 = re.sub(''great'', ''wonderful'', string2)

    print(string2) # Outputs: Have a wonderful day

    string3 = ''what is going on?''

    # Replace all letters between a and h with a capital X

    string3 = re.sub(''([a-h])s*'', ''X'', string3)

    print(string3) # Outputs: wXXt is XoinX on?

    Listing 6-10

    A listing in Python demonstrating the sub( ) method

    ```


    The `search` method in Listing [6-10](#507458_1_En_6_Chapter.xhtml#PC11) is used
    to compare and locate strings that are listed now as the method’s arguments. In
    other words, `string1` is searched for a total of four varieties of fruit. These
    are separated by the logical or operator, denoted by the vertical line character
    (i.e., `|`). The method is made to look out for any of these strings/fruit, but
    only should they appear next to the string “dessert.” If there’s such a match
    between `string1` and an item in `choice1`, the program displays it.


    # Concurrency and Parallelism in Python


    *Parallel processing* refers to executing more than one calculation or instruction
    at the same time. You may remember the concept of multithreading from the previous
    chapter. Like Java and C#, Python is capable of processing multiple threads of
    execution. However, there are some major differences. Python’s multithreading
    does not actually run threads in a parallel fashion. Rather, it executes these
    threads pseudo-concurrently. This stems from Python’s implementation of a *global
    interpreter lock (GIL)*. This mechanism is there to synchronize threads and make
    sure the entire Python project is executed only on a single CPU; it simply does
    not utilize the full oomph of multi-core processors.


    Although *concurrency* and *parallelism* are related terms, they are not one and
    the same. The former refers to the approach of running separate tasks simultaneously,
    while with the latter, a task is split into subtasks which are then executed at
    the same time.


    # Multiprocessing vs. Multithreading


    Actual parallel processing of threads in Python is achieved through the use of
    multiple processes, all with their own interpreter and GIL. This is known as *multiprocessing*.


    Python’s take on concurrency can be a somewhat complicated one (compared to, say,
    Java). Now, a *process* in Python is not the same as a *thread*. Although both
    are independent sequences of code execution, there are several differences. A
    process tends to use more system memory than a thread. A process’s life cycle
    is generally also slower to manage; its creation and deletion take more resources.
    See Table [6-6](#507458_1_En_6_Chapter.xhtml#Tab6) for a comparison of threads
    and processes.


    **Table 6-6** The main differences between threads and processes in Python (i.e.,
    multiprocessing vs. multithreading)


    | | Process | Thread |

    | --- | --- | --- |

    | Uses single global interpreter lock (GIL) | No | Yes |

    | Multiple CPU cores and/or CPUs | Supported | Not supported |

    | Code complexity | Less complicated | More complicated |

    | RAM footprint | Heavier | Lighter |

    | Can be interrupted/killed | Yes | No |

    | Works best for | CPU-heavy applications, 3D rendering, scientific modeling,
    data mining, cryptocurrencies | User interfaces, network applications |


    Python has three code modules for simultaneous processing: `multiprocessing`,
    `asyncio`, and `threading`. For CPU-intensive tasks, the `multiprocessing` module
    works best.'
