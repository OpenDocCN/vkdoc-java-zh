    图 9-3


    展示 UML 中聚合关系的示意图


    接下来，让我们探讨如何在 UML 中为一个基本的脚踏驱动车辆建模。图 9-3 引入了一个新元素。这就是*聚合关联*，用空心菱形符号表示。


