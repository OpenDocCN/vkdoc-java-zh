    ## 操作变量


    操作变量值的方法有很多种。所有基本的算术运算（即加、减、乘、除、乘方和开方）在任何编程语言中都有涵盖。下面的简短代码清单展示了如何在 Python 中实现这些运算。清空你的编译器编程空间，如果你想亲眼看看效果，可以输入清单
    2-2 中的代码。


    ```

    favorite_number = 21

    print("My favorite number is", favorite_number)

    favorite_number+=2

    print("No, it was", favorite_number)

    favorite_number-=1

    print("Wait.. it''s actually", favorite_number)

    清单 2-2

    使用的变量以粗体显示

    ```


    在清单 2-2 中，我们使用了*加法*和*减法赋值运算符*来进行算术运算（即 `+=` 和 `-=`）。以下写法与我们的加法语句效果相同：`favorite_number
    = favorite_number + 2`


    ## Python 中的类型转换


    某些场景下，程序需要将特定值解释为特定的变量类型。当期望用户输入精确的数据类型时，就可能需要这样做。从一种数据类型转换为另一种数据类型的过程称为*类型转换*。幸运的是，Python
    允许我们通过一些相当简单的方法来实现这一点。


    类型转换有两种类型：*隐式*和*显式*。你可能对前者已经有些熟悉了。隐式类型转换指的是 Python 根据你首次分配给变量的输入（例如，一个数字或一串字符）来推断变量的类型。在本节中，我们将重点讨论显式类型转换，即程序员不仅将值赋给变量，还将其数据类型转换为另一种类型。有关
    Python 中一些核心的类型转换函数，请参见表 2-3。


    ## 变量比较


    当然，还有其他利用变量内容的方式。为了制作可用的软件，我们经常需要比较值。有六个通用的运算符用于此目的（见表 2-4）。这些运算符几乎适用于所有编程语言，包括本书中重点介绍的三种语言。


    表 2-4


    Java、C#、Python 及大多数其他语言中的主要比较运算符


    | 运算符名称 | 运算符符号 | 使用示例 |

    | --- | --- | --- |

    | 等于 | == | if (name == “Johnny”) ... |

    | 不等于 | != | if (age != 21) ... |

    | 小于 | < | if (age < adult_age) ... |

    | 大于 | > | if (energy > max_energy) ... |

    | 小于或等于 | <= | if (pet_snakes <= allowed_snake_amount) ... |

    | 大于或等于 | >= | if (gold >= 1000) ... |


    现在，让我们看一下清单 2-3，了解其中一些比较在 Python 中是如何工作的。


