    projects (e.g., *file*.txt* or *????name.txt*).


    ## File Searching with Glob?


    The term *globbing* refers to performing highly exactfile searches inside specific
    directories (or Python’s current working directory if none are specified). The
    term *glob*, short for *global*, has its origins in the world of Unix-based operating
