  trans: '

    ## Java 初体验


    在清单 2-3 中，我们有一个 Python 程序，它要求用户输入一个数字，然后根据输入在屏幕上显示一条评论。现在来看看 Java 如何处理同样的任务。虽然稍微复杂一些，但别担心，我们随后会逐步解析。


    ```

    import java.util.Scanner;

    public class HappyProgram {

    public static void main(String args[]) {

    Scanner input_a = new Scanner(System.in);

    System.out.print("Enter a number: ");

    int YourNumber = input_a.nextInt();

    if (YourNumber > 10) System.out.println("Your number is greater than ten") ;

    if (YourNumber <= 10) System.out.println("Your number is ten or smaller") ;

    }

    }

    清单 2-4

    一个简单的 Java 示例，演示用户键盘输入

    ```


    与 Python 相比，Java 确实需要更多的设置工作。用 Java 编写的程序可以通过所谓的 Java 包（*Java Packages*）进行扩展；这些包本质上是数据容器，能为你的项目添加新的特性和功能。清单
    2-4 的第一行为任何 Java 程序添加了交互功能，当我们需要用户输入时，这一行是必不可少的。


    清单 2-4 简单地将一个名为*java.util*的 Java 包引入到程序中。从这个包中，我们获取了`Scanner`函数，该函数随后用于读取键盘输入。随着本书的深入，我们将介绍一些最常用的
    Java 包。


    现在，我们来分解清单 2-4 中与用户输入相关的机制：


    ```

    Scanner input_a = new Scanner(System.in);

    ```


    这里我们创建了一个名为*input_a*的*扫描器对象*。我们本可以将这个对象命名为*happy_object*或*pink_tutu*。不过，最好还是采用至少有一定逻辑性的命名方案。接下来，我们遇到了以下几行代码：


    ```

    System.out.print("Enter a number: ");

    int YourNumber = input_a.nextInt();

    ```


    在前面的代码片段中，我们使用 Java 的标准打印函数显示了一条消息。注意它与 Python 的差异。接着，初始化了一个名为*YourNumber*的整数变量（即整数）。然后将其传递给一个名为*nextInt(
    )*的函数，该函数等待用户输入，并期望得到一个整数。上述函数是我们从清单第一行导入的 Java 包*java.util.Scanner*的一部分。


    你可能已经注意到清单 2-4 中大量使用了分号（;）。Java 确实要求每条指令后都跟一个分号。此外，Java 语法要求变量比较和大多数函数都要使用括号。所有这些约定同样适用于
    C#。


    ## 再来看看 C#


    接下来我们看看同样的清单，只不过这次是用 C#编写的（见清单 2-5）。你会发现它与 Java 版本有些相似，但存在几个关键差异，我们将在之后讨论。


    ```

    using System;

    public class HappyProgram

    {

    public static void Main()

    {

    Console.WriteLine("Enter a number: ");

    int YourNumber = Convert.ToInt16(Console.ReadLine());

    if (YourNumber > 10) Console.WriteLine("Your number is greater than ten");

    if (YourNumber <= 10) Console.WriteLine("Your number is ten or smaller");

    }

    }

    清单 2-5

    一个 C#示例，演示用户键盘输入

    ```


    清单 2-5 的第一行（即*using System;*）激活了一个特定的*命名空间*。C#中的命名空间是容器元素，有助于组织代码。首先，它们能帮你节省时间。如果没有
    System 命名空间，每次在屏幕上打印内容时，我们就要输入*System.Console.WriteLine*，而不是*Console.WriteLine*。你也可以声明自己的自定义命名空间，我们将在本书后面部分进行实践。目前，你只需了解它们的存在即可。


    大多数编程语言都需要在源代码中包含特定的声明语句，而这些语句通常并非每个项目所独有。这被称为*样板代码*。例如，在清单 2-4 中，*public static
    void main(String args[ ])*这一行，以及在清单 2-5 中，*public static void Main( )*这一行，可以分别归类为
    Java 和 C#方面的样板代码。我们将在后续章节中更深入地探讨这个概念。


    现在，与 Java 相比，C#的许多函数使用了不同的词汇。要在屏幕上打印文本，我们有*Console.Writeline*。对于用户输入，我们有*Console.ReadLine*，如下行所示：


    ```

    int YourNumber = Convert.ToInt16(Console.ReadLine());

    ```


    这里我们初始化了一个整数变量 YourNumber，并将其传递给一个转换函数*Convert*。我们告诉它等待用户输入，并期望得到一个*有符号 16 位整数值*。这些是范围从-32,768
    到 32,768 的整数。对于用户最可能输入的内容来说，这个范围已经足够宽裕了。


    *无符号 16 位整数*的取值范围在 0 到 65,536 之间，这意味着它们不能存储负值。如果我们需要存储非常大的数字，可以选择使用*32 位整数*，它们也有有符号（-2,147,483,647
    到 2,147,483,647）和无符号（0 到 4,294,967,295）两种版本。就本书而言，我们将严格使用较小的数字。


    ## 关于类与面向对象编程


    你可能已经注意到*类*这个词在我们的清单中出现了多次。这是*面向对象编程（OOP）*中的一个关键概念，OOP 是一种流行的编程范式。本书中介绍的三种语言都在不同程度上融入了
    OOP。


    任何现实世界或抽象的场景都可以用 OOP 优雅地表达。这种方法中的两个基本构建块被称为*类*和*对象*。简单来说，类定义了对象的蓝图。例如，你可能正在开发一个关于园艺的软件，并编写了一个名为*Plant*的类。然后，你可以使用
    Plant 类创建单个实例（称为对象）来填充你的虚拟花园。你以这种方式创建的各种植物个体将共享其源类中定义的特性与变量。日后修改 Plant 类的部分内容将影响所有属于该类的未来对象。你还可以创建
    Plant 的子类，以满足你计划建模的各种玫瑰和郁金香（以及一个用于花园小矮人的类）的需求。


    OOP 为软件开发人员提供了许多好处。其中包括代码的可重用性以及通过类封装实现的安全性。面向对象编程有许多迷人的方面。我们将在本书后面更深入地探讨这一范式。

    '
- fmt: '# The Basics of Flow Control: Loops


    Variables aside, we have a bunch of logical structures at our disposal for getting
    things done with our coding. These structures constitute what is known as *flow
    control.* When any program listing is typed in, it’s read by the computer from
    top to bottom. Quite often, processing within this program is to be repeated numerous
    times. It therefore makes sense to have the capabilities for looping and conditional
    program flow in place.


    Loops in programming may introduce you to the concept of *iteration.* Iteration
    is the process of repeating specific steps for a usually predetermined amount
    of times in order to obtain a desirable result. A repeating sequence of actions
    in the context of programming is referred to as a *loop.* There are many ways
    to create these loops, and it also depends on the language being used. See Table
    [2-6](#507458_1_En_2_Chapter.xhtml#Tab6) for sample implementations of these structures.


    **Table 2-6** Examples of flow control in three languages


    | “While-loop” in Java | “For-loop” in C# | “For-loop” in Python |

    | --- | --- | --- |

    | `// Let’s initialize a variable` `int i=3;` `**while** (i>0) {` `System.out.println(“Three
    hellos”);` `--i;` `}` | `// This is a fascinating loop` `**for**(int i=0; i<3;
    i++){` `Console.WriteLine(“Hello!”);` `}` | `# This is a fun loop` `**for** i
    in range(10):` `print(“Hello number”,i)` |


    ## The While-Loop


    The first iteration method in Table [2-6](#507458_1_En_2_Chapter.xhtml#Tab6) is
    the while-loop as demonstrated in Java. This approach executes actions until the
    condition in the while function is met. In our example, the loop runs while the
    variable `i` is greater than zero. Aside from differences in command syntax when
    it comes to printing text on screen, the while-loop in Table [2-6](#507458_1_En_2_Chapter.xhtml#Tab6)
    is identical in both Java and C#.


    ## The For-Loop in Detail


    The example in C# in Table [2-6](#507458_1_En_2_Chapter.xhtml#Tab6) may seem somewhat
    complicated. The structure in question, the *for-loop*, is an ancient technique
    consisting of several elements which will now be discussed.


    The head (i.e., the part starting with `for`) contains instructions as to how
    many times the body (i.e., the part surrounded by curly brackets) is to be executed.
    In our example, the head part reads as follows:


    - Define an auxiliary numeric variable `i` and give `i` the value of zero (`int
    i=0;`).

    - Execute the body part of the loop as long as variable `i` is less than three
    (`i<3;`) after which you resume the program.

    - Add one (1) to the value of `i` (`i++`).


    Again, aside from differences in command syntax (i.e., `System.out.println` vs.
    `Console.WriteLine`), the middle example in Table [2-6](#507458_1_En_2_Chapter.xhtml#Tab6)
    is identical in both Java and C#.


    ## Looping in Python


    You’ll perhaps notice the glaring absence of semicolons and curly brackets in
    our Python loop. The line containing the print command is indeed included into
    the loop’s code block using indentation only. Also, instead of the somewhat more
    complicated structure of Java and C#, for-loops in Python can simply use a nifty
    function called `range` to set the number of iterations.


    Sometimes we need to document changes to our code. Although pen and paper are
    fine, it’s a better idea to do this inside a listing. To add lines that are not
    parsed by the computer, we can inject our listings with special characters. With
    Java and C#, we use two forward slashes, and for Python, we go with a hash mark,
    as was evident in Listing [2-5](#507458_1_En_2_Chapter.xhtml#PC7).


    ## In Closing


    Finishing this chapter, you’ll have hopefully gained understanding of the following:


    - The main differences between interpreted and compiled programming languages

    - What variables are in the context of programming and how to manipulate them

    - How to define and manipulate variables and print text on screen using Java,
    C#, and Python

    - Which are the six universal variable comparison operators

    - What are the two fundamental concepts in object-oriented programming (OOP)

    - The basics of programmatic flow control, including the if-statement and for-loops


    In Chapter [3](#507458_1_En_3_Chapter.xhtml), we’ll go beyond online compilers
    and set you up with some fine downloadable software as well as deepening your
    understanding of the concepts presented in this chapter. We’ll be covering Windows,
    macOS, and Linux when it comes to software development environments.


    # 3. Setting Up Your Programming Environments


    This chapter is dedicated to introducing you to the joys of *integrated development
    environments*. While online programming environments are fine for your first few
    listings, you really benefit from having some dedicated coding software on your
    own computer. Luckily there are a plethora of free IDEs available for your downloading
    pleasure. We’ll cover this variety of software for the three most popular operating
    systems of 2021. But first, we’ll address another fundamental concept: *computing
    architecture*.


    ## On Computing Architecture


    A *clock cycle* represents a single action executed within a CPU. During each
    clock cycle, CPUs perform basic internal operations which form parts of any bigger
    tasks within your computer’s ecosystem. Now, *clock speed* refers to the amount
    of clock cycles per second a CPU can muster and is usually denoted with the unit
    of *gigahertz (Ghz).* For example, a 2.1 Ghz CPU offers 2.1 billion clock cycles
    per second. The more clock cycles per second a CPU offers, the faster a system
    will crunch its numbers.


    Now, the term *computing architecture* is used to describe how much data a CPU
    can process per clock cycle. There are basically two major computing architectures
    in the current market: 32 and 64 bit. The latter is fast becoming the de facto
    architecture for most varieties of computing. Software written for 64-bit architecture
    makes better use of system resources, such as RAM, while also usually executing
    faster than its 32-bit counterparts.


    Architecture implementation takes place in both hardware and software. Only 64-bit
    CPUs can run a 64-bit operating system, while still offering compatibility with
    older, 32-bit software (and operating systems). However, a 64-bit OS cannot usually
    be even installed on a computer with a 32-bit CPU.


    As of the early 2000s, CPUs with support for 64-bit computing became increasingly
    popular. Unless you are using a truly ancient PC, chances are you’re all set for
    64-bit computing at least on the hardware side of things. See Table [3-1](#507458_1_En_3_Chapter.xhtml#Tab1)
    for a rundown on these two architectures.


    Big business is in the process of abandoning 32-bit technology altogether. In
    fact, starting with *macOS Catalina (10.15)*, Apple dropped support for 32-bit
    software completely. Microsoft, too, is leaving the world of 32 bits behind. As
    of May 2020, any ready-made computers will only be shipped with the 64-bit editions
    of *Windows 10*. Out of the big three operating systems, only some distributions
    of *Linux* still cater extensively for 32-bit hardware.


    **Table 3-1** A comparison of 32- and 64-bit computing architectures


    | | 32-bit architecture | 64-bit architecture |

    | --- | --- | --- |

    | Features | Runs only 32-bit editions of operating systems, can run most legacy
    16-bit software | Runs both 32- and 64-bit operating systems, typically does not
    support 16-bit software |

    | Theoretical maximum RAM per system | 4 gigabytes (GB) or 4,294,967,296 bytes
    | 17.1 billion gigabytes (GB) or 18,446,744,073,709,551,616 bytes |

    | Typical RAM amount in a system | Between 1 and 4 GB | Between 8 and 32 GB |


    For the purposes of this book, you are not required to run any 64-bit software;
    a 32-bit operating system is just fine. However, in order to future-proof your
    devices, you should consider migrating to 64-bit operating systems as soon as
    you can.'
