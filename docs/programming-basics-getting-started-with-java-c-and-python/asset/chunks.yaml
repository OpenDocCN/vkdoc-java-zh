- fmt: '# Multithreading in C#


    Like you may have expected, multithreading is indeed well and truly supported
    in C#. See Listing [7-10](#507458_1_En_7_Chapter.xhtml#PC10) for a demonstration.
    First, we define a custom method, `ChildThread()`, to give birth to new threads.
    We are to later create three threads which are to simultaneously use the `Sleep`
    method, which simply pause a thread’s processing. Inside our threads, these methods
    are assigned a random value between 0 and 6000 milliseconds for a maximum of 6
    seconds of delay, all to be counted simultaneously as per the thread-based paradigm.


    Programs consist of *processes*. *Threads* are the entities inside processes which
    can be scheduled whenever they’re most needed. In C#, too, we can exert a lot
    of control over the creation and other life cycle events of threads.


    Next in our custom method, we retrieve a rather long-winded property called `System.Threading.Thread.CurrentThread.ManagedThreadId`
    for a unique identification number for each running thread, storing it into `happyID`.


    When setting up thread information, the variable `delay` is divided by a thousand
    (i.e., multiplied by 0.001) for displaying it in seconds. We also utilize the
    `Round` method from the C# `Math` class to round our `delay` integer to two decimals.


    ```

    using System;

    using System.Threading;

    public static void ChildThread() {

    Random randomnr = new Random(); // Create a new Random-object, "randomnr"

    int delay = randomnr.Next(0, 6000); // Set a random delay between zero and six
    seconds using our random-object

    /* Assign thread ID number, i.e.  System.Threading.Thread.CurrentThread.ManagedThreadId,
    into integer "happyID" */

    int happyID = System.Threading.Thread.CurrentThread.ManagedThreadId;

    Console.WriteLine("Happy thread " + happyID + " starts!");

    // Round delay amount to two decimals when displaying it

    Console.WriteLine("Happy thread " + happyID + " is paused for {0} seconds..",
    Math.Round(delay * 0.001, 2) );

    Thread.Sleep(delay);

    Console.WriteLine("Happy thread " + happyID + " will now resume!");

    }

    static void Main(string[] args) {

    ThreadStart child = new ThreadStart(ChildThread);

    for(int i=0; i<3; ++i) { // Create a total of three child-threads

    Thread childThread = new Thread(child);

    childThread.Start(); // Commence execution of thread

    }

    }

    Listing 7-10

    A listing demonstrating how child threads are created in C#

    ```


    The main method of Listing [7-10](#507458_1_En_7_Chapter.xhtml#PC10) is rather
    simple. Using a `for`-loop, we create exactly three instances of `ChildThread`,
    commencing their execution using the `Start()` method found in the C# `Thread`-class.


    ## Locks and Attributes in C# Threads


    Like Java and Python, C# offers a locking mechanism for its threaded applications.
    With locks, we can make our threads synchronized (see Listing [7-11](#507458_1_En_7_Chapter.xhtml#PC11)).


    ```

    using System;

    using System.Threading;

    public class LockingThreads

    {

    public void OurThread()

    {

    // Get a handle for the currently executing thread

    // so we can retrieve its properties, such as Name

    Thread wackyhandle = Thread.CurrentThread;

    // Apply a lock to synchronize thread

    lock(this) { // Locked code begins

    Console.WriteLine("(This thread is " + wackyhandle.ThreadState+" with " + wackyhandle.Priority
    + " priority)");

    for(int i=0; i<3; ++i) {

    Console.WriteLine(wackyhandle.Name + " has been working for " +i+ " hours");

    Thread.Sleep(400); // Wait for 0.4 seconds before next line

    }

    } // Locked code ends

    }

    }

    public static void Main()

    {

    LockingThreads jollythread = new LockingThreads();

    Thread thread1 = new Thread(new ThreadStart(jollythread.OurThread));

    Thread thread2 = new Thread(new ThreadStart(jollythread.OurThread));

    thread1.Name="Graham"; thread2.Name="Desdemona";

    // Both of these threads are synchronized / locked:

    // thread1 will be processed until completion before thread2 begins

    thread1.Start();

    thread2.Start();

    }

    Listing 7-11

    A listing in C# demonstrating thread locking and accessing some thread properties

    ```


    The output of Listing [7-11](#507458_1_En_7_Chapter.xhtml#PC11) is as follows:


    ```

    (This thread is Running with Normal priority)

    Graham has been working for 0 hours

    Graham has been working for 1 hours

    Graham has been working for 2 hours

    (This thread is Running with Normal priority)

    Desdemona has been working for 0 hours

    Desdemona has been working for 1 hours

    Desdemona has been working for 2 hours

    ```


    Without the locking mechanism in place, we would see lines about Graham and Desdemona
    alternating in this work-related status update. You''ll also see three properties
    of the `Threading` class being displayed in their full glory (i.e., `ThreadState`,
    `Priority`, and `Name`).


    ## Sleep vs. Yield


    So far we’ve explored the use of the `Sleep` method in several of our listings.
    To reiterate, this tells a thread to take a nap/suspend itself for a predetermined
    duration usually specified in milliseconds.


    It’s time we bring in the C# `Yield`. This keyword has multiple meanings in C#
    depending on the context; we’ll examine them in more detail in the next chapter.
    In a multithreaded environment, `Yield` tells a thread to enter a state of indeterminate
    waiting. A yielded thread will be reactivated whenever needed; this may occur
    within just a few milliseconds or take a much longer time. `Yield` basically frees
    the CPU from executing a specific thread in order to process other, more urgent
    threads. The level of this urgency is ultimately decided on by one’s operating
    system.


    The C# `Yield` can actually be emulated to some degree by the `Sleep` method.
    Older .NET frameworks (prior to version 4.0) were not yet `Yield` capable. In
    those cases, typing in `Sleep(0)` worked similar to `Yield`.


    Let’s now take a gander at how `Yield` performs in action (see Listing [7-12](#507458_1_En_7_Chapter.xhtml#PC13)).


    ```

    using System;

    using System.Threading;

    public class AmazingThreads

    {

    private int counter; // Declare a counter-variable

    public void YieldThread()

    {

    Console.WriteLine("First thread is an infinite loop with Yield()");

    while(true) // Start an infinite loop

    {

    // Without Yield, the counter would trail off to much longer lengths

    Thread.Yield();

    ++counter;

    }

    }

    public void SecondThread()

    {

    Console.WriteLine("Second thread informs you: First thread counter reached " +
    counter);

    }

    }

    public class YieldExample

    {

    public static void Main()

    {

    AmazingThreads greatobject = new AmazingThreads();

    Thread thread1 = new Thread(new ThreadStart(greatobject.YieldThread));

    Thread thread2 = new Thread(new ThreadStart(greatobject.SecondThread));

    thread1.Start();

    thread2.Start();

    }

    }

    Listing 7-12

    A listing demonstrating the Yield method in C#

    ```


    In Listing [7-12](#507458_1_En_7_Chapter.xhtml#PC13), we define a class integer,
    `counter`, to roughly document the length of the first thread’s execution time
    prior to `Yield` kicking in. We then start two threads, the first of them entering
    an infinite loop. The second thread is there to display the amount stored in the
    `counter`-variable. With `Yield`, we can expect this to read well under 2000 under
    most scenarios. Without `Yield`, the counter will display a reading several orders
    of magnitude higher, eventually causing the program to become unresponsive.


    Again, the operating system is the ultimate entity scheduling the thread making
    a `Yield` request, according to the status and priorities of other threads.'
