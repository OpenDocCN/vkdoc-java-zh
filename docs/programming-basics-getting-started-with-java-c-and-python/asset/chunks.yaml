    To open files in Python, we use the sensibly named `open()` function. It uses
    the following syntax: `file-object name = open(filename, access_mode, buffering)`.
    The last two attributes are optional. A simple example of Python''s `open()` function
    could look like this:


    ```

    happyfile = open("happytext.txt")

    ```


    Now, Python uses what are known as *access modes* for its file operations. Not
    all files need to be written or appended to when sometimes all you need to do
    is to read from one. See Table [6-1](#507458_1_En_6_Chapter.xhtml#Tab1) for a
    list of Python''s file access modes.


    **Table 6-1** The twelve Python file-access modes


    | r   | Opens a file in read-only mode. This is the default access mode in Python
    | w+  | Opens a file in read/write mode; overwrites file if it already exists
    |

    |-----|----------------------------------------------------------------------------|-----|-----------------------------------------------------------------------|

    | rb  | Opens a file in read-only binary mode                                      |
    wb+ | Opens a file in read/write binary mode; overwrites file if it already exists
    |

    | r+  | Opens a file in read/write mode                                            |
    a   | Opens a file for appending into. If file does not exist, one is created
    |

    | rb+ | Opens a file in read/write binary mode                                     |
    ab  | Opens a binary file for appending into. If file does not exist, one is created
    |

    | w   | Opens a file in write-only mode; overwrites file if it already exists      |
    a+  | Opens a file for both appending and reading. If file does not exist, one
    is created |

    | wb  | Opens a file in write-only binary mode; overwrites file if it already
    exists | ab+ | Opens a file for both appending and reading in binary mode. If
    file does not exist, one is created |


    *Buffering* in the context of Python''s file operations refers to the process
    of storing a part of a file in a temporary memory area until the file is completely
    loaded. Basically, a value of zero (0) switches buffering off, while one (1) enables
    it, for example, `somefile = open("nobuffer.txt", "r", 1)`. If no value is given,
    Python uses your system''s default setting. Usually it''s a good idea to keep
    buffering on for a speed boost in file operations.


    ## File Attributes in Python


    There are basically four main file attributes in Python (one of which is mostly
    of historical interest, i.e., `softspace`). You''re likely to get well acquainted
    with all of them if your projects include even the smallest amount of file operations.
    See Table [6-2](#507458_1_En_6_Chapter.xhtml#Tab2) for a rundown of these attributes
    in Python.


    **Table 6-2** The four Python file-object attributes


    | Attribute   | Description                                                                                                 |
    Example                                                                                                 |

    |-------------|-------------------------------------------------------------------------------------------------------------|---------------------------------------------------------------------------------------------------------|

    | `.name`     | Returns a file name                                                                                         |
    `happyfile = open("happytext.txt")`<br>`print(happyfile.name)`                                          |

    | `.mode`     | Returns file access mode                                                                                    |
    `anotherfile = open("whackytext.txt")`<br>`print(anotherfile.mode)`                                     |

    | `.closed`   | Returns "true" if file closed                                                                               |
    `apress_file = open("supertext.txt")`<br>`apress_file.close()`<br>`if print(apress_file.closed):`<br>`print("File
    closed!")` |

    | `.softspace`| Returns "false" if print statements are to have a space character
    inserted before first item. Historical: obsolete since Python 3.0 | `file5 = open("jollyfile.txt")`<br>`print("Softspace
    set? ", file5.softspace)`                          |


    ## Practical File Access


    A file needs to remain open in Python for it to be manipulated; a file set to
    closed cannot be written to or have its attributes examined. See Listing [6-1](#507458_1_En_6_Chapter.xhtml#PC2)
    for a demonstration on file access and how to read file attributes in Python.


    ```

    # Import a special module, time, for the sleep() method

    import time

    file1 = open("apress.txt", "wb") # Create/open file

    print("File-name: ", file1.name) # Start reading file attributes

    print("Opening mode: ", file1.mode)

    print("Is file closed? ", file1.closed)

    time.sleep(1) # Sleep/delay for one second, for the suspense

    file1.close() # Close file

    print("Now we closed the file..");

    time.sleep(1.5) # Sleep/delay for 1.5 seconds

    print("File is closed now? ", file1.closed)

    ```


    **Listing 6-1** A listing in Python demonstrating some basic file operations


    ## Directory Operations in Python


    A directory or folder is an important part of any operating system''s file management
    system; Python, too, offers ways of working with them. Let''s take a gander at
    some directory operations next (see Listing [6-2](#507458_1_En_6_Chapter.xhtml#PC3)).


    ```

    import os # import the os module for directory operations

    print("Current directory:", os.getcwd()) # Print current directory using getcwd()

    print("List of files:", os.listdir()) # List files in directory using listdir()

    os.chdir(''C:\\'') # Change to the (most common) Windows root-directory

    print("New directory location:", os.getcwd()) # Print current directory again

    print("Let''s make a new directory and call it JollyDirectory")

    os.mkdir(''JollyDirectory'') # Make a new directory using mkdir()

    print("List of files in JollyDirectory:", os.listdir(''JollyDirectory''))

    ```


    **Listing 6-2** A listing in Python demonstrating directory operations


    As for renaming a directory, we would use `os.rename("Somedirectory", "Newname")`.
    Once a directory is no longer needed, and is empty of files first, it only takes
    `os.rmdir("Somedirectory")` to remove it.


    ## File Name Pattern Matching


    We have ways of locating files matching specific naming patterns in Python. These
    are rather simple to implement as is evident from Listing [6-3](#507458_1_En_6_Chapter.xhtml#PC4).


    ```

    import os

    import fnmatch

    # Display all files in Windows root with .txt/.rtf extension

    for filename in os.listdir(''C:\\''):

    if filename.endswith(''.txt'') or filename.endswith(''.rtf''):

    print(filename)

    # Display all files with .txt extension starting with ''a''

    for filename in os.listdir(''C:\\''):

    if fnmatch.fnmatch(filename, ''a*.txt''):

    print(filename)

    ```


    **Listing 6-3** A listing in Python demonstrating file name pattern matching


    In Listing [6-3](#507458_1_En_6_Chapter.xhtml#PC4), we introduced two handy functions
    for locating files with specific naming conventions, namely, `endswith()` and
    `fnmatch()`. The latter provides so-called wildcard-based searches into your Python
    projects (e.g., `file*.txt` or `????name.txt`).


    ## File Searching with Glob?


    The term *globbing* refers to performing highly exact file searches inside specific
    directories (or Python''s current working directory if none are specified). The
    term *glob*, short for *global*, has its origins in the world of Unix-based operating
    systems. In Listing [6-4](#507458_1_En_6_Chapter.xhtml#PC5), you''ll see this
    approach put to good use.


    ```

    import glob

    # Using * pattern

    print("\nGlobbing with wildcard pattern * (*.py)")

    for name in glob.glob("*.py"):

    print(name)

    # Using ? pattern

    print("\nGlobbing with wildcard ? and * (??????.*)")

    for name in glob.glob("??????.*"):

    print(name)

    # Using [0-9] pattern

    print("\nGlobbing with wildcard range [0-9]")

    for name in glob.glob("*[0-9].*"):

    print(name)

    # Using [b-x] pattern

    print("\nGlobbing with wildcard range [b-x]")

    for name in glob.glob("*[b-x].*"):

    print(name)

    ```


    **Listing 6-4** A listing in Python demonstrating file searches by globbing'
