- fmt: '# The Universal Chatting Simulator for Python


    We’ll start this chapter by introducing the *Universal Chatting Simulator* to
    the world. This program will demonstrate the following features of Python, all
    of which we have discussed previously in the book:


    - File operations

    - String formatting

    - Custom function definition (using the `def` keyword)

    - Variables (including randomizing), lists, and iteration

    - Basic exception handling

    - Element enumeration

    - Program flow and simple loops

    - Date and time retrieval


    Like the other programs in this chapter, the Universal Chatting Simulator (UCS)
    is a console application, meaning it works in text mode only; no graphical elements
    will be used to keep it simple.


    Now, the two key elements of UCS come in the form of a virtual chat host and their
    virtual audience, the latter being portrayed by a shared moniker of “chat.” Both
    of these virtual actors output text onscreen every few seconds, the contents of
    which are determined by three external, and thus easily editable, text files.


    There’s no need to type the entire listing to begin experimenting with the UCS;
    the file is available on GitHub where this freely downloadable listing is also
    fully commented. However, let’s now go through the program block by block just
    to be thorough.


    ## Part One: Setting Up the Project


    First, we import the required code modules. `Datetime`, `time`, and `random` come
    with Python. However, for our project, we also need to acquire an additional module
    from the *Python Package Index (PyPI)*. This is a free online repository for extending
    Python’s functionality. We’ll be using the asset `clrprint` by Abhijith Boppe.
    After installing and importing the `clrprint` module, we can add colorful text
    into our Python projects with lines like this: `clrprint("Hello!", clr=''red'')`.
    See Listing [8-1](#507458_1_En_8_Chapter.xhtml#PC1) for the first part of the
    project code.


    Install `clrprint` simply by entering `pip3 install clrprint` into the macOS terminal,
    Windows shell, or Linux command line.


    ```

    # import three Python code-modules

    import datetime

    import time

    import random

    # also import the clrprint-module from the Python Package Index (PyPI)

    from clrprint import *

    name = "Apple representative"  # virtual chat host name

    mood = 50  # moods: 50 = neutral, 0 = bad ending, 100 = good ending

    score = messages_sent = 0  # assign zero to score and messages_sent

    response = negative = positive = False  # assign False to three variables

    negativetrigger = "orange"  # negative trigger word, used to reduce mood

    positivetrigger = "apple"  # positive trigger word, used to grow mood

    # Fetch current time and date using now() from datetime-class

    initial_time = datetime.datetime.now()

    # define a custom function, print_chat()

    # variable "cap" decides how the chat messages are to be capitalized, if at all

    # both 0 and -1 mean no changes in capitalization

    # 1 means capitalize first letter of a line, 2 means capitalize all letters in
    a line

    def print_chat(chat):

    cap = random.choice([-1, 0, 1, 2])

    if cap == 1:

    chat = chat.capitalize()  # summon capitalize() method

    elif cap == 2:

    chat = chat.upper()  # summon upper() method for ALL CAPS

    print("Chat: " + timer.strftime(" ") + chat)

    Listing 8-1

    First part of the listing for the Universal Chatting Simulator in Python

    ```


    Next, we define a custom function called `open_chatfile` which takes two arguments,
    `name` and `deletechar`. `name` simply represents the file name we want to open.
    `deletechar` is used to denote a character we are to delete from these lists;
    this is there, so we may, for one, delete all newline characters (i.e., `\n`)
    from the chat to eliminate unnecessary blank lines (see Listing [8-2](#507458_1_En_8_Chapter.xhtml#PC2)).


    We also use a temporary list structure, `templist`, in our function. Data is fed
    into `templist` so that it may be enumerated and have its newline characters removed.
    The file contents are read using Python’s `readlines` method.


    ```

    def open_chatfile(name, deletechar):

    try:

    file = open(name, ''r'')  # open file in read-only mode, "r"

    print("Loading file " + name)

    templist = file.readlines()  # read file into templist

    for i, element in enumerate(templist):  # enumerate the list

    templist[i] = element.replace(deletechar, '''') # delete newlines

    return templist  # return the enumerated list

    file.close()  # closing the file is always a good practice

    except (FileNotFoundError, IOError):  # handle an exception

    # str() converts variables to string

    print("The file " + str(name) + " could not be read!")

    Listing 8-2

    The second part of the listing for the Universal Chatting Simulator in Python

    ```


    ## Part Two: Displaying Highscores


    Before we get to score keeping, we are to define three lists for use with our
    `open_chatfile` function; they are called `neutralmoods`, `badmoods`, and `chatmoods`.
    The data from text files needs to be stored somewhere, and this is where our three
    lists come in (see Listing [8-3](#507458_1_En_8_Chapter.xhtml#PC3)).


    In Python, we can initialize variables, including lists, with the same variable
    and on the same line using the assignment operator, for example, `a = b = 10`
    or `happy = wonderful = []`.


    Next, we actually use our method, summoning it thrice to open the files `neutral.txt`,
    `bad.txt`, and `chat.txt`. The other two arguments `open_chatfile` takes are the
    lists we previously created and the newline characters. Now, we have three lists
    full of thought-provoking communication ready for our virtual chatting pleasure.


    Ending this block of the project, we are to open a text file containing the currently
    reigning high score. Yes, we have a scoring system in the Universal Chatting Simulator;
    more on this later. We go about fetching our score data by creating a `try` block.
    As a reminder, a `try` block allows us to test our code for errors on the fly.
    Coupled with the `except` keyword (short for exception), we can introduce our
    very own error messages. Inside the `try` block in Listing [8-3](#507458_1_En_8_Chapter.xhtml#PC3)
    an attempt is made to load the file `highscores.txt`. If such a file can’t be
    found, the exception block is there to tell us so and create the file.


    ```

    # display program title in vibrant yellow using the clrprint-module

    clrprint("Universal Chatting Simulator (UCS) ver 0.1.0 by Bob the Developer",
    clr=''yellow'')

    # define three list-structures to be filled with data from text-files

    neutralmoods = badmoods = chatmoods = []  # [] denotes an empty list

    # insert textfile-data into the three lists using our custom function

    neutralmoods = open_chatfile("neutral.txt", "\n")

    badmoods = open_chatfile("bad.txt", "\n")

    chatmoods = open_chatfile("chat.txt", "\n")

    print("Your starting mood is " + str(mood) + "/100")

    # display current highscore stored in "highscore.txt"

    try:

    # open "highscore.txt" in r+ mode for both reading and writing

    with open("highscore.txt", "r+") as scorefile:

    hiscore = scorefile.read()

    print("CURRENT HIGHSCORE: %s" % hiscore)

    # if highscore.txt is not found, create this file

    except (FileNotFoundError, IOError):

    print("Highscores not found. Creating highscore.txt")

    scorefile = open("highscore.txt", "w")

    scorefile.write("0")  # write zero into "highscore.txt"

    scorefile.close()

    Listing 8-3

    The third part of the listing for the Universal Chatting Simulator in Python

    ```'
