    ## A Personal Computer in UML\n\nLet’s now model something with both composite\
    \ and aggregate associations. This is to have you contemplate scenarios in which\
    \ you need to make a distinction between these two types of associations in UML.\n\
    \nFigure 9-4 represents a typical personal computer. It is meant to depict all\
    \ the main components needed for a functional system. However, only some of these\
    \ components are depicted using the composite association (i.e., the filled diamond\
    \ symbol). This is because, in theory, one could have a personal computer up and\
    \ running without them. It would not be the most useful system ever, but it would\
    \ switch on and display error messages, at least.\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig4_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4: A diagram demonstrating composition relationships in UML\n\nEssential\
    \ computer components depicted with composite associations in Figure 9-4:\n\n\
    *   Power supply, motherboard, CPU, and RAM chip(s)\n\nLess essential components\
    \ depicted with an aggregate association:\n\n*   Storage unit (e.g., a hard drive),\
    \ input device (e.g., mouse and/or keyboard), and display adapter/video card (an\
    \ integrated video chip may come with the CPU)\n\nSee Table 9-2 for a summary\
    \ on the differences between aggregate and composite associations.\n\nTable 9-2:\
    \ The main differences between aggregate and composite associations in UML\n\n\
    | | Aggregate | Composite |\n| --- | --- | --- |\n| Association strength | Weak\
    \ | Strong |\n| Relationship | “Has-a” | “Part-of” |\n| Dependency | Subclasses\
    \ can exist whether the superclass exists or not | Subclasses need a superclass\
    \ to exist |\n| Examples | Even when a class of *students* graduate, a *university*\
    \ remains. Closing down a single *department* will not end the entire *corporation*.\
    \ | *Rooms* are meaningless without a *house*. A functional *heart* is needed\
    \ for a *human being* to live. |\n\n## Realization and Dependency in UML\n\nRealization\
    \ refers to a relationship with two sets of elements, one of which represents\
    \ a *specification* and the other its *implementation*. The actual workings of\
    \ an implementation depend on the context and are not strictly defined in UML\
    \ (see Figure 9-5).\n\n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig5_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5: Three examples of simple realization relationships in UML\n\nIn\
    \ the diagram in Figure 9-5, you’ll see three simple examples of UML realization\
    \ relationships. In the first one, a search algorithm provides the functionality\
    \ for an online search engine. Similarly, video card driver software is needed\
    \ for a video card to actually display any visuals. Finally, a payment event is\
    \ made possible by three available types of payment method: cash, card, or check.\n\
    \nNext, we have the *dependency* (see Figure 9-6). This type of diagram denotes\
    \ a connection between dependent and independent elements. Depicted using a dotted\
    \ line and a simple arrowhead, dependencies are unidirectional in nature.\n\n\
    ![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig6_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6: Two examples of UML dependency\n\n## Reflexive Association\n\nA\
    \ *reflexive association* is there to represent instances belonging into the same\
    \ class. When a class can be split into numerous responsibilities, we can use\
    \ this type of association.\n\nIn Figure 9-7, we have a class called `Employee`\
    \ with an association with itself as depicted by a now familiar simple line. The\
    \ `Employee` class is used to represent both esteemed supervisors and lowly trainees;\
    \ you’ll notice UML multiplicity information is also inserted into this diagram.\n\
    \n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig7_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7: An example of a reflexive association in UML\n\nNow, Figure 9-7\
    \ depicts the same setting in two different ways. The diagram on the left shows\
    \ a *role-based* approach, as we do have the two different roles on display (i.e.,\
    \ supervisor and trainee). The right diagram uses a *named association*.\n\n##\
    \ UML Class Diagrams: The Basic Elements\n\nAt this point, it would be a good\
    \ idea to review the elements of UML we’ve encountered so far (see Figure 9-8).\n\
    \n![../images/507458_1_En_9_Chapter/507458_1_En_9_Fig8_HTML.jpg](images/507458_1_En_9_Chapter/507458_1_En_9_Fig8_HTML.jpg)\n\
    \nFigure 9-8: A diagram showing most of the basic elements used in UML class diagrams"
