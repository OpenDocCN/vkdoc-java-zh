    在代码清单 7-3 中，我们创建了 CultureInfo 类的四个实例，以演示美国、芬兰、萨米（瑞典北部）和西班牙的区域设置与 C# 的关系。


    我们选择在显示 CultureInfo 对象时使用 *foreach* 元素。C# 中的 *foreach* 是 for 循环的一种替代方案，并且在遍历数组时往往更适用。例如，这个元素与
    CultureInfo 的实例配合得非常好。


    现在来看一个货币格式的小例子（参见代码清单 7-4）。


