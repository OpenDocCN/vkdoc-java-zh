  trans: '

    ## Java 中的基本文件操作


    基本上，文件操作指的是对存储在硬盘或固态硬盘等设备上的数据进行读取、写入和删除。要建立一个支持文件操作的 Java 项目，我们应在代码开头添加以下包：*import
    java.io.File*。实际上，让我们看看一个简单的 Java 文件操作程序是什么样的（参见代码清单 5-5）。


    ```

    import java.io.File;

    public class JollyFileClass {

    public static void main(String[] args) {

    // 使用导入的 File 类创建一个文件对象 happyfile

    File happyfile = new File("apress_is_great.txt");

    // 开始一个 try-catch 块

    try {

    // 调用 File 类中的 createNewFile 方法

    boolean ok = happyfile.createNewFile();

    // ok 是一个布尔变量，意味着它只能为 ''true'' 或 ''false''

    if (ok == true) {

    System.out.println("文件 " + happyfile.getName() + " 已创建。");

    }

    else {

    System.out.println("该文件已存在。");

    }

    }

    // 如有必要，在 catch 块中显示错误信息

    catch(Exception e) {

    System.out.println("我们遇到了一个问题..");

    }

    }

    }

    代码清单 5-5

    一个用于创建空文本文件的 Java 代码清单

    ```


    java.io.File 包提供的功能不仅限于我们在代码清单 5-5 中探讨的方法。请参见表 5-4 了解我们即将探索的所有方法。此外，表 5-5 列出了我们将在本章后面深入探讨的一些与时间相关的格式化标记。Java
    的格式化标记用于显示解析为特定字符串模式的时间和日期。目前，你只需了解它们的存在即可；其中许多标记源自 *java.time.format.DateTimeFormatter*
    类。


    表 5-4


    java.io.File 提供的 Java 文件操作的一些常用方法


    | createNewFile( ) | 创建一个新文件 | length( ) | 返回文件的大小（以字节为单位） |

    | mkdir( ) | 创建一个新目录 | getAbsolutePath( ) | 获取文件的绝对路径，例如 C:\Windows\hello.txt
    |

    | delete( ) | 删除一个文件 | canRead( ) | 测试文件是否可读 |

    | exists( ) | 测试文件是否存在 | canWrite( ) | 测试文件是否可写 |


    ## 在 Java 中创建文本文件


    言归正传，接下来我们创建一个文本文件，好吗？请参见代码清单 5-6，继续体验 Java 文件操作的魅力。


    ```

    import java.io.*;

    public class Main {

    public static void main(String args[]) {

    // 定义一个我们打算写入文件的字符串

    String data = "Apress rules, OK?";

    try {

    // 使用 FileWriter 类创建一个 Writer 对象

    FileWriter writer1 = new FileWriter("happyfile.txt");

    // 向文件写入一条消息

    writer1.write(data);

    // 关闭 writer

    writer1.close();

    // 打开已创建的文件

    File file1 = new File("happyfile.txt");

    // 创建一个新的文件输入流 "fileinput1"

    FileInputStream fileinput1 = new FileInputStream(file1);

    System.out.println("文件 " + file1.getName() + " 的内容如下：");

    int counter=0;

    // 使用 while 循环显示 "happyfile.txt" 中的每个文本字符

    // 当遇到 "-1" 时跳出 "while" 循环，这表示

    // 文件结束

    while((counter = fileinput1.read())!=-1)

    {

    System.out.print((char)counter);

    }

    // 关闭文件输入流

    fileinput1.close();

    }

    catch (Exception e) {

    e.getStackTrace();

    }

    }

    }

    代码清单 5-6

    一个演示文本文件创建和访问的 Java 程序

    ```


    在第二个代码清单中，你会看到大量新的、可能令人望而生畏的机制。现在，我们将冷静地逐一讲解。首先，代码清单 5-6 中的 *import java.io.*;*
    用于提供对 java.io 包中所有类的访问权限。


    接下来，我们有 FileWriter 类。正如你可能预料的，这个类提供了写入数据和创建新文件的方法。我们实例化一个 FileWriter 对象，并将其命名为
    *happyfile.txt*。


    在代码清单 5-6 中，我们为文件 *happyfile.txt* 提供了文件名和*目录路径*。其中字母 C 部分指的是 Windows 根驱动器最常见的选择。你可以在在线编程环境中顺利运行此代码清单。但是，如果你使用在线环境，实际上不太可能将任何内容写入你的硬盘。


    继续往下看代码清单，我们调用 FileWriter 类中的 write 方法，并将字符串 *data* 中的消息传递给它。现在，我们的 happyfile.txt
    中包含了一条基于文本的消息。接下来，我们执行 close 方法；这样做是为了让后续方法能够访问 happyfile.txt。


    现在，我们再次打开文件，这次是为了将其内容打印到屏幕上。我们首先使用 Java 的 File 类实例化一个对象，即 *File file1 = new File(“c:\\happyfile.txt”)*。代码行
    *FileInputStream fileinput1 = new FileInputStream(file1)* 使我们能够访问 Java 文件输入流类，从而提供以字节为单位读取文件的能力。在我们的例子中，这意味着逐个字符地读取并显示一个文本文件（即
    happyfile.txt）。为此，我们实现了一个 while 循环，该循环使用了 FileInputStream 类中的一个方法（即 *read*）。


    我们打印 happyfile.txt 的内容（同样，根据 FileInputStream 文件访问的实现方式，是逐个字符地打印）。值为负一 (-1) 表示文件结束，从而跳出
    while 循环。之后，就是清理工作了。我们关闭文件并退出程序。

