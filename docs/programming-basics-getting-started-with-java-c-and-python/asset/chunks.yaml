- fmt: '# Jolly Quiz for C#


    Next up, Listing [8-7](#507458_1_En_8_Chapter.xhtml#PC8) presents to you a little
    console-based quiz program. It demonstrates the following features of this fine
    language:


    - Basic file operations and threading

    - String formatting

    - Program flow, user interaction, and loops

    - Variables and iteration


    `Jolly Quiz` uses two separate files, `questions.txt` and `answers.txt`. Both
    of them are processed from the top down with each line in the question file corresponding
    with the same line in the answers file. This approach makes it easy to add new
    questions and modify existing ones simply by editing the two text files.


    The user is expected to type their answer during program execution. A threaded
    object runs in the background, independent of the quiz in progress, telling the
    user to "hurry up!" every four seconds. Every correct answer grants ten points.
    At the end of the quiz, the user is presented with their score as well as the
    percentage of correct answers.


    ```

    using System;

    using System.IO;

    using System.Threading;

    class JollyQuiz

    {

    public static void Main()

    {

    // Declare three integer-variables

    int counter=0, score=0, percentage=0;

    // Declare a boolean-variable (takes: true or false)

    bool countdown=true;

    Console.WriteLine("Welcome to THE JOLLY QUIZ PROGRAM!\n");

    // Create a new thread-object, timerthread1

    Thread timerthread1 = new Thread(delegate() {

    Thread.Sleep(6000); // Sleep for 6 seconds at first

    while(true) { // Create an infinite loop inside our thread

    Console.WriteLine("HURRY UP!");

    Thread.Sleep(4000);

    // End thread processing if countdown is set to "false" in main program

    if(!countdown) break; // This reads: if countdown is NOT "true" exit loop

    }

    });

    // Open the question and answer -files. These should work from the

    // same directory as your project file

    var q = File.ReadAllLines("questions.txt");

    var a = File.ReadAllLines("answers.txt");

    timerthread1.Start(); // Start the timer-thread

    foreach(string lines in q) // Iterate through the questions-file

    {

    Console.WriteLine("{0}\nEnter response: ", lines);

    // Convert response to ALL CAPS to eliminate input capitalization issues

    // i.e. make "Helsinki" equally valid to "HeLSiNKI"

    string response = Console.ReadLine().ToUpper();

    ++counter;

    // Compare user input against correct answers

    if(response.Equals(a[counter-1])) {

    Console.WriteLine("{0} is correct!", response); score+=10;

    // use else if to determine whether the user wrote a wrong answer

    // or simply pressed enter

    } else if(response!="") Console.WriteLine("{0} is wrong..", response);

    else Console.WriteLine("Type something next time!");

    }

    // No need to remind the user to hurry up after the quiz is over;

    // so we next tell timerthread1 to end processing

    countdown = false;

    Console.Write("\nYour score: {0}. ", score);

    percentage = score*100/(counter*10);

    Console.WriteLine("You knew/guessed {0}% right on the {1} questions presented.",
    percentage, counter);

    // Display shaming message for motivation after a poor score

    if(percentage = 90) Console.WriteLine("Well done!");

    }

    }

    Listing 8-7

    A quiz program in C# demonstrating basic file operations and threading

    ```


    You''ll notice Listings [8-6](#507458_1_En_8_Chapter.xhtml#PC6) and [8-7](#507458_1_En_8_Chapter.xhtml#PC8)
    feature a peculiar variable type, `var`. This is an *implicit variable definition*
    in C# and simply means the compiler program is allowed to determine the type of
    a variable. For smaller projects in C#, this approach usually works just fine.


    # A Recipe Book in Java


    We''ll next return to the world of Java with a little program called *Delicious
    Finnish Recipes*. This rather straightforward listing basically displays easily
    customized text files.


    ```

    import java.io.File;

    import java.io.FileNotFoundException;

    import java.util.Scanner;

    public class FinnishRecipes {

    // Define LoadText, a method for loading text-files

    // which takes a file path and filename as its arguments

    static void LoadText(String path1, String section) {

    try {

    File fileobject1 = new File(path1 + section);

    // Create a Scanner-object, reader1, for user input

    Scanner reader1 = new Scanner(fileobject1);

    while (reader1.hasNextLine()) {

    String output1 = reader1.nextLine();

    System.out.println(output1);

    }

    reader1.close();

    } catch (FileNotFoundException e) { // Throw exception/error if needed

    System.out.println("File " + section + " not found!");

    }

    }

    static void DisplayMenu() {

    System.out.println("DELICIOUS FINNISH RECIPES\nEnter choice:");

    System.out.println("[1] Salads");

    System.out.println("[2] Main Courses");

    System.out.println("[3] Custom recipes (make your own)");

    System.out.println("[4] Quit)");

    }

    // Define Main method

    public static void main(String[] args) {

    // Display main menu

    DisplayMenu();

    Scanner keyscanner1 = new Scanner(System.in);

    while(true) { // Create an infinite while-loop

    String input1 = keyscanner1.nextLine();

    // "C:\\" refers to the file-path to the most common Windows root-drive

    // modify this path as per your file locations

    if(input1.equals("1")) LoadText("","salads.txt");

    if(input1.equals("2")) LoadText("","maincourses.txt");

    if(input1.equals("3")) LoadText("","custom.txt");

    if(input1.equals("4")) break;

    // Display menu again if user inputs a plain enter

    if(input1.equals("")) DisplayMenu();

    } System.out.println("Have a great day!");

    }

    }

    Listing 8-8

    A program in Java demonstrating file access

    ```


    In Listing [8-8](#507458_1_En_8_Chapter.xhtml#PC9), we create a method, `LoadText`,
    which takes two arguments, namely, the file path and name. It then proceeds to
    load the specified text file and display its contents, line by line, on screen.
    We also have another method, `DisplayMenu`, which is simply used to display the
    options available to the user. Both methods are defined as `void`, which means
    they are to return no information.


    There is a `try-catch` block in Listing [8-8](#507458_1_En_8_Chapter.xhtml#PC9)
    which will sound off, that is, throw an exception, if a file is not found. An
    infinite `while` loop keeps the program running until the user enters "4" on their
    keyboard, in which case a `break` keyword is executed.


    # A Stopwatch in Java


    The following program acts as a simple stopwatch. You input a number of seconds
    for it to crunch, before it lets you know you''re out of time. This program represents
    a very basic implementation of threading in Java, consisting of a single main
    thread.


    ```

    import java.util.Scanner;

    public class Counter {

    public static void main(String[] args) {

    int counter1=0;

    Scanner keyscanner1 = new Scanner(System.in);

    // Loop while counter1 equals zero

    while(counter1  0) {

    System.out.println("Time left: " + counter1 + " sec");

    try

    { Thread.sleep(1000); }

    catch(InterruptedException ex)

    { Thread.currentThread().interrupt(); }

    --counter1;

    } // Second loop end

    System.out.println("All done!");

    }

    }

    Listing 8-9

    A listing for a stopwatch program in Java

    ```


    Listing [8-9](#507458_1_En_8_Chapter.xhtml#PC10) has two `while` loops. The first
    one is there to take input from the user and make sure this conforms to specific
    rules. Mainly, the input is to consist of positive numbers only. The program throws
    an exception, a `NumberFormatException` to be precise, should letters or other
    non-numeric characters be entered. Additionally, the first loop refuses to accept
    negative numbers and posts a message about it if need be.


    In the second loop, we use a line with `Thread.sleep(1000)` to experience the
    desired amount of delay. Do note that for the `sleep` method to work in Java,
    you need to check it for exceptions. In Listing [8-9](#507458_1_En_8_Chapter.xhtml#PC10),
    we used a classic `try-catch` block for this purpose.'
  raw: '## Jolly Quiz for C#


    Next up, Listing [8-7](#507458_1_En_8_Chapter.xhtml#PC8) presents to you a little
    console-based quiz program . It demonstrates the following features of this fine
    language:


    *   Basic file operations and threading


    *   String formatting


    *   Program flow, user interaction, and loops


    *   Variables and iteration


    Jolly Quiz uses two separate files, *questions.txt* and *answers.txt*. Both of
    them are processed from the top down with each line in the question file corresponding
    with the same line in the answers file. This approach makes it easy to add new
    questions and modify existing ones simply by editing the two text files.


    The user is expected to type their answer during program execution. A threaded
    object runs in the background, independent of the quiz in progress, telling the
    user to “hurry up!” every four seconds. Every correct answer grants ten points.
    At the end of the quiz, the user is presented with their score as well as the
    percentage of correct answers.


    ```

    using System;

    using System.IO;

    using System.Threading;

    class JollyQuiz

    {

    public static void Main()

    {

    // Declare three integer-variables

    int counter=0, score=0, percentage=0;

    // Declare a boolean-variable (takes: true or false)

    bool countdown=true;

    Console.WriteLine("Welcome to THE JOLLY QUIZ PROGRAM!\n");

    // Create a new thread-object, timerthread1

    Thread timerthread1 = new Thread(delegate() {

    Thread.Sleep(6000); // Sleep for 6 seconds at first

    while(true) { // Create an infinite loop inside our thread

    Console.WriteLine("HURRY UP!");

    Thread.Sleep(4000);

    // End thread processing if countdown is set to "false" in main program

    if(!countdown) break; // This reads: if countdown is NOT "true" exit loop

    }

    });

    // Open the question and answer -files. These should work from the

    // same directory as your project file

    var q = File.ReadAllLines("questions.txt");

    var a = File.ReadAllLines("answers.txt");

    timerthread1.Start(); // Start the timer-thread

    foreach(string lines in q) // Iterate through the questions-file

    {

    Console.WriteLine("{0}\nEnter response: ", lines);

    // Convert response to ALL CAPS to eliminate input capitalization issues

    // i.e. make "Helsinki" equally valid to "HeLSiNKI"

    string response = Console.ReadLine().ToUpper();

    ++counter;

    // Compare user input against correct answers

    if(response.Equals(a[counter-1])) {

    Console.WriteLine("{0} is correct!", response); score+=10;

    // use else if to determine whether the user wrote a wrong answer

    // or simply pressed enter

    } else if(response!="") Console.WriteLine("{0} is wrong..", response);

    else Console.WriteLine("Type something next time!");

    }

    // No need to remind the user to hurry up after the quiz is over;

    // so we next tell timerthread1 to end processing

    countdown = false;

    Console.Write("\nYour score: {0}. ", score);

    percentage = score*100/(counter*10);

    Console.WriteLine("You knew/guessed {0}% right on the {1} questions presented.",
    percentage, counter);

    // Display shaming message for motivation after a poor score

    if(percentage = 90) Console.WriteLine("Well done!");

    }

    }

    Listing 8-7

    A quiz program in C# demonstrating basic file operations and threading

    ```


    You’ll notice Listings [8-6](#507458_1_En_8_Chapter.xhtml#PC6) and [8-7](#507458_1_En_8_Chapter.xhtml#PC8)
    feature a peculiar variable type, *var*. This is an *implicit variable definition*
    in C# and simply means the compiler program is allowed to determine the type of
    a variable. For smaller projects in C#, this approach usually works just fine.


    ## A Recipe Book in Java


    We’ll next return to the world of Java with a little program called *Delicious
    Finnish Recipes* . This rather straightforward listing basically displays easily
    customized text files.


    ```

    import java.io.File;

    import java.io.FileNotFoundException;

    import java.util.Scanner;

    public class FinnishRecipes {

    // Define LoadText, a method for loading text-files

    // which takes a file path and filename as its arguments

    static void LoadText(String path1, String section) {

    try {

    File fileobject1 = new File(path1 + section);

    // Create a Scanner-object, reader1, for user input

    Scanner reader1 = new Scanner(fileobject1);

    while (reader1.hasNextLine()) {

    String output1 = reader1.nextLine();

    System.out.println(output1);

    }

    reader1.close();

    } catch (FileNotFoundException e) { // Throw exception/error if needed

    System.out.println("File " + section + " not found!");

