    Let’s have one more go at Python before we solemnly end the chapter (see Listing
    [4-11](#507458_1_En_4_Chapter.xhtml#PC11)).


    ```

    class ToiletPaper:

    pass

    "Create two objects from class ToiletPaper"

    type1 = ToiletPaper()

    type2 = ToiletPaper()

