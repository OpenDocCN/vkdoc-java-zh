- fmt: '# File vs. FileInfo: What’s the Difference?


    The `File` and `FileInfo` classes of C# are quite similar. However, there are
    reasons for why they remain separate entities in the language. The `FileInfo`
    class is preferable when multiple operations on a file are needed, while `File`
    works best for single operations. `FileInfo` also offers a touch more manual control
    with its byte-sized file manipulations.


    The methods inside `File` are static, whereas those inside `FileInfo` are instance
    based. Static methods take more arguments, such as full directory paths. In turn,
    under specific scenarios, such as coding for network-based environments, the somewhat
    more arduous `File` class might actually yield more effective results (see Table
    [7-4](#507458_1_En_7_Chapter.xhtml#Tab4)).


    **Table 7-4** The main differences between `File` and `FileInfo` classes in C#


    | File | FileInfo |

    | --- | --- |

    | Uses static methods | Uses instance-based methods |

    | Does not need to be instantiated | Needs to be instantiated |

    | Offers more methods | Offers fewer methods |

    | May offer faster performance under some scenarios, e.g., with network traffic
    | Has finer control over file reading and writing operations |


    To observe some manual control provided by `FileInfo`, see Listing [7-9](#507458_1_En_7_Chapter.xhtml#PC9).


    ```

    using System;

    using System.IO;

    // Create a new FileInfo object, "fileobj1"

    FileInfo fileobj1 = new FileInfo(@"c:\apress.txt"); // This text-file should contain
    something

    // Open the file for reading: this line works with FileInfo only; not with File

    FileStream filestream1 = fileobj1.Open(FileMode.Open, FileAccess.Read);

    // Create a byte array sharing the length of our filestream

    byte[] bytearray1 = new byte[filestream1.Length];

    // Set variable for a byte-counter and feed the length of our file into it

    int howmanybytes = (int)bytearray1.Length;

    int bytesread = 0;

    // Read our file, a byte at a time using a while-loop

    while (howmanybytes > 0)

    {

    int i = filestream1.Read(bytearray1, bytesread, howmanybytes);

    if (i == 0) break; // Once we have zero bytes left, break loop

    howmanybytes-=i;

    bytesread+=i;

    }

    // Convert bytes into string which uses UTF-8 character encoding

    string string1 = Encoding.UTF8.GetString(bytearray1);

    Console.WriteLine(string1); // Display string

    ```


    **Listing 7-9** A listing demonstrating manual control for reading data using
    `FileInfo` and `FileStream` classes in C#


    The `FileStream` class allows us to read and write files on a byte-by-byte basis.
    This is done using the `Open` method in Listing [7-9](#507458_1_En_7_Chapter.xhtml#PC9).
    This is a versatile method which takes several attributes; to open our file in
    a read-only mode, we enter the arguments `FileMode.Open` and `FileAccess.Read`
    into the `Open` method. Next in the listing, we create a byte array, using the
    keyword `byte[]`. As a reminder, an array is a collection of values; they might
    consist of numbers, characters, strings, or bytes. In C#, arrays are defined using
    square brackets (as a second reminder, bytes consist of eight bits each and are
    used frequently to denote alphabetical characters, for one).


    Next up, with the line `int howmanybytes = (int)bytearray1.Length;` we create
    an integer, `howmanybytes`, into which we apply a `Length` method in order to
    find out our file’s size in bytes. In the ensuing `while` loop, bytes are read
    using the `Read` method.


    To be more precise, this `while` loop is to be executed while the variable `howmanybytes`
    remains greater than zero. The file stream we defined earlier, `filestream1`,
    has the `Read` method applied on it with the byte array (`bytearray1`), the amount
    of bytes read so far (`bytesread`), and the total amount of bytes to be read (`howmanybytes`)
    as the method’s arguments. This output is fed into variable `i`. We break out
    of this loop when `i` reaches zero using the `break` keyword.


    The final steps of Listing [7-9](#507458_1_En_7_Chapter.xhtml#PC9) consist of
    first converting `bytearray1` into readable Unicode characters and storing it
    into `string1` after which this string is then displayed.


    Using `UTF-8` character encoding, each Latin alphanumerical character stored in
    a string typically occupies two bytes, that is, 16 bits.


    ## Garbage Collection in C#


    The concept of *garbage collection (GC)* basically refers to automated memory
    management. This mechanism is there to allocate and free RAM as needed by a program;
    programming languages with support for garbage collection free the programmer
    from these tasks. Most modern languages, including C#, support GC out of the box.
    This feature can also be added into languages without native support in the form
    of additional software libraries.


    As a programming project grows, it usually includes more and more variables and
    other data structures which eat up RAM unless properly taken care of. Managing
    these resources can become a bit of a pest for the programmer. Also, compromised
    memory allocation can cause stability issues.


    Now, garbage collection in C# is invoked under the following three scenarios:


    1. Your computer is running low on physical memory. The more RAM your system has,
    the less frequently this is going to take place.

    2. A specific threshold for memory that’s used by allocated objects is surpassed.
    This threshold is updated in real time by the garbage collection components.

    3. A `GC.Collect` method is summoned by the programmer(s). This is rarely necessary
    for smaller projects.


    ## Native vs. Managed Heap


    The *native heap* is dynamically allocated memory managed by the operating system.
    Native heap memory is allocated and de-allocated on the fly whenever a program
    is executed. The area of memory referred to as the *managed heap* is a different
    entity. Every separate process gets its own managed heap. All threads inside a
    process also share this memory space.'
  raw: '## File vs. FileInfo: What’s the Difference?


    The File and FileInfo classes of C# are quite similar. However, there are reasons
    for why they remain separate entities in the language. The FileInfo class is preferable
    when multiple operations on a file are needed, while File works best for single
    operations. FileInfo also offers a touch more manual control with its byte-sized
    file manipulations.


    The methods inside File are static, whereas those inside FileInfo are instance
    based. Static methods take more arguments, such as full directory paths. In turn,
    under specific scenarios, such as coding for network-based environments, the somewhat
    more arduous File class might actually yield more effective results (see Table
    [7-4](#507458_1_En_7_Chapter.xhtml#Tab4)).


    Table 7-4


    The main differences between File and FileInfo classes in C#


    | File | FileInfo |

    | --- | --- |

    | Uses static methods | Uses instance-based methods |

    | Does not need to be instantiated | Needs to be instantiated |

    | Offers more methods | Offers fewer methods |

    | May offer faster performance under some scenarios, e.g., with network traffic
    | Has finer control over file reading and writing operations |


    To observe some manual control provided by FileInfo, see Listing [7-9](#507458_1_En_7_Chapter.xhtml#PC9).


    ```

    using System;

    using System.IO;

    // Create a new FileInfo object, "fileobj1"

    FileInfo fileobj1 = new FileInfo(@"c:\apress.txt"); // This text-file should contain
    something

    // Open the file for reading: this line works with FileInfo only; not with File

    FileStream filestream1 = fileobj1.Open(FileMode.Open, FileAccess.Read);

    // Create a byte array sharing the length of our filestream

    byte[] bytearray1 = new byte[filestream1.Length];

    // Set variable for a byte-counter and feed the length of our file into it

    int howmanybytes = (int)bytearray1.Length;

    int bytesread = 0;

    // Read our file, a byte at a time using a while-loop

    while (howmanybytes > 0)

    {

    int i = filestream1.Read(bytearray1, bytesread, howmanybytes);

    if (i == 0) break; // Once we have zero bytes left, break loop

    howmanybytes-=i;

    bytesread+=i;

    }

    // Convert bytes into string which uses UTF-8 character encoding

    string string1 = Encoding.UTF8.GetString(bytearray1);

    Console.WriteLine(string1); // Display string

    Listing 7-9

    A listing demonstrating manual control for reading data using FileInfo and FileStream
    classes in C#

    ```


