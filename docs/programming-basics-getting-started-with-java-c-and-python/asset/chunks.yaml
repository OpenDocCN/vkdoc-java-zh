- fmt: '# Compiling and Interpreting Code


    Computers can’t execute any programming languages right off the bat. For example,
    Java and Python are both so-called interpreted languages. This means every line
    in a listing is “interpreted” into machine code in real time, step by step, as
    it happens. The process of interpretation tends to show in programs as slower
    execution speed compared to the other type of languages: the compiled variety.


    Listings in compiled languages need to undergo a process called (you guessed it)
    compiling before being able to run. This refers to the translation of a program’s
    full source code into machine language prior to its execution. Thankfully the
    compiling process is automated, so you don’t need any programmer-to-machine code
    translation booklets. It’s a function of any good coding development environment.
    See Table [2-1](#507458_1_En_2_Chapter.xhtml#Tab1) for a rundown for the main
    differences between compiled and interpreted programming languages.


    **Table 2-1** The main differences between compiled and interpreted languages


    | | Compiled language | Interpreted language |

    | --- | --- | --- |

    | Examples | `C#`, `C++`, `C` | `Java`, `Python`, `JavaScript` |

    | Main differences | • Entire code listing is translated into machine code (i.e.,
    compiled) prior to execution<br>• Compilation time slows down development<br>•
    Builds faster software<br>• Platform specific (Windows, macOS, Linux, etc.) |
    • Code is translated into machine code one step at a time in real time<br>• Quick
    to prototype<br>• Builds slower software<br>• Platform independent, near universal
    compatibility<br>• Great for online apps |


    # The Magic of Variables


    Variables are a form of temporary storage, available for the user of a program
    during the time they spend at a piece of software. Variables typically use the
    random access memory (RAM) in your device. This means if you switch off the power
    on your device, the data stored in variables disappears, unless it’s saved to
    a storage device like a hard disk first.


    A variable might be used to store the name of the player in a game, to name but
    one rudimentary usage scenario. From a programmer’s point of view, variables are
    used and reused throughout a program. They can have multiple operations applied
    on them, from basic arithmetic to complicated mathematical formulations.


    There are numerous types of variables in each programming language. In fact, there
    are separate variable types for strings of text, single alphanumerical characters,
    and different ranges of numeric values. But why make these distinctions? Well,
    sometimes all you need to store is a single character, say, the letter “B.” It
    would be a waste of a computer’s memory to reserve a type of variable space meant
    for 19-digit numeric values in the aforementioned scenario, hence the several
    varieties of variable types in most programming languages.


    Many programming languages do not feature universal variables which can store
    any type of information. In most cases, the programmer needs to define variable
    declarations before use.


    Computers aren’t great with guessing. Most programming languages would make a
    clear distinction between the strings `happy_variable` and `Happy_Variable`. If
    a listing isn’t working, it’s possible there are simply some issues with capitalization.


    # Variables in Python


    Python has six core types of data types: numbers, strings, lists, tuples, sets,
    and dictionaries. Unlike Java and C#, in Python variables don’t often require
    type declarations. You simply assign a value and its type is set automatically.
    See Table [2-2](#507458_1_En_2_Chapter.xhtml#Tab2) for a rundown on these data
    types.


    **Table 2-2** The six main data types in Python


    | Data type | Description | Example definitions |

    | --- | --- | --- |

    | Number | Numbers in Python include integers (whole numbers), floating points,
    and complex numbers. Calculations can be done at the time of creating definitions
    | `pie_diameter = 21`<br>`LuckyNumber = 5 + 1`<br>`Donut_Diameter = 6.26 + 0.11`
    |

    | String | Strings are contiguous sets of alphanumerical characters. Both single
    and double quotes are accepted in their definitions | `name = ''Sir Reginald of
    Sodbury''`<br>`nickname = "Reg"`<br>`Color = "Purple"` |

    | List | A list consists of values/variables of any type. Enclosed in square brackets,
    lists take single quotes with string values | `jolly_list = [ 1, 2, 3, 4, 5 ]`<br>`happy_list
    = [ ''Hello'', 123, ''Orange'' ]` |

    | Tuple | Unlike lists, tuples are read-only and cannot be updated on the fly.
    Tuples are enclosed with parentheses | `decent_tuple = ( 1, 2, 3 )`<br>`amazing_tuple
    = ( 1.12, "Ok", 456.5 )` |

    | Set | A set is a collection of unordered values initialized using curly brackets.
    In sets, duplicate values are discarded | `Fine_Animals = { ''Cat'', ''Bat'',
    ''Bat'', ''Bird'' }`<br>`three_great_numbers = { 1, 2, 3, 3, 3 }` |

    | Dictionary | Dictionaries are unordered key-value pairs, enclosed by curly brackets
    | `Friends = { ''name'': ''Yolanda'', ''age'': 25 }`<br>`cars = { ''make'': ''Pinto'',
    ''safety-level'': ''great'' }` |


    # Trying Out Python


    You don’t actually need to install any specific software to try out some basics
    of Python, C#, and Java programming. There are great online programming environments
    for experimentation in these languages. Now would be a great time to visit some
    of these services and frolic with Python’s variables, for one. Try these out and
    stick to the one you like best:


    * **Programiz Python Online Compiler**: [`www.programiz.com/python-programming/online-compiler`](http://www.programiz.com/python-programming/online-compiler)

    * **Online GDB Python Compiler**: [`www.onlinegdb.com/online_python_compiler`](http://www.onlinegdb.com/online_python_compiler)

    * **Repl.it Python Compiler**: [`https://repl.it/languages/python3`](https://repl.it/languages/python3)


    Ready to compile your first lines of Python? Fire up one of the online compilers
    and type Listing [2-1](#507458_1_En_2_Chapter.xhtml#PC1) into the programming
    space. Be prepared to remove the “hello world” listing, which is probably there
    by default. When you’re done typing, click Run or Execute in the compiler interface
    to see the results.


    ```

    Fine_Animals = { ''Cat'', ''Bat'', ''Bat'', ''Bird'' }

    print("My favorite beasts:", Fine_Animals)

    ```


    **Listing 2-1** Notice how text (i.e., “My favorite beasts”) can be displayed
    next to a variable using a comma in Python


    In Listing [2-1](#507458_1_En_2_Chapter.xhtml#PC1), we first define a variable,
    `Fine_Animals`, which is a suitable name for our purposes. We then continue to
    use the `print` command to output its contents. This output should say `My favorite
    beasts: {''Bat'', ''Cat'', ''Bird''}` (perhaps in varying order). What happened
    to the second “bat”? It disappeared, because we defined a Python set data structure
    (familiar from Table [2-2](#507458_1_En_2_Chapter.xhtml#Tab2)) in which duplicate
    entries are not allowed.


    **Table 2-3** Some explicit typecasting functions in Python


    | Typecast | Function call | Example of use |

    | --- | --- | --- |

    | Any type → integer | `int()` | `phone_number="5551234"`<br>`new_variable=int(phone_number)`<br>`print(new_variable)`
    |

    | Any type → floating point | `float()` | `wholenumber=522`<br>`floatnumber=float(wholenumber)`<br>`print(floatnumber)`
    |

    | Integer or float → string | `str()` | `float_variable=float(2.15)`<br>`string_variable=str(float_variable)`<br>`print(string_variable)`
    |

    | String → list | `list()` | `greeting="Hello"`<br>`a_list=list(greeting)`<br>`print(a_list)`
    |

    | String → set | `set()` | `fruit="Banana"`<br>`a_set=set(fruit)`<br>`print(a_set)`
    |'
