    ## 编译与解释代码


    计算机无法直接执行任何编程语言。例如，Java 和 Python 都属于所谓的解释型语言。这意味着代码清单中的每一行都会在运行时被实时、逐步地“解释”成机器码。与另一种语言类型（编译型语言）相比，解释过程通常会导致程序执行速度较慢。


    *编译型语言*的代码清单在运行之前需要经历一个（你猜对了）称为*编译*的过程。这指的是在程序执行之前，将其完整源代码翻译成机器语言。幸运的是，编译过程是自动化的，所以你不需要任何程序员到机器码的翻译手册。这是任何优秀编码开发环境的功能。关于编译型与解释型编程语言的主要区别，请参见表
    2-1。


    表 2-1


    编译型语言与解释型语言的主要区别


    |   | 编译型语言 | 解释型语言 |

    | --- | --- | --- |

    | 示例 | *C#、C++、C* | *Java、Python、JavaScript* |

    | 主要区别 | • 整个代码清单在执行前被翻译成机器码（即编译）• 编译时间拖慢开发进度• 构建出更快的软件• 平台特定（Windows、macOS、Linux
    等） | • 代码在运行时逐步实时翻译成机器码• 快速原型开发• 构建出较慢的软件• 平台无关，近乎通用兼容• 非常适合在线应用 |


    ## 变量的魔力


    变量是一种临时存储形式，供程序用户在操作软件期间使用。变量通常使用设备中的*随机存取存储器（RAM）*。这意味着如果你关闭设备电源，存储在变量中的数据就会消失，除非它先被保存到硬盘等存储设备中。


    举一个基本的使用场景，变量可用于存储游戏中玩家的名字。从程序员的角度来看，变量在整个程序中被反复使用。可以对它们应用多种操作，从基本算术到复杂的数学公式。


    每种编程语言中都有多种类型的变量。事实上，有用于文本字符串、单个字母数字字符以及不同数值范围的独立变量类型。但为什么要做这些区分呢？嗯，有时你只需要存储一个字符，比如字母“B”。在上述场景中，如果为原本用于存储
    19 位数值的变量类型预留空间，那将是对计算机内存的浪费，因此大多数编程语言中才有了多种变量类型。


    许多编程语言并不具备可以存储任何类型信息的通用变量。在大多数情况下，程序员需要在使用前定义*变量声明*。


    计算机不擅长猜测。大多数编程语言会明确区分字符串 *happy_variable* 和 *Happy_Variable*。如果代码清单无法运行，很可能只是大小写方面的问题。


    ## Python 中的变量


    Python 有六种核心数据类型：*数字*、*字符串*、*列表*、*元组*、*集合*和*字典*。与 Java 和 C# 不同，在 Python 中变量通常不需要类型声明。你只需赋值，其类型就会自动设置。关于这些数据类型的概述，请参见表
    2-2。


    表 2-2


    Python 中的六种主要数据类型


    | 数据类型 | 描述 | 示例定义 |

    | --- | --- | --- |

    | *数字* | Python 中的数字包括整数、浮点数和复数。可以在创建定义时进行计算 | pie_diameter = 21LuckyNumber =
    5 + 1Donut_Diameter = 6.26 + 0.11 |

    | *字符串* | 字符串是连续的字母数字字符集。其定义中接受单引号和双引号 | name = ‘Sir Reginald of Sodbury’nickname
    = “Reg”Color = “Purple” |

    | *列表* | 列表由任意类型的值/变量组成。列表用方括号括起来，字符串值使用单引号 | jolly_list = [ 1, 2, 3, 4, 5 ]happy_list
    = [ ‘Hello’, 123, ‘Orange’ ] |

    | *元组* | 与列表不同，元组是只读的，不能动态更新。元组用圆括号括起来 | decent_tuple = ( 1, 2, 3 )amazing_tuple
    = ( 1.12, “Ok,” 456.5 ) |

    | *集合* | 集合是使用花括号初始化的无序值集合。在集合中，重复值会被丢弃 | Fine_Animals = { ‘Cat’, ‘Bat’, ‘Bat’,
    ‘Bird’ }three_great_numbers = { 1, 2, 3, 3, 3 } |

    | *字典* | 字典是无序的键值对，用花括号括起来 | Friends = { ‘name’: ‘Yolanda’, ‘age’: 25 }cars =
    { ‘make’: ‘Pinto’, ‘safety-level’: ‘great’ } |


    ## 尝试使用 Python


    你实际上不需要安装任何特定软件来尝试 Python、C# 和 Java 编程的一些基础知识。有一些很棒的在线编程环境可以用于这些语言的实验。现在正是访问其中一些服务并尝试使用
    Python 变量的好时机。试试下面这些，并坚持使用你最喜欢的一个：


    *   **Programiz Python 在线编译器**：[`www.programiz.com/python-programming/online-compiler`](http://www.programiz.com/python-programming/online-compiler)


    *   **Online GDB Python 编译器**：[`www.onlinegdb.com/online_python_compiler`](http://www.onlinegdb.com/online_python_compiler)


    *   **Repl.it Python 编译器**：[`https://repl.it/languages/python3`](https://repl.it/languages/python3)


    准备好编译你的第一行 Python 代码了吗？启动其中一个在线编译器，并将清单 2-1 输入到编程区域。准备好删除可能默认存在的“hello world”代码清单。输入完成后，点击编译器界面中的
    *Run* 或 *Execute* 来查看结果。


    ```

    Fine_Animals = { ''Cat'', ''Bat'', ''Bat'', ''Bird'' }

    print("My favorite beasts:", Fine_Animals)

    清单 2-1

    注意在 Python 中，如何使用逗号将文本（即“My favorite beasts”）与变量一起显示

    ```


    在清单 2-1 中，我们首先定义了一个变量 *Fine_Animals*，这对我们的目的来说是一个合适的名称。然后我们继续使用 print 命令来输出其内容。输出结果应该是
    *My favorite beasts: {‘Bat’, ‘Cat’, ‘Bird’}*（顺序可能不同）*。* 第二个“bat”发生了什么？它消失了，因为我们定义了一个
    Python 集合数据结构（从表 2-2 中可知），其中不允许有重复条目。


    表 2-3


    Python 中一些显式类型转换函数


    | 类型转换 | 函数调用 | 使用示例 |

    | --- | --- | --- |

    | 任意类型 → 整数 | *int( )* | `phone_number="5551234"``new_variable=`**int(phone_number)**`print(new_variable)`
    |

    | 任意类型 → 浮点数 | *float( )* | `wholenumber=522``floatnumber=`**float(wholenumber)**`print(floatnumber)`
    |

    | 整数或浮点数 → 字符串 | *str( )* | `float_variable=float(2.15)``string_variable=`**str(float_variable)**`print(string_variable)`
    |

    | 字符串 → 列表 | *list( )* | `greeting="Hello"``a_list=`**list(greeting)**`print(a_list)`
    |

    | 字符串 → 集合 | *set( )* | `fruit="Banana"``a_set=`**set(fruit)**`print(a_set)` |

