    # Chapter 3 Setting Up YoUr Development environment


    ## Creating a GitHub Repository


    In this section, you learn how to create a GitHub repository for your project.


    1. Log in to your GitHub account and click the `+` icon at the top-right corner
    of the page.


    2. On the next page, click New Repository.


    3. On the Create a New Repository page, enter the following details (see Figure
    [3-3](#index_split_001.html#p82) for reference):


    - `Owner`: Ensure you select your GitHub username. This should be selected by
    default.

    - `Repository name`: Choose `cloud-native-app` in this case.

    - `Description (optional)`: A Java-based cloud-native application development
    project.

    - `Public/private`: Choose `Public` if you want anyone on the Internet to see
    this repository.

    - `Initialize this repository with`: Select the Add a README file checkbox. It''s
    good practice to add a `README` file to your project repositories. This file contains
    information about the project, such as what the project is about, how to set it
    up, and so on.

    - `Add .gitignore`: Choose `Java` for the `.gitignore` template.

    - `License`: `None`.


    ![](index-82_1.png)


    *Figure 3-3. The Create Repository page in GitHub*


    4. Click the Create Repository button. Your GitHub repository for the project
    should now be complete.


    ## Pushing Code to a GitHub Repository


    In this section, you learn how to push your project code to a GitHub repository.


    1. Open a terminal window and change the current working directory to the location
    of your project.


    2. Initialize the local directory as a Git repository by running the following
    command:


    ```bash

    git init

    ```


    3. Add all the files in the project to the Git repository by running the following
    command:


    ```bash

    git add .

    ```


    This `git` command adds all files in the current directory to the Git repository.
    This is useful for tracking changes to the codebase and for collaborating with
    other developers.


    4. Commit these changes to the Git repository by running the following command:


    ```bash

    git commit -m "Initial commit"

    ```


    The `git commit` command is used to save changes to a local repository. The `-m`
    option specifies a commit message. In this case, the message is `Initial commit`.
    This command will create a new commit with the specified message and add it to
    the current branch.


    5. Add the GitHub repository as a remote to the local Git repository by running
    the following command:


    ```bash

    git remote add origin https://github.com/<your-github-username>/<project-name>.git

    ```


    The `git remote add` command adds a new remote repository as a source for your
    local repository. In this case, you are adding the project hosted on GitHub as
    the `origin` for your local repository. Replace the `<your-github-username>` and
    `<project-name>` variables with your actual GitHub username and project name.


    6. Push the changes to the GitHub repository by running the following command:


    ```bash

    git push -u origin <branch-name>

    ```


    This `git` command is used to push your code to the server. The `-u` option is
    used to set the upstream repository, which is the remote repository your local
    repository will be pushing to. The `origin` is the name of the remote repository;
    replace `<branch-name>` with the name of the branch that you want to push your
    code into, such as `master`.


    You should see the following output:


    ```text

    Enumerating objects: 40, done.

    Counting objects: 100% (40/40), done.

    Delta compression using up to 8 threads

    Compressing objects: 100% (31/31), done.

    ```'
