    **引言**


    云原生应用因其诸多优势而日益流行，例如可扩展性、灵活性和高效性。云原生应用被设计为充分利用云计算范式。这意味着它们是分布式的、可扩展的、具备韧性的并且具有弹性的。你可以在公有云、私有云或混合云上运行它们。要构建云原生应用，开发者必须使用合适的工具和技术。


    企业 Java（或 Jakarta Enterprise Edition）是云原生应用的一个流行平台。它提供了一套标准和 API，帮助开发者构建企业级应用。包括
    Red Hat、IBM 和 Oracle 在内的许多平台厂商都支持这一标准。它提供了许多特性，使其成为开发云原生应用的理想选择。


    MicroProfile 倡议于 2016 年由 Red Hat、IBM、Tomitribe 和 Payara 发起。


    该组织旨在通过提供一个可由多个运行时实现的基础平台定义，改善微服务环境中的应用开发者体验。该组织于 2016 年 6 月发布了首个 MicroProfile
    规范版本。该规范包含一组面向应用开发者的 API，包括 RESTful Web 服务、上下文与依赖注入，以及 JSON 处理。


    MicroProfile 是一组规范，定义了开发者如何使用 Jakarta


    EE 来构建微服务。它还提供了一个帮助开发者创建云原生应用的平台。MicroProfile 正在使其规范与 Jakarta EE 平台保持一致。MicroProfile
    组织的目标是创建一套标准，使开发者能够在 Jakarta EE 平台之上开发微服务。作为 Jakarta EE 项目归属机构的 Eclipse Foundation，也负责管理
    MicroProfile 标准的制定。


    MicroProfile 是一个 Jakarta EE 工作组。它的创建是为了回应微服务的流行趋势。它也满足了对微服务开发标准平台的需求。它最初由少数几家
    Jakarta EE 厂商组成（IBM、Red Hat、Payara 和 Tomitribe），现已发展到包含 25 家以上成员，包括 Oracle、Microsoft、Hazelcast
