    **Registering a ConfigSource**


    Once you have implemented a ConfigSource, you need to register it with the Config


    API. You can do this by creating a file called org.eclipse.microprofile.config.spi.


    ConfigSource in the META-INF/services directory of your application. This file
    contains the fully qualified class name of your ConfigSource.


    **Accessing Configuration Data**


    Once your ConfigSource is registered, you can access the configuration data:


    import org.eclipse.microprofile.config.Config;


    public class MyApplication {


    // ...


    public void doSomething() {


    Config config = ConfigProvider.getConfig();


    String myProp = config.getValue("my.prop", String.class);


    }


    }


    This example uses the getValue() method to retrieve a property from ConfigSource.


    The first argument is the name of the property, and the second argument is the
    type that you want the property to be converted to. If the property does not exist,
    the default value (null in this case) will be returned. ConfigSources are hierarchical,
    which means that you can override properties from one ConfigSource with another
    ConfigSource. For


    example, you could create a ConfigSource that reads configuration data from a
    file and another ConfigSource that reads configuration data from system properties.
    The system properties would take precedence over the file-based ConfigSource,
    which would take


    precedence over the default ConfigSource.


    Chapter 6 the eClipse MiCroprofile fraMework


    **Accessing Configuration Metadata**


    In addition to injecting configuration values into an application, the Config
    API also provides a way to access metadata about configuration properties. The
    Config interface uses the getProperty(String propertyName) method to access this
    metadata. It


    returns information about the given property. If the property is not found, this
    method returns null.


    **Specifying Default Values for the Config Property**


    You can also specify a default value to use if the property does not exist:


    import org.eclipse.microprofile.config.inject.ConfigProperty;


    public class MyApplication {


    @Inject


    @ConfigProperty(name="my.prop", defaultValue="foo")


    private String myProp;


    }


    In this example, the "foo" default value will be used if the my.prop property
    does not exist.


    **Type Conversion in a ConfigProperty**


    ConfigProperty also supports type conversion, so you can inject your configuration
    data into fields of any type:


    import org.eclipse.microprofile.config.inject.ConfigProperty;


    public class MyApplication {


    @Inject


    @ConfigProperty(name="my.prop", defaultValue="1234")


    private Integer myProp;


    }


    In this example, the my.prop property will be converted to an integer before it
    is


    injected into the myProp field. If the conversion fails, a org.eclipse.microprofile.


    config.ConversionFailedException will be thrown.


