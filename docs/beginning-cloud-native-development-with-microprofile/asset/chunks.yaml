- fmt: '# Chapter 8: MicroProfile JSON Web Tokens and Jakarta Security


    In this chapter, you learned most of the essential concepts related to the MicroProfile
    framework. In the next chapter, you see how to secure a RESTful web service using
    the JWT propagation feature of MicroProfile.


    This chapter discusses the MicroProfile JSON Web Token specification. It first
    covers an overview of a JWT and then discusses the specifics of the MicroProfile
    implementation.


    Finally, the chapter includes some code examples for how to use JWT in a microservice
    environment.


    ## Security Best Practices for Microservices


    Microservices are all the rage these days. But with more services comes more complexity—and
    with more complexity comes a greater risk of security breaches. So how do you
    go about securing your microservices?


    There are a few basic steps you can take to get started. First, make sure that
    each service is properly authenticated and authorized. Second, use encryption
    to protect sensitive data as it moves between services. Third, employ robust monitoring
    and logging tools to detect and track suspicious activity. And finally, be sure
    to keep your software up-to-date with the latest security patches.


    Following these steps will help you secure your microservices against the most
    common attacks, but it’s important to stay vigilant and always watch for new threats.


    Let''s now look into controlling user and role access to microservices with MicroProfile
    JSON Web Token.


