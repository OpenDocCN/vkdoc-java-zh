- fmt: "# Chapter 6 The Eclipse MicroProfile Framework\n\nThe Eclipse MicroProfile\
    \ (`https://microprofile.io/`) is an standard that provides a modular set of Jakarta\
    \ EE (`https://jakarta.ee/`) and microservices-related features that are suitable\
    \ for application development in a microservices architecture. The goals are to\
    \ optimize Enterprise Java for a microservices architecture, promote the use of\
    \ common standards, and avoid vendor lock-in.\n\nThe Eclipse MicroProfile specification\
    \ addresses the challenges of microservices, such as distributed tracing, health\
    \ checking, and security. It also provides APIs for reactive programming, JSON\
    \ processing, and RESTful web services.\n\nThe MicroProfile project (`https://projects.eclipse.org/projects/technology.microprofile`)\
    \ was started in 2016 by Red Hat, IBM, Payara, Tomitribe, and LJC (London Java\
    \ Community). The project is now run as an open-source project under the Eclipse\
    \ Foundation. MicroProfile is a set of specifications providing a microservices\
    \ framework. It defines several Jakarta EE specifications and APIs to make it\
    \ easier to develop and deploy microservices.\n\n© Tarun Telang 2023  \nT. Telang,\
    \ Beginning Cloud Native Development with MicroProfile, Jakarta EE, and Kubernetes,\
    \ `https://doi.org/10.1007/978-1-4842-8832-0_6`\n\n![](index-163_1.jpg)\n\n##\
    \ Layers of Functionality in MicroProfile\n\nMicroProfile is designed to work\
    \ with Jakarta EE. It has three layers of functionality. The bottom layer includes\
    \ RESTful web services, REST clients, dependency injection, JSON processing, and\
    \ reactive streams operators. The middle layer has features like Open API, config,\
    \ fault tolerance, and security (JWT propagation). The top layer has features\
    \ like metrics, tracing, and health checking. Figure 6-1 depicts these three layers.\n\
    \nFigure 6-1. Three layers of functionality in MicroProfile\n\nOpen Liberty provides\
    \ full support of all three layers of MicroProfile functionality.\n\n### Bottom\
    \ Layer Standards\n\n- **Jakarta Annotations** (`https://jakarta.ee/specifications/annotations/`):\
    \ Open Liberty supports the latest version of Jakarta annotations, which is the\
    \ de facto standard for annotations in Java. The Jakarta Annotations API enables\
    \ you to write type-safe, declarative code.\n- **JSON-P** (`https://jakarta.ee/specifications/jsonp/`):\
    \ The JSON Processing (or JSON-P) APIs provide a portable way to parse and generate\
    \ JSON data. Jakarta JSON Processing is part of the Jakarta EE specification and\
    \ is included in Open Liberty.\n- **JSON-B** (`https://jakarta.ee/specifications/jsonb/`):\
    \ The JSON Binding (JSON-B) APIs provide a standard binding layer for converting\
    \ Java objects to and from JSON documents. Open Liberty provides built-in support\
    \ for Jakarta JSON Binding (JSON-B).\n- **RESTful web services** (`https://jakarta.ee/specifications/restful-ws/`):\
    \ This provides a standard way to write RESTful web services. RESTEasy is a portable\
    \ implementation of this specification included in Open Liberty. You can create\
    \ a REST API using this.\n- **CDI** (`https://jakarta.ee/specifications/cdi/`):\
    \ Contexts and Dependency Injection (CDI) enables you to manage the lifecycle\
    \ of stateful components and inject dependencies into your components.\n- **REST\
    \ Client** (`https://microprofile.io/project/eclipse/microprofile-rest-client`):\
    \ REST Client enables you to write type-safe, declarative code to invoke RESTful\
    \ web services. It provides APIs specification for invoking REST services.\n-\
    \ **Reactive Streams** (`https://microprofile.io/project/eclipse/microprofile-reactive-streams`):\
    \ The Reactive Streams specification provides a standard for asynchronous stream\
    \ processing with non-blocking backpressure. It also provides API specifications\
    \ for working with reactive streams. The `smallrye-reactive-streams` operators\
    \ are a portable implementation of this specification included in Open Liberty.\n\
    \n### Middle Layer Specifications\n\nThe following specifications comprise the\
    \ middle layer of MicroProfile specifications:\n\n- **Config** (`https://microprofile.io/project/eclipse/microprofile-config`):\
    \ The Config layer provides a uniform mechanism for accessing configuration data\
    \ from multiple sources. It provides API specifications for injecting configuration\
    \ properties into applications. This includes properties files, system properties,\
    \ environment variables, and JSON documents.\n- **Open API** (`https://microprofile.io/project/eclipse/microprofile-open-api`):\
    \ The Open API specification enables you to write documentation for your RESTful\
    \ web services in a standard format. This documentation can be used by tools such\
    \ as Swagger UI to generate interactive documentation for your web services.\n\
    - **JWT Propagation** (`https://microprofile.io/project/eclipse/microprofile-jwt-auth`):\
    \ The JWT Propagation specification enables you to propagate security tokens (such\
    \ as JSON Web Tokens) across components in a microservices architecture. It provides\
    \ APIs for authenticating using JSON Web Token.\n- **Fault Tolerance** (`https://microprofile.io/project/eclipse/microprofile-metrics`):\
    \ The Fault Tolerance layer provides APIs and annotations that can be used to\
    \ write fault-tolerant code and handle failures in your cloud-native application\
    \ gracefully. This includes APIs specification for timeouts, retries, circuit\
    \ breakers, and bulkheads.\n\n### Top Layer Specifications\n\nThe following specifications\
    \ comprise the top layer of MicroProfile specifications:\n\n- **Metrics** (`https://microprofile.io/project/eclipse/microprofile-metrics`):\
    \ The Metrics specification provides a standard way to expose performance-related\
    \ data from your application. This data can then be used to monitor your application.\
    \ It also provides APIs for exporting metrics to monitoring systems.\n- **Open\
    \ Tracing** (`https://microprofile.io/project/eclipse/microprofile-opentracing`):\
    \ The Open Tracing specification enables you to trace requests as they flow through\
    \ your microservices architecture. It also provide APIs for tracing requests across\
    \ microservices. This can be useful for debugging and performance analysis.\n\
    - **Health** (`https://microprofile.io/project/eclipse/microprofile-health`)"
