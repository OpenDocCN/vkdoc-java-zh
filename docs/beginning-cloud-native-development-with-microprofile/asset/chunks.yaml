    Chapter 7 MiCroprofile fraMework – part 2


    **Using the MicroProfile OpenAPI Specification**


    The MicroProfile OpenAPI specification provides a set of Java APIs that allow
    developers to define and auto-generate API specifications based on OpenAPI v3
    standards from


    their RESTful web services. These API specifications can then be used to generate


    interactive documentation, client SDKs, and other tools that make it easier for


    developers to consume MicroProfile-based APIs.


    The MicroProfile OpenAPI is part of the Eclipse MicroProfile project and is


    compatible with all major MicroProfile implementations. It is based on the OpenAPI


    Specification (OAS) and uses annotations from the Jakarta RESTful web services


    specification. In particular, the MicroProfile OpenAPI specification defines how
    to


    describe REST APIs that use JSON over HTTP.


    **OpenAPI**


    The OpenAPI Specification, formerly Swagger, is a technical specification for
    describing and documenting the interface between REST APIs and their consumers.
    It allows REST


    API providers to describe and expose their APIs using a format that can be consumed


    by a variety of tools. This facilitates the creation of APIs that are consistent,
    well-documented, and easily consumable by both humans and machines. The specification


    aims to provide a uniform way of describing APIs so that they are both human-readable
    and machine-readable. The OAS3 Specification is a community-driven initiative
    and is used by many large organizations, including Google, Microsoft, and Amazon.


    **Capabilities of the MicroProfile OpenAPI Specification**


    MicroProfile OpenAPI allows developers to easily generate documentation for their


    microservices. The documentation includes information on what services are provided,
    how to invoke them, and what data types are used. In addition, the documentation
    can be used to generate client code that can be used to access the web services.


    **Generating OpenAPI Documents**


    There are multiple ways that you can generate OpenAPI documents. The most common


    way is to use annotations. This only requires augmenting your existing Jakarta
    RESTful web services annotations with OpenAPI annotations.


    Chapter 7 MiCroprofile fraMework – part 2


    You can also use JSON or YAML files. You can start with a predefined model and


    manually update the entire OpenAPI document tree for your web services. However,
    the annotation-based approach is the recommended one, as it is more maintainable
    and


    easier to understand. Finally, you can filter out the resources that you do not
    want to document using configuration.


    **Using the MicroProfile OpenAPI in Your Project**


    To use the MicroProfile OpenAPI in your project, you need to add the following
    Maven coordinates to your project:


    <dependency>


    <groupId>org.eclipse.microprofile.openapi</groupId>


    <artifactId>microprofile-openapi-api</artifactId>


    <version>3.1-RC1</version>


    <type>jar</type>


    </dependency>'
