- fmt: 'because a cloud provider executes serverless applications on demand.


    ## Security Considerations


    Security is always a critical consideration for any application.


    ### Serverless Applications


    By default, serverless applications are secure. Serverless platform providers
    take care of many [security tasks](https://www.traceable.ai/use-cases/api-discovery-and-risk-management),
    such as patching, that you would otherwise have to do yourself. Additionally,
    most FaaS providers offer built-in security features, such as encryption and access
    control.


    However, serverless applications can be vulnerable to dedicated denial-of-service
    (DDoS) attacks. Because your application is running on a provider’s infrastructure,
    a hacker may be able to send many requests to your application at once, overwhelming
    it and taking it down.


    Chapter 5 MiCroserviCes arChiteCture


    You generally use popular frameworks like `Node.js` to create serverless applications,
    which might have some inherent security flaws. If your application is not adequately
    secured, hackers could [compromise it.](https://www.traceable.ai/blog-post/use-the-owasp-api-top-10-to-secure-your-apis)


    ### Container-Based Applications


    You can make container-based applications more secure than serverless applications.


    By running them on dedicated infrastructure, you can better safeguard your application
    than if you use a cloud provider’s infrastructure.


    Additionally, because containers are self-contained, it’s usually more difficult
    for hackers to access the code and data. However, you need to manage the security
    of your containers yourself, which can be difficult if you’re not a security expert.


    If you need a high degree of isolation or scalability, containers may be the right
    choice. However, if you need simplicity and ease of development, serverless may
    be the way to go. Container-based applications offer more flexibility and control
    than serverless but require more management and expertise. But there are also
    some potential downsides to using containers. They require you to manage and configure
    servers, and they can be more challenging to develop than serverless applications.


    ## Microservice Deployment Patterns


    Microservices architectures are the most popular trend in application development.


    They are a great way to develop faster and deliver better solutions for your customers
    and users. Deploying microservices is critical for organizations. Microservices
    enable your development team to roll out software solutions more quickly and better
    react to customer needs.


    This is possible because developers can also speed up their development and testing
    cycles, reduce errors, and fix bugs quickly. Although microservice architectures
    provide various benefits, they have some drawbacks due to the additional complexities
    involved.


    ### Key Considerations


    Here are some key considerations related to microservices deployment that any
    organization must understand:


    Chapter 5 MiCroserviCes arChiteCture


    - Having many services, dependencies, and interactions at runtime can make the
    project difficult to manage.

    - Communication among multiple microservices brings more chances of failure. Your
    development teams must be very familiar with distributed systems. They must be
    able to address issues resulting from network latency and load balancing.

    - Your development team also needs the right `DevOps`, networking, and security
    skills to deliver microservices. Your team also has to understand the concepts,
    coding style, and test cases, which might take more time and effort.

    - Upgrades and rollout of microservices requires lots of coordination between
    various engineering teams. In addition, your team must perform complex testing
    over distributed environments. Fortunately, microservices deployment strategies
    can help you overcome these challenges and minimize downtime.


