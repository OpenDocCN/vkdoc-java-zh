    **云计算的演进**


    云计算可以追溯到互联网早期，当时高校和企业的研究人员正在寻找共享资源的方法。这包括共享计算时间、存储和应用程序。他们使用“公用计算（utility computing）”一词来描述这一概念。1989
    年初，蒂姆·伯纳斯-李（Tim Burners-Lee）开发了一个名为万维网（World Wide Web）的项目，使用户能够通过互联网访问信息。这推动了部署在中心服务器上的
