- fmt: '## API Management


    API management is all about designing, building, and managing APIs. An API is
    a set of programming instructions that allow the software to interact with other
    software. APIs are used to expose data and functionality to external developers.
    API management is a critical part of cloud-native application development. It
    allows you to control who has access to your API, as well as how they can use
    it. In addition, API management can help you monitor and troubleshoot your API.
    There are many API management platforms available, such as Apigee, Kong, and Amazon
    API Gateway. You learn more about building and deploying REST APIs later in this
    book.


    ## Security


    This phase is all about ensuring that your application is secure. There are many
    security concerns that you need to be aware of when developing a cloud-native
    application. These include data breaches, application vulnerabilities, and denial
    of service attacks.


    To secure your application, you need to implement security controls at every level.
    This includes the network, host, application, and data levels. In addition, you
    need to deploy security tools, such as firewalls and intrusion detection systems.
    There are many security products and services available, such as AWS Identity
    and Access Management, Azure Active Directory, and Google Cloud Identity.


    ## DevOps Culture Shift


    The cloud-native development requires a shift in culture for many organizations,
    from traditional waterfall development to a more agile DevOps methodology. In
    waterfall development, changes are made in large batches and deployed infrequently.
    This can lead to long development cycles and slow time-to-market. In contrast,
    DevOps is a more agile because it emphasizes collaboration between developers
    and operations teams. Changes are made in small batches and deployed frequently,
    which helps speed up development and improve time-to-market.


    The cloud-native approach also requires changes in the way that apps are designed
    and built. In traditional app development, apps are typically monolithic in structure,
    with all components being tightly coupled. This can make it difficult to scale
    apps and add new features. In contrast, cloud-native apps are designed as microservices,
    with each component being independently deployable. This makes it easier to scale
    apps and add new features. It also requires changes in the way that teams are
    organized. In traditional app development, teams are typically siloed, with each
    team working in isolation. This can lead to delays and errors when teams need
    to coordinate their work. In contrast, cloud-native development teams are more
    cross-functional and collaborate closely with each other. This helps speed up
    development and improve the quality of the code. Overall, the cloud-native approach
    requires a shift in culture, methodology, and technology. It is a big change for
    many organizations, but the benefits are clear. Cloudnative apps are more scalable,
    resilient, and agile than traditional apps. They are also easier to develop and
    deploy.


    ## Observability


    Observability is the practice of monitoring your system in a manner where you
    can detect and diagnose issues as they happen. The goal of observability is to
    provide visibility into all aspects of your system so you can identify and fix
    issues before they cause customer-facing problems. This means not only monitoring
    system health but also tracking changes made to the system, understanding how
    users are interacting with it, and more. To achieve this, you must have a deep
    understanding of both the system and the operating environment.


    It’s essential to understand the difference between observability and monitoring.
    Monitoring is the process of collecting data about the system and using that data
    to generate reports. This data can be used to identify issues, but it can’t be
    used to diagnose problems. Observability, on the other hand, allows you to detect
    and diagnose issues in real-time. This is because observability uses data from
    all levels of the system, not just the application level. There are many ways
    to achieve observability (see Figur[e 2-3](#index_split_000.html#p68)), but some
    of the most common methods include logging, tracing, and metrics.


    - Logging: Logging is the process of collecting and storing information about
    events that have occurred in the system. This data can be used to troubleshoot
    issues or track down problems.

    - Tracing: Tracing is a technique that allows you to follow the path of a request
    as it flows through the system. This can be useful for understanding how the system
    works and for diagnosing problems.

    - Metrics: Metrics are numerical values that can be used to measure various aspects
    of the system. You can use this data to monitor performance and identify trends.


    ![](index-68_1.jpg)


    *Figure 2-3. Methods of achieving observability*


    There are four critical components to observability (see Figure [2-4](#index_split_000.html#p69)).


    - Collecting data: This is typically done through logging, tracing, and metrics.

    - Analyzing data: This involves using tools like dashboards and alerts to surface
    issues.

    - Alerting: This ensures that the right people are notified when an issue arises.

    - Fixing the issue: This is where you use the data you’ve collected to identify
    and fix the underlying problem.


    ![](index-69_1.jpg)


    *Figure 2-4. Components of observability*


    ### Data collection


    The first step to achieving observability is data collection. You need to collect
    data from all the layers of the system, including the application, database, network,
    and infrastructure. There are many ways to collect data. Some of the most common
    methods include logging, tracing, and metrics.


    ### Data analysis


    The next step is data analysis. This is where you use the data you’ve collected
    to make your environment more reliable. For example, you can use data analysis
    for generating dashboards and reports. Dashboards are visual representations of
    the data that can be used to identify trends and issues. Reports are more detailed.
    You can use them to diagnose problems or track progress over time. You can also
    use them to do the following:


    - Identify the root cause of problems. By tracking changes to your systems and
    understanding how users are interacting with them, you can quickly identify the
    root cause of any problems.

    - Detect trends and patterns. By analyzing data over a longer period of time,
    you can detect trends and patterns that may not be visible when looking at data
    in real-time.

    - Improve your monitoring coverage. By understanding which parts of your system
    are most important, you can focus your monitoring efforts on the areas that are
    most likely to cause problems.


    ### Alerting


    The next step is alerting, or sending notifications when problems are detected.
    This is where you ensure that the right people are notified when an issue arises.
    This can be done through email, SMS, or other notification systems. It’s important
    to have a well-defined alerting strategy so that you can quickly identify and
    fix problems.


    ## Best Practices for Observability


    There are several best practices for achieving observability in your organization.


    1. Collect data from all levels of the system—application, database, network,
    and infrastructure.

    2. Use multiple methods of data collection—logging, tracing, and metrics—to get
    the most comprehensive view of the system.

    3. Use short-term and long-term storage for logs. This allows you to keep track
    of events over a longer period of time, making it easier'
