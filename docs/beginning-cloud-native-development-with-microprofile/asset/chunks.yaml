    ## Service Models of Cloud Computing


    As you have now learned about the essential characteristics of cloud computing,
    this section covers the service models of cloud computing. These service models
    are different modes in which cloud services can be delivered. Figure [1-5](#index_split_000.html#p34)
    shows the three most common types of cloud services, which are Infrastructure
    as a Service (`IaaS`), Platform as a Service (`PaaS`), and Software as a Service
    (`SaaS`).


