    \n`mvn liberty:reload`  \nReloads the server and applications with the latest\
    \ changes.\n\n`mvn liberty:run`  \nFirst downloads and installs an Open Liberty\
    \ server runtime to the `target/liberty/wlp` directory in the project, then creates\
    \ a server instance with the required configuration in the `target/liberty/wlp/usr/servers/defaultServer`\
    \ directory. It builds and deploys the project to the Open Liberty server using\
    \ loose config. Finally, it runs the Open Liberty server in the foreground. The\
    \ loose config feature allows you to change the configuration of your Liberty\
    \ server without having to redeploy your application. This can be useful for testing\
    \ different configurations or for troubleshooting problems.\n\n`mvn liberty:start`\
    \  \nStarts the Open Liberty server in the background.\n\n`mvn liberty:stop` \
    \ \nStops the Open Liberty server in the background.\n\n`liberty:undeploy`  \n\
    Undeploys an application from the Open Liberty server.\n\n## Appendix C: Installing\
