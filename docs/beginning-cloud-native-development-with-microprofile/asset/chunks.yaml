    用于打包和运行微服务。与传统虚拟化技术相比，它具备多项优势，包括可移植性、易用性等。


    Kubernetes 是一个用于管理容器化应用的工具。它提供了一个开源平台，用于部署、管理和扩展应用。Kubernetes 基于 Linux 内核，并且可以使用
    Docker 容器来管理应用。它提供了诸如扩缩容、负载均衡和自愈等特性。


    Kubernetes 可自动化容器化应用的部署、扩缩和管理。它通过将容器分组为逻辑单元，支持对应用进行便捷管理与发现。Kubernetes 构建于 Google
    数十年大规模运行生产工作负载的经验之上，同时也吸收了社区中最佳的理念和实践。


    Kubernetes 具有可移植性和可扩展性，可在任何地方运行——从你的笔记本电脑到公有云再到数据中心。Kubernetes 的简洁性与灵活性使其成为云原生应用的理想选择。此外，它还是开源软件，让你能够受益于社区创新。


    Kubernetes 已为生产环境做好准备，具备强大特性和能力来编排你的容器化应用。Kubernetes 已经在大规模场景中经过实战检验，支撑着全球一些最大的网站运行。


    在本书中，你将学习如何使用 MicroProfile 和 Jakarta EE 技术开发微服务，将其部署到 Kubernetes/Docker 上，并创建云原生应用。本书还涵盖了使用
    MicroProfile 和 Jakarta EE 开发云原生应用的最佳实践。它首先会介绍云原生应用的不同方面。随后你将继续进行开发环境搭建，并学习 Jakarta
    EE 基础。接下来，本书将探讨 MicroProfile 的功能，你将学习如何使用这些功能来构建微服务。


    xx


    引言


    随后你将学习 Docker 和 Kubernetes，以及如何使用它们来部署你的应用。最后，你将把所有内容整合起来，学习如何构建一个完整的云原生应用。


    **本书适合谁阅读**


    欢迎阅读 *Beginning Cloud Native Development with MicroProfile, Jakarta EE, and* *Kubernetes.*


    本书面向希望学习如何使用 MicroProfile 和 Jakarta EE 开发云原生应用的 Java 开发者。不要求你具备 Kubernetes 或容器编排的先验知识。


    在本书中，你将学习如何使用 MicroProfile 和 Jakarta EE 开发云原生应用，并将其部署到 Kubernetes。书中涵盖的主题包括编写
    RESTful Web 服务、创建微服务、配置健康检查等。


    通过阅读本书，你最终将能够使用 MicroProfile 和 Jakarta EE 开发云原生应用，并将其部署到 Kubernetes。


    **本书结构**


    本书涵盖四个主要主题。


    • **云原生开发** 介绍云原生开发的概念以及十二要素应用方法论。你将了解开发云原生应用的优势，以及将现有应用迁移到云端时必须考虑的挑战。


    • **MicroProfile 规范** 概述 MicroProfile 各项规范，以及如何使用它们开发微服务。你将了解可用的不同类型注解，以及如何用它们创建
    RESTful Web 服务。


    • **Jakarta EE 规范** 介绍 Jakarta EE 平台及其各种规范。你将了解 Java EE 与 Jakarta EE 之间的差异，以及该平台提供的新特性。


    xxi


    引言


    • **Kubernetes** 讲解使用 Kubernetes 进行容器编排的基础知识。你将了解 Kubernetes 集群中创建的不同类型对象、如何将应用部署到
    Kubernetes，以及如何使用 Kubernetes 对应用进行扩缩容。


