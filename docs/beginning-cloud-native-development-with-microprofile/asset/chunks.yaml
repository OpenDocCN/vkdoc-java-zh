    of product.


    The updateProduct method updates an existing product. It takes the PutProduct


    object, which contains the product ID and authorization string, and the Product
    object, which contains the updated product information.


    The @RestClient annotation is used to mark a field or method as a MicroProfile


    REST client. Injecting a REST client is similar to injecting any other CDI bean,
    for example:


