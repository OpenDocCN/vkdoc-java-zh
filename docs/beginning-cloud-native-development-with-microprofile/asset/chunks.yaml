- fmt: "默认情况下，Jakarta RESTful Web Service 资源中的所有方法都会被追踪。你可以使用`@Traced(false)`注解来排除某些方法不被追踪。\n\
    \n## Explicitly Enabling OpenTracing\n\n要为非 Jakarta RESTful Web Service 方法启用追踪，你需要在方法上添加`@Traced`注解。示例如下：\n\
    \n```java\n@Traced(value = true, operationName = \"MyApplication.someMethod\"\
    )\npublic void someMethod() {\n    // ...\n}\n```\n\n`operationName=<Span name>`参数用于指定\
    \ span 的名称。\n\n## Injecting a Custom Tracer Object\n\n底层的 OpenTracing `Tracer`对象可以通过\
    \ CDI，使用`@Inject`注解注入到 Jakarta RESTful Web Service 资源类中。\n\n```java\npublic class\
    \ MyApplication {\n\n    @Inject\n    private Tracer tracer;\n\n    public void\
    \ someMethod() {\n        // ... do something with the tracer\n    }\n}\n```\n\
    \n之后，你可以通过创建 spans 来对代码进行埋点。例如，对某个方法进行埋点可如下实现：\n\n```java\npublic class MyApplication\
    \ {\n\n    private Tracer tracer;\n\n    public void someMethod() {\n        Span\
    \ span = tracer.buildSpan(\"someOperation\").start();\n        try (Scope scope\
    \ = tracer.scopeManager().activate(span)) {\n            // ... do something here\n\
    \        } finally {\n            span.finish();\n        }\n    }\n}\n```\n\n\
    `finish()`方法在`finally`代码块中调用，以确保即使抛出异常，span 也总能完成。它会设置 span 的状态和结束时间。\n\n你还可以通过`span.log()`方法为\
    \ span 添加运行期间发生事件的信息。\n\n你也可以通过`span.setTag()`方法为 span 添加标签：\n\n```java\npublic\
    \ class MyApplication {\n\n    private Tracer tracer;\n\n    public void someMethod()\
    \ {\n        Span span = tracer.buildSpan(\"someOperation\").start();\n      \
    \  try (Scope scope = tracer.scopeManager().activate(span)) {\n            //\
    \ ... do something here\n            span.log(\"something happened here\");\n\
    \            span.setTag(\"operationType\", \"read\");\n            // ... do\
    \ something here\n        } finally {\n            span.finish();\n        }\n\
    \    }\n}\n```\n\n更多信息请参考 MicroProfile OpenTracing 规范：  \n`https://download.eclipse.org/microprofile/microprofile-opentracing-3.0/microprofile-opentracing-spec-3.0.html`\n\
    \n## Using the Jakarta RESTful Web Service\n\nWeb Service 如今非常流行，因为它们支持构建解耦系统，使服务之间可以在不了解彼此实现细节的情况下通信。\n\
    \n设计和实现 Web Service 的方式有很多，其中一种流行方式是使用 REST（Representational State Transfer）架构。\n\
    \nJakarta RESTful Web Service 使用的就是 REST 架构。这类 Web Service 便于构建现代化、可扩展的 Web 应用。REST\
    \ 架构基于这样一个原则：所有数据和功能都应通过统一接口访问。这使得 Web 应用的开发、测试和部署更容易。\n\n例如，假设你有一个产品目录，希望将其作为\
    \ Web Service 提供。使用 REST 时，你会创建一个表示目录资源（产品）的 URL。当客户端（例如浏览器）请求该 URL 时，服务器会返回 JSON\
    \ 格式的产品列表。\n\n让我们创建这个简单的 RESTful Web Service。要使用 Jakarta RESTful Web Services\
    \ API，你需要在项目中添加以下 Maven 依赖：\n\n```xml\n<!-- https://mvnrepository.com/artifact/jakarta.ws.rs/jakarta.ws.rs-api\
    \ -->\n<dependency>\n    <groupId>jakarta.ws.rs</groupId>\n    <artifactId>jakarta.ws.rs-api</artifactId>\n\
    \    <version>3.1.0</version>\n</dependency>\n```\n\n现在将`Product`类定义为一个 POJO：\n\
    \n```java\npublic class Product {\n\n    private int id;\n    private String name;\n\
    \n    public String getName() {\n        return name;\n    }\n\n    public int\
    \ getId() {\n        return id;\n    }\n\n    public Product(int id, String name)\
    \ {\n        this.id = id;\n        this.name = name;\n    }\n}\n```"
  raw: 'By default, all the methods in a Jakarta RESTful web service resources are
    traced. You can use the @Traced(false) annotation to exclude certain methods from
    being traced.


    **Explicitly Enabling OpenTracing**


    To enable tracing for non-Jakarta RESTful web service methods, you need to add
    the @


    Traced annotation to the method. Here is the code snippet for the same:


    @Traced (value = true, operationName = “MyApplication.someMethod”)


    public void someMethod() {


    // ...


    }


    Chapter 7 MiCroprofile fraMework – part 2


    The operationName=<Span name> parameter specifies the name of the span.


    **Injecting a Custom Tracer Object**


    The underlying OpenTracing Tracer object can be injected into a Jakarta RESTful
    web


    service resource class using the @Inject annotation via CDI.


    public class MyApplication {


    @Inject


    private Tracer tracer;


    public void someMethod() {


    // ... do something with the tracer


    }


    }


    After that, you can start to instrument your code by creating spans. For example,
    to instrument a method, do the following:


    public class MyApplication {


    private Tracer tracer;


    public void someMethod() {


    Span span = tracer.buildSpan("someOperation").start();


    try (Scope scope = tracer.scopeManager().activate(span)){


    // ... do something here


    } finally {


    span.finish();


    }


    }


    }


    The finish() method is called in a finally block to ensure that the span is always


    completed, even if an exception is thrown. It sets the status and end time of
    the span.


    Logs can be used to add information about events that happen during the span,
    by


    using the span.log() method.


    Chapter 7 MiCroprofile fraMework – part 2


    You can also add tags to the span by using the tracer.setTag() method:


    public class MyApplication {


    private Tracer tracer;


    public void someMethod() {


    Span span = tracer.buildSpan("someOperation").start();


    try (Scope scope = tracer.scopeManager().activate(span)){


    // ... do something here


    span.log("something happened here");


    span.setTag("operationType", "read");


    // ... do something here


    } finally {


    span.finish();


    }


    }


    }


    For more information, refer to the MicroProfile OpenTracing specification


    ([https://download.eclipse.org/microprofile/microprofile-opentracing-3.0/](https://download.eclipse.org/microprofile/microprofile-opentracing-3.0/microprofile-opentracing-spec-3.0.html)


    [microprofile-opentracing-spec-3.0.html).](https://download.eclipse.org/microprofile/microprofile-opentracing-3.0/microprofile-opentracing-spec-3.0.html)


    **Using the Jakarta RESTful Web Service**


    Web services are very popular nowadays because they allow for building decoupled


    systems, whereby services can communicate with each other without the knowledge
    of


    each other’s implementation details.


    There are many ways to design and implement web services. One popular way is to


    use the Representational State Transfer (REST) architecture.


    A Jakarta RESTful web service uses the REST architecture. This type of web service


    makes it easy to build modern, scalable web applications. The REST architecture
    is


    based on the principle that all data and functionality should be accessed through
    a


    uniform interface. This makes it easy to develop, test, and deploy web applications.


    Chapter 7 MiCroprofile fraMework – part 2


    For example, let’s say you have a product catalog that you want to make available
    as a web service. With REST, you create an URL that represents the resources (products)
    in your catalog. When a client (such as a web browser) requests this URL, the
    server will return a list of products in JSON format.


    Let’s create this simple RESTful web service. To use Jakarta RESTful web services


    APIs, you need to add the following Maven dependency to your project:


    <!-- https://mvnrepository.com/artifact/jakarta.ws.rs/jakarta.ws.rs-api -->


    <dependency>


    <groupId>jakarta.ws.rs</groupId>


    <artifactId>jakarta.ws.rs-api</artifactId>


    <version>3.1.0</version>


    </dependency>


    Now define the Product class as a POJO:


    public class Product {


    private int id;


    private String name;


    public String getName() {


    return name;


    }


    public int getId() {


    return id;


    }


    public Product(int id, String name) {


    this.id = id;


    this.name = name;


    }


    }'
