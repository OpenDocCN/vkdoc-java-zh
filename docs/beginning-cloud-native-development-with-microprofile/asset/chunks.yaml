    deployments and allows you to modify microservices.


    The following subsections list the microservice deployment patterns that help


    improve microservices availability.


    **Canary Deployment**


    This is a well-known strategy in microservices deployment. A *canary* is a candidate
    version of microservices that get a small percentage of traffic.


    This includes releasing the microservice with the new version to only a small


    percentage of load first and seeing if it works as expected. As the microservice
    passes through rigorous testing, it gradually encounters larger workloads. If
    canaries aren’t functioning correctly, traffic may be routed to a stable version
    while the problem is investigated and debugged. Canary rollback is the process
    of rolling back microservices regularly.


    Chapter 5 MiCroserviCes arChiteCture


    The canary deployment strategy releases only one microservice at a time.


    Microservices with higher criticality and risks involved can be made available
    before others. It improves availability by detecting problems early, before a
    critical microservice is exposed to the entire system.


    **Pitfalls of Canary Deployment**


    The biggest potential pitfall with this approach is that it might release microservices
    too early. Canary releases are usually smaller microservices with limited traffic.
    Frequent issues during deployments can also slow down development.


    **Blue-Green Deployment**


    The blue-green deployment strategy involves maintaining two microservice variations


    simultaneously in production. One microservice version (the blue microservice)
    is


    visible to the user and gets traffic. The other one (the green microservice) remains
    idle for developers to make updates. A microservice remains in a blue state until
    it passes tests and is ready to go out. After passing all tests, microservices
    move to the green state, where they get traffic and are visible to users. However,
    microservices are constantly being monitored to detect if the microservice is
    performing well or needs to revert back to the blue state.


    Blue-green deployment can improve availability by keeping the microservices


    available during development and deployment. There’s no downtime during


    development and deployment because there’s always another stable variation serving


    production traffic. In addition, if the new deployment isn’t working correctly,
    you can quickly roll back to the previous variation (i.e., the blue microservice).


    **Pitfalls of the Blue-Green Deployment Strategy**


    The possibility of microservice version mismatch is a potential pitfall with blue-green
    deployment. Another pitfall is that microservices need constant monitoring to
    detect issues. This leads to increased costs and time.


    **Dark Launching**


    A dark launch is a technique that deploys updates to microservices catering to
    a small percentage of the user base. It does not affect the entire system. When
    you dark launch a new feature, you initially hide it from most end-users. The
    launch audience can vary 140


    Chapter 5 MiCroserviCes arChiteCture


    depending on use case and business requirements. The process of dark launching


    involves building a new version of the microservices in an environment that’s
    separate from the production environment.


    Once the feature has been tested, you deploy it in a pre-production or test


    environment, and gradually increase the rollout until all users are exposed to
    it.


    Subsequently, if you see the feature performing well, you continue to deploy it
    to serve more users.


    Feature toggles are a good way to release your updates gradually. You can easily


    turn the feature on or off. In this way, you can test its impact without having
    it be totally live. You can choose what traffic to route to the microservices
    that are behind feature toggles during the testing phase. When the microservice
    has been tested and found to be suitable under realistic loads, it is activated
    to serve traffic from the entire production environment.


    One of the biggest benefits of dark launching is that you can perform more tests


    before releasing your product. This lets you catch bugs early, thus saving time
    and cost associated with fixing bugs in production.


    Dark launching also allows your development team to test the new system


    architecture before end-users can see it. This strategy allows controlled deployments
    to pre-determined audiences who are statistically likely to use the microservice.
    This will enable you to gain vital insights before deployment to production.


    **Pitfalls of Dark Launching**


    The biggest potential pitfall with dark launching is that it may release microservices
    early. Another drawback is that microservices are behind feature toggles, which
    can


    lead to increased costs and time for debugging microservices. Additionally, to
    enable continuous development, teams must be able to move microservices behind
    feature


    toggles during development.


    **Staged Release**


    The staged release deployment strategy for microservices involves gradually releasing
    microservices to one environment at a time. For example, your development team


    should first release microservices to the testing environment and later to production.


    Chapter 5 MiCroserviCes arChiteCture


    Don’t enable microservices in production until you know that they’re safe in a
    testing environment. The staged release strategy incrementally deploys each service.
    This


    ensures longer time between failures for each service than if they were simultaneously
    deployed. It maintains high availability by staggering failures across multiple
    services over time. This also provides better recovery capabilities.


    **Pitfalls of Staged Release**


    In this approach, there may be downtime while microservices are introduced in


    new environments. Deploying huge batches of change might make it difficult for
    the


    development team to diagnose and recover from failures. In addition, your development
    must deploy all the changes in a single batch. This means any errors will require
    them to roll back the entire release process for each microservice.


    **Microservices Management**


    Deploying microservices can be very challenging to organizations with limited


    engineering know-how or without best practices in place. Technology choices also
    play a role since some microservices require more management, especially microservices


    that are in high-velocity platforms. These microservices require constant attention
    to improve their performance, security, scaling, and so on.


    **Summary**


    In this chapter, you learned about microservices architectures. You also saw various
    other popular approaches to software design and their pros and cons. When


    implemented correctly, microservices can help you create applications that are


    composed of loosely coupled services and that are easier to manage and scale.


    However, there are also some challenges associated with using this architectural
    style.


    It is important to have a strategy for handling failures between services and
    carefully consider how your services will interact. In the next chapters, you
    learn how to


    implement a complete microservices solution using Eclipse MicroProfile. You also
    learn about how to deploy them in Docker containers and orchestrate them using
    Kubernetes.


    **CHAPTER 6**


    **The Eclipse MicroProfile**


    **Framework**


    In this chapter, you will be introduced to the Eclipse MicroProfile architecture.
    The chapter also covers the essential and most critical standards in the Eclipse
    MicroProfile, namely configuration, health checking, fault tolerance, metrics,
    RESTful web services, open tracing, and open API.


    **What Is the Eclipse MicroProfile Framework?**'
