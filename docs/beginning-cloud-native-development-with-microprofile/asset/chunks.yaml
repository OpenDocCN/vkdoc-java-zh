    在本章中，你学习了如何将你的微服务打包为 Docker 镜像，


    并将其部署到 Kubernetes 集群上。


    你可以通过在自己的基础设施上安装 Kubernetes，或者使用托管的


    Kubernetes 服务（如 Google Kubernetes Engine（GKE））来使用 Kubernetes。


    `kubectl` 是可管理 Kubernetes 部署的命令行工具，并且


    用于与 Kubernetes 进行交互。以下是你学到的命令。


    • `kubectl get`：获取 Kubernetes 资源的信息


    • `kubectl describe`：获取 Kubernetes


    资源的详细信息


    • `kubectl scale`：扩缩容是指增加或减少


    部署中的副本数量。可以使用此命令完成该操作。


    最后，要删除一个部署，请使用 `kubectl delete deployment` 命令。要


    删除一个服务，请使用 `kubectl delete service <service-name>` 命令。


    **附录 A**


    **Maven 简介**


    Maven 是一个构建自动化工具，主要用于 Java 项目。简而言之，Maven 可以帮助你基于一份


    中心化信息来管理项目的构建、报告和文档需求。


    **注意** 根据 Apache Software Foundation 的说法，Apache Maven 是一个软件


    项目管理与理解工具。它基于项目对象模型（POM）的概念，


    能够在一个中心位置管理项目的构建、报告和文档


    需求。


    **Maven 的特性**


    Maven 是 Java 项目中流行的构建工具。与其他构建工具相比，它具有多个优势，例如 [Apache an[t (https://ant.apache.org/)](https://ant.apache.org/))
    *.* Maven 提供了广泛的功能，可分为以下类别：


    • **构建系统：** Maven 可用作 Java 项目的构建系统。


    它提供了大量插件，可用于编译、测试


    以及打包代码。


    • **依赖管理：** Maven 可以为项目管理


    依赖项。这包括从仓库下载依赖


    并将其添加到项目的类路径中。


    • **文档：** Maven 可以为项目生成文档，


    其中包括 API 文档以及测试、代码


    覆盖率等方面的报告。


    © Tarun Telang 2023


    T. Telang，*《Beginning Cloud Native Development with MicroProfile, Jakarta EE,
    and Kubernetes》*，


    [`doi.org/10.1007/978-1-4842-8832-0`](https://doi.org/10.1007/978-1-4842-8832-0#DOI)


    附录 A Maven 简介


    • **报告：** Maven 可以生成关于项目健康状况的多种报告，


    例如代码质量、测试覆盖率等。


    • **发布管理：** Maven 可用于项目的发布管理。


    这包括版本打标签、创建发布说明，


    以及将构件上传到仓库。


    **Maven 生命周期**


    Maven 基于一个称为 *生命周期* 的核心概念。Maven 生命周期是项目在开发过程中所经历的一组有序阶段。构建项目时，Maven 会按顺序经过这些阶段，并在经过时执行每一个阶段。以下是
    Maven 生命周期中的标准阶段：


    • **验证并处理资源：** 此阶段会验证


    项目是否正确，以及项目所需的所有资源是否


    可用，例如图片、XML 文件等。


    • **编译：** 此阶段编译项目的源代码。


    • **处理类：** 此阶段对已编译的源代码进行后处理，


    例如添加调试信息。


    • **生成测试源码：** 此阶段为


    项目生成测试源代码。


    • **处理测试资源：** 此阶段处理测试源代码的资源，


    例如图片、XML 文件等。


    • **测试编译：** 此阶段编译测试源代码。


    • **测试：** 此阶段使用合适的单元


    测试框架对已编译的源代码进行测试。这些测试不应要求代码被


    打包或部署。


    • **准备打包：** 此阶段为安装准备包，


    例如创建清单文件。


    • **打包：** 此阶段将已编译的源代码打包为


    可分发格式，例如 JAR。

    '
- fmt: '# Appendix A: Introduction to Maven


    - Install: This phase installs the package into the local repository for use as
    a dependency in other local projects.

    - Deploy: This phase copies the final package to the remote repository for sharing
    with other developers and projects.


    ## Benefits of Maven


    There are many benefits of using Maven for your build process:


    - Simplifies the build process: You no longer have to manage dependencies manually.
    Maven will automatically download the required dependencies and insert them into
    your project.

    - Makes it easy to manage dependencies: Maven uses a standard directory layout
    and a default build lifecycle. This makes it easy to know where your files are
    and what the role of each file is.

    - Provides consistent builds: With Maven, it is easy to maintain your project’s
    build across different environments.

    - Facilitates easier collaboration: Maven provides good project documentation.

    - Makes it easy to start new projects: Maven provides a standard directory layout
    and an easy way to create a new Java project. This makes it easier for new developers
    to join the project.

    - Supports the principle of convention over configuration: This means that Maven
    will automatically apply sensible defaults to your project. You can override these
    defaults as necessary.

    - Improves team collaboration: Maven provides an easy way for developers to share
    information about the project’s build. This makes it easier for teams to work
    together on projects.

    - Facilitates easy integration with IDE: Maven provides tight integration with
    popular IDEs such as Eclipse, NetBeans, and IntelliJ IDEA. This makes it easier
    for developers to work with Maven projects.

    - Quality project information: Maven generates standard reports about the health
    of your project, including test reports, code coverage reports, and static code
    analysis reports. This makes it easy for you to see how your project is doing.

    - Makes it easy to find dependencies: Maven’s central repository contains a huge
    amount of Java libraries and artifacts. This makes it easy for you to find dependencies.

    - Transparent migration to new features: Maven offers a consistent way to upgrade
    project dependencies, plugins, and goals. This makes it easy for you to stay up-to-date
    with the latest features.

    - Extensibility: Maven is highly extensible. You can easily add new plugins or
    customize existing ones.

    - Automates common tasks: Maven can automatically run tasks, such as compiling
    source code, generating documentation, and packaging the project. This saves you
    time and effort.

    - Makes it easy to release projects: Maven provides a standard way to release
    projects. This makes it easy for developers to deploy projects.


    ## How Does Maven Benefit the Development Process?


    Maven can help improve the development process in many ways:


    1. It can help reduce the complexity of the build process, making it more streamlined
    and easier to understand.

    2. It can help manage dependencies more effectively, leading to fewer potential
    conflicts and less need for manual updates.

    3. It can provide consistent builds across different machines and environments,
    making it easier to ensure that all developers are working with the same codebase.

    4. It can improve team collaboration by providing a standard way for developers
    to share information about the build process.

    5. It can facilitate easy integration with IDEs, making it simpler for developers
    to work with Maven projects.

    6. It can generate quality project information, such as code coverage reports
    and static code analysis reports.

    7. It can offer a transparent way to migrate to new features, making it easier
    to stay up-to-date with the latest developments.

    8. It is highly extensible, allowing developers to add new plugins or customize
    existing ones easily.


    ## The Maven Architecture


    Maven is a declarative tool, meaning that it does not require developers to write'
