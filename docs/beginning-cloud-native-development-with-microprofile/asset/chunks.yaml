- fmt: '## Cloud Computing Cost


    Many companies depend on public cloud services providers for their infrastructure
    needs. Cloud computing cost is the [cost for the use](https://customerthink.com/how-much-does-it-cost-to-build-cloud-computing-service/)
    of cloud services like compute, storage, and networking resources.


    ## Container-Based Applications vs. Serverless Applications


    Serverless applications are deployed using a cloud provider’s portal or command-line
    interface. This might require a learning curve, but it’s usually easy.


    There is no guarantee that the deployment will always go smoothly. Each provider
    has different methods of deploying an application, and it’s your responsibility
    to set up and maintain your code. While there are many public libraries and tools,
    it can be difficult to find the right one for your specific application and platform.


    ### Container-Based Applications


    Container-based applications can be more expensive to run than serverless applications.
    This is because containers typically require more resources (e.g., CPU, memory,
    disk). As a result, your cloud bill will be higher if you choose to deploy a container-based
    application on a public cloud provider.


    ### Serverless Applications


    Serverless applications are often much cheaper to run than container-based applications.
    This is because you only pay for the time your application is actually executing
    rather than the entire time your servers are running (which can be 24/7).


    Additionally, serverless applications automatically scale to meet demand, so you
    don’t have to worry about provisioning extra servers when your traffic spikes.


    ## Portability


    Portability is the ability to move an application from one provider to another
    with relative ease.


    ### Container-Based Applications


    You can move a container-based application from one provider to another with minimal
    effort. Cloud-native applications are built to take advantage of the cloud. They’re
    designed to be portable, scalable, and resilient. In a cloud-native application,
    you’ll typically find microservices that you can deploy and scale easily.


    Container-based applications are a great fit for cloud-native applications. Containers
    make it easy to package and deploy code as a standalone executable. They also
    allow you to run multiple containers on the same server, making it easy to scale
    your application.


    ### Serverless Applications


    Serverless applications are not as portable as container-based applications. This
    is because a serverless application is tightly coupled with the provider’s infrastructure.


    If you want to move your application to another provider, you will likely need
    to spend a significant amount of time and effort modifying your code. One of the
    main disadvantages of using serverless applications is vendor lock-in. Vendor
    lock-in occurs when you’re locked into a specific vendor and can’t easily switch.
    This can be a problem if the provider you’re locked in to decides to raise prices
    or change the terms and conditions.


    ## Scalability and Performance


    Scalability measures how well a system or application can maintain performance
    as it supports an increased number of users or traffic. Performance is how quickly
    a system or application performs when handling a given level of workload.


    ### Container-Based Applications


    Containerized applications are typically much more scalable than serverless applications
    because you can easily add or remove containers to meet your scaling needs. Additionally,
    containers offer a higher degree of isolation than serverless applications. If
    one container fails, it will not impact others. However, this can be a problem
    with serverless applications.


    ### Serverless Applications


    A serverless platform maintains scalability and performance in response to incremental
    load challenges. It is not suitable for applications that require quick responses.
    You may experience some latency compared to running your application on dedicated
    servers.'
