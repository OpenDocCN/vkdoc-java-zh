    ## Developing a REST Application


    系统会为你生成一个简单的`RestApplication.java`文件，用于开始创建基于 REST 的应用。


    ```java

    package org.microprofile.rest;


    import jakarta.ws.rs.ApplicationPath;

    import jakarta.ws.rs.core.Application;


    @ApplicationPath("/api")

    public class RestApplication extends Application {


    }

    ```


    `jakarta.ws.rs.ApplicationPath`注解用于指定应用的上下文根。在本例中是`/api`。`RestApplication`类继承`jakarta.ws.rs.core.Application`类，以创建
    Jakarta RESTful Web Service 应用。


    当你请求该 Web 服务时，必须在 URL 中包含`contextRoot`。例如，请求`product`资源时，需要访问`http://localhost:9080/api/product`。


