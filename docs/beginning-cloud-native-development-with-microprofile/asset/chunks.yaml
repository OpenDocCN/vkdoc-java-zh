    **总结**


    本章介绍了开发云原生 Java 应用所需工具和软件的安装过程。你首先安装了 Java Development Kit（JDK），随后安装了 Maven、Git、Open
    Liberty、Docker 和 Kubernetes。使用 Docker 和 Kubernetes 的优势之一是它们能让应用部署变得更加容易。Docker
    和 Kubernetes 都是开源技术，并拥有庞大的用户与贡献者社区。


    之后你还安装了 Zipkin，它是一个分布式追踪系统。假设你已经安装好了所有工具和软件，那么在接下来的章节中，你就可以开始构建微服务和云原生应用了。同时也建议你使用
    IDE，因为它能带来更好的编码体验。一些流行的 IDE 包括 Eclipse、IntelliJ IDEA、NetBeans 和 Visual Studio
    Code。


    **第 4 章**


    **构建 RESTful Web**


    **服务**


    在第 [2](https://doi.org/10.1007/978-1-4842-8832-0_2) 章中，你已经了解到，微服务是一种架构风格，它将应用组织为一组小型、模块化的服务。微服务是可独立部署、可扩展、可测试的服务，并通过定义良好的
    API 相互通信。这种服务解耦提升了开发与部署的敏捷性，同时也增强了运行层面的韧性。


    RESTful API 是一种应用程序编程接口（API），它遵循 REST 架构风格的约束，并支持与 RESTful Web 服务进行交互。例如，Facebook、Twitter
    和 Google 都将其功能以 RESTful Web 服务形式提供，任何客户端应用都可以通过 REST 调用这些 Web 服务。


    RESTful API 的三个关键组成部分是：


    • 运行在用户计算机或智能手机上的客户端，并发起通信


    • 服务器，通过提供 API 来访问其数据或功能


    • 资源，即服务器能够提供给客户端的任意内容


    当客户端通过 RESTful API 请求某个资源时，服务器会将该资源状态的一个表示（通过 HTTP/JSON）传输给请求方或端点。


    在本章中，你将学习如何使用 Jakarta EE 平台创建 RESTful Web 服务。你还将学习如何在 Open Liberty 服务器上部署并测试你的
    Web 服务。首先，本章将重点介绍如何使用 Jakarta RESTful Web Service（前称 JAX-RS）创建服务端组件。你将从创建一个返回产品基本信息的简单
    Web 服务开始。随后你将添加更多功能，例如返回产品列表，并允许客户端创建新产品。


