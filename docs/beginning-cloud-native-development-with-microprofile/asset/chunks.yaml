    ## Summary


    云计算是一项有潜力彻底改变人们使用计算机方式的技术。它允许用户从远程服务器获取资源（如存储和处理能力），而不是依赖本地设备。这可以节省时间和成本，使人们更容易在全球任意地点访问信息。


    云计算主要有三种类型：公共云、私有云和混合云。公共云通过互联网向大众提供服务。私有云通常通过私有网络向特定组织提供服务。混合云则是组织同时使用公共云和私有云。


    在21世纪初，企业开始向商业和消费者提供基于云的服务，例如存储和处理能力。此后，云计算使用迅速增长，现已成为许多企业的重要组成部分。


    Chapter 1 IntroduCtIon to Cloud ComputIng


    `Java`编程语言在云计算中应用广泛。它易学易用且平台无关，这意味着用`Java`编写的程序可在任何类型计算机上运行。`Java`还用于创建Web应用，即运行在Web服务器上并通过浏览器供用户访问的应用。


    云计算最重要的方面之一是对Web服务的使用。Web服务是可通过互联网访问的应用，通常用于向企业和消费者提供服务（如存储或处理能力）。Web服务通常使用如`Java`这样的编程语言编写。


    Web服务使用标准格式通信数据，这使不同类型的计算机能够相互理解并交换数据。例如，某个Web服务可使用`Simple Object Access Protocol
    (SOAP)`与使用`Windows`操作系统的计算机通信。


    `REST (Representational State Transfer)`是另一种Web服务类型，是一种用于设计网络化应用的架构风格。RESTful
    Web服务基于REST原则并使用`HTTP`协议进行数据通信。


    微服务是一种软件架构，旨在让大型应用更易开发与部署。微服务是小型、模块化、可独立部署的组件。微服务可使用`Java`语言，结合`MicroProfiles`和`Jakarta
    EE`等多种框架与标准进行开发。


    到这里，你应该已经对云计算有了良好理解。下一章将学习云原生应用开发，它使开发者能够编写专为云环境运行而设计的代码，并通过微服务与容器实现应用的高效开发、部署与扩展。


    ## Chapter 2 Cloud-Native Application Development


    “云原生”一词在技术圈已非常普遍，但其含义仍有些模糊。先从它“不是什么”开始：云原生并不取决于应用运行的位置。应用运行在公有云、私有云或本地数据中心并不重要，关键在于应用是如何构建和运行的。本章将先探讨云原生的含义、云原生应用特征、开发云原生应用的优缺点，以及它们与传统应用的差异。接着将介绍面向`Java`应用的托管服务及其在云原生开发中的作用。最后，将概览云原生应用开发阶段，包括持续集成/持续交付（`CI/CD`）、微服务架构、容器化、无服务器计算、API管理、安全等。


    ### What Is Cloud-Native?


    云原生是指那些为充分利用云计算环境而设计的应用或服务。云原生应用通常采用微服务构建，微服务是可独立部署与扩展的小型独立模块。这种方法在更新与扩展方面提供了更高的灵活性与敏捷性，因为每个微服务都可以独立更新或扩展，而不影响应用其他组件。


    云原生应用旨在利用云的弹性与可扩展性。这种方式在更新和扩展方面更具灵活性与敏捷性，因为每个微服务都可以单独更新或扩展，而不影响应用的其他组件。'
