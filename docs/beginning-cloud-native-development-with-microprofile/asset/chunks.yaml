    提供容器之间的共置与通信能力。


    • *Service* 是一种抽象，用于定义一组逻辑上的 Pod，并为这些 Pod


    提供稳定的网络访问。Service 使微服务之间实现松耦合。


    • *Deployment* 是一种对象，用于描述一组


    Pod 的期望状态。即使 Pod 被删除或重启，Deployment 也能确保


    维持该期望状态。


    • *Node* 是 Kubernetes 中的工作机器。每个 Node 上都有 Pod


    运行。Node 之间通过


    Kubernetes API 进行通信。


    • *Worker node* 是用于运行容器的机器。Worker node


    可以是物理机或虚拟机。


    • *Master node* 是用于管理 Kubernetes 集群的机器。


    • 一组 Node 被称为 *Cluster*。


    • *Labels* 是附加到对象（如 Pod）上的键/值对。它们


    用于标识和选择对象组。


    • *Selectors* 用于基于对象的标签来选择一组对象。


    • *Annotations* 用于存储对象的非标识性元数据。


    Kubernetes 的关键特性包括管理、自动部署、存储编排、


    滚动更新、自动装箱、监控、健康检查、


    水平扩展、自动扩展、负载均衡、服务发现、密钥与


    配置管理，以及容器化应用的负载分发。


    Dockerfile 用于创建 Docker 镜像。基础镜像是创建新镜像的起点。


    Docker 镜像是一个只读模板，其中包含用于创建容器的一组


    指令。你可以从 Docker Hub 或其他仓库获取基础镜像。


    你需要编写 Dockerfile 并运行 docker build 命令来构建


    Docker 镜像。


    第 9 章 使用 Kubernetes 对微服务进行容器化


    docker login --username=<your-dockerhub-username> --email=<your-email


    @company.com>


    docker images


    docker tag <imageid> <your-dockerhub-username>/<repository>:<tag> docker push
    <your-dockerhub-username>/<repository>:<tag>


    在将 Docker 镜像部署到 Kubernetes 之前，你需要先将其推送到镜像仓库。


    你可以将镜像推送到 Docker Hub，或其他仓库，例如 Google Container


    Registry（GCR）。


    Kubectl 是一个用于管理 Kubernetes 对象的命令行工具。你可以使用


    kubectl 创建、删除、更新和查看 Kubernetes 对象，例如 Pod、Service 和 Deployment。

    '
- fmt: '## Kubernetes Deployment Recap


    In this chapter, you learned how to package your microservice into a Docker image
    and deploy it on a Kubernetes cluster.


    You can use Kubernetes by installing it on your own infrastructure or by using
    a managed Kubernetes service, such as Google Kubernetes Engine (`GKE`).


    `kubectl` is the command-line tool that can manage Kubernetes deployments and
    is used to interact with Kubernetes. Here are the commands you learned:


    - `kubectl get`: Get information about Kubernetes resources

    - `kubectl describe`: Get detailed information about Kubernetes resources

    - `kubectl scale`: Scaling means increasing or decreasing the number of replicas
    in a deployment. This can be done using this command.


    Finally, to delete a deployment, use the `kubectl delete deployment` command.
    To delete a service, use the `kubectl delete service <service-name>` command.


    ## Appendix A


    ### Introduction to Maven


    Maven is a build automation tool used primarily for Java projects. In a nutshell,
    Maven can help you manage a project’s build, reporting, and documentation needs
    from a central piece of information.


    **Note** According to Apache Software Foundation, Apache Maven is a software project
    management and comprehension tool. Based on the concept of a project object model
    (`POM`), it can manage a project’s build, reporting, and documentation needs from
    a central place.


    ### Features of Maven


    Maven is a popular build tool for Java projects. It offers several benefits over
    other build tools, such as Apache Ant (`https://ant.apache.org/`). Maven provides
    a wide range of features, which can be divided into the following categories:


    - Build system: Maven can be used as a build system for Java projects. It provides
    a wide range of plugins that can be used to compile, test, and package the code.

    - Dependency management: Maven can manage dependencies for a project. This includes
    downloading the dependencies from a repository and adding them to the project’s
    classpath.

    - Documentation: Maven can generate documentation for a project, which includes
    API documentation as well as reports on tests, code coverage, and so on.

    - Reporting: Maven can generate a wide range of reports on the health of a project,
    such as code quality, test coverage, and so on.

    - Release management: Maven can be used for release management for a project.
    This includes tagging versions, creating release notes, and uploading the artifacts
    to a repository.


    ### Maven Lifecycle


    Maven is based on a central concept called the lifecycle. The Maven Lifecycle
    is an ordered set of phases a project goes through during its development. When
    you build a project, Maven will go through these phases in order, executing each
    one as it goes. The following are the standard phases in the Maven lifecycle:


    - Validate and process resources: This phase validates that the project is correct
    and that all necessary resources for the project are available, such as images,
    XML files, and so on.

    - Compile: This phase compiles the source code of the project.

    - Process classes: This phase post-processes the compiled source code, for example,
    to add debugging information.

    - Generate test sources: This phase generates the test source code for the project.

    - Process test resources: This phase processes the resources of the test source
    code, such as images, XML files, and so on.

    - Test compile: This phase compiles the test source code.

    - Test: This phase tests the compiled source code using a suitable unit testing
    framework. These tests should not require the code to be packaged or deployed.

    - Prepare package: This phase prepares the package to be installed, such as creating
    the manifest file.

    - Package: This phase packages the compiled source code into a distributable format,
    such as a `JAR`.'
