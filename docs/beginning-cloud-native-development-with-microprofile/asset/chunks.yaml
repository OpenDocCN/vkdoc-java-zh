    ## The Evolution of Cloud Computing


    Cloud computing can be traced back to the early days of the Internet when researchers
    at universities and companies were looking for ways to share resources. This included
    sharing computer time, storage, and applications. They used the term “utility
    computing” to describe this concept. In early 1989, a project called the World
    Wide Web was developed by Tim Burners-Lee, which allowed users to access information
    over the Internet. This led to the development of web-based applications hosted
    on central servers.


    `HTML` and `HTTP` were developed to provide a standard way to share documents
    and data. `HTML` is a markup language that is used to create web pages. It provides
    a way to structure information and includes tags that can control a web page’s
    appearance. `HTML` is not a programming language, but it can be used to create
    pages that include JavaScript and other scripting languages.


    `HTTP` is a protocol that transfers data between a web server and a web browser.
    It is the foundation of the World Wide Web and provides a way for browsers to
    request information from servers and for servers to send information back to browsers.
    `HTTP` is an application layer protocol that operates on top of `TCP/IP`, the
    primary communications protocol of the Internet.


    In 1994, Netscape released the first commercial web browser, making the Internet
    more accessible to the public. As a result, the demand for web-based applications
    increased. Shortly after, in 1995, Sun Microsystems released the first version
    of Java. Java runs on a virtual machine, allowing it to run on any operating system.


    ![](index-42_1.jpg)


    Java’s platform independence is one of its key features, making it a perfect choice
    for developing web-based applications.


    In the early 2000s, a new type of service known as a web service began to emerge.
    Web services are applications that provide a specific functionality over the Internet.
    In those days web services were simple, such as a weather service that provided
    the current temperature for a given location. As the popularity of web services
    increased, so did the demand for more complex web services. In response to this
    demand, companies began to offer web-based application platforms.


    The first generation of application platforms was focused on providing the infrastructure
    needed to run web services. This included a web server, a database, and an application
    server. The second generation of application platforms added support for more
    complex web-based applications. These platforms included features such as security,
    scalability, and manageability. The second generation of application platforms
    gave rise to the concept of cloud computing.


    For web services to communicate with each other, they need to use a common set
    of rules. This common set of rules is known as a web service protocol. The two
    most popular web service protocols are `SOAP` and `REST`. `SOAP` (Simple Object
    Access Protocol) is a protocol that uses `XML` to exchange information between
    applications. `REST` (Representational State Transfer) is a newer, simpler protocol
    that uses `XML` or `JSON` to exchange information between applications. Most of
    the web services developed around the early 2000s were created using `SOAP`. However,
    in recent years, `REST` has grown in popularity, as it is simple and easy to use.
    Figure 1-6 illustrates the evolution of web services.


    ### Figure 1-6. Evolution of web services


    The first real-world example of cloud computing was launched in the early 2000s
    by Salesforce.com. They offered a web-based customer relationship management (`CRM`)
    application. This allowed businesses to access their `CRM` data from any device
    with an Internet connection. In 2008, Google introduced the Google App Engine
    (`GAE`), which is a platform that allows developers to build and run applications
    on the Google Cloud. As a result, cloud computing became more accessible to developers
    and businesses.


    In 2006, Amazon launched Amazon Web Services (`AWS`), a cloud-based platform allowing
    developers to build and run applications on the Amazon Cloud. It is a collection
    of web-based services that allow developers and end-users to access information
    and applications over the Internet. `AWS` includes services such as storage, databases,
    networking, and analytics. As per the ZDNet article (`www.zdnet.com/article/the-top-cloud-providers-of-2021-aws-microsoft-azure-google-cloud-hybrid-saas/`),
    since its launch, `AWS` has been the world’s largest provider of cloud computing
    services.


    In 2011, Apple launched iCloud, which is a cloud-based storage and synchronization
    service. It allows users to store data such as documents, music, and photos in
    the cloud and access them from any Apple device with an Internet connection. Apple
    iCloud is a closed system, which means that only devices that run `iOS` or `macOS`
    can access it. It is more like a cloud-based storage service similar to Dropbox
    or Google Drive. In 2008, Microsoft launched Azure, which is a cloud-based platform
    that allows developers to build and run applications on the Microsoft Cloud. Azure
    includes services such as storage, databases, networking, and analytics. It is
    the second most popular cloud computing platform after Amazon Web Services (`AWS`).
    Examples of organizations that have migrated to public clouds are Netflix, which
    uses `AWS` for its streaming service; and Airbnb, which uses `AWS` for its vacation
    rental platform. Azure is more suitable for businesses that use the Microsoft
    ecosystem of products and services.


    The cloud has become the default choice for many organizations. As the use of
    cloud computing has increased, so have the needs for better tools and technologies
    to manage and monitor cloud-based applications. In response to this need, a new
    generation of application platforms has emerged, known as cloud-native applications.
    Cloud-native applications are designed to be run on the cloud. They are built
    using microservices, which are small, independent services that can be deployed
    and scaled independently. Cloud-native applications are also designed to be fault-tolerant
    and highly available.


    In recent years, there has been a shift from traditional Virtual Machines (`VMs`)
    to containers for running applications in the cloud. Containers are more lightweight
    than `VMs` because they only include the minimum amount of code and libraries
    needed to'
