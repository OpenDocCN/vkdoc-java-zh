- fmt: '## Setting `JAVA_HOME`


    The `JAVA_HOME` environment variable is used by Java applications to determine
    the location of the JDK installation. It is important to set this variable correctly
    to ensure that your Java applications will run properly.


    The Oracle JDK installer for Windows will automatically set the `JAVA_HOME` environment
    variable for you. If you use a different JDK, such as OpenJDK, you need to manually
    set the `JAVA_HOME` environment variable. OpenJDK (Open Java Development Kit)
    is a free and open-source implementation of the Java Platform, Standard Edition
    (Java SE). You can find more details about OpenJDK on its project website at `openjdk.org`.


    To set the `JAVA_HOME` environment variable, open a terminal window and type the
    following command:


    ```bash

    export JAVA_HOME=<path-to-jdk>

    ```


    Where `<path-to-jdk>` is the location of your JDK installation. For example, if
    you installed the JDK in `/usr/local/jdk`, you would type the following command:


    ```bash

    export JAVA_HOME=/usr/local/jdk

    ```


    You can verify that the `JAVA_HOME` variable is set correctly by typing the following
    command:


    ```bash

    echo $JAVA_HOME

    ```


    If the `Java_HOME` variable is set correctly, you should see the location of your
    JDK installation. For example:


    ```text

    /usr/local/jdk

    ```


    Once the installation is complete, verify the installation by running the `java
    -version` command.


    If you see the version printed, it means that the JDK has been successfully installed
    on your system.


    ## Using Maven


    Maven is a build automation tool used for Java applications. It manages dependencies,
    compiles code, runs tests, and packages code into deployable artifacts. Maven
    is required to build cloud-native Java applications. Appendix A explains Maven
    in detail.


    ![](index-78_1.png)


    Chapter 3 Setting Up YoUr Development environment


    ### Installing Maven


    To install Maven on your system, follow these steps:


    1. Download the latest version of Maven from the Apache Maven website (`https://maven.apache.org/`).

    2. Extract the downloaded archive to the directory of your choice.

    3. Add the `bin` directory of the extracted Maven folder to your `PATH` environment
    variable.

