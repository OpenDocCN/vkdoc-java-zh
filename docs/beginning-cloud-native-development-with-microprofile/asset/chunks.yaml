    in a self-contained unit. Running an application using containers means that you
    must first package your application and its dependencies to run in a container
    like [Docker](https://en.wikipedia.org/wiki/Docker_(software)). Then you can run
    these containers on any server, as shown in Figure [5-1](#index_split_001.html#p148).


    ![](index-148_1.png)


    ## Chapter 5 Microservices Architecture


    ### Figure 5-1. Container-based applications


    To run an application in a container, start by building an image (such as a Docker
    image), which is a template used to create a container. You can create images
    using a text file known as a Dockerfile, which contains instructions describing
    how to build a Docker image. With unique configurations and settings, you can
    use this image to create as many containers as you want. You can then run them
    anywhere without requiring other libraries or tools, as long as you have a container
    runtime technology like Docker Engine installed.


    Since containers offer an isolated environment for your code, they’re ideal for
    deployments on cloud platforms like Amazon Web Services (AWS), Google Cloud Platform,
    and Microsoft Azure. You can also use a container orchestration platform like
    [Kubernetes](https://en.wikipedia.org/wiki/Kubernetes) to deploy and manage containers
    at scale. This makes them suitable for deployments in the cloud, as you can quickly
    move them from one server to another without worrying about compatibility issues.


    ## Chapter 5 Microservices Architecture


    ### What Are Serverless Applications?


    Serverless computing is a new way of building and running applications. It’s also
    known as functions as a service, or FaaS. Serverless computing is a cloud-computing
    execution model. The cloud provider runs the server and dynamically allocates
    machine resources to run the code, scaling up or down depending on demand. Serverless
    computing takes away the need for developers to provision, manage, and operate
    servers, leaving them free to focus on their applications.


    The term “serverless” is misleading because there are still servers involved.
    This just means that the developers don’t have to worry about them. The cloud
    provider takes care of all the underlying infrastructure so that the developers
    can focus on their code.


    ### Where Is Serverless Computing Used?


    Serverless computing is a relatively new concept and is still evolving. It’s not
    yet widely adopted but is growing in popularity, especially among startups and
    small businesses that don’t have the resources to invest in a traditional IT infrastructure.


    You can use serverless computing for small, independent tasks that your application
    needs to perform quickly and efficiently. These tasks are usually event-driven,
    such as handling a user upload or processing a payment.


    You can also use serverless computing for larger and more complex applications
    by dividing the application into smaller components, with each element handled
    by a different serverless function.


    Some of the most popular use cases for serverless computing are:


    - Web applications—You can use serverless computing to host static websites and
    dynamic web applications.

    - Mobile applications—You can also use serverless functions to power the backend
    of mobile applications. They can handle user authentication, database queries,
    push notifications, and other common tasks.

    - Internet of Things (IoT)—You can use it to process data from sensors and devices
    in real time. You can also use it to trigger actions, such as sending a notification
    or activating a device.

    - Data processing—You can use serverless functions to handle transactions and
    payments. You can also use it to send receipts and notifications.

    - Machine learning (ML)—You can use serverless functions to train and deploy machine
    learning models.


    ### Benefits of Serverless Computing


    Serverless computing offers the following benefits over traditional computing
    models, such as virtual machines or containers:


    - Reduced costs—There is no need to invest in, or maintain, servers. You only
    pay for the resources you use, and there are no upfront costs. There’s no need
    to pay for idle capacity or unutilized servers. This can lead to significant cost
    savings, especially for applications with variable or unpredictable workloads.

    - Increased agility—Serverless computing allows you to deploy code quickly, and
    it can automatically scale up or down to meet the demands of your users. You can
    even handle sudden spikes in traffic without any problems.

    - Improved focus—By taking away the need to manage servers, serverless computing
    allows you to focus on developing and deploying your applications. You can focus
    on your code and let the serverless platform handle the rest. This can make your
    life easier as a developer.


    ### Drawbacks of Serverless Computing


    Despite its many benefits, serverless computing does have some drawbacks.


    - Difficult to debug and troubleshoot problems—One of the main drawbacks of serverless
    computing is that it can be more challenging to debug and troubleshoot problems
    because you don’t have direct access to the underlying servers.

    - Reduced flexibility—Serverless computing can be less flexible than other hosting
    options because you’re limited to the resources that the serverless platform provides.

    - Vendor lock-in—It can lead to vendor lock-in, making it difficult to switch
    to a different platform if you’re not happy with your current provider.

    - Lack of support—Because it’s still a new technology, there’s a lack of support
    and documentation for serverless computing. It can be challenging to find answers
    to your questions or get help when you’re stuck.


    ### Popular Serverless Platforms


    If you’re looking for a new way to build and run your applications, you should
    check out serverless computing. It’s a great way to save money on infrastructure
    costs and automatically scale your applications. Here are some of the most popular
    serverless platforms to explore:


    - Amazon Web Services Lambda

    - Azure Functions

    - Google Cloud Functions

    - IBM Cloud Functions

    - Apache OpenWhisk


    Each platform has its strengths and weaknesses, so you’ll need to choose the right
    one for your project.


    ### Main Components of a Serverless Computing Platform


    Serverless platforms are usually built on top of cloud infrastructure platforms
    like Amazon Web Services (AWS), Microsoft Azure, or Google Cloud Platform (GCP).
    These platforms provide all the necessary resources to run your code, including
    storage, networking, and computing resources. The main components of a serverless
    computing platform are:


    ![](index-152_1.png)


    ## Chapter 5 Microservices Architecture


    - Functions—These are the pieces of code that you write and deploy to the serverless
    platform. Each function can be triggered by an event, such as a user upload or
    a payment.

    - Events—These are the events that trigger your functions—for example, a user
    upload or a payment.

    - Storage—This is where your code and data are stored.

    - Networking—This is how your functions communicate with each other and with the
    outside world.

    - Computing resources—These are the resources that your functions need to run,
    such as CPU and memory.


    [Serverless applications](https://en.wikipedia.org/wiki/Serverless_computing)
    run in a completely stateless environment. In a serverless application, you use
    a Function as a Service (FaaS) that packages and deploys code as a standalone
    executable. The code responds to events like an incoming HTTP request'
