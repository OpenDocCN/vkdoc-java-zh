    T. Telang, *Beginning Cloud Native Development with MicroProfile, Jakarta EE,
    and Kubernetes*,

    [`https://doi.org/10.1007/978-1-4842-8832-0_8`](https://doi.org/10.1007/978-1-4842-8832-0_8#DOI)


    ## What Is a JSON Web Token (`JWT`)?


    A JSON Web Token or JWT is an open standard that defines a compact and self-contained
    way of securely transmitting information between parties as a JSON object.


    JWTs can represent any claim, such as identity, security roles, or session information.
    These claims can be verified and trusted because they are digitally signed. JWTs
    can be signed using a secret key or a public/private key pair. They can also be
    used for authorization by allowing users to access specific resources only if
    they have a valid JWT.


    The MicroProfile JSON Web Token specification defines how JWTs can be used in
    a microservice environment, including how to verify and validate tokens. It builds
    on the JWT standard and adds some additional features that are specific to microservices.


    ## Use Cases for JSON Web Tokens


    JSON Web Tokens can be used in the following scenarios.


    ### Authentication


    JWTs can be used to authenticate users. A user can be authenticated by providing
    a JWT with the correct signature. In-memory authentication is faster and more
    convenient as user credentials are stored in memory, but it is less secure because
    the data is more vulnerable to attack. DB stored user credentials are slower and
    more challenging to use, but they are more secure because the data is better protected
    either by encrypting it or through access control. Encryption makes it more difficult
    for hackers to access and steal information. Access control ensures that only
    authorized users have permission to view or modify the data.


    ### Authorization


    One common use case for JSON Web Tokens is an authorization. In this scenario,
    the JWT contains claims representing the user''s identity and security roles.
    These claims can determine what resources the user is allowed to access.


    For example, a user with the admin security role might be allowed to access all
    resources. In contrast, a user with the read-only security role might only be
    allowed to access resources marked as readable.


    ### Session Information


    Another common use case for JSON Web Tokens is storing session information. In
    this scenario, the JWT contains claims representing the user''s session information,
    such'
