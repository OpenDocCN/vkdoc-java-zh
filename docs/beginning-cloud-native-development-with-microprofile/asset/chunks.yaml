    ## Using Kubernetes


    Kubernetes is a powerful tool that can help you automate the deployment and scaling
    of your containerized applications. As Kubernetes requires Docker to be configured
    correctly, it is important to understand the benefits of using both technologies
    together.


    Kubernetes provides several benefits, such as automated deployment and scaling
    of containerized applications, self-healing capabilities, service discovery and
    load balancing, and storage orchestration.


    Kubernetes is an open-source container orchestration platform that automates the
    deployment, scaling, and management of containerized applications. In this section,
    you install Kubernetes on your development machine. The easiest way to install
    Kubernetes is by using a tool, such as Minikube. Minikube is a single-node Kubernetes
    cluster that runs on your development machine. Minikube provides several benefits,
    including:


    - It is easy to install and get started.

    - It can run locally on your development machine.

    - There is no need to provision or manage any infrastructure for running Minikube.


    You learn more about Kubernetes and container orchestration in [Chapter 9](https://doi.org/10.1007/978-1-4842-8832-0_9).


    ### Installing Kubernetes


    To install Minikube, follow the instructions in the “Get Started” section of the
    Minikube documentation website ([https://minikube.sigs.k8s.io/docs/start/](https://minikube.sigs.k8s.io/docs/start/)).


    You need to run the appropriate installation command as per your platform architecture
    and operation system.


