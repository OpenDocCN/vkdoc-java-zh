- fmt: "## Exposing Metrics in Prometheus Format\n\nTo expose metrics in Prometheus\
    \ format, add the following dependency to your project:\n\n```xml\n<dependency>\n\
    \  <groupId>org.eclipse.microprofile.metrics</groupId>\n  <artifactId>microprofile-metrics-impl</artifactId>\n\
    \  <version>2.3</version>\n</dependency>\n```\n\nThis will enable Prometheus support\
    \ for MicroProfile Metrics in your application. By default, all metrics are exposed\
    \ in Prometheus format.\n\nIf you want to disable this, you can set the following\
    \ property in your application’s configuration:\n\n`mp.metrics.prometheus.disabled=true`\n\
    \n## Chapter 7 MicroProfile Framework – Part 2\n\nThe MicroProfile Metrics spec\
    \ is a useful tool for monitoring the performance of your application. It can\
    \ be used to track the execution time of methods, the memory usage of methods,\
    \ and custom metrics that you define. MicroProfile Metrics is easy to use and\
    \ can be integrated with other monitoring tools.\n\n### Using OpenTracing\n\n\
    The MicroProfile OpenTracing specification defines a standard set of APIs for\
    \ enabling distributed tracing in your methods. The goal of the MicroProfile OpenTracing\
    \ specification is to maintain consistency across different tracing implementations,\
    \ such as Jaeger (`www.jaegertracing.io/`), Zipkin (`https://zipkin.io/`), and\
    \ AppDynamics (`www.appdynamics.com/`). This means that you can use any compatible\
    \ tracing implementation with your microservices, without having to change your\
    \ code.\n\nThe MicroProfile OpenTracing specification consists of two parts:\n\
    \n- The API definition describes how to instrument RESTful web services for distributed\
    \ tracing.\n- The compatibility layer allows different tracing implementations\
    \ to be used interchangeably with the MicroProfile OpenTracing API.\n\n### Distributed\
    \ Tracing\n\nDistributed tracing is a technique for understanding how distributed\
    \ systems work by tracing the flow of requests through the system. It is used\
    \ to troubleshoot different kinds of issues, such as performance issues, and identify\
    \ bottlenecks in distributed systems.\n\nIn a microservices architecture, each\
    \ microservice is a separate process that runs on its machine. Requests can flow\
    \ from one microservice to another, so it can be difficult to understand how the\
    \ system works as a whole.\n\nDistributed tracing can help you see the big picture\
    \ by tracing the flow of requests through the system and identifying which microservices\
    \ are involved in each request.\n\n### How Does It Work?\n\nThe MicroProfile OpenTracing\
    \ API defines how to instrument microservices for distributed tracing. The API\
    \ is based on the OpenTracing standard, which is a vendor-neutral way of instrumenting\
    \ distributed systems for tracing. Without distributed tracing, it can be difficult\
    \ to understand how a request flows through a microservice architecture.\n\nThe\
    \ MicroProfile OpenTracing compatibility layer allows different tracing implementations\
    \ to be used with the MicroProfile OpenTracing API. This means that you can use\
    \ any compatible tracing implementation with your microservices, without having\
    \ to change your code.\n\n### MicroProfile OpenTracing Within a Jakarta RESTful\
    \ Web Service\n\nTo implement OpenTracing, first you need to include the following\
    \ Maven dependencies in the `pom.xml` file of your project.\n\n```xml\n<dependency>\n\
    \  <groupId>org.eclipse.microprofile.opentracing</groupId>\n  <artifactId>microprofile-opentracing-api</artifactId>\n\
    \  <version>3.0</version>\n</dependency>\n```\n\nTo enable distributed tracing\
    \ in your application with Zipkin, first ensure it is installed and running. Refer\
    \ to Chapter 3 to learn about how to install Zipkin on your system. Next, add\
    \ the following code to your `server.xml` file.\n\nAssuming you are using Open\
    \ Liberty as your MicroProfile implementation, the `server.xml` file will be located\
    \ in the following path:\n\n`/<project-folder>/src/main/liberty/config`\n\nAfter\
    \ your RESTful web services are running, you can look for the traces in your Zipkin\
    \ server."
