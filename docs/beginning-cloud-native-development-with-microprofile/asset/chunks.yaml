    **在微服务环境中使用 JWT**


    MicroProfile JSON Web Token 规范是微服务环境安全的重要组成部分。在微服务环境中，每个服务通常都要对自身安全负责。这意味着每个服务都需要能够验证和校验
    JWT。


    JSON Web Token 是微服务中流行的令牌格式，因为它遵循定义良好且广为人知的标准。基于令牌的认证机制提供了一种轻量级方式，可在不同服务之间传播用户身份。


    MicroProfile JSON Web Token 规范定义了 JWT 在微服务环境中的使用方式。该规范定义了一组适用于微服务需求的声明（claims）。这些声明包括令牌的签发者（issuer）、主题（subject）和受众（audience）。此外，该规范还定义了
    JWT 在微服务环境中的使用方法，包括如何验证和校验令牌。


    举例来说，假设你有两个微服务——一个认证服务（auth service）和一个产品服务（product service）。认证服务负责对用户进行身份认证并签发
    JWT。产品服务负责管理用户。


    认证服务会在用户完成认证后向其签发 JWT。这些 JWT 包含有关用户的声明信息，例如姓名和电子邮件地址。产品服务使用 MicroProfile JWT 规范来验证和校验由认证服务签发的
    JWT。然后，产品服务可以使用 JWT 中的信息来识别访问它的用户。图 8-1 展示了从产品服务进行认证并获取数据所经历的步骤顺序。


