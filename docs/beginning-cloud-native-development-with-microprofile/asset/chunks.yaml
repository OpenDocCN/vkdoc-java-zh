    \ `Docker` for `Kubernetes` on `Windows`, follow these instructions:\n\n1. Right-click\
    \ the `Docker` icon in the system tray and select `Settings`.\n2. Select `Kubernetes`\
    \ and check the `Enable Kubernetes` checkbox.\n3. Click `Apply & Restart`.\n\n\
    To configure `Docker` for `Kubernetes` on `macOS`, follow these instructions:\n\
    \n1. Open the `Docker Desktop` preferences window.\n2. Click the `Kubernetes`\
    \ tab.\n3. Select `Enable Kubernetes`, as shown in Figure [3-6](#index_split_001.html#p91).\n\
    4. Click `Apply & Restart`. This will restart `Docker` and enable `Kubernetes`.\n\
    \n![](index-91_1.jpg)\n\n*Figure 3-6. Kubernetes preferences in Docker Desktop*\n\
    \nTo configure `Docker` for `Kubernetes` on `Linux`, follow these instructions:\n\
    \n1. Open the `Docker` daemon configuration file in a text editor. The file is\
    \ located at `/etc/docker/daemon.json`.\n2. Add the following lines to the file:\n\
    \n```json\n{\n  \"exec-opts\": [\"native.cgroupdriver=systemd\"],\n  \"log-driver\"\
    : \"json-file\",\n  \"log-opts\": {\n    \"max-size\": \"100m\"\n  },\n  \"storage-driver\"\
    : \"overlay2\"\n}\n```\n\n3. Save the file and exit the text editor.\n4. Restart\
    \ the `Docker` daemon.\n5. To verify that `Kubernetes` is enabled, run the following\
    \ command:\n\n```bash\ndocker info | grep -i \"kubernetes\"\n```\n\nYou should\
    \ see the following output:\n\n```text\nWARNING: No swap limit support\nKubernetes\
    \ Root Dir: /var/lib/kubelet\nKubernetes Runtime Wants Filesystem: true\nKubernetes\
    \ Runtime Execs Mounted via Containerd: false\nRuntimes: docker runc\nDefault\
    \ RuntimeName: docker\nInit binary path: /usr/local/bin/podman\nKubernetes version:\
    \ v1.15.3\nCgroup Driver: systemd\n```\n\n## Creating a Kubernetes Cluster\n\n\
    A `Kubernetes` cluster is a set of nodes or servers used to run containerized\
    \ applications.\n\nEach node in a `Kubernetes` cluster runs a `Kubernetes` agent,\
    \ which manages the applications running on that node. The agent communicates\
    \ with a `Kubernetes` master, which is responsible for managing the entire cluster.\n\
    \nIn this section, you create a `Kubernetes` cluster using `Minikube`.\n\n1. If\
