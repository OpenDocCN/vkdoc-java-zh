- fmt: "## 使用 `curl` 访问受保护资源\n\nYou can also access the secured resource using a tool\
    \ like `curl`:\n\n```bash\ncurl -u user:password http://localhost:8080/secured\n\
    ```\n\nThis command invokes the `secured` resource on `localhost` port `8080`\
    \ with the username and password as `user:password`.\n\n```java\npublic class\
    \ SecuredServlet extends HttpServlet {\n\n    @Override\n    protected void doGet(HttpServletRequest\
    \ req, HttpServletResponse resp)\n            throws ServletException, IOException\
    \ {\n        // do something\n    }\n\n}\n```\n\nTo test this configuration, you\
    \ can use `curl` as follows:\n\n```bash\n$ curl -v http://localhost:8080/secured\n\
    ```\n\nThe server will respond with a `401 Unauthorized` status code and a `WWW-Authenticate`\
    \ header as follows:\n\n```http\nHTTP/1.1 401 Unauthorized\nWWW-Authenticate:\
    \ Basic realm=\"default\"\n```\n\nThe client can then resend the request with\
    \ the appropriate credentials in the `Authorization` header as follows:\n\n```bash\n\
    $ curl -v -u user:password http://localhost:8080/secured\n```\n\nThe server will\
    \ then respond with the resource that was requested:\n\n```http\nHTTP/1.1 200\
    \ OK\nContent-Type: text/plain\n\nThis is a secured resource.\n```\n\n## 使用 Jakarta\
    \ Security 保护 Servlet\n\nTo secure a servlet using Jakarta Security, you need\
    \ to add the following lines of code to your `web.xml` file:\n\n```xml\n<security-constraint>\n\
    \    <web-resource-collection>\n        <web-resource-name>secured</web-resource-name>\n\
    \        <url-pattern>/*</url-pattern>\n    </web-resource-collection>\n    <auth-constraint>\n\
    \        <role-name>admin</role-name>\n    </auth-constraint>\n</security-constraint>\n\
    \n<login-config>\n    <auth-method>FORM</auth-method>\n    <form-login-config>\n\
    \        <form-login-page>/login.jsp</form-login-page>\n        <form-error-page>/error.jsp</form-error-page>\n\
    \    </form-login-config>\n</login-config>\n\n<security-role>\n    <role-name>admin</role-name>\n\
    </security-role>\n```\n\nIn this code, the `<security-constraint>` element defines\
    \ a security constraint that applies to all resources in the web application.\
    \ The `<auth-constraint>` element specifies that only users with the `admin` role\
    \ can access the protected resources. The `<login-config>` element specifies that\
    \ form-based authentication will be used. The `<form-login-config>` element specifies\
    \ the login page and error page used by the form-based authentication process.\
    \ Finally, the `<security-role>` element defines the `admin` role.\n\n## 在 RESTful\
    \ Web Service 中使用 Digest 认证\n\nTo use digest authentication with a RESTful web\
    \ service, you need to configure it in the `web.xml` file.\n\nThe following is\
    \ the configuration for digest authentication in the `web.xml` file:\n\n```xml\n\
    // ...\n\n<login-config>\n    <auth-method>DIGEST</auth-method>\n    <realm-name>default</realm-name>\n\
    </login-config>\n```\n\n## MicroProfile REST Client\n\nThe MicroProfile REST Client\
    \ is a specification that defines a set of APIs and annotations for building REST\
    \ clients. It provides a type-safe way to invoke RESTful services. This section\
    \ shows you how to build a simple MicroProfile REST Client and use it to access\
    \ a remote service. It also demonstrates how to use the client API to invoke different\
    \ HTTP methods, such as `GET`, `POST`, `PUT`, and `DELETE`.\n\nThe MicroProfile\
    \ REST Client is an Eclipse project that provides a portable RESTful client API\
    \ for Java applications. To view more details about this project, refer to `https://github.com/eclipse/microprofile-rest-client`.\
    \ The project is designed to make it easy to write portable and reusable code\
    \ that can access RESTful services, regardless of the underlying technology or\
    \ platform.\n\nAdd the following dependency to your `pom.xml` file if you are\
    \ using Maven to build your application. The MicroProfile REST Client is included\
    \ in the MicroProfile dependency. To learn more about the MicroProfile project,\
    \ refer to their official website at `https://microprofile.io/`.\n\n```xml\n<dependency>\n\
    \    <groupId>org.eclipse.microprofile</groupId>\n    <artifactId>microprofile</artifactId>\n\
    \    <version>5.0</version>\n    <type>pom</type>\n    <scope>provided</scope>\n\
    </dependency>\n```\n\nOr you can use the REST client dependency specifically,\
    \ as shown here:\n\n```xml\n<dependency>\n```"
