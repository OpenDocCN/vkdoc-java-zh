    **关于作者**


    **Tarun Telang** 是一位实践型技术专家，在多层架构、高可扩展软件应用程序的设计与实现方面拥有丰富经验。他曾就职于多家知名公司，包括 Microsoft、Oracle、Polycom
    和 SAP。在业务应用程序的架构设计与开发方面，他拥有超过 17 年经验。


    他的职业生涯始于 SAP，担任企业 Java 开发人员，并在那里为大型企业开发分布式应用软件。他从企业会话 Bean（session beans）和消息驱动
    Bean（message-driven beans）起步，同时使用 Java Management Extensions（JMX）技术对企业应用程序的配置与管理进行仪表化。


    他很快掌握了多种企业级技术，包括 Enterprise Beans、Java Management Extensions、Servlets 和 Server
    Pages 技术。作为开发人员的第一年，他就获得了 Sun Certified Programmer for the Java Platform, Standard
    Edition 6，以及 SAP NetWeaver Java Web Application Server 的 SAP Certified Development
    Consultant 认证（该服务器是符合 Java EE 5 标准的应用服务器）。


    他还在 XSLT 和 XSD 等 XML 技术方面积累了专业能力。他使用会话 Bean 和消息驱动 Bean 开发了多个解决方案，以处理跨多个系统的面向消息通信。2007
    年，Tarun 因其关于新兴技术的文章和博客，以及在 SAP 开发者社区中推动创新解决方案的贡献，被评为 SAP Mentor 和 Community Influencer。


    他经常撰写 Java 及相关技术文章。Tarun 还创作了多门在线课程，其中包括一门畅销的 YAML 数据序列化语言课程。


    他曾在多个开发者大会进行技术演讲，包括 SAP TechEd 和 Great Indian Developer Summit。他在会议上演讲已超过 15 年，并持续发布技术论文和博客，帮助大家掌握软件技术基础。Tarun
    使用 Spring 框架和微服务架构开发过基于云的视频会议应用，并具备使用 Persistence API 和 Hazelcast 框架构建基于 REST
    服务的经验。


    他还使用多种架构模式（包括微服务架构和面向服务架构）开发了许多端到端的云端解决方案。Tarun 在 Web、移动和云技术方面积累了深厚经验。他也熟悉敏捷方法在实践中的应用，包括以用户为中心和移动优先设计，以管理分布在多个地区的跨职能团队项目。Tarun
    还是 *Java EE to Jakarta EE 10 Recipes: A Problem-Solution Approach for* *Enterprise
    Java*（Apress，2022）的合著者。


    Tarun 曾在加拿大和德国工作，目前与妻子和儿子居住在印度海得拉巴。你可以在 LinkedIn（[www.linkedin.](http://www.linkedin.com/in/taruntelang/)


    [com/in/taruntelang/), F](http://www.linkedin.com/in/taruntelang/)acebo[ok (www.facebook.com/tarun.telang](https://www.facebook.com/tarun.telang)）和
    Twitter（@taruntelang）上关注他。他的博客位于 [`blogs.taruntelang.me`](https://blogs.taruntelang.me)，是获取各类软件技术相关内容的优质资源！


    xiv


    ![](img/index-14_1.jpg)


    **关于技术审阅者**


    **Massimo Nardone** 在安全、Web/移动开发、云和 IT 架构方面拥有超过 25 年经验。他在 IT 领域真正热爱的方向是安全和 Android。


    20 多年来，他一直使用 Android、Perl、PHP、Java、VB、Python、C/C++ 和 MySQL 进行编程并教授他人编程。他拥有意大利萨莱诺大学（University
    of Salerno）的计算机科学硕士学位。


    多年来，他曾担任 CISO、CSO、安全高管、IoT 高管、项目经理、软件工程师、研究工程师、首席安全架构师、PCI/SCADA 审计员，以及高级 IT 安全/云/SCADA
    架构负责人。他的技术技能包括安全、Android、云、Java、MySQL、Drupal、Cobol、Perl、Web 与移动开发、MongoDB、D3、Joomla、Couchbase、C/C++、WebGL、Python、Pro
    Rails、Django CMS、Jekyll、Scratch 等。


    他曾担任赫尔辛基理工大学（阿尔托大学）网络实验室的访问讲师与习题指导教师。他还拥有四项国际专利（涉及 PKI、SIP、SAML 和代理领域）。目前他在 Cognizant
    任网络安全负责人和 CISO，帮助客户开展信息安全与网络安全相关工作，包括战略、规划、流程、政策、程序、治理、意识提升等。2017 年 6 月，他成为 ISACA
    芬兰董事会常任成员。


    Massimo 已为不同出版社审阅了 45 本以上 IT 书籍，并且是 *Pro Spring Security: Securing Spring Framework
    5 and Boot 2-based* *Java Applications*（Apress，2019）、*Beginning EJB in Java EE
    8*（Apress，2018）、*Pro JPA 2 in* *Java EE 8*（Apress，2018）和 *Pro Android Games*（Apress，2015）的合著者。


