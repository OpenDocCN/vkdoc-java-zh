    Security is now the most commonly used security standard for SOAP messages. Other


    specifications that extend to SOAP include WS-Addressing, which defines a standard


    way to include information such as the sender and recipient in a SOAP message,
    and WS-ReliableMessaging, which adds reliability features such as message delivery
    guarantees.


    SOAP has been criticized for many reasons, including its complexity and the


    difficulty of debugging SOAP applications. However, it became popular, particularly
    in enterprise environments.


    This next section discusses REST, which is an alternative to SOAP.


    Chapter 5 MiCroserviCes arChiteCture


    **What Is REST?**


    REST stands for Representational State Transfer. It is an architectural style
    that defines a set of constraints and properties based on how web components communicate.


    REST is often used in the context of web services, where it defines how resources


    are exposed and accessed by clients. A client can be any type of application that
    makes requests to a web service, such as a web browser, mobile app, or desktop
    application. In REST, the client is responsible for managing its own state, and
    the server is responsible for processing requests and returning responses. This
    separation of concerns simplifies application development and deployment.


    REST defines a set of principles that are designed to make web services more


    scalable, flexible, and maintainable. These principles include:


    • Resources are exposed as URI (uniform resource identifier) paths.


    A RESTful application should have a uniform interface that is


    consistent across all resources and operations. This makes the


    application easier to use and understand.


    • HTTP methods are used to access and manipulate resources.


    • Resources are represented in a format that is understandable by both


    clients and servers (usually JSON or XML).


    • There is stateless communication between the client and server.


    REST is often compared to other architectural styles, such as SOAP. However, there


    are some key differences between the two.


    **REST vs. SOAP**


    As you learned in previous sections, REST and SOAP are two popular web service


    technologies. The main difference between REST and SOAP is that REST is a lighter-


    weight protocol that doesn’t rely on as much infrastructure as SOAP. This makes
    it less resource intensive, and therefore generally faster and less expensive
    to implement.


    REST can be built entirely on an open-source stack. SOAP, on the other hand, requires
    expensive software and hardware for development as well as for production deployment.


    REST is more distributable than SOAP too, as it can be easily deployed on a variety
    of platforms.


    Chapter 5 MiCroserviCes arChiteCture


    Additionally, REST is simpler than SOAP. REST services are often easier to develop


    and test than SOAP services. REST is more scalable than SOAP, as it is stateless.
    RESTful applications can be more easily scaled. In addition, REST is more flexible
    than SOAP


    because RESTful applications can be more easily extended and customized.


    SOAP, on the other hand, is a more robust and feature-rich protocol. It includes


    support for security and transaction handling, which makes it well suited for
    mission-critical applications. SOAP services are also generally more interoperable
    than REST


    services since they can be used with a variety of programming languages and platforms.


    Having discussed the service-oriented architecture options, the next section delves


    into the evolution of microservices.


    **The Monolithic Architecture**


    A monolithic architecture is the traditional unified model of software development.
    In this model, a software application is composed of a single, large codebase.
    This type of application is typically difficult to maintain and scale, due to
    its lack of modularity. A monolithic application is usually built as a single,
    self-contained unit, which can make it hard to add new features or update existing
    ones. Monolithic applications are often difficult to test and deploy because they
    require all of their dependencies to be installed and configured correctly. This
    can make it hard to ensure that the application will work correctly in different
    environments.


    Monolithic applications can be a good choice for small projects that are not expected
    to grow very much over time. They can also be a good choice for projects that
    need to be very tightly coupled. However, for most applications, a more modular
    approach is


    typically a better choice.


    Scalability is usually a major issue with monolithic applications. Because the
    entire application is built as a single unit, it can be hard to add new features
    or scale existing ones. Monolithic applications are often difficult to decompose
    into smaller services that can be deployed independently.


    If you’re considering using a monolithic application, you should also be aware
    of the potential difficulties that come with this type of application.


    –


    **Fragile codebase:** A large codebase is difficult to maintain and there


    is a greater risk of introducing bugs.


    –


    **Difficult to test:** It can be hard to test a monolithic application because


    all of its dependencies must be installed and configured correctly.


    Chapter 5 MiCroserviCes arChiteCture


    –


    **Deployment challenges:** Monolithic applications can be difficult to


    deploy because they require all of their dependencies to be installed


    and configured correctly.


    –


    **Scalability issues:** Monolithic applications can be difficult to scale


    because they are not modular. It can be hard to add new features or


    scale existing ones.


    **Evolution of the Microservices Architecture**


    The origins of the microservices architecture can be traced back to the early
    days of distributed computing, when systems were designed to break large tasks
    into smaller


    parts that could be processed independently. This approach advocated for building


    systems out of small, composable services.


    In the early 2000s, service-oriented architectures (SOA) emerged as a popular
    way


    to build distributed systems. The technologies like Web Services Description Language
    (WSDL) and Simple Object Access Protocol (SOAP) allowed developers to define and


    exchange services over HTTP.


    However, SOA had some limitations. Firstly, it wasn’t easy to scale SOA systems


    horizontally because each service had its dedicated infrastructure. Secondly,
    SOA


    systems were often complex and fragile, and it was difficult to manage dependencies


    between services.


    In the 2010s, the microservices architecture emerged as a lightweight alternative
    to SOA. These systems are composed of small, modular services that can be deployed
    and


    operated independently. This approach is in contrast to a *monolithic architecture,*
    where all the components of a system are bundled into a single, large executable
    file. The most notable example of a microservices architecture is the Twitter
    platform.


    Monolithic architectures are popular because they are simple and easy to


    understand. However, they have several drawbacks, including scalability and


    maintainability problems. On the other hand, microservices are based on the principles
    of modularity and decentralization, and they emphasize simplicity and scalability.


    Thanks to advances in DevOps tools and practices, it has become easier than ever
    to


    deploy and manage microservices-based systems.


    Chapter 5 MiCroserviCes arChiteCture


