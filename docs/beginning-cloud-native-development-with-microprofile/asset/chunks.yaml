    ## Benefits of Cloud Computing


    In recent years, the use of cloud computing has grown exponentially. This is because
    cloud computing can provide several benefits, such as the following:


    - Cost savings: Cloud computing can save you money on hardware and software costs.
    For example, you can use a cloud-based storage service instead of buying a physical
    hard drive. Cloud-based storage can be more cost-effective than buying a physical
    hard drive. This is because you don’t have to buy expensive hardware, like a computer.
    You also save money on software costs by using a cloud-based application instead
    of buying a software program for your local machine. This is a significant benefit
    of cloud-based solutions—you don’t have to worry about capital expenditure for
    hardware and software, regular patching, or data center upkeep. The provider takes
    care of all of these tasks. This can save you time and money, and it makes it
    easy to get started with cloud computing.

    - Flexibility and scalability: Cloud computing gives you the ability to scale
    your resources up or down, depending on your needs. For example, if you have a
    sudden increase in traffic to your website, you can quickly add more servers to
    handle the load. On the other hand, if you have decreased traffic, you can remove
    servers to save on costs. This can also save you money on your computing costs.

    - Reliability: Cloud-based services are more reliable than on-premises solutions.
    This is because cloud providers have the resources and expertise to ensure that
    their services are always up and running. Cloud services are distributed across
    multiple servers, so there is no single point of failure. The data is replicated
    across multiple servers across multiple availability zones, so if one server goes
    down, the others can pick up the slack. They have a disaster recovery plan in
    place, which helps ensure that your data is always safe and accessible.

    - Productivity: Cloud computing can improve your team’s productivity by giving
    it the ability to access information and applications from anywhere in the world.


    ## Essential Characteristics of Cloud Computing


    The cloud computing model comprises five essential characteristics, as shown in
    Figur[e 1-3\. T](#index_split_000.html#p26)hey are on-demand self-service, broad
    network access, resource pooling, rapid elasticity, and measured service. Let’s
    look at each of these characteristics in detail.


    ![](index-26_1.jpg)


    Chapter 1 IntroduCtIon to Cloud ComputIng


    Figure 1-3. Essential characteristics of cloud computing


    ### On-Demand Self-Service


    Users can access the cloud services without interacting with the service provider.
    They can simply sign up for a service through a web-based interface and start
    using it immediately. For example, users can sign up for cloud services and start
    using them to store their data without needing to contact customer support. This
    characteristic enables users to get started with cloud services quickly and easily
    without needing complex configuration.


    ### Broad Network Access


    Cloud services can be accessed over a network using any standard devices, such
    as laptops, smartphones, and tablets. For example, users can access their cloud
    storage accounts from anywhere in the world using their laptops or smartphones.
    This characteristic makes cloud services very convenient and accessible.


    ### Resource Pooling


    The cloud provider pools the resources like storage, processing, memory, and network
    bandwidth from multiple customers and makes them available on demand. Multi-tenancy
    is a crucial feature of cloud computing that enables providers to share resources
    among multiple customers. In this model, each customer is given a dedicated portion
    of the resources and is isolated from other customers. This helps providers manage
    and monitor the resources more effectively and provides customers with added security
    and privacy. This characteristic also enables efficient utilization of resources
    and reduces the cost of ownership.


    ### Rapid Elasticity


    Cloud services can be quickly scaled up or down to meet the changing needs of
    the users. In some cases, consumers may automatically be able to scale their usage
    up or down, depending on the cloud provider’s policies. For example, a social
    networking site may need to quickly add more servers during a significant event,
    such as an election or a natural disaster. In other cases, users may need to scale
    down their usage to save costs. This characteristic enables cloud providers to
    allocate resources dynamically with the flexibility to increase or decrease their
    usage as required.


    ### Measured Service


    Cloud providers offer metered services that are charged according to their actual
    usage. In addition, cloud systems can automatically control and optimize resources
    by leveraging a pattern in metering. For example, a cloud storage service may
    automatically move data to cheaper storage tiers when it is not accessed for a
    specific period. This characteristic provides users with greater control over
    their usage and costs.


    ## Types of Cloud Computing Based on Deployment Models


    There are four main types of cloud computing: public, community, private, and
    hybrid. Figur[e 1-4 sho](#index_split_000.html#p28)ws each of these different
    types of cloud computing based on deployment models.


    ![](index-28_1.png)


    Chapter 1 IntroduCtIon to Cloud ComputIng


    Figure 1-4. Types of cloud computing based on deployment models


    The following sections discuss each type of cloud computing in detail.


    ### Public Cloud


    A public cloud is a type of cloud computing that delivers hosted services over
    the Internet. Public clouds are owned and operated by third-party companies that
    provide their resources—such as servers, storage, and applications—to customers
    on demand. The most common examples of public clouds are Gmail and Dropbox. These
    services allow users to access their data and applications from any device with
    an Internet connection.


    ### Benefits of a Public Cloud


    The main advantage of using a public cloud is that it’s highly scalable, and you
    only pay for the resources you use. For example, you can buy more storage space
    if you need to store more data in Gmail. Public clouds are also convenient because
    they can be accessed from anywhere worldwide.


    ### Drawbacks of a Public Cloud


