    \ built using the MicroProfile platform. It is a specification that builds on\
    \ top of the OpenAPI specification and adds capabilities specific to the MicroProfile\
    \ initiative.\n\nMicroProfile OpenAPI provides tools and APIs that can be used\
    \ to generate documentation for RESTful APIs. This documentation can be used by\
    \ developers to understand the API and generate client code. The MicroProfile\
    \ OpenAPI specification defines a standard format for documenting RESTful APIs.\n\
    \n## Using the MicroProfile OpenAPI to Document a REST API\n\nTo document a JAX-RS\
    \ REST API using the MicroProfile OpenAPI, you need to annotate the JAX-RS resource\
    \ classes and methods with the OpenAPI annotation. The OpenAPI annotation is used\
    \ to configure the documentation for a JAX-RS resource.\n\nFirst, you need to\
    \ add the MicroProfile OpenAPI dependency to your project:\n\n```xml\n<dependency>\n\
    \  <groupId>org.eclipse.microprofile.openapi</groupId>\n  <artifactId>microprofile-openapi-api</artifactId>\n\
    \  <version>1.0.0</version>\n</dependency>\n```\n\nChapter 8 MiCroprofile JSoN\
    \ Web tokeNS aNd Jakarta SeCurity\n\nNext, you need to configure the OpenAPI documentation.\
    \ This can be done by using the `@OpenAPIDefinition` annotation:\n\n```java\n\
    import jakarta.ws.rs.GET;\nimport jakarta.ws.rs.Path;\nimport org.eclipse.microprofile.openapi.annotations.Operation;\n\
    import org.eclipse.microprofile.openapi.annotations.tags.Tag;\nimport org.eclipse.microprofile.openapi.annotations.OpenAPIDefinition;\n\
    import org.eclipse.microprofile.openapi.annotations.info.Info;\nimport org.eclipse.microprofile.openapi.annotations.servers.Server;\n\
    \n@OpenAPIDefinition(\n    info = @Info(\n        title = \"Products API\",\n\
    \        version = \"1.0.0\",\n        description = \"This is Products API.\"\
    \n    ),\n    servers = {\n        @Server(url = \"/api\")\n    }\n)\n@Path(\"\
    /greeting\")\npublic class GreetingResource {\n\n    @GET\n    @Operation(summary\
    \ = \"Say hello\", tags = {\"greeting\"})\n    public String sayHello() {\n  \
    \      return \"Hello\";\n    }\n}\n```\n\nThe `@OpenAPIDefinition` annotation\
    \ configures the overall documentation for the API. The `@Info` annotation configures\
    \ information about the API, such as the title, version, and description. The\
    \ `@Server` annotation configures the URL of the API server.\n\nChapter 8 MiCroprofile\
    \ JSoN Web tokeNS aNd Jakarta SeCurity\n\nThis example annotates the `sayHello()`\
    \ method with the `@Operation` annotation. This annotation configures information\
    \ about the operation, such as the summary and tags. The tags can be used to group\
    \ related operations.\n\nThe MicroProfile OpenAPI implementation will generate\
    \ the documentation for the API based on the annotations. The generated documentation\
    \ will be in the OpenAPI format.\n\n`Table [8-1](#index_split_003.html#p229)`\
