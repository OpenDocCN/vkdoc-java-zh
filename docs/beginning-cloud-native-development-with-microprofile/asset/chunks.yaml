    On macOS or Linux, you need to run the `curl` command, as shown here:


    ```bash

    curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-<operating
    system>-<architecture>

    sudo install minikube-<operating system>-<architecture> /usr/local/bin/minikube

    ```


    Be sure to replace `<architecture>` with `x86-64` or `arm64` and `<operation system>`
    with `linux` for Linux operating system or `darwin` for macOS. You are prompted
    to enter your administration or root password for the system.


    This will install the latest Minikube stable release using the binary download.


    Now start the Docker service on your machine and verify the installation by running
    the following command:


    ```bash

    minikube start

    ```


