- fmt: '## Cloud-Native App Development


    Cloud-native app development. These include continuous integration/continuous
    delivery (CI/CD), microservices architecture, containerization, serverless computing,
    API management, security, and more.


    Cloud-native application development is a multi-phase process. Each phase is important
    and needs to be given the attention it deserves.


    - Continuous integration/continuous delivery (CI/CD): In this phase, developers
    integrate code changes into a central repository and then deploy them to a test
    environment for verification. Changes that pass the verification process are then
    promoted to a production environment. This process is continuous, so new changes
    are always being made and tested.

    - Infrastructure as code: In this phase, all infrastructure is defined and provisioned
    using code. This allows for greater flexibility and easier reproducibility of
    environments.

    - Microservices architecture: In this phase, the app is broken into smaller components
    called microservices. Each microservice is responsible for a specific task and
    can be deployed independently of the others. This makes the app more scalable
    and resilient.

    - Containerization: In this phase, the microservices are packaged into containers
    for deployment. Containers allow microservices to run on any platform without
    modification and make it easier to manage and scale them.

    - Serverless computing: In this phase, the app is run in a “serverless” environment
    where a third party manages the servers. This eliminates the need to manage servers
    or infrastructure and makes it easier to scale the app as needed.

    - API management: In this phase, the APIs that underpin the app are created and
    managed. This helps ensure that they are safe and secure and can be easily accessed
    by clients.

    - Security: In this phase, security is implemented throughout the life of the
    app. This includes measures such as authentication, authorization, and data encryption.

    - DevOps culture shift: The DevOps culture shift is necessary to enable the successful
    development and deployment of cloud-native applications. DevOps is all about collaboration
    between developers and operations staff. It helps to automate the software development
    process and to improve communication between teams. In addition, DevOps helps
    to increase the speed of delivery and to improve quality.

    - Observability (monitoring and logging): The app’s performance is monitored and
    logged in this phase. This helps identify issues and diagnose problems.


    The cloud-native app development process is iterative, so these phases are not
    necessarily completed in order. However, they do represent the typical progression
    of a cloud-native app from initial development to production. Now that you understand
    the basics of cloud-native app development, you are ready to start developing
    your own apps. Later in this book, you put what you’ve learned into practice by
    building a cloudnative app. In the next chapter, you learn how to set up your
    development environment.


    ## Chapter 3


