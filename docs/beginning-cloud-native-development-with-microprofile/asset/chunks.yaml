    \ It will also listen to changes to the source code and configuration like dev\
    \ mode. Based on these changes, the source code is automatically rebuilt, the\
    \ server is restarted, or the configuration is reloaded, as required.\n\n### Table\
    \ B-1 (continued)\n\n#### Maven Command and Description\n\n`mvn liberty:create`\
    \  \nCreates a new Open Liberty project with a default `server.xml` file.\n\n\
    `mvn liberty:package`  \nCreates a `.war` file that can be deployed to any Open\
    \ Liberty server. If it’s used with the `-Dinclude=runnable` option, the command\
    \ will create a runnable `.jar` file with all the required dependencies. This\
    \ file can then be executed using the `java -jar` command to start the application.\n\
    \n`mvn liberty:deploy`  \nDeploys the application to the running server.\n\n`mvn\
