- fmt: '## Hardware Requirements


    To develop cloud-native Java applications, you need the following hardware:


    - **CPU:** The CPU requirements for developing cloud-native Java applications
    are not very demanding. However, you will get better performance if you have a
    higher-end CPU with multiple cores.

    - **Memory:** `4GB` of RAM or more

    - **Hard drive space:** At least `50GB` of free disk space


    ## Operating Systems


    The operating system requirements for developing cloud-native Java applications
    are also modest. You can use any of the following operating systems:


    - Windows 10 or later

    - macOS 10.13 or higher

    - Linux: Ubuntu 18.04 or higher, Fedora 28 or higher


    If you are not sure about the system architecture of your computer, you can use
    the following commands to determine it.


    In Linux or macOS, you can find your system architecture by running the following
    command:


    ```bash

    uname -m

    ```


    The output of this command will show the architecture of your system. For example,
    on a 64-bit system, you see the following output:


    ```text

    x86_64

    ```


    For Windows, use the following command:


    ```bat

    echo %PROCESSOR_ARCHITECTURE%

    ```


    ## Software Dependencies


    In addition to the hardware requirements, you need to install a few software dependencies
    before you can start developing cloud-native Java applications. These dependencies
    include the following:


    - **JDK 17 or later:** You can download the latest JDK from the Oracle website
    (`www.oracle.com/java/technologies/downloads/`).

    - **Maven:** You can download Maven from the Apache Maven website (`https://maven.apache.org/`).

    - **Git:** You can download Git from the Git website (`https://git-scm.com/`).

    - **GitHub account:** If you do not have one, you can create a free account on
    the GitHub website (`https://github.com/`).

    - **Docker:** You must download Docker Desktop for Mac or Windows.

    - **Docker Hub account:** You need an account on the Docker Hub website. You can
    create one at `https://hub.docker.com/` if you don’t already have one.


    ## Installing Java Development Kit (JDK)


    Java Development Kit (JDK) is a software development environment used to develop
    Java applications. It includes the Java Runtime Environment (JRE), which is required
    to run Java applications, and the Java compiler, which is used to compile Java
    source code into bytecode.


    Before installing the JDK, you need to check if you already have it installed
    on your system. To do this, open a terminal window and type the following command:


    ```bash

    java -version

    ```


    If the JDK is installed on your system, you should see something like the following
    output:


    ```text

    java version "17.0.1" 2021-10-19 LTS

    Java(TM) SE Runtime Environment (build 17.0.1+12-LTS-jvmci-21.3-b05)

    Java HotSpot(TM) 64-Bit Server VM (build 17.0.1+12-LTS-jvmci-21.3-b05, mixed mode,
    sharing)

    ```


    If you see this output, this means the JDK is already installed on your system
    and you can skip to the next section.


    If you do not have the JDK installed on your system, follow these steps to install
    the JDK:


    1. Download JDK 17 or later from the Oracle website (`https://www.oracle.com/java/technologies/downloads/`).

    2. Once you have downloaded the JDK, run the downloaded installer and follow the
    on-screen instructions to complete the installation.'
