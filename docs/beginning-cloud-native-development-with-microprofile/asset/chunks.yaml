    使用 Docker 和 Kubernetes 对你的应用程序进行容器化，以管理部署。


    **第 9 章**


    **使用 Kubernetes**


    **对微服务进行**


    **容器化**


    本章将解释如何使用 Docker 和 Kubernetes 对你的微服务进行容器化。


    你将首先了解什么是容器，以及为什么应该使用容器。


    接着你将学习如何安装 Docker 和 Kubernetes。最后，你将学习如何使用 Docker 和 Kubernetes 将微服务部署到容器中。


    **什么是容器？**


    容器是一种软件打包方式，使其能够在同一主机上与其他软件隔离运行。这不同于虚拟化，在虚拟化中，每个客户操作系统都有自己的内核，并在其隔离环境中运行。


    对微服务进行容器化，是提升系统整体可靠性与弹性的绝佳方式。容器允许你将微服务及其所有依赖打包为一个单一单元。这使得微服务的部署和管理更加容易。


    **为什么使用容器？**


    使用容器的原因有很多，主要如下：


    © Tarun Telang 2023


    T. Telang，*《Beginning Cloud Native Development with MicroProfile, Jakarta EE,
    and Kubernetes》*，


    [`doi.org/10.1007/978-1-4842-8832-0_9`](https://doi.org/10.1007/978-1-4842-8832-0_9#DOI)


    第 9 章 使用 Kubernetes 对微服务进行容器化


    • **可移植性：** 容器可以轻松地从一台主机迁移到另一台主机。这是因为它们不依赖于主机操作系统。


    • **隔离性：** 容器彼此之间以及与主机操作系统相互隔离。如果一个容器崩溃，不会影响其他容器。


    • **高效性：** 容器比虚拟机使用更少的资源。这是因为每个容器共享主机操作系统内核。


    **什么是容器编排？**


    容器编排是指对容器化应用的部署、管理和扩缩容进行自动化的过程。最流行的容器编排工具是 Kubernetes。


    Kubernetes 是一个用于自动化部署、扩缩容和管理容器化应用的开源系统。它最初由 Google 设计，现在由云原生计算基金会（Cloud Native
    Computing Foundation）维护。Kubernetes 是一个可移植、可扩展、开源的平台，用于管理容器化工作负载和服务，并支持声明式配置与自动化。它拥有庞大且快速增长的生态系统。Kubernetes
    的服务、支持和工具都已广泛可用。


    **使用容器编排的好处**


    使用容器编排有很多好处，以下是主要优势：


    • **提升效率：** 容器编排工具可以通过自动化管理大量容器所需的许多任务，提升你的工作流效率。


    • **增强灵活性：** 容器编排工具可以让你更容易在各种环境中部署和管理应用程序。


    第 9 章 使用 Kubernetes 对微服务进行容器化


    • **改进可扩展性：** 容器编排工具可以通过按需轻松添加或移除容器，提升应用程序的可扩展性。


    • **增强安全性：** 容器彼此之间以及与主机操作系统相互隔离，这使恶意行为者更难访问你的数据或感染你的系统。


    • **降低成本：** 容器通过使用更少资源，帮助你降低应用运行成本。


    • **更易调试：** 容器编排工具通过提供系统中所有容器的统一视图，使应用问题调试更容易。


    **理解 Kubernetes 术语**


    在你深入学习并开始使用 Kubernetes 管理容器之前，你应当先熟悉一些与 Kubernetes 相关的重要术语。


    **Pod**：由一个或多个容器组成的一组单元，共享存储/网络，并且一个

    '
- fmt: '## Kubernetes 基本概念


    `pod`的运行规范定义了如何运行容器。`pod`表示一个部署单元；它可以是单个应用容器，或一组协同部署的容器，这些容器作为一个组运行在 Kubernetes
    节点上。


    `Kubelet`：`kubelet`是在每个工作节点上运行的进程，用于管理节点上的`pods`。`kubelet`确保`pods`处于运行且健康状态，并与主节点通信以协调应用在节点上的部署。


    `Node`：Kubernetes 中的工作机器，是集群的一部分。根据集群类型，节点可以是 VM 或物理机（裸金属）。每个节点运行 Kubernetes 代理，并由主控组件管理。


    `Worker node`：运行应用程序和云服务。工作节点承载`pods`并运行其中的容器。每个工作节点上都运行`kubelet`和`kube-proxy`。


    - `kubelet`负责在节点上运行和管理`pods`。

    - `kube-proxy`是在每个工作节点上运行的进程，管理节点上服务的网络。它负责服务的网络与负载均衡，并确保流量被正确路由到对应服务。


    `Control plane node`：运行 Kubernetes 控制平面组件，包括 API server、scheduler 和 controller
    manager。一个集群中只有一个控制平面节点。用户提供的应用不会运行在控制平面节点上。


    `Master node`：运行 Kubernetes 主控组件的节点。一个 Kubernetes 集群只有一个主节点。主节点用于管理 Kubernetes
    集群。主节点上运行多个进程，包括`kube-apiserver`、`kube-controller-manager`和`kube-scheduler`。


    - `kube-apiserver`暴露 Kubernetes API。`kubelet`通过它与主节点通信。

    - `kube-controller-manager`管理 replication controllers 和 services，负责确保集群中应用维持在期望状态。

    - `kube-scheduler`将`pods`调度到节点上，负责确保应用在集群节点之间实现负载均衡。


    `Kubernetes cluster`：由一组称为节点（nodes）的机器组成，用于运行容器化应用。


    `Service`：向网络暴露以提供流量服务的`pod`。当创建 service 时，Kubernetes 会创建对应的负载均衡器，将流量路由到`pod`。


    `Replication controller`：确保在任意时刻有指定数量的`pod`副本在运行。如果副本过少，控制器会创建更多；如果副本过多，控制器会删除多余副本。典型场景是确保
    Web 服务器始终有固定数量在运行。


    `Labels`：附加到对象（如`pods`）上的键值对，用于组织和选择对象分组。


    `Annotations`：附加到对象（如`pods`）上的键值对。注解不影响对象标识，但可用于存储文档或其他用途的任意数据。


    ## Kubernetes 的关键特性


    Kubernetes 是当前部署容器化应用的流行选择，提供了许多特性：


    - 自动部署：当代码库发生变化时，Kubernetes 可自动部署应用，并在必要时回滚部署。

    - 存储编排：Kubernetes 可自动为应用配置存储并支持多种存储后端，还可自动挂载本地存储、公有云存储等系统。

    - 滚动更新：Kubernetes 可逐节点更新应用而不中断服务，在保证无停机的情况下发布新版本。

    - 自动装箱（bin-packing）：Kubernetes 自动将容器调度到集群节点上，高效使用可用资源。

    - 监控：Kubernetes 可生成系统各方面的详细日志和监控数据，用于故障排查或性能优化。

    - 健康检查：Kubernetes 可对应用执行健康检查，确保其按预期运行，并在必要时重启或替换异常组件。

    - 自愈：当 Kubernetes 集群中的节点故障时，系统会检测故障并将受影响的`pods`调度到其他节点运行。

    - 水平扩缩容：Kubernetes 可根据需要通过增减集群节点来扩展应用。

    - 自动扩缩容：Kubernetes 可根据流量自动扩展或缩减应用，也可对应用各组件独立扩缩容。

    - 负载分发：Kubernetes 可在集群不同节点间分发负载，并基于资源可用性自动将应用调度到特定节点。

    - 服务发现与负载均衡：Kubernetes 会为集群中每个`pod`自动分配唯一 IP 地址，并在其间进行负载均衡。

    - 密钥与配置管理：通过 secrets，Kubernetes 可存储和管理密码、API keys 等敏感信息；配置数据可存储在 config maps 中。


    ## 使用 Kubernetes


    Kubernetes 可通过多种方式大规模管理容器化应用。最常见方式是使用公有云托管 Kubernetes 服务，例如 Google Kubernetes
    Engine (`GKE`) 或 Amazon Elastic Container Service for Kubernetes (`EKS`)。这些服务可处理基础设施管理任务，如节点供应、Kubernetes
    部署等。


    另一种方式是使用`kubeadm`等工具自行安装和管理 Kubernetes。如果你希望对基础设施有更多控制，或在私有数据中心运行 Kubernetes，这通常是不错的选择。


    Kubernetes 也可用于管理非容器化应用。这通常通过构建所谓“裸金属”集群来实现，可用于部署和管理 VM 甚至物理服务器。


    当 Kubernetes 运行后，你可以通过多种方式部署应用。最常见的是使用容器镜像，这些镜像可从 Docker Hub 等公共仓库或私有仓库拉取。你也可以使用
    Jenkins 等构建工具，通过 Kubernetes 直接部署源代码。


    Kubernetes 也常与其他工具配合使用，例如 Prometheus（`https://prometheus.io/`）用于监控，Istio（`https://istio.io/`）用于服务网格，以及
    Helm（`https://helm.sh/`）用于包管理。


    ## 使用 Docker 容器


    首先，确保系统已安装 Docker。要将应用容器化，需要创建`Dockerfile`。`Dockerfile`是一个文本文件，包含用于构建和运行容器的命令。在`Dockerfile`中，你需要指定容器使用的基础镜像，以及构建和运行应用所需的命令。


    基础镜像是可用于创建新镜像的预构建镜像。例如，如果你要创建 Open Liberty Server 的镜像，可以使用一个已安装并配置 Java runtime
    和 Open Liberty server 的基础镜像。'
  raw: 'specification for how to run the containers. A pod represents a unit of deployment;
    a single application container, or set of collocated containers, that you want
    to run as a group on a Kubernetes node.


    **Kubelet**: A kubelet is a process that runs on each worker node and manages


    pods on the node. The kubelet ensures that the pods are running and healthy. It
    also communicates with the master nodes to coordinate the deployment of applications
    on


    the nodes.


    **Node:** A worker machine in Kubernetes; part of a cluster. Depending on the
    cluster, a node can be a VM or a physical machine (bare-metal). Each node runs
    Kubernetes


    agents and is managed by the master components.


    **Worker node:** Runs your applications and cloud services. Worker nodes host
    pods and run the containers in those pods. Each worker node has a kubelet and
    a kube-proxy running on it.


    • The *kubelet* is responsible for running and managing pods on


    the node.


    Chapter 9 Containerizing MiCroserviCes Using KUbernetes


    • A *kube-proxy* is a process that runs on each worker node and


    manages networking for the services on the node. It is responsible


    for networking and load balancing for the services on the node. The


    kube-proxy ensures that traffic to the services is appropriately routed.


    **Control plane node:** Runs the Kubernetes control plane components, including
    the API server, scheduler, and controller manager. There is only one control plane
    node in a cluster. You do not run user-provided applications on a control plane
    node.


    **Master node:** The node that runs the Kubernetes master components. A Kubernetes
    cluster has only one master node. A master node is used to manage the Kubernetes


    cluster. The master node has several processes running on it, including the kube-


    apiserver, kube-controller-manager, and kube-scheduler.


    • The *kube-apiserver* exposes the Kubernetes API. The kubelet uses it


    to communicate with the master node.


    • The *kube-controller-manager* manages replication controllers


    and services. It is responsible for ensuring that the desired state is


    maintained for the applications running in the cluster.


    • The *kube-scheduler* schedules pods to run on nodes. It is responsible


    for ensuring that the applications are balanced across the nodes in


    the cluster.


    **Kubernetes cluster:** A set of machines, called nodes, that run containerized


    applications.


    **Service**: A pod that is exposed to the network to serve traffic. Kubernetes
    creates a corresponding load balancer to route traffic to your pod when you create
    a service.


    **Replication controller:** A replication controller ensures that a specified
    number of pod replicas are running at any given time. If there are too few replicas,
    the controller creates more. If there are too many replicas, the controller deletes
    extras. A typical use case for a replication controller is to ensure that a specified
    number of web servers are running at all times.


    **Labels:** Key/value pairs attached to objects, such as pods. Labels enable users
    to organize and select groups of objects.


    **Annotations:** Key/value pairs attached to objects, such as pods. Annotations
    do not affect the identity of an object, but they can be used to store arbitrary
    data for documentation or other purposes.


    Chapter 9 Containerizing MiCroserviCes Using KUbernetes


    **The Key Features of Kubernetes**


    Kubernetes is a popular choice for deploying containerized applications today.
    It offers many features, such as:


    • **Automatic deployment:** Kubernetes can automatically deploy your


    applications when there are changes to the codebase and can roll


    back deployments if necessary.


    • **Storage orchestration:** Kubernetes can automatically provision


    storage for applications and support various storage backends. It can


    automatically mount storage systems, such as local storage, public


    cloud providers, and more.


    • **Rolling updates:** Kubernetes can perform rolling updates of


    applications, which means it can update an application one node


    at a time without disrupting service. It rolls out new versions of an


    application while ensuring no downtime.


    • **Automatic bin-packing:** Kubernetes automatically schedules


    containers onto cluster nodes to efficiently use available resources.


    • **Monitoring:** Kubernetes can generate detailed logs and monitoring


    data for all aspects of the system, which can be used to troubleshoot


    problems or optimize performance.


    • **Health checks:** Kubernetes can perform health checks on


    applications to ensure that they are running as expected, and it can


    restart or replace unhealthy components if necessary.


    • **Self-healing:** If a node fails in a Kubernetes cluster, the system


    will detect the failure and schedule the affected pods to run on


    other nodes.


    • **Horizontal scaling:** Kubernetes makes it easy to scale your


    application by adding or removing nodes in the cluster as needed.


    • **Auto-scaling:** Kubernetes can automatically scale applications


    up or down based on traffic levels and can also scale individual


    components of an application separately.


    Chapter 9 Containerizing MiCroserviCes Using KUbernetes


    • **Distribution of the load:** Kubernetes can distribute the load between


    different nodes in a cluster and automatically schedule applications


    to run on specific nodes based on available resources.


    • **Service discovery and load balancing:** Kubernetes automatically


    assigns a unique IP address to each pod in the cluster and can load-


    balance traffic across them.


    • **Secrets and configuration management**: Using secrets, Kubernetes


    can store and manage sensitive information, such as passwords and


    API keys. Configuration data can be stored in config maps.


    **Using Kubernetes**


    Kubernetes can be used to manage containerized applications at scale in a variety
    of ways. The most common way is to use a managed Kubernetes service from a public


    cloud provider, such as Google Kubernetes Engine (GKE) or Amazon Elastic Container


    Service for Kubernetes (EKS). These services take care of all the infrastructure


    management tasks, such as provisioning nodes, deploying Kubernetes, and more.


    Another option is installing and managing Kubernetes using tools such as *kubeadm*.


    This can be a good choice if you want more control over the infrastructure or
    if you’re running Kubernetes in a private data center.


    Kubernetes can also be used to manage non-containerized applications. This is
    done


    by creating so-called “bare-metal” clusters, which can be used to deploy and manage


    VMs or even physical servers.


    Once Kubernetes is up and running, you can use it to deploy applications using
    a


    variety of methods. The most common way is to use container images, which can
    be


    pulled from a public registry such as Docker Hub or a private registry. You can
    also use Kubernetes to deploy source code directly, using a build tool such as
    Jenkins.


    Kubernetes is also often used with other tools, such as Pr[ometheus (https://](https://prometheus.io/)


    [prometheus.io/) for monit](https://prometheus.io/)oring, Is[tio (https://istio.io/](https://istio.io/))
    for service mesh, and Helm ([https://helm.sh/) for p](https://helm.sh/)ackage
    management.


    Chapter 9 Containerizing MiCroserviCes Using KUbernetes


    **Using Docker Containers**


    First, make sure you have Docker installed on your system. To containerize an


    application, you need to create a Dockerfile. A Dockerfile is a text file that
    contains the commands used to build and run your container. In the Dockerfile,
    you specify the base image you want to use for your container and the commands
    that will be used to build and run your application.


    A base image is a pre-built image that can be used to create new images. For


    example, if you wanted to create an image for an Open Liberty Server, you could
    use


    a base image with Java runtime and an Open Liberty server installed and configured.'
