    For more information, see the MicroProfile REST Client documentation.


    The MicroProfile REST Client specification defines a Java API for invoking RESTful


    services. The API is similar to the JAX-RS 2.0 Client API, but it offers some
    additional features that are specific to MicroProfile.


    The main benefit of the MicroProfile REST Client is that it allows you to invoke
    REST


    services without having to write boilerplate code. This can make your code more
    concise and easier to read.


    Another benefit is that the MicroProfile REST Client defines a portable way to


    configure how the client is created and how it invokes the REST service. This
    means that you can deploy your application on any MicroProfile runtime and it
    will work with any compliant REST client implementation.


