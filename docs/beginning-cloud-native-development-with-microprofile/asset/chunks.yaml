- fmt: "# Jakarta EE Security 与 Servlet 安全\n\nThe Jakarta EE Security specification\
    \ defines various mechanisms to secure web services. It can configure basic authentication\
    \ mechanisms like HTTP Basic and Digest Authentication. It also supports form\
    \ authentication for web services.\n\nIn addition, it provides various options\
    \ to configure SSL for RESTful web services.\n\nIf you are using SSL or TLS, the\
    \ web service client must have a valid certificate to establish a secure connection\
    \ with the server. Once a connection is established, all data exchanged between\
    \ the client and server will be encrypted.\n\n## Securing a Servlet Using Jakarta\
    \ Security\n\nThe Jakarta Security specifications provide a complete security\
    \ solution for server-side Java applications. They offer both authentication and\
    \ authorization services.\n\nAuthentication is verifying that a user is who they\
    \ claim to be. Authorization is the process of determining what a user is allowed\
    \ to do.\n\nThe Jakarta Security project offers various mechanisms for securing\
    \ servlets, including custom authentication.\n\n`Form-based authentication` is\
    \ the most common way of authenticating users on the web. In this method, the\
    \ user is presented with a login form where they enter a username and password.\
    \ If the credentials are valid, the user is granted access to the protected resources.\n\
    \n`Basic authentication` is a simpler method of securing servlets. In HTTP basic\
    \ authentication, the web server prompts the user for a username and password.\
    \ The credentials are then verified by the server. If the credentials are valid,\
    \ the user is granted access to the protected resources. HTTP basic authentication\
    \ transmits the username and password in clear text, which is not as secure as\
    \ form-based authentication.\n\nHowever, it is possible to use HTTPS with HTTP\
    \ basic authentication to protect the credentials from being intercepted by attackers.\n\
    \n`Digest authentication` is like basic authentication, except that the password\
    \ is not sent in clear text. Instead, a one-way hash of the password is calculated\
    \ and sent to the server. The server then calculates the hash of the password\
    \ received and compares it with the sent hash. If they match, then the user is\
    \ considered authenticated.\n\n`Custom authentication` allows you to write your\
    \ authentication code. This is the most flexible way of securing servlets. With\
    \ custom authentication, you can use any authentication scheme you want.\n\nBoth\
    \ form-based authentication and basic authentication can be used to secure servlets.\
    \ However, form-based authentication is generally more secure than HTTP Basic\
    \ authentication. Form-based authentication can also use HTTPS to secure communication\
    \ between the client and the server. When using HTTPS, the user's credentials\
    \ are encrypted and cannot be intercepted by third-party attackers.\n\nJakarta\
    \ Security also provides a security filter that can be used to secure servlets.\
    \ The security filter intercepts all requests to the protected resources and verifies\
    \ that the user has the necessary permissions to access the resources.\n\n## 在\
    \ `web.xml` 中配置 HTTP Basic 认证\n\nTo use HTTP basic authentication with a RESTful\
    \ web service, you need to configure it in the `web.xml` file. The following is\
    \ the configuration for HTTP basic authentication in the `web.xml` file:\n\n```xml\n\
    <security-constraint>\n  <web-resource-collection>\n    <web-resource-name>secured</web-resource-name>\n\
    \    <url-pattern>/*</url-pattern>\n  </web-resource-collection>\n  <auth-constraint>\n\
    \    <role-name>user</role-name>\n  </auth-constraint>\n</security-constraint>\n\
    \n<login-config>\n  <auth-method>BASIC</auth-method>\n  <realm-name>default</realm-name>\n\
    </login-config>\n```\n\nThis configuration defines a security constraint that\
    \ restricts access to any resource in the web application to users with the `user`\
    \ role. It also configures the web application to use HTTP basic authentication.\n\
    \nOnce you have configured HTTP basic authentication, you can access the secured\
    \ resources using a browser by providing the username and password when prompted."
  raw: 'The Jakarta EE Security specification defines various mechanisms to secure
    web


    services. It can configure basic authentication mechanisms like HTTP Basic and
    Digest Authentication. It also supports form authentication for web services.


    In addition, it provides various options to configure SSL for RESTful web services.


    If you are using SSL or TLS, the web service client must have a valid certificate
    to establish a secure connection with the server. Once a connection is established,
    all data exchanged between the client and server will be encrypted.


    **Securing a Servlet Using Jakarta Security**


    The Jakarta Security specifications provide a complete security solution for server-


    side Java applications. They offer both authentication and authorization services.


    Authentication is verifying that a user is who they claim to be. Authorization
    is the process of determining what a user is allowed to do.


    The Jakarta Security project offers various mechanisms for securing servlets,


    including custom authentication.


    *Form-based authentication* is the most common way of authenticating users on
    the web. In this method, the user is presented with a login form where they enter
    a username and password. If the credentials are valid, the user is granted access
    to the protected resources.


    Chapter 8 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity


    *Basic authentication* is a simpler method of securing servlets. In HTTP basic
    authentication, the web server prompts the user for a username and password. The


    credentials are then verified by the server. If the credentials are valid, the
    user is granted access to the protected resources. HTTP basic authentication transmits
    the username


    and password in clear text, which is not as secure as form-based authentication.


    However, it is possible to use HTTPS with HTTP basic authentication to protect
    the


    credentials from being intercepted by attackers.


    *Digest authentication* is like basic authentication, except that the password
    is not sent in clear text. Instead, a one-way hash of the password is calculated
    and sent to the server. The server then calculates the hash of the password received
    and compares it with the sent hash. If they match, then the user is considered
    authenticated.


    *Custom authentication* allows you to write your authentication code. This is
    the most flexible way of securing servlets. With custom authentication, you can
    use any


    authentication scheme you want.


    Both form-based authentication and basic authentication can be used to secure


    servlets. However, form-based authentication is generally more secure than HTTP


    Basic authentication. Form-based authentication can also use HTTPS to secure


    communication between the client and the server. When using HTTPS, the user''s


    credentials are encrypted and cannot be intercepted by third-party attackers.


    Jakarta Security also provides a security filter that can be used to secure servlets.
    The security filter intercepts all requests to the protected resources and verifies
    that the user has the necessary permissions to access the resources.


    To use HTTP basic authentication with a RESTful web service, you need to configure


    it in the web.xml file. The following is the configuration for HTTP basic authentication
    in the web.xml file:


    <security-constraint>


    <web-resource-collection>


    <web-resource-name>secured</web-resource-name>


    <url-pattern>/*</url-pattern>


    </web-resource-collection>


    <auth-constraint>


    <role-name>user</role-name>


    </auth-constraint>


    </security-constraint>


    Chapter 8 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity


    <login-config>


    <auth-method>BASIC</auth-method>


    <realm-name>default</realm-name>


    </login-config>


    This configuration defines a security constraint that restricts access to any
    resource in the web application to users with the user role. It also configures
    the web application to use HTTP basic authentication.


    Once you have configured HTTP basic authentication, you can access the secured


    resources using a browser by providing the username and password when prompted.'
  trans: '

    Jakarta EE Security 规范定义了多种用于保护 Web 服务的机制。


    它可以配置基础认证机制，例如 HTTP Basic 和 Digest 认证。它还支持用于 Web 服务的表单认证。


    此外，它还提供了多种为 RESTful Web 服务配置 SSL 的选项。


    如果你使用 SSL 或 TLS，Web 服务客户端必须拥有有效证书，才能与服务器建立安全连接。连接一旦建立，客户端与服务器之间交换的所有数据都将被加密。


    **使用 Jakarta Security 保护 Servlet**


    Jakarta Security 规范为服务器端 Java 应用提供了完整的安全解决方案。它们同时提供认证（Authentication）和授权（Authorization）服务。


    认证是用于验证用户是否为其所声称身份的过程。授权是用于确定用户被允许执行哪些操作的过程。


    Jakarta Security 项目提供了多种保护 Servlet 的机制，


    包括自定义认证。


    *基于表单的认证*是 Web 上最常见的用户认证方式。在这种方法中，会向用户展示一个登录表单，用户在其中输入用户名和密码。如果凭据有效，用户将被授予对受保护资源的访问权限。


    第 8 章 MicroProfile JSON Web Tokens 与 Jakarta Security


    *Basic 认证*是一种更简单的 Servlet 保护方法。在 HTTP Basic 认证中，Web 服务器会提示用户输入用户名和密码。随后，


    服务器会验证这些凭据。如果凭据有效，用户将被授予对受保护资源的访问权限。HTTP Basic 认证以明文传输用户名


    和密码，因此不如基于表单的认证安全。


    不过，可以将 HTTPS 与 HTTP Basic 认证一起使用，以防止


    凭据被攻击者截获。


    *Digest 认证*与 Basic 认证类似，不同之处在于密码不会以明文发送。相反，会计算密码的单向哈希并发送到服务器。随后服务器会对接收到的密码计算哈希，并将其与发送来的哈希进行比较。如果两者匹配，则认为用户已通过认证。


    *自定义认证*允许你编写自己的认证代码。这是保护 Servlet 最灵活的方式。通过自定义认证，你可以使用任何


    你想要的认证方案。


    基于表单的认证和 Basic 认证都可以用于保护


    Servlet。不过，通常基于表单的认证比 HTTP


    Basic 认证更安全。基于表单的认证也可以使用 HTTPS 来保护


    客户端与服务器之间的通信。使用 HTTPS 时，用户的


    凭据会被加密，第三方攻击者无法截获。


    Jakarta Security 还提供了一个可用于保护 Servlet 的安全过滤器。该安全过滤器会拦截对受保护资源的所有请求，并验证用户是否具备访问这些资源所需的权限。


    要在 RESTful Web 服务中使用 HTTP Basic 认证，你需要在 web.xml 文件中进行配置。以下是在 web.xml 文件中进行 HTTP
    Basic 认证的配置：


    <security-constraint>


    <web-resource-collection>


    <web-resource-name>secured</web-resource-name>


    <url-pattern>/*</url-pattern>


    </web-resource-collection>


    <auth-constraint>


    <role-name>user</role-name>


    </auth-constraint>


    </security-constraint>


    第 8 章 MicroProfile JSON Web Tokens 与 Jakarta Security


    <login-config>


    <auth-method>BASIC</auth-method>


    <realm-name>default</realm-name>


    </login-config>


    此配置定义了一个安全约束，将 Web 应用中任何资源的访问限制为仅具有 user 角色的用户。同时，它还将该 Web 应用配置为使用 HTTP Basic
    认证。


    完成 HTTP Basic 认证配置后，当浏览器提示时提供用户名和密码，你就可以通过浏览器访问受保护的


    资源。

