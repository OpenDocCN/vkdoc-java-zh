    This chapter looked at how to create RESTful web services using the Jakarta EE
    RESTful web services APIs and how to deploy them to the Open Liberty application
    server. The chapter provided you with an overview of REST (Representational State
    Transfer). It then discussed the key features of the Open Liberty runtime. You
