    API 类似，但提供了一些 MicroProfile 特有的附加功能。


    MicroProfile REST Client 的主要优势是它允许你在无需编写样板代码的情况下调用 REST 服务。这可以让你的代码更简洁、更易读。


    另一个优势是，MicroProfile REST Client 定义了一种可移植的方式，用于配置客户端的创建方式以及其调用 REST 服务的方式。这意味着你可以将应用部署在任何
    MicroProfile 运行时上，并且它能够与任何兼容的 REST 客户端实现一起工作。


