- fmt: "## 使用 Config API\n\n要使用 Config API，你需要在 `pom.xml` 中包含以下依赖：\n\n```xml\n<dependency>\n\
    \  <groupId>org.eclipse.microprofile.config</groupId>\n  <artifactId>microprofile-config-api</artifactId>\n\
    \  <version>1.0</version>\n</dependency>\n```\n\n## 在 Open Liberty 中启用 MicroProfile\
    \ Config\n\n要启用 `MicroConfig` 特性，你需要在服务器配置中添加以下代码（`xml` 文件）：\n\n```xml\n<featureManager>\n\
    \  <feature>mpConfig-1.4</feature>\n</featureManager>\n```\n\n## 使用 MicroProfile\
    \ Config\n\n`Config` 类提供了可用于访问配置属性的静态方法。添加依赖后，你可以创建一个名为 `MyConfig` 的类，如下所示：\n\n\
    ```java\nimport org.eclipse.microprofile.config.inject.ConfigProperty;\nimport\
    \ jakarta.enterprise.context.ApplicationScoped;\nimport jakarta.inject.Inject;\n\
    import jakarta.inject.Named;\n\n@ApplicationScoped\npublic class MyConfig {\n\n\
    \  @Inject\n  @ConfigProperty(name = \"greeting\", defaultValue=\"Hello\")\n \
    \ private String greeting;\n\n  public String getGreeting() {\n    return greeting;\n\
    \  }\n}\n```\n\n属性文件可以放在类路径或文件系统中，文件名为 `greeting.properties`。\n\n### 定义配置属性\n\n\
    下面是用于配置 `greeting` 属性的属性文件源码：\n\n```properties\ngreeting=Hello Microservices!\n\
    ```\n\n`MyConfig` 类是一个标准 Java 类，并使用了 `@ApplicationScoped` 注解，这意味着它只会创建一次，并在应用整个生命周期中复用。该类包含一个字段，使用\
    \ `@Inject` 和 `@ConfigProperty` 注解。`ConfigProperty` 注解会告诉 Config API 将 `greeting`\
    \ 属性值注入该字段。\n\n如果未找到该属性，则使用默认值 `Hello`。\n\n### 测试 Config 组件\n\n`getGreeting()`\
    \ 方法只是返回 `greeting` 字段的值。你可以通过创建一个使用它的 RESTful Web Service 端点来测试该类：\n\n```java\n\
    import jakarta.inject.Inject;\nimport jakarta.ws.rs.GET;\nimport jakarta.ws.rs.Path;\n\
    import jakarta.ws.rs.Produces;\nimport jakarta.ws.rs.core.MediaType;\n\n@Path(\"\
    /config\")\npublic class ConfigResource {\n\n  @Inject\n  private MyConfig myConfig;\n\
    \n  @GET\n  @Produces(MediaType.TEXT_PLAIN)\n  public String getGreeting() {\n\
    \    return myConfig.getGreeting();\n  }\n}\n```\n\n当你部署应用并调用 `/config` 端点时，你应该可以看到注入的\
    \ `greeting` 属性值：\n\n```text\nHello Microservices!\n```\n\n你还可以将配置属性注入到方法参数中，如下所示：\n\
    \n```java\nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\n//\
    \ ...\n\npublic class MyConfig {\n\n  // ...\n\n  @Inject\n  public void setGreeting(@ConfigProperty(name\
    \ = \"greeting\") String greeting)\n}\n```\n\n## 创建 ConfigSource\n\n如你所见，Config\
    \ API 让向应用中注入配置属性变得很容易。Config API 为配置实现定义了一套契约。`ConfigSource` 用于从特定来源读取配置数据。例如，你可以创建一个从文件读取配置数据的\
    \ `ConfigSource`。\n\n`ConfigSource` 接口包含以下方法：\n\n- `String getName()`：返回 `ConfigSource`\
    \ 的名称。\n- `int getOrdinal()`：返回 `ConfigSource` 的序号。序号决定 `ConfigSource` 的优先级，序号越高优先级越高。\n\
    - `Map<String, String> getProperties()`：返回此 `ConfigSource` 中属性的映射。`map` 中的键是属性名，值是属性值。\n\
    - `getValue(String propertyName)`：返回给定属性的值。如果属性不存在，返回 `null`。\n- `Set getPropertyNames()`：返回此\
    \ `ConfigSource` 中属性名的 `Set`。\n\n下面是一个简单的 `ConfigSource` 实现示例，它从文件中读取配置数据：\n\n\
    ```java\nimport org.eclipse.microprofile.config.spi.ConfigSource;\nimport java.io.IOException;\n\
    import java.util.HashMap;\n```"
  raw: 'To use the Config API, you need to include the following dependency in your
    pom.


    xml file:


    Chapter 6 the eClipse MiCroprofile fraMework


    <dependency>


    <groupId>org.eclipse.microprofile.config</groupId>


    <artifactId>microprofile-config-api</artifactId>


    <version>1.0</version>


    </dependency>


    **Enabling MicroProfile Config in Open Liberty**


    To enable the MicroConfig feature, you need to add the following code to the server.


    xml file:


    <featureManager>


    <feature>mpConfig-1.4</feature>


    </featureManager>


    **Working with MicroProfile Config**


    The Config class provides static methods that can be used to access configuration


    properties. With the dependency in place, you can create a class called MyConfig
    that looks like this:


    import org.eclipse.microprofile.config.inject.ConfigProperty;


    import jakarta.enterprise.context.ApplicationScoped;


    import jakarta.inject.Inject;


    import jakarta.inject.Named;


    @ApplicationScoped


    public class MyConfig {


    @Inject


    @ConfigProperty(name = "greeting", defaultValue="Hello")


    private String greeting;


    public String getGreeting() {


    return greeting;


    }


    }


    Chapter 6 the eClipse MiCroprofile fraMework


    The property file can be placed in the classpath or on the filesystem with the


    greeting.properties filename.


    **Defining the Config Property**


    The following is the source code for a property file that will be used to configure
    the greeting property:


    greeting=Hello Microservices!


    The MyConfig class is a standard Java class annotated with @ApplicationScoped,


    which means it will be created once and used for the lifetime of the application.
    The class has a single field annotated with @Inject and @ConfigProperty. The ConfigProperty


    annotation tells the Config API to inject the value of the greeting property into
    the field.


    If the property is not found, the default value of Hello will be used.


    **Testing the Config Component**


    The getGreeting() method simply returns the value of the greeting field. You can
    test this class by creating a RESTful web service endpoint that uses it:


    import jakarta.inject.Inject;


    import jakarta.ws.rs.GET;


    import jakarta.ws.rs.Path;


    import jakarta.ws.rs.Produces;


    import jakarta.ws.rs.core.MediaType;


    @Path("/config")


    public class ConfigResource {


    @Inject


    private MyConfig myConfig;


    @GET


    @Produces(MediaType.TEXT_PLAIN)


    public String getGreeting() {


    return myConfig.getGreeting();


    }


    }


    Chapter 6 the eClipse MiCroprofile fraMework


    When you deploy the application and invoke the /config endpoint, you should see


    the greeting property that you injected:


    Hello Microservices!


    You can also inject configuration properties into parameter of a method, as


    shown here:


    import org.eclipse.microprofile.config.inject.ConfigProperty;


    // ...


    public class MyConfig {


    // ...


    @Inject


    public void setGreeting(@ConfigProperty(name = "greeting") String greeting) **Creating
    a ConfigSource**


    As you can see, the Config API makes it easy to inject configuration properties
    into an application. The Config API defines a contract for config implementations.
    A


    ConfigSource is used to read configuration data from a particular source. For
    example, you could create a ConfigSource that reads configuration data from a
    file.


    The ConfigSource interface has the following methods:


    • String getName(): Returns the name of the ConfigSource.


    • int getOrdinal(): Returns the ordinal of the ConfigSource.


    Ordinals determine the precedence of ConfigSources. A higher


    ordinal means a higher precedence.


    • Map<String, String> getProperties(): Returns a map of the


    properties in this ConfigSource. The keys in the map are the property


    names, and the values are the property values.


    • getValue(String propertyName): Returns the value of the given


    property. If the property is not found, this method returns null.


    • Set getPropertyNames(): Returns a Set of the property names in


    this ConfigSource.


    Chapter 6 the eClipse MiCroprofile fraMework


    The following is a simple implementation of a ConfigSource that reads configuration


    data from a file:


    import org.eclipse.microprofile.config.spi.ConfigSource;


    import java.io.IOException;


    import java.util.HashMap;'
