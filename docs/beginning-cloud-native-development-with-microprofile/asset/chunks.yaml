    **Fault Tolerance API**


    The Fault Tolerance API allows you to make your application more resilient to
    failures.


    This section looks at how to use the Fault Tolerance component to build a simple
    fault-tolerant application. Since fault tolerance is built on top of the Config
    API, you can use configuration data to configure the behavior of your fault-tolerant
    applications.


    To use the Fault Tolerance API, you need to include the following dependency in


    your pom.xml file:


    <dependency>


    <groupId>org.eclipse.microprofile.faulttolerance</groupId>


    <artifactId>microprofile-fault-tolerance-api</artifactId>


    <version>1.0</version>


    </dependency>


    The Fault Tolerance API defines a contract for fault-tolerance implementations.
    A


    fault-tolerance annotation is used to annotate a Java method:


    import org.eclipse.microprofile.faulttolerance.Retry;


    @Retry(maxRetries = 3, delay = 1000)


    public String doSomething() {


    // ...


    }


    The Retry annotation tells the runtime to retry the method up to three times


    when it fails. The Delay attribute specifies the amount of time to wait between
    retries, in milliseconds. If the method still fails after three attempts, the
    runtime will throw a FaultToleranceException.


    The other fault-tolerance annotations are listed in Ta[ble 6-1.](#index_split_002.html#p180)


