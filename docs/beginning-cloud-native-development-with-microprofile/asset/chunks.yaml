- fmt: '## Security (TLS)


    `TLS` provides a secure connection between the client and server, while `SSO`
    allows users to log in once and access all the applications they are authorized
    to use. These features make Open Liberty an ideal choice for organizations that
    must ensure the security of their web applications and data.


    ## Downloading and Installing Open Liberty


    Installing Open Liberty is a simple process and only takes a few minutes. Here
    are the steps for installing Open Liberty on your computer:


    1. Download Open Liberty from [https://openliberty.io/downloads/](https://openliberty.io/downloads/).

    2. To install Open Liberty, extract the contents of the downloaded file into the
    directory of your choice.


    The folder structure of the extracted content should be as follows:


    ```

    wlp

    ├── BETA_NOTICES

    ├── LICENSE

    ├── README.TXT

    ├── bin

    ├── clients

    ├── dev

    ├── lib

    ├── templates

    └── usr

    ```


    You can use Open Liberty to develop applications that are designed for the cloud
    and that can be deployed in a microservices architecture.


    ## Starting the Open Liberty Server


    Once you have extracted the contents of the downloaded file, you can start Open
    Liberty by running the following command from the `bin` folder:


    ```bash

    $ ./server start

    ```


    You will then see the output shown in Figure `4-1`.


    ![](index-100_1.png)


    Figure `4-1`. Output of the `./server start` command.


    You can set the `PATH` environment variable so that you can start the server from
    any directory and without prefixing the command with `./`, as per the following
    steps.


    ### For Linux or macOS


    - Based on your current shell, open the `.bash_profile` or `.zshrc` file of your
    home directory in a text editor. If you don’t have this file, create one in your
    home directory.

    - Add the following line to the file:


    ```bash

    export PATH=<path-to-directory>;$PATH

    ```


    ### For Windows


    - If you are using Windows, you can use the full path using the following command
    or by setting the environment variables in the Control Panel ➤ Advanced System
    Settings area:


    ```bat

    set PATH=<path-to-directory>;%PATH%

    ```


    Replace `<path-to-directory>` with the path where the server executable file is
    located. You should restart the command prompt or your terminal to accept your
    changes.


    This will start an instance of Open Liberty with the default configuration. You
    can then access this instance at the following URL: `http://localhost:9080/`.
    Figure `4-2` shows the welcome page of the Open Liberty server.


    ![](index-101_1.jpg)


    Figure `4-2`. Open Liberty welcome page.


    This verifies that Open Liberty is installed successfully. You are now ready to
    create your first application.


    ## Printing a List of Features on the Open Liberty Server


    You can print the list of features installed on your Open Liberty server using
    the `productInfo` command. This is a useful command to see what features are installed
    and running.


    To print the list of installed features, you simply need to open a terminal and
    run this command:


    ```bash

    ./productInfo featureInfo

    ```


    ![](index-102_1.png)


    Figure `4-3` shows the output.


    Figure `4-3`. The output of the `./productInfo featureInfo stop` command.


    There are a large number of features supported by the Open Liberty server.


    Table `4-1` provides a list of the first few features supported by the Open Liberty
    server, to demonstrate how extensible and modular the Open Liberty Server is.


    ### Table 4-1. Open Liberty Features and Descriptions


    - `acmeCa-2.0`: this feature allows signing and validating certificates using
    an `aCMe v2` protocol.

    - `appSecurity-3.0`: this feature provides the application security capabilities
    for Open Liberty.

    - `audit-1.0`: this feature enables the auditing of server activity for tracking
    changes to data and system resources. This can be used for security purposes.'
