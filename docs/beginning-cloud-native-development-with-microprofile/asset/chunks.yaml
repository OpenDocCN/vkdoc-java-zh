- fmt: "# Appendix B: Creating an Open Liberty Project Using Maven\n\n[https://doi.org/10.1007/978-1-4842-8832-0](https://doi.org/10.1007/978-1-4842-8832-0#DOI)\n\
    \n## Explanation\n\n- Replace `<artifactId>` and `<groupId>` with the artifact\
    \ name and group ID of your application.\n- The `archetypeGroupId` parameter specifies\
    \ the group of the archetype to use. This example uses `io.openliberty.tools`.\n\
    - The `archetypeArtifactId` specifies the artifact within the group that you want\
    \ to use, which is `liberty-plugin-archetype`. Finally, specify the version number\
    \ as `3.6.1`.\n\nThis command will create a new project. The folder structure\
    \ of the generated project is as follows:\n\n```text\n<artifactId>\n│ ├── pom.xml\n\
    │ └── src\n│ └── main\n│ ├── java\n│ │ └── <My-groupId>\n│ │ └── HelloServlet.java\n\
    │ ├── liberty\n│ │ └── config\n│ │ └── server.xml\n│ └── webapp\n│ └── WEB-INF\n\
    │ └── index.html\n└── pom.xml\n```\n\nThis will generate a basic project structure\
    \ with the following files and directories:\n\n- `pom.xml`: The Maven project\
    \ file contains information about the project, such as dependencies, plugins,\
    \ and goals.\n- `src/main/java`: This directory contains the Java source code\
    \ for the project.\n- `src/main/resources`: This directory contains resources\
    \ such as property files and web application assets.\n- `src/test/java`: This\
    \ directory contains JUnit tests.\n- `liberty/config/server.xml`: This file contains\
    \ the configuration for the Liberty server.\n\nWhen the project is generated,\
    \ a `liberty-archetype-webapp/pom.xml` file is also created. This file contains\
    \ `liberty-maven-plugin`, which is used for packaging, deploying, and running\
    \ the application on Open Liberty. For further details about the Liberty Maven\
    \ plugin, visit its home page in the MVNRepository at [https://mvnrepository.com/artifact/io.openliberty.tools/liberty-maven-plugin](https://mvnrepository.com/artifact/io.openliberty.tools/liberty-maven-plugin)\
    \ and its project page on GitHub at [https://github.com/OpenLiberty/ci.maven](https://github.com/OpenLiberty/ci.maven).\n\
