- fmt: '# REST: An Architectural Style for Building Web Services


    Representational State Transfer (REST) is an architectural style that defines
    a set of constraints for creating web services. Web services that conform to the
    REST architectural style, or simply RESTful web services, provide interoperability
    between computer systems on the Internet. REST-compliant web services allow the
    requesting systems to access and manipulate textual representations of web resources
    by using a uniform and predefined set of stateless operations. The REST style
    uses standard HTTP methods (such as `GET`, `POST`, `PUT`, and `DELETE`) to manipulate
    resources. It also uses simple URL syntax to access resources, and it uses standard
    HTTP status codes to indicate the result of a request.


    The REST architectural style defines a set of constraints that must be followed
    to create a RESTful API. The key constraints are as follows:


    - Clients should be able to access resources using standard HTTP methods (`GET`,
    `POST`, `PUT`, `DELETE`).

    - Clients should be able to determine the URI for each resource.

    - Resources should be represented in JSON or XML format.

    - Server should return the correct HTTP response code (`200 OK`, `404 Not Found`,
    and so on) for each request.


    ## Introduction to Open Liberty Runtime


    Open Liberty (`https://openliberty.io/`) is a flexible and open-source server
    runtime environment that enables you to build and deploy microservices-based applications
    rapidly. It is a lightweight, modular runtime environment with a fast start up
    and a low memory footprint. It provides the foundation you need to build microservices
    apps quickly and efficiently.


    The IBM WebSphere Liberty application server (`https://www.ibm.com/in-en/cloud/websphere-liberty`)
    is built on Open Liberty. Open Liberty is a flexible runtime environment that
    supports multiple programming models, languages, and frameworks.


    You can use the technology of your choice with Open Liberty, without worrying
    about lock-in. Open Liberty is backed by a large and vibrant open-source community.


    ## Chapter 4 Building RESTful Web Services


    ### Key Features of the Open Liberty Application Server


    Open Liberty provides a set of features specifically targeted at enhancing the
    development, deployment, and management of microservices apps. It offers the following
    key features that help you develop, deploy, and manage microservices-based applications:


    - Rapid development of microservices: Open Liberty lets you quickly develop microservices-based
    applications using your favorite IDEs, such as Eclipse or IntelliJ IDEA. You can
    also use any build tool, such as Maven or Gradle.

    - Easy deployment to different environments: Open Liberty provides you with multiple
    deployment options so that you can deploy your application to the platform of
    your choice. You can also use a container technology, such as Docker.

    - Remote administration, monitoring, and management: Open Liberty provides you
    with various management options, so you can manage your application in the way
    that best suits your needs. It provides built-in support for monitoring and managing
    your application. You can use the Open Liberty Admin Center, which is a graphical
    user interface to monitor your application’s health and performance. It also provides
    the Open Liberty command-line interface for a more scripted approach.

    - Cloud-ready: Open Liberty is designed for the cloud. It supports the latest
    standards and technologies, including Jakarta EE and Eclipse MicroProfile.

    - Support for Java standards and technologies: Open Liberty supports all the features
    in MicroProfile, as well as many features from the Jakarta EE specification. This
    means that you can write Jakarta EE applications and deploy them on Open Liberty.

    - Security: Open Liberty provides comprehensive security features, including support
    for Single Sign-On (SSO) and Transport Layer'
