    **Summary**


    Cloud computing is a technology that has the potential to revolutionize the way
    people use computers. It allows users to access resources, such as storage and
    processing power, from remote servers instead of theit own devices. This can save
    time and money, making it easier to access information from anywhere in the world.


    There are three main types of cloud computing: public, private, and hybrid. Public


    cloud computing is a service offered to the general public over the Internet.
    Private cloud computing is a service offered to a specific organization, usually
    over a private network.


    Hybrid cloud computing is when an organization uses both public and private clouds.


    In the early 2000s, companies began to offer cloud-based services, such as storage


    and processing power, to businesses and consumers. Since then, the use of cloud


    computing has grown rapidly, and it is now an essential part of many businesses.


    Chapter 1 IntroduCtIon to Cloud ComputIng


    The Java programming language is widely used in cloud computing. It is easy to
    learn and use and is platform-independent, meaning that programs written in Java
    can run on any type of computer. Java is also used to create web applications,
    which are applications that run on a web server and are accessed by users through
    a web browser.


    One of the most important aspects of cloud computing is its use of web services.
    Web services are applications that can be accessed over the Internet. They are
    often used to provide a service, such as storage or processing power, to businesses
    and consumers.


    Web services are usually written in a programming language such as Java.


    Web services use a standard format to communicate data. This makes it possible
    for


    different types of computers to understand each other and exchange data. For example,
    a web service can use Simple Object Access Protocol (SOAP) to communicate with
    a


    computer that uses the Windows operating system.


    REST (Representational State Transfer) is another type of web service. It is an


    architectural style for designing networked applications. RESTful web services
    are based on the principles of REST and use the HTTP protocol to communicate data.


    Microservices are a type of software architecture that is designed to make it
    easy to develop and deploy large applications. Microservices are small, modular
    components


    that can be deployed independently. Microservices can be developed in the Java


    programming language using the various frameworks and standards, like MicroProfiles


    and Jakarta EE.


    You should now have a good understanding of cloud computing. In the next chapter,


    you learn about cloud-native application development, which allows developers
    to write code specifically designed to run in the cloud. It uses microservices
    and containers to make it easy to develop, deploy, and scale applications.


    **CHAPTER 2**


    **Cloud-Native Application**


    **Development**


    The term “cloud-native” has become ubiquitous in technology circles, but its meaning
    is still a bit nebulous. To get to the bottom of it, let’s start with what it
    is not: Cloudnative is not about where an application runs. It doesn’t matter
    if an app runs in a public cloud, private cloud, or an on-premises data center.
    What matters is how the app is built and run. In this chapter, you will start
    by exploring the meaning of cloud-native, the characteristics of cloud-native
    applications, the benefits and drawbacks of developing cloud-native apps, and
    how they differ from traditional apps. Next, you will learn


    about managed services for Java-based applications and how they play a role in
    cloudnative app development. Finally, you’ll get an overview of the phases of
    cloud-native app development, including continuous integration/continuous delivery
    (CI/CD),


    microservices architecture, containerization, serverless computing, API management,


    security, and more.


    **What Is Cloud-Native?**


    Cloud-native is a term that refers to applications or services that are designed
