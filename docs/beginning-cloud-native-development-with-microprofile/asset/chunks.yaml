- fmt: '## Introduction


    Use `Docker` to package and run microservices. It provides several advantages
    over traditional virtualization technologies, including portability, ease of use,
    and more.


    `Kubernetes` is a tool for managing containerized applications. It provides an
    open-source platform for deploying, managing, and scaling applications. `Kubernetes`
    is based on the Linux kernel and can use `Docker` containers to manage applications.
    It provides features such as scaling, load balancing, and self-healing.


    `Kubernetes` automates the deployment, scaling, and management of containerized
    apps. It supports easy management and discovery of your applications by grouping
    containers into logical units. `Kubernetes` is built on decades of experience
    at Google running production workloads at scale, as well as adopting the best-of-breed
    ideas and practices from the community.


    `Kubernetes` is portable and extensible, allowing it to run anywhere, from your
    laptop to public clouds to data centers. The simplicity and flexibility of `Kubernetes`
    make it an excellent choice for cloud-native applications. In addition, it’s open-source
    software, allowing you to take advantage of community innovations.


    `Kubernetes` is production-ready, with robust features and capabilities to orchestrate
    your containerized applications. `Kubernetes` has been battle-tested at scale,
    running some of the largest sites in the world.


    In this book, you learn how to use `MicroProfile` and `Jakarta EE` technologies
    to develop microservices, deploy them on `Kubernetes`/`Docker`, and create cloud-native
    applications. The book also covers best practices for developing cloud-native
    applications with `MicroProfile` and `Jakarta EE`. It starts by looking at the
    different aspects of cloud-native applications. You will then move on to setting
    up your development environment and learning about the basics of `Jakarta EE`.
    Next, the book explores the features of `MicroProfile` and you’ll learn how to
    use them to build microservices.


    You will then learn about `Docker` and `Kubernetes` and how to use them to deploy
    your applications. Finally, you will put everything together and learn how to
    build a complete cloud-native application.


    ## Who This Book Is For


    Welcome to `Beginning Cloud Native Development with MicroProfile, Jakarta EE,
    and Kubernetes.`


    This book is for Java developers who want to learn how to develop cloud-native
    applications using `MicroProfile` and `Jakarta EE`. No prior knowledge of `Kubernetes`
    or container orchestration is required.


    In this book, you learn how to develop cloud-native applications using `MicroProfile`
    and `Jakarta EE` and deploy them to `Kubernetes`. The book covers topics such
    as writing `RESTful` web services, creating microservices, configuring health
    checks, and more.


    By the end of this book, you will be able to develop cloud-native applications
    using `MicroProfile` and `Jakarta EE` and deploy them to `Kubernetes`.


    ## How This Book Is Structured


    This book covers four main topics:


    - `Cloud-native development` introduces the concept of cloud-native development
    and the twelve-factor app methodology. You learn about the benefits of developing
    cloud-native applications and the challenges you must consider when migrating
    existing applications to the cloud.

    - `MicroProfile specifications` provides an overview of the `MicroProfile` specifications
    and how they can be used to develop microservices. You learn about the different
    types of annotations available and how to use them to create `RESTful` web services.

    - `Jakarta EE specifications` introduces the `Jakarta EE` platform and its various
    specifications. You learn about the differences between `Java EE` and `Jakarta
    EE` and the new features available on the platform.

    - `Kubernetes` covers the basics of container orchestration with `Kubernetes`.
    You learn about the different types of objects created in a `Kubernetes` cluster,
    how to deploy applications to `Kubernetes`, and how to scale applications using
    `Kubernetes`.


    ## Conventions'
