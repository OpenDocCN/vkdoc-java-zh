    插件开发 RESTful API。最后，你看到了如何为 RESTful Web 服务创建并运行单元测试。


    本章的一些关键要点包括：


    • REST 是一种用于构建 Web 服务的架构风格。REST 已成为设计 Web 服务的标准，尤其是在微服务领域。


    • Open Liberty 是一个灵活且轻量的运行时。你可以在该平台上快速开发、部署和执行 RESTful Web 服务。


    • Open Liberty 还为最新技术和标准提供完整支持，例如 MicroProfile 和 Jakarta RESTful Web Services。它还提供了用于快速开发和测试应用的工具，如
    Maven Liberty 构建插件。


    • 在开发 REST 应用时，你可以使用 IntelliJ IDEA Ultimate Edition 的 Open Liberty 插件来获得更好的开发者体验。该插件支持在
    IDE 内创建、运行和调试 Open Liberty 应用。


    本章仅覆盖了 RESTful Web 服务最基础的内容。重点是帮助你开始构建、测试和部署 RESTful Web 服务的流程。现在你应该已经准备好引入 Jakarta
    EE RESTful Web Services 的一些自定义特性。


    下一章将更深入地探讨 REST 架构模式。你将学习更多关于标准约定、设计考量、最佳实践，以及许多与为云原生和微服务应用构建 RESTful Web 服务相关的高级概念。


