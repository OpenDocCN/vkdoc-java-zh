- fmt: '## Troubleshooting and Feature Overview


    Troubleshooting issues, or determining how a system has been used.


    ### `cdi-2.0`


    This feature provides contexts and dependency injection capabilities for Open
    Liberty. It is used to manage dependencies between application components.


    ### `cloudant-1.0`


    This feature provides the ability to store and retrieve data from a Cloudant database.
    Cloudant is a distributed database that helps developers build scalable applications.


    ### `concurrent-1.0`


    This feature provides the enterprise Concurrency utilities 1.0 for Open Liberty.


    ### `constraineddelegation-1.0`


    This feature allows for delegation of constrained resources between servers. This
    can be used to improve security or to allow for easier management of delegated
    resources.


    ### `couchdb-1.0`


    This feature provides the ability to store and retrieve data from a CouchDB database.
    CouchDB is a document-oriented database that helps developers build scalable applications.


    ### `distributedMap-1.0`


    This feature provides a distributed map that can be used to share data between
    servers.


    For a complete list of features, visit the official documentation page at [`www.ibm.com/docs/en/was-liberty/base?topic=management-liberty-features`](http://www.ibm.com/docs/en/was-liberty/base?topic=management-liberty-features).


    ![](index-104_1.jpg)


    ![](index-104_2.jpg)


    ## Chapter 4 Building RESTful Web Services


    ### Creating a Server Instance


    You might need a new server instance if you want to run a different set of features
    or want to further optimize performance. Creating a new server instance is simple.
    You just need to use the `server create` command followed by the name of the new
    server. In this case, call the new server `my-server`.


    ```bash

    ./server create my-server

    ```


    The output of this command is shown in Figure 4-4.


    **Figure 4-4.** The output of the `./server create my-server` command


    It creates a new directory called `my-server`, which contains all the files needed
    to run your new server instance. Figure 4-5 shows the newly created directory.


    **Figure 4-5.** Folder structure of the new server instance of Open Liberty


    Different folders are used to store different types of files in the Open Liberty
    server.


    The `apps` folder stores applications that you want to run on your server. The
    `dropins` folder stores files you want to add to your server instance. The `workarea`
    folder stores temporary files that are used by the server.


    Open Liberty provides a simple way to deploy applications to your server. You
    can just move the deployable file into the `dropins` folder inside the server
    directory. Open Liberty will automatically deploy the application and restart
    the server if required.


    ![](index-105_1.png)


    ![](index-105_2.png)


    You can start your new server instance using the `server start` command, as follows:


    ```bash

    ./server start my-server

    ```


    The output of this command is shown in Figure 4-6.


    **Figure 4-6.** The output of the `./server start my-server` command


    ### Stopping the Open Liberty Server


    If you want to stop your newly created server instance, you can use the `server
    stop` command, followed by the server’s name. For example, consider this command:


    ```bash

    ./server stop my-server

    ```


    It gives the output shown in Figure 4-7.


    **Figure 4-7.** The output of the `./server stop my-server` command


    To stop the default instance of Open Liberty that you started, you can run the
    following command:


    ```bash

    ./server stop

    ```


    Once the command executes successfully, you’ll see the output in Figure 4-8.


    ![](index-106_1.png)


    **Figure 4-8.** The output of the `./server stop` command


    ### Configuring the Server


    You can configure your server using a configuration file called `server.xml`.
    You can also add features to your server by adding the `featureManager` element
    to your `server.xml`.'
