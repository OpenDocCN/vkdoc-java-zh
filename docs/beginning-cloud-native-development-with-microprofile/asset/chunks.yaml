- fmt: "## Using `@Claim` to Inject Claim Values\n\nThe following code shows how to\
    \ use the `@Claim` annotation to inject the value of a claim into a Java method\
    \ parameter. The name of the claim is specified in the annotation.\n\n```java\n\
    public void doSomething(@Claim(\"email\") String email) {\n    // do something\
    \ with the email address here\n}\n```\n\nIn this example, the email address of\
    \ the user is injected into the `doSomething()` method.\n\n## The `@HeaderParam`\
    \ Annotation\n\nThe `@HeaderParam` annotation can inject the value of an HTTP\
    \ header into a Java method parameter. The name of the header is specified in\
    \ the annotation.\n\nFor example, suppose you have a method that needs to access\
    \ the value of `authHeader`. This can be accomplished by annotating the header\
    \ parameter with `@HeaderParam(\"authHeader\")`.\n\nThe following code shows how\
    \ to use the `@HeaderParam` annotation to inject the value of an HTTP header into\
    \ a Java method parameter. The name of the header is specified in the annotation.\n\
    \n```java\npublic void doSomething(@HeaderParam(\"authHeader\") String authHeader)\
    \ {\n    // do something with the authHeader here\n}\n```\n\nIn this example,\
    \ the value of `authHeader` is injected into the `doSomething` method.\n\n## Configuring\
    \ a JWK Set or PEM-Encoded Public Key\n\nThe MicroProfile JWT Auth specifications\
    \ support the following public key formats:\n\n- Public Key Cryptography Standards\
    \ #8 in PEM Format\n- JSON Web Key (JWK)\n\n### Public Key Cryptography Standards\
    \ #8 in PEM Format\n\nTo configure a public key in PEM format, you need to set\
    \ the following MicroProfile Config properties:\n\n```properties\nmp.jwt.verify.publickey.location=/META-INF/publicKey.pem\n\
    mp.jwt.verify.publickey.format=PEM\n```\n\nThe value of the `mp.jwt.verify.publickey.location`\
    \ property must be a path to the PEM-encoded public key file. The file can be\
    \ located in the application's resources.\n\nThe following is an example of a\
    \ PEM-encoded public key:\n\n```text\n-----BEGIN PUBLIC KEY-----\nMIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEAuYP6FyP/cTmVnxE1JXs+\n\
    5ySE+FNxztk0aDV8pPiwoZmxIkcH2QYP1XCfY16/m05zt6nEJbDP7OiWl57bFmuG\nKTPvfOHXlh17UfStys\
    \ ...\n-----END PUBLIC KEY-----\n```\n\n### JSON Web Key (JWK)\n\nA JSON Web Key\
    \ (JWK) is a JavaScript Object Notation (JSON) data structure that represents\
    \ a cryptographic key. A JWK Set is a JSON data structure representing a set of\
    \ JWKs.\n\nTo configure a JWK Set, you need to set the following MicroProfile\
    \ Config properties:\n\n```properties\nmp.jwt.verify.publickey.location=/META-INF/jwkset.json\n\
    mp.jwt.verify.publickey.format=JWKSET\n```\n\nThe value of the `mp.jwt.verify.publickey.location`\
    \ property must be a path to the JWK Set file. The file can be located in the\
    \ application's resources. The following is an example of a JWK Set:\n\n```json\n\
    {\n  \"kty\": \"RSA\",\n  \"key\": \"-----BEGIN PUBLIC KEY----- MIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEAuYP6FyP/cTmVnxE1JXs+5ySE+FNxztk\
    \ 0aDV8pPiwoZmxIkcH2QYP1XCfY16/m05zt6nEJbDP7OiWl57bFmuGKTPvfOHXlh17UfStys... -----END\
    \ PUBLIC KEY-----\",\n  \"e\": \"AQAB\",\n  \"d\": \"https://www.example.com/key-store.jks\"\
    \n}\n```\n\nNote that the JWT must be signed using the algorithm specified in\
    \ the header, and the key used to sign the JWT must be in the specified format.\n\
    \n### JSON Web Key Set (JWKS)\n\nThe JWK Set must contain a single key and the\
    \ algorithm must be specified in the header of the JWT.\n\nA JWK Set is a JSON\
    \ data structure representing a set of JWKs. The JWK Set must contain a single\
    \ key, and the algorithm must be specified in the header of the JWT.\n\nThis example\
    \ shows a JWKS:\n\n```json\n{\n  \"keys\": [\n    {\n      \"kty\": \"RSA\",\n\
    \      \"key\": \"-----BEGIN PUBLIC KEY----- MIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEAuYP6FyP/cTmVnxE1JXs+5ySE+FNxztk\
    \ 0aDV8pPiwoZmxIkcH2QYP1XCfY16/m05zt6nEJbDP7OiWl57bFmuGKTPvfOHXlh17UfStys... -----END\
    \ PUBLIC KEY-----\",\n      \"e\": \"AQAB\",\n      \"d\": \"https://www.example.com/key-store.jks\"\
    \n    }\n  ]\n}\n```\n\nTo configure a JWK Set, specify the following in your\
    \ MicroProfile Config:\n\n```properties\nmp.jwt.verify.publickey.location=https://www.example.com/jwkset.json\n\
    ```\n\nThe public key will be read from the URL.\n\n## The Jakarta EE Security\
    \ Specification"
