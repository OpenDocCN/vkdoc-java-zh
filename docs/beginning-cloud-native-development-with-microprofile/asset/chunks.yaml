- fmt: '# Containerizing a MicroProfile Application with Open Liberty and Docker


    This would save you from having to install Open Liberty in your image. There are
    many different base images available, and you can even create your own. To find
    a base image that suits your needs, you can search through the Docker Hub repository.
    Once you have selected a base image, you must create a `Dockerfile`.


    The contents of the `Dockerfile` are as follows:


    ```dockerfile

    FROM open-liberty


    ARG VERSION=1.0

    ARG REVISION=SNAPSHOT


    LABEL \

    org.opencontainers.image.authors="Tarun Telang" \

    name="demo" \

    version="$VERSION-$REVISION" \

    summary="A sample microservice." \

    description="An image containing a sample microservice running with the

    Open Liberty runtime." \


    COPY --chown=1001:0 src/main/liberty/config/ /config/

    COPY --chown=1001:0 target/*.war /config/apps/


    RUN configure.sh

    ```


    The first line in the file specifies the base image to use. This example uses
    the `openliberty/open-liberty` base image. The second line copies the configuration
    files for the application into the `/config` directory in the container. The third
    line copies the WAR file for the application into the `/config/apps` directory.
    The final line runs the `configure.sh` script, which will apply the configuration
    files to the server.


    ## Running a MicroProfile Application in Docker


    As a first step, run the following command in your project directory so that a
    `.war` file is built in your project’s `target` directory.


    ```bash

    mvn package

    ```


    The `mvn package` command builds a `.war` file. The generated `.war` file can
    be found in the `target` directory.


    When the project has been successfully built, you should see the following output:


    ```text

    ...

    ...

    [INFO] Building war: /home/project/mp-demo/target/product-ws.war

    [INFO] --------------------------------------------------------------------

    [INFO] BUILD SUCCESS

    [INFO] --------------------------------------------------------------------

    [INFO] Total time: 7.826 s

    [INFO] Finished at: 2022-08-28T20:53:07Z

    [INFO] -----------------------------------------------------------

    ```


    Next, run the following command to download the latest Open Liberty Docker image:


    ```bash

    docker pull open-liberty

    ```


    The `docker pull` command will pull the latest Open Liberty image from the Docker
    Hub. You will see the following output once the Docker image for Open Liberty
    has been successfully downloaded.


    ```text

    Using default tag: latest

    latest: Pulling from library/open-liberty

    0c673eb68f88: Already exists

    028bdc977650: Already exists

    1ccd5c23a917: Pull complete

    8619a97d585d: Pull complete

    939335e1685d: Pull complete

    38d0c214fbd9: Pull complete

    2e17378e4efe: Pull complete

    79d116412958: Pull complete

    cf67e7591f9b: Pull complete

    bb086ba294ec: Pull complete

    ee1c870013e1: Pull complete

    Digest: sha256:fcc5e656cfcd08ca308214c4163e0eae4c8d3016af4e3fc43a95ffea96800d72

    Status: Downloaded newer image for openliberty/open-liberty:latest

    docker.io/openliberty/open-liberty:latest

    ```


    Now, as you have the base image downloaded, you can build an image using the `docker
    build` command:


    ```bash

    docker build -t openliberty-mp-demo:1.0-SNAPSHOT .

    ```


    This will create an image called `openliberty-mp-demo` using the contents of the
    `Dockerfile`. Upon successful completion of this command, you’ll see this output:


    ```text

    Sending build context to Docker daemon 146MB

    Step 1/7 : FROM openliberty/open-liberty

    ---> b5cd482cfb55

    Step 2/7: ARG VERSION=1.0

    ---> Running in 9cbbafc3e3c1

    Removing intermediate container 9cbbafc3e3c1

