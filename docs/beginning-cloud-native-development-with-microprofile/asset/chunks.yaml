    summary="The sample microservice" description="This image contains the a sample
    microservice running with the Open Liberty runtime."

    ---> Running in bbe0c0484328

    Removing intermediate container bbe0c0484328

    ---> e48ec9d295d9

    Step 5/7 : COPY --chown=1001:0 src/main/liberty/config/ /config/

    ---> 241c3e8f4355

    ```'
