- fmt: '# Chapter 9: Containerizing Microservices Using Kubernetes


    This chapter explains how to containerize your microservices using Docker and
    Kubernetes. You will start by learning about containers and why you should use
    them. You’ll then learn how to install Docker and Kubernetes. Finally, you will
    learn how to deploy your microservices into containers using Docker and Kubernetes.


    ## What Are Containers?


    Containers are a way to package software so that it can run isolated from other
    software on the same host. This is different from virtualization, where each guest
    operating system has its kernel and runs in its isolated environment.


    Containerizing a microservice is a great way to improve the overall reliability
    and resilience of your system. Containers allow you to package your microservice
    with all its dependencies into a single unit. This makes it easy to deploy and
    manage your microservices.


    ## Why Use Containers?


    There are many reasons to use containers, but the main reasons are as follows:


    - Portability: Containers can be easily moved from one host to another. This is
    because they do not depend on the host operating system.

    - Isolation: Containers are isolated from each other and the host operating system.
    If one container crashes, it will not affect the other containers.

    - Efficiency: Containers use fewer resources than virtual machines. This is because
    each container shares the host operating system kernel.


    ## What Is Container Orchestration?


    Container orchestration is the process of automating the deployment, management,
    and scaling of containerized applications. The most popular container orchestration
    tool is Kubernetes.


    Kubernetes is an open-source system for automating the deployment, scaling, and
    management of containerized applications. It was initially designed by Google
    and is now maintained by the Cloud Native Computing Foundation. Kubernetes is
    a portable, extensible, open-source platform for managing containerized workloads
    and services that facilitates declarative configuration and automation. It has
    a large, rapidly growing ecosystem. Kubernetes services, support, and tools are
    widely available.


    ## The Benefits of Using Container Orchestration


    There are many benefits of using container orchestration, but these are the main
    benefits:


    - Improved efficiency: Container orchestration tools can improve the efficiency
    of your workflow by automating many of the tasks required to manage many containers.

    - Increased flexibility: Container orchestration tools can make deploying and
    managing applications in various environments easier.

    - Improved scalability: Container orchestration tools can improve the scalability
    of your application by making it easy to add or remove containers as needed.

    - Increased security: Containers are isolated from each other and the host operating
    system, making it difficult for malicious actors to access your data or infect
    your systems.

    - Reduced costs: Containers can help you reduce the cost of running your applications
    by using fewer resources.

    - Easier debugging: Container orchestration tools make it easier to debug problems
    with your application by providing a single view into all the containers in your
    system.


    ## Understanding Kubernetes Terminology


    Before you dive deeper and start using Kubernetes to manage your containers, you
    should familiarize yourself with some of the important terminology related to
    Kubernetes.


    - `Pod`: A group of one or more containers with shared storage/network and a'
