- fmt: '## RESTful API 概述


    Now you see how to create a RESTful API to manage a list of products for a store.
    This RESTful API allows the client application to access the products stored as
    resources on the server.


    The API is implemented using the Jakarta EE and the REST architectural style.
    The API has the following methods:


    - `GET /api/products`: Retrieves a list of products.

    - `POST /api/products`: Creates a new product; the product details are provided
    as JSON in the request body.

    - `PUT /api/products`: Updates an existing product; the updated product details
    are provided as JSON in the request body.

    - `DELETE /api/products/{id}`: Deletes a product; the product ID is provided in
    the request URL path.


    ## Creating a Resource Class


    A Resource class is an object that represents a specific REST resource, in this
    case a product. It contains the product’s details, such as ID, name, price, quantity,
    and so on.


    For simplicity, this example only stores the ID and name. To implement a resource
    class first, you need to create a `Product` class, as shown:


    ```java

    public class Product {


    private Integer id;


    private String name;


    // default constructor


    public Product() {


    }


    Chapter 4 Building reStful WeB ServiCeS


    // parameterized constructor public Product(Integer id,


    String name) {


    this.id = id;


    this.name = name;


    }


    // getters and setters


    public Integer getId() {


    return id;


    }


    public void setId(Integer id) {


    this.id = id;


    }


    public String getName() {


    return name;


    }


    public void setName(String name) {


    this.name = name;


    }


    }

    ```


    The `Product` class is a Plain Old Java Object. It has the `id` and `name` properties.
    You should declare a default constructor, getters, and setters for all fields.
    By doing this, you enable the Jackson library to convert your Java objects to
    JSON and vice versa. All properties must of Object type as well. Jackson cannot
    work with primitive types because they cannot be null. The `id` property is of
    type `Integer`, and `name` property is of type `String`. There are also getters
    and setters for the `id` and `name` instance variables. The `getName()` and `getId()`
    methods return the value of the respective property. The class also has two constructors.
    The first constructor is the default constructor. The second constructor takes
    in an `id` and `name` parameter and sets the values of the `id` and `name` properties
    to those values.


    Chapter 4 Building reStful WeB ServiCeS


    ## Creating a Service Class


    A service class represents a collection of related resources. It includes methods
    for creating, updating, deleting, and retrieving (CRUD) operations on the resources.


    You now create a `ProductService` class with a `getProducts()` method to return
    a list of `Product` objects:


    ```java

    package org.microprofile.cloudnative.rest;


    import java.io.Serializable;


    import java.util.*;


    import jakarta.enterprise.context.ApplicationScoped;


    import jakarta.ws.rs.*;


    import jakarta.ws.rs.core.MediaType;


    import jakarta.ws.rs.core.Response;


    @Path("/products")


    @ApplicationScoped


    public class ProductService {


    private List<Product> products;


    public ProductService(){


    products = new ArrayList<>();


    products.add(new Product(Integer.parseInt("1"), "product 1"));


    products.add(new Product(Integer.parseInt("2") , "product 2"));


    }


    @GET


    @Produces(MediaType.APPLICATION_JSON)


    public List<Product> getProducts() {


    // Return a list of products


    return products;


    }


    }

    ```


    Chapter 4 Building reStful WeB ServiCeS


    ## Media Types in RESTful Web Services


    RESTful web services can produce and consume many different media types, including
    JSON, XML, and HTML. Annotations specify the media type that a method can consume
    or produce. For example, if a method is annotated with the following:


    - `@Consumes(MediaType.APPLICATION_JSON)`, it can consume JSON.

    - Similarly, if a method is annotated with `@Produces(MediaType.APPLICATION_XML)`,
    it can produce XML.


    Both annotations are used together in a single method to support multiple media
    types. For example, `@Consumes(MediaType.APPLICATION_JSON)` and `@Produces(MediaType.APPLICATION_XML)`
    are used together in a single method, so the method can consume JSON and produce
    XML.'
