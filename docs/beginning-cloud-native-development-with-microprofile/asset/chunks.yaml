- fmt: "## Maven 简介\n\nMaven avoids extensive configuration files. Instead, Maven\
    \ uses a standard directory layout and a default build lifecycle. This makes it\
    \ easy for developers to know where their files are and what the role of each\
    \ file is.\n\nMaven is also highly extensible. Developers can easily add new plugins\
    \ or customize existing ones to suit their needs.\n\nMaven’s architecture is based\
    \ on three concepts: project object model (POM), plugins, and goals.\n\n- The\
    \ `POM` is the central element of Maven. It is an XML file that contains information\
    \ about the project, such as the name, version, dependencies, and build settings.\n\
    - `Plugins` are components that extend Maven’s functionality. They are used to\
    \ execute common tasks, such as compiling code or creating a JAR file.\n- `Goals`\
    \ are the specific actions that a plugin executes. For example, the `compile`\
    \ goal of the Java compiler plugin will compile the project’s code.\n\nMaven’s\
    \ standard directory layout is based on the Filesystem Hierarchy Standard. This\
    \ layout defines a consistent structure for all Maven projects, making it easy\
    \ for developers to know where their files are and what the role of each file\
    \ is.\n\n## What Is a Maven Repository?\n\nA Maven `repository` is a directory\
    \ where all the project JARs, library JARs, plugins, or any other project-specific\
    \ artifacts are stored and can be used by Maven. There are three types of repositories:\n\
    \n- `Local repository`: This is a directory on the developer’s machine, where\
    \ all the dependencies are stored locally.\n- `Central repository`: This is a\
    \ repository maintained by Apache, which contains most of the common dependencies.\n\
    - `Remote repositories`: These are repositories maintained by third parties, which\
    \ can be used to download dependencies.\n\n## Using Maven to Create a Java Project\n\
    \nCreating a Java project with Maven is easy. Simply run the following command\
    \ from the terminal:\n\n```bash\nmvn archetype:generate -DgroupId=com.example\
    \ -DartifactId=my-project -DarchetypeArtifactId=maven-archetype-quickstart -DinteractiveMode=false\n\
    ```\n\nThis will generate a simple Java project with the following structure:\n\
    \n```text\nmy-project\n├── pom.xml\n├── src\n├── main\n│   └── java\n│       └──\
    \ com\n│           └── example\n│               └── App.java\n└── test\n    └──\
    \ java\n        └── com\n            └── example\n                └── AppTest.java\n\
    ```\n\n## Using Maven in Your Project\n\nYou can use Maven in your project by\
    \ adding the following lines to your `pom.xml` file:\n\n```xml\n<project>\n  <modelVersion>4.0.0</modelVersion>\n\
    \  <groupId>com.example</groupId>\n  <artifactId>my-project</artifactId>\n  <version>1.0-SNAPSHOT</version>\n\
    \  <dependencies>\n    <dependency>\n      <groupId>junit</groupId>\n      <artifactId>junit</artifactId>\n\
    \      <version>4.12</version>\n      <scope>test</scope>\n    </dependency>\n\
    \  </dependencies>\n  <build>\n    <plugins>\n      <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n\
    \        <artifactId>maven-compiler-plugin</artifactId>\n        <version>3.5.1</version>\n\
    \        <configuration>\n          <source>1.8</source>\n          <target>1.8</target>\n\
    \        </configuration>\n      </plugin>\n    </plugins>\n  </build>\n</project>\n\
    ```\n\n### Explanation\n\n- Line 1: The `<project>` element is the root element\
    \ of the `pom.xml` file.\n- Line 2: The `<modelVersion>` element indicates the\
    \ version of the POM model being used.\n- Line 3: The `<groupId>` element indicates\
    \ the group ID of the project.\n- Line 4: The `<artifactId>` element indicates\
    \ the artifact ID of the project.\n- Line 5: The `<version>` element indicates\
    \ the version of the project.\n- Line 6: The `<dependencies>` element indicates\
    \ the project’s dependencies.\n- Line 7: The `<dependency>` element indicates\
    \ a single dependency of the project.\n- Line 8: The `<groupId>` element indicates\
    \ the group ID of the dependency.\n- Line 9: The `<artifactId>` element indicates\
    \ the artifact ID of the dependency. The JUnit dependency is used to unit test\
    \ the project code.\n- Line 10: The `<version>` element indicates the version\
    \ of the dependency."
