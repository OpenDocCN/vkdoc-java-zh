- fmt: '## 构建与运行 Docker 镜像


    `Step 6/7 : COPY --chown=1001:0 target/*.war /config/apps/`


    `---> 2b16449cf495`


    `Step 7/7 : RUN configure.sh`


    `---> Running in fa6715060554`


    `Removing intermediate container fa6715060554`


    `---> af7f2ca5b7cd`


    `Successfully built af7f2ca5b7cd`


    `Successfully tagged openliberty-getting-started:1.0-SNAPSHOT`


    To verify that the image is built, run the `docker images` command to list all
    local Docker images:


    ```bash

    $ docker images

    ```


    You should see a row containing your Docker image in the list of Docker images,
    as shown here:


    `REPOSITORY TAG IMAGE ID CREATED SIZE`


    `openliberty-mp-demo 1.0-SNAPSHOT b5cd482cfb55 3 weeks ago 886MB`


    You can now run your application by using the `docker run` command:


    ```bash

    $ docker run -d --name product-ws -p 9080:9080 openliberty-mp-demo:1.0-SNAPSHOT

    ```


    This will start a Docker container with the name `product-ws`. The `-d` option
    is used to run the container in detached mode. The `-p` option maps the ports
    between the host and the container. In this case, port `9080` inside the container
    will be mapped to the same ports on your local machine.


    You can verify if the container is running by using the `docker ps` command, as
    shown here:


    ```bash

    $ docker ps

    ```


    Ensure the status of the container is up.


    This will start a container using the `my-liberty-app` image and map port `9080`
    on the host machine to port `9080` in the container. You should now be able to
    access your 222 Chapter 9 Containerizing MiCroserviCes Using KUbernetes application
    at `http://localhost:9080`\. The application will be accessible at the same URL
    even if you are running it inside a Docker container.


    You can stop the application by using the following command:


    ```bash

    $ docker stop product-ws

    ```


    The `docker stop` command is used to stop a running container. In this example,
    you stop the container with the name `product-ws`.


    To remove the container, run the following command:


    ```bash

    $ docker rm product-ws

    ```


    The `docker rm` command is used to remove a stopped container. In this example,
    you remove the container with the name `product-ws`.


    To remove the image, run the following command:


    ```bash

    $ docker rmi openliberty/open-liberty

    ```


    The `docker rmi` command is used to remove an image. In this example, you remove
    the image with the name `openliberty/open-liberty`.


    ## Pushing the Docker Image to Docker Hub


    If you don’t have a Docker Hub account, create one first. Once you have a Docker
    Hub account, log in to it using the following command:


    ```bash

    $ docker login -u <username> -p <password>

    ```


    Replace `<username>` and `<password>` with your Docker Hub username and password.


    `WARNING! Using --password via the CLI is insecure. Use --password-stdin.`


    `WARNING! Your password will be stored unencrypted in /home/theia/.docker/config.json.`


    Configure a credential helper to remove this warning. See `https://docs.docker.com/engine/reference/commandline/login/#credentials-store`


    `Login Succeeded`


    `Chapter 9 Containerizing MiCroserviCes Using KUbernetes`


    If you see this output, you are successfully logged in to Docker Hub. You must
    tag your image before you can push it to Docker Hub. The Docker Hub uses these
    tags as namespaces to identify the images.


    To tag your image, run the following command:


    ```bash

    docker tag <image-id> <username>/< image-name >:<tag>

    ```


    For example, if your username is `taruntelang` and your repository is `openliberty-mp-demo`,
    you would tag your image like this:


    ```bash

    $ docker tag openliberty-mp-demo:1.0-SNAPSHOT taruntelang/openliberty-mp-demo:1.0-SNAPSHOT

    ```


    The `latest` tag indicates that this is the most recent version of the image.
    You can also use other tags, such as `v1` or `2.0`, to indicate different versions
    of your image.


    To push the image to Docker Hub, run the following command:


    ```bash

    $ docker push <username>/<image-name>:<tag>

    ```


    Replace `<username>` with your Docker Hub username, `<imagename>` with the name
    of your image, and `<tag>` with a tag for the image. For example, you can use
    `1.0-SNAPSHOT` as the tag. In this case, you would run the following command:


    ```bash

    $ docker push taruntelang/openliberty-mp-demo:1.0-SNAPSHOT

    ```'
