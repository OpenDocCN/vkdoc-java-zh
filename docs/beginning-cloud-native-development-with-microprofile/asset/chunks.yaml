- fmt: '## IDE and Development Environment Setup


    An IDE, or Integrated Development Environment, is a software tool used for developing
    software applications. It includes features for editing code, compiling code,
    running tests, and debugging applications. Some popular IDEs include Eclipse,
    IntelliJ, Visual Studio Code, and Apache NetBeans.


    Before you begin, you need to have an Integrated Development Environment (IDE)
    of your choice. Some popular IDEs for Java development are:


    - IntelliJ IDEA Ultimate or Community Edition ([www.jetbrains.com/idea/](https://www.jetbrains.com/idea/))

    - Eclipse IDE for Enterprise Java and Web Developers ([www.eclipse.org/downloads/packages/](http://www.eclipse.org/downloads/packages/))

    - Apache NetBeans ([https://netbeans.apache.org/](https://netbeans.apache.org/))

    - Visual Studio Code ([https://code.visualstudio.com/](https://code.visualstudio.com/))


    Or any other IDE of your choice.


    Congratulations! You have successfully set up your development environment for
    cloud-native application development.


    ## Summary


    This chapter covered installing the tools and software required to develop cloud-native
    Java applications. You started by installing the Java Development Kit (JDK), followed
    by Maven, Git, Open Liberty, Docker, and Kubernetes. One of the benefits of using
    Docker and Kubernetes is that they make deploying your applications much easier.
    Both Docker and Kubernetes are open-source technologies that have a large community
    of users and contributors.


    Later you also installed Zipkin, which is a distributed tracing system. Assuming
    that you have all the tools and software installed, in the upcoming chapters,
    you can start building microservices and cloud-native applications. It is also
    recommended that you use an IDE, as it provides a better coding experience. Some
    of the popular IDEs are Eclipse, IntelliJ IDEA, NetBeans, and Visual Studio Code.


    ## Chapter 4: Building RESTful Web Services


    In Chapter [2](https://doi.org/10.1007/978-1-4842-8832-0_2), you learned that
    microservices is an architectural style that structures an application as a collection
    of small, modular services. Microservices are independently deployable, scalable,
    and testable services that communicate with each other through well-defined APIs.
    This decoupling of services promotes development and deployment agility, as well
    as operational resilience.


    RESTful API is an application programming interface (API) that conforms to the
    constraints of the REST architectural style and allows for interaction with RESTful
    web services. For example, Facebook, Twitter, and Google offer their functionality
    as RESTful web services that any client application can use to call these web
    services via REST.


    The three key components of a RESTful API are:


    - The client that runs on a user’s computer or smartphone and initiates communication

    - The server offering an API as a means to access its data or features

    - The resource, which is any piece of content that the server can provide to the
    client


    When a client requests a resource via a RESTful API, the server transmits a representation
    (via HTTP/JSON) of the resource’s state to the requestor or endpoint.


    In this chapter, you learn how to create a RESTful web service using the Jakarta
    EE platform. You also learn how to deploy and test your web service on an Open
    Liberty server. First, the chapter focuses on creating a server-side component
    using the Jakarta RESTful Web Service (formerly JAX-RS). You will start by creating
    a simple web service that returns basic information about products. Then you will
    add more functionality, such as returning a list of products and allowing the
    client to create a new product.


    © Tarun Telang 2023


    T. Telang, Beginning Cloud Native Development with MicroProfile, Jakarta EE, and
    Kubernetes, [https://doi.org/10.1007/978-1-4842-8832-0_4](https://doi.org/10.1007/978-1-4842-8832-0_4#DOI)'
