    \ Deployment\n\n这是微服务部署中一种广为人知的策略。`canary`是一个候选版本的微服务，只接收一小部分流量。\n\n这包括先将新版本微服务发布到一小部分负载上，并观察其是否按预期运行。随着微服务通过严格测试，它会逐步承载更大的工作负载。如果`canary`运行不正确，流量可以被路由到稳定版本，同时对问题进行调查和调试。Canary\
    \ rollback 是定期回滚微服务的过程。\n\n第 5 章 MiCroserviCes arChiteCture\n\nCanary 部署策略一次只发布一个微服务。具有更高关键性和风险的微服务可以先于其他微服务上线。它通过尽早发现问题来提升可用性，避免关键微服务在暴露给整个系统后才发现故障。\n\
    \n### Pitfalls of Canary Deployment\n\n这种方法最大的潜在陷阱是可能过早发布微服务。Canary 发布通常是流量受限的小规模微服务。部署期间频繁出现问题也会拖慢开发进度。\n\
    \n## Blue-Green Deployment\n\nBlue-green 部署策略是在生产环境中同时维护两个微服务变体。一个微服务版本（蓝色微服务）对用户可见并接收流量。另一个（绿色微服务）保持空闲，供开发者进行更新。微服务会保持在蓝色状态，直到通过测试并准备发布。通过所有测试后，微服务切换到绿色状态，开始接收流量并对用户可见。不过，微服务会被持续监控，以判断其表现是否良好，或是否需要回退到蓝色状态。\n\
    \nBlue-green 部署通过在开发与部署期间保持微服务可用来提升可用性。开发和部署期间不会停机，因为始终有另一个稳定变体在服务生产流量。此外，如果新部署运行不正确，你可以快速回滚到先前变体（即蓝色微服务）。\n\
    \n### Pitfalls of the Blue-Green Deployment Strategy\n\n微服务版本不匹配是 blue-green 部署的一个潜在陷阱。另一个陷阱是微服务需要持续监控来发现问题，这会增加成本和时间投入。\n\
    \n## Dark Launching\n\nDark launch 是一种将更新部署到仅覆盖小部分用户群体的微服务技术，不会影响整个系统。当你对一个新特性进行\
    \ dark launch 时，最初会对大多数终端用户隐藏它。发布受众会根据用例和业务需求而变化。  \n140\n\n第 5 章 MiCroserviCes\
    \ arChiteCture\n\nDark launching 的过程包括在与生产环境分离的环境中构建新版本微服务。\n\n一旦该特性完成测试，你会将其部署到预生产或测试环境，并逐步扩大发布范围，直到所有用户都能接触到它。随后，如果该特性表现良好，你会继续部署以服务更多用户。\n\
    \nFeature toggles 是渐进式发布更新的良好方式。你可以轻松地将特性打开或关闭。这样你可以在不完全上线的情况下测试其影响。在测试阶段，你可以选择将哪些流量路由到位于\
    \ feature toggles 之后的微服务。当微服务在真实负载下测试通过并被证明合适后，它会被激活以服务整个生产环境流量。\n\nDark launching\
    \ 的最大收益之一是你可以在产品发布前进行更多测试，从而尽早发现`bug`，节省修复生产环境`bug`所需的时间和成本。\n\nDark launching\
    \ 还允许开发团队在终端用户可见之前测试新系统架构。这种策略支持将发布控制在预先确定的受众范围内，这些受众在统计上更可能使用该微服务。这将使你能够在部署到生产环境之前获得关键洞察。\n\
    \n### Pitfalls of Dark Launching\n\nDark launching 最大的潜在陷阱是可能过早发布微服务。另一个缺点是微服务位于\
    \ feature toggles 之后，这可能增加调试微服务所需的时间和成本。此外，为了实现持续开发，团队必须能够在开发期间将微服务置于 feature\
    \ toggles 之后。\n\n## Staged Release\n\n微服务的 staged release 部署策略是将微服务逐步发布到一个个环境中。例如，开发团队应先将微服务发布到测试环境，之后再发布到生产环境。\n\
    \n第 5 章 MiCroserviCes arChiteCture\n\n在确认微服务在测试环境中是安全之前，不要在生产环境启用它们。Staged release\
    \ 策略会增量部署每个服务。与同时部署相比，这能为每个服务带来更长的故障间隔时间。它通过将多个服务的故障在时间上错开来维持高可用性，同时也提供更好的恢复能力。\n\
    \n### Pitfalls of Staged Release\n\n在这种方法中，当微服务被引入新环境时可能会出现停机。部署大批量变更可能让开发团队更难诊断并从故障中恢复。此外，开发需要将所有变更作为单一批次部署。这意味着任何错误都将要求他们对每个微服务回滚整个发布过程。\n\
    \n## Microservices Management\n\n对工程经验有限或尚未建立最佳实践的组织而言，部署微服务可能非常具有挑战性。技术选型也会产生影响，因为某些微服务需要更多管理，尤其是在高速度平台上的微服务。这些微服务需要持续关注，以提升其性能、安全性、扩展能力等。\n\
    \n## Summary\n\n在本章中，你学习了微服务架构。你还了解了其他流行的软件设计方法及其优缺点。若实现得当，微服务能够帮助你创建由松耦合服务组成、且更易于管理和扩展的应用。\n\
    \n然而，使用这种架构风格也伴随一些挑战。你需要制定处理服务间故障的策略，并仔细考虑服务如何交互。在接下来的章节中，你将学习如何使用 Eclipse MicroProfile\
    \ 实现完整的微服务解决方案。你还将学习如何将它们部署在 Docker 容器中，并使用 Kubernetes 进行编排。\n\n# CHAPTER 6\n\n\
    ## The Eclipse MicroProfile Framework\n\n在本章中，你将了解 Eclipse MicroProfile 架构。本章还涵盖\
    \ Eclipse MicroProfile 中最关键、最核心的标准，即配置、健康检查、容错、度量、RESTful Web 服务、开放追踪和开放 API。\n\
    \n### What Is the Eclipse MicroProfile Framework?"
