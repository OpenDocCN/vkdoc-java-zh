    **The MicroProfile Metrics Specification**


    The MicroProfile Metrics project provides a set of annotations and APIs for measuring
    the performance of your applications. It is a specification for exposing application
    metrics in a standard format. It allows other tools and frameworks to collect
    and track an application’s metrics easily.


    In other words, this specification defines a set of standard metrics that you
