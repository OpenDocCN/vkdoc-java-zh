    activeUsers\");\n```\n\n## 暴露指标\n\n### JMX\n\nTo expose metrics via Java Management\
    \ Extensions (JMX), add the following dependency to your project:\n\n```xml\n\
    <dependency>\n    <groupId>org.eclipse.microprofile.metrics</groupId>\n    <artifactId>microprofile-metrics-api</artifactId>\n\
    \    <version>2.3</version>\n</dependency>\n```\n\nThis will enable JMX support\
