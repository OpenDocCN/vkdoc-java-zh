- fmt: '## Deleting Services with `kubectl`


    You can also use `kubectl` to delete services. To delete a service, run the following
    command:


    ```bash

    kubectl delete service <servicename>

    ```


    Replace `<servicename>` with the name of the service you want to delete.


    ```bash

    kubectl delete service ms-service

    ```


    ```text

    service "ms-service" deleted

    ```


    You have learned how to containerize a microservice using Docker and deploy it
    on a Kubernetes cluster.


    ## Summary


    In this chapter, you started by learning what containers are and why you should
    use them. Next, you learned about container orchestration. You also learned about
    the essential features and terminology of Kubernetes. You learned how to containerize
    a microservice using Docker and deploy it on a Kubernetes cluster. Finally, you
    learned how to scale deployments and delete them when needed.


    Here are the key takeaways from this chapter:


    - Containerization is a way to package software so that it can run isolated from
    other software on the same host, which improves reliability and resilience. Containers
    package your microservice with all its dependencies into a single unit that is
    portable, easy to deploy, and easy to manage.

    - Container orchestration is the process of automating containerized applications’
    deployment, management, and scaling. Kubernetes is the most popular container
    orchestration tool. Container orchestration improves efficiency and security,
    reduces cost, simplifies debugging, and increases flexibility and scalability
    of the application running in containers.


    Here are some of the essential Kubernetes terms you should remember.


    ## Essential Kubernetes Terms


    - A `pod` is a group of containers deployed on the same host. Pods provide colocation
    and communication between containers.

    - A `service` is an abstraction that defines a logical set of pods and provides
    stable networking to those pods. Services enable loose coupling between microservices.

    - A `deployment` is an object that describes the desired state for a group of
    pods. A deployment ensures that the desired state is maintained even if the pods
    are deleted or restarted.

    - A `node` is a worker machine in Kubernetes. Each node has a pod running on it.
    Nodes communicate with each other using the Kubernetes API.

    - A `worker node` is a machine used to run containers. A worker node can be a
    physical or virtual machine.

    - A `master node` is a machine used to manage the Kubernetes cluster.

    - A group of nodes is called a `cluster`.

    - `Labels` are key/value pairs attached to objects, such as pods. They are used
    to identify and select groups of objects.

    - `Selectors` are used to select a group of objects based on their labels.

    - `Annotations` are used to store non-identifying metadata about objects.


    ## Kubernetes Features


    Key features of Kubernetes include management, automatic deployment, storage orchestration,
    rolling updates, automatic bin-packing, monitoring, health checks, horizontal
    scaling, auto-scaling, load balancing, service discovery, secrets and configuration
    management, and load distribution of containerized applications.


    ## Dockerfile and Docker Images


    A `Dockerfile` is used to create a Docker image. A base image is a starting point
    for creating a new image. A Docker image is a read-only template that contains
    a set of instructions to create a container. You can get base images from Docker
    Hub or other repositories.


    You need to write a `Dockerfile` and run the `docker build` command to build a
    Docker image.


    ```bash

    docker login --username=<your-dockerhub-username> --email=<your-email@company.com>

    docker images

    docker tag <imageid> <your-dockerhub-username>/<repository>:<tag>

    docker push <your-dockerhub-username>/<repository>:<tag>

    ```


    Before deploying the Docker image to Kubernetes, you need to push it to a registry.
    You can push the image to Docker Hub or other registries such as Google Container
    Registry (`GCR`).


    ## `kubectl` Overview


    `Kubectl` is a command-line tool used to manage Kubernetes objects. You can use
    `kubectl` to create, delete, update, and view Kubernetes objects such as pods,
    services, and deployments.'
