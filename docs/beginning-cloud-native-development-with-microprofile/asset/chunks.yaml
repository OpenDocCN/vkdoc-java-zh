- fmt: '## Drawbacks of Using Cloud-Native Applications


    There are a few drawbacks of using cloud-native applications to keep in mind.
    If not done correctly, they can introduce additional complexity and technical
    debt.


    Here are the disadvantages of cloud-native applications:


    - Increased complexity: They are usually more complex than traditional applications
    and can be challenging to develop and manage. They often require specialized skills
    and knowledge to develop and operate effectively.

    - Increased cost: They can be more expensive to develop and operate than traditional
    applications due to the need for specialized skills and infrastructure. Additionally,
    cloud-native applications may require more resources than traditional applications,
    which can increase costs.

    - Increased dependencies: They often have more dependencies on other services
    and components, making them more challenging to manage.

    - More challenging to develop: They can be more challenging to develop effectively
    due to the increased complexity. Specialized skills and knowledge are often required.


    Despite these drawbacks, cloud-native applications are a good choice for many
    organizations due to several benefits they offer.


    ## Cloud-Native Applications vs. Traditional Applications


    Cloud-native is often contrasted with traditional (legacy) or monolithic applications,
    which are typically large, complex applications that are difficult to update and
    scale.


    Monolithic applications are often not designed to be deployed in cloud environments,
    which can limit an organization’s ability to take advantage of the benefits of
    the cloud.


    Table [2-1](#index_split_000.html#p55) lists some of the key differences between
    a cloud-native application and a traditional application.


    ### Table 2-1. Key Differences Between Cloud-Native and Traditional Applications


    | Characteristics | Cloud-Native Applications | Traditional Applications |

    |---|---|---|

    | Microservices | A cloud-native application is typically built as a set of small,
    independent microservices. | A traditional application is a single, large codebase
    deployed as a single unit. In other words, traditional applications use a monolithic
    architecture. |

    | Loose coupling | Components of a cloud-native application are independently
    deployable and scalable. They communicate with each other through APIs or messaging
    queues. | Components of a traditional application are closely dependent on each
    other. They are difficult to deploy and scale independently. |

    | Automation | Cloud-native applications are built using automation tools, such
    as continuous integration and continuous delivery (`Ci/Cd`) pipelines. | Traditional
    applications are typically built using manual processes, such as code reviews
    and testing. They are not built using automation tools, such as continuous integration
    and continuous delivery (`Ci/Cd`) pipelines. This makes them difficult to deploy
    and scale. |

    | Scalable | Cloud-native applications can be scaled up or down to meet changing
    demand. | Traditional applications cannot be easily scaled up or down to meet
    changing demand. |

    | Self-healing | Cloud-native applications are designed to recover from failures
    automatically. | Traditional applications are not designed to recover from failures
    automatically. |

    | DevOps culture | Organizations that are using cloud-native applications often
    have a devops culture, which emphasizes collaboration between developers and operations
    staff to speed up the software development and delivery processes. | This culture
    shift can be challenging for organizations that are used to more traditional approaches
    to software development. |


    Overall, cloud-native applications are designed to be more agile, flexible, and
    scalable than traditional monolithic applications. They can be a great choice
    for organizations that are looking to speed up their software development and
    delivery process.


    ## Cloud-Native Application Development'
