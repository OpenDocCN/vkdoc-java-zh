    ![](index-12_1.jpg)


    ## About the Author


    `Tarun Telang` is a hands-on technologist with extensive experience in the design
    and implementation of multitiered, highly scalable software applications. He has
    been part of several well-known companies, including Microsoft, Oracle, Polycom,
    and SAP. He has over 17 years of experience in architecting and developing business
    applications.


    He began his career as an enterprise Java developer at SAP, where he developed
    distributed application software for big firms. He got his start with enterprise
    session beans and message-driven beans, as well as instrumenting enterprise applications’
    configuration and management using the Java Management Extensions (JMX) technology.


    He quickly mastered various enterprise technologies, including the Enterprise
    Beans, Java Management Extensions, Servlets, and Server Pages technologies, and
    in his first year as a developer, he became a Sun Certified Programmer for the
    Java Platform, Standard Edition 6, and an SAP Certified Development Consultant
    for the SAP NetWeaver Java Web Application Server (which was a Java EE 5-compliant
    application server).


    He also gained expertise in XML technologies like XSLT and XSD. He developed several
    solutions using session beans and message-driven beans to handle message-oriented
    communications across numerous systems. In 2007, Tarun was named an SAP Mentor
    and Community Influencer for his articles and blog posts on emerging technologies
    and for promoting innovative solutions in the SAP Developer Community.


    He frequently writes articles on Java and related technologies. Tarun has also
    authored multiple online courses, including a best-selling course on the YAML
    data serialization language.


    He has presented technical lectures at several developer conferences, including
    SAP TechEd and the Great Indian Developer Summit. He has been presenting at conferences
    for more than 15 years and actively publishes technical papers and blogs to assist
    everyone in grasping the fundamentals of software technology. Tarun developed
    xiii `abouT The auThor` cloud-based video conferencing applications using a microservices
    architecture with the Spring framework and has experience working with Persistence
    APIs and the Hazelcast framework for building REST-based services.


    He also developed many end-to-end cloud-based solutions using various architectural
    patterns, including microservices and service-oriented architectures. Tarun has
    gained expertise in web, mobile, and cloud technologies. He is also knowledgeable
    in applied agile methodologies, including user-centric and mobile-first design
    for managing projects with cross-functional teams located in multiple geographies.
    Tarun is the co-author of `Java EE to Jakarta EE 10 Recipes: A Problem-Solution
    Approach for Enterprise Java` (Apress, 2022).


    Having previously worked in Canada and Germany, Tarun currently resides in Hyderabad,
    India with his wife and son. You can follow him on LinkedIn ([www.linkedin.](http://www.linkedin.com/in/taruntelang/)


    [com/in/taruntelang/), F](http://www.linkedin.com/in/taruntelang/)acebo[ok (www.facebook.com/tarun.telang](https://www.facebook.com/tarun.telang)),
    and Twitter (`@taruntelang`). His blog a[t https://blogs.taruntelang.me](https://blogs.taruntelang.me)
    is an excellent resource for all things related to software technology!


    xiv


    ![](index-14_1.jpg)


    ## About the Technical Reviewers


    `Massimo Nardone` has more than 25 years of experience in security, web/mobile
    development, cloud, and IT architecture. His true IT passions are security and
    Android. He has been programming and teaching others how to program with Android,
    Perl, PHP, Java, VB, Python, C/C++, and MySQL for more than 20 years. He holds
    a Master of Science degree in computing science from the University of Salerno,
    Italy.


    He has worked as a CISO, CSO, security executive, IoT executive, project manager,
    software engineer, research engineer, chief security architect, PCI/SCADA auditor,
    and senior lead IT security/cloud/SCADA architect for many years. His technical
    skills include security, Android, cloud, Java, MySQL, Drupal, Cobol, Perl, web
    and mobile development, MongoDB, D3, Joomla, Couchbase, C/C++, WebGL, Python,
    Pro Rails, Django CMS, Jekyll, Scratch, and more.


    He was a visiting lecturer and supervisor for exercises at the Networking Laboratory
    of the Helsinki University of Technology (Aalto University). He also holds four
    international patents (in the PKI, SIP, SAML, and Proxy areas). He is currently
    working for Cognizant as head of cybersecurity and CISO to help clients in areas
    of information and cybersecurity, including strategy, planning, processes, policies,
    procedures, governance, awareness, and so forth. In June, 2017, he became a permanent
    member of the ISACA Finland Board.


    Massimo has reviewed more than 45 IT books for different publishing companies
    and is the co-author of `Pro Spring Security: Securing Spring Framework 5 and
    Boot 2-based Java Applications` (Apress, 2019), `Beginning EJB in Java EE 8` (Apress,
    2018), `Pro JPA 2 in Java EE 8` (Apress, 2018), and `Pro Android Games` (Apress,
    2015)


    xv


    ![](index-15_1.jpg)


    `abouT The TeChniCal reviewers`


    `Pramit Das` has more than 12 years of experience in software design and development
    across multiple platforms using various technology stacks. He is extremely passionate
    about programming and exploring new and upcoming technologies. He has extensive
    hands-on experience with programming languages like C/C++, Java, Scala, JavaScript,
    and Python, along with their respective tools, libraries, and frameworks, including
    Spring, Django, NodeJs, and Spark. He also has excellent knowledge of backend
    storage solutions from Oracle, MySQL, MongoDB, and Cassandra, as well as other
    cloud-based managed services.


    Academically, Pramit received his Bachelor’s of Technology from NIT, Rourkela
    in Computer Science & Engineering, graduating in `2009\.` He has experience in
    product- and service-based industries and is currently working for the cloud giant
    Salesforce as a full-time engineer.


    xvi


    ## Acknowledgments


    I would like to thank my wife, Nikita, and son, Vihan, for their patience and
    love throughout the process of writing this book. I am indebted to all my mentors
    and friends who encouraged me to keep on growing during every phase of my professional
    career.


    I’d like to thank my parents for pushing me in the right direction with technology
    and always supporting me every step of the way, even when I decided to do something'
