- fmt: '# Continuous Integration and Continuous Delivery (CI/CD)


    Continuous Integration and Continuous Delivery (CI/CD) is a software engineering
    practice where members of a team integrate their work frequently, usually each
    person integrating at least once a day. Each integration is verified by an automated
    build to detect integration errors as quickly as possible. CD is the practice
    of shipping code on demand, or more frequently, in order to get feedback from
    users as soon as possible.


    CI/CD automates the development process by integrating code check-ins, automated
    testing, and software deployment into a single streamlined pipeline. This helps
    to ensure that code is always checked for errors and conforms to project standards,
    that tests run automatically to identify potential problems, and that new code
    is deployed quickly and safely.


    CI/CD pipelines are an important part of the modern software development process.
    They can help speed up the development cycle and make it easier to deploy new
    code changes.


    There are many different CI/CD tools available, but some of the most popular ones
    include Jenkins, Travis CI (`www.travis-ci.com/`), and CircleCI (`https://circleci.com/`).


    In addition, there are several cloud-based CI/CD services, such as AWS CodePipeline
    (`https://aws.amazon.com/codepipeline/`) and Azure DevOps (`https://azure.microsoft.com/en-in/products/devops`).


    ## `Infrastructure as Code (IaC)`


    Infrastructure as Code is an important part of DevOps. It involves managing and
    automating the deployment of your infrastructure using code. It includes the configuration
    of servers, networks, and applications. It allows you to define your infrastructure
    using declarative languages, such as Terraform or AWS CloudFormation.


    This makes it easy to version-control your infrastructure and automate the provisioning
    process. In addition, IaC tools can help ensure that your infrastructure is consistent
    and repeatable, making it easier to manage and update.


    IaC can help you manage your infrastructure more effectively, by automating the
    deployment and management of your resources. This can make it easier to keep your
    infrastructure consistent and up-to-date, and can help reduce the amount of manual
    work required to manage your environment.


    IaC tools can also help you manage your costs, by allowing you to automate the
    provisioning and management of your resources. This can help you save money on
    your infrastructure costs, as well as reduce the time and effort required to manage
    your environment.


    Table 2-3 shows a list of popular IaC tools, along with their descriptions.


    ### Table 2-3. IaC Tools and Technologies


    - **AWS CloudFormation**: A service for modeling and setting up AWS resources,
    helping deploy, manage, and version infrastructure safely and efficiently. Official
    documentation: `https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/Welcome.html`

    - **Azure Resource Manager**: A deployment and management service for Azure resources.
    Official documentation: `https://docs.microsoft.com/en-us/azure/azure-resource-manager/management/overview`

    - **Google Cloud Deployment Manager**: A tool to create, deploy, and manage Google
    Cloud resources. Documentation: `https://cloud.google.com/deployment-manager/docs`

    - **Terraform**: A tool for building, changing, and versioning infrastructure
    across existing and popular service providers as well as custom in-house solutions.
    Official site: `https://www.terraform.io/`

    - **Puppet**: A configuration management tool that helps automate tasks and manage
    infrastructure. Official site: `https://puppet.com/`

    - **Ansible**: A simple, powerful, and easy-to-use configuration management and
    orchestration tool, using a pure-Ruby, domain-specific language approach for system
    configuration automation, and can integrate with cloud-based platforms such as
    Amazon EC2. Official site: `https://www.ansible.com/`

    - **Chef**: Used to streamline the task of configuring and maintaining a company’s
    servers; written in Ruby and Erlang, and uses “recipes.” Official site: `https://www.chef.io/`


    ## Microservices Architecture


    The third phase of cloud-native application development is microservices architecture.
    This phase is all about breaking your application into small, independent services
    that can be deployed and scaled independently. Microservices have many benefits,
    such as improved scalability and resilience. However, they can also be more difficult
    to develop and manage. You learn more about microservices architecture in Chapter
    5 (`https://doi.org/10.1007/978-1-4842-8832-0_5`).


    ## Containerization


    Containerization is the process of packaging your applications into containers.
    Containers are a lightweight alternative to virtual machines and allow you to
    package your application and its dependencies. This makes it easy to deploy and
    run your application in any environment. There are container technologies available,
    such as Docker. In addition, there are several cloud-based container services,
    such as Amazon ECS and Google Container Engine. You learn containerization technologies
    in detail later in this book.


    ## Serverless Computing


    Some of the latest trends in cloud-native application development include serverless
    computing, which allows developers to build applications without having to worry
    about provisioning and managing servers.


    Serverless functions are executed in response to events and are only charged for
    the amount of time they run. This makes them very cost-effective. There are many
    different serverless platforms available, such as AWS Lambda, Azure Functions,
    and Google Cloud Function. In addition, there are several serverless frameworks,
    such as Serverless Framework. You learn more about serverless computing in Chapter
    5 (`https://doi.org/10.1007/978-1-4842-8832-0_5`).


