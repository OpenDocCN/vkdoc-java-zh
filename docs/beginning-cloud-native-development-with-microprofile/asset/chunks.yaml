    Jakarta EE platform. The goal of the MicroProfile group is to create a set of
    standards that developers can use to develop microservices on top of the Jakarta
    EE platform. The Eclipse Foundation, the home of the Jakarta EE project, also
    manages the creation of MicroProfile standards.


