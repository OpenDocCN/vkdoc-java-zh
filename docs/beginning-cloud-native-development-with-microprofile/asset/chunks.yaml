    \ the latest version of Servlet.\n\n```xml\n<dependency>\n  <groupId>jakarta.servlet</groupId>\n\
    \  <artifactId>jakarta.servlet-api</artifactId>\n  <version>5.0.0</version>\n\
    </dependency>\n```\n\nNow you can start working on your project; you can import\
    \ the project into your IDE. Run the application on the Liberty server.\n\n```bash\n\
    $ mvn liberty:dev\n```\n\nWhen you make changes to the code, you’ll see them automatically\
    \ reflected in the running server. Table `B-1` lists the Maven commands for an\
    \ Open Liberty server.\n\n## Table B-1. Maven Commands for an Open Liberty Server\n\
    \n### `mvn liberty:dev`\n\nDownloads, installs, and starts the Open Liberty server\
