    \ shows a list of some of the popular media types, along with their constant fields\
    \ in the `jakarta.ws.rs.core.MediaType` class and the corresponding HTTP `ContentType`.\n\
    \n### Table 4-2. Popular Media Types and Their Constant Fields\n\n| Media Type\
    \ | Constant Field in `MediaType` Class | HTTP `ContentType` |\n|---|---|---|\n\
    | JSON | `MediaType.APPLICATION_JSON` | `application/json` |\n| XML | `MediaType.APPLICATION_XML`\
    \ | `application/xml` |\n| HTML | `MediaType.TEXT_HTML` | `text/html` |\n\n##\
    \ ProductService Overview\n\nThe `ProductService` class is annotated with `@ApplicationScoped`.\
    \ This will ensure that this class is available as long as the application is\
    \ running. The `ProductService` class has a `getProducts()` method, which returns\
    \ a list of products. This method is annotated with the `@GET` annotation, which\
    \ maps this method to the GET HTTP method.\n\nThe `@Produces` annotation tells\
    \ the server that this method produces JSON content. This will return the following\
    \ JSON response when you make a GET request to the `/api/products` endpoint.\n\
    \nTo call this RESTful web service, you can type the [`https://localhost:9080/api/products`](https://localhost:9080/api/products)\
    \ URL in your browser. As shown in Figure [4-12](#index_split_001.html#p121),\
    \ the response is an array of JSON objects. Each object has an `id` and `name`\
    \ property. Note that only GET methods can be tested with browsers.\n\n![](index-121_1.png)\n\
    \n![](index-121_2.jpg)\n\n*Figure 4-12. The output of the RESTful web services\
    \ in the browser*\n\nTo call all the HTTP methods (including PUT, POST, and DELETE),\
    \ you can use a REST client such as Postman ([www.postman.com/](http://www.postman.com/)).\
    \ See Figure [4-13](#index_split_001.html#p121).\n\n*Figure 4-13. Calling RESTful\
    \ web services using the Postman client*\n\nAdditionally, you can use the `curl`\
    \ command-line utility to execute all the HTTP methods for your REST API. See\
    \ Figure [4-14](#index_split_001.html#p122).\n\n![](index-122_1.png)\n\n*Figure\
    \ 4-14. Calling RESTful web services using the `curl` command-line utility*\n\n\
    ## Writing Unit Tests for the Service Class\n\nUnit tests can be written to test\
    \ the service classes of a REST API. The following code demonstrates how to write\
    \ a unit test using `JUnit5` for the `ProductService` class:\n\n```java\npackage\
    \ org.microprofile.cloudnative.rest;\n\nimport org.junit.jupiter.api.AfterEach;\n\
    import org.junit.jupiter.api.BeforeEach;\nimport org.junit.jupiter.api.Test;\n\
    import java.util.List;\n\nimport static org.junit.jupiter.api.Assertions.assertEquals;\n\
    import static org.junit.jupiter.api.Assertions.assertNotNull;\n\nclass ProductServiceTest\
    \ {\n\n    private ProductService productService;\n\n    @BeforeEach\n    void\
    \ setUp() {\n        productService = new ProductService();\n    }\n\n    @AfterEach\n\
    \    void tearDown() {\n        productService = null;\n    }\n\n    @Test\n \
    \   void testGetProducts() {\n        List<Product> products = productService.getProducts();\n\
    \        assertNotNull(products);\n        assertEquals(2, products.size());\n\
    \    }\n}\n```\n\n![](index-123_1.jpg)\n\nThe `testGetProducts()` method tests\
    \ the `getProducts()` method of the `ProductService` class. The `assertNotNull()`\
    \ and `assertEquals()` methods are used to verify that the products list is not\
    \ null and that it contains two products.\n\nYou can also execute the unit tests\
    \ using your IDE. For example, in IntelliJ, you can right-click the test class\
    \ and select `Run ProductServiceTest`. In Eclipse, you can right-click the `ProductServiceTest`\
    \ class and select `Run As ➤ JUnit Test`. See Figure [4-15](#index_split_001.html#p123).\n\
    \n*Figure 4-15. Unit test execution using IntelliJ IDEA Ultimate Edition*\n\n\
    ## Updating Product Data Using REST APIs\n\nAfter having successfully performed\
    \ the development and testing of a GET method of `ProductService` to fetch the\
    \ list of products resources, you’ll now see how to create, update, and delete\
    \ a product using the product’s REST API. For this, you only need to add methods\
    \ to the `ProductService` class.\n\n### Creating a Product\n\n```java\n@POST\n\
    @Consumes(MediaType.APPLICATION_JSON)\n```"
