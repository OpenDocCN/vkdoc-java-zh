    \ information about a single `api` operation, such as the summary, tags, etc.\
    \ |\n| `@Schema` | Specifies information about the data type of a property. |\n\
    | `@ParameterIn` | Specifies the location of a request parameter, such as `QUERY`,\
    \ `PATH`, etc. |\n| `@Callback` | Specifies a callback `url` for an asynchronous\
    \ operation. |\n| `@Callbacks` | Specifies multiple `@Callback` annotations. |\n\
    \n## Viewing the Generated Documentation\n\nTo view the generated documentation,\
