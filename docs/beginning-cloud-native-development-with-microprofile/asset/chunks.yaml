- fmt: '## MicroProfile Health


    [MicroProfile Health](https://microprofile.io/project/eclipse/microprofile-health)
    specification provides a standard way to expose health-related information from
    your application. This information can be used to monitor the health of your application.
    It provides APIs for writing health checks.


    ## Chapter 6 The Eclipse MicroProfile Framework


    The Eclipse MicroProfile platform allows developers to choose the specifications
    they need for their microservices. It is also designed to be easily extended so
    that developers can add more features as needed. If a developer needs a new specification,
    they can request it from the MicroProfile community. If it’s approved by the community,
    the new specification will be created and added to the MicroProfile platform in
    a future release. This makes the platform versatile and adaptable to any organization’s
    needs.


    ### Popular Implementations of the Eclipse MicroProfile Framework


    The Eclipse MicroProfile is an essential tool for developers who want to create
    microservices. It provides a standard set of specifications that can be used to
    build microservices. This makes it easier for developers to share code and create
    interoperable services. Here are some of the popular implementations of MicroProfile:


    - **Payara Micro** ([https://www.payara.fish/products/payara-micro/](https://www.payara.fish/products/payara-micro/)):
    Payara Micro is the open-source, lightweight middleware platform of choice for
    developers, architects, and IT organizations looking to improve application server
    startups in production environments while providing a consistent development experience.

    - **WildFly** ([https://www.wildfly.org/](https://www.wildfly.org/)): WildFly
    is a lightweight Jakarta EE-compliant application server.

    - **Apache TomEE** ([https://tomee.apache.org/](https://tomee.apache.org/)): TomEE,
    pronounced “Tommy,” is an all-Apache stack-aimed application server for Jakarta
    EE specifications.

    - **Open Liberty** ([https://openliberty.io/](https://openliberty.io/)): Open
    Liberty is a fast, lightweight application server with a minimal footprint that
    supports Jakarta EE specifications.

    - **Quarkus** ([https://quarkus.io/](https://quarkus.io/)): Quarkus is a Kubernetes-native
    Java stack tailored for GraalVM and OpenJDK HotSpot, crafted from the best-of-breed
    Java libraries and standards.

    - **Helidon.io** ([https://helidon.io/](https://helidon.io/)): Helidon is a microservices-based
    framework for developing Java applications.

    - **Launcher** ([https://github.com/fujitsu/launcher](https://github.com/fujitsu/launcher)):
    Fujitsu launcher is a microservices-based application server.

    - **KumuluzEE** ([https://ee.kumuluz.com/](https://ee.kumuluz.com/)): KumuluzEE
    is an open-source framework that simplifies the development of cloud-native applications
    written in Java.


    In this book, I primarily use Open Liberty for demonstration, as it implements
    the latest MicroProfile standard. The development process should be similar if
    you want to use any other application server that supports Eclipse MicroProfile.


    ### MicroProfile Config


    A MicroProfile Config component provides APIs that help you manage your application’s
    configuration. The Config API allows you to:


    - Read and write configuration values

    - Access configuration values from multiple sources, including property files,
    system properties, and environment variables

    - Observe changes to configuration values using config events


    Some of the features of the Config API include:


    - `Config`: The `Config` class is used to access the configuration data.

    - `ConfigSource`: A `ConfigSource` is used to read configuration data from a specific
    source.

    - `Property`: A `Property` is used to represent a key/value pair in the configuration
    data.

    - `Converter`: A `Converter` is used to convert between types in the configuration
    data.

    - `Filter`: A `Filter` is used to filter the configuration data.


