    Chapter 7 MiCroprofile fraMework – part 2


    The MicroProfile Metrics spec is a useful tool for monitoring the performance
    of your application. It can be used to track the execution time of methods, the
    memory usage of methods, and custom metrics that you define. MicroProfile Metrics
    is easy to use and can be integrated with other monitoring tools.


    **Using Open Tracing**


    The MicroProfile OpenTracing specification defines a standard set of APIs for
    enabling distributed tracing in your methods. The goal of the MicroProfile OpenTracing


    specification is to maintain consistency across different tracing implementations,
    such as Jaeg[er (www.jaegertracing.io/](http://www.jaegertracing.io/)), Zipk[in
    (https://zipkin.io/), and A](https://zipkin.io/)ppDynamics ([www.appdynamics.com/).
    T](https://www.appdynamics.com/)his means that you can use any compatible tracing
    implementation with your microservices, without having to change your code.


    The MicroProfile OpenTracing specification consists of two parts:


    • The API definition describes how to instrument RESTful web services


    for distributed tracing.


    • The compatibility layer allows different tracing implementations to


    be used interchangeably with the MicroProfile OpenTracing API.


    **Distributed Tracing**


    Distributed tracing is a technique for understanding how distributed systems work
    by tracing the flow of requests through the system. It is used to troubleshoot
    different kinds of issues, such as performance issues, and identify bottlenecks
    in distributed systems.


    In a microservices architecture, each microservice is a separate process that
    runs on its machine. Requests can flow from one microservice to another, so it
    can be difficult to understand how the system works as a whole.


    Distributed tracing can help you see the big picture by tracing the flow of requests
    through the system and identifying which microservices are involved in each request.


    **How Does It Work?**


    The MicroProfile OpenTracing API defines how to instrument microservices for


    distributed tracing. The API is based on the OpenTracing standard, which is a
    vendor-171


    Chapter 7 MiCroprofile fraMework – part 2


    neutral way of instrumenting distributed systems for tracing. Without distributed
    tracing, it can be difficult to understand how a request flows through a microservice
    architecture.


    The MicroProfile OpenTracing compatibility layer allows different tracing


    implementations to be used with the MicroProfile OpenTracing API. This means that


    you can use any compatible tracing implementation with your microservices, without


    having to change your code.


    **MicroProfile OpenTracing Within a Jakarta RESTful Web Service**


    To implement OpenTracing, first you need to include the following Maven dependencies
    in the pom.xml file of your project.


    <dependency>


    <groupId>org.eclipse.microprofile.opentracing</groupId>


    <artifactId>microprofile-opentracing-api</artifactId>


    <version>3.0</version>


    </dependency>


    To enable distributed tracing in your application with Zipkin, first ensure it
    is


    installed and running. Refer to Chapt[er 3 t](https://doi.org/10.1007/978-1-4842-8832-0_3)o
    learn about how to install Zipkin on your system. Next, add the following code
    to your server.xml file.


    Assuming you are using Open Liberty as your MicroProfile implementation, the


    server.xml file will be located in the following path:


    /<project-folder>/src/main/liberty/config


    After your RESTful web services are running, you can look for the traces in your


    Zipkin server.'
