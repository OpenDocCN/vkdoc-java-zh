- fmt: '## Twelve-Factor Application Principles (3–12)


    3. `Config`: Configuration should be stored in the environment, rather than in
    the code, so that it can be easily changed without changing the code itself.


    4. `Backing services`: Twelve-factor apps are designed to use external backing
    services, such as databases and message queues. They should be treated as attached
    resources. This means that they can be easily detached and replaced without affecting
    the running code.


    5. `Build, release, run`: Twelve-factor applications are built using a repeatable
    and automatable process that includes tests to ensure quality. This ensures that
    they can be released at any time. They are then released as immutable artifacts
    that can be deployed easily and quickly. Finally, they are run in an isolated
    environment, such as a container, so that they can be scaled up or down as needed.


    6. `Processes`: Twelve-factor applications are designed to be run as stateless
    processes. The application is divided into small, self-contained processes. Each
    process can be started, stopped, or restarted independently as needed without
    affecting the others.


    7. `Port binding`: Twelve-factor applications are designed to be deployed on a
    server that exports a port for them to bind to. This makes it easy to run multiple
    instances of the app on the same server and also makes it easy to change the server
    if necessary.


    8. `Concurrency`: Twelve-factor applications are designed to be run in a concurrent
    environment so that they can take advantage of modern computing resources, such
    as a cluster of servers. Different parts of the app can be run at the same time
    on different cores or machines. This also allows them to be scaled up or down
    as needed.


    9. `Disposability`: Twelve-factor applications are designed to be started or stopped
    quickly. This makes it easy to deploy new versions or roll back changes if necessary
    without affecting the overall application.


    10. `Dev/prod parity`: Twelve-factor applications are designed to have the same
    environment in development as in production. This makes it easier to catch errors
    early and avoid surprises when deploying to production.


    11. `Logs`: Logging is the process of tracking the events that occur in a system.
    Logging can be used to improve the operations of a system and prevent problems
    from occurring in a system by tracking the events that are important to the system.
    Twelve-factor applications treat logs as event streams. This makes it easy to
    aggregate and process them for monitoring and analysis.


    12. `Admin processes`: Twelve-factor applications have separate processes for
    administering the app, such as running database migrations. This separation of
    concerns makes it easier to manage the app and avoid errors.


    ## What Is a Virtual Machine?


    A virtual machine is a software program that imitates a physical computer. It
    allows one computer to run multiple operating systems and applications simultaneously.


    Virtual machines have many benefits over physical machines. They are easier to
    deploy, manage, and scale. They also allow for greater flexibility and resource
    utilization. Additionally, virtual machines are not limited by hardware constraints
    and can be easily migrated to different hosts.


    Virtual machines are useful for testing software and applications in different
    environments without affecting the host computer. They are also used to run multiple
    operating systems on a single computer.


    One of the main disadvantages of virtual machines is that they can be less stable
    than physical machines. Additionally, virtual machines can be resource-intensive,
    requiring more `CPU`, memory, and storage than physical machines. They can also
    be more complex to manage and troubleshoot.


    Virtual machines are made possible by virtualization software, which creates a
    virtual environment for the guest operating system to run in. Virtualization software
    provides a layer of abstraction between the guest operating system and the host
    hardware, making it possible to run multiple guests on one host.


    A virtual machine is a computer that runs on another computer. The other computer
    is called the host, and the computer running on it is called the guest. Hardware
    infrastructure is the electronic and physical components that make up a computer
    system. This includes the central processing unit (`CPU`), memory, storage, input/output
    devices, and networking hardware.


    Virtualization is the process of creating a virtual machine. This can be done
    using software that emulates hardware or by running a hypervisor on top of existing
    physical hardware. Virtualization software provides a layer of abstraction between
    the guest operating system and the host hardware, making it possible to run multiple
    guests on one host.


    Hypervisors are a type of virtualization software that allows multiple guest operating
    systems to run on a single host. The most common type of hypervisor is a bare-metal
    hypervisor, which runs directly on the host’s hardware. Other types of hypervisors
    include hosted and para-virtualized.


    Bare-metal hypervisors are typically used in enterprise environments where performance
    and stability are critical. Hosted hypervisors are typically used in smaller environments
    or for testing and development purposes. Para-virtualization is a type of virtualization
    that requires special software to be installed on the guest operating system for
    it to run properly.


    There are many benefits to using virtual machines, including the ability to run
    multiple operating systems on one computer, the ability to migrate guests from
    one host to another easily, and the ability to isolate guests from each other.


    Virtual machines have some drawbacks, as well. They can be more resource-intensive
    than running a single operating system on a computer, and they can be less stable
    than natively running operating systems. Despite these drawbacks, virtual machines
    are popular due to the many benefits they offer.


    ## What Are Containers?


    Containers are a type of virtualization that allows you to isolate an application
    or service from the underlying operating system (`OS`). This enables you to run
    multiple containers simultaneously on a single `OS` instance.


    Each container has its isolated environment in which it can run without affecting
    other containers or the host `OS`. This makes containers an ideal solution for
    microservices, which are small, self-contained services that can be deployed and
    scaled independently.


    Containers are often compared to virtual machines (`VMs`). Both `VMs` and containers
    provide isolation and allow you to run multiple instances on a single host. However,
    there are some key differences between these two types of virtualization.


    `VMs` are heavier and more resource-intensive than containers. They require a
    full `OS` instance to be running inside each `VM`, which can lead to inefficient
    use of resources.


    In contrast, containers share a single `OS` kernel and only include the libraries
    and files they need to run, making them much lighter and more efficient. This
    enables you to run more containers on a single host than you could `VMs`.


    Another key difference is that `VMs` are typically used to run entire applications,
    while containers are typically used for individual services or components of an
    application. This makes it easier to deploy and scale applications using containers.


    If you’re looking for a way to virtualize your applications and services, containers
    are a great solution. They’re lightweight, efficient, and easy to deploy and scale.


    ## What Are Container-Based Applications?


    [Containers ar](https://en.wikipedia.org/wiki/OS-level_virtualization)e lightweight
    virtual machines or self-contained units of deployment.'
