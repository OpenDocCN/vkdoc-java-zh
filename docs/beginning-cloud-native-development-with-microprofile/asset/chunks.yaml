- fmt: '# Cloud-Native Application Development


    Cloud-native applications are designed to take advantage of the benefits of cloud
    computing. They are built using a microservices architecture and deployed using
    containers like Docker and managed Kubernetes clusters. They are also easy to
    deploy and manage. The term “cloud-native” is often used interchangeably with
    “container-native” or “microservices-based.” Cloud-native applications are a vital
    part of the cloud computing movement. They allow businesses to rapidly develop
    and deploy new applications without the need for expensive infrastructure. Cloud-native
    apps are typically built using open-source technologies such as Docker and Kubernetes.


    Java-based cloud-native apps can be built using MicroProfile and Jakarta EE specifications.
    MicroProfile is an open-source specification that defines a set of standards for
    building cloud-native applications. It includes standards for microservices, security,
    and REST APIs.


    Jakarta EE is the new name for Java EE, a mature platform for building enterprise
    applications. MicroProfile and Jakarta EE are complementary. MicroProfile is focused
    on microservices, while Jakarta EE is focused on enterprise applications. Both
    platforms can thus be used to build cloud-native applications.


    ## Characteristics of Cloud-Native Applications


    If you’re looking to build a cloud-native application, there are a few things
    to keep in mind. First, you need to choose a microservices architecture that will
    allow you to break your application into small, independent modules. Second, you
    need to make sure your application is scalable and can handle increased demand
    by adding more resources. Finally, you need to ensure your application is secure
    and uses the security features of the cloud platform it is running on.


    The following key characteristics are common in cloud-native applications:


    - Microservices: Cloud-native applications are typically built using microservices,
    which are small, independent services that work together to form a complete application.

    - Loose coupling: Cloud-native applications are typically designed with loose
    coupling, which means that they can be easily divided into smaller parts that
    can be independently deployed and updated.

    - Scalability: Cloud-native applications are designed to be scalable, which means
    they can easily handle increased demand by adding more resources.

    - Resilience: Cloud-native applications are resilient, which means they can continue
    functioning even if part of the system fails.

    - Agility: Cloud-native applications are designed to be agile, which means they
    can be quickly deployed and updated.

    - Security: Cloud-native applications are designed to be secure, which means they
    use the security features of the cloud platform they are running on.

    - Automation: Cloud-native applications are typically automated, which means that
    they can be deployed and updated without human intervention.

    - Self-healing: Cloud-native applications include monitoring and logging features
    that make detecting and diagnosing problems easy. In addition, cloud-native applications
    are designed to self-heal, which means they can automatically recover from failures.

    - DevOps culture: Cloud-native applications are typically developed using a DevOps
    culture, which means that developers and operations staff work together to create
    and deploy applications.


    These characteristics make cloud-native applications well suited for deployment
    in cloud environments where resources can be quickly added or removed as needed
    and where failures are expected. Cloud-native applications can also be quickly
    updated without affecting the overall system, which makes them ideal for agile
    development processes.


    `Figure 2-1` illustrates the key characteristics of cloud-native applications.


    ![](index-51_1.jpg)


    `Figure 2-1.` Characteristics of cloud-native applications


    ## Examples of Cloud-Native Applications'
