  └── liberty\n\n└── config\n\n└── server.xml\n\nDockerfile 可用于在 Docker 容器中构建和运行应用程序（这将在第\
  \ [9 章](https://doi.org/10.1007/978-1-4842-8832-0_9) 中介绍）。`mvnw` 和 `mvnw.cmd` 脚本可用于在不安装\
  \ Maven 的情况下构建和运行应用程序。\n\n**理解 Open Liberty 项目的 Maven pom.xml 文件**\n\nOpen Liberty\
  \ starter 为你提供了一种简单快捷的方法来获取在 Open Liberty 中开始开发应用程序所需的文件。当你使用 Open Liberty starter\
  \ 生成项目时，`pom.xml` 文件会包含用于 89\n\n第 4 章 构建 RESTful Web 服务\n\nOpen Liberty 特性的最新稳定版本的依赖项。还会包含\
  \ `liberty-maven-plugin` 文件，以便你将应用程序部署并运行在 Open Liberty 服务器上。\n\n以下是 `pom.xml` 文件中包含的源代码：\n\
