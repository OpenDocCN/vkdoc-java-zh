  ![](img/index-79_1.jpg)\n\n第 3 章 搭建你的开发环境\n\n**Git**\n\nGit 是一个分布式版本控制系统，用于跟踪软件开发项目中的变更。\n\
  \n**安装 Git**\n\n要在你的系统上安装 Git，请按照以下步骤操作：\n\n1\\. 从 Git 官方网站下载最新版本的 Git  \n[网站（https://git-scm.com/）](https://git-scm.com/)。\n\
  \n图 3-2 展示了 Git 网站首页。\n\n***图 3-2。** git-scm 首页*\n\n第 3 章 搭建你的开发环境\n\n2\\. 运行下载的安装程序，并按照屏幕提示完成安装。\n\
  \n3\\. 运行以下命令验证安装：\n\ngit --version\n\n你应该会看到类似如下输出：\n\ngit version 2.31.1\n\n**创建\
  \ GitHub 账户**\n\nGitHub 是一个用于版本控制与协作的代码托管平台。本示例应用程序的代码将存储在该平台上。如果你还没有 GitHub 账户，请按以下步骤创建：\n\
  \n1\\. 访问 GitHub 网站[（https://github.com/）](https://github.com/)并点击 Sign up 按钮。\n\
  \n2\\. 在相应字段中输入你的电子邮箱地址、密码和用户名。\n\n\n\n3\\. 系统会询问你是否希望通过电子邮件接收产品更新和公告。根据你的偏好，选择“y”表示是，或选择“n”表示否。\n\
  \n4\\. 完成 CAPTCHA 验证后，点击 Create Account 按钮。\n\n5\\. 然后输入你在上一步提供的邮箱中收到的验证码。\n\n6\\\
  . 验证通过后，你可以点击 Skip Personalization，直接进入你的 GitHub Dashboard。\n\n现在你已经完成了使用 GitHub\
  \ 的全部准备。\n\n第 3 章 搭建你的开发环境\n\n**创建 GitHub 仓库**\n\n在本节中，你将学习如何为你的项目创建一个 GitHub 仓库。\n\
  \n1\\. 登录你的 GitHub 账号，然后点击页面右上角的 + 图标。\n\n2\\. 在下一页中，点击 New Repository。\n\n3\\.\
  \ 在 Create a New Repository 页面中，输入以下信息（参考图 3-3）：\n\n• **Owner：** 确认已选择你的 GitHub\
  \ 用户名。默认情况下应已选中。\n\n• **Repository name**：此处选择 cloud-native-app。\n\n• **Description\
  \ (optional)**：一个基于 Java 的云原生应用开发项目。\n\n• **Public/private**：如果你希望互联网上的任何人都能看到该仓库，请选择\
  \ Public。\n\n• **Initialize this repository with:** 勾选 Add a README file 复选框。为项目仓库添加\
  \ README 文件是一个良好实践。该文件包含项目相关信息，例如项目内容、如何搭建等。\n\n• **Add .gitignore**：为 .gitignore\
  \ 模板选择 Java。\n\n• **License:** None。\n\n![](img/index-82_1.png)\n\n第 3 章 搭建你的开发环境\n\
  \n***图 3-3。** GitHub 中的 Create Repository 页面*\n\n4\\. 点击 Create Repository 按钮。至此，你的项目\
  \ GitHub 仓库应已创建完成。\n\n**将代码推送到 GitHub 仓库**\n\n在本节中，你将学习如何将项目代码推送到 GitHub 仓库。\n\n\
  1\\. 打开终端窗口，并将当前工作目录切换到你的项目所在位置。\n\n第 3 章 搭建你的开发环境\n\n2\\. 运行以下命令，将本地目录初始化为 Git\
  \ 仓库：\n\ngit init\n\n3\\. 运行以下命令，将项目中的所有文件添加到 Git 仓库：\n\ngit add .\n\n这个 git 命令会将当前目录中的所有文件添加到\
  \ Git 仓库中。这有助于跟踪代码库的更改，并便于与其他开发者协作。\n\n4\\. 运行以下命令，将这些更改提交到 Git 仓库：\n\ngit commit\
  \ -m \"Initial commit\"\n\ngit commit 命令用于将更改保存到本地仓库。-m 选项用于指定提交信息。在此示例中，提交信息是 Initial\
  \ commit。该命令会创建一个带有指定信息的新提交，并将其添加到当前分支。\n\n5\\. 运行以下命令，将 GitHub 仓库作为远程仓库添加到本地 Git\
  \ 仓库：\n\ngit remote add origin https://github.com/<your-github-\nusername>/<project-\
  \ name>.git\n\ngit remote add 命令会添加一个新的远程仓库，作为本地仓库的来源。在本例中，你将 GitHub 上托管的项目添加为本地仓库的\
  \ origin。请将 <your-github-username> 和 <project-name> 替换为你实际的 GitHub 用户名和项目名。\n\n\
  6\\. 运行以下命令，将更改推送到 GitHub 仓库：\n\ngit push -u origin <branch-name>\n\n这个 git 命令用于将你的代码推送到服务器。-u\
  \ 选项用于设置上游仓库，即本地仓库将推送到的远程仓库。origin 是远程仓库名称；请将 <branch-name> 替换为你希望推送代码的分支名称，例如 master。\n\
  \n第 3 章 搭建你的开发环境\n\n你应该会看到如下输出：\n\nEnumerating objects: 40, done.\n\nCounting objects:\
  \ 100% (40/40), done.\n\nDelta compression using up to 8 threads\n\nCompressing\
  \ objects: 100% (31/31), done.\n\n\n\n写入对象：100%（40/40），63.79 KiB | 21.26 MiB/s，完成。\n\
