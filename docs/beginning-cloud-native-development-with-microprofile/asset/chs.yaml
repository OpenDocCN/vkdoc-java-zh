  \ Open Liberty\n\nDocker 镜像：\n\n$ docker pull open-liberty\n\ndocker pull 命令将从 Docker\n\
  \nHub 拉取最新的 Open Liberty 镜像。Open Liberty 的 Docker 镜像成功下载后，你会看到以下输出。\n\nUsing default\
  \ tag: latest\n\nlatest: Pulling from library/open-liberty\n\n0c673eb68f88: Already\
