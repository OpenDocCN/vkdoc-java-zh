  $ kubectl delete service <servicename>\n\n将 <servicename> 替换为你要删除的服务名称。\n\n$ kubectl\
  \ delete service ms-service\n\nservice \"ms-service\" deleted\n\n你已经学习了如何使用 Docker\
  \ 将一个微服务容器化，并将其部署到\n\nKubernetes 集群上。\n\n**总结**\n\n在本章中，你首先学习了什么是容器以及为什么要使用\n\n\
  容器。接着，你学习了容器编排。你还学习了 Kubernetes 的\n\n核心特性和术语。你学习了如何使用 Docker 将一个\n\n微服务容器化并部署到 Kubernetes\
  \ 集群上。最后，你学习了如何按需扩缩部署并在需要时将其删除。以下是本章的关键要点：\n\n• 容器化是一种软件打包方式，使其能够在同一主机上与其他软件隔离运行，从而提升\n\
  \n可靠性与韧性。容器将你的微服务及其\n\n所有依赖打包为一个可移植、易部署、\n\n易管理的单元。\n\n• 容器编排是对容器化应用的部署、管理和扩缩进行自动化的过程。Kubernetes\n\
  \n是最流行的容器编排工具。容器\n\n编排可提升效率与安全性、降低成本、\n\n简化调试，并提高运行在容器中的应用的\n\n灵活性和可扩展性。\n\n以下是你应当记住的一些\
  \ Kubernetes 核心术语。\n\n第 9 章 使用 Kubernetes 对微服务进行容器化\n\n• *Pod* 是部署在同一主机上的一组容器。Pod\n\
  \n提供容器之间的共置与通信能力。\n\n• *Service* 是一种抽象，用于定义一组逻辑上的 Pod，并为这些 Pod\n\n提供稳定的网络访问。Service\
  \ 使微服务之间实现松耦合。\n\n• *Deployment* 是一种对象，用于描述一组\n\nPod 的期望状态。即使 Pod 被删除或重启，Deployment\
  \ 也能确保\n\n维持该期望状态。\n\n• *Node* 是 Kubernetes 中的工作机器。每个 Node 上都有 Pod\n\n运行。Node 之间通过\n\
  \nKubernetes API 进行通信。\n\n• *Worker node* 是用于运行容器的机器。Worker node\n\n可以是物理机或虚拟机。\n\
  \n• *Master node* 是用于管理 Kubernetes 集群的机器。\n\n• 一组 Node 被称为 *Cluster*。\n\n• *Labels*\
  \ 是附加到对象（如 Pod）上的键/值对。它们\n\n用于标识和选择对象组。\n\n• *Selectors* 用于基于对象的标签来选择一组对象。\n\n•\
  \ *Annotations* 用于存储对象的非标识性元数据。\n\nKubernetes 的关键特性包括管理、自动部署、存储编排、\n\n滚动更新、自动装箱、监控、健康检查、\n\
  \n水平扩展、自动扩展、负载均衡、服务发现、密钥与\n\n配置管理，以及容器化应用的负载分发。\n\nDockerfile 用于创建 Docker 镜像。基础镜像是创建新镜像的起点。\n\
  \nDocker 镜像是一个只读模板，其中包含用于创建容器的一组\n\n指令。你可以从 Docker Hub 或其他仓库获取基础镜像。\n\n你需要编写 Dockerfile\
  \ 并运行 docker build 命令来构建\n\nDocker 镜像。\n\n第 9 章 使用 Kubernetes 对微服务进行容器化\n\ndocker\
  \ login --username=<your-dockerhub-username> --email=<your-email\n\n@company.com>\n\
  \ndocker images\n\ndocker tag <imageid> <your-dockerhub-username>/<repository>:<tag>\
  \ docker push <your-dockerhub-username>/<repository>:<tag>\n\n在将 Docker 镜像部署到 Kubernetes\
  \ 之前，你需要先将其推送到镜像仓库。\n\n你可以将镜像推送到 Docker Hub，或其他仓库，例如 Google Container\n\nRegistry（GCR）。\n\
  \nKubectl 是一个用于管理 Kubernetes 对象的命令行工具。你可以使用\n\nkubectl 创建、删除、更新和查看 Kubernetes 对象，例如\
  \ Pod、Service 和 Deployment。\n\n\n\n在本章中，你学习了如何将你的微服务打包为 Docker 镜像，\n\n并将其部署到 Kubernetes\
  \ 集群上。\n\n你可以通过在自己的基础设施上安装 Kubernetes，或者使用托管的\n\nKubernetes 服务（如 Google Kubernetes\
  \ Engine（GKE））来使用 Kubernetes。\n\n`kubectl` 是可管理 Kubernetes 部署的命令行工具，并且\n\n用于与 Kubernetes\
  \ 进行交互。以下是你学到的命令。\n\n• `kubectl get`：获取 Kubernetes 资源的信息\n\n• `kubectl describe`：获取\
  \ Kubernetes\n\n资源的详细信息\n\n• `kubectl scale`：扩缩容是指增加或减少\n\n部署中的副本数量。可以使用此命令完成该操作。\n\
  \n最后，要删除一个部署，请使用 `kubectl delete deployment` 命令。要\n\n删除一个服务，请使用 `kubectl delete\
  \ service <service-name>` 命令。\n\n**附录 A**\n\n**Maven 简介**\n\nMaven 是一个构建自动化工具，主要用于\
  \ Java 项目。简而言之，Maven 可以帮助你基于一份\n\n中心化信息来管理项目的构建、报告和文档需求。\n\n**注意** 根据 Apache Software\
  \ Foundation 的说法，Apache Maven 是一个软件\n\n项目管理与理解工具。它基于项目对象模型（POM）的概念，\n\n能够在一个中心位置管理项目的构建、报告和文档\n\
  \n需求。\n\n**Maven 的特性**\n\nMaven 是 Java 项目中流行的构建工具。与其他构建工具相比，它具有多个优势，例如 [Apache an[t\
  \ (https://ant.apache.org/)](https://ant.apache.org/)) *.* Maven 提供了广泛的功能，可分为以下类别：\n\
  \n• **构建系统：** Maven 可用作 Java 项目的构建系统。\n\n它提供了大量插件，可用于编译、测试\n\n以及打包代码。\n\n• **依赖管理：**\
  \ Maven 可以为项目管理\n\n依赖项。这包括从仓库下载依赖\n\n并将其添加到项目的类路径中。\n\n• **文档：** Maven 可以为项目生成文档，\n\
  \n其中包括 API 文档以及测试、代码\n\n覆盖率等方面的报告。\n\n© Tarun Telang 2023\n\nT. Telang，*《Beginning\
  \ Cloud Native Development with MicroProfile, Jakarta EE, and Kubernetes》*，\n\n\
  [`doi.org/10.1007/978-1-4842-8832-0`](https://doi.org/10.1007/978-1-4842-8832-0#DOI)\n\
  \n附录 A Maven 简介\n\n• **报告：** Maven 可以生成关于项目健康状况的多种报告，\n\n例如代码质量、测试覆盖率等。\n\n• **发布管理：**\
  \ Maven 可用于项目的发布管理。\n\n这包括版本打标签、创建发布说明，\n\n以及将构件上传到仓库。\n\n**Maven 生命周期**\n\nMaven\
  \ 基于一个称为 *生命周期* 的核心概念。Maven 生命周期是项目在开发过程中所经历的一组有序阶段。构建项目时，Maven 会按顺序经过这些阶段，并在经过时执行每一个阶段。以下是\
  \ Maven 生命周期中的标准阶段：\n\n• **验证并处理资源：** 此阶段会验证\n\n项目是否正确，以及项目所需的所有资源是否\n\n可用，例如图片、XML\
  \ 文件等。\n\n• **编译：** 此阶段编译项目的源代码。\n\n• **处理类：** 此阶段对已编译的源代码进行后处理，\n\n例如添加调试信息。\n\n\
  • **生成测试源码：** 此阶段为\n\n项目生成测试源代码。\n\n• **处理测试资源：** 此阶段处理测试源代码的资源，\n\n例如图片、XML 文件等。\n\
  \n• **测试编译：** 此阶段编译测试源代码。\n\n• **测试：** 此阶段使用合适的单元\n\n测试框架对已编译的源代码进行测试。这些测试不应要求代码被\n\
  \n打包或部署。\n\n• **准备打包：** 此阶段为安装准备包，\n\n例如创建清单文件。\n\n• **打包：** 此阶段将已编译的源代码打包为\n\n\
  可分发格式，例如 JAR。\n\n\n\n附录 A Maven 介绍\n\n• **安装（Install）：** 此阶段会将打包结果安装到本地仓库中，以便在其他本地项目中作为依赖使用。\n\
  \n• **部署（Deploy）：** 此阶段会将最终包复制到远程仓库中，以便与其他开发者和项目共享。\n\n**Maven 的优势**\n\n在构建过程中使用\
  \ Maven 有很多好处：\n\n• **简化构建过程：** 你不再需要手动管理依赖。Maven 会自动下载所需依赖并将其引入你的项目中。\n\n• **让依赖管理更容易：**\
  \ Maven 使用标准的目录布局和默认的构建生命周期。这使你能够轻松了解文件所在位置以及每个文件的作用。\n\n• **提供一致的构建：** 使用 Maven，可以轻松在不同环境中维护项目构建的一致性。\n\
  \n• **促进更轻松的协作：** Maven 提供良好的项目文档。\n\n• **让新项目启动更容易：** Maven 提供标准的目录布局以及创建新 Java\
  \ 项目的便捷方式。这让新开发者更容易加入项目。\n\n• **支持“约定优于配置”原则：** 这意味着 Maven 会自动为你的项目应用合理的默认值。你也可以在需要时覆盖这些默认值。\n\
  \n• **提升团队协作：** Maven 为开发者提供了便捷方式来共享项目构建相关信息。这使团队更容易协同开发项目。\n\n• **便于与 IDE 集成：**\
  \ Maven 与 Eclipse、NetBeans 和 IntelliJ IDEA 等主流 IDE 紧密集成。这使开发者更容易处理 Maven 项目。\n\n\
  附录 A Maven 介绍\n\n• **高质量的项目信息：** Maven 会生成有关项目健康状况的标准报告，包括测试报告、代码覆盖率报告和静态代码分析报告。这让你可以轻松了解项目进展情况。\n\
  \n• **更容易查找依赖：** Maven 中央仓库包含海量 Java 库和构件（artifacts）。这使你能够更容易找到所需依赖。\n\n• **平滑迁移到新特性：**\
  \ Maven 提供一致的方式来升级项目依赖、插件和目标（goals）。这使你更容易保持与最新特性同步。\n\n• **可扩展性：** Maven 具有高度可扩展性。你可以轻松添加新插件或自定义现有插件。\n\
  \n• **自动化常见任务：** Maven 可以自动执行任务，例如编译源代码、生成文档和打包项目。这能节省你的时间和精力。\n\n• **让项目发布更容易：**\
  \ Maven 提供标准化的项目发布方式。这使开发者更容易部署项目。\n\n**Maven 如何使开发过程受益？**\n\nMaven 可以通过多种方式帮助改进开发流程：\n\
  \n1\\. 它可以帮助降低构建过程的复杂度，使流程更精简且更易理解。\n\n2\\. 它可以更高效地管理依赖，从而减少潜在冲突并降低手动更新的需求。\n\n\
  3\\. 它可以在不同机器和环境中提供一致的构建，从而更容易确保所有开发者都基于同一代码库工作。\n\n4\\. 它可以通过为开发者提供共享构建流程信息的标准方式来改进团队协作。\n\
  \n附录 A Maven 介绍\n\n5\\. 它可以促进与 IDE 的便捷集成，使开发者处理 Maven 项目更加简单。\n\n6\\. 它可以生成高质量的项目信息，例如代码覆盖率报告和静态代码分析报告。\n\
  \n7\\. 它可以提供透明的方式迁移到新特性，使你更容易跟进最新发展。\n\n8\\. 它具有高度可扩展性，允许开发者轻松添加新插件或自定义现有插件。\n\n\
  **Maven 架构**\n\nMaven 是一种声明式工具，这意味着它不要求开发者编写\n\n\n\n大量的配置文件。相反，Maven 使用标准的目录布局和默认的构建生命周期。这使开发者能够轻松了解文件应放在哪里，以及每个文件的作用。\n\
  \nMaven 也具有很强的可扩展性。开发者可以轻松添加新插件，或自定义\n\n现有插件以满足其需求。\n\nMaven 的架构基于三个概念：项目对象模型（POM）、\n\
  \n插件和目标（goals）。\n\n• *POM* 是 Maven 的核心元素。它是一个 XML 文件，\n\n包含有关项目的信息，例如名称、版本、\n\n\
  依赖项和构建设置。\n\n• *插件（Plugins）* 是扩展 Maven 功能的组件。它们\n\n用于执行常见任务，例如编译代码或创建\n\nJAR 文件。\n\
  \n• *目标（Goals）* 是插件执行的具体操作。例如，\n\nJava 编译器插件的 compile 目标会编译\n\n项目代码。\n\nMaven 的标准目录布局基于文件系统层次结构标准（Filesystem\
  \ Hierarchy Standard）。\n\n该布局为所有 Maven 项目定义了一致的结构，使开发者能够轻松了解文件位置及每个文件的作用。\n\n附录\
  \ A Maven 简介\n\n**什么是 Maven 仓库？**\n\nMaven *仓库* 是一个目录，用于存储所有项目 JAR、库 JAR、插件或任何其他项目特定制品（artifacts），并可供\
  \ Maven 使用。仓库有三种类型：\n\n–\n\n**本地仓库：** 这是开发者机器上的一个目录，\n\n所有依赖项都存储在本地。\n\n–\n\n**中央仓库：**\
  \ 这是由 Apache 维护的仓库，\n\n其中包含大多数常用依赖项。\n\n–\n\n**远程仓库：** 这些是由第三方维护的仓库，\n\n可用于下载依赖项。\n\
  \n**使用 Maven 创建 Java 项目**\n\n使用 Maven 创建 Java 项目很简单。只需在终端运行以下命令：\n\n$ mvn archetype:generate\
  \ -DgroupId=com.example -DartifactId=my-project\n\n-DarchetypeArtifactId=maven-archetype-quickstart\n\
  \n-DinteractiveMode=false\n\n这将生成一个简单的 Java 项目，结构如下：\n\nmy-project\n\n├── pom.xml\n\
  \n├── src\n\n├── main\n\n│ └── java\n\n│ └── com\n\n│ └── example\n\n│ └── App.java\n\
  \n└── test\n\n└── java\n\n└── com\n\n└── example\n\n└── AppTest.java\n\n附录 A Maven\
  \ 简介\n\n**在你的项目中使用 Maven**\n\n你可以通过将以下内容添加到你的 pom.xml 文件中，在项目中使用 Maven：1\n\n< **project**>\n\
  \n< **modelVersion**>4.0.0</**modelVersion**>\n\n**<groupId**>com.example</**groupId**>\n\
  \n< **artifactId**>my-project</**artifactId**>\n\n< **version**>1.0-SNAPSHOT</**version**>\n\
  \n< **dependencies**>\n\n< **dependency**>\n\n< **groupId**>junit</**groupId**>\n\
  \n< **artifactId**>junit</**artifactId**>\n\n< **version**>4.12</**version**>\n\n\
  < **scope**>test</**scope**>\n\n</**dependency**>\n\n</**dependencies**>\n\n< **build**>\n\
  \n< **plugins**>\n\n< **plugin**> < < **groupId**>org.apache.maven.plugins</**groupId**>\
  \ 17\n\n< **artifactId**>maven-compiler-plugin</**artifactId**>\n\n< **version**>3.5.1</**version**>\n\
  \n< **configuration**>\n\n< **source**>1.8</**source**>\n\n< **target**>1.8</**target**>\n\
  \n</**configuration**>\n\n</**plugin**>\n\n</**plugins**>\n\n</**build**>\n\n</**project**>\n\
  \n**说明：**\n\n• 第 1 行：<project> 元素是 pom.xml 文件的根元素。\n\n• 第 2 行：<modelVersion> 元素表示正在使用的\n\
  \nPOM 模型版本。\n\n附录 A Maven 简介\n\n• 第 3 行：<groupId> 元素表示项目的组 ID。\n\n• 第 4 行：<artifactId>\
  \ 元素表示项目的制品 ID。\n\n• 第 5 行：<version> 元素表示项目的版本。\n\n• 第 6 行：<dependencies> 元素表示项目的\n\
  \n依赖项。\n\n• 第 7 行：<dependency> 元素表示项目的\n\n单个依赖项。\n\n• 第 8 行：<groupId> 元素表示该\n\n\
  依赖项的组 ID。\n\n• 第 9 行：<artifactId> 元素表示\n\n该依赖项的制品 ID。JUnit 依赖项用于对\n\n项目代码进行单元测试。\n\
  \n• 第 10 行：<version> 元素表示该\n\n依赖项的版本。\n\n\n\n• 第 11 行：`<scope>` 元素表示依赖的作用域。\n\n\
  依赖有五种可能的作用域：compile、runtime、test、provided 和 system。compile 作用域表示该依赖在编译时需要。runtime\
  \ 作用域表示该依赖在运行时需要。test 作用域表示该依赖用于测试。provided 作用域表示该依赖对编译器可用，但不是必需的。system 作用域表示该依赖由系统提供。在本例中，作用域设置为\
  \ test，这意味着该依赖仅在测试时可用。\n\n• 第 12 行：`</dependency>` 元素结束单个依赖的配置。\n\n• 第 13 行：`</dependencies>`\
  \ 元素结束所有依赖的配置。\n\n• 第 14 行：`<build>` 元素表示项目的构建配置。\n\n附录 A Maven 介绍\n\n• 第 15 行：`<plugins>`\
  \ 元素表示项目的构建插件。\n\n• 第 16 行：`<plugin>` 元素表示单个构建插件。\n\n• 第 17 行：`<groupId>` 元素表示构建插件的组\
  \ ID。\n\n• 第 18 行：`<artifactId>` 元素表示构建插件的制品 ID。maven-compiler-plugin 用于编译 Java\
  \ 源代码。\n\n• 第 19 行：`<version>` 元素表示构建插件的版本。\n\n• 第 20 行：`<configuration>` 元素表示构建插件的配置。\n\
  \n• 第 21 行：`<source>` 元素表示 Java 源版本。\n\n• 第 22 行：`<target>` 元素表示 Java 目标版本。\n\n\
  • 第 23 行：`</configuration>` 元素结束构建插件的配置。\n\n• 第 24 行：`</plugin>` 元素结束单个构建插件的配置。\n\
  \n• 第 25 行：`</plugins>` 元素结束所有构建插件的配置。\n\n• 第 26 行：`</build>` 元素结束项目的构建配置。\n\n•\
  \ 第 27 行：`</project>` 元素结束 POM 的配置。\n\n**有用的 Maven 命令**\n\n以下命令会告诉你 maven-compiler-plugin\
  \ 的作用。\n\n`mvn help:describe -Dplugin=org.apache.maven.plugins:maven-compiler-plugin`\n\
  \n附录 A Maven 介绍\n\n该命令调用了 help 插件中的 describe 目标，即 help:describe。该目标从命令行接收参数，你可以使用\
  \ -D 来指定。-Dplugin 参数用于指定你想查看详细信息的插件。\n\n**快照版本（Snapshot）和发布版本（Release）有什么区别？**\n\
  \n*快照版本*是项目开发过程中的版本，可能不稳定。*发布版本*是被认为稳定并可用于生产环境的项目版本。\n\n**附录 B**\n\n**使用 Maven 创建\
  \ Open Liberty**\n\n**项目**\n\n在本附录中，你将学习如何使用 Maven 创建 Open Liberty 项目。它将带你完成使用 Open\
  \ Liberty 和 Maven 创建一个简单项目所需的步骤。\n\n使用 Maven 创建新的 Open Liberty 项目很简单。第一步是使用 maven\
  \ archetype:generate 命令生成一个基础项目结构。\n\n*原型（archetype）*是项目模板。它提供某一类项目所需的基础结构和文件。该原型可在\
  \ Maven 中央仓库中获取。\n\n*Maven 中央仓库（Maven Central Repository）*是 Maven 项目使用的软件构件集合。它包含大量项目的构件，从\
  \ Jakarta EE 项目到 Spring、Hibernate 等流行开源项目。\n\n**使用 Maven 生成 Web 项目**\n\n要生成 Web\
  \ 项目，请使用 liberty-archetype-webapp 原型。在你希望创建项目的目录下运行以下命令：\n\n`$ mvn archetype:generate`\n\
  \n`-DarchetypeGroupId=\"io.openliberty.tools\"`\n\n`-DarchetypeArtifactId=\"liberty-archetype-webapp\"\
  `\n\n`-DarchetypeVersion=\"3.6.1\"`\n\n`-DgroupId=\"<com.mycompany.app>\"`\n\n`-DartifactId=\"\
  <artifactId>\"`\n\n`-DinteractiveMode=false`\n\n© Tarun Telang 2023\n\nT. Telang，*Beginning\
  \ Cloud Native Development with MicroProfile, Jakarta EE, and Kubernetes*，\n\n\n\
  \n[`doi.org/10.1007/978-1-4842-8832-0`](https://doi.org/10.1007/978-1-4842-8832-0#DOI)\n\
  \n附录 B 使用 Maven 创建 Open Liberty 项目\n\n**说明：**\n\n–\n\n将 `<artifactId>` 和 `<groupId>`\
  \ 替换为你的应用程序的制品名称和组 ID。\n\n–\n\n`archetypeGroupId` 参数用于指定要使用的 archetype 所属的组。本示例使用\
  \ `io.openliberty.tools`。\n\n–\n\n`archetypeArtifactId` 指定该组内你要使用的制品，即 `liberty-plugin-archetype`。最后，\n\
  \n将版本号指定为 3.6.1。\n\n该命令将创建一个新项目。生成项目的文件夹结构如下：\n\n<artifactId>\n\n│ ├── pom.xml\n\
  \n│ └── src\n\n│ └── main\n\n│ ├── java\n\n│ │ └── <My-groupId>\n\n│ │ └── HelloServlet.java\n\
  \n│ ├── liberty\n\n│ │ └── config\n\n│ │ └── server.xml\n\n│ └── webapp\n\n│ └──\
  \ WEB-INF\n\n│ └── index.html\n\n└── pom.xml\n\n这将生成一个基础项目结构，包含以下文件和目录：\n\n• pom.xml：Maven\
  \ 项目文件，包含有关项目的信息，例如依赖、插件和目标。\n\n• src/main/java：此目录包含项目的 Java 源代码。\n\n• src/main/resources：此目录包含资源，例如属性文件和\
  \ Web 应用资源。\n\n附录 B 使用 Maven 创建 Open Liberty 项目\n\n• src/test/java：此目录包含 JUnit 测试。\n\
  \n• liberty/config/server.xml：此文件包含 Liberty 服务器的配置。\n\n项目生成后，还会创建一个 `liberty-archetype-webapp/pom.xml`\
  \ 文件。\n\n该文件包含 `liberty-maven-plugin`，用于在 Open Liberty 上打包、部署和运行应用。有关\n\nLiberty\
  \ Maven 插件的更多细节，请访问其在 MVNRepository 上的主页 [位于 https://](https://mvnrepository.com/artifact/io.openliberty.tools/liberty-maven-plugin)\n\
  \n[mvnrepository.com/artifact/io.openliberty.tools/liberty-maven-plugin](https://mvnrepository.com/artifact/io.openliberty.tools/liberty-maven-plugin)\
  \ 以及其在 GitHub 上的项目页面 [位于 https://github.com/OpenLiberty/ci.maven.](https://github.com/OpenLiberty/ci.maven)\n\
  \n`liberty-archetype-webapp` archetype 还包含一个示例 Java 类\n\n（HelloWorldServlet.java）以及一个用于配置\
  \ servlet 的 web.xml 文件。\n\n请注意，`liberty-maven-plugin` 已添加到你项目的 pom.xml 文件中。该\n\n\
  `liberty-maven-plugin` 会下载并安装 Open Liberty 运行时，启动和\n\n停止服务器，并将你的应用部署到服务器。它将使用 Liberty\
  \ 运行时，该运行时专为在云中开发和部署 Java 应用而设计。\n\n<build>\n\n<!-- Define and configure plugins\
  \ -->\n\n<pluginManagement>\n\n<plugins>\n\n...\n\n...\n\n<plugin>\n\n<groupId>io.openliberty.tools</groupId>\n\
  \n<artifactId>liberty-maven-plugin</artifactId>\n\n<version>3.6.1</version>\n\n\
  </plugin>\n\n</plugins>\n\n</pluginManagement>\n\n</build>\n\n你还应在 pom.xml 文件中更新以下依赖，以使用\n\
  \n最新版本的 Servlet。\n\n附录 B 使用 Maven 创建 Open Liberty 项目\n\n<dependency>\n\n<groupId>jakarta.servlet</groupId>\n\
  \n<artifactId>jakarta.servlet-api</artifactId>\n\n<version>5.0.0</version>\n\n</dependency>\n\
  \n现在你可以开始着手你的项目了；你可以将项目导入你的\n\nIDE，并在 Liberty 服务器上运行应用。\n\n$ mvn liberty:dev\n\n\
  当你修改代码时，你会看到这些更改会自动反映在正在运行的\n\n服务器中。表 B-1 列出了 Open Liberty 服务器的 Maven 命令。\n\n***表\
  \ B-1。** Open Liberty 服务器的 Maven 命令*\n\n**Maven 命令**\n\n**说明**\n\n**mvn liberty:dev**\n\
  \n下载、安装并启动 Open Liberty 服务器用于开发\n\n用途。它会监听项目源代码和\n\n服务器配置中的任何更改。这对开发非常方便，因为\n\n\
  每当保存更改时，服务器都会自动重新加载，并且应用会重新部署。\n\n**mvn liberty:devc**\n\n构建 Docker 镜像，挂载所需目录，映射\n\
  \n所需端口，然后以开发模式运行应用于一个\n\n\n\nDocker 容器。它还会像开发模式一样监听源代码和配置的更改。\n\n根据这些更改，源代码会按需自动重新构建、服务器会重启，或配置会被重新加载。\n\
  \n**mvn liberty:create**\n\n使用默认的 server.xml 文件创建一个新的 Open Liberty 项目。\n\n**mvn\
  \ liberty:package**\n\n创建一个可部署到任意 Open Liberty 服务器的 .war 文件。\n\n如果与 -Dinclude=runnable\
  \ 选项一起使用，该命令将创建一个可运行的 .jAr 文件，并包含所有必需依赖。然后可以使用 java -jar 命令执行该文件以启动应用程序。\n\n（*续*）\n\
  \n附录 B 使用 Maven 创建 Open Liberty 项目\n\n***表 B-1。***（*续*）\n\n**Maven 命令**\n\n**描述**\n\
  \n**mvn liberty:deploy**\n\n将应用程序部署到正在运行的服务器。\n\n**mvn liberty:install-** 在本地 Open\
  \ Liberty 运行时中安装一个特性。\n\n**feature**\n\n**mvn liberty:reload**\n\n使用最新更改重新加载服务器和应用程序。\n\
  \n**mvn liberty:run**\n\n首先将 Open Liberty 服务器运行时下载并安装到项目中的 target/liberty/wlp 目录，然后在\
  \ target/liberty/wlp/usr/servers/defaultServer 目录中创建一个具有所需配置的服务器实例。它使用 loose config\
  \ 构建并将项目部署到 Open Liberty 服务器。最后，它在前台运行 Open Liberty 服务器。loose config 功能允许你在无需重新部署应用程序的情况下更改\
  \ Liberty 服务器配置。这对于测试不同配置或排查问题很有帮助。\n\n**mvn liberty:start**\n\n在后台启动 Open Liberty\
  \ 服务器。\n\n**mvn liberty:stop**\n\n在后台停止 Open Liberty 服务器。\n\n**liberty:undeploy**\n\
  \n从 Open Liberty 服务器中卸载应用程序。\n\n**附录 C**\n\n**安装 Open Liberty**\n\n**工具**\n\n要安装\
