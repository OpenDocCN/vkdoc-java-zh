  \ 253\n\nxi\n\n![](img/index-12_1.jpg)\n\n**关于作者**\n\n**Tarun Telang** 是一位实践型技术专家，在多层架构、高可扩展软件应用程序的设计与实现方面拥有丰富经验。他曾就职于多家知名公司，包括\
  \ Microsoft、Oracle、Polycom 和 SAP。在业务应用程序的架构设计与开发方面，他拥有超过 17 年经验。\n\n他的职业生涯始于 SAP，担任企业\
  \ Java 开发人员，并在那里为大型企业开发分布式应用软件。他从企业会话 Bean（session beans）和消息驱动 Bean（message-driven\
  \ beans）起步，同时使用 Java Management Extensions（JMX）技术对企业应用程序的配置与管理进行仪表化。\n\n他很快掌握了多种企业级技术，包括\
  \ Enterprise Beans、Java Management Extensions、Servlets 和 Server Pages 技术。作为开发人员的第一年，他就获得了\
  \ Sun Certified Programmer for the Java Platform, Standard Edition 6，以及 SAP NetWeaver\
  \ Java Web Application Server 的 SAP Certified Development Consultant 认证（该服务器是符合\
  \ Java EE 5 标准的应用服务器）。\n\n他还在 XSLT 和 XSD 等 XML 技术方面积累了专业能力。他使用会话 Bean 和消息驱动 Bean\
  \ 开发了多个解决方案，以处理跨多个系统的面向消息通信。2007 年，Tarun 因其关于新兴技术的文章和博客，以及在 SAP 开发者社区中推动创新解决方案的贡献，被评为\
  \ SAP Mentor 和 Community Influencer。\n\n他经常撰写 Java 及相关技术文章。Tarun 还创作了多门在线课程，其中包括一门畅销的\
  \ YAML 数据序列化语言课程。\n\n他曾在多个开发者大会进行技术演讲，包括 SAP TechEd 和 Great Indian Developer Summit。他在会议上演讲已超过\
  \ 15 年，并持续发布技术论文和博客，帮助大家掌握软件技术基础。Tarun 使用 Spring 框架和微服务架构开发过基于云的视频会议应用，并具备使用 Persistence\
  \ API 和 Hazelcast 框架构建基于 REST 服务的经验。\n\n他还使用多种架构模式（包括微服务架构和面向服务架构）开发了许多端到端的云端解决方案。Tarun\
  \ 在 Web、移动和云技术方面积累了深厚经验。他也熟悉敏捷方法在实践中的应用，包括以用户为中心和移动优先设计，以管理分布在多个地区的跨职能团队项目。Tarun\
  \ 还是 *Java EE to Jakarta EE 10 Recipes: A Problem-Solution Approach for* *Enterprise\
  \ Java*（Apress，2022）的合著者。\n\nTarun 曾在加拿大和德国工作，目前与妻子和儿子居住在印度海得拉巴。你可以在 LinkedIn（[www.linkedin.](http://www.linkedin.com/in/taruntelang/)\n\
  \n[com/in/taruntelang/), F](http://www.linkedin.com/in/taruntelang/)acebo[ok (www.facebook.com/tarun.telang](https://www.facebook.com/tarun.telang)）和\
  \ Twitter（@taruntelang）上关注他。他的博客位于 [`blogs.taruntelang.me`](https://blogs.taruntelang.me)，是获取各类软件技术相关内容的优质资源！\n\
  \nxiv\n\n![](img/index-14_1.jpg)\n\n**关于技术审阅者**\n\n**Massimo Nardone** 在安全、Web/移动开发、云和\
  \ IT 架构方面拥有超过 25 年经验。他在 IT 领域真正热爱的方向是安全和 Android。\n\n20 多年来，他一直使用 Android、Perl、PHP、Java、VB、Python、C/C++\
  \ 和 MySQL 进行编程并教授他人编程。他拥有意大利萨莱诺大学（University of Salerno）的计算机科学硕士学位。\n\n多年来，他曾担任\
  \ CISO、CSO、安全高管、IoT 高管、项目经理、软件工程师、研究工程师、首席安全架构师、PCI/SCADA 审计员，以及高级 IT 安全/云/SCADA\
  \ 架构负责人。他的技术技能包括安全、Android、云、Java、MySQL、Drupal、Cobol、Perl、Web 与移动开发、MongoDB、D3、Joomla、Couchbase、C/C++、WebGL、Python、Pro\
  \ Rails、Django CMS、Jekyll、Scratch 等。\n\n他曾担任赫尔辛基理工大学（阿尔托大学）网络实验室的访问讲师与习题指导教师。他还拥有四项国际专利（涉及\
  \ PKI、SIP、SAML 和代理领域）。目前他在 Cognizant 任网络安全负责人和 CISO，帮助客户开展信息安全与网络安全相关工作，包括战略、规划、流程、政策、程序、治理、意识提升等。2017\
  \ 年 6 月，他成为 ISACA 芬兰董事会常任成员。\n\nMassimo 已为不同出版社审阅了 45 本以上 IT 书籍，并且是 *Pro Spring\
  \ Security: Securing Spring Framework 5 and Boot 2-based* *Java Applications*（Apress，2019）、*Beginning\
  \ EJB in Java EE 8*（Apress，2018）、*Pro JPA 2 in* *Java EE 8*（Apress，2018）和 *Pro Android\
  \ Games*（Apress，2015）的合著者。\n\nxv\n\n![](img/index-15_1.jpg)\n\nabouT The TeChniCal\
  \ reviewers\n\n**Pramit Das** 在多个平台、各种技术栈上的软件设计与开发方面拥有超过 12 年经验。他对编程以及探索新兴与即将到来的技术充满热情。在\
  \ C/C++、Java、Scala、JavaScript 和 Python 等编程语言方面拥有丰富实战经验，同时熟悉其相关工具、库与框架，包括 Spring、Django、NodeJs\
  \ 和 Spark。他还对 Oracle、MySQL、MongoDB、Cassandra 等后端存储方案，以及其他基于云的托管服务有着深入了解。\n\n在学术方面，Pramit\
  \ 于 2009 年毕业于 NIT Rourkela，获得计算机科学与工程学士学位。他拥有产品型和服务型行业经验，目前在云计算巨头 Salesforce 担任全职工程师。\n\
  \nxvi\n\n**致谢**\n\n在本书写作过程中，我要感谢我的妻子 Nikita 和儿子 Vihan，感谢他们的耐心与爱。我也感激所有导师和朋友，是他们在我职业生涯的每个阶段鼓励我不断成长。\n\
  \n我要感谢我的父母，他们引导我走上正确的技术道路，并始终在每一步支持我，即使当我决定去做一些事情\n\n\n\n与他们的预期完全不同。同样需要指出的是，如果没有他们，我可能不会成为一名开发者，也不会拥有如此出色的职业生涯。最后，\n\
  \n再次感谢我的妻子（以及灵魂伴侣）Nikita。能与一个始终激励你、鞭策你的人在一起，是一种不可思议的感觉——不仅在职业上如此，在个人生活中也是如此。\n\n\
  感谢你一直陪伴在我身边！\n\n我还要特别感谢 Pramit Das 和 Massimo Nardone（技术审阅者），感谢他们为本书所做的无可挑剔的工作。我也非常感谢\
  \ Steve Anglin、Mark Powers 以及 Apress Media（apress.com）的每一位成员，感谢他们在本书出版过程中给予的支持。\n\
  \n最后同样重要的是，我要感谢你——读者——愿意花时间阅读这本书。我希望它能帮助你在成为更优秀 Jakarta EE 开发者的旅程中不断前行。\n\nxvii\n\
  \n**引言**\n\n云原生应用因其诸多优势而日益流行，例如可扩展性、灵活性和高效性。云原生应用被设计为充分利用云计算范式。这意味着它们是分布式的、可扩展的、具备韧性的并且具有弹性的。你可以在公有云、私有云或混合云上运行它们。要构建云原生应用，开发者必须使用合适的工具和技术。\n\
  \n企业 Java（或 Jakarta Enterprise Edition）是云原生应用的一个流行平台。它提供了一套标准和 API，帮助开发者构建企业级应用。包括\
  \ Red Hat、IBM 和 Oracle 在内的许多平台厂商都支持这一标准。它提供了许多特性，使其成为开发云原生应用的理想选择。\n\nMicroProfile\
  \ 倡议于 2016 年由 Red Hat、IBM、Tomitribe 和 Payara 发起。\n\n该组织旨在通过提供一个可由多个运行时实现的基础平台定义，改善微服务环境中的应用开发者体验。该组织于\
  \ 2016 年 6 月发布了首个 MicroProfile 规范版本。该规范包含一组面向应用开发者的 API，包括 RESTful Web 服务、上下文与依赖注入，以及\
  \ JSON 处理。\n\nMicroProfile 是一组规范，定义了开发者如何使用 Jakarta\n\nEE 来构建微服务。它还提供了一个帮助开发者创建云原生应用的平台。MicroProfile\
  \ 正在使其规范与 Jakarta EE 平台保持一致。MicroProfile 组织的目标是创建一套标准，使开发者能够在 Jakarta EE 平台之上开发微服务。作为\
  \ Jakarta EE 项目归属机构的 Eclipse Foundation，也负责管理 MicroProfile 标准的制定。\n\nMicroProfile\
  \ 是一个 Jakarta EE 工作组。它的创建是为了回应微服务的流行趋势。它也满足了对微服务开发标准平台的需求。它最初由少数几家 Jakarta EE 厂商组成（IBM、Red\
  \ Hat、Payara 和 Tomitribe），现已发展到包含 25 家以上成员，包括 Oracle、Microsoft、Hazelcast 等。MicroProfile\
  \ 倡议由 Eclipse Foundation 治理，而 MicroProfile 规范通过 Eclipse\n\nxix\n\n引言\n\nMicroProfile\
  \ 项目进行开发。该项目向所有希望贡献的个人和组织开放。MicroProfile 规范以公开透明的方式开发，并欢迎所有贡献。Eclipse MicroProfile\
  \ 项目采用协作式开发流程，并鼓励所有感兴趣的各方参与。\n\nDocker 是一个软件容器平台，允许开发者将应用及其所有依赖打包为一个标准化的软件开发单元。\n\
  \n你可以在任何平台上运行 Docker 容器，包括公有云、私有云和混合云。这使得在任何平台（包括云平台）上部署应用变得容易。\n\nDocker 是一个流行的开源容器平台，你可以\n\
  \n\n\n用于打包和运行微服务。与传统虚拟化技术相比，它具备多项优势，包括可移植性、易用性等。\n\nKubernetes 是一个用于管理容器化应用的工具。它提供了一个开源平台，用于部署、管理和扩展应用。Kubernetes\
  \ 基于 Linux 内核，并且可以使用 Docker 容器来管理应用。它提供了诸如扩缩容、负载均衡和自愈等特性。\n\nKubernetes 可自动化容器化应用的部署、扩缩和管理。它通过将容器分组为逻辑单元，支持对应用进行便捷管理与发现。Kubernetes\
  \ 构建于 Google 数十年大规模运行生产工作负载的经验之上，同时也吸收了社区中最佳的理念和实践。\n\nKubernetes 具有可移植性和可扩展性，可在任何地方运行——从你的笔记本电脑到公有云再到数据中心。Kubernetes\
  \ 的简洁性与灵活性使其成为云原生应用的理想选择。此外，它还是开源软件，让你能够受益于社区创新。\n\nKubernetes 已为生产环境做好准备，具备强大特性和能力来编排你的容器化应用。Kubernetes\
  \ 已经在大规模场景中经过实战检验，支撑着全球一些最大的网站运行。\n\n在本书中，你将学习如何使用 MicroProfile 和 Jakarta EE 技术开发微服务，将其部署到\
  \ Kubernetes/Docker 上，并创建云原生应用。本书还涵盖了使用 MicroProfile 和 Jakarta EE 开发云原生应用的最佳实践。它首先会介绍云原生应用的不同方面。随后你将继续进行开发环境搭建，并学习\
  \ Jakarta EE 基础。接下来，本书将探讨 MicroProfile 的功能，你将学习如何使用这些功能来构建微服务。\n\nxx\n\n引言\n\n随后你将学习\
  \ Docker 和 Kubernetes，以及如何使用它们来部署你的应用。最后，你将把所有内容整合起来，学习如何构建一个完整的云原生应用。\n\n**本书适合谁阅读**\n\
  \n欢迎阅读 *Beginning Cloud Native Development with MicroProfile, Jakarta EE, and* *Kubernetes.*\n\
  \n本书面向希望学习如何使用 MicroProfile 和 Jakarta EE 开发云原生应用的 Java 开发者。不要求你具备 Kubernetes 或容器编排的先验知识。\n\
  \n在本书中，你将学习如何使用 MicroProfile 和 Jakarta EE 开发云原生应用，并将其部署到 Kubernetes。书中涵盖的主题包括编写\
  \ RESTful Web 服务、创建微服务、配置健康检查等。\n\n通过阅读本书，你最终将能够使用 MicroProfile 和 Jakarta EE 开发云原生应用，并将其部署到\
  \ Kubernetes。\n\n**本书结构**\n\n本书涵盖四个主要主题。\n\n• **云原生开发** 介绍云原生开发的概念以及十二要素应用方法论。你将了解开发云原生应用的优势，以及将现有应用迁移到云端时必须考虑的挑战。\n\
  \n• **MicroProfile 规范** 概述 MicroProfile 各项规范，以及如何使用它们开发微服务。你将了解可用的不同类型注解，以及如何用它们创建\
  \ RESTful Web 服务。\n\n• **Jakarta EE 规范** 介绍 Jakarta EE 平台及其各种规范。你将了解 Java EE 与 Jakarta\
  \ EE 之间的差异，以及该平台提供的新特性。\n\nxxi\n\n引言\n\n• **Kubernetes** 讲解使用 Kubernetes 进行容器编排的基础知识。你将了解\
  \ Kubernetes 集群中创建的不同类型对象、如何将应用部署到 Kubernetes，以及如何使用 Kubernetes 对应用进行扩缩容。\n\n**约定**\n\
