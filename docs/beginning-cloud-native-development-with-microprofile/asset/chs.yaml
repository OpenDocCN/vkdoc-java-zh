  \n\n\n</plugin>\n\n</plugins>\n\n</build>\n\n</project>\n\n**说明：**\n\n• 第 1 行：XML\
  \ 声明定义了 XML 版本（1.0）和编码（UTF-8）。\n\n• 第 2 行：project 元素是 POM 的*根*。所有其他元素都必须嵌套在该元素内。\n\
  \n• 第 3-4 行：xmlns 属性定义了 Maven 使用的 XML 命名空间。xsi:schemaLocation 属性定义了用于校验 POM 的模式位置。\n\
  \n第 4 章 构建 RESTful Web 服务\n\n• 第 5 行：modelVersion 元素定义了 Maven 使用的 POM 模型版本。它必须与\
  \ project 起始标签中的值匹配。本示例使用的是 POM 模型 4.0.0 版本。\n\n• 第 6-8 行：groupId 元素定义了项目所属组的唯一标识符。本示例使用\
  \ MicroProfile 组。\n\n• 第 9-10 行：artifactId 元素定义了项目本身的唯一标识符。本示例使用名为 bookstore 的 Maven\
  \ 工件。\n\n• 第 11-12 行：version 元素定义了项目版本。本示例使用 SNAPSHOT 版本。\n\n• 第 13-14 行：packaging\
  \ 元素定义了 Maven 将生成的工件类型。本示例使用 WAR 文件。\n\n• 第 15-18 行：properties 元素定义了可在整个 POM 中使用的属性。本示例定义了\
  \ Maven 编译器插件的 Java source 和 target 版本。\n\n• 第 19-20 行：dependencies 元素定义了项目依赖项。本示例依赖\
  \ Jakarta EE 9.1 API 和 MicroProfile 5.0 API。\n\n• 第 21-34 行：build 元素定义了项目的构建配置。本示例配置了\
  \ Maven war 插件和 Liberty Maven 插件。\n\n• 第 35 行：finalName 元素定义了生成工件的名称。本示例使用 bookstore\
  \ 作为最终名称。\n\n• 第 36-39 行：pluginManagement 元素定义了项目的插件管理配置。本示例配置了 Maven war 插件和 Liberty\
  \ Maven 插件。\n\n• 第 40-43 行：plugins 元素定义了项目插件。本示例使用 Liberty Maven 插件。\n\n第 4 章 构建\
  \ RESTful Web 服务\n\n**在 Open Liberty 中运行现有 Jakarta EE 项目**\n\n如果你已经有一个使用 Maven 的现有应用程序，只需将以下\
  \ Maven 依赖添加到 pom.xml 文件中：\n\n<dependency>\n\n<groupId>io.openliberty</groupId>\n\
  \n<artifactId>openliberty-runtime</artifactId>\n\n<version>[22.0.0.8,)</version>\n\
  \n<type>zip</type>\n\n</dependency>\n\n这段代码会将最新版 Open Liberty Runtime 作为依赖添加到你的项目中。在构建期间，它会在本地\
  \ Maven 仓库中下载并安装 Open Liberty Runtime ZIP 文件。version 字段包含一个范围，会自动选择与你项目兼容的最新 Open\
  \ Liberty Runtime 版本。运行 Maven 构建时，它可确保你使用的是最新版本的 Open Liberty，但最低为 22.0.0.8\\。如果你想使用\
  \ Open Liberty 的特定版本，可以在 version 元素中指定版本号。\n\n当你构建项目时，Maven 会在 target 目录中生成一个名为\
  \ product-ws.war 的 WAR 文件。当你准备好超越入门阶段后，可以通过向 POM 文件添加更多依赖来继续开发应用程序。\n\n**server.xml\
  \ 配置文件**\n\n系统会提供一个 server.xml 配置文件，其中包含你之前所选 MicroProfile 和 Jakarta EE 版本所需的功能。\n\
  \n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<server description=\"new server\"\
  >\n\n<!-- Enable features -->\n\n<featureManager>\n\n<feature>jakartaee-9.1</feature>\n\
  \n<feature>microProfile-5.0</feature>\n\n</featureManager>\n\n...\n\n...\n\n第 4\
  \ 章 构建 RESTful Web 服务\n\n<httpEndpoint id=\"defaultHttpEndpoint\"\n\nhttpPort=\"\
  9080\"\n\nhttpsPort=\"9443\" />\n\n<!-- Automatically expand WAR files and EAR files\
  \ -->\n\n<applicationManager autoExpand=\"true\"/>\n\n<!-- Configures the application\
  \ on a specified context root -->\n\n<webApplication contextRoot=\"/api\" location=\"\
  product-ws.war\" />\n\n<!-- Default SSL configuration enables trust for default\
  \ certificates\n\nfrom the Java runtime -->\n\n\n\n<ssl id=\"defaultSSLConfig\"\
  \ trustDefaultCerts=\"true\" />\n\n</server>\n\n**说明：**\n\nserver 元素是 server.xml\
  \ 文件的根元素。description\n\n元素是服务器的人类可读描述，在本例中设置为 new server。\n\nfeatureManager 元素启用了\
  \ Jakarta EE 9.1 和 MicroProfile 5.0 特性。\n\nhttpEndpoint 元素定义了服务器的 HTTP 端点。在这个示例中，\n\
  \nHTTP 使用端口 9080，HTTPS 使用端口 9443。\n\napplicationManager 元素使应用程序能够在服务器中自动\n\n展开。webApplication\
  \ 元素定义了服务器中的一个 Web 应用。该\n\n示例使用 product-ws.war 文件，并通过 /product 上下文根进行访问。ssl 元素定义了服务器的\
  \ SSL 配置。本例信任来自 Java 运行时的默认证书。\n\n**开发 REST 应用程序**\n\n系统会为你生成一个简单的 RestApplication.java\
  \ 文件，以便你开始创建基于 REST 的应用程序。\n\npackage org.microprofile.rest;\n\nimport jakarta.ws.rs.ApplicationPath;\n\
  \nimport jakarta.ws.rs.core.Application;\n\n@ApplicationPath(\"/api\")\n\n第 4 章\
  \ 构建 RESTful Web 服务\n\npublic class RestApplication extends Application {\n\n}\n\
  \njakarta.ws.rs.ApplicationPath 注解用于指定应用程序的上下文\n\n根。在本例中，它是“/api”。RestApplication\
  \ 类通过继承 jakarta.ws.rs.core.Application 类来创建一个 Jakarta RESTful Web 服务\n\n应用程序。\n\n\
  当你请求此 Web 服务时，必须在\n\nURL 中包含 contextRoot。例如，如果你请求 product 资源，则需要请求 http://localhost:9080/api/product。\n\
  \n接下来，在命令行或终端中运行以下命令，以在开发模式下启动\n\nLiberty 服务器。\n\nmvn liberty:dev\n\n**在 IntelliJ\
  \ IDEA Ultimate Edition 中使用 Open Liberty 插件**\n\nIntelliJ IDEA Ultimate Edition\
  \ 的 Open Liberty 插件是一个支持在 Open Liberty 服务器上开发应用程序的插件。如果你想使用 Eclipse IDE，请参阅附录 C\
  \ 获取更多细节。\n\n**在 IntelliJ IDEA Ultimate Edition 中安装 Open Liberty 插件**\n\n该插件可在 JetBrains\
  \ 市场中获取。你可以在 IntelliJ\n\nIDEA 中通过选择 File ➤ Preferences ➤ Plugins 并搜索 “Open Liberty”\
  \ 来安装。找到插件后，点击 Install，并在提示时重启 IntelliJ IDEA。\n\n安装完成后，你会在右侧看到一个 Liberty 选项，如图 4-10\
  \ 所示。点击它后，你将看到可在项目上运行的各种 Maven 命令。你还可以在 Dev 模式下启动 Open Liberty 服务器。见图 4-11。\n\n\
  ![](img/index-115_1.jpg)\n\n第 4 章 构建 RESTful Web 服务\n\n***图 4-10。** Open Liberty\
  \ Tools 插件*\n\n![](img/index-116_1.png)\n\n第 4 章 构建 RESTful Web 服务\n\n***图 4-11。**\
  \ 使用 IntelliJ IDEA 在开发模式下运行 Open Liberty 服务器*\n\n*Ultimate Edition - Open Liberty\
  \ Tools 插件*\n\n这将在开发模式下启动 Open Liberty 服务器。如果你对源代码进行了任何\n\n更改，服务器会自动检测这些更改并\n\n\
  重新部署应用程序。此外，如果你进行了任何配置更改，例如修改 HTTP 端口，服务器也会自动检测这些更改。\n\n现在将 server.xml 文件中的 contextRoot\
  \ 属性改为 /。contextRoot\n\n元素告诉服务器使用哪个目录作为应用程序的根目录。原始值是 product-ws，这意味着服务器会在 /wlp/product-ws\n\
  \n目录中查找文件。将其改为 / 后，你就是在告诉服务器到 /wlp/\n\n目录中查找文件。\n\n第 4 章 构建 RESTful Web 服务\n\n**创建\
  \ RESTful API**\n\n当你创建 REST API 时，通常首先定义 API 将要暴露的资源。每个资源都由唯一的 URI 标识。然后你定义可对每个资源执行的操作。这些操作通常是\
  \ CRUD\n\n操作：创建、读取、更新和删除。\n\n\n\n现在你已经了解了如何创建一个 RESTful API 来管理商店的产品列表。该 RESTful\
  \ API 允许客户端应用访问作为服务器资源存储的产品。\n\n该 API 使用 Jakarta EE 和 REST 架构风格实现。这个\n\nAPI 具有以下方法：\n\
  \n• GET /api/products：获取产品列表。\n\n• POST /api/products：创建一个新产品；产品详细信息\n\n以 JSON 格式在请求体中提供。\n\
  \n• PUT /api/products：更新一个现有产品；更新后的\n\n产品详细信息以 JSON 格式在请求体中提供。\n\n• DELETE /api/products/{id}：删除一个产品；产品\
  \ ID\n\n在请求 URL 路径中提供。\n\n**创建资源类**\n\n资源类是一个表示特定 REST 资源的对象，在这个例子中是产品。它包含产品的详细信息，例如\
  \ ID、名称、价格、数量等。\n\n为简单起见，本示例仅存储 ID 和名称。要首先实现资源类，你需要创建一个 Product 类，如下所示：\n\npublic\
  \ class Product {\n\nprivate Integer id;\n\nprivate String name;\n\n// default constructor\n\
  \npublic Product() {\n\n}\n\nChapter 4 Building reStful WeB ServiCeS\n\n// parameterized\
  \ constructor public Product(Integer id,\n\nString name) {\n\nthis.id = id;\n\n\
  this.name = name;\n\n}\n\n// getters and setters\n\npublic Integer getId() {\n\n\
  return id;\n\n}\n\npublic void setId(Integer id) {\n\nthis.id = id;\n\n}\n\npublic\
  \ String getName() {\n\nreturn name;\n\n}\n\npublic void setName(String name) {\n\
  \nthis.name = name;\n\n}\n\n}\n\nProduct 类是一个普通的 Java 对象（Plain Old Java Object）。它具有\
  \ id 和 name 属性。你应当为所有字段声明默认构造函数、getter 和 setter。通过这样做，你可以让 Jackson 库在 Java 对象与 JSON\
  \ 之间进行相互转换。所有属性也必须是 Object 类型。Jackson 无法使用基本类型，因为它们不能为 null。id 属性的类型是 Integer，name\
  \ 属性的类型是 String。同时还为 id 和 name 实例变量提供了 getter 和 setter。getName() 和 getId() 方法返回各自属性的值。该类还有两个构造函数。第一个构造函数是默认构造函数。第二个构造函数接收\
  \ id 和 name 参数，并将 id 和 name 属性设置为对应的值。\n\nChapter 4 Building reStful WeB ServiCeS\n\
  \n**创建服务类**\n\n服务类表示一组相关资源。它包含用于对资源执行创建、更新、删除和检索（CRUD）操作的方法。\n\n现在你将创建一个 ProductService\
  \ 类，并使用 getProducts() 方法返回一个\n\nProduct 对象列表：\n\npackage org.microprofile.cloudnative.rest;\n\
  \nimport java.io.Serializable;\n\nimport java.util.*;\n\nimport jakarta.enterprise.context.ApplicationScoped;\n\
  \nimport jakarta.ws.rs.*;\n\nimport jakarta.ws.rs.core.MediaType;\n\nimport jakarta.ws.rs.core.Response;\n\
  \n@Path(\"/products\")\n\n@ApplicationScoped\n\npublic class ProductService {\n\n\
  private List<Product> products;\n\npublic ProductService(){\n\nproducts = new ArrayList<>();\n\
  \nproducts.add(new Product(Integer.parseInt(\"1\"), \"product 1\"));\n\nproducts.add(new\
  \ Product(Integer.parseInt(\"2\") , \"product 2\"));\n\n}\n\n@GET\n\n@Produces(MediaType.APPLICATION_JSON)\n\
  \npublic List<Product> getProducts() {\n\n// Return a list of products\n\nreturn\
  \ products;\n\n}\n\n}\n\nChapter 4 Building reStful WeB ServiCeS\n\nRESTful Web\
  \ 服务可以生成和消费许多不同的媒体类型，\n\n包括 JSON、XML 和 HTML。注解用于指定方法可以\n\n消费或生成的媒体类型。例如，如果一个方法使用如下注解：\n\
  \n- @Consumes(MediaType.APPLICATION_JSON)，它可以消费 JSON。类似地，如果\n\n一个方法使用如下注解：\n\n-\
  \ @Produces(MediaType.APPLICATION_XML)，它可以生成 XML。\n\n这两个注解也可以在单个方法中一起使用，以支持多种\n\n\
  媒体类型。例如，在同一个方法中同时使用 - @Consumes(MediaType.APPLICATION_JSON) 和 -\n\n@Produces(MediaType.APPLICATION_XML)，这样该\n\
  \n方法就可以消费 JSON 并生成 XML。\n\n\n\n表 4-2 展示了一些常见媒体类型的列表，以及它们在 jakarta.ws.rs.core.MediaType\
