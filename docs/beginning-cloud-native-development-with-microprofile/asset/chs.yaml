  \ Code。\n\n**第 4 章**\n\n**构建 RESTful Web**\n\n**服务**\n\n在第 [2](https://doi.org/10.1007/978-1-4842-8832-0_2)\
  \ 章中，你已经了解到，微服务是一种架构风格，它将应用组织为一组小型、模块化的服务。微服务是可独立部署、可扩展、可测试的服务，并通过定义良好的 API 相互通信。这种服务解耦提升了开发与部署的敏捷性，同时也增强了运行层面的韧性。\n\
  \nRESTful API 是一种应用程序编程接口（API），它遵循 REST 架构风格的约束，并支持与 RESTful Web 服务进行交互。例如，Facebook、Twitter\
  \ 和 Google 都将其功能以 RESTful Web 服务形式提供，任何客户端应用都可以通过 REST 调用这些 Web 服务。\n\nRESTful API\
  \ 的三个关键组成部分是：\n\n• 运行在用户计算机或智能手机上的客户端，并发起通信\n\n• 服务器，通过提供 API 来访问其数据或功能\n\n• 资源，即服务器能够提供给客户端的任意内容\n\
  \n当客户端通过 RESTful API 请求某个资源时，服务器会将该资源状态的一个表示（通过 HTTP/JSON）传输给请求方或端点。\n\n在本章中，你将学习如何使用\
  \ Jakarta EE 平台创建 RESTful Web 服务。你还将学习如何在 Open Liberty 服务器上部署并测试你的 Web 服务。首先，本章将重点介绍如何使用\
  \ Jakarta RESTful Web Service（前称 JAX-RS）创建服务端组件。你将从创建一个返回产品基本信息的简单 Web 服务开始。随后你将添加更多功能，例如返回产品列表，并允许客户端创建新产品。\n\
  \n© Tarun Telang 2023\n\nT. Telang, *微服务、Jakarta EE 与 Kubernetes 云原生开发入门（Beginning\
  \ Cloud Native Development with MicroProfile, Jakarta EE, and Kubernetes）*,\n\n\
  [`doi.org/10.1007/978-1-4842-8832-0_4`](https://doi.org/10.1007/978-1-4842-8832-0_4#DOI)\n\
  \n第 4 章 构建 RESTful Web 服务\n\n\n\n**REST：一种用于构建的架构风格**\n\n**Web 服务**\n\n表述性状态转移（REST）是一种架构风格，它定义了一组用于创建\
  \ Web 服务的约束。\n\n遵循 REST 架构风格的 Web 服务，或简称 RESTful Web 服务，可在互联网中的计算机系统之间提供互操作性。符合\
  \ REST 的 Web 服务允许请求方系统通过\n\n一组统一且预定义的无状态操作来访问和操作 Web 资源的文本表述。REST 风格使用标准的\n\nHTTP\
  \ 方法（如 GET、POST、PUT 和 DELETE）来操作资源。它还\n\n使用简单的 URL 语法来访问资源，并使用标准 HTTP 状态码来指示请求结果。\n\
  \nREST 架构风格定义了一组在创建 RESTful API 时必须遵循的约束。\n\n关键约束如下：\n\n• 客户端应能够使用标准 HTTP\n\n方法（GET、POST、PUT、DELETE）访问资源。\n\
  \n• 客户端应能够确定每个资源的 URI。\n\n• 资源应以 JSON 或 XML 格式表示。\n\n• 服务器应针对每个请求返回正确的 HTTP 响应码（200\
  \ OK、404\n\nNot Found 等）。\n\n**Open Liberty 运行时简介**\n\nOpen Liberty（[`openliberty.io/)\
  \ 是一个灵`](https://openliberty.io/)活且开源的服务器运行时环境，使你能够快速构建和部署基于微服务的应用程序\n\n。它是一个轻量级、模块化的运行时环境，具有快速启动和低内存占用的特点。它提供了你快速高效构建微服务应用\n\
  \n所需的基础能力。\n\nIBM WebSphere Liberty 应用服务器（[www.ibm.com/in-en/cloud/](https://www.ibm.com/in-en/cloud/websphere-liberty)\n\
  \n[websphere-liberty](https://www.ibm.com/in-en/cloud/websphere-liberty)）构建于 Open\
  \ Liberty 之上。Open Liberty 是一个灵活的运行时环境，支持多种编程模型、语言和框架。\n\n你可以在 Open Liberty 中使用你选择的技术，而无需担心\n\
  \n厂商锁定。Open Liberty 由一个庞大且充满活力的开源社区支持。\n\n第 4 章 构建 RESTful Web 服务\n\n**Open Liberty\
  \ 应用服务器的关键特性**\n\nOpen Liberty 提供了一组专门用于增强微服务应用开发、部署和管理的功能。它提供了\n\n以下关键特性，帮助你开发、部署和管理基于微服务的应用程序：\n\
  \n• **微服务的快速开发：** Open Liberty 让你能够使用自己喜爱的 IDE（\n\n如 Eclipse 或 IntelliJ IDEA）快速开发基于微服务的应用程序。\n\
  \n你还可以使用任意构建工具，如 Maven 或 Gradle。\n\n• **轻松部署到不同环境：** Open Liberty 为你提供\n\n多种部署选项，以便你可以将\n\
  \n应用程序部署到自己选择的平台。你还可以使用容器技术，如 Docker。\n\n• **远程管理、监控与运维：** Open\n\nLiberty 为你提供了多种管理选项，因此你\n\
  \n可以以最适合需求的方式管理应用程序。\n\n它为应用程序的监控和管理提供了内置支持。你可以使用 Open Liberty 管理中心（Admin Center），它\n\
  \n是一个用于监控应用程序健康状况\n\n和性能的图形用户界面。它还提供 Open Liberty 命令行\n\n接口，以支持更脚本化的使用方式。\n\n• **云就绪：**\
  \ Open Liberty 专为云而设计。它支持\n\n最新标准和技术，包括 Jakarta EE 和 Eclipse\n\nMicroProfile。\n\n\
  • **对 Java 标准与技术的支持：** Open Liberty\n\n支持 MicroProfile 中的全部特性，以及 Jakarta EE 规范中的许多特性。这意味着你可以编写\n\
  \nJakarta EE 应用程序并将其部署在 Open Liberty 上。\n\n• **安全性：** Open Liberty 提供全面的安全特性，\n\n\
  包括对单点登录（SSO）和传输层\n\n\n\n安全性（TLS）。TLS 在客户端与服务器之间提供安全连接，而 SSO 允许用户一次登录即可访问\n\n第 4\
  \ 章 构建 RESTful Web 服务\n\n其被授权使用的所有应用程序。这些特性使\n\nOpen Liberty 成为那些必须确保其 Web 应用程序和数据安全的组织的理想选择。\n\
  \n**下载并安装 Open Liberty**\n\n安装 Open Liberty 是一个简单的过程，只需几分钟。以下是在你的计算机上安装 Open Liberty\
  \ 的步骤：\n\n1\\. 从 [`openliberty.io/`](https://openliberty.io/downloads/) 下载 Open\
  \ Liberty\n\n[downloads/.](https://openliberty.io/downloads/)\n\n2\\. 要安装 Open Liberty，请将下载文件的内容解压到你选择的目录中。\n\
