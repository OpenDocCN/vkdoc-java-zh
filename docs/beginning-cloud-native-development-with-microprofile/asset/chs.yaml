  \ [(https://openliberty.io/](https://openliberty.io/)): Open Liberty 是一个快速、轻量、占用资源极小并支持\
  \ Jakarta EE 规范的应用服务器。\n\n• **Quarkus** ([`quarkus.io/`](https://quarkus.io/)):\
  \ Quarkus 是一个 Kubernetes 原生 Java 技术栈，针对 GraalVM 和 OpenJDK HotSpot 量身打造，并由优秀的 Java\
  \ 库与标准构建而成。\n\n• **Helidon.io** ([`helidon.io/`](https://helidon.io/)): Helidon\
  \ 是一个基于微服务的 Java 应用开发框架。\n\n第 6 章 Eclipse MicroProfile 框架\n\n• **Launcher** ([`github.com/fujitsu/launcher`](https://github.com/fujitsu/launcher)):\
  \ Fujitsu Launcher 是一个基于微服务的应用服务器。\n\n• **KumuluzEE** [(https://ee.kumuluz.com/](https://ee.kumuluz.com/)):\
  \ KumuluzEE 是一个开源框架，用于简化 Java 云原生应用的开发。\n\n在本书中，我主要使用 Open Liberty 进行演示，因为它实现了最新的\
  \ MicroProfile 标准。如果你想使用任何其他支持 Eclipse MicroProfile 的应用服务器，开发流程应当也是类似的。\n\n**MicroProfile\
  \ Config**\n\nMicroProfile Config 组件提供了一组 API，帮助你管理应用程序配置。Config API 允许你：\n\n–\n\
  \n读取和写入配置值\n\n–\n\n从多个来源访问配置值，包括属性文件、系统属性和环境变量\n\n–\n\n使用配置事件观察配置值的变化\n\nConfig\
  \ API 的一些特性包括：\n\n• Config：Config 类用于访问配置数据。\n\n• ConfigSource：ConfigSource 用于从特定来源读取配置数据。\n\
  \n• Property：Property 用于表示配置数据中的键/值对。\n\n• Converter：Converter 用于在配置数据中进行类型转换。\n\
  \n• Filter：Filter 用于过滤配置数据。\n\n**Maven 依赖**\n\n\n\n要使用 Config API，你需要在你的 pom 中包含以下依赖。\n\
  \nxml 文件：\n\n第 6 章 eClipse MiCroprofile 框架\n\n<dependency>\n\n<groupId>org.eclipse.microprofile.config</groupId>\n\
  \n<artifactId>microprofile-config-api</artifactId>\n\n<version>1.0</version>\n\n\
  </dependency>\n\n**在 Open Liberty 中启用 MicroProfile Config**\n\n要启用 MicroConfig 特性，你需要将以下代码添加到服务器中。\n\
  \nxml 文件：\n\n<featureManager>\n\n<feature>mpConfig-1.4</feature>\n\n</featureManager>\n\
  \n**使用 MicroProfile Config**\n\nConfig 类提供了可用于访问配置属性的静态方法。在添加该依赖后，你可以创建一个名为 MyConfig\
  \ 的类，如下所示：\n\nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\n\
  import jakarta.enterprise.context.ApplicationScoped;\n\nimport jakarta.inject.Inject;\n\
  \nimport jakarta.inject.Named;\n\n@ApplicationScoped\n\npublic class MyConfig {\n\
  \n@Inject\n\n@ConfigProperty(name = \"greeting\", defaultValue=\"Hello\")\n\nprivate\
  \ String greeting;\n\npublic String getGreeting() {\n\nreturn greeting;\n\n}\n\n\
  }\n\n第 6 章 eClipse MiCroprofile 框架\n\n属性文件可以放在 classpath 中，或者放在文件系统中，文件名为 greeting.properties。\n\
  \n**定义配置属性**\n\n以下是将用于配置 greeting 属性的属性文件源代码：\n\ngreeting=Hello Microservices!\n\
  \nMyConfig 类是一个标准的 Java 类，并使用 @ApplicationScoped 注解，\n\n这意味着它只会被创建一次，并在应用程序整个生命周期中使用。该类有一个字段，使用了\
  \ @Inject 和 @ConfigProperty 注解。ConfigProperty\n\n注解会告诉 Config API 将 greeting 属性的值注入到该字段中。\n\
  \n如果找不到该属性，则会使用默认值 Hello。\n\n**测试 Config 组件**\n\ngetGreeting() 方法只是简单地返回 greeting\
  \ 字段的值。你可以通过创建一个使用该类的 RESTful Web 服务端点来测试这个类：\n\nimport jakarta.inject.Inject;\n\
  \nimport jakarta.ws.rs.GET;\n\nimport jakarta.ws.rs.Path;\n\nimport jakarta.ws.rs.Produces;\n\
  \nimport jakarta.ws.rs.core.MediaType;\n\n@Path(\"/config\")\n\npublic class ConfigResource\
  \ {\n\n@Inject\n\nprivate MyConfig myConfig;\n\n@GET\n\n@Produces(MediaType.TEXT_PLAIN)\n\
  \npublic String getGreeting() {\n\nreturn myConfig.getGreeting();\n\n}\n\n}\n\n\
  第 6 章 eClipse MiCroprofile 框架\n\n当你部署应用程序并调用 /config 端点时，你应该能看到你注入的 greeting 属性：\n\
  \nHello Microservices!\n\n你还可以将配置属性注入到方法参数中，\n\n如下所示：\n\nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\
  \n// ...\n\npublic class MyConfig {\n\n// ...\n\n@Inject\n\npublic void setGreeting(@ConfigProperty(name\
  \ = \"greeting\") String greeting) **创建 ConfigSource**\n\n如你所见，Config API 使得将配置属性注入到应用程序中变得很容易。Config\
  \ API 为配置实现定义了一个契约。ConfigSource\n\n用于从特定来源读取配置数据。例如，你可以创建一个从文件读取配置数据的 ConfigSource。\n\
  \nConfigSource 接口具有以下方法：\n\n• String getName()：返回 ConfigSource 的名称。\n\n• int getOrdinal()：返回\
  \ ConfigSource 的序号。\n\n序号决定了 ConfigSource 的优先级。序号越高，\n\n优先级越高。\n\n• Map<String,\
  \ String> getProperties()：返回此\n\nConfigSource 中属性的映射。映射中的键是属性名，\n\n值是属性值。\n\n• getValue(String\
  \ propertyName)：返回给定\n\n属性的值。如果找不到该属性，此方法返回 null。\n\n• Set getPropertyNames()：返回此\n\
  \nConfigSource 中属性名的 Set 集合。\n\n第 6 章 eClipse MiCroprofile 框架\n\n以下是一个简单的 ConfigSource\
  \ 实现，它从文件读取配置\n\n数据：\n\nimport org.eclipse.microprofile.config.spi.ConfigSource;\n\
  \nimport java.io.IOException;\n\nimport java.util.HashMap;\n\n\n\nimport java.util.Map;\n\
  \nimport java.util.Set;\n\npublic class MyConfigSource implements ConfigSource {\n\
  \nprivate Map<String, String> properties;\n\npublic MyConfigSource() throws IOException\
  \ {\n\nproperties = new HashMap<>();\n\nproperties.put(\"greeting\", \"Hello from\
  \ MyConfigSource!\");\n\n}\n\npublic Map<String, String> getProperties() {\n\nreturn\
  \ properties;\n\n}\n\npublic String getValue(String propertyName) {\n\nreturn properties.get(propertyName);\n\
  \n}\n\npublic String getName() {\n\nreturn \"MyConfigSource\";\n\n}\n\npublic Set<String>\
  \ getPropertyNames() {\n\nreturn properties.keySet();\n\n}\n\npublic int getOrdinal()\
  \ {\n\n// 我们希望这个配置源具有更高的优先级，所以我们\n\nreturn 1000\n\nreturn 1000;\n\n}\n\n}\n\n第 6\
  \ 章 eClipse MiCroprofile 框架\n\n提醒：所有源代码都可从 github.com/apress/beginning-cloud-native-dev-microprofile-jakarta-kubernetes\
  \ 获取。\n\n**注册 ConfigSource**\n\n一旦你实现了 ConfigSource，就需要将其注册到 Config API 中。\n\n你可以通过在应用程序的\
  \ META-INF/services 目录中创建一个名为 org.eclipse.microprofile.config.spi.ConfigSource 的文件来完成此操作。该文件包含你的\
  \ ConfigSource 的完全限定类名。\n\n**访问配置数据**\n\n注册 ConfigSource 后，你就可以访问配置数据：\n\nimport\
  \ org.eclipse.microprofile.config.Config;\n\npublic class MyApplication {\n\n//\
  \ ...\n\npublic void doSomething() {\n\nConfig config = ConfigProvider.getConfig();\n\
  \nString myProp = config.getValue(\"my.prop\", String.class);\n\n}\n\n}\n\n此示例使用\
  \ getValue() 方法从 ConfigSource 检索属性。\n\n第一个参数是属性名称，第二个参数是你希望将属性转换成的类型。如果属性不存在，将返回默认值（此处为\
  \ null）。ConfigSource 是分层的，这意味着你可以用一个 ConfigSource 覆盖另一个 ConfigSource 中的属性。例如，你可以创建一个从文件读取配置数据的\
  \ ConfigSource，以及另一个从系统属性读取配置数据的 ConfigSource。系统属性的优先级高于基于文件的 ConfigSource，而基于文件的\
  \ ConfigSource 的优先级又高于默认 ConfigSource。\n\n第 6 章 eClipse MiCroprofile 框架\n\n**访问配置元数据**\n\
  \n除了将配置值注入应用程序之外，Config API 还提供了访问配置属性元数据的方法。Config 接口使用 getProperty(String propertyName)\
  \ 方法来访问这些元数据。\n\n它会返回给定属性的信息。如果找不到该属性，此方法将返回 null。\n\n**为配置属性指定默认值**\n\n如果属性不存在，你还可以指定要使用的默认值：\n\
  \nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\npublic class\
  \ MyApplication {\n\n@Inject\n\n@ConfigProperty(name=\"my.prop\", defaultValue=\"\
  foo\")\n\nprivate String myProp;\n\n}\n\n在这个示例中，如果 my.prop 属性不存在，将使用默认值 \"foo\"\
  。\n\n**ConfigProperty 中的类型转换**\n\nConfigProperty 还支持类型转换，因此你可以将配置数据注入到任意类型的字段中：\n\
  \nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\npublic class\
  \ MyApplication {\n\n@Inject\n\n@ConfigProperty(name=\"my.prop\", defaultValue=\"\
  1234\")\n\nprivate Integer myProp;\n\n}\n\n在这个示例中，my.prop 属性在注入到 myProp 字段之前会被转换为整数。如果转换失败，将抛出\
  \ org.eclipse.microprofile.config.ConversionFailedException。\n\n第 6 章 eClipse MiCroprofile\
  \ 框架\n\n**使用可选的 ConfigProperty**\n\n如果你希望将属性作为可选字段注入，可以使用 org.eclipse.microprofile.config.inject.ConfigProperty\
  \ 注解：\n\nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\npublic\
  \ class MyApplication {\n\n@Inject\n\n@ConfigProperty(name=\"my.prop\")\n\nprivate\
  \ Optional<String> myProp;\n\n}\n\n\n\n在这个示例中，`myProp` 字段将被注入一个 `Optional<String>`\
  \ 对象。如果该属性不存在，注入的 `Optional` 将为空。可选属性通过 `getOptionalValue()` 方法获取，而不是通过 `getValue()`。\n\
  \n**将配置数据转换为 POJO**\n\n你还可以使用 Config API 将配置数据转换为 POJO：\n\nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\
  \npublic class MyApplication {\n\n@Inject\n\nprivate MyPojo myPojo;\n\n}\n\npublic\
  \ class MyPojo {\n\n@ConfigProperty(name=\"my.prop\")\n\nprivate String myProp;\n\
  \n}\n\n这个示例将名为 `my.prop` 的属性注入到 `MyPojo` 类的 `myProp` 字段中。如果该属性不存在，将抛出 `org.eclipse.microprofile.config.ConfigPropertyNotFoundException`。这段代码还展示了如何访问配置属性的元数据，并将配置数据转换为\
  \ POJO。\n\n**以编程方式查找配置数据**\n\n除了注入之外，你还可以使用 Config API 以编程方式查找配置数据：\n\n第 6 章 eClipse\
  \ MiCroprofile fraMework\n\nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\
  \npublic class MyApplication {\n\npublic void doSomething() {\n\nConfig config =\
  \ ConfigProvider.getConfig();\n\nString myProp = config.getValue(\"my.prop\", String.class);\n\
  \n}\n\n}\n\n和注入字段一样，如果属性不存在，你也可以指定一个默认值来使用：\n\nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\
  \npublic class MyApplication {\n\npublic void doSomething() {\n\nConfig config =\
  \ ConfigProvider.getConfig();\n\nString myProp = config.getValue(\"my.prop\");\n\
  \n}\n\n}\n\n你还可以使用类型转换：\n\nimport org.eclipse.microprofile.config.inject.ConfigProperty;\n\
  \npublic class MyApplication {\n\npublic void doSomething() {\n\nConfig config =\
  \ ConfigProvider.getInstance().getConfig();\n\nInteger myProp = config.getValue(\"\
  my.prop\");\n\n}\n\n}\n\n**MicroProfile 健康检查规范**\n\nEclipse MicroProfile 健康检查规范提供了一组注解和\
  \ API，用于为你的应用程序编写健康检查。*健康检查* 是一种可用于判断应用程序或服务健康状态的测试。Health Check 组件的一些特性包括：\n\n\
  第 6 章 eClipse MiCroprofile fraMework\n\n• HealthCheck：用于将一个类标记为健康检查器。\n\n• HealthCheckResponse：用于表示健康检查的结果。\n\
  \n• HealthCheckRegistry：用于注册和运行健康检查器。\n\nHealth Check API 允许你公开关于应用程序健康状态的信息。这些信息可被负载均衡器和其他工具使用，以判断应用程序是否健康。要使用\
  \ Health Check API，你需要在 `pom.xml` 文件中包含以下依赖：\n\n<dependency>\n\n<groupId>org.eclipse.microprofile.health</groupId>\n\
  \n<artifactId>microprofile-health-api</artifactId>\n\n<version>1.0</version>\n\n\
  </dependency>\n\nHealth Check API 为健康检查实现定义了一个约定。健康检查是一个实现了 `HealthCheck` 接口的 Java\
  \ 类：\n\npackage org.eclipse.microprofile.health;\n\npublic interface HealthCheck\
  \ {\n\nHealthCheckResponse call();\n\n}\n\n`call()` 方法用于执行实际的健康检查并返回一个 `HealthCheckResponse`\
  \ 对象：\n\npackage org.eclipse.microprofile.health;\n\npublic interface HealthCheckResponse\
  \ {\n\nboolean isHealthy();\n\nString getMessage();\n\n}\n\n如果健康检查成功，`isHealthy()`\
  \ 方法返回 `true`，否则返回 `false`。`getMessage()` 方法可用于返回一条描述健康检查结果的消息。\n\n第 6 章 eClipse\
  \ MiCroprofile fraMework\n\n你可以通过实现 `HealthCheck` 接口来创建一个健康检查：\n\nimport org.eclipse.microprofile.health.Health;\n\
  \nimport org.eclipse.microprofile.health.HealthCheck;\n\nimport org.eclipse.microprofile.health.HealthCheckResponse;\n\
  \n@Health\n\npublic class MyHealthCheck implements HealthCheck {\n\n@Override\n\n\
  public HealthCheckResponse call() {\n\nreturn HealthCheckResponse.named(\"my-health-check\"\
  )\n\n\n\n.withData(\"time\", System.currentTimeMillis())\n\n.up()\n\n.build();\n\
  \n}\n\n}\n\nMyHealthCheck 类使用了 @Health 注解，这会告知运行时它是一个健康检查。call() 方法返回一个 HealthCheckResponse\
  \ 对象，表示健康检查成功，并包含了一些关于执行检查时间的数据。\n\n你可以部署该应用并调用 /health 端点来查看健康检查结果：\n\n{\n\n\"\
  status\": \"UP\",\n\n\"checks\": [\n\n{\n\n\"name\": \"my-health-check\",\n\n\"\
  data\": {\n\n\"time\": 1484648754368\n\n}\n\n}\n\n]\n\n}\n\n第 6 章 eClipse MiCroprofile\
  \ 框架\n\n如你所见，健康检查已成功，并且响应中包含了你在健康检查中指定的数据。下一节将介绍如何使用 Fault Tolerance API 使你的应用在面对故障时更具韧性。\n\
  \n**MicroProfile Fault Tolerance 组件**\n\n容错性是指系统在发生故障时仍能持续正确运行的能力。一个具备容错能力的系统能够在无需人工干预的情况下检测、隔离并恢复错误。\n\
  \n**Fault Tolerance 组件的关键特性**\n\nFault Tolerance 组件的一些关键特性包括：\n\n• **断路器**：断路器用于防止应用向下游系统发起过多失败请求。如果失败次数超过阈值，断路器将会“打开”，后续所有请求都会立即失败。经过配置的延迟后，断路器会进入“半开”状态，并允许有限数量的请求通过。如果这些请求成功，断路器会“关闭”，并允许所有请求通过。\n\
  \n• **舱壁隔离**：舱壁用于将系统某一部分的故障与系统其他部分隔离开。例如，如果你的系统包含数据库和 Web 前端，你可以使用舱壁来确保数据库故障不会影响\
  \ Web 前端。\n\n• **重试**：当操作失败时，系统应重试该操作。\n\n• **超时**：超时特性用于在操作耗时过长时中止该操作。\n\n• **回退**：回退特性用于在操作失败时提供默认响应。\n\
  \n• **异步执行**：系统可以异步执行操作，这样调用方就不必等待操作完成。\n\n第 6 章 eClipse MiCroprofile 框架\n\n**Fault\
  \ Tolerance API**\n\nFault Tolerance API 使你能够让应用在故障场景下更具韧性。\n\n本节将介绍如何使用 Fault Tolerance\
  \ 组件构建一个简单的容错应用。由于容错是构建在 Config API 之上的，你可以使用配置数据来配置容错应用的行为。\n\n要使用 Fault Tolerance\
  \ API，你需要在 pom.xml 文件中加入以下依赖：\n\n<dependency>\n\n<groupId>org.eclipse.microprofile.faulttolerance</groupId>\n\
  \n<artifactId>microprofile-fault-tolerance-api</artifactId>\n\n<version>1.0</version>\n\
  \n</dependency>\n\nFault Tolerance API 为容错实现定义了一套契约。容错注解用于标注 Java 方法：\n\nimport\
  \ org.eclipse.microprofile.faulttolerance.Retry;\n\n@Retry(maxRetries = 3, delay\
  \ = 1000)\n\npublic String doSomething() {\n\n// ...\n\n}\n\nRetry 注解会告知运行时在方法失败时最多重试三次。Delay\
  \ 属性指定每次重试之间的等待时间，单位为毫秒。如果三次尝试后方法仍然失败，运行时将抛出 FaultToleranceException。\n\n其他容错注解列在\
  \ Table 6-1. 中。\n\n第 6 章 eClipse MiCroprofile 框架\n\n***表 6-1。** 容错注解及其说明*\n\n**容错**\n\
  \n**说明**\n\n**注解**\n\n@Timeout\n\n为方法指定超时时间。如果方法执行时间超过指定超时时间，将被中止，并抛出 FaultToleranceException。\n\
  \n\n\n@CircuitBreaker 指定该方法应在断路器中执行。如果该方法失败次数过多，断路器将会打开，且该方法\n\n将不会被执行。经过一段时间后，断路器会关闭，\n\
  \n该方法将再次执行。\n\n@Fallback\n\n指定当主方法失败时要执行的回退方法。\n\n@Bulkhead\n\n指定该方法应在舱壁隔离中执行。舱壁隔离\n\
  \n限制该方法的并发执行数量。如果达到\n\n该限制，后续对该方法的调用将被拒绝。\n\n这些注解可以组合使用，以创建更复杂的容错\n\n策略。例如，你可以同时使用\
  \ Timeout 和 Fallback\n\n注解来标注一个方法：\n\nimport org.eclipse.microprofile.faulttolerance.Timeout;\n\
  \nimport org.eclipse.microprofile.faulttolerance.Fallback;\n\n@Timeout(1000)\n\n\
  @Fallback(MyFallbackMethod.class)\n\npublic String doSomething() {\n\n// ...\n\n\
  }\n\n在这个示例中，如果该方法执行时间超过 1000 毫秒，它将被中止，并执行回退方法。\n\n第 6 章 eClipse MiCroprofile 框架\n\
  \n**总结**\n\n本章介绍了 MicroProfile Config 和 Fault Tolerance 组件。下一章将介绍如何使用 Metrics 组件、构建\
  \ RESTful Web 服务、\n\n使用 Open API 组件为 API 生成文档，以及使用\n\nOpenTracing 组件对请求进行追踪。\n\n\
  **第 7 章**\n\n**MicroProfile**\n\n**框架 – 第 2 部分**\n\n在上一章中，你已经了解了 MicroProfile 的架构。那一章还深入讲解了几个关键标准，例如配置、健康检查和容错。\n\
  \n本章讨论 MicroProfile 中一些更重要的标准：Metrics、RESTful Web 服务、开放追踪（OpenTracing）以及 OpenAPI\
  \ 规范（OAS）。\n\nMetrics 和健康检查是监控服务\n\n或应用状态的两种方式。健康检查可以告诉你服务是否健康，而指标则提供有关服务性能的信息。现在让我们详细了解\n\
  \nMicroProfile Metrics 规范。\n\n**MicroProfile Metrics 规范**\n\nMicroProfile Metrics\
  \ 项目提供了一组用于衡量应用性能的注解和 API。它是一项用于以标准格式暴露应用指标的规范。它使其他工具和框架能够轻松收集并跟踪应用指标。\n\n换句话说，该规范定义了一组标准指标，你可以使用它们来跟踪应用的健康状态和性能。你可以通过多种方式暴露这些指标，例如使用\
  \ JMX、JSON 或 Prometheus。\n\nJMX 是 Java Management Extension（Java 管理扩展）。它是一个 Java\
  \ 平台，提供用于\n\n管理和监控 Java 应用的工具。JMX 可用于监控应用的\n\n性能，并用于识别和诊断问题。\n\nPrometheus 工具是一个监控和时序数据库系统。它允许你\n\
  \n从你的服务中收集指标，并将其存储用于长期分析。\n\n© Tarun Telang 2023\n\nT. Telang, *Beginning Cloud\
  \ Native Development with MicroProfile, Jakarta EE, and Kubernetes*,\n\n[`doi.org/10.1007/978-1-4842-8832-0_7`](https://doi.org/10.1007/978-1-4842-8832-0_7#DOI)\n\
  \n第 7 章 MiCroprofile 框架 – 第 2 部分\n\n**指标类型**\n\nMicroProfile Metrics 规范定义了一组标准指标；可分为多个类别：\n\
  \n• **基础指标：** 所有应用通用，例如\n\nCPU 数量或可用内存大小。\n\n• **应用指标**：特定于某个应用，例如每秒请求数\n\n或平均响应时间。\n\
  \n• **供应商指标**：特定于某个供应商或技术，例如\n\n每秒数据库查询次数。\n\n除了这里提到的标准指标外，MicroProfile Metrics\
  \ 还支持自定义指标。你可以使用自定义指标来跟踪标准指标未涵盖的应用特定信息。\n\n**指标组件**\n\n\n\n以下是 Metrics 组件中的一些核心部分：\n\
  \n• MetricRegistry：保存应用程序的所有指标。\n\n• Meters：衡量事件发生的速率。\n\n• Gauges：衡量某一时刻函数的值。\n\
  \n• Counter：对某个值进行递增或递减。\n\n• Histograms：跟踪数据流中数值的分布情况。\n\n• *Timers*：衡量执行某个操作所需的时间。\n\
  \nMetrics 组件还包含一个 JMX 接口，用于暴露\n\n你的应用程序指标。\n\n**Metrics 注解**\n\nMicroProfile Metrics\
  \ 规范定义了一组用于暴露\n\n指标的注解。这些注解可用于类、方法或字段。Table 7-1 lists 列出了 Metrics 注解及其说明。\n\n第 7\
  \ 章 MicroProfile 框架——第 2 部分\n\n***表 7-1。** Metrics 注解*\n\n**注解**\n\n**说明**\n\n@Timed\n\
  \n确定一个方法执行所需的时间，并将该\n\n信息作为指标暴露出来。\n\n@Counted\n\n跟踪一个方法被调用的次数，并将该\n\n信息作为指标暴露出来。\n\
  \n@Gauge\n\n允许你暴露一个可为任意值的自定义指标。它对于\n\n暴露应用程序特定指标很有用。\n\n@ConcurrentGauge 与 Gauge\
  \ 注解类似，但允许跟踪一个方法的并发调用次数。\n\n@Metered\n\n确定一个方法执行所需的时间，并将该\n\n信息作为速率指标暴露出来。\n\n@SimplyTimed\n\
  \n确定一个方法执行所需的时间，并将该\n\n信息同时作为总耗时指标和速率指标暴露出来\n\n除了这些注解之外，MicroProfile Metrics 规范还定义了一组\n\
  \n用于处理指标的编程式 API。这些 API 可用于注册自定义指标或访问现有指标。\n\n**Maven 依赖**\n\n要使用 Metrics 组件，你需要以下\
  \ Maven 依赖：\n\n<dependency>\n\n<groupId>org.eclipse.microprofile</groupId>\n\n<artifactId>microprofile-metrics</artifactId>\n\
  \n</dependency>\n\n**使用 @Timed 跟踪响应时间**\n\nMicroProfile Metrics 规范还允许你将方法响应时间作为计时指标进行跟踪。下面的代码示例展示了如何使用\
  \ @Timed 注解来跟踪响应时间。\n\n第 7 章 MicroProfile 框架——第 2 部分\n\nimport org.eclipse.microprofile.metrics.MetricType;\n\
  \nimport org.eclipse.microprofile.metrics.annotation.Timed;\n\npublic class MyApplication\
  \ {\n\n// 将响应时间作为计时指标暴露\n\n@Timed(name = \"responseTime\", description = \"The response\
  \ time of the method\", unit = \"ms\", metricType = MetricType.TIMER)\n\npublic\
  \ void myMethod() {\n\n// 方法实现\n\n// ....\n\n}\n\n}\n\n这将暴露一个名为 myTimer 的指标，用于跟踪在\n\
  \nmyMethod() 方法中花费的时间（毫秒）。\n\n**跟踪调用次数**\n\nMicroProfile Metrics 规范还允许你将方法调用次数作为计数器指标进行跟踪。下面的代码示例展示了如何使用\
  \ @Metric\n\n注解来跟踪调用计数：\n\nimport org.eclipse.microprofile.metrics.Metrics;\n\n\
  import org.eclipse.microprofile.metrics.MetricType;\n\npublic class MyApplication\
  \ {\n\n// 将调用次数作为计数器指标暴露\n\n@Metric(name = \"invocationCount\", description = \"\
  The number of times\n\nthe method has been invoked\", unit = \"invocations\", metricType\
  \ =\n\nMetricType.COUNTER)\n\npublic int myMethod() {\n\n// 方法实现\n\n// ....\n\n\
  }\n\n}\n\n第 7 章 MicroProfile 框架——第 2 部分\n\n在本示例中，@Metric 注解会告诉 MicroProfile Metrics\
  \ 跟踪\n\nmyMethod() 方法的调用次数，并将该指标作为计数器暴露。\n\n该指标的名称、描述和单位也可以指定。metricType\n\n属性用于指定指标类型，在这个例子中是计数器。\n\
  \n**跟踪内存使用情况**\n\n你还可以使用 MicroProfile Metrics 跟踪应用程序的内存使用情况。\n\n下面的代码示例展示了如何使用 MicroProfile\
  \ Metrics 注解来\n\n跟踪某个方法的内存使用情况：\n\nimport org.eclipse.microprofile.metrics.annotation.Metered;\n\
  \n\n\npublic class MyApplication {\n\n// 跟踪该方法的内存使用情况\n\n@Metered(name = \"memoryUsage\"\
  , unit = MetricUnits.BYTES, description\n\n= \"该方法以内存字节计的使用量\", metricType = MetricType.\n\
  \nMETERED)\n\npublic void myMethod() {\n\n// 方法实现\n\n// ....\n\n}\n\n}\n\n在这个示例中，@Metered\
  \ 注解告诉 MicroProfile Metrics 跟踪 myMethod() 方法的\n\n内存使用情况，并将该指标作为一个 meter 暴露出来。该指标的名称、\n\
  \n描述和单位也可以被指定。\n\n**指标注册表**\n\nMetricRegistry 是通过 MicroProfile Metrics 暴露的所有指标的注册表。\n\
  \n它可用于以编程方式访问指标值或注册自定义指标。\n\n要获取 MetricRegistry 的引用，你可以像下面这样注入它：\n\n@Inject\n\n\
  MetricRegistry registry;\n\n第 7 章 MicroProfile 框架——第 2 部分\n\n然后你可以使用 MetricRegistry\
  \ 访问任何已暴露的指标。例如，要\n\n获取 request-rate 指标的值，你可以使用如下代码：\n\nDouble requestRate = registry.getMetrics().get(\"\
  request-rate\").\n\ndoubleValue();\n\n**创建自定义指标**\n\n你也可以通过实现 org.eclipse.microprofile.\n\
  \nmetrics.Metric 接口来创建自己的指标。下面的代码示例创建了一个用于\n\n跟踪应用中活跃用户数量的自定义指标：\n\nimport org.eclipse.microprofile.metrics.Metric;\n\
  \nimport org.eclipse.microprofile.metrics.MetricUnits;\n\npublic class ActiveUsersMetric\
  \ implements Metric {\n\nprivate int activeUsers;\n\npublic void setActiveUsers(int\
  \ activeUsers) {\n\nthis.activeUsers = activeUsers;\n\n}\n\npublic int getValue()\
  \ {\n\nreturn activeUsers;\n\n}\n\npublic String getName() {\n\nreturn \"activeUsers\"\
  ;\n\n}\n\npublic MetricType getType() {\n\nreturn MetricType.GAUGE;\n\n}\n\npublic\
  \ String getUnit() {\n\nreturn MetricUnits.NONE;\n\n}\n\n}\n\n第 7 章 MicroProfile\
  \ 框架——第 2 部分\n\n在这个示例中，ActiveUsersMetric 类实现了 Metric 接口。\n\n该类包含一个 setActiveUsers()\
  \ 方法用于设置活跃用户数量，以及一个 getValue() 方法用于获取该指标的当前值。该指标的名称、类型和单位也可以被指定。\n\n你可以使用 org.\n\
  \neclipse.microprofile.metrics.MetricsRegistry 接口将你的自定义指标注册到 MicroProfile Metrics\
  \ 中。下面的代码\n\n示例展示了如何向 MicroProfile Metrics 注册一个自定义指标：\n\npublic class MyApplication\
  \ {\n\npublic static void main(String[] args) {\n\n// 创建 MetricRegistry\n\nMetricRegistry\
  \ registry = Metrics.getRegistry();\n\n// 创建自定义指标\n\nActiveUsersMetric activeUsersMetric\
  \ = new ActiveUsersMetric();\n\n// 注册指标\n\nregistry.register(\"activeUsers\", activeUsersMetric);\n\
  \n}\n\n}\n\n在这个示例中，创建了一个自定义 MetricRegistry，并将该自定义指标\n\n注册到了其中。然后你可以使用 MetricRegistry\
  \ 来检索该\n\n指标的值。例如，你可以使用下面的代码获取\n\nactiveUsers 指标的值：\n\nint activeUsers = registry.getGaugeValue(\"\
  activeUsers\");\n\n**暴露指标**\n\n**JMX**\n\n要通过 Java 管理扩展（JMX）暴露指标，请将以下\n\n依赖添加到你的项目中：\n\
  \n<dependency>\n\n<groupId>org.eclipse.microprofile.metrics</groupId>\n\n<artifactId>microprofile-metrics-api</artifactId>\n\
  \n<version>2.3</version>\n\n</dependency>\n\n第 7 章 MicroProfile 框架——第 2 部分\n\n这将为你的应用启用\
  \ MicroProfile Metrics 的 JMX 支持。默认情况下，所有指标都会通过 JMX 暴露。如果你想禁用它，可以在应用配置中设置以下属性：\n\n\
  mp.metrics.jmx.disabled=true\n\n**JSON**\n\n要以 JSON 格式暴露指标，请将以下依赖添加到你的项目中：\n\n<dependency>\n\
  \n<groupId>org.eclipse.microprofile.metrics</groupId>\n\n<artifactId>microprofile-metrics-rest</artifactId>\n\
  \n<version>2.3</version>\n\n</dependency>\n\n这将为你的应用启用 MicroProfile Metrics 的 JSON\
  \ 支持。默认\n\n情况下，所有指标都会以 JSON 格式暴露。如果你想禁用它，可以在应用配置中设置以下属性：\n\nmp.metrics.rest.disabled=true\n\
  \n**Prometheus**\n\n\n\n要以 Prometheus 格式暴露指标，请将以下依赖添加到你的项目中：\n\n<dependency>\n\n\
  <groupId>org.eclipse.microprofile.metrics</groupId>\n\n<artifactId>microprofile-metrics-impl</artifactId>\n\
  \n<version>2.3</version>\n\n</dependency>\n\n这将为你的应用启用 MicroProfile Metrics 的 Prometheus\
  \ 支持。默认情况下，所有指标都会以 Prometheus 格式暴露。\n\n如果你想禁用此功能，可以在应用配置中设置以下属性：\n\nmp.metrics.prometheus.disabled=true\n\
  \n第 7 章 MiCroprofile fraMework – 第 2 部分\n\nMicroProfile Metrics 规范是用于监控应用性能的实用工具。它可用于跟踪方法的执行时间、方法的内存使用情况，以及你定义的自定义指标。MicroProfile\
  \ Metrics 易于使用，并且可以与其他监控工具集成。\n\n**使用 Open Tracing**\n\nMicroProfile OpenTracing\
  \ 规范定义了一组用于在你的方法中启用分布式追踪的标准 API。MicroProfile OpenTracing\n\n规范的目标是保持不同追踪实现之间的一致性，例如\
  \ Jaeg[er（www.jaegertracing.io/）](http://www.jaegertracing.io/)、Zipk[in（https://zipkin.io/）和\
  \ A](https://zipkin.io/)ppDynamics（[www.appdynamics.com/）。T](https://www.appdynamics.com/)这意味着你可以在微服务中使用任何兼容的追踪实现，而无需修改代码。\n\
  \nMicroProfile OpenTracing 规范由两部分组成：\n\n• API 定义描述了如何对 RESTful Web 服务进行埋点，\n\n以实现分布式追踪。\n\
  \n• 兼容层允许不同的追踪实现\n\n与 MicroProfile OpenTracing API 互换使用。\n\n**分布式追踪**\n\n分布式追踪是一种通过追踪请求在系统中的流转来理解分布式系统工作方式的技术。它可用于排查各种问题（如性能问题），并识别分布式系统中的瓶颈。\n\
  \n在微服务架构中，每个微服务都是运行在其所在机器上的独立进程。请求可能会从一个微服务流向另一个微服务，因此很难从整体上理解系统如何工作。\n\n分布式追踪可以通过追踪请求在系统中的流转并识别每个请求涉及了哪些微服务，帮助你看清全局。\n\
  \n**它是如何工作的？**\n\nMicroProfile OpenTracing API 定义了如何对微服务进行埋点，以实现\n\n分布式追踪。该 API\
  \ 基于 OpenTracing 标准，这是一种与供应商无关的-171\n\n第 7 章 MiCroprofile fraMework – 第 2 部分\n\n\
  用于追踪而对分布式系统进行埋点的中立方式。没有分布式追踪时，很难理解一个请求如何在微服务架构中流转。\n\nMicroProfile OpenTracing 兼容层允许不同的追踪\n\
  \n实现与 MicroProfile OpenTracing API 一起使用。这意味着\n\n你可以在微服务中使用任何兼容的追踪实现，而无需\n\n修改你的代码。\n\
  \n**Jakarta RESTful Web Service 中的 MicroProfile OpenTracing**\n\n要实现 OpenTracing，首先你需要在项目的\
  \ pom.xml 文件中包含以下 Maven 依赖。\n\n<dependency>\n\n<groupId>org.eclipse.microprofile.opentracing</groupId>\n\
  \n<artifactId>microprofile-opentracing-api</artifactId>\n\n<version>3.0</version>\n\
  \n</dependency>\n\n要在应用中通过 Zipkin 启用分布式追踪，首先请确保它已\n\n安装并正在运行。请参阅 Chapt[第 3 章 t](https://doi.org/10.1007/978-1-4842-8832-0_3)\
  \ 了解如何在你的系统上安装 Zipkin。接下来，将以下代码添加到你的 server.xml 文件中。\n\n假设你使用 Open Liberty 作为 MicroProfile\
  \ 实现，\n\nserver.xml 文件将位于以下路径：\n\n/<project-folder>/src/main/liberty/config\n\n\
  在你的 RESTful Web 服务运行后，你可以在\n\nZipkin 服务器中查看追踪数据。\n\n\n\n默认情况下，Jakarta RESTful Web\
  \ 服务资源中的所有方法都会被追踪。你可以使用 @Traced(false) 注解来排除某些方法不被追踪。\n\n**显式启用 OpenTracing**\n\n\
  要为非 Jakarta RESTful Web 服务方法启用追踪，你需要将 @\n\nTraced 注解添加到该方法上。对应的代码片段如下：\n\n@Traced\
  \ (value = true, operationName = “MyApplication.someMethod”)\n\npublic void someMethod()\
  \ {\n\n// ...\n\n}\n\n第 7 章 MiCroprofile fraMework – 第 2 部分\n\noperationName=<Span\
  \ name> 参数用于指定 span 的名称。\n\n**注入自定义 Tracer 对象**\n\n底层的 OpenTracing Tracer 对象可以通过\
  \ CDI，使用 @Inject 注解注入到 Jakarta RESTful Web\n\n服务资源类中。\n\npublic class MyApplication\
  \ {\n\n@Inject\n\nprivate Tracer tracer;\n\npublic void someMethod() {\n\n// ...\
  \ 使用 tracer 做一些事情\n\n}\n\n}\n\n之后，你可以通过创建 span 来开始为你的代码添加埋点。例如，要为一个方法添加埋点，可按如下方式操作：\n\
  \npublic class MyApplication {\n\nprivate Tracer tracer;\n\npublic void someMethod()\
  \ {\n\nSpan span = tracer.buildSpan(\"someOperation\").start();\n\ntry (Scope scope\
  \ = tracer.scopeManager().activate(span)){\n\n// ... 在这里做一些事情\n\n} finally {\n\n\
  span.finish();\n\n}\n\n}\n\n}\n\nfinish() 方法在 finally 代码块中调用，以确保 span 总是会被\n\n完成，即使抛出了异常也是如此。它会设置\
  \ span 的状态和结束时间。\n\n可以通过使用 span.log() 方法添加日志，以记录 span 期间发生的事件信息。\n\n第 7 章 MiCroprofile\
  \ fraMework – 第 2 部分\n\n你还可以使用 tracer.setTag() 方法为 span 添加标签：\n\npublic class MyApplication\
  \ {\n\nprivate Tracer tracer;\n\npublic void someMethod() {\n\nSpan span = tracer.buildSpan(\"\
  someOperation\").start();\n\ntry (Scope scope = tracer.scopeManager().activate(span)){\n\
  \n// ... 在这里做一些事情\n\nspan.log(\"something happened here\");\n\nspan.setTag(\"operationType\"\
  , \"read\");\n\n// ... 在这里做一些事情\n\n} finally {\n\nspan.finish();\n\n}\n\n}\n\n}\n\
  \n更多信息请参阅 MicroProfile OpenTracing 规范\n\n([`download.eclipse.org/microprofile/microprofile-opentracing-3.0/`](https://download.eclipse.org/microprofile/microprofile-opentracing-3.0/microprofile-opentracing-spec-3.0.html)\n\
  \n[microprofile-opentracing-spec-3.0.html)。](https://download.eclipse.org/microprofile/microprofile-opentracing-3.0/microprofile-opentracing-spec-3.0.html)\n\
  \n**使用 Jakarta RESTful Web 服务**\n\n如今 Web 服务非常流行，因为它们能够构建解耦系统，\n\n在这种系统中，各服务可以相互通信，而无需了解彼此的实现细节。\n\
  \n设计和实现 Web 服务有很多种方式。其中一种流行方式是\n\n使用表述性状态转移（REST）架构。\n\nJakarta RESTful Web 服务采用\
  \ REST 架构。这类 Web 服务\n\n使构建现代化、可扩展的 Web 应用变得容易。REST 架构\n\n基于这样一个原则：所有数据和功能都应通过统一接口进行访问。\n\
  \n这使得开发、测试和部署 Web 应用更加容易。\n\n第 7 章 MiCroprofile fraMework – 第 2 部分\n\n例如，假设你有一个产品目录，并希望将其作为\
  \ Web 服务提供。使用 REST 时，你可以创建一个表示目录中资源（产品）的 URL。当客户端（例如 Web 浏览器）请求该 URL 时，服务器将返回 JSON\
  \ 格式的产品列表。\n\n让我们创建这个简单的 RESTful Web 服务。要使用 Jakarta RESTful Web 服务\n\nAPI，你需要在项目中添加以下\
  \ Maven 依赖：\n\n<!-- https://mvnrepository.com/artifact/jakarta.ws.rs/jakarta.ws.rs-api\
  \ -->\n\n<dependency>\n\n<groupId>jakarta.ws.rs</groupId>\n\n<artifactId>jakarta.ws.rs-api</artifactId>\n\
  \n<version>3.1.0</version>\n\n</dependency>\n\n现在将 Product 类定义为一个 POJO：\n\npublic\
  \ class Product {\n\nprivate int id;\n\nprivate String name;\n\npublic String getName()\
  \ {\n\nreturn name;\n\n}\n\npublic int getId() {\n\nreturn id;\n\n}\n\npublic Product(int\
  \ id, String name) {\n\nthis.id = id;\n\nthis.name = name;\n\n}\n\n}\n\n\n\n第 7\
  \ 章 MicroProfile 框架——第 2 部分\n\n接下来，创建一个带有 `getProducts()` 方法的 ProductService 类，该方法返回一个\n\
  \n产品列表：\n\nimport java.util.*;\n\nimport jakarta.ws.rs.*;\n\n@Path(\"/products\"\
  )\n\npublic class ProductService {\n\n@GET\n\n@Produces(MediaType.APPLICATION_JSON)\n\
  \npublic List<Product> getProducts() {\n\n// 返回产品列表\n\nList<Product> products =\
  \ new ArrayList<>();\n\nproducts.add(new Product(1, \" product 1\"));\n\nproducts.add(new\
  \ Product(2, \"product 2\"));\n\nreturn products;\n\n}\n\n}\n\n你还需要创建一个 Application：\n\
  \nimport jakarta.ws.rs.ApplicationPath;\n\nimport jakarta.ws.rs.core.Application;\n\
  \n@ApplicationPath(\"/api\")\n\npublic class HelloApplication extends Application\
  \ {\n\n}\n\n该类将用于配置 JAX-RS 应用程序。`@ApplicationPath`\n\n注解定义了此应用程序中所有资源的基础 URI。\n\n\
  然后，你可以将该应用程序部署到兼容 Jakarta EE 的服务器上，并通过 http://localhost:8080/api/products 访问该 Web\
  \ 服务。你应该会看到如下所示的 JSON 格式产品列表：\n\n[{\"id\":1,\"name\":\"product_1\"},{\"id\":2,\"\
  name\":\"product_2\"}]\n\n第 7 章 MicroProfile 框架——第 2 部分\n\n**使用 MicroProfile OpenAPI\
  \ 规范**\n\nMicroProfile OpenAPI 规范提供了一组 Java API，允许开发者基于其 RESTful Web 服务，按照 OpenAPI\
  \ v3 标准定义并自动生成 API 规范。这些 API 规范随后可用于生成交互式文档、客户端 SDK 及其他工具，从而使开发者更容易使用基于 MicroProfile\
  \ 的 API。\n\nMicroProfile OpenAPI 是 Eclipse MicroProfile 项目的一部分，并且\n\n与所有主流 MicroProfile\
  \ 实现兼容。它基于 OpenAPI\n\n规范（OAS），并使用 Jakarta RESTful Web 服务\n\n规范中的注解。具体而言，MicroProfile\
  \ OpenAPI 规范定义了如何\n\n描述通过 HTTP 传输 JSON 的 REST API。\n\n**OpenAPI**\n\nOpenAPI 规范（前身为\
  \ Swagger）是一项用于描述和记录 REST API 与其使用者之间接口的技术规范。它允许 REST\n\nAPI 提供方使用可被各种工具消费的格式来描述并暴露其\
  \ API。\n\n这有助于创建一致、文档完善且易于被人类和机器共同使用的 API。该规范\n\n旨在提供一种统一的 API 描述方式，使其同时具备人类可读性与机器可读性。OAS3\
  \ 规范是一项由社区推动的计划，已被包括 Google、Microsoft 和 Amazon 在内的许多大型组织采用。\n\n**MicroProfile OpenAPI\
  \ 规范的能力**\n\nMicroProfile OpenAPI 使开发者能够轻松为其\n\n微服务生成文档。文档包括提供了哪些服务、如何调用这些服务以及使用了哪些数据类型等信息。此外，该文档还可用于生成客户端代码，以访问这些\
  \ Web 服务。\n\n**生成 OpenAPI 文档**\n\n你可以通过多种方式生成 OpenAPI 文档。最常见的\n\n方式是使用注解。这只需要在你现有的\
  \ Jakarta RESTful Web 服务注解基础上补充 OpenAPI 注解。\n\n第 7 章 MicroProfile 框架——第 2 部分\n\n\
  你也可以使用 JSON 或 YAML 文件。你可以从预定义模型开始，\n\n并手动更新 Web 服务的整个 OpenAPI 文档树。不过，基于注解的方法是推荐方案，因为它更易维护且\n\
  \n更容易理解。最后，你还可以通过配置过滤掉不想记录的资源。\n\n**在你的项目中使用 MicroProfile OpenAPI**\n\n要在你的项目中使用\
  \ MicroProfile OpenAPI，你需要将以下 Maven 坐标添加到你的项目中：\n\n<dependency>\n\n<groupId>org.eclipse.microprofile.openapi</groupId>\n\
  \n<artifactId>microprofile-openapi-api</artifactId>\n\n<version>3.1-RC1</version>\n\
  \n<type>jar</type>\n\n</dependency>\n\n\n\n这个依赖项包含了你为 API 编写文档所需的注解。\n\n首先，你需要创建一个\
  \ Jakarta RESTful Web Service 资源类，其中包含你想要编写文档的 API 方法：\n\nimport jakarta.ws.rs.GET;\n\
  \nimport jakarta.ws.rs.Path;\n\nimport jakarta.ws.rs.Produces;\n\nimport jakarta.ws.rs.core.MediaType;\n\
  \nimport java.util.List;\n\n@Path(\"/myresource\")\n\npublic class MyResource {\n\
  \n@GET\n\n@Produces(MediaType.APPLICATION_JSON)\n\n@Operation(summary = \"Get all\
  \ MyObjects\")\n\n@APIResponse(responseCode = \"200\", description = \" successful\n\
  \noperation\",\n\ncontent = @Content(schema = @Schema(implementation =\n\nMyObject.class))),\n\
  \n第 7 章 MiCroprofile fraMework – 第 2 部分\n\n@APIResponse(responseCode = \"400\",\
  \ description = \"MyObject not found\") public List <MyObject> getAll() {\n\n//\
  \ ...\n\n}\n\n}\n\n这个示例有一个资源类，其中只有一个 API 方法 getAll()。该方法返回一个 MyObject 列表。\n\n这个方法使用\
  \ @Operation 注解来记录资源上的操作。summary 字段提供该操作的简要说明。\n\ngetAll() 方法使用 @APIResponse 注解来记录该操作的成功响应。responseCode\
  \ 字段指定响应的状态码，description 字段提供响应的简要说明。这里有两种可能的响应——一种是包含 MyObject 列表的成功响应，状态码为 200；另一种是未找到\
  \ MyObject 时的失败响应，状态码为 400。content 字段指定响应内容的模式（schema）。\n\n在这个示例中，响应内容是一个 MyObject\
  \ 列表。\n\n最后，你需要将以下属性添加到 src/main/resources/META-INF/microprofile-config.properties\
  \ 文件中：\n\nmp.openapi.scan=true\n\n这个属性会告诉 MicroProfile OpenAPI 扫描你的类中的注解，并为它们生成\
  \ API 文档。\n\n现在你已经配置好了 MicroProfile OpenAPI，你可以构建并运行你的应用程序。\n\n当你访问 http://localhost:8080/openapi.json\
  \ URL 时，你应该会看到由 MicroProfile OpenAPI 生成的 API 文档：\n\n{\n\n\"openapi\": \"3.0.1\"\
  ,\n\n\"info\": {\n\n\"version\": \"1.0.0\",\n\n\"title\": \"My API\"\n\n},\n\n\"\
  paths\": {\n\n\"/myresource\": {\n\n第 7 章 MiCroprofile fraMework – 第 2 部分\n\n\"\
  get\": {\n\n\"operationId\": \"getAll\",\n\n\"summary\": \"Get all MyObjects\",\n\
  \n\"responses\": {\n\n\"200\": {\n\n\"description\": \" successful operation\",\n\
  \n\"content\": {\n\n\"application/json\": {\n\n\"schema\": {\n\n\"$ref\": \"#/components/schemas/MyObject\"\
  \n\n}\n\n}\n\n}\n\n},\n\n\"400\": {\n\n\"description\": \"Invalid input\"\n\n}\n\
  \n}\n\n}\n\n}\n\n},\n\n\"components\": {\n\n\"schemas\": {\n\n\"MyObject\": {\n\n\
  \"type\": \"object\",\n\n\"properties\": {},\n\n\"javaType\": \"com.example.MyObject\"\
  \n\n}\n\n}\n\n}\n\n}\n\n如你所见，MicroProfile OpenAPI 已经为这个资源类生成了 API 文档。你可以使用这份文档来了解该\
  \ API 以及如何使用它。\n\n第 7 章 MiCroprofile fraMework – 第 2 部分\n\n**MicroProfile OpenAPI\
  \ 注解**\n\nMicroProfile OpenAPI 注解可用于为任何 Jakarta RESTful Web Service 资源编写文档。这些注解也可以与其他\
  \ Jakarta RESTful Web Service 注解一起使用，例如 @Path 和 @Produces。常用于 RESTful Web Service\
  \ 文档的注解列在表 7-2 中。\n\n***表 7-2。** MicroProfile OpenAPI 中使用的注解*\n\n**注解**\n\n**说明**\n\
  \n@OpenAPIDefinition 用于定义 API 的通用信息，例如标题、描述、版本等。\n\n@Operation\n\n用于记录资源上的一个操作。summary\
  \ 和\n\ndescription 字段提供该操作的摘要和描述。\n\n@Parameter\n\n用于记录一个操作的参数。\n\n@Tag\n\n用于记录一个操作或资源的标签。name\
  \ 字段\n\n指定标签名称，description 字段提供\n\n标签描述。\n\n@APIResponse\n\n用于记录一个操作的响应。\n\n@RequestBody\n\
  \n用于记录一个操作的请求体。\n\n所有这些注解都定义在 org.eclipse.microprofile.openapi.annotations 包中。\n\
  \n**总结**\n\n\n\n在本章中，你学习了与 MicroProfile 框架相关的大多数核心概念。在下一章中，你将看到如何使用 MicroProfile\
  \ 的 JWT 传播特性来保护 RESTful Web 服务。\n\n**第 8 章**\n\n**MicroProfile JSON Web**\n\n**令牌与\
  \ Jakarta**\n\n**安全**\n\n本章讨论 MicroProfile JSON Web Token 规范。首先会概述 JWT，然后讨论 MicroProfile\
  \ 实现的具体细节。\n\n最后，本章还包含一些代码示例，展示如何在微服务环境中使用 JWT。\n\n**微服务的安全最佳实践**\n\n如今，微服务风靡一时。但服务越多，复杂性就越高——复杂性越高，安全漏洞的风险也就越大。那么，你该如何保护你的微服务呢？\n\
  \n你可以先从几个基本步骤开始。首先，确保每个服务都经过适当的身份认证和授权。其次，使用加密来保护服务之间传输的敏感数据。第三，采用强大的监控和日志工具来检测并追踪可疑活动。最后，务必让你的软件保持最新，并应用最新的安全补丁。\n\
  \n遵循这些步骤将有助于你防范针对微服务的最常见攻击，但保持警惕并持续关注新威胁同样重要。\n\n现在我们来看看如何使用 MicroProfile JSON Web\
  \ Token 控制对微服务的用户与角色访问。\n\n© Tarun Telang 2023\n\nT. Telang，*《Beginning Cloud Native\
  \ Development with MicroProfile, Jakarta EE, and Kubernetes》*，\n\n[`doi.org/10.1007/978-1-4842-8832-0_8`](https://doi.org/10.1007/978-1-4842-8832-0_8#DOI)\n\
  \n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n**什么是 JSON Web Token（JWT）？**\n\
  \nJSON Web Token（JWT）是一种开放标准，它定义了一种紧凑且自包含的方式，用于在各方之间以 JSON 对象形式安全地传输信息。\n\nJWT 可以表示任何声明（claim），例如身份信息、安全角色或会话信息。\n\
  \n这些声明可以被验证并且值得信任，因为它们经过数字签名。JWT 可以使用密钥或公钥/私钥对进行签名。JWT 还可用于授权：只有持有有效 JWT 的用户才能访问特定资源。\n\
  \nMicroProfile JSON Web Token 规范定义了如何在微服务环境中使用 JWT，包括如何验证和校验令牌。它基于 JWT 标准，并增加了一些面向微服务的附加特性。\n\
  \n**JSON Web Token 的使用场景**\n\nJSON Web Token 可用于以下场景。\n\n**身份认证**\n\nJWT 可用于用户身份认证。用户可以通过提供具有正确签名的\
  \ JWT 来完成认证。内存中的认证方式更快、更便捷，因为用户凭据存储在内存中；但其安全性较低，因为数据更容易受到攻击。存储在数据库中的用户凭据速度较慢、使用更复杂，但安全性更高，因为数据可通过加密或访问控制得到更好的保护。加密会让黑客更难获取和窃取信息。访问控制可确保只有获得授权的用户才有权限查看或修改数据。\n\
  \n**授权**\n\nJSON Web Token 的一个常见用例是授权。在这种场景中，JWT 包含代表用户身份和安全角色的声明。这些声明可用于确定用户被允许访问哪些资源。\n\
  \n例如，具有 admin 安全角色的用户可能被允许访问所有资源。相比之下，具有只读安全角色的用户可能仅被允许访问被标记为可读的资源。\n\n第 8 章 MiCroprofile\
  \ JSoN Web tokeNS aNd Jakarta SeCurity\n\n**会话信息**\n\nJSON Web Token 的另一个常见用例是存储会话信息。在这种场景中，JWT\
  \ 包含表示用户会话信息的声明，例如\n\n\n\n例如会话何时开始、何时过期。这些信息可以跟踪用户会话，并确保其不会超过某个时间限制。\n\n**基于声明的身份（Claims-Based\
  \ Identity）**\n\nJWT 也可用于表示基于声明的身份。在这种场景中，JWT\n\n包含代表用户身份的声明，例如姓名和电子邮件地址。\n\n应用程序可以使用这些声明来识别用户。\n\
  \n例如，应用程序可能会使用用户的电子邮件地址声明，在数据库中查找其个人资料信息。或者，应用程序可能会使用用户姓名声明，在欢迎页面显示用户姓名。\n\nJWT\
  \ 可以与其他身份提供者（例如 LDAP 或 Active Directory）配合使用，为用户提供单点登录体验。\n\n**信息交换（Information\
  \ Exchange）**\n\nJWT 也可用于在各方之间交换信息。在这种场景中，\n\nJWT 包含代表被交换数据的声明。例如，一个 JWT\n\n可能包含订单\
  \ ID 声明和用户 ID 声明。应用程序可以使用这些声明来查找订单并展示给用户。\n\nJWT 可以用于信息交换，并且常用于单点登录（SSO）系统。\n\n\
  **联合身份（Federation）**\n\nJWT 也可用于联合身份场景。在这种场景中，JWT 包含代表用户身份的声明。应用程序可以使用这些声明来识别用户并查找其个人资料信息。\n\
  \nJWT 可以与其他身份提供者（例如 Active Directory Federation\n\nServices（ADFS））配合使用，为用户提供单点登录体验。\n\
  \n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n**创建并签名 JWT**\n\nJWT\
  \ 由三部分组成：头部（header）、载荷（payload）和签名（signature）。每一部分之间用点号分隔：\n\nsdfdfsdfsdSDFJJEOKJA.0dsfDNFSUJSDJ.ASDSAasdhjasS\n\
  \n头部和载荷是 JSON 对象，而签名是数字签名，\n\n可用于验证 JWT 是否被篡改。\n\n*头部（header）*通常包含用于为 JWT 签名的算法信息，*载荷（payload）*包含实际的声明。声明可以是你希望表示的任何内容，例如用户姓名、电子邮件地址或安全角色。\n\
  \nJWT 的头部包含以下信息：\n\n–\n\n令牌类型（JWT）\n\n–\n\n用于创建签名的算法（HS256）\n\n下面是一个头部和载荷示例。\n\n\
  Header:\n\n{\n\n\"typ\": \"JWT\",\n\n\"alg\": \"HS256\"\n\n}\n\nPayload:\n\n{\n\n\
  \"iss\": \"Bob\",\n\n\"exp\": 1463808400,\n\n\"http://example.com/is_root\": true,\n\
  \n\"sub\": \"alice\"\n\n}\n\n在这个示例中，载荷包含以下声明：\n\n• iss：令牌的签发者\n\n• exp：令牌的过期时间\n\
  \n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n• [`example.com/is_root：一个标志`](http://example.com/is_root:)，用于指示该令牌是否用于\
  \ root 资源\n\n• sub：令牌的主题\n\n你应尽量让令牌保持简短。不要在主体中添加大量数据。如果令牌过长，会拖慢请求。\n\n*签名（signature）*是通过使用密钥对头部和载荷进行签名生成的。这个密钥仅\
  \ JWT 的签发者知晓，有助于确保 JWT 未被篡改。\n\n下面是一个 JWT 签名示例：\n\neyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoicmVzb3VyY2UiLCJzdWIiOiJQ\n\
  \ncm9maWxlIiwianRpIjoibWFya2V0aW5nIl0sImdldENvcnJlY3RNc2ciOiJVc2VySGV4ZWN1d\n\n\
  Gl2ZSIsInNlcW5vIjoiZXhhbXBsZS1jbGljayIsImlzcyI6InNlcW5vIiwic2VyaWYiOiJVc2\n\nVySGV4ZWN1dGl2ZSIsInR5cGUiOiJVc2VySGV4ZWN1dGl2ZSIsInNyYzIjoibWFya2V0aW5n\n\
  \nIl0sImFtciI6IlNlcW5vIl0sImdybCI6IlNlcW5vIl0\n\n要创建并签名 JWT，你需要以下几项：\n\n• 一个 JSON\
  \ 对象，包含你希望\n\n纳入 JWT 的声明或断言。这也称为载荷（payload）。\n\n• 一个密钥，或一对公钥/私钥。\n\n• 一个用于给 JWT\
  \ 签名的算法。\n\n你在载荷中包含的声明将取决于你的应用程序。这里列出一些\n\n常见声明：\n\n• iss（issuer）：JWT 的签发者。这通常是该\
  \ URL 的\n\n\n\n签发 JWT 的服务。\n\n• sub（主题）：JWT 的主题。这通常是已认证用户的用户 ID。\n\n• aud（受众）：JWT\
  \ 的受众。这通常是将要使用 JWT 的服务 URL。\n\n• exp（过期时间）：JWT 的过期时间。它用于防止重放攻击。\n\n第 8 章 Microprofile\
  \ JSON Web Tokens 与 Jakarta Security\n\n• nbf（生效时间）：JWT 在此时间之前不得被接受并处理。\n\n• iat（签发时间）：JWT\
  \ 被签发的时间。\n\n• jti（JWT ID）：JWT 的唯一标识符。\n\n创建并签名 JWT 的代码如下所示：\n\nimport org.eclipse.microprofile.jwt.JsonWebToken;\n\
  \nimport jakarta.enterprise.context.RequestScoped;\n\nimport jakarta.inject.Inject;\n\
  \nimport java.util.HashMap;\n\nimport java.util.Map;\n\n@RequestScoped\n\npublic\
  \ class JWTGenerator {\n\nprivate static final Logger LOG = Logger.getLogger(JWTGenerator.\n\
  \nclass.getName());\n\nprivate static final String ISSUER = \"https://example.com\"\
  ;\n\n@Inject\n\nprivate JsonWebToken jwt;\n\npublic String generate() {\n\nLOG.log(Level.INFO,\
  \ \"Generating JWT for: {0}\", jwt.getName());\n\nMap<String, Object> claims = new\
  \ HashMap<>();\n\nclaims.put(\"iss\", ISSUER);\n\nclaims.put(\"sub\", jwt.getSubject());\n\
  \nclaims.put(\"aud\", \"https://example.com/resources\");\n\nclaims.put(\"exp\"\
  , System.currentTimeMillis() + 60 * 1000); //\n\n1 minute\n\nreturn Jwts.builder().setClaims(claims).\n\
  \nsignWith(SignatureAlgorithm.HS512, \"secret\".getBytes()).\n\ncompact();\n\n}\n\
  \n}\n\n第 8 章 Microprofile JSON Web Tokens 与 Jakarta Security\n\n**说明：**\n\nJWTGenerator\
  \ 类使用了 RequestScoped 注解。\n\n这意味着每个请求都会创建该类的一个新实例。JWTGenerator 类有一个 generate 方法，用于创建并签名\
  \ JWT。\n\ngenerate 方法注入了 JsonWebToken 接口。该接口提供对已认证用户信息的访问，例如用户名和用户 ID。\n\ngenerate\
  \ 方法会创建一个 map，用于存储将被包含在 JWT 中的声明（claims）。iss（签发者）、sub（主题）、aud（受众）和 exp（过期时间）声明会被添加到\
  \ map 中。iss 声明被设置为签发 JWT 的服务 URL。sub 声明被设置为已认证用户的用户 ID。aud 声明被设置为将使用 JWT 的服务 URL。exp\
  \ 声明用于防止重放攻击，并被设置为从当前时间起 1 分钟后过期。\n\n这些声明用于创建一个 JWT，并使用 HS512 算法和密钥进行签名。随后，签名后的\
  \ JWT 会由 generate 方法返回。\n\n**测试应用程序**\n\n要测试该应用程序，你可以使用 curl 向 /resources/jwks\n\
  端点发起请求。该端点会返回公钥，可用于验证 JWT 的签名。\n\n$ curl -i http://localhost:8080/resources/jwks\n\
  \n你应该会看到如下响应：\n\nHTTP/1.1 200\n\nContent-Type: application/json;charset=UTF-8\n\n\
  Content-Length: 779\n\n{\"keys\":[{\"kty\":\"RSA\",\"e\":\"AQAB\",\"use\":\"sig\"\
  ,\"kid\":\"jwk-rsa1\",\"alg\":\"RS256\"\n\n,\"n\":\"yNWVhtYEKJR21y9xsHV- PD_bYwbXSeNuFal46xYxVfRL5mqha7vttvjB_vc7Xg2RvgCxH\n\
  \nPCqoxgMPTzHrZT75LjCwIIaUl4- qazaG4ZoTxziTYjsBMvsPuUvMVQe\n\n...\n\n第 8 章 Microprofile\
  \ JSON Web Tokens 与 Jakarta Security\n\n**验证与校验 JWT**\n\n要验证并校验 JWT，你需要持有用于签名 JWT\
  \ 的密钥。这个密钥通常由 JWT 的签发方持有。签名验证的方式是：使用密钥对 header 和 payload 进行签名，然后将结果与 JWT 中的签名进行比较。如果匹配，则\
  \ JWT 被视为有效。\n\n还需要校验 payload 中的声明，以确保它们未被篡改。例如，会检查过期时间（exp）声明以确认 JWT 尚未过期。\n\n\
  要校验 JWT 的签名，你需要配置 SignatureConfiguration。\n\n这可以通过编程方式完成，也可以通过 MicroProfile Config\
  \ 完成。\n\n以下是一个通过编程方式配置 SignatureConfiguration\n的示例：\n\n\n\nSignatureConfiguration\
  \ signatureConfig =\n\nnew SignatureConfiguration()\n\n.setKeyId(\"jwt-key\")\n\n\
  .setSignatureAlgorithm(SignatureAlgorithm.RS256)\n\n.setKeyStoreLocation(\"/path/to/keystore.jks\"\
  )\n\n.setKeyStorePassword(\"secret\");\n\n这个示例使用了 RSA256 签名算法，密钥库位于 /path/to/keystore.jks。密钥库密码是\
  \ \"secret\"。\n\n你也可以通过 MicroProfile Config 来配置 SignatureConfiguration：\n\nmp.jwt.verify.signature.key-id=jwt-key\n\
  \nmp.jwt.verify.signature.algorithm=RS256\n\nmp.jwt.verify.signature.key-store-location=/path/to/keystore.jks\n\
  \nmp.jwt.verify.signature.key-store-password=secret\n\n当你完成 SignatureConfiguration\
  \ 设置后，你可以创建一个 JWTProcessor 并传入你的配置：\n\nJWTProcessor jwtProcessor = new DefaultJWTProcessor();\n\
  \njwtProcessor.setSignatureConfiguration(signatureConfig);\n\n第 8 章 MicroProfile\
  \ JSON Web Token 与 Jakarta Security\n\n现在你已经配置好了 JWTProcessor，可以使用它来验证 JWT 的签名：\n\
  \nJWTClaimsSet claimsSet = jwtProcessor.process(jwtString, null);\n\n如果签名有效，process()\
  \ 方法将返回一个 JWTClaimsSet。如果签名无效，则会抛出异常。\n\n**在微服务环境中使用 JWT**\n\nMicroProfile JSON\
  \ Web Token 规范是微服务环境安全的重要组成部分。在微服务环境中，每个服务通常都要对自身安全负责。这意味着每个服务都需要能够验证和校验 JWT。\n\n\
  JSON Web Token 是微服务中流行的令牌格式，因为它遵循定义良好且广为人知的标准。基于令牌的认证机制提供了一种轻量级方式，可在不同服务之间传播用户身份。\n\
  \nMicroProfile JSON Web Token 规范定义了 JWT 在微服务环境中的使用方式。该规范定义了一组适用于微服务需求的声明（claims）。这些声明包括令牌的签发者（issuer）、主题（subject）和受众（audience）。此外，该规范还定义了\
  \ JWT 在微服务环境中的使用方法，包括如何验证和校验令牌。\n\n举例来说，假设你有两个微服务——一个认证服务（auth service）和一个产品服务（product\
  \ service）。认证服务负责对用户进行身份认证并签发 JWT。产品服务负责管理用户。\n\n认证服务会在用户完成认证后向其签发 JWT。这些 JWT 包含有关用户的声明信息，例如姓名和电子邮件地址。产品服务使用\
  \ MicroProfile JWT 规范来验证和校验由认证服务签发的 JWT。然后，产品服务可以使用 JWT 中的信息来识别访问它的用户。图 8-1 展示了从产品服务进行认证并获取数据所经历的步骤顺序。\n\
  \n![](img/index-210_1.png)\n\n第 8 章 MicroProfile JSON Web Token 与 Jakarta Security\n\
  \n***图 8-1。** 展示 JWT 传播过程的时序图*\n\n有关 JSON Web Token（JWT）的更多信息，请访问 JWT 官网：[`jwt.io`](https://jwt.io)。\n\
  \n**保护 RESTful 应用程序**\n\n通过使用 MicroProfile 中的 JWT 功能，你可以通过指定以下注解来保护 REST 应用程序：\n\
  \n@LoginConfig(authMethod = \"MP-JWT\", realmName = \"jwt-jaspi\")\n\n@DeclareRoles({\"\
  user\", \"admin\"})\n\npublic class MyApplication extends Application {\n\n// ...\n\
  \n}\n\nMyApplication 类使用 MP-JWT 认证方法和 jwt-jaspi 域（realm）进行保护，并声明了 user 和 admin 角色。\n\
  \n这个示例使用 MP-JWT 功能来保护 REST 应用程序。你也可以用它来保护其他类型的应用程序，例如 Java EE Web 应用程序。\n\n第 8 章\
  \ MicroProfile JSON Web Token 与 Jakarta Security\n\n用于保护该 REST 应用程序的完整代码如下所示：\n\n\
  import org.eclipse.microprofile.auth.LoginConfig;\n\nimport jakarta.annotation.security.DeclareRoles;\n\
  \nimport jakarta.ws.rs.ApplicationPath;\n\n\n\nimport jakarta.ws.rs.core.Application;\n\
  \n@LoginConfig(authMethod = \"MP-JWT\", realmName = \"jwt-jaspi\")\n\n@DeclareRoles({\"\
  user\", \"admin\"})\n\n@ApplicationPath(\"/\")\n\npublic class MyApplication extends\
  \ Application {\n\n// ...\n\n}\n\nMyApplication 类还使用了 LoginConfig 和 DeclareRoles\
  \ 注解。\n\nLoginConfig 注解用于配置身份验证方法和领域名称。\n\n本示例使用 MP-JWT 身份验证方法和 jwt-jaspi 领域。\n\n\
  声明了 user 和 admin 两种角色。\n\n**保护 REST 资源**\n\nMicroProfile JWT API 还定义了一组用于保护 REST\n\
  \n资源的注解。这些注解可用于保护 RESTful 应用程序中的资源。\n\n在第 [4](https://doi.org/10.1007/978-1-4842-8832-0_4)\
  \ 章中，你已经了解了 RESTful Web 服务以及各种 HTTP\n\n方法的作用。\n\n下面的代码展示了如何使用 MicroProfile 注解来保护\n\
  \nRESTful 应用程序中的资源：\n\nimport org.eclipse.microprofile.jwt.JWTAccessDeniedException;\n\
  \nimport java.security.Principal;\n\nimport jakarta.annotation.security.DenyAll;\n\
  \nimport jakarta.annotation.security.PermitAll;\n\nimport jakarta.annotation.security.RolesAllowed;\n\
  \nimport jakarta.enterprise.context.RequestScoped;\n\nimport jakarta.inject.Inject;\n\
  \nimport jakarta.ws.rs.container.ContainerRequestContext;\n\n第 8 章 MicroProfile\
  \ JSON Web Token 与 Jakarta Security\n\nimport jakarta.ws.rs.core.Context;\n\nimport\
  \ jakarta.ws.rs.core.SecurityContext;\n\nimport java.io.IOException;\n\n@Path(\"\
  /\")\n\n@RequestScoped\n\npublic class Resource {\n\n@Inject\n\nPrincipal caller;\n\
  \n@Context\n\nSecurityContext securityContext;\n\n@GET\n\npublic String doGet()\
  \ {\n\nif (securityContext.isUserInRole(\"admin\")) {\n\nreturn \"admin\";\n\n}\
  \ else {\n\nreturn \"user\";\n\n}\n\n}\n\n// 此资源仅允许具有 \"admin\" 角色的用户访问\n\n@GET\n\
  \n@Path(\"/admin\")\n\n@RolesAllowed(\"admin\")\n\npublic String doGetAdmin() {\n\
  \nreturn \"admin\";\n\n}\n\n// 此资源对所有用户开放\n\n@GET\n\n@Path(\"/public\")\n\n@PermitAll\n\
  \npublic String doGetPublic() {\n\nreturn \"public\";\n\n}\n\n第 8 章 MicroProfile\
  \ JSON Web Token 与 Jakarta Security\n\n// 此资源不允许任何用户访问\n\n@GET\n\n@Path(\"/denied\"\
  )\n\n@DenyAll\n\npublic String doGetDenied() {\n\nreturn \"denied\";\n\n}\n\npublic\
  \ void displyUserDetails() {\n\nPrincipal principal = securityContext.getUserPrincipal();\n\
  \nString name = principal.getName();\n\n// \"name\" 声明\n\nString email = principal.getClaim(\"\
  email\");\n\n// \"email\" 声明\n\n// ...\n\n}\n\n}\n\n在此示例中，/admin 资源仅允许具有 admin 角色的用户访问。\n\
  \n/public 资源对所有用户开放。/denied 资源不允许任何用户访问。\n\njava.security.Principle 接口可用于从 JWT 令牌中获取有关\n\
  \n调用者的信息。displayUserDetails() 方法演示了如何使用它\n\n来获取调用者信息。\n\n**@RolesAllowed 注解**\n\n\
  @RolesAllowed 可用于保护 RESTful 应用程序中的资源。允许访问资源的角色在该注解中指定。\n\n例如，假设你有一个 RESTful 资源，仅允许具有\
  \ admin 角色的用户\n\n访问。这可以通过为该资源添加\n\n@RolesAllowed(\"admin\") 注解来实现。\n\n下面的代码展示了如何使用\
  \ @RolesAllowed 注解来保护\n\nRESTful 应用程序中的资源。允许访问资源的角色在注解中指定。\n\n第 8 章 MicroProfile\
  \ JSON Web Token 与 Jakarta Security\n\n@RestController\n\n@RequestMapping(\"/users\"\
  )\n\npublic class ProductResource {\n\n@RolesAllowed(\"admin\")\n\nprotected List<User>\
  \ getProducts() {\n\n// 在此从数据库获取用户\n\n}\n\n...\n\n}\n\n在此示例中，只有具有 admin 角色的用户才能调用\
  \ Products 资源的 getProducts() 方法。\n\n**@Claim 注解**\n\n@Claim 注解可用于将某个声明（claim）的值注入到\
  \ Java 方法\n\n参数中。声明名称在该注解中指定。\n\n例如，假设你有一个方法需要访问发起请求用户的电子邮件地址。\n\n这可以通过为 email\n\
  \n参数添加 @Claim(\"email\") 注解来实现。\n\n\n\n以下代码展示了如何使用 @Claim 注解将某个声明（claim）的值注入到 Java\
  \ 方法参数中。声明的名称在注解中指定。\n\npublic void doSomething(**@Claim(\"email\")** String email)\
  \ {\n\n// do something with the email address here\n\n}\n\n在这个示例中，用户的电子邮箱地址被注入到\
  \ doSomething() 方法中。\n\n**@HeaderParam 注解**\n\n@HeaderParam 注解可以将 HTTP 请求头的值注入到\
  \ Java 方法参数中。请求头名称在注解中指定。\n\n第 8 章 MicroProfile JSON Web Tokens 与 Jakarta Security\n\
  \n例如，假设你有一个方法需要访问 authHeader 的值。可以通过使用 @HeaderParam(\"authHeader\") 注解该请求头参数来实现。\n\
  \n以下代码展示了如何使用 @HeaderParam 注解将 HTTP 请求头的值注入到 Java 方法参数中。请求头名称在注解中指定。\n\npublic void\
  \ doSomething(@HeaderParam(\"authHeader\") String authHeader) {\n\n// do something\
  \ with the authHeader here\n\n}\n\n在这个示例中，authHeader 的值被注入到 doSomething 方法中。\n\n\
  **配置 JWK 集或 PEM 编码的公钥**\n\nMicroProfile JWT Auth 规范支持以下公钥格式：\n\n• PEM 格式的 Public\
  \ Key Cryptography Standards #8\n\n• JSON Web Key（JWK）\n\n**PEM 格式的 Public Key Cryptography\
  \ Standards #8**\n\n要配置 PEM 格式的公钥，你需要设置以下 MicroProfile Config 属性：\n\nmp.jwt.verify.publickey.location=/META-INF/publicKey.pem\n\
  \nmp.jwt.verify.publickey.format=PEM\n\nmp.jwt.verify.publickey.location 属性的值必须是\
  \ PEM 编码公钥文件的路径。该文件可以位于应用程序的资源目录中。\n\n以下是一个 PEM 编码公钥示例：\n\n-----BEGIN PUBLIC KEY-----\n\
  \nMIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEAuYP6FyP/cTmVnxE1JXs+\n\n5ySE+FNxztk0aDV8pPiwoZmxIkcH2QYP1XCfY16/m05zt6nEJbDP7OiWl57bFmuG\n\
  \nKTPvfOHXlh17UfStys ...\n\n-----END PUBLIC KEY-----\n\n第 8 章 MicroProfile JSON\
  \ Web Tokens 与 Jakarta Security\n\n**JSON Web Key（JWK）**\n\nJSON Web Key（JWK）是一种\
  \ JavaScript Object Notation（JSON）数据结构，用于表示加密密钥。JWK Set 是一种表示一组 JWK 的 JSON 数据结构。\n\
  \n要配置 JWK Set，你需要设置以下 MicroProfile Config 属性：mp.jwt.verify.publickey.location=/META-INF/jwkset.json\n\
  \nmp.jwt.verify.publickey.format=JWKSET\n\nmp.jwt.verify.publickey.location 属性的值必须是\
  \ JWK Set 文件的路径。该文件可以位于应用程序的资源目录中。以下是一个 JWK Set 示例：\n\n{\n\n\"kty\":\"RSA\",\n\n\
  \"key\":\"-----BEGIN PUBLIC KEY-----\n\nMIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEAuYP6FyP/cTmVnxE1JXs+5ySE+FNxztk\n\
  \n0aDV8pPiwoZmxIkcH2QYP1XCfY16/m05zt6nEJbDP7OiWl57bFmuGKTPvfOHXlh17UfStys...\n\n\
  -----END PUBLIC KEY-----\",\n\n\"e\":\"AQAB\",\n\n\"d\":\"https://www.example.com/key-store.jks\"\
  \n\n}\n\n请注意，JWT 必须使用请求头中指定的算法进行签名，并且用于签名 JWT 的密钥必须是指定格式。\n\n**JSON Web Key Set（JWKS）**\n\
  \nJWK Set 必须只包含一个密钥，并且算法必须在 JWT 的请求头中指定。\n\nJWK Set 是一种表示一组 JWK 的 JSON 数据结构。JWK\
  \ Set 必须只包含一个密钥，并且算法必须在 JWT 的请求头中指定。\n\n这个示例展示了一个 JWKS：\n\n{\n\n\"keys\":[\n\n{\"\
  kty\":\"RSA\",\n\n第 8 章 MicroProfile JSON Web Tokens 与 Jakarta Security\n\n\"key\"\
  :\"-----BEGIN PUBLIC KEY-----\n\nMIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEAuYP6FyP/cTmVnxE1JXs+5ySE+FNxztk\n\
  \n0aDV8pPiwoZmxIkcH2QYP1XCfY16/m05zt6nEJbDP7OiWl57bFmuGKTPvfOHXlh17UfStys...\n\n\
  -----END PUBLIC KEY-----\",\n\n\"e\":\"AQAB\",\n\n\"d\":\"https://www.example.com/key-store.jks\"\
  }]\n\n}\n\n要配置 JWK Set，请在你的 MicroProfile Config 中指定以下内容：\n\nmp.jwt.verify.publickey.location=https://www.example.com/jwkset.json\n\
  \n公钥将从该 URL 读取。\n\n**Jakarta EE Security 规范**\n\n\n\nJakarta EE Security 规范定义了多种用于保护\
  \ Web 服务的机制。\n\n它可以配置基础认证机制，例如 HTTP Basic 和 Digest 认证。它还支持用于 Web 服务的表单认证。\n\n此外，它还提供了多种为\
  \ RESTful Web 服务配置 SSL 的选项。\n\n如果你使用 SSL 或 TLS，Web 服务客户端必须拥有有效证书，才能与服务器建立安全连接。连接一旦建立，客户端与服务器之间交换的所有数据都将被加密。\n\
  \n**使用 Jakarta Security 保护 Servlet**\n\nJakarta Security 规范为服务器端 Java 应用提供了完整的安全解决方案。它们同时提供认证（Authentication）和授权（Authorization）服务。\n\
  \n认证是用于验证用户是否为其所声称身份的过程。授权是用于确定用户被允许执行哪些操作的过程。\n\nJakarta Security 项目提供了多种保护 Servlet\
  \ 的机制，\n\n包括自定义认证。\n\n*基于表单的认证*是 Web 上最常见的用户认证方式。在这种方法中，会向用户展示一个登录表单，用户在其中输入用户名和密码。如果凭据有效，用户将被授予对受保护资源的访问权限。\n\
  \n第 8 章 MicroProfile JSON Web Tokens 与 Jakarta Security\n\n*Basic 认证*是一种更简单的 Servlet\
  \ 保护方法。在 HTTP Basic 认证中，Web 服务器会提示用户输入用户名和密码。随后，\n\n服务器会验证这些凭据。如果凭据有效，用户将被授予对受保护资源的访问权限。HTTP\
  \ Basic 认证以明文传输用户名\n\n和密码，因此不如基于表单的认证安全。\n\n不过，可以将 HTTPS 与 HTTP Basic 认证一起使用，以防止\n\
  \n凭据被攻击者截获。\n\n*Digest 认证*与 Basic 认证类似，不同之处在于密码不会以明文发送。相反，会计算密码的单向哈希并发送到服务器。随后服务器会对接收到的密码计算哈希，并将其与发送来的哈希进行比较。如果两者匹配，则认为用户已通过认证。\n\
  \n*自定义认证*允许你编写自己的认证代码。这是保护 Servlet 最灵活的方式。通过自定义认证，你可以使用任何\n\n你想要的认证方案。\n\n基于表单的认证和\
  \ Basic 认证都可以用于保护\n\nServlet。不过，通常基于表单的认证比 HTTP\n\nBasic 认证更安全。基于表单的认证也可以使用 HTTPS\
  \ 来保护\n\n客户端与服务器之间的通信。使用 HTTPS 时，用户的\n\n凭据会被加密，第三方攻击者无法截获。\n\nJakarta Security 还提供了一个可用于保护\
  \ Servlet 的安全过滤器。该安全过滤器会拦截对受保护资源的所有请求，并验证用户是否具备访问这些资源所需的权限。\n\n要在 RESTful Web 服务中使用\
  \ HTTP Basic 认证，你需要在 web.xml 文件中进行配置。以下是在 web.xml 文件中进行 HTTP Basic 认证的配置：\n\n<security-constraint>\n\
  \n<web-resource-collection>\n\n<web-resource-name>secured</web-resource-name>\n\n\
  <url-pattern>/*</url-pattern>\n\n</web-resource-collection>\n\n<auth-constraint>\n\
  \n<role-name>user</role-name>\n\n</auth-constraint>\n\n</security-constraint>\n\n\
  第 8 章 MicroProfile JSON Web Tokens 与 Jakarta Security\n\n<login-config>\n\n<auth-method>BASIC</auth-method>\n\
  \n<realm-name>default</realm-name>\n\n</login-config>\n\n此配置定义了一个安全约束，将 Web 应用中任何资源的访问限制为仅具有\
  \ user 角色的用户。同时，它还将该 Web 应用配置为使用 HTTP Basic 认证。\n\n完成 HTTP Basic 认证配置后，当浏览器提示时提供用户名和密码，你就可以通过浏览器访问受保护的\n\
  \n资源。\n\n\n\n你也可以使用像 curl 这样的工具来访问受保护资源：\n\ncurl -u user:password http://localhost:8080/secured\n\
  \n该命令会使用用户名和密码 user:password 调用 localhost 的 8080 端口上的“secured”资源。\n\npublic class\
  \ SecuredServlet extends HttpServlet {\n\n@Override\n\nprotected void doGet(HttpServletRequest\
  \ req, HttpServletResponse\n\nresp) throws ServletException, IOException {\n\n//\
  \ do something\n\n}\n\n}\n\n要测试此配置，你可以按如下方式使用 curl：\n\n$ curl -v http://localhost:8080/secured\n\
  \n服务器将返回 401 未授权状态码，以及如下所示的 WWW-Authenticate 标头：\n\nHTTP/1.1 401 Unauthorized\n\n\
  WWW-Authenticate: Basic realm=\"default\"\n\n然后客户端可以在 Authorization 标头中携带相应凭据，重新发送请求，如下所示：\n\
  \n$ curl -v -u user:password http://localhost:8080/secured\n\n第 8 章 MiCroprofile\
  \ JSoN Web tokeNS aNd Jakarta SeCurity\n\n然后服务器将返回所请求的资源：\n\nHTTP/1.1 200 OK\n\n\
  Content-Type: text/plain\n\n这是一个受保护资源。\n\n要使用 Jakarta Security 保护一个 servlet，你需要在\
  \ web.xml 文件中添加以下代码行：\n\n<security-constraint>\n\n<web-resource-collection>\n\n\
  <web-resource-name>secured</web-resource-name>\n\n<url-pattern>/*</url-pattern>\n\
  \n</web-resource-collection>\n\n<auth-constraint>\n\n<role-name>admin</role-name>\n\
  \n</auth-constraint>\n\n</security-constraint>\n\n<login-config>\n\n<auth-method>FORM</auth-method>\n\
  \n<form-login-config>\n\n<form-login-page>/login.jsp</form-login-page>\n\n<form-error-page>/error.jsp</form-error-page>\n\
  \n</form-login-config>\n\n</login-config>\n\n<security-role>\n\n<role-name>admin</role-name>\n\
  \n</security-role>\n\n在这段代码中，`<security-constraint>` 元素定义了一个安全约束，\n\n该约束适用于 Web\
  \ 应用中的所有资源。`<auth-constraint>` 元素指定只有具有 admin 角色的用户才能访问受保护资源。`<login- config>` 元素指定将使用基于表单的身份验证。`<form-\
  \ login- config>` 元素指定了基于表单身份验证过程中使用的登录页和错误页。最后，`<security-role>` 元素定义了 admin 角色。\n\
  \n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n要在 RESTful Web 服务中使用摘要认证（digest\
