  <login-config>\n\n<auth-method>DIGEST</auth-method>\n\n<realm-name>default</realm-name>\n\
  \n</login-config>\n\n**MicroProfile REST 客户端**\n\nMicroProfile REST Client 是一个规范，它定义了一组用于构建\
  \ REST 客户端的 API 和注解。它提供了一种类型安全的方式来调用 RESTful 服务。本节将向你展示如何构建一个简单的 MicroProfile REST\
  \ Client，并使用它访问远程服务。它还演示了如何使用客户端 API 调用不同的 HTTP\n\n方法，例如 GET、POST、PUT 和 DELETE。\n\
  \nMicroProfile REST Client 是一个 Eclipse 项目，为 Java 应用程序提供可移植的 RESTful\n\n客户端 API。要查看更多关于该项目的详细信息，请参阅\
  \ [https://](https://github.com/eclipse/microprofile-rest-client)\n\n[github.com/eclipse/microprofile-rest-client.\
  \ T](https://github.com/eclipse/microprofile-rest-client)该项目旨在让你能够轻松编写可移植且可复用的代码，以便无论底层技术或平台如何，都能访问\
  \ RESTful 服务。\n\n如果你使用 Maven 构建应用程序，请将以下依赖添加到你的 pom.xml 文件中。MicroProfile REST Client\
  \ 已包含在 MicroProfile 依赖中。要了解更多关于 MicroProfile 项目的信息，请访问其官方网站 [`microprofile.io/.`](https://microprofile.io/)\n\
  \n<dependency>\n\n<groupId>org.eclipse.microprofile</groupId>\n\n<artifactId>microprofile</artifactId>\n\
  \n<version>5.0</version>\n\n<type>pom</type>\n\n<scope>provided</scope>\n\n</dependency>\n\
  \n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n或者你也可以专门使用 REST 客户端依赖，如下所示：\n\
  \n<dependency>\n\n\n\n<groupId>org.eclipse.microprofile.rest-client</groupId>\n\n\
  <artifactId>microprofile-rest-client-api</artifactId>\n\n<version>1.4</version>\n\
  \n<scope>provided</scope>\n\n</dependency>\n\n以下是在 Open Liberty 中启用 REST 客户端功能的\
  \ server.xml 配置：\n\n<featureManager>\n\n<feature>mpRestClient-3.0</feature>\n\n\
  </featureManager>\n\n**@RegisterClient 注解**\n\n第一步是使用 @RegisterRestClient 注解你的客户端接口。\n\
  \n该注解会将客户端注册到 MicroProfile REST Client\n\n服务中。该注解的 value 属性用于指定目标服务的基础 URI：\n\n\
  @RegisterRestClient\n\n(configKey = \"systemClient\"\n\nbaseUri=\"http://localhost:9080/api/products\"\
  )\n\npublic interface ProductsClient implements Autoclosable{\n\n// 方法写在这里\n\n}\n\
  \n**配置你的 REST 客户端**\n\n要使用 MicroProfile Config 配置 URI，你需要在项目中添加一个名为 src/\n\nmain/webapp/META-INF/microprofile-config.properties\
  \ 的配置文件。该文件\n\n包含配置键值对。此示例将基础 URI 配置为 http://localhost:8080/api/products。你也可以使用\
  \ Config 文件配置其他客户端属性，例如 followRedirects 和 connectTimeout：\n\nsystemClient/mp-rest/uri=http://localhost:9080/system\n\
  \n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n**REST 客户端接口**\n\n\
  下面是 REST 客户端接口示例：\n\n@RegisterRestClient\n\n(configKey = \"systemClient\"\n\nbaseUri=\"\
  http://localhost:9080/api/products\")\n\n@RegisterProvider(UnknownUriExceptionMapper.class)\n\
  \n@Path(\"/products\")\n\n@Produces(\"application/json\")\n\n@Consumes(\"application/json\"\
  )\n\npublic interface ProductsClient implements AutoClosable{\n\n@GET\n\nList<User>\
  \ getProducts();\n\n@GET\n\n@Path(\"/{productId}\")\n\nProduct getProduct(@PathParam(\"\
  productId\") String productId);\n\n@POST\n\nResponse createProduct(@HeaderParam(\"\
  Authorization\") String\n\nauthorization,\n\nProduct product);\n\n@PUT\n\n@Path(\"\
  /{productId}\")\n\nResponse updateProduct(@BeanParam PutProduct putProduct, Product\n\
  \nproduct);\n\n@DELETE\n\n@Path(\"/{productId}\")\n\nResponse deleteProduct(@CookieParam(\"\
  AuthToken\") String\n\nauthorization,\n\n@PathParam(\"productId\") String productId);\n\
  \n}\n\n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\npublic class PutProduct\
  \ {\n\n@HeaderParam(\"Authorization\")\n\nprivate String authorization;\n\n@PathParam(\"\
  productId\")\n\nprivate String productId;\n\n// getter、setter、构造函数已省略\n\n}\n\n@RegisterProvider\
  \ 注解会将 ExceptionMapper 注册到\n\nRESTful Web 服务客户端中。它会将 Web 服务客户端抛出的异常映射为 HTTP 状态码。UnknownUriExceptionMapper\
  \ 类将 jakarata.ws.rs.\n\nNotFoundException 异常映射为 404 Not Found 错误。\n\nProductsClient\
  \ 接口使用 @jakarta.ws.rs.Path\n\n注解来定义 REST 端点。@Path 注解为该资源指定相对\n\n路径。该接口中的方法表示可对产品资源执行的操作，例如获取产品列表或获取某个特定产品。\n\
  \n你可以使用 @Consumes\n\n注解指定出站请求的媒体（MIME）类型。\n\n这决定了请求中 Content-Type 头的值。\n\n你还可以使用\
  \ @Produces\n\n注解指定入站响应的媒体类型，\n\n这决定了请求中 Accept 头的值。\n\n默认使用媒体类型 jakarta.ws.rs.core.MediaType.APPLICATION_JSON\n\
  \n(\"application/json\")。除非你显式将媒体类型设置为其他类型（例如 XML），否则 REST 客户端会自动将值序列化为 JSON。\n\n\
  如果你想读写二进制数据，可以使用 byte[] 类型：\n\n// ...\n\n@POST\n\nResponse upload(byte[] data);\n\
  \n@GET\n\nbyte[] download();\n\n}\n\n你可以在方法上使用 @PathParam 注解指定路径参数。例如，\n\n下面这个方法会检索具有给定\
  \ ID 的产品：\n\n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n// ...\n\
  \n@GET\n\nProduct getProduct(@PathParam(\"productId\") String productId);\n\n\n\n\
  GetProduct 方法用于获取一个产品。它将产品 ID 作为路径参数。\n\ncreateProduct 方法用于创建一个新产品。它接收两项内容：授权字符串和产品本身。@HeaderParam(\"\
  Authorization\") 注解告诉 REST 客户端，应从 HTTP 请求头中获取授权字符串。产品以 POJO 对象的形式传入，在发送到服务器之前会被转换为\
  \ JSON 字符串。\n\ndeleteProduct 方法用于从数据库中删除一个现有产品。它接收两项内容：用于身份验证的 AuthToken Cookie，以及产品\
  \ ID。\n\nupdateProduct 方法用于更新一个现有产品。它接收 PutProduct 对象（包含产品 ID 和授权字符串）以及 Product\
  \ 对象（包含更新后的产品信息）。\n\n@RestClient 注解用于将字段或方法标记为 MicroProfile REST 客户端。注入 REST 客户端与注入其他\
  \ CDI Bean 类似，例如：\n\nimport org.eclipse.microprofile.rest.client.inject.RestClient;\n\
  \nimport jakarta.inject.Inject;\n\nimport jakarta.ws.rs.GET;\n\nimport jakarta.ws.rs.Path;\n\
  \nimport jakarta.ws.rs.PathParam;\n\npublic class GreetingService {\n\nprivate final\
  \ GreetingClient greetingClient;\n\npublic GreetingService() {\n\n// 构造函数注入\n\n\
  this.greetingClient = RestClientBuilder.newBuilder()\n\n.baseUri(\"http://localhost:8080\"\
  )\n\n.build(GreetingClient.class);\n\n}\n\nChapter 8 MiCroprofile JSoN Web tokeNS\
  \ aNd Jakarta SeCurity\n\npublic String getGreeting() {\n\nreturn greetingClient.getGreeting();\n\
  \n}\n\n}\n\ninterface GreetingClient {\n\n@GET\n\n@Path(\"/greeting/{name}\")\n\n\
  String getGreeting(@PathParam(\"name\") String name);\n\n}\n\n在这个示例中，GreetingClient\
  \ 接口使用 @RestClient 注解标注，并用于调用远程 REST 服务。\n\nGreetingService 类注入了 GreetingClient\
  \ 的一个实例，并使用它来调用远程 REST 服务。\n\nRestClientBuilder 可用于配置注入的 REST 客户端。在此示例中，配置了 REST\
  \ 服务的基础 URI。还可以配置的其他选项包括：\n\n–\n\n注册提供程序，例如支持 JSON-B 或 Jackson\n\n–\n\n配置超时\n\n\
  –\n\n配置 SSL\n\n–\n\n配置代理\n\n更多信息请参见 MicroProfile REST Client 文档。\n\nMicroProfile\
  \ REST Client 规范定义了一个用于调用 RESTful 服务的 Java API。该 API 与 JAX-RS 2.0 Client API 类似，但提供了一些\
  \ MicroProfile 特有的附加功能。\n\nMicroProfile REST Client 的主要优势是它允许你在无需编写样板代码的情况下调用 REST\
  \ 服务。这可以让你的代码更简洁、更易读。\n\n另一个优势是，MicroProfile REST Client 定义了一种可移植的方式，用于配置客户端的创建方式以及其调用\
  \ REST 服务的方式。这意味着你可以将应用部署在任何 MicroProfile 运行时上，并且它能够与任何兼容的 REST 客户端实现一起工作。\n\nChapter\
  \ 8 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n**使用 MicroProfile OpenAPI\
  \ 编写 RESTful API 文档**\n\n在本节中，你将学习如何使用 MicroProfile OpenAPI 注解为 REST API 编写文档。你还将学习如何使用\
  \ OpenAPI UI 查看文档。\n\n**什么是 OpenAPI 规范？**\n\nOpenAPI 规范（OAS）为 RESTful API 定义了一个标准的、与语言无关的接口。这使得第三方工具可以基于\
  \ OAS 轻松生成文档、客户端库和其他工具。它之前被称为 Swagger。\n\nOpenAPI 规范由 OpenAPI Initiative 维护，该组织是由行业专家组成的联盟，致力于标准化\
  \ REST API 的描述方式。\n\n**什么是 MicroProfile OpenAPI？**\n\nMicroProfile OpenAPI 计划旨在引入\
  \ OpenAPI 的优势\n\n\n\n基于 MicroProfile 平台构建的微服务规范。它是一个构建在 OpenAPI 规范之上的规范，并增加了 MicroProfile\
  \ 倡议特有的能力。\n\nMicroProfile OpenAPI 提供了可用于生成 RESTful API 文档的工具和 API。该文档可供开发者用于理解\
  \ API 并生成客户端代码。MicroProfile OpenAPI 规范定义了一种用于记录 RESTful API 的标准格式。\n\n**使用 MicroProfile\
  \ OpenAPI 为 REST API 编写文档**\n\n要使用 MicroProfile OpenAPI 为 JAX-RS REST API 编写文档，你需要使用\
  \ OpenAPI 注解来标注 JAX-RS 资源类和方法。OpenAPI 注解用于配置 JAX-RS 资源的文档。\n\n首先，你需要在项目中添加 MicroProfile\
  \ OpenAPI 依赖：\n\n<dependency>\n\n<groupId>org.eclipse.microprofile.openapi</groupId>\n\
  \n<artifactId>microprofile-openapi-api</artifactId>\n\n<version>1.0.0</version>\n\
  \n</dependency>\n\n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n接下来，你需要配置\
  \ OpenAPI 文档。这可以通过使用 @OpenAPIDefinition 注解来完成：\n\nimport jakarta.ws.rs.GET;\n\n\
  import jakarta.ws.rs.Path;\n\nimport org.eclipse.microprofile.openapi.annotations.Operation;\n\
  \nimport org.eclipse.microprofile.openapi.annotations.tags.Tag;\n\nimport org.eclipse.microprofile.openapi.annotations.OpenAPIDefinition;\n\
  \nimport org.eclipse.microprofile.openapi.annotations.info.Info;\n\nimport org.eclipse.microprofile.openapi.annotations.servers.Server;\n\
  \n@OpenAPIDefinition(\n\ninfo = @Info(\n\ntitle = \"Products API\",\n\nversion =\
  \ \"1.0.0\",\n\ndescription = \"This is Products API.\"\n\n),\n\nservers = {\n\n\
  @Server(url = \"/api\")\n\n}\n\n)\n\n@Path(\"/greeting\")\n\npublic class GreetingResource\
  \ {\n\n@GET\n\n@Operation(summary = \"Say hello\", tags = {\"greeting\"})\n\npublic\
  \ String sayHello() {\n\nreturn \"Hello\";\n\n}\n\n}\n\n@OpenAPIDefinition 注解用于配置\
  \ API 的整体文档。@Info 注解用于配置 API 的相关信息，例如标题、版本和描述。@Server 注解用于配置 API 服务器的 URL。\n\n第\
  \ 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n这个示例使用 @Operation 注解标注了\
  \ sayHello() 方法。该注解用于配置操作的信息，例如摘要和标签。标签可用于对相关操作进行分组。\n\nMicroProfile OpenAPI 实现将基于这些注解为\
  \ API 生成文档。生成的文档将采用 OpenAPI 格式。\n\n表 8-1 列出了 MicroProfile OpenAPI 规范提供的常用注解。\n\n\
  ***表 8-1。** MicroProfile OpenAPI 规范中的注解*\n\n**注解**\n\n**描述**\n\n@OpenAPIDefinition\
  \ 指定 API 的常规信息，例如标题、版本等。\n\n@Operation\n\n指定单个 API 操作的信息，例如摘要、标签等。\n\n@Schema\n\n\
  指定属性数据类型的信息。\n\n@ParameterIn\n\n指定请求参数的位置，例如 QUERY、PATH 等。\n\n@Callback\n\n为异步操作指定回调\
  \ URL。\n\n@Callbacks\n\n指定多个 @Callback 注解。\n\n**查看生成的文档**\n\n要查看生成的文档，你可以使用 OpenAPI\
  \ UI 工具。OpenAPI UI 是一个基于 Web 的工具，可用于查看 REST API 的文档。\n\n可以通过以下 URL 访问 OpenAPI UI\
  \ 工具：\n\nhttp://localhost:8080/openapi/\n\n/openapi 端点获取由源代码注解中的注释生成的 OpenAPI 规范信息。它以\
  \ YAML 格式返回信息。\n\n第 8 章 MiCroprofile JSoN Web tokeNS aNd Jakarta SeCurity\n\n**总结**\n\
  \n在本章中，你学习了如何使用 MicroProfile JWT Auth 规范来验证 JWT 的签名。你还学习了如何配置应用程序以使用 JWK Set 或 PEM\
  \ 编码的公钥。在下一章中，你将学习\n\n\n\n使用 Docker 和 Kubernetes 对你的应用程序进行容器化，以管理部署。\n\n**第 9 章**\n\
  \n**使用 Kubernetes**\n\n**对微服务进行**\n\n**容器化**\n\n本章将解释如何使用 Docker 和 Kubernetes 对你的微服务进行容器化。\n\
  \n你将首先了解什么是容器，以及为什么应该使用容器。\n\n接着你将学习如何安装 Docker 和 Kubernetes。最后，你将学习如何使用 Docker\
  \ 和 Kubernetes 将微服务部署到容器中。\n\n**什么是容器？**\n\n容器是一种软件打包方式，使其能够在同一主机上与其他软件隔离运行。这不同于虚拟化，在虚拟化中，每个客户操作系统都有自己的内核，并在其隔离环境中运行。\n\
  \n对微服务进行容器化，是提升系统整体可靠性与弹性的绝佳方式。容器允许你将微服务及其所有依赖打包为一个单一单元。这使得微服务的部署和管理更加容易。\n\n**为什么使用容器？**\n\
  \n使用容器的原因有很多，主要如下：\n\n© Tarun Telang 2023\n\nT. Telang，*《Beginning Cloud Native\
  \ Development with MicroProfile, Jakarta EE, and Kubernetes》*，\n\n[`doi.org/10.1007/978-1-4842-8832-0_9`](https://doi.org/10.1007/978-1-4842-8832-0_9#DOI)\n\
  \n第 9 章 使用 Kubernetes 对微服务进行容器化\n\n• **可移植性：** 容器可以轻松地从一台主机迁移到另一台主机。这是因为它们不依赖于主机操作系统。\n\
  \n• **隔离性：** 容器彼此之间以及与主机操作系统相互隔离。如果一个容器崩溃，不会影响其他容器。\n\n• **高效性：** 容器比虚拟机使用更少的资源。这是因为每个容器共享主机操作系统内核。\n\
  \n**什么是容器编排？**\n\n容器编排是指对容器化应用的部署、管理和扩缩容进行自动化的过程。最流行的容器编排工具是 Kubernetes。\n\nKubernetes\
  \ 是一个用于自动化部署、扩缩容和管理容器化应用的开源系统。它最初由 Google 设计，现在由云原生计算基金会（Cloud Native Computing\
  \ Foundation）维护。Kubernetes 是一个可移植、可扩展、开源的平台，用于管理容器化工作负载和服务，并支持声明式配置与自动化。它拥有庞大且快速增长的生态系统。Kubernetes\
  \ 的服务、支持和工具都已广泛可用。\n\n**使用容器编排的好处**\n\n使用容器编排有很多好处，以下是主要优势：\n\n• **提升效率：** 容器编排工具可以通过自动化管理大量容器所需的许多任务，提升你的工作流效率。\n\
  \n• **增强灵活性：** 容器编排工具可以让你更容易在各种环境中部署和管理应用程序。\n\n第 9 章 使用 Kubernetes 对微服务进行容器化\n\n\
  • **改进可扩展性：** 容器编排工具可以通过按需轻松添加或移除容器，提升应用程序的可扩展性。\n\n• **增强安全性：** 容器彼此之间以及与主机操作系统相互隔离，这使恶意行为者更难访问你的数据或感染你的系统。\n\
  \n• **降低成本：** 容器通过使用更少资源，帮助你降低应用运行成本。\n\n• **更易调试：** 容器编排工具通过提供系统中所有容器的统一视图，使应用问题调试更容易。\n\
  \n**理解 Kubernetes 术语**\n\n在你深入学习并开始使用 Kubernetes 管理容器之前，你应当先熟悉一些与 Kubernetes 相关的重要术语。\n\
  \n**Pod**：由一个或多个容器组成的一组单元，共享存储/网络，并且一个\n\n\n\n用于说明如何运行容器的规范。Pod 表示一个部署单元；即你希望作为一个组在\
  \ Kubernetes 节点上运行的单个应用容器，或一组共置（协同放置）的容器。\n\n**Kubelet**：kubelet 是运行在每个工作节点上的一个进程，用于管理\n\
  \n节点上的 Pod。kubelet 会确保 Pod 处于运行且健康的状态。它还会与主节点通信，以协调应用在\n\n各节点上的部署。\n\n**Node：**\
  \ Kubernetes 中的工作机器；是集群的一部分。根据集群环境不同，节点可以是 VM，也可以是物理机（裸金属）。每个节点都会运行 Kubernetes\n\
  \n代理，并由主控组件进行管理。\n\n**Worker node：** 运行你的应用程序和云服务。工作节点承载 Pod，并运行这些 Pod 中的容器。每个工作节点上都运行有\
  \ kubelet 和 kube-proxy。\n\n• *kubelet* 负责在\n\n节点上运行和管理 Pod。\n\n第 9 章 使用 Kubernetes\
  \ 容器化微服务\n\n• *kube-proxy* 是运行在每个工作节点上的一个进程，\n\n负责管理该节点上服务的网络。它负责\n\n该节点上服务的网络与负载均衡。kube-\n\
  \nproxy 确保流向服务的流量被正确路由。\n\n**Control plane node：** 运行 Kubernetes 控制平面组件，包括 API server、scheduler\
  \ 和 controller manager。一个集群中只有一个控制平面节点。你不会在控制平面节点上运行用户提供的应用程序。\n\n**Master node：**\
  \ 运行 Kubernetes 主控组件的节点。一个 Kubernetes 集群只有一个主节点。主节点用于管理 Kubernetes\n\n集群。主节点上运行着多个进程，包括\
  \ kube-\n\napiserver、kube-controller-manager 和 kube-scheduler。\n\n• *kube-apiserver*\
  \ 提供 Kubernetes API。kubelet 使用它\n\n与主节点进行通信。\n\n• *kube-controller-manager* 管理副本控制器\n\
  \n和服务。它负责确保在集群中运行的应用程序\n\n维持期望状态。\n\n• *kube-scheduler* 将 Pod 调度到节点上运行。它负责\n\n确保集群中的应用在各节点间实现\n\
  \n负载均衡。\n\n**Kubernetes cluster：** 一组用于运行容器化\n\n应用程序的机器，称为节点（nodes）。\n\n**Service**：一个向网络暴露以提供流量服务的\
  \ Pod。当你创建服务时，Kubernetes 会创建对应的负载均衡器，将流量路由到你的 Pod。\n\n**Replication controller：**\
  \ 副本控制器可确保在任意时刻都有指定数量的 Pod 副本在运行。如果副本过少，控制器会创建更多副本；如果副本过多，控制器会删除多余副本。副本控制器的典型使用场景是确保始终有指定数量的\
  \ Web 服务器在运行。\n\n**Labels：** 附加到对象（如 Pod）上的键/值对。标签使用户能够组织并选择一组对象。\n\n**Annotations：**\
  \ 附加到对象（如 Pod）上的键/值对。注解不会影响对象的身份标识，但可用于存储任意数据，以用于文档说明或其他用途。\n\n第 9 章 使用 Kubernetes\
  \ 容器化微服务\n\n**Kubernetes 的关键特性**\n\nKubernetes 是当今部署容器化应用程序的热门选择。它提供了许多特性，例如：\n\n\
  • **自动部署：** 当代码库发生变化时，Kubernetes 可以自动部署你的\n\n应用程序，并可在必要时回滚\n\n部署。\n\n• **存储编排：**\
  \ Kubernetes 可以自动为应用\n\n配置存储，并支持多种存储后端。它可以\n\n自动挂载存储系统，例如本地存储、公有\n\n云提供商等。\n\n•\
  \ **滚动更新：** Kubernetes 可以对\n\n应用程序执行滚动更新，这意味着它可以一次更新一个节点上的应用，\n\n且不会中断服务。它会发布应用的新版本，\n\
  \n同时确保零停机。\n\n• **自动装箱（bin-packing）：** Kubernetes 会自动将\n\n容器调度到集群节点上，以高效利用可用资源。\n\
  \n• **监控：** Kubernetes 可以生成详细日志和监控\n\n数据，覆盖系统各个方面，可用于排查\n\n问题或优化性能。\n\n• **健康检查：**\
  \ Kubernetes 可以对\n\n应用执行健康检查，以确保其按预期运行，并可在必要时\n\n重启或替换不健康组件。\n\n• **自愈能力：** 如果 Kubernetes\
  \ 集群中的某个节点\n\n发生故障，系统会检测到该故障，并将受影响的 Pod 调度到\n\n其他节点上运行。\n\n• **水平扩缩容：** Kubernetes\
  \ 让你可以轻松地\n\n根据需要通过增减集群节点来扩展你的\n\n应用程序。\n\n• **自动扩缩容：** Kubernetes 可以根据流量水平自动对应用\n\
  \n进行扩容或缩容，也可以对应用中的单个\n\n组件分别扩缩容。\n\n第 9 章 使用 Kubernetes 容器化微服务\n\n• **负载分发：** Kubernetes\
  \ 可以在\n\n集群中的不同节点之间分发负载，并根据可用资源自动调度应用\n\n在特定节点上运行。\n\n• **服务发现与负载均衡：** Kubernetes\
  \ 会自动\n\n为集群中的每个 Pod 分配唯一 IP 地址，并可在它们之间进行负载\n\n均衡流量分发。\n\n• **密钥与配置管理**：借助 secrets，Kubernetes\n\
  \n可以存储和管理敏感信息，例如密码和\n\nAPI 密钥。配置数据可以存储在 config maps 中。\n\n**使用 Kubernetes**\n\n\
  Kubernetes 可通过多种方式用于大规模管理容器化应用。最常见的方式是使用公有\n\n云提供商的托管 Kubernetes 服务，例如 Google Kubernetes\
  \ Engine（GKE）或 Amazon Elastic Container\n\nService for Kubernetes（EKS）。这些服务会处理所有基础设施\n\
  \n管理任务，例如节点配置、Kubernetes 部署等。\n\n另一种选择是使用诸如 *kubeadm* 之类的工具来安装和管理 Kubernetes。\n\n\
  如果你希望对基础设施有更多控制，或者你正在私有数据中心运行 Kubernetes，这会是一个不错的选择。\n\nKubernetes 也可以用于管理非容器化应用。这通常通过创建所谓的“裸金属”集群来实现，这类集群可用于部署和管理\n\
  \nVM，甚至是物理服务器。\n\n当 Kubernetes 启动并运行后，你可以通过多种方法使用它来部署应用。\n\n最常见的方法是使用容器镜像，这些镜像可以从\
  \ Docker Hub 等公共镜像仓库\n\n或私有仓库中拉取。你也可以使用 Kubernetes 借助 Jenkins 等构建工具直接部署源代码。\n\n\
  Kubernetes 也常与其他工具配合使用，例如用于监控的 Pr[ometheus (https://](https://prometheus.io/)\n\n\
  [prometheus.io/) for monit](https://prometheus.io/)oring、用于服务网格的 Is[tio (https://istio.io/](https://istio.io/))，以及用于包管理的\
  \ Helm（[`helm.sh/) for p`](https://helm.sh/)ackage management。\n\n第 9 章 使用 Kubernetes\
  \ 容器化微服务\n\n**使用 Docker 容器**\n\n首先，确保你的系统已安装 Docker。要将一个\n\n应用容器化，你需要创建一个 Dockerfile。Dockerfile\
  \ 是一个文本文件，包含用于构建和运行容器的命令。在 Dockerfile 中，你需要指定希望用于容器的基础镜像，以及用于构建和运行应用程序的命令。\n\n基础镜像是可用于创建新镜像的预构建镜像。例如，如果你想为\
  \ Open Liberty Server 创建镜像，你可以使用\n\n一个已安装并配置 Java 运行时与 Open Liberty 服务器的基础镜像。\n\n\
  \n\n这样可以避免你必须在镜像中安装 Open Liberty。可用的基础镜像有很多种，你甚至可以创建自己的基础镜像。为了找到符合你需求的基础镜像，你可以在\
  \ Docker Hub 仓库中进行搜索。选定基础镜像后，你必须创建一个 Dockerfile。\n\nDockerfile 的内容如下：\n\nFROM open-liberty\n\
  \nARG VERSION=1.0\n\nARG REVISION=SNAPSHOT\n\nLABEL \\\n\norg.opencontainers.image.authors=\"\
  Tarun Telang\" \\ name=\"demo\" \\ version=\"$VERSION-$REVISION\" \\\n\nsummary=\"\
  A sample microservice.\" \\\n\ndescription=\"An image containing a sample microservice\
  \ running with the\n\nOpen Liberty runtime.\" \\\n\nCOPY --chown=1001:0 src/main/liberty/config/\
  \ /config/\n\nCOPY --chown=1001:0 target/*.war /config/apps/\n\nRUN configure.sh\n\
  \n文件中的第一行指定要使用的基础镜像。本示例使用的是\n\nopenliberty/open-liberty 基础镜像。第二行将应用程序的配置文件复制到容器中的\
  \ /config 目录。第三行将应用程序的 WAR 文件复制到 /config/apps 目录。最后一行运行 configure.sh 脚本，该脚本会将配置文件应用到服务器。\n\
  \n第 9 章 使用 Kubernetes 对微服务进行容器化\n\n**在 Docker 中运行 MicroProfile 应用程序**\n\n第一步，在你的项目目录中运行以下命令，以便在项目的\
  \ target 目录中构建一个 .war 文件。\n\n$ mvn package\n\nmvn package 命令会构建一个 .war 文件。生成的 .war\
  \ 文件可以在\n\ntarget 目录中找到。\n\n当项目成功构建后，你应该会看到以下输出：\n\n...\n\n...\n\n[INFO] Building\
  \ war: /home/project/mp-demo/target/product-ws.war\n\n[INFO] --------------------------------------------------------------------\n\
  \n[INFO] BUILD SUCCESS\n\n[INFO] --------------------------------------------------------------------\n\
