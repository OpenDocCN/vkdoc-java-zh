  \nansible\n\nChef\n\n第 2 章 云原生应用开发\n\n**微服务架构**\n\n云原生应用开发的第三阶段是微服务架构。\n\n这一阶段的核心是将你的应用拆分为小型、独立的服务，这些服务可以独立部署和扩展。微服务有许多优势，例如\n\
  \n可扩展性和弹性提升。然而，它们的开发与管理也可能更困难。你将在第 [5](https://doi.org/10.1007/978-1-4842-8832-0_5)\
  \ 章了解更多关于微服务架构的内容。\n\n**容器化**\n\n容器化是将应用打包为容器的过程。容器是虚拟机的轻量级替代方案，允许你将应用及其依赖一并打包。这使得在任何\n\
  \n环境中部署和运行应用都变得容易。可用的容器技术包括 Docker。此外，还有一些基于云的容器服务，例如 Amazon ECS 和 Google\n\nContainer\
  \ Engine。你将在本书后续章节中详细学习容器化技术。\n\n**无服务器计算**\n\n云原生应用开发中的最新趋势之一包括无服务器计算，它使开发者能够在无需担心服务器预配和管理的情况下构建应用。\n\
  \n无服务器函数会响应事件执行，并且只按其运行时长计费。\n\n这使其具有很高的成本效益。可用的无服务器平台有很多，例如 AWS Lambda、Azure Functions\
  \ 和 Google\n\nCloud Function。此外，还有一些无服务器框架，例如 Serverless Framework。你将在第 [5](https://doi.org/10.1007/978-1-4842-8832-0_5)\
  \ 章了解更多关于无服务器计算的内容。\n\n**API 管理**\n\n\n\nAPI 管理的核心是设计、构建和管理 API。API 是一组编程指令，允许软件与其他软件交互。API\
  \ 用于向外部开发者暴露数据和功能。API 管理是云原生应用开发中的关键组成部分。它使你能够控制谁可以访问你的 API，以及他们如何使用它。此外，API 管理还能帮助你监控并排查\
  \ API 问题。目前有许多 API 管理平台\n\n可供使用，例如 Apigee、Kong 和 Amazon API Gateway。你将在本书后续内容中进一步学习\n\
  \n如何构建和部署 REST API。\n\n第 2 章 云原生应用开发\n\n**安全**\n\n这一阶段的重点是确保你的应用是安全的。在开发云原生应用时，你需要关注许多安全问题。\n\
  \n这些问题包括数据泄露、应用漏洞以及拒绝服务攻击。\n\n为了保护你的应用，你需要在每一层实施安全控制。这包括网络层、主机层、应用层和数据层。此外，你还需要部署防火墙、入侵检测系统等安全工具。现有许多安全产品和服务可用，例如\
  \ AWS Identity and Access Management、Azure\n\nActive Directory 和 Google Cloud Identity。\n\
  \n**DevOps 文化转变**\n\n云原生开发要求许多组织在文化上进行转变：从传统瀑布式开发转向更敏捷的 DevOps 方法论。在瀑布式\n\n开发中，变更通常以大批量方式进行且发布频率较低。这可能\n\
  \n导致开发周期长、产品上市速度慢。相比之下，DevOps 更加敏捷，因为它强调开发团队与运维团队之间的协作。\n\n变更以小批量进行并频繁发布，这有助于加快\n\
  \n开发并提升上市速度。\n\n云原生方法还要求改变应用的设计与构建方式。\n\n在传统应用开发中，应用通常是单体结构，所有组件紧密耦合。这会使应用扩展和新增功能变得困难。相比之下，云原生应用以微服务方式设计，每个组件都可以独立部署。这使得应用扩展更容易，\n\
  \n并且更便于添加新功能。它也要求团队组织方式发生变化。在传统应用开发中，团队通常是孤岛式的，每个团队都在\n\n相互隔离的状态下工作。当团队需要协调工作时，这会导致延迟和错误。\n\
  \n相比之下，云原生开发团队更具跨职能特征，并且彼此紧密协作。这有助于加快开发并提升代码质量。总体而言，云原生方法要求在文化、方法论和技术上进行转变。对许多组织来说，这是一次重大变革，但其收益十分明确。云原生应用比传统应用更具可扩展性、韧性和敏捷性。它们也更易于开发和部署。\n\
  \n第 2 章 云原生应用开发\n\n**可观测性**\n\n可观测性是一种监控系统的实践方式，使你能够在问题发生时进行\n\n检测与诊断。可观测性的目标是提供系统各方面的可见性，从而在问题影响客户之前识别并修复问题。这意味着不仅要监控系统健康状态，还要跟踪对系统所做的变更、理解用户如何与系统交互等。要做到这一点，你必须对系统本身和运行环境都有深入理解。\n\
  \n理解可观测性与监控之间的区别至关重要。\n\n监控是收集系统数据并利用这些数据生成报告的过程。这些数据可用于识别问题，但不能用于诊断问题。而可观测性则使你能够实时检测并诊断问题。这是因为可观测性使用来自系统各层的数据，而不仅仅是应用层。实现可观测性的方法有很多（见图\
  \ 2-3），其中最常见的方法包括日志、追踪和指标。\n\n• **日志（Logging）：** 日志是收集并存储\n\n系统中已发生事件信息的过程。这些数据可用于\n\
  \n故障排查或定位问题。\n\n• **追踪（Tracing）：** 追踪是一种可让你跟随请求\n\n在系统中流转路径的技术。这对于\n\n理解系统工作方式和诊断问题非常有用。\n\
  \n• **指标（Metrics）：** 指标是可用于衡量\n\n系统各方面的数值。你可以使用这些数据来监控\n\n性能并识别趋势。\n\n![](img/index-68_1.jpg)\n\
  \n第 2 章 云原生应用开发\n\n***图 2-3。** 实现可观测性的方法*\n\n可观测性有四个关键组成部分（见图 2-4）。\n\n• **数据采集：**\
  \ 这通常通过日志、追踪和\n\n指标来完成。\n\n• **数据分析：** 这包括使用仪表盘和告警等工具\n\n来暴露问题。\n\n• **告警：** 这可确保在\n\
  \n问题出现时通知到正确的人。\n\n• **修复问题：** 这是你利用已收集的数据\n\n来识别并修复底层问题的阶段。\n\n![](img/index-69_1.jpg)\n\
  \n第 2 章 云原生应用开发\n\n***图 2-4。** 可观测性的组成部分*\n\n**数据采集：** 实现可观测性的第一步是数据采集。你需要从系统的所有层收集数据，包括应用、数据库、网络和基础设施。数据采集的方法有很多。其中最\n\
  \n常见的方法包括日志、追踪和指标。\n\n**数据分析：** 下一步是数据分析。这一步是你利用已收集的数据来提升环境可靠性的阶段。例如，你可以使用数据\n\n\
  分析来生成仪表盘和报告。仪表盘是数据的可视化展示，可用于识别趋势和问题。报告则更为详细。你可以用它们来诊断问题或跟踪一段时间内的进展。你还可以用它们执行以下工作：\n\
  \n• 识别问题根因。通过跟踪你的\n\n系统变更并理解用户如何与其交互，你\n\n可以快速识别任何问题的根本原因。\n\n• 检测趋势和模式。通过在更长时间范围内\n\
  \n分析数据，你可以发现那些在\n\n实时查看数据时可能看不到的趋势和模式。\n\n• 提升监控覆盖范围。通过了解系统中哪些部分\n\n最重要，你可以将监控\n\
  \n精力聚焦在最可能引发问题的区域。\n\n第 2 章 云原生应用开发\n\n**告警：** 下一步是告警，即在检测到问题时发送通知。这一步\n\n要确保在问题出现时通知到正确的人。\n\
  \n这可以通过电子邮件、短信或其他通知系统来实现。制定清晰明确的告警策略非常重要，这样你才能快速识别并修复问题。\n\n**可观测性的最佳实践**\n\n在组织内实现可观测性有若干最佳实践。\n\
  \n1\\. 从系统所有层收集数据——应用、数据库、\n\n网络和基础设施。\n\n2\\. 使用多种数据采集方法——日志、追踪和\n\n指标——以获得对系统最全面的视图。\n\
  \n3\\. 对日志同时使用短期和长期存储。这样可以\n\n让你在更长时间范围内跟踪事件，从而更容易\n\n\n\n用于识别和诊断问题。\n\n4\\. 使用标准化格式。这有助于你在不同工具和系统之间共享数据。\n\
  \n5\\. 实时分析数据。使用仪表板和告警等工具，在问题发生时及时发现它们。\n\n6\\. 及时传达告警。确保在问题出现时通知到正确的人。\n\n7\\.\
  \ 尽可能实现自动化，以减少修复问题所需的时间和精力。\n\n这一阶段的重点是监控你的应用程序并收集其性能数据。可观测性是云原生应用开发中的关键部分。\n\n\
  它使你能够识别并诊断应用程序中的问题。此外，可观测性还可以帮助你从源头上预防问题发生。市面上有许多不同的可观测性工具和服务。表 2-4 列出了较为流行的工具。\n\
