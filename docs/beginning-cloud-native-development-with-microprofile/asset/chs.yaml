  \n**总结**\n\n云原生应用是专门为充分利用云而设计的。它们具有一些区别于传统应用的特征，包括以下几点：\n\n• 它们具备可移植性，可以在任何云平台上运行。\n\
  \n• 它们具备自给自足能力，可以在不依赖特定环境或基础设施的情况下部署。\n\n• 它们是模块化的，可以拆分为更小的组件，以便于管理和扩展。\n\n第 2 章\
  \ 云原生应用开发\n\n• 它们具备弹性，能够根据需求变化自动扩缩容。\n\n• 它们具备韧性，能够从故障中快速恢复。\n\n与传统应用相比，云原生应用提供了许多优势，包括以下方面：\n\
  \n• **更高的敏捷性与更快的上市时间：** 云原生应用比传统应用部署更快、过程更省事。\n\n• **更低的成本：** 云原生应用通常需要更少的运行资源，因此总体成本更低。\n\
  \n• **更好的可扩展性：** 云原生应用可按需扩展或缩减，更容易应对需求波动。\n\n• **更强的性能：** 由于架构经过优化，云原生应用的性能通常优于传统应用。\n\
  \n然而，开发云原生应用也有一些缺点，包括更高的复杂性。云原生应用开发更复杂，并且需要更多专业能力。尽管开发云原生应用存在一些不足，但在大多数情况下，其优势远远大于劣势。你还了解了以下各阶段\n\
  \n\n\n云原生应用开发。这些包括持续集成/持续交付（CI/CD）、微服务架构、容器化、无服务器计算、API 管理、安全等。\n\n云原生应用开发是一个多阶段过程。每个阶段都很重要，都需要得到应有的重视。\n\
  \n• **持续集成/持续交付（CI/CD）：** 在这一阶段，开发人员将代码更改集成到中央代码仓库中，然后将其部署到测试环境进行验证。通过验证流程的更改随后会被推进到生产环境。该过程是持续进行的，因此新的更改会不断被创建并测试。\n\
  \n• **基础设施即代码：** 在这一阶段，所有基础设施都通过代码来定义和配置。这带来了更高的灵活性，以及更容易复现环境的能力。\n\n第 2 章 云原生应用开发\n\
  \n• **微服务架构：** 在这一阶段，应用会被拆分为称为微服务的更小组件。每个微服务负责一个特定任务，并且可以独立于其他微服务进行部署。这使应用更具可扩展性和弹性。\n\
  \n• **容器化：** 在这一阶段，微服务会被打包进容器以便部署。容器使微服务无需修改即可在任何平台上运行，并让其管理和扩展更加容易。\n\n• **无服务器计算：**\
  \ 在这一阶段，应用运行在“无服务器”环境中，由第三方管理服务器。这消除了管理服务器或基础设施的需求，并使应用能够按需更轻松地扩展。\n\n• **API 管理：**\
  \ 在这一阶段，支撑应用的 API 会被创建和管理。这有助于确保它们安全可靠，并且可以被客户端轻松访问。\n\n• **安全：** 在这一阶段，安全机制会贯穿应用的整个生命周期。这包括身份认证、授权和数据加密等措施。\n\
  \n• **DevOps 文化转型：** DevOps 文化转型是成功开发和部署云原生应用的必要条件。DevOps 的核心是开发人员与运维人员之间的协作。它有助于自动化软件开发流程，并改善团队之间的沟通。此外，DevOps\
  \ 还有助于提升交付速度并提高质量。\n\n• **可观测性（监控与日志）：** 在这一阶段，会对应用性能进行监控和日志记录。这有助于识别问题并进行故障诊断。\n\
  \n云原生应用开发过程是迭代式的，因此这些阶段不一定按顺序完成。不过，它们确实代表了一个云原生应用从初始开发到生产环境的典型演进路径。现在你已经了解了云原生应用开发的基础，可以开始开发你自己的应用了。在本书后续内容中，你将通过构建一个云原生应用把所学知识付诸实践。在下一章中，你将学习如何搭建开发环境。\n\
  \n**第 3 章**\n\n**搭建你的**\n\n**开发环境**\n\n要开发云原生应用，你需要一个开发环境。\n\n开发环境包括一组用于编写、编译、测试和运行代码的工具与软件。搭建开发环境看起来可能令人生畏，但只要有正确的指导，这件事也可以简单直接。\n\
  \n本章将向你展示如何为基于 Java 的云原生应用搭建开发环境。其中包含开始使用开发环境所需工具的详细安装与配置步骤。内容涵盖 Java Development\
  \ Kit（JDK）、Maven、Git、Docker 和 Kubernetes 的前置条件与安装说明。此外，还将讨论使用 Docker 和 Kubernetes\
  \ 的优势。\n\n**前置条件**\n\n开发云原生 Java 应用的硬件要求非常\n\n\n\n要求较低。总体而言，大多数现代笔记本电脑和台式机都能满足这些要求。以下部分列出了搭建你的开发环境所推荐的硬件要求。\n\
  \n**硬件要求**\n\n要开发云原生 Java 应用程序，你需要以下硬件：\n\n**CPU：** 开发云原生 Java 应用程序对 CPU 的要求并不高。不过，如果你使用具有多个核心的高端\
  \ CPU，将获得更好的性能。\n\n© Tarun Telang 2023\n\nT. Telang，*Beginning Cloud Native Development\
  \ with MicroProfile, Jakarta EE, and Kubernetes*，\n\n[`doi.org/10.1007/978-1-4842-8832-0_3`](https://doi.org/10.1007/978-1-4842-8832-0_3#DOI)\n\
  \n第 3 章 搭建你的开发环境\n\n**内存：** 4GB RAM 或更高\n\n**硬盘空间：** 至少 50GB 可用磁盘空间\n\n**操作系统**\n\
  \n开发云原生 Java 应用程序对操作系统的要求也不高。你可以使用以下任一操作系统：\n\n• Windows 10 或更高版本\n\n• macOS 10.13\
  \ 或更高版本\n\n• Linux：Ubuntu 18.04 或更高版本，Fedora 28 或更高版本\n\n如果你不确定自己电脑的系统架构，可以使用以下命令进行判断。\n\
  \n在 Linux 或 macOS 中，你可以运行以下命令来查看系统架构：\n\nuname -m\n\n该命令的输出将显示你的系统架构。例如，在 64 位系统上，你会看到如下输出：\n\
  \nx86_64\n\n对于 Windows，请使用以下命令：\n\necho %PROCESSOR_ARCHITECTURE%\n\n**软件依赖**\n\n\
  除了硬件要求外，在开始开发云原生 Java 应用程序之前，你还需要安装一些软件依赖。这些依赖包括：\n\n• **JDK 17 或更高版本：** 你可以从 Oracle\
  \ 网站下载最新的 JDK [（www.oracle.com/java/technologies/downloads/）](http://www.oracle.com/java/technologies/downloads/)。\n\
  \n• **Maven：** 你可以从 Apache Maven 官网下载 Maven（[`maven.apache.org/`](https://maven.apache.org/)）。\n\
  \n• **Git：** 你可以从 Git 官网下载 Git（[`git-scm.com/`](https://git-scm.com/)）。\n\n第 3 章\
  \ 搭建你的开发环境\n\n• **GitHub 账号：** 如果你还没有账号，可以在 GitHub 网站免费创建一个账号（[`github.com/`](https://github.com/)）。\n\
  \n• **Docker：** 你必须下载适用于 Mac 或 Windows 的 Docker Desktop。\n\n• **Docker Hub 账号：**\
  \ 你需要一个 Docker Hub 网站账号。如果你还没有，可以在 Docker Hub 网站创建一个（[`hub.docker.com/`](https://hub.docker.com/)）。\n\
  \n**安装 Java 开发工具包（JDK）**\n\nJava 开发工具包（JDK）是用于开发 Java 应用程序的软件开发环境。它包含运行 Java 应用程序所需的\
  \ Java 运行时环境（JRE），以及将 Java 源代码编译为字节码所用的 Java 编译器。\n\n在安装 JDK 之前，你需要检查系统中是否已安装。为此，请打开终端窗口并输入以下命令：\n\
  \njava -version\n\n如果系统中已安装 JDK，你应当会看到类似如下输出：\n\njava version \"17.0.1\" 2021-10-19\
  \ LTS\n\nJava(TM) SE Runtime Environment (build 17.0.1+12-LTS-jvmci-21.3-b05)\n\n\
  Java HotSpot(TM) 64-Bit Server VM (build 17.0.1+12-LTS-jvmci-21.3-b05,\n\nmixed\
  \ mode, sharing)\n\n如果你看到上述输出，说明系统中已安装 JDK，你可以跳到下一节。\n\n如果你的系统尚未安装 JDK，请按照以下步骤安装：\n\
  \n1\\. 从 Oracle 网站下载 JDK 17 或更高版本（[`www.oracle.com/java/technologies/downloads/`](https://www.oracle.com/java/technologies/downloads/)）。\n\
  \n2\\. 下载完成后，运行下载的安装程序，并按照屏幕上的说明完成安装。\n\n第 3 章 搭建你的开发环境\n\n\n\n`JAVA_HOME` 环境变量用于让\
  \ Java 应用程序确定 JDK 的安装位置。\n\n正确设置此变量非常重要，这样才能确保你的 Java 应用程序正常运行。\n\n适用于 Windows 的\
  \ Oracle JDK 安装程序会自动为你设置 `JAVA_HOME` 环境变量。  \n如果你使用其他 JDK（例如 OpenJDK），则需要手动设置 `JAVA_HOME`\
  \ 环境变量。OpenJDK（Open Java Development Kit）是 Java 平台标准版（Java SE）的一个免费且开源的实现。你可以在 OpenJDK\
  \ 项目网站 openjdk.org 上了解更多详细信息。\n\n要设置 `JAVA_HOME` 环境变量，请打开终端窗口并输入以下命令：\n\nexport\
  \ JAVA_HOME=<path-to-jdk>\n\n其中 `<path-to-jdk>` 是你的 JDK 安装路径。例如，如果你将 JDK 安装在 `/usr/local/jdk`，则输入以下命令：\n\
  \nexport JAVA_HOME=/usr/local/jdk\n\n你可以通过输入以下命令来验证 `JAVA_HOME` 变量是否设置正确：\n\necho\
  \ $JAVA_HOME\n\n如果 `Java_HOME` 变量设置正确，你应该会看到 JDK 的安装路径。\n\n例如：\n\n/usr/local/jdk\n\
  \n安装完成后，运行 `java -version` 命令验证安装结果。\n\n如果你看到了版本信息输出，说明 JDK 已成功安装到你的系统中。\n\n**使用\
  \ Maven**\n\nMaven 是一个用于 Java 应用程序的构建自动化工具。它可管理依赖、编译代码、运行测试，并将代码打包为可部署的构件。构建云原生\
  \ Java 应用程序需要 Maven。附录 A 对 Maven 进行了详细说明。\n\n![](img/index-78_1.png)\n\n第 3 章 搭建你的开发环境\n\
  \n**安装 Maven**\n\n要在你的系统上安装 Maven，请按照以下步骤操作：\n\n1\\. 从 Apache Maven 官方网站下载最新版本的\
  \ Maven  \n[网站（https://maven.apache.org/）](https://maven.apache.org/)。\n\n2\\. 将下载的压缩包解压到你选择的目录。\n\
  \n3\\. 将解压后 Maven 文件夹中的 `bin` 目录添加到你的 `PATH` 环境变量中。\n\n4\\. 运行以下命令验证安装：\n\nmvn -v\n\
  \n你应该会看到类似如下输出：\n\nApache Maven 3.8.5 (3599d3414f046de2324203b78ddcf9b5e4388aa0)\n\
  \nMaven home: /Users/home/apache-maven-3.8.5\n\nJava version: 17.0.1, vendor: Oracle\
  \ Corporation, runtime: /Library/Java/\n\nJavaVirtualMachines/jdk17.0_1.jdk/Contents/Home/jre\n\
  \nDefault locale: en_IN, platform encoding: UTF-8\n\nOS name: \"mac os x\", version:\
  \ \"11.5.1\", arch: \"x86_64\", family: \"mac\"\n\n如果你看到了如图 3-1 所示的输出，说明 Maven 已成功安装到你的系统中。\n\
