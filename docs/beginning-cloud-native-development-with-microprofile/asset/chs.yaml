  \ 9.1\n\n**MicroProfile Version：** 5.0\n\n第 4 章 构建 RESTful Web 服务\n\n选择所需的构建工具。Maven\
  \ 和 Gradle 都受支持。本书使用 Maven；如果你愿意，后续也可以轻松迁移到 Gradle。本示例使用 Java SE 版本 17 和 MicroProfile\
  \ 版本 5.0，因为在撰写本书时，这些是 Open Liberty 支持的最新稳定版本。准备就绪后，点击 Generate Project 按钮下载生成的项目。\n\
  \n**探索项目结构**\n\n你可以解压该项目。其结构应如下所示：\n\nproduct-ws\n\n├── Dockerfile\n\n├── README.txt\n\
  \n├── mvnw\n\n├── mvnw.cmd\n\n├── pom.xml\n\n└── src\n\n└── main\n\n├── java\n\n\
