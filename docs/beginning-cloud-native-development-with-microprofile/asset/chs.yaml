  \ndocker.io/openliberty/open-liberty:latest\n\n现在，既然你已经下载了基础镜像，就可以使用\n\ndocker build\
  \ 命令来构建镜像：\n\n$ docker build -t openliberty-mp-demo:1.0-SNAPSHOT .\n\n这将使用 Dockerfile\
  \ 的内容创建一个名为 openliberty-mp-demo 的镜像。该命令成功完成后，你会看到如下输出：\n\nSending build context\
