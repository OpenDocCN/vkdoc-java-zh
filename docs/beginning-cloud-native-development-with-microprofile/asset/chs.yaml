  \ GitHub 上为“master”创建一个拉取请求：\n\n远程：https://github.com/ttelang/cloud-native-app/pull/new/master\n\
  \n远程：\n\n推送到 https://github.com/ttelang/cloud-native-app.git\n\n* [新分支] master ->\
  \ master\n\n你的项目现已推送到 GitHub 仓库。\n\n**使用 Docker**\n\n如今，几乎所有应用程序都在以某种方式使用容器。\n\n\
  Docker 是一个容器化平台，用于将完整的应用环境打包并运行在小型、隔离且可移植的容器中。使用 Docker 平台，你可以轻松配置和自定义容器，以运行各种操作系统、Web\
  \ 服务器、应用服务器、数据库等等。Docker 让开发者能够非常方便地将应用及其所有库和依赖一起打包，并以一个轻量级的单一包形式发布。随后，这个包可以部署到容器中，并可移植到各种云环境。\n\
  \n**使用 Docker 的优势**\n\nDocker 容器是虚拟机的一种轻量级替代方案，可为应用开发带来诸多好处，包括：\n\n• **隔离性：** 容器将应用彼此隔离，也将其与底层基础设施隔离。这种隔离可以提高安全性，并改善开发、测试和生产环境之间的可复现性。\n\
  \n第 3 章 搭建你的开发环境\n\n• **可移植性：** 容器可以部署在任何支持容器运行时的主机上，这使得应用能够在开发、测试和生产环境之间轻松迁移。\n\
  \n• **高效性：** 容器比虚拟机占用少得多的磁盘空间和内存，因此可以运行在更小、性能更低的主机上。此外，单台主机上可以运行多个容器，从而进一步提高效率。\n\
  \n• **灵活性：** 容器可以部署在各种环境中，从本地数据中心到公有云。\n\nDocker 容器通常与 Kubernetes 一起使用。Kubernetes\
  \ 是一个容器编排平台，提供了更多特性和功能，用于大规模管理容器。\n\n**安装 Docker**\n\n在本节中，你将学习如何在你的系统上安装并设置 Docker。要在系统上安装\
  \ Docker，请按以下步骤操作：\n\n1\\. 从 Docker 官网站下载适用于 Mac 或 Windows 的 Docker Desktop [（https://www.docker.com/）。](https://www.docker.com/)\n\
  \n2\\. 运行下载好的安装程序，并按照屏幕上的说明完成安装。\n\n3\\. 运行以下命令以验证安装：\n\n`docker --version`\n\n\
  你应该会看到类似如下输出：\n\n`Docker version 20.10.11, build dea9396`\n\n如果你看到了这条输出，说明 Docker\
  \ 已经在你的系统上成功安装。\n\n根据你的系统配置不同，Docker 安装过程可能不会很顺利。如果在安装 Docker 时遇到问题，请查阅文档（[`docs.docker.com/install/）以获取更多`](https://docs.docker.com/install/)信息。\n\
  \n第 3 章 搭建你的开发环境\n\n**Docker Hub**\n\nDocker Hub 是一个公共镜像仓库，包含大量可用于各种用途的 Docker 镜像。例如，你可以在\
  \ Docker Hub 上找到 MongoDB 镜像、Tomcat 镜像或 Java 应用服务器镜像。你也可以创建自己的镜像并将其推送到公共仓库，供其他人使用。\n\
  \n**创建 Docker Hub 账户**\n\n如果你还没有 Docker Hub 账户，请按以下步骤创建：\n\n1\\. 访问 Docker 网站（[`hub.docker.com/`](https://hub.docker.com/)），然后点击\
  \ Register 按钮。\n\n2\\. 在注册页面（图 3-4）中，输入你的用户名、电子邮箱地址和密码。\n\n3\\. 勾选复选框以同意服务协议、隐私政策和数据处理条款。\n\
  \n\n\n4\\. 完成 reCAPTCHA 验证并点击“注册（Sign Up）”按钮，以创建你的 Docker Hub 账户。\n\n5\\. 现在你可以登录\
  \ Docker Hub 网站，访问容器镜像库。\n\n![](img/index-87_1.jpg)\n\n第 3 章 搭建你的开发环境\n\n***图 3-4。**\
  \ Docker Hub 注册页面*\n\n当你成功创建 GitHub 和 Docker Hub 账户后，就可以开始为基于 Java 的云原生应用开发搭建开发环境了。在第\
  \ [9 章，你](https://doi.org/10.1007/978-1-4842-8832-0_9)将学习如何创建 Docker 镜像并将其推送到 Docker\
  \ Hub。\n\n**使用 Kubernetes**\n\nKubernetes 是一个强大的工具，可帮助你自动化容器化应用的部署与扩缩容。由于 Kubernetes\
  \ 需要正确配置 Docker，因此理解这两种技术协同使用的优势非常重要。\n\nKubernetes 提供了多项优势，例如容器化应用的自动部署与扩缩容、自愈能力、服务发现与负载均衡，以及存储编排。\n\
  \n第 3 章 搭建你的开发环境\n\nKubernetes 是一个开源的容器编排平台，可自动化容器化应用的部署、扩缩容和管理。在本节中，你将在开发机器上安装\
  \ Kubernetes。安装 Kubernetes 最简单的方法是使用 Minikube 之类的工具。Minikube 是运行在开发机器上的单节点 Kubernetes\
  \ 集群。Minikube 的优势包括：\n\n• 易于安装并快速上手。\n\n• 可在本地开发机器上运行。\n\n• 无需为运行 Minikube 预置或管理任何基础设施。\n\
  \n你将在第 [9 章。](https://doi.org/10.1007/978-1-4842-8832-0_9)中进一步学习 Kubernetes 与容器编排。\n\
  \n**安装 Kubernetes**\n\n要安装 Minikube，请按照 Minikube 文档网站中“[快速开始](https://minikube.sigs.k8s.io/docs/start/)”部分的说明进行操作。\n\
  \n你需要根据你的平台架构和操作系统运行相应的安装命令。\n\n在 Windows 上，你可以通过此链接下载并运行最新安装程序：[https://](https://storage.googleapis.com/minikube/releases/latest/minikube-installer.exe)\n\
  \n[storage.googleapis.com/minikube/releases/latest/minikube-installer.exe.](https://storage.googleapis.com/minikube/releases/latest/minikube-installer.exe)\n\
  \n在 macOS 或 Linux 上，你需要运行 curl 命令，如下所示：\n\ncurl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-\n\
  \n<operating system>-<architecture>\n\nsudo install minikube-<operating system>\
  \ -<architecture> /usr/local/bin/\n\nminikube\n\n请务必将 <architecture> 替换为 x86-64\
  \ 或 arm64，并将 <operation system> 替换为 Linux 操作系统对应的 linux，或 macOS 对应的 darwin。系统会提示你输入管理员或\
  \ root 密码。\n\n这将通过二进制下载方式安装最新的 Minikube 稳定版本。\n\n现在，在你的机器上启动 Docker 服务，并通过运行以下命令验证安装：\n\
  \nminikube start\n\n第 3 章 搭建你的开发环境\n\n你应该会看到与下方类似的输出：\n\nΨŵŝŶŝŬƵďĞƐƚĂƌƚ\n\nŵŝŶŝŬƵďĞǀϭ͘Ϯϱ͘Ϯ\
