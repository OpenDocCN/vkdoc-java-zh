  \ncouchdb-1.0：\n\n此特性提供了从 CouchDB 数据库存储和检索数据的能力。CouchDB 是一种面向文档的数据库，可帮助开发者构建可扩展应用程序。\n\
  \ndistributedMap-1.0：\n\n此特性提供了一个可用于在服务器之间共享数据的分布式映射。\n\n有关完整特性列表，请访问官方文档页面 [www.ibm.com/](http://www.ibm.com/docs/en/was-liberty/base?topic=management-liberty-features)\n\
  \n[docs/en/was-liberty/base?topic=management-liberty-features。](http://www.ibm.com/docs/en/was-liberty/base?topic=management-liberty-features)\n\
  \n![](img/index-104_1.jpg)\n\n![](img/index-104_2.jpg)\n\n第 4 章 构建 RESTful Web 服务\n\
  \n**创建服务器实例**\n\n如果你想运行不同的一组特性，或希望进一步优化性能，你可能需要一个新的服务器实例。创建新的服务器实例很简单。你只需要使用 server\
  \ create 命令并在后面跟上新服务器的名称。在本例中，将新服务器命名为 my-server。\n\n./server create my-server\n\
  \n该命令的输出如图 4-4 所示。\n\n***图 4-4。** ./server create my-server 命令的输出*\n\n它会创建一个名为 my-server\
  \ 的新目录，其中包含运行新服务器实例所需的所有文件。图 4-5 显示了新创建的目录。\n\n***图 4-5。** Open Liberty 新服务器实例的文件夹结构*\n\
  \n在 Open Liberty 服务器中，不同文件夹用于存储不同类型的文件。\n\napps 文件夹存储你希望在服务器上运行的应用程序。dropins 文件夹存储你想添加到服务器实例中的文件。workarea\
  \ 文件夹存储服务器使用的临时文件。\n\nOpen Liberty 提供了一种将应用部署到服务器的简单方式。你只需将可部署文件移动到服务器目录下的 dropins\
  \ 文件夹中。Open Liberty 会自动部署应用程序，并在需要时重启服务器。\n\n![](img/index-105_1.png)\n\n![](img/index-105_2.png)\n\
  \n第 4 章 构建 RESTful Web 服务\n\n你可以使用 server start 命令启动新的服务器实例，如下所示：\n\n./server start\
  \ my-server\n\n该命令的输出如图 4-6 所示。\n\n***图 4-6。** ./server start my-server 命令的输出*\n\
  \n**停止 Open Liberty 服务器**\n\n如果你想停止新创建的服务器实例，可以使用 server stop 命令，并在后面加上服务器名称。例如，下面这个命令：\n\
  \n./server stop my-server\n\n它会给出如图 4-7 所示的输出。\n\n***图 4-7。** ./server stop my-server\
  \ 命令的输出*\n\n要停止你已启动的 Open Liberty 默认实例，可以运行以下命令：\n\n./server stop\n\n命令成功执行后，你将看到如图\
  \ 4-8 所示的输出。\n\n![](img/index-106_1.png)\n\n第 4 章 构建 RESTful Web 服务\n\n***图 4-8。**\
  \ ./server stop 命令的输出*\n\n**配置服务器**\n\n你可以使用名为 server.xml 的配置文件来配置服务器。你还可以通过在 server.xml\
  \ 中添加 featureManager 元素，为服务器添加特性。\n\n\n\n文件。例如，你可以通过添加以下 XML 来添加 `restfulWS-3.0`\
  \ 和 `jsonb-2.0` 特性：\n\n<featureManager>\n\n<feature>restfulWS-3.0</feature>\n\n\
  <feature>jsonb-2.0</feature>\n\n</featureManager>\n\nOpen Liberty 了解其所需的依赖项，并会负责添加它们。如果你想禁用某个特性，只需从你的\
  \ `server.xml` 文件中移除对应的 `feature` 元素即可。\n\n**在 Open Liberty 中创建 RESTful Web 服务**\n\
  \n如果你从零开始，可以利用通过 Get Started - Open Liberty 网站创建的起步应用快速上手：[https://](https://openliberty.io/start)\n\
  \n[openliberty.io/start](https://openliberty.io/start)。你将看到图 4-9 中的表单。\n\n![](img/index-107_1.png)\n\
