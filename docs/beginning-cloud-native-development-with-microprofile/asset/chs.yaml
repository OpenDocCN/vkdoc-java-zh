  \n合适的工具。不存在放之四海而皆准的解决方案，因此有必要评估你的应用需求，并选择最能支持这些需求的工具。\n\n图 2-2 展示了云原生应用开发的各个阶段。\n\
  \n***图 2-2。** 云原生应用开发的阶段*\n\n接下来的章节将详细介绍每一个阶段。\n\n**持续集成/持续交付（CI/CD）**\n\n\n\n持续集成与持续交付（CI/CD）是一种软件工程实践，\n\
  \n在这种实践中，团队成员会频繁地集成他们的工作，通常每个人至少每天集成一次。每次集成都会通过自动化构建进行验证，以尽可能快地发现集成错误。CD 是一种按需发布代码（或更高频发布）以便尽快获得用户反馈的实践。\n\
  \n第 2 章 云原生应用开发\n\nCI/CD 通过将代码签入、自动化测试和软件部署整合到一条精简的流水线中，实现开发流程自动化。\n\n这有助于确保代码始终经过错误检查并符合项目标准，测试能够自动运行以识别潜在问题，并且新代码能够快速且安全地部署。\n\
  \nCI/CD 流水线是现代软件开发流程中的重要组成部分。\n\n它们能够帮助加快开发周期，并让新代码变更的部署更加容易。\n\n可用的 CI/CD 工具有很多，但其中一些最受欢迎的包括\
  \ Jenkins、Tra[vis CI (www.travis-ci.com/), and Cir](http://www.travis-ci.com/)cleCI（[`circleci.com/`](https://circleci.com/)）。\n\
  \n此外，还有一些基于云的 CI/CD 服务，例如 AWS\n\nCodePip[eline (https://aws.amazon.com/codepipeline/)\
  \ and A](https://aws.amazon.com/codepipeline/)zure DevOps（[`azure.microsoft.com/en-in/products/devops`](https://azure.microsoft.com/en-in/products/devops)）。\n\
  \n**基础设施即代码（IaC）**\n\n基础设施即代码是 DevOps 的重要组成部分。它涉及使用代码来管理和\n\n自动化你的基础设施部署。它包括对\n\n\
  服务器、网络和应用程序的配置。它允许你使用声明式语言来定义你的\n\n基础设施，例如 Terraform 或 AWS CloudFormation。\n\n这使你能够轻松地对基础设施进行版本控制并自动化资源预配流程。此外，IaC\
  \ 工具还能帮助确保你的基础设施具有一致性和可重复性，从而更易于管理和更新。\n\nIaC 可以通过自动化\n\n资源的部署和管理，帮助你更高效地管理基础设施。这可以让你更容易保持\n\
  \n基础设施的一致性和最新状态，并有助于减少管理环境所需的手工\n\n工作量。\n\nIaC 工具还可以通过让你自动化\n\n资源预配与管理来帮助控制成本。这有助于你节省\n\
