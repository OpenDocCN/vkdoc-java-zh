  \ 命令的输出*\n\n你可以设置 PATH 环境变量，以便可以从任何\n\n目录启动服务器，并且无需像以下步骤那样在命令前加上 `./`。\n\n对于 Linux\
  \ 或 macOS：\n\n• 根据你当前使用的 shell，在文本编辑器中打开你主目录下的 `.bash_profile` 或 `.zshrc` 文件。如果你没有这个文件，请在主目录中创建一个。\n\
