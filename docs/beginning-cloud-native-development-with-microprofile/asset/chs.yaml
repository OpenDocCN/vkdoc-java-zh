  \ Open Liberty 开发面向云的应用程序，并可部署在微服务架构中。\n\n**启动 Open Liberty 服务器**\n\n解压下载文件内容后，你可以在\
  \ bin 文件夹中运行以下命令来启动 Open Liberty：\n\n$ ./server start\n\n然后你将看到图 4-1. 所示的输出。\n\n\
