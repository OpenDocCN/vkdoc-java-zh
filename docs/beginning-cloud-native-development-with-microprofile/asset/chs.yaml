  \n**总结**\n\n本章介绍了如何使用 Jakarta EE RESTful Web Services API 创建 RESTful Web 服务，以及如何将其部署到\
  \ Open Liberty 应用服务器。本章还为你概述了 REST（Representational State Transfer，表述性状态转移）。随后讨论了\
  \ Open Liberty 运行时的关键特性。你学习了如何下载 109\n\n第 4 章 构建 RESTful Web 服务\n\n并安装 Open Liberty\
  \ 应用服务器。最后，本章提供了在 Open Liberty 应用服务器中运行 Jakarta EE 应用的分步说明。阅读本章后，你应当理解 REST 的基础知识，并能够独立使用\
  \ Open Liberty 运行时创建和部署 RESTful Web 服务。\n\n你还学习了如何配置 Open Liberty 服务器，以及如何使用 IntelliJ\
  \ IDEA Ultimate Edition 的 Open Liberty 插件开发 RESTful API。最后，你看到了如何为 RESTful Web 服务创建并运行单元测试。\n\
  \n本章的一些关键要点包括：\n\n• REST 是一种用于构建 Web 服务的架构风格。REST 已成为设计 Web 服务的标准，尤其是在微服务领域。\n\n\
  • Open Liberty 是一个灵活且轻量的运行时。你可以在该平台上快速开发、部署和执行 RESTful Web 服务。\n\n• Open Liberty\
  \ 还为最新技术和标准提供完整支持，例如 MicroProfile 和 Jakarta RESTful Web Services。它还提供了用于快速开发和测试应用的工具，如\
  \ Maven Liberty 构建插件。\n\n• 在开发 REST 应用时，你可以使用 IntelliJ IDEA Ultimate Edition 的 Open\
  \ Liberty 插件来获得更好的开发者体验。该插件支持在 IDE 内创建、运行和调试 Open Liberty 应用。\n\n本章仅覆盖了 RESTful\
  \ Web 服务最基础的内容。重点是帮助你开始构建、测试和部署 RESTful Web 服务的流程。现在你应该已经准备好引入 Jakarta EE RESTful\
  \ Web Services 的一些自定义特性。\n\n下一章将更深入地探讨 REST 架构模式。你将学习更多关于标准约定、设计考量、最佳实践，以及许多与为云原生和微服务应用构建\
  \ RESTful Web 服务相关的高级概念。\n\n**第 5 章**\n\n**微服务**\n\n**架构**\n\n*基于服务的架构* 已成为构建可扩展且具备弹性系统的一种日益流行的方法。通过将服务彼此解耦，它使得各个服务能够独立扩展。它还能更高效地利用资源，并降低故障对整个系统的影响。\n\
  \n从概念上讲，基于服务的架构与 n 层架构相似，\n\n\n\n其功能被划分为不同的层级（tier）或层（layer）。例如，在三层架构中，表示层（面向用户的界面）位于一层，应用逻辑层（实现业务逻辑的代码）位于另一层，数据库层（数据存储的位置）位于第三层。每一层负责一组特定任务，各层之间通过网络互联。这使企业能够通过为特定层增加更多服务器来实现系统的水平扩展。这样也更便于管理系统依赖关系和更新。\n\
  \n**垂直扩展**\n\n垂直扩展是指通过在同一层级增加资源来提升系统容量的过程。它也被称为向上扩展（scaling up），即向单台服务器添加更多资源。对应用进行垂直扩展最常见的方法，就是直接为现有服务器增加更多\
  \ RAM 或 CPU 核心。要进行垂直扩展，首先需要识别需要增加的资源，这可能包括 RAM、CPU 核心或存储容量。一旦明确需要升级的内容，你就可以\n\n\
  购买新硬件，或为现有服务器增加更多核心。\n\n© Tarun Telang 2023\n\nT. Telang，*《Beginning Cloud Native\
  \ Development with MicroProfile, Jakarta EE, and Kubernetes》*，\n\n[`doi.org/10.1007/978-1-4842-8832-0_5`](https://doi.org/10.1007/978-1-4842-8832-0_5#DOI)\n\
  \n第 5 章 微服务架构\n\n垂直扩展的主要优势在于它通常是最容易且成本最低的实现方式。在许多情况下，你只需为现有服务器增加更多 RAM 或 CPU 核心，\n\
  \n而无需购买新硬件。此外，垂直扩展还能用于快速应对需求增长。例如，如果你的网站\n\n突然迎来流量高峰，你可以迅速为服务器增加资源，以处理增加的负载。\n\n\
  虽然垂直扩展通常是在提升容量时采取的第一步，但它确实存在局限。垂直扩展的主要问题是，到了某个节点你会触及物理服务器的最大容量，再为现有服务器增加 RAM 或 CPU\
  \ 核心\n\n将不再可行。此时，你将需要购买新硬件或转向水平扩展。并且，未来究竟需要多少额外容量也很难准确预测。\n\n垂直扩展还可能导致“容量孤岛”。例如，如果你在系统中增加第二台服务器，该服务器很可能拥有其自身的\
  \ RAM、CPU 核心和存储\n\n容量。结果就是，你现在会有两台容量水平不同的服务器。这会让系统中的流量均衡分配变得困难，并可能导致一台服务器过载，而另一台仍有充足容量。\n\
  \n**水平扩展**\n\n水平扩展是指向系统中增加更多服务器的过程，也称为向外扩展（scaling out）。这可以通过添加新的物理服务器来实现，或使用服务器\n\
  \n虚拟化在单台物理机器上创建多个“虚拟”服务器。无论哪种方式，整体系统容量都会因增加服务器而提升。\n\n水平扩展的优势在于，它通常比垂直\n\n扩展更具可扩展性。由于每台新服务器都从“空白状态”开始，它可以被充分利用，且不需要特别配置才能与系统其余部分协同工作。此外，水平扩展也可能更高效，因为每台新服务器通常都能以满负载能力运行。\n\
  \n水平扩展的缺点包括复杂性增加以及更高的\n\n成本。当你向系统中增加更多服务器时，需要跟踪各种不同配置，并确保每台服务器都具备正确资源。这在管理上可能\n\n\
  较为困难，尤其是在未使用配置管理系统时。\n\n此外，水平扩展通常需要更多硬件，因为每台新增服务器\n\n都需要自己的一套资源。因此，水平扩展可能比垂直扩展更昂贵。\n\
  \n第 5 章 微服务架构\n\n**垂直扩展 vs. 水平扩展**\n\n哪种方式最适合你的应用取决于多个因素，包括成本、性能、可扩展性和可管理性。在决定采用垂直扩展还是水平扩展时，有几个因素需要考虑。首先，思考你的系统未来将如何增长。如果你预期会有大量增长，水平扩展可能是更好的选择。其次，考虑每种方式相关的成本。总体而言，垂直扩展通常最容易且最便宜实现，而水平扩展更复杂、成本更高。不过，从长期来看，水平扩展往往更具扩展性，也更易管理。\n\
  \n垂直扩展可能比水平扩展效率更低。当你向单台服务器增加更多\n\n资源时，这些资源往往无法被充分利用。例如，如果你给一台当前仅运行在 50% 容量的服务器再增加一个\
  \ CPU 核心，这个新核心很可能大部分时间处于空闲状态。相比之下，在水平扩展中，每台新增服务器都可以被充分利用，因为它是从空白状态启动的。\n\n最后，考虑你系统的复杂度。如果你没有使用配置管理，水平扩展可能更难管理。\n\
  \n如果你不确定哪种方式适合自己，可以考虑先从垂直\n\n扩展开始，必要时再切换到水平扩展。这样你可以快速起步，并在需要时继续扩展。无论你选择哪种方式，\n\n\
  扩展都是任何系统中的重要组成部分。通过理解每种方式的优缺点，你可以确保系统能够应对增长带来的需求。\n\n**面向服务架构的历史**\n\n面向服务架构的历史可以追溯到\n\
  \n计算的早期时代。当组织最初开始使用计算机来自动化业务流程时，面向服务架构应运而生。面向服务架构最初旨在为不同组织提供一种共享信息和资源的方式，而不必依赖单一的集中式计算机系统。在面向服务架构的早期，不同组织使用了多种方法来共享信息和资源，包括点对点连接、客户端/服务器模型以及分布式计算。\n\
  \n面向服务架构这一概念源于更早期的计算模型，\n\n例如客户端-服务器和 n 层架构。在传统的*客户端-服务器架构*中，客户端向服务器发出请求，服务器处理请求并返回\
  \ 113\n\n第 5 章 微服务架构\n\n响应。客户端-服务器架构通常用于处理\n\n需要高计算资源、而客户端机器无法独立完成的请求。它\n\n是 20\
  \ 世纪 80 年代和 90 年代早期最流行的计算风格。这一模型\n\n是集中式且不够灵活的，因为服务器程序必须专门设计来处理每一种不同类型的请求。\n\n相比之下，面向服务架构基于松耦合理念，\n\
  \n这意味着服务可以彼此独立，并能够相互通信，\n\n而无需预先了解或规划。这使得从现有服务构建组合应用成为可能，并且在不影响应用其余部分的前提下变更或新增服务。\n\
  \nWeb 服务的使用一直是实现面向服务架构的关键推动因素。Web\n\n服务是可独立运行、模块化的应用，可在 Internet 上发布、发现和调用。它们使用\
  \ XML 和 SOAP 等开放标准来促进\n\n互操作性。\n\n第一代面向服务架构的特征是缺乏\n\n\n\n标准化和互操作性。每个组织都使用其专有的软件和硬件，这使得不同组织之间难以通信和共享信息。这些解决方案在\
  \ 20 世纪 90 年代末出现，由 BEA Systems、IBM、Microsoft 和 Sun Microsystems 等公司主导。此外，早期的基于服务的架构并不是为了支持互联网而设计的，因为当时互联网尚未广泛普及。\n\
  \n第二代基于服务的架构在 20 世纪 90 年代末出现，伴随着互联网的\n\n到来以及组织需要能够在全球范围内共享信息和资源的需求。这一代新的基于服务的架构\n\
  \n建立在互操作性和标准化原则之上。第二代基于服务的架构最显著的例子是 Web 服务\n\n架构，它旨在让不同组织能够通过互联网共享信息和资源。第二代基于服务的架构解决方案由\
  \ Oracle、SAP 和 TIBCO 等公司主导。\n\n第三代基于服务的架构正在随着\n\n云计算的兴起而出现。云计算是一种新型计算方式，它使\n\n组织能够通过互联网访问由第三方提供商拥有并运营的远程服务器。这一代新的基于服务的架构以其弹性扩展能力和按需付费定价模式为特征。第三代基于服务架构最显著的例子是\
  \ Amazon Web Services 平台、Google Cloud Platform 和 Azure。第三代基于服务的架构解决方案正由 Amazon、Google\
  \ 和 Netflix 等公司主导。\n\n第 5 章 微服务架构\n\n第四代基于服务的架构目前正在开发中，\n\n并且很可能建立在人工智能（AI）和机器学习（ML）原则之上。这一代新的基于服务架构将能够学习和演进，从而为用户提供更好的服务。第四代基于服务架构最显著的例子是\
  \ IBM Watson 平台。\n\n总而言之，基于服务的架构已经演进以满足组织不断变化的\n\n需求。第一代基于服务架构是为一个没有互联网的世界而设计的。第二代是为一个有互联网的世界而设计的。第三代正在为一个有云计算的世界而设计。\n\
  \n而第四代正在为一个有人工智能和机器学习的世界而开发。\n\n**基于服务架构的类型**\n\n微服务架构和 SOA 架构是两种流行的基于服务的\n\n架构类型。\n\
  \n**面向服务架构（SOA）**\n\n*面向服务架构（SOA）*是一种架构风格，可实现松耦合、可互操作服务的构建。SOA 中的服务可以\n\n被动态发现和调用，并且可以被组合成复杂的\n\
  \n工作流。面向服务架构这一术语在 21 世纪初开始流行，当时包括 SAP、IBM 和 Microsoft 在内的一些公司开始推广 SOA，\n\n将其作为构建软件系统的一种方式。SOA\
  \ 是传统单体应用架构的一种演进，在传统架构中所有组件都紧密耦合且难以复用。这种架构方法使服务能够松耦合，从而允许它们被复用并组合以创建新服务。\n\nSOA\
  \ 架构基于面向服务计算的思想，其中\n\n服务是可被其他服务访问和使用的自包含单元。这种架构类型的优势在于它促进了互操作性和服务复用。然而，在现有 SOA 架构中更改或新增服务可能会更困难。\n\
  \n第 5 章 微服务架构\n\nSOA 并不是一种特定技术或平台，而是一种可以\n\n使用各种技术和平台实现的设计方法。SOA 通常通过\n\nWeb 服务实现，Web\
  \ 服务是自包含、自描述、模块化的应用程序，可以在网络上发布、定位和调用。Web 服务使用基于标准的协议（如 HTTP）在不同平台和编程语言之间提供互操作性。客户端可以在不了解底层实现的情况下调用这些\
  \ Web 服务。\n\n这种服务的松耦合还使它们能够被快速组合成新的服务或应用程序，从而提供更高的灵活性和可复用性。\n\n**什么是 Web 服务？**\n\
  \nWeb 服务是两台电子设备通过\n\n万维网进行通信的一种方式。虽然一些 Web 服务可以通过 Web 浏览器访问，\n\n但它们通常通过充当用户界面的软件程序来访问，例如\
  \ Web 应用或网站。Web 服务通常用于向用户提供信息或功能，但它们也可以用于与其他软件程序通信。例如，某个 Web 服务可能允许用户请求从一个地点到另一个地点的路线，或者允许用户向另一位用户发送短信。\n\
  \nWeb 服务基于允许不同软件程序进行\n\n通信的标准。这使开发者能够创建可与\n\n现有 Web 服务协同工作的新应用程序。\n\nWeb 服务的一些常见标准包括：\n\
  \n• **SOAP（简单对象访问协议）**：定义\n\n两台设备如何通过互联网交换信息的标准。\n\n• **XML（可扩展标记语言）**：定义\n\n数据如何在设备之间进行结构化和交换的标准。\n\
  \n• **WSDL（Web 服务描述语言）**：定义\n\n如何在互联网上描述和定位 Web 服务的标准。\n\n• **REST（表述性状态转移）**：定义\n\
  \n如何使用 HTTP 协议访问 Web 服务的标准。\n\n• **JSON（JavaScript 对象表示法）**：定义\n\n数据如何以一种便于\n\n\
  人类阅读和编写的格式在设备之间交换的标准。\n\n第 5 章 微服务架构\n\n**什么是 SOAP？**\n\nSOAP 是 Simple Object Access\
  \ Protocol 的缩写。它是一种基于 XML 的消息协议，用于在计算机之间交换信息。SOAP 旨在独立于\n\n任何特定的编程模型和其他实现细节。\n\n\
  SOAP 消息由称为*信封（envelopes）*的 XML 元素构成，这些元素封装了正在交换的数据。信封定义了 SOAP 消息的结构\n\n以及应如何处理该消息。一个\
  \ SOAP 信封可以包含多个消息头和\n\n一个消息体。消息体包含实际交换的数据，而消息头可以\n\n包含有关消息的附加信息，例如发送方、接收方以及任何处理指令。因此，SOAP\
  \ 提供了一种基于强契约的消息格式，可用于从各种来源访问数据。\n\nSOAP 消息通常通过 HTTP 传输，但它们也可以通过\n\n其他协议传输。当通过 HTTP\
  \ 传输时，SOAP 消息通常\n\n使用 XML 编码。尽管 SOAP 的设计目标是独立于任何\n\n特定传输协议，但 HTTP 是 SOAP\n\n消息最常用的传输方式。\n\
  \nSOAP 常与其他 Web 服务技术结合使用，例如\n\nWSDL 和 UDDI。WSDL 是用于描述 Web 服务功能的标准，而 UDDI 是用于列出可用\
  \ Web 服务的标准。这些技术结合起来可用于创建完整的 Web 服务解决方案。\n\nSOAP 是构建 Web 服务的一个非常强大的工具，可用于访问\n\n\n\
  \n来自多种来源的数据。然而，由于 SOAP 基于 XML，它可能会非常冗长，并且在解析和生成 SOAP 消息时需要大量处理能力。因此，一些开发者更倾向于使用\
  \ JSON 或 gRPC 等替代技术，\n\n因为它们更轻量，所需处理能力更低。\n\n最初的 SOAP 规范并未涉及安全问题。因此，后来制定了\n\nWS-Security\
  \ 规范，用于为 SOAP 扩展安全特性。如今，WS-\n\nSecurity 已成为 SOAP 消息最常用的安全标准。其他\n\n对 SOAP 的扩展规范还包括\
  \ WS-Addressing，它定义了一种标准\n\n方式，用于在 SOAP 消息中包含发送方和接收方等信息；以及 WS-ReliableMessaging，它增加了消息投递保障等可靠性特性。\n\
  \nSOAP 因许多原因而受到批评，包括其复杂性以及\n\n调试 SOAP 应用的困难。然而，它仍然流行起来，尤其是在企业环境中。\n\n下一节将讨论 REST，它是\
  \ SOAP 的一种替代方案。\n\n第 5 章 微服务架构\n\n**什么是 REST？**\n\nREST 是 Representational State\
  \ Transfer（表述性状态转移）的缩写。它是一种架构风格，定义了一组基于 Web 组件如何通信的约束和属性。\n\nREST 常用于 Web 服务语境中，在这种语境下，它定义了资源\n\
  \n如何被客户端暴露和访问。客户端可以是任何向 Web 服务发起请求的应用类型，例如 Web 浏览器、移动应用或桌面应用。在 REST 中，客户端负责管理自身状态，服务器负责处理请求并返回响应。这种关注点分离简化了应用开发与部署。\n\
  \nREST 定义了一组原则，旨在使 Web 服务更加\n\n可扩展、灵活且易维护。这些原则包括：\n\n• 资源以 URI（统一资源标识符）路径形式暴露。\n\
  \nRESTful 应用应具备统一接口，并且在所有资源与操作之间\n\n保持一致。这使得应用更易于使用和理解。\n\n• 使用 HTTP 方法来访问和操作资源。\n\
  \n• 资源应以客户端和服务器都能理解的格式表示\n\n（通常是 JSON 或 XML）。\n\n• 客户端与服务器之间采用无状态通信。\n\nREST 常被拿来与其他架构风格（如\
  \ SOAP）进行比较。然而，两者之间\n\n存在一些关键差异。\n\n**REST 与 SOAP**\n\n正如你在前面章节中所学，REST 和 SOAP 是两种流行的\
  \ Web 服务\n\n技术。REST 与 SOAP 的主要区别在于，REST 是一种更轻量级的\n\n协议，不像 SOAP 那样依赖大量基础设施。这使得它对资源的消耗更低，因此实现起来通常更快、成本也更低。\n\
  \nREST 可以完全构建在开源技术栈之上。另一方面，SOAP 在开发以及生产部署中都需要昂贵的软件和硬件。\n\nREST 的可分发性也优于 SOAP，因为它可以轻松部署在各种平台上。\n\
  \n第 5 章 微服务架构\n\n此外，REST 比 SOAP 更简单。REST 服务通常比 SOAP 服务更易于开发\n\n和测试。REST 也比 SOAP\
  \ 更具可扩展性，因为它是无状态的。RESTful 应用通常更容易扩容。另外，REST 也比 SOAP 更灵活，\n\n因为 RESTful 应用更容易扩展和定制。\n\
  \n另一方面，SOAP 是一种更健壮、功能更丰富的协议。它包含\n\n对安全性和事务处理的支持，因此非常适合关键任务型应用。SOAP 服务通常也比 REST\n\
  \n服务具有更好的互操作性，因为它们可与多种编程语言和平台配合使用。\n\n在讨论完面向服务架构的选项后，下一节将深入探讨\n\n微服务的演进。\n\n**单体架构**\n\
  \n单体架构是软件开发中传统的一体化模型。在该模型中，软件应用由单一、庞大的代码库组成。由于缺乏模块化，这类应用通常难以维护和扩展。单体应用通常作为单个、自包含单元构建，这会使新增功能或更新现有功能变得困难。单体应用往往也难以测试和部署，因为它们要求所有依赖都被正确安装和配置。这会使得在不同环境中确保应用正确运行变得困难。\n\
  \n对于预计长期增长不大的小型项目，单体应用可能是一个不错的选择。对于需要高度紧耦合的项目，它们也可能是合适的选择。然而，对于大多数应用而言，更模块化的方法通常是更好的选择。\n\
  \n可扩展性通常是单体应用的主要问题。由于整个应用作为单一单元构建，新增功能或扩展现有功能都可能比较困难。单体应用通常也很难拆分为可独立部署的更小服务。\n\n\
  如果你正在考虑使用单体应用，也应了解这类应用可能带来的潜在困难。\n\n–\n\n**脆弱的代码库：** 庞大的代码库难以维护，而且\n\n引入缺陷的风险更高。\n\
  \n–\n\n**难以测试：** 测试单体应用可能很困难，因为\n\n其所有依赖都必须被正确安装和配置。\n\n第 5 章 微服务架构\n\n–\n\n**部署挑战：**\
  \ 单体应用可能难以\n\n部署，因为它们要求所有依赖都被安装\n\n并正确配置。\n\n–\n\n**可扩展性问题：** 单体应用可能难以扩展，\n\n因为它们缺乏模块化。新增功能或\n\
  \n扩展现有功能都会比较困难。\n\n**微服务架构的演进**\n\n微服务架构的起源可以追溯到分布式计算的早期，当时系统被设计为将大型任务拆分为可独立处理的更小部分。这种方法主张\n\
  \n通过小型、可组合的服务来构建系统。\n\n在 21 世纪初，面向服务架构（SOA）成为构建分布式系统的流行方式。像 Web Services Description\
  \ Language（WSDL）和 Simple Object Access Protocol（SOAP）这样的技术使开发者能够通过 HTTP 定义并交换服务。\n\
  \n然而，SOA 也有一些局限。首先，SOA 系统不易进行水平扩展，\n\n因为每个服务都有其专用基础设施。其次，SOA\n\n系统往往复杂且脆弱，并且难以管理\n\
  \n服务之间的依赖关系。\n\n在 2010 年代，微服务架构作为 SOA 的轻量级替代方案出现。这类系统由可独立部署和\n\n运行的小型模块化服务组成。这种方法与*单体架构*相对，后者将系统的所有组件打包为单个大型可执行文件。微服务架构最著名的例子是\
  \ Twitter 平台。\n\n单体架构之所以流行，是因为它们简单且易于\n\n理解。然而，它们也有若干缺点，包括可扩展性和\n\n可维护性问题。另一方面，微服务基于模块化与去中心化原则，并强调简单性与可扩展性。\n\
  \n得益于 DevOps 工具与实践的进步，如今部署和管理基于微服务的系统\n\n比以往任何时候都更加容易。\n\n第 5 章 微服务架构\n\n**微服务架构**\n\
  \n\n\n微服务架构将应用程序组织为一组松耦合的服务。在微服务架构中，服务是细粒度的，协议是轻量级的。将应用拆分为不同且更小服务的好处包括：能够更轻松、更独立地开发、部署和扩展应用程序。微服务通常通过\
  \ DevOps 工具\n\n和实践进行部署与管理。\n\n微服务的优势包括更高的灵活性、更好的可扩展性，\n\n以及更低的成本。它也是 DevOps 运动的关键推动因素，而\
  \ DevOps 运动专注于提升软件开发的速度与质量。\n\n当我们谈论微服务时，通常指的是一种软件架构模式：应用程序由一组小型、可独立部署的\n\n服务组成。这些服务通过定义良好的\
  \ API 相互通信，并且\n\n可单独部署与扩展。\n\n**微服务架构的优势**\n\n与传统单体\n\n架构相比，微服务架构有许多优势。这种方法的一个优点是，它使每个服务都可以独立开发、部署和扩展，从而带来更快的开发\n\
  \n周期和更敏捷的部署。此外，每个服务都可以使用不同的语言编写，这使你能够为每个服务选择最合适的语言。\n\n微服务的另一个好处是，这种架构可以提供更高水平的容错性，因为如果某个服务发生故障，其他服务仍可继续运行。\n\
  \n微服务还有助于提升模块化程度和可维护性，因为每个\n\n服务通常只负责单一任务或功能。这使得理解和修改特定服务的代码更容易，也有助于防止某个服务中的变更影响其他服务。当某个服务需要更新时，你只需更新该服务的代码并部署它，而不会影响应用程序的其余部分。这使得在不破坏系统其他部分的情况下更改应用程序变得更加容易。\n\
  \n最后，微服务还能使持续交付与部署\n\n（CD/CI）流水线更容易实施，因为每个服务都可以独立部署。这可以带来更快、更可靠的部署，并在修改\n\n代码库时降低风险。\n\
  \n第 5 章 微服务架构\n\n总之，微服务的优势包括更高的灵活性、更好的\n\n可扩展性以及更低的成本。它也是 DevOps 运动的关键推动因素，而该运动专注于提升软件开发的速度和质量。\n\
  \n**微服务架构的缺点**\n\n尽管采用微服务架构有许多优势，但也有一些需要考虑的挑战。其中最大的挑战之一是管理服务之间的通信，随着服务数量的\n\n增长，这会变得复杂。此外，微服务还可能引入运维开销，因为每个服务都需要独立部署和管理。\n\
  \n尽管存在这些挑战，微服务已成为许多现代应用中流行的架构风格\n\n。若使用得当，它们可以带来多项\n\n优势，从而有助于改进开发流程和软件的整体质量。\n\n\
  **设计考量**\n\n如果你正在考虑将单体应用拆分为微服务，有几点你需要牢记。首先，你需要仔细设计服务之间的接口。服务粒度是微服务中的一个重要设计\n\n考量。服务应当是细粒度的，并专注于\n\
  \n单一职责。这将使服务更易于开发、部署和扩展。\n\n此外，这也会让你更容易理解服务及其依赖关系。\n\n其次，你需要管理并监控服务之间的依赖关系。它\n\n\
  \n\n在设计微服务架构时，考虑服务之间的依赖关系也同样重要。每个服务都应当是独立的，并且不依赖其他服务。这将使服务的部署和管理更加容易。最后，你还需要为管理分布式系统所带来的挑战做好准备。这些挑战包括管理服务间通信、管理数据一致性以及处理故障。\n\
  \n第 5 章 微服务架构\n\n**在云原生应用中使用微服务**\n\n微服务是构建云原生应用的一种流行架构方式。使用云原生技术可以获得诸多收益，包括：\n\n\
  • **缩短上市时间：** 微服务可以独立且快速地部署，从而加快产品上市速度。\n\n• **更高的灵活性和可扩展性：** 每个微服务都可以独立更新或扩缩容，提供更高的灵活性和可扩展性。相较于传统单体应用，这是一个显著优势，因为单体应用通常更难扩展。\n\
  \n• **降低运营成本：** 云原生应用可以按需使用弹性计算资源，从而降低运营成本。\n\n• **提升韧性或容错能力：** 如果某个微服务发生故障，可以独立重启，从而提升容错能力。相比之下，在单体应用中，单点故障可能会导致整个应用宕机。\n\
  \n在使用微服务时，也有一些需要考虑的挑战，包括：\n\n• **复杂性增加：** 组件数量的增加会使调试和故障排查更加困难。同时，还需要额外的工具来管理和监控基于微服务的应用。\n\
  \n• **服务发现：** 在微服务架构中，每个服务都需要能够发现并与其他服务通信。这可能是一个挑战，尤其是在大型复杂应用中。\n\n• **数据一致性：**\
  \ 由于每个微服务都是独立的，可能会出现数据不一致问题。需要进行谨慎管理以避免问题发生。\n\n第 5 章 微服务架构\n\n请使用以下最佳实践，开始在你的云原生应用中使用微服务：\n\
  \n• **预先定义应用架构：** 这将帮助你确定需要构建哪些服务，以及它们将如何交互。\n\n• **使用服务注册中心：** 服务注册中心可用于存储可用服务及其位置的信息，这对服务发现非常有用。\n\
  \n• **使用容器化：** 容器化可以帮助减少管理和部署微服务的开销。\n\n• **使用微服务框架：** 目前有多种微服务框架可用，可帮助简化微服务的构建和部署过程。\n\
  \n• **谨慎处理数据一致性：** 数据一致性是任何分布式系统中的重要考量。\n\n面向服务架构的未来很可能将由微服务的持续采用以及无服务器计算的兴起所驱动。\n\
  \n**云原生十二要素应用**\n\n*twelve-factor methodology*（十二要素方法论）是一套用于设计和开发云友好型应用的指导原则。遵循这些原则有助于提升性能、可扩展性和韧性。使用十二要素方法论设计和开发的应用，被称为*云原生十二要素应用*。\n\
  \n1\\. **代码库：** 十二要素应用始终会在版本控制系统（如 Git）中进行跟踪，并从那里进行部署。这使得在必要时可以轻松回滚更改，并维护代码库的历史记录。\n\
  \n2\\. **依赖：** 所有依赖项（如库和框架）都应在清单文件中声明，例如用于基于 Maven 的 Java 项目的 POM 文件，以便能够轻松安装和更新。\n\
  \n第 5 章 微服务架构\n\n\n\n3\\. **配置：** 配置应存储在环境中，而不是代码中，这样无需更改代码本身就可以轻松调整配置。\n\n4\\.\
  \ **后端服务：** 十二要素应用被设计为使用外部后端服务，例如数据库和消息队列。它们应被视为附加资源。这意味着这些服务可以轻松分离并替换，而不会影响正在运行的代码。\n\
  \n5\\. **构建、发布、运行：** 十二要素应用通过可重复、可自动化的流程进行构建，其中包含测试以确保质量。这确保了它们可以在任何时间发布。随后，它们以不可变工件的形式发布，从而能够轻松且快速地部署。最后，它们在隔离环境（例如容器）中运行，以便根据需要进行扩缩容。\n\
  \n6\\. **进程：** 十二要素应用被设计为以无状态进程运行。应用被拆分为小型、自治的进程。每个进程都可以根据需要独立启动、停止或重启，而不会影响其他进程。\n\
  \n7\\. **端口绑定：** 十二要素应用被设计为部署在可导出端口供其绑定的服务器上。这使得在同一台服务器上运行应用的多个实例变得容易，也使得在必要时更换服务器更加方便。\n\
  \n8\\. **并发：** 十二要素应用被设计为在并发环境中运行，从而能够利用现代计算资源，例如服务器集群。应用的不同部分可以在不同的内核或机器上同时运行。这也使其能够根据需要进行扩缩容。\n\
  \n9\\. **可丢弃性：** 十二要素应用被设计为可以快速启动或停止。这使得在必要时部署新版本或回滚变更变得容易，同时不会影响整个应用。\n\n第 5 章\
  \ 微服务架构\n\n10\\. **开发/生产一致性：** 十二要素应用被设计为在开发环境与生产环境中保持相同环境。这使得更容易尽早发现错误，并避免部署到生产环境时出现意外。\n\
  \n11\\. **日志：** 日志记录是跟踪系统中发生事件的过程。通过跟踪对系统重要的事件，日志可用于改进系统运行并防止问题发生。十二要素应用将日志视为事件流。这使得对日志进行聚合和处理以用于监控与分析变得容易。\n\
  \n12\\. **管理进程：** 十二要素应用为应用管理设置了独立进程，例如执行数据库迁移。这种关注点分离使应用更易于管理并减少错误。\n\n**什么是虚拟机？**\n\
  \n*虚拟机*是一种模拟物理计算机的软件程序。它允许一台计算机同时运行多个操作系统和应用程序。\n\n与物理机相比，虚拟机有许多优势。它们更容易部署、管理和扩展。它们还提供更高的灵活性和资源利用率。此外，虚拟机不受硬件约束限制，并且可以轻松迁移到不同主机。\n\
  \n虚拟机可用于在不同环境中测试软件和应用程序，而不会影响宿主机。它们还可用于在一台计算机上运行多个操作系统。\n\n虚拟机的主要缺点之一是其稳定性可能不如物理机。此外，虚拟机可能更消耗资源，需要比物理机更多的\
  \ CPU、内存和存储。它们在管理和故障排查方面也可能更复杂。\n\n虚拟机之所以可行，是因为有虚拟化软件，它为客户机操作系统创建运行所需的虚拟环境。虚拟化软件在客户机操作系统与宿主硬件之间提供了一层抽象，使在一个宿主上运行多个客户机成为可能。\n\
  \n第 5 章 微服务架构\n\n虚拟机是在另一台计算机上运行的计算机。另一台计算机称为宿主机（host），在其上运行的计算机称为客户机（guest）。硬件基础设施是构成计算机系统的电子和物理组件。这包括中央处理器（CPU）、内存、存储、输入/输出设备以及网络硬件。\n\
  \n虚拟化是创建虚拟机的过程。这可以通过模拟硬件的软件来实现，或通过在现有物理硬件之上运行管理程序（hypervisor）来实现。虚拟化软件在客户机操作系统与宿主硬件之间提供一层抽象，使在一个宿主上运行多个客户机成为可能。\n\
  \n管理程序（Hypervisor）是一类虚拟化软件，允许多个客户操作系统在单一宿主上运行。最常见的管理程序类型是裸金属管理程序（bare-metal hypervisor），它直接运行在宿主硬件上。其他类型的管理程序包括托管型（hosted）和半虚拟化（para-virtualized）。\n\
  \n裸金属管理程序通常用于对性能和稳定性要求严格的企业环境。托管型管理程序通常用于较小规模环境，或用于测试与开发。半虚拟化是一种需要在客户机操作系统中安装专用软件才能正常运行的虚拟化类型。\n\
  \n使用虚拟机有许多好处，包括能够在一台计算机上运行多个操作系统、能够轻松将客户机从一台宿主迁移到另一台宿主，以及能够将各客户机彼此隔离。\n\n虚拟机也有一些缺点。与在计算机上运行单一操作系统相比，它们可能更消耗资源，而且稳定性可能不如原生运行的操作系统。尽管存在这些缺点，虚拟机仍因其众多优势而广受欢迎。\n\
  \n**什么是容器？**\n\n容器是一种虚拟化技术，可将应用程序或服务与底层操作系统（OS）隔离开来。这使你能够在单个 OS 实例上同时运行多个容器。\n\n\
  第 5 章 微服务架构\n\n每个容器都有其隔离环境，可在其中运行而不影响其他容器或宿主 OS。这使容器成为微服务的理想方案；微服务是小型、自治、可独立部署和扩展的服务。\n\
  \n容器经常与虚拟机（VM）进行比较。VM 和容器都提供隔离能力，并允许你在单一宿主上运行多个实例。然而，这两种虚拟化方式之间存在一些关键差异。\n\nVM 比容器更“重”，也更消耗资源。每个\
  \ VM 内都需要运行一个完整的 OS 实例，这可能导致资源利用效率低下。\n\n相比之下，容器共享同一个 OS 内核，只包含运行所需的库和文件，因此更轻量、更高效。这使你能够在单一宿主上运行比\
  \ VM 更多的容器实例。\n\n另一个关键差异是，VM 通常用于运行完整应用，而容器通常用于运行应用中的单个服务或组件。\n\n这使得使用容器部署和扩展应用变得更容易。\n\
  \n如果你正在寻找一种虚拟化应用和服务的方法，容器是一个很好的方案。它们轻量、高效，并且易于部署和扩展。\n\n**什么是基于容器的应用？**\n\n[容器是](https://en.wikipedia.org/wiki/OS-level_virtualization)轻量级虚拟机或自包含的部署单元。\n\
  \n\n\n它们使你能够将运行应用程序所需的所有依赖项打包到一个自包含单元中。使用容器运行应用程序意味着，你必须先将应用程序及其依赖项打包，使其能够在类似 [Docker](https://en.wikipedia.org/wiki/Docker_(software))\
  \ 的容器中运行。然后你就可以在任何服务器上运行这些容器，如图 5-1 所示。\n\n![](img/index-148_1.png)\n\n第 5 章 微服务架构\n\
  \n***图 5-1。** 基于容器的应用程序*\n\n要在容器中运行应用程序，首先要构建一个镜像（例如 Docker 镜像），它是用于创建容器的模板。你可以使用一个称为\
  \ Dockerfile 的文本文件来创建镜像，其中包含描述如何构建 Docker 镜像的指令。借助唯一的配置和设置，你可以使用这个镜像创建任意数量的容器。然后，只要安装了像\
  \ Docker Engine 这样的容器运行时技术，你就可以在任何地方运行它们，而无需其他库或工具。\n\n由于容器为你的代码提供了隔离环境，因此它们非常适合部署在\
  \ Amazon Web Services (AWS)、Google Cloud Platform 和 Microsoft Azure 等云平台上。你还可以使用像\
  \ [Kubernetes t](https://en.wikipedia.org/wiki/Kubernetes)o 这样的容器编排平台来大规模部署和管理容器。这使它们非常适合云端部署，因为你可以快速将它们从一台服务器迁移到另一台服务器，而不必担心兼容性问题。\n\
  \n第 5 章 微服务架构\n\n**什么是无服务器应用程序？**\n\n无服务器计算是一种构建和运行应用程序的新方式。它也被称为函数即服务（Function\
  \ as a Service），或 FaaS。无服务器计算是一种云计算执行模型。云提供商负责运行服务器，并动态分配机器资源来运行代码，根据需求进行扩缩容。无服务器计算免除了开发人员预置、管理和运维服务器的需求，使他们能够专注于应用程序本身。\n\
  \n“无服务器（serverless）”这个术语具有误导性，因为其中仍然有服务器参与。这只是意味着开发人员不必操心它们。云提供商会负责所有底层基础设施，从而让开发人员专注于代码。\n\
  \n**无服务器计算用于哪里？**\n\n无服务器计算是一个相对较新的概念，仍在不断演进。它尚未被广泛采用，但受欢迎程度正在上升，尤其是在那些没有资源投资传统\
  \ IT 基础设施的初创公司和中小企业中。\n\n你可以将无服务器计算用于应用程序中需要快速高效完成的小型、独立任务。这些任务通常由事件驱动，例如处理用户上传或支付处理。\n\
  \n你也可以将无服务器计算用于更大、更复杂的应用程序，方法是将应用拆分为更小的组件，并由不同的无服务器函数分别处理每个组件。\n\n无服务器计算最常见的一些使用场景包括：\n\
  \n• **Web 应用程序**—你可以使用无服务器计算托管静态网站和动态 Web 应用程序。\n\n• **移动应用程序**—你也可以使用无服务器函数为移动应用程序的后端提供支持。它们可以处理用户身份验证、数据库查询、推送通知以及其他常见任务。\n\
  \n• **物联网（IoT）**—你可以用它实时处理来自传感器和设备的数据。你还可以用它触发操作，例如发送通知或激活设备。\n\n第 5 章 微服务架构\n\n\
  • **数据处理**—你可以使用无服务器函数处理交易和支付。你还可以用它发送收据和通知。\n\n• **机器学习（ML）**—你可以使用无服务器函数训练和部署机器学习模型。\n\
  \n**无服务器计算的优势**\n\n与虚拟机或容器等传统计算模型相比，无服务器计算具有以下优势：\n\n• **降低成本**—无需投资或维护服务器。你只需为所使用的资源付费，而且没有前期成本。无需为闲置容量或未利用的服务器付费。这可以显著节省成本，尤其适用于工作负载可变或不可预测的应用程序。\n\
  \n• **提升敏捷性**—无服务器计算使你能够快速部署代码，并可根据用户需求自动扩缩容。你甚至可以毫无问题地应对流量突增。\n\n• **改进专注度**—通过免除服务器管理，无服务器计算让你能够专注于开发和部署应用程序。你可以专注于代码，把其余工作交给无服务器平台处理。这会让你作为开发者的工作更轻松。\n\
  \n**无服务器计算的缺点**\n\n尽管有许多优点，无服务器计算也确实存在一些缺点。\n\n• **调试与排障困难**—无服务器计算的主要缺点之一是，由于你无法直接访问底层服务器，调试和排查问题会更具挑战性。\n\
  \n第 5 章 微服务架构\n\n• **灵活性降低**—与其他托管选项相比，无服务器计算可能灵活性更低，因为你受限于无服务器平台所提供的资源。\n\n• **供应商锁定**—它可能导致供应商锁定；如果你对当前提供商不满意，切换到其他平台会变得困难。\n\
  \n• **支持不足**—由于这仍是一项新技术，无服务器计算在支持和文档方面仍显不足。当你遇到卡点时，可能很难找到问题答案或获得帮助。\n\n**流行的无服务器平台**\n\
  \n如果你正在寻找构建和运行应用程序的新方式，你应该了解一下无服务器计算。它是节省基础设施成本并自动扩展应用程序的绝佳方式。以下是一些值得探索的热门无服务器平台：\n\
  \n• Amazon Web Services Lambda\n\n• Azure Functions\n\n• Google Cloud Functions\n\
  \n• IBM Cloud Functions\n\n• Apache OpenWhisk\n\n每个平台都有其优势和劣势，因此你需要为你的项目选择合适的平台。\n\
  \n**无服务器计算平台的主要组件**\n\n无服务器平台通常构建在 Amazon Web Services (AWS)、Microsoft Azure 或 Google\
  \ Cloud Platform (GCP) 等云基础设施平台之上。这些平台提供运行代码所需的全部资源，包括存储、网络和计算资源。无服务器计算平台的主要组件包括：\n\
  \n![](img/index-152_1.png)\n\n第 5 章 微服务架构\n\n• **函数（Functions）**—这些是你编写并部署到无服务器平台的代码片段。每个函数都可以由事件触发，例如用户上传或支付。\n\
  \n• **事件（Events）**—这些是触发函数的事件，例如用户上传或支付。\n\n• **存储（Storage）**—这是存放你的代码和数据的地方。\n\n\
  • **网络（Networking）**—这是你的函数彼此通信以及与外部世界通信的方式。\n\n• **计算资源（Computing resources）**—这些是函数运行所需的资源，例如\
  \ CPU 和内存。\n\n[无服务器应用程序](https://en.wikipedia.org/wiki/Serverless_computing)运行在完全无状态的环境中。在无服务器应用程序中，你使用函数即服务（FaaS）将代码打包并部署为独立可执行单元。代码会响应诸如传入\
  \ HTTP 请求之类的事件\n\n\n\n或上传文件到 S3 存储桶。运行无服务器应用意味着你不需要预置或管理传统服务器。云服务提供商的基础设施会按需执行应用，并在不再需要时将其关闭。常见的\
  \ FaaS 服务包括 AWS Lambda、Azure Functions 和 Google Cloud Functions。\n\n无服务器应用可以显著简化应用的部署与管理，因为无需担心服务器或扩缩容。参见图\
  \ 5-2.\n\n***图 5-2。** 无服务器应用*\n\n第 5 章 微服务架构\n\n这种方法比使用容器更容易管理，而且成本可能更低，因为\n\n你只需为代码运行的时间付费。不过，无服务器部署的灵活性较低，效率也可能更差。\n\
  \n**无服务器应用 vs. 容器**\n\n在云计算领域，部署应用主要有两种方式：容器和无服务器应用。两者各有优点和缺点。那么哪一种更适合你的应用？既然你已经对这两种方式有了基本了解，接下来我们来看看它们各自的利弊。\n\
  \n**开发难易度**\n\n开发者始终面临着快速产出高质量代码的压力。这\n\n可能是一项艰巨的任务，尤其是在你使用新技术时。开发难易度指的是快速、轻松开发应用的能力。这可以通过多种方式衡量，例如你能多快启动并运行、进行修改有多容易，以及会遇到多少错误。\n\
  \n**基于容器的应用**\n\n你可以使用自己选择的框架或编程语言来开发容器化应用，然后将其编译为可在任何具备相同运行时依赖的机器上运行的二进制文件。借助容器，你可以快速\n\
  \n搭建与生产环境一致的开发环境。这\n\n有助于加快开发速度并减少生产环境中的意外情况。它也让你能够轻松地在本地机器上开发和测试应用。如果你已经熟悉 Docker\
  \ 并知道如何创建镜像，那么你很可能可以很快上手基于容器的应用。\n\n**无服务器应用**\n\n无服务器应用通常使用主流编程语言之一，但\n\n你不会将它们编译成二进制文件。相反，你会把它们打包成函数。你必须使用提供商的门户或命令行界面来测试和部署它们。与容器化应用相比，开发无服务器应用更容易。这是\
  \ 134\n\n第 5 章 微服务架构\n\n因为你不需要操心容器或服务器的搭建与管理。\n\n这些都由提供商替你处理。这让你能够专注于代码开发。\n\n你也可以在本地环境中构建并测试代码。\n\
  \n**部署难易度**\n\n部署是一个关键流程，因为它会将代码投放到生产环境。它包括\n\n将代码配置为可在实时环境中使用，测试其是否按预期工作，然后将其部署到一台或多台服务器。代码部署完成后，你还需要配置并管理环境，以确保其平稳运行并满足\n\
  \n你的业务或组织需求\n\n**基于容器的应用**\n\n基于容器的应用易于部署，因为你可以将其打包并迁移\n\n到任何服务器，而无需担心兼容性问题。你还可以使用\n\
  \n像 Kubernetes 这样的容器编排平台来大规模部署和管理容器。容器化应用也可以借助 Puppet、Chef 或 Ansible 等自动化工具进行部署。这使得在多台机器上部署它们变得很容易。\n\
  \n**无服务器应用**\n\n对于无服务器应用，你无需预置任何基础设施，但你确实需要一个 FaaS 提供商。这些提供商提供的功能集通常比\n\n\n\n容器平台。无服务器应用通过云提供商的门户或命令行界面进行部署。这可能需要一定的学习曲线，但通常比较容易。\n\
  \n部署过程并不能保证总是一帆风顺。每个提供商部署应用的方法都不同，而配置和维护代码是你的责任。虽然有许多公共库和工具，但要为你的特定应用和平台找到合适的工具可能并不容易。\n\
  \n**云计算成本**\n\n许多公司依赖公共云服务提供商来满足其基础设施需求。\n\n云计算成本是指使用计算、存储和网络资源等云服务的[费用](https://customerthink.com/how-much-does-it-cost-to-build-cloud-computing-service/)。\n\
  \n第 5 章 微服务架构\n\n**基于容器的应用**\n\n基于容器的应用运行成本可能高于无服务器应用。\n\n这是因为容器通常需要更多资源（例如 CPU、内存、磁盘）。\n\
  \n因此，如果你选择在公共云提供商上部署基于容器的应用，你的云账单会更高。\n\n**无服务器应用**\n\n无服务器应用的运行成本通常比基于容器的应用低得多。\n\
  \n这是因为你只需为应用实际执行的时间付费，而不是为服务器整个运行时长付费（后者可能是全天候 24/7）。\n\n此外，无服务器应用会自动扩展以满足需求，因此当流量激增时，你无需担心额外服务器的预置问题。\n\
  \n**可移植性**\n\n可移植性是指将应用从一个提供商迁移到另一个提供商并且相对容易实现的能力。\n\n**基于容器的应用**\n\n你可以以较小代价将基于容器的应用从一个提供商迁移到另一个提供商。云原生应用是为充分利用云而构建的。它们\n\
  \n被设计为可移植、可扩展且具备弹性。在云原生应用中，你通常会看到可以轻松部署和扩展的微服务。\n\n基于容器的应用非常适合云原生应用。容器使代码能够轻松打包并作为独立可执行单元进行部署。它们还允许你在同一台服务器上运行多个容器，从而便于扩展应用。\n\
  \n**无服务器应用**\n\n无服务器应用不像基于容器的应用那样具有可移植性。这是因为无服务器应用与提供商的基础设施紧密耦合。\n\n如果你想将应用迁移到另一个提供商，你很可能需要\n\
  \n花费大量时间和精力来修改代码。使用无服务器应用的一个主要\n\n缺点是供应商锁定。供应商锁定发生在 136\n\n第 5 章 微服务架构\n\n你被锁定在某个特定供应商上而无法轻松切换时。如果你所绑定的提供商决定涨价或更改条款和\n\
  \n条件，这就会成为一个问题。\n\n**可扩展性与性能**\n\n可扩展性衡量的是系统或应用在支持更多用户或流量时维持性能的能力。性能是指系统或应用在处理给定工作负载水平时的执行速度。\n\
  \n**基于容器的应用**\n\n容器化应用通常比无服务器应用更具可扩展性，\n\n因为你可以轻松添加或移除容器以满足扩展\n\n需求。此外，容器比无服务器\n\
  \n应用提供更高程度的隔离性。如果一个容器发生故障，也不会影响其他容器。然而，这在无服务器应用中可能会成为问题。\n\n**无服务器应用**\n\n无服务器平台会在应对增量负载挑战时维持可扩展性和性能。它不适合需要快速响应的应用。与在专用服务器上运行应用相比，你可能会经历一定的延迟。\n\
  \n\n\n因为云服务提供商会按需执行无服务器应用程序。\n\n**安全性考量**\n\n对于任何应用程序而言，安全性始终是一个关键考量。\n\n**无服务器应用程序**\n\
  \n默认情况下，无服务器应用程序是安全的。无服务器平台提供商会承担许多\n\n[安全任务](https://www.traceable.ai/use-cases/api-discovery-and-risk-management)，例如打补丁，而这些原本需要你自己完成。此外，大多数\
  \ FaaS 提供商还提供内置安全功能，例如加密和访问控制。\n\n然而，无服务器应用程序可能容易受到分布式拒绝服务\n\n（DDoS）攻击。由于你的应用运行在提供商的基础设施上，黑客可能会一次性向你的应用发送大量请求，使其不堪重负并导致宕机。\n\
  \n第 5 章 微服务架构\n\n你通常会使用像 Node.js 这样的流行框架来创建无服务器应用程序，而这些框架可能存在一些固有的安全缺陷。如果你的应用没有得到充分保护，黑客可能会[攻破它。](https://www.traceable.ai/blog-post/use-the-owasp-api-top-10-to-secure-your-apis)\n\
  \n**基于容器的应用程序**\n\n你可以让基于容器的应用程序比无服务器应用程序更安全。\n\n通过在专用基础设施上运行它们，与使用云服务提供商的基础设施相比，你可以更好地保护你的应用程序。\n\
  \n此外，由于容器是自包含的，黑客通常更难访问代码和数据。不过，你需要自行管理容器的安全性；如果你不是安全专家，这可能会很困难。\n\n如果你需要高度隔离或可扩展性，容器可能是正确的\n\
  \n选择。不过，如果你需要简洁性和开发便利性，无服务器可能是更好的选择。基于容器的应用程序比无服务器提供了更高的灵活性和控制力，但也需要更多的管理和专业能力。不过，使用容器也有一些潜在\n\
  \n缺点。它们要求你管理和配置服务器，而且其开发难度可能高于无服务器应用程序。\n\n**微服务部署模式**\n\n微服务架构是当今应用开发中最流行的趋势。\n\
  \n它们是实现更快开发并为客户和用户交付更优解决方案的绝佳方式。部署微服务对组织至关重要。微服务使你的开发团队能够更快推出软件解决方案，并更好地响应客户需求。\n\
  \n之所以能够做到这一点，是因为开发人员还可以加快开发和测试\n\n周期、减少错误并快速修复缺陷。尽管微服务架构提供了多种优势，但由于引入了额外复杂性，它们也存在一些缺点。\n\
  \n**关键考量**\n\n以下是与微服务部署相关、任何\n\n组织都必须了解的一些关键考量：\n\n第 5 章 微服务架构\n\n• 在运行时拥有大量服务、依赖关系和交互\n\
  \n会使项目难以管理。\n\n• 多个微服务之间的通信会带来更多\n\n故障机会。你的开发团队必须非常熟悉\n\n分布式系统。他们必须能够处理由\n\n网络延迟和负载均衡引发的问题。\n\
  \n• 你的开发团队还需要具备合适的 DevOps、网络\n\n和安全技能，才能交付微服务。你的团队还必须\n\n理解相关概念、编码风格和测试用例，这可能\n\n\
  需要更多时间和精力。\n\n• 微服务的升级与发布需要大量协调\n\n不同工程团队之间的工作。此外，你的团队必须\n\n在分布式环境中执行复杂测试。幸运的是，\n\
  \n微服务部署策略可以帮助你克服这些\n\n挑战并将停机时间降到最低。\n\n**微服务部署策略与模式**\n\n微服务部署模式是一种用于更新和修改的技术\n\n\
  \n\n软件组件。微服务部署模式或策略能够实现轻松部署，\n\n并允许你修改微服务。\n\n以下各小节列出了有助于\n\n提升微服务可用性的微服务部署模式。\n\
  \n**金丝雀部署**\n\n这是微服务部署中一种广为人知的策略。*金丝雀*是一个候选版本的微服务，只接收一小部分流量。\n\n这包括先将新版本微服务发布到仅占总负载一小部分的\n\
  \n流量中，并观察其是否按预期运行。随着微服务通过严格测试，它会逐步承载更大的工作负载。如果金丝雀版本运行不正确，流量可以被路由到稳定版本，同时对问题进行调查与调试。金丝雀回滚是指定期将微服务回滚的过程。\n\
  \n第 5 章 微服务架构\n\n金丝雀部署策略一次只发布一个微服务。\n\n对于关键性更高且风险更大的微服务，可以先于其他微服务上线。它通过在关键微服务暴露给整个系统之前尽早发现问题，从而提升可用性。\n\
  \n**金丝雀部署的陷阱**\n\n这种方法最大的潜在陷阱是可能过早发布微服务。金丝雀发布通常是流量有限、规模较小的微服务。部署过程中的频繁问题也会拖慢开发进度。\n\
  \n**蓝绿部署**\n\n蓝绿部署策略是在生产环境中同时维护两种微服务变体。\n\n其中一个微服务版本（蓝色微服务）\n\n对用户可见并承接流量。另一个（绿色微服务）保持空闲，供开发人员进行更新。微服务会保持在蓝色状态，直到通过测试并准备发布。通过所有测试后，微服务会切换到绿色状态，在该状态下承接流量并对用户可见。不过，微服务会被持续监控，以检测其表现是否良好，或是否需要回退到蓝色状态。\n\
  \n蓝绿部署可以通过在开发与部署期间保持微服务\n\n可用来提升可用性。在\n\n开发和部署期间不会出现停机，因为始终有另一个稳定变体在服务\n\n生产流量。此外，如果新部署运行不正确，你可以快速回滚到之前的变体（即蓝色微服务）。\n\
  \n**蓝绿部署策略的陷阱**\n\n微服务版本不匹配是蓝绿部署的一个潜在陷阱。另一个陷阱是微服务需要持续监控以发现问题。这会导致成本和时间增加。\n\n**暗发布**\n\
  \n暗发布是一种将更新部署到仅面向一小部分用户群体的微服务的技术。它不会影响整个系统。当你对一个新功能进行暗发布时，最初会对大多数终端用户隐藏该功能。发布受众可能会有所不同\
  \ 140\n\n第 5 章 微服务架构\n\n具体取决于使用场景和业务需求。暗发布的过程\n\n包括在与生产环境隔离的环境中构建新版本微服务。\n\n功能测试完成后，你会先将其部署到预生产或测试\n\
  \n环境中，并逐步扩大发布范围，直到所有用户都能接触到它。\n\n随后，如果你发现该功能运行良好，就继续将其部署给更多用户使用。\n\n功能开关是渐进式发布更新的好方法。你可以轻松地\n\
  \n开启或关闭功能。这样一来，你就可以在不完全上线的情况下测试其影响。在测试阶段，你可以选择将哪些流量路由到功能开关之后的微服务。当微服务经过测试并证明在真实负载下适用时，它会被激活以承接整个生产环境的流量。\n\
  \n暗发布最大的好处之一是，你可以在发布产品前进行更多测试，\n\n这让你能够及早发现缺陷，从而节省在生产环境中修复缺陷所需的时间和成本。\n\n暗发布还允许开发团队在终端用户可见之前\n\
  \n测试新的系统架构。该策略允许将部署受控地推送给预先确定的受众，这些受众在统计上更有可能使用该微服务。这将使你能够在部署到生产环境之前获得关键洞察。\n\n\
  **暗发布的陷阱**\n\n暗发布最大的潜在陷阱是它可能会过早发布微服务。另一个缺点是微服务位于功能开关之后，这可能\n\n导致调试微服务所需的成本和时间增加。此外，为了支持持续开发，团队必须能够在开发过程中将微服务置于功能\n\
  \n开关之后。\n\n**分阶段发布**\n\n用于微服务的分阶段发布部署策略是指一次向一个环境逐步发布微服务。例如，你的开发团队\n\n应先将微服务发布到测试环境，之后再发布到生产环境。\n\
  \n第 5 章 微服务架构\n\n在确认微服务在测试环境中是安全的之前，不要在生产环境中启用它们。分阶段发布策略会按增量方式部署每个服务。这\n\n可确保每个服务两次故障之间的间隔时间比同时部署时更长。它通过在时间上错开多个服务的故障来保持高可用性。这也提供了更好的恢复能力。\n\
  \n**分阶段发布的陷阱**\n\n在这种方法中，当微服务被引入\n\n新环境时，可能会出现停机。一次部署大批量变更可能会让\n\n开发团队难以诊断故障并从故障中恢复。此外，你的开发流程必须将所有变更作为单一批次部署。这意味着任何错误都需要他们为每个微服务回滚整个发布流程。\n\
  \n**微服务管理**\n\n对于工程经验有限\n\n或尚未建立最佳实践的组织而言，部署微服务可能非常具有挑战性。技术选型也会发挥作用，因为某些微服务需要更多管理，尤其是处于高频迭代平台中的微服务。\n\
  \n这些微服务需要持续关注以提升其性能、安全性、扩展能力等。\n\n**总结**\n\n在本章中，你学习了微服务架构。你还了解了其他各种流行的软件设计方法及其优缺点。当\n\
  \n正确实施时，微服务可以帮助你创建由松耦合服务\n\n组成、且更易于管理和扩展的应用程序。\n\n然而，使用这种架构风格也伴随着一些挑战。\n\n为处理服务间故障制定策略并谨慎考虑服务如何交互非常重要。在接下来的章节中，你将学习如何\n\
  \n使用 Eclipse MicroProfile 实现完整的微服务解决方案。你还将学习如何在 Docker 容器中部署它们，并使用 Kubernetes 对其进行编排。\n\
  \n**第 6 章**\n\n**Eclipse MicroProfile**\n\n**框架**\n\n在本章中，你将了解 Eclipse MicroProfile\
  \ 架构。本章还涵盖了 Eclipse MicroProfile 中最基础且最关键的标准，即配置、健康检查、容错、指标、RESTful Web 服务、开放追踪和开放\
  \ API。\n\n**什么是 Eclipse MicroProfile 框架？**\n\n\n\nEclipse MicroPr[ofile (https://microprofile.io/](https://microprofile.io/))\
  \ 是一项标准，它提供了一组模块化的 Jakarta EE（[`jakarta.ee/`](https://jakarta.ee/) *）* 及与微服务相关的特性，适用于微服务架构下的应用开发。其目标是针对微服务架构优化\
  \ Enterprise Java，促进通用标准的使用，并避免供应商锁定。\n\nEclipse MicroProfile 规范应对了微服务的挑战，\n\n例如分布式追踪、健康检查和安全性。它还提供了用于响应式编程、JSON\
  \ 处理和 RESTful Web 服务的 API。\n\nMicroProfile 项目（[`projects.eclipse.org/projects/technology.`](https://projects.eclipse.org/projects/technology.microprofile)\n\
  \n[microprofile](https://projects.eclipse.org/projects/technology.microprofile)\
  \ *）* 由 Red Hat、IBM、Payara、Tomitribe 和 LJC（伦敦 Java 社区）于 2016 年发起。该项目现作为 Eclipse\n\
  \n基金会旗下的开源项目运行。MicroProfile 是一组提供微服务框架的规范。\n\n它定义了若干 Jakarta EE 规范和 API，以便更容易开发和部署微服务。\n\
  \n© Tarun Telang 2023\n\nT. Telang，*Beginning Cloud Native Development with MicroProfile,\
  \ Jakarta EE, and Kubernetes*，\n\n[`doi.org/10.1007/978-1-4842-8832-0_6`](https://doi.org/10.1007/978-1-4842-8832-0_6#DOI)\n\
  \n![](img/index-163_1.jpg)\n\n第 6 章 eClipse MiCroprofile 框架\n\n**MicroProfile 中的功能分层**\n\
  \nMicroProfile 旨在与 Jakarta EE 协同工作。它有三层功能。底层包括 RESTful Web 服务、REST 客户端、依赖注入、JSON\n\
  \n处理和响应式流操作符。中间层包含 Open API、配置、容错和安全（JWT 传播）等特性。顶层包含指标、追踪和健康检查等特性。图 e 6-1 depicts\
  \ these 展示了这三层。\n\n***图 6-1。** MicroProfile 中的三层功能*\n\nOpen Liberty 对 MicroProfile\
  \ 功能的三层都提供了完整支持。\n\n底层包含以下标准：\n\n• **Jakarta 注解** [(https://jakarta.ee/specifications/](https://jakarta.ee/specifications/annotations/)\n\
  \n[annotations/](https://jakarta.ee/specifications/annotations/))：Open Liberty 支持\
  \ Jakarta 注解的最新版本，这是 Java 注解事实上的标准。该\n\nJakarta Annotations API 使你能够编写类型安全的声明式代码。\n\
  \n• **JSON-P** [*(* https://jakarta.ee/specifications/jsonp/](https://jakarta.ee/specifications/jsonp/))：JSON\n\
  \n处理（即 JSON-P）API 提供了一种可移植的方式来解析和\n\n生成 JSON 数据。Jakarta JSON Processing 是 Jakarta\
