  \n要验证镜像是否已构建，请运行 `docker images` 命令以列出所有本地 Docker 镜像：\n\n$ `docker images`\n\n你应该会在\
  \ Docker 镜像列表中看到一行包含你的 Docker 镜像，如下所示：\n\n仓库 标签 镜像 ID 创建时间 大小\n\nopenliberty-mp-demo\
  \ 1.0-SNAPSHOT b5cd482cfb55 3 周前 886MB\n\n现在你可以使用 `docker run` 命令来运行你的应用程序：\n\n\
  $ `docker run -d --name product-ws -p 9080:9080 openliberty-mp-\ndemo:1.0-SNAPSHOT`\n\
  \n这将启动一个名为 product-ws 的 Docker 容器。`-d` 选项用于以*分离*模式运行容器。`-p` 选项用于在主机与容器之间进行端口映射。在本例中，容器内的\
  \ 9080 端口将映射到你本地机器上的同一端口。\n\n你可以使用 `docker ps` 命令来验证容器是否正在运行，如下所示：\n\n$ `docker\
  \ ps`\n\n请确保容器状态为 up。\n\n这将使用 my-liberty-app 镜像启动一个容器，并将主机上的 9080 端口映射到容器中的 9080\
  \ 端口。现在你应该可以通过 http://localhost:9080\\. 访问你的 222\n\n第 9 章 使用 Kubernetes 对微服务进行容器化\n\
  \n应用程序。即使你在 Docker 容器中运行它，该应用程序也可以通过相同的 URL 访问。\n\n你可以使用以下命令停止应用程序：\n\n$ `docker\
  \ stop product-ws`\n\n`docker stop` 命令用于停止正在运行的容器。在本示例中，你停止了名为 product-ws 的容器。\n\
  \n要移除容器，请运行以下命令：\n\n$ `docker rm product-ws`\n\n`docker rm` 命令用于移除已停止的容器。在本示例中，\n\
  \n你移除了名为 product-ws 的容器。\n\n要移除镜像，请运行以下命令：\n\n$ `docker rmi openliberty/open-liberty`\n\
  \n`docker rmi` 命令用于移除镜像。在本示例中，你移除了名为 openliberty/open-liberty 的镜像。\n\n**将 Docker\
  \ 镜像推送到 Docker Hub**\n\n如果你还没有 Docker Hub 账户，请先创建一个。有了 Docker Hub 账户后，使用以下命令登录：\n\
  \n$ `docker login -u <username> -p <password>`\n\n将 `<username>` 和 `<password>`\
  \ 替换为你的 Docker Hub 用户名和密码。\n\n警告！通过 CLI 使用 --password 是不安全的。请使用 --password-stdin。\n\
  \n警告！你的密码将以未加密形式存储在 /home/theia/.docker/\n\nconfig.json 中。\n\n配置凭据助手以消除此警告。请参阅\n\
  \nhttps://docs.docker.com/engine/reference/commandline/\n\nlogin/#credentials-store\n\
  \n登录成功\n\n第 9 章 使用 Kubernetes 对微服务进行容器化\n\n如果你看到此输出，说明你已成功登录 Docker Hub。你必须先为镜像打标签，\n\
  \n然后才能将其推送到 Docker Hub。Docker Hub 使用这些标签作为命名空间来标识镜像。\n\n要为镜像打标签，请运行以下命令：\n\n`docker\
  \ tag <image-id> <username>/< image-name >:<tag>`\n\n例如，如果你的用户名是 taruntelang，仓库是\
  \ openliberty-\n\nmp- demo，你可以这样为镜像打标签：\n\n$ `docker tag openliberty-mp-demo:1.0-SNAPSHOT\
  \ taruntelang/openliberty-mp-\ndemo:1.0-SNAPSHOT`\n\nlatest 标签表示这是镜像的最新版本。你也可以使用其他标签（如\
