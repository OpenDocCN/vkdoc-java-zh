  \ 字体显示，例如下面这个（可运行的）示例：\n\npublic class MyExample {\n\npublic static void main(String[]\
  \ args){\n\nSystem.out.println(\"Jakarta EE is excellent!\");\n\n}\n\n}\n\n**下载代码**\n\
  \n本书中的代码示例可在 github.com/apress/beginning-cloud-\nnative-dev-microprofile-jakarta-kubernetes\
  \ 获取。\n\n**注意** 本书的源码可能会随时间发生变化，以便纳入 Jakarta ee、MicroProfile 以及 Kubernetes 平台中的最新特性。\n\
  \n如果你在源码中发现任何问题，请通过本书的 Github\n仓库提交，代码将据此进行相应调整。\n\nxxii\n\n**第 1 章**\n\n**云计算导论**\n\
  \n云计算是科技行业最新的流行词，而且这并非没有道理。它有潜力彻底改变人们使用计算机的方式。本章将介绍云计算并解释它是什么。你还将看到一些云计算示例，并了解使用这项新技术的好处。最后，你将探索云计算的不同类型，并了解它们如何随着时间演进。\n\
  \n**云计算简介**\n\n云计算是一种计算方式，其中应用和数据等资源存储在远程服务器上，并通过互联网进行访问。你无需在自己的计算机上安装程序，而是可以访问或将程序保存在远程服务器上。因此，你可以通过任何可联网设备访问你的数据，无论是台式机、笔记本电脑、平板电脑还是智能手机。\n\
  \n云计算具有以下关键优势。它能够提供无处不在、便捷、按需的网络访问，以访问可配置计算资源共享池（例如网络、服务器、存储、应用和服务），这些资源可以在极少管理工作或极少服务提供商交互的情况下被快速配置和释放。图\
  \ 1-1\n展示了终端用户如何访问云计算。\n\n© Tarun Telang 2023\n\nT. Telang，*《使用 MicroProfile、Jakarta\
  \ EE 和 Kubernetes 开始云原生开发》*，\n\n[`doi.org/10.1007/978-1-4842-8832-0_1`](https://doi.org/10.1007/978-1-4842-8832-0_1#DOI)\n\
  \n![](img/index-22_1.png)\n\n第 1 章 云计算导论\n\n***图 1-1。** 云计算*\n\n云计算还具有环境效益，因为它减少了对高能耗硬件的需求。\n\
  \n**云计算示例**\n\n云计算有许多不同的示例，其中一些最常见的包括：\n\n• **电子邮件：** *Gmail、Yahoo Mail* 和 *Outlook.com*\
  \ 都是基于云的电子邮件服务示例。这意味着无论你身处世界何地，都可以在智能手机、平板电脑或台式电脑上查看电子邮件。能够通过任何联网设备访问电子邮件，正是云计算的一个例子。如果你在度假或出差时需要查看邮件，这是一项非常出色的功能。此外，如果你不小心删除了一封邮件，也可以很快从云端恢复。\n\
  \n第 1 章 云计算导论\n\n• **云存储：** *Dropbox、Google Drive* 和 *iCloud* 都是云存储服务示例。这意味着你可以将文件存储在线上，而不是存储在自己的计算机上。这样你就能够通过任何联网设备访问这些文件。\n\
  \n• **基于 Web 的生产力软件：** *Google Docs、Sheets* 和 *Slides* 都是基于云的生产力软件示例。这意味着你无需在计算机上安装程序，就可以通过任何联网设备创建和编辑文档、电子表格和演示文稿。\n\
  \n云存储优于将文档保存在你的计算机上\n\n\n\n因为你可以从任何能够连接互联网的设备访问它们。\n\n如果你需要在不同地点处理同一份文档，或者你不小心删掉了某个文档，这会很有帮助。此外，云存储还让人们在项目中协作变得更容易，因为他们可以同时处理同一份文档，而不必担心通过电子邮件互相发送文档的不同版本。\n\
  \n• **多媒体流媒体：**Netflix、Vimeo 和 YouTube 都是视频流服务的例子，而 Spotify、Apple Music 和 Pandora\
  \ 都是基于云的音乐流服务的例子。这意味着你无需将媒体（视频或歌曲）下载到电脑上，而是可以在任何能够连接互联网的设备上观看或收听。媒体流行的原因在于它不会占用你设备上的存储空间，而且你可以无需等待下载完成就观看视频。图\
  \ 1-2 展示了不同类型的云计算应用。这些只是云计算的一小部分示例。正如你所看到的，云计算在很多方面都非常有帮助。\n\n![](img/index-24_1.png)\n\
  \n第 1 章 云计算导论\n\n***图 1-2。** 云计算应用类型*\n\n**云计算的优势**\n\n近年来，云计算的使用呈指数级增长。这是因为云计算可以带来多种优势，例如以下几点：\n\
  \n• **节省成本：**云计算可以帮你节省硬件和软件成本。例如，你可以使用基于云的存储服务，而不是购买实体硬盘。与购买实体硬盘相比，云存储通常更具成本效益。这是因为你不需要购买昂贵的硬件，比如计算机。你还可以通过使用云应用来节省软件成本，而不必为本地机器购买软件程序。这是云解决方案的一个重要优势——你不必担心硬件和软件的资本支出、定期打补丁或数据中心维护。这些任务都由提供商负责。这可以为你节省时间和金钱，也让你能够轻松开始使用云计算。\n\
  \n• **灵活性与可扩展性：**云计算让你能够根据需求向上或向下扩展资源。例如，如果你的网站流量突然增加，你可以快速添加更多服务器来处理负载。相反，如果流量减少，你可以移除服务器以节省成本。这同样可以降低你的计算开销。\n\
  \n第 1 章 云计算导论\n\n• **可靠性：**基于云的服务比本地部署方案更可靠。这是因为云服务提供商拥有资源与专业能力来确保其服务始终可用。云服务分布在多个服务器上，因此不存在单点故障。数据会在多个可用区的多个服务器之间进行复制，因此即使某一台服务器宕机，其他服务器也可以接管工作。提供商还会部署灾难恢复计划，从而帮助确保你的数据始终安全且可访问。\n\
  \n• **生产力：**云计算可以提升团队生产力，使团队能够从世界任何地方访问信息和应用程序。\n\n**云计算的基本特征**\n\n云计算模型包含五个基本特征，如图\
  \ 1-3 所示。它们分别是按需自助服务、广泛网络访问、资源池化、快速弹性和可计量服务。下面我们将详细看看这些特征。\n\n![](img/index-26_1.jpg)\n\
  \n第 1 章 云计算导论\n\n***图 1-3。** 云计算的基本特征*\n\n**按需自助服务**\n\n用户无需与服务提供商直接交互即可访问云服务。他们只需通过基于\
  \ Web 的界面注册服务，就可以立即开始使用。例如，用户可以注册云服务并开始用其存储数据，而无需联系客户支持。这一特征使用户能够快速、轻松地开始使用云服务，而不需要复杂配置。\n\
  \n**广泛网络访问**\n\n云服务可以通过网络使用任何标准设备访问，例如笔记本电脑、智能手机和平板电脑。例如，用户可以在世界任何地方通过笔记本电脑或智能手机访问其云存储账户。这一特征使云服务非常便捷且易于访问。\n\
  \n**资源池化**\n\n云服务提供商将来自多个客户的存储、处理能力、内存和网络带宽等资源汇集起来，并按需提供。多租户是云计算的一项关键特性，它使提供商能够在多个客户之间共享资源。在该模型中，每位客户都会获得专属的一部分资源，并与其他客户相互隔离。这有助于提供商更有效地管理和监控资源，同时为客户带来更高的安全性与隐私保障。这一特征也有助于提高资源利用率并降低拥有成本。\n\
  \n第 1 章 云计算导论\n\n**快速弹性**\n\n云服务可以快速扩展或收缩，以满足用户不断变化的需求。在某些情况下，消费者可以根据云提供商的策略自动扩大或缩减其使用量。例如，社交网站在重大事件期间（如选举或自然灾害）可能需要快速增加更多服务器。在其他情况下，用户可能需要减少使用量以节省成本。这一特征使云提供商能够动态分配资源，并可根据需要灵活增加或减少资源使用。\n\
  \n**可计量服务**\n\n云提供商提供按实际使用量计费的计量服务。此外，云系统还可以利用计量模式自动控制并优化资源。例如，当某段时间内数据未被访问时，云存储服务可能会自动将其迁移到成本更低的存储层级。这一特征让用户能够更好地控制其使用情况和成本。\n\
  \n**基于部署模型的云计算类型**\n\n云计算主要有四种类型：公有云、社区云、私有云和混合云。图 1-4 展示了这些基于部署模型的不同云计算类型。\n\n\
  ![](img/index-28_1.png)\n\n第 1 章 云计算导论\n\n***图 1-4。** 基于部署模型的云计算类型*\n\n以下各节将详细讨论每一种云计算类型。\n\
  \n**公有云**\n\n公有云是一种通过互联网提供托管服务的云计算类型。公有云由第三方公司拥有并运营，它们按需向客户提供其资源——例如服务器、存储和应用程序。\n\
  \n公有云最常见的例子是 Gmail 和 Dropbox。这些服务允许用户通过任何可连接互联网的设备访问其数据和应用程序。\n\n**公有云的优势**\n\n\
  使用公有云的主要优点是其可扩展性很高，而且你只需为所使用的资源付费。例如，如果你需要在 Gmail 中存储更多数据，你可以购买更多存储空间。公有云还很便利，因为你可以在全球任何地方访问它。\n\
  \n第 1 章 云计算导论\n\n**公有云的缺点**\n\n使用公有云的主要缺点是你依赖于云\n\n\n\n提供商的安全措施。例如，如果 Dropbox 发生数据泄露，你的数据就会面临风险。此外，公有云的可靠性可能低于私有云，因为它们会受到云提供商无法控制的中断影响。\n\
  \n**社区云**\n\n社区云是一种计算模型，向具有共同需求或目标的用户社区提供共享应用和数据。它在社区内部促进协作、灵活性和标准化，同时为用户提供可个性化的自助服务环境。云基础设施专为某一特定消费者社区独占使用而配置，这些消费者来自在共同关注点（如使命、安全要求、政策与合规考量）上具有一致性的组织。\n\
  \n社区云模型可用于支持多种类型的社区，包括：\n\n–\n\n**技术型**：开发者、工程师或其他技术导向用户，  \n他们共享联合开发或运营目标。\n\n\
  –\n\n**业务型**：同一公司或组织内的员工，  \n他们需要在项目上协作或访问共享数据。\n\n–\n\n**地理型**：居住在同一区域或城市的人群， \
  \ \n他们希望在线建立连接。\n\n–\n\n**兴趣型**：拥有共同兴趣或爱好的用户，  \n他们希望建立连接并共享信息。\n\n社区云通常由组织或用户共同建立，他们汇集资源并创建共享基础设施。该基础设施可用于托管应用、存储数据，或向社区成员提供其他服务。在许多情况下，社区云由第三方提供商管理，后者负责维护底层基础设施。\n\
  \n第 1 章 云计算导论\n\n**社区云的优势**\n\n社区云可为用户提供诸多优势，包括：\n\n• **降低成本：**通过共享资源和分摊费用，用户可以节省计算成本。\n\
  \n• **改进协作：**社区云可让用户更容易在项目上协作或访问共享数据。\n\n• **增强安全性：**社区云可为用户提供更好的安全与隐私保护。\n\n• **提升性能：**通过共享资源，社区云可提升用户应用与服务的性能。\n\
  \n通常，社区云会在若干组织之间共享基础设施，这些组织来自具有相似关注点（安全、合规、司法管辖等）的特定群体或行业，并决定通过合作来优化资源利用、降低成本。一般而言，每个组织使用社区云基础设施中的一部分，并按其实际使用量付费。\n\
  \n**社区云的局限性**\n\n对于需要共享数据或在项目上协作的组织来说，社区云可能是一个强有力的工具。尽管如此，在实施该方案之前，必须评估其潜在风险与收益。在某些情况下，社区云未必是组织的最佳选择，尤其当存在安全或隐私方面的担忧时。\n\
  \n组织在决定是否实施社区云时，还应考虑以下因素：\n\n• 我的组织是否具备管理社区云所需的资源？\n\n• 是否存在需要考虑的安全或隐私问题？\n\n• 实施社区云相关的成本有哪些？\n\
  \n• 使用社区云能带来哪些收益？\n\n• 使用社区云是否存在潜在风险？\n\n第 1 章 云计算导论\n\n社区云可以是提升协作、降低成本的良好方式，但在实施该方案之前，务必评估其潜在风险与收益。\n\
  \n**私有云**\n\n私有云是一种云计算类型，它通过专有架构提供与公有云相似的优势，包括可扩展性和自助服务。\n\n\n\n私有云建立在私有网络之上，相比公有云提供了更高的安全性和控制力。\n\
  \n当组织选择部署私有云时，可以将其数据和应用保留在内部，也可以外包给第三方提供商。\n\n私有云由单一组织拥有并运营。这意味着只有该组织的成员才能访问该服务。\n\
  \n**私有云的优势**\n\n使用私有云有若干优势，包括：\n\n• **更高的安全性与控制力：** 私有云在私有网络上部署，相比公有云提供更高的安全性和控制能力。\n\
  \n• **更好的性能：** 私有云可以提供更好的性能，因为它不与其他组织共享。\n\n• **降低成本：** 私有云可能比公有云更具成本效益，尤其是对具备必要基础设施的组织而言。\n\
  \n**私有云的劣势**\n\n尽管有这些优势，私有云也存在一些相关挑战。\n\n• 与公有云相比，私有云的部署和管理可能更复杂。此外，私有云可能需要更高的前期投入。\n\
  \n• 组织在决定私有云是否是正确解决方案之前，应仔细评估自身需求。\n\n第 1 章 云计算导论\n\n私有云并不适用于所有人，但对于那些需要更高安全性与控制力或更好性能的组织来说，它可能是一个极佳的选择。\n\
  \n私有云通常被大型组织使用，例如银行和政府机构。\n\n**混合云**\n\n混合云将本地基础设施——或私有云——与公有云结合在一起。这种组合可以帮助组织在保持对敏感数据控制的同时，更便捷且更安全地访问数据和应用。混合云通常被需要对特定数据保密的组织采用。混合云的一个例子是：组织将部分数据和应用存储在私有云中，而将其他数据存储在公有云中。这种组合可以帮助组织在保持对敏感数据更严格控制的同时，更便捷且更安全地访问数据和应用。\n\
  \n**混合云的优势**\n\n使用混合云有若干优势，包括：\n\n• **更高的灵活性：** 采用混合云后，组织可以根据需要更容易地扩展或缩减资源。这在需求增长时期（例如产品发布期间或节假日购物季）尤其有帮助。\n\
  \n• **更好的安全性：** 通过将敏感数据保留在私有云中，组织可以更好地保护其免受潜在威胁。\n\n• **降低成本：** 组织可通过使用混合云节省资金，因为它们可以利用公有云较低的成本，同时仍保持对其数据的控制。\n\
  \n**混合云的缺点**\n\n使用混合云也有一些潜在缺点，包括：\n\n• **管理复杂：** 同时管理私有云和公有云可能很复杂。组织需要具备相关知识和专业技能的员工来管理这两类环境。\n\
  \n第 1 章 云计算导论\n\n• **成本增加：** 虽然混合云可以为组织节省资金，但其成本也可能高于仅使用私有云或公有云。这是因为组织需要维护和管理两个彼此独立的环境。\n\
  \n• **潜在安全风险：** 尽管混合云可以提供更好的安全性，但仍存在数据泄露的可能。这是因为数据同时存储在公有和私有环境中，增加了未授权人员访问数据的风险。\n\
  \n混合云为组织提供了诸多优势，包括更高的灵活性、更好的安全性和更低的成本。然而，也存在一些潜在缺点，例如管理复杂和成本增加。总体而言，混合\n\n\n\n对于那些既需要保持对其数据控制、又希望利用公有云低成本优势的组织来说，云是一种不错的选择。\n\
  \n**云计算的服务模型**\n\n在你已经了解云计算的基本特性之后，本节将介绍云计算的服务模型。这些服务模型是交付云服务的不同方式。图 1-5 展示了三种最常见的云服务类型，即基础设施即服务（IaaS）、平台即服务（PaaS）和软件即服务（SaaS）。\n\
  \n![](img/index-34_1.jpg)\n\n第 1 章 云计算导论\n\n***图 1-5。** 云计算的服务模型*\n\n以下各节将详细介绍这些服务模型中的每一种。\n\
  \n**软件即服务（SaaS）**\n\n软件即服务（SaaS）是一种通过互联网交付软件应用程序的云计算类型。SaaS 是企业节省 IT 基础设施成本并降低软件应用管理复杂性的一种方式。\n\
  \n借助 SaaS，企业可以访问并使用托管在云中的软件应用程序。\n\n这意味着企业无需安装或管理运行该软件所需的基础设施。SaaS 应用通常通过 Web 浏览器或移动应用进行访问。\n\
  \n向消费者提供的能力是使用运行在云基础设施上的提供商应用程序。应用程序可通过各种客户端设备访问，可采用瘦客户端界面（如 Web 浏览器，例如基于 Web 的电子邮件）或程序接口。消费者不管理也不控制底层云基础设施，包括网络、服务器、操作系统、存储，甚至单个应用程序能力；唯一可能的例外是有限的、用户特定的应用配置设置。\n\
  \n第 1 章 云计算导论\n\n**优势**\n\n使用 SaaS 有很多优势，包括：\n\n• **降低成本：** 使用 SaaS，企业只需按订阅方式为其使用的软件付费。无需投资硬件或\
  \ IT 基础设施。\n\n• **更高灵活性：** SaaS 应用可通过任何连接互联网的设备访问。这使企业能够根据需要轻松扩大或缩减使用规模。\n\n• **更好的安全性：**\
  \ SaaS 提供商通常具备强有力的安全措施来保护数据。\n\n**劣势**\n\n尽管 SaaS 能带来许多好处，但也有一些需要注意的问题，包括：\n\n•\
  \ **供应商锁定：** 一旦企业使用了某个 SaaS 应用，切换到其他提供商可能会很有挑战。这是因为数据通常存储在云中，而更换提供商可能复杂且成本高昂。\n\n\
  • **定制能力有限：** SaaS 应用通常不像本地部署软件那样可高度定制。这可能导致难以满足企业的特定需求。\n\n• **依赖互联网：** SaaS 应用需要互联网连接才能运行。对于网络连接较差的企业来说，这可能是个问题。\n\
  \n尽管存在这些问题，SaaS 仍是各种规模企业的热门选择。它可以是一种具有成本效益且灵活的方式，用于改进业务运营。\n\n**工作原理**\n\n要理解 SaaS\
  \ 的工作方式，先了解一些 SaaS 应用架构会很有帮助。SaaS 应用通常采用多层架构构建。\n\n这意味着应用程序被划分为多个部分：\n\n第 1 章 云计算导论\n\
  \n• **前端：** 这是用户与之交互的应用部分。\n\n• **后端：** 这是存储数据并处理逻辑的应用部分。\n\n• **中间件：** 这是连接前端和后端的应用部分。它通常使用\
  \ Web 应用框架构建。\n\nSaaS 应用托管在云中，这意味着它们被存储在\n\n\n\n服务器网络。当用户想要使用应用程序时，他们会向服务器发送请求。服务器随后将前端代码发送到用户设备。用户设备随后运行代码并显示应用程序的前端。当用户与应用程序交互时，他们的交互会被发送到后端。后端随后\n\
  \n处理请求并将响应发送回用户设备。\n\n**平台即服务（PaaS）**\n\nPaaS 是一种云计算服务，为用户提供在云中开发、测试和部署应用程序的平台。PaaS\
  \ 服务可以通过\n\n多种方式交付，包括基于 Web 的界面、API 或命令行\n\n界面。\n\n对于希望专注于构建\n\n应用程序而无需担心基础设施管理的开发者来说，PaaS\
  \ 是一种极佳的解决方案。PaaS 提供商负责所有底层基础设施，使开发者能够专注于他们的代码。\n\n此外，PaaS 服务通常具有可扩展性并提供高可用性，因此非常适合关键任务型应用程序。\n\
  \n开发者不管理也不控制底层云基础设施，\n\n包括网络、服务器、操作系统或存储，但可以控制\n\n已部署的应用程序，并且可能还能控制应用托管环境\n\n配置。\n\
  \n第 1 章 云计算简介\n\n**PaaS 的优势**\n\n请考虑 PaaS 提供的以下优势：\n\n• **缩短新应用上市时间：**由于 PaaS 负责\n\
  \n所有底层基础设施，开发者可以专注于\n\n构建他们的应用程序，从而缩短上市前置时间。\n\n• **节约成本：**PaaS 服务通常比\n\n传统的应用开发和部署模式更具成本效益，因为\n\
  \n你只需为实际使用的资源付费。\n\n• **提高开发者生产力：**PaaS 服务可以通过提供他们所需的一切来提升\n\n开发者生产力，\n\n以便在云中开发和部署应用程序。\n\
  \n• **提升应用质量：**PaaS 服务可以通过提供对最新工具和\n\n技术的访问，帮助提升你的应用程序\n\n质量。\n\n• **提高敏捷性和灵活性：**PaaS\
  \ 服务可以为你提供\n\n快速响应不断变化市场\n\n条件所需的敏捷性与灵活性。\n\n近年来，PaaS 服务已成为各类规模组织的热门解决方案，这些组织希望利用云计算的优势。无论你是希望降低成本、提高开发者生产力，还是提升应用质量，PaaS\n\
  \n都能帮助你实现目标。\n\n**PaaS 的局限性**\n\n在选择 PaaS 提供商时，考虑你的具体需求和\n\n要求非常重要。请务必仔细阅读服务商的服务条款，以确保你的使用场景得到支持。此外，还应注意\
  \ PaaS 的以下潜在局限性：\n\n• **供应商锁定：**一旦你在某个\n\n特定 PaaS 平台上开发了应用程序，迁移到\n\n另一个平台可能会困难且成本高昂。如果你的\
  \ PaaS 提供商倒闭或大幅\n\n涨价，这可能会成为问题。\n\n第 1 章 云计算简介\n\n• **控制力不足：**由于你无法控制底层\n\n基础设施，你在自定义和配置\n\
  \n应用程序的方式上可能会受到限制。\n\n• **共享基础设施相关的安全风险：**由于 PaaS\n\n服务与其他客户共享基础设施，因此存在\n\n你的数据可能被泄露的风险。\n\
  \n• **工具和技术选择有限：**某些 PaaS 提供商仅\n\n提供有限的工具和技术选择，这可能不\n\n适合你的需求。\n\n**基础设施即服务（IaaS）**\n\
  \nIaaS 指的是提供计算基础设施——通常是物理或虚拟机器——以及相关服务，通常通过互联网交付。IaaS 提供商为客户提供按需付费模式，以使用、管理和扩展这些资源。\n\
  \n\n\nIaaS 为客户提供对计算、存储和网络资源池的按需访问，\n\n这些资源可以在几乎不需要管理工作或服务提供商交互的情况下快速配置和释放。\n\nIaaS\
  \ 使企业能够根据需要快速向上或向下扩展其计算基础设施。\n\n这种灵活性是 IaaS 的关键优势之一。\n\nIaaS 提供商提供多种服务，包括：\n\n•\
  \ 计算（虚拟服务器和裸金属服务器）\n\n• 存储（对象存储、块存储和文件存储）\n\n• 网络（负载均衡、VPN 和 DNS）\n\n• 监控与管理（日志记录、性能监控和\n\
  \n安全监控）\n\n• 安全（防火墙、入侵检测/防御以及合规性）\n\n第 1 章 云计算导论\n\n**IaaS 的优势**\n\nIaaS 的其他一些优势包括：\n\
  \n• **降低资本支出：**客户仅在使用资源时为其付费。\n\n无需在硬件和软件上进行大额前期投资。\n\n• **灵活性与可扩展性：**资源可以快速向上或向下扩展，\n\
  \n以满足不断变化的需求。\n\n• **降低运营支出：**IaaS 客户无需担心管理和维护其基础设施，\n\n这由服务提供商负责。\n\n• **按使用付费：**客户仅在使用资源时为其付费。\n\
  \n**IaaS 的局限性**\n\nIaaS 并非没有局限性，包括：\n\n• **控制受限：**客户无法直接控制\n\n物理基础设施。\n\n• **安全顾虑：**客户需要对其数据和应用程序的安全负责。\n\
  \n• **供应商锁定：**客户可能会被锁定在某一特定供应商的平台上，\n\n从而使未来切换到其他供应商变得困难。\n\n**Java 在云计算中的作用**\n\
  \nJava 在云计算中发挥着非常重要的作用。Java 之所以是开发云端应用程序的良好选择，有以下几个原因。\n\n1\\. **Java 是一种非常稳定的语言：**它已经存在超过\
  \ 25 年，\n\n并被全球一些最大的公司使用，\n\n例如 Google、Amazon 和 IBM。这意味着有一个庞大的开发者社区熟悉这门语言，\n\n并且可以提供支持。\n\
  \n第 1 章 云计算导论\n\n2\\. **Java 具有很强的可扩展性：**Java 可用于为大型企业创建程序。\n\n很多人都知道如何使用它，并且在你遇到问题时可以提供帮助。\n\
  \n这意味着它可以处理大量数据和流量。云端应用通常需要能够快速且轻松地扩展，\n\n而 Java 正是为此而构建的。\n\n3\\. **Java 是安全的：**安全性对云端应用至关重要。\n\
  \nJava 在语言层内置了多种安全特性，这使黑客更难利用漏洞攻击。\n\n例如，它具有强健的安全模型，可用于控制\n\n对数据和资源的访问。\n\n4\\.\
  \ **Java 是高效的：**云端应用需要能够\n\n快速且高效地运行，而 Java 的设计正是为了这一点。Java\n\n虚拟机（JVM）非常高效，Java\
  \ 代码会被编译为字节码，\n\n而字节码同样非常高效。\n\n5\\. **Java 拥有良好的支持：**Java 开发者可用的工具和库很多，\n\n这使开发云端应用更加容易。\n\
  \n**注意** Java 是世界上最受欢迎的编程语言之一，并已成为云计算的关键组成部分。Java 的流行部分归因于其平台独立性。Java 可以运行在任何设备或操作系统上，这\n\
  \n使其成为云端应用的理想选择。\n\n可用于使用 Java 构建云应用的一些工具和库包括：\n\n• **Jakarta EE** 是一个基于标准的平台，用于开发对云友好的应用程序。它提供了全面的\
  \ API 和\n\n功能集，使开发云端应用变得容易。\n\n• **Microprofile** 是一种轻量级规范，提供一组 API\n\n\n\n以及用于开发微服务的功能。它包括诸如健康检查、配置和安全性等功能。\n\
  \n第 1 章 云计算导论\n\n根据 [TIOBE 指数](https://www.tiobe.com/tiobe-index/)，Java 目前是仅次于 Python\
  \ 和 C 的第三大流行编程语言。自 2002 年以来，它一直位居前三，并且短期内没有下滑迹象。这得益于其庞大且忠诚的用户群体，以及使其非常适合开发云端应用的众多特性。\n\
  \n根据 Cloud Foundry 对全球企业开发者和决策者的调查，Java 也是开发云端应用最受欢迎的语言之一（[Cloud Foundry 报告](https://www.cloudfoundry.org/wp-content/uploads/Developer-Language-Report_FINAL.pdf)）。总之，Java\
  \ 是开发云端应用的良好选择，因为它稳定、可扩展、安全、高效且生态支持完善。\n\n**云计算的演进**\n\n云计算可以追溯到互联网早期，当时高校和企业的研究人员正在寻找共享资源的方法。这包括共享计算时间、存储和应用程序。他们使用“公用计算（utility\
  \ computing）”一词来描述这一概念。1989 年初，蒂姆·伯纳斯-李（Tim Burners-Lee）开发了一个名为万维网（World Wide Web）的项目，使用户能够通过互联网访问信息。这推动了部署在中心服务器上的\
  \ Web 应用的发展。\n\nHTML 和 HTTP 被开发出来，以提供一种共享文档和数据的标准方式。HTML 是一种用于创建网页的标记语言。它提供了组织信息的方式，并包含可控制网页外观的标签。HTML\
  \ 并不是编程语言，但它可用于创建包含 JavaScript 和其他脚本语言的页面。\n\nHTTP 是一种在 Web 服务器与浏览器之间传输数据的协议。它是万维网的基础，提供了浏览器向服务器请求信息、以及服务器向浏览器返回信息的机制。\n\
  \nHTTP 是一种应用层协议，运行在 TCP/IP 之上，而 TCP/IP 是互联网的主要通信协议。\n\n1994 年，Netscape 发布了首个商用网页浏览器，使互联网更容易被公众使用。因此，基于\
  \ Web 的应用需求增加。不久之后，在 1995 年，Sun Microsystems 发布了 Java 的第一个版本。Java 运行在虚拟机上，这使它能够在任何操作系统上运行。\n\
  \n![](img/index-42_1.jpg)\n\n第 1 章 云计算导论\n\nJava 的平台无关性是其关键特性之一，这使它成为开发 Web 应用的理想选择。\n\
  \n在 21 世纪初，一种称为 Web 服务的新型服务开始出现。Web 服务是通过互联网提供特定功能的应用。在当时，Web 服务相对简单，例如提供某一地点当前气温的天气服务。随着\
  \ Web 服务日益流行，对更复杂 Web 服务的需求也随之增长。为响应这一需求，企业开始提供基于 Web 的应用平台。\n\n第一代应用平台主要聚焦于提供运行\
  \ Web 服务所需的基础设施，包括 Web 服务器、数据库和应用服务器。第二代应用平台则增加了对更复杂 Web 应用的支持。这些平台包含了安全性、可扩展性和可管理性等特性。第二代应用平台催生了云计算这一概念。\n\
  \n为了让 Web 服务彼此通信，它们需要采用一套通用规则。这套通用规则被称为 Web 服务协议。最流行的两种 Web 服务协议是 SOAP 和 REST。SOAP（Simple\
  \ Object Access Protocol，简单对象访问协议）是一种使用 XML 在应用之间交换信息的协议。REST（Representational State\
  \ Transfer，表述性状态转移）是一种更新、更简单的协议，使用 XML 或 JSON 在应用之间交换信息。21 世纪初期开发的大多数 Web 服务都基于\
  \ SOAP。然而近年来，REST 因为简单易用而越来越流行。图 1-6 展示了 Web 服务的演进过程。\n\n***图 1-6。** Web 服务的演进*\n\
  \n第 1 章 云计算导论\n\n云计算在现实世界中的第一个典型案例由 Salesforce.com 于 21 世纪初推出。他们提供了一款基于 Web 的客户关系管理（CRM）应用。这使企业能够通过任何连接互联网的设备访问其\
  \ CRM 数据。2008 年，Google 推出了 Google App Engine（GAE），这是一个允许开发者在 Google Cloud 上构建和运行应用的平台。由此，云计算对开发者和企业变得更加可及。\n\
  \n2006 年，Amazon 推出了 Amazon Web Services（AWS），这是一个基于云的平台，使开发者能够在 Amazon Cloud 上构建和运行应用。它是一组基于\
  \ Web 的服务，允许开发者和终端用户通过互联网访问信息和应用。AWS 包括存储、数据库、网络和分析等服务。根据 ZDNet 的文章（[2021 年顶级云服务提供商：AWS、Microsoft\
  \ Azure、Google Cloud、混合云与 SaaS](http://www.zdnet.com/article/the-top-cloud-providers-of-2021-aws-microsoft-azure-google-cloud-hybrid-saas/)），自发布以来，AWS\
  \ 一直是全球最大的云计算服务提供商。\n\n2011 年，Apple 推出了 iCloud，这是一项基于云的存储与同步服务。它允许用户将文档、音乐、照片等数据存储在云端，并可通过任何连接互联网的\
  \ Apple 设备访问。Apple iCloud 是一个封闭系统，这意味着只有运行 iOS 或 macOS 的设备可以访问它。它更像是一种类似 Dropbox\
  \ 或 Google Drive 的云存储服务。2008 年，Microsoft 推出了 Azure，这是一个基于云的平台，允许开发者在 Microsoft Cloud\
  \ 上构建和运行应用。Azure 包含存储、数据库、网络和分析等服务。它是仅次于 Amazon Web Services（AWS）的第二大云计算平台。迁移到公有云的组织示例包括：使用\
  \ AWS 提供流媒体服务的 Netflix；以及使用 AWS 运营度假租赁平台的 Airbnb。对于使用 Microsoft 产品与服务生态的企业而言，Azure\
  \ 更为适合。\n\n云已成为许多组织的默认选择。随着云计算使用的增长，对更好的工具与技术来管理和监控云端应用的需求也在增加。为满足这一需求，新一代应用平台应运而生，即云原生应用。云原生应用被设计为运行在云上。它们采用微服务构建，微服务是小型、独立的服务，可以独立部署与扩展。云原生应用还被设计为具备容错能力和高可用性。\n\
  \n第 1 章 云计算导论\n\n近年来，在云中运行应用的方式正从传统虚拟机（VM）转向容器。容器比虚拟机更轻量，因为它们只包含所需的最少代码和库，以便\n\n\
  \n\n运行应用程序。它们不像虚拟机（VM）那样需要冗长的资源配置过程。这使得在云中部署和扩展应用程序更加容易。它们在资源利用方面也更高效，并且能够更快地部署应用程序。它们还具有更好的可移植性，因为它们可以运行在任何支持容器运行时的平台上，例如\
  \ Docker。Docker 是创建和管理容器最流行的工具。它于 2013 年发布，并已成为在云中运行容器的标准。\n\n2016 年，MicroProfile\
  \ 标准作为一项协作成果被提出，参与方包括 IBM、Red Hat、Tomitribe 和 Payara 等领先软件厂商。它由 Eclipse Foundation\
  \ 管理。创建 MicroProfile 规范的动机是为构建基于微服务的应用程序提供一套通用标准，使其能够运行在任何 Java 平台上。它包含开放追踪、指标、REST\n\
  \n客户端、JSON 处理、基于 JWT 的安全、健康检查监控、配置、上下文与依赖注入、RESTful Web 服务以及容错等标准。\n\n2017 年，Oracle\
  \ 将 Java EE 捐赠给了 Eclipse Foundation。Eclipse Foundation 是\n\n一个开源社区，提供协作与创新的平台。\n\
  \nJakarta EE 规范包含大约 40 项标准，涵盖了 servlet、服务器页面、Jakarta Server Faces、表达式语言、WebSocket、JSON\
  \ 处理、RESTful Web 服务、安全、企业 Bean、批处理并发、\n\n事务、Java Message Service 等众多技术。\n\n云原生应用通常部署在分布式系统上，并且\n\
  \n被设计为运行在容器中。图 1-7 展示了云原生应用的架构。容器比虚拟机更轻量，但要高效运行它们仍然需要大量协同。\n\n![](img/index-45_1.png)\n\
  \n第 1 章 云计算简介\n\n***图 1-7。** 云原生架构*\n\n![](img/index-46_1.png)\n\n第 1 章 云计算简介\n\n\
  由于在云中运行应用程序的复杂性，需要进行容器编排。\n\nKubernetes 是一个流行的容器编排平台，可自动完成基于容器应用的部署、扩缩容和管理。Kubernetes\
  \ 是一个\n\n开源容器编排平台，最初由 Google 开发。\n\n目前它由 Cloud Native Computing Foundation（CNCF）管理。Kubernetes\
  \ 被\n\n设计用于自动化基于容器应用的部署、扩缩容与管理。它是运行云原生应用的热门选择。图 1-8\n\n展示了云计算演进的时间线。\n\n***图 1-8。**\
  \ 云计算历史*\n\n**总结**\n\n云计算是一项有潜力彻底改变人们使用计算机方式的技术。它允许用户从远程服务器而不是其自身设备访问资源，例如存储和计算能力。这可以节省时间和成本，并使得从世界任何地方访问信息变得更加容易。\n\
  \n云计算主要有三种类型：公有云、私有云和混合云。公有\n\n云计算是通过互联网向公众提供的服务。私有云计算是向特定组织提供的服务，通常通过私有网络提供。\n\n\
  混合云计算是指一个组织同时使用公有云和私有云。\n\n在 21 世纪初，各公司开始向企业和消费者提供基于云的服务，例如存储\n\n和计算能力。此后，云计算的使用迅速增长，如今已成为许多企业不可或缺的一部分。\n\
  \n第 1 章 云计算简介\n\nJava 编程语言在云计算中被广泛使用。它易学易用，并且与平台无关，这意味着用 Java 编写的程序可以在任何类型的计算机上运行。Java\
  \ 还用于创建 Web 应用程序，即运行在 Web 服务器上并由用户通过浏览器访问的应用程序。\n\n云计算最重要的方面之一是对 Web 服务的使用。Web 服务是可通过互联网访问的应用程序。它们通常用于向企业和消费者提供某种服务，例如存储或计算能力。\n\
  \nWeb 服务通常使用诸如 Java 这样的编程语言编写。\n\nWeb 服务使用标准格式来通信数据。这使得\n\n不同类型的计算机能够相互理解并交换数据。例如，一个\
  \ Web 服务可以使用简单对象访问协议（SOAP）与使用 Windows 操作系统的\n\n计算机进行通信。\n\nREST（表述性状态转移）是另一种 Web\
  \ 服务。它是\n\n一种用于设计网络化应用程序的架构风格。RESTful Web 服务基于 REST 原则，并使用 HTTP 协议传输数据。\n\n微服务是一种软件架构，旨在让大型应用程序的开发与部署更容易。微服务是小型、模块化组件，\n\
  \n可以独立部署。微服务可以使用 Java\n\n编程语言，结合各种框架和标准进行开发，例如 MicroProfiles\n\n和 Jakarta EE。\n\n\
  至此，你应该已经对云计算有了良好的理解。在下一章中，\n\n你将学习云原生应用开发，它使开发人员能够编写专门为云中运行而设计的代码。它使用微服务和容器，使应用程序的开发、部署和扩展更加容易。\n\
  \n**第 2 章**\n\n**云原生应用**\n\n**开发**\n\n“云原生（cloud-native）”一词在技术圈已无处不在，但其含义仍有些模糊。要弄清它，我们先从“它不是什么”开始：云原生并不关乎应用运行在何处。应用运行在公有云、私有云，还是本地数据中心并不重要。重要的是应用如何构建与运行。在本章中，你将首先探讨云原生的含义、云原生应用的特征、开发云原生应用的优缺点，以及它们与传统应用的区别。接下来，你将学习\n\
  \n面向 Java 应用的托管服务，以及它们如何在云原生应用开发中发挥作用。最后，你将概览云原生应用开发的各个阶段，包括持续集成/持续交付（CI/CD）、\n\n\
  微服务架构、容器化、无服务器计算、API 管理、\n\n安全等。\n\n**什么是云原生？**\n\n云原生是一个术语，指为充分利用云计算环境而设计的应用程序或服务。云原生应用通常\n\
  \n使用微服务构建，微服务是小型、独立的模块，可独立部署和扩展。这种方法在更新和扩缩容方面提供了更高的灵活性与敏捷性，因为每个微服务都可以单独更新或扩展，而不会影响应用的其他组件。\n\
  \n云原生应用旨在利用云的弹性与\n\n可扩展性。这种方法在更新和扩缩容方面提供了更高的灵活性与敏捷性，因为每个微服务都可以单独更新或扩展，而不会影响应用的其他组件。29\n\
  \n© Tarun Telang 2023\n\nT. Telang，*Beginning Cloud Native Development with MicroProfile,\
  \ Jakarta EE, and Kubernetes*，\n\n[`doi.org/10.1007/978-1-4842-8832-0_2`](https://doi.org/10.1007/978-1-4842-8832-0_2#DOI)\n\
  \n第 2 章 云原生应用开发\n\n在更新和扩缩容方面，这种方法允许更高的灵活性与敏捷性，因为每个微服务都可以单独更新或扩展，而不会影响应用的其他组件。\n\n\
  \n\n云原生应用旨在充分利用云计算的优势。\n\n它们基于微服务架构构建，并通过 Docker 等容器以及托管的 Kubernetes 集群进行部署。\n\n\
  它们也易于部署和管理。术语“云原生”常常与“容器原生”或“基于微服务”互换使用。云原生应用是云计算运动中的重要组成部分。它们使企业能够快速开发和部署新应用，而无需昂贵的基础设施。云原生应用通常使用\
  \ Docker 和 Kubernetes 等开源技术构建。\n\n基于 Java 的云原生应用可以使用 MicroProfile 和 Jakarta EE\n\
  \n规范来构建。MicroProfile 是一项开源规范，定义了一套用于构建云原生应用的\n\n标准。它包括微服务、安全性和 REST API 的相关标准。\n\
  \nJakarta EE 是 Java EE 的新名称，而 Java EE 是一个用于构建企业级\n\n应用的成熟平台。MicroProfile 和 Jakarta\
  \ EE 是互补关系。MicroProfile 专注于微服务，而 Jakarta EE 专注于企业应用。因此，这两个平台都可用于构建云原生应用。\n\n**云原生应用的特征**\n\
  \n如果你想构建一个云原生应用，有几件事需要牢记。首先，你需要选择一种微服务架构，使你能够将应用拆分为小型、独立的模块。其次，你需要确保应用具备可扩展性，能够通过增加更多资源来应对增长的需求。\n\
  \n最后，你需要确保应用是安全的，并使用其所运行云平台的安全特性。\n\n以下关键特征在云原生应用中很常见：\n\n• **微服务：** 云原生应用通常使用\n\
  \n微服务构建，微服务是小型、独立的服务，它们协同工作以形成完整应用。\n\n• **松耦合：** 云原生应用通常采用\n\n松耦合设计，这意味着它们可以轻松拆分为\n\
  \n更小的部分，并可独立部署和更新。\n\n第 2 章 云原生应用开发\n\n• **可扩展性：** 云原生应用被设计为可扩展，\n\n这意味着它们可以通过增加\n\
  \n更多资源来轻松应对增长的需求。\n\n• **弹性：** 云原生应用具有弹性，这意味着\n\n即使系统的某一部分发生故障，它们仍可继续运行。\n\n• **敏捷性：**\
  \ 云原生应用被设计为敏捷，\n\n这意味着它们可以被快速部署和更新。\n\n• **安全性：** 云原生应用被设计为安全，这\n\n意味着它们会使用其所运行云平台的安全特性。\n\
  \n• **自动化：** 云原生应用通常是自动化的，\n\n这意味着它们可以在无需人工\n\n干预的情况下部署和更新。\n\n• **自愈：** 云原生应用包含监控和\n\
  \n日志功能，可轻松检测和诊断问题。\n\n此外，云原生应用还被设计为具备自愈能力，\n\n这意味着它们可以从故障中自动恢复。\n\n• **DevOps 文化：**\
  \ 云原生应用通常在\n\nDevOps 文化下开发，这意味着开发人员与运维\n\n人员协作创建并部署应用。\n\n这些特征使云原生应用非常适合部署\n\n在云环境中，在这种环境里资源可根据需要快速增减，\n\
  \n且故障是可预期的。云原生应用还可以在不影响整体系统的情况下快速更新，这使其成为敏捷开发\n\n流程的理想选择。\n\n图 2-1 说明了云原生应用的关键特征。\n\
  \n![](img/index-51_1.jpg)\n\n第 2 章 云原生应用开发\n\n***图 2-1。** 云原生应用的特征*\n\n**云原生应用示例**\n\
  \n\n\n一些常见的云原生应用示例包括：\n\n• **Netflix：** 一种基于云的流媒体服务，允许用户在线观看电影和电视节目。\n\n• **Instagram：**\
  \ 一个照片和视频分享的社交网络服务，可在移动端和 Web 平台上使用。\n\n• **Pinterest：** 一个视觉发现和社交媒体工具，允许用户保存和分享图片与视频。\n\
  \n• **Uber：** 一种网约车服务，允许用户通过移动应用请求并支付行程费用。\n\n• **Airbnb：** 一个度假租赁市场，允许用户查找并预订度假房源。\n\
  \n第 2 章 云原生应用开发\n\n• **Twitter：** 一个社交网络与微博客服务，允许用户发送和接收称为“推文”的简短更新。\n\n• **Facebook：**\
  \ 一个社交网络服务，允许用户与朋友和家人建立联系。\n\n• **Spotify：** 一个音乐流媒体服务，为用户提供数百万首歌曲的访问。\n\n这些应用都采用微服务架构构建，并使用容器进行部署。它们被设计为可扩展、可靠且高性能。\n\
  \n例如，Netflix 是一个使用微服务构建的云原生应用。Netflix 最初使用单体架构，但后来迁移到基于微服务的架构，以利用云的可扩展性与敏捷性。Netflix\
  \ 通过将应用拆分为小型、独立的模块来实现大规模扩展，这些模块可以独立部署和扩缩容。Netflix 还使用容器和 Kubernetes 集群来管理其应用。容器使\
  \ Netflix 能够将应用打包为可移植单元，并可在任何地方运行。Kubernetes 使 Netflix 能够快速地大规模部署和管理其应用。\n\n**云原生应用的优势**\n\
  \n云原生开发非常适合那些希望快速开发和部署新应用、且无需昂贵基础设施的企业。云原生应用通常使用 Docker 和 Kubernetes 等开源技术构建。\n\n\
  企业使用云原生应用可以获得诸多收益，包括：\n\n• **可扩展性：** 云原生应用可以快速扩容或缩容以满足不断变化的需求。换句话说，它们具备“弹性”扩展能力。云原生开发也非常适合希望利用云可扩展性与敏捷性的企业。\n\
  \n• **灵活性：** 云原生应用可以部署在多种云平台上。由于它们使用容器、微服务和 REST API 等标准技术构建，因此与平台无关。这使你能够灵活选择最符合自身需求的平台。云原生应用采用微服务架构构建，在更新与扩缩容方面具有更高灵活性。\n\
  \n第 2 章 云原生应用开发\n\n• **可靠性：** 云原生应用被设计为高可用并可容忍故障。这意味着即使其一个或多个组件发生故障，它们仍可持续运行。云原生开发也非常适合希望构建高性能、可靠应用的企业。\n\
  \n• **性能：** 云原生应用通常具有高性能和高响应性。这是因为它们被设计为利用分布式计算。\n\n• **高可用性：** 云原生应用通常可实现 24/7\
  \ 全天候可用。它们被设计为可部署在多台服务器上。\n\n• **易于部署：** 云原生应用可以快速且轻松地部署。它们通常以容器形式打包。\n\n总之，云原生应用具备云计算的全部优势。云原生应用旨在充分利用云的弹性与可扩展性。它们通常基于微服务构建，微服务是可部署的小型独立模块。云原生应用具有可扩展、可靠和高性能等特征，同时也易于部署和管理。\n\
  \n\n\n**使用云原生应用的缺点**\n\n使用云原生应用有一些缺点需要注意。如果实施不当，它们可能会引入额外的复杂性和技术债务。\n\n以下是云原生应用的劣势：\n\
  \n• **复杂性增加：** 它们通常比传统应用更复杂，开发和管理都更具挑战性。它们往往需要专业技能和知识才能高效开发与运维。\n\n• **成本增加：** 由于需要专业技能和基础设施，它们在开发和运营上可能比传统应用更昂贵。此外，云原生应用可能比传统应用需要更多资源，从而提高成本。\n\
  \n第 2 章 云原生应用开发\n\n• **依赖增加：** 它们通常对其他服务和组件有更多依赖，这使得管理更具挑战性。\n\n• **开发更具挑战：** 由于复杂性增加，它们可能更难以高效开发。通常需要专业技能和知识。\n\
  \n尽管存在这些缺点，但由于其带来的多项收益，云原生应用对许多组织来说仍是一个不错的选择。\n\n**云原生应用 vs.**\n\n**传统应用**\n\n云原生通常与传统（遗留）或单体应用进行对比；后者通常是大型、复杂且难以更新和扩展的应用。\n\
  \n单体应用通常并非为在云环境中部署而设计，这会限制组织利用云优势的能力。\n\n表 2-1 列出了云原生应用与传统应用之间的一些关键差异。\n\n第 2 章\
  \ 云原生应用开发\n\n***表 2-1。** 云原生应用与传统应用之间的关键差异* **特征 云原生应用**\n\n**传统应用**\n\n**微服务**\
  \ 云原生应用通常构建为一组小型、独立的微服务。传统应用则是作为单一单元部署的单一大型代码库。换句话说，传统应用采用单体架构。\n\n**松耦合** 云原生应用的组件可独立部署和扩展。它们通过\
  \ API 或消息队列相互通信。传统应用的组件彼此紧密依赖，难以独立部署和扩展。\n\n**自动化**\n\n云原生应用使用自动化工具构建，例如持续集成与持续交付（Ci/Cd）流水线。\n\
  \n传统应用通常使用手工流程构建，例如代码审查和测试。它们并非使用持续集成与持续交付（Ci/Cd）流水线等自动化工具构建。这使得它们难以部署和扩展。\n\n**可扩展**\n\
  \n云原生应用可以根据需求变化轻松进行横向或纵向扩缩容。\n\n传统应用无法轻松根据需求变化进行扩缩容。\n\n**自愈**\n\n云原生应用被设计为可自动从故障中恢复。\n\
  \n传统应用并非设计为可自动从故障中恢复。\n\n**DevOps 文化** 使用云原生应用的组织通常具备 DevOps 文化，该文化强调开发人员与运维人员之间的协作，以加速软件开发与交付流程。\n\
  \n对于习惯于更传统软件开发方式的组织而言，这种文化转变可能具有挑战性。\n\n第 2 章 云原生应用开发\n\n总体而言，云原生应用在设计上比传统单体应用更敏捷、更灵活、可扩展性更强。对于希望加快软件开发与交付流程的组织来说，它们是一个很好的选择。\n\
  \n**云原生应用开发**\n\n\n\n云原生应用开发通常遵循微服务架构，在这种架构中，应用程序由一组独立、松耦合的服务构建而成，这些服务可以独立部署和扩展。微服务架构是一种\n\
  \n软件开发方法，强调组件之间的松耦合。这使得\n\n系统具有更高的灵活性和敏捷性，因为对某一组件的更新不一定需要更新其他组件。微服务架构使开发人员能够以模块化方式构建\n\
  \n应用程序，使用小型、独立的服务，并且这些服务可以轻松更新和独立扩展。这种方法在开发和部署应用程序时提供了更高的灵活性和敏捷性。这种方法使开发人员能够\n\n\
  在不影响整个应用程序的情况下更改单个服务。\n\n各组织正在采用云原生应用开发方法，以\n\n加快产品上市时间、提高开发者生产力，并使应用能够利用云的诸多优势，例如按需扩展和\n\
  \n降低运营成本。\n\n使用云原生应用的组织具有以下优势：\n\n• 它们可以缩短上市时间，因为微服务可以\n\n独立且快速地部署。\n\n• 它们可以实现更高的灵活性和可扩展性，因为每个\n\
  \n微服务都可以独立更新或扩展。\n\n• 它们可以降低运营成本，因为它们可以按需使用弹性计算\n\n资源。\n\n除了微服务之外，云原生应用开发还依赖其他几种现代技术和方法，包括容器化、持续\n\
  \n交付与部署，以及 DevOps。\n\n第 2 章 云原生应用开发\n\n采用云原生应用开发的组织通常会使用\n\n公有云、私有云和混合云环境的组合。这使它们能够利用各类环境的优势来满足其特定需求。\n\
  \n云原生应用开发是一个快速演进的领域，新的\n\n技术和方法不断被引入。因此，开发人员需要跟进最新进展，才能构建出能够充分利用云能力的应用程序。\n\n云原生应用可以使用任何编程语言构建。然而，\n\
  \n某些语言更适合构建云原生应用。\n\n**Java 应用的托管服务**\n\nJava 是构建云原生应用程序的热门选择。这是因为它是一门成熟的语言，并拥有庞大的工具和库生态系统。此外，许多\n\
  \n云提供商都为基于 Java 的应用程序提供托管服务。面向 Java 应用的托管服务是帮助你管理和优化 Java 应用程序的服务。这些服务可以帮助你完成诸如监控你的\n\
  \n应用性能、管理应用依赖关系以及管理\n\n应用部署等任务。托管服务可以通过自动化管理 Java 应用程序所涉及的许多任务，帮助你节省时间和成本\n\n。\n\
  \n包括 Amazon Web Services、Microsoft Azure 和 Google Cloud Platform 在内的多家服务提供商也为基于\
  \ Java 的应用提供服务。请参考以下资源，了解主流云提供商在 Java 方面的最新产品：\n\n–\n\nGoogle Cloud 上的 Java（[`cloud.google.com/java)`](https://cloud.google.com/java)）\n\
  \n–\n\nAWS 上的 Java（[`aws.amazon.com/java/`](https://aws.amazon.com/java/)）\n\n–\n\
  \n面向 Java 开发者的 Azure 文档（[tion (https://docs.microsoft.com/](https://docs.microsoft.com/en-us/azure/developer/java/)）\n\
  \n[en-us/azure/developer/java/)](https://docs.microsoft.com/en-us/azure/developer/java/)\n\
  \n**云原生应用开发示例**\n\n云原生应用开发的一个例子是在线零售商 Amazon.com。\n\nAmazon.com 是最早采用微服务架构的公司之一，并且\n\
  \n\n\n已经使用它很多年了。微服务的一个好处是它们可以部署在各种环境中，包括本地数据中心、公有云，38\n\n第 2 章 云原生应用开发\n\n以及混合云。亚马逊开发了自己的容器服务\
  \ Amazon Elastic\n\nContainer Service（ECS），这使得大规模部署和管理容器变得容易。\n\n因此，他们能够快速且高效地构建和部署应用程序，\n\
  \n并充分利用云带来的诸多优势。\n\n云原生应用开发的另一个例子是社交媒体\n\n平台 Twitter。Twitter 也采用了微服务架构，并利用它\n\n\
  快速高效地部署新功能和更新。此外，Twitter 使用\n\n持续交付与持续部署来快速推出新的代码变更，\n\n且无需停机。Twitter 还开发了多种用于管理和\n\
  \n部署微服务的技术。例如，Twitter 使用了一个名为 Murder 的工具来管理\n\n将新的代码变更部署到其微服务中。Murder（指乌鸦群）是一个分布式系统，允许开发者将代码变更推送到一个\n\
  \n中央代码库。随后，Murder 会将这些代码变更部署到相应的服务器。\n\nMurder 工具将部署新代码变更所需的时间从数天缩短到\n\n数分钟。此外，Murder\
  \ 还有助于减少\n\n手动部署代码变更时可能发生的故障和缺陷数量。\n\n请记住，云原生应用开发是一个快速演进的领域，\n\n新的技术和方法不断被引入。因此，你需要跟进最新进展，才能构建出能够充分利用云优势的应用程序。\n\
  \n**云原生应用开发是未来**\n\n随着技术世界不断演进，人们开发\n\n应用程序的方式也在变化。近年来，已经出现了向云原生应用开发转变的趋势——这有充分理由。云原生应用开发是一种\n\
  \n能够利用云所提供诸多优势的方法。通过\n\n以这种方式开发应用程序，你可以利用云所提供的可扩展性、灵活性和成本效益。\n\n此外，云原生应用开发还使你能够利用\n\
  \n最新技术和趋势。通过能够在云中快速、轻松地部署应用程序，你可以保持领先，并持续满足用户不断变化的需求。那么，为什么云原生应用开发是\n\n应用开发的未来？原因有很多：\n\
  \n第 2 章 云原生应用开发\n\n• **云提供了无限可能：** 云为你提供了\n\n前所未有的灵活性和可扩展性。你可以\n\n轻松地在云中部署应用程序，而无需担心\n\
  \n基础设施。这意味着你可以专注于开发\n\n应用程序，而不是担心如何部署它。\n\n• **云具有成本效益：** 云是一种具有成本效益的方式来\n\n开发和部署应用程序。你无需担心\n\
  \n维护自己的基础设施，这可能成本高昂。此外，\n\n你还可以利用按需付费模式，这\n\n意味着你只需为所使用的资源付费。\n\n• **云始终保持最新：**\
  \ 云始终与最新技术和趋势保持同步。\n\n这意味着你可以\n\n在新特性和功能发布后立即加以利用。\n\n• **云是全球化的：** 云是一种全球性现象。这意味着\n\
  \n你可以通过你的应用程序触达全球受众。\n\n• **云是安全的：** 云是一种非常安全的方式来开发和\n\n部署应用程序。你无需担心\n\n自己基础设施的安全性。\n\
  \n所以，这就是云原生应用开发之所以是\n\n\n\n应用程序开发的未来。随着技术世界的不断演进，云将变得越来越重要。如果你还没有使用云来开发和部署你的应用程序，现在正是时候。\n\
  \n**云原生应用开发的阶段**\n\n你已经了解到，开发云原生应用有许多优势。\n\n然而，云原生应用开发并非没有挑战。其中最大的挑战之一是，它要求开发者在思考和实施应用开发方式上进行彻底转变。这种思维转变包括：将应用视为可由更小型微服务组合而成的服务；能够快速、轻松地部署这些服务，并且部署方式要与云的运行机制保持一致。此外，能够对这些服务进行管理和监控也非常重要，以确保它们按预期运行。\n\
  \n第 2 章 云原生应用开发\n\n另外，为云原生开发流程找到合适的工具和技术也可能很困难。好消息是，已有多家公司提供云原生开发平台和服务。这些平台可以为开发者提供\n\
  \n构建云原生应用所需的工具。此外，还有多个开源项目为云原生开发提供支持。支持云原生应用开发的工具和技术包括 Docker 等容器技术、\n\nKubernetes\
  \ 等编排框架，以及可提供预构建环境来部署云原生应用的平台即服务（PaaS）产品。当前有许多可用于开发云原生\n\n应用的开源 PaaS 服务。其中一些工具包括\
  \ OpenShift、Cloud Foundry 和 Heroku。\n\n表 2-2 展示了云原生开发开源工具及其说明列表。\n\n***表 2-2。**\
  \ 用于云原生应用* *开发的开源工具和 PaaS 服务*\n\n**工具**\n\n**说明**\n\n**Docker**\n\ndocker 是一种工具，可让你使用\n\
  \n容器来创建、部署和运行应用。容器允许你将应用及其所有依赖一起打包，从而可以在任何 linux 服务器上运行。这使得应用能够轻松地在\n\n开发、测试和生产环境之间迁移，而无需担心\n\
  \n依赖问题。\n\nKubernetes Kubernetes 是一种用于管理容器化应用的编排工具。它提供了一个可自动化部署、扩缩容以及管理容器化\n\n应用的平台。\n\
  \nopenShift\n\nopenShift 是 red hat 提供的 paaS 产品，可提供用于\n\n部署云原生应用的预构建环境。它包含用于构建、部署和\n\
