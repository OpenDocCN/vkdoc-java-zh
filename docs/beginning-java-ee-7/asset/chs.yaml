      <td><input type=\"text\"/></td>\n  </tr>\n  <tr>\n    <td>Title :</td>\n    <td><input\
  \ type=\"text\"/></td>\n  </tr>\n  <tr>\n    <td>Price :</td>\n    <td><input type=\"\
  text\"/></td>\n  </tr>\n  <tr>\n    <td> Description : </td>\n    <td><textarea\
  \ cols=\"20\" rows=\"5\"></textarea></td>\n  </tr>\n  <tr>\n    <td>Number of pages\
  \ :</td>\n    <td><input type=\"text\"/></td>\n  </tr>\n  <tr>\n    <td>Illustrations\
  \ :</td>\n    <td><input type=\"checkbox\"/></td>\n  </tr>\n</table>\n<input type=\"\
  submit\" value=\"Create\"/>\n<hr/>\n<em>APress - Beginning Java EE 7</em>\n</body>\n\
  </html>\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n清单 10-1\
  \ 和清单 10-2 之间存在一些差异：清单 10-2 中的文档遵循严格的结构，并包含 `<html>`、`<head>` 和 `<body>` 标签；所有标签都已闭合，即使是空元素也是如此（每个\
  \ `<td>` 都已闭合，并且使用了 `<hr/>` 而不是 `<hr>`）；属性出现在单引号或双引号之间（`<table border=\"0\">` 或\
  \ `<table border='0'>`，但不能是 `<table border=0>`）；并且所有标签均为小写（使用 `<tr>` 而不是 `<TR>`）。将此与清单\
  \ 10-1 进行比较，如前所述，后者展示的是浏览器仍能显示的无效 HTML。\n\nXML 语法规则和模式约束的严格验证使得 XHTML 比 HTML 更易于维护和解析，因此它现在成为网页的首选语言。一个符合规范的\
  \ XHTML 文档是一个遵循 HTML 4.01 规范的 XML 文档。文档可以使用三种不同的验证格式。\n\n*   *XHTML 1.0 Transitional*：XHTML\
  \ 中最具妥协性的变体，允许使用严格版本中排除的表现性元素（例如 center、font 和 strike）。\n*   *XHTML 1.0 Frameset*：一种过渡性变体，也允许定义框架集文档（20\
  \ 世纪 90 年代末常见的 Web 功能）。\n*   *XHTML 1.0 Strict*：XHTML 中最严格的变体，严格遵循 HTML 4.01 规范。\n\
  \nCSS\n\n浏览器运行在客户端语言的世界中，例如 HTML、XHTML、CSS 和 JavaScript。层叠样式表（CSS）是一种样式语言，用于描述以\
  \ HTML 或 XHTML 编写的文档的呈现方式。CSS 用于定义颜色、字体、布局以及文档呈现的其他方面。它允许将文档的内容（用 XHTML 编写）与其呈现（用\
  \ CSS 编写）分离开来。与 HTTP、HTML 和 XHTML 一样，CSS 规范由万维网联盟（W3C）维护。\n\n例如，假设您想要更改 `newBook.xhtml`\
  \ 页面上的标签，使其变为斜体（`font-style: italic;`），将颜色更改为蓝色（`color: #000099;`），并增大字体大小（`font-size:\
  \ 22px;`）；您不必为每个标签重复这些更改。您可以定义一个 CSS 样式（在 `<style type=\"text/css\">` 标签内）并为其指定一个别名（例如\
  \ `.row`），或者重新定义现有标签的样式（例如 `body`、`table` 或 `h1`）。该页面（参见清单 10-3）将在需要更改其呈现方式的元素上使用这些样式（`<td\
  \ class=\"row\">`）。\n\n***清单 10-3.***  带有一些 CSS 样式的 newBook.xhtml 页面\n\n```\n<!DOCTYPE\
  \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n        \" http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\
  \ \">\n<html xmlns=\" http://www.w3.org/1999/xhtml \" xml:lang=\"en\" lang=\"en\"\
  >\n<head>\n  <title>Create a new book</title>\n  <style type=\"text/css\">\n\nbody\
  \ {\n      font-family: Arial, Helvetica, sans-serif;\n    }\n\ntable {\n      border:\
  \ 0;\n    }\n\nh1 {\n      font-size: 22px;\n      color: blue;\n      font-style:\
  \ italic;\n    }\n\n.row {\n      font-style: italic;\n    }\n  </style>\n</head>\n\
  < body >\n< h1 >Create a new book</h1>\n<hr/>\n< table >\n  <tr>\n    <td class=\"\
  row\" >ISBN :</td>\n    <td><input type=\"text\"/></td>\n  </tr>\n  <tr>\n    <td\
  \ class=\"row\">Title :</td>\n    <td><input type=\"text\"/></td>\n  </tr>\n  <tr>\n\
