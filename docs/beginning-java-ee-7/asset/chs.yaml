  <input type=\"submit\" value=\"Create\"/>\n<hr/>\n<em>APress - Beginning Java EE\
  \ 7</em>\n</body>\n</html>\n```\n\n在清单 10-3 中，CSS 代码嵌入在 XHTML 页面中。在实际应用中，所有样式都会写在一个单独的文件中，然后将此文件导入到网页中。Web\
  \ 设计者可以为不同的页面组制定一套或多套 CSS，然后内容贡献者可以编写或更改页面，而无需关心其外观和感觉。\n\n与图 10-1 相比，最终结果是所有标签都变为斜体，并且标题变为蓝色（参见图\
  \ 10-2）。\n\n![9781430246268_Fig10-02.jpg](img/9781430246268_Fig10-02.jpg)\n\n图 10-2.\
  \ 带有 CSS 的 newBook.xhtml 页面的图形化表示\n\nDOM\n\nXHTML 页面是一个 XML 文档，因此具有文档对象模型（DOM）表示。DOM\
  \ 是 W3C 的一项规范，用于访问和修改 XML 文档的内容和结构，也是一个用于查询、遍历和操作此类文档的抽象 API。DOM 可以被视为文档结构的树形表示。图\
  \ 10-3 展示了 `newBook.xhtml` 页面作为 DOM 表示的样子；根节点是 `html` 标签，下一层是 `head` 和 `body`，在\
  \ `body` 下是一个包含一系列 `tr` 标签的 `table`。\n\n![9781430246268_Fig10-03.jpg](img/9781430246268_Fig10-03.jpg)\n\
  \n图 10-3. newBook.xhtml 页面的树形表示\n\nDOM 提供了一种与 XML 文档交互的标准方式。您可以遍历树并编辑节点的内容（树的叶子）。借助一些\
  \ JavaScript，您可以为网页引入动态效果。正如您将在第 11 章中看到的，Ajax 基于与网页 DOM 表示交互的 JavaScript。\n\nJavaScript\n\
  \n到目前为止，您已经看到了用于表示网页静态内容和图形方面的不同语言。但是，网页通常需要通过显示动态内容来与最终用户交互。正如您将看到的，动态内容可以通过 JSF\
  \ 等服务器端技术来处理，但浏览器也可以通过执行 JavaScript 来实现。\n\nJavaScript 是一种用于客户端 Web 开发的脚本语言。尽管名称如此，但它与\
  \ Java 编程语言无关，因为它是一种解释型的、弱类型的语言。JavaScript 是一种创建动态 Web 应用程序的强大方法，它通过编写与页面 DOM 交互的函数来实现。W3C\
  \ 标准化了 DOM，而欧洲计算机制造商协会（ECMA）则将 JavaScript 标准化为 ECMAScript 规范。任何使用这些标准（XHTML、CSS\
  \ 和 JavaScript）编写的页面，在任何遵循这些指南的浏览器中，其外观和行为都应该大致相同。\n\nJavaScript 与 DOM 交互的一个示例是清单\
  \ 10-4 中的 `newBook.xhtml` 页面。此页面显示一个表单，您可以在其中输入有关书籍的信息。书籍的价格需要在客户端由用户填写，然后才能提交到服务器。为了使价格成为必填项，您可以创建一个\
  \ JavaScript 函数（`priceRequired()`），用于检查价格文本字段是否为空。\n\n***清单 10-4.***  带有一些 JavaScript\
  \ 的 newBook.xhtml 页面\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
  \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n        \" http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\
  \ \">\n<html xmlns=\" http://www.w3.org/1999/xhtml \" xml:lang=\"en\" lang=\"en\"\
  >\n<head>\n  <title>Create a new book</title>\n\n<script type=\"text/javascript\"\
  >\n    function priceRequired() {\n      if (document.getElementById(\" price \"\
  ).value == \"\") {\n          document.getElementById(\" priceError \").innerHTML\
  \ = \"Please, enter a price !\";\n      }\n    }\n  </script>\n\n\n\n</head>\n<body>\n\
  <h1>创建新书</h1>\n<hr/>\n<table border=\"0\">\n  <tr>\n    <td>ISBN：</td>\n    <td><input\
  \ type=\"text\"/></td>\n  </tr>\n  <tr>\n    <td>标题：</td>\n    <td><input type=\"\
  text\"/></td>\n  </tr>\n  <tr>\n    <td>价格：</td>\n    <td><input id=\" price \"\
  \ type=\"text\" onblur =\" javascript:priceRequired() \"/>\n      <span id=\" priceError\
  \ \"/>\n    </td>\n  </tr>\n  <tr>\n    <td>描述：</td>\n    <td><textarea cols=\"\
  20\" rows=\"5\"></textarea></td>\n  </tr>\n  <tr>\n    <td>页数：</td>\n    <td><input\
  \ type=\"text\"/></td>\n  </tr>\n  <tr>\n    <td>插图：</td>\n    <td><input type=\"\
  checkbox\"/></td>\n  </tr>\n</table>\n<input name=\"\" type=\"submit\" value=\"\
  创建\"/>\n<hr/>\n<em>APress - Beginning Java EE 7</em>\n</body>\n</html>\n```\n\n\
  在清单 10-4 中，`priceRequired()` JavaScript 函数通过 `<script>` 标签嵌入在页面中（但也可以外部化到单独的文件中）。当价格文本字段失去焦点时（这就是\
  \ `onblur` 事件的作用），会调用此函数。`priceRequired()` 函数使用隐式的 `document` 对象，该对象代表 XHTML 文档的\
  \ DOM。`getElementById(\"price\")` 方法查找一个标识符为 `price` 的元素（`<input id=\"price\">`），并检查它是否为空。如果为空，该函数会查找另一个名为\
  \ `priceError` 的元素（`getElementById(\"priceError\")`），并将其值设置为 `请输入价格！`。如果价格未填写，客户端验证将显示图\
  \ 10-4 中所示的消息。\n\n![9781430246268_Fig10-04.jpg](img/9781430246268_Fig10-04.jpg)\n\
  \n图 10-4. 显示错误消息的 newBook.html 页面\n\nJavaScript 是一种丰富的语言。前面的部分仅涵盖了展示 JavaScript\
  \ 与 DOM 交互的一小部分。理解 JavaScript 函数可以获取页面中的节点（通过名称或 ID，例如 `getElementById()` 方法），并在客户端动态更改其内容，这一点很重要。有关详细信息，请参阅第\
  \ 11 章中的“Ajax”部分。\n\n理解 JSF\n\n您刚刚了解了客户端技术和语言，例如 XHTML 或 CSS，它们代表了静态网页的内容和视觉外观。为了增加一些交互并动态更改网页的部分内容，您可以使用在浏览器上运行的\
  \ JavaScript 函数。但是，大多数情况下，您需要调用 EJB 的业务层来显示数据库中的数据。这种动态内容可以通过在服务器端使用 JSF 来获得。\n\n\
  如果您熟悉 Web 框架，JSF 的架构很容易理解（参见图 10-5）。JSF 应用程序是标准的 Web 应用程序，它通过 Faces Servlet 拦截 HTTP\
  \ 请求并生成 HTML。在底层，该架构允许您插入任何页面声明语言（PDL，或视图声明语言 VDL），为不同设备（Web 浏览器、移动设备、平板电脑等）渲染页面，并使用事件、监听器和组件（类似于\
  \ Swing）创建页面。Swing 是一个 Java 窗口小部件工具包，自 1.2 版本以来一直是 Java SE 的一部分。它是一个 GUI 框架，用于使用图形组件和事件-监听器模型处理用户输入来创建桌面应用程序（而非\
  \ Web 应用程序）。JSF 还提供了一套标准的用户界面（UI）窗口小部件（按钮、超链接、复选框、文本字段等），并允许轻松插入第三方组件。图 10-5 从非常高的层次展示了\
  \ JSF 架构。\n\n![9781430246268_Fig10-05.jpg](img/9781430246268_Fig10-05.jpg)\n\n图\
  \ 10-5. JSF 架构\n\n图 10-5 展示了 JSF 的几个重要组成部分，这些部分使其架构丰富且灵活：\n\n*   `FacesServlet`\
  \ *和* `faces-config.xml`：`FacesServlet` 是应用程序的主要 Servlet，可以选择通过 `faces-config.xml`\
  \ 描述符文件进行配置。\n*   *页面和组件*：JSF 允许多种 PDL，但自 JSF 2.0 以来，Facelets 是推荐使用的 PDL。\n*   *渲染器*：负责显示组件并将用户输入转换为组件属性值。\n\
  *   *转换器*：负责将组件的值（`Date`、`Boolean` 等）与标记值（`String`）进行相互转换。\n*   *验证器*：负责确保用户输入的值有效（大多数验证可以委托给\
  \ Bean Validation）。\n*   *支持 bean 和导航*：业务逻辑在支持 bean 中完成，这些 bean 还控制页面之间的导航。\n* \
  \  *Ajax 支持*：JSF 2.2 内置了对 Ajax 的支持，如第 11 章所述。\n*   *表达式语言*：EL 在 JSF 页面中用于绑定组件和支持\
  \ bean 之间的变量和操作。\n\nFacesServlet\n\n大多数 Web 框架都使用模型-视图-控制器（MVC）设计模式，JSF 也是如此。MVC\
  \ 模式用于解耦视图（页面）和模型（要在视图中显示的数据）。控制器处理可能导致模型更改和视图更新的用户操作。在 JSF 中，这个控制器是一个名为 `FacesServlet`\
  \ 的 Servlet。`FacesServlet` 是一个管理 Web 应用程序请求处理生命周期的 Servlet。所有用户请求都经过 `FacesServlet`，它会检查请求并使用支持\
  \ bean 对模型调用各种操作。\n\n这个 Servlet 是 JSF 内部的组成部分。配置它的唯一方法是使用外部元数据。在 JSF 1.2 之前，唯一的配置来源是\
  \ `faces-config.xml` 文件。如今，使用 JSF 2.2，这个文件是可选的，大多数元数据可以通过注解（在支持 bean、转换器、组件、渲染器和验证器上）来定义。\n\
  \n页面和组件\n\nJSF 框架必须向客户端的输出设备（例如浏览器）发送页面，并且需要某种显示技术。这种显示技术就是 PDL。JSF 应用程序可以自由使用多种技术作为其\
  \ PDL，但对于 JSF 2.2，Facelets 是首选（更多信息请参见“Facelets”部分）。\n\nFacelets 页面由组件树（也称为窗口小部件或控件）组成，这些组件提供与最终用户交互的特定功能（文本字段、按钮、列表框等）。JSF\
  \ 有一套标准的组件，并允许您轻松创建自己的组件。页面会经历一个丰富的生命周期来管理这个组件树（初始化、事件、渲染等）。\n\n清单 10-5 中的代码是一个使用\
  \ JSF 标签（`xmlns:h=\"` `http://xmlns.jcp.org/jsf/html` `\"`）的 Facelets XHTML 页面，用于显示一个包含两个输入字段（书籍的\
  \ ISBN 和标题）和一个按钮的表单。此页面由多个 JSF 组件组成。其中一些组件没有视觉外观，例如用于声明头部（`<h:head>`）、主体（`<h:body>`）或表单（`<h:form>`）的组件。其他组件是可视的，代表标签（`<h:outputLabel>`）、文本字段（`<h:inputText>`）或按钮（`<h:commandButton>`）。请注意，纯\
  \ HTML 标签也可以混合在页面中（`<table>`、`<tr>`、`<hr/>` 等）。\n\n***清单 10-5.***  JSF 组件与 HTML\
  \ 混合的 JSF 页面片段\n\n```\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\
  \n        \" http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd \">\n<html\
  \ xmlns=\" http://www.w3.org/1999/xhtml \" xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \ >\n<h:head>\n  <title>创建新书</title>\n</h:head>\n<h:body>\n  <h1>创建新书</h1>\n  <hr/>\n\
    <h:form>\n    <table border=\"0\">\n\n\n\n<tr>\n        <td> <h:outputLabel value=\"\
  ISBN : \"/> </td>\n        <td> <h:inputText value=\"#{bookController.book.isbn}\"\
  /> </td>\n      </tr>\n\n<tr>\n        <td><h:outputLabel value=\"标题 :\"/></td>\n\
          <td><h:inputText value=\"#{bookController.book.title}\"/></td>\n      </tr>\n\
  \n</table>\n    <h:commandButton value=\"创建图书\"\n                     action=\"\
  #{bookController.doCreateBook}\" styleClass=\"submit\"/>\n\n</h:form>\n  <hr/>\n\
    <em>APress - Beginning Java EE 7</em>\n</h:body>\n</html>\n```\n\nFacelets\n\n\
  在创建 JSF 时，其初衷是重用 JSP（JavaServer Page）作为主要的 PDL，因为它已经是 Java EE 的一部分。JSP 使用了 EL 和\
  \ JSTL（JSP 标准标签库），因此想法是在 JSF 中充分利用所有这些技术。JSP 是一种页面语言，而 JSF 是构建于其上的组件层。然而，JSP 和 JSF\
  \ 的生命周期并不能很好地契合。JSP 中的标签会从上到下一次性处理以生成响应。JSF 则拥有更复杂的生命周期，其中组件树的生成和渲染发生在不同的阶段。这正是\
  \ Facelets 发挥作用的地方：使其适应 JSF 的生命周期。\n\nFacelets 最初是作为 JSP 的一种开源替代方案而诞生的。与 JSP、EL\
  \ 和 JSTL 不同，它没有对应的 JSR，也不是 Java EE 的一部分。Facelets 是 JSP 的替代品，并为基于 JSF 的应用程序中的页面提供了一种基于\
  \ XML 的替代方案（XHTML）。Facelets 在设计时就考虑到了 JSF，这就是为什么它提供了比 JSP 更简单的编程模型。正因如此，Facelets\
  \ 在 JSF 2.0 中被规范化，并在今天的 Java EE 7 中作为 JSF 的首选 PDL。\n\n渲染器\n\nJSF 支持两种用于显示组件的编程模型：直接实现和委托实现。当你使用直接模型时，组件必须自行解码和编码为图形表示。当你使用委托模型时，这些操作被委托给一个渲染器，这使得组件可以独立于渲染技术（浏览器、便携设备等），并拥有多种图形表示。\n\
  \n渲染器负责显示组件并将用户输入转换为组件的值。可以将其视为客户端和服务器之间的翻译器：它解码用户请求以设置组件的值，并编码响应以创建客户端能够理解并显示的组件表示。\n\
  \n渲染器被组织成渲染套件，这些套件专注于特定类型的输出。为了确保应用程序的可移植性，JSF 包含对标准渲染套件及其关联的 HTML 4.01 渲染器的支持。JSF\
  \ 实现随后可以创建自己的渲染套件来生成无线标记语言（WML）、可缩放矢量图形（SVG）等。\n\n转换器和验证器\n\n页面渲染后，用户可以与之交互以输入数据。由于没有类型约束，渲染器无法预先知道如何显示对象。这就是转换器发挥作用的地方：它们将对象（`Integer`、`Date`、`Enum`、`Boolean`\
  \ 等）转换为 `String` 以进行显示，并将输入的 `String` 转换回对象。JSF 附带了一组用于常见类型的转换器（位于 `javax.faces.convert`\
  \ 包中），但你可以开发自己的转换器或集成第三方转换器。\n\n有时，这些数据在后端处理之前也必须进行验证。验证器负责确保用户输入的值是可接受的。一个组件可以关联一个或多个验证器。JSF\
  \ 附带了一些验证器（`LengthValidator`、`RegexValidator` 等），并允许你使用注解类创建自己的验证器。当出现转换或验证错误时，会向响应发送一条消息以供显示。自\
  \ JSF 2.0 起，部分验证可以委托给 Bean 验证（将在第 3 章中介绍）。\n\n支持 Bean 和导航\n\n到目前为止，所有概念都与单个页面相关：什么是页面，什么是组件，它们如何被渲染、转换和验证？Web\
  \ 应用程序由多个页面组成，并且需要执行业务逻辑（例如，通过调用 EJB 层或 RESTful Web 服务）。支持 Bean 负责处理从一个页面到另一个页面的跳转、调用\
  \ EJB 以及与组件同步数据。\n\n支持 Bean 是一种专门的 Java 类，它负责与组件同步值、处理业务逻辑以及处理页面间的导航（更多关于支持 Bean\
  \ 和导航的内容请参见第 11 章）。你可以使用 EL 将组件与特定的支持 Bean 属性或操作关联起来。以下代码绑定了 `book` Bean 的 `isbn`\
  \ 属性，并调用了 `doCreateBook` 支持 Bean 的操作：\n\n```\n<h:inputText value=\"#{bookController.\
  \ book.isbn }\"/>\n<h:commandButton value=\"创建\" action=\"#{bookController. doCreateBook\
  \ }\"/>\n```\n\n第一行代码将输入文本的值直接挂接到名为 `bookController` 的支持 Bean 的 `book.isbn` 属性上。输入文本的值与支持\
  \ Bean 的 `book.isbn` 属性同步。支持 Bean 还处理事件。第二行代码显示了一个与操作关联的提交按钮。当点击提交按钮时，它会向支持 Bean\
  \ 触发一个事件，在该支持 Bean 中执行一个事件监听器方法（此处为 `doCreateBook()` 方法）。\n\n清单 10-6 展示了 `BookController`\
  \ 支持 Bean。这个 Java 类使用了 CDI 的 `@Named` 注解，因此可以在 EL 中使用。它有一个 `book` 属性，该属性与页面上组件的值绑定（`value=\"\
  #{bookController.book.isbn}\"`）。`doCreateBook()` 方法调用了一个无状态 EJB，然后返回一个允许页面间导航的字符串（`listBooks.xhtml`）。\n\
  \n***清单 10-6.***  BookController 支持 Bean\n\n```\n@Named\n@RequestScoped\npublic\
  \ class BookController {\n\n@Inject\n  private BookEJB bookEJB;\n\nprivate Book\
  \ book = new Book();\n\npublic String doCreateBook () {\n    book = bookEJB.createBook(book);\n\
      return \"listBooks.xhtml\";\n  }\n\n// Getters, setters\n}\n```\n\n表达式语言\n\n\
  JSF 页面和 Java 支持 Bean 之间的绑定是通过 EL 实现的。你可以使用 EL 语句来打印变量的值、访问页面中对象的属性，或调用支持 Bean 的方法。EL\
  \ 语句的基本语法是\n\n```\n#{expr}\n```\n\n`#{expr}` 语句将由 JSF 运行时解析和求值。EL 表达式可以使用大多数常用的\
  \ Java 运算符。\n\n*   *算术*：`+`、`-`、`*`、`/` (`div`)、`%` (`mod`)\n*   *关系*：`==` (`eq`)、`!=`\
  \ (`ne`)、`<` (`lt`)、`>` (`gt`)、`<=` (`le`)、`>=` (`ge`)\n*   *逻辑*：`&&` (`and`)、`||`\
  \ (`or`)、`!` (`not`)\n*   *其他*：`()`、`empty`、`[]`、`.`\n\n请注意，某些运算符既有符号形式也有文本形式（`>`\
  \ 可以是 `gt`，`/` 可以是 `div` 等）。这些等效形式允许你使用符合 XML 规范的语法来开发 JSF 页面。“小于”可以编码为 `#{2 lt\
  \ 3}` 而不是 `#{2 < 3}`。\n\n`empty` 运算符测试一个对象是否为 null，或者它是否引用了一个空的 `String`、`List`、`Map`\
  \ 或数组。如果为空则返回 `true`；否则返回 `false`。你可以检查对象或其某个属性是否为 null。\n\n```\n#{empty book}\n\
  #{empty book.isbn}\n```\n\n点运算符用于访问 `book` 对象的 `isbn` 属性。另一种语法是使用 `[]` 运算符；`isbn`\
  \ 属性可以使用以下任何一种表示法来访问：\n\n```\n#{book.isbn}\n#{book[isbn]}\n```\n\nEL 3.0 的一个增强功能是其调用方法的能力。以下代码片段展示了如何通过调用\
  \ `book.buy()` 方法来购买一本书，以及如何传递一个参数（使用的货币）：\n\n```\n#{book.buy()}\n#{book.buy('EURO')}\n\
  ```\n\nAjax 支持\n\n\n\nWeb 应用必须提供丰富且响应迅速的界面。这种响应性可以通过异步方式仅更新页面的一小部分来实现，这正是 Ajax 的核心所在。JSF\
  \ 之前的 1.x 版本并未提供任何开箱即用的解决方案，因此像 a4jsf 这样的第三方库填补了这一空白。自 JSF 2.0 起，Ajax 支持以规范中定义的\
  \ JavaScript 库（`jsf.js`）和 `<f:ajax>` 标签的形式被加入。例如，你可以使用 `<f:ajax>` 标签以异步方式提交表单，如下代码所示：\n\
  \n```\n<h:commandButton value=\"Create a book\" action=\"#{bookController.doCreateBook}\"\
  >\n  < f:ajax execute=\"@form\" render=\":booklist\"/>\n</h:commandButton>\n```\n\
  \n如果你不理解这段代码，不必担心；第 11 章中有一个专门介绍 Ajax 的章节。\n\nJSF 规范概述\n\nJava 中的 Web 开发始于 1996\
  \ 年的 Servlet API，这是一种创建动态 Web 内容的非常基础的方式。你必须在 Java 代码中操作底层的 HTTP API（`HttpServletRequest`、`HttpServletResponse`、`HttpSession`\
  \ 等）来显示 HTML 标签。JSP 于 1999 年问世，提供了比 Servlet 更高层次的抽象。2004 年，JSF 的第一个版本诞生，其 1.2 版本于\
  \ 2006 年成为 Java EE 5 的一部分。JSF 2.2 现已与 Java EE 7 捆绑在一起。\n\nWeb 界面简史\n\n起初，网页是静态的。用户请求一个资源（网页、图片、视频等），服务器就会返回它——简单，但非常有限。随着\
  \ Web 上商业活动的增长，公司需要向客户提供动态内容。创建动态内容的第一个解决方案是通用网关接口（CGI）。通过使用 HTML 页面和用多种语言（从 Perl\
  \ 到 Visual Basic）编写的 CGI 脚本，应用程序可以访问数据库并提供动态内容，但很明显 CGI 过于底层（你必须处理 HTTP 头、调用 HTTP\
  \ 命令等），需要改进。\n\n1995 年，一种名为 Java 的新语言发布，它附带了一个名为抽象窗口工具包（AWT）的独立于平台的用户界面 API。后来，在\
  \ Java SE 1.2 中，依赖于操作系统用户界面模块的 AWT 被 Swing API（它使用 Java 2D 绘制自己的控件）所取代。在 Java 的早期，Netscape\
  \ 的 Navigator 浏览器支持这种新语言，开启了小程序的时代。*小程序*是在客户端浏览器内运行的应用程序。这使得开发人员可以用 AWT 或 Swing\
  \ 编写应用程序，并将其嵌入网页中。然而，小程序从未真正流行起来。Netscape 还创建了一种名为 JavaScript 的脚本语言，它直接在浏览器中执行。尽管浏览器之间存在一些不兼容性，但\
  \ JavaScript 如今仍被广泛使用，并且是创建动态 Web 应用程序的强大工具。\n\n在小程序未能被广泛采用之后，Sun 引入了 Servlet 作为创建轻量级动态\
  \ Web 客户端的一种方式。Servlet 是 CGI 脚本的替代方案，因为它们提供了更高级别的 HTTP 处理库，可以完全访问 Java API（允许数据库访问、远程调用等），并且可以创建\
  \ HTML 作为响应供用户显示。\n\nSun 于 1999 年发布了 JSP，作为 Servlet 模型的增强。但是，由于 JSP 混合了 Java 和 HTML\
  \ 代码，2001 年出现了一个开源框架，为一种新方法打开了大门：Struts。它扩展了 Servlet API，并鼓励开发人员采用 MVC 架构。近年来涌现了许多其他\
  \ Web 框架，每个都试图填补前一个框架的空白（Tapestry、Wicket、WebWork、DWR、Spring MVC 等）。如今，JSF 2.2 是\
  \ Java EE 7 中的标准 Web 框架。它在 Java 领域与 Struts 和 Tapestry 竞争。Rails 和 Grails 在整体上与 JSF\
  \ 竞争，从某种意义上说，Java 与 Ruby 或 Groovy 竞争。Google Web Toolkit (GWT)、Flex 和 JavaFX 可以作为\
  \ JSF 的补充。\n\n![image](img/sq.jpg) **注意**  JSP 1.2 和 Servlet 2.3 是在 JSR 53 中一起指定的。同时，JSTL\
  \ 在 JSR 52 中指定。自 2002 年起，JSP 2.0 规范在 JSR 152 中与 Servlet 分开发展。2006 年，JSP 2.1 成为 Java\
  \ EE 5 的一部分，并通过引入统一的 EL 促进了 JSF 和 JSP 之间的集成。随着 Java EE 7 的推出，JSP 和 EL 规范各自独立发展（JSP\
  \ 2.3 和表达式语言 3.0）。本书不涵盖 JSP，因为它已逐渐过时，没有重大改进，而且 JSF 是 Java EE 中首选的 Web 界面技术。\n\n\
  JSF 简史\n\nJSF 1.0 于 2001 年作为 JSR 127 创建，并于 2004 年发布了 1.1 维护版本。直到 2006 年，JSF 1.2\
  \ 才作为 JSR 252（与 Java EE 5 一起）引入 Java EE。该版本最大的挑战是保持向后兼容性，以及将 JSP 与统一的 EL 集成。尽管做出了这些努力，JSF\
  \ 和 JSP 仍然不能很好地配合，因此引入了诸如 Facelets 之类的其他框架作为 JSP 的替代方案。\n\nJSF 2.0 是一个在 JSR 314\
  \ 中发展的主要版本，并且是 Java EE 6 的一部分。它带来了更简单的页面间导航、更简单的基于注解的开发（用于支持 bean、渲染器、转换器、验证器）、更简单的图形组件开发，并且将\
  \ GET 请求提升为与 POST 同等重要的地位（允许用户为页面添加书签）、新的资源处理机制（用于图像、CSS、JavaScript 文件等）以及 Ajax\
  \ 支持。如今，JSF 2.2（JSR 344）延续了这种易开发性，并带来了许多新特性。\n\nJSF 2.2 的新特性？\n\nJSF 2.2（JSR 344）是从\
  \ 2.1 版本发展而来，并且向前迈进了一步，因为它带来了以下新特性：\n\n*   *HTML 友好标记*：能够以纯 HTML 编写视图，但让 JSF 添加所有额外的后端功能\n\
  *   *允许在所有元素上使用 id 属性以支持 HTML5 内容*：与之前的 HTML 标准相反，HTML5 允许你对每种元素使用 id 属性\n*   *Faces\
  \ Flow*：一个主要的 JSF 改进，“流”的概念已被添加到 JSF 2.2 中。流引导用户通过一系列屏幕，例如向导、多屏订阅、预订等。\n*   *AJAX\
  \ 请求的队列控制*：JSF 增加了对控制 Ajax 请求队列的支持。如果在此延迟期间内到达多个请求，则只有最新的请求会被发送到服务器。\n*   *在所有 JSF\
  \ 工件中注入*：在 JSF 2.1 中，相对较少的 JSF 工件可以使用注入。在 JSF 2.2 中，注入在所有地方都是可能的（转换器、验证器、组件等）。\n\
  *   *迁移到 CDI*：JSF 2.0 带来了自己的作用域机制和支持 bean。如今，CDI 已成为旧版 JSF 支持 bean 的直接替代品，并且 JSF\
  \ 2.2 直接支持 CDI 的作用域（这意味着整个 `javax.faces.bean` 已被弃用，并可能在未来的 JSF 版本中被移除）。\n\n表 10-1\
  \ 列出了当今 JavaServer Faces 2.2 中定义的主要包。\n\n表 10-1. 主要 JavaServer Faces 包\n\n\n\n|\
  \ 包名 | 描述 |\n| --- | --- |\n| `javax.faces` | JavaServer Faces 核心 API |\n| `javax.faces.application`\
  \ | 用于将应用程序业务逻辑对象链接到 JavaServer Faces 的 API |\n| `javax.faces.component` | 用户界面组件的基础\
  \ API |\n| `javax.faces.context` | 定义每个请求状态信息的类和接口 |\n| `javax.faces.convert` |\
  \ 定义转换器的类和接口 |\n| `javax.faces.event` | 描述事件和事件监听器的接口，以及具体的事件实现类 |\n| `javax.faces.flow`\
  \ | 用于 Faces Flow 的类和运行时 API |\n| `javax.faces.lifecycle` | 为 JSF 实现定义生命周期管理的类和接口\
  \ |\n| `javax.faces.render` | 定义渲染模型的类和接口 |\n| `javax.faces.validator` | 定义验证器模型和具体验证器实现类的接口\
  \ |\n| `javax.faces.webapp` | 将 JSF 集成到 Web 应用程序所需的类，包括标准 FacesServlet |\n\n参考实现\n\
  \nMojarra，以南美和加勒比海岸发现的一种鱼命名，是 Oracle 开源的 JSF 2.2 参考实现。Mojarra 可在 GlassFish v4 中使用，并将在接下来的示例中用到。\n\
  \nMyFaces 是 Apache 软件基金会的一个项目，托管了多个与 JavaServer Faces 相关的子项目，包括 MyFaces Core（一个\
  \ JSF 运行时实现）。\n\n编写 JSF 页面和组件\n\n编写 JSF 页面与编写 HTML 页面不同，因为 JSF 是一种后端技术。如果你编写一个 JSF\
  \ 页面并直接在浏览器中运行，你将看不到预期的图形化表示。JSF 页面需要在服务器端渲染为 HTML 后才能发送到浏览器。开发者可以根据需要将 JSF 组件与核心\
  \ HTML 和 CSS 结合进行样式设计，但所有这些都将由后端进行渲染。\n\nJSF 页面可以看作是一个组件树，它使用了多个标签库（包括 JSF 规范定义的标签库，以及内部或第三方标签库）。页面主体被编译成一个图形化\
  \ Java 对象的树，这些对象的值绑定到一个支持 bean。因此，该页面拥有一个丰富的生命周期，处理多个不同的阶段。\n\nJSF 页面的结构\n\n一个 JSF\
  \ 页面本质上是一个 XHTML 文件，在头部定义了一系列标签库，主体部分包含图形化表示。例如，让我们复用表示创建新书籍表单的页面（请参考图 10-1）。清单\
  \ 10-7 展示了这两个片段。`xmlns:h=\"` `http://xmlns.jcp.org/jsf/html` `\"` 导入了名为 `http://xmlns.jcp.org/jsf/html`\
  \ 的标签库，并为其指定别名 `h`。当我们需要显示属于该标签库的特定组件时（例如 `<h:panelGrid>` 或 `<h:inputText>`），就会在页面主体中使用这个别名。在这个例子中，只使用了一个标签库，但你可以根据需要添加任意多个。\n\
  \n***清单 10-7.***  使用标签库和组件的 JSF 页面\n\n```\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML\
  \ 1.0 Transitional//EN\"\n        \" http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\
  \ \">\n\n<html xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
  \ >\n\n<h:head>\n  <title>创建新书籍</title>\n</h:head>\n<h:body>\n  <h1>创建新书籍</h1>\n\
    <hr/>\n  <h:form>\n    < h:panelGrid columns=\"2\">\n      <h:outputLabel value=\"\
  ISBN : \"/>\n      <h:inputText value=\"#{bookController.book.isbn}\"/>\n\n<h:outputLabel\
  \ value=\"标题 :\"/>\n      < h:inputText value=\"#{bookController.book.title}\"/>\n\
  \n<h:outputLabel value=\"价格 : \"/>\n      <h:inputText value=\"#{bookController.book.price}\"\
  />\n\n<h:outputLabel value=\"描述  : \"/>\n      <h:inputTextarea value=\"#{bookController.book.description}\"\
  \ cols=\"20\" rows=\"5\"/>\n\n<h:outputLabel value=\"页数 : \"/>\n      <h:inputText\
  \ value=\"#{bookController.book.nbOfPage}\"/>\n\n<h:outputLabel value=\"插图 : \"\
  />\n      <h:selectBooleanCheckbox value=\"#{bookController.book.illustrations}\"\
  />\n\n</h:panelGrid>\n    <h:commandButton value=\"创建书籍\" action=\"#{bookController.doCreateBook}\"\
  />\n\n</h:form>\n  <hr/>\n  <h:outputText value=\"APress - Beginning Java EE 7\"\
  \ style=\"font-style: italic\"/>\n</h:body>\n</html>\n```\n\n头部\n\nJSF 页面的头部可以看作是\
  \ Java 的导入机制：在这里声明页面将要使用的组件库集合。在以下代码中，XML 序言之后是文档类型声明（DTD）`xhtml1-transitional.dtd`。页面的根元素是命名空间\
  \ `http://www.w3.org/1999/xhtml` 中的 `html`。然后，一组 XML 命名空间声明了 JSF 页面中使用的标签库，并带有特定的前缀（`h`\
  \ 和 `f`）。\n\n```\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\
  \n        \" http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd \">\n<html\
  \ xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html\
  \ \"\n      xmlns:f=\" http://xmlns.jcp.org/jsf/core \">\n```\n\n表 10-2 列出了 JSF\
  \ 和 JSTL 规范中定义的所有标签库，这些标签库可以在 Facelets 页面中使用。其中包括 JSF 的核心和 HTML 图形化组件，以及模板和复合库（允许你创建自定义组件）。此外，还有属于\
  \ JSTL 一部分的函数和核心库。\n\n表 10-2. Facelets PDL 允许使用的标签库\n\n| URI | 通用前缀 | 描述 |\n| ---\
  \ | --- | --- |\n| `http://xmlns.jcp.org/jsf/html` | `h` | 此标签库包含组件及其 HTML 渲染器（`h:commandButton`、`h:commandLink`、`h:inputText`\
  \ 等）。 |\n| `http://xmlns.jcp.org/jsf/core` | `f` | 此库包含独立于任何特定渲染的自定义操作（`f:selectItem`、`f:validateLength`、`f:convertNumber`\
  \ 等）。 |\n| `http://xmlns.jcp.org/jsf/facelets` | `ui` | 此库中的标签用于添加模板支持。 |\n| `http://xmlns.jcp.org/jsf/composite`\
  \ | `composite` | 此标签库用于声明和定义复合组件。 |\n| `http://xmlns.jcp.org/jsp/jstl/core` | `c`\
  \ | Facelets 页面可以使用部分核心 JSP 标签库（`<c:if/>`、`<c:forEach/>` 或 `<c:catch/>`）。 |\n| `http://xmlns.jcp.org/jsp/jstl/functions`\
  \ | `fn` | Facelets 页面可以使用所有函数 JSP 标签库。 |\n\n主体\n\n如清单 10-7 所示，JSF 页面的主体描述了一组组织良好的图形化（和非图形化）组件，这些组件最终在服务器端渲染后，会生成你想要的\
  \ HTML 表示。JSF 页面是一个组件树，例如 `<h:outputText>` 将被编译成一个 UI 组件树。UI 组件是一个 Java 类，它直接或间接地继承自抽象的\
  \ `javax.faces.component.UIComponent` 类。该类定义了用于导航组件树、与支持 bean 交互、验证和转换数据以及渲染机制的方法。\n\
  \nJSF 规范提供了构建 Web 应用程序时所需的大量内置 HTML 和核心组件。所有这些组件都继承自 `UIComponent`，并列在表 10-3 中。请注意，这些类都定义在\
  \ `javax.faces.component` 包中。稍后在“JSF HTML 组件标签”部分，你将看到位于 `javax.faces.component.html`\
  \ 中的 HTML 组件。\n\n表 10-3. 标准 JSF UI 组件\n\n\n\n| 组件 | 描述 |\n| --- | --- |\n| `UIColumn`\
  \ | 表示父级 `UIData` 组件中的一列 |\n| `UICommand` | 表示按钮、超链接或菜单等图形组件 |\n| `UIComponent`\
  \ | JSF 中所有用户界面组件的基类 |\n| `UIComponentBase` | 实现 `UIComponent` 定义的所有方法的默认具体行为的便捷类\
  \ |\n| `UIData` | 支持与对象集合的数据绑定；常用于渲染表格、列表和树 |\n| `UIForm` | 表示用户输入表单，是其他组件的容器 |\n\
  | `UIGraphic` | 显示图像 |\n| `UIInput` | 表示用于输入数据的组件，如输入字段、文本区域等 |\n| `UIMessage` `,\
  \ UIMessages` | 负责为特定的 `UIComponent` 显示一条或多条消息 |\n| `UIOutcomeTarget` | 表示支持可书签化的图形按钮和超链接\
  \ |\n| `UIOutput` | 表示输出组件，如标签或任何其他文本数据输出 |\n| `UIPanel` | 表示作为其他组件容器且无需提交表单的 UI\
  \ 组件 |\n| `UIParameter` | 表示无需渲染的信息 |\n| `UISelectBoolean` | 表示复选框 |\n| `UISelectItem`\
  \ `, UISelectItems` | 表示选择列表中的单个或多个项目 |\n| `UISelectOne` `, UISelectMany` | 表示组合框、列表框或复选框组等组件，允许选择单个或多个项目\
  \ |\n| `UIViewAction` | 表示在请求处理生命周期中发生的方法调用 |\n| `UIViewParameter` | 表示请求参数与支持 bean\
  \ 属性之间的双向绑定 |\n| `UIViewRoot` | 表示组件树的根节点，没有图形渲染 |\n\n为了让清单 10-7 中描述的页面具有 HTML 表示形式，JSF\
  \ 运行时实际上使用了页面中定义的每个组件的 HTML 表示形式。这些 HTML 组件继承自表 10-3 中列出的组件。例如，`<h:outputLabel>`\
  \ 由扩展了 `UIOutput` 的 `javax.faces.component.html.HtmlOutputLabel` 类定义。`<h:panelGrid>`\
  \ 由扩展了 `UIPanel` 的 `javax.faces.component.html.HtmlPanelGrid` 类定义，依此类推。清单 10-8 中的\
  \ XML 是清单 10-7 中描述的页面的树形表示。\n\n***清单 10-8.***  newBook XML 组件树的简化视图\n\n```\n<UIViewRoot>\n\
    <html xmlns=\" http://www.w3.org/1999/xhtml \">\n\n< UIOutput ><title>创建新书</title></UIOutput>\n\
  \n<UIOutput>\n\n<h1>创建新书</h1>\n      <hr/>\n\n< HtmlForm >\n        <HtmlPanelGrid>\n\
  \n< HtmlOutputLabel value=\"ISBN : \"/>\n          <HtmlInputText/>\n\n<HtmlOutputLabel\
  \ value=\"标题 :\"/>\n          < HtmlInputText />\n\n<HtmlOutputLabel value=\"价格\
  \ : \"/>\n          <HtmlInputText/>\n\n<HtmlOutputLabel value=\"描述 : \"/>\n          <HtmlInputTextarea/>\n\
  \n<HtmlOutputLabel value=\"页数 : \"/>\n          <HtmlInputText/>\n\n<HtmlOutputLabel\
  \ value=\"插图 : \"/>\n          <HtmlSelectBooleanCheckbox/>\n        </ HtmlPanelGrid\
  \ >\n\n< HtmlCommandButton value=\"创建图书\"/>\n      </HtmlForm>\n\n<hr/>\n      <HtmlOutputText\
  \ value=\"APress - Beginning Java EE 7\" style=\"font-style: italic\"/>\n\n</UIOutput>\n\
    </html>\n</UIViewRoot>\n```\n\n![image](img/sq.jpg) **提示** 只需在页面任意位置添加 `<ui:debug>`\
  \ 标签，然后按下 `CTRL+SHIFT+D`，即可轻松获取 JSF 页面的组件树表示形式。\n\n生命周期\n\nJSF 页面是一个具有特定生命周期的组件树。你应该理解这个生命周期，以便了解组件何时被验证或模型何时被更新。点击按钮会导致请求从你的\
  \ Web 浏览器发送到服务器。此请求被转换为一个可由服务器上应用程序逻辑处理的事件。用户输入的所有数据在模型更新和任何业务逻辑调用之前都会进入验证阶段。然后，JSF\
  \ 负责确保每个图形组件（子组件和父组件）都能正确地渲染到浏览器。图 10-6 展示了 JSF 页面生命周期的不同阶段。\n\n![9781430246268_Fig10-06.jpg](img/9781430246268_Fig10-06.jpg)\n\
  \n图 10-6. JSF 生命周期\n\nJSF 生命周期分为六个不同的阶段。\n\n1.  *恢复视图*：JSF 找到目标视图并将用户的输入应用到该视图。如果这是客户端首次访问该页面，JSF\
  \ 会创建一个 `UIViewRoot` 组件作为视图（如清单 10-8 所示，它是构成特定页面的组件树的根节点）。如果是后续请求，则会检索之前保存的 `UIViewRoot`\
  \ 来处理当前的 HTTP 请求。\n2.  *应用请求值*：来自请求的值（来自 Web 表单的输入字段、cookie 或请求头）被应用到页面的各个组件。请注意，只有\
  \ UI 组件会更新其状态——而不是构成模型的支持 bean。\n3.  *处理验证*：在前述步骤之后，UI 组件已设置值。在验证处理中，JSF 遍历组件树并要求每个组件确保其提交的值是可接受的。如果所有组件的转换和验证都成功，则生命周期继续进入下一阶段。否则，生命周期将进入*渲染响应*阶段，并附带相应的验证和转换错误消息。\n\
  4.  *更新模型值*：所有经过验证的组件值都被绑定到关联的支持 bean。\n5.  *调用应用程序*：现在你可以执行一些业务逻辑。任何被触发的动作都将在支持\
  \ bean 上执行，并且导航在此处生效，因为其返回值将决定渲染响应。\n6.  *渲染响应*：导致响应被渲染到客户端。此阶段的次要目标是保存视图的状态，以便在用户再次请求时可以在恢复视图阶段恢复它。\n\
  \n请求/响应周期的执行线程可以流经每个阶段，也可以不流经，这取决于请求以及处理过程中发生的情况；如果发生错误，执行流程会立即转移到渲染响应阶段。请注意，其中四个阶段可以生成消息：应用请求值、处理验证、更新模型值和调用应用程序。无论是否有消息，都是渲染响应阶段将输出发送回用户。\n\
  \nJSF 组件剖析\n\nJSF 页面是一个组件树。其中一些组件具有 HTML 表示形式，另一些则没有，它们允许你进行验证、转换数据或启用 Ajax 调用。你可以使用多种组件来设计你的\
  \ Web 页面。\n\n*   JSF 内置的 HTML、核心和模板组件，\n*   JSTL 标签，\n*   你自己的自制组件，以及\n*   第三方组件（开源或商业）。\n\
  \n有时这些组件需要外部资源，如图像、CSS 或 JavaScript。JSF 以一种非常巧妙的方式管理这些资源，你可以根据区域设置、库或版本号来捆绑你的资源（更多内容请参见“资源管理”部分）。正如你将看到的，JSF\
  \ 页面还可以访问隐式对象，允许组件使用 HTTP 请求参数、cookie 信息或 HTTP 头。\n\nJSF HTML 组件标签\n\n\n\nJSF 的架构设计独立于任何特定的协议或标记语言，并且它也用于编写通过\
  \ HTTP 通信的 HTML 客户端应用程序。特定网页的用户界面是通过组装组件来创建的。组件提供了与最终用户交互的特定功能（如标签、表格、复选框等）。JSF\
  \ 提供了许多内置的 HTML 组件，涵盖了大多数常见需求。\n\n一个页面是一个组件树；每个组件由一个继承自 `javax.faces.component.UIComponent`\
  \ 的类表示，并具有属性、方法和事件。树中的组件与其他组件存在父子关系，从树的根元素（即 `UIViewRoot` 的一个实例）开始（参见清单 10-8）。让我们专注于在网页上使用这些组件。`javax.faces.component.html`\
  \ 包描述了 HTML 组件。\n\n命令\n\n命令（`UICommand`）是用户可点击以触发操作的控件。此类组件通常呈现为按钮或超链接。表 10-4 列出了可使用的两个命令标签。\n\
  \n表 10-4. 命令标签\n\n| 标签 | 类 | 描述 |\n| --- | --- | --- |\n| `<h:commandButton>` |\
  \ `HtmlCommandButton` | 表示用于提交或重置类型按钮的 HTML 输入元素 |\n| `<h:commandLink>` | `HtmlCommandLink`\
  \ | 表示行为类似于提交按钮的超链接的 HTML 元素。此组件必须放置在表单内部 |\n\n如果你需要在页面上添加提交按钮、重置按钮、可点击的图片或触发事件的超链接，可以按如下方式操作：\n\
  \n```\n<h:commandButton value=\"一个提交按钮\"/>\n<h:commandButton type=\"reset\" value=\"\
  一个重置按钮\"/>\n<h:commandButton image=\"book.gif\" title=\"一个带图片的按钮\"/>\n<h:commandLink>一个超链接</h:commandLink>\n\
  ```\n\n默认情况下，`commandButton` 的类型为 submit，但可以更改为 reset 类型（`type=\"reset\"`）。如果你想将按钮变成图片，请不要使用\
  \ `value` 属性（那是按钮的名称），而应使用 `image` 属性来指定要显示图片的路径。以下是上述代码的图形结果：\n\n![9781430246268_unFig10-01.jpg](img/9781430246268_unFig10-01.jpg)\n\
  \n按钮和链接都有一个 `action` 属性，用于调用支持 bean 上的方法。例如，要调用 `bookController` 的 `doNew()` 方法，请在\
  \ `action` 属性中使用以下 EL 表达式来指定：\n\n```\n<h:commandLink action=\"#{bookController.doNew}\"\
  \ >\n  创建一本新书\n</h:commandLink>\n```\n\n目标\n\n前面的命令组件通过生成 HTTP POST 来调用支持 bean 上的操作。如果你需要一个按钮或链接通过生成\
  \ HTTP GET 直接跳转到另一个页面，那么你需要使用表 10-5 中定义的目标组件（`UIOutcomeTarget`）。请注意，这些组件在 JSF 应用程序中实现了可书签化。\n\
  \n表 10-5. 目标标签\n\n| 标签 | 类 | 描述 |\n| --- | --- | --- |\n| `<h:button>` | `HtmlOutcomeTargetButton`\
  \ | 呈现一个用于按钮的 HTML 输入元素（点击时产生 HTTP GET） |\n| `<h:link>` | `HtmlOutcomeTargetLink`\
  \ | 呈现一个 HTML `<a>` 锚点元素（点击时产生 HTTP GET） |\n\n如果你需要在不调用支持 bean 的情况下从一个页面导航到另一个页面，可以按如下方式使用结果组件：\n\
  \n```\n<h:button outcome=\"newBook.xhtml\" value=\"一个可书签化的按钮链接\"/>\n<h:link outcome=\"\
  newBook.xhtml\" value=\"一个可书签化的链接\"/>\n```\n\n其图形表示符合预期。\n\n![9781430246268_unFig10-02.jpg](img/9781430246268_unFig10-02.jpg)\n\
  \n输入\n\n输入（`UIInput`）是向用户显示其当前值并允许用户输入不同类型文本信息的组件。这些可以是文本字段、文本区域，或用于输入密码或隐藏数据的组件。表\
  \ 10-6 列出了输入标签。\n\n表 10-6. 输入标签\n\n| 标签 | 类 | 描述 |\n| --- | --- | --- |\n| `<h:inputHidden>`\
  \ | `HtmlInputHidden` | 表示类型为 hidden 的 HTML 输入元素（用于在页面之间传播会话之外的值） |\n| `<h:inputSecret>`\
  \ | `HtmlInputSecret` | 表示类型为 password 的 HTML 输入元素。重新显示时，之前输入的任何值都不会被渲染（出于安全原因），除非\
  \ redisplay 属性设置为 `true` |\n| `<h:inputText>` | `HtmlInputText` | 表示类型为 text 的 HTML\
  \ 输入元素 |\n| `<h:inputTextarea>` | `HtmlInputTextarea` | 表示 HTML 文本区域元素 |\n| `<h:inputFile>`\
  \ | `HtmlInputFile` | 允许你浏览目录并选择及上传文件 |\n\n许多网页包含表单，用户必须在其中输入一些数据或使用密码登录。输入组件有多个属性，允许你更改其长度、内容或外观，如下所示：\n\
  \n```\n<h:inputHidden value=\"隐藏数据\"/>\n<h:inputSecret maxlength=\"8\" />\n<h:inputText\
  \ value=\"一个输入文本\"/>\n<h:inputText size=\"40\" value=\"一个更长的输入文本\"/>\n<h:inputTextarea\
  \ rows=\"4\" cols=\"20\" value=\"一个文本区域\"/>\n<h:inputFile/>\n```\n\n所有组件都有一个 `value`\
  \ 属性来设置其默认值。你可以使用 `maxLength` 属性来检查输入的文本是否超过特定长度，或使用 `size` 属性来更改组件的默认大小。上述代码将具有以下图形表示：\n\
  \n![9781430246268_unFig10-03.jpg](img/9781430246268_unFig10-03.jpg)\n\n输出\n\n输出组件（继承自\
  \ `UIOutput` 的类）显示一个值，该值可选地来自支持 bean、值表达式或固定文本。用户无法直接修改该值，因为它仅用于显示目的。表 10-7 列出了可用的输出标签。\n\
  \n表 10-7. 输出标签\n\n| 标签 | 类 | 描述 |\n| --- | --- | --- |\n| `<h:outputLabel>` | `HtmlOutputLabel`\
  \ | 呈现一个 HTML `<label>` 元素 |\n| `<h:outputLink>` | `HtmlOutputLink` | 呈现一个 HTML\
  \ `<a>` 锚点元素 |\n| `<h:outputText>` | `HtmlOutputText` | 输出文本 |\n| `<h:outputFormat>`\
  \ | `HtmlOutputFormat` | 呈现参数化文本 |\n\n大多数网页都需要显示一些文本。你可以使用普通的 HTML 元素来实现，但 JSF 输出标签允许你使用\
  \ EL 显示绑定到支持 bean 的变量的内容。你可以使用 `<h:outputText>` 显示文本，使用 `<h:outputLink>` 显示超文本链接。请注意，`<h:commandLink>`\
  \ 和 `<h:outputLink>` 之间的区别在于，后者显示链接，但点击时不会调用任何支持 bean 的方法。它只是创建一个外部链接或锚点。\n\n```\n\
  <h:outputLabel value=\" #{bookController.book.title} \"/>\n<h:outputText value=\"\
  一段文本\"/>\n<h:outputLink value=\" http://www.apress.com/\">一个链接</h:outputLink>\n\
  <h:outputFormat value=\"欢迎 {0}。您已购买了 {1} 件商品\">\n  <f:param value=\"#{user.firstName}\"\
  \ />\n  <f:param value=\"#{user.itemsBought}\" />\n</h:outputFormat>\n```\n\n上述代码没有任何特殊的图形表示，只有文本。以下是\
  \ HTML 渲染结果：\n\n```\n<label>书的标题</label>\n一段文本\n<a href=\" http://www.apress.com/\"\
  >一个链接</a>\n欢迎 Paul。您已购买了 5 件商品\n```\n\n选择\n\n复选框、单选按钮、列表或组合框代表选择组件（参见表 10-8），用于从列表中选择一个或多个值。选择组件允许用户在确定的可用选项集中进行选择。\n\
  \n\n\n表 10-8. 选择标签\n\n| 标签 | 类 | 描述 |\n| --- | --- | --- |\n| `<h:selectBooleanCheckbox>`\
  \ | `HtmlSelectBooleanCheckbox` | 渲染一个表示单个布尔值的复选框。该复选框将根据属性值显示为选中或未选中状态 |\n| `<h:selectManyCheckbox>`\
  \ | `HtmlSelectManyCheckbox` | 渲染一组复选框 |\n| `<h:selectManyListbox>` | `HtmlSelectManyListbox`\
  \ | 渲染一个多选组件，可选择多个选项 |\n| `<h:selectManyMenu>` | `HtmlSelectManyMenu` | 渲染一个 HTML\
  \ `<select>` 元素 |\n| `<h:selectOneListbox>` | `HtmlSelectOneListbox` | 渲染一个单选组件，只能选择一个可用选项\
  \ |\n| `<h:selectOneMenu>` | `HtmlSelectOneMenu` | 渲染一个单选组件，只能选择一个可用选项。它一次只显示一个可用选项\
  \ |\n| `<h:selectOneRadio>` | `HtmlSelectOneRadio` | 渲染一组单选按钮 |\n\n此表中列出的标签具有图形化表示，但需要不同的标签来容纳可用选项：`<f:selectItem>`\
  \ 或 `<f:selectItems>`。这些标签嵌套在图形化组件内部，用于创建额外的可用选项。要表示一个包含书籍类型列表的组合框，应在 `<h:selectOneMenu>`\
  \ 标签中嵌套一组 `<f:selectItem>` 标签。\n\n```\n<h:selectOneMenu>\n  <f:selectItem itemLabel=\"\
  历史\"/>\n  <f:selectItem itemLabel=\"传记\"/>\n  <f:selectItem itemLabel=\"文学\"/>\n\
    <f:selectItem itemLabel=\"漫画\"/>\n  <f:selectItem itemLabel=\"儿童\"/>\n  <f:selectItem\
  \ itemLabel=\"科幻\"/>\n</h:selectOneMenu>\n```\n\n下图展示了所有可能的表示形式。有些列表支持多选，有些则只支持单选，并且与其他所有组件一样，你可以将支持\
  \ bean 的属性值（`List`、`Set` 等）直接绑定到其中一个列表。\n\n![9781430246268_unFig10-04.jpg](img/9781430246268_unFig10-04.jpg)\n\
  \n图形\n\n用于显示图像的组件只有一个：`<h:graphicImage>`（类 `HtmlGraphicImage`）。它向用户显示一个不可点击的图形图像。此标签被渲染为\
  \ HTML `<img>` 元素。它具有多个属性，允许你调整图像大小、将图形用作图像映射等。你可以显示一个绑定到支持 bean 属性且来自文件系统或数据库的图像。以下代码显示一张图像并调整其大小：\n\
  \n```\n<h:graphicImage value=\"book.gif\" height=\"200\" width=\"320\"/>\n```\n\n\
  网格与表格\n\n数据通常需要以表格格式显示（参见表 10-9）。JSF 提供了非常强大的 `<h:dataTable>` 标签，它可以遍历元素列表并创建表格。表格也可用于创建基于网格的\
  \ UI 布局。在这种情况下，你可以使用 `<h:panelGrid>` 和 `<h:panelGroup>` 标签来布局你的组件。`<h:dataTable>`\
  \ 主要用于显示包含应用程序中某些模型数据的表格，而 `<h:panelGrid>` 则用于布局和放置元素。\n\n表 10-9. 网格与表格标签\n\n| 标签\
  \ | 类 | 描述 |\n| --- | --- | --- |\n| `<h:dataTable>` | `HtmlDataTable` | 表示一组重复数据，这些数据将渲染在\
  \ HTML `<table>` 元素中 |\n| `<h:column>` | `HtmlColumn` | 在 `<h:dataTable>` 组件内渲染单列数据\
  \ |\n| `<h:panelGrid>` | `HtmlPanelGrid` | 渲染一个 HTML `<table>` 元素 |\n| `<h:panelGroup>`\
  \ | `HtmlPanelGroup` | 是一个组件容器，可嵌入到 `<h:panelGrid>` 中 |\n\n与 `<h:dataTable>` 不同，`<h:panelGrid>`\
  \ 标签不使用底层数据模型来渲染数据行。相反，此组件是一个布局容器，它在一个由行和列组成的网格中渲染其他 JSF 组件。你可以指定用于显示组件的列数，`<h:panelGrid>`\
  \ 将确定需要多少行。`columns` 属性是在开始新行之前要渲染的列数。例如，在以下代码中，渲染结果将是三列两行（先按行显示，再按列显示）：\n\n```\n\
  <h:panelGrid columns=\"3\" border=\"1\">\n  <h:outputLabel value=\"一\"/>\n  <h:outputLabel\
  \ value=\"二\"/>\n  <h:outputLabel value=\"三\"/>\n  <h:outputLabel value=\"四\"/>\n\
    <h:outputLabel value=\"五\"/>\n  <h:outputLabel value=\"六\"/>\n</h:panelGrid>\n\
  ```\n\n如果你想将多个组件合并到一列中，可以使用 `<h:panelGroup>`，它会将其子组件渲染为一个组件。你还可以使用特殊的 `<f:facet>`\
  \ 标签定义页眉和页脚：\n\n```\n<h:panelGrid columns=\"3\" border=\"1\">\n  <f:facet name=\"\
  header\">\n    <h:outputText value=\"页眉\"/>\n  </f:facet>\n  <h:outputLabel value=\"\
  一\"/>\n  <h:outputLabel value=\"二\"/>\n  <h:outputLabel value=\"三\"/>\n  <h:outputLabel\
  \ value=\"四\"/>\n  <h:outputLabel value=\"五\"/>\n  <h:outputLabel value=\"六\"/>\n\
    <f:facet name=\"footer\">\n    <h:outputText value=\"页脚\"/>\n  </f:facet>\n</h:panelGrid>\n\
  ```\n\n前面描述的两个表格将具有以下图形化表示，一个带有页眉和页脚，另一个则没有。\n\n![9781430246268_unFig10-05.jpg](img/9781430246268_unFig10-05.jpg)\n\
  \n错误消息\n\n应用程序有时会因格式错误的数据或技术原因抛出异常。但是，就用户而言，界面上应显示足够的信息以引起他们的注意并纠正问题（而不是显示整个异常堆栈跟踪）。管理错误消息的机制是在页面中包含\
  \ `<h:message>` 和 `<h:messages>` 标签（参见表 10-10）。`<h:message>` 绑定到特定组件，而 `<h:messages>`\
  \ 可以为页面上的所有组件提供全局消息。\n\n表 10-10. 消息标签\n\n| 标签 | 类 | 描述 |\n| --- | --- | --- |\n\
  | `<h:message>` | `HtmlMessage` | 渲染一条错误消息 |\n| `<h:messages>` | `HtmlMessages`\
  \ | 渲染所有已排队的错误消息 |\n\n消息可以具有不同的严重级别（`INFO`、`WARN`、`ERROR` 和 `FATAL`），每个级别对应一个 CSS\
  \ 样式（`infoStyle`、`warnStyle`、`errorStyle` 和 `fatalStyle`）。这样，每种类型的消息都可以有不同的渲染样式。例如，以下代码将以红色显示所有消息：\n\
  \n```\n<h:messages style=\"color:red\"/>\n<h:form>\n  输入标题：\n  <h:inputText value=\"\
  #{bookController.title}\" required=\"true\"/>\n  <h:commandButton action=\"#{bookController.save}\"\
  \ value=\"保存\"/>\n</h:form>\n```\n\n这将显示一个绑定到支持 bean 属性的输入字段。此属性是必需的，因此，如果用户未填写就单击保存按钮，将显示一条错误消息：\n\
  \n![9781430246268_unFig10-06.jpg](img/9781430246268_unFig10-06.jpg)\n\n其他标签\n\n\
  还有一些其他标签没有图形化表示，但有对应的 HTML 等效标签。可以使用原生 HTML 标签，并且它们也能正常工作。使用 JSF 标签时，提供了额外的属性以使开发更容易。例如，你可以使用标准的\
  \ HTML `<script type=\"text/javascript\">` 标签向页面添加 JavaScript 库。但是，使用 JSF 的 `<h:outputScript>`\
  \ 标签，你可以使用新的资源管理功能，正如你将在“资源管理”部分看到的那样。表 10-11 展示了这些其他标签。\n\n表 10-11. 其他标签\n\n\n\n\
  | 标签 | 类 | 描述 |\n| --- | --- | --- |\n| `<h:body>` | `HtmlBody` | 渲染一个 HTML `<body>`\
  \ 元素 |\n| `<h:head>` | `HtmlHead` | 渲染一个 HTML `<head>` 元素 |\n| `<h:form>` | `HtmlForm`\
  \ | 渲染一个 HTML `<form>` 元素 |\n| `<h:doctype>` | `HtmlDoctype` | 渲染一个 HTML `<doctype>`\
  \ 元素 |\n| `<h:outputScript>` | `Output` | 渲染 `<script>` 的标记 |\n| `<h:outputStylesheet>`\
  \ | `Output` | 渲染 `<link>` 元素的标记 |\n\n基本属性\n\n前面介绍的每个 HTML 组件标签在复杂度和可使用的属性数量上都有所不同。例如，`<h:message>`\
  \ 只有少数几个属性，包括一个 CSS 样式（例如 `<h:messages style=\"color:red\"/>`），但 `<h:inputFile>`\
  \ 作为一个更复杂的组件，拥有更多属性（要上传文件的位置、要浏览的目录等）。然而，所有 HTML 组件都共享一些通用属性，这些属性在表 10-12 中进行了描述。\n\
  \n表 10-12. 一些基本属性\n\n| 属性 | 描述 |\n| --- | --- |\n| `id` | 组件的标识符 |\n| `rendered`\
  \ | 布尔值，用于控制是否渲染 |\n| `value` | 组件的值（文本或 EL 表达式） |\n| `converter` | 转换器类名 |\n| `validator`\
  \ | 验证器类名 |\n| `required` | 如果为 true，则要求在关联字段中输入值 |\n\nJSF 核心标签\n\nJSF HTML 组件标签只能用于\
  \ HTML 渲染（请记住，JSF 不关心最终的显示设备，并且可以使用多种渲染器）。但一些核心的 JavaServer Faces 操作与任何特定的渲染器无关。它们没有任何可视化表示，主要用于向其他组件传递属性或参数，以及用于转换或验证。表\
  \ 10-13 列出了这些标签。\n\n表 10-13. 一些 JSF 核心标签\n\n| 标签 | 描述 |\n| --- | --- |\n| `<f:facet>`\
  \ | 向组件添加一个 facet |\n| `<f:attribute>` | 向组件添加一个属性 |\n| `<f:param>` | 构造一个参数子组件\
  \ |\n| `<f:actionListener><f:valueChangeListener><f:propertyActionListener>` | 向组件添加动作监听器、值变更监听器或属性动作监听器\
  \ |\n| `<f:phaseListener>` | 向页面添加阶段监听器 |\n| `<f:converter><f:convertDateTime><f:convertNumber>`\
  \ | 向组件添加任意转换器，或使用特定的日期/时间和数字转换器 |\n| `<f:validator><f:validateDoubleRange><f:validateLongRange><f:validateLength><f:validateRegex>`\
  \ | 向组件添加任意验证器，或使用特定的双精度、长整型、长度和正则表达式验证器 |\n| `<f:validateBean>` | 指定 Bean 验证的验证组（参见第\
  \ 3 章） |\n| `<f:loadBundle>` | 加载资源包 |\n| `<f:selectItem><f:selectItems>` | 为单选或多选组件指定一个或多个项目\
  \ |\n| `<f:ajax>` | 启用 Ajax 行为 |\n\nJSF 模板标签\n\n一个典型的 Web 应用程序包含多个共享相同外观和感觉的页面，例如页眉、页脚、菜单等。Facelets\
  \ 允许你在一个模板文件中定义布局，该布局可用于 Web 应用程序中的所有页面。模板定义了内容可以被替换的区域（使用 `<ui:insert>` 标签）。客户端页面随后使用\
  \ `<ui:component>`、`<ui:composition>`、`<ui:fragment>` 或 `<ui:decorate>` 标签将片段嵌入到模板中。表\
  \ 10-14 列出了各种模板标签。\n\n表 10-14. 模板标签\n\n| 标签 | 描述 |\n| --- | --- |\n| `<ui:composition>`\
  \ | 定义一个组合，可以选择使用模板。多个组合可以使用同一个模板。 |\n| `<ui:component>` | 创建一个组件。 |\n| `<ui:debug>`\
  \ | 捕获调试信息。 |\n| `<ui:define>` | 定义由模板插入到页面中的内容。 |\n| `<ui:decorate>` | 允许你装饰页面中的某些内容。\
  \ |\n| `<ui:fragment>` | 添加页面的一部分片段。 |\n| `<ui:include>` | 在多个 XHTML 页面之间封装和重用内容。\
  \ |\n| `<ui:insert>` | 将内容插入到模板中。 |\n| `<ui:param>` | 向包含的文件（使用 `<ui:include>`）或模板传递参数。\
  \ |\n| `<ui:repeat>` | 遍历对象列表。 |\n| `<ui:remove>` | 从页面中移除内容。 |\n\n举个例子，让我们重用表示创建新书籍表单的页面（请参考图\
  \ 10-1）。你可以说标题是页面的页眉（*创建新书*），而页脚将是底部的文本 *Apress - Beginning Java EE 7*。因此，名为 `layout.xhtml`\
  \ 的模板将类似于代码清单 10-9 中的代码。\n\n***代码清单 10-9.***  作为模板的 layout.xhtml 文件\n\n```\n<html\
  \ xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html\
  \ \"\n      xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\">\n\n<h:head>\n  <title>\
  \ <ui:insert name=\"title\"> 默认标题 </ui:insert> </title>\n</h:head>\n<h:body>\n  <h1>\
  \ <ui:insert name=\"title\"> 默认标题 </ui:insert> </h1>\n  <hr/>\n\n<ui:insert name=\"\
  content\"> 默认内容 </ui:insert>\n\n<hr/>\n  <h:outputText value=\"APress - Beginning\
  \ Java EE 7\" style=\"font-style: italic\"/>\n\n</h:body>\n</html>\n```\n\n代码清单\
  \ 10-9 中的模板必须首先定义所需的标签库（`FontName2\">http://xmlns.jcp.org/jsf/facelets` `\"`）。然后，它使用\
  \ `<ui:insert>` 标签将一个 `title` 属性插入到 `<title>` 和 `<h1>` 标签中。页面的主体内容将被插入到名为 `content`\
  \ 的属性中。\n\n要使用此模板，代码清单 10-10 中显示的 `newBook.xhtml` 页面需要声明它需要哪个模板（`<ui:composition\
  \ template=\"layout.xhtml\">`）。然后，思路是将 `<ui:define>` 标签中定义的属性与模板中的 `<ui:insert>`\
  \ 标签绑定。例如，页面的标题是“创建新书”。此文本存储在 `title` 变量中（通过 `<ui:define name=\"title\">`），该变量与匹配的标签\
  \ `<ui:insert name=\"title\">` 绑定。页面的其余部分也是如此，它被插入到 `content` 变量中（`<ui:define name=\"\
  content\">`）。\n\n***代码清单 10-10.***  使用 layout.xhtml 模板的 newBook.xhtml 页面\n\n```\n\
  <html xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html\
  \ \"\n      xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\">\n\n<ui:composition template=\"\
  layout.xhtml\">\n\n<ui:define name=\"title\"> 创建新书 </ui:define>\n\n<ui:define name=\"\
  content\">\n\n<h:form>\n      <h:panelGrid columns=\"2\">\n        <h:outputLabel\
  \ value=\"ISBN : \"/>\n        <h:inputText value=\"#{bookController.book.isbn}\"\
  />\n\n<h:outputLabel value=\"标题 :\"/>\n        <h:inputText value=\"#{bookController.book.title}\"\
  />\n\n<h:outputLabel value=\"价格 : \"/>\n        <h:inputText value=\"#{bookController.book.price}\"\
  />\n\n<h:outputLabel value=\"描述 : \"/>\n        <h:inputTextarea value=\"#{bookController.book.description}\"\
  \ cols=\"20\" rows=\"5\"/>\n\n<h:outputLabel value=\"页数 : \"/>\n        <h:inputText\
  \ value=\"#{bookController.book.nbOfPage}\"/>\n\n<h:outputLabel value=\"插图 : \"\
  />\n        <h:selectBooleanCheckbox value=\"#{bookController.book.illustrations}\"\
  />\n\n</h:panelGrid>\n      <h:commandButton value=\"创建书籍\" action=\"#{bookController.doCreateBook}\"\
  />\n    </h:form>\n\n</ui:define>\n\n</ui:composition>\n</html>\n```\n\nJSTL 标签\n\
  \n\n\nJSP 标准标签库使用标签标准化了许多常见操作。这些操作涵盖从设置对象值到捕获异常、通过条件和迭代器控制流程结构、XML 解析以及访问数据库等。表\
  \ 10-15 列出了这些标签，以及用于引用这些库的 URI（统一资源标识符）和常用的关联前缀。\n\n表 10-15. JSTL 标签库\n\n| 功能领域\
  \ | URI | 常用前缀 |\n| --- | --- | --- |\n| 核心 | `http://xmlns.jcp.org/jsp/jstl/core`\
  \ | `c` |\n| XML 处理 | `http://xmlns.jcp.org/jsp/jstl/xml` | `x` |\n| 国际化与格式化 | `http://xmlns.jcp.org/jsp/jstl/fmt`\
  \ | `fmt` |\n| 数据库访问 | `http://xmlns.jcp.org/jsp/jstl/sql` | `sql` |\n| 函数 | `http://xmlns.jcp.org/jsp/jstl/functions`\
  \ | `fn` |\n\n但 Facelets 仅暴露了 JSTL 库的一个子集。实际上，它只暴露了核心标签库的一个子集以及完整的国际化与格式化标签库（不包括\
  \ XML 处理、函数或数据库访问）。\n\n核心操作\n\n核心操作提供了用于操作变量、处理错误、执行测试以及执行循环和迭代的标签。表 10-16 显示了 Facelets\
  \ 支持的操作。\n\n表 10-16. Facelets 支持的 JSTL 核心操作子集\n\n| 操作 | 描述 |\n| --- | --- |\n| `<c:set>`\
  \ | 在某个作用域内为变量设置值。 |\n| `<c:catch>` | 捕获其任何嵌套操作抛出的`java.lang.Throwable`。 |\n| `<c:if>`\
  \ | 评估表达式是否为真。 |\n| `<c:choose>` | 提供互斥的条件。 |\n| `<c:when>` | 表示`<c:choose>`操作中的一个备选分支。\
  \ |\n| `<c:otherwise>` | 表示`<c:choose>`操作中的最后一个备选分支。 |\n| `<c:forEach>` | 对对象集合重复执行嵌套体内容，或重复固定次数。\
  \ |\n\n为了演示其中一些标签的实际应用，让我们编写一个 JSF 页面，该页面从数字 3 循环到数字 15，判断数字是奇数还是偶数，并在每个数字前显示此信息（见清单\
  \ 10-11）。\n\n***清单 10-11.***  一个显示奇数和偶数列表的 JSF 页面\n\n```\n<html xmlns=\" http://www.w3.org/1999/xhtml\
  \ \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html \"\n      xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\
  \ >\n<h:head>\n  <title>检查数字</title>\n</h:head>\n<h:body>\n  <h1>检查数字</h1>\n  <hr/>\n\
  \n< c:set var=\"upperLimit\" value=\"20\"/>\n  < c:forEach var=\"i\" begin=\"3\"\
  \ end=\"#{upperLimit - 5}\">\n\n< c:choose >\n      < c:when test=\"#{i%2 == 0}\"\
  >\n        <h:outputText value=\"#{i} 是偶数\"/><br/>\n      </c:when>\n      < c:otherwise\
  \ >\n        <h:outputText value=\"#{i} 是奇数\"/><br/>\n      </c:otherwise>\n    </c:choose>\n\
  \n</c:forEach>\n\n<hr/>\n  <h:outputText value=\"APress - Beginning Java EE 7\"\
  \ style=\"font-style: italic\"/>\n</h:body>\n</html>\n```\n\n要使用核心标签库，页面需要以其前缀（即\
  \ XML 命名空间）导入其 URI。清单 10-11 中的代码使用`<c:set>`标签将值`20`赋给`upperLimit`变量，然后从数字 3 迭代到数字\
  \ 15（20 减 5）。你可以看到 EL 与算术表达式`#{upperLimit - 5}`的用法。在循环内部，测试索引（变量`i`）的值是奇数还是偶数（`<c:when\
  \ test=\"#{i%2 == 0}\">`）。`<h:outputText>`标签显示索引值及其文本（`\"#{i} 是偶数\"`）。\n\n逻辑完全通过标签实现，此页面完全符合\
  \ XML 规范，使用了一种非 Java 程序员易于阅读和理解的标记语言。\n\n格式化操作\n\n格式化操作提供了对日期、数字、货币和百分比进行格式化的支持，并且还支持国际化（i18n）。你可以获取或设置区域设置和时区，或者获取网页的编码。表\
  \ 10-17 显示了格式化库中包含的操作。\n\n表 10-17. 格式化操作\n\n| 操作 | 描述 |\n| --- | --- |\n| `<fmt:message>`\
  \ | 通过从资源包中提取消息来实现国际化。 |\n| `<fmt:param>` | 为`<fmt:message>`提供参数。 |\n| `<fmt:bundle>`\
  \ | 确定资源包。 |\n| `<fmt:setLocale>` | 设置区域设置。 |\n| `<fmt:requestEncoding>` | 设置请求的字符编码。\
  \ |\n| `<fmt:timeZone>` | 指定格式化时间信息所使用的时区。 |\n| `<fmt:setTimeZone>` | 将指定的时区存储到变量中。\
  \ |\n| `<fmt:formatNumber>` | 以区域设置敏感的方式格式化数值（数字、货币、百分比）。 |\n| `<fmt:parseNumber>`\
  \ | 解析数字、货币和百分比的字符串表示形式。 |\n| `<fmt:formatDate>` | 以区域设置敏感的方式格式化日期和时间。 |\n| `<fmt:parseDate>`\
  \ | 解析日期和时间的字符串表示形式。 |\n\n为了理解这些标签，请查看清单 10-12 中所示的 JSF 页面，该页面使用其中一些操作来格式化日期和数字，并对货币进行国际化。\n\
  \n***清单 10-12.***  一个格式化日期和数字的 JSF 页面\n\n```\n<html xmlns=\" http://www.w3.org/1999/xhtml\
  \ \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html \"\n      xmlns:c=\" http://xmlns.jcp.org/jsp/jstl/core\
  \ \"\n      xmlns:fmt=\"http://xmlns.jcp.org/jsp/jstl/fmt\" >\n\n<h:head><title>格式化数据</title></h:head>\n\
  <h:body>\n\n日期<br/>\n  <c:set var=\" now \" value=\"#{bookController.currentDate}\"\
  />\n  < fmt:formatDate type=\"time\" value=\" #{now} \"/><br/>\n  <fmt:formatDate\
  \ type=\"date\" value=\"#{now}\"/><br/>\n  <fmt:formatDate type=\"both\" dateStyle=\"\
  short\" timeStyle=\"short\" value=\"#{now}\"/><br/>\n  <fmt:formatDate type=\"both\"\
  \ dateStyle=\"long\" timeStyle=\"long\" value=\"#{now}\"/><br/>\n\n货币<br/>\n  <\
  \ fmt:setLocale value=\" en_us \"/>\n  < fmt:formatNumber value=\"20.50\" type=\"\
  currency\"/><br/>\n  <fmt:setLocale value=\" en_gb \"/>\n  <fmt:formatNumber value=\"\
  20.50\" type=\"currency\"/><br/>\n\n</h:body>\n</html>\n```\n\n该页面导入了`core`和`format`标签库，并使用`c`和`fmt`前缀。`<c:set\
  \ var=\"now\" value=\"#{bookController.currentDate}\"/>`这一行将当前日期设置到名为`now`的变量中。`<fmt:formatDate>`标签使用不同的模式格式化此日期：仅显示时间、仅显示日期、同时显示时间和日期。`<fmt:setLocale\
  \ value=\"en_us\"/>`这一行将区域设置设为美国，并格式化货币，结果为`$20.50`。然后，区域设置更改为英国，结果变为英镑。此 JSF 页面产生以下结果：\n\
  \n```\n日期\n11:31:12\n2013 年 5 月 14 日\n14/05/13 11:31\n2013 年 5 月 14 日 11:31:12 CET\n\
  \n货币\n$ 20.50\n£ 20.50\n```\n\n资源管理\n\n大多数组件可能需要外部资源才能正确渲染。`<h:graphicImage>`需要外部图像来显示，`<h:commandButton>`也可以将图像显示为按钮，`<h:outputScript>`引用外部\
  \ JavaScript 文件，组件可以应用 CSS 样式（通过`<h:outputStylesheet>`）。在 JSF 中，资源是可以传输给组件的静态元素，以便它们能够被浏览器显示（如图像）或处理（如\
  \ JavaScript、CSS）。\n\n\n\nJSF 的早期版本没有提供资源服务功能。当您需要提供资源时，必须将其放置在 web 目录中，以便客户端浏览器能够访问。问题在于，如果您想要更新资源，就必须替换目录中的文件，并且需要不同的目录来呈现本地化资源（例如，包含英文或葡萄牙语文本的图片）。JSF\
  \ 2.0 引入了对此功能的支持，因此您现在可以直接将资源放在 `resources` 目录下，或者将它们打包到一个单独的 jar 文件中（可附带可选的版本和/或区域设置）。资源可以放置在\
  \ web 应用程序根目录下的以下路径中：\n\n```\nresources /<resourceIdentifier>\n```\n\n或者放在 `WEB-INF/lib`\
  \ 目录下的 jar 文件中。\n\n```\nWEB-INF/lib/{*.jar}/META-INF/ resources /<resourceIdentifier>\n\
  ```\n\n`<resourceIdentifier>` 由几个子文件夹组成，具体说明如下：\n\n```\n[localePrefix/][libraryName/][libVersion/]resourceName[/resourceVersion]\n\
  ```\n\n此资源标识符中 `[]` 内的项是可选的。区域前缀由语言代码和可选的国家代码组成（`en`、`en_US`、`pt`、`pt_BR`）。如本行所示，您可以为库或资源本身添加版本控制。以下是您可能最终得到的资源结构：\n\
  \n```\nbook.gif\nen/book.gif\nen_us/book.gif\nen/myLibrary/book.gif\nmyLibrary/book.gif\n\
  myLibrary/1_0/book.gif\nmyLibrary/1_0/book.gif/2_3.gif\n```\n\n然后，您可以直接在 `<h:graphicImage>`\
  \ 组件中使用诸如 `book.gif` 图片之类的资源（`value=\"book.gif\"`），或者通过指定库名称（`library=\"myLibrary\"\
  `）来使用。系统会自动为您的客户端拉取具有正确区域设置的资源。请注意，`resource` 是一个隐式对象（稍后会详细介绍），您也可以使用语法 `resource['book.gif']`\
  \ 或 `resource['myLibrary:book.gif']` 来访问资源。\n\n```\n<h:graphicImage value=\"book.gif\"\
  \ />\n<h:graphicImage value=\"book.gif\" library=\"myLibrary\" />\n<h:graphicImage\
  \ value=\"#{resource['book.gif']}\" />\n<h:graphicImage value=\"#{resource['myLibrary:book.gif']}\"\
  \ />\n```\n\n![image](img/sq.jpg) **注意**  默认情况下，资源存储在 `resources` 目录中。从 JSF 2.2\
  \ 开始，您可以通过在 `web.xml` 部署描述符中设置 `javax.faces.WEBAPP_RESOURCES_DIRECTORY` 变量来更改此默认值。如果设置了此参数，JSF\
  \ 运行时将把它的值解释为相对于 web 应用程序根目录的路径，资源将位于该路径下。\n\n隐式对象\n\n要访问资源，您可以使用名为 `resources`\
  \ 的隐式对象（例如，`#{resource['book.gif']}`）。此对象无需在任何地方声明；它可以直接在 JSF 页面中使用。这类对象被称为*隐式对象*（或*隐式变量*）。隐式对象是映射到特定常用对象的特殊标识符。之所以称为隐式，是因为页面可以访问并使用它们，而无需显式声明或初始化。隐式对象在\
  \ EL 表达式中使用。表 10-18 列出了页面可以访问的所有隐式对象。\n\n表 10-18. 隐式对象\n\n| 隐式对象 | 描述 | 返回类型 |\n\
  | --- | --- | --- |\n| `application` | 表示 web 应用程序环境。用于获取应用程序级别的配置参数。 | `Object`\
  \ |\n| `applicationScope` | 将应用程序作用域的属性名称映射到其值。 | `Map` |\n| `component` | 指示当前组件。\
  \ | `UIComponent` |\n| `cc` | 指示当前复合组件。 | `UIComponent` |\n| `cookie` | 指定一个包含 cookie\
  \ 名称（键）和 `Cookie` 对象的 `Map`。 | `Map` |\n| `facesContext` | 指示此请求的 `FacesContext`\
  \ 实例。 | `FacesContext` |\n| `flash` | 表示 flash 对象（关于作用域的更多信息请参见第 11 章）。 | `Object`\
  \ |\n| `header` | 将 HTTP 标头名称映射到单个 `String` 标头值。 | `Map` |\n| `headerValues` | 将\
  \ HTTP 标头名称映射到该标头所有值的 `String[]`。 | `Map` |\n| `initParam` | 将上下文初始化参数名称映射到其 `String`\
  \ 参数值。 | `Map` |\n| `param` | 将请求参数名称映射到单个 `String` 参数值。 | `Map` |\n| `paramValues`\
  \ | 将请求参数名称映射到该参数所有值的 `String[]`。 | `Map` |\n| `request` | 表示 HTTP 请求对象。 | `Object`\
  \ |\n| `requestScope` | 将请求作用域的属性名称映射到其值。 | `Map` |\n| `resource` | 指定资源对象。 | `Object`\
  \ |\n| `session` | 表示 HTTP 会话对象。 | `Object` |\n| `sessionScope` | 将会话作用域的属性名称映射到其值。\
  \ | `Map` |\n| `view` | 表示当前视图。 | `UIViewRoot` |\n| `viewScope` | 将视图作用域的属性名称映射到其值。\
  \ | `Map` |\n\n所有这些隐式对象都是具有接口的实际对象，一旦您了解它们的 API（请参考规范或 javadoc），就可以使用 EL 访问它们的属性。例如，`#{view.locale}`\
  \ 将获取当前视图的区域设置（`en_US`、`pt_PT` 等）。如果您在会话作用域中存储了一个 `book` 对象，您可以像这样访问它：`#{sessionScope.book}`。您甚至可以使用更丰富的算法来显示所有\
  \ HTTP 标头及其值，如清单 10-13 所示。\n\n***清单 10-13.***  一个使用隐式对象显示区域设置和 HTTP 标头的页面\n\n```\n\
  <html xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html\
  \ \"\n      xmlns:c=\" http://xmlns.jcp.org/jsp/jstl/core \">\n<h:body>\n  <h1>隐式对象</h1>\n\
    <hr/>\n\n<h3>区域设置</h3>\n  <h:outputText value=\" #{view.locale} \"/>\n\n<h3>headerValues</h3>\n\
    <c:forEach var=\"parameter\" items=\" #{headerValues} \">\n    <h:outputText value=\"\
  #{parameter.key}\"/>  =\n    <c:forEach var=\"value\" items=\"#{parameter.value}\"\
  >\n      <h:outputText value=\"#{value}\" escape=\"false\"/><br/>\n    </c:forEach>\n\
    </c:forEach>\n\n<hr/>\n  <h:outputText value=\"APress - Beginning Java EE 7\"\
  \ style=\"font-style: italic\"/>\n</h:body>\n</html>\n```\n\n如果您执行清单 10-13 中的代码，您将得到如图\
  \ 10-7 所示的页面。\n\n![9781430246268_Fig10-07.jpg](img/9781430246268_Fig10-07.jpg)\n\
  \n图 10-7. 一个显示隐式对象值的 JSF 页面\n\n复合组件\n\n前面讨论的所有组件和标签库都是 JSF 的一部分，并且随任何遵循规范的实现一起提供。由于\
  \ JSF 基于可重用组件，它提供了一种设计，允许您轻松创建并将您自己的组件或第三方组件集成到您的应用程序中。\n\n\n\n之前我提到过，你看到的所有组件都直接或间接地继承了\
  \ `javax.faces.component.UIComponent` 类。在 JSF 2.0 之前，如果你想创建自己的组件，你必须扩展与你的组件最相似的组件类（`UICommand`、`UIGraphic`、`UIOutput`\
  \ 等），在 `faces-config.xml` 文件中声明它，并提供标签处理器和渲染器。这些步骤很复杂，而其他 Web 框架（如 Facelets）表明，可以用更低的复杂度创建强大的组件。这就是复合组件的意义所在：让开发者无需任何\
  \ Java 代码或配置 XML 就能编写真正的、可重用的 JSF UI 组件。\n\n这种新方法涉及创建一个包含组件的 XHTML 页面，然后将此页面作为组件在其他页面中使用。这个\
  \ XHTML 页面随后被视为一个真正的组件，可以支持验证器、转换器和监听器。任何有效的标记都可以在复合组件内部使用，包括模板功能。复合组件作为资源处理，因此必须位于标准的\
  \ `resources` 目录中。表 10-19 列出了创建和定义复合组件所涉及的所有标签。\n\n表 10-19. 用于声明和定义复合组件的标签\n\n|\
  \ 标签 | 描述 |\n| --- | --- |\n| `<composite:interface>` | 声明组件的契约。 |\n| `<composite:implementation>`\
  \ | 定义组件的实现。 |\n| `<composite:attribute>` | 声明一个可以赋予组件实例的属性。在 `<composite:interface>`\
  \ 部分中可以有零个或多个这样的属性。 |\n| `<composite:facet>` | 声明此组件支持一个方面。 |\n| `<composite:insertFacet>`\
  \ | 在 `<composite:implementation>` 部分中使用。插入的方面将在组件中渲染。 |\n| `<composite:insertChildren>`\
  \ | 在 `<composite:implementation>` 部分中使用。组件内的任何子组件或模板都将被插入到渲染输出中。 |\n| `<composite:valueHolder>`\
  \ | 声明其契约由嵌套此元素的 `<composite:interface>` 声明的组件暴露了 `ValueHolder` 的实现。 |\n| `<composite:renderFacet>`\
  \ | 在 `<composite:implementation>` 部分中使用，用于渲染一个方面。 |\n| `<composite:extension>`\
  \ | 在 `<composite:interface>` 部分中使用，用于包含 JSF 规范未定义的 XML 内容。 |\n| `<composite:editableValueHolder>`\
  \ | 声明其契约由嵌套此元素的 `<composite:interface>` 声明的组件暴露了 `EditableValueHolder` 的实现。 |\n\
  | `<composite:clientBehavior>` | 定义行为的契约，这些行为可以增强组件的渲染内容。 |\n| `<composite:actionSource`\
  \ `>` | 声明其契约由嵌套此元素的 `<composite:interface>` 声明的组件暴露了 `ActionSource` 的实现。 |\n\n\
  让我们探索一个示例，展示创建一个图形化组件并在其他页面中使用它有多么容易。你可能还记得前几章中，CD-BookStore 应用程序销售两种不同的商品：书籍和 CD。在第\
  \ 4 章中，我将它们表示为三个不同的对象：`Book` 和 `CD` 继承自 `Item`。`Item` 包含公共属性（`title`、`price` 和 `description`），而\
  \ `Book` 和 `CD` 则有专门的属性（`Book` 的 `isbn`、`publisher`、`nbOfPage` 和 `illustrations`；`CD`\
  \ 的 `musicCompany`、`numberOfCDs`、`totalDuration` 和 `genre`）。如果你希望你的 Web 应用程序能够创建新的书籍和\
  \ CD，你需要两个不同的表单。但是 `Item` 的公共属性可以放在一个单独的页面中，该页面将充当组件。图 10-8 展示了这两个页面。\n\n![9781430246268_Fig10-08.jpg](img/9781430246268_Fig10-08.jpg)\n\
  \n图 10-8. 两个表单，一个用于创建 CD，另一个用于创建书籍\n\n那么，让我们创建一个包含两个输入文本（用于标题和价格）和一个文本区域（用于描述）的复合组件。使用\
  \ JSF 2.2 编写组件的方法与你习惯的 Java 方法相对接近。你必须首先编写一个接口 `<composite:interface>`（参见清单 10-14），它充当组件的入口点。它描述了组件使用的名称和参数（这里是\
  \ `item` bean 和一个 CSS `style`）。然后是实现 `<composite:implementation>`。这是主体，即用 XHTML\
  \ 编写的组件的图形表示，并使用你到目前为止看到的任何 JSF 标签。接口和实现在同一个 XHTML 页面中。\n\n***清单 10-14.***  newItem.`xhtml`\
  \ 复合组件\n\n```\n<html xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:h=\"\
  \ http://xmlns.jcp.org/jsf/html \"\n      xmlns: composite =\" http://xmlns.jcp.org/jsf/composite\
  \ \">\n\n<composite:interface>\n  <composite:attribute name=\" item \" required=\"\
  true\"/>\n  <composite:attribute name=\" style \" required=\"false\"/>\n</composite:interface>\n\
  \n<composite:implementation>\n  <h:panelGrid columns=\"2\" style=\"#{cc.attrs. style\
  \ }\">\n\n<h:outputLabel value=\"Title : \"/>\n    <h:inputText value=\"#{cc.attrs.\
  \ item .title}\"/>\n\n<h:outputLabel value=\"Price : \"/>\n    <h:inputText value=\"\
  #{cc.attrs. item .price}\"/>\n\n<h:outputLabel value=\"Description : \"/>\n    <h:inputTextarea\
  \ value=\"#{cc.attrs. item .description}\" cols=\"20\" rows=\"5\"/>\n\n</h:panelGrid>\n\
  </composite:implementation>\n</html>\n```\n\n清单 10-14 中的组件声明了一个包含两个属性的接口：`item`\
  \ 代表 `Item` bean（以及子类 `Book` 和 `CD`），`style` 是用于渲染的 CSS 样式。这些属性随后在复合组件的实现中使用，语法如下：\n\
  \n```\n#{cc.attrs.[attributeName]}\n```\n\n这段代码表示将在当前复合组件中调用 `getAttributes()` 方法（如表\
  \ 10-18 所列，`cc` 是一个隐式对象，表示当前组件）；在返回的 `Map` 中，代码将查找键 `attributeName` 下的值。这就是组件如何使用在接口中定义的属性的方式。\n\
  \n在我解释如何使用这个组件之前，请回想一下本章前面关于资源管理和“例外配置”概念的讨论。该组件必须保存在位于资源库中的文件中。例如，本例的文件名为 `newItem.xhtml`，保存在\
  \ `/resources/apress` 下。如果你保留所有默认设置，要使用此组件，你需要声明一个名为 `apress` 的库，并为其指定一个 XML 命名空间（在以下代码中为\
  \ `ago`）：\n\n```\n<html xmlns: ago =\" http://xmlns.jcp.org/jsf/composite/apress\"\
  >\n```\n\n\n\n然后，调用 `newItem` 组件（页面的名称），并传递所需的参数：`item` 是引用 `Item` 实体的参数，`style`\
  \ 是引用 CSS 样式的可选参数。\n\n```\n< ago : newItem item =\"#{itemController. book }\" style\
  \ =\"myCssStyle\"/>\n< ago : newItem item =\"#{itemController. cd }\"/>\n```\n\n\
  为了让您全面了解如何集成一个组件，清单 10-15 展示了用于输入图书数据的 `newBook.xhtml` 页面。该页面包含了 `newItem` 复合组件，并添加了用于输入\
  \ ISBN、页数的输入字段，以及一个用于指示图书是否包含插图的复选框。\n\n***清单 10-15.***  newBook.`xhtml` 页面使用 newItem\
  \ 组件\n\n```\n<html xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html\
  \ \"\n      xmlns:ago=\"http://xmlns.jcp.org/jsf/composite/apress\" >\n<h:head>\n\
    <title>创建新图书</title>\n</h:head>\n<h:body>\n  <h1>创建新图书</h1>\n  <hr/>\n  <h:form>\n\
  \n<ago:newItem item=\"#{itemController.book}\"/>\n\n<h:panelGrid columns=\"2\">\n\
        <h:outputLabel value=\"ISBN : \"/>\n      <h:inputText value=\"#{itemController.book.isbn}\"\
  />\n\n<h:outputLabel value=\"页数 : \"/>\n      <h:inputText value=\"#{itemController.book.nbOfPage}\"\
  />\n\n<h:outputLabel value=\"插图 : \"/>\n      <h:selectBooleanCheckbox value=\"\
  #{itemController.book.illustrations}\"/>\n\n</h:panelGrid>\n\n<h:commandButton value=\"\
  创建图书\" action=\"#{itemController.doCreateBook}\"/>\n\n</h:form>\n  <hr/>\n  <h:outputText\
  \ value=\"APress - Beginning Java EE 7\" style=\"font-style: italic\"/>\n\n</h:body>\n\
  </html>\n```\n\n![image](img/sq.jpg) **注意**  编写组件是一项简单的任务，因此应鼓励开发人员编写自己的业务组件，以便在页面之间重用它们。但有些组件非常常见（如日历、颜色选择器、滚动面板、面包屑导航……），您无需再自行开发；只需从第三方组件库中选用即可。目前有三个主要的开源项目汇集了数百个现成的图形组件：PrimeFaces、RichFaces\
  \ 和 IceFaces。查看它们的组件库，您可能无需开发任何东西，只需使用它们的库就能找到所需组件。\n\n总结\n\n本章解释了使用客户端语言（如 HTML、XHTML\
  \ 或 CSS）创建网页的不同方式，以及使用服务器端 JSF 页面创建动态内容的方法。如今，随着富桌面应用程序（RDA）、富互联网应用程序（RIA）、移动设备应用程序（智能手机或平板电脑）等的普及，用户界面之间的竞争仍在继续。几年前，JSF\
  \ 加入了这场竞争，而如今，随着 2.2 版本的发布，它已站稳了脚跟。\n\nJSF 拥有基于组件的架构和丰富的 API，用于开发渲染器、转换器、验证器等。即使\
  \ Web 页面首选的 PDL 是 Facelets，它也能渲染和转换多种语言。JSF 提供了一套标准小部件（按钮、超链接、复选框等）和一个用于创建自定义小部件（复合组件）的灵活模型，并且社区已经开发了一些开源的第三方库。\n\
  \n但 JSF 可以与支持 bean 交互以处理数据并在页面间导航。在第 11 章中，您将了解导航的工作原理、组件如何绑定到支持 bean，以及如何编写自己的转换器和验证器。\n\
  \n第 11 章\n\n![image](img/frontdot.jpg)\n\n处理与导航\n\n在第 10 章中，我向您展示了如何使用 JSF 组件创建网页。然而，仅用图形组件绘制页面是不够的；这些页面需要与后端系统交互、在其他页面间导航，并且还需要验证和转换数据。JSF\
  \ 是一个丰富的规范：支持 bean 允许您调用业务层并在应用程序中导航。一组类允许您将组件值转换为相应类型或从相应类型转换回来，或者验证它们是否符合业务规则。与\
  \ Bean Validation 的集成也简化了 JSF 2.2 中的验证。通过使用注解，现在开发支持 bean、自定义转换器和自定义验证器变得很容易。\n\n\
  JSF 2.2 在动态用户界面方面带来了简洁性和丰富性。它以简单的方式原生支持 Ajax 调用。该规范附带了一个 JavaScript 库，允许对服务器进行异步调用并刷新页面的一小部分。\n\
  \n创建用户界面、控制整个应用程序中的导航以及同步或异步调用业务逻辑之所以成为可能，是因为 JSF 建立在模型-视图-控制器（MVC）设计模式之上。每个部分彼此分离，允许用户界面在不影响业务逻辑的情况下进行更改，反之亦然。本章将介绍所有这些概念，作为对第\
  \ 10 章的补充。\n\nMVC 模式\n\nJSF 以及大多数 Web 框架，通过使用 MVC 设计模式的变体来鼓励关注点分离。MVC 是一种用于将业务逻辑与用户界面隔离的架构模式。业务逻辑与\
  \ UI 代码混合在一起效果不佳。当两者混合时，应用程序更难维护且可扩展性更差。应用 MVC 后，会形成一个松散耦合的应用程序；对于这种类型的应用程序，修改应用程序的视觉外观或底层业务规则更容易，而不会相互影响。\n\
  \n在 MVC 中，模型代表应用程序的数据，视图对应 UI，控制器管理两者之间的通信（参见图 11-1）。\n\n![9781430246268_Fig11-01.jpg](img/9781430246268_Fig11-01.jpg)\n\
  \n图 11-1. MVC 设计模式\n\n模型由内容表示，这些内容通常存储在数据库中并在视图中显示。模型的构建不考虑其呈现给用户时的外观和感觉。在 JSF 中，它可以包含支持\
  \ bean、EJB 调用、JPA 实体等。\n\n当我们处理 Web 界面时，JSF 中的视图就是实际的 XHTML 页面。如第 10 章所述，视图为模型提供了图形表示。一个模型也可以有多个视图，例如，将一本书显示为表单或列表。\n\
  \n当用户操作视图时，视图会将所需的更改通知控制器。然后，控制器收集、转换和验证数据，调用业务逻辑，并以 XHTML 格式生成内容。在 JSF 中，控制器是 `FacesServlet`。\n\
  \nFacesServlet\n\n`FacesServlet` 是 `javax.servlet.Servlet` 的一个实现，充当中央控制器元素，所有用户请求都通过它传递。如图\
  \ 11-2 所示，当事件发生时（例如，当用户单击按钮时），事件通知通过 HTTP 发送到服务器，并由 `javax.faces.webapp.FacesServlet`\
  \ 拦截。它检查请求，并使用支持 bean 对模型调用各种操作。\n\n![9781430246268_Fig11-02.jpg](img/9781430246268_Fig11-02.jpg)\n\
  \n图 11-2. FacesServlet 的交互\n\n\n\n在幕后，`FacesServlet` 接收传入请求，并将控制权移交给 `javax.faces.lifecycle.Lifecycle`\
  \ 对象。它通过工厂模式创建一个 `javax.faces.context.FacesContext` 类型的对象，该对象包含并处理所有与请求相关的状态信息。在渲染响应之前，`Lifecycle`\
  \ 对象会在页面生命周期的六个不同阶段（先前在第 10 章中描述）中使用 `FacesContext` 对象。\n\n开箱即用，用户请求由 JSF 运行时处理，该运行时通过异常配置机制，利用通用行为声明了一个\
  \ `FacesServlet`。如果默认设置不适合你，你可以在 `web.xml` 文件中配置 `FacesServlet`。清单 11-1 展示了一个 `web.xml`\
  \ 示例。\n\n***清单 11-1.***  定义 FacesServlet 的 web.xml\n\n```\n<?xml version='1.0' encoding='UTF-8'?>\n\
  <web-app xmlns=\" http://xmlns.jcp.org/xml/ns/javaee \"\n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance\
  \ \"\n         xsi:schemaLocation=\" http://xmlns.jcp.org/xml/ns/javaee →\n        \
  \ http://xmlns.jcp.org/xml/ns/javaee/web-app_3_1.xsd \"\n         version=\"3.1\"\
  >\n\n<servlet>\n    <servlet-name>Faces Servlet</servlet-name>\n    <servlet-class>\
  \ javax.faces.webapp.FacesServlet </servlet-class>\n    <load-on-startup>1</load-on-startup>\n\
    </servlet>\n  <servlet-mapping>\n    <servlet-name>Faces Servlet</servlet-name>\n\
      <url-pattern> *.jsf </url-pattern>\n  </servlet-mapping>\n\n<context-param>\n\
      <param-name> javax.faces.PROJECT_STAGE </param-name>\n    <param-value>Development</param-value>\n\
    </context-param>\n  <context-param>\n    <param-name> javax.faces.FACELETS_SKIP_COMMENTS\
  \ </param-name>\n    <param-value>true</param-value>\n  </context-param>\n</web-app>\n\
  ```\n\n这个 `web.xml` 文件通过为其指定名称（例如 `Faces Servlet`）和映射来定义 `javax.faces.webapp.FacesServlet`。在此示例中，所有具有\
  \ `.jsf` 扩展名的请求都被映射为由该 Servlet 管理，任何类似 `http://localhost:8080/chapter11-1.0/newBook.jsf`\
  \ 的请求都将由 JSF 处理。\n\n![image](img/sq.jpg) **注意**  JSF 页面的默认 Servlet 映射是 `*.faces`\
  \ 或 `/faces/*`。在清单 11-1 中，此默认值已更改为 `.jsf`，但如果 `.faces` 适合你，你可以省略 Servlet 映射配置。\n\
  \n你还可以在 `<context-param>` 元素中配置一些 JSF 特定的参数。表 11-1 列出了其中一些参数。\n\n表 11-1. 一些 JSF\
  \ 特定的配置参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `javax.faces.CONFIG_FILES` | 定义一个逗号分隔的上下文相关资源路径列表，JSF\
  \ 实现将在这些路径下查找资源。 |\n| `javax.faces.DEFAULT_SUFFIX` | 允许 Web 应用程序为包含 JSF 内容的页面定义一组替代后缀（例如\
  \ `.jsf`）。 |\n| `javax.faces.FACELETS_BUFFER_SIZE` | 设置在响应上的缓冲区大小。默认情况下，该值为 −1，表示不会在响应上分配缓冲区大小。\
  \ |\n| `javax.faces.FACELETS_REFRESH_PERIOD` | 当请求一个页面时，编译器检查更改的时间间隔（以秒为单位）。值为 −1\
  \ 表示禁用编译器检查。 |\n| `javax.faces.FACELETS_SKIP_COMMENTS` | 如果设置为 true，运行时确保 Facelets\
  \ 页面中的 XML 注释不会传送到客户端。 |\n| `javax.faces.LIFECYCLE_ID` | 标识在处理 JSF 请求时要使用的 `Lifecycle`\
  \ 实例。 |\n| `javax.faces.STATE_SAVING_METHOD` | 定义状态保存的位置。有效值为 `server`（默认值，通常保存在\
  \ `HttpSession` 中）和 `client`（作为后续表单提交中的隐藏字段保存）。 |\n| `javax.faces.PROJECT_STAGE`\
  \ | 描述此特定 JSF 应用程序处于软件开发生命周期的哪个阶段（`Development`、`UnitTest`、`SystemTest` 或 `Production`）。例如，JSF\
  \ 实现可以利用此参数来缓存资源，以提高生产环境中的性能。 |\n| `javax.faces.DISABLE_FACELET_JSF_VIEWHANDLER`\
  \ | 如果设置为 `true`，则禁用 Facelets 作为默认页面声明语言（PDL）。 |\n| `javax.faces.WEBAPP_RESOURCES_DIRECTORY`\
  \ | 如果设置了此参数，JSF 运行时将其值解释为相对于 Web 应用程序根目录的路径，资源将位于该路径下。 |\n| `javax.faces.LIBRARIES`\
  \ | 将分号分隔的路径列表中的每个文件解释为一个 Facelets 标签库。 |\n\nFacesContext\n\nJSF 定义了 `javax.faces.context.FacesContext`\
  \ 抽象类，用于表示与处理传入请求和创建相应响应相关的上下文信息。这个类允许与 UI 以及 JSF 环境的其余部分进行交互。\n\n要获取访问权限，你可以在页面中使用隐式的\
  \ `facesContext` 对象（关于隐式对象的讨论，请参见第 10 章），或者在你的后台 bean 中使用静态方法 `getCurrentInstance()`\
  \ 获取引用。这将返回当前线程的 `FacesContext` 实例，然后你可以调用表 11-2 中列出的方法。\n\n表 11-2. FacesContext\
  \ 的一些方法\n\n\n\n| 方法 | 描述 |\n| --- | --- |\n| `addMessage` | 追加一条消息（信息、警告、错误或致命错误）。\
  \ |\n| `getApplication` | 返回与此 Web 应用关联的 `Application` 实例。 |\n| `getAttributes`\
  \ | 返回一个 `Map`，表示与 `FacesContext` 实例关联的属性。 |\n| `getCurrentInstance` | 返回当前线程正在处理的请求所对应的\
  \ `FacesContext` 实例。 |\n| `getELContext` | 返回当前 `FacesContext` 实例的 `ELContext` 实例。\
  \ |\n| `getMaximumSeverity` | 返回已排队的任何 `FacesMessage` 中记录的最高严重级别。 |\n| `getMessages`\
  \ | 返回一个 `FacesMessage` 集合。 |\n| `getPartialViewContext` | 返回此请求的 `PartialViewContext`\
  \ 对象。它用于将逻辑注入处理/渲染循环控制（例如 Ajax 处理）。 |\n| `getViewRoot` | 返回与请求关联的根组件。 |\n| `release`\
  \ | 释放与此 `FacesContext` 实例关联的所有资源。 |\n| `renderResponse` | 向 JSF 实现发出信号，一旦请求处理生命周期的当前阶段完成，控制权应传递给*渲染响应*阶段，跳过任何尚未执行的阶段。\
  \ |\n| `responseComplete` | 向 JSF 实现发出信号，表明此请求的 HTTP 响应已生成（例如 HTTP 重定向），并且一旦当前阶段完成，应立即终止请求处理生命周期。\
  \ |\n\nFaces 配置\n\n`FacesServlet` 是 JSF 实现的内部组件，虽然你无法访问其代码，但你需要元数据来配置它，或者在 `web.xml`\
  \ 中配置某些属性，如清单 11.1 所示。到目前为止，你可能已经习惯了 Java EE 7 中两种可能的元数据选择：注解和 XML 部署描述符（`/WEB-INF/faces-config.xml`）。\n\
  \n在 JSF 2.0 之前，唯一的选择是使用 XML；如今，支持 bean、转换器、事件监听器、渲染器和验证器都可以使用注解，因此使用 XML 配置文件已变得可选。甚至页面间的大部分导航也可以通过\
  \ XML 或 Java 代码来编排。清单 11-2 展示了 `faces-config.xml` 文件的一个片段。在此示例中，它定义了默认区域设置（`fr`）、用于国际化的消息包以及一些导航规则。稍后你将看到如何使用和不使用\
  \ `faces-config.xml` 进行导航。\n\n***清单 11-2.***  faces-config.xml 文件片段\n\n```\n<?xml\
  \ version='1.0' encoding='UTF-8'?>\n<faces-config xmlns=\" http://xmlns.jcp.org/xml/ns/javaee\
  \ \"\n              xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n\
                xsi:schemaLocation=\" http://xmlns.jcp.org/xml/ns/javaee →\n              http://xmlns.jcp.org/xml/ns/javaee/web-facesconfig_2_2.xsd\
  \ \"\n              version=\"2.2\">\n\n<application>\n    <locale-config>\n      <\
  \ default-locale >fr</default-locale>\n    </locale-config>\n    < resource-bundle\
  \ >\n      <base-name>messages</base-name>\n      <var>msg</var>\n    </resource-bundle>\n\
    </application>\n\n< navigation-rule >\n    <from-view-id>*</from-view-id>\n    <navigation-case>\n\
        <from-outcome>doCreateBook-success</from-outcome>\n      <to-view-id>/listBooks.htm</to-view-id>\n\
      </navigation-case>\n  </navigation-rule>\n\n</faces-config>\n```\n\n编写支持 Bean\n\
  \n如前所述，MVC 模式鼓励模型、视图和控制器之间的分离：JSF 页面构成视图，`FacesServlet` 构成控制器。支持 Bean 是通往模型的网关。\n\
  \n支持 Bean 是带有注解的 Java 类，是 Web 应用的核心。它们可以执行业务逻辑（或委托给 EJB 等），处理页面间的导航，并保存数据。一个典型的\
  \ JSF 应用包含一个或多个可由多个页面共享的支持 Bean。数据保存在支持 Bean 的属性中，页面中的操作会触发 Bean 的方法。要将组件绑定到支持 Bean，你需要使用表达式语言（例如\
  \ `#{bookController.book.title}`）。\n\n![image](img/sq.jpg) **注意**  我更喜欢使用术语“支持 Bean”而不是“托管\
  \ Bean”，但它们在 JSF 中历史上含义相同。“托管 Bean”指的是我在第 2 章中介绍的更通用的 Java EE 组件模型（与 CDI 相关）。在 Java\
  \ EE 中，任何由容器或提供者管理的 POJO 都称为托管 Bean。因此，支持 Bean 实际上是一个托管 Bean，但特指用于 JSF 的。\n\n编写支持\
  \ Bean 就像编写 EJB 或 JPA 实体一样简单；它只是一个带有 CDI `@Named` 注解（见清单 11-3）和 CDI 作用域（此处为 `@RequestScoped`）的\
  \ Java 类。没有 `faces-config.xml` 条目，没有辅助类，也没有继承。JSF 2.2 还使用了“异常配置”机制，只需两个注解，你就可以使用所有默认设置，并用这样的支持\
  \ Bean 部署你的 Web 应用。\n\n***清单 11-3.***  一个简单的 BookController 支持 Bean\n\n```\n@Named\n\
  @RequestScoped\npublic class BookController {\n\nprivate Book book = new Book();\n\
  \npublic String doCreateBook () {\n    createBook(book);\n    return \" newBook.xhtml\
  \ \";\n  }\n\n// 构造函数、getter、setter\n}\n```\n\n清单 11-3 展示了支持 Bean 的编程模型：它在特定持续时间（作用域）内保持状态（`book`\
  \ 属性），定义操作方法（`doCreateBook()`），并处理导航（`return \"newBook.xhtml\"`）。通过表达式语言，组件可以将其值绑定到属性（例如\
  \ `<h:outputText value=\"#{bookController.book.isbn}\"/>`）或调用方法（`<h:commandLink\
  \ action=\"#{bookController.doCreateBook}\">`）。\n\n支持 Bean 的结构\n\n支持 Bean 是由 `FacesServlet`\
  \ 管理的 Java 类。UI 组件绑定到支持 Bean 的属性，并可以调用操作方法。支持 Bean 需要满足以下要求：\n\n*   该类必须使用 `@javax.inject.Named`\
  \ 进行注解，或者在 `faces-config.xml` 部署描述符中使用等效的 XML 配置。\n*   它必须有一个作用域（例如 `@RequestScoped`）。\n\
  *   该类必须定义为 public；不能是 final 或 abstract。\n*   该类必须有一个公共的无参构造函数，容器将使用它来创建实例。\n* \
  \  该类不能定义 `finalize()` 方法。\n*   属性必须有公共的 getter 和 setter 才能绑定到组件。\n\n遵循 Java EE\
  \ 7 的易用性模型，支持 Bean 可以简单地是一个带注解的 POJO，从而消除了大部分配置。请记住，在第 2 章中我介绍了 CDI 原型。`@javax.enterprise.inject.Model`\
  \ 是在支持 Bean 上使用的完美原型，因为它结合了 `@Named` 和 `@RequestScoped`（如清单 11-4 所示）。因此，你可以重写清单\
  \ 11-3 中展示的 `BookController`，将注解替换为 `@Model`（清单 11-5），并获得相同的行为。\n\n***清单 11-4.***  内置的\
  \ CDI @Model 原型\n\n```\n@Named\n@RequestScoped\n@Documented\n@Stereotype\n@Target({\
  \ TYPE, METHOD, FIELD })\n@Retention(RUNTIME)\npublic @interface Model {\n}\n```\n\
  \n***清单 11-5.***  使用 @Model 原型的 BookController\n\n```\n@Model\npublic class BookController\
  \ {\n\nprivate Book book = new Book();\n\n\n\npublic String doCreateBook() {\n \
  \   createBook(book);\n    return \"listBooks.xhtml\";\n  }\n\n// 构造方法、getter、setter\n\
  }\n```\n\n在类上使用 `@javax.inject.Named` 注解，可以让表达式语言在页面中使用该类。`@Named` 还可以为支持 bean 指定一个不同的名称（默认名称是类名，首字母小写）。UI\
  \ 组件绑定到支持 bean 的属性；更改默认名称会影响你调用属性或方法的方式。清单 11-6 中的代码将支持 bean 重命名为 `myBean`。\n\n\
  ***清单 11-6.***  重命名的支持 Bean\n\n```\n@Named(\" myBean \")\n@RequestScoped\npublic\
  \ class BookController06 {\n\nprivate Book book = new Book();\n\npublic String doCreateBook()\
  \ {\n    createBook(book);\n    return \"listBooks.xhtml\";\n  }\n\n// 构造方法、getter、setter\n\
  }\n```\n\n要在页面中调用此支持 bean 的属性或方法，必须使用重写后的名称，如下所示：\n\n```\n<h:outputText value=\"\
  #{ myBean .book.isbn}\"/>\n<h:form>\n  <h:commandLink action=\"#{ myBean .doCreateBook}\"\
  >创建一本新书</h:commandLink>\n</h:form>\n```\n\n![image](img/sq.jpg) **注意**  在 JSF 2.2\
  \ 之前，你必须使用 `@javax.faces.bean.ManagedBean` 注解支持 bean。首先，这容易造成混淆，因为它使用了“Managed Bean”这个名称，而该名称定义了一个更通用的\
  \ Java EE 组件模型，该模型是 JSR-250 公共注解（`@javax.annotation.ManagedBean`）的一部分。但更重要的是，在 JSF\
  \ 2.2 中，与 CDI 的集成得到了加强，现在推荐使用 CDI `@Named` 以及 CDI 作用域。`javax.faces.bean` 包将在 JSF\
  \ 的下一个版本中被弃用。\n\n作用域\n\n作为支持 bean 一部分创建的对象具有特定的生命周期，并且可能可以被 Web 应用程序中的 UI 组件或其他对象访问，也可能无法访问。对象的生命周期和可访问性被称为*作用域*。在\
  \ Web 应用程序（支持 bean 和页面）中，你可以使用不同的持续时间来指定对象的作用域：\n\n*   *应用程序*：这是限制最少的持续时间（在你的支持\
  \ bean 中使用 `@ApplicationScoped` 注解），生命周期最长。只要应用程序处于活动状态，所创建的对象对于使用该 Web 应用程序的所有客户端的请求/响应周期都是可用的。这些对象可以被并发调用，并且需要是线程安全的（使用\
  \ `synchronized` 关键字）。具有此作用域的对象可以使用无作用域或应用程序作用域的其他对象。\n*   *会话*：对象对于属于客户端会话的任何请求/响应周期都是可用的（`@SessionScoped`）。这些对象的状态在请求之间保持不变，并持续到会话失效。具有此作用域的对象可以使用无作用域、会话作用域或应用程序作用域的其他对象。\n\
  *   *视图*：对象在给定视图中可用，直到视图发生更改，并且其状态会一直保持，直到用户导航到新视图，此时它们将被清除。具有此作用域的对象可以使用无作用域、视图作用域、会话作用域或应用程序作用域的其他对象。支持\
  \ bean 可以使用 `@ViewScoped` 进行注解。\n*   *请求*：状态从请求开始到响应发送给客户端期间可用（`@RequestScoped`\
  \ 注解）。客户端可以执行多个请求，但停留在同一个视图上。这就是为什么 `@ViewScoped` 的持续时间比 `@RequestScoped` 更长。具有此作用域的对象可以使用无作用域、请求作用域、视图作用域、会话作用域或应用程序作用域的其他对象。\n\
  *   *Flash*：在 JSF 2.0 中引入，新的 flash 作用域提供了一种短暂的对话。它是一种传递临时对象的方式，这些对象在单个视图转换期间传播，并在进入另一个视图之前被清理。flash\
  \ 作用域只能通过编程方式使用，因为没有对应的注解。\n*   *Flow*：当用户进入指定的流程时，此作用域中的对象被创建，当用户退出流程时，对象被释放（使用\
  \ `@FlowScoped` 注解）。\n\n![image](img/sq.jpg) **注意**  JSF 2.2 中使用的所有作用域注解现在都是 CDI\
  \ 作用域（即，它们都使用 `@javax.enterprise.context.NormalScope` 进行注解）。但它们来自不同的规范：`@ApplicationScoped`、`@RequestScoped`\
  \ 和 `@SessionScoped` 是 CDI 的一部分，而 `@ViewScoped` 和 `@FlowScoped` 是在 JSF 规范中定义的。\n\
  \n在为支持 bean 选择作用域时需要谨慎。你应该只给予它们所需的作用域。过度作用域的 bean（例如 `@ApplicationScoped`）会增加内存使用量，并且持久化它们的潜在需求可能导致磁盘和网络使用量增加。将应用程序作用域赋予一个仅在单个组件内使用的对象是没有意义的。同样，限制过多的对象将无法被应用程序的不同部分访问。你还应该关注并发访问。多个会话访问同一个应用程序作用域的\
  \ bean 可能会产生线程安全问题。\n\n清单 11-7 中的代码定义了一个具有应用程序作用域的支持 bean。它在构造后立即初始化 `defaultBook`\
  \ 属性（`@PostConstruct`）。\n\n***清单 11-7.***  具有应用程序作用域的支持 Bean\n\n```\n@Named\n@ApplicationScoped\n\
  public class InitController {\n\nprivate Book defaultBook;\n\n@PostConstruct\n \
  \ private void init() {\n    defaultBook = new Book(\"默认标题\", 0F, \"默认描述\");\n \
  \ }\n\n// 构造方法、getter、setter\n}\n```\n\n生命周期与回调注解\n\n\n\n第 10 章解释了页面的生命周期（从接收请求到渲染响应的六个阶段）。后台\
  \ Bean 也有自己的生命周期（见图 11-3），这与页面的生命周期完全不同。实际上，后台 Bean 的生命周期与托管 Bean 类似，唯一的区别在于，如果它们存在，其生命周期与所定义作用域的存活时间一致。\n\
  \n![9781430246268_Fig11-03.jpg](img/9781430246268_Fig11-03.jpg)\n\n图 11-3. 后台 Bean\
  \ 的生命周期\n\n在 Servlet 容器中运行的后台 Bean 可以使用 `@PostConstruct` 和 `@PreDestroy` 注解。容器创建后台\
  \ Bean 实例后，会调用 `@PostConstruct` 回调方法（如果存在）。在此阶段之后，后台 Bean 被绑定到一个作用域，并响应用户的请求。在移除后台\
  \ Bean 之前，容器会调用 `@PreDestroy` 方法。这些方法可用于初始化属性，或创建和释放任何外部资源（见清单 11-7）。\n\n处理异常和消息\n\
  \n后台 Bean 处理业务逻辑、调用 EJB、持久化和检索数据库数据等，有时可能会出错。在这种情况下，必须通过消息通知用户以便其采取行动。消息可分为两类：应用程序错误（涉及业务逻辑、数据库或网络连接）和用户输入错误（无效的\
  \ ISBN 或空字段）。应用程序错误可能会生成一个完全不同的页面，例如要求用户稍后重试，或拨打热线服务。输入错误可以在同一页面上显示，并附有描述错误的文本，消息也可以是信息性的，例如指示一本书已成功添加到数据库中。\n\
  \n在第 10 章中，你看到了用于在页面上显示消息的标签（`<h:message>` 和 `<h:messages>`）。为了生成这些消息，JSF 允许你通过在后台\
  \ Bean 中调用 `facesContext.addMessage()` 方法将消息加入队列。该方法的签名如下：\n\n```\nvoid addMessage(String\
  \ clientId , FacesMessage message)\n```\n\n此方法将一个 `FacesMessage` 追加到待显示的消息集合中。该方法的第一个参数指定了一个客户端标识符。此参数指的是消息所注册到的\
  \ UI 组件的文档对象模型（DOM）位置（例如，`bookForm:isbn` 指的是 `bookForm` 表单内具有 `isbn` 标识符的 UI 组件）。如果\
  \ `clientId` 为 `null`，则该消息不指向任何特定组件，被视为对整个页面全局有效。一条消息包含摘要文本、详细文本和严重级别（致命、错误、警告和信息）。消息也可以使用消息资源包进行国际化。\n\
  \n```\nFacesMessage (Severity severity, String summary, String detail)\n```\n\n\
  清单 11-8 中的代码是一个创建图书的后台 Bean 片段。如果创建成功，则会加入一条全局信息性消息（`SEVERITY_INFO` 级别的 `FacesMessage`）。如果捕获到异常，则会向消息队列添加一条错误消息以供显示。请注意，这两条消息都是全局的，因为\
  \ `clientId` 为 `null`。另一方面，当我们验证用户输入的 ISBN 和书名时，我们希望显示与 UI 组件相关的警告消息（`SEVERITY_WARN`）（例如，`bookForm:title`\
  \ 是位于 `bookForm` 表单下的文本字段 `title` 的 DOM 标识符）。\n\n***清单 11-8.***  添加不同严重级别的消息\n\n\
  ```\n@Named\n@RequestScoped\npublic class BookController {\n\n@Inject\n  private\
  \ BookEJB bookEJB;\n  private Book book = new Book();\n\npublic String doCreateBook()\
  \ {\n    FacesContext ctx = FacesContext.getCurrentInstance();\n\nif (book.getIsbn()\
  \ == null || \"\".equals(book.getIsbn())) {\n      ctx. addMessage ( \"bookForm:isbn\"\
  \ , new FacesMessage (FacesMessage. SEVERITY_WARN , →\n              \"Wrong isbn\"\
  , \"You should enter an ISBN number\"));\n    }\n    if (book.getTitle() == null\
  \ || \"\".equals(book.getTitle())) {\n      ctx. addMessage ( \"bookForm:title\"\
  \ , new FacesMessage(FacesMessage.SEVERITY_WARN, →\n              \"Wrong title\"\
  , \"You should enter a title for the book\"));\n    }\n\nif ( ctx.getMessageList().size()\
  \ != 0)\n      return null;\n\ntry {\n      book = bookEJB.createBook(book);\n      ctx.addMessage(\
  \ null , new FacesMessage(FacesMessage. SEVERITY_INFO , \"Book created\", →\n              \"\
  The book\" + book.getTitle() + \" has been created with id=\" + book.getId()));\n\
  \n} catch (Exception e) {\n      ctx.addMessage(null, new FacesMessage(FacesMessage.\
  \ SEVERITY_ERROR , →\n              \"Book hasn't been created\", e.getMessage()));\n\
      }\n    return null;\n  }\n\n// Constructors, getters, setters\n}\n```\n\n`FacesContext`\
  \ 在页面中可用，`FacesMessage` 也是如此。然后，页面可以使用单个 `<h:messages>` 标签显示全局消息（`clientId` 为 null）。当我们想要在页面的特定位置为特定组件显示消息时（通常用于验证或转换错误），我们使用\
  \ `<h:message>`。图 11-4 显示了一个页面，其中包含专门针对 ISBN 和标题输入字段的消息。\n\n![9781430246268_Fig11-04.jpg](img/9781430246268_Fig11-04.jpg)\n\
  \n图 11-4. 每个 UI 组件显示一条消息的页面\n\n该页面将有一个带有标识符（`id=\"isbn\"`）的输入文本字段，而 `<h:message>`\
  \ 标签将引用该组件（`for=\"isbn\"`）。结果将是，这条特定消息将仅为此组件显示。\n\n```\n<h: messages infoStyle=\"\
  color:blue\" warnStyle=\"color:orange\" errorStyle=\"color:red\"/>\n<h:form id=\"\
  \ bookForm \">\n  <h:inputText id=\"isbn\" value=\"#{bookController.book.isbn}\"\
  />\n  <h:message for=\"isbn\" />\n</h:form>\n```\n\n如果 ISBN 字段未填写，则 ISBN 输入文本字段旁边会出现一条警告消息。JSF\
  \ 为转换器、验证器和 Bean 验证使用此消息传递机制。请注意，`<h:messages>` 标签可以根据严重级别有不同的样式（此处错误为红色，警告为橙色）。\n\
  \n整合 JSF 和 EJB\n\n到目前为止，所有的绑定和业务调用都是通过后台 Bean 进行的。你很快就会看到，后台 Bean 也处理导航。因此，当你想要执行一些处理然后将用户带到另一个页面时，使用后台\
  \ Bean 是有意义的。但有时你只需要访问一个 EJB 来获取图书列表以填充数据表，例如。你仍然可以通过后台 Bean 来实现，但它主要会将调用委托给 EJB。那么，为什么不直接从页面调用\
  \ EJB 呢？\n\nCDI 的目标之一就是将 JSF 和 EJB 整合在一起。你需要做什么？不多，只需在你的 EJB 上添加一个 `@Named` 注解，你就可以使用表达式语言调用它。清单\
  \ 11-9 展示了一个无状态 EJB，它使用 JPA 从数据库中获取所有图书的列表。它有一个 CDI `@Named` 注解，因此可以在 JSF 页面中被调用。\n\
  \n***清单 11-9.***  带有 CDI @Named 注解的无状态 EJB\n\n```\n@Named\n@Stateless\npublic class\
  \ BookEJB {\n\n@Inject\n  private EntityManager em;\n\npublic List<Book> findAllBooks()\
  \ {\n    return em.createNamedQuery(\"findAllBooks\", Book.class).getResultList();\n\
    }\n}\n```\n\n清单 11-9 中的 `findAllBooks()` 方法返回一个图书列表。要用此列表填充数据表，无需使用后台 Bean。页面可以直接在\
  \ `<h:dataTable>` 组件中使用 EL 调用 `bookEJB.findAllBooks()`。\n\n\n\n```\n<h:dataTable\
  \ value=\" #{bookEJB.findAllBooks()} \" var=\"book\">\n  <h:column>\n    <h:outputText\
  \ value=\"#{book.title}\"/>\n  </h:column>\n</h:dataTable>\n```\n\n导航\n\nWeb 应用程序由多个需要导航的页面组成。根据应用程序的不同，你可以拥有不同级别的导航，其页面流程的复杂程度也各不相同。你可以想象一下向导，在其中你可以返回上一页或初始页面；还有业务场景，根据特定规则跳转到特定页面，等等。JSF\
  \ 提供了多种导航选项，允许你基于单个页面或整个应用程序全局地控制流程。\n\n显式导航\n\n在 JSF 中，如果你知道页面的名称，就可以轻松导航到该页面。你只需在后台\
  \ Bean 的返回参数方法中或 JSF 页面中显式设置页面名称即可。充当控制器的 `FacesServlet` 将完成其余工作：拦截调用，根据名称获取页面，将值绑定到组件，并将页面渲染给用户。使用显式导航，你可以选择直接导航到页面，或者在导航前进行一些处理。\n\
  \n当你只想通过点击链接或按钮从一个页面跳转到另一个页面而不进行任何处理时，可以使用 UI 组件 `<h:button>`、`<h:link>` 和 `<h:outputLink>`。\n\
  \n```\n<h:link value=\"返回创建新书\" outcome=\"newBook.xhtml\" />\n```\n\n但有时这还不够，因为你需要访问业务层或数据库来检索或处理数据。在这种情况下，你可以使用\
  \ `<h:commandButton>` 和 `<h:commandLink>`，并配合它们的 `action` 属性，该属性允许你指定后台 Bean 的方法，这与使用\
  \ `<h:link>` 或 `<h:button>` 直接指定页面不同。\n\n```\n<h:commandButton value=\"创建一本书\" action=\"\
  #{bookController.doCreateBook} \">\n```\n\n假设有一个首页（`newBook.xhtml`）显示一个用于创建书籍的表单。一旦你点击*创建一本书*按钮，就会调用后台\
  \ Bean 上的一个方法，创建书籍，然后用户导航到 `listBooks.xhtml` 页面，该页面列出所有书籍。当页面加载到浏览器后，页面底部的*返回创建新书*链接允许你直接返回上一页，无需进行任何处理（如图\
  \ 11-5 所示）。\n\n![9781430246268_Fig11-05.jpg](img/9781430246268_Fig11-05.jpg)\n\n\
  图 11-5. 在 newBook.xhtml 和 listBooks.xhtml 之间导航\n\n页面流程很简单，但仍然需要一个后台 Bean（`BookController`）来执行一些业务逻辑和导航。两个页面都使用按钮和链接组件来与后台\
  \ Bean 进行导航和交互。`newBook.xhtml` 页面使用一个按钮来调用后台 Bean 的 `doCreateBook()` 方法（`<h:commandButton\
  \ action=\"#{bookController.doCreateBook}\"/>`）。然后，`doCreateBook()` 方法将调用一个 EJB\
  \ 来将 `Book` 实体持久化到数据库中，并返回一个字符串：下一页的名称。接着，`listBooks.xhtml` 页面使用一个普通链接直接返回 `newBook.xhtml`\
  \ 页面，无需进行任何处理（`<h:link outcome=\"newBook.xhtml\"/>`）。\n\n`<h:commandButton>` 不会直接调用它需要跳转到的页面。它会调用后台\
  \ Bean 中负责导航的方法，该方法决定接下来加载哪个页面。导航操作基于一组规则，这些规则定义了应用程序所有可能的导航路径。清单 11-10 中后台 Bean\
  \ 的代码使用了最简单的导航规则形式：它只返回需要跳转到的页面。\n\n***清单 11-10.***  显式定义导航的后台 Bean\n\n```\n@Named\n\
  @RequestScoped\npublic class BookController {\n\n@Inject\n  private BookEJB bookEJB;\n\
    private Book book = new Book();\n  private List<Book> bookList = new ArrayList<>();\n\
  \npublic String doCreateBook () {\n    book = bookEJB.createBook(book);\n    bookList\
  \ = bookEJB.findBooks();\n    return \" listBooks.xhtml \";\n  }\n\n// 构造方法、getter、setter\n\
  }\n```\n\n导航规则\n\n当后台 Bean 方法返回一个字符串时，该字符串可以有多种形式。在清单 11-10 中，你可以看到最简单的形式：它返回页面名称。默认情况下，页面文件扩展名是\
  \ `.xhtml`，但如果你像之前看到的那样在 `web.xml` 中配置了 `FacesServlet`，则可以更改它。\n\n使用 JSF，页面流程导航可以通过\
  \ `faces-config.xml` 在外部定义。在 `faces-config.xml` 中，导航在 `<navigation-rule>` 元素中指定。`<navigation-rule>`\
  \ 元素标识起始页面、一个条件以及当条件发生时要导航到的目标页面。该条件基于逻辑名称，而不是页面名称。清单 11-10 中后台 Bean 的代码本可以使用逻辑名称\
  \ `success`，如清单 11-11 所示。\n\n***清单 11-11.***  使用逻辑名称的后台 Bean 代码片段\n\n```\n@Named\n\
  @RequestScoped\npublic class BookController {\n  // ...\n\npublic String doCreateBook\
  \ () {\n    book = bookEJB.createBook(book);\n    bookList = bookEJB.findBooks();\n\
      return \" success \";\n  }\n\n// 构造方法、getter、setter\n}\n```\n\n清单 11-12 展示了\
  \ `faces-config.xml` 文件的结构。`<from-view-id>` 标签定义了最初发起动作请求的页面。在这种情况下，在调用后台 Bean 之前，你从\
  \ `newBook.xhtml` 开始。如果返回的逻辑名称是 `success`（`<from-outcome>`），则 `FacesServlet` 会将调用转发到\
  \ `listBooks.xhtml` 页面（`<to-view-id>`）。\n\n***清单 11-12.***  定义导航的 faces-config.xml\
  \ 文件\n\n```\n<?xml version='1.0' encoding='UTF-8'?>\n<faces-config xmlns=\" http://xmlns.jcp.org/xml/ns/javaee\
  \ \"\n              xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n\
                xsi:schemaLocation=\" http://xmlns.jcp.org/xml/ns/javaee →\n              http://xmlns.jcp.org/xml/ns/javaee/web-facesconfig_2_2.xsd\
  \ \"\n              version=\"2.2\">\n\n<navigation-rule>\n    <from-view-id> newBook.xhtml\
  \ </from-view-id>\n    <navigation-case>\n      <from-outcome> success </from-outcome>\n\
        <to-view-id> listBooks.xhtml </to-view-id>\n    </navigation-case>\n  </navigation-rule>\n\
  \n</faces-config>\n```\n\n导航可以直接在后台 Bean 中完成，也可以通过 `faces-config.xml` 完成，但何时应该使用哪一种呢？直接在后台\
  \ Bean 中返回页面名称的首要原因是简单性；Java 代码是显式的，并且没有需要处理的外部 XML 文件。如果 Web 应用程序有大量的页面流程，你可能希望将其保存在一个地方，这样任何更改都可以在中心位置进行，而不是跨多个页面进行；同样，混合使用两者可能会导致部分导航位于\
  \ Bean 中，而另一部分位于 `faces-config.xml` 文件中。\n\n有一种情况使用 XML 配置非常有用：当多个页面上存在全局链接时（例如，可以在整个应用程序中执行的登录或注销），因为你不想为每个页面都定义它们。全局导航规则可以在\
  \ XML 中使用（但后台 Bean 中无法实现相同的功能）。\n\n```\n<navigation-rule>\n  <from-view-id> * </from-view-id>\n\
    <navigation-case>\n    <from-outcome> logout </from-outcome>\n    <to-view-id>\
  \ logout.xhtml </to-view-id>\n  </navigation-case>\n</navigation-rule>\n```\n\n\n\
  \n如果有一个适用于应用中每个页面的操作，可以使用不带 `<from-view-id>` 的 `navigation-rule` 元素，或者使用通配符（`*`）。上述代码表示，无论用户在哪个页面，只要后台\
  \ Bean 的方法返回逻辑名称 `logout`，就将用户转发到 `logout.xhtml` 页面。\n\n前面的示例展示了简单的导航：一个页面只有一条导航规则，且只跳转到一个页面。但实际情况往往并非如此，根据特定规则或异常情况，用户可能会被重定向到不同的页面。这可以通过后台\
  \ Bean 或 `faces-config.xml` 文件来实现。以下代码展示了一个根据条件跳转到不同页面的 switch 分支。请注意，当返回 `null`\
  \ 值时，用户会回到当前页面。\n\n```\npublic String doCreateBook() {\n  book = bookEJB.createBook(book);\n\
    bookList = bookEJB.findBooks();\n  switch (value) {\n    case 1: return \" page1.xhtml\
  \ \"; break;\n    case 2: return \" page2.xhtml \"; break;\n    default: return\
  \ null ; break;\n  }\n}\n```\n\n自 JSF 2.0 起的一项增强是增加了条件导航案例。它允许导航案例指定一个前置条件，只有满足该条件时导航案例才会被接受。这个前置条件通过新的\
  \ `<if>` 配置元素以 EL 表达式形式指定。在下面的示例中，如果用户具有管理员角色，则登出操作会特殊处理，将用户重定向到 `logout_admin.xhtml`\
  \ 页面：\n\n```\n<navigation-rule>\n    <from-view-id>*</from-view-id>\n    <navigation-case>\n\
          <from-outcome>logout</from-outcome>\n        <to-view-id>logout_admin.xhtml</to-view-id>\n\
          <if>#{userController.isAdmin}</if>\n    </navigation-case>\n</navigation-rule>\n\
  ```\n\n可书签化\n\n在 JSF 2.0 之前，每次客户端-服务器交互都是 HTTP POST（`<h:commandButton>` 和 `<h:commandLink>`）。虽然这在许多情况下没问题，但在\
  \ Web 应用中为页面添加书签时效果不佳。JSF 2.0 引入了书签功能，主要使用了两个新标签——`<h:button>`、`<h:link>`——以及一个\
  \ ViewParam 标签。这为 HTTP GET 请求提供了支持。但该模型仍不够完善，因此我们不得不使用 `preRenderView` 阶段来完成工作。JSF\
  \ 2.2 引入了 ViewAction 以实现更流畅的书签功能。\n\nViewParam 和 ViewAction 提供了一种机制来处理 GET 请求，并将\
  \ HTTP 请求中传递的参数通过 EL 绑定到模型中的属性。包含 `<f:viewParam>` 标签的页面可以从 GET 请求中提取参数并绑定到属性。以下代码允许通过请求中的\
  \ `id` 参数（例如 `viewBook.xhtml?id=123`）访问 `viewBook.xhtml` 页面，并将其绑定到 `bookController.book.id`\
  \ 属性：\n\n```\n<f:metadata>\n  <f: viewParam name=\"id\" value=\"#{bookController.book.id}\"\
  />\n</f:metadata>\n```\n\n一旦从 HTTP 请求中提取了书籍的 id 并绑定到属性，就需要在后台 Bean 上调用一个操作。JSF 2.2\
  \ 定义了新标签 `<f:viewAction>`，用于指定特定于应用程序的操作。要根据 id 从数据库中检索书籍，需要按如下方式调用 `doFindBookById`\
  \ 方法：\n\n```\n<f:metadata>\n  <f:viewParam name=\"id\" value=\"#{bookController.book.id}\"\
  />\n  <f: viewAction action=\"#{bookController.doFindBookById}\"/>\n</f:metadata>\n\
  ```\n\n这种技术允许你直接在浏览器中更改 URL（统一资源定位符）以指向所需的书籍（例如 `viewBook.xhtml?id=123` 或 `viewBook.xhtml?id=456`），并为该页面添加书签。\n\
  \n转换与验证\n\n你已经了解了如何处理消息以通知最终用户需要采取的操作。一种可能的操作是纠正无效的输入值（例如无效的 ISBN）。JSF 提供了一套标准的转换和验证机制，可以处理用户输入以确保数据完整性。这样，在调用业务方法进行处理时，你可以安全地依赖有效数据。转换和验证使开发人员能够专注于业务逻辑，而无需检查输入数据是否为空、是否在某个值范围内等。\n\
  \n当最终用户输入的数据需要从 `String` 转换为对象，或反之亦然时，就会发生转换。它确保数据类型正确——例如，将 `String` 转换为 `java.util.Date`、将\
  \ `String` 转换为 `Integer`，或将美元价格转换为欧元。至于验证，它确保数据包含预期的内容（遵循 dd/MM/yyyy 格式的日期、介于 3.14\
  \ 和 3.15 之间的浮点数等）。\n\n转换和验证发生在页面生命周期的不同阶段（你在前一章中已了解），如图 11-6 所示。\n\n![9781430246268_Fig11-06.jpg](img/9781430246268_Fig11-06.jpg)\n\
  \n图 11-6. 页面生命周期中的转换与验证\n\n在图 11-6 的*应用请求值*阶段，UI 组件的值被转换为目标对象（例如从 String 转换为日期），然后在*处理验证*阶段进行验证。转换和验证发生在组件数据绑定到后台\
  \ Bean 之前（这发生在*更新模型值*阶段），这是合理的。如果发现任何错误，将导致添加错误消息并缩短生命周期，因此会直接进入*呈现响应*阶段（并且消息将通过\
  \ `<h:messages/>` 显示在用户界面上）。在此阶段，后台 Bean 的属性会被转换回 String 以进行显示。\n\nJSF 拥有一组标准的转换器和验证器，并允许你轻松创建自己的转换器和验证器。\n\
  \n转换器\n\n当表单在浏览器中显示时，最终用户填写输入字段并点击按钮，数据会以 String 格式通过 HTTP 请求传输到服务器。在更新后台 Bean 上的模型之前，这些数据必须从\
  \ String 转换为目标对象（`Float`、`Integer`、`BigDecimal` 等）。当数据需要在响应中发送回客户端并在浏览器中呈现时，将执行反向操作。\n\
  \nJSF 内置了针对常见类型（如日期和数字）的转换器。如果后台 Bean 属性是原始类型（`Integer`、`int`、`Float`、`float` 等），JSF\
  \ 会自动将 UI 组件的值转换为正确的类型并转换回来。当属性是其他数据类型时，你需要提供自己的转换器。表 11-3 列出了 `javax.faces.convert`\
  \ 包中的所有标准转换器。\n\n表 11-3. 标准转换器\n\n\n\n| 转换器 | 描述 |\n| --- | --- |\n| `BigDecimalConverter`\
  \ | 将 `String` 转换为 `java.math.BigDecimal`，反之亦然。 |\n| `BigIntegerConverter` | 将 `String`\
  \ 转换为 `java.math.BigInteger`，反之亦然。 |\n| `BooleanConverter` | 将 `String` 转换为 `Boolean`（以及\
  \ `boolean` 基本类型），反之亦然。 |\n| `ByteConverter` | 将 `String` 转换为 `Byte`（以及 `byte` 基本类型），反之亦然。\
  \ |\n| `CharacterConverter` | 将 `String` 转换为 `Character`（以及 `char` 基本类型），反之亦然。 |\n\
  | `DateTimeConverter` | 将 `String` 转换为 `java.util.Date`，反之亦然。 |\n| `DoubleConverter`\
  \ | 将 `String` 转换为 `Double`（以及 `double` 基本类型），反之亦然。 |\n| `EnumConverter` | 将 `String`\
  \ 转换为 `Enum`（以及 `enum` 基本类型），反之亦然。 |\n| `FloatConverter` | 将 `String` 转换为 `Float`（以及\
  \ `float` 基本类型），反之亦然。 |\n| `IntegerConverter` | 将 `String` 转换为 `Integer`（以及 `int`\
  \ 基本类型），反之亦然。 |\n| `LongConverter` | 将 `String` 转换为 `Long`（以及 `long` 基本类型），反之亦然。\
  \ |\n| `NumberConverter` | 将 `String` 转换为抽象的 `java.lang.Number` 类，反之亦然。 |\n| `ShortConverter`\
  \ | 将 `String` 转换为 `Short`（以及 `short` 基本类型），反之亦然。 |\n\n当支持 bean 属性是某种基本数值类型时，JSF\
  \ 会自动将输入值转换为数字；当属性是某种日期类型时，则自动转换为日期或时间。如果自动转换不适合你的需求，你可以通过标准的 `convertNumber` 和\
  \ `convertDateTime` 标签显式控制转换。要使用这些标签，你需要将转换器嵌套在任何输入或输出标签内。在生命周期中，JSF 会调用该转换器。\n\n\
  `convertNumber` 标签具有一些属性，允许将输入值转换为数字（默认）、货币或百分比。你可以指定货币符号或小数位数，以及格式化模式，从而决定数字的格式化和解析方式。\n\
  \n```\n<h:inputText value=\"#{bookController.book.price}\">\n  <f: convertNumber\
  \ currencySymbol=\"$\" type=\"currency\"/>\n</h:inputText>\n```\n\n`convertDateTime`\
  \ 标签可以转换各种格式的日期（日期、时间或两者兼有）。它有几个属性用于控制日期转换和时区。`pattern` 属性允许标识将要转换的日期字符串的模式。\n\n\
  ```\n<h:inputText value=\"#{bookController.book.publishedDate}\">\n    <f: convertDateTime\
  \ pattern=\"MM/dd/yy\"/>\n</h:inputText>\n```\n\n自定义转换器\n\n有时，转换数字、日期、枚举等是不够的，你可能需要自定义转换。使用\
  \ JSF 开发自己的转换器并在页面中使用是很容易的。你只需编写一个实现 `javax.faces.convert.Converter` 接口的类，并通过元数据注册它。该接口有两个方法。\n\
  \n```\nObject getAsObject (FacesContext ctx, UIComponent component, String value)\n\
  String getAsString (FacesContext ctx, UIComponent component, Object value)\n```\n\
  \n`getAsObject()` 方法将 UI 组件的字符串值转换为相应的支持类型，并返回新实例。如果转换失败，此方法会抛出 `ConverterException`。相反，`getAsString()`\
  \ 方法将提供的类型转换为字符串，以便在标记语言（如 XHTML）中呈现。\n\n一旦开发了自定义转换器，就必须注册它，以便在 Web 应用程序中使用。一种方法是在\
  \ `faces-config.xml` 文件中声明转换器；另一种方法是使用 `@FacesConverter` 注解。\n\n清单 11-13 展示了如何编写一个将价格从美元转换为欧元的自定义转换器。它首先使用\
  \ `@FacesConverter`(`\"euroConverter\"`) 注解将此转换器与名称 `euroConverter` 关联，并实现 `Converter`\
  \ 接口。此示例仅重写了 `getAsString()` 方法，该方法返回给定价格以欧元表示的字符串形式。\n\n***清单 11-13.***  欧元转换器\n\
  \n```\n@FacesConverter(\"euroConverter\")\npublic class EuroConverter implements\
  \ Converter {\n\n@Override\n  public Object getAsObject (FacesContext context, UIComponent\
  \ component, String value) {\n    return value;\n  }\n\n@Override\n  public String\
  \ getAsString (FacesContext ctx, UIComponent component, Object value ) {\n    float\
  \ amountInDollars = Float.parseFloat( value .toString());\n    double ammountInEuros\
  \ = amountInDollars * 0.8;\n    DecimalFormat df = new DecimalFormat(\"###,##0.##\"\
  );\n    return df.format(ammountInEuros);\n  }\n}\n```\n\n要使用此转换器，可以使用 `<h:outputText>`\
  \ 标签的 `converter` 属性或 `<f:converter>` 标签。在这两种情况下，都必须传递在 `@FacesConverter` 注解中定义的自定义转换器名称（`euroConverter`）。以下代码显示两个输出文本，一个表示美元价格，另一个将此价格转换为欧元：\n\
  \n```\n<h:outputText value=\"#{book.price}\"/> // 以美元表示\n<h:outputText value=\"\
  #{book.price}\">  // 转换为欧元\n  < f:converter converterId=\" euroConverter \"/>\n\
  </h:outputText>\n```\n\n或者你可以使用 `outputText` 标签的 `converter` 属性。\n\n```\n<h:outputText\
  \ value=\"#{book.price}\" converter=\"euroConverter\" />\n```\n\n验证器\n\n在处理 Web\
  \ 应用程序时，必须确保用户输入数据的准确性。可以通过客户端使用 JavaScript 或服务器端使用验证器和 Bean Validation 来强制实现准确的数据输入。JSF\
  \ 通过使用标准和自定义的服务器端验证器简化了数据验证。验证器通过在支持 bean 处理之前验证 UI 组件的值，充当第一层控制。\n\nUI 组件通常处理简单的验证，例如值是否为必填项。例如，以下标签要求必须在文本字段中输入一个值：\n\
  \n```\n<h:inputText value=\"#{bookController.book.title}\" required=\"true\" />\n\
  ```\n\n如果你没有输入值，JSF 会返回页面并显示一条消息，指示应输入一个值（页面必须有一个 `<h:messages>` 标签）。这使用了与我之前描述的相同的消息机制。但是\
  \ JSF 附带了一组更丰富的验证器可供使用（在表 11-4 中描述），这些验证器定义在 `javax.faces.validator` 包中。\n\n表 11-4.\
  \ 标准验证器\n\n| 转换器 | 描述 |\n| --- | --- |\n| `DoubleRangeValidator` | 根据指定的最小和最大双精度浮点数值检查相应组件的值。\
  \ |\n| `LengthValidator` | 检查关联组件字符串值的字符数。 |\n| `LongRangeValidator` | 根据指定的最小和最大长整型值检查相应组件的值。\
  \ |\n| `MethodExpressionValidator` | 通过执行对象上的方法执行验证。 |\n| `RequiredValidator` |\
  \ 等同于将输入组件的 `required` 属性设置为 true。 |\n| `RegexValidator` | 根据正则表达式检查相应组件的值。 |\n\n\
  这些验证器对于通用情况（如字段长度或数字范围）非常有用，并且可以像转换器一样轻松地与组件关联（两者可以在同一组件上使用）。以下代码确保书籍标题的长度在 2 到\
  \ 20 个字符之间，并且其价格在 1 到 500 美元之间：\n\n\n\n```\n<h:inputText value=\"#{bookController.book.title}\"\
  \ required=\"true\">\n  <f: validateLength minimum=\"2\" maximum=\"20\"/>\n</h:inputText>\n\
  <h:inputText value=\"#{bookController.book.price}\">\n  <f: validateLongRange minimum=\"\
  1\" maximum=\"500\"/>\n</h:inputText>\n```\n\n自定义验证器\n\n标准的 JSF 验证器可能无法满足您的需求；您可能拥有需要遵循特定业务格式的数据，例如邮政编码、州名或电子邮件地址。您必须创建自己的自定义验证器来处理这些情况。与转换器类似，验证器是一个需要实现接口并重写某些方法的类。对于验证器而言，其接口是\
  \ `javax.faces.validator.Validator`，它包含一个单一的 `validate()` 方法：\n\n```\nvoid validate\
  \ (FacesContext context, UIComponent component, Object value)\n```\n\n在此方法中，`value`\
  \ 参数是需要根据某些业务逻辑进行检查的值。如果它通过了验证检查，您只需从该方法返回即可，页面的生命周期将继续进行。如果没有通过，您可以抛出一个 `ValidatorException`，并附带一个包含摘要和详细消息的\
  \ `FacesMessage` 来描述验证错误。您必须在 `faces-config.xml` 中或使用 `@FacesValidator` 注解来注册该验证器。\n\
  \n例如，创建一个 ISBN 验证器，确保用户为书籍输入的 ISBN 遵循特定格式（使用正则表达式）。清单 11-14 展示了 `IsbnValidator`\
  \ 的代码。\n\n***清单 11-14.***  ISBN 验证器\n\n```\n@FacesValidator(\"isbnValidator\")\n\
  public class IsbnValidator implements Validator {\n\nprivate Pattern pattern;\n\
    private Matcher matcher;\n\n@Override\n  public void validate (FacesContext context,\
  \ UIComponent component, →\n                       Object value) throws ValidatorException\
  \ {\n\nString componentValue = value.toString();\n\npattern = Pattern.compile(\"\
  (?=[-0-9xX]{13}$)\");\n    matcher = pattern.matcher(componentValue);\n\nif (!matcher.find())\
  \ {\n      String message = MessageFormat.format(\"{0} 不是有效的 ISBN 格式\", componentValue);\n\
        FacesMessage facesMessage = new FacesMessage(FacesMessage.SEVERITY_ERROR,\
  \ msg, msg);\n      throw new ValidatorException (facesMessage);\n    }\n  }\n}\n\
  ```\n\n清单 11-14 中的代码首先将验证器与名称 `isbnValidator` 关联，以便在页面中使用。它实现了 `Validator` 接口，并在\
  \ `validate()` 方法中添加了验证逻辑。它使用正则表达式检查 ISBN 格式是否正确。如果不正确，它会向上下文中添加一条消息并抛出一个异常。JSF\
  \ 将自动恢复页面的生命周期，重新调用页面，并显示错误消息。您可以在页面中使用 `validator` 属性或嵌入 `<f:validator>` 标签来使用此自定义验证器。\n\
  \n```\n<h:inputText value=\"#{bookController.book.isbn}\" validator =\"isbnValidator\"\
  />\n// 或\n<h:inputText value=\"#{bookController.book.isbn}\">\n  <f: validator validatorId=\"\
  isbnValidator\" />\n</h:inputText>\n```\n\n与 Bean Validation 集成\n\n自 JSF 2.0 起，对\
  \ Bean Validation 的支持已成为强制要求（即 JSF 实现必须支持它）。其工作方式非常简单。如果 JSF 页面有多个文本字段，并且每个文本字段都绑定到一个至少具有一个\
  \ Bean Validation 约束注解的后台 bean 属性，则在验证阶段会调用 `javax.validation.Validator.validate()`\
  \ 方法。因此，Bean Validation 会自动被调用，开发人员无需在 JSF 页面上执行任何操作，也无需在后台 bean 中调用任何 Bean Validation\
  \ 方法。JSF 运行时还确保，在尝试验证模型数据时产生的每个 `ConstraintViolation` 都被包装在 `FacesMessage` 中，并像其他所有验证器一样添加到\
  \ `FacesContext` 中。因此，页面中简单的 `<h:messages>` 将显示违反的 `ConstraintViolation` 的消息列表。\n\
  \n在第 3 章中，我介绍了验证组。如果您在页面中需要针对某个组验证特定组件，可以使用 `<f:validateBean>` 标签。以下代码仅针对 `Delivery`\
  \ 组验证书籍的 `title` 和 `price`：\n\n```\n<f:validateBean validationGroups =\"org.agoncal.book.javaee7.Delivery\"\
  >\n  <h:inputText value=\"#{bookController.book.title}\"/>\n  <h:inputText value=\"\
  #{bookController.book.price}\"/>\n</f:validateBean>\n```\n\nAjax\n\nHTTP 协议基于请求/响应机制：客户端需要某些内容，发送请求，并从服务器接收响应，通常是一个完整的网页。通信遵循此方向：客户端向服务器请求某些内容，反之则不然。然而，Web\
  \ 应用程序必须提供丰富且响应迅速的界面，并且必须对服务器事件做出反应、更新页面部分内容、聚合小部件等。在正常的请求/响应情况下，即使只有一小部分需要更改，服务器也必须发送整个网页。如果页面很大，则会过载带宽并导致响应性差，因为浏览器需要加载整个页面。如果您想提高浏览器的响应速度并改善用户的浏览体验，则只需更新页面的一小部分。这可以通过\
  \ Ajax 实现。\n\nAjax（异步 JavaScript 和 XML）是一组用于创建交互式 Web 应用程序的 Web 开发技术。Ajax 允许 Web\
  \ 应用程序异步地从服务器检索部分数据，而不会干扰现有页面的显示和行为。一旦浏览器接收到数据，它只需要使用页面的 DOM 和 JavaScript 更新需要更新的部分。\n\
  \n一般概念\n\n“Ajax”一词于 2005 年提出，指的是一组用于将异步数据加载到网页中的替代技术。早在 1999 年，微软就在 Internet Explorer\
  \ 5 中创建了 `XMLHttpRequest` 对象作为 ActiveX 控件。2006 年，万维网联盟（W3C）发布了 `XMLHttpRequest`\
  \ 对象的第一个规范草案，该对象现在已得到大多数浏览器的支持。与此同时，几家公司集思广益，探讨如何确保 Ajax 能够成为基于开放技术的富应用程序平台的行业标准。这项工作的成果是创建了\
  \ OpenAjax 联盟，该联盟由供应商、开源项目以及使用基于 Ajax 技术的公司组成。\n\n\n\n如图 11-7 所示，在传统 Web 应用中，浏览器必须向服务器请求完整的\
  \ HTML 文档。用户点击按钮发送或获取信息，等待服务器响应，然后接收浏览器加载的整个页面。而 Ajax 则利用浏览器与服务器之间的异步数据传输（HTTP 请求），允许网页仅从服务器请求少量信息（JSON\
  \ 或 XML 数据），而非整个页面。用户停留在同一页面，同时一段 JavaScript 代码异步向服务器请求或发送数据，只有页面部分内容被实际更新，从而使 Web\
  \ 应用更快、更友好。\n\n![9781430246268_Fig11-07.jpg](img/9781430246268_Fig11-07.jpg)\n\n\
  图 11-7. 普通 HTTP 调用与 Ajax HTTP 调用对比\n\n原则上，Ajax 基于以下技术：\n\n*   用于呈现的 XHTML 和 CSS。\n\
  *   用于动态显示和数据交互的 DOM。\n*   用于 XML 数据的交换、处理和显示的 XML 和 XSLT。\n*   用于异步通信的`XMLHttpRequest`对象。\n\
  *   用于在浏览器中整合这些技术的 JavaScript。\n\n`XMLHttpRequest`是 Ajax 的重要组成部分，它是 JavaScript 用于将\
  \ XML 从浏览器传输到服务器的 DOM API。返回的数据必须在客户端获取，以便用 JavaScript 动态更新页面部分内容。数据可以有多种格式，如 XHTML、JSON，甚至纯文本。\n\
  \n从 JSF 2.0 开始，Ajax 得到原生支持，因此你无需自行开发 JavaScript 来处理`XMLHttpRequest`，但需要使用 JSF 实现中指定并附带的\
  \ JavaScript 库。\n\nJSF 中的支持\n\n早期版本的 JSF 没有提供原生 Ajax 解决方案，因此必须使用第三方库来填补这一空白。有时这会以牺牲性能为代价增加代码的复杂性。从\
  \ JSF 2.0 开始，情况变得简单得多，因为 Ajax 支持已被规范并内置于任何 JSF 实现中。\n\n首先，有一个指定的 JavaScript 库（`jsf.js`）用于执行\
  \ Ajax 交互，这意味着你无需自行开发脚本或直接操作`XMLHttpRequest`对象。无需编写任何 JavaScript，你就可以使用一组标准化函数来发送异步请求并接收数据。要在页面中使用此库，你需要通过以下代码行添加`jsf.js`资源：\n\
  \n```\n<h:outputScript name=\" jsf.js \" library=\" javax.faces \" target=\"head\"\
  />\n```\n\n`<h:outputScript>`标签会渲染一个`<script>`标记元素，引用`javax.faces`库中的`jsf.js`JavaScript\
  \ 文件（这遵循了 JSF 新的资源管理方式，意味着`jsf.js`文件位于`META-INF/resources/javax/faces`目录下）。请注意，顶级`javax`命名空间已在\
  \ OpenAjax 联盟中注册。此 JavaScript API 用于启动与 JSF 的客户端交互，包括部分树遍历和部分页面更新。我们将在页面中直接使用的函数是`request`函数，因为它负责向服务器发送\
  \ Ajax 请求。其签名如下：\n\n```\njsf.ajax.request(ELEMENT, |event|, { |OPTIONS| });\n```\n\
  \n`ELEMENT`是触发事件的任何 JSF 组件或 XHTML 元素。通常，对于提交表单，该元素是一个按钮。`EVENT`是该元素支持的任何 JavaScript\
  \ 事件，例如`onmousedown`、`onclick`、`onblur`等。`OPTIONS`参数是一个数组，可能包含以下名称/值对：\n\n*   `execute:'<以空格分隔的\
  \ UI 组件 ID 列表>'`：将组件 ID 列表发送到服务器，以便在请求的执行阶段进行处理。\n*   `render:'<以空格分隔的 UI 组件 ID\
  \ 列表>'`：渲染在请求的渲染阶段已处理的组件 ID 列表。\n\n例如，以下代码显示了一个按钮，该按钮异步调用`doCreateBook`方法，并传递图书表单的所有参数。当用户点击该按钮时（`onclick`事件），按钮会调用`jsf.ajax.request`函数。`this`参数引用元素本身（按钮），选项则引用组件\
  \ ID（`isbn`、`title`、`price`等）：\n\n```\n<h:commandButton value=\"Create a book\"\
  \ onclick =\" jsf.ajax.request ( this , event,\n         { execute :'isbn title\
  \ price description nbOfPage illustrations',\n          render :'booklist'}); return\
  \ false;\"\n         actionListener=\"#{bookController.doCreateBook}\" />\n```\n\
  \n当客户端发起 Ajax 请求时，服务器端的页面生命周期保持不变（它经历相同的六个阶段）。关键优势在于，响应只是返回一小块数据，而不是向浏览器返回一个庞大的\
  \ HTML 页面。*应用请求*阶段会判断当前请求是否为“部分请求”，并且`PartialViewContext`对象会在页面的整个生命周期中使用。它包含与部分请求处理和部分响应渲染相关的方法和属性。在生命周期结束时，Ajax\
  \ 响应（或严格来说，部分响应）会在*渲染响应*阶段发送给客户端。它通常由 XHTML、XML 或 JSON 组成，客户端 JavaScript 将对其进行解析。\n\
  \nJSF 2 还包含一种声明式方法，旨在更加方便易用。这种方法利用了新的`<f:ajax>`标签。无需手动编写 Ajax 请求调用的 JavaScript，你可以声明式地指定相同的行为，而无需任何\
  \ JavaScript 代码。\n\n```\n<h:commandButton value=\"Create a book\" action=\"#{bookController.doCreateBook}\"\
  >\n    <f:ajax execute=\"@form\" render=\":booklist\"/>\n</h:commandButton>\n```\n\
  \n在此示例中，`render`指向我们想要渲染回的组件 ID（`booklist`组件）。`execute`属性引用属于该表单的所有组件。表 11-5 显示了`render`和`execute`属性可以取的所有可能值。\n\
  \n表 11-5. Render 和 Execute 属性的可能值\n\n| 值 | 描述 |\n| --- | --- |\n| `@all` | 渲染或执行视图中的所有组件。\
  \ |\n| `@none` | 不渲染或不执行视图中的任何组件（如果未指定`render`或`execute`，此为默认值）。 |\n| `@this` |\
  \ 仅渲染或执行此组件（触发 Ajax 请求的组件）。 |\n| `@form` | 渲染或执行此表单内的所有组件（Ajax 请求由此表单发起）。 |\n| 以空格分隔的\
  \ ID 列表 | 要渲染或执行的一个或多个组件 ID。 |\n| 表达式语言 | 解析为字符串集合的表达式。 |\n\n综合应用\n\n现在让我们综合所有这些概念，编写一个\
  \ Web 应用，允许用户创建新书、列出数据库中的所有书籍以及查看书籍详情。此 Web 应用包含两个网页：\n\n\n\n*   `newBook.xhtml`\
  \ 页面顶部显示一个表单，用于创建书籍，并在底部列出所有书籍。当你创建一本书并按下*创建书籍*按钮时，仅底部的列表会通过 Ajax 更新。当你点击底部某本书的标题链接时，用户会导航到另一个页面并查看该书的详细信息。\n\
  *   `viewBook.xhtml` 页面显示书籍的详细信息（标题、价格、描述等）。得益于可添加书签的特性，你只需更改 URL（例如 `viewBook.xhtml?id=123`\
  \ 或 `viewBook.xhtml?id=456`）即可显示任意书籍的内容。\n\n这两个页面共享同一个模板，顶部显示一个链接（用于返回 `newBook.xhtml`\
  \ 页面），底部显示一个标签。图 11-8 展示了这两个页面以及不同的导航方式（使用 `<h:link>` 或 `<h:commandButton>`）。\n\n\
  ![9781430246268_Fig11-08.jpg](img/9781430246268_Fig11-08.jpg)\n\n图 11-8. 在 newBook.xhtml\
  \ 和 viewBook.xhtml 之间导航\n\n这两个页面使用 `BookController` 支持 bean 来存储必要的属性并进行导航。通过使用 JPA\
  \ 实现持久化，以及使用 EJB 实现业务逻辑，所有组件（JSF、EJB、JPA、Bean Validation 和 CDI）都可以整合在一起。支持 bean\
  \ 将所有业务逻辑委托给 `BookEJB`，其中包含三个方法：一个用于将书籍持久化到数据库（`createBook()`），一个用于检索所有书籍（`findAllBooks()`），另一个用于根据标识符获取书籍（`findBookById()`）。这个无状态会话\
  \ bean 使用 `EntityManager` API 来操作 `Book` 实体（该实体使用了一些 Bean Validation 注解）。\n\n图 11-9\
  \ 展示了此 Web 应用程序中的交互组件。它们被打包成一个 war 文件，并部署在正在运行的 GlassFish 实例和内存中的 Derby 数据库中。\n\n\
  ![9781430246268_Fig11-09.jpg](img/9781430246268_Fig11-09.jpg)\n\n图 11-9. Web 应用程序中涉及的页面和类\n\
  \n此 Web 应用程序遵循 Maven 目录结构，因此类、文件和网页必须放置在以下目录中：\n\n*   `src/main/java`：包含 `Book`\
  \ 实体、`BookEJB` 和 `BookController` 支持 bean。\n*   `src/main/resources`：包含用于在数据库中映射实体的\
  \ `META-INF/persistence.xml` 文件。\n*   `src/main/webapp`：包含两个网页 `newBook.xhtml` 和\
  \ `viewBook.xhtml`。\n*   `src/main/webapp/WEB-INF`：包含用于触发 JSF 和 CDI 的 `faces-config.xml`\
  \ 和 `beans.xml` 文件。\n*   `pom.xml`：表示 Maven 项目对象模型（POM），描述项目、其依赖项和插件。\n\n编写 Book\
  \ 实体\n\n关于清单 11-15，我不会深入太多细节，因为你现在应该已经理解 `Book` 实体的代码了。除了 JPA 映射和 Bean Validation\
  \ 注解之外，请注意命名查询 `findAllBooks`，它从数据库中检索按标题排序的书籍。\n\n***清单 11-15.***  一个带有命名查询和 Bean\
  \ Validation 注解的 `Book` 实体\n\n```\n@Entity\n@NamedQuery (name = \" findAllBooks\
  \ \", query = \"SELECT b FROM Book b ORDER BY b.title DESC\")\npublic class Book\
  \ {\n\n@Id @GeneratedValue\n  private Long id;\n  @NotNull @Size(min = 4, max =\
  \ 50)\n  @Column(nullable = false)\n  private String title;\n  private Float price;\n\
    @Column(length = 2000)\n  private String description;\n  private Integer nbOfPage;\n\
    private Boolean illustrations;\n\n// 构造函数、getter、setter\n}\n```\n\n如你所知，此实体还必须与\
  \ `persistence.xml` 文件一起打包，但为简单起见，此处不再展示（请参阅第 4 章）。\n\n编写 BookEJB\n\n清单 11-16 表示一个公开无接口视图的无状态会话\
  \ bean。这意味着客户端（即支持 bean）不需要接口（本地或远程），可以直接调用 EJB。此 EJB 通过 `@Inject` 注入一个实体管理器引用。为此，它需要一个类似于清单\
  \ 8-13 的 CDI `DatabaseProducer`（此处未显示，请参阅第 8 章）。使用此 `EntityManager`，它可以持久化 `Book`\
  \ 实体（`createBook()` 方法）、从数据库中检索所有书籍（使用 `findAllBooks` 命名查询）以及根据标识符查找书籍。请注意，EJB 使用了\
  \ `@Named` 注解，因此可以从 JSF 页面调用它（稍后会详细介绍），并且它使用 `@DataSourceDefinition` 注解定义了一个数据源。此\
  \ EJB 不需要任何部署描述符。\n\n***清单 11-16.***  一个创建和检索书籍的无状态 EJB\n\n```\n@Named\n@Stateless\n\
  @DataSourceDefinition (name = \"java:global/jdbc/lab11DS\",\n        className =\
  \ \"org.apache.derby.jdbc.EmbeddedDriver\",\n        url = \"jdbc:derby:memory:lab11DB;create=true;user=app;password=app\"\
  \n)\npublic class BookEJB {\n\n@Inject\n  private EntityManager em;\n\npublic Book\
  \ createBook (Book book) {\n    em.persist(book);\n    return book;\n  }\n\npublic\
  \ List<Book> findAllBooks () {\n    return em.createNamedQuery(\"findAllBooks\"\
  , Book.class).getResultList();\n  }\n\npublic Book findBookById (Long id) {\n    return\
  \ em.find(Book.class, id);\n  }\n}\n```\n\n编写 BookController 支持 Bean\n\n支持 bean\
  \ 的角色之一是与应用程序的其他层（例如 EJB 层）交互或执行验证。清单 11-17 中的 `BookController` 使用了 `@Named` 注解，因此可以在\
  \ JSF 页面中使用。第二个注解 `@RequestScoped` 定义了 bean 的生命周期；它持续整个请求的持续时间。此支持 bean 包含一个属性 `book`，该属性将被页面使用。`book`\
  \ 是将映射到表单（`newBook.xhtml` 页面）、在 `viewBook.xhtml` 中显示并持久化到数据库的对象。\n\n***清单 11-17.***\
  \  调用 EJB 的 `BookController` 支持 Bean\n\n```\n@Named\n@RequestScoped\npublic class\
  \ BookController {\n\n@Inject\n  private BookEJB bookEJB;\n  private Book book =\
  \ new Book();\n\npublic String doCreateBook () {\n    bookEJB .createBook( book\
  \ );\n\nFacesContext.getCurrentInstance().addMessage(null, ➥\n            new FacesMessage(FacesMessage.SEVERITY_INFO,\
  \ \"Book created\", ➥\n            \"The book\" + book.getTitle() + \" has been\
  \ created with id=\" + book.getId()));\n\nreturn \" newBook.xhtml \";\n  }\n\npublic\
  \ void doFindBookById () {\n    book = bookEJB .findBookById(book.getId());\n  }\n\
  \n// Getter、setter\n}\n```\n\n所有业务处理（创建和检索书籍）都通过 `BookEJB` 完成。支持 bean 通过 `@Inject`\
  \ 注解注入 EJB 的引用，并具有两个将由页面调用的方法。\n\n*   `doCreateBook()`：此方法通过调用无状态 EJB 并传递 `book`\
  \ 属性来创建书籍。如果持久化成功，页面上会显示一条 INFO 消息。然后，该方法返回需要导航到的页面名称。\n*   `doFindBookById()`：此方法由\
  \ `viewBook.xhtml` 页面使用，通过无状态 EJB 根据标识符检索书籍。\n\n清单 11-17 展示了 `BookController` 支持\
  \ bean。为了提高可读性，此代码片段中省略了所有 getter 和 setter，但对于属性 `book` 来说是必需的。\n\n编写 layout.xhtml\
  \ 模板\n\n\n\n`newBook.xhtml` 和 `viewBook.xhtml` 这两个页面都使用了同一个模板（即清单 11-18 中定义的 `layout.xhtml`）。如图\
  \ 11-8 所示，该模板包含一个标题、一个带有 `<h:link>` *创建图书* 的页眉（用于导航至 `newBook.xhtml`）、一个用于显示错误和信息消息的\
  \ `<h:messages>` 标签，以及一个页脚。\n\n***清单 11-18.***  两个页面共用的 `layout.xhtml` 模板\n\n```\n\
  <!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n        \" http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\
  \ \">\n<html xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:ui=\" http://xmlns.jcp.org/jsf/facelets\
  \ \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html \">\n\n<h:head>\n  <title>\
  \ <ui:insert name=\"title\"> Default title</ui:insert></title>\n</h:head>\n<h:body>\n\
    <h:link value=\"Create a book\" outcome=\"newBook.xhtml\"/>\n\n<h1> <ui:insert\
  \ name=\"title\"> Default title</ui:insert></h1>\n  <hr/>\n\n< h:messages id=\"\
  \ errors \" infoStyle=\"color:blue\" warnStyle=\"color:orange\" →\n                                                \
  \ errorStyle=\"color:red\"/>\n\n<ui:insert name=\"content\"> Default content</ui:insert>\n\
  \n<hr/>\n  <h:outputText value=\"APress - Beginning Java EE 7\" style=\"font-style:\
  \ italic\"/>\n</h:body>\n</html>\n```\n\n编写 newBook.xhtml 页面\n\n`newBook.xhtml`\
  \ 是一个单页页面，顶部有一个用于输入图书数据（标题、价格、描述、页数和插图）的表单，底部则是一个图书列表（参见图 11-8）。每次点击按钮创建一本新书后，列表都会刷新，显示新创建的图书。表单提交后，只需刷新页面的列表部分即可。为此，我们使用了\
  \ Ajax。\n\n清单 11-19 中的代码展示了页面的顶部部分，即表单。变量 `bookController` 引用了负责所有业务逻辑的后台 Bean `BookController`（参见清单\
  \ 11-17）。`Book` 是实体，其属性通过表达式语言访问（例如 `#{bookController.book.title}` 绑定到标题）。\n\n***清单\
  \ 11-19.***  newBook.xhtml 页面的顶部部分\n\n```\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML\
  \ 1.0 Transitional//EN\"\n        \" http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\
  \ \">\n<html xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html\
  \ \"\n      xmlns:ui=\" http://xmlns.jcp.org/jsf/facelets \"\n      xmlns:f=\" http://xmlns.jcp.org/jsf/core\
  \ \">\n\n<ui:composition template=\"layout.xhtml\" >\n\n<ui:define name=\"title\"\
  > Create a new book</ui:define>\n\n<ui:define name=\"content\">\n\n<h:form id=\"\
  bookForm\">\n\n<h:panelGrid columns=\"2\">\n        <h:outputLabel value=\"Title\
  \ : \"/>\n        <h:inputText value=\" #{bookController.book.title} \"/>\n\n<h:outputLabel\
  \ value=\"Price : \"/>\n        <h:inputText value=\"#{bookController.book.price}\"\
  />\n\n<h:outputLabel value=\"Description : \"/>\n        <h:inputTextarea value=\"\
  #{bookController.book.description}\" cols=\"16\" rows=\"3\"/>\n\n<h:outputLabel\
  \ value=\"Number of pages : \"/>\n        <h:inputText value=\"#{bookController.book.nbOfPage}\"\
  />\n\n<h:outputLabel value=\"Illustrations : \"/>\n        <h:selectBooleanCheckbox\
  \ value=\"#{bookController.book.illustrations}\"/>\n      </h:panelGrid>\n\n< h:commandButton\
  \ value=\"Create a book\" action=\" #{bookController.doCreateBook} \">\n        <f:ajax\
  \ execute=\"@form\" render=\":booklist :errors\"/>\n      </h:commandButton>\n\n\
  </h:form>\n    ...\n```\n\n`<h:commandButton>` 标签代表发起 Ajax 调用的按钮。当用户点击时，`<f:ajax>`\
  \ 标签使用 `@form` 快捷方式传递所有表单参数（也可以传递所有组件标识符的列表）。组成表单的所有 UI 组件的值随后被提交到服务器。后台 Bean 的\
  \ `doCreateBook()` 方法被调用，新图书被持久化，并检索图书列表。如果没有抛出异常，则返回要导航到的页面名称：`newBook.xhtml`，这样用户就停留在同一页面。得益于\
  \ Ajax，客户端上此列表的渲染是异步完成的。`render` 元素引用了 `booklist` ID（作为显示所有图书的数据表的标识符，参见清单 11-20），同时也引用了\
  \ `errors` ID（在 `layout.xhtml` 页面中定义，参见清单 11-18），以便在需要显示消息时使用。\n\n***清单 11-20.***\
  \  newBook.xhtml 页面的底部部分\n\n```\n    ...\n    <hr/>\n    <h1>List of books</h1>\n\
  \n<h:dataTable id=\" booklist \" value=\" #{bookEJB.findAllBooks()} \" var=\"bk\"\
  \ border=\"1\">\n\n<h:column>\n        <f:facet name=\"header\">\n          <h:outputText\
  \ value=\"Title\"/>\n        </f:facet>\n        <h:link outcome=\"viewBook.xhtml?id=#{bk.id}\"\
  \ value=\"#{bk.title}\"/>\n      </h:column>\n\n<h:column>\n        <f:facet name=\"\
  header\">\n          <h:outputText value=\"Price\"/>\n        </f:facet>\n        <h:outputText\
  \ value=\"#{bk.price}\"/>\n      </h:column>\n\n</h:dataTable>\n  </ui:define>\n\
  \n</ui:composition>\n</html>\n```\n\n清单 11-20 展示了页面的底部部分。为了显示所有图书的列表，页面使用了 `<h:dataTable>`，其值直接来自\
  \ `BookEJB`（而非 `BookController`），这得益于 `@Named` 注解（参见清单 11-16）。`<h:dataTable>` 标签绑定到\
  \ `bookEJB.findAllBooks()` 方法，该方法返回一个 `List<Book>`，并声明变量 `bk` 来遍历列表。然后，在 `<h:dataTable>`\
  \ 标签内部，你可以使用诸如 `#{bk.price}` 这样的表达式来获取并显示图书的 `price` 属性。`<h:link>` 标签创建一个 HTML 链接，点击该链接会导航到\
  \ `viewBook.xhtml`，并传递图书的标识符（`viewBook.xhtml?id=#{bk.id}`）。\n\n编写 viewBook.xhtml\
  \ 页面\n\n`viewBook.xhtml` 页面允许你查看图书的详细信息（标题、价格、描述、页数和插图）。它使用了 JSF 2 的书签功能，这意味着你可以通过\
  \ HTTP GET 更改 URL 来访问任何图书的详细信息，这得益于 ViewAction。\n\n你可以在清单 11-21 中看到，该页面将 `id` 参数（例如\
  \ `viewBook.xhtml?id=123`）绑定到 `#{bookController.book.id}` 属性。一旦标识符被绑定，就会调用动作 `#{bookController.doFindBookById}`。`BookController.doFindBookById`\
  \ 方法（清单 11-17）调用 EJB 并从数据库中获取图书，然后页面可以将图书属性（例如 `#{bookController.book.title}`）绑定到输出文本组件。\n\
  \n***清单 11-21.***  viewBook.xhtml 页面\n\n```\n<!DOCTYPE html PUBLIC \"-//W3C//DTD\
  \ XHTML 1.0 Transitional//EN\"\n        \" http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\
  \ \">\n<html xmlns=\" http://www.w3.org/1999/xhtml \"\n      xmlns:h=\" http://xmlns.jcp.org/jsf/html\
  \ \"\n      xmlns:ui=\" http://xmlns.jcp.org/jsf/facelets \"\n      xmlns:f=\" http://xmlns.jcp.org/jsf/core\
  \ \">\n\n<ui:composition template=\"layout.xhtml\" >\n\n<f:metadata>\n    <f:viewParam\
  \ name=\"id\" value=\"#{bookController.book.id}\"/>\n    <f:viewAction action=\"\
  #{bookController.doFindBookById}\"/>\n  </f:metadata>\n\n<ui:define name=\"title\"\
  > View a book</ui:define>\n\n<ui:define name=\"content\">\n\n\n\n<h:panelGrid columns=\"\
  2\">\n      <h:outputLabel value=\"标题：\"/>\n      <h:outputText value=\" #{bookController.book.title}\
  \ \"/>\n\n<h:outputLabel value=\"价格：\"/>\n      <h:outputText value=\"#{bookController.book.price}\"\
  />\n\n<h:outputLabel value=\"描述：\"/>\n      <h:outputText value=\"#{bookController.book.description}\"\
  \ cols=\"16\" rows=\"3\"/>\n\n<h:outputLabel value=\"页数：\"/>\n      <h:outputText\
  \ value=\"#{bookController.book.nbOfPage}\"/>\n\n<h:outputLabel value=\"插图：\"/>\n\
        <h:selectBooleanCheckbox value=\"#{bookController.book.illustrations}\"/>\n\
      </h:panelGrid>\n\n</ui:define>\n\n</ui:composition>\n</html>\n\n使用 Maven 编译和打包\n\
  \nWeb 应用程序需要编译并打包成一个 war 文件（`<packaging>war</packaging>`）。清单 11-22 中展示的 `pom.xml`\
  \ 声明了编译代码所需的所有依赖项（`glassfish-embedded-all`），并使用 JDK 1.7 版本。\n\n***清单 11-22.***  用于编译和打包\
  \ Web 应用程序的 Maven `pom.xml` 文件\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\n<project xmlns=\" http://maven.apache.org/POM/4.0.0 \" →\n         xmlns:xsi=\"\
  \ http://www.w3.org/2001/XMLSchema-instance \" →\n         xsi:schemaLocation=\"\
  \ http://maven.apache.org/POM/4.0.0 →\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\
  \ \">\n  <modelVersion>4.0.0</modelVersion>\n\n<parent>\n    <artifactId>chapter11</artifactId>\n\
      <groupId>org.agoncal.book.javaee7</groupId>\n    <version>1.0</version>\n  </parent>\n\
  \n<groupId>org.agoncal.book.javaee7.chapter11</groupId>\n  <artifactId>chapter11</artifactId>\n\
    <version>1.0</version>\n  <packaging>war</packaging>\n\n<dependencies>\n    <dependency>\n\
        <groupId>org.glassfish.main.extras</groupId>\n      <artifactId> glassfish-embedded-all\
  \ </artifactId>\n      <version>4.0</version>\n      <scope>provided</scope>\n    </dependency>\n\
    </dependencies>\n\n<build>\n    <plugins>\n      <plugin>\n        <artifactId>maven-compiler-plugin</artifactId>\n\
          <version>2.5.1</version>\n        <configuration>\n          <source> 1.7\
  \ </source>\n          <target>1.7</target>\n        </configuration>\n      </plugin>\n\
        <plugin>\n        <artifactId>maven-war-plugin</artifactId>\n        <version>2.2</version>\n\
          <configuration>\n          <failOnMissingWebXml>false</failOnMissingWebXml>\n\
          </configuration>\n      </plugin>\n    </plugins>\n  </build>\n</project>\n\
  ```\n\n要编译和打包这些类，请在包含 `pom.xml` 文件的目录中打开命令行解释器，并输入以下 Maven 命令：\n\n```\n$ mvn package\n\
  ```\n\n转到 `target` 目录，找到 `chapter11-1.0.war` 文件。打开它，你会看到它包含 `Book` 实体、`BookEJB`、`BookController`\
  \ 支持 bean、三个部署描述符（`persistence.xml`、`faces-config.xml` 和 `beans.xml`）以及两个网页（`newBook.xhtml`\
  \ 和 `viewBook.xhtml`）。\n\n部署到 GlassFish\n\n打包好 Web 应用程序后，需要将其部署到 GlassFish 中。确保\
  \ GlassFish 已启动并正在运行。打开命令行，转到 `chapter11-1.0.war` 文件所在的 `target` 目录，然后输入以下内容：\n\n\
  ```\n$ asadmin deploy chapter11-1.0.war\n```\n\n如果部署成功，以下命令应返回已部署应用程序的名称及其类型。有两种类型：`web`，因为它是一个\
  \ Web 应用程序；以及 `ejb`，因为该应用程序包含一个 EJB。\n\n```\n$ asadmin list-components\nchapter11-1.0\
  \ <ejb, web>\n```\n\n运行示例\n\n现在应用程序已部署，打开浏览器并访问以下 URL：\n\n```\nhttp://localhost:8080/chapter11-1.0/newBook.faces\n\
  ```\n\n浏览器指向的是 `newBook.faces`，而不是 `newBook.xhtml`，这是因为 `FacesServlet` 的默认映射。通过\
  \ `.faces` 扩展名，JSF 知道它必须在渲染页面之前处理该页面。当 `newBook` 页面显示后，输入一些数据，然后点击提交按钮。该书将被持久化到数据库中，并显示在页面底部的列表中。\n\
  \n如果你使用 Web 开发者工具检查浏览器和 GlassFish 之间的网络活动，你会看到 Ajax 在运行。渲染结果是一个部分 XML 响应，而不是整个 HTML\
  \ 页面。来自服务器的部分响应包含需要更新的页面的 XHTML 部分。JavaScript 会查找页面中的 `errors` 和 `booklist` 元素，并应用所需的更改（更新\
  \ DOM）。清单 11-23 中的部分响应不言自明；它指定必须对由 `errors` 和 `booklist` 标识的组件进行更新（`<update id=\"\
  booklist\">`）。`<update>` 元素的主体是必须覆盖实际数据表的 XHTML 片段。当然，这个 XML 是由 JSF Ajax 处理程序自动处理的——开发人员无需手动对其进行任何操作。\n\
  \n***清单 11-23.***  浏览器接收到的部分响应\n\n```\n<?xml version='1.0' encoding='UTF-8'?>\n\
  <partial-response>\n  <changes>\n    <update id=\"errors\">\n      <![CDATA[\n      <ul\
  \ id=\"errors\"><li style=\"color:blue\">Book created</li></ul>\n      ]]>\n    </update>\n\
      <update id=\"booklist\">\n      <![CDATA[\n      <table id=\"booklist\" border=\"\
  1\">\n        <thead>\n          <tr>\n            <th scope=\"col\">Title</th>\n\
              <th scope=\"col\">Price</th>\n          </tr>\n        </thead>\n        <tbody>\n\
            <tr>\n            <td><a href=\"/chapter11-1.0/viewBook.faces?id=54\"\
  >Java EE 6</a></td>\n            <td>31.49</td>\n          </tr>\n          <tr>\n\
              <td><a href=\"/chapter11-1.0/viewBook.faces?id=1\">Harry Potter </a></td>\n\
              <td>19.79</td>\n          </tr>\n          <tr>\n            <td><a\
  \ href=\"/chapter11-1.0/viewBook.faces?id=51\">H2G2</a></td>\n            <td>23.99</td>\n\
            </tr>\n        </tbody>\n      </table>\n      ]]>\n    </update>\n  </changes>\n\
  </partial-response>\n```\n\n总结\n\n第 10 章 探讨了 JSF 的图形方面，而本章则侧重于其动态方面。JSF 遵循 MVC 设计模式，其规范涵盖从使用组件创建用户界面到使用支持\
  \ bean 处理数据的各个方面。\n\n支持 bean 是 JSF 的核心，因为它们用于处理业务逻辑、调用 EJB、数据库等，以及在页面之间导航。它们具有作用域和生命周期（类似于无状态会话\
  \ bean），并声明使用表达式语言绑定到 UI 组件的方法和属性。注解和异常配置极大地简化了 JSF 2.2，因为现在大部分 XML 配置都是可选的。\n\n\
  然后，本章展示了如何在任何输入组件上处理转换和验证。JSF 为大多数常见情况定义了一组转换器和验证器，但也允许你轻松创建和注册自定义的转换器和验证器。与 Bean\
  \ Validation 的集成是自然而然的，你不需要任何粘合代码来将其与 JSF 集成。\n\n虽然 Ajax 技术已经存在多年，但 JSF 提供了标准支持，允许网页异步调用支持\
  \ bean。它定义了一个标准的 JavaScript 库，开发人员无需编写脚本，而是使用函数来刷新页面部分内容。\n\n接下来的四章将重点介绍如何通过消息传递、SOAP\
  \ Web 服务和 RESTful Web 服务（使用 XML 或 JSON）与系统进行互操作。\n\n第 12 章\n\n![image](img/frontdot.jpg)\n\
  \nXML 和 JSON 处理\n\n\n\nXML（可扩展标记语言）自部署描述符和元数据信息诞生之初，就已在 Java EE 平台中得到应用。我们在 `persistence.xml`、`beans.xml`\
  \ 或 `ejb-jar.xml` 文件中处理 XML。这通常是 Java 开发者首次进入 XML 丰富世界的途径。但我们很快发现，XML 的用途远不止部署 Web\
  \ 应用或 EJB。\n\nXML 是由万维网联盟（W3C）定义的行业标准。尽管它不绑定任何编程语言或软件供应商，但它解决了数据独立性和互操作性问题。由于 XML\
  \ 是可扩展的、平台无关的，并且支持国际化，它成为了软件组件、系统和企业之间交换数据的首选语言（例如，通过利用将在第 14 章中描述的 SOAP Web 服务）。\n\
  \n另一方面，JSON（JavaScript 对象表示法）起源于 JavaScript，用于以比 XML 更简洁的方式表示简单数据结构。准确地说，JSON 格式常用于通过网络连接序列化和传输结构化数据。它迅速变得非常流行，以至于如今的现代浏览器都原生支持\
  \ JSON 编码/解码。但是，除了与浏览器和 JavaScript 的关系之外，JSON 作为一种数据交换格式也表现出色（例如，广泛用于 RESTful Web\
  \ 服务；在第 15 章中描述）。\n\n在本章中，我将描述 XML 和 JSON 两种格式，重点介绍文档结构以及操作这些结构的 API。XML 的世界更为丰富，因此你会注意到有多种规范可以帮助你解析、验证或将\
  \ XML 绑定到 Java 对象。它在我们生态系统中根深蒂固，以至于大多数这些 XML 规范都属于 Java SE。JSON 在 Java 平台中相对较新，因此在\
  \ Java SE/EE 中的标准支持较少。\n\n理解 XML\n\n可扩展标记语言（XML）源自标准通用标记语言（SGML），最初被设想为一种为万维网定义新文档格式的语言。实际上，XML\
  \ 可以被视为一种元语言，因为它用于构建其他语言。如今，它为各种行业特定语言提供了基础，例如数学标记语言（MathML）、语音标记语言（VXML）或 OpenOffice\
  \ 和 LibreOffice（OpenDocument）。\n\nXML 用于创建符合一组规则的人类可读的结构化数据和自描述文档。给定其语言的规则，XML 解析器可以验证任何\
  \ XML 文档的结构。XML 文档是基于文本的结构，使用标记标签（由 '`<`' 和 '`>`' 包围的单词）描述。\n\nXML 文档\n\n清单 12-1\
  \ 展示了一个 XML 文档，代表 CD-BookStore 应用程序的客户采购订单（参见第 1 章）。请注意，该文档既易于阅读又具有结构化，因此可以被外部系统理解。在此例中，它描述了关于采购订单、下订单的客户、客户购买的物品以及用于支付订单的信用卡信息。\n\
  \n***清单 12-1.***  表示采购订单的 XML 文档\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  \ ?>\n<order id=\"1234\" date=\"05/06/2013\">\n  <customer first_name=\"James\"\
  \ last_name=\"Rorrison\">\n    <email>j.rorri@me.com</email>\n    <phoneNumber>+44\
  \ 1234 1234</phoneNumber>\n</customer>\n<content>\n    <order_line item=\"H2G2\"\
  \ quantity=\"1\">\n      <unit_price>23.5</unit_price>\n    </order_line>\n    <order_line\
  \ item=\"Harry Potter\" quantity=\"2\">\n      <unit_price>34.99</unit_price>\n\
      </order_line>\n  </content>\n  <credit_card number=\"1357\" expiry_date=\"10/13\"\
  \ control_number=\"234\" type=\"Visa\"/>\n</order>\n```\n\n文档以可选的 XML 声明（指定文档使用的\
  \ XML 版本和字符编码）开始，然后由标记和内容组成。标记（也称为标签）描述了文档的结构，使您可以轻松地发送和接收数据，或将数据从一种格式转换为另一种格式。\n\
  \n如表 12-1 所示，XML 术语相当简单。尽管简单且可读，XML 可用于描述任何类型的文档、数据结构，或者在 Java EE 中描述部署描述符。\n\n\
  表 12-1. XML 术语\n\n| 术语 | 定义 |\n| --- | --- |\n| Unicode 字符 | XML 文档是一个字符串，由几乎所有合法的\
  \ Unicode 字符表示 |\n| 标记和内容 | Unicode 字符分为标记和内容。标记以字符 `<` 开头，以 `>` 结尾（`<email>`），非标记的内容被视为内容（例如\
  \ `j.rorri@me.com`） |\n| `标签` | 标签有三种形式：开始标签（`<email>`）、结束标签（`</email>`）和空元素标签（`<email/>`）\
  \ |\n| `元素` | 元素以开始标签开始，以匹配的结束标签结束（或仅由空元素标签组成）。它还可以包含其他元素，这些元素称为子元素。元素的一个示例是 `<email>`\
  \ `j.rorri@me.com` `</email>` |\n| `属性` | 属性由存在于开始标签或空元素标签中的名称/值对组成。在以下示例中，`item`\
  \ 是 `order_line` 标签的属性：`<order_line item=\"H2G2\">` |\n| XML 声明 | XML 文档可以通过声明一些关于自身的信息来开始，如下例所示：`<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\" ?>` |\n\n使用 XML Schema 进行验证\n\nXML 术语非常广泛，允许您使用\
  \ XML 编写任何内容并声明自己的语言。事实上，您可以编写如此多的内容，以至于如果不定义语法，您的 XML 结构可能会变得毫无意义。可以使用 XML Schema\
  \ 定义（XSD）来设置此语法。通过为 XML 文档附加语法，您可以让任何验证性 XML 解析器强制执行特定 XML 方言的规则。这大大减轻了应用程序代码的负担，因为解析器会自动验证您的\
  \ XML 文档。\n\n![image](img/sq.jpg) **注意**  第一个也是最早期的语言定义机制是文档类型定义（DTD）。尽管仍在一些遗留框架中使用，但由于\
  \ DTD 的众多局限性，它已被 XSD 取代。一个基本且主要的限制是 DTD 本身不是有效的 XML 文档。因此，它不能像 XML 本身那样被 XML 解析工具处理。更成问题的是，DTD\
  \ 在约束 XML 文档的结构和内容方面的能力非常有限。\n\nXML Schema 定义（XSD）是一种基于 XML 的语法声明，用于描述 XML 文档的结构和内容。例如，清单\
  \ 12-2 中的模式可用于指定清单 12-1 中描述的 XML 文档，赋予其额外的含义：“这不仅仅是一个文本文件，它是一个结构化的文档，代表一个包含物品和客户详细信息的订单。”在文档交换过程中，XSD\
  \ 描述了生产者和消费者之间的契约，因为它描述了两者之间构成有效 XML 消息的内容。\n\n***清单 12-2.***  描述采购订单 XML 文档的 XSD\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<xs: schema version=\"1.0\"\
  \ xmlns: xs =\" http://www.w3.org/2001/XMLSchema \">\n\n<xs:element name=\"order\"\
  \ type=\"order\"/>\n\n\n\n<xs:complexType name=\"creditCard\">\n    <xs:sequence/>\n\
      <xs:attribute name=\"number\" type=\"xs:string\"/>\n    <xs:attribute name=\"\
  expiry_date\" type=\"xs:string\"/>\n    <xs:attribute name=\"control_number\" type=\"\
  xs:int\"/>\n    <xs:attribute name=\"type\" type=\"xs:string\"/>\n  </xs:complexType>\n\
  \n<xs:complexType name=\"customer\">\n    <xs:sequence>\n      <xs:element name=\"\
  email\" type=\"xs:string\" minOccurs=\"0\"/>\n      <xs:element name=\"phoneNumber\"\
  \ type=\"xs:string\" minOccurs=\"0\"/>\n    </xs:sequence>\n    <xs:attribute name=\"\
  first_name\" type=\"xs:string\"/>\n    <xs:attribute name=\"last_name\" type=\"\
  xs:string\"/>\n  </xs:complexType>\n\n<xs: complexType name=\"order\">\n    <xs:sequence>\n\
        <xs:element name=\"customer\" type=\" customer \" minOccurs=\"0\"/>\n      <xs:element\
  \ name=\"content\" minOccurs=\"0\">\n        <xs:complexType>\n          <xs:sequence>\n\
              <xs:element name=\"order_line\" type=\"orderLine\" minOccurs =\"0\"\
  \ →\n                        maxOccurs =\"unbounded\"/>\n          </xs:sequence>\n\
          </xs:complexType>\n      </xs:element>\n      <xs:element name=\"credit_card\"\
  \ type=\"creditCard\" minOccurs=\"0\"/>\n    </xs:sequence>\n    <xs:attribute name=\"\
  id\" type=\" xs:long \"/>\n    <xs:attribute name=\"date\" type=\"xs:dateTime\"\
  />\n  </xs:complexType>\n\n<xs:complexType name=\"orderLine\">\n    <xs:sequence>\n\
        <xs:element name=\"unit_price\" type=\"xs:double\" minOccurs=\"0\"/>\n    </xs:sequence>\n\
      <xs: attribute name=\"item\" type=\"xs:string\"/>\n    <xs: attribute name=\"\
  quantity\" type=\"xs:int\"/>\n  </xs:complexType>\n</xs:schema>\n```\n\n如清单 12-2\
  \ 所示，XSD 允许对简单数据类型（`<xs:attribute name=\"expiry_date\" type=\"xs:string\"/>`）和复杂数据类型（`<xs:complexType\
  \ name=\"creditCard\">`）进行非常精确的定义，甚至允许类型从其他类型继承属性。采购订单模式由多种子元素组成，其中最值得注意的是决定内容外观的元素、复杂类型和属性。得益于\
  \ XSD，元素和属性变得强类型化，并关联了数据类型信息。这种强类型化的 XML 现在可以使用诸如 JAXB 之类的技术映射到对象，你将在本章后面看到这一点。\n\
  \n表 12-2 仅列出了 XSD 元素和属性的一个子集。XSD 是一种更为丰富的语言，但本书的目标并非成为一本详尽的 XSD 参考手册。如果你想了解更多关于\
  \ XSD、其结构及其数据类型的信息，应查阅相关的 W3C 网站。\n\n表 12-2. XSD 元素和属性\n\n| 元素 | 描述 |\n| --- | ---\
  \ |\n| `schema` | 是每个 XML Schema 的根元素。它可以包含一些属性，例如 schema 版本 |\n| `xmlns` | 模式中的每个元素都有一个默认前缀\
  \ `xs:`（有时是 `xsd:`，尽管可以使用任何前缀），该前缀通过声明 `FontName2\">http://www.w3.org/2001/XMLSchema`\
  \ `\"` 与 XML Schema 命名空间（`xmlsn`）关联 |\n| `element` | 元素使用 `element` 元素进行声明。例如，`order`\
  \ 被定义为一个元素，并在 XML 文档中显示为 `<order id=\"1234\" date=\"11/08/2013\" total_amount=\"\
  93.48\">` |\n| `type` | 元素可以是简单类型，例如 `string`、`decimal`、`long`、`double` 等（`type=\"\
  xs:long\"`），也可以是复杂类型（`type=\"customer\"`） |\n| `minOccurs, maxOccurs` | 定义类型的最小和最大出现次数。该值可以是正整数，也可以是术语\
  \ `unbounded`，表示没有最大出现次数限制 |\n| `complexType` | 它描述了一个包含元素、子元素和属性的复杂类型。一个 `complexType`\
  \ 元素可以包含另一个 `complexType`。例如，复杂类型 `order` 包含一个 `complexType` |\n| `sequence` | 一个元素可能包含其他元素，这些元素被称为子元素。sequence\
  \ 元素指定子元素必须按顺序出现。每个子元素可以出现 0 次到任意次数 |\n| `attribute` | 复杂类型可能有一个或多个由 attribute 元素定义的属性。`orderLine`\
  \ 类型有两个属性：`item` 和 `quantity` |\n| `choice` | 用于指示在包含元素中只能存在一组元素 |\n| `complexContent`\
  \ | 复杂类型可以使用 `complexContent` 元素扩展或限制另一个复杂类型 |\n| `extension` | extension 元素扩展一个现有的\
  \ `simpleType` 或 `complexType` 元素 |\n\n一旦你拥有一个 XML 文档及其关联的 XML Schema 定义，就可以使用解析器为你进行验证。解析器主要有两种类型：DOM\
  \ 和 SAX。\n\n使用 SAX 和 DOM 进行解析\n\n在文档被使用之前，必须由 XML 解析器进行解析和验证。解析器（也称为处理器）分析标记，并使\
  \ XML 中包含的数据可供需要使用它的应用程序使用。大多数 XML 解析器可以在两种不同的模式下使用。一种模式是文档对象模型（DOM），它读取整个 XML 数据源并在内存中构建其树状表示。另一种模式是基于事件的模型，称为\
  \ XML 简单 API（SAX），它读取 XML 数据源，并在遇到不同部分（例如元素的结束）时向应用程序进行回调。\n\nDOM\n\n文档对象模型（DOM）API\
  \ 通常是一个易于使用的 API。它提供了一个熟悉的对象树结构，使应用程序能够根据需要重新排列节点、添加或删除内容。\n\nDOM 通常易于实现，但构建 DOM\
  \ 需要读取整个 XML 结构并将对象树保存在内存中。因此，最好在速度对应用程序并非至关重要，且需要对文档全部内容进行随机访问的情况下，将 DOM 用于小型 XML\
  \ 数据结构。还有其他技术，如 JDOM 和 DOM4J，它们为复杂度较低的应用程序提供了简单的面向对象的 XML 编程 API。\n\nSAX\n\n解析器中的流模型用于资源的本地处理，在这种情况下不需要对资源中数据的其他部分进行随机访问。XML\
  \ 简单 API（SAX）基于一种推送解析流模型，在该模型中，数据被推送到客户端读取应用程序。\n\n\n\nSAX 是一种事件驱动、串行访问的机制，可逐元素进行处理。使用\
  \ SAX 解析器时，每当遇到 XML 元素的结束标记，就会触发一个 SAX 事件。该事件包含刚刚结束的元素的名称。SAX 处理器是一个状态机，只能对已解析的\
  \ XML 文档部分进行操作。\n\nSAX 是解析 XML 最快的方法，适用于处理无法一次性全部读入内存的大型文档。它通常更受服务器端、高性能应用程序以及不需要在内存中表示数据的数据过滤器的青睐。不过，它对软件开发人员的技能要求也更高。\n\
  \n使用 XPath 进行查询\n\nXPath 是一种专为查询 XML 结构而设计的查询语言，被包括 XSLT、XPointer 和 XQuery 在内的多种其他\
  \ XML 标准所使用。它定义了创建表达式的语法，这些表达式会针对 XML 文档进行求值。\n\nXPath 表达式可以表示一个节点、一个布尔值、一个数字或一个字符串。最常见的\
  \ XPath 表达式类型是位置路径，它表示一个节点。例如，XPath 表达式 `/` 是一个表示 XML 文档中从根节点开始的所有节点的表达式。下面是一个 XPath\
  \ 表达式，表示所有值大于 20 的 `unit_price` 节点（参见清单 12-1 中的采购订单 XML）：\n\n```\n//content/order_line[unit_price>=20]/unit_price\n\
  ```\n\n此外，XPath 还拥有一组内置函数，使您能够开发非常复杂的表达式。以下表达式返回 `unit_price` 元素的子文本节点：\n\n```\n\
  //content/order_line[unit_price>=20]/unit_price/text()\n```\n\nXQuery 是另一种查询语言，旨在使用\
  \ XPath 表达式查询 XML 数据集合。XQuery 在语法上与 SQL 类似，拥有一组关键字，包括 `FOR`、`LET`、`WHERE`、`ORDER\
  \ BY` 或 `RETURN`。以下是一个简单的 XQuery 表达式，它使用 `doc()` 函数（读取 `order.xml` 文档）返回所有 `quantity`\
  \ 大于 1 且 `unit_price` 小于 50 的 `order_line` 子节点：\n\n```\nfor $orderLine in doc(\"\
  order.xml\")//content/order_line[@quantity>1]\nwhere $orderLine/unit_price < 50\n\
  return $orderLine/unit_price/text()\n```\n\n您可以使用 XQuery 执行更复杂的查询，例如连接 XML 文档、设置复杂条件或对结果按元素排序。\n\
  \n在某些情况下，使用 API 从 XML 文档中提取信息可能过于繁琐，这主要是因为查找数据的条件很复杂，并且需要大量代码来遍历节点。诸如 XPath 1.0\
  \ 和 XQuery 之类的 XML 查询语言提供了从 XML 文档中提取信息的丰富机制。\n\n使用 XSLT 进行转换\n\nXML 相对于其他数据格式的一个关键优势是能够以通用方式将\
  \ XML 文档从一种词汇表转换为另一种词汇表。例如，您可以将 XML 文档渲染为适合打印的格式或网页。实现这种转换的技术是可扩展样式表语言转换（XSLT）。\n\
  \n简单来说，XSLT 提供了一个框架，通过将 XML 文档与 XSL 样式表结合，生成输出文档，从而转换 XML 文档的结构。您需要做的就是创建一个 XSL\
  \ 样式表，其中包含一组用于将源树转换为结果树的转换指令。然后，XSLT 处理器将通过将源 XML 树中的模式与要应用于它们的 XSL 样式表模板相关联，来转换源文档。\n\
  \n模式是一个 XPath 表达式，用于匹配源树中的元素。匹配成功后，会实例化一个模板来创建结果树的一部分。在构建结果树时，可以过滤和重新排序源中的元素，并可以添加任意结构。\n\
  \n清单 12-3 中的 XSLT 样式表将清单 12-1 中显示的 `order.xml` 文档转换为一个 XHTML 网页，该网页显示一个价格大于 30 的已售商品表格。\n\
  \n***清单 12-3.***  采购订单 XML 文档的 XSLT 样式表\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<xsl:stylesheet version=\"2.0\" xmlns:xsl=\" http://www.w3.org/1999/XSL/Transform\
  \ \">\n  <xsl:template match=\"/\">\n    <html>\n      <body>\n        <h2>已售商品</h2>\n\
          <table border=\"1\">\n          <tr>\n            <th>标题</th>\n            <th>数量</th>\n\
              <th>单价</th>\n          </tr>\n\n<xsl:for-each select=\" order/content/order_line\
  \ \">\n            <tr>\n              <td>\n                <xsl:value-of select=\"\
  @item\"/>\n              </td>\n              <td>\n                <xsl:value-of\
  \ select=\"@quantity\"/>\n              </td>\n\n<xsl:choose>\n                <xsl:when\
  \ test=\" unit_price > 30 \">\n                  <td bgcolor=\"#FF0000\">\n                    <xsl:value-of\
  \ select=\"unit_price\"/>\n                  </td>\n                </xsl:when>\n\
                  <xsl:otherwise>\n                  <td>\n                    <xsl:value-of\
  \ select=\"unit_price\"/>\n                  </td>\n                </xsl:otherwise>\n\
                </xsl:choose>\n            </tr>\n          </xsl:for-each>\n\n</table>\n\
        </body>\n    </html>\n  </xsl:template>\n</xsl:stylesheet>\n```\n\n`javax.xml.transform`\
  \ 包中的通用 XSLT API 用于编译样式表指令，并执行从 XML 源到 XML 结果的转换。XSLT 也可以与 SAX API 一起使用，将数据转换为 XML。\n\
  \nXML 规范概述\n\nXML 规范于 1998 年成为 W3C（万维网联盟）的推荐标准，此后，XSLT、XPath、XML Schema 和 XQuery\
  \ 等多个 XML 规范被引入并成为 W3C 标准。Java 平台无关代码和 XML 平台无关数据是两个互补的要点，它们导致了各种 Java XML API 的标准化和简化。这使得在\
  \ Java 中开发支持 XML 的应用程序变得更加简单。\n\nXML 规范简史\n\nW3C 是一个以开发和维护 HTML、XHTML、RDF 或 CSS\
  \ 等 Web 技术而闻名的联盟。但是，W3C 也是 XML 以及所有相关 XML 技术（如 XML Schema、XSLT、XPATH 和 DOM）的核心机构。\n\
  \nXML（可扩展标记语言）的开发始于 1996 年，由 W3C 的 XML 工作组发起，并于 1998 年 2 月成为 W3C 推荐标准。然而，这项技术并非全新。它基于\
  \ SGML（标准通用标记语言），后者开发于 20 世纪 80 年代初期，并于 1986 年成为 ISO 标准。\n\nXSD（XML Schema）提供了在\
  \ `.xsd` 文件中描述 XML 文档结构的功能。这种结构约束了 XML 文档的内容，因此可用于验证 XML 文档。XSD 是几种 XML 模式语言之一，也是第一种独立的\
  \ XML 模式语言，于 2001 年作为 W3C 推荐标准发布。\n\nXSLT（可扩展样式表语言转换）是最早的 XML 规范之一，受函数式语言和基于文本的模式匹配语言的影响，用于转换\
  \ XML 文档。它最直接的前身是 DSSSL（文档样式语义和规范语言），DSSSL 之于 SGML 正如 XSLT 之于 XML。XSLT 1.0 于 1999\
  \ 年成为 W3C 的一部分，该项目促成了 XPath 的诞生。Xalan、Saxon 和 AltovaXML 是可用于 XML 转换的几种 XSLT 处理器。\n\
  \nXPath 1.0 是一种用于定位 XML 文档中节点的查询语言。它于 1999 年被引入并作为 W3C 推荐标准被接受。其最初的动机是希望在 XPointer\
  \ 和 XSLT 之间提供一种通用的语法。它可以直接在 Java 内部使用，也可以嵌入到 XSLT、XQuery 或 XML Schema 等语言中。\n\n\n\
  \nXML Query 项目的使命是提供灵活的查询工具，以便从文档中提取数据。XML Query 工作组对 XQuery 1.0 的开发与 XSL 工作组对 XSLT\
  \ 2.0 的开发紧密协调；这两个工作组共同负责 XPath 2.0 的开发，而 XPath 2.0 是 XQuery 1.0 的一个子集。XQuery 1.0\
  \ 于 2007 年 1 月 23 日成为 W3C 推荐标准。\n\n文档对象模型（DOM）是一种基于树的接口，用于表示和交互 HTML、XHTML 和 XML\
  \ 文档中的内容、结构和样式。最初，DOM 是为浏览器中使用的脚本语言制定标准的努力成果。当前版本的 DOM 规范，即 DOM Level 3，支持 XPath\
  \ 以及将文档序列化为 XML 的接口。\n\n*Simple API for XML (SAX* *)* 是 Java 中第一个被广泛采用的 XML API。它是一个基于流、事件驱动的接口，用于解析\
  \ XML 数据。SAX 最初是用 Java 实现的，但现在几乎所有主流编程语言都支持它。\n\n从一开始，XML 规范的开发就与提高 XML 可用性的目标紧密交织在一起。\n\
  \n表 12-3 包含了一些 XML 技术的规范。\n\n表 12-3. W3C XML 规范\n\n| 规范 | 版本 | URL |\n| --- | ---\
  \ | --- |\n| 可扩展标记语言 (XML) | 1.1 | `http://www.w3.org/TR/xml11/` |\n| XML Schema\
  \ | 1.0 | `http://www.w3.org/TR/xmlschema-1` |\n| 可扩展样式表语言 (XSLT) | 1.0 | `http://www.w3.org/TR/xslt`\
  \ |\n| XML 路径语言 (XPath) | 1.0 | `http://www.w3.org/TR/xpath` |\n| 文档对象模型 (DOM) |\
  \ level 3 | `http://www.w3.org/TR/DOM-Level-3-Core/` |\n| `Simple API for XML (SAX)`\
  \ | 2.0.2 | `http://sax.sourceforge.net/` |\n\nJava 中的 XML 规范\n\nXML 生态系统由 W3C 创建。但由于它与\
  \ Java 紧密协作，因此在 JCP 内部也创建了几个与 XML 相关的规范。示例包括从处理 XML 到将文档绑定到 Java 对象。\n\nJAXP（Java\
  \ XML 处理架构）是一个底层规范（JSR 206），它使您能够以非常灵活的方式处理 XML；允许您使用 SAX、DOM 或 XSLT。它是 JAXB 或 StAX\
  \ 底层使用的 API。\n\nJAXB（Java XML 绑定架构）规范提供了一组 API 和注解，用于将 XML 文档表示为 Java 构件，使开发人员能够处理代表\
  \ XML 文档的 Java 对象。JAXB（JSR 222）简化了将 XML 文档解组为对象以及将对象编组回 XML 文档的过程。即使 JAXB 可用于任何\
  \ XML 目的，它也与 JAX-WS 紧密集成（参见第 14 章）。\n\nStAX（XML 流式 API）1.0 版（JSR 173）是一个用于读写 XML\
  \ 文档的 API。其主要重点是结合基于树的 API（DOM 解析器）和基于事件的 API（SAX 解析器）的优点。DOM 解析器允许对文档进行随机、无限制的访问，而\
  \ SAX 解析器则提供更小的内存占用和更低的处理器需求。\n\n表 12-4 列出了所有与 XML 相关的 Java 规范。\n\n表 12-4. 与 XML\
  \ 相关的规范\n\n![image](img/Table12-4.jpg)\n\n参考实现\n\n参考实现（RI）的主要目标是支持规范的开发并对其进行验证。StAX\
  \ RI 是 JSR-173 规范的参考实现，它基于标准的拉取解析器流模型。StAX 自 JDK 1.6 版本起已包含在内，并且可以分别为 JDK 1.4 和\
  \ 1.5 单独下载。JAXP 规范的 RI 也已集成到 Java SE 中，Metro 也是如此，后者是 JAXB 的参考实现。Metro 是 JAXB 的生产级实现，直接用于多个\
  \ Oracle 产品中。\n\nJava XML 处理架构\n\nJava XML 处理架构（JAXP）是一个 API，它提供了一个通用的、与实现无关的接口，用于在\
  \ Java 中创建和使用 SAX、DOM 和 XSLT API。\n\n在 JAXP 之前，来自不同供应商的 XML 解析器和转换器存在各种不兼容的版本。JAXP\
  \ 在这些特定于供应商的 XML API 实现之上提供了一个抽象层，用于解析和转换 XML 资源。\n\n请注意，JAXP 并不使用不同的机制来解析和转换 XML\
  \ 文档。相反，应用程序可以使用它以通用的方式间接访问底层的 XML API。然后，应用程序可以将一个供应商的实现替换为另一个。\n\n使用 JAXP，您可以使用\
  \ SAX 或 DOM 作为底层策略来解析 XML 文档，或者使用 XSLT 将它们转换为新格式。JAXP API 架构如图 12-1 所示。\n\n![9781430246268_Fig12-01.jpg](img/9781430246268_Fig12-01.jpg)\n\
  \n图 12-1. JAXP 架构\n\nJAXP 由四个包组成，总结在表 12-5 中。在这些包中，您将找到以通用方式解析和转换 XML 数据的接口和类。\n\
  \n表 12-5. JAXP 包\n\n| 包 | 描述 |\n| --- | --- |\n| `javax.xml.parsers` | DOM 和 SAX\
  \ 解析器的通用接口 |\n| `org.w3c.dom` | Java 的通用 DOM API |\n| `org.xml.sax` | 定义用于 SAX 解析器的接口\
  \ |\n| `javax.xml.transform` | 用于将 XML 转换为其他形式的 XSLT API |\n\n配置 JAXP\n\n由于 JAXP\
  \ 是灵活的，您可以配置它使用所需的任何处理实现。但您始终可以使用默认设置，因为 JAXP 参考实现使用 Xerces 作为默认的 XML 解析器，并使用 Xalan\
  \ 作为默认的 XSLT 处理器来转换 XML 文档。\n\n设想一个场景，您的类路径中有多个符合 JAXP 规范的实现。在这种情况下，您必须告诉 JAXP 使用哪个\
  \ API。根据您的应用程序是在独立客户端模式还是应用程序服务器模式下运行，您可以通过属性文件为您的应用程序提供 XML 解析器或转换器。例如，将 `jaxp.properties`\
  \ 文件（一个遵循 `java.util.Properties` 格式的标准文件）放在 JRE 目录的 lib 子目录中，会导致 JAXP 实现使用指定的工厂。以下是\
  \ `jaxp.properties` 文件的内容，该文件定义了要使用的 DOM 构建器、SAX 解析器和 XSLT 转换器：\n\n```\njavax.xml.parsers.\
  \ DocumentBuilderFactory =org.apache.xerces.jaxp.DocumentBuilderFactoryImpl\njavax.xml.parsers.\
  \ SAXParserFactory =org.apache.xerces.jaxp.SAXParserFactoryImpl\njavax.xml.transform.\
  \ TransformerFactory =org.apache.xalan.processor.TransformerFactoryImpl\n```\n\n\
  另一种方法是在运行应用程序之前配置 Java 系统属性。例如，以下系统属性通知 JVM 使用 Xerces 作为 XML 解析器：\n\n```\n-Djavax.xml.parsers.\
  \ DocumentBuilderFactory =org.apache.xerces.jaxp.DocumentBuilderFactoryImpl\n```\n\
  \n可以修改以引入新解析器或转换器的主要系统属性列在表 12-6 中。\n\n表 12-6. 用于 XML 解析器/转换器配置的系统属性\n\n| 系统属性 |\
  \ 描述 |\n| --- | --- |\n| `javax.xml.parsers.DocumentBuilderFactory` | 设置 DOM 构建器\
  \ |\n| `javax.xml.parsers.SAXParserFactory` | 配置 SAX 解析器 |\n| `javax.xml.transform.TransformerFactory`\
  \ | 确定要使用的 XSLT 实现 |\n\nJAXP 与 SAX\n\n\n\nSAX 以其低内存需求和快速处理功能而闻名。SAX 是一种事件驱动的串行访问机制，用于解析\
  \ XML 文档。您必须向解析器提供回调方法，解析器在读取 XML 文档时会调用这些方法。例如，SAX 解析器在每次到达一个元素时调用您应用程序中的一个方法，并在遇到文本节点时调用另一个不同的方法。\n\
  \n您在 XML 文档中处理当前元素而不维护任何先前解析元素状态的方式称为**无状态处理**。这是使用 SAX 解析器处理 XML 资源最合适的模型。另一种模型是**有状态解析**，它通过像\
  \ StAX 解析器这样的拉取解析器来处理。\n\n清单 12-4 展示了一个使用 SAX 事件模型解析 `order.xml` 文档的类。`SaxParsing`\
  \ 类扩展了 `DefaultHandler`，这是满足不同解析需求所必需的，并实现了四个不同的处理器（`ContentHandler`、`ErrorHandler`、`DTDHandler`\
  \ 和 `EntityResolver`）。`SAXParserFactory` 配置并创建一个 SAX 解析器实例。如前所述，可以手动配置系统属性 `javax.xml.parsers.SAXParserFactory`\
  \ 以使用第三方 SAX 解析器。`SAXParser` 包装了一个 `SAXReader` 对象，该对象可以通过 `getXMLReader()` 引用。因此，当调用\
  \ SAX 解析器的 `parse()` 方法时，读取器会调用应用程序实现的多个处理器方法之一（例如 `startElement` 方法）。\n\n***清单\
  \ 12-4.***  SAX 解析器解析采购订单文档\n\n```\npublic class SaxParsing extends DefaultHandler\
  \ {\n\nprivate List<OrderLine> orderLines = new ArrayList<>();\n  private OrderLine\
  \ orderLine;\n  private Boolean dealingWithUnitPrice = false;\n  private StringBuffer\
  \ unitPriceBuffer;\n\npublic List<OrderLine> parseOrderLines() {\n\ntry {\n    \
  \  File xmlDocument = Paths.get(\"src/main/resources/ order.xml \").toFile();\n\n\
  // SAX Factory\n      SAXParserFactory factory = SAXParserFactory.newInstance();\n\
  \      SAXParser saxParser = factory.newSAXParser();\n\n// Parsing the document\n\
  \      saxParser. parse (xmlDocument, this);\n    } catch (SAXException | IOException\
  \ | ParserConfigurationException e) {\n      e.printStackTrace();\n    }\n    return\
  \ orderLines;\n  }\n\n@Override\n  public void startElement (String namespaceURI,\
  \ String localName, String qualifiedName, →\n                                  \
  \              Attributes attrs) throws SAXException {\n\nswitch (qualifiedName)\
  \ {\n      // Getting the order_line node\n      case \"order_line\":\n        orderLine\
  \ = new OrderLine();\n        for (int i = 0; i < attrs.getLength(); i++) {\n  \
  \        switch (attrs.getLocalName(i)) {\n            case \"item\":\n        \
  \      orderLine.setItem(attrs.getValue(i));\n              break;\n           \
  \ case \"quantity\":\n              orderLine.setQuantity(Integer.valueOf(attrs.getValue(i)));\n\
  \              break;\n          }\n        }\n        break;\n      case \"unit_price\"\
  :\n        dealingWithUnitPrice = true;\n        unitPriceBuffer = new StringBuffer();\n\
  \        break;\n    }\n  }\n\n@Override\n  public void characters (char[] ch, int\
  \ start, int length) throws SAXException {\n      if (dealingWithUnitPrice)\n  \
  \      unitPriceBuffer.append(ch, start, length);\n  }\n\n@Override\n  public void\
  \ endElement (String namespaceURI, String localName, String qualifiedName) →\n \
  \                                                      throws SAXException {\n\n\
  switch (qualifiedName) {\n      case \"order_line\":\n        orderLines.add(orderLine);\n\
  \        break;\n      case \"unit_price\":\n        orderLine.setUnitPrice(Double.valueOf(unitPriceBuffer.toString()));\n\
  \        dealingWithUnitPrice = false;\n        break;\n    }\n  }\n}\n```\n\n`ContentHandler`\
  \ 接口处理基本的文档相关事件，例如通过 `startDocument`、`endDocument`、`startElement` 和 `endElement`\
  \ 方法处理元素的开始和结束。当 XML 文档或标签的开始或结束时，会调用这些方法。在清单 12-4 中，`startElement` 方法检查元素是 `order_line`\
  \ 还是 `unit_price`，以创建 `OrderLine` 对象或获取单价值。`ContentHandler` 接口还定义了方法 `characters()`，当解析器在\
  \ XML 元素中遇到字符块时调用该方法（在清单 12-4 中，`characters()` 方法缓冲每个项目的单价）。\n\n为了确保解析 XML 文档时的错误处理，可以向\
  \ `SAXReader` 注册一个 `ErrorHandler`。`ErrorHandler` 接口的方法（`warning`、`error` 和 `fatalError`）会根据不同类型的解析错误被调用。\n\
  \n`DTDHandler` 接口定义了处理 DTD 相关事件的方法。解析器使用 `DTDHandler` 向应用程序报告符号和未解析实体声明。这在处理 DTD\
  \ 以识别未解析实体的声明并对其采取行动时非常有用。\n\n使用 DOM 的 JAXP\n\nJAXP 提供了使用 DOM API 解析和修改 XML 数据的接口。入口点是\
  \ `javax.xml.parsers.DocumentBuilderFactory` 类。它用于生成一个 `DocumentBuilder` 实例，如清单\
  \ 12-5 所示。使用 `DocumentBuilder` 中的某个 `parse` 方法，您可以在 `org.w3c.dom.Document` 实例中创建\
  \ XML 数据的树形结构。该树包含树节点（例如元素和文本节点），这些节点是 `org.w3c.dom.Node` 接口的实现。或者，要创建一个空的 `Document`\
  \ 对象，您可以在 `DocumentBuilder` 实例上使用 `newDocument()` 方法。\n\n***清单 12-5.***  DOM 解析器解析采购订单文档\n\
  \n```\npublic class DomParsing {\n\npublic List<OrderLine> parseOrderLines() {\n\
  \nList<OrderLine> orderLines = new ArrayList<>();\n\ntry {\n      File xmlDocument\
  \ = Paths.get(\"src/main/resources/order.xml\").toFile();\n\n// DOM Factory\n  \
  \    DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();\n\n\
  // Parsing the document\n      DocumentBuilder documentBuilder = factory.newDocumentBuilder();\n\
  \      Document document = documentBuilder. parse (xmlDocument);\n\n// Getting the\
  \ order_line node\n      NodeList orderLinesNode = document.getElementsByTagName(\"\
  \ order_line \");\n      for (int i = 0; i < orderLinesNode.getLength(); i++) {\n\
  \        Element orderLineNode = (Element) orderLinesNode.item(i);\n        OrderLine\
  \ orderLine = new OrderLine();\n        orderLine.setItem(orderLineNode.getAttribute(\"\
  \ item \"));\n        orderLine.setQuantity(Integer.valueOf(orderLineNode.getAttribute(\"\
  \ quantity \")));\n\nNode unitPriceNode = orderLineNode.getChildNodes().item(1);\n\
  \        orderLine.setUnitPrice(Double.valueOf(unitPriceNode.getFirstChild().getNodeValue()));\n\
  \norderLines.add(orderLine);\n      }\n\n} catch (SAXException | IOException | ParserConfigurationException\
  \ e) {\n      e.printStackTrace();\n    }\n    return orderLines;\n  }\n}\n```\n\
  \n清单 12-5 解析了 order.xml 文档，结果在内存中形成了一个树形表示。借助众多的 `Document` 方法，您可以获取 `order_line`\
  \ 节点列表或 `quantity` 属性（例如 `getAttribute(\"quantity\")`）来创建一个 `OrderLine` 对象。\n\n\
  如前所述，可以通过设置系统属性 `javax.xml.parsers.DocumentBuilderFactory` 来覆盖平台的默认 DOM 解析器，以使用不同的\
  \ DOM API。\n\n使用 XSLT 的 JAXP\n\n\n\nJAXP 也用于通过 XSLT API 转换 XML 文档。XSLT 与 XML 资源交互，使用转换样式表将\
  \ XML 源转换为 XML 结果（参见清单 12-3）。\n\n清单 12-6 获取 `order.xml` 文档（清单 12-1），并使用清单 12-3 中定义的\
  \ XSLT 将其转换为 HTML 页面。该代码首先使用 `javax.xml.transform.TransformerFactory` 类的 `newInstance()`\
  \ 方法实例化一个转换器工厂。然后，它调用 `newTransformer()` 方法创建一个新的 XSLT `Transformer`。接着，它将 `order.xml`\
  \ 文档转换为一个流，最终生成一个 HTML 页面。\n\n***清单 12-6.***  使用 XSLT 转换 XML 文档\n\n```\npublic class\
  \ XsltTransforming {\n\npublic String transformOrder() {\n\nStringWriter writer\
  \ = new StringWriter();\n\ntry {\n      File xmlDocument = Paths.get(\"src/main/resources/\
  \ order.xml \").toFile();\n      File stylesheet = Paths.get(\"src/main/resources/\
  \ order.xsl \").toFile();\n\nTransformerFactory factory = →\n        TransformerFactory.newInstance(\"\
  net.sf.saxon.TransformerFactoryImpl\", null);\n\n// 转换文档\n      Transformer transformer\
  \ = factory.newTransformer(new StreamSource( stylesheet ));\n      transformer.transform(new\
  \ StreamSource( xmlDocument ), new StreamResult( writer ));\n\n} catch (TransformerException\
  \ e) {\n      e.printStackTrace();\n    }\n\nreturn writer .toString();\n  }\n}\n\
  ```\n\n用于 XML 绑定的 Java 架构\n\nJava 提供了多种操作 XML 的方式，从 JDK 中捆绑的通用 API（如 `javax.xml.stream.XmlStreamWriter`\
  \ 和 `java.beans.XMLEncoder`）到更复杂和底层的模型（如 SAX、DOM 或 JAXP）。\n\n用于 XML 绑定的 Java 架构（JAXB）规范（JSR\
  \ 222）提供了比 SAX 或 DOM 更高层次的抽象，并且基于注解。JAXB 定义了一个标准，用于将 Java 表示与 XML 进行双向绑定。这使得开发人员能够使用代表\
  \ XML 文档的 Java 对象。\n\n清单 12-7 展示了一个简单的 `CreditCard` 类，该类使用了 JAXB 注解 `@javax.xml.bind.annotation.XmlRootElement`\
  \ 进行标注。然后，JAXB 会将 `CreditCard` 对象在 XML 和 Java 之间进行双向绑定。\n\n***清单 12-7.***  带有 JAXB\
  \ 注解的 CreditCard 类\n\n```\n@XmlRootElement\npublic class CreditCard {\n\nprivate\
  \ String number ;\n  private String expiryDate ;\n  private Integer controlNumber\
  \ ;\n  private String type ;\n\n// 构造方法、getter、setter\n}\n```\n\n除了 `@XmlRootElement`\
  \ 注解之外，清单 12-7 展示了一个简单 Java 类的代码。借助此注解和编组机制，JAXB 能够创建 `CreditCard` 实例的 XML 表示，该表示可能类似于清单\
  \ 12-8 中所示的 XML 文档。\n\n***清单 12-8.***  表示信用卡数据的 XML 文档\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<creditCard>\n  < controlNumber >566</controlNumber>\n\
  \  < expiryDate >10/14</expiryDate>\n  < number >12345678</number>\n  < type >Visa</type>\n\
  </creditCard>\n```\n\n编组是将对象转换为 XML 的操作（参见图 12-2）。使用 JAXB 也可以进行逆操作。解组会将清单 12-8 中的\
  \ XML 文档作为输入，并使用文档中定义的值实例化一个 `CreditCard` 对象。\n\n![9781430246268_Fig12-02.jpg](img/9781430246268_Fig12-02.jpg)\n\
  \n图 12-2. JAXB 架构\n\nJAXB 以透明、面向对象的方式管理 XML 文档和 XML 模式定义（XSD），隐藏了 XSD 语言的复杂性。JAXB\
  \ 可以自动生成用于验证信用卡 XML 结构的模式，以确保其具有正确的结构和数据类型（这要归功于 JDK 中的 `schemagen` 工具）。清单 12-9\
  \ 展示了 `CreditCard` 类的 XML 模式定义（XSD）。\n\n***清单 12-9.***  验证前述 XML 文档的 XML 模式\n\n\
  ```\n<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<xs:schema version=\"\
  1.0\" xmlns: xs =\" http://www.w3.org/2001/XMLSchema \">\n  <xs:element name=\"\
  creditCard\" type=\"creditCard\"/>\n  <xs: complexType name=\" creditCard \">\n\
  \    <xs:sequence>\n      <xs: element name=\" controlNumber \" type=\"xs:int\"\
  \ minOccurs=\"0\"/>\n      <xs:element name=\" expiryDate \" type=\"xs:string\"\
  \ minOccurs=\"0\"/>\n      <xs:element name=\"number\" type=\"xs:string\" minOccurs=\"\
  0\"/>\n      <xs:element name=\"type\" type=\"xs:string\" minOccurs=\"0\"/>\n  \
  \  </xs:sequence>\n  </xs:complexType>\n</xs:schema>\n```\n\n清单 12-9 中的模式由简单元素（`controlNumber`、`expiryDate`\
  \ 等）和一个复杂类型（`creditCard`）组成。请注意，所有标签都使用了 `xs` 前缀（`xs:element`、`xs:string` 等）。此前缀称为*命名空间*，并在文档的\
  \ `xmlns`（XML 命名空间）头部标签中定义：\n\n```\n<xs:schema version=\"1.0\" xmlns: xs =\" http://www.w3.org/2001/XMLSchema\
  \ \">\n```\n\n命名空间为一起使用的不同文档或应用程序中的元素创建唯一的前缀。它们主要用于避免因相同元素名称出现在多个文档中而可能引起的冲突问题（例如，`<element>`\
  \ 标签可能出现在多个文档中并具有不同的含义）。\n\nJAXB 提供了 Java 对象与 XML 结构之间的轻量级双向映射。它支持将 Java 对象转换为 XML\
  \ 数据，而无需创建难以维护和调试的复杂代码。例如，JAXB 允许您轻松地将对象的状态传输到 XML 数据，并将其序列化到网络流中。另一方面，JAXB 使您能够像处理\
  \ Java 对象一样处理 XML 文档，而无需在应用程序代码中显式执行 SAX 或 DOM 解析。\n\n绑定\n\n在 `javax.xml.bind` 包中定义的\
  \ JAXB API，提供了一组用于生成 XML 文档和生成 Java 类的接口和类。换句话说，它绑定了这两种模型。JAXB 运行时框架实现了编组和解组操作。表\
  \ 12-7 包含了用于编组和解组操作的主要 JAXB 包。\n\n表 12-7. JAXB 包\n\n| 包 | 描述 |\n| --- | --- |\n\
  | `javax.xml.bind` | 运行时绑定框架，包括编组、解组和验证功能 |\n| `javax.xml.bind.annotation` | 用于自定义\
  \ Java 程序与 XML 数据之间映射的注解 |\n| `javax.xml.bind.annotation.adapters` | 与 JAXB 一起使用的适配器类\
  \ |\n| `javax.xml.bind.attachment` | 支持编组以优化二进制数据的存储，以及解组包含二进制数据格式的根文档 |\n| `javax.xml.bind.helpers`\
  \ | 包含某些 `javax.xml.bind` 接口的部分默认实现 |\n| `javax.xml.bind.util` | 提供有用的工具类 |\n\n\n\
  \n如图 12-2 所示，编组是将 JAXB 注解类的实例转换为 XML 表示的过程。同样，解组是将 XML 表示转换为对象树的过程。在编组/解组过程中，JAXB\
  \ 还可以根据 XSD 对 XML 进行验证（代码清单 12-9）。JAXB 也可以在类级别工作，能够从一组类自动生成模式，反之亦然。\n\nJAXB API\
  \ 的核心是`javax.xml.bind.JAXBContext`类。这个抽象类管理 XML 文档与 Java 对象之间的绑定，因为它提供了：\n\n*  \
  \ 一个`Unmarshaller`类，用于将 XML 文档转换为对象图，并可选择性地验证 XML\n*   一个`Marshaller`类，用于获取对象图并将其转换为\
  \ XML 文档\n\n例如，要将我们的`CreditCard`对象转换为 XML 文档（见代码清单 12-10），必须使用`Marshaller.marshal()`方法。该方法接受一个对象作为参数，并将其编组到多种输出目标中（`StringWriter`用于获取\
  \ XML 文档的字符串表示，或`FileOutputStream`用于将其存储到文件中）。\n\n***代码清单 12-10.***  编组 CreditCard\
  \ 对象的主类\n\n```\npublic class Main {\n\npublic static void main(String[] args) throws\
  \ JAXBException {\n\nCreditCard creditCard = new CreditCard(\"1234\", \"12/09\"\
  , 6398, \"Visa\");\n    StringWriter writer = new StringWriter();\n\nJAXBContext\
  \ context = JAXBContext.newInstance(CreditCard.class);\n    Marshaller m = context.createMarshaller();\n\
      m.marshal(creditCard, writer);\n\nSystem.out.println(writer.toString());\n  }\n\
  }\n```\n\n代码清单 12-10 中的代码通过使用静态方法`newInstance()`创建了一个`JAXBContext`实例，并向其传递了需要编组的根类（`CreditCard.class`）。然后，从创建的`Marshaller`对象中，它调用`marshal()`方法，该方法生成信用卡对象的\
  \ XML 表示（先前在代码清单 12-8 中展示）并将其写入`StringWriter`，然后显示出来。同样的方法也可以用于使用`Unmarshaller.unmarshal()`方法将\
  \ XML 文档解组为对象。\n\nMetro 是 JAXB 的参考实现，它拥有其他工具，特别是模式编译器（`xjc`）和模式生成器（`schemaGen`）。编组/解组处理对象和\
  \ XML 文档，而模式编译器和模式生成器则处理类和 XML 模式。这些工具可以在命令行中使用（它们随 Java SE 7 一起提供），也可以作为 Maven\
  \ 目标使用。\n\n注解\n\nJAXB 在许多方面与 JPA 类似。然而，JAXB 不是将对象映射到数据库，而是映射到 XML 文档。同样，与 JPA 一样，JAXB\
  \ 定义了一组注解（位于`javax.xml.bind.annotation`包中）来自定义此映射，并依靠异常配置来最小化开发人员的工作。如果持久化对象必须使用`@Entity`注解，那么\
  \ JAXB 中对应的注解是`@XmlRootElement`（见代码清单 12-11）。\n\n***代码清单 12-11.***  一个自定义的 CreditCard\
  \ 类\n\n```\n@XmlRootElement\n@XmlAccessorType(XmlAccessType.FIELD)\npublic class\
  \ CreditCard {\n\n@XmlAttribute(required = true)\n  private String number;\n  @XmlElement(name\
  \ = \"expiry-date\", defaultValue = \"01/10\")\n  private String expiryDate;\n  private\
  \ String type;\n  @XmlElement(name = \"control-number\")\n  private Integer controlNumber;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n在代码清单 12-11 中，`@XmlRootElement`注解通知 JAXB，`CreditCard`类是\
  \ XML 文档的根元素。如果缺少此注解，JAXB 在尝试编组时会抛出异常。然后，该类使用所有 JAXB 默认映射规则（每个属性映射到一个元素并具有相同的名称）映射到代码清单\
  \ 12-12 所示的模式。\n\n***代码清单 12-12.***  包含属性和默认值的信用卡模式\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\" standalone=\"yes\"?>\n<xs:schema version=\"1.0\" xmlns:xs=\"\
  \ http://www.w3.org/2001/XMLSchema \">\n\n<xs:element name=\"creditCard\" type=\"\
  creditCard\"/>\n\n<xs:complexType name=\"creditCard\">\n    <xs:sequence>\n      <xs:element\
  \ name=\" expiry-date \" type=\"xs:string\" default=\"01/10\" minOccurs=\"0\"/>\n\
        <xs:element name=\"type\" type=\"xs:string\" minOccurs=\"0\"/>\n      <xs:element\
  \ name=\" control-number \" type=\"xs:int\" minOccurs=\"0\"/>\n    </xs:sequence>\n\
      <xs:attribute name=\"number\" type=\"xs:string\" use=\"required\"/>\n  </xs:complexType>\n\
  </xs:schema>\n```\n\n使用`Marshaller`对象，您可以轻松获取`CreditCard`对象的 XML 表示（先前在代码清单 12-10\
  \ 中展示）。根元素`<creditCard>`代表`CreditCard`对象，并包含每个属性的值。\n\nJAXB 提供了一种自定义和控制此 XML 结构的方法。XML\
  \ 文档由元素（`<element>value</element>`）和属性（`<element attribute=\"value\"/>`）组成。JAXB\
  \ 使用两个注解来区分它们：`@XmlAttribute`和`@XmlElement`。每个注解都有一组参数，允许您重命名属性、是否允许空值、提供默认值等。如果类属性没有使用`@XmlAttribute`注解，则默认映射到\
  \ XML 元素。\n\n代码清单 12-11 使用这些注解将信用卡号转换为属性（而不是元素），并重命名了到期日期和控制号。该类将被映射到一个不同的模式，其中信用卡号表示为必需的`<xs:attribute>`，到期日期被重命名并设置了默认值`01/10`，如代码清单\
  \ 12-12 所示。\n\nCreditCard 的 XML 表示也会发生变化，如代码清单 12-13 所示（与代码清单 12-8 中的相比）。\n\n***代码清单\
  \ 12-13.***  表示自定义 CreditCard 对象的 XML 文档\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\" standalone=\"yes\"?>\n<creditCard number =\"1234\">\n  < expiry-date >12/09</expiry-date>\n\
    <type>Visa</type>\n  < control-number >6398</control-number>\n</creditCard>\n\
  ```\n\n表 12-8 列出了主要的 JAXB 注解。有些可以注解属性（或 getter 方法），有些可以注解类，还有一些可以用于整个包（例如`@XmlSchema`）。\n\
  \n表 12-8. JAXB 注解\n\n\n\n| 注解 | 描述 |\n| --- | --- |\n| `@XmlAccessorType` | 控制应映射属性还是\
  \ getter 方法（`FIELD`、`NONE`、`PROPERTY`、`PUBLIC_MEMBER`） |\n| `@XmlAttribute` | 将属性或\
  \ getter 方法映射为简单类型的 XML 属性（`String`、`Boolean`、`Integer` 等） |\n| `@XmlElement` |\
  \ 将非静态且非瞬态的属性或 getter 方法映射为 XML 元素 |\n| `@XmlElements` | 作为多个 `@XmlElement` 注解的容器\
  \ |\n| `@XmlEnum` | 将枚举映射为 XML 表示形式 |\n| `@XmlEnumValue` | 标识枚举常量 |\n| `@XmlID`\
  \ | 标识 XML 元素的键字段（类型为 `String`），可在使用 `@XmlIDREF` 注解回指元素时使用（XML Schema ID 和 IDREF\
  \ 概念） |\n| `@XmlIDREF` | 将属性映射为 schema 中的 XML `IDREF` |\n| `@XmlList` | 将属性映射为列表\
  \ |\n| `@XmlMimeType` | 标识属性 MIME 类型的文本表示形式 |\n| `@XmlNs` | 标识 XML 命名空间 |\n| `@XmlRootElement`\
  \ | 表示任何要绑定为根 XML 元素的类所需的注解 |\n| `@XmlSchema` | 将包名映射为 XML 命名空间 |\n| `@XmlTransient`\
  \ | 告知 JAXB 不要绑定某个属性（类似于 Java 的 transient 关键字或 JPA 中的 `@Transient` 注解） |\n| `@XmlType`\
  \ | 将类注解为 XML Schema 中的复杂类型 |\n| `@XmlValue` | 允许将类映射为简单的 schema 内容或类型 |\n\n使用这些注解时，你可以将对象映射到特定的\
  \ XML Schema。有时在处理遗留 Web 服务时需要这种灵活性，正如你将在后续章节中看到的那样。参照 JPA，当需要将实体映射到遗留数据库时，有一组注解允许自定义映射的每个部分（列、表、外键等）。对于\
  \ Web 服务也是如此：Web 服务在 XML 编写的 WSDL 文件中进行描述。如果是遗留 Web 服务，其 WSDL 无法更改。相反，必须使用一种将其映射到对象的机制，这就是为什么\
  \ JAXB 会与 Web 服务一起使用的原因。\n\n![image](img/sq.jpg) **注意**  在本节中，我多次提到 JPA，因为 JPA 和\
  \ JAXB 技术都严重依赖注解，并用于将对象映射到不同的媒介（数据库或 XML）。在架构方面，实体应仅用于将数据映射到数据库，而 JAXB 类用于将数据映射到\
  \ XML。但有时你可能希望同一个对象既具有数据库表示形式，又具有 XML 表示形式。正如你将在第 14 章中看到的，可以使用 `@Entity` 和 `@XmlRootElement`\
  \ 对同一个类进行注解。\n\n理解 JSON\n\nJavaScript 对象表示法（JSON）是一种轻量级的数据交换格式，比 XML 更简洁、更易读。它通常用于在服务器和\
  \ Web 应用程序之间的网络连接上序列化和传输结构化数据。\n\n作为 XML 的替代方案，JSON 可以直接被网页中的 JavaScript 代码使用。这是使用\
  \ JSON 而非其他表示形式的主要原因。清单 12-14 是清单 12-1 中采购订单 XML 文档的 JSON 表示形式。\n\n***清单 12-14.***  采购订单的\
  \ JSON 表示形式\n\n```\n{\n  \" order \": {\n    \"id\": \"1234\",\n    \"date\": \"\
  05/06/2013\",\n    \" customer \": {\n      \"first_name\": \"James\",\n      \"\
  last_name\": \"Rorrison\",\n      \"email\": \" j.rorri@me.com \",\n      \"phoneNumber\"\
  : \"+44 1234 1234\"\n    },\n    \"content\": {\n      \" order_line \": [\n        {\n\
            \"item\": \"H2G2\",\n          \"quantity\": \"1\",\n          \"unit_price\"\
  : \"23.5\"\n        },\n        {\n          \"item\": \"Harry Potter\",\n          \"\
  quantity\": \"2\",\n          \"unit_price\": \"34.99\"\n        }\n      ]\n    },\n\
      \" credit_card \": {\n      \"number\": \"1357\",\n      \"expiry_date\": \"\
  10/13\",\n      \"control_number\": \"234\",\n      \"type\": \"Visa\"\n    }\n\
    }\n}\n```\n\nJSON 对象可以序列化为 JSON，最终形成的结构比 XML 更简单。通过将变量值括在花括号中，表示该值是一个对象。在对象内部，我们可以使用\
  \ `\"name\":\"value\"` 对声明任意数量的属性，属性之间用逗号分隔。要访问 JSON 中存储的信息，我们只需引用对象和属性名称即可。\n\n\
  JSON 文档\n\nJSON 是一种基于文本、与语言无关的格式，它使用一组约定来表示简单数据结构。许多语言都已实现用于解析 JSON 文档的 API。JSON\
  \ 中的数据结构是人类可读的，并且与 Java 中的数据结构非常相似。JSON 可以表示四种原始类型（数字、字符串、布尔值和 null）和两种结构化类型（对象和数组）。表\
  \ 12-9 列出了表示数据的 JSON 约定。\n\n表 12-9. JSON 术语\n\n| 术语 | 定义 |\n| --- | --- |\n| 数字\
  \ | JSON 中的数字与 Java 中的数字非常相似，只是不使用八进制和十六进制格式 |\n| 字符串 | 字符串是零个或多个 Unicode 字符的序列，用双引号括起来，并使用反斜杠转义\
  \ |\n| 值 | JSON 中的值可以是以下格式之一：双引号括起来的字符串、数字、true、false、null、对象或数组 |\n| 数组 | 数组是有序的值集合。方括号（`[,]`）标记数组的开始和结束。数组中的值用逗号（`,`）分隔，并且可以是对象类型\
  \ |\n| 对象 | JSON 和 Java 对对象的定义相同。在 JSON 中，对象是无序的名称/值对集合。花括号（`{,}`）标记对象的开始和结束。JSON\
  \ 中的名称/值对用逗号（`,`）分隔，并代表 Java 中 POJO 的属性 |\n\n在 JSON 中，冒号（`:`）用作名称分隔符，逗号用作值分隔符。有效的\
  \ JSON 数据是序列化的对象或可以嵌套的数据结构数组。例如，一个 JSON 对象可以包含一个 JSON 数组。在清单 12-14 中，`content` 是一个包含\
  \ `order_line` 数组的对象。\n\nJSON 规范概述\n\nJSON 源自 JavaScript 的对象字面量。JSON 于 2006 年作为\
  \ RFC 4627 提交给互联网工程任务组（IETF）。IETF 是一个开放的国际社区，由关注互联网架构演进的网络设计师、研究人员、运营商和供应商组成。\n\n\
  JSON 的官方互联网媒体类型是 `application/json`（参见第 15 章关于 RESTful Web 服务的内容），JSON 文件扩展名是 `.json`。尽管\
  \ JSON 目前尚未作为 W3C 推荐标准提交，但有许多 W3C 规范和 API 直接或间接基于 JSON 或使用 JSON，例如 JSON-LD、JSONPath、JSONT\
  \ 和 JSONiq。此外，大量编程语言已实现用于解析和生成 JSON 格式数据的 API。\n\nJava 有多个实现来处理、转换、序列化/反序列化或生成 JSON\
  \ 数据，例如 Json-lib、fastjson、Flexjson、Jettison、Jackson 等（请查看 `http://json.org`，其中列出了多个用于\
  \ JSON 的 Java API）；每个实现都可能适用于不同的场景。\n\n\n\n为了提供用于处理 JSON 的标准 Java API，JSR 353（Java\
  \ 处理 JSON 的 API）于 2011 年提交给 JCP，并随 Java EE 7 一同发布。\n\nJSON-P\n\nJava 处理 JSON 的 API（JSR\
  \ 353）被称为 JSON-P，是一项允许在 Java 中处理 JSON 的规范。该处理包括解析、生成、转换和查询 JSON 数据的机制。JSON-P 提供了一种标准，使用类似于\
  \ XML 的 DOM 的 API，在 JSON 中构建 Java 对象。同时，它还提供了一种机制，通过类似于 XML 的 StAX 的方式进行流式处理，来生成和消费\
  \ JSON。\n\n虽然在最初的 JSR 中并非严格的要求，但某些 JSON-P 实现也可能提供 JSON 数据与 Java 对象之间的绑定（反之亦然，但这将在未来的\
  \ JSR 中规定，该 JSR 可能被称为 JSON-B，其中‘B’代表绑定）。表 12-10 列出了重要的 JSON-P 包。\n\n表 12-10. JSON-P\
  \ 包\n\n| 包 | 描述 |\n| --- | --- |\n| `javax.json` | 提供用于描述 JSON 数据结构的 API（例如，用于 JSON\
  \ 数组的 `JsonArray` 类和用于 JSON 对象的 `JsonObject` 类），提供通过流式处理解析、构建、读取和写入 JSON 对象和数组的入口点\
  \ |\n| `javax.json.spi` | 服务提供者接口（SPI），用于插入 `JsonParser` 和 `JsonGenerator` 的实现 |\n\
  | `javax.json.stream` | 提供用于解析和生成 JSON 的流式 API |\n\n参考实现\n\nJava 中实现了多个 JSON 处理器，但\
  \ JSON-P（JSR 353）的开源参考实现是 JSON RI。\n\nJSON 处理\n\nJSON-P 提供了两种不同的编程模型来处理 JSON 文档：对象模型\
  \ API 和流式 API。类似于 XML 的 DOM API，对象模型 API 提供了用于在树状结构中建模 JSON 对象和数组的类，该结构在内存中表示 JSON\
  \ 数据。与 DOM API 一样，对象模型 API 提供了对整个树内容的灵活导航和查询。\n\n流式 API 是一种低级 API，旨在高效处理大量 JSON\
  \ 数据。流式 API 非常类似于 XML 的 StAX API。它提供了一种无需将整个文档保留在内存中即可流式处理 JSON 的方法。流式 API 提供了一个基于拉取解析流模型的事件驱动解析器，使用户能够处理或丢弃解析器事件，并请求下一个事件（拉取事件）。JSON\
  \ 生成器也帮助您通过流式处理生成和写入 JSON。\n\nJSR 353 有一个主要的 `javax.json.Json` API，它是一个用于创建 JSON\
  \ 处理对象的类。这个核心 API 提供了创建 `JsonParser`、`JsonGenerator`、`JsonWriter`、`JsonReader`、`JsonArrayBuilder`\
  \ 和 `JsonObjectBuilder` 的方法。\n\n构建 JSON\n\nJSON 中的对象和数组结构由 `javax.json.JsonObject`\
  \ 和 `javax.json.JsonArray` 类表示。该 API 允许您导航和查询数据的树状结构。\n\n`JsonObject` 提供了一个 Map\
  \ 视图来访问零个或多个名称/值对的无序集合。类似地，`JsonArray` 提供了一个 List 视图来访问零个或多个值的有序序列。该 API 使用构建器模式，通过\
  \ `javax.json.JsonObjectBuilder` 和 `javax.json.JsonArrayBuilder` 接口创建 `JsonObject`\
  \ 和 `JsonArray` 的树状表示。\n\n清单 12-15 展示了如何构建 清单 12-14 中描述的 JSON 格式的采购订单。如您所见，`Json`\
  \ 类用于创建 `JsonObjectBuilder` 和 `JsonArrayBuilder` 对象，这些对象最终将构建一个 `JsonObject`（使用最终的\
  \ `build()` 方法）。`JsonObject` 为 JSON 对象的名称/值映射提供了一个 Map 视图。\n\n***清单 12-15.***  构建\
  \ JSON 格式采购订单的 OrderJsonBuilder 类\n\n```\npublic class OrderJsonBuilder {\n\npublic\
  \ JsonObject buildPurchaseOrder() {\n\nreturn Json.createObjectBuilder ().add(\"\
  order\", Json. createObjectBuilder ()\n            .add(\"id\", \"1234\")\n            .add(\"\
  date\", \"05/06/2013\")\n            .add(\"customer\", Json. createObjectBuilder\
  \ ()\n                .add(\"first_name\", \"James\")\n                .add(\"last_name\"\
  , \"Rorrison\")\n                .add(\"email\", \" j.rorri@me.com \")\n                .add(\"\
  phoneNumber\", \"+44 1234 1234\"))\n            .add(\"content\", Json. createObjectBuilder\
  \ ()\n                .add(\"order_line\", Json. createArrayBuilder ()\n                            .add(Json.\
  \ createObjectBuilder ()\n                                    .add(\"item\", \"\
  H2G2\")\n                                    .add(\"quantity\", \"1\")\n                                    .add(\"\
  unit_price\", \"23.5\"))\n                            .add(Json. createObjectBuilder\
  \ ()\n                                    .add(\"item\", \"Harry Potter\")\n                                    .add(\"\
  quantity\", \"2\")\n                                    .add(\"unit_price\", \"\
  34.99\"))))\n            .add(\"credit_card\", Json. createObjectBuilder ()\n                    .add(\"\
  number\", \"1357\")\n                    .add(\"expiry_date\", \"10/13\")\n                    .add(\"\
  control_number\", \"234\")\n                    .add(\"type\", \"Visa\"))). build\
  \ ();\n  }\n}\n```\n\n`JsonObject` 也可以使用接口 `javax.json.JsonReader` 从输入源（例如 `InputStream`\
  \ 或 `Reader`）创建。以下示例展示了如何使用接口 `JsonReader` 读取和创建 `JsonObject`。从 `order.json` 文件（清单\
  \ 12-14）创建一个 `JsonReader`。然后，为了访问 `order` 对象，调用 `getJsonObject()` 方法并返回一个 `JsonObject`。如果未找到对象，则返回\
  \ `null`：\n\n```\nJsonReader reader = Json.createReader(new FileReader(\"order.json\"\
  ));\nJsonObject jsonObject = reader.readObject();\njsonObject  = jsonObject.getJsonObject(\"\
  order\");\n```\n\n`JsonReader` 还提供了通用的 `read()` 方法来读取任何 `javax.json.JsonStructure`\
  \ 子类型（`JsonObject` 和 `JsonArray`）。使用 `JsonStructure.getValueType()` 方法返回 `ValueType`（`ARRAY`、`OBJECT`、`STRING`、`NUMBER`、`TRUE`、`FALSE`、`NULL`），然后您可以读取该值。`JsonStructure`\
  \ 上的 `toString()` 方法返回对象模型的 JSON 表示。\n\n类似地，`JsonObject` 和 `JsonArray` 可以使用类 `javax.json.JsonWriter`\
  \ 写入到输出源（例如 `OutputStream` 或 `Writer`）。构建器方法 `Json.createWriter()` 可以为不同的输出创建 `JsonWriter`。\n\
  \n解析 JSON\n\n流式 API（包 `javax.json.stream`）通过具有前向和只读访问权限的流式处理来简化 JSON 的解析。它提供了 `javax.json.stream.JsonParser`\
  \ 接口来解析 JSON 文档。入口点是 `javax.json.Json` 工厂类，它提供了一个 `createParser()` 方法，该方法从指定的输入源（例如\
  \ `Reader` 或 `InputStream`）返回一个 `javax.json.stream.JsonParser`。例如，用于解析空 JSON 对象的\
  \ JSON 解析器可以按如下方式创建：\n\n```\nStringReader reader = new StringReader(\"{}\");\nJsonParser\
  \ parser = Json.createParser(reader);\n```\n\n您可以通过将 Map 属性传递给 `createParserFactory()`\
  \ 方法来配置解析器。此工厂创建一个专门配置用于解析您的 JSON 数据的 `JsonParser`：\n\n```\nStringReader reader\
  \ = new StringReader(\"{}\");\nJsonParserFactory factory = Json.createParserFactory(properties)\
  \ ;\nJsonParser parser = factory.createParser (reader);\n```\n\n`JsonParser` 基于拉取解析流模型。这意味着当到达\
  \ JSON 名称/值或读取到对象/数组的开始/结束时，解析器会生成事件。表 12-11 列出了解析器触发的所有事件。\n\n表 12-11. JSON 解析事件\n\
  \n\n\n| 包名 | 描述 |\n| --- | --- |\n| `START_OBJECT` | JSON 对象开始事件（当遇到 `{` 时触发） |\n\
  | `END_OBJECT` | 对象结束事件（当遇到 `}` 时触发） |\n| `START_ARRAY` | JSON 数组开始事件（当遇到 `[` 时触发）\
  \ |\n| `END_ARRAY` | 数组结束事件（当遇到 `]` 时触发） |\n| `KEY_NAME` | JSON 对象名称（键）/值对中的名称事件\
  \ |\n| `VALUE_STRING` | 字符串值事件 |\n| `VALUE_NUMBER` | 数值事件 |\n| `VALUE_TRUE` | true\
  \ 值事件 |\n| `VALUE_FALSE` | false 值事件 |\n| `VALUE_NULL` | null 值事件 |\n\n清单 12-16\
  \ 中的类解析 清单 12-14 中的 JSON（保存在 `order.json` 文件中），以提取客户的电子邮件。解析器向前移动，直到遇到一个 `email`\
  \ 属性名称。`next()` 方法使解析器前进到下一个解析状态。它返回下一个解析状态的 `javax.json.stream.JsonParser.Event`\
  \ 枚举（表 12-11）。当解析器到达 `email` 属性值时，它会返回该值。\n\n***清单 12-16.***  解析采购订单 JSON 表示的 OrderJsonParser\
  \ 类\n\n```\npublic class OrderJsonParser {\n\npublic String parsePurchaseOrderAndReturnEmail()\
  \ throws FileNotFoundException {\n    String email = null;\n\nJsonParser parser\
  \ = Json.createParser (new FileReader(\"src/main/resources/ order.json \"));\n    while\
  \ ( parser.hasNext() ) {\n      JsonParser.Event event = parser.next();\n      while\
  \ (parser.hasNext() && !( event.equals (JsonParser.Event. KEY_NAME ) && →\n                                  \
  \ parser.getString().matches(\" email \"))) {\n        event = parser. next ();\n\
        }\n\nif ( event.equals (JsonParser.Event. KEY_NAME ) && parser.getString().matches(\"\
  \ email \")) {\n        parser.next();\n        email = parser. getString ();\n\
        }\n    }\n    return email;\n  }\n}\n```\n\n通过使用 `Event.equals()` 方法，您可以确定事件的类型，并根据事件处理\
  \ JSON。当 `JsonParser` 流式处理 JSON 时，您可以使用 `getString()` 方法根据解析器的状态获取每个名称（键）和值的字符串表示形式。如果事件是\
  \ `KEY_NAME`，则返回名称；如果事件是 `VALUE_STRING`，则返回字符串值；如果事件是 `VALUE_NUMBER`，则返回数值。除了返回字符串值的\
  \ `getString()` 之外，您还可以根据类型使用其他方法，例如 `getIntValue()`、`getLongValue()` 和 `getBigDecimalValue()`。\n\
  \n如果在解析过程中遇到不正确的数据格式，解析器将抛出运行时异常，例如 `javax.json.stream.JsonParsingException` 和 `java.lang.IllegalStateException`，具体取决于问题的根源。\n\
  \n生成 JSON\n\nJSON 构建器 API 允许您在内存中构建 JSON 树结构。`JsonParser` 通过流式处理解析 JSON 对象，而 `javax.json.stream.JsonGenerator`\
  \ 允许通过一次写入一个事件的方式将 JSON 写入流。\n\n清单 12-17 中的类使用主 `javax.json.Json` 工厂中的 `createGenerator()`\
  \ 方法获取 `JsonGenerator`，并生成 清单 12-14 中定义的 JSON 文档。生成器在 JSON 对象和 JSON 数组中写入名称/值对。\n\
  \n***清单 12-17.***  生成 JSON 格式的采购订单对象\n\n```\npublic class OrderJsonGenerator {\n\
  \npublic StringWriter generatePurchaseOrder() throws IOException {\n    StringWriter\
  \ writer = new StringWriter();\n    JsonGenerator generator = Json.createGenerator\
  \ (writer);\n    generator. writeStartObject ()\n             .write(\"id\", \"\
  1234\")\n             .write(\"date\", \"05/06/2013\")\n             . writeStartObject\
  \ (\"customer\")\n               .write(\"first_name\", \"James\")\n              \
  \ .write(\"last_name\", \"Rorrison\")\n               .write(\"email\", \" j.rorri@me.com\
  \ \")\n               .write(\"phoneNumber\", \"+44 1234 1234\")\n             .\
  \ writeEnd ()\n             . writeStartArray (\"content\")\n               . writeStartObject\
  \ ()\n                 .write(\"item\", \"H2G2\")\n                 .write(\"unit_price\"\
  , \"23.5\")\n                 .write(\"quantity\", \"1\")\n               .writeEnd()\n\
                 .writeStartObject()\n                 .write(\"item\", \"Harry Potter\"\
  )\n                 .write(\"unit_price\", \"34.99\")\n                 .write(\"\
  quantity\", \"2\")\n               .writeEnd()\n             . writeEnd ()\n            \
  \ .writeStartObject(\"credit_card\")\n               .write(\"number\", \"123412341234\"\
  )\n               .write(\"expiry_date\", \"10/13\")\n               .write(\"control_number\"\
  , \"234\")\n               .write(\"type\", \"Visa\")\n             .writeEnd()\n\
             .writeEnd()\n           . close ();\n    return writer;\n  }\n}\n```\n\
  \n生成 JSON 时需要熟悉对象和数组上下文。JSON 名称/值对可以写入对象，而 JSON 值可以写入数组。`writeStartObject()` 方法写入\
  \ JSON 开始对象字符（`{`），而 `writeStartArray()` 方法用于写入 JSON 开始数组字符（``）。每个打开的上下文必须使用 `writeEnd()`\
  \ 方法终止。写入当前上下文的结尾后，父上下文将成为新的当前上下文。\n\n`writeStartObject()` 方法用于启动一个新的子对象上下文，`writeStartArray()`\
  \ 方法用于启动一个新的子数组上下文。这两种方法只能在数组上下文中使用，或者在上下文尚未启动时使用，并且只能在未启动任何上下文时调用。当使用这些方法之一时，上下文即被启动。\n\
  \n`JsonGenerator` 类提供了其他方法，例如 `write()`，用于在当前对象上下文中写入 JSON 名称/值对，或在当前数组上下文中写入值。\n\
  \n虽然 `flush()` 方法可用于将任何缓冲输出写入底层流，但 `close()` 方法会关闭生成器并释放所有相关资源。\n\n综合运用\n\n综合运用本章的所有概念，让我们编写一个\
  \ `CreditCard` POJO，并使用 JAXB 和 JSON-P 获取信用卡的 XML 和 JSON 表示形式。为了测试这两种格式，我们将编写单元测试。`CreditCardXMLTest`\
  \ 类对 `CreditCard` 进行编组和解组，以检查 XML 表示是否正确。`CreditCardJSonTest` 类检查生成的 JSON 格式是否正确。\n\
  \n编写 CreditCard 类\n\n[清单 12-18 中的 `CreditCard` 类使用 JAXB 的 `@XmlRootElement` 注解进行标注，以便编组为\
  \ XML。另一个 JAXB 注解 `@XmlAccessorType` 带有参数 `XmlAccessType.FIELD`，它告诉 JAXB 绑定属性而不是\
  \ getter 方法。\n\n***清单 12-18.***  带有 JAXB 注解的 CreditCard 类\n\n```\n@XmlRootElement\n\
  @XmlAccessorType(XmlAccessType.FIELD)\npublic class CreditCard {\n\n@XmlAttribute\n\
    private String number;\n  @XmlElement(name = \"expiry_date\")\n  private String\
  \ expiryDate;\n  @XmlElement(name = \"control_number\")\n  private Integer controlNumber;\n\
    private String type;\n\n// 构造函数、getter、setter\n}\n```\n\n\n\n`CreditCard` 对象包含一些基本字段，例如信用卡号、有效期（格式为\
  \ MM/YY）、信用卡类型（Visa、Master Card、American Express 等）以及控制码。其中部分属性使用 `@XmlAttribute`\
  \ 注解，以映射为 XML 属性。`@XmlElement` 用于覆盖 XML 元素名称。\n\n编写 CreditCardXMLTest 单元测试\n\n清单\
  \ 12-19 中所示的 `CreditCardXMLTest` 类，利用 JAXB 编组机制，将 `CreditCard` 对象在 XML 与 Java 之间进行双向编组与反编组。`shouldMarshallACreditCard`\
  \ 方法创建了一个 `CreditCard` 类的实例，并检查其是否具有正确的 XML 表示形式。`shouldUnmarshallACreditCard` 方法则执行相反操作，它将\
  \ XML 文档反编组为 `CreditCard` 实例，并检查对象是否正确设置。\n\n***清单 12-19.***  CreditCardXMLTest\
  \ 单元测试对 XML 进行编组与反编组\n\n```\npublic class CreditCardXMLTest {\n\npublic static final\
  \ String creditCardXML =\n          \"<?xml version=\\\"1.0\\\" encoding=\\\"UTF-8\\\
  \" standalone=\\\"yes\\\"?>\\n\" +\n          \"<creditCard number=\\\"12345678\\\
  \">\\n\" +\n          \"    <expiry_date>10/14</expiry_date>\\n\" +\n          \"\
  \    <control_number>566</control_number>\\n\" +\n          \"    <type>Visa</type>\\\
  n\" +\n          \"</creditCard>\";\n\n@Test\n  public void shouldMarshallACreditCard\
  \ () throws JAXBException {\n\nCreditCard creditCard = new CreditCard(\"12345678\"\
  , \"10/14\", 566, \"Visa\");\n\nStringWriter writer = new StringWriter();\n    JAXBContext\
  \ context = JAXBContext.newInstance(CreditCard.class);\n    Marshaller m = context.createMarshaller();\n\
  \    m.setProperty(Marshaller.JAXB_FORMATTED_OUTPUT, Boolean.TRUE);\n    m. marshal\
  \ (creditCard, writer);\n\nSystem.out.println(writer);\n\nassertEquals( creditCardXML\
  \ , writer.toString().trim());\n\n}\n\n@Test\n  public void shouldUnmarshallACreditCard\
  \ () throws JAXBException {\n    StringReader reader = new StringReader( creditCardXML\
  \ );\n    JAXBContext context = JAXBContext.newInstance(CreditCard.class);\n   \
  \ Unmarshaller u = context.createUnmarshaller();\n    CreditCard creditCard = (CreditCard)\
  \ u. unmarshal (reader);\n\nassertEquals(\"12345678\", creditCard.getNumber());\n\
  \    assertEquals(\"10/14\", creditCard.getExpiryDate());\n    assertEquals((Object)\
  \ 566, creditCard.getControlNumber());\n    assertEquals(\"Visa\", creditCard.getType());\n\
  \  }\n}\n```\n\n编写 CreditCardJSonTest 单元测试\n\n清单 12-20 中所示的 `CreditCardJSonTest`\
  \ 类，使用 `JsonGenerator` API 来编写 `CreditCard` 的 JSON 对象表示形式。然后，它通过与 `creditCardJSon`\
  \ 常量进行比较，来检查 `JSonObject` 是否具有有效的语法。\n\n***清单 12-20.***  CreditCardJSonTest 单元测试生成\
  \ JSon\n\n```\npublic class CreditCardJSonTest {\n\npublic static final String creditCardJSon\
  \ =\n          \"{\\\"creditCard\\\":\" +\n                  \"{\\\"number\\\":\\\
  \"12345678\\\",\" +\n                  \"\\\"expiryDate\\\":\\\"10/14\\\",\" +\n\
  \                  \"\\\"controlNumber\\\":566,\" +\n                  \"\\\"type\\\
  \":\\\"Visa\\\"}\" +\n          \"}\";\n\n@Test\n  public void shouldGenerateACreditCard(){\n\
  \nCreditCard creditCard = new CreditCard(\"12345678\", \"10/14\", 566, \"Visa\"\
  );\n\nStringWriter writer = new StringWriter();\n    JsonGenerator generator = Json.createGenerator(writer);\n\
  \    generator.writeStartObject()\n             .writeStartObject(\"creditCard\"\
  )\n               .write(\"number\", creditCard.getNumber())\n               .write(\"\
  expiryDate\", creditCard.getExpiryDate())\n               .write(\"controlNumber\"\
  , creditCard.getControlNumber())\n               .write(\"type\", creditCard.getType())\n\
  \             .writeEnd()\n           .writeEnd()\n           .close();\n\nassertEquals(\
  \ creditCardJSon , writer.toString().trim());\n\n}\n}\n```\n\n总结\n\nXML 不仅仅是一种用于描述文档的文本格式。它是一种描述平台无关的复杂结构化数据的机制。Java\
  \ 提供了一组强大、轻量级的 API 来解析、验证和生成 XML 数据。Java 支持不同的解析模型，例如 DOM、SAX 和 StAX。虽然你可以使用基于 DOM\
  \ 或 SAX 模型的底层 Java API 来处理 XML，但 JAXP API 提供了包装类，用于基于 DOM 或 SAX 模型解析你的 XML 资源，并使用\
  \ XSLT 和 XPath 传输 XML 文档。\n\nJava 架构 for XML Binding (JAXB) 定义了一种标准，用于将 Java 表示形式绑定到\
  \ XML，反之亦然。它提供了高层次的抽象，因为它基于注解。即使 JAXB 可以用于任何类型的 Java 应用程序，它也非常适合 Web 服务领域，因为任何交换的信息都是用\
  \ XML 编写的，正如你将在第 14 章中看到的那样。\n\nJSON 是一种轻量级的数据交换格式。它是 XML 的一种替代方案，建议用于更简单的数据结构。JSON-P\
  \ 通过流式处理简化了 JSON 格式数据的解析和生成。即使 JSON 中尚不存在与 JAXB 等效的功能，诸如 JAX-RS 之类的规范也会使用 JSON-P\
  \ 从 RESTful Web 服务返回 JSON 对象（参见第 15 章）。\n\n第 13 章\n\n![image](img/frontdot.jpg)\n\
  \n消息传递\n\n到目前为止，你所看到的大多数组件间通信都是同步的：一个类调用另一个类，受管 Bean 调用 EJB，EJB 再调用实体，等等。在这种情况下，调用方和目标必须都处于运行状态，通信才能成功，并且调用方必须等待目标完成才能继续。除了\
  \ EJB 中的异步调用（得益于 `@Asynchronous` 注解）之外，大多数 Java EE 组件都使用同步调用（本地或远程）。当我们谈论消息传递时，我们指的是组件之间松散耦合的异步通信。\n\
  \n面向消息的中间件 (MOM) 是一种软件（提供者），它支持异构系统之间异步交换消息。它可以看作是系统之间的一个缓冲区，这些系统以各自的节奏生产和消费消息（例如，一个系统全天候运行，另一个系统仅在夜间运行）。它本质上是松散耦合的，因为生产者不知道通信通道的另一端是谁在消费消息并执行操作。生产者和消费者不必同时可用即可进行通信。事实上，它们甚至不知道彼此的存在，因为它们使用一个中间缓冲区。在这方面，MOM\
  \ 与远程方法调用 (RMI) 等技术完全不同，后者要求应用程序知道远程应用程序方法的签名。\n\n如今，一个典型组织拥有许多应用程序，这些应用程序通常用不同的语言编写，执行定义明确的任务。MOM\
  \ 基于异步交互模型，因此它允许这些应用程序独立工作，同时成为信息工作流过程的一部分。只要生产者和消费者就消息格式和中间目的地达成一致，消息传递就是以松散耦合、异步的方式集成现有和新应用程序的一个良好解决方案。这种通信可以在组织内部本地进行，也可以分布在多个外部服务之间。\n\
  \n理解消息传递\n\n\n\nMOM（面向消息的中间件）已经存在了一段时间，它使用一套专门的术语。当一条消息被发送时，负责存储和分发该消息的软件被称为*提供者*（有时也称为*代理*）。消息的发送者被称为*生产者*，消息存储的位置被称为*目的地*。接收消息的组件被称为*消费者*。任何对特定目的地上的消息感兴趣的组件都可以消费它。图\
  \ 13-1 展示了这些概念。\n\n![9781430246268_Fig13-01.jpg](img/9781430246268_Fig13-01.jpg)\n\
  \n图 13-1. MOM 架构\n\n在 Java EE 中，处理这些概念的 API 被称为 Java 消息服务（JMS）。它提供了一套接口和类，允许你连接到提供者、创建消息、发送消息和接收消息。JMS\
  \ 本身并不实际传输消息，它只是一个 API；它需要一个负责处理消息的提供者。当在 EJB 容器中运行时，可以使用消息驱动 Bean（MDB）以容器管理的方式接收消息。\n\
  \n在高层面上，消息传递架构由以下组件组成（参见图 13-2）：\n\n*   *提供者：* JMS 只是一个 API，因此它需要一个底层的实现来路由消息，即提供者（也称为消息代理）。提供者负责消息的缓冲和投递。\n\
  *   *客户端：* 客户端是任何向提供者生产或消费消息的 Java 应用程序或组件。“客户端”是生产者、发送者、发布者、消费者、接收者或订阅者的通用术语。\n\
  *   *消息：* 这些是客户端发送给提供者或从提供者接收的对象。\n*   *管理对象：* 消息代理必须通过 JNDI 查找或注入（稍后会看到）向客户端提供管理对象（连接工厂和目的地）。\n\
  \n![9781430246268_Fig13-02.jpg](img/9781430246268_Fig13-02.jpg)\n\n图 13-2. 消息传递架构\n\
  \n消息传递提供者通过提供一个目的地来实现异步通信，消息可以保存在该目的地，直到可以投递给客户端（参见图 13-1）。有两种不同类型的目的地，每种适用于特定的消息传递模型：\n\
  \n*   *点对点（P2P）模型：* 在此模型中，用于保存消息的目的地称为*队列*。使用点对点消息传递时，一个客户端将消息放入队列，另一个客户端接收该消息。一旦消息被确认，消息提供者就会将该消息从队列中移除。\n\
  *   *发布-订阅（pub-sub）模型：* 目的地称为*主题*。使用发布/订阅消息传递时，一个客户端将消息发布到主题，该主题的所有订阅者都会收到该消息。\n\
  \n点对点\n\n在 P2P 模型中，消息从单个生产者传送到单个消费者。该模型建立在消息队列、发送者和接收者的概念之上（参见图 13-3）。队列会保留发送者发送的消息，直到它们被消费，并且发送者和接收者之间没有时间依赖性。这意味着发送者可以随时生产消息并将其发送到队列中，而接收者可以随时消费它们。一旦接收者被创建，它将获取所有发送到该队列的消息，甚至包括在其创建之前发送的消息。\n\
  \n![9781430246268_Fig13-03.jpg](img/9781430246268_Fig13-03.jpg)\n\n图 13-3. P2P 模型\n\
  \n每条消息都被发送到一个特定的队列，接收者从队列中提取消息。队列会保留所有发送的消息，直到它们被消费或过期。\n\n如果每条消息只有一个接收者，则使用 P2P\
  \ 模型。请注意，一个队列可以有多个消费者，但一旦一个接收者从队列中消费了一条消息，该消息就会从队列中移除，其他消费者就无法再接收它。在图 13-4 中，你可以看到一个发送者生产了三条消息。\n\
  \n![9781430246268_Fig13-04.jpg](img/9781430246268_Fig13-04.jpg)\n\n图 13-4. 多个接收者\n\
  \n请注意，P2P 不保证消息按任何特定顺序投递（顺序未定义）。提供者可能按到达顺序、随机顺序或其他方式选取消息。\n\n发布-订阅\n\n在 pub-sub\
  \ 模型中，一条消息由单个生产者发送给潜在的多个消费者。该模型建立在主题、发布者和订阅者的概念之上（图 13-5）。消费者被称为*订阅者*，因为他们首先需要订阅一个主题。提供者管理订阅/取消订阅机制，因为这是动态发生的。\n\
  \n![9781430246268_Fig13-05.jpg](img/9781430246268_Fig13-05.jpg)\n\n图 13-5. Pub-sub\
  \ 模型\n\n主题会保留消息，直到它们被分发给所有订阅者。与 P2P 模型不同，发布者和订阅者之间存在时间依赖性；订阅者不会收到在其订阅之前发送的消息，并且如果订阅者在指定时间段内处于非活动状态，则当其再次变为活动状态时，也不会收到过去的消息。请注意，这可以避免，因为\
  \ JMS API 支持持久订阅者的概念，稍后你会看到。\n\n多个订阅者可以消费同一条消息。pub-sub 模型可用于广播类型的应用程序，其中一条消息被投递给多个消费者。在图\
  \ 13-6 中，发布者发送了三条消息，每个订阅者都会收到这些消息（顺序未定义）。\n\n![9781430246268_Fig13-06.jpg](img/9781430246268_Fig13-06.jpg)\n\
  \n图 13-6. 多个订阅者\n\n管理对象\n\n管理对象是通过管理方式而非编程方式配置的对象。消息提供者允许配置这些对象，并使它们在 JNDI 命名空间中可用。与\
  \ JDBC 数据源类似，管理对象只创建一次。两种类型的管理对象：\n\n*   *连接工厂*：客户端用来创建到目的地的连接。\n*   *目的地*：接收、保存和分发消息的消息分发点。目的地可以是队列（P2P）或主题（pub-sub）。\n\
  \n客户端通过可移植接口访问这些对象，方法是在 JNDI 命名空间中查找它们或通过注入。在 GlassFish 中，有几种方法可以创建这些对象，稍后你会看到：使用管理控制台、`asadmin`\
  \ 命令行或 REST 接口。从 JMS 2.0 开始，你甚至可以使用 `@JMSConnectionFactoryDefinition` 和 `@JMSDestinationDefinition`\
  \ 注解以编程方式定义这些对象。\n\n消息驱动 Bean\n\n消息驱动 Bean（MDB）是在 EJB 容器内执行的异步消息消费者。正如你在第 7 章到第\
  \ 9 章中所看到的，EJB 容器负责处理多项服务（事务、安全性、并发性、消息确认等），而 MDB 则专注于消费消息。MDB 是无状态的，这意味着 EJB 容器可以拥有大量并发执行的实例，以处理来自各个生产者的传入消息。即使它们看起来像无状态\
  \ Bean，客户端应用程序也无法直接访问 MDB；与 MDB 通信的唯一方式是向 MDB 正在监听的目的地发送消息。\n\n\n\n通常，MDB（消息驱动 Bean）会监听一个目标（队列或主题），当消息到达时，它们会消费并处理该消息。它们还可以以安全、事务性的方式将业务逻辑委托给其他无状态会话\
  \ Bean。由于 MDB 是无状态的，因此在从接收一条消息到处理下一条消息的独立调用之间，它们不会维护状态。MDB 响应的是从容器接收到的消息，而无状态会话\
  \ Bean 则是通过适当的接口（本地、远程或无接口）来响应客户端请求。\n\n消息传递规范概述\n\nJava 中的消息传递主要由 JMS 代表，它可用于在标准（Java\
  \ SE）或企业（Java EE）环境中运行的应用程序。MDB 只是无状态会话 EJB 成为消息消费者的一种方式，并且与 EJB 规范绑定。\n\n消息传递简史\n\
  \n直到 20 世纪 80 年代末，公司还没有简单的方法来连接不同的应用程序。开发人员必须为系统编写单独的软件适配器，以将数据从源应用程序转换为目标系统能够理解的格式（反之亦然）。由于服务器处理能力和可用性的差异，人们创建了缓冲区来解耦处理过程，以免整体时间被延长。缺乏同构的传输协议导致了低级协议适配器的出现。到\
  \ 80 年代末，中间件开始出现，解决了这些集成问题。第一批 MOM（面向消息的中间件）被创建为独立的软件，可以位于应用程序中间，管理系统之间的“管道”。它们能够管理不同的平台、不同的编程语言、各种网络协议以及多样化的硬件。\n\
  \nJMS 规范于 1998 年 8 月首次发布。它由主要的中间件供应商创建，旨在将消息传递功能引入 Java。JSR 914 经历了小幅修订（JMS 1.0.1、1.0.2\
  \ 和 1.0.2b），最终于 2002 年 4 月达到了 1.1 版本。JMS 1.1 被集成到 J2EE 1.2 中，并自此成为 Java EE 的一部分。然而，JMS\
  \ 和 MDB 并不属于 Web Profile 规范。这意味着它们仅在实现了完整 Java EE 7 平台的应用程序服务器上可用。\n\nJMS 2.0 的新特性是什么？\n\
  \nJMS 1.1 十多年来未曾改变。自 Java EE 5 以来，除了 JMS 之外，API 已逐渐现代化以适应语言的变化（注解、泛型等）。是时候让 JMS\
  \ 也走上同样的道路，利用注解并简化其 API 了。事实上，JMS API 已经进行了多项更改，使其更简单、更易于使用：\n\n*   `Connection`、`Session`\
  \ 以及其他具有 `close()` 方法的对象现在实现了 `java.lang.AutoCloseable` 接口，以便它们可以在 Java SE 7 的 try-with-resources\
  \ 语句中使用。\n*   新增了一个“简化 API”，为标准 API 和遗留 API 提供了更简单的替代方案。\n*   新增了一个 `getBody` 方法，允许应用程序直接从\
  \ `Message` 中提取消息体，而无需先将其转换为适当的子类型。\n*   创建了一组新的非受检异常，所有这些异常都继承自 `JMSRuntimeException`。\n\
  *   新增了新的发送方法，允许应用程序异步发送消息。\n\nEJB 3.2 的新特性是什么？\n\nMDB 是在 EJB 2.0 中引入的，并在 EJB 3.0\
  \ 以及 Java EE 5 的“易用性”范式中得到了改进。由于它们仍然是消息消费者，因此内部并未进行修改，但注解和通过异常进行配置的引入使得编写它们变得容易得多。新的\
  \ EJB 3.2 规范（JSR 345）通过增加更多可移植配置（稍后会详细介绍）为 MDB 带来了一些变化。\n\n正如你在第 7 章中所看到的，现在可以在无状态会话\
  \ Bean 中实现异步调用（使用 `@Asynchronous` 注解）。在早期版本的 Java EE 中，EJB 之间不可能进行异步调用。因此，唯一可行的解决方案是使用\
  \ JMS 和 MDB——这代价高昂，因为仅仅为了异步调用一个方法就需要使用许多资源（JMS 目标、连接、工厂等）。如今，会话 Bean 之间无需 MDB 即可进行异步调用，这使得\
  \ MDB 能够专注于通过消息传递来集成系统。\n\n参考实现\n\nOpen Message Queue (OpenMQ) 是 JMS 的参考实现。它自 2006\
  \ 年起开源，可用于独立的 JMS 应用程序或嵌入到应用程序服务器中。OpenMQ 是 GlassFish 的默认消息提供者，并且在撰写本书时，其版本已达到 5.0。它还添加了许多非标准功能，例如通用消息服务\
  \ (UMS)、通配符主题目标、XML 消息验证、集群等。\n\nJava 消息服务 API\n\nJMS 是一个标准的 Java API，允许应用程序异步地创建、发送、接收和读取消息。它定义了一组通用的接口和类，使程序能够与其他消息提供者进行通信。JMS\
  \ 类似于 JDBC：后者连接到多个数据库（Derby、MySQL、Oracle、DB2 等），而 JMS 连接到多个提供者（OpenMQ、MQSeries、SonicMQ\
  \ 等）。\n\nJMS API 自创建以来一直在发展。由于历史原因，JMS 提供了三套不同的接口集来生产和消费消息。这些截然不同的接口在 JMS 1.0、1.1\
  \ 和 2.0 中演变而来，分别被称为遗留 API、经典 API 和简化 API。\n\nJMS 1.0 明确区分了点对点模型和发布-订阅模型。它定义了两个特定于领域的\
  \ API，一个用于点对点（队列），另一个用于发布-订阅（主题）。这就是为什么你会看到 `QueueConnectionFactory` 和 `TopicConnectionFactory`\
  \ API，而不是通用的 `ConnectionFactory`。还要注意不同的术语；在 P2P 中，消费者被称为接收者，而在发布-订阅中则被称为订阅者。\n\n\
  JMS 1.1 API（称为经典 API）提供了一套统一的接口，可用于 P2P 和发布-订阅消息传递。表 13-1 显示了接口的通用名称（例如 `Session`）以及每种模型的遗留名称（`QueueSession`、`TopicSession`）。\n\
  \n表 13-1. 依赖于 JMS 版本的接口\n\n![Table13-1.jpg](img/Table13-1.jpg)\n\n但与 JPA 或 EJB 相比，JMS\
  \ 1.1 仍然是一个冗长且低级的 API。JMS 2.0 引入了一个简化 API，它提供了经典 API 的所有功能，但需要的接口更少，使用起来也更简单。表 13-1\
  \ 突出了这些 API 之间的差异（它们都位于 `javax.jms` 包下）。\n\n我不会讨论遗留 API，但我需要介绍经典 API；首先是因为你仍然会看到数百万行使用\
  \ JMS 1.1 经典 API 的代码，其次是因为从技术上讲，简化 API 依赖于经典 API。\n\n经典 API\n\nJMS 经典 API 为需要消息传递系统的应用程序提供了类和接口（参见图\
  \ 13-7）。该 API 通过提供到提供者的连接以及一个可以创建、发送或接收消息的会话来启用客户端之间的异步通信。这些消息可以包含文本或其他不同类型的对象。\n\
  \n![9781430246268_Fig13-07.jpg](img/9781430246268_Fig13-07.jpg)\n\n图 13-7. JMS 经典\
  \ API\n\nConnectionFactory\n\n\n\n连接工厂是一种受管对象，允许应用程序通过编程方式创建 `Connection` 对象来连接到提供者。`javax.jms.ConnectionFactory`\
  \ 是一个接口，封装了由管理员定义的配置参数。\n\n要使用诸如 `ConnectionFactory` 之类的受管对象，客户端需要执行 JNDI 查找（或使用注入）。例如，以下代码片段获取\
  \ JNDI `InitialContext` 对象，并使用它通过 JNDI 名称查找 `ConnectionFactory`：\n\n```\nContext\
  \ ctx = new InitialContext();\nConnectionFactory ConnectionFactory = →\n       \
  \          (ConnectionFactory) ctx.lookup(\"jms/javaee7/ConnectionFactory\");\n\
  ```\n\n此接口中可用的方法（参见清单 13-1）是返回 `Connection` 对象的 `createConnection` 方法，以及返回 `JMSContext`\
  \ 的新 JMS 2.0 `createContext` 方法。您可以使用默认用户身份，或通过指定用户名和密码来创建 `Connection` 或 `JMSContext`。\n\
  \n***清单 13-1.***  ConnectionFactory 接口\n\n```\npublic interface ConnectionFactory\
  \ {\n\nConnection createConnection() throws JMSException;\n  Connection createConnection(String\
  \ userName, String password) throws JMSException;\n  JMSContext createContext();\n\
  \  JMSContext createContext(String userName, String password);\n  JMSContext createContext(String\
  \ userName, String password, int sessionMode);\n  JMSContext createContext(int sessionMode);\n\
  }\n```\n\n目标（Destination）\n\n目标是一种受管对象，包含特定于提供者的配置信息，例如目标地址。但此配置通过使用标准的 `javax.jms.Destination`\
  \ 接口对 JMS 客户端隐藏。与连接工厂一样，需要执行 JNDI 查找来返回此类对象：\n\n```\nContext ctx = new InitialContext();\n\
  Destination queue = (Destination) ctx.lookup(\"jms/javaee7/Queue\");\n```\n\n连接（Connection）\n\
  \n`javax.jms.Connection` 对象是您使用连接工厂的 `createConnection()` 方法创建的，它封装了与 JMS 提供者的连接。连接是线程安全的，并且设计为可共享的，因为打开新连接会消耗大量资源。然而，会话（`javax.jms.Session`）为发送和接收消息提供了单线程上下文，它使用一个连接来创建一个或多个会话。一旦您有了连接工厂，就可以像下面这样使用它来创建连接：\n\
  \n```\nConnection connection = connectionFactory.createConnection();\n```\n\n在接收者可以消费消息之前，它必须调用\
  \ `start()` 方法。如果您需要在不关闭连接的情况下临时停止接收消息，可以调用 `stop()` 方法：\n\n```\nconnection.start();\n\
  connection.stop();\n```\n\n当应用程序完成时，您需要关闭所有已创建的连接。关闭连接也会关闭其会话及其生产者和消费者：\n\n```\n\
  connection.close();\n```\n\n会话（Session）\n\n您可以使用 `createSession()` 方法从连接创建会话。会话提供了一个事务上下文，在该上下文中，一组要发送或接收的消息被分组为一个原子工作单元，这意味着，如果您在同一会话期间发送多条消息，JMS\
  \ 将确保它们要么全部发送，要么全部不发送。此行为在创建会话时设置：\n\n```\nSession session = connection.createSession(true,\
  \ Session.AUTO_ACKNOWLEDGE);\n```\n\n该方法的第一个参数指定会话是否为事务性的。在代码中，该参数设置为 `true`，这意味着发送消息的请求将不会被执行，直到调用会话的\
  \ `commit()` 方法或会话被关闭。如果该参数设置为 `false`，则会话将不是事务性的，并且消息将在调用 `send()` 方法后立即发送。第二个参数意味着会话在消息成功接收后自动确认消息。会话是单线程的，用于创建消息、生产者和消费者。\n\
  \n消息（Messages）\n\n为了通信，客户端交换消息；一个生产者将向目标发送消息，而一个消费者将接收它。消息是封装信息的对象，分为三个部分（参见图 13-8）：\n\
  \n*   **消息头：** 包含用于标识和路由消息的标准信息。\n*   **属性：** 是应用程序可以设置或读取的名称-值对。属性还允许目标基于属性值过滤消息。\n\
  *   **消息体：** 包含实际消息，可以采用多种格式（文本、字节、对象等）。\n\n![9781430246268_Fig13-08.jpg](img/9781430246268_Fig13-08.jpg)\n\
  \n图 13-8. JMS 消息的结构\n\n消息头\n\n消息头具有预定义的名称-值对，这些名称-值对是所有消息共有的，客户端和提供者都使用它们来标识和路由消息。它们可以被视为消息元数据，因为它们提供了关于消息的信息。每个字段都有在\
  \ `javax.jms.Message` 接口中定义的关联 getter 和 setter 方法。某些消息头字段旨在由客户端设置，但许多字段由 `send()`\
  \ 或 `publish()` 方法自动设置。表 13-2 描述了每个 JMS 消息头字段。\n\n表 13-2. 消息头中包含的字段\n\n| 字段 | 描述\
  \ | 设置者 |\n| --- | --- | --- |\n| `JMSDestination` | 指示消息发送到的目标。 | `send()` 或 `publish()`\
  \ 方法 |\n| `JMSDeliveryMode` | JMS 支持两种消息传递模式。`PERSISTENT` 模式指示提供者确保消息在传输过程中不会因故障而丢失。`NON_PERSISTENT`\
  \ 模式是开销最低的传递模式，因为它不需要将消息记录到持久化存储中。 | `send()` 或 `publish()` 方法 |\n| `JMSMessageID`\
  \ | 提供一个唯一标识提供者发送的每条消息的值。 | `send()` 或 `publish()` 方法 |\n| `JMSTimestamp` | 包含消息移交给提供者进行发送的时间。\
  \ | `send()` 或 `publish()` 方法 |\n| `JMSCorrelationID` | 客户端可以使用此字段将一条消息与另一条消息关联起来，例如将响应消息与其请求消息关联起来。\
  \ | 客户端 |\n| `JMSReplyTo` | 包含应将消息的回复发送到的目标。 | 客户端 |\n| `JMSRedelivered` | 此 `Boolean`\
  \ 值由提供者设置，用于指示消息是否已被重新传递。 | 提供者 |\n| `JMSType` | 用作消息类型标识符。 | 客户端 |\n| `JMSExpiration`\
  \ | 发送消息时，其过期时间是根据 `send()` 方法上指定的生存时间值计算和设置的。 | `send()` 或 `publish()` 方法 |\n|\
  \ `JMSPriority` | JMS 定义了一个 10 级优先级值，其中 `0` 为最低优先级，`9` 为最高优先级。 | `send()` 或 `publish()`\
  \ 方法 |\n\n属性\n\n\n\n除了头部字段外，`javax.jms.Message` 接口还支持属性值，这些属性值类似于头部，但由应用程序显式创建，而非消息的标准字段。这提供了一种机制，可以为消息添加可选的头部字段，客户端可以通过选择器选择是否接收这些字段。属性值可以是\
  \ `boolean`、`byte`、`short`、`int`、`long`、`float`、`double` 和 `String`。设置和获取属性的代码如下所示：\n\
  \n```\nmessage.setFloatProperty(\"orderAmount\", 1245.5f);\nmessage.getFloatProperty(\"\
  orderAmount\");\n```\n\n消息体\n\n消息体是可选的，包含要发送或接收的数据。根据所使用的接口，它可以包含不同格式的数据，如表 13-3\
  \ 所列。\n\n表 13-3. 消息类型\n\n| 接口 | 描述 |\n| --- | --- |\n| `StreamMessage` | 消息体包含 Java\
  \ 原始类型值流。按顺序填充和读取。 |\n| `MapMessage` | 消息体包含一组名称-值对，其中名称为字符串，值为 Java 原始类型。 |\n|\
  \ `TextMessage` | 消息体包含一个字符串（例如，可以包含 XML）。 |\n| `ObjectMessage` | 消息包含一个可序列化对象或一组可序列化对象。\
  \ |\n| `BytesMessage` | 消息包含一个字节流。 |\n\n如果你扩展 `javax.jms.Message` 接口，则可以创建自己的消息格式。请注意，当收到消息时，其消息体是只读的。根据消息类型，你有不同的方法来访问其内容。文本消息将具有\
  \ `getText()` 和 `setText()` 方法，对象消息将具有 `getObject()` 和 `setObject()` 方法，依此类推：\n\n\
  ```\ntextMessage.setText(\"This is a text message\");\ntextMessage.getText();\n\
  bytesMessage.readByte();\nobjectMessage.getObject();\n```\n\n请注意，自 JMS 2.0 起，新方法\
  \ `<T> T getBody(Class<T> c)` 将消息体作为指定类型的对象返回。\n\n使用经典 API 发送和接收消息\n\n现在让我们看一个简单的示例，了解如何使用经典\
  \ JMS API 发送和接收消息。JMS 使用生产者、消费者和目的地。生产者将消息发送到目的地，消费者在目的地等待消息到达。目的地有两种类型：队列（用于点对点通信）和主题（用于发布-订阅通信）。在清单\
  \ 13-2 中，生产者将一条文本消息发送到消费者正在监听的队列。\n\n***清单 13-2.***  生产者类使用经典 API 将消息生成到队列中\n\n\
  ```\npublic class Producer {\n\npublic static void main(String[] args) {\n\ntry\
  \ {\n      // 获取 JNDI 上下文\n      Context jndiContext = new InitialContext();\n\n\
  // 查找受管对象\n      ConnectionFactory connectionFactory = (ConnectionFactory) →\n \
  \                       jndiContext.lookup(\" jms/javaee7/ConnectionFactory \");\n\
  \      Destination queue = (Destination) jndiContext.lookup(\" jms/javaee7/Queue\
  \ \");\n\n// 创建连接到队列所需的工件\n      Connection connection = connectionFactory.createConnection();\n\
  \      Session session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \      MessageProducer producer = session.createProducer(queue);\n\n// 向队列发送一条文本消息\n\
  \      TextMessage message = session.createTextMessage(\"Text message sent at \"\
  \ + new Date());\n      producer.send (message);\n\nconnection.close();\n\n} catch\
  \ ( NamingException | JMSException e ) {\n      e.printStackTrace();\n    }\n  }\n\
  }\n```\n\n清单 13-2 中的代码表示一个仅包含 `main()` 方法的 `Producer` 类。在此方法中，首先实例化一个 JNDI 上下文，并用于获取\
  \ `ConnectionFactory` 和 `Destination`。连接工厂和目的地（队列和主题）被称为受管对象；它们必须在消息提供者（在我们的例子中是\
  \ GlassFish 中的 OpenMQ）中创建和声明。它们都有一个 JNDI 名称（例如，队列名为 `jms/javaee7/Queue`），并且需要在 JNDI\
  \ 树中查找。\n\n获取这两个受管对象后，`Producer` 类使用 `ConnectionFactory` 创建一个 `Connection`，从中获取一个\
  \ `Session`。使用此会话，在目标队列上创建一个 `MessageProducer` 和一个消息（`session.createProducer(queue)`）。然后生产者发送此消息（文本类型）。请注意，此主类捕获了\
  \ JNDI `NamingException` 以及受检异常 `JMSException`。\n\n幸运的是，一旦你编写了发送消息的代码，接收消息的代码看起来几乎相同。事实上，清单\
  \ 13-3 中 `Consumer` 类的前几行完全相同：创建 JNDI 上下文，查找连接工厂和目的地，然后连接。唯一的区别是使用了 `MessageConsumer`\
  \ 而不是 `MessageProducer`，并且接收器进入一个无限循环来监听队列（稍后你会看到，通过使用更标准的消息监听器可以避免此循环）。当消息到达时，它被消费并显示内容。\n\
  \n***清单 13-3.***  消费者类使用经典 API 从队列消费消息\n\n```\npublic class Consumer {\n\npublic\
  \ static void main(String[] args) {\n\ntry {\n      // 获取 JNDI 上下文\n      Context\
  \ jndiContext = new InitialContext();\n\n// 查找受管对象\n      ConnectionFactory connectionFactory\
  \ = (ConnectionFactory) →\n                        jndiContext.lookup(\" jms/javaee7/ConnectionFactory\
  \ \");\n      Destination queue = (Destination) jndiContext.lookup(\" jms/javaee7/Queue\
  \ \");\n\n// 创建连接到队列所需的工件\n      Connection connection = connectionFactory.createConnection();\n\
  \      Session session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);\n\
  \      MessageConsumer consumer = session.createConsumer(queue);\n\nconnection.start();\n\
  \n// 循环接收消息\n      while (true) {\n        TextMessage message = (TextMessage) consumer.receive()\
  \ ;\n        System.out.println(\"Message received: \" + message.getText());\n \
  \     }\n\n} catch ( NamingException | JMSException e ) {\n      e.printStackTrace();\n\
  \    }\n  }\n}\n```\n\n简化 API\n\n如你所见，清单 13-2 和 13-3 中的代码相当冗长且底层。你需要多个工件才能生成或消费消息（`ConnectionFactory`、`Connection`、`Session`...）。除此之外，你还需要处理\
  \ `JMSException`，这是一个受检异常（`JMSException` 有多个子类）。此 API 创建于 2002 年的 JMS 1.1，直到 JMS\
  \ 2.0 才有所改变。\n\nJMS 2.0 引入了一个新的简化 API，主要由三个新接口（`JMSContext`、`JMSProducer` 和 `JMSConsumer`）组成。这些接口在内部依赖于\
  \ `ConnectionFactory` 和其他经典 API，但省去了样板代码。得益于新的 `JMSRuntimeException`（这是一个非受检异常），发送或接收消息的代码现在更易于编写和阅读（代码示例如下）。\n\
  \n图 13-9 展示了此新 API 的简化类图。请注意，遗留 API、经典 API 和简化 API 都在 `javax.jms` 包下。\n\n![9781430246268_Fig13-09.jpg](img/9781430246268_Fig13-09.jpg)\n\
  \n图 13-9. JMS 简化 API\n\n\n\n简化 API 提供了与经典 API 相同的消息传递功能，但所需的接口更少，使用起来也更简单。其主要接口包括：\n\
  \n*   `JMSContext`：与 JMS 提供者的活动连接，以及用于发送和接收消息的单线程上下文\n*   `JMSProducer`：由`JMSContext`创建的对象，用于向队列或主题发送消息\n\
  *   `JMSConsumer`：由`JMSContext`创建的对象，用于接收发送到队列或主题的消息\n\nJMSContext\n\n`JMSContext`是\
  \ JMS 2.0 引入的简化 JMS API 中的主要接口。它结合了 JMS 1.1 经典 API 中两个独立对象的功能：`Connection`（与 JMS\
  \ 提供者的物理链接）和`Session`（用于发送和接收消息的单线程上下文）。\n\n应用程序可以通过在`ConnectionFactory`上调用多个`createContext`方法之一来创建`JMSContext`（参见清单\
  \ 13-1），然后关闭它（即应用程序管理）。或者，如果应用程序在容器（EJB 或 Web）中运行，则可以使用`@Inject`注解注入`JMSContext`（即容器管理）。\n\
  \n当应用程序需要发送消息时，它使用`createProducer`方法创建一个`JMSProducer`，该对象提供了配置和发送消息的方法。消息可以同步或异步发送。要接收消息，应用程序可以使用多个`createConsumer`方法之一来创建`JMSConsumer`。表\
  \ 13-4 展示了`JMSContext` API 的一个子集。\n\n表 13-4. JMSContext API 子集\n\n| 属性 | 描述 |\n\
  | --- | --- |\n| `void start()` | 启动（或重新启动）传入消息的传递 |\n| `void stop()` | 临时停止传入消息的传递\
  \ |\n| `void close()` | 关闭`JMSContext` |\n| `void commit()` | 提交此事务中完成的所有消息，并释放当前持有的任何锁\
  \ |\n| `void rollback()` | 回滚此事务中完成的任何消息，并释放当前持有的任何锁 |\n| `BytesMessage createBytesMessage()`\
  \ | 创建一个`BytesMessage`对象 |\n| `MapMessage createMapMessage()` | 创建一个`MapMessage`对象\
  \ |\n| `Message createMessage()` | 创建一个`Message`对象 |\n| `ObjectMessage createObjectMessage()`\
  \ | 创建一个`ObjectMessage`对象 |\n| `StreamMessage createStreamMessage()` | 创建一个`StreamMessage`对象\
  \ |\n| `TextMessage createTextMessage()` | 创建一个`TextMessage`对象 |\n| `Topic createTopic(String\
  \ topicName)` | 创建一个`Topic`对象 |\n| `Queue createQueue(String queueName)` | 创建一个`Queue`对象\
  \ |\n| `JMSConsumer createConsumer(Destination destination)` | 为指定的目标创建`JMSConsumer`\
  \ |\n| `JMSConsumer createConsumer(Destination destination, String messageSelector)`\
  \ | 为指定的目标创建`JMSConsumer`，并使用消息选择器 |\n| `JMSProducer createProducer()` | 创建一个新的`JMSProducer`对象，可用于配置和发送消息\
  \ |\n| `JMSContext createContext(int sessionMode)` | 使用指定的会话模式创建一个新的`JMSContext`\
  \ |\n\nJMSProducer\n\n`JMSProducer`用于代表`JMSContext`发送消息。它提供了多种发送方法，用于将消息发送到指定的目标。通过调用`JMSContext`上的`createProducer`方法创建`JMSProducer`实例。它还提供了方法，允许在发送消息之前指定发送选项、消息属性和消息头（参见图\
  \ 13-8）。表 13-5 展示了`JMSProducer` API 的一个子集。\n\n表 13-5. JMSProducer API 子集\n\n| 属性\
  \ | 描述 |\n| --- | --- |\n| `get/set[Type]Property` | 设置并返回一个消息属性，其中`[Type]`是属性的类型，可以是`Boolean`、`Byte`、`Double`、`Float`、`Int`、`Long`、`Object`、`Short`、`String`\
  \ |\n| `JMSProducer clearProperties()` | 清除所有已设置的消息属性 |\n| `Set<String> getPropertyNames()`\
  \ | 返回所有已设置消息属性名称的不可修改`Set`视图 |\n| `boolean propertyExists(String name)` | 指示是否已设置具有指定名称的消息属性\
  \ |\n| `get/set[Message Header]` | 设置并返回一个消息头，其中`[Message Header]`可以是`DeliveryDelay`、`DeliveryMode`、`JMSCorrelationID`、`JMSReplyTo`、`JMSType`、`Priority`、`TimeToLive`\
  \ |\n| `JMSProducer send(Destination destination, Message message)` | 使用已定义的任何发送选项、消息属性和消息头，将消息发送到指定的目标\
  \ |\n| `JMSProducer send(Destination destination, String body)` | 将带有指定正文的`TextMessage`发送到指定的目标\
  \ |\n\nJMSConsumer\n\n`JMSConsumer`用于从队列或主题接收消息。它通过传递`Queue`或`Topic`，使用`JMSContext`上的`createConsumer`方法之一创建。稍后您将看到，可以使用消息选择器创建`JMSConsumer`，以便限制传递的消息。\n\
  \n客户端可以同步或异步接收到达的消息。对于异步传递，客户端可以向`JMSConsumer`注册一个`MessageListener`对象。当消息到达时，提供者通过调用`MessageListener`的`onMessage`方法来传递消息。表\
  \ 13-6 展示了`JMSConsumer` API 的一个子集。\n\n表 13-6. JMSConsumer API 子集\n\n| 属性 | 描述 |\n\
  | --- | --- |\n| `void close()` | 关闭`JMSConsumer` |\n| `Message receive()` | 接收下一条生成的消息\
  \ |\n| `Message receive(long timeout)` | 接收在指定超时间隔内到达的下一条消息 |\n| `<T> T receiveBody(Class<T>\
  \ c)` | 接收下一条生成的消息，并将其正文作为指定类型的对象返回 |\n| `Message receiveNoWait()` | 如果立即可用，则接收下一条消息\
  \ |\n| `void setMessageListener(MessageListener listener)` | 设置`MessageListener`\
  \ |\n| `MessageListener getMessageListener()` | 获取`MessageListener` |\n| `String\
  \ getMessageSelector()` | 获取消息选择器表达式 |\n\n编写消息生产者\n\n新的 JMS 简化 API 允许您以比经典 API 更简洁的方式编写生产者和消费者。但它仍然需要两个受管对象：`ConnectionFactory`和`Destination`。根据您是在容器（EJB、Web\
  \ 或 ACC）外部还是内部运行，您将使用 JNDI 查找或注入。正如您之前所见，`JMSContext` API 是生产和消费消息的核心 API。如果您的应用程序在容器外部运行，则需要管理`JMSContext`的生命周期（通过编程方式创建和关闭它）。如果在容器内部运行，您可以直接注入它，并让容器管理其生命周期。\n\
  \n在容器外部生产消息\n\n消息生产者（`JMSProducer`）是由`JMSContext`创建的对象，用于向目标发送消息。以下步骤说明了如何在任何容器外部（在纯\
  \ Java SE 环境中）创建一个向队列发送消息的生产者（参见清单 13-4）：\n\n*   使用 JNDI 查找获取连接工厂和队列\n*   使用连接工厂创建一个`JMSContext`对象（注意\
  \ try-with-resources 语句将自动关闭`JMSContext`对象）\n*   使用`JSMContext`对象创建一个`javax.jms.JMSProducer`\n\
  *   使用`JMSProducer.send()`方法向队列发送一条文本消息\n\n\n\n***清单 13-4.***  生产者类将消息发送到队列\n\n\
  ```\npublic class Producer {\n\npublic static void main(String[] args) {\n\ntry\
  \ {\n      // 获取 JNDI 上下文\n      Context jndiContext = new InitialContext();\n\n\
  // 查找受管对象\n      ConnectionFactory connectionFactory = (ConnectionFactory) →\n \
  \                       jndiContext.lookup(\" jms/javaee7/ConnectionFactory \");\n\
  \      Destination queue = (Destination) jndiContext.lookup(\" jms/javaee7/Queue\
  \ \");\n\n// 向队列发送文本消息\n      try ( JMSContext context = connectionFactory.createContext()\
  \ ) {\n        context.createProducer().send (queue, \"Text message sent at \" +\
  \ new Date());\n      }\n\n} catch ( NamingException e) {\n      e.printStackTrace();\n\
  \    }\n  }\n}\n```\n\n如果将清单 13-4 中的代码与使用经典 API 的清单 13-2 中的代码进行比较，你会发现代码更加简洁。异常处理也更加整洁，因为新\
  \ API 中使用了新的`JMSRuntimeException`，它是一个非受检异常。\n\n在容器内生成消息\n\n连接工厂和目标是驻留在消息提供者中的受管对象，必须在\
  \ JNDI 命名空间中声明，这就是为什么使用 JNDI API 来查找它们的原因。当客户端代码在容器内运行时，可以使用依赖注入。Java EE 7 有多个容器：EJB、Servlet\
  \ 和应用程序客户端容器（ACC）。如果代码在这些容器之一中运行，可以使用`@Resource`注解让容器注入对该资源的引用。使用 Java EE 7，使用资源变得更加容易，因为你无需处理\
  \ JNDI 的复杂性，也无需在部署描述符中配置资源引用。你只需依赖容器的注入能力即可。\n\n表 13-7 列出了属于`@Resource`注解的属性。\n\n\
  表 13-7. @javax.annotation.Resource 注解的 API\n\n| 元素 | 描述 |\n| --- | --- |\n| `name`\
  \ | 资源的 JNDI 名称（名称是特定于实现的，不可移植） |\n| `type` | 资源的 Java 类型（例如，`javax.sql.DataSource`或`javax.jms.Topic`）\
  \ |\n| `authenticationType` | 用于资源的认证类型（容器或应用程序） |\n| `shareable` | 资源是否可以共享 |\n\
  | `mappedName` | 资源应映射到的产品特定名称 |\n| `lookup` | 正在定义的资源将绑定到的资源的 JNDI 名称。它可以使用可移植的\
  \ JNDI 名称链接到任何兼容的资源 |\n| `description` | 资源的描述 |\n\n为了使用`@Resource`注解，我们以清单 13-4\
  \ 中的生产者为例，将其改为无状态会话 Bean，并使用注入代替 JNDI 查找。在清单 13-4 中，连接工厂和队列都是通过 JNDI 查找的。在清单 13-5\
  \ 中，JNDI 名称位于`@Resource`注解上。当`ProducerEJB`在容器中运行时，`ConnectionFactory`和`Queue`的引用会在初始化时被注入。\n\
  \n***清单 13-5.***  在容器内运行并使用@Resource 的 ProducerEJB\n\n```\n@Stateless\npublic class\
  \ ProducerEJB {\n\n@Resource (lookup = \" jms/javaee7/ConnectionFactory \")\n  private\
  \ ConnectionFactory connectionFactory;\n  @Resource (lookup = \" jms/javaee7/Queue\
  \ \")\n  private Queue queue;\n\npublic void sendMessage() {\n\ntry ( JMSContext\
  \ context = connectionFactory.createContext() ) {\n      context.createProducer().send\
  \ (queue, \"Text message sent at \" + new Date());\n    }\n  }\n}\n```\n\n清单 13-5\
  \ 中的代码比清单 13-4 中的代码更简单，因为它不需要处理 JNDI 查找或 JNDI `NamingException`。一旦 EJB 初始化，容器就会注入受管对象。\n\
  \n在启用了 CDI 的容器内生成消息\n\n当生产者在启用了 CDI 的容器（EJB 或 Servlet 容器）中执行时，它可以注入`JMSContext`。然后容器将管理其生命周期（无需创建或关闭`JMSContext`）。这要归功于`@Inject`和`@JMSConnectionFactory`注解。\n\
  \n注解`javax.jms.JMSConnectionFactory`可用于指定用于创建`JMSContext`的`ConnectionFactory`的 JNDI\
  \ 查找名称（参见清单 13-6）。如果省略`JMSConnectionFactory`注解，则将使用平台默认的 JMS 连接工厂。\n\n***清单 13-6.***\
  \  使用@Inject 生成消息的受管 Bean\n\n```\npublic class Producer {\n\n@Inject\n  @JMSConnectionFactory\
  \ (\" jms/javaee7/ConnectionFactory \")\n  private JMSContext context;\n  @Resource\
  \ (lookup = \" jms/javaee7/Queue \")\n  private Queue queue;\n\npublic void sendMessage()\
  \ {\n    context.createProducer().send (queue, \"Text message sent at \" + new Date());\n\
  \  }\n}\n```\n\n清单 13-6 中的代码非常精简。容器完成了注入所需组件和管理其生命周期的所有工作。作为开发者，你只需要一行代码即可发送消息。\n\
  \n注解`javax.jms.JMSPasswordCredential`也可用于在创建`JMSContext`时指定用户名和密码：\n\n```\n@Inject\n\
  @JMSConnectionFactory(\"jms/connectionFactory\")\n@JMSPasswordCredential(userName=\"\
  admin\",password=\"mypassword\")\nprivate JMSContext context;\n```\n\n编写消息消费者\n\n\
  客户端使用`JMSConsumer`从目标接收消息。通过将`Queue`或`Topic`传递给`JMSContext`的`createConsumer()`方法来创建`JMSConsumer`。消息传递本质上是异步的，生产者和消费者之间没有时间依赖性。然而，客户端本身可以通过两种方式消费消息：\n\
  \n*   *同步*：接收者通过调用`receive()`方法显式地从目标获取消息。\n*   *异步*：接收者决定注册到消息到达时触发的事件。它必须实现`MessageListener`接口，并且每当消息到达时，提供者通过调用`onMessage()`方法传递消息。\n\
  \n图 13-10 说明了这两种类型的消费者。\n\n![9781430246268_Fig13-10.jpg](img/9781430246268_Fig13-10.jpg)\n\
  \n图 13-10. 同步和异步消费者\n\n同步传递\n\n同步消费者需要启动一个`JMSContext`，循环等待直到新消息到达，并使用其`receive()`方法之一请求到达的消息（参见表\
  \ 13-6）。`receive()`有几种变体，允许客户端拉取或等待下一条消息。以下步骤说明了如何创建一个从队列消费消息的同步消费者（参见清单 13-7）：\n\
  \n*   使用 JNDI 查找（或注入）获取连接工厂和主题\n*   使用连接工厂创建一个`JMSContext`对象\n*   使用`JSMContext`对象创建一个`javax.jms.JMSConsumer`\n\
  *   循环并在消费者对象上调用`receive()`方法（本例中为`receiveBody`）。如果队列为空，`receive()`方法会阻塞并等待消息到达。这里，无限循环等待其他消息到达\n\
  \n***清单 13-7.***  消费者类以同步方式消费消息\n\n```\npublic class Consumer {\n\n\n\n```java\n\
  public static void main(String[] args) {\n\ntry {\n      // 获取 JNDI 上下文\n      Context\
  \ jndiContext = new InitialContext();\n\n// 查找受管对象\n      ConnectionFactory connectionFactory\
  \ = (ConnectionFactory) →\n                        jndiContext.lookup(\" jms/javaee7/ConnectionFactory\
  \ \");\n      Destination queue = (Destination) jndiContext.lookup(\" jms/javaee7/Queue\
  \ \");\n\n// 循环接收消息\n      try ( JMSContext context = connectionFactory.createContext()\
  \ ) {\n        while (true) {\n          String message = context.createConsumer(queue).receiveBody(String.class)\
  \ ;\n        }\n      }\n\n} catch ( NamingException e) {\n      e.printStackTrace();\n\
  \    }\n  }\n}\n```\n\n再次强调，如果将清单 13-7 中的代码与清单 13-3 中使用经典 API 的代码进行比较，您会发现新的简化 API\
  \ 更易于使用且更具表现力。\n\n![image](img/sq.jpg) **注意** 就像生产者可以在容器内执行时使用 `@Resource`、`@Inject`\
  \ 或 `@JMSConnectionFactory` 进行注入一样（参见清单 13-5 和 13-6），消费者也可以受益于相同的功能。这里我只是展示了消费者如何在纯\
  \ Java SE 环境中接收消息，但您可以想象，如果在容器内运行并使用注入，代码将得到怎样的简化。\n\n异步投递\n\n异步消费基于事件处理。客户端可以注册一个实现了\
  \ `MessageListener` 接口的对象（包括自身）。*消息监听器*是一个充当消息异步事件处理程序的对象。当消息到达时，提供者通过调用监听器的 `onMessage()`\
  \ 方法来投递消息，该方法接受一个 `Message` 类型的参数。使用这种事件模型，消费者无需无限循环来接收消息。MDB 就使用这种事件模型（稍后会详细介绍）。\n\
  \n以下步骤描述了创建异步消息监听器的过程（参见清单 13-8）：\n\n*   该类实现 `javax.jms.MessageListener` 接口，该接口定义了一个名为\
  \ `onMessage()` 的方法\n*   使用 JNDI 查找（或注入）获取连接工厂和主题\n*   使用 `JSMContext` 对象创建 `javax.jms.JMS`Consumer\n\
  *   调用 `setMessageListener()` 方法，传入一个 `MessageListener` 接口的实例（在清单 13-8 中，`Listener`\
  \ 类本身实现了 `MessageListener` 接口）\n*   实现 `onMessage()` 方法并处理接收到的消息。每当消息到达时，提供者将调用此方法，并传入消息\n\
  \n***清单 13-8.***  消费者是一个消息监听器\n\n```java\npublic class Listener implements MessageListener\
  \ {\n\npublic static void main(String[] args) {\n\ntry {\n      // 获取 JNDI 上下文\n\
  \      Context jndiContext = new InitialContext();\n\n// 查找受管对象\n      ConnectionFactory\
  \ connectionFactory = (ConnectionFactory) →\n                        jndiContext.lookup(\"\
  jms/javaee7/ConnectionFactory\");\n      Destination queue = (Destination) jndiContext.lookup(\"\
  jms/javaee7/Queue\");\n\ntry (JMSContext context = connectionFactory.createContext())\
  \ {\n        context.createConsumer(queue). setMessageListener(new Listener()) ;\n\
  \      }\n\n} catch (NamingException e) {\n      e.printStackTrace();\n    }\n \
  \ }\n\npublic void onMessage (Message message) {\n    System.out.println(\"异步消息已接收:\
  \ \" + message.getBody(String.class) );\n  }\n}\n```\n\n可靠性机制\n\n您已经了解了如何连接到提供者、创建不同类型的消息、将它们发送到队列或主题以及接收它们。但是，如果您严重依赖\
  \ JMS 并需要确保可靠性或其他高级功能，该怎么办？JMS 定义了多个可靠性级别，以确保您的消息能够被投递，即使提供者崩溃或处于负载之下，或者目标中充满了本应过期的消息。实现可靠消息投递的机制如下：\n\
  \n*   *过滤消息*：使用选择器可以过滤您想要接收的消息\n*   *设置消息生存时间*：为消息设置过期时间，这样如果消息过时就不会被投递\n*   *指定消息持久性*：指定消息在提供者发生故障时是持久的\n\
  *   *控制确认*：指定不同级别的消息确认\n*   *创建持久订阅者*：确保在发布-订阅模型中，消息能够投递给不可用的订阅者\n*   *设置优先级*：设置投递消息的优先级\n\
  \n过滤消息\n\n某些消息传递应用程序需要过滤它们接收的消息。当一条消息广播给许多客户端时，设置条件以便只有特定的接收者才能消费它就变得很有用。这消除了提供者将消息传输给不需要它们的客户端所浪费的时间和带宽。\n\
  \n您已经看到消息由三部分组成：消息头、属性和消息体（参见图 13-8）。消息头包含固定数量的字段（消息元数据），而属性是一组自定义的名称-值对，应用程序可以使用它们来设置任何值。可以在这两个区域上进行选择。生产者设置一个或多个属性值或消息头字段，消费者使用选择器表达式指定消息选择标准。只有与选择器匹配的消息才会被投递。消息选择器将过滤消息的工作分配给\
  \ JMS 提供者，而不是应用程序。\n\n消息选择器是一个包含表达式的字符串。该表达式的语法基于 SQL92 条件表达式语法的子集，如下所示：\n\n```java\n\
  context.createConsumer(queue, \" JMSPriority < 6 \").receive();\ncontext.createConsumer(queue,\
  \ \" JMSPriority < 6 AND orderAmount < 200 \").receive();\ncontext.createConsumer(queue,\
  \ \" orderAmount BETWEEN 1000 AND 2000 \").receive();\n```\n\n在前面的代码中，使用 `JMSContext.createConsumer()`\
  \ 方法创建了一个消费者，并传入了一个选择器字符串。该字符串可以使用消息头字段（`JMSPriority < 6`）或自定义属性（`orderAmount <\
  \ 200`）。生产者按如下方式将这些属性设置到消息中：\n\n```java\ncontext.createTextMessage(). setIntProperty(\"\
  orderAmount\", 1530) ;\ncontext.createTextMessage(). setJMSPriority(5) ;\n```\n\n\
  选择器表达式可以使用逻辑运算符（`NOT`、`AND`、`OR`）、比较运算符（`=`、`>`、`>=`、`<`、`<=`、`<>`）、算术运算符（`+`、`-`、`*`、`/`）、表达式（[`NOT`]\
  \ `BETWEEN`、[`NOT`] `IN`、[`NOT`] `LIKE`、`IS` [`NOT`] `NULL`）等。\n\n设置消息生存时间\n\n在高负载下，可以为消息设置生存时间，以确保提供者在消息过时时将其从目标中移除，可以通过使用\
  \ `JMSProducer` API 或设置 `JMSExpiration` 消息头字段来实现。`JMSProducer` 有一个 `setTimeToLive()`\
  \ 方法，该方法接受毫秒数：\n\n```java\ncontext.createProducer(). setTimeToLive (1000).send(queue,\
  \ message);\n```\n\n指定消息持久性\n\n\n\nJMS 支持两种消息传递模式：持久性和非持久性。*持久性传递*确保消息仅传递给消费者一次，而*非持久性传递*要求消息最多传递一次。持久性传递（默认模式）更可靠，但会牺牲性能，因为它能防止在提供者发生故障时丢失消息。传递模式可以通过\
  \ `JMSProducer` 接口的 `setDeliveryMode()` 方法指定：\n\n```\ncontext.createProducer().\
  \ setDeliveryMode (DeliveryMode.NON_PERSISTENT).send(queue, message);\n```\n\n控制确认\n\
  \n到目前为止，我们探讨的场景都假设消息的发送和接收无需任何确认。但有时，您会希望接收方确认已收到消息（参见图 13-11）。确认阶段可以由 JMS 提供者发起，也可以由客户端发起，具体取决于确认模式。\n\
  \n![9781430246268_Fig13-11.jpg](img/9781430246268_Fig13-11.jpg)\n\n图 13-11. 消费者确认消息\n\
  \n在事务性会话中，确认会在事务提交时自动进行。如果事务回滚，所有已消费的消息将被重新传递。但在非事务性会话中，必须指定确认模式：\n\n*   `AUTO_ACKNOWLEDGE`：会话自动确认收到消息\n\
  *   `CLIENT_ACKNOWLEDGE`：客户端通过显式调用 `Message.acknowledge()` 方法来确认消息\n*   `DUPS_OK_ACKNOWLEDGE`：此选项指示会话延迟确认消息的传递。如果\
  \ JMS 提供者发生故障，这可能会导致传递一些重复消息，因此仅适用于能够容忍重复消息的消费者。如果消息被重新传递，提供者会将 `JMSRedelivered`\
  \ 标头字段的值设置为 `true`\n\n以下代码使用 `@JMSSessionMode` 注解在生产者的 `JMSContext` 上设置确认模式。消费者通过调用\
  \ `acknowledge()` 方法显式确认消息：\n\n```\n// 生产者\n@Inject\n@JMSConnectionFactory(\"jms/connectionFactory\"\
  )\n@JMSSessionMode(JMSContext.AUTO_ACKNOWLEDGE)\nprivate JMSContext context;\n...\n\
  context.createProducer().send(queue, message);\n\n// 消费者\nmessage. acknowledge ();\n\
  ```\n\n创建持久化消费者\n\n使用发布-订阅模型的缺点在于，消息发送到主题时，消息消费者必须正在运行；否则将无法接收消息。通过使用持久化消费者，JMS\
  \ API 提供了一种方法，可以将消息保留在主题中，直到所有订阅的消费者都收到它们。使用持久化订阅，消费者可以离线一段时间，但当它重新连接时，会收到离线期间到达的消息。为此，客户端使用\
  \ `JMSContext` 创建一个持久化消费者：\n\n```\ncontext. createDurableConsumer (topic, \"javaee7DurableSubscription\"\
  ).receive();\n```\n\n此时，客户端程序启动连接并接收消息。名称 `javaee7DurableSubscription` 用作持久化订阅的标识符。每个持久化消费者必须有一个唯一的\
  \ ID，因此需要为每个潜在的持久化消费者声明一个唯一的连接工厂。\n\n设置优先级\n\n您可以使用消息优先级级别来指示 JMS 提供者优先传递紧急消息。JMS\
  \ 定义了十个优先级值，`0` 为最低，`9` 为最高。您可以通过 `JMSProducer` 的 `setPriority()` 方法指定优先级值：\n\n\
  ```\ncontext.createProducer(). setPriority (2).send(queue, message);\n```\n\n这些方法大多返回\
  \ `JMSProducer`，以便将方法调用链接在一起，实现流畅的编程风格。例如：\n\n```\ncontext.createProducer().setPriority(2)\n\
                          .setTimeToLive(1000)\n                        .setDeliveryMode(DeliveryMode.NON_PERSISTENT)\n\
                          .send(queue, message);\n```\n\n编写消息驱动 Bean\n\n到目前为止，本章展示了异步消息传递如何通过\
  \ JMS API 在系统之间提供松散耦合和更高的灵活性。MDB 为在 EJB 容器中运行的企业应用程序提供了这种标准的异步消息传递模型。\n\nMDB 是一个异步消费者，由容器在消息到达时调用。对于消息生产者而言，MDB\
  \ 只是一个消息消费者，隐藏在其监听的 destination 之后。\n\nMDB 是 EJB 规范的一部分，其模型与无状态会话 Bean 类似，因为它们没有任何状态并在\
  \ EJB 容器内运行。容器监听一个 destination，并在消息到达时将调用委托给 MDB。与任何其他 EJB 一样，MDB 可以访问容器管理的资源（其他\
  \ EJB、JDBC 连接、JMS 资源、实体管理器等）。\n\n既然您已经看到可以使用独立的 JMS 客户端，为什么还要使用 MDB 呢？因为容器管理多线程、安全性和事务，从而大大简化了\
  \ JMS 消费者的代码。它还管理多个 MDB 实例（在池中可用）之间的传入消息，这些实例本身没有特殊的多线程代码。一旦新消息到达 destination，就会从池中检索一个\
  \ MDB 实例来处理该消息。一个简单的消费者 MDB 如清单 13-9 所示。\n\n***清单 13-9.***  一个简单的 MDB\n\n```\n@MessageDriven(mappedName\
  \ = \"jms/javaee7/Topic\")\npublic class BillingMDB implements MessageListener {\n\
  \npublic void onMessage (Message message) {\n    System.out.println(\"Message received:\
  \ \" + message.getBody(String.class));\n  }\n}\n```\n\n清单 13-9 中的代码（为清晰起见省略了异常处理）表明，MDB\
  \ 使程序员摆脱了处理迄今为止所解释的各种消息类型的所有机械性工作。MDB 实现了 `MessageListener` 接口和 `onMessage()` 方法，但无需其他代码来连接提供者或启动消息消费。MDB\
  \ 还依赖于“例外配置”机制，只需少量注解即可使其工作（参见 `@MessageDriven` 注解）。\n\nMDB 剖析\n\nMDB 与会话 Bean 不同，因为它们不实现本地或远程业务接口，而是实现\
  \ `javax.jms.MessageListener` 接口。客户端不能直接调用 MDB 上的方法；然而，与会话 Bean 一样，MDB 拥有丰富的编程模型，包括生命周期、回调注解、拦截器、注入和事务。利用此模型可以为应用程序提供高级别的功能。\n\
  \n需要注意的是，MDB 不属于 EJB Lite 模型的一部分，这意味着它们不能部署在简单的 Web 配置文件应用服务器中，而仍然需要完整的 Java EE\
  \ 堆栈。\n\n开发 MDB 类的要求如下：\n\n*   该类必须使用 `@javax.ejb.MessageDriven` 或其部署描述符中的 XML 等效项进行注解\n\
  *   该类必须直接或间接实现 `MessageListener` 接口\n*   该类必须定义为 public，并且不能是 final 或 abstract\n\
  *   该类必须有一个公共的无参构造函数，容器将使用它来创建 MDB 实例\n*   该类不能定义 `finalize()` 方法。\n\n\n\nMDB 类可以实现其他方法、调用其他资源等。MDB\
  \ 部署在容器中，并且可以选择性地与 `ejb-jar.xml` 文件打包在一起。遵循 Java EE 7 的“易用性”模型，MDB 可以只是一个带有注解的 POJO，从而消除了大部分配置。但是，如果仍然需要自定义\
  \ JMS 配置，则可以使用 `@MessageDriven` 和 `@ActivationConfigProperty` 注解（或等效的 XML）的元素。\n\
  \n@MessageDriven\n\nMDB 是开发起来最简单的 EJB 类型之一，因为它们支持的注解数量最少。`@MessageDriven` 注解（或等效的\
  \ XML）是强制性的，因为它是容器识别 Java 类实际上是 MDB 所需的元数据片段。\n\n如清单 13-10 所示，`@MessageDriven` 注解的\
  \ API 非常简单，并且所有元素都是可选的。\n\n***清单 13-10.***  @MessageDriven 注解 API\n\n```\n@Target(TYPE)\
  \ @Retention(RUNTIME)\npublic @interface MessageDriven {\n  String name() default\
  \ \"\";\n  Class messageListenerInterface default Object.class;\n  ActivationConfigProperty[]\
  \ activationConfig() default {};\n  String mappedName();\n  String description();\n\
  }\n```\n\n`name` 元素指定 MDB 的名称（默认情况下是类的名称）。`messageListenerInterface` 指定 MDB 实现了哪个消息监听器（如果\
  \ MDB 实现了多个接口，它会告诉 EJB 容器哪个是 `MessageListener` 接口）。`mappedName` 元素是 MDB 应监听的目标的\
  \ JNDI 名称。`description` 只是一个字符串，用于在部署后描述 MDB。`activationConfig` 元素用于指定配置属性，并接受一个\
  \ `@ActivationConfigProperty` 注解数组。\n\n@ActivationConfigProperty\n\nJMS 允许配置某些属性，例如消息选择器、确认模式、持久订阅者等。在\
  \ MDB 中，可以使用 `@ActivationConfigProperty` 注解设置这些属性。这个可选的注解可以作为 `@MessageDriven` 注解的参数之一提供，并且与等效的\
  \ JMS 相比，`@ActivationConfigProperty` 非常基础，由一个名称-值对组成（参见清单 13-11）。\n\n***清单 13-11.***\
  \  ActivationConfigProperty 注解 API\n\n```\n@Target({}) @Retention(RUNTIME)\npublic\
  \ @interface ActivationConfigProperty {\n  String propertyName();\n  String propertyValue();\n\
  }\n```\n\n`activationConfig` 属性允许您提供标准和非标准（特定于提供者）的配置。清单 13-12 中的代码设置了确认模式和消息选择器。\n\
  \n***清单 13-12.***  在 MDB 上设置属性\n\n```\n@MessageDriven(mappedName = \"jms/javaee7/Topic\"\
  , activationConfig = {\n  @ActivationConfigProperty (propertyName = \" acknowledgeMode\
  \ \", →\n                            propertyValue = \"Auto-acknowledge\"),\n  @ActivationConfigProperty\
  \ (propertyName = \" messageSelector \", →\n                            propertyValue\
  \ = \"orderAmount < 3000\")\n})\npublic class BillingMDB implements MessageListener\
  \ {\n\npublic void onMessage(Message message) {\n    System.out.println(\"Message\
  \ received: \" + message.getBody(String.class));\n  }\n}\n```\n\n每个激活属性都是一个名称-值对，底层消息传递提供者理解并使用它来设置\
  \ MDB。表 13-8 列出了一些可以使用的标准属性。\n\n表 13-8. OpenMQ 的激活属性\n\n| 属性 | 描述 |\n| --- | ---\
  \ |\n| `acknowledgeMode` | 确认模式（默认为 `AUTO_ACKNOWLEDGE`） |\n| `messageSelector` |\
  \ MDB 使用的消息选择器字符串 |\n| `destinationType` | 目标类型，可以是 `TOPIC` 或 `QUEUE` |\n| `destinationLookup`\
  \ | 管理定义的 `Queue` 或 `Topic` 的查找名称 |\n| `connectionFactoryLookup` | 管理定义的 `ConnectionFactory`\
  \ 的查找名称 |\n| `destination` | 目标的名称。 |\n| `subscriptionDurability` | 订阅持久性（默认为 `NON_DURABLE`）\
  \ |\n| `subscriptionName` | 消费者的订阅名称 |\n| `shareSubscriptions` | 如果消息驱动 bean 部署在集群中使用\
  \ |\n| `clientId` | 连接到 JMS 提供者时将使用的客户端标识符 |\n\n依赖注入\n\n与您在第 7 章中看到的所有其他 EJB 一样，MDB\
  \ 可以使用依赖注入来获取对 JDBC 数据源、EJB 或其他对象等资源的引用。*注入*是容器在创建对象后自动插入依赖项的方式。这些资源必须在容器或环境上下文中可用，因此\
  \ MDB 中允许使用以下代码：\n\n```\n@PersistenceContext\nprivate EntityManager em;\n@Inject\n\
  private InvoiceBean invoice;\n@Resource (lookup = \"jms/javaee7/ConnectionFactory\"\
  )\nprivate ConnectionFactory connectionFactory;\n```\n\n也可以使用 `@Resource` 注解注入 MDB\
  \ 上下文：\n\n```\n@Resource private MessageDrivenContext context;\n```\n\nMDB 上下文\n\
  \n`MessageDrivenContext` 接口提供了对容器为 MDB 实例提供的运行时上下文的访问。容器将 `MessageDrivenContext`\
  \ 接口传递给此实例，该接口在 MDB 的整个生命周期内保持关联。这使 MDB 能够显式回滚事务、获取用户主体等。`MessageDrivenContext`\
  \ 接口扩展了 `javax.ejb.EJBContext` 接口，但没有添加任何额外的方法。\n\n如果 MDB 注入对其上下文的引用，它将能够调用表 13-9\
  \ 中列出的方法。\n\n表 13-9. MessageDrivenContext 接口的方法\n\n| 方法 | 描述 |\n| --- | --- |\n\
  | `getCallerPrincipal` | 返回与调用关联的 `java.security.Principal` |\n| `getRollbackOnly`\
  \ | 测试当前事务是否已被标记为回滚 |\n| `getTimerService` | 返回 `javax.ejb.TimerService` 接口 |\n\
  | `getUserTransaction` | 返回用于划分事务边界的 `javax.transaction.UserTransaction` 接口。只有使用\
  \ Bean 管理事务 (BMT) 的 MDB 才能使用此方法 |\n| `isCallerInRole` | 测试调用者是否具有给定的安全角色 |\n| `Lookup`\
  \ | 使 MDB 能够在 JNDI 命名上下文中查找其环境条目 |\n| `setRollbackOnly` | 允许实例将当前事务标记为回滚。只有使用 BMT\
  \ 的 MDB 才能使用此方法 |\n\n生命周期和回调注解\n\nMDB 生命周期（参见图 13-12）与无状态会话 bean 相同：要么 MDB 存在并准备好消费消息，要么它不存在。在退出之前，容器首先创建\
  \ MDB 的一个实例，并且如果适用，注入元数据注解（`@Resource`、`@Inject`、`@EJB` 等）或部署描述符指定的必要资源。然后，容器调用\
  \ bean 的 `@PostConstruct` 回调方法（如果有）。之后，MDB 进入就绪状态并等待消费任何传入消息。当 MDB 从池中移除或销毁时，会发生\
  \ `@PreDestroy` 回调。\n\n![9781430246268_Fig13-12.jpg](img/9781430246268_Fig13-12.jpg)\n\
  \n图 13-12. MDB 生命周期\n\n\n\n此行为与无状态会话 Bean 的行为相同（关于回调方法的更多详情，请参见第 8 章），并且与其他 EJB\
  \ 一样，你可以使用 `@javax.ejb.AroundInvoke` 注解添加拦截器。\n\nMDB 作为消费者\n\n如本章前面“编写消息消费者”部分所述，消费者可以通过循环等待消息到达来同步接收消息，也可以通过实现\
  \ `MessageListener` 接口来异步接收消息。从本质上讲，MDB 被设计为用作异步消息消费者。MDB 实现了一个消息监听器接口，当消息到达时，容器会触发该接口。\n\
  \nMDB 能否成为同步消费者？可以，但不推荐这样做。同步消息消费者会阻塞并占用服务器资源（EJB 将陷入循环而不执行任何工作，容器也无法释放它们）。与无状态会话\
  \ Bean 一样，MDB 存在于特定大小的池中。当容器需要一个实例时，它会从池中取出一个并使用。如果每个实例都进入无限循环，池最终将变空，所有可用实例都将忙于循环。EJB\
  \ 容器还可能开始生成更多 MDB 实例，从而扩大池并消耗越来越多的内存。因此，不应将会话 Bean 和 MDB 用作同步消息消费者。表 13-10 展示了 MDB\
  \ 和会话 Bean 的不同接收模式。\n\n表 13-10. MDB 与会话 Bean 的比较\n\n| 企业 Bean | 生产者 | 同步消费者 | 异步消费者\
  \ |\n| --- | --- | --- | --- |\n| 会话 Bean | 是 | 不推荐 | 不可能 |\n| MDB | 是 | 不推荐 | 是\
  \ |\n\nMDB 作为生产者\n\nMDB 能够成为消息生产者，这通常发生在它们参与工作流时，因为它们从一个目标接收消息，处理消息，然后将其发送到另一个目标。要添加此功能，必须使用\
  \ JMS API。\n\n可以通过使用 `@Resource` 和 `@JMSConnectionFactory` 注解或通过 JNDI 查找来注入目标和连接工厂，然后可以调用\
  \ `javax.jms.JMSContext` 对象上的方法来创建和发送消息。`BillingMDB` 的代码（参见清单 13-13）监听一个主题（`jms/javaee7/Topic`），接收消息（`onMessage()`\
  \ 方法），并向一个队列（`jms/javaee7/Queue`）发送新消息。\n\n***清单 13-13.***  一个消费和生成消息的 MDB\n\n```\n\
  @MessageDriven(mappedName = \" jms/javaee7/Topic \", activationConfig = { →\n  \
  \      @ActivationConfigProperty(propertyName  = \"acknowledgeMode\", →\n      \
  \                            propertyValue = \"Auto-acknowledge\"), →\n        @ActivationConfigProperty(propertyName\
  \  = \"messageSelector\", →\n                                  propertyValue = \"\
  orderAmount BETWEEN 3 AND 7\")\n})\npublic class BillingMDB implements MessageListener\
  \ {\n\n@Inject\n  @JMSConnectionFactory(\"jms/javaee7/ConnectionFactory\")\n  @JMSSessionMode(JMSContext.AUTO_ACKNOWLEDGE)\n\
  \  private JMSContext context;\n  @Resource(lookup = \" jms/javaee7/Queue \")\n\
  \  private Destination printingQueue ;\n\npublic void onMessage(Message message)\
  \ {\n    System.out.println(\"Message received: \" + message.getBody(String.class));\n\
  \    sendPrintingMessage();\n  }\n\nprivate void sendPrintingMessage () throws JMSException\
  \ {\n    context.createProducer().send (printingQueue, \"Message has been received\
  \ and resent\");\n  }\n}\n```\n\n此 MDB 使用了迄今为止介绍的大部分概念。首先，它使用 `@MessageDriven` 注解来定义其正在监听的主题的\
  \ JNDI 名称（`mappedName = \"jms/javaee7/Topic\"`）。在同一注解中，它使用一组 `@ActivationConfigProperty`\
  \ 注解定义了一组属性，例如确认模式和消息选择器，并且它实现了 `MessageListener` 及其 `onMessage()` 方法。\n\n此 MDB\
  \ 还需要生成一条消息。因此，它被注入了所需的两个管理对象：一个连接工厂（使用 `JMSContext`）和一个目标（名为 `jms/javaee7/Queue`\
  \ 的队列）。最后，发送消息的业务方法（`sendPrintingMessage()` 方法）看起来与你之前看到的类似：创建一个 `JMSProducer` 并用于创建和发送文本消息。为了提高可读性，整个类中省略了异常处理。\n\
  \n事务\n\nMDB 是 EJB（更多信息请参见第 7 章和第 8 章）。MDB 可以使用 BMT 或容器管理事务（CMT）；它们可以通过使用 `MessageDrivenContext.setRollbackOnly()`\
  \ 方法显式回滚事务，等等。但是，关于 MDB 有一些值得解释的细节。\n\n当我们谈论事务时，我们总是想到关系数据库。然而，其他资源也是事务性的，例如消息传递系统。如果两个或多个操作必须同时成功或失败，它们就构成一个事务（参见第\
  \ 9 章）。对于消息传递，如果发送了两条或多条消息，它们必须同时成功（提交）或失败（回滚）。这在实践中是如何工作的？答案是，在事务提交之前，消息不会释放给消费者。容器将在调用\
  \ `onMessage()` 方法之前启动一个事务，并在方法返回时提交该事务（除非该事务被标记为使用 `setRollbackOnly()` 回滚）。\n\n\
  尽管 MDB 是事务性的，但它们不能在客户端的事务上下文中执行，因为它们没有客户端。没有人显式调用 MDB 上的方法，它们只是监听目标并消费消息。没有上下文从客户端传递到\
  \ MDB，同样，客户端事务上下文也不能传递给 `onMessage()` 方法。表 13-11 比较了 CMT 与会话 Bean 和 MDB。\n\n表 13-11.\
  \ MDB 事务与会话 Bean 的比较\n\n| 事务属性 | 会话 Bean | MDB |\n| --- | --- | --- |\n| `NOT_SUPPORTED`\
  \ | 是 | 是 |\n| `REQUIRED` | 是 | 是 |\n| `MANDATORY` | 是 | 否 |\n| `REQUIRES_NEW` |\
  \ 是 | 否 |\n| `SUPPORTS` | 是 | 否 |\n| `NEVER` | 是 | 否 |\n\n在 CMT 中，MDB 可以在业务方法上使用\
  \ `@javax.ejb.TransactionAttribute` 注解，并带有以下两个属性：\n\n*   `REQUIRED` *（默认值）*：如果 MDB\
  \ 调用其他企业 Bean，容器会将事务上下文传递给该调用。当消息监听器方法完成时，容器尝试提交事务。\n*   `NOT_SUPPORTED`：如果 MDB\
  \ 调用其他企业 Bean，容器不会将事务上下文传递给该调用。\n\n处理异常\n\n在本章的代码片段中，异常处理已被省略，因为 JMS API 在处理异常时可能比较冗长。经典\
  \ API 定义了 12 种不同的异常，全部继承自 `javax.jms.JMSException`。简化的 API 定义了 10 种运行时异常，全部继承自 `javax.jms.JMSRuntimeException`。\n\
  \n需要注意的是，`JMSException` 是受检异常（参见第 9 章中“异常处理”部分关于应用程序异常的讨论），而 `JMSRuntimeException`\
  \ 是非受检异常。EJB 规范概述了两种类型的异常：\n\n\n\n*   *应用程序异常*：继承自`Exception`的受检异常，不会导致容器回滚\n* \
  \  *系统异常*：继承自`RuntimeException`的非受检异常，会导致容器回滚\n\n抛出`JMSRuntimeException`会导致容器回滚，但抛出`JMSException`则不会。如果需要回滚，必须显式调用`setRollBackOnly()`或重新抛出系统异常（例如`EJBException`）：\n\
  \n```\npublic void onMessage(Message message) {\n  try {\n    System.out.println(\"\
  Message received: \" + message.getBody(String.class));\n  } catch (JMSException\
  \ e) {\n    context.setRollBackOnly();\n  }\n}\n```\n\n综合运用\n\n在本章中，我们介绍了消息传递的基本概念（点对点模型和发布-订阅模型）、受管对象（连接工厂和目的地），学习了如何连接到提供者、生产和消费消息、使用一些可靠性机制，以及使用容器管理组件（MDB）监听目的地。现在，让我们通过一个示例来看看这些概念如何协同工作；我们将使用\
  \ Maven 编译和打包，并将其部署到 GlassFish。\n\n此示例使用一个独立类（`OrderProducer`）向一个主题（名为`jms/javaee7/Topic`）发送消息。这些消息是代表客户购买图书和\
  \ CD 的订单的对象。采购订单（`OrderDTO`）具有多个属性，包括订单总金额。监听该主题的消费者是`OrderConsumer`和`ExpensiveOrderMDB`（参见图\
  \ 13-13）。`OrderConsumer`接收所有订单，但 MDB 仅消费总金额大于 1000 美元的订单（使用选择器）。\n\n![9781430246268_Fig13-13.jpg](img/9781430246268_Fig13-13.jpg)\n\
  \n图 13-13. 综合运用\n\n由于 Maven 需要根据最终的打包工件来组织代码，`ExpensiveOrderMDB`和`OrderDTO`将被打包到一个\
  \ jar 文件（`chapter13-MDB-1.0.jar`文件）中，然后部署到 GlassFish。`OrderProducer`、`OrderConsumer`以及`OrderDTO`将在\
  \ Java SE 环境中运行。\n\n编写 OrderDTO\n\n将在 JMS 消息中发送的对象是一个 POJO，它需要实现`Serializable`接口。`OrderDTO`类（如清单\
  \ 13-14 所示）提供了订单的一些信息，包括其总金额；该对象将被设置到 JMS `ObjectMessage`中，从`OrderProducer`发送到主题，然后由`OrderConsumer`和`ExpensiveOrderMDB`消费。\n\
  \n***清单 13-14.***  OrderDTO 在 JMS ObjectMessage 中传递\n\n```\npublic class OrderDTO\
  \ implements Serializable {\n\nprivate Long orderId;\n  private Date creationDate;\n\
    private String customerName;\n  private Float totalAmount ;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n编写 OrderProducer\n\n`OrderProducer`（如清单 13-15 所示）是一个独立客户端，它使用 JMS 简化 API\
  \ 向`jms/javaee7/Topic`主题发送`ObjectMessage`。它查找必要的连接工厂和目的地，并在`main()`方法中创建`OrderDTO`类的实例。请注意，订单的`totalAmount`是传递给该类的参数（`args[0]`）。`JSMProducer`在消息中设置`orderAmount`属性以供后续选择，然后将订单发送到主题。\n\
  \n***清单 13-15.***  OrderProducer 发送 OrderDTO\n\n```\npublic class OrderProducer\
  \ {\n\npublic static void main(String[] args) throws NamingException {\n\n// 创建一个带有总金额参数的\
  \ orderDto\n    Float totalAmount = Float.valueOf(args[0]);\n    OrderDTO order\
  \ = new OrderDTO(1234l, new Date(), \"Betty Moreau\", totalAmount );\n\n// 获取 JNDI\
  \ 上下文\n    Context jndiContext = new InitialContext();\n\n// 查找受管对象\n    ConnectionFactory\
  \ connectionFactory = (ConnectionFactory) →\n                      jndiContext.lookup(\"\
  \ jms/javaee7/ConnectionFactory \");\n    Destination topic = (Destination) jndiContext.lookup(\"\
  \ jms/javaee7/Topic \");\n\ntry (JMSContext jmsContext = connectionFactory.createContext())\
  \ {\n     // 向主题发送对象消息\n     jmsContext.createProducer(). setProperty(\"orderAmount\"\
  , totalAmount) . send(topic, order) ;\n    }\n  }\n}\n```\n\n编写 OrderConsumer\n\n\
  `OrderConsumer`（如清单 13-16 所示）也是一个独立的 JMS 客户端，它监听`jms/javaee7/Topic`主题，并使用`JMSConsumer`\
  \ API 接收所有`OrderDTO`（没有选择器）。\n\n***清单 13-16.***  OrderConsumer 消费所有 OrderDTO 消息\n\
  \n```\npublic class OrderConsumer {\n\npublic static void main(String[] args) throws\
  \ NamingException {\n\n// 获取 JNDI 上下文\n    Context jndiContext = new InitialContext();\n\
  \n// 查找受管对象\n    ConnectionFactory connectionFactory = (ConnectionFactory) →\n                      jndiContext.lookup(\"\
  \ jms/javaee7/ConnectionFactory \");\n    Destination topic = (Destination) jndiContext.lookup(\"\
  \ jms/javaee7/Topic \");\n\n// 循环接收消息\n    try (JMSContext jmsContext = connectionFactory.createContext())\
  \ {\n      while (true) {\n        OrderDTO order = jmsContext.createConsumer(topic).receiveBody(OrderDTO.class)\
  \ ;\n        System.out.println(\"Order received: \" + order);\n      }\n    }\n\
    }\n}\n```\n\n编写 ExpensiveOrderMDB\n\n`ExpensiveOrderMDB`类（参见清单 13-17）是一个使用`@MessageDriven`注解的\
  \ MDB，它监听`jms/javaee7/Topic`目的地。此 MDB 仅对金额大于 1000 美元的订单感兴趣，它使用消息选择器（`orderAmount\
  \ > 1000`）。消息到达时，`onMessage()`方法消费它，将其转换为`OderDTO`（`getBody(OrderDTO.class)`），并获取消息体。在此示例中，仅显示消息（`System.out.println`），但也可以执行其他处理（例如，委托给无状态会话\
  \ Bean）。\n\n***清单 13-17.***  ExpensiveOrderMDB 仅消费金额大于 1000 美元的订单\n\n```\n@MessageDriven(mappedName\
  \ = \" jms/javaee7/Topic \", activationConfig = { →\n        @ActivationConfigProperty(propertyName  =\
  \ \"acknowledgeMode\", →\n                                  propertyValue = \"Auto-acknowledge\"\
  ), →\n        @ActivationConfigProperty(propertyName  = \" messageSelector \", →\n\
                                    propertyValue = \" orderAmount > 1000 \")\n})\n\
  public class ExpensiveOrderMDB implements MessageListener {\n\npublic void onMessage\
  \ (Message message) {\n    try {\n      OrderDTO order = message.getBody(OrderDTO.class)\
  \ ;\n      System.out.println(\"Expensive order received: \" + order.toString());\n\
      } catch (JMSException e) {\n      e.printStackTrace();\n    }\n  }\n}\n```\n\
  \n使用 Maven 编译和打包\n\n`ExpensiveOrderMDB`和`OrderDTO`应打包在一个 jar 文件中，以便部署到 GlassFish。由于\
  \ MDB 使用 EJB 包（`@MessageDriven`）和 JMS API（`ConnectionFactory`、`Destination`等）中的注解，因此清单\
  \ 13-18 中显示的`pom.xml`使用了`glassfish-embedded-all`依赖项（其中包含所有 Java EE 7 API）。此依赖项的作用域为`provided`，因为\
  \ GlassFish 作为 EJB 容器和 JMS 提供者，会在运行时提供这些 API。应通过配置`maven-compiler-plugin`来告知 Maven\
  \ 您正在使用 Java SE 7。\n\n***清单 13-18.***  用于构建和打包 MDB 的 pom.xml\n\n\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\" http://maven.apache.org/POM/4.0.0\
  \ \" →\n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \" →\n        \
  \ xsi:schemaLocation=\" http://maven.apache.org/POM/4.0.0 →\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\
  \ \">\n  <modelVersion>4.0.0</modelVersion>\n\n<parent>\n    <artifactId>chapter13</artifactId>\n\
      <groupId>org.agoncal.book.javaee7</groupId>\n    <version>1.0</version>\n  </parent>\n\
  \n<groupId>org.agoncal.book.javaee7.chapter13</groupId>\n  <artifactId>chapter13-mdb</artifactId>\n\
    <version>1.0</version>\n\n<dependencies>\n    <dependency>\n      <groupId>org.glassfish.main.extras</groupId>\n\
        <artifactId> glassfish-embedded-all </artifactId>\n      <version>4.0</version>\n\
        <scope>provided</scope>\n    </dependency>\n  </dependencies>\n\n<build>\n\
      <plugins>\n      <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n\
          <artifactId>maven-compiler-plugin</artifactId>\n        <version>2.5.1</version>\n\
          <configuration>\n          <source> 1.7 </source>\n          <target>1.7</target>\n\
          </configuration>\n      </plugin>\n    </plugins>\n  </build>\n</project>\n\
  ```\n\n要编译并打包这些类，请在包含 `pom.xml` 文件的目录中打开命令行解释器，并输入以下 Maven 命令：\n\n```\n$ mvn package\n\
  ```\n\n进入 `target` 目录，你应该能看到 `chapter13-MDB-1.0.jar` 文件。如果打开它，你会发现其中包含了 `ExpensiveOrderMDB`\
  \ 和 `OrderDTO` 的类文件。\n\n创建受管对象\n\n发送和接收消息所需的受管对象需要在 JMS 提供者中创建。每个对象都有一个 JNDI 名称，允许客户端通过\
  \ JNDI 查找获取对象的引用：\n\n*   连接工厂名为 `jms/javaee7/ConnectionFactory`\n*   主题名为 `jms/javaee7/Topic`\n\
  \n由于这些对象是通过管理方式创建的，因此需要确保 GlassFish 已启动并正在运行。确认 `asadmin` 命令行工具已在你的路径中后，在控制台中执行以下命令：\n\
  \n```\n$ asadmin create-jms-resource --restype javax.jms.ConnectionFactory →\n                                        jms/javaee7/ConnectionFactory\n\
  $ asadmin create-jms-resource --restype javax. jms.Topic jms/javaee7/Topic\n```\n\
  \n可以使用 GlassFish 的 Web 控制台来设置连接工厂和队列。但请注意，根据我的经验，管理 GlassFish 最简单快捷的方式是通过 `asadmin`\
  \ 脚本。使用另一个命令列出所有 JMS 资源，以确保受管对象创建成功：\n\n```\n$ asadmin list-jms-resources\njms/javaee7/Topic\n\
  jms/javaee7/ConnectionFactory\n```\n\n从 JMS 2.0 开始，有一种编程方式来声明受管对象。其思路是使用 `@JMSConnectionFactoryDefinition`\
  \ 和 `@JMSDestinationDefinition` 注解任何受管 Bean（受管 Bean、EJB、MDB……），部署该 Bean，容器将确保创建工厂和目的地。这种机制与你之前在第\
  \ 8 章的清单 8-15 中看到的 `@DataSourceDefinition` 注解类似。清单 13-19 展示了带有两个定义注解的 `ExpensiveOrderMDB`。\n\
  \n***清单 13-19.***  以编程方式定义受管对象的 ExpensiveOrderMDB\n\n```\n@JMSConnectionFactoryDefinition\
  \ (name = \"jms/javaee7/ConnectionFactory\",\n                           className\
  \ = \"javax.jms.ConnectionFactory\")\n@JMSDestinationDefinition (name = \"jms/javaee7/Topic\"\
  ,\n                     className = \"javax.jms.Topic\")\npublic class ExpensiveOrderMDB\
  \ implements MessageListener {...}\n```\n\n在 GlassFish 上部署 MDB\n\n将 MDB 打包到 jar\
  \ 中后，需要将其部署到 GlassFish 中。这可以通过多种方式完成，包括通过 Web 管理控制台。然而，`asadmin` 命令行可以简单地完成这项工作：打开命令行，进入包含\
  \ `chapter13-MDB-1.0.jar` 文件的 `target` 目录，确保 GlassFish 仍在运行，然后输入以下命令：\n\n```\n$\
  \ asadmin deploy chapter13-MDB-1.0.jar\n```\n\n如果部署成功，以下命令应返回已部署 jar 的名称及其类型（示例中为\
  \ `ejb`）：\n\n```\n$ asadmin list-components\nchapter13-MDB-1.0 <ejb>\n```\n\n运行示例\n\
  \nMDB 已部署在 GlassFish 上，并正在监听 `jms/javaee7/Topic` 目的地，等待消息到达。现在是时候运行 `OrderConsumer`\
  \ 和 `OrderProducer` 客户端了。这些类是独立的应用程序，包含一个 `main` 方法，需要在 GlassFish 外部、纯 Java SE 环境中执行。输入以下命令运行\
  \ `OrderConsumer`：\n\n```\n$ java –cp target/classes OrderConsumer\n```\n\n消费者会无限循环，等待订单到达。现在输入以下命令，发送一个金额为\
  \ 2000 美元的订单消息：\n\n```\n$ java –cp target/classes OrderProducer 2000\n```\n\n由于金额大于\
  \ 1000 美元（选择器中定义的金额），`OrderExpensiveMDB` 和 `OrderConsumer` 都应该收到该消息。检查 GlassFish\
  \ 日志以确认这一点。如果你传递的参数低于 1000 美元，MDB 将不会收到消息，只有 `OrderConsumer` 会收到：\n\n```\n$ java\
  \ –cp target/classes OrderProducer 500\n```\n\n总结\n\n本章展示了与消息传递的集成是一种组件之间松散耦合、异步的通信形式。MOM\
  \ 可以看作是系统之间的缓冲区，这些系统需要按照自己的节奏生产和消费消息。这与 RPC 架构（如 RMI）不同，在 RPC 架构中，客户端需要了解可用服务的方法。\n\
  \n本章的第一部分重点介绍了 JMS API（经典版和简化版）及其术语。异步模型是一个非常强大的 API，可以在 Java SE 或 Java EE 环境中使用，它基于\
  \ P2P 和发布-订阅、连接工厂、目的地、连接、会话、不同类型的消息（文本、对象、映射、流、字节）、选择器以及其他可靠性机制（如确认或持久性）。\n\nJava\
  \ EE 有一个特殊的企业组件用于消费消息：MDB。本章的第二部分展示了 MDB 如何用作异步消费者，以及它们如何依赖其容器来处理多项服务（生命周期、拦截器、事务、安全性、并发性、消息确认等）。\n\
  \n本章还展示了如何将这些组件与 Maven、GlassFish 和 OpenMQ 结合起来，并给出了一个独立发送者和 MDB 接收者的示例。\n\n接下来的章节将演示用于与外部系统互操作的其他技术：SOAP\
  \ Web 服务和 RESTful Web 服务。\n\n第 14 章\n\n![image](img/frontdot.jpg)\n\nSOAP Web 服务\n\
  \n*Web 服务*一词意味着“Web”上可访问的、能为你提供“服务”的“某种东西”。我们首先想到的例子是 HTML 页面：它可以在线访问，一旦阅读，就能提供你正在寻找的信息。另一种\
  \ Web 服务是 Servlet。它们绑定到一个 URL，因此可以在 Web 上访问，并执行任何类型的处理。但“Web 服务”一词很快成为一个流行词，被同化为面向服务的架构（SOA），如今\
  \ Web 服务已成为我们日常架构生活的一部分。Web 服务应用程序可以使用不同的技术实现，例如本章描述的 SOAP，或下一章描述的 REST。\n\n\nSOAP（简单对象访问协议）Web\
  \ 服务被称为“松耦合”，因为 Web 服务的客户端（即消费者）无需了解其实现细节（例如开发所用的语言、方法签名或运行平台）。消费者能够通过一个自解释的接口来调用\
  \ SOAP Web 服务，该接口描述了可用的业务方法（参数和返回值）。底层实现可以用任何语言完成（Visual Basic、C#、C、C++、Java 等）。消费者和服务提供者仍然能够以松耦合的方式交换数据：即使用\
  \ XML 文档。消费者以 XML 文档的形式向 SOAP Web 服务发送请求，并可选地接收同样以 XML 格式返回的回复。\n\nSOAP Web 服务也涉及分布式计算。分布式软件已经存在了很长时间，但与现有的分布式系统不同，SOAP\
  \ Web 服务适应于 Web。默认的网络协议是 HTTP，这是一种众所周知且健壮的无状态协议。\n\nSOAP Web 服务无处不在。它们可以从简单的桌面应用程序调用，也可用于企业对企业（B2B）集成，从而使以前需要人工干预的操作自动执行。SOAP\
  \ Web 服务集成了由不同组织通过互联网或同一公司内部（称为企业应用集成，EAI）运行的应用程序。在所有情况下，它们都提供了一种连接不同软件组件的标准方式。\n\
  \n本章将首先介绍理解 SOAP Web 服务所需的一些重要概念，例如 WSDL 或 SOAP。然后，它将展示如何编写一个 SOAP Web 服务，之后再解释如何消费它。\n\
  \n理解 SOAP Web 服务\n\n简单来说，SOAP Web 服务构成了一种通过服务（即服务提供者）暴露给客户端（即服务消费者）的业务逻辑。然而，与对象或\
  \ EJB 不同，SOAP Web 服务使用 XML 提供松耦合的接口。SOAP Web 服务标准规定，消息发送到的接口应定义消息请求和响应的格式，以及发布和发现\
  \ Web 服务接口（服务注册中心）的机制。\n\n在图 14-1 中，你可以看到 SOAP Web 服务交互的高层示意图。SOAP Web 服务可以选择将其接口注册到注册中心（通用描述、发现与集成服务，即\
  \ UDDI），以便消费者可以发现它。一旦消费者知道了服务的接口和消息格式，它就可以向服务提供者发送请求并接收响应。\n\n![9781430246268_Fig14-01.jpg](img/9781430246268_Fig14-01.jpg)\n\
  \n图 14-1. 消费者通过注册中心发现服务\n\nSOAP Web 服务依赖于多种技术和协议，以标准方式将数据从消费者传输和转换到服务提供者。你经常会遇到以下几种：\n\
  \n*   **可扩展标记语言（XML）** 是构建和定义 SOAP Web 服务（SOAP、WSDL 和 UDDI）的基础。\n*   **Web 服务描述语言（WSDL）**\
  \ 定义了消费者与提供者之间的协议、接口、消息类型和交互。\n*   **简单对象访问协议（SOAP）** 是一种基于 XML 技术的消息编码协议，为 Web\
  \ 服务通信定义了一个信封。\n*   消息通过传输协议进行交换。虽然**超文本传输协议（HTTP）** 是使用最广泛的传输协议，但也可以使用其他协议，如 SMTP\
  \ 或 JMS。\n*   **通用描述、发现与集成服务（UDDI）** 是一个可选的注册中心和发现机制，类似于黄页；它可用于存储和分类 SOAP Web 服务接口（WSDL）。\n\
  \n借助这些标准技术，SOAP Web 服务提供了几乎无限的潜力。客户端可以调用一个服务，该服务可以映射到任何程序，并容纳任何数据类型和结构，通过 XML 交换消息。\n\
  \nXML\n\n我已在第 12 章中描述了 XML，现在你已经知道如何操作、解析和绑定 XML 文档。由于 XML 是解决数据独立性和互操作性问题的完美集成技术，因此它是\
  \ SOAP Web 服务的 DNA。它不仅用作消息格式，还用作定义服务（WSDL）或交换服务（SOAP）的方式。与这些 XML 文档相关联的模式（XSD）用于验证消费者和提供者之间交换的数据。从历史上看，SOAP\
  \ Web 服务是从“使用 XML 的 RPC（远程过程调用）”这一基本思想演变而来的。\n\nWSDL\n\nWSDL 是定义消费者与 SOAP Web 服务之间交互的接口定义语言（IDL）（参见图\
  \ 14-2）。它对 SOAP Web 服务至关重要，因为它描述了消息类型、端口、通信协议、支持的操作、位置以及消费者应期望的返回值。它定义了服务保证遵守的契约。你可以将\
  \ WSDL 视为用 XML 编写的 Java 接口。\n\n![9781430246268_Fig14-02.jpg](img/9781430246268_Fig14-02.jpg)\n\
  \n图 14-2. 消费者与 Web 服务之间的 WSDL 接口\n\n为了确保互操作性，消费者和生产者需要有一个标准的 Web 服务接口来共享和理解消息。这就是\
  \ WSDL 的作用。清单 14-1 向你展示了一个 WSDL 示例，它代表一个信用卡验证 SOAP Web 服务（该服务接收信用卡作为输入并验证它）。这个 WSDL\
  \ 是纯 XML，如果你仔细阅读，你会看到消费者定位 Web 服务（`soap:address location`）、调用方法（`operation name=\"\
  validate\"`）以及使用适当的传输协议（`soap:binding transport`）所需的所有信息。\n\n***清单 14-1.***  表示信用卡验证服务的\
  \ WSDL 文件\n\n\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<definitions\
  \ →\n        xmlns:wsam=\" http://www.w3.org/2007/05/addressing/metadata \" →\n\
          xmlns:soap=\" http://schemas.xmlsoap.org/wsdl/soap/ \" →\n        xmlns:tns=\"\
  \ http://chapter14.javaee7.book.agoncal.org/ \" →\n        xmlns:xsd=\" http://www.w3.org/2001/XMLSchema\
  \ \" →\n        xmlns=\" http://schemas.xmlsoap.org/wsdl/ \" →\n        targetNamespace=\"\
  \ http://chapter14.javaee7.book.agoncal.org/ \" →\n        name=\"CardValidatorService\"\
  >\n  < types >\n    <xsd:schema>\n      <xsd:import namespace=\" http://chapter14.javaee7.book.agoncal.org/\
  \ \" →           schemaLocation=\" http://localhost:8080/chapter14/CardValidatorService?xsd=1\
  \ \"/>\n    </xsd:schema>\n  </types>\n  < message name=\" validate \">\n    <part\
  \ name=\"parameters\" element=\"tns:validate\"/>\n  </message>\n  < message name=\"\
  \ validateResponse \">\n    <part name=\"parameters\" element=\"tns:validateResponse\"\
  />\n  </message>\n  < portType name=\"CardValidator\">\n    <operation name=\"validate\"\
  >\n      <input message=\"tns: validate \"/>\n      <output message=\"tns: validateResponse\
  \ \"/>\n    </operation>\n  </portType>\n  < binding name=\"CardValidatorPortBinding\"\
  \ type=\"tns:CardValidator\">\n    <soap:binding transport=\" http://schemas.xmlsoap.org/\
  \ soap /http \" style=\"document\"/>\n    < operation name=\"validate\">\n      <soap:operation\
  \ soapAction=\"\"/>\n      <input>\n        <soap:body use=\"literal\"/>\n      </input>\n\
        <output>\n        <soap:body use=\"literal\"/>\n      </output>\n    </operation>\n\
    </binding>\n  < service name=\"CardValidatorService\">\n    < port name=\"CardValidatorPort\"\
  \ binding=\"tns:CardValidatorPortBinding\">\n      <soap:address location=\" http://localhost:8080/chapter14/CardValidatorService\
  \ \"/>\n    </port>\n  </service>\n</definitions>\n```\n\nWSDL 使用 XML 来描述服务的内容、如何调用其操作以及在哪里找到它。它遵循一个固定的结构，包含几个部分（`types`、`message`、`portType`、`binding`、`service`）。表\
  \ 14-1 列出了 WSDL 元素和属性的一个子集。WSDL 是一种比表 14-1 所列内容丰富得多的语言，并由 W3C 定义。如果你想了解更多关于 WSDL、其结构及其数据类型的信息，你应该查看相关的\
  \ W3C 网站。\n\n表 14-1. WSDL 元素和属性\n\n| 元素 | 描述 |\n| --- | --- |\n| `definitions` |\
  \ 是 WSDL 的根元素，它指定了在整个文档中可见的命名空间的全局声明 |\n| `types` | 定义消息中要使用的数据类型。在此示例中，它是描述传递给\
  \ Web 服务请求和响应的参数的 XML Schema 定义（`CardValidatorService?xsd=1`） |\n| `message` | 定义在\
  \ Web 服务消费者和 Web 服务本身之间传输的数据格式。这里你有请求（`validate` 方法）和响应（`validateResponse`） |\n\
  | `portType` | 指定 Web 服务的操作（`validate` 方法）。每个操作引用一个输入和输出消息 |\n| `binding` | 描述特定端口类型定义的操作和消息的具体协议（此处为\
  \ SOAP）和数据格式 |\n| `service` | 包含一组 `<port>` 元素，其中每个端口都与一个端点（网络地址位置或 URL）相关联 |\n\
  | `port` | 为绑定指定一个地址，从而定义一个单一的通信端点 |\n\n`<xsd:import namespace>` 元素引用了一个 XML Schema，该\
  \ Schema 必须在网络上对 WSDL 的消费者可用。清单 14-2 展示了这个定义了 Web 服务中使用的数据类型的 Schema：在请求（`validate`）中发送的\
  \ `CreditCard` 对象的结构（包含号码、到期日期等），以及在响应（`validateResponse`）中接收的一个 `boolean`（信用卡是否有效）。\n\
  \n***清单 14-2.***  WSDL 文件导入的 Schema\n\n```\n<xs:schema xmlns:tns=\" http://chapter14.javaee7.book.agoncal.org/\
  \ \" →\n           xmlns:xs=\" http://www.w3.org/2001/XMLSchema \" →\n          \
  \ targetNamespace=\" http://chapter14.javaee7.book.agoncal.org/ \" version=\"1.0\"\
  >\n  <xs:element name=\" validate \" type=\"tns:validate\"/>\n  <xs:element name=\"\
  \ validateResponse \" type=\"tns:validateResponse\"/>\n  <xs:complexType name=\"\
  \ validate \">\n    <xs:sequence>\n      <xs:element name=\"arg0\" type=\"tns: creditCard\
  \ \" minOccurs=\"0\"/>\n    </xs:sequence>\n  </xs:complexType>\n  <xs:complexType\
  \ name=\" creditCard \">\n    <xs:sequence/>\n    <xs:attribute name=\"number\"\
  \ type=\"xs:string\" use=\"required\"/>\n    <xs:attribute name=\"expiry_date\"\
  \ type=\"xs:string\" use=\"required\"/>\n    <xs:attribute name=\"control_number\"\
  \ type=\"xs:int\" use=\"required\"/>\n    <xs:attribute name=\"type\" type=\"xs:string\"\
  \ use=\"required\"/>\n  </xs:complexType>\n  <xs:complexType name=\" validateResponse\
  \ \">\n    <xs:sequence>\n      <xs:element name=\"return\" type=\" xs:boolean \"\
  />\n    </xs:sequence>\n  </xs:complexType>\n</xs:schema>\n```\n\n如果你还记得第 12 章中描述的\
  \ JAXB，你就会意识到清单 14-2 中的 XSD 包含了绑定到 Java 类所需的所有信息。有了 WSDL 和 Schema，任何消费者都可以生成调用 Web\
  \ 服务所需的工件（稍后你会看到，JAX-WS 附带了自动生成这些工件的实用程序）。\n\nSOAP\n\nWSDL 描述了 Web 服务的抽象接口，而 SOAP\
  \ 则提供了具体的实现，定义了消费者和提供者之间交换的 XML 消息（参见图 14-3）。SOAP 是标准的 Web 服务应用协议。它提供了连接 Web 服务的通信机制，通过网络协议（通常是\
  \ HTTP）交换格式化的 XML 数据。与 WSDL 一样，SOAP 严重依赖 XML，因为 SOAP 消息是一个包含多个元素（信封、标头、正文等）的 XML\
  \ 文档。SOAP 不是使用 HTTP 从浏览器请求网页，而是通过 HTTP 请求发送 XML 消息，并通过 HTTP 响应接收回复。\n\n![9781430246268_Fig14-03.jpg](img/9781430246268_Fig14-03.jpg)\n\
  \n图 14-3. 消费者调用 SOAP Web 服务\n\nSOAP 旨在提供一种独立、抽象的通信协议，能够连接分布式服务。连接的服务可以使用支持给定传输协议的任何硬件和软件组合来构建。\n\
  \n让我们使用图 14-3 中所示的信用卡验证示例。消费者调用 SOAP Web 服务来验证信用卡，传递所有必需的参数（信用卡号、到期日期、类型和控制号码），并接收一个\
  \ `Boolean`，告知消费者该卡是否有效。清单 14-3 和清单 14-4 分别展示了这两个 SOAP 消息的结构。\n\n***清单 14-3.***  为请求发送的\
  \ SOAP 信封\n\n```\n<soap: Envelope xmlns:soap=\" http://schemas.xmlsoap.org/soap/envelope/\
  \ \" →\n               xmlns:cc=\" http://chapter14.javaee7.book.agoncal.org/ \"\
  >\n  <soap: Header />\n  <soap: Body >\n    <cc: validate >\n      <arg0 number=\"\
  123456789011\" expiry_date=\"10/12\" control_number=\"544\" type=\"Visa\"/>\n    </cc:validate>\n\
    </soap:Body>\n</soap:Envelope>\n```\n\n***清单 14-4.***  为响应接收的 SOAP 信封\n\n```\n\
  <soap: Envelope xmlns:soap=\" http://schemas.xmlsoap.org/soap/envelope/ \" →\n              \
  \ xmlns:cc=\" http://chapter14.javaee7.book.agoncal.org/ \">\n  <soap: Body >\n\
      <cc: validateResponse >\n      <return> true </return>\n    </cc:validateResponse>\n\
    </soap:Body>\n</soap:Envelope>\n```\n\n\n\n消费者将信用卡信息封装在 SOAP 信封（清单 14-3）中，发送至信用卡验证\
  \ Web 服务的 `validate` 方法。该服务会返回另一个 SOAP 信封（清单 14-4），其中包含验证结果（true 或 false）。\n\n表\
  \ 14-2 列出了部分 SOAP 元素和属性。与 WSDL 一样，SOAP 由 W3C 标准机构定义。\n\n表 14-2. SOAP 元素和属性\n\n|\
  \ 元素 | 描述 |\n| --- | --- |\n| `Envelope` | 定义消息及文档中使用的命名空间。这是必需的根元素 |\n| `Header`\
  \ | 包含消息的可选属性或特定于应用的基础设施，例如安全信息或网络路由 |\n| `Body` | 包含应用程序之间交换的消息 |\n| `Fault` |\
  \ 提供消息处理过程中发生的错误信息。此元素为可选 |\n\nUDDI\n\n通过网络相互交互的消费者和提供者需要能够找到允许它们相互连接的信息。消费者要么知道它想要调用的服务的确切位置，要么必须找到它。UDDI\
  \ 提供了一种标准方法来定位有关 Web 服务的信息以及如何调用它。服务提供者将 WSDL 发布到互联网上可用的 UDDI 注册表中。然后，潜在的消费者可以发现并下载它。这是可选的，因为如果您已经知道\
  \ Web 服务的位置，则可以在没有 UDDI 的情况下调用 Web 服务。\n\nUDDI 是一种基于 XML 的 Web 服务注册表，类似于黄页目录，企业可以在其中注册其服务。此注册包括业务类型、地理位置、网站、电话号码等。然后，其他企业可以搜索注册表并发现有关特定\
  \ Web 服务的信息。这些信息提供了有关该服务的额外元数据，描述了其行为以及 WSDL 文档的实际位置。\n\n![image](img/sq.jpg) **注意**  UDDI\
  \ 并未像其设计者（IBM、微软和 SAP）所希望的那样被广泛采用。2006 年 1 月，这三家公司宣布关闭其公共 UDDI 注册中心。2007 年底，在 OASIS\
  \ 定义 UDDI 的小组宣布技术委员会解散。\n\n传输协议\n\n为了让消费者与 Web 服务通信，它需要一种发送消息的方式。SOAP 消息可以使用双方都支持的协议通过网络传输。鉴于\
  \ Web 服务主要用在 Web 上，它们通常使用 HTTP，但也可以使用其他网络协议，例如 HTTPS（HTTP 安全版）、TCP/IP、SMTP（简单邮件传输协议）、FTP（文件传输协议）等。\n\
  \nSOAP Web 服务规范概述\n\n如第 4 章所示，持久化主要由一个规范涵盖：JPA。对于 Web 服务，情况更为复杂，因为您必须处理来自不同标准机构的许多规范。此外，由于其他编程语言也使用\
  \ Web 服务，这些规范并非都与 Java 社区流程（JCP）直接相关。\n\nSOAP Web 服务规范简史\n\nSOAP Web 服务是企业通过网络进行通信的标准方式。在此之前已有一些先驱：最初由\
  \ Unix 系统使用的公共对象请求代理体系结构（CORBA），以及其微软竞争对手分布式组件对象模型（DCOM）。在较低层次上，有远程过程调用（RPC），而更接近我们\
  \ Java 世界的是远程方法调用（RMI）。\n\n在 Web 出现之前，很难让所有主要软件供应商就传输协议达成一致。当 HTTP 协议成为成熟标准后，它逐渐成为一种通用的商业通信媒介。大约在同一时间，当万维网联盟（W3C）宣布\
  \ XML 1.0 适合在应用程序中部署时，XML 正式成为标准。到 1998 年，HTTP 和 XML 这两个要素已准备好协同工作。\n\nSOAP 1.0\
  \ 由微软于 1998 年启动，最终于 1999 年底发布，并在 XML Schema 中对类型化引用和数组进行了建模。到 2000 年，IBM 开始研究 SOAP\
  \ 1.1，WSDL 于 2001 年提交给 W3C。UDDI 由结构化信息标准促进组织（OASIS）于 2000 年编写，旨在允许企业发布和发现 Web 服务。随着\
  \ SOAP、WSDL 和 UDDI 的到位，创建 Web 服务的事实标准已在主要 IT 公司的支持下到来。\n\nJava 于 2002 年 6 月通过基于\
  \ XML 的 RPC 1.0 的 Java API（JAX-RPC 1.0）引入了 Web 服务功能，并于 2003 年将 JAX-RPC 1.1 添加到 J2EE\
  \ 1.4 中。该规范相当冗长且不易使用。随着 Java EE 5 和 Java 中注解的出现，全新的基于 XML 的 Web 服务 2.0 的 Java API（JAX-WS\
  \ 2.0）规范被引入，作为首选的 SOAP Web 服务模型。如今，Java EE 7 附带 JAX-WS 2.2a。\n\nSOAP Web 服务相关规范\n\
  \n要掌握所有 Web 服务标准，您需要花一些时间阅读表 14-3 中列出的来自 W3C、JCP 和 OASIS 的所有规范。\n\n表 14-3. SOAP\
  \ Web 服务相关规范及标准机构\n\n![Table1-5.jpg](img/Table1-5.jpg)\n\nW3C 是一个开发和维护 Web 技术（如\
  \ HTML、XHTML、RDF、CSS 等）的联盟，并且对于 Web 服务而言，更重要的是 XML、XML Schema、SOAP 和 WSDL。\n\nOASIS\
  \ 托管了多个与 Web 服务相关的标准，例如 UDDI、WS-Addressing、WS-Security、WS-Reliability 以及许多其他标准（统称为\
  \ WS-*）。\n\n回到 Java，JCP 有一套属于 Java EE 7 和 Java SE 7 的规范。它们包括 JAX-WS 2.2a（JSR 224）、Web\
  \ Services 1.3（JSR 109）、Web Services Metadata 2.3（JSR 181）和 JAXB 2.2（JSR 222）。这些规范通常被非正式地统称为\
  \ Java Web 服务（JWS）。在 JSR 67 中定义的 SAAJ（用于 Java 的带附件的 SOAP API）是 Java SE 的一部分，使开发人员能够生成和使用带有附件的\
  \ SOAP 消息。\n\n其他相关规范曾是早期 Java EE 版本的一部分，但已被精简或现在与 Java EE 分开发展。JAX-WS 是 JAX-RPC（JSR\
  \ 101）的继承者，后者过于冗长和复杂。JAX-RPC 已在 Java EE 6 中被精简，这意味着它已从 Java EE 7 中移除。用于 XML 注册表的\
  \ Java API（JAXR）规范定义了一套标准 API，允许 Java 客户端访问 UDDI。由于 UDDI 没有达到最初预期的势头，此 JSR 93 已被精简，并未包含在\
  \ Java EE 7 中。\n\n看到这一长串规范可能会让您觉得在 Java 中编写 SOAP Web 服务很困难，尤其是在理解 API 方面。然而，其美妙之处在于您无需担心底层技术（XML、WSDL、SOAP、HTTP\
  \ 等），因为正如您将在接下来的几段中看到的，仅需几个 JWS 标准就能为您完成工作。\n\nJAX-WS 2.2a\n\n\n\nJAX-WS 2.2a 定义了一组\
  \ API（主要包列于表 14-4）和注解，使您能够使用 Java 构建和使用 Web 服务。它提供了消费者和服务设施，通过 SOAP 发送和接收 Web 服务请求，从而屏蔽了协议的复杂性。因此，消费者和服务都不需要生成或解析\
  \ SOAP 消息，因为 JAX-WS 处理了底层处理。JAX-WS 规范依赖于其他规范，例如您在第 12 章中看到的用于 XML 绑定的 Java 架构 (JAXB)。\n\
  \n表 14-4. 主要 JAX-WS 包\n\n| 包 | 描述 |\n| --- | --- |\n| `javax.xml.ws` | 此包包含核心 JAX-WS\
  \ API |\n| `javax.xml.ws.http` | 定义特定于 XML/HTTP 绑定的 API |\n| `javax.xml.ws.soap`\
  \ | 定义特定于 SOAP 1.1/HTTP 或 SOAP 1.2/HTTP 绑定的 API |\n| `javax.xml.ws.handler` | 此包定义了消息处理程序的\
  \ API |\n\nWeb Services 1.3\n\nJSR 109（“实现企业 Web 服务”）定义了 Java EE 容器中 Web 服务的编程模型和运行时行为。它还定义了打包方式，以确保\
  \ Web 服务在应用服务器实现之间的可移植性。\n\nWS-Metadata 2.3\n\nWeb 服务元数据（WS-Metadata，规范 JSR 181）提供了注解，以简化\
  \ Web 服务的定义和部署（主要包列于表 14-5）。JSR 181 的主要目标是简化 Web 服务的开发。它通过注解提供了 WSDL 和 Java 接口之间的映射功能，反之亦然。这些注解可以在简单的\
  \ Java 类或 EJB 中使用。\n\n表 14-5. 主要 WS-Metadata 包\n\n| 包 | 描述 |\n| --- | --- |\n| `javax.jws`\
  \ | 此包包含 Java 到 WSDL 的映射注解 |\n| `javax.jws.soap` | 用于指定 Web 服务到 SOAP 消息协议映射的 API\
  \ |\n\nSOAP Web 服务规范有哪些新内容？\n\n不幸的是，在 Java EE 7 中，JAX-WS 或 WS-Metadata 没有任何新内容。在此\
  \ Java EE 版本中，SOAP Web 服务规范并未更新。例如，在 Java EE 7 中，SOAP Web 服务不被视为托管 Bean，因此您不能使用拦截器、拦截器绑定、上下文注入等。Bean\
  \ 验证也未被集成，这意味着您不能使用方法级别验证（请参阅第 3 章）。\n\n参考实现\n\nMetro 是 Java Web 服务规范的开源参考实现。它由\
  \ JAX-WS 和 JAXB 组成，并且还支持传统的 JAX-RPC API。它允许您创建和部署安全、可靠、事务性、可互操作的 SOAP Web 服务以及 SOAP\
  \ Web 服务消费者。Metro 栈由 GlassFish 社区生产，但也可以在 GlassFish 之外的 Java SE 环境或其他 Web 容器（例如\
  \ Tomcat、Jetty）中使用。\n\nApache CXF（以前称为 XFire）和 Apache Axis2 也实现了 JWS 栈。除了不是参考实现之外，这两个框架也广泛用于\
  \ SOAP Web 服务。\n\n编写 SOAP Web 服务\n\n到目前为止，您已经看到了许多底层概念，例如 HTTP 协议、WSDL 文档、SOAP 消息或\
  \ XML。但是，如何使用前面介绍的所有规范来编写 SOAP Web 服务呢？您可以从 WSDL 开始，也可以直接编写一些 Java 代码。\n\n由于 WSDL\
  \ 文档是消费者和服务之间的契约，因此它可以用于为消费者和服务生成 Java 代码。这就是*自顶向下方法*，也称为*契约优先*。此方法从契约（WSDL）开始，通过定义操作、消息等。当消费者和提供者都同意契约后，您就可以基于该契约实现\
  \ Java 类。Metro 提供了一些工具（`wsimport`），可以从 WSDL 生成类。\n\n另一种方法称为*自底向上*，实现类已经存在，所需要做的就是创建\
  \ WSDL。同样，Metro 提供了实用程序（`wsgen`）来从现有类生成 WSDL。在这两种情况下，代码可能需要调整以匹配 WSDL，反之亦然。这时 JAX-WS\
  \ 就派上用场了。通过简单的开发模型和少量注解，可以调整 Java 到 WSDL 的映射。但请注意，自底向上方法可能导致非常低效的应用程序，因为 Java 方法和类与跨网络传输的消息的理想粒度无关。如果延迟高和/或带宽低，则使用更少、更大的消息是值得的，而使用契约优先方法可以更有效地做到这一点。\n\
  \n尽管有所有这些规范、概念、标准和组织，但使用自底向上方法编写和使用 Web 服务非常容易。SOAP Web 服务遵循 Java EE 7 的“易于开发”范式，并且不需要您编写任何\
  \ WSDL 或 SOAP。Web 服务只是一个带注解的 POJO，需要部署在 Web 服务容器中。清单 14-5 向您展示了一个验证信用卡的 Web 服务的代码。\n\
  \n***清单 14-5.***  CardValidator Web 服务\n\n```\n@WebService\npublic class CardValidator\
  \ {\n\npublic boolean validate (CreditCard creditCard) {\n    Character lastDigit\
  \ = creditCard.getNumber().charAt( →\n                          creditCard.getNumber().length()\
  \ - 1);\n\nif (Integer.parseInt(lastDigit.toString()) % 2 != 0) {\n      return\
  \ true;\n    } else {\n      return false;\n    }\n  }\n}\n```\n\n与实体或 EJB 一样，SOAP\
  \ Web 服务使用带注解的 POJO 模型和异常配置策略。这意味着，如果所有默认设置都适合您，Web 服务可以只是一个使用 `@javax.jws.WebService`\
  \ 注解的 Java 类。然后，JAX-WS 运行时将生成所有管道，将 Java 方法调用转换为基于 HTTP 的 XML 调用。此 `CardValidator`\
  \ SOAP Web 服务有一个用于验证信用卡的方法。它接受一个信用卡作为参数，并根据卡是否有效返回 `true` 或 `false`。在此示例中，它假设偶数的信用卡是有效的，奇数的信用卡是无效的。\n\
  \n`CreditCard` 对象（请参阅清单 14-6）在消费者和 SOAP Web 服务之间交换。在描述 Web 服务架构时，交换的数据需要是 XML 文档，因此需要一种将\
  \ Java 对象转换为 XML 文档的方法。这就是 JAXB 发挥作用的地方，它提供了简单的注解和强大的 API。如第 12 章所述，`CreditCard`\
  \ 对象必须使用 `@javax.xml.bind.annotation.XmlRootElement` 进行注解，如果需要自定义映射，还需要使用一些其他映射注解（例如\
  \ `@XmlAttribute`），然后 JAXB 将在 XML 和 Java 之间来回转换它。\n\n***清单 14-6.***  带有 JAXB 注解的\
  \ CreditCard 类\n\n```\n@XmlRootElement\npublic class CreditCard {\n\n@XmlAttribute(required\
  \ = true)\n  private String number;\n  @XmlAttribute(name = \"expiry_date\", required\
  \ = true)\n  private String expiryDate;\n  @XmlAttribute(name = \"control_number\"\
  , required = true)\n  private Integer controlNumber;\n  @XmlAttribute(required =\
  \ true)\n  private String type;\n```\n\n\n// 构造方法、getter 和 setter 方法\n}\n```\n\n\
  借助 JAXB 注解，你无需开发所有底层的 XML 解析逻辑，因为这一切都在后台自动完成。Web 服务操作的是 Java 对象，对于服务消费者来说也是如此。\n\
  \nSOAP Web 服务的结构\n\n与大多数 Java EE 7 组件类似，SOAP Web 服务遵循“配置即例外”的范式，即配置组件属于例外情况。实际上，只需一个注解\
  \ `@WebService` 就能将 POJO 转变为 SOAP Web 服务。编写 Web 服务需满足以下要求：\n\n*   类必须使用 `@javax.jws.WebService`\
  \ 注解，或在部署描述文件（`webservices.xml`）中使用等效的 XML 配置。\n*   类（即服务实现 Bean）可以实现零个或多个接口（即服务端点接口），这些接口必须使用\
  \ `@WebService` 注解。\n*   类必须定义为 public，且不能是 final 或 abstract。\n*   类必须拥有一个默认的公共构造方法。\n\
  *   类不能定义 `finalize()` 方法。\n*   若要将 SOAP Web 服务转变为 EJB 端点，类必须使用 `@javax.ejb.Stateless`\
  \ 或 `@javax.ejb.Singleton` 注解（参见第 7 章）。\n*   服务必须是无状态对象，且不应在方法调用之间保存客户端特定的状态。\n\n\
  WS-Metadata 规范（JSR 181）指出，只要满足上述要求，POJO 即可用于实现部署到 Servlet 容器的 Web 服务。这通常被称为 *Servlet\
  \ 端点*。无状态或单例会话 Bean 也可用于实现部署到 EJB 容器中的 Web 服务（即 EJB 端点）。\n\nSOAP Web 服务端点\n\nJAX-WS\
  \ 允许将普通 Java 类和 EJB 暴露为 Web 服务。我们称之为服务端点接口（SEI）。对比 POJO（代码清单 14-5）和 EJB Web 服务（代码清单\
  \ 14-7）的代码，几乎看不出差异，唯一的区别在于 EJB Web 服务多了一个 `@Stateless`（或 `@Singleton`）注解。不过，两者的打包方式可能不同，稍后你会看到。\n\
  \n***代码清单 14-7.***  作为 EJB 端点的 CardValidator Web 服务\n\n```\n@WebService\n@Stateless\n\
  public class CardValidator {\n\npublic boolean validate(CreditCard creditCard) {\n\
      Character lastDigit = creditCard.getNumber().charAt( →\n                          creditCard.getNumber().length()\
  \ - 1);\n\nif (Integer.parseInt(lastDigit.toString()) % 2 != 0) {\n      return\
  \ true;\n    } else {\n      return false;\n    }\n  }\n}\n```\n\n两种端点的行为几乎相同，但使用\
  \ EJB 端点能获得一些额外优势。由于 Web 服务同时也是 EJB，因此容器会自动管理事务和安全性，并且可以使用拦截器，而 Servlet 端点则无法实现这些功能。业务代码可以同时作为\
  \ Web 服务和 EJB 暴露，这意味着业务逻辑既可以通过 SOAP 暴露，也可以通过添加远程接口的方式通过 RMI 暴露。\n\nWSDL 映射\n\n在服务层面，系统以\
  \ XML 消息、WSDL 操作和 SOAP 消息来定义。而在 Java 层面，应用程序则以对象、接口和方法来定义。因此，需要将 Java 对象转换为 WSDL\
  \ 操作。JAXB 运行时使用注解来确定如何将类编组/反编组为 XML。类似地，JWS 使用注解将 Java 类映射到 WSDL，并确定如何将方法调用编组为 SOAP\
  \ 请求，以及将 SOAP 响应反编组为方法返回类型的实例。\n\nJAX-WS（JSR 224）和 WS-Metadata 规范（JSR 181）定义了两种不同类型的注解：\n\
  \n*   *WSDL 映射注解*：这些注解属于 `javax.jws` 包，允许你更改 WSDL/Java 映射。`@WebMethod`、`@WebResult`、`@WebParam`\
  \ 和 `@OneWay` 注解用于 Web 服务，以自定义暴露方法的签名。\n*   *SOAP 绑定注解*：这些注解属于 `javax.jws.soap`\
  \ 包，允许自定义 SOAP 绑定（`@SOAPBinding` 和 `@SOAPMessageHandler`）。\n\n与所有其他 Java EE 7 规范一样，Web\
  \ 服务注解可以被可选的 XML 部署描述文件（`webservices.xml`）覆盖。下面我们来详细了解一下 WSDL 映射注解。\n\n@WebService\n\
  \n`@javax.jws.WebService` 注解用于将 Java 类或接口标记为 Web 服务。如果直接用于类（如之前的所有示例所示），容器的注解处理器将生成接口，因此以下代码片段是等效的。以下是在类上使用注解：\n\
  \n```\n@WebService\npublic class CardValidator {...}\n```\n\n以下代码片段展示了在类实现的接口上使用注解。如你所见，实现类需要在\
  \ `endpointInterface` 属性中定义接口的完全限定名：\n\n```\n@WebService\npublic interface Validator\
  \ {...}\n\n@WebService (endpointInterface = \"org.agoncal.book.javaee7.chapter14\\\
  . Validator \")\npublic class CardValidator implements Validator {...}\n```\n\n\
  `@WebService` 注解包含一组属性（参见代码清单 14-8），允许你自定义 Web 服务在 WSDL 文件中的名称（`<wsdl:portType>`\
  \ 或 `<wsdl:service>` 元素）及其命名空间，以及更改 WSDL 本身的位置（`wsdlLocation` 属性）。\n\n***代码清单 14-8.***\
  \  @WebService API\n\n```\n@Retention(RUNTIME) @Target(TYPE)\npublic @interface\
  \ WebService {\n  String name() default \"\";\n  String targetNamespace() default\
  \ \"\";\n  String serviceName() default \"\";\n  String portName() default \"\"\
  ;\n  String wsdlLocation() default \"\";\n  String endpointInterface() default \"\
  \";\n}\n```\n\n因此，当默认的 WSDL 映射规则不适用于你的 SOAP Web 服务时，只需使用所需的属性即可。以下代码更改了端口和服务名称：\n\
  \n```\n@WebService(portName = \" CreditCardValidator \", serviceName = \" ValidatorService\
  \ \")\npublic class CardValidator {...}\n```\n\n如果与代码清单 14-1 中描述的默认 WSDL 进行比较，你会看到以下变化：\n\
  \n```\n<service name=\" ValidatorService \">\n <port name=\" CreditCardValidator\
  \ \" binding=\"tns: CreditCardValidator Binding\">\n <soap:address location=\" http://localhost:8080/chapter14/\
  \ ValidatorService \"/>\n </port>\n</service>\n```\n\n使用 `@WebService` 注解时，Web 服务的所有公共方法都会被暴露，除非使用了\
  \ `@WebMethod` 注解。\n\n@WebMethod\n\n默认情况下，SOAP Web 服务的所有公共方法都会在 WSDL 中暴露，并使用所有默认的映射规则。要自定义此映射的某些元素，可以在方法上应用\
  \ `@javax.jws.WebMethod` 注解。该注解的 API 相当简单，允许重命名方法或将其从 WSDL 中排除。代码清单 14-9 展示了 `CardValidator`\
  \ Web 服务如何重命名前两个方法并排除最后一个方法。\n\n***代码清单 14-9.***  两个方法被重命名，最后一个被排除\n\n```\n@WebService\n\
  public class CardValidator {\n\n@WebMethod(operationName = \"ValidateCreditCard\"\
  )\n  public boolean validate(CreditCard creditCard) {\n    // 业务逻辑\n  }\n\n@WebMethod(operationName\
  \ = \"ValidateCreditCardNumber\")\n  public void validate(String creditCardNumber)\
  \ {\n    // 业务逻辑\n  }\n\n@WebMethod(exclude = true)\n  public void validate(Long\
  \ creditCardNumber) {\n    // 业务逻辑\n  }\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n如清单 14-10 中描述的 WSDL 片段所示，只定义了 `ValidateCreditCard` 和 `ValidateCreditCardNumber`\
  \ 这两个方法。最后一个方法被排除在 WSDL 之外。\n\n***清单 14-10.***  包含重命名方法的 WSDL 片段\n\n```\n<message\
  \ name=\" ValidateCreditCard \">\n  <part name=\"parameters\" element=\"tns:ValidateCreditCard\"\
  />\n</message>\n<message name=\"ValidateCreditCardResponse\">\n  <part name=\"parameters\"\
  \ element=\"tns:ValidateCreditCardResponse\"/>\n</message>\n<message name=\" ValidateCreditCardNumber\
  \ \">\n  <part name=\"parameters\" element=\"tns:ValidateCreditCardNumber\"/>\n\
  </message>\n<message name=\"ValidateCreditCardNumberResponse\">\n  <part name=\"\
  parameters\" element=\"tns:ValidateCreditCardNumberResponse\"/>\n</message>\n<portType\
  \ name=\"CardValidator\">\n  <operation name=\"ValidateCreditCard\">\n    <input\
  \ message=\"tns: ValidateCreditCard \"/>\n    <output message=\"tns:ValidateCreditCardResponse\"\
  />\n  </operation>\n  <operation name=\"ValidateCreditCardNumber\">\n    <input\
  \ message=\"tns: ValidateCreditCardNumber \"/>\n    <output message=\"tns:ValidateCreditCardNumberResponse\"\
  />\n  </operation>\n</portType>\n```\n\n@WebResult\n\n`@javax.jws.WebResult` 注解用于控制\
  \ WSDL 中生成的消息返回值的名称。在清单 14-11 中，`validate()` 方法的返回结果被重命名为 `IsValid`。\n\n***清单 14-11.***\
  \  方法的返回结果被重命名\n\n```\n@WebService\npublic class CardValidator {\n\n@WebResult(name\
  \ = \"IsValid\")\n  public boolean validate(CreditCard creditCard) {\n    // 业务逻辑\n\
    }\n}\n```\n\n默认情况下，WSDL 中返回值的名称被设置为 `return`。但使用 `@WebResult` 注解，你可以更具体地指定，从而获得更具表达力的契约：\n\
  \n```\n<!-- 默认 -->\n<xs:element name=\" return \" type=\"xs:boolean\"/>\n<!-- 重命名为\
  \ IsValid -->\n<xs:element name=\" IsValid \" type=\"xs:boolean\"/>\n```\n\n该注解还有其他元素可用于自定义\
  \ WSDL，例如返回值的 XML 命名空间，其形式类似于清单 14-12 中所示的 `@WebParam` 注解。\n\n***清单 14-12.***  @WebParam\
  \ API\n\n```\n@Retention(RUNTIME) @Target(PARAMETER)\npublic @interface WebParam\
  \ {\n  String name() default \"\";\n  public enum Mode {IN, OUT, INOUT};\n  String\
  \ targetNamespace() default \"\";\n  boolean header() default false;\n  String partName()\
  \ default \"\";\n};\n```\n\n@WebParam\n\n如清单 14-12 所示的 `@javax.jws.WebParam` 注解与\
  \ `@WebResult` 类似，它用于自定义 Web 服务方法的参数。其 API 允许更改 WSDL 中参数的名称（参见清单 14-13）、命名空间和类型。有效的类型是\
  \ `IN`、`OUT` 或 `INOUT`（两者），它们决定了参数的流向（默认为 `IN`）。\n\n***清单 14-13.***  方法参数被重命名\n\n\
  ```\n@WebService\npublic class CardValidator {\n\npublic boolean validate( @WebParam\
  \ (name= \"Credit-Card\", mode = IN) CreditCard creditCard) {\n    // 业务逻辑\n  }\n\
  }\n```\n\n同样，如果你将此与清单 14-2 中定义的默认 XSD 进行比较，你会注意到，默认情况下，参数的名称是 `arg0`。`@WebParam`\
  \ 注解用名称 `Credit-Card` 覆盖了此默认值：\n\n```\n<!-- 默认 -->\n<xs:element name=\" arg0 \"\
  \ type=\"tns:creditCard\" minOccurs=\"0\"/>\n<!-- 重命名为 Credit-Card -->\n<xs:element\
  \ name=\" Credit-Card \" type=\"tns:creditCard\" minOccurs=\"0\"/>\n```\n\n@OneWay\n\
  \n`@OneWay` 注解可用于没有返回值的方法，例如返回 void 的方法。此注解没有元素，可以看作是一个标记接口，它通知容器可以优化调用，因为没有返回值（例如，使用异步调用）。\n\
  \n@SOAPBinding\n\n绑定描述了 Web 服务如何绑定到消息传递协议，特别是 SOAP 消息传递协议。WSDL 1.1 中定义了两种 SOAP 绑定的编程风格：RPC\
  \ 和文档（也称为消息传递）。这种选择对应于 SOAP 正文内容的结构方式：\n\n*   **文档**：SOAP 消息包含文档。它作为一个文档在 `<soap:Body>`\
  \ 元素中发送，没有额外的格式化规则；它包含发送方和接收方商定的任何内容。文档风格是默认选择。\n*   **RPC**：SOAP 消息包含参数和返回值。`<soap:Body>`\
  \ 包含一个元素，其名称是正在调用的方法或远程过程。该元素又包含该过程每个参数的一个元素。\n\n然后，SOAP 绑定（文档或 RPC）必须从两种不同的序列化/反序列化格式中选择：\n\
  \n*   **字面量**：根据 XML 模式对数据进行序列化。\n*   **编码**：SOAP 编码指定了对象、结构、数组和对象图应如何序列化。\n\n这为你提供了四种风格/使用模型：\n\
  \n*   文档/字面量（默认）\n*   文档/编码（不符合 WS-* 标准）\n*   RPC/字面量\n*   RPC/编码\n\n默认情况下，你到目前为止看到的生成的\
  \ WSDL 使用文档/字面量绑定风格。如清单 14-14 所示，在类上指定 `@SOAPBinding` 注解可以改变这一点。\n\n***清单 14-14.***\
  \  使用 RPC/字面量绑定的 Web 服务\n\n```\n@WebService\n@SOAPBinding (style = RPC , use = LITERAL)\n\
  public class CardValidator {\n\npublic boolean validate(CreditCard creditCard) {\n\
      // 业务逻辑\n  }\n}\n```\n\n清单 14-14 通过使用 RPC 风格而不是文档风格来覆盖默认绑定。这对 WSDL 以及为 SOAP\
  \ Web 服务提供者和消费者生成的 XML 模式都有影响。清单 14-15 展示了这些差异。\n\n***清单 14-15.***  文档风格与 RPC 风格的\
  \ WSDL 差异\n\n```\n<!-- 文档风格 -->\n<message name=\"validate\">\n  <part name=\"parameters\"\
  \ element=\"tns:validate\"/>\n</message>\n<message name=\"validateResponse\">\n\
    <part name=\"parameters\" element=\"tns:validateResponse\"/>\n</message>\n...\n\
  <soap:binding transport=\" http://schemas.xmlsoap.org/soap/http \" style=\" document\
  \ \"/>\n\n<!-- RPC 风格 -->\n<message name=\"validate\">\n  <part name=\"arg0\" type=\"\
  tns:creditCard\"/>\n</message>\n<message name=\"validateResponse\">\n  <part name=\"\
  return\" type=\"xsd:boolean\"/>\n</message>\n...\n<soap:binding transport=\" http://schemas.xmlsoap.org/soap/http\
  \ \" style=\" rpc \"/>\n```\n\n整合所有映射\n\n为了更好地理解这些注解对 SOAP Web 服务的影响，让我们将它们整合在一起，并查看不同的工件。我将使用清单\
  \ 14-5 中定义的基本 `CardValidator` Web 服务，并添加我们目前看到的大部分映射注解（参见清单 14-16）。\n\n***清单 14-16.***\
  \  带有映射注解的 CardValidator Web 服务\n\n```\n@WebService(portName = \"CreditCardValidator\"\
  , serviceName = \"ValidatorService\")\n@SOAPBinding(style = RPC, use = LITERAL)\n\
  public class CardValidator {\n\n@WebResult(name = \"IsValid\")\n  @WebMethod(operationName\
  \ = \"ValidateCreditCard\")\n  public boolean validate( @WebParam(name = \"Credit-Card\"\
  ) CreditCard creditCard) {\n    // 业务逻辑\n  }\n\n\n\n@WebResult(name = \"IsValid\"\
  )\n  @WebMethod(operationName = \"ValidateCreditCardNumber\")\n  public void validate(\
  \ @WebParam(name = \"Credit-Card-Number\") String creditCardNumber) {\n    // 业务逻辑\n\
    }\n\n@WebMethod(exclude = true)\n  public void validate(Long creditCardNumber)\
  \ {\n    // 业务逻辑\n  }\n}\n```\n\n清单 14-16 定义了一个仅暴露两个方法的 RPC/Literal Web 服务（注意，由于\
  \ `@WebMethod(exclude = true)`，方法 `validate(Long creditCardNumber)` 并未暴露）。每个方法参数和返回值都被重命名，以使\
  \ WSDL 更具表现力。清单 14-17 展示了最终的 WSDL 文档，您可以将其与清单 14-1 中的原始文档进行比较（代码中的差异以粗体突出显示）。\n\n\
  ***清单 14-17.***  定制后的 WSDL\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n\
  <definitions →\n        xmlns:soap=\" http://schemas.xmlsoap.org/wsdl/soap/ \" →\n\
          xmlns:tns=\" http://chapter14.javaee7.book.agoncal.org/ \" →\n        xmlns:xsd=\"\
  \ http://www.w3.org/2001/XMLSchema \" →\n        xmlns=\" http://schemas.xmlsoap.org/wsdl/\
  \ \" →\n        targetNamespace=\" http://chapter14.javaee7.book.agoncal.org/ \"\
  \ →\n        name =\"ValidatorService\">\n  <types>\n    <xsd:schema>\n      <xsd:import\
  \ namespace=\" http://chapter14.javaee7.book.agoncal.org/ \" →\n                  schemaLocation=\"\
  \ http://localhost:8080/chapter14/ValidatorService?xsd=1 \"/>\n    </xsd:schema>\n\
    </types>\n  <message name=\" ValidateCreditCard \">\n    <part name=\"Credit-Card\"\
  \ type=\"tns:creditCard\" />\n  </message>\n  <message name=\"ValidateCreditCardResponse\"\
  >\n    <part name=\"IsValid\" type=\"xsd:boolean\" />\n  </message>\n  <message\
  \ name=\" ValidateCreditCardNumber \">\n    <part name=\" Credit-Card-Number \"\
  \ type=\"xsd:string\"/>\n  </message>\n  <message name=\"ValidateCreditCardNumberResponse\"\
  />\n  <portType name=\" CardValidator \">\n    <operation name=\"ValidateCreditCard\"\
  >\n      <input message=\"tns:ValidateCreditCard\"/>\n      <output message=\"tns:ValidateCreditCardResponse\"\
  />\n    </operation>\n    <operation name=\"ValidateCreditCardNumber\">\n      <input\
  \ message=\"tns:ValidateCreditCardNumber\"/>\n      <output message=\"tns:ValidateCreditCardNumberResponse\"\
  />\n    </operation>\n  </portType>\n  <binding name=\" CreditCardValidatorBinding\
  \ \" type=\"tns:CardValidator\">\n    <soap:binding transport=\" http://schemas.xmlsoap.org/soap/http\
  \ \" style=\" rpc \"/>\n    <operation name=\" ValidateCreditCard \">\n      <soap:operation\
  \ soapAction=\"\"/>\n      <input>\n        <soap:body use=\"literal\"/>\n      </input>\n\
        <output>\n        <soap:body use=\"literal\"/>\n      </output>\n    </operation>\n\
      <operation name=\" ValidateCreditCardNumber \">\n      <soap:operation soapAction=\"\
  \"/>\n      <input>\n        <soap:body use=\"literal\"/>\n      </input>\n      <output>\n\
          <soap:body use=\"literal\"/>\n      </output>\n    </operation>\n  </binding>\n\
    <service name=\" ValidatorService \">\n    <port name=\" CreditCardValidator \"\
  \ binding=\"tns:CreditCardValidatorBinding\">\n      <soap:address location=\" http://localhost:8080/chapter14/ValidatorService\
  \ \"/>\n    </port>\n  </service>\n</definitions>\n```\n\n`@WebService` 注解重命名了 WSDL\
  \ 中的 `<portType name>` 和 `<port name>` 元素。`@WebMethod` 重命名了 `<operation name>` 元素，`@WebResult`\
  \ 和 `@WebParam` 重命名了 `<message>` 元素中的 `<part name>`。\n\nXML 模式也会被定制，因为请求和响应都是在 `<xs:complexType>`\
  \ 元素中定义的。与清单 14-2 中定义的 XSD 相比，您可以看到清单 14-18 中的 XSD 有很大不同。这是因为 SOAP Web 服务使用了 RPC\
  \ 风格（没有定义请求/响应文档，而是使用了 `creditCard` 和 `boolean` 类型）。\n\n***清单 14-18.***  定制后的 XML\
  \ 模式\n\n```\n<xs:schema xmlns:xs=\" http://www.w3.org/2001/XMLSchema \"\n          \
  \ targetNamespace=\" http://chapter14.javaee7.book.agoncal.org/ \" version=\"1.0\"\
  >\n  <xs:complexType name=\" creditCard \">\n    <xs:sequence/>\n    <xs:attribute\
  \ name=\"number\" type=\"xs:string\" use=\"required\"/>\n    <xs:attribute name=\"\
  expiry_date\" type=\"xs:string\" use=\"required\"/>\n    <xs:attribute name=\"control_number\"\
  \ type=\"xs:int\" use=\"required\"/>\n    <xs:attribute name=\"type\" type=\"xs:string\"\
  \ use=\"required\"/>\n  </xs:complexType>\n</xs:schema>\n```\n\nWSDL（清单 14-17）和\
  \ XSD（清单 14-18）用于定义服务消费者和提供者之间的契约。但在运行时，它们不再被使用，消费者和提供者之间只交换 SOAP 信封。清单 14-19 展示了发送给\
  \ Web 服务的 SOAP 请求。它定义了要调用的方法（`ValidateCreditCard`）以及要传递给该方法的参数（`Credit-Card`）。\n\
  \n***清单 14-19.***  定制后 ValidateCreditCard 请求的 SOAP 信封\n\n```\n<soap:Envelope xmlns:soap=\"\
  \ http://schemas.xmlsoap.org/soap/envelope/ \" →\n               xmlns:cc=\" http://chapter14.javaee7.book.agoncal.org/\
  \ \">\n  <soap:Header/>\n  <soap:Body>\n    <cc: ValidateCreditCard >\n      < Credit-Card\
  \ number=\"123456789011\" expiry_date=\"10/12\" control_number=\"544\" →\n                                                            \
  \ type=\"Visa\"/>\n    </cc:ValidateCreditCard>\n  </soap:Body>\n</soap:Envelope>\n\
  ```\n\n清单 14-20 展示了发送回消费者的 SOAP 响应。它表明请求中发送的信用卡是有效的（`<IsValid>true</IsValid>`）。\n\
  \n***清单 14-20.***  定制后 ValidateCreditCard 响应的 SOAP 信封\n\n```\n<soap:Envelope xmlns:soap=\"\
  \ http://schemas.xmlsoap.org/soap/envelope/ \"\n               xmlns:cc=\" http://chapter14.javaee7.book.agoncal.org/\
  \ \">\n  <soap:Body>\n    <cc: ValidateCreditCardResponse >\n      < IsValid >true</IsValid>\n\
      </cc:ValidateCreditCardResponse>\n  </soap:Body>\n</soap:Envelope>\n```\n\n\
  处理异常\n\n到目前为止，一切运行良好：消费者和提供者之间交换的数据有效，Web 服务不会崩溃，网络也可靠。但情况并非总是如此。在 Java 中，当出现问题时，会抛出异常，并且\
  \ JVM 中的其他类必须处理它。对于 SOAP Web 服务，这种机制无法工作，因为消费者和服务可能不是用同一种语言编写的，并且被网络分隔。因此，思路是在 SOAP\
  \ 消息中使用 SOAP 错误。JAX-WS 运行时会自动将 Java 异常转换为返回给客户端的 SOAP 错误消息。此功能省去了您编写将服务异常映射到 SOAP\
  \ 错误的代码的需要，从而节省了大量时间和精力。\n\n如果您查看清单 14-5 中定义的 `CardValidator` Web 服务的 `validate`\
  \ 方法，您会注意到如果 `CreditCard` 参数为 null，验证会因 `NullPointerException` 而崩溃。发生这种情况时，JAX-WS\
  \ 运行时会捕获服务器上的 `NullPointerException` 异常，创建一条 SOAP 错误消息（清单 14-21）并将其发送回消费者。\n\n***清单\
  \ 14-21.***  SOAP 响应中发送的 SOAP 错误\n\n```\n<soap:Envelope xmlns:soap=\" http://schemas.xmlsoap.org/soap/envelope/\
  \ \">\n  <soap:Body>\n    <soap:Fault>\n      <faultcode> soap:Server</faultcode>\n\
        <faultstring> java.lang.NullPointerException</faultstring>\n    </soap:Fault>\n\
    </soap:Body>\n</soap:Envelope>\n```\n\n\n\n如清单 14-21 所示，JAX-WS 运行时会自动将 `faultstring`\
  \ 设置为 Java 异常的全限定名。该规范还提供了一种通过 `faultcode` 元素区分错误类型的机制。在此例中，它被设置为 `soap:Server`，表示服务器应对该错误负责（`soap:Client`\
  \ 是另一种选项）。\n\n返回 SOAP 错误的另一种方式是抛出应用程序异常，如清单 14-22 所示。此处，如果信用卡号为奇数，Web 服务会抛出一个受检异常（但同样的机制也适用于非受检异常）。此应用程序异常将自动转换为适当的\
  \ `soap:Fault` 消息，封装在 SOAP 正文中，并返回给客户端。\n\n***清单 14-22.***  验证抛出异常\n\n```\n@WebService\n\
  public class CardValidator throws CardValidatorException {\n\npublic boolean validate(CreditCard\
  \ creditCard) {\n    Character lastDigit = creditCard.getNumber().charAt( →\n                          creditCard.getNumber().length()\
  \ - 1);\n\nif (Integer.parseInt(lastDigit.toString()) % 2 == 0) {\n      return\
  \ true;\n    } else {\n      throw new CardValidatorException(\"The credit card\
  \ number is invalid\");\n    }\n  }\n}\n```\n\n应用程序异常可以继承自 `Exception`、`RuntimeException`，或\
  \ SOAP Web 服务异常（如 `javax.xml.ws.WebServiceException`）及其子类（例如 `javax.xml.ws.soap.SOAPFaultException`）。这些异常还可以使用\
  \ `@WebFault` 注解，以生成更明确的 SOAP 信封，如清单 14-23 所示。\n\n***清单 14-23.***  带有 WebFault 注解的异常\n\
  \n```\n@WebFault(name = \"CardValidationFault\")\npublic class CardValidatorException\
  \ extends Exception {\n\npublic CardValidatorRTException() {\n    super();\n  }\n\
  \npublic CardValidatorRTException(String message) {\n    super(message);\n  }\n\
  }\n```\n\n当 SOAP Web 服务抛出清单 14-23 中定义的异常时，JAX-WS 运行时会生成清单 14-24 中定义的 SOAP 错误消息。\n\
  \n***清单 14-24.***  SOAP 信封中的 SOAP 错误\n\n```\n<soap:Envelope xmlns:soap=\" http://schemas.xmlsoap.org/soap/envelope/\
  \ \">\n  <soap:Body>\n    <soap:Fault>\n      <faultcode>soap:Server</faultcode>\n\
        <faultstring>org.agoncal.book.javaee7.chapter14\\. CardValidatorException\
  \ </faultstring>\n      <detail>\n        <ns2: CardValidationFault xmlns:ns2=\"\
  \ http://chapter14.javaee7.book.agoncal.org/ \">\n          <message> The credit\
  \ card number is invalid </message>\n        </ns2:CardValidationFault>\n      </detail>\n\
      </soap:Fault>\n  </soap:Body>\n</soap:Envelope>\n```\n\n但如果你希望生成更精确的 SOAP 错误消息（例如使用不同的\
  \ `faultcode`），则可以使用 `javax.xml.soap.SOAPFactory` API 来创建 `javax.xml.soap.SOAPFault`\
  \ 对象（如清单 14-25 所示）。\n\n***清单 14-25.***  验证使用 SOAPFactory 创建 SOAPFault\n\n```\n@WebService\n\
  public class CardValidator {\n\npublic boolean validate(CreditCard creditCard) {\n\
      Character lastDigit = creditCard.getNumber().charAt( →\n                          creditCard.getNumber().length()\
  \ - 1);\n\nif (Integer.parseInt(lastDigit.toString()) % 2 == 0) {\n      return\
  \ true;\n    } else {\n      SOAPFactory soapFactory = SOAPFactory.newInstance();\n\
        SOAPFault fault = soapFactory.createFault(\"The credit card number is invalid\"\
  , →new QName(\"ValidationFault\"));\n      throw new CardValidatorException(fault);\n\
      }\n  }\n}\n```\n\n清单 14-25 创建了一个包含原因文本（`\"The credit card number is invalid\"\
  `）和错误代码（`ValidationFault`）的 `SOAPFault`，这将生成清单 14-26 所示的 SOAP 信封。\n\n***清单 14-26.***\
  \  SOAP 信封中的 SOAP 错误\n\n```\n<soap:Envelope xmlns:soap=\" http://schemas.xmlsoap.org/soap/envelope/\
  \ \">\n  <soap:Body>\n    <soap:Fault>\n      <faultcode> ValidationFault </faultcode>\n\
        <faultstring> The credit card number is invalid </faultstring>\n    </soap:Fault\n\
    </soap:Body>\n</soap:Envelope>\n```\n\n生命周期与回调\n\n如图 14-4 所示，SOAP Web 服务也具有类似于受管\
  \ Bean 的生命周期。这与不持有任何状态的组件的生命周期相同：要么不存在，要么已准备好处理请求。容器管理此生命周期。\n\n![9781430246268_Fig14-04.jpg](img/9781430246268_Fig14-04.jpg)\n\
  \n图 14-4. SOAP Web 服务生命周期\n\nServlet 和 EJB 端点都支持依赖注入（因为它们运行在容器中）以及生命周期方法，例如 `@PostConstruct`\
  \ 和 `@PreDestroy`。当容器创建 Web 服务实例时，会调用 `@PostConstruct` 回调方法（如果存在）；当销毁实例时，会调用 `@PreDestroy`\
  \ 回调。Servlet 和 EJB 端点的一个区别是，EJB 可以使用拦截器（如第 2 章所述）。\n\nWebServiceContext\n\nSOAP\
  \ Web 服务拥有一个环境上下文，可以通过使用 `@Resource` 注解注入 `javax.xml.ws.WebServiceContext` 引用来访问它。在此上下文中，Web\
  \ 服务可以获取运行时信息，例如端点实现类、消息上下文以及与正在处理的请求相关的安全信息。\n\n![image](img/sq.jpg) **注意**  JAX-WS\
  \ 和 WS-Metadata 规范在 Java EE 7 中并未更新，因此即使你的应用程序使用 CDI，也不能使用 `@Inject` 注解来注入 `WebServiceContext`，你仍然需要使用\
  \ `@Resource`。\n\n清单 14-27 中的代码使用 `WebServiceContext` 来检查调用者是否具有验证信用卡的 `Admin` 角色。表\
  \ 14-6 列出了 `javax.xml.ws.WebServiceContext` 接口中定义的方法。\n\n***清单 14-27.***  使用 `WebServiceContext`\
  \ 的 SOAP Web 服务\n\n```\n@WebService\npublic class CardValidator {\n\n@Resource\n\
    private WebServiceContext context;\n\npublic boolean validate(CreditCard creditCard)\
  \ {\n\nif (! context .isUserInRole(\"Admin\"))\n      throw new SecurityException(\"\
  Only Admins can validate cards\");\n\n// Business logic\n    }\n  }\n}\n```\n\n\
  表 14-6. WebServiceContext 接口的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `getMessageContext`\
  \ | 返回调用此方法时正在处理的请求的 `MessageContext`。可用于访问 SOAP 消息头、正文等。 |\n| `getUserPrincipal`\
  \ | 返回标识当前正在处理的请求发送者的 `Principal`。 |\n| `isUserInRole` | 返回一个布尔值，指示经过身份验证的用户是否包含在指定的逻辑角色中。\
  \ |\n| `getEndpointReference` | 返回与此端点关联的 `EndpointReference`。 |\n\n部署描述符\n\n\n\n\
  与大多数 Java EE 7 技术一样，SOAP Web 服务允许你使用注解（我在所有示例中一直采用的方式）以及 XML 来定义元数据。位于 `WEB-INF`\
  \ 目录下的 `webservices.xml` 文件可以覆盖或增强这些注解。与 Java EE 7 中的大多数部署描述符类似，`webservices.xml`\
  \ 是可选的，因为注解可用于指定该部署描述符中的大部分信息。例如，清单 14-28 展示了如何为 `CardValidator` Web 服务覆盖 WSDL 端口（`OverriddenPort`）。\n\
  \n***清单 14-28.***  一个 `webservices.xml` 部署描述符\n\n```\n<webservices xmlns=\" http://java.sun.com/xml/ns/javaee\
  \ \" →\n             xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \" →\n\
               xsi:schemaLocation=\" http://java.sun.com/xml/ns/javaee →\n            \
  \ http://java.sun.com/xml/ns/javaee/javaee_web_services_1_3.xsd \" →\n            \
  \ version=\"1.3\">\n\n<webservice-description>\n    <webservice-description-name>CardValidatorWS</webservice-description-name>\n\
  \n<port-component>\n      <port-component-name>CardValidator</port-component-name>\n\
        <wsdl-port> OverriddenPort </wsdl-port>\n      <service-endpoint-interface>\n\
          org.agoncal.book.javaee7.chapter14.Validator\n      </service-endpoint-interface>\n\
        <service-impl-bean>\n        <servlet-link>CardValidatorServlet</servlet-link>\n\
        </service-impl-bean>\n    </port-component>\n  </webservice-description>\n\
  </webservices>\n```\n\n打包\n\nSOAP Web 服务可以打包在 war 或 EJB jar 文件中。打包在 war 文件中的服务可以使用\
  \ Servlet 或 EJB Lite 端点。打包在 EJB jar 文件中的 SOAP Web 服务只能使用无状态/单例会话 Bean。开发者负责打包以下内容：\n\
  \n*   服务实现 Bean 及其依赖类\n*   服务端点接口（可选）\n*   WSDL 文件，通过包含或引用方式提供（使用注解时非必需，因为 JAX-WS\
  \ 运行时可以自动生成 WSDL）\n*   SOAP 请求和响应的生成产物（可选，因为它们由 JAX-WS 运行时自动生成）\n*   可选的部署描述符\n\n\
  发布 SOAP Web 服务\n\n一旦打包成 war/jar 文件，发布 SOAP Web 服务只需将归档文件部署到 Java EE 容器（如 GlassFish\
  \ 或 JBoss）中即可。这是因为 JAX-WS 是 Java EE 7 的一部分，并且运行时已捆绑在应用服务器中。但如果你嵌入了 JAX-WS 实现（如 Metro、CXF\
  \ 或 Axis2），你也可以在 Web 容器（如 Tomcat 或 Jetty）中发布 SOAP Web 服务。\n\n但请记住，JAX-WS 也包含在 Java\
  \ SE 中，有时你并不需要 Servlet 或 EJB 容器的全部功能（例如在测试 Web 服务时）。在这种情况下，你可以使用 `javax.xml.ws.Endpoint`\
  \ API 以编程方式发布 SOAP Web 服务。`Endpoint.publish` 方法（参见清单 14-29）默认使用 Oracle JVM 中包含的轻量级\
  \ HTTP 服务器（定义在 `com.sun.net.httpserver` 包中）。\n\n***清单 14-29.***  一个自我发布并接受传入请求的\
  \ SOAP Web 服务\n\n```\n@WebService\npublic class CardValidator {\n\npublic boolean\
  \ validate(CreditCard creditCard) {\n    // 业务逻辑\n  }\n\npublic static void main(String[]\
  \ args) {\n    Endpoint.publish(\"http://localhost:8080/cardValidator\", new CardValidator());\n\
    }\n}\n```\n\n在清单 14-29 中，`publish` 方法用于发布 `CardValidator` SOAP Web 服务，此时它开始接受发送到地址\
  \ `http://localhost:8080/cardValidator` 的传入请求。然后你就可以调用 Web 服务上的方法。还有一个 `stop` 方法可用于停止接受传入请求并关闭端点（稍后在开发集成测试时你会看到）。\n\
  \n调用 SOAP Web 服务\n\n到目前为止，你已经了解了如何编写、打包和发布 SOAP Web 服务。现在让我们看看如何调用这样的服务。借助 WSDL\
  \ 和一些用于生成 Java 客户端存根（或代理）的工具，你可以轻松调用 Web 服务，而无需关心 HTTP 或 SOAP 相关的所有底层细节。调用 Web 服务类似于使用\
  \ RMI 调用分布式对象。与 RMI 一样，JAX-WS 使程序员能够使用本地方法调用来调用分布式服务。不同之处在于，在远程主机上，Web 服务可以用另一种编程语言编写（请注意，你也可以使用\
  \ RMI-IIOP 调用非 Java 代码）。WSDL 是消费者和服务之间的标准契约。Metro 提供了一个 WSDL 到 Java 的实用工具（`wsimport`），它可以根据\
  \ WSDL 生成 Java 接口和类。这些代理为你提供了 Web 服务端点（Servlet 或 EJB）的 Java 表示形式。然后，该代理使用 HTTP 将本地\
  \ Java 调用路由到远程 Web 服务。\n\n当调用此代理上的方法时（参见图 14-5），它会将方法的参数转换为 SOAP 消息（请求）并将其发送到 Web\
  \ 服务端点。为了获取结果，SOAP 响应会被转换回返回类型的实例。你不需要理解代理的内部工作方式，甚至不需要查看代码。在编译客户端消费者之前，你需要生成 SEI\
  \ 以获取代理类，从而在代码中调用它。\n\n![9781430246268_Fig14-05.jpg](img/9781430246268_Fig14-05.jpg)\n\
  \n图 14-5.  消费者通过代理调用 Web 服务\n\n当使用契约优先的方式开发 SOAP 消费者时，客户端必须获取 WSDL，生成所需的产物，调用 `CardValidator`\
  \ Web 服务来验证信用卡（validate SOAP 消息），并接收响应（validateResponse SOAP 消息）。\n\n![image](img/sq.jpg)\
  \ **注意**  `wsimport` 和 `wsgen` 工具随 JDK 1.7 以及 GlassFish 或 Metro 一起提供。`wsimport`\
  \ 以 WSDL 作为输入，生成 JAX-WS 产物，例如 SEI。`wsgen` 读取 Web 服务端点类并生成 WSDL。你可以通过 Java SE 7 安装直接访问这些工具，或者通过\
  \ GlassFish 命令行界面（CLI）、Ant 任务或 Maven 插件来访问。\n\nSOAP 消费者的结构\n\n由于 JAX-WS 在 Java SE\
  \ 中可用，SOAP Web 服务消费者可以是任何类型的 Java 代码，从在 JVM 上运行的主类到在容器（Web、EJB 或应用客户端容器）中运行的任何 Java\
  \ EE 组件。如果它在容器中运行，消费者可以通过注入或编程方式创建来获取代理实例。要注入 Web 服务，你需要使用 `@javax.xml.ws.WebServiceRef`\
  \ 注解或 CDI 生产者。\n\n以编程方式调用\n\n\n如果您的消费者在容器外部运行，则需要通过编程方式调用 SOAP Web 服务。如清单 14-30\
  \ 所示，`CardValidator` Web 服务并非直接调用。消费者使用 `new` 关键字创建 `CardValidatorService` 实例（该实例已通过\
  \ `wsimport` 从 WSDL 生成），然后获取代理类 `CardValidator`（通过 `getCardValidatorPort()` 方法）以在本地调用业务方法。代理类的\
  \ `validate()` 方法会发起本地调用，进而调用远程 Web 服务、创建 SOAP 请求、编组信用卡消息等。代理能够找到目标服务，因为默认端点 URL\
  \ 已嵌入 WSDL 文件，并随后集成到代理实现中。\n\n***清单 14-30.***  以编程方式调用 SOAP Web 服务的 Java SE 类\n\n\
  ```\npublic class WebServiceConsumer {\n\npublic static void main(String[] args)\
  \ {\n\nCreditCard creditCard = new CreditCard();\n    creditCard.setNumber(\"12341234\"\
  );\n    creditCard.setExpiryDate(\"10/12\");\n    creditCard.setType(\"VISA\");\n\
      creditCard.setControlNumber(1234);\n\nCardValidator cardValidator = new CardValidatorService().getCardValidatorPort();\n\
      cardValidator.validate(creditCard);\n  }\n}\n```\n\n尽管这段代码很直观，但幕后发生了大量魔法操作。为了使其正常工作，已从\
  \ WSDL 文件生成了多个构件。这些构件包含连接 Web 服务所在 URL、将 `CreditCard` 对象编组为 XML、通过 SOAP 请求调用 Web\
  \ 服务以及从 SOAP 响应获取结果所需的所有信息。\n\n### 使用注入调用\n\n另一方面，如果您的消费者在容器中运行，则可以使用注入来获取 SOAP\
  \ Web 服务客户端代理的引用。清单 14-31 展示了一个在应用程序客户端容器（ACC）中运行并使用 `@WebServiceRef` 注解的简单主 Java\
  \ 类。它遵循前几章中介绍的 `@Resource` 或 `@EJB` 注解模式，但针对的是 Web 服务。当此注解应用于属性（或 getter 方法）时，容器将在应用程序初始化时注入\
  \ Web 服务客户端代理的实例。\n\n***清单 14-31.***  在 ACC 中运行并使用注入的 Java SE 类\n\n```\npublic class\
  \ WebServiceConsumer {\n\n@WebServiceRef\n  private static CardValidatorService\
  \ cardValidatorService;\n\npublic static void main(String[] args) {\n\nCreditCard\
  \ creditCard = new CreditCard();\n    creditCard.setNumber(\"12341234\");\n    creditCard.setExpiryDate(\"\
  10/12\");\n    creditCard.setType(\"VISA\");\n    creditCard.setControlNumber(1234);\n\
  \nCardValidator cardValidator = cardValidatorService .getCardValidatorPort();\n\
      cardValidator.validate(creditCard);\n  }\n}\n```\n\n请注意，如果您的消费者是 EJB、Servlet\
  \ 或 JSF 支持 bean，清单 14-31 中的代码将非常相似。要使用注入，您需要在容器中运行代码，否则无法使用 `@WebServiceRef` 注解。\n\
  \n### 使用 CDI 调用\n\nJAX-WS 规范在 Java EE 7 中尚未更新，因此并未包含所有 CDI 特性。例如，您无法直接使用 `@Inject`\
  \ 注解注入 Web 服务代理的引用。但如第 2 章所述，您可以使用 CDI 生产者来生成此类引用（见清单 14-32）。\n\n***清单 14-32.***\
  \  生成 Web 服务引用的工具类\n\n```\npublic class WebServiceProducer {\n\n@Produces\n  @WebServiceRef\n\
    private CardValidatorService cardValidatorService;\n\n}\n```\n\n借助清单 14-32 中的\
  \ `WebServiceProducer` 工具类，任何 EJB 或 Servlet 现在都可以使用 `@Inject` 注入生成的 `CardValidatorService`，并调用其业务方法（清单\
  \ 14-33）。通过这种机制，您甚至可以使用 CDI 替代方案将方法调用路由到替代的 SOAP Web 服务，如第 2 章所述。\n\n***清单 14-33.***\
  \  使用 CDI 生产者注入 Web 服务引用的 EJB\n\n```\n@Stateless\npublic class EJBConsumerWithCDI\
  \ {\n\n@Inject\n  private CardValidatorService cardValidatorService;\n\npublic boolean\
  \ validate(CreditCard creditCard) {\n\nCardValidator cardValidator = cardValidatorService\
  \ .getCardValidatorPort();\n    return cardValidator.validate(creditCard);\n  }\n\
  }\n```\n\n### 综合运用\n\n现在，让我们将所有概念整合起来：编写一个消费者、一个 SOAP Web 服务，对其进行测试，部署到 GlassFish\
  \ 并调用它。我们将使用 JAXB 和 JAX-WS 注解，并通过 `wsimport` Maven 目标生成服务端点接口。编写 Web 服务需要几个步骤。我将通过重新审视\
  \ `CardValidator` Web 服务来演示这些步骤。\n\n`CardValidator` SOAP Web 服务用于检查信用卡是否有效。它有一个方法，该方法接受\
  \ `CreditCard` 对象作为参数，应用某种算法，如果卡有效则返回 `true`，否则返回 `false`。此业务逻辑将进行单元测试，也会进行集成测试（使用嵌入式\
  \ HTTP 服务器）。一旦此 Web 服务在 GlassFish 上测试并部署完毕，将使用 `wsimport` 为消费者生成所有必要的构件。然后，消费者即可调用\
  \ Web 服务来验证信用卡。\n\n如图 14-6 所示，您将使用两个 Maven 项目：一个用于将 Web 服务打包为 war 文件（`chapter14-service-1.0.war`），另一个用于将消费者打包为\
  \ jar 文件（`chapter14-consumer-1.0.jar`）。这些归档文件中既包含您编写的代码，也包含消费者端（由 `wsimport` 生成）和服务端（由\
  \ JAX-WS 运行时生成）的生成代码。\n\n![9781430246268_Fig14-06.jpg](img/9781430246268_Fig14-06.jpg)\n\
  \n图 14-6. 综合运用\n\n### 编写 CreditCard 类\n\n清单 14-34 中所示的 `CreditCard` 类是一个 POJO，用作\
  \ Web 服务 `validate()` 方法的参数。SOAP Web 服务交换的是 XML 消息，而非 Java 对象。`CreditCard` 类使用了多个\
  \ JAXB 注解（例如 `@XmlRootElement`），使其能够被编组为 XML，从而可以在 SOAP 请求中发送。`CreditCard` 对象包含一些基本必需属性，例如信用卡号、到期日期（格式为\
  \ MM/YY）、信用卡类型（Visa、MasterCard、American Express 等）以及安全码。\n\n***清单 14-34.***  带有\
  \ JAXB 注解的 CreditCard 类\n\n```\n@XmlRootElement\n@XmlAccessorType(XmlAccessType.FIELD)\n\
  public class CreditCard {\n\n@XmlAttribute(required = true)\n  private String number;\n\
    @XmlAttribute(name = \"expiry_date\", required = true)\n  private String expiryDate;\n\
    @XmlAttribute(name = \"control_number\", required = true)\n  private Integer controlNumber;\n\
    @XmlAttribute(required = true)\n  private String type;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n### 编写 CardValidator SOAP Web 服务\n\n\n\n`CardValidator`（参见清单 14-36）实现了\
  \ `Validator` 接口（参见清单 14-35），并且两者都使用了 JAX-WS 的 `@WebService` 注解进行标注。`CardValidator`\
  \ 只是一个 POJO，因此它被视为 Servlet 端点，而不是 EJB 端点（因为它没有 `@Stateless` 或 `@Singleton` 注解）。它有一个\
  \ `validate()` 方法，该方法接受一个 `CreditCard` 对象作为参数。检查信用卡是否有效的算法基于卡号：偶数有效，奇数无效。该方法返回一个\
  \ `boolean` 值。该类及其接口都将被打包到 war 文件（`chapter14-service-1.0.war`）中。\n\n***清单 14-35.***\
  \  Validator Web 服务接口\n\n```\n@WebService\npublic interface Validator {\n\npublic\
  \ boolean validate(CreditCard creditCard);\n}\n```\n\n***清单 14-36.***  CardValidator\
  \ Web 服务 Bean\n\n```\n@WebService(endpointInterface = \"org.agoncal.book.javaee7.chapter14.Validator\"\
  )\npublic class CardValidator implements Validator {\n\npublic boolean validate(CreditCard\
  \ creditCard) {\n\nCharacter lastDigit = creditCard.getNumber().charAt( →\n                          creditCard.getNumber().length()\
  \ - 1);\n\nif (Integer.parseInt(lastDigit.toString()) % 2 == 0) {\n      return\
  \ true;\n    } else {\n      return false;\n    }\n  }\n}\n```\n\n为简单起见，没有使用额外的\
  \ Java 到 WSDL 映射，因此没有 `@WebMethod`、`@WebResult` 或 `@WebParam` 注解，这可以让您看到使用所有默认映射规则编写\
  \ Web 服务是多么容易。\n\n编写 CardValidatorTest 单元测试\n\n如果您只单独测试业务逻辑（即不使用注入、安全等容器服务），那么对\
  \ SOAP Web 服务进行单元测试可能非常简单。对 `CardValidator` POJO 进行单元测试意味着测试信用卡验证算法。如清单 14-37 所示，测试用例创建了一个\
  \ `CardValidator` POJO 实例、一个卡号为偶数的 `CreditCard`，验证它，并检查该卡是否有效。然后，它将卡号更改为奇数，再次验证该卡，并检查其是否无效。\n\
  \n***清单 14-37.***  CardValidatorTest 单元测试\n\n```\npublic class CardValidatorTest\
  \ {\n\n@Test\n  public void shouldCheckCreditCardValidity() {\n\nCardValidator cardValidator\
  \ = new CardValidator();\n\nCreditCard creditCard = new CreditCard(\"12341234\"\
  , \"10/10\", 1234, \"VISA\");\n    assertTrue(\"信用卡应该有效\", cardValidator.validate(creditCard)\
  \ );\n\ncreditCard.setNumber(\"12341233\");\n    assertFalse(\"信用卡应该无效\", cardValidator.validate(creditCard)\
  \ );\n  }\n}\n```\n\n但是，如果您的 SOAP Web 服务需要注入，该怎么办？如果您回顾清单 14-27 中的代码，您会注意到容器注入了\
  \ `WebServiceContext`，以便 Bean 可以检查用户是否属于 `Admin` 角色。没有容器，`WebServiceContext` 将为\
  \ null，测试将失败。要解决此问题，您可以模拟容器的服务（例如，模拟 `WebServiceContext` 注入），或者在集成模式下（即在容器内部）测试您的\
  \ SOAP Web 服务。\n\n编写 CardValidatorIT 集成测试\n\n对 SOAP Web 服务进行集成测试意味着将其部署到 Web 服务器、访问其\
  \ WSDL、拥有完整的容器服务等。这曾经是一项繁琐的任务，因为您必须启动运行时容器、打包应用程序、部署并测试它。但从 Java SE 6 开始，借助 `javax.xml.ws.Endpoint`\
  \ API，您现在可以使用嵌入式 Web 服务器。\n\n清单 14-38 展示了一个 JUnit 测试类，它将我们的 `CardValidator` SOAP\
  \ Web 服务发布到给定的 URL（`http://localhost:8080/cardValidator`）。一旦发布（`endpoint.isPublished()`），它就可以访问在\
  \ URL `http://localhost:8080/cardValidator?wsdl` 处生成的 WSDL，并使用它来创建一个 `Service`（`Service.create(wsdlDocumentLocation,\
  \ serviceQN)`）。`service.getPort` 方法返回 SOAP Web 服务的客户端代理，您可以在其上调用方法（`cardValidator.validate(creditCard)`）。在完成测试之前，您需要取消部署\
  \ Web 服务（`endpoint.stop()`）。\n\n***清单 14-38.***  CardValidatorIT 集成测试\n\n```\npublic\
  \ class CardValidatorIT {\n\n@Test\n  public void shouldCheckCreditCardValidity()\
  \ throws MalformedURLException {\n\n// 发布 SOAP Web 服务\n    Endpoint endpoint = Endpoint.publish\
  \ (\" http://localhost:8080/cardValidator \", →\n                                          new\
  \ CardValidator());\n    assertTrue( endpoint.isPublished() );\n    assertEquals(\"\
  \ http://schemas.xmlsoap.org/wsdl/soap/http \", →\n                  endpoint.getBinding().getBindingID());\n\
  \n// 访问 Web 服务所需的属性\n    URL wsdlDocumentLocation = new URL(\" http://localhost:8080/cardValidator?wsdl\
  \ \");\n    String namespaceURI = \" http://chapter14.javaee7.book.agoncal.org/\
  \ \";\n    String servicePart = \"CardValidatorService\";\n    String portName =\
  \ \"CardValidatorPort\";\n    QName serviceQN = new QName(namespaceURI, servicePart);\n\
      QName portQN = new QName(namespaceURI, portName);\n\n// 创建一个服务实例\n    Service\
  \ service = Service.create(wsdlDocumentLocation, serviceQN);\n    Validator cardValidator\
  \ = service.getPort(portQN, Validator.class);\n\n// 调用 Web 服务\n    CreditCard creditCard\
  \ = new CreditCard(\"12341234\", \"10/10\", 1234, \"VISA\");\n    assertTrue(\"\
  信用卡应该有效\", cardValidator.validate(creditCard) );\n\ncreditCard.setNumber(\"12341233\"\
  );\n    assertFalse(\"信用卡应该无效\", cardValidator.validate(creditCard) );\n\n// 取消发布\
  \ SOAP Web 服务\n    endpoint.stop();\n    assertFalse(endpoint.isPublished());\n\
    }\n}\n```\n\n现在，CardValidator SOAP Web 服务已经开发并测试完毕，我们可以将其打包并部署到 GlassFish。\n\n\
  使用 Maven 编译、测试和打包\n\n`CardValidator` Web 服务（接口见清单 14-35，实现见清单 14-36）需要被编译、测试并打包成一个\
  \ war 文件（`<packaging> war </packaging>`）。`pom.xml` 文件（参见清单 14-39）声明了 `glassfish-embedded-all`\
  \ 依赖项，这是一种便捷的方式，可以访问所有 Java EE 7 规范，包括 JAX-WS 和 Web 服务元数据。实际上，`glassfish-embedded-all`\
  \ 在一个单独的 JAR 中包含了完整的 GlassFish 4.0 实现，对于编译和嵌入式使用非常有用。在 `maven-compiler-plugin` 中将版本设置为\
  \ 1.7，明确指定您要使用 Java SE 7（`<source> 1.7 </source>`）。\n\n***清单 14-39.***  用于编译、测试和打包\
  \ Web 服务的 pom.xml 文件\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project\
  \ xmlns=\" http://maven.apache.org/POM/4.0.0 \" →\n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance\
  \ \" →\n         xsi:schemaLocation=\" http://maven.apache.org/POM/4.0.0 →\n        \
  \ http://maven.apache.org/xsd/maven-4.0.0.xsd \">\n  <modelVersion>4.0.0</modelVersion>\n\
  \n<parent>\n    <artifactId>chapter14</artifactId>\n    <groupId>org.agoncal.book.javaee7</groupId>\n\
      <version>1.0</version>\n  </parent>\n\n<groupId>org.agoncal.book.javaee7.chapter14</groupId>\n\
    <artifactId>chapter14-service</artifactId>\n  <version>1.0</version>\n  <packaging>war</packaging>\n\
  \n\n\n<dependencies>\n    <dependency>\n      <groupId>org.glassfish.main.extras</groupId>\n\
        <artifactId> glassfish-embedded-all </artifactId>\n      <version>4.0</version>\n\
        <scope>provided</scope>\n    </dependency>\n\n<dependency>\n      <groupId>junit</groupId>\n\
        <artifactId>junit</artifactId>\n      <version>4.11</version>\n      <scope>test</scope>\n\
      </dependency>\n  </dependencies>\n\n<build>\n    <plugins>\n      <plugin>\n\
          <groupId>org.apache.maven.plugins</groupId>\n        <artifactId>maven-compiler-plugin</artifactId>\n\
          <version>2.5.1</version>\n        <configuration>\n          <source> 1.7\
  \ </source>\n          <target>1.7</target>\n        </configuration>\n      </plugin>\n\
        <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n        <artifactId>maven-war-plugin</artifactId>\n\
          <version>2.2</version>\n        <configuration>\n          <failOnMissingWebXml>false</failOnMissingWebXml>\n\
          </configuration>\n      </plugin>\n      <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n\
          <artifactId> maven-failsafe-plugin </artifactId>\n        <version>2.12.4</version>\n\
          <executions>\n          <execution>\n            <id>integration-test</id>\n\
              <goals>\n              <goal> integration-test </goal>\n              <goal>verify</goal>\n\
              </goals>\n          </execution>\n        </executions>\n      </plugin>\n\
      </plugins>\n  </build>\n</project>\n```\n\n在 Java EE 7 中，部署描述符是可选的；因此，你不需要 `web.xml`\
  \ 或 `webservices.xml` 文件。然而，由于 Maven 默认仍要求你在 war 包中添加 `web.xml` 文件，你需要将 `maven-war-plugin`\
  \ 的 `failOnMissingWebXml` 属性设置为 `false`；否则，Maven 构建将会失败。\n\n要编译并打包该 Web 服务，请在包含\
  \ `pom.xml` 文件的根目录中打开命令行，并输入以下 Maven 命令：\n\n```\n$ mvn package\n```\n\n进入 `target`\
  \ 目录，你应该会看到一个名为 `chapter14-service-1.0.war` 的文件。如果你打开它，会看到 `Validator.class`、`CardValidator.class`\
  \ 和 `CreditCard.class` 位于 `WEB-INF\\classes` 目录下。该 war 文件不包含任何其他内容，甚至没有 WSDL 文件（该文件将由\
  \ JAX-WS 运行时生成）。\n\n你可以通过输入以下 Maven 命令，使用 Maven Surefire 和 Failsafe 插件来执行单元测试（列表\
  \ 14-37）和集成测试（列表 14-38）：\n\n```\n$ mvn integration-test\n```\n\n现在，`CardValidator`\
  \ SOAP Web 服务已经开发并测试完毕，我们可以将其部署到 GlassFish 上。\n\n在 GlassFish 上部署\n\n一旦 Web 服务被打包到\
  \ war 文件中，就需要将其部署到 GlassFish。这可以通过 `asadmin` 命令行来完成。打开控制台，进入项目存放 `chapter14-service-1.0.war`\
  \ 文件的 `target` 目录，确保 GlassFish 正在运行，然后输入以下命令：\n\n```\n$ asadmin deploy chapter14-service-1.0.war\n\
  Application deployed with name chapter14-service-1.0.\nCommand deploy executed successfully.\n\
  ```\n\n如果部署成功，以下命令应返回已部署组件的名称及其类型：\n\n```\n$ asadmin list-components\nchapter14-service-1.0\
  \ < webservices , web>\n```\n\n有趣的是，GlassFish 会将 Web 模块（war 文件可能包含网页、Servlet 等）识别为\
  \ Web 服务。如果你进入 图 14-7 所示的 GlassFish 管理控制台（`http://localhost:4848/`），你会看到 `chapter14-service-1.0`\
  \ 已部署在“应用程序”菜单下。\n\n![9781430246268_Fig14-07.jpg](img/9781430246268_Fig14-07.jpg)\n\
  \n图 14-7. 在 GlassFish 管理控制台中部署的 Web 服务\n\n在此页面上，如果你点击 WSDL 链接，它将在浏览器中打开以下 URL，并显示\
  \ `CardValidator` SOAP Web 服务生成的 WSDL（参见 图 14-8）：\n\n```\nhttp://localhost:8080/chapter14-service-1.0/CardValidatorService?wsdl\n\
  ```\n\n![9781430246268_Fig14-08.jpg](img/9781430246268_Fig14-08.jpg)\n\n图 14-8.\
  \ WSDL 已由 Metro 生成\n\n值得注意的是，你并没有创建这个 WSDL，也没有将其部署在 war 文件中。Metro 栈会根据 Web 服务中包含的注解（以及\
  \ 图 14-6 中显示的 `Validate` SOAP 请求和 `ValidateResponse` SOAP 响应）自动生成 WSDL。我们将使用这个 WSDL\
  \ 来生成客户端代理，以便消费者可以远程访问该 Web 服务。\n\n编写 WebServiceConsumer 类\n\nWeb 服务现已部署，GlassFish\
  \ 已启动并运行，并且你知道 WSDL 生成到了哪个 URL。借助这个 WSDL，消费者将能够使用 `wsimport` 工具生成调用 Web 服务所需的工件。首先，让我们编写消费者代码，如\
  \ 列表 14-40 所示。\n\n***列表 14-40.***  WebServiceConsumer 类使用注入调用 Web 服务\n\n```\npublic\
  \ class WebServiceConsumer {\n\n@WebServiceRef\n  private static CardValidatorService\
  \ cardValidatorService;\n\npublic static void main(String[] args) {\n\nCreditCard\
  \ creditCard = new CreditCard();\n    creditCard.setNumber(\"12341234\");\n    creditCard.setExpiryDate(\"\
  10/12\");\n    creditCard.setType(\"VISA\");\n    creditCard.setControlNumber(1234);\n\
  \nCardValidator cardValidator = cardValidatorService .getCardValidatorPort();\n\n\
  System.out.println(cardValidator.validate(creditCard));\n  }\n}\n```\n\n这个 `WebServiceConsumer`\
  \ 类创建了一个 `CreditCard` 对象的实例，设置了一些数据，注入了对 Web 服务的引用，调用了 `validate()` 方法，并显示了结果（根据信用卡是否有效返回\
  \ `true` 或 `false`）。有趣的是，消费者并不拥有这些类中的任何一个。`CardValidatorService`、`CardValidator`\
  \ 和 `CreditCard` 对消费者来说是完全未知的。在生成所有这些类之前，这段代码将无法编译。\n\n生成消费者的工件并使用 Maven 打包\n\n\
  在编译 `WebServiceConsumer` 类之前，你需要使用 `wsimport` 工具生成工件。好消息是，Maven 有一个带有 `wsimport`\
  \ 目标的 JAX-WS 插件，并且该目标会在 `generate-sources` 生命周期阶段自动执行。如 附录 A 所述，Maven 使用丰富的生命周期来构建应用程序。`generate-sources`\
  \ 阶段用于生成代码，并在编译之前执行。唯一需要做的是告诉这个 `wsimport` 目标在哪里可以找到 WSDL 文档。你已经掌握了这些信息，因为你已经将 Web\
  \ 服务部署到了 GlassFish，并且已经显示了 WSDL 的内容。它的位置是：\n\n```\nhttp://localhost:8080/chapter14-service-1.0/CardValidatorService?wsdl\n\
