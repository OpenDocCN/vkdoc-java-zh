    <tr>\n    <td class=\"row\">Description :</td>\n    <td><textarea cols=\"20\"\
  \ rows=\"5\"></textarea></td>\n  </tr>\n  <tr>\n    <td class=\"row\">Number of\
  \ pages :</td>\n    <td><input type=\"text\"/></td>\n  </tr>\n  <tr>\n    <td class=\"\
