  编写 Main 类\n\n通常，Java EE 应用程序由充当 EJB 客户端的 Web 应用程序组成，如第 10 章所述，其中 JSF 后台 bean 会调用\
  \ EJB。现在，我们使用一个普通的 Java 类。\n\n`Main` 类（见清单 8-18）使用 JNDI 获取 `InitialContext`，以便查找\
  \ `BookEJBRemote` 接口（使用可移植的 JNDI 名称）。请记住，此 `Main` 类在 EJB 容器外部执行，因此无法进行注入。`main()`\
  \ 方法首先查找 EJB 的远程接口，显示数据库中的所有书籍，创建 `Book` 对象的新实例，并使用 EJB 的 `createBook()` 方法持久化该实体。然后，它更改书籍标题的值，更新书籍，最后删除它。由于此\
  \ `Main` 类的代码没有持久化上下文，因此 `Book` 实体被视为一个分离对象，由另一个 Java 类像普通 Java 类一样操作，不涉及 JPA。EJB\
  \ 才是持有持久化上下文并使用实体管理器访问数据库的那个。\n\n***清单 8-18.***  调用 `BookEJBRemote` 的 `Main` 类\n\
  \n```\npublic class Main {\n\npublic static void main(String[] args) throws NamingException\
  \ {\n\n// 查找 EJB\n    Context ctx = new InitialContext();\n    BookEJBRemote bookEJB\
  \ = (BookEJBRemote) ctx .lookup(\"java:global/ →\n           chapter08-service-1.0/BookEJB!org.agoncal.book.javaee7.chapter08.BookEJBRemote\"\
  );\n\n// 获取并显示数据库中的所有书籍\n    List<Book> books = bookEJB.findBooks() ;\n    for (Book\
  \ aBook : books) {\n      System.out.println(aBook);\n    }\n\n// 创建书籍实例\n    Book\
  \ book = new Book(\"H2G2\", 12.5F, \"Scifi book\", \"1-24561-799-0\", 354, false);\n\
  \nbook = bookEJB.createBook(book) ;\n    System.out.println(\"Book created : \"\
  \ + book);\n\nbook.setTitle(\"H2G2\");\n    book = bookEJB.updateBook(book) ;\n\
      System.out.println(\"Book updated : \" + book);\n\nbookEJB. deleteBook(book)\
  \ ;\n    System.out.println(\"Book deleted\");\n  }\n}\n```\n\n借助 Maven Exec 插件，只需输入以下命令，Maven\
  \ 就会执行 `Main` 类（清单 8-18）。然后，您应该会在提示符中看到所有日志输出。\n\n```\n$ mvn exec:java\n```\n\n\
  总结\n\n在本章中，您了解到无状态和单例会话 bean 共享相同的生命周期，而有状态 bean 的生命周期略有不同。这是因为有状态 bean 会与客户端保持会话状态，并且需要临时将其状态序列化到永久存储中（钝化）。回调注解允许您在事件发生之前或之后向\
  \ bean 添加业务逻辑（`@PostConstruct`、`@PreDestroy` 等）。\n\n自 EJB 3.1 以来，定时器服务得到了增强，现在可以与其他调度工具有效竞争。它源于\
  \ cron，但增加了更多的表现力，因此您可以编写复杂但可读的调度表达式，无论是声明式还是编程式。\n\n在安全性方面，您必须牢记业务层不负责用户身份验证；它负责授权角色访问方法。声明式安全通过相对少量的注解实现，并允许您覆盖企业应用程序可能需要的绝大多数情况。同样，您也可以切换到编程式安全并操作\
  \ JAAS API。\n\n第 9 章\n\n![image](img/frontdot.jpg)\n\n事务\n\n事务管理对企业来说是一个重要问题。它使应用程序能够拥有一致的数据，并以可靠的方式处理这些数据。事务管理是一个底层问题，业务开发人员不应自行编码。EJB\
  \ 以非常简单的方式提供这些服务：要么使用高级抽象以编程方式实现，要么使用元数据以声明式实现。自 Java EE 7 起，托管 Bean 也可以以相同方式使用声明式事务。\n\
  \n企业应用程序的大部分工作都涉及管理数据：存储数据（通常在数据库中）、检索数据、处理数据等。这通常由多个试图访问相同数据的应用程序同时完成。数据库具有底层机制来保护并发访问，例如悲观锁，并使用事务来确保数据保持一致状态。EJB\
  \ 利用了这些机制。\n\n我将本章的第一部分用于整体理解事务管理。然后，我讨论 EJB 支持的两种不同的事务划分类型：CMT 和 BMT。最后，我将介绍可由托管\
  \ Bean 使用的新事务拦截器。\n\n理解事务\n\n数据对业务至关重要，无论您执行何种操作以及同时访问数据的应用程序数量有多少，数据都必须准确。*事务*用于确保数据保持一致状态。它代表一组逻辑操作，这些操作必须作为一个单一单元执行，也称为*工作单元*。这些操作可能涉及在一个或多个数据库中持久化数据、向\
  \ MOM（*消息中间件*）发送消息或调用 Web 服务。企业每天在银行和电子商务应用程序或与合作伙伴的业务交互中都依赖事务。\n\n这些不可分割的业务操作在相对较短的时间内顺序或并行执行。每个操作都必须成功，事务才能成功（我们说事务已提交）。如果其中一个操作失败，则事务也会失败（事务回滚）。事务必须保证一定程度的可靠性和健壮性，并遵循\
  \ ACID 属性。\n\nACID\n\nACID 指的是定义可靠事务的四个属性：原子性、一致性、隔离性和持久性（如表 9-1 所述）。为了解释这些属性，我将以银行转账的经典示例为例：您需要从储蓄账户中扣款，以存入您的活期账户。\n\
  \n表 9-1. ACID 属性\n\n| 属性 | 描述 |\n| --- | --- |\n| 原子性 | 一个事务由一个或多个分组在工作单元中的操作组成。事务结束时，要么所有这些操作都成功执行（提交），要么如果发生意外或不可恢复的情况，则这些操作都不执行（回滚）。\
  \ |\n| 一致性 | 事务结束时，数据保持一致状态。 |\n| 隔离性 | 事务的中间状态对外部应用程序不可见。 |\n| 持久性 | 一旦事务提交，对数据所做的更改对其他应用程序可见。\
  \ |\n\n\n\n当你将资金从一个账户转移到另一个账户时，可以想象一系列数据库访问操作：使用一条 SQL 更新语句从储蓄账户扣款，使用另一条更新语句向活期账户入账，并在另一个表中创建一条日志来记录这笔转账。这些操作必须在同一个工作单元中完成（*原子性*），因为你不想发生扣款成功但入账失败的情况。从外部应用程序查询账户的角度来看，只有当两个操作都成功执行后，它们才是可见的（*隔离性*）。有了隔离性，外部应用程序无法看到其中一个账户已扣款而另一个账户尚未入账的中间状态（如果能看到，它会认为用户拥有的资金比实际少）。*一致性*是指事务操作（无论是提交还是回滚）都在数据库的约束条件（如主键、关系或字段）内执行。一旦转账完成，数据就可以被其他应用程序访问（*持久性*）。\n\
  \n读取条件\n\n事务隔离性可以通过不同的读取条件（脏读、可重复读和幻读）来定义。它们描述了当两个或多个事务同时操作同一数据时可能发生的情况。根据你设置的隔离级别，可以完全避免或允许并发访问。\n\
  \n*   *脏读*：当一个事务读取了前一个事务未提交的更改时发生。\n*   *可重复读*：当在同一个事务中再次读取数据时，保证读取到的数据与之前相同。\n\
  *   *幻读*：当新添加到数据库的记录能被在插入之前启动的事务检测到时发生。查询将包含其他事务在其事务启动后添加的记录。\n\n事务隔离级别\n\n数据库使用几种不同的锁定技术来控制事务如何并发访问数据。锁定机制会影响前面描述的读取条件。隔离级别在数据库中常用于描述如何对事务内的数据应用锁定。四种隔离级别分别是：\n\
  \n*   *读未提交*（限制最少的隔离级别）：事务可以读取未提交的数据。可能发生脏读、不可重复读和幻读。\n*   *读已提交*：事务不能读取未提交的数据。防止了脏读，但无法防止不可重复读或幻读。\n\
  *   *可重复读*：事务不能更改正在被另一个事务读取的数据。防止了脏读和不可重复读，但可能发生幻读。\n*   *可串行化*（限制最严格的隔离级别）：事务拥有独占读取权限。其他事务既不能读取也不能写入相同的数据。\n\
  \n一般来说，随着隔离级别变得更加严格，系统的性能会下降，因为事务被阻止访问相同的数据。然而，隔离级别强制保证了数据一致性。请注意，并非所有 RDBMS（关系型数据库管理系统）都实现了这四种隔离级别。\n\
  \nJTA 本地事务\n\n要使事务正常工作并遵循 ACID 属性，需要多个组件协同工作。首先，让我们看一个最简单的例子：一个应用程序对单个资源（例如，一个数据库）执行多项更改。当只有一个事务性资源时，所需要的只是一个本地\
  \ JTA 事务。资源本地事务是你使用特定单个资源自身的特定 API 与该资源建立的事务。图 9-1 展示了应用程序通过事务管理器和资源管理器与资源进行交互。\n\
  \n![9781430246268_Fig09-01.jpg](img/9781430246268_Fig09-01.jpg)\n\n图 9-1. 涉及一个资源的事务\n\
  \n图 9-1 中所示的组件将大部分事务特定的处理从应用程序中抽象出来。\n\n*   *事务管理器*是负责管理事务操作的核心组件。它代表应用程序创建事务，通知资源管理器它正在参与一个事务（此操作称为*登记*），并在资源管理器上执行提交或回滚。\n\
  *   *资源管理器*负责管理资源并将其注册到事务管理器。资源管理器的例子包括关系型数据库的驱动程序、JMS 资源或 Java 连接器。\n*   *资源*是用于读取或写入的持久化存储（数据库、消息目的地等）。\n\
  \n维护 ACID 属性并非应用程序的责任。应用程序只需决定提交或回滚事务，而事务管理器会准备好所有资源以确保成功完成。\n\n分布式事务与 XA\n\n正如你刚才所见，使用单个资源的事务（如图\
  \ 9-1 所示）被称为 JTA 本地事务。然而，许多企业应用程序会使用多个资源。回到资金转账的例子，储蓄账户和活期账户可能位于不同的数据库中。这时，你就需要跨多个资源或分布在网络上的资源进行事务管理。这种企业级事务需要涉及\
  \ XA 和 Java 事务服务（JTS）的特殊协调。\n\n图 9-2 展示了一个跨多个资源使用事务划分的应用程序。这意味着，在同一个工作单元中，应用程序可以（例如）在数据库中持久化数据并发送一条\
  \ JMS 消息。\n\n![9781430246268_Fig09-02.jpg](img/9781430246268_Fig09-02.jpg)\n\n图\
  \ 9-2. 涉及两个资源的 XA 事务\n\n为了在多个资源之间实现可靠的事务，事务管理器需要使用 XA（扩展架构）资源管理器接口。XA 是由开放组织（`www.opengroup.org`）为分布式事务处理（DTP）制定的标准，它维护了\
  \ ACID 属性。JTA 支持 XA，并允许来自不同供应商的异构资源管理器通过一个通用接口进行互操作。XA 使用两阶段提交（2pc）来确保所有资源同时提交或回滚任何特定事务。\n\
  \n在我们的资金转账示例中，假设储蓄账户在第一个数据库中被扣款，并且事务成功提交。然后活期账户在第二个数据库中被入账，但事务失败了。我们就必须回到第一个数据库并撤销已提交的更改。为了避免这种数据不一致的问题，两阶段提交在最终提交之前执行了一个额外的准备步骤，如图\
  \ 9-3 所示。在第一阶段，每个资源管理器都会通过一个“准备”命令被通知即将发出提交指令。这使得资源管理器能够声明它们是否可以应用其更改。如果它们都表示已准备好，则允许事务继续进行，并在第二阶段要求所有资源管理器提交。\n\
  \n![9781430246268_Fig09-03.jpg](img/9781430246268_Fig09-03.jpg)\n\n图 9-3. 两阶段提交\n\
  \n\n\n大多数情况下，资源分布在网络中（参见图 9-4）。此类系统依赖于 JTS。JTS 实现了对象管理组织（OMG）的对象事务服务（OTS）规范，允许事务管理器通过\
  \ Internet Inter-ORB 协议（IIOP）参与分布式事务。与只有一个事务管理器的图 9-2 相比，图 9-4 允许使用 IIOP 传播分布式事务。这使得事务可以分布在不同计算机以及不同供应商的不同数据库上。JTS\
  \ 面向提供事务系统基础设施的供应商。作为 EJB 开发者，你无需担心这一点；只需使用 JTA 即可，JTA 在更高层级与 JTS 交互。\n\n![9781430246268_Fig09-04.jpg](img/9781430246268_Fig09-04.jpg)\n\
  \n图 9-4. 一个分布式 XA 事务\n\n事务规范概述\n\n在 Java EE 7 中，EJB 和托管 Bean 通过 JSR 907 指定的 Java\
  \ 事务 API（JTA）来处理事务。JTA 定义了一组接口，供应用程序或容器划定事务边界，同时还定义了与事务管理器交互的 API。`javax.transaction`\
  \ 包定义了这些接口。\n\nJTS 是用于构建事务管理器的规范，它在高层支持 JTA 接口，在低层支持 CORBA 对象事务服务 1.1 规范的标准 Java\
  \ 映射。JTS 使用 CORBA 标准 IIOP 协议提供事务互操作性，用于服务器之间的事务传播。JTS 面向为企业中间件提供事务系统基础设施的供应商。\n\n\
  关于事务管理，你不太可能想在 Java 中直接使用原始的 JTS/JTA API。相反，你将事务委托给包含事务管理器（内部使用 JTS 和 JTA）的 EJB\
  \ 容器。\n\nJTA 简史\n\nJTA 是 Java EE 中用于管理事务的通用 API。它允许你以资源中立的方式启动、提交和回滚事务。如果多个资源参与此类事务，JTA\
  \ 还允许你执行 XA 事务。\n\nJTA 1.0 于 1999 年推出，经过一些维护版本后，于 2002 年达到 1.1 版本。它保持了十年不变，最终随 Java\
  \ EE 7 更新为 JTA 1.2。\n\nJTA 1.2 的新特性\n\n从历史上看，在 Java EE 中，事务被委托给 EJB，因此开发者无需在代码中直接使用\
  \ JTA API。JTA（JSR 907）和 EJB（JSR 345）自 1999 年以来就已存在。EJB 规范不断发展，但 JTA 没有，它已经是一个相当成熟和稳定的规范。随着\
  \ Java EE 7 中托管 Bean 的整合，最大的挑战之一是将事务引入托管 Bean，而不仅仅是 EJB。为了实现这一点，需要更新 JTA 规范。JTA\
  \ 1.2 为独立于 EJB 的容器管理事务提供了支持，并为 CDI Bean 作用域提供了 `@TransactionScope` 注解。\n\nJTA API\
  \ 由分组在两个包中的类和接口组成，如表 9-2 所述。\n\n表 9-2. 主要 JTA 包\n\n| 包 | 描述 |\n| --- | --- |\n|\
  \ `javax.transaction` | 包含核心 JTA API |\n| `javax.transaction.xa` | 用于实现分布式 XA 事务的接口和类\
  \ |\n\n参考实现\n\nJTA 的参考实现是 GlassFish 事务管理器。它是 GlassFish 的一个模块，但无法在服务器外部使用。还有其他开源或商业的独立\
  \ JTA 实现可用，例如 JBoss 事务管理器、Atomikos 和 Bitronix JTA。\n\nEJB 中的事务支持\n\n当你使用 EJB 开发业务逻辑时，无需担心事务管理器或资源管理器的内部结构，因为\
  \ JTA 抽象了大部分底层复杂性。使用 EJB，你可以非常轻松地开发事务性应用程序，将底层事务协议（例如两阶段提交或事务上下文传播）的实现留给容器。EJB 容器是一个事务管理器，它支持\
  \ JTA 以及 JTS，以便参与涉及其他 EJB 容器和/或其他事务资源的分布式事务。在典型的 Java EE 应用程序中，会话 Bean 建立事务边界，调用实体与数据库交互，或在事务上下文中发送\
  \ JMS 消息。\n\n从其诞生之初，EJB 模型就被设计用于管理事务。事实上，事务对 EJB 来说是自然而然的，默认情况下每个方法都会自动包装在一个事务中。这种默认行为称为容器管理事务（CMT），因为事务由\
  \ EJB 容器管理（也称为声明式事务划分）。你也可以选择使用 Bean 管理事务（BMT）自行管理事务，这也称为*编程式事务划分*。事务划分决定了事务的起始和结束位置。\n\
  \n容器管理事务\n\n当以声明方式管理事务时，你将划分策略委托给容器。你无需在代码中显式使用 JTA（即使底层使用了 JTA）；你可以让容器根据元数据自动开始和提交事务来划定事务边界。EJB\
  \ 容器为会话 Bean 和 MDB（有关 MDB 的更多信息，请参见第 13 章）提供事务管理服务。在具有容器管理事务的企业 Bean 中，EJB 容器设置事务的边界。\n\
  \n在第 7 章中，你看到了几个会话 Bean、注解和接口的示例，但从未涉及任何特定于事务的内容。清单 9-1 展示了使用 CMT 的无状态会话 Bean 的代码。如你所见，没有添加额外的注解，也没有实现任何特殊接口。EJB\
  \ 本质上是事务性的。通过异常配置，所有事务管理默认值都会被应用（`REQUIRED` 是默认的事务属性，稍后将在本节中解释）。\n\n***清单 9-1.***\
  \  一个使用 CMT 的无状态 Bean\n\n```\n@Stateless\npublic class ItemEJB {\n\n@PersistenceContext(unitName\
  \ = \"chapter09PU\")\n  private EntityManager em ;\n  @Inject\n  private InventoryEJB\
  \ inventory ;\n\npublic List<Book> findBooks() {\n    TypedQuery<Book> query = em\
  \ .createNamedQuery(FIND_ALL, Book.class);\n    return query.getResultList();\n\
  \  }\n\npublic Book createBook(Book book) {\n    em.persist(book);\n    inventory.addItem(book);\n\
  \    return book;\n  }\n}\n```\n\n你可能会问，是什么让清单 9-1 中的代码具有事务性？答案是容器。图 9-5 展示了客户端调用\
  \ `createBook()` 方法时发生的情况。客户端调用被容器拦截，容器在调用方法之前立即检查是否有事务上下文与该调用关联。默认情况下，如果没有可用的事务上下文，容器会在进入方法之前开始一个新事务，然后调用\
  \ `createBook()` 方法。一旦方法退出，容器会自动提交事务或回滚事务（如果抛出了特定类型的异常，稍后将在“异常与事务”部分中看到）。\n\n![9781430246268_Fig09-05.jpg](img/9781430246268_Fig09-05.jpg)\n\
  \n图 9-5. 容器处理事务\n\n\n\n默认行为是，`3:createBook()` 所使用的任何事务上下文（来自客户端或由容器创建）都会被应用于 `4:addItem()`。只有当两个方法都成功返回后，才会执行最终的提交。此行为可以通过元数据（注解或\
  \ XML 部署描述符）进行更改。根据您选择的事务属性（`REQUIRED`、`REQUIRES_NEW`、`SUPPORTS`、`MANDATORY`、`NOT_SUPPORTED`\
  \ 或 `NEVER`），您可以影响容器划分事务的方式：在客户端调用事务性方法时，容器会使用客户端的事务、在新事务中运行该方法、在无事务状态下运行该方法，或者抛出异常。表\
  \ 9-3 定义了这些事务属性。\n\n表 9-3. CMT 属性\n\n| 属性 | 描述 |\n| --- | --- |\n| `REQUIRED` |\
  \ 此属性（默认值）意味着方法必须始终在事务内被调用。如果从非事务性客户端调用该方法，容器会创建一个新事务。如果客户端拥有事务上下文，则业务方法会在客户端的事务内运行。如果您进行的调用需要在事务中进行管理，但无法假定客户端是从事务上下文中调用该方法的，则应使用\
  \ `REQUIRED`。 |\n| `REQUIRES_NEW` | 无论客户端是否在事务内执行，容器总是在执行方法之前创建一个新事务。如果客户端正在事务内运行，容器会暂时挂起该事务，创建第二个事务，提交或回滚它，然后恢复第一个事务。这意味着第二个事务的成功或失败不会影响现有的客户端事务。当您不希望回滚影响客户端时，应使用\
  \ `REQUIRES_NEW`。 |\n| `SUPPORTS` | EJB 方法继承客户端的事务上下文。如果存在事务上下文，则该方法会使用它；如果没有，则容器在无事务上下文的情况下调用该方法。当您对数据库表进行只读访问时，应使用\
  \ `SUPPORTS`。 |\n| `MANDATORY` | 容器要求在调用业务方法之前存在一个事务，但不应创建新事务。如果客户端拥有事务上下文，则会传播该上下文；如果没有，则会抛出\
  \ `javax.ejb.EJBTransactionRequiredException`。 |\n| `NOT_SUPPORTED` | EJB 方法不能在事务上下文中被调用。如果客户端没有事务上下文，则什么也不会发生；如果有，容器会挂起客户端的事务，调用该方法，然后在方法返回时恢复该事务。\
  \ |\n| `NEVER` | EJB 方法绝不能从事务性客户端调用。如果客户端在事务上下文中运行，容器会抛出 `javax.ejb.EJBException`。\
  \ |\n\n图 9-6 展示了 EJB 根据客户端事务上下文是否存在而可能具有的所有行为。例如，如果 `createBook()` 方法没有事务上下文（图的上半部分），并调用带有\
  \ `MANDATORY` 属性的 `addItem()`，则会抛出异常。图 9-6 的下半部分展示了相同的组合，但客户端拥有事务上下文。\n\n![9781430246268_Fig09-06.jpg](img/9781430246268_Fig09-06.jpg)\n\
  \n图 9-6. 使用不同事务策略对 InventoryEJB 进行的两次调用\n\n要将这六种划分属性之一应用于您的会话 Bean，您必须使用 `@javax.ejb.TransactionAttribute`\
  \ 注解或部署描述符（在 `ejb-jar.xml` 中设置 `<trans-attribute>` 元素）。这些元数据可以应用于单个方法或整个 Bean。如果在\
  \ Bean 级别应用，所有业务方法都将继承该 Bean 的事务属性值。清单 9-2 展示了 `ItemEJB` 如何使用 `SUPPORT` 事务划分策略，并使用\
  \ `REQUIRED` 覆盖了 `createBook()` 方法。\n\n***清单 9-2.***  一个使用 CMT 的无状态 Bean\n\n```\n\
  @Stateless\n@TransactionAttribute(TransactionAttributeType.SUPPORTS)\npublic class\
  \ ItemEJB {\n\n@PersistenceContext(unitName = \"chapter09PU\")\n  private EntityManager\
  \ em;\n  @Inject\n  private InventoryEJB inventory;\n\npublic List<Book> findBooks()\
  \ {\n    TypedQuery<Book> query = em.createNamedQuery(FIND_ALL, Book.class);\n \
  \   return query.getResultList();\n  }\n\n@TransactionAttribute(TransactionAttributeType.REQUIRED)\n\
  \  public Book createBook(Book book) {\n    em.persist(book);\n    inventory.addItem(book);\n\
  \    return book;\n  }\n}\n```\n\n![image](img/sq.jpg) **注意**  客户端事务上下文不会随异步方法调用（`@Asynchronous`）传播。如第\
  \ 13 章所述，MDB 仅支持 `REQUIRED` 和 `NOT_SUPPORTED` 属性。\n\n标记 CMT 进行回滚\n\n您已经看到，EJB 容器会自动划分事务，并代表您调用\
  \ begin、commit 和 rollback 操作。但是，作为开发人员，如果遇到某些错误或业务条件，您可能希望阻止事务被提交。需要强调的是，不允许 CMT\
  \ Bean 显式回滚事务。相反，您需要使用 EJB 上下文（请参阅第 7 章中的“会话上下文”部分）来通知容器进行回滚。\n\n如清单 9-3 所示，`InventoryEJB`\
  \ 有一个 `oneItemSold()` 方法，该方法通过持久化管理器访问数据库，并发送一条 JMS 消息通知运输公司某个商品已售出并需要配送。如果库存水平为零（意味着没有更多商品可用），该方法需要显式回滚事务。为此，无状态\
  \ Bean 首先需要通过依赖注入获取 `SessionContext`，然后调用其 `setRollbackOnly()` 方法。调用此方法不会立即回滚事务；相反，它会设置一个标志，让容器在事务结束时执行实际回滚。只有使用\
  \ CMT 划分的会话 Bean 才能使用此方法（BMT 会话 Bean 直接回滚事务，如“Bean 管理的事务”部分所示）。\n\n***清单 9-3.***  一个无状态\
  \ Bean CMT 标记事务进行回滚\n\n```\n@Stateless\npublic class InventoryEJB {\n\n@PersistenceContext(unitName\
  \ = \"chapter09PU\")\n  private EntityManager em;\n  @Resource\n  private SessionContext\
  \ ctx ;\n\npublic void oneItemSold(Item item) {\n    item.decreaseAvailableStock();\n\
  \    sendShippingMessage();\n\nif (inventoryLevel(item) == 0)\n      ctx.setRollbackOnly();\n\
  \  }\n}\n```\n\n类似地，Bean 可以调用 `SessionContext.getRollbackOnly()` 方法，该方法返回一个 `boolean`\
  \ 值，用于确定当前事务是否已被标记为回滚。\n\n另一种以编程方式通知容器进行回滚的方法是抛出特定类型的异常。\n\n异常与事务\n\n\n\nJava 中的异常处理自该语言诞生以来就一直令人困惑（因为它同时涉及受检异常和非受检异常）。在\
  \ EJB 中关联事务和异常也相当复杂。在深入探讨之前，我只想说，在业务方法中抛出异常并不总会标记事务进行回滚。这取决于异常的类型或定义异常的元数据。事实上，EJB\
  \ 3.2 规范概述了两种类型的异常。\n\n*   *应用程序异常*：与 EJB 处理的业务逻辑相关的异常。例如，如果向方法传递了无效参数、库存水平过低或信用卡号无效，则可能引发应用程序异常。抛出应用程序异常不会自动导致标记事务进行回滚。正如本节稍后的表\
  \ 9-4 中详述的那样，当抛出受检异常（继承自 `java.lang.Exception`）时，容器不会回滚，但对于非受检异常（继承自 `RuntimeException`）则会回滚。\n\
  *   *系统异常*：由系统级故障引起的异常，例如 JNDI 错误、JVM 错误、无法获取数据库连接等。系统异常必须是 `RuntimeException` 或\
  \ `java.rmi.RemoteException`（因此也是 `javax.ejb.EJBException` 的子类）的子类。抛出系统异常会导致标记事务进行回滚。\n\
  \n有了这个定义，我们现在知道，如果容器检测到系统异常，例如 `ArithmeticException`、`ClassCastException`、`IllegalArgumentException`\
  \ 或 `NullPointerException`，它将回滚事务。应用程序异常则取决于各种因素。例如，让我们更改清单 9-3 中的代码，并使用如清单 9-4\
  \ 所示的应用程序异常。\n\n***清单 9-4.***  一个抛出应用程序异常的无状态 Bean\n\n```\n@Stateless\npublic class\
  \ InventoryEJB {\n\n@PersistenceContext(unitName = \"chapter09PU\")\n  private EntityManager\
  \ em;\n\npublic void oneItemSold(Item item) throws InventoryLevelTooLowException{\n\
  \    item.decreaseAvailableStock();\n    sendShippingMessage();\n\nif (inventoryLevel(item)\
  \ == 0)\n      throw new InventoryLevelTooLowException();\n  }\n}\n```\n\n`InventoryLevelTooLowException`\
  \ 是一个应用程序异常，因为它与 `oneItemSold()` 方法的业务逻辑相关。因此，是否要回滚事务是一个业务关注点。应用程序异常是继承自受检或非受检异常，并使用\
  \ `@javax.ejb.ApplicationException`（或部署描述符中的等效 XML）进行注解的异常。此注解有一个 `rollback` 元素，可以设置为\
  \ `true` 以显式回滚事务。清单 9-5 展示了 `InventoryLevelTooLowException` 作为一个带注解的受检异常。\n\n***清单\
  \ 9-5.***  一个带有 rollback = true 的应用程序异常\n\n```\n@ApplicationException(rollback =\
  \ true)\npublic class InventoryLevelTooLowException extends Exception {\n\npublic\
  \ InventoryLevelTooLowException() { }\n\npublic InventoryLevelTooLowException(String\
  \ message) {\n    super(message);\n  }\n}\n```\n\n如果清单 9-4 中的 `InventoryEJB` 抛出了清单\
  \ 9-5 中定义的异常，它将标记事务进行回滚，并且容器将在事务结束时执行实际回滚。这是因为 `InventoryLevelTooLowException` 使用了\
  \ `@ApplicationException(rollback = true)` 进行注解。表 9-4 显示了应用程序异常的所有可能组合。该表的第一行可以解释为：“如果应用程序异常继承自\
  \ `Exception` 并且没有 `@ApplicationException` 注解，则抛出它不会标记事务进行回滚。”\n\n表 9-4. 应用程序异常的组合\n\
  \n| 继承自 | @ApplicationException | 事务被标记为回滚 |\n| --- | --- | --- |\n| `Exception`\
  \ | 无注解 | 否 |\n| `Exception` | `rollback = true` | 是 |\n| `Exception` | `rollback\
  \ = false` | 否 |\n| `RuntimeException` | 无注解 | 是 |\n| `RuntimeException` | `rollback\
  \ = true` | 是 |\n| `RuntimeException` | `rollback = false` | 否 |\n\nBean 管理的事务\n\
  \n使用 CMT 时，您只需指定事务属性并使用会话上下文或异常来标记事务进行回滚，即可让容器进行事务划分。在某些情况下，声明式 CMT 可能无法提供您所需的划分粒度（例如，一个方法不能生成多个事务）。为了解决这个问题，EJB\
  \ 提供了一种使用 BMT 以编程方式管理事务划分的方法。BMT 允许您使用 JTA 显式管理事务边界（开始、提交、回滚）。\n\n要关闭默认的 CMT 划分并切换到\
  \ BMT 模式，Bean 只需使用 `@javax.ejb.TransactionManagement` 注解（或 `ejb-jar.xml` 文件中的等效\
  \ XML），如下所示：\n\n```\n@Stateless\n@TransactionManagement(TransactionManagementType.BEAN)\n\
  public class ItemEJB {...}\n```\n\n使用 BMT 划分时，应用程序请求事务，EJB 容器创建物理事务并处理一些底层细节。此外，它不会将事务从一个\
  \ BMT 传播到另一个 BMT。\n\n用于执行 BMT 的主要接口是 `javax.transaction.UserTransaction`。它允许 Bean\
  \ 划分事务、获取其状态、设置超时等。`UserTransaction` 由 EJB 容器实例化，并通过依赖注入、JNDI 查找或 `SessionContext`（使用\
  \ `SessionContext.getUserTransaction()` 方法）提供。表 9-5 描述了该 API。\n\n表 9-5. javax.transaction.UserTransaction\
  \ 接口的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `begin` | 开始一个新事务并将其与当前线程关联 |\n| `commit`\
  \ | 提交附加到当前线程的事务 |\n| `rollback` | 回滚附加到当前线程的事务 |\n| `setRollbackOnly` | 标记当前事务为回滚\
  \ |\n| `getStatus` | 获取当前事务的状态 |\n| `setTransactionTimeout` | 修改当前事务的超时时间 |\n\n\
  清单 9-6 展示了如何开发一个 BMT Bean。首先，我们通过 `@Resource` 注解使用注入获取 `UserTransaction` 的引用。`oneItemSold()`\
  \ 方法开始事务，执行一些业务处理，然后根据某些业务逻辑提交或回滚事务。还要注意，事务在 `catch` 块中被标记为回滚（为了更好的可读性，我简化了异常处理）。\n\
  \n***清单 9-6.***  一个使用 BMT 的无状态 Bean\n\n```\n@Stateless\n@TransactionManagement(TransactionManagementType.BEAN)\n\
  public class InventoryEJB {\n\n\n\n@PersistenceContext(unitName = \"chapter09PU\"\
  )\n  private EntityManager em;\n  @Resource\n  private UserTransaction ut;\n\npublic\
  \ void oneItemSold(Item item) {\n    try {\n      ut.begin();\n\nitem.decreaseAvailableStock();\n\
  \      sendShippingMessage();\n\nif (inventoryLevel(item) == 0)\n        ut.rollback();\n\
  \      else\n        ut.commit();\n\n} catch (Exception e) {\n      ut.rollback();\n\
  \    }\n    sendInventoryAlert();\n  }\n}\n```\n\n与清单 9-3 中展示的 CMT 代码不同之处在于，使用 CMT\
  \ 时，容器会在方法执行前启动事务，并在方法执行后立即提交。而使用清单 9-6 中展示的 BMT 代码，你需要在方法内部手动定义事务边界。\n\n托管 Bean\
  \ 中的事务支持\n\n正如你刚刚所见，CMT 是 EJB 最初易用性特性之一。通过对企业 Bean 类或方法使用声明式事务，容器可以创建新事务（`REQUIRED`、`REQUIRES_NEW`）、继承现有事务（`SUPPORTS`），或者在事务尚未创建时抛出异常（`MANDATORY`）。这是因为容器会拦截相应的方法调用，并插入必要的操作来启动、挂起或完成\
  \ JTA 事务。\n\n作为在整个平台上更好地统一托管 Bean 的一部分，Java EE 7 的改进之一是将 CMT 扩展到 EJB 之外。这得益于拦截器和拦截器绑定（参见第\
  \ 2 章）。托管 Bean 上的事务管理已使用 CDI 拦截器绑定实现，如清单 9-7 所定义。\n\n***清单 9-7.***  `@javax.transaction.Transactional`\
  \ 拦截器绑定\n\n```\n@Inherited\n@InterceptorBinding\n@Target({TYPE, METHOD})\n@Retention(RUNTIME)\n\
  public @interface Transactional {\n\nTxType value() default TxType.REQUIRED ;\n\
  \  Class[] rollbackOn () default {};\n  Class[] dontRollbackOn () default {};\n\n\
  public enum TxType {\n    REQUIRED,\n    REQUIRES_NEW,\n    MANDATORY,\n    SUPPORTS,\n\
  \    NOT_SUPPORTED,\n    NEVER\n  }\n}\n```\n\n`javax.transaction.Transactional`\
  \ 注解（清单 9-7）为应用程序提供了以声明方式控制 CDI 托管 Bean 以及 Servlet、JAX-RS 和 JAX-WS 端点事务边界的能力。这提供了\
  \ CDI 中 EJB 事务属性的语义，而无需依赖其他 EJB 服务，如 RMI 或定时器服务。\n\n例如，清单 9-8 展示了一个 JAX-RS Web 服务（更多内容见第\
  \ 15 章），它使用 `@Transactional` 注解，以便能够使用 `EntityManager` 将书籍持久化到数据库。这段代码在 Java EE\
  \ 7 之前是无法实现的。你必须要么用 `@Stateless` 注解 RESTful Web 服务，要么将持久化操作委托给会话 Bean 层。\n\n***清单\
  \ 9-8.***  一个使用事务创建书籍的 Book RESTful Web 服务\n\n```\n@Path(\"book\")\n@ Transactional\n\
  public class BookRestService {\n\n@Context\n  private UriInfo uriInfo;\n  @PersistenceContext(unitName\
  \ = \"chapter09PU\")\n  private EntityManager em ;\n\n@POST\n  @Consumes(MediaType.APPLICATION_XML)\n\
  \  public Response createBook(Book book) {\n    em.persist (book);\n    URI bookUri\
  \ = uriInfo.getAbsolutePathBuilder().path(book.getId().toString()).build();\n  \
  \  return Response.created(bookUri).build();\n  }\n\n@GET\n  @Produces(MediaType.APPLICATION_XML)\n\
  \  @ Transactional(Transactional.TxType.SUPPORTS)\n  public Books getAllBooks()\
  \ {\n    TypedQuery<Book> query = em.createNamedQuery(Book.FIND_ALL, Book.class);\n\
  \    Books books = new Books(query.getResultList());\n    return books;\n  }\n}\n\
  ```\n\n与 EJB 类似，你也可以仅通过使用注解属性来更改默认的事务策略（例如 `SUPPORTS`）。如清单 9-8 所示，`@Transactional`\
  \ 注解可以放在类上和/或方法上。\n\n异常与事务\n\n在托管 Bean 中，异常和事务的处理与 EJB 略有不同。与 EJB 一样，它们使用相同的默认异常处理方式：应用程序异常（即受检异常）不会导致事务拦截器将事务标记为回滚，而系统异常（即非受检异常）则会。但此默认行为可以在\
  \ `@Transactional` 注解中使用 `rollbackOn` 和 `dontRollbackOn` 属性进行覆盖。当你为这两个属性中的任何一个指定一个类时，指定的行为也适用于该类的子类。如果你同时指定了两个属性，则\
  \ `dontRollbackOn` 优先。\n\n要覆盖默认行为，使所有应用程序异常都将事务标记为回滚，你需要编写以下代码：\n\n```\n@Transactional(rollbackOn={Exception.class})\n\
  ```\n\n另一方面，如果你想防止在捕获到 `IllegalStateException`（非受检异常）或其任何子类时，拦截器将事务标记为回滚，你可以按如下方式使用\
  \ `dontRollbackOn`：\n\n```\n@Transactional(dontRollbackOn={IllegalStateException.class})\n\
  ```\n\n你可以同时使用这两个属性来细化事务行为。每个属性接受一个类数组，可以按如下方式使用：\n\n```\n@Transactional(rollbackOn={SQLException.class},\n\
  \           dontRollbackOn={SQLWarning.class, ArrayIndexOutOfBoundsException.class})\n\
  ```\n\n![image](img/sq.jpg) **注意**  没有关于 EJB 应用程序异常（即使用 `@ApplicationException`\
  \ 注解的异常）的特殊内置知识。就拦截器而言，除非使用 `rollbackOn` 和 `dontRollbackOn` 属性另有指定，否则这些异常将与其他任何异常一样被处理。\n\
  \n总结\n\n在本章中，我向你展示了如何在 EJB 和托管 Bean 中处理事务。你可以通过声明式或编程式的方式来定义事务管理。\n\n事务允许业务层在多个应用程序并发访问时仍能保持数据的准确状态。它们遵循\
  \ ACID 属性，并且可以分布在多个资源（数据库、JMS 目的地、Web 服务等）上。CMT 允许你轻松地自定义 EJB 容器在事务划分方面的行为。你可以通过\
  \ EJB 上下文或异常将事务标记为回滚来影响此行为。如果你需要更精细地控制事务划分，始终可以使用 BMT 直接使用 JTA。Java EE 7 的一个新特性是，借助\
  \ CDI 拦截器绑定，将这些概念引入到其他组件中，例如 Servlet 或 Web 服务。\n\n第 10 章\n\n![image](img/frontdot.jpg)\n\
  \nJavaServer Faces\n\n如果你想以图形方式显示来自后端的信息，就必须创建用户界面。用户界面可以有多种类型：桌面应用程序、在浏览器中运行的 Web\
  \ 应用程序，或在便携式设备上运行、显示图形界面并与最终用户交互的移动应用程序。\n\n\n\n如今我们生活在一个依赖互联网的世界。随着事务处理后端处理数千个请求，并通过\
  \ Web 服务与异构系统通信，我们需要一个表示层来与最终用户交互，最好是一个能在浏览器中运行的表示层。浏览器无处不在，用户界面比以往更丰富、更动态、更易用。富互联网应用越来越受欢迎，因为用户对浏览体验的期望越来越高。他们需要在线查阅书籍和\
  \ CD 目录，但也希望访问电子邮件和文档、接收邮件通知，或者在服务器事件发生时，浏览器页面的部分内容能选择性刷新。再加上 Web 2.0 的理念——人们可以与朋友群分享任何信息并相互互动——结果就是\
  \ Web 界面的开发变得越来越复杂。JavaServer Faces（JSF，或简称 Faces）就是为了简化图形界面的创建而诞生的。\n\n受 Swing\
  \ 组件模型和其他 GUI（图形用户界面）框架的启发，JSF 允许开发者从组件、事件、支持 bean 及其交互的角度思考，而不是请求、响应和标记语言。其目标是通过在快速应用开发（RAD）方法中支持用户界面组件（如文本框、列表框、选项卡面板和数据网格），使\
  \ Web 开发更快、更容易。\n\n本章将介绍网页及其一些基本概念，如 HTML、CSS 和 JavaScript。然后重点介绍如何使用 JSF 组件创建 Web\
  \ 界面，或如何构建自己的自定义组件。\n\n理解网页\n\n当我们创建 Web 应用程序时，我们关心的是显示可在浏览器中读取的动态内容：来自目录的项目列表（例如\
  \ CD 和书籍）、给定标识符的客户详细信息、包含客户想要购买的商品的购物车，等等。相反，静态内容，例如图书公司的地址和关于如何购买或发货的常见问题解答（FAQ），很少或从不更改。静态内容也可以是构成页面的图像、视频或艺术作品。\n\
  \n创建页面的最终目标是将其显示在浏览器中。页面必须使用浏览器能够理解的语言，其中有几种：HTML、XHTML、CSS 和 JavaScript。\n\nHTML\n\
  \n超文本标记语言（HTML）是网页的主要语言。它基于标准通用标记语言（SGML），这是一种用于定义标记语言的标准元语言。HTML 使用*标记*或*标签*将文本结构化为段落、列表、链接、按钮、文本区域等。\n\
  \nHTML 页面是浏览器用来呈现文本和图形的文本文档。这些文档是文本文件，通常具有 `.html` 或 `.htm` 扩展名。网页由内容、用于更改内容某些方面的标签以及外部对象（如图像、视频、JavaScript\
  \ 或 CSS 文件）组成。代码清单 10-1 展示了如何在 HTML 中显示用于创建新书籍的表单。\n\n***代码清单 10-1.***  结构无效的 newBook.html\
  \ 页面\n\n```\n<H1>Create a new book</h1>\n<hr>\n<TABLE border=0 >\n  <TR>\n    <TD>ISBN\
  \ :</TD>\n    <TD><input type=text/></td>\n  </tr>\n  <tr>\n    <td>Title :</td>\n\
      <TD><input type=text/></td>\n  </tr>\n  <tr>\n    <td>Price :\n    <TD><input\
  \ type=text/>\n  </tr>\n  <tr>\n    <td>Description :\n    <td><textarea name=textarea\
  \ cols=20 rows=5></textarea>\n  </tr>\n  <TR>\n    <TD>Number of pages :\n    <td><input\
  \ type=text/>\n  </tr>\n  <tr>\n    <td>Illustrations :\n    <td><input type=\"\
  checkbox\"/>\n  </tr>\n</table>\n<input type=submit value=Create>\n<hr>\n<em>APress\
  \ - Beginning Java EE 7</em>\n```\n\n通常，一个有效的 HTML 页面以 `<html>` 标签开头，该标签充当文档的容器。其后是\
  \ `<head>` 和 `<body>` 标签。`<body>` 包含可见内容，例如显示表格、标签、输入字段和按钮的 HTML 代码。如代码清单 10-1 所示，`newBook.html`\
  \ 的标记并未遵循这些规则，但浏览器在一定程度上会显示无效的 HTML 页面。因此，可见结果将类似于图 10-1。\n\n![9781430246268_Fig10-01.jpg](img/9781430246268_Fig10-01.jpg)\n\
  \n图 10-1. newBook.html 页面的图形表示\n\n图 10-1 中显示的图形表示是预期的结果，尽管代码清单 10-1 在 XML 格式方面并不规范。\n\
  \n*   该页面没有任何 `<html>`、`<head>` 或 `<body>` 标签。\n*   `<input type=submit value=Create>`\
  \ 或 `<hr>` 标签未闭合。\n*   属性值未加引号（`border=0` 而不是 `border=\"0\"`）。\n*   标签中大小写混用（例如，`<TR>`\
  \ 和 `</tr>` 都出现在代码清单中）。\n\n大多数浏览器会允许此类错误并显示此表单。但是，如果你想用 XML 解析器处理此文档，例如，它会失败。要理解原因，让我们看看一个使用严格\
  \ XML 结构（即可扩展超文本标记语言，XHTML）的网页。\n\n![image](img/sq.jpg) **注意**  在撰写本书时，HTML 5 规范尚未最终确定。HTML5\
  \ 将增加许多新特性，例如 `<video>`、`<audio>` 和 `<canvas>` 元素，以及可缩放矢量图形（SVG）内容的集成。这些特性旨在使在 Web\
  \ 上轻松包含和处理多媒体及图形内容成为可能，而无需依赖专有插件和 API。HTML5 也是跨平台移动应用的潜在候选者，因为许多特性在设计时就考虑到了在智能手机或平板电脑上运行的能力。\n\
  \nXHTML\n\nXHTML 是在 HTML 4.01 之后不久创建的。它源于 HTML，但用严格的 XML 重新表述。这意味着 XHTML 文档是一个遵循特定模式并在浏览器上具有图形表示的\
  \ XML 文档。XHTML 文件（扩展名为 `.xhtml`）可以立即用作 XML，也可以在浏览器中显示。与 HTML 相比，其优势在于可以使用标准 XML\
  \ 工具（XSL，即可扩展样式表语言；XSLT，即 XSL 转换等）提供文档验证。因此，XHTML 比 HTML 更加灵活和强大，因为它允许你定义任何你想要的标签集。代码清单\
  \ 10-2 展示了显示用于创建书籍的表单的网页的 XHTML 版本。\n\n***代码清单 10-2.***  具有有效 XML 结构的 newBook.xhtml\
  \ 页面\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE html\n        PUBLIC\
  \ \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n        \" http://www.w3.org/TR/xhtml1/DTD/\
