  \ 和 `CreditCard` 类，但也会找到用于 SOAP 请求的类（`Validate`）和用于响应的类（`ValidateResponse`）。这些类充满了\
  \ JAXB 和 JAX-WS 注解，因为它们负责编组 `CreditCard` 对象并连接到远程 Web 服务。你无需担心生成的代码。jar 文件可以被编译和打包：\n\
  \n```\n$ mvn package\n```\n\n这将创建 `chapter14-consumer-1.0.jar` 文件，其中包含你编写的 `WebServiceConsumer`\
  \ 类以及所有生成的类（参见图 14-6 以更全面地了解所有生成的类）。这个 jar 是自包含的，现在可以执行它来调用 Web 服务。\n\n运行 WebServiceConsumer\
  \ 类\n\n请记住，`WebServiceConsumer` 类使用 `@WebServiceRef` 注解来注入对 Web 服务端点接口的引用。这意味着代码需要在应用程序客户端容器（ACC）中执行。还要记住，`chapter14-consumer-1.0.jar`\
  \ 文件是可执行的，因为你已经在 `MANIFEST.MF` 文件中添加了一个 `Main-Class` 元素。你唯一需要做的就是调用 GlassFish 附带的\
  \ `appclient` 实用程序，并将 jar 文件传递给它，如下所示：\n\n```\n$ appclient -client chapter14-consumer-1.0.jar\n\
  ```\n\n这将通过 HTTP 调用 Web 服务，并收到一个响应，告诉你信用卡是否有效。\n\n总结\n\n企业需要以安全、可靠、支持事务且可互操作的方式交换数据。这就是分布式技术历史上出现\
  \ CORBA、DCOM、RPC 或 RMI 的原因。随着 HTTP 的广泛采用，多个标准机构（W3C、OASIS）将 SOAP Web 服务开发为一种松散的（XML）标准方式，供企业通过网络进行通信。如今，许多组织大量使用\
  \ SOAP Web 服务来集成由各种外部组织（互联网）或内部部门（内联网）运行的应用程序。\n\n本章介绍了一些相关的 SOAP Web 服务标准（WSDL、SOAP\
  \ 等），并重点介绍了涵盖这些标准的 Java EE 规范（JAX-WS、JAXB、WS-Metadata 等）。如果你想隐藏网络复杂性并简化开发，这些规范至关重要。抛开这些规范不谈，JAX-WS\
  \ 遵循简单的开发模型，并且仅使用少量注解来调整 Java 到 WSDL 的映射。因此，编写一个 Web 服务（Servlet 或 EJB 端点）或一个消费者，就像编写带有可选部署描述符的简单注解\
  \ POJO 一样容易。\n\n本章以一个示例结束，展示了如何编写 Web 服务、编译、测试（单元测试和集成测试）以及使用 Maven 打包。借助 WSDL 和一些工具，你可以生成消费者的构件，以远程调用\
  \ SOAP Web 服务。\n\nAmazon、eBay、Google、Yahoo! 等许多公司都为其客户提供了 SOAP Web 服务。但近年来，它们都转向了\
  \ RESTful Web 服务（将在下一章中描述），主要是出于性能原因。\n\n第 15 章\n\n![image](img/frontdot.jpg)\n\n\
  RESTful Web 服务\n\n前一章描述的 SOAP Web 服务栈（SOAP、WSDL、WS-*）在消息集成和 RPC 风格方面都提供了互操作性。SOAP\
  \ Web 服务在 B2B 行业中仍被大量使用，但在互联网上并未达到预期的势头。随着 Web 2.0 的兴起，新的 Web 框架涌现出来，带来了更敏捷的 Web\
  \ 开发和更具响应性的用户界面。移动设备及其聚合数据的原生和 Web 应用程序开始成为我们日常生活的一部分。HTML 5 和 JavaScript 彻底改变了我们的浏览体验。在这种情况下，一种新型的\
  \ Web 服务越来越受欢迎：RESTful Web 服务。有鉴于此，许多关键的 Web 参与者，如 Amazon、eBay、Google 和 Yahoo!，已经停用了它们的\
  \ SOAP Web 服务，转而支持 RESTful 面向资源的服务。\n\n\n\n表述性状态转移（REST）是一种基于 Web 工作方式的架构风格。将其应用于服务时，它试图将\
  \ Web 的特性重新注入网络服务中。要设计一个 RESTful 网络服务，你需要了解超文本传输协议（HTTP）和统一资源标识符（URI），并遵循一些设计原则。这基本上意味着每个唯一的\
  \ URL 都是某个对象的表示。你可以使用 HTTP GET（获取其内容）、DELETE、POST（创建它）或 PUT（更新内容）来与该对象进行交互。\n\n\
  RESTful 架构之所以迅速流行，是因为它们依赖于一种非常稳健的传输协议：HTTP。RESTful 网络服务降低了客户端/服务器之间的耦合度，使得 REST\
  \ 接口在随时间演进时更容易，而不会破坏现有客户端。与它们所基于的协议一样，RESTful 网络服务是无状态的，并且可以利用 HTTP 缓存和代理服务器来帮助你处理高负载并实现更好的扩展。此外，它们易于构建，因为不需要特殊的工具包或类似\
  \ WSDL 的东西。\n\n本章开头将涵盖一系列概念，以帮助你理解什么是 REST。然后，它将把这些概念整合起来，编写 RESTful 网络服务并进行消费。\n\
  \n理解 RESTful 网络服务\n\nSOAP 网络服务旨在能够使用多种传输协议，HTTP 只是其中之一。因此，它们只使用了 HTTP 非常小的一部分能力。另一方面，RESTful\
  \ 网络服务以 HTTP 为中心，充分利用了这个非常丰富的协议。在 REST 架构风格中，每一条信息都是一个资源，这些资源通过统一资源标识符（URI）来寻址，通常是\
  \ Web 上的链接。通过使用一组简单、定义明确的操作来对资源进行操作。REST 客户端-服务器架构风格旨在使用定义的接口和协议来交换这些资源的表示。这些原则鼓励\
  \ RESTful 应用程序保持简单、轻量级，并具有高性能。\n\n一次网页浏览体验\n\n由于 REST 源自 Web，为了更好地理解它，我将从一次真实的网页浏览体验开始。你会如何操作才能找到\
  \ Apress 的 Java 技术书籍列表？你将浏览器指向 Apress 网站：`http://www.apress.com`。尽管这个页面很可能不包含你正在寻找的确切信息，但你期望它能以某种方式让你访问到\
  \ Java 书籍列表。首页提供了一个搜索所有 Apress 书籍的搜索引擎，但还有一个按技术分类的书籍目录。点击 Java 节点，超媒体魔法就发生了：在 `http://www.apress.com/java`\
  \ 这里，是 Apress Java 书籍的完整列表。你得到一个显示 191 本书中 20 本的页面。如果你想以列表格式在页面上显示所有书籍，请点击 `http://www.apress.com/java?limit=all&mode=list`。\n\
  \n假设你将这个链接保存在你最喜欢的书签管理器中，当你浏览书籍列表时，Graeme Rocher 和 Jeff Brown 合著的 *《Grails 2 权威指南》*\
  \ 吸引了你的注意。书籍标题上的超链接将你带到书籍页面（`http://www.apress.com/9781430243779`），在那里你可以阅读摘要、作者简介等，并且你注意到“相关标题”部分列出的一本书可能对你当前的项目同样有价值。你想将\
  \ Graeme Rocher 的书与 Ola Bini 的 *《实用 JRuby on Rails Web 2.0 项目：将 Ruby on Rails 引入\
  \ Java》*（`http://www.apress.com/9781590598818`）进行比较。Apress 的书籍页面以在线预览的形式让你访问其书籍的更具体表示：打开预览，浏览目录，然后做出选择。\n\
  \n这就是我们日常使用浏览器所做的事情。REST 将相同的原则应用于你的服务，其中书籍、搜索结果、目录或书籍封面都可以被定义为资源。\n\n资源与 URI\n\n\
  资源在 RESTful 架构中扮演着核心角色。在上述的网页浏览体验中，你已经注意到，资源是客户端可能想要引用或交互的任何东西，是任何值得在超链接中引用的信息（一本书、一个搜索结果、一个目录……）。资源可以存储在数据库、文件……任何可以寻址的地方。尽量避免将抽象概念暴露为资源；相反，选择简单的对象。CD-BookStore\
  \ 应用程序中使用的一些资源可能是：\n\n*   Java 书籍列表\n*   书籍 *《Grails 2 权威指南》*\n*   Ola Bini 的简历\n\
  \nWeb 上的资源通过 URI（统一资源标识符）来标识。URI 是资源的唯一标识符，由名称和指示在哪里找到该资源的结构化地址组成。存在多种类型的 URI：WWW\
  \ 地址、通用文档标识符、通用资源标识符，以及最终统一资源定位符（URL）和统一资源名称（URN）的组合。资源和 URI 的示例列在表 15-1 中。\n\n\
  表 15-1. 资源与 URI 示例\n\n| 资源 | URI |\n| --- | --- |\n| Apress 书籍目录 | `http://www.apress.com/book/catalog`\
  \ |\n| Java EE 6 书籍封面 | `http://www.apress.com/book/catalog/beginning-javaee6.jpg`\
  \ |\n| Apress 招聘信息 | `http://www.apress.com/info/jobs` |\n| 2013 年巴黎天气 | `http://www.weather.com/weather/2013?location=Paris,France`\
  \ |\n| Flickr 上 2013 年 1 月 1 日的有趣照片 | `http://www.flickr.com/explore/interesting/2013/01/01`\
  \ |\n| Flickr 上过去 24 小时的有趣照片 | `http://www.flickr.com/explore/interesting/24hours`\
  \ |\n| 冒险电影列表 | `http://www.movies.com/categories/adventure` |\n\nURI 应尽可能具有描述性，并且应指向唯一的资源。请注意，标识不同资源的不同\
  \ URI 可能会指向相同的数据。实际上，在某个时间点，2013 年 1 月 1 日上传到 Flickr 的有趣照片列表与过去 24 小时内上传的照片列表是相同的，但两个对应\
  \ URI 所传达的信息并不相同。URI 的标准格式如下：\n\n```\nhttp://host:port/path?queryString#fragment\n\
  ```\n\nHTTP 是协议，`host` 是 DNS 名称或 IP 地址，`port` 是可选的。`path` 是由“`/`”字符分隔的一组文本段。其后是一个可选的查询字符串（表示为名称/值对的参数列表，每对由“`&`”字符分隔）。最后一部分由“`#`”分隔，是用于指向文档中某个位置的片段。以下\
  \ URI 指向 2013 年 1 月 1 日上午里斯本（葡萄牙）的天气：\n\n```\nhttp://www.weather.com:8080/weather/2013/01/01?location=Lisbon,Portugal&time=morning\n\
  ```\n\n表示\n\n到目前为止，我已经解释了什么是资源以及在哪里可以找到它。但是 URI 指向的资源的表示是什么？一个资源可以有多种表示吗？实际上，你可能希望以文本、JSON、XML、PDF\
  \ 文档、JPG 图像或其他数据格式获取资源的表示。当客户端处理一个资源时，它总是通过其表示来进行；资源本身保留在服务器上。*表示*是关于资源状态的任何有用信息。例如，前面提到的\
  \ Java 书籍列表至少有两种表示：\n\n*   浏览器渲染的 HTML 页面：`http://www.apress.com/java`\n*   书籍的逗号分隔值（CSV）文件：`http://www.apress.com/resource/csv/bookcategory?cat=32`\n\
  \n\n\n如何在给定资源的多种表示形式之间做出选择？有两种可能的解决方案。服务可以为每种表示形式暴露一个 URI，如上所示。然而，这两个 URI 实际上并不相同，且看起来没有直接关联。以下是一组更简洁的\
  \ URI：\n\n*   `http://www.apress.com/java`\n*   `http://www.apress.com/java/csv`\n\
  *   `http://www.apress.com/java/xml`\n\n第一个 URI 是资源的默认表示形式，其他表示形式则在其后附加格式扩展名：`/csv`（对应\
  \ `text/csv`）、`/xml`、`/pdf` 等等。\n\n另一种解决方案是为所有表示形式暴露一个单一的 URI（例如 `http://www.apress.com/java`），并依赖于一种称为*内容协商*的机制，我将在本章稍后部分更详细地讨论这一点。例如，一个\
  \ URI 可以同时拥有人类可读和机器可处理的表示形式。\n\n可寻址性\n\n在设计 RESTful Web 服务时，需要遵循的一个重要原则是**可寻址性**。你的\
  \ Web 服务应尽可能使你的应用程序具有可寻址性，这意味着应用程序中每一份有价值的信息都应当是一个资源，并拥有一个 URI，从而使该资源易于访问。URI 是你为使资源可访问而需要发布的唯一数据，这样你的业务合作伙伴就无需猜测如何访问该资源。\n\
  \n例如，你在应用程序中遇到了一个 bug，经过调查，你发现 bug 出现在 `CreditCardValidator.java` 类的第 42 行。由于你不负责应用程序的这个领域，你想提交一个问题报告，以便有资格的人来处理它。你该如何向她指出有问题的代码行？你可以说：“转到\
  \ `CreditCardValidator` 类的第 42 行”，或者，如果你的源代码可以通过仓库浏览器进行寻址，你可以在 bug 报告中保存该代码行本身的\
  \ URI。这就引出了在应用程序中定义 RESTful 资源粒度的问题：粒度可以是行级别、方法级别、类级别等等。\n\n唯一的 URI 使你的资源可以链接起来，并且由于它们通过统一的接口暴露，每个人都知道如何与它们交互，从而允许人们以你从未想象过的方式使用你的应用程序。\n\
  \n连通性\n\n在图论中，如果一个图中的每一对不同顶点都能通过某条路径连接起来，则该图被称为连通图。如果对于每一对顶点 `u` 和 `v`，都存在一条从 `u`\
  \ 到 `v` 的直接路径和一条从 `v` 到 `u` 的直接路径，则该图被称为强连通图。REST 倡导资源应尽可能相互连接。\n\n同样，这个看似令人生畏的论断源于对\
  \ Web 成功经验的研究。网页通过嵌入链接，以逻辑流畅的方式在页面间导航，因此 Web 的连通性非常好。如果两个资源之间存在强关联，它们就应该被连接起来。REST\
  \ 指出，Web 服务也应利用超媒体来告知客户端有哪些可用资源以及如何访问。它促进了服务的可发现性。从一个单一的 URI 出发，访问一个连接良好的 Web 服务的用户代理可以发现所有可用的操作、资源及其各种表示形式等。\n\
  \n例如，当用户代理（如 Web 浏览器）查找一张 CD 的表示形式时（见清单 15-1），该表示形式不仅可以包含艺术家的名字，还可以包含指向其传记的链接或 URI。是否实际检索该传记由用户代理决定。该表示形式还可以链接到资源的其他表示形式或可用的操作。\n\
  \n***清单 15-1.***  一个连接到其他服务的 CD 表示形式\n\n```\n<cd>\n  <title>Ella and Louis</title>\n\
    <year ref=\" http://music.com/year/1956 \">1956</year >\n  <artist ref=\" http://music.com/artists/123\"\
  >Ella Fitzgerald</artist>\n  <artist ref=\" http://music.com/artists/456 \">Louis\
  \ Armstrong</artist>\n  <link rel=\"self\" type=\"text/json\" href=\" http://music.com/album/789\
  \ \"/>\n  <link rel=\"self\" type=\"text/xml\" href=\" http://music.com/album/789\
  \ \"/>\n  <link rel=\" http://music.com/album/comments \" type=\"text/xml\" →\n\
         href=\" http://music.com/album/789/comments \"/>\n</cd>\n```\n\n超媒体原则的另一个关键方面是应用程序的状态，该状态必须由超媒体来引导。简而言之，Web\
  \ 服务提供一组链接这一事实，使得客户端能够通过简单地跟随链接，将应用程序从一个状态转移到下一个状态。\n\n在上述 XML 片段中，客户端可以通过对专辑发表评论来改变应用程序的状态。专辑的评论列表是一个可通过\
  \ URI `http://music.com/album/789/comments` 寻址的资源。由于此 Web 服务使用统一的接口，一旦客户端知道了 URI\
  \ 格式、可用的内容类型和数据格式，它就会确切地知道如何与之交互：`GET` 将检索现有评论列表，`PUT` 将更新评论，等等。从这个单一的初始请求开始，客户端可以执行许多操作：超媒体驱动着应用程序的状态。\n\
  \n统一接口\n\n使架构具有 RESTful 特性的主要约束之一，是使用统一的接口来管理你的资源。选择任何适合你的接口，但在整个系统中，从资源到资源，从服务到服务，都要以相同的方式使用它。切勿偏离它或改变其原始含义。通过使用统一的接口，“整体系统架构得以简化，交互的可见性得以提高”（Roy\
  \ Thomas Fielding，《架构风格与基于网络的软件架构设计》）。你的服务将成为使用完全相同语义的服务社区的一部分。\n\n事实上的 Web 协议是\
  \ HTTP，它是一种基于文档的、标准化的客户端与服务器之间的请求/响应协议。HTTP 是 RESTful Web 服务的统一接口。基于 SOAP、WSDL 和其他\
  \ WS-* 标准构建的 Web 服务也使用 HTTP 作为传输层，但它们只利用了 HTTP 的极少部分能力（因为 SOAP Web 服务也可以使用其他传输协议，如\
  \ JMS）。你必须通过分析 WSDL 来发现服务的语义，然后调用正确的方法。RESTful Web 服务拥有统一的接口（HTTP 方法和 URI），因此，一旦你知道资源的位置（URI），你就可以调用\
  \ HTTP 方法（`GET`、`POST` 等）。\n\n除了熟悉性之外，统一的接口还促进了应用程序之间的互操作性；HTTP 得到了广泛支持，大量的 HTTP\
  \ 客户端库保证了你无需处理通信问题。\n\n无状态性\n\nREST 的最后一个特性是**无状态性**，这意味着每个 HTTP 请求都是完全独立发生的，服务器绝不应跟踪之前执行过的请求。为了清晰起见，通常需要区分资源状态和应用程序状态。资源状态必须存在于服务器端，并由所有人共享；而应用程序状态必须保留在客户端，是客户端的专有财产。回到清单\
  \ 15-1 中的例子，应用程序状态是客户端已经获取了专辑 *Ella and Louis* 的一个表示形式，但服务器不应保留此信息。资源状态是专辑信息本身；服务器显然需要维护这些信息。客户端可以更改资源状态。如果购物车是一个仅限单个客户端访问的资源，那么应用程序需要在客户端会话中跟踪购物车\
  \ ID。\n\n\n\n无状态性带来了诸多优势，例如更好的可扩展性：无需处理会话信息，无需将后续请求路由到同一台服务器（负载均衡），便于故障处理（例如服务中断）等。如果需要保持状态，客户端必须额外工作来存储它。\n\
  \nHTTP\n\nHTTP 是一种用于分布式、协作式、超媒体信息系统的协议，它与 URI、HTML 以及最早的浏览器共同促成了万维网的建立。HTTP 由万维网联盟（W3C）和互联网工程任务组（IETF）协调制定，是多个请求评论文档（RFC）的成果，特别是定义了\
  \ HTTP 1.1 的 RFC 216。\n\n请求与响应\n\nHTTP 基于客户端和服务器之间交换的请求和响应。客户端向服务器发送请求并期望得到应答（参见图\
  \ 15-1）。交换的消息由信封和主体（也称为有效载荷或实体）组成。\n\n![9781430246268_Fig15-01.jpg](img/9781430246268_Fig15-01.jpg)\n\
  \n图 15-1. HTTP 请求与响应\n\n当您在 APress 网站上浏览时，您只能看到网页，而看不到 HTTP 请求和响应的技术细节。要了解幕后发生的事情，您可以使用\
  \ cURL 等其他工具。例如，当您访问 `http://www.apress.com/java?limit=all&mode=list` 时，以下是发送到服务器的请求：\n\
  \n```\n$ curl -v –X GEThttp://www.apress.com/java?limit=all&mode=list\n> GET /java?limit=all&mode=list\
  \ HTTP/1.1\n> User-Agent: curl/7.23.1 (x86_64-apple-darwin11.2.0) libcurl/7.23.1\
  \ zlib/1.2.5\n> Host: www.apress.com\n> Accept: */*\n```\n\n此请求包含从客户端发送到服务器的几条信息：\n\
  \n*   HTTP 方法，此处为 GET\n*   路径，此处为 `/java?limit=all&mode=list`\n*   其他几个请求头（`User-Agent`）\n\
  \n请注意，该请求没有主体部分。实际上，`GET` 请求永远不会有主体。针对此请求，服务器将发送以下响应：\n\n```\n< HTTP/1.1 200 OK\n\
  < Date : Sat, 17 Nov 2012 17:42:15 GMT\n< Server: Apache/2.2.3 (Red Hat)\n< X-Powered-By:\
  \ PHP/5.2.17\n< Vary: Accept-Encoding,User-Agent\n< Transfer-Encoding: chunked\n\
  < Content-Type : text/html; charset=UTF-8\n<!DOCTYPE HTML PUBLIC \"-//W3C//DTD HTML\
  \ 4.01 Transitional//EN\">\n<html>\n  <head>\n  <title>\n  ...\n```\n\n此响应由以下部分组成：\n\
  \n*   *响应码*：在此例中，响应码是 `200-OK`。\n*   *多个响应头*：在前面的代码中，响应头是 `Date`、`Server`、`Content-Type`。这里的内容类型是\
  \ `text/html`，但也可能是任何其他媒体类型，例如 XML（`application/xml`）或图片（`image/jpeg`）。\n*   *实体主体或表示*：在此示例中，返回网页的内容就是实体主体（这里我只展示了一个\
  \ HTML 页面的片段）。\n\n![image](img/sq.jpg) **注意**  cURL（`http://curl.haxx.se/`）是一个命令行工具，用于通过\
  \ HTTP、FTP、SFTP、SCP 等协议使用 URL 语法传输文件。您可以发送 HTTP 命令、更改 HTTP 头等。它是模拟用户在 Web 浏览器中操作的好工具。\n\
  \n头部\n\nHTTP 头部字段是请求和响应消息头部的组成部分。头部字段是采用明文文本字符串格式的、以冒号分隔的键值对，以回车和换行字符序列结束。一组核心字段由互联网工程任务组（IETF）标准化，所有符合\
  \ HTTP 规范的协议实现都必须实现这些字段。但每个应用程序可以根据需要定义额外的字段名称。表 15-2 列出了您可以在请求或响应中找到的常见已定义头部值的一个子集。\n\
  \n表 15-2. 常见已定义头部值子集\n\n| 头部名称 | 描述 |\n| --- | --- |\n| `Accept` | 可接受的内容类型（例如 text/plain）\
  \ |\n| `Accept-Charset` | 可接受的字符集（例如 utf-8） |\n| `Accept-Encoding` | 可接受的编码方式（例如\
  \ gzip, deflate） |\n| `Accept-Language` | 响应可接受的语言（例如 en-US） |\n| `Cookie` | 服务器先前发送的\
  \ HTTP cookie |\n| `Content-Length` | 请求主体的字节长度 |\n| `Content-Type` | 请求主体的 MIME\
  \ 类型（例如 text/xml） |\n| `Date` | 消息发送的日期和时间 |\n| `ETag` | 资源特定版本的标识符（例如 8af7ad3082f20958）\
  \ |\n| `If-Match` | 仅当客户端提供的实体与服务器上的同一实体匹配时才执行操作 |\n| `If-Modified-Since` | 如果内容自某个日期以来未更改，则允许返回\
  \ `304-Not Modified` |\n| `User-Agent` | 用户代理的字符串（例如 Mozilla/5.0） |\n\nHTTP 方法\n\
  \nWeb 由标识清晰的资源组成，这些资源相互链接，并通过简单的 HTTP 请求进行访问。HTTP 中标准化的主要请求类型是 `GET`、`POST`、`PUT`、`DELETE`。这些也被称为动词、命令或方法。HTTP\
  \ 还定义了另外四种较少使用的方法：`HEAD`、`TRACE`、`OPTIONS`、`CONNECT`。\n\nGET\n\n`GET` 是一种简单的读取操作，用于请求资源的表示。`GET`\
  \ 应以安全的方式实现，这意味着它不应改变资源的状态。此外，`GET` 必须是幂等的，这意味着无论调用一次、两次还是更多次，它都必须使资源保持相同的状态。安全性和幂等性带来了更高的稳定性。当客户端未收到响应时（例如由于网络故障），它可能会重新发送请求，而这些新请求将期望得到原本应收到的相同应答，而不会破坏服务器上的资源状态。\n\
  \nPOST\n\n给定一个表示（文本、XML 等），调用 `POST` 方法会创建一个由请求 URI 标识的新资源。`POST` 的示例包括向日志文件追加消息、向博客添加评论、向书单添加书籍等。因此，`POST`\
  \ 既不是安全的（资源状态被更新），也不是幂等的（发送两次请求将导致创建两个新的子资源）。如果在源服务器上创建了资源，响应应为状态 `201-Created`。大多数现代浏览器只生成\
  \ `GET` 和 `POST` 请求。\n\nPUT\n\n`PUT` 请求旨在更新存储在给定 URI 下的资源状态。如果请求 URI 指向一个不存在的资源，则将在该\
  \ URI 下创建该资源。`PUT` 的示例包括更新书籍的价格或客户的地址。`PUT` 不是安全的（因为资源状态被更新），但它是幂等的：您可以多次发送相同的 `PUT`\
  \ 请求，最终资源状态将始终相同。\n\nDELETE\n\n`DELETE` 请求用于删除资源。对 `DELETE` 的响应可以是主体中的状态消息，也可以根本没有状态。`DELETE`\
  \ 也是幂等的，但不安全。\n\n其他\n\n如前所述，还存在其他 HTTP 方法，尽管它们使用较少：\n\n\n\n*   `HEAD` 与 `GET` 完全相同，区别在于服务器不会在响应中返回消息体。`HEAD`\
  \ 可用于检查链接的有效性或实体的大小，而无需传输实体本身。\n*   当服务器收到来自客户端的 `TRACE` 请求时，它会将收到的请求原封不动地返回。这对于查看中间服务器、代理或防火墙在请求中添加或更改了哪些内容非常有用。\n\
  *   `OPTIONS` 表示对 URI 标识的请求/响应链上可用通信选项的信息请求。此方法允许客户端确定与资源相关的选项和/或要求，或服务器的能力，而无需执行资源操作或发起资源检索。\n\
  *   `CONNECT` 与能够动态切换为隧道（一种 HTTP 协议作为各种网络协议包装器的技术）的代理结合使用。\n\n内容协商\n\nHTTP 标准第 12\
  \ 节中描述的内容协商被定义为“当存在多种可用表示时，为给定响应选择最佳表示的过程”。客户端的需要、期望和能力各不相同；对于日本移动设备用户的最佳表示，可能并非美国订阅源阅读器应用程序的最佳选择。\n\
  \n内容协商基于（但不限于）HTTP 请求头 `Accept`、`Accept-Charset`、`Accept-Encoding`、`Accept-Language`\
  \ 和 `User-Agent`。例如，要获取 Apress Java 书籍的 CSV 表示，客户端应用程序（用户代理）将请求 `http://www.apress.com/java`，并将\
  \ `Accept` 头设置为 `text/csv`。你也可以想象，基于 `Accept-Language` 头，服务器会选择适当的 CSV 文档以匹配相应的语言（日语或英语）。\n\
  \n内容类型\n\nHTTP 在 `Content-Type` 和 `Accept` 头字段中使用互联网媒体类型（最初称为 MIME 类型），以提供开放且可扩展的数据类型化和类型协商。互联网媒体类型分为五个离散的顶级类别：`text`、`image`、`audio`、`video`\
  \ 和 `application`。这些类型进一步细分为多个子类型（`text/plain`、`text/xml`、`text/xhtml` 等）。一些最常见的公共内容类型如下：\n\
  \n*   `text/plain`：这是默认的内容类型，用于简单的文本消息。\n*   `text/html`：在我们的浏览器中非常常用，此内容类型告知用户代理内容是一个\
  \ HTML 页面。\n*   `image/gif`、`image/jpeg`、`image/png`：此图像顶级媒体类型需要显示设备（例如图形显示器、图形打印机等）来查看信息。\n\
  *   `text/xml`、`application/xml`：用于 XML 交换的格式。\n*   `application/json`：JavaScript\
  \ 对象表示法（JSON）是一种独立于编程语言的轻量级数据交换文本格式（参见第 12 章）。\n\n状态码\n\n每次收到响应时，都会有一个 HTTP 代码与之关联。规范定义了大约\
  \ 60 个状态码。`Status-Code` 元素是一个三位整数，描述响应的上下文，是响应信封的一部分。第一位数字指定了五类响应之一：\n\n*   *1xx*：信息性。请求已收到，处理正在进行中。\n\
  *   *2xx*：成功。操作已成功接收、理解并接受。\n*   *3xx*：重定向。必须采取进一步操作才能完成请求。\n*   *4xx*：客户端错误。请求包含错误的语法或无法完成。\n\
  *   *5xx*：服务器错误。服务器未能完成一个看似有效的请求。\n\n表 15-3 列出了一些你可能已经遇到过的状态码。\n\n表 15-3. HTTP 状态码子集\n\
  \n| 状态码 | 描述 |\n| --- | --- |\n| `100-Continue` | 服务器已收到请求头，客户端应继续发送请求体 |\n| `101-Switching\
  \ Protocols` | 请求者已要求服务器切换协议，服务器确认将执行此操作 |\n| `200-OK` | 请求已成功。实体体（如果有）包含资源的表示 |\n\
  | `201-Created` | 请求已完成，并导致创建了新资源 |\n| `204-No Content` | 服务器成功处理了请求，但不返回任何内容 |\n\
  | `206-Partial Content` | 由于客户端发送的范围头，服务器仅提供资源的一部分 |\n| `301-Moved Permanently`\
  \ | 请求的资源已被分配一个新的永久 URI，对此资源的任何未来引用都应使用返回的 URI 之一 |\n| `304-Not Modified` | 指示自上次请求以来资源未被修改\
  \ |\n| `307-Temporary Redirect` | 应使用另一个 URI 重复请求；但是，未来的请求仍应使用原始 URI |\n| `308-Permanent\
  \ Redirect` | 请求以及所有未来的请求都应使用另一个 URI 重复 |\n| `400-Bad Request` | 由于语法错误，请求无法完成 |\n\
  | `401-Unauthorized` | 类似于 403，但发生在需要身份验证且验证失败时 |\n| `403-Forbidden` | 请求有效，但服务器拒绝响应\
  \ |\n| `404-Not Found` | 服务器未找到与请求 URI 匹配的任何内容 |\n| `405-Method Not Allowed` | 使用了资源不支持的请求方法发出请求\
  \ |\n| `406-Not Acceptable` | 请求的资源只能生成根据请求中发送的 `Accept` 头不可接受的内容 |\n| `500-Internal\
  \ Server Error` | 服务器遇到意外情况，导致无法完成请求 |\n| `501-Not Implemented` | 服务器要么无法识别请求方法，要么缺乏完成请求的能力\
  \ |\n| `503-Service Unavailable` | 服务器当前不可用（因为过载或停机维护）；通常，这是一种临时状态 |\n| `505-HTTP\
  \ Version Not Supported` | 服务器不支持请求中使用的 HTTP 协议版本 |\n\n缓存与条件请求\n\n在大多数分布式系统中，缓存至关重要。缓存旨在通过避免不必要的请求或减少响应中的数据量来提高性能。HTTP\
  \ 提供了允许缓存并确保缓存数据正确的机制。但是，如果客户端决定不使用任何缓存机制，即使资源自上次请求以来未被修改，它也需要始终请求数据。\n\n当发送对 `GET`\
  \ 的响应时，它可能包含一个 `Last-Modified` 头，指示资源上次修改的时间。下次用户代理请求此资源时，它可以将此日期传递给 `If-Modified-Since`\
  \ 头。Web 服务器（或代理）会将此日期与最新修改日期进行比较。如果用户代理发送的日期等于或更新，则返回一个没有响应体的 `304-Not Modified`\
  \ 状态码。否则，执行或转发请求的操作。\n\n但是，日期可能难以操作，并且意味着所有交互代理都保持同步。`ETag` 响应头解决了这个问题。理解 ETag 最简单的方式是将其视为表示中所有字节的\
  \ MD5 或 SHA1 哈希；如果表示中只有一个字节发生变化，ETag 就会改变。\n\n\n\n图 15-2 给出了如何使用 ETag 的示例。要获取图书资源，你需要使用`GET`动作，并为其提供资源的\
  \ URI（`GET /book/12345`）。服务器将返回一个响应，其中包含图书的 XML 表示、200 OK 状态码以及生成的 ETag。当你第二次请求同一资源时，如果你将\
  \ ETag 作为`If-None-Match`头部的值传递，假设资源自上次请求以来实际上没有发生变化，服务器将不会发送资源的表示。相反，它会返回一个`304-Not\
  \ Modified`状态码，告知客户端该资源自上次访问以来没有变化。\n\n![9781430246268_Fig15-02.jpg](img/9781430246268_Fig15-02.jpg)\n\
  \n图 15-2. 使用缓存和 304 Not Modified 状态码\n\n使用 HTTP 头部`If-Modified-Since`、`If-Unmodified-Since`、`If-Match`、`If-None-Match`和`If-Range`的请求被称为条件请求。条件请求可以通过避免不必要的往返或数据传输来节省带宽和\
  \ CPU（在服务器端和客户端都是如此）。`If-*`头部最常用于`GET`和`PUT`请求。\n\n从 Web 到 Web 服务\n\n我们都在使用 Web\
  \ 并了解其工作原理，那么为什么 Web 服务要有所不同呢？毕竟，服务也经常交换唯一标识的资源，这些资源像超链接一样相互关联。Web 架构多年来已经证明了其可扩展性；为什么要重新发明轮子呢？要创建、更新和删除图书资源，为什么不使用常见的\
  \ HTTP 动词呢？例如：\n\n*   使用`POST`来**创建**一个图书资源（传递 XML、JSON 或任何其他格式），URI 为`http://www.apress.com/book/`。创建后，响应会返回新资源的\
  \ URI：`http://www.apress.com/book/123456`。\n*   使用`GET`来**读取**位于`http://www.apress.com/book/123456`的资源（以及可能从实体主体链接到其他资源的链接）。\n\
  *   使用`PUT`对数据进行操作，以**更新**位于`http://www.apress.com/book/123456`的图书资源。\n*   使用`DELETE`来**删除**位于`http://www.apress.com/book/123456`的资源。\n\
  \n通过使用 HTTP 动词，我们可以对资源执行所有可能的创建、读取、更新、删除（CRUD）操作。\n\nWADL\n\n虽然基于 SOAP 的服务依赖 WSDL\
  \ 来描述给定 Web 服务可能请求的格式，但 Web 应用描述语言（WADL）用于公开与给定 RESTful Web 服务的可能交互。它简化了客户端开发，客户端可以直接加载并与资源交互。WADL\
  \ 已提交给 W3C，但由于未得到广泛支持，该联盟目前没有计划将其标准化。清单 15-2 展示了它可能的样子。\n\n***清单 15-2.***  WADL\
  \ 定义可在资源上调用的若干操作\n\n```\n<application xmlns=\" http://wadl.dev.java.net/2009/02\
  \ \">\n  <doc xmlns:jersey=\" http://jersey.java.net/ \" jersey:generatedBy=\"Jersey:\
  \ 2.0\"/>\n\n<resources base=\" http://www.apress.com/ \">\n\n<resource path=\"\
  \ {id} \">\n        <param name=\"id\" style=\"template\" type=\"xs:long\"/>\n        <method\
  \ name=\" GET \">\n          <response>\n            <representation element=\"\
  book\" mediaType=\"application/xml\"/>\n            <representation element=\"book\"\
  \ mediaType=\"application/json\"/>\n          </response>\n        </method>\n        <method\
  \ name=\" DELETE \"/>\n      </resource>\n\n<resource path=\" book \">\n        <method\
  \ name=\" GET \">\n          <response>\n            <representation element=\"\
  book\" mediaType=\" application/xml \"/>\n            <representation element=\"\
  book\" mediaType=\" application/json \"/>\n          </response>\n        </method>\n\
        </resource>\n\n</resources>\n</application>\n```\n\n清单 15-2 描述了一个资源根目录（`http://www.apress.com/`），你可以向其中传递一个\
  \ id（`{id}`）来`GET`或`DELETE`一本书。另一个资源允许你以 JSON 或 XML 格式从 Apress 获取所有图书。\n\nRESTful\
  \ Web 服务规范概述\n\n与依赖 W3C 标准的 SOAP 和 WS-*堆栈相反，REST 没有标准，只是一种具有设计原则的架构风格。REST 应用程序在很大程度上依赖许多其他标准：\n\
  \n*   HTTP\n*   URI, URL\n*   XML, JSON, HTML, GIF, JPEG 等（资源表示）\n\nJava 方面已通过 JAX-RS（Java\
  \ API for RESTful Web Services）进行了规范，但 REST 就像一种设计模式：一种可被多种语言实现的、针对常见问题的可重用解决方案。\n\
  \nREST 简史\n\nREST 这个术语最早由罗伊·托马斯·菲尔丁在其博士论文《架构风格与基于网络的软件架构设计》（加州大学尔湾分校，2000 年，`http://www.ics.uci.edu/∼fielding/pubs/dissertation/top.htm`）的第\
  \ 5 章中提出。该论文是对用于开发 Web 的架构的回顾性解释。在论文中，菲尔丁审视了万维网中运行良好的部分，并提取出设计原则，这些原则可以使任何其他分布式超媒体系统——无论是否与\
  \ Web 相关——同样高效。\n\n开发 REST 的最初动机是为 Web 创建一个架构模型。罗伊·T·菲尔丁也是 HTTP 规范的作者之一，因此 HTTP\
  \ 非常符合他在论文中描述的架构设计也就不足为奇了。\n\nJava API for RESTful Web Services\n\n要用 Java 编写 RESTful\
  \ Web 服务，你只需要一个支持 HTTP 的客户端和服务器。任何浏览器和 HTTP Servlet 容器都可以完成这项工作，但代价是需要一些 XML 配置和解析\
  \ HTTP 请求与响应的粘合代码。一旦完成，这些技术代码将几乎不可读且难以维护。这就是 JAX-RS 发挥作用的地方。正如你将看到的，只需几个注解，你就能获得调用\
  \ HTTP 资源并解析它们的全部能力。\n\nJAX-RS 规范（JSR 311）的第一个版本于 2008 年 10 月定稿，定义了一套促进 REST 架构风格的\
  \ API。但它只涵盖了 REST 的服务器端方面。随着 Java EE 7 的发布，JAX-RS 已更新至 2.0 版本，现在除了其他新特性外，还定义了一个客户端\
  \ API。\n\nJAX-RS 2.0 的新特性？\n\nJAX-RS 2.0（JSR 339）是一个主要版本，专注于与 Java EE 7 及其新特性的集成。JAX-RS\
  \ 2.0 的主要新特性如下：\n\n*   JAX-RS 1.x 缺少客户端 API，因此每个实现都定义了自己的专有 API。JAX-RS 2.0 通过一个流畅的、低层次的请求构建\
  \ API 填补了这一空白。\n*   类似于 SOAP 处理器或托管 Bean 拦截器，JAX-RS 2.0 现在具有过滤器和拦截器，因此你可以拦截请求和响应并进行一些处理。\n\
  *   通过新的异步处理，你现在可以实现长轮询接口或服务器端推送。\n*   实现了与 Bean Validation 的集成，因此你可以约束你的 RESTful\
  \ Web 服务。\n\n表 15-4 列出了 JAX-RS 中定义的主要包。\n\n表 15-4. 主要 JAX-RS 包\n\n| 包 | 描述 |\n|\
  \ --- | --- |\n| `javax.ws.rs` | 用于创建 RESTful Web 服务的高级接口和注解 |\n| `javax.ws.rs.client`\
  \ | 新 JAX-RS 客户端 API 的类和接口 |\n| `javax.ws.rs.container` | 容器特定的 JAX-RS API |\n|\
  \ `javax.ws.rs.core` | 用于创建 RESTful Web 资源的低级接口和注解 |\n| `javax.ws.rs.ext` | 为 JAX-RS\
  \ API 支持的类型提供扩展的 API |\n\n参考实现\n\n\n\nJersey 是 JAX-RS 的参考实现。它是一个采用 CDDL 和 GPL 双许可证的开源项目。Jersey\
  \ 还提供了一个特定的 API，以便你可以扩展 Jersey 本身。\n\nJAX-RS 的其他实现也可用，例如 CXF (Apache)、RESTEasy (JBoss)\
  \ 和 Restlet (一个甚至在 JAX-RS 最终确定之前就已存在的资深项目)。\n\n编写 RESTful Web 服务\n\n一些底层概念（例如 HTTP\
  \ 协议）可能会让你好奇开发 RESTful Web 服务时代码会是什么样子。好消息是，你无需编写管道代码来解析 HTTP 请求，也无需手动创建 HTTP 响应。JAX-RS\
  \ 是一个非常优雅的 API，允许你仅用几个注解就能描述一个 RESTful Web 服务。RESTful Web 服务是 POJO，它们至少有一个方法使用 `@javax.ws.rs.Path`\
  \ 注解。清单 15-3 展示了一个典型的资源。\n\n***清单 15-3.***  一个简单的图书 RESTful Web 服务\n\n```\n@Path\
  \ (\"/book\")\npublic class BookRestService {\n\n@GET\n    @Produces (\"text/plain\"\
  )\n    public String getBookTitle() {\n        return \"H2G2\";\n    }\n}\n```\n\
  \nBookRestService 是一个使用 `@Path` 注解的 Java 类，表明该资源将托管在 URI 路径 `/book` 上。`getBookTitle()`\
  \ 方法被标记为处理 HTTP `GET` 请求（使用 `@GET` 注解）并生成文本（内容由 MIME 媒体类型 `text/plain` 标识；我也可以使用常量\
  \ `MediaType.TEXT_PLAIN`）。要访问此资源，你需要一个 HTTP 客户端（例如浏览器）指向 URL `http://www.myserver.com/`book。\n\
  \nJAX-RS 本质上是以 HTTP 为中心的，并拥有一组明确定义的类和注解来处理 HTTP 和 URI。一个资源可以有多种表示形式，因此该 API 支持多种内容类型，并使用\
  \ JAXB 将 XML 表示形式编组/解组为对象或从对象编组/解组。JAX-RS 也独立于容器，因此资源当然可以部署在 GlassFish 中，也可以部署在各种\
  \ Servlet 容器中。\n\nRESTful Web 服务的剖析\n\n从清单 15-3 中可以看出，REST 服务既没有实现任何接口，也没有扩展任何类；将\
  \ POJO 转变为 REST 服务的唯一强制注解是 `@Path`。JAX-RS 依赖于“通过异常进行配置”，因此它有一套注解来配置默认行为。以下是编写 REST\
  \ 服务的要求：\n\n*   该类必须使用 `@javax.ws.rs.Path` 注解（在 JAX-RS 2.0 中，没有与元数据等效的 XML，因为没有部署描述符）。\n\
  *   该类必须定义为 public，并且不能是 final 或 abstract。\n*   根资源类（带有 `@Path` 注解的类）必须有一个默认的公共构造函数。非根资源类不需要这样的构造函数。\n\
  *   该类不能定义 `finalize()` 方法。\n*   要为 REST 服务添加 EJB 功能，该类必须使用 `@javax.ejb.Stateless`\
  \ 或 `@javax.ejb.Singleton` 注解（参见第 7 章）。\n*   服务必须是一个无状态对象，并且不应在方法调用之间保存特定于客户端的状态。\n\
  \nRESTful Web 服务上的 CRUD 操作\n\n清单 15-3 展示了如何编写一个返回字符串的非常简单的 REST 服务。但大多数时候，你需要以事务方式访问数据库、检索或存储数据。为此，你可以拥有一个\
  \ REST 服务，并通过添加 `@Stateless` 注解来增加无状态会话 Bean 的功能。这将允许对持久层（JPA 实体）进行事务性访问，如清单 15-4\
  \ 所示。\n\n***清单 15-4.***  一个从数据库创建、删除和检索图书的图书 RESTful Web 服务\n\n```\n@Path(\"book\"\
  )\n@Stateless\npublic class BookRestService {\n\n@Context\n  private UriInfo uriInfo;\n\
    @PersistenceContext(unitName = \"chapter15PU\")\n  private EntityManager em ;\n\
  \n@GET\n  @Produces(MediaType.APPLICATION_XML)\n  public Books getBooks() {\n    TypedQuery<Book>\
  \ query = em.createNamedQuery (Book.FIND_ALL, Book.class);\n    Books books = new\
  \ Books(query.getResultList());\n    return books;\n  }\n\n@POST\n  @Consumes(MediaType.APPLICATION_XML)\n\
    public Response createBook(Book book) {\n    em.persist (book);\n    URI bookUri\
  \ = uriInfo.getAbsolutePathBuilder().path(book.getId().toString()).build();\n    return\
  \ Response.created(bookUri).build();\n  }\n\n@DELETE\n  @Path(\"{id}\")\n  public\
  \ Response deleteBook(@PathParam(\"id\") Long bookId) {\n    em.remove (em.find(Book.class,\
  \ bookId));\n    return Response.noContent().build();\n  }\n}\n```\n\n清单 15-4 中的代码代表了一个\
  \ REST 服务，它可以消费和生成图书的 XML 表示形式。`getBooks()` 方法从数据库中检索图书列表，并返回该列表的 XML 表示形式（使用内容协商），可通过\
  \ `GET` 方法访问。`createBook()` 方法接收图书的 XML 表示形式并将其持久化到数据库中。此方法通过 HTTP `POST` 调用，并返回一个包含新图书\
  \ URI (`bookUri`) 以及 `created` 状态的 `Response`。`deleteBook` 方法将图书 ID 作为参数，并将其从数据库中删除。\n\
  \n清单 15-4 中的代码遵循一个非常简单的 JAX-RS 模型，并使用了一组强大的注解。现在让我们更深入地了解代码中展示的所有概念。\n\nURI 定义与绑定\
  \ URI\n\n`@Path` 注解表示一个相对 URI，它可以注解类或方法。当用于类时，它被称为*根资源*，提供资源树的根并允许访问子资源。清单 15-5\
  \ 展示了一个可在 `http://www.myserver.com/`items 访问的 REST 服务。该服务的所有方法都将以 `/items` 作为根路径。\n\
  \n***清单 15-5.***  指向项目资源的根路径\n\n```\n@Path (\"/items\")\npublic class ItemRestService\
  \ {\n\n@GET\n  public Items getItems() {\n    // ...\n  }\n}\n```\n\n然后，你可以为你的方法添加子路径，这对于将多个资源的通用功能分组在一起非常有用，如清单\
  \ 15-6 所示（你可以暂时忽略清单中的 `@GET`、`@POST` 和 `@DELETE` 注解，它们将在后面的“HTTP 方法匹配”部分中描述）。\n\n\
  ***清单 15-6.***  ItemRestService 中的多个子路径\n\n```\n@Path(\" /items \")\npublic class\
  \ ItemRestService {\n\n@GET\n  public Items getItems() {\n    // URI : /items\n\
    }\n\n@GET\n  @Path(\" /cds \")\n  public CDs getCDs() {\n    // URI : /items/cds\n\
    }\n\n@GET\n  @Path(\" /books \")\n  public Books getBooks() {\n    // URI : /items/books\n\
    }\n\n@POST\n  @Path(\" /book \")\n  public Response createBook(Book book) {\n\
      // URI : /items/book\n  }\n}\n```\n\n清单 15-6 代表了一个 RESTful Web 服务，它将为你提供从 CD-BookStore\
  \ 应用程序获取所有项目（CD 和图书）的方法。当请求根资源 `/items` 时，将选择唯一没有子 `@Path` 的方法（`getItems()`）。然后，当\
  \ `@Path` 同时存在于类和方法上时，该方法的相对路径是两者的拼接。例如，要获取所有 CD，路径将是 `/items/cds`。当请求 `/items/books`\
  \ 时，将调用 `getBooks()` 方法。要创建一本新书，你需要指向 `/items/book`。\n\n如果 `@Path(\"/items\")` 只存在于类上，而不存在于任何方法上，那么访问每个方法的路径将是相同的。区分它们的唯一方法将是\
  \ HTTP 动词（`GET`、`PUT` 等）和内容协商（文本、XML 等），你将在后面看到。\n\n提取参数\n\n\n\n在 REST 中，通过拼接路径来访问资源并拥有良好的\
  \ URI 非常重要。但仅有路径和子路径是不够的：你还需要向 RESTful Web 服务传递参数，并在运行时提取和处理它们。清单 15-4 展示了如何使用 `@javax.ws.rs.PathParam`\
  \ 从路径中获取参数。JAX-RS 提供了一组丰富的注解来提取请求可能发送的不同参数（`@PathParam`、`@QueryParam`、`@MatrixParam`、`@CookieParam`、`@HeaderParam`\
  \ 和 `@FormParam`）。\n\n清单 15-7 展示了如何使用 `@PathParam` 注解来提取 URI 模板参数的值。参数有一个名称，由花括号内的变量或正则表达式后的变量表示。`searchCustomers`\
  \ 方法接受任何 String 参数，而 `getCustomerByLogin` 只允许小写/大写字母（`[a-zA-Z]*`），`getCustomerById`\
  \ 只允许数字（`\\\\d+`）。\n\n***清单 15-7.***  提取路径参数和正则表达式\n\n```\n@Path(\"/customer\")\n\
  @Produces(MediaType.APPLICATION_JSON)\npublic class CustomerRestService {\n\n@Path(\"\
  search/ {text} \")\n  public Customers searchCustomers( @PathParam(\"text\") String\
  \ textToSearch) {\n    // URI : /customer/search/ smith\n  }\n\n@GET\n  @Path(\"\
  \ {login: [a-zA-Z]*} \")\n  public Customer getCustomerByLogin( @PathParam(\"login\"\
  ) String login) {\n    // URI : /customer/ foobarsmith\n  }\n\n@GET\n  @Path(\"\
  \ {customerId : \\\\d+} \")\n  public Customer getCustomerById( @PathParam(\"customerId\"\
  ) Long id) {\n    // URI : /customer/ 12345\n  }\n}\n```\n\n`@QueryParam` 注解用于提取\
  \ URI 查询参数的值。查询参数是由 `&` 符号分隔的键/值对，例如 `http://www.myserver.com/customer?zip=75012&city=Paris`。`@MatrixParam`\
  \ 注解的作用类似于 `@QueryParam`，不同之处在于它提取的是 URI 矩阵参数的值（使用 `;` 作为分隔符，而不是 `?`）。清单 15-8 展示了如何从\
  \ URI 中提取查询参数和矩阵参数。\n\n***清单 15-8.***  提取查询参数和矩阵参数\n\n```\n@Path(\"/customer\")\n\
  @Produces(MediaType.APPLICATION_JSON)\npublic class CustomerRestService {\n\n@GET\n\
  \  public Customers getCustomersByZipCode( @QueryParam(\"zip\") Long zip, →\n  \
  \                                            @QueryParam(\"city\") String city)\
  \ {\n    // URI : /customer ?zip=75012&city=Paris\n  }\n\n@GET\n  @Path(\"search\"\
  )\n  public Customers getCustomersByName( @MatrixParam(\"firstname\") String firstname,\
  \ →\n                                           @MatrixParam(\"surname\") String\
  \ surname) {\n    // URI : /customer/search ;firstname=Antonio;surname=Goncalves\n\
  \  }\n}\n```\n\n另外两个注解与 HTTP 的内部机制相关，这些内容在 URI 中无法直接看到：Cookie 和 HTTP 头。`@CookieParam`\
  \ 用于提取 Cookie 的值，而 `@HeaderParam` 用于提取头字段的值。清单 15-9 从 Cookie 中提取会话 ID，并从 HTTP 头中提取用户代理。\n\
  \n***清单 15-9.***  从 Cookie 和 HTTP 头中提取值\n\n```\n@Path(\"/customer\")\n@Produces(MediaType.TEXT_PLAIN)\n\
  public class CustomerRestService {\n\n@GET\n  public String extractSessionID( @CookieParam(\"\
  sessionID\") String sessionID) {\n    // ...\n  }\n\n@GET\n  public String extractUserAgent(\
  \ @HeaderParam(\"User-Agent\") String userAgent) {\n    // ...\n  }\n}\n```\n\n\
  `@FormParam` 注解指定参数的值将从请求实体主体中的表单中提取。`@FormParam` 不要求在字段或属性上得到支持。\n\n有了所有这些注解，你可以添加一个\
  \ `@DefaultValue` 注解来为你期望的参数定义默认值。如果请求中不存在相应的参数，则使用该默认值。清单 15-10 为查询参数和矩阵参数设置了默认值。例如，在\
  \ `getCustomersByAge` 方法中，如果请求中没有查询参数 `age`，则默认值设置为 `50`。\n\n***清单 15-10.***  定义默认值\n\
  \n```\n@Path(\"/customer\")\npublic class CustomerRestService {\n\n@GET\n  public\
  \ Customers getCustomersByAge( @DefaultValue(\"50\") @QueryParam(\"age\") int age)\
  \ {\n    // ...\n  }\n\n@GET\n  public Customers getCustomersByCity( @DefaultValue(\"\
  Paris\") @MatrixParam(\"city\") →\n                                            \
  \        String city) {\n    // ...\n  }\n}\n```\n\n消费和生成内容类型\n\n使用 REST，同一个资源可以有多种表示形式；一本书可以表示为网页、PDF\
  \ 或显示书籍封面的图像。JAX-RS 指定了许多可以表示资源的 Java 类型，例如 `String`、`InputStream` 和 `JAXB` bean。`@javax.ws.rs.Consumes`\
  \ 和 `@javax.ws.rs.Produces` 注解可以应用于可能存在多种表示形式的资源。它定义了客户端和服务器之间交换的表示的媒体类型。JAX-RS\
  \ 有一个 `javax.ws.rs.core.MediaType` 类，它充当 MIME 类型的抽象。它有几个方法，并定义了表 15-5 中列出的常量。\n\n\
  表 15-5. MediaType 中定义的 MIME 类型\n\n| 常量名 | MIME 类型 |\n| --- | --- |\n| `APPLICATION_ATOM_XML`\
  \ | “application/atom+xml” |\n| `APPLICATION_FORM_URLENCODED` | “application/x-www-form-urlencoded”\
  \ |\n| `APPLICATION_JSON` | “application/json” |\n| `APPLICATION_OCTET_STREAM` |\
  \ “application/octet-stream” |\n| `APPLICATION_SVG_XML` | “application/svg+xml”\
  \ |\n| `APPLICATION_XHTML_XML` | “application/xhtml+xml” |\n| `APPLICATION_XML`\
  \ | “application/xml” |\n| `MULTIPART_FORM_DATA` | “multipart/form-data” |\n| `TEXT_HTML`\
  \ | “text/html” |\n| `TEXT_PLAIN` | “text/plain” |\n| `TEXT_XML` | “text/xml” |\n\
  | `WILDCARD` | “*/*” |\n\n在方法上使用 `@Consumes` 和 `@Produces` 注解会覆盖资源类上针对方法参数或返回类型的任何注解。如果缺少这两个注解中的任何一个，则假定支持任何媒体类型（`*/*`）。默认情况下，`CustomerRestService`\
  \ 生成纯文本表示，但在某些方法中会被覆盖（参见清单 15-11）。请注意，`getAsJsonAndXML` 生成一个表示数组（XML 或 JSON）。\n\n\
  ***清单 15-11.***  具有多种表示的客户资源\n\n```\n@Path(\"/customer\")\n@Produces(MediaType.TEXT_PLAIN)\n\
  public class CustomerRestService {\n\n@GET\n  public Response getAsPlainText() {\n\
  \    // ...\n  }\n\n@GET\n  @Produces(MediaType.TEXT_HTML)\n  public Response getAsHtml()\
  \ {\n    // ...\n  }\n\n@GET\n  @Produces({MediaType.APPLICATION_JSON, MediaType.APPLICATION_XML})\n\
  \  public Response getAsJsonAndXML() {\n    // ...\n  }\n\n@PUT\n  @Consumes(MediaType.TEXT_PLAIN)\n\
  \  public void putName(String customer) {\n    // ...\n  }\n}\n```\n\n如果一个 RESTful\
  \ Web 服务能够生成多种媒体类型，那么目标方法将对应于客户端在 HTTP 请求的 `Accept` 头中声明的、最可接受的媒体类型。例如，如果 `Accept`\
  \ 头是：\n\n```\nAccept: text/plain\n```\n\n并且 URI 是 `/customer`，那么将调用 `getAsPlainText()`\
  \ 方法。但客户端也可以使用以下 HTTP 头：\n\n```\nAccept: text/plain; q=0.8, text/html\n```\n\n\n\
  \n此标头声明客户端可以接受 `text/plain` 和 `text/html` 媒体类型，但通过质量因子（或偏好权重）0.8 更偏好后者（“我偏好 `text/html`，但如果质量下降\
  \ 80% 后 `text/plain` 是最佳可用选项，则发送 `text/plain`”）。通过包含此标头并指向 `/customer` URI，将调用 `getAsHtml()`\
  \ 方法。\n\n返回类型\n\n到目前为止，你主要看到的是如何调用方法（使用参数、媒体类型、HTTP 方法等），而不关心返回类型。一个 RESTful Web\
  \ 服务可以返回什么？与任何 Java 类一样，只要方法具有可通过 HTTP 传输的文本表示形式，它就可以返回任何标准 Java 类型、JAXB bean 或任何其他对象。在这种情况下，运行时确定要返回的对象的\
  \ MIME 类型，并调用适当的实体提供程序（参见后文）来获取其表示形式。运行时还会确定要发送给消费者的适当 HTTP 返回码（如果资源方法的返回类型为 void\
  \ 或 null，则返回 `204-No Content`；如果返回值不为 null，则返回 `200-OK`）。但有时你希望对返回内容进行更精细的控制：当然包括响应体（也称为实体），但也包括响应码和/或响应头或\
  \ cookie。这时就需要返回一个 `Reponse` 对象。最佳实践是返回一个包含实体的 `javax.ws.rs.core.Response`，因为它能保证返回内容类型。清单\
  \ 15-12 展示了不同的返回类型。\n\n***清单 15-12.***  一个返回数据类型、JAXB Bean 和 Response 的客户服务\n\n\
  ```\n@Path(\"/customer\")\npublic class CustomerRestService {\n\n@GET\n  public\
  \ String getAsPlainText() {\n    return new Customer(\"John\", \"Smith\", \"jsmith@gmail.com\"\
  , \"1234565\").toString();\n  }\n\n@GET\n  @Path(\"maxbonus\")\n  public Long getMaximumBonusAllowed()\
  \ {\n    return 1234L;\n  }\n\n@GET\n  @Produces(MediaType.APPLICATION_XML)\n  public\
  \ Customer getAsXML() {\n    return new Customer(\"John\", \"Smith\", \"jsmith@gmail.com\"\
  , \"1234565\");\n  }\n\n@GET\n  @Produces(MediaType.APPLICATION_JSON)\n  public\
  \ Response getAsJson() {\n    return Response.ok(new Customer(\"John\", \"Smith\"\
  , \"jsmith@gmail.com\", \"1234565\"),→\n                                                        MediaType.APPLICATION_JSON).build();\n\
    }\n}\n```\n\n`getAsPlainText` 方法返回客户的字符串表示形式，`getMaximumBonusAllowed` 返回一个数值常量。将应用默认设置，因此两个方法的返回\
  \ HTTP 状态均为 `200-OK`（如果未发生异常）。`getAsXML` 返回一个 `Customer` JAXB POJO，这意味着运行时会将对象编组为\
  \ XML 表示形式。\n\n`getAsJson` 方法不返回实体，而是返回一个 `javax.ws.rs.core.Response` 对象。`Response`\
  \ 封装了返回给消费者的实体，并使用 `ResponseBuilder` 类作为工厂进行实例化。在此示例中，我们仍然希望返回一个 JAXB 对象（`Customer`）并附带\
  \ `200-OK` 状态码（通过 `ok()` 方法），但同时也希望指定 MIME 类型为 JSON。调用 `ResponseBuilder.build()`\
  \ 方法将创建最终的 `Response` 实例。\n\n建议对所有请求返回自定义的 `Response`，而不是直接返回实体本身（如果需要，可以设置特定的状态码）。表\
  \ 15-6 展示了 `Response` API 的一个子集。\n\n表 15-6. Response API\n\n| 方法 | 描述 |\n| --- |\
  \ --- |\n| `accepted()` | 创建一个带有已接受状态的新 `ResponseBuilder` |\n| `created()` | 为已创建的资源创建一个新的\
  \ `ResponseBuilder`（包含其 URI） |\n| `noContent()` | 为空响应创建一个新的 `ResponseBuilder` |\n\
  | `notModified()` | 创建一个带有未修改状态的新 `ResponseBuilder` |\n| `ok()` | 创建一个带有正常状态的新 `ResponseBuilder`\
  \ |\n| `serverError()` | 创建一个带有服务器错误状态的新 `ResponseBuilder` |\n| `status()` | 使用提供的状态创建一个新的\
  \ `ResponseBuilder` |\n| `temporaryRedirect()` | 为临时重定向创建一个新的 `ResponseBuilder`\
  \ |\n| `getCookies()` | 从响应消息中获取 cookies |\n| `getHeaders()` | 从响应消息中获取标头 |\n| `getLinks()`\
  \ | 获取作为标头附加到消息的链接 |\n| `getStatus()` | 获取与响应关联的状态码 |\n| `readEntity()` | 使用支持将消息映射到请求类型的\
  \ `MessageBodyReader`，将消息实体读取为指定 Java 类型的实例 |\n\nResponse 和 ResponseBuilder 遵循流畅\
  \ API 设计模式。这意味着你可以通过串联方法轻松编写响应。这也使代码更具可读性。以下是使用此 API 可以编写的一些示例：\n\n```\nResponse.\
  \ ok ().build();\nResponse.ok(). cookie (new NewCookie(\"SessionID\", \"5G79GDIFY09\"\
  )).build();\nResponse.ok(\"Plain Text\"). expires (new Date()).build();\nResponse.ok(new\
  \ Customer (\"John\", \"Smith\"), MediaType.APPLICATION_JSON). build ();\nResponse.\
  \ noContent ().build();\nResponse. accepted (new Customer(\"John\", \"Smith\", \"\
  jsmith@gmail.com\", \"1234565\")).build();\nResponse.notModified(). header (\"User-Agent\"\
  , \"Mozilla\").build();\n```\n\nHTTP 方法匹配\n\n你已经了解了 HTTP 协议如何与其请求、响应和动作方法（`GET`、`POST`、`PUT`\
  \ 等）协同工作。JAX-RS 使用注解定义了这些常见的 HTTP 方法：`@GET`、`@POST`、`@PUT`、`@DELETE`、`@HEAD` 和 `@OPTIONS`。只有公共方法才能被暴露为资源方法。清单\
  \ 15-13 展示了一个公开 CRUD 方法的客户 RESTful Web 服务：`@GET` 方法用于检索资源，`@POST` 方法用于创建新资源，`@PUT`\
  \ 方法用于更新现有资源，`@DELETE` 方法用于删除资源。\n\n***清单 15-13.***  一个公开 CRUD 操作并返回 Response 的\
  \ `Customer` 资源\n\n```\n@Path(\"/customer\")\n@Produces(MediaType.APPLICATION_XML)\n\
  @Consumes(MediaType.APPLICATION_XML)\npublic class CustomerRestService {\n\n@GET\n\
    public Response getCustomers() {\n    // ..\n    return Response. ok (customers).build();\n\
    }\n\n@GET\n  @Path(\"{customerId}\")\n  public Response getCustomer(@PathParam(\"\
  customerId\") String customerId) {\n    // ..\n    return Response. ok (customer).build();\n\
    }\n\n@POST\n  public Response createCustomer(Customer customer) {\n    // ..\n\
      return Response. created (createdCustomerURI).build();\n  }\n\n@PUT\n  public\
  \ Response updateCustomer(Customer customer) {\n    // ..\n    return Response.\
  \ ok (customer).build();\n  }\n\n@DELETE\n  @Path(\"{customerId}\")\n  public Response\
  \ deleteCustomer(@PathParam(\"customerId\") String customerId) {\n    // ..\n    return\
  \ Response. noContent ().build();\n  }\n}\n```\n\nHTTP 规范定义了成功请求应返回的 HTTP 响应码。你可以期望\
  \ JAX-RS 返回相同的默认响应码：\n\n\n\n*   GET 方法用于检索请求 URI 所标识的任何信息（以实体的形式）。GET 应返回 `200-OK`。\n\
  *   PUT 方法用于引用需要更新的现有资源。如果修改了现有资源，应发送 `200-OK` 或 `204-No Content` 响应，以指示请求成功完成。\n\
  *   POST 方法用于创建由请求 URI 标识的新资源。响应应返回 `201-CREATED` 并附带新资源的 URI，如果未产生可通过 URI 标识的资源，则返回\
  \ `204-No Content`。\n*   `DELETE` 方法请求服务器删除由请求 URI 标识的资源。如果响应包含实体，则成功响应应为 `200-OK`；如果操作尚未执行，则为\
  \ `202-Accepted`；如果操作已执行但响应不包含实体，则为 `204-No Content`。\n\n构建 URI\n\n超链接是 REST 应用程序的核心方面。为了在应用程序状态间演进，RESTful\
  \ Web 服务需要灵活地管理状态转换和构建 URI。JAX-RS 提供了 `javax.ws.rs.core.UriBuilder`，旨在替代 `java.net.URI`，以便更安全地构建\
  \ URI。`UriBuilder` 提供了一组方法，可用于构建新的 URI 或基于现有 URI 进行构建。清单 15-14 给出了一些示例，展示了如何使用 `UriBuilder`\
  \ 创建带有路径、查询或矩阵参数的任意 URI。\n\n***清单 15-14.***  使用 UriBuilder\n\n```\npublic class\
  \ URIBuilderTest {\n\n@Test\n  public void shouldBuildURIs() {\n    URI uri = →\n\
          UriBuilder.fromUri (\" http://www.myserver.com\").path(\"book\").path(\"\
  1234\").build();\n    assertEquals(\" http://www.myserver.com/book/1234 \", uri.toString());\n\
  \nuri = UriBuilder.fromUri(\" http://www.myserver.com\").path(SPI_AMPquot;book \"\
  ) →\n                                  . queryParam (\"author\", \"Goncalves\").build();\n\
      assertEquals(\" http://www.myserver.com/book?author=Goncalves \", uri.toString());\n\
  \nuri = UriBuilder.fromUri(\" http://www.myserver.com\").path(SPI_AMPquot;book \"\
  ) →\n                                 . matrixParam (\"author\", \"Goncalves\").build();\n\
      assertEquals(\" http://www.myserver.com/book;author=Goncalves \", uri.toString());\n\
  \nuri = UriBuilder.fromUri(\" http://www.myserver.com\").path(SPI_AMPquot; {path}\
  \ \") →\n           .queryParam(\"author\", \" {value} \").build(\" book \", \"\
  \ Goncalves \");\n    assertEquals(\" http://www.myserver.com/book?author=Goncalves\
  \ \", uri.toString());\n\nuri = UriBuilder. fromResource (BookRestService.class).path(\"\
  1234\").build();\n    assertEquals(\" /book/1234 \", uri.toString());\n\nuri = UriBuilder.fromUri(\"\
  \ http://www.myserver.com\").fragment(\"book\").build() ;\n    assertEquals(\" http://www.myserver.com/#book\"\
  , uri.toString());\n\n}\n}\n```\n\n上下文信息\n\n当处理请求时，资源提供者需要上下文信息来正确执行请求。`@javax.ws.rs.core.Context`\
  \ 注解用于将以下类注入到属性或方法参数中：`HttpHeaders`、`UriInfo`、`Request`、`SecurityContext` 和 `Providers`。例如，清单\
  \ 15-15 展示了注入 `UriInfo` 以便构建 URI，以及注入 `HttpHeaders` 以返回某些头部信息的代码。\n\n***清单 15-15.***  获取\
  \ `HttpHeaders` 和 `UriInfo` 的 `Customer` 资源\n\n```\n@Path(\"/customer\")\npublic\
  \ class CustomerRestService {\n\n@Context\n  UriInfo uriInfo ;\n\n@Inject\n  private\
  \ CustomerEJB customerEJB;\n\n@GET\n  @Path(\"media\")\n  public String getDefaultMediaType(\
  \ @Context HttpHeaders headers) {\n    List<MediaType> mediaTypes = headers.getAcceptableMediaTypes();\n\
      return mediaTypes.get(0).toString();\n  }\n\n@GET\n  @Path(\"language\")\n  public\
  \ String getDefaultLanguage( @Context HttpHeaders headers) {\n    List<String> mediaTypes\
  \ = headers.getRequestHeader(HttpHeaders.ACCEPT_LANGUAGE);\n    return mediaTypes.get(0);\n\
    }\n\n@POST\n  @Consumes(MediaType.APPLICATION_XML)\n  public Response createCustomer(Customer\
  \ cust) {\n    Customer customer = customerEJB.persist(cust);\n    URI bookUri =\
  \ uriInfo .getAbsolutePathBuilder().path(customer.getId()).build();\n    return\
  \ Response.created(bookUri).build();\n  }\n}\n```\n\n正如你之前看到的 HTTP 相关内容，信息在客户端和服务器之间传输，不仅通过实体主体，还通过头部（`Date`、`Server`、`Content-Type`\
  \ 等）。HTTP 头部参与了统一接口，RESTful Web 服务按其原始含义使用它们。作为资源开发者，你可能需要访问 HTTP 头部；这正是 `javax.ws.rs.core.HttpHeaders`\
  \ 接口的作用。可以使用 `@Context` 注解将 `HttpHeaders` 的实例注入到属性或方法参数中，因为 `HttpHeaders` 类是一个映射，并提供了辅助方法以不区分大小写的方式访问头部值。在清单\
  \ 15-15 中，服务返回了默认的 `Accept-Language` 和 `MediaType`。\n\n![image](img/sq.jpg) **注意**  JAX-RS\
  \ 2.0 使用 `@Context` 来注入上下文信息。不幸的是，`@Inject` 不起作用，因为在此版本中 CDI 对齐未能完全实现。希望在未来的 JAX-RS\
  \ 版本中，我们能够广泛使用 CDI，并只关注一个注解：`@Inject`。\n\n实体提供者\n\n当在请求中接收实体或在响应中发送实体时，JAX-RS 实现需要一种方法将表示形式转换为\
  \ Java 类型，反之亦然。这就是实体提供者的作用，它们提供表示形式及其关联 Java 类型之间的映射服务。一个例子是 JAXB，它将对象映射到 XML 表示形式，反之亦然。如果默认的\
  \ XML 和 JSON 提供者不够用，那么你可以开发自己的自定义实体提供者。你甚至可以定义自己的格式。你需要做的是，通过实现自己的实体提供者，为 JAX-RS\
  \ 运行时提供一种将自定义格式读入/写出到实体的方法。实体提供者有两种类型：`MessageBodyReader` 和 `MessageBodyWriter`。\n\
  \n假设你想将你的 `Customer` Bean 交换成一种看起来像这样的 `custom/format`：`1234/John/Smith`。如你所见，分隔符是\
  \ '`/`' 符号，第一个标记是客户 ID，第二个是名字，最后一个是姓氏。你首先需要一个类（写入器），它接收 `Customer` Bean 并将其映射到响应主体。清单\
  \ 15-16 展示了 `CustomCustomerWriter` 类，它必须实现 `javax.ws.rs.ext.MessageBodyWriter` 接口并使用\
  \ `@Provider` 注解。注解 `@Produces` 指定了我们的自定义媒体类型（**\"custom/format\"**）。如你所见，`writeTo`\
  \ 方法将 `Customer` Bean 按照自定义格式转换为一个流。\n\n***清单 15-16.***  生成 `Customer` 自定义表示形式的提供者\n\
  \n```\n@Provider\n@Produces(\"custom/format\")\npublic class CustomCustomerWriter\
  \ implements MessageBodyWriter <Customer> {\n\n@Override\n  public boolean isWriteable(Class<?>\
  \ type, Type genericType, Annotation[] annotations, →\n                                                              MediaType\
  \ mediaType) {\n    return Customer.class.isAssignableFrom(type);\n  }\n\n@Override\n\
    public void writeTo(Customer customer, Class<?> type, Type gType, Annotation[]\
  \ →\n             annotations, MediaType mediaType, MultivaluedMap<String, Object>\
  \ httpHeaders, →\n                   OutputStream outputStream) throws IOException,\
  \ WebApplicationException {\n\n\n\noutputStream.write(customer. getId ().getBytes());\n\
      outputStream.write(' / ');\n    outputStream.write(customer. getFirstName ().getBytes());\n\
      outputStream.write(' / ');\n    outputStream.write(customer. getLastName ().getBytes());\n\
    }\n\n@Override\n  public long getSize(Customer customer, Class<?> type, Type genericType,\
  \ Annotation[] →\n                                                        annotations,\
  \ MediaType mediaType) {\n    return customer.getId().length() + 1 + customer.getFirstName().length()\
  \ + 1 +  →\n                                           customer.getLastName().length();\n\
    }\n}\n```\n\n另一方面，要将请求体映射为 Java 类型，类必须实现 `javax.ws.rs.ext.MessageBodyReader` 接口，并使用\
  \ `@Provider` 进行注解。默认情况下，该实现假定消费所有媒体类型（`*/*`）。清单 15-17 中的 `@Consumes` 注解用于指定我们自定义的媒体类型。`readFrom`\
  \ 方法接收输入流，使用 '`/`' 分隔符对其进行分词，并将其转换为 `Customer` 对象。如果 `MessageBodyReader` 和 `MessageBodyWriter`\
  \ 的实现无法生成任何表示形式，它们可能会抛出 `WebApplicationException`。\n\n***清单 15-17.***  一个消费自定义流并创建\
  \ `Customer` 的 Provider\n\n```\n@Provider\n@Consumes(\"custom/format\")\npublic\
  \ class CustomCustomerReader implements MessageBodyReader <Customer> {\n\n@Override\n\
    public boolean isReadable(Class<?> type, Type genericType, Annotation[] annotations,\
  \ →\n                                                             MediaType mediaType)\
  \ {\n    return Customer.class.isAssignableFrom(type);\n  }\n\n@Override\n  public\
  \ Customer readFrom(Class<Customer> type, Type gType, Annotation[] annotations,\
  \ →\n                      MediaType mediaType, MultivaluedMap<String, String> httpHeaders,\
  \ →\n                      InputStream inputStream) throws IOException, WebApplicationException\
  \ {\n\nString str = convertStreamToString(inputStream);\n    StringTokenizer s =\
  \ new StringTokenizer(str, \" / \");\n\nCustomer customer = new Customer();\n    customer.setId(s.nextToken());\n\
      customer.setFirstName(s.nextToken());\n    customer.setLastName(s.nextToken());\n\
  \nreturn customer;\n  }\n}\n```\n\n得益于我们的 `CustomCustomerWriter` 和 `CustomCustomerReader`，我们现在可以在服务与消费者之间来回交换由自定义格式表示的数据。RESTful\
  \ Web 服务只需声明正确的媒体类型，JAX-RS 运行时将处理其余部分：\n\n```\n@GET\n@Produces(\"custom/format\"\
  )\npublic Customer getCustomCustomer () {\n  return new Customer(\"1234\", \"John\"\
  , \"Smith\");\n}\n```\n\n我们的自定义格式是一个特例，但对于常见的媒体类型，JAX-RS 实现附带了一组默认的实体提供者（参见表 15-7）。因此，在大多数常见情况下，您无需担心实现自己的读取器和写入器。\n\
  \n表 15-7. JAX-RS 实现的默认提供者\n\n| 类型 | 描述 |\n| --- | --- |\n| `byte[]` | 所有媒体类型（`*/*`）\
  \ |\n| `java.lang.String` | 所有媒体类型（`*/*`） |\n| `java.io.InputStream` | 所有媒体类型（`*/*`）\
  \ |\n| `java.io.Reader` | 所有媒体类型（`*/*`） |\n| `java.io.File` | 所有媒体类型（`*/*`） |\n\
  | `javax.activation.DataSource` | 所有媒体类型（`*/*`） |\n| `javax.xml.transform.Source`\
  \ | XML 类型（`text/xml`，`application/xml`） |\n| `javax.xml.bind.JAXBElement` | JAXB\
  \ 类 XML 媒体类型（`text/xml`，`application/xml`） |\n| `MultivaluedMap<String,String>`\
  \ | 表单内容（`application/x-www-form-urlencoded`） |\n| `javax.ws.rs.core StreamingOutput`\
  \ | 所有媒体类型（`*/*`），仅 `MessageBodyWriter` |\n\n处理异常\n\n到目前为止，代码都在一个一切正常、无需异常处理的理想世界中执行。不幸的是，现实并非如此完美，迟早你会遇到资源崩溃的情况，要么是因为接收到的数据无效，要么是因为网络部分不可靠。\n\
  \n资源方法可以抛出任何已检查或未检查的异常。未检查的异常可以被重新抛出并允许传播到底层容器。相反，已检查的异常不能直接抛出，必须包装在特定于容器的异常（`ServletException`、`WebServiceException`\
  \ 或 `WebApplicationException`）中。但你也可以抛出 `javax.ws.rs.WebApplicationException` 或其子类（`BadRequestException`、`ForbiddenException`、`NotAcceptableException`、`NotAllowedException`、`NotAuthorizedException`、`NotFoundException`、`NotSupportedException`）。该异常将被\
  \ JAX-RS 实现捕获并转换为 HTTP 响应。默认错误是带有空白消息的 500 错误，但 `javax.ws.rs.WebApplicationException`\
  \ 类提供了多种构造方法，因此你可以选择特定的状态码（定义在枚举 `javax.ws.rs.core.Response.Status` 中）或一个实体。在清单\
  \ 15-18 中，如果客户 ID 小于 1000，`getCustomer` 方法会抛出一个未检查异常（`IllegalArgumentException`）；如果在数据库中未找到该客户，则会抛出一个\
  \ `404-Not Found` 错误（它本可以抛出 `NotFoundException`）。\n\n***清单 15-18.***  一个抛出异常的方法\n\
  \n```\n@Path(\"/customer\")\npublic class CustomerRestService {\n\n@Inject\n  private\
  \ CustomerEJB customerEJB;\n\n@Path(\"{customerId}\")\n  public Customer getCustomer(@PathParam(\"\
  customerId\") Long customerId) {\n    if (customerId < 1000)\n      throw new IllegalArgumentException(\"\
  Id must be greater than 1000!\");\n\nCustomer customer = customerEJB.find(customerId);\n\
      if (customer == null)\n      throw new WebApplicationException(Response.Status.NOT_FOUND);\n\
      return customer;\n  }\n}\n```\n\n为了保持代码的 DRY（即 Don't Repeat Yourself，不要重复自己）原则，你可以提供异常映射提供者。异常映射提供者将通用异常映射到\
  \ `Response`。如果抛出此异常，JAX-RS 实现将捕获它并调用相应的异常映射提供者。异常映射提供者是 `ExceptionMapper<E extends\
  \ java.lang.Throwable>` 的实现，并使用 `@Provider` 进行注解。清单 15-19 将 `javax.persistence.EntityNotFoundException`\
  \ 映射到 `404-Not Found` 状态码。\n\n***清单 15-19.***  一个映射到 404-Not Found 状态码的 JPA 异常\n\
  \n```\n@Provider\npublic class EntityNotFoundMapper implements ExceptionMapper <EntityNotFoundException>\
  \ {\n\npublic Response toResponse(javax.persistence.EntityNotFoundException ex)\
  \ {\n    return Response.status(404).entity(ex.getMessage()).type(MediaType.TEXT_PLAIN).build();\n\
    }\n}\n```\n\n生命周期与回调\n\n当请求到来时，会解析目标 RESTful Web 服务，并创建匹配类的新实例。因此，RESTful Web\
  \ 服务的生命周期是每个请求一次，所以服务无需担心并发问题，可以安全地使用实例变量。\n\n如果部署在 Java EE 容器（Servlet 或 EJB）中，JAX-RS\
  \ 资源类和提供者还可以使用 JSR 250 生命周期管理和安全注解：`@PostConstruct`、`@PreDestroy`、`@RunAs`、`@RolesAllowed`、`@PermitAll`、`@DenyAll`\
  \ 和 `@DeclareRoles`。资源的生命周期可以使用 `@PostConstruct` 和 `@PreDestroy` 在资源创建后或销毁前添加业务逻辑。图\
  \ 15-3 显示了与 Java EE 中大多数组件等效的生命周期。\n\n![9781430246268_Fig15-03.jpg](img/9781430246268_Fig15-03.jpg)\n\
  \n\n\n图 15-3. 资源生命周期\n\n打包\n\nRESTful Web 服务可以打包为 war 文件或 EJB jar 文件，具体取决于您使用的是\
  \ Web Profile 还是完整的 Java EE 7 服务。请记住，RESTful Web 服务也可以使用 `@Stateless` 或 `@Singleton`\
  \ 进行注解，以利用会话 Bean 的服务。SOAP Web 服务有多个需要打包的生成工件，但 REST 并非如此。开发人员只需打包使用 `@Path` 注解的类（以及其他辅助类）。请注意，JAX-RS\
  \ 2.0 中没有部署描述符。\n\n调用 RESTful Web 服务\n\n现在您已经知道如何开发能够处理数据、对数据库执行 CRUD 操作、从服务器获取信息等的\
  \ RESTful Web 服务。那么如何访问它们呢？回顾一下图 15-1，这仅仅是在 URI 上发起 HTTP 请求的问题。使用任何能够做到这一点的工具，您都可以调用到目前为止所见的所有\
  \ RESTful Web 服务。\n\n我们首先想到的工具是 Web 浏览器。打开浏览器，将其指向一个 URI，您将获得可视化表示。不幸的是，Web 浏览器只知道如何执行\
  \ GET 和 POST HTTP 方法。如果您想从 Web 浏览器中获得更多功能，可以添加一些插件来获得更多灵活性，并同时使用 PUT 和 DELETE（例如，Chrome\
  \ 上的 Postman，但还有更多）。另一个非常强大的工具是 cUrl。使用这个命令行工具，您可以访问 HTTP 协议的所有细节，从而调用您的 RESTful\
  \ Web 服务。\n\n在 JAX-RS 2.0 之前，没有标准的 Java 方法来轻松调用您的 RESTful Web 服务。您要么依赖底层的 `java.net.HttpURLConnection`\
  \ API，要么使用专有框架 API（例如 Jersey、Resteasy 或 Restlet）。JAX-RS 2.0 通过一个流畅、易用的请求构建 API 填补了这一空白。\n\
  \n客户端 API\n\nJAX-RS 2.0 引入了一个新的客户端 API，使您可以轻松地向远程 RESTful Web 服务发起 HTTP 请求（尽管有 HTTP\
  \ 协议的所有底层细节）。它是一个流畅的请求构建 API（即使用构建器设计模式），使用少量类和接口（参见表 15-8 了解 `javax.ws.rs.client`\
  \ 包的概述，以及表 15-6 了解 `Response` API）。通常，您会遇到三个主要类：`Client`、`WebTarget` 和 `Response`。`Client`\
  \ 接口（通过 `ClientBuilder` 获取）是 `WebTarget` 实例的构建器。`WebTarget` 表示一个特定的 URI，您可以从中调用请求以获取\
  \ `Response`。从这个 Response 中，您可以检查 HTTP 状态、长度或 Cookie，但更重要的是，您可以通过 `Entity` 类获取其内容（也称为实体、消息体或有效载荷）。\n\
  \n表 15-8. javax.ws.rs.client 包的主要类和接口\n\n| 类/接口 | 描述 |\n| --- | --- |\n| `Client`\
  \ | 是流畅 API 的主要入口点，用于构建和执行客户端请求以消费返回的响应 |\n| `ClientBuilder` | 客户端 API 的入口点，用于引导\
  \ `Client` 实例 |\n| `Configurable` | 来自 `Client`、`WebTarget` 和 `Invocation` 的客户端配置\
  \ |\n| `Entity` | 封装消息实体，包括关联的变体信息 |\n| `Invocation` | 已准备好并准备执行的请求 |\n| `Invocation.Builder`\
  \ | 客户端请求调用构建器 |\n| `WebTarget` | 由资源 URI 标识的资源目标 |\n\n让我们逐步了解如何使用这个新 API，然后将所有内容整合起来测试一个\
  \ RESTful Web 服务。\n\n引导客户端\n\nAPI 的主要入口点是 `Client` 接口。`Client` 接口管理和配置 HTTP 连接。它也是\
  \ `WebTargets` 的工厂，并拥有一组用于创建资源链接和调用的方法。`Client` 实例是使用 `ClientBuilder` 类的静态方法之一创建的：\n\
  \n```\nClient client = ClientBuilder.newClient();\n```\n\n此示例演示了使用默认实现创建 `Client`\
  \ 实例的方法。也可以使用特定配置请求特定的自定义 `Client` 实现。例如，以下代码注册了 `CustomCustomerReader` 提供程序（参见清单\
  \ 15-17）并设置了一些属性：\n\n```\nClient client = ClientBuilder.newClient();\nclient.configuration().register(CustomCustomerReader.class).setProperty(\"\
  MyProperty\", 1234);\n```\n\n目标和调用\n\n一旦有了 `Client`，您现在就可以定位一个 RESTful Web 服务 URI\
  \ 并在其上调用一些 HTTP 方法。这就是 `WebTarget` 和 `Invocation` 接口允许您做的事情。`Client.target()` 方法是表示特定\
  \ URI 的 Web 目标的工厂。您从 `WebTarget` 实例构建和执行请求。您可以使用 URI 的字符串表示形式创建 `WebTarget`：\n\n\
  ```\nWebTarget target = client.target(\" http://www.myserver.com/book \");\n```\n\
  \n您也可以从 `java.net.URI`、`javax.ws.rs.core.UriBuilder` 或 `javax.ws.rs.core.Link` 获取\
  \ `WebTarget`：\n\n```\nURI uri = new URI(\" http://www.myserver.com/book \");\n\
  WebTarget target = client.target(uri);\n```\n\n现在您有了要定位的 URI，需要构建您的 HTTP 请求。`WebTarget`\
  \ 允许您通过使用 `Invocation.Builder` 来做到这一点。要构建一个简单的 HTTP GET 请求到 URI，只需编写：\n\n```\nInvocation\
  \ invocation  = target.request().buildGet()\n```\n\n`Invocation.Builder` 允许您构建 GET\
  \ 方法以及 POST、PUT 和 DELETE 方法。您还可以为不同的 MIME 类型构建请求，甚至添加路径、查询和矩阵参数。对于 PUT 和 POST 方法，您需要传递一个\
  \ `Entity`，它表示要发送到 RESTful Web 服务的有效载荷：\n\n```\ntarget.request(). buildDelete ();\n\
  target. queryParam (\"author\", \"Eloise\").request().buildGet();\ntarget. path\
  \ (bookId).request().buildGet();\ntarget.request(MediaType.APPLICATION_XML).buildGet();\n\
  target.request(MediaType.APPLICATION_XML). acceptLanguage (\"pt\").buildGet();\n\
  target.request().buildPost( Entity.entity(new Book() ));\n```\n\n这段代码只是构建了一个 `Invocation`。然后您需要调用\
  \ `invoke()` 方法来实际调用您的远程 RESTful Web 服务并获取一个 `Response` 对象。`Response` 定义了与返回实例的契约，并且是您将要消费的内容：\n\
  \n```\nResponse response = invocation.invoke();\n```\n\n因此，如果您将所有内容放在一起，以下是调用位于\
  \ `http://www.myserver.com/book` 的远程 RESTful Web 服务上的 GET 方法并返回 `text/plain` 值的代码行：\n\
  \n```\nClient client = ClientBuilder.newClient();\nWebTarget target = client. target\
  \ (\" http://www.myserver.com/book \");\nInvocation invocation  = target. request\
  \ (MediaType.TEXT_PLAIN). buildGet ();\nResponse response = invocation.invoke();\n\
  ```\n\n得益于构建器 API 和一些快捷方式，您可以用一行代码编写相同的行为：\n\n```\nResponse response = ClientBuilder.newClient().\
  \ target (\" http://www.myserver.com/book \") →\n                                            \
  \ . request (MediaType.TEXT_PLAIN). get ();\n```\n\n现在让我们看看如何操作 `Response` 以及如何消费实体。\n\
  \n消费响应\n\n\n\n`Response` 类允许使用者对 RESTful Web 服务返回的 HTTP 响应进行一定程度的控制。通过其 API，你可以检查\
  \ HTTP 状态、标头、Cookie，当然还有消息体（即实体）。下面的代码使用内置方法来访问一些低层级的 HTTP 信息，例如状态码、消息体长度、消息日期或任何\
  \ HTTP 标头：\n\n```\nassertTrue(response. getStatusInfo () == Response.Status.OK );\n\
  assertTrue(response. getLength () == 4);\nassertTrue(response. getDate () != null);\n\
  assertTrue(response. getHeaderString (\"Content-type\").equals(\"text/plain\"));\n\
  ```\n\n但大多数时候，我们真正想从 `Response` 中获取的是 RESTful Web 服务发送的实体。`readEntity` 方法使用支持将消息实体流映射到请求类型的\
  \ `MessageBodyReader`，将消息输入流读取为指定 Java 类型的实例。这意味着，如果你指定想要一个 `String`，JAX-RS 运行时将使用默认的\
  \ String 读取器：\n\n```\nString body = response. readEntity (String.class);\n```\n\n\
  当使用 POJO 调用 `readEntity()` 方法时，JAX-RS 运行时需要一个与响应内容类型匹配的 `MessageBodyReader`。因此，例如，如果\
  \ `Book` 是一个 JAXB bean，并且你的内容类型是 XML，那么 JAX-RS 将委托 JAXB 运行时将 XML 流解组到你的 `Book` POJO\
  \ 中：\n\n```\nBook book = response.readEntity( Book.class );\n```\n\n综合起来，下面的代码调用一个远程\
  \ RESTful Web 服务并获取返回的 String 实体：\n\n```\nResponse response = ClientBuilder.newClient().target(\"\
  \ http://www.myserver.com/book \") →\n                                            \
  \ .request().get();\nString body = response. readEntity(String.class) ;\n```\n\n\
  但实际上，`Get` 方法上有一个快捷方式，允许你在一行代码中指定所需的类型并获取实体（无需使用中间的 `Response` 对象）：\n\n```\nString\
  \ body = ClientBuilder.newClient().target(\" http://www.myserver.com/book \") →\n\
                                         .request(). get(String.class) ;\n```\n\n\
  REST 消费者的结构\n\n与嵌入在 Java SE 中并允许你使用 JDK 开箱即用地调用 SOAP Web 服务的 JAX-WS 不同，使用 JAX-RS\
  \ 时，你需要在类路径中包含客户端 API。但这是唯一的限制。与 SOAP 不同，你无需生成任何工件。因此，RESTful Web 服务消费者可以是 JVM 上运行的任何\
  \ Java 类（主类、集成测试、批处理），也可以是容器中运行的任何 Java EE 组件（Servlet、EJB、托管 Bean）。\n\n当然，RESTful\
  \ Web 服务的优势之一是可互操作性。因此，如果你在互联网上公开一组资源，你将能够让移动设备（智能手机、平板电脑）和其他 Web 技术（例如 JavaScript）访问它们。\n\
  \n综合运用\n\n让我们将所有概念整合在一起，编写一个图书 RESTful Web 服务，将其打包并部署到 GlassFish 中，然后使用 cURL 和使用新客户端\
  \ API 的集成测试对其进行测试。其思路是拥有一个 `Books` JAXB bean，其中包含映射到数据库的 `Book` JPA 实体列表。`BookRestService`\
  \ 提供对图书的 CRUD 操作。尽管它是一个 RESTful Web 服务，但它也是一个无状态会话 bean，允许事务划分（使用 `EntityManager`）。部署后，你将能够使用\
  \ cURL 和 JAX-RS 客户端 API 通过 HTTP 方法创建、检索或删除图书。得益于 JAXB 和 Jersey 的扩展，你将能够获得这些图书的 XML\
  \ 和 JSON 表示形式。\n\n该示例遵循 Maven 目录结构，并将所有类打包到一个 war 文件（`chapter15-service-1.0.war`）中。图\
  \ 15-4 中描述的类必须放置在以下目录中：\n\n*   `src/main/java`：`Books`、`Book` 实体和 `BookRestService`\
  \ 以及用于配置运行时的技术类（稍后详细介绍 `ApplicationConfig`）的目录\n*   `src/main/resources`：资源使用的 `persistence.xml`\
  \ 文件，用于将 `Book` 实体映射到 Derby 数据库\n*   `src/test/java`：集成测试 `BookRestServiceIT` 的目录\n\
  *   `pom.xml`：描述项目及其依赖项的 Maven 项目对象模型（POM）\n\n![9781430246268_Fig15-04.jpg](img/9781430246268_Fig15-04.jpg)\n\
  \n图 15-4. 综合运用\n\n编写 Book 实体\n\n到目前为止，你已经理解了 `Book` 实体的代码，但有一个非常重要的元素需要注意：该实体还使用了\
  \ JAXB 的 `@XmlRootElement` 注解（参见清单 15-20），这使其能够拥有图书的 XML 表示形式（以及通过 Jersey 扩展实现的\
  \ JSON，稍后你将看到）。\n\n***清单 15-20.***  带有 JAXB 注解的 `Book` 实体\n\n```\n@Entity\n@XmlRootElement\n\
  @NamedQuery(name = Book.FIND_ALL, query = \"SELECT b FROM Book b\")\npublic class\
  \ Book {\n\npublic static final String FIND_ALL = \"Book.findAll\";\n\n@Id\n  @GeneratedValue\n\
    private String id;\n  @Column(nullable = false)\n  private String title;\n  private\
  \ Float price;\n  @Column(length = 2000)\n  private String description;\n  private\
  \ String isbn;\n  private Integer nbOfPage;\n  private Boolean illustrations;\n\n\
  // 构造函数、getter、setter\n}\n```\n\n该实体还必须与一个 `persistence.xml` 文件一起打包（为简洁起见，此处未显示）。\n\
  \n编写 Books JAXB Bean\n\nRESTful Web 服务的方法之一是从数据库中检索所有图书。该方法本可以返回一个 `List<Book>`，但这不允许\
  \ JAXB 编组。为了获得图书列表的 XML 表示形式，我们需要一个带有 JAXB 注解的 POJO。如清单 15-21 所示，`Books` 类继承自 `ArrayList<Book>`，并带有一个\
  \ `@XmlRootElement` 注解。\n\n***清单 15-21.***  包含 `Book` 列表的 `Books` JAXB Bean\n\n\
  ```\n@XmlRootElement\n@XmlSeeAlso(Book.class)\npublic class Books extends ArrayList<Book>\
  \ {\n\npublic Books() {\n    super();\n  }\n\npublic Books(Collection<? extends\
  \ Book> c) {\n    super(c);\n  }\n\n@XmlElement(name = \"book\")\n  public List<Book>\
  \ getBooks() {\n    return this;\n  }\n\npublic void setBooks(List<Book> books)\
  \ {\n    this.addAll(books);\n  }\n}\n```\n\n编写 BookRestService\n\n`BookRestService`\
  \ 是一个 RESTful Web 服务，实现为无状态会话 bean，使用实体管理器来创建、删除和检索图书。让我们将类分成几个部分并逐一解释。\n\n类头\n\n\
  `BookRestService` 的类头（参见清单 15-22）很重要，因为它使用了多个元数据注解。在 JAX-RS 中，用户通过调用 URI 来访问服务。`@Path(\"\
  /book\")` 注解指示资源的根路径（用于访问它的 URL）——在本例中，它类似于 `http://localhost:8080/book`。\n\n***清单\
  \ 15-22.***  `BookRestService` 类的类头\n\n```\n@Path(\"/book\")\n@Produces ({MediaType.APPLICATION_XML,\
  \ MediaType.APPLICATION_JSON})\n@Consumes ({MediaType.APPLICATION_XML, MediaType.APPLICATION_JSON})\n\
  @Stateless\npublic class BookRestService {\n\n@PersistenceContext(unitName = \"\
  chapter15PU\")\n  private EntityManager em;\n  @Context\n  private UriInfo uriInfo;\n\
    // ...\n```\n\n\n\n`@Produces`和`@Consumes`注解定义了该资源默认生成或消费的内容类型：XML 和 JSON。最后，我们看到了第\
  \ 7 章中见过的`@Stateless`注解，它告知容器这个 RESTful Web 服务也应被视为一个 EJB，并在访问数据库时允许事务划分。该服务引用了注入其中的实体管理器和`UriInfo`。\n\
  \n创建新书\n\n遵循 REST 语义，我们使用 HTTP `POST`方法以 XML 或 JSON 格式（如`@Consumes`注解在头部所指定）创建新资源。默认情况下，每个方法都消费\
  \ XML 或 JSON，`createBook()`方法也是如此。如清单 15-23 所示，该方法接受一个`Book`作为参数；请记住，`Book`实体也是一个\
  \ JAXB 对象，一旦 XML 被解组为`Book`对象，实体管理器就可以持久化它。如果`book`参数为 null，则会抛出`BadRequestException`（`400-Bad\
  \ Request`）。\n\n***清单 15-23.***  `BookRestService`的`createBook`方法\n\n```\n  // ...\n\
    @POST\n  public Response createBook(Book book) {\n    if (book == null)\n      throw\
  \ new BadRequestException ();\n\nem.persist(book);\n    URI bookUri = uriInfo.getAbsolutePathBuilder().path(book.getId()).build();\n\
      return Response.created(bookUri) .build();\n  }\n  // ...\n```\n\n该方法返回一个`Response`，即新创建书籍的\
  \ URI。我们本可以返回状态码`200-OK`（`Response.ok()`），表示书籍创建成功，但遵循 REST 原则，该方法应返回 201（或 204），指明请求已完成并导致新资源的创建（`Response.created()`）。新创建的资源可以通过响应中返回的\
  \ URI（`bookUri`）进行引用。\n\n要使用清单 15-23 中的代码创建资源，我们可以选择发送 XML 或 JSON。JSON 更为简洁。cURL\
  \ 命令行使用`POST`方法，并以 JSON 格式传递数据，该格式必须遵循 Jersey 中使用的 JSON/XML 映射（请记住，XML 又是使用 JAXB\
  \ 规则从`Book`对象映射而来的）：\n\n```\n$ curl -X POST --data-binary \"{\\\"description\\\"\
  :\\\"科幻喜剧书\\\",\\\n \\\"illustrations\\\":false,\\\"isbn\\\":\\\"1-84023-742-2\\\
  \",\\\"nbOfPage\\\":354,\\\"price\\\":12.5,\\\n \\\"title\\\":\\\"银河系漫游指南\\\"}\"\
    \\\n -H \"Content-Type: application/json \" http://localhost:8080/chapter15-service-1.0/rs/book\
  \ -v\n```\n\ncURL 的详细模式（`-v`参数）会显示 HTTP 请求和响应（如下输出所示）。你可以在响应中看到创建的书籍资源的 URI，其 ID\
  \ 设置为 601：\n\n```\n> POST /chapter15-service-1.0/rs/book HTTP/1.1\n> User-Agent:\
  \ curl/7.23.1 (x86_64-apple-darwin11.2.0) libcurl/7.23.1\n> Host: localhost:8080\n\
  > Accept: */*\n> Content-Type: application/json\n> Content-Length: 165\n>\n< HTTP/1.1\
  \ 201 Created\n< Server: GlassFish Server Open Source Edition  4.0\n< Location:\
  \ http://localhost:8080/chapter15-service-1.0/rs/book/601\n< Date: Thu, 29 Nov 2012\
  \ 21:49:44 GMT\n< Content-Length: 0\n```\n\n按 ID 获取书籍\n\n要按标识符检索书籍，请求的 URL 格式必须为`/book/{书的\
  \ id}`。`id`用作在数据库中查找书籍的参数。在清单 15-24 中，如果未找到书籍，则会抛出`NotFoundException`（404）。根据 MIME\
  \ 类型，`getBook()`方法将返回书籍的 XML 或 JSON 表示。\n\n***清单 15-24.***  `BookRestService`的`getBook`方法\n\
  \n```\n// ...\n@GET\n@Path(\"{id}\")\npublic Response getBook( @PathParam(\"id\"\
  ) String id) {\n  Book book = em.find(Book.class, id);\n\nif (book == null)\n    throw\
  \ new NotFoundException ();\n\nreturn Response.ok(book) .build();\n}\n// ...\n```\n\
  \n`@Path`注解指示了在类级别已指定路径内的子路径。使用`{id}`语法将 URL 元素绑定到方法参数。让我们使用 cURL 访问 id 为 601 的书籍并获取\
  \ JSON 表示：\n\n```\n$ curl -X GET -H \"Accept: application/json \" \\\n                  http://localhost:8080/chapter15-service-1.0/rs/book/601\n\
  {\"description\":\"科幻喜剧书\",\"id\":\"1\",\"illustrations\":false, \\\n                      \"\
  isbn\":\"1-84023-742-2\",\"nbOfPage\":354,\"price\":12.5,\"title\":\"H2G2\"}\n```\n\
  \n只需更改`Accept`头部属性，相同的代码将返回书籍 601 的 XML 表示：\n\n```\n$ curl -X GET -H \"Accept: application/xml\
  \ \" \\\n                  http://localhost:8080/chapter15-service-1.0/rs/book/601\n\
  <?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?><book><description>科幻喜剧书</description><id>601</id><illustrations>false</illustrations>978-1-4302-4188-1\
  \ \\\n1-84023-742-2</isbn><nbOfPage>354</nbOfPage><price>12.5</price><title>H2G2</title></book>\n\
  ```\n\n获取所有书籍\n\n要从数据库获取所有书籍，清单 15-25 中的代码使用了`TypedQuery`，其结果被设置到`Books`类中。请记住，这个类扩展了`ArrayList<Book>`，并凭借其\
  \ JAXB 注解提供了列表的 XML 表示。响应返回`200-OK`状态，并在消息体中包含书籍表示。\n\n***清单 15-25.***  `BookRestService`的`getBooks`方法\n\
  \n```\n// ...\n@GET\npublic Response getBooks() {\n  TypedQuery<Book> query = em.createNamedQuery(Book.FIND_ALL,\
  \ Book.class);\n  Books books = new Books(query.getResultList()) ;\n  return Response.ok(\
  \ books ).build();\n}\n// ...\n```\n\n同样，如果你想用 cURL 快速测试这段代码，打开命令行并输入以下命令，以获取书籍列表的\
  \ XML 或 JSON 表示：\n\n```\n$ curl -X GET -H \"Accept: application/ json \" \\\n                          http://localhost:8080/chapter15-service-1.0/rs/book\n\
  $ curl -X GET -H \"Accept: application/ xml \" \\\n                          http://localhost:8080/chapter15-service-1.0/rs/book\n\
  ```\n\n删除书籍\n\n清单 15-26 中的`deleteBook()`方法遵循`getBook()`方法的格式，因为它使用了子路径和 ID 作为参数，唯一的区别是使用的\
  \ HTTP 请求（`DELETE`而非`GET`）。如果在数据库中未找到书籍，则抛出`NotFoundException`，否则删除书籍并返回`204-No\
  \ Content`。\n\n***清单 15-26.***  `BookRestService`的`deleteBook`方法\n\n```\n// ...\n\
  @DELETE\n@Path(\"{id}\")\npublic Response deleteBook( @PathParam(\"id\") String\
  \ id ) {\n  Book book = em.find(Book.class, id );\n\nif (book == null)\n    throw\
  \ new NotFoundException();\n\nem.remove(book);\n\nreturn Response.noContent().build();\n\
  }\n// ...\n```\n\n如果我们使用 cURL 的详细模式（`-v`参数），我们将看到发送了`DELETE`请求，并且响应中出现了`204-No Content`状态码，表明该资源已不存在。\n\
  \n```\n$ curl -X DELETE http://localhost:8080/chapter15-service-1.0/rs/book/601\
  \ -v\n> DELETE /chapter15-service-1.0/rs/book/601 HTTP/1.1\n> User-Agent: curl/7.23.1\
  \ (x86_64-apple-darwin11.2.0) libcurl/7.23.1\n> Host: localhost:8080\n> Accept:\
  \ */*\n>\n< HTTP/1.1 204 No Content\n< Server: GlassFish Server Open Source Edition  4.0\n\
  ```\n\n配置 JAX-RS\n\n\n\n在部署 `BookRestService` 和 `Book` 实体之前，我们需要在 Jersey 中注册一个 URL\
  \ 模式，用于拦截发往服务的 HTTP 调用。这样，发送到 `/rs` 路径的请求就会被 Jersey 拦截。你可以通过在 `web.xml` 文件中配置 Jersey\
  \ Servlet 来设置此 URL 模式，也可以使用 `@ApplicationPath` 注解（参见清单 15-27）。`ApplicationConfig`\
  \ 类需要继承 `javax.ws.rs.core.Application`，并定义应用程序的所有 RESTful Web 服务（此处为 `c.add(BookRestService.class)`）以及任何其他必要的扩展（`c.add(MOXyJsonProvider.class)`）。\n\
  \n***清单 15-27.***  声明 `/rs` URL 模式的 `ApplicationConfig` 类\n\n```\n@ApplicationPath(\"\
  rs\")\npublic class ApplicationConfig extends Application {\n\nprivate final Set<Class<?>>\
  \ classes;\n\npublic ApplicationConfig() {\n    HashSet<Class<?>> c = new HashSet<>();\n\
      c.add( BookRestService.class );\n\nc.add( MOXyJsonProvider.class );\n\nclasses\
  \ = Collections.unmodifiableSet(c);\n  }\n\n@Override\n  public Set<Class<?>> getClasses()\
  \ {\n    return classes;\n  }\n}\n```\n\n此类必须位于项目中的某个位置（无特定包要求），并且借助 `@ApplicationPath`\
  \ 注解，它将请求映射到 `/rs/*` URL 模式。这意味着，每当 URL 以 `/rs/` 开头时，它都将由 Jersey 处理。实际上，在我使用 cURL\
  \ 的示例中，所有资源 URL 都以 `/rs` 开头：\n\n```\n$ curl -X GET -H \"Accept: application/json\"\
  \ →\n                          http://localhost:8080/chapter15-service-1.0/rs/book\n\
  ```\n\n![image](img/sq.jpg) **注意**  在第 12 章中，你已经看到了关于 XML 和 JSON 的几个规范。存在两组规范：处理（JAXP\
  \ 和 JSON-P）和绑定（JAXB）。借助绑定，JAX-RS 将使用基于 JAXB 的内置 `MessageBodyReader` 和 `MessageBodyWriter`\
  \ 将 Bean 列表转换为 XML。不幸的是，JSON 的绑定技术尚不存在（预计在未来几年内出现，可能会被称为 JSON-B）。因此，目前无法自动将 Bean\
  \ 编组为 JSON。这就是为什么在 `ApplicationConfig` 类中，我们需要添加一个 Jersey 特定的提供程序（`MOXyJsonProvider`）来获得\
  \ JSON 的 `MessageBodyReader` 和 `MessageBodyWriter`。但这在 JAX-RS 实现之间是不可移植的。\n\n使用\
  \ Maven 编译和打包\n\n现在，所有类都需要编译并打包成一个 war 文件（`<packaging>war</packaging>`）。清单 15-28\
  \ 中的 `pom.xml` 声明了编译代码所需的所有依赖项（这些依赖项都在 `glassfish-embedded-all` 中）。请记住，JAXB 是 Java\
  \ SE 的一部分，因此我们不需要添加此依赖项。请注意，`pom.xml` 声明了 Failsafe 插件，该插件旨在运行集成测试（稍后用于运行 `BookRestServiceIT`\
  \ 集成测试类）。\n\n***清单 15-28.***  用于编译、测试和打包 RESTful Web 服务的 pom.xml 文件\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\" http://maven.apache.org/POM/4.0.0\
  \ \" →\n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \" →\n        \
  \ xsi:schemaLocation=\" http://maven.apache.org/POM/4.0.0 →\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\
  \ \">\n  <modelVersion>4.0.0</modelVersion>\n\n<parent>\n    <artifactId>chapter15</artifactId>\n\
      <groupId>org.agoncal.book.javaee7</groupId>\n    <version>1.0</version>\n  </parent>\n\
  \n<groupId>org.agoncal.book.javaee7.chapter15</groupId>\n  <artifactId>chapter15-service</artifactId>\n\
    <version>1.0</version>\n  <packaging>war</packaging>\n\n<dependencies>\n    <dependency>\n\
        <groupId>org.glassfish.main.extras</groupId>\n      <artifactId> glassfish-embedded-all\
  \ </artifactId>\n      <version>4.0</version>\n      <scope>provided</scope>\n    </dependency>\n\
  \n<dependency>\n      <groupId>junit</groupId>\n      <artifactId>junit</artifactId>\n\
        <version>4.11</version>\n      <scope>test</scope>\n    </dependency>\n  </dependencies>\n\
  \n<build>\n    <plugins>\n      <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n\
          <artifactId>maven-compiler-plugin</artifactId>\n        <version>2.5.1</version>\n\
          <configuration>\n          <source> 1.7 </source>\n          <target>1.7</target>\n\
          </configuration>\n      </plugin>\n      <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n\
          <artifactId>maven-war-plugin</artifactId>\n        <version>2.2</version>\n\
          <configuration>\n          <failOnMissingWebXml>false</failOnMissingWebXml>\n\
          </configuration>\n      </plugin>\n      <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n\
          <artifactId> maven-failsafe-plugin </artifactId>\n        <version>2.12.4</version>\n\
          <executions>\n          <execution>\n            <id>integration-test</id>\n\
              <goals>\n              <goal> integration-test </goal>\n              <goal>verify</goal>\n\
              </goals>\n          </execution>\n        </executions>\n      </plugin>\n\
      </plugins>\n  </build>\n</project>\n```\n\n要编译和打包这些类，请在包含 `pom.xml` 文件的根目录中打开命令行，并输入以下\
  \ Maven 命令：\n\n```\n$ mvn package\n```\n\n转到 `target` 目录，查找名为 `chapter15-service-1.0.war`\
  \ 的文件，并将其打开。请注意，`Book.class`、`Books.class`、`ApplicationConfig.class` 和 `BookRestService.class`\
  \ 都在 `WEB-INF\\classes` 目录下。`persistence.xml` 文件也已打包在 war 文件中。\n\n部署到 GlassFish\n\
  \n代码打包后，确保 GlassFish 和 Derby 已启动并正在运行，然后通过 `asadmin` 命令行界面部署 war 文件。打开控制台，转到 `chapter15-service-1.0.war`\
  \ 文件所在的 `target` 目录，然后输入：\n\n```\n$ asadmin deploy chapter15-service-1.0.war\n```\n\
  \n如果部署成功，以下命令应返回已部署组件的名称及其类型：\n\n```\n$ asadmin list-components\nchapter15-service-1.0\
  \ <ejb, web>\n```\n\n现在应用程序已部署，你可以在命令行中使用 cURL 通过发送 POST 请求来创建图书资源，并通过 GET 请求获取所有或特定资源。DELETE\
  \ 将删除图书资源。\n\nWADL\n\n我在本章开头介绍了 WADL（Web 应用程序描述语言），并指出它尚未标准化，在 RESTful 架构中使用不多。但如果你想了解它对于我们的\
  \ `BookRestService` RESTful Web 服务可能是什么样子，请查看以下 URL：`http://localhost/8080/chapter15-service-1.0/rs/`application.wadl。清单\
  \ 15-29 显示了此 WADL 的摘要。\n\n***清单 15-29.***  GlassFish 为 `BookRestService` RESTful\
  \ Web 服务生成的 WADL 摘录\n\n```\n<application xmlns=\" http://wadl.dev.java.net/2009/02\
  \ \">\n  <resources base=\" http://localhost:8080/chapter15-service-1.0/rs/ \">\n\
      <resource path=\" /book \">\n      <method id=\" POST \" name=\"POST\">\n        <request>\n\
            <representation element=\"book\" mediaType=\"application/xml\"/>\n          <representation\
  \ element=\"book\" mediaType=\"application/json\"/>\n        </request>\n      </method>\n\
        <resource path=\" {id} \">\n        <param name=\"id\" style=\"template\"\
  \ type=\"xs:string\"/>\n        <method id=\" GET{id} \" name=\"GET\">\n          <response>\n\
              <representation mediaType=\"application/xml\"/>\n            <representation\
  \ mediaType=\"application/json\"/>\n          </response>\n        </method>\n        <method\
  \ id=\" DELETE{id} \" name=\"DELETE\"/>\n      </resource>\n    </resource>\n    ...\n\
    </resources>\n</application>\n```\n\n\n\n清单 15-29 中的 WADL 描述了根路径（`http://localhost:8080/chapter15-service-1.0/rs/`）以及\
  \ RESTful 服务中所有可用的子路径（`/book`和`{id}`）。它还列出了你可以调用的 HTTP 方法（`POST`、`GET`、`DELETE`……）。\n\
  \n编写 BookRestServiceIT 集成测试\n\n现在代码已打包并部署到 GlassFish 中，我们可以编写一个集成测试，使用新的 JAX-RS\
  \ 2.0 `Client` API 向 RESTful Web 服务发送 HTTP 请求。集成测试与单元测试不同，因为它们不是孤立地测试代码，而是需要所有容器服务的支持。通常，如果\
  \ GlassFish 和 Derby 没有启动并运行，清单 15-30 中的代码将无法工作。\n\n前两个方法测试失败场景。`shouldNotCreateANullBook`确保你不能用空的`Book`对象创建书籍。因此，它发送一个空实体，并期望返回`400-Bad\
  \ Request`。`shouldNotFindTheBookID`测试用例传入一个未知的书籍 ID，并期望返回`404-Not Found`。\n\n`shouldCreateAndDeleteABook`测试用例稍微复杂一些，因为它调用了多个操作。首先，它发送一个`Book`对象的\
  \ XML 表示，并确保状态码为`201-Created`。`bookURI`变量是新创建书籍的 URI。该测试用例使用此 URI 请求新书籍，然后读取消息体，将其转换为`Book`类（`book\
  \ = response.readEntity(Book.class)`），并断言值正确。接着，一个 DELETE 调用从数据库中删除该书，并检查响应状态码是否为`204-No\
  \ Content`。最后，对该资源执行一次 GET 操作，通过检查`404-Not Found`状态码来确认该书已被删除。\n\n***清单 15-30.***  `ApplicationConfig`类声明/rs\
  \ URL 模式\n\n```\npublic class BookRestServiceIT {\n\nprivate static URI uri = UriBuilder.\n\
                 fromUri(\"http://localhost/chapter15-service-1.0/rs/book\").port(8080).build\
  \ ();\n  private static Client client = ClientBuilder.newClient();\n\n@Test\n  public\
  \ void shouldNotCreateANullBook() throws JAXBException {\n\n// 发送一个空 Book\n    Response\
  \ response = client.target(uri).request(). post (Entity.entity( null , →\n                                                          MediaType.APPLICATION_XML));\n\
      assertEquals(Response.Status. BAD_REQUEST , response.getStatusInfo());\n  }\n\
  \n@Test\n  public void shouldNotFindTheBookID() throws JAXBException {\n\n// 用未知\
  \ ID 获取 Book\n    Response response = client.target(uri).path(\" unknownID \").request().\
  \ get ();\n    assertEquals(Response.Status. NOT_FOUND , response.getStatusInfo());\n\
    }\n\n@Test\n  public void shouldCreateAndDeleteABook() throws JAXBException {\n\
  \nBook book = new Book(\"H2G2\", 12.5F, \"Science book\", \"1-84023-742-2\", 354,\
  \ false);\n\n// 发送一个 Book\n    Response response = client.target(uri).request().\
  \ post (Entity.entity( book , →\n                                                          MediaType.APPLICATION_XML));\n\
      assertEquals( Response.Status.CREATED , response.getStatusInfo());\n    URI\
  \ bookURI = response.getLocation() ;\n\n// 使用 location 获取 Book\n    response = client.target(\
  \ bookURI ).request(). get ();\n    book = response. readEntity (Book.class);\n\
      assertEquals(Response.Status.OK, response.getStatusInfo());\n    assertEquals(\"\
  H2G2\", book.getTitle());\n\n// 获取书籍 ID 并删除它\n    String bookId = bookURI.toString().split(\"\
  /\")[6];\n    response = client.target(uri).path(bookId).request(). delete ();\n\
      assertEquals(Response.Status. NO_CONTENT , response.getStatusInfo());\n\n//\
  \ 获取 Book 并检查它已被删除\n    response = client.target(bookURI).request(). get ();\n    assertEquals(Response.Status.\
  \ NOT_FOUND , response.getStatusInfo());\n\n}\n}\n```\n\n确保 GlassFish 和 Derby 已启动并运行，应用程序已部署，然后通过输入以下\
  \ Maven 命令，使用 Maven Failsafe 插件执行此集成测试：\n\n\n\n```\n$ mvn failsafe:integration-test\n\
  ```\n\n摘要\n\n上一章讲解了 SOAP Web 服务，现在你应该已经了解 JAX-WS 与 JAX-RS Web 服务之间的区别。REST 拥抱 HTTP，因此本章首先对资源、表示、可寻址性、连通性和统一接口进行了总体介绍。通过简单的动词（`GET`、`POST`、`PUT`\
  \ 等），你学会了如何访问部署在 Web 上的任何资源。\n\n随后，本章深入探讨了 HTTP，这是一种基于请求/响应机制的协议，用于交换由标头、Cookie\
  \ 和主体组成的消息。利用 HTTP 标头和内容协商，RESTful Web 服务可以从同一个 URI 中选择合适的内容类型。通过使用日期和 ETag 的条件请求，可以采用缓存来优化网络流量。由于\
  \ REST 基于 HTTP，这种优化同样适用于 REST。得益于新的 JAX-RS 2.0 客户端 API，我们能够以编程方式调用一些 RESTful Web\
  \ 服务。\n\nJAX-RS 是一个 Java API，随 Java EE 7 一起提供，它简化了 RESTful Web 服务的开发。通过一组注解，你可以定义资源的路径和子路径、提取不同类型的参数，或者映射到\
  \ HTTP 方法（`@GET`、`@POST` 等）。在开发 RESTful Web 服务时，你必须考虑资源、它们如何相互链接，以及如何使用 HTTP 管理它们的状态。现在，你已经准备好向\
  \ Web 公开一些服务，并看看有多少不同的设备能够使用它们。\n\n附录 A\n\n![image](img/frontdot.jpg)\n\n搭建开发环境\n\
  \n本附录重点介绍如何搭建开发环境，以便你可以按照前面章节中列出的代码片段进行动手实践。本书包含大量代码，并且大多数章节都有一个“综合实践”部分。该部分提供了逐步示例，展示如何开发、编译、部署、执行、单元测试和集成测试一个组件。要运行这些示例，你需要安装所需的软件：\n\
  \n*   JDK 1.7\n*   Maven 3\n*   JUnit 4\n*   Derby 10.8 数据库（也称为 Java DB）\n*   GlassFish\
  \ 4 应用服务器\n\nJDK 1.7\n\n本书示例的开发和执行离不开 Java 开发工具包（JDK）。它包含多种工具，例如编译器（`javac`）、虚拟机、文档生成器（`javadoc`）、监控工具（Visual\
  \ VM）等。要安装 JDK 1.7，请访问 Oracle 官方网站（`http://www.oracle.com/technetwork/java/javase/downloads/index.html`），选择合适的平台和语言，然后下载发行版。\n\
  \n如果你在 Mac OS X 上运行（本书未在 Linux 和 Windows 环境下测试，但代码应可移植），请双击 `jdk-7u15-macosx-x64.dmg`\
  \ 文件，随后屏幕（如图 A-1 所示）会提示你双击 JDK 软件包。然后，一个向导将邀请你接受软件许可协议，并安装 JDK。\n\n![9781430246268_AppA-01.jpg](img/9781430246268_AppA-01.jpg)\n\
  \n图 A-1. 设置 JDK 安装\n\n安装完成后，需要将 `JAVA_HOME` 变量以及 `$JAVA_HOME/bin` 目录设置到 `PATH` 变量中。通过输入\
  \ `java –version` 检查你的系统是否识别 Java（参见图 A-2）。\n\n![9781430246268_AppA-02.jpg](img/9781430246268_AppA-02.jpg)\n\
  \n图 A-2. 显示 JDK 版本\n\nMaven 3\n\n为了反映你在真实开发环境中会遇到的情况，我决定使用 Apache Maven（`http://maven.apache.org`）来构建本书的示例。本书的目的并非解释\
  \ Maven。你可以在互联网或书店中找到大量关于 Maven 的资源。但我将介绍一些基本要素，以便你能够轻松理解并使用这些示例。\n\n构建 Java EE\
  \ 应用程序需要不同的操作。\n\n*   生成代码和资源，\n*   编译 Java 类和测试类，\n*   运行单元测试和集成测试，以及\n*   将代码打包成归档文件（jar、ear、war\
  \ 等），并可能包含外部 jar 库。\n\n手动执行这些任务可能非常耗时，并且容易出错。因此，开发团队一直在寻找自动化这些任务的方法。Maven 正是为了填补这些空白而创建的。\n\
  \nMaven 简史\n\n2000 年，Java 开发人员开始使用 Apache Ant（`http://ant.apache.org`），这使他们能够创建用于构建应用程序的脚本。Ant\
  \ 本身是用 Java 编写的，并提供了一系列命令，与 Unix Make 工具不同，这些命令可跨平台移植。开发团队开始创建自己的脚本来满足需求。然而，当项目必须开始包含复杂的异构系统时，Ant\
  \ 很快就达到了极限。公司在工业化其构建系统方面面临困难。没有真正的工具可以在不同项目之间轻松重用构建脚本（复制/粘贴是唯一的方法）。\n\n2002 年，Apache\
  \ Maven 诞生，该项目不仅解决了这些问题，而且超越了简单的构建工具。Maven 为项目提供了构建解决方案、共享库和插件平台，使你能够进行质量控制、文档编写、团队协作等。基于“约定优于配置”的原则，Maven\
  \ 带来了标准的项目描述和许多约定，例如标准目录结构（如图 A-3 所示）。通过基于插件（也称为 mojos）的可扩展架构，Maven 可以提供许多不同的服务。\n\
  \n![9781430246268_AppA-03.jpg](img/9781430246268_AppA-03.jpg)\n\n图 A-3. 标准 Maven\
  \ 目录结构\n\n项目描述符\n\nMaven 基于这样一个事实：大多数 Java 和 Java EE 项目在构建应用程序时都面临类似的需求。一个 Maven\
  \ 项目需要遵循标准，并在项目描述符（即项目对象模型，POM）中定义特定功能。POM 是一个 XML 文件（`pom.xml`），放置在项目的根目录下，包含项目的所有元数据。如清单\
  \ A-1 所示，描述项目标识所需的最少信息是 `groupId`、`artifactId`、版本和打包类型。\n\n***清单 A-1.***  最小化的 pom.xml\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\" http://maven.apache.org/POM/4.0.0\
  \ \" →\n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"→\n        \
  \ xsi:schemaLocation=\" http://maven.apache.org/POM/4.0.0 →\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\
  \ \">\n\n<modelVersion>4.0.0</modelVersion>\n  <groupId>org.agoncal.book.javaee7</groupId>\n\
    <artifactId>chapter01</artifactId>\n  <version>1.0-SNAPSHOT</version>\n  <packaging>jar</packaging>\n\
  </project>\n```\n\n一个项目通常被划分为不同的构件。这些构件随后被分组在同一个 `groupId`（类似于 Java 中的包）下，并由 `artifactId`\
  \ 唯一标识。打包允许 Maven 按照标准格式（jar、war、ear 等）生成构件。最后，版本允许在构件的生命周期中标识它（版本 1.1、1.2、1.2.1\
  \ 等）。Maven 强制进行版本控制，以便团队可以管理其项目开发的周期。Maven 还引入了 `SNAPSHOT` 版本的概念（版本号以字符串 `-SNAPSHOT`\
  \ 结尾），用于标识正在开发中的构件。\n\n\n\nPOM 定义了关于项目的更多信息。其中一些是纯描述性的（名称、描述等）；另一些信息则涉及应用程序的执行，例如所使用的外部库列表等。最后，`pom.xml`\
  \ 定义了构建项目的环境信息（版本控制工具、持续集成服务器、制品仓库），以及构建项目的任何其他特定流程。\n\n管理制品\n\nMaven 不仅限于构建制品；它还提供了一种真正的方法来归档和共享这些制品。Maven\
  \ 在您的硬盘上使用一个本地仓库（默认位于 `∼/.m2/repository`），用于存储项目描述符所操作的所有制品。本地仓库（参见图 A-4）由本地开发者的制品（例如\
  \ `myProject-1.1.jar`）或 Maven 从远程仓库下载的外部制品（例如 `javax.ejb-3.2.jar`）填充。默认情况下，Maven\
  \ 使用位于 `http://search.maven.org` 的主仓库来下载缺失的制品。\n\n![9781430246268_AppA-04.jpg](img/9781430246268_AppA-04.jpg)\n\
  \n图 A-4. 本地仓库示例\n\n一个 Maven 项目以声明方式在 POM（`groupId`、`artifactId`、`version`、类型）中定义一个单一的制品及其依赖关系，如清单\
  \ A-2 所示。如有必要，Maven 会从远程仓库将它们下载到本地仓库。此外，利用这些外部制品的 POM 描述符，Maven 还会下载它们所需的制品，依此类推。因此，开发团队无需手动处理项目依赖关系。Maven\
  \ 会自动添加必要的库。\n\n***清单 A-2.***  pom.xml 中的依赖关系\n\n```\n<dependencies>\n  <dependency>\n\
      <groupId>org.eclipse.persistence</groupId>\n    <artifactId>javax.persistence</artifactId>\n\
      <version>2.1</version>\n    <scope>provided</scope>\n  </dependency>\n  <dependency>\n\
      <groupId>org.glassfish</groupId>\n    <artifactId>javax.ejb</artifactId>\n    <version>3.2</version>\n\
      <scope>provided</scope>\n  </dependency>\n</dependencies>\n```\n\n依赖关系可能具有有限的可见性（称为作用域）。\n\
  \n*   `test`：该库用于编译和运行测试类，但不会打包到生成的制品中。\n*   `provided`：该库由环境提供（持久化提供者、应用服务器等），仅用于编译代码。\n\
  *   `compile`：该库在编译和执行时都是必需的。\n*   `runtime`：该库仅在执行时需要，但在编译时被排除（例如，JSF 组件和 JSTL\
  \ 标签库）。\n\n项目模块化\n\n为了解决项目模块化问题，Maven 提供了一种基于模块的机制。每个模块本身就是一个 Maven 项目。Maven 能够通过计算模块之间的依赖关系来构建包含不同模块的项目（参见图\
  \ A-5）。为了便于重用公共参数，POM 描述符可以继承自父 POM 项目。\n\n![9781430246268_AppA-05.jpg](img/9781430246268_AppA-05.jpg)\n\
  \n图 A-5. 项目及其模块\n\n插件与生命周期\n\nMaven 使用一个由多个阶段组成的生命周期（参见图 A-6）：清理资源、验证项目、生成任何需要的源代码、编译\
  \ Java 类、运行测试类、打包项目，并将其安装到本地仓库。这个生命周期是 Maven 插件依附的脊柱。根据您构建的项目类型，关联的 mojo 可能不同（一个用于编译的\
  \ mojo，另一个用于测试，另一个用于构建等）。在项目描述中，您可以将新插件链接到生命周期的某个阶段，更改插件的配置等。例如，当您构建一个 Web 服务客户端时，您可能会添加一个\
  \ mojo，用于在 generate-sources 阶段生成 Web 服务制品。\n\n![9781430246268_AppA-06.jpg](img/9781430246268_AppA-06.jpg)\n\
  \n图 A-6. 项目生命周期\n\n安装\n\n本书中的示例是使用 Apache Maven 3.0.5 开发的。安装 JDK 1.7 后，请确保设置了 `JAVA_HOME`\
  \ 环境变量。然后从 `http://maven.apache.org/` 下载 Maven，将文件解压到您的硬盘上，并将 `apache-maven/bin`\
  \ 目录添加到您的 `PATH` 变量中。\n\n完成此操作后，打开命令行并输入 `mvn -version` 以验证您的安装。Maven 应打印出其版本和 JDK\
  \ 版本，如图 A-7 所示。\n\n![9781430246268_AppA-07.jpg](img/9781430246268_AppA-07.jpg)\n\
  \n图 A-7. Maven 显示其版本\n\n请注意，Maven 需要互联网访问，以便从主仓库下载插件和项目依赖项。如果您位于代理之后，请参阅文档以配置您的设置。\n\
  \n用法\n\n以下是一些您将用来运行本书示例的命令。它们都调用项目生命周期的不同阶段（clean、compile、install 等），并使用 `pom.xml`\
  \ 来添加库、自定义编译或通过插件扩展某些行为：\n\n*   `mvn clean`：删除所有生成的文件（编译后的类、生成的代码、制品等）。\n*   `mvn\
  \ compile`：编译主要的 Java 类。\n*   `mvn test-compile`：编译测试类。\n*   `mvn test`：编译主要的 Java\
  \ 类以及测试类，并执行测试。\n*   `mvn package`：编译、执行测试并将代码打包成一个归档文件。\n*   `mvn install`：构建制品并将其安装到您的本地仓库中。\n\
  *   `mvn clean install`：清理并安装。（请注意，您可以添加多个命令，用空格分隔。）\n\n![image](img/sq.jpg) **注意**  Maven\
  \ 允许您编译、运行和打包本书的示例。它将编写代码（在 IDE 中）和构建代码的需求解耦。要开发，您需要一个集成开发环境（IDE）。我使用 JetBrains\
  \ 的 IntelliJ IDEA，您将在本书中看到它的一些截图。但您可以使用任何您想要的 IDE，因为本书仅依赖 Maven，而不是特定的 IntelliJ\
  \ IDEA 功能。\n\nJUnit 4\n\nJUnit 是一个用于编写和运行可重复测试的开源框架。JUnit 的特性包括：\n\n*   用于测试预期结果的断言，\n\
  *   用于共享公共测试数据的 Fixture，以及\n*   用于运行测试的 Runner。\n\nJUnit 是 Java 语言事实上的标准测试库，它以一个单独的\
  \ jar 文件形式存在，您可以从 `http://www.junit.org/` 下载（或使用 Maven 依赖管理来完成）。该库包含一个完整的 API，可帮助您编写单元测试以及一个执行它们的工具。单元测试和集成测试有助于使您的代码更健壮、无错误且可靠。\n\
  \nJUnit 简史\n\nJUnit 最初由 Erich Gamma 和 Kent Beck 于 1998 年编写。它的灵感来源于同样由 Kent Beck\
  \ 编写的 Smalltalk 的 SUnit 测试框架。它迅速成为 Java 世界中最流行的框架之一。\n\n\n\nJUnit 将单元测试的优势带到了多种语言中，并启发了诸如\
  \ nUnit (.NET)、pyUnit (Python)、CppUnit (C++)、dUnit (Delphi) 等一系列 *x*Unit 工具。JUnit\
  \ 在实现测试驱动开发（TDD）方面占据了重要地位。\n\n它是如何工作的？\n\n自 JUnit 4 以来，通过使用注解、静态导入和其他 Java 特性，编写单元测试和集成测试变得更加简单。与之前的\
  \ JUnit 版本相比，它提供了一种更简单、更丰富、更易用的测试模型，并引入了更灵活的初始化、清理、超时和参数化测试用例。\n\n让我们通过一个简单的例子来看看\
  \ JUnit 的一些特性。清单 A-3 展示了一个 `Customer` POJO。它包含一些属性，包括出生日期、构造方法、getter 和 setter 方法。它还提供了一个用于计算客户年龄的工具方法（`calculateAge()`）。\n\
  \n***清单 A-3.***  一个 Customer 类\n\n```\npublic class Customer {\n\nprivate Long id;\n\
    private String firstName;\n  private String lastName;\n  private String email;\n\
    private String phoneNumber;\n  private Date dateOfBirth ;\n  private Integer age\
  \ ;\n\n// 构造方法、getter、setter\n\npublic void calculateAge () {\n    if (dateOfBirth\
  \ == null) {\n      age = null;\n      return;\n    }\n\nCalendar birth = new GregorianCalendar();\n\
      birth.setTime(dateOfBirth);\n    Calendar now = new GregorianCalendar();\n    now.setTime(new\
  \ Date());\n    int adjust = 0;\n    if (now.get(Calendar.DAY_OF_YEAR) - birth.get(Calendar.DAY_OF_YEAR)\
  \ < 0) {\n      adjust = -1;\n    }\n    age = now.get(Calendar.YEAR) - birth.get(Calendar.YEAR)\
  \ + adjust;\n  }\n}\n```\n\n`calculateAge()` 方法使用 `dateOfBirth` 属性来设置客户的年龄。为了测试\
  \ `calculateAge()` 方法，我们可以使用清单 A-4 中描述的 JUnit 类 `CustomerTest`。\n\n***清单 A-4.***  针对\
  \ Customer 的单元测试类\n\n```\npublic class CustomerTest {\n\nprivate Customer customer;\n\
  \n@Before\n  public void clearCustomer () {\n    customer.clear();\n  }\n\n@Test\n\
    public void ageShouldBeGretaterThanZero () {\n    customer = new Customer(\"Rita\"\
  , \"Navalhas\", \"rnavalhas@gmail.com\");\n    customer.setDateOfBirth(new GregorianCalendar(1975,\
  \ 5, 27).getTime());\n\ncustomer.calculateAge();\n\nint calculatedAge = customer.getAge();\n\
  \nassertTrue (calculatedAge >= 0);\n  }\n\n@Test\n  public void ageShouldBe42 ()\
  \ {\n    int expectedAge = 42;\n\nCalendar birth = new GregorianCalendar();\n    birth.roll(Calendar.YEAR,\
  \ expectedAge * (-1));\n    birth.roll(Calendar.DAY_OF_YEAR, -1);\n\ncustomer =\
  \ new Customer(\"Rita\", \"Navalhas\", \"rnavalhas@gmail.com\");\n    customer.setDateOfBirth(birth.getTime());\n\
  \ncustomer.calculateAge();\n\nassertEquals (new Long(expectedAge), new Long(customer.getAge()));\n\
    }\n\n@Test(expected = NullPointerException.class)\n  public void shouldThrowAnExceptionCauseDateOfBirtheIsNull()\
  \ {\n    customer = new Customer();\n\ncustomer.calculateAge();\n  }\n\n@Test @Ignore(\"\
  Test is not ready yet\")\n  public void shouldCalculateOldAge() {\n    // 还有一些工作要做\n\
    }\n}\n```\n\n清单 A-4 中的测试类包含四个测试方法，它们都使用了 `@Test` 注解。JUnit 框架将执行这四个方法，并返回执行结果（即，成功了多少个，失败了多少个）。\n\
  \n测试方法\n\n在 JUnit 4 中，测试类不需要继承任何东西。要作为测试用例执行，一个 JUnit 类至少需要一个带有 `@Test` 注解的方法。如果你编写了一个没有至少一个\
  \ `@Test` 方法的类，尝试执行它时会得到一个错误（`java.lang.Exception: No runnable methods`）。\n\n一个测试方法必须使用\
  \ `@Test` 注解，返回 `void`，并且不接受参数。这在运行时进行检查，如果不满足则会抛出异常。`@Test` 注解支持可选的 `expected`\
  \ 参数，该参数声明测试方法应该抛出一个异常。如果它没有抛出异常，或者抛出了与声明不同的异常，则测试失败。在清单 A-4 中，尝试计算一个空的 `customer`\
  \ 对象的年龄应该会抛出一个 `NullPointerException`（方法 `shouldThrowAnExceptionCauseDateOfBirtheIsNull`）。\n\
  \n清单 A-4 没有实现 `shouldCalculateOldAge` 方法。但是，你不想让测试失败；你只是想忽略它。你可以在 `@Test` 之前或之后添加\
  \ `@Ignore` 注解。测试运行器会报告被忽略的测试数量，以及成功和失败的测试数量。请注意，`@Ignore` 接受一个可选参数（一个 `String`），以便你可以记录测试被忽略的原因。\n\
  \n断言方法\n\n测试用例必须断言对象符合预期结果。为此，JUnit 有一个包含多个方法的 `Assert` 类。要使用它，你可以使用带前缀的语法（例如，`Assert.assertEquals()`），或者静态导入\
  \ `Assert` 类。\n\n测试夹具\n\n测试夹具是在测试期间初始化和释放任何公共对象的方法。JUnit 使用 `@Before` 和 `@After`\
  \ 注解在每个测试之前或之后执行代码。这些方法可以任意命名（清单 A-4 中的 `clearCustomer()`），并且一个测试类中可以有多个方法。JUnit\
  \ 使用 `@BeforeClass` 和 `@AfterClass` 注解来仅对每个类执行一次特定代码。这些方法必须是唯一的且是静态的。如果你需要分配和释放昂贵的资源，`@BeforeClass`\
  \ 和 `@AfterClass` 会非常有用。\n\n启动 JUnit\n\n要运行 JUnit 启动器，你必须将 JUnit jar 文件添加到你的 `CLASSPATH`\
  \ 变量中（或添加 Maven 依赖）。之后，你可以通过 Java 启动器运行测试，如下代码所示：\n\n```\njava org.junit.runner.JUnitCore\
  \ org.agoncal.book.javaee7.CustomerTest\n```\n\n上述命令将提供以下结果：\n\n```\nJUnit version\
  \ 4.11\n..E.I\nTime: 0.016\nThere was 1 failure:\n1) ageShouldBe33(org.agoncal.book.javaee7.CustomerTest)\n\
  java.lang.AssertionError: at CustomerTest. ageShouldBe33(CustomerTest.java:52)\n\
  \nFAILURES!!!\nTests run: 3, Failures: 1\n```\n\n首先显示的信息是 JUnit 版本号（此处为 4.11）。然后\
  \ JUnit 给出执行的测试数量（此处为三个）和失败的数量（此示例中为一个）。字母 `I` 表示一个测试已被忽略。请记住，你可以使用以下 Maven 命令运行测试：\n\
  \n```\nmvn test\n```\n\nJUnit 集成\n\nJUnit 目前与大多数 IDE（IntelliJ IDEA、Eclipse、NetBeans\
  \ 等）集成得非常好。在使用这些 IDE 时，大多数情况下，JUnit 会用绿色高亮显示成功的测试，用红色高亮显示失败的测试。大多数 IDE 还提供了创建测试类的工具。\n\
  \nJUnit 还通过 Surefire 插件与 Maven 集成，该插件在构建生命周期的测试阶段使用。它执行应用程序的 JUnit 测试类，并生成 XML 和文本文件格式的报告。以下\
  \ Maven 命令通过该插件运行 JUnit 测试：\n\n```\nmvn test\n```\n\nDerby 10.8\n\nDerby 数据库最初名为\
  \ Cloudscape，由 Java 开发，由 IBM 捐赠给 Apache 基金会并成为开源项目。Sun Microsystems 以及后来的 Oracle\
  \ 发布了它们自己的发行版，称为 JavaDB。Derby 体积小巧（2MB），是一个功能完备且支持事务的关系型数据库，可以轻松嵌入到任何基于 Java 的解决方案中。\n\
  \n\n\nDerby 提供两种不同的模式：嵌入式模式和网络服务器模式。嵌入式模式是指 Derby 由一个简单的单用户 Java 应用程序启动。在这种模式下，Derby\
  \ 与应用程序运行在同一个 JVM 中。在本书中，我在集成测试期间使用此模式。网络服务器模式是指 Derby 作为一个独立的进程启动，并提供多用户连接。在本书中，当运行应用程序时，我全程使用此模式。\n\
  \n安装\n\n安装 Derby 非常简单；事实上，你可能会发现它已经安装好了，因为它与 JDK 1.7 捆绑在一起。在安装 JDK 1.7 的过程中，向导会建议你安装\
  \ Java DB。默认情况下它会安装。如果你没有安装，可以从 `http://db.apache.org` 下载二进制文件。\n\n安装完成后，将 `DERBY_HOME`\
  \ 变量设置为你安装 Derby 的路径，并将 `$DERBY_HOME/bin` 添加到你的 `PATH` 变量中。通过启动 `$DERBY_HOME/bin/startNetworkServer`\
  \ 脚本来启动 Derby 网络服务器。Derby 会在控制台显示一些信息，例如它监听的端口号（默认为 1527）。\n\nDerby 附带了一些实用工具，其中之一是\
  \ `sysinfo`。打开命令解释器，输入 `sysinfo` 命令行，你应该会看到关于你的 Java 和 Derby 环境的信息，如图 A-8 所示。\n\n\
  ![9781430246268_AppA-08.jpg](img/9781430246268_AppA-08.jpg)\n\n图 A-8. 安装 Derby 后的\
  \ sysinfo 输出\n\n用法\n\nDerby 提供了几个工具（位于 `bin` 子目录下）来与数据库交互。最简单的可能是 `ij`，它允许你在命令提示符下输入\
  \ SQL 命令，以及 `dblook`，它允许你查看数据库的全部或部分数据定义语言（DDL）。\n\n确保你已经启动了 Derby 网络服务器，然后输入命令\
  \ `ij` 进入命令提示符，并对 Derby 数据库运行交互式查询。然后，输入以下命令来创建数据库和表，向表中插入数据，并查询数据：\n\n```\nij>\
  \ connect 'jdbc:derby://localhost:1527/Chapter01DB;create=true';\n```\n\n这将连接到 `Chapter01DB`\
  \ 数据库。由于该数据库尚不存在，`create=true` 参数会强制创建数据库。现在，让我们通过输入以下命令行来创建 `customer` 表：\n\n```\n\
  ij> create table customer (custId int primary key, firstname varchar(20), lastname\
  \ varchar(20));\n```\n\n这将创建一个 `customer` 表，其中包含一个主键列和两个用于存储名字和姓氏的 `varchar(20)`\
  \ 列。你可以通过输入以下命令来显示表的描述：`ij> describe customer;`\n\n```\nCOLUMN_NAME |TYPE_NAME  |DEC&  \
  \ |NUM&   |COLUM& |COLUMN_DEF |CHAR_OCTE& |IS_NULL&\n\nCUSTID      |INTEGER    |0      |10    \
  \ |10     |NULL       |NULL       |NO\nFIRSTNAME   |VARCHAR    |NULL   |NULL   |20    \
  \ |NULL       |40         |YES\nLASTNAME    |VARCHAR    |NULL   |NULL   |20    \
  \ |NULL       |40         |YES\n```\n\n现在你已经创建了表，可以使用 `insert` SQL 语句添加数据，如下所示：\n\
  \n```\nij> insert into customer values (1, 'Fred', 'Chene');\nij> insert into customer\
  \ values (2, 'Sylvain', 'Verin');\nij> insert into customer values (3, 'Robin',\
  \ 'Riou');\n```\n\n然后，你可以使用 SQL `select` 语句的所有功能来检索、排序或聚合数据。\n\n```\nij> select\
  \ count(*) from customer;\n\nij> select * from customer where custid=3;\nCUSTID\
  \ |FIRSTNAME |LASTNAME\n\n3      |Robin     |Riou\n\nij> exit;\n```\n\n要获取已创建表的\
  \ DDL，你可以退出 `ij` 并针对 `Chapter01DB` 数据库运行 `dblook`。图 A-9 显示了 `dblook` 命令的输出。\n\n\
  ![9781430246268_AppA-09.jpg](img/9781430246268_AppA-09.jpg)\n\n图 A-9. Chapter01DB\
  \ 数据库的 dblook 输出\n\nGlassFish v4\n\n虽然 GlassFish 是一个相当新的应用服务器，但它已经被大量开发者和公司使用。它不仅是\
  \ Java EE 技术的参考实现（RI），也是你下载 Java EE SDK 时获得的产品。你也可以在 GlassFish 应用服务器上部署关键的生产应用程序。除了是一个产品，GlassFish\
  \ 还是一个围绕开源代码聚集起来的社区，其社区位于 `http://glassfish.java.net`。该社区在邮件列表和论坛上响应非常迅速。如今，GlassFish\
  \ 支持多样化的生态系统：当然包括 Java EE，但也支持 Ruby on Rails 或 PHP 应用程序。\n\nGlassFish 简史\n\nGlassFish\
  \ 的起源可以追溯到早期的 Tomcat 时代，当时 Sun 和 JServ 小组将这项技术捐赠给了 Apache。2005 年，Sun 创建了 GlassFish\
  \ 项目。最初的主要目标是生产一个完全认证的 Java EE 应用服务器。GlassFish 1.0 版本于 2006 年 5 月发布。其核心部分，GlassFish\
  \ 的 Web 容器组件继承了大量 Tomcat 的血统（事实上，当时在 Tomcat 上运行的应用程序可以在 GlassFish 上不加修改地运行）。\n\n\
  GlassFish v2 由 Sun 于 2007 年 9 月发布，并进行了多次更新。GlassFish 在主要版本之间保持相同的用户体验方面做得相当好，不会破坏代码或改变开发者的习惯。此外，GlassFish\
  \ 的“社区”版本和“受支持”版本之间没有质量差异。虽然付费客户可以访问补丁和额外的监控工具（GlassFish Enterprise Manager），但从\
  \ `http://glassfish.java.net` 获取的开源版本和从 `http://www.oracle.com/goto/glassfish` 获取的受支持版本都经过了相同数量的测试，这使得在项目周期中的任何时候都可以轻松切换到受支持版本。\n\
  \n2010 年 3 月，在 Oracle 收购 Sun Microsystems 后不久，社区发布了一份路线图，计划在未来几年内推出 3.0.1、3.1、3.2\
  \ 和 4.0 版本，并且集群功能被重新引入 3.1 版本（该功能最初不在 3.0 版本中，当时 3.0 版本将完全支持 Java EE 6 和模块化作为更高优先级）。\n\
  \n为了本书的目的，我使用了 2013 年 5 月发布的 GlassFish 开源版 4.0。GlassFish 4 的主要目标是核心功能的模块化，采用基于 OSGi\
  \ 的内核并完全支持 Java EE 7。此版本还包括许多对开发者友好的功能，例如快速启动时间和跨重新部署的会话保留。\n\n![image](img/sq.jpg) **注意**  GlassFish\
  \ 团队付出了巨大的努力来提供丰富且最新的文档，提供了许多不同的指南：快速入门指南、安装指南、管理指南、管理参考、应用程序部署指南、开发者指南等。请访问 `http://glassfish.java.net/docs`\
  \ 查看它们。还可以查看常见问题解答、操作指南和 GlassFish 论坛以获取更多信息。\n\nGlassFish v4 架构\n\n作为一名应用程序程序员（而不是\
  \ GlassFish 开发者），你不需要了解 GlassFish v4 的内部架构，但你可能会对其主要的架构选择和指导原则感兴趣。GlassFish 构建在由\
  \ OSGi 驱动的模块化内核之上，它直接运行在 Apache Felix 实现之上。它也可以与 Equinox 或 Knopflerfish OSGi 运行时一起运行。HK2（百\
  \ KB 内核）抽象了 OSGi 模块系统以提供组件，这些组件也可以被视为服务。这些服务可以在运行时被发现和注入。目前，OSGi 并未向 Java EE 开发者公开，但使用标准的\
  \ `@Resource` 注解将 OSGi 声明式服务注入到 Java EE 组件中是相当可行的。\n\n\n\n![image](img/sq.jpg) **注意**\
  \ OSGi 是动态组件管理与发现的标准。应用程序或组件可以远程安装、启动、停止、更新和卸载，而无需重启。组件还能动态检测新服务的添加或移除，并相应地进行适配。Apache\
  \ Felix、Equinox 和 Knopflerfish 都是 OSGi 的实现。\n\n正是这种模块化和可扩展性，使得 GlassFish v4 能够从一个仅监听管理命令的简单\
  \ Web 服务器，通过部署诸如 war 文件（此时会加载并启动 Web 容器，并部署应用程序）或 EJB jar 文件（这将动态加载并启动 EJB 容器）等工件，成长为一个功能更强大的运行时环境。此外，精简版服务器只需几秒钟即可启动（在配置合理的现代硬件上不到五秒），并且你只需为启动时间和内存消耗中实际使用的部分付费。即时启动\
  \ Web 容器大约需要三秒，而部署通常不到一秒。这一切都使 GlassFish v4 成为一个对开发者非常友好的环境。\n\n无论 GlassFish v4\
  \ 动态加载了多少模块，管理控制台、命令行界面和集中式配置文件都是可扩展的，并且各自保持其独特性。同样值得一提的是 Grizzly 框架，它最初是一个基于非阻塞\
  \ I/O 的 HTTP 服务器，后来成为 GlassFish 的关键元素之一，如图 A-10 所示。\n\n![9781430246268_AppA-10.jpg](img/9781430246268_AppA-10.jpg)\n\
  \n图 A-10. GlassFish v4 架构\n\n更新中心\n\n一旦你拥有了一个模块化的应用服务器，你就可以像使用 IDE 和 Linux 发行版那样，或者类似于\
  \ Firefox 或 Chrome 管理扩展的方式，开始混合搭配各种模块来构建自己的环境。GlassFish 更新中心是一套用于管理运行时的图形化和命令行工具。其背后的技术是映像包管理系统（IPS，也称为\
  \ `pkg`），OpenSolaris 项目正是使用它来进行包管理。GlassFish v4 提供两种发行版：Web Profile（由 Java EE 7\
  \ Web Profile 定义）和 Full Profile。这些发行版各自附带一组特定的模块，其中 Web Profile 是 Full Profile 的严格子集。除了这种默认组合外，用户可以连接到一个或多个仓库来更新现有功能（例如，从\
  \ Web Profile 升级到完整的 Java EE 7 Profile）、添加新功能（Grails 支持、JDBC 驱动程序、Portlet 容器等），甚至添加新的第三方应用程序。在企业环境中，你可以设置自己的仓库，并使用更新中心的\
  \ `pkg` 命令行工具来配置和引导安装基于 GlassFish 的软件。\n\n在实践中，对于 GlassFish v4，可以通过管理控制台、位于 `$GLASSFISH_HOME/bin/updatetool`\
  \ 的图形客户端或 `pkg` 命令行来访问更新中心。这三种方式都允许你列出、添加和移除来自多个仓库的可用组件（不过，对于管理控制台而言，某些操作不可用，因为安装时应用服务器不应处于运行状态）。对于\
  \ `pkg`（也位于 `$GLASSFISH_HOME/bin` 中），最常用的命令是 `pkg list`、`pkg install`、`pkg uninstall`\
  \ 和 `pkg image-update`。\n\nGlassFish 子项目\n\nGlassFish 应用服务器包含许多不同的部分，因此该项目被分解为多个子项目。这不仅有助于你进一步理解各个组成部分，也有助于了解各个功能在\
  \ GlassFish 环境之外（以独立模式或在其他容器内）的采用情况。图 A-11 展示了应用服务器功能部分的高层架构。\n\n![9781430246268_AppA-11.jpg](img/9781430246268_AppA-11.jpg)\n\
  \n图 A-11. GlassFish 的功能组成部分\n\n例如，OpenMQ 是一个生产级的 JMS 开源实现。尽管它通常以独立模式用于面向消息的架构，但\
  \ OpenMQ 也可以通过各种方式与 GlassFish 集成（进程内、进程外或远程）。OpenMQ 的管理可以通过 GlassFish 管理控制台或 `asadmin`\
  \ 命令行界面（参见“asadmin CLI”部分）完成。其社区网站位于 `http://mq.dev.java.net`。\n\nMetro 是 Web 服务的一站式解决方案。这个完整的栈构建在\
  \ JAX-WS 开发范式之上，并通过高级功能对其进行了增强，例如可信的端到端安全性、优化的传输（MTOM、FastInfoset）、可靠的消息传递以及 SOAP\
  \ Web 服务的事务行为。这种 Web 服务质量（QoS）基于标准（OASIS、W3C），以策略的形式表达，并且除了 JAX-WS 之外，无需使用新的 API。Metro\
  \ 还会定期与微软针对 .NET 实现进行测试，以确保两种技术之间的互操作性。其社区网站位于 `http://metro.java.net`。\n\nMojarra\
  \ 是 GlassFish 中 JSF 2.2 实现的名称，可在 `http://mojarra.java.net` 获取。它无疑是其他应用服务器最常复用的项目之一。\n\
  \nJersey 是新的 JAX-RS 2.0 规范的生产级参考实现（RI）。该规范及其实现都是 Java EE 7 和 GlassFish 的早期参与者。Jersey\
  \ 也被 GlassFish v4 内部使用，以提供一套 RESTful 管理 API，补充了下一节中描述的现有工具。Jersey 社区网站位于 `http://jersey.java.net`。\n\
  \n管理\n\n显然，作为一个符合规范的应用服务器，意味着 GlassFish 100% 实现了 Java EE 7 规范，但它还拥有其他特性使其成为一个成熟的产品，例如其管理能力，无论是通过管理控制台还是强大的\
  \ `asadmin` 命令行界面。几乎所有配置都存储在一个名为 `domain.xml` 的文件中（位于 `domains/domain1/config`），该文件对故障排除很有用，但不应手动编辑；而应使用这两种管理工具之一。这两种工具都依赖于\
  \ GlassFish 提供的广泛 JMX 检测功能。\n\n管理控制台\n\n管理控制台是一个基于浏览器的应用服务器管理用户界面（参见图 A-12）。该工具既适用于管理员，也适用于开发者。它提供了被管理对象的图形化表示、增强的日志文件查看、系统状态和监控数据。至少，控制台可以管理配置的创建和修改（JVM\
  \ 调优、日志级别、池和缓存调优等）、JDBC、JNDI、JavaMail、JMS 和连接器资源，以及应用程序（部署）。在工具导航的任何时候，都可以通过右上角的“帮助”按钮获取上下文帮助。在默认安装下，GlassFish\
  \ 启动后即可在 `http://localhost:4848` 访问管理控制台。从 GlassFish v4 开始，可以在安装时设置匿名用户，从而无需登录。请注意，管理控制台会在首次访问上述\
  \ URL 时加载到应用服务器中，这体现了 GlassFish v4 的按需加载特性。\n\n![9781430246268_AppA-12.jpg](img/9781430246268_AppA-12.jpg)\n\
  \n图 A-12. Web 管理控制台\n\nasadmin CLI\n\n\n\n`asadmin` 命令行界面（CLI）功能强大，常用于生产环境，因为它可以通过脚本创建实例和资源、部署应用程序，并在运行中的系统上提供监控数据。该命令位于\
  \ GlassFish 的 `bin` 子目录下，可以管理多个本地或远程应用服务器域。`asadmin` 提供了数百条命令，但你只需使用其中一小部分即可。如果你对这些命令感到好奇，可以尝试\
  \ `asadmin help`。在简单的开发者配置中，有用的命令包括 `asadmin start-domain`、`asadmin stop-domain`、`asadmin\
  \ deploy`、`asadmin deploydir` 和 `asadmin undeploy`。如果输入有误，`asadmin` 会提供最接近的匹配命令供你选择。例如，尝试输入\
  \ `asadmin resource`，`asadmin` 会显示相关命令，如图 A-13 所示。\n\n![9781430246268_AppA-13.jpg](img/9781430246268_AppA-13.jpg)\n\
  \n图 A-13. asadmin CLI\n\n安装 GlassFish\n\nGlassFish 可以通过多种分发机制下载。最直接的选择是从 `http://glassfish.java.net/`\
  \ 获取，或者通过 Java EE SDK（它也随 NetBeans IDE 7.3 及以上版本一起提供）。我将在此记录如何从社区网站下载并安装 GlassFish。\n\
  \n前往主下载页面 `http://glassfish.java.net/public/downloadsindex.html`，选择“GlassFish Open\
  \ Source Edition 4”的下载链接。然后，你可以选择图形化安装程序下载或简单的 Zip 下载。每个选项还进一步提供了 Java EE 7 完整版和\
  \ Web 版的选择。我将在此记录完整版的安装程序版本。请注意，GlassFish 适用于 Windows、Linux、Solaris 和 Mac OS X。执行\
  \ shell 脚本将启动图形化安装程序，该程序会：\n\n*   要求你同意许可协议。\n*   请求指定安装位置。\n*   允许你配置管理员用户名和密码（或默认为匿名用户）。\n\
  *   允许你配置 HTTP 和管理端口（同时检查这些端口是否已被占用）。\n*   安装并启用更新工具（`pkg` 和 `updatetool` 客户端）。使用\
  \ Zip 安装程序时，`updatetool` 默认不会安装，而是在首次运行时从网络安装。\n\n然后，它会解压一个预先配置好的简单 GlassFish 安装包，使用默认设置：管理端口为\
  \ 4848，HTTP 端口为 8080，且未配置明确的管理员用户。安装完成后，可以通过 `asadmin` 命令行启动 GlassFish（参见图 A-14）。\n\
  \n```\nasadmin start-domain -v\n```\n\n![9781430246268_AppA-14.jpg](img/9781430246268_AppA-14.jpg)\n\
  \n图 A-14. 启动 GlassFish\n\n然后，你可以通过 `http://localhost:4848` 访问管理控制台（如前文图 A-12 所示），或通过\
  \ `http://localhost:8080` 访问默认欢迎页面。\n\n![image](img/sq.jpg) **提示**  如果你只有一个域，可以省略默认域名，仅使用\
  \ `asadmin start-domain` 启动 GlassFish。如果你希望日志文件内联显示，而不是查看专用日志文件（`domains/domain1/logs/server.log`）的内容，可以使用\
  \ `asadmin start-domain --verbose` 或 `–v`。\n\nGlassFish 还提供了许多其他功能；我在本书中向你展示了其中一部分，但将探索其跨重新部署的会话保留、NetBeans、Eclipse\
  \ 和 IntelliJ IDEA 中的增量部署、高级 OSGi 混合应用支持、诊断服务、RESTful 管理、监控以及各种安全配置的任务留给你。\n\n索引\n\
