  \n谢谢大家！\n\n引言\n\n在当今的商业世界中，应用程序需要访问数据、应用业务逻辑、添加表示层、支持移动、使用地理定位，并与外部系统和在线服务通信。这正是企业试图在最小化成本的同时，使用能够处理高负载的标准且稳健的技术来实现的目标。如果这是您的情况，那么您手中的这本书正是您所需要的。\n\
  \nJava 企业版出现在 20 世纪 90 年代末，为 Java 语言带来了一个用于企业开发的稳健软件平台。J2EE 在每个新版本中都面临挑战，被误解或误用，过度设计，并与开源框架竞争，曾被视为一种重量级技术。Java\
  \ EE 从这些批评中受益并得以改进，如今专注于简化。\n\n\n\n如果你仍然认为“EJB 不好，EJB 是邪恶的”，那么请阅读本书，你将会改变想法。EJB（企业级\
  \ Java Bean）非常出色，整个 Java EE 7 技术栈也是如此。相反，如果你已经是 Java EE 的采用者，你将在这本书中看到该平台如何通过其易用性和简单的组件模型找到平衡。如果你是\
  \ Java EE 的初学者，这本书也同样适合你：它以非常易于理解的方式涵盖了最重要的规范，并配有大量代码和图表，使其更易于理解。\n\n开放标准共同构成了 Java\
  \ EE 的主要优势之一。如今，使用 JPA、CDI、Bean Validation、EJB、JSF、JMS、SOAP Web 服务或 RESTful Web\
  \ 服务编写的应用程序比以往任何时候都更能跨应用服务器移植。开源是 Java EE 的另一大优势。正如你将在本书中看到的，大多数 Java EE 7 参考实现都使用开源许可（GlassFish、EclipseLink、Weld、Hibernate\
  \ Validator、Mojarra、OpenMQ、Metro 和 Jersey）。\n\n本书探讨了这个新版本的创新，并研究了各种规范以及如何将它们组合起来开发应用程序。Java\
  \ EE 7 包含近 30 个规范，是企业层（CDI 1.1、Bean Validation 1.1、EJB 3.2、JPA 2.1）、Web 层（Servlet\
  \ 3.1、JSF 2.2、表达式语言 3.0）以及互操作性（JAX-WS 2.3 和 JAX-RS 2.0）的一个重要里程碑。本书涵盖了 Java EE 7\
  \ 规范的很大一部分，并使用了 JDK 1.7 和一些众所周知的设计模式，以及 GlassFish 应用服务器、Derby 数据库、JUnit 和 Maven。书中配有丰富的\
  \ UML 图、Java 代码和屏幕截图。\n\n本书结构\n\n本书重点介绍最重要的 Java EE 7 规范，并突出显示此版本的新特性。本书的结构遵循应用程序的架构分层。\n\
  \n![image](img/9781430246268_unFM-02.jpg)\n\n第 1 章简要介绍了 Java EE 7 的基本知识，附录 A 则重点介绍了本书中使用的工具以及如何安装它们（JDK、Maven、JUnit、Derby\
  \ 和 GlassFish）。\n\n在前几章中，我解释了本书中讨论的常见问题。第 2 章描述了上下文和依赖注入 1.1，第 3 章介绍了 Bean Validation\
  \ 1.1。\n\n第 4 章到第 6 章描述了持久化层，并重点介绍了 JPA 2.1。在第 4 章通过一些动手示例进行总体概述之后，第 5 章深入探讨了对象关系映射（映射属性、关系和继承），而第\
  \ 6 章则向你展示了如何管理和查询实体、它们的生命周期、回调方法和监听器。\n\n要使用 Java EE 7 开发事务性业务逻辑层，你可以自然地使用 EJB。第\
  \ 7 章到第 9 章描述了这一过程。在概述了规范及其历史之后，第 7 章重点介绍了会话 Bean 及其编程模型。第 8 章重点介绍了 EJB 的生命周期、定时器服务以及如何处理授权。第\
  \ 9 章解释了事务以及 JTA 1.2 如何将事务引入 EJB 以及 CDI Bean。\n\n在第 10 章和第 11 章中，你将学习如何使用 JSF 2.2\
  \ 开发表示层。在概述了规范之后，第 10 章重点介绍了如何使用 JSF 和 Facelets 组件构建网页。第 11 章向你展示了如何使用 CDI 支持 Bean\
  \ 与 EJB 后端交互以及如何在页面之间导航。\n\n最后，最后几章介绍了与其他系统互操作的不同方式。第 12 章解释了如何处理 XML（使用 JAXB 和\
  \ JAXP）和 JSON（JSON-P 1.0）。第 13 章向你展示了如何使用新的 JMS 2.0 和消息驱动 Bean 交换异步消息。第 14 章重点介绍\
  \ SOAP Web 服务，而第 15 章则涵盖了使用新的 JAX-RS 2.0 的 RESTful Web 服务。\n\n下载和运行代码\n\n本书中使用的示例设计为使用\
  \ JDK 1.7 编译、使用 Maven 3 构建、部署在 GlassFish v4 应用服务器上，并将数据存储在 Derby 数据库中。附录 A 向你展示了如何安装所有这些软件包，并且每章都根据所使用的技术解释了如何构建、部署、运行和测试组件。这些代码已在\
