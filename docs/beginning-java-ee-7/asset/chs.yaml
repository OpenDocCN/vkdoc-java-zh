  \n<build>\n    <plugins>\n      <plugin>\n        <artifactId>maven-compiler-plugin</artifactId>\n\
          <version>2.5.1</version>\n        <configuration>\n          <source> 1.7\
  \ </source>\n          <target>1.7</target>\n        </configuration>\n      </plugin>\n\
        <plugin>\n        <artifactId>maven-failsafe-plugin</artifactId>\n        <version>2.12.4</version>\n\
          <executions>\n          <execution>\n            <id>integration-test</id>\n\
              <goals>\n              <goal> integration-test </goal>\n              <goal>verify</goal>\n\
              </goals>\n          </execution>\n        </executions>\n      </plugin>\n\
      </plugins>\n  </build>\n</project>\n```\n\n要编译类，请在包含 `pom.xml` 文件的根目录中打开命令行，并输入以下\
  \ Maven 命令：\n\n```\n$ mvn compile\n```\n\n要使用 Maven Failsafe 插件执行集成测试，请输入以下命令：\n\
  \n```\n$ mvn integration-test\n```\n\n总结\n\n\n\nBean Validation 在验证问题上采用了非常全面的方法，并通过在任何应用层中验证属性或方法，解决了大多数用例。如果你发现某些情况被忽略或遗忘，该\
  \ API 足够灵活，可以进行扩展以完美满足你的需求。\n\n在本章中，你了解到一个约束由一个注解和一个实现验证逻辑的独立类组成。然后，你可以将这些约束聚合起来构建新的约束，或重用现有的约束。Bean\
  \ Validation 提供了内置的约束，但遗憾的是，有些约束缺失了（例如 `@Email`、`@URL`、`@CreditCard` 等）。\n\n在规范的第一版中，Bean\
  \ Validation 只允许验证 Bean 和属性。通过将浅层领域验证放在 POJO 本身中，这为我们带来了更好的领域驱动设计，从而避免了贫血对象反模式。在\
  \ Bean Validation 1.1 中，引入了对构造函数、方法参数和返回值的验证。这现在为我们提供了前置条件和后置条件验证，这类似于契约式设计。\n\n\
  在接下来的章节中，你将看到 Bean Validation 如何集成到 Java EE 中，特别是与 JPA 和 JSF 的集成，以及它如何在大多数规范中使用。\n\
  \n第 4 章\n\n![image](img/frontdot.jpg)\n\nJava 持久化 API\n\n应用程序由业务逻辑、与其他系统的交互、用户界面……以及数据组成。我们的应用程序所操作的大部分数据都必须存储在数据库中，以便检索和分析。数据库非常重要：它们存储业务数据，充当应用程序之间的中心点，并通过触发器或存储过程处理数据。持久化数据无处不在，并且大多数情况下，它们使用关系型数据库作为底层持久化引擎（与无模式数据库相对）。关系型数据库将数据存储在由行和列组成的表中。数据通过主键进行标识，主键是具有唯一性约束的特殊列，有时还带有索引。表之间的关系使用外键和带有完整性约束的连接表。\n\
  \n所有这些术语在 Java 这样的面向对象语言中是完全未知的。在 Java 中，我们操作的是类的实例对象。对象继承自其他对象，拥有对其他对象集合的引用，有时还会以递归方式指向自身。我们有具体类、抽象类、接口、枚举、注解、方法、属性等等。对象以良好的方式封装了状态和行为，但这种状态只有在\
  \ Java 虚拟机（JVM）运行时才能访问：如果 JVM 停止或垃圾回收器清理其内存内容，对象及其状态都会消失。某些对象需要持久化。所谓持久化数据，我指的是有意存储在磁性介质、闪存等永久性形式中的数据。一个能够存储其状态以便后续重用的对象被称为持久化对象。\n\
  \n对象关系映射（ORM）的原则是将数据库和对象的世界结合起来。它涉及将对关系型数据库的访问委托给外部工具或框架，这些工具或框架反过来提供关系数据的面向对象视图，反之亦然。映射工具在数据库和对象之间建立双向对应关系。有多个框架可以实现这一点，例如\
  \ Hibernate、TopLink 和 Java 数据对象（JDO），但 Java 持久化 API（JPA）是首选技术，并且是 Java EE 7 的一部分。\n\
  \n本章是对 JPA 的介绍，在接下来的两章中，我将重点介绍 ORM 以及查询和管理持久化对象。\n\n理解实体\n\n当谈论将对象映射到关系型数据库、持久化对象或查询对象时，应该使用“实体”一词，而不是“对象”。对象只是存在于内存中的实例。实体是短暂存在于内存中并持久存在于数据库中的对象。它们具有映射到数据库的能力；它们可以是具体的或抽象的；并且支持继承、关系等。这些实体一旦被映射，就可以由\
  \ JPA 管理。你可以将实体持久化到数据库中、删除它，并使用查询语言（Java 持久化查询语言，或 JPQL）查询它。ORM 让你操作实体，同时在底层访问数据库。而且，正如你将看到的，实体遵循一个定义好的生命周期。通过回调方法和监听器，JPA\
  \ 允许你将一些业务代码挂钩到生命周期事件。\n\n作为第一个示例，让我们从可能拥有的最简单的实体开始。在 JPA 持久化模型中，实体是一个普通的 Java 对象（POJO）。这意味着实体的声明、实例化和使用方式与任何其他\
  \ Java 类完全相同。一个实体拥有属性（其状态），可以通过 getter 和 setter 进行操作。清单 4-1 展示了一个简单的实体。\n\n***清单\
  \ 4-1.***  一个 Book 实体的简单示例\n\n```\n@Entity\npublic class Book {\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  private String title;\n  private Float price;\n  private\
  \ String description;\n  private String isbn;\n  private Integer nbOfPage;\n  private\
  \ Boolean illustrations;\n\npublic Book() {\n  }\n\n// Getters, setters\n}\n```\n\
  \n清单 4-1 中的示例代表了一个 `Book` 实体，为了清晰起见，我省略了 getter 和 setter。正如你所见，除了一些注解之外，这个实体看起来与任何\
  \ Java 类完全一样：它有多个不同类型的属性（`id`、`title`、`price` 等）（类型为 `Long`、`String`、`Float`、`Integer`\
  \ 和 `Boolean`）、一个默认构造函数，以及每个属性的 getter 和 setter。那么，它是如何映射到表的呢？答案就是通过注解。\n\n实体的结构\n\
  \n要使一个类成为实体，它必须使用 `@javax.persistence.Entity` 进行注解，这允许持久化提供程序将其识别为持久化类，而不仅仅是简单的\
  \ POJO。然后，注解 `@javax.persistence.Id` 定义了该对象的唯一标识符。由于 JPA 是关于将对象映射到关系型表的，因此对象需要一个将映射到主键的\
  \ ID。清单 4-1 中的其他属性（`title`、`price`、`description` 等）没有注解，因此它们将通过应用默认映射来实现持久化。\n\n\
  这个代码示例只有属性，但正如你稍后将看到的，实体也可以有业务方法。请注意，这个 `Book` 实体是一个 Java 类，它没有实现任何接口或继承任何类。实际上，要成为一个实体，一个类必须遵循以下规则。\n\
  \n*   实体类必须使用 `@javax.persistence.Entity` 进行注解（或在 XML 描述符中声明为实体）。\n*   必须使用 `@javax.persistence.Id`\
  \ 注解来表示简单主键。\n*   实体类必须有一个无参构造函数，该构造函数必须是 public 或 protected 的。实体类也可以有其他构造函数。\n\
  *   实体类必须是顶级类。枚举或接口不能被指定为实体。\n*   实体类不能是 final 的。实体类的任何方法或持久化实例变量都不能是 final 的。\n\
  *   如果实体实例需要作为分离对象按值传递（例如，通过远程接口），则实体类必须实现 `Serializable` 接口。\n\n\n\n![image](img/sq.jpg)\
  \ **注意** 在 Java EE 的早期版本中，持久化组件模型被称为 Entity Bean，更准确地说，是 Entity Bean CMP（容器管理持久化），并且与\
  \ Enterprise JavaBeans 相关联。这种持久化模型从 J2EE 1.3 一直延续到 1.4，但它过于重量级，最终从 Java EE 5 开始被\
  \ JPA 取代。JPA 使用术语“Entity”而非“Entity Bean”。\n\n对象关系映射\n\nORM 的原理是将创建对象与表之间对应关系的任务委托给外部工具或框架（在我们的案例中是\
  \ JPA）。这样一来，类、对象和属性的世界就可以映射到由包含行和列的表组成的关系型数据库。映射为开发者提供了面向对象的视图，使他们能够透明地使用实体而非表。那么\
  \ JPA 是如何将对象映射到数据库的呢？通过*元数据*。\n\n每个实体都关联着描述映射的元数据。这些元数据使持久化提供者能够识别实体并解释映射。元数据可以用两种不同的格式编写。\n\
  \n*   *注解*：实体的代码直接使用 `javax.persistence` 包中描述的各种注解进行标注。\n*   *XML 描述符*：除了注解（或作为注解的补充），你还可以使用\
  \ XML 描述符。映射定义在一个外部的 XML 文件中，该文件将与实体一起部署。例如，当数据库配置因环境而异时，这会非常有用。\n\n`Book` 实体（如清单\
  \ 4-1 所示）使用了 JPA 注解，以便持久化提供者能够同步 `Book` 实体的属性与 `BOOK` 表的列之间的数据。因此，如果应用程序修改了 `isbn`\
  \ 属性，`ISBN` 列也会同步更新（前提是实体被管理、事务上下文已设置等）。\n\n如图 4-1 所示，`Book` 实体映射到一张 `BOOK` 表，每一列都以类的属性命名（例如，`String`\
  \ 类型的 `isbn` 属性映射到名为 `ISBN` 的 `VARCHAR` 类型列）。这些默认的映射规则是一种被称为*例外配置*原则的重要组成部分。\n\n\
  ![9781430246268_Fig04-01.jpg](img/9781430246268_Fig04-01.jpg)\n\n图 4-1. 实体与表之间的数据同步\n\
  \nJava EE 5 引入了例外配置（有时也称为*例外编程*或*约定优于配置*）的理念，并且在 Java EE 7 中仍然被广泛使用。这意味着，除非另有指定，容器或提供者应应用默认规则。换句话说，必须提供配置是规则的例外情况。这允许你编写最少的代码来运行应用程序，同时依赖容器和提供者的默认设置。如果你不希望提供者应用默认规则，你可以使用元数据根据自己的需求自定义映射。换句话说，必须提供配置是规则的例外情况。\n\
  \n没有任何注解时，清单 4-1 中的 `Book` 实体将被视为一个普通的 POJO，不会被持久化。这就是规则：如果没有给出特殊配置，则应应用默认值，而持久化提供者的默认值是\
  \ `Book` 类在数据库中没有对应表示。但是，由于你需要更改此默认行为，因此你使用 `@Entity` 注解该类。标识符也是如此。你需要一种方法来告诉持久化提供者\
  \ `id` 属性必须映射到主键，因此你使用 `@Id` 注解它，并且该标识符的值由持久化提供者使用可选的 `@GeneratedValue` 注解自动生成。这种决策类型体现了例外配置方法的特点，即在更常见的情况下不需要注解，仅在需要覆盖时才使用。这意味着，对于所有其他属性，将应用以下默认映射规则：\n\
  \n*   实体名称映射到关系表名称（例如，`Book` 实体映射到 `BOOK` 表）。如果你想将其映射到其他表，则需要使用 `@Table` 注解，你将在下一章的“基本映射”部分看到这一点。\n\
  *   属性名称映射到列名称（例如，`id` 属性或 `getId()` 方法映射到 `ID` 列）。如果你想更改此默认映射，则需要使用 `@Column` 注解。\n\
  *   JDBC 规则适用于将 Java 基本类型映射到关系数据类型。`String` 将映射到 `VARCHAR`，`Long` 映射到 `BIGINT`，`Boolean`\
  \ 映射到 `SMALLINT`，等等。从 `String` 映射的列的默认大小为 255（`String` 映射到 `VARCHAR(255)`）。但请记住，默认映射规则因数据库而异。例如，在\
  \ Derby 中 `String` 映射到 `VARCHAR`，在 Oracle 中映射到 `VARCHAR2`。`Integer` 在 Derby 中映射到\
  \ `INTEGER`，在 Oracle 中映射到 `NUMBER`。底层数据库的信息在 `persistence.xml` 文件中提供，你稍后会看到。\n\n\
  遵循这些规则，`Book` 实体将映射到一个 Derby 表，该表的结构如清单 4-2 所述。\n\n***清单 4-2.***  创建 BOOK 表结构的脚本\n\
  \n```\nCREATE TABLE BOOK (\n  ID BIGINT NOT NULL,\n  TITLE VARCHAR(255),\n  PRICE\
  \ FLOAT,\n  DESCRIPTION VARCHAR(255),\n  ISBN VARCHAR(255),\n  NBOFPAGE INTEGER,\n\
  \  ILLUSTRATIONS SMALLINT DEFAULT 0,\n  PRIMARY KEY (ID)\n)\n```\n\nJPA 2.1 拥有一个\
  \ API 和标准机制，可以根据实体自动生成数据库，并生成如清单 4-2 所示的脚本。此功能在开发模式下非常方便。然而，大多数情况下，你需要连接到一个已经存在的遗留数据库。\n\
  \n清单 4-1 展示了一个非常简单的映射示例。正如你将在下一章中看到的，映射可以丰富得多，允许你映射从对象到关系的各种事物。面向对象编程的世界充满了类以及类之间的关联（以及类的集合）。数据库也对关系进行建模，只是方式不同：使用外键或连接表。JPA\
  \ 有一组元数据来管理关系的映射。甚至继承也可以被映射。开发者通常使用继承来重用代码，但关系数据库本身并不理解这个概念（因为它们必须使用外键和约束来模拟继承）。即使继承映射带来了一些复杂性，JPA\
  \ 仍然支持它，并为你提供了三种不同的策略可供选择。\n\n\n\n![image](img/sq.jpg) **注意** JPA 针对的是关系型数据库。其映射元数据（注解或\
  \ XML）旨在将实体映射到结构化表，并将属性映射到列。NoSQL（非关系型）数据库（或无模式数据库）的新时代已经到来，它们具有不同的存储结构：键值、列、文档或图。目前，JPA\
  \ 无法将实体映射到这些结构。Hibernate OGM 是一个试图解决此问题的开源框架。EclipseLink 也有一些扩展来映射 NoSQL 结构。Hibernate\
  \ OGM 或 EclipseLink 的扩展超出了本书的范围，但如果你计划使用 NoSQL 数据库，应该了解一下它们。\n\n查询实体\n\nJPA 允许你将实体映射到数据库，并使用不同的条件查询它们。JPA\
  \ 的强大之处在于，它提供了一种面向对象的方式来查询实体及其关系，而无需使用底层数据库的外键或列。负责编排实体的 API 核心部分是 `javax.persistence.EntityManager`。它的作用是管理实体、从给定数据库读取和写入数据，并允许对实体进行简单的\
  \ CRUD（创建、读取、更新和删除）操作，以及使用 JPQL 进行复杂查询。从技术上讲，实体管理器只是一个接口，其实现由持久化提供者（例如 EclipseLink）完成。以下代码片段向你展示了如何获取实体管理器并持久化一个\
  \ `Book` 实体：\n\n```\nEntityManagerFactory emf = Persistence.createEntityManagerFactory(\"\
  chapter04PU\");\nEntityManager em = emf.createEntityManager();\nem.persist(book);\n\
  ```\n\n在图 4-2 中，你可以看到 `EntityManager` 接口如何被一个类（此处为 `Main`）用于操作实体（在此例中为 `Book`）。通过\
  \ `persist()` 和 `find()` 等方法，实体管理器隐藏了对数据库的 JDBC 调用以及 `INSERT` 或 `SELECT` SQL（结构化查询语言）语句。\n\
  \n![9781430246268_Fig04-02.jpg](img/9781430246268_Fig04-02.jpg)\n\n图 4-2. 实体管理器与实体及底层数据库交互\n\
  \n实体管理器还允许你查询实体。此处的*查询*类似于数据库查询，不同之处在于，JPA 使用 JPQL 对实体进行查询，而不是使用 SQL。其语法使用了熟悉的对象点（`.`）表示法。要检索所有标题为\
  \ *H2G2* 的书籍，你可以编写以下代码：\n\n```\nSELECT b FROM Book b WHERE b.title = 'H2G2'\n```\n\
  \n请注意，`title` 是 `Book` 属性的名称，而不是表中列的名称。JPQL 语句操作的是对象和属性，而不是表和列。JPQL 语句可以通过动态查询（在运行时动态创建）或静态查询（在编译时静态定义）来执行。你还可以执行原生\
  \ SQL 语句，甚至存储过程。静态查询，也称为命名查询，可以使用注解（`@NamedQuery`）或 XML 元数据来定义。例如，之前的 JPQL 语句可以定义为\
  \ `Book` 实体上的一个命名查询。代码清单 4-3 展示了一个使用 `@NamedQuery` 注解定义 `findBookH2G2` 命名查询的 `Book`\
  \ 实体（更多关于查询的内容请参见第 6 章）。\n\n***代码清单 4-3.*** 包含 `findBookH2G2` 命名查询的 Book 实体\n\n\
  ```\n@Entity\n@NamedQuery(name = \"findBookH2G2\", →\n           query = \"SELECT\
  \ b FROM Book b WHERE b.title ='H2G2'\")\npublic class Book {\n\n@Id @GeneratedValue\n\
    private Long id;\n  private String title;\n  private Float price;\n  private String\
  \ description;\n  private String isbn;\n  private Integer nbOfPage;\n  private Boolean\
  \ illustrations;\n\n// 构造函数、getter、setter\n}\n```\n\n`EntityManager` 可以在标准 Java\
  \ 类中使用工厂获取。代码清单 4-4 展示了这样一个类，它创建了一个 `Book` 实体的实例，将其持久化到表中，并调用了一个命名查询。它遵循步骤 1 到 5。\n\
  \n1.  *创建 Book 实体的实例*：实体是经过注解的 POJO，由持久化提供者管理。从 Java 的角度来看，需要像任何 POJO 一样通过 `new`\
  \ 关键字创建类的实例。需要强调的是，在代码执行到这一点之前，持久化提供者并不知道 `Book` 对象。\n2.  *获取实体管理器和事务*：这是代码的重要部分，因为操作实体需要实体管理器。首先，为\
  \ `\"chapter04PU\"` 持久化单元创建一个实体管理器工厂。然后，使用该工厂获取一个实体管理器（`em` 变量），该变量在整个代码中用于获取事务（`tx`\
  \ 变量），以及持久化和检索 `Book`。\n3.  *将书籍持久化到数据库*：代码启动一个事务（`tx.begin()`），并使用 `EntityManager.persist()`\
  \ 方法插入一个 `Book` 实例。当事务提交时（`tx.commit()`），数据会被刷新到数据库。\n4.  *执行命名查询*：再次使用实体管理器，通过\
  \ `findBookH2G2` 命名查询检索书籍。\n5.  *关闭实体管理器和实体管理器工厂*。\n\n***代码清单 4-4.*** 持久化和检索 Book\
  \ 实体的 Main 类\n\n```\npublic class Main {\n\npublic static void main(String[] args)\
  \ {\n\n// 1-创建 book 实例\n    Book book = new Book(\"H2G2\", \"The Hitchhiker's Guide\
  \ to the Galaxy\", 12.5F, →\n                         \"1-84023-742-2\", 354, false);\n\
  \n// 2-获取实体管理器和事务\n    EntityManagerFactory emf = Persistence.createEntityManagerFactory(\"\
  chapter04PU\");\n    EntityManager em = emf.createEntityManager();\n\n// 3-将书籍持久化到数据库\n\
      EntityTransaction tx = em.getTransaction();\n    tx.begin();\n    em.persist(book);\n\
      tx.commit();\n\n// 4-执行命名查询\n    book = em.createNamedQuery(\"findBookH2G2\"\
  , Book.class).getSingleResult();\n\n// 5-关闭实体管理器和工厂\n    em.close();\n    emf.close();\n\
    }\n}\n```\n\n请注意，在代码清单 4-4 中没有 SQL 查询或 JDBC 调用。如图 4-2 所示，`Main` 类通过 `EntityManager`\
  \ 接口与底层数据库交互，该接口提供了一组标准方法，允许你对 `Book` 实体执行操作。在幕后，`EntityManager` 依赖持久化提供者与数据库交互。当你调用\
  \ `EntityManager` 方法时，持久化提供者会生成并通过相应的 JDBC 驱动程序执行 SQL 语句。\n\n持久化单元\n\n应该使用哪个 JDBC\
  \ 驱动程序？如何连接到数据库？数据库名称是什么？这些信息在我们之前的代码中是缺失的。当 `Main` 类（代码清单 4-4）创建 `EntityManagerFactory`\
  \ 时，它传递了一个持久化单元的名称作为参数；在此例中，它被称为 `chapter04PU`。持久化单元向实体管理器指示要使用的数据库类型和连接参数，这些参数定义在\
  \ `persistence.xml` 文件中，如代码清单 4-5 所示，该文件必须位于类路径中才能被访问。\n\n***代码清单 4-5.*** 定义持久化单元的\
  \ persistence.xml 文件\n\n\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence\
  \ xmlns=\" http://xmlns.jcp.org/xml/ns/persistence \"\n             xmlns:xsi=\"\
  \ http://www.w3.org/2001/XMLSchema-instance \"\n             xsi:schemaLocation=\"\
  \ http://xmlns.jcp.org/xml/ns/persistence →\n             http://xmlns.jcp.org/xml/ns/persistence/persistence_2_1.xsd\
  \ \"\n             version=\"2.1\">\n\n<persistence-unit name=\" chapter04PU \"\
  \ transaction-type=\"RESOURCE_LOCAL\">\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
      <class>org.agoncal.book.javaee7.chapter04\\. Book </class>\n    <properties>\n\
        <property name=\"javax.persistence.schema-generation-action\" value=\"drop-and-create\"\
  />\n      <property name=\"javax.persistence.schema-generation-target\" value=\"\
  database\"/>\n      <property name=\"javax.persistence.jdbc.driver\" →\n              \
  \ value=\"org.apache.derby.jdbc.ClientDriver\"/>\n      <property name=\"javax.persistence.jdbc.url\"\
  \ →\n               value=\"jdbc:derby:// localhost:1527 / chapter04DB ;create=true\"\
  />\n      <property name=\"javax.persistence.jdbc. user \" value=\"APP\"/>\n      <property\
  \ name=\"javax.persistence.jdbc. password \" value=\"APP\"/>\n    </properties>\n\
    </persistence-unit>\n</persistence>\n```\n\n`chapter04PU` 持久化单元为运行在 localhost\
  \ 和端口 1527 上的 `chapter04DB` Derby 数据库定义了一个 JDBC 连接。它使用一个用户（`APP`）和密码（`APP`）在给定的\
  \ URL 上进行连接。`<class>` 标签告诉持久化提供者管理 `Book` 类（还有其他标签可以隐式或显式地指定受管理的持久化类，例如 `<mapping-file>`、`<jar-file>`\
  \ 或 `<exclude-unlisted-classes>`）。没有持久化单元，实体可以作为 POJO 进行操作，而不会产生持久化影响。\n\n实体生命周期与回调\n\
  \n实体只是 POJO。当实体管理器管理这些 POJO 时，它们具有持久化标识（一个唯一标识实例的键，相当于主键），并且数据库会同步它们的状态。当它们不被管理时（即，它们与实体管理器分离），它们可以像任何其他\
  \ Java 类一样使用。这意味着实体具有生命周期，如图 4-3 所示。当你使用 `new` 操作符创建 `Book` 实体的实例时，该对象存在于内存中，而 JPA\
  \ 对此一无所知（它甚至可能最终被垃圾回收）。当它被实体管理器管理时，`BOOK` 表会映射并同步其状态。调用 `EntityManager.remove()`\
  \ 方法会从数据库中删除数据，但 Java 对象会继续存在于内存中，直到被垃圾回收。\n\n![9781430246268_Fig04-03.jpg](img/9781430246268_Fig04-03.jpg)\n\
  \n图 4-3. 实体的生命周期\n\n对实体进行的操作分为四类——持久化、更新、移除和加载——分别对应数据库的插入、更新、删除和选择操作。每个操作都有一个“前”和“后”事件（加载操作除外，它只有“后”事件），实体管理器可以拦截这些事件以调用业务方法。正如你将在第\
  \ 6 章中看到的，你将拥有 `@PrePersist` 和 `@PostPersist` 等注解。JPA 允许你在这些事件发生时将业务逻辑挂接到实体上。这些注解可以设置在实体方法（也称为回调方法）或外部类（也称为监听器）上。你可以将回调方法和监听器视为关系数据库中的触发器。\n\
  \n与 Bean 验证的集成\n\n上一章解释过的 Bean 验证，在 Java EE 中有多个切入点。其中之一就是它与 JPA 和实体生命周期的集成。实体可以包含\
  \ Bean 验证约束并自动进行验证。实际上，自动验证之所以能够实现，是因为 JPA 在实体生命周期的预持久化、预更新和预移除事件上将验证委托给了 Bean 验证实现。当然，如果需要，仍然可以通过在实体上调用\
  \ `Validator` 的 `validate` 方法来手动完成验证。\n\n清单 4-6 展示了一个带有两个 Bean 验证约束（`@NotNull` 和\
  \ `@Size`）的 `Book` 实体。如果 title 属性为 null，并且你想要持久化此实体（通过调用 `EntityManager.persist()`），JPA\
  \ 运行时将抛出一个 `ConstraintViolation` 异常，并且数据将不会插入到数据库中。\n\n***清单 4-6.***  带有 Bean 验证注解的实体\n\
  \n```\n@Entity\npublic class Book {\n\n@Id @GeneratedValue\n  private Long id;\n\
    @NotNull\n  private String title;\n  private Float price;\n  @Size(min = 10, max\
  \ = 2000)\n  private String description;\n  private String isbn;\n  private Integer\
  \ nbOfPage;\n  private Boolean illustrations;\n\n// 构造方法、getter、setter\n}\n```\n\
  \nJPA 规范概述\n\nJPA 1.0 是随 Java EE 5 一起创建的，旨在解决数据持久化问题。它将面向对象模型和关系模型结合在一起。在 Java EE\
  \ 7 中，JPA 2.1 遵循了同样的简单性和健壮性路径，并增加了新功能。你可以使用此 API 从 EJB、Web 组件和 Java SE 应用程序中访问和操作关系数据。\n\
  \nJPA 是 JDBC 之上的一个抽象层，使得独立于 SQL 成为可能。此 API 的所有类和注解都位于 `javax.persistence` 包中。JPA\
  \ 的主要组件包括：\n\n*   ORM，一种将对象映射到存储在关系数据库中的数据的机制。\n*   一个用于执行数据库相关操作（如 CRUD）的实体管理器\
  \ API。\n*   JPQL，它允许你使用面向对象的查询语言检索数据。\n*   事务和锁定机制，Java 事务 API (JTA) 在并发访问数据时提供这些机制。JPA\
  \ 也支持资源本地（非 JTA）事务。\n*   用于将业务逻辑挂接到持久化对象生命周期的回调和监听器。\n\nJPA 简史\n\nORM 解决方案已经存在了很长时间，甚至在\
  \ Java 出现之前。像 TopLink 这样的产品最初于 1994 年使用 Smalltalk 开发，后来才转向 Java。自 Java 语言诞生之初，像\
  \ TopLink 这样的商业 ORM 产品就已经可用。它们很成功，但从未在 Java 平台上标准化。一种类似的 ORM 方法以 JDO 的形式被标准化，但未能获得任何显著的市场渗透。\n\
  \n1998 年，EJB 1.0 被创建，后来随 J2EE 1.2 一起发布。它是一个用于事务性业务逻辑的重量级分布式组件。实体 Bean CMP 在 EJB\
  \ 1.0 中作为可选特性引入，在 EJB 1.1 中成为强制特性，并在后续版本中一直增强到 EJB 2.1（J2EE 1.4）。持久化只能在容器内部通过使用\
  \ home、本地或远程接口进行实例化的复杂机制来完成。ORM 能力也非常有限，因为继承关系很难映射。\n\n与 J2EE 世界并行的是一个流行的开源解决方案，它导致了持久化方向上一些令人惊讶的变化：Hibernate，它重新引入了一个轻量级的、面向对象的持久化模型。\n\
  \n\n\n多年来，人们对 Entity CMP 2.*x* 组件的抱怨不绝于耳，同时，Hibernate 等开源框架的成功与简洁性也得到了广泛认可。因此，Java\
  \ EE 5 对企业版的持久化模型进行了彻底重构。JPA 1.0 应运而生，它采用了一种非常轻量级的方法，并采纳了 Hibernate 的许多设计原则。JPA\
  \ 1.0 规范与 EJB 3.0（JSR 220）捆绑发布。2009 年，JPA 2.0（JSR 317）随 Java EE 6 一同发布，带来了新的 API、扩展了\
  \ JPQL，并增加了诸如二级缓存、悲观锁以及 Criteria API 等新功能。\n\n如今，随着 Java EE 7 的到来，JPA 2.1 延续了简化开发的路径，并带来了新特性。它已在\
  \ JSR 338 中演进。\n\nJPA 2.1 有哪些新特性？\n\n如果说 JPA 1.0 相对于其前身 Entity CMP 2.*x* 是一场革命，因为它采用了全新的持久化模型，那么\
  \ JPA 2.0 则是 JPA 1.0 的延续。而今天，JPA 2.1 遵循同样的步伐，带来了许多新特性和改进。\n\n*   *模式生成*：JPA 2.1\
  \ 通过引入新的 API 和一组属性（定义在 `persistence.xml` 中），标准化了数据库模式的生成。\n*   *转换器*：这些是新类，用于在数据库和属性表示之间进行转换。\n\
  *   *CDI 支持*：现在可以在事件监听器中进行注入。\n*   *对存储过程的支持*：JPA 2.1 现在允许动态指定和命名存储过程查询。\n*   *批量更新和删除\
  \ Criteria 查询*：Criteria API 之前只有选择查询；现在也可以指定更新和删除查询。\n*   *向下转型*：新的 `TREAT` 运算符允许在查询中访问子类特定的状态。\n\
  \n表 4-1 列出了当前 JPA 2.1 中定义的主要包。\n\n表 4-1. 主要 JPA 包\n\n| 包 | 描述 |\n| --- | --- |\n\
  | `javax.persistence` | 用于管理持久化和对象/关系映射的 API |\n| `javax.persistence.criteria` |\
  \ Java 持久化 Criteria API |\n| `javax.persistence.metamodel` | Java 持久化元模型 API |\n\
  | `javax.persistence.spi` | 用于 Java 持久化提供者的 SPI |\n\n参考实现\n\nEclipseLink 2.5 是 JPA\
  \ 2.1 的开源参考实现。它提供了一个强大而灵活的框架，用于将 Java 对象存储到关系数据库中。EclipseLink 是一个 JPA 实现，但它也通过 Java\
  \ XML 绑定（JAXB）以及其他方式（如服务数据对象（SDO））支持 XML 持久化。它不仅支持 ORM，还支持对象 XML 映射（OXM）、使用 Java\
  \ EE 连接器架构（JCA）将对象持久化到企业信息系统（EIS），以及数据库 Web 服务。\n\nEclipseLink 源自 Oracle TopLink\
  \ 产品，该产品于 2006 年捐赠给 Eclipse 基金会。EclipseLink 是 JPA 参考实现，也是本书中使用的持久化框架。它也被称为*持久化提供者*，或简称为*提供者*。\n\
  \n在撰写本书时，EclipseLink 是唯一的 JPA 2.1 实现。但 Hibernate 和 OpenJPA 很快也会跟进，届时你将拥有多个实现可供选择。\n\
  \n整合所有内容\n\n现在你已经对 JPA、EclipseLink、实体、实体管理器和 JPQL 有了一些了解，让我们将它们整合起来，编写一个将实体持久化到数据库的小型应用程序。思路是编写一个带有\
  \ Bean Validation 约束的简单 `Book` 实体，以及一个用于持久化图书的 `Main` 类。然后，你将使用 Maven 编译它，并使用 EclipseLink\
  \ 和 Derby 客户端数据库运行它。为了展示对实体进行集成测试是多么容易，我将向你展示如何使用 JUnit 4 编写一个测试类（`BookIT`），并使用\
  \ Derby 的嵌入式模式，通过内存数据库来持久化数据。\n\n此示例遵循 Maven 目录结构，因此图 4-4 中描述的类和文件必须放置在以下目录中：\n\n\
  \n\n*   `src/main/java`：用于存放 `Book` 实体类和 `Main` 类；\n*   `src/main/resources`：用于存放\
  \ `Main` 和 `BookIT` 类使用的 `persistence.xml` 文件，以及 `insert.sql` 数据库加载脚本；\n*   `src/test/java`：用于存放\
  \ `BookIT` 类，该类用于集成测试；\n*   `pom.xml`：用于存放 Maven POM 文件，该文件描述了项目及其对外部模块和组件的依赖关系。\n\
  \n![9781430246268_Fig04-04.jpg](img/9781430246268_Fig04-04.jpg)\n\n图 4-4. 整合所有内容\n\
  \n编写 Book 实体\n\n`Book` 实体（如清单 4-7 所示）需要在 `src/main/java` 目录下开发。它拥有多个不同数据类型（`String`、`Float`、`Integer`\
  \ 和 `Boolean`）的属性（标题、价格等），以及一些 Bean Validation 注解（`@NotNull` 和 `@Size`）和 JPA 注解。\n\
  \n*   `@Entity` 告知持久化提供者该类是一个实体，并应由其管理。\n*   `@NamedQueries` 和 `@NamedQuery` 注解定义了两个命名查询，它们使用\
  \ JPQL 从数据库中检索书籍。\n*   `@Id` 将 `id` 属性定义为主键。\n*   `@GeneratedValue` 注解告知持久化提供者使用底层数据库的\
  \ `id` 工具自动生成主键。\n\n***清单 4-7.***  一个带有命名查询的 Book 实体\n\n```\npackage org.agoncal.book.javaee7.chapter04\
  \ ;\n@Entity\n@NamedQueries ({\n  @NamedQuery (name = \"findAllBooks\", query =\
  \ \"SELECT b FROM Book b\"),\n  @NamedQuery(name = \"findBookH2G2\", query = \"\
  SELECT b FROM Book b WHERE b.title ='H2G2'\")\n})\npublic class Book {\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  @NotNull\n  private String title;\n  private Float price;\n\
  \  @Size(min = 10, max = 2000)\n  private String description;\n  private String\
  \ isbn;\n  private Integer nbOfPage;\n  private Boolean illustrations;\n\n// Constructors,\
  \ getters, setters\n}\n```\n\n请注意，为了更好的可读性，我省略了该类的构造函数、getter 和 setter 方法。如代码所示，除了几个注解外，`Book`\
  \ 是一个简单的 POJO。现在让我们编写一个 `Main` 类，将一本书持久化到数据库中。\n\n编写 Main 类\n\n`Main` 类（如清单 4-8\
  \ 所示）与 `Book` 实体位于同一个包下。它首先创建一个新的 `Book` 实例（使用 Java 关键字 `new`），并为其属性设置一些值。这里没有什么特别的，只是纯\
  \ Java 代码。然后，它使用 `Persistence` 类获取一个 `EntityManagerFactory` 实例，该实例引用一个名为 `chapter04PU`\
  \ 的持久化单元，我将在后面的“编写持久化单元”部分对此进行描述。该工厂创建一个 `EntityManager` 实例（`em` 变量）。如前所述，实体管理器是\
  \ JPA 的核心部分，因为它能够创建事务，使用 `EntityManager.persist()` 方法持久化 `book` 对象，然后提交事务。在 `main()`\
  \ 方法的末尾，`EntityManager` 和 `EntityManagerFactory` 都被关闭，以释放提供者的资源。\n\n***清单 4-8.***\
  \  一个持久化 Book 实体的 Main 类\n\n```\npackage org.agoncal.book.javaee7.chapter04 ;\n\
  public class Main {\n\npublic static void main(String[] args) {\n\n// Creates an\
  \ instance of book\n    Book book = new Book (\"H2G2\", \"The Hitchhiker's Guide\
  \ to the Galaxy\", 12.5F, →\n                         \"1-84023-742-2\", 354, false);\n\
  \n// Obtains an entity manager and a transaction\n    EntityManagerFactory emf =\
  \ Persistence .createEntityManagerFactory(\" chapter04PU \");\n    EntityManager\
  \ em = emf.createEntityManager();\n\n// Persists the book to the database\n    EntityTransaction\
  \ tx = em.getTransaction();\n    tx.begin();\n    em.persist(book);\n    tx.commit();\n\
  \n// Closes the entity manager and the factory\n    em.close();\n    emf.close();\n\
  \  }\n}\n```\n\n\n\n再次强调，为了可读性，我省略了异常处理。如果发生持久化异常，你需要在`finally`块中回滚事务、记录消息并关闭`EntityManager`。\n\
  \n编写 BookIT 集成测试\n\n对于实体 CMP 2.*x* 的早期版本，一个常见的抱怨是持久化组件的集成测试非常困难。JPA 的主要卖点之一就是，你可以在无需运行应用服务器或实时数据库的情况下轻松测试实体。但可以测试什么呢？实体本身通常不需要孤立地进行测试。实体上的大多数方法都是简单的\
  \ getter 或 setter，只有少数业务方法。验证 setter 为属性赋值，并且相应的 getter 能检索到相同的值，并不能带来任何额外价值（除非在\
  \ getter 或 setter 中检测到了副作用）。因此，对实体进行单元测试的意义有限。\n\n那么测试数据库查询呢？确保 `findBookH2G2` 查询是正确的？或者向数据库注入数据并测试返回多个值的复杂查询？这些集成测试需要一个包含真实数据的真实数据库，或者你可以使用模拟对象（mocks）在隔离环境中进行单元测试来模拟查询。使用内存数据库和\
  \ JPA 事务是一个很好的折中方案。CRUD 操作和 JPQL 查询可以使用一个非常轻量级的数据库进行测试，该数据库无需在单独的进程中运行（只需将一个 jar\
  \ 文件添加到类路径即可）。这就是你将通过使用 Derby 的嵌入式模式来运行 `BookIT` 类的方式。\n\nMaven 使用两个不同的目录，一个用于存放主应用程序代码，另一个用于存放测试类。`BookIT`\
  \ 类（如清单 4-9 所示）位于 `src/test/java` 目录下，它测试实体管理器能否持久化一本书并从数据库中检索它，以及检查 Bean Validation\
  \ 约束是否被触发。\n\n***清单 4-9.***  在数据库中创建和检索书籍的测试类\n\n```\npublic class BookIT {\n\n\
  private static EntityManagerFactory emf =  →\n                 Persistence.createEntityManagerFactory(\"\
  \ chapter04TestPU \");\n  private EntityManager em;\n  private EntityTransaction\
  \ tx;\n\n@Before\n  public void initEntityManager() throws Exception {\n    em =\
  \ emf.createEntityManager();\n    tx = em.getTransaction();\n  }\n\n@After\n  public\
  \ void closeEntityManager() throws Exception {\n    if (em != null) em.close();\n\
  \  }\n\n@Test\n  public void shouldFindJavaEE7Book () throws Exception {\n    Book\
  \ book = em. find (Book.class, 1001 L);\n    assertEquals(\"Beginning Java EE 7\"\
  , book.getTitle());\n  }\n\n@Test\n  public void shouldCreateH2G2Book () throws\
  \ Exception {\n\n// 创建一个 Book 实例\n    Book book = new Book(\"H2G2\", \"The Hitchhiker's\
  \ Guide to the Galaxy\", 12.5F, →\n                         \"1-84023-742-2\", 354,\
  \ false);\n\n// 将书籍持久化到数据库\n    tx.begin();\n    em.persist(book);\n    tx.commit();\n\
  \    assertNotNull(\"ID 不应为空\", book.getId());\n\n// 从数据库中检索所有书籍\n    book = em.createNamedQuery(\"\
  \ findBookH2G2 \", Book.class).getSingleResult();\n    assertEquals(\"The Hitchhiker's\
  \ Guide to the Galaxy\", book.getDescription());\n  }\n\n@Test(expected = ConstraintViolationException\
  \ .class)\n  public void shouldRaiseConstraintViolationCauseNullTitle () {\n\nBook\
  \ book = new Book( null , \"标题为空，应失败\", 12.5F, →\n                         \"1-84023-742-2\"\
  , 354, false);\n    em.persist(book);\n  }\n}\n```\n\n与 `Main` 类类似，清单 4-9 中的 `BookIT`\
  \ 需要使用 `EntityManagerFactory` 创建一个 `EntityManager` 实例。为了初始化这些组件，你可以使用 JUnit 4 的测试夹具（fixtures）。`@Before`\
  \ 和 `@After` 注解允许在测试执行前后执行一些代码。这是创建和关闭 `EntityManager` 实例以及获取事务的理想位置。\n\n`shouldFindJavaEE7Book()`\
  \ 测试用例依赖于数据库中已存在的数据（稍后会详细介绍 `insert.sql` 脚本），因为它查找 `id` 为 `1001` 的书籍，并检查标题是否为 `\"\
  Beginning Java EE 7\"`。`shouldCreateH2G2Book()` 方法持久化一本书（使用 `EntityManager.persist()`\
  \ 方法），并检查 `id` 是否已由 EclipseLink 自动生成（使用 `assertNotNull`）。如果是，则执行名为 `findBookH2G2`\
  \ 的命名查询，并检查返回的书籍的描述是否为 `\"The Hitchhiker's Guide to the Galaxy\"`。最后一个测试用例创建一个标题为空的\
  \ `Book`，将其持久化，并检查是否抛出了 `ConstraintViolationException`。\n\n编写持久化单元\n\n正如你在 `Main`\
  \ 类（清单 4-8）中看到的，`EntityManagerFactory` 需要一个名为 `chapter04PU` 的持久化单元。而集成测试 `BookIT`（清单\
  \ 4-9）则使用了一个不同的持久化单元（`chapter04TestPU`）。这两个持久化单元必须在 `src/main/resources/META-INF`\
  \ 目录下的 `persistence.xml` 文件中定义（参见清单 4-10）。这个文件是 JPA 规范所要求的，它非常重要，因为它将 JPA 提供者（本例中为\
  \ EclipseLink）与数据库（Derby）连接起来。它包含了连接到数据库所需的所有信息（URL、JDBC 驱动、用户名和密码），并告知提供者数据库模式生成模式（`drop-and-create`\
  \ 意味着表将被删除然后创建）。`<provider>` 元素定义了持久化提供者，在本例中为 EclipseLink。持久化单元列出了所有应由实体管理器管理的实体。这里，`<class>`\
  \ 标签引用了 `Book` 实体。\n\n这两个持久化单元的区别在于，`chapter04PU` 使用一个正在运行的 Derby 数据库，而 `chapter04TestPU`\
  \ 使用一个内存数据库。请注意，两者都使用加载脚本 `insert.sql` 在运行时向数据库插入数据。\n\n***清单 4-10.***  `persistence.xml`\
  \ 文件\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence xmlns=\" http://xmlns.jcp.org/xml/ns/persistence\
  \ \"\n             xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n \
  \            xsi:schemaLocation=\" http://xmlns.jcp.org/xml/ns/persistence →\n \
  \            http://xmlns.jcp.org/xml/ns/persistence/persistence_2_1.xsd \"\n  \
  \           version=\"2.1\">\n\n<persistence-unit name=\" chapter04PU \" transaction-type=\"\
  RESOURCE_LOCAL\">\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
  \    <class>org.agoncal.book.javaee7.chapter04.Book</class>\n    <properties>\n\
  \      <property name=\"javax.persistence.schema-generation-action\" value=\" drop-and-create\
  \ \"/>\n      <property name=\"javax.persistence.schema-generation-target\" →\n\
  \               value=\" database-and-scripts \"/>\n      <property name=\"javax.persistence.jdbc.driver\"\
  \ →\n               value=\" org.apache.derby.jdbc.ClientDriver \"/>\n      <property\
  \ name=\"javax.persistence.jdbc.url\" →\n               value=\" jdbc:derby://localhost:1527/chapter04DB;create=true\
  \ \"/>\n      <property name=\"javax.persistence.jdbc.user\" value=\"APP\"/>\n \
  \     <property name=\"javax.persistence.jdbc.password\" value=\"APP\"/>\n     \
  \ <property name=\"javax.persistence.sql-load-script-source\" value=\" insert.sql\
  \ \"/>\n    </properties>\n  </persistence-unit>\n\n\n\n<persistence-unit name=\"\
  \ chapter04TestPU \" transaction-type=\"RESOURCE_LOCAL\">\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
      <class>org.agoncal.book.javaee7.chapter04.Book</class>\n    <properties>\n      <property\
  \ name=\"javax.persistence.schema-generation-action\" value=\"drop-and-create\"\
  />\n      <property name=\"javax.persistence.schema-generation-target\" value=\"\
  database\"/>\n      <property name=\"javax.persistence.jdbc.driver\" →\n              \
  \ value=\" org.apache.derby.jdbc.EmbeddedDriver \"/>\n      <property name=\"javax.persistence.jdbc.url\"\
  \ →\n               value=\" jdbc:derby:memory:chapter04DB;create=true \"/>\n      <property\
  \ name=\"javax.persistence.sql-load-script-source\" value=\" insert.sql \"/>\n    </properties>\n\
    </persistence-unit>\n</persistence>\n```\n\n编写 SQL 脚本加载数据\n\n清单 4-10 中定义的两个持久化单元都会加载\
  \ `insert.sql` 脚本（通过 `javax.persistence.sql-load-script-source` 属性）。这意味着 清单 4-11\
  \ 中的脚本会被执行，用于初始化数据库并插入三本书。\n\n***清单 4-11.***  `insert.sql` 文件\n\n```\nINSERT INTO\
  \ BOOK(ID, TITLE, DESCRIPTION, ILLUSTRATIONS, ISBN, NBOFPAGE, PRICE) values →\n\
         (1000, 'Beginning Java EE 6', 'Best Java EE book ever', 1, '1234-5678', 450,\
  \ 49)\nINSERT INTO BOOK(ID, TITLE, DESCRIPTION, ILLUSTRATIONS, ISBN, NBOFPAGE, PRICE)\
  \ values →\n       ( 1001 , 'Beginning Java EE 7 ', 'No, this is the best ', 1,\
  \ '5678-9012', 550, 53)\nINSERT INTO BOOK(ID, TITLE, DESCRIPTION, ILLUSTRATIONS,\
  \ ISBN, NBOFPAGE, PRICE) values →\n       (1010, 'The Lord of the Rings', 'One ring\
  \ to rule them all', 0, '9012-3456', 222, 23)\n```\n\n如果你仔细查看 `BookIT` 集成测试（`shouldFindJavaEE7Book`\
  \ 方法），会发现该测试期望数据库中存在 `book id 1001`。得益于数据库初始化，这一操作在测试运行之前就已经完成。\n\n使用 Maven 编译和测试\n\
  \n在运行 `Main` 应用程序之前，我们已经具备了编译和测试实体的所有要素：`Book` 实体、`BookIT` 集成测试，以及将实体绑定到 Derby 数据库的持久化单元。要编译这段代码，无需直接使用\
  \ `javac` 编译器命令，而是使用 Maven。你必须先创建一个 `pom.xml` 文件，用于描述项目及其依赖项，例如 JPA 和 Bean Validation\
  \ API。你还需要通过配置 `maven-compiler-plugin` 来告知 Maven 你使用的是 Java SE 7，如 清单 4-12 所示。\n\
  \n***清单 4-12.***  用于编译、测试和执行应用程序的 Maven pom.xml 文件\n\n```\n<?xml version=\"1.0\"\
