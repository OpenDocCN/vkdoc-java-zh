  \ `www.antoniogoncalves.org`，并在 Twitter 上关注他：@agoncal。\n\n第 1 章\n\n![image](img/frontdot.jpg)\n\
  \nJava EE 7 概览\n\n当今的企业生活在一个全球竞争的世界中。它们需要应用程序来满足其日益复杂的业务需求。在这个全球化时代，公司分布在各大陆，它们通过互联网跨不同国家进行\
  \ 24/7 全天候业务运营，拥有多个数据中心和国际化系统，这些系统必须处理不同的货币和时区——所有这一切都要在降低成本、降低服务响应时间、将业务数据存储在可靠且安全的存储上，并为客户、员工和供应商提供多种移动和\
  \ Web 界面的同时完成。\n\n大多数公司必须将这些复杂的挑战与其现有的企业信息系统（EIS）结合起来，同时开发企业对企业（B2B）应用程序以与合作伙伴通信，或使用移动和地理定位应用程序开发企业对客户（B2C）系统。公司需要协调存储在不同位置、由多种编程语言处理并通过不同协议路由的内部数据，这并不罕见。当然，它必须在不亏损的情况下做到这一点，这意味着要防止系统崩溃，并保持高可用性、可扩展性和安全性。企业应用程序必须面对变化和复杂性，并且要健壮。这正是\
  \ Java 企业版（Java EE）被创建的原因。\n\nJava EE 的第一个版本（最初称为 J2EE）专注于公司在 1999 年面临的问题：分布式组件。从那时起，软件应用程序不得不适应新的技术解决方案，如\
  \ SOAP 或 RESTful Web 服务。Java EE 平台已经发展，通过标准规范提供各种工作方式来响应这些技术需求。多年来，Java EE 已经发生变化，变得更丰富、更简单、更易用、更具可移植性，并且更加集成。\n\
  \n\n\n在本章中，我将为你概述 Java EE。在介绍其内部架构、组件和服务之后，我将涵盖 Java EE 7 的新特性。\n\n理解 Java EE\n\n\
  当你需要处理对象集合时，你不会从开发自己的哈希表开始；你会使用集合 API（应用程序编程接口）。类似地，如果你需要一个简单的 Web 应用程序，或者一个事务性、安全、可互操作且分布式的应用程序，你也不想开发所有底层\
  \ API：你会使用 Java 企业版。正如 Java 标准版（Java SE）提供了处理集合的 API，Java EE 提供了处理事务（通过 Java 事务\
  \ API，JTA）、消息传递（通过 Java 消息服务，JMS）或持久化（通过 Java 持久化 API，JPA）的标准方式。Java EE 是一套面向企业应用的规范。它可以被视为\
  \ Java SE 的扩展，旨在促进分布式、健壮、强大且高可用应用程序的开发。\n\nJava EE 7 是一个重要的里程碑。它不仅延续了 Java EE 6\
  \ 专注于简化开发模型的步伐，还增加了新的规范，并为现有规范添加了新功能。此外，上下文和依赖注入（CDI）正成为所有这些新规范之间的集成点。Java EE 7\
  \ 的发布恰逢该企业平台诞生 13 周年。它结合了 Java 语言的优势与过去 13 年积累的经验。Java EE 受益于开源社区的活力以及 JCP（Java\
  \ 社区流程）标准化过程的严谨性。如今，Java EE 是一个文档完善的平台，拥有经验丰富的开发者、庞大的社区以及许多部署在公司服务器上的应用程序。Java EE\
  \ 是一套 API 套件，可用于构建标准的、基于组件的多层应用程序。这些组件部署在不同的容器中，容器提供一系列服务。\n\n架构\n\nJava EE 是一套由不同容器实现的规范。容器是\
  \ Java EE 运行时环境，为其托管的组件提供某些服务，例如生命周期管理、依赖注入、并发等。这些组件使用定义明确的契约与 Java EE 基础设施以及其他组件进行通信。它们在部署之前需要以标准方式打包（遵循可压缩为归档文件的定义目录结构）。Java\
  \ EE 是 Java SE 平台的超集，这意味着任何 Java EE 组件都可以使用 Java SE API。\n\n图 1-1 展示了容器之间的逻辑关系。箭头表示一个容器访问另一个容器所使用的协议。例如，Web\
  \ 容器托管 Servlet，这些 Servlet 可以通过 RMI-IIOP 访问 EJB。\n\n![9781430246268_Fig01-01.jpg](img/9781430246268_Fig01-01.jpg)\n\
  \n图 1-1. 标准 Java EE 容器\n\n组件\n\nJava EE 运行时环境定义了实现必须支持的四种组件类型：\n\n*   *Applet* 是在\
  \ Web 浏览器中执行的 GUI（图形用户界面）应用程序。它们使用丰富的 Swing API 来提供强大的用户界面。\n*   *应用程序* 是在客户端上执行的程序。它们通常是\
  \ GUI 或批处理程序，可以访问 Java EE 中间层的所有功能。\n*   *Web 应用程序*（由 Servlet、Servlet 过滤器、Web 事件监听器、JSP\
  \ 和 JSF 页面组成）在 Web 容器中执行，并响应来自 Web 客户端的 HTTP 请求。Servlet 也支持 SOAP 和 RESTful Web 服务端点。Web\
  \ 应用程序也可以包含 EJB Lite（更多内容请参见第 7 章）。\n*   *企业应用程序*（由企业 Java Bean、Java 消息服务、Java 事务\
  \ API、异步调用、定时器服务、RMI/IIOP 组成）在 EJB 容器中执行。EJB 是容器管理的组件，用于处理事务性业务逻辑。它们可以通过 RMI（或通过\
  \ HTTP 用于 SOAP 和 RESTful Web 服务）在本地和远程进行访问。\n\n容器\n\nJava EE 基础设施被划分为称为容器的逻辑域（参见图\
  \ 1-1）。每个容器都有特定的角色，支持一组 API，并向组件提供服务（安全性、数据库访问、事务处理、命名目录、资源注入）。容器隐藏了技术复杂性并增强了可移植性。根据你想要构建的应用程序类型，你需要了解每个容器的功能和限制，以便使用一个或多个容器。例如，如果你需要开发一个\
  \ Web 应用程序，你将开发一个 JSF 层和一个 EJB Lite 层，并将它们部署到 Web 容器中。但是，如果你希望一个 Web 应用程序远程调用业务层并使用消息传递和异步调用，你将同时需要\
  \ Web 容器和 EJB 容器。Java EE 有四种不同的容器：\n\n*   *Applet 容器* 由大多数 Web 浏览器提供，用于执行 Applet\
  \ 组件。当你开发 Applet 时，你可以专注于应用程序的视觉方面，而容器则为你提供一个安全的环境。Applet 容器使用沙箱安全模型，在该模型中，在“沙箱”中执行的代码不允许“在沙箱外运行”。这意味着容器会阻止任何下载到本地计算机的代码访问本地系统资源，例如进程或文件。\n\
  *   *应用程序客户端容器*（ACC）包含一组 Java 类、库和其他文件，这些文件是为 Java SE 应用程序（Swing、批处理或仅包含一个 `main()`\
  \ 方法的类）提供注入、安全管理和命名服务所必需的。ACC 使用 RMI-IIOP 与 EJB 容器通信，并使用 HTTP（例如，用于 Web 服务）与 Web\
  \ 容器通信。\n*   *Web 容器* 提供用于管理和执行 Web 组件（Servlet、EJB Lite、JSP、过滤器、监听器、JSF 页面和 Web\
  \ 服务）的底层服务。它负责实例化、初始化和调用 Servlet，并支持 HTTP 和 HTTPS 协议。它是用于向客户端浏览器提供网页的容器。\n*   *EJB\
  \ 容器* 负责管理包含 Java EE 应用程序业务逻辑层的企业 Bean（会话 Bean 和消息驱动 Bean）的执行。它创建 EJB 的新实例，管理其生命周期，并提供诸如事务、安全性、并发、分发、命名服务或异步调用的可能性等服务。\n\
  \n服务\n\n容器为其部署的组件提供底层服务。作为开发者，容器使您能够专注于实现业务逻辑，而不是解决企业应用程序中遇到的技术问题。图 1-2 向您展示了每个容器提供的服务。例如，Web\
  \ 和 EJB 容器提供用于访问 EIS 的连接器，但 Applet 容器或 ACC 则不提供。Java EE 提供以下服务：\n\n\n\n*   *Java\
  \ 事务 API*：该服务提供了一套事务划分 API，供容器和应用程序使用。它还在服务提供者接口（SPI）层面，为事务管理器与资源管理器之间提供了接口。\n*\
  \   *Java 持久化 API* `：` 用于对象关系映射（ORM）的标准 API。借助其 Java 持久化查询语言（JPQL），你可以查询存储在底层数据库中的对象。\n\
  *   *校验*：Bean 校验提供了类级别和方法级别的约束声明与校验功能。\n*   *Java 消息服务* `：` 允许组件通过消息进行异步通信。它支持可靠的点对点（P2P）消息传递以及发布-订阅（pub-sub）模型。\n\
  *   *Java 命名和目录接口*：该 API 包含在 Java SE 中，用于访问命名和目录系统。你的应用程序使用它来将名称与对象关联（绑定），然后在目录中查找这些对象。你可以查找数据源、JMS\
  \ 工厂、EJB 以及其他资源。在 J2EE 1.4 之前，JNDI 在你的代码中无处不在，而现在则通过注入的方式以更透明的方式使用。\n*   *JavaMail*\
  \ `：` 许多应用程序需要具备发送电子邮件的能力，这可以通过使用 JavaMail API 来实现。\n*   *JavaBeans 激活框架*：JAF API\
  \ 包含在 Java SE 中，为处理不同 MIME 类型的数据提供了框架。JavaMail 使用了该框架。\n*   *XML 处理*：大多数 Java EE\
  \ 组件都可以附带可选的 XML 部署描述符进行部署，并且应用程序通常需要处理 XML 文档。用于 XML 处理的 Java API（JAXP）支持使用 SAX\
  \ 和 DOM API 解析文档，也支持 XSLT。用于 XML 的流式 API（StAX）为 XML 提供了一种拉取解析 API。\n*   *JSON 处理*：Java\
  \ EE 7 中新增的用于 JSON 处理的 Java API（JSON-P）允许应用程序解析、生成、转换和查询 JSON。\n*   *Java EE 连接器架构*：连接器允许你从\
  \ Java EE 组件访问企业信息系统（EIS）。这些系统可以是数据库、大型机或企业资源规划（ERP）程序。\n*   *安全服务*：Java 认证和授权服务（JAAS）使服务能够对用户进行身份验证并实施访问控制。用于容器的\
  \ Java 授权服务提供者契约（JACC）定义了 Java EE 应用服务器与授权服务提供者之间的契约，允许将自定义的授权服务提供者插入到任何 Java EE\
  \ 产品中。用于容器的 Java 认证服务提供者接口（JASPIC）定义了一个标准接口，认证模块可通过该接口与容器集成，以便这些模块能够建立容器所使用的认证身份。\n\
  *   *Web 服务*：Java EE 支持 SOAP 和 RESTful Web 服务。用于 XML Web 服务的 Java API（JAX-WS）取代了用于基于\
  \ XML 的 RPC 的 Java API（JAX-RPC），为使用 SOAP/HTTP 协议的 Web 服务提供支持。用于 RESTful Web 服务的\
  \ Java API（JAX-RS）为使用 REST 风格的 Web 服务提供支持。\n*   *依赖注入*：自 Java EE 5 起，某些资源（数据源、JMS\
  \ 工厂、持久化单元、EJB 等）可以被注入到受管组件中。Java EE 7 更进一步，同时使用了 CDI 和 DI（Java 依赖注入）规范。\n*   *管理*：Java\
  \ EE 定义了使用特殊的管理企业 Bean 来管理容器和服务器的 API。Java 管理扩展（JMX）API 也用于提供一些管理支持。\n*   *部署*：Java\
  \ EE 部署规范定义了部署工具与 Java EE 产品之间的契约，以标准化应用程序部署。\n\n![9781430246268_Fig01-02.jpg](img/9781430246268_Fig01-02.jpg)\n\
  \n图 1-2. 容器提供的服务\n\n网络协议\n\n如图 1-2 所示，部署在容器中的组件可以通过不同的协议被调用。例如，部署在 Web 容器中的 Servlet\
  \ 可以通过 HTTP 调用，而部署在 EJB 容器中、带有 EJB 端点的 Web 服务也可以通过 HTTP 调用。以下是 Java EE 支持的协议列表：\n\
  \n*   *HTTP*：HTTP 是 Web 协议，在现代应用程序中无处不在。客户端 API 由 Java SE 中的 `java.net` 包定义。HTTP\
  \ 服务器端 API 由 Servlet、JSP 和 JSF 接口，以及 SOAP 和 RESTful Web 服务定义。\n*   *HTTPS* 是 HTTP\
  \ 与安全套接字层（SSL）协议的结合。\n*   *RMI-IIOP* `：` 远程方法调用（RMI）允许你独立于底层协议调用远程对象。Java SE 原生的\
  \ RMI 协议是 Java 远程方法协议（JRMP）。RMI-IIOP 是 RMI 的一个扩展，用于与 CORBA 集成。Java 接口定义语言（IDL）允许\
  \ Java EE 应用程序组件使用 IIOP 协议调用外部的 CORBA 对象。CORBA 对象可以用多种语言（Ada、C、C++、Cobol 等）以及 Java\
  \ 编写。\n\n打包\n\n为了部署到容器中，组件首先必须被打包成标准格式的归档文件。Java SE 定义了 Java 归档（jar）文件，用于将许多文件（Java\
  \ 类、部署描述符、资源或外部库）聚合到一个压缩文件（基于 ZIP 格式）中。如图 1-3 所示，Java EE 定义了不同类型的模块，这些模块基于这种通用的\
  \ jar 格式拥有各自的打包格式。\n\n![9781430246268_Fig01-03.jpg](img/9781430246268_Fig01-03.jpg)\n\
  \n图 1-3. 容器中的归档文件\n\n*   一个应用程序客户端模块包含打包在 jar 文件中的 Java 类和其他资源文件。该 jar 文件可以在 Java\
  \ SE 环境或应用程序客户端容器中执行。与任何其他归档格式一样，jar 文件包含一个可选的 `META-INF` 目录，用于存放描述归档文件的元信息。`META-INF/MANIFEST.MF`\
  \ 文件用于定义与扩展和包相关的数据。如果部署在 ACC 中，部署描述符可以可选地放置在 `META-INF/application-client.xml` 中。\n\
  *   一个 EJB 模块包含一个或多个会话 Bean 和/或消息驱动 Bean（MDB），打包在 jar 文件（通常称为 EJB jar 文件）中。它包含一个可选的\
  \ `META-INF/ejb-jar.xml` 部署描述符，并且只能部署在 EJB 容器中。\n*   一个 Web 应用程序模块包含 Servlet、JSP、JSF\
  \ 页面和 Web 服务，以及任何其他与 Web 相关的文件（HTML 和 XHTML 页面、层叠样式表（CSS）、JavaScript、图片、视频等）。自 Java\
  \ EE 6 起，Web 应用程序模块还可以包含 EJB Lite Bean（EJB API 的一个子集，在第 7 章中描述）。所有这些工件都被打包成一个扩展名为\
  \ `.war` 的 jar 文件（通常称为 war 文件或 Web 归档文件）。可选的 Web 部署描述符定义在 `WEB-INF/web.xml` 文件中。如果\
  \ war 文件包含 EJB Lite Bean，则可以在 `WEB-INF/ejb-jar.xml` 中设置一个可选的部署描述符。Java `.class`\
  \ 文件放置在 `WEB-INF/classes` 目录下，依赖的 jar 文件放置在 `WEB-INF/lib` 目录下。\n*   一个企业模块可以包含零个或多个\
  \ Web 应用程序模块、零个或多个 EJB 模块，以及其他公共或外部库。所有这些都被打包到一个企业归档文件（扩展名为 `.ear` 的 jar 文件）中，以便这些不同模块的部署能够同时且一致地进行。可选的企业模块部署描述符定义在\
  \ `META-INF/application.xml` 文件中。特殊的 `lib` 目录用于在模块之间共享公共库。\n\n注解与部署描述符\n\n\n\n在编程范式中，存在两种方法：命令式编程和声明式编程。命令式编程指定了达成目标的算法（*需要做什么*），而声明式编程则指定了如何达成目标（*需要怎么做*）。在\
  \ Java EE 中，声明式编程通过使用元数据来实现，即注解和/或部署描述符。\n\n正如你在图 1-2 中所见，组件运行在容器中，容器为组件提供一组服务。元数据用于声明和定制这些服务，并将附加信息与\
  \ Java 类、接口、构造器、方法、字段或参数关联起来。\n\n自 Java EE 5 以来，注解在企业平台中已广泛普及。它们用元数据信息来修饰你的代码（Java\
  \ 类、接口、字段、方法等）。清单 1-1 展示了一个 POJO（Plain Old Java Object，普通旧式 Java 对象），它通过在类和一个属性上使用注解来声明某些行为（更多关于\
  \ EJB、持久化上下文和注解的内容将在后续章节介绍）。\n\n***清单 1-1.***  一个带有注解的 EJB\n\n```\n@Stateless\n\
  @Remote(ItemRemote.class)\n@Local(ItemLocal.class)\n@LocalBean\npublic class ItemEJB\
  \ implements ItemLocal, ItemRemote {\n\n@PersistenceContext (unitName = \"chapter01PU\"\
  )\n  private EntityManager em;\n\npublic Book findBookById(Long id) {\n    return\
  \ em.find(Book.class, id);\n  }\n}\n```\n\n另一种声明元数据的方式是使用部署描述符。部署描述符（DD）指的是一个 XML\
  \ 配置文件，它与组件一起部署在容器中。清单 1-2 展示了一个 EJB 部署描述符。与大多数 Java EE 7 部署描述符一样，它定义了 `http://xmlns.jcp.org/xml/ns/javaee`\
  \ 命名空间，并包含一个带有规范版本号的 version 属性。\n\n***清单 1-2.***  一个 EJB 部署描述符\n\n```\n<ejb-jar\
  \ xmlns=\" http://xmlns.jcp.org/xml/ns/javaee \" →\n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance\
  \ \" →\n         xsi:schemaLocation=\" http://xmlns.jcp.org/xml/ns/javaee →\n  \
  \                           http://xmlns.jcp.org/xml/ns/javaee/ejb-jar_3_2.xsd \"\
  \ →\n         version=\"3.2\" >\n\n<enterprise-beans>\n    <session>\n      <ejb-name>ItemEJB</ejb-name>\n\
  \      <remote>org.agoncal.book.javaee7.ItemRemote</remote>\n      <local>org.agoncal.book.javaee7.ItemLocal</local>\n\
  \      <local-bean/>\n      <ejb-class>org.agoncal.book.javaee7.ItemEJB</ejb-class>\n\
  \      <session-type>Stateless</session-type>\n      <transaction-type>Container</transaction-type>\n\
  \    </session>\n  </enterprise-beans>\n</ejb-jar>\n```\n\n部署描述符需要与组件一起打包在特殊的 `META-INF`\
  \ 或 `WEB-INF` 目录中才能生效。表 1-1 列出了 Java EE 部署描述符及其相关规范（更多内容将在后续章节介绍）。\n\n表 1-1. Java\
  \ EE 中的部署描述符\n\n| 文件 | 规范 | 路径 |\n| --- | --- | --- |\n| `application.xml` | Java\
  \ EE | `META-INF` |\n| `application-client.xml` | Java EE | `META-INF` |\n| `beans.xml`\
  \ | CDI | `META-INF` 或 `WEB-INF` |\n| `ra.xml` | JCA | `META-INF` |\n| `ejb-jar.xml`\
  \ | EJB | `META-INF` 或 `WEB-INF` |\n| `faces-config.xml` | JSF | `WEB-INF` |\n|\
  \ `persistence.xml` | JPA | `META-INF` |\n| `validation.xml` | Bean Validation |\
  \ `META-INF` 或 `WEB-INF` |\n| `web.xml` | Servlet | `WEB-INF` |\n| `web-fragment.xml`\
  \ | Servlet | `WEB-INF` |\n| `webservices.xml` | SOAP Web Services | `META-INF`\
  \ 或 `WEB-INF` |\n\n自 Java EE 5 以来，大多数部署描述符都是可选的，你可以使用注解来代替。但你也可以在你的应用程序中同时利用两者的优点。注解最大的优势在于它们能显著减少开发者需要编写的代码量，并且通过使用注解，你可以避免使用部署描述符。另一方面，部署描述符是外部的\
  \ XML 文件，可以在不修改源代码和重新编译的情况下进行更改。如果你同时使用两者，那么在部署应用程序或组件时，部署描述符会覆盖元数据（即 XML 优先于注解）。\n\
  \n![image](img/sq.jpg) **注意**  在当今的开发中，Java EE 更倾向于使用注解而非部署描述符。这是因为存在一种趋势，即用单一语言（Java）取代双语言编程（Java\
  \ + XML）。当所有内容（数据、方法和带有注解的元数据）都集中在一个地方时，分析和原型化应用程序也更容易，这也是事实。\n\nJava EE 采用了“例外编程”（又称“约定优于配置”）的概念，因此大多数常见行为无需通过元数据声明（“编程元数据是例外，容器负责处理默认值”）。这意味着只需少量注解或\
  \ XML，容器就能为你提供一组具有默认行为的默认服务。\n\n标准\n\nJava EE 基于标准。这意味着 Java EE 需要经过 JCP 的标准化流程，并在规范中加以描述。事实上，Java\
  \ EE 被称为*伞式规范*，因为它将许多其他规范（或 Java 规范请求）捆绑在一起。你可能会问为什么标准如此重要，因为一些最成功的 Java 框架并非标准化（如\
  \ Struts、Spring 等）。纵观历史，人类创建标准是为了方便沟通和交流。一些显著的例子包括语言、货币、时间、导航、度量衡、工具、铁路、电力、电报、电话、协议和编程语言。\n\
  \n在 Java 早期，如果你从事任何类型的 Web 或企业开发，你都会生活在一个专有世界中，要么创建自己的框架，要么将自己锁定在专有的商业框架中。随后出现了开源框架时代，但这些框架并不总是基于开放标准。你可以使用开源框架并被锁定在单一实现上，或者使用实现标准的开源框架并保持可移植性。Java\
  \ EE 提供了开放标准，这些标准由多个商业（WebLogic、Websphere、MQSeries 等）或开源（GlassFish、JBoss、Hibernate、Open\
  \ JPA、Jersey 等）框架实现，用于处理事务、安全性、有状态组件、对象持久化等。如今，在 Java EE 的历史上，你的应用程序比以往任何时候都更容易部署到任何兼容的应用服务器上，且几乎无需更改。\n\
  \nJCP\n\nJCP 是一个开放的组织，由 Sun Microsystems 于 1998 年创建，参与定义 Java 平台的未来版本和特性。当确定需要对现有组件或\
  \ API 进行标准化时，发起人（又称规范负责人）会创建一个 JSR 并组建一个专家组。该小组由公司代表、组织、大学或个人组成，负责 JSR 的开发，并需要交付：\n\
  \n*   一份或多份规范，详细说明并定义 JSR（Java 规范请求）的基础，\n*   一个*参考实现*（RI），即规范的实际实现，\n*   *兼容性测试套件*（又称*技术兼容性套件*，或\
  \ TCK），这是一组测试，每个实现都需要通过才能声称符合规范。\n\n\n\n经执行委员会（EC）批准后，规范将发布给社区进行实现。\n\n可移植性\n\n\
  自诞生之初，Java EE 的目标就是让应用程序能够在无需修改代码或配置文件的情况下，开发并部署到任何应用服务器上。但这从未像看上去那么简单。规范并未涵盖所有细节，而具体实现最终会提供不可移植的解决方案。例如，JNDI\
  \ 名称就曾出现过这种情况。如果你将 EJB 部署到 GlassFish、JBoss 或 WebLogic，JNDI 名称会各不相同，因为它并非规范的一部分，因此你必须根据所使用的应用服务器来修改代码。例如，Java\
  \ EE 通过为 JNDI 名称指定语法，解决了这个特定问题。\n\n如今，该平台引入了比以往更多的可移植配置属性，从而提高了可移植性。尽管已弃用了一些 API（精简），但\
  \ Java EE 应用程序仍保持向后兼容性，让你能够将应用程序迁移到更新版本的应用服务器，而不会遇到太多问题。\n\n编程模型\n\n大多数 Java EE\
  \ 7 规范都使用相同的编程模型。它通常是一个带有一些元数据（注解或 XML）的 POJO，部署到容器中。大多数情况下，POJO 甚至不需要实现接口或继承超类。借助元数据，容器知道要将哪些服务应用于这个已部署的组件。\n\
  \n在 Java EE 7 中，Servlet、JSF 支持 bean、EJB、实体、SOAP 和 REST Web 服务都是带有可选 XML 部署描述符的注解类。清单\
  \ 1-3 展示了一个 JSF 支持 bean，它实际上是一个带有单个 CDI 注解的 Java 类。\n\n***清单 1-3.***  JSF 支持 Bean\n\
  \n```\n@Named\npublic class BookController {\n\n@Inject\n  private BookEJB bookEJB;\n\
  \nprivate Book book = new Book();\n  private List<Book> bookList = new ArrayList<Book>();\n\
  \npublic String doCreateBook() {\n    book = bookEJB.createBook(book);\n    bookList\
  \ = bookEJB.findBooks();\n    return \"listBooks.xhtml\";\n  }\n\n// Getters, setters\n\
  }\n```\n\nEJB 也遵循相同的模型。如清单 1-4 所示，如果你需要本地访问 EJB，一个简单的带注解的类（无需接口）就足够了。EJB 也可以直接部署在\
  \ war 文件中，而无需事先打包成 jar 文件。这使得 EJB 成为最简单的、可用于从简单 Web 应用程序到复杂企业应用程序的事务性组件。\n\n***清单\
  \ 1-4.***  无状态 EJB\n\n```\n@Stateless\npublic class BookEJB {\n\n@Inject\n  private\
  \ EntityManager em;\n\npublic Book findBookById (Long id) {\n    return em.find(Book.class,\
  \ id);\n  }\n\npublic Book createBook (Book book) {\n    em.persist(book);\n   \
  \ return book;\n  }\n}\n```\n\nRESTful Web 服务已逐渐进入现代应用程序。Java EE 7 通过改进 JAX-RS 规范来满足企业的需求。如清单\
  \ 1-5 所示，RESTful Web 服务是一个带注解的 Java 类，用于响应 HTTP 操作（更多内容请参见第 15 章）。\n\n***清单 1-5.***\
  \  RESTful Web 服务\n\n```\n@Path(\"books\")\npublic class BookResource {\n\n@Inject\n\
  \  private EntityManager em;\n\n@GET\n  @Produces ({\"application/xml\", \"application/json\"\
  })\n  public List<Book> getAllBooks () {\n    Query query = em.createNamedQuery(\"\
  findAllBooks\");\n    List<Book> books = query.getResultList();\n    return books;\n\
  \  }\n}\n```\n\n在本书的各章节中，你都会遇到这类代码：组件仅包含业务逻辑，而元数据由注解（或 XML）表示，以确保容器应用正确的服务。\n\n\
  Java 标准版 7\n\n需要强调的是，Java EE 是 Java SE 的超集。这意味着 Java 语言的所有特性以及 API 在 Java EE 中同样可用。\n\
  \nJava SE 7 于 2011 年 7 月正式发布。它是在 JSR 336 下开发的，带来了许多新特性，并延续了 Java SE 5（自动装箱、注解、泛型、枚举等）和\
  \ Java SE 6（诊断、管理和监控工具、JMX API、在 Java 虚拟机中简化脚本语言执行）引入的易开发特性。Java SE 7 整合了 JSR 334（更广为人知的名称为\
  \ Project Coin）、JSR 292（InvokeDynamic，或在 JVM 中支持动态语言）、JSR 203（新的 I/O API，通常称为 NIO.2）以及现有规范的若干更新（例如\
  \ JDBC 4.1（JSR 221））。即使本书没有明确涵盖 Java SE 7，本书示例中也会用到其中一些增强功能，因此我只想让你快速了解示例可能的样子。\n\
  \n字符串 Case\n\n在 Java SE 7 之前，switch case 中只能使用数字（byte、short、int、long、char）或枚举。现在可以在\
  \ switch 中使用字符串来比较字母数字值。这避免了冗长的 if/then/else 列表，并使代码更具可读性。清单 1-6 展示了你现在可以在应用程序中编写的内容。\n\
  \n***清单 1-6.***  字符串 Case\n\n```\nString action = \"update\";\nswitch (action) {\n\
  \  case \"create\":\n    create();\n    break;\n  case \"read\":\n    read();\n\
  \    break;\n  case \"udpate\":\n    udpate();\n    break;\n  case \"delete\":\n\
  \    delete();\n    break;\n  default:\n    noCrudAction(action);\n}\n```\n\n菱形运算符\n\
  \n泛型随 Java SE 5 一起出现，语法相当冗长。Java SE 7 引入了一种稍微简洁的表示法，称为菱形运算符，它不会在对象实例化时重复声明。清单 1-7\
  \ 给出了一个使用和不使用菱形运算符声明泛型的示例。\n\n***清单 1-7.***  使用和不使用菱形运算符声明泛型\n\n```\n// 不使用菱形运算符\n\
  List<String> list = new ArrayList<String>() ;\nMap<Reference<Object>, Map<Integer,\
  \ List<String>>> map =\n    new HashMap<Reference<Object>, Map<Integer, List<String>>>()\
  \ ;\n\n// 使用菱形运算符\nList<String> list = new ArrayList<>() ;\nMap<Reference<Object>,\
  \ Map<Integer, List<String>>> map = new HashMap<>() ;\n```\n\nTry-with-Resources\n\
  \n在几个 Java API 中，需要手动管理资源的关闭，通常是通过在 finally 块中调用 close 方法。对于由操作系统管理的资源（如文件、套接字或\
  \ JDBC 连接）来说，情况就是如此。清单 1-8 展示了如何必须将关闭代码放在带有异常处理的 finally 块中，这降低了代码的可读性。\n\n***清单\
  \ 1-8.***  在 Finally 块中关闭输入/输出流\n\n```\ntry {\n  InputStream input = new FileInputStream(in.txt);\n\
  \  try {\n    OutputStream output = new FileOutputStream(out.txt);\n    try {\n\
  \      byte[] buf = new byte[1024];\n      int len;\n      while ((len = input.read(buf))\
  \ >= 0)\n        output.write(buf, 0, len);\n    } finally {\n      output.close();\n\
  \    }\n  } finally {\n    input.close();\n  }\n} catch (IOException e) {\n  e.printStrackTrace();\n\
  }\n```\n\ntry-with-resources 通过一种更简单的新语法克服了这种可读性问题。它允许 `try` 中的资源在块结束时自动释放。清单 1-9\
  \ 中描述的这种表示法可用于任何实现了新接口 `java.lang.AutoCloseable` 的类。该接口现在由多个类（`InputStream`、`OutputStream`、`JarFile`、`Reader`、`Writer`、`Socket`、`ZipFile`...）和接口（`java.sql.ResultSet`）实现。\n\
  \n\n\n***清单 1-9.***  使用 Try-with-Resources 关闭输入/输出流\n\n```\ntry (InputStream input\
  \ = new FileInputStream(in.txt);\n     OutputStream output = new FileOutputStream(out.txt))\
  \ {\n  byte[] buf = new byte[1024];\n  int len;\n  while ((len = input.read(buf))\
  \ >= 0)\n    output.write(buf, 0, len);\n} catch (IOException e) {\n  e.printStrackTrace();\n\
  }\n```\n\n多重捕获异常\n\n在 Java SE 6 之前，catch 块一次只能处理一种类型的异常。因此，您必须累积多个 catch 块来为每种异常类型执行特定操作。如清单\
  \ 1-10 所示，您经常需要为每个异常执行相同的操作。\n\n***清单 1-10.***  使用多个 catch 异常子句\n\n```\ntry {\n\
  \  // 执行某些操作\n} catch( SAXException e) {\n  e.printStackTrace();\n} catch( IOException\
  \ e) {\n  e.printStackTrace();\n} catch( ParserConfigurationException e) {\n  e.printStackTrace();\n\
  }\n```\n\n在 Java SE 7 中，如果每个异常的处理方式相同，您可以添加任意数量的异常类型，并用管道符分隔，如清单 1-11 所示。\n\n***清单\
  \ 1-11.***  使用多重捕获异常\n\n```\ntry {\n  // 执行某些操作\n} catch( SAXException | IOException\
  \ | ParserConfigurationException e ) {\n  e.printStackTrace();\n}\n```\n\nNIO.2\n\
  \n如果您像许多 Java 开发者一样，每次读写文件时都感到棘手，那么 Java SE 7 通过引入一个新的 IO 包 `java.nio` 为您解了围。它拥有更具表现力的语法，旨在取代现有的\
  \ `java.io` 包，以实现：\n\n*   更清晰的异常处理。\n*   通过新特性（支持特定操作系统属性、符号链接等）完全访问文件系统。\n*   增加了\
  \ `FileSystem` 和 `FileStore`（例如，磁盘分区）的概念。\n*   实用方法（移动/复制文件、读取/写入二进制或文本文件、路径、目录等）。\n\
  \n清单 1-12 向您展示了新的 `java.nio.file.Path` 接口（用于定位文件系统中的文件或目录）以及实用类 `java.nio.file.Files`（用于获取文件信息或操作文件）。从\
  \ Java SE 7 开始，即使旧的 `java.io` 包尚未被弃用，也建议使用新的 NIO.2。清单 1-12 中的代码获取了 `source.txt`\
  \ 文件的一些信息，将其复制到 `dest.txt` 文件，显示其内容，然后将其删除。\n\n***清单 1-12.***  使用新的 IO 包\n\n```\n\
  Path path = Paths.get(\"source.txt\") ;\nboolean exists = Files.exists(path) ;\n\
  boolean isDirectory = Files.isDirectory(path) ;\nboolean isExecutable = Files.isExecutable(path);\n\
  boolean isHidden = Files.isHidden(path);\nboolean isReadable = Files.isReadable(path);\n\
  boolean isRegularFile = Files.isRegularFile(path);\nboolean isWritable = Files.isWritable(path);\n\
  long size = Files.size(path);\n\n// 复制文件\nFiles.copy (Paths.get(\"source.txt\"),\
  \ Paths.get(\"dest.txt\"));\n// 读取文本文件\nList<String> lines = Files.readAllLines(Paths.get(\"\
  source.txt\"), UTF_8);\nfor (String line : lines) {\n  System.out.println(line);\n\
  }\n// 删除文件\nFiles.delete (path);\n```\n\nJava EE 规范概述\n\nJava EE 是一个总括性规范，它捆绑并整合了其他规范。如今，一个应用服务器必须实现\
  \ 31 个规范才能符合 Java EE 7 标准，而开发者需要了解数千个 API 才能充分利用容器。尽管需要了解众多规范和 API，Java EE 7 仍致力于通过引入基于\
  \ POJO 的简单编程模型、Web Profile 以及淘汰一些过时技术，为平台带来简洁性。\n\nJava EE 简史\n\n图 1-4 总结了 Java\
  \ EE 14 年的演进历程。Java EE 以前称为 J2EE。J2EE 1.2 最初由 Sun 公司开发，于 1999 年作为包含十个 JSR 的总括性规范发布。当时人们还在谈论\
  \ CORBA，因此 J2EE 1.2 的创建考虑到了分布式系统。企业 Java Bean（EJB）被引入，支持远程有状态和无状态服务对象，并可选择支持持久化对象（实体\
  \ Bean）。它们构建在事务性和分布式组件模型之上，使用 RMI-IIOP（远程方法调用-互联网内部 ORB 协议）作为底层协议。Web 层拥有 Servlet\
  \ 和 JavaServer Pages（JSP），JMS 用于发送消息。\n\n![9781430246268_Fig01-04.jpg](img/9781430246268_Fig01-04.jpg)\n\
  \n图 1-4. J2EE/Java EE 发展史\n\n从 J2EE 1.3 开始，该规范由 Java 社区流程（JCP）在 JSR 58 下制定。对实体 Bean\
  \ 的支持成为强制要求，EJB 引入了 XML 部署描述符来存储元数据（在 EJB 1.0 中，这些元数据被序列化到一个文件中）。该版本通过引入本地接口和按引用传递参数，解决了通过远程接口按值传递参数的开销问题。引入了\
  \ J2EE 连接器架构（JCA）以将 Java EE 连接到 EIS。\n\n![image](img/sq.jpg) **注意** CORBA 大约起源于\
  \ 1988 年，正是因为企业系统开始走向分布式（例如 Tuxedo 和 CICS）。EJB 以及随后的 J2EE 遵循了相同的假设，但晚了十年。到 J2EE\
  \ 起步时，CORBA 已得到全面支持并达到工业强度，但公司们找到了更简单、更解耦的方式来连接分布式系统，例如 SOAP 或 REST Web 服务。因此，对于大多数企业系统来说，CORBA\
  \ 变得多余。\n\nJ2EE 1.4（JSR 151）在 2003 年包含了 20 个规范，并增加了对 Web 服务的支持。EJB 2.1 允许通过 SOAP/HTTP\
  \ 调用会话 Bean。创建了定时器服务，允许在指定时间或时间间隔调用 EJB。该版本为应用程序的组装和部署提供了更好的支持。尽管其支持者预测它前景广阔，但 J2EE\
  \ 的承诺并未全部实现。用它创建的系统过于复杂，开发时间常常与用户需求的复杂性完全不成比例。J2EE 被视为一个重量级组件模型：难以测试、难以部署、难以运行。正是在那时，Struts、Spring\
  \ 或 Hibernate 等框架应运而生，并展示了一种开发企业应用的新方式。\n\n幸运的是，在 2006 年第二季度，Java EE 5（JSR 244）发布，并带来了显著的改进。它从开源框架中汲取灵感，回归了\
  \ POJO 编程模型。元数据可以通过注解定义，XML 描述符变为可选。从开发者的角度来看，EJB 3 和新的 JPA 更像是平台的一次量子跃迁，而非演进。JavaServer\
  \ Faces（JSF）被引入作为标准的表示层框架，JAX-WS 2.0 取代了 JAX-RPC 成为 SOAP Web 服务 API。\n\n2009 年，Java\
  \ EE 6（JSR 316）沿着简化开发的道路前进，在整个平台（包括 Web 层）中采纳了注解、POJO 编程和“按例外配置”机制的概念。它带来了一系列丰富的创新，例如全新的\
  \ JAX-RS 1.1、Bean Validation 1.0 和 CDI 1.0；它简化了像 EJB 3.1 这样的成熟 API，并丰富了其他 API，如\
  \ JPA 2.0 或 EJB 定时器服务。但 Java EE 6 的主要主题是可移植性（例如，通过标准化全局 JNDI 命名）、弃用某些规范（通过修剪），以及通过\
  \ Profile 创建平台的子集。\n\n\n\n如今，Java EE 7 带来了许多新的规范（批处理、WebSocket、JSON 处理），同时也改进了其他规范。Java\
  \ EE 7 还在大多数规范中采用了 CDI，从而改善了技术之间的集成。在本书中，我想向您展示这些改进，以及 Java 企业版变得多么简单和丰富。\n\n**修剪**\n\
  \nJava EE 于 1999 年首次发布，此后每个版本都增加了新的规范（如前文图 1-4 所示）。这在规模、实现和采用方面都成了一个问题。一些功能由于技术过时或在此期间出现了其他替代方案，而未得到良好支持或广泛部署。因此，专家组决定提议通过修剪来移除某些功能。修剪过程（也称为标记为删除）包括提出一个可能在下一个\
  \ Java EE 版本中移除的功能列表。请注意，提议移除的项目均未从当前版本中实际移除，但可能会在下一个版本中被移除。Java EE 6 提议修剪以下规范和功能，它们确实从\
  \ Java EE 7 中消失了：\n\n*   *EJB 2.x 实体 Bean CMP（曾是 JSR 318 的一部分）*：EJB 2.x 实体 Bean\
  \ 复杂且重量级的持久化组件模型已被 JPA 取代。\n*   *JAX-RPC (JSR 101)*：这是将 SOAP Web 服务建模为 RPC 调用的首次尝试。现在它已被更易用且更健壮的\
  \ JAX-WS 取代。\n*   *JAXR (JSR 93)*：JAXR 是专门用于与 UDDI 注册中心通信的 API。由于 UDDI 并未广泛使用，JAXR\
  \ 已退出 Java EE，并作为一个独立的 JSR 发展。\n*   *Java EE 应用程序部署 (JSR 88)*：JSR 88 是一个规范，工具开发者可将其用于跨应用服务器进行部署。此\
  \ API 并未获得太多供应商支持，因此它退出 Java EE 7，作为一个独立的 JSR 发展。\n\n**Java EE 7 规范**\n\nJava EE\
  \ 7 规范由 JSR 342 定义，并包含其他 31 个规范。一个旨在符合 Java EE 7 的应用服务器必须实现所有这些规范。表 1-2 到表 1-6 按技术领域列出了所有这些规范，并附有它们的版本和\
  \ JSR 编号。\n\n表 1-2. Java 企业版规范\n\n![Table1-2.jpg](img/Table1-2.jpg)\n\n在 Web 服务领域（表\
  \ 1-3），由于没有规范得到更新，SOAP Web 服务没有进行任何改进（参见第 14 章）。REST Web 服务近来在主要 Web 应用程序中得到了大量使用。JAX-RS\
  \ 2.0 经历了一次重大更新，例如引入了客户端 API（参见第 15 章）。新的 JSON-P（JSON 处理）规范相当于 JAXP（用于 XML 处理的 Java\
  \ API），但它是针对 JSON 而非 XML 的（第 12 章）。\n\n表 1-3. Web 服务规范\n\n![Table1-3.jpg](img/Table1-3.jpg)\n\
  \n在 Web 规范（表 1-4）中，JSP 或 JSTL 没有变化，因为这些规范没有更新。表达式语言已从 JSP 中分离出来，现在在其自己的 JSR (341)\
  \ 中发展。Servlet 和 JSF（第 10 章和第 11 章）都已更新，并且全新的 WebSocket 1.0 已在 Java EE 7 中引入。\n\n\
  表 1-4. Web 规范\n\n![Table1-4.jpg](img/Table1-4.jpg)\n\n在企业领域（表 1-5），有两个重大更新：JMS 2.0（第\
  \ 13 章）和 JTA 1.2（第 9 章），它们已有十多年没有更新了。另一方面，EJB（第 7 章和第 8 章）、JPA（第 4 章、第 5 章和第 6 章）以及拦截器（第\
  \ 2 章）规范则进行了较小的更新。\n\n表 1-5. 企业规范\n\n![Table1-5.jpg](img/Table1-5.jpg)\n\nJava EE\
  \ 7 包含其他几个规范（表 1-6），例如全新的批处理（JSR 352）和 Java EE 并发工具（JSR 236）。一些值得注意的更新包括 Bean Validation\
  \ 1.1（第 3 章）、CDI 1.1（第 2 章）和 JMS 2.0（第 13 章）。\n\n表 1-6. 管理、安全及其他规范\n\n![Table1-6.jpg](img/Table1-6.jpg)\n\
  \nJava EE 7 不仅由这 31 个规范组成，它还严重依赖于 Java SE 7。表 1-7 展示了一些属于 Java SE 但影响 Java EE 的规范。\n\
  \n表 1-7. Java SE 7 中的相关企业技术\n\n![Table1-7.jpg](img/Table1-7.jpg)\n\n**Web Profile\
  \ 7 规范**\n\nProfile 是在 Java EE 6 中引入的。其主要目标是缩减平台规模，以更有效地满足开发者的需求。无论您今天开发的 Java EE\
  \ 7 应用程序规模或复杂性如何，您都将部署在一个为您提供 31 个规范的 API 和服务的应用服务器上。针对 Java EE 的一个主要批评是它过于庞大。Profile\
  \ 正是为了解决这个问题而设计的。如图 1-5 所示，Profile 是平台的子集或超集，并且可能与平台或其他 Profile 重叠。\n\n![9781430246268_Fig01-05.jpg](img/9781430246268_Fig01-05.jpg)\n\
  \n图 1-5. Java EE 平台中的 Profile\n\nJava EE 7 定义了一个名为 Web Profile 的单一 Profile。其目标是允许开发者使用适当的技术集来创建\
  \ Web 应用程序。Web Profile 7.0 在一个独立的 JSR 中指定，并且目前是 Java EE 7 平台唯一的 Profile。未来可能会创建其他\
  \ Profile（您可以设想一个最小 Profile 或门户 Profile）。表 1-8 列出了 Web Profile 中包含的规范。\n\n表 1-8.\
  \ Web Profile 7.0 规范\n\n![Table1-8a.jpg](img/Table1-8a.jpg)![Table1-8.jpg](img/Table1-8b.jpg)\n\
  \n**CD-BookStore 应用程序**\n\n在本书中，您将看到处理实体、验证约束、EJB、JSF 页面、JMS 监听器以及 SOAP 或 RESTful\
  \ Web 服务的代码片段。它们都属于 CD-BookStore 应用程序。该应用程序是一个电子商务网站，允许客户浏览在售的图书和 CD 目录。使用购物车，客户可以在浏览目录时添加或移除商品，并进行结账以便付款并获得采购订单。该应用程序与银行系统有外部交互，用于验证信用卡号。图\
  \ 1-6 中的用例图描述了系统的参与者和功能。\n\n![9781430246268_Fig01-06.jpg](img/9781430246268_Fig01-06.jpg)\n\
  \n图 1-6. CD-BookStore 应用程序的用例图\n\n与图 1-6 中描述的系统交互的参与者是\n\n\n\n*   **员工**：需要管理商品目录和客户详细信息的公司员工。他们还可以浏览采购订单。\n\
  *   **用户**：匿名访问网站并浏览图书和 CD 目录的访客。如果他们想购买商品，需要创建一个账户成为客户。\n*   **客户**：可以浏览目录、更新账户详情并在线购买商品。\n\
  *   **外部银行**：系统将信用卡验证委托给该银行。\n\n![image](img/sq.jpg) **注意** 你可以从 Apress 网站（`www.apress.com`）或直接从\
  \ Git 仓库 `https://github.com/agoncal/agoncal-book-javaee7` 下载本书的代码示例。\n\n总结\n\n\
  当一家公司开发 Java 应用程序并需要添加事务管理、安全性、并发性或消息传递等企业级功能时，Java EE 是一个有吸引力的选择。它是标准化的，组件被部署到不同的容器中，这为你提供了许多服务，并且它支持多种协议。Java\
  \ EE 7 沿袭了其先前版本的路线，为 Web 层增加了易用性。该平台版本更轻量（得益于精简、配置文件和 EJB Lite）、更易用（无需在 EJB 上使用接口或在\
  \ Web 层使用注解）、更丰富（包含新的规范和特性）且更具可移植性（包含标准化的部署描述符属性容器和标准 JNDI 名称）。\n\n在本章中，我为你快速概述了\
  \ Java EE 7。接下来的章节将致力于更深入地研究 Java EE 7 规范。每章都包含多个代码片段和一个“综合应用”部分。你需要一些工具和框架来编译、部署、运行和测试代码：JDK\
  \ 1.7、Maven 3、JUnit 4、Derby 10.8 和 GlassFish v4。请参考附录 A 来设置你的开发环境。\n\n第 2 章\n\n\
  ![image](img/frontdot.jpg)\n\n上下文与依赖注入\n\nJava EE 的第一个版本（当时称为 J2EE）引入了*控制反转（IoC）*的概念，这意味着容器将控制你的业务代码并提供技术服务（例如事务或安全管理）。控制意味着管理组件的生命周期，为你的组件带来依赖注入和配置。这些服务内置于容器中，程序员必须等到\
  \ Java EE 的后续版本才能使用它们。在早期版本中，通过 XML 部署描述符可以实现组件配置，但我们不得不等到 Java EE 5 和 Java EE 6\
  \ 才拥有一个简单而强大的 API 来进行生命周期管理和依赖注入。\n\nJava EE 6 引入了上下文与依赖注入，以缓解其中一些问题，但主要是为了成为一个将这些概念联系在一起的中央规范。如今，CDI\
  \ 为托管 Bean 提供了一流的编程模型，使几乎所有 Java EE 组件都成为可注入、可拦截和可管理的 Bean。CDI 建立在“松耦合、强类型”的概念之上，这意味着\
  \ Bean 是松耦合的，但以强类型的方式实现。通过将拦截器、装饰器和事件引入整个平台，解耦得以进一步深化。同时，CDI 通过统一作用域，将 Web 层和后端结合在一起。得益于其事件总线，CDI\
  \ 也是扩展 Java EE 的标准方式，因此成为 Java EE 的扩展平台。\n\n本章讨论依赖注入、作用域和松耦合，从而涵盖了 CDI 背后的大部分概念。\n\
  \n理解 Bean\n\nJava SE 有 JavaBean，Java EE 有企业级 JavaBean。但 Java EE 还有其他类型的组件，例如 Servlet、SOAP\
  \ Web 服务、RESTful Web 服务、实体……当然还有托管 Bean。但别忘了我们的 POJO。POJO 只是运行在 Java 虚拟机（JVM）内部的\
  \ Java 类。JavaBean 只是遵循某些模式（例如，属性的访问器/修改器（getter/setter）的命名约定、默认构造函数……）并在 JVM 内部执行的\
  \ POJO。所有其他 Java EE 组件也遵循某些模式（例如，企业级 JavaBean 必须具有元数据，默认构造函数不能是 final……）并在提供某些服务（例如事务、池化、安全性……）的容器（例如\
  \ EJB 容器）内执行。这给我们留下了托管 Bean 和 Bean。\n\n托管 Bean 是容器管理的对象，仅支持一小部分基本服务：资源注入、生命周期管理和拦截。它们是在\
  \ Java EE 6 中引入的，旨在提供一种与 Java EE 平台其他部分一致的轻量级组件模型。它们为 Java EE 平台中存在的不同类型的组件提供了通用基础。例如，企业级\
  \ JavaBean 可以被视为具有额外服务的托管 Bean。Servlet 也可以被视为具有额外服务（与 EJB 不同）的托管 Bean，依此类推。\n\n\
  Bean 是构建在此基本托管 Bean 模型之上的 CDI 对象。Bean 为有状态对象提供了改进的生命周期；绑定到定义明确的上下文；为依赖注入、拦截和装饰带来了类型安全的方法；通过限定符注解进行特化；并且可以在表达式语言（EL）中使用。事实上，除了极少数例外，几乎所有具有默认构造函数并在容器内运行的\
  \ Java 类都是 Bean。因此，JavaBean 和企业级 JavaBean 自然可以利用这些 CDI 服务。\n\n依赖注入\n\n*依赖注入（DI）*是一种解耦依赖组件的设计模式。它是控制反转的一部分，其中被反转的关注点是获取所需依赖的过程。该术语最早由\
  \ Martin Fowler 提出。在像 Java EE 这样的托管环境中思考 DI 的一种方式是将 JNDI 颠倒过来。容器不是让对象查找其他对象，而是为你注入这些依赖对象。这就是所谓的*好莱坞原则*，“别给我们打电话”（查找对象），“我们会打给你”（注入对象）。\n\
  \nJava EE 创建于 1990 年代末，第一个版本已经包含了 EJB、Servlet 和 JMS。这些组件可以使用 JNDI 来查找容器管理的资源，例如\
  \ JDBC DataSource、JMS 工厂或目的地。它允许组件依赖，并让 EJB 容器处理管理资源生命周期的复杂性（根据需要实例化、初始化、排序和向客户端提供资源引用）。但让我们回到容器执行的资源注入这个话题。\n\
  \nJava EE 5 为开发人员引入了资源注入。它允许开发人员将容器资源（例如 EJB、实体管理器、数据源、JMS 工厂和目的地）注入到一组定义的组件（Servlet、JSF\
  \ 支持 Bean 和 EJB）中。为此，Java EE 5 引入了一组新的注解（`@Resource`、`@PersistenceContext`、`@PersistenceUnit`、`@EJB`\
  \ 和 `@WebServiceRef`）。\n\nJava EE 5 中迈出的这第一步还不够，因此 Java EE 6 创建了两个全新的规范，为平台带来真正的\
  \ DI：依赖注入（JSR 330）和上下文与依赖注入（JSR 299）。如今，在 Java EE 7 中，DI 更进一步，将各个规范联系在一起。\n\n生命周期管理\n\
  \n\n\nPOJO 的生命周期非常简单：作为 Java 开发者，你使用 `new` 关键字创建类的实例，然后等待*垃圾回收器*将其回收并释放内存。但如果你想在容器中运行\
  \ CDI Bean，就不能使用 `new` 关键字。相反，你需要注入 Bean，其余工作由容器完成，也就是说，容器负责管理 Bean 的生命周期：它创建实例，也负责销毁实例。那么，如果不能调用构造函数，该如何初始化\
  \ Bean 呢？实际上，容器在构造实例之后、销毁实例之前，会给你一个操作句柄。\n\n图 2-1 展示了托管 Bean（因此也是 CDI Bean）的生命周期。当你注入一个\
  \ Bean 时，容器（EJB、Web 或 CDI 容器）负责创建实例（使用 `new` 关键字）。然后，它会解析依赖关系，并在 Bean 的第一次业务方法调用之前，调用任何带有\
  \ `@PostConstruct` 注解的方法。随后，`@PreDestroy` 回调通知表明该实例正在被容器移除。\n\n![9781430246268_Fig02-01.jpg](img/9781430246268_Fig02-01.jpg)\n\
  \n图 2-1. 托管 Bean 生命周期\n\n正如你将在后续章节中看到的，大多数 Java EE 组件都遵循图 2-1 描述的生命周期。\n\n作用域与上下文\n\
  \nCDI Bean 可以是有状态的，并且是上下文相关的，这意味着它们存在于一个明确定义的作用域中（CDI 提供了预定义的作用域：请求、会话、应用和会话作用域）。例如，会话上下文及其\
  \ Bean 存在于 HTTP 会话的生命周期内。在此生命周期内，对 Bean 的注入引用也能感知上下文——也就是说，整个 Bean 依赖链都是上下文相关的。容器会自动管理作用域内的所有\
  \ Bean，并在会话结束时自动销毁它们。\n\n与无状态组件（例如无状态会话 Bean）或单例（例如 Servlet 或单例）不同，有状态 Bean 的不同客户端会看到该\
  \ Bean 处于不同的状态。当 Bean 是有状态的（会话、应用和会话作用域）时，客户端拥有哪个 Bean 实例就很重要了。在同一上下文中执行的客户端（例如其他\
  \ Bean）将看到该 Bean 的同一个实例。但在不同上下文中的客户端可能会看到不同的实例（取决于上下文之间的关系）。在所有情况下，客户端都不会通过显式创建和销毁实例来控制其生命周期；容器会根据作用域来执行此操作。\n\
  \n拦截\n\n拦截器用于在业务方法调用时进行拦截。在这方面，它类似于面向切面编程（AOP）。AOP 是一种编程范式，它将横切关注点（贯穿应用程序的关注点）与业务代码分离。大多数应用程序都有跨组件重复的通用代码。这些可能是技术关注点（记录每个方法的进入和退出、记录方法调用的持续时间、存储方法使用统计信息等）或业务关注点（如果客户购买超过\
  \ 10,000 美元的商品，则执行额外检查；当库存水平过低时发送补货订单等）。这些关注点可以通过 AOP 自动应用于整个应用程序或其子集。\n\n托管 Bean\
  \ 通过提供使用拦截器拦截方法调用的能力，支持类似 AOP 的功能。当托管 Bean 的方法被调用时，容器会自动触发拦截器。如图 2-2 所示，拦截器可以链式调用，并在方法执行之前和/或之后被调用。\n\
  \n![9781430246268_Fig02-02.jpg](img/9781430246268_Fig02-02.jpg)\n\n图 2-2. 容器拦截调用并调用拦截器\n\
  \n图 2-2 向你展示了在客户端和托管 Bean 之间调用的一系列拦截器。你可以将 EJB 容器本身视为一个拦截器链。当你开发会话 Bean 时，只需专注于业务代码。但在幕后，当客户端调用你的\
  \ EJB 上的方法时，容器会拦截该调用并应用不同的服务（生命周期管理、事务、安全性等）。通过拦截器，你可以添加自己的横切机制，并将其透明地应用于业务代码。\n\
  \n松耦合与强类型\n\n拦截器是一种将技术关注点与业务逻辑解耦的非常强大的方式。上下文相关的生命周期管理也将 Bean 与其自身的生命周期管理解耦。通过注入，Bean\
  \ 不知道与之交互的任何 Bean 的具体实现。但 CDI 中的松耦合远不止于此。Bean 可以使用事件通知将事件生产者与事件消费者解耦，或者使用装饰器将业务关注点解耦。换句话说，松耦合是构建\
  \ CDI 的 DNA。\n\n并且所有这些功能都以类型安全的方式提供。CDI 从不依赖基于字符串的标识符来确定对象如何组合在一起。相反，CDI 使用强类型注解（例如，限定符、原型和拦截器绑定）来连接\
  \ Bean。XML 描述符的使用被最小化，仅用于真正的部署特定信息。\n\n部署描述符\n\n几乎每个 Java EE 规范都有一个可选的 XML 部署描述符。它通常描述组件、模块或应用程序（例如\
  \ Web 应用程序或企业应用程序）应如何配置。对于 CDI，部署描述符称为 `beans.xml` 并且是必需的。它可以用于配置某些功能（拦截器、装饰器、替代方案等），但对于启用\
  \ CDI 至关重要。这是因为 CDI 需要识别类路径中的 Bean（这称为 Bean 发现）。\n\n正是在 Bean 发现阶段，奇迹发生了：此时 CDI 将\
  \ POJO 转变为 CDI Bean。在部署时，CDI 会检查应用程序的所有 jar 和 war 文件，每次找到 `beans.xml` 部署描述符时，它都会管理所有\
  \ POJO，这些 POJO 随后成为 CDI Bean。如果类路径中（在 `META-INF` 或 `WEB-INF` 目录下）没有 `beans.xml`\
  \ 文件，CDI 将无法使用注入、拦截、装饰等功能。没有这个标记文件，CDI 将无法工作。如果你的 Web 应用程序包含多个 jar 文件，并且你希望在整个应用程序中启用\
  \ CDI，则每个 jar 都需要自己的 `beans.xml` 来触发 CDI 和每个 jar 的 Bean 发现。\n\nCDI 规范概述\n\n上下文和依赖注入正成为\
  \ Java EE 中多个规范的共同基础。一些规范严重依赖它（Bean 验证、JAX-RS），另一些规范受其启发（EJB），还有一些规范与之协同工作（JSF）。CDI\
  \ 1.1 横跨多个规范，但如果没有其他规范，它将毫无意义：Java 1.0 的依赖注入（JSR 330）、托管 Bean 1.0（JSR 342）、公共注解\
  \ 1.2（JSR 250）、表达式语言 3.0（JSR 341）和拦截器 1.2（JSR 318）。\n\nCDI 规范简史\n\n2006 年，受 Seam、Guice\
  \ 和 Spring 框架的启发，Gavin King（Seam 的创建者）成为了 JSR 299 的规范负责人，该规范当时被称为 Web Beans。针对 Java\
  \ EE 6，Web Beans 不得不更名为上下文和依赖注入 1.0，并建立在新的 JSR 330：Java 1.0 的依赖注入（又名 @Inject）之上。\n\
  \n\n\n这两个规范是互补的，在 Java EE 中缺一不可。Java 依赖注入定义了一组主要用于注入的注解（`@Inject`、`@Named`、`@Qualifier`、`@Scope`\
  \ 和 `@Singleton`）。CDI 为 JSR 330 赋予了语义，并增加了许多功能，例如上下文管理、事件、装饰器和增强的拦截器（JSR 318）。此外，CDI\
  \ 允许开发者在标准范围内扩展平台，这在之前是不可能的。CDI 的目标是填补所有空白。\n\n*   增强平台的凝聚力，\n*   将 Web 层和事务层紧密结合，\n\
  *   将依赖注入提升为一等公民，以及\n*   具备轻松添加新扩展的能力。\n\n如今，随着 Java EE 7 的推出，CDI 1.1 正成为许多 JSR\
  \ 的基础，并且已经进行了一些改进。\n\nCDI 1.1 的新特性是什么？\n\nCDI 1.1 没有增加任何主要特性。相反，这个新版本专注于将 CDI 与其他规范集成，例如整合拦截器、在\
  \ Servlet 请求中添加会话，或在 Java EE 中提供更丰富的应用程序生命周期事件。CDI 1.1 中包含了以下新特性：\n\n*   新的 `CDI`\
  \ 类提供了从托管 Bean 外部以编程方式访问 CDI 设施的能力；\n*   可以为整个应用程序设置拦截器、装饰器和备选方案的优先级（`@Priority`）并排序；\n\
  *   通过在类型或包上添加 `@Vetoed` 注解，可以阻止 CDI 将任何类型或包视为 Bean；\n*   `@New` 限定符在 CDI 1.1 中已被弃用，现在鼓励应用程序注入\
  \ `@Dependent` 作用域的 Bean；以及\n*   新的 `@WithAnnotations` 允许扩展过滤其看到的类型。\n\n表 2-1 列出了与\
  \ CDI 相关的主要包。你可以在 `javax.enterprise.inject` 和 `javax.decorator` 包中找到 CDI 注解和类。Java\
  \ 依赖注入的 API 位于 `javax.inject` 包中，拦截器位于 `javax.interceptor` 包中。\n\n表 2-1. 主要的 CDI\
  \ 相关包\n\n| 包 | 描述 |\n| --- | --- |\n| `javax.inject` | 包含 Java 依赖注入的核心 API（JSR 330）\
  \ |\n| `javax.enterprise.inject` | 核心依赖注入 API |\n| `javax.enterprise.context` |\
  \ CDI 作用域和上下文 API |\n| `javax.enterprise.event` | CDI 事件和观察者 API |\n| `javax.enterprise.util`\
  \ | CDI 工具包 |\n| `javax.interceptor` | 包含拦截器 API（JSR 318） |\n| `javax.decorator`\
  \ | CDI 装饰器 API |\n\n参考实现\n\nCDI 的参考实现是 Weld，这是一个来自 JBoss 的开源项目。还存在其他实现，例如 Apache\
  \ OpenWebBeans 或 CanDi（来自 Caucho）。同样重要的是要提到 Apache DeltaSpike 项目，它引用了一组 CDI 可移植扩展。\n\
  \n编写一个 CDI Bean\n\nCDI Bean 可以是任何包含业务逻辑的类。它可以通过注入从 Java 代码直接调用，也可以通过 EL 从 JSF 页面调用。正如你在清单\
  \ 2-1 中所见，一个 Bean 是一个 POJO，它不继承或扩展任何东西，可以注入对其他 Bean 的引用（`@Inject`），其生命周期由容器管理（`@PostConstruct`），并且其方法调用可以被拦截（这里的\
  \ `@Transactional` 是一个拦截器绑定——稍后会详细介绍）。\n\n***清单 2-1.***  一个使用注入、生命周期管理和拦截的 BookService\
  \ Bean\n\n```\npublic class BookService {\n\n@Inject\n  private NumberGenerator\
  \ numberGenerator;\n  @Inject\n  private EntityManager em;\n\nprivate Date instanciationDate;\n\
  \n@PostConstruct\n  private void initDate() {\n    instanciationDate = new Date();\n\
    }\n\n@Transactional\n  public Book createBook(String title, Float price, String\
  \ description) {\n    Book book = new Book(title, price, description);\n    book.setIsbn(numberGenerator.generateNumber());\n\
      book.setInstanciationDate(instanciationDate);\n    em.persist(book);\n    return\
  \ book;\n  }\n}\n```\n\nCDI Bean 的结构\n\n根据 CDI 1.1 规范，容器将任何满足以下条件的类视为 CDI Bean：\n\
  \n*   它不是非静态内部类，\n*   它是一个具体类，或者被 `@Decorator` 注解，并且\n*   它有一个无参的默认构造函数，或者声明了一个被\
  \ `@Inject` 注解的构造函数。\n\n然后，一个 Bean 可以有一个可选的作用域、一个可选的 EL 名称、一组拦截器绑定以及一个可选的生命周期管理。\n\
  \n依赖注入\n\nJava 是一种面向对象的编程语言，这意味着现实世界是用对象来表示的。一个 `Book` 类代表一本《银河系漫游指南》的副本，一个 `Customer`\
  \ 代表你，一个 `PurchaseOrder` 代表你购买这本书。这些对象相互依赖：一本书可以被顾客阅读，一个采购订单引用多本书。这种依赖关系是面向对象设计的一个价值所在。\n\
  \n例如，创建一本书（`BookService`）的过程可以简化为实例化一个 `Book` 对象，使用另一个服务（`NumberGenerator`）生成一个唯一编号，然后将这本书持久化到数据库。`NumberGenerator`\
  \ 服务可以生成一个由 13 位数字组成的 ISBN 编号，或者一个称为 ISSN 的 8 位旧格式编号。那么，根据某些条件或环境，`BookService`\
  \ 最终将依赖于 `IsbnGenerator` 或 `IssnGenerator`。\n\n图 2-3 展示了 `NumberGenerator` 接口的类图，该接口有一个方法（`String\
  \ generateNumber()`），并由 `IsbnGenerator` 和 `IssnGenerator` 实现。`BookService` 依赖于该接口来生成图书编号。\n\
  \n![9781430246268_Fig02-03.jpg](img/9781430246268_Fig02-03.jpg)\n\n图 2-3. 包含 NumberGenerator\
  \ 接口及其实现的类图\n\n你如何将 `BookService` 连接到 `NumberGenerator` 接口的 ISBN 实现？一种解决方案是使用传统的\
  \ `new` 关键字，如清单 2-2 所示。\n\n***清单 2-2.***  一个使用 `New` 关键字创建依赖关系的 BookService POJO\n\
  \n```\npublic class BookService {\n\nprivate NumberGenerator numberGenerator ;\n\
  \npublic BookService() {\n    this.numberGenerator = new IsbnGenerator();\n  }\n\
  \npublic Book createBook(String title, Float price, String description) {\n    Book\
  \ book = new Book(title, price, description);\n    book.setIsbn( numberGenerator.generateNumber()\
  \ );\n    return book;\n  }\n}\n```\n\n清单 2-2 中的代码非常简单，并且完成了工作。在构造函数中，`BookService`\
  \ 创建了一个 `IsbnGenerator` 的实例，并将其赋值给 `numberGenerator` 属性。调用 `numberGenerator.generateNumber()`\
  \ 方法将生成一个 13 位数字。\n\n但是，如果你想在实现之间进行选择，而不是仅仅绑定到 `IsbnGenerator`，该怎么办？一种解决方案是将实现传递给构造函数，并让一个外部类选择它想要使用的实现（参见清单\
  \ 2-3）。\n\n***清单 2-3***.  一个使用构造函数选择依赖关系的 BookService POJO\n\n```\npublic class\
  \ BookService {\n\nprivate NumberGenerator numberGenerator ;\n\npublic BookService(NumberGenerator\
  \ numberGenerator) {\n    this.numberGenerator = numberGenerator;\n  }\n\npublic\
  \ Book createBook(String title, Float price, String description) {\n    Book book\
  \ = new Book(title, price, description);\n    book.setIsbn(numberGenerator.generateNumber());\n\
      return book;\n  }\n}\n```\n\n所以现在，一个外部类可以使用 `BookService` 及其所需的实现。\n\n\n\n```\n\
  BookService bookService = new BookService( new IsbnGenerator() );\nBookService bookService\
  \ = new BookService( new IssnGenerator() );\n```\n\n这说明了什么是控制反转：`BookService` 和\
  \ `NumberGenerator` 之间依赖关系的创建控制权被反转了，因为它被交给了外部类，而不是类本身。由于你最终需要自己连接依赖关系，这种技术被称为手动构造。在前面的代码中，我们使用了构造函数来选择实现（构造函数注入），但另一种常见的方式是使用\
  \ setter 方法（setter 注入）。然而，与其手动构造依赖关系，不如将其留给注入器（例如 CDI）来完成。\n\n@Inject\n\n由于 Java\
  \ EE 是一个托管环境，你不需要手动构造依赖关系，而是可以让容器为你注入一个引用。简而言之，CDI 依赖注入是一种以类型安全的方式将 Bean 注入到其他 Bean\
  \ 中的能力，这意味着不需要 XML，只需要注解。\n\n注入在 Java EE 5 中就已经存在，例如通过 `@Resource`、`@PersistentUnit`\
  \ 或 `@EJB` 注解。但它仅限于某些资源（数据源、EJB……）和某些组件（Servlet、EJB、JSF 支持 Bean……）。借助 CDI，你可以通过\
  \ `@Inject` 注解几乎在任何地方注入任何东西。请注意，在 Java EE 7 中，你仍然可以使用其他注入机制（`@Resource`……），但你应该尽可能考虑使用\
  \ `@Inject`（请参阅本章后面的“生产者”部分）。\n\n清单 2-4 展示了如何使用 CDI `@Inject` 将 `NumberGenerator`\
  \ 的引用注入到 `BookService` 中。\n\n***清单 2-4.***  使用 @Inject 获取 NumberGenerator 引用的 BookService\n\
  \n```\npublic class BookService {\n\n@Inject\n  private NumberGenerator numberGenerator;\n\
  \npublic Book createBook(String title, Float price, String description) {\n    Book\
  \ book = new Book(title, price, description);\n    book.setIsbn(numberGenerator.generateNumber());\n\
  \    return book;\n  }\n}\n```\n\n如清单 2-4 所示，属性上的一个简单 `@Inject` 注解将通知容器，它必须将一个 `NumberGenerator`\
  \ 实现的引用注入到 `numberGenerator` 属性中。这被称为注入点（`@Inject` 注解所在的位置）。清单 2-5 展示了 `IsbnGenerator`\
  \ 的实现。如你所见，这里没有特殊的注解，该类实现了 `NumberGenerator` 接口。\n\n***清单 2-5.***  IsbnGenerator\
  \ Bean\n\n```\npublic class IsbnGenerator implements NumberGenerator {\n\npublic\
  \ String generateNumber() {\n    return \"13-84356-\" + Math.abs(new Random().nextInt());\n\
  \  }\n}\n```\n\n注入点\n\n`@Inject` 注解定义了一个在 Bean 实例化期间被注入的注入点。注入可以通过三种不同的机制发生：属性注入、setter\
  \ 注入或构造函数注入。\n\n到目前为止，在之前的所有代码示例中，你看到的 `@Inject` 注解都是用在属性上的。\n\n```\n@Inject\nprivate\
  \ NumberGenerator numberGenerator;\n```\n\n请注意，在属性上使用注入时，并不需要为其创建 getter 和 setter\
  \ 方法。CDI 可以直接访问注入的字段（即使它是私有的），这有时有助于消除一些冗余代码。但是，除了注解属性之外，你也可以像下面这样在构造函数上添加 `@Inject`\
  \ 注解：\n\n```\n@Inject\npublic BookService (NumberGenerator numberGenerator) {\n\
  \  this.numberGenerator = numberGenerator;\n}\n```\n\n但规则是，你只能有一个构造函数注入点。执行注入的是容器，而不是你（你不能在托管环境中调用构造函数）；因此，只允许有一个\
  \ Bean 构造函数，以便容器能够完成其工作并注入正确的引用。\n\n另一种选择是使用 setter 注入，它看起来类似于构造函数注入。你只需要用 `@Inject`\
  \ 注解 setter 方法即可。\n\n```\n@Inject\npublic void setNumberGenerator(NumberGenerator\
  \ numberGenerator) {\n  this.numberGenerator = numberGenerator;\n}\n```\n\n你可能会问：“什么时候应该使用字段注入，而不是构造函数或\
  \ setter 注入？”对于这个问题，并没有真正的技术性答案；这取决于你个人的喜好。在托管环境中，容器负责完成所有注入工作；它只需要正确的注入点。\n\n默认注入\n\
  \n假设 `NumberGenerator` 只有一个实现（`IsbnGenerator`）。那么 CDI 只需单独使用 `@Inject` 就能将其注入。\n\
  \n```\n@Inject\nprivate NumberGenerator numberGenerator;\n```\n\n这被称为*默认注入*。每当一个\
  \ Bean 或注入点没有显式声明限定符时，容器会假定其限定符为 `@javax.enterprise.inject.Default`。事实上，以下代码与上一段代码是相同的：\n\
  \n```\n@Inject @Default\nprivate NumberGenerator numberGenerator;\n```\n\n`@Default`\
  \ 是一个内置的限定符，它告知 CDI 注入默认的 Bean 实现。如果你定义了一个没有限定符的 Bean，该 Bean 会自动拥有 `@Default` 限定符。因此，清单\
  \ 2-6 中的代码与清单 2-5 中的代码是相同的。\n\n***清单 2-6.***  带有 @Default 限定符的 IsbnGenerator Bean\n\
  \n```\n@Default\npublic class IsbnGenerator implements NumberGenerator {\n\npublic\
  \ String generateNumber() {\n    return \"13-84356-\" + Math.abs(new Random().nextInt());\n\
  \  }\n}\n```\n\n如果你只有一个要注入的 Bean 实现，则适用默认行为，一个直接的 `@Inject` 就会注入该实现。图 2-4 中的类图展示了\
  \ `@Default` 实现（`IsbnGenerator`）以及默认注入点（`@Inject @Default`）。但有时你需要在多个实现之间进行选择。这时就需要使用限定符了。\n\
  \n![9781430246268_Fig02-04.jpg](img/9781430246268_Fig02-04.jpg)\n\n图 2-4. 使用 @Default\
  \ 注入的类图\n\n限定符\n\n在系统初始化时，容器必须验证每个注入点恰好有一个满足条件的 Bean 存在。这意味着，如果没有可用的 `NumberGenerator`\
  \ 实现，容器会通知你存在未满足的依赖关系，并且不会部署应用程序。如果只有一个实现，注入将使用 `@Default` 限定符工作（参见图 2-4 中的图示）。如果存在多个默认实现，容器会通知你存在歧义的依赖关系，并且不会部署应用程序。这是因为当容器无法识别出恰好一个要注入的\
  \ Bean 时，类型安全解析算法会失败。\n\n那么，组件如何选择要注入哪个实现（`IsbnGenerator` 或 `IssnGenerator`）呢？大多数框架严重依赖外部\
  \ XML 配置来声明和注入 Bean。CDI 使用限定符，它本质上是一种 Java 注解，能够带来类型安全的注入，并消除类型的歧义，而无需依赖基于字符串的名称。\n\
  \n假设我们有一个应用程序，其中包含一个 `BookService`，它使用 13 位 ISBN 号创建书籍，以及一个 `LegacyBookService`，它使用\
  \ 8 位 ISSN 号创建书籍。如图 2-5 所示，这两个服务都注入了同一个 `NumberGenerator` 接口的引用。这两个服务通过使用限定符来区分这两个实现。\n\
  \n![9781430246268_Fig02-05.jpg](img/9781430246268_Fig02-05.jpg)\n\n图 2-5. 使用限定符实现无歧义注入的服务\n\
  \n\n\n限定符（qualifier）表示与某个类型相关联的一些语义，这些语义由该类型的某些实现来满足。它是一种用户自定义的注解，其本身需要使用 `@javax.inject.Qualifer`\
  \ 进行注解。例如，我们可以引入限定符来表示 清单 2-7 和 清单 2-8 中所示的 13 位和 8 位数字生成器。\n\n***清单 2-7.***  ThirteenDigits\
  \ 限定符\n\n```\n@Qualifier\n@Retention(RUNTIME)\n@Target({FIELD, TYPE, METHOD})\n\
  public @interface ThirteenDigits { }\n```\n\n***清单 2-8.***  EightDigits 限定符\n\n\
  ```\n@Qualifier\n@Retention(RUNTIME)\n@Target({FIELD, TYPE, METHOD})\npublic @interface\
  \ EightDigits { }\n```\n\n一旦定义了所需的限定符，就必须将它们应用到相应的实现上。正如你在 清单 2-9 和 清单 2-10 中所见，`@ThirteenDigits`\
  \ 限定符应用于 `IsbnGenerator` bean，而 `@EightDigits` 应用于 `IssnGenerator`。\n\n***清单 2-9.***\
  \  带有 @ThirteenDigits 限定符的 IsbnGenerator Bean\n\n```\n@ThirteenDigits\npublic class\
  \ IsbnGenerator implements NumberGenerator {\n\npublic String generateNumber() {\n\
      return \"13-84356-\" + Math.abs(new Random().nextInt());\n  }\n}\n```\n\n***清单\
  \ 2-10.***  带有 @EightDigits 限定符的 IssnGenerator Bean\n\n```\n@EightDigits\npublic\
  \ class IssnGenerator implements NumberGenerator {\n\npublic String generateNumber()\
  \ {\n    return \"8-\" + Math.abs(new Random().nextInt());\n  }\n}\n```\n\n然后，这些限定符被应用于注入点，以区分客户端需要哪个实现。在\
  \ 清单 2-11 中，`BookService` 通过注入一个 `@ThirteenDigits` 数字生成器的引用来显式定义 13 位数字的实现；而在 清单\
  \ 2-12 中，`LegacyBookService` 则注入 8 位数字的实现。\n\n***清单 2-11.***  使用 @ThirteenDigits\
  \ NumberGenerator 实现的 BookService\n\n```\npublic class BookService {\n\n@Inject\
  \ @ThirteenDigits\n  private NumberGenerator numberGenerator;\n\npublic Book createBook(String\
  \ title, Float price, String description) {\n    Book book = new Book(title, price,\
  \ description);\n    book.setIsbn(numberGenerator.generateNumber());\n    return\
  \ book;\n  }\n}\n```\n\n***清单 2-12.***  使用 @EightDigits NumberGenerator 实现的 LegacyBookService\n\
  \n```\npublic class LegacyBookService {\n\n@Inject @EightDigits\n  private NumberGenerator\
  \ numberGenerator;\n\npublic Book createBook(String title, Float price, String description)\
  \ {\n    Book book = new Book(title, price, description);\n    book.setIsbn(numberGenerator.generateNumber());\n\
      return book;\n  }\n}\n```\n\n要使此功能生效，你不需要外部配置；这就是为什么说 CDI 使用了强类型。你可以随意重命名你的实现，重命名你的限定符——注入点不会改变（这就是松耦合）。如你所见，CDI\
  \ 是实现类型安全注入的一种优雅方式。但是，如果你每次需要注入某些东西时都创建注解，你的应用程序最终会变得非常冗长。这时，带有成员的限定符就能帮到你。\n\n\
  带有成员的限定符\n\n每次需要在实现之间进行选择时，你都会创建一个限定符（即一个注解）。因此，如果你需要一个额外的两位数字和一个十位数字生成器，你将创建额外的注解（例如\
  \ `@TwoDigits`、`@EightDigits`、`@TenDigits`、`@ThirteenDigits`）。想象一下，如果生成的数字可以是奇数或偶数，那么你最终会得到大量的注解：`@TwoOddDigits`、`@TwoEvenDigits`、`@EightOddDigits`\
  \ 等等。避免注解数量膨胀的一种方法是使用成员。\n\n在我们的示例中，我们可以通过使用单个限定符 `@NumberOfDigits` 来替换所有这些限定符，该限定符使用一个枚举作为值，并使用一个布尔值来表示奇偶性（参见\
  \ 清单 2-13）。\n\n***清单 2-13.***  带有 Digits 枚举和 Parity 布尔值的 @NumberOfDigits\n\n```\n\
  @Qualifier\n@Retention(RUNTIME)\n@Target({FIELD, TYPE, METHOD})\npublic @interface\
  \ NumberOfDigits {\n\nDigits value();\n  boolean odd();\n}\n\npublic enum Digits\
  \ {\n  TWO,\n  EIGHT,\n  TEN,\n  THIRTEEN\n}\n```\n\n使用带有成员的限定符的方式与你目前所见并无不同。注入点将通过设置注解成员来限定所需的实现，如下所示：\n\
  \n```\n@Inject @NumberOfDigits(value = Digits.THIRTEEN, odd = false)\nprivate NumberGenerator\
  \ numberGenerator;\n```\n\n相关的实现也会做同样的事情。\n\n```\n@NumberOfDigits(value = Digits.THIRTEEN,\
  \ odd = false)\npublic class IsbnEvenGenerator implements NumberGenerator {...}\n\
  ```\n\n多个限定符\n\n限定 bean 和注入点的另一种方法是指定多个限定符。因此，与其为奇偶性设置多个限定符（`@TwoOddDigits`、`@TwoEvenDigits`...）或使用带有成员的限定符（`@NumberOfDigits`），不如使用两组不同的限定符：一组用于奇偶性（`@Odd`\
  \ 和 `@Even`），另一组用于数字位数。这就是你如何限定一个生成 13 位偶数的生成器。\n\n```\n@ThirteenDigits @Even\n\
  public class IsbnEvenGenerator implements NumberGenerator {...}\n```\n\n注入点将使用相同的语法。\n\
  \n```\n@Inject @ThirteenDigits @Even\nprivate NumberGenerator numberGenerator;\n\
  ```\n\n那么，只有同时具有这两个限定符注解的 bean 才有资格被注入。限定符应该是有意义的。为应用程序选择正确的名称和合适的限定符粒度非常重要。\n\n\
  备选方案\n\n限定符让你在开发时可以在一个接口的多个实现之间进行选择。但有时你想根据特定的部署场景来注入一个实现。例如，你可能希望在测试环境中使用一个模拟数字生成器。\n\
  \n备选方案是使用特殊限定符 `javax.enterprise.inject.Alternative` 进行注解的 bean。默认情况下，备选方案是禁用的，需要在\
  \ `beans.xml` 描述符中启用它们，才能使其可用于实例化和注入。清单 2-14 展示了一个模拟数字生成器备选方案。\n\n***清单 2-14.***\
  \  一个默认的模拟生成器备选方案\n\n```\n@Alternative\npublic class MockGenerator implements NumberGenerator\
  \ {\n\npublic String generateNumber() {\n    return \"MOCK\";\n  }\n}\n```\n\n如\
  \ 清单 2-14 所示，`MockGenerator` 照常实现了 `NumberGenerator` 接口。它使用 `@Alternative` 进行注解，这意味着\
  \ CDI 将其视为 `NumberGenerator` 的默认备选方案。如 清单 2-6 所示，这个默认备选方案本可以使用内置的 `@Default` 限定符，如下所示：\n\
  \n```\n@Alternative @Default\npublic class MockGenerator implements NumberGenerator\
  \ {...}\n```\n\n除了默认备选方案，你还可以使用限定符来指定备选方案。例如，以下代码告诉 CDI，13 位数字生成器的备选方案是模拟生成器：\n\n\
  ```\n@Alternative @ThirteenDigits\npublic class MockGenerator implements NumberGenerator\
  \ {...}\n```\n\n默认情况下，`@Alternative` bean 是禁用的，你需要像 清单 2-15 所示那样，在 `beans.xml` 描述符中显式启用它们。\n\
  \n***清单 2-15.***  启用备选方案的 beans.xml 部署描述符\n\n\n\n```\n<beans xmlns=\" http://xmlns.jcp.org/xml/ns/javaee\
  \ \"\n       xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n       xsi:schemaLocation=\"\
  \ http://xmlns.jcp.org/xml/ns/javaee →\n                           http://xmlns.jcp.org/xml/ns/javaee/beans_1_1.xsd\
  \ \"\n       version=\"1.1\" bean-discovery-mode=\"all\">\n\n<alternatives>\n    <class>org.agoncal.book.javaee7.chapter02\\\
  . MockGenerator </class>\n  </alternatives>\n</beans>\n```\n\n就注入点而言，没有任何变化。因此你的客户端代码不会受到影响。以下代码注入了一个数字生成器的默认实现。如果启用了替代方案，则会注入清单\
  \ 2-14 中定义的 `MockGenerator`。\n\n```\n@Inject\nprivate NumberGenerator numberGenerator;\n\
  ```\n\n你可以根据环境（开发、生产、测试……）拥有多个声明不同替代方案的 `beans.xml` 文件。\n\n生产者\n\n我已经向你展示了如何将 CDI\
  \ Bean 注入到其他 CDI Bean 中。但借助生产者，你还可以注入基本类型（例如 `int`、`long`、`float`……）、数组类型以及任何未启用\
  \ CDI 的 POJO。所谓启用 CDI，是指任何打包在包含 `beans.xml` 文件的归档中的类。\n\n默认情况下，你无法注入诸如 `java.util.Date`\
  \ 或 `java.lang.String` 之类的类。这是因为所有这些类都打包在 `rt.jar` 文件（Java 运行时环境类）中，并且该归档不包含 `beans.xml`\
  \ 部署描述符。如果某个归档在 `META-INF` 目录下没有 `beans.xml`，CDI 将不会触发 Bean 发现，POJO 也就无法被视为 Bean，从而无法被注入。能够注入\
  \ POJO 的唯一方法是使用生产者字段或生产者方法，如清单 2-16 所示。\n\n***清单 2-16.***  生产者字段和方法\n\n```\npublic\
  \ class NumberProducer {\n\n@Produces @ThirteenDigits\n  private String prefix13digits\
  \ = \"13-\";\n\n@Produces @ThirteenDigits\n  private int editorNumber = 84356;\n\
  \n@Produces @Random\n  public double random() {\n    return Math.abs(new Random().nextInt());\n\
    }\n}\n```\n\n清单 2-16 中的 `NumberProducer` 类有多个属性和方法，它们都使用了 `javax.enterprise.inject.Produces`\
  \ 注解。这意味着所有生成的类型和类现在都可以通过 `@Inject` 并使用限定符（`@ThirteenDigits`、`@EightDigits` 或 `@Random`）进行注入。\n\
  \n生产者方法（清单 2-16 中的 `random()`）是一个充当 Bean 实例工厂的方法。它允许返回值被注入。我们甚至可以指定一个限定符（例如 `@Random`）、一个作用域和一个\
  \ EL 名称（稍后你会看到）。生产者字段（`prefix13digits` 和 `editorNumber`）是生产者方法的一种更简单的替代方案，并且不包含任何业务代码。它只是一个变得可注入的属性。\n\
  \n在清单 2-9 中，`IsbnGenerator` 使用公式 `\"13-84356-\" + Math.abs(new Random().nextInt())`\
  \ 生成 ISBN 号码。利用 `NumberProducer`（清单 2-16），我们可以使用生成的类型来更改这个公式。在清单 2-17 中，`IsbnGenerator`\
  \ 现在使用 `@Inject @ThirteenDigits` 注入了一个字符串和一个整数，分别代表 ISBN 号码的前缀（`\"13-\"`）和编辑标识符（`84356`）。随机数则通过\
  \ `@Inject @Random` 注入，并返回一个 double 值。\n\n***清单 2-17.***  注入生成类型的 IsbnGenerator\n\
  \n```\n@ThirteenDigits\npublic class IsbnGenerator implements NumberGenerator {\n\
  \n@Inject @ThirteenDigits\n  private String prefix;\n\n@Inject @ThirteenDigits\n\
    private int editorNumber;\n\n@Inject @Random\n  private double postfix;\n\npublic\
  \ String generateNumber() {\n    return prefix + editorNumber + postfix;\n  }\n\
  }\n```\n\n在清单 2-17 中，你可以看到强类型在起作用。使用相同的语法（`@Inject @ThirteenDigits`），CDI 知道它需要注入一个\
  \ String、一个 int 或一个 `NumberGenerator` 的实现。使用注入类型（清单 2-17）而不是固定公式（清单 2-9）来生成数字的优势在于，你可以使用所有\
  \ CDI 特性，例如替代方案（如果需要，还可以拥有一个替代的 ISBN 号码生成器算法）。\n\nInjectionPoint API\n\n在清单 2-16\
  \ 中，由 `@Produces` 生成的属性和返回值不需要关于它们被注入到何处的任何信息。但在某些情况下，对象需要了解它们被注入到的注入点的某些信息。这可以是一种根据注入点配置或改变行为的方式。\n\
  \n让我们以创建日志记录器为例。在 JDK 中，要创建一个 `java.util.logging.Logger`，你需要设置拥有它的类的类别。例如，如果你想要一个用于\
  \ `BookService` 的日志记录器，你会编写：\n\n```\nLogger log = Logger.getLogger(BookService.class.getName());\n\
  ```\n\n你将如何生成一个需要知道注入点类名的 `Logger`？CDI 有一个 `InjectionPoint` API，它提供对注入点元数据的访问（参见表\
  \ 2-2）。因此，你需要创建一个使用 InjectionPoint API 来配置正确日志记录器的生产者方法。清单 2-18 展示了 `createLogger`\
  \ 方法如何获取注入点的类名。\n\n表 2-2. InjectionPoint API\n\n| 方法 | 描述 |\n| --- | --- |\n| `Type\
  \ getType()` | 获取注入点的必需类型 |\n| `Set<Annotation> getQualifiers()` | 获取注入点的必需限定符 |\n\
  | `Bean<?> getBean()` | 获取代表定义注入点的 Bean 的 `Bean` 对象 |\n| `Member getMember()` |\
  \ 在字段注入的情况下获取 `Field` 对象 |\n| `Annotated getAnnotated()` | 根据注入点是注入字段还是构造器/方法参数，返回\
  \ `AnnotatedField` 或 `AnnotatedParameter` |\n| `boolean isDelegate()` | 确定注入点是否为装饰器委托注入点\
  \ |\n| `boolean isTransient()` | 确定注入是否为瞬态字段 |\n\n***清单 2-18.***  日志记录生产者\n\n```\n\
  public class LoggingProducer {\n\n@Produces\n  private Logger createLogger( InjectionPoint\
  \ injectionPoint ) {\n    return Logger.getLogger( injectionPoint .getMember().getDeclaringClass().getName());\n\
    }\n}\n```\n\n要在任何 Bean 中使用生成的日志记录器，只需注入它并使用即可。日志记录器的类别类名将自动设置：\n\n```\n@Inject\
  \ Logger log;\n```\n\n销毁器\n\n在前面的示例（清单 2-17 和清单 2-18）中，我们使用生产者来创建数据类型或 POJO，以便它们可以被注入。我们创建了它们，并且在使用后无需销毁或关闭它们。但某些生产者方法会返回需要显式销毁的对象，例如\
  \ Java 数据库连接（JDBC）连接、JMS 会话或实体管理器。对于创建，CDI 使用生产者；对于销毁，则使用销毁器。销毁器方法允许应用程序对生产者方法返回的对象执行自定义清理。\n\
  \n\n\n清单 2-19 展示了一个用于创建和关闭 JDBC 连接的工具类。`createConnection` 方法接收一个 Derby JDBC 驱动，使用特定\
  \ URL 创建连接，处理异常，并返回一个已打开的 JDBC 连接。该方法使用了 `@Produces` 注解。另一方面，`closeConnection` 方法用于终止\
  \ JDBC 连接，它使用了 `@Disposes` 注解。\n\n***清单 2-19.***  JDBC 连接的生产者与销毁者\n\n```\npublic\
  \ class JDBCConnectionProducer {\n\n@Produces\n  private Connection createConnection()\
  \ {\n    Connection conn = null;\n    try {\n      Class.forName(\"org.apache.derby.jdbc.EmbeddedDriver\"\
  ).newInstance();\n      conn = DriverManager.getConnection(\"jdbc:derby:memory:chapter02DB\"\
  , \"APP\", \"APP\");\n\n} catch (InstantiationException | IllegalAccessException\
  \ | ClassNotFoundException) {\n      e.printStackTrace();\n    }\n    return conn;\n\
    }\n\nprivate void closeConnection( @Disposes Connection conn) throws SQLException\
  \ {\n    conn.close();\n  }\n}\n```\n\n销毁操作可由一个匹配的销毁者方法执行，该方法由与生产者方法相同的类定义。每个使用\
  \ `@Disposes` 注解的销毁者方法，必须恰好有一个与被销毁参数类型（此处为 `java.sql.Connection`）和限定符（`@Default`）与对应生产者方法返回类型（使用\
  \ `@Produces` 注解）相同的参数。当客户端上下文结束时（在清单 2-20 中，上下文为 `@ApplicationScoped`），销毁者方法（`closeConnection()`）会被自动调用，并且该参数会接收由生产者方法生成的对象。\n\
  \n***清单 2-20.***  JDBC 连接的生产者与销毁者\n\n```\n@ApplicationScoped\npublic class DerbyPingService\
  \ {\n\n@Inject\n  private Connection conn;\n\npublic void ping() throws SQLException\
  \ {\n    conn.createStatement().executeQuery(\"SELECT 1 FROM SYSIBM.SYSDUMMY1\"\
  );\n  }\n}\n```\n\n清单 2-20 展示了一个 Bean，它使用 `@Inject` 注入已创建的 JDBC 连接，并用其向 Derby 数据库发送\
  \ ping 请求。如你所见，这段客户端代码无需处理创建和关闭 JDBC 连接或异常处理等所有技术细节。生产者和销毁者是创建和关闭资源的一种简洁方式。\n\n\
  作用域\n\nCDI 不仅关乎依赖注入，也关乎上下文（CDI 中的“C”）。每个由 CDI 管理的对象都有一个明确定义的作用域和生命周期，并绑定到特定的上下文。在\
  \ Java 中，POJO 的作用域非常简单：使用 `new` 关键字创建类的实例，然后依赖垃圾回收来销毁它并释放内存。而在 CDI 中，Bean 被绑定到一个上下文，并一直存在于该上下文中，直到容器将其销毁。无法手动从上下文中移除\
  \ Bean。\n\n虽然 Web 层有明确定义的作用域（应用、会话、请求），但服务层却没有这样的概念（另请参见第 7 章了解无状态和有状态会话 Bean）。这是因为当会话\
  \ Bean 或 POJO 在 Web 应用程序中使用时，它们并不知晓 Web 应用程序的上下文。CDI 通过将 Web 层和服务层与有意义的作用域绑定在一起，从而将它们统一起来。CDI\
  \ 定义了以下内置作用域，甚至还提供了扩展点，以便你可以创建自己的作用域：\n\n*   *应用作用域*（`@ApplicationScoped`）：跨越整个应用程序的生命周期。该\
  \ Bean 在应用程序运行期间仅创建一次，并在应用程序关闭时被丢弃。此作用域适用于工具类或辅助类，或存储整个应用程序共享数据的对象（但当数据需要被多个线程访问时，应注意并发问题）。\n\
  *   *会话作用域*（`@SessionScoped`）：跨越单个用户会话的多个 HTTP 请求或多次方法调用。该 Bean 在 HTTP 会话期间创建，并在会话结束时被丢弃。此作用域适用于整个会话期间都需要的对象，例如用户偏好或登录凭据。\n\
  *   *请求作用域*（`@RequestScoped`）：对应于单个 HTTP 请求或一次方法调用。该 Bean 在方法调用期间创建，并在方法结束时被丢弃。它用于仅在\
  \ HTTP 请求期间需要的服务类或 JSF 支持 Bean。\n*   *对话作用域*（`@ConversationScoped`）：在会话边界内跨越多次调用，其起始和结束点由应用程序决定。对话作为多步骤工作流的一部分，跨多个页面使用。\n\
  *   *依赖伪作用域*（`@Dependent`）：生命周期与客户端相同。每次注入时都会创建一个依赖 Bean，当注入目标被移除时，该引用也会被移除。这是 CDI\
  \ 的默认作用域。\n\n如你所见，所有作用域都有一个注解，你可以将其用于你的 CDI Bean（所有这些注解都位于 `javax.enterprise.context`\
  \ 包中）。前三个作用域是众所周知的。例如，如果你有一个会话作用域的购物车 Bean，则该 Bean 会在会话开始时（例如，用户首次登录时）自动创建，并在会话结束时自动销毁。\n\
  \n```\n@SessionScoped\npublic class ShoppingCart implements Serializable {...}\n\
  ```\n\n`ShoppingCart` Bean 的实例绑定到用户会话，并由在该会话上下文中执行的所有请求共享。如果你不希望该 Bean 无限期地存在于会话中，请考虑使用生命周期更短的其他作用域，例如请求作用域或对话作用域。请注意，作用域为\
  \ `@SessionScoped` 或 `@ConversationScoped` 的 Bean 必须是可序列化的，因为容器会不时地将其钝化。\n\n如果未显式指定作用域，则该\
  \ Bean 属于依赖伪作用域（`@Dependent`）。具有此作用域的 Bean 永远不会在不同的客户端或不同的注入点之间共享。它们依赖于其他某个 Bean，这意味着它们的生命周期与该\
  \ Bean 的生命周期绑定。当它所属的对象被创建时，依赖 Bean 被实例化；当它所属的对象被销毁时，依赖 Bean 被销毁。以下代码展示了一个带有限定符的依赖作用域\
  \ ISBN 生成器：\n\n```\n@Dependent @ThirteenDigits\npublic class IsbnGenerator implements\
  \ NumberGenerator {...}\n```\n\n作为默认作用域，你可以省略 `@Dependent` 注解，并编写如下代码：\n\n```\n\
  @ThirteenDigits\npublic class IsbnGenerator implements NumberGenerator {...}\n```\n\
  \n作用域可以混合使用。一个 `@SessionScoped` Bean 可以注入到 `@RequestScoped` 或 `@ApplicationScoped`\
  \ Bean 中，反之亦然。\n\n对话\n\n对话作用域与应用、会话或请求作用域略有不同。它保存与用户关联的状态，跨越多个请求，并由应用程序以编程方式界定。`@ConversationScoped`\
  \ Bean 可用于具有明确开始和结束的长时间运行过程，例如在向导中导航，或购买商品并在在线商店结账。\n\n\n\n请求作用域对象的生命周期非常短暂，通常只持续单个请求（HTTP\
  \ 请求或方法调用），而会话作用域对象的生命周期则贯穿用户的整个会话。但在这两个极端之间，存在许多中间情况。有些表示层对象可以在多个页面中使用，但不会跨越整个会话。为此，CDI\
  \ 提供了一个特殊的对话作用域（`@ConversationScoped`）。与会话作用域对象由容器自动超时不同，对话作用域对象具有明确定义的生命周期，可以通过\
  \ `javax.enterprise.context.Conversation` API 以编程方式显式地开始和结束。\n\n举个例子，考虑一个客户创建向导的\
  \ Web 应用程序。该向导由三个步骤组成。第一步，客户输入登录信息（例如，用户名和密码）。第二步，客户输入账户详细信息，如名字、姓氏、地址和电子邮件地址。向导的最后一步确认所有收集的信息并创建账户。清单\
  \ 2-21 展示了实现客户创建向导的对话作用域 Bean。\n\n***清单 2-21.***  使用对话作用域创建客户的向导\n\n```\n@ConversationScoped\n\
  public class CustomerCreatorWizard implements Serializable {\n\nprivate Login login;\n\
  \  private Account account;\n\n@Inject\n  private CustomerService customerService;\n\
  \n@Inject\n  private Conversation conversation ;\n\npublic void saveLogin () {\n\
  \    conversation.begin();\n\nlogin = new Login();\n    // 设置登录属性\n  }\n\npublic\
  \ void saveAccount() {\n    account = new Account();\n    // 设置账户属性\n  }\n\npublic\
  \ void createCustomer () {\n    Customer customer = new Customer();\n    customer.setLogin(login);\n\
  \    customer.setAccount(account);\n    customerService.createCustomer(customer);\n\
  \nconversation.end();\n  }\n}\n```\n\n清单 2-21 中的 `CustomerCreatorWizard` 使用了 `@ConversationScoped`\
  \ 注解。它注入了 `CustomerService` 来创建 `Customer`，但更重要的是，它注入了 `Conversation`。该接口允许对对话作用域的生命周期进行编程控制。请注意，当调用\
  \ `saveLogin` 方法时，对话开始（`conversation.begin()`）。对话现在已启动，并在向导的整个持续时间内使用。一旦调用向导的最后一步，`createCustomer`\
  \ 方法被调用，对话结束（`conversation.end()`）。表 2-3 概述了 `Conversation` API。\n\n表 2-3. 对话 API\n\
  \n| 方法 | 描述 |\n| --- | --- |\n| `void begin()` | 将当前瞬态对话标记为长期运行 |\n| `void begin(String\
  \ id)` | 将当前瞬态对话标记为长期运行，并指定标识符 |\n| `void end()` | 将当前长期运行的对话标记为瞬态 |\n| `String\
  \ getId()` | 获取当前长期运行对话的标识符 |\n| `long getTimeout()` | 获取当前对话的超时时间 |\n| `void setTimeout(long\
  \ millis)` | 设置当前对话的超时时间 |\n| `boolean isTransient()` | 判断对话是标记为瞬态还是长期运行 |\n\n表达式语言中的\
  \ Bean\n\nCDI 的一个关键特性是它能够将事务层（参见第 9 章）和 Web 层连接起来。但正如您目前所见，CDI 的主要特征之一是依赖注入是完全类型安全的，并且不依赖于基于字符的名称。虽然这在\
  \ Java 代码中很棒，但在 Java 之外（例如 JSF 页面中的 EL），如果没有基于字符的名称，Bean 将无法解析。\n\n默认情况下，CDI Bean\
  \ 不会被分配任何名称，也无法通过 EL 绑定进行解析。要为 Bean 分配名称，必须使用内置的 `@javax.inject.Named` 限定符对其进行注解，如清单\
  \ 2-22 所示。\n\n***清单 2-22.***  具有基于字符名称的 BookService\n\n```\n@Named\npublic class\
  \ BookService {\n\nprivate String title, description;\n  private Float price;\n\
  \  private Book book;\n\n@Inject @ThirteenDigits\n  private NumberGenerator numberGenerator;\n\
  \npublic String createBook () {\n    book = new Book(title, price, description);\n\
  \    book.setIsbn(numberGenerator.generateNumber());\n    return \"customer.xhtml\"\
  ;\n  }\n}\n```\n\n`@Named` 限定符允许您通过其名称访问 `BookService` Bean（默认名称是类名的驼峰式写法，首字母小写）。以下代码显示了一个调用\
  \ `createBook` 方法的 JSF 按钮：\n\n```\n<h:commandButton value=\"发送邮件\" action=\"#{ bookService.createBook\
  \ }\"/>\n```\n\n您还可以通过向限定符添加不同的名称来覆盖 Bean 的名称。\n\n```\n@Named(\"myService\")\npublic\
  \ class BookService {...}\n```\n\n然后您可以在 JSF 页面上使用这个新名称。\n\n```\n<h:commandButton\
  \ value=\"发送邮件\" action=\"#{ myService.createBook }\"/>\n```\n\n拦截器\n\n拦截器允许您向 Bean\
  \ 添加横切关注点。如图 2-2 所示，当客户端调用托管 Bean（因此也包括 CDI Bean、EJB、RESTful Web 服务等）上的方法时，容器能够在调用\
  \ Bean 的方法之前拦截该调用并处理业务逻辑。拦截器分为四种类型。\n\n*   *构造函数级拦截器*：与目标类的构造函数关联的拦截器（`@AroundConstruct`），\n\
  *   *方法级拦截器*：与特定业务方法关联的拦截器（`@AroundInvoke`），\n*   *超时方法拦截器*：使用 `@AroundTimeout`\
  \ 拦截超时方法的拦截器（仅用于 EJB 定时器服务，参见第 8 章），以及\n*   *生命周期回调拦截器*：拦截目标实例生命周期事件回调的拦截器（`@PostConstruct`\
  \ 和 `@PreDestroy`）。\n\n![image](img/sq.jpg) **注意**  自 Java EE 6 以来，拦截器已发展成为一个独立的规范（它们以前与\
  \ EJB 规范捆绑在一起）。如本节所述，它们可以应用于托管 Bean，也可以应用于 EJB、SOAP 和 RESTful Web 服务。\n\n目标类拦截器\n\
  \n定义拦截有几种方法。最简单的方法是将拦截器（方法级、超时或生命周期拦截器）添加到 Bean 本身，如清单 2-23 所示。`CustomerService`\
  \ 使用 `@AroundInvoke` 注解 `logMethod()`。`logMethod()` 用于在进入和退出方法时记录消息。一旦部署了此托管 Bean，任何客户端对\
  \ `createCustomer()` 或 `findCustomerById()` 的调用都将被拦截，并应用 `logMethod()`。请注意，此拦截器的作用域仅限于\
  \ Bean 本身（目标类）。\n\n***清单 2-23.***  使用 Around-Invoke 拦截器的 CustomerService\n\n```\n\
  @Transactional\npublic class CustomerService {\n\n@Inject\n  private EntityManager\
  \ em;\n  @Inject\n  private Logger logger;\n\npublic void createCustomer(Customer\
  \ customer) {\n    em.persist(customer);\n  }\n\npublic Customer findCustomerById(Long\
  \ id) {\n    return em.find(Customer.class, id);\n  }\n\n@AroundInvoke\n  private\
  \ Object logMethod( InvocationContext ic ) throws Exception {\n    logger.entering(\
  \ ic .getTarget().toString(), ic .getMethod().getName());\n    try {\n      return\
  \ ic.proceed() ;\n    } finally {\n      logger.exiting( ic .getTarget().toString(),\
  \ ic .getMethod().getName());\n    }\n  }\n}\n```\n\n尽管使用了 `@AroundInvoke` 注解，`logMethod()`\
  \ 必须具有以下签名模式：\n\n\n\n```\n@AroundInvoke\nObject <METHOD>(InvocationContext ic) throws\
  \ Exception;\n```\n\n以下规则适用于环绕通知方法（以及构造器、超时或生命周期拦截器）：\n\n*   该方法可以具有 `public`、`private`、`protected`\
  \ 或包级访问权限，但不能是 `static` 或 `final`。\n*   该方法必须包含一个 `javax.interceptor.InvocationContext`\
  \ 参数，并且必须返回 `Object`，即被调用目标方法的结果。\n*   该方法可以抛出受检异常。\n\n`InvocationContext` 对象允许拦截器控制调用链的行为。如果多个拦截器被串联，同一个\
  \ `InvocationContext` 实例会传递给每个拦截器，拦截器可以添加供其他拦截器处理的上下文数据。表 2-4 描述了 `InvocationContext`\
  \ API。\n\n表 2-4. InvocationContext 接口定义\n\n| 方法 | 描述 |\n| --- | --- |\n| `getContextData`\
  \ | 允许使用 `Map` 在同一个 `InvocationContext` 实例的拦截器方法之间传递值。 |\n| `getConstructor` | 返回触发拦截器的目标类的构造器。\
  \ |\n| `getMethod` | 返回触发拦截器的 Bean 类的方法。 |\n| `getParameters` | 返回将用于调用业务方法的参数。\
  \ |\n| `getTarget` | 返回被拦截方法所属的 Bean 实例。 |\n| `getTimer` | 返回与 `@Timeout` 方法关联的定时器。\
  \ |\n| `proceed` | 触发调用链中下一个拦截器方法的调用。它返回下一个被调用方法的结果。如果方法类型为 `void`，则 `proceed` 返回\
  \ `null`。 |\n| `setParameters` | 修改用于目标类方法调用的参数值。参数的类型和数量必须与 Bean 的方法签名匹配，否则会抛出\
  \ `IllegalArgumentException`。 |\n\n为了解释代码清单 2-23 中的代码如何工作，让我们看一下图 2-6 所示的时序图，了解当客户端调用\
  \ `createCustomer()` 方法时会发生什么。首先，容器拦截该调用，而不是直接处理 `createCustomer()`，而是先调用 `logMethod()`\
  \ 方法。`logMethod()` 使用 `InvocationContext` 接口获取被调用 Bean 的名称（`ic.getTarget()`）和被调用的方法（`ic.getMethod()`），以记录一条进入消息（`logger.entering()`）。然后，调用\
  \ `proceed()` 方法。调用 `InvocationContext.proceed()` 非常重要，因为它告诉容器应该继续执行下一个拦截器或调用 Bean\
  \ 的业务方法。不调用 `proceed()` 会停止拦截器链，并避免调用业务方法。最终调用 `createCustomer()`，一旦返回，拦截器通过记录一条退出消息（`logger.exiting()`）完成执行。如果客户端调用\
  \ `findCustomerById()` 方法，也会发生相同的顺序。\n\n![9781430246268_Fig02-06.jpg](img/9781430246268_Fig02-06.jpg)\n\
  \n图 2-6. 被拦截的业务方法调用\n\n![image](img/sq.jpg) **注意**  代码清单 2-23 使用了新的 `@javax.transaction.Transactional`\
  \ 注解。它用于控制 CDI Bean 以及 Servlet、JAX-RS 和 JAX-WS 服务端点的事务边界。它在 CDI 中提供了 EJB 事务属性的语义。`@Transactional`\
  \ 通过拦截器实现。更多关于事务的内容请参见第 9 章。\n\n类拦截器\n\n代码清单 2-23 定义了一个仅适用于 `CustomerService` 的拦截器。但大多数情况下，您希望将横切关注点隔离到一个单独的类中，并告诉容器拦截对多个\
  \ Bean 的调用。日志记录是一个典型场景，您希望所有 Bean 的所有方法都记录进入和退出消息。要指定一个类拦截器，您需要开发一个单独的类，并指示容器将其应用于特定的\
  \ Bean 或 Bean 的方法。\n\n为了在多个 Bean 之间共享一些代码，让我们从代码清单 2-23 中提取 `logMethod()` 方法，并将其隔离到一个单独的类中，如代码清单\
  \ 2-24 所示。注意 `init()` 方法，它使用 `@AroundConstruct` 注解，并且仅在调用 Bean 的构造器时被调用。\n\n***代码清单\
  \ 2-24.***  一个包含环绕通知和环绕构造的拦截器类\n\n```\npublic class LoggingInterceptor {\n\n@Inject\n\
    private Logger logger;\n\n@AroundConstruct\n  private void init( InvocationContext\
  \ ic ) throws Exception {\n    logger.fine(\"进入构造器\");\n    try {\n      ic.proceed();\n\
      } finally {\n      logger.fine(\"退出构造器\");\n    }\n  }\n\n@AroundInvoke\n  public\
  \ Object logMethod(InvocationContext ic) throws Exception {\n    logger.entering(\
  \ ic .getTarget().toString(), ic .getMethod().getName());\n    try {\n      return\
  \ ic.proceed() ;\n    } finally {\n      logger.exiting( ic .getTarget().toString(),\
  \ ic .getMethod().getName());\n    }\n  }\n}\n```\n\n现在，任何对此拦截器感兴趣的 Bean 都可以透明地包装\
  \ `LoggingInterceptor`。为此，Bean 需要使用 `@javax.interceptor.Interceptors` 注解通知容器。在代码清单\
  \ 2-25 中，该注解设置在 `createCustomer()` 方法上。这意味着对该方法的任何调用都将被容器拦截，并且 `LoggingInterceptor`\
  \ 类将被调用（在方法进入和退出时记录消息）。\n\n***代码清单 2-25.***  CustomerService 在一个方法上使用拦截器\n\n```\n\
  @Transactional\npublic class CustomerService {\n\n@Inject\n  private EntityManager\
  \ em;\n\n@Interceptors(LoggingInterceptor.class)\n  public void createCustomer(Customer\
  \ customer) {\n    em.persist(customer);\n  }\n\npublic Customer findCustomerById(Long\
  \ id) {\n    return em.find(Customer.class, id);\n  }\n}\n```\n\n在代码清单 2-25 中，`@Interceptors`\
  \ 仅附加到 `createCustomer()` 方法。这意味着如果客户端调用 `findCustomerById()`，容器将不会拦截该调用。如果您希望两个方法的调用都被拦截，可以将\
  \ `@Interceptors` 注解添加到两个方法上，或者添加到 Bean 本身。当您这样做时，无论调用哪个方法，拦截器都会被触发。并且由于拦截器具有 `@AroundConstruct`，对构造器的调用也将被拦截。\n\
  \n```\n@Transactional\n@Interceptors(LoggingInterceptor.class)\npublic class CustomerService\
  \ {\n  public void createCustomer(Customer customer) {...}\n  public Customer findCustomerById(Long\
  \ id) {...}\n}\n```\n\n如果您的 Bean 有多个方法，并且您希望将拦截器应用于整个 Bean，但排除特定方法，则可以使用 `javax.interceptor.ExcludeClassInterceptors`\
  \ 注解来排除某个调用被拦截。在以下代码中，对 `updateCustomer()` 的调用将不会被拦截，但其他所有调用都会被拦截：\n\n```\n@Transactional\n\
  @Interceptors(LoggingInterceptor.class)\npublic class CustomerService {\n  public\
  \ void createCustomer(Customer customer) {...}\n  public Customer findCustomerById(Long\
  \ id) {...}\n  @ExcludeClassInterceptors\n  public Customer updateCustomer(Customer\
  \ customer) { ... }\n}\n```\n\n生命周期拦截器\n\n\n\n在本章开头，我解释了托管 Bean 的生命周期（图 2-2）和回调事件。通过回调注解，你可以通知容器在特定的生命周期阶段调用某个方法（`@PostConstruct`\
  \ 和 `@PreDestroy`）。例如，如果你想在每次创建 Bean 实例时记录一条日志，只需在 Bean 的某个方法上添加 `@PostConstruct`\
  \ 注解，并加入一些日志记录机制即可。但是，如果你需要捕获多种类型 Bean 的生命周期事件呢？生命周期拦截器允许你将一些代码隔离到一个类中，并在生命周期事件被触发时调用它。\n\
  \n清单 2-26 展示了 `ProfileInterceptor` 类，它包含两个方法：`logMethod()` 用于后构造（`@PostConstruct`），以及\
  \ `profile()` 用于方法拦截（`@AroundInvoke`）。\n\n***清单 2-26.***  同时包含生命周期和环绕调用的拦截器\n\n\
  ```\npublic class ProfileInterceptor {\n\n@Inject\n  private Logger logger;\n\n\
  @PostConstruct\n  public void logMethod(InvocationContext ic) throws Exception {\n\
      logger.fine(ic.getTarget().toString());\n      try {\n      ic.proceed();\n\
      } finally {\n      logger.fine(ic.getTarget().toString());\n    }\n  }\n\n@AroundInvoke\n\
    public Object profile(InvocationContext ic) throws Exception {\n    long initTime\
  \ = System.currentTimeMillis();\n    try {\n      return ic.proceed();\n    } finally\
  \ {\n      long diffTime = System.currentTimeMillis() - initTime;\n      logger.fine(ic.getMethod()\
  \ + \" took \" + diffTime + \" millis\");\n    }\n  }\n}\n```\n\n如清单 2-26 所示，生命周期拦截器接受一个\
  \ `InvocationContext` 参数，并返回 `void` 而非 `Object`。要应用清单 2-26 中定义的拦截器，Bean `CustomerService`（清单\
  \ 2-27）需要使用 `@Interceptors` 注解并定义 `ProfileInterceptor`。当容器实例化该 Bean 时，`logMethod()`\
  \ 将在 `init()` 方法之前被调用。然后，如果客户端调用 `createCustomer()` 或 `findCustomerById()`，`profile()`\
  \ 方法将被调用。\n\n***清单 2-27.***  使用拦截器和回调注解的 CustomerService\n\n```\n@Transactional\n\
  @Interceptors(ProfileInterceptor.class)\npublic class CustomerService {\n\n@Inject\n\
    private EntityManager em;\n\n@PostConstruct\n  public void init() {\n    // ...\n\
    }\n\npublic void createCustomer(Customer customer) {\n    em.persist(customer);\n\
    }\n\npublic Customer findCustomerById(Long id) {\n    return em.find(Customer.class,\
  \ id);\n  }\n}\n```\n\n拦截器的链式调用与排除\n\n你已经了解了如何在单个 Bean 内部（使用 `@AroundInvoke`）以及跨多个\
  \ Bean（使用 `@Interceptors`）拦截调用。拦截器 1.2 还允许你将多个拦截器链式组合。\n\n实际上，`@Interceptors` 注解能够附加多个拦截器，因为它接受一个以逗号分隔的拦截器列表作为参数。当定义了多个拦截器时，它们的调用顺序由它们在\
  \ `@Interceptors` 注解中指定的顺序决定。例如，清单 2-28 中的代码在 Bean 级别和方法级别都使用了 `@Interceptors`。\n\
  \n***清单 2-28.***  链式调用多个拦截器的 CustomerService\n\n```\n@Stateless\n@Interceptors({I1.class,\
  \ I2.class})\npublic class CustomerService {\n  public void createCustomer(Customer\
  \ customer) {...}\n  @Interceptors({I3.class, I4.class})\n  public Customer findCustomerById(Long\
  \ id) {...}\n  public void removeCustomer(Customer customer) {...}\n  @ExcludeClassInterceptors\n\
    public Customer updateCustomer(Customer customer) {...}\n}\n```\n\n当客户端调用 `updateCustomer()`\
  \ 方法时，不会调用任何拦截器，因为该方法被 `@ExcludeClassInterceptors` 注解标注。当调用 `createCustomer()` 方法时，会先执行拦截器\
  \ `I1`，然后执行 `I2`。当调用 `findCustomerById()` 方法时，拦截器 `I1`、`I2`、`I3` 和 `I4` 会按此顺序执行。\n\
  \n拦截器绑定\n\n拦截器在其自己的规范（JSR 318）中定义，可用于任何托管 Bean（EJB、Servlet、RESTful Web 服务等）。但 CDI\
  \ 规范通过添加拦截器绑定对其进行了扩展，这意味着只有在启用 CDI 的情况下才能使用拦截器绑定。\n\n如果你以清单 2-25 为例，可以看到拦截器的工作方式；你需要在\
  \ Bean 的实现上直接指定拦截器的实现（例如 `@Interceptors(LoggingInterceptor.class)`）。这是类型安全的，但并非松耦合。CDI\
  \ 提供了拦截器绑定，它引入了一层间接性和松耦合。拦截器绑定类型是一种用户自定义的注解，其本身被 `@InterceptorBinding` 注解标注，它将拦截器类与\
  \ Bean 绑定，而这两个类之间没有直接依赖关系。\n\n清单 2-29 展示了一个名为 `Loggable` 的拦截器绑定。如你所见，这段代码与限定符非常相似。拦截器绑定本身是一个被\
  \ `@InterceptorBinding` 注解标注的注解，它可以为空或包含成员（例如清单 2-13 中所示）。\n\n***清单 2-29.***  Loggable\
  \ 拦截器绑定\n\n```\n@InterceptorBinding\n@Target({METHOD, TYPE})\n@Retention(RUNTIME)\n\
  public @interface Loggable { }\n```\n\n一旦你有了拦截器绑定，就需要将其附加到拦截器本身。这通过使用 `@Interceptor`\
  \ 和拦截器绑定（清单 2-30 中的 `@Loggable`）来注解拦截器实现。\n\n***清单 2-30.***  Loggable 拦截器\n\n```\n\
  @Interceptor\n@Loggable\npublic class LoggingInterceptor {\n\n@Inject\n  private\
  \ Logger logger;\n\n@AroundInvoke\n  public Object logMethod(InvocationContext ic)\
  \ throws Exception {\n    logger.entering( ic .getTarget().toString(), ic .getMethod().getName());\n\
      try {\n      return ic.proceed() ;\n    } finally {\n      logger.exiting( ic\
  \ .getTarget().toString(), ic .getMethod().getName());\n    }\n  }\n}\n```\n\n现在，你可以通过使用相同的拦截器绑定来注解\
  \ Bean 类，从而将拦截器应用于 Bean，如清单 2-31 所示。这为你提供了松耦合（因为未显式声明拦截器的实现类）和良好的间接性。\n\n***清单 2-31.***\
  \  使用拦截器绑定的 CustomerService\n\n```\n@Transactional\n@Loggable\npublic class CustomerService\
  \ {\n\n@Inject\n  private EntityManager em;\n\npublic void createCustomer(Customer\
  \ customer) {\n    em.persist(customer);\n  }\n\npublic Customer findCustomerById(Long\
  \ id) {\n    return em.find(Customer.class, id);\n  }\n}\n```\n\n在清单 2-31 中，拦截器绑定位于\
  \ Bean 上，这意味着每个方法都将被拦截并记录日志。但与拦截器类似，你也可以将拦截器绑定应用于某个方法，而不是整个 Bean。\n\n```\n@Transactional\n\
  public class CustomerService {\n  @Loggable\n  public void createCustomer(Customer\
  \ customer) {...}\n  public Customer findCustomerById(Long id) {...}\n}\n```\n\n\
  拦截器是特定于部署的，并且默认是禁用的。与替代方案类似，拦截器需要通过使用 jar 或 Java EE 模块的 CDI 部署描述符 `beans.xml` 来启用，如清单\
  \ 2-32 所示。\n\n\n\n***清单 2-32.***  启用拦截器的 beans.xml 部署描述符\n\n```\n<beans xmlns=\"\
  \ http://xmlns.jcp.org/xml/ns/javaee \"\n       xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance\
  \ \"\n       xsi:schemaLocation=\" http://xmlns.jcp.org/xml/ns/javaee →\n                          \
  \ http://xmlns.jcp.org/xml/ns/javaee/beans_1_1.xsd \"\n       version=\"1.1\" bean-discovery-mode=\"\
  all\">\n\n<interceptors>\n    <class>org.agoncal.book.javaee7.chapter02\\. LoggingInterceptor\
  \ </class>\n  </interceptors>\n</beans>\n```\n\n拦截器绑定的优先级\n\n拦截器绑定带来了一层间接性，但您失去了像清单\
  \ 2-28（`@Interceptors({I1.class, I2.class})`）那样对拦截器进行排序的可能性。从 CDI 1.1 开始，您可以使用 `@javax.annotation.Priority`\
  \ 注解（或 `beans.xml` 中的等效 XML 配置）以及优先级值来对它们进行排序，如清单 2-33 所示。\n\n***清单 2-33.***  可记录日志的拦截器绑定\n\
  \n```\n@Interceptor\n@Loggable\n@Priority(200)\npublic class LoggingInterceptor\
  \ {\n\n@Inject\n  private Logger logger;\n\n@AroundInvoke\n  public Object logMethod(InvocationContext\
  \ ic) throws Exception {\n    logger.entering( ic .getTarget().toString(), ic .getMethod().getName());\n\
      try {\n      return ic.proceed() ;\n    } finally {\n      logger.exiting( ic\
  \ .getTarget().toString(), ic .getMethod().getName());\n    }\n  }\n}\n```\n\n`@Priority`\
  \ 接受一个整数，该整数可以取任何值。规则是优先级值较小的拦截器先被调用。Java EE 7 定义了平台级别的优先级，然后您可以让您的拦截器在特定事件之前或之后被调用。`javax.interceptor.Interceptor`\
  \ 注解定义了以下一组常量：\n\n*   `PLATFORM_BEFORE = 0`：由 Java EE 平台定义的早期拦截器的范围起始值，\n*   `LIBRARY_BEFORE\
  \ = 1000`：由扩展库定义的早期拦截器的范围起始值，\n*   `APPLICATION = 2000`：由应用程序定义的拦截器的范围起始值，\n*  \
  \ `LIBRARY_AFTER = 3000`：由扩展库定义的后期拦截器的范围起始值，\n*   `PLATFORM_AFTER = 4000`：由 Java\
  \ EE 平台定义的后期拦截器的范围起始值。\n\n因此，如果您希望您的拦截器在任何应用程序拦截器之前执行，但在任何早期平台拦截器之后执行，您可以编写以下代码：\n\
  \n```\n@Interceptor\n@Loggable\n@Priority(Interceptor.Priority.LIBRARY_BEFORE +\
  \ 10)\npublic class LoggingInterceptor {...}\n```\n\n装饰器\n\n拦截器执行横切关注点任务，非常适合解决技术性问题，例如事务管理、安全性或日志记录。从本质上讲，拦截器并不知道它们所拦截操作的实际语义，因此不适合用于分离与业务相关的关注点。而装饰器则恰恰相反。\n\
  \n装饰器是来自“四人帮”的一种常见设计模式。其思想是获取一个类，并用另一个类将其包裹起来（即对其进行装饰）。这样，当您调用一个被装饰的类时，在到达目标类之前，您总是会先经过外层的装饰器。装饰器旨在为业务方法添加额外的逻辑。它们无法解决横跨许多不同类型的技术性问题。尽管拦截器和装饰器在许多方面相似，但它们实际上是互补的。\n\
  \n让我们以 ISSN 号码生成器为例。ISSN 是一个 8 位数字，后来被 ISBN（13 位数字）所取代。与其拥有两个独立的号码生成器（例如清单 2-9 和清单\
  \ 2-10 中的生成器），不如装饰 ISSN 生成器，添加一个将 8 位数字转换为 13 位数字的额外算法。清单 2-34 将这种算法实现为一个装饰器。`FromEightToThirteenDigitsDecorator`\
  \ 类使用 `javax.decorator.Decorator` 进行注解，实现了业务接口（图 2-3 中定义的 `NumberGenerator`），并重写了\
  \ `generateNumber` 方法（装饰器可以声明为抽象类，这样如果接口有很多业务方法，它就不必实现所有方法）。`generateNumber()` 方法调用目标\
  \ bean 来生成一个 ISSN，添加一些业务逻辑来转换该数字，并返回一个 ISBN 号码。\n\n***清单 2-34.***  将 8 位数字转换为 13\
  \ 位数字的装饰器\n\n```\n@Decorator\npublic class FromEightToThirteenDigitsDecorator implements\
  \ NumberGenerator {\n\n@Inject @Delegate\n  private NumberGenerator numberGenerator;\n\
  \npublic String generateNumber () {\n    String issn = numberGenerator.generateNumber()\
  \ ;\n    String isbn = \"13-84356\" + issn.substring(1);\n    return isbn;\n  }\n\
  }\n```\n\n装饰器必须有一个委托注入点（使用 `@Delegate` 注解），其类型与它们所装饰的 bean 相同（此处为 `NumberGenerator`\
  \ 接口）。它允许装饰器调用委托对象（即目标 bean `IssnNumberGenerator`），从而调用其上的任何业务方法（例如清单 2-34 中的 `numberGenerator.generateNumber()`）。\n\
  \n默认情况下，所有装饰器都像备选方案和拦截器一样被禁用。您需要在 `beans.xml` 中启用装饰器，如清单 2-35 所示。\n\n***清单 2-35.***\
  \  启用装饰器的 beans.xml 部署描述符\n\n```\n<beans xmlns=\" http://xmlns.jcp.org/xml/ns/javaee\
  \ \"\n       xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n       xsi:schemaLocation=\"\
  \ http://xmlns.jcp.org/xml/ns/javaee →\n                           http://xmlns.jcp.org/xml/ns/javaee/beans_1_1.xsd\
  \ \"\n       version=\"1.1\" bean-discovery-mode=\"all\">\n\n<decorators>\n    <class>org.agoncal.book.javaee7.chapter02\\\
  . FromEightToThirteenDigitsDecorator </class>\n  </decorators>\n</beans>\n```\n\n\
  如果应用程序同时具有拦截器和装饰器，则拦截器会先被调用。\n\n事件\n\n依赖注入、备选方案、拦截器和装饰器通过允许在部署时或运行时改变附加行为来实现松耦合。事件则更进一步，允许\
  \ bean 之间完全没有编译时依赖关系即可进行交互。一个 bean 可以定义一个事件，另一个 bean 可以触发该事件，而第三个 bean 可以处理该事件。这些\
  \ bean 可以位于不同的包中，甚至可以位于应用程序的不同层中。这种基本模式遵循了“四人帮”的观察者/可观察者设计模式。\n\n事件生产者使用 `javax.enterprise.event.Event`\
  \ 接口来触发事件。生产者通过调用 `fire()` 方法来引发事件，传递事件对象，并且不依赖于观察者。在清单 2-36 中，`BookService` 在每次创建书籍时都会触发一个事件（`bookAddedEvent`）。代码\
  \ `bookAddedEvent.fire(book)` 触发该事件，并通知所有观察此特定事件的观察者方法。该事件的内容是 `Book` 对象本身，它将从生产者传递到消费者。\n\
  \n***清单 2-36.***  BookService 在每次创建书籍时触发一个事件\n\n```\npublic class BookService {\n\
  ```\n\n\n@Inject\n  private NumberGenerator numberGenerator;\n\n@Inject\n  private\
  \ Event<Book> bookAddedEvent ;\n\npublic Book createBook(String title, Float price,\
  \ String description) {\n    Book book = new Book(title, price, description);\n\
      book.setIsbn(numberGenerator.generateNumber());\n    bookAddedEvent.fire(book);\n\
      return book;\n  }\n}\n```\n\n事件由事件生产者触发，并由事件观察者订阅。观察者是一个包含一个或多个观察者方法的 Bean。每个观察者方法都将一个特定类型的事件作为参数，该参数使用\
  \ `@Observes` 注解和可选的限定符进行标注。当事件对象与事件类型及所有限定符匹配时，观察者方法会收到事件通知。清单 2-37 展示了一个库存服务，其职责是通过增加图书库存来维护可用图书的库存。它有一个\
  \ `addBook` 方法，用于观察任何类型为 `Book` 的事件。被注解的参数称为事件参数。因此，一旦事件从 `BookService` Bean 触发，CDI\
  \ 容器会暂停执行，并将事件传递给所有已注册的观察者。在我们的例子中，清单 2-37 中的 `addBook` 方法将被调用，库存随之更新，然后容器会从 `BookService`\
  \ Bean 中暂停的位置继续执行代码。这意味着 CDI 中的事件并非异步处理。\n\n***清单 2-37.***  InventoryService 观察\
  \ Book 事件\n\n```\npublic class InventoryService {\n\n@Inject\n  private Logger logger;\n\
    List<Book> inventory = new ArrayList<>();\n\npublic void addBook( @Observes Book\
  \ book ) {\n    logger.info(\"Adding book \" + book.getTitle() + \" to inventory\"\
  );\n    inventory.add(book);\n  }\n}\n```\n\n与 CDI 的大部分特性一样，事件的生产和订阅是类型安全的，并允许使用限定符来确定观察者将观察哪些事件。一个事件可以被分配一个或多个限定符（可以带成员，也可以不带成员），这使得观察者能够将其与同一类型的其他事件区分开来。清单\
  \ 2-38 通过添加一个额外的事件重新审视了 `BookService` Bean。当创建一本书时，它会触发 `bookAddedEvent`；当删除一本书时，它会触发\
  \ `bookRemovedEvent`，这两个事件都是 `Book` 类型。为了区分这两个事件，分别使用 `@Added` 或 `@Removed` 对其进行限定。这些限定符的代码与清单\
  \ 2-7 中的代码相同：一个没有成员的注解，并使用 `@Qualifier` 进行注解。\n\n***清单 2-38.***  BookService 触发多个事件\n\
  \n```\npublic class BookService {\n\n@Inject\n  private NumberGenerator numberGenerator;\n\
  \n@Inject @Added\n  private Event<Book> bookAddedEvent ;\n\n@Inject @Removed\n  private\
  \ Event<Book> bookRemovedEvent ;\n\npublic Book createBook(String title, Float price,\
  \ String description) {\n    Book book = new Book(title, price, description);\n\
      book.setIsbn(numberGenerator.generateNumber());\n    bookAddedEvent.fire(book);\n\
      return book;\n  }\n\npublic void deleteBook(Book book) {\n    bookRemovedEvent.fire(book);\n\
    }\n}\n```\n\n清单 2-39 中的 `InventoryService` 通过声明两个独立的方法来观察这两个事件，一个观察图书添加事件（`@Observes\
  \ @Added Book`），另一个观察图书删除事件（`@Observes @Removed Book`）。\n\n***清单 2-39.***  InventoryService\
  \ 观察多个事件\n\n```\npublic class InventoryService {\n\n@Inject\n  private Logger logger;\n\
    List<Book> inventory = new ArrayList<>();\n\npublic void addBook( @Observes @Added\
  \ Book book ) {\n    logger.warning(\"Adding book \" + book.getTitle() + \" to inventory\"\
  );\n    inventory.add(book);\n  }\n\npublic void removeBook( @Observes @Removed\
  \ Book book ) {\n    logger.warning(\"Removing book \" + book.getTitle() + \" to\
  \ inventory\");\n    inventory.remove(book);\n  }\n}\n```\n\n\n\n由于事件模型使用了限定符，你可以通过在这些限定符上添加成员或聚合它们来获益。以下代码观察所有价格大于\
  \ 100 的已添加图书：\n\n```\nvoid addBook(@Observes  @Added @Price(greaterThan=100)  Book\
  \ book)\n```\n\n整合所有内容\n\n现在让我们整合这些概念，编写一些 Bean、生产者，使用注入、限定符、替代方案和拦截器绑定。本示例使用 Weld\
  \ 容器在 Java SE 中运行`Main`类，并通过集成测试验证注入是否正确。\n\n图 2-7 展示了运行此示例所需所有类的类图，并描述了所有注入点。\n\
  \n![9781430246268_Fig02-07.jpg](img/9781430246268_Fig02-07.jpg)\n\n图 2-7. 整合所有内容\n\
  \n*   `BookService` Bean 包含一个创建`Book` POJO 的方法。\n*   `NumberGenerator`接口有两个实现类用于生成\
  \ ISBN 和 ISSN 编号（`IsbnGenerator`和`IssnGenerator`），以及一个用于集成测试生成模拟编号的替代实现（`MockGenerator`）。\n\
  *   `NumberGenerator`的实现类使用两个限定符来避免歧义依赖注入：`@ThirteenDigits`和`@EightDigits`。\n* \
  \  `LoggingProducer`包含一个方法生产者以允许`Logger`注入。`LoggingInterceptor`与`Loggable`拦截器绑定结合，使\
  \ CDI Bean 能够记录方法调用。\n*   `Main`类使用`BookService`创建`Book`，并通过`IsbnGenerator`生成编号。`BookServiceIT`集成测试使用`MockGenerator`替代方案生成模拟图书编号。\n\
  \n图 2-7 中描述的类遵循标准 Maven 目录结构。\n\n*   `src/main/java`：存放所有 Bean、限定符、拦截器和`Main`类的目录。\n\
  *   `src/main/resources`：一个空的`beans.xml`文件，用于在不启用替代方案或拦截器的情况下触发 CDI。\n*   `src/test/java`：存放集成测试`BookServiceIT`和替代方案`MockGenerator`的目录。\n\
  *   `src/test/resources`：一个启用了`MockGenerator`替代方案和`LoggingInterceptor`拦截器的`beans.xml`文件。\n\
  *   `pom.xml`：描述项目及其依赖关系的 Maven 项目对象模型（POM）。\n\n编写 Book 和 BookService 类\n\nCD-BookStore\
  \ 应用程序使用`BookService`（清单 2-41）创建图书。`Book` POJO（清单 2-40）包含标题、描述和价格。图书编号由外部服务生成，可以是\
  \ ISBN 或 ISSN 编号。\n\n***清单 2-40.***  Book POJO\n\n```\npublic class Book {\n\nprivate\
  \ String title;\n  private Float price;\n  private String description;\n  private\
  \ String number;\n\n// 构造方法、getter、setter\n}\n```\n\n`BookService`（清单 2-41）包含一个方法，该方法接收标题、价格和描述，并返回`Book`\
  \ POJO。它使用注入（`@Inject`）和限定符（`@ThirteenDigits`）调用`IsbnGenerator`的`generateNumber`方法，以设置图书的\
  \ ISBN 编号。\n\n***清单 2-41.***  使用依赖注入和拦截的 BookService\n\n```\n@Loggable\npublic class\
  \ BookService {\n\n@Inject  @ThirteenDigits\n  private NumberGenerator numberGenerator\
  \ ;\n\npublic Book createBook(String title, Float price, String description) {\n\
      Book book = new Book(title, price, description);\n    book.setNumber( numberGenerator.generateNumber()\
  \ );\n    return book;\n  }\n}\n```\n\n清单 2-41 中的`BookService`使用了拦截器绑定`@Loggable`（清单\
  \ 2-50），如果启用，它将记录方法的进入和退出。\n\n编写 NumberGenerator 类\n\n清单 2-41 中的`BookService`依赖于`NumberGenerator`接口（清单\
  \ 2-42）。该接口包含一个生成并返回图书编号的方法。该接口由`IsbnGenerator`、`IssnGenerator`和`MockGenerator`类实现。\n\
  \n***清单 2-42.***  NumberGenerator 接口\n\n```\npublic interface NumberGenerator {\n\
      String generateNumber ();\n}\n```\n\n`IsbnGenerator`（清单 2-43）使用`@ThirteenDigits`进行限定。这告知\
  \ CDI 生成的编号由 13 位数字组成。注意，`IsbnGenerator`类也使用注入获取`java.util.logging.Logger`（在清单 2-48\
  \ 中生成），并使用拦截器绑定`@Loggable`记录方法的进入和退出。\n\n***清单 2-43.***  IsbnGenerator 生成 13 位编号\n\
  \n```\n@ThirteenDigits\npublic class IsbnGenerator implements NumberGenerator {\n\
  \n@Inject\n  private Logger logger;\n\n@Loggable\n  public String generateNumber\
  \ () {\n    String isbn = \" 13-84356- \" + Math.abs(new Random().nextInt());\n\
      logger.info(\" 生成的 ISBN : \" + isbn);\n    return isbn;\n  }\n}\n```\n\n清单 2-44\
  \ 中的`IssnGenerator`是`NumberGenerator`的八位数字实现。\n\n***清单 2-44.***  IssnGenerator 生成八位编号\n\
  \n```\n@EightDigits\npublic class IssnGenerator implements NumberGenerator {\n\n\
  @Inject\n  private Logger logger;\n\n@Loggable\n  public String generateNumber ()\
  \ {\n    String issn =  \" 8- \" + Math.abs(new Random().nextInt());\n    logger.info(\"\
  生成的 ISBN : \" + issn);\n    return issn;\n  }\n}\n```\n\n清单 2-45 中的`MockGenerator`是`IsbnGenerator`的替代方案（`@Alternative`）（因为它也使用了`@ThirteenDigits`限定符）。`MockGenerator`仅用于集成测试，因为它只在测试环境的`beans.xml`中启用（参见清单\
  \ 2-55）。\n\n***清单 2-45.***  作为 13 位替代方案的模拟编号生成器\n\n```\n@Alternative\n@ThirteenDigits\n\
  public class MockGenerator implements NumberGenerator {\n\n@Inject\n  private Logger\
  \ logger;\n\n@Loggable\n  public String generateNumber () {\n    String mock = \"\
  \ MOCK- \" + Math.abs(new Random().nextInt());\n    logger.info(\"生成的模拟编号 : \" +\
  \ mock);\n    return mock;\n  }\n}\n```\n\n编写限定符\n\n由于`NumberGenerator`有多个实现，CDI\
  \ 需要限定每个 Bean 和每个注入点，以避免歧义注入。为此，它使用了两个限定符`ThirteenDigits`（清单 2-46）和`EightDigits`（清单\
  \ 2-47），它们都使用`javax.inject.Qualifier`注解，且没有成员（仅为空注解）。`@ThirteenDigits`用于`IsbnGenerator`\
  \ Bean（清单 2-43）以及`BookService`中的注入点（清单 2-41）。\n\n***清单 2-46.***  13 位限定符\n\n```\n\
  @Qualifier\n@Retention(RUNTIME)\n@Target({FIELD, TYPE, METHOD})\npublic @interface\
  \ ThirteenDigits { }\n```\n\n***清单 2-47.***  八位限定符\n\n```\n@Qualifier\n@Retention(RUNTIME)\n\
  @Target({FIELD, TYPE, METHOD})\npublic @interface EightDigits { }\n```\n\n编写日志记录器\n\
  \n\n\n示例应用以多种方式使用了日志记录。如清单 2-43、2-44 和 2-45 所示，所有 `NumberGenerator` 实现都通过注入获取 `java.util.logging.Logger`\
  \ 并写入日志。由于 `Logger` 属于 JDK，默认情况下不可注入（`rt.jar` 文件中没有 `beans.xml` 文件），因此需要手动生成它。清单\
  \ 2-48 中的 `LoggingProducer` 类包含一个带有 `@Produces` 注解的生产者方法（`produceLogger`），该方法将创建并返回一个以注入点类名参数化的\
  \ `Logger`。\n\n***清单 2-48.***  日志生产者\n\n```\npublic class LoggingProducer {\n\n\
  @Produces\n  public Logger produceLogger(InjectionPoint injectionPoint) {\n    return\
  \ Logger.getLogger(injectionPoint.getMember().getDeclaringClass().getName());\n\
    }\n}\n```\n\n清单 2-49 中的 `LoggingInterceptor` 使用生成的 `Logger` 来记录方法的进入和退出。由于日志记录可被视为横切关注点，因此它被外部化为一个拦截器（在\
  \ `logMethod` 上使用 `@AroundInvoke`）。`LoggingInterceptor` 定义了 `@Loggable` 拦截器绑定（清单\
  \ 2-50），然后可以在任何 bean 中使用（例如，清单 2-41 中的 `BookService`）。\n\n***清单 2-49.***  在进入和退出时记录方法的拦截器\n\
  \n```\n@Interceptor\n@Loggable\npublic class LoggingInterceptor {\n\n@Inject\n  private\
  \ Logger logger ;\n\n@AroundInvoke\n  public Object logMethod(InvocationContext\
  \ ic) throws Exception {\n    logger.entering (ic.getTarget().getClass().getName(),\
  \ ic.getMethod().getName());\n    try {\n      return ic.proceed();\n    } finally\
  \ {\n      logger.exiting (ic.getTarget().getClass().getName(), ic.getMethod().getName());\n\
      }\n  }\n}\n```\n\n***清单 2-50.***  Loggable 拦截器绑定\n\n```\n@InterceptorBinding\n\
  @Target({METHOD, TYPE})\n@Retention(RUNTIME)\npublic @interface Loggable { }\n```\n\
  \n编写主类\n\n为了运行示例应用，我们需要一个主类来触发 CDI 容器并调用 `BookService.createBook` 方法。CDI 1.1 没有用于引导容器的标准\
  \ API，因此清单 2-51 中的代码是 Weld 特有的。它首先初始化 `WeldContainer`，并返回一个完全构造并注入的 `BookService.class`\
  \ 实例。调用 `createBook` 方法将使用所有容器服务：`IsbnGenerator` 和 `Logger` 将被注入到 `BookService`\
  \ 中，并创建一个带有 ISBN 编号的 `Book` 并显示。\n\n***清单 2-51.***  使用 CDI 容器调用 BookService 的主类\n\
  \n```\npublic class Main {\n\npublic static void main(String[] args) {\n\nWeld weld\
  \ = new Weld();\n    WeldContainer container = weld.initialize();\n\nBookService\
  \ bookService = container.instance(). select(BookService.class) .get();\n\nBook\
  \ book = bookService. createBook (\"H2G2\", 12.5f, \"Geeky scifi Book\");\n\nSystem.out.println(book);\n\
  \nweld.shutdown();\n  }\n}\n```\n\n清单 2-51 中的代码是 Weld 特有的，因此不可移植。它无法在其他 CDI 实现（如\
  \ OpenWebBeans（Apache）或 CanDI（Caucho））中工作。未来 CDI 版本的目标之一将是标准化引导 API。\n\n使用 beans.xml\
  \ 触发 CDI\n\n为了触发 CDI 并使此示例正常工作，我们需要在应用程序的类路径中放置一个 `beans.xml` 文件。如清单 2-52 所示，`beans.xml`\
  \ 文件完全是空的，但如果没有它，CDI 将不会被触发，bean 发现不会发生，注入也不会工作。\n\n***清单 2-52.***  用于触发 CDI 的空\
  \ beans.xml 文件\n\n```\n<beans xmlns=\" http://xmlns.jcp.org/xml/ns/javaee \"\n      \
  \ xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n       xsi:schemaLocation=\"\
  \ http://xmlns.jcp.org/xml/ns/javaee →\n                           http://xmlns.jcp.org/xml/ns/javaee/beans_1_1.xsd\
  \ \"\n       version=\"1.1\" bean-discovery-mode=\"all\">\n</beans>\n```\n\n使用 Maven\
  \ 编译和执行\n\n现在，在运行 `Main` 类和 `BookServiceIT` 集成测试之前，需要编译所有类。清单 2-53 中的 `pom.xml`\
  \ 声明了编译代码（`org.jboss.weld.se:weld-se` 包含 CDI API 和 Weld 实现）和运行测试（`junit:junit`）所需的所有依赖项。在\
  \ `maven-compiler-plugin` 中将版本设置为 1.7，明确指定要使用 Java SE 7（`<source> 1.7 </source>`）。请注意，我们使用\
  \ `exec-maven-plugin` 来能够通过 Maven 执行 `Main` 类。\n\n***清单 2-53.***  用于编译、运行和测试的 pom.xml\
  \ 文件\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\" http://maven.apache.org/POM/4.0.0\
  \ \" →\n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \" →\n        \
  \ xsi:schemaLocation=\" http://maven.apache.org/POM/4.0.0 →\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\
  \ \">\n  <modelVersion>4.0.0</modelVersion>\n\n<parent>\n    <groupId>org.agoncal.book.javaee7</groupId>\n\
      <artifactId>chapter02</artifactId>\n    <version>1.0</version>\n  </parent>\n\
  \n<groupId>org.agoncal.book.javaee7.chapter02</groupId>\n  <artifactId>chapter02-putting-together</artifactId>\n\
    <version>1.0</version>\n\n<dependencies>\n    <dependency>\n      <groupId>org.jboss.weld.se</groupId>\n\
        <artifactId> weld-se </artifactId>\n      <version>2.0.0</version>\n    </dependency>\n\
      <dependency>\n      <groupId>junit</groupId>\n      <artifactId> junit </artifactId>\n\
        <version>4.11</version>\n      <scope>test</scope>\n    </dependency>\n  </dependencies>\n\
  \n<build>\n\n<plugins>\n      <plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n\
          <artifactId> maven-compiler-plugin </artifactId>\n        <version>2.5.1</version>\n\
          <configuration>\n          <source> 1.7 </source>\n          <target>1.7</target>\n\
          </configuration>\n      </plugin>\n\n<plugin>\n        <groupId>org.codehaus.mojo</groupId>\n\
          <artifactId> exec-maven-plugin </artifactId>\n        <version>1.2.1</version>\n\
          <executions>\n          <execution>\n            <goals>\n              <goal>java</goal>\n\
              </goals>\n            <configuration>\n              <mainClass> org.agoncal.book.javaee7.chapter02.Main\
  \ </mainClass>\n            </configuration>\n          </execution>\n        </executions>\n\
        </plugin>\n\n<plugin>\n        <groupId>org.apache.maven.plugins</groupId>\n\
          <artifactId>maven-failsafe-plugin</artifactId>\n        <version>2.12.4</version>\n\
          <executions>\n          <execution>\n            <id>integration-test</id>\n\
              <goals>\n              <goal> integration-test </goal>\n              <goal>verify</goal>\n\
              </goals>\n          </execution>\n        </executions>\n      </plugin>\n\
      </plugins>\n  </build>\n</project>\n```\n\n要编译这些类，请在包含 `pom.xml` 文件的根目录中打开命令行，并输入以下\
  \ Maven 命令：\n\n```\n$ mvn compile\n```\n\n运行主类\n\n得益于清单 2-53 的 `pom.xml` 中配置的 `exec-maven-plugin`，我们现在可以非常轻松地执行清单\
  \ 2-51 中定义的 `Main` 类。在包含 `pom.xml` 文件的根目录中打开命令行，并输入以下 Maven 命令：\n\n```\n$ mvn exec:java\n\
  ```\n\n这将执行使用 `BookService` 创建 `Book` 的 `Main` 类。得益于注入，`Logger` 将显示以下输出：\n\n\n\n\
  ```\nInfo: Generated ISBN : 13-84356-1864341788\nBook{title='H2G2', price=12.5,\
  \ description='Geeky scifi Book', isbn='13-84356-1864341788'}\n```\n\n编写 BookServiceIT\
  \ 类\n\n清单 2-54 展示了测试 `BookService` Bean 的 `BookServiceIT` 类。它使用了与清单 2-51 中 `Main`\
  \ 类相同的 Weld 特定 API 来引导 CDI。一旦调用了 `BookService.createBook`，集成测试就会检查生成的编号是否以 `\"MOCK\"\
  ` 开头。这是因为集成测试使用了 `MockGenerator` 替代方案（而不是 `IsbnGenerator`）。\n\n***清单 2-54.***  BookServiceIT\
  \ 集成测试\n\n```\npublic class BookServiceIT {\n\n@Test\n  public void shouldCheckNumberIsMOCK\
  \ () {\n\nWeld weld = new Weld();\n    WeldContainer container = weld.initialize();\n\
  \nBookService bookService = container.instance(). select(BookService.class) .get();\n\
  \nBook book = bookService. createBook (\"H2G2\", 12.5f, \"Geeky scifi Book\");\n\
  \nassertTrue(book.getNumber().startsWith(\"MOCK\"));\n\nweld.shutdown();\n  }\n\
  }\n```\n\n在 beans.xml 中启用替代方案和拦截器以进行集成测试\n\n清单 2-54 中的 `BookServiceIT` 集成测试需要启用\
  \ `MockGenerator`。这可以通过为测试准备一个不同的 `beans.xml` 文件（清单 2-55）并启用替代方案（使用 `<alternatives>`\
  \ 标签）来实现。在测试环境中，你可能希望增加日志输出。你可以通过在 `beans.xml` 中启用 `LoggingInterceptor` 来实现这一点。\n\
  \n***清单 2-55.***  在 beans.xml 文件中启用替代方案和拦截器\n\n```\n<beans xmlns=\" http://xmlns.jcp.org/xml/ns/javaee\
  \ \"\n       xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n       xsi:schemaLocation=\"\
  \ http://xmlns.jcp.org/xml/ns/javaee →\n       http://xmlns.jcp.org/xml/ns/javaee/beans_1_1.xsd\
  \ \"\n       version=\"1.1\" bean-discovery-mode=\"all\">\n  < alternatives >\n\
      <class>org.agoncal.book.javaee7.chapter02\\. MockGenerator </class>\n  </alternatives>\n\
    < interceptors >\n    <class>org.agoncal.book.javaee7.chapter02\\. LoggingInterceptor\
  \ </class>\n  </interceptors>\n</beans>\n```\n\n运行集成测试\n\n要使用 Maven Failsafe 插件（在清单\
  \ 2-53 的 `pom.xml` 中定义）执行集成测试，请输入以下 Maven 命令：\n\n```\n$ mvn integration-test\n```\n\
  \n`BookServiceIT` 应运行一个成功的集成测试。你还应该看到几条关于方法进入和退出的日志。\n\n总结\n\n在本章中，你学习了 POJO、托管\
  \ Bean 和 CDI Bean 之间的区别，以及哪些服务适用于哪种组件模型。依赖注入（JSR 330）以及上下文和依赖注入（JSR 299）都为 Java\
  \ EE 带来了标准、可移植且类型安全的依赖注入支持。CDI 增加了额外功能，例如作用域和上下文，还增强了拦截器、装饰器和事件。事实上，CDI 原生实现了多种设计模式，如桥接模式（通过替代方案）、观察者模式（通过事件）、装饰器模式、工厂模式（通过生产者），当然还有拦截和注入。\n\
  \n拦截器是 Java EE 中类似 AOP 的机制，允许容器在你的应用程序中调用横切关注点。拦截器易于使用且功能强大，可以链接在一起或按优先级排序，以将多个关注点应用于你的\
  \ Bean。\n\nCDI 作为一个垂直规范，被用于其他 Java EE 规范中。事实上，本书接下来的章节将以某种方式使用这些 CDI 服务。\n\n第 3\
  \ 章\n\n![image](img/frontdot.jpg)\n\nBean Validation\n\n上一章讨论了上下文和依赖注入，它已成为 Java\
  \ EE 中一个核心且通用的规范。它解决了开发人员日常工作中反复出现的问题（注入、替代方案、原型、生产者……）。验证数据也是一项常见任务，它贯穿于当今应用程序的多个（甚至全部）层（从表示层到数据库）。由于处理、存储和检索有效数据对应用程序至关重要，因此每一层都以其自己的方式定义验证规则。通常，相同的验证逻辑会在每一层中实现，这既耗时、难以维护，又容易出错。为了避免在各层中重复这些验证，开发人员常常将验证逻辑直接捆绑到领域模型中，用验证代码（实际上是关于类本身的元数据）污染了领域类。\n\
  \nBean Validation 通过允许开发人员编写一次约束，在任何层中使用并验证它，从而解决了代码重复和领域类污染的问题。Bean Validation\
  \ 用纯 Java 代码实现约束，然后通过注解（元数据）来定义它。该注解随后可用于你的 Bean、属性、构造函数、方法参数和返回值。Bean Validation\
  \ 以一种非常优雅且强大的方式，提供了一个简单的 API，使开发人员能够编写和重用业务逻辑约束。\n\n本章将演示为什么验证对应用程序至关重要，以及为什么它需要在各层之间重复。你将学习如何编写约束：从聚合现有约束到开发你自己的约束。你将看到如何将这些约束应用于你的应用程序，从表示层一直到业务模型层。然后，你将学习如何验证这些约束（无论是在\
  \ Java EE 容器内还是容器外）。\n\n理解约束和验证\n\n应用程序开发人员大部分时间都在确保他们处理和存储的数据是有效的。他们编写数据约束，将这些约束应用于其逻辑和模型，并确保不同层以一致的方式验证这些约束。这意味着要在他们的客户端应用程序（例如，如果是开发\
  \ Web 应用程序，则为 Web 浏览器）、表示层、业务逻辑层、业务模型（也称为领域模型）、数据库模式以及某种程度上的互操作层（参见图 3-1）中应用这些约束。当然，为了保持一致性，他们必须使所有这些规则在各层和技术之间保持同步。\n\
  \n![9781430246268_Fig03-01.jpg](img/9781430246268_Fig03-01.jpg)\n\n图 3-1. 验证发生在多个层中\n\
  \n在异构应用程序中，开发人员必须处理多种技术和语言。因此，即使是一个简单的验证规则，例如“此数据项是必填的且不能为 null”，也必须以不同的方式在 Java、JavaScript、数据库模式或\
  \ XML 模式中表达。\n\n应用程序\n\n无论你开发的是单层还是 n 层应用程序，你仍然需要确保处理的数据是正确的：例如，如果采购订单的送货地址为空，你将永远无法将商品运送给客户。在\
  \ Java 中，你通常会编写代码来检查条目是否有效（`if order.getDeliveryAddress() == null`），并抛出异常或要求反馈以进行更正。应用程序级别的验证能够提供更精细的控制，并允许更复杂的约束（这个日期是法国的公共假日吗？客户的年度总账单金额是否高于平均值？）。\n\
  \n应用程序级别的验证可能存在于多个位置，以确保数据是正确的。\n\n\n\n*   **表示层**：在此层中，你需要验证数据，因为这些数据可能来自多个客户端（例如网页浏览器、允许发送\
  \ HTTP 命令的命令行工具如 cURL，或原生应用程序）。同时，你也希望为用户提供更快速的反馈。\n*   **业务逻辑层**：此层负责编排对内部和外部服务以及领域模型的调用……因此，处理过的数据必须是有效的。\n\
  *   **业务模型层**：此层通常将领域模型映射到数据库，因此在存储数据之前，你需要对其进行验证。\n\n在复杂的应用程序中，你会在多个层中重复完全相同的约束，从而导致大量的代码重复。\n\
  \n数据库\n\n归根结底，你真正想要的是在数据库中存储有效的数据，以便后续处理。关系型数据库通过使用模式来强制实施约束。*数据定义语言*（DDL）使用一种语法来定义和约束数据库结构。然后，你可以确保某列中的数据不能为空（`NOT\
  \ NULL`）、必须是数值（`INTEGER`），或者必须有最大长度（`VARCHAR(20)`）。在最后一个例子中，尝试向该列插入一个 20 个字符长的字符串将会失败。\n\
  \n然而，让数据库处理验证有几个缺点：它会产生性能开销，并且错误消息会脱离上下文。无效数据必须穿越所有应用层，才能到达远程数据库服务器，然后服务器处理验证并返回错误。在数据库层面，约束只感知数据，而不感知用户正在做什么。因此，错误消息无法感知上下文，也无法非常明确。这就是为什么我们倾向于在应用程序或客户端中更早地验证数据。\n\
  \n客户端\n\n在客户端进行数据验证非常重要，这样用户可以快速得知自己输入了错误的数据。这减少了与服务器的往返次数，并通过早期错误反馈提供了更好的用户体验。在开发可能使用低带宽网络连接的移动应用程序时，这一点至关重要。\n\
  \n例如，在典型的 Web 应用程序中，JavaScript 在浏览器中执行简单的字段级验证，而服务器端层则用于更复杂的业务规则验证。用 Java（Swing、Android\
  \ 移动应用程序）编写的原生应用程序可以利用 Java 语言的全部能力来编写和验证数据。\n\n互操作性\n\n企业应用程序通常需要与外部合作伙伴和外部系统交换数据。这些企业对企业（B2B）应用程序接收各种格式的数据，对其进行处理、存储，然后发送回合作伙伴。验证自定义格式可能是一项复杂且昂贵的任务。如今，XML\
  \ 是异构系统之间交换数据的首选语言。就像数据库使用 DDL 定义其结构一样，XML 可以使用 XSD（XML Schema Definition）来约束 XML\
  \ 文档。XSD 表达了一组规则，XML 文档必须符合这些规则才能被视为根据该模式有效。XML 解析和验证是一项常见任务，使用 Java 框架很容易实现（更多关于\
  \ XSD 和 XML 验证的内容，请参见第 16 章）。\n\nBean Validation 规范概述\n\n如你所见，验证遍布各个层（从客户端到数据库）和技术（JavaScript、Java、DDL、XSD）。这意味着开发人员必须在多个层和不同的语言中重复代码。这种常见做法耗时、容易出错，并且随着时间的推移更难维护。此外，其中一些约束使用得非常频繁，以至于可以被视为标准（检查值、大小、范围……）。能够将这些约束集中在一个地方并在各层之间共享，将会非常有用。这就是\
  \ Bean Validation 发挥作用的地方。\n\nBean Validation 主要针对 Java，尽管也有人尝试集成其他语言，如 DDL 或 XSD。它允许你编写一次约束，并在任何应用层中使用它。Bean\
  \ Validation 是层无关的，这意味着同一个约束可以从表示层一直使用到业务模型层。Bean Validation 既可用于服务器端应用程序，也可用于富\
  \ Java 客户端图形界面（Swing、Android……）。它被视为 JavaBeans 对象模型的扩展，因此可以作为其他规范的核心组件使用（正如你将在本书大部分章节中看到的那样）。\n\
  \nBean Validation 允许你在应用程序中应用已定义的通用约束，也可以编写自己的约束，并用它们来验证 Bean、属性、构造函数、方法返回类型和参数。该\
  \ API 非常易于使用且灵活，因为它鼓励你使用注解来定义约束（也可以使用 XML）。\n\nBean Validation 简史\n\n自 Java 诞生以来，开发人员就一直在约束和验证他们的业务模型。自制的代码和框架催生了一些实践，这些实践在早期的开源项目中得以实现。例如，早在\
  \ 2000 年，著名的 Web MVC 框架 Struts 就已经实现了用户输入验证。但我们需要等待一段时间，才能出现专门用于 Java（而不仅仅是 Web\
  \ 交互）的验证框架。最著名的可能是 Apache Commons 的 Commons Validator 和 Hibernate Validator。其他还有\
  \ iScreen、OVal，以及无处不在的 Spring 框架，它自带验证包。\n\n受这些验证框架的启发，Bean Validation 1.0（JSR 303）标准化了数据验证，并于\
  \ 2009 年被纳入 Java EE 6。\n\nBean Validation 1.1 的新特性\n\n如今，Bean Validation 1.1（JSR\
  \ 349）已集成到 Java EE 7 中。这个次要版本带来了许多新特性，并改进了现有特性。主要的新特性如下：\n\n*   约束现在可以应用于方法参数和返回值。因此，Bean\
  \ Validation 可用于描述和验证给定方法的契约（前置条件和后置条件）。\n*   约束也可以应用于构造函数。\n*   新增了一个 API 来获取关于约束和受约束对象的元数据信息。\n\
  *   增加了与上下文和依赖注入的集成（现在可以在验证器中实现注入）。\n\n表 3-1 列出了当前 Bean Validation 1.1 中定义的主要包。\n\
  \n表 3-1. 主要 Bean Validation 包\n\n| 包 | 描述 |\n| --- | --- |\n| `javax.validation`\
  \ | 此包包含核心的 Bean Validation API |\n| `javax.validation.bootstrap` | 用于引导 Bean Validation\
  \ 并创建与提供者无关的配置的类 |\n| `javax.validation.constraints` | 此包包含所有内置约束 |\n| `javax.validation.groups`\
  \ | 默认的 Bean Validation 组 |\n| `javax.validation.metadata` | 所有已定义约束的元数据仓库和查询 API\
  \ |\n| `javax.validation.spi` | 定义验证引导机制与提供者引擎之间契约的 API |\n\n参考实现\n\nHibernate Validator\
  \ 是 Bean Validation 的开源参考实现。该项目最初于 2005 年由 JBoss 在 Hibernate Annotations 中启动，2007\
  \ 年成为一个独立项目，并于 2009 年成为参考实现（Hibernate Validator 4）。如今，Hibernate Validator 5 实现了\
  \ Bean Validation 1.1，并增加了特定功能，包括快速失败模式（一旦发生第一个约束违规，立即从当前验证返回）、程序化约束配置 API 以及额外的内置约束。\n\
  \n\n\n在撰写本书时，Hibernate Validator 是唯一符合 Bean Validation 1.1 规范的实现。Apache BVal 实现了\
  \ Bean Validation 1.0，目前正在进行 1.1 认证。Oval 并未实现完整的 Bean Validation 规范，但能够处理 Bean Validation\
  \ 的约束。\n\n编写约束\n\n到目前为止，我讨论了应用于应用程序多个层次的约束，这些约束可能用不同的语言和技术编写，但我也提到了验证代码的重复问题。那么，使用\
  \ Bean Validation 将约束应用于 Java 类到底有多难呢？清单 3-1 展示了向业务模型添加约束是多么简单。\n\n***清单 3-1.***\
  \  一个带有约束注解的 Book POJO\n\n```\npublic class Book {\n\n@NotNull\n  private String\
  \ title;\n  @NotNull @Min(2)\n  private Float price;\n  @Size(max = 2000)\n  private\
  \ String description;\n  private String isbn;\n  private Integer nbOfPage;\n\n//\
  \ 构造方法、getter、setter\n}\n```\n\n清单 3-1 展示了带有属性、构造方法、getter、setter 和注解的 `Book` 类。其中一些属性使用了内置约束进行注解，例如\
  \ `@NotNull`、`@Min` 和 `@Size`。这向验证运行时表明，书的 `title` 不能为空，`description` 不能超过 2000\
  \ 个字符。如你所见，一个属性可以附加多个约束（例如 `price` 既不能为空，其值也不能低于 2）。\n\n约束的剖析\n\n约束由约束注解和一系列约束验证实现共同定义。约束注解应用于类型、方法、字段，或者在组合情况下应用于其他约束注解。在大多数\
  \ Java EE 规范中，开发者使用已定义的注解（例如 `@Entity`、`@Stateless` 和 `@Path`）。但在 CDI（你在前一章中已了解）和\
  \ Bean Validation 中，开发者需要编写自己的注解。因为 Bean Validation 中的约束由以下部分组成：\n\n*   一个定义约束的注解。\n\
  *   一系列类，这些类实现了针对给定类型（例如 `String`、`Integer`、`MyBean`）的约束算法。\n\n注解在领域模型上表达约束，而验证实现则决定给定值是否通过约束。\n\
  \n约束注解\n\nJavaBean 上的约束通过一个或多个注解来表达。如果一个注解的保留策略包含 `RUNTIME`，并且该注解本身被 `javax.validation.Constraint`（该注解指向其约束验证实现列表）所注解，则该注解被视为一个约束。清单\
  \ 3-2 展示了 `NotNull` 约束注解。如你所见，`@Constraint(validatedBy = {})` 指向实现类 `NotNullValidator`。\n\
  \n***清单 3-2.***  NotNull 约束注解\n\n```\n@Target({METHOD, FIELD, ANNOTATION_TYPE, CONSTRUCTOR,\
  \ PARAMETER})\n@Retention(RUNTIME)\n@Documented\n@Constraint (validatedBy = NotNullValidator\
  \ .class)\npublic @interface NotNull {\n\nString message () default \"{javax.validation.constraints.NotNull.message}\"\
  ;\n\nClass<?>[] groups () default {};\n\nClass<? extends Payload>[] payload () default\
  \ {};\n}\n```\n\n约束注解只是普通的注解，因此它们必须定义一些元注解。\n\n*   `@Target({METHOD, FIELD, ...})`：指定该注解可以使用的目标（稍后会详细介绍）。\n\
  *   `@Retention(RUNTIME)`：指定注解的操作方式。必须至少使用 `RUNTIME`，以允许提供者在运行时检查你的对象。\n*   `@Constraint(validatedBy\
  \ = NotNullValidator.class)`：指定封装了验证算法的类（在约束聚合的情况下为零个，或者一个类列表）。\n*   `@Documented`：这个可选的元注解指定该注解是否会被包含在\
  \ Javadoc 中。\n\n除了这些常见的元注解之外，Bean Validation 规范要求每个约束注解定义三个额外的属性。\n\n*   `message`：此属性（通常默认为一个键）使得约束在验证不通过时能够返回国际化的错误消息。\n\
  *   `groups`：组通常用于控制约束的评估顺序，或执行部分验证。\n*   `payload`：此属性用于将元数据信息与约束关联起来。\n\n一旦你的约束定义了所有必需的元注解和元素，你就可以添加任何你需要的特定参数。例如，一个验证字符串长度的约束可以使用名为\
  \ `length` 的属性来指定最大长度。\n\n约束实现\n\n约束由注解和零个或多个实现类共同定义。实现类由 `@Constraint` 的 `validatedBy`\
  \ 元素指定（如清单 3-2 所示）。清单 3-3 展示了 `@NotNull` 注解的实现类。如你所见，它实现了 `ConstraintValidator`\
  \ 接口，并使用泛型传递注解的名称（`NotNull`）以及该注解应用的类型（此处为 `Object`）。\n\n***清单 3-3.***  NotNull\
  \ 约束实现\n\n```\npublic class NotNullValidator implements ConstraintValidator<NotNull,\
  \ Object> {\n\npublic void initialize ( NotNull parameters) {\n  }\n\npublic boolean\
  \ isValid ( Object object, ConstraintValidatorContext context) {\n    return object\
  \ != null;\n  }\n}\n```\n\n`ConstraintValidator` 接口定义了两个需要由具体类实现的方法。\n\n*   `initialize`：此方法由\
  \ Bean Validation 提供者在任何使用该约束之前调用。通常在此处初始化约束参数（如果有的话）。\n*   `isValid`：这是实现验证算法的地方。每次验证给定值时，Bean\
  \ Validation 提供者都会评估此方法。如果值无效则返回 false，否则返回 true。`ConstraintValidatorContext` 对象携带了验证约束的上下文中的可用信息和操作（稍后你会看到）。\n\
  \n约束实现针对给定类型执行给定注解的验证。在清单 3-3 中，`@NotNull` 约束的类型是 `Object`（这意味着该约束可用于任何数据类型）。但你可以有一个约束注解，根据数据类型的不同而具有不同的验证算法。例如，你可以检查\
  \ `String` 的最大字符数，也可以检查 `BigDecimal` 的最大位数，或者 `Collection` 中的最大元素数量。在下面的代码中，请注意对于同一个注解（`@Size`），针对不同的数据类型（`String`、`BigDecimal`\
  \ 和 `Collection<?>`）有多个实现：\n\n```\npublic class SizeValidatorForString     implements<Size,\
  \ String >        {...}\npublic class SizeValidatorForBigDecimal implements<Size,\
  \ BigDecimal >    {...}\npublic class SizeValidatorForCollection implements<Size,\
  \ Collection<?> > {...}\n```\n\n应用约束\n\n\n\n一旦你拥有了注解和实现，就可以对给定的元素类型（属性、getter 方法、构造器、参数、返回值、Bean、接口或注解）应用约束。这是开发者必须做出的设计决策，并通过使用`@Target(ElementType.*)`元注解来实现（参见清单\
  \ 3-2）。\n\n*   `FIELD` 用于受约束的属性，\n*   `METHOD` 用于受约束的 getter 方法和受约束的方法返回值，\n*  \
  \ `CONSTRUCTOR` 用于受约束的构造器返回值，\n*   `PARAMETER` 用于受约束的方法和构造器参数，\n*   `TYPE` 用于受约束的\
  \ Bean、接口和超类，以及\n*   `ANNOTATION_TYPE` 用于组合其他约束的约束。\n\n如你所见，约束注解可以应用于 Java 中定义的大多数元素类型。只有静态字段和静态方法无法通过\
  \ Bean Validation 进行验证。清单 3-4 展示了一个`Order`类，它在类本身、属性、构造器以及一个业务方法上使用了约束注解。\n\n***清单\
  \ 3-4.***  一个在多种元素类型上使用约束的 POJO\n\n```\n@ChronologicalDates\npublic class Order\
  \ {\n\n@NotNull @Pattern(regexp = \"[C,D,M][A-Z][0-9]*\")\n  private String orderId;\n\
    private Date creationDate;\n  @Min(1)\n  private Double totalAmount;\n  private\
  \ Date paymentDate;\n  private Date deliveryDate;\n  private List<OrderLine> orderLines;\n\
  \npublic Order() {\n  }\n\npublic Order( @Past Date creationDate) {\n    this.creationDate\
  \ = creationDate;\n  }\n\npublic @NotNull Double calculateTotalAmount( @GreaterThanZero\
  \ Double changeRate) {\n    // ...\n  }\n\n// Getters and setters\n}\n```\n\n在清单\
  \ 3-4 中，`@ChronologicalDates`是一个类级别的约束，它基于`Order`类的多个属性（在此例中，它确保`creationDate`、`paymentDate`和`deliveryDate`按时间顺序排列）。`orderId`属性有两个约束：它不能为\
  \ null（`@NotNull`），并且必须遵循一个正则表达式模式（`@Pattern`）。`Order`构造器确保`creationDate`参数必须是过去的时间。`calculateTotalAmount`方法（用于计算采购订单的总金额）检查`changeRate`是否满足`@GreaterThanZero`，并且返回的金额不为\
  \ null。\n\n![image](img/sq.jpg) **注意** 到目前为止，我展示的示例都是对属性进行注解，但你也可以对 getter 方法进行注解。你只需在属性或\
  \ getter 方法上定义约束，但不能同时在两者上定义。最好保持一致，始终在属性上或始终在 getter 方法上使用注解。\n\n内置约束\n\nBean Validation\
  \ 是一个规范，允许你编写自己的约束并对其进行验证。但它也附带了一些常见的内置约束。你在前面的示例中已经看到了一些，但表 3-2 给出了所有内置约束的详尽列表（即，你可以在代码中开箱即用，无需开发任何注解或实现类的所有约束）。所有内置约束都定义在`javax.validation.constraints`包中。\n\
  \n表 3-2. 内置约束注解详尽列表\n\n| 约束 | 接受类型 | 描述 |\n| --- | --- | --- |\n| `AssertFalseAssertTrue`\
  \ | `Boolean, boolean` | 被注解的元素必须为 false 或 true |\n| `DecimalMaxDecimalMin` | `BigDecimal,\
  \ BigInteger, CharSequence, byte, short, int, long, 及其各自的包装类` | 元素必须大于或小于指定值 |\n\
  | `FuturePast` | `Calendar, Date` | 被注解的元素必须是未来或过去的日期 |\n| `MaxMin` | `BigDecimal,\
  \ BigInteger, byte, short, int, long, 及其包装类` | 元素必须大于或小于指定值 |\n| `NullNotNull` |\
  \ `Object` | 被注解的元素必须为 null 或不为 null |\n| `Pattern` | `CharSequence` | 元素必须匹配指定的正则表达式\
  \ |\n| `Digits` | `BigDecimal, BigInteger, CharSequence, byte, short, int, long,\
  \ 及其各自的包装类` | 被注解的元素必须是在可接受范围内的数字 |\n| `Size` | `Object[], CharSequence,Collection<?>,\
  \ Map<?, ?>` | 元素大小必须在指定的边界之间 |\n\n定义你自己的约束\n\n正如你刚才所见，Bean Validation API 提供了标准的内置约束，但它们无法满足你应用程序的所有需求。因此，该\
  \ API 允许你开发和使用自己的业务约束。有几种方法可以创建你自己的约束（从聚合现有约束到从头编写一个），并且有不同的风格（通用或类级别）。\n\n约束组合\n\
  \n创建新约束的一种简单方法是通过聚合已有的约束，而无需实现类。如果现有约束具有`@Target(ElementType.ANNOTATION_TYPE)`，这意味一个注解可以应用于另一个注解上，那么这样做就非常容易。这被称为约束组合，它允许你创建更高级别的约束。\n\
  \n清单 3-5 展示了如何仅使用 Bean Validation API 的内置约束来创建一个`Email`约束。这个`Email`约束确保电子邮件地址不为\
  \ null（`@NotNull`），最小长度为 7 个字符（`@Size(min = 7)`），并且遵循一个复杂的正则表达式（`@Pattern`）。一个组合约束还必须定义`message`、`groups`和`payload`属性。注意，这里没有实现类（`validatedBy\
  \ = {}`）。\n\n***清单 3-5.***  由其他约束构成的电子邮件约束\n\n```\n@NotNull\n@Size(min = 7)\n@Pattern(regexp\
  \ = \"[a-z0-9!#$%&'*+/=?^_`{|}∼-]+(?:\\\\.[a-z0-9!#$%&'*+/=?^_`{|}∼-]+)*\" →\n        +\
  \ \"@(?:a-z0-9?\\\\.)+a-z0-9?\")\n@Constraint( validatedBy = {} )\n@Target({METHOD,\
  \ FIELD, ANNOTATION_TYPE, CONSTRUCTOR, PARAMETER})\n@Retention(RetentionPolicy.RUNTIME)\n\
  public @interface Email {\n\nString message() default \"Email address doesn't look\
  \ good\";\n  Class<?>[] groups() default {};\n  Class<? extends Payload>[] payload()\
  \ default {};\n}\n```\n\n每个内置约束（`@NotNull`、`@Size`和`@Pattern`）都已经有自己的错误消息（`message()`元素）。这意味着，如果你有一个为\
  \ null 的电子邮件地址，清单 3-5 中的约束在验证时会抛出`@NotNull`的错误消息，而不是定义的那个（“Email address doesn't\
  \ look good”）。你可能希望为`Email`约束使用单一的错误消息，而不是多个。为此，你可以添加`@ReportAsSingleViolation`注解（稍后你将在清单\
  \ 3-24 中看到）。如果这样做，组合约束的评估将在第一个失败的约束处停止，并生成并返回对应于组合约束（此处为`@Email`约束）的错误报告。\n\n\n\n\
  约束组合非常有用，因为它可以避免代码重复，并促进更原始约束的重用。我们鼓励创建简单的约束，而不是将它们合并起来形成更复杂的验证规则。\n\n![image](img/sq.jpg)\
  \ **注意**  创建新约束时，请务必为其赋予一个有意义的名称。精心选择的注解名称将使约束在代码中更具可读性。\n\n通用约束\n\n简单的约束组合是一种良好的实践，但通常还不够。通常，您需要实现复杂的验证算法：检查数据库中的值、将某些验证委托给辅助类等。这时，您就需要为约束注解添加一个实现类。\n\
  \n清单 3-6 展示了一个 POJO，它表示到 CD-BookStore 项目服务器的网络连接。该 POJO 有多个 String 类型的属性，都代表一个 URL。您希望\
  \ URL 具有有效的格式，甚至设置特定的协议（例如，http、ftp...）、主机和/或端口号。自定义的 `@URL` 约束确保 `ItemServerConnection`\
  \ 类的不同 String 属性符合 URL 格式。例如，`resourceURL` 属性可以是任何类型的有效 URL（例如，`file://` `www.cdbookstore.com/item/123`）。另一方面，您希望约束\
  \ `itemURL` 属性，使其具有 `http` 协议且主机名以 `www.cdbookstore.com` 开头（例如，`http://www.cdbookstore.com/book/h2g2`）。\n\
  \n***清单 3-6.***  用于多个属性的 URL 约束注解\n\n```\npublic class ItemServerConnection {\n\n\
  @URL\n  private String resourceURL;\n  @NotNull @URL(protocol = \"http\", host =\
  \ \"www.cdbookstore.com\")\n  private String itemURL;\n  @URL(protocol = \"ftp\"\
  , port = 21)\n  private String ftpServerURL;\n  private Date lastConnectionDate;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n要创建这样一个自定义的 URL 约束，首先要做的是定义一个注解。清单 3-7 展示了该注解，它遵循了\
  \ Bean Validation 的所有前提条件（`@Constraint` 元注解、`message`、`groups` 和 `payload` 属性），同时还添加了特定的属性：`protocol`、`host`\
  \ 和 `port`。这些属性映射到注解元素名称（例如，`@URL(protocol = \"http\")`）。约束可以使用任何数据类型的任何属性。另请注意，这些属性具有默认值，例如协议和主机为空字符串，端口号为\
  \ -1。\n\n***清单 3-7.***  URL 约束注解\n\n```\n@Constraint(validatedBy = { URLValidator.class\
  \ })\n@Target({METHOD, FIELD, ANNOTATION_TYPE, CONSTRUCTOR, PARAMETER})\n@Retention(RUNTIME)\n\
  public @interface URL {\n\nString message() default \"Malformed URL\";\n  Class<?>[]\
  \ groups() default {};\n  Class<? extends Payload>[] payload() default {};\n\nString\
  \ protocol () default \"\";\n  String host () default \"\";\n  int port () default\
  \ -1;\n}\n```\n\n清单 3-7 本可以聚合已有的约束，例如 `@NotNull`。但约束组合与通用约束之间的主要区别在于，通用约束在 `validatedBy`\
  \ 属性中声明了一个实现类（此处它引用的是 `URLValidator.class`）。\n\n清单 3-8 展示了 `URLValidator` 实现类。如您所见，它实现了\
  \ `ConstraintValidator` 接口，因此也实现了 `initialize` 和 `isValid` 方法。需要注意的重要一点是，`URLValidator`\
  \ 拥有注解中定义的三个属性（`protocol`、`host` 和 `port`），并在 `initialize(URL url)` 方法中对它们进行初始化。该方法在验证器实例化时被调用。它接收约束注解（此处为\
  \ `URL`）作为参数，以便提取用于验证的值（例如，清单 3-6 中 `itemURL` 的 `protocol` 属性值是字符串 `\"http\"`）。\n\
  \n***清单 3-8.***  URL 约束实现\n\n```\npublic class URLValidator implements ConstraintValidator<URL,\
  \ String> {\n\nprivate String protocol ;\n  private String host ;\n  private int\
  \ port ;\n\npublic void initialize (URL url) {\n    this.protocol = url.protocol();\n\
  \    this.host = url.host();\n    this.port = url.port();\n  }\n\npublic boolean\
  \ isValid (String value , ConstraintValidatorContext context) {\n    if (value ==\
  \ null || value.length() == 0) {\n      return true;\n    }\n\njava.net.URL url;\n\
  \    try {\n      // 将其转换为 java.net.URL 以检查其格式是否有效\n      url = new java.net.URL(\
  \ value );\n    } catch (MalformedURLException e) {\n      return false;\n    }\n\
  \n// 检查 protocol 属性是否具有有效值\n    if ( protocol != null && protocol.length() > 0 &&\
  \ !url.getProtocol().equals(protocol)) {\n      return false;\n    }\n\nif ( host\
  \ != null && host.length() > 0 && !url.getHost().startsWith(host)) {\n      return\
  \ false;\n    }\n\nif ( port != -1 && url.getPort() != port) {\n      return false;\n\
  \    }\n\nreturn true;\n  }\n}\n```\n\n`isValid` 方法实现了清单 3-8 中所示的 URL 验证算法。`value`\
  \ 参数包含要验证的对象的值（例如，`file://` `www.cdbookstore.com/item/123`）。`context` 参数封装了关于验证执行上下文的信息（稍后会详细介绍）。返回值是一个\
  \ `boolean` 值，指示验证是否成功。\n\n清单 3-8 中验证算法的主要任务是将传入的 `value` 转换为 `java.net.URL`，并查看该\
  \ URL 格式是否正确。然后，该方法检查 `protocol`、`host` 和 `port` 属性是否也有效。如果这些属性中的任何一个无效，则该方法返回 false。正如您稍后将在本章的“验证约束”部分中看到的，Bean\
  \ Validation 提供程序将使用此布尔值来创建 `ConstraintViolation` 列表。\n\n请注意，`isValid` 方法将 null\
  \ 视为有效值（`if (value == null ... return true)`）。Bean Validation 规范建议将 null 视为有效值，这是一种良好的实践。这样，您就不会重复\
  \ `@NotNull` 约束的代码。您需要同时使用 `@URL` 和 `@NotNull` 约束来表达您希望某个值代表一个有效且非空的 URL（例如清单 3-6\
  \ 中的 `itemURL` 属性）。\n\n\n\n类签名定义了约束所关联的数据类型。在清单 3-8 中，`URLValidator` 是为 String 类型实现的（`ConstraintValidator<URL`,\
  \ `String>`）。这意味着，如果你将 `@URL` 约束应用于不同的类型（例如，应用于 `lastConnectionDate` 属性），在验证时将会收到\
  \ `javax.validation.UnexpectedTypeException` 异常，因为找不到适用于 `java.util.Date` 类型的验证器。如果你需要将一个约束应用于多种数据类型，要么在可能的情况下使用超类（例如，我们可以通过编写\
  \ `ConstraintValidator<URL`, `CharSequence>` 为 `CharSequence` 而不是 String 定义 `URLValidator`），要么在验证算法不同时，拥有多个实现类（分别用于\
  \ `String`、`CharBuffer`、`StringBuffer`、`StringBuilder`……）。\n\n![image](img/sq.jpg) **注意**  约束实现被视为一个受管\
  \ Bean。这意味着你可以使用所有受管 Bean 的服务，例如注入任何辅助类、EJB，甚至注入 `EntityManager`（更多内容将在后续章节中介绍）。你还可以拦截或装饰\
  \ `initialize` 和 `isValid` 方法，甚至使用生命周期管理（`@PostConstruct` 和 `@PreDestroy`）。\n\n\
  同一目标的多个约束\n\n有时，对同一目标多次应用具有不同属性或分组的相同约束会很有用（稍后你将看到）。一个常见的例子是 `@Pattern` 约束，它验证其目标是否与指定的正则表达式匹配。清单\
  \ 3-9 展示了如何对同一属性应用两个正则表达式。多个约束使用 AND 运算符；这意味着 `orderId` 属性需要同时遵循这两个正则表达式才能通过验证。\n\
  \n***清单 3-9.***  一个在同一属性上应用多个 Pattern 约束的 POJO\n\n```\npublic class Order {\n\n\
  @Pattern.List({\n          @Pattern(regexp = \"[C,D,M][A-Z][0-9]*\"),\n          @Pattern(regexp\
  \ = \".[A-Z].*?\")\n  })\n  private String orderId;\n  private Date creationDate;\n\
    private Double totalAmount;\n  private Date paymentDate;\n  private Date deliveryDate;\n\
    private List<OrderLine> orderLines;\n\n// 构造方法、getter、setter\n}\n```\n\n为了能够对同一目标多次应用相同的约束，约束注解需要定义其自身的数组。Bean\
  \ Validation 以特殊方式处理约束数组：数组中的每个元素都被当作一个常规约束来处理。清单 3-10 展示了 `@Pattern` 约束注解，它定义了一个内部接口（任意命名为\
  \ `List`），其中包含一个 `Pattern[]` 元素。该内部接口必须具有 `RUNTIME` 保留策略，并且必须使用与原始约束相同的目标集（此处为 `METHOD`、`FIELD`、`ANNOTATION_TYPE`、`CONSTRUCTOR`、`PARAMETER`）。\n\
  \n***清单 3-10.***  定义 Pattern 列表的 Pattern 约束\n\n```\n@Target({METHOD, FIELD, ANNOTATION_TYPE,\
  \ CONSTRUCTOR, PARAMETER})\n@Retention(RUNTIME)\n@Constraint(validatedBy = PatternValidator.class)\n\
  public @interface Pattern {\n\nString regexp();\n  String message() default \"{javax.validation.constraints.Pattern.message}\"\
  ;\n  Class<?>[] groups() default {};\n  Class<? extends Payload>[] payload() default\
  \ {};\n\n// 在同一元素上定义多个 @Pattern 注解\n  @Target({METHOD, FIELD, ANNOTATION_TYPE, CONSTRUCTOR,\
  \ PARAMETER})\n  @Retention(RUNTIME)\n  @interface List {\n    Pattern[] value();\n\
    }\n}\n```\n\n![image](img/sq.jpg) **注意**  当你开发自己的约束注解时，应添加其对应的多值注解。Bean Validation\
  \ 规范并未强制要求，但强烈建议定义一个名为 `List` 的内部接口。\n\n类级别约束\n\n到目前为止，你已经看到了开发应用于属性（或 getter 方法）的约束的不同方法。但你也可以为整个类创建约束。其思想是表达一个基于给定类的多个属性的约束。\n\
  \n清单 3-11 展示了一个采购订单类。该采购订单遵循特定的业务生命周期：它在系统中创建，由客户付款，然后交付给客户。该类通过拥有相应的 `creationDate`、`paymentDate`\
  \ 和 `deliveryDate` 来跟踪所有这些事件。类级别注解 `@ChronologicalDates` 用于检查这三个日期是否按时间顺序排列。\n\n\
  ***清单 3-11.***  检查时间顺序的类级别约束\n\n```\n@ChronologicalDates\npublic class Order {\n\
  \nprivate String orderId;\n  private Double totalAmount;\n  private Date creationDate\
  \ ;\n  private Date paymentDate ;\n  private Date deliveryDate ;\n  private List<OrderLine>\
  \ orderLines;\n  // 构造方法、getter、setter\n}\n```\n\n清单 3-12 展示了 `@ChronologicalDates`\
  \ 约束的实现。与你目前看到的约束一样，它实现了 `ConstraintValidator` 接口，其泛型类型为 `Order`。`isValid` 方法检查这三个日期是否按时间顺序排列，如果是则返回\
  \ true。\n\n***清单 3-12.***  ChronologicalDates 类级别约束的实现\n\n```\npublic class ChronologicalDatesValidator\
  \ implements ConstraintValidator< ChronologicalDates , Order > {\n\n@Override\n\
    public void initialize(ChronologicalDates constraintAnnotation) {\n  }\n\n@Override\n\
    public boolean isValid( Order order, ConstraintValidatorContext context) {\n    return\
  \ order. getCreationDate ().getTime() < order. getPaymentDate ().getTime() && →\n\
             order. getPaymentDate ().getTime()  < order. getDeliveryDate ().getTime();\n\
    }\n}\n```\n\n方法级别约束\n\n方法级别约束是在 Bean Validation 1.1 中引入的。这些是声明在方法以及构造方法上的约束（getter\
  \ 方法不被视为受约束的方法）。这些约束可以添加到方法参数（称为参数约束）或方法本身（称为返回值约束）。通过这种方式，Bean Validation 可用于描述和验证应用于给定方法或构造方法的契约。这实现了著名的*契约式编程*风格。\n\
  \n*   调用方在调用方法或构造方法之前必须满足前置条件。\n*   在方法或构造方法调用返回后，向调用方保证后置条件。\n\n清单 3-13 展示了如何以多种方式使用方法级别约束。`CardValidator`\
  \ 服务根据特定的验证算法验证信用卡。该算法被传递给构造方法，并且不能为 null。为此，构造方法在 `ValidationAlgorithm` 参数上使用了\
  \ `@NotNull` 约束。然后，两个 `validate` 方法返回一个 `Boolean`（信用卡是否有效？），并在返回类型上使用了 `@AssertTrue`\
  \ 约束，在方法参数上使用了 `@NotNull` 和 `@Future` 约束。\n\n***清单 3-13.***  一个带有构造方法和方法级别约束的服务\n\
  \n```\npublic class CardValidator {\n\nprivate ValidationAlgorithm validationAlgorithm;\n\
  \npublic CardValidator( @NotNull ValidationAlgorithm validationAlgorithm) {\n    this.validationAlgorithm\
  \ = validationAlgorithm;\n  }\n\n@AssertTrue\n  public Boolean validate( @NotNull\
  \ CreditCard creditCard) {\n\nreturn validationAlgorithm.validate(creditCard.getNumber(),\
  \ creditCard.getCtrlNumber());\n  }\n\n@AssertTrue\n  public Boolean validate( @NotNull\
  \ String number, @Future Date expiryDate, →\n                          Integer controlNumber,\
  \ String type) {\n\n\n\nreturn validationAlgorithm.validate(number, controlNumber);\n\
  \  }\n}\n```\n\n约束继承\n\n业务模型通常具有继承关系。在使用 Bean Validation 时，你最终会在业务模型类、超类或接口上定义约束。属性上的约束继承与\
  \ Java 中的普通继承类似：它是累积的。这意味着当一个 Bean 继承自另一个 Bean 时，其约束也会被继承并进行验证。\n\n清单 3-15 展示了继承自\
  \ `Item`（清单 3-14）的 `CD` 类。两者都拥有属性以及针对这些属性的约束。如果验证一个 `CD` 实例，不仅会验证其自身的约束，还会验证来自父类的约束。\n\
  \n***清单 3-14.***  使用约束的 Item 超类\n\n```\npublic class Item {\n\n@NotNull\n  protected\
  \ Long id;\n  @NotNull @Size(min = 4, max = 50)\n  protected String title;\n  protected\
  \ Float price;\n  protected String description;\n\n@NotNull\n  public Float calculateVAT()\
  \ {\n    return price * 0.196f;\n  }\n\n@NotNull\n  public Float calculatePrice(\
  \ @DecimalMin(\"1.2\") Float rate) {\n    return price * rate;\n  }\n}\n```\n\n\
  ***清单 3-15.***  继承 Item 的 CD 类\n\n```\npublic class CD extends Item {\n\n@Pattern(regexp\
  \ = \"[A-Z][a-z]{1,}\")\n  private String musicCompany;\n  @Max(value = 5)\n  private\
  \ Integer numberOfCDs;\n  private Float totalDuration;\n  @MusicGenre\n  private\
  \ String genre;\n\n// ConstraintDeclarationException : 方法重写时不允许\n  public Float\
  \ calculatePrice( @DecimalMin(\"1.4\") Float rate) {\n    return price * rate;\n\
  \  }\n}\n```\n\n相同的继承机制也适用于方法级别的约束。`Item` 中声明的 `calculateVAT` 方法会被 `CD` 继承。但在方法重写的情况下，定义参数约束时必须特别小心。只有被重写方法的根方法才能使用参数约束进行注解。此限制的原因是，子类型中不能加强前置条件。相反，可以在子类型中无限制地添加返回值约束（你可以加强后置条件）。\n\
  \n因此，当你验证 `CD` 类的 `calculatePrice` 方法时（参见清单 3-15），Bean Validation 运行时会抛出一个 `javax.validation.ConstraintDeclarationException`，提示只有被重写方法的根方法才能使用参数约束。\n\
  \n消息\n\n如前所述（清单 3-2），约束注解定义包含几个必需属性：`message`、`groups` 和 `payload`。每个约束必须定义一个 String\
  \ 类型的默认消息，用于在验证 Bean 时发生约束违规时创建错误消息。\n\n默认消息的值可以是硬编码的，但建议使用资源包键以实现国际化。按照惯例，资源包键应为约束注解的完全限定类名后跟\
  \ `.message`。\n\n```\n// 硬编码错误消息\nString message() default \"Email address doesn't\
  \ look good\";\n// 资源包键\nString message() default \"{org.agoncal.book.javaee7\\\
  . Email.message }\";\n```\n\n默认情况下，资源包文件名为 `ValidationMessages.properties`，并且必须位于应用程序的类路径中。该文件遵循键/值对格式，因此你需要编写以下内容来外部化和国际化错误消息。\n\
  \n```\norg.agoncal.book.javaee7\\. Email.message =Email address doesn't look good\n\
  ```\n\n在声明时，可以针对每次使用覆盖约束注解中定义的此默认消息。\n\n```\n@Email( message = \"Recovery email\
  \ is not a valid email address\" )\nprivate String recoveryEmail;\n```\n\n得益于消息插值（`javax.validation.MessageInterpolator`\
  \ 接口），错误消息可以包含占位符。插值的目的是通过解析大括号之间的消息字符串和参数来确定错误消息。下面的错误消息会被插值，因此 `{min}` 和 `{max}`\
  \ 占位符会被相应元素的值替换：\n\n```\njavax.validation.constraints.Size.message = size must be\
  \ between {min} and {max}\n```\n\n清单 3-16 展示了一个以多种方式使用错误消息的 `Customer` 类。`userId`\
  \ 属性使用 `@Email` 注解，这意味着如果该值不是有效的电子邮件地址，将使用默认错误消息。另一方面，`recoveryEmail` 覆盖了默认错误消息。请注意，对于\
  \ `firstName` 和 `age` 属性，默认错误消息被替换为使用占位符的消息。\n\n***清单 3-16.***  声明多个错误消息的 Customer\
  \ 类\n\n```\npublic class Customer {\n\n@Email\n  private String userId;\n  @NotNull\
  \ @Size(min = 4, max = 50, message = \"Firstname should be between {min} and {max}\"\
  )\n  private String firstName;\n  private String lastName;\n  @Email(message = \"\
  Recovery email is not a valid email address\")\n  private String recoveryEmail;\n\
  \  private String phoneNumber;\n  @Min(value = 18, message = \"Customer is too young.\
  \ Should be older that {value}\")\n  private Integer age;\n\n// 构造方法、getter、setter\n\
  }\n```\n\nConstraintValidator 上下文\n\n到目前为止，你已经看到约束实现类需要实现 `ConstraintValidator`，并因此定义自己的\
  \ `isValid` 方法。`isValid` 方法签名接受应用约束的数据类型，同时也接受一个 `ConstraintValidationContext`。该接口封装了与\
  \ Bean Validation 提供者执行验证的上下文相关的数据。表 3-3 列出了 `javax.validation.ConstraintValidatorContext`\
  \ 接口中定义的方法。\n\n表 3-3. ConstraintValidationContext 接口的方法\n\n| 方法 | 描述 |\n| --- |\
  \ --- |\n| `disableDefaultConstraintViolation` | 禁用默认的 `ConstraintViolation` 对象生成\
  \ |\n| `getDefaultConstraintMessageTemplate` | 返回当前未插值的默认消息 |\n| `buildConstraintViolationWithTemplate`\
  \ | 返回一个 `ConstraintViolationBuilder`，允许构建自定义违规报告 |\n\n`ConstraintValidatorContext`\
  \ 接口允许重新定义默认约束消息。`buildConstraintViolationWithTemplate` 方法基于流畅 API 模式返回一个 `ConstraintViolationBuilder`，允许构建自定义违规报告。以下代码向报告添加了一个新的约束违规：\n\
  \n```\ncontext.buildConstraintViolationWithTemplate(\"Invalid protocol\")\n    \
  \   .addConstraintViolation();\n```\n\n此技术允许你生成并创建一个或多个自定义报告消息。如果我们以 `@URL` 约束（清单\
  \ 3-7）为例，我们会注意到整个约束只有一个错误消息（“Malformed URL”）。但此约束有多个属性（`protocol`、`host` 和 `port`），我们可能希望为每个属性指定特定的错误消息，例如“Invalid\
  \ protocol”或“Invalid host”。\n\n![image](img/sq.jpg) **注意** `ConstraintViolation`\
  \ 接口描述了一个约束违规。它公开了约束违规上下文以及描述违规的消息。更多内容将在后面的“验证约束”部分介绍。\n\n\n\n清单 3-17 重新审视了 `URL`\
  \ 约束类的实现，并使用 `ConstraintValidatorContext` 来更改错误消息。该代码完全禁用了默认的错误消息生成（`disableDefaultConstraintViolation`），并仅为每个属性定义了自定义错误消息。\n\
  \n***清单 3-17.***  使用 `ConstraintValidatorContext` 自定义错误消息的 URL 约束\n\n```\npublic\
  \ class URLValidator implements ConstraintValidator<URL, String> {\n\nprivate String\
  \ protocol;\n  private String host;\n  private int port;\n\npublic void initialize(URL\
  \ url) {\n    this.protocol = url.protocol();\n    this.host = url.host();\n    this.port\
  \ = url.port();\n  }\n\npublic boolean isValid(String value, ConstraintValidatorContext\
  \ context ) {\n    if (value == null || value.length() == 0) {\n      return true;\n\
      }\n\njava.net.URL url;\n    try {\n      url = new java.net.URL(value);\n    }\
  \ catch (MalformedURLException e) {\n      return false;\n    }\n\nif (protocol\
  \ != null && protocol.length() > 0 && !url.getProtocol().equals(protocol)) {\n      context\
  \ .disableDefaultConstraintViolation();\n      context .buildConstraintViolationWithTemplate(\"\
  \ Invalid protocol \").addConstraintViolation();\n      return false;\n    }\n\n\
  if (host != null && host.length() > 0 && !url.getHost().startsWith(host)) {\n      context.disableDefaultConstraintViolation();\n\
        context.buildConstraintViolationWithTemplate(\"Invalid host\").addConstraintViolation();\n\
        return false;\n    }\n\nif (port != -1 && url.getPort() != port) {\n      context\
  \ .disableDefaultConstraintViolation();\n      context .buildConstraintViolationWithTemplate(\"\
  \ Invalid port \").addConstraintViolation();\n      return false;\n    }\n\nreturn\
  \ true;\n  }\n}\n```\n\n分组\n\n当验证一个 bean 时，意味着所有约束会同时被验证一次。但如果你需要部分验证你的 bean（约束的子集），或者控制约束被评估的顺序，该怎么办？这时分组就派上用场了。分组允许你限制在验证过程中应用的约束集合。\n\
  \n在代码层面，分组只是一个空接口。\n\n```\npublic interface Payment {}\n```\n\n在业务逻辑层面，分组是有含义的。例如，在工作流中，“Payment”表示属于该分组的属性将在支付阶段或采购订单阶段被验证。要将此分组应用于一组约束，你只需使用\
  \ `groups` 属性并将该接口传递给它。\n\n```\n@Past( groups = Payment.class )\nprivate Date paymentDate;\n\
  ```\n\n你可以根据业务逻辑的需要定义任意数量的分组，并且可以将多个分组应用于一个约束，因为 `groups` 属性允许传入一个分组数组。\n\n```\n\
  @Past(groups = {Payment.class, Delivery.class} )\nprivate Date deliveryDate;\n```\n\
  \n每个约束注解都必须定义一个 `groups` 元素。如果未指定分组，则视为声明了默认的 `javax.validation.groups.Default`\
  \ 分组。因此，以下约束是等效的，并且都属于 `Default` 分组：\n\n```\n@NotNull\nprivate Long id;\n@Past(\
  \ groups = Default.class )\nprivate Date creationDate;\n```\n\n让我们以之前看到的 `@ChronologicalDates`\
  \ 用例为例，并对其应用分组。清单 3-18 中的 `Order` 类有多个日期来跟踪采购订单工作流：`creationDate`、`paymentDate`\
  \ 和 `deliveryDate`。当你首次创建采购订单时，`creationDate` 属性被设置，但 `paymentDate` 和 `deliveryDate`\
  \ 未被设置。你希望稍后在另一个不同的工作流阶段验证这两个日期，而不是与 `creationDate` 同时验证。通过应用分组，你可以在默认分组（由于此注解未指定分组，其默认分组为\
  \ `javax.validation.groups.Default`）中验证 `creationDate`，在 `Payment` 阶段验证 `paymentDate`，并在\
  \ `Delivery` 阶段验证 `deliveryDate` 和 `@ChronologicalDates`。\n\n***清单 3-18.***  一个使用多个分组的类\n\
  \n```\n@ChronologicalDates( groups = Delivery.class )\npublic class Order {\n\n\
  @NotNull\n  private Long id;\n  @NotNull @Past\n  private Date creationDate ;\n\
    private Double totalAmount;\n\n@NotNull( groups = Payment.class )  @Past( groups\
  \ = Payment.class )\n  private Date paymentDate ;\n\n@NotNull( groups = Delivery.class\
  \ ) @Past( groups = Delivery.class )\n  private Date deliveryDate ;\n\nprivate List<OrderLine>\
  \ orderLines;\n\n// 构造器、getter、setter\n}\n```\n\n正如你很快会看到的，在验证过程中，你只需明确提及要验证的分组，Bean\
  \ Validation 提供者就会执行部分验证。\n\n部署描述符\n\n与大多数 Java EE 7 技术一样，Bean Validation 允许你使用注解（到目前为止我在所有示例中一直在使用的方式）以及\
  \ XML 来定义元数据。Bean Validation 在 `META-INF` 目录下可以有多个可选文件。第一个是 `validation.xml`，应用程序可以使用它来细化\
  \ Bean Validation 的某些行为（例如默认的 Bean Validation 提供者、消息插值器或特定属性）。然后，你可以有多个文件来描述 bean\
  \ 上的约束声明。与 Java EE 7 中的所有部署描述符一样，XML 会覆盖注解。\n\n清单 3-19 展示了 `validation.xml` 部署描述符，它有一个\
  \ `validation-config` XML 根元素，但更重要的是，它定义了一个外部约束映射文件：`constraints.xml`（清单 3-20）。\n\
  \n***清单 3-19.***  一个声明约束映射文件的 validation.xml 文件\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n< validation-config\n        xmlns=\" http://jboss.org/xml/ns/javax/validation/configuration\
  \ \"\n        xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n        xsi:schemaLocation=\"\
  \ http://jboss.org/xml/ns/javax/validation/configuration →\n                            validation-configuration-1.1.xsd\"\
  \n        version=\"1.1\">\n\n<constraint-mapping>META-INF/ constraints.xml </constraint-mapping>\n\
  \n</validation-config>\n```\n\n***清单 3-20.***  一个在 Bean 上定义约束的文件\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<constraint-mappings\n        xmlns=\" http://jboss.org/xml/ns/javax/validation/mapping\
  \ \"\n        xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n        xsi:schemaLocation=\"\
  \ http://jboss.org/xml/ns/javax/validation/mapping →\n                            validation-mapping-1.1.xsd\"\
  \n        version=\"1.1\">\n\n\n\n<bean class=\"org.agoncal.book.javaee7.chapter03\\\
  . Book \" ignore-annotations=\"false\">\n    <field name=\" title \">\n      <constraint\
  \ annotation=\"javax.validation.constraints. NotNull \">\n        < message >标题不应为空</message>\n\
        </constraint>\n    </field>\n    <field name=\" price \">\n      <constraint\
  \ annotation=\"javax.validation.constraints. NotNull \"/>\n      <constraint annotation=\"\
  javax.validation.constraints. Min \">\n        <element name=\" value \"> 2 </element>\n\
        </constraint>\n    </field>\n    <field name=\" description \">\n      <constraint\
  \ annotation=\"javax.validation.constraints. Size \">\n        <element name=\"\
  max\"> 2000 </element>\n      </constraint>\n    </field>\n  </bean>\n</constraint-mappings>\n\
  \n清单 3-20 中的 `constraints.xml` 文件定义了用于在 `Book` 类上声明约束的 XML 元数据。它首先对 `title` 属性应用了\
  \ `@NotNull` 约束，并重新定义了默认错误消息（`标题不应为空`）。对于 `price` 属性，应用了两个不同的约束，并将最小值设置为 2。这类似于清单\
  \ 3-1 中使用注解定义元数据的代码。\n\n验证约束\n\n到目前为止，我们一直在处理约束：定义它们、聚合它们、实现我们自己的约束、自定义错误消息、影响分组——但如果没有验证运行时环境，约束就无法被验证。与大多数\
  \ Java EE 技术一样，代码需要在容器内运行或由提供者管理。\n\n约束可以应用于 Bean、属性、getter 方法、构造器、方法参数和返回值。因此，验证可以发生在所有这些元素类型上。你可以验证\
  \ Bean、属性、值、方法和分组，还可以验证包含自身约束的对象图。要使所有这些约束在运行时得到验证，你需要一个验证 API。\n\n验证 API\n\n验证运行时环境使用一小部分\
  \ API 来验证约束。主要的 API 是 `javax.validation.Validator` 接口。它持有验证对象和对象图的契约，独立于其实现所在的层（表示层、业务层或业务模型）。验证失败时，会返回一组\
  \ `javax.validation.ConstraintViolation` 接口。该接口暴露了约束违反的上下文以及描述违反情况的消息。\n\nValidator\n\
  \n验证的主要入口点是 `Validator` 接口。其 API 能够仅使用表 3-4 中描述的几种方法验证 Bean 的实例。所有这些验证方法对于每个约束声明都遵循以下流程：\n\
  \n*   确定为该约束声明使用哪个合适的 `ConstraintValidator` 实现（例如，确定字符串上 `@Size` 约束对应的 `ConstraintValidator`）。\n\
  *   执行 `isValid` 方法。\n*   如果 `isValid` 返回 `true`，则继续处理下一个约束。\n*   如果 `isValid` 返回\
  \ `false`，Bean 验证提供者会将一个 `ConstraintViolation` 添加到约束违反列表中。\n\n如果在此验证流程中发生某些不可恢复的故障，则会抛出\
  \ `ValidationException`。在某些情况下，此异常可以具体化（例如，无效的分组定义、无效的约束定义、无效的约束声明）。\n\n表 3-4. Validator\
  \ 接口的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `<T> Set<ConstraintViolation<T>> validate`\
  \ `(T object, Class<?>... groups)` | 验证对象上的所有约束 |\n| `<T> Set<ConstraintViolation<T>>\
  \ validateProperty` `(T object, String propName, Class<?>... groups)` | 验证放置在属性上的所有约束\
  \ |\n| `<T> Set<ConstraintViolation<T>> validateValue` `(Class<T> beanType, String\
  \ propName, Object value, Class<?>... groups)` | 验证针对给定值放置在属性上的所有约束 |\n| `BeanDescriptor\
  \ getConstraintsForClass(Class<?> clazz)` | 返回描述 Bean 约束的描述符对象 |\n| `ExecutableValidator\
  \ forExecutables` `()` | 返回一个委托，用于验证方法和构造器的参数及返回值 |\n\n方法 `validate`、`validateProperty`\
  \ 和 `validateValue` 分别用于验证整个 Bean、某个属性或针对给定值的某个属性。所有方法都接受一个可变参数，可用于指定要验证的分组。`forExecutables`\
  \ 方法提供对 `ExecutableValidator` 的访问，用于验证方法和构造器的参数及返回值。表 3-5 描述了 `ExecutableValidator`\
  \ API。\n\n表 3-5. ExecutableValidator 接口的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `<T>\
  \ Set<ConstraintViolation<T>> validateParameters` `(T object, Method method, Object[]\
  \ params, Class<?>... groups)` | 验证放置在方法参数上的所有约束 |\n| `<T> Set<ConstraintViolation<T>>\
  \ validateReturnValue` `(T object, Method method, Object returnValue, Class<?>...\
  \ groups)` | 验证方法的所有返回值约束 |\n| `<T> Set<ConstraintViolation<T>> validateConstructorParameters`\
  \ `(Constructor<T> constructor, Object[] params, Class<?>... groups)` | 验证放置在构造器参数上的所有约束\
  \ |\n| `<T> Set<ConstraintViolation<T>> validateConstructorReturnValue` `(Constructor<T>\
  \ constructor, T createdObject, Class<?>... groups)` | 验证构造器的所有返回值约束 |\n\nConstraintViolation\n\
  \n表 3-4 和表 3-5 中列出的所有验证方法都返回一组 `ConstraintViolation`，可以遍历该集合以查看发生了哪些验证错误。如果集合为空，则验证成功。否则，对于每个被违反的约束，都会将一个\
  \ `ConstraintViolation` 实例添加到集合中。`ConstraintViolation` 描述单个约束失败，其 API 提供了大量关于失败原因的有用信息。表\
  \ 3-6 概述了此 API。\n\n表 3-6. ConstraintViolation 接口的方法\n\n| 方法 | 描述 |\n| --- | ---\
  \ |\n| `String getMessage()` | 返回此约束违反的插值错误消息 |\n| `String getMessageTemplate()`\
  \ | 返回未插值的错误消息 |\n| `T getRootBean()` | 返回正在验证的根 Bean |\n| `Class<T> getRootBeanClass()`\
  \ | 返回正在验证的根 Bean 的类 |\n| `Object getLeafBean()` | 返回应用了约束的叶子 Bean |\n| `Path getPropertyPath()`\
  \ | 返回从根 Bean 到该值的属性路径 |\n| `Object getInvalidValue()` | 返回未能通过约束的值 |\n| `ConstraintDescriptor<?>\
  \ getConstraintDescriptor()` | 返回约束元数据 |\n\n获取 Validator 实例\n\n验证 Bean 的第一步是获取一个\
  \ `Validator` 实例。与大多数 Java EE 规范一样，你可以通过编程方式获取 `Validator`（如果你的代码在容器外执行），或者通过注入获取（如果你的代码在\
  \ EJB 或 Web 容器中执行）。\n\n\n\n如果以编程方式实现，你需要从 `Validation` 类开始，该类用于引导 Bean Validation\
  \ 提供程序。其 `buildDefaultValidatorFactory` 方法会构建并返回一个 `ValidatorFactory`，而该工厂又用于构建一个\
  \ `Validator`。代码如下所示：\n\n```\nValidatorFactory factory = Validation.buildDefaultValidatorFactory();\n\
  Validator validator = factory.getValidator();\n```\n\n然后，你需要管理 `ValidatorFactory`\
  \ 的生命周期，并以编程方式关闭它。\n\n```\nfactory.close();\n```\n\n如果你的应用程序运行在 Java EE 容器中，那么容器必须在\
  \ JNDI 下提供以下实例：\n\n*   `java:comp/ValidatorFactory` 下的 `ValidatorFactory`\n*   `java:comp/Validator`\
  \ 下的 `Validator`\n\n然后，你可以查找这些 JNDI 名称并获取 `Validator` 实例。但除了通过 JNDI 查找实例外，你还可以通过\
  \ `@Resource` 注解请求注入它们。\n\n```\n@Resource ValidatorFactory validatorFactory;\n@Resource\
  \ Validator validator;\n```\n\n如果你的容器使用了 CDI（在 Java EE 7 中默认如此），容器必须允许通过 `@Inject`\
  \ 进行注入。\n\n```\n@Inject ValidatorFactory;\n@Inject Validator;\n```\n\n无论哪种方式（使用\
  \ `@Resource` 或 `@Inject`），容器都会负责工厂的生命周期。因此，你无需手动创建或关闭 `ValidatorFactory`。\n\n验证\
  \ Bean\n\n一旦通过编程方式或注入获得了 `Validator`，我们就可以使用其方法来验证整个 Bean 或单个属性。清单 3-21 展示了一个 `CD`\
  \ 类，该类在属性、方法参数和返回值上设置了约束。\n\n***清单 3-21.***  一个带有属性和方法约束的 Bean\n\n```\npublic class\
  \ CD {\n\n@NotNull @Size(min = 4, max = 50)\n  private String title;\n  @NotNull\n\
  \  private Float price;\n  @NotNull(groups = PrintingCatalog.class)\n  @Size(min\
  \ = 100, max = 5000, groups = PrintingCatalog.class)\n  private String description;\n\
  \  @Pattern(regexp = \"[A-Z][a-z]{1,}\")\n  private String musicCompany;\n  @Max(value\
  \ = 5)\n  private Integer numberOfCDs;\n  private Float totalDuration;\n\n@NotNull\
  \ @DecimalMin(\"5.8\")\n  public Float calculatePrice( @DecimalMin(\"1.4\") Float\
  \ rate) {\n    return price * rate;\n  }\n\n@DecimalMin(\"9.99\")\n  public Float\
  \ calculateVAT() {\n    return price * 0.196f;\n  }\n}\n```\n\n要验证整个 Bean 的属性，我们只需创建一个\
  \ `CD` 实例并调用 `Validator.validate()` 方法。如果实例有效，则返回一个空的 `ConstraintViolation` 集合。以下代码展示了一个有效的\
  \ `CD` 实例（带有标题和价格）被验证。然后代码检查约束违规集合是否为空。\n\n```\nCD cd = new CD(\"Kind of Blue\"\
  , 12.5f);\nSet<ConstraintViolation<CD>> violations = validator. validate (cd);\n\
  assertEquals( 0, violations.size() );\n```\n\n另一方面，以下代码将返回两个 `ConstraintViolation`\
  \ 对象——一个针对标题，另一个针对价格（两者都违反了 `@NotNull`）：\n\n```\nCD cd = new CD();\nSet<ConstraintViolation<CD>>\
  \ violations = validator.validate(cd);\nassertEquals( 2, violations.size() );\n\
  ```\n\n验证属性\n\n前面的示例验证了整个 Bean 的属性。但是，借助 `Validator.validateProperty()` 方法，我们可以验证给定对象的单个命名属性。此方法对于部分对象验证非常有用。\n\
  \n下面的代码创建了一个标题和价格都为 null 的 `CD` 对象，这意味着该 Bean 无效。但是因为我们只验证了 `numberOfCDs` 属性，所以验证成功，约束违规集合为空。\n\
  \n```\nCD cd = new CD();\ncd. setNumberOfCDs ( 2 );\nSet<ConstraintViolation<CD>>\
  \ violations = validator. validateProperty (cd, \" numberOfCDs \");\nassertEquals(0,\
  \ violations.size());\n```\n\n相反，以下代码会引发一个约束违规，因为 CD 的最大数量应为 5，而不是 7。请注意，我们使用 `ConstraintViolation`\
  \ API 来检查违规数量、违规返回的插值消息、无效值以及消息模板。\n\n```\nCD cd = new CD();\ncd.setNumberOfCDs(\
  \ 7 );\nSet<ConstraintViolation<CD>> violations = validator.validateProperty(cd,\
  \ \"numberOfCDs\");\nassertEquals(1, violations.size() );\nassertEquals(\"must be\
  \ less than or equal to 5\", violations.iterator().next(). getMessage() );\nassertEquals(7,\
  \ violations.iterator().next(). getInvalidValue() );\nassertEquals(\"{javax.validation.constraints.Max.message}\"\
  ,\n             violations.iterator().next(). getMessageTemplate() );\n```\n\n验证值\n\
  \n使用 `Validator.validateValue()` 方法，你可以检查给定类的单个属性在具有指定值时是否可以成功验证。此方法对于提前验证非常有用，因为你甚至无需创建\
  \ Bean 实例或填充/更新其值。\n\n以下代码没有创建 `CD` 对象，而只是引用了 `CD` 类的 `numberOfCDs` 属性。它传递一个值并检查该属性是否有效（CD\
  \ 数量小于或等于 5）：\n\n```\nSet<ConstraintViolation<CD>> constr = validator. validateValue\
  \ (CD.class, \"numberOfCDs\", 2 );\nassertEquals( 0, constr.size() );\nSet<ConstraintViolation<CD>>\
  \ constr = validator. validateValue (CD.class, \"numberOfCDs\", 7 );\nassertEquals(\
  \ 1, constr.size() );\n```\n\n验证方法\n\n用于验证方法和构造函数的参数及返回值的方法可以在接口 `javax.validation.ExecutableValidator`\
  \ 中找到。`Validator.forExecutables()` 返回此 `ExecutableValidator`，你可以在其上调用 `validateParameters`、`validateReturnValue`、`validateConstructorParameters`\
  \ 或 `validateConstructorReturnValue`。\n\n以下代码调用 `calculatePrice` 方法并传递值 1.2。这将导致参数违反\
  \ `@DecimalMin(\"1.4\")` 约束。为此，代码首先需要创建一个 `java.lang.reflect.Method` 对象，该对象以 `Float`\
  \ 类型的参数为目标方法 `calculatePrice`。然后获取 `ExecutableValidator` 对象，并调用 `validateParameters`，传递\
  \ Bean、要调用的方法以及参数值（此处为 1.2）。然后检查是否没有违反约束。\n\n```\nCD cd = new CD(\"Kind of Blue\"\
  , 12.5f);\nMethod method = CD.class.getMethod(\" calculatePrice \", Float .class);\n\
  ExecutableValidator methodValidator = validator. forExecutables ();\nSet<ConstraintViolation<CD>>\
  \ violations = methodValidator.validateParameters (cd, method,\n               \
  \                                            new Object[]{new Float( 1.2 )});\n\
  assertEquals(1, violations.size());\n```\n\n验证组\n\n组定义了一组约束的子集。不是验证给定 Bean 的所有约束，而是只验证一个子集。每个约束声明都定义了它所属的组列表。如果没有显式声明组，则约束属于\
  \ `Default` 组。从验证的角度来看，所有验证方法都有一个可变参数，可用于指定执行验证时应考虑哪些验证组。如果未指定该参数，则将使用默认验证组（`javax.validation.groups.Default`）。如果指定了\
  \ `Default` 以外的组，则不会验证 `Default` 组。\n\n\n\n在清单 3-21 中，除了 `description` 属性外，所有约束都属于\
  \ `Default` 组。只有当描述需要打印在目录上（`PrintingCatalog` 组）时，才需要提供描述（`@NotNull @Size(min =\
  \ 100, max = 5000)`）。因此，如果我们创建一个没有标题、没有价格但有描述的 `CD`，并验证 `Default` 组，那么只有 `title`\
  \ 和 `price` 上的两个 `@NotNull` 约束会被违反。\n\n```\nCD cd = new CD();\ncd. setDescription\
  \ (\"Best Jazz CD ever\");\nSet<ConstraintViolation<CD>> violations = validator.\
  \ validate (cd, Default.class );\nassertEquals( 2 , violations.size());\n```\n\n\
  请注意，上述代码在验证时显式地提到了 `Default` 组，但也可以省略。因此，以下代码是等效的：\n\n```\nSet<ConstraintViolation<CD>>\
  \ violations = validator. validate (cd);\n```\n\n另一方面，如果我们决定仅针对 `PrintingCatalog`\
  \ 组验证 `CD`，那么以下代码将仅违反 `description` 上的约束，因为其值太短：\n\n```\nCD cd = new CD();\ncd.setDescription(\"\
  Too short\");\nSet<ConstraintViolation<CD>> violations = validator.validate(cd,\
  \ PrintingCatalog .class);\nassertEquals( 1 , violations.size());\n```\n\n如果你想同时验证\
  \ `Default` 和 `PrintingCatalog` 组，最终会有三个约束被违反（`title` 和 `price` 上的 `@NotNull` 约束，以及描述太短）：\n\
  \n```\nCD cd = new CD();\ncd.setDescription(\"Too short\");\nSet<ConstraintViolation<CD>>\
  \ violations = validator.validate(cd, Default.class ,\n PrintingCatalog .class);\n\
  assertEquals( 3 , violations.size());\n```\n\n综合运用\n\n现在，让我们将所有概念整合起来，编写一些 Java\
  \ Bean，在其中应用内置约束，并开发我们自己的约束。此示例使用在 Java SE 中运行的 CDI 和 Bean Validation 约束（目前无需在 GlassFish\
  \ 中部署任何内容），并通过两个集成测试来检查我们的约束是否正确。\n\n图 3-2 展示了一个包含收货地址（`Address`）的 `Customer` 类。这两个\
  \ Bean 的属性上都应用了内置约束（`@NotNull`、`@Size` 和 `@Past`）。但它们还使用了两个我们需要开发的约束。\n\n*   `@Email`，一个聚合约束，用于检查电子邮件地址是否有效。\n\
  *   `@ZipCode`，用于检查邮政编码对美国是否有效。此约束由一个注解和一个实现类（`ZipCodeValidator`）组成。请注意，`ZipCodeValidator`\
  \ 使用 `@Inject`（以及 CDI 限定符 `@USA`）注入了辅助类 `ZipCodeChecker`。\n\n![9781430246268_Fig03-02.jpg](img/9781430246268_Fig03-02.jpg)\n\
  \n图 3-2. 综合运用\n\n图 3-2 中描述的类遵循 Maven 目录结构，必须放置在以下目录中：\n\n*   `src/main/java`：存放\
  \ `Customer`、`Address` Bean 以及 `ZipCode` 和 `Email` 约束的目录。\n*   `src/main/resources`：存放\
  \ `beans.xml` 文件（以便使用 CDI）以及用于约束错误消息的 `ValidationMessages.properties` 文件的目录。\n*\
  \   `src/test/java`：存放集成测试 `AddressIT` 和 `CustomerIT` 的目录。\n*   `pom.xml`：描述项目及其依赖项的\
  \ Maven 项目对象模型（POM）。\n\n编写 Customer Bean\n\n在 CD-BookStore 应用程序中，客户在线购买商品，这些商品随后会被送到其家庭地址。为此，应用程序需要有效的信息来发货，例如客户姓名、电子邮件地址和收货地址。出生日期允许应用程序发送年度生日电子邮件。清单\
  \ 3-22 展示了 `Customer` Bean，其属性上应用了一些内置约束（`firstname` 不能为空，`dateOfBirth` 必须是过去的日期），以及我们将要开发的\
  \ `@Email` 约束，用于检查字符串是否为有效的电子邮件地址。\n\n***清单 3-22.***  一个包含内置约束和电子邮件约束的 Customer\
  \ Bean\n\n```\npublic class Customer {\n\n@NotNull @Size(min = 2)\n  private String\
  \ firstName;\n  private String lastName;\n  @Email\n  private String email;\n  private\
  \ String phoneNumber;\n  @Past\n  private Date dateOfBirth;\n  private Address deliveryAddress;\n\
  \n// 构造函数、getter、setter\n}\n```\n\n编写 Address Bean\n\n一个 `Customer` 有零个或一个收货地址。`Address`\
  \ 是一个包含商品发货所需所有信息的 Bean：街道、城市、州、邮政编码和国家。清单 3-23 展示了 `Address` Bean，其在关键属性（`street1`、`city`\
  \ 和 `zipcode`）上应用了 `@NotNull` 约束，以及用于检查邮政编码是否有效的 `@ZipCode` 约束（稍后开发）。\n\n***清单 3-23.***  一个包含内置约束和\
  \ @ZipCode 约束的 Address Bean\n\n```\npublic class Address {\n\n@NotNull\n  private\
  \ String street1;\n  private String street2;\n  @NotNull\n  private String city;\n\
    private String state;\n  @NotNull @ZipCode\n  private String zipcode;\n  private\
  \ String country;\n\n// 构造函数、getter、setter\n}\n```\n\n编写 @Email 约束\n\n`@Email` 约束并非\
  \ Bean Validation 的内置约束，因此我们需要开发它。由于一个带有正确正则表达式（`@Pattern`）和大小限制的简单约束注解即可工作，因此无需实现类（`@Constraint(validatedBy\
  \ = {})`）。清单 3-24 展示了 `@Email` 约束注解。\n\n***清单 3-24.***  通过内置约束聚合实现的电子邮件约束注解\n\n\
  ```\n@Size (min = 7)\n@Pattern (regexp = \"[a-z0-9!#$%&'*+/=?^_`{|}∼-]+(?:\\\\.\"\
  \n        + \"[a-z0-9!#$%&'*+/=?^_`{|}∼-]+)*\"\n        + \"@(?:a-z0-9?\\\\.)+a-z0-9?\"\
  )\n@ReportAsSingleViolation\n@Constraint(validatedBy = {})\n@Target({METHOD, FIELD,\
  \ ANNOTATION_TYPE, CONSTRUCTOR, PARAMETER})\n@Retention(RUNTIME)\npublic @interface\
  \ Email {\n\nString message() default \" {org.agoncal.book.javaee7.chapter03.Email.message}\
  \ \";\n  Class<?>[] groups() default {};\n  Class<? extends Payload>[] payload()\
  \ default {};\n\n@Target({METHOD, FIELD, ANNOTATION_TYPE, CONSTRUCTOR, PARAMETER})\n\
    @Retention(RUNTIME)\n  @interface List {\n    Email[] value();\n  }\n}\n```\n\n\
  请注意，在清单 3-24 中，错误消息是一个在 `META-INF/ ValidationMessages.properties` 文件中定义的资源键。\n\n\
  ```\norg.agoncal.book.javaee7.chapter03.Email.message=invalid email address\n```\n\
  \n编写 @ZipCode 约束\n\n`@ZipCode` 约束比 `@Email` 更复杂。邮政编码具有特定格式（例如，美国为五位数字），这可以通过正则表达式轻松检查。但要确保邮政编码不仅在语法上正确，而且有效，我们需要访问一个外部服务来检查某个邮政编码是否存在于数据库中。这就是为什么清单\
  \ 3-25 中的 `ZipCode` 约束注解需要一个实现类（`ZipCodeValidator`）。\n\n***清单 3-25.***  @ZipCode\
  \ 约束注解\n\n\n\n```\n@Constraint( validatedBy = ZipCodeValidator.class )\n@Target({METHOD,\
  \ FIELD, ANNOTATION_TYPE, CONSTRUCTOR, PARAMETER})\n@Retention(RUNTIME)\npublic\
  \ @interface ZipCode {\n\nString message() default \"{org.agoncal.book.javaee7.chapter03.ZipCode.message}\"\
  ;\n  Class<?>[] groups() default {};\n  Class<? extends Payload>[] payload() default\
  \ {};\n\n@Target({METHOD, FIELD, ANNOTATION_TYPE, CONSTRUCTOR, PARAMETER})\n  @Retention(RUNTIME)\n\
    @interface List {\n    ZipCode [] value();\n  }\n}\n```\n\n清单 3-26 展示了 `ZipCode`\
  \ 约束的实现类：`ZipCodeValidator` 实现了带有泛型类型 String 的 `javax.validation.ConstraintValidator`\
  \ 接口。`isValid` 方法实现了验证算法，该算法包括匹配正则表达式模式和调用外部服务：`ZipCodeChecker`。此处未展示 `ZipCodeChecker`\
  \ 的代码，因为它不相关。重要的是要注意它通过一个 CDI 限定符（在清单 3-27 中展示的 `@USA`）进行了注入（`@Inject`）。因此，你可以看到\
  \ CDI 和 Bean Validation 规范协同工作。\n\n***清单 3-26.***  ZipCodeValidator 约束实现\n\n```\n\
  public class ZipCodeValidator implements ConstraintValidator < ZipCode , String>\
  \ {\n\n@Inject @USA\n  private ZipCodeChecker checker ;\n  private Pattern zipPattern\
  \ = Pattern.compile(\"\\\\d{5}(-\\\\d{5})?\");\n\npublic void initialize(ZipCode\
  \ zipCode) {\n  }\n\npublic boolean isValid(String value , ConstraintValidatorContext\
  \ context) {\n    if (value == null)\n      return true;\n\nMatcher m = zipPattern.matcher(\
  \ value );\n    if (!m.matches())\n      return false;\n\nreturn checker .isZipCodeValid(value);\n\
    }\n}\n```\n\n***清单 3-27.***  USA CDI 限定符\n\n```\n@Qualifier\n@Retention(RUNTIME)\n\
  @Target({FIELD, TYPE, METHOD})\npublic @interface USA {\n}\n```\n\n![image](img/sq.jpg) **注意**  在接下来的章节中，你将看到如何将\
  \ Bean Validation 与其他规范（如 JPA（你可以向实体添加约束）或 JSF（你可以约束你的支持 bean））集成。\n\n编写 CustomerIT\
  \ 和 AddressIT 集成测试\n\n现在我们如何测试 bean 上的约束？我们实际上无法为 `@Email`（因为它是一个约束聚合注解）或 `@ZipCode`（因为它需要注入才能工作，而注入是一种容器服务）编写单元测试。最简单的方法是编写一个集成测试；也就是说，使用\
  \ `ValidatorFactory` 获取一个 `Validator` 并验证我们的 bean。\n\n清单 3-28 展示了 `CustomerIT` 类，它对\
  \ `Customer` bean 进行集成测试。`init()` 方法初始化 `Validator`（使用 `ValidatorFactory`），`close()`\
  \ 方法释放工厂。然后该类包含两个测试：一个创建有效的 `Customer` 对象，另一个创建具有无效电子邮件地址的对象并检查验证是否失败。\n\n***清单\
  \ 3-28.***  CustomerIT 集成测试\n\n```\npublic class CustomerIT {\n\nprivate static\
  \ ValidatorFactory vf;\n  private static Validator validator;\n\n@BeforeClass\n\
    public static void init() {\n    vf = Validation.buildDefaultValidatorFactory()\
  \ ;\n    validator = vf.getValidator() ;\n  }\n\n@AfterClass\n  public static void\
  \ close() {\n    vf.close();\n  }\n\n@Test\n  public void shouldRaiseNoConstraintViolation()\
  \ {\n\nCustomer customer = new Customer(\"John\", \"Smith\", \" jsmith@gmail.com\
  \ \");\n\nSet<ConstraintViolation<Customer>> violations = validator.validate(customer)\
  \ ;\n    assertEquals( 0 , violations.size());\n  }\n\n@Test\n  public void shouldRaiseConstraintViolationCauseInvalidEmail()\
  \ {\n\nCustomer customer = new Customer(\"John\", \"Smith\", \" DummyEmail \");\n\
  \nSet<ConstraintViolation<Customer>> violations = validator.validate(customer) ;\n\
      assertEquals( 1 , violations.size());\n    assertEquals(\"invalid email address\"\
  , violations.iterator().next(). getMessage() );\n    assertEquals(\"dummy\", violations.iterator().next().\
  \ getInvalidValue() );\n    assertEquals(\"{org.agoncal.book.javaee7.chapter03.Email.message}\"\
  ,\n                                  violations.iterator().next(). getMessageTemplate()\
  \ );\n  }\n}\n```\n\n清单 3-29 遵循相同的模式（使用工厂创建 `Validator`，验证 bean，然后关闭工厂），但针对的是 `Address`\
  \ bean。\n\n***清单 3-29.***  AddressIT 集成测试\n\n```\npublic class AddressIT {\n\n@Test\n\
    public void shouldRaiseConstraintViolationCauseInvalidZipCode() {\n\nValidatorFactory\
  \ vf = Validation.buildDefaultValidatorFactory();\n    Validator validator = vf.getValidator();\n\
  \nAddress address = new Address(\"233 Spring Street\", \"New York\", \"NY\", \"\
  \ DummyZip \", \"USA\");\n\nSet<ConstraintViolation<Address>> violations = validator.validate(address);\n\
      assertEquals(1, violations.size());\n\nvf.close();\n  }\n}\n```\n\n使用 Maven\
  \ 编译和测试\n\n现在所有类都需要在测试之前进行编译。清单 3-30 中的 `pom.xml` 声明了编译代码所需的所有依赖项：Hibernate Validator（Bean\
  \ Validation 的参考实现）和 Weld（用于 CDI）。请注意，`pom.xml` 声明了 Failsafe 插件，该插件旨在运行集成测试（用于运行\
  \ `CustomerIT` 和 `AddressIT` 集成测试类）。\n\n***清单 3-30.***  用于编译和测试约束的 pom.xml 文件\n\n\
  ```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project xmlns=\" http://maven.apache.org/POM/4.0.0\
  \ \" →\n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \" →\n        \
  \ xsi:schemaLocation=\" http://maven.apache.org/POM/4.0.0 →\n         http://maven.apache.org/xsd/maven-4.0.0.xsd\
  \ \">\n  <modelVersion>4.0.0</modelVersion>\n\n<parent>\n    <artifactId>chapter03</artifactId>\n\
