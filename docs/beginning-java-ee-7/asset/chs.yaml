  \n<groupId>org.agoncal.book.javaee7</groupId>\n  <artifactId>chapter04</artifactId>\n\
    <version>1.0</version>\n\n<dependencies>\n    <dependency>\n      <groupId>org.eclipse.persistence</groupId>\n\
