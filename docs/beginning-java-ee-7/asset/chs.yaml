              <goals>\n              <goal>java</goal>\n            </goals>\n          </execution>\n\
          </executions>\n        <configuration>\n          <mainClass> org.agoncal.book.javaee7.chapter04.Main\
  \ </mainClass>\n        </configuration>\n      </plugin>\n    </plugins>\n  </build>\n\
  </project>\n```\n\n首先，为了能够编译代码，你需要 JPA API，它定义了 `javax.persistence` 包中的所有注解和类。你可以通过\
  \ `org.eclipse.persistence.jpa` 构件 ID 获取这些内容以及 EclipseLink 运行时（即持久化提供者）。如前一章所述，Bean\
  \ Validation API 位于 `hibernate-validator` 构件中。然后，你需要用于连接 Derby 的 JDBC 驱动程序。`derbyclient`\
  \ 构件 ID 指的是包含 JDBC 驱动程序的 jar 包，用于连接以服务器模式运行的 Derby（数据库在独立进程中运行并监听端口），而 `derby` 构件\
  \ ID 包含将 Derby 用作嵌入式数据库的类。请注意，此构件 ID 的作用域为测试（`<scope>test</scope>`），JUnit 4 的构件也是如此。\n\
  \n要编译这些类，请在包含 `pom.xml` 文件的根目录中打开命令行解释器，并输入以下 Maven 命令：\n\n```\n$ mvn compile\n\
  ```\n\n你应该会看到 `BUILD SUCCESS` 消息，提示编译成功。Maven 会创建一个 `target` 子目录，其中包含所有类文件以及 `persistence.xml`\
  \ 文件。要运行集成测试，你也可以依赖 Maven，输入以下命令：\n\n```\n$ mvn integration-test\n```\n\n你应该会看到一些关于\
  \ Derby 在内存中创建数据库和表的日志。然后执行 `BookIT` 类，Maven 报告应告知你三个测试用例均成功通过：\n\n```\nResults\
  \ :\nTests run: 3 , Failures: 0, Errors: 0, Skipped: 0\n\n[INFO] ------------------------------------------------------------------------\n\
  [INFO] BUILD SUCCESS\n[INFO] ------------------------------------------------------------------------\n\
  [INFO] Total time: 5.192s\n[INFO] Finished\n[INFO] Final Memory: 18M/221M\n[INFO]\
  \ ------------------------------------------------------------------------\n```\n\
  \n使用 Derby 运行主类\n\n在执行 `Main` 类之前，你需要启动 Derby。最简单的方法是进入 `$DERBY_HOME/bin` 目录并执行\
  \ `startNetworkServer` 脚本。Derby 启动后，会在控制台中显示以下消息：\n\n```\nSecurity manager installed\
  \ using the Basic server security policy.\nApache Derby Network Server - 10.9.1.0\
  \ - (802917) started and ready to accept\nconnections on port 1527\n```\n\n\n\n\
  Derby 进程正在监听端口 1527，等待 JDBC 驱动程序发送任何 SQL 语句。要执行 `Main` 类，你可以使用 `java` 解释器命令，或按如下方式使用\
  \ `exec-maven-plugin`：\n\n```\n$ mvn exec:java\n```\n\n当你运行 `Main` 类时，会发生几件事。首先，一旦\
  \ `Book` 实体被初始化，Derby 将自动创建 `chapter04DB` 数据库。这是因为在 `persistence.xml` 文件中，你已将 `create=true`\
  \ 属性添加到了 JDBC URL 中。\n\n```\n<property name=\"javax.persistence.jdbc.url\" →\n        \
  \ value=\"jdbc:derby://localhost:1527/chapter04DB; create=true \"/>\n```\n\n这个快捷方式在开发模式下非常有用，因为你不需要任何\
  \ SQL 脚本来创建数据库。然后，`javax.persistence.schema-generation-action` 属性会通知 EclipseLink\
  \ 自动删除并创建 `BOOK` 表。最后，这本书会被插入到表中（并自动生成一个 ID）。\n\n让我们使用 Derby 命令来显示表结构：在控制台中输入 `ij`\
  \ 命令（如附录 A 所述，`$DERBY_HOME/bin` 目录必须在你的 `PATH` 变量中）。这将运行 Derby 解释器，你可以执行命令来连接数据库、显示\
  \ `chapter04DB` 数据库的表（`show tables`）、检查 `BOOK` 表的结构（`describe book`），甚至可以通过输入 SQL\
  \ 语句（如 `SELECT * FROM BOOK`）来显示其内容。\n\n```\n$ ij\nversion 10.9.1.0\n\nij> connect\
  \ 'jdbc:derby://localhost:1527/chapter04DB';\n\nij> show tables;\nTABLE_SCHEM    \
  \ |TABLE_NAME     |REMARKS\n\nAPP             | BOOK           |\nAPP            \
  \ | SEQUENCE       |\nij> describe book;\nCOLUMN_NAME   |TYPE_NAME|DEC&|NUM&|COLUM&|COLUMN_DEF|CHAR_OCTE&|IS_NULL&\n\
  \nID            |BIGINT   |0   |10  |19    |NULL      |NULL      |NO\nTITLE        \
  \ |VARCHAR  |NULL|NULL|255   |NULL      |510       |YES\nPRICE         |DOUBLE  \
  \ |NULL|2   |52    |NULL      |NULL      |YES\nILLUSTRATIONS |SMALLINT |0   |10  |5    \
  \ |0         |NULL      |YES\nDESCRIPTION   |VARCHAR  |NULL|NULL|255   |NULL      |510      \
  \ |YES\nISBN          |VARCHAR  |NULL|NULL|255   |NULL      |510       |YES\nNBOFPAGE      |INTEGER  |0  \
  \ |10  |10    |NULL      |NULL      |YES\n```\n\n回到 `Book` 实体的代码（清单 4-7），因为你使用了\
  \ `@GeneratedValue` 注解（用于自动生成 ID），EclipseLink 创建了一个序列表来存储编号（`SEQUENCE` 表）。对于 `BOOK`\
  \ 表结构，JPA 遵循了某些默认约定，根据实体名称和属性来命名表和列（例如，字符串被映射为 `VARCHAR(255)`）。\n\n检查生成的模式\n\n在清单\
  \ 4-10 描述的 `persistence.xml` 文件中，我们已通知 EclipseLink 生成数据库模式，以及创建删除和创建脚本，这要归功于以下属性：\n\
  \n```\n<property name=\"javax.persistence.schema-generation. database .action\"\
  \ →\n         value=\" drop-and-create \"/>\n<property name=\"javax.persistence.schema-generation.\
  \ scripts .action\" →\n         value=\" drop-and-create \"/>\n```\n\n默认情况下，提供者会生成两个\
  \ SQL 脚本：`createDDL.jdbc`（清单 4-13），其中包含创建整个数据库的所有 SQL 语句；以及 `dropDDL.jdbc`（清单 4-14），用于删除所有表。当你在持续集成过程中需要执行脚本来创建数据库时，这非常有用。\n\
  \n***清单 4-13.***  createDDL.jdbc 脚本\n\n```\nCREATE TABLE BOOK (ID BIGINT NOT NULL,\
  \ DESCRIPTION VARCHAR(255), →\n                   ILLUSTRATIONS SMALLINT DEFAULT\
  \ 0, ISBN VARCHAR(255), NBOFPAGE INTEGER, →\n                   PRICE FLOAT, TITLE\
  \ VARCHAR(255), PRIMARY KEY (ID))\nCREATE TABLE SEQUENCE (SEQ_NAME VARCHAR(50) NOT\
  \ NULL, SEQ_COUNT DECIMAL(15), →\n                       PRIMARY KEY (SEQ_NAME))\n\
  INSERT INTO SEQUENCE (SEQ_NAME, SEQ_COUNT) values ('SEQ_GEN', 0)\n```\n\n***清单 4-14.***  dropDDL.jdbc\
  \ 脚本\n\n```\nDROP TABLE BOOK\nDELETE FROM SEQUENCE WHERE SEQ_NAME = 'SEQ_GEN'\n\
  ```\n\n总结\n\n本章快速概述了 JPA 2.1。与大多数其他 Java EE 7 规范一样，JPA 专注于简单的对象架构，将其前身——重量级组件模型（即\
  \ EJB CMP 2.*x*）抛在身后。本章还涵盖了实体，这些实体是通过注解或 XML 映射元数据的持久化对象。\n\n通过“综合应用”部分，你已经了解了如何使用\
  \ EclipseLink 和 Derby 运行 JPA 应用程序。集成测试是项目中的一个重要主题，借助 JPA 和诸如 Derby 之类的内存数据库，现在测试持久化变得非常容易。\n\
  \n在接下来的章节中，你将了解更多关于 JPA 主要组件的内容。第 5 章将向你展示如何将实体、关系和继承映射到数据库。第 6 章将重点介绍实体管理器 API、JPQL\
  \ 语法，以及如何使用查询和锁定机制，同时还会解释实体的生命周期，以及如何在实体和监听器的回调方法中挂接业务逻辑。\n\n第 5 章\n\n![image](img/frontdot.jpg)\n\
  \n对象-关系映射\n\n在上一章中，我介绍了对象-关系映射（ORM）的基础知识，这基本上就是将实体映射到表，将属性映射到列。我还介绍了“例外配置”方法，它允许\
  \ JPA 提供者使用所有默认设置将实体映射到数据库表。但默认设置并不总是适用，尤其是当你将领域模型映射到现有数据库时。JPA 提供了丰富的元数据，因此你可以自定义映射。\n\
  \n在本章中，我将介绍基本映射，但也会重点介绍更复杂的映射，例如关系、组合和继承。领域模型由相互交互的对象组成。对象和数据库存储关系信息的方式不同（对象中使用引用，数据库中使用外键）。继承并不是关系数据库天然具备的特性，因此映射并不那么直观。在本章中，我将详细讲解并展示示例，演示如何将属性、关系和继承从领域模型映射到数据库。\n\
  \n基本映射\n\nJava 处理数据的方式与关系数据库处理数据的方式存在显著差异。在 Java 中，我们使用类来描述用于保存数据的属性以及用于访问和操作这些数据的方法。一旦我们定义了一个类，就可以使用\
  \ `new` 关键字创建任意数量的实例。在关系数据库中，数据存储在非对象结构（列和行）中，动态行为以表触发器和存储过程的形式功能性地存储，这些并不像对象那样与数据结构紧密绑定。有时，将\
  \ Java 对象映射到底层数据库可能很容易，并且可以应用默认规则。其他时候，这些规则无法满足你的需求，你必须自定义映射。基本映射注解侧重于自定义表、主键和列，它们允许你修改某些命名约定或类型（非空列、长度等）。\n\
  \n表\n\n\n\n异常配置映射规则规定，实体与表名相同（例如，`Book` 实体映射到 `BOOK` 表，`AncientBook` 实体映射到 `ANCIENTBOOK`\
  \ 表）。这在大多数情况下可能适合你，但你可能希望将数据映射到不同的表，甚至将单个实体映射到多个表。\n\n@Table\n\n`@javax.persistence.Table`\
  \ 注解可以更改与表相关的默认值。例如，你可以指定数据将存储的表名、目录和数据库模式。你还可以使用 `@UniqueConstraint` 注解与 `@Table`\
  \ 结合，为表定义唯一约束。如果省略了 `@Table` 注解，表名将与实体名相同。如果你想将表名改为 `T_BOOK` 而不是 `BOOK`，可以按照清单 5-1\
  \ 所示进行操作。\n\n***清单 5-1.***  将 Book 实体映射到 T_BOOK 表\n\n```\n@Entity\n@Table(name =\
  \ \"t_book\")\npublic class Book {\n\n@Id\n  private Long id;\n  private String\
  \ title;\n  private Float price;\n  private String description;\n  private String\
  \ isbn;\n  private Integer nbOfPage;\n  private Boolean illustrations;\n\n// 构造函数、getter、setter\n\
  }\n```\n\n![image](img/sq.jpg) **注意**  在 `@Table` 注解中，我使用了小写的表名（`t_book`）。默认情况下，大多数数据库会将实体映射为大写的表名（Derby\
  \ 就是如此），除非你配置它们区分大小写。\n\n@SecondaryTable\n\n到目前为止，我假设一个实体只映射到一个表，也称为*主表*。但有时当你有一个现有的数据模型时，你需要将数据分布到多个表，即*从表*。为此，你需要使用\
  \ `@SecondaryTable` 注解将一个从表关联到实体，或者使用 `@SecondaryTables`（带“`s`”）关联多个从表。你可以通过使用注解定义从表，然后为每个属性指定它属于哪个表（使用\
  \ `@Column` 注解，我将在“属性”部分更详细地描述），从而将实体的数据分布到主表和从表的列中。清单 5-2 展示了一个 `Address` 实体，其属性映射到一个主表和两个从表。\n\
  \n***清单 5-2.***  映射到三个不同表的 Address 实体属性\n\n```\n@Entity\n@SecondaryTables({\n  @SecondaryTable(name\
  \ = \"city\"),\n @SecondaryTable(name = \"country\")\n})\npublic class Address {\n\
  \n@Id\n  private Long id;\n  private String street1;\n  private String street2;\n\
  \  @Column(table = \"city\")\n  private String city;\n  @Column(table = \"city\"\
  )\n  private String state;\n  @Column(table = \"city\")\n  private String zipcode;\n\
  \  @Column(table = \"country\")\n  private String country;\n\n// 构造函数、getter、setter\n\
  }\n```\n\n默认情况下，`Address` 实体的属性映射到主表（其默认名称与实体名相同，因此表名为 `ADDRESS`）。`@SecondaryTables`\
  \ 注解表明存在两个从表：`CITY` 和 `COUNTRY`。然后你需要指定哪个属性存储在哪个从表中（使用 `@Column(table=\"city\")`\
  \ 或 `@Column(table=\"country\")` 注解）。图 5-1 展示了 `Address` 实体将要映射到的表结构。每个表包含不同的属性，但它们都具有相同的主键（用于连接表）。再次提醒，请记住\
  \ Derby 会将小写的表名（`city`）转换为大写（`CITY`）。\n\n![9781430246268_Fig05-01.jpg](img/9781430246268_Fig05-01.jpg)\n\
  \n图 5-1. Address 实体映射到三个表\n\n你现在可能已经明白，同一个实体可以有多个注解。如果你想重命名主表，可以添加 `@Table` 注解，如清单\
  \ 5-2 所示。\n\n***清单 5-2.***  主表重命名为 `T_ADDRESS`\n\n```\n@Entity\n@Table(name = \"\
  t_address\")\n@SecondaryTables({\n  @SecondaryTable(name = \"t_city\"),\n  @SecondaryTable(name\
  \ = \"t_country\")\n})\npublic class Address {\n\n// 属性、构造函数、getter、setter\n}\n\
  ```\n\n![image](img/sq.jpg) **注意**  当你使用从表时，必须考虑性能问题。每次访问实体时，持久化提供程序都会访问多个表并需要将它们连接起来。另一方面，当你拥有昂贵的属性（例如二进制大对象\
  \ BLOB）并希望将其隔离到不同的表中时，从表可能是一个好方法。\n\n主键\n\n在关系数据库中，主键唯一标识表中的每一行。它由单个列或一组列组成。主键必须唯一，因为它们标识单一行（不允许空值）。主键的示例包括客户标识符、电话号码、订单参考号和\
  \ ISBN。JPA 要求实体具有映射到主键的标识符，该标识符将遵循相同的规则：通过单个属性或一组属性（复合键）唯一标识一个实体。一旦分配，此实体的主键值就不能更新。\n\
  \n@Id 和 @GeneratedValue\n\n简单（即非复合）主键必须对应实体类的单个属性。你之前见过的 `@Id` 注解用于表示简单主键。`@javax.persistence.Id`\
  \ 将属性注解为唯一标识符。它可以是以下类型之一：\n\n*   *原始 Java 类型*：`byte`、`int`、`short`、`long`、`char`\n\
  *   *原始 Java 类型的包装类*：`Byte`、`Integer`、`Short`、`Long`、`Character`\n*   *原始类型或包装类型的数组*：`int[]`、`Integer[]`\
  \ 等。\n*   *字符串、数字和日期*：`java.lang.String`、`java.math.BigInteger`、`java.util.Date`、`java.sql.Date`\n\
  \n创建实体时，此标识符的值可以由应用程序手动生成，也可以由持久化提供程序使用 `@GeneratedValue` 注解自动生成。此注解可以有四种可能的值。\n\
  \n*   `SEQUENCE` 和 `IDENTITY` 分别指定使用数据库 SQL 序列或标识列。\n*   `TABLE` 指示持久化提供程序将序列名称及其当前值存储在一个表中，每次持久化实体的新实例时增加该值。例如，EclipseLink\
  \ 创建一个包含两列的 `SEQUENCE` 表：序列名称（任意名称）和序列值（由 Derby 自动递增的整数）。\n*   键的生成由底层持久化提供程序自动完成（`AUTO`），它将为特定数据库选择合适的策略（EclipseLink\
  \ 将使用 `TABLE` 策略）。`AUTO` 是 `@GeneratedValue` 注解的默认值。\n\n如果未定义 `@GeneratedValue`\
  \ 注解，则应用程序必须通过应用任何能返回唯一值的算法来创建自己的标识符。清单 5-3 中的代码展示了如何拥有一个自动生成的标识符。由于 `GenerationType.AUTO`\
  \ 是默认值，我可以省略 `strategy` 元素。请注意，属性 `id` 被注解了两次，一次使用 `@Id`，一次使用 `@GeneratedValue`。\n\
  \n***清单 5-3.***  具有自动生成标识符的 Book 实体\n\n```\n@Entity\npublic class Book {\n\n\n\n\
  @Id\n  @GeneratedValue(strategy = GenerationType.AUTO)\n  private Long id;\n  private\
  \ String title;\n  private Float price;\n  private String description;\n  private\
  \ String isbn;\n  private Integer nbOfPage;\n  private Boolean illustrations;\n\n\
  // 构造方法、getter、setter\n}\n```\n\n复合主键\n\n在映射实体时，最佳实践是指定一个专用列作为主键。然而，在某些情况下需要使用复合主键（例如必须映射到遗留数据库，或者主键需要遵循特定的业务规则——比如需要包含日期和数值，或国家代码和时间戳）。为此，必须定义一个主键类来表示复合键。然后，根据我们想要如何构建实体，有两种可用的注解来定义这个类：`@EmbeddedId`\
  \ 和 `@IdClass`。如你所见，最终结果相同，并且最终会得到相同的数据库模式，但查询实体的方式略有不同。\n\n例如，CD-BookStore 应用程序需要频繁地在主页上发布新闻，你可以看到关于书籍、音乐或艺术家的每日新闻。新闻包含内容、标题，并且由于可以用多种语言编写，因此还有一个语言代码（EN\
  \ 代表英语，PT 代表葡萄牙语等）。新闻的主键可以是标题和语言代码，因为一篇文章可以翻译成多种语言，但保留其原始标题。因此，主键类 `NewsId` 由两个\
  \ `String` 类型的属性组成：`title` 和 `language`。主键类必须包含 `equals()` 和 `hashCode()` 方法的定义，以便管理查询和内部集合（这些方法的相等性必须与数据库的相等性一致），并且其属性必须属于前面列出的有效类型集合。它们还必须是公共的，如果需要跨越架构层（例如，在持久层管理并在表示层使用），则必须实现\
  \ `Serializable`，并且要有一个无参构造方法。\n\n@EmbeddedId\n\n正如你将在本章后面看到的，JPA 使用了不同类型的嵌入对象。总结来说，嵌入对象没有任何标识（没有自己的主键），其属性最终会成为包含它的实体的表中的列。\n\
  \n清单 5-4 展示了 `NewsId` 类作为一个可嵌入类。它只是一个嵌入对象（使用 `@Embeddable` 注解），恰好由两个属性（`title` 和\
  \ `language`）组成。这个类必须有无参构造方法、getter、setter、`equals()` 和 `hashCode()` 的实现；也就是说，它需要遵循\
  \ JavaBean 约定。该类本身没有自己的标识（没有 `@Id` 注解）。这是可嵌入对象的一个特性。\n\n***清单 5-4.***  主键类使用 @Embeddable\
  \ 注解\n\n```\n@Embeddable\npublic class NewsId {\n\nprivate String title;\n  private\
  \ String language;\n\n// 构造方法、getter、setter、equals 和 hashcode\n}\n```\n\n然后，清单 5-5\
  \ 中展示的 `News` 实体必须使用 `@EmbeddedId` 注解来嵌入主键类 `NewsId`。使用这种方法，无需使用 `@Id`。每个 `@EmbeddedId`\
  \ 必须引用一个标记为 `@Embeddable` 的可嵌入类。\n\n***清单 5-5.***  实体使用 @EmbeddedId 嵌入主键类\n\n```\n\
  @Entity\npublic class News {\n\n@EmbeddedId\n  private NewsId id;\n  private String\
  \ content;\n\n// 构造方法、getter、setter\n}\n```\n\n在下一章中，我将描述如何使用主键查找实体。这里先初步了解一下它的工作原理：主键是一个带有构造方法的类。你需要使用构成唯一键的值来实例化这个类，并将此对象传递给实体管理器（`em`\
  \ 属性），如下面的代码所示：\n\n```\nNewsId pk = new NewsId(\"Richard Wright has died on September\
  \ 2008\", \"EN\")\nNews news = em.find(News.class, pk );\n```\n\n@IdClass\n\n声明复合键的另一种方法是通过\
  \ `@IdClass` 注解。这是一种不同的方法，主键类上的每个属性也需要在实体类上声明，并使用 `@Id` 注解。\n\n清单 5-6 中的示例 `NewsId`\
  \ 复合主键只是一个 POJO，不需要任何注解（在 清单 5-5 的先前示例中，主键类需要使用 `@EmbeddedId` 注解）。\n\n***清单 5-6.***  主键类没有注解\n\
  \n```\npublic class NewsId {\n\nprivate String title;\n  private String language;\n\
  \n// 构造方法、getter、setter、equals 和 hashcode\n}\n```\n\n然后，清单 5-7 中展示的实体 `News` 必须使用\
  \ `@IdClass` 注解来定义主键，并使用 `@Id` 注解每个键。要持久化 `News` 实体，你需要为 `title` 和 `language` 属性设置值。\n\
  \n***清单 5-7.***  实体使用 @IdClass 注解定义其主键类\n\n```\n@Entity\n@IdClass(NewsId.class)\n\
  public class News {\n\n@Id private String title;\n@Id private String language;\n\
  private String content;\n\n// 构造方法、getter、setter\n}\n```\n\n`@EmbeddedId` 和 `@IdClass`\
  \ 这两种方法都会映射到相同的表结构。该结构在清单 5-8 中使用数据定义语言（DDL）定义。实体和主键的属性最终会位于同一个表中，主键将由复合类的属性（`title`\
  \ 和 `language`）构成。\n\n***清单 5-8.***  具有复合主键的 NEWS 表的 DDL\n\n```\ncreate table NEWS\
  \ (\n    CONTENT VARCHAR(255),\n    TITLE VARCHAR(255) not null,\n    LANGUAGE VARCHAR(255)\
  \ not null,\n    primary key (TITLE, LANGUAGE)\n);\n```\n\n`@IdClass` 方法更容易出错，因为你需要在\
  \ `@IdClass` 和实体中都定义每个主键属性，并注意使用相同的名称和 Java 类型。其优点是你不需要更改主键类的代码（不需要注解）。例如，你可以使用一个遗留类，由于法律原因你不能修改它，但可以重用。\n\
  \n一个明显的区别在于你在 JPQL 中引用实体的方式。对于 `@IdClass`，你会像下面这样做：\n\n```\nselect n.title from\
  \ News n\n```\n\n使用 `@EmbeddedId`，你会得到类似下面的结果：\n\n```\nselect n. newsId .title from\
  \ News n\n```\n\n属性\n\n一个实体必须有一个主键（简单或复合）才能在关系数据库中拥有标识。它还有各种不同的属性，构成其状态，这些属性必须映射到表中。这个状态几乎可以包含你想要映射的任何\
  \ Java 类型。\n\n*   Java 原始类型（`int`、`double`、`float` 等）及其包装类（`Integer`、`Double`、`Float`\
  \ 等）；\n*   字节和字符数组（`byte[]`、`Byte[]`、`char[]`、`Character[]`）；\n*   String、大数值和时间类型（`java.lang.String`、`java.math.BigInteger`、`java.math.BigDecimal`、`java.util.Date`、`java.util.Calendar`、`java.sql.Date`、`java.sql.Time`、`java.sql.Timestamp`）；\n\
  *   枚举类型和实现了 `Serializable` 接口的用户自定义类型；以及\n*   基本类型和可嵌入类型的集合。\n\n当然，一个实体也可以拥有实体属性、实体集合或可嵌入类。这需要引入实体之间的关系（这将在“关系映射”部分中介绍）。\n\
  \n\n\n如您所见，通过“例外配置”方式，属性会使用默认映射规则进行映射。然而，有时您需要自定义部分映射。这时就需要用到 JPA 注解（或其等效的 XML 配置）。\n\
  \n@Basic\n\n可选的 `@javax.persistence.Basic` 注解（见清单 5-9）是最简单的数据库列映射类型，因为它覆盖了基本的持久化行为。\n\
  \n***清单 5-9.***  @Basic 注解元素\n\n```\n@Target({METHOD, FIELD}) @Retention(RUNTIME)\n\
  public @interface Basic {\n  FetchType fetch () default EAGER;\n  boolean optional\
  \ () default true;\n}\n```\n\n该注解有两个参数：`optional` 和 `fetch`。`optional` 元素提示属性的值是否可以为\
  \ null。对于原始类型，该设置会被忽略。`fetch` 元素可以取两个值：`LAZY` 或 `EAGER`。它向持久化提供程序运行时提示数据应该被延迟加载（仅在应用程序请求该属性时）还是立即加载（在提供程序初始加载实体时）。\n\
  \n例如，以清单 5-10 中所示的 `Track` 实体为例。一张 CD 专辑由多个曲目组成，每个曲目都有标题、描述以及一个特定时长的 WAV 文件供您收听。WAV\
  \ 文件是一个可能长达数兆字节的 BLOB。当您访问 `Track` 实体时，您不希望立即加载 WAV 文件；您可以使用 `@Basic(fetch = FetchType.LAZY)`\
  \ 注解该属性，这样数据将从数据库中延迟检索（例如，仅在您通过其 getter 方法访问 `wav` 属性时）。\n\n***清单 5-10.***  对 WAV\
  \ 属性进行延迟加载的 Track 实体\n\n```\n@Entity\npublic class Track {\n\n@Id @GeneratedValue(strategy\
  \ = GenerationType.AUTO)\n  private Long id;\n  private String title;\n  private\
  \ Float duration;\n  @Basic(fetch = FetchType.LAZY)\n  @Lob\n  private byte[] wav;\n\
  \  private String description;\n\n// 构造方法、getter、setter\n}\n```\n\n请注意，类型为 `byte[]`\
  \ 的 `wav` 属性也使用了 `@Lob` 注解，以便将值存储为大对象（LOB）。能够存储此类大对象的数据库列需要特殊的 JDBC 调用才能从 Java 访问。为了告知提供程序，必须在基本映射上添加额外的\
  \ `@Lob` 注解。\n\n@Column\n\n`@javax.persistence.Column` 注解（如清单 5-11 所示）定义了列的属性。您可以更改列名（默认情况下，列名映射到同名的属性）；指定大小；以及授权（或不授权）列允许空值、唯一、或允许其值可更新或可插入。清单\
  \ 5-11 展示了 `@Column` 注解的 API，包括其元素及其默认值。\n\n***清单 5-11.***  @Column 注解元素\n\n```\n\
  @Target({METHOD, FIELD}) @Retention(RUNTIME)\npublic @interface Column {\n  String\
  \ name() default \"\";\n  boolean unique() default false;\n  boolean nullable()\
  \ default true;\n  boolean insertable() default true;\n  boolean updatable() default\
  \ true;\n  String columnDefinition() default \"\";\n  String table() default \"\"\
  ;\n  int length() default 255;\n  int precision() default 0; // 十进制精度\n  int scale()\
  \ default 0;     // 十进制小数位数\n}\n```\n\n要重新定义原始 `Book` 实体（清单 5-1）的默认映射，您可以通过多种方式使用\
  \ `@Column` 注解（见清单 5-12）。例如，您可以更改 `title` 和 `nbOfPage` 列的名称，或 `description` 列的长度，并且不允许空值。请注意，并非数据类型上所有属性的组合都是有效的（例如，`length`\
  \ 仅适用于字符串类型的列，`scale` 和 `precision` 仅适用于十进制列）。\n\n***清单 5-12.***  自定义 Book 实体的映射\n\
  \n```\n@Entity\npublic class Book {\n\n@Id @GeneratedValue(strategy = GenerationType.AUTO)\n\
  \  private Long id;\n  @Column(name = \"book_title\", nullable = false, updatable\
  \ = false)\n  private String title;\n  private Float price;\n  @Column(length =\
  \ 2000)\n  private String description;\n  private String isbn;\n  @Column(name =\
  \ \"nb_of_page\", nullable = false)\n  private Integer nbOfPage;\n  private Boolean\
  \ illustrations;\n\n// 构造方法、getter、setter\n}\n```\n\n清单 5-12 中的 `Book` 实体将被映射到清单\
  \ 5-13 中定义的表。\n\n***清单 5-13.***  BOOK 表定义\n\n```\ncreate table BOOK (\n  ID BIGINT\
  \ not null,\n  BOOK_TITLE VARCHAR(255) not null ,\n  PRICE DOUBLE(52, 0),\n  DESCRIPTION\
  \ VARCHAR( 2000 ),\n  ISBN VARCHAR(255),\n  NB_OF_PAGE INTEGER not null ,\n  ILLUSTRATIONS\
  \ SMALLINT,\n  primary key (ID)\n);\n```\n\n`@Column` 注解的大多数元素都会影响映射。如果您将 `description`\
  \ 属性的长度更改为 `2000`，则目标列的长度也将设置为 `2000`。`updatable` 和 `insertable` 设置默认为 `true`，这意味着任何属性都可以在数据库中被插入或更新，并在运行时产生影响。当您希望持久化提供程序确保不会因实体中的更改而向表插入或更新数据时，可以将它们设置为\
  \ `false`。请注意，这并不意味着实体属性在内存中不会改变。您仍然可以在内存中更改该值，但它不会与数据库同步。这是因为生成的 SQL 语句（`INSERT`\
  \ 或 `UPDATE`）将不会包含这些列。换句话说，这些元素不影响关系映射；它们影响实体管理器在访问关系数据时的动态行为。\n\n![image](img/sq.jpg)\
  \ **注意** 如第 3 章所述，Bean Validation 仅在 Java 空间内定义约束。因此，`@NotNull` 被解读为一段检查属性值不为 null\
  \ 的 Java 代码。另一方面，JPA 的 `@Column(nullable = false)` 用于数据库空间，以生成数据库模式。JPA 和 Bean Validation\
  \ 的注解可以共存于一个属性上。\n\n@Temporal\n\n在 Java 中，您可以使用 `java.util.Date` 和 `java.util.Calendar`\
  \ 来存储数据，然后可以有多种表示形式，例如日期、小时或毫秒。为了在 ORM 中指定这一点，您可以使用 `@javax.persistence.Temporal`\
  \ 注解。该注解有三个可能的值：`DATE`、`TIME` 或 `TIMESTAMP` 精度（即实际日期、仅时间或两者兼有）。清单 5-14 定义了一个 `Customer`\
  \ 实体，它有一个出生日期和一个存储其在系统中创建精确时间的技术属性（这使用了 `TIMESTAMP` 值）。\n\n***清单 5-14.***  包含两个\
  \ @Temporal 属性的 Customer 实体\n\n```\n@Entity\npublic class Customer {\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  private String firstName;\n  private String lastName;\n \
  \ private String email;\n  private String phoneNumber;\n  @Temporal(TemporalType.DATE)\n\
  \  private Date dateOfBirth;\n  @Temporal(TemporalType.TIMESTAMP)\n  private Date\
  \ creationDate;\n\n// 构造方法、getter、setter\n}\n```\n\n清单 5-14 中的 `Customer` 实体将被映射到清单\
  \ 5-15 中定义的表。`dateOfBirth` 属性映射到类型为 `DATE` 的列，`creationDate` 属性映射到类型为 `TIMESTAMP`\
  \ 的列。\n\n***清单 5-15.***  CUSTOMER 表定义\n\n\n\n```\ncreate table CUSTOMER (\n  ID\
  \ BIGINT not null,\n  FIRSTNAME VARCHAR(255),\n  LASTNAME VARCHAR(255),\n  EMAIL\
  \ VARCHAR(255),\n  PHONENUMBER VARCHAR(255),\n  DATEOFBIRTH DATE ,\n  CREATIONDATE\
  \ TIMESTAMP ,\n  primary key (ID)\n);\n```\n\n@Transient\n\n使用 JPA 时，一旦某个类被 `@Entity`\
  \ 注解标记，其所有属性都会自动映射到数据库表。如果某个属性不需要映射，可以使用 `@javax.persistence.Transient` 注解或 Java\
  \ 的 `transient` 关键字。例如，以同一个 `Customer` 实体为例，为其添加一个 `age` 属性（参见清单 5-16）。由于年龄可以根据出生日期自动计算得出，因此\
  \ `age` 属性无需映射，可以设置为 transient。\n\n***清单 5-16.***  包含瞬态年龄属性的 Customer 实体\n\n```\n\
  @Entity\npublic class Customer {\n\n@Id @GeneratedValue\n  private Long id;\n  private\
  \ String firstName;\n  private String lastName;\n  private String email;\n  private\
  \ String phoneNumber;\n  @Temporal(TemporalType.DATE)\n  private Date dateOfBirth;\n\
  \  @Transient\n  private Integer age;\n  @Temporal(TemporalType.TIMESTAMP)\n  private\
  \ Date creationDate;\n\n// 构造方法、getter、setter\n}\n```\n\n因此，`age` 属性不需要映射到任何 `AGE`\
  \ 列。\n\n@Enumerated\n\nJava SE 5 引入了枚举类型，如今它们的使用非常频繁，已成为开发者日常工作中的常见部分。枚举的值是常量，并且具有隐式的序数赋值，该赋值由枚举常量声明的顺序决定。这个序数在运行时无法修改，但可用于将枚举类型的值存储到数据库中。清单\
  \ 5-17 展示了一个信用卡类型的枚举。\n\n***清单 5-17.***  信用卡类型枚举\n\n```\npublic enum CreditCardType\
  \ {\n  VISA,\n  MASTER_CARD,\n  AMERICAN_EXPRESS\n}\n```\n\n在编译时，此枚举类型各值被分配的序数分别为：`VISA`\
  \ 为 `0`，`MASTER_CARD` 为 `1`，`AMERICAN_EXPRESS` 为 `2`。默认情况下，持久化提供程序会将该枚举类型映射到数据库，并假定列的类型为\
  \ `Integer`。查看清单 5-18 中的代码，你会看到一个 `CreditCard` 实体，它使用上述枚举类型并采用了默认映射。\n\n***清单 5-18.***\
  \  使用序数映射枚举类型\n\n```\n@Entity\n@Table(name = \"credit_card\")\npublic class CreditCard\
  \ {\n\n@Id\n  private String number;\n  private String expiryDate;\n  private Integer\
  \ controlNumber;\n  private CreditCardType creditCardType;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n由于应用了默认设置，该枚举将被映射到一个整数列，并且可以正常工作。但想象一下，如果在枚举的顶部引入一个新的常量。由于序数赋值由常量声明的顺序决定，数据库中已存储的值将不再与枚举匹配。更好的解决方案是将值的名称存储为字符串，而不是存储序数。你可以通过向属性添加\
  \ `@Enumerated` 注解并指定值为 `STRING`（`ORDINAL` 是默认值）来实现这一点，如清单 5-19 所示。\n\n***清单 5-19.***\
  \  使用字符串映射枚举类型\n\n```\n@Entity\n@Table(name = \"credit_card\")\npublic class CreditCard\
  \ {\n\n@Id\n  private String number;\n  private String expiryDate;\n  private Integer\
  \ controlNumber;\n  @Enumerated(EnumType.STRING)\n  private CreditCardType creditCardType;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n现在，`CreditCardType` 数据库列的类型将为 `VARCHAR`，并且 Visa\
  \ 卡将以字符串 `\"VISA\"` 的形式存储。\n\n访问类型\n\n到目前为止，我向你展示了注解类（`@Entity` 或 `@Table`）和属性（`@Basic`、`@Column`、`@Temporal`\
  \ 等），但应用于属性（或字段访问）的注解也可以设置在相应的 getter 方法（或属性访问）上。例如，`@Id` 注解可以设置在 `id` 属性上，也可以设置在\
  \ `getId()` 方法上。由于这在很大程度上是个人偏好问题，我倾向于使用属性访问（注解 getter 方法），因为我觉得这样代码可读性更好。这让我能够快速读取实体的属性，而不会被注解淹没。在本书中，为了便于阅读，我决定注解属性。但在某些情况下（例如，涉及继承时），这不仅仅是个人品味问题，因为它可能会影响你的映射。\n\
  \n![image](img/sq.jpg) **注意** Java 将字段定义为实例属性。属性是指任何遵循 Java Bean 模式（对于 `Boolean`\
  \ 类型，以 `getXXX`、`setXXX` 或 `isXXX` 开头）并具有访问器（getter 和 setter）方法的字段。\n\n在选择字段访问（属性）或属性访问（getter\
  \ 方法）时，你实际上是在指定*访问类型*。默认情况下，一个实体应用单一的访问类型：要么是字段访问，要么是属性访问，但不能同时使用两者（即持久化提供程序要么通过属性，要么通过\
  \ getter 方法来访问持久化状态）。规范指出，在未明确指定访问类型的情况下，混合在字段和属性上放置注解的应用程序的行为是未定义的。当你使用基于字段的访问时（参见清单\
  \ 5-20），持久化提供程序会映射这些属性。\n\n***清单 5-20.***  带有注解字段的 Customer 实体\n\n```\n@Entity\n\
  public class Customer {\n\n@Id @GeneratedValue\n  private Long id;\n  @Column(name\
  \ = \"first_name\", nullable = false, length = 50)\n  private String firstName;\n\
  \  @Column(name = \"last_name\", nullable = false, length = 50)\n  private String\
  \ lastName;\n  private String email;\n  @Column(name = \"phone_number\", length\
  \ = 15)\n  private String phoneNumber;\n\n// 构造方法、getter、setter\n}\n```\n\n当你使用基于属性的访问时，如清单\
  \ 5-21 所示，映射基于 getter 方法而非属性。所有未使用 `@Transient` 注解的 getter 方法都是持久的。\n\n***清单 5-21.***\
  \  带有注解属性的 Customer 实体\n\n```\n@Entity\npublic class Customer {\n\nprivate Long\
  \ id;\n  private String firstName;\n  private String lastName;\n  private String\
  \ email;\n  private String phoneNumber;\n\n// 构造方法\n\n@Id @GeneratedValue\n  public\
  \ Long getId() {\n    return id;\n  }\n  public void setId(Long id) {\n    this.id\
  \ = id;\n  }\n\n@Column(name = \"first_name\", nullable = false, length = 50)\n\
  \  public String getFirstName() {\n    return firstName;\n  }\n  public void setFirstName(String\
  \ firstName) {\n    this.firstName = firstName;\n  }\n\n@Column(name = \"last_name\"\
  , nullable = false, length = 50)\n  public String getLastName() {\n    return lastName;\n\
  \  }\n  public void setLastName(String lastName) {\n    this.lastName = lastName;\n\
  \  }\n\npublic String getEmail() {\n    return email;\n  }\n  public void setEmail(String\
  \ email) {\n    this.email = email;\n  }\n\n@Column(name = \"phone_number\", length\
  \ = 15)\n  public String getPhoneNumber() {\n    return phoneNumber;\n  }\n  public\
  \ void setPhoneNumber(String phoneNumber) {\n    this.phoneNumber = phoneNumber;\n\
  \  }\n}\n```\n\n就映射而言，清单 5-20 和清单 5-21 中的两个实体是完全相同的，因为属性名称恰好与 getter 方法名称相同。但是，除了使用默认访问类型之外，你还可以通过\
  \ `@javax.persistence.Access` 注解来显式指定访问类型。\n\n\n\n此注解接受两个可能的值：`FIELD` 或 `PROPERTY`，可用于实体本身和/或每个属性或\
  \ getter 方法上。例如，当在实体上应用 `@Access(AccessType.FIELD)` 时，持久化提供程序将仅考虑放置在属性上的映射注解。然后，可以通过\
  \ `@Access(AccessType.PROPERTY)` 有选择地指定单个 getter 方法进行属性访问。\n\n显式访问类型可能非常有用（例如，在可嵌入类和继承中），但混合使用它们通常会导致错误。清单\
  \ 5-22 展示了一个混合访问类型时可能发生的情况的示例。\n\n***清单 5-22.***  显式混合访问类型的 Customer 实体\n\n```\n\
  @Entity\n@Access(AccessType.FIELD)\npublic class Customer {\n\n@Id @GeneratedValue\n\
    private Long id;\n  @Column(name = \"first_name\", nullable = false, length =\
  \ 50)\n  private String firstName;\n  @Column(name = \"last_name\", nullable = false,\
  \ length = 50)\n  private String lastName;\n  private String email;\n  @Column(name\
  \ = \"phone_number\", length = 15)\n  private String phoneNumber;\n\n// 构造函数、getter、setter\n\
  \n@Access(AccessType.PROPERTY)\n  @Column(name = \"phone_number\", length = 555)\n\
    public String getPhoneNumber() {\n    return phoneNumber;\n  }\n  public void\
  \ setPhoneNumber(String phoneNumber) {\n    this.phoneNumber = phoneNumber;\n  }\n\
  }\n```\n\n清单 5-22 中的示例在实体级别显式地将访问类型定义为 `FIELD`。这向持久化管理器指示它只应处理属性上的注解。`phoneNumber`\
  \ 属性使用 `@Column` 注解，将其长度限制为 15。阅读此代码，您期望在数据库中最终得到一个 `VARCHAR(15)`，但实际情况并非如此。getter\
  \ 方法显示 `getPhoneNumber()` 方法的访问类型已被显式更改，电话号码的长度也已更改（改为 `555`）。在这种情况下，实体级别的 `AccessType.FIELD`\
  \ 被 `AccessType.PROPERTY` 覆盖。然后，您将在数据库中得到一个 `VARCHAR(555)`。\n\n基本类型的集合\n\n在 Java\
  \ 中，事物的集合非常常见。在接下来的章节中，您将学习实体之间的关系（可以是实体的集合）。基本上，这意味着一个实体拥有其他实体或可嵌入类的集合。在映射方面，每个实体都映射到自己的表，并在主键和外键之间创建引用。如您所知，实体是一个具有标识和许多其他属性的\
  \ Java 类。但是，如果您只需要存储诸如 `String` 或 `Integer` 之类的 Java 类型的集合呢？从 JPA 2.0 开始，您可以使用 `@ElementCollection`\
  \ 和 `@CollectionTable` 注解轻松做到这一点，而无需经历创建单独类的麻烦。\n\n我们使用 `@ElementCollection` 注解来指示类型为\
  \ `java.util.Collection` 的属性包含基本类型（即非实体）或可嵌入类（更多信息请参见“可嵌入类”部分）实例的集合。实际上，此属性可以是以下类型：\n\
  \n*   `java.util.Collection:` 集合层次结构中的通用根接口。\n*   `java.util.Set:` 防止插入重复元素的集合。\n\
  *   `java.util.List:` 当需要按用户定义的顺序检索元素时使用的集合。\n\n此外，`@CollectionTable` 注解允许您自定义集合表的详细信息（即连接实体表和基本类型表的表），例如其名称。如果缺少此注解，表名将是包含实体的名称和集合属性的名称的拼接，中间用下划线分隔。\n\
  \n再次使用 `Book` 实体示例，让我们看看如何添加一个属性来存储标签。如今，标签和标签云无处不在；它们对于数据排序非常有用，因此假设在此示例中，您希望为一本书添加尽可能多的标签来描述它并快速找到它。标签只是一个\
  \ String，因此 `Book` 实体可以有一个 String 集合来存储此信息，如清单 5-23 所示。\n\n***清单 5-23.***  包含 String\
  \ 集合的 Book 实体\n\n```\n@Entity\npublic class Book {\n\n@Id @GeneratedValue\n  private\
  \ Long id;\n  private String title;\n  private Float price;\n  private String description;\n\
    private String isbn;\n  private Integer nbOfPage;\n  private Boolean illustrations;\n\
    @ElementCollection(fetch = FetchType.LAZY)\n  @CollectionTable(name = \"Tag\"\
  )\n  @Column(name = \"Value\")\n  private List<String> tags = new ArrayList<>();\n\
  \n// 构造函数、getter、setter\n}\n```\n\n清单 5-23 中的 `@ElementCollection` 注解用于通知持久化提供程序\
  \ `tags` 属性是一个 String 列表，并且应该延迟加载。如果缺少 `@CollectionTable`，表名默认为 `BOOK_TAGS`（包含实体的名称和集合属性的名称的拼接，中间用下划线分隔），而不是像\
  \ name 元素（`name = \"Tag\"`）中指定的那样为 `TAG`。请注意，我添加了一个补充的 `@Column` 注解来将列重命名为 `VALUE`（否则，该列将像属性一样命名为\
  \ `TAGS`）。图 5-2 显示了结果。\n\n![9781430246268_Fig05-02.jpg](img/9781430246268_Fig05-02.jpg)\n\
  \n图 5-2. BOOK 表和 TAG 表之间的关系\n\n![image](img/sq.jpg) **注意**  在 JPA 1.0 中，这些注解不存在。但是，您仍然可以将基本类型列表作为\
  \ BLOB 存储在数据库中。为什么？因为 `java.util.ArrayList` 实现了 `Serializable`，并且 JPA 可以自动将 `Serializable`\
  \ 对象映射到 BLOB。但是，如果您改用 `java.util.List`，则会抛出异常，因为它不扩展 `Serializable`。`@ElementCollection`\
  \ 是一种更优雅、更有用的存储基本类型列表的方式。将列表存储在不可访问的二进制格式中会使其对查询不透明，并且不可移植到其他语言（因为只有 Java 运行时可以利用底层的序列化对象——Ruby、PHP\
  \ 等不行）。\n\n基本类型的 Map\n\n与集合一样，Map 对于存储数据非常有用。在 JPA 1.0 中，键只能是基本数据类型，值只能是实体。现在，Map\
  \ 可以包含基本类型、可嵌入对象和实体作为键或值的任意组合，这为映射带来了显著的灵活性。但让我们专注于基本类型的 Map。\n\n当 Map 使用基本类型时，`@ElementCollection`\
  \ 和 `@CollectionTable` 注解的使用方式与之前看到的集合相同。然后使用集合表来存储 Map 的数据。\n\n让我们举一个包含曲目的 CD 专辑的例子（参见清单\
  \ 5-24）。一个曲目可以被视为一个标题和一个位置（专辑的第一首曲目、第二首曲目等）。然后，您可以有一个曲目的 Map，其中整数表示位置（Map 的键），String\
  \ 表示标题（Map 的值）。\n\n***清单 5-24.***  包含曲目 Map 的 CD 专辑\n\n```\n@Entity\npublic class\
  \ CD {\n\n@Id @GeneratedValue\n  private Long id;\n  private String title;\n  private\
  \ Float price;\n  private String description;\n  @Lob\n  private byte[] cover;\n\
    @ElementCollection\n  @CollectionTable(name=\"track\")\n  @MapKeyColumn (name\
  \ = \"position\")\n  @Column(name = \"title\")\n  private Map<Integer, String> tracks\
  \ = new HashMap<>();\n\n// 构造函数、getter、setter\n}\n```\n\n\n\n如前所述，`@ElementCollection`\
  \ 注解用于指示存储在集合表中的映射对象。`@CollectionTable` 注解将集合表的默认名称更改为 `TRACK`。\n\n与集合的不同之处在于引入了一个新注解：`@MapKeyColumn`。该注解用于指定映射键列的映射。如果未指定，则列名由引用关系属性名称和\
  \ `_KEY` 拼接而成。清单 5-24 展示了将该注解从默认值（`TRACK_KEY`）重命名为 `POSITION`，使其更清晰。\n\n`@Column`\
  \ 注解表示包含映射值的列应重命名为 `TITLE`。图 5-3 展示了结果。\n\n![9781430246268_Fig05-03.jpg](img/9781430246268_Fig05-03.jpg)\n\
  \n图 5-3. CD 表与 TRACK 表之间的关系\n\n### 使用 XML 进行映射\n\n现在你已经更熟悉使用注解进行基本映射，让我们来看看 XML\
  \ 映射。如果你使用过对象关系框架（如早期版本的 Hibernate），你会熟悉如何在单独的 XML 部署描述符文件中映射实体。从本章开始，你还没有看到一行 XML，只有注解。JPA\
  \ 也提供了一种可选的 XML 语法来映射实体。我不会深入讨论 XML 映射的细节，因为我决定专注于注解（因为它们在书中更容易使用，并且大多数开发者选择注解而非\
  \ XML 映射）。请记住，你在本章中看到的每一个注解都有对应的 XML 形式，如果我全部覆盖，这一节会非常庞大。我鼓励你查阅 JPA 2.1 规范的第 12\
  \ 章（XML 对象/关系映射描述符），其中更详细地介绍了所有 XML 标签。\n\nXML 部署描述符是使用注解的一种替代方案。然而，尽管每个注解都有对应的\
  \ XML 标签，反之亦然，但有一个区别在于 XML 会覆盖注解。如果你用某个值注解了一个属性或实体，同时部署了一个具有不同值的 XML 描述符，那么 XML\
  \ 将优先。\n\n问题是，什么时候应该使用注解而不是 XML，以及为什么？首先，这是一个品味问题，因为两者的行为完全相同。当元数据确实与代码耦合时（例如，主键），使用注解是有意义的，因为元数据只是程序的另一个方面。其他类型的元数据，如列长度或其他模式细节，可以根据部署环境进行更改（例如，开发、测试或生产环境中的数据库模式不同）。当基于\
  \ JPA 的产品需要支持多个不同的数据库供应商时，也会出现类似的情况。某些 `id` 生成、列选项等可能需要根据所使用的数据库类型进行调整。这最好在外部 XML\
  \ 部署描述符（每个环境一个）中表达，这样代码就不必修改。\n\n让我们再次回到 `Book` 实体示例。这次假设你有两个环境，并且希望将 `Book` 实体映射到开发环境中的\
  \ `BOOK` 表，以及测试环境中的 `BOOK_XML_MAPPING` 表。该类将仅使用 `@Entity` 注解（参见清单 5-25），并且不包含关于它应映射到的表的信息（即，它将没有\
  \ `@Table` 注解）。`@Id` 注解将主键定义为自动生成，而 `@Column` 注解将 `description` 的大小设置为 500 个字符。\n\
  \n***清单 5-25.***  仅包含少量注解的 Book 实体\n\n```\n@Entity\npublic class Book {\n  @Id @GeneratedValue\n\
    private Long id;\n  private String title;\n  private Float price;\n  @Column(length\
  \ = 500)\n  private String description;\n  private String isbn;\n  private Integer\
  \ nbOfPage;\n  private Boolean illustrations;\n  // 构造方法、getter、setter\n}\n```\n\
  \n在一个单独的 `book_mapping.xml` 文件（参见清单 5-26）中，遵循指定的 XML 模式，你可以更改实体任何数据的映射。`<table>`\
  \ 标签允许你更改实体将映射到的表名（`BOOK_XML_MAPPING` 而不是默认的 `BOOK`）。在 `<attributes>` 标签内，你可以自定义属性，不仅指定它们的名称和长度，还可以指定它们与其他实体的关系。例如，你可以更改\
  \ `title` 列和页数（`nbOfPage`）的映射。\n\n***清单 5-26.***  映射文件 META-INF/book_mapping.xml\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<entity-mappings xmlns=\" http://java.sun.com/xml/ns/persistence/orm\
  \ \"\n                 xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\
  \n                 xsi:schemaLocation=\" http://java.sun.com/xml/ns/persistence/orm\
  \ →\n                 http://java.sun.com/xml/ns/persistence/orm_2_1.xsd \"\n                \
  \ version=\"2.1\">\n\n<entity class=\"org.agoncal.book.javaee7.chapter05.Book\"\
  >\n    <table name=\"book_xml_mapping\"/>\n    <attributes>\n      <basic name=\"\
  title\">\n        < column name=\"book_title\" nullable=\"false\" updatable=\"false\"\
  />\n      </basic>\n      <basic name=\"description\">\n        < column length=\"\
  \ 2000 \"/>\n      </basic>\n\n<basic name=\"nbOfPage\">\n        < column name=\"\
  nb_of_page\" nullable=\"false\"/>\n      </basic>\n    </attributes>\n  </entity>\n\
  \n</entity-mappings>\n```\n\n一个需要始终牢记的重要概念是，XML 优先于注解。即使 `description` 属性由 `@Column(length\
  \ = 500)` 注解，实际使用的列长度是 `book_mapping.xml` 文件（清单 5-26）中的 `2000`。这可能会令人困惑，因为你在代码中看到\
  \ `500`，然后检查 DDL 却看到 `2000`；请始终记得检查 XML 部署描述符。\n\n合并 XML 元数据和注解元数据的结果是，`Book` 实体将被映射到清单\
  \ 5-27 中定义的 `BOOK_XML_MAPPING` 表结构。如果你想完全忽略注解并仅使用 XML 定义映射，你可以将 `<xml-mapping-metadata-complete>`\
  \ 标签添加到 `book_mapping.xml` 文件中（在这种情况下，即使 XML 不包含覆盖，所有注解也将被忽略）。\n\n***清单 5-27.***  BOOK_XML_MAPPING\
  \ 表结构\n\n```\ncreate table BOOK_XML_MAPPING (\n  ID BIGINT not null,\n  BOOK_TITLE\
  \ VARCHAR(255) not null,\n  DESCRIPTION VARCHAR( 2000 ),\n  NB_OF_PAGE INTEGER not\
  \ null,\n  PRICE DOUBLE(52, 0),\n  ISBN VARCHAR(255),\n  ILLUSTRATIONS SMALLINT,\n\
    primary key (ID)\n);\n```\n\n要使这一切生效，还缺少一条信息。在你的 `persistence.xml` 文件中，你需要引用 `book_mapping.xml`\
  \ 文件，为此你必须使用 `<mapping-file>` 标签。`persistence.xml` 定义了实体持久化上下文及其应映射到的数据库。它是持久化提供者引用外部\
  \ XML 映射所需的核心信息。将 `Book` 实体与两个 XML 文件一起部署在 `META-INF` 目录中，就完成了（参见清单 5-28）。\n\n***清单\
  \ 5-28.***  引用外部映射文件的 persistence.xml 文件\n\n\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<persistence xmlns=\" http://java.sun.com/xml/ns/persistence \"\n            \
  \ xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n             xsi:schemaLocation=\"\
  \ http://java.sun.com/xml/ns/persistence →\n             http://java.sun.com/xml/ns/persistence/persistence_2_1.xsd\
  \ \"\n             version=\"2.1\">\n\n<persistence-unit name=\"chapter05PU\" transaction-type=\"\
  RESOURCE_LOCAL\">\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
        <class>org.agoncal.book.javaee7.chapter05.Book</class>\n      <mapping-file>META-INF/book_mapping.xml</mapping-file>\n\
        <properties>\n        <!--Persistence provider properties-->\n      </properties>\n\
    </persistence-unit>\n</persistence>\n```\n\n可嵌入对象\n\n在本章前面的“复合主键”部分，你已经看到如何使用`@EmbeddedId`注解将一个类嵌入并用作主键。可嵌入对象是本身没有持久化标识的对象；它们只能嵌入到所属实体中。所属实体可以拥有可嵌入对象的集合，也可以拥有单个可嵌入属性。它们作为所属实体的固有部分存储，并共享该实体的标识。这意味着嵌入对象的每个属性都映射到实体的表。这是一种严格的所有权关系（也称为组合），因此如果实体被移除，嵌入对象也会被移除。\n\
  \n这种两个类之间的组合使用了注解。被包含的类使用`@Embeddable`注解，而包含该类的实体则使用`@Embedded`注解。我们以客户为例，客户拥有标识符、姓名、电子邮件地址和地址。所有这些属性都可以放在`Customer`实体中（见清单\
  \ 5-30），但出于对象建模的原因，它们被拆分为两个类：`Customer`和`Address`。由于`Address`没有自己的标识，只是`Customer`状态的一部分，因此它很适合成为可嵌入对象，而不是实体（见清单\
  \ 5-29）。\n\n***清单 5-29.***  Address 类是一个可嵌入对象\n\n```\n@Embeddable\npublic class\
  \ Address {\n\nprivate String street1;\n  private String street2;\n  private String\
  \ city;\n  private String state;\n  private String zipcode;\n  private String country;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n如清单 5-29 所示，`Address`类没有被注解为实体，而是被注解为可嵌入对象。`@Embeddable`注解指定`Address`可以嵌入到另一个实体类（或另一个可嵌入对象）中。在组合的另一端，`Customer`实体必须使用`@Embedded`注解来指定`Address`是一个持久化属性，它将作为固有部分存储并共享其标识（见清单\
  \ 5-30）。\n\n***清单 5-30.***  嵌入 Address 的 Customer 实体\n\n```\n@Entity\npublic class\
  \ Customer {\n\n@Id @GeneratedValue\n  private Long id;\n  private String firstName;\n\
    private String lastName;\n  private String email;\n  private String phoneNumber;\n\
    @Embedded\n  private Address address;\n\n// 构造方法、getter、setter\n}\n```\n\n`Address`的每个属性都映射到所属实体`Customer`的表。只会有一个表，其结构如清单\
  \ 5-31 所示。正如你将在后面的“覆盖属性”一节中看到的，实体可以覆盖可嵌入对象的属性（使用`@AttributeOverrides`注解）。\n\n***清单\
  \ 5-31.***  包含所有地址属性的 CUSTOMER 表结构\n\n```\ncreate table CUSTOMER (\n  ID BIGINT\
  \ not null,\n  LASTNAME VARCHAR(255),\n  PHONENUMBER VARCHAR(255),\n  EMAIL VARCHAR(255),\n\
    FIRSTNAME VARCHAR(255),\n  STREET2 VARCHAR(255),\n  STREET1 VARCHAR(255),\n  ZIPCODE\
  \ VARCHAR(255),\n  STATE VARCHAR(255),\n  COUNTRY VARCHAR(255),\n  CITY VARCHAR(255),\n\
    primary key (ID)\n);\n```\n\n![image](img/sq.jpg) **注意**  在前面的章节中，我展示了如何映射基本数据类型的集合和映射。在\
  \ JPA 2.1 中，可嵌入对象也可以实现同样的功能。你可以映射可嵌入对象的集合以及可嵌入对象的映射（可嵌入对象可以是映射的键或值）。\n\n可嵌入类的访问类型\n\
  \n可嵌入类的访问类型由其所在的实体类的访问类型决定。如果实体显式使用了属性访问类型，那么可嵌入对象也会隐式使用属性访问。可以通过`@Access`注解为可嵌入类指定不同的访问类型。\n\
  \n`Customer`实体（见清单 5-32）和`Address`实体（见清单 5-33）使用了不同的访问类型。\n\n***清单 5-32.***  使用字段访问类型的\
  \ Customer 实体\n\n```\n@Entity\n@Access(AccessType.FIELD)\npublic class Customer\
  \ {\n\n@Id @GeneratedValue\n  private Long id;\n  @Column(name = \"first_name\"\
  , nullable = false, length = 50)\n  private String firstName;\n  @Column(name =\
  \ \"last_name\", nullable = false, length = 50)\n  private String lastName;\n  private\
  \ String email;\n  @Column(name = \"phone_number\", length = 15)\n  private String\
  \ phoneNumber;\n  @Embedded\n  private Address address;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n***清单 5-33.***  使用属性访问类型的可嵌入对象\n\n```\n@Embeddable\n@Access(AccessType.PROPERTY)\n\
  public class Address {\n\nprivate String street1;\n  private String street2;\n  private\
  \ String city;\n  private String state;\n  private String zipcode;\n  private String\
  \ country;\n\n// 构造方法\n\n@Column(nullable = false)\n  public String getStreet1()\
  \ {\n    return street1;\n  }\n  public void setStreet1(String street1) {\n    this.street1\
  \ = street1;\n  }\n\npublic String getStreet2() {\n    return street2;\n  }\n  public\
  \ void setStreet2(String street2) {\n    this.street2 = street2;\n  }\n\n@Column(nullable\
  \ = false, length = 50)\n  public String getCity() {\n    return city;\n  }\n  public\
  \ void setCity(String city) {\n    this.city = city;\n  }\n\n@Column(length = 3)\n\
    public String getState() {\n    return state;\n  }\n  public void setState(String\
  \ state) {\n    this.state = state;\n  }\n\n@Column(name = \"zip_code\", length\
  \ = 10)\n  public String getZipcode() {\n    return zipcode;\n  }\n  public void\
  \ setZipcode(String zipcode) {\n    this.zipcode = zipcode;\n  }\n\npublic String\
  \ getCountry() {\n    return country;\n  }\n  public void setCountry(String country)\
  \ {\n    this.country = country;\n  }\n}\n```\n\n强烈建议在可嵌入对象上显式设置访问类型，以避免当可嵌入对象被多个实体嵌入时出现映射错误。例如，让我们通过添加一个`Order`实体来扩展模型，如图图\
  \ 5-4 所示。`Address`现在被`Customer`（客户的家庭地址）和`Order`（送货地址）嵌入。\n\n![9781430246268_Fig05-04.jpg](img/9781430246268_Fig05-04.jpg)\n\
  \n图 5-4. Address 被 Customer 和 Order 嵌入\n\n每个实体定义了不同的访问类型：`Customer`使用字段访问，而`Order`使用属性访问。由于可嵌入对象的访问类型由其声明的实体类的访问类型决定，`Address`将以两种不同的方式被映射，这可能导致映射问题。为了避免这种情况，应该显式设置`Address`的访问类型。\n\
  \n\n\n![image](img/sq.jpg) **注意**  显式访问类型在继承中也很有帮助。默认情况下，叶子实体继承其根实体的访问类型。在实体层次结构中，每个实体都可以被层次结构中的其他类以不同方式访问。包含\
  \ `@Access` 注解将导致覆盖层次结构中生效的默认访问模式。\n\n关系映射\n\n面向对象编程的世界充满了类以及类之间的关联。这些关联是结构性的，因为它们将一种类型的对象链接到另一种类型的对象，允许一个对象促使另一个对象代表其执行操作。类之间可以存在多种类型的关联。\n\
  \n首先，关联具有方向性。它可以是*单向的*（即，一个对象可以导航到另一个对象），也可以是*双向的*（即，一个对象可以导航到另一个对象，反之亦然）。在 Java\
  \ 中，您使用点（`.`）语法来导航对象。例如，当您编写 `customer.getAddress().getCountry()` 时，您从对象 `Customer`\
  \ 导航到 `Address`，然后导航到 `Country`。\n\n在统一建模语言（UML）中，为了表示两个类之间的单向关联，您使用箭头来指示方向。在图 5-5\
  \ 中，`Class1`（源）可以导航到 `Class2`（目标），但反之则不行。\n\n![9781430246268_Fig05-05.jpg](img/9781430246268_Fig05-05.jpg)\n\
  \n图 5-5. 两个类之间的单向关联\n\n为了表示双向关联，不使用箭头。如图 5-6 所示，`Class1` 可以导航到 `Class2`，反之亦然。在 Java\
  \ 中，这表示为 `Class1` 拥有一个类型为 `Class2` 的属性，而 `Class2` 拥有一个类型为 `Class1` 的属性。\n\n![9781430246268_Fig05-06.jpg](img/9781430246268_Fig05-06.jpg)\n\
  \n图 5-6. 两个类之间的双向关联\n\n关联还具有*多重性*（或*基数*）。关联的每一端可以指定有多少个引用对象参与该关联。图 5-7 中的 UML 图显示一个\
  \ `Class1` 引用零个或多个 `Class2` 实例。\n\n![9781430246268_Fig05-07.jpg](img/9781430246268_Fig05-07.jpg)\n\
  \n图 5-7. 类关联上的多重性\n\n在 UML 中，基数是一个介于最小数量和最大数量之间的范围。因此，`0..1` 表示您将至少有零个对象，最多有一个对象。`1`\
  \ 表示您有且仅有一个实例。`1..*` 表示您可以有一个或多个实例，而 `3..6` 表示您有介于三个到六个对象之间的范围。在 Java 中，表示多个对象的关联使用类型为\
  \ `java.util.Collection`、`java.util.Set`、`java.util.List` 甚至 `java.util.Map` 的集合。\n\
  \n关系具有所有权（即，关系的所有者）。在单向关系中，所有权是隐含的：在图 5-5 中，毫无疑问所有者是 `Class1`，但在双向关系中，如图 5-6 所示，必须显式指定所有者。然后，您需要指明指定物理映射的所有者，以及反向端（非拥有端）。\n\
  \n在接下来的章节中，您将看到如何使用 JPA 注解映射对象集合。\n\n关系数据库中的关系\n\n在关系世界中，情况有所不同，因为严格来说，关系数据库是*关系*（也称为*表*）的集合，这意味着您建模的任何东西都是一个表。为了建模关联，您没有列表、集合或映射；您有表。在\
  \ JPA 中，当一个类与另一个类之间存在关联时，在数据库中您将得到一个表引用。这个引用可以通过两种不同的方式建模：使用*外键*（一个*连接列*）或使用*连接表*。用数据库术语来说，引用另一个表键的列是*外键列*。\n\
  \n例如，考虑一个客户有一个地址。在清单 5-32 和清单 5-33 中，我们将此关系建模为可嵌入的，但现在让我们将其转变为*一对一关系*。在 Java 中，您会有一个带有\
  \ `Address` 属性的 `Customer` 类。在关系世界中，您可以有一个 `CUSTOMER` 表，通过一个外键列（或连接列）指向 `ADDRESS`\
  \ 表，如图 5-8 所述。\n\n![9781430246268_Fig05-08.jpg](img/9781430246268_Fig05-08.jpg)\n\
  \n图 5-8. 使用连接列的关系\n\n还有第二种建模方式——使用连接表。图 5-9 中的 `CUSTOMER` 表不再存储 `ADDRESS` 的外键。创建了一个中间表，通过存储两个表的外键来保存关系信息。\n\
  \n![9781430246268_Fig05-09.jpg](img/9781430246268_Fig05-09.jpg)\n\n图 5-9. 使用连接表的关系\n\
  \n您不会使用连接表来表示一对一关系，因为这可能会导致性能问题（您总是需要访问第三个表才能获取客户的地址）。连接表通常用于一对多或多对多基数的情况。正如您将在下一节中看到的，JPA\
  \ 使用这两种模式来映射对象关联。\n\n实体关系\n\n现在回到 JPA。大多数实体需要能够引用其他实体，或与其他实体建立关系。这就是产生业务应用程序中常见的领域模型图的原因。JPA\
  \ 使得映射关联成为可能，以便一个实体可以在关系模型中链接到另一个实体。就像您之前看到的基本映射注解一样，JPA 对关联使用“例外配置”方式。它有一种存储关系的默认方式，但是，如果这不适合您的数据库模型，您可以使用多个注解来自定义映射。\n\
  \n两个实体之间的基数可以是一对一、一对多、多对一或多对多。每个相应的映射都以源和目标实体的基数命名：`@OneToOne`、`@OneToMany`、`@ManyToOne`\
  \ 或 `@ManyToMany` 注解。每个注解都可以以单向或双向方式使用。表 5-1 显示了基数和方向之间所有可能的组合。\n\n表 5-1. 所有可能的基数-方向组合\n\
  \n| 基数 | 方向 |\n| --- | --- |\n| 一对一 | 单向 |\n| 一对一 | 双向 |\n| 一对多 | 单向 |\n| 多对一/一对多\
  \ | 双向 |\n| 多对一 | 单向 |\n| 多对多 | 单向 |\n| 多对多 | 双向 |\n\n您将会看到，单向和双向是重复的概念，它们以相同的方式适用于所有基数。接下来，您将看到单向和双向关系之间的区别，然后实现其中一些组合。我不会遍历所有组合的完整目录，而只关注一个子集。解释所有组合会变得重复。重点是您理解如何映射关系中的基数和方向。\n\
  \n\n\n单向与双向\n\n从对象建模的角度来看，类之间的方向是自然的。在单向关联中，对象 `A` 仅指向对象 `B`；在双向关联中，两个对象相互引用。然而，在将双向关系映射到关系数据库时，需要进行一些额外工作，如下面涉及拥有家庭地址的客户的示例所示。\n\
  \n在单向关系中，`Customer` 实体拥有一个类型为 `Address` 的属性（参见图 5-10）。该关系是单向的，只能从一侧导航到另一侧。`Customer`\
  \ 被称为关系的拥有方。就数据库而言，这意味着 `CUSTOMER` 表将包含一个指向 `ADDRESS` 的外键（连接列），并且当你拥有一个关系时，你可以自定义该关系的映射。例如，如果你需要更改外键的名称，映射将在\
  \ `Customer` 实体（即拥有方）中完成。\n\n![9781430246268_Fig05-10.jpg](img/9781430246268_Fig05-10.jpg)\n\
  \n图 5-10. Customer 与 Address 之间的单向关联\n\n如前所述，关系也可以是双向的。为了能够在 `Address` 和 `Customer`\
  \ 之间导航，你需要通过在 `Address` 实体中添加一个 `Customer` 属性，将单向关系转换为双向关系（参见图 5-11）。请注意，UML 类图不显示表示关系的属性。\n\
  \n![9781430246268_Fig05-11.jpg](img/9781430246268_Fig05-11.jpg)\n\n图 5-11. Customer\
  \ 与 Address 之间的双向关联\n\n就 Java 代码和注解而言，这类似于拥有两个独立的一对一映射，每个方向一个。你可以将双向关系视为一对单向关系，双向进行（参见图\
  \ 5-12）。\n\n![9781430246268_Fig05-12.jpg](img/9781430246268_Fig05-12.jpg)\n\n图 5-12.\
  \ 用两个箭头表示的双向关联\n\n如何映射一对单向关系？谁是这个双向关系的拥有方？谁拥有连接列或连接表的映射信息？如果单向关系有一个拥有方，那么双向关系则同时拥有一个拥有方和一个反向方，必须使用\
  \ `@OneToOne`、`@OneToMany` 和 `@ManyToMany` 注解的 `mappedBy` 元素显式指定。`mappedBy` 标识拥有该关系的属性，并且是双向关系所必需的。\n\
  \n为了解释这一点，让我们比较一下 Java 代码（一侧）和数据库映射（另一侧）。如图 5-13 左侧所示，两个实体通过属性相互指向：`Customer` 有一个带有\
  \ `@OneToOne` 注解的 `address` 属性，而 `Address` 实体也有一个带有注解的 `customer` 属性。在右侧，数据库映射显示了一个\
  \ `CUSTOMER` 表和一个 `ADDRESS` 表。`CUSTOMER` 是关系的拥有方，因为它包含 `ADDRESS` 外键。\n\n![9781430246268_Fig05-13.jpg](img/9781430246268_Fig05-13.jpg)\n\
  \n图 5-13. Customer 和 Address 代码与数据库映射\n\n在图 5-13 中，`Address` 实体在其 `@OneToOne` 注解上使用了\
  \ `mappedBy` 元素。`Address` 被称为关系的反向拥有方，因为它有一个 `mappedBy` 元素。`mappedBy` 元素指示连接列（`address`）是在关系的另一端指定的。实际上，在另一端，`Customer`\
  \ 实体通过使用 `@JoinColumn` 注解定义了连接列，并将外键重命名为 `address_fk`。`Customer` 是关系的拥有方，作为拥有方，它负责定义连接列的映射。`Address`\
  \ 是反向方，拥有方实体的表包含外键（`CUSTOMER` 表是包含 `ADDRESS_FK` 列的表）。\n\n`@OneToOne`、`@OneToMany`\
  \ 和 `@ManyToMany` 注解上存在 `mappedBy` 元素，但 `@ManyToOne` 注解上没有。你不能在双向关联的两侧都拥有 `mappedBy`\
  \ 属性。如果两侧都没有它，那也是不正确的，因为提供者会将其视为两个独立的单向关系。这意味着每一侧都是拥有方，并且可以定义一个连接列。\n\n![image](img/sq.jpg) **注意**  如果你熟悉\
  \ Hibernate 的早期版本，你可能会认为 JPA 的 `mappedBy` 等同于 Hibernate 的 `inverse` 属性。\n\n@OneToOne\
  \ 单向\n\n实体之间的一对一单向关系具有基数为 `1` 的引用，并且只能在一个方向上访问。参考客户及其地址的示例，假设客户只有一个地址（基数为 `1`）。从客户（源）导航到地址（目标）以了解客户居住地非常重要。然而，出于某种原因，在我们图\
  \ 5-14 所示的模型中，你不需要能够反向导航（例如，你不需要知道哪个客户居住在给定地址）。\n\n![9781430246268_Fig05-14.jpg](img/9781430246268_Fig05-14.jpg)\n\
  \n图 5-14. 一个客户拥有一个地址\n\n在 Java 中，单向关系意味着 `Customer` 将拥有一个 `Address` 属性（清单 5-34），但\
  \ `Address` 不会拥有一个 `Customer` 属性（清单 5-35）。\n\n***清单 5-34.***  带有一个地址的客户\n\n```\n\
  @Entity\npublic class Customer {\n\n@Id @GeneratedValue\n  private Long id;\n  private\
  \ String firstName;\n  private String lastName;\n  private String email;\n  private\
  \ String phoneNumber;\n  private Address address;\n\n// 构造函数、getter、setter\n}\n\
  ```\n\n***清单 5-35.***  地址实体\n\n```\n@Entity\npublic class Address {\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  private String street1;\n  private String street2;\n  private\
  \ String city;\n  private String state;\n  private String zipcode;\n  private String\
  \ country;\n\n// 构造函数、getter、setter\n}\n```\n\n如清单 5-34 和 5-35 所示，这两个实体拥有最低限度的必需注解：`@Entity`\
  \ 加上用于主键的 `@Id` 和 `@GeneratedValue`，仅此而已。通过例外配置，持久化提供者会将这两个实体映射到两个表以及一个用于关系的外键（从客户指向地址）。一对一映射是由\
  \ `Address` 被声明为实体并且包含 `Customer` 实体作为属性这一事实触发的。我们通过将一个实体用作另一个实体的属性来自动暗示关系，因此我们不需要\
  \ `@OneToOne` 注解，因为它依赖于默认值（参见清单 5-36 和 5-37）。\n\n\n\n***清单 5-36.***  包含指向地址表外键的\
  \ CUSTOMER 表\n\n```\ncreate table CUSTOMER (\n  ID BIGINT not null,\n  FIRSTNAME\
  \ VARCHAR(255),\n  LASTNAME VARCHAR(255),\n  EMAIL VARCHAR(255),\n  PHONENUMBER\
  \ VARCHAR(255),\n  ADDRESS_ID BIGINT,\n  primary key (ID),\n  foreign key (ADDRESS_ID)\
  \ references ADDRESS(ID)\n);\n```\n\n***清单 5-37.***  ADDRESS 表\n\n```\ncreate table\
  \ ADDRESS (\n  ID BIGINT not null,\n  STREET1 VARCHAR(255),\n  STREET2 VARCHAR(255),\n\
  \  CITY VARCHAR(255),\n  STATE VARCHAR(255),\n  ZIPCODE VARCHAR(255),\n  COUNTRY\
  \ VARCHAR(255),\n  primary key (ID)\n);\n```\n\n如你所知，在使用 JPA 时，如果不对属性进行注解，则会应用默认的映射规则。因此，默认情况下，外键列的名称为\
  \ `ADDRESS_ID`（参见清单 5-36），它是由关系属性的名称（此处为 `address`）、符号 `_` 以及目标表主键列的名称（此处为 `ADDRESS`\
  \ 表的 `ID` 列）拼接而成。另请注意，在 DDL 中，`ADDRESS_ID` 列默认是可空的，这意味着默认情况下，一对一关联映射为零（空值）或一。\n\n\
  要自定义映射，你可以使用两个注解。第一个是 `@OneToOne`（这是因为关系的基数为 1），它可以修改关联本身的一些属性，例如其获取方式。清单 5-38 定义了\
  \ `@OneToOne` 注解的 API。\n\n***清单 5-38.***  @OneToOne 注解 API\n\n```\n@Target({METHOD,\
  \ FIELD}) @Retention(RUNTIME)\npublic @interface OneToOne {\n  Class targetEntity()\
  \ default void.class;\n  CascadeType[] cascade() default {};\n  FetchType fetch()\
  \ default EAGER;\n  boolean optional() default true;\n  String mappedBy() default\
  \ \"\";\n  boolean orphanRemoval() default false;\n}\n```\n\n另一个是 `@JoinColumn`（其\
  \ API 与清单 5-11 中展示的 `@Column` 非常相似）。它用于自定义拥有方的连接列，即外键。清单 5-39 展示了如何使用这两个注解。\n\n\
  ***清单 5-39.***  具有自定义关系映射的 Customer 实体\n\n```\n@Entity\npublic class Customer {\n\
  \n@Id @GeneratedValue\n  private Long id;\n  private String firstName;\n  private\
  \ String lastName;\n  private String email;\n  private String phoneNumber;\n  @OneToOne\
  \ (fetch = FetchType.LAZY)\n  @JoinColumn(name = \"add_fk\", nullable = false)\n\
  \  private Address address;\n\n// 构造方法、getter、setter\n}\n```\n\n在 JPA 中，外键列被称为连接列。`@JoinColumn`\
  \ 注解允许你自定义外键的映射。清单 5-39 使用它将外键列重命名为 `ADD_FK`，并通过拒绝空值（`nullable=false`）使关系成为强制性的。`@OneToOne`\
  \ 注解则向持久化提供者提示应延迟获取该关系（稍后会详细介绍）。\n\n@OneToMany 单向\n\n一对多关系是指一个源对象引用一组目标对象。例如，一个采购订单由多个订单行组成（参见图\
  \ 5-15）。订单行本可以通过相应的 `@ManyToOne` 注解来引用采购订单，但这里并非如此，因为该关系是单向的。`Order` 是“一”方，也是关系的源，而\
  \ `OrderLine` 是“多”方，是目标。\n\n![9781430246268_Fig05-15.jpg](img/9781430246268_Fig05-15.jpg)\n\
  \n图 5-15. 一个订单包含多个行\n\n基数为多，并且导航仅从 `Order` 指向 `OrderLine`。在 Java 中，这种多重性由 `java.util`\
  \ 包中的 `Collection`、`List` 和 `Set` 接口描述。清单 5-40 展示了 `Order` 实体的代码，其中包含一个指向 `OrderLine`\
  \ 的单向一对多关系（参见清单 5-41）。\n\n***清单 5-40.***  一个 Order 包含多个 OrderLine\n\n```\n@Entity\n\
  public class Order {\n\n@Id @GeneratedValue\n  private Long id;\n  @Temporal(TemporalType.TIMESTAMP)\n\
  \  private Date creationDate;\n  private List<OrderLine> orderLines;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n***清单 5-41.***  一个 OrderLine\n\n```\n@Entity\n@Table(name = \" order_line\
  \ \")\npublic class OrderLine {\n\n@Id @GeneratedValue\n  private Long id;\n  private\
  \ String item;\n  private Double unitPrice;\n  private Integer quantity;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n清单 5-40 中的 `Order` 没有任何特殊注解，它依赖于“例外配置”范式。在实体上使用实体类型的集合作为属性这一事实，会默认触发 `OneToMany`\
  \ 关系映射。默认情况下，单向一对多关系使用一个连接表来保存关系信息，该连接表包含两个外键列。一个外键列引用 `ORDER` 表，其类型与主键相同；另一个外键列引用\
  \ `ORDER_LINE` 表。这个连接表的名称是两个实体名称的组合，中间用 `_` 符号分隔。该连接表被命名为 `ORDER_ORDER_LINE`，将产生如图\
  \ 5-16 所示的模式结构。\n\n![9781430246268_Fig05-16.jpg](img/9781430246268_Fig05-16.jpg)\n\
  \n图 5-16. ORDER 和 ORDER_LINE 之间的连接表\n\n如果你不喜欢连接表和外键的名称，或者正在映射到一个已存在的表，你可以使用 JPA\
  \ 注解来重新定义这些默认值。连接列的默认值是实体名称、符号 `_` 和被引用主键名称的拼接。由于 `@JoinColumn` 注解可用于更改外键列，`@JoinTable`\
  \ 注解（参见清单 5-42）也可以对连接表映射执行相同的操作。你还可以使用 `@OneToMany` 注解（参见清单 5-43），它与 `@OneToOne`\
  \ 类似，可以自定义关系本身（使用 `fetch` 模式等）。\n\n***清单 5-42.***  @JoinTable 注解 API\n\n```\n@Target({METHOD,\
  \ FIELD}) @Retention(RUNTIME)\npublic @interface JoinTable {\n  String name() default\
  \ \"\";\n  String catalog() default \"\";\n  String schema() default \"\";\n  JoinColumn[]\
  \ joinColumns () default {};\n  JoinColumn[] inverseJoinColumns () default {};\n\
  \  UniqueConstraint[] uniqueConstraints() default {};\n  Index[] indexes() default\
  \ {};\n}\n```\n\n***清单 5-43.***  具有注解化一对多关系的 Order 实体\n\n```\n@Entity\npublic class\
  \ Order {\n\n@Id @GeneratedValue\n  private Long id;\n  @Temporal(TemporalType.TIMESTAMP)\n\
  \  private Date creationDate;\n  @OneToMany\n  @JoinTable (name = \" jnd_ord_line\
  \ \",\n    joinColumns = @JoinColumn(name = \" order_fk \"),\n    inverseJoinColumns\
  \ = @JoinColumn(name = \" order_line_fk \") )\n  private List<OrderLine> orderLines;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n\n\n在清单 5-42 中，关于 `@JoinTable` 注解的 API，你可以看到两个类型为\
  \ `@JoinColumn` 的属性：`joinColumns` 和 `inverseJoinColumns`。这两个属性通过拥有方和反向方来区分。`joinColumns`\
  \ 元素描述了拥有方（关系的所有者），在我们的示例中，它指的是 `ORDER` 表。`inverseJoinColumns` 元素指定了反向方，即关系的目标方，它指的是\
  \ `ORDER_LINE` 表。\n\n使用 `Order` 实体（参见清单 5-43），你可以通过将连接表重命名为 `JND_ORD_LINE`（而不是 `ORDER_ORDER_LINE`），并重命名两个外键列，从而在\
  \ `orderLines` 属性上添加 `@OneToMany` 和 `@JoinTable` 注解。\n\n清单 5-43 中的 `Order` 实体将被映射到清单\
  \ 5-44 中描述的连接表。\n\n***清单 5-44.***  Order 与 Order_Line 之间连接表的结构\n\n```\ncreate table\
  \ JND_ORD_LINE (\n  ORDER_FK BIGINT not null,\n  ORDER_LINE_FK BIGINT not null,\n\
  \  primary key (ORDER_FK, ORDER_LINE_FK),\n  foreign key (ORDER_LINE_FK) references\
  \ ORDER_LINE(ID),\n  foreign key (ORDER_FK) references ORDER(ID)\n);\n```\n\n一对多单向关系的默认规则是使用连接表，但改为使用外键也非常容易（并且对于遗留数据库很有用）。`Order`\
  \ 实体必须提供 `@JoinColumn` 注解来代替 `@JoinTable`，从而允许代码像清单 5-45 所示那样进行更改。\n\n***清单 5-45.***\
  \  使用连接列的 Order 实体\n\n```\n@Entity\npublic class Order {\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  @Temporal(TemporalType.TIMESTAMP)\n  private Date creationDate;\n\
  \  @OneToMany(fetch = FetchType.EAGER)\n  @JoinColumn(name = \"order_fk\")\n  private\
  \ List<OrderLine> orderLines;\n\n// 构造方法、getter、setter\n}\n```\n\n`OrderLine` 实体的代码（之前展示在清单\
  \ 5-41 中）没有变化。请注意，在清单 5-45 中，`@OneToMany` 注解覆盖了默认的 `fetch` 模式（将其改为 `EAGER` 而不是 `LAZY`）。通过使用\
  \ `@JoinColumn`，外键策略随后映射了单向关联。该注解将外键重命名为 `ORDER_FK`，并且它存在于目标表（`ORDER_LINE`）中。结果就是图\
  \ 5-17 所示的数据库结构。没有连接表，两个表之间的引用通过外键 `ORDER_FK` 进行。\n\n![9781430246268_Fig05-17.jpg](img/9781430246268_Fig05-17.jpg)\n\
  \n图 5-17. Order 与 Order_Line 之间的连接列\n\n@ManyToMany 双向关系\n\n当一个源对象引用多个目标对象，并且一个目标对象也引用多个源对象时，就存在多对多双向关系。例如，一张\
  \ CD 专辑由多位艺术家创作，而一位艺术家出现在多张专辑中。在 Java 世界中，每个实体都会有一个目标实体的集合。在关系型世界中，映射多对多关系的唯一方法是使用连接表（连接列不起作用），并且，正如你之前所见，在双向关系中你需要显式地定义所有者（使用\
  \ `mappedBy` 元素）。\n\n假设 `Artist` 实体是关系的所有者，这意味着 `CD` 是反向所有者（参见清单 5-46），并且需要在其 `@ManyToMany`\
  \ 注解上使用 `mappedBy` 元素。`mappedBy` 告诉持久化提供者，`appearsOnCDs` 是拥有实体对应属性的名称。\n\n***清单\
  \ 5-46.***  多位艺术家出现在一张 CD 中\n\n```\n@Entity\npublic class CD {\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  private String title;\n  private Float price;\n  private\
  \ String description;\n  @ManyToMany(mappedBy = \"appearsOnCDs\")\n  private List<Artist>\
  \ createdByArtists;\n\n// 构造方法、getter、setter\n}\n```\n\n因此，如果 `Artist` 是关系的所有者，如清单\
  \ 5-47 所示，那么它负责通过 `@JoinTable` 和 `@JoinColumn` 注解来自定义连接表的映射。\n\n***清单 5-47.*** \
  \ 一位艺术家出现在多张 CD 专辑中\n\n```\n@Entity\npublic class Artist {\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  private String firstName;\n  private String lastName;\n \
  \ @ManyToMany\n  @JoinTable(name = \"jnd_art_cd\", →\n    joinColumns = @JoinColumn(name\
  \ = \"artist_fk\"), →\n    inverseJoinColumns = @JoinColumn(name = \"cd_fk\"))\n\
  \  private List<CD> appearsOnCDs ;\n\n// 构造方法、getter、setter\n}\n```\n\n正如你在清单 5-47\
  \ 中所见，`Artist` 和 `CD` 之间的连接表被重命名为 `JND_ART_CD`，每个连接列也被重命名（得益于 `@JoinTable` 注解）。`joinColumns`\
  \ 元素指的是拥有方（`Artist`），而 `inverseJoinColumns` 指的是反向拥有方（`CD`）。图 5-18 展示了数据库结构。\n\n\
  ![9781430246268_Fig05-18.jpg](img/9781430246268_Fig05-18.jpg)\n\n图 5-18. Artist、CD\
  \ 以及连接表\n\n请注意，在多对多和一对一的双向关系中，任何一方都可以被指定为拥有方。无论哪一方被指定为所有者，另一方都应包含 `mappedBy` 元素。如果没有，提供者会认为双方都是所有者，并将其视为两个独立的一对多单向关系。这可能导致产生四个表：`ARTIST`\
  \ 和 `CD`，再加上两个连接表 `ARTIST_CD` 和 `CD_ARTIST`。在双方都使用 `mappedBy` 也是不合法的。\n\n获取关系\n\n\
  你看到的所有注解（`@OneToOne`、`@OneToMany`、`@ManyToOne` 和 `@ManyToMany`）都定义了一个获取属性，用于指定关联对象是立即加载（急加载）还是延迟加载（懒加载），这会对性能产生影响。根据你的应用程序，某些关系比其他关系访问得更频繁。在这些情况下，你可以通过在实体首次读取时（急加载）或访问时（懒加载）从数据库加载数据来优化性能。举个例子，让我们看一些极端情况。\n\
  \n想象四个实体，它们之间以不同的基数（一对一、一对多）相互链接。在第一种情况（参见图 5-19）中，它们都具有急加载关系。这意味着，一旦你加载了 `Class1`（通过\
  \ ID 查找或查询），所有依赖的对象都会自动加载到内存中。这可能会影响系统的性能。\n\n![9781430246268_Fig05-19.jpg](img/9781430246268_Fig05-19.jpg)\n\
  \n图 5-19. 具有急加载关系的四个实体\n\n看看相反的场景，所有关系都使用懒加载 `fetch` 模式（参见图 5-20）。当你加载 `Class1`\
  \ 时，不会加载其他任何内容（当然，除了 `Class1` 的直接属性）。你需要显式地访问 `Class2`（例如，通过使用 getter 方法）来告诉持久化提供者从数据库加载数据，依此类推。如果你想操作整个对象图，你需要显式地调用每个实体。\n\
  \n```\nclass1.getClass2().getClass3().getClass4()\n```\n\n![9781430246268_Fig05-20.jpg](img/9781430246268_Fig05-20.jpg)\n\
  \n图 5-20. 具有懒加载关系的四个实体\n\n\n\n但不要认为 `EAGER` 是邪恶的，而 `LAZY` 是好的。`EAGER` 会通过少量的数据库访问将所有数据加载到内存中（持久化提供者可能会使用连接查询来关联表并提取数据）。而使用\
  \ `LAZY`，你可以控制加载哪个对象，从而避免内存被填满的风险，但每次都需要访问数据库。\n\n`fetch` 参数非常重要，因为如果使用不当，可能会导致性能问题。每个注解都有一个默认的\
  \ `fetch` 值，你需要了解它，并在不适用时进行更改（参见表 5-2）。\n\n表 5-2. 默认抓取策略\n\n| 注解 | 默认抓取策略 |\n| ---\
  \ | --- |\n| `@OneToOne` | `EAGER` |\n| `@ManyToOne` | `EAGER` |\n| `@OneToMany`\
  \ | `LAZY` |\n| `@ManyToMany` | `LAZY` |\n\n如果在你的应用程序中加载采购订单时，总是需要访问其订单行，那么将 `@OneToMany`\
  \ 注解的默认 `fetch` 模式改为 `EAGER` 可能是高效的（参见清单 5-48）。\n\n***清单 5-48.***  一个与 OrderLine\
  \ 具有急切关系的 Order\n\n```\n@Entity\npublic class Order {\n\n@Id @GeneratedValue\n \
  \ private Long id;\n  @Temporal(TemporalType.TIMESTAMP)\n  private Date creationDate;\n\
  \  @OneToMany(fetch = FetchType.EAGER )\n  private List<OrderLine> orderLines;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n排序关系\n\n对于一对多或多对多关系，你的实体处理的是对象集合。在 Java 端，这些集合通常是无序的。关系数据库也不会在表中保留任何顺序。因此，如果你想要一个有序列表，要么以编程方式对集合进行排序，要么使用带有\
  \ `Order By` 子句的 JPQL 查询。JPA 提供了更简单的机制，基于注解来帮助排序关系。\n\n@OrderBy\n\n动态排序可以通过 `@OrderBy`\
  \ 注解完成。“动态”意味着你在检索关联时对集合元素进行排序。\n\nCD-BookStore 应用程序的示例允许用户撰写关于音乐和书籍的新闻。这些新闻显示在网站上，一旦发布，人们可以添加评论（参见清单\
  \ 5-49）。在网站上，你希望按时间顺序显示评论，因此排序就派上了用场。\n\n***清单 5-49.***  一个带有发布日期的 Comment 实体\n\n\
  ```\n@Entity\npublic class Comment {\n\n@Id @GeneratedValue\n  private Long id;\n\
  \  private String nickname;\n  private String content;\n  private Integer note;\n\
  \  @Column(name = \"posted_date\")\n  @Temporal(TemporalType. TIMESTAMP )\n  private\
  \ Date postedDate ;\n\n// 构造方法、getter、setter\n}\n```\n\n评论使用 `Comment` 实体建模，如清单\
  \ 5-49 所示。它包含内容，由用户（通过昵称标识）发布，用户在新闻上留下备注，并且有一个系统自动创建的 `TIMESTAMP` 类型的发布日期。在 `News`\
  \ 实体中，如清单 5-50 所示，你希望能够按发布日期降序排列评论列表。为此，你将 `@OrderBy` 注解与 `@OneToMany` 注解结合使用。\n\
  \n***清单 5-50.***  News 实体的评论按发布日期降序排列\n\n```\n@Entity\npublic class News {\n\n@Id\
  \ @GeneratedValue\n  private Long id;\n  @Column(nullable = false)\n  private String\
  \ content;\n  @OneToMany(fetch = FetchType.EAGER)\n  @OrderBy(\"postedDate DESC\"\
  )\n  private List<Comment> comments;\n\n// 构造方法、getter、setter\n}\n```\n\n`@OrderBy`\
  \ 注解接受需要排序的属性名称（`postedDate` 属性）以及排序方式（升序或降序）。可以使用字符串 `ASC` 或 `DESC` 分别进行升序或降序排序。你可以在\
  \ `@OrderBy` 注解中使用多个列。如果需要按发布日期和备注排序，可以使用 `OrderBy(\"postedDate DESC, note ASC\"\
  )`。\n\n`@OrderBy` 注解对数据库映射没有任何影响。持久化提供者只是被告知在运行时检索集合时使用 `order by` 子句。\n\n@OrderColumn\n\
  \nJPA 1.0 支持使用 `@OrderBy` 注解进行动态排序，但不支持维护持久化排序。从 JPA 2.0 开始，可以通过添加 `@OrderColumn`\
  \ 注解来实现这一点（其 API 类似于清单 5-11 中的 `@Column`）。该注解告知持久化提供者，需要使用一个单独的列来存储索引，以维护有序列表。`@OrderColumn`\
  \ 定义了该单独的列。\n\n让我们使用新闻和评论的示例，并稍作修改。这次，`Comment` 实体（如清单 5-51 所示）没有 `postedDate` 属性，因此无法按时间顺序对评论进行排序。\n\
  \n***清单 5-51.***  一个没有发布日期的 Comment 实体\n\n```\n@Entity\npublic class Comment {\n\
  \n@Id @GeneratedValue\n  private Long id;\n  private String nickname;\n  private\
  \ String content;\n  private Integer note;\n\n// 构造方法、getter、setter\n}\n```\n\n\
  为了在没有发布日期的情况下保持排序，`News` 实体（如清单 5-52 所示）可以使用 `@OrderColumn` 注解来标注关系。然后，持久化提供者会将\
  \ `News` 实体映射到一个包含额外列以存储排序顺序的表中。\n\n***清单 5-52.***  评论的排序被持久化\n\n```\n@Entity\n\
  public class News {\n\n@Id @GeneratedValue\n  private Long id;\n  @Column(nullable\
  \ = false)\n  private String content;\n  @OneToMany(fetch = FetchType.EAGER)\n \
  \ @OrderColumn(name = \"posted_index\")\n  private List<Comment> comments;\n\n//\
  \ 构造方法、getter、setter\n}\n```\n\n在清单 5-52 中，`@OrderColumn` 将额外的列重命名为 `POSTED_INDEX`。如果未覆盖名称，默认情况下，列名是实体属性名称与\
  \ `_ORDER` 字符串的拼接（在我们的示例中为 `COMMENTS_ORDER`）。此列的类型必须是数值类型。这种有序关系将映射到一个单独的连接表，如下所示：\n\
  \n```\ncreate table NEWS_COMMENT (\n    NEWS_ID BIGINT not null,\n    COMMENTS_ID\
  \ BIGINT not null,\n    POSTED_INDEX INTEGER\n);\n```\n\n需要注意性能影响；与 `@OrderColumn`\
  \ 注解一样，持久化提供者还必须跟踪索引的更改。它负责在插入、删除或重新排序时维护顺序。如果在现有已排序信息列表的中间插入数据，持久化提供者将不得不重新排序整个索引。\n\
  \n可移植的应用程序不应期望列表由数据库排序，理由是某些数据库引擎会自动优化其索引，使数据表看起来已排序。相反，它应该使用 `@OrderColumn` 或 `@OrderBy`\
  \ 结构。请注意，你不能同时使用这两个注解。\n\n继承映射\n\n自诞生以来，面向对象语言就使用了继承范式。C++ 允许多重继承，而 Java 支持单类继承。在面向对象语言中，开发人员通常通过继承根类的属性和行为来重用代码。\n\
  \n\n\n你刚刚学习了关系映射，实体之间的关系可以非常直接地映射到关系型数据库。但继承并非如此。继承是一个完全未知的概念，在关系型世界中并没有原生实现。当将对象保存到关系型数据库时，继承的概念会带来一些复杂情况。\n\
  \n如何将层次模型组织成扁平的关系模型？JPA 提供了三种不同的策略供你选择。\n\n*   *单表每类层次结构* *策略*：整个实体层次结构中所有属性的总和被扁平化到单个表中（这是默认策略）。\n\
  *   *连接子类策略*：在这种方法中，层次结构中的每个实体（无论是具体的还是抽象的）都映射到其自己的专用表。\n*   *每具体类一张表* *策略*：此策略将每个具体的实体层次结构映射到其自己的独立表。\n\
  \n![image](img/sq.jpg) **注意**  在 JPA 2.1 中，对每具体类一张表继承映射策略的支持仍然是可选的。可移植的应用程序应避免使用它，直到该策略被官方强制要求。\n\
  \n利用注解的易用性，JPA 2.1 提供了声明式支持，用于定义和映射继承层次结构，包括实体、抽象实体、映射类和瞬态类。`@Inheritance` 注解用于根实体，以指定其自身及叶子类的映射策略。JPA\
  \ 还将覆盖的对象概念转换到映射中，这允许子类覆盖根类的属性。在接下来的部分中，你还会看到访问类型如何与继承一起使用，以混合字段访问和属性访问。\n\n继承策略\n\
  \n在映射继承时，JPA 支持三种不同的策略。当存在实体层次结构时，它总是以一个实体作为根。根实体类可以通过将 `@Inheritance` 的 `strategy`\
  \ 元素设置为 `javax.persistence.InheritanceType` 枚举类型中定义的选项之一来定义继承策略。如果未设置，则将应用默认的单表每类层次结构策略。为了探索每种策略，我将讨论如何映射\
  \ `CD` 和 `Book` 实体，它们都继承自 `Item` 实体（参见 图 5-21）。\n\n![9781430246268_Fig05-21.jpg](img/9781430246268_Fig05-21.jpg)\n\
  \n图 5-21. CD、Book 和 Item 之间的继承层次结构\n\n`Item` 实体是根实体，具有标识符、标题、描述和价格。`CD` 和 `Book`\
  \ 实体都继承自 `Item`。这些叶子类中的每一个都添加了额外的属性，例如 `Book` 实体的 ISBN 或 `CD` 实体的总时长。\n\n单表每类层次结构策略\n\
  \n默认的继承映射策略是单表每类策略，其中层次结构中的所有实体都映射到单个表。作为默认策略，你可以完全省略根实体上的 `@Inheritance` 注解（这要归功于异常配置），而\
  \ `Item` 实体正是这样做的（参见 清单 5-53）。\n\n***清单 5-53.***  Item 实体使用默认的单表每类策略\n\n```\n@Entity\n\
  public class Item {\n\n@Id @GeneratedValue\n  protected Long id;\n  protected String\
  \ title;\n  protected Float price;\n  protected String description;\n\n// 构造函数、getter、setter\n\
  }\n```\n\n`Item`（清单 5-53）是 `Book` 实体（参见 清单 5-54）和 `CD` 实体（参见 清单 5-55）的根类。这些实体继承了\
  \ `Item` 的属性以及默认的继承策略，因此不必使用 `@Inheritance` 注解。\n\n***清单 5-54.***  Book 继承自 Item\n\
  \n```\n@Entity\npublic class Book extends Item {\n\nprivate String isbn;\n  private\
  \ String publisher;\n  private Integer nbOfPage;\n  private Boolean illustrations;\n\
  \n// 构造函数、getter、setter\n}\n```\n\n***清单 5-55.***  CD 继承自 Item\n\n```\n@Entity\n\
  public class CD extends Item {\n\nprivate String musicCompany;\n  private Integer\
  \ numberOfCDs;\n  private Float totalDuration;\n  private String genre;\n\n// 构造函数、getter、setter\n\
  }\n```\n\n根据你目前所看到的，如果没有继承，这三个实体将映射到它们自己独立的表中，但有了继承，情况就不同了。使用单表每类策略（默认策略），它们最终都会进入同一个数据库表，该表默认以根类的名称命名：`ITEM`。图\
  \ 5-22 展示了 `ITEM` 表的结构。\n\n![9781430246268_Fig05-22.jpg](img/9781430246268_Fig05-22.jpg)\n\
  \n图 5-22. ITEM 表结构\n\n如 图 5-22 所示，`ITEM` 表汇总了 `Item`、`Book` 和 `CD` 实体的所有属性。但还有一个与任何实体属性无关的额外列：它是鉴别器列\
  \ `DTYPE`。\n\n`ITEM` 表将填充 items、books 和 CD 专辑。在访问数据时，持久化提供程序需要知道哪一行属于哪个实体。这样，提供程序在读取\
  \ `ITEM` 表时将实例化适当的对象类型（`Item`、`Book` 或 `CD`）。这就是为什么使用鉴别器列来显式地标记每一行的类型。\n\n图 5-23\
  \ 显示了包含一些数据的 `ITEM` 表片段。如你所见，单表每类策略存在一些空洞；并非每一列对每个实体都有用。第一行是为 `Item` 实体存储的数据（`DTYPE`\
  \ 列包含实体的名称）。Items 只有标题、价格和描述（参见前面的 清单 5-53）；它们没有音乐公司、ISBN 等。因此这些列将始终为空。\n\n![9781430246268_Fig05-23.jpg](img/9781430246268_Fig05-23.jpg)\n\
  \n图 5-23. 填充了数据的 ITEM 表片段\n\n鉴别器列默认名为 `DTYPE`，类型为 `String`（映射到 `VARCHAR`），并包含实体的名称。如果默认值不合适，`@DiscriminatorColumn`\
  \ 注解允许你更改名称和数据类型。默认情况下，此列的值是它所引用的实体名称，尽管实体可以使用 `@DiscriminatorValue` 注解覆盖此值。\n\n\
  清单 5-56 将鉴别器列重命名为 `DISC`（而不是 `DTYPE`），并将其数据类型更改为 `Char` 而不是 `String`；然后每个实体应将其鉴别器值更改为\
  \ `I`（代表 `Item`）、`B`（代表 `Book`，参见 清单 5-57）和 `C`（代表 `CD`，参见 清单 5-58）。\n\n***清单 5-56.***  Item\
  \ 重新定义鉴别器列\n\n```\n@Entity\n@Inheritance(strategy = InheritanceType.SINGLE_TABLE)\n\
  @DiscriminatorColumn (name=\"disc\", →\n                      discriminatorType\
  \ = DiscriminatorType.CHAR)\n@DiscriminatorValue(\"I\")\npublic class Item {\n\n\
  @Id @GeneratedValue\n  protected Long id;\n  protected String title;\n  protected\
  \ Float price;\n  protected String description;\n\n// 构造函数、getter、setter\n}\n```\n\
  \n***清单 5-57.***  Book 将鉴别器值重新定义为 B\n\n```\n@Entity\n@DiscriminatorValue(\"B\")\n\
  public class Book extends Item {\n\nprivate String isbn;\n  private String publisher;\n\
    private Integer nbOfPage;\n  private Boolean illustrations;\n\n// 构造函数、getter、setter\n\
  }\n```\n\n\n\n***清单 5-58.***  CD 将鉴别器值重新定义为 C\n\n```\n@Entity\n@DiscriminatorValue(\"\
  C\")\npublic class CD extends Item {\n\nprivate String musicCompany;\n  private\
  \ Integer numberOfCDs;\n  private Float totalDuration;\n  private String genre;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n根实体 `Item` 通过 `@DiscriminatorColumn` 为整个层次结构定义了一次鉴别器列。然后，它通过\
  \ `@DiscriminatorValue` 注解将其自身的默认值更改为 `I`。子实体只需重新定义自己的鉴别器值。\n\n图 5-24 展示了结果。鉴别器列及其值与之前图\
  \ 5-23 中显示的不同。\n\n![9781430246268_Fig05-24.jpg](img/9781430246268_Fig05-24.jpg)\n\
  \n图 5-24. 具有不同鉴别器名称和值的 ITEM 表\n\n单表每类策略是默认策略，最容易理解，并且在层次结构相对简单且稳定时效果良好。然而，它也有一些缺点：向层次结构中添加新实体，或向现有实体添加属性，都需要向表中添加新列、迁移数据以及更改索引。此策略还要求子实体的列可为空。如果\
  \ `Book` 实体的 ISBN 恰好是非空的，那么你就无法再插入 CD，因为 `CD` 实体没有 ISBN。\n\n连接子类策略\n\n在连接子类策略中，层次结构中的每个实体都映射到自己的表。根实体映射到一个表，该表定义了层次结构中所有表要使用的主键，以及鉴别器列。每个子类由一个单独的表表示，该表包含其自身的属性（不从根类继承）以及一个引用根表主键的主键。非根表不包含鉴别器列。\n\
  \n你可以通过使用 `@Inheritance` 注解来标注根实体，从而实现连接子类策略，如清单 5-59 所示（`CD` 和 `Book` 的代码保持不变，与之前相同）。\n\
  \n***清单 5-59.***  采用连接子类策略的 Item 实体\n\n```\n@Entity\n@Inheritance(strategy = InheritanceType.JOINED\
  \ )\npublic class Item {\n\n@Id @GeneratedValue\n  protected Long id;\n  protected\
  \ String title;\n  protected Float price;\n  protected String description;\n\n//\
  \ 构造方法、getter、setter\n}\n```\n\n从开发者的角度来看，连接子类策略很自然，因为每个实体（无论是抽象的还是具体的）的状态都会映射到不同的表。图\
  \ 5-25 展示了 `Item`、`Book` 和 `CD` 实体将如何被映射。\n\n![9781430246268_Fig05-25.jpg](img/9781430246268_Fig05-25.jpg)\n\
  \n图 5-25. 使用连接子类策略映射继承关系\n\n你仍然可以在根实体中使用 `@DiscriminatorColumn` 和 `@DiscriminatorValue`\
  \ 注解来自定义鉴别器列和值（`DTYPE` 列位于 `ITEM` 表中）。\n\n连接子类策略直观且接近你所了解的对象继承机制。但查询可能会对性能产生影响。此策略之所以称为*连接*，是因为要重新组装子类的实例，必须将子类表与根类表进行连接。层次结构越深，组装叶子实体所需的连接就越多。此策略为多态关系提供了良好的支持，但在实例化实体子类时需要执行一个或多个连接操作。对于庞大的类层次结构，这可能会导致性能不佳。类似地，覆盖整个类层次结构的查询需要在子类表之间执行连接操作，从而导致性能下降。\n\
  \n具体类表策略\n\n在每类表（或具体类表）策略中，每个实体都映射到其自己的专用表，这与连接子类策略类似。不同之处在于，根实体的所有属性也将映射到子实体表的列中。从数据库的角度来看，此策略对模型进行了反规范化，并导致所有根实体属性在继承自它的所有叶子实体的表中被重新定义。使用具体类表策略，没有共享表、共享列，也没有鉴别器列。唯一的要求是所有表必须共享一个公共主键，该主键在层次结构中的所有表中匹配。\n\
  \n将我们的示例映射到此策略，只需在根实体（`Item`）的 `@Inheritance` 注解上指定 `TABLE_PER_CLASS`（参见清单 5-60）。\n\
  \n***清单 5-60.***  采用具体类表策略的 Item 实体\n\n```\n@Entity\n@Inheritance(strategy = InheritanceType.TABLE_PER_CLASS\
  \ )\npublic class Item {\n\n@Id @GeneratedValue\n  protected Long id;\n  protected\
  \ String title;\n  protected Float price;\n  protected String description;\n\n//\
  \ 构造方法、getter、setter\n}\n```\n\n图 5-26 展示了 `ITEM`、`BOOK` 和 `CD` 表。你可以看到 `BOOK` 和\
  \ `CD` 复制了 `ITEM` 表的 `ID`、`TITLE`、`PRICE` 和 `DESCRIPTION` 列。请注意，这些表之间没有关联。\n\n![9781430246268_Fig05-26.jpg](img/9781430246268_Fig05-26.jpg)\n\
  \n图 5-26. BOOK 和 CD 表复制了 ITEM 的列\n\n当然，请记住，可以通过使用 `@Table` 注解标注每个实体来重新定义每个表。\n\n\
  在查询单个实体的实例时，具体类表策略性能良好，因为它类似于使用单表每类策略：查询仅限于单个表。缺点是，它使得跨类层次结构的多态查询比其他策略更昂贵（例如，查找所有项目，包括\
  \ CD 和书籍）；它必须使用 `UNION` 操作查询所有子类表，当涉及大量数据时，此操作代价高昂。在 JPA 2.1 中，对此策略的支持仍然是可选的。\n\n\
  覆盖属性\n\n使用具体类表策略时，根类的列会在叶子表上重复。它们保持相同的名称。但如果使用的是遗留数据库，并且列具有不同的名称，该怎么办？JPA 使用 `@AttributeOverride`\
  \ 注解来覆盖列映射，并使用 `@AttributeOverrides` 来覆盖多个列映射。\n\n要重命名 `BOOK` 和 `CD` 表中的 `ID`、`TITLE`\
  \ 和 `DESCRIPTION` 列，`Item` 实体的代码无需更改，但 `Book` 实体（参见清单 5-61）和 `CD` 实体（参见清单 5-62）必须使用\
  \ `@AttributeOverride` 注解。\n\n***清单 5-61.***  Book 覆盖了 Item 的部分列\n\n```\n@Entity\n\
  @AttributeOverrides({\n  @AttributeOverride(name = \"id\", →\n                  \
  \ column = @Column(name = \"book_id\")),\n  @AttributeOverride(name = \"title\"\
  , →\n                   column = @Column(name = \"book_title\")),\n  @AttributeOverride(name\
  \ = \"description\", →\n                   column = @Column(name = \"book_description\"\
  ))\n})\npublic class Book extends Item {\n\nprivate String isbn;\n  private String\
  \ publisher;\n  private Integer nbOfPage;\n  private Boolean illustrations;\n\n\
  // 构造方法、getter、setter\n}\n```\n\n***清单 5-62.***  CD 覆盖了 Item 的部分列\n\n\n\n```\n@Entity\n\
  @AttributeOverrides({\n  @AttributeOverride(name = \"id\", →\n                  \
  \ column = @Column(name = \"cd_id\")),\n  @AttributeOverride(name = \"title\", →\n\
                     column = @Column(name = \"cd_title\")),\n  @AttributeOverride(name\
  \ = \"description\", →\n                   column = @Column(name = \"cd_description\"\
  ))\n})\npublic class CD extends Item {\n\nprivate String musicCompany;\n  private\
  \ Integer numberOfCDs;\n  private Float totalDuration;\n  private String genre;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n由于需要覆盖的属性不止一个，因此需要使用`@AttributeOverrides`，它接受一个`@AttributeOverride`注解数组。每个注解指向`Item`实体的一个属性，并使用`@Column`注解重新定义列的映射。因此，`name\
  \ = \"title\"`指的是`Item`实体的`title`属性，而`@Column(name = \"cd_title\")`则告知持久化提供者，标题必须映射到`CD_TITLE`列。图\
  \ 5-27 展示了结果。\n\n![9781430246268_Fig05-27.jpg](img/9781430246268_Fig05-27.jpg)\n\
  \n图 5-27. BOOK 和 CD 表覆盖 ITEM 列\n\n![image](img/sq.jpg) **注意**  在本章前面的“可嵌入类”部分，你了解到一个可嵌入对象可以被多个实体共享（`Address`被`Customer`和`Order`嵌入）。由于可嵌入对象是所属实体的固有部分，每个实体的表也会复制它们的列。如果需要覆盖可嵌入列，则可以使用`@AttributeOverrides`。\n\
  \n继承层次结构中的类类型\n\n之前用于解释映射策略的示例仅使用了实体。`Item`是一个实体，`Book`和`CD`也是实体。但实体并不总是必须继承自实体。一个类层次结构可以混合各种不同类型的类：实体以及非实体（或瞬态类）、抽象实体和映射超类。继承这些不同类型的类会对映射产生影响。\n\
  \n抽象实体\n\n在前面的示例中，`Item`实体是一个具体类。它使用`@Entity`注解，并且没有`abstract`关键字，但抽象类也可以被指定为实体。抽象实体与具体实体的区别仅在于它不能直接使用`new`关键字实例化。它为叶子实体（`Book`和`CD`）提供了公共数据结构，并遵循映射策略。对于持久化提供者而言，抽象实体被映射为一个实体。唯一的区别在于\
  \ Java 层面，而非映射层面。\n\n非实体\n\n非实体也称为*瞬态类*，即它们是 POJO。一个实体可以继承一个非实体，或者被一个非实体继承。为什么要在层次结构中包含非实体呢？对象建模和继承是共享状态和行为的手段。非实体可用于为叶子实体提供公共数据结构。非实体超类的状态不是持久的，因为它不受持久化提供者管理（请记住，类受持久化提供者管理的条件是存在`@Entity`注解）。\n\
  \n例如，`Book`是一个实体（清单 5-64），它继承自一个`Item`非实体（`Item`没有任何注解），如清单 5-63 所示。\n\n***清单 5-63.***  Item\
  \ 是一个没有 @Entity 的简单 POJO\n\n```\npublic class Item {\n\nprotected String title;\n\
    protected Float price;\n  protected String description;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n`Book`实体（清单 5-64）继承自`Item`，因此 Java 代码可以以正常的面向对象方式访问`title`、`price`和`description`属性，以及任何其他已定义的方法。`Item`可以是具体的或抽象的，并且对最终的映射没有任何影响。\n\
  \n***清单 5-64.***  Book 实体继承自一个 POJO\n\n```\n@Entity\npublic class Book extends Item\
  \ {\n\n@Id @GeneratedValue\n  private Long id;\n  private String isbn;\n  private\
  \ String publisher;\n  private Integer nbOfPage;\n  private Boolean illustrations;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n`Book`是一个实体并继承自`Item`。但只有`Book`的属性会被映射到表中。清单\
  \ 5-65 定义的表结构中不包含`Item`的任何属性。要持久化一个`Book`，你需要创建一个`Book`实例，为任何你想要的属性（`title`、`price`、`isbn`、`publisher`等）设置值，但只有`Book`的属性（`id`、`isbn`等）会被持久化。\n\
  \n***清单 5-65.***  BOOK 表不包含 Item 的属性\n\n```\ncreate table BOOK (\n  ID BIGINT not\
  \ null,\n  ILLUSTRATIONS SMALLINT,\n  ISBN VARCHAR(255),\n  NBOFPAGE INTEGER,\n\
    PUBLISHER VARCHAR(255),\n  primary key (ID)\n);\n```\n\n映射超类\n\nJPA 定义了一种特殊的类，称为*映射超类*，用于共享状态和行为，以及实体继承的映射信息。然而，映射超类不是实体。它们不受持久化提供者管理，没有要映射的表，不能被查询，也不能成为关系的一部分，但它们可以为任何扩展它们的实体提供持久化属性。它们类似于可嵌入类，区别在于它们可以用于继承。通过使用`@MappedSuperclass`注解标注一个类，可以将其指示为映射超类。\n\
  \n如清单 5-66 所示，根类`Item`使用`@MappedSuperclass`注解，而不是`@Entity`。它定义了一个继承策略（`JOINED`），并用`@Column`注解标注了它的一些属性，但由于映射超类不映射到表，因此不允许使用`@Table`注解。\n\
  \n***清单 5-66.***  Item 是一个映射超类\n\n```\n@MappedSuperclass\n@Inheritance(strategy\
  \ = InheritanceType.JOINED)\npublic class Item {\n\n@Id @GeneratedValue\n  protected\
  \ Long id;\n  @Column(length = 50, nullable = false)\n  protected String title;\n\
    protected Float price;\n  @Column(length = 2000)\n  protected String description;\n\
  \n// 构造方法、getter、setter\n}\n```\n\n如清单 5-66 所示，`title`和`description`属性使用了`@Column`注解。清单\
  \ 5-67 展示了继承`Item`的`Book`实体。\n\n***清单 5-67.***  Book 继承自一个映射超类\n\n```\n@Entity\n\
  public class Book extends Item {\n\nprivate String isbn;\n  private String publisher;\n\
    private Integer nbOfPage;\n  private Boolean illustrations;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n这个层次结构将被映射到仅一个表中。`Item`不是一个实体，也没有任何表。`Item`和`Book`的属性将被映射到`BOOK`表的列，但映射超类也会共享它们的映射信息。`Item`的`@Column`注解将被继承。但是，由于映射超类不是受管理的实体，你将无法持久化或查询它们，例如。清单\
  \ 5-68 展示了具有自定义`TITLE`和`DESCRIPTION`列的`BOOK`表结构。\n\n***清单 5-68.***  BOOK 表包含 Item\
  \ 的所有属性\n\n\n\n```\ncreate table BOOK (\n  ID BIGINT not null,\n  TITLE VARCHAR(50)\
  \ not null,\n  PRICE DOUBLE(52, 0),\n  DESCRIPTION VARCHAR(2000),\n  ILLUSTRATIONS\
  \ SMALLINT,\n  ISBN VARCHAR(255),\n  NBOFPAGE INTEGER,\n  PUBLISHER VARCHAR(255),\n\
  \  primary key (ID)\n);\n```\n\n摘要\n\n得益于“例外配置”原则，将实体映射到表所需的工作量极少：只需告知持久化提供者某个类是一个实体（使用`@Entity`注解）以及某个属性是其标识符（使用`@Id`注解），JPA\
  \ 便会处理其余工作。如果本章仅局限于默认配置，内容本可以简短得多。然而，JPA 提供了极为丰富的注解集，用于定制 ORM 的每一个细节（以及等效的 XML 映射）。\n\
  \n可以在属性（`@Basic`、`@Temporal`等）或类上使用基础注解来定制映射。你可以更改表名或主键类型，甚至可以使用`@Transient`注解避免映射。借助\
  \ JPA，你可以映射基本类型或可嵌入类的集合。根据你的业务模型，你可以映射不同方向和多重性的关系（`@OneToOne`、`@ManyToMany`等）。继承（`@Inheritance`、`@MappedSuperclass`等）也是如此，你可以使用不同的策略来映射实体与非实体混合的层次结构。\n\
  \n本章重点介绍了 JPA 的静态部分，即如何将实体映射到表。下一章将讨论动态方面：如何管理和查询这些实体。\n\n第 6 章\n\n![image](img/frontdot.jpg)\n\
  \n管理持久化对象\n\nJava 持久化 API 包含两个方面。第一个方面是将对象映射到关系数据库的能力。“例外配置”原则允许持久化提供者无需大量代码即可完成大部分工作，但\
  \ JPA 的丰富性也允许使用注解或 XML 描述符进行从对象到表的定制映射。从简单映射（更改列名）到更复杂的映射（继承），JPA 提供了广泛的定制选项。因此，你可以将几乎任何对象模型映射到遗留数据库。\n\
  \nJPA 的另一个方面是查询这些映射对象的能力。在 JPA 中，操作实体实例的集中式服务是实体管理器。它提供了一个 API 来创建、查找、删除对象以及与数据库同步。它还允许对实体执行不同类型的\
  \ JPQL 查询，例如动态查询、静态查询或原生查询。实体管理器还支持锁定机制。\n\n数据库世界依赖于结构化查询语言。这种编程语言专为管理关系数据（检索、插入、更新和删除）而设计，其语法以表为中心。你可以从由行组成的表中选择列，连接多个表，通过并集合并两个\
  \ SQL 查询的结果，等等。这里没有对象，只有行、列和表。在操作对象的 Java 世界中，必须对一种为表设计的语言（SQL）进行改造，以使其适应一种由对象构成的语言（Java）。这就是\
  \ Java 持久化查询语言的用武之地。\n\nJPQL 是 JPA 中定义的用于查询存储在关系数据库中的实体的语言。JPQL 语法类似于 SQL，但它是针对实体对象进行操作，而不是直接操作数据库表。JPQL\
  \ 不关心底层数据库结构，也不处理表或列，而是处理对象和属性。为此，它使用了 Java 开发人员熟悉的点（.）表示法。\n\n在本章中，你将学习如何管理持久化对象。这意味着你将学习如何使用实体管理器执行创建、读取、更新和删除（CRUD）操作，以及使用\
  \ JPQL 执行复杂查询。本章还将讨论 JPA 如何处理并发以及二级缓存。本章最后将解释实体的生命周期，以及 JPA 如何允许你在实体上发生某些事件时挂载自己的业务逻辑。\n\
  \n实体管理器\n\n\n\n实体管理器是 JPA 的核心组件。它管理实体的状态和生命周期，并在持久化上下文中查询实体。实体管理器负责创建和删除持久化实体实例，以及通过主键查找实体。它可以通过乐观锁或悲观锁锁定实体以防止并发访问，并可使用\
  \ JPQL 查询按特定条件检索实体。\n\n当实体管理器获取到实体的引用时，该实体被称为“受管”状态。在此之前，实体被视为普通的 POJO（即游离状态）。JPA\
  \ 的优势在于，实体可以被应用程序的不同层用作普通对象，并在需要将数据加载或插入数据库时由实体管理器进行管理。当实体处于受管状态时，你可以执行持久化操作，实体管理器会自动将实体的状态与数据库同步。当实体处于游离状态（即非受管状态）时，它会恢复为简单的\
  \ POJO，并可供其他层（例如 JavaServer Faces（JSF）表示层）使用，而无需将其状态与数据库同步。\n\n就持久化而言，实际工作始于实体管理器。`EntityManager`\
  \ 是由持久化提供程序实现的接口，用于生成和执行 SQL 语句。`javax.persistence.EntityManager` 接口提供了操作实体的 API（清单\
  \ 6-1 中展示了其子集）。\n\n***清单 6-1.***  EntityManager API 的子集\n\n```\npublic interface\
  \ EntityManager {\n\n// 工厂方法：创建实体管理器、关闭它并检查其是否已打开\n  EntityManagerFactory getEntityManagerFactory();\n\
    void close();\n  boolean isOpen();\n\n// 返回实体事务\n  EntityTransaction getTransaction();\n\
  \n// 将实体持久化、合并到数据库或从数据库移除\n  void persist(Object entity);\n  <T> T merge(T entity);\n\
    void remove(Object entity);\n\n// 基于主键查找实体（支持不同的锁定机制）\n  <T> T find(Class<T> entityClass,\
  \ Object primaryKey);\n  <T> T find(Class<T> entityClass, Object primaryKey, LockModeType\
  \ lockMode);\n  <T> T getReference(Class<T> entityClass, Object primaryKey);\n\n\
  // 使用指定的锁定模式类型（乐观锁、悲观锁等）锁定实体\n  void lock(Object entity, LockModeType lockMode);\n\
  \n// 将持久化上下文同步到底层数据库\n  void flush();\n  void setFlushMode(FlushModeType flushMode);\n\
    FlushModeType getFlushMode();\n\n// 从数据库刷新实体的状态，覆盖任何已做的更改\n  void refresh(Object\
  \ entity);\n  void refresh(Object entity, LockModeType lockMode);\n\n// 清除持久化上下文并检查是否包含某个实体\n\
    void clear();\n  void detach(Object entity);\n  boolean contains(Object entity);\n\
  \n// 设置和获取实体管理器属性或提示\n  void setProperty(String propertyName, Object value);\n  Map<String,\
  \ Object> getProperties();\n\n// 创建用于执行 JPQL 语句的 Query 或 TypedQuery 实例\n  Query\
  \ createQuery(String qlString);\n  <T> TypedQuery<T> createQuery(CriteriaQuery<T>\
  \ criteriaQuery);\n  <T> TypedQuery<T> createQuery(String qlString, Class<T> resultClass);\n\
  \n// 创建用于执行命名查询的 Query 或 TypedQuery 实例\n  Query createNamedQuery(String name);\n\
    <T> TypedQuery<T> createNamedQuery(String name, Class<T> resultClass);\n\n// 创建用于执行原生\
  \ SQL 查询的 Query 实例\n  Query createNativeQuery(String sqlString);\n  Query createNativeQuery(String\
  \ sqlString, Class resultClass);\n  Query createNativeQuery(String sqlString, String\
  \ resultSetMapping);\n\n// 创建用于在数据库中执行存储过程的 StoredProcedureQuery\n  StoredProcedureQuery\
  \ createStoredProcedureQuery(String procedureName);\n  StoredProcedureQuery createNamedStoredProcedureQuery(String\
  \ name);\n\n\n\n// 用于条件查询（select、update 和 delete）的元模型和条件构建器\n  CriteriaBuilder getCriteriaBuilder();\n\
    Metamodel getMetamodel();\n  Query createQuery(CriteriaUpdate updateQuery);\n\
    Query createQuery(CriteriaDelete deleteQuery);\n\n// 指示 JTA 事务处于活动状态，并将持久化上下文加入其中\n\
    void joinTransaction();\n  boolean isJoinedToTransaction();\n\n// 返回 EntityManager\
  \ 的底层提供者对象\n  <T> T unwrap(Class<T> cls);\n  Object getDelegate();\n\n// 返回一个实体图\n\
    <T> EntityGraph<T> createEntityGraph(Class<T> rootType);\n  EntityGraph<?> createEntityGraph(String\
  \ graphName);\n  <T> EntityGraph<T> getEntityGraph(String graphName);\n  <T> List<EntityGraph<?\
  \ super T>> getEntityGraphs(Class<T> entityClass);\n}\n```\n\n不要被清单 6-1 中的 API 吓到，本章将涵盖其中大部分方法。在下一节中，我将解释如何获取\
  \ `EntityManager` 的实例。\n\n获取实体管理器\n\n实体管理器是与实体交互的核心接口，但首先必须由应用程序获取。根据是容器管理环境（如你将在第\
  \ 7 章中看到的 EJB）还是应用程序管理环境，代码可能会有很大不同。例如，在容器管理环境中，事务由容器管理。这意味着你无需显式编写提交或回滚代码，而在应用程序管理环境中则必须这样做。\n\
  \n术语“应用程序管理”意味着应用程序负责显式获取 `EntityManager` 实例并管理其生命周期（例如，在完成后关闭实体管理器）。清单 6-2 中的代码演示了在\
  \ Java SE 环境中运行的类如何获取实体管理器实例。它使用 `Persistence` 类来引导一个与持久化单元（`chapter06PU`）关联的 `EntityManagerFactory`，然后使用该工厂创建实体管理器。请注意，在应用程序管理环境中，开发人员负责创建和关闭实体管理器（即管理其生命周期）。\n\
  \n***清单 6-2.***  使用 EntityManagerFactory 创建 EntityManager 的主类\n\n```\npublic class\
  \ Main {\n\npublic static void main(String[] args) {\n\n// 创建一个 Book 实例\n    Book\
  \ book = new Book (\"H2G2\", \"The Hitchhiker's Guide to the Galaxy\", 12.5F, →\n\
                           \"1-84023-742-2\", 354, false);\n\n// 获取实体管理器和事务\n    EntityManagerFactory\
  \ emf = Persistence .createEntityManagerFactory(\" chapter06PU \");\n    EntityManager\
  \ em = emf.createEntityManager();\n\n// 将图书持久化到数据库\n    EntityTransaction tx = em.getTransaction();\n\
      tx.begin();\n    em.persist(book);\n    tx.commit();\n\n// 关闭实体管理器和工厂\n    em.close();\n\
      emf.close();\n  }\n}\n```\n\n使用工厂创建应用程序管理的实体管理器非常简单，但应用程序管理与容器管理的区别在于工厂的获取方式。容器管理环境是指应用程序在\
  \ Servlet 或 EJB 容器中运行。在 Java EE 环境中，获取实体管理器最常见的方式是通过 `@PersistenceContext` 注解或 JNDI\
  \ 查找。在容器中运行的组件（Servlet、EJB、Web 服务等）无需创建或关闭实体管理器，因为其生命周期由容器管理。清单 6-3 展示了一个无状态会话 Bean\
  \ 的代码，我们向其中注入了 `chapter06PU` 持久化单元的引用。\n\n***清单 6-3.***  注入实体管理器引用的无状态 EJB\n\n```\n\
  @Stateless\npublic class BookEJB {\n\n@PersistenceContext(unitName = \"chapter06PU\"\
  )\n  private EntityManager em;\n\npublic void createBook() {\n\n// 创建一个 Book 实例\n\
      Book book = new Book (\"H2G2\", \"The Hitchhiker's Guide to the Galaxy\", 12.5F,\
  \ →\n                         \"1-84023-742-2\", 354, false);\n\n// 将图书持久化到数据库\n\
      em.persist(book);\n  }\n}\n```\n\n与清单 6-2 相比，清单 6-3 中的代码简单得多。首先，没有 `Persistence`\
  \ 或 `EntityManagerFactory`，因为容器会注入实体管理器实例。应用程序不负责管理 `EntityManager` 的生命周期（创建和关闭\
  \ `EntityManager`）。其次，由于无状态 Bean 管理事务，因此没有显式的提交或回滚。第 7 章将演示这种实体管理器风格。\n\n![image](img/sq.jpg) **注意**  如果你参考第\
  \ 2 章（上下文和依赖注入）中的“生产者”部分，就会明白如果你生产了 `EntityManager`（使用 `@Produces` 注解），也可以使用 `@Inject`\
  \ 注入它。\n\n持久化上下文\n\n在详细探索 `EntityManager` API 之前，你需要理解一个关键概念：*持久化上下文*。持久化上下文是在给定时间点，针对给定用户事务的一组受管实体实例：在持久化上下文中，只能存在一个具有相同持久化标识的实体实例。例如，如果持久化上下文中存在一个\
  \ ID 为 12 的 `Book` 实例，则在该持久化上下文中不能存在其他具有此 ID 的图书。只有包含在持久化上下文中的实体才受实体管理器管理，这意味着对它们的更改将反映到数据库中。\n\
  \n每当调用 `javax.persistence.EntityManager` 接口的方法时，实体管理器都会更新或查询持久化上下文。例如，当调用 `persist()`\
  \ 方法时，如果作为参数传递的实体尚不存在，它将被添加到持久化上下文中。类似地，当通过主键查找实体时，实体管理器首先检查请求的实体是否已存在于持久化上下文中。持久化上下文可以看作是一级缓存。它是一个短暂的、活跃的空间，实体管理器在将内容刷新到数据库之前在此存储实体。默认情况下，对象仅在事务持续期间存在于持久化上下文中。\n\
  \n总而言之，让我们看看图 6-1，其中两个用户需要访问存储在数据库中的实体数据。每个用户都有自己的持久化上下文，其持续时间与各自的事务相同。用户 1 从数据库中获取\
  \ ID 为 12 和 56 的 `Book` 实体，因此两者都存储在他的持久化上下文中。用户 2 获取 ID 为 12 和 34 的实体。如你所见，ID =\
  \ 12 的实体存储在每个用户的持久化上下文中。当事务运行时，持久化上下文充当一级缓存，存储可由 `EntityManager` 管理的实体。一旦事务结束，持久化上下文也随之结束，实体被清除。\n\
  \n![9781430246268_Fig06-01.jpg](img/9781430246268_Fig06-01.jpg)\n\n图 6-1. 存在于不同用户持久化上下文中的实体\n\
  \n实体管理器的配置与其创建它的工厂绑定。无论是应用程序管理还是容器管理，工厂都需要一个持久化单元来创建实体管理器。持久化单元规定了连接数据库的设置以及可在持久化上下文中管理的实体列表。位于\
  \ `META-INF` 目录下的 `persistence.xml` 文件（见清单 6-4）定义了持久化单元。持久化单元有一个名称（`chapter06PU`）和一组属性。\n\
  \n\n\n***清单 6-4.***  包含一组可管理实体的持久化单元\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\n<persistence xmlns=\" http://xmlns.jcp.org/xml/ns/persistence \"\n            \
  \ xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n             xsi:schemaLocation=\"\
  \ http://xmlns.jcp.org/xml/ns/persistence →\n             http://xmlns.jcp.org/xml/ns/persistence/persistence_2_1.xsd\
  \ \"\n             version=\"2.1\">\n\n<persistence-unit name=\" chapter06PU \"\
  \ transaction-type=\"RESOURCE_LOCAL\">\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
      <class>org.agoncal.book.javaee7.chapter06\\. Book </class>\n    <class>org.agoncal.book.javaee7.chapter06\\\
  . Customer </class>\n    <class>org.agoncal.book.javaee7.chapter06\\. Address </class>\n\
      <properties>\n      <property name=\"javax.persistence.schema-generation.database.action\"\
  \ →\n               value=\"drop-and-create\"/>\n      <property name=\"javax.persistence.jdbc.driver\"\
  \ →\n               value=\"org.apache.derby.jdbc.EmbeddedDriver\"/>\n      <property\
  \ name=\" javax.persistence.jdbc.url \" →\n               value=\"jdbc:derby:memory:\
  \ chapter06DB ;create=true\"/>\n      <property name=\" eclipselink.logging.level\
  \ \" value=\"INFO\"/>\n    </properties>\n  </persistence-unit>\n</persistence>\n\
  ```\n\n持久化单元是持久化上下文与数据库之间的桥梁。一方面，`<class>` 标签列出了所有可在持久化上下文中管理的实体；另一方面，它提供了物理连接到数据库所需的所有信息（通过属性）。这是因为你处于应用程序管理的环境中（`transaction-type=\"\
  RESOURCE_LOCAL\"`）。正如你将在第 7 章中看到的，在容器管理的环境中，`persistence.xml` 会定义一个数据源，而不是数据库连接属性，并将事务类型设置为\
  \ JTA（`transaction-type=\"JTA\"`）。\n\n在 JPA 2.1 中，`persistence.xml` 文件的一些属性已被标准化（参见表\
  \ 6-1）。它们都以 `javax.persistence` 开头，例如 `javax.persistence.jdbc.url`。JPA 提供者需要支持这些标准属性，但它们也可以提供自己的自定义属性，例如示例中的\
  \ EclipseLink 属性（如 `eclipselink.logging.level`）。\n\n表 6-1. 标准 JPA 属性\n\n| 属性 | 描述\
  \ |\n| --- | --- |\n| `javax.persistence.jdbc.driver` | 驱动类的完全限定名 |\n| `javax.persistence.jdbc.url`\
  \ | 特定于驱动的 URL |\n| `javax.persistence.jdbc.user` | 数据库连接使用的用户名 |\n| `javax.persistence.jdbc.password`\
  \ | 数据库连接使用的密码 |\n| `javax.persistence.database-product-name` | 目标数据库的名称（例如，Derby）\
  \ |\n| `javax.persistence.database-major-version` | 目标数据库的主版本号 |\n| `javax.persistence.database-minor-version`\
  \ | 目标数据库的次版本号 |\n| `javax.persistence.ddl-create-script-source` | 创建数据库的脚本名称 |\n\
  | `javax.persistence.ddl-drop-script-source` | 删除数据库的脚本名称 |\n| `javax.persistence.sql-load-script-source`\
  \ | 向数据库加载数据的脚本名称 |\n| `javax.persistence.schema-generation.database.action` | 指定对数据库采取的操作（`none`、`create`、`drop-and-create`、`drop`）\
  \ |\n| `javax.persistence.schema-generation.scripts.action` | 指定对 DDL 脚本采取的操作（`none`、`create`、`drop-and-create`、`drop`）\
  \ |\n| `javax.persistence.lock.timeout` | 悲观锁超时时间（毫秒） |\n| `javax.persistence.query.timeout`\
  \ | 查询超时时间（毫秒） |\n| `javax.persistence.validation.group.pre-persist` | 预持久化时进行验证的目标组\
  \ |\n| `javax.persistence.validation.group.pre-update` | 预更新时进行验证的目标组 |\n| `javax.persistence.validation.group.pre-remove`\
  \ | 预删除时进行验证的目标组 |\n\n操作实体\n\n作为 JPA 的核心部分，我们使用实体管理器进行简单的实体操作和复杂的 JPQL 查询执行。在操作单个实体时，`EntityManager`\
  \ 接口可以被视为一个通用的数据访问对象（DAO），它允许对任何实体进行 CRUD 操作（参见表 6-2）。\n\n表 6-2. 用于操作实体的 EntityManager\
  \ 接口方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `void persist(Object entity)` | 使实例变为受管且持久化\
  \ |\n| `<T> T find(Class<T> entityClass, Object primaryKey)` | 根据指定的类和主键查找实体 |\n\
  | `<T> T getReference(Class<T> entityClass, Object primaryKey)` | 获取一个实例，其状态可能被延迟加载\
  \ |\n| `void remove(Object entity)` | 从持久化上下文和底层数据库中移除实体实例 |\n| `<T> T merge(T entity)`\
  \ | 将给定实体的状态合并到当前持久化上下文中 |\n| `void refresh(Object entity)` | 从数据库刷新实例的状态，覆盖对实体所做的任何更改（如果有）\
  \ |\n| `void flush()` | 将持久化上下文同步到底层数据库 |\n| `void clear()` | 清除持久化上下文，导致所有受管实体变为游离状态\
  \ |\n| `void detach(Object entity)` | 从持久化上下文中移除给定实体，导致受管实体变为游离状态 |\n| `boolean\
  \ contains(Object entity)` | 检查该实例是否属于当前持久化上下文的受管实体实例 |\n\n为了帮助你更好地理解这些方法，我使用一个简单的示例，即\
  \ `Customer` 和 `Address` 之间的单向一对一关系。两个实体都有自动生成的标识符（得益于 `@GeneratedValue` 注解），并且\
  \ `Customer`（参见清单 6-5）对 `Address`（参见清单 6-6）进行了延迟加载。\n\n***清单 6-5.***  具有单向一对一地址的\
  \ Customer 实体\n\n```\n@Entity\npublic class Customer {\n\n\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  private String firstName;\n  private String lastName;\n \
  \ private String email;\n  @OneToOne (fetch = FetchType.LAZY)\n  @JoinColumn(name\
  \ = \"address_fk\")\n  private Address address;\n\n// 构造方法、getter、setter\n}\n```\n\
  \n***清单 6-6.***  地址实体\n\n```\n@Entity\npublic class Address {\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  private String street1;\n  private String city;\n  private\
  \ String zipcode;\n  private String country;\n\n// 构造方法、getter、setter\n}\n```\n\n\
  这两个实体将被映射到图 6-2 所示的数据库结构中。请注意，`ADDRESS_FK` 列是 `ADDRESS` 表的外键。\n\n![9781430246268_Fig06-02.jpg](img/9781430246268_Fig06-02.jpg)\n\
  \n图 6-2. CUSTOMER 和 ADDRESS 表\n\n为了更好的可读性，后续章节中使用的代码片段假定 `em` 属性是 `EntityManager`\
  \ 类型，`tx` 是 `EntityTransaction` 类型。\n\n持久化实体\n\n持久化实体意味着在数据不存在时将其插入数据库（否则会抛出 `EntityExistsException`\
  \ 异常）。为此，需要使用 `new` 运算符创建一个新的实体实例，设置属性值，在存在关联时将一个实体绑定到另一个实体，最后调用 `EntityManager.persist()`\
  \ 方法，如 清单 6-7 中的 JUnit 测试用例所示。\n\n***清单 6-7.***  持久化一个带地址的客户\n\n```\nCustomer customer\
  \ = new Customer(\"Antony\", \"Balla\", \" tballa@mail.com \");\nAddress address\
  \ = new Address(\"Ritherdon Rd\", \"London\", \"8QE\", \"UK\");\ncustomer.setAddress(address);\n\
  \ntx.begin();\nem. persist (customer);\nem. persist (address);\ntx.commit();\n\n\
  assertNotNull(customer.getId());\nassertNotNull(address.getId());\n```\n\n在清单 6-7\
  \ 中，`customer` 和 `address` 只是驻留在 JVM 内存中的两个对象。当实体管理器（变量 `em`）通过持久化它们（`em.persist(customer)`）将其纳入管理范围时，两者都成为受管实体。此时，这两个对象都具备了被插入数据库的资格。当事务提交时（`tx.commit()`），数据被刷新到数据库，一条地址行被插入到\
  \ `ADDRESS` 表中，一条客户行被插入到 `CUSTOMER` 表中。由于 `Customer` 是关系的所有者，其表持有指向 `ADDRESS` 的外键。`assertNotNull`\
  \ 表达式检查两个实体是否都已获得生成的标识符（这得益于持久化提供程序以及 `@Id` 和 `@GeneratedValue` 注解）。\n\n请注意 `persist()`\
  \ 方法的顺序：先持久化客户，然后持久化地址。如果顺序相反，结果也是一样的。之前，实体管理器被描述为一级缓存。在事务提交之前，数据保留在内存中，不会访问数据库。实体管理器会缓存数据，并在准备就绪时，按照底层数据库期望的顺序（遵守完整性约束）刷新数据。由于\
  \ `CUSTOMER` 表中存在外键，`ADDRESS` 的 `insert` 语句将首先执行，然后是 `CUSTOMER` 的 `insert` 语句。\n\
  \n![image](img/sq.jpg) **注意**  本章中的大多数实体并未实现 `Serializable` 接口。这是因为实体不需要实现该接口也能被持久化到数据库中。它们通过引用在方法之间传递，当需要持久化时，会调用\
  \ `EntityManager.persist()` 方法。但是，如果你需要按值传递实体（远程调用、外部 EJB 容器等），则它们必须实现 `java.io.Serializable`\
  \ 标记（无方法）接口。这向编译器指示，它必须强制实体类上的所有字段都是可序列化的，以便任何实例都可以被序列化为字节流，并通过远程方法调用（RMI）进行传递。\n\
  \n按 ID 查找\n\n要按标识符查找实体，可以使用两种不同的方法。第一种是 `EntityManager.find()` 方法，它有两个参数：实体类和唯一标识符（参见清单\
  \ 6-8）。如果找到实体，则返回该实体；如果未找到，则返回 null 值。\n\n***清单 6-8.***  按 ID 查找客户\n\n```\nCustomer\
  \ customer = em.find (Customer.class, 1234L)\nif (customer!= null) {\n  // 处理对象\n\
  }\n```\n\n第二种方法是 `getReference()`（参见清单 6-9）。它与 `find` 操作非常相似，具有相同的参数，但它检索的是对实体的引用（通过其主键），而不会检索其数据。可以将其视为实体的代理，而非实体本身。它适用于需要受管实体实例，但除了可能访问实体的主键外，不需要任何其他数据的情况。使用\
  \ `getReference()` 时，状态数据是延迟获取的，这意味着如果在实体分离之前没有访问状态，数据可能不存在。如果未找到实体，则会抛出 `EntityNotFoundException`\
  \ 异常。\n\n***清单 6-9.***  通过引用查找客户\n\n```\ntry {\n  Customer customer = em.getReference\
  \ (Customer.class, 1234L)\n  // 处理对象\n} catch(EntityNotFoundException ex) {\n  //\
  \ 未找到实体\n}\n```\n\n删除实体\n\n可以使用 `EntityManager.remove()` 方法删除实体。一旦删除，该实体将从数据库中删除，与实体管理器分离，并且无法再与数据库同步。就\
  \ Java 对象而言，该实体仍然可以访问，直到它超出作用域并被垃圾回收器清理。清单 6-10 中的代码展示了如何在创建对象后将其删除。\n\n***清单 6-10.***\
  \  创建并删除客户和地址实体\n\n```\nCustomer customer = new Customer(\"Antony\", \"Balla\",\
  \ \" tballa@mail.com \");\nAddress address = new Address(\"Ritherdon Rd\", \"London\"\
  , \"8QE\", \"UK\");\ncustomer.setAddress(address);\n\ntx.begin();\nem.persist(customer);\n\
  em.persist(address);\ntx.commit();\ntx.begin();\nem. remove (customer);\ntx.commit();\n\
  \n// 数据已从数据库中删除，但对象仍然可以访问\nassertNotNull( customer );\n```\n\n清单 6-10 中的代码创建了 `Customer`\
  \ 和 `Address` 的实例，将它们关联起来（`customer.setAddress(address)`），并持久化它们。在数据库中，客户行通过外键链接到地址；在代码的后续部分，仅删除了\
  \ `Customer`。根据级联的配置方式（本章稍后讨论），`Address` 可能没有其他实体引用它，该地址行将成为孤儿。\n\n孤儿删除\n\n\n\n\
  为了保持数据一致性，孤立数据是不可取的，因为它们会导致数据库中存在未被其他表引用的行，且无法访问。使用 JPA，你可以通知持久化提供程序自动删除孤立数据，或级联删除操作（稍后会看到）。如果目标实体（`Address`）由源实体（`Customer`）私有拥有，即目标实体绝不能同时被多个源实体拥有，并且该源实体被应用程序删除，那么提供程序也应删除该目标实体。\n\
  \n指定为一对一或一对多的关联支持使用孤立删除选项。为了在示例中包含此选项，我们来看看如何将 `orphanRemoval=true` 元素添加到 `@OneToOne`\
  \ 注解中（参见清单 6-11）。\n\n***清单 6-11.***  处理孤立地址删除的 Customer 实体\n\n```\n@Entity\npublic\
  \ class Customer {\n\n@Id @GeneratedValue\n  private Long id;\n  private String\
  \ firstName;\n  private String lastName;\n  private String email;\n  @OneToOne (fetch\
  \ = FetchType.LAZY, orphanRemoval=true )\n  private Address address;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n通过此映射，清单 6-10 中的代码将在删除客户或关系中断时（通过将 `address` 属性设置为 null，或在一对多情况下从集合中移除子实体）自动删除\
  \ `Address` 实体。删除操作在刷新操作（事务提交）时执行。\n\n与数据库同步\n\n到目前为止，与数据库的同步都是在提交时完成的。实体管理器是一级缓存，它等待事务提交后再将数据刷新到数据库。但是，当需要插入一个客户和一个地址时，会发生什么呢？\n\
  \n```\ntx.begin();\nem.persist(customer);\nem.persist(address);\ntx.commit();\n\
  ```\n\n所有待处理的更改都需要一条 SQL 语句；这里会生成两条 `insert` 语句，并且只有在数据库事务提交时才会永久生效。对于大多数应用程序来说，这种自动数据同步已经足够。虽然无法确切知道提供程序在哪个时间点将更改刷新到数据库，但可以确定的是，它发生在事务提交时。数据库会与持久化上下文中的实体同步，但数据可以被显式刷新（`flush`）到数据库，或者从数据库中刷新数据来更新实体（`refresh`）。如果数据在某个时间点被刷新到数据库，而稍后在代码中应用程序调用了\
  \ `rollback()` 方法，那么已刷新的数据将从数据库中移除。\n\n刷新实体\n\n使用 `EntityManager.flush()` 方法，可以显式强制持久化提供程序将数据刷新到数据库，但不会提交事务。这允许开发者手动触发实体管理器内部用于刷新持久化上下文的相同过程。\n\
  \n```\ntx.begin();\nem.persist(customer);\nem. flush ();\nem.persist(address);\n\
  tx.commit();\n```\n\n上述代码中发生了两件有趣的事情。第一，`em.flush()` 不会等待事务提交，而是强制提供程序刷新持久化上下文。在刷新时会生成并执行一条\
  \ `insert` 语句。第二，由于完整性约束，这段代码将无法工作。如果没有显式刷新，实体管理器会缓存所有更改，并以对数据库一致的方式对它们进行排序和执行。而有了显式刷新，`CUSTOMER`\
  \ 的 `insert` 语句会被执行，但地址外键上的完整性约束将被违反（`CUSTOMER` 表中的 `ADDRESS_FK` 列）。这将导致事务回滚。已刷新的数据也会被回滚。显式刷新应谨慎使用，并且仅在必要时使用。\n\
  \n刷新实体\n\n\n\n`refresh()` 方法用于执行与 flush 方向相反的数据同步，即用数据库中当前的数据覆盖受管实体的当前状态。一个典型场景是，当你使用\
  \ `EntityManager.refresh()` 方法来撤销仅对内存中的实体所做的更改时。在清单 6-12 中的测试用例片段中，通过 ID 查找一个 `Customer`，更改其名字，然后使用\
  \ `refresh()` 方法撤销此更改。\n\n***清单 6-12.***  从数据库刷新 Customer 实体\n\n```\nCustomer customer\
  \ = em.find(Customer.class, 1234L)\nassertEquals(customer.getFirstName(), \" Antony\
  \ \");\n\ncustomer.setFirstName(\" William \");\n\nem.refresh(customer);\nassertEquals(customer.getFirstName(),\
  \ \" Antony \");\n\");\n```\n\n持久化上下文的内容\n\n持久化上下文持有受管实体。通过 `EntityManager` 接口，你可以检查某个实体是否正在被管理、将其分离，或从持久化上下文中清除所有实体。\n\
  \nContains\n\n实体要么由实体管理器管理，要么不被管理。`EntityManager.contains()` 方法返回一个布尔值，允许你检查在当前持久化上下文中，某个特定的实体实例当前是否由实体管理器管理。在清单\
  \ 6-13 的测试用例中，一个 `Customer` 被持久化，你可以立即检查该实体是否被管理（`em.contains(customer)`）。答案是 `true`。之后，调用\
  \ `remove()` 方法，该实体从数据库和持久化上下文中被移除（`em.contains(customer)` 返回 `false`）。\n\n***清单\
  \ 6-13.***  检查 Customer 实体是否在持久化上下文中的测试用例\n\n```\nCustomer customer = new Customer(\"\
  Antony\", \"Balla\", \" tballa@mail.com \");\n\ntx.begin();\nem.persist(customer);\n\
  tx.commit();\n\nassertTrue ( em.contains(customer) );\n\ntx.begin();\nem.remove(customer);\n\
  tx.commit();\n\nassertFalse(em.contains(customer) );\n```\n\nClear 和 Detach\n\n\
  `clear()` 方法很直接：它清空持久化上下文，导致所有受管实体变为分离状态。`detach(Object entity)` 方法将给定的实体从持久化上下文中移除。在此类驱逐发生后，对实体所做的更改将不会同步到数据库。清单\
  \ 6-14 创建了一个实体，检查它是否被管理，将其从持久化上下文中分离，然后检查它是否已分离。\n\n***清单 6-14.***  检查 Customer\
  \ 实体是否在持久化上下文中\n\n```\nCustomer customer = new Customer(\"Antony\", \"Balla\", \"\
  \ tballa@mail.com \");\n\ntx.begin();\nem.persist(customer);\ntx.commit();\n\nassertTrue\
  \ (em.contains(customer));\n\nem.detach(customer);\n\nassertFalse (em.contains(customer));\n\
  ```\n\n合并实体\n\n一个分离的实体不再与持久化上下文关联。如果你想管理它，需要重新附加它（即合并它）。我们以一个需要在 JSF 页面中显示的实体为例。该实体首先从数据库加载到持久层（它是受管的），然后从本地\
  \ EJB 的调用中返回（由于事务上下文结束，它变为分离状态），表示层显示它（它仍然是分离的），然后它返回以更新到数据库。然而，在那一刻，实体是分离的，需要再次附加或合并，以使其状态与数据库同步。\n\
  \n清单 6-15 通过清除持久化上下文（`em.clear()`）来模拟这种情况，这会导致实体分离。\n\n***清单 6-15.***  清除持久化上下文并合并实体\n\
  \n```\nCustomer customer = new Customer(\"Antony\", \"Balla\", \" tballa@mail.com\
  \ \");\n\ntx.begin();\nem.persist(customer);\ntx.commit();\n\nem.clear();\n\n//\
  \ 为分离的实体设置一个新值\ncustomer.setFirstName(\"William\");\n\ntx.begin();\nem.merge(customer);\n\
  tx.commit();\n```\n\n清单 6-15 中的代码创建并持久化了一个客户。调用 `em.clear()` 强制分离了客户实体，但分离的实体继续存在于它们原先所在的持久化上下文之外，并且它们的状态不再保证与数据库状态同步。这正是\
  \ `customer.setFirstName(\"William\");` 所发生的情况：该操作在一个分离的实体上执行，数据并未在数据库中更新。要将此更改复制到数据库，你需要在事务内使用\
  \ `em.merge(customer)` 重新附加（即合并）该实体。\n\n更新实体\n\n更新实体很简单，但同时也可能令人困惑。正如你刚刚看到的，你可以使用\
  \ `EntityManager.merge()` 来附加一个实体并将其状态与数据库同步。但是，如果一个实体当前是受管的，对其所做的更改将自动反映到数据库中。如果不是，你将需要显式调用\
  \ `merge()`。\n\n清单 6-16 演示了持久化一个名字设置为 `Antony` 的客户。当你调用 `em.persist()` 方法时，该实体是受管的，因此对实体所做的任何更改都将与数据库同步。当你调用\
  \ `setFirstName()` 方法时，实体改变了其状态。实体管理器会缓存从 `tx.begin()` 开始的任何操作，并在提交时进行同步。\n\n***清单\
  \ 6-16.***  更新客户的名字\n\n```\nCustomer customer = new Customer(\" Antony \", \"Balla\"\
  , \" tballa@mail.com \");\n\ntx.begin();\nem. persist (customer);\n\ncustomer.setFirstName(\"\
  Williman\");\n\ntx.commit();\n```\n\n级联事件\n\n默认情况下，每个实体管理器操作仅适用于作为参数提供给该操作的实体。但有时，当对一个实体执行操作时，你可能希望将其传播到其关联实体上。这被称为*级联事件*。到目前为止的示例都依赖于默认的级联行为，而非自定义行为。在清单\
  \ 6-17 中，为了创建一个客户，你实例化了一个 `Customer` 和一个 `Address` 实体，将它们关联起来（`customer.setAddress(address)`），然后持久化这两个实体。\n\
  \n***清单 6-17.***  持久化一个带有地址的客户\n\n```\nCustomer customer = new Customer(\"Antony\"\
  , \"Balla\", \" tballa@mail.com \");\nAddress address = new Address(\"Ritherdon\
  \ Rd\", \"London\", \"8QE\", \"UK\");\ncustomer.setAddress(address);\n\ntx.begin();\n\
  em.persist(customer);\nem.persist(address);\ntx.commit();\n```\n\n由于 `Customer`\
  \ 和 `Address` 之间存在关系，你可以将 `persist` 操作从客户级联到地址。这意味着，如果 `Address` 实体允许传播此类事件，那么调用\
  \ `em.persist(customer)` 会将 `persist` 事件级联到 `Address` 实体。然后你可以精简代码，去掉 `em.persist(address)`，如清单\
  \ 6-18 所示。\n\n***清单 6-18.***  将 Persist 事件级联到 Address\n\n```\nCustomer customer\
  \ = new Customer(\"Antony\", \"Balla\", \" tballa@mail.com \");\nAddress address\
  \ = new Address(\"Ritherdon Rd\", \"London\", \"8QE\", \"UK\");\ncustomer.setAddress(address);\n\
  \ntx.begin();\nem.persist(customer);\ntx.commit();\n```\n\n\n\n如果没有级联操作，客户会被持久化，但地址不会。如果更改了关系的映射，就可以级联事件。注解\
  \ `@OneToOne`、`@OneToMany`、`@ManyToOne` 和 `@ManyToMany` 都有一个 `cascade` 属性，该属性接受一个要级联的事件数组，其中可以级联\
  \ `PERSIST` 事件以及 `REMOVE` 事件（通常用于执行删除级联）。要实现这一点，必须更改 `Customer` 实体的映射（参见清单 6-19），并在\
  \ `Address` 上的 `@OneToOne` 注解中添加一个 `cascade` 属性。\n\n***清单 6-19.***  客户实体级联持久化和删除事件\n\
  \n```\n@Entity\npublic class Customer {\n\n@Id @GeneratedValue\n  private Long id;\n\
  \  private String firstName;\n  private String lastName;\n  private String email;\n\
  \  @OneToOne (fetch = FetchType.LAZY, cascade = {CascadeType.PERSIST, CascadeType.REMOVE}\
  \ )\n  @JoinColumn(name = \"address_fk\")\n  private Address address;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n你可以从多个事件中选择要级联到目标关联的事件（表 6-3 列出了这些事件），甚至可以使用 `CascadeType.ALL` 类型级联所有事件。\n\
  \n表 6-3. 可级联的事件\n\n| 级联类型 | 描述 |\n| --- | --- |\n| `PERSIST` | 将持久化操作级联到关联的目标 |\n\
  | `REMOVE` | 将删除操作级联到关联的目标 |\n| `MERGE` | 将合并操作级联到关联的目标 |\n| `REFRESH` | 将刷新操作级联到关联的目标\
  \ |\n| `DETACH` | 将分离操作级联到关联的目标 |\n| `ALL` | 声明应级联所有上述操作 |\n\nJPQL\n\n你刚刚了解了如何使用\
  \ `EntityManager` API 单独操作实体。你知道如何通过 ID 查找实体、删除它、更新其属性等。但仅通过 ID 查找实体相当受限，因为你只能使用其唯一标识符检索单个实体。在实践中，你可能需要根据\
  \ ID 以外的条件（按名称、ISBN 等）检索实体，或者根据不同的条件（例如，所有居住在美国的客户）检索一组实体。这种可能性是关系数据库固有的，而 JPA 有一种允许这种交互的语言：JPQL。\n\
  \nJPQL 用于定义针对持久化实体的搜索，且独立于底层数据库。JPQL 是一种查询语言，其根源在于 SQL 的语法，SQL 是用于数据库查询的标准语言。但主要区别在于，在\
  \ SQL 中，获得的结果是行和列（表）的形式，而 JPQL 使用一个实体或实体集合。JPQL 语法是面向对象的，因此对于经验仅限于面向对象语言的开发人员来说更容易理解。开发人员通过使用点符号（例如，`myClass.myAttribute`）来管理他们的实体领域模型，而不是表结构。\n\
  \n在底层，JPQL 使用映射机制将 JPQL 查询转换为 SQL 数据库可理解的语言。该查询通过 SQL 和 JDBC 调用在底层数据库上执行，然后实体实例的属性被设置并返回给应用程序——所有这一切都通过丰富的查询语法以非常简单而强大的方式完成。\n\
  \n最简单的 JPQL 查询选择单个实体的所有实例。\n\n```\nSELECT b\nFROM Book b\n```\n\n如果你了解 SQL，这应该看起来很熟悉。JPQL\
  \ 不是从表中选择，而是选择实体，这里是 `Book`。`FROM` 子句也用于为实体指定别名：`b` 是 `Book` 的别名。查询的 `SELECT` 子句表明查询的结果类型是\
  \ `b` 实体（`Book`）。执行此语句将产生一个包含零个或多个 `Book` 实例的列表。\n\n要限制结果，可以添加搜索条件；你可以像下面这样使用 `WHERE`\
  \ 子句：\n\n```\nSELECT b\nFROM Book b\nWHERE b.title = 'H2G2'\n```\n\n别名用于通过点运算符导航实体属性。由于\
  \ `Book` 实体有一个名为 `title` 的 `String` 类型持久化属性，`b.title` 指的是 `Book` 实体的 `title` 属性。执行此语句将产生一个包含零个或多个标题等于\
  \ *H2G2* 的 `Book` 实例的列表。\n\n最简单的 select 查询由两个必需部分组成：`SELECT` 和 `FROM` 子句。`SELECT`\
  \ 定义了查询结果的格式。`FROM` 子句定义了将从中获取结果的一个或多个实体，可选的 `WHERE`、`ORDER BY`、`GROUP BY` 和 `HAVING`\
  \ 子句可用于限制或排序查询结果。清单 6-20 定义了 JPQL 语句的简化语法。\n\n***清单 6-20.***  简化的 JPQL 语句语法\n\n\
  ```\nSELECT <select 子句>\nFROM <from 子句>\n[WHERE <where 子句>]\n[ORDER BY <order by\
  \ 子句>]\n[GROUP BY <group by 子句>]\n[HAVING <having 子句>]\n```\n\n清单 6-20 定义了一个 `SELECT`\
  \ 语句，但也可以使用 `DELETE` 和 `UPDATE` 语句来对特定实体类的多个实例执行删除和更新操作。\n\nSelect\n\n`SELECT` 子句遵循路径表达式语法，并产生以下形式之一的结果：一个实体、一个实体属性、一个构造器表达式、一个聚合函数，或这些的某种序列。路径表达式是查询的构建块，用于通过点\
  \ (.) 导航在实体属性上或跨实体关系（或实体集合）进行导航，使用以下语法：\n\n```\nSELECT [DISTINCT] <表达式> [[AS] <标识变量>]\n\
  表达式 ::= { NEW | TREAT | AVG | MAX | MIN | SUM | COUNT }\n```\n\n一个简单的 `SELECT` 返回一个实体。例如，如果一个\
  \ `Customer` 实体有一个名为 `c` 的别名，`SELECT c` 将返回一个实体或实体列表。\n\n```\nSELECT c\nFROM Customer\
  \ c\n```\n\n但 `SELECT` 子句也可以返回属性。如果 `Customer` 实体有一个名字，`SELECT c.firstName` 将返回一个包含名字的\
  \ `String` 或 `String` 集合。\n\n```\nSELECT c.firstName\nFROM Customer c\n```\n\n要检索客户的名字和姓氏，你可以创建一个包含以下两个属性的列表：\n\
  \n```\nSELECT c.firstName, c.lastName\nFROM Customer c\n```\n\n自 JPA 2.0 起，可以根据条件（使用\
  \ `CASE WHEN` ... `THEN` ... `ELSE` ... `END` 表达式）检索属性。例如，不是检索一本书的价格，而是根据出版商返回价格的计算结果（例如，Apress\
  \ 的书籍打 5 折，所有其他书籍打 8 折）。\n\n```\nSELECT CASE b.editor WHEN 'Apress'\n          \
  \           THEN b.price * 0.5\n                     ELSE b.price * 0.8\n      \
  \ END\nFROM Book b\n```\n\n如果一个 `Customer` 实体与 `Address` 具有一对一关系，`c.address` 指的是客户的地址，以下查询的结果将返回的不是客户列表，而是地址列表：\n\
  \n```\nSELECT c.address\nFROM Customer c\n```\n\n导航表达式可以链接在一起以遍历复杂的实体图。使用这种技术，可以构造诸如\
  \ `c.address.country.code` 之类的路径表达式，指的是客户地址的国家代码。\n\n```\nSELECT c.address.country.code\n\
  FROM Customer c\n```\n\n可以在 `SELECT` 表达式中使用构造器，以返回一个用查询结果初始化的 Java 类实例。该类不必是实体，但构造器必须是完全限定的，并且与属性匹配。\n\
  \n```\nSELECT NEW org.agoncal.javaee7.CustomerDTO(c.firstName, c.lastName, c.address.street1)\n\
  FROM Customer c\n```\n\n\n\n此查询的结果是一个使用 `new` 运算符实例化，并用客户的姓氏、名字和街道地址初始化的 `CustomerDTO`\
  \ 对象列表。\n\n执行这些查询将返回单个值或包含零个或多个实体（或属性）的集合（包括重复项）。要移除重复项，必须使用 `DISTINCT` 运算符。\n\n\
  ```\nSELECT DISTINCT c\nFROM Customer c\n\nSELECT DISTINCT c.firstName\nFROM Customer\
  \ c\n```\n\n查询的结果可以是应用于路径表达式的聚合函数的结果。以下聚合函数可用于 `SELECT` 子句：`AVG`、`COUNT`、`MAX`、`MIN`、`SUM`。结果可以在\
  \ `GROUP BY` 子句中进行分组，并使用 `HAVING` 子句进行过滤。\n\n```\nSELECT COUNT (c)\nFROM Customer\
  \ c\n```\n\n标量表达式也可以在查询的 `SELECT` 子句以及 `WHERE` 和 `HAVING` 子句中使用。这些表达式可用于数值（`ABS`、`SQRT`、`MOD`、`SIZE`、`INDEX`）、字符串（`CONCAT`、`SUBSTRING`、`TRIM`、`LOWER`、`UPPER`、`LENGTH`、`LOCATE`）和日期时间（`CURRENT_DATE`、`CURRENT_TIME`、`CURRENT_TIMESTAMP`）值。\n\
  \nFrom\n\n查询的 `FROM` 子句通过声明标识变量来定义实体。一个*标识变量*，或*别名*，是一个可以在其他子句（`SELECT`、`WHERE`\
  \ 等）中使用的标识符。`FROM` 子句的语法由一个实体和一个别名组成。在以下示例中，`Customer` 是实体，`c` 是标识变量：\n\n```\nSELECT\
  \ c\nFROM Customer c\n```\n\nWhere\n\n查询的 `WHERE` 子句由一个条件表达式组成，用于限制 `SELECT`、`UPDATE`\
  \ 或 `DELETE` 语句的结果。`WHERE` 子句可以是一个简单的表达式，也可以是一组用于过滤查询的条件表达式。\n\n限制查询结果的最简单方法是使用实体的属性。例如，以下查询选择所有名为\
  \ Vincent 的客户：\n\n```\nSELECT c\nFROM Customer c\nWHERE c.firstName = 'Vincent'\n\
  ```\n\n你可以通过使用逻辑运算符 `AND` 和 `OR` 进一步限制查询。以下示例使用 `AND` 选择所有名为 Vincent 且居住在法国的客户：\n\
  \n```\nSELECT c\nFROM Customer c\nWHERE c.firstName = 'Vincent' AND c.address.country\
  \ = 'France'\n```\n\n`WHERE` 子句还使用比较运算符：`=`、`>`、`>=`、`<`、`<=`、`<>`、`[NOT] BETWEEN`、`[NOT]\
  \ LIKE`、`[NOT] IN`、`IS [NOT] NULL`、`IS [NOT] EMPTY`、`[NOT] MEMBER [OF]`。以下展示了使用其中两个运算符的示例：\n\
  \n```\nSELECT c\nFROM Customer c\nWHERE c.age > 18\n\nSELECT c\nFROM Customer c\n\
  WHERE c.age NOT BETWEEN 40 AND 50\n\nSELECT c\nFROM Customer c\nWHERE c.address.country\
  \ IN ('USA', 'Portugal')\n```\n\n`LIKE` 表达式由一个字符串和可选的转义字符组成，这些字符定义了匹配条件：下划线（`_`）用于单字符通配符，百分号（`%`）用于多字符通配符。\n\
  \n```\nSELECT c\nFROM Customer c\nWHERE c.email LIKE '%mail.com'\n```\n\n绑定参数\n\n\
  到目前为止，本文中展示的 `WHERE` 子句仅使用了固定值。在应用程序中，查询通常依赖于参数。JPQL 支持两种参数绑定语法，允许动态更改查询的限制子句：位置参数和命名参数。\n\
  \n*位置参数*由问号（`?`）后跟一个整数（例如 `?1`）表示。执行查询时，需要指定应被替换的参数编号。\n\n```\nSELECT c\nFROM Customer\
  \ c\nWHERE c.firstName = ?1 AND c.address.country = ?2\n```\n\n*命名参数*也可以使用，并由一个以冒号（`:`）符号为前缀的\
  \ `String` 标识符表示。执行查询时，需要指定应被替换的参数名称。\n\n```\nSELECT c\nFROM Customer c\nWHERE c.firstName\
  \ = :fname AND c.address.country = :country\n```\n\n在本章后面的“查询”部分，你将看到应用程序如何绑定参数。\n\
  \n子查询\n\n子查询是嵌入在 `WHERE` 或 `HAVING` 子句的条件表达式中的 `SELECT` 查询。子查询的结果在主查询的条件表达式中进行评估和解释。要从数据库中检索最年轻的客户，首先执行一个带有\
  \ `MIN(age)` 的子查询，然后在主查询中评估其结果。\n\n```\nSELECT c\nFROM Customer c\nWHERE c.age =\
  \ ( SELECT MIN(cust. age) FROM Customer cust )\n)\n```\n\nOrder By\n\n`ORDER BY`\
  \ 子句允许对 `SELECT` 查询返回的实体或值进行排序。排序应用于此子句中指定的实体属性，后跟 `ASC` 或 `DESC` 关键字。关键字 `ASC`\
  \ 指定使用升序排序；`DESC` 则相反，指定使用降序排序。升序是默认值，可以省略。\n\n```\nSELECT c\nFROM Customer c\n\
  WHERE c.age > 18\nORDER BY c.age DESC\n```\n\n也可以使用多个表达式来细化排序顺序。\n\n```\nSELECT\
  \ c\nFROM Customer c\nWHERE c.age > 18\nORDER BY c.age DESC , c.address.country\
  \ ASC\n```\n\nGroup By 和 Having\n\n`GROUP BY` 结构允许根据一组属性对结果值进行聚合。实体根据 `GROUP BY`\
  \ 子句中指定的实体字段的值被分成组。要按国家/地区对客户进行分组并计数，请使用以下查询：\n\n```\nSELECT c.address.country,\
  \ count(c)\nFROM Customer c\nGROUP BY c.address.country\n```\n\n`GROUP BY` 定义了分组表达式（`c.address.country`），结果将根据这些表达式进行聚合和计数（`count(c)`）。请注意，出现在\
  \ `GROUP BY` 子句中的表达式也必须出现在 `SELECT` 子句中。\n\n`HAVING` 子句在查询结果分组后定义一个适用的过滤器，类似于辅助的\
  \ `WHERE` 子句，用于过滤 `GROUP BY` 的结果。使用前面的查询，通过添加 `HAVING` 子句，可以返回除英国以外的国家/地区的结果。\n\n\
  ```\nSELECT c.address.country, count(c)\nFROM Customer c\nGROUP BY c.address.country\n\
  HAVING c.address.country <> 'UK'\n```\n\n`GROUP BY` 和 `HAVING` 只能在 `SELECT` 子句中使用（不能在\
  \ `DELETE` 或 `UPDATE` 中使用）。\n\n批量删除\n\n你已经知道如何使用 `EntityManager.remove()` 方法移除实体，以及如何查询数据库以检索符合特定条件的实体列表。要移除一个实体列表，你可以执行一个查询，遍历它，并逐个移除每个实体。虽然这是一个有效的算法，但它在性能方面非常糟糕（数据库访问次数过多）。有一种更好的方法：批量删除。\n\
  \nJPQL 跨特定实体类的多个实例执行批量删除操作。这些操作用于在单个操作中删除大量实体。`DELETE` 语句看起来像 `SELECT` 语句，因为它可以有一个限制性的\
  \ `WHERE` 子句并使用参数。结果会返回受操作影响的实体实例数量。`DELETE` 语句的语法是\n\n```\nDELETE FROM <entity\
  \ name> [[AS] <identification variable>]\n[WHERE <where clause>]\n```\n\n例如，要删除所有年龄小于\
  \ 18 岁的客户，你可以通过 `DELETE` 语句使用批量移除。\n\n```\nDELETE FROM Customer c\nWHERE c.age <\
  \ 18\n```\n\n批量更新\n\n实体的批量更新通过 `UPDATE` 语句完成，设置实体在 `WHERE` 子句条件下满足的一个或多个属性。`UPDATE`\
  \ 语句的语法是\n\n```\nUPDATE <entity name> [[AS] <identification variable>]\nSET <update\
  \ statement> {, <update statement>}*\n[WHERE <where clause>]\n```\n\n与其删除所有年轻客户，不如使用以下语句将其名字更改为“too\
  \ young”：\n\n```\nUPDATE Customer c\nSET c.firstName = 'TOO YOUNG'\nWHERE c.age\
  \ < 18\n```\n\n查询\n\n\n\n您已经了解了 JPQL 语法以及如何使用不同的子句（`SELECT`、`FROM`、`WHERE` 等）来描述语句。但如何将\
  \ JPQL 语句集成到您的应用程序中呢？答案是通过查询。JPA 2.1 提供了五种不同类型的查询，可在代码中使用，每种查询都有不同的用途。\n\n*   *动态查询*：这是最简单的查询形式，仅包含在运行时动态指定的\
  \ JPQL 查询字符串。\n*   *命名查询*：命名查询是静态且不可更改的。\n*   *Criteria API*：JPA 2.0 引入了面向对象查询 API\
  \ 的概念。\n*   *原生查询*：此类查询用于执行原生 SQL 语句而非 JPQL 语句。\n*   *存储过程查询*：JPA 2.1 带来了一个用于调用存储过程的新\
  \ API。\n\n从这五种查询类型中进行选择的核心是 `EntityManager` 接口，它提供了多个工厂方法，如表 6-4 所示，这些方法返回 `Query`、`TypedQuery`\
  \ 或 `StoredProcedureQuery` 接口（`TypedQuery` 和 `StoredProcedureQuery` 都扩展了 `Query`）。当结果类型为\
  \ `Object` 时使用 `Query` 接口，当需要类型化结果时使用 `TypedQuery`。`StoredProcedureQuery` 用于控制存储过程查询的执行。\n\
  \n表 6-4. 用于创建查询的 EntityManager 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `Query createQuery(String\
  \ jpqlString)` | 创建一个 `Query` 实例，用于执行动态查询的 JPQL 语句 |\n| `Query createNamedQuery(String\
  \ name)` | 创建一个 `Query` 实例，用于执行命名查询（JPQL 或原生 SQL） |\n| `Query createNativeQuery(String\
  \ sqlString)` | 创建一个 `Query` 实例，用于执行原生 SQL 语句 |\n| `Query createNativeQuery(String\
  \ sqlString, Class resultClass)` | 原生查询，传入预期结果的类 |\n| `Query createNativeQuery(String\
  \ sqlString, String resultSetMapping)` | 原生查询，传入结果集映射 |\n| `<T> TypedQuery<T> createQuery(CriteriaQuery<T>\
  \ criteriaQuery)` | 创建一个 `TypedQuery` 实例，用于执行 Criteria 查询 |\n| `<T> TypedQuery<T>\
  \ createQuery(String jpqlString, Class<T> resultClass)` | 类型化查询，传入预期结果的类 |\n| `<T>\
  \ TypedQuery<T> createNamedQuery(String name, Class<T> resultClass)` | 类型化查询，传入预期结果的类\
  \ |\n| `StoredProcedureQuery createStoredProcedureQuery(String procedureName)` |\
  \ 创建一个 `StoredProcedureQuery`，用于执行数据库中的存储过程 |\n| 1\\. `StoredProcedureQuery createStoredProcedureQuery(String\
  \ procedureName, Class... resultClasses)` | 存储过程查询，传入结果集要映射到的类 |\n| 2\\. `StoredProcedureQuery\
  \ createStoredProcedureQuery(String procedureName, String... resultSetMappings)`\
  \ | 存储过程查询，传入结果集映射 |\n| `StoredProcedureQuery createNamedStoredProcedureQuery(String\
  \ name)` | 为命名存储过程创建查询 |\n\n当您通过 `EntityManager` 接口中的某个工厂方法获得 `Query`、`TypedQuery`\
  \ 或 `StoredProcedureQuery` 接口的实现时，一个丰富的 API 将对其进行控制。`Query` API（如清单 6-21 所示）用于静态查询（即命名查询）和使用\
  \ JPQL 的动态查询，以及 SQL 中的原生查询。`Query` API 还支持参数绑定和分页控制。\n\n***清单 6-21.***  Query API\n\
  \n```\npublic interface Query {\n\n// 执行查询并返回结果\n  List getResultList();\n  Object\
  \ getSingleResult();\n  int executeUpdate();\n\n// 为查询设置参数\n  Query setParameter(String\
  \ name, Object value);\n  Query setParameter(String name, Date value, TemporalType\
  \ temporalType);\n  Query setParameter(String name, Calendar value, TemporalType\
  \ temporalType);\n  Query setParameter(int position, Object value);\n  Query setParameter(int\
  \ position, Date value, TemporalType temporalType);\n  Query setParameter(int position,\
  \ Calendar value, TemporalType temporalType);\n  <T> Query setParameter(Parameter<T>\
  \ param, T value);\n  Query setParameter(Parameter<Date> param, Date value, TemporalType\
  \ temporalType);\n  Query setParameter(Parameter<Calendar> param, Calendar value,\
  \ TemporalType temporalType);\n\n// 从查询中获取参数\n  Set<Parameter<?>> getParameters();\n\
  \  Parameter<?> getParameter(String name);\n  Parameter<?> getParameter(int position);\n\
  \  <T> Parameter<T> getParameter(String name, Class<T> type);\n  <T> Parameter<T>\
  \ getParameter(int position, Class<T> type);\n  boolean isBound(Parameter<?> param);\n\
  \  <T> T getParameterValue(Parameter<T> param);\n  Object getParameterValue(String\
  \ name);\n  Object getParameterValue(int position);\n\n// 限制查询返回的结果数量\n  Query setMaxResults(int\
  \ maxResult);\n  int getMaxResults();\n  Query setFirstResult(int startPosition);\n\
  \  int getFirstResult();\n\n// 设置和获取查询提示\n  Query setHint(String hintName, Object\
  \ value);\n  Map<String, Object> getHints();\n\n// 设置用于查询执行的刷新模式类型\n  Query setFlushMode(FlushModeType\
  \ flushMode);\n  FlushModeType getFlushMode();\n\n// 设置用于查询执行的锁定模式类型\n  Query setLockMode(LockModeType\
  \ lockMode);\n  LockModeType getLockMode();\n\n// 允许访问特定于提供者的 API\n  <T> T unwrap(Class<T>\
  \ cls);\n}\n```\n\n此 API 中最常用的方法是执行查询本身的方法。要执行 `SELECT` 查询，您需要根据所需结果在两种方法之间进行选择。\n\
  \n*   `getResultList()` 方法执行查询并返回结果列表（实体、属性、表达式等）。\n*   `getSingleResult()` 方法执行查询并返回单个结果（如果找到多个结果，则抛出\
  \ `NonUniqueResultException`）。\n\n要执行更新或删除操作，`executeUpdate()` 方法会执行批量查询，并返回受查询执行影响的实体数量。\n\
  \n正如您之前在“JPQL”部分所见，查询可以使用命名参数（例如 `:myParam`）或位置参数（例如 `?1`）。`Query` API 定义了多个 `setParameter`\
  \ 方法，用于在执行查询之前设置参数。\n\n当您执行查询时，它可能会返回大量结果。根据应用程序的不同，这些结果可以一起处理，也可以分块处理（例如，Web 应用程序一次只显示十行）。为了控制分页，`Query`\
  \ 接口定义了 `setFirstResult()` 和 `setMaxResults()` 方法，用于指定要接收的第一个结果（从零开始编号）以及相对于该点返回的最大结果数。\n\
  \n刷新模式向持久化提供者指示如何处理待处理的更改和查询。有两种可能的刷新模式设置：`AUTO` 和 `COMMIT`。`AUTO`（默认值）意味着持久化提供者负责确保待处理的更改对查询的处理可见。`COMMIT`\
  \ 是指对实体所做的更新效果不会与持久化上下文中的更改数据重叠。\n\n可以使用 `setLockMode(LockModeType)` 方法锁定查询。锁旨在提供一种机制，以乐观或悲观的方式实现可重复读取的效果。\n\
  \n以下各节将使用上述一些方法来说明五种不同类型的查询。\n\n动态查询\n\n\n\n动态查询是根据应用需求即时定义的。要创建动态查询，请使用 `EntityManager.createQuery()`\
  \ 方法，该方法接受一个代表 JPQL 查询的 `String` 作为参数。\n\n在以下代码中，JPQL 查询从数据库中选取所有客户。该查询的结果是一个列表，因此当你调用\
  \ `getResultList()` 方法时，它会返回一个 `Customer` 实体列表（`List<Customer>`）。然而，如果你知道查询只返回单个实体，请使用\
  \ `getSingleResult()` 方法。它会返回单个实体，并避免以列表形式检索数据的工作。\n\n```\nQuery query = em. createQuery\
  \ (\"SELECT c FROM Customer c\");\nList<Customer> customers = query. getResultList\
  \ ();\n```\n\n这个 JPQL 查询返回一个 `Query` 对象。当你调用 `query.getResultList()` 方法时，它会返回一个未类型化对象的列表。如果你希望同一个查询返回类型为\
  \ `Customer` 的列表，则需要使用 `TypedQuery`，如下所示：\n\n```\nTypedQuery <Customer> query =\
  \ em.createQuery(\"SELECT c FROM Customer c\", Customer.class );\nList<Customer>\
  \ customers = query.getResultList();\n```\n\n这个查询字符串也可以由应用动态创建，从而可以在运行时指定一个事先未知的复杂查询。字符串拼接用于根据条件动态构建查询。\n\
  \n```\nString jpqlQuery = \"SELECT c FROM Customer c\";\nif (someCriteria)\n    jpqlQuery\
  \ += \" WHERE c.firstName = 'Betty'\";\nquery = em.createQuery( jpqlQuery );\nList<Customer>\
  \ customers = query.getResultList();\n```\n\n前面的查询检索名为 Betty 的客户，但你可能想为名字引入一个参数。传递参数有两种选择：使用名称或位置。在下面的示例中，我在查询中使用了一个名为\
  \ `:fname` 的命名参数（注意 `:` 符号），并通过 `setParameter` 方法进行绑定：\n\n```\nquery = em.createQuery(\"\
  SELECT c FROM Customer c where c.firstName = :fname \");\nquery.setParameter(\"\
  \ fname \", \"Betty\");\nList<Customer> customers = query.getResultList();\n```\n\
  \n请注意，参数名称 `fname` 不包含查询中使用的冒号。使用位置参数的代码如下所示：\n\n```\nquery = em.createQuery(\"\
  SELECT c FROM Customer c where c.firstName = ?1 \");\nquery.setParameter( 1 , \"\
  Betty\");\nList<Customer> customers = query.getResultList();\n```\n\n如果你需要使用分页功能以每十块一组的方式显示客户列表，可以按如下方式使用\
  \ `setMaxResults` 方法：\n\n```\nquery = em.createQuery(\"SELECT c FROM Customer c\"\
  , Customer.class);\nquery. setMaxResults (10);\nList<Customer> customers = query.getResultList();\n\
  ```\n\n动态查询需要考虑的一个问题是在运行时将 JPQL 字符串转换为 SQL 语句的成本。由于查询是动态创建且无法预测的，持久化提供程序必须解析 JPQL\
  \ 字符串、获取 ORM 元数据并生成等效的 SQL。处理每个此类动态查询的性能成本可能成为一个问题。如果你有不可更改的静态查询，并希望避免这种开销，那么可以使用命名查询。\n\
  \n命名查询\n\n命名查询与动态查询的不同之处在于它们是静态且不可更改的。除了其静态特性（不允许动态查询的灵活性）之外，命名查询的执行效率可能更高，因为持久化提供程序可以在应用启动时将\
  \ JPQL 字符串转换为 SQL，而不是每次执行查询时都进行转换。\n\n命名查询是在 `@NamedQuery` 注解或等效的 XML 中的元数据内表达的静态查询。要定义这些可重用的查询，请使用\
  \ `@NamedQuery` 注解对实体进行注解，该注解包含两个元素：查询的名称及其内容。因此，让我们修改 `Customer` 实体，并使用注解静态定义三个查询（参见清单\
  \ 6-22）。\n\n\n\n***清单 6-22.***  定义命名查询的客户实体\n\n```\n@Entity\n@NamedQueries({\n \
  \ @NamedQuery ( name = \" findAll \", query =\"select c from Customer c\"),\n  @NamedQuery(name\
  \ = \"findVincent\", →\n              query=\"select c from Customer c where c.firstName\
  \ = 'Vincent'\"),\n  @NamedQuery(name = \"findWithParam\", →\n              query=\"\
  select c from Customer c where c.firstName = :fname\")\n})\npublic class Customer\
  \ {\n\n@Id @GeneratedValue\n  private Long id;\n  private String firstName;\n  private\
  \ String lastName;\n  private Integer age;\n  private String email;\n  @OneToOne\n\
  \  @JoinColumn(name = \"address_fk\")\n  private Address address;\n\n// 构造方法、getter、setter\n\
  }\n```\n\n由于 `Customer` 实体定义了多个命名查询，因此它使用了 `@NamedQueries` 注解，该注解接受一个 `@NamedQuery`\
  \ 数组。第一个查询名为 `findAll`，用于从数据库中无限制地选择所有客户（无 `WHERE` 子句）。`findWithParam` 查询使用参数 `:fname`\
  \ 通过客户的名字进行筛选。清单 6-22 展示了一个 `@NamedQuery` 数组，但如果 `Customer` 只有一个查询，则可以如下定义：\n\n\
  ```\n@Entity\n@NamedQuery ( name = \" findAll \", query =\"select c from Customer\
  \ c\")\npublic class Customer {...}\n```\n\n执行这些命名查询的方式与使用动态查询类似。调用 `EntityManager.createNamedQuery()`\
  \ 方法，并传入注解定义的查询名称。该方法返回一个 `Query` 或 `TypedQuery`，可用于设置参数、最大结果数、获取模式等。要执行 `findAll`\
  \ 查询，请编写以下代码：\n\n```\nQuery query = em. createNamedQuery (\" findAll \");\n```\n\
  \n同样，如果你需要指定查询类型以返回 `Customer` 对象列表，则需要像下面这样使用 `TypedQuery`：\n\n```\nTypedQuery\
  \ <Customer> query = em.createNamedQuery(\"findAll\", Customer.class );\n```\n\n\
  以下是调用 `findWithParam` 命名查询的代码片段，它传递了参数 `:fname`，并将最大结果数设置为 `3`：\n\n```\nQuery query\
  \ = em.createNamedQuery(\"findWithParam\");\nquery.setParameter(\"fname\", \"Vincent\"\
  );\nquery. setMaxResults (3);\nList<Customer> customers = query.getResultList();\n\
  ```\n\n由于 `Query` API 的大多数方法都返回一个 `Query` 对象，你可以使用以下简洁的快捷方式来编写查询。你可以一个接一个地调用方法（`setParameter().setMaxResults()`\
  \ 等）。\n\n```\nQuery query = em.createNamedQuery(\"findWithParam\").setParameter(\"\
  fname\", \"Vincent\") →\n                                                  .setMaxResults(3);\n\
  ```\n\n命名查询对于组织查询定义非常有用，并且对于提高应用程序性能也很强大。这种组织性源于命名查询是在实体上静态定义的，并且通常放置在直接对应于查询结果的实体类上（这里的\
  \ `findAll` 查询返回客户，因此它应该在 `Customer` 实体中定义）。\n\n有一个限制：查询名称的作用域是持久化单元，并且在该作用域内必须是唯一的，这意味着只能存在一个\
  \ `findAll` 方法。针对客户的 `findAll` 查询和针对地址的 `findAll` 查询应该使用不同的名称。一种常见的做法是在查询名称前加上实体名称作为前缀。例如，`Customer`\
  \ 实体的 `findAll` 查询可以命名为 `Customer.findAll`。\n\n另一个问题是，查询名称是一个字符串，会被操作，如果你输入错误或重构代码，可能会遇到一些指示查询不存在的异常。为了降低风险，你可以用常量替换查询名称。清单\
  \ 6-23 展示了如何重构 `Customer` 实体。\n\n***清单 6-23.***  使用常量定义命名查询的客户实体\n\n```\n@Entity\n\
  @NamedQuery(name = Customer.FIND_ALL , query=\"select c from Customer c\"),\npublic\
  \ class Customer {\n\npublic static final String FIND_ALL = \"Customer.findAll\"\
  ;\n\n// 属性、构造方法、getter、setter\n}\n```\n\n`FIND_ALL` 常量通过在查询名称前加上实体名称作为前缀，明确地标识了\
  \ `findAll` 查询。然后在 `@NamedQuery` 注解中使用相同的常量，你可以像下面这样使用该常量来执行查询：\n\n```\nTypedQuery<Customer>\
  \ query = em.createNamedQuery( Customer.FIND_ALL , Customer.class);\n```\n\nCriteria\
  \ API（或面向对象查询）\n\n到目前为止，我一直使用字符串来编写 JPQL（动态或命名查询）语句。这样做的好处是可以简洁地编写数据库查询，但缺点是容易出错，并且外部框架难以操作：它是一个字符串，你最终会拼接字符串，因此很容易出现拼写错误。例如，你可能会在\
  \ JPQL 关键字（将 `SELECT` 写成 `SLECT`）、类名（将 `Customer` 写成 `Custmer`）或属性（将 `firstName`\
  \ 写成 `firstname`）上出错。你也可能写出语法不正确的语句（例如 `SELECT c WHERE c.firstName = 'John' FROM\
  \ Customer`）。这些错误中的任何一个都将在运行时被发现，并且有时可能很难找到错误的来源。\n\nJPA 2.0 创建了一个新的 API，称为 *Criteria\
  \ API*，定义在 `javax.persistence.criteria` 包中。它允许你以面向对象且语法正确的方式编写任何查询。开发人员在编写语句时可能犯的大多数错误都会在编译时被发现，而不是在运行时。其思想是，所有\
  \ JPQL 关键字（`SELECT`、`UPDATE`、`DELETE`、`WHERE`、`LIKE`、`GROUP BY`...）都在此 API 中定义。换句话说，Criteria\
  \ API 支持 JPQL 能做的所有事情，但使用的是基于对象的语法。让我们首先看一个检索所有名为“Vincent”的客户的查询。在 JPQL 中，它看起来像这样：\n\
  \n```\nSELECT c FROM Customer c WHERE c.firstName = 'Vincent'\n```\n\n这个 JPQL 语句在清单\
  \ 6-24 中使用 Criteria API 以面向对象的方式重写。\n\n***清单 6-24.***  选择所有名为 Vincent 的客户的 Criteria\
  \ 查询\n\n```\nCriteriaBuilder builder = em.getCriteriaBuilder();\nCriteriaQuery <Customer>\
  \ criteriaQuery = builder.createQuery(Customer.class);\nRoot <Customer> c = criteriaQuery\
  \ . from (Customer.class);\ncriteriaQuery . select (c). where (builder.equal( c.get(\"\
  firstName\") , \"Vincent\"));\nQuery query = em.createQuery( criteriaQuery ).getResultList();\n\
  List<Customer> customers = query.getResultList();\n```\n\n\n\n无需深入细节，您就能看到 `SELECT`、`FROM`\
  \ 和 `WHERE` 关键字通过 `select()`、`from()` 和 `where()` 方法在 API 中得以呈现。这一规则适用于每一个 JPQL\
  \ 关键字。条件查询通过 `CriteriaBuilder` 接口构建，该接口由 `EntityManager`（即清单 6-24 和 6-25 中的 `em`\
  \ 属性）获取。它包含构建查询定义的方法（该接口定义了诸如 `desc()`、`asc()`、`avg()`、`sum()`、`max()`、`min()`、`count()`、`and()`、`or()`、`greaterThan()`、`lowerThan()`\
  \ 等关键字）。`CriteriaBuilder` 的另一个作用是作为条件查询（`CriteriaQuery`）及条件查询元素的主要工厂。该接口定义了诸如 `select()`、`from()`、`where()`、`orderBy()`、`groupBy()`\
  \ 和 `having()` 等方法，它们在 JPQL 中具有等效的含义。在清单 6-24 中，获取别名 **c**（如 `SELECT` **c** `FROM\
  \ Customer` 所示）的方式是通过 `Root` 接口（`Root<Customer> c`）。然后，您只需使用构建器、查询和根对象，即可编写任何您想要的\
  \ JPQL 语句：从最简单的（从数据库中查询所有实体）到最复杂的（连接、子查询、CASE 表达式、函数等）。\n\n***清单 6-25.***  查询所有年龄大于\
  \ 40 的客户的条件查询\n\n```\nCriteriaBuilder builder = em.getCriteriaBuilder();\nCriteriaQuery<Customer>\
  \ criteriaQuery = builder.createQuery(Customer.class);\nRoot<Customer> c = criteriaQuery.from(Customer.class);\n\
  criteriaQuery.select(c).where(builder.greaterThan( c.get(\"age\").as(Integer.class)\
  \ , 40));\nQuery query = em.createQuery(criteriaQuery).getResultList();\nList<Customer>\
  \ customers = query.getResultList();\n```\n\n我们再举一个例子。清单 6-25 展示了一个查询，它检索所有年龄大于\
  \ 40 的客户。`c.get(\"age\")` 从 `Customer` 实体中获取 `age` 属性，并检查其是否大于 40。\n\n在本节开头，我曾提到\
  \ Criteria API 允许您编写无错误的语句。但这并非完全正确。当您查看清单 6-24 和 6-25 时，仍然可以看到一些表示 `Customer` 实体属性的字符串（`\"\
  firstName\"` 和 `\"age\"`）。因此，仍然可能出现拼写错误。在清单 6-25 中，我们甚至需要将 `age` 转换为 `Integer` 类型（`c.get(\"\
  age\").as(Integer.class)`），因为除此之外没有其他方法可以得知 `age` 属性是 `Integer` 类型。为了解决这些问题，Criteria\
  \ API 为每个实体附带了一个静态元模型类，从而为 API 带来了类型安全性。\n\n类型安全的 Criteria API\n\n清单 6-24 和 6-25\
  \ 几乎是类型安全的：每个 JPQL 关键字都可以通过 `CriteriaBuilder` 和 `CriteriaQuery` 接口的方法来表示。唯一缺失的部分是基于字符串的实体属性：引用客户的\
  \ `firstName` 属性的方式是调用 `c.get(\"firstName\")`。`get` 方法接受一个字符串作为参数。类型安全的 Criteria\
  \ API 通过使用元模型 API 类中的路径表达式重写此方法，从而解决了这个问题，带来了类型安全性。\n\n清单 6-26 展示了具有多个不同类型属性（`Long`、`String`、`Integer`、`Address`）的\
  \ `Customer` 实体。\n\n***清单 6-26.***  具有多种属性类型的客户实体\n\n```\n@Entity\npublic class\
  \ Customer {\n\n@Id @GeneratedValue\n  private Long id;\n  private String firstName;\n\
  \  private String lastName;\n  private Integer age;\n  private String email;\n \
  \ private Address address;\n\n// 构造方法、getter、setter\n}\n```\n\n为了实现类型安全，JPA 2.1\
  \ 可以为每个实体生成一个静态元模型类。约定是每个实体 `X` 都会有一个名为 `X_`（带下划线）的元数据类。因此，`Customer` 实体将拥有其元模型表示，该表示在清单\
  \ 6-27 所示的 `Customer_` 类中描述。\n\n***清单 6-27.***  描述 Customer 元模型的 Customer_ 类\n\n\
  ```\n@Generated(\"EclipseLink\")\n@StaticMetamodel(Customer.class)\npublic class\
  \ Customer_ {\n\npublic static volatile SingularAttribute<Customer, Long > id;\n\
  \  public static volatile SingularAttribute<Customer, String > firstName;\n  public\
  \ static volatile SingularAttribute<Customer, String> lastName;\n  public static\
  \ volatile SingularAttribute<Customer, Integer > age;\n  public static volatile\
  \ SingularAttribute<Customer, String> email;\n  public static volatile SingularAttribute<Customer,\
  \ Address > address;\n}\n```\n\n在静态元模型类中，`Customer` 实体的每个属性都由 `javax.persistence.metamodel.Attribute`\
  \ 的子类（`CollectionAttribute`、`ListAttribute`、`MapAttribute`、`SetAttribute` 或 `SingularAttribute`）定义。这些属性中的每一个都使用了泛型，并且是强类型的（例如，`SingularAttribute<Customer,\
  \ Integer>, age`）。清单 6-28 展示了与清单 6-25 完全相同的代码，但使用了静态元模型类进行了重写（`c.get(\"age\")` 变成了\
  \ `c.get(Customer_.age)`）。类型安全的另一个优点是，元模型将 `age` 属性定义为 `Integer` 类型，因此无需使用 `as(Integer.class)`\
  \ 将该属性转换为 `Integer` 类型。\n\n***清单 6-28.***  选择所有年龄大于 40 的客户的类型安全条件查询\n\n```\nCriteriaBuilder\
  \ builder = em.getCriteriaBuilder();\nCriteriaQuery<Customer> criteriaQuery = builder.createQuery(Customer.class);\n\
  Root<Customer> c = criteriaQuery.from(Customer.class);\ncriteriaQuery.select(c).where(builder.greaterThan(\
  \ c.get(Customer_.age) , 40));\nQuery query = em.createQuery(criteriaQuery).getResultList();\n\
  List<Customer> customers = query.getResultList();\n```\n\n再次强调，这些只是您可以使用 Criteria\
  \ API 实现的功能示例。它是一个非常丰富的 API，在 JPA 2.1 规范的第 5 章（*元模型 API*）和第 6 章（*Criteria API*）中有完整定义。\n\
  \n![image](img/sq.jpg) **注意**  静态元模型中使用的类，例如 `Attribute` 或 `SingularAttribute`，是标准的，并在\
  \ `javax.persistence.metamodel` 包中定义。但静态元模型类的生成是特定于实现的。EclipseLink 使用一个名为 `CanonicalModelProcessor`\
  \ 的内部类。此处理器可以在您开发 Java 命令、Ant 任务或 Maven 插件时，由您的集成开发环境（IDE）调用。\n\n原生查询\n\nJPQL 拥有非常丰富的语法，允许您以任何形式处理实体，并确保跨数据库的可移植性。JPA\
  \ 允许您通过使用原生查询来利用数据库的特定功能。原生查询将原生 SQL 语句（`SELECT`、`UPDATE` 或 `DELETE`）作为参数，并返回一个用于执行该\
  \ SQL 语句的 `Query` 实例。但是，原生查询预计无法跨数据库移植。\n\n如果代码不可移植，为什么不使用 JDBC 调用呢？使用 JPA 原生查询而非\
  \ JDBC 调用的主要原因是，查询的结果将自动转换回实体。如果您想使用 SQL 从数据库中检索所有客户实体，您需要使用 `EntityManager.createNativeQuery()`\
  \ 方法，该方法将 SQL 查询和结果应映射到的实体类作为参数。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n```\nQuery query = em.createNativeQuery (\" SELECT * FROM t_customer \", Customer.class);\n\
  List<Customer> customers = query.getResultList();\n```\n\n如您在前面的代码片段中所见，SQL 查询是一个可以在运行时动态创建的字符串（就像\
  \ JPQL 动态查询一样）。同样，查询可能很复杂，并且由于持久化提供程序无法预先知道，因此它每次都会对其进行解释。与命名查询一样，原生查询可以使用注解来定义静态\
  \ SQL 查询。命名原生查询使用 `@NamedNativeQuery` 注解定义，该注解必须放在任何实体上（参见下面的代码）。与 JPQL 命名查询一样，查询的名称在持久化单元内必须是唯一的。\n\
  \n```\n@Entity\n@NamedNativeQuery(name = \"findAll\", query=\"select * from t_customer\"\
  )\n@Table(name = \"t_customer\")\npublic class Customer {...}\n```\n\n## 存储过程查询\n\
  \n到目前为止，所有不同的查询（JPQL 或 SQL）都有相同的目的：从应用程序向数据库发送一个查询，数据库执行该查询并发回结果。存储过程的不同之处在于，它们实际上存储在数据库本身中，并在该数据库内执行。\n\
  \n存储过程是一个子程序，可供访问关系型数据库的应用程序使用。典型的用途可能包括需要执行多个 SQL 语句的广泛或复杂处理，或者数据密集型的重复性任务。存储过程通常使用接近\
  \ SQL 的专有语言编写，因此在不同数据库供应商之间不易移植。但是，将代码存储在数据库内部，即使以不可移植的方式，也提供了许多优点，例如：\n\n*   由于存储过程的预编译以及其执行计划的重用，性能更佳，\n\
  *   保留代码的统计信息以保持其优化，\n*   通过将代码保留在服务器上来减少通过网络传输的数据量，\n*   在中心位置修改代码，而无需在多个不同程序中复制，\n\
  *   存储过程可以被用不同语言（不仅仅是 Java）编写的多个程序使用，\n*   通过只允许存储过程访问数据来隐藏原始数据，以及\n*   通过授予用户独立于底层表权限执行存储过程的权限来增强安全控制。\n\
  \n让我们看一个实际的例子：归档旧书和旧 CD。在某个日期之后，书籍和 CD 必须归档到某个仓库中，这意味着它们必须从仓库实际转移到经销商处。归档书籍和 CD\
  \ 可能是一个耗时的过程，因为需要更新多个表（库存、仓库、书籍、CD、运输等表）。因此，我们可以编写一个存储过程来重新组合多个 SQL 语句并提高性能。在清单\
  \ 6-29 中定义的存储过程 `sp_archive_books` 接受一个归档日期和一个仓库代码作为参数，并更新 `T_Inventory` 和 `T_Transport`\
  \ 表。\n\n***清单 6-29.***  归档书籍的存储过程摘要\n\n```\nCREATE PROCEDURE sp_archive_books @archiveDate\
  \ DATE, @warehouseCode VARCHAR AS\n  UPDATE T_Inventory\n  SET Number_Of_Books_Left\
  \ - 1\n  WHERE Archive_Date < @archiveDate AND Warehouse_Code = @warehouseCode ;\n\
  \nUPDATE T_Transport\n  SET Warehouse_To_Take_Books_From = @warehouseCode ;\nEND\n\
  ```\n\n清单 6-29 中的存储过程被编译到数据库中，然后可以通过其名称（`sp_archive_books`）调用。如您所见，存储过程以输入或输出参数的形式接受数据。输入参数（在我们的示例中是\
  \ `@archiveDate` 和 `@warehouseCode`）用于执行存储过程，而存储过程又可以产生一些输出结果。此结果通过结果集返回给应用程序。\n\
  \n在 JPA 2.1 中，`StoredProcedureQuery` 接口（它扩展了 `Query`）支持存储过程。与动态查询、命名查询或原生查询不同，该\
  \ API 只允许您调用数据库中已存在的存储过程，而不能定义它。您可以使用注解（使用 `@NamedStoredProcedureQuery`）或动态地调用存储过程。\n\
  \n清单 6-30 展示了使用命名查询注解声明 `sp_archive_books` 存储过程的 `Book` 实体。`NamedStoredProcedureQuery`\
  \ 注解指定了要调用的存储过程的名称、所有参数的类型（`Date.class` 和 `String.class`）、它们对应的参数模式（`IN`、`OUT`、`INOUT`、`REF_CURSOR`）以及如何映射结果集（如果有的话）。需要为每个参数提供一个\
  \ `StoredProcedureParameter` 注解。\n\n***清单 6-30.***  声明命名存储过程的实体\n\n```\n@Entity\n\
  @NamedStoredProcedureQuery (name = \"archiveOldBooks\", procedureName = \" sp_archive_books\
  \ \",\n  parameters = {\n    @StoredProcedureParameter (name = \" archiveDate \"\
  , mode = IN, type = Date.class),\n    @StoredProcedureParameter(name = \" warehouse\
  \ \", mode = IN, type = String.class)\n  }\n)\npublic class Book {\n\n@Id @GeneratedValue\n\
    private Long id;\n  private String title;\n  private Float price;\n  private String\
  \ description;\n  private String isbn;\n  private String editor;\n  private Integer\
  \ nbOfPage;\n  private Boolean illustrations;\n\n// 构造函数、getter、setter\n}\n```\n\
  \n要调用 `sp_archive_books` 存储过程，您需要使用实体管理器并通过传递其名称（`archiveOldBooks`）来创建一个命名存储过程查询。这将返回一个\
  \ `StoredProcedureQuery`，您可以在其上设置参数并执行它，如清单 6-31 所示。\n\n***清单 6-31.***  调用 StoredProcedureQuery\n\
  \n```\nStoredProcedureQuery query = em. createNamedStoredProcedureQuery (\" archiveOldBooks\
  \ \");\nquery.setParameter(\"archiveDate\", new Date());\nquery.setParameter(\"\
  maxBookArchived\", 1000);\nquery.execute();\n```\n\n如果存储过程未使用元数据（`@NamedStoredProcedureQuery`）定义，您可以使用\
  \ API 动态指定一个存储过程查询。这意味着必须通过编程方式提供参数和结果集信息。这可以使用 `StoredProcedureQuery` 接口的 `registerStoredProcedureParameter`\
  \ 方法来完成，如清单 6-32 所示。\n\n***清单 6-32.***  注册和调用 StoredProcedureQuery\n\n```\nStoredProcedureQuery\
  \ query = em. createStoredProcedureQuery (\"sp_archive_old_books\");\nquery. registerStoredProcedureParameter\
  \ (\" archiveDate \", Date.class, ParameterMode.IN);\nquery. registerStoredProcedureParameter\
  \ (\" maxBookArchived \", Integer.class, ParameterMode.IN);\n\nquery.setParameter(\"\
  archiveDate\", new Date());\nquery.setParameter(\"maxBookArchived\", 1000);\nquery.execute();\n\
  ```\n\n## 缓存 API\n\n大多数规范（不仅仅是 Java EE）都高度关注功能需求，而将性能、可伸缩性或集群等非功能需求留作实现细节。实现必须严格遵守规范，但也可能添加特定功能。JPA\
  \ 的一个完美例子就是缓存。\n\n直到 JPA 2.0，规范中都没有提到缓存。实体管理器是一级缓存，用于全面处理数据库的数据并缓存短生命周期的实体。此一级缓存在每个事务的基础上使用，以减少给定事务内的\
  \ SQL 查询数量。例如，如果一个对象在同一事务中被多次修改，实体管理器将在事务结束时只生成一条 `UPDATE` 语句。一级缓存不是性能缓存。\n\n\n\n\
  尽管如此，所有 JPA 实现都使用性能缓存（即二级缓存）来优化数据库访问、查询、连接等操作。如图 6-3 所示，二级缓存位于实体管理器与数据库之间，通过将已加载的对象保留在内存中并供整个应用程序使用，来减少数据库流量。\n\
  \n![9781430246268_Fig06-03.jpg](img/9781430246268_Fig06-03.jpg)\n\n图 6-3. 二级缓存\n\
  \n每种实现都有自己缓存对象的方式，要么开发自己的机制，要么重用现有的机制（开源或商业）。缓存可以跨集群分布，也可以不分布——当规范忽略某个主题时，一切皆有可能。JPA\
  \ 2.0 承认了二级缓存的必要性，并在标准 API 中添加了缓存操作。如清单 6-33 所示，该 API 非常精简（因为 JPA 的目标并非标准化一个功能完备的缓存），但它允许以标准方式从二级缓存中查询和移除某些实体。与\
  \ `EntityManager` 类似，`javax.persistence.Cache` 是一个由持久化提供者缓存系统实现的接口。\n\n***清单 6-33.***\
  \  缓存 API\n\n```\npublic interface Cache {\n\n// 缓存是否包含给定实体\n  public boolean contains(Class\
  \ cls, Object id);\n\n// 从缓存中移除给定实体\n  public void evict(Class cls, Object id);\n\
  \  // 从缓存中移除指定类（及其子类）的实体\n  public void evict(Class cls);\n\n// 清空缓存。\n  public\
  \ void evictAll();\n\n// 返回提供者特定的缓存实现\n  public <T> T unwrap(Class<T> cls);\n}\n\
  ```\n\n你可以使用此 API 来检查特定实体是否在二级缓存中，将其从缓存中移除，或清空整个缓存。结合此 API，你可以通过使用 `@Cacheable`\
  \ 注解显式告知提供者某个实体是否可缓存，如清单 6-34 所示。如果实体没有 `@Cacheable` 注解，则意味着提供者不得缓存该实体及其状态。\n\n\
  ***清单 6-34.***  客户实体是可缓存的\n\n```\n@Entity\n@Cacheable(true)\npublic class Customer\
  \ {\n\n@Id @GeneratedValue\n  private Long id;\n  private String firstName;\n  private\
  \ String lastName;\n  private String email;\n\n// 构造方法、getter、setter\n}\n```\n\n\
  `@Cacheable` 注解接受一个布尔值。一旦你决定了哪些实体应该可缓存，就需要告知提供者使用哪种缓存机制。在 JPA 中，实现此目的的方法是在 `persistence.xml`\
  \ 文件中设置 `shared-cache-mode` 属性。以下是可能的值：\n\n*   `ALL`：所有实体及实体相关的状态和数据都被缓存。\n*   `DISABLE_SELECTIVE`：除使用\
  \ `@Cacheable(false)` 注解的实体外，所有实体都启用缓存。\n*   `ENABLE_SELECTIVE`：仅为使用 `@Cacheable(true)`\
  \ 注解的实体启用缓存。\n*   `NONE`：对该持久化单元禁用缓存。\n*   `UNSPECIFIED`：缓存行为未定义（可能应用提供者特定的默认值）。\n\
  \n如果不设置这些值中的任何一个，则由提供者决定使用哪种缓存机制。清单 6-35 中的代码展示了如何使用此缓存机制。首先，我们创建一个 `Customer` 对象并持久化它。由于\
  \ `Customer` 是可缓存的（参见清单 6-34），它应该位于二级缓存中（通过使用 `EntityManagerFactory.getCache().contains()`\
  \ 方法）。调用 `cache.evict(Customer.class)` 方法会将该实体从缓存中移除。\n\n***清单 6-35.***  客户实体是可缓存的\n\
  \n```\nCustomer customer = new Customer(\"Patricia\", \"Jane\", \" plecomte@mail.com\
  \ \");\n\ntx.begin();\nem.persist(customer);\ntx.commit();\n\n// 使用 EntityManagerFactory\
  \ 获取缓存\nCache cache = emf.getCache();\n\n// 客户应该在缓存中\nassertTrue( cache.contains\
  \ (Customer.class, customer.getId()));\n\n// 从缓存中移除客户实体\ncache.evict (Customer.class);\n\
  \n// 客户不应再存在于缓存中\nassertFalse( cache.contains (Customer.class, customer.getId()));\n\
  ```\n\n并发\n\nJPA 可用于更改持久化数据，JPQL 可用于按特定条件检索数据。所有这些都可能发生在运行于具有多个节点、多个线程和单个数据库的集群中的应用程序内，因此实体被并发访问是相当常见的。在这种情况下，必须由应用程序使用锁定机制来控制同步。无论应用程序是简单还是复杂，你很可能都会在代码中的某处使用锁定。\n\
  \n为了说明并发数据库访问的问题，让我们看一个具有两个并发线程的应用程序示例，如图 6-4 所示。一个线程通过其标识符找到一本书，并将该书的价格提高 2 美元。另一个线程执行相同操作，但将价格提高\
  \ 5 美元。如果你在单独的事务中并发执行这两个线程并操作同一本书，则无法预测该书的最终价格。在此示例中，书的初始价格为 10 美元。根据哪个事务最后完成，价格可能是\
  \ 12 美元或 15 美元。\n\n![9781430246268_Fig06-04.jpg](img/9781430246268_Fig06-04.jpg)\n\
  \n图 6-4. 事务一（tx1）和事务二（tx2）并发更新一本书的价格\n\n这种“最后提交者获胜”的并发问题并非 JPA 所独有。数据库长期以来一直需要处理这个问题，并找到了不同的解决方案来将一个事务与其他事务隔离开。数据库使用的一种常见机制是锁定正在执行\
  \ SQL 语句的行。\n\nJPA 2.1 使用了两种不同的锁定机制（JPA 1.0 仅支持乐观锁定）。\n\n*   *乐观锁定*基于大多数数据库事务不会与其他事务冲突的假设，在允许事务执行时尽可能允许并发。\n\
  *   *悲观锁定*基于相反的假设，因此在操作资源之前会先获取该资源的锁。\n\n作为日常生活中强化这些概念的例子，可以想想“乐观与悲观地过马路”。在交通非常稀少的区域，你可能无需查看驶近的车辆就能过马路。但在繁忙的市中心可不行！\n\
  \nJPA 在 API 的不同级别使用不同的锁定机制。悲观锁和乐观锁都可以通过 `EntityManager.find` 和 `EntityManager.refresh`\
  \ 方法（以及 `lock` 方法）以及通过 JPQL 查询获得，这意味着可以在 `EntityManager` 级别和 `Query` 级别实现锁定，使用的方法列于表\
  \ 6-5 和表 6-6 中。\n\n表 6-5. 用于锁定实体的 EntityManager 方法\n\n\n\n| 方法 | 描述 |\n| --- | ---\
  \ |\n| `<T> T find(Class<T> entityClass`, `Object primaryKey,LockModeType lockMode)`\
  \ | 根据指定的类和主键查找实体，并使用指定的锁类型对其进行锁定 |\n| `void lock(Object entity, LockModeType lockMode)`\
  \ | 锁定持久化上下文中包含的实体实例，并使用指定的锁模式类型 |\n| `void refresh(Object entity, LockModeType\
  \ lockMode)` | 从数据库刷新实例的状态，覆盖对实体所做的任何更改，并使用给定的锁模式类型对其进行锁定 |\n| `LockModeType getLockMode(Object\
  \ entity)` | 获取实体实例的当前锁模式 |\n\n表 6-6. 用于锁定 JPQL 查询的查询方法\n\n| 方法 | 描述 |\n| --- |\
  \ --- |\n| `LockModeType getLockMode()` | 获取查询的当前锁模式 |\n| `Query setLockMode(LockModeType\
  \ lockMode)` | 设置用于执行查询的锁模式类型 |\n\n这些方法中的每一个都将 `LockModeType` 作为参数，该参数可以取不同的值。\n\
  \n*   `OPTIMISTIC`：使用乐观锁定。\n*   `OPTIMISTIC_FORCE_INCREMENT`：使用乐观锁定并强制递增实体的版本列（请参阅即将介绍的“版本控制”部分）。\n\
  *   `PESSIMISTIC_READ`：使用悲观锁定，无需在事务结束时重新读取数据即可获得锁。\n*   `PESSIMISTIC_WRITE`：使用悲观锁定，并强制在尝试更新实体的事务之间进行序列化。\n\
  *   `PESSIMISTIC_FORCE_INCREMENT`：使用悲观锁定并强制递增实体的版本列（请参阅即将介绍的“版本控制”部分）。\n*   `NONE`：指定不应使用任何锁定机制。\n\
  \n你可以根据指定锁定的需要在多个位置使用这些参数。你可以先*读取*再锁定。\n\n```\nBook book = em.find(Book.class, 12);\n\
  // 锁定以提价\nem.lock(book, LockModeType.OPTIMISTIC_FORCE_INCREMENT);\nbook.raisePriceByTwoDollars();\n\
  ```\n\n或者你可以*读取并*锁定。\n\n```\nBook book = em.find(Book.class, 12, LockModeType.OPTIMISTIC_FORCE_INCREMENT\
  \ );\n// 该书已被锁定，提价\nbook.raisePriceByTwoDollars();\n```\n\n并发和锁定是版本控制的关键驱动因素。\n\n\
  版本控制\n\nJava 规范使用版本控制：Java SE 5.0、Java SE 6.0、EJB 3.1、JAX-RS 1.0 等。当发布新版本的 JAX-RS\
  \ 时，其版本号会增加，你会升级到 JAX-RS 1.1。当你需要对实体进行版本控制时，JPA 就使用这种确切的机制。因此，当你首次将实体持久化到数据库中时，它将获得版本号\
  \ 1。之后，如果你更新了一个属性并将此更改提交到数据库，实体版本将变为 2，依此类推。每次对实体进行更改时，此版本控制都会更新。\n\n为了实现这一点，实体必须有一个属性来存储版本号，并且必须使用\
  \ `@Version` 进行注解。然后，此版本号会映射到数据库中的一列。支持版本控制的属性类型可以是 `int`、`Integer`、`short`、`Short`、`long`、`Long`\
  \ 或 `Timestamp`。清单 6-36 展示了如何向 `Book` 实体添加 `version` 属性。\n\n***清单 6-36.***  在 Integer\
  \ 上带有 @Version 注解的 Book 实体\n\n```\n@Entity\npublic class Book {\n\n@Id @GeneratedValue\n\
    private Long id;\n  @Version\n  private Integer version;\n  private String title;\n\
    private Float price;\n  private String description;\n  private String isbn;\n\
    private Integer nbOfPage;\n  private Boolean illustrations;\n\n// 构造函数、getter、setter\n\
  }\n```\n\n实体可以访问其 `version` 属性的值，但不得修改它。只有持久化提供程序才允许在将对象写入或更新到数据库时设置或更新 `version`\
  \ 属性的值。让我们看一个例子来说明此版本控制的行为。在清单 6-37 中，一个新的 `Book` 实体被持久化到数据库。一旦事务提交，持久化提供程序会将版本设置为\
  \ `1`。之后，更新了书的价格，一旦数据刷新到数据库，版本号就会增加到 `2`。\n\n***清单 6-37.***  事务 tx1 和 tx2 同时更新一本书的价格\n\
  \n```\nBook book = new Book(\"H2G2\", 21f, \"最佳 IT 书籍\", \"123-456\", 321, false);\n\
  \ntx.begin();\nem.persist(book);\ntx.commit();\nassertEquals( 1, book.getVersion()\
  \ );\n\ntx.begin();\nbook.raisePriceByTwoDollars();\ntx.commit();\nassertEquals(\
  \ 2, book.getVersion() );\n```\n\n`version` 属性不是必需的，但当实体可能被多个进程或线程同时修改时，建议使用它。版本控制是乐观锁定的核心，并为不频繁的并发实体修改提供保护。实际上，如果实体具有使用\
  \ `@Version` 注解映射的属性，则该实体将自动启用乐观锁定。\n\n乐观锁定\n\n顾名思义，乐观锁定基于数据库事务不会相互冲突这一事实。换句话说，更新实体的事务很有可能是在该时间段内实际更新该实体的唯一事务。因此，获取实体锁的决定实际上是在事务结束时做出的。这确保了对实体的更新与数据库的当前状态一致。会导致违反此约束的事务将抛出\
  \ `OptimisticLockException`，并且该事务会被标记为回滚。\n\n如何抛出 `OptimisticLockException`？要么通过显式锁定实体（使用你见过的\
  \ `lock` 或 `find` 方法，并传递一个 `LockModeType`），要么让持久化提供程序检查使用 `@Version` 注解的属性。在实体上使用专用的\
  \ `@Version` 注解，使得 `EntityManager` 只需比较实体实例中 `version` 属性的值与数据库中该列的值，即可执行乐观锁定。如果没有使用\
  \ `@Version` 注解的属性，实体管理器将无法自动（隐式地）执行乐观锁定。\n\n让我们再次看一下提高书价的例子。事务 `tx1` 和 `tx2` 都获取了同一个\
  \ `Book` 实体的实例。此时，`Book` 实体的版本是 1。第一个事务将书的价格提高了 2 美元并提交了此更改。当数据刷新到数据库时，持久化提供程序会增加版本号并将其设置为\
  \ 2。此时，第二个事务将价格提高了 5 美元并提交了更改。`tx2` 的实体管理器发现数据库中的版本号与实体的版本号不同。这意味着版本已被另一个事务更改，因此会抛出\
  \ `OptimisticLockException`，如图 6-5 所示。\n\n![9781430246268_Fig06-05.jpg](img/9781430246268_Fig06-05.jpg)\n\
  \n图 6-5. 在事务 tx2 上抛出的 OptimisticLockException\n\n这是使用 `@Version` 注解时的默认行为：在刷新数据时（在提交时或通过显式调用\
  \ `em.flush()` 方法）会抛出 `OptimisticLockException`。你还可以使用先读取后锁定或读取并锁定的方式，控制希望在哪里添加乐观锁。例如，读取并锁定的代码如下所示：\n\
  \n\n\n```\nBook book = em.find(Book.class, 12);\n// 加锁以提升价格\nem.lock(book, LockModeType.OPTIMISTIC);\n\
  book.raisePriceByTwoDollars();\n```\n\n使用乐观锁时，作为参数传递的 `LockModeType` 可以取两个值：`OPTIMISTIC`\
  \ 和 `OPTIMISTIC_FORCE_INCREMENT`（分别对应 `READ` 和 `WRITE`，但这两个值已弃用）。唯一的区别在于，`OPTIMISTIC_FORCE_INCREMENT`\
  \ 会强制更新（递增）实体的 `version` 列。\n\n强烈建议为所有可能被并发访问的实体启用乐观锁。未使用锁机制可能导致实体状态不一致、更新丢失以及其他状态异常。乐观锁是一种有用的性能优化手段，它将原本需要数据库承担的工作转移出来，是悲观锁（需要底层数据库锁）的替代方案。\n\
  \n悲观锁\n\n悲观锁的假设与乐观锁相反，它在操作实体之前就急切地获取锁。这种方式对资源限制极大，并会导致显著的性能下降，因为需要使用 `SELECT ...\
  \ FOR UPDATE` SQL 语句来读取数据并持有数据库锁。\n\n数据库通常提供悲观锁服务，允许实体管理器锁定表中的某一行，以防止其他线程更新同一行。这是一种确保两个客户端不会同时修改同一行的有效机制，但需要在数据库内部进行昂贵的底层检查。违反此约束的事务会抛出\
  \ `PessimisticLockException` 异常，并且该事务会被标记为回滚。\n\n乐观锁适用于处理并发事务间的中等程度争用。但在某些争用风险较高的应用中，悲观锁可能更合适，因为数据库锁会立即获取，而乐观锁往往在事务后期才失败。例如，在经济危机时期，股票市场会收到海量的卖出订单。如果\
  \ 1 亿美国人需要同时卖出他们的股票期权，系统就需要使用悲观锁来确保数据一致性。请注意，此时市场情绪相当悲观而非乐观，这与 JPA 无关。\n\n悲观锁可以应用于不包含\
  \ `@Version` 注解属性的实体。\n\n实体生命周期\n\n至此，你已经了解了实体的大部分奥秘，现在让我们来看看它们的生命周期。当一个实体被实例化时（使用\
  \ `new` 操作符），JVM 仅将其视为一个普通的 POJO（即处于游离态），应用程序可以将其作为普通对象使用。然后，当实体被实体管理器持久化后，它便处于托管态。当实体处于托管态时，实体管理器会自动将其属性值与底层数据库同步（例如，如果在实体托管期间通过\
  \ set 方法更改了某个属性的值，这个新值将自动与数据库同步）。\n\n为了更好地理解这个过程，请查看图 6-6，这是一个 UML 状态图，展示了 `Customer`\
  \ 实体在各个状态之间的转换。\n\n![9781430246268_Fig06-06.jpg](img/9781430246268_Fig06-06.jpg)\n\
  \n图 6-6. 实体生命周期\n\n要创建 `Customer` 实体的实例，你需要使用 `new` 操作符。这个对象存在于内存中，但 JPA 对它一无所知。如果你不对这个对象做任何操作，它将会超出作用域并被垃圾回收，其生命周期就此结束。接下来，你可以使用\
  \ `EntityManager.persist()` 方法来持久化一个 `Customer` 实例。此时，实体变为托管态，其状态与数据库同步。在这个托管态期间，你可以使用\
  \ setter 方法（例如 `customer.setFirstName()`）更新属性，或者使用 `EntityManager.refresh()` 方法刷新内容。所有这些更改都将在实体和数据库之间同步。在此状态下，如果你调用\
  \ `EntityManager.contains(customer)` 方法，它将返回 `true`，因为 `customer` 包含在持久化上下文中（即处于托管态）。\n\
  \n实体进入托管态的另一种方式是从数据库加载。当你使用 `EntityManager.find()` 方法，或者创建 JPQL 查询来检索实体列表时，所有实体都会自动变为托管态，你可以开始更新或删除它们的属性。\n\
  \n在托管态下，你可以调用 `EntityManager.remove()` 方法，该实体将从数据库中被删除，并且不再处于托管态。但 Java 对象会继续存在于内存中，你仍然可以使用它，直到垃圾回收器将其回收。\n\
  \n现在让我们来看看游离态。你在前一章已经看到，显式调用 `EntityManager.clear()` 或 `EntityManager.detach(customer)`\
  \ 方法会将实体从持久化上下文中清除，使其变为游离态。但还有一种更隐蔽的方式会使实体游离：序列化。在本书的许多示例中，实体并未实现任何接口，但如果它们需要通过网络进行远程调用，或者跨越层在表示层显示，则必须实现\
  \ `java.io.Serializable` 接口。这不是 JPA 的限制，而是 Java 的限制。当一个托管实体被序列化、通过网络传输并反序列化后，它会被视为一个游离对象。要重新关联一个实体，你需要调用\
  \ `EntityManager.merge()` 方法。一个常见的用例是在 JSF 页面中使用实体。假设一个 `Customer` 实体显示在远程 JSF 页面的表单中以便更新。由于是远程的，该实体需要在服务器端序列化后才能发送到表示层。此时，实体自动变为游离态。一旦显示出来，如果有任何数据被更改并需要更新，表单会被提交，实体被发送回服务器，反序列化后，需要被合并才能重新关联。\n\
  \n回调方法和监听器允许你在实体上发生特定生命周期事件时，或者更广泛地说，在任何实体上发生生命周期事件时，添加你自己的业务逻辑。\n\n回调\n\n实体的生命周期分为四类：持久化、更新、移除和加载，分别对应数据库的插入、更新、删除和选择操作。每个生命周期都有一个“前”事件和一个“后”事件，实体管理器可以拦截这些事件来调用业务方法。这些业务方法必须使用表\
  \ 6-7 中描述的注解之一进行注解。这些注解可以应用于实体类、映射超类或回调监听器类的方法。\n\n表 6-7. 生命周期回调注解\n\n\n\n| 注解 |\
  \ 描述 |\n| --- | --- |\n| `@PrePersist` | 标记一个方法，该方法将在执行 `EntityManager.persist()`\
  \ 之前被调用。 |\n| `@PostPersist` | 标记一个方法，该方法将在实体被持久化之后被调用。如果实体自动生成其主键（使用 `@GeneratedValue`），则在该方法中可以获取该值。\
  \ |\n| `@PreUpdate` | 标记一个方法，该方法将在执行数据库更新操作之前被调用（调用实体 setter 方法或 `EntityManager.merge()`\
  \ 方法）。 |\n| `@PostUpdate` | 标记一个方法，该方法将在执行数据库更新操作之后被调用。 |\n| `@PreRemove` | 标记一个方法，该方法将在执行\
  \ `EntityManager.remove()` 之前被调用。 |\n| `@PostRemove` | 标记一个方法，该方法将在实体被移除之后被调用。 |\n\
  | `@PostLoad` | 标记一个方法，该方法将在实体从底层数据库加载（通过 JPQL 查询或 `EntityManager.find()`）或刷新之后被调用。没有\
  \ `@PreLoad` 注解，因为对尚未构建的实体进行预加载是没有意义的。 |\n\n将回调注解添加到之前 图 6-6 所示的 UML 状态图中，就得到了 图\
  \ 6-7 中的图示。\n\n![9781430246268_Fig06-07.jpg](img/9781430246268_Fig06-07.jpg)\n\n\
  图 6-7. 带有回调注解的实体生命周期\n\n在将实体插入数据库之前，实体管理器会调用带有 `@PrePersist` 注解的方法。如果插入操作没有抛出异常，则实体被持久化，其标识被初始化，然后调用带有\
  \ `@PostPersist` 注解的方法。更新（`@PreUpdate`、`@PostUpdate`）和删除（`@PreRemove`、`@PostRemove`）操作的行为与此相同。当从数据库加载实体时（通过\
  \ `EntityManager.find()` 或 JPQL 查询），会调用带有 `@PostLoad` 注解的方法。当实体被分离并需要合并时，实体管理器首先必须检查与数据库是否存在差异（`@PostLoad`），如果存在，则更新数据（`@PreUpdate`、`@PostUpdate`）。\n\
  \n在代码中是如何体现的呢？实体不仅可以有属性、构造器、getter 和 setter，还可以有用于验证其状态或计算某些属性的业务逻辑。这些可以由其他类调用的普通\
  \ Java 方法或回调注解（也称为回调方法）组成，如 代码清单 6-38 所示。实体管理器会根据触发的事件自动调用它们。\n\n***代码清单 6-38.***\
  \  带有回调注解的 Customer 实体\n\n```\n@Entity\npublic class Customer {\n\n@Id @GeneratedValue\n\
  \  private Long id;\n  private String firstName;\n  private String lastName;\n \
  \ private String email;\n  private String phoneNumber;\n  @Temporal(TemporalType.DATE)\n\
  \  private Date dateOfBirth;\n  @Transient\n  private Integer age;\n  @Temporal(TemporalType.TIMESTAMP)\n\
  \  private Date creationDate;\n\n@PrePersist\n  @PreUpdate\n  private void validate()\
  \ {\n    if (firstName == null || \"\".equals(firstName))\n      throw new IllegalArgumentException(\"\
  Invalid first name\");\n    if (lastName == null || \"\".equals(lastName))\n   \
  \   throw new IllegalArgumentException(\"Invalid last name\");\n  }\n\n@PostLoad\n\
  \  @PostPersist\n  @PostUpdate\n  public void calculateAge() {\n    if (dateOfBirth\
  \ == null) {\n      age = null;\n      return;\n    }\n\nCalendar birth = new GregorianCalendar();\n\
  \    birth.setTime(dateOfBirth);\n    Calendar now = new GregorianCalendar();\n\
  \    now.setTime(new Date());\n    int adjust = 0;\n    if (now.get(DAY_OF_YEAR)\
  \ - birth.get(DAY_OF_YEAR) < 0) {\n      adjust = -1;\n    }\n    age = now.get(YEAR)\
  \ - birth.get(YEAR) + adjust;\n  }\n\n// Constructors, getters, setters\n}\n```\n\
  \n在 代码清单 6-38 中，`Customer` 实体有一个验证其数据的方法（检查 `firstName` 和 `lastName` 属性）。该方法使用 `@PrePersist`\
  \ 和 `@PreUpdate` 注解，并将在向数据库插入或更新数据之前被调用。如果数据无效，则会抛出一个运行时异常，插入或更新操作将回滚，以确保插入或更新到数据库中的数据是有效的。\n\
  \n`calculateAge()` 方法用于计算客户的年龄。`age` 属性是瞬态的，不会映射到数据库中。在实体被加载、持久化或更新之后，`calculateAge()`\
  \ 方法会获取客户的出生日期，计算年龄，并设置该属性。\n\n以下规则适用于生命周期回调方法：\n\n*   方法可以具有 public、private、protected\
  \ 或包级访问权限，但不能是 static 或 final。注意在 代码清单 6-38 中，`validate()` 方法是 private 的。\n*   一个方法可以使用多个生命周期事件注解进行注解（`validateData()`\
  \ 方法使用了 `@PrePersist` 和 `@PreUpdate` 注解）。但是，一个实体类中只能存在一个给定类型的生命周期注解（例如，你不能在同一个实体中有两个\
  \ `@PrePersist` 注解）。\n*   方法可以抛出未检查（运行时）异常，但不能抛出已检查异常。抛出运行时异常将回滚事务（如果存在的话）。\n* \
  \  方法可以调用 JNDI、JDBC、JMS 和 EJB，但不能调用任何 `EntityManager` 或 `Query` 操作。\n*   对于继承，如果在超类上指定了一个方法，它将在子类的方法之前被调用。例如，如果在\
  \ 代码清单 6-38 中 `Customer` 继承自 `Person` 实体，那么 `Person` 的 `@PrePersist` 方法将在 `Customer`\
  \ 的 `@PrePersist` 方法之前被调用。\n*   如果在关系中使用事件级联，回调方法也将以级联方式被调用。例如，假设一个 `Customer` 有一个地址集合，并且在关系上设置了级联删除。当你删除该客户时，`Address`\
  \ 的 `@PreRemove` 方法和 `Customer` 的 `@PreRemove` 方法都会被调用。\n\n监听器\n\n当业务逻辑仅与某个实体相关时，实体中的回调方法工作得很好。实体监听器用于将业务逻辑提取到单独的类中，并在其他实体之间共享。实体监听器只是一个\
  \ POJO，你可以在其上定义一个或多个生命周期回调方法。要注册一个监听器，实体需要使用 `@EntityListeners` 注解。\n\n使用客户示例，让我们将\
  \ `calculateAge()` 和 `validate()` 方法分别提取到单独的监听器类 `AgeCalculationListener`（参见 代码清单\
  \ 6-39）和 `DataValidationListener`（参见 代码清单 6-40）中。\n\n***代码清单 6-39.***  计算客户年龄的监听器\n\
  \n```\npublic class AgeCalculationListener {\n\n@PostLoad\n  @PostPersist\n  @PostUpdate\n\
  \  public void calculateAge( Customer customer ) {\n    if (customer.getDateOfBirth()\
  \ == null) {\n      customer.setAge(null);\n      return;\n    }\n\nCalendar birth\
  \ = new GregorianCalendar();\n    birth.setTime(customer.getDateOfBirth());\n  \
  \  Calendar now = new GregorianCalendar();\n    now.setTime(new Date());\n    int\
  \ adjust = 0;    if (now.get(DAY_OF_YEAR) - birth.get(DAY_OF_YEAR) < 0) {\n    \
  \  adjust = -1;\n    }\n    customer.setAge(now.get(YEAR) - birth.get(YEAR) + adjust);\n\
  \  }\n}\n```\n\n***代码清单 6-40.***  验证客户属性的监听器\n\n```\npublic class DataValidationListener\
  \ {\n\n\n\n@PrePersist\n  @PreUpdate\n  private void validate( Customer customer\
  \ ) {\n    if (customer.getFirstName() == null || \"\".equals(customer.getFirstName()))\n\
        throw new IllegalArgumentException(\"Invalid first name\");\n    if (customer.getLastName()\
  \ == null || \"\".equals(customer.getLastName()))\n      throw new IllegalArgumentException(\"\
  Invalid last name\");\n  }\n}\n```\n\n监听器类仅需遵循简单的规则。首先，该类必须有一个公共的无参构造函数。其次，回调方法的签名与清单\
  \ 6-38 中的略有不同。当你在监听器上调用回调方法时，该方法需要能够访问实体状态（例如，需要验证的客户名字和姓氏）。这些方法必须有一个与实体类型兼容的参数，因为与事件相关的实体将被传入回调。在实体上定义的回调方法具有以下无参数签名：\n\
  \n```\nvoid <METHOD>();\n```\n\n在实体监听器上定义的回调方法可以有两种不同类型的签名。如果该方法需要用于多个实体，则必须有一个\
  \ `Object` 参数。\n\n```\nvoid <METHOD>( Object anyEntity)\n```\n\n如果该方法仅用于一个实体或其子类（存在继承关系时），则参数可以是该实体类型。\n\
  \n```\nvoid <METHOD>( Customer customerOrSubclasses)\n```\n\n为了指定这两个监听器接收 `Customer`\
  \ 实体的生命周期事件通知，你需要使用 `@EntityListeners` 注解（参见清单 6-41）。该注解可以接受一个实体监听器或一个监听器数组作为参数。当定义了多个监听器且生命周期事件发生时，持久化提供者会按照监听器列出的顺序依次遍历每个监听器，并调用回调方法，同时传入事件所应用实体的引用。然后，它会在实体本身上调用回调方法（如果有的话）。\n\
  \n***清单 6-41.***  定义了两个监听器的 Customer 实体\n\n```\n@EntityListeners({DataValidationListener.class,\
  \ AgeCalculationListener.class})\n@Entity\npublic class Customer {\n\n@Id @GeneratedValue\n\
    private Long id;\n  private String firstName;\n  private String lastName;\n  private\
  \ String email;\n  private String phoneNumber;\n  @Temporal(TemporalType.DATE)\n\
    private Date dateOfBirth;\n  @Transient\n  private Integer age;\n  @Temporal(TemporalType.TIMESTAMP)\n\
    private Date creationDate;\n\n// 构造函数、getter、setter\n}\n```\n\n这段代码的结果与之前的示例（见清单\
  \ 6-38）完全相同。`Customer` 实体在插入或更新之前，使用 `DataValidationListener.validate()` 方法验证其数据，并使用监听器的\
  \ `AgeCalculationListener.calculateAge()` 方法计算其年龄。\n\n实体监听器方法必须遵循的规则与实体回调方法类似，但有一些细节上的差异。\n\
  \n*   只能抛出非受检异常。这会导致剩余的监听器和回调方法不被调用，并且如果存在事务，则事务会被回滚。\n*   在继承层次结构中，如果多个实体定义了监听器，则超类上定义的监听器会在子类上定义的监听器之前被调用。如果一个实体不想继承超类的监听器，它可以通过使用\
  \ `@ExcludeSuperclassListeners` 注解（或其 XML 等效项）来显式排除它们。\n\n清单 6-41 展示了一个定义了两个监听器的\
  \ `Customer` 实体，但一个监听器也可以被多个实体定义。这在监听器提供许多实体都能受益的更通用逻辑时非常有用。例如，你可以创建一个显示某些触发事件名称的调试监听器，如清单\
  \ 6-42 所示。\n\n***清单 6-42.***  任何实体均可使用的调试监听器\n\n```\npublic class DebugListener\
  \ {\n\n@PrePersist\n  void prePersist(Object object) {\n    System.out.println(\"\
  prePersist\");\n  }\n\n@PreUpdate\n  void preUpdate(Object object) {\n    System.out.println(\"\
  preUpdate\");\n  }\n\n@PreRemove\n  void preRemove(Object object) {\n    System.out.println(\"\
  preRemove\");\n  }\n}\n```\n\n请注意，每个方法都将 `Object` 作为参数，这意味着任何类型的实体都可以通过将 `DebugListener`\
  \ 类添加到其 `@EntityListeners` 注解中来使用此监听器。要让应用程序中的每个实体都使用此监听器，你必须逐一检查每个实体并将其手动添加到注解中。针对这种情况，JPA\
  \ 提供了一种默认监听器的概念，可以覆盖持久化单元中的所有实体。由于没有针对整个持久化单元范围的注解，因此默认监听器只能在 XML 映射文件中声明。\n\n在上一章中，你了解了如何使用\
  \ XML 映射文件代替注解。要将 `DebugListener` 定义为默认监听器，需要遵循相同的步骤。需要创建并部署一个包含清单 6-43 中定义的 XML\
  \ 的映射文件。\n\n***清单 6-43.***  定义为默认监听器的调试监听器\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<entity-mappings xmlns=\" http://xmlns.jcp.org/xml/ns/persistence/orm\
  \ \"\n                 xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\
  \ →\n                 xsi:schemaLocation=\" http://xmlns.jcp.org/xml/ns/persistence/orm\n\
                   http://xmlns.jcp.org/xml/ns/persistence/orm_2_1.xsd \"\n                \
  \ version=\"2.1\">\n\n<persistence-unit-metadata>\n      <persistence-unit-defaults>\n\
           <entity-listeners>\n            <entity-listener class=\"org.agoncal.book.javaee7.chapter06\\\
  . DebugListener \"/>\n         </entity-listeners>\n      </persistence-unit-defaults>\n\
     </persistence-unit-metadata>\n\n</entity-mappings>\n```\n\n在此文件中，`<persistence-unit-metadata>`\
  \ 标签定义了所有没有注解等效项的元数据。`<persistence-unit-defaults>` 标签定义了持久化单元的所有默认设置，而 `<entity-listener>`\
  \ 标签则定义了默认监听器。此文件需要在 `persistence.xml` 中被引用，并与应用程序一起部署。然后，`DebugListener` 将自动为每个实体调用。\n\
  \n当你声明一个默认实体监听器列表时，每个监听器会按照它们在 XML 映射文件中列出的顺序被调用。默认实体监听器总是在 `@EntityListeners` 注解中列出的任何实体监听器之前被调用。如果一个实体不希望应用默认实体监听器，它可以使用\
  \ `@ExcludeDefaultListeners` 注解，如清单 6-44 所示。\n\n***清单 6-44.***  排除默认监听器的 Customer\
  \ 实体\n\n```\n@ExcludeDefaultListeners\n@Entity\npublic class Customer {\n\n@Id @GeneratedValue\n\
    private Long id;\n  private String firstName;\n  private String lastName;\n  private\
  \ String email;\n  private String phoneNumber;\n  @Temporal(TemporalType.DATE)\n\
    private Date dateOfBirth;\n  @Transient\n  private Integer age;\n  @Temporal(TemporalType.TIMESTAMP)\n\
    private Date creationDate;\n\n// 构造函数、getter、setter\n}\n```\n\n当事件被触发时，监听器按以下顺序执行：\n\
  \n\n\n1.  对于给定实体或超类，按数组顺序排列的 `@EntityListeners`，\n2.  超类的实体监听器（最高优先级优先），\n3.  实体的实体监听器，\n\
  4.  超类的回调方法（最高优先级优先），以及\n5.  实体的回调方法。\n\n总结\n\n在本章中，你学习了如何查询实体。实体管理器是将实体与持久化关联起来的核心。它可以在持久化上下文的帮助下创建、更新、按\
  \ ID 查找、删除实体，并与数据库同步，持久化上下文充当一级缓存。JPA 还附带了一种非常强大的查询语言 JPQL，它与数据库供应商无关。你可以使用 WHERE、ORDER\
  \ BY 或 GROUP BY 子句通过丰富的语法检索实体，并且当实体发生并发访问时，你知道如何使用版本控制以及何时使用乐观锁或悲观锁。\n\n本章还描述了实体生命周期以及实体管理器如何捕获事件来调用回调方法。回调方法可以在单个实体上定义，并通过多个注解（`@PrePersist`、`@PostPersist`\
  \ 等）进行标注。该方法也可以提取到监听器类中，供多个或所有实体使用（使用默认实体监听器）。通过回调方法，你会发现实体不仅仅是贫血对象（没有业务逻辑，只有属性、getter\
  \ 和 setter 的对象）；实体可以包含业务逻辑，这些逻辑可以由应用程序中的其他对象调用，也可以由实体管理器根据实体的生命周期自动调用。\n\n第 7 章\n\
  \n![image](img/frontdot.jpg)\n\n企业级 JavaBean\n\n上一章展示了如何使用 JPA 实现持久化对象以及如何使用 JPQL\
  \ 查询它们。实体可以拥有验证其属性的方法，但它们并不适用于表示复杂的任务，这些任务通常需要与其他组件（其他持久化对象、外部服务等）进行交互。持久化层不是进行业务处理的合适层。同样，用户界面也不应执行业务逻辑，尤其是在存在多个界面（Web、Swing、便携设备等）的情况下。为了将持久化层与表示层分离，实现业务逻辑，添加事务管理和安全性，应用程序需要一个业务层。在\
  \ Java EE 中，我们使用企业级 JavaBean（EJB）来实现这一层。\n\n对于大多数应用程序来说，分层很重要。按照自底向上的方法，前面关于 JPA\
  \ 的章节对领域类进行了建模，通常定义了名词（Artist、CD、Book、Customer 等）。在领域层之上，业务层对应用程序的动作（或动词）进行建模（创建一本书、购买一本书、打印订单、交付一本书等）。通常，这个业务层与外部\
  \ Web 服务（SOAP 或 RESTful Web 服务）交互，向其他系统发送异步消息（使用 JMS），或发送电子邮件；它编排从数据库到外部系统的多个组件，并作为事务和安全划分的中心位置，以及任何类型客户端（如\
  \ Web 界面（Servlet 或 JSF 支持 bean）、批处理或外部系统）的入口点。实体和会话 bean 之间的这种逻辑分离遵循“关注点分离”范式，其中应用程序被拆分为功能重叠尽可能少的独立组件。\n\
  \n本章将向你介绍 EJB，然后解释三种不同类型的会话 bean：无状态、有状态和单例。无状态 bean 是三者中可扩展性最强的，因为它们不保持状态，并在单个方法调用中完成业务逻辑。有状态\
  \ bean 与一个客户端保持会话状态。EJB 3.1 将单例会话 bean（每个应用程序一个实例）引入了之前的版本。你还将看到如何在嵌入式容器中执行这些 EJB，以及如何同步或异步地调用它们。\n\
  \n理解企业级 JavaBean\n\nEJB 是封装业务逻辑并处理事务和安全性的服务器端组件。它们还具有用于消息传递、调度、远程访问、Web 服务端点（SOAP\
  \ 和 REST）、依赖注入、组件生命周期、使用拦截器的 AOP（面向切面编程）等的集成栈。此外，EJB 与其他 Java SE 和 Java EE 技术无缝集成，例如\
  \ JDBC、JavaMail、JPA、Java 事务 API（JTA）、Java 消息服务（JMS）、Java 认证和授权服务（JAAS）、Java 命名和目录接口（JNDI）以及远程方法调用（RMI）。这就是为什么它们被用来构建业务逻辑层（参见图\
  \ 7-1），位于数据库之上，并编排业务模型层。EJB 充当表示层技术（如 JavaServer Faces（JSF））以及所有外部服务（JMS 或 Web 服务）的入口点。\n\
  \n![9781430246268_Fig07-01.jpg](img/9781430246268_Fig07-01.jpg)\n\n图 7-1. 架构分层\n\
  \nEJB 使用一种非常强大的编程模型，它结合了易用性和健壮性。如今，EJB 是一种非常简单的 Java 服务器端开发模型，在降低复杂性的同时，为关键任务的企业应用程序带来了可重用性和可扩展性。所有这些都来自于对单个\
  \ POJO 进行注解，该 POJO 将被部署到容器中。EJB 容器是一个运行时环境，提供诸如事务管理、并发控制、池化和安全授权等服务。历史上，应用服务器还添加了其他功能，如集群、负载均衡和故障转移。这样，EJB\
  \ 开发人员就可以专注于实现业务逻辑，而容器则处理所有技术细节。\n\n如今，随着 3.2 版本的发布，EJB 比以往任何时候都更容易编写一次并部署到任何支持该规范的容器上。标准\
  \ API、可移植的 JNDI 名称、轻量级组件、CDI 集成以及通过异常进行配置，使得 EJB 可以轻松部署在开源和商业实现上。底层技术创建于 12 多年前，这使得\
  \ EJB 应用程序能够受益于经过验证的概念。\n\nEJB 的类型\n\n会话 bean 非常适合实现业务逻辑、流程和工作流。由于企业应用程序可能很复杂，Java\
  \ EE 平台定义了多种类型的 EJB。会话 bean 可能具有以下特征：\n\n*   *无状态*：会话 bean 在方法之间不包含会话状态，任何实例都可以用于任何客户端。它用于处理可以通过单个方法调用完成的任务。\n\
  *   *有状态*：会话 bean 包含会话状态，该状态必须为单个用户跨方法保留。它对于必须分多个步骤完成的任务很有用。\n*   *单例*：单个会话 bean\
  \ 在客户端之间共享，并支持并发访问。容器将确保整个应用程序只存在一个实例。\n\n这三种类型的会话 bean 当然都有其特定的功能，但它们也有很多共同点。首先，它们具有相同的编程模型。正如你稍后将看到的，会话\
  \ bean 可以有本地和/或远程接口，或者根本没有接口。会话 bean 是容器管理的组件，因此它们需要打包到归档文件（jar、war 或 ear 文件）中并部署到容器。\n\
  \n消息驱动 bean（MDB）用于通过使用 JMS 接收异步消息来与外部系统集成。尽管 MDB 是 EJB 规范的一部分，但我将单独处理它们（在第 13 章中），因为这种组件模型主要用于将系统与面向消息的中间件（MOM）集成。MDB\
  \ 通常将业务逻辑委托给会话 bean。\n\n\n\nEJB 也可用作 Web 服务端点。第 14 章和第 15 章演示了 SOAP 和 RESTful Web\
  \ 服务，这些服务既可以是部署在 Web 容器中的简单 POJO，也可以是部署在 EJB 容器中的会话 Bean。\n\n![image](img/sq.jpg) **注意**  出于兼容性考虑，EJB\
  \ 3.1 规范仍包含实体 CMP。这种持久化组件模型已被精简，在 EJB 3.2 中变为可选。JPA 是用于映射和查询关系型数据库的首选技术。本书不涵盖实体\
  \ CMP。\n\n进程内容器与嵌入式容器\n\n从 EJB 被发明（EJB 1.0）的那一刻起，EJB 就必须在运行于 JVM 之上的容器中执行。想想 GlassFish、JBoss、Weblogic\
  \ 等，你就会记得，在部署和使用 EJB 之前，需要先启动应用服务器。这种进程内容器适用于生产环境，服务器在其中持续运行。但在开发环境中，需要频繁地启动、部署、调试和停止容器，这会非常耗时。运行在不同进程中的服务器带来的另一个问题是测试能力受限。你要么为单元测试模拟所有容器服务，要么需要将\
  \ EJB 部署到运行中的服务器上执行集成测试。为了解决这些问题，一些应用服务器实现提供了嵌入式容器，但这些实现是特定于具体产品的。自 EJB 3.1 起，专家小组标准化了一种可跨服务器移植的嵌入式容器。\n\
  \n嵌入式容器的理念是能够在 Java SE 环境中执行 EJB 应用程序，允许客户端在同一个 JVM 和类加载器中运行。这为集成测试、离线处理（例如批处理）以及在桌面应用程序中使用\
  \ EJB 提供了更好的支持。可嵌入容器 API 提供了与 Java EE 运行时容器相同的托管环境，并包含相同的服务。现在，你可以在与 IDE 相同的 JVM\
  \ 上执行嵌入式容器，并调试你的 EJB，而无需部署到单独的应用服务器上。\n\n容器提供的服务\n\n无论容器是嵌入式的还是运行在单独的进程中，它都提供了许多企业应用程序通用的核心服务，例如：\n\
  \n*   *远程客户端通信*：无需编写任何复杂代码，EJB 客户端（另一个 EJB、用户界面、批处理进程等）即可通过标准协议远程调用方法。\n*   *依赖注入*：容器可以将多种资源注入到\
  \ EJB 中（JMS 目标和工厂、数据源、其他 EJB、环境变量等），并且借助 CDI，还可以注入任何 POJO。\n*   *状态管理*：对于有状态会话 Bean，容器透明地管理其状态。你可以为特定客户端维护状态，就像开发桌面应用程序一样。\n\
  *   *池化*：对于无状态 Bean 和 MDB，容器会创建一个可由多个客户端共享的实例池。一旦被调用，EJB 会返回池中以备重用，而不是被销毁。\n*  \
  \ *组件生命周期*：容器负责管理每个组件的生命周期。\n*   *消息传递*：容器允许 MDB 监听目标并消费消息，而无需过多的 JMS 样板代码。\n* \
  \  *事务管理*：通过声明式事务管理，EJB 可以使用注解告知容器应使用的事务策略。容器负责提交或回滚。\n*   *安全性*：可以在 EJB 上指定类级别或方法级别的访问控制，以强制执行用户和角色授权。\n\
  *   *并发支持*：除了需要一些并发声明的单例 Bean 外，所有其他类型的 EJB 本质上都是线程安全的。你可以开发高性能应用程序，而无需担心线程问题。\n\
  *   *拦截器*：横切关注点可以放入拦截器中，容器会自动调用这些拦截器。\n*   *异步方法调用*：自 EJB 3.1 起，现在可以在不涉及消息传递的情况下进行异步调用。\n\
  \n一旦 EJB 被部署，容器就会负责处理这些特性，让开发者能够专注于业务逻辑，同时无需添加任何系统级代码即可受益于这些服务。\n\nEJB 是托管对象。实际上，它们被视为托管\
  \ Bean。当客户端调用 EJB 时，它并非直接与该 EJB 的实例交互，而是通过一个实例的代理进行交互。每次客户端调用 EJB 上的方法时，该调用实际上都会被容器代理和拦截，容器会代表\
  \ Bean 实例提供服务。当然，这对客户端是完全透明的；从创建到销毁，企业 Bean 都存在于容器中。\n\n在 Java EE 应用程序中，EJB 容器通常会与其他容器交互：Servlet\
  \ 容器（负责管理 Servlet 和 JSF 页面的执行）、应用程序客户端容器（ACC）（用于管理独立应用程序）、消息代理（用于发送、排队和接收消息）、持久化提供者等。\n\
  \n容器为 EJB 提供了一组服务。另一方面，EJB 不能创建或管理线程、使用 `java.io` 访问文件、创建 `ServerSocket`、加载本地库，或使用\
  \ AWT（抽象窗口工具包）或 Swing API 与用户交互。\n\nEJB Lite\n\n企业 Java Bean 是 Java EE 7 中主要的组件模型，是进行事务性和安全性业务处理的最简单方法。然而，EJB\
  \ 3.2 仍然定义了一些如今较少使用的复杂技术，例如 IIOP（互联网内部 ORB 协议）互操作性，这意味着任何实现 EJB 3.2 规范的新供应商都必须实现它。刚开始接触\
  \ EJB 的开发者也会被许多他们永远不会用到的技术所拖累。\n\n\n\n基于这些原因，规范定义了完整 EJB API 的一个最小子集，称为 EJB Lite。它包含了一组小巧而强大的\
  \ EJB 特性，适用于编写可移植的事务性和安全性业务逻辑。任何 EJB Lite 应用程序都可以部署在任何实现了 EJB 3.2 的 Java EE 产品上。EJB\
  \ Lite 由 表 7-1 中列出的 EJB API 子集组成。\n\n表 7-1. EJB Lite 与完整 EJB 的对比\n\n| 特性 | EJB Lite\
  \ | 完整 EJB 3.2 |\n| --- | --- | --- |\n| Session Bean（无状态、有状态、单例） | 是 | 是 |\n| 无接口视图\
  \ | 是 | 是 |\n| 本地接口 | 是 | 是 |\n| 拦截器 | 是 | 是 |\n| 事务支持 | 是 | 是 |\n| 安全性 | 是 | 是\
  \ |\n| 可嵌入 API | 是 | 是 |\n| 异步调用 | 否 | 是 |\n| MDB | 否 | 是 |\n| 远程接口 | 否 | 是 |\n\
  | JAX-WS Web 服务 | 否 | 是 |\n| JAX-RS Web 服务 | 否 | 是 |\n| 定时器服务 | 否 | 是 |\n| RMI/IIOP\
  \ 互操作性 | 否 | 是 |\n\n![image](img/sq.jpg) **注意**  自 EJB 规范诞生之初，就要求具备使用 RMI/IIOP 导出\
  \ EJB 组件以及通过网络访问 EJB 组件的能力。这一要求实现了 Java EE 产品之间的互操作性。在 EJB 3.2 中，这一要求已被精简，并可能在未来的版本中变为可选，因为\
  \ RMI/IIOP 在很大程度上已被提供互操作性支持的现代 Web 技术（如 SOAP 和 REST）所取代。\n\nEJB 规范概述\n\nEJB 1.0\
  \ 创建于 1998 年，而 EJB 3.2 于 2013 年随 Java EE 7 发布。在这 15 年间，EJB 规范经历了多次变革，但仍保留了其成熟的基础。从重量级组件到带注解的\
  \ POJO，从 Entity Bean CMP 到 JPA，EJB 不断重塑自身以满足开发者和现代架构的需求。\n\n与以往相比，EJB 3.2 规范通过提供以前非标准化的特性（例如非标准的\
  \ JNDI 名称或嵌入式容器），更有助于避免供应商锁定。如今，EJB 3.2 的可移植性比过去强得多。\n\nEJB 规范简史\n\n在 Java 语言诞生后不久，业界就感到需要一种能够满足大规模应用程序需求、融合\
  \ RMI 和 JTA 的技术。于是，创建分布式事务性业务组件框架的想法应运而生，IBM 率先开始创建后来被称为 EJB 的东西。\n\nEJB 1.0 支持有状态和无状态会话\
  \ Bean，并可选择支持实体 Bean。其编程模型除了会话 Bean 本身之外，还使用了 Home 接口和远程接口。EJB 通过一个提供远程访问（参数按值传递）的接口来访问。\n\
  \nEJB 1.1 强制要求支持实体 Bean，并引入了 XML 部署描述符来存储元数据（随后序列化为二进制文件）。该版本通过引入角色，为应用程序组装和部署提供了更好的支持。\n\
  \n2001 年，EJB 2.0 成为第一个由 Java Community Process（JSR 19）标准化的版本。它通过引入本地接口解决了按值传递参数的开销问题。在容器内运行的客户端通过其本地接口（使用按引用传递的参数）访问\
  \ EJB，而在不同容器中运行的客户端则使用远程接口。该版本引入了 MDB，并且实体 Bean 获得了对关系和支持查询语言（EJB QL）的支持。\n\n两年后，EJB\
  \ 2.1（JSR 153）增加了对 Web 服务的支持，允许通过 SOAP/HTTP 调用会话 Bean。还创建了定时器服务，允许在指定时间或时间间隔调用 EJB。\n\
  \n从 EJB 2.1 到 EJB 3.0 间隔了三年，这让专家组得以重新设计整个架构。2006 年，EJB 3.0 规范（JSR 220）与之前的版本决裂，专注于易用性，使\
  \ EJB 看起来更像 POJO。实体 Bean 被全新的规范（JPA）取代，会话 Bean 不再需要 Home 接口或特定于 EJB 的组件接口。资源注入、拦截器和生命周期回调被引入。\n\
  \n2009 年，EJB 3.1 规范（JSR 318）随 Java EE 6 发布，沿袭了上一版本的路径，进一步简化了编程模型。3.1 版本带来了大量新特性，例如无接口视图、嵌入式容器、单例\
  \ Bean、更丰富的定时器服务、异步调用、可移植 JNDI 以及 EJB Lite。\n\nEJB 3.2 的新特性是什么？\n\nEJB 3.2 规范（JSR\
  \ 345）的雄心不及上一版本。为了简化规范的未来采用，Java EE 6 专家组编制了一份可能在未来移除的特性列表（即“精简”）。以下特性实际上并未从 EJB\
  \ 3.1 中移除，但在 3.2 版本中都变成了可选的。\n\n*   实体 Bean 2.*x*\n*   实体 Bean 2.*x* 的客户端视图\n* \
  \  EJB QL（用于 CMP 的查询语言）\n*   基于 JAX-RPC 的 Web 服务端点\n*   JAX-RPC Web 服务的客户端视图\n\n\
  这就是规范本身被组织成两个不同文档的原因。\n\n*   *“EJB 核心契约与要求：”* 指定 EJB 的主要文档。\n*   *“EJB 可选特性：”* 描述前述已变为可选支持特性的文档。\n\
  \nEJB 3.2 规范包含以下次要更新和改进：\n\n*   托管 Bean 现在可以使用事务（以前只有 EJB 可以使用事务；更多内容见第 9 章）。\n\
  *   有状态会话 Bean 的生命周期回调方法可以选择参与事务。\n*   有状态会话 Bean 的钝化现在默认不启用。\n*   定义 Bean 所有本地/远程视图的规则已简化。\n\
  *   获取当前类加载器的限制已被移除，现在允许使用 `java.io` 包。\n*   与 JMS 2.0 对齐。\n*   可嵌入容器实现了 `Autocloseable`\
  \ 以适配 Java SE 7。\n*   RMI/IIOP 在此版本中已被精简。这意味着它可能在 Java EE 8 中被标记为可选。届时远程调用将仅使用 RMI（无需\
  \ IIOP 互操作性）。\n\n表 7-2 列出了当前 EJB 3.2 中定义的主要包。\n\n表 7-2. 主要 EJB 包\n\n| 包 | 描述 |\n\
  | --- | --- |\n| `javax.ejb` | 定义 EJB 与其客户端之间、以及 EJB 与容器之间契约的类和接口 |\n| `javax.ejb.embeddable`\
  \ | 用于可嵌入 API 的类 |\n| `javax.ejb.spi` | 由 EJB 容器实现的接口 |\n\n参考实现\n\nGlassFish 是一个由\
  \ Oracle 领导的、用于 Java EE 平台的开源应用服务器项目。Sun 于 2005 年启动了该项目，并于 2006 年成为 Java EE 5 的参考实现。如今，GlassFish\
  \ v4 包含了 EJB 3.2 的参考实现。在内部，该产品围绕模块化（基于 Apache Felix OSGi 运行时）构建，实现了非常快的启动速度，并支持多种应用容器（当然是\
  \ Java EE 7，但也包括 Ruby、PHP 等）。\n\n在撰写本书时，GlassFish 是唯一符合 EJB 3.2 规范的实现。但其他实现很快也会跟进：OpenEJB、JBoss、Weblogic、Websphere……\n\
  \n编写企业级 Java Bean\n\n\n\n会话 Bean 封装了业务逻辑，具有事务性，并依赖于一个提供池化、多线程、安全等功能的容器。要创建这样一个强大的组件，我们需要哪些工件？一个\
  \ Java 类和一个注解——仅此而已。清单 7-1 展示了容器识别一个类为会话 Bean 并应用所有企业服务是多么简单。\n\n***清单 7-1.*** \
  \ 一个简单的无状态 EJB\n\n```\n@Stateless\npublic class BookEJB {\n\n@PersistenceContext(unitName\
  \ = \"chapter07PU\")\n  private EntityManager em;\n\npublic Book findBookById(Long\
  \ id) {\n    return em.find(Book.class, id);\n  }\n\npublic Book createBook(Book\
  \ book) {\n    em.persist(book);\n    return book;\n  }\n}\n```\n\nJ2EE 的早期版本要求开发者创建多个工件才能创建一个会话\
  \ Bean：一个本地或远程接口（或两者皆有）、一个本地 Home 或远程 Home 接口（或两者皆有），以及一个部署描述符。Java EE 5 和 EJB 3.0\
  \ 极大地简化了模型，以至于只需要一个类和一个或多个业务接口就足够了，并且不需要任何 XML 配置。如清单 7-1 所示，自 EJB 3.1 起，该类甚至不需要实现任何接口。我们仅使用一个注解`@Stateless`，就能将一个\
  \ Java 类转变为事务性且安全的组件。然后，使用实体管理器（如前面章节所述），`BookEJB`以简单而强大的方式从数据库中创建和检索书籍。\n\nEJB\
  \ 剖析\n\n清单 7-1 展示了会话 Bean 最简单的编程模型：一个无接口的带注解 POJO。但是，根据你的需求，会话 Bean 可以提供更丰富的模型，允许你执行远程调用、依赖注入或异步调用。一个\
  \ EJB 由以下元素组成：\n\n*   *Bean 类*：Bean 类包含业务方法实现，并且可以实现零个或多个业务接口。会话 Bean 必须根据其类型使用`@Stateless`、`@Stateful`或`@Singleton`进行注解。\n\
  *   *业务接口*：这些接口包含对客户端可见并由 Bean 类实现的业务方法声明。会话 Bean 可以有本地接口、远程接口，或者根本没有接口（仅限本地访问的无接口视图）。\n\
  \n如图 7-2 所示，客户端应用程序可以通过其某个接口（本地或远程）访问会话 Bean，或者直接调用 Bean 类本身。\n\n![9781430246268_Fig07-02.jpg](img/9781430246268_Fig07-02.jpg)\n\
  \n图 7-2. Bean 类具有多种类型的业务接口\n\nBean 类\n\n会话 Bean 类是实现业务逻辑的任何标准 Java 类。开发会话 Bean 类的要求如下：\n\
  \n*   该类必须使用`@Stateless`、`@Stateful`、`@Singleton`进行注解，或者在部署描述符中使用等效的 XML 配置。\n*\
  \   它必须实现其接口的方法（如果有的话）。\n*   该类必须定义为`public`，并且不能是`final`或`abstract`。\n*   该类必须有一个公共的无参构造器，容器将使用它来创建实例。\n\
  *   该类不能定义`finalize()`方法。\n*   业务方法名称不能以`ejb`开头，并且不能是`final`或`static`。\n*   远程方法的参数和返回值必须是合法的\
  \ RMI 类型。\n\n远程、本地和无接口视图\n\n根据客户端调用会话 Bean 的位置，Bean 类将需要实现远程或本地接口，或者根本不实现接口。如果你的架构中有客户端位于\
  \ EJB 容器的 JVM 实例之外，则它们必须使用远程接口。如图 7-3 所示，这适用于在独立 JVM（例如，富客户端）、应用程序客户端容器（ACC）或外部\
  \ Web 或 EJB 容器中运行的客户端。在这种情况下，客户端必须通过远程方法调用（RMI）来调用会话 Bean 方法。当 Bean 和客户端运行在同一个 JVM\
  \ 中时，你可以使用本地调用。这可以是一个 EJB 调用另一个 EJB，或者是在同一 JVM 的 Web 容器中运行的 Web 组件（Servlet、JSF）。你的应用程序也可以对同一个会话\
  \ Bean 同时使用远程和本地调用。\n\n![9781430246268_Fig07-03.jpg](img/9781430246268_Fig07-03.jpg)\n\
  \n图 7-3. 由多种类型客户端调用的会话 Bean\n\n一个会话 Bean 可以实现多个接口，也可以不实现任何接口。业务接口是一个标准的 Java 接口，不扩展任何\
  \ EJB 特定的接口。像任何 Java 接口一样，业务接口定义了一系列对客户端应用程序可用的方法。它们可以使用以下注解：\n\n*   `@Remote`：表示一个远程业务接口。方法参数按值传递，并且需要作为\
  \ RMI 协议的一部分进行序列化。\n*   `@Local`：表示一个本地业务接口。方法参数从客户端按引用传递给 Bean。\n\n你不能用多个注解标记同一个接口。本章到目前为止你看到的会话\
  \ Bean 都没有接口。无接口视图是本地视图的一种变体，它在本地公开 Bean 类的所有公共业务方法，而无需使用单独的业务接口。\n\n清单 7-2 展示了由`ItemEJB`无状态会话\
  \ Bean 实现的一个本地接口（`ItemLocal`）和一个远程接口（`ItemRemote`）。使用此代码，客户端将能够本地或远程调用`findCDs()`方法，因为它在两个接口中都有定义。`createCd()`方法将只能通过\
  \ RMI 远程访问。\n\n***清单 7-2.***  实现远程和本地接口的无状态会话 Bean\n\n```\n@Local\npublic interface\
  \ ItemLocal {\n  List<Book> findBooks();\n  List<CD> findCDs ();\n}\n\n@Remote\n\
  public interface ItemRemote {\n  List<Book> findBooks();\n  List<CD> findCDs ();\n\
  \  Book createBook(Book book);\n  CD createCD (CD cd);\n}\n\n@Stateless\npublic\
  \ class ItemEJB implements ItemLocal , ItemRemote {\n  // ...\n}\n```\n\n作为清单 7-2\
  \ 中代码的替代方案，你可以在 Bean 类中指定接口。在这种情况下，你需要在`@Local`和`@Remote`注解中包含接口的名称，如清单 7-3 所示。当你拥有无法添加注解的遗留接口，并且需要在会话\
  \ Bean 中使用它们时，这非常方便。\n\n***清单 7-3.***  定义远程、本地和无接口的 Bean 类\n\n```\npublic interface\
  \ ItemLocal {\n  List<Book> findBooks();\n  List<CD> findCDs();\n}\n\npublic interface\
  \ ItemRemote {\n  List<Book> findBooks();\n  List<CD> findCDs();\n  Book createBook(Book\
  \ book);\n  CD createCD(CD cd);\n}\n\n@Stateless\n@Remote(ItemRemote.class)\n@Local(ItemLocal.class)\n\
  @LocalBean\npublic class ItemEJB implements ItemLocal , ItemRemote {\n  // ...\n\
  }\n```\n\n如果 Bean 暴露了至少一个接口（本地或远程），它会自动失去无接口视图。然后，它需要通过使用`@LocalBean`注解在 Bean 类上显式指定它暴露了一个无接口视图。正如你在清单\
  \ 7-3 中所见，`ItemEJB`现在同时具有本地、远程和无接口视图。\n\n\n\nWeb 服务接口\n\n除了通过 RMI 进行远程调用外，无状态 Bean\
  \ 还可以作为 SOAP Web 服务或 RESTful Web 服务进行远程调用。第 14 章和第 15 章专门介绍 Web 服务，因此此处不再赘述。我只想向您展示，无状态会话\
  \ Bean 如何通过实现不同的带注解接口，以多种形式被访问。清单 7-4 展示了一个无状态 Bean，它同时拥有一个本地接口、一个 SOAP Web 服务端点（`@WebService`）和一个\
  \ RESTful Web 服务端点（`@Path`）。请注意，这些注解分别来自 JAX-WS（第 14 章）和 JAX-RS（第 15 章），并非 EJB 的一部分。\n\
  \n***清单 7-4.***  实现多个接口的无状态会话 Bean\n\n```\n@Local\npublic interface ItemLocal {\n\
    List<Book> findBooks();\n  List<CD> findCDs();\n}\n\n@WebService\npublic interface\
  \ ItemSOAP {\n  List<Book> findBooks();\n  List<CD> findCDs();\n  Book createBook(Book\
  \ book);\n  CD createCD(CD cd);\n}\n\n@Path(/items)\npublic interface ItemRest {\n\
      List<Book> findBooks();\n}\n\n@Stateless\npublic class ItemEJB implements ItemLocal\
  \ , ItemSOAP , ItemRest {\n  // ...\n}\n```\n\n可移植 JNDI 名称\n\nJNDI 已经存在很长时间了。其 API\
  \ 是规范化的，并且可以在不同应用服务器间移植。但 JNDI 名称并非如此，它因具体实现而异。当 GlassFish 或 JBoss 中的 EJB 被部署时，该\
  \ EJB 在目录服务中的名称是不同的，因此不可移植。客户端在 GlassFish 中查找 EJB 时需使用一个名称，而在 JBoss 中则需使用另一个名称。自\
  \ EJB 3.1 起，JNDI 名称已被规范化，从而使代码具有可移植性。因此，现在每当一个带有其接口的会话 Bean 被部署到容器时，每个 Bean/接口都会自动绑定到一个可移植的\
  \ JNDI 名称。Java EE 规范定义了具有以下语法的可移植 JNDI 名称：\n\n```\njava:<scope>[/<app-name>]/<module-name>/<bean-name>[!<fully-qualified-interface-name>]\n\
  ```\n\nJNDI 名称的每个部分含义如下：\n\n*   `<scope>` 定义了一系列标准命名空间，这些命名空间映射到 Java EE 应用程序的各种作用域：\n\
  \n*   `global`：`java:global` 前缀允许在 Java EE 应用程序外部执行的组件访问全局命名空间。\n*   `app`：`java:app`\
  \ 前缀允许在 Java EE 应用程序内部执行的组件访问特定于应用程序的命名空间。\n*   `module`：`java:module` 前缀允许在 Java\
  \ EE 应用程序内部执行的组件访问特定于模块的命名空间。\n*   `comp`：`java:comp` 前缀是一个私有的、特定于组件的命名空间，其他组件无法访问。\n\
  \n*   仅当会话 Bean 被打包在 `.ear` 或 `.war` 文件中时，才需要 `<app-name>`。在这种情况下，`<app-name>` 默认为\
  \ `.ear` 或 `.war` 文件的名称（不带 `.ear` 或 `.war` 文件扩展名）。\n*   `<module-name>` 是包含会话 Bean\
  \ 的模块的名称。它可以是独立 `.jar` 文件中的 EJB 模块，也可以是 `.war` 文件中的 Web 模块。`<module-name>` 默认为归档文件的基本名称（不带文件扩展名）。\n\
  *   `<bean-name>` 是会话 Bean 的名称。\n*   `<fully-qualified-interface-name>` 是每个已定义业务接口的完全限定名称。对于无接口视图，该名称可以是\
  \ Bean 类的完全限定名称。\n\n为了说明这种命名约定，我们以 `ItemEJB`（定义于清单 7-5）为例，它拥有一个远程接口、一个本地接口和一个无接口视图（使用\
  \ `@LocalBean` 注解）。所有这些类和接口都属于 `org.agoncal.book.javaee7` 包。`ItemEJB` 是 `<bean-name>`，并被打包在\
  \ `cdbookstore.jar`（即 `<module-name>`）中。\n\n***清单 7-5.***  实现多个接口的无状态会话 Bean\n\n\
  ```\npackage org.agoncal.book.javaee7 ;\n@Stateless\n@Remote(ItemRemote.class)\n\
  @Local(ItemLocal.class)\n@LocalBean\npublic class ItemEJB implements ItemLocal ,\
  \ ItemRemote {\n  // ...\n}\n```\n\n部署后，容器将创建三个 JNDI 名称，以便外部组件能够使用以下全局 JNDI 名称访问\
  \ `ItemEJB`：\n\n```\njava:global/cdbookstore/ ItemEJB !org.agoncal.book.javaee7\\\
  . ItemRemote\njava:global/cdbookstore/ ItemEJB !org.agoncal.book.javaee7\\. ItemLocal\n\
  java:global/cdbookstore/ ItemEJB !org.agoncal.book.javaee7\\. ItemEJB\n```\n\n请注意，如果\
  \ `ItemEJB` 部署在 `.ear` 文件（例如 `myapplication.ear`）中，则必须按如下方式使用 `<app-name>`：\n\n\
  ```\njava:global/ myapplication /cdbookstore/ItemEJB!org.agoncal.book.javaee7.ItemRemote\n\
  java:global/ myapplication /cdbookstore/ItemEJB!org.agoncal.book.javaee7.ItemLocal\n\
  java:global/ myapplication /cdbookstore/ItemEJB!org.agoncal.book.javaee7.ItemEJB\n\
  ```\n\n容器还需要通过 `java:app` 和 `java:module` 命名空间提供 JNDI 名称。因此，与 `ItemEJB` 部署在同一应用程序中的组件将能够使用以下\
  \ JNDI 名称查找它：\n\n```\njava: app /cdbookstore/ItemEJB!org.agoncal.book.javaee7.ItemRemote\n\
  java:app/cdbookstore/ItemEJB!org.agoncal.book.javaee7.ItemLocal\njava:app/cdbookstore/ItemEJB!org.agoncal.book.javaee7.ItemEJB\n\
  java: module /ItemEJB!org.agoncal.book.javaee7.ItemRemote\njava:module/ItemEJB!org.agoncal.book.javaee7.ItemLocal\n\
  java:module/ItemEJB!org.agoncal.book.javaee7.ItemEJB\n```\n\n这种可移植的 JNDI 名称可应用于所有会话\
  \ Bean：无状态、有状态和单例。\n\n无状态 Bean\n\n在 Java EE 应用程序中，无状态 Bean 是最流行的会话 Bean 组件。它们简单、强大且高效，能够响应执行无状态业务处理这一常见任务。无状态意味着什么？它意味着一个任务必须在单个方法调用中完成。\n\
  \n举个例子，我们可以回到面向对象编程的根源，即对象封装其状态和行为。在对象建模中，要将一本书持久化到数据库，您可能会这样做：创建一个 `Book` 对象的实例（使用\
  \ `new` 关键字），设置一些值，然后调用一个方法使其自身持久化到数据库（`book.persistToDatabase()`）。在以下代码中，您可以看到，从第一行到最后一行，`book`\
  \ 对象被多次调用并保持其状态：\n\n```\nBook book = new Book();\nbook.setTitle(\"The Hitchhiker's\
  \ Guide to the Galaxy\");\nbook.setPrice(12.5F);\nbook.setDescription(\"Science\
  \ fiction comedy series created by Douglas Adams.\");\nbook.setIsbn(\"1-84023-742-2\"\
  );\nbook.setNbOfPage(354);\nbook. persistToDatabase ();\n```\n\n在服务架构中，您会将业务逻辑委托给外部服务。当您需要实现一个可以通过单个方法调用（传递所有必要参数）完成的任务时，无状态服务是理想的选择。无状态服务是独立的、自包含的，并且不需要从一个请求到另一个请求的信息或状态。因此，如果您采用前面的代码并引入一个无状态服务，您需要创建一个\
  \ `Book` 对象，设置一些值，然后使用一个无状态服务来调用一个方法，该方法将代表该对象在单个调用中持久化这本书。状态由 `Book` 维护，而不是由无状态服务维护：\n\
  \n```\nBook book = new Book();\nbook.setTitle(\"The Hitchhiker's Guide to the Galaxy\"\
  );\nbook.setPrice(12.5F);\nbook.setDescription(\"Science fiction comedy series created\
  \ by Douglas Adams.\");\nbook.setIsbn(\"1-84023-742-2\");\nbook.setNbOfPage(354);\n\
  statelessService .persistToDatabase( book );\n```\n\n\n\n无状态会话 Bean 遵循无状态服务架构，是最高效的组件模型，因为它们可以被多个客户端池化和共享。这意味着，对于每个无状态\
  \ EJB，容器会在内存中保留一定数量的实例（即一个池），并在客户端之间共享它们。由于无状态 Bean 没有客户端状态，所有实例都是等价的。当客户端调用无状态\
  \ Bean 上的方法时，容器会从池中选取一个实例并分配给该客户端。当客户端请求结束时，该实例会返回池中以供重用。这意味着你只需要少量 Bean 就能处理多个客户端，如图\
  \ 7-4 所示。容器不保证为同一客户端提供同一实例。\n\n![9781430246268_Fig07-04.jpg](img/9781430246268_Fig07-04.jpg)\n\
  \n图 7-4. 客户端访问池中的无状态 Bean\n\n清单 7-5 展示了一个无状态 EJB 可能的样子：一个仅带有单个`@Stateless`注解的标准\
  \ Java 类。由于它存在于容器中，因此可以使用任何容器管理的服务，其中之一就是依赖注入。我们使用`@PersistenceContext`注解来注入实体管理器的引用。对于无状态会话\
  \ Bean，持久化上下文是事务性的，这意味着在此 EJB 中调用的任何方法（`createBook()`、`createCD()`等）都是事务性的。第 9 章会更详细地解释这个过程。请注意，所有方法都拥有在一次调用中处理业务逻辑所需的参数。例如，`createBook()`方法接受一个`Book`作为参数，并在不依赖任何其他状态的情况下将其持久化。\n\
  \n***清单 7-5.***  无状态会话 Bean ItemEJB\n\n```\n@Stateless\npublic class ItemEJB {\n\
  \n@PersistenceContext(unitName = \"chapter07PU\")\n  private EntityManager em ;\n\
  \npublic List<Book> findBooks() {\n    TypedQuery<Book> query = em .createNamedQuery(Book.FIND_ALL,\
  \ Book.class);\n    return query.getResultList();\n  }\n\npublic List<CD> findCDs()\
  \ {\n    TypedQuery<CD> query = em .createNamedQuery(CD.FIND_ALL, CD.class);\n    return\
  \ query.getResultList();\n  }\n\npublic Book createBook(Book book) {\n    em .persist(book);\n\
      return book;\n  }\n\npublic CD createCD(CD cd) {\n    em .persist(cd);\n    return\
  \ cd;\n  }\n}\n```\n\n无状态会话 Bean 通常包含几个紧密相关的业务方法。例如，清单 7-5 中的`ItemEJB` Bean 定义了与\
  \ CD-BookStore 应用程序销售的商品相关的方法。因此，你会找到创建、更新或查找图书和 CD 的方法，以及其他相关的业务逻辑。\n\n`@Stateless`注解将`ItemEJB`\
  \ POJO 标记为无状态会话 Bean，从而将一个简单的 Java 类转变为容器感知的组件。清单 7-6 描述了`@javax.ejb.Stateless`注解的规范。\n\
  \n***清单 7-6.***  @Stateless 注解 API\n\n```\n@Target({TYPE}) @Retention(RUNTIME)\n\
  public @interface Stateless {\n    String name () default \"\";\n    String mappedName\
  \ () default \"\";\n    String description () default \"\";\n}\n```\n\n`name`参数指定了\
  \ Bean 的名称，默认情况下是类的名称（在清单 7-5 的例子中是`ItemEJB`）。例如，此参数可用于通过 JNDI 查找 EJB。`description`参数是一个字符串，可用于描述\
  \ EJB。`mappedName`属性是由容器分配的全局 JNDI 名称。请注意，此 JNDI 名称是特定于供应商的，因此不可移植。`mappedName`与我之前描述的*可移植*全局\
  \ JNDI 名称没有关系。\n\n无状态会话 Bean 可以支持大量客户端，从而最大限度地减少所需资源。拥有无状态应用程序是提高可伸缩性的一种方式（因为容器不必存储和管理状态）。\n\
  \n有状态 Bean\n\n无状态 Bean 为其客户端提供业务方法，但不与它们维护会话状态。另一方面，有状态会话 Bean 则会保留会话状态。它们对于需要分多个步骤完成的任务非常有用，每个步骤都依赖于上一步维护的状态。我们以电子商务网站中的购物车为例。客户登录（她的会话开始），选择第一本书，将其添加到购物车，选择第二本书，并将其添加到购物车。最后，客户结账、付款并退出（会话结束）。购物车在整个交互过程中（可能需要一些时间，具体取决于客户会话的时长）保持客户已选择书籍数量的状态。与有状态组件的这种交互可以编写如下：\n\
  \n```\nBook book = new Book();\nbook.setTitle(\"银河系漫游指南\");\nbook.setPrice(12.5F);\n\
  book.setDescription(\"道格拉斯·亚当斯创作的科幻喜剧系列。\");\nbook.setIsbn(\"1-84023-742-2\");\n\
  book.setNbOfPage(354);\nstatefulComponent .addBookToShoppingCart( book );\nbook.setTitle(\"\
  曙光中的机器人\");\nbook.setPrice(18.25F);\nbook.setDescription(\"艾萨克·阿西莫夫的机器人系列\");\n\
  book.setIsbn(\"0-553-29949-2\");\nbook.setNbOfPage(276);\nstatefulComponent .addBookToShoppingCart(\
  \ book );\nstatefulComponent .checkOutShoppingCart();\n```\n\n上面的代码精确展示了有状态会话 Bean\
  \ 的工作方式。创建了两本书并添加到有状态组件的购物车中。最后，`checkOutShoppingCart()`方法依赖于所维护的状态，可以结账这两本书。\n\n\
  当客户端在服务器上调用有状态会话 Bean 时，EJB 容器需要为后续的每次方法调用提供相同的实例。有状态 Bean 不能被其他客户端重用。图 7-5 展示了\
  \ Bean 实例与客户端之间的一对一关联。就开发人员而言，不需要额外的代码，因为 EJB 容器会自动管理这种一对一关联。\n\n![9781430246268_Fig07-05.jpg](img/9781430246268_Fig07-05.jpg)\n\
  \n图 7-5. 客户端访问有状态 Bean\n\n这种一对一关联是有代价的，因为正如你可能猜到的，如果你有一百万个客户端，内存中就会有一百万个有状态 Bean。为了避免如此大的内存占用，容器会在客户端下一次请求将它们带回之前，暂时从内存中清除有状态\
  \ Bean。这种技术称为*钝化和激活*。钝化是将实例从内存中移除并保存到持久化位置（磁盘上的文件、数据库等）的过程。它有助于释放内存和资源（数据库或 JMS\
  \ 连接等）。激活是恢复状态并将其应用于实例的逆过程。钝化和激活由容器自动完成；你不必担心自己去做，因为这是一项容器服务。你应该担心的是在 Bean 被钝化之前释放任何资源（例如，数据库连接、JMS\
  \ 工厂连接等）。从 EJB 3.2 开始，你也可以禁用钝化，正如你将在下一章关于生命周期和回调注解中看到的那样。\n\n\n\n让我们回到购物车示例，并将其应用于有状态\
  \ Bean（参见清单 7-7）。一位客户登录网站，浏览商品目录，并将两本书添加到购物车（`addItem()` 方法）。`cartItems` 属性保存购物车的内容。然后，客户决定去咖啡机旁喝杯咖啡。在此期间，容器可能会钝化该实例以释放一些内存，从而将购物内容保存到永久存储中。几分钟后，客户回来，想在购买前了解购物车的总价（`getTotal()`\
  \ 方法）。容器激活该 EJB 并将数据恢复到购物车。然后，客户可以结账（`checkout()` 方法）并购买书籍。一旦客户注销，客户的会话结束，容器通过永久移除有状态\
  \ Bean 的实例来释放内存。\n\n***清单 7-7.***  有状态会话 Bean ShoppingCartEJB\n\n```\n@Stateful\n\
  @StatefulTimeout(value = 20, unit = TimeUnit.SECONDS)\npublic class ShoppingCartEJB\
  \ {\n\nprivate List<Item> cartItems = new ArrayList<>();\n\npublic void addItem(Item\
  \ item) {\n    if (!cartItems.contains(item))\n      cartItems.add (item);\n  }\n\
  \npublic void removeItem(Item item) {\n    if (cartItems.contains(item))\n      cartItems.remove\
  \ (item);\n  }\n\npublic Integer getNumberOfItems() {\n    if (cartItems == null\
  \ || cartItems.isEmpty())\n      return 0;\n    return cartItems.size ();\n  }\n\
  \npublic Float getTotal() {\n    if (cartItems == null || cartItems.isEmpty())\n\
        return 0f;\n\nFloat total = 0f;\n    for (Item cartItem : cartItems ) {\n\
        total += (cartItem.getPrice());\n    }\n    return total;\n  }\n\npublic void\
  \ empty() {\n    cartItems.clear();\n  }\n\n@Remove\n  public void checkout() {\n\
      // 执行一些业务逻辑\n    cartItems.clear ();\n  }\n}\n```\n\n购物车场景是使用有状态 Bean 的标准方式，其中容器自动负责维护会话状态。唯一需要的注解是\
  \ `@javax.ejb.Stateful`，它具有与清单 7-6 中描述的 `@Stateless` 相同的 API。\n\n请注意可选的 `@javax.ejb.StatefulTimeout`\
  \ 和 `@javax.ejb.Remove` 注解。`@Remove` 修饰 `checkout()` 方法。这会导致在调用 `checkout()` 方法后，Bean\
  \ 实例被从内存中永久移除。`@StatefulTimeout` 指定一个超时值，即 Bean 在被容器移除之前允许保持空闲（不接收任何客户端调用）的持续时间。此注解的时间单位是\
  \ `java.util.concurrent.TimeUnit`，因此可以从 `DAYS`、`HOURS`……到 `NANOSECONDS`（默认是 `MINUTES`）。或者，您可以避免使用这些注解，而依赖容器在客户端会话结束或过期时自动移除实例。然而，确保有状态\
  \ Bean 在适当的时候被移除可能会减少内存消耗。这在高度并发的应用程序中可能至关重要。\n\n单例 Bean\n\n单例 Bean 是一种会话 Bean，每个应用程序只实例化一次。它实现了来自“四人组”著名书籍中广泛使用的单例模式：Erich\
  \ Gamma、Richard Helm、Ralph Johnson 和 John M. Vlissides 合著的 *Design Patterns: Elements\
  \ of Reusable Object-Oriented Software*（Addison-Wesley，1995）。单例确保整个应用程序中只存在一个类的实例，并提供一个全局访问点。许多情况都需要单例对象——也就是说，您的应用程序只需要一个对象实例的情况：鼠标、窗口管理器、打印机后台处理程序、文件系统等等。\n\
  \n另一个常见用例是缓存系统，整个应用程序共享一个单一的缓存（例如，一个 `Hashmap`）来存储对象。在应用程序管理的环境中，您需要稍微调整代码才能将类转变为单例，如清单\
  \ 7-8 所示。首先，您需要通过私有构造函数来防止创建新实例。公共静态方法 `getInstance()` 返回 `CacheSingleton` 类的唯一实例。如果客户端类想要使用单例将对象添加到缓存，它需要调用\n\
  \n```\nCacheSingleton.getInstance().addToCache(myObject);\n```\n\n如果您希望此代码是线程安全的，则必须使用\
  \ `synchronized` 关键字来防止线程干扰和不一致的数据。您也可以使用 `java.util.concurrent.ConcurrentMap` 来代替\
  \ `Map`，这将带来更高的并发性和可扩展性。如果这些是关键考虑因素，这会很有用。\n\n***清单 7-8.***  遵循单例设计模式的 Java 类\n\n\
  ```\npublic class Cache {\n\nprivate static Cache instance = new Cache();\n  private\
  \ Map<Long, Object> cache = new HashMap<>();\n\nprivate Cache() {}\n\npublic static\
  \ synchronized Cache getInstance() {\n    return instance;\n  }\n\npublic void addToCache(Long\
  \ id, Object object) {\n    if (!cache.containsKey(id))\n      cache .put(id, object);\n\
    }\n\npublic void removeFromCache(Long id) {\n    if (cache.containsKey(id))\n\
        cache .remove(id);\n  }\n\npublic Object getFromCache(Long id) {\n    if (cache.containsKey(id))\n\
        return cache .get(id);\n    else\n      return null;\n  }\n}\n```\n\nEJB 3.1\
  \ 引入了单例会话 Bean，它遵循单例设计模式。一旦实例化，容器会确保在应用程序的整个生命周期内只有一个单例实例。一个实例在多个客户端之间共享，如图 7-6\
  \ 所示。单例在客户端调用之间保持其状态。\n\n![9781430246268_Fig07-06.jpg](img/9781430246268_Fig07-06.jpg)\n\
  \n图 7-6. 客户端访问单例 Bean\n\n![image](img/sq.jpg) **注意**  单例不具备集群感知能力。集群是一组紧密协作的容器（共享相同的资源、EJB\
  \ 等）。因此，在多个分布式容器跨多台机器组成集群的情况下，每个容器将拥有自己的单例实例。\n\n要将清单 7-8 中的代码从单例 Java 类转变为单例会话\
  \ Bean（参见清单 7-9），需要做的工作并不多。实际上，您只需使用 `@Singleton` 注解一个类，而无需担心私有构造函数或静态的 `getInstance()`\
  \ 方法。容器会确保您只创建一个实例。`@javax.ejb.Singleton` 注解具有与前面清单 7-6 中描述的 `@Stateless` 注解相同的\
  \ API。\n\n***清单 7-9.***  单例会话 Bean\n\n```\n@Singleton\npublic class CacheEJB {\n\
  \nprivate Map<Long, Object> cache = new HashMap<>();\n\npublic void addToCache(Long\
  \ id, Object object) {\n    if (!cache.containsKey(id))\n      cache .put(id, object);\n\
    }\n\npublic void removeFromCache(Long id) {\n    if (cache.containsKey(id))\n\
        cache .remove(id);\n  }\n\npublic Object getFromCache(Long id) {\n    if (cache.containsKey(id))\n\
        return cache .get(id);\n    else\n      return null;\n  }\n}\n```\n\n如您所见，无状态、有状态和单例会话\
  \ Bean 非常易于开发：您只需要一个注解。不过，单例 Bean 还有更多内容。它们可以在启动时初始化，可以链接在一起，并且可以自定义其并发访问。\n\n启动时初始化\n\
  \n\n\n当客户端类需要访问单例会话 Bean 上的方法时，容器会确保要么实例化该 Bean，要么使用容器中已有的实例。然而，有时初始化单例 Bean 可能非常耗时。想象一下，如果\
  \ `CacheEJB`（如清单 7-9 所示）需要访问数据库以加载包含数千个对象的缓存。对该 Bean 的第一次调用将非常昂贵，并且第一个客户端必须等待初始化完成。\n\
  \n为了避免这种延迟，你可以要求容器在启动时初始化单例 Bean。如果 Bean 类上出现了 `@Startup` 注解，容器会在应用程序启动期间初始化它，而不是在客户端调用它时。以下代码展示了如何使用该注解：\n\
  \n```\n@Singleton\n@Startup\npublic class CacheEJB {...}\n```\n\n![image](img/sq.jpg) **注意**  在\
  \ Java EE 7 中，专家组曾试图将 `@Startup` 注解从 EJB 规范中提取出来，以便任何受管 Bean 或 Servlet 都能使用它。这未能实现，但理想情况下，这在\
  \ Java EE 8 中将成为可能。\n\n单例链\n\n在某些情况下，当你拥有多个单例 Bean 时，显式的初始化顺序可能很重要。想象一下，如果 `CacheEJB`\
  \ 需要存储来自另一个单例 Bean（比如一个返回所有 ISO 国家代码的 `CountryCodeEJB`）的数据。那么 `CountryCodeEJB` 需要在\
  \ `CacheEJB` 之前初始化。多个单例之间可能存在依赖关系，而 `@javax.ejb.DependsOn` 注解正是用来表达这种依赖关系的。以下示例说明了该注解的用法：\n\
  \n```\n@Singleton\npublic class CountryCodeEJB {...}\n\n@DependsOn (\" CountryCodeEJB\
  \ \")\n@Singleton\npublic class CacheEJB {...}\n```\n\n`@DependsOn` 持有一个或多个字符串，每个字符串指定目标单例\
  \ Bean 的名称。以下代码展示了 `CacheEJB` 如何依赖于 `CountryCodeEJB` 和 `ZipCodeEJB` 的初始化。`@DependsOn(\"\
  CountryCodeEJB\", \"ZipCodeEJB\")` 告诉容器要确保单例 `CountryCodeEJB` 和 `ZipCodeEJB` 在 `CacheEJB`\
  \ 之前初始化。\n\n```\n@Singleton\npublic class CountryCodeEJB {...}\n\n@Singleton\npublic\
  \ class ZipCodeEJB {...}\n@DependsOn (\" CountryCodeEJB \", \"ZipCodeEJB\")\n@Startup\n\
  @Singleton\npublic class CacheEJB {...}\n```\n\n正如你在这段代码中所见，你甚至可以将依赖关系与启动初始化结合起来。`CacheEJB`\
  \ 在启动时被急切地初始化（因为它持有 `@Startup` 注解），因此 `CountryCodeEJB` 和 `ZipCodeEJB` 也将在 `CacheEJB`\
  \ 之前于启动时被初始化。\n\n你也可以使用完全限定名称来引用同一应用程序中不同模块内的单例。假设 `CacheEJB` 和 `CountryCodeEJB`\
  \ 都打包在同一个应用程序（同一个 `ear` 文件）中，但在不同的 `jar` 文件（分别是 `technical.jar` 和 `business.jar`）中。以下代码展示了\
  \ `CacheEJB` 如何依赖于 `CountryCodeEJB`：\n\n```\n@DependsOn(\" business.jar# CountryCodeEJB\"\
  )\n@Singleton\npublic class CacheEJB {...}\n```\n\n请注意，这种引用会引入对打包细节（在本例中是模块文件的名称）的代码依赖。\n\
  \n并发\n\n到目前为止你应该已经理解，单例会话 Bean 只有一个实例，由多个客户端共享。因此，允许客户端并发访问，并且可以通过 `@ConcurrencyManagement`\
  \ 注解以两种不同的方式进行控制。\n\n*   *容器管理并发（CMC）*：容器基于元数据（注解或等效的 XML）控制对 Bean 实例的并发访问。\n* \
  \  *Bean 管理并发（BMC）*：容器允许完全并发访问，并将同步责任委托给 Bean。\n\n如果未指定并发管理，则默认使用 CMC 划分。单例 Bean\
  \ 可以设计为使用 CMC 或 BMC，但不能同时使用两者。正如你将在以下部分中看到的，你可以使用 `@AccessTimeout` 注解来禁止并发（例如，如果一个客户端调用了一个正在被另一个客户端使用的业务方法，该并发调用将导致\
  \ `ConcurrentAccessException`）。\n\n容器管理并发\n\n使用默认划分 CMC 时，容器负责控制对单例 Bean 实例的并发访问。然后，你可以使用\
  \ `@Lock` 注解来指定当客户端调用方法时，容器必须如何管理并发。该注解可以取值为 `READ`（共享）或 `WRITE`（独占）。\n\n*   `@Lock(LockType.WRITE)`：与独占锁关联的方法在方法处理完成之前不允许并发调用。例如，如果客户端\
  \ C1 调用了一个带有独占锁的方法，客户端 C2 将无法调用该方法，直到 C1 完成。\n*   `@Lock(LockType.READ)`：与共享锁关联的方法将允许任意数量的其他并发调用访问\
  \ Bean 的实例。例如，两个客户端 C1 和 C2 可以同时访问一个带有共享锁的方法。\n\n`@Lock` 注解可以指定在类上、方法上或两者上。指定在类上意味着它适用于所有方法。如果你未指定并发锁定属性，则默认假定为\
  \ `@Lock(WRITE)`。清单 7-10 中的代码展示了 `CacheEJB` 在 Bean 类上使用了 `WRITE` 锁。这意味着所有方法都将具有\
  \ `WRITE` 并发性，除了被 `READ` 覆盖的 `getFromCache()` 方法。\n\n***清单 7-10.***  一个使用 CMC 的单例会话\
  \ Bean\n\n```\n@Singleton\n@Lock(LockType.WRITE)\n@AccessTimeout(value = 20, unit\
  \ = TimeUnit.SECONDS)\npublic class CacheEJB {\n\nprivate Map<Long, Object> cache\
  \ = new HashMap<>();\n\npublic void addToCache(Long id, Object object) {\n    if\
  \ (!cache.containsKey(id))\n      cache.put(id, object);\n  }\n\npublic void removeFromCache(Long\
  \ id) {\n    if (cache.containsKey(id))\n      cache.remove(id);\n  }\n\n@Lock(LockType.READ)\n\
    public Object getFromCache(Long id) {\n    if (cache.containsKey(id))\n      return\
  \ cache.get(id);\n    else\n      return null;\n  }\n}\n```\n\n在清单 7-10 中，该类有一个\
  \ `@AccessTimeout` 注解。当并发访问被阻塞时，可以指定一个超时时间，以便在特定时间内未获取到锁时拒绝请求。如果 `addToCache()`\
  \ 调用被锁定超过 20 秒，客户端将收到一个 `ConcurrentAccessTimeoutException`。\n\nBean 管理并发\n\n使用 BMC\
  \ 划分时，容器允许对单例 Bean 实例进行完全并发访问。然后，你有责任保护其状态免受因并发访问导致的同步错误。在这种情况下，你可以使用 Java 同步原语，例如\
  \ `synchronized` 和 `volatile`。清单 7-11 中的代码展示了使用 BMC（`@ConcurrencyManagement(BEAN)`）的\
  \ `CacheEJB`，并在 `addToCache()` 和 `removeFromCache()` 方法上使用了 `synchronized` 关键字。\n\
  \n***清单 7-11.***  一个使用 BMC 的单例会话 Bean\n\n```\n@Singleton\n@ConcurrencyManagement(ConcurrencyManagementType.BEAN)\n\
  public class CacheEJB {\n\nprivate Map<Long, Object> cache = new HashMap<>();\n\n\
  public synchronized void addToCache(Long id, Object object) {\n    if (!cache.containsKey(id))\n\
        cache.put(id, object);\n  }\n\npublic synchronized void removeFromCache(Long\
  \ id) {\n    if (cache.containsKey(id))\n      cache.remove(id);\n  }\n\npublic\
  \ Object getFromCache(Long id) {\n    if (cache.containsKey(id))\n      return cache.get(id);\n\
      else\n      return null;\n  }\n}\n```\n\n并发访问超时与禁止并发\n\n\n\n无法立即获取适当锁的并发访问尝试将被阻塞，直到能够继续执行。`@AccessTimeout`\
  \ 用于指定访问尝试在超时前应被阻塞的持续时间。`@AccessTimeout` 值为 -1 表示客户端请求将无限期阻塞，直到能够继续执行。`@AccessTimeout`\
  \ 值为 0 表示不允许并发访问。如果客户端调用当前正在使用的方法，这将导致抛出 `ConcurrentAccessException`。这可能会影响性能，因为客户端可能需要处理异常、重试访问\
  \ Bean、可能再次收到异常、再次重试，以此类推。在清单 7-12 中，`CacheEJB` 禁止了 `addToCache()` 方法上的并发操作。这意味着，如果客户端\
  \ A 正在向缓存添加对象，而客户端 B 同时想要执行相同操作，客户端 B 将收到异常，并且必须稍后重试（或以其他方式处理该异常）。\n\n***清单 7-12.***\
  \  一个不允许方法并发访问的单例会话 Bean\n\n```\n@Singleton\npublic class CacheEJB {\n\nprivate\
  \ Map<Long, Object> cache = new HashMap<>();\n\n@AccessTimeout(0)\n  public void\
  \ addToCache(Long id, Object object) {\n    if (!cache.containsKey(id))\n      cache.put(id,\
  \ object);\n  }\n\npublic void removeFromCache(Long id) {\n    if (cache.containsKey(id))\n\
        cache.remove(id);\n  }\n\n@Lock(LockType.READ)\n  public Object getFromCache(Long\
  \ id) {\n    if (cache.containsKey(id))\n      return cache.get(id);\n    else\n\
        return null;\n  }\n}\n```\n\n依赖注入\n\n我已在本书中讨论过依赖注入，在接下来的几章中你还会多次遇到这种机制。这是\
  \ Java EE 7 使用的一种简单而强大的机制，用于将资源引用注入到属性中。容器会注入这些资源，而不是应用程序在 JNDI 中查找资源。注入在部署时完成。如果数据有可能不会被使用，Bean\
  \ 可以通过执行 JNDI 查找来避免资源注入的开销。JNDI 是注入的一种替代方案；通过 JNDI，代码仅在需要时才拉取数据，而不是接受可能根本不需要的推送数据。\n\
  \n容器可以使用不同的注解（或部署描述符）将会话 Bean 中的各种类型的资源注入进来。\n\n*   `@EJB`：将 EJB 的本地、远程或无接口视图的引用注入到带注解的变量中。\n\
  *   `@PersistenceContext` 和 `@PersistenceUnit`：分别表示对 `EntityManager` 和 `EntityManagerFactory`\
  \ 的依赖（参见第 6 章中的“获取实体管理器”一节）。\n*   `@WebServiceRef`：注入对 Web 服务的引用。\n*   `@Resource`：注入多种资源，例如\
  \ JDBC 数据源、会话上下文、用户事务、JMS 连接工厂和目的地、环境条目、定时器服务等。\n*   `@Inject`：使用 `@Inject` 和 `@Produces`\
  \ 注入几乎所有内容，如第 2 章所述。\n\n清单 7-13 展示了一个无状态会话 Bean 的代码片段，它使用各种注解将不同的资源注入到属性中。请注意，这些注解可以设置在实例变量上，也可以设置在\
  \ setter 方法上。\n\n***清单 7-13.***  一个使用注入的无状态 Bean\n\n```\n@Stateless\npublic class\
  \ ItemEJB {\n\n@PersistenceContext (unitName = \"chapter07PU\")\n  private EntityManager\
  \ em;\n\n@EJB\n  private CustomerEJB customerEJB;\n\n@Inject\n  private NumberGenerator\
  \ generator;\n\n@WebServiceRef\n  private ArtistWebService artistWebService;\n\n\
  private SessionContext ctx;\n\n@Resource\n  public void setCtx(SessionContext ctx)\
  \ {\n    this.ctx = ctx;\n  }\n\n//...\n}\n```\n\n会话上下文\n\n会话 Bean 是存在于容器中的业务组件。通常，它们不直接访问容器或使用容器服务（事务、安全、依赖注入等）。这些服务旨在由容器代表\
  \ Bean 透明地处理（这称为*控制反转*）。然而，有时 Bean 需要在代码中显式使用容器服务（例如显式标记要回滚的事务）。这可以通过 `javax.ejb.SessionContext`\
  \ 接口实现。`SessionContext` 允许以编程方式访问为会话 Bean 实例提供的运行时上下文。`SessionContext` 扩展了 `javax.ejb.EJBContext`\
  \ 接口。表 7-3 描述了 `SessionContext` API 的一些方法。\n\n表 7-3. SessionContext 接口的部分方法\n\n\
  | 方法 | 描述 |\n| --- | --- |\n| `getCallerPrincipal` | 返回与调用关联的 `java.security.Principal`。\
  \ |\n| `getRollbackOnly` | 测试当前事务是否已被标记为回滚。 |\n| `getTimerService` | 返回 `javax.ejb.TimerService`\
  \ 接口。只有无状态 Bean 和单例 Bean 可以使用此方法。有状态会话 Bean 不能作为定时对象。 |\n| `getUserTransaction`\
  \ | 返回 `javax.transaction.UserTransaction` 接口以划分事务。只有使用 Bean 管理事务（BMT）的会话 Bean 才能使用此方法。\
  \ |\n| `isCallerInRole` | 测试调用者是否具有给定的安全角色。 |\n| `lookup` | 使会话 Bean 能够在 JNDI 命名上下文中查找其环境条目。\
  \ |\n| `setRollbackOnly` | 允许 Bean 将当前事务标记为回滚。 |\n| `wasCancelCalled` | 检查客户端是否在与当前正在执行的异步业务方法对应的客户端\
  \ `Future` 对象上调用了 `cancel()` 方法。 |\n\n如清单 7-14 所示，会话 Bean 可以通过使用 `@Resource` 注解注入\
  \ `SessionContext` 的引用来访问其环境上下文。这里的 `createBook` 方法检查只有管理员才能创建图书。如果图书库存水平过高，它还会进行回滚。\n\
  \n***清单 7-14.***  一个访问 SessionContext API 的无状态 Bean\n\n```\n@Stateless\npublic class\
  \ ItemEJB {\n\n@PersistenceContext(unitName = \"chapter07PU\")\n  private EntityManager\
  \ em;\n\n@Resource\n  private SessionContext context ;\n\npublic Book createBook(Book\
  \ book) {\n\nif (! context .isCallerInRole(\"admin\"))\n      throw new SecurityException(\"\
  Only admins can create books\");\n\nem.persist(book);\n\nif (inventoryLevel(book)\
  \ == TOO_MANY_BOOKS)\n      context .setRollbackOnly();\n\nreturn book;\n  }\n}\n\
  ```\n\n异步调用\n\n默认情况下，通过远程、本地和无接口视图进行的会话 Bean 调用是同步的：客户端调用一个方法，在调用期间它会被阻塞，直到处理完成、返回结果，客户端才能继续其工作。然而，异步处理是许多处理长时间运行任务的应用程序中的常见需求。例如，打印订单可能是一个非常耗时的任务，具体取决于打印机是否在线、纸张是否充足，或者打印机后台处理程序中是否已有数十个文档在等待打印。当客户端调用一个方法来打印文档时，它希望触发一个“发射后不管”的过程来打印文档，这样客户端就可以继续其处理。\n\
  \n\n\n在 EJB 3.1 之前，异步处理只能通过 JMS 和 MDB 来实现（参见第 13 章）。你必须创建受管对象（JMS 工厂和目的地），使用底层的\
  \ JMS API 将消息发送到目的地，然后开发一个 MDB 来消费和处理该消息。JMS 提供了良好的可靠性机制（持久化消息存储、传递保证、与其他系统的集成等），但对于某些仅需异步调用方法的场景来说，它可能显得过于重量级。\n\
  \n从 EJB 3.1 开始，你只需在会话 Bean 的方法上标注 `@javax.ejb.Asynchronous`，即可异步调用方法。清单 7-15 展示了一个\
  \ `OrderEJB`，它有一个向客户发送电子邮件的方法，另一个用于打印订单的方法。由于这两个方法耗时较长，因此都标注了 `@Asynchronous`。\n\
  \n***清单 7-15.***  一个声明了异步方法的 OrderEJB\n\n```\n@Stateless\npublic class OrderEJB\
  \ {\n\n@Asynchronous\n  public void sendEmailOrderComplete(Order order, Customer\
  \ customer) {\n    // 非常耗时的任务\n  }\n\n@Asynchronous\n  public void printOrder(Order\
  \ order) {\n    // 非常耗时的任务\n  }\n}\n```\n\n当客户端调用 `printOrder()` 或 `sendEmailOrderComplete()`\
  \ 方法时，容器会立即将控制权返回给客户端，并在一个独立的执行线程中继续处理该调用。如清单 7-15 所示，这两个异步方法的返回类型是 `void`。这在绝大多数用例中可能已经足够，但有时你需要方法返回一个值。异步方法可以返回\
  \ `void`，也可以返回 `java.util.concurrent.Future<V>` 对象，其中 `V` 代表结果值。`Future` 对象允许你从在独立线程中执行的方法获取返回值。然后，客户端可以使用\
  \ `Future` API 来获取结果，甚至取消调用。\n\n清单 7-16 展示了一个返回 `Future<Integer>` 的方法示例。`sendOrderToWorkflow()`\
  \ 方法使用工作流来处理 `Order` 对象。假设它调用了多个企业组件（消息、Web 服务等），并且每一步都返回一个状态（整数）。当客户端异步调用 `sendOrderToWorkflow()`\
  \ 方法时，它期望收到工作流的状态。客户端可以使用 `Future.get()` 方法检索结果，或者，如果出于任何原因想要取消调用，可以使用 `Future.cancel()`。如果客户端调用了\
  \ `Future.cancel()`，容器将仅在异步调用尚未开始时尝试取消它。请注意，`sendOrderToWorkflow()` 方法使用了 `SessionContext.wasCancelCalled()`\
  \ 方法来检查客户端是否已请求取消调用。因此，该方法返回 `javax.ejb.AsyncResult<V>`，这是 `Future<V>` 的一个便捷实现。请记住，`AsyncResult`\
  \ 用于将结果值传递给容器，而不是直接传递给调用者。\n\n***清单 7-16.***  一个返回 Future 的异步方法\n\n```\n@Stateless\n\
  @Asynchronous\npublic class OrderEJB {\n\n@Resource\n  SessionContext ctx ;\n\n\
  public Future<Integer> sendOrderToWorkflow(Order order) {\n    Integer status =\
  \ 0;\n\n// 处理中\n    status = 1;\n\nif ( ct x. wasCancelCalled() ) {\n      return\
  \ new AsyncResult<>(2);\n    }\n\n// 处理中\n\nreturn new AsyncResult<>(status);\n\
  \  }\n}\n```\n\n请注意，在清单 7-16 中，你也可以在类级别应用 `@Asynchronous` 注解。这将定义所有方法为异步方法。当客户端调用\
  \ `sendOrderToWorkflow()` 方法时，它需要调用 `Future.get()` 来检索结果值。\n\n```\nFuture<Integer>\
  \ status = orderEJB.sendOrderToWorkflow (order);\nInteger statusValue = status.\
  \ get() ;\n```\n\n部署描述符\n\nJava EE 7 组件使用“例外配置”原则，这意味着容器、持久化提供者或消息代理将对该组件应用一组默认服务。配置这些默认服务是例外情况。如果你需要非默认行为，则需要显式指定注解或其对应的\
  \ XML 配置。这在你已经见过的 JPA 实体中也是如此，其中一组注解允许你自定义默认映射。同样的原则也适用于会话 Bean。单个注解（`@Stateless`、`@Stateful`\
  \ 等）就足以通知容器应用某些服务（事务、生命周期、安全性、拦截器、并发、异步等），但是，如果你需要更改它们，则使用注解或 XML。注解将附加信息附加到类、接口、方法或变量上，XML\
  \ 部署描述符也是如此。\n\nXML 部署描述符是注解的一种替代方案，这意味着任何注解都有对应的 XML 标签。如果同时使用了注解和部署描述符，则在部署过程中，部署描述符中的设置将覆盖注解。我不会过多地描述\
  \ XML 部署描述符（称为 `ejb-jar.xml`）的结构，因为它是可选的，并且最终可能会变得非常冗长。作为示例，清单 7-17 展示了 `ItemEJB`\
  \ 的 `ejb-jar.xml` 文件可能的样子（之前曾在清单 7-2 中展示过）。它定义了 Bean 类、远程和本地接口、其类型（`Stateless`），以及它使用容器管理事务（CMT）（`Container`）。\n\
  \n***清单 7-17.***  ejb-jar.xml 文件\n\n```\n<ejb-jar xmlns=\" http://xmlns.jcp.org/xml/ns/javaee\
  \ \"\n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n     \
  \    xsi:schemaLocation=\" http://xmlns.jcp.org/xml/ns/javaee →\n         http://xmlns.jcp.org/xml/ns/javaee/ejb-jar_3_2.xsd\
  \ \"\n         version=\"3.2\">\n\n<enterprise-beans>\n    <session>\n      <ejb-name>ItemEJB</ejb-name>\n\
  \      <remote>org.agoncal.book.javaee7.chapter07.ItemRemote</remote>\n      <local>org.agoncal.book.javaee7.chapter07.ItemLocal</local>\n\
  \      <local-bean/>\n      <ejb-class>org.agoncal.book.javaee7.chapter07.ItemEJB</ejb-class>\n\
  \      <session-type>Stateless</session-type>\n      <transaction-type>Container</transaction-type>\n\
  \    </session>\n  </enterprise-beans>\n</ejb-jar>\n```\n\n如果你将会话 Bean 部署在 jar 文件中，则需要将部署描述符存储在\
  \ `META-INF/ejb-jar.xml` 文件中。如果你将其部署在 war 文件中，则需要将其存储在 `WEB-INF/ejb-jar.xml` 文件中。XML\
  \ 配置对于特定于环境的细节非常有用，这些细节不应通过注解在代码中指定（例如，如果 EJB 需要在开发环境中以一种方式运行，而在测试/生产环境中以另一种方式运行）。\n\
  \n环境命名上下文\n\n在处理企业应用程序时，有些情况下应用程序的参数会因部署环境的不同而变化（取决于部署的国家、应用程序的版本等）。例如，在 CD-BookStore\
  \ 应用程序中，`ItemEJB`（参见清单 7-18）将商品的价格转换为应用程序部署所在国家的货币（基于美元应用汇率）。如果你将此无状态 Bean 部署在欧洲的某个地方，则需要将商品价格乘以\
  \ 0.80，并将货币更改为欧元。\n\n***清单 7-18.***  一个将价格转换为欧元的无状态会话 Bean\n\n```\n@Stateless\n\
  public class ItemEJB {\n\n\n```\npublic Item convertPrice(Item item) {\n    item.setPrice(item.getPrice()\
  \ * 0.80F );\n    item.setCurrency(\" Euros \");\n    return item;\n  }\n}\n```\n\
  \n如您所见，硬编码这些参数的问题在于，每当货币汇率发生变化，您都必须针对每个国家修改代码、重新编译并重新部署组件。另一种选择是每次调用 `convertPrice()`\
  \ 方法时都访问数据库，但这会浪费资源。您真正需要的是将这些参数存储在部署时可以更改的地方。部署描述符是设置这些参数的理想位置。\n\n在 EJB 3.2 中，部署描述符（`ejb-jar.xml`）可能是可选的，但将其与环境条目一起使用是合理的。环境条目在部署描述符中指定，并可通过依赖注入（或通过\
  \ JNDI）访问。它们支持以下 Java 类型：`String`、`Character`、`Byte`、`Short`、`Integer`、`Long`、`Boolean`、`Double`\
  \ 和 `Float`。清单 7-19 展示了 `ItemEJB` 的 `ejb-jar.xml` 文件，其中定义了两个条目：类型为 `String`、值为 `Euros`\
  \ 的 `currencyEntry`，以及类型为 `Float`、值为 `0.80` 的 `changeRateEntry`。\n\n***清单 7-19.***  ejb-jar.xml\
  \ 中的 ItemEJB 环境条目\n\n```\n<ejb-jar xmlns=\" http://xmlns.jcp.org/xml/ns/javaee \"\
  \n         xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n         xsi:schemaLocation=\"\
  \ http://xmlns.jcp.org/xml/ns/javaee →\n         http://xmlns.jcp.org/xml/ns/javaee/ejb-jar_3_2.xsd\
  \ \"\n         version=\"3.2\">\n\n<enterprise-beans>\n    <session>\n      <ejb-name>ItemEJB</ejb-name>\n\
        <env-entry>\n        <env-entry-name> currencyEntry </env-entry-name>\n        <env-entry-type>java.lang.String</env-entry-type>\n\
          <env-entry-value>Euros</env-entry-value>\n      </env-entry>\n      <env-entry>\n\
          <env-entry-name> changeRateEntry </env-entry-name>\n        <env-entry-type>java.lang.Float</env-entry-type>\n\
          <env-entry-value>0.80</env-entry-value>\n      </env-entry>\n    </session>\n\
    </enterprise-beans>\n</ejb-jar>\n```\n\n现在，应用程序的参数已外部化到部署描述符中，`ItemEJB` 可以使用依赖注入来获取每个环境条目的值。在清单\
  \ 7-20 中，`@Resource(name = \"currencyEntry\")` 将 `currencyEntry` 的值注入到 `currency`\
  \ 属性中。请注意，环境条目和注入变量的数据类型必须兼容；否则，容器将抛出异常。\n\n***清单 7-20.***  使用环境条目的 ItemEJB\n\n\
  ```\n@Stateless\npublic class ItemEJB {\n\n@Resource(name = \" currencyEntry \"\
  )\n  private String currency;\n  @Resource(name = \" changeRateEntry \")\n  private\
  \ Float changeRate;\n\npublic Item convertPrice(Item item) {\n    item.setPrice(item.getPrice()\
  \ * changeRate );\n    item.setCurrency( currency );\n    return item;\n  }\n}\n\
  ```\n\n打包\n\n与大多数 Java EE 组件（Servlet、JSF 页面、Web 服务等）一样，EJB 在部署到运行时容器之前需要进行打包。在同一个归档文件中，您通常会找到企业\
  \ Bean 类、其接口、任何必要的超类或超接口、异常、辅助类以及可选的部署描述符（`ejb-jar.xml`）。一旦将这些工件打包到一个 jar（Java 归档）文件中，您就可以将它们直接部署到容器中。另一种选择是将\
  \ jar 文件嵌入到 ear（企业归档）文件中，然后部署 ear 文件。\n\nEar 文件用于将一个或多个模块（EJB jar 或 Web 应用程序）打包到单个归档文件中，以便部署到应用服务器时能够同时且一致地进行。例如，如图\
  \ 7-7 所示，如果您需要部署一个 Web 应用程序，您可能希望将您的 EJB 和实体打包到单独的 jar 文件中，将您的 Servlet 打包到一个 war\
  \ 文件中，然后将整个内容打包到一个 ear 文件中。将 ear 文件部署到应用服务器，您就可以使用 EJB 从 Servlet 操作实体。\n\n![9781430246268_Fig07-07.jpg](img/9781430246268_Fig07-07.jpg)\n\
  \n图 7-7. 打包 EJB\n\n从 EJB 3.1 开始，EJB Lite 也可以直接打包在 Web 模块（war 文件）中。在图 7-7 的右侧，Servlet、EJB\
  \ 和实体都打包在同一个 war 文件中，并包含所有部署描述符。请注意，在 EJB 模块中，部署描述符存储在 `META-INF/ejb-jar.xml` 下，而在\
  \ Web 模块中则存储在 `WEB-INF/ejb-jar.xml` 下。EJB Lite 可以直接打包在 war 或 jar 文件中。如果您需要使用完整的\
  \ EJB 规范（例如，远程接口、JMS、异步调用等），则必须将其打包到 jar 中，而不是 war 中。\n\n部署 EJB\n\n会话 Bean 是容器管理的组件，这也是它们的优势所在。容器处理各种服务（事务、生命周期、异步、拦截器等），这使您可以专注于业务代码。缺点在于您始终需要在容器中执行\
  \ EJB。历史上，这些容器在单独的进程中运行，因此测试有些繁琐。您必须启动容器（即服务器）、打包 EJB、部署它们、测试它们，最后停止服务器……以便稍后重新启动。\n\
  \n自 EJB 3.1 起，通过创建可嵌入的 EJB 容器，这个问题已得到解决。EJB 3.1 引入了一个标准 API，用于在 Java SE 环境中执行 EJB。可嵌入\
  \ API（包 `javax.ejb.embeddable`）允许客户端实例化一个在其自身 JVM 中运行的 EJB 容器。可嵌入容器提供了一个托管环境，支持\
  \ Java EE 容器中存在的相同基本服务：注入、事务、生命周期等。可嵌入 EJB 容器仅适用于 EJB Lite 子集 API（无 MDB、无远程调用等），这意味着它具有与\
  \ EJB Lite 容器相同的能力（但不是完整的 EJB 容器）。\n\n清单 7-21 展示了一个主类，它使用引导 API 启动容器（`javax.ejb.embeddable.EJBContainer`\
  \ 抽象类），查找一个 EJB，并调用其方法。\n\n***清单 7-21.***  使用可嵌入容器的主类\n\n```\npublic class Main\
  \ {\n\npublic static void main(String[] args) throws NamingException {\n\n// 设置容器类路径\n\
      Map<String, Object> properties = new HashMap<>();\n    properties.put(EJBContainer.MODULES,\
  \ new File(\"target/classes\"));\n\n// 创建嵌入式容器并获取 JNDI 上下文\n    try ( EJBContainer\
  \ ec = EJBContainer.createEJBContainer(properties) ) {\n\nContext ctx = ec.getContext();\n\
  \n// 创建一本书的实例\n      Book book = new Book();\n      book.setTitle(\"银河系漫游指南\");\n\
        book.setPrice(12.5F);\n      book.setDescription(\"科幻喜剧书籍\");\n      book.setIsbn(\"\
  1-84173-742-2\");\n      book.setNbOfPage(354);\n      book.setIllustrations(false);\n\
  \n// 使用无接口视图查找 EJB\n      ItemEJB itemEJB = (ItemEJB) ctx.lookup(\"java:global/classes/ItemEJB\
  \ \");\n\n// 将书持久化到数据库\n      itemEJB .createBook(book);\n\n// 从数据库中检索所有书籍\n      for\
  \ (Book aBook : itemEJB .findBooks()) {\n        System.out.println(aBook);\n      }\n\
      }\n  }\n}\n```\n\n\n\n如清单 7-21 所示，`EJBContainer` 包含一个用于创建容器实例的工厂方法（`createEJBContainer()`）。默认情况下，可嵌入容器会搜索客户端的类路径以找到要初始化的\
  \ EJB 集合（或者你也可以使用属性来设置类路径）。一旦初始化了容器，应用程序就会获取容器的 JNDI 上下文（`EJBContainer.getContext()`，该方法返回一个\
  \ `javax.naming.Context`），以便使用可移植的全局 JNDI 名称语法来查找 `ItemEJB`。\n\n请注意，`ItemEJB`（前面在清单\
  \ 7-1 中展示过）是一个无状态会话 Bean，它通过无接口视图暴露业务方法。它使用了注入、容器管理的事务以及一个 JPA `Book` 实体。可嵌入容器负责注入实体管理器并提交或回滚任何事务。`EJBContainer`\
  \ 实现了 `java.lang.AutoCloseable`，因此 try-with-resources 块会自动调用 `EJBContainer.close()`\
  \ 方法来关闭可嵌入容器实例。\n\n在清单 7-21 中，我使用了一个主类来向你展示如何使用可嵌入的 EJB 容器。但请记住，EJB 现在可以在任何类型的 Java\
  \ SE 环境中使用：从测试类到 Swing 应用程序，甚至是批处理。\n\n调用企业级 Java Bean\n\n现在你已经看到了会话 Bean 及其不同接口的示例，你可能想了解一下客户端是如何调用这些\
  \ Bean 的。会话 Bean 的客户端可以是任何类型的组件：POJO、图形界面（Swing）、CDI 托管 Bean、Servlet、JSF 支持 Bean、Web\
  \ 服务（SOAP 或 REST），或者另一个 EJB（部署在相同或不同的容器中）。\n\n简单性同样适用于客户端。要调用会话 Bean 上的方法，客户端不会直接实例化该\
  \ Bean（使用 `new` 运算符）。它需要获取对该 Bean（或其接口）的引用。它可以通过依赖注入（使用 `@EJB` 或 `@Inject` 注解）或通过\
  \ JNDI 查找来获取该引用。依赖注入允许容器在部署时自动注入对 EJB 的引用。除非另有指定，否则客户端会同步调用会话 Bean。\n\n通过注入进行调用\n\
  \nJava EE 使用多个注解来注入资源引用（`@Resource`）、实体管理器（`@PersistenceContext`）、Web 服务（`@WebServiceRef`）等。但\
  \ `@javax.ejb.EJB` 注解专门用于将会话 Bean 引用注入到客户端代码中。依赖注入仅在托管环境中才可能实现，例如 EJB 容器、Web 容器和应用程序客户端容器。\n\
  \n让我们来看一下最初的示例，其中会话 Bean 没有接口。对于客户端来说，要调用会话 Bean 的无接口视图，它需要获取对 Bean 类本身的引用。例如，在以下代码中，客户端使用\
  \ `@EJB` 注解获取对 `ItemEJB` 类的引用：\n\n```\n@Stateless\npublic class ItemEJB {...}\n\n\
  // 客户端代码注入对 EJB 的引用\n@EJB ItemEJB itemEJB;\n```\n\n如果会话 Bean 实现了多个接口，客户端必须指定它想要引用哪一个。在以下代码中，`ItemEJB`\
  \ 实现了两个接口，并且由于 `@LocalBean` 注解，它还暴露了一个无接口视图。客户端可以通过其本地接口、远程接口或无接口来调用该 EJB：\n\n```\n\
  @Stateless\n@Remote( ItemRemote.class )\n@Local( ItemLocal.class )\n@LocalBean\n\
  public class ItemEJB implements ItemLocal , ItemRemote {...}\n\n// 客户端代码注入对 EJB\
  \ 或接口的多个引用\n@EJB ItemEJB itemEJB;\n@EJB ItemLocal itemEJBLocal;\n@EJB ItemRemote\
  \ itemEJBRemote;\n```\n\n`@EJB` API 有多个属性；其中之一是你要注入的 EJB 的 JNDI 名称。这对于位于不同服务器上的远程\
  \ EJB 尤其有用：\n\n```\n@EJB( lookup = \"java:global/classes/ItemEJB\" ) ItemRemote\
  \ itemEJBRemote;\n```\n\n通过 CDI 进行调用\n\n正如你刚才所见，调用 EJB 上的方法只需要使用 `@EJB` 注解即可将引用注入到客户端。这非常直接：它在部署时为你提供了一个引用。但\
  \ `@EJB` 并没有提供类似于 CDI 替代方案的功能。相反，你需要使用 `@Inject` 注解。\n\n大多数情况下，你可以直接用 `@Inject`\
  \ 替换 `@EJB`，你的客户端代码就能正常工作。通过这样做，你可以获得你在第 2 章中看到的所有 CDI 优势。因此，如果我们采用前面的示例，以下是客户端如何使用\
  \ CDI 进行 EJB 注入：\n\n```\n@Stateless\n@Remote( ItemRemote.class )\n@Local( ItemLocal.class\
  \ )\n@LocalBean\npublic class ItemEJB implements ItemLocal , ItemRemote {...}\n\n\
  // 客户端代码使用 @Inject 注入对 EJB 或接口的多个引用\n@ Inject ItemEJB itemEJB;\n@ Inject ItemLocal\
  \ itemEJBLocal;\n@ Inject ItemRemote itemEJBRemote;\n```\n\n对于远程 EJB，正如你刚才所见，你可能需要使用\
  \ JNDI 字符串来查找它。`@Inject` 注解不能有字符串参数，因此在这种情况下，你需要生成远程 EJB 才能注入它：\n\n```\n// 生成远程\
  \ EJB 的代码\n@Produces @EJB(lookup = \"java:global/classes/ItemEJB\") ItemRemote itemEJBRemote;\n\
  \n// 客户端代码注入生成的远程 EJB\n@ Inject ItemRemote itemEJBRemote;\n```\n\n根据你的客户端环境，你可能无法使用注入（如果组件不是由容器管理的）。在这种情况下，你可以使用\
  \ JNDI 通过其可移植的 JNDI 名称来查找会话 Bean。\n\n通过 JNDI 进行调用\n\n会话 Bean 也可以使用 JNDI 进行查找。当客户端不受容器管理且无法使用依赖注入时，JNDI\
  \ 主要用于远程访问。但 JNDI 也可以被本地客户端使用，即使依赖注入会产生更简单的代码。注入是在部署时完成的。如果有可能不会用到这些数据，Bean 可以通过执行\
  \ JNDI 查找来避免资源注入的开销。JNDI 是注入的一种替代方案；通过 JNDI，代码仅在需要时才拉取数据，而不是接受可能根本不需要的推送数据。\n\n\
  JNDI 是一个用于访问不同类型目录服务的 API，允许客户端通过名称绑定和查找对象。JNDI 在 Java SE 中定义，并且独立于底层实现，这意味着你可以使用标准\
  \ API 在轻量级目录访问协议（LDAP）目录或域名系统（DNS）中查找对象。\n\n前面代码的替代方案是使用 JNDI 的 `InitialContext`，并通过其可移植的\
  \ JNDI 名称（我在前面“可移植的 JNDI 名称”一节中定义过）来查找已部署的 EJB。客户端代码如下所示：\n\n```\nContext ctx =\
  \ new InitialContext();\nItemRemote itemEJB = (ItemRemote) →\n        ctx.lookup\
  \ (\"java:global/cdbookstore/ItemEJB!org.agoncal.book.javaee7.ItemRemote\");\n```\n\
  \n总结\n\n从 EJB 2.x 开始，EJB 规范自诞生以来已经发展多年，从一个需要将 home 和 remote/local 接口与大量 XML 打包在一起的重量级模型，演变为一个没有接口、只有一个注解的简单\
  \ Java 类。其底层功能始终如一：事务性和安全性的业务逻辑（更多内容将在后续章节中介绍）。\n\n\n\n会话 Bean 是由容器管理的组件，用于开发业务层。会话\
  \ Bean 分为三种不同类型：无状态、有状态和单例。无状态 Bean 易于扩展，因为它们不保持状态、存在于池中，并处理可在单个方法调用中完成的任务。有状态 Bean\
  \ 与客户端存在一对一关联，可通过钝化和激活临时从内存中清除。单例 Bean 拥有多个客户端共享的唯一实例，可在启动时初始化、相互链接，并可自定义其并发访问。\n\
  \n尽管存在这些差异，会话 Bean 共享一个通用的编程模型。它们可以拥有本地、远程或无接口视图，使用注解，或通过部署描述符进行部署。会话 Bean 可以使用依赖注入获取对多种资源（JDBC\
  \ 数据源、持久化上下文、环境条目等）的引用，以及其运行时环境上下文（SessionContext 对象）。自 EJB 3.1 起，您可以异步调用方法、使用可移植的\
  \ JNDI 名称查找 EJB，或在 Java SE 环境中使用可嵌入的 EJB 容器。EJB 3.2 沿袭了其前身的路线，带来了一些小的增强。\n\n下一章将解释不同会话\
  \ Bean 的生命周期，以及如何通过回调注解进行交互。它还将展示如何使用增强的定时器服务来调度任务，以及如何设置安全授权。\n\n第 8 章\n\n![image](img/frontdot.jpg)\n\
  \n回调、定时器服务与授权\n\n在上一章中，您了解到会话 Bean 是由容器管理的组件。它们存在于 EJB 容器中，该容器在后台通过多种服务（依赖注入、事务管理等）封装业务代码。其中三种服务是生命周期管理、调度和授权。\n\
  \n生命周期意味着会话 Bean 会经历一组预定义的状态转换。根据 Bean 的类型（无状态、有状态、单例），生命周期将由不同的状态组成。每当容器更改生命周期状态时，它可以调用带有回调注解的方法。\n\
  \nEJB 定时器服务是调度任务的标准解决方案。依赖基于日历通知的企业应用程序使用此服务来建模工作流类型的业务流程。\n\n保护数据也很重要。您希望业务层像防火墙一样工作，对某些用户组授权特定操作，并拒绝其他用户的访问（例如，只有员工可以持久化数据，但用户和员工都被授权读取数据）。\n\
  \n在本章中，您将了解到无状态和单例会话 Bean 共享相同的生命周期，而有状态 Bean 的生命周期略有不同。您还将看到无状态和单例 Bean 如何利用定时器服务以声明式或编程方式调度任务。本章最后展示了授权在\
  \ EJB 容器中的工作原理，以及如何轻松允许具有特定角色的用户访问您的代码。\n\n会话 Bean 生命周期\n\n正如您在上一章中所见，客户端不会使用`new`运算符创建会话\
  \ Bean 的实例。它通过依赖注入或 JNDI 查找获取对会话 Bean 的引用。容器负责创建和销毁实例。这意味着客户端和 Bean 都无需决定 Bean 实例何时创建、依赖何时注入或实例何时销毁。容器负责管理\
  \ Bean 的生命周期。\n\n所有会话 Bean 在其生命周期中都有两个明显的阶段：创建和销毁。此外，有状态会话 Bean 会经历我在上一章中提到的钝化和激活阶段。与您在之前章节中看到的实体所使用的回调方法类似，EJB\
  \ 允许容器在其生命周期的特定阶段自动调用带有注解的方法（`@PostConstruct`、`@PreDestroy`等）。这些方法可以初始化 Bean 上的状态信息、使用\
  \ JNDI 查找资源或释放数据库连接。\n\n无状态与单例\n\n无状态和单例 Bean 的共同点是它们不与特定客户端维护会话状态。两种 Bean 类型都允许任何客户端访问——无状态\
  \ Bean 以每个实例为基础进行访问，而单例 Bean 则提供对单个实例的并发访问。两者共享如图 8-1 所示的相同生命周期，描述如下：\n\n1.  当客户端请求对\
  \ Bean 的引用（使用依赖注入或 JNDI 查找）时，无状态或单例会话 Bean 的生命周期开始。对于单例 Bean，它也可以在容器启动时开始（使用@Startup\
  \ 注解）。容器创建一个新的会话 Bean 实例。\n2.  如果新创建的实例通过注解（`@Inject`、`@Resource`、`@EJB`、`@PersistenceContext`等）或部署描述符使用依赖注入，容器将注入所有需要的资源。\n\
  3.  如果实例有一个带有`@PostContruct`注解的方法，容器将调用它。\n4.  Bean 实例处理客户端调用的方法，并保持就绪模式以处理未来的调用。无状态\
  \ Bean 保持就绪模式，直到容器释放池中的一些空间。单例 Bean 保持就绪模式，直到容器关闭。\n5.  容器不再需要该实例。它调用带有`@PreDestroy`注解的方法（如果有），并结束\
  \ Bean 实例的生命周期。\n\n![9781430246268_Fig08-01.jpg](img/9781430246268_Fig08-01.jpg)\n\
  \n图 8-1. 无状态和单例 Bean 生命周期\n\n无状态和单例 Bean 共享相同的生命周期，但它们在创建和销毁的方式上存在一些差异。\n\n当您部署一个无状态会话\
  \ Bean 时，容器会创建多个实例并将其添加到池中。当客户端调用无状态会话 Bean 上的方法时，容器从池中选择一个实例，将方法调用委托给该实例，然后将其返回到池中。当容器不再需要该实例时（通常当容器想要减少池中的实例数量时），它会销毁它。\n\
  \n![image](img/sq.jpg) **注意** EJB 监控可以通过 GlassFish 管理控制台完成。GlassFish 允许您自定义多个 EJB\
  \ 池参数。您可以设置池大小（池中 Bean 的初始、最小和最大数量）、池空闲超时到期时要移除的 Bean 数量，以及池超时的毫秒数。这些选项是特定于实现的，在其他\
  \ EJB 容器上可能不可用。\n\n对于单例会话 Bean，创建取决于它们是急切实例化（`@Startup`）还是非急切实例化，或者它们是否依赖于（`@DependsOn`）另一个已被急切创建的单例。如果是，容器将在部署时创建一个实例。如果不是，容器将在客户端调用业务方法时创建一个实例。由于单例\
  \ Bean 在应用程序的整个生命周期内存在，因此实例在容器关闭时被销毁。\n\n有状态\n\n\n\n有状态会话 bean 在编程上与无状态或单例会话 bean\
  \ 差别不大：仅元数据不同（使用 `@Stateful` 代替 `@Stateless` 或 `@Singleton`）。但真正的区别在于，有状态 bean 会与其客户端维护会话状态，因此其生命周期略有不同。容器会生成一个实例，并将其仅分配给一个客户端。然后，来自该客户端的每个请求都会被传递到同一个实例。遵循此原则并根据你的应用程序，你最终可能会在客户端和有状态\
  \ bean 之间形成一对一的关系（例如，1000 个并发用户可能会产生 1000 个有状态 bean）。如果某个客户端长时间未调用其 bean 的实例，容器必须在\
  \ JVM 内存耗尽之前将其清除，将实例状态保存到持久化存储中，然后在需要时连同其状态一起恢复该实例。容器采用了钝化和激活技术。\n\n钝化是指容器将 bean\
  \ 实例序列化到持久化存储介质（磁盘上的文件、数据库等）中，而不是将其保存在内存中。激活则相反，当客户端再次需要该 bean 实例时执行。容器从持久化存储中反序列化\
  \ bean，并将其激活回内存。这意味着 bean 的属性必须是可序列化的（它必须是 Java 基本类型或实现 `java.io.Serializable` 接口）。图\
  \ 8-2 展示了有状态 bean 的生命周期，并描述如下：\n\n1.  有状态 bean 的生命周期始于客户端请求对该 bean 的引用（使用依赖注入或 JNDI\
  \ 查找）。容器创建一个新的会话 bean 实例并将其存储在内存中。\n2.  如果新创建的实例通过注解（`@Inject`、`@Resource`、`@EJB`、`@PersistenceContext`\
  \ 等）或部署描述符使用依赖注入，容器会注入所有需要的资源。\n3.  如果实例有一个使用 `@PostContruct` 注解的方法，容器会调用它。\n4.\
  \  Bean 执行请求的调用并保持在内存中，等待后续的客户端请求。\n5.  如果客户端在一段时间内保持空闲，容器会调用使用 `@PrePassivate`\
  \ 注解的方法（如果有的话），并将 bean 实例钝化到持久化存储中。\n6.  如果客户端调用了一个已钝化的 bean，容器会将其激活回内存，并调用使用 `@PostActivate`\
  \ 注解的方法（如果有的话）。\n7.  如果客户端在会话超时期间内没有调用已钝化的 bean 实例，容器会销毁它。\n8.  作为步骤 7 的替代方案，如果客户端调用了一个使用\
  \ `@Remove` 注解的方法，容器会调用使用 `@PreDestroy` 注解的方法（如果有的话），并结束该 bean 实例的生命周期。\n\n![9781430246268_Fig08-02.jpg](img/9781430246268_Fig08-02.jpg)\n\
  \n图 8-2. 有状态 bean 生命周期\n\n在某些情况下，有状态 bean 包含开放资源，例如网络套接字或数据库连接。由于容器无法为每个 bean 保持这些资源开放，你将不得不在钝化前后使用回调方法关闭和重新打开资源。另一种可能性是停用有状态\
  \ bean 的默认激活/钝化行为。你必须非常小心地处理这个问题，但如果这确实是你需要的，你可以使用 `@Stateful(passivationCapable=false)`\
  \ 来注解你的有状态 bean。\n\n回调\n\n正如你刚才所见，每种类型的会话 bean 都有其容器管理的生命周期。容器允许你在 bean 状态发生变化时选择性地提供自己的业务代码。从一种状态到另一种状态的转换可以被容器拦截，以调用由表\
  \ 8-1 中列出的某个注解所注解的方法。\n\n表 8-1. 生命周期回调注解\n\n| 注解 | 描述 |\n| --- | --- |\n| `@PostConstruct`\
  \ | 标记一个方法，该方法在你创建 bean 实例并且容器完成依赖注入后立即被调用。此注解通常用于执行任何初始化操作。 |\n| `@PreDestroy`\
  \ | 标记一个方法，该方法在容器销毁 bean 实例之前立即被调用。使用 `@PreDestroy` 注解的方法通常用于释放先前已初始化的资源。对于有状态 bean，这发生在超时之后或当使用\
  \ `@Remove` 注解的方法执行完毕时。 |\n| `@PrePassivate` | 仅适用于有状态 bean。标记一个方法，该方法在容器钝化实例之前被调用。它通常为\
  \ bean 提供准备序列化以及释放无法序列化的资源（例如，关闭与数据库、消息代理、网络套接字等的连接）的时间。 |\n| `@PostActivate` |\
  \ 仅适用于有状态 bean。标记一个方法，该方法在容器重新激活实例后立即被调用。为 bean 提供重新初始化在钝化期间关闭的资源的机会。 |\n\n![image](img/sq.jpg) **注意**  EJB\
  \ 3.2 规范（JSR 345）的 `javax.ejb` 包定义了 `@PrePassivate` 和 `@PostActivate` 注解。它们与有状态\
  \ EJB 的生命周期相关，并且在 EJB 的生命周期内可能发生多次。`@PostConstruct` 和 `@PreDestroy` 是通用注解 1.2 规范（JSR\
  \ 250）的一部分，来自 `javax.annotation` 包（类似于 `@Resource` 或你将在后面看到的其他安全注解）。它们与托管 Bean 的生命周期相关，并且在类的生命周期内仅发生一次（在创建和销毁时）。\n\
  \n以下规则适用于回调方法：\n\n*   该方法不能有任何参数，并且必须返回 `void`。\n*   该方法不能抛出受检异常，但可以抛出运行时异常。抛出运行时异常将回滚事务（如果存在的话，如下一章所述）。\n\
  *   该方法可以具有 `public`、`private`、`protected` 或包级访问权限，但不能是 `static` 或 `final`。\n* \
  \  一个方法可以使用多个注解进行注解（稍后在清单 8-2 中显示的 `init()` 方法使用了 `@PostConstruct` 和 `@PostActivate`\
  \ 注解）。但是，一个 bean 上只能存在一个给定类型的注解（例如，你不能在同一个会话 bean 中有两个 `@PostConstruct` 注解）。\n*\
  \   回调方法可以访问 bean 的环境条目（参见第 7 章中的“环境命名上下文”部分）。\n\n这些回调通常用于分配和/或释放 bean 的资源。例如，清单\
  \ 8-1 展示了单例 bean `CacheEJB` 使用 `@PostConstruct` 注解来初始化其缓存。在创建 `CacheEJB` 的单个实例后，容器立即调用\
  \ `initCache()` 方法。\n\n***清单 8-1.***  使用 @PostConstruct 注解初始化其缓存的单例\n\n```\n@Singleton\n\
  public class CacheEJB {\n\nprivate Map<Long, Object> cache = new HashMap<>();\n\n\
  @PostConstruct\n  private void initCache() {\n    cache.put(1L, \"First item in\
  \ the cache\");\n    cache.put(2L, \"Second item in the cache\");\n  }\n\npublic\
  \ Object getFromCache(Long id) {\n    if (cache.containsKey(id))\n      return cache.get(id);\n\
      else\n      return null;\n  }\n}\n```\n\n清单 8-2 展示了一段有状态 bean 的代码片段。容器维护会话状态，其中可能包含诸如数据库连接之类的重量级资源。由于打开数据库连接代价高昂，因此应在调用之间共享，但在\
  \ bean 空闲（或钝化）时释放。\n\n\n\n***清单 8-2.***  一个有状态 Bean 初始化和释放资源\n\n```\n@Stateful\n\
  public class ShoppingCartEJB {\n\n@Resource(lookup = \"java:comp/defaultDataSource\"\
  )\n  private DataSource ds ;\n  private Connection connection ;\n\nprivate List<Item>\
  \ cartItems = new ArrayList<>();\n\n@PostConstruct\n  @PostActivate\n  private void\
  \ init() {\n    connection = ds.getConnection();\n  }\n\n@PreDestroy\n  @PrePassivate\n\
  \  private void close() {\n    connection.close();\n  }\n\n// ...\n\n@Remove\n \
  \ public void checkout() {\n    cartItems.clear();\n  }\n}\n```\n\n创建有状态 Bean 实例后，容器会将默认数据源的引用（关于数据源的更多内容将在本章及下一章介绍）注入到\
  \ `ds` 属性中。注入完成后，容器会调用指定的 `@PostConstruct` 方法（`init()`），该方法会创建一个数据库连接。如果容器恰好钝化了该实例，则会调用\
  \ `close()` 方法（`@PrePassivate`）。这样做的目的是关闭 JDBC 连接，该连接持有原生资源，在钝化期间不再需要。当客户端调用 Bean\
  \ 上的业务方法时，容器会激活它并再次调用 `init()` 方法（`@PostActivate`）。当客户端调用 `checkout()` 方法（使用 `@Remove`\
  \ 注解标注）时，容器会移除该实例，但首先会再次调用 `close()` 方法（`@PreDestroy`）。请注意，为了更好的可读性，我在回调方法中省略了 SQL\
  \ 异常处理。\n\n定时器服务\n\n某些 Java EE 应用程序需要调度任务，以便在特定时间提供通知。例如，CD-BookStore 应用程序需要每年向客户发送生日邮件，打印每月售出商品的统计数据，生成每晚库存水平报告，并每\
  \ 30 秒刷新一次技术缓存。\n\n因此，EJB 2.1 引入了一种称为定时器服务的调度工具，因为客户端不能直接使用 `Thread` API。与其他专有工具或框架（Unix\
  \ cron 工具、Quartz 等）相比，定时器服务的功能特性较少。EJB 规范直到 3.1 版本才看到定时器服务的重大改进。它从 Unix cron 和其他成功工具中汲取灵感，如今能够与其它产品竞争，因为它能满足大多数调度用例。\n\
  \nEJB 定时器服务是一种容器服务，允许 EJB 注册以进行回调调用。EJB 通知可以安排为基于日历的调度、在特定时间、经过特定持续时间后或按特定的重复间隔发生。容器会记录所有定时器，并在定时器到期时调用相应的\
  \ Bean 实例方法。图 8-3 展示了涉及定时器服务的两个步骤。首先，EJB 需要创建一个定时器（自动或编程方式）并注册以进行回调调用，然后定时器服务会在\
  \ EJB 实例上触发已注册的方法。\n\n![9781430246268_Fig08-03.jpg](img/9781430246268_Fig08-03.jpg)\n\
  \n图 8-3. 定时器服务与会话 Bean 之间的交互\n\n定时器适用于长期运行的业务流程，并且默认是持久的。这意味着它们能在服务器关闭后存活，一旦服务器重新启动，定时器会像从未发生过关闭一样继续执行。你也可以选择将定时器指定为非持久的。\n\
  \n![image](img/sq.jpg) **注意** 无状态 Bean、单例 Bean 和 MDB 可以由定时器服务注册，但有状态 Bean 不能也不应该使用调度\
  \ API。\n\n如果 Bean 的方法使用了 `@Schedule` 注解标注，则定时器可以在部署时由容器自动创建。但定时器也可以通过编程方式创建，并且必须提供一个使用\
  \ `@Timeout` 注解标注的回调方法。\n\n基于日历的表达式\n\n定时器服务使用一种源自 Unix cron 工具的基于日历的语法。此语法用于编程式定时器创建（使用\
  \ `ScheduleExpression` 类）和自动定时器创建（通过 `@Schedule` 注解或部署描述符）。一个调度表达式如下所示：\n\n```\n\
  year = \"2008,2012,2016\" dayOfWeek = \"Sat,Sun\" minute = \"0-10,30,40\"\n```\n\
  \n表 8-2 和表 8-3 定义了创建基于日历表达式的属性。\n\n表 8-2. 基于日历表达式的属性\n\n![Table8-2.jpg](img/Table8-2.jpg)\n\
  \n基于日历表达式的每个属性（秒、分钟、小时等）都支持以不同形式表示的值。例如，你可以有一个日期列表或一个年份范围。表 8-3 定义了属性可以采取的不同形式。\n\
  \n表 8-3. 表达式的形式\n\n| 形式 | 描述 | 示例 |\n| --- | --- | --- |\n| 单个值 | 该属性只有一个可能的值。 |\
  \ `year = \"2010\"` `month= \"May\"` |\n| 通配符 | 此形式表示给定属性的所有可能值。 | `second = \"\
  *\"` `dayOfWeek = \"*\"` |\n| 列表 | 该属性有两个或多个值，用逗号分隔。 | `year = \"2008,2012,2016\"\
  ` `dayOfWeek = \"Sat,Sun\" minute = \"0-10,30,40\"` |\n| 范围 | 该属性有一个值范围，用破折号分隔。\
  \ | `second = \"1-10\"` `dayOfWeek = \"Mon-Fri\"` |\n| 增量 | 该属性有一个起始点和一个间隔，用斜杠分隔。\
  \ | `minute = \"*/15\"` `second = \"30/10\"` |\n\n如果你以前使用过 Unix cron 语法，这可能会听起来很熟悉并且简单得多。借助这种丰富的语法，你几乎可以表达任何类型的日历表达式，如表\
  \ 8-4 所示。\n\n表 8-4. 表达式示例\n\n| 示例 | 表达式 |\n| --- | --- |\n| 每周三午夜 | `dayOfWeek=\"\
  Wed\"` |\n| 每周三午夜 | `second=\"0\"`, `minute=\"0\"`, `hour=\"0\"`, `dayOfMonth=\"\
  *\"`, `month=\"*\"`, `dayOfWeek=\"Wed\"`, `year=\"*\"` |\n| 每个工作日 6:55 | `minute=\"\
  55\"`, `hour=\"6\"`, `dayOfWeek=\"Mon-Fri\"` |\n| 每个工作日巴黎时间 6:55 | `minute=\"55\"\
  `, `hour=\"6\"`, `dayOfWeek=\"Mon-Fri\"`, `timezone=\"Europe/Paris\"` |\n| 每天每小时的每一分钟\
  \ | `minute=\"*\"`, `hour=\"*\"` |\n| 每天每小时每分钟的每一秒 | `second=\"*\"`, `minute=\"\
  *\"`, `hour=\"*\"` |\n| 每周一和周五中午 12 点 30 秒 | `second=\"30\", hour=\"12\"`, `dayOfWeek=\"\
  Mon`, `Fri\"` |\n| 每小时内的每五分钟 | `minute=\"*/5\"`, `hour=\"*\"` |\n| 每小时内的每五分钟 | `minute=\"\
  0,5,10,15,20,25,30,35, 40,45,50,55\"`, `hour=\"*\"` |\n| 十二月的最后一个星期一，下午 3 点 | `hour=\"\
  15\"`, `dayOfMonth=\"Last Mon\"`, `month=\"Dec\"` |\n| 每月最后一天的前三天，下午 1 点 | `hour=\"\
  13\"`, `dayOfMonth=\"-3\"` |\n| 每月第二个星期二中午开始，每小时内的每隔一小时 | `hour=\"12/2\"`, `dayOfMonth=\"\
  2nd Tue\"` |\n| 凌晨 1 点和 2 点的小时内，每 14 分钟 | `minute = \"*/14\"`, `hour=\"1`,`2\"`\
  \ |\n| 凌晨 1 点和 2 点的小时内，每 14 分钟 | `minute = \"0,14,28,42,56\"`, `our = \"1,2\"` |\n\
  | 每分钟内，从第 30 秒开始，每 10 秒 | `second = \"30/10\"` |\n| 每分钟内，从第 30 秒开始，每 10 秒 | `second\
  \ = \"30,40,50\"` |\n\n声明式定时器创建\n\n\n\n容器可以在部署时根据元数据自动创建定时器。容器会为每个标注了 `@javax.ejb.Schedule`\
  \ 或 `@Schedules`（或 `ejb-jar.xml` 部署描述符中的等效 XML 配置）的方法创建一个定时器。默认情况下，每个 `@Schedule`\
  \ 注解对应一个持久化定时器，但你也可以定义非持久化定时器。\n\n清单 8-3 展示了一个定义了多个方法的 `StatisticsEJB` Bean。`statisticsItemsSold()`\
  \ 创建了一个定时器，该定时器将在每月第一天的凌晨 5:30 调用该方法。`generateReport()` 方法创建了两个定时器（使用 `@Schedules`）：一个在每天凌晨\
  \ 2 点触发，另一个在每周三下午 2 点触发。`refreshCache()` 创建了一个非持久化定时器，该定时器将每十分钟刷新一次缓存。\n\n***清单\
  \ 8-3.***  一个注册了四个定时器的 StatisticsEJB\n\n```\n@Stateless\npublic class StatisticsEJB\
  \ {\n\n@Schedule(dayOfMonth = \"1\", hour = \"5\", minute = \"30\")\n  public void\
  \ statisticsItemsSold() {\n    // ...\n  }\n\n@Schedules({\n          @Schedule(hour\
  \ = \"2\"),\n          @Schedule(hour = \"14\", dayOfWeek = \"Wed\")\n  })\n  public\
  \ void generateReport() {\n    // ...\n  }\n\n@Schedule(minute = \"*/10\", hour\
  \ = \"*\", persistent = false )\n  public void refreshCache() {\n    // ...\n  }\n\
  }\n```\n\n编程式创建定时器\n\n要以编程方式创建定时器，EJB 需要访问 `javax.ejb.TimerService` 接口，可以通过依赖注入、`SessionContext`（`SessionContext.getTimerService()`，参见第\
  \ 7 章的“会话上下文”部分）或通过 JNDI 查找来实现。如表 8-5 所列，`TimerService` API 提供了多种方法，允许你创建不同类型的定时器并获取定时器的信息。\n\
  \n表 8-5. TimerService API\n\n| 方法 | 描述 |\n| --- | --- |\n| `createTimer` | 基于日期、间隔或持续时间创建定时器。这些方法不使用基于日历的表达式。\
  \ |\n| `createSingleActionTimer` | 创建一个单次触发的定时器，该定时器在指定时间点或指定持续时间后过期。在超时回调方法成功调用后，容器会移除该定时器。\
  \ |\n| `createIntervalTimer` | 创建一个间隔定时器，其首次过期发生在指定时间点，后续过期发生在指定间隔之后。 |\n| `createCalendarTimer`\
  \ | 使用 `ScheduleExpression` 辅助类，基于日历表达式创建定时器。 |\n| `getAllTimers` | 返回可用定时器的列表（接口\
  \ `javax.ejb.Timer`）。 |\n\n`ScheduleExpression` 辅助类允许你以编程方式创建基于日历的表达式。你将找到与表 8-2\
  \ 中定义的属性相关的方法，并且能够编写你在表 8-4 中看到的所有示例。以下是一些示例供你参考：\n\n```\nnew ScheduleExpression().dayOfMonth(\"\
  Mon\").month(\"Jan\");\nnew ScheduleExpression().second(\"10,30,50\").minute(\"\
  */5\").hour(\"10-14\");\nnew ScheduleExpression().dayOfWeek(\"1,5\").timezone(\"\
  Europe/Lisbon\");\nnew ScheduleExpression().dayOfMonth(customer.getBirthDay())\n\
  ```\n\n`TimerService` 的所有方法（`createSingleActionTimer`、`createCalendarTimer` 等）都返回一个\
  \ `javax.ejb.Timer` 对象，该对象包含所创建定时器的信息（创建时间、是否持久化等）。`Timer` 还允许 EJB 在定时器过期前取消它。当定时器过期时，容器会调用\
  \ Bean 关联的 `@javax.ejb.Timeout` 方法，并将 `Timer` 对象传递给它。一个 Bean 最多只能有一个 `@Timeout`\
  \ 方法。\n\n当 `CustomerEJB`（参见清单 8-4）在系统中创建新客户（`createCustomer()` 方法）时，它会根据客户的出生日期创建一个日历定时器。因此，每年容器都会触发一个\
  \ Bean 来创建并向客户发送生日邮件。为此，无状态 Bean 首先需要注入一个定时器服务的引用（使用 `@Resource`）。`createCustomer()`\
  \ 方法将客户持久化到数据库中，并使用其出生日和出生月来创建一个 `ScheduleExpression`。然后，使用 `TimerConfig` 创建一个日历定时器，并为其指定这个\
  \ `ScheduleExpression` 和 `customer` 对象。`new TimerConfig(customer, true)` 配置了一个持久化定时器（由\
  \ `true` 参数指示），该定时器会传递 `customer` 对象。\n\n***清单 8-4.***  一个以编程方式创建定时器的 CustomerEJB\n\
  \n```\n@Stateless\npublic class CustomerEJB {\n\n@Resource\n  TimerService timerService;\n\
  \n@PersistenceContext(unitName = \"chapter08PU\")\n  private EntityManager em;\n\
  \npublic void createCustomer(Customer customer) {\n    em.persist(customer);\n\n\
  ScheduleExpression birthDay = new ScheduleExpression().→\n             dayOfMonth(customer.getBirthDay()).month(customer.getBirthMonth());\n\
  \ntimerService. createCalendarTimer ( birthDay , new TimerConfig (customer, true));\n\
  \  }\n\n@Timeout\n  public void sendBirthdayEmail( Timer timer) {\n    Customer\
  \ customer = (Customer) timer .getInfo();\n    // ...\n  }\n}\n```\n\n一旦你创建了定时器，容器每年都会调用\
  \ `@Timeout` 方法（`sendBirthdayEmail()`），并将 `Timer` 对象传递给它。由于定时器已与 `customer` 对象一起序列化，该方法可以通过调用\
  \ `getInfo()` 方法来访问该对象。请注意，一个 Bean 最多只能有一个用于处理编程式定时器的 `@Timeout` 方法。\n\n授权\n\nEJB\
  \ 安全模型的主要目的是控制对业务代码的访问。在 Java EE 中，身份验证由 Web 层（或客户端应用程序）处理；然后，主体及其角色被传递给 EJB 层，EJB\
  \ 根据其角色检查经过身份验证的用户是否被允许访问某个方法。授权可以以声明式或编程式的方式进行。\n\n使用声明式授权，访问控制由 EJB 容器执行。使用编程式授权，访问控制通过使用\
  \ JAAS API 在代码中执行。\n\n声明式授权\n\n声明式授权可以在 Bean 中使用注解或在 XML 部署描述符中定义。声明式授权涉及声明角色、为方法（或整个\
  \ Bean）分配权限，或临时更改安全身份。这些控制由表 8-6 中描述的注解实现。每个注解都可以在 Bean 和/或方法上使用。\n\n表 8-6. 安全注解\n\
  \n| 注解 | Bean | 方法 | 描述 |\n| --- | --- | --- | --- |\n| `@PermitAll` | X | X | 指示给定的方法（或整个\
  \ Bean）可以被所有人访问（允许所有角色）。 |\n| `@DenyAll` | X | X | 指示不允许任何角色执行指定的方法或 Bean 的所有方法（拒绝所有角色）。如果你想在特定环境中拒绝访问某个方法（例如，`launchNuclearWar()`\
  \ 方法只应在生产环境中允许，而不应在测试环境中允许），这会很有用。 |\n| `@RolesAllowed` | X | X | 指示允许一组角色执行给定的方法（或整个\
  \ Bean）。 |\n| `@DeclareRoles` | X |  | 定义用于安全检查的角色。 |\n| `@RunAs` | X |  | 临时为主体分配一个新角色。\
  \ |\n\n\n\n`@RolesAllowed` 注解用于授权一组角色访问某个方法。它可以应用于特定方法或整个 Bean（此时所有业务方法将继承该 Bean\
  \ 的角色访问权限）。该注解可以接受单个 `String`（仅一个角色可访问该方法）或 `String` 数组（其中任一角色均可访问该方法）。你将在本节后面看到的\
  \ `@DeclareRoles` 注解可用于声明其他角色。\n\n![image](img/sq.jpg) **注意**  安全注解（`@RolesAllowed`、`@DenyAll`\
  \ 等）是通用注解 1.2 规范（JSR 250）的一部分，来自 `javax.annotation.security` 包。\n\n清单 8-5 展示了 `ItemEJB`\
  \ 在 Bean 级别和方法级别使用 `@RolesAllowed` 注解。这段代码表明，任何方法均可由与以下角色之一关联的主体访问：`user`、`employee`\
  \ 或 `admin`。`deleteBook()` 方法覆盖了类级别的设置，仅允许 `admin` 角色访问。\n\n***清单 8-5.***  一个允许特定角色的无状态\
  \ Bean\n\n```\n@Stateless\n@RolesAllowed({\"user\", \"employee\", \"admin\"})\n\
  public class ItemEJB {\n\n@PersistenceContext(unitName = \"chapter08PU\")\n  private\
  \ EntityManager em;\n\npublic Book findBookById(Long id) {\n    return em.find(Book.class,\
  \ id);\n  }\n\npublic Book createBook(Book book) {\n    em.persist(book);\n    return\
  \ book;\n  }\n\n@RolesAllowed(\"admin\")\n  public void deleteBook(Book book) {\n\
      em.remove(em.merge(book));\n  }\n}\n```\n\n`@RolesAllowed` 定义了一组允许访问某个方法的角色。`@PermitAll`\
  \ 和 `@DenyAll` 注解适用于任何角色。因此，你可以使用 `@PermitAll` 注解标记一个 EJB 或方法，使其可由任何角色调用。相反，`@DenyAll`\
  \ 禁止任何角色访问某个方法。\n\n如清单 8-6 所示，由于 `findBookById()` 方法使用了 `@PermitAll` 注解，现在它可由任何角色访问，而不仅仅是\
  \ `user`、`employee` 和 `admin`。另一方面，`findConfidentialBook()` 方法则完全不可访问（`@DenyAll`）。\n\
  \n***清单 8-6.***  一个使用 @PermitAll 和 @DenyAll 的无状态 Bean\n\n```\n@Stateless\n@RolesAllowed({\"\
  user\", \"employee\", \"admin\"})\npublic class ItemEJB {\n\n@PersistenceContext(unitName\
  \ = \"chapter08PU\")\n  private EntityManager em;\n\n@PermitAll\n  public Book findBookById(Long\
  \ id) {\n    return em.find(Book.class, id);\n  }\n\npublic Book createBook(Book\
  \ book) {\n    em.persist(book);\n    return book;\n  }\n\n@RolesAllowed(\"admin\"\
  )\n  public void deleteBook(Book book) {\n    em.remove(em.merge(book));\n  }\n\n\
  @DenyAll\n  public Book findConfidentialBook(Long secureId) {\n    return em.find(Book.class,\
  \ secureId);\n  }\n}\n```\n\n`@DeclareRoles` 注解略有不同，它不授予或拒绝任何访问权限。它为整个应用程序声明角色。当你部署清单\
  \ 8-6 中的 EJB 时，容器将通过检查 `@RolesAllowed` 注解自动声明 `user`、`employee` 和 `admin` 角色。但你可能希望通过\
  \ `@DeclareRoles` 注解为整个应用程序（而不仅仅是单个 EJB）在安全域中声明其他角色。此注解仅适用于类级别，它接受一个角色数组并在安全域中声明它们。实际上，你可以使用这两个注解之一或两者结合来声明安全角色。如果同时使用这两个注解，则会声明\
  \ `@DeclareRoles` 和 `@RolesAllowed` 中角色的并集。我们通常为整个企业应用程序声明角色，因此在这种情况下，在部署描述符中声明角色比使用\
  \ `@DeclareRoles` 注解更有意义。\n\n当你部署清单 8-7 中的 `ItemEJB` 时，会声明五个角色：`HR`、`salesDpt`、`user`、`employee`\
  \ 和 `admin`。然后，通过 `@RolesAllowed` 注解，这些角色中的某些角色被授予对特定方法的访问权限（如前所述）。\n\n***清单 8-7.***  一个声明角色的无状态\
  \ Bean\n\n```\n@Stateless\n@DeclareRoles({\"HR\", \"salesDpt\"})\n@RolesAllowed({\"\
  user\", \"employee\", \"admin\"})\npublic class ItemEJB {\n\n@PersistenceContext(unitName\
  \ = \"chapter08PU\")\n  private EntityManager em;\n\npublic Book findBookById(Long\
  \ id) {\n    return em.find(Book.class, id);\n  }\n\npublic Book createBook(Book\
  \ book) {\n    em.persist(book);\n    return book;\n  }\n\n@RolesAllowed(\"admin\"\
  )\n  public void deleteBook(Book book) {\n    em.remove(em.merge(book));\n  }\n\
  }\n```\n\n最后一个注解 `@RunAs` 在你需要为现有主体临时分配一个新角色时非常有用。例如，如果你在方法内调用另一个 EJB，但该 EJB 需要不同的角色，你可能就需要这样做。\n\
  \n例如，清单 8-8 中的 `ItemEJB` 授权 `user`、`employee` 和 `admin` 角色访问。当这些角色之一访问某个方法时，该方法将以临时角色\
  \ `inventoryDpt` 运行（`@RunAs(\"inventoryDpt\")`）。这意味着当你调用 `createBook()` 方法时，`InventoryEJB.addItem()`\
  \ 方法将以 `inventoryDpt` 角色被调用。\n\n***清单 8-8.***  一个以不同角色运行的无状态 Bean\n\n```\n@Stateless\n\
  @RolesAllowed({\"user\", \"employee\", \"admin\"})\n@RunAs(\"inventoryDpt\")\npublic\
  \ class ItemEJB {\n\n@PersistenceContext(unitName = \"chapter08PU\")\n  private\
  \ EntityManager em;\n\n@EJB\n  private InventoryEJB inventory ;\n\npublic List<Book>\
  \ findBooks() {\n    TypedQuery<Book> query = em.createNamedQuery(\"findAllBooks\"\
  , Book.class);\n    return query.getResultList();\n  }\n\npublic Book createBook(Book\
  \ book) {\n    em.persist(book);\n    inventory.addItem(book);\n    return book;\n\
    }\n}\n```\n\n如你所见，声明式授权让你轻松实现强大的身份验证策略。但是，如果你需要为单个用户提供安全设置，或根据当前主体的角色应用某些业务逻辑，该怎么办？这时就需要程序化授权了。\n\
  \n程序化授权\n\n声明式授权涵盖了应用程序所需的大多数安全场景。但有时你需要更细粒度的授权访问（允许代码块而非整个方法，允许或拒绝单个用户而非角色的访问等）。你可以使用程序化授权来选择性地允许或阻止对某个角色或主体的访问。这是因为你可以直接访问\
  \ JAAS `java.security.Principal` 接口以及 EJB 上下文，以便在代码中检查主体的角色。\n\n`SessionContext`\
  \ 接口定义了以下与安全相关的方法：\n\n*   `isCallerInRole()`：此方法返回一个 `boolean` 值，用于测试调用者是否具有给定的安全角色。\n\
  *   `getCallerPrincipal()`：此方法返回标识调用者的 `java.security.Principal`。\n\n\n\n为了演示如何使用这些方法，我们来看一个例子。清单\
  \ 8-9 中的 `ItemEJB` 没有使用任何声明式安全，但仍需通过编程方式进行某种检查。首先，该 Bean 需要获取其上下文的引用（使用 `@Resource`\
  \ 注解）。有了这个上下文，`deleteBook()` 方法就可以检查调用者是否具有 `admin` 角色。如果没有，它会抛出一个 `java.lang.SecurityException`\
  \ 来通知用户授权违规。`createBook()` 方法则利用角色和主体执行一些业务逻辑。请注意，`getCallerPrincipal()` 方法返回一个包含名称的\
  \ `Principal` 对象。该方法会检查主体名称是否为 `paul`，然后将 `\"special user\"` 值设置到图书实体中。\n\n***清单\
  \ 8-9.***  一个使用编程式安全的 Bean\n\n```\n@Stateless\npublic class ItemEJB {\n\n@PersistenceContext(unitName\
  \ = \"chapter08PU\")\n  private EntityManager em;\n\n@Resource\n  private SessionContext\
  \ ctx ;\n\npublic void deleteBook(Book book) {\n    if (!ctx. isCallerInRole (\"\
  admin\"))\n      throw new SecurityException(\"Only admins are allowed\");\n\nem.remove(em.merge(book));\n\
  \  }\n\npublic Book createBook(Book book) {\n    if (ctx. isCallerInRole (\"employee\"\
  ) && !ctx. isCallerInRole (\"admin\")) {\n      book.setCreatedBy(\"employee only\"\
  );\n    } else if (ctx. getCallerPrincipal ().getName().equals(\"paul\")) {\n  \
  \    book.setCreatedBy(\"special user\");\n    }\n    em.persist(book);\n    return\
  \ book;\n  }\n}\n```\n\n融会贯通\n\n在第 4 章的“融会贯通”部分，我演示了如何开发一个映射到 Derby 数据库的 `Book`\
  \ 实体（如清单 4-3 所示）。然后，我展示了一个 `Main` 类（如清单 4-4 所示），它使用实体管理器来持久化一本书，并从数据库中检索所有书籍（使用了显式的事务划分：`tx.begin()`\
  \ 和 `tx.commit()`）。\n\n下面的示例使用了相同的用例，但将第 4 章中使用的 `Main` 类替换为一个无状态会话 Bean（`BookEJB`）。EJB\
  \ 本质上是支持事务的（你将在下一章中看到），因此我们的无状态会话 Bean 将使用容器管理事务（CMT）来处理 `Book` 实体上的 CRUD 操作。我还会添加一个单例（`DatabasePopulator`），它将在启动时填充数据库，以便数据库中有一些数据，同时还会添加一个\
  \ CDI 生产者，以便能够注入持久化单元（使用 `@Inject`）。然后，`BookEJB`、`Book` 实体、`DatabasePopulator` 单例、CDI\
  \ 生产者以及所有必需的 XML 配置文件将被打包并部署到 GlassFish 中。`BookEJB` 将由一个 `Main` 类远程调用（参见图 8-4），并通过嵌入式容器（`BookEJBIT`）进行集成测试。\n\
  \n![9781430246268_Fig08-04.jpg](img/9781430246268_Fig08-04.jpg)\n\n图 8-4. 融会贯通\n\
  \n为了使用事务，无状态会话 Bean 需要通过一个数据源（`jdbc/chapter08DS`）访问数据库，该数据源必须部署在 GlassFish 中，并链接到\
  \ `chapter08DB` 数据库（稍后你将看到，这要归功于 `@DataSourceDefinition`）。\n\n项目的目录结构遵循 Maven 约定，因此你需要将类和文件放置在以下目录中：\n\
  \n*   `src/main/java`：用于存放 `Book` 实体、`BookEJB`、`BookEJBRemote` 接口、`DatabasePopulator`\
  \ 和 `DatabaseProducer` 类。\n*   `src/main/resources`：包含用于 Derby 数据库的持久化单元文件 `persistence.xml`\
  \ 和触发 CDI 的 `beans.xml`。\n*   `src/test/java`：用于集成测试的 `BookEJBIT` 类。\n*   `pom.xml`：Maven\
  \ 项目对象模型（POM），描述项目、其对外部其他模块的依赖关系以及组件。\n\n编写 Book 实体\n\n清单 8-10 引用了第 4 章（清单 4-3）中描述的同一个\
  \ `Book` 实体，因此我不再详细解释（它使用了 JPA 和 Bean 验证注解）。不过有一个区别是，清单 8-10 中的 `Book` 实体实现了 `Serializable`，因为它需要被\
  \ `Main` 类远程访问。\n\n***清单 8-10.***  一个包含命名查询和 Bean 验证约束的 `Book` 实体\n\n```\n@Entity\n\
  @NamedQuery (name = FIND_ALL, query = \"SELECT b FROM Book b\")\npublic class Book\
  \ implements Serializable {\n\npublic static final String FIND_ALL = \"Book.findAllBooks\"\
  ;\n\n@Id @GeneratedValue\n  private Long id;\n  @NotNull\n  @Column(nullable = false)\n\
  \  private String title;\n  private Float price;\n  @Size(max = 2000)\n  @Column(length\
  \ = 2000)\n  private String description;\n  private String isbn;\n  private Integer\
  \ nbOfPage;\n  private Boolean illustrations;\n\n// 构造函数、getter、setter\n}\n```\n\
  \n编写 BookEJB 无状态会话 Bean\n\n`BookEJB` 是一个无状态会话 Bean，它充当外观角色，处理 `Book` 实体上的 CRUD 操作。清单\
  \ 8-11 展示了需要用 `@javax.ejb.Stateless` 注解的 Java 类，它通过 `@LocalBean` 暴露了一个无接口视图，并实现了\
  \ `BookEJBRemote` 接口（参见清单 8-12）。该 EJB 使用 `@Inject` 获取实体管理器的引用，因为 `EntityManager`\
  \ 是由 `DatabaseProducer`（清单 8-13）生成的。以下是每个业务方法的一些说明：\n\n*   `findBooks`：此方法使用 `Book`\
  \ 实体中定义的 `findAllBooks` 命名查询，从数据库中检索所有图书实例。\n*   `createBook`：此方法接受一个 `Book`（不能为\
  \ null）作为参数，将其持久化到数据库，并返回它。\n*   `updateBook`：此方法接受一个分离的 `Book`（不能为 null）作为参数，并将其合并。通过使用\
  \ `merge()` 方法，该对象被附加到实体管理器并与数据库同步。\n*   `deleteBook`：在从数据库中删除 `Book` 实体之前，此方法必须先将该对象重新附加到实体管理器（使用\
  \ `merge()`），然后再删除它。\n\n***清单 8-11.***  一个充当 CRUD 操作外观的无状态会话 Bean\n\n```\n@Stateless\n\
  @LocalBean\npublic class BookEJB implements BookEJBRemote {\n\n@Inject\n  private\
  \ EntityManager em ;\n\npublic List<Book> findBooks () {\n    TypedQuery<Book> query\
  \ = em .createNamedQuery(FIND_ALL, Book.class);\n    return query.getResultList();\n\
  \  }\n\npublic @NotNull Book createBook ( @NotNull Book book) {\n    em .persist(book);\n\
  \    return book;\n  }\n\npublic @NotNull Book updateBook (@NotNull Book book) {\n\
  \    return em .merge(book);\n  }\n\npublic void deleteBook (@NotNull Book book)\
  \ {\n    em .remove( em .merge(book));\n  }\n}\n```\n\n\n\n第 4 章（代码清单 4-4）中定义的`Main`类与代码清单\
  \ 8-11 中的类的主要区别在于：`EntityManager`的实例是直接注入到会话 Bean 中，而不是通过`EntityManagerFactory`来创建。EJB\
  \ 容器负责管理`EntityManager`的生命周期，因此它会注入一个实例，并在 EJB 销毁时将其关闭。此外，JPA 调用不再需要包裹在`tx.begin()`和`tx.commit()`之间，因为会话\
  \ Bean 方法默认是事务性的。这种默认行为被称为 CMT，我将在下一章中讨论。\n\n由于`BookEJB`被`Main`类远程调用，因此`BookEJB`需要实现一个远程接口。普通\
  \ Java 接口与远程接口的唯一区别在于是否包含`@Remote`注解，如代码清单 8-12 所示。\n\n***代码清单 8-12.***  远程接口\n\n\
  ```\n@Remote\npublic interface BookEJBRemote {\n\nList<Book> findBooks();\n  Book\
  \ createBook(Book book);\n  void deleteBook(Book book);\n  Book updateBook(Book\
  \ book);\n}\n```\n\n编写 CDI DatabaseProducer\n\n在代码清单 8-11 中，`BookEJB`通过`@Inject`注入了`EntityManager`。如你所知，JPA\
  \ 允许应用程序拥有多个持久化单元，每个单元通过名称区分（此处为`\"chapter08PU\"`）。由于`@Inject`没有字符串参数（你不能写成`@Inject(\"\
  chapter08PU\")`），因此注入`EntityManager`的唯一方式是使用`@PersistenceContext(unitName = \"chapter08PU\"\
  )`。借助 CDI 生产者（在第 2 章中介绍），代码清单 8-13 中的 Bean 生成了一个`EntityManager`，现在可以通过`@Inject`注解进行注入。\n\
  \n***代码清单 8-13.***  生成 EntityManager 的 CDI Bean\n\n```\npublic class DatabaseProducer\
  \ {\n\n@Produces\n  @PersistenceContext(unitName = \"chapter08PU\")\n  private EntityManager\
  \ em;\n}\n```\n\nBookEJB 的持久化单元\n\n在第 4 章中，持久化单元（代码清单 4-5）必须定义 JDBC 驱动、JDBC URL、用户名和密码以连接到\
  \ Derby 数据库，因为应用程序管理事务（`transaction-type =\"RESOURCE_LOCAL\"`）。在容器管理环境中，容器负责管理 EJB\
  \ 和事务，而非应用程序。因此，持久化单元的`transaction-type`（参见代码清单 8-14）被设置为`\"JTA\"`。另一个区别是，在代码清单\
  \ 4-5 中，我们必须手动指定要使用的 JPA 提供程序（EclipseLink）并列出提供程序需要管理的所有实体。在容器管理环境中，我们依赖默认的 JPA\
  \ 提供程序（即 EJB 容器自带的那个）。在部署时，容器会内省归档文件并找到所有需要管理的实体（无需在`persistence.xml`中显式使用`<class>`元素）。\n\
  \n***代码清单 8-14.***  使用`chapter08DS`数据源的持久化单元\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<persistence xmlns=\" http://xmlns.jcp.org/xml/ns/persistence \"\n            \
  \ xmlns:xsi=\" http://www.w3.org/2001/XMLSchema-instance \"\n             xsi:schemaLocation=\"\
  \ http://xmlns.jcp.org/xml/ns/persistence →\n             http://xmlns.jcp.org/xml/ns/persistence/persistence_2_1.xsd\
  \ \"\n             version=\"2.1\">\n\n<persistence-unit name=\" chapter08PU \"\
  \ transaction-type=\" JTA \">\n    <jta-data-source> java:global/jdbc/chapter08DS\
  \ </jta-data-source>\n    <properties>\n      <property name=\"eclipselink.target-database\"\
  \ value=\"DERBY\"/>\n      <property name=\"eclipselink.ddl-generation\" value=\"\
  drop-and-create-tables\"/>\n      <property name=\"eclipselink.logging.level\" value=\"\
  INFO\"/>\n    </properties>\n  </persistence-unit>\n</persistence>\n```\n\n在代码清单\
  \ 8-11 中，`BookEJB`被注入了一个与`chapter08PU`持久化单元关联的`EntityManager`引用。这个持久化单元（在代码清单 8-14\
  \ 中定义）需要定义要连接的数据源名称（`jdbc/chapter08DS`），而无需指定任何访问属性（URL、JDBC 驱动等）。\n\n编写 DatabasePopulator\
  \ 并定义数据源\n\n持久化单元所需的`jdbc/chapter08DS`数据源必须在 EJB 容器内创建。有多种方法可以实现。最简单的方法是在任何受管 Bean\
  \ 上使用`@DataSourceDefinition`注解（参见代码清单 8-15）。容器将部署该 Bean 并创建数据源。另一种方法是使用 GlassFish\
  \ 界面，你将在后面看到。\n\n***代码清单 8-15.***  在启动时部署数据源并初始化数据库的单例\n\n```\n@Singleton\n@Startup\n\
  @DataSourceDefinition (\n        className = \"org.apache.derby.jdbc.EmbeddedDataSource\"\
  ,\n        name = \" java:global/jdbc/chapter08DS \",\n        user = \"app\",\n\
          password = \"app\",\n        databaseName = \" chapter08DB \",\n        properties\
  \ = {\"connectionAttributes=;create=true\"}\n)\npublic class DatabasePopulator {\n\
  \n@Inject\n  private BookEJB bookEJB ;\n\nprivate Book h2g2;\n  private Book lord;\n\
  \n@PostConstruct\n  private void populateDB() {\n    h2g2 = new Book(\"Beginning\
  \ Java EE 7\", 35F, \"Great book\", \"1-8763-9125-7\", 605, true);\n    lord = new\
  \ Book(\"The Lord of the Rings\", 50.4f, \"SciFi \", \"1-84023-742-2\", 1216, true);\n\
  \nbookEJB.createBook (h2g2);\n    bookEJB.createBook(lord);\n  }\n\n@PreDestroy\n\
    private void clearDB() {\n    bookEJB.deleteBook (h2g2);\n    bookEJB.deleteBook(lord);\n\
    }\n}\n```\n\n`DatabasePopulator`单例（代码清单 8-15）用于在启动时初始化一些数据（`@Startup`）。在部署时，容器会初始化该单例，并执行`populateDB()`方法，因为它被`@PostConstruct`注解标记。该方法使用`BookEJB`在数据库中创建几本书。在关闭时，容器会调用`clearDB()`方法（被`@PostConstruct`注解标记）从数据库中删除这些书。\n\
  \n除了使用`@DataSourceDefinition`注解在部署时创建数据源外，你还可以使用 GlassFish 管理控制台或命令行来创建。命令行方法快速且易于重现。在输入以下命令之前，请确保\
  \ Derby 和 GlassFish 已启动并运行。\n\n![image](img/sq.jpg) **注意** `@DataSourceDefinition`定义了一个数据源，正如你将在第\
  \ 13 章（代码清单 13-18）中看到的，JMS 2.0 也使用相同的机制来定义资源（`ConnextionFactory`和`Destination`），这得益于`@JMSConnectionFactoryDefinition`和`@JMSDestinationDefinition`注解。\n\
  \n在创建数据源之前，你需要一个连接池。GlassFish 附带了一组已定义的池供你使用，或者你也可以使用以下命令创建自己的池：\n\n```\n$ asadmin\
  \ create-jdbc-connection-pool →\n  --datasourceclassname=org.apache.derby.jdbc.ClientDataSource\
  \ →\n  --restype=javax.sql.DataSource →\n  --property portNumber=1527:password=APP:user=APP:serverName=localhost:→\n\
    databaseName= chapter08DB :connectionAttributes=;create\\=true Chapter08Pool\n\
  ```\n\n\n\n该命令使用 Derby 数据源和一组用于连接数据库的属性创建了 `Chapter08Pool`：数据库名称（`chapter08DB`）、服务器（`localhost`）和监听端口（`1527`）、用于连接的用户（`APP`）和密码（`APP`）。如果现在对这个数据源执行\
  \ ping 操作，Derby 将自动创建数据库（因为你设置了 `connectionAttributes=;create\\=true`）。要 ping 该数据源，请使用以下命令：\n\
  \n```\n$ asadmin ping-connection-pool Chapter08Pool\n```\n\n成功执行此命令后，你应该能在硬盘上看到\
  \ Derby 存储数据的 `chapter08DB` 目录。数据库和连接池已创建，现在你需要声明 `jdbc/chapter08DS` 数据源并将其链接到新创建的连接池，操作如下：\n\
  \n```\n$ asadmin create-jdbc-resource --connectionpoolid Chapter08Pool jdbc/chapter08DS\n\
  ```\n\n要列出 GlassFish 托管的所有数据源，请输入以下命令：\n\n```\n$ asadmin list-jdbc-resources\n```\n\
  \n编写 BookEJBIT 集成测试\n\n在 EJB 的 1.x 和 2.x 版本中，对 `BookEJB` 进行集成测试并不容易；你必须使用特定应用服务器的特定功能，或者对代码进行一些调整。借助新的嵌入式容器，EJB\
  \ 变得像其他任何类一样可测试，因为它可以在普通的 Java SE 环境中运行。唯一需要做的是将特定的 jar 文件添加到你的类路径中，就像在 `pom.xml`\
  \ 文件（稍后在清单 8-17 中展示）中使用 `glassfish-embedded-all` 依赖项所做的那样。\n\n在第 4 章中，我解释了如何使用嵌入式数据库对实体进行集成测试，因此这里我不再赘述。要对\
  \ EJB 进行集成测试，你需要使用内存中的 Derby 数据库、一个不同的持久化单元以及内存中的 EJB 嵌入式容器。所有内容都是嵌入式的，并在同一个进程中运行，只需要一个\
  \ JUnit 测试类（见清单 8-16）。该测试初始化 `EJBContainer`（`EJBContainer.createEJBContainer()`），获取\
  \ JNDI 上下文，查找 EJB，并使用它来从内存数据库中检索、创建和删除一本书。得益于 try-with-resources 语句，嵌入式容器会在 try\
  \ 块结束时自动关闭。\n\n***清单 8-16.***  使用可嵌入容器对 BookEJB 进行集成测试\n\n```\npublic class BookEJBIT\
  \ {\n\n@Test\n  public void shouldCreateABook () throws Exception {\n\nMap<String,\
  \ Object> properties = new HashMap<>();\n    properties.put(EJBContainer.MODULES,\
  \ new File(\"target/classes\"));\n\ntry ( EJBContainer ec = EJBContainer.createEJBContainer(properties)\
  \ ) {\n      Context ctx = ec.getContext();\n\n// 检查 JNDI 依赖项（数据源和 EJB）\n      assertNotNull(ctx.lookup(\"\
  java:global/jdbc/chapter08DS\"));\n      assertNotNull( →\nctx.lookup(\"java:global/classes/BookEJB!org.agoncal.book.javaee7.chapter08.BookEJBRemote\"\
  ));\n      assertNotNull( →\n      ctx.lookup(\"java:global/classes/BookEJB!org.agoncal.book.javaee7.chapter08.BookEJB\"\
  ));\n\n// 查找 EJB\n      BookEJB bookEJB = (BookEJB) →\n       ctx.lookup(\"java:global/classes/BookEJB!org.agoncal.book.javaee7.chapter08.BookEJB\"\
  );\n\n// 查找所有书籍并确保有两本（由 DBPopulator 插入）\n      assertEquals(2, bookEJB.findBooks()\
  \ .size());\n\n// 创建一个书籍实例\n      Book book = new Book(\"H2G2\", 12.5F, \"Scifi\
  \ book\", \"1-24561-799-0\", 354, false);\n\n// 将书籍持久化到数据库\n      book = bookEJB.createBook(book)\
  \ ;\n      assertNotNull(\"ID should not be null\", book.getId());\n\n// 查找所有书籍并确保多了一本\n\
        assertEquals(3, bookEJB.findBooks() .size());\n\n// 删除创建的书籍\n      bookEJB.deleteBook(book);\n\
  \n// 查找所有书籍并确保少了一本\n      assertEquals(2, bookEJB.findBooks() .size());\n    }\n\
    }\n}\n```\n\n`shouldCreateABook()` 方法是一个集成测试，它检查书籍的总数（应该有两本，因为 `DatabasePopulator`\
  \ 已经用两本书初始化了数据库），创建一本新书，检查书籍总数是否增加了一本，删除它，然后检查书籍总数是否恢复到两本。为此，测试用例创建了一个 EJB 容器，获取\
  \ JNDI 上下文，并使用该上下文查找 `BookEJB`（以便随后检索和创建书籍）。\n\n使用 Maven 编译、测试和打包\n\n现在你可以使用 Maven\
  \ 来编译 `Book` 实体、`BookEJB`、`BookEJBRemote` 接口、`DatabasePopulator` 单例以及 CDI `DatabaseProducer`\
  \ 类。然后 Maven 将所有这些打包成一个 jar 文件，其中包含持久化单元（`persistence.xml`）以及 CDI `beans.xml` 文件。Maven\
  \ 使用清单 8-17 中的 `pom.xml` 文件来描述项目和外部依赖项。此示例需要 `glassfish-embedded-all` 依赖项，它包含了所有\
