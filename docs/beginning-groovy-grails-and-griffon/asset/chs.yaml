  \ 22-25 行展示了 `<g:each>`（一个迭代标签）的用法。\n\n在这个例子中，它遍历了应用中所有控制器类的集合，并以列表形式显示控制器类的名称。\
  \    第 4 行是一个按约定使用布局的例子。在这里，`layout` 元标签使得“main”布局（`main.gsp`）被应用到该页面。你可能还记得，所有布局都位于\
  \ `grails-app/views/layouts` 目录下。    你已经创建了布局，效果看起来不错。你可以在图 5-5 中看到你的工作成果。    搭建线框图让你接触到了布局、模板、CSS\
  \ 以及几个 Grails 标签。与所有现代 Web 框架一样，Grails 支持标签库。Grails 标签库类似于 JavaServer Pages 标准标签库（JSTL）和\
  \ Struts 标签。它包含了从条件逻辑到渲染和布局的各种标签。下一节将快速概述 Grails 标签。你可以在此处找到 Grails 标签的详细参考：`http://www.grails.org/GSP+Tag+Reference.`\
  \    Grails 标签    Grails 在视图层的优势之一在于其标签库。Grails 拥有从条件逻辑、集合迭代到错误显示等各种标签。本节概述了 Grails\
  \ 标签。    逻辑标签    逻辑标签允许你构建条件性的“if-elseif-else”逻辑。清单 5-5 演示了在 `topbar.gsp` 中使用 `<g:if>`\
  \ 和 `<else>` 标签。表 5-2 包含了逻辑标签的概述。    表 5-2. Grails 逻辑标签     | 标签名称 | 标签描述 | | ---\
  \ | --- | | `<g:if>` | 基于测试表达式的逻辑开关 | | `<g:else>` | `if` 语句的 `else` 部分 | | `<g:elseif>`\
  \ | `if` 语句的 `elseif` 部分 |    迭代标签    迭代标签用于遍历集合或循环执行直到条件为假。清单 5-10 中的 `index.gsp`\
  \ 使用了 `<g:each>` 标签。表 5-3 包含了迭代标签的概述。    表 5-3. Grails 迭代标签     | 标签名称 | 标签描述 |\
  \ | --- | --- | | `<g:while>` | 当测试条件为真时执行循环 | | `<g:each>` | 遍历一个集合 | | `<g:collect>`\
  \ | 遍历一个集合并根据 `expr` 参数中定义的方式转换结果 | | `<g:findAll>` | 遍历一个集合，筛选出与 `expr` 参数中定义的\
  \ GPath 匹配的元素 | | `<g:grep>` | 遍历一个集合，筛选出与 `expr` 参数中定义的过滤器匹配的元素 |    赋值标签    你使用赋值标签来创建变量并为其赋值。表\
  \ 5-4 包含了赋值标签的概述。    表 5-4. Grails 赋值标签     | 标签名称 | 标签描述 | | --- | --- | | `<def>`\
  \ (已弃用) | 定义一个在 GSP 页面内使用的变量；请改用 `<set>` | | `<set>` | 设置一个在 GSP 页面内使用的变量的值 |  \
  \  链接标签    链接标签用于创建 URL。`<g:link>` 标签在 `topbar.gsp`（如清单 5-5 所示）中使用过，而 `<g:createLinkTo>`\
  \ 在 `main.gsp`（如清单 5-9 所示）中作为表达式使用。表 5-5 包含了链接标签的概述。    表 5-5. Grails 链接标签     |\
  \ 标签名称 | 标签描述 | | --- | --- | | `<g:link>` | 使用提供的参数创建一个 HTML 链接 | | `<g:createLink>`\
  \ | 创建一个可在其他标签内使用的链接 | | `<g:createLinkTo>` | 创建一个指向目录或文件的链接 |    Ajax 标签    你可以使用\
  \ Ajax 标签来构建支持 Ajax 的应用。\n\n\n\n第 8 章使用了其中一些标签来增强用户界面。表 5-6 包含了 Ajax 标签的概述。    表\
  \ 5-6. Grails Ajax 标签     | 标签名称 | 标签描述 | | --- | --- | | `<g:remoteField>` | 创建一个文本字段，在内容更改时调用链接\
  \ | | `<g:remoteFunction>` | 创建一个远程函数，在 DOM 事件发生时被调用 | | `<g:remoteLink>` | 创建一个调用远程函数的链接\
  \ | | `<g:formRemote>` | 创建一个表单标签，执行 Ajax 调用以序列化表单元素 | | `<g:javascript>` | 包含 JavaScript\
  \ 库和脚本 | | `<g:submitToRemote>` | 创建一个按钮，执行 Ajax 调用以序列化表单元素 |    表单标签    表单标签用于创建\
  \ HTML 表单。表 5-7 包含了表单标签的概述。    表 5-7. Grails 表单标签     | 标签名称 | 标签描述 | | --- | ---\
