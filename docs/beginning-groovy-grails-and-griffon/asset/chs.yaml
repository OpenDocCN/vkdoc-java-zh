  \ 8 行修改为使用`<g:message>`标签。\n\n\n\n完成后，顶部栏模板应类似于清单 5-14 所示的内容。***清单 5-14.***  带消息的顶部栏模板\
  \    ``` <div id=\"menu\"> <nobr> <g:if test=\"${session.user}\"> <b>${session.user?.firstName}\
  \ ${session.user?.lastName}</b> | <g:link controller=\"logout\"><g:message code=\"\
  topbar.logout\" /></g:link> </g:if> <g:else> <g:link controller=\"login\" action=\"\
  auth\"> <g:message code=\"topbar.login\" /></g:link> </g:else> </nobr> </div> ```\
  \   现在只需将`topbar.logout`和`topbar.login`添加到消息资源包中：    ``` topbar.login=Login topbar.logout=Logout\
  \ ```   你可以轻松更改文本以显示任何内容，而无需修改 GSP。不过仍需谨慎。根据你修改与消息代码关联的文本的方式，如果 WebTest 正在查找特定文本，你可能需要调整它。在复杂的应用程序中，你需要对功能测试做出一些决策。你需要问自己：“功能测试应该针对单一语言环境还是多个语言环境运行？”如果决定使用多个语言环境，你将需要编写更健壮的功能测试，并特别注意`verifyText`的使用。\
  \   如果你是一位经验丰富的 Web 开发者，你会发现使用`<g:message>`标签也开启了应用程序国际化的道路，这并不令人意外。`<g:message>`标签是感知语言环境的；`i18n`目录的名称就暗示了这一点（而`messages.properties`文件就位于该目录中）。默认情况下，该标签使用浏览器的语言环境来确定使用哪个消息资源包。\
  \   现在你了解了消息资源包，就可以将发生错误时显示的默认消息更改为更友好的内容。   错误与验证   在本节中，你将学习错误与闪存消息之间的区别，以及如何自定义这些消息。\
  \   如果你尝试在不输入用户名的情况下提交用户表单，就能看到错误消息的实际效果。当你违反领域对象的约束时，看到的红色文本就是错误消息的一个示例。图 5-8 展示了一个示例。\
  \    ![9781430248064_Fig05-08.jpg](img/9781430248064_Fig05-08.jpg)    图 5-8 .  错误消息\
  \   此屏幕显示了默认的错误消息。正如你在清单 5-13 中看到的，你可以使用位于`grails-app/i18n`目录中的`messages.properties`文件来自定义消息。为了更好地理解其工作原理，你需要将视图和控制器从动态脚手架切换到静态脚手架。Grails\
  \ 在应用程序启动时动态生成脚手架。如果 Grails 能在运行时生成代码，那么它自然也能在开发时生成代码，以便你能看到它。在继续之前，请备份`UserController`的现有实现，以防丢失。\
  \   你可以通过执行以下命令为`User`领域对象创建视图：    ``` > grails generate-views User ```   该命令使用\
  \ Grails 模板在`grails-app/views/user`目录中生成四个新的 GSP 页面：`create.gsp`、`edit.gsp`、`list.gsp`和`show.gsp`。现在你需要为控制器创建静态脚手架。你可以通过执行以下命令为`User`领域对象创建控制器：\
  \    ``` > grails generate-controller User ```   Grails 会检测到你已经有一个控制器的实现，并询问是否允许覆盖它。允许覆盖；这就是你之前制作备份的原因。生成`UserController`后，将`login`、`handleLogin`和`logout`操作从备份复制到新生成的控制器中。清单\
  \ 5-15 包含了`save`操作的内容。    ***清单 5-15.***  UserController.save 操作    ``` 1.  def\
  \ save() { 2.      def user = new User() 3.      user.properties = params 4.      if(user.save())\
  \ { 5.          flash.message = \"User ${user.id} created.\" 6.          redirect(action:show,id:user.id)\
  \ 7.      } 8.      else { 9.          render(view:'create',model:[user:user]) 10.    \
  \ } 11\\. } ```   当用户从“新建用户”视图点击“创建”按钮时，会调用`save`操作。执行第 4 行时，Grails 在尝试将用户持久化到数据库之前会验证用户约束。如果验证成功，用户会被重定向到“显示用户”视图，并显示消息“User\
  \ ${user.id} created.”。如果保存失败，则会渲染“创建用户”视图，以便你纠正验证错误而不会丢失之前的输入。当验证失败时，Grails 会在`user`对象的元数据中插入一条错误消息，并将`user`对象作为模型对象传递给视图。当渲染“创建用户”视图时，它会检查是否存在错误，并在适当时显示它们。清单\
  \ 5-16 包含了一个展示如何显示错误的简短代码片段。    ***清单 5-16.***  显示错误    ``` <g:hasErrors bean=\"\
  ${user}\"> <div class=\"errors\"> <g:renderErrors bean=\"${user}\" as=\"list\" />\
  \ </div> </g:hasErrors> ```   如你所见，生成的 GSP 使用`<g:hasErrors>`和`<g:renderErrors>`标签来检测并显示错误。`<g:hasErrors>`标签使用`bean`属性来检测`user`对象中的错误。如果检测到错误，则会执行标签体，从而由`<g:renderErrors>`标签显示错误。`<g:renderErrors>`标签遍历`user`对象中的错误，并以列表形式显示它们。显示过程知道它接收到的是错误代码和错误属性。该标签在消息资源包中查找错误代码，并在显示之前将属性替换到消息中。\
  \   这种技术之所以有效，是因为页面是从控制器渲染的。再看一下清单 5-15 中的第 6 行。在重定向的情况下，控制器指示浏览器前往“显示用户”视图。浏览器通过调用`UserController`上的`show`操作来实现这一点。然后控制器执行`show`操作并渲染`show.gsp`。在控制器和浏览器之间如此来回交互的情况下，你能想象要确保所有消息信息保持完整以便`show.gsp`显示它们需要做些什么吗？嗯，这就是闪存消息发挥作用的地方。\
  \   闪存与闪存消息   什么是闪存作用域？为什么需要它？简而言之，它是 Grails 实现的一种技术，用于更轻松地在重定向之间传递对象。换句话说，它解决了上一节末尾描述的问题。表\
  \ 5-11 说明了 Grails 中与控制器关联的各种作用域。    表 5-11. 与控制器关联的作用域     | 作用域 | 描述 | | --- |\
  \ --- | | *flash* | 闪存仅允许在当前和下一次请求中存储对象。 | | `params` | 传入请求查询字符串或 POST 参数的可变映射。\
  \ | | `request` | 请求对象仅允许在当前请求中存储对象。 | | `servletcontext` | 此作用域允许在整个 Web 应用程序中共享状态。\
  \ | | `session` | 会话允许将状态与特定用户关联，通常使用 cookie 将会话与客户端关联。 |    flash 对象是一个 Map（哈希表），你可以用它来存储键值对。\n\
  \n\n\n这些值会被透明地存储在 session 中，然后在下一个请求结束时被清除。这种模式允许你使用 HTTP 重定向（这对于“提交后重定向”模式非常有用），并保留可以从\
  \ flash 对象中检索到的值。图 5-9 说明了在涉及重定向时，使用常规技术将信息从控制器传递到视图所遇到的问题。    ![9781430248064_Fig05-09.jpg](img/9781430248064_Fig05-09.jpg)\
  \    图 5-9 .  重定向问题    在重定向时，如果你试图使用请求来将消息携带到 Show 视图，当浏览器接收到重定向时，该消息会丢失。另一种选择是将消息放入\
  \ session 中，然后让 Show 视图从 session 中获取它。然而，在 Show 视图中，你必须记得在消息显示后将其从 session 中删除；否则，同一条消息可能会在多个视图上显示。这种方法的问题在于它依赖于你正确地执行操作，而且非常繁琐。\
  \    这正是 Grails 的用武之地：它采用了最后一种方案，并为你实现了它，使其成为 Grails 框架的一部分。这就是 flash 作用域。flash\
  \ 作用域的工作方式与其他作用域（application、session、request 和 page）类似，都是通过操作一个键/值对映射来实现的。它将信息存储在\
  \ session 中，然后在下一个请求时将其移除。现在，你无需再记得删除 flash 作用域中的对象。图 5-10 说明了 flash 作用域的概念。   \
  \ ![9781430248064_Fig05-10.jpg](img/9781430248064_Fig05-10.jpg)    图 5-10 .  Flash\
  \ 作用域    Show 视图可以访问 flash 作用域对象（在本例中是一条消息），并使用代码清单 5-17 中演示的标签和技术来显示它们。    ***代码清单\
  \ 5-17.***  访问并显示一条 Flash 消息    ``` <g:if test=\"${flash.message}\"> <div class=\"\
  message\">${flash.message}</div> </g:if> ```    Grails 并不是唯一实现这种技术的现代 Web 框架。Ruby\
  \ on Rails (RoR) 开发者应该对此感到熟悉。    从 flash 作用域访问消息看起来相当简单，但是如何将消息放入 flash 中呢？代码清单\
  \ 5-18 演示了 `UserController` 上的 `save` 操作如何将消息放入 flash 作用域。    ***代码清单 5-18.***  将消息放入\
  \ Flash 作用域    ``` ... if(user.save()) {     flash.message = \"User ${user.id} created.\"\
  \     redirect(action:show,id:user.id) } ... ```    Grails 使用一个映射来实现 flash 作用域。在这个例子中，`message`\
  \ 是键，`\"User ${user.id} created.\"` 是值。    如果你需要对代码进行国际化，或者希望在不编辑 GSP 的情况下更改消息，该怎么办？（目前，该消息本质上是硬编码的。）你可以像处理错误一样，将其设置为使用消息包。在本章前面，你使用了\
  \ `<g:message>` 标签从消息包中提取错误消息。你可以使用几个属性为 flash 消息做同样的事情。代码清单 5-19 演示了如何使用 `<g:message>`\
  \ 标签来显示 flash 消息。    ***代码清单 5-19.***  使用 <g:message> 标签显示 Flash 消息    ``` <g:message\
  \ code=\"${flash.message}\" args=\"${flash.args}\"     default=\"${flash.defaultMsg}\"\
  /> ```    代码清单 5-20 演示了对 `save` 操作的增强，以设置消息标签将使用的值。    ***代码清单 5-20.***  在 Flash\
  \ 作用域中设置值以供 <g:message> 标签使用    ```    ...         if(user.save()) {  flash.message\
  \ = \"user.saved.message\"  flash.args = [user.firstName, user.lastName]  flash.defaultMsg\
  \ = \"User Saved\"             redirect(action:show,id:user.id)         } ... ```\
  \    `flash.message` 属性是要在消息包中查找的消息代码，`flash.args` 是要替换到消息中的参数，而 `flash.defaultMsg`\
  \ 是在出现问题时显示的默认消息。    只剩下一件事要做：在消息包中创建一个条目，使用 `user.saved.message` 代码和你想要的任何文本。参见代码清单\
  \ 5-21 中的示例。    ***代码清单 5-21.***  Flash 消息代码示例    ``` user.saved.message=User: {0}\
  \ {1} was saved ```    结果应该类似于图 5-11 所示。    ![9781430248064_Fig05-11.jpg](img/9781430248064_Fig05-11.jpg)\
  \    图 5-11 .  使用 Flash 作用域    ![image](img/sq.jpg) **注意**  任何操作都可以调用或重定向到 Show\
  \ 视图。此时，你可能想知道如果没有设置 `flash.args` 和 `flash.defaultMsg` 会发生什么。`<g:message>` 标签非常智能；它会执行合乎逻辑的操作。它会显示\
  \ `flash.message` 的内容。要查看其实际效果，请更新一个现有用户并查看显示的消息。    既然你已经了解了 flash 作用域和消息，你就可以用最小的投入创建自定义和国际化应用程序消息。\
  \    你已经学到了很多关于 Grails 用户界面的知识，并建立了基本的观感。现在是时候开始实现一些逻辑和控制了。    使用操作拦截器创建审计日志   \
  \ 偶尔，应用程序会出现问题。当这种情况发生时，了解正在执行的操作的输入和结果是很有用的。这需要在操作执行之前显示操作的输入，并在控制权传递给流程中的下一步之前显示结果。你可以修改每个操作，在执行操作主体之前打印输入，然后在操作结束时再次打印。然而，这工作量太大且难以维护。\
  \    Grails 提供了一种称为*操作拦截器*的机制，你可以使用它来提供所需的功能。有经验的开发者会看到这类似于面向方面编程（AOP）。如果你不熟悉 AOP，你可能熟悉\
  \ Servlet 的 Servlet 过滤器拦截器，它们是类似的。好消息是 Grails 使这比两者中的任何一个都更容易。    ![image](img/sq.jpg) **注意**  Ruby\
  \ on Rails 开发者会认出这是一个 Rails 过滤器。    Grails 提供了*前置*和*后置*拦截器。你将使用两者来提供审计日志功能。你将使用前置拦截器来记录\
  \ `userName`、控制器、操作和输入参数。为此，将 `beforeInterceptor` 闭包添加到 `TodoController`。代码清单 5-22\
  \ 是一个 `beforeInterceptor` 的示例，供你添加到控制器中。    ***代码清单 5-22.***  beforeInterceptor\
  \    ``` def beforeInterceptor = {     log.trace(\"${session?.user?.userName} Start\
  \ action ${controllerName}         Controller.${actionName}() : parameters $params\"\
  ) } ```    如果定义了 `beforeInterceptor`，并且没有另外指示，它将在调用操作之前被调用。由于它是一个闭包，它可以完全访问所有控制器属性以及请求参数。它使用日志记录（参见“日志记录”侧边栏）来输出审计信息。注意它使用了\
  \ `?.` 安全解引用运算符。安全解引用运算符会在计算表达式的下一部分之前，检查当前表达式是否为 `null`。因此，如果 `session` 或 `user`\
  \ 是 `null`，则永远不会访问 `userName`。\n\n\n\n这能帮助你避免臭名昭著的 `NullPointerException`。`beforeInterceptor`\
  \ 允许你在调用操作之前执行逻辑，而 `afterInterceptor` 允许你在操作执行之后执行逻辑。清单 5-23 是一个 `afterInterceptor`\
  \ 的示例，你可以将其添加到控制器中。***清单 5-23.***  afterInterceptor    ``` def afterInterceptor\
  \ = { model ->    log.trace(\"${session?.user?.userName} End action    ${controllerName}Controller.${actionName}()\
  \ : returns $model\")  } ```   正如你所料，`afterInterceptor` 看起来与 `beforeInterceptor`\
  \ 类似。额外的一点是将模型对象传递给拦截器；这允许你将其输出到审计日志中。    ![image](img/sq.jpg) **警告**  这种审计日志的实现对于敏感数据来说是一个潜在的安全漏洞。如果参数或模型包含敏感数据，在记录任何审计信息之前，要格外小心地将其过滤掉。\
  \    `beforeInterceptor` 和 `afterInterceptor` 会为控制器中的每个操作调用。假设你不想为每个操作都调用审计日志。如果你不想为\
  \ `list` 操作收集审计日志信息，该怎么办？你可以在日志语句周围编写一个 `if` 语句。这样是可行的，而且效果不错。Grails 提供了一种额外的机制，称为*拦截器条件*，它允许有条件地应用拦截器。清单\
  \ 5-24 是一个使用条件将 `list` 操作排除在审计日志之外的 before 和 after 拦截器示例。    ***清单 5-24.***  带条件的\
  \ Before 和 After 拦截器    ``` def beforeInterceptor = [action:this.&beforeAudit,except:['list']]\
  \ def afterInterceptor = [action:{model ->this.&afterAudit(model)},   except:['list']]\
  \ def beforeAudit = {     log.trace(\"${session?.user?.userName} Start action         ${controllerName}Controller.${actionName}()\
  \ : parameters $params\") } def afterAudit = { model ->     log.trace(\"${session?.user?.userName}\
  \ End action         ${controllerName}Controller.${actionName}() : returns $model\"\
  ) } ```    ![image](img/sq.jpg) **注意**  Apress 出版的《Grails 2 权威指南》向你展示了如何使用操作拦截器构建一个简单的安全框架。\
  \    使用过滤器    过滤器与操作拦截器类似，它们都允许你在操作之前和之后执行逻辑。它们与操作拦截器的不同之处在于，它们更加灵活，并且可以在操作之外的情况下使用。例如，你可以定义一个适用于多个控制器的过滤器。过滤器可以应用于整个控制器组、一个\
  \ URI 空间或一个特定的操作。过滤器更容易插入和维护，并且对于各种横切关注点（如安全性、日志记录等）非常有用。    要创建过滤器，请在 `grails-app/conf`\
  \ 目录中创建一个以 `Filters` 约定结尾的类。在这个类中，定义一个名为 `filters` 的代码块，其中包含过滤器定义：    ``` class\
  \ SampleFilters {    def filters = {         // 在此处放置你的过滤器    } } ```   你在 `filters`\
  \ 块中定义的每个过滤器都有一个名称和作用域。名称是方法名，作用域使用命名参数定义。    让我们看看如何使用过滤器来简化 `UserController`。`UserController`\
  \ 的 `edit`、`delete` 和 `update` 操作都包含守卫逻辑，允许用户仅编辑自己的用户数据。这些操作包含类似于清单 5-25 的逻辑。  \
  \  ***清单 5-25.***  用户修改守卫    ``` . . .      if (session.user.id != params.id) {\
  \        flash.message = \"你只能编辑自己的信息\"        redirect(action:list)        return\
  \      } . . .\n\n```   虽然清单 5-35 中的逻辑并不复杂，但每个需要守卫的操作都会重复它。你可以使用过滤器将逻辑提取并集中到一个位置。这对于那些使用过\
  \ AOP 的人来说可能听起来很熟悉。基本思想是将逻辑提取到一个中心位置，然后配置何时应用该逻辑。    在 Grails 中，你将逻辑提取到一个以 `Filters.groovy`\
  \ 结尾的类中，并将其放置在 `grails-app/conf` 目录中。每个过滤器都包含在一个方法中，该方法接受参数来定义过滤器的范围以及何时应用它。清单 5-26\
  \ 展示了如何集中用户修改逻辑。    ***清单 5-26.***  过滤器作用域    ``` class UserFilters {     def filters\
  \ = {         userModificationCheck(controller: 'user', action: '*') {            \
  \ . . .         }         someOtherFilter(uri: '/user/*') { }     } } ```   `userModificationCheck`\
  \ 过滤器的作用域设置为应用于 `UserController` 的所有操作。另一种设置过滤器作用域的方法是使用 URL。你可以在 `someOtherFilter`\
  \ 过滤器上看到这个选项的示例。    接下来，你需要确定过滤器应该应用于操作的 `before`（之前）、`after`（之后）和/或 `afterView`（视图渲染之后）。在这种情况下，目标是确定使用系统的人是否被允许修改用户。这意味着守卫逻辑应该应用于\
  \ `edit`、`update` 和 `delete` 操作的 `before`（之前）。清单 5-27 说明了如何指定 before 条件。    ***清单\
  \ 5-27.***  before 过滤器    ``` class UserFilters {     def filters = {         userModificationCheck(controller:\
  \ 'user', action: '*') { before = {  . . .  }         }      } } ```   最后，你需要将守卫逻辑限制在\
  \ `edit`、`update` 和 `delete` 操作上。清单 5-28 展示了完整的 `userModificationFilter`。    ***清单\
  \ 5-28.***  用户修改过滤器    ``` 1.  class UserFilters { 2.      def filters = { 3.        \
  \ userModificationCheck(controller: 'user', action: '*') { 4.             before\
  \ = { 5.  defcurrActionName = actionName 6.  if (currActionName == 'edit' || 7.  currActionName\
  \ == 'update' || 8.  currActionName == 'delete') { 9.  String userId = session?.user?.id\
  \ 10\\. String paramsUserId = params?.id 11.     if (userId != paramsUserId) { 12\\\
  . flash.message = \"你只能修改自己的信息\" 13\\. redirect(action: 'list') 14\\. return false\
  \ 15\\. } 16\\. } 17.            } 18.        } 19.    } 20\\. } ```   让我们回顾一下这些新行。第\
  \ 5 行获取当前操作。请记住，你应该将过滤器应用于 `edit`、`update` 和 `delete` 操作，如第 6-8 行所示。    第 11 行判断尝试修改的人（即登录用户）是否正在修改自己的用户记录。如果不是，则创建一条适当的\
  \ flash 消息，并将用户重定向到 `UserController list` 操作。第 14 行返回 `false`，以告知 Grails 不应执行任何其他过滤器。\
  \    现在你已经有了 `userModificationCheck` 过滤器，可以从 `edit`、`update` 和 `delete` 操作中移除冗余的守卫代码了。\
  \    日志记录    虽然每个人都会时不时地使用 `println`，但更成熟的方法是使用日志记录。Grails 控制器预配置了一个 `log` 属性。每个控制器都会收到自己的\
  \ `org.apache.commons.logging.log` 实例。Apache Commons Logging 组件 (`http://commons.apache.org/logging`\
  \ `)` 是一个抽象层，允许你插入不同的日志记录包。Grails 预装了 log4j (`http://logging.apache.org/log4j`)。Apache\
  \ Commons Logging 抽象层提供了以下代码中看到的接口。    ``` public interface log {     void debug(java.lang.Object\
  \ message)     void debug(java.lang.\n\n\n\nObject message, java.lang.Throwable\
  \ t)     void error(java.lang.Object message)     void error(java.lang.Object message,\
  \ java.lang.Throwable t)     void fatal(java.lang.Object message     void fatal(java.lang.Object\
  \ message, java.lang.Throwable t     void info(java.lang.Object message)  void info(java.lang.Object\
  \ message, java.lang.Throwable t)  void trace(java.lang.Object message)     void\
  \ trace(java.lang.Object message, java.lang.Throwable t)  void warn(java.lang.Object\
  \ message)     void warn(java.lang.Object message, java.lang.Throwable t)     boolean\
  \ isDebugEnabled()     boolean isErrorEnabled()     boolean isFatalEnabled()     boolean\
  \ isInfoEnabled()     boolean isTraceEnabled()     boolean isWarnEnabled() } ```\
  \    消息具有严重级别。可能的严重级别（从最不严重到最严重）为：\n\n*   跟踪 *   调试 *   信息 *   警告 *   错误 *   致命\n\
  \nGrails 使用其通用配置机制来提供底层 log4j 日志系统的设置，因此您只需在文件 `grails-app/conf/Config.groovy` 中添加一个\
  \ log4j 设置即可。\n\n``` log4j = {     error  'org.codehaus.groovy.grails.web.servlet',  //  controllers\
  \            'org.codehaus.groovy.grails.web.pages' //  GSP    warn   'org.apache.catalina'\
  \ } ```\n\n这意味着，对于名称以 `org.codehaus.groovy.grails.web.servlet` 或 `org.codehaus.groovy.grails.web.pages`\
  \ 开头的日志记录器，仅会显示在错误级别及以上的消息。名称以 `org.apache.catalina` 开头的日志记录器仅显示在警告级别及以上的消息。\n\n\
  有关日志配置的更多信息，请参阅在线日志配置文档 `http://www.grails.org/Logging`。\n\n总结\n\n视图和控制器是广泛而深入的主题。我们通过构建\
  \ Collab-Todo 线框以及自定义视图和控制器，帮助您了解这些主题中一些更重要的方面。在构建 Collab-Todo 应用程序的过程中，您学习了如何使用布局、模板和\
  \ CSS 来构建线框。该线框由顶部栏、页眉、内容、侧边栏和页脚组件组成。构建线框也让您接触到了 Grails 的一些标签库。\n\n构建完线框后，您学习了如何构建一个临时登录功能，该功能允许您使用顶部栏的登录/注销功能。构建登录功能涉及在\
  \ `UserController` 上创建自定义视图和自定义操作。\n\n您还了解了错误、验证和闪存消息。这让您深入了解了 Grails 如何渲染错误和消息，以及如何控制它们。您还了解了重定向消息问题，以及如何使用闪存作用域消息解决该问题。\n\
  \n您学习了如何使用拦截器进行审计等操作。最后，您使用操作拦截器和日志记录创建了一个简单的审计日志。\n\n重要的是要记住，尽管我们涵盖了很多内容，但您还可以使用视图和控制器做更高级的事情。我们将在接下来的章节中介绍更多高级主题。您旅程的下一步是了解更多关于领域模型和服务的内容。\n\
  \n¹ `http://www.grails.org/GSP+Tag+−+if`\n\n² `http://www.grails.org/GSP+Tag+−+else`\n\
  \n³ `http://www.grails.org/Tag+−+link`\n\n第 6 章\n\n![image](img/frontdot.jpg)\n\n\
  构建领域和服务\n\n*亚瑟王。湖中仙女，她的手臂裹着最纯净的闪闪发光的银丝，从水中央高高举起王者之剑，象征着神圣的天意，我，亚瑟，将持有王者之剑。这就是为什么我是你们的国王。*\n\
  \n*丹尼斯*，打断道。听着，陌生女人躺在池塘里分发宝剑，这可不是政府体系的基础。最高行政权力源于群众的授权，而不是某种荒谬的水中仪式。\n\n*    正如亚瑟王和他的骑士们在《巨蟒与圣杯》中踏上寻找圣杯的征程一样，我们探索\
  \ Grails 的下一步是寻找它的核心与灵魂……或者用 Java 的术语来说，就是它的*领域*。\n\n您在第 4 章中首次接触到了领域，当时您学习了如何搭建应用程序的脚手架。在第\
  \ 5 章中，我们分解了其中一些控制器，以展示对领域的实际调用。然而，我们并没有深入探讨领域的功能。现在，我们将进行更深入的挖掘。\n\n我们将向您展示 Grails\
  \ 数据库持久化的全部功能，并解释所有可用的选项。此外，我们将讨论服务的概念——这对于任何企业开发人员来说都应该很熟悉。与控制器不同，服务不包含任何特定的 Web\
  \ 知识，例如会话和请求参数。\n\nGORM\n\n我们已经向您展示了如何与数据库交互，但到目前为止，这个过程还有些模糊。在本章中，我们将详细介绍 GORM\
  \ 的工作原理。大多数框架，尤其是那些开箱即用的框架，都有自己持久化到数据库的机制。Ruby on Rails 使用 ActiveRecord 作为持久化机制。Java\
  \ EE 框架使用 JPA（如果您使用 JBoss 应用服务器，它底层其实就是 Hibernate）。WebSphere 使用 iBATIS。\n\nGrails\
  \ 使用 GORM。然而，GORM 并非其独创；与 JBoss 一样，它使用 Hibernate 进行持久化实现。GORM 只是将 Hibernate 包装在\
  \ Groovy 层中。这是一件好事，因为 Hibernate 为 GORM 提供了所有必要的管道代码，使 GORM 能够专注于可用性。事实上，如果您熟悉 ActiveRecord\
  \ 和 Hibernate，那么在 Grails 中编写领域对象时，您应该已经掌握了大约 95% 的知识。GORM 确实是 ActiveRecord 和 Hibernate\
  \ 的融合体，为您提供了两全其美的体验。随着我们继续使用 GORM 的示例，相似之处和不同之处将变得更加明显。GORM 是一个广泛的主题，需要一本专门的书籍来介绍；我们建议您参考编写良好的文档（`http://grails.org/doc/latest/guide/GORM.html`）以及本章内容。\n\
  \nCollab-Todo 的领域\n\n在深入探讨如何在 Groovy 中创建领域之前，让我们先解释一下您将要创建的内容。在第 4 章中，我们为您提供了领域结构的基础，包括\
  \ `Todo`、`Category` 和 `User` 类。然而，如果我们只保留这三个领域对象，这个应用程序就不会那么有趣了。我们决定等到现在才向您展示整个领域，主要有两个原因：\n\
  \n*   我们不想在您刚开始学习系统时就让您被领域内容淹没。\n*   没有更多背景知识，您可能不完全熟悉领域的创建方式。\n\n然而，现在是时候向您介绍整个领域了。我们将首先介绍\
  \ Java 类领域的外观。然后，我们将解释创建和配置领域组件的选项。最后，我们将向您展示您将使用领域配置创建的数据库。\n\n图 6-1 显示了一个填充了连接器和列的类级别图。这应该能让您对将要构建的应用程序有一个概览，并解释各个部分的含义。同时，请查看源代码，以了解如何从图\
  \ 6-1 中的图表过渡到您将在本书中使用的实际代码。（您可以在 Apress 网站 [`www.apress.com`] 的源代码/下载区域找到本章的代码示例。）请注意，此图包含两个领域，我们将在下一章中将其用作安全机制的一部分。\n\
  \n![9781430248064_Fig06-01.jpg](img/9781430248064_Fig06-01.jpg)\n\n图 6-1 .\n\n\n\
  \n领域的类级别图    ![image](img/sq.jpg) **注意**  我们使用领域模型来映射数据库，而不是使用数据库来映射领域模型。这已成为相当标准的做法，当然您也可以选择反向操作。\
  \    其中一些表格您应该会感到熟悉。表 6-1 列出了每个领域对象及其用途的简要说明。    表 6-1. Collab-Todo 应用程序使用的领域类 \
  \    | 领域名称 | 描述 | | --- | --- | | `Address` | 一个内部领域对象，存储在 `User.groovy` 文件中，因为您会将其用作嵌入式类。\
  \ | | `Admin` | 扩展 `User` 类。用于管理员，跟踪他们所属的部门。不过，*不会*在权限管理中使用此类。 | | `BuddyList` |\
  \ 定义每个用户的好友列表。 | | `BuddyListMember` | 用户希望加入好友列表的每个人必须在此类中引用。此类的另一个用途是分配昵称。 | |\
  \ `Category` | 创建特定名称来对待办事项进行分类。 | | `Keyword` | 创建关键词来区分各个待办事项。 | | `Todo` | 所有待办事项的容器。这是应用程序的主要对象。\
  \ | | `User` | 存储创建待办事项的用户信息。 |    在本章中，我们将为领域模型添加各种关系和约束。让我们从如何实际创建领域对象开始。    创建领域对象\
  \    由于我们讨论的是如何创建用于生成数据库的领域对象，最好先从小处着手，先检查一个表格。在前两章中，我们展示了如何启动领域集合并向其中添加内容。现在，我们将深入探讨所有选项以及领域创建的具体细节。幸运的是，即使您从未使用过\
  \ Hibernate 或 Java 数据对象（JDO），学习使用 GORM 也会很容易。首先，它很直观。例如，使用普通的 JDO，您必须记住*多对一*、*一对一*等含义。而使用\
  \ GORM，关系更容易定义。关系以 DSL 语法定义，因此领域 A *属于*领域 B，或者领域 A *拥有多个*与之关联的领域 B。GORM 是使用 DSL\
  \ 构建的，因此您用于创建领域的术语听起来就像日常用语。    在继续之前，我们先退后几步。我们将从基本的领域创建开始，并探究其底层机制。然后，我们将进入领域的高级设置，包括如何创建复杂对象类型以及如何覆盖领域的存储方式。到本节结束时，您应该能够创建和定制几乎任何所需的领域对象。\
  \    基本领域创建    图 6-1 展示了您将使用的领域模型，在前几章中，您已经看到了几个领域对象的实现。然而，我们尚未详细说明如何创建自己的领域对象、创建时的选项，甚至它如何影响底层数据库。现在是时候扩展您的知识了。我们将详细阐述两组概念：\
  \    *   创建具有约束和关系的功能完整的领域模型 *   理解这些领域对象如何创建数据库并与之交互    首先，让我们重新创建 `Todo` 领域对象。我们这样做不是为了浪费您的时间，也不是因为我们按页计酬（事实并非如此）。我们这样做是因为您应该了解，在创建为\
  \ Collab-Todo 应用程序定义的表格时，数据库会发生什么。虽然 GORM 工具让您无需直接使用 SQL 命令创建数据库表格，这固然很好，但您仍然需要掌握幕后发生的事情。\n\
  \n如果您曾在 EJB3 或 Hibernate 中创建过领域对象，那么以下内容会显得很熟悉。让我们回顾一下 `Todo` 领域，看看它如何与数据库交互。清单\
  \ 6-1 包含了该领域的一个部分清单；我们只展示领域属性。    ***清单 6-1.***  重新审视 Todo 领域    ``` class Todo\
  \ {      static belongsTo = [User, Category]      User owner     Category category\
  \     String name     String note     Date createdDate     Date dueDate     Date\
  \ completedDate     String priority     String status      ... } ```    您可能会想：“GORM\
  \ 在将领域存储到数据库时做了什么？” 实际上，这相当简单。图 6-2 展示了来自 MySQL 数据库的表格快照。请注意，它正是第 4 章中图 4-17 所见的\
  \ `todo` 表的实现。    ![9781430248064_Fig06-02.jpg](img/9781430248064_Fig06-02.jpg)\
  \    图 6-2 .  todo 表    如果您将此表与领域进行比较，会发现一些差异。让我们将其分解为几个方面。    新列    您可能首先注意到的是自动生成的主键\
  \ ID 和版本号。ID 始终用作主键的引用；您可以随时从领域对象中访问它。ID 将特定的分离领域对象与持久化对象关联起来。Hibernate 还使用 `version`\
  \ 字段来保证事务完整性并支持乐观锁。这很像 Rails 中的 ActiveRecord，它会自动为您创建主键和版本号；不幸的是，缺点是无法手动覆盖主键。  \
  \  ![image](img/sq.jpg) **注意**  默认设置主键可能看起来像是一个缺点，但在实践中，使用单一唯一 ID 主键与 Hibernate\
  \ 配合，可以在与数据库交互时获得最佳性能。我们将在本章的“更改主键”部分展示如何使用映射来更改主键。    命名    接下来，请注意表名和列名是如何分配的。之前使用驼峰式命名的名称现在已转换为蛇形命名（小写并用下划线分隔）。\
  \    外键    在大多数数据库中，`User` 表和 `Category` 表之间会创建外键或外键索引。GORM 通过获取包含 `belongsTo` 保留字的类（在本例中，`Category`\
  \ 类包含 `belongsTo = User`），并将 `user_id` 列保存到数据库的 category 表中来设置外键。`user_id` 列是 `belongsTo`\
  \ 表名与 `_id` 的拼接。    数据类型    大多数情况下，数据类型源自您在领域本身中设置的类型。因此，`String` 变为 `VARCHAR`，`Date`\
  \ 变为 `DATETIME`，依此类推。当然，具体类型取决于您实际使用的数据库以及应用于属性的约束。    设置默认值    许多应用程序在用户未选择默认值时，会使用一个默认值存储在数据库中。在\
  \ GORM 中设置默认值很容易；只需像设置普通领域对象一样设置该值即可。通常，状态会有一个起始值。在 Collab-Todo 应用程序中，您的值一开始不会是\
  \ `\"Completed\"`，因此将状态设置为 `Started`。如果用户希望在创建时更改此值，也可以。清单 6-2 展示了更新后的更改。    ***清单\
  \ 6-2.\n\n\n\n***  具有默认状态值的待办事项    ``` class Todo {      static belongsTo = [User,\
  \ Category]      User owner     Category category     String name     String note\
  \     Date createdDate     Date dueDate     Date completedDate     String priority\
  \     String status = \"Started\"      ... } ```   大对象类型    在讨论关系之前，我们先来谈谈大对象类型的处理方式。大对象通常是指持久化到数据库的二进制大对象（`BLOB`）和字符大对象（`CLOB`）。虽然我们以将对象存储到数据库为例，并将在第\
  \ 8 章（关于文件下载和上传）中用它来突出某些特性，但我们并不建议使用数据库来存储文件。文件可能*非常*大，除非你需要对这些文件进行版本控制，否则将数据库用作存储空间是不明智的。相反，应该使用文件系统来保存文件。请记住，文件系统的目的就是存储文件。\n\
  \n当然，将文件存储在数据库中也有合理的理由，因此如果你想存储`BLOB`，只需将数据类型设置为`byte[]`。请注意，我们在`Todo`中添加了一个名为`associatedFile`的项。当你在\
  \ MySQL 中更新数据库时，你会注意到创建的对象类型是`TINYBLOB`。此外，在使用 MySQL 时，在约束条件中设置`maxSize`会在数据库中生成一个`longtext`列。\n\
  \n创建关系    除非你构建的领域结构只包含少数几个类，否则你必然会与其他类建立关系。例如，`Todo`对象属于一个`Category`和一个`User`。反过来，一个`User`可以拥有多个`Todo`。我们将讨论以下四种关系类型：\n\
  \n*   一对一\n*   一对多\n*   多对一\n*   多对多\n\n在 Grails 中编写关系相对容易。事实上，其语法和用法与 Ruby on Rails\
  \ 的 ActiveRecord 几乎相同。既然知道 GORM 基于 Hibernate，你可能会认为其语法和用法更像 Hibernate 或 JPA，但事实并非如此。使用标准的\
  \ JPA，你可以仅通过 Bean 一侧的注解来创建关系。然而，这些注解可能会变得过于复杂。例如，清单 6-3 中展示了 JPA 中的多对多关系。\n\n***清单\
  \ 6-3.***  JPA 中多对多关系的示例    ``` @ManyToMany @JoinTable(name=\"COURSE_TO_STUDENT_TBL\"\
  ,     joinColumns=@JoinColumn(name=\"courseId\"),     inverseJoinColumns=@JoinColumn(name=\"\
  studentId\")) private Collection<Student> students; ```    请注意，每种关系类型都有不同的注解。实际上，JPA\
  \ 更多地是从数据库层面进行配置，而 GORM 则更多地是从语言层面进行编程。首先，我们将回顾涉及的关键元素，然后向你展示如何创建这些关系。\n\n涉及的关键元素\
  \    正如你在第 4 章中所看到的，创建关系非常容易。不过，我们将为需要复习的人提供一个示例。你只需要修改类中的两段代码。你将使用以下两个关键字：\n\n\
  *   `hasMany`\n*   `belongsTo`\n\n下一节将展示这些关键字的实际应用示例。\n\n一对一    当表 A 中的一条记录恰好引用表\
  \ B 中的一条记录，反之亦然时，就存在一对一关系。例如，`User`表包含对`Address`表的引用。一个特定地址对应唯一一个用户。清单 6-4 展示了每个表的示例。\n\
  \n***清单 6-4.***  一对一关系示例    ``` class User {     ...     Address address } class\
  \ Address {     User user } ```    ![image](img/sq.\n\njpg) **注意**  本书的代码中`Address`没有包含对`User`的引用，因为我们将把`Address`视为一个嵌入式类。这仅仅是实现方式之一。实际上，在我们的代码库中并没有纯粹的一对一关系。\n\
  \n一对多    当表 A 中的一条记录可以引用表 B 中的多条记录，但表 B 中的这些记录*只能*引用表 A 中的一条记录时，就存在一对多关系。我们的应用程序包含许多一对多关系的例子，其中之一就是用户与好友列表之间的关系。一个用户可以有多个好友列表，但一个好友列表只能被一个用户引用。清单\
  \ 6-5 展示了代码中的这个示例。\n\n***清单 6-5.***  一对多关系示例    ``` class User {     ...     static\
  \ hasMany = [buddyLists: BuddyList] } class BuddyList {     static belongsTo = User\
  \ } ```    `hasMany`放在消费方领域类上，表明该领域类“拥有多个”此领域类。`belongsTo`关键字则位于对象的另一侧——在本例中是`BuddyList`。`belongsTo`关键字指的是属性所引用的内容。\n\
  \n让我们看看`BuddyList`领域类中的另一个示例，它拥有多个`BuddyListMember`，如清单 6-6 所示。\n\n***清单 6-6.***  在\
  \ BuddyListMember 上定义 hasMany    ``` class BuddyList {     static hasMany = [members:\
  \ BuddyListMember]     ... } ```    这里，`members`引用了变量名，你将使用该变量名从`BuddyList`对象中检索`BuddyListMember`。这只是关系的一侧。另一侧实际上更为重要，它将数据库中的约束条件联系在一起。\n\
  \n清单 6-7 展示了如何在`BuddyList`对象上定义`belongsTo`。\n\n***清单 6-7.***  在 BuddyListMember\
  \ 上定义 belongsTo    ``` class BuddyListMember {     static belongsTo = BuddyList\
  \ } ```    将这个静态引用放在`belongsTo`上，会告诉`BuddyListMember`类在创建数据库时，在`BuddyListMember`的表中添加一个对`BuddyList`的引用。\n\
  \n管理关系    添加关系非常容易，并且利用了 Groovy 的动态语法。清单 6-8 展示了如何向`BuddyList`添加成员以及从中移除成员。\n\n\
  ***清单 6-8.***  向 BuddyListMember 添加 BuddyList 以及从中移除 BuddyList    ``` BuddyList\
  \ myList myList.addToMembers(someMember) myList.removeFromMembers(someMember) ```\
  \    多对一    你可能已经猜到，多对一关系是一对多关系的逆关系。清单 6-5 从好友列表的角度展示了一个多对一关系。这就是我们所说的 GORM 比 JPA\
  \ 更直观的一个例子。JPA 会包含一个`@ManyToOne`注解。\n\n多对多    多对多关系进一步展示了 GORM 和 JPA 实现关系的方式之间的区别。多对多关系看起来与\
  \ JPA 中的多对多关系大不相同，并且可读性更强。可读性是使用 Groovy 和 Ruby 等动态语言的一个好处。\n\n在多对多关系中，表 A 中的一条记录可以引用表\
  \ B 中的多条记录。反之，表 B 中的一条记录也可以引用表 A 中的多条记录。要设置这种关系，使用之前用过的相同关键字即可，因此无需学习新内容。两个记录都包含`hasMany`，因为它们都引用对方表中的多条记录。此外，至少*一个*类需要`belongsTo`来创建关系（哪个类都可以）。[清单\
  \ 6-9](#9781430248064_Ch06.\n\n\n\nxhtml#list9) 展示了在 `Todo` 和 `Keyword` 领域之间实现多对多关系的示例。\
  \    ***清单 6-9.***  多对多关系示例    ``` class Todo {     static hasMany = [keywords:\
  \ Keyword] } class Keyword {     static belongsTo = Todo     static hasMany = [todos:\
  \ Todo] } ```    在这里，你可以像在清单 6-8 中那样添加和删除关键字。\n\n覆盖默认设置\n\n既然我们已经建立了领域创建的基本规则，你应该能够完成创建领域对象所需的一切。还有一些我们尚未涉及的内容，例如约束，但我们将等到“验证”部分再讨论。在这里，我们将介绍一些领域项的“高级”设置。首先，我们将向你展示如何为特定的名称和值微调你的表、列和索引。你可以在\
  \ Hibernate 配置文件中配置这些项，但我们将向你展示如何在 DSL 中配置它们。此外，我们还将向你展示如何向领域添加不持久化的属性，并解释如何在插入、更新和删除表时触发事件。\n\
  \n调整映射\n\nGORM 允许你以 DSL 的方式调整数据库本身的表和列名称，而无需像 Hibernate 那样需要额外的配置文件。为了演示，我们将自定义\
  \ `Todo` 领域。最后，你将看到这些更改反映在领域中。\n\n要进行这些调整，你需要向领域对象添加一个静态映射闭包。额外的代码只是添加到这些静态映射中。查看清单\
  \ 6-10 中对 `Todo` 的调整。\n\n***清单 6-10.***  定义了映射闭包的 Todo\n\n``` class Todo {     ...\
  \     static mapping = {         // 在此处插入映射     } } ```\n\n现在你可以开始向静态映射中添加内容，逐步扩展映射以实现更多功能。\n\
  \n表和列命名\n\n首先，更改表名和列名；这些是企业环境中的常见更改。要将持久化的表名从 `todo` 更改为 `todo_tbl`，请在映射中添加以下行：\n\
  \n``` table 'todo_tbl' ```\n\n这简单地告诉 GORM `table` 的名称为 `todo_tbl`。\n\n这很简单。现在，让我们更新列名。因为一个表可以有多个列，所以列名在映射中分组在一个子块下。将\
  \ `name` 和 `note` 的名称更改为 `name_str` 和 `note_str`。这种命名约定对于 DBA 来说比较常见，他们喜欢通过瞥一眼列名就能知道列类型。为此，请将以下代码添加到映射中：\n\
  \n``` columns {             name column:'name_str'             note column:'note_str'\
  \         } ```\n\nGORM 将其解读为：“对于 `columns`，`name` 属性引用了 `column name_str`。”\n\n\
  更改主键\n\n早期版本的 Grails 没有提供更改主键的简便方法。更糟糕的是，你无法更改生成方法。虽然这可能不会影响较小的公司，但很可能会影响大型公司，其中许多公司要求\
  \ DBA 使用存储过程或其他技术来生成主键。首先，我们将介绍如何更改生成器，然后讨论如何更改主键本身。\n\n默认情况下，生成器使用数据库的原生实现。这可能是标识列或序列，具体取决于数据库。但是，假设你想将其更改为使用高低位方法来生成数字。你需要在映射中添加以下条目：\n\
  \n``` id generator:'hilo', params:[table:'hi_value',column:'next_value',max_lo:100]\
  \ ```\n\n此条目首先通过引用 `id` 属性来标识自身，`id` 是领域上的默认属性。\n\n接下来，`generator` 定义了要使用的生成器，`params`\
  \ 定义了要传递给生成器的参数。对于高低位计算，生成器需要一个表名、表中的一列以及一个最大低位值。请记住，这完全基于 Hibernate 对每个生成器所期望的参数。\n\
  \n创建主键的另一种常见方法是使用复合键，它包含多个属性。在示例中，这可以是名称和到期日期的组合、名称和用户 ID 的组合等等。在我们解释如何将主键更改为复合键之前，我们建议除非必要，否则不要这样做。许多人会认为这只是糟糕的设计；然而，更重要的不将其从单个\
  \ ID 更改的原因是，Hibernate 在使用由一列生成的主键时性能*最佳*。\n\n话虽如此，让我们看看如何操作。假设你想要主键是名称加上到期日期，因为你不能有相同名称的项目在同一日期到期。定义它就像在映射中添加一个复合\
  \ ID 条目一样简单：\n\n``` id composite:[create 'name','dueDate'] ```\n\n![image](img/sq.jpg) **注意**  你不能使用生成的\
  \ ID 定义复合 ID。此外，因为你不能在一个表上使用两种不同的主键技术，所以我们在本章的源代码中只使用了生成的 ID。\n\n禁用版本控制\n\n默认情况下，GORM\
  \ 配置为启用乐观锁，并使用版本控制来帮助维护数据库中的版本号。拥有版本是 Hibernate 的一种方式，用于确保在更新记录时，其他人不会在背后更新它。每当你更新表中的记录时，版本号就会递增。在实际保存发生之前，Hibernate\
  \ 会将要保存的记录的版本与数据库中的记录进行比对。如果它们不同，Hibernate 将不允许保存。\n\n虽然这听起来很棒，但可能有正当理由让你不想使用版本控制。在某些应用程序中，两条记录同时被两个人更新可能无关紧要。要关闭版本控制，只需在映射中输入以下命令：\n\
  \n``` static mapping = {      version false } ```\n\n这将从你的表中删除 `version` 列，并且 Hibernate\
  \ 将不再执行任何版本检查。\n\n更改即时加载和锁定\n\n当你从数据库中检索嵌入的领域时，GORM 会告诉 Hibernate 延迟加载它们。但是，如果你想即时加载它们，则必须为该列禁用延迟加载。\n\
  \n`Todo` 对象没有很好的示例，因此我们将使用 `User` 对象，它有一个嵌入的 `address` 属性。在清单 6-11 中，你可以看到一个即时加载嵌入的\
  \ `address` 领域的 `Todo` 示例。\n\n***清单 6-11.***  即时加载嵌入地址的 Todo\n\n``` class User {\
  \     static mapping = {         columns {             address lazy:false         }\
  \     } } ```\n\n创建数据库索引\n\n你也可以从 GORM 领域层调整数据库索引。DBA 可以在数据库中手动创建这些索引，但许多人（尤其是那些没有全职数据库架构师的人）发现通过应用程序框架调整它们更容易。这确保了如果你使用数据库的自动更新功能，索引也会得到更新。\n\
  \n在示例中，你将定义 `name` 和 `createDate` 索引。将第一个索引命名为 `Name_Idx`，将 `createDate` 索引命名为 `Name_Create_Date_Idx`。清单\
  \ 6-12 向你展示了如何在 `columns` 部分定义索引。\n\n***清单 6-12.***\n\n\n***  为 Todo 领域定义索引    ```\
  \ class Todo { static mapping = {         columns {             name index:'Name_Idx,\
  \ Name_Create_Date_Idx'             createDate index:'Name_Create_Date_Idx'         }\
  \     } } ```    类继承    领域图中通常会出现类继承，但这一概念在数据库设计中并不总是常见。幸运的是，使用 GORM，继承类就像扩展一个类一样简单。在数据模型中，`Admin`\
  \ 类继承了 `User` 类。清单 6-13 展示了 `Admin` 类。    ***清单 6-13.***  继承 User 类的 Admin 类   \
  \ ``` class Admin extends User {     String department } ```    实现继承有两种不同的策略，称为“每个层次结构一张表”或“每个子类一张表”。使用每个层次结构一张表的映射，父类和所有子类共享一张表，而每个子类一张表则为每个子类使用不同的表。\
  \    默认情况下，GORM 类使用每个层次结构一张表的继承映射。    ``` static mapping = {     tablePerHierarchy\
  \ true } ```    这种方式的缺点是，列在数据库级别不能应用 `NOT`-`NULL` 约束，但你必须对所有子类的列强制非空约束，因为它们共享同一张表。\
  \    每个子类一张表可能被视为更好的策略，因为每个子类都在自己的表中。    ``` static mapping = {     tablePerHierarchy\
  \ false           // 每个子类一张表 } ```    每个子类一张表的主要缺点是，在过深的继承层次中，用于从给定子类的所有父类获取结果的\
  \ `JOIN` 查询可能会导致性能问题。    开启缓存    Hibernate 的一大优势是其使用二级缓存的能力，该缓存将与领域类关联的数据存储到 Hibernate\
  \ 缓存中。这样做的好处是，如果你检索数据，它会从缓存中获取，而不是调用数据库。这是一种用于检索经常访问且很少更改的数据的绝佳机制。要配置二级缓存，你需要遵循几个步骤。首先，更新\
  \ `DataSource.groovy` 文件，然后更新相关的领域对象。    在数据源中配置缓存很简单。将清单 6-14 中的代码添加到你的 `DataSource.groovy`\
  \ 文件中。    ***清单 6-14.***  初始化 Hibernate 二级缓存的条目    ``` hibernate {     cache.use_second_level_cache=true\
  \     cache.use_query_cache=true     cache.provider_class='org.hibernate.cache.EhCacheProvider'\
  \ } ```    这告诉 Hibernate 你想要使用二级缓存，并且你将使用的提供者是 `EhCacheProvider`。如果你愿意，可以将这一行替换为其他提供者；这恰好是事实上的\
  \ Hibernate 缓存。    接下来，为你想要关联缓存的各个领域对象初始化缓存。通过在映射约束中插入缓存条目来为 `Todo` 初始化缓存。将以下行添加到你的映射中：\
  \    ``` static mapping = {     ...     cache true } ```    当使用 `true` 时，它表示该对象应存储在缓存中，并且会配置一个包含惰性和非惰性属性的“读写”缓存。但是，你可以进一步将缓存设置调整为\
  \ `read-only`、`transactional` 或 `non-lazy`。为此，你可以使用与之前类似的条目，但需要更具体：    ``` cache\
  \ usage:'read-only', include:'non-lazy'  // 或 cache usage: 'transactional' ``` \
  \   除了在类级别配置缓存，你还可以在领域级别为嵌入式类配置缓存。    配置方式与你之前所做的几乎相同，只是需要指定将被缓存的列，如清单 6-15 所示。\
  \    ***清单 6-15.***  为 User 上的 Address 配置缓存    ``` class User {     static mapping\
  \ = {                 address cache:true     } ```    瞬态属性    在 JPA 和 GORM 中，领域（或实体）对象上的所有属性默认都会持久化到数据库。当你希望领域对象上的属性是其他属性的组合，或者根本不需要持久化时，这可能是不利的。幸运的是，在\
  \ GORM 中，你可以轻松地将属性标记为不持久化。    在 GORM 和 JPA 中，你不想持久化的属性被称为*瞬态属性*。在 JPA 中，你使用 `@Transient`\
  \ 注解标记每个属性。在 GORM 中，你为所有这些属性创建一个瞬态映射。    以 `User` 表为例。在 `User` 内部，你想要有一个 `confirmPassword`\
  \ 属性，以便确保用户输入了正确的密码。显然，你不需要将密码持久化两次，因此将其标记为瞬态。在清单 6-16 中，你可以看到你将 `confirmPassword`\
  \ 添加到了 `transients` 映射中。    ***清单 6-16.***  包含瞬态属性 confirmPassword 的 User 对象   \
  \ ``` class User {     static transients = [ \"confirmPassword\" ]      String firstName\
  \     String lastName     String userName     String password     String email     String\
  \ confirmPassword } ```    如你所见，你仍然将 `confirmPassword` 添加到普通的领域类中，但同时将其添加到一个名为 `transients`\
  \ 的字符串列表中，从而将其标记为瞬态。    GORM 事件    在普通的领域和 DAO 架构中，通常会有基础的 save/update/delete 方法。然而，如果你曾想为某个特定领域添加一个通用概念，例如更新时间戳或写入日志，你可以重写该方法，添加自己的自定义需求，然后调用父类方法。但是，GORM\
  \ 和一些其他更现代的框架消除了对 DAO 类的需求，并允许你直接访问领域类。然而，这可能会带来一个问题，因为现在各个开发者需要负责更新那些在更新时始终需要运行的字段（例如最后修改日期），以及写入日志文件。这很糟糕，可能导致灾难。\
  \    幸运的是，GORM 对此问题有解决方案。它允许你在领域级别定义这些类型的转换。`Todo` 拥有 `lastModifiedDate` 和 `createDate`。在\
  \ GORM 中，你可以向领域类添加两个方法，它们会在插入数据库之前和更新数据库之前自动调用。显然，`beforeInsert` 方法在插入之前调用，`beforeUpdate`\
  \ 在更新之前调用。清单 6-17 展示了你需要添加到 `Todo` 中的代码，以便在插入和创建时修改日期。    ***清单 6-17.***  为 Todo\
  \ 添加自动事件的代码    ``` def beforeInsert = {    createDate =newDate()     lastModifiedDate\
  \ = new Date() } def beforeUpdate = {    lastModifiedDate =newDate() } ```    现在，无论从何处调用\
  \ save 或 update，这两个方法都会被调用。此外，在删除之前会调用 `beforeDelete` 事件。    你是否察觉到了某种模式？拥有创建和修改日期是一个相当标准的模式。为了在多个类上实现相同的功能，你必须在每个领域类中添加那七行代码以及定义领域的两行代码。\
  \    幸运的是，你可能已经猜到，GORM 有解决这个问题的方法。\n\n\n\n如果你拥有名为 `lastUpdated` 和 `dateCreated`\
  \ 的属性，可以通过在映射中添加以下行来配置 GORM 自动更新它们：    ``` static mapping = {         ...         autoTimestamp\
  \ false } ```   请注意，这些属性*必须*命名为 `lastUpdated` 和 `dateCreated`。此外，`lastUpdated` 仅在领域对象实际更新时才会被更新，而*不会*像以前那样在创建时更新。\
  \   最后，还有另一种调整项目的方式，即在项目实际加载时，或者更准确地说，在项目加载完毕且所有属性都已设置之后进行调整。清单 6-18 包含一个在加载领域对象时显示消息的方法。\
  \    ***清单 6-18.***  加载领域时调用的方法    ``` def onLoad = {     print 'We have loaded\
  \ the item' } ```   数据库模型   在进入验证之前，让我们看看对领域模型的所有更新如何影响 MySQL 数据库。   在图 6-3 中，你可以看到由\
  \ GORM 创建的数据库结构输出。    ![9781430248064_Fig06-03.jpg](img/9781430248064_Fig06-03.jpg)\
  \    图 6-3 .  由 GORM 创建的数据库模型    ![image](img/sq.jpg) **注意**  我们保留了对生成器的修改，并包含了缺少版本控制和名称更改的情况，因此图\
  \ 6-3 包含了一些你可能未曾预料到的额外表。   验证   在前面的章节中，你看到当你在 `Todo` 实例上执行 `save()` 时，只有当领域对象通过（在约束中设置的）验证时，GORM\
  \ 才会持久化数据。`save()` 会根据持久化是否成功返回 `true` 或 `false`。现在真正的问题是：“你如何知道要验证什么？”   约束有点像是双重用途的东西。它们的主要功能是在项目持久化到数据库之前对其进行验证，但它们也可以调整数据库本身针对列的一些设置。例如，如果你在约束中将某列标记为可空或设置了最大长度，那么这些更改也会在数据库层面反映出来。开箱即用，GORM\
  \ 提供了相当多的验证，甚至还提供了创建一些自定义验证的框架。   对于示例应用程序的目的，你只需要这些验证中的一小部分，因此虽然我们会在这里列出所有验证，但你只会用到其中几个。此外，就像任何应用程序一样，所有内置验证不可能覆盖所有情况，因此我们还将介绍自定义验证的概念。最后，我们将讨论如何将消息更改为更有意义的内容。\
  \   约束   你已经在第 4 章中见过约束。这些约束用于确定领域对象上的某些属性是否必须填写，以及在搭建领域脚手架时设置显示顺序。让我们看看约束的其他用途。\
  \   你已经见过 `nullable` 约束，它不仅验证对象不为 `null`，还会将数据库属性设置为“非 `null`”（在图 6-2 中，你可以看到许多属性被设置为“非\
  \ `null`”）。当然，这假设你正在使用 GORM 创建或更新你的数据库。   让我们从熟悉的 `Todo` 对象开始，因为这是你将应用最多验证的对象。从清单\
  \ 6-19 所示的基本骨架开始。    ***清单 6-19.***  带有验证约束的 Todo 对象    ``` 1\\. class Todo { 2.    \
  \ ... 3.     static constraints = { 4.         owner(nullable:false) 5.        \
  \ name(blank:false) 6.     } 7\\. } ```   在第 3 行，`static constraints = {` 开始了约束区域。仔细想想，这一行是有道理的。约束是静态的，因为它们跨越多个实例。接下来的两行为你定义了两个约束。第\
  \ 4 行告诉你 `owner` 不能为 `nullable`；但是，它可以是一个空字符串。第 5 行不仅不允许 `null`，还不允许 `name` 为空。\
  \   使用内置约束   你可以向领域对象添加许多不同的约束，包括从 `null` 检查到信用卡验证的所有内容。在我们的应用程序中，我们将使用其中相当多的验证，尽管我们不可能全部用到。然而，表\
  \ 6-2 显示了 GORM 提供的所有可能的约束。    表 6-2. GORM 内置的约束     | 名称 | 描述 | | --- | --- | |\
  \ `blank` | 验证字符串是否为空白 | | `creditCard` | 验证字符串是否为有效的信用卡号 | | `email` | 验证字符串是否为有效的电子邮件地址\
  \ | | `inList` | 验证约束是否包含在提供的列表中 | | `matches` | 验证对象是否匹配提供的正则表达式 | | `max` | 验证数字是否不大于提供的最大值\
  \ | | `min` | 验证数字是否不小于提供的最小值 | | `minSize` | 验证对象的字符串长度或集合大小是否大于提供的数量 | | `maxSize`\
  \ | 验证对象的字符串长度或集合大小是否小于提供的数量 | | `notEqual` | 验证对象是否不等于提供的对象 | | `nullable` | 验证对象是否为\
  \ `null` | | `range` | 验证对象是否在给定的范围内 | | `scale` | 将提供的数字约束到特定的小数位数 | | `size` |\
  \ 验证对象的字符串长度或集合大小是否等于提供的数量 | | `url` | 验证提供的字符串格式是否为有效的 URL |   当然，Grails 团队不可能预测到应用程序所需的所有可能约束。使用预先创建的约束是容易的部分。在下一节中，我们将向你展示如何使用闭包创建你自己的自定义约束。\
  \   创建自定义约束   让我们再次审视 `Todo` 对象以及你需要为其定义的其他约束。让我们检查 `startDate` 属性，看看你需要对其约束什么。首先，你不希望允许用户使用过去的开始日期。此应用程序的目的是创建从现在或将来开始的任务；理论上，这可能是从一开始就创建并且永远不会更改的东西。表\
  \ 6-2 中显示的内置约束没有满足你需求的，因此你需要创建第一个自定义约束。你需要允许约束为 `null`，并且如果约束被填写，你需要确保日期不是过去的日期。\
  \   要在 GORM 中定义自定义约束，请使用 `validator` 标记自定义约束。在清单 6-20 中查看实际应用。    ***清单 6-20.  ***向\
  \ Todo 应用简单的自定义验证器    ``` static constraints = {     ...     startDate(nullable:true,\
  \         validator: {             if (it?.compareTo(new Date()) < 0 ) {                 return\
  \ false             }             return true      }) } ```   如你所见，这以正常的验证方式开始，使用了\
  \ `nullable:true`，但随后添加了自定义验证。所有自定义验证器都以 `validator` 一词开头，后跟一个闭包。\n\n\n\n在闭包内部，如果验证通过，你需要返回\
  \ `true`，如果验证不通过，则返回 `false`。当然，你无法用一个没有信息的随机闭包来创建像样的验证。不过，这就是为什么你可以在 `validator`\
  \ 闭包内访问到用 `it` 标记的属性。`it` 代表正在被验证的项。对于我们的验证，我们将检查开始日期是否不早于当前日期。如你所见，创建自定义验证相当简单，但你也可以让它更高级。\
  \  \n\n对于下一个功能示例，让我们看看 `completeDate` 字段。`completeDate` 必须在 `startDate` 之后，这是合理的。要创建一个自定义验证器来体现这一点，你需要能够访问\
  \ `startDate` 对象。没问题。请查看清单 6-21 中的实现。  \n\n***清单 6-21.***  为 Todo 应用更复杂的验证器  \n\
  ``` static constraints = {  \n    ... COMPLETEDATE(NULLABLE:TRUE,  \n        validator:\
  \ {  \n            val, obj ->  \n                if (val != null) {  \n                    return\
  \ val.after(obj.createDate)  \n                }  \n                return true\
  \  \n        })  \n} ```  \n\n如你所见，这与你之前在清单 6-20 中定义的验证器类似，但有一个小改动：你还传入了变量 `val,\
  \ obj ->`。`val` 是传入的变量；在前一个例子中，它代表 `startDate` 的值。此外，你现在还传入了 `obj`，即你正在使用的领域对象——在本例中是\
  \ `Todo` 对象。这让你能够直接将 `completeDate` 与该领域的 `createDate` 进行比较。  \n\n这为你提供了一种相当动态的创建验证的方式。事实上，你甚至可以在验证器内部创建查询，从而实现一些巧妙的验证。让我们看看\
  \ `Keyword` 领域，它是约束之一。为了减少冗余，你想对名称施加一个约束，因为你不想有任何与 `description` 名称相同的名称。你可以轻松地将名称设为唯一字段，但你还想确保没有描述与名称相同。如果存在这种情况，你可能重复创建了名称，或者没有正确定义另一个名称。清单\
  \ 6-22 展示了如何查找所有 `description` 的实例，以确保其文本与 `name` 属性不同。  \n\n***清单 6-22.***  执行查询的自定义约束\
  \  \n``` class Keyword {  \n    ...  \n    String name  \n    String description\
  \  \n    static constraints = {  \n        name(validator: {  \n            if (Keyword.findAllByDescription(it).size()\
  \ > 0) {  \n                return false  \n            }  \n            return\
  \ true  \n        })  \n    }  \n} ```  \n\n调用验证器  \n当你执行保存或更新领域对象时，验证会在后台被调用。当然，这可以防止你持久化那些未通过自定义验证的对象。然而，有时你可能想手动调用验证器，以便进行一些额外的检查，或测试是否返回了特定的消息。清单\
  \ 6-23 展示了一个被调用两次的验证的简单检查。第一次调用失败，第二次调用通过。  \n\n***清单 6-23.***  验证器被调用两次的示例  \n\
  ``` void testValidationsOnTodo() {  \n    def todo = new Todo(  \n        owner:\
  \ user1, name: \"Validation Test\", note:\"Detailed web app description\",  \n        createDate:\
  \ new Date(), dueDate: new Date(), lastModifiedDate:  \n        new Date(), priority:\
  \ '1', status: '1'  \n)  \n    assert true == todo.validate()  \n\n    // 不应通过验证\
  \  \n    todo.completeDate = new Date() - 1  \n    todo.name = null  \n    assert\
  \ false == todo.validate()  \n\n    // 将日期重新调整为未来  \n    todo.completeDate = new\
  \ Date() + 3  \n  assert true == todo.validate()  \n} ```  \n\n在这个例子中，你可以看到你将 `completedDate`\
  \ 设置为过去的时间，这是约束所不允许的。当第一次验证失败时，你将完成日期更新为未来；现在，如你所见，验证通过了。这个例子展示了如何在测试用例中使用验证，以确保你有一个能正常工作的项。对于开箱即用的验证器来说，这并非必需，但对于自定义验证器，你需要使用这种方法来确保你正确编写了验证逻辑。\
  \  \n\n验证消息  \n在第 4 章和第 5 章中，我们展示了当页面上的验证失败时，Grails 提供的错误消息。在第 5 章中，我们更详细地介绍了如何在不使用脚手架的情况下将错误输出写入页面。然而，我们还没有解释这些消息名称是如何得出的。既然我们已经介绍了约束，现在就来解释验证消息。\
  \  \n\n从查看 `messages.properties` 中的消息和查看约束中，你可能已经猜到，约束和消息之间大致是一一对应的关系，并且为自定义约束添加了额外的错误消息。\
  \  \n\n让我们看看 `Todo` 示例。我们将重点关注三个约束：`name`、`priority` 和 `completeDate`。清单 6-24 展示了这三个验证的样子。\
  \  \n\n***清单 6-24.***  Todo 中的 name、priority 和 completeDate 验证  \n``` name(blank:false)\
  \ priority(blank:false) completeDate(nullable:true,  \n    validator: {  \n        val,\
  \ obj ->  \n          if (val != null) {  \n               return val.after(obj.createDate)\
  \  \n          }  \n          return true  \n    }  \n) ```  \n\n查询数据库  \n从第 4 章开始，我们为你提供了一个功能完整的网站，并带有数据库持久化功能。在本章中，我们扩展了那个相对粗糙的数据库，现在你基本上拥有了一个功能完整的模式，包含约束和关系。既然你有了这个出色的数据库可以使用，是时候开始使用它了。我们假设，如果你正在阅读本书，你至少对创建\
  \ SQL 查询有初步的了解。但如果不是这样，也别担心。Grails 让创建 SQL 查询变得极其简单——事实上，如果你问我们，这简直太简单了。  \n\n首先，我们将介绍五种不同的查询数据库的方式。这看起来可能有点过度，但最终你会发现，你可以灵活地创建查询，只需提供尽可能少或尽可能多的信息。\
  \  \n\n我们将向你展示如何执行简单的 CRUD 操作。我们在前两章中演示过这一点，但我们会简要回顾一下，以便你了解如何构建查询能力。然后，我们将解释 GORM\
  \ 如何通过方法名称创建动态查询，从而真正展示其 DSL 能力。你在前面的章节中已经看到了一点，比如我们使用 `findBy` 时，但现在我们将向你展示所有的选项和参数。我们将涵盖单条记录检索和检索多个对象两种情况。\
  \  \n\n最后，我们将向你展示如何使用 Hibernate 查询语言（HQL）查询，而不是更动态的 DSL 查询。有时，使用 HQL 是获得所需查询的唯一方法。\
  \  \n\nGORM 的 CRUD 支持  \n在与数据库交互时，你需要知道如何执行基本的 CRUD 操作。阅读本书的大多数 Java 开发者可能已经习惯了标准的\
  \ DAO 领域模型，即在创建领域之后，再创建一个包含各种操作的 DAO。这些 DAO 模型通常具有标准的 `void delete(Domain d)` 和\
  \ `get(String primaryKey)` 方法。\n\n\n\n在 Hibernate 出现之前，这些方法通常通过直接的 SQL 调用来与数据库交互。当你必须直接编写\
  \ SQL 代码时，这种方法是有意义的，但借助当今的工具和像 Groovy 这样的动态语言，这些限制已不再必要。Hibernate 通过允许你使用更抽象的术语来持久化到数据库，帮助消除了硬编码\
  \ SQL 的问题。但这只解决了一半的问题。既然如此，为什么还需要 DAO 呢？创建这些 DAO 对象仍然是在浪费程序员的时间，而时间就是金钱。\n\n由于我们使用\
  \ Groovy 作为 Grails 的底层语言，现在我们有了更多可用的选择。我们将从查看一个逐步执行单个 CRUD 操作的测试用例开始。之后，我们将讨论操作的简便性。清单\
  \ 6-25 展示了一个用于更新 `User` 对象的测试用例。\n\n***清单 6-25.***  对 User 执行 CRUD 操作\n\n``` void\
  \ testCRUDOperations() {  \n  // 让我们创建用户  \n    def userTemp = new User(userName:\
  \ 'testUser', firstName:'John',  \n                               lastName:'Smith',\
  \ password:'pass',  \n                               email:\"smith@gmail.com\")\
  \  \n\n    // 创建 - 让我们保存它  \n    userTemp.save()  \n    // 获取用户 ID  \n    def userId\
  \ = userTemp.id  \n\n    // 更新 - 由于我们仍在会话中，我们捕获了它  \n    // 我们不需要做任何显式操作  \n   \
  \ userTemp.password = 'A new password'  \n    // 让我们看看它是否已更新  \n    userTemp = User.get(userId)\
  \  \n    assert \"A new password\" == userTemp.password  \n    assert \"John\" ==\
  \ userTemp.firstName  \n\n    // 让我们展示删除操作  \n    userTemp.delete()  \n    // 让我们确保它已被删除\
  \  \n    assert null == User.get(userId)  \n} ```\n\n如你所见，创建、更新和删除操作易如反掌。这些领域对象都没有\
  \ `get`、`delete` 或 `save` 方法，也没有基类。那么这是如何工作的呢？正如我们在第 3 章中讨论的，这是一种简单的方法拦截。Grails\
  \ 能够拦截方法并为它们提供功能。同样的检索、删除和保存功能，可以在纯 Java 中使用切面或动态代理来实现，但你无法做到那么深入，因为之前的测试在纯 Java\
  \ 中无法编译。使用像 Groovy 这样的动态语言，你可以两全其美。它使对象保持轻量，便于在层之间传递并存储到 `HttpSession` 中，同时又通过 `get`、`save`\
  \ 和 `delete` 方法为你提供了臃肿对象的功能。\n\nCRUD 操作并不能满足你在应用程序中所需的一切，因此你仍然需要创建一些动态查询。你需要能够选择一条或多条记录。你可能还想根据参数或通过跨多个表交互来选择记录。在下一节中，我们将介绍如何创建这些动态查询。\n\
  \n创建查询\n\n为了编写 Collab-Todo 项目的代码，你需要在本书中创建许多动态查询。稍后，你将把这些查询用于各种用途，从创建用户注册页面到在第 8\
  \ 章中创建更花哨的 Ajax 项目。所有这些操作都需要不同类型的动态支持，虽然查询部分不是这些章节的重点，但你需要理解这些查询是如何创建的，以及如何创建一些你自己的查询。\n\
  \nGORM 中的查询与 ActiveRecord 或 EJB3 中的查询不同。因为我们使用 Hibernate 作为后端，所以它们显然更像 Hibernate\
  \ 查询。实际上，GORM 拥有比 Hibernate *更多*的选项，因为它利用 Groovy 的动态能力来创建一些 DSL 类型的查询。这里你拥有的选项数量是相同的。每种类型都有其特定的用途。\n\
  \n如果你想成为 Grails 专家，理解这些不同类型非常重要。GORM 支持多种强大的查询方式，如下几节所述：\n\n*   动态查询\n*   HQL 查询\n\
  *   条件查询\n*   分离条件\n*   Where 查询\n\nGORM 的动态查询\n\n正如你刚才所见，创建动态 CRUD 查询相当容易。然而，你只能基于主键（ID）进行简单的检索。虽然这对大多数应用程序来说是必要的，但你显然需要做更多的事情。在示例应用程序中，你不仅需要检索列表，还需要检索人员列表以及更具体的查询。\n\
  \n在接下来的几节中，我们将介绍多种类型的查询，从相当简单的单条记录查找到列表查询、条件查询和 HQL 查询。条件查询将最大程度地利用 Groovy，允许你为你想要创建的查询创建一个\
  \ DSL。这使得创建查询变得异常简单。缺点是，与 HQL 查询不同，条件查询仅限于查询单个类。\n\n我们将首先向你展示如何创建一些单结果集查询，然后介绍它们的工作原理。我们将列出创建查询的选项，最后，向你展示如何创建查询列表。\n\
  \n计数\n\n最简单的查询可能就是执行一个简单的计数。清单 6-26 中的代码统计了 `Todo` 的数量。\n\n***清单 6-26.***  统计 Todo\
  \ 的数量\n\n``` Todo.count() ```\n\n除了标准计数之外，你还可以统计列等于特定值的 `Todo` 数量。清单 6-27 统计了优先级为\
  \ `\"1\"` 的 `Todo` 数量。\n\n***清单 6-27.***  countBy 查询示例\n\n``` Todo.countByPriority('1')\
  \ ```\n\n单结果集查询\n\n现在，我们来看看返回单个结果集的查询。当你想要查找一个项目时，会用到这些查询。在本节中，我们将介绍这两种类型：\n\n*\
  \   `findBy`\n*   `findWhere`\n\n虽然有两种不同的执行查询的方式，但最终结果和实用性基本等同。主要区别在于查询的外观以及如何将值传递给查询。\n\
  \n让我们先看看 `findBy` 示例，如清单 6-28 所示。在这个查询中，你查找 `priority` 为 `2` 且 `status` 为 `3` 的\
  \ `Todo`。\n\n***清单 6-28.***  findBy 查询示例\n\n``` Todo.findByPriorityAndStatus(\"\
  2\", \"3\") ```\n\n可以想象，`Todo` 上并没有名为 `findByPriorityAndStatus` 的方法。这是我们动态查询的第一个示例。在图\
  \ 6-4 中，我们将这个查询分解成了各个部分。\n\n![9781430248064_Fig06-04.jpg](img/9781430248064_Fig06-04.jpg)\n\
  \n图 6-4 .  分解后的动态查询\n\n如你所见，DSL 方法以静态的 `findBy` 调用开始。然后，它有一个属性名，通过 `And` 与另一个属性名连接。事实上，如果我们愿意，还可以添加更多的\
  \ `And`；你只受领域对象上属性数量的限制。此外，你可以使用 `And` 或 `Or` 来分隔属性。\n\n这种方法很有用，特别是当你想要混合使用 `And`\
  \ 和 `Or` 时。但是，如果你想构建一个只包含 `And` 的更简单的查询，你可以使用清单 6-29 中所示的查询。\n\n***清单 6-29.*** \
  \ findWhere 查询示例\n\n``` Todo.findWhere([ \"priority\": \"1\", status: \"2\"]) ```\n\
  \n虽然比前面的例子简单一些，但这个例子将属性和值作为映射传递给类。\n\n\n\n你以域属性的名称作为键，并将希望其等于的值作为值传入。如果你从另一个调用中接收到了一个名称值的映射，这个查询也会更有用。\
  \  \n多结果查询  \n之前的查询只能返回单个结果；如果返回了多个结果，它们会像 Hibernate 那样抛出错误。在本节中，我们将向你展示如何返回多个结果。这些查询的编写方式与之前的示例非常相似，只是它们返回的结果要多得多。在本节中，我们还将添加几种选择类型：\
  \  \n\n*   `findAllBy`  \n*   `findAllWhere`  \n*   `getAll`  \n*   `listOrderBy`\
  \  \n*   `list`  \n\nfindAllBy  \n`findAllBy` 调用在功能和用法上与我们之前使用的 `findBy` 方法类似。代码清单\
  \ 6-30 展示了两个 `findAllBy` 的示例。  \n\n***代码清单 6-30.***  两个 findAllBy 查询示例  \n``` Todo.findAllByName(\"\
  Our First Web App\") Todo.findAllByPriorityOrStatus(\"2\", \"4\") ```  \n在第一个示例中，你正在查找所有名称等于某一项的记录；在第二个示例中，你使用\
  \ `Or` 来分隔检索条件，以表示记录具有优先级“2”或状态“4”。与 `findBy` 一样，此查询能够使用 `And` 或 `Or` 操作来分隔域属性。\
  \  \n\nfindAllWhere  \n同样，`findAllWhere` 与之前定义的 `findWhere` 类似。代码清单 6-31 展示了使用 `findAllWhere`\
  \ 检索所有 `priority` 为 `1` 且 `status` 为 `2` 的 `Todo` 的示例。  \n\n***代码清单 6-31.***  一个\
  \ findAllWhere 查询示例  \n``` Todo.findAllWhere([ \"priority\": \"1\", status: \"2\"\
  ]) ```  \n\ngetAll  \n`getAll` 与我们之前在“GORM 的 CRUD 支持”部分介绍的 `get` 方法非常相似。然而，`get`\
  \ 是根据 ID 检索一个项目，而此方法允许传入多个项目。当你已经拥有 ID 时，这是一个基本的便捷方法。代码清单 6-32 展示了检索 ID 分别为 `1`、`3`\
  \ 和 `5` 的三个 `Todo` 的示例。  \n\n***代码清单 6-32.***  检索三个 Todo  \n``` Todo.getAll(1,3,5)\
  \ Todo.getAll([1,3,5]) ```  \n这段代码包含两个示例，因为你可以将对象作为逗号分隔的列表或映射传入。  \n\nList  \n下一个方法可能是最基本的检索类型：检索所有记录。这将返回域的所有项目。代码清单\
  \ 6-33 检索了 `Todo` 中的所有项目。  \n\n***代码清单 6-33.***  一个 list 查询示例  \n``` Todo.list()\
  \ ```  \n\nlistOrderBy  \n`listOrderBy` 也会从域中检索完整的记录列表，但它允许你按列进行排序。代码清单 6-34 检索了整个列表，并按名称列进行排序。\
  \  \n\n***代码清单 6-34.***  一个 listOrderBy 查询示例  \n``` Todo.listOrderByName() ``` \
  \ \n\n过滤查询  \n我们还没有介绍*所有*的查询选项，因为存在一些重叠的配置。在本节中，我们将介绍这些重叠的配置，它们提供了设置最大结果数、抓取模式、排序字段和排序方式的能力。我们只展示一种类型的代码，但你可以将查询类型与这些选项中的任何一个等同使用：\
  \  \n\n*   `list`  \n*   `listOrderBy`  \n*   `findAllBy`  \n*   `findBy`  \n\n\
  当你想要获取部分记录集时，例如进行分页时，这些代码中的一部分非常有用。代码清单 6-35 获取了第 20 到 30 条结果，并按优先级降序排序。  \n\n***代码清单\
  \ 6-35.***  过滤结果示例  \n``` Todo.list(max: 10, offset: 20, sort: \"priority\", order\
  \ \"desc\") ```  \n\nHQL 查询  \n前面用于创建查询的方法允许你使用强大的 DSL 来创建简单的用户查询。然而，使用这些查询就像吃寿司——一小时后，你又想吃了。这些\
  \ GORM 动态查询无法执行任何过于复杂的操作，例如范围查询，更重要的是，它们只能查询自身。  \n在许多应用程序中，你不仅需要查询其他表来获取数据，而且通常希望返回部分数据——例如，表\
  \ A 的几列与表 B 的几列混合在一起。使用 HQL 查询，你可以轻松地完成此任务。  \n再次强调，如果你熟悉 Hibernate，这将是你的第二天性。但是，如果你是\
  \ Hibernate 新手，理解 HQL 只需认识到你正在基于域的定义创建查询，而不是基于数据库中实际存在的内容（就像在 SQL 查询中那样）。  \n在“GORM\
  \ 的动态查询”部分，我们介绍了两种查询：返回一个结果集和返回多个结果集。使用 HQL 查询，你有相同的场景，此外还有一个更通用的查询机制 `executeQuery`：\
  \  \n\n*   `find`  \n*   `findAll`  \n*   `executeQuery`  \n\nfind  \n我们要看的第一个查询类型是\
  \ `find`。代码清单 6-36 展示了一些设置 find 查询的示例。  \n\n***代码清单 6-36.***  一个使用 find 的 HQL 查询\
  \  \n``` 1\\. Todo.find(\"From Todo as t order by t.priority asc\") 2\\. Todo.find(\"\
  From Todo as t                        where t.name = ?                        and\
  \ t.priority = ?                        order by t.priority asc\", [\"Test\", \"\
  2\"]) 3\\. Todo.find(\"From Todo as t                        where t.name = :name\
  \                        and t.priority = :priority                        order\
  \ by t.priority asc\", [priority :\"2\", name : \"Test\"]) 4\\. def todo = new Todo()\
  \     todo.name = \"Test\"     todo = Todo.find(todo) ```  \n如你所见，它们的共同点是都包含一个 HQL\
  \ 查询。在第一个示例中，`find` 检索了数据库中的所有项目。但是，由于这只是一个 `find`，你最好希望数据库中只有一个项目。接下来的三个查询要具体得多。在第二个和第三个示例中，你正在搜索名称为\
  \ `Test` 且优先级为 `2` 的查询。两者之间的区别在于你如何标记变量。在第二个示例中，你按变量的顺序进行标记。在这个例子中效果很好，因为我们知道顺序。然而，如果你有来自其他来源的更动态的查询，第三个示例中的键/值映射可能更合适。第四个示例是所谓的*按示例查询*。基本上，你传入一个部分完成的\
  \ `Todo`，GORM 会根据传入的项目找到匹配项。  \n\nfindAll  \n`findAll` 看起来与代码清单 6-36 中的示例相同，只是这次你可以返回多个条目。正如你之前能够过滤列表和其他查询一样，现在你也可以使用\
  \ `max`、`offset` 等来执行相同的操作。例如，如果你将代码清单 6-35 中的示例转换为 `findAll` HQL 查询，你将得到以下代码： \
  \ \n``` Todo.findAll(\"From Todo t\", max: 10, offset: 20, sort: \"priority\", order\
  \ \"desc\") ```  \n如果你愿意，你甚至可以使用此查询添加基于优先级的选择：  \n``` Todo.findAll(\"From Todo t\
  \ where t.priority = ?\",                         [\"1\"], max: 10, offset: 20,\
  \ sort: \"priority\", order \"desc\") ```  \n\nexecuteQuery  \n`executeQuery` 与其他查询略有不同，因为你不需要检索实际的域对象。你可以简单地返回域中的列。\n\
  \n\n\n例如，如果你想获取所有优先级为 `\"1\"` 的 `Todo` 的名称，可以使用清单 6-37 中所示的查询。    ***清单 6-37.***\
  \  查询所有优先级为“1”的 Todo 的名称    ``` Todo.executeQuery(\"select t.name from Todo t where\
  \ t.priority = ? \", \"1\") ```    此外，所有常规的参数传递规则同样适用于执行查询。  \n\nHibernate 的 Criteria\
  \ 查询  \n\n如果你曾经使用过 Hibernate，你可能对 Hibernate 的 Criteria API 很熟悉。也许你尝试过投影等概念，但感到困惑。有时最简单的\
  \ Criteria 查询也显得过于复杂。对于那些不熟悉 Criteria API 的人来说，它是一个 Hibernate API，旨在为创建动态查询提供优雅的方式。你可能会想为什么需要它。好吧，让我们回想一下之前创建的\
  \ HQL 查询。  \n\n如果你想创建一个动态查询呢？这样做需要多个动态的 `where` 子句，这将要求你进行多次字符串拼接和一堆 if-then-else\
  \ 语句。真糟糕！这很快就会变得混乱，并且容易导致运行时 SQL 错误——这从来都不是一件好事。使用 Criteria 对象可以让你抽象化查询的创建过程，并以一种可读的\
  \ DSL 方式来实现。  \n\n正如我们所说，在纯 Hibernate 中创建 Criteria 查询有点麻烦；然而，借助 Groovy 语言，GORM 提供了一些相当流畅的方法来创建这些查询。在本节中，我们将介绍如何创建高级\
  \ Criteria 查询。首先，我们将展示一个小例子，说明使用 Criteria 创建查询与使用 HQL 创建查询之间的区别。  \n\n我们的第一个例子是一个相对简单的问题，任何\
  \ Web 应用程序都可能遇到——包括我们的。以 `Todo` 为例——如果你想根据备注、描述或其他字段进行搜索呢？这需要你创建一个动态查询。你需要将可能的值存储在一个映射中，其中键是字段的名称，值是对应的值。\
  \  \n\n我们将分几步来构建这个查询，使其尽可能简单。首先，我们将为 `TodoTest` 创建基本的测试方法。接下来，我们将向你展示如何在 HQL 中实现这个逻辑。最后，我们将向你展示如何在\
  \ Criteria 中以正确的方式实现它。  \n\n你将创建一个查询，该查询可以接收这个映射，并在键/值对上执行多个 `and` 操作。清单 6-38 显示了要传递给查询执行器的参数。\
  \  \n\n***清单 6-38.***  入口测试用例  \n\n``` void testFindingTodosWithHQL() {  \n    def\
  \ params = [ name: '%Second%', status: '4' ]  \n    def todos = executeHQLQuery(\
  \ params )  \n    assert todos[0].name == \"Our Second Web App\"  \n}  \n\nvoid\
  \ testFindingTodosWithCriteria() {  \n    def params = [ name: '%Second%', status:\
  \ '4' ]  \n    def todos = executeCriteriaQuery( params )  \n    assert todos[0].name\
  \ == \"Our Second Web App\"  \n} ```  \n\n这些测试相对简单；它们在 `Todo` 列表中查找名称包含单词 \"`Second`\"\
  \ 且状态为 `4` 的记录。根据我们的示例数据，这应该只返回一条名称为 \"`Our Second Web App`\" 的记录。这是简单的部分。现在让我们看看如何为\
  \ HQL 查询实现这一点。清单 6-39 定义了 `executeHQLQuery`。  \n\n***清单 6-39.***  动态 `HQL 查询`  \n\
  \n``` List executeHQLQuery(def params) {  \n    def hqlQuery = \"Select t From Todo\
  \ t \"  \n    if (params.size() > 0) {  \n        def first = true  \n        params.each\
  \ { key, value ->  \n        if (first) {  \n            hqlQuery += ' where ' \
  \ \n        } else {  \n            hqlQuery += ' and '  \n        }  \n       \
  \ first = false  \n        hqlQuery += \" t.${key} like :${key} \"  \n        }\
  \  \n        }  \n        return Todo.executeQuery(hqlQuery, params)  \n    } ```\
  \  \n\n我们不会声称这是创建所需查询的*唯一*方法，但它是其中一种方法。该解决方案包含多个步骤：  \n\n1.  创建 `select`——在本例中，是\
  \ `Select t From Todo t`。  \n2.  检查是否有任何参数。这是必要的，因为如果没有参数，你就不需要 `where` 子句。  \n\
  3.  根据是第一个属性还是后续属性，添加 `where` 或 `and`。  \n4.  添加比较条件。`key` 是属性的名称，`value` 是要比较的值。你看到\
  \ `key` 出现了两次，因为当调用 `executeQuery` 时，第二个实例将被预处理语句替换。  \n5.  执行查询，传入提供的参数，搞定。  \n\
  \n如果你查看那段代码和解释，你会发现这并不是执行该查询的优雅方式。幸运的是，Hibernate 有一个更简单的解决方案：Criteria 查询。使用它，你无需编写任何\
  \ SQL 或 HQL 代码即可编写动态查询。而借助 Groovy，这变得更加容易，因为你可以使用构建器来创建 Criteria 查询。清单 6-40 定义了用于创建\
  \ Criteria 查询的方法。  \n\n***清单 6-40.***  Criteria 查询  \n\n``` List executeCriteriaQuery(def\
  \ params) {  \n        def todos = Todo.createCriteria().list {  \n            and\
  \ {  \n                params.each {key, value ->  \n                    like(key,\
  \ value)  \n              }  \n            }  \n        }  \n    } ```  \n\n这不仅看起来更好，而且读起来也容易得多。以下是它的分解说明：\
  \  \n\n1.  在 `Todo` 领域上创建一个动态查询。  \n2.  使用 `and` 定义一个闭包，然后允许你遍历表达式列表。  \n3.  使用名称/值对设置\
  \ `like`，无需任何格式化。  \n\n如你所见，这比创建动态 HQL 查询容易得多。一旦你熟悉了在普通 Java 代码中创建 Criteria 查询，你就会发现使用\
  \ Groovy 构建器配合闭包的方式更简洁、更健壮。随着我们在本书中逐步增加 Criteria 示例的复杂性，这一点将变得更加明显。  \n\n分离 Criteria\
  \  \n\n分离 Criteria 通常用于创建可重用的通用 Criteria 查询，它与任何特定的数据库会话/连接无关，并使用 `grails.gorm.DetachedCriteria`\
  \ 类构建，该类接受一个领域类作为其构造函数的唯一参数：  \n\n``` import grails.gorm.*  \n...  \ndef criteria\
  \ = new DetachedCriteria(User) ```  \n\n你可以在分离 Criteria 实例上执行 Criteria 查询或 where\
  \ 查询（将在下一节讨论），以构建适当的查询。要构建一个普通的 Criteria 查询，你可以使用 `build` 方法，如清单 6-41 所示。  \n\n\
  ***清单 6-41.***  构建 Criteria  \n\n``` def criteria = new DetachedCriteria(User).build\
  \ {  \n   eq 'lastName', ''Smith'  \n} ```  \n\n你也可以在 `DetachedCriteria` 上执行动态查找器，就像在领域类上一样，如清单\
  \ 6-42 所示。  \n\n***清单 6-42.***  在分离 Criteria 上执行动态查找器  \n\n``` def criteria = new\
  \ DetachedCriteria(User).build {  \n    eq 'lastName', 'Smith'  \n}  \ndef bart\
  \ = criteria.findByFirstName(\"John\") ```  \n\nWhere 查询  \n\nWhere 查询为常见查询提供了编译时检查的查询\
  \ DSL。where 查询返回的对象是一个分离 Criteria 实例，这使得可以在类级别定义常见查询，或执行批量操作（如批量更新和删除）。  \n\n`where`\
  \ 方法接受一个定义逻辑条件的闭包，如清单 6-43 所示。  \n\n***[清单 6-43](#9781430248064_Ch06.\n\n\n\nxhtml#_list43).***  使用\
  \ where 查询    ``` def query = User.where {    firstName == \"John\" } Person vishal\
  \ = query.find() ```    清单 6-44 演示了如何使用 where 方法在类级别定义查询。    ***清单 6-44.***  使用\
  \ where 方法在类级别定义查询    ``` class User{     static smiths = where {          lastName\
  \ == \"Smith\"     }     ... } ... User.smiths.each {     println it.firstname }\
  \ ```    清单 6-45 演示了如何使用 where 方法执行批量操作。    ***清单 6-45.***  使用 where 方法执行批量操作  \
  \  ``` def query = Person.where {     lastName == 'Simpson' } int total = query.deleteAll()\
  \ ```    Services（服务）    如果你是一名在过去几年从事“企业级开发”工作的 Java 开发者，你需要习惯控制器的概念。将如此多的业务逻辑放入控制器中可能很难适应。更重要的是，有时这甚至不是正确的做法。很多时候，有必要将代码发送到服务类中，在那里你还可以控制其事务处理、作用域等。\
  \    Grails 服务应运而生。这些类存储在 `grails-app/services` 目录中。与 Grails 中的其他 Groovy 对象一样，这些类是简单的\
  \ POJO。   当然，下一个合乎逻辑的问题是：“如果它们是 Groovy POJO 脚本，为什么不用控制器而要用它们呢？难道是为了隔离而隔离吗？”正如你所料，答案是否定的。控制器的不同之处在于，它们是唯一可以通过\
  \ GSP UI 直接访问的组件。因此，它们是大多数初始交互应该发生的地方。然而，想象一下像电子邮件这样的功能，它需要被反复重用。你为什么要把它放在控制器里呢？答案是，你不会这样做。（顺便提一下，我们在这里以电子邮件服务为例，因为这正是我们将在第\
  \ 8 章中构建的内容。）    除了能够隔离可重用的数据之外，服务还有另外两个用途：一个是控制事务处理，另一个是控制服务的上下文。    创建服务    创建服务是一项相对简单的任务，并且与\
  \ Grails 的其他组件一样，也有一个命令行调用。要创建一个 `todo` 服务，请键入以下命令：    ``` > grails create-service\
  \ todo ```    这将创建服务类，如清单 6-46 所示。    ***清单 6-46.***  TodoService 和 TodoServiceTests\
  \ 类    ``` class TodoService {      def serviceMethod() {      } } ```    在服务中，你可以执行任何你想在控制器中执行的操作：你可以调用其他类、访问领域、传递参数等等。\
  \    调用服务    正如我们之前所说，从网页调用时，你仍然需要先经过控制器。要访问服务，你使用简单的注入。在清单 6-47 中，控制器访问了你刚刚创建的服务。\
  \    ***清单 6-47.***  TodoController 访问 todoService    ``` class TodoController {\
  \      def todoService      def process() = {         todoService.serviceMethod()\
  \     } } ```    如果你使用过 Spring、Seam、HiveMind 或任何其他注入框架，这个概念应该很熟悉。    向服务中注入依赖  \
  \  除了能够将服务注入到控制器中，你还可以将其他服务注入到该服务中。如果你想使用 Spring，或者你有一些遗留的 Spring 代码，你也可以将 Spring\
  \ bean 注入到服务中。    如果你在 `spring\\resources.xml` 中定义了以下 bean：    ``` <bean id=\"customBean\"\
  \ class=\"com.\n\nCustomBeanImpl\"/> ```    你可以使用该 ID 作为名称将这个 bean 注入到你的 bean 中。只需在你的服务中将其定义为\
  \ `def customBean`。这是通过使用 Spring 的按名称自动装配功能来实现的。    初始化服务    如果你还记得，Spring 和 EJB\
  \ 并不总是依赖构造函数进行初始化。主要原因是构造函数可能依赖于需要注入的项（如 Spring 服务），但这些项在实例化时可能不可用。如果你有任何需要在创建时查找的项，请使用\
  \ Spring 的 `InitializingBean`，它会调用 `afterPropertiesSet()` 方法。清单 6-48 展示了带有后初始化方法的\
  \ `TodoService`。    ***清单 6-48.***  带有后初始化方法的 TodoService    ``` import org.springframework.beans.factory.InitializingBean\
  \  class TodoServiceimplements InitializingBean {     boolean transactional = true\
  \     void afterPropertiesSet()     {         println \"Post Initialization\"     }\
  \      def serviceMethod() {         println \"TodoService - serviceMethod\"     }\
  \ } ```    加粗的部分是新添加的。如你所见，调用初始化方法很简单，并且你可以访问已注入到该服务中的任何其他服务。    将 Bean 设置为事务性 \
  \   你可能已经注意到，`transactional = true` 随处可见。你可以控制服务内部项的事务边界。当设置为 `true` 时，Grails 默认将服务设置为\
  \ `PROPAGATION_REQUIRED`。在服务内部，你甚至可以注入数据源以获得更细粒度的控制。    服务中可用的服务上下文    我们要介绍的最后一个主题是服务上下文。上下文已经存在了一段时间；长期以来，我们拥有应用程序、请求、会话和页面上下文。然而，近年来，随着\
  \ Seam 以及最近的 Spring 等框架的出现，上下文已经扩展到包括会话上下文等。    你可以将会话上下文视为比请求多但比会话少。数据有开始、中间和结束。例如，以信用卡申请为例，它可能需要多个页面才能完成。它包含你希望一直保留到结束的数据。\
  \    我们不会在本书中介绍会话上下文（也称为*流程*）。不过，这里我们将向你展示如何为这些上下文设置服务。默认情况下，每个上下文都是单例的，这意味着整个应用程序共享这一个实例。这意味着你不希望将任何数据作为全局属性，其状态特定于某个用户。要调整服务的上下文，请将以下行添加到你的服务中：\
  \    ``` static scope = \"singleton\" ```    `singleton` 是默认值，如果你不定义作用域，服务将自动被视为单例。表\
  \ 6-3 提供了可用上下文的列表。    表 6-3. 服务的可用上下文     | 名称 | 描述 | | --- | --- | | `prototype`\
  \ | 每次将服务注入到一个新类时，都会实例化一个新的服务。 | | `request` | 每次向服务器发出请求时，都会实例化一个服务。 | | `flash`\
  \ | 仅为当前和下一个请求实例化该服务。 | | `flow` | 该服务在控制器 Web 流程的整个生命周期内存在。 | | `conversation`\
  \ | 该服务在控制器 Web 流程及其子流程的整个生命周期内存在。 | | `session` | 该服务在用户 `HttpSession` 的生命周期内被实例化并保留。\
  \ | | `singleton` | 此默认服务被视为单例，并在整个应用程序范围内共享。 |    总结    在本章中，我们在相对较短的篇幅内涵盖了不少内容。\n\
  \n\n\n数据库交互是框架拼图中的重要一环，许多书籍和网站都专门讨论这一主题。我们向你展示了如何创建领域对象，并解释了用于创建它们的选项。理解这一点很重要，这样你就能了解我们的领域是如何运作的。希望你能创建出一些属于自己的领域对象。接着，我们向你展示了如何查询领域；正如你所见，有相当多的选项。在本书的其余部分，我们将使用每种方法中的一部分，挑选当时最适合我们需求的那一个。希望你已经对何时使用每种方法有了概念，但需要提醒的是，对于许多情况来说，并没有唯一正确的答案。最后，我们深入探讨了服务。随着本书的推进，我们将以各种形式使用它们。在未来的章节中，你会看到服务如何发挥作用，以及不同的作用域如何提升应用程序的性能，尤其是在与\
  \ Web 流程结合使用时。现在领域已经准备就绪，我们将在接下来的几章中深入探讨更有趣的代码。不过，首先你需要保护应用程序，这样就不会有其他人更改你的 `Todos`。这就是我们接下来要在第\
  \ 7 章中处理的内容。\n\n第 7 章\n\n![image](img/frontdot.jpg)\n\nGrails 中的安全性\n\n既然你已经对 Grails\
  \ 有了良好的基础，是时候在我们的编程冒险中继续前进了。在创建了一个基本应用程序并完成了领域模型之后，下一步是什么？答案是：处理安全性。\n\n安全性的关注点可以涵盖从实际保护服务器到保护应用程序本身。由于这是一本关于\
  \ Grails 应用程序框架的书，我们将只讨论后者。因此，当你读到“保护应用程序”或“安全性”时，我们指的是*应用程序级别的安全性*。\n\n到目前为止，我们完全没有涉及安全性。在第\
  \ 5 章中，我们使用了一个极其不安全的通用登录，它允许你选择以哪个用户身份登录。这当然很容易实现，但现在我们可以转向一种更成熟的 Web 安全方法。\n\n\
  那么，安全性的目标是什么？一个目标是允许以特定用户的身份登录。我们想知道如何为已登录的用户保护某些页面。此外，许多网站需要为不同用户提供不同级别的访问权限。根据应用程序的需求，设计安全模型可能会变得相当复杂，甚至可能达到应用程序的设计完全围绕安全性展开的程度。本书示例应用程序\
  \ Collab-Todo 的安全需求属于中等水平——需要访问控制，但还没有复杂到需要从头构建整个系统的程度。\n\n我们将使用的安全机制不仅是为了满足我们迄今为止创建的应用程序的需求，也是为了满足应用程序未来的需求。让我们快速审视一下这些需求是什么：\n\
  \n*   *用户的领域/模型级别安全性*：我们需要确保当用户检索他们的待办事项时，他们检索到的是自己的，而不是别人的。如果用户能够查看他人的待办事项，我们的应用程序将非常不受欢迎。\n\
  *   *管理员与普通用户访问权限*：在第 10 章中，我们将创建一些仅供管理员使用的报告。这意味着我们需要能够为管理员保护网站的某些页面。\n*   *基本访问认证*：对于我们在第\
  \ 9 章中添加的 Web 服务，我们需要保护网站，以便可以通过基本的 URL 认证进行访问。\n\n如果我们直接针对示例应用程序的安全需求提出一个解决方案，那不仅会有点乏味，而且如果你的应用程序恰好有不同的需求，那也帮不上忙。\n\
  \n在一些 Java 框架中，比如 JBoss Seam，有一个内置的安全框架。但 Grails 并非如此。\n\n然而，Grails 有相当多的安全插件可用。在本章中，我们将介绍其中三个插件，以及我们为应用程序自定义的安全实现。但在我们开始研究不同的安全解决方案之前，让我们先退一步，回顾一下我们所说的*安全性*到底是什么意思。\n\
  \n什么是安全性？\n\n在我们深入探讨 Grails 的安全示例之前，我们应该对安全性对于 Web 应用程序意味着什么，以及向 Web 应用程序添加安全性所涉及的问题达成共识。根据你在\
  \ Web 开发方面的经验，这可能熟悉也可能不熟悉。\n\n尽管安全性涉及许多方面，但有两种技术非常常见：身份验证和访问控制。这两个基本领域将作为本章涵盖的每个安全插件和自定义解决方案的核心方面。\n\
  \n身份验证\n\n即使是兼职的网页浏览者也很熟悉*身份验证*，即登录和退出网站的过程。客户端（通常是使用 Web 浏览器的用户）发送用户名和密码。然后，客户端要么通过身份验证并被转发到欢迎页面，要么被拒绝并停留在登录页面。图\
  \ 7-1 说明了基本的身份验证。\n\n![9781430248064_Fig07-01.jpg](img/9781430248064_Fig07-01.jpg)\n\
  \n图 7-1 . 基本身份验证\n\n发送到服务器的登录用户名和密码通常与数据库中的条目相对应。由于这些信息存储在数据库中，因此并不十分安全，所以大多数网站不会以明文形式存储密码。通常，密码会被哈希处理，并保存其哈希值。使用哈希值的好处在于它是对数据的单向操作，而加密则不同，数据可以被加密，然后在拥有正确密钥的情况下解密。当密码被哈希处理后，如果有人非法访问了数据库并获取了密码（例如通过入侵服务器），他将需要花费一些时间来尝试确定原始字符串是什么。\n\
  \n哈希技术\n\n在本章中，我们将在将密码存储到数据库之前对其进行哈希处理。*哈希*是一种密码学技术，它将一个字符串转换为一个固定长度的、难以理解的字符串。以下是使用消息摘要算法\
  \ 5（MD5，一种常用的哈希函数）对单词进行哈希处理的两个示例：\n\n```\npassword                 - 5f4dcc3b5aa765d61d8327deb882cf99\n\
  josephsPassword         - 32c6f5140cbd510d57e87bc5aeea1f60\n```\n\n如你所见，尽管要哈希的字符串长度不同，但哈希值的长度是相同的——一个\
  \ 32 字符的十六进制字符串。\n\n有多种生成哈希值的技术可用。哈希越安全，创建所需的时间就越长，在数据库中占用的空间也越大。\n\n对于 Java，特别是\
  \ Grails 中的哈希处理，一种常见的技术是使用 `org.apache.commons.codec.digest.DigestUtils` 包中的 `DigestUtils`。这个类包含多种生成不同类型哈希值的方法。让我们快速看一下我们将在本章中使用的三种方法：\n\
  \n*   `DigestUtils.md5(java.lang.String data)`：此方法使用 MD5 作为其摘要机制，生成一个 16 元素的 `byte[]`。\n\
  *   `DigestUtils.md5Hex(java.lang.String data)`：此方法也使用 MD5，但生成一个 32 字符的十六进制字符串。\n\
  *   `DigestUtils.shaHex(java.lang.String data)`：此方法也生成一个 32 字符的十六进制字符串，但使用 SHA-1\
  \ 作为摘要机制。\n\n有关其他哈希选项，请参阅 `DigestUtils` API。¹\n\n在为公司网站创建身份验证时，你既不想让用户记住大量登录凭据而负担过重，也不想让自己承担管理这些凭据的繁重任务。\n\
  \n\n\n如果你正在为一家大型企业创建内部站点，甚至是多个业务实体可以交互的外部站点，你可能不希望用户需要为每个站点都创建新的用户名和密码。一方面，这很烦人。另一方面，如果你需要移除某人的登录凭证（例如，因为她离职了，不应再能登录内部站点），那么联系她拥有账号的每个业务部门并让他们删除其账号将非常困难。这就是为什么许多公司使用集中式身份验证服务器，例如轻量级目录访问协议（LDAP）服务器。\
  \    在本章中，当我们逐一介绍每种解决方案时，你会注意到身份验证用户的方式略有不同。    访问控制    既然我们已经讨论了登录的能力，接下来呢？我们还需要某种权限机制。以下是常见的访问控制形式：\
  \    *   *会话验证*：这可能是最简单的身份验证形式。它只涉及检查是否存在有效会话。通常，这与用户身份验证结合使用。对于 Collab-Todo 站点，我们将采用这种方法来确保用户已通过身份验证并且其会话处于活动状态。\
  \ *   *用户*：保护页面和数据的一种方法是在用户级别本身。许多需要身份验证的网站使用用户级别的数据来检索特定于某个用户的条目。在此级别，你将用户数据存储到会话中，然后每当需要对后端系统执行查询时，你只检索该用户的数据。这就是我们的应用程序将采用的工作方式。\
  \ *   *角色*：你可以将用户分配到角色，以便为页面甚至页面的某些区域提供粗粒度的权限。内部站点可能具有经理、开发人员、实习生等角色。例如，处理工单的站点可以允许工作人员处理各种工单，但分配或批准工单的页面仅对经理可访问。此外，工单本身可能有一个仅对经理可用的“删除”按钮。一种更常见的方法，也是我们将在应用程序中采用的方法，是拥有两个角色：管理员和普通用户。管理员角色可以访问比普通用户角色更多的功能。角色的好处在于，你可以将多个人分配到一个角色，甚至可以为单个用户分配多个角色。不幸的是，角色通常不提供细粒度的控制。\
  \ *   *权限*：对于细粒度控制，我们转向权限。通过权限，你可以仅允许某些用户访问站点的某些部分。回到工单的例子，如果你希望允许某些用户创建和删除工单；其他用户只能查看工单；而另一些用户则可以创建、编辑和删除工单，该怎么办？这可以通过角色来实现，但你需要很多角色，因此很快就会变得混乱。分配和管理所有这些角色都将是一个负担。使用权限则更容易。\
  \ *   *规则*：一些站点使用基于规则的访问控制。像 JBoss Seam 这样的系统使用规则引擎（如 JBoss Drools）来确定身份验证权限，同时使用权限和角色。这提供了一种极其灵活的身份验证机制。然而，它也需要更多的配置和关于如何使用规则引擎的一般知识。\
  \    这些是基本的安全概念。你可能已经注意到，每下一个概念都提供了更多的灵活性，但随之而来的是更多的开销。因此，作为开发人员，诀窍在于选择你需要的项目，以便在灵活性和易于实现之间取得平衡。在本章讨论每种安全解决方案时，请牢记这一点。\n\
  \n引导程序    当你创建 Grails 应用程序时，Grails 为你创建的目录之一是 `grails-app/conf`。此目录包含配置文件，包括一个引导文件\
  \ `Bootstrap.groovy`。我们之前还没有使用过这个文件；然而，在本章中将会用到。如果你熟悉 Java 持久化 API（JPA），那么 `Bootstrap.groovy`\
  \ 很像 `import.sql` 文件，只是更智能、更强大。    传统的 Java EE 引导机制是预加载数据库。这可能是为了填充偏好设置类型的表，或者加载一些示例数据。然而，Grails\
  \ 不仅允许填充数据库，如果需要，还可以填充 servlet 上下文。你可以为引导文件使用实际的 Groovy 代码，而不是像 JPA 中那样只使用 SQL 代码。\
  \    在本章添加安全性时，我们将需要对数据库进行一些预填充。原因之一是我们将把权限存储在数据库中。此外，我们希望为示例预填充一些用户。    引导本身相对容易。以下是\
  \ `Bootstrap.groovy` 文件中最小代码的示例：    ```    class BootStrap {        def init = {\
  \ servletContext ->        } } ```    `init` 方法是应用程序将调用的方法，它会传入 `servletContext`。这将使我们能够访问\
  \ servlet 上下文，以防我们需要向其中添加数据。在此上下文中，我们可以执行常规的数据库插入操作来添加示例数据。例如，要插入一个用户，你可以添加以下代码行：\
  \    ``` new User(userName: 'joseph', firstName: 'Joseph', lastName: 'Nusairat',\
  \  email: 'jnusairat@integrallis.com', password: pass).save() ```    你只需实例化一个 `new\
  \ User`，然后保存它。这种添加数据的方法将在本章和本书其余部分中保持一致。    虽然使用引导文件可以成为预热数据库的有用工具，但如果你在完整的开发、测试或生产环境中使用它，你应该考虑一个额外的事项。如果你使用它来准备静态表（如角色或权限名称），这些是全局性的约束。但是，如果你要准备示例数据（如用户和待办事项），你肯定不希望这些数据出现在生产数据库中。幸运的是，在\
  \ Grails 中，有一种简单的方法可以配置你的引导文件，使其仅写入不同的环境。你可以检测打包应用程序的环境，并在引导文件中指定该变量。例如，使用以下代码，你可以为开发和生产环境创建通用方法或自定义方法：\
  \    ``` import grails.util.GrailsUtil . . .  switch(GrailsUtil.environment) {     case\
  \ \"development\":         configureForDevelopment()         break     case \"production\"\
  :         configureForProduction()         break } ```    在本章中，我们不会展示完整的 `Bootstrap.groovy`\
  \ 文件，但会展示我们添加到其中的部分内容。    Grails 安全解决方案概述    目前电视上有两档热门节目：《天桥骄子》和《地狱厨房》。这些节目有各自领域的专家（设计师或厨师），他们被赋予创造独特而令人惊叹的作品的任务，然后他们的努力成果会被评判。决定哪个是最好的，或者至少，哪个是每位评委最喜欢的。安全性，尤其是\
  \ Grails 中的安全性，与此类似。该领域有许多专家创建了不同的安全框架，各有优缺点，你必须判断哪个更好。    Grails 确实是一个独特的 Java\
  \ 框架。虽然一些框架因底层代码不稳定而受到影响，但 Grails 没有这个问题，因为它的核心使用了两个成熟的框架（JBoss Hibernate 和 Spring）。然而，它受限于其新颖性，这导致其缺乏\
  \ 100% 成熟的插件。\n\n\n\n尽管这些插件的开发者正努力跟上 Grails 的更新步伐，但所有插件都相对较新，其 `.1` 或 `.2` 的版本号便足以说明这一点。因此，在使用这些插件时，你可能会遇到一些尚不完善的功能。就像我们最爱的电视节目一样，在安全插件领域，很少有一个明确的赢家，而且很可能永远也不会有。每个插件都服务于特定的细分市场。选择哪一个取决于你的具体需求。\n\
  \n本章将探讨的 Grails 安全插件包括 CAS 和 Spring Security。此外，我们还将演示如何实现自定义安全机制，这对于简单的网站或控制严格的复杂网站都很适用。\n\
  \n我们将从自定义安全实现开始，然后介绍不同的插件（请注意，讨论解决方案的顺序完全是随意的，并不暗示哪个更优）。最后，我们将选择 Spring Security\
  \ 插件作为我们的解决方案，因为它能满足本章开头概述的需求。\n\n由于本章的方法论是展示多条路径，但只深入其中一条，因此我们决定在代码示例上做一些调整。在上一章中，我们为领域模型添加了不少内容。从纯粹的安全角度来看，其中大部分是不必要的。我们认为没有必要在此处增加这种复杂性。\n\
  \n当我们讨论这些插件时，首先会注意到的一点是，许多插件都有自己的 `User` 类。这可能会带来一个问题，因为你希望将领域中的 `User` 对象与插件的用户类关联起来。你需要在认证过程中解决这个问题，而解决这个问题主要有两种方法：\n\
  \n*   如果领域模型是在插件创建之后创建的，那么插件创建的用户领域对象集可以移动到 `grails-app/domain` 目录中，或者在应用程序中直接引用。移动它们的唯一原因是如果你想对领域进行修改。\n\
  *   你可以让插件的领域对象和你的领域对象在认证后通过用户名进行关联。由于这是一个唯一字段，在认证验证通过后，你可以在数据库中查找你的用户，并将该用户保存到会话中。这很好地平衡了保持应用程序解耦与完全依赖插件进行安全控制之间的关系。这也是我们在本章中采用的方法。\n\
  \n**自定义安全实现**\n\n我们从保护网站最基本的方法开始，即我们的自定义安全实现。但使用简单的安全机制并不意味着你的网站很简单。两者之间并没有直接关系。关键在于为你的应用程序选择合适的安全方案。\n\
  \n![image](img/sq.jpg) **注意**  *自定义实现*这个术语可能有点令人困惑。这种方法并非真正的“自定义”。许多应用程序都采用相同的方法。事实上，这是一种非常常见的实现。我们称之为自定义，是因为它没有使用安全插件（除了验证码插件）。\n\
  \n任何基于用户的应用程序的主要需求之一就是验证用户身份。在我们的应用程序中，大部分页面都由访问页面的用户驱动。显示的待办事项仅针对登录用户，用户为自己添加好友列表，等等。我们还需要确保用户在访问除登录页面之外的任何页面之前都已通过身份验证。这是一个相当简单的认证模式，我们将使用会话中的\
  \ `User` 对象来检查对页面的访问权限。（我们也会在其他插件中使用会话中的 `User` 对象，但区别在于我们不会将其用于页面级别的认证目的。）\n\n\
  在本节中，我们将调整用户创建流程。\n\n请注意，对于我们的自定义安全实现，我们不需要任何新的领域类。我们将使用在第 5 章中创建的领域类。我们的主要焦点是操作\
  \ `User` 类。现在，我们将添加密码确认和验证码挑战。\n\n**验证码**\n\n虽然你可能不熟悉 *CAPTCHA* 这个术语，但你可能遇到过这种挑战。例如，你可能访问过一个网站，看到了类似这样的图片：\n\
  \n![9781430248064_unFig07-01.jpg](img/9781430248064_unFig07-01.jpg)\n\n这张图片是验证码（全自动区分计算机和人类的图灵测试）的一部分。系统会要求你输入图片中看到的文本。其目的是帮助防止自动化计算机程序访问你的网站，并且在大多数情况下，验证码是有效的。它们并非牢不可破，但根据验证码的复杂程度，解码图像需要一个相当复杂的神经网络。验证码被用于各种网站。例如，`ticketmaster.com`\
  \ 就有一套相当复杂的验证码（我们承认在该网站上错过过几次）。\n\n即使是简单的网站也容易受到垃圾邮件发送者的攻击。当我们推出公司网站 `http://www.integrallis.com`\
  \ 时，几天之内，我们就通过“联系我们”链接收到了垃圾邮件。自从我们添加了验证码后，收到的邮件都来自真实用户。\n\n为了创建自定义安全解决方案，我们将涵盖其设计和实现的三个方面：\n\
  \n*   注册用户\n*   用户登录和注销\n*   保护控制器\n\n**注册用户**\n\n为了注册用户，我们需要添加两个项目：一个注册页面（`register.gsp`）和一个在\
  \ `UserController` 中注册用户的操作。如前所述，我们将在注册页面上使用验证码挑战，因此我们需要安装相应的插件。\n\n**安装验证码插件**\n\
  \n验证码仅添加到注册页面，因为它是网站上唯一容易受到垃圾邮件发送者影响的页面。应用程序的其他部分要求用户在访问页面之前先进行身份验证。\n\n对于带有验证码的注册页面，我们将使用\
  \ Simple Captcha 插件²来创建验证码。要从命令行或 GGTS 的命令行安装该插件，请使用以下命令：\n\n``` > grails install-plugin\
  \ simple-captcha ```\n\n或者，你也可以使用 Grails 插件管理器，如图 7-2 所示。\n\n![9781430248064_Fig07-02.jpg](img/9781430248064_Fig07-02.jpg)\n\
  \n图 7-2 . 使用 Grails 插件管理器安装 simple-captcha 插件\n\n**JCAPTCHA**\n\n实际上，还有一个更高级的验证码插件叫做\
  \ JCaptcha。³ 它允许对验证码的外观输出进行更多自定义。它还允许你使用 `.wav` 文件验证码（适用于有视力障碍的网络用户）。\n\nJCaptcha\
  \ 确实需要更多的配置，因此我们在此没有包含它。但我们强烈建议在生产环境中使用它，因为已有针对无法供盲人使用的网站提起的诉讼。\n\n现在 Grails 验证码插件和上一章的领域对象都已安装完毕，是时候让它运行起来了。让我们从注册页面部分开始。\n\
  \n**实现注册页面**\n\n我们的注册页面看起来会像添加用户的页面，只是多了一个确认密码的字段和验证码图片。因此，我们首先将文件 `views/user/add.gsp`\
  \ 复制到 `register.gsp`。这样可以保留 `add.gsp` 页面。\n\n清单 7-1 展示了 `register.gsp` 的代码，其中密码确认和验证码链接的新部分以粗体显示。\n\
  \n***清单 7-1.*** register.gsp 的表单部分。\n\n\n\ngsp    ``` <g:form action=\"handleRegistration\"\
  \ method=\"post\"> <div class=\"dialog\"> <table> <tbody> <tr class='prop'> <td\
  \ valign='top'class='nameClear'> <label for=\"login\">登录名：</label> </td> <td valign='top'\
  \                class='valueClear ${hasErrors(bean:user,field:'userName','errors')}'>\
  \ <input type=\"text\" name=\"userName\" /> </td> </tr> <tr class='prop'> <td valign='top'\
  \ class='nameClear'> <label for=\"password\">密码：</label> </td> <td valign='top'\
  \                class='valueClear ${hasErrors(bean:user,field:'password','errors')}'>\
  \ <input type=\"password\" name=\"password\" /> </td> </tr> <tr class='prop'> <td\
  \ valign='top' class='nameClear'> <label for=\"confirm\">确认密码：</label> </td> <td\
  \ valign='top'                class='valueClear                       ${hasErrors(bean:user,field:'password','errors')}'>\
  \ <input type=\"password\" name=\"confirm\" /> </td> </tr> <tr class='prop'> <td\
  \ valign='top' class='nameClear'> <label for=\"firstName\">名字：</label> </td> <td\
  \ valign='top'                  class='valueClear                         ${hasErrors(bean:user,field:'firstName','errors')}'>\
  \ <input type=\"text\" name=\"firstName\" /> </td> </tr> <tr class='prop'> <td valign='top'\
  \ class='nameClear'> <label for=\"lastName\">姓氏：</label> </td> <td valign='top'\
  \       class='valueClear ${hasErrors(bean:user,field:'lastName','errors')}'> <input\
  \ type=\"text\" name=\"lastName\" /> </td> </tr> <tr class='prop'> <td valign='top'\
  \ class='nameClear'> <label for=\"email\">电子邮件：</label> </td> <td valign='top'       class='valueClear\
  \ ${hasErrors(bean:user,field:'email','errors')}'> <input type=\"text\" name=\"\
  email\" /> </td> </tr> <tr class='prop'> <td valign='top' class='nameClear'> <label\
  \ for=\"code\">输入验证码：</label> </td> <td valign='top' class='valueClear'> <input\
  \ type=\"text\" name=\"captcha\"><br/> <img src=\"${createLink(controller:'captcha',\
  \ action:'index')}\" /> </td> </tr> </tbody> </table> </div>  <div class=\"buttons\"\
  > <span class=\"button\"> <input class=\"save\" type=\"submit\" value=\"注册\"></input>\
  \ </span> </div> </g:form> ```    包含 `CAPTCHA` 引用的那一行是插件的 CAPTCHA 控制器。该控制器会生成一个单词，将单词以明文形式保存到会话变量中，然后以扭曲的方式输出图像。图\
  \ 7-3 展示了注册页面。    ![9781430248064_Fig07-03.jpg](img/9781430248064_Fig07-03.jpg)\
  \    图 7-3 .  包含密码确认和 CAPTCHA 图像的 register.gsp 页面\n\n向控制器添加注册操作\n\n将 CAPTCHA 放在\
  \ GSP 页面上只是创建 CAPTCHA 挑战的一半工作。另一半工作是在服务器端处理它。遗憾的是，当用于验证图像时，没有任何机制能自动拦截 CAPTCHA。我们需要手动编写代码。\n\
  \n在我们的 `UserController` 注册操作中，我们将添加一个检查，以确保用户输入的 CAPTCHA 与给定的 CAPTCHA 匹配。您可以在清单\
  \ 7-2 中看到我们的注册操作。该操作会检查 CAPTCHA 是否匹配，如果通过验证，则允许用户注册。\n\n***清单 7-2.***  在 UserController\
  \ 中注册用户的操作\n\n``` def handleRegistration(){\n                def user = new User()\n\
  \                log.info(\"HANDLE REGISTRATION\")\n                // 使用 log.info\
  \ 只会打印出对象，而不是其列表\n                println params\n                // 创建属性对象\n  \
  \              user.properties = params\n                // 处理验证码请求\n          \
  \      boolean captchaValid = simpleCaptchaService.validateCaptcha(params.captcha)\n\
  \                if (captchaValid) {\n                  if(params.password != params.confirm)\
  \ {\n                        flash.message = \"您输入的两次密码不匹配！\n\n\"\n            \
  \            render(view:'register', model:[user:user])\n                  }\n \
  \                 else if (user.password?.length() <= 3) {\n                   \
  \     flash.message = \"密码长度不足 3 个字符。\"\n                        render(view:'register',\
  \ model:[user:user])\n                  } else {\n                        log.info\
  \ \"before save\"\n                        // 让我们对密码进行哈希处理\n                   \
  \     user.password = DU.md5Hex(user.password)  \n                        if(user.save())\
  \ {\n                                // 同时将此用户添加到权限系统\n                        \
  \        //def userAuth = Authority.findByAuthority(\"ROLE_USER\")\n           \
  \                     //userAuth.addToPeople(user)\n                           \
  \     // 不确定是否需要保存。\n                                //userAuth.save()  \n     \
  \                           // 发送确认邮件\n                                //sendAcknowledgment\
  \ (user)\n                                log.info \"saved redirecting to user controller\"\
  \  \n                                // 当他们访问内部页面时，无论如何都会提示他们登录。\n             \
  \                   redirect(controller:'todo')\n                        }\n   \
  \                     else {\n                                log.info \"didn't\
  \ save\"\n                                println \"didn't save\"\n            \
  \                    flash.user = user\n                                render(view:'register',\
  \ model:[user:user])\n                        }\n                  }\n         \
  \       }\n                else {\n                        log.info \"Captcha Not\
  \ Filled In\"\n                        flash.message = \"访问码不匹配。\"\n           \
  \             render(view: 'register', model:[user:user])\n                }\n \
  \       } ```\n\n您可能会注意到，创建的 CAPTCHA 位于会话作用域中。遗憾的是，在撰写本文时，这是允许图像生成多个请求所必需的（随着插件创建后一些新的服务级作用域的出现，这一要求将来可能会改变）。我们通过将会话中的数据保存到局部变量，然后从该会话中移除\
  \ CAPTCHA 信息，稍微解决了这个问题。\n\n此外，您会注意到，为了方便起见，我们将 `session.user` 设置为刚刚创建的用户。我们这样做是因为一旦用户登录，我们希望其他页面能够知道这一点。此信息可用于显示用户名，或仅用于获取查询所需的\
  \ ID。\n\n还要注意，我们对密码进行了哈希处理。正如本章前面提到的，哈希处理是一个关键步骤，因为我们不希望将密码以明文形式保存在数据库中。\n\n![image](img/sq.jpg) **注意**  请记住，许多人在多个站点使用相同的密码。如果您存储了明文密码并且您的站点遭到入侵，您可能会将用户的密码暴露给各种站点，从而暴露有价值的数据。一个缺点（这是否算缺点尚有争议）是，如果您有密码提醒功能，它无法提醒用户他们的密码；相反，它只需要将密码重置为一个随机字符串。\n\
  \n登录和注销\n\n现在用户已经注册，下一步是让用户登录和注销。根据您的后端系统，这可能很困难。登录可能涉及通过 LDAP 服务器或您使用的任何其他系统。然而，对于我们的示例来说，登录相对简单，因为我们只是针对本地数据库进行身份验证。\n\
  \n我们将保留之前登录页面的整体风格，只是现在用户不再从下拉列表中选择，而是必须输入正确的用户名和密码。修改后的登录页面如图 7-4 所示。\n\n![9781430248064_Fig07-04.\n\
  \n\n\njpg](images/9781430248064_Fig07-04.jpg)    图 7-4 .  带有用户名和密码验证的登录页面    如代码清单\
  \ 7-3 所示，我们在数据库中检查用户和密码是否匹配，并使用 MD5 哈希对前端传入的密码进行哈希处理。如果未找到用户，我们会向页面发送一条消息，并重定向回登录页面。如果找到匹配项，我们会在会话中设置该用户，并重定向到待办事项页面。\
  \    ***代码清单 7-3.***  LoginController 的 handleLogin 操作    ``` def handleLogin(){\
  \ println \"Handle Login\"         def hashPassd = DU.md5Hex(params.password) println\
  \ params.userName println params.password          // 查找用户名         def user = User.findByUserNameAndPassword(params.userName,\
  \ hashPassd)          if (!user) {             flash.message = \"未找到用户名为 ${params.userName}\
  \ 的用户\"             redirect(action:'index')             return         } else {\
  \             session.user = user             redirect(controller:'todo')         }\
  \     } ```    ![image](img/sq.jpg) **注意** 你会注意到我们只发送了一条通用消息。有些网站会先搜索用户，然后再检查密码。这样做是为了向用户返回更具体的消息。虽然这对用户有帮助，但这也是另一个暴露点——它可能会告诉潜在的黑客其尝试的哪一部分成功了。\
  \    在网页设计中，注销是一个相当通用的过程，我们在这里实现的方式很可能与你见过的其他 Web 应用程序中的方式相同。唯一的区别可能在于注销前的预处理，例如发送通知、写入事件表等。然而，我们的系统不需要这些。我们只需使会话失效并重定向到首页即可。注销操作的代码如代码清单\
  \ 7-4 所示。    ***代码清单 7-4.***  LogoutController 的注销操作    ``` def logout() { log.info\
  \ 'logout'         if(session.user) {                         session.user = null\
  \                         session.invalidate()                         redirect(controller:'login')\
  \                 }         } ```    保护控制器    到目前为止，我们已经介绍了登录、退出网站以及注册用户的功能。这是保护网站的前两个步骤。现在还剩什么？我们需要保护实际的控制器页面，以便未经身份验证的用户无法访问\
  \ `TodoController` 和其他控制器。注册、登录和退出的代码编写相对简单。控制器安全是我们身份验证模型中稍微困难的部分。    我们将使用久经考验的\
  \ Servlet 技术——过滤器来控制对页面的访问。过滤器非常适合简单、全面的过程拦截。由于除了三个页面（首页、登录页面和注册页面除外）之外，所有页面都需要会话，因此过滤器是实现访问控制最经济、最有效的方式。\
  \    在 Grails 中创建过滤器相对容易。与 Servlet 过滤器不同，它们不需要任何 `web.xml` 配置。在这里，我们将逐步介绍创建过滤器的步骤。\
  \    ![image](img/sq.jpg) **注意** 我们将在本章介绍的其他安全解决方案中使用过滤器。此处的配置也适用于那些其他解决方案。    让我们从过滤器的名称和位置开始。过滤器必须放在\
  \ `grails-app/conf` 目录中，并且 Groovy 类的名称必须以单词 `Filters` 结尾。由于我们的过滤器用于安全，我们将文件命名为 `SecurityFilters`：\
  \    ``` class SecurityFilters { } ```    下一步是定义过滤器。我们将定义一个名为 `filters` 的操作。\n\n\
  这是 Grails 框架用来查找我们创建的所有过滤器的方法：    ``` class SecurityFilters {     def filters =\
  \ {     } } ```    设置好过滤器的框架后，现在我们定义过滤器。我们可以在同一个类中定义一个或多个过滤器。如果你以前编写过常规的 Servlet\
  \ 过滤器，你会意识到这是一个巨大的优势；使用常规的 Servlet 过滤器，你必须为每个过滤器定义一个不同的类。你可以通过运行以下命令在名为 `grails-app/conf/SecurityFilters.groovy`\
  \ 的类中创建一组新的过滤器：    ``` > grails create-filters security ```    运行此命令的结果是，将生成代码清单\
  \ 7-5 中所示的 `SecurityFilters` 类。    ***代码清单 7-5.***  创建安全过滤器    ``` class SecurityFilters\
  \ {      def filters = {         all(controller:'*', action:'*') {             before\
  \ = {              }             after = { Map model ->              }             afterView\
  \ = { Exception e ->              }         }     } } ```    你可以创建两种类型的过滤器：    *\
  \   更传统的类型，你定义要拦截的 URI，如下所示：`uriCheck(uri: /user/*)`。每当有人调用任何包含 `/user` URI 的内容时，定义此检查的方法都会被拦截。\
  \ *   基于控制器和操作进行捕获。这样，你可以捕获所有控制器和操作，或者只捕获特定的控制器和操作。这就是我们将采用的方法。    对于我们的应用程序，我们可以捕获所有控制器，或者有选择地单独捕获某些控制器。我们选择了全面捕获的方法，并在代码中忽略登录和注册页面。否则，如果我们稍后添加更多控制器，我们将需要不断向每个过滤器添加登录检查代码，这可能会很快变得混乱，具体取决于我们向网站添加了多少功能。代码清单\
  \ 7-6 显示了过滤器的最终定义。    ***代码清单 7-6.***  用于保护应用程序的过滤器    ```     def filters = {         collabTodoFilter(controller:'*',\
  \ action:'*') {             before = {                 if(!session.user                   &&\
  \ !controllerName.equals('login')                   && !controllerName.equals('captcha')\
  \                   && (!controllerName.equals('user')                   && !actionName.equals(\"\
  register\"))                   ) {                     // 过滤器中无日志访问                     //log.info('重定向到登录页面')\
  \                     redirect(controller:'login')                     return false\
  \                }            }         }    } ```    在这里，我们检查会话以及控制器和操作的名称。`controllerName`\
  \ 告诉我们刚刚访问了哪个控制器。`actionName` 告诉我们访问了哪个操作。Grails 注入了一些属性，并使它们在过滤器中可访问，包括以下内容：  \
  \  *   `request` *   `response` *   `session` *   `servletContext` *   `applicationContext`\
  \ *   `params`    我们的自定义安全解决方案是一个相当轻量级的安全包装器。对于许多应用程序，你只需要担心用户是否已登录，而这个解决方案正好处理了这一点。\
  \    然而，一些应用程序有更复杂的需求。例如，银行应用程序可能有一个管理部分。管理员可以像普通用户一样登录到同一个应用程序，以便在必要时可以模拟特定用户（例如，在客户使用在线应用程序遇到问题时提供帮助）。同时，你*不希望*管理员能够执行某些操作，例如实际提交付款。创建这样的解决方案需要的不仅仅是简单的身份验证。\n\
  \n\n\n这需要分配角色和权限，然后根据角色和权限授予每个任务访问权。本章剩余部分介绍的插件为此类安全机制提供了支持。\n\n**CAS**\n\n我们的第三个选项与其他选项不同，它是唯一一个不能作为独立解决方案运行的选项。CAS\
  \ Grails 插件是对 Java CAS 客户端⁴的一个相当简单的封装，用于与 CAS 服务器配合使用。\n\nCAS 是耶鲁大学开发的中央认证服务器。它旨在支持单一认证系统。当您有多个组织或系统希望针对同一系统进行认证时，这非常有用。例如，一家保险公司可能销售房屋保险、汽车保险、投资账户和定期寿险。这些业务可能由不同的业务部门运营。每个业务部门都会开发自己的网站，以便其用户能够访问各自的账户。拥有此类架构的公司面临的最大挑战之一是避免让这些网站看起来完全独立。它们应该支持单点登录。如果用户必须为不同的系统反复注册并使用不同的用户名和密码，他们会感到厌烦。\n\
  \n企业多应用开发的另一个问题是，这些应用程序可能并非全部使用同一种语言编写。CAS 与提供商无关，可以被多种语言使用。这意味着您可以拥有一个 .NET 应用程序、一个\
  \ Java 应用程序和一个 Rails 应用程序，它们都使用相同的认证方式。\n\n由于我们的应用程序并非多应用环境的一部分，因此 CAS 提供的复杂程度是不必要的。在本节中，我们将介绍该插件的一些基本实现和用法。虽然您可以部署并运行示例代码，但它实际上不会对任何内容进行认证（我们没有\
  \ CAS 服务器）。\n\n![image](img/sq.jpg) **注意**  本节旨在演示该插件的使用，不应被视为 CAS 客户端/服务器教程。可能需要了解\
  \ CAS 客户端/服务器架构的基本知识才能完全理解该插件。要了解更多信息，请查看 CAS 主网站`.`⁵\n\n**CAS 安装**\n\nCAS 插件的安装很简单，并且不会在\
  \ `grails-app` 目录中创建任何额外的工件；所有创建的内容都在 `plugins` 目录中。您可以在 `http://grails.org/CAS+Client+Plugin`\
  \ 下载该插件，或使用以下命令安装它：\n\n```\n> grails install-plugin cas-client\n```\n\n**CAS 配置**\n\
  \n由于此应用程序使用外部认证系统，因此配置它相当简单。您只需定义 CAS 服务器的 URL。这些定义将放在 `grails-app/conf/Config.groovy`\
  \ 中，如列表 7-7 所示。\n\n***列表 7-7.***  包含 CAS 配置的 Config.groovy 文件\n\n```\n// cas 客户端配置，CasClientPlugin\
  \ 必需\ncas {\n    urlPattern = '/someurl/*'\n//    urlPattern = ['/oneurl/*', '/another',\
  \ '/anotheranother/*']\n    disabled = false\n}\n\n// log4j 配置\nlog4j {\n    //\
  \ . . . 为简洁起见已省略 . . .\n}\n\nenvironments {\n    development {\n        cas.loginUrl\
  \ = ' https://localhost:8080/casSecurity/login '\n        cas.validateUrl = ' https://localhost:8080/casSecurity/serviceValidate\
  \ '\n        cas.serverName = 'localhost:8080'\n        cas.serviceUrl = ' http://dev.casclient.demo.com/access\
  \ '\n        \n        log4j {\n            logger {\n                grails.'app.controller'=\"\
  trace,stdout,logfile\"\n                grails.app=\"error,stdout\"\n          \
  \  }\n        }\n    }\n    // . . . 生产环境和测试环境已省略 . . .\n}\n```\n\n在这里，我们向 `Config.groovy`\
  \ 文件添加了两个部分。第一个是 CAS 插件必需的项目，它定义了一个 URL 模式。第二个在 `environments` 部分，当您想要访问 CAS 服务器本身时，它很重要。它定义了所有用于过滤的\
  \ URL。这些属性再次进入 `web.xml`，但它们会在 Grails 应用程序编译期间自动添加。表 7-1 显示了额外的配置选项以及相应的 `web.xml\
  \ init-param` 值。\n\n表 7-1.  CAS URL 定义条目\n\n| Config.groovy 条目 | 必需 | Web.xml 引用值\
  \ |\n| --- | --- | --- |\n| `cas.urlPattern` | 是 |  |\n| `cas.loginUrl` | 是 | `edu.yale.its.tp.cas.client.filter.loginUrl`\
  \ |\n| `cas.validateUrl` | 是 | `edu.yale.its.tp.cas.client.filter.validateUrl` |\n\
  | `cas.serverName` | 是 | `edu.yale.its.tp.cas.client.filter.serverName` |\n| `cas.serviceUrl`\
  \ | 是 | `edu.yale.its.tp.cas.client.filter.serviceUrl` |\n| `cas.proxyCallbackUrl`\
  \ | 否 | `edu.yale.its.tp.cas.client.filter.proxyCallbackUrl` |\n| `cas.authorizedProxy`\
  \ | 否 | `edu.yale.its.tp.cas.client.filter.authorizedProxy` |\n| `cas.renew` | 否\
  \ | `edu.yale.its.tp.cas.client.filter.renew` |\n| `cas.wrapRequest` | 否 | `edu.yale.its.tp.cas.client.filter.wrapRequest`\
  \ |\n| `cas.disabled` | 否 |  |\n\n![image](img/sq.jpg) **警告**  `cas.serverName`\
  \ 和 `cas.serviceUrl` 是互斥的。您需要填写其中一个，但不能同时填写。\n\n此外，列表 7-7 还定义了一个字段——`cas.disabled`\
  \ 标志。它的作用正如您可能猜到的那样。如果将其设置为 `true`，则插件被禁用；如果设置为 `false`，则插件被启用。\n\n**CAS 使用**\n\n\
  CAS 安全性的使用完全取决于您。主要目标是为控制器获取已登录用户的名称。然后，您可以通过过滤器或扩展基础控制器类来保护控制器。列表 7-8 演示了如何从会话中获取用户。\n\
  \n***列表 7-8.***  从会话中检索用户名\n\n```\ndef username = session?.getAttribute(CASFilter.CAS_FILTER_USER)\n\
  ```\n\n然后，您可以在基类的拦截器中使用它来执行验证，或者在自定义过滤器中使用它来执行检查。\n\nCAS 安全插件非常易于使用，并允许针对中间系统进行简单的认证。正如我们指出的，在您关心认证的大型企业系统中，这可能非常有用。\n\
  \n**Spring Security**\n\n最后但同样重要的是，我们将讨论如何使用 Spring 产品组合中久经考验的宠儿——Spring Security——在\
  \ Grails 中实现安全性。Spring Security 框架是 Spring 框架的一个子项目，旨在为开发人员提供一个在使用 Spring 时处理安全问题的单一位置。\n\
  \nSpring Security 的灵活性是其在使用 Spring 应用程序安全性方面日益流行的主要原因之一。（请记住，Grails 使用 Spring 作为其控制反转（IoC）模式，因此，Grails\
  \ 在很多方面都是一个美化的 Spring 应用程序。）Spring Security 插件简化了将 Spring Security（前身为 Acegi Security）集成到\
  \ Grails 应用程序中的过程。该插件提供了默认值以及许多用于自定义的配置选项。Spring Security 插件将其配置保存在标准的 `Config.groovy`\
  \ 文件中。默认值位于插件的 `grails-app/conf/DefaultSecurityConfig.groovy` 文件中，您可以将特定于应用程序的值添加到\
  \ `grails-app/conf/Config.groovy` 文件中。这两个配置将被合并，应用程序值将覆盖默认值。\n\n安装 `spring-security-core`\
  \ 插件是一个相对无痛的过程。要么使用 Grails 插件管理器（如[图 7-5](#9781430248064_Ch07.\n\n\n\nxhtml#Fig5)）或执行以下命令：\
  \    ``` > grails install-plugin spring-security-core ```    ![9781430248064_Fig07-05.jpg](img/9781430248064_Fig07-05.jpg)\
  \    图 7-5 .  使用 Grails 插件管理器安装 spring-security-core 插件    安全领域类    默认情况下，该插件使用常规的\
  \ Grails 领域类来访问其所需数据。要使用标准的用户查找功能，你至少需要一个“人员”领域类和一个“权限”领域类。此外，如果要将 URL`<`−`>`角色映射存储在数据库中，你还需要一个“请求映射”领域类。如果你使用推荐的方法来映射“人员”和“权限”之间的多对多关系，你还需要一个领域类来映射连接表。我们可以使用\
  \ `s2-quickstart` 脚本来创建初始领域类，如下所述。该脚本的一般格式为：    ``` > grails s2-quickstart DOMAIN_CLASS_PACKAGE\
  \ USER_CLASS_NAME ROLE_CLASS_NAME [REQUESTMAP_CLASS_NAME] ```    例如，在 图 7-6 所示的\
  \ GGTS 命令中，第 7 章 是包名，`SecurityUser` 是用户类，`Role` 是角色类。请求映射类在命令中是可选的，我们将在本节后面讨论它。\
  \    ![9781430248064_Fig07-06.jpg](img/9781430248064_Fig07-06.jpg)    图 7-6 .  运行\
  \ s2-quickstart 脚本    输出结果为：    ``` | Loading Grails 2.1.0 | Configuring classpath.\
  \ | Environment set to development..... | Packaging Grails application..... | Compiling\
  \ 1 source files.....  Creating User class SecurityUser and Role class Role in package\
  \ chapter 7. | generated D:\\devl\\workspace\\chapter 7 \\grails-app\\domain\\chapter\
  \ 7 \\SecurityUser.groovy. | generated D:\\devl\\workspace\\chapter 7 \\grails-app\\\
  domain\\chapter 7 \\Role.groovy. | generated D:\\devl\\workspace\\chapter 7 \\grails-app\\\
  domain\\chapter 7 \\SecurityUserRole.groovy..... | *******************************************************\
  \ * Created domain classes, controllers, and GSPs. Your * * grails-app/conf/Config.groovy\
  \ has been updated with ** the class names of the configured domain classes;   *\
  \ * please verify that the values are correct.          * *******************************************************\
  \ ```    `s2-quickstart` 脚本会在指定的包中创建一个用户类和一个角色类（以及可选的请求映射类）。我们在脚本中指定包名和类名，它就会创建相应的领域类。我们还可以通过添加不限数量的字段、方法等来自定义脚本，只要核心的安全相关功能保持不变即可。在接下来的几节中，我们将详细介绍这些初始领域类。\
  \    人员类    Spring Security 使用一个身份验证对象来确定当前用户是否有权执行受保护的操作，例如访问 URL、操作受保护的领域对象、访问受保护的方法等。该对象在登录时创建。通常，对身份验证数据的需求与在应用程序中以与安全无关的方式表示用户的需求之间存在重叠。默认情况下，该插件使用一个\
  \ Grails “人员”领域类来管理这些数据。该类名为 `Person`，并且 `username`、`enabled` 和 `password` 是所需属性的默认名称。你可以轻松地插入自己的实现，并重命名类、包和字段。此外，你应该定义一个\
  \ `authorities` 属性来检索角色；这可以是一个公共字段或一个 `getAuthorities()` 方法，并且可以通过传统的 GORM 多对多映射或自定义映射来定义。清单\
  \ 7-9 显示了由 `s2-quickstart` 脚本生成的 `User` 类。    ***清单 7-9.\n\n***  由 s2-quickstart\
  \ 脚本生成的人员类    ``` package chapter 7  class SecurityUser {  \t\ttransient springSecurityService\
  \  \t\tString username \t\tString password \t\tboolean enabled \t\tboolean accountExpired\
  \ \t\tboolean accountLocked \t\tboolean passwordExpired  \t\tstatic constraints\
  \ = { \t\t\tusername blank: false, unique: true \t\t\tpassword blank: false \t\t\
  }  \t\tstatic mapping = { \t\t\tpassword column: 'password' \t\t}  \t\tSet<Role>\
  \ getAuthorities() { \t\t\tSecurityUserRole.findAllBySecurityUser(this).collect\
  \ { it.role } as Set \t\t}  \t\tdef beforeInsert() { \t\t\tencodePassword() \t\t\
  }  \t\tdef beforeUpdate() { \t\t\tif (isDirty('password')) { \t\t\t\tencodePassword()\
  \ \t\t\t} \t\t}  \t\tprotected void encodePassword() { \t\t\tpassword = springSecurityService.encodePassword(password)\
  \ \t\t} } ```    `getAuthorities()` 方法类似于在传统的多对多映射中定义静态的 `hasMany = [authorities:\
  \ Authority]`。这样，`GormUserDetailsService` 就可以在登录期间调用 `user.authorities` 来检索角色，而无需承担双向多对多映射的开销。\
  \    权限类    Spring Security 插件还需要一个“权限”类来表示用户在应用程序中的角色。通常，该类将 URL 访问权限限制为已被分配了所需访问权限的用户。一个用户可以拥有多个角色来表示应用程序中的各种访问权限，并且至少应拥有一个角色。与“人员”类类似，“权限”类有一个默认名称\
  \ `Authority`，并且其唯一必需属性也有一个默认名称 `authority`。如果你想使用另一个现有的领域类，它只需要有一个用于名称的属性即可。与类名一样，属性的名称可以是任何你想要的——它们在\
  \ `grails-app/conf/Config.groovy` 中指定。    清单 7-10 显示了由 `s2-quickstart` 脚本生成的 `Authority`\
  \ 类。    ***清单 7-10.***  由 s2-quickstart 脚本生成的权限类    ``` package chapter 7   class\
  \ Role {  \t\tString authority  \t\tstatic mapping = { \t\t\tcache true \t\t}  \t\
  \tstatic constraints = { \t\t\tauthority blank: false, unique: true \t\t} } ```\
  \    人员权限类    映射“人员”和“权限”之间关系的典型方法是多对多关系。用户拥有多个角色，而角色被多个用户共享。这种方法在 Grails 中可能会出现问题，因为一个流行的角色（例如\
  \ `ROLE_USER`）会被授予给应用程序中的许多用户。GORM 使用集合来管理相关实例的添加和删除，并双向映射多对多关系。将角色授予一个用户需要加载所有拥有该角色的现有用户，因为该集合是一个\
  \ Set。因此，即使不存在唯一性问题，Hibernate 也会加载所有用户以强制执行唯一性。该插件推荐的方法是将一个领域类映射到管理多对多关系的连接表，并使用它来授予和撤销用户的角色。\
  \    与其他领域类一样，这个类也是为你生成的，因此你无需处理映射它的细节。    除了这些领域类之外，`s2-quickstart` 脚本还会创建登录和注销功能。为了测试由\
  \ `s2-quickstart` 脚本创建的受保护登录功能，我们将测试数据添加到 `conf/Bootstrap.groovy` 中，如 清单 7-11 所示。\
  \    ***清单 7-11.***  Bootstrap.groovy 中的测试数据    ``` import chapter 7 .\n\n\n\n*\
  \   class BootStrap {          def init = { servletContext ->                  def\
  \ userRole = new Role(authority: 'ROLE_USER').save()                 String password\
  \ = 'password'                 def user = new SecurityUser(username: 'testUser',\
  \ password: password, enabled: true).save()                 SecurityUserRole.create\
  \ user, userRole, true         }          def destroy = {         } } ```    现在，你可以使用\
  \ `run-app` 运行应用程序，并点击 `LoginController` 链接，该链接会渲染出图 7-7 所示的界面。你可以使用我们在 `Bootstrap.groovy`\
  \ 中创建的 `username:testUser` 来测试登录功能。    ![9781430248064_Fig07-07.jpg](img/9781430248064_Fig07-07.jpg)\
  \    图 7-7 .  登录功能    Requestmap 类    （可选）使用此类将请求映射条目存储在数据库中，而不是通过注解或在 `Config.groovy`\
  \ 中定义它们。此选项使该类在运行时可配置；你可以在不重启应用程序的情况下添加、删除和编辑规则。    保护 URL 安全    保护 URL 安全需要将 URL\
  \ 模式映射到访问这些 URL 所需的角色。你可以选择以下方法之一来为安全的应用程序 URL 配置请求映射。    *   `@Secured` 注解（默认方法）\
  \ *   `Config.groovy` 中的简单 Map *   存储在数据库中的 Requestmap 领域类实例    URL 和权限    在每种保护\
  \ URL 安全的方法中，你都需要为 URL 模式配置一个映射，将其映射到访问这些 URL 所需的角色；例如，`/admin/user/**` 需要 `ROLE_ADMIN`。此外，你还可以将角色与\
  \ `IS_AUTHENTICATED_ANONYMOUSLY`、`IS_AUTHENTICATED_REMEMBERED` 和 `IS_AUTHENTICATED_FULLY`\
  \ 等令牌结合使用。    表 7-2\\. 预配置的 Requestmap 属性     | 属性 | 描述 | | --- | --- | | `IS_AUTHENTICATED_FULLY`\
  \ | 要求用户通过显式登录进行完全认证 | | `IS_AUTHENTICATED_REMEMBERED` | 要求用户通过“记住我”cookie 或显式登录进行认证\
  \ | | `IS_AUTHENTICATED_ANONYMOUSLY` | 表示任何人都可以访问此 URL |    注解和 `Config.groovy`\
  \ Map 的灵活性较差，因为它们只在代码中配置一次，并且只能通过重启应用程序来更新（至少在 prod 模式下是这样）。实际上，这种限制影响不大，因为大多数应用程序的安全映射不太可能在运行时发生变化。\
  \    另一方面，存储 requestmap 条目可以实现运行时可配置性。这种方法为你提供了一组在应用程序启动时填充的核心规则，你可以根据需要编辑、添加和删除这些规则。但是，它将安全规则与应用程序代码分离，这不如将规则定义在\
  \ `grails-app/conf/Config.groovy` 或使用注解的相应控制器中方便。    定义安全注解    你可以在控制器中使用 `@Secured`\
  \ 注解（可以是标准的 `org.springframework.security.access.annotation.Secured`，也可以是插件的 `grails.plugins.springsecurity.Secured`，后者同样适用于控制器闭包操作）来配置哪些操作需要哪些角色。要使用注解，请指定\
  \ `securityConfigType=\"Annotation\"`，或者不指定，因为它是默认值：    ``` grails.plugins.springsecurity.securityConfigType\
  \ = \"Annotation\" ```    你可以在类级别定义注解，这意味着所有操作都需要指定的角色；也可以在操作级别定义，或者两者都定义。如果类和操作都使用了注解，则会使用操作注解的值，因为它们更具体。\
  \    Config.groovy 中的简单 Map    要使用 `Config.groovy` Map 来保护 URL 安全，首先指定 `securityConfigType=\"\
  InterceptUrlMap\"`：    ``` grails.plugins.springsecurity.securityConfigType = \"\
  InterceptUrlMap\" ```    在 `Config.groovy` 中定义一个 Map：    ``` grails.plugins.springsecurity.interceptUrlMap\
  \ = [    '/secure/**':    ['ROLE_ADMIN'],    '/finance/**':   ['ROLE_FINANCE', 'IS_AUTHENTICATED_FULLY'],\
  \    '/js/**':        ['IS_AUTHENTICATED_ANONYMOUSLY'],    '/css/**':       ['IS_AUTHENTICATED_ANONYMOUSLY'],\
  \    '/images/**':    ['IS_AUTHENTICATED_ANONYMOUSLY'],    '/*':            ['IS_AUTHENTICATED_ANONYMOUSLY'],\
  \    '/login/**':     ['IS_AUTHENTICATED_ANONYMOUSLY'],    '/logout/**':    ['IS_AUTHENTICATED_ANONYMOUSLY']\
  \ ] ```    使用此方法时，请确保规则顺序正确。将使用第一个匹配的规则，因此，例如，如果你有一个控制器具有一组规则，但某个操作具有更严格的访问规则（如下列代码所示），则会失败。\
  \    ``` '/secure/**':              ['ROLE_ADMIN', 'ROLE_SUPERUSER'], '/secure/reallysecure/**':\
  \ ['ROLE_SUPERUSER'] ```    它会失败，因为它不会限制具有 `ROLE_SUPERUSER` 的用户访问 `/secure/reallysecure/list`，因为第一个\
  \ URL 模式匹配，所以第二个将被忽略。正确的映射是：    ``` '/secure/reallysecure/**': ['ROLE_SUPERUSER']\
  \ '/secure/**':              ['ROLE_ADMIN', 'ROLE_SUPERUSER'], ```    存储在数据库中的 Requestmap\
  \ 实例    使用此方法时，你使用 `Requestmap` 领域类将映射条目存储在数据库中。`Requestmap` 有一个 `url` 属性，包含受保护的\
  \ URL 模式，以及一个 `configAttribute` 属性，包含一个逗号分隔的所需角色和/或令牌列表，例如 `IS_AUTHENTICATED_FULLY`、`IS_AUTHENTICATED_REMEMBERED`\
  \ 和 `IS_AUTHENTICATED_ANONYMOUSLY`。    要使用 `Requestmap` 条目，请指定 `securityConfigType=\"\
  Requestmap\"`：    ``` grails.plugins.springsecurity.securityConfigType = \"Requestmap\"\
  \ ```    你可以像在任何 Grails 领域类中创建条目一样创建 `Requestmap` 条目：    ``` new Requestmap(url:\
  \ '/js/**', configAttribute:'IS_AUTHENTICATED_ANONYMOUSLY').save() new Requestmap(url:\
  \ '/css/**', configAttribute:'IS_AUTHENTICATED_ANONYMOUSLY').save() new Requestmap(url:\
  \ '/images/**', configAttribute: 'IS_AUTHENTICATED_ANONYMOUSLY').save() new Requestmap(url:\
  \ '/login/**', configAttribute: 'IS_AUTHENTICATED_ANONYMOUSLY').save() new Requestmap(url:\
  \ '/logout/**', configAttribute: 'IS_AUTHENTICATED_ANONYMOUSLY').save() new Requestmap(url:\
  \ '/*', configAttribute: 'IS_AUTHENTICATED_ANONYMOUSLY').save() new Requestmap(url:\
  \ '/profile/**', configAttribute: 'ROLE_USER').save() new Requestmap(url: '/admin/**',\
  \ configAttribute: 'ROLE_ADMIN').save() new Requestmap(url: '/admin/role/**', configAttribute:\
  \ 'ROLE_SUPERVISOR').save() new Requestmap(url: '/admin/user/**', configAttribute:\
  \ 'ROLE_ADMIN,ROLE_SUPERVISOR').save() new Requestmap(url: '/j_spring_security_switch_user',\
  \                configAttribute: 'ROLE_SWITCH_USER,IS_AUTHENTICATED_FULLY').save()\
  \ ```    `configAttribute` 值可以是单个值，也可以是多个逗号分隔的值。在此示例中，只有具有 `ROLE_ADMIN` 或 `ROLE_SUPERVISOR`\
  \ 的用户才能访问 `/admin/user/**` URL，并且只有具有 `ROLE_SWITCH_USER` 的用户才能访问 `switch-user` URL（`/j_spring_security_switch_user`），此外，还必须进行完全认证；例如，不能使用“记住我”cookie。请注意，当指定多个角色时，用户必须至少拥有其中一个角色，但当将\
  \ `IS_AUTHENTICATED_FULLY`、`IS_AUTHENTICATED_REMEMBERED` 或 `IS_AUTHENTICATED_ANONYMOUSLY`\
  \ 与一个或多个角色结合使用时，意味着用户必须拥有其中一个角色并满足 `IS_AUTHENTICATED` 规则。    SecurityTagLib    该插件包含\
  \ GSP 标签库，以支持基于用户是否已认证和/或是否具有执行特定操作所需角色的条件显示。这些标签位于 sec 命名空间中，并在 `grails.plugins.springsecurity.SecurityTagLib`\
  \ 中实现。    表 7-3\\. Spring Security 核心插件标签库     | 标签 | 描述 | | --- | --- | | `sec:ifLoggedIn`\
  \ | 如果用户已认证，则显示内部主体内容。\n\n\n\n| | `sec:ifNotLoggedIn` | 如果用户未通过身份验证，则显示内部主体内容。 |\
  \ | `sec:ifAllGranted` | 仅当授予了所有列出的角色时，才显示内部主体内容。 | | `sec:ifAnyGranted` | 如果至少授予了列出的角色之一，则显示内部主体内容。\
  \ | | `sec:ifNotGranted` | 如果未授予任何列出的角色，则显示内部主体内容。 | | `sec:username` | 如果已登录，则显示身份验证用户名字段的值。\
  \ | | `sec:ifSwitched` | 仅当当前用户是从其他用户切换而来时，才显示内部主体内容。 | | `sec:ifNotSwitched` |\
  \ 仅当当前用户不是从其他用户切换而来时，才显示内部主体内容。 | | `sec:loggedInUserInfo` | 如果已登录，则显示指定身份验证字段的值。\
  \ | | `sec:access` | 如果指定的表达式计算结果为 true 或指定的 URL 被允许，则渲染主体内容。 | | `sec:noAccess`\
  \ | 如果指定的表达式计算结果为 false 或 URL 不被允许，则渲染主体内容。 | | `sec:switchedUserOriginalUsername`\
  \ | 如果当前用户是从其他用户切换而来，则渲染原始用户的用户名。 |    总结    安全性对任何应用程序都至关重要。虽然大多数 Grails 安全插件相对较新，但它们都基于经过时间考验的框架。安全领域范围广泛，有多种选择可供使用。像\
  \ Spring Security 这样的框架可以轻松添加访问控制。其他插件的介绍应能帮助您选择最适合自己应用程序的插件。    现在我们已经建立了安全机制，可以在下一章中引入更多用户功能，该章将涵盖\
  \ Ajax 和其他有趣的 Web 2.0 内容。    ¹ `http://commons.apache.org/codec/apidocs/org/apache/commons/codec/digest/DigestUtils.html`\
  \    ² `http://grails.org/Simple +Captcha+Plugin`    ³ `http://grails.org/JCaptcha\
  \ +Plugin`    ⁴ `http://www.ja-sig.org/products/cas/client/javaclient/index.html`\
  \    ⁵ `http://www.ja-sig.org/products/cas/`.    第 8 章    ![image](img/frontdot.jpg)\
  \    Web 2.0——Ajax 及其伙伴    到目前为止，在本书中，我们仅依靠一些基本元素来构建我们的网站，而截至目前，它已经功能完备。用户可以登录、创建待办事项等。虽然这些足以构成一个不错的应用程序，但好的应用程序并不能带来收入。网络上充斥着许多糟糕的应用程序，也有不少优秀的，但卓越的却寥寥无几。在本章及接下来的两章中，我们将尝试通过应用一些\
  \ Web 2.0 技术，为我们的 Web 应用程序增添一些卓越性。    我们所说的*卓越*是什么意思？有些开发者试图将所有的 Ajax 组件和所有能想到的\
  \ Web 2.0 概念都塞进他们的应用程序中。很多时候，这种方法会失败。最终你会把页面搞得复杂难用。在本章的示例中，我们将努力在增强页面功能和保持其可管理性之间取得平衡。我们添加的每个组件都将提供用户应该能够享受的功能。\
  \    我们将从添加一些 Web 2.0 功能的基本插件开始，循序渐进。接着，我们将添加一个邮件服务，本章和第 10 章（涵盖报表）中都会用到它。之后，我们将深入探讨一些经典的\
  \ Ajax，并展示 Ajax 在 Grails 中的灵活性。最后，我们将以一个 RSS 源收尾，如果你想在像 iGoogle 这样的 RSS 阅读器上显示待办事项，这会非常有用。\
  \    高级展示组件    在本节中，我们将专注于三个领域来丰富展示效果：    *   允许在待办事项备注中使用富文本。 *   使待办事项可搜索。 * \
  \  允许上传与待办事项关联的文件。\n\n为了添加这些功能，我们将利用 Grails 不断增长的插件列表。    添加富文本功能    目前，待办事项备注的输入方式有限。你无法设置文本样式（如斜体或粗体）或进行格式化（例如，创建项目符号列表）。添加一个富文本编辑器可以为网站提供接近\
  \ Microsoft Word 类型的功能。你不仅可以允许富文本，还可以让用户将图片、Flash 影片甚至文件上传到你的 Web 应用程序。CK 编辑器插件¹\
  \ 就是这类编辑器的一个很好的例子。你可以使用以下命令安装 `ckeditor`：    ``` >grails install-plugin ckeditor\
  \ ```    或者，你也可以使用 Grails 插件管理器，如图 8-1 所示。    ![9781430248064_Fig08-01.jpg](img/9781430248064_Fig08-01.jpg)\
  \    图 8-1 .  使用 Grails 插件管理器安装 CK 编辑器插件    要开始使用该插件，请在 `head` 和 `page` 部分添加 `ckeditor`\
  \ 标签，如清单 8-1 和清单 8-2 所示：    ***清单 8-1.***  将 ckeditor 标签添加到 head    ``` <head> .\
  \ . . <ckeditor:resources/> . . . </head> ```    ***清单 8-2.***  将 ckeditor 标签添加到\
  \ page    ``` <ckeditor:editor name=\"myeditor\" height=\"400px\" width=\"80%\"\
  > ${initialValue} </ckeditor:editor> ```    图 8-2 展示了嵌入到应用程序中的 CK 编辑器示例。虽然这，用波拉特的话说，“非常棒”，但对于我们的需求来说有点大材小用。不仅如此，它还可能破坏我们页面的一些流畅线条。\
  \    ![9781430248064_Fig08-02.jpg](img/9781430248064_Fig08-02.jpg)    图 8-2 .  CK\
