  \ | | `<g:layoutTitle>` | 显示装饰页面的标题，用于布局中 | | `<g:meta>` | 显示应用程序元数据属性 | | `<g:render>`\
  \ | 使用模板显示模型 | | `<g:renderErrors>` | 显示错误 | | `<g:pageProperty>` | 显示装饰页面的属性 |\
  \ | `<g:paginate>` | 为大量结果显示上一页/下一页按钮和面包屑导航 | | `<g:sortableColumn>` | 显示可排序的表格列\
  \ |    验证标签    验证标签用于显示错误和消息。表 5-10 包含了验证标签的概述。    表 5-10. Grails 验证标签     | 标签名称\
  \ | 标签描述 | | --- | --- | | `<g:eachError>` | 遍历错误 | | `<g:hasErrors>` | 检查 bean、模型或请求中是否存在错误\
  \ | | `<g:message>` | 显示一条消息 | | `<g:fieldValue>` | 显示具有数据绑定的 bean 的字段值 |    静态资源\
  \    Grails 2.0 与 Resources 插件集成，提供复杂的静态资源管理。该插件默认安装在新创建的 Grails 应用程序中。在应用程序中包含指向静态资源的链接的基本方法是使用`resource`标签。如下所示，这种简单的方法会创建一个指向文件的\
  \ URI。    ``` <g:resource dir=\"css\" file=\"main.css\" /> ```    然而，对于依赖多个 JavaScript\
  \ 和 CSS 库及框架（以及依赖多个 Grails 插件）的现代应用程序，Grails 提供了`r:require`和`r:layoutResources`，使您能够轻松创建高度优化的\
  \ Web 应用程序，这些应用程序在开发和生产环境中运行一致。接下来我们说明`r:require`和`r:layoutResources`的用法。    r:require\
  \    要使用资源，您的 GSP 页面必须指明它需要哪些资源模块。例如，要在您网站的任何页面中使用 jQuery（通过 jQuery 插件，该插件暴露了一个`jquery`资源模块），只需添加：\
  \    ``` <html> <head> <r:require module=\"jquery\"/> <r:layoutResources/> </head>\
  \ <body>       ... <r:layoutResources/> </body> </html> ```    这将自动包含 jQuery 所需的所有资源，并将它们放置在页面中的正确位置。但是，您不能单独使用`r:require`：如示例所示，您必须使用`<r:layoutResources/>`标签来实际执行渲染。\
  \    r:layoutResources    当您声明了 GSP 页面所需的资源模块后，框架需要在正确的时间渲染指向这些资源的链接。为了正确实现这一点，您必须在页面中（或者更常见的是在\
  \ GSP 布局中）包含两次`r:layoutResources`标签：    ``` <html> <head> <g:layoutTitle/> <r:layoutResources/>\
  \ </head> <body> <g:layoutBody/> <r:layoutResources/> </body> </html> ```    使顶部栏功能化\
  \    现在您已经有了布局，让我们使顶部栏功能化。您希望顶部栏为用户提供登录功能。一旦用户登录，顶部栏应显示用户名，并为用户提供注销功能。当用户选择“登录”链接时，应向他显示一个登录表单。\
  \    ![image](img/sq.jpg) **注意**  您最初构建的登录功能仅用于识别谁在使用系统。它并非旨在提供完整、健壮的安全系统。    登录视图\
  \    创建登录视图需要在适当的目录中创建一个 GSP。该 GSP 包含一个表单，该表单有一个用户名的单选字段和一个提交按钮。当用户提交选择时，表单会调用`UserController`上的`handleLogin`操作。图\
