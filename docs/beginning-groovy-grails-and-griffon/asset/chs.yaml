  \    图 8-6 .  搜索单词“task”的结果    \n\n允许文件上传\n\n某些 Web 应用程序允许用户上传文件。对于我们的应用程序，我们将为每个待办事项添加上传文件的功能，并允许之后检索（下载）该文件。上传的文件可以存储在应用服务器上，也可以存储在数据库本身中。在我们的示例中，我们希望将文件存储在数据库中，主要是因为这样简单，而且我们只处理一个文件，所以空间不是问题。\n\
  \n上传文件\n\nGrails 将使用 Spring 的文件上传功能来帮助上传文件。上传文件是一个相当简单的过程，需要以下步骤：\n\n1.  检查 `Todo`\
  \ 领域对象上的必要属性。\n2.  在我们的列表页面中添加一个上传链接。\n3.  在 Spring 的 `resources.xml` 文件中添加配置。\n\
  4.  在我们的控制器中创建必要的代码来存储和检索文件。\n\n为了存储数据，你只需要一个 `byte[]` 来存储数据。但是，当返回数据时，最终用户可能希望获得文件的原始名称。此外，明确返回的数据类型将有助于浏览器知道如何处理该数据。例如，如果它是一个\
  \ PDF，浏览器会自动知道将其作为 PDF 打开。为了处理这个问题，我们向 `Todo` 领域对象添加了变量 `associatedFile byte[]`\
  \ 以及 `filename` 和 `contentType` 的 `Strings`，如代码清单 8-4 所示。\n\n***代码清单 8-4.***  更新\
  \ Todo 领域对象 (在 domain/Todo.groovy 中)\n\n``` class Todo {     User owner     Category\
  \ category     String name     String note     Date createDate     Date startDate\
  \     Date dueDate     Date completeDate     Date lastModifiedDate     String priorityf    String\
  \ status     byte[] associatedFile     String fileName     String contentType     .\
  \ . . } ```\n\n一旦你重启服务器，它会自动在数据库中创建一个 BLOB 条目，如果你使用的是 MySQL，则会创建 TINYBLOB。\n\n下一步是在我们的页面中添加一个用于上传文件的部分。如代码清单\
  \ 8-5 所示，我们在截止日期之后添加了一个文件上传标签。\n\n***代码清单 8-5.***  Todo 的文件上传标签 (在 views/todo/list.gsp\
  \ 中)\n\n``` <tr class='prop'> <td valign='top' class='name'><label for='dueDate'>文件:</label></td>\
  \ <td valign='top'     class='value ${hasErrors(bean:todo,field:'asociatedFile','errors')}'>\
  \ <input type=\"file\" name=\"associatedFile\" /> </td> </tr> ```\n\n执行文件上传还需要更改表单标签本身。你必须将表单更改为\
  \ multipart 请求。为此，请将代码清单 8-6 中所示的属性添加到表单标签中。\n\n***代码清单 8-6.***  表单的 Multipart 标签\
  \ (在 views/todo/list.gsp 中)\n\n``` enctype=\"multipart/form-data\" ```\n\n图 8-7\
  \ 展示了我们添加内容后的结果示例：创建了一个待办事项，并选择了一个要上传的文件。\n\n![9781430248064_Fig08-07.jpg](img/9781430248064_Fig08-07.jpg)\n\
  \n图 8-7 .  为新待办事项选择要上传的文件\n\n正如我们之前所说，我们利用 Spring 来实现文件上传功能，接下来你会在更新控制器时看到对 Spring\
  \ 对象的调用。然而，为了使用 Spring 对象，我们需要在 Spring 的 `resources.xml` 文件中添加一个 bean。这是我们定义要在 Grails\
  \ 中使用的 Spring 资源的地方。将以下行添加到 `conf/spring/resources.xml`。\n\n``` <bean class=\"org.springframework.web.multipart.commons.CommonsMultipartResolver\"\
  > <property name=\"maxUploadSize\"><value>1000000</value></property> </bean> ```\n\
  \n最后一步是实际保存文件。这并不复杂，但确实需要使用一些 Spring 对象。我们将传入的请求转换为 `MultipartHttpServletRequest`，并根据需要从文件中检索项目。代码清单\
  \ 8-7 展示了处理文件上传的新方法。\n\n***代码清单 8-7.***  TodoController 上的 uploadFileData 方法 (在\
  \ controllers/TodoController.groovy 中)\n\n``` import org.springframework.web.multipart.MultipartHttpServletRequest;\
  \ import org.springframework.web.multipart.commons.CommonsMultipartFile; . . . def\
  \ uploadFileData = { todo ->     if (request instanceof MultipartHttpServletRequest)\
  \ {         MultipartHttpServletRequest multiRequest              = (MultipartHttpServletRequest)request;\
  \         CommonsMultipartFile file =              (CommonsMultipartFile)multiRequest.getFile(\"\
  associatedFile\");         // 保存对象项目。         todo.fileName = file.originalFilename\
  \         todo.contentType = file.contentType         todo.associatedFile = file.bytes\
  \     } } ```\n\n只需在你的 `save` 方法持久化之前调用此方法，即可在 `Todo` 上设置适当的属性。\n\n下载文件\n\n现在文件已经存储，我们希望能够在需要时检索它。从数据库返回的文件是\
  \ `byte[]` 格式，因此你可以使用任何常见的响应渲染方法来渲染返回的项目。当你返回一个文件时，你将 `byte[]` 放入响应的输出流中，并设置一些头部数据。代码清单\
  \ 8-8 展示了一个文件返回的基本示例。\n\n***代码清单 8-8.***  TodoController 的下载文件方法 (在 controller/TodoController.groovy\
  \ 中)\n\n``` def downloadFile = {     def todo = Todo.get( params.id )     response.setHeader(\"\
  Content-disposition\",  \"attachment; filename=${todo.fileName}\")     response.contentType\
  \ = todo.contentType     response.outputStream << todo.associatedFile } ```\n\n\
  此方法可以通过我们待办事项页面上的一个链接来调用，只需传入待办事项的 ID 即可。正如你在方法中看到的，头部和 `contentType` 的返回正是我们最初需要保存这两个项目的原因。\n\
  \n添加邮件服务\n\n网站的另一个常见功能是能够从网站发送电子邮件。我们将为我们的应用程序添加此功能。现在，我们将使用邮件服务在用户注册时发送一封电子邮件。在第\
  \ 10 章中，我们将再次使用它来发送报告。\n\n如果你熟悉 Spring 电子邮件服务，那么你会对 Grails 系统感到得心应手，因为它底层使用了 Spring\
  \ Mail。\n\n我们将创建一个电子邮件服务，然后调整我们的用户注册流程以调用它并发送一封电子邮件。这需要以下步骤：\n\n1.  创建发送电子邮件的服务。\n\
  2.  创建用于登录 SMTP 服务器的身份验证器。\n3.  更新 Spring 的 `resources.xml` 文件。\n\n创建电子邮件服务\n\n\
  由于 Grails 使用 Spring 的电子邮件支持，我们将使用 `org.springframework.mail.MailSender` 类来实际发送电子邮件。为了方便大家，我们将对该类的调用封装在一个服务中。该服务将提供一组简单、通用的参数来发送电子邮件。这样，调用者就不需要担心创建\
  \ MIME 消息。代码清单 8-9 展示了 `EMailAuthenticatedService`。\n\n***代码清单 8-9.***  EMailAuthenticatedService，负责发送电子邮件\n\
  \n```  1\\. import org.apache.log4j.Logger;  2.  3\\. import org.springframework.core.io.InputStreamResource\
  \  4\\.\n\n\n\nimport org.springframework.core.io.ByteArrayResource  \n5.  6\\.\
  \ import org.springframework.mail.MailException  \n7\\. import org.springframework.mail.MailSender\
  \  \n8\\. import org.springframework.mail.javamail.MimeMessageHelper  \n9\\.  10\\\
  . import javax.mail.internet.MimeMessage  \n11\\. import javax.mail.internet.InternetAddress;\
  \  \n12. 13\\. class EMailAuthenticatedService {  \n14.     boolean transactional\
  \ = false  \n15.     MailSender mailSender  \n16. 17.     def sendEmail = { mail,\
  \ eMailProperties, attachements ->  \n18.         MimeMessage mimeMessage = mailSender.createMimeMessage()\
  \  \n19. 20.         MimeMessageHelper helper  \n                  = new MimeMessageHelper(mimeMessage,\
  \ true, \"ISO-8859-1\")  \n21.         helper.from = eMailProperties.from  \n22.        \
  \ helper.to = getInternetAddresses(mail.to)  \n23.         helper.subject = mail.subject\
  \  \n24.         helper.setText(mail.text, true);  \n25.         if(mail.bcc) helper.bcc\
  \ = getInternetAddresses(mail.bcc)  \n26.         if(mail.cc) helper.cc = getInternetAddresses(mail.cc)\
  \  \n27. 28.         attachements.each { key, value ->  \n29.             helper.addAttachment(key,\
  \ new ByteArrayResource(value))  \n30.         }  \n31. 32.         mailSender.send(mimeMessage)\
  \  \n33.     }  \n34. 35.     private InternetAddress[] getInternetAddresses(List\
  \ emails) {  \n36.         InternetAddress[] mailAddresses = new InternetAddress[emails.size()]\
  \  \n37.         emails.eachWithIndex {mail, i ->  \n38.             mailAddresses[i]\
  \ = new InternetAddress(mail)  \n39.         }  \n40.         return mailAddresses\
  \  \n41.     }  \n42\\. } ```  \n在第 15 行，我们引用了`MailSender`。由于没有显式设置，可以假设它将被 Grails\
  \ 注入。稍后你将看到我们如何在 Spring 的 `resources.xml` 文件中引用 `MailSender`。\n\n唯一的公有方法从第 17 行开始。这是任何使用该服务的客户端都会调用的方法。传递给它的参数很简单。我们将发送一个邮件对象，该对象会以`Map`的形式传递给该方法。\n\
  \n**创建邮件发送器**\n\n`EMailAuthenticatedSender` 将 `MailSender` 作为一个可注入的组件。创建它相对容易，但确实需要几个步骤。我们需要在\
  \ `resources.xml` 中添加一些条目，并创建一个新的服务。我们将采用逆向方式，先构建顶层条目，然后处理它们的依赖项。\n\n我们首先在 `resources.xml`\
  \ 中定义 `mailSender`，如清单 8-10 所示。\n\n***清单 8-10.***  在 resources.xml 中定义的 mailSender\n\
  \n``` <bean id=\"mailSender\" class=\"org.springframework.mail.javamail.JavaMailSenderImpl\"\
  > <property name=\"host\" value=\"smtp.apress.com\" /> <property name=\"session\"\
  \ ref=\"mailSession\" /> </bean> ```\n\n如你所见，`mailSender` 本身定义了两个变量：`host` 和 `session`。`host`\
  \ 是一个 `String` 类型的 bean，用于标识发送邮件的服务器。对于生产服务器，它可以是 localhost 或网络上的其他主机。在我们的示例中，我们使用了一个虚构的\
  \ Apress SMTP 服务器。\n\n`session` 稍微复杂一些，需要我们定义另一个可注入的对象。因此，我们需要在 `resources.xml`\
  \ 文件中添加另一个 bean `mailSession`，如清单 8-11 所示。\n\n***清单 8-11.***  在 resources.xml 中定义的\
  \ mailSession\n\n``` <bean id=\"mailSession\" class=\"javax.mail.Session\" factory-method=\"\
  getInstance\"> <constructor-arg> <props> <prop key=\"mail.smtp.auth\">true</prop>\
  \ <!-- 如果需要 SSL... <prop key=\"mail.smtp.socketFactory.port\">465</prop> <prop key=\"\
  mail.smtp.socketFactory.class\">         javax.net.ssl.SSLSocketFactory </prop>\
  \ <prop key=\"mail.smtp.socketFactory.\n\nfallback\">         false </prop>       -->\
  \ </props> </constructor-arg> <constructor-arg ref=\"smtpAuthenticator\" /> </bean>\
  \ ```\n\n在这里，我们将 session 配置为使用非 SSL 源，但从注释掉的代码可以看出，切换到 SSL 源也非常容易。\n\n你可能已经猜到，我们还有另一个需要注入的项：`smtpAuthenticator`。我们需要创建一个对象并为其定义\
  \ bean。首先，我们在 `resources.xml` 中定义 bean，如清单 8-12 所示。\n\n***清单 8-12.***  在 resources.xml\
  \ 中定义的 smtpAuthenticator\n\n``` <bean id=\"smtpAuthenticator\" class=\"SmtpAuthenticator\"\
  > <constructor-arg value=\"xxx@xxx.net\" /> <constructor-arg value=\"xxxxxx\" />\
  \ </bean> ```\n\n我们定义了一个构造函数，它接收用户名和密码（已隐去，因为我们不希望所有人都能查看我们的邮件）。\n\n现在我们需要为此创建一个\
  \ bean。我们将在 `services` 文件夹中创建这个类，并简单地继承 `javax.mail.Authenticator`。清单 8-13 展示了我们的认证\
  \ bean。\n\n***清单 8-13.***  自定义 SmtpAuthenticator Bean\n\n``` import javax.mail.Authenticator\n\
  \nclass SmtpAuthenticator extends Authenticator {\n\n  private String username;\n\
    private String password;\n\n  public SmtpAuthenticator(String username, String\
  \ password) {\n    super();\n    this.username = username;\n    this.password =\
  \ password;\n  }\n\n  public javax.mail.PasswordAuthentication getPasswordAuthentication()\
  \ {\n    return new javax.mail.PasswordAuthentication(username, password);\n  }\n\
  } ```\n\n**更新注册页面**\n\n现在我们的 bean 及其所有子组件都已定义，是时候将其投入使用了。我们将修改注册页面以发送电子邮件。清单 8-14\
  \ 展示了我们将使用的方法。\n\n***清单 8-14.***  用于发送电子邮件的注册页面（位于 controller/UserController.groovy）\n\
  \n``` private sendAcknowledgment = { user ->\n    // 首先设计我们要发送的邮件\n    def emailTpl\
  \ = this.class.classloader.getResource(\n        \"web-app/WEB-INF/templates/regisrationEmail.gtpl\"\
  )\n    def binding = [\"user\": user]\n    def engine = new SimpleTemplateEngine()\n\
      def template = engine.createTemplate(emailTpl).make(binding)\n    def body =\
  \ template.toString()\n\n    // 设置要发送的邮件。\n    def email = [\n        to: [user.email],\n\
          subject: \"您的 Collab-Todo 报告\",\n        text: body\n    ]\n\n    try {\n\
          // 检查是否“需要”附件\n        eMailAuthenticatedService.sendEmail(email, [])\n\
                  } catch (MailException ex) {\n        log.error(\"发送邮件失败\", ex)\n\
          return false\n    }\n    true\n    } ```\n\n这个邮件调用实际上相对简单。我们将传入一个 Map，定义收件人、主题和正文。邮件正文是通过对文件\
  \ `registrationEmail.gptl` 使用 Groovy 模板引擎生成的。\n\n请注意，你可以在其他地方重用此代码来发送电子邮件。\n\n**标签库**\n\
  \n标签库提供了在页面内执行的自定义操作集。通常，这些操作是重复性的，或者如果直接在页面中编写脚本片段会过于冗长。\n\n到目前为止，你在我们的示例中已经看到了许多\
  \ Grails 内置标签库的使用。我们使用这些标签来输出数据、渲染列表等，并且将在本书中继续使用它们。有关 Grails 标签的概述，请参见第 5 章中的“Grails\
  \ 标签”部分。\n\n在这里，我们将介绍如何创建自己的自定义标签库。如果你过去曾使用 Java 框架创建过标签库，你会知道这实际上相当麻烦。你的标签库类必须继承一个基类。然后，你需要在标签库定义中定义标签及其属性。\n\
  \n\n\n你也可以选择在 `web.xml` 中引用该标签库。最后，在页面本身中引用你正在使用的特定标签。哇，仅仅为了创建一个可能只是格式化工具的东西，这工作量可真不小。幸运的是，用\
  \ Grails 创建标签库比这简单得多。你可能已经注意到，在我们应用程序的待办事项页面上，添加待办事项的选项总是显示着。但用户可能只是想去那个页面看看列表。如果能隐藏添加区域，并在需要时再打开它，那就好了。我们可以创建一个标签库来处理这个问题。它会用\
  \ `div` 标签标记一个区域，并允许用户点击一个 JavaScript 链接来打开该区域。创建这个功能需要两组代码段：一组用于显示 JavaScript，另一组用于为任何\
  \ `div` 区域实际调用该 JavaScript。通常，使用 JSP 需要两个类和一整套 XML。多亏了 Grails，我们可以用一个类且无需 XML 来处理这个问题。\n\
  \n**创建标签库**\n\n标签库位于 `grails-app/taglib` 文件夹中，因此我们将在此处创建新的标签库。代码清单 8-15 展示了我们将要使用的所有全局对象的标签库大纲。\n\
  \n***代码清单 8-15.***  ShowHideTagLib 大纲\n\n``` class ShowHideTagLib { } ```\n\n如你所见，这里内容不多；这是因为对于基本大纲来说，我们只需要这些。\n\
  \n我们实际上是在创建两个独立的标签库。虽然通常这需要不同的类来完成，但在 Grails 中，我们只需要不同的方法。代码清单 8-16 展示了我们添加到 `ShowHideTagLib`\
  \ 中的方法。\n\n***代码清单 8-16.***  ShowHideTagLib 的内容\n\n```     def showHide = { attrs,\
  \ body ->         def divId = attrs['update']         out <<\"\"\"<a href=\"javascript:showhide('$divId');\"\
  >${body()}</a>\"\"\"     }     def preLoadShowHide = { attrs, body ->         out\
  \ <<\"\"\"<script language=\"javascript\"> <!--             function showhide(layer_ref)\
  \ {                 // 让我们获取状态。                 var state = document.getElementById(layer_ref).style.display;\
  \                 if (state == 'block') {                     state = 'none';                 }\
  \ else {                     state = 'block';                 }                 if\
  \ (document.all) { // 是 IE 4 或 5（或 6 beta）                     eval(\"document.all.\"\
  \ + layer_ref + \".style.display = state\");                 }                 if\
  \ (document.layers) { // 是 NETSCAPE 4 或更低版本                     document.layers[layer_ref].display\
  \ = state;                 }                 if (document.getElementById &&!document.all)\
  \ {                     hza = document.getElementById(layer_ref);                     hza.style.display\
  \ = state;                 }             }             //--> </script> \"\"\"     }\
  \ ```\n\n这里，我们有两个标签库调用。每一个都展示了在创建标签库时使用 Groovy 是多么棒。\n\n由于创建标签库需要将代码输出为 HTML 标记，这通常涉及大量的字符串构建。不仅如此，当输出包含引号时，你需要在代码中使用反斜杠（`\\\
  `）对它们进行转义。真烦人！然而，使用 Groovy，我们可以使用三重引号。三重引号风格不仅允许我们完全嵌入带有标记的字符串，还可以返回字符和引用的值。\n\n\
  第一个方法 `showHide` 传入了两个对象：`attrs` 和 `body`。`body` 只是标签库开始和结束标签之间的页面部分。`attrs` 是你要传入方法的属性映射。对于常规的\
  \ JSP 标签库，你需要在页面上将它们单独定义为 getter 和 setter，并在标签库 XML 中定义。而在 Grails 和 Groovy 中，这并非必要。\n\
  \n如你所见，我们映射了一个名为 `update` 的值，它就是我们想要激活的 `div` 标签部分。\n\n第二个方法 `preLoadShowHide` 本身不包含任何动态代码。我们只是在那里输出\
  \ JavaScript。\n\n**引用标签库**\n\n引用标签库也很简单。默认情况下，标签库在 `g` 命名空间中被引用——这与所有内置 Grails 标签被引用的命名空间相同。然后，方法名被用作标签的引用名。代码清单\
  \ 8-17 展示了在 `todo/list.gsp` 中对这些标签的调用。\n\n***代码清单 8-17.***  来自 todo/list.gsp 的摘录，展示了对自定义标签的调用\n\
  \n``` <g:preLoadShowHide/> <g:javascript library=\"scriptaculous\" /> <div class=\"\
  body\"> <h2>待办事项列表<g:showHide update=\"addToDo\"> <img border=0 src=\"${createLinkTo(dir:'images',file:'add_obj.gif')}\"\
  \         alt=\"[添加]\"/> </g:showHide> ```\n\n但是，如果你不想使用 `g` 命名空间呢？也许你正在将应用程序打包成一个标签库，并担心名称冲突，或者你只是想记住它不是核心\
  \ Grails 功能的一部分。为了更改所使用的命名空间，在你的标签库中添加一个静态的命名空间引用。例如，要为我们的代码使用 `todo` 命名空间，你需要在\
  \ `ShowHideTagLib` 中添加以下行：\n\n``` static namespace = 'todo' ```\n\n**Grails 中的 Ajax**\n\
  \n我们当然不能写一个 Web 2.0 章节却不讨论 Ajax。*Ajax* 代表异步 JavaScript 和 XML，奇怪的是，这并非一个 100% 准确的定义。尽管\
  \ Ajax 通常是异步的，通常用 JavaScript 编写，并且经常处理 XML 的传输，但这些都不是它的*必须*条件。你可以同步发送 Ajax 消息，你不必使用\
  \ JavaScript 来发送它们，并且你的响应可以是 XML 文件，但也可以是普通字符串。\n\n![image](img/sq.jpg) **注意**  *Ajax*\
  \ 这个术语最初是由 Jesse James Garrett 创造的。但这项技术最初是由微软开发的，用于处理远程脚本。\n\n关于 Ajax 最大的“秘密”之一是，在大多数情况下，它并不复杂，至少在概念上是这样。用\
  \ Ajax 能做的事情，没有什么是你在普通应用程序中做不到的；然而，使用 Ajax 不仅可以帮助你的应用程序表现得更好，还可以提供更丰富的用户体验。\n\n\
  Ajax 的核心只是向服务器发送数据并在返回时解析数据，而无需强制刷新显示。复杂性在于如何利用这些数据，而这正是框架开始涌现的地方。事实上，这些框架并非 100%\
  \ 的 Ajax——如果是的话，它们就不会那么庞大了。相反，这些框架用 JavaScript UI 增强功能包装了 Ajax。有些调用甚至不涉及 Ajax。然而，在这里我们将这些框架称为\
  \ *Ajax 框架*。\n\n**在 Grails 中使用 Ajax 框架**\n\n流行的 Ajax 框架包括 Prototype、Dojo:`http://dojotoolkit.org/`、script.aculo.us\
  \ 和 Yahoo! 用户界面 (YUI) 库:`http://developer.yahoo.com/yui/`。甚至谷歌也推出了自己相当复杂的 Ajax 框架——谷歌\
  \ Web 工具包 (GWT)。\n\n大多数流行的 Web 框架都已经实现了 Ajax。其中大多数并没有创建自己的 Ajax 框架，而只是包装了先前 Ajax\
  \ 框架的代码。Ruby on Rails 使用 script.aculo.us，Tapestry 的 Tacos 使用 Dojo，等等。那么 Grails 使用什么呢？答案是以上所有。\n\
  \n为了提供最大的灵活性，Grails 目前接受所有现有的框架。那么这意味着什么呢？这是好是坏？两者兼而有之。虽然它让我们在选择框架时有更多的灵活性，但最终，我们需要编写比其他框架通常要求的更多的代码，尤其是在涉及\
  \ Ajax 项目的 JavaScript UI 部分时。\n\n\n\n如果你熟悉其他 Java 或 Rails 的 Ajax 用法，那么在接下来的示例中，这一点会变得显而易见。默认情况下，Grails\
  \ 自带 jQuery 库，但通过插件系统，它也支持其他框架，例如 Prototype、DojoYahoo UI 和 Google Web Toolkit。这些框架各自拥有其自定义的\
  \ UI 组件。如果你熟悉 Rails 或 Tapestry 的 Tacos，就会知道它们通常为底层框架提供完整的支持。换句话说，通常会有针对整个框架的标签库封装。这使得不仅支持\
  \ Ajax 组件，而且支持 JavaScript 组件变得容易。不幸的是，Grails 并非如此。Grails 包含几个 Ajax 标签，这些标签会调用控制器动作，并用结果更新页面元素。Grails\
  \ 在其 Ajax 标签方面支持多种流行的 JavaScript 库。要使用这些标签，我们需要告诉 Grails 我们正在使用哪个库。我们通过 `<g:javascript>`\
  \ 标签及其 `library` 属性来实现这一点。此标签放置在页面的 `<head>` 部分。\n\n在 Grails 中，我们广泛使用 GSP 模板来渲染对\
  \ Ajax 调用的响应。GSP 模板是一个以下划线开头的 GSP 文件（`_example.gsp`）。GSP 模板提供了一种在多个页面间共享通用代码的简便方法。你可以使用\
  \ `<g:render>` 标签在 GSP 页面中包含一个 GSP 模板，如下所示：\n\n``` <g:render template=\"sampleTemplate\"\
  \ /> ```\n\n这行代码将渲染一个名为 `_sampleTemplate.gsp` 的模板，该模板位于调用它的页面所在的同一目录中。\n\nGrails\
  \ 仅支持标准的 Ajax 组件，如表 8-1 所列。不过，这确实为我们提供了一个不错的可用组件子集。\n\n表 8-1. Grails 中的 Ajax 组件\n\
  | 标签 | 描述 |\n| --- | --- |\n| `remoteField` | 创建一个文本字段，当其值改变时，将其值发送到远程链接 |\n| `remoteFunction`\
  \ | 创建一个可分配给 DOM 事件的远程 JavaScript 函数 |\n| `remoteLink` | 创建一个调用远程函数的链接 |\n| `formRemote`\
  \ | 创建一个在提交时执行 Ajax 调用的表单 |\n| `javascript` | 加载一个 JavaScript 函数 |\n| `submitToRemote`\
  \ | 创建一个按钮，将表单作为 Ajax 调用提交 |\n\n**使用 remoteField**\n\n此标签创建一个输入字段，当其值改变时（通常当用户在字段内按下回车键时）触发一个\
  \ Ajax 请求。我们将使用代码清单 8-18 中的控制器来说明 `remoteField` 标签的用法，如代码清单 8-19 所示。\n\n***代码清单\
  \ 8-18.***  用于演示 remoteField 标签用法的示例控制器\n``` class CategoryController {  def changeDescription()\
  \ {        def cat = Category.get(params.id)        cat.description = params.value\
  \        cat.save()     } } ```\n\n***代码清单 8-19.***  使用 remoteField 标签\n``` <g:remoteField\
  \ action=\"changeDescription\" update=\"descDiv\"                name=\"description\"\
  \ value=\"${category?.description}\" /> <div id=\"descDiv\"> 此 div 将被更新 </div> ```\n\
  \n默认情况下，发送的参数名称是 `value`，如代码清单 8-19 所示；你可以通过指定 `paramName` 属性来更改它。\n\n**使用 remoteFunction**\n\
  \n此标签创建一个远程 JavaScript 函数调用，该调用会触发一个 Ajax 请求来调用远程方法。我们将使用代码清单 8-20 中的控制器来演示 `remoteFunction`\
  \ 标签的用法。\n\n***代码清单 8-20.***  用于演示 Ajax 标签用法的示例 UserController\n``` class UserController\
  \ {  def list() {         [users: User.list(params)]     }  def show() {         [user:\
  \ User.get(params.id)]     }  def byFirstName() {         [user: User.findByName(params.firstName)]\
  \     }  def byLastName() {         [users: User.findByName(params.lastName, params)]\
  \     } } ```\n\n***代码清单 8-21.***  使用 remoteFunction 标签\n``` $('mydiv').onclick\
  \ = <g:remoteFunction action=\"show\" id=\"1\" /> ```\n\n**使用 remoteLink**\n\n此标签创建一个指向控制器动作的\
  \ HTML 链接，点击该链接时会生成一个 Ajax 请求。代码清单 8-22 演示了针对代码清单 8-20 中的控制器使用 `submitToRemote`\
  \ 标签的用法。\n\n***代码清单 8-22.***  使用 remoteLink 标签\n``` <g:remoteLink action=\"show\"\
  \ id=\"1\">测试 1</g:remoteLink> <g:remoteLink action=\"show\" id=\"1\" update=\"\
  [success:'success',failure:'error']\"     on404=\"alert('not found');\">测试 2</g:remoteLink>\
  \ ```\n\n**使用 formRemote**\n\n此标签创建一个表单，在提交时触发一个 Ajax 请求，序列化表单元素，并在不支持 JavaScript\
  \ 时回退到正常的表单提交。代码清单 8-23 演示了针对代码清单 8-20 中的控制器使用 `submitToRemote` 标签的用法。\n\n***代码清单\
  \ 8-23.***  使用 formRemote 标签\n``` <g:formRemote name=\"myForm\" on404=\"alert('not\
  \ found!')\" update=\"updateDiv\"               url=\"[controller: user, action:'show']\"\
  > 用户 ID: <input name=\"id\" type=\"text\" /> </g:formRemote> <div id=\"updateDiv\"\
  >此 div 将使用 show 调用的结果进行更新</div> ```\n\n**使用 javascript**\n\n此标签用于包含 JavaScript 库和脚本，并为内联\
  \ JavaScript 提供一种简写形式，如代码清单 8-24 所示。\n\n***代码清单 8-24.***  使用 javascript 标签\n```\
  \ 1\\. <g:javascript src=\"script.js\" /> 2\\. <g:javascript library=\"scriptaculous\"\
  \ /> 3\\. <g:javascript>alert('hello')</g:javascript> ```\n\n代码清单 8-24 演示了 `javascript`\
  \ 标签的三种不同用法。第 1 行的标签实际上导入了 `script.js`，第 2 行的标签导入了 scriptaculous 库所需的所有 js。第 3 行的标签没有包含\
  \ `library` 或 `src` 属性，而是提供了一个主体；结果是一个内联脚本。\n\n**使用 submitToRemote**\n\n此标签创建一个提交按钮，按下时会触发一个\
  \ Ajax 请求，并将包含该按钮的表单作为远程 Ajax 调用提交，将字段序列化为参数。代码清单 8-25 演示了针对代码清单 8-20 中的控制器使用 `submitToRemote`\
  \ 标签的用法。\n\n***代码清单 8-25.***  使用 submitToRemote 标签\n``` <g:form action=\"show\"\
  >     登录名: <input name=\"login\" type=\"text\" /> <g:submitToRemote update=\"updateDiv\"\
  \ /> </g:form> <div id=\"updateDiv \">此 div 将使用表单提交响应进行更新</div> ```\n\n**处理 Ajax\
  \ 事件**\n\n如果发生某些事件，可以调用特定的 JavaScript。所有事件都以“on”前缀开头，让你可以在适当的时候向用户提供反馈，或采取其他操作。\n\
  \n***代码清单 8-26.***  处理 Ajax 事件\n``` <g:remoteLink action=\"show\"         id=\"\
  1\"         update=\"success\"         onLoading=\"showProgress()\"         onComplete=\"\
  hideProgress()\"> 显示任务 1 </g:remoteLink> ```\n\n代码清单 8-26 中的代码执行 `showProgress()`\
  \ 函数，该函数可能会显示一个进度条或其他合适的内容。\n\n表 8-2 显示了不同的事件。\n\n[表 8-2.](#9781430248064_Ch08.\n\
  \n\n\nxhtml#_Tab2) Ajax 事件     | 字段名 | 描述 | | --- | --- | | `onSuccess` | 成功时调用的\
  \ JavaScript 函数 | | `onFailure` | 调用失败时调用的 JavaScript 函数 | | `on_ERROR_CODE` | 用于处理指定错误码的\
  \ JavaScript 函数 | | `onUninitialized` | Ajax 引擎初始化失败时调用的 JavaScript 函数 | | `onLoading`\
  \ | 远程函数正在加载响应时调用的 JavaScript 函数 | | `onLoaded` | 远程函数完成加载响应时调用的 JavaScript 函数 |\
  \ | `onComplete` | 远程函数完成（包括任何更新）时调用的 JavaScript 函数 |    数据的动态渲染    我们的第一个示例演示了如何使用最基本、最流行的\
  \ Ajax 组件类型之一。其工作方式是：你在页面中输入数据，提交数据，远程调用服务器，处理数据，然后仅重新渲染页面的某一部分。在我们的示例中，我们将修改待办事项添加页面，使其进行部分页面重新渲染。现在，当添加新的待办事项时，页面将动态渲染待办事项列表部分，而不是刷新整个页面。\
  \    为了实现这一点，我们需要执行几个步骤，其中第一步并非 Ajax 所特有：    1.  将页面的列表部分移动到其自己的页面（称为*模板*或*局部页面*）。\
  \ 2.  将我们当前的 `add` 调用改为执行 Ajax 远程调用，而不是提交整个页面。 3.  修改 `TodoController` 的返回值，使其渲染我们创建的新页面，而不是整个页面。\
  \    ![image](img/sq.jpg) **注意**  在执行数据动态渲染时，你会遇到的一个主要问题是*局部页面更新*。局部页面更新指的是重新渲染页面的一部分。某些框架（如\
  \ Tapestry 的 Tacos）允许你内联执行此操作。然而，包括 Grails 和 Ruby on Rails 在内的大多数 Web 框架，都强制你调用另一个页面。实际上，这并非什么大问题。它确实会增加你需要编写的\
  \ GSP 数量，但好处是，它能让 GSP 保持整洁。    渲染模板    从一个页面渲染另一个页面相当简单。首先，我们需要一个被调用的页面，它显然必须是一个\
  \ GSP 页面。我们将使用 `<g:render />` 标签库来定义页面中将要调用另一个 GSP 页面的区域。Grails 将这些局部页面称为*模板*。 \
  \   我们的第一步是获取 `todo/list.gsp` 中的待办事项列表，并将该部分提取到其自己的页面中。我们将用代码清单 8-27 中的内容替换该列表。此外，我们不会提取整个代码，而是提取除\
  \ `for` 循环之外的所有内容。这是因为我们可以告诉渲染器渲染一个集合。    ***代码清单 8-27.***  todo/list.gsp 的模板，包含修改后的待办事项列表显示\
  \    ``` <div id=\"todoList\"> <g:render template=\"detail\" var=\"todo\" collection=\"\
  ${todoList}\" /> </div> ```    在这里，我们简单地告诉 Grails 获取名为 `todoList` 的集合，遍历该列表，并为集合中的每个项目渲染一次\
  \ `detail` 页面。然后，集合中的项目在页面中通过变量 `var` 进行引用。    创建模板    我们创建的页面名称实际上不会是 `detail.gsp`。相反，Grails\
  \ 通过获取渲染的模板属性，并在其开头添加下划线来指示该页面是一个模板，从而选择要渲染的页面。该页面还必须与调用它的控制器位于同一目录中。因此，对于此示例，我们将在\
  \ `todo` 目录中创建 `_detail.gsp`，如代码清单 8-28 所示。    ***代码清单 8-28.***  _detail.gsp 页面\
  \    ``` <div id=\"todoDetail${todo.id}\" class=\"todo\">  <div class=\"todoTitle\"\
  >${todo.name?.encodeAsHTML()} <g:link action=\"edit\" id=\"${todo.id}\"> <img border=0\
  \             src=\"${createLinkTo(dir:'images',file:'write_obj.gif')}\" alt=\"\
  [EDIT]\"/> </g:link> <g:remoteLink              action=\"removeTask\"             \
  \ id=\"${todo.id}\"              update=\"todoDetail$todo.id\"              onComplete=\"\
  highlight('todoDetail$todo.id');\"> <img border=0 src=\"${createLinkTo(dir:'images',file:'delete_obj.gif')}\"\
  \              alt=\"[EDIT]\"/> </g:remoteLink>  <g:showHide update=\"todoDetailFull${todo.id}\"\
  > <img border=0                 src=\"${createLinkTo(dir:'images',file:'add_obj.gif')}\"\
  \                 alt=\"[Show All]\"/></g:showHide> </div>  <div id=\"todoDetailFull${todo.id}\"\
  \ class=\"todo\" style=\"display:none\">     Status: ${todo.status?.encodeAsHTML()}\
  \ <br />     Priority: ${todo.priority?.encodeAsHTML()} <br />     Created date:\
  \ ${todo.createDate?.encodeAsHTML()} <br />     Last Modified date: ${todo.lastModifiedDate?.encodeAsHTML()}\
  \ <br />  <g:if test=\"${todo.completeDate == null}\">         Complete Task: <input\
  \ type=\"checkbox\"                               onclick=\"${remoteFunction(                                             action:'completeTask',\
  \                                             id:todo.id,                                             update:'todoDetail'\
  \ + todo.id,                                             onComplete:'highlight(\\\
  'todoDetail' + todo.id+'\\')' )};\"/><br /> </g:if> <g:else>         Completed Date:\
  \ ${todo.completeDate?.encodeAsHTML()} <br /> </g:else> <!-- show notes -- mark\
  \ in the code that we should use a todo --> <g:radeoxRender>${todo?.note}</g:radeoxRender>\
  \ <!-- update:[success:'great', failure:'ohno'], --> <!--  <g:remoteLink action=\"\
  showNotes\" id=\"${todo.id}\"          update=\"todoDetailNote${todo.id}\">         Notes\
  \ </g:remoteLink><br/> <div id=\"todoDetailNote${todo.id}\"> </div>     --> </div>\
  \ </div> ```    我们的第一步完成了。实际上，该页面中还没有任何启用 Ajax 的内容。目前，页面的工作方式与之前完全相同，理论上，你可以使用这些技术来帮助分离代码。\
  \    使页面动态化    现在我们将进行局部页面表单渲染，这分为两步：    1.  将表单改为使用 Ajax 表单标签。 2.  让控制器上的 `save`\
  \ 调用渲染该标签，而不是整个页面。    对于第一部分，将 `list.gsp` 中的表单封装改为代码清单 8-29 中所示的代码。    ***代码清单 8-29.***  添加\
  \ Ajax 表单标签（在 views/todo/list.gsp 中）    ``` <g:formRemote name=\"todoForm\"               url=\"\
  [controller:'todo',action:'save']\"               update=\"todoList\"               onComplete=\"\
  showhide('addToDo')\"               enctype=\"multipart/form-data\">    . . . </g:formRemote>\
  \ ```    这会调用 `TodoController` 上的 `save` 操作，然后在完成时隐藏添加部分。此外，`update` 属性将告诉我们正在更新哪个\
  \ `<div>` 部分。在代码清单 8-27 中，请注意我们用 `<div>` 标签 `todoList` 包围了渲染的项目。这就是 Ajax JavaScript\
  \ 在返回时将重新渲染的部分。    对 `save` 操作的修改同样简单。我们不再使用重定向到列表页面的标准返回方式，而是添加一行代码来获取集合，并调用渲染我们标记的\
  \ GSP，如代码清单 8-30 所示。    ***代码清单 8-30.***  仅渲染标签（在 views/todo/list.gsp 中）    ```\
  \ render(TEMPLATE:'DETAIL',  VAR: 'TODO', COLLECTION:LISTBYOWNER()) ```    如你所见，除了需要移动一些数据之外，这一切都相对简单。而这就是全部所需。如果你现在回到页面，它将进行更新，而无需返回整个页面。\
  \    RSS 源    RSS 源已成为网站中越来越受欢迎的功能。\n\n\n\n推动 RSS 订阅源普及的因素之一是市面上涌现出越来越多的 RSS 阅读器，包括新的\
  \ iGoogle²和 Gmail 中的 RSS 网页剪辑功能。因此，我们将介绍如何创建一个基础的 RSS 阅读器。这将是一个非常基础的示例；在实际应用中，您可能需要添加更多用于安全检查的项目。\
  \  \n创建 RSS 订阅源基本上需要以相当严格的格式生成 XML 输出。然后，阅读器会获取该 XML 并解析其内容。  \n我们可以手动完成这项工作，但基于订阅源的格式可能有些复杂，而且您还需要编写大量重复的代码。幸运的是，有一个插件可以帮助我们简化操作并创建订阅源。如图\
  \ 8-8 所示的 Feeds 插件³支持创建流行的 RSS 和 Atom 格式的订阅源（每种格式都支持多个版本）。首先安装该插件：  \n\n![9781430248064_Fig08-08.jpg](img/9781430248064_Fig08-08.jpg)\
  \  \n\n图 8-8 . 使用 Grails 插件管理器安装 Feeds 插件  \n\n```  \n> grails install-plugin feeds\
  \  \n```  \n\n下一步是创建一个包含一个方法的控制器。该方法将以渲染器能够理解的方式渲染 XML。在本示例中，我们将使用 Atom 格式来格式化输出。清单\
  \ 8-31 展示了我们的`RSSController`及其`feed`方法。  \n\n***清单 8-31.*** 我们的 RSSController 及其\
  \ feed 方法（位于 controller/RssController.groovy）  \n\n```  \nimport feedsplugin.FeedBuilder\
  \  \nclass RssController {  \n    def feed = {  \n        render(feedType:\"atom\"\
  ) { // 可选 - , feedVersion:\"2.0\") {  \n            title = \"待办事项列表\"  \n     \
  \       link = \"http://localhost:8080/collab-todo/rss\"  \n            Todo.list(sort:\
  \ \"name\", order: \"asc\").each {  \n                def todo = it  \n        \
  \        entry(it.name) {  \n                    title = \"${todo.name}\"  \n  \
  \                  link = \"http://localhost:8080/collab-todo/todo/view/${todo.id}\"\
  \  \n                    author = \"${todo.owner.lastName}, ${todo.owner.firstName}\"\
  \  \n                }  \n            }  \n        }  \n    }  \n}  \n```  \n\n\
  这里我们使用了一个标准渲染器，并在其中定义了几个项目。我们定义了标题和链接。然后，我们遍历从数据库中查询并按升序排序的项目列表。对于每个项目，我们需要定义一个条目。该条目包含三个项目：标题、URL\
  \ 链接和内容。表 8-3 列出了订阅源中常见的一些字段。  \n\n表 8-3 . 订阅源的一些常见字段  \n\n| 字段名 | 描述 |  \n| ---\
  \ | --- |  \n| `publishedDate` | 条目发布的日期 |  \n| `categories` | 与条目相关的分类列表 |  \n\
  | `author` | 条目的作者姓名 |  \n| `link` | 条目完整描述的链接 |  \n| `title` | 条目的标题 |  \n\n在我们的示例中，我们使用了`title`、`link`和`author`。我们基于创建日期进行了排序（实际上，我们可以基于任何字段排序）。请注意，如果您提供了`publishedDate`，您的订阅源可能会自动按该日期排序。本示例的输出示例如图\
  \ 8-9 所示。  \n\n![9781430248064_Fig08-09.jpg](img/9781430248064_Fig08-09.jpg)  \n\
  \n图 8-9 . 在 Safari 浏览器中运行的 RSS 阅读器  \n\n总结  \n\n本章是将我们正在运行的待办事项应用转变为更健壮应用的开端。我们添加的功能不仅使其更有用，而且视觉上更具吸引力。这些特性对于一个网站来说极其重要。\
  \  \n\n本章的目的是让您接触更多用于我们应用的高级网页样式技术，并利用 Ajax 框架。Grails 网站上还有更多 Ajax 技术和插件。我们建议您浏览一下，看看是否有符合您需求的。如果没有，您始终可以选择创建自己的插件，并以此方式加入\
  \ Grails 社区。  \n\n在接下来的几章中，我们将扩展待办事项应用，并添加更多功能，包括报表和批处理作业。  \n\n¹ `http://grails.org/plugin/ckeditor`\
  \  \n² `http://www.google.com/ig`  \n³ `http://grails.codehaus.org/Feeds+Plugin`\
  \  \n\n第 9 章  \n\n![image](img/frontdot.jpg)  \n\nWeb 服务  \n\n到目前为止，您已经了解了如何使用 Grails\
  \ 开发面向用户的 Web 应用程序。本章重点介绍如何使用 Web 服务将您的应用程序功能暴露给其他应用程序。您还可以使用本章讨论的技术来驱动支持 Web 2.0\
  \ Ajax 的 Web 应用程序，例如第 8 章中讨论的那些。  \n\n最初，Web 服务作为系统集成的一种手段而流行起来。但随着 Google Maps\
  \ 和 Amazon.com 等网站以及 Facebook 等社交网络的流行，人们期望提供公共 API，以便用户可以创建新颖的客户端应用程序。当这些客户端组合来自多个提供商的多种服务时，它们被称为*混搭*（更多信息请参见`http://en.wikipedia.org/wiki/Mashup_(web_application_hybrid)`）。它们可以包括命令行应用程序、桌面应用程序、Web\
  \ 应用程序或某种类型的小部件。  \n\n在本章中，您将学习如何通过扩展 Collab-Todo 应用程序以提供对领域对象的访问，将您的应用程序功能作为表述性状态转移（REST）Web\
  \ 服务暴露出来。这个 RESTful Web 服务将能够根据客户端应用程序的需求返回 XML 或 JavaScript 对象表示法（JSON）。该 Web 服务还将被设计为利用约定优于配置的原则，为任何\
  \ Grails 领域模型暴露 CRUD 功能，类似于 Grails 脚手架使用约定生成 Web 界面的方式。最后，您将了解如何编写能够利用该 Web 服务的简单客户端应用程序。\
  \  \n\nRESTful Web 服务  \n\nREST 并非标准或规范。相反，它是一种架构风格或一组原则，用于通过 HTTP 暴露无状态的 CRUD 类型服务。Web\
  \ 服务的核心是为您的 Web 提供 Web API。也就是说，为应用程序设置 Web 服务会使该应用程序成为其他 Web 应用程序可以使用的数据源。这些 Web\
  \ 服务可以通过 REST 或 SOAP 实现。对于 SOAP，数据交换发生在带有 SOAP 特定头部和主体的专用 XML 中，这增加了构建 Web 服务的复杂性。REST\
  \ 支持普通的旧 XML（POX）以及 JSON 进行数据交换。  \n\n与 SOAP 不同，基于 REST 的 Web 服务是面向资源的。例如，如果我们在\
  \ Collab-Todo 应用程序中实现一个返回用户 XML 表示的 Web 服务，那么该 Web 服务的 URI `http://localhost:8080/collab-todo/todo/user`\
  \ 是面向资源的，因为 URI 中的*user*是一个资源（名词）。如果 URI 是`http://localhost:8080/collab-todo/todo/showuser`，则它不是面向资源的，因为`showuser`是一个方法（动词），这样的\
  \ URI 是面向服务的。除了面向资源的 URI 之外，在 RESTful Web 服务中，访问是通过标准方法实现的，例如 HTTP 的`GET`、`POST`、`PUT`和`DELETE`。为了理解这一点，我们将首先实现一个非\
  \ RESTful 的 Web 服务。  \n\n\n\n从 Grails 应用程序获取 POX 或 JSON 输出的最快方法是导入 `grails.converters.*`\
  \ 包并添加一个闭包，如清单 9-1 和清单 9-2 所示，其输出分别如图 图 9-1 和 图 9-2 所示。    ***清单 9-1.***  为 POX\
  \ 输出实现非 RESTful Web 服务    ``` import grails.converters.*  class UserController{\
  \   def showUser = {     render User.list() as XML   }    ... ```    `}`    ![9781430248064_Fig09-01.jpg](img/9781430248064_Fig09-01.jpg)\
  \    图 9-1 .  POX 输出    ***清单 9-2.***  为 JSON 输出实现非 RESTful Web 服务    ``` import\
  \ grails.converters.*  class UserController{   def showUser = {     render User.list()\
  \ as JSON   }    ... ```    `}`    ![9781430248064_Fig09-02.jpg](img/9781430248064_Fig09-02.jpg)\
  \    图 9-2 .  JSON 输出    Collab-Todo 应用程序中的一个 RESTful Web 服务（我们将在后续章节讨论）可能如下所示：\
  \    ``` http://localhost:8080/collab-todo/todo/1  ```    在此示例中，`id` 为 `1` 的 `Todo`\
  \ 对象的表示形式可以以 XML 形式返回，如清单 9-3 所示。    ***清单 9-3.***  从 RESTful Web 服务返回的 Todo 对象的\
  \ POX 表示形式    ``` <todo id=\"1\"> <completedDate>2012-08-11 11:08:00.0</completedDate>\
  \ <createDate>2012-08-11 00:15:00.0</createDate> <dueDate>2012-08-11 11:08:00.0</dueDate>\
  \ <name>Expose Web Service</name> <note>Expose Todo domain as a RESTful Web Service.</note>\
  \ <owner id=\"1\"/> <priority>1</priority> <status>1</status> </todo> ```    另一种选择是以\
  \ JSON 形式返回表示形式，如清单 9-4 所示。    ***清单 9-4.***  从 RESTful Web 服务返回的 Todo 对象的 JSON\
  \ 表示形式    ``` { \"id\": 1, \"completedDate\": new Date(1197389280000), \"status\"\
  : \"1\", \"priority\": \"1\", \"name\": \"Expose Web Service\", \"owner\": 1, \"\
  class\": \"Todo\", \"createDate\": new Date(1197350100000), \"dueDate\": new Date(1197389280000),\
  \ \"note\": \"Expose Todo domain as a RESTful Web Service.\" } ```    在清单 9-3 和清单\
  \ 9-4 中，您会看到 `Todo` 表示形式包含了对象的所有属性，包括引用的领域模型（如 `owner`）的 ID。唯一的区别是缺少动作或动词。通过 HTTP\
  \ 访问的 RESTful 服务使用标准的 HTTP 方法 `GET`、`POST`、`PUT` 或 `DELETE` 来指定动作。表 9-1 提供了 CRUD\
  \ 操作到 SQL 语句、HTTP 方法和 Grails URL 约定的映射。    表 9-1. SQL 语句、HTTP 方法和 Grails 约定之间的关系\
  \    ![image](img/Table09-1.jpg)    表 9-1 中描述的关系不言自明，并且遵循 REST 原则，但集合的最后一个操作除外。由于\
  \ REST 纯粹专注于 CRUD，它实际上并不处理搜索或返回列表之类的事情。因此，集合操作借鉴了 Grails 中 `list` 动作的概念，并且可以通过执行不带\
  \ ID 的 REST 读取轻松实现，类似于以下内容：    ``` http://localhost/collab-todo/todo  ```    此 URL\
  \ 的结果将包含所有 `Todo` 对象的 XML 表示形式，如清单 9-5 所示。    ***清单 9-5.***  从 RESTful Web 服务返回的\
  \ Todo 对象集合的 POX 表示形式    ``` <list> <todo id=\"1\"> <completedDate>2012-08-11 11:08:00.0</completedDate>\
  \ <createDate>2012-08-11 00:15:00.0</createDate> <dueDate>2012-08-11 11:08:00.0</dueDate>\
  \ <name>Expose Web Service</name> <note>Expose Todo domain as a RESTful Web Service.</note>\
  \ <owner id=\"1\"/> <priority>1</priority> <status>1</status> </todo> <todo id=\"\
  2\"> <completedDate>2012-08-11 11:49:00.0</completedDate> <createDate>2012-08-11\
  \ 00:15:00.0</createDate> <dueDate>2012-08-11 11:49:00.0</dueDate> <name>Expose\
  \ Collection of Todo objects</name> <note>Add a mechanism to return more than just\
  \ a single todo.</note> <owner id=\"1\"/> <priority>1</priority> <status>1</status>\
  \ </todo> </list> ```    请注意，在清单 9-5 中，两个 `Todo` 对象在代表集合的 `<list>` 元素内返回。    Grails\
  \ 中的 RESTful    Grails 提供了几个特性，使得在 Grails 中实现 RESTful Web 服务变得容易。首先，它提供了映射 URL 的能力。对于\
  \ RESTful Web 服务，您希望将 URL 和 HTTP 方法映射到特定的控制器动作。其次，Grails 提供了一些实用方法，可以将任何 Grails\
  \ 领域对象编码为 XML 或 JSON。    在本节中，您将了解如何使用 URL 映射、编码和 Grails 约定来创建一个 `RestController`，该控制器可以为任何\
  \ Grails 领域类返回 XML 或 JSON 表示形式，类似于脚手架能够生成任何 Web 界面的方式。    URL 映射    正如您在上一节中学到的，URL\
  \ 是 RESTful Web 服务架构风格的一个主要方面。因此，涉及 URL 映射也就不足为奇了。但在解释如何映射 RESTful Web 服务之前，让我们先看看默认的\
  \ URL 映射。    默认 URL 映射    您可以在 `grails-app/conf/` 中找到 URL 映射的配置文件 `UrlMappings.groovy`，它与其他配置文件放在一起。它使用一种简单的领域特定语言来映射\
  \ URL。清单 9-6 显示了该文件的默认内容。    ***清单 9-6.***  默认的 UrlMappings.groovy    ``` 1.  class\
  \ UrlMappings { 2.     static mappings = { 3.         \"/$controller/$action?/$id?\"\
  { 4.             constraints { 5.                 // apply constraints here 6.            \
  \ } 7.         } 8.             \"500\"(view:'/error') 9.     } 10\\. } ```    如果您认为\
  \ Grails URL 约定是魔法，那么，它并不是。清单 9-6 的第 3 行揭示了约定是如何映射到 URL 的。第一个路径元素 `$controller`，如第\
  \ 4 章和第 5 章所述，标识哪个控制器处理请求。`$action` 可选地（如 `?` 操作符所示，类似于 Groovy 中的安全解引用操作符）标识控制器上执行请求的动作。最后，`$id`\
  \ 可选地指定要与控制器关联并对其进行操作的领域对象的唯一标识符。    清单 9-6 显示了此配置文件如何映射默认 URL。如果您不喜欢默认设置，或者想要为诸如\
  \ RESTful Web 服务之类的内容创建额外的映射，它是完全可以自定义的。下一节将解释映射。    RESTful 映射    RESTful URL 映射背后的基本概念涉及将\
  \ URL 和 HTTP 方法映射到控制器和动作。    ***清单 9-7.***  RESTful URL 映射    ``` static mappings\
  \ = {    \"/user/$id?\"(resource:\"user\") } ```    这将 URI /user 映射到 UserController。每个\
  \ HTTP 方法（如 `GET`、`PUT`、`POST` 和 `DELETE`）都映射到控制器内的唯一动作。\n\n\n\n你可以通过使用 URL 映射来改变\
  \ HTTP 方法的处理方式，将其映射到 HTTP 方法，如代码清单 9-8 所示。    ***代码清单 9-8.***  将 URL 映射到 HTTP 方法\
  \    ``` \"/user/$id\"(controller: \"user\") {                         action =\
  \ [GET: \"show\", PUT: \"update\", DELETE: \"delete\", POST: \"save\"] } ```   正如我们之前讨论的，Grails\
  \ 提供了自动的 XML 或 JSON 编组。然而，与代码清单 9-7 中使用的 `resource` 参数不同，在代码清单 9-8 的情况下，除非你像代码清单\
  \ 9-9 所示那样指定 `parseRequest` 参数，否则 Grails 不会提供自动的 XML 或 JSON 编组。    ***代码清单 9-9.***  使用自动编组将\
  \ URL 映射到 HTTP 方法    ``` \"/product/$id\"(controller: \"product\", parseRequest:\
  \ true) {                  action = [GET: \"show\", PUT: \"update\", DELETE: \"\
  delete\", POST: \"save\"] } ```   这种技术也简化了下一节中通用 `RestController` 的创建，因为使用一个通用的基础\
  \ URL 总能映射到 `RestController`。因此，调用一个返回 XML 表示（如代码清单 9-3 所示）的 RESTful Web 服务的 URL\
  \ 将如下所示：    ``` http://localhost:8080/collab-todo/rest/todo/1  ```   返回 JSON 表示（如代码清单\
  \ 9-4 所示）的 URL 将如下所示：    ``` http://localhost:8080/collab-todo/json/todo/1  ```\
  \   你可以通过在 `UrlMappings.groovy` 中添加一个额外的 URL 映射来实现此映射。代码清单 9-10 展示了该映射的样子。    ***代码清单\
  \ 9-10.***  使用 rest 格式类型    ``` 1\\. \"/$rest/$controller/$id?\"{ 2.     controller\
  \ = \"rest\" 3.     action = [GET:\"show\", PUT:\"create\", POST:\"update\", DELETE:\"\
  delete\"] 4.     constraints { 5.         rest(inList:[\"rest\",\"json\"]) 6.    \
  \ } 7\\. } ```   代码清单 9-10 的第 1 行展示了 URL 的格式。它包含一个必需的 `$rest`（即结果格式类型），后跟必需的 `$controller`\
  \ 和一个可选的 `$id`。由于 `$rest` 只应允许我们期望的两种格式类型，第 5 行使用了 `inList` 约束，这与第 6 章 GORM 讨论中讨论的约束非常相似。任何不是“`rest`”或“`json`”的内容都会导致\
  \ HTTP 404（未找到）错误。第 2 行指定 `RestController` 将处理任何符合此映射的 URL。最后，第 3 行将 HTTP 方法映射到\
  \ `RestController` 上 Grails 的常规操作。    内容协商    内容协商是 HTTP 规范中定义的一种机制，它使得处理不同的传入请求成为可能，以便在同一\
  \ URI 上提供资源表示的不同版本。Grails 内置了对内容协商的支持，可以使用 HTTP Accept 头、显式的格式请求参数或映射 URI 的扩展名。\
  \    通过内容协商，控制器可以自动检测并处理客户端请求的内容类型。在开始处理内容协商之前，你需要告诉 Grails 你希望支持哪些内容类型。默认情况下，Grails\
  \ 在 `grails-app/conf/Config.groovy` 中使用 `grails.mime.types` 设置配置了许多不同的内容类型，如代码清单\
  \ 9-11 所示。    ***代码清单 9-11.***  默认内容类型    ``` grails.mime.types = [ xml: ['text/xml',\
  \ 'application/xml'],                                           text: 'text-plain',\
  \                                           js: 'text/javascript',                                           rss:\
  \ 'application/rss+xml',                                          atom: 'application/atom+xml',\
  \                                          css: 'text/css',                                         \
  \ csv: 'text/csv',                                          all: '*/*',                                         \
  \ json: 'text/json',                                          html: ['text/html','application/xhtml+xml']\
  \                                         ] ```   上述配置允许 Grails 将包含 `'text/xml'`\
  \ 或 `'application/xml'` 媒体类型的请求格式简单地检测为 `'xml'`。    使用 Accept 头进行内容协商    每个符合 HTTP\
  \ 标准的浏览器都必须发送一个 Accept 头。Accept 头包含有关客户端能够接受的各种 MIME 类型的信息。每个传入的 HTTP 请求都有一个特殊的\
  \ Accept 头，它定义了客户端可以“接受”的媒体类型（或 MIME 类型）。代码清单 9-12 展示了一个 Firefox Accept 头的示例。  \
  \  ***代码清单 9-12.***  Accept 头示例    ``` text/xml, application/xml, application/xhtml+xml,\
  \ text/html;q=0.9, text/plain;q=0.8, image/png, */*;q=0.5 ```   Grails 解析此传入格式，并向响应对象添加一个属性，该属性概述了首选的响应格式。\
  \    为了处理来自控制器的不同类型的请求，你可以使用 `withFormat` 方法，它起到类似 switch 语句的作用，如代码清单 9-13 所示。 \
  \   ***代码清单 9-13.***  使用 withFormat 方法    ``` import grails.converters.XML class\
  \ UserController {                def list()  {                        def users\
  \ = User.list()                               withFormat {                                     \
  \ html userList: users                                      xml { render users as\
  \ XML }                        }                }         } ```   如果首选格式是 html，Grails\
  \ 仅执行 `html()` 调用。如果格式是 xml，则调用闭包并渲染 XML 响应。使用 `withFormat` 时，请确保它是控制器操作中的最后一个调用，因为\
  \ `withFormat` 方法的返回值会被操作用来决定下一步做什么。请求格式由 CONTENT_TYPE 头决定，通常用于检测传入请求是否可以解析为 XML\
  \ 或 JSON，而响应格式则使用文件扩展名、格式参数或 Accept 头来尝试向客户端发送适当的响应。控制器上可用的 `withFormat` 专门处理响应格式。要添加处理请求格式的逻辑，请在请求上使用单独的\
  \ `withFormat` 方法，如代码清单 9-14 所示。    ***代码清单 9-14.***  将 withFormat 与请求一起使用    ```\
  \ request.withFormat {                  xml {                         // 读取 XML\
  \                 }                 json {                  // 读取 JSON                 }\
  \        } ```    使用格式请求参数进行内容协商    另一种内容协商机制是使用格式请求参数，通过指定一个格式请求参数来覆盖请求头中使用的格式：\
  \    ``` /user/list?format=xml ```   你也可以在 URL 映射定义中定义此参数：    ``` \"/user/list\"\
  (controller:\"user\", action:\"list\") {                 format = \"xml\" } ```\
  \    使用 URI 扩展名进行内容协商    Grails 也支持使用 URI 扩展名进行内容协商。\n\n\n\n例如，假设你有以下 URI：    ```\
  \ /user/list.xml ```    在这种情况下，Grails 会移除扩展名并将其映射到 `/user/list`，同时根据此扩展名将内容格式设置为\
  \ xml。此行为默认启用；要关闭它，请在 grails-`app/conf/Config.groovy` 中将 `grails.mime.file.extensions`\
  \ 属性设置为 `false`：    ``` grails.mime.file.extensions = false ```    RestController\
  \    \n由于 Grails 已经围绕 CRUD 以及 Groovy 提供的动态类型建立了约定，因此实现一个能够返回任何领域模型的 XML 或 JSON 表示的通用\
  \ RESTful 控制器相对简单。我们将通过解释所有操作使用的通用实现来开始介绍 `RestController`。然后，我们将解释每个操作及其关联的客户端，该客户端调用\
  \ RESTful 服务。    \n通用功能    \n`RestController` 的通用功能是作为拦截器实现的，如第 5 章所述，并附带两个辅助方法。清单\
  \ 9-15 包含了通用功能的完整清单。    \n***清单 9-15.***  RestController    \n``` import static\
  \ org.apache.commons.lang.StringUtils.* import org.codehaus.groovy.runtime.InvokerHelper\
  \ import org.codehaus.groovy.grails.commons.GrailsDomainClass import Error  /**\
  \  * 类似脚手架的控制，用于以 XML 和 JSON 格式为任何领域对象公开 RESTful Web 服务。  */ class RestController\
  \ {   private GrailsDomainClass domainClass   private String domainClassName    //\
  \ 排除的 RESTful 操作    def beforeInterceptor = {     domainClassName = capitalize(params.domain)\
  \     domainClass = grailsApplication.getArtefact(\"Domain\", domainClassName)   }\
  \    private invoke(method, parameters) {     InvokerHelper.invokeStaticMethod(domainClass.getClazz(),\
  \ method, parameters)   }    private format(obj) {     def restType = (params.rest\
  \ == \"rest\")?\"XML\":\"JSON\"     render obj.\"encodeAs$restType\"()   } } ```\
  \    \n清单 9-15 中的 `beforeInterceptor` 在任何操作方法被调用之前被调用。它负责将 URL 的 `$controller` 部分转换为领域类名称和对\
  \ `GrailsDomainClass` 的引用，这些内容存储在控制器的私有变量中。稍后你可以使用 `domainClassName` 进行日志记录和错误消息。该名称是通过使用一种有趣的\
  \ Groovy 导入技术派生的。由于 URL 中的控制器是小写的，你必须在执行查找之前将其大写。为此，请使用静态的 Apache Commons Lang `StringUtilscapitalize()`\
  \ 方法。当调用静态方法时，无需指定工具类，Groovy 中的导入也可以引用一个类，使得语法看起来像是静态辅助方法实际上是一个本地方法。需要引用实际的领域类，以便\
  \ `RestController` 可以调用动态的 GORM 方法。通过名称访问该领域类需要查找它。但是，由于 Grails 领域类不在标准类加载器中，你不能使用\
  \ `Class.forName()`。相反，控制器有一个注入的 `grailsApplication`，它带有一个 `getArtefact()` 方法，你可以使用该方法根据类型查找\
  \ Grails 工件。在这种情况下，类型是领域。你也可以使用此技术来查找控制器、标签库等。    \n![image](img/sq.jpg) **注意**  `RestController`\
  \ 类是面向框架的，因此它使用了一些更内部的东西，例如 `grailsApplication.getArtefact()` 和 `InvokerHelper`\
  \ 来通用地运行。如果你开始编写 Grails 插件，你会比在正常应用程序开发中更频繁地使用这些类型的技术。    \n在清单 9-15 中，辅助方法是 `invoke()`\
  \ 方法和 `format()` 方法。    \n`invoke()` 方法使用 `InvokerHelper` 辅助类来简化对领域类上静态方法的调用。由 `RestController`\
  \ 调用的领域类上的方法都是与 GORM 相关的。`format` 方法使用 URL 的 `$rest` 部分来确定它将调用领域类上的哪些 Grails `encodeAsXXX()`\
  \ 方法。Grails 在所有领域对象上包含了 `encodeAsXML()` 和 `encodeAsJSON()` 方法。    \n通用功能中还涉及另一个类，即清单\
  \ 9-16 中的 `Error` 领域类。    \n***清单 9-16.***  Error 领域类    \n``` class Error {    String\
  \ message } ```    \n是的，清单 9-16 中的 Groovy `Error` 类是一个位于 `grails-app/domain` 目录中的领域类。将其设为领域类会使\
  \ Grails 附加编码方法，从而允许在调用 RESTful Web 服务期间发生错误时返回 XML 或 JSON。    \nRESTful show  \
  \  \n`show` 操作具有双重职责。它既显示单个领域模型，也显示领域模型的集合。清单 9-17 展示了 `show` 操作的实现。    \n***清单\
  \ 9-17.***  show 操作    \n``` def show = {   def result   if(params.id) {     result\
  \ = invoke(\"get\", params.id)   } else {     if(!params.max) params.max = 10     result\
  \ = invoke(\"list\", params)   }    format(result) } ```    \n在清单 9-17 中，你应该注意到该操作使用\
  \ `params` 来确定 URL 中是否传递了 ID。如果是，则对该单个领域模型调用 GORM `get()` 方法。如果不是，则该操作调用 GORM `list()`\
  \ 方法以返回所有领域对象。另外，请注意，就像脚手架一样，该操作默认只返回最多 10 个领域对象。使用 URL 参数，你可以覆盖该限制，就像使用脚手架一样。因此，在\
  \ URL 末尾添加 `?max=20` 将返回最多 20 个领域类，但这确实违背了 REST 的精神。    \n清单 9-18 包含了一个客户端应用程序的示例代码，该程序调用\
  \ `show` 操作并返回单个领域模型。    \n***清单 9-18.***  RESTful GET 客户端 (GetRestClient.groovy)\
  \    \n``` import groovy.util.XmlSlurper  def slurper = new XmlSlurper()  def url\
  \ = \" http://localhost:8080/collab-todo/rest/todo/1 \" def conn = new URL(url).openConnection()\
  \ conn.requestMethod = \"GET\" conn.doOutput = true  if (conn.responseCode == conn.HTTP_OK)\
  \ {   def response    conn.inputStream.withStream {     response = slurper.parse(it)\
  \   }    def id = response.@id   println \"$id - $response.name\" } conn.disconnect()\
  \ ```    \n在清单 9-18 中，有几点需要注意。首先，该示例使用了 `java.net` 包中定义的标准 Java `URL` 和 `URLConnection`\
  \ 类。本章其余部分的所有客户端应用程序都是如此。你也可以使用其他 HTTP 客户端框架，例如 Apache HttpClient。¹ 其次，注意使用了 `GET`\
  \ 请求方法。最后，使用了 Groovy `XmlSlurper` 类来解析返回的 XML。这允许你使用 XPath 表示法来访问诸如结果的 `name` 元素和\
  \ `id` 属性等内容。    \nRESTful delete    \n由于 `DELETE` 与 `GET` 非常相似，因此操作代码和客户端代码都与前面\
  \ `show` 操作部分中显示的代码类似。清单 9-19 展示了 `delete` 操作的实现。    \n***清单 9-19.***  delete 操作\
  \    \n``` def delete = {    def result = invoke(\"get\", params.id);    if(result)\
  \ {     result.\n\n\n\n`delete()`  \n  } else {  \n    result = new Error(message:\
  \ \"${domainClassName} not found with id ${params.id}\")  \n  }  \n  format(result)\
  \  \n}  \n```  \n在清单 9-19 中，对领域类调用了 GORM 的 `get()` 方法。如果找到了该对象，则将其删除。如果未找到，则会返回一条错误消息。清单\
  \ 9-20 展示了调用 `delete` RESTful Web 服务的客户端代码。\n\n***清单 9-20.***  RESTful DELETE 客户端\
  \ (DeleteRestClient.groovy)\n\n```  \ndef url = \" http://localhost:8080/collab-todo/rest/todo/1\
  \ \"  \ndef conn = new URL(url).openConnection()  \nconn.requestMethod = \"DELETE\"\
  \  \nconn.doOutput = true  \n\nif (conn.responseCode == conn.HTTP_OK) {  \n  input\
  \ = conn.inputStream  \n  input.eachLine {  \n    println it  \n  }  \n}  \nconn.disconnect()\
  \  \n```  \n\n清单 9-20 与清单 9-18 的唯一区别在于，清单 9-20 中使用的请求方法是 `DELETE`，并且没有使用 `XmlSlurper`，而是直接将结果内容打印到控制台，这些内容是已删除领域对象的\
  \ XML 或 JSON 结果。\n\n**RESTful 更新**\n\n在 RESTful 范式中，使用 `POST` 来更新现有的领域模型。清单 9-21\
  \ 展示了更新领域模型方法的实现。\n\n***清单 9-21.***  update 动作\n\n```  \ndef update = {  \n  def\
  \ result  \n  def domain = invoke(\"get\", params.id)  \n  if(domain) {  \n    domain.properties\
  \ = params  \n    if(!domain.hasErrors() && domain.save()) {  \n      result = domain\
  \  \n    } else {  \n      result = new Error(message: \"${domainClassName} could\
  \ not be saved\")  \n    }  \n  } else {  \n    result = new Error(message: \"${domainClassName}\
  \ not found with id ${params.id}\")  \n  }  \n  format(result)  \n}  \n```  \n\n\
  与之前的示例类似，清单 9-21 调用了 GORM 的 `get()` 方法来返回要更新的领域模型。如果返回了一个领域模型，则将从客户端传递的所有参数复制到该领域对象中。假设没有错误，则保存该领域模型。清单\
  \ 9-22 展示了一个调用 `POST` 的客户端。\n\n***清单 9-22.***  RESTful POST 客户端 (PostRestClient.groovy)\n\
  \n```  \ndef url = \" http://localhost:8080/collab-todo/rest/todo \"  \ndef conn\
  \ = new URL(url).openConnection()  \nconn.requestMethod = \"POST\"  \n\nconn.doOutput\
  \ = true  \nconn.doInput = true  \n\ndef data = \"id=1&note=\" + new Date()  \n\n\
  conn.outputStream.withWriter { out ->  \n  out.write(data)  \n  out.flush()  \n\
  }  \n\nif (conn.responseCode == conn.HTTP_OK) {  \n  input = conn.inputStream  \n\
  \  input.eachline {  \n    println it  \n  }  \n}  \nconn.disconnect()  \n```  \n\
  \n请注意，清单 9-22 这次使用了 `POST` 方法。同时，请注意数据是以由 `&` 分隔的“名称/值”对的形式传递给服务的。至少，你必须使用 `id`\
  \ 参数，以便服务知道要对哪个领域模型进行操作。你也可以附加其他名称来反映对领域对象的更改。因为这是一个 `POST` 请求，容器会自动解析这些“名称/值”对，并将它们放入\
  \ `params` 中。结果将是更新后的领域对象的 XML 或 JSON 表示形式。\n\n**RESTful 创建**\n\n最后，是 RESTful 服务中最复杂的部分：`create`\
  \ 服务。清单 9-23 展示了其实现。\n\n***清单 9-23.***  create 动作\n\n```  \ndef create = {  \n \
  \ def result  \n  def domain = InvokerHelper.invokeConstructorOf(domainClass.getClazz(),\
  \ null)  \n\n  def input = \"\"  \n  request.inputStream.eachLine {  \n    input\
  \ += it  \n  }  \n\n  // 将输入转换为名称/值对  \n  if(input  && input != '') {  \n    input.tokenize('&').each\
  \ {  \n      def nvp = it.tokenize('=');  \n      params.put(nvp[0],nvp[1]);  \n\
  \    }  \n  }  \n  domain.properties = params  \n\n  if(!domain.hasErrors() && domain.save())\
  \ {  \n    result = domain  \n  } else {  \n    result = new Error(message: \"${domainClassName}\
  \ could not be created\")  \n  }  \n\n  format(result)  \n}  \n```  \n\n清单 9-23\
  \ 首先使用 `InvokerHelper` 在领域类上调用构造函数。与 `POST` 不同，`PUT` 的输入流中的“名称/值”对不会自动添加到 `params`\
  \ 中。你必须通过编程方式来完成。在这个例子中，使用了两个分词器来解析输入流。之后，其余的实现遵循清单 9-21 中的更新示例。清单 9-24 演示了一个执行\
  \ `PUT` 操作的客户端应用程序。\n\n***清单 9-24.***  RESTful PUT 客户端 (PutRestClient.groovy)\n\n\
  ```  \ndef url = \" http://localhost:8080/collab-todo/rest/todo \"  \ndef conn =\
  \ new URL(url).openConnection()  \nconn.requestMethod = \"PUT\"  \n\nconn.doOutput\
  \ = true  \nconn.doInput = true  \n\ndef data = \"name=fred&note=cool&owner.id=1&priority=1&status=1&\"\
  +  \n\"createDate=struct&createDate_hour=00&createDate_month=12&\" +  \n\"createDate_minute=15&createDate_year=2012&createDate_day=11\"\
  \  \n\nconn.outputStream.withWriter { out ->  \n  out.write(data)  \n  out.flush()\
  \  \n}  \nif (conn.responseCode == conn.HTTP_OK) {  \n  input = conn.inputStream\
  \  \n  input.eachLine {  \n    println it  \n  }  \n}  \nconn.disconnect()  \n```\
  \  \n\n清单 9-24 与清单 9-22 几乎相同，只是使用了 `PUT` 请求方法，并且向服务传递了一组更复杂的数据。在这个例子中，数据包含了传递的创建日期。请注意，日期/时间的每个元素都必须作为单独的参数传递。此外，`createDate`\
  \ 参数本身的值必须为 `struct`。结果是已创建领域对象的 XML 或 JSON 表示形式。\n\n**总结**\n\n在本章中，你学习了 RESTful\
  \ Web 服务的架构风格，以及如何将领域模型暴露为 RESTful Web 服务。在构建应用程序时，请寻找以这种方式向客户暴露功能的机会。你可能会对由此带来的、你从未想象过的创新感到惊讶。在第\
  \ 13 章中，你将看到 Groovy 桌面应用程序的一个此类创新。\n\n¹ `http://jakarta.apache.org/httpcomponents/httpclient-3.x/`\n\
  \n**第 10 章**\n\n![image](img/frontdot.jpg)\n\n**报表**\n\n在大多数项目中，报表功能常常被忽略，直到最后一刻才被想起。每个人都专注于将信息录入系统，并让视图的观感和交互体验恰到好处。然后有人开始使用应用程序并问道：“如果用户能把信息打印出来随身携带，那该多好啊？”\
  \ “哎呀，我们没想到这一点。”（此处插入蟋蟀的叫声。）\n\n用户希望随身携带他们的待办事项信息，这是合情合理的。但你时间紧迫，希望尽快推出这个应用程序。你该怎么办？\n\
  \n在本章中，你将学习如何使用 Collab-Todo 领域和一个流行的开源报表引擎 JasperReports¹ 来创建报表功能。创建报表功能将为你提供一个略有不同的\
  \ Grails 视角。你将使用动态调用来检索报表数据，并将数据传递给 JasperReports。在此过程中，你将看到在 Grails 应用程序中使用第三方库是多么容易。\n\
  \n**报表**\n\n本章的目标是允许用户运行一个包含其待办事项列表的报表。\n\n首先，添加一些技术约束来帮助构建解决方案：\n\n*   你希望能够创建多个报表。\n\
  *   报表应以多种格式提供，包括 PDF、HTML、TXT、RTF、XLS、CSV 和 XML。\n\n\n\n*   你信奉 **DRY** 原则，并希望保持关注点分离和封装。\n\
  *   你将利用 Grails 领域模型和动态方法来检索报表数据。\n\n考虑到这些技术约束，你可以构建如图 图 10-1 所示的解决方案。\n\n![9781430248064_Fig10-01.jpg](img/9781430248064_Fig10-01.jpg)\n\
  \n图 10-1 .  报表功能概览\n\n图 10-1 左上角的第一个组件代表一个 HTML 页面。该 HTML 页面需要提供一种方式，让用户表明他们想要生成报表。你可以通过创建一个标签来实现这一点。你可以将所有调用下一步逻辑所需的代码硬编码，但由于存在多个报表，这将导致大量的复制、粘贴和调整工作。这对\
  \ HTML 开发者来说也不太友好。通过创建一个标签，你能够封装所有调用相关的知识。\n\n与 Grails 中的大多数链接一样，标签会调用控制器上的一个操作。考虑到技术约束，控制器应该对要创建的实际报表知之甚少。它应该控制（双关语）报表流程的执行。在本例中，它调用\
  \ `TodoController` 来收集报表所需的数据。\n\n`TodoController` 使用 `Todo` 类上的动态查找器方法从数据库中检索报表数据，并将结果返回给\
  \ `ReportController`。现在 `ReportController` 拥有了报表数据，它调用 `ReportService` 来创建报表。\n\n\
  `ReportService` 准备数据，定位合适的报表模板，并调用报表引擎 JasperReports。报表引擎将数据和模板合并以创建报表。它将报表返回给 `ReportService`，后者再将报表返回给\
  \ `ReportController`。然后 `ReportController` 将报表包装在适当的响应头中，并将其返回给浏览器进行显示。\n\n这只是一个概览。本章的其余部分将更详细地探讨每个步骤，并希望能解答你的大部分（如果不是全部）问题。\n\
  \n**动态查找器还是嵌入式 SQL？**\n\n一个需要立即解决的问题是：“为什么 `ReportController` 将报表数据传递给报表，而不是让报表使用嵌入在报表模板中的简单\
  \ SQL 语句自行查找数据？”答案很简单。在许多情况下，这完全是一种合理的方法（请参阅本章末尾的“另一种方法”一节），但使用动态查找器和领域模型有几个优点。\n\
  \n首先，当领域模型变得复杂时，编写 SQL 来导航所有表和关系容易出错且困难。你已经使用 GORM 在领域模型中定义了所有这些信息，为什么不直接复用呢？\n\n\
  其次，你的目标是学习 Grails，而使用嵌入式 SQL 会导致你错过使用动态查找器以及动态调用 `TodoController` 上的适当操作来收集数据的机会。\n\
  \n现在你已经了解了如何着手创建报表功能，你需要将 JasperReports 添加到应用程序中并创建报表模板。接下来的几节将带你完成这个过程。完成这些后，你将构建各个组件并将它们整合在一起。到本章结束时，你将拥有一个相当不错的报表功能，能够轻松地以多种输出格式创建报表。\n\
  \n**报表工具**\n\n在本节中，你将获得关于 JasperReports（运行时报表引擎）和 iReports（报表设计器）的高级概述。你将安装 iReports\
  \ 并将适当的 JasperReports 库添加到应用程序中。\n\n**概述**\n\nJasperReports 是 JasperSoft 公司出品的一款流行的开源\
  \ Java 报表引擎。² 你可以使用 JasperReports 定义包含图形和图表的健壮、专业的报表。你可以使用 XML 来设置和定义 JasperReports\
  \ 报表。报表引擎使用报表定义和数据源，以多种输出格式生成报表，包括 PDF、XML、HTML、CSV、XLS、RTF 和 TXT。\n\nJasperReports\
  \ 使用第三方库来渲染报表。引擎本身不是一个可执行应用程序。它旨在嵌入到客户端或服务器端应用程序中。应用程序负责将 XML 报表定义、数据源、参数和配置信息传递给报表导出器。导出器将包含报表内容的\
  \ `ByteArrayOutputStream` 返回给应用程序。在典型的服务器应用程序中，应用程序在 HTML 响应上设置适当的内容类型，并将结果流式传输到浏览器。\n\
  \n![image](img/sq.jpg) **提示** JasperReports 依赖抽象窗口工具包（AWT）来渲染报表。如果你打算在没有图形支持的 Linux/Unix\
  \ 环境中运行 Collab-Todo，则需要通过设置 `-Djava.awt.headless=true` 来指定无头环境。你可以通过设置 `JAVA_OPT`\
  \ 环境变量来实现（例如，`JAVA_OPT='–Djava.awt.headless=true'`）。\n\nXML 报表定义（在 Jasper 术语中称为*报表模板*）定义了报表的内容和布局。你可以使用\
  \ XML 编辑器手动定义报表，但这既耗时又容易出错。幸运的是，JasperSoft 创建了 iReports，这是一个用于 JasperReports 的图形化报表设计器，可以定义和编译\
  \ JasperReports。使用 iReports 构建报表比手动构建 XML 报表定义要容易得多。\n\n![image](img/sq.jpg) **注意**\
  \ 对 JasperReports 和 iReports 的全面探讨超出了本书的范围。除了 JasperSoft 网站之外，Apress 出版的书籍 *《JasperReports\
  \ 权威指南》* ³ 和 *《iReports 权威指南》* ⁴ 也是很好的信息来源。\n\n**安装 JasperReports 和 iReports**\n\
  \n安装 JasperReports 和 iReports 很简单。你可以从 iReports 主页 ⁵ 或 SourceForge ⁶ 下载 iReports。下载并执行\
  \ Windows 安装程序版本。\n\n![image](img/sq.jpg) **注意** 如果你使用的不是 Windows 操作系统，则需要下载 `.zip`\
  \ 或 `.tar` 文件，并通过解压缩或解包到合适的位置来手动安装。\n\nWindows 安装程序会将 iReports 安装到你选择的目录中；请记住它的安装位置。iReports\
  \ 包含 JasperReports 和所有必需的第三方库。将以下文件从 `iReports/lib` 目录复制到 `collab-todo/lib` 目录：\n\
  \n*   `poi-x.x.x-FINAL-x.jar`\n*   `commons-beanutils-x.x.jar`\n*   `commons-collections-x.x.jar`\n\
  *   `commons-dbcp-x.x.x.jar`\n*   `commons-digester-x.x.jar`\n*   `commons-logging-x.x.x.jar`\n\
  *   `commons-logging-api-x.x.x.jar`\n*   `commons-pool-x.x.jar`\n*   `itext-x.x.x.jar`\n\
  *   `jasperreports-x.x.x.jar`\n\nGrails 使用这些 JAR 文件来调用 JasperReports。\n\n**创建待办事项报表**\n\
  \n现在 iReports 已安装完毕，你可以开始构建待办事项报表，如图 图 10-1 所示。你将按照以下步骤创建报表：\n\n1.  为 Collab-Todo\
  \ 定义一个 JavaBeans 数据源。\n2.  使用 iReport 向导创建报表的第一个迭代版本。\n3.  增强报表。\n4.  编译报表。\n\n\
  **定义数据源**\n\n如果你还记得概览部分，`ReportController` 从另一个控制器收集报表数据，并最终将数据传递给报表引擎。\n\n\n\n\
  这意味着报表使用的是 JavaBeans 数据源，而非 JDBC 数据库连接。让我们来定义数据源：  \n1.  在 iReports 中，选择“数据”![image](img/arrow.jpg)“连接/数据源”菜单选项。此时会显示当前已定义的数据源和示例数据源列表。\
  \  \n2.  点击“新建”按钮定义一个新的数据源。系统会弹出“连接属性”对话框。  \n3.  从可用数据源列表中选择“JavaBeans 集合数据源”选项，然后点击“下一步”按钮。此时会显示“JavaBeans\
  \ 集合数据源”选项。  \n4.  将名称设置为 `Collab-Todo`，并清空工厂类和静态方法字段。图 10-2 展示了此页面的内容。  \n\n  \
  \  ![9781430248064_Fig10-02.jpg](img/9781430248064_Fig10-02.jpg)  \n\n    图 10-2\
  \ . “JavaBeans 集合数据源”页面  \n\n5.  点击“保存”按钮。你应该能在可用数据源列表中看到新数据源。  \n6.  关闭此窗口。  \n\
  \n现在，你可以使用向导来定义报表了。  \n\n### 使用 iReports  \n\n定义好数据源后，就可以开始构建报表了。如果你已经熟悉 iReports，可以快速浏览本节，直接跳到“报表标签”部分。\
  \  \n\n**让 iReports 识别 Collab-Todo 类**  \n\niReports 使用 Collab-Todo 领域类来创建报表，因此你需要让\
  \ iReports 识别这些领域类。理想情况下，你只需将 Collab-Todo 类的位置添加到 iReports 的类路径中。然而，在撰写本文时，iReports\
  \ 中存在一个 bug，导致此方法无法按预期工作。你必须决定是在 iReports 中手动描述 JavaBean 字段，还是将这些类打包成 JAR 文件并放入\
  \ iReports 的 `lib` 目录中。  \n\n就我们的目的而言，将 Collab-Todo 类打包成 JAR 文件更简单且不易出错。默认情况下，Collab-Todo\
  \ 类应位于 `workspace\\collab-todo\\target` 目录中。你可以使用自己喜欢的 JAR/ZIP 工具将这些类打包成 JAR 文件，并将其放置在\
  \ iReports 的 `lib` 目录中。这样就能让 iReports 识别 Collab-Todo 领域类。  \n\n如果你熟悉 iReports，可以按照自己的方式继续创建报表。不过，我们假设你是\
  \ iReports 新手，因此请按照以下步骤使用 iReports 向导。  \n\n1.  选择“文件”![image](img/arrow.jpg)“报表向导”菜单选项。\
  \  \n2.  指定报表中所需的数据。如果“连接/数据源”字段尚未设置为 `Collab-Todo`，请将其设置为该值。这告诉 iReports 你正在使用\
  \ JavaBeans 数据源。  \n3.  指定包含数据的领域类。你正在创建待办事项报表，因此应将“JavaBean 类”字段设置为 `Todo`。向导应类似于图\
  \ 10-3。  \n\n    ![9781430248064_Fig10-03.jpg](img/9781430248064_Fig10-03.jpg) \
  \ \n\n    图 10-3 . 指定数据源  \n\n4.  假设你已按照“让 iReports 识别 Collab-Todo 类”边栏中的说明操作，点击“下一步”按钮后，你可以选择报表中应包含的字段。向导应类似于图\
  \ 10-4。  \n\n    ![9781430248064_Fig10-04.jpg](img/9781430248064_Fig10-04.jpg) \
  \ \n\n    图 10-4 . 选择字段  \n\n    添加除 `class` 和 `metaClass` 之外的所有字段，然后点击“下一步”按钮。`metaClass`\
  \ 是 Grails 的内部元数据，不适合用于报表。下一个屏幕会列出字段及其数据类型。点击“下一步”按钮继续。  \n5.  现在你应该进入第 3 步“分组依据”。这里无需任何操作，因此点击“下一步”按钮进入第\
  \ 4 步“布局”。  \n6.  向导允许你从预定义的布局中进行选择。作为起点，勾选“列式布局”并高亮选择 `classicC.xml`。你的屏幕应类似于图\
  \ 10-5。  \n\n    ![9781430248064_Fig10-05.jpg](img/9781430248064_Fig10-05.jpg) \
  \ \n\n    图 10-5 . 选择布局  \n\n7.  点击“下一步”按钮进入第 5 步“完成”。点击“完成”按钮生成报表模板。你应该会得到一个类似于图\
  \ 10-6 的报表模板。  \n\n    ![9781430248064_Fig10-06.jpg](img/9781430248064_Fig10-06.jpg)\
  \  \n\n    图 10-6 . 待办事项报表模板  \n\n恭喜！你已创建了第一个报表。它虽然不美观，但功能完备。此时，你可以编译并运行报表。如果这正是你想要的，请直接跳到“编译报表”部分。否则，我们先让报表更易用一些。\
  \  \n\n如你所见，iReports 使用了属性名称来创建标签。作为让报表更易用的第一步，请为标签输入你自己的文本。你可能需要通过拖动标签右侧来调整字段大小。\
  \  \n\n### 增强报表  \n\n如你所见，iReports 使用了 `Todo` 属性名称来创建标签。你应该重新排列标签和字段的顺序，使其更合理。你可以参考图\
  \ 10-7 中的示例。  \n\n![9781430248064_Fig10-07.jpg](img/9781430248064_Fig10-07.jpg)\
  \  \n\n图 10-7 . 重新排列后的标签和字段  \n\n报表看起来好多了，但还可以进一步优化。请按照以下步骤增强报表：  \n\n1.  仔细查看“备注”字段。它有点小，因此请向下拖动字段底部边缘来扩展它。\
  \  \n2.  标题还需要一些调整，因此请添加用户名，该用户名作为参数传递给报表。要定义用户名，请在“文档结构”窗口中右键单击参数条目，然后选择“添加”![image](img/arrow.jpg)“参数”。iReports\
  \ 会弹出一个窗口，让你输入参数名称。将“参数名称”字段设置为 `userName`，如图 10-8 所示。  \n\n    ![9781430248064_Fig10-08.jpg](img/9781430248064_Fig10-08.jpg)\
  \  \n\n    图 10-8 . 设置参数  \n\n3.  定义好参数后，你可以在报表页眉中使用它。将 `userName` 参数从“文档结构”窗口的参数列表中拖放到报表页眉中。同时，将当前文本改为“待办事项：”。图\
  \ 10-9 展示了新页眉的示例。  \n\n    ![9781430248064_Fig10-09.jpg](img/9781430248064_Fig10-09.jpg)\
  \  \n\n    图 10-9 . 新页眉  \n\n4.  将报表保存为 `userTodo.jrxml`，并放置在 Collab-Todo 应用程序目录中。\
  \  \n\n现在，你可以编译报表并将其集成到应用程序中了。  \n\n### 编译报表  \n\n设置好报表后，就可以让它对应用程序可用了。你需要编译它，并将编译后的文件复制到相应的应用程序目录中。\
  \  \n\n在 iReports 中选择“构建”![image](img/arrow.jpg)“编译”。你将在 iReports 底部的输出控制台中看到编译结果。希望首次构建就能成功，但如果失败，请根据错误信息进行排查并重试。构建成功后，将\
  \ `userTodo.jasper` 文件从 iReports 主目录复制到 `collab-todo/web-app/reports` 目录中。  \n\n\
  ### 报表标签  \n\n你已经使用过几个标签，但现在该创建你自己的标签了。  \n\n\n\n如果你之前开发过标签，你会惊喜地发现这在 Grails 中是多么简单。你将创建一个报表标签库来存放报表标签，然后将该标签实现为一个闭包。\n\
  \n## 标签库概述\n\n最佳实践是按主题将标签分组到标签库中。在本例中，所有报表标签都分组在 `grails-app/taglib/ReportTagLib.groovy`\
  \ 文件中。再次注意 Grails 的约定：标签库以 `TagLib.groovy` 结尾，并位于 `grails-app/taglib` 目录下。以下命令演示了如何创建标签库：\n\
  \n```\n> grails create-tag-lib Report\n```\n\n命令的执行结果如下所示：\n\n```\n| Created file\
  \ grails-app/taglib/collab/todo/ReportTagLib.groovy\n| Created file test/unit/collab/todo/ReportTagLibTests.groovy\n\
  ```\n\n正如你所期望的，Grails 创建了标签库和一个单元测试。下一步是创建标签。\n\n## 创建标签\n\n正如你在第 8 章中看到的，标签是一个闭包，它有两个参数：一个标签属性映射和标签体。清单\
  \ 10-1 展示了标签库类。\n\n***清单 10-1.***  标签库类\n\n```\nclass ReportTagLib {\n    def report\
  \ = { attrs, body ->\n    ...\n    }\n}\n```\n\n现在你需要弄清楚花括号里应该放什么。你知道必须让用户选择他们想要接收报表的格式，并且你知道必须调用\
  \ `ReportController` 来生成报表。考虑到这一点，你可以开始设计标签的输入。让我们从使用的角度来看看。清单 10-2 展示了该标签在视图中的可能样子。\n\
  \n***清单 10-2.***  报表标签\n\n```\n<g:report id=\"todoReport\" controller=\"TodoController\"\
  \n            action=\"userTodo\" report=\"userTodo\"\n            format=\"PDF,HTML,CSV,XLS,RTF,TXT,XML\"\
  >\n<input type=\"hidden\" name=\"userName\" value=\"${todoList[0]?.owner}\" />\n\
  </g:report>\n```\n\n基于这些需求，这应该有些道理。`report` 标签有一个 `id` 属性用于唯一标识它。`controller` 和\
  \ `action` 属性共同指定要运行哪个操作来获取报表数据。`report` 属性指定要生成哪个报表，`format` 属性提供一系列报表格式供用户选择。隐藏输入决定了要收集哪个用户的信息。有了这些信息，你可以将注意力转回到标签实现上。标签体给了你关于实现的提示。该标签生成一个\
  \ `<form>` 元素，该元素调用 `ReportController` 的 `index` 操作。`format` 属性用于显示代表每种报表格式的图标。清单\
  \ 10-3 包含了 `report` 标签的实现。\n\n***清单 10-3.***  报表标签实现\n\n```\n1.  def report = {\
  \ attrs, body ->\n2.\n3.    validateAttributes(attrs)\n4.    def appPath = grailsAttributes.getApplicationUri(request)\n\
  5.\n6.    out <<\"\"\"\n7.        <form id=\\\"${attrs['id']}\\\" name=\\\"${attrs['report']}\\\
  \"\n8.          action=\\\"${appPath}/report\\\">\n9.        <input type=\\\"hidden\\\
  \" name=\\\"format\\\"/>\n10.        <input type=\\\"hidden\\\" name=\\\"file\\\"\
  \ value=\\\"${attrs['report']}\\\"/>\n11.       <input type=\\\"hidden\\\" name=\\\
  \"_controller\\\"\n12.          value=\\\"${attrs['controller']}\\\"/>\n13.    \
  \   <input type=\\\"hidden\\\" name=\\\"_action\\\" value=\\\"${attrs['action']}\\\
  \"/>\n14.   \"\"\"\n15.   TreeSet formats = attrs['format'].split(\",\")\n16.  \
  \ formats.each{\n17.     out <<\"\"\"\n18.         <a href=\\\"#${attrs['report']}Report\\\
  \"\n19.                    onClick=\\\"document.getElementById('${attrs['id']}').\n\
  20.                     format.value = '${it}';\n21.                     document.getElementById('${attrs['id']}').submit()\\\
  \">\n22.\n<img width=\\\"16px\\\" height=\\\"16px\\\" border=\\\"0\\\"\n23.    \
  \                src=\\\"${appPath}/images/icons/${it}.gif\\\" />\n24.         </a>\n\
  25.     \"\"\"\n26.   }\n27.   out << body()\n28.   out <<\"</form>\"\n29. }\n30.\n\
  31. private void validateAttributes(attrs) {\n32.   //验证 'id' 属性\n33.   if(attrs.id\
  \ == null)\n34.     throw new Exception(\"'report' 标签中的 'id' 属性不能为 'null'\")\n35.\n\
  36.   //验证 'format' 属性\n37.   def availableFormats = [\"CSV\",\"HTML\",\"RTF\",\"\
  XLS\",\"PDF\",\"TXT\",\"XML\"]\n38.   attrs.format.toUpperCase().split(\",\").each{\n\
  39.     if(!availableFormats.contains(it)){\n40.       throw new Exception(\"\"\"\
  值 ${it} 是无效的 format 属性。\n41.             只允许使用 ${availableFormats}\"\"\")\n42. \
  \    }\n43.   }\n44.  }\n```\n\n让我们逐行查看标签实现。在第 1 行，标签接受两个参数：一个属性映射和标签体。因为你在标签上指定了报表格式，所以第\
  \ 3 行的标签必须验证你指定了受支持的报表格式。第 4 行为应用程序路径创建了一个局部变量。第 6-14 行创建了表单和隐藏输入字段，以便将标签属性传递给 `ReportController`。但是等等，`out`\
  \ 是在哪里定义的？`out` 变量是由 Grails 注入的输出流句柄。\n\n第 15-25 行遍历标签的 `format` 属性，为每种报表格式创建图标。仔细观察，注意当用户选择报表格式时，隐藏输入字段\
  \ `format` 被设置，并且表单被提交。第 27 行输出标签体，第 28 行完成表单定义。第 31-44 行是在第 3 行调用的 `validateAttributes`\
  \ 方法的主体。该方法遍历标签的 `format` 属性，以验证你指定了有效的报表格式。\n\n## ReportController 和 ReportService\n\
  \n`ReportController` 遵循以下三个步骤来创建报表：\n\n1.  通过调用控制器/操作来收集报表数据。\n2.  定位已编译的报表。\n3.\
  \  请求 `ReportService` 生成报表，并用适当的内容类型包装输出。\n\n首先运行以下代码来创建 `ReportController`：\n\n\
  ```\n> grails create-controller Report\n```\n\n现在你需要实现前面列出的三个步骤。清单 10-4 展示了收集报表数据的过程。\n\
  \n***清单 10-4.***  收集报表数据\n\n```\n    def index() {\n        // 收集报表数据。\n       \
  \ // 1) 查找控制器\n        ApplicationContext ctx = (ApplicationContext) session.\n\
  \           getServletContext().\n           getAttribute(GrailsApplicationAttributes.APPLICATION_CONTEXT);\n\
  \        def controller = ctx.getBean(\"${params._controller}\");\n\n        //\
  \ 2) 调用操作\n        def inputCollection = controller.\"${params._action}\"(params)\n\
  \        params.inputCollection = inputCollection\n        ...\n    }\n```\n\n收集报表数据的第一步是动态调用由\
  \ `report` 标签提供的操作。该标签指定了要调用的控制器和操作以收集数据。要调用的控制器和操作通过 `params` 映射传递。问题在于这些值只是字符串。你使用\
  \ Spring 应用程序上下文来获取控制器实例。然后你在控制器上调用该操作，并将 `params` 映射传递给它。\n\n接下来，你需要定位报表。已编译的报表位于\
  \ `web-app/reports` 目录下。清单 10-5 展示了如何使用 `servletContext` 来定位和加载报表。\n\n***清单 10-5.***\
  \  定位和加载报表\n\n```\n// 查找已编译的报表\ndef reportFileName = reportService.reportFileName(\"\
  ${params.file}\")\ndef reportFile = servletContext.\n```\n\n\n`getResource(reportFileName)`\
  \ 如果 `reportFile == null`，则抛出 `FileNotFoundException(\"\"\"\\\"${reportFileName}\\\
  \" file must be in reports repository.\"\"\")`。\n\n最后，你需要生成报告，并用适当的内容类型包装输出。`ReportController`\
  \ 调用 `ReportService` 来生成报告。你可以将服务逻辑合并到控制器中，但控制器的职责是控制，而非执行实际工作。控制器应将实际工作委托给其他组件。将实际的报告生成委托给报告服务，可以保持关注点分离，并将\
  \ JasperReports 库的相关知识封装在 `ReportService` 这一单一位置。清单 10-6 演示了如何委托给 `ReportService`\
  \ 以及如何用适当的上下文类型包装输出。\n\n***清单 10-6.***  调用 ReportService\n\n```groovy\n// 调用 ReportService\
  \ 来调用报表引擎\n  switch(params.format){\n      case \"PDF\":\n         createPdfFile(reportService.generateReport(reportFile,\n\
  \            reportService.PDF_FORMAT,params ).toByteArray(),params.file)\n    \
  \     break\n      case \"HTML\":\n         render(text:reportService.generateReport(reportFile,\n\
  \            reportService.HTML_FORMAT,params),contentType:\"text/html\")\n    \
  \     break\n      case \"CSV\":\n         render(text:reportService.generateReport(reportFile,\n\
  \            reportService.CSV_FORMAT,params),contentType:\"text\")\n         break\n\
  \      case \"XLS\":\n         createXlsFile(reportService.generateReport(reportFile,\n\
  \            reportService.XLS_FORMAT,params).toByteArray(),params.file)\n     \
  \    break\n      case \"RTF\":\n         createRtfFile(reportService.generateReport(reportFile,\n\
  \            reportService.RTF_FORMAT,params).toByteArray(),params.file)\n     \
  \    break\n      case \"XML\":\n         render(text:reportService.generateReport(reportFile,\n\
  \            reportService.XML_FORMAT,params),contentType:\"text\")\n         break\n\
  \      case \"TXT\":\n         render(text:reportService.generateReport(reportFile,\n\
  \            reportService.TEXT_FORMAT,params),contentType:\"text\")\n         break\n\
  \      default:\n         throw new Exception(\"Invalid format\")\n         break\n\
  \  }\n}\n\n/**\n * 输出 PDF 响应\n */\ndef createPdfFile = { contentBinary, fileName\
  \ ->\n  response.setHeader(\"Content-disposition\", \"attachment; filename=\" +\n\
  \        fileName + \".pdf\");\n  response.contentType = \"application/pdf\"\n \
  \ response.outputStream << contentBinary\n}\n\n/**\n * 输出 Excel 响应\n */\ndef createXlsFile\
  \ = { contentBinary, fileName ->\n  response.setHeader(\"Content-disposition\",\
  \ \"attachment; filename=\" +\n      fileName + \".xls\");\n  response.contentType\
  \ = \"application/vnd.ms-excel\"\n  response.outputStream << contentBinary\n}\n\n\
  /**\n * 输出 RTF 响应\n */\ndef createRtfFile = { contentBinary, fileName ->\n  response.setHeader(\"\
  Content-disposition\", \"attachment; filename=\" +\n        fileName + \".rtf\"\
  );\n  response.contentType = \"application/rtf\"\n  response.outputStream << contentBinary\n\
  }\n```\n\n现在你已经有了控制器，接下来需要设置 `ReportService`。你可以通过运行以下命令来创建 `ReportService`：\n\n\
  ```bash\n> grails create-service Report\n```\n\n`ReportService` 的主要功能是封装使用 JasperReports\
  \ API 生成报告的逻辑。清单 10-7 包含了 `ReportService`。\n\n***清单 10-7.***  ReportService\n\n\
