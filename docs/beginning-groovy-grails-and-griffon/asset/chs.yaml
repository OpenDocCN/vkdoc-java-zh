  \ Groovy，他的工作和研究兴趣还涉及 Clojure、Erlang、Haskell 和 Scala。\n\n**Christopher Judd** 是\
  \ Judd Solutions, LLC 的总裁兼首席顾问。他是一位国际演讲者、开源倡导者、俄亥俄中部 Java 用户组的领导者，以及《Enterprise\
  \ Java Development on a Budget》（Apress, 2003）的合著者。他花了 12 年时间为各行业的财富 500 强公司设计和开发软件，这些行业包括保险、零售、政府、制造和运输。他的工作重点是使用\
  \ Java、Java EE、Java 平台微型版（Java ME）、移动技术及相关技术进行咨询、指导和培训。\n\n**Joseph Faisal Nusairat**\
  \ 是《Beginning JBoss Seam》（Apress, 2007）的作者和《Beginning Groovy & Grails》（Apress, 2008）的合著者。他是一名软件开发人员，自\
  \ 1997 年以来一直在哥伦布和凤凰城地区开发基于 Web 的应用程序，主要专注于 Java/Groovy 开发。他的职业生涯涉及多个财富 500 强行业，包括军事应用、数据中心、银行、互联网安全、制药和保险。Joseph\
  \ 毕业于俄亥俄大学，拥有计算机科学和微生物学双学位，并辅修化学。目前，Joseph 在 Integrallis Software（`www.integrallis.com`）担任\
  \ Groovy 专家。在业余时间，他喜欢观看健美比赛和百老汇音乐剧，但不会同时进行。\n\n**Jim Shingler** 是 J.P. Morgan Chase\
  \ 的应用开发副总裁。他的职业生涯重点是使用尖端技术为银行、保险、金融服务和制造业开发 IT 解决方案。他拥有 16 年的大型 Java 项目经验，并在分布式和关系型技术方面拥有丰富的经验。\n\
