  \ 13-3 .  增强后的应用视图    查看图 13-3，很容易看出模型将具有以下属性：`firstName` 和 `lastName`。此外，如果用户同时提供了名字和姓氏，我们将启用创建按钮。代码清单\
  \ 13-6 展示了实现此功能的模型。    ***代码清单 13-6.***  增强 UserModel    ``` package user  import\
  \ groovy.beans.Bindable import griffon.transform.PropertyListener import static\
  \ griffon.util.GriffonNameUtils.isBlank  @Bindable @PropertyListener(clos) class\
  \ UserModel {          String firstName         String lastName         boolean\
  \ create         private clos = { event->                 create = !isBlank(firstName)\
  \ &&                 !isBlank(lastName)         } } ```    代码清单 13-4 中的模型非常简单。除了看起来熟悉的\
  \ `@Bindable` 注解（Griffon 在默认模型中为我们创建了它）之外，还有另一个注解：`@PropertyListener`。`@PropertyListener`\
  \ 注解注册了一个处理变更事件的 `PropertyChangeListener`。`@PropertyListener` 在类级别设置，用于监听与该类关联的所有属性变更事件。`@Bindable`\
  \ 注解为类的所有字段添加了 `PropertyChangeSupport`。这意味着当任何字段值发生变化时，都会触发一个属性变更事件。当事件被触发时，会调用闭包并传入该事件。闭包\
  \ `clos` 将事件作为输入。该闭包使用 `isBlank` 辅助方法来确定布尔值 `create` 的值。`isBlank` 是 Griffon 运行时提供的一个实用方法，用于检查字段是否为空。\
