  \nGroovy 简介\n\n\n\n现代 Java 程序员生活在两种相互冲突的思想流派中。一方面，Groovy、JRuby 和 Jython 等动态语言在表达能力上取得了进步。另一方面，许多\
  \ Java 纯粹主义者认为这些语言过于不切实际而加以排斥。新版本的 Groovy 解决了这一冲突，将自己确立为一种便捷的语言。\n\n不合时宜地，随着编程语言在良性的连续体中演进，总会有某种竞争语言因其性能表现而受到质疑。然而，随着编译器、运行时系统甚至处理能力的逐步增强，性能损失显然并不像想象中那么大。这种竞争语言不仅存活了下来，而且对编程领域产生了相当有利的影响。现在很明显，Groovy\
  \ 并非明年或后年就会消失的时尚。\n\n设计精良的 Groovy 与现有的 Java 库无缝集成，旨在为 Java 带来动态性，同时不会给 Java 开发者带来陡峭的学习曲线。然而，在新的功能丰富的\
  \ JVM 生态系统中，Groovy 并非孤军奋战——JRuby、Jython、Jaskell、Clojure、Scala 等其他语言都是它的同代人。所有这些语言的设计目的，即使不利用\
  \ Java，也是为了缓解 Java 的一些问题。但有几个因素确保了 Groovy 在同类语言中处于领先地位。Groovy 是从头开始设计以在 Java 虚拟机上运行的，Clojure\
  \ 和 Scala 也是如此，这使 Groovy、Clojure 和 Scala 略胜一筹。Jython 和 JRuby 是移植到 JVM 上的。Jaskell\
  \ 是纯函数式语言 Haskell 的 JVM 对应版本。除了执行环境之外，除 Groovy 之外的所有这些语言都缺乏 Java 庞大的库。Groovy 被设计为与\
  \ Java 在源代码和二进制级别上兼容。这意味着 Groovy 类可以继承 Java 类或实现 Java 接口，并且 Java 类可以继承 Groovy 类或实现\
  \ Groovy 接口。Grails 是领先的下一代基于 Groovy 的框架，它构建在广泛使用的 Spring 和 Hibernate 框架之上。另一个基于\
  \ Groovy 的 MVC 框架 Griffon 在桌面应用程序领域带来了一场革命。Groovy 与 Java 的源代码和二进制兼容性，加上由 SpringSource\
  \ 的明星团队支持的两个基于 Groovy 的下一代框架，有力地表明 Groovy 的未来是有保障的。这是合乎逻辑的。\n\n在本章中，我们将介绍 Groovy\
  \ 语言，描述如何安装它，并通过一个示例让您了解 Groovy 相对于 Java 的优势。然后，我们将向您概述 Groovy 语言的关键特性。\n\n安装\n\n\
  Groovy 以 .zip 文件或针对 Windows、Ubuntu 和 Debian（以及直到最近版本的 openSUSE）的平台特定安装程序的形式提供。本节介绍如何安装压缩版本，因为它覆盖了大多数平台。\n\
  \n要安装 Groovy：\n\n1.  从 `http://groovy.codehaus.org/Download` 下载最新的稳定版 Groovy 二进制发行版\
  \ .zip 文件。\n2.  将 `groovy-binary-X.X.X.zip` 解压缩到您选择的位置。\n3.  将 `GROOVY_HOME` 环境变量设置为解压缩\
  \ .zip 文件的目录。\n4.  将 `%GROOVY_HOME%\\bin` 目录添加到您的系统路径。\n\n要验证您的安装，请打开控制台并输入以下内容：\n\
  \n```\n>groovy -v\n```\n\n您应该会看到类似这样的内容：\n\n```\nGroovy Version: 2.0.0 JVM: 1.6.0_31\
  \ Vendor: Sun Microsystems Inc. OS: Windows 7\n```\n\nGroovy 示例\n\n掌握 Groovy 强大和优雅的最佳方式是通过一个示例将其与\
  \ Java 进行比较。在本章的剩余部分，我们将向您展示如何将清单 1-1 中的简单 Java 类转换为 Groovy。然后，我们将演示如何调整代码以使用常见的\
  \ Groovy 惯用法。\n\n***清单 1-1.***  简单 Java 类\n\n```\n1.   package com.apress.bgg;\n\
  2.\n3.   import java.util.List;\n4.   import java.util.ArrayList;\n5.\n6.\n7.  \
  \ public class Todo {\n8.          private String name;\n9.          private String\
  \ note;\n10.\n11.         public Todo() {}\n12.\n13.         public Todo(String\
  \ name, String note) {\n14.                 this.name = name;\n15.             \
  \    this.note = note;\n16.         }\n17.\n18.         public String getName()\
  \ {\n19.                 return name;\n20.         }\n21.\n22.         public void\
  \ setName(String name) {\n23.                 this.name = name;\n24.         }\n\
  25.\n26.         public String getNote() {\n27.                 return note;\n28.\
  \         }\n29.\n30.         public void setNote(String note) {\n31.          \
  \       this.note = note;\n32.         }\n33.\n34.         public static void main(String[]\
  \ args) {\n35.                 List<Todo> todos = new ArrayList<Todo>();\n36.  \
  \               todos.add(new Todo(\"1\", \"one\"));\n37.                  todos.add(new\
  \ Todo(\"2\", \"two\"));\n38.                 todos.add(new Todo(\"3\",\"three\"\
  ));\n39.\n40.                 for(Todo todo : todos) {\n41.                    \
  \    System.out.println(todo.getName() + \" \" + todo.getNote());\n42.         \
  \        }\n43.         }\n44.  }\n```\n\n如果您有任何 Java 经验，您会认出清单 1-1 是一个基本的 Todo\
  \ JavaBean。它具有 name 和 note 属性的 getter 和 setter，以及一个用于初始化新实例的便捷构造函数，该构造函数接受 name\
  \ 和 note。正如您所料，此类可以在 `com.apress.bgg` 包中名为 `Todo.java` 的文件中找到。该类包含一个 `main()` 方法，这是\
  \ Java 类可执行所必需的，也是应用程序的入口点。在第 35 行，`main()` 方法首先创建一个 `java.util.ArrayList` 实例来保存\
  \ `Todos` 的集合。在第 36-38 行，创建了三个 `Todo` 实例并添加到 todos 列表中。最后，在第 40-43 行，一个 for 语句遍历该集合并将\
  \ `Todo` 的 name 和 note 打印到 `System.out`。\n\n将 Java 转换为 Groovy\n\n要将清单 1-1 中的 Java\
  \ Todo 类转换为 Groovy，只需将文件重命名为 `Todo.groovy`。没错，Groovy 的语法源自 Java。这通常被称为复制/粘贴兼容性。所以恭喜您，您已经成为一名\
  \ Groovy 开发者（即使您之前不知道）！这种兼容性级别，加上熟悉的 API，有助于降低 Java 开发者的 Groovy 学习曲线。这也使得将互联网上找到的\
  \ Java 示例合并到 Groovy 应用程序中，然后重构它们使其更 Groovy 化变得更加容易，这正是我们将对清单 1-1 所做的。\n\n要运行此 Groovy\
  \ 应用程序，请在命令行中输入以下内容：\n\n```\n> groovy com\\apress\\bgg\\Todo.groovy\n```\n\n如果您有\
  \ Java 背景，您可能会对不需要先编译代码感到有点惊讶。以下是等效的 Java 命令：\n\n```\n> javac com\\apress\\bgg\\\
  Todo.java\n> java com.apress.bgg.Todo\n```\n\n运行 Java 应用程序是一个两步过程：使用 `javac` 编译类，然后使用\
  \ `java` 在 JVM 中运行可执行类。但是 Groovy 会在运行时编译为字节码，从而节省了开发过程中的一个步骤，从而提高了 Groovy 的生产力。Groovy\
  \ 提供了大量的语法糖，并且能够比 Java 暗示更多内容。当我们通过应用一些 Groovy 惯用法使我们的 Groovy 应用程序更加 Groovy 化时，您将看到这一点。\n\
  \n将 JavaBean 转换为 GroovyBean\n\n让我们从简化 JavaBean 开始，它也可以被称为普通旧 Java 对象 (POJO)。Groovy\
  \ 有 GroovyBean，它是一个具有更简单 Groovy 语法的 JavaBean，有时被称为普通旧 Groovy 对象 (POGO)。GroovyBean\
  \ 默认是公开作用域的。清单 1-2 展示了我们使用 GroovyBean 的示例。\n\n\n\n***清单 1-2.***  使用 GroovyBean 的简单示例\n\
  \n```\n1.   package com.apress.bgg;\n2.\n3.    import java.util.List;\n4.    import\
  \ java.util.ArrayList;\n5.\n6.\n7.    public class Todo {\n8.\n9.           String\
  \ name;\n10.          String note;\n11.\n12.           public static void main(String[]\
  \ args) {\n13.                   List <Todo> todos = new ArrayList<Todo>();\n14.\
  \                  todos.add(new Todo(name:\"1\", note:\"one\"));\n15.         \
  \         todos.add(new Todo(name:\"2\", note:\"two\"));\n16.                  todos.add(new\
  \ Todo(name:\"3\", note:\"three\"));\n17.\n18.                  for(Todo todo :\
  \ todos) {\n19.\n20.                  System.out.println(todo.name + \" \" + todo.note);\n\
  21.                  }\n22.          }\n23.  }\n```\n\n清单 1-2 比清单 1-1 短得多，主要是因为\
  \ Groovy 具有原生属性的概念，这意味着无需声明 getter 和 setter。默认情况下，所有类属性（例如第 9 行和第 10 行的 name 和 note\
  \ 属性）都是公共属性，并会在字节码中自动生成相应的 getter 和 setter。因此，如果从 Java 代码中使用该类，或通过反射来查询该类，你将看到这些\
  \ getter 和 setter。这些属性还具有更直观的使用模型。它们可以直接被赋值或使用，如第 20 行所示，其中直接使用了 name 和 note 属性（而非\
  \ getter）来生成输出。此外，无需显式创建便捷构造函数来初始化 GroovyBean，你可以在构造函数中传递命名参数来初始化任何你想要的属性，如第 14–16\
  \ 行所示。\n\nGroovyBean 有一个非常有用的初始化特性，称为**命名参数**。我们可以向 bean 的构造函数传递一个包含属性名称及其关联初始化值的\
  \ `Map`。每个 GroovyBean 都内置了这个 Map 构造函数，其工作原理是遍历 map 对象，并为 map 中的每个条目调用相应的属性 setter。\n\
  \n假设我们有一个 GroovyBean `Book`，它包含 `id` 和 `title` 属性。我们可以使用一个 map 来初始化这个 bean：\n\n\
  ```\nmap = [id: 1, title: \"Beginning Groovy, Grails and Griffon\"]\nBook = new\
  \ Book( map)\n我们也可以直接将 map 传递给 bean：\nBook = new Book ( id: 1, title: \"Beginning\
  \ Groovy, Grails and Griffon\")\n```\n\n**简化代码**\n\nGroovy 语言中包含的一些语法糖使得分号、括号和数据类型声明变为可选。其他简化代码的有趣特性包括隐式导入（如\
  \ `java.util.*` 包）、通用方法（如适用于包括 Java 对象在内的所有对象的 `println()` 方法）以及更灵活的字符串。清单 1-3 将这些特性应用到了我们的示例中。\n\
  \n***清单 1-3.***  应用语法糖、隐式导入、通用方法和字符串特性的简单示例\n\n```\n1.   package com.apress.bgg;\n\
  2.\n3.   public class Todo {\n4.\n5.           String name\n6.           String\
  \ note\n7.\n8.           public static void main(String[] args) {\n9.          \
  \        def todos = new ArrayList()\n10.                 todos.add(new Todo(name:\"\
  1\", note:\"one\"))\n11.                 todos.add(new Todo(name:\"2\", note:\"\
  two\"))\n12.                 todos.add(new Todo(name:\"3\", note:\"three\"))\n13.\n\
  14.                 for(Todo todo : todos) {\n15.\n16.                         \
  \ println \"${todo.name} ${todo.note}\"\n17.                 }\n18.          }\n\
  19.  }\n```\n\n在清单 1-3 中，在包声明之后，我们不再需要导入 `java.util.List`、`java.util.ArrayList`\
  \ 和 `java.util.Iterator`。由于它们位于 `java.util.*` 包中，因此会被隐式导入。其他隐式包含的包有 `java.lang.*`、`java.net.*`、`java.io.*`、`groovy.lang.*`\
  \ 和 `groovy.util.*`。还要注意，除了 for 语句（我们将在下一轮重构中清理它）之外，所有分号都被移除了。在第 16 行，我们对隐式的 `println()`\
  \ 方法使用了可选括号。但这并不是第 16 行的唯一变化。`println()` 方法被修改为使用 Groovy 的 GString 格式（类似于 Apache\
  \ Ant 的属性格式），而不是拼接两个字符串。我们将在第 2 章中介绍 Groovy 字符串。此时，只需注意这样读起来简单了多少。第 9 行已改为使用可选类型。变量\
  \ `todos` 不再被声明为 `List` 类型。Groovy 使用“鸭子类型”，这意味着如果它叫起来像鸭子，走起路来像鸭子，那它就是鸭子。只要你能向一个对象传递消息，并且它能在可能的情况下处理该请求，你真的关心它的具体类型是什么吗？如果对象无法处理该请求，你将收到一个\
  \ `groovy.lang.MissingMethodException` 或 `groovy.lang.MissingPropertyException`。当然，在认为有必要指定类型的地方，你始终可以选择显式地声明变量类型。\n\
  \n**使用 Groovy 集合表示法和闭包**\n\n重构示例的下一步是利用 Groovy 的集合和映射表示法，并用更优雅的闭包替换丑陋的 for 语句。清单\
  \ 1-4 展示了这个版本。\n\n***清单 1-4.***  使用 Groovy 集合表示法和闭包的示例\n\n```\n1.   package com.apress.bgg;\n\
  2.\n3.   public class Todo {\n4.\n5.          String name\n6.          String note\n\
  7.\n8.          public static void main(String[] args) {\n\n9.                 def\
  \ todos = [\n10.                      new Todo(name:\"1\", note:\"one\"),\n11. \
  \                     new Todo(name:\"2\", note:\"two\"),\n12.                 \
  \     new Todo(name:\"3\", note:\"three\")\n13.                ]\n14.\n15.     \
  \           todos.each {\n16.                      println \"${it.name} ${it.note}\"\
  \n17.                }\n18.         }\n19.  }\n```\n\n注意 `ArrayList` 是如何被 `[]` 替换的。同样，这只是语法糖；Groovy\
  \ 实际上仍然在实例化一个 `ArrayList`。类似地，我们可以使用 `[:]` 语法创建映射。为了使代码更简洁，我们可以在初始化列表时无需为每个条目调用\
  \ `add()` 方法。然后，为了简化迭代，我们调用 `each()` 方法，并传递一个用于打印字符串的闭包。注意，默认情况下，迭代变量是 `it`。第 2\
  \ 章 将提供更多关于 Groovy 列表、映射和闭包的说明和示例。\n\n**摆脱 main() 方法**\n\n我们的示例中残留的一个 Java 丑陋之处是\
  \ `main()` 方法。经过所有这些改进之后，`main()` 方法现在显得格外突出。幸运的是，Groovy 既有类的概念，也有脚本的概念，我们可以将其转换为脚本，从而消除对\
  \ `main()` 方法的需求。首先，文件必须重命名为类似 `Todos.groovy` 的名称。这是因为脚本也会被编译成一个类，如果我们不更改名称，`Todo`\
  \ 类和 `Todo` 脚本之间就会发生名称冲突。然后，我们只需将当前存在于 `main()` 方法中的代码移到 `Todo` 类之外。请注意，在 Groovy\
  \ 中，任何不在类内部的代码都称为脚本。当脚本运行时，其行为将与之前相同。清单 1-5 展示了脚本版本。\n\n***清单 1-5.***  作为脚本的示例\n\
  \n\n\n```\n1.   package com.apress.bgg;\n2.   public class Todo {\n3.   String name\n\
  4.   String note\n5.   }\n6.   def todos = [\n7.   new Todo(name:\"1\", note:\"\
  one\"),\n8.   new Todo(name:\"2\", note:\"two\"),\n9.   new Todo(name:\"3\", note:\"\
  three\")\n10.  ]\n11.  todos.each {\n12.  println \"${it.name} ${it.note}\"\n13.  }\n\
  ```\n\n最终，我们得到了优雅、易读的代码，其代码量仅为最初 Java 版本的一小部分。显而易见，如果我们从一开始就使用 Groovy 惯用语法，Groovy\
  \ 方法的生产力会高得多。\n\nGroovy 语言关键特性\n\n本节概述了使 Groovy 成为 Java 平台值得称赞的扩展的语言特性。后续章节将详细阐述所有这些特性。\n\
  \n断言\n\n断言用于验证预期条件是否为真。Groovy 中的断言比 Java 中的更强大，因为 Java 中的断言仅适用于布尔值，而 Groovy 中的断言可以接受任何类型。Java\
  \ 中的断言可以被禁用，而 Groovy 中的断言始终执行，并且建议在生产代码中使用。\n\n***清单 1-6.***  断言示例\n\n```\ndef list\
  \ = [1, 2, 'x'] // 包含 3 个元素的列表\nassert list.size() == 3\n```\n\n用于 AST 转换的注解\n\n\
  当 Groovy 编译器编译 Groovy 脚本和类时，Groovy 解析器（编译器的前端）会在生成类的最终字节码之前创建一个抽象语法树（AST）。AST 是源代码的内存表示形式，包含类、方法、属性、语句和变量。AST\
  \ 转换是在生成最终字节码之前向源代码中添加新代码（方法、检查）的能力。AST 转换的目标是让开发者在组织代码时，更多地关注业务代码，而不是样板代码或横切关注点。Groovy\
  \ 提供了可用于注解代码结构以进行 AST 转换的注解。以下是使用 Groovy 提供的 `@Singleton` 注解进行 AST 转换的一个示例：\n\n\
  ***清单 1-7.***  使用注解进行 AST 转换\n\n```\n@Singleton\nclass SomeSingleton\n{\n//..\n\
  }\n```\n\n`@Singleton` 注解会创建一个私有构造函数和一个静态方法，通过 AST 转换为我们提供单例的实例。\n\n构建器\n\n在 Java\
  \ 中生成最简单的 XML 文档极其困难且耗时。Groovy 通过提供内置的构建器类简化了 XML 的生成，使得可以从代码内部构建树状结构。也就是说，代码本身的结构类似于我们试图构建的树状结构，从而使生成树状结构的任务变得轻松。\n\
  \n***清单 1-8.***  XML 中的树状结构\n\n```\n<employee>\n<name>John Doe</name>\n<gender>male</gender>\n\
  </ employee >\n```\n\n***清单 1-9.***  生成上述树状结构的 Groovy 代码\n\n```\ndef builder = new\
  \ groovy.xml.MarkupBuilder()\nbuilder.employee {\nname   'John Doe'\ngender  'male'\n\
  }\n```\n\n闭包\n\nGroovy 闭包是花括号 `{}` 内的一段可重用代码块，可以赋值给属性或变量，也可以作为参数传递给方法。当闭包被调用时，花括号内的代码会被执行。\n\
  \n***清单 1-10.***  使用闭包\n\n```\ndef name = \"Chris\"\ndef printClosure = { println\
  \ \"Hello, ${name}\" }\nprintClosure()\nname = \"Joseph\"\nprintClosure()\n```\n\
  \n输出如下：\n\n```\nHello, Chris\nHello, Joseph\n```\n\nGDK\n\nGroovy 整体上由 Groovy 语言、Groovy\
  \ 特有的库以及 GDK 组成。GDK 是 Groovy 对 JDK 中某些现有类的扩展。您可以在 `http://groovy.codehaus.org/groovy-jdk`\
  \ 访问完整的 API 规范。\n\n元编程\n\n元编程是指编写能够创建、查询和操作其他程序或（更常见地）操作自身的程序。元编程可以在编译时或运行时发生。\n\
  \n\n\n编译时元编程的契约是字节码生成。在 Groovy 中，编译时元编程允许你在生成最终字节码之前修改 AST。我们在“用于 AST 转换的注解”一节中演示了一个编译时元编程的示例。运行时元编程的核心在于支持动态方法调用以及方法和类的合成。在\
  \ Groovy 中，运行时元编程通过元对象协议实现。Groovy 中的 MOP 包含类别、Expando 和元类。\n\n***列表 1-11.***  运行时元编程\n\
  \n```\nString.metaClass.firstUpper = {−>\n\nreturn delegate[0].toUpperCase() + delegate[1..delegate.length()\
  \ - 1]\n}\n\nprintln \"iiii\".firstUpper()\n```\n\n列表 1-11 展示了如何动态地向一个类添加额外的方法。我们向不可变的\
  \ `String` 类添加了一个额外的方法。\n\n以下是输出结果：\n\n```\nIiii\n```\n\n原生 JSON 支持\n\nJSON（JavaScript\
  \ 对象表示法）是一种轻量级的数据交换格式，作为 XML 的替代方案，用于在网络中序列化和传输结构化数据。\n\n举个简单的例子，关于一名员工的数据可以用 JSON\
  \ 编写如下：\n\n***列表 1-12.***  JSON 示例\n\n```\nvar person= {\n          \"name\" : \"\
  John Doe\",\n          \"age\" : \"40\"\n};\n```\n\n这会创建一个可通过 employee 变量访问的对象。Groovy\
  \ 1.8 通过 `JsonSlurper`（用于读取 JSON）和 `JsonBuilder`（用于写入 JSON）引入了原生 JSON 支持。\n\n***列表\
  \ 1-13.***  读取 JSON\n\n```\nimport groovy.json.JsonSlurper\n def slurper = new JsonSlurper()\n\
  \ def result = slurper.parseText('{\"person\":{\"name\":\"John Doe\",\"age\":40,\"\
  cars\":[\"bmw\",\"ford\"]}}')\n\nprintln result.person.name\n println result.person.age\n\
  \ println result.person.cars.size()\n println result.person.cars[0]\n println result.person.cars[1]\n\
  ```\n\n以下是输出结果：\n\n```\nJohn Doe\n\nbmw\nford\n```\n\n对列表和映射的原生支持\n\nJava 在语言层面没有像支持数组那样支持集合。Groovy\
  \ 通过增加和改进声明语法及额外方法，增强了 Java 的集合类。\n\nGroovy 包含对 `List` 和 `Map` 的一流支持。它还在语言层面新增了集合类型——`Range`，为管理值的范围提供了专用语法。\n\
  \n***列表 1-14.***  将列表作为语言特性支持\n\n```\nauthors = [ 'Vishal', 'Chris', 'Joseph', 'Jim'\
  \ ]\nprintln authors\nprintln authors[0]\n```\n\n以下是输出结果：\n\n```\n[\"Vishal\", \"\
  Chris\", \"Joseph\", \"Jim\"]\nVishal\n```\n\n对正则表达式的原生支持\n\nGroovy 通过 `=~` 运算符和匹配器对象，将正则表达式处理直接构建到语言中。\n\
  \n面向对象：Groovy 中一切都是对象\n\n与 Java 不同，Groovy 中一切都是对象；没有基本类型。因此，在 Groovy 中不需要自动装箱，因为一切都是对象。\n\
  \n例如，Groovy 将 `2 + 2` 执行为 `2.plus(2)`。加号运算符通过 `plus()` 方法实现。在 Groovy 中，所有运算符都是方法调用。这使得将面向对象应用于运算符成为可能；例如，可以重载/重写任何运算符以提供新的实现。\n\
  \n字符串插值\n\n字符串插值是指在字符串中替换表达式或变量的能力。Java 不支持字符串插值。你必须手动拼接值。以下是在 Java 中需要编写的代码示例：\n\
  \n***列表 1-15.***  Java 中的字符串拼接\n\n```\nString lastName= \"Layka\";\nString fullname=\
  \ \"Vishal \" + lastName;\nSystem.out.println(fullname);\n```\n\n***列表 1-16***.\
  \  Groovy 中的字符串插值\n\n```\ndef lastName = \"Layka\"\ndef fullname = \"Vishal ${lastName}\
  \ \" // 字符串插值（也称为 Gstring）\nprintln fullname\n```\n\n静态类型与动态类型\n\nGroovy 在声明变量时同时支持静态类型和动态类型。动态类型可以通过使用\
  \ `def` 关键字来实现。\n\n\n\n***清单 1-17.***  Groovy 中的动态类型与可选类型\n\n```\ndef var = 10\n\
  var = \"It's a String\"\n```\n\n在脚本中，`def` 关键字是可选的。\n\n***清单 1-18.***  Groovy 中的静态类型与可选类型\n\
  \n```\nString  s1 = \" A String \" // 静态类型\ns2 = \"Another String \" // 可选类型：类型在赋值时确定\n\
  ```\n\n静态类型检查\n\nGroovy 2.0 引入了 `@TypeChecked` 注解，用于标注需要进行静态类型检查的方法或类。这种通过注解启用的类型检查模式，可以在编译时指出错误。\n\
  \n静态类型检查器是基于 Groovy 现有的强大 AST 转换机制构建的。作为一项可选特性，如果你不需要，可以不使用它。要触发静态类型检查，只需在方法或类上使用\
  \ `@TypeChecked` 注解即可开启检查。\n\n***清单 1-19.***  使用 TypeChecked 注解\n\n```\nimport groovy.transform.TypeChecked\n\
  \nvoid doIt() {}\n\n@TypeChecked\nvoid test() {\n\ndott ()//编译错误：找不到匹配的方法 dott()\n\
  ```\n\n}图 1-1 展示了在 Eclipse 中 `@TypeChecked` 注解的实际效果。\n\n![9781430248064_Fig01-01.jpg](img/9781430248064_Fig01-01.jpg)\n\
  \n图 1-1 .  使用 @TypeChecked 注解\n\n静态编译\n\nGroovy 2.0 还支持通过 `@CompileStatic` 启用静态编译。这种模式消除了动态分派带来的运行时开销。\n\
  \n***清单 1-20.***  使用 CompileStatic 注解\n\n```\nimport groovy.transform.CompileStatic\n\
  \n@CompileStatic\nint doubleIt(int num) {\n    2* num\n}\n\nassert doubleIt(2) ==\
  \ 4\n```\n\n使用 `@CompileStatic` 会对代码进行静态编译，生成的字节码运行速度将与 Java 字节码一样快。与 `@TypeChecked`\
  \ 注解类似，`@CompileStatic` 可以标注类和方法，而 `@CompileStatic(SKIP)` 可以在类被标记为 `@CompileStatic`\
  \ 时，跳过对特定方法的静态编译。\n\n可选语法\n\n现在让我们来看看可选语法。\n\n访问修饰符\n\n在 Groovy 中，没有访问修饰符的类被视为 public。没有访问修饰符的属性被视为\
  \ private。没有访问修饰符的方法则是 public。这与 Java 不同，Java 中方法和字段默认为包级访问。Groovy 选择将 public 访问修饰符设为默认值，是因为它是使用最频繁的修饰符，而包级访问的使用频率则低得多。\n\
  \n受检异常\n\n在 Groovy 中，无需声明或捕获受检异常，因为 Groovy 会自动将异常包装为 `RuntimeException`。\n\nGetter\
  \ 和 Setter\n\n与 JavaBeans 类似，Groovy 引入了 GroovyBeans，它支持属性的概念。GroovyBeans 中的属性看起来就像公共字段，无需定义显式的\
  \ getter 和 setter。\n\n***清单 1-21.***  Groovy 中的属性\n\n```\nclass Employee{\nString\
  \ name\n}\nEmployee emp = new Employee()\nemp.setName(\"John Doe\" )\n\nprintln\
  \ emp.name\n```\n\n导入语句\n\n默认情况下，Groovy 总是导入以下包：\n\n```\ngroovy.lang.*\ngroovy.util.*\n\
  java.lang.*\njava.util.*\njava.util.regex.*\njava.net.*\njava.io.*\njava.math.BigDecimal,\
  \ java.math.BigInteger\n```\n\n括号与分号\n\n在 Groovy 中，括号和分号是可选的。以下语句在 Groovy 中都是有效的：\n\
  \n***清单 1-22.***  可选的分号与括号\n\n```\nprintln (\"hello\");\nprintln \"hello\"\n```\n\
  \n返回类型与 return 关键字\n\n在 Groovy 中，方法的返回类型以及方法中最后一条语句的 `return` 关键字都是可选的。方法调用总是返回最后一条语句的结果值。\n\
  \n***清单 1-23.***  可选的 return 关键字\n\n```\nString greeting() {\nresult = \"Hello world\"\
  \nresult\n}\nprintln greeting()\n```\n\n清单 1-23 展示了 `return` 关键字是可选的。\n\n如果使用 `def`\
  \ 关键字作为返回类型，Groovy 会在运行时根据返回的值动态确定返回类型。\n\n***清单 1-24.***  可选的返回类型\n\n```\ndef greeting()\
  \ {\nresult = \"Hello world\"\nresult\n}\nprintln greeting()\n```\n\n清单 1-24 展示了返回类型是动态的。\n\
  \n在清单 1-23 和清单 1-24 中，输出结果都是：\n\n```\nHello world\n```\n\n![image](img/sq.jpg) **注意**  移除括号和分号等结构看起来似乎无关紧要，甚至有些平凡，但正如你将在领域特定语言（Groovy\
  \ 的关键领域之一）中看到的那样，移除这些结构能使代码更接近自然语言。\n\n总结\n\n本章的目的是预览 Groovy 的一些关键特性。我们演示了如何用 Groovy\
  \ 大幅减少编写等效 Java 类所需的代码量，同时提高可读性和表现力。在下一章中，我们将通过探讨 Groovy 的基本语言特性来继续深入学习。\n\n第 2\
  \ 章\n\n![image](img/frontdot.jpg)\n\nGroovy 基础\n\n第 1 章向你介绍了 Groovy、它与 Java 的关系，以及这两种语言的不同之处。本章将深入探讨\
  \ Groovy 语言。首先，你将学习 Groovy 脚本，包括使用命令行、Groovy Shell 和 Groovy 控制台来编译和运行 Groovy 脚本。然后，我们将重点介绍\
  \ Groovy 语言的特定方面：断言、字符串、正则表达式、集合、范围、控制结构、方法、闭包和运算符。\n\n脚本\n\n你将使用 Groovy 语言来构建领域对象、控制器和服务。但这并不是使用\
  \ Groovy 的唯一方式。除了构建类之外，你还可以将 Groovy 用作脚本语言。在后续章节中，你将看到详细的脚本示例。但这里我们先从一个简单的脚本开始。\n\
  \n清单 2-1 是一个非常简单的 Groovy “Hello” 脚本示例，它接受一个参数并用它来打印一条消息。\n\n***清单 2-1***.  一个简单的\
  \ Groovy 脚本：Hello.groovy\n\n```\nprintln \"Hello ${args[0]}, may Groovy be with\
  \ you.\"\n```\n\n通过在命令行输入以下内容来执行脚本：\n\n```\n>groovy Hello \"Luke Skywalker\"\n```\n\
  \n脚本将输出结果：\n\n```\nHello Luke Skywalker, may Groovy be with you.\n```\n\n执行脚本时，Groovy\
  \ 会生成一个与脚本源文件同名的类，其中包含一个包含脚本源代码的 main 方法。等效的 Java 应用程序如清单 2-2 所示。\n\n***清单 2-2***.  Java\
  \ 版本：HelloJava.java\n\n```\npackage com.apress.beginninggrails.cli.scripts;\npublic\
  \ class HelloJava {\n    public static void main(String[] args) {\n        System.out.println(\
  \ \"Hello \"+ args[0]+\", may Java be with you.\" );\n    }\n}\n```\n\n请注意，与 Groovy\
  \ 版本相比，Java 版本要冗长得多。使用 Java，你需要定义一个类和一个 main 方法。你还必须完整限定 println 方法，添加括号，并以分号结尾。然后还需要所有闭合的花括号。即使你是\
  \ Java 粉丝，也不得不承认 Groovy 示例要简短得多，也更容易阅读！此外，你无需在 Groovy 执行之前经历单独的编译步骤。\n\n使用脚本函数\n\
  \n与大多数脚本语言一样，你可以将 Groovy 脚本组织成可重用的代码块。在脚本中，这些代码块被称为函数。清单 2-3 是创建和使用函数的示例。它创建了一个简单的函数来打印姓名，并用两个不同的姓名调用该函数。\n\
  \n\n\n***列表 2-3***.  脚本函数：PrintFullName.groovy\n\n```\ndef printFullName(firstName,\
  \ lastName) {\nprintln \"${firstName} ${lastName}\"\n}\nprintFullName('Luke', 'SkyWalker')\n\
  printFullName('Darth', 'Vader')\n```\n\n此示例定义了 `printFullName` 函数，该函数接受两个参数。接着，该函数被调用了两次：一次打印\
  \ Luke Skywalker，另一次打印 Darth Vader。\n\n编译 Groovy\n\n在前面的示例中，我们让 Groovy 即时编译脚本。与\
  \ Java 一样，你也可以将 Groovy 编译为 Java 字节码。列表 2-4 演示了如何编译列表 2-1 中的 Groovy 脚本。\n\n***列表\
  \ 2-4***.  使用 groovyc 编译 Groovy\n\n```\ngroovyc Hello.groovy\n```\n\n正如你所料，编译 Hello.groovy\
  \ 会生成 `Hello.class`。由于 Groovy 编译为 Java 字节码，你可以使用 Java 命令行来执行它。\n\n***列表 2-5***.\
  \  使用 Java 运行 Groovy 程序\n\n```\njava -cp %GROOVY_HOME%/embeddable/groovy-all-2.0.0.jar;.\
  \ Hello \"Luke Skywalker\"\n```\n\n输出如下：\n\n```\nHello Luke Skywalker\n```\n\n能够使用\
  \ Java 运行 Groovy 程序证明了这一点——Groovy 就是 Java。如果你查看列表 2-5，你会发现运行 Groovy 编译器唯一需要特殊处理的就是在类路径中包含\
  \ `groovy-all-<version>.jar`。\n\nGroovy 编译器是一个联合编译器。它可以同时编译 Groovy 和 Java 代码。联合编译器最初在\
  \ Groovy 1.5 中通过 JetBrains（IntelliJ IDEA 的制造商）的慷慨捐赠而得以实现。联合编译器允许你通过一条编译语句来编译 Groovy\
  \ 和 Java 文件。列表 2-6 和列表 2-7 分别是一个 Groovy 文件和一个 Java 文件，用于演示联合编译。\n\n***列表 2-6***.\
  \  示例 Groovy 文件：Name.groovy\n\n```\nclass Name\n{\nString firstName\nString toString()\
  \ { return \"Hello ${firstName}, Java calling Groovy\" }\n}\n```\n\n***列表 2-7***.\
  \  示例 Java 文件：SayHello.java\n\n```\npublic class SayHello\n{\n    public static\
  \ void main(String args[ ])\n    {\n        Name name = new Name();\n        name.setFirstName(\
  \ args[0] );\n        System.out.println( name.toString() );\n    }\n}\n```\n\n\
  Java 类 `SayHello` 实例化了 Groovy 类 `Name`，并将 `firstName` 属性设置为命令行传入的值。列表 2-8 演示了编译和执行这些程序的过程。\n\
  \n***列表 2-8***.  联合编译与执行\n\n```\ngroovyc *.groovy *.java\njava -cp %GROOVY_HOME%/embeddable/groovy-all-2.0.0.jar;.\
  \ SayHello \"Luke\"\n```\n\n输出如下：\n\n```\nHello Luke, Java calling Groovy\n```\n\
  \n编译 Groovy 和 Java 类是通过告诉 `groovy` 编译匹配以 `.groovy` 和 `.java` 结尾的文件模式来实现的。运行程序的方式与运行任何其他\
  \ Java 程序相同——只需在类路径中包含 `groovy-all-<version>.jar`。\n\n运行 Groovy\n\n你可以通过命令行、Groovy\
  \ Shell 或 Groovy 控制台来运行 Groovy 脚本和类。让我们逐一了解这些技术。\n\n命令行\n\n要从命令行运行 Groovy，你有几个选项：\n\
  \n*   直接在命令行输入 `groovy` `MyPgm` 来使用 Groovy。\n\n如果你运行的是一个脚本，Groovy 会生成一个包含 `main`\
  \ 方法的类，该方法包含脚本命令，然后编译脚本并执行它。如果你不希望每次运行时都重新编译文件，可以使用第三个选项。\n\n*   使用 groovy 将文件编译成类，然后使用\
  \ Java 执行。你在上一节中已经看到了这种方法的一个示例。\n*   如果你在 Windows 环境中，并且 Groovy 是通过带有 `PATHEXT`\
  \ 选项的 Windows 安装程序安装的，你可以省略开头的 `groovy`，直接输入 `MyPgm.groovy`。`PATHEXT` 选项将以 `.groovy`\
  \ 结尾的文件与 Groovy 运行时关联起来。在 Unix 平台上，你可以在文件顶部使用 shebang 来获得相同的结果：\n\n```\n    #!/usr/bin/groovy\n\
  \    println \"Hello ${args[0]}, may Groovy be with you.\"\n    ```\n\nGroovy Shell\n\
  \nGroovy Shell 是一个交互式命令行应用程序（shell），允许你创建、运行、保存和加载 Groovy 脚本和类。要启动 Groovy Shell，请运行\
  \ groovysh。图 2-1 演示了使用 Groovy Shell 执行一个简单脚本。\n\n![9781430248064_Fig02-01.jpg](img/9781430248064_Fig02-01.jpg)\n\
  \n图 2-1.  使用 Groovy Shell\n\n如你所见，脚本打印了 vishal。然后你看到了 `===> null`。按照惯例，Groovy 总是返回方法的结果。在这个例子中，没有结果，因此返回了\
  \ null。\n\nGroovy Shell 包含一个内置的帮助功能，你可以用它来了解更多关于 shell 的信息。要访问它，请在提示符下输入 help。图\
  \ 2-2 显示了帮助列表。\n\n![9781430248064_Fig02-02.jpg](img/9781430248064_Fig02-02.jpg)\n\
  \n图 2-2.  Groovy Shell 帮助信息\n\nGroovy 控制台\n\n图 2-3 所示的 Groovy 控制台是 Groovy Shell\
  \ 的图形化版本。它是使用 SwingBuilder 编写的，SwingBuilder 是一个使构建 Swing 用户界面更简单的 Groovy 模块。\n\n\
  ![9781430248064_Fig02-03.jpg](img/9781430248064_Fig02-03.jpg)\n\n图 2-3.  Groovy\
  \ 控制台\n\n图 2-4 显示了输出已分离的 Groovy 控制台。你可以根据你的环境和安装 Groovy 的方式，通过多种方式启动 Groovy 控制台。最简单的方法是执行位于\
  \ Groovy bin 目录中的 Groovy 控制台。\n\n![9781430248064_Fig02-04.jpg](img/9781430248064_Fig02-04.jpg)\n\
  \n图 2-4.  输出已分离的 Groovy 控制台\n\n该控制台提供了创建、保存、加载和执行类与脚本的能力。控制台的一些不错的功能包括撤销/重做以及检查变量的能力。如果你必须在\
  \ Groovy Shell 和 Groovy 控制台之间做出选择，我们推荐使用 Groovy 控制台。\n\n断言\n\n作为一名开发者，如果你使用过 JUnit（或任何\
  \ JUnit 的变体），你应该已经对断言有所了解。断言用于验证预期条件是否为真。如果预期条件不为真，则会抛出 `java.lang.AssertionError`。你可以通过使用\
  \ Groovy 表达式来测试预期条件是否为真。列表 2-9 演示了 Java 和 Groovy 版本的 assert。\n\n***列表 2-9***.  Java\
  \ 和 Groovy 断言\n\n```\n// Java assert\nassert 1==2 : \"One isn't Two\";\n// Groovy\
  \ assert\nassert 1==2 : \"One isn't Two\"\n```\n\n如你所见，Groovy 的 assert 语法与 Java\
  \ 相同，只是末尾没有分号。消息位于表达式的右侧，并用冒号分隔。与 Java 一样，assert 的消息部分是可选的。\n\n![image](img/sq.jpg) **提示**  作为最佳实践，在使用断言时，你应该包含一条消息。这将有助于后续维护你代码的人理解其意图。\n\
  \n当断言失败时，Groovy 会抛出 `java.lang.AssertionError`。列表 2-10 是列表 2-9 中 Groovy 断言失败时的输出。\n\
  \n***列表 2-10***.  断言失败\n\n\n\n```\nCaught: java.lang.AssertionError: One isn't Two.\
  \ Expression: <1 == 2>\njava.lang.AssertionError: One isn't Two. Expression: <1\
  \ == 2>\n                  at Hello.run<Hello.groovy:2>\nD:\\groovy\\groovy-2.0.0>\n\
  ```\n\nPower Asserts（强力断言）\n\nGroovy 的 `assert` 关键字仅用于检查传递给它的表达式是否为真。如果为假，它只会告诉你表达式为假，并给出表达式中使用的变量的值，但不会提供更多信息。借助\
  \ Power Asserts，断言的输出会以可视化方式呈现被断言表达式中每个子表达式的值，如清单 2-11 所示。\n\n***清单 2-11***.  强力断言特性\n\
  \n```\nassert new File('HelloWorld.txt') == new File('Hello.txt')\n\nCaught: Assertion\
  \ failed:\n\nassert new File<'HelloWorld.txt'> == new File<'Hello.txt'>\n       ¦                          \
  \ ¦ ¦\n       HelloWorld.txt              ¦ Hello.txt\n                                  \
  \ false\nAssertion failed:\n\nassert new File<'HelloWorld.txt'> == new File<'Hello.txt'>\n\
         ¦                           ¦ ¦\n       HelloWorld.txt              ¦ Hello.txt\n\
                                     false\n         at Hello.run<Hello.groovy:2>\n\
  ```\n\n断言非常实用，是良好测试的基石之一。它们在阐明意图方面也表现出色。在本书的许多示例中，你都会看到断言的身影。\n\n字符串\n\nGroovy 支持两种字符串：常规\
  \ Java 字符串和 GString。在 Groovy 中，如果字符串由单引号包围，或者由双引号或三引号包围且其中没有未转义的美元符号（`$`），则该字符串是\
  \ `java.lang.String` 的实例。\n\nGString\n\n`GString` 是 `groovy.lang.GString` 的实例，允许在文本中包含占位符。`GString`\
  \ 不是 `String` 的子类，因为 `String` 类是 final 的，无法被扩展。`GString` 与普通字符串类似，但它允许使用 `${..}`\
  \ 在字符串中嵌入变量。仅当嵌入的变量是表达式的占位符时，才需要使用花括号。\n\nGroovy 支持一种在许多其他语言（如 Perl 和 Ruby）中存在的概念，称为字符串插值。字符串插值是指在字符串中替换表达式或变量的能力。如果你有\
  \ Unix shell 脚本、Ruby 或 Perl 的使用经验，应该对此很熟悉。Java 不支持字符串插值，你必须手动拼接值。\n\n清单 2-12 是在\
  \ Java 中需要编写的代码示例。\n\n***清单 2-12***.  使用 Java 构建字符串\n\n```\nString name = \"Jim\"\
  ;\nString helloName = \"Hello \" + name;\nSystem.out.println(helloName);\n```\n\n\
  ***清单 2-13***.  Groovy/GString 中的字符串插值\n\n```\n1\\. str1= \"Jim\"\n2\\. str2 = \"\
  Hello \"\n3\\. println \"$str2$str1\"\n```\n\n在第 3 行中，没有使用花括号，因为仅当嵌入的变量是表达式的占位符时才需要花括号。\n\
  \n当 Groovy 看到使用双引号或斜杠定义的字符串以及嵌入的表达式时，Groovy 会构造一个 `org.codehaus.groovy.runtime.GStringImpl`\
  \ 而不是 `java.lang.String`。当访问 `GString` 时，表达式会被求值。请注意，你可以在 `${}` 表示法中包含任何有效的 Groovy\
  \ 表达式，包括方法调用或变量名。\n\n单行字符串\n\n单行字符串可以使用单引号或双引号。用单引号括起来的字符串会被原样处理。使用单引号定义的字符串不会解释嵌入的表达式，如清单\
  \ 2-14 所示。\n\n***清单 2-14***.  单引号字符串不解释嵌入表达式\n\n```\nname = \"vishal\"\ns1 = 'hello\
  \ $name'\nprintln s1\n```\n\n输出如下：\n\n```\nhello $name\n```\n\n***清单 2-15***.  单引号中嵌套双引号\n\
  \n```\ns1 = 'hello \"vishal\"'\nprintln s1\n```\n\n输出如下：\n\n```\nhello \"vishal\"\
  \n```\n\n使用双引号定义的字符串会解释字符串中的嵌入表达式，如清单 2-16 所示。\n\n***清单 2-16***.  双引号字符串解释嵌入表达式\n\
  \n```\ndef name = \"vishal\"\ns1 = \"hello $name\"\nprintln s1\n```\n\n输出如下：\n\n\
  ```\nhello vishal\n```\n\n***清单 2-17***.  双引号中嵌套单引号\n\n```\ns1 = \"hello 'vishal'\"\
  \nprintln s1\n```\n\n输出如下：\n\n```\nhello 'vishal'\n```\n\n多行字符串\n\nGroovy 支持跨越多行的字符串。多行字符串通过使用三个双引号或三个单引号来定义。\n\
  \n多行字符串支持对于创建模板或嵌入文档（例如 XML 模板、SQL 语句、HTML 等）非常有用。例如，你可以使用多行字符串和字符串插值来构建电子邮件正文，如清单\
  \ 2-18 所示。多行字符串的字符串插值工作方式与常规字符串相同：使用双引号创建的多行字符串会求值表达式，而使用单引号创建的则不会。\n\n***清单 2-18***.  使用多行字符串\n\
  \n```\ndef name = \"Jim\"\ndef multiLineQuote = \"\"\"\nHello, ${name}\nThis is\
  \ a multiline string with double quotes\n\"\"\"\nprintln multiLineQuote\nprintln\
  \ multiLineQuote.class.name\ndef multiLineSingleQuote = '''\nHello, ${name}\nThis\
  \ is a multiline string with single quotes\n'''\nprintln multiLineSingleQuote\n\
  println multiLineSingleQuote.class.name\n```\n\n运行清单 2-18 中的代码将产生以下输出：\n\n```\n\
  Hello, Jim\nThis is a multiline string with double quotes\n\norg.codehaus.groovy.runtime.GStringImpl\n\
  \nHello, ${name}\nThis is a multiline string with single quotes\n\nJava.lang.String\n\
  ```\n\n斜杠字符串\n\n如前所述，斜杠可用于定义字符串。斜杠表示法有一个很好的优点：不需要额外的反斜杠来转义特殊字符。唯一的例外是转义反斜杠本身：`\\\
  /`。在创建需要反斜杠或路径的正则表达式时，斜杠表示法会很有帮助。清单 2-19 说明了使用常规引号和斜杠定义正则表达式以匹配文件系统路径之间的区别。\n\n\
  ***清单 2-19***.  使用斜杠字符串\n\n```\ndef winpathQuoted='C:\\\\windows\\\\system32'\n\
  def winpathSlashy=/C:\\windows\\system32/\nprintln winpathSlashy // C:\\windows\\\
  system32\nassert winpathSlashy ==∼ '\\\\w{1}:\\\\\\\\.+\\\\\\\\.+'\nassert winpathSlashy\
  \ ==∼ /\\w{1}:\\\\.+\\\\.+/\n```\n\n清单 2-19 定义了两个变量，并将它们赋值为一个目录路径。第一个变量定义 `winpathQuoted`\
  \ 使用单引号表示法来定义字符串。使用单引号表示法需要使用额外的反斜杠来转义嵌入的反斜杠。第一个断言语句测试使用单引号定义的正则表达式，同样需要添加额外的反斜杠来转义反斜杠。\n\
  \n请注意，使用斜杠表示法不需要额外的反斜杠。\n\n显然，`winpathSlashy` 更容易编写和阅读，第二个正则表达式也同样更容易编写和阅读。正则表达式和\
  \ `==∼` 运算符将在本章后面的“正则表达式”部分中更详细地介绍。\n\n多行斜杠字符串\n\n斜杠字符串也可以跨越多行。当使用正则表达式的自由间距注释风格时，这对于多行正则表达式特别有用。\n\
  \n***清单 2-20***.  使用多行斜杠字符串\n\n\n\n```\n1\\. def name = \"vishal\"\n2\\. def path=\
  \ \"c:/groovy\"\n3\\. def multilineSlashy = /\n4\\.     Hello $name\n5\\.     path=\
  \ $path\n6\\.     dollar = $\n7\\.     path = c:\\/groovy\n8\\.     /\n9\\. println\
  \ multilineSlashy\n```\n\n以下是输出结果：\n\n```\nHello vishal\npath= c:/groovy\ndollar\
  \ = $\npath = c:/groovy\n```\n\n让我们更详细地看一下清单 2-20：\n\n*   第 1 行定义了一个变量 `name`，并为其赋值“vishal”。\n\
  *   第 2 行定义了一个变量 `path`，并为其赋值“c:/groovy”。\n*   第 3 行定义了一个变量 `multilineSlashy`，并为其分配一个多行字符串，该字符串包含第\
  \ 3 行到第 8 行（位于斜杠之间）的内容。\n*   第 4 行有一个表达式 `$name`，它被求值为 `vishal`，如输出所示。\n*   第 5\
  \ 行有一个表达式 `$path`，它被求值为 `c:/groovy`，如输出所示。\n*   第 6 行有一个 `$` 符号，但它不是一个表达式，因此它直接显示在输出中。\n\
  *   第 7 行有一个斜杠，需要进行转义。\n\n美元斜杠字符串\n\n在多行斜杠字符串中，斜杠仍然需要转义。此外，在多行斜杠字符串中，一个未转义且不是表达式的美元符号会导致\
  \ `MissingPropertyException`，如清单 2-21 所示。\n\n***清单 2-21***.  多行斜杠字符串中的 `MissingPropertyException`\n\
  \n```\n1\\. def name = \"vishal\"\n2\\. def path= \"c:/groovy\"\n3\\. \n4\\. def\
  \ multilineSlashy = /\n5\\.     Hello $name\n6\\.     path= $path\n7\\.     dollar\
  \ = $test\n8\\.     path = c:\\/groovy\n9\\.     /\n10\\. println multilineSlashy\n\
  ```\n\n```\nCaught: groovy.lang.MissingPropertyException: No such property: test\
  \ for class:\nHello\ngroovy.lang.MissingProperyException: No such property: test\
  \ for class: Hello\n                  at Hello.run<Hello.groovy:4>\n```\n\n在清单 2-21\
  \ 中，不存在名为 `test` 的属性；第 7 行的 `$test` 被解释为一个表达式，从而导致 `MissingPropertyException`。\n\
  \n现在，让我们看一下清单 2-22 中的代码，特别是第 7 行。\n\n***清单 2-22***.  多行斜杠字符串中未转义的美元符号\n\n```\n1\\\
  . def name = \"vishal\"\n2\\. def path= \"c:/groovy\"\n3\\. \n4\\. def multilineSlashy\
  \ = /\n5\\.     Hello $name\n6\\.     path= $path\n7\\.     dollar = $ test\n8\\\
  .     path = c:\\/groovy\n9\\.     \n10\\.     /\n11\\.     \n12\\. println multilineSlashy\n\
  ```\n\n这次 Groovy 不会将第 7 行的 `$ test` 解释为表达式，因为 `$` 和 `test` 之间有一个空格，并输出如下结果：\n\n\
  ```\nHello vishal\npath= c:/groovy\ndollar = $ test\npath = c:/groovy\n```\n\n使用美元斜杠字符串，你不再需要用反斜杠转义斜杠（多行斜杠字符串要求转义斜杠），并且如果需要，你可以使用\
  \ `$$` 来转义 `$`，或使用 `$/` 来转义斜杠，如清单 2-23 所示。\n\n***清单 2-23***.  使用美元斜杠字符串\n\n```\n\
  1\\. def name = \"vishal\"\n2\\. def path= \"c:/groovy\"\n3\\. \n4\\. def dollarSlashy\
  \ = $/\n5\\.     Hello $name\n6\\.     path= $path\n7\\.     dollar = $$test //\
  \ 使用 $ 转义 $test\n8\\.     path = c:/groovy\n9\\.     /$\n10\\. println dollarSlashy\n\
  ```\n\n```\nHello vishal\npath= c:/groovy\ndollar = $test\npath = c:/groovy\n```\n\
  \n让我们更详细地看一下清单 2-23：\n\n*   第 4 行定义了一个 `dollarSlashy` 字符串，该字符串包含第 4 行到第 9 行的内容。\n\
  *   第 7 行有一个 `$test`，它在清单 2-21 的多行斜杠字符串中曾导致 `MissingPropertyException`，现在我们使用一个\
  \ `$` 对其进行转义。\n\n正则表达式\n\n正则表达式，有时简称为 regex，是一种使用模式表示法来识别和操作文本的技术。它们在 Unix shell\
  \ 脚本和 Perl 等脚本语言中已经流行了很长时间，并在 Java 1.4 版本中被引入。\n\n![image](img/sq.jpg) **注意**  正则表达式非常强大和健壮。本节讨论\
  \ Groovy 对正则表达式的支持。要全面探索正则表达式，请参考专门介绍该主题的书籍。你也可以在互联网上找到许多有用的教程。\n\n正则表达式是一个字符序列，用于创建一个应用于字符串的模式。该模式由一种模式语言定义。表\
  \ 2-1 展示了 Java 正则表达式语言中一些更常见的模式。\n\n表 2-1. 正则表达式结构总结\n\n| 结构 | 匹配 |\n| --- | ---\
  \ |\n| **字符** |\n| *x* | 字符 *x* |\n| `\\\\` | 反斜杠字符 |\n| `\\t` | 制表符 (`\\u0009`)\
  \ |\n| `\\n` | 换行符 (`\\u000A`) |\n| `\\r` | 回车符 (`\\u000D`) |\n| `\\f` | 换页符 (`\\\
  u000C`) |\n| `\\e` | 转义符 (`\\u001B`) |\n| **字符类** |\n| `[abc]` | `a`、`b` 或 `c`（简单类）\
  \ |\n| `[^abc]` | 除 `a`、`b` 或 `c` 之外的任何字符（否定） |\n| `[a-zA-Z]` | `a` 到 `z` 或 `A`\
  \ 到 `Z`，包含边界（范围） |\n| `[a-d[m-p]]` | `a` 到 `d`，或 `m` 到 `p: [a-dm-p]`（并集） |\n| `[a-z&&[def]]`\
  \ | `d`、`e` 或 `f`（交集） |\n| `[a-z&&[^bc]]` | `a` 到 `z`，除了 `b` 和 `c: [ad-z]`（差集） |\n\
  | `[a-z&&[^m-p]]` | `a` 到 `z`，并且不是 `m` 到 `p: [a-lq-z]`（差集） |\n| **预定义字符类** |\n|\
  \ `.` | 任何字符（可能匹配也可能不匹配行终止符） |\n| `\\d` | 一个数字：[0–9] |\n| `\\D` | 一个非数字：[⁰–9] |\n\
  | `\\s` | 一个空白字符：`[\\t\\n\\x0B\\f\\r]` |\n| `\\S` | 一个非空白字符：`[^\\s]` |\n| `\\w`\
  \ | 一个单词字符：[a-zA-Z_0-9] |\n| `\\W` | 一个非单词字符：`[^\\W]` |\n| **边界匹配器** |\n| `^` |\
  \ 一行的开头 |\n| `$` | 一行的结尾 |\n| `\\b` | 一个单词边界 |\n| `\\B` | 一个非单词边界 |\n| `\\A` | 输入的开头\
  \ |\n| `\\G` | 上一个匹配的结尾 |\n| `\\Z` | 输入的结尾，但如果有最终终止符，则不包括它 |\n| `\\z` | 输入的结尾 |\n\
  | **贪婪量词** |\n| *X*`?` | *X*，一次或零次 |\n| *X*`*` | *X*，零次或多次 |\n| *X*`+` | *X*，一次或多次\
  \ |\n| *X*`{` *n*`}` | *X*，恰好 *n* 次 |\n| *X*`{` *n*`,}` | `X`，至少 *n* 次 |\n| *X*`{`\
  \ *n*`,` *m*`}` | *X*，至少 *n* 次但不超过 *m* 次 |\n| **懒惰量词** |\n| *X*`??` | *X*，一次或零次\
  \ |\n| *X*`*?` | *X*，零次或多次 |\n| *X*`+?` | *X*，一次或多次 |\n| *X*`{` *n*`}?` | *X*，恰好\
  \ *n* 次 |\n| `X{n,}?` | *X*，至少 *n* 次 |\n| *X*`{` *n*`,` *m*`}?` | *X*，至少 *n* 次但不超过\
  \ *m* 次 |\n| **占有量词** |\n| *X*`?+` | *X*，一次或零次 |\n| *X*`*+` | *X*，零次或多次 |\n| *X*`++`\
  \ | *X*，一次或多次 |\n| *X*`{` *n*`}+` | *X*，恰好 *n* 次 |\n| *X*`{` *n*`,}+` | `X`，至少 *n*\
  \ 次 |\n| *X*`{` *n*`,` *m*`}+` | *X*，至少 *n* 次但不超过 *m* 次 |\n| **逻辑运算符** |\n| *XY*\
  \ | *X* 后跟 *Y* |\n| *X*`&#124;` *Y* | *X* 或 *Y* |\n| `(`*X*`)` | *X*，作为一个捕获组 |\n\
  \nGroovy 正则表达式运算符\n\nGroovy 利用了 Java 的正则表达式支持，并通过 Groovy 的字符串支持使其更易于使用。Groovy 还添加了三个便捷运算符：\n\
  \n*   匹配运算符（`==∼`）\n*   查找运算符（`=∼`）\n*   模式运算符（`∼string`）\n\n匹配运算符\n\n如果正则表达式与目标完全匹配，则匹配运算符（`==∼`）返回\
  \ `true`。\n\n清单 2-24 展示了一些使用匹配运算符的示例。\n\n\n\n***清单 2-24.***  使用匹配运算符\n\n```\n1\\\
  . assert \"abc\" ==∼ 'abc'\n2\\. assert \"abc\" ==∼ /abc/\n3\\. assert \"abcabc\"\
  \ ==∼ /abc/ // 失败——不是精确匹配\n4\\. assert \"abc\" ==∼ /^a.c/ // 以 a 开头，中间一个字符，以 c 结尾\n\
  5\\. assert \"abc\" ==∼ /^a../ // 以 a 开头，后面两个字符\n6\\. assert \"abc\" ==∼ /.*c$/\
  \ // 一个或多个字符，以 c 结尾\n7\\. assert \"abc\" ==∼ \".*c\\$\" // 斜杠字符串更好\n```\n\n第 3 行显示，除非是精确匹配，否则匹配将失败（返回\
  \ false）。第 4–6 行展示了定义与目标匹配的正则表达式的几种方式。第 7 行是定义第 6 行正则表达式的另一个示例，不同之处在于它使用了双引号而不是斜杠。需要注意的重要一点是，使用双引号需要使用反斜杠对\
  \ `$` 进行转义。\n\n查找运算符\n\n查找运算符（`=∼`）返回一个 `java.util.regex.Matcher`。匹配器是一个将正则表达式应用于字符串的组件。结果是一个二维的匹配数组。\n\
  \n第一维包含匹配项，第二维包含匹配项内的分组。分组在正则表达式中使用圆括号定义。在清单 2-25 的示例中，正则表达式定义了四个分组。当表达式应用于字符串时，这些分组可以单独访问。这对于识别和访问字符串的各个部分非常有用。\n\
  \n***清单 2-25.***  使用查找运算符\n\n```\n1\\. def winpath=/C:\\windows\\system32\\somedir/\n\
  2\\. def matcher = winpath =∼ /(\\w{1}):\\\\(\\w+)\\\\(\\w+)\\\\(\\w+)/\n3\\. println\
  \ matcher\n4\\. println matcher[0] // [\"C:\\windows\\system32\\somedir\", \"C\"\
  , \"windows\",\n5\\. // \"system32\", \"somedir\"]\n6\\. println matcher[0][1] //\
  \ C\n7\\. def newPath = matcher.replaceFirst('/etc/bin/')\n8\\. println newPath\
  \ // /etc/bin\n```\n\n输出如下：\n\n```\njava.util.regex.Matcher[pattern=(\\w{1}):\\\\\
  (\\w+)\\\\(\\w+)\\\\(\\w+) region=0,27\nlastmatch=]\n[\"C:\\windows\\system32\\\
  somedir\", \"C\", \"windows\", \"system32\", \"somedir\"]\nC\n/etc/bin/\n```\n\n\
  第 1 行将 `winpath` 定义为一个目录路径字符串。第 2 行使用查找运算符将正则表达式应用于 `winpath` 变量，并返回一个 `java.util.regex.Matcher`。该正则表达式被设置为一组捕获分组的表达式。参考表\
  \ 2-1，可以看到 `\\w` 是一个单词字符，`+` 表示一个或多个。当正则表达式匹配该变量时，可以从匹配器中获取各个分组的值。当调用第 3 行时，可以看到匹配器实际上是一个\
  \ `java.util.regex.Matcher`，并且模式匹配成功。第 4 行和第 5 行展示了使用索引表示法打印第一个匹配项的内容。在这个例子中，只会有一个匹配项。如果\
  \ `winpath` 是一个包含多个目录路径的多行字符串，那么匹配器将会有多个匹配项。第 6 行展示了使用第二个索引访问匹配项内的第一个分组。现在你有了一个匹配项，就可以开始应用\
  \ `java.util.regex.Matcher` 的方法了。第 7 行是一个用新值替换第一个匹配项的示例。当你替换一个匹配项时，它会返回一个新的字符串。\n\
  \n模式运算符\n\n模式运算符（`∼string`）将一个字符串转换为一个模式（`java.util.regex.Pattern`），这是一个编译后的正则表达式。当你计划反复使用同一个正则表达式时，可以考虑创建一个模式。重用模式可以提升应用程序的性能。\n\
  \n***清单 2-26.***  创建和使用模式\n\n```\n1\\. def saying = \"\"\"Now is the time for all\
  \ good men (and women) to come to the aid\n2\\. of their country\"\"\"\n3\\. def\
  \ pattern = ∼/(\\w+en)/\n4\\. def matcher = pattern.matcher(saying)\n5\\. def count\
  \ = matcher.getCount()\n6\\. println \"Matches = ${count}\"\n7\\. for(i in 0..<count)\
  \ {\n8\\. println matcher[i]\n9\\. }\n```\n\n输出如下：\n\n```\nMatches = 2\n[\"men\"\
  , \"men\"]\n[\"women\", \"women\"]\n```\n\n第 1 行和第 2 行将一句名言赋值给 saying 变量。第 3 行定义了一个正则表达式模式，用于查找以\
  \ en 结尾的单词，例如 men 和 women。\n\n![image](img/sq.jpg) **注意**  请注意清单 2-26 中模式运算符的 `=`\
  \ 和 `∼` 之间的空格。如果没有空格，它就会变成查找运算符。\n\n第 4 行将模式应用于 saying 并返回一个包含结果的匹配器。\n\n第 5 行和第\
  \ 6 行打印匹配的数量。第 7–9 行循环遍历并打印匹配项。\n\n正则表达式的常见用途\n\n到现在为止，你应该对正则表达式的工作原理有了初步了解。现在让我们看看它们如何应用于实际场景。Web\
  \ 应用程序通常允许用户输入电话号码等个人信息。两个常见的任务是检查电话号码格式是否有效，以及将电话号码解析为各个组成部分。清单 2-27 是一个使用匹配运算符验证电话号码的示例。\n\
  \n***清单 2-27.***  验证电话号码\n\n```\ndef phoneValidation = /^[01]?\\s*[\\(\\.-]?(\\\
  d{3})[\\)\\.-]?\\s*(\\d{3})\\.-$/\nassert '(800)555-1212' ==∼ phoneValidation\n\
  assert '1(800) 555-1212' ==∼ phoneValidation\nassert '1-800-555-1212' ==∼ phoneValidation\n\
  assert '1.800.555.1212' ==∼ phoneValidation\n```\n\n在这个例子中，你看到同一个电话号码的四种不同有效格式。用于验证电话号码格式的正则表达式被赋值给变量\
  \ phoneValidation。匹配运算符通过将正则表达式应用于电话号码来验证电话号码。如果电话号码有效，匹配运算符返回 true。\n\n另一个常见任务是解析电话号码，以便将值放入领域类中。清单\
  \ 2-28 展示了将电话号码解析为各个组成部分并加载到领域类中的过程。\n\n***清单 2-28.***  解析电话号码\n\n```\nclass Phone\
  \ {\nString areaCode\nString exchange\nString local\n}\ndef phoneStr = '(800)555-1212'\n\
  def phoneRegex = ∼/^[01]?\\s*[\\(\\.-]?(\\d{3})[\\)\\.-]?\\s*(\\d{3})\\.-$/\ndef\
  \ matcher = phonePattern.matcher(phoneStr)\ndef phone = new Phone(\nareaCode: matcher[0][1],\n\
  exchange: matcher[0][2],\nlocal: matcher[0][3])\nprintln \"Original Phone Number:\
  \ ${phoneStr}\"\nprintln \"\"\"Parsed Phone Number\\\n\\n\\tArea Code = ${phone.areaCode}\\\
  \n\\n\\tExchange = ${phone.exchange}\\\n\\n\\tLocal = ${phone.local}\"\"\"\n```\n\
  \n在这个例子中，定义了 `Phone` 对象、要解析的电话号码（`phone1`）以及电话号码正则表达式模式（`phoneRegex`）。接下来，将电话号码模式应用于要解析的电话号码。该模式使用分组定义，这使得正则表达式能够将电话号码解析为各个组成部分。`Phone`\
  \ 对象的构造展示了使用第二个索引访问各个组成部分。最后，我们打印出电话号码以证明解析成功。\n\n集合数据类型\n\nGroovy 支持多种不同的集合，包括数组、列表、映射、区间和集合。让我们来看看如何创建和使用每种集合类型。\n\
  \n数组\n\nGroovy 数组是一个对象序列，就像 Java 数组一样。Groovy 使数组的使用稍微容易一些，但你也面临与 Java 数组相同的限制。\n\
  \n***清单 2-29.***  创建和使用数组\n\n\n\n```\n1.  def stringArray = new String[3]\n2.  println\
  \ stringArray.size()\n3.  stringArray[0] = \"Chris\"\n4.  println stringArray //\
  \ {\"Chris\", null, null}\n5.  stringArray[1] = \"Joseph\"\n6.  stringArray[2] =\
  \ \"Jim\"\n7.  println stringArray // {\"Chris\", \"Joseph\", \"Jim\"}\n8.  println\
  \ stringArray[1] // Joseph\n9.  stringArray.each { println it} // Chris, Joseph,\
  \ Jim\n10. println stringArray[-1..-3] // [\"Jim\", \"Joseph\", \"Chris\"]\n```\n\
  \n第 1 行创建了一个大小为 3 的字符串数组。第 3–8 行使用索引访问数组。第 9 行演示了使用 `each()` 方法遍历数组。这值得再看一眼。没错，数组上确实提供了\
  \ `each()` 方法，这非常方便。`each()` 方法用于遍历数组，并对每个元素应用闭包。闭包至少有一个参数，如果未定义显式参数，则可以通过隐式参数 `it`\
  \ 在闭包体内使用该参数。`each()` 方法和 `it` 变量都将在本章的“闭包”部分详细讨论。第 10 行还展示了一些有趣的内容——它使用一个范围（稍后将讨论）来访问数组。在这个例子中，示例更进一步，展示了从左到右访问数组。\n\
  \n列表\n\nGroovy 列表是一个有序的对象集合，与 Java 中的列表相同。它是 `java.util.List` 接口的一个实现。在构建 Grails\
  \ 应用程序的过程中，经常会看到从控制器和服务中返回列表。清单 2-30 演示了如何创建列表及其常见用法。\n\n***清单 2-30.***  创建和使用列表\n\
  \n```\n1.  def emptyList = []\n2.  println emptyList.class.name // java.util.ArrayList\n\
  3.  println emptyList.size // 0\n4.\n5.  def list = [\"Chris\"] // 包含一个元素的列表\n6.\
  \  // 向列表添加元素\n7.  list.add \"Joseph\" // 注意可选的 () 被省略了\n8.  list << \"Jim\" //\
  \ 注意重载的左移运算符\n9.  println list.size // 3\n10.\n11. // 遍历列表\n12. list.each { println\
  \ it } // Chris Joseph Jim\n13.\n14. // 访问列表中的元素\n15. println list[1] // Joseph\
  \ // 索引访问\n16. list[0] = \"Christopher\"\n17. println list.get(0) // Christopher\n\
  18.\n19. list.set(0, \"Chris\") // 将第 0 个元素设置为 Chris\n20. println list.get(0) //\
  \ Chris\n21.\n22. list.remove 2\n23. list-= \"Joseph\" // 重载的 - 运算符\n24. list.each\
  \ { println it } // Chris\n25.\n26. list.add \"Joseph\"\n27. list+=\"Jim\" // 重载的\
  \ + 运算符\n28. list.each { println it } // Chris Joseph Jim\n29. println list[-1]\
  \ // Jim\n```\n\n在清单 2-30 的第 1 行，通过将一个属性赋值为 `[]` 来创建一个空列表。第 2 行打印出列表的类名，以便你可以看到它是一个\
  \ `java.util.ArrayList`。第 3 行打印列表的大小，为 0。第 5–9 行创建了一个已包含一个元素的列表，并展示了向列表添加元素的两种方法。\n\
  \n第 12 行遍历列表，调用闭包来打印内容。`each()` 方法提供了遍历列表中所有元素的能力，并对每个元素调用闭包。这是将闭包作为方法参数使用的一个例子。第\
  \ 15–17 行演示了使用索引访问列表。列表是从零开始索引的。第 15 行展示了访问列表中的第二个元素。第 16 行展示了使用索引将 `position()`\
  \ 赋值为“Christopher”。第 17 行使用 `get()` 方法访问列表。第 19–20 行使用 `set()` 方法为列表的第一个位置赋值，然后将其打印出来。第\
  \ 22–24 行使用 `remove()` 方法和减号运算符从列表中移除元素。第 26–28 行使用 `add()` 方法和加号运算符向列表添加元素。第 29\
  \ 行很有趣——它使用了索引值 -1。使用负索引值会导致列表按相反顺序访问，即从最后一个元素到第一个元素。\n\n映射\n\nGroovy 映射是一个无序的键/值对集合，其中键是唯一的，与\
  \ Java 中的映射相同。它是 `java.util.Map` 的一个实现。默认情况下，除非你另行指定，否则 Groovy 映射是一个 `java.util.LinkedHashMap`。如果你熟悉\
  \ `LinkedHashMap` 映射，就会知道它们按插入顺序排序。如果你需要 `LinkedHashMap` 以外的映射，可以通过实例化来创建任何类型的映射；例如，`def\
  \ aTreeMap = new TreeMap()`。通常，我们建议你将其视为一个常规映射。\n\n清单 2-31 演示了如何创建映射及其常见用法。\n\n\
  ***清单 2-31.***  创建和使用映射\n\n```\n1.  def emptyMap = [:]\n2.  // map.class 返回 null，请使用\
  \ getClass()\n3.  println emptyMap.getClass().name //java.util.LinkedHashMap\n4.\
  \  println emptyMap.size() // 0\n5.\n6.  def todos = ['a':'编写映射部分', 'b':'编写集合部分']\n\
  7.  println todos.size() // 2\n8.  println todos[\"a\"] // 编写映射部分\n9.  println todos.\"\
  a\" // 编写映射部分\n10. println todos.a // 编写映射部分\n11. println todos.getAt(\"b\") //\
  \ 编写集合部分\n12. println todos.get(\"b\") // 编写集合部分\n13. println todos.get(\"c\", \"\
  未知\") // 未知，注意 \"c\" 之前未定义\n14. // 现在它被定义了\n15. println todos // [\"a\":\"编写映射部分\"\
  , \"b\":\"编写集合部分\",\n16. // \"c\":\"未知\"]\n17.\n18. todos.d = \"编写范围部分\"\n19. println\
  \ todos.d // 编写范围部分\n20. todos.put('e', '编写字符串部分')\n21. println todos.e // 编写字符串部分\n\
  22. todos.putAt 'f', '编写闭包部分' // 注意 () 是可选的\n23. println todos.f // 编写闭包部分\n24.\
  \ todos[null] = '未设置任何内容' // 使用 null 作为键\n25. println todos[null] // 未设置任何内容\n26.\n\
  27. // 在单独的行上打印每个键/值对\n28. // 注意：it 是一个隐式迭代器\n29. todos.each { println \"键: ${it.key},\
  \ 值: ${it.value}\" }\n30. // 在单独的行上打印每个键/值对，并带索引\n31. todos.eachWithIndex { it,\
  \ i -> println \"${i} 键: ${it.key}, 值: ${it.value}\" }\n33. // 打印值集合\n34. todos.values().each\
  \ { println it }\n```\n\n在第 1 行，通过将一个属性赋值为 `[:]` 来创建一个空映射。比较一下创建空列表和创建空映射的方式。空列表使用值\
  \ `[]` 创建；空映射使用值 `[:]` 创建。从第 2 行可以看出，该映射是作为 `java.util.LinkedHashMap` 实现的。\n\n第\
  \ 6 行演示了如何定义一个包含多个条目的映射。使用方括号表示法时，冒号将键与值分隔开。第 6 行是 `[key1: value1, key2 : value2]`。\n\
  \n第 8–16 行展示了访问映射的几种不同技术。最有趣的是第 10 行。它展示了将键作为映射的一个属性来使用。你可以使用这种技术从映射中读取元素以及向映射中添加元素。\n\
  \n第 18–25 行展示了向映射中添加元素的几种不同技术。你可以看到它们与第 8–16 行使用的技术是相对应的。\n\n第 29、31、32 和 34 行演示了迭代。第\
  \ 29 行遍历映射以打印键和值。第 31 和 32 行使用索引进行迭代。第 34 行遍历映射的值。\n\n范围\n\n范围是一个顺序值的列表。从逻辑上讲，你可以将其视为\
  \ 1 到 10 或 a 到 z。事实上，范围的声明正是如此：1..10，或 'a'..'z'。范围是任何实现了 `java.lang.Comparable`\
  \ 的对象的列表。这些对象具有 `next()` 和 `previous()` 方法，以便于在范围内导航。这意味着经过一些处理，可以在范围内使用你自己的 Groovy\
  \ 对象。清单 2-32 演示了你可以使用范围执行的一些操作。\n\n***清单 2-32.***  创建和使用范围\n\n\n\n```\n1.  def numRange\
  \ = 0..9\n2.  println numRange.size() // 10\n3.  numRange.each {print it} // 0123456789\n\
  4.  println \"\"\n5.  println numRange.contains(5) // true\n6.\n7.  def alphaRange\
  \ = 'a'..'z'\n8.  println alphaRange.size() // 26\n9.  println alphaRange[1] //\
  \ b\n10.\n11\\. def exclusiveRange = 1..<10\n12\\. println exclusiveRange.size()\
  \ // 9\n13\\. exclusiveRange.each {print it} // 123456789\n14\\. println \"\"\n\
  15\\. println exclusiveRange.contains(10) // false\n16.\n17\\. def reverseRange\
  \ = 9..0\n18\\. reverseRange.each {print it} // 9876543210\n```\n\n第 1、7、11 和 17\
  \ 行演示了如何定义范围。第 1 行定义了一个包含数字的范围。第 7 行定义了一个包含小写字母的范围。第 11 行定义了一个不包含结尾数字的范围。该范围的结果是数字\
  \ 1 到 9，不包括 10。第 17 行创建了一个逆序范围，从 9 到 0。范围常用于迭代。在清单 2-32 中，使用了`each()`方法来迭代范围。清单\
  \ 2-33 展示了使用范围进行迭代的三种方式：一种 Java 方式和两种 Groovy 方式。\n\n***清单 2-33.***  使用范围进行迭代\n\n\
  ```\n1.  println \"Java 风格的 for 循环\"\n2.  for(int i=0;i<=9;i++) {\n3.  println i\n\
  4.  }\n5.\n6.  println \"Groovy 风格的 for 循环\"\n7.  for (i in 0..9) {\n8.  println\
  \ i\n9.  }\n10.\n11\\. println \"Groovy 范围循环\"\n12\\. (0..9).each { i->\n13\\. println\
  \ i\n14\\. }\n```\n\n清单 2-33 首先展示了一个经典的 Java 风格`for`循环。第 7-9 行是使用 Groovy 风格`for`循环的相同循环示例。`for`循环语法将在下一节详细讨论。第\
  \ 12-14 行展示了另一种循环技术，即使用范围和`each()`方法。`each()`方法用于遍历每个元素并对其应用闭包。闭包总是至少有一个参数，如果没有定义显式参数，则可以通过隐式参数`it`在闭包体内使用该参数。`each()`方法和`it`变量都将在本章的闭包部分详细讨论。\n\
  \n集合\n\nGroovy 中的集合是一个无序的对象集合，不允许重复，与 Java 相同。它是`java.util.Set`的一个实现。默认情况下，除非另有指定，Groovy\
  \ 集合是一个`java.util.HashSet`。如果你需要`HashSet`以外的集合，可以通过实例化来创建任何类型的集合；例如，`def aTreeSet\
  \ = new TreeSet()`。通常，我们建议你将其视为一个常规集合。清单 2-34 演示了创建集合及其常见用法。\n\n***清单 2-34.***  创建和使用集合\n\
  \n```\n1.  def emptySet = [] as Set\n2.  println emptySet.class.name // java.util.HashSet\n\
  3.  println emptySet.size() // 0\n4.\n5.  def list = [\"Chris\", \"Chris\" ]\n6.  def\
  \ set = [\"Chris\", \"Chris\" ] as Set\n7.  println \"列表大小: ${list.size()} 集合大小:\
  \ ${set.size()}\" // 列表大小: 2 集合\n    大小: 1\n8.  set.add \"Joseph\"\n9.  set << \"\
  Jim\"\n10\\. println set.size() // 3\n11\\. println set // [\"Chris\", \"Jim\",\
  \ \"Joseph\"]\n12.\n13\\. // 遍历集合\n14\\. set.each { println it }\n15.\n16\\. set.remove\
  \ 2\n17\\. set-= \"Joseph\" // 重载的 - 运算符\n18\\. set.each { println it } // Chris\n\
  19\\. set+= \"Joseph\"\n20\\. set+= \"Jim\"\n21\\. set.each { println it } // Chris\
  \ Joseph Jim\n22.\n23\\. // 将集合转换为列表\n24\\. list = set as List\n25\\. println list.class.name\
  \ // java.util.ArrayList\n26\\. println set.asList().class.name // java.util.ArrayList\n\
  27\\. println set.toList().class.name // java.util.ArrayList\n```\n\n创建空集合类似于创建空列表。区别在于添加了`as\
  \ Set`子句。第 5-7 行说明列表允许重复，而集合不允许。第 8-21 行应该不会让人感到意外。列表和集合之间的一个重要区别是列表提供基于索引的访问，而集合不提供。第\
  \ 24 和 26 行展示了将集合转换为列表的两种不同技术。\n\n控制结构\n\nGroovy 提供了与 Java 相同的控制结构，并使其更简单。控制结构会计算表达式，并确定表达式的结果是\
  \ true 还是 false，并据此改变控制流。\n\nGroovy 真值\n\n在 Groovy 中，任何表达式都可以被求值，这与 Java 不同，Java\
  \ 中只有布尔变量和表达式才能求值为 true 或 false。在 Groovy 真值中，null 对象引用求值为 false。非空集合、数组和映射、长度非零的字符串以及非零数字都将求值为\
  \ true。这非常有用，尤其是对于字符串和集合，如清单 2-35 所示。\n\n***清单 2-35.***  Java 中的集合和字符串空值检查\n\n```\n\
  if (collection != null && !collection.isEmpty()) { ... } // 集合\nif (str != null\
  \ && str.length() > 0) { ... }// 字符串\n```\n\n***清单 2-36.***  Groovy 中的集合和字符串空值检查\n\
  \n```\nif (collection) { ... } // 集合\nif (str) { ... }// 字符串\n```\n\n在 Groovy 中，可以在你自己的类中提供一个强制转换为布尔值的方法。清单\
  \ 2-37 演示了 Groovy 如何使用`boolean``asBoolean()`方法的实现，将`SomeClass`实例强制转换为 true 或 false。\n\
  \n***清单 2-37.***  使用 asBoolean() 方法\n\n```\nclass SomeClass{\nboolean value\nboolean\
  \ asBoolean() { value }\n}\nassert new Test(value: true)\nassert !new Test(value:\
  \ false)\n```\n\n逻辑分支\n\nGroovy 有三种条件语句：`if`语句、三元运算符和`switch`语句。`if`语句和三元运算符与 Java\
  \ 相同，不过 Groovy 通过 Elvis 运算符增强了三元运算符。Elvis 运算符将在第 3 章中讨论。Groovy 中的`switch`语句比 Java\
  \ 中的更强大，因为`switch`可以接受任何类型的对象（与 Java 不同），如清单 2-38 所示。\n\n***清单 2-38.***  使用 switch\n\
  \n```\ndef x = 3.14\ndef result = \"\"\n\nswitch ( x ) {\n    case \"foo\": result\
  \ = \"字符串\"\n\ncase [4, 5, 6 ]:\n        result = \"列表\"\n        break\n\ncase\
  \ 12..30:\n        result = \"范围\"\n        break\n\ncase Integer:\n        result\
  \ = \"整数\"\n        break\n\ncase Number:\n        result = \"数字\"\n        break\n\
  \ndefault:\n        result = \"默认\"\n}\n\nassert result == \"数字\"\n```\n\n循环\n\n\
  除了支持 Java 的`for`循环外，Groovy 还提供了一个更简单的`for`循环，它可以与任何类型的数组集合一起使用，如清单 2-39 所示。\n\n\
  ***清单 2-39.***  使用 for 循环\n\n```\nfor (i in 'Hello')遍历字符串\n    println i\n\nfor\
  \ (i in 0..10)   //遍历范围\n    println i\n\nfor (i in [1,2,3,4]) //遍历列表\n    println\
  \ i\n\nauthors = [1:'Vishal', 2:'Jim', 3: 'Chris', 4:'Joseph']\n\nfor (entry in\
  \ map) //遍历映射\n  println entry.key + ' ' + entry.value\n```\n\n清单 2-39 展示了使用`for`循环遍历字符串、范围、列表和映射，其中使用`in`运算符作为集合中`contains`方法的快捷方式。\n\
  \n异常处理\n\n\n\nGroovy 中的异常处理与 Java 相同。与 Java 一样，你可以指定 `try-catch-finally` 块序列，或者仅使用\
  \ `try-catch`，或者仅使用 `try-finally`。除此之外，在 Groovy 中，方法签名中的异常声明是可选的，即使是受检异常也是如此，并且\
  \ catch 表达式中的类型声明也是可选的。\n\n在 Groovy 中，当 `try/catch/finally` 块是方法或闭包中的最后一个表达式时，它们可以返回一个值。只要这些结构是代码块中的最新表达式，就无需在这些结构内部显式使用\
  \ `return` 关键字。如果在 `try` 块中抛出异常，则会返回 `catch` 块中的最后一个表达式。`finally` 块不返回任何值，如清单 2-40\
  \ 所示。\n\n***清单 2-40.***  从 try/catch/finally 返回值\n\n```\ndef method(bool) {\n  \
  \  try {\n        if (bool) throw new Exception(\"foo\")\n\n} catch(e) {\n\n} finally\
  \ {\n\n}\n}\n\nassert method(false) == 1\nassert method(true) == 2\n```\n\n在 Groovy\
  \ 中，还可以使用多 `catch` 块定义多个异常，由同一个 `catch` 块捕获和处理，如清单 2-41 所示。\n\n***清单 2-41.***  多\
  \ catch 块\n\n```\ntry{\n   /* ... */\n}catch(IOException | NullPointerException\
  \ e) {\n   /* 一个块处理 2 个异常 */\n}\n```\n\n方法\n\n清单 2-42 演示了用 Java 方式在 Groovy 中定义方法。\n\
  \n***清单 2-42.***  用 Java 方式定义方法\n\n```\npublic String hello(String name) {\nreturn\
  \ \"Hello, \" + name;\n}\n```\n\n清单 2-43 演示了使用 Groovy 惯用语法定义方法。\n\n***清单 2-43.***  使用\
  \ Groovy 惯用语法定义方法\n\n```\ndef hello(name) {\n\"Hello, ${name}\"\n}\n```\n\nGroovy\
  \ 定义方法的方式更简洁一些。它利用了 Groovy 的几个可选特性：\n\n*   返回类型和 return 语句不包含在方法体中。Groovy 总是返回最后一个表达式的结果——在本例中，是\
  \ `GString` “Hello, . . .”。\n*   未定义访问修饰符 public。默认情况下，除非你另行指定，否则 Groovy 将所有类、属性和方法默认为\
  \ public 访问。\n\n![image](img/sq.jpg) **注意**  严格来说，Groovy 版本的 `hello` 方法（清单 2-43）与\
  \ Java 版本（清单 2-42）并不完全相同。对应的 Java 方法签名将是：`public Object hello (Object name)`。但在功能上，它们几乎相同。\n\
  \n闭包\n\n在《密西西比河上的旧时光》中，马克·吐温写道：“我 14 岁时，觉得父亲无知得令人难以忍受，简直受不了这个老家伙。但当我 21 岁时，我惊讶地发现，这个老家伙在七年里学到了多少东西。”\n\
  \n函数式编程就像是这位老父亲，在学习编写健壮的并发软件时前来救援。函数式编程为你提供了思考并发性的正确基础。这个基础的三个基石是引用透明性、高阶函数和不可变值。理解这些关键元素对于理解闭包（以及\
  \ Groovy 最近引入的其他函数式特性）至关重要，为此，我们将对函数式编程进行简要介绍。这个介绍绝非全面，但足以让你从函数式的角度看待 Groovy。\n\n\
  Groovy 不像 Haskell 那样是纯函数式语言，但我们仍然可以对其应用函数式原则。函数式编程建立在纯函数的前提之上。在数学中，函数是纯的，因为它们没有副作用。考虑经典的函数\
  \ sin(x)：y = sin(x)。无论调用 sin(x) 多少次，sin(x) 都不会在内部修改任何全局或上下文状态。这样的函数是纯的，没有副作用，并且与上下文无关。这种对周围上下文的无关性被称为引用透明性。如果没有修改全局状态，函数的并发调用就是稳定的。\n\
  \n在函数式编程中，函数是一等公民，这意味着函数可以赋值给变量，函数可以作为参数传递给其他函数，函数也可以作为值从其他函数返回。而这类将函数作为参数或返回函数的函数，被称为高阶函数。\n\
  \n引用透明性、高阶函数和不可变值共同使函数式编程成为编写并发软件的更好方式。尽管函数式语言都致力于消除副作用，但一个永远不允许副作用的语言将毫无用处。事实上，引入副作用对任何语言都至关重要。所有函数式语言都必须提供以受控方式引入副作用的机制，因为即使函数式语言是关于纯编程的，但一种不允许副作用的语言将毫无用处，因为输入和输出本质上是副作用的产物。以受控方式引入副作用的技术之一就是闭包。Groovy\
  \ 中闭包的定义遵循以下语法：\n\n```\n{ [闭包参数 ->] 闭包体}\n```\n\n其中 `[闭包参数->]` 是一个可选的、以逗号分隔的参数列表，闭包体可以是一个表达式，也可以是\
  \ 0 个或多个 Groovy 语句。这些参数看起来类似于方法的参数列表，并且这些参数可以是带类型或不带类型的。\n\nGroovy 闭包是花括号 `{}` 内的一块可重用代码，可以赋值给属性或变量，也可以作为参数传递给方法。闭包只有在被调用时才会执行，而不是在定义时。清单\
  \ 2-44 说明了这一点。\n\n***清单 2-44.***  调用闭包\n\n1.  `def closureVar = {println 'Hello\
  \ world'}`\n2.  `println \"闭包尚未被调用\"`\n3.  `println \" \"`\n4.  `closureVar.call()`\n\
  \n*   第 1 行有一个不带参数的闭包，包含一个 `println` 语句。由于没有参数，因此省略了参数 `List` 和 `->` 分隔符。该闭包由标识符\
  \ `closureVar` 引用。\n*   第 4 行使用显式机制，通过 `call()` 方法来调用闭包。你也可以使用隐式的无名调用方式：`closureVar()`。\n\
  \n从输出可以看出，闭包在第 4 行被调用时打印“Hello world”，而不是在第 1 行定义时。\n\n以下是输出：\n\n```\n闭包尚未被调用\n\
  Hello world\n```\n\n清单 2-45 演示了与清单 2-44 相同的闭包，但带有参数。\n\n***清单 2-45.***  带参数的闭包\n\
  \n```\n1\\. def closureVar = {param -> println \"Hello ${param}\"}\n2\\. closureVar.call('world')\n\
  3\\. closureVar ('implicit world')\n```\n\n*   第 2 行是显式调用，实际参数为 'world'。\n*   第\
  \ 3 行是隐式调用，实际参数为 'implicit world'。\n\n以下是输出：\n\n```\nHello world\nHello implicit\
  \ world\n```\n\n如清单 2-46 所示，闭包的形式参数可以分配默认值。\n\n***清单 2-46.***  带默认值的参数\n\n\n\n```\n\
  1\\. def sayHello= {str1, str2= \" default world\" -> println \"${str1} ${str2}\"\
  \ }\n2\\. sayHello(\"Hello\", \"world\")\n3\\. sayHello(\"Hello\")\n```\n\n*   在第\
  \ 1 行中，`sayHello`闭包接受两个参数，其中参数`str2`具有默认值。\n*   在第 3 行中，只向闭包提供了一个实际参数，因此使用了第二个参数的默认值。\n\
  \n输出结果如下：\n\n```\nHello world\nHello default world\n```\n\n闭包始终具有返回值。该值可以通过闭包体中的一个或多个显式`return`语句指定，如清单\
  \ 2-47 所示；或者，如果未显式指定`return`，则取最后一条执行语句的值，如清单 2-48 所示。\n\n***清单 2-47.***  使用`return`关键字\n\
  \n```\n1\\. def sum = {list -> return list.sum()}\n2\\. assert sum([2,2]) == 4\n\
  ```\n\n***清单 2-48.***  `return`关键字可选\n\n```\n1\\. def sum = {list -> list.sum()}\n\
  2\\. assert sum([2,2]) == 4\n```\n\n声明闭包有多种方式。但在此之前，让我们更深入地探讨闭包的机制。要理解闭包，你必须理解自由变量的概念。当函数体引用一个或多个自由变量时，就形成了闭包。自由变量是指那些并非函数局部变量、也未作为参数传递给函数，而是在定义该函数的外围作用域中定义的变量。因此，闭包引用的是其参数列表中未列出的变量（即自由变量）。它们“绑定”到定义它们的作用域内的变量。清单\
  \ 2-49 对此进行了说明。\n\n***清单 2-49.***  自由变量\n\n```\n1\\. def myConst = 5\n2\\. def incByConst\
  \ = { num -> num + myConst }\n3\\. println incByConst(10) // => 15\n```\n\n运行时“闭合”了自由变量（清单\
  \ 2-49 中的`myConst`），以便在函数执行时该变量可用。也就是说，编译器创建了一个闭包，它封装了自由变量的外部上下文并将它们绑定。\n\n隐式变量\n\
  \n在 Groovy 闭包中，定义了几个具有特殊含义的变量：\n\n`it`\n\n如果只向闭包传递一个参数，则可以省略参数列表和`->`符号，闭包将可以访问代表该参数的`it`，如清单\
  \ 2-50 所示。\n\n***清单 2-50.***  使用`it`\n\n```\ndef clos = {println \"Hello ${it}\"\
  }\nclos.call('world')\n```\n\n输出结果如下：\n\n```\nHello world\n```\n\n闭包始终至少有一个参数。如果未定义显式参数，则该参数将通过隐式参数`it`在闭包体内可用。开发者永远无需声明`it`变量——就像对象中的`this`参数一样，`it`是隐式可用的。如果闭包被零参数调用，则`it`将为`null`。\n\
  \n`this`、`owner`和`delegate`\n\n`this`指的是定义闭包的封闭类的实例。如果闭包是在脚本的作用域内定义的，则封闭类就是脚本类。`owner`是闭包的封闭对象。`owner`与`this`类似，但在嵌套闭包的情况下有所不同，此时封闭对象是外部闭包。`delegate`默认与`owner`相同，但可以更改；例如，在构建器或`ExpandoMetaClass`中。清单\
  \ 2-51 说明了这三个隐式变量。\n\n***清单 2-51.***  使用`this`、`owner`和`delegate`\n\n```\n1\\. class\
  \ Class1{\n2.   def closure = {\n3.     println \"---in closure---\"\n4.     println\
  \ this.class.name\n5.     println owner.class.name\n6.     println delegate.class.name\n\
  7.     def nestedClosure = {\n8.     println \"---in nestedClosure---\"\n9.       println\
  \ this.class.name\n10.       println owner.class.name\n11.       println delegate.class.name\n\
  12.     }\n13.     nestedClosure()\n14.    }\n15\\. }\n16\\. \n17\\. def clos =\
  \ new Class1().closure\n18\\. clos()\n19\\. println \"\"\n20\\. println \"===changing\
  \ the delegate===\"\n21\\. clos.delegate = this\n22\\. clos()\n23\\. println \"\"\
  \n24\\. \n25\\. def closure2 = {\n26.    println \"--- closure outside the class(in\
  \ the script)---\"\n27.    println this.class.name\n28.      println delegate.class.name\n\
  29.      println owner.class.name\n30\\. \n31\\. }\n32\\. \n33\\. closure2()\n```\n\
  \n*   在清单 2-51 中，隐式变量`this`、`owner`和`delegate`出现在外部闭包内（第 4 行至第 6 行）、嵌套闭包内（第 9 行至第\
  \ 11 行）以及类外部（`closure2`，第 27 行至第 29 行）。\n*   外部闭包内（第 4 行至第 6 行）的`this`、`owner`和`delegate`指向类名；例如`Class1`。\n\
  *   嵌套闭包内（第 9 行至第 11 行）的`this`指向类名（例如`Class1`），而`owner`和`delegate`指向外部闭包的闭包类；例如`Class1$_closure1`。\n\
  *   类外部（第 27 行至第 29 行）的`this`、`owner`和`delegate`指向脚本的名称；例如`Hello`。\n*   在第 21 行中，我们将闭包（`Class1`中的外部闭包）的`delegate`更改为`this`，正如我们之前提到的，`delegate`是可更改的。\n\
  \n\n\n```\n---in   closure---\nClass1 Class1 Class1\n---in   nestedClosure---\n\
  Class1 Class1$_closure1 Class1$_closure1\n===changing  the  delegate===\n---in  \
  \ closure---\nClass1 Class1 Hello\n---in  nestedClosure---\nClass1 Class1$_closure1\
  \ Class1$_closure1\n---  closure   outside  the  class<in  the  script>---\nHello\
  \ Hello Hello\n```\n\n**闭包的显式声明**\n\nGroovy 中定义的所有闭包本质上都派生自 `Closure` 类型。由于 `groovy.lang`\
  \ 是自动导入的，我们可以在代码中将 `Closure` 作为一个类型来引用。这就是闭包的显式声明。显式声明闭包的好处在于，非闭包对象无法被意外地赋值给此类变量。\n\
  \n***清单 2-52.***  闭包的显式声明\n\n```groovy\nClosure clos = { println it }\n```\n\n**将方法复用为闭包**\n\
  \nGroovy 提供了方法闭包运算符（`.&`），用于将方法复用为闭包。该运算符允许像访问和传递闭包一样访问和传递方法。清单 2-53 对此进行了说明。\n\n\
  ***清单 2-53.***  将方法复用为闭包\n\n```groovy\n1. def list = [\"Vishal\",\"Chris\",\"Joseph\"\
  ,\"Jim\"]\n2. list.each { println it }\n3. String printName(String name) {\n4. \
  \    println name\n5. }\n6. list.each(this.&printName)\n```\n\n清单 2-53 创建了一个姓名列表，并遍历该列表以打印出这些姓名。在第\
  \ 6 行，方法闭包运算符（`.&`）使得 `printName` 方法能够作为闭包被访问。\n\n输出结果如下：\n\n```\nVishal\nChris\n\
  Joseph\nJim\nVishal\nChris\nJoseph\nJim\n```\n\n闭包是一个对象。你可以像传递任何其他对象一样传递闭包。一个常见的例子是使用闭包遍历集合。\n\
  \n***清单 2-54.***  将闭包作为参数传递\n\n```groovy\ndef list = [\"Chris\", \"Joseph\", \"\
  Jim\"]\ndef sayHello = { println it }\nlist.each(sayHello)\n```\n\n请注意，`sayHello`\
  \ 是一个属性，其值是一个闭包。它被传递给 `each()` 方法，这样当 `each()` 遍历列表时，`sayHello` 闭包就会被调用。\n\n**闭包与集合**\n\
  \n列表、映射和范围包含许多带有闭包参数的方法（GDK 方法），这使得遍历集合或范围的元素变得轻而易举。我们将讨论 `any`、`collect`、`each`、`every`\
  \ 和 `find` 方法。\n\n**any**\n\n`any` 方法遍历集合中的每个元素，检查是否至少有一个元素满足某个条件。该条件由闭包提供。`any`\
  \ 方法的签名是：\n\n```groovy\nboolean any(Closure closure)\n```\n\n***清单 2-55.***  使用\
  \ any 方法\n\n```groovy\ndef anyElement= [1, 2, 3, 4].any {element -> element > 2}\n\
  assert anyElement == true\n```\n\n清单 2-55 中的 `any` 方法遍历列表，如果任何元素大于 2，则返回 true。\n\
  \n**collect**\n\n`collect` 方法遍历集合，将每个元素转换为闭包中指定的新值，并返回一个新的 `List`。其签名如下：\n\n```groovy\n\
  List collect(Closure closure)\n```\n\n***清单 2-56.***  使用 collect 方法\n\n```groovy\n\
  def doubled = [1, 2, 3, 4].collect {element -> return 2*element}\nassert doubled\
  \ == [2,4,6,8]\n```\n\n**each**\n\n`each` 方法用于遍历集合并对每个元素应用闭包。`each` 方法的签名是：\n\n\
  ```groovy\nvoid each(Closure closure)\n```\n\n***清单 2-57.***  使用 each 方法\n\n```groovy\n\
  [1, 2, 3].each {println it}\n```\n\n清单 2-50 在单独的行上打印值 1、2、3。\n\n输出结果如下：\n\n```\n\
  1\n2\n3\n```\n\n**every**\n\n`every` 方法用于遍历集合，检查集合中的所有元素是否都符合闭包中指定的条件。\n\n`every`\
  \ 方法的签名是：\n\n```groovy\nboolean every(Closure closure)\n```\n\n***清单 2-58.***  使用\
  \ every 方法\n\n```groovy\ndef allElements1 = [1, 2, 3, 4].every {element -> element\
  \ > 1}\nassert allElements1 == false\n\ndef allElements2 = [2, 3, 4, 5].every {element\
  \ -> element > 1}\nassert allElements2 == true\n```\n\n**find**\n\n`find` 方法在集合中查找第一个符合闭包中指定条件的值。`find`\
  \ 方法的签名是：\n\n```groovy\nObject find(Closure closure)\n```\n\n清单 2-59 演示了如何使用 `find`\
  \ 方法查找第一个大于 2 的元素。\n\n***清单 2-59.***  使用 find 方法\n\n```groovy\ndef foundElement\
  \ = [1, 2, 3, 4].find {element -> element > 2}\nassert foundElement == 3\n```\n\n\
  **闭包作为映射的键和值**\n\n可以将闭包放入映射中，既可作为键，也可作为值。你可以将闭包用作键和值，并像调用映射上的方法一样调用该闭包。但是，在将其放入映射时，必须用括号将其括起来以进行转义。在访问映射中闭包的值时，必须使用\
  \ `get(key)` 或 `map[key]`，因为 `map.key` 会将键视为字符串。\n\n***清单 2-60.***  使用闭包作为键和值\n\n\
  ```groovy\n1. key1 = { println \"closure as key\" }\n2. map1 = [ (key1): 100 ]\n\
  3.\n4. println  map1.get(key1)\n5. println  map1[key1]\n6.\n7. map1 = [ key1: {\
  \ println \"closure as value\" } ]\n8. map1.key1()\n```\n\n输出结果为：\n\n```\n100\n\
  100\n```\n\n`closure as value`\n\n*   在第 1 行，一个闭包被用作键：`key1`。\n*   在第 2 行，`key1`\
  \ 被存储在映射中，其值为 100。\n*   第 4 行打印存储在映射中的值。\n*   第 5 行是检索该值的另一种技术。\n*   在第 7 行，一个闭包被用作值。\n\
  *   第 8 行调用存储为值的闭包，并打印“closure as value”。\n\n**柯里化闭包**\n\n柯里化是一种转换接受多个参数的函数的技术，使其可以作为一系列函数调用，每个函数只接受一个参数。在\
  \ Groovy 中，你可以使用 `curry()` 方法来形成柯里化闭包。\n\n***清单 2-61.***  使用闭包\n\n```groovy\n1.\
  \ def add= { x, y -> return x + y }\n2. assert add(1,2) == 3\n```\n\n*   第 1 行定义了一个\
  \ `add` 闭包，它接受两个参数并将它们相加。\n*   第 2 行将形式参数 `x` 替换为值 1，将 `y` 替换为值 2，并断言和为 3。\n\n现在考虑这样一种情况：我们不为两个形式参数（`x`\
  \ 和 `y`）都提供实际值，而只为其中一个参数提供值。带有一个实际值的新闭包定义如下：\n\n```groovy\n                 newAdd=\
  \ { 1, y -> return 1 + y }\n```\n\n我们刚刚通过为闭包 `add` 的形式参数（`x`）提供实际值 1，定义了一个新闭包（`newAdd`）。这正是\
  \ `curry()` 方法为我们所做的；例如，我们可以通过在闭包 `add` 上调用 `curry()` 来定义闭包 `newAdd`，并向其中一个形式参数提供实际值\
  \ 1，如下所示：\n\n```groovy\n                 newAdd = add.curry(1)\n```\n\n这个闭包 `newAdd`\
  \ 的定义仍然是相同的；例如，`newAdd= {1,y -> 1+y}`。我们可以通过以相同的方式在闭包 `newAdd` 上调用 `curry()` 来固定\
  \ `y` 的值；例如，`newAdd.curry()`。\n\n***清单 2-62.***  柯里化闭包\n\n```groovy\n1. def add=\
  \ { x, y -> return x + y }\n2. def newAdd = closure.curry(1)\n3. assert \"${ newAdd(2)}\"\
  \ == 3\n```\n\n**闭包蹦床**\n\n正如我们之前讨论的，在函数式编程中，由于变量的不可变性，不可能有在每次循环中都会改变的循环计数器。实现这种循环计数器的纯函数式方法是通过递归。\n\
  \n在很大程度上，递归在函数式编程中扮演着至关重要的角色。\n\n\n\n话虽如此，递归存在两个潜在问题：重复函数调用带来的性能损失以及栈溢出的可能性。重复函数调用带来的性能损失可以通过记忆化来解决，下文将对此进行讨论。而栈溢出则可以通过将递归调用转换为一种称为蹦床的循环来避免。\
  \  \n***清单 2-63.*** 递归中的栈溢出错误  \n```  \n1. def factorial  \n2. factorial={n,BigInteger\
  \ acc=1->  \n3.                 n == 1 ? acc:  \n4. factorial(n-1, n*acc)  \n5.\
  \ }  \n6. factorial(1000)  \n```  \n蹦床是一种循环，它遍历一个函数列表，依次调用每个函数。在 Groovy 中，通过在闭包声明中添加\
  \ `.trampoline()` 来形成蹦床，如清单 2-64 所示。  \n\n***清单 2-64.*** 使用蹦床  \n```  \n1. def factorial\
  \  \n2.  \n3. factorial={n, BigInteger acc=1->  \n4.  \n5. n == 1 ? acc:  \n6. factorial.trampoline(n-1,\
  \ n*acc)  \n7. }.trampoline()  \n8.  \n9. factorial(1000)  \n```  \n\n闭包记忆化  \n\
  递归中重复函数调用带来的性能损失可以通过记忆化来解决。  \n\n记忆化是一种通过缓存先前计算的值来执行内部优化的技术。缓存会引入副作用，而在原本无副作用的纯函数式编程中，这会修改缓存的状态。\
  \  \n\n***清单 2-65.*** 使用记忆化  \n```  \n1. closure = {param1, param2 ->  sleep(100);\
  \ param1 + param2 }  \n2.  \n3. memoizedClosure = closure.memoize()  \n4.  \n5.\
  \ def testTime(param1, param2) {  begin = System.currentTimeMillis()  \n6.     \
  \                             memoizedClosure(param1, param2)  \n7.            \
  \                      timeElapsed = System.currentTimeMillis()  \n8.          \
  \                        println \"param1 = $param1, param2 =   $param2   time :${timeElapsed\
  \ - begin } ms.\"  \n9. }  \n10.  \n11. testTime(1, 2)  \n12. testTime(3, 4)  \n\
  13. testTime(1, 2)  \n```  \n\n输出结果为：  \n```  \nparam1 = 1,  param2 = 2    time\
  \ :153 ms.  \nparam1 = 3,  param2 = 4    time :100 ms.  \nparam1 = 1,  param2 =\
  \ 2    time :0 ms.  \n```  \n\n清单 2-65 展示了记忆化的实际应用。在第 3 行，闭包被记忆化。这就是为什么第 13 行使用与第\
  \ 11 行相同参数调用 `testTime` 闭包时，耗时仅为 0 毫秒的原因。  \n\n运算符  \n你每天都在使用运算符。它们可能已经变得如此熟悉，以至于你甚至不再思考它们。常见的运算符包括用于赋值的\
  \ `=`、用于两个数相加的 `+`、用于两个数相乘的 `*`，以及用于递增一个数的 `++`。当然，还有很多其他运算符，但你明白我的意思。  \n\n运算符重载\
  \  \n运算符重载已经存在了一段时间，但 Java 中却没有。Java 之所以省略运算符重载，是因为它在 C++ 中的使用带来了糟糕的体验。`Groovy`\
  \ 拥抱运算符重载，并使其易于定义和使用。重载的运算符会在对象上执行一个方法。Groovy 预定义了重载运算符与对象方法之间的关系。表 2-2 列出了 Groovy\
  \ 的运算符及其对应的方法。当遇到重载的运算符时，会调用相应的方法。  \n\n表 2-2. 运算符重载  \n| 运算符 | 方法 |  \n| --- |\
  \ --- |  \n| `a + b` | `a.plus(b)` |  \n| `a - b` | `a.minus(b)` |  \n| `a * b`\
  \ | `a.multiply(b)` |  \n| `a ** b` | `a.power(b)` |  \n| `a / b` | `a.div(b)` |\
  \  \n| `a % b` | `a.mod(b)` |  \n| `a &#124; b` | `a.or(b)` |  \n| `a & b` | `a.and(b)`\
  \ |  \n| `a ^ b` | `a.xor(b)` |  \n| `a++ 或 ++a` | `a.next()` |  \n| `a-- 或 --a`\
  \ | `a.previous()` |  \n| `a[b]` | `a.getAt(b)` |  \n| `a[b] = c` | `a.putAt(b,\
  \ c)` |  \n| `a << b` | `a.leftShift(b)` |  \n| `a >> b` | `a.rightShift(b)` | \
  \ \n| `switch(a) { case(b) : }` | `b.isCase(a)` |  \n| `∼a` | `a.bitwiseNegate()`\
  \ |  \n| `-a` | `a.negative()` |  \n| `+a` | `a.positive()` |  \n\n乍一看，你可能看不出运算符重载的好处。Groovy\
  \ 使用运算符重载来创建快捷方式，使 Java 更友好。例如，在 Java 中向列表添加对象是这样的：`myList.add(someObject)`。在 Groovy\
  \ 中向列表添加对象的对应方式是 `myList << someObject`。运算符重载并不局限于 Groovy 提供的预定义实例；你可以通过实现相应的方法，将运算符重载添加到你的\
  \ Groovy 类中。  \n\n专用运算符  \nGroovy 包含许多其他编程语言中的标准运算符，以及 Groovy 特有的运算符，这些运算符使其功能如此强大。\
  \  \n\n展开运算符  \n展开运算符（`*.`）是一种简写技术，用于对对象集合调用方法或闭包。清单 2-66 展示了使用展开运算符遍历列表的用法。  \n\
  \n***清单 2-66.*** 使用展开运算符  \n```  \n1. def map = [1:\"Vishal\", 2:\"Chris\", 3:\"\
  Joseph\", 4:\"Jim\"]  \n2. def keys = [1, 2, 3, 4]  \n3. def values = [\"Vishal\"\
  , \"Chris\", \"Joseph\", \"Jim\"]  \n4. assert map*.key == keys  \n5. assert map*.value\
  \ == values  \n```  \n第 4 行和第 5 行使用展开运算符来访问映射的键和值。  \n\nElvis 运算符  \nElvis 运算符（`?:`）是\
  \ Java 三元运算符的简写版本。使用 Java 风格三元运算符的一个例子是 `a == 1 ? \"One\" : \"Not One\"`。如果 `a`\
  \ 等于 1，则返回“One”；否则返回“Not One”。它实际上是一个简写的“`if-then else`”。  \n\n与大多数 Java 结构一样，你可以在\
  \ Groovy 中使用 Java 三元运算符。除了 Java 三元运算符之外，你还可以在 Java 中使用一种更短的表示法：Elvis 运算符。这在为未设置的值（即计算结果为\
  \ null 或 false 的值）设置默认值时非常有用；也就是说，`b = a ?: 1` 可以解释为：  \n\n```  \nif(a != 0)  \n\
  \        b = a  \nelse  \n    b = 1  \n```  \n\n清单 2-67 展示了在 Groovy 中使用 Java 三元运算符和\
  \ Elvis 运算符。  \n\n***清单 2-67.*** 使用 Elvis 运算符  \n```  \ndef firstName = user.firstName\
  \ == null ? \"unknown\" : user.firstName // Java 三元运算符  \ndef firstName2 = user.firstName\
  \ ?: \"unknown\" // Groovy Elvis 运算符  \n```  \n\n在这两种情况下，如果 `user.firstName` 为 `null`，则\
  \ `firstName` 被设置为“unknown”。Elvis 运算符示例中的 `user.firstName` 部分被称为表达式。如果表达式计算结果为 false\
  \ 或 `null`，则返回 `:` 之后的值。示例中的两行在逻辑上是等价的。  \n\n安全导航/解引用运算符  \n安全导航/解引用运算符（`?.`）用于避免\
  \ `NullPointerException`，因此非常方便。考虑这样一种情况：你有一个 `User` 对象，并且想要打印 `firstName`。如果在访问\
  \ `firstName` 属性时 `User` 对象为 null，你将得到一个 `NullPointerException`。  \n\n***清单 2-68.***\
  \ 使用安全导航/解引用运算符  \n```  \nclass User {  \n    String firstName  \n    String lastName\
  \  \n    def printFullName = {  \n        println \"${firstName} ${lastName}\" \
  \ \n    }  \n}  \nUser user  \nprintln user.firstName  \n```  \n\n清单 2-68 中的代码会抛出\
  \ `NullPointerException`。在 Java 中，我们这样添加 `null` 检查：  \n\n```  \nif (user != null)\
  \ {  \n    println \"Java FirstName = ${user.firstName}\"  \n}  \n```  \n\n清单 2-69\
  \ 展示了在 Groovy 中使用安全导航/解引用运算符添加 `null` 检查。  \n\n[***清单 2-69.***](#9781430248064_Ch02.\n\
  \n\n\nxhtml#_list69)  使用安全导航/解引用运算符    ``` class User {     String firstName     String\
  \ lastName     def printFullName = {         println \"${firstName} ${lastName}\"\
  \     } } User user println \"Groovy FirstName = ${user?.firstName}\" ```    字段运算符\
  \    在第 1 章中，你了解了类的属性以及 Groovy 如何自动提供 getter。你还了解到，如果需要特殊逻辑，你可以提供自己的 getter。虽然不推荐这样做，因为它严重违反了封装原则，但\
  \ Groovy 提供了一种绕过 getter 直接访问底层字段的方法。    清单 2-70 展示了使用字段运算符（`.@`）的示例。    ***清单 2-70.***\
  \  使用字段运算符    ``` class Todo {     String name     def getName() {         println\
  \ \"Getting Name\"         name     } } def todo = new Todo(name: \"Jim\") println\
  \ todo.name println todo.@name ```    输出如下：    ``` Getting Name Jim Jim ```    在此示例中，第一个\
  \ `println` 使用 getter 访问 name，第二个 `println` 则绕过 getter 直接访问 name。    方法闭包运算符   \
  \ 本章前面部分，你了解了闭包以及一些 Groovy 函数如何接受闭包作为输入。但如果你想像传递闭包那样传递方法，该怎么办？Groovy 为此场景提供了方法闭包运算符（`.&`）。方法闭包运算符允许像闭包一样访问和传递方法。\
  \    ***清单 2-71.***  使用方法闭包运算符    ``` def list = [\"Chris\",\"Joseph\",\"Jim\"]\
  \ // each 接受一个闭包 list.each { println it } String printName(String name) {     println\
  \ name } // & 使该方法作为闭包被访问 list.each(this.&printName) ```    输出如下：    ``` Chris Joseph\
  \ Jim Chris Joseph Jim ```    此示例创建了一个姓名列表，并遍历该列表以打印出姓名。你之前已经见过这个操作。这里创建了一个 `printName()`\
  \ 方法，用于打印 name 参数。最后，也是本示例的重点，列表被遍历，并执行作为闭包的 `printName()` 方法。    由于这是一个非常简单的示例，你可能会想：“这有什么了不起的。”实际上，这确实很了不起，尤其是在构建领域特定语言（DSL）时，你将在第\
  \ 3 章中了解更多相关内容。该方法实际上调用了 `System.out.println`。Groovy 团队是如何让 println 做到这一点的呢？答案是，他们使用了方法闭包运算符将\
  \ `System.out.println` 赋值给一个全局属性，例如 `def println = System.out.&println()`。这非常强大。使用方法闭包运算符，你可以将\
  \ Java 方法暴露为闭包。    钻石运算符    为了避免参数化类型的重复，Groovy 引入了钻石运算符。参数化类型可以被省略，并用尖括号（看起来像钻石）代替。清单\
  \ 2-72 展示了一种通常比较冗长的定义列表的方式。    ***清单 2-72.***  一个简单的 Groovy 脚本：Hello.groovy    ```\
  \ List<List<String>> list1 = new ArrayList<List<String>>() ```    Groovy 允许我们使用钻石运算符代替参数化类型以避免重复，如清单\
  \ 2-73 所示。    ***清单 2-73.***  使用钻石运算符    ``` List<List<String>> list1 = new ArrayList<>()\
  \ ```    这意味着你可以避免在定义的任何一侧指定 `<List<String>>`。    总结    本章的重点是 Groovy 语言基础。目标是教你足够的\
  \ Groovy 知识，以便你开始使用 Grails。\n\n在本章中，你创建了一个简单的程序（脚本），并将其与用 Java 完成相同任务进行了比较。然后你学习了如何将脚本转换为\
  \ Groovy 类，编译它，并使用 Java 运行它。一旦你了解了 Groovy 脚本和类，我们快速浏览了 Groovy Shell 和 Groovy Console。Shell\
  \ 和 Console 对于编写和测试简单程序非常方便。掌握了一些基本的 Groovy 工具后，是时候开始深入了解 Groovy 语言了。你的 Groovy 语言之旅始于学习\
  \ Groovy 对字符串、闭包和方法以及集合（列表、映射、集合、数组和范围）的支持。接下来，你对 Groovy 的正则表达式支持有了一个高层次的概述。   \
  \ 我们涵盖了查找（`=∼`）、匹配（`==∼`）和模式（`∼string`）运算符。最后，你学习了运算符重载和专用运算符。它们是 Groovy 强大功能的主要来源。本章绝不是对\
  \ Groovy 的全面研究。Groovy 是一个广泛而深入的主题。这里的目标是给你足够的 Groovy 知识来开始构建应用程序，并知道在哪里寻找更多信息。下一章将向你介绍更高级的\
  \ Groovy 主题。    第 3 章    ![image](img/frontdot.jpg)    更高级的 Groovy    第 1 章和第 2\
  \ 章通过对其语言特性和工具的基本解释，让我们一窥 Groovy 的强大功能和能力。但关于 Groovy，还有更多需要了解的内容。例如，Groovy 为创建单元测试提供了一个理想的框架。它使处理\
  \ XML 变得简单直接，并且包含一个用于文本模板化的优秀框架。最后，Groovy 拥有一个元编程模型，你可以用它来做一些令人惊叹的事情，例如支持创建领域特定语言，以及向\
  \ Java API 类（包括标记为 final 的类）添加方法和功能。    本章涵盖了各种不相关或松散相关的 Groovy 高级主题。首先介绍 Groovy\
  \ 中的面向对象，展示如何使用 Groovy 编写和执行单元测试，比较如何使用 Java 和 Groovy 处理 XML 文档，并解释如何使用 Groovy 的模板化功能生成电子邮件。本章以元编程主题结束：实现\
  \ Expando 类、使用元对象协议（MOP）扩展类、AST 转换以及创建领域特定语言（DSL）。    Groovy 中的面向对象    很少有 Java\
  \ 纯粹主义者喜欢以这种方式进行归谬论证：“因为你可以用 Groovy 编写脚本，而脚本不是真正的编程，所以 Groovy *只是*一种脚本语言。”（注意强调“只是”。）这完全不是事实。Groovy\
  \ 支持 Java 开发者熟知的所有面向对象（OO）编程概念：类、对象、接口、继承、多态等。事实上，与 Java 不同，Groovy 是一种纯粹的面向对象语言，其中一切都是对象。你可以将代码完全组织成类和包，并且仍然可以在类中使用脚本。Groovy\
  \ 编译器会将此类脚本转换为 Java 类；也就是说，你可以将脚本与类混合使用。    类和脚本    正如 Larry Wall 所说：    *“假设你回到\
  \ Ada Lovelace 时代，问她脚本和程序之间的区别。她可能会奇怪地看着你，然后说：‘嗯，脚本是给演员的，而程序是给观众的。’”*    Groovy\
  \ 中的许多实体都是类。列表、集合、映射、字符串、模式、脚本、闭包、函数和 Expando 在底层都是作为类实现的。类是 Groovy 的构建块。在 Groovy\
  \ 中，任何不在类内部的代码都称为脚本。你不能在类外部编写任何 Java 代码。\n\n\n\n在 Java 中，一个文件里只能有一个公共类，且该类名称必须与文件名一致。而在\
  \ Groovy 中，除了类之外，还可以包含脚本，同一个文件可以包含一个或多个类以及脚本代码。与 Java 不同，Groovy 允许在同一个文件中拥有多个公共类，且这些公共类都不需要与文件名匹配。清单\
  \ 3-1 展示了一个名为 *Hello.groovy* 的文件，其中包含脚本但没有类。编译器会根据文件名，为脚本代码生成一个类。通过 *groovyc* 编译此文件将生成一个类：*Hello.class*。\n\
  \n***清单 3-1.***  Hello.groovy 文件：包含脚本，无类\n``` println \"hello\" ```\n\n清单 3-2 展示了一个名为\
  \ *Hello.groovy* 的文件，其中包含脚本和一个类。通过 *groovyc* 编译此文件将生成两个类：*Hello.class*（基于文件名为脚本代码生成）和\
  \ *HelloWorld.class*。\n\n***清单 3-2.***  Hello.groovy 文件：包含脚本和一个类\n``` class HelloWorld{\n\
  \  def hello(){\n   println \"hello world\"\n  }\n}\nprintln \"hello world\" ```\n\
  \n清单 3-3 展示了一个名为 *Hello.groovy* 的文件，其中包含脚本和一个与文件名同名的类。此文件将无法编译。默认情况下，编译器会根据文件名为脚本代码生成一个类，但由于我们已经定义了一个同名类，编译器会抛出异常。\n\
