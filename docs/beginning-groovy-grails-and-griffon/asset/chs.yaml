  \ 运行，并允许更快地执行命令，从而提高开发人员的工作效率。    总结    在本章中，你了解到 Grails 是一个新的 Web 开发框架，它结合了 Java\
  \ 开源、约定、Groovy 动态语言以及 Java 平台的优势。    你还看到了使用 Grails 脚手架完成大部分工作来开发一个功能完整的应用程序是多么容易。在第\
  \ 5 章中，你将学习如何美化应用程序并自定义其外观，以及如何使控制器功能更强大。然后在第 6 章中，你将学习如何增强领域类，包括访问 GORM 的更多持久化特性。\
  \    第 5 章    ![image](img/frontdot.jpg)    构建用户界面    第 4 章介绍了 Grails 的分层和组件，并向你展示了如何使用\
  \ Grails 脚手架创建一个简单的应用程序。在本章中，你将使用第 4 章中的领域对象，开始使用 Collab-Todo 线框图创建一个美观、功能齐全的应用程序。\
  \    你将学习如何使用 Groovy 服务器页面 (GSP)、Grails 标签、Grails 模板和 CSS 来创建应用程序的通用外观。你将创建登录视图和相应的控制器动作。接下来，你将开始关注用户体验。你将研究验证、错误和消息，并学习如何自定义它们。为了支持应用程序，你将创建一个简单的审计日志记录功能，该功能利用\
  \ Grails 的日志控制器属性。    从最终目标开始    本章的目标是为 Collab-Todo 应用程序的布局创建外观。图 5-1 显示了一个线框图，让你了解应用程序的布局方式。\
  \    ![9781430248064_Fig05-01.jpg](img/9781430248064_Fig05-01.jpg)    图 5-1 .  Collab-Todo\
  \ 线框图    该线框图遵循一种常见格式：两列居中于页面，两侧有边距用于间距，以及页眉和页脚。表 5-1 描述了每个组件。    表 5-1. 线框图组件 \
  \    | 组件 | 描述 | | --- | --- | | 边距 | 在浏览器边缘提供空白区域，使主要内容区域在浏览器中居中。 | | 顶部栏 | 提供登录和注销功能，并在登录时显示用户的名和姓。\
  \ | | 页眉 | 显示应用程序标题 “Collab-Todo”。 | | 内容 | 这是应用程序的主要内容区域。大部分应用程序数据在此显示。 | | 右侧边栏\
  \ | 在第 8 章中，我们将使用右侧边栏来显示好友列表信息。 | | 页脚 | 显示版权信息。\n\n\n\n与大多数现代视图技术一样，Grails 使用基于布局和模板的方法来组装视图/用户界面。模板是一个视图片段，位于\
  \ `grails-app/views` 目录中，并以**下划线**开头。下划线是 Grails 用于标识 GSP 为模板的约定。最佳实践建议，与特定领域（例如\
  \ `User`）相关的模板应放在该领域的视图目录中，例如 `grails-app/views/user/_someTemplate.gsp`。更通用或跨视图共享的模板则应放在公共位置，例如\
  \ `grails-app/views/common`。\n\n布局负责组装模板并将其定位在页面上。你可以使用 `main.gsp`（`grails-app/views/layouts/main.gsp`）和\
  \ CSS（`web-app/css/main.css`）来创建布局。创建几个在所有视图中通用的模板（`_topbar.gsp` 和 `_footer.gsp`），然后应用一些\
  \ CSS 样式，并在 `main.gsp` 中利用它们。\n\n让我们从一个简单的页脚开始，以说明这一点。\n\n**创建页脚**\n\n目标是在网站每个页面的底部显示一个简单的版权声明。你可能已经猜到，需要在\
  \ `grails-app/views/common` 目录中创建一个名为 `_footer.gsp` 的 GSP 片段，然后使用 `<g:render template=\"\
  /common/footer\" />` 标签将 `_footer.gsp` 模板添加到布局中。接着，你需要通过在主布局中添加一个 `<div>` 部分，并使用在\
  \ `main.css` 中定义的样式类来设置页脚的样式。清单 5-1 展示了你需要执行的操作。\n\n***清单 5-1.***  页脚模板 (_footer.gsp)\n\
  \n``` <span class=\"copyright\">&copy; 2012 Beginning Groovy, Grails and Griffon:\
  \ From Novice to Professional<br /> Vishal Layka, Christopher Judd, Joseph Faisal\
  \ Nusairat, and James Shingler </span> ```\n\n你需要将版权信息添加到主布局（`main.gsp`）中，以便它包含在每个页面上。这时\
  \ `<g:render>` 标签就派上用场了。你可以使用带有 `template` 属性的 `<g:render>` 标签将模板插入到 GSP 中。你只需在\
