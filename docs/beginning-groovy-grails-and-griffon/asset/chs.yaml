  \ *Hello.groovy* 的文件，其中没有脚本，只有一个类。编译此文件将生成一个类：*HelloWorld.class*，因为文件中没有脚本。\n\n\
  ***清单 3-5.***  Hello.groovy 文件：无脚本，包含一个类\n``` class HelloWorld{\n  def hello(){\n\
