  \   特殊节点    Swing 组件众多，要为每一个组件都找到并创建一个 `SwingBuilder` 节点将是一项艰巨的任务。与其逐一查找每个 Swing\
  \ 组件的节点名称，不如直接去掉类名开头的 J，并将下一个字符改为小写；例如，`JButton => button`，`JLabel => label`。此规则适用于\
  \ JDK 中所有可用的 Swing 类。此外，`SwingBuilder` 还包含一些额外的节点，这些节点与特定的 Swing 类无关，但在需要插入自定义 Swing\
  \ 组件时非常有用。在本节中，我们将介绍六个特殊节点：    *   Application *   Container *   Widget *   Bean\
  \ *   Noparent *   Root    Application    该节点由 Swing 插件提供，并根据当前运行模式定义一个顶级容器。在默认模板建议的所有属性中，你会注意到\
  \ `iconImage` 和 `iconImages`。第一个属性是 `JFrame` 的标准属性，通常用于定义显示在框架顶部的图标（在支持此设置的平台上）。第二个属性（`iconImages`）是\
  \ JDK 6 为 `java.awt.Window` 新增的属性。该属性指示窗口根据平台偏好选择最合适的图标。如果 Griffon 运行在 JDK 5 上，则会忽略此设置。如果当前\
  \ JDK 和平台支持，此属性将覆盖为 `iconImage` 指定的设置。    Container    该节点由 `SwingBuilder` 提供，是一个透传节点，接受任何\
  \ UI 组件作为值。此节点允许嵌套子内容。当你需要嵌入一个没有对应节点的自定义组件时，它非常有用。清单 13-16 展示了其用法。    ***清单 13-16.***  使用\
  \ Container 节点    ``` container(new CustomPanel()) {     label 'custom label' }\
  \ ```    Widget    该节点由 `SwingBuilder` 提供，是一个透传节点，接受任何 UI 组件作为值。与 `container` 相反，此节点不允许嵌套子内容。当你需要嵌入一个没有对应节点的自定义组件时，它非常有用。清单\
  \ 13-17 展示了其用法。    ***清单 13-17.***  使用 Widget 节点    ``` widget(new CustomDisplay(),\
  \ title: 'custom title') { ```    Bean    该节点由 `SwingBuilder` 提供，是一个全能节点。它允许你使用构建器语法在任何对象上设置属性。清单\
  \ 13-18 展示了其在模型上设置绑定的用法。    ***清单 13-18.***  使用 Bean 节点    ``` textField columns:\
  \ 20, id: username bean(model, value: bind{ username.text }) ```    Noparent   \
  \ 该节点由 `SwingBuilder` 提供。子节点通常会被附加到其父节点上，但有时你并不希望发生这种情况。在这些情况下，可以使用 `noparent` 包裹这些节点，如清单\
  \ 13-19 所示。    ***清单 13-19.***  使用 Noparent 节点    ``` panel {     gridLayout(cols:\
  \ 2, rows: 2)     button('Click 1', id: b1')     button('Click 2', id: b2')     button('Click\
  \ 3', id: b2')     button('Click 4', id: b4')    // 下面这行会导致按钮重新排序     // bean(button1,\
  \ text: 'Click 11')     noparent {         // 这样是安全的，按钮不会改变位置         bean(button1,\
  \ text: 'Click 11')     } } ```    Root    该节点由 Griffon 提供，用于标识二级视图脚本的顶级节点。视图脚本预期会返回顶级节点，但有时进一步的定制可能会阻止这种情况发生；例如，在连接自定义监听器时。当这种情况发生时，必须显式地返回结果；否则脚本将返回错误的值。使用\
  \ `root()` 节点可以避免忘记这一点，同时为该节点提供一个别名。清单 13-20 展示了其用法。    ***清单 13-20.***  使用 Root\
  \ 节点    ``` root(     tree(id: 'mytree') )mytree.addTreeSelectionModel(new DefaultTreeSelectionModel()\
  \ {    ... }) ```    模型与绑定    Swing 采用模型-视图-控制器架构（MVC）作为其每个组件的基础设计。本质上，MVC 将 GUI\
  \ 组件划分为三个元素——模型、视图和控制器。每个元素在组件的行为方式中都扮演着关键角色。模型封装了每个组件的状态数据。    不同类型的组件有不同的模型。例如，菜单的模型可能包含一个菜单项列表，用户可以从这些菜单项中进行选择。请注意，无论组件在屏幕上如何绘制，这些信息都保持不变；模型数据始终独立于组件的视觉表示。视图则指的是你在屏幕上看到组件的方式。\
  \    控制器是用户界面的一部分，它决定了组件如何与事件交互。事件有多种形式；例如，鼠标点击或键盘事件。控制器决定每个组件将如何对事件做出反应。    使用\
  \ MVC，三个元素中的每一个都需要另一个元素的服务来保持自身的持续更新。同样，视图决定组件是否是用户事件（如鼠标点击）的接收者。视图将这些事件传递给控制器，由控制器决定如何处理它们。根据控制器的决策，模型中的值可能需要被更改。\
  \    Griffon 在构建时和运行时都自动化了模型、视图和控制器类的创建。它通过注入来配置它们，以遵循引用路径、观察到的更新和用户交互的原始约定。它还为创建的组以及与\
  \ MVC 组生命周期相关的其他约定提供了常规的文件位置。    MVC 模式在 Griffon 中既存在于架构层面，也存在于表示层。在 Griffon 中，任何\
  \ MVC 成员都可以通过 `PropertyChangeListeners` 和 `PropertyChangeEvents` 注册为模型类的监听器。模型的责任是持有数据，这些数据可以被控制器和视图用来相互通信。Griffon\
  \ 模型是可观察的；Griffon 模型中的所有属性都是可观察的。这意味着每当任何属性的值发生变化时，都会触发一个事件。要使一个属性可观察，你只需要用 `@Bindable`\
  \ 注解来标注该属性。`@Bindable` 注解借助 Groovy 的 AST 转换，指示 Groovy 编译器注入字节码，使被注解的属性可观察，并确保每当此可观察属性的值发生变化时，都会为每个可观察属性触发一个\
  \ `PropertyChangeEvent`。\n\n\n\n这极大地简化了绑定的设置，使得 UI 中的更改可以自动发送到模型属性，反之亦然。在创建 Swing\
  \ UI 时，你通常需要监控某些 UI 元素的值变化。为此，通常的方法是使用 JavaBeans 的 `PropertyChangeListeners` 来在类字段的值发生变化时得到通知。然后，你最终会在\
  \ Java Bean 中编写这种非常常见的样板代码，如代码清单 13-21 所示。\n\n***代码清单 13-21.***  未使用 @Bindable 注解的\
  \ JavaBean\n```java\nimport java.beans.PropertyChangeSupport;\nimport java.beans.PropertyChangeListener;\n\
  \npublic class MyBean {\n    private String prop;\n\n    PropertyChangeSupport pcs\
  \ = new PropertyChangeSupport(this);\n\n    public void addPropertyChangeListener(PropertyChangeListener\
  \ l) {\n        pcs.add(l);\n    }\n\n    public void removePropertyChangeListener(PropertyChangeListener\
  \ l) {\n        pcs.remove(l);\n    }\n\n    public String getProp() {\n       \
  \ return prop;\n    }\n\n    public void setProp(String prop) {\n        pcs.firePropertyChanged(\"\
  prop\", this.prop, this.prop = prop);\n    }\n}\n```\n\n在 Groovy 中使用 `@Bindable`\
  \ 注解，代码清单 13-21 中的代码可以大大简化，如代码清单 13-22 所示。\n\n***代码清单 13-22.***  使用 @Bindable 注解的\
  \ Bean\n```groovy\nclass MyBean {\n    @Bindable String prop\n}\n```\n\n另一个注解 `@PropertyListener`\
  \ 可以帮助你轻松注册 `PropertyChangeListeners`。`@PropertyListener` 接受就地定义的闭包、对同一类中定义的闭包属性的引用，或两者的列表。\n\
  \n代码清单 13-23 中的代码使用 `@PropertyListener` 注解后得到了极大的简化，如代码清单 13-24 所示。\n\n***代码清单 13-23.***  未使用\
  \ @PropertyListener 注解的 Bean\n```groovy\nimport groovy.beans.Bindable\nimport java.beans.PropertyChangeListener\n\
  \nclass UserModel {\n    def controller\n    @Bindable String firstName\n    @Bindable\
  \ String lastName\n\n    def snoopAll = { evt -> ... }\n\n    UserModel() {\n  \
  \      addPropertyChangeListener(snoopAll as PropertyChangeListener)\n        addPropertyChangeListener('lastName',\
  \ {\n            controller.someAction(it)\n        } as PropertyChangeListener)\n\
  \    }\n}\n```\n\n***代码清单 13-24.***  使用 @PropertyListener 注解的 Bean\n```groovy\n\
  import griffon.transform.PropertyListener\nimport groovy.beans.Bindable\n\n@PropertyListener(snoopAll)\n\
  class MyModel {\n    def controller\n    @Bindable String name\n    @Bindable @PropertyListener({controller.someAction(it)})\n\
  \                String lastname\n    def snoopAll = { evt -> ... }\n}\n```\n\n\
  Griffon 中的绑定是通过利用 JavaBeans 的 `PropertyChangeEvent` 及其相关类来实现的。因此，绑定适用于任何触发此类事件的对象，无论其是否使用了\
  \ `@Bindable`。Groovy 中的 `SwingBuilder` 类包含 `bind` 节点，允许你干净地绑定两个对象的状态。下面是一个简单的 `TestBean`，它有两个属性\
  \ `property1` 和 `property2`：\n\n```groovy\nclass TestBean {\n  @Bindable String\
  \ property1\n  String property2\n}\n```\n\n你可以使用以下代码将字段 `property2` 绑定为与 `property1`\
  \ 相同的值：\n\n```groovy\nbind(source: testBean, sourceProperty: 'property1',\n    \
  \ target: testBean, targetProperty: 'property2')\n```\n\n此绑定的结果是，`property2` 的值与\
  \ `property1` 的值相同，并且如果 `property1` 的值发生更改，该更改会反映在 `property2` 中。\n\n使用 `bind` 节点编写绑定有三种选项：\n\
  \n*   **长格式。**\n    这是三种格式中最完整的，你必须显式指定绑定的两端。以下代码片段设置了从 `bean1.prop1` 到 `bean2.prop2`\
  \ 的单向绑定。\n    ```groovy\n    bind(source: bean1, sourceProperty: 'prop1', target:\
  \ bean2, targetProperty: 'prop2')\n    ```\n*   **上下文格式。**\n    这种类型的绑定可以根据上下文假定源或目标。以这种方式使用时，可以省略\
  \ `sourceProperty:` 或 `targetProperty:` 并视为隐式；`bind` 节点的值成为属性名称。\n    ```groovy\n\
  \    bean(bean1, prop1: bind('prop2', target: bean2))\n    ```\n*   **短格式。**\n \
  \   这种类型的绑定仅用于设置隐式目标。它期望一个闭包作为绑定值的定义。\n    ```groovy\n    bean(bean2, prop2: bind{\
  \ bean1.prop1 })\n    ```\n\n**控制器**\n\n控制器是应用程序逻辑的入口点。控制器具有由 Griffon 注入的属性和方法、用于后初始化的钩子以及处理动作。当我们创建默认应用程序时，Griffon\
  \ 会创建其中一些属性、方法和动作，如代码清单 13-3 所示。除了这些属性之外，我们将在本节中介绍其他几个属性和方法。\n\n**注入的属性**\n\n你需要理解的注入属性如下：\n\
  \n*   **App**——`app` 属性指向当前正在运行的应用程序，通过它可以访问应用程序的配置。使用此属性，应用程序可以以 `app.config`、`app.controllers`、`app.views`、`app.models`\
  \ 和 `app.builders` 的形式公开其配置、控制器、视图、模型和构建器。\n*   **Builder**——`builder` 属性指向用于创建与此控制器相关的视图的构建器。视图和构建器可能共享相同的变量，但它们是两个不同的对象：视图是一个脚本，告诉你刚刚构建了什么；而构建器是一个\
  \ `CompositeBuilder` 实例，允许控制器在需要时构建新的 UI 组件。\n*   **Model**——`model` 属性在定义后，允许控制器访问与其组相关的模型。假设设置了适当的绑定，控制器通常通过模型更新视图。但并没有严格要求控制器必须始终拥有一个模型。如果你认为控制器不需要模型，可以安全地从代码中删除此属性；这不会导致错误，因为\
  \ Griffon 会在设置值之前检查属性声明。\n*   **View**——`view` 属性引用了 MVC 三元组的第三个成员：视图。与模型一样，此属性是可选的。在某些情况下，控制器可能仅通过更新模型来与视图交互，在这种情况下，可以安全地从代码中删除此属性。\n\
  \n**注入的方法**\n\n以下部分提供了你将使用的注入方法的示例。\n\n**createMVCgroup**\n\n此方法允许你创建 MVC 组的新实例。它始终按顺序返回三个元素：模型、视图和控制器。\n\
  \n***代码清单 13-25.***  createMVCgroup 的用法\n```groovy\nclass SampleController {\n \
  \   def action = { evt = null ->\n        def (m, v, c) = createMVCGroup('Other')\n\
  \    }\n}\n```\n\n此方法是更通用的 `buildMVCGroup()` 的一个受限版本，将在下面解释。\n\n**buildMVCgroup**\n\
  \n此方法允许你创建 MVC 组的新实例。代码清单 13-26 说明了其用法。\n\n***代码清单 13-26.***  buildMVCgroup 的用法\n\
  ```groovy\nclass SampleController {\n    def action = { evt = null ->\n        MVCGroup\
  \ group = buildMVCGroup('Other')\n    }\n}\n```\n\n此方法用于构建可能包含其他 MVC 成员的组，因为 `createMVCGroup()`\
  \ 仅返回严格的 MVC 成员（模型、视图、控制器）。\n\n\n\ndestroyMVCgroup    `destroyMVCGroup()` 方法用于从应用程序中移除组引用。清单\
  \ 13-27 展示了其用法。    ***清单 13-27.***  destroyMVCgroup 的用法    ``` class SampleController\
  \ {     def action = { evt = null ->         destroyMVCGroup('Other')     } } ```\
  \    该方法按以下指定顺序执行以下步骤：    \n1.  对每个非脚本的 MVC 成员调用 `mvcGroupDestroy()`。 \n2.  对关联的构建器调用\
  \ `dispose()`。 \n3.  从应用程序缓存中移除所有 MVC 成员的引用。 \n4.  触发一个 `DestroyMVCGroup` 事件。  \
  \  \n一旦组被销毁，你就无法再次使用它。    \nwithMVCgroup    该方法允许你创建生命周期短暂的 MVC 组的新实例；例如，用于创建对话框的实例。`withMVCGroup()`\
  \ 方法是 `createMVCGroup()` 和 `destroyMVCGroup()` 的混合体，它确保创建的组在不再使用后立即被销毁。清单 13-28\
  \ 说明了其用法。    \n***清单 13-28.***  withMVCgroup 的用法    \n``` class SampleController\
  \ {     def action = { evt = null ->         withMVCGroup('Other') { m, v, c ->\
  \             // 配置该组         }     } } ```    \n创建一个新的 MVC 组实例，然后在不再使用时将其丢弃。  \
  \  \nnewInstance    该方法创建一个特定类和类型的新实例。它是一个便捷方法，在实例创建后会触发一个事件；应用程序不会对以这种方式创建的实例进行额外的管理。清单\
  \ 13-29 说明了其用法。    \n***清单 13-29.***  newInstance() 的用法    \n``` class SampleController\
  \ {     def action = { evt = null ->         def myService = newInstance(MyServiceClass,\
  \ 'service')     } } ```    \n初始化和销毁钩子    \n除了监听应用程序事件、创建和销毁 MVC 组或持有服务、控制器引用之外，Griffon\
  \ 中的控制器还可以通过 *mvcGroupInit* 和 *mvcGroupDestroy* 方法对 MVC 的初始化/销毁做出反应，我们接下来将解释这些方法。\
  \    \nmvcGroupInit    该方法作为任何既不是脚本也不是 `CompositeBuilder` 实例的 MVC 成员的初始化钩子。它将在实例创建后立即被调用。\
  \    \n该方法的签名如下：    \n``` void mvcGroupInit(Map<String, Object> args) ```    \n\
  `args` 参数保存传递给 `createMVCGroup()` 或 `buildMVCGroup()` 的任何附加数据。清单 13-30 展示了其用法。 \
  \   \n***清单 13-30.***  mvcGroupInit 的用法    \n``` class SampleController {     def\
  \ someProperty     def mvcGroupInit(Map args) {         someProperty = args.random\
  \     } } ```    \nmvcGroupDestroy    该方法作为任何既不是脚本也不是 `CompositeBuilder` 实例的 MVC\
  \ 成员的销毁钩子。当实例即将在 MVC 组的销毁序列期间从应用程序缓存中移除时，它将被调用。清单 13-31 展示了 `mvcGroupDestroy()`\
  \ 的用法。    \n***清单 13-31.***  mvcGroupDestroy 的用法    \n``` class SampleController\
  \ {     def mvcGroupDestroy() {         // 执行清理工作     } } ```    \n动作（Actions） \
  \   \n控制器动作通常使用闭包属性形式定义，如清单 13-32 所示。    \n***清单 13-32.***  控制器中的动作    \n``` class\
  \ MyController {     def someAction = { evt = null ->         // 执行一些操作     } }\
  \ ```    \n动作不过是一个闭包属性或一个遵循一组常规参数（即 UI 生成的事件）的方法。    \n总结    \n本章开始时，你设置了开发环境，并使用\
  \ Griffon 的 `create-app` 命令创建了你的第一个 Griffon 应用程序。你简要了解了 Griffon 的约定优于配置范式如何使应用程序结构可预测且易于遵循。你看到了视图和控制器之间的数据绑定在\
  \ Griffon 中是自然而然的。视图组件显示模型的当前状态，而相关的控制器则改变它们。    \n最后，你看到了 Groovy 的强大和表现力如何帮助你编写简洁、富有表现力且功能强大的代码。我们的目标是让你体验一下使用\
