  \  \n\n**总结**  \n\n本章演示了 Grails 复用开源第三方 Java 库的能力。你安装了 Quartz 插件，创建了一个简单的作业，并了解了如何使用\
  \ `timeout` 属性来控制执行频率。  \n\n接着，你开始构建批处理报告工具。你创建了一个 `NightlyReportJob`，并使用 `cronExpression`\
  \ 属性将其配置为在凌晨 1:00 运行。你了解到 cron 表达式功能强大，能够对 `NightlyReportJob` 的调用时间进行细粒度控制。  \n\n\
  `NightlyReportJob` 委托给一个批处理服务，该服务通过 Spring 自动装配注入，并调用了 `nightlyReports`。`nightlyReports`\
  \ 遍历用户列表，收集他们的待办事项，调用在第 10 章中构建的报告服务来生成 PDF 附件，然后使用在第 8 章中构建的 `EmailAuthenticatedService`\
  \ 将附件通过电子邮件发送给用户。  \n\n¹ `http://www.quartz-scheduler.org/`  \n² `http://groovy.codehaus.org/Groovy+Templates`\
  \  \n\n**第 12 章**  \n![image](img/frontdot.jpg)  \n\n**部署和升级 Grails 应用程序**  \n\n\
  前面的章节都与开发 Grails 应用程序相关。Grails 的优势之一在于它捆绑了开始开发和测试应用程序所需的一切。\n\n\n\nGrails 内嵌了一个\
  \ Web 容器（Tomcat）和一个关系型数据库（H2）。你只需执行 Grails 的 `run-app` 目标，就能拥有完整的运行时环境。然而，在某个时间点，你会希望将应用程序暴露给用户。内嵌的运行时环境仅用于开发和测试，并不旨在扩展或支撑生产环境所需的负载。本章重点介绍如何将\
  \ Grails 应用程序部署到 Java EE 应用服务器和更健壮的数据库服务器上。同时，也会涵盖一些其他杂项运维方面，例如在 Grails 框架发布新版本时升级\
  \ Grails 应用程序，以及使用 Gant 自动化任务。\n\n**部署 Grails 应用程序**\n\n部署 Grails 应用程序包含三个步骤：\n\n\
  1.  **配置应用程序。** 这通常涉及特定于环境的配置。\n2.  **打包应用程序。** 对于 Grails 应用程序，这意味着将所有代码和相关工件打包成一个\
  \ Web 应用程序归档（WAR）文件。\n3.  **将应用程序部署到应用服务器或 Web 容器。**\n\n**使用环境**\n\n许多组织拥有多个环境或关卡，应用程序在到达生产环境和用户之前必须通过这些关卡。每个应用程序至少应通过开发、测试和生产环境。开发环境是开发者的机器。在模拟生产环境的测试环境中，由开发者以外的其他人通过验证应用程序满足需求并能正常工作来完成质量保证。生产环境是真实用户使用应用程序的地方。在这些环境中，你很可能会有特定于环境的配置，以及较少出现的行为差异。例如，在开发环境中，你可能希望指向一个本地的\
  \ H2 内存数据库，但在测试和生产环境中，你可能需要指向一个远程服务器数据库，例如 MySQL。¹\n\n正如你所料，Grails 遵循这些最佳实践，并知晓这三种环境。你可以在调用\
  \ `grails` 命令行时将其作为第二个参数使用，或者在诸如 `DataSource.groovy`、`BootStrap.groovy` 和 `Config.groovy`\
  \ 等配置文件中使用这些环境，你将在下一节中看到这些文件。表 12-1 显示了每个环境的映射关系。\n\n表 12-1. 环境映射\n\n| 环境 | 命令行\
  \ | 配置文件引用 |\n| --- | --- | --- |\n| 开发 | `dev` | `development` |\n| 测试 | `test`\
  \ | `test` |\n| 生产 | `prod` | `production` |\n\n根据组织的规模以及应用程序或系统的关键程度，你可能还会有其他环境，例如集成测试（IT）、用户验收测试（UAT）和性能测试（PT）。你也可以使用自定义环境。唯一的要求是必须将\
  \ `grails.env` 系统属性传递给 Grails 命令行。例如，以下命令指定了性能环境：\n\n```bash\n> grails -Dgrails.env=PT\
  \ run-app\n```\n\nGrails 支持按环境配置的概念。`grails-app/conf` 目录下的 `Config.groovy`、`DataSource.groovy`\
  \ 和 `BootStrap.groovy` 文件可以使用按环境配置，如 Grails 提供的默认 `dataSource` 定义所示，并在清单 12-1 中展示。\n\
  \n***清单 12-1.***  使用按环境配置\n\n```groovy\ndataSource {\n    pooled = false\n    driverClassName\
  \ = \"org.h2.Driver\"\n    username = \"sa\"\n    password = \"\"\n}\nenvironments\
  \ {\n    development {\n        dataSource {\n            dbCreate = \"create-drop\"\
  \n            url = \"jdbc:h2:mem:devDb\"\n        }\n    }\n    test {\n      \
  \  dataSource {\n            dbCreate = \"update\"\n            url = \"jdbc:h2:mem:testDb\"\
  \n        }\n    }\n    production {\n        dataSource {\n            dbCreate\
  \ = \"update\"\n            url = \"jdbc:h2:prodDb\"\n        }\n    }\n}\n```\n\
  \n在清单 12-1 中，请注意公共配置是如何在顶层提供的，然后一个 `environments` 块为 `dataSource` 的 `dbCreate` 和\
  \ `url` 属性指定了按环境的设置。我们将在本章的 `dataSource` 部分重新讨论这段代码。\n\n在 Gant 脚本或引导类中（本章稍后会解释），你可以使用\
  \ Environment 类来检测环境，如清单 12-2 所示。\n\n***清单 12-2.***  检测环境\n\n```groovy\nimport grails.util.Environment\n\
  ......\nswitch (Environment.current) {\n    case Environment.DEVELOPMENT:\n    \
  \    configureForDevelopment()\n        break\n    case Environment.PRODUCTION:\n\
  \        configureForProduction()\n        break\n}\n```\n\n**理解 Grails 配置**\n\n\
  使用 Grails 的默认设置，你实际上可以在不做任何配置的情况下开发应用程序，但了解在需要时如何以及在何处覆盖约定是很重要的。\n\n对于通用配置，Grails\
  \ 提供了两个文件：\n\n*   `grails-app/conf/BuildConfig.groovy`\n*   `grails-app/conf/Config.groovy`\n\
  \n`BuildConfig.groovy` 文件用于运行 Grails 命令时使用的设置，而 `Config.groovy` 文件用于应用程序运行时使用的设置。这意味着\
  \ `Config.groovy` 会与你的应用程序一起打包，但 `BuildConfig.groovy` 不会。Grails 包含四个主要的配置类别。第一个是\
  \ URL 映射，我们在前面的章节中已经解释过，因此这里不再赘述。第二个是应用程序启动和关闭时的行为。第三个和第四个是数据源和日志配置。你可以在 `grails-app/config`\
  \ 目录中找到所有这些配置。\n\n**启动和关闭行为**\n\n有时，当应用程序启动和/或关闭时，你需要执行一些操作，例如分别获取和释放资源，或缓存数据。Grails\
  \ 在 `grails-app/config/BootStrap.groovy` 文件中实现了这一点。\n\n清单 12-3 是一个 `BootStrap.groovy`\
  \ 文件的示例。它包含了应放置启动和关闭代码的注释。\n\n***清单 12-3.***  使用 BootStrap.groovy 执行启动和关闭活动\n\n\
  ```groovy\nclass BootStrap {\n    def init = { servletContext ->\n        // 在此处执行启动活动\n\
  \    }\n    def destroy = {\n        // 在此处执行关闭活动\n    }\n}\n```\n\n在清单 12-3 中，`init`\
  \ 操作在应用程序启动或重新部署时被调用。`javax.servlet.ServletContext`² 被传入，提供了对应用程序属性、在 web.xml 中配置的初始化参数、上下文路径等的访问。`destroy`\
  \ 操作在应用程序关闭时被调用，但不保证一定会被调用。例如，当应用服务器关闭时，`destroy` 方法不太可能被调用，但当应用程序被重新部署或取消部署时，它很可能会被调用。\n\
  \n**数据源配置**\n\n默认情况下，Grails 开箱即用，配置为使用内嵌的内存 H2 数据库。这很可能不是测试和生产环境中使用的数据库，甚至可能不是大多数开发环境中使用的数据库。\n\
  \n\n这是因为，如你所见，每次应用程序重启时，数据库都会在内存中重新创建，因此是空的。应用程序更有可能使用服务器数据库，例如 MySQL、Oracle、³ DB2、⁴\
  \ Microsoft SQL Server、⁵ 甚至可能是 Apache Derby。⁶ 你可以在 `grails-app/config/DataSource.groovy`\
  \ 文件中设置数据库和 Hibernate 配置。清单 12-4 展示了一个自定义的 `DataSource.groovy` 文件示例，其中包含了本地 MySQL\
  \ 数据库的生产环境数据库配置。    ***清单 12-4.***  包含 MySQL 生产环境配置的 DataSource.groovy    ``` 1.  dataSource\
  \ { 2.      pooled = true 3.      driverClassName = \"org.h2.Driver\" 4.      username\
  \ = \"sa\" 5.      password = \"\" 6.  } 7.  hibernate { 8.      cache.use_second_level_cache=true\
  \ 9.      cache.use_query_cache=false 10.      cache.region.factory_class = 'net.sf.ehcache.hibernate.EhCacheRegionFactory'\
  \ 11\\. } 12\\. // environment specific settings 13\\. environments { 14.     development\
  \ { 15.         dataSource { 16.             dbCreate = \"create-drop\" // one of\
  \ 'create', 'create-drop','update', 'validate', \" 17.             url = \"jdbc:h2:mem:devDb;MVCC=TRUE;LOCK_TIMEOUT=10000\"\
  \ 18.         } 19.     } 20.     test { 21.         dataSource { 22.            \
  \ dbCreate = \"update\" 23.             url = \"jdbc:h2:mem:testDb;MVCC=TRUE;LOCK_TIMEOUT=10000\"\
  \ 24.         } 25.     } 26.     production { 27.         dataSource { 28\\. pooled\
  \ = true 29\\. driverClassName = \"com.mysql.jdbc.Driver\" 30\\. username = \"root\"\
  \ 31\\. password = \"<password>\" 32\\. dbCreate = \"update\" 33\\. url = \"jdbc:mysql://localhost:3306/collab_todo\"\
  \ 34.                               dialect = org.hibernate.dialect.MySQL5InnoDBDialect\
  \ 35.                              properties {                                         \
  \ maxActive = −1                                  minEvictableIdleTimeMillis=1800000\
  \                                  timeBetweenEvictionRunsMillis=1800000                                 \
  \ numTestsPerEvictionRun=3                                  testOnBorrow=true                                 \
  \ testWhileIdle=true                                  testOnReturn=true                                 \
  \ validationQuery=\"SELECT 1\"                                          . . .     \
  \ } 36.         } 37.     } 38\\. } ```    清单 12-2 中的配置文件分为三个主要部分：`dataSource`（第\
  \ 1-6 行）、`hibernate`（第 7-11 行）和环境特定设置（第 12-38 行）。`dataSource` 部分提供了默认的数据库设置，环境特定设置可以覆盖或追加这些设置。除了\
  \ `pooled` 属性外，这些默认设置都与标准的 JDBC 配置信息相关，例如 JDBC 驱动程序类名、数据库的用户名和密码。    `hibernate`\
  \ 部分涉及 Hibernate 特定的设置。默认情况下，它配置了 Hibernate 缓存设置。有关更多配置选项，请参阅 Hibernate 文档。⁷   \
  \ 环境特定设置可以为特定命名的环境提供特定的数据源或 Hibernate 配置。请注意，在第 28-33 行中，`productiondataSource`\
  \ 被配置为通过将 `driverClassName` 和 `url` 设置为 MySQL 特定的值来使用 MySQL 数据库。它还将 `pooled` 属性覆盖为\
  \ `true`，因为大多数生产环境比开发人员的工作站有更多的并发需求。    最后，请注意 `dbCreate` 属性仅配置为 `update`。这意味着在部署时，Hibernate\
  \ 将更新它能够更新的任何表，但会保留现有数据不变。\n\n另一方面，默认的开发配置会在启动时创建表，并在应用程序关闭时销毁表和数据。在第 35 行，`properties`\
  \ 在 `dataSource` bean 上设置了额外的属性。    第 32 行中 `dataSource` 定义的 `dbCreate` 属性很重要，因为它指示\
  \ Grails 在运行时如何根据 GORM 类自动生成数据库表。`dataSource` 部分描述了这些选项：    *   create *   create-drop\
  \ *   update *   validate *   无值    在开发模式下，`dbCreate` 默认设置为 `create-drop`，但在开发的某个阶段（当然，一旦进入生产环境），你将需要停止在每次启动服务器时都删除并重新创建数据库。\
  \    日志配置    日志是收集应用程序状态反馈的重要组成部分。正如你之前所学，Grails 使用 Apache Commons Logging 组件⁸ 和\
  \ Apache log4j⁹ 提供日志支持。你可以在 `grails-app/config/Config.groovy` 中创建 log4j 配置以及其他一些配置。清单\
  \ 12-5 显示了 `Config.groovy` 的默认版本。    ***清单 12-5.***  包含日志配置的 Config.groovy 文件  \
  \  ``` 1.  // log4j configuration 2.  log4j { 3.    appender.stdout = \"org.apache.log4j.ConsoleAppender\"\
  \ 4.    appender.'stdout.layout'=\"\"org.apache.log4j.PatternLayout\" 5.    appender.'stdout.layout.ConversionPattern'='[%r]\
  \ %c{2} %m%n' 6.    rootLogger=\"error,stdout\" 7.    logger { 8.      grails=\"\
  info,stdout\" 9.      org { 10.       codehaus.groovy.grails.web.servlet=\"off,stdout\"\
    //  controllers 11.       codehaus.groovy.grails.web.pages=\"off,stdout\" //  GSP\
  \ 12.       codehaus.groovy.grails.web.sitemesh=\"off,stdout\" //  layouts 13.      \
  \ codehaus.groovy.grails.\"web.mapping.filter\"=\"off,stdout\" // URL mapping 14.      \
  \ codehaus.groovy.grails.\"web.mapping\"=\"off,stdout\" // URL mapping 15.      \
  \ codehaus.groovy.grails.commons=\"off,stdout\" // core / classloading 16.      \
  \ codehaus.groovy.grails.plugins=\"off,stdout\" // plugins 17.       codehaus.groovy.grails.orm.hibernate=\"\
  info,stdout\" // hibernate integration 18.       springframework=\"off,stdout\"\
  \ 19.       hibernate=\"off,stdout\" 20.     } 21.   } 22.   additivity.'default'\
  \ = false 23.   additivity { 24.     grails=false 25.     org { 26.       codehaus.groovy.grails=false\
  \ 27.       springframework=false 28.       hibernate=false 29.     } 30.   } 31\\\
  . } 32. 33\\. // The following properties have been added by the Upgrade process.\
  \ . . 34\\. grails.views.default.codec=\"none\" // none, html, base64 35\\. grails.views.gsp.encoding=\"\
  UTF-8\" ```    清单 12-3 执行以下操作：    *   第 2-31 行配置 log4j，而其余行设置了一些视图的默认配置。当应用程序记录消息时，必须对该消息进行某些处理。\
  \ *   第 3-5 行配置了一个 `ConsoleAppender`，它接收消息并将其写入标准输出，格式由第 5 行的模式定义。 *   第 6 行指示 log4j\
  \ 仅将严重级别为 `error` 或更高的消息发送到 appender，除非显式覆盖。 *   第 7-20 行展示了覆盖某些日志记录的示例。例如，在第 8\
  \ 行，`grails` 记录器表示包含任何日志级别为 `info` 或以上的内容，而第 10 行则完全关闭了 `org.codehaus.groovy.grails.web.servlet`。\
  \    ![image](img/sq.jpg) **注意**  log4j 有很多选项。请查看“log4j 简介”。¹⁰    Grails 为其通过约定已经理解的各类工件提供了一些特殊的记录器。[表\
  \ 12-2](#9781430248064_Ch12.\n\n\n\nxhtml#Tab2) 文档中记录了那些能帮助你查看日志消息的专用日志记录器。表 12-2\
  \ .  Grails 专用工件日志记录器\n\n| 日志记录器 | 描述 |\n| --- | --- |\n| `grails.app.controller`\
  \ | 为所有控制器配置日志 |\n| `grails.app.domain` | 为所有领域对象配置日志 |\n| `grails.app.service`\
  \ | 为所有服务配置日志 |\n| `grails.app.tagLib` | 为所有标签库配置日志 |\n\n你最可能想要进行的日志配置是为你的工件添加特定于环境的日志记录；你可以使用表\
  \ 12-2 中描述的日志记录器。例如，在开发环境中，你可能希望以调试级别记录消息（如代码清单 12-6 所示），但在生产环境中，出于性能考虑并确保日志文件不会耗尽所有磁盘空间，你可能希望记录更少的消息。\n\
  \n***代码清单 12-6.***  添加特定于开发环境的日志记录示例\n\n```environments {\n  development {\n   \
  \ log4j {\n      logger {\n        grails {\n          app.controller=\"debug\"\n\
  \        }\n      }\n    }\n  }\n}\n```\n\n代码清单 12-6 展示了以调试级别记录所有控制器的示例。你可以简单地将此配置添加到\
  \ `Config.groovy` 文件的末尾，然后重启应用程序，使新的开发环境特定日志配置生效。\n\n打包应用程序以进行部署\n\n因此，`run-app`\
  \ 命令最适合仅用于开发。要部署到生产系统，请使用打包好的 WAR 文件。通过在生产环境中设置 Grails 来部署你的应用程序，只需输入：\n\n```grails>\
  \ run-war\n```\n\n此命令将 Grails 打包为 WAR 文件，然后使用打包好的 WAR 运行 Tomcat。\n\n上面显示的 `run-war`\
  \ 命令很方便，但你可能希望对部署环境有更多控制，或者希望部署到其他容器（例如 BEA WebLogic）而不是 Tomcat。在这些情况下，你需要的是一个 WAR\
  \ 文件。要创建 WAR 归档文件，请使用 Grails 的 `war` 命令：\n\n```grails> war\n```\n\n在完成一个迭代或版本的应用程序功能后，你或你的构建主管需要打包你的应用程序，以便它可以部署到除你电脑之外的机器上。在最基本的层面上，你所要做的就是运行\
  \ Grails 的 `war` 目标来创建一个可部署的 WAR 文件。但实际上，你应该遵循一个更规范的过程，以便更容易地识别应用程序在不同环境中的版本。我们建议你按照以下步骤进行里程碑版本发布：\n\
  \n1.  从版本控制仓库更新代码，确保其与主干/主线同步。\n2.  运行单元测试和冒烟测试，以验证版本已准备就绪。\n3.  手动或使用 `grails set-version`\
  \ 目标递增 `application.properties` 中的 `app.version` 属性，以标识里程碑版本号，例如 X.X.X。\n4.  使用\
  \ `grails clean` 目标清理项目，确保没有遗留的工件。\n5.  使用 `Grails war` 目标并指定环境（例如 `grails prod\
  \ war`）将应用程序打包成 WAR 文件。这会在项目根目录下创建一个包含项目名称和版本号的 WAR 文件。\n6.  手动或使用 `grails set-version`\
  \ 目标递增 `application.properties` 中的 `app.version` 属性，并附加 `-SNAPSHOT`，以表明此版本是正在进行的工作，而非里程碑版本。\n\
  7.  将 `application.properties` 文件提交回你的版本控制仓库。\n\n现在你有了一个可供部署的 WAR 文件。我们将在下一节讨论如何部署它。\n\
  \n部署到应用服务器\n\n打包为 WAR 文件的 Grails 应用程序可以部署到 Java EE 应用服务器（如 JBoss、GlassFish、Apache\
  \ Geronimo、BEA WebLogic 或 IBM WebSphere），或 Web 容器（如 Apache Tomcat 或 Jetty）。不同容器之间的部署方式差异很大，因此请查阅你的应用服务器或\
  \ Web 容器文档以了解详细信息。然而，标准机制包括可以复制 WAR 的专用部署目录、基于 Web 的管理控制台、命令行客户端和/或 Apache Ant 任务。Grails\
  \ 没有提供任何简化部署的工具，因此我们现在将讨论如何编写自己的脚本来实现自动化。\n\n![image](img/sq.jpg) **注意**  Grails\
  \ 常见问题解答 (`http://www.grails.org/FAQ`) 提供了将 Grails 应用程序部署到一些常见应用服务器的具体配置和技巧。\n\n\
  HTTPS\n\n许多应用程序要求从浏览器传递到服务器的信息进行加密，以确保数据在传输过程中不被截获。这通常通过安全的 HTTP 连接来完成，也称为基于安全套接字层\
  \ (SSL) 的 HTTP，或 HTTPS。配置 HTTPS 是特定于应用服务器的配置，因此你应该查阅应用服务器文档以了解如何配置。然而，在 HTTPS 环境下测试你的应用程序可能至关重要，因此\
  \ Grails 提供了使用 HTTPS 而非 HTTP 启动 Grails 应用程序的能力。你可以使用 `run-app -https` 而不是执行 `grails\
  \ run-app`。这会启动你的服务器，使其在端口 8080 和端口 8443 上均可通过 HTTPS 协议访问——例如 `https://localhost:8443/collab-todo/`。以这种模式运行服务器会生成一个临时证书，如下图所示。系统会提示你一个未知证书颁发机构错误，这使得此方法不适合生产环境使用，但用于测试是没问题的。\n\
  \n![9781430248064_unFig12-01.jpg](img/9781430248064_Fig12-01.jpg)\n\n开发过程中充满了循环和重复性任务，例如编译、打包和部署。手动执行此类任务可能既枯燥又容易出错。自动化此类任务被认为是最佳实践。许多书籍都阐述了这一点，并且许多框架都是为了解决这个问题而开发的。事实上，Grails\
  \ 的主要约定之一就是 Grails 命令行，它用于自动化 Grails 开发中的常见任务。Grails 命令行利用 Gant¹¹，这是一个构建系统，它使用 Groovy\
  \ 语言来编写 Apache Ant 任务的脚本，而不是使用 Ant 的 XML 格式。Ant（以及因此的 Gant）主要由称为目标的任务集合组成，你可以执行这些目标来完成一个工作单元。\n\
  \n正如你在本书中所见，Grails 命令行提供了许多功能。然而，它可能无法自动化你在开发过程中执行的每一项任务。例如，没有用于部署的任务，但将你的应用程序部署到与生产环境中使用的应用服务器和数据库相匹配的基础设施上是很常见的。因此，有时你可能希望通过创建自己的\
  \ Gant 脚本或修改现有脚本来简化开发工作。\n\nGrails 使得将你的脚本集成到开发过程中变得容易。毕竟，每个 Grails 命令行任务本身已经是一个\
  \ Gant 脚本。Grails 命令行使用以下目录来定位要执行的脚本，并将它们集成到帮助系统中：\n\n*   `USER_HOME/.grails/scripts`\n\
  *   `PROJECT_HOME/scripts`\n*   `PROJECT_HOME/plugins/*/scripts`\n*   `GRAILS_HOME/scripts`\n\
  \n编写完你的 Gant 脚本后，你可以将其放置在这些目录之一中，它将自动在 Grails 命令行和 Grails 帮助列表中可用。\n\n\n\nGrails\
  \ 并未包含部署脚本，因为应用服务器和配置选项过多，难以全面覆盖。清单 12-7 展示了一个简单脚本的示例，你可以使用它将 WAR 文件部署到支持通过部署目录（如\
  \ JBoss 的部署目录）进行自动部署的应用服务器上。    ***清单 12-7.***  基本部署脚本 Deploy.groovy    ``` 1.  /**\
  \ 2.  * Gant 脚本，用于将 WAR 文件复制到应用 3.  * 服务器部署目录。 4.  */ 5. 6\\.  7\\.  8\\.  9.  includeTargets\
  \ <<grailsScript(\"War\") 10. 11\\. target ('default':'\"将 WAR 归档文件复制到 Java EE 应用服务器的部署\
  \ 12\\. 目录。 13. 14\\. 示例：  15\\. grails deploy 16\\. grails prod deploy 17\\. \"\
  \") { 18.   deploy() 19\\. }  20. 21\\. target (deploy: \"实现目标\") { 22.   depends(\
  \ war ) 23. 24.   def deployDir = ant.antProject.properties.'deploy.dir' 25. 26.  \
  \ ant.copy(todir:\"${deployDir}\", overwrite:true) { 27.     fileset(dir:\"${basedir}\"\
  , includes:\"*.war\")  28.   }  29. 30.  event(\"StatusFinal\", [\"已完成将 WAR 复制到\
  \ ${deployDir}\"]) 31\\. } ```    在清单 12-7 所示的 `Deploy.groovy` 脚本中，第 9 行导入了另一个 Gant\
  \ 脚本——具体来说是 `War.groovy` 脚本。部署脚本依赖于 `War.groovy` 脚本来构建 WAR 文件，这样它才有内容可供部署。    第\
  \ 11–19 行代表该脚本中的第一个目标。第一个目标是 `default` 目标，这意味着如果未指定其他目标，则将执行此目标。由于 Grails 会调用 `default`\
  \ 目标，因此它肯定会被执行。请注意，`default` 名称使用了单引号；这是因为 `default` 是 Groovy 中的保留字。目标名称通常不需要引号。名称后面是目标描述，Grails\
  \ 帮助系统会使用它。默认目标的唯一行为是调用 `deploy` 目标。    第 21–31 行所示的 `deploy` 目标负责所有实际工作。它首先调用 `War.groovy`\
  \ 脚本中的 `war` 目标。创建 WAR 文件后，它会查找 `deploy.dir` 属性。然后，它将 WAR 文件复制到该属性指定的位置。你可以将 WAR\
  \ 文件的目标位置放在 `application.properties` 文件中，因为 Grails 命令行会自动加载它。第 26–28 行使用 Ant 的 `copy`\
  \ 任务将所有 WAR 文件复制到部署目录。最后，向系统输出一条消息，告知用户脚本已完成以及 WAR 文件被复制到了哪个目录。    运行以下目标将通过将 WAR\
  \ 文件复制到你的应用服务器来执行部署：    ``` > grails deploy ```    升级 Grails 应用程序    在 Grails 框架开发的早期，显然必须意识到该框架会经历多次迭代，并且需要某种机制来确保应用程序能够轻松迁移到\
  \ Grails 框架的新版本。与许多 Grails 约定一样，这是通过 Grails 目标 `upgrade` 来实现的。本节简要总结了升级到 Grails\
  \ 2 时可能遇到的情况。详细描述可在 Grails 文档中找到。¹²    Grails 2.0 包含更新的依赖项，包括 Servlet 3.0、Tomcat\
  \ 7、Spring 3.1、Hibernate 3.6 和 Groovy 1.8。这意味着某些依赖于这些 API 早期版本的插件和应用程序可能无法再正常工作。例如，Servlet\
  \ 3.0 的 `HttpServletRequest` 接口包含新方法，因此如果某个插件为 Servlet 2.5 实现了此接口，但未为 Servlet 3.0\
  \ 实现，则该插件将会失效。任何 Spring 接口也是如此。Grails 2 不能在 JDK 1.4 上运行，因此如果你希望继续使用 Grails，请使用 Grails\
  \ 1.0.x，直到能够升级你的 JDK。\n\n配置变更    以下设置已从 `grails-app/conf/Config.groovy` 移至 `grails-app/conf/BuildConfig.groovy`：\
  \    *   `grails.config.base.webXml` *   `grails.project.war.file`（由 `grails.war.destFile`\
  \ 重命名而来） *   `grails.war.dependencies` *   `grails.war.copyToWebApp` *   `grails.war.resources`\
  \    命令行变更    `run-app-https` 和 `run-war-https` 命令已不复存在，取而代之的是 `run-app` 的一个参数：\
  \    ``` > grails run-app -https ```    H2    HSQLDB 已被 H2 取代，成为默认的内存数据库，但它仍然与 Grails\
  \ 捆绑在一起。升级选项包括将 `DataSource.groovy` 中的 HSQLDB 引用替换为 H2 引用，或者将 HSQLDB 添加为应用程序的运行时依赖项。\
  \    如果你想使用不同版本的 Grails 运行应用程序，请将 HSQLDB 添加为运行时依赖项，可以在 `BuildConfig.groovy` 中执行此操作，如清单\
  \ 12-8 所示。    ***清单 12-8.***  将 HSQLDB 添加为运行时依赖项    ``` grails.project.dependency.resolution\
  \ = {     inherits(\"global\") {     }     repositories {         grailsPlugins()\
  \         grailsHome()         grailsCentral()     }    dependencies {         //\
  \ 将 HSQLDB 添加为运行时依赖项         runtime 'hsqldb:hsqldb:1.8.0.10'     } }  ```    jQuery\
  \    jQuery 取代了 Prototype。Prototype JavaScript 库已从 Grails 核心中移除，现在新的 Grails 应用程序默认配置了\
  \ jQuery 插件。这仅在你于应用程序中将 Prototype 与自适应 Ajax 标签（例如 `<g:remoteLink/>`）一起使用时才会产生影响，因为一旦升级，这些标签将失效。要解决此问题，只需在你的应用程序中安装\
  \ Prototype 插件即可。如果你愿意，还可以从 `web-app/js/prototype` 目录中删除 prototype 文件。    控制器公共方法\
  \    从 Grails 2.0 开始，控制器的公共方法现在除了被定义为传统闭包的操作外，也被视为操作。如果你依赖方法进行隐私控制或作为辅助方法，则这可能导致意外行为。要解决此问题，请将应用程序中不希望公开为操作的所有方法标记为私有方法。\
  \    单元测试框架    Grails 2 引入了一个新的单元测试框架，它比旧框架更简单，行为也更一致。基于 `GrailsUnitTestCase` 类层次结构的旧框架仍然可用以保持向后兼容性，但它不能与新的注解一起使用。将单元测试迁移到新方法并非易事，但建议这样做。以下是从旧风格到新风格的一组映射：\
  \    1.  如果你正在测试核心工件（控制器、标签库、领域类等），则移除 `extends *UnitTestCase` 并为类添加 `@TestFor`\
  \ 注解；对于非核心工件和非工件类，则添加 `@TestMixin(GrailsUnitTestMixin)` 注解。 2.  为必须模拟的领域类添加 `@Mock`\
  \ 注解，并使用新的 `MyDomain().save()` 代替 `mockDomain()`。 3.  将对 `mockRequest`、`mockResponse`\
  \ 和 `mockParams` 的引用替换为 `request`、`response` 和 `params`。 4.  移除对 `renderArgs` 的引用，对于视图渲染，使用视图和模型属性；对于其他所有情况，使用\
  \ `response.text`。 5.  将对 `redirectArgs` 的引用替换为 `response.redirectedUrl`。后者会考虑 URL\
  \ 映射，因为它是一个字符串 URL，而不是 `redirect()` 参数的映射。 6.  不再需要 `mockCommandObject()` 方法，因为\
  \ Grails 会自动检测操作是否需要命令对象。    总结    本章涵盖了开发 Grails 应用程序的许多操作方面。许多主题涉及代码编写后发生的事情，或描述了促进开发过程的方法。\n\
  \n\n\n本章内容包括应用的打包与部署，以及环境数据源和日志记录的配置。还涵盖了如何自动化日常开发流程，以及如何升级应用以适配新版本的 Grails。本章也结束了\
  \ Grails 服务端相关内容的讨论。    ¹ `http://dev.mysql.com/`    ² `http://www.oracle.com/technetwork/java/javaee/servlet/index.html`\
  \    ³ `http://www.oracle.com`    ⁴ `http://www.ibm.com/db2/`    ⁵ `http://www.microsoft.com/sql/`\
  \    ⁶ `http://db.apache.org/derby/`    ⁷ `http://www.hibernate.org/docs`    ⁸ `http://commons.apache.org/logging/`\
  \    ⁹ `http://logging.apache.org/log4j/2.x/`    ¹⁰ `http://logging.apache.org/log4j/2.x/manual/`\
  \    ¹¹ `http://gant.codehaus.org`    ¹² `http://grails.org/doc/latest/guide/upgradingFromPreviousVersionsOfGrails.html`\
  \    第 13 章    ![image](img/frontdot.jpg)    Griffon 简介    Griffon 是一种神话生物，拥有狮子的身体以及鹰的头和翅膀。由于狮子传统上被认为是百兽之王，而鹰是百鸟之王，因此\
  \ Griffon 被认为是一种特别强大和威严的生物。与这种威严的混合体类似，Griffon（一个基于模型-视图-控制器（MVC）的桌面应用框架）以 Web 应用框架\
  \ Grails 为基础，使开发者能够在 Web 开发和桌面开发之间切换。在一个领域获得的知识会转化到另一个领域，从而为你带来两全其美的体验。这两个框架共享许多特性，Griffon\
  \ 的 MVC 设计和插件机制基于 Grails 提供的功能，并且在一个框架中找到的命令行工具和脚本也可以在另一个框架中找到。    ​受 Grails 启发，Griffon\
  \ 遵循“约定优于配置”的范式，并搭配了直观的 MVC 架构和命令行界面。Griffon 也遵循 Swing 应用框架的精神，该框架定义了一个简单而强大的应用生命周期和事件发布机制。Grails\
  \ 开发者在尝试 Griffon 时应该会感到得心应手。Grails 的许多约定和命令都与 Griffon 共享。    Griffon 框架可通过插件进行扩展，并且有许多插件可供选择。例如，你可以找到用于第三方\
  \ Swing 组件（如 SwingX、Jide 和 Macwidgets）的插件；持久化相关的插件（如 DataSource、GSQL 和 Hibernate\
  \ 等）；以及通过 JOGL 和 LWJGL 实现的 3D 图形和动画支持。Griffon 还支持其他 UI 工具包，如 JavaFX 和 SWT。    ​本章并非详尽无遗，只是向你介绍\
  \ Griffon 的基础知识。有关 Griffon 的详细论述，我们推荐以下资源：\n*   *《Griffon 实战》*（Manning Publications,\
  \ 2012），由 James Shingler 合著，他也是本书的合著者\n*   Griffon 文档（`http://griffon.codehaus.org/guide/latest/`）\n\
  \n安装 Griffon\n\n开始使用 Griffon 的第一步是安装发行版。为此，请遵循以下步骤：\n\n1.  从以下地址下载 Griffon 的二进制发行版，并将生成的\
  \ zip 文件解压到你选择的目录：`http://griffon.codehaus.org/Download`。本章使用的是 Griffon 1.1.0。\n\
  2.  将 `GRIFFON_HOME` 环境变量设置为解压 zip 文件的目录。在基于 Unix/Linux 的系统上，通常需要在你的配置文件中添加类似 `export\
  \ GRIFFON_HOME=/path/to/griffon` 的内容。在 Windows 上，你通常可以在“我的电脑”![image](img/arrow.jpg)高级![image](img/arrow.jpg)环境变量中设置环境变量。\n\
  3.  现在，你需要将 `bin` 目录添加到你的 `PATH` 变量中。在基于 Unix/Linux 的系统上，你可以通过添加 `export PATH=\"\
  $PATH:$GRIFFON_HOME/bin\"` 来实现。在 Windows 上，修改“我的电脑”![image](img/arrow.jpg)高级![image](img/arrow.jpg)环境变量下的\
  \ Path 环境变量。\n\n如果 Griffon 工作正常，你现在应该能够在终端窗口中输入 `griffon` 并看到类似下面的输出：\n\n```\nWelcome\
  \ to Griffon 1.1.0 - http://griffon-framework.org/\nLicensed under Apache Standard\
  \ License 2.0\nGriffon home is set to: /usr/local/griffon-1.1.0\nNo script name\
  \ specified. Use 'griffon help' for more info\n```\n\n如果你按照下面的提示在命令提示符下输入 `griffon\
  \ help`，将会显示一个可用的 Griffon 命令列表，这确认了 `GRIFFON_HOME` 已按预期设置，并且 `griffon` 命令在你的路径中可用。\n\
  \n```\n> griffon help\n```\n\n输出应该类似于这样：\n\n```\nWelcome to Griffon 1.1.0 - http://griffon.codehaus.org/\n\
  Licensed under Apache Standard License 2.0\nGriffon home is set to: /opt/griffon\n\
  ```\n\n![image](img/sq.jpg) **注意**  Griffon 可能会产生额外的输出，尤其是在你第一次运行它时，此时 Griffon 会确保它能找到所有必需的依赖项，这些依赖项应该位于\
  \ Griffon 安装目录中。\n\n现在你已经准备好开始构建你的第一个应用了。你将从一个默认的 Griffon 应用开始，然后使用插件对其进行增强。\n\n\
  创建你的第一个应用\n\n要创建一个 Griffon 应用，请使用以下 `griffon` 命令，Grails 开发者会注意到这与 Grails 类似。\n\n\
  ```\n> griffon create-app user\n```\n\n`create-app` 命令会创建适当的目录结构、应用，甚至包括可用于启动应用的骨架代码。要启动应用，请导航到应用目录并调用\
  \ `run-app` 命令：\n\n```\n> griffon run-app\n```\n\n此命令应编译所有源代码并打包应用。几秒钟后，你将看到类似于图\
  \ 13-1 的结果。\n\n![9781430248064_Fig13-01.jpg](img/9781430248064_Fig13-01.jpg)\n\n\
  图 13-1 .  默认视图\n\n到目前为止，这看起来并不像一个完整的应用，但它是一个完整的 Griffon 应用，并创建了完整的目录结构，下一节将对此进行说明。`griffon\
  \ run-app` 命令以独立模式运行应用，但这并不是运行应用的唯一方式。每个 Griffon 应用都可以通过三种模式部署：独立模式、Web Start 模式和小程序模式。\n\
  \nJava Web Start 是由 Sun Microsystems（现为 Oracle）开发的一个框架，允许用户通过 Web 浏览器直接从互联网启动 Java\
  \ 平台的应用软件。使用 JavaWS，桌面应用可以通过网络交付。要在 Griffon 中以 Web Start 模式启动当前应用，请使用以下命令：\n\n```\n\
  > griffon run-webstart\n```\n\n最后，你可以使用以下命令以小程序模式运行应用：\n\n```\n> griffon run-applet\n\
  ```\n\n在这两种情况下（Web Start 模式和小程序模式），结果都是相似的，如图 13-1 所示。\n\n正如我们之前提到的，`create-app`\
  \ 命令会创建适当的目录结构、应用，甚至包括骨架代码。接下来我们将介绍目录结构。\n\n目录结构\n\nGrails 框架的优势之一是其“约定优于配置”的范式。与此类似，Griffon\
  \ 的约定由所有应用共享的通用应用结构决定；当你调用 Griffon 的 `create-app` 命令时，就创建了这个结构。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n让我们看看这个命令还创建了什么。应用程序的核心位于 `griffon-app` 目录中，如图 13-2 所示。在那里，你可以找到所有模型、视图和控制器（它们是应用程序的中坚力量）的代码。你还会发现其他有用的构件。\
  \    ![9781430248064_Fig13-02.jpg](img/9781430248064_Fig13-02.jpg)    图 13-2 .  应用程序目录结构\
  \    表 13-1 展示了每个目录内容的细分。随着你开发越来越多的 Griffon 应用程序，你会逐渐认识到所有应用程序都遵循一个通用的结构和布局。这使得在应用程序之间切换变得更加容易。你无需花时间在应用程序中摸索视图、模型和控制器可能位于何处。你只需*知道*它们在哪里。\
  \    表 13-1. Griffon 约定中的重要目录     | 目录 | 描述 | | --- | --- | | `griffon-app` | 核心\
  \ Griffon 构件 | | `griffon-app/conf` | 配置源 | | `griffon-app/conf/keys` | JAR 签名密钥\
  \ | | `griffon-app/conf/dist` | 包特定文件 | | `griffon-app/conf/dist/shared` | 所有打包目标的通用文件\
  \ | | `griffon-app/conf/metainf` | 应放入应用程序/插件 JAR 内部 META-INF 的文件 | | `griffon-app/conf/webstart`\
  \ | Webstart 模板 | | `griffon-app/controllers` | 控制器 | | `griffon-app/models` | 模型\
  \ | | `griffon-app/services` | 服务 | | `griffon-app/resources` | 图片、属性文件等 | | `griffon-app/views`\
  \ | GSP | | `lib` | 第三方 JAR 文件，例如数据库驱动程序 | | `scripts` | 构建时脚本 | | `src` | 辅助源码\
  \ | | `src/main` | 其他 Groovy/Java 源码 | | `test` | 单元测试和集成测试 | | `test/integration`\
  \ | 集成测试 | | `test/unit` | 单元测试 | | `test/cli` | 命令行测试目录 |    现在，让我们浏览一下 Griffon\
  \ 在以应用程序命名的 models、views 和 controllers 目录中创建的 MVC 三元组。Griffon 遵循 MVC 模式（模型-视图-控制器）。Griffon\
  \ 应用程序中最小的结构单元是一个 MVC 组。一个 MVC 组是一组三个组件，分别对应 MVC 模式的每个成员：模型、视图和控制器。每个成员都遵循一个易于遵循的命名约定。当你发出\
  \ `create-app` 命令时，Griffon 为应用程序创建了一个初始的 MVC 组。我们从查看视图开始：用户能够触摸和感受到的应用程序部分（从字面意义上讲）。该文件位于\
  \ `griffon-app/view/user/UserView.groovy`，如清单 13-1 所示。    ***清单 13-1.***  默认视图 \
  \   ``` package user application(title: 'user',   preferredSize: [320, 240],   pack:\
  \ true,   //location: [50,50],   locationByPlatform:true,   iconImage: imageIcon('/griffon-icon-48x48.png').image,\
  \   iconImages: [imageIcon('/griffon-icon-48x48.png').image, imageIcon('/griffon-icon-32x32.png').image,\
  \                imageIcon('/griffon-icon-16x16.png').image]) { // add content here\
  \     label('Content Goes Here') // delete me } ```    清单 13-1 中的视图脚本是一个相当简单的 `SwingBuilder`\
  \ 脚本。Griffon 将在其 UberBuilder（一个复合的 `FactoryBuilderSupport` 类）的上下文中执行此 Groovy 脚本，该类允许无缝合并现有的构建器。从这段代码中，你可以看到\
  \ `create-app` 命令定义了一个标题为 User 的应用程序，其默认大小为 320x240，包含一些图标和一个“Content Goes Here”标签。当以独立模式运行时，应用程序节点解析为一个\
  \ `javax.swing.JFrame` 实例；当以小程序模式运行时，则解析为一个 `javax.swing.JApplet` 实例。\n\n在代码于应用程序节点中设置了一些基本属性（如标题和位置）之后，标签组件解析为\
  \ `javax.swing.JLabel`。    清单 13-2 展示了由 Griffon 在 `models` 目录中创建的模型类 `UserModel`。\
