  \n***清单 3-7.***  Hello.groovy 文件：无脚本，包含一个与文件名同名的类\n``` class Hello{\n  def hello(){\n\
  \   println \"hello world\"\n  }\n} ```\n\n**Groovy 构造函数**\n\n在 Groovy 中，构造函数可以通过多种方式调用。清单\
  \ 3-8 展示了以 Java 风格调用构造函数。\n\n更推荐的方式是使用命名参数，如清单 3-9 所示。\n\n***清单 3-8.***  以 Java\
  \ 风格调用构造函数\n``` class Test{\n  def i\n  def j\n  Test(i, j){\n    this.i = i\n \
  \   this.j = j\n  }\n}\ndef test = new Test(1, 2)\nassert test.i == 1\nassert test.j\
  \ == 2 ```\n\n清单 3-9 展示了使用命名参数调用构造函数。正如第 1 章中讨论的，Groovy 使用 map 对象来初始化每个属性。它会遍历 map，并为每个\
  \ map 元素调用相应的 setter 方法。\n\n***清单 3-9.***  使用命名参数\n``` 1. class Test{\n2.  def i\
  \ = 0\n3.  def j = 0\n4. }\n5. def test1 = new Test(i:1, j:2)\n6. assert test1.i\
  \ == 1\n7. assert test1.j == 2 ```\n\n如清单 3-9 的第 5 行所示，当我们向构造函数传递一个 map 对象时，可以省略\
  \ map 语法中的方括号 `[]`。\n\n我们还可以按任意顺序列出属性值，如下所示：\n\n``` def test2= new Test( j:2, i:1)\n\
  assert test2.i == 1\nassert test2.j == 2 ```\n\n如果某个属性被排除在外，则不会调用相应的 setter 方法，并保留其默认值，如下所示：\n\
  \n``` def test3 = new Test(i:1)\nassert test3.i == 1\nassert test3.j == 0 ```\n\n\
  一个类可以有多个构造函数，如清单 3-10 所示。\n\n***清单 3-10.***  包含多个构造函数的类\n``` 1.  class A{\n2.  \
  \ def list= []\n3.   A(){\n4.    list<< \"A constructed\"\n5.   }\n6.   A(int i){\n\
  7.    this()\n8.    list<< \"A constructed with $i\"\n9.   }\n10.  A(String s){\n\
  11.   this(5)\n12.   list<< \"A constructed with '$s'\"\n13.  }\n14. }\n15. def\
  \ a1= new A()\n16. assert a1.list == [ \"A constructed\" ]\n17. def a2= new A(7)\n\
  18. assert a2.list.collect{it} == [\n19.  \"A constructed\",\n20.  \"A constructed\
  \ with 7\",\n21. ]\n22. def a3= new A('test')\n23. assert a3.list.collect{it} ==\
  \ [\n24.  \"A constructed\",\n25.  \"A constructed with 5\",\n26.  \"A constructed\
  \ with 'test'\",\n27. ] ```\n\n在清单 3-10 中，类 A 有三个构造函数：\n\n*   在第 7 行，构造函数 *A(int\
  \ i)* 在其第一条语句中调用了默认的无参构造函数 *A()*。\n*   在第 11 行，*A(String s)* 在其第一条语句中调用了 *A(int\
  \ i)*，而 *A(int i)* 又在其第一条语句中调用了构造函数 *A()*。\n*   在第 18 行，当调用构造函数 *A(7)* 时，列表将包含两个元素，一个来自\
  \ *A(int i)*，一个来自 *A()*。注意第 19 行中 *list* 的 *collect* 方法。*collect* 方法接受一个列表和一个闭包参数。\n\
  \n**继承**\n\n如清单 3-11 所示，Groovy 允许一个类继承另一个类，接口也可以继承，但一个类最多只能继承一个类。\n\n***清单 3-11.***\
  \  继承类\n``` 1. class A{}\n2. class B extends A{}\n3. def b = new B()\n4. assert\
  \ b in B && b in A ```\n\n在第 4 行，我们使用 `in` 运算符测试继承的类。\n\n`in` 运算符是集合中 `contains()`\
  \ 方法的快捷方式。下面的代码片段说明了 `in` 运算符的用法。\n\n``` assert 1 in [1, 2, 3] ```\n\n在父类中定义的公共实例字段、属性和方法，在子类中同样可用，如清单\
  \ 3-12 所示：\n\n***清单 3-12.***  继承的方法和属性\n``` 1.  class A{\n2.   int x\n3.   int y\n\
  4.   String methodA(int n){ \"value ${x= y= n}\" }\n5.  }\n6.  class B extends A{\n\
  7.   String methodB(int n){ \"value $n\" }\n8.  }\n9.  def b= new B()\n10. assert\
  \ b.methodB(10) == 'value 10'\n11. assert b.methodA(20) == 'value 20'\n12. assert\
  \ b.x == 20\n13. assert b.y == 20\n14. b.\n\n\n\ny= 5 15\\. assert b.y == 5 16\\\
  . assert b.getY() == 5 ```    *   在第 11 行，我们在扩展类*B*上调用了方法*A()*。 *   在第 12–16 行，我们在扩展类*B*上断言了*x*和*y*。\
  \    我们可以定义一个抽象类，即只定义了部分方法的类，其余方法仅像在接口中那样进行声明。如清单 3-13 所示，抽象类及其中的每个方法声明都必须用*abstract*关键字修饰：\
  \    ***清单 3-13.***  使用抽象类    ``` 1.  interface X{ 2.   def x() 3.  } 4.  interface\
  \ Y{ 5.   def y() 6.  } 7.  abstract class A{ 8.   def a(){ println 1 } 9.   abstract\
  \ b() 10\\. } 11\\. class B extends A implements X, Y{ 12.  def x(){ println 2 }\
  \ 13.  def y(){ println 3 } 14.  def b(){ println 4 } 15\\. } ```    *   在第 8 行，定义了一个方法*a()*。\
  \ *   在第 9 行，声明了一个方法*b()*。 *   第 14 行提供了方法*b()*的定义。    接口和抽象方法不能声明为静态。一个方法是否为静态是其定义的一部分，如清单\
  \ 3-14 所示，而非其声明的一部分。    ***清单 3-14.***  接口和抽象方法    ``` 1.  interface X{ 2.   def\
  \ x() 3.   //static x1() 4.  } 5.  interface Y{ 6.   def y() 7.  } 8.  abstract\
  \ class A{ 9.   static a(){ println 1 } 10.  abstract b() 11.  abstract c() 12.  //abstract\
  \ static c1() 13\\. } 14\\. class B extends A implements X, Y{ 15.  static x(){\
  \ println 2 } 16.  def y(){ println 3 } 17.  static b(){ println 4 } 18.  def c(){\
  \ println 5 } 19\\. } ```    *   第 3 行被注释掉了，因为接口方法不能声明为静态。 *   第 12 行被注释掉了，因为抽象方法不能是静态的。\
  \    一个 final 类不能被继承；一个 final 方法不能被重写：    ***清单 3-15.***  使用 final 类    ``` 1\\\
  . class A{ 2.  final a(){ 11 } 3.  def b(){ 12 } 4\\. } 5\\. final class B extends\
  \ A{ 6.  //def a(){ 15 } 7.  def b(){ 16 } 8\\. } 9\\. //class C extends B{} ```\
  \    *   第 6 行被注释掉了，因为类*A*中的方法*a()*是 final 的，不能被重写。 *   第 9 行被注释掉了，因为类*B*是 final\
  \ 的，不能被继承。    正如我们在清单 3-10 中讨论的，类的构造函数可以调用另一个构造函数，同样地，它也可以调用超类的构造函数，如清单 3-16 所示：\
  \    ***清单 3-16.***  调用超类的构造函数    ``` 1.  class A{ 2.   def list= [] 3.   A(){ 4.    list<<\
  \ \"A constructed\" 5.   } 6.   A(int i){ 7.    this() 8.    list<< \"A constructed\
  \ with $i\" 9.   } 10\\. } 11\\. class B extends A{ 12.  B(){ 13.   list<< \"B constructed\"\
  \ 14.  } 15.  B(String s){ 16.   super(5) 17.   list<< \"B constructed with '$s'\"\
  \ 18.  } 19\\. } 20\\. def b1= new B('test') 21\\. assert b1.list.collect{it} ==\
  \ [ 22.  \"A constructed\", 23.  \"A constructed with 5\", 24.  \"B constructed\
  \ with 'test'\", 25\\. ] 26\\. def b2= new B() 27\\. assert b2.list == [ 28.  \"\
  A constructed\", 29.  \"B constructed\", 30\\. ] ```    *   在第 16 行，如果调用超类构造函数是第一条语句，则构造函数可以调用它。\
  \ *   在第 27 行，由于没有调用*super()*，因此调用了默认的无参构造函数。    多态    由于动态类型，Groovy 实际上并不需要接口，但它仍然支持接口。在\
  \ Groovy 中，多态仅仅是方法名匹配的问题。只要每个类都定义了该方法，属于两个不相关类的两个对象就可以发送相同的消息，如清单 3-17 所示。    ***清单\
  \ 3-17.***  一个多态示例    ``` 1.  class Square{ 2.   def display() { 3.    assert  \"\
  length:${length} width:${width}\" == \"length:10 width:10\" 4.   } 5.   def length\
  \ 6.   def width 7.  } 8.\n\nclass Rectangle{ 9.   def display() { 10.   assert  \"\
  length:${length} width:${width}\" == \"length:10 width:12\" 11.  } 12.  def length\
  \ 13.  def width 14\\. } 15\\. def shapes= [new Square(length : 10, width : 10),\
  \ 16.  new Rectangle(length : 10, width : 12) 17\\. ] 18\\. shapes.each { item ->\
  \ item.display() } ```    *   第 1 行和第 8 行中的两个类*Square*和*Rectangle*（在我们的示例中）没有共享共同的超类或实现相同的接口。\
  \ *   第 18 行遍历 shapes 集合，并对集合中的每个对象调用该对象特有的*display()*方法。    Groovy 单元测试    Groovy\
  \ 最大的价值主张之一就是单元测试。使用 Groovy 对 Groovy 或 Java 代码进行单元测试可以使代码更易于阅读和维护。单元测试是将 Groovy\
  \ 引入组织的一种常见方式，因为它不会影响生产运行时。一旦开发人员和管理人员熟悉了 Groovy 在测试方面的能力，他们最终就会开始在生产中使用它。    单元测试对\
  \ Groovy 来说如此基础，以至于它被直接内置其中。你不需要下载单独的框架。Groovy 已经包含并扩展了 JUnit，这是一个流行的 Java 单元测试框架。主要的扩展是*groovy.util*.GroovyTestCase，它继承自*junit.framework.TestCase*，并添加了表\
  \ 3-1 中列出的额外断言方法。    表 3-1. GroovyTestCase 断言方法     | 断言方法 | 描述 | | --- | --- |\
  \ | `assertArrayEquals` | 断言两个数组相等且包含相同的值 | | `assertContains` | 断言一个字符数组包含给定的字符，或一个`int`数组包含给定的`int`\
  \ | | `assertEquals` | 断言两个`Object`或两个`String`相等 | | `assertInspect` | 断言`inspect()`方法的值\
  \ | | `assertLength` | 断言`char`、`int`或`Object`数组的长度 | | `assertScript` | 断言脚本运行时不抛出任何异常\
  \ | | `assertToString` | 断言`toString()`的值 |    JUnit（因此也包括 Groovy 单元测试）通过创建一个继承自*TestCase*或其子类的类来工作。*GroovyTestCase*是在\
  \ Groovy 中进行单元测试时适合扩展的类。请注意，*GroovyTestCase*位于*groovy.util*包中，因此它是隐式可用的，甚至不需要任何导入。然后，可以通过创建名称以\
  \ test 开头、后跟测试描述性内容的方法来添加测试。例如，你可以使用*testAlphaRanges*来测试 Groovy 语言的范围特性。这些测试方法不应接受参数并返回\
  \ void。与用 Java 编写的 JUnit 测试不同，这些方法不必声明可能抛出的异常，因为 Groovy 会自然地将所有受检异常转换为非受检异常。这使得测试比等效的\
  \ Java 实现更具可读性。    单元测试通常需要将对象置于已知状态。此外，测试应该成为良好的测试工具公民，并在完成后自行清理。与 JUnit 测试一样，所有\
  \ Groovy 测试都可以重写*setUp()*和*tearDown()*方法。    单元测试也是学习新框架、库和语言（如 Groovy）的好方法。你可以使用单元测试来验证你对它们工作原理的理解。清单\
  \ 3-18 是一个用于验证关于 Groovy 范围的一些假设的单元测试，包括从`'a'..'z'`的范围是否包含大写字母，以及范围是否可以连接。    清单\
  \ 3-18 展示了一个继承自*GroovyTestCase*的单元测试，它包含两个变量：第 3 行的小写字母范围和第 4 行的大写字母范围。该测试用例还包含三个测试。\
  \    ***[清单 3-18](#9781430248064_Ch03.\n\n\n\nxhtml#_list18).***  验证 Groovy 范围假设的示例单元测试\n\
  ``` 1.  class RangeTest extends GroovyTestCase { 2. 3.    def lowerCaseRange = 'a'..'z'\
  \ 4.    def upperCaseRange = 'A'..'Z' 5. 6.    void testLowerCaseRange() { 7.      assert\
  \ 26 == lowerCaseRange.size() 8.      assertTrue(lowerCaseRange.contains('b')) 9.      assertFalse(lowerCaseRange.contains('B'))\
  \ 10.  } 11. 12.   void testUpperCaseRange() { 13.     assert 26 == upperCaseRange.size()\
  \ 14.     assertTrue(upperCaseRange.contains('B')) 15.     assertFalse(upperCaseRange.contains('b'))\
  \ 16.   } 17. 18.   void testAlphaRange() { 19.     def alphaRange = lowerCaseRange\
  \ + upperCaseRange 20.     assert 52 == alphaRange.size() 21.     assert alphaRange.contains('b')\
  \ 22.     assert alphaRange.contains('B') 23.   } 24\\. } ```\n清单 3-18 中的第一个测试（第\
  \ 6–10 行）断言该范围的大小为 26，代表每个小写字母。它还断言小写字母 `'b'` 在该范围内，但大写字母 `'B'` 不在其中。第二个测试（第 12–16\
  \ 行）基本相同，但使用的是大写范围。另一方面，第三个测试验证了两个范围可以连接起来，生成一个包含两者的新范围。因此，新范围的大小是原来的两倍，并且同时包含小写字母\
  \ `'b'` 和大写字母 `'B'`。\n\n运行 Groovy 单元测试就像运行脚本一样。要运行此测试，请执行以下命令：\n\n```\n> groovy\
  \ RangeTest\n```\n\n由于 Groovy 内置了 JUnit 测试运行器，测试结果会打印到标准输出。结果会显示运行了多少个测试、失败了多少个以及发生了多少个错误。失败表示有多少个测试未通过断言，错误表示意外情况（例如异常）。此外，由于\
  \ *GroovyTestCase* 扩展了 JUnit，你可以轻松地将 Groovy 测试集成到自动化测试框架中，例如 Apache Ant 和 Apache\
  \ Maven 构建，以便持续运行。\n\n### 处理 XML\n\n可扩展标记语言（XML）是一种通用标记语言，常用于企业应用程序中持久化或共享数据。从历史上看，创建和使用\
  \ XML 文档比其他格式更容易，因为 XML 基于文本、遵循标准、格式易于解析，并且拥有许多现有的框架和库来支持多种编程语言和平台的文档读写。\n\n然而，这些框架大多基于万维网联盟（W3C）的文档对象模型（DOM），这可能导致操作\
  \ XML 文档的代码难以编写和阅读。由于处理 XML 的普遍性和复杂性，Groovy 包含了一个以自然方式使用 XML 的框架。下一节将演示使用标准 Java\
  \ 代码编写简单 XML 有多么复杂，然后向你展示如何以简单优雅的 Groovy 方式处理 XML。\n\n### 使用 Java 编写 XML\n\n在 Java\
  \ 中生成像清单 3-19 中那样的简单 XML 文档是困难、耗时且难以阅读和维护的。\n\n***清单 3-19.***  待办事项的简单 XML 输出\n\
  ``` <todos>\n  <todo id=\"1\">\n    <name>Buy Beginning Groovy Grails and Griffon</name>\n\
  \    <note>Purchase book from Amazon.com for all co-workers.</note>\n  </todo>\n\
  </todos>\n```\n\n清单 3-20 展示了生成清单 3-19 中 XML 所需的最少 Java 代码。\n\n***清单 3-20.***  生成清单\
  \ 3-19 中简单待办事项 XML 的 Java 代码\n``` import org.w3c.dom.Document;\nimport org.w3c.dom.Element;\n\
  import javax.xml.parsers.DocumentBuilder;\nimport javax.xml.parsers.\nDocumentBuilderFactory;\n\
  import javax.xml.parsers.ParserConfigurationException;\nimport javax.xml.transform.stream.StreamResult;\n\
  import javax.xml.transform.Transformer;\nimport javax.xml.transform.TransformerFactory;\n\
  import javax.xml.transform.OutputKeys;\nimport javax.xml.transform.Source;\nimport\
  \ javax.xml.transform.Result;\nimport javax.xml.transform.TransformerException;\n\
  import javax.xml.transform.dom.DOMSource;\n\n/**\n * Example of generating simple\
  \ XML in Java.\n */\npublic class GenerateXML {\n  public static void main (String[]\
  \ args)\n      throws ParserConfigurationException, TransformerException {\n   \
  \ DocumentBuilder builder =\n      DocumentBuilderFactory.newInstance().newDocumentBuilder();\n\
  \    Document doc = builder.newDocument();\n    Element todos = doc.createElement(\"\
  todos\");\n    doc.appendChild(todos);\n\n    Element task = doc.createElement(\"\
  todo\");\n    task.setAttribute(\"id\", \"1\");\n    todos.appendChild(task);\n\n\
  \    Element name = doc.createElement(\"name\");\n    name.setTextContent(\"Buy\
  \ Beginning Groovy Grails and Griffon\");\n    task.appendChild(name);\n    Element\
  \ note = doc.createElement(\"note\");\n    note.setTextContent(\"Purchase book from\
  \ Amazon.com for all co­workers.\");\n    task.appendChild(note);\n    // generate\
  \ pretty printed XML document\n    TransformerFactory tranFactory = TransformerFactory.newInstance();\n\
  \    Transformer transformer = tranFactory.newTransformer();\n    transformer.setOutputProperty(OutputKeys.INDENT,\
  \ \"yes\");\n    transformer.setOutputProperty(\n        \"{ http://xml.apache.org/xslt\
  \ }indent-amount\", \"2\");\n    Source src = new DOMSource(doc); Result dest =\
  \ new StreamResult(System.out);\n    transformer.transform(src, dest);\n  }\n}\n\
  ```\n\n请注意清单 3-20 的阅读难度有多大。它首先使用 *DocumentBuilderFactory* 创建一个新的 *DocumentBuilder*。然后，通过\
  \ *DocumentBuilder* 调用 *newDocument()* 工厂方法来创建一个新的 *Document*。元素使用 *DocumentBuilder*\
  \ 的工厂方法创建，通过添加属性或文本内容进行配置，最后附加到其父元素。注意，通过查看 Java 代码，很难跟踪 XML 文档的自然树形结构。部分原因是大多数元素需要三行代码来创建、配置并将其附加到父元素。\n\
  \n最后，将 XML 输出为人类可读的嵌套格式并不简单。与创建文档本身类似，它首先获取一个 *TransformerFactory* 实例，然后使用 *newTransformer()*\
  \ 工厂方法创建一个 Transformer。然后配置转换器输出属性以进行缩进，并设置缩进量。请注意，缩进量甚至不是标准的。它使用了 Apache Xalan\
  \ 特定的配置，这可能不完全可移植。最终，将源和结果传递给转换器，以将源 DOM 转换为 XML 输出。\n\n### Groovy 构建器\n\nGroovy\
  \ 通过使用构建器的概念简化了 XML 的生成，该概念基于“四人帮”的构建器设计模式。Groovy 构建器实现了 Groovy-Markup 的概念，这是 Groovy\
  \ 语言特性（如 MOP（本章后面讨论）、闭包和简化的映射语法）的组合，用于创建嵌套的树状结构。Groovy 包含五个主要的构建器实现，如表 3-2 所定义。它们都使用相同的格式和惯用法，因此了解一个构建器基本上意味着你将能够使用所有构建器。\n\
  \n表 3-2. Groovy 构建器\n| 名称 | 描述 |\n| --- | --- |\n| `AntBuilder` | 支持 Apache Ant\
  \ 任务的脚本编写和执行 |\n| `DOMBuilder` | 生成 W3C DOM |\n| `MarkupBuilder` | 生成 XML 和 HTML\
  \ |\n| `NodeBuilder` | 创建用于处理任意数据的嵌套对象树 |\n| `SwingBuilder` | 创建 Java Swing 用户界面（详见[第\
  \ 13 章](#9781430248064_Ch13.） |\n\n\n\nxhtml) ) | 通常，使用构建器时，首先需要创建一个构建器实例。然后，调用一个命名闭包来创建根节点，该节点可以代表一个\
  \ XML 根元素、一个 Swing 组件，或任何特定于构建器的节点。通过嵌套更多的命名闭包来添加节点。这种格式使得层次结构易于阅读。通过使用 Groovy 的映射语法将名称-值对传递给命名闭包来添加属性。在底层，MOP\
  \ 会解释传递给对象的消息，通常是为了确定要调用哪个方法。当它意识到没有该名称的方法时，就会创建相应的节点或属性。\n\n使用 Groovy MarkupBuilder\
  \ 编写 XML\n\n如表 3-2 所述，你可以使用 *MarkupBuilder* 来创建 XML 和 HTML。清单 3-21 展示了用于创建清单 3-19\
  \ 中所示 XML 的 Groovy 代码。\n\n***清单 3-21.***  用于生成清单 3-19 中简单 Todo XML 的 Groovy 代码\n\
  \n``` 1.  def writer = new StringWriter() 2.  def builder = new groovy.xml.MarkupBuilder(writer)\
  \ 3.  builder.setDoubleQuotes(true) 4.  builder.todos { 5.      todo (id:\"1\")\
  \ { 6.          name \"Buy Beginning Groovy Grails and Griffon\" 7.          note\
  \ \"Purchase book from Amazon.com for all co-workers.\" 8.      } 9.  } 10. 11\\\
  . println writer.toString() ```\n\n查看清单 3-21，你可以看到它比清单 3-20 中显示的等效 Java 代码更易于阅读。该示例首先创建了\
  \ *StringWriter*，以便最终在第 11 行将 XML 输出到系统控制台。然后使用 *StringWriter* 创建了 *MarkupBuilder*。默认情况下，*MarkupBuilder*\
  \ 对属性值使用单引号，因此第 3 行将引号改为双引号以符合 XML 规范。第 4-9 行使用命名闭包和映射语法实际构建了 XML 文档。你可以很容易地看到 *todos*\
  \ 包含一个 *todo*，其 *id* 属性为 1，并嵌套了 *name* 和 *note* 元素。\n\n使用 XmlSlurper 读取 XML\n\n\
  Groovy 使得读取 XML 文档与编写 XML 文档一样简单。Groovy 包含了 *XmlSlurper* 类，你可以用它来解析 XML 文档或字符串，并获取\
  \ *GPathResult* 的访问权限。有了 *GPathResult* 引用，你可以使用类似 XPath 的语法来访问文档中的不同元素。\n\n清单 3-22\
  \ 展示了如何使用 *XmlSlurper* 和 *GPath* 来查询一个 todos XML 文档。\n\n***清单 3-22.***  在 Groovy\
  \ 中读取 XML\n\n``` 1\\. def todos = new XmlSlurper().parse('c:/todos.xml') 2\\. assert\
  \ 3 == todos.todo.size() 3\\. assert \"Buy Beginning Groovy Grails and Griffon\"\
  \ == todos.todo[0].name.text() 4\\. assert \"1\" == todos.todo[0].@id.text() ```\n\
  \n清单 3-22 首先使用 *XmlSlurper* 解析一个包含三个 *todo* 项的 todos.xml 文件。第 2 行断言文档中有三个 *todos*。第\
  \ 3 行展示了如何访问元素的值，而第 4 行展示了如何使用 `@` 访问属性的值。\n\n原生 JSON 支持\n\n随着 JSON 成为数据交换格式的自然选择，Groovy\
  \ 增加了对 JSON 的原生支持。\n\n读取 JSON\n\n*JsonSlurper* 类允许你解析 JSON 负载，并访问表示该内容的嵌套 *Map*\
  \ 和 *List* 数据结构。我们在第 1 章中演示了用于读取 JSON 的 *JsonSlurper*。\n\nJsonBuilder\n\nGroovy\
  \ 引入了 *JsonBuilder* 来生成 JSON 内容，如清单 3-23 所示。\n\n***清单 3-23.***  在 Groovy 中读取 XML\n\
  \n``` 1.  import groovy.json.* 2.  def builder = new groovy.json.JsonBuilder() 3.\n\
  def root = builder.Book{ 4.   Groovy{ 5.    title 'Beginning Groovy, Grails and\
  \ Griffon' 6.    Authors(                     1: 'Vishal',                     2:\
  \ 'Chris',                     3: 'Joseph',                                    4:\
  \ 'James', 7.    ) 8.   } 9.  } 10\\. println builder.toString() ```\n\n输出为：\n\n\
  ``` {\"book\":{\"groovy\":{\"title\":\"Beginning Groovy, Grails and Griffon\", \"\
  authors\":{\"1\" :\"Vishal\",\"2\":\"Chris\",\"3\":\"Joseph\",\"4\":\"James\"}}}}\
  \ ```\n\n美化打印 JSON 内容\n\n如你所见，清单 3-23 的输出难以阅读。当给定一个 JSON 数据结构时，你可能希望对其进行美化打印，以便通过更友好的布局更容易地检查它。例如，如果你想美化打印上一个示例的结果，有两种方法可以解决。我们可以使用\
  \ *JsonBuilder* 或 *JsonOutput*。\n\n对于 *JsonBuilder*，我们只需将清单 3-23 中的第 16 行替换为：\n\n\
  ``` println builder.toPrettyString() ```\n\n对于 *JsonOutput*，将清单 3-23 中的第 16 行替换为以下行：\n\
  \n``` println JsonOutput.prettyPrint(builder.toString()) ```\n\n这两种方法都会给出相同的输出：\n\
  \n``` {             \"book\": {                       \"groovy\": {                               \"\
  title\": \"Beginning Groovy, Grails and Griffon\",                               \"\
  authors\": {                                         \"1\": \"Vishal\",                                         \"\
  2\": \"Chris\",                                         \"3\": \"Joseph\",                                         \"\
  4\": \"James\"                                }                      }           \
  \ } } ```\n\n使用模板生成文本\n\n许多 Web 应用程序会为电子邮件、报告、XML 甚至 HTML 生成文本。将这些文本嵌入代码中可能会使设计人员或业务人员难以维护或管理。更好的方法是将静态部分外部存储为模板文件，并在知道模板的动态部分时处理该模板。\n\
  \n如表 3-3 所示，Groovy 包含三个模板引擎，使生成文本更加容易。\n\n表 3-3 . Groovy 模板引擎\n\n| 名称 | 描述 |\n|\
  \ --- | --- |\n| `SimpleTemplateEngine` | 基本模板引擎，使用 Groovy 表达式以及 JavaServer Pages\
  \ (JSP) `<% %>` 脚本和 `<%= %>` 表达式语法 |\n| `GStringTemplateEngine` | 与 `SimpleTemplateEngine`\
  \ 基本相同，只是模板内部存储为可写闭包 |\n| `XmlTemplateEngine` | 通过使用内部 DOM 优化用于生成 XML |\n\n*SimpleTemplateEngine*\
  \ 通常适用于大多数模板场景。清单 3-24 展示了一个 HTML 电子邮件模板，我们将在第 11 章中用于在夜间批处理过程中发送电子邮件。\n\n***清单\
  \ 3-24.***  位于 nightlyReportsEmail.gtpl 中的 HTML 电子邮件模板\n\n``` <!DOCTYPE HTML PUBLIC\
  \ \"-//W3C//DTD HTML 4.01 Transitional//EN\"> <html> <head> <title>     Collab-Todo\
  \ Nightly Report for     ${String.format('%tA %<tB %<te %<tY', date)} </title> </head>\
  \  <body bgcolor=\"#FFFFFF\" style=\"margin:0;padding:0;\"> <div style=\"padding:\
  \ 22px 20px 40px 20px;background-color:#FFFFFF;\"> <table width=\"568\" border=\"\
  0\" cellspacing=\"0\" cellpadding=\"1\"         bgcolor=\"#FFFFFF\" align=\"center\"\
  > <tr> <td>           Dear ${user?.firstName} ${user?.lastName}, <p />           Please\
  \ find your attached nightly report for           ${String.format('%tA %<tB %<te\
  \ %<tY', date)}. </td> </tr> </table> <!-- 为简洁起见，省略了静态 HTML --> </div> </body> </html>\
  \ ```\n\n[清单 3-24](#9781430248064_Ch03.\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\nxhtml#list24) 主要是 HTML，其中加入了一些 Groovy 表达式来处理电子邮件的动态部分，例如格式化日期和用户名。该电子邮件生成的图像如\
  \ 图 3-1 所示。    ![9781430248064_Fig03-01.jpg](img/9781430248064_Fig03-01.jpg)   \
  \ 图 3-1 .  HTML 电子邮件    要处理模板，您需要创建一个模板引擎实例，并使用重载的 *createTemplate()* 方法，向其传递一个包含模板文本的\
  \ *File*、*Reader*、*URL* 或 *String* 来创建模板。现在，模板已加载并解析完毕，您可以调用 *make()* 方法，向其传递一个映射，该映射与模板中基于映射名称的变量进行绑定。代码清单\
  \ 3-25 展示了生成 图 3-1 中电子邮件的代码。    ***代码清单 3-25.***  电子邮件模板处理代码    ``` 1.  import groovy.text.SimpleTemplateEngine\
  \ 2. 3.  /** 4.  * Simple User Groovy Bean. 5.  */ 6.  class User { 7.   String\
  \ firstName; 8.   String lastName; 9.  } 10. 11\\. def emailTemplate = this.class.getResource(\"\
  nightlyReportsEmail.gtpl\") 12\\. def binding = [ 13.    \"user\": new User(firstName:\
  \ \"Christopher\", lastName: \"Judd\"), 14.    \"date\": new Date() 15\\. ] 16\\\
  . def engine = new SimpleTemplateEngine() 17\\. def email = engine.createTemplate(emailTemplate).make(binding)\
  \ 18\\. def body = email.toString() 19. 20\\. println body ```    代码清单 3-25 首先在第\
  \ 1 行导入了 *SimpleTemplateEngine*，以便在第 16 行使用它。第 6-9 行声明了一个简单的 *User* GroovyBean。模板从类路径下的\
  \ *nightlyReportsEmail.gtpl* 文件中加载（第 11 行）。它包含 代码清单 3-24 中的模板文本。第 12-15 行创建了包含传递的用户和日期数据的映射，这些数据将在模板处理时绑定到模板。第\
  \ 16 行创建的 *SimpleTemplateEngine* 在第 17 行用于创建和处理模板。\n\n运行时元编程\n\n通过元编程，您可以在运行时检查、拦截和更改程序的行为。通常，静态类型语言在编译期间会丢弃其类型信息，因此无法进行反射。一些静态语言（如\
  \ Java）能够更改程序的运行时行为；然而，这种能力通常是有限制的，以防止破坏或动摇类型系统的稳定性。构成运行时动态性的关键特性是内省（程序检查自身的能力）和中介（程序改变自身结构的能力）。像\
  \ Groovy 这样的动态语言通过元对象协议（MOP）提供这些能力。\n\n元对象协议\n\n元对象协议最初被定义为一种编程语言的接口，旨在赋予语言用户修改语言行为甚至其实现的能力。不久之后，编程语言或多或少都成为了抽象，您可以在其之上构建各种结构。元对象协议方法通过向用户开放语言以供其调节来区分开来，因此您可以微调语言的行为和实现。正式地说，MOP\
  \ 是一组规则，规定了 Groovy 运行时系统如何处理方法调用的请求。您在 Groovy 中编写的每个方法调用都会被重定向到 MOP。即使调用目标（方法调用的目标）是用\
  \ Groovy 或 Java 编译的，该方法调用仍然会被重定向到 MOP；例如，Groovy 编译器为方法调用生成字节码，该字节码会调用 MOP。MOP 的主要职责是查找和选择目标，并处理找不到目标的情况。\n\
  \n为了发现方法调用的调用目标，MOP 需要信息，这些信息存储在元类中。\n\n元类\n\n元类提供了反射和动态调用的手段。Groovy 从不直接在字节码中调用方法，而是始终通过对象的元类进行调用。在\
  \ Groovy 中，所有类，包括所有 Java 类，都有一个类型为 *groovy.lang.MetaClass* 的 *metaClass* 属性。当向对象分发消息时，元类不仅有助于确定应调用哪个行为，而且如果该类未实现请求的行为，元类还会规定相应的行为。如\
  \ 代码清单 3-26 所示，任何类的元类都可以通过访问其 *.metaClass* 属性来找到。\n\n***代码清单 3-26.***  访问元类\n```\
  \ 1\\. class Book { 2\\. String title 3\\. } 4\\. def groovyMetaclass = Book.metaClass\
  \ ```\n第 4 行说明了如何访问类 *Book* 的元类。\n\n所有 Groovy 对象都实现了 *groovy.lang.GroovyObject*\
  \ 接口，该接口为每个对象公开了一个 *getMetaClass()* 方法。每个 Groovy 对象都有一个关联的 *MetaClass*，可以通过调用 *GroovyObject*\
  \ 接口中的 *getMetaClass()* 来返回，如 代码清单 3-27 所示。\n\n***代码清单 3-27.***  GroovyObject 接口\n\
  ``` public interface GroovyObject {\n  Object invokeMethod(String name, Object args);\n\
  \  Object getProperty(String propertyName);\n  void setProperty(String propertyName,\
  \ Object newValue);\n  MetaClass getMetaClass();\n  void setMetaClass(MetaClass\
  \ metaClass);\n} ```\n*invokeMethod()*、*getProperty()* 和 *setProperty()* 使 Groovy\
  \ 对象具有动态性。您可以使用它们来处理动态创建的方法和属性。\n\n使用 invokeMethod() 和 get/setProperty()\n\nGroovy\
  \ 支持通过 *invokeMethod()* 和 *get/setProperty()* 拦截方法和属性访问的能力。\n\n重写 invokeMethod\n\
  \n在任何 Groovy 类中，您都可以重写 *invokeMethod()*，这本质上会拦截方法调用。当您在 Groovy 对象上调用方法时，方法调用会被分派到该对象的\
  \ *invokeMethod()*，如 代码清单 3-28 所示。\n\n***代码清单 3-28.***  重写 invokeMethod\n``` 1.  class\
  \ Item{\n 2.   int itemNumber\n 3.   String itemName\n 4.   int qty\n 5.   Object\
  \ invokeMethod(String name, Object args) {\n 6.    if (name == \"test\"){\n 7.    \
  \ this.properties.each {\n 8.      println \" \" + it.key + \": \" + it.value\n\
  \ 9.     }\n 10.   }\n 11.  }\n 12\\. }\n 13\\. def item1 = new Item(itemNumber:\
  \ 1, itemName:\"Item 1\", qty:100)\n 14\\. def item2= new Item(itemNumber:2, itemName:\"\
  Item 2\", qty:200)\n 15\\. def itemList = [ item1, item2]\n 16\\. itemList.each\
  \ { it.test()} ```\n*   在第 16 行，调用了 *test()* 方法，该方法并不存在。\n*   在第 5 行，添加到 *Item*\
  \ 类中的 *invokeMethod()* 允许拦截方法调用，并响应 *test()* 的调用，即使该方法不存在。\n\n以下是 代码清单 3-28 的输出：\n\
  \n``` class: class Item\nitemName: Item 1\nqty: 100\nitemNumber: 1\nclass: class\
  \ Item\nitemName: Item 2\nqty: 200\nitemNumber: 2 ```\n\n重写 getProperty 和 setProperty\n\
  \n您还可以使用 代码清单 3-29 中所示的 *GroovyObject* 接口的 *getProperty* 和 *setProperty* 来重写属性访问。\n\
  \n***代码清单 3-29.***  重写 getProperty/setProperty\n``` 1\\. class Expandable {\n 2.  def\
  \ storage = [:]\n 3.  def getProperty(String name) { storage[name] }\n 4.  void\
  \ setProperty(String name, value) { storage[name] = value }\n 5\\. }\n 6\\. def\
  \ e = new Expandable()\n 7\\. e.foo = \"bar\"\n 8\\. println e.foo ```\n\n使用 methodMissing()\n\
  \n*methodMissing()* 仅在方法分派失败时被调用。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n清单 3-30 演示了 `methodMissing()` 的用法。    ***清单 3-30.***  使用 methodMissing    ```\
  \ 1\\. class Missing{ 2.  def methodMissing(String name, args) { 3.   \"$name method\
  \ does not exist\" 4.  } 5\\. } 6\\. Missing m = new Missing() 7\\. assert m.test()\
  \ == \"test method does not exist\" ```    当你在一个 POGO（普通的 Groovy 对象）上调用方法时：\n\n\
  1.  Groovy 会在 POGO 的元类中查找该方法。\n2.  如果在元类中未找到该方法，Groovy 会在 POGO 自身中查找。\n3.  如果在 POGO\
  \ 中也未找到该方法，Groovy 会检查该 POGO 是否拥有 `methodMissing()`；如果存在，则调用它。\n4.  如果 `methodMissing()`\
  \ 不存在，Groovy 会检查该 POGO 是否实现了 `invokeMethod()`。如果实现了，则调用它。\n5.  如果 POGO 没有实现 `invokeMethod()`，则会调用\
  \ `invokeMethod()` 的默认实现，该实现会抛出一个 `MissingMethodException`。\n\nExpandos\n\nExpando\
  \ 类位于 `groovy.util` 包中，是一个可动态扩展的 bean，这意味着你可以在运行时向其添加属性或闭包。在某些情况下，我们需要一个对象来持有临时行为。在这种情况下，与其仅仅为了这些行为创建一个类，不如使用\
  \ expandos，这样我们就可以在运行时动态创建对象，如清单 3-31 所示。\n\n***清单 3-31.***  使用 Expando\n\n``` 1\\\
  . def multiplier = new Expando() 2\\. multiplier.value = 5 3\\. multiplier.doubleIt\
  \ = { −>  multiplier.value = multiplier.value* 2} 4\\. multiplier.doubleIt() 5\\\
  . assert multiplier.value == 10 ```\n\n*   第 1 行：我们创建了一个 expando。\n*   第 2 行：将状态\
  \ '5' 赋值给尚不存在的属性 `value`。\n*   第 3 行：将新行为作为一个闭包赋值给尚不存在的属性 `doubleIt`。赋值后，它可以像方法一样被调用。\n\
  *   第 7 行：断言新状态 '10' 被赋值给了尚不存在的属性 `value`。\n\nExpandos 与 Groovy 的鸭子类型结合使用时，也是在单元测试中实现模拟对象的好方法。\n\
  \n![image](img/sq.jpg) **注意**  鸭子类型指的是这样一个概念：如果它走路像鸭子，叫声像鸭子，那它就是鸭子。用 Groovy 的话来说，如果一个对象拥有与另一个对象相似的属性和方法，那么这两个对象必定是同一类型。\n\
  \n在此解释 Expando 类的原因是，Groovy 中有一个 expando 元类，它是一个像 expando 一样工作的元类。你可以通过简单地将一个闭包赋值给元类的一个属性，来向元类中添加新的状态（属性）和新的行为（方法）。\n\
  \nExpandoMetaClass\n\nGroovy 有一个特殊的元类，称为 `ExpandoMetaClass`，它允许你通过将一个闭包赋值给元类的一个属性，在运行时添加方法、构造函数和属性。每个\
  \ `java.lang.Class` 都提供了一个特殊的 `metaClass` 属性，使用该属性时，你会得到一个指向 `ExpandoMetaClass`\
  \ 实例的引用。\n\n**从其他类借用方法**\n\n使用 `ExpandoMetaClass`，你还可以利用 Groovy 的方法指针语法从其他类借用方法，如清单\
  \ 3-32 所示。\n\n***清单 3-32.***  从其他类借用方法\n\n``` 1.  class Author{ 2.   String name\
  \ 3.  } 4.  class Greet{ 5.   def sayHello() { 6.    \"hello vishal\" 7.   } 8.  }\
  \ 9.  def hello = new Greet() 10\\. Author.metaClass.greet = hello.&sayHello 11\\\
  . def author = new Author() 12\\. assert author.greet() == \"hello vishal\" ```\n\
  \n*   在第 1 行，类 `Author` 没有任何方法，而类 `Greet` 有一个方法 `sayHello()`。\n*   第 10 行使用了我们在第\
  \ 2 章中介绍的方法闭包操作符，通过 `ExpandoMetaclass` 将 `sayHello()` 方法赋值给 `Author`。\n*   在第 12\
  \ 行，我们在 `Author` 类上调用了 `Greet()` 方法。这个 `Greet()` 方法在 `Author` 类中并不存在，它是从 `Greet`\
  \ 类中借用的，从而动态创建了方法名。\n\n由于 Groovy 允许你将字符串用作属性名，这反过来又允许你在运行时动态创建方法和属性名。\n\n要创建一个具有动态名称的方法，只需使用\
  \ Groovy 将属性名作为字符串引用的特性，如清单 3-33 所示。\n\n***清单 3-33.***  动态创建方法名\n\n``` 1.  class\
  \ Test{ 2.   String name = \"foo\" 3.  } 4.  def newName = \"bar\" 5.  Test.metaClass.\"\
  changeNameTo${newName}\" = {−> delegate.name = \"bar\" } 6.  def m = new Test()\
  \ 7.  assert  m.name == \"foo\" 8.  m.changeNameTobar() 9.  assert m.name == \"\
  bar\" ```\n\n*   在第 5 行，我们使用字符串插值来生成方法名，当调用该方法时，它会将测试类中的名称从“foo”改为“bar”。\n*   请注意，在闭包的作用域内，`delegate`\
  \ 变量等同于标准方法中的 `this`。\n*   在第 8 行，我们使用了 `changeNameTobar()` 方法，该方法将在运行时生成。\n*  \
  \ 在第 9 行，我们断言了 name 的新值，表明动态生成的方法按预期更改了名称。\n\n**添加构造函数**\n\n添加构造函数与使用 `ExpandoMetaClass`\
  \ 添加方法略有不同。本质上，你需要使用一个特殊的 `constructor` 属性，并使用 `<<` 或 `=` 操作符来赋值一个闭包，如清单 3-34 的第\
  \ 4 行所示。\n\n***清单 3-34.***  添加构造函数\n\n``` 1.  class Book { 2.  String title 3.  }\
  \ 4.  Book.metaClass.constructor << { String title -> new Book(title:title) } 5.  def\
  \ b = new Book(\"Beginning Groovy, Grails and Griffon\") 6.  assert \"Beginning\
  \ Groovy, Grails and Griffon\" == b.title ```\n\n**添加属性**\n\n在清单 3-35 中，类 Book 只有一个属性：title。我们将动态地向\
  \ Book 类添加 author 属性。\n\n***清单 3-35.***  添加属性\n\n``` 1.  class Book { 2.   String\
  \ title 3.  } 4.  Book.metaClass.constructor << { String title -> new Book(title:title)\
  \ } 5.  Book.metaClass.getAuthor << {−> \"Vishal Layka\" } 6.  def b = new Book(\"\
  Beginning Groovy, Grails and Griffon\") 7.  assert \"Beginning Groovy, Grails and\
  \ Griffon\"== b.title 8.  assert \"Vishal Layka\" == b.author ```\n\n*   第 4 行添加了一个构造函数，该函数将初始化\
  \ `Book` 类中的属性 `title`。\n*   第 5 行添加了属性 `author`，并将其值赋为“Vishal Layka”。\n*   第 7\
  \ 行断言现有属性 `title` 为“Beginning Groovy, Grails and Griffon”。\n*   第 8 行断言不存在的属性 `author`\
  \ 为“Vishal Layka”。\n\n**在接口上添加方法**\n\n可以使用 `ExpandoMetaClass` 在接口上添加方法。但是，你必须在应用程序启动之前，使用\
  \ `ExpandoMetaClass.enableGlobally()` 方法全局启用此功能。\n\n清单 3-36 演示了向 `java.util.List`\
  \ 的所有实现者添加一个新方法：\n\n***清单 3-36.***  在接口上添加方法\n\n``` 1.  List.metaClass.sizeDoubled\
  \ = {−> delegate.size() * 2 } 2.  def list = [] 3.  list << 1 4.  list << 2 5.  assert\
  \ 4 == list.sizeDoubled() ```\n\n*   在第 1 行，我们添加了一个新方法 `sizeDoubled()`，我们使用 `=`\
  \ 操作符将其替换为列表的 `size()` 方法乘以 2。\n*   在第 3-4 行，我们向列表追加了两个元素，因此列表的大小为 2。\n*   在第 5\
  \ 行，我们断言 `sizeDoubled()` 返回 4。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n**添加或覆盖实例方法**    使用 *ExpandoMetaClass* 添加或覆盖实例方法非常简单，如清单 3-37 所示。    ***清单 3-37.***  添加实例方法\
  \    ``` 1.  class Book { 2.   String title 3.  } 4.  Book.metaClass.titleInUpperCase\
  \ << {−> title.toUpperCase() } 5.  def b = new Book(title:\"Beginning Groovy, Grails\
  \ and Griffon\") 6.  assert \"BEGINNING GROOVY, GRAILS AND GRIFFON\" == b.titleInUpperCase()\
  \ ```    *   在第 4 行，左移 *<<* 运算符用于“追加”新方法。如果该方法已存在，则会抛出异常。如果你想替换一个实例方法，可以使用 *=* 运算符：\
  \                    ```     Book.metaClass.toString = {−> title.toUpperCase() }\
  \     ```           *   在第 6 行，我们通过调用新添加的 *titleInUpperCase()* 方法进行断言，该方法对 *String*\
  \ 类型的 title 进行操作，并返回第 4 行中为其赋值的 *toUpperCase()* 的结果。    **添加或覆盖静态方法**    如清单 3-38\
  \ 所示，你也可以使用与实例方法相同的技术来添加静态方法，只需在方法名前加上 *static* 限定符即可：    ***清单 3-38.***  添加一个静态方法\
  \    ``` 1.  class Book { 2.   String title 3.  } 4.  Book.metaClass.static.create\
  \ << { String title -> new Book(title:title) } 5.  def b = Book.create(\"Beginning\
  \ Groovy, Grails and Griffon\") 6.  assert \"Beginning Groovy, Grails and Griffon\"\
  \ == b.title ```    *   在第 5 行，我们在 *create* 方法前添加了一个静态限定符。此方法创建一个标题为“Beginning Groovy,\
  \ Grails and Griffon”的新图书对象。    Categories    Categories 用于动态地向现有类添加方法。通过使用 *use*\
  \ 关键字，可以在运行时将 category 添加到任何类。要为某个类创建 category，我们需要定义一个包含静态方法的类，这些静态方法将我们想要扩展的类的实例作为其第一个参数。通过使用\
  \ *use* 关键字（表示一个 *use* 方法，Groovy 将其添加到 *java.lang.Object* 中），可以将 category 应用于任何闭包。这个\
  \ *use* 方法接受两个参数：一个 category 类和一个闭包。清单 3-39 展示了如何向字符串类添加方法。    ***清单 3-39.***  使用\
  \ Categories    ``` 1.  class StringExtended { 2.   static String firstUpper(String\
  \ self) { 3.    return self[0].toUpperCase() + self[1..self.length() - 1] 4.   }\
  \ 5.  } 6.  use (StringExtended){ 7.   assert \"aaaa\".firstUpper() == \"Aaaa\"\
  \ 8.  } ```    *   在清单 3-39 中，category 方法是第 2 行的静态方法 *firstUpper()*，它接受一个我们想要扩展的类的实例作为其参数。按照惯例，此参数被命名为\
  \ *self*。因此，在这种情况下，我们正在扩展 *String* 类（它是 final 类，但我们是元编程者！）。 *   在第 6 行，我们将 category\
  \ 类和一个闭包传递给 *use()* 方法。 *   在第 7 行，我们在字符串上调用 category 方法。    运行时混入    在 Java 和 Groovy\
  \ 中：    *   一个类只能继承一个其他类，尽管它可以实现多个接口。 *   一个类不能继承自 final 类。    混入可以解决这两个问题。混入旨在共享特性，同时不修改接收者的任何现有行为。特性可以相互构建，并与接收者合并和融合。清单\
  \ 3-40 中的示例可以最好地说明这一点。    ***清单 3-40.***  使用运行时混入    ``` 1.  class A{ 2.   String\
  \ genericfeatureNeededByClassB(){} 3.  } 4.  class B extends A{ 5.   String getName()\
  \ { \"class B which already extends class A\" } 6.  } 7.  final class C{ 8. static\
  \ test(A self) { \"I'm the final class C  and reused by ${self.name} !\" } 9.  }\
  \ 10\\. B.mixin C 11\\. println new B().test() ```    请注意以下几点：    *   第 1–3 行：展示了类\
  \ *A*，它拥有方法 *genericfeatureNeededByClassB()*。 *   第 5–7 行：展示了类 *B*，它需要扩展类 *A*，因此现在它不能再扩展任何其他类。\
  \ *   第 9–11 行：展示了一个 final 类 *C*。因此，继承自此类是不可能的。此类有一个 *test()* 方法。 *   第 10 行：展示了用于合并类的混入语法。\
  \ *   第 11 行：展示了 final 类 *C* 的 *test()* 方法在类 *B* 中可用。    至此，我们完成了 Groovy 运行时编程的旅程。既然你已经掌握了动态编程的概念，让我们回到过去——不用太远，只需回到前一节，这样我们就可以应用我们新获得的知识。我们将重新审视清单\
  \ 3-25 中的代码，并使其动态化。为方便参考，此处重复了清单 3-25。    ***清单 3-25.***  电子邮件模板处理代码    ``` 1.  import\
  \ groovy.text.SimpleTemplateEngine 2. 3.  /** 4.  * Simple User Groovy Bean. 5.  */\
  \ 6.  class User { 7.   String firstName; 8.   String lastName; 9.  } 10. 11\\.\
  \ def emailTemplate = this.class.getResource(“nightlyReportsEmail.gtpl”) 12\\. def\
  \ binding = [ 13.    “user”: new User(firstName: “Christopher”, lastName: “Judd”),\
  \ 14.    \"date\": new Date() 15\\. ] 16\\. def engine = new SimpleTemplateEngine()\
  \ 17\\. def email = engine.createTemplate(emailTemplate).make(binding) 18\\. def\
  \ body = email.toString() 19. 20\\. println body ```    我们将要动态化的代码以粗体显示。简单的 *user*\
  \ GroovyBean（第 6–9 行）仅用于将数据传递给模板引擎；它没有提供其他价值，因此它是 expando 对象的绝佳候选。    清单 3-41 展示了使用\
  \ expandos 而非具体类来创建清单 3-25 中的 *user* GroovyBean 的代码。    ***清单 3-41.***  User GroovyBean\
  \ 的替代方案    ``` 1.  def user = new Expando() 2. 3.  user.firstName = 'Christopher'\
  \ 4.  user.lastName = 'Judd' 5. 6.  user.greeting = { greeting -> 7.    \"${greeting}\
  \ ${firstName} ${lastName}\" 8.  } 9. 10\\. assert user.greeting(\"Hello\") == 'Hello\
  \ Christopher Judd' ```    清单 3-41 使用 expando 作为具体 GroovyBean 类的替代品。在第 1 行，创建了一个新的\
  \ expando 实例。在第 3 行和第 4 行，*firstName* 和 *lastName* 属性被动态添加到对象并赋值。属性不是唯一可以添加的东西。你还可以使用闭包添加行为。第\
  \ 6–8 行创建了一个闭包并将其赋值给 greeting，该闭包将 greeting 参数与 firstName 和 lastName 属性连接起来。最后，第\
  \ 10 行执行了 greeting。    你也可以使用接受映射的重载构造函数，用属性来初始化 expandos。清单 3-42 使用此技术重新实现了清单 3-25\
  \ 中第 13 行的模板示例。    ***清单 3-42.***  使用 Expandos 替代 User GroovyBean 的模板示例    ``` import\
  \ groovy.text.SimpleTemplateEngine def emailTemplate = this.class.getResource(\"\
  nightlyReportsEmail.gtpl\") def binding = [   \"user\": new Expando([ firstName:\
  \ 'Christopher', lastName:'Judd']),         \"date\": new Date() ] def engine =\
  \ new SimpleTemplateEngine() def template = engine.createTemplate(emailTemplate).make(binding)\
  \ def body = template.toString() println body ```    请注意，[清单 3-42](#9781430248064_Ch03.\n\
  \n\n\nxhtml#list42) 通过使用包含 *firstName* 和 *lastName* 属性的 expando 替换 *User* 类定义，减少了代码量并提高了先前模板示例的可读性。现在我们来重构清单\
  \ 3-25 的第 11 行，这行代码看起来更像 Java 而非 Groovy，因此我们将对其进行 Groovy 化改造。    ``` def emailTemplate\
  \ = this.class.getResource(\"nightlyReportsEmail.gtpl\") ```    清单 3-43 展示了 MOP\
  \ 如何通过向 *java.lang.Class* 添加 *getResourceAsText()* 方法（该方法实际加载文件并将文件内容作为文本获取，而不仅仅是获取文件的\
  \ URL），使代码更具 Groovy 风格。    ***清单 3-43.***  向 java.lang.Class 添加 getResourceAsText()\
  \ 方法    ``` 1.  import groovy.text.SimpleTemplateEngine 2. 3.  Class.metaClass.getResourceAsText\
  \ = { resource -> 4.    this.class.getResourceAsStream(resource).getText() 5.  }\
  \ 6. 7.  def emailTemplate = this.class.getResourceAsText('nightlyReportsEmail.gtpl')\
  \ 8.  def binding = [ 9.          \"user\": new Expando([ firstName: 'Christopher',\
  \ lastName:'Judd']), 10.         \"date\": new Date()] 11\\. def engine = new SimpleTemplateEngine()\
  \ 12\\. def template = engine.createTemplate(emailTemplate).make(binding) 13\\.\
  \ def body = template.toString() 14. 15\\. println body ```    请注意第 7 行如何更明确地表达它正在将模板作为文本加载，而不是作为\
  \ URL。这是通过访问 *metaClass* 属性并向最终的 *java.lang.Class*（第 3–5 行）添加一个接受参数 resource（即类路径上的文件名）的\
  \ *getResourceAsText()* 方法来实现的。第 4 行中该方法的实现使用了 *getResourceAsStream()* 技术将文件作为流加载。这通常比使用\
  \ URL 更安全，因为并非所有内容都能通过 URL 轻松寻址。然后，闭包通过使用 *getText()* 方法完成操作，Groovy 通过 MOP 在 Groovy\
  \ JDK 中为所有 *java.io.InputStreams* 包含了该方法。最后，第 7 行展示了在 *java.lang.Class* 上调用 *getResourceAsText()*\
  \ 方法的样子。还有其他方法可以实现同样的效果，并使清单 3-25 更具表现力。清单 3-44 展示了通过向 *java.lang.String*（也是一个被标记为\
  \ final 的类）添加行为来实现相同功能的另一种实现。    ***清单 3-44.***  向 java.lang.String 添加 fileAsString()\
  \ 方法    ``` 1\\. String.metaClass.fileAsString = { 2.   this.class.getResourceAsStream(delegate).getText()\
  \ 3\\. } 4. 5\\. println 'nightlyReportsEmail.gtpl'.fileAsString() ```    清单 3-44\
  \ 首先向 *java.lang.String* 类的 *metaClass* 属性添加了 *fileAsString()* 方法，这与前面的示例类似。然而，它使用了\
  \ delegate 变量而不是传入的参数。delegate 是对调用该方法的对象实例的引用，在本例中，它将是包含要加载的文件名的字符串。请注意第 5 行读起来多么自然。它几乎就像在阅读一个英文句子。这并非巧合，正如我们将在领域特定语言部分中发现的那样，但在此之前，我们将探讨元编程的另一种形式。\
  \    \n\n编译时元编程    \n编译时元编程为编程语言的用户提供了一种与编译器交互的机制，允许构建任意的程序片段；例如，向语言添加新功能或应用特定于应用程序的优化。许多新的\
  \ Groovy 特性都使用编译时元编程来消除冗余或冗长的代码。    \n\n编译时元编程可能非常有用，但不如运行时元编程灵活，并且只有在必须使用时才应使用；也就是说，只有在无法为当前问题找到运行时解决方案时才使用。\
  \    \n\nAST 转换    \nAST 代表抽象语法树：代码作为数据的一种表示。当 Groovy 编译器编译 Groovy 脚本和类时，Groovy\
  \ 解析器（编译器的前端）在生成类的最终字节码之前会创建一个 AST。AST 是源代码的内存中表示，包含类、方法、属性、语句和变量。AST 转换是在生成最终字节码之前向源代码中添加新代码（方法和检查）的能力。Groovy\
  \ 附带了许多用于 AST 转换的注解，您可以随时使用它们来避免代码重复。    \n\nAST 转换的目标是让开发人员能够结构化代码，同时更专注于业务代码，而不是样板代码或横切关注点。Groovy\
  \ 提供了几种实现 AST 转换的方法：使用 Groovy 附带的注解进行 AST 转换、局部 AST 转换和全局 AST 转换。    \n\n内置 AST\
  \ 转换    \n要使用 Groovy 的内置 AST 转换功能，您只需使用 Groovy 提供的注解来注解一个类或方法。在使用这些注解之前，您无需了解任何关于编译器或\
  \ Groovy 内部机制的知识，我们将在本节中描述这些注解。我们将介绍 Groovy 提供的最流行的 AST 转换注解。使用所有 Groovy 内置的 AST\
  \ 转换以及编写您自己的自定义转换是一个广泛的主题，值得单独写一本书。关于所有内置转换的详细说明可以在 Groovy 网站（`http://groovy.codehaus.org/Compile-time+Metaprogramming+−+AST+Transformations`）上找到。\
  \    \n\n委托转换    \n委托是两个类之间的关系；例如，一个类将包含对另一个类的引用。清单 3-45 展示了 *@Delegate* 的简单用法，它包装了一个现有的类，将所有调用委托给委托对象：\
  \    \n\n***清单 3-45.***  使用 @Delegate    \n``` 1.  class Author{ 2.   String authorName\
  \ 3.  } 4.  class Book { 5.   @Delegate Author author 6.   String title 7.  } 8.  def\
  \ author= new Author(authorName: \"vishal\") 9.  def book= new Book(title: \"Beginning\
  \ Groovy,Grails and Griffon\", author: author) 10\\. assert book.title == \"Beginning\
  \ Groovy,Grails and Griffon\" 11\\. assert book.authorName == \"vishal\" ```   \
  \ \n*   第 5 行：*@Delegate* 注解形成了一种“拥有”关系。类 *Book* 拥有对类 *Author* 的引用。    \n*   第 8–9\
  \ 行：*Author* 被初始化并传递给 *book*。    \n*   第 11 行：由于 *@Delegate* 注解，字段 *authorName*\
  \ 可以从 *book* 对象访问。    \n\n不可变转换    \n不可变对象是那些在初始创建后不会改变的对象。不可变性意味着以下几点：    \n* \
  \  类必须是 final 的。    \n*   字段必须是 private 和 final 的。    \n*   *equals()、hashCode()*\
  \ 和 *toString()* 必须根据字段实现，以便能够比较对象或将它们用作映射中的键。    \n\n不可变转换允许您以简写形式编写类，如清单 3-46\
  \ 所示。    \n\n***清单 3-46.***  向 java.lang.Class 添加 getResourceAsText() 方法    \n```\
  \ 1.  @groovy.transform.Immutable class Book{ 2.   String title 3.   Collection\
  \ authors 4.  } 5.  def book1 = new Book(title:'Beginning Groovy, Grails and Griffon',\
  \ authors:['Vishal', 'Chris', 'James', 'Joseph']) 6.  def book2 = new Book('Beginning\
  \ Groovy, Grails and Griffon', ['Vishal', 'Chris', 'James', 'Joseph']) 7.\n\n\n\n\
  assert book1 == book2 ```    *@Immutable* 注解指示编译器执行 AST 转换，该转换会添加必要的 getter、构造器、*equals()、hashCode()*\
  \ 以及其他辅助方法，这些方法通常是在使用已定义的属性创建不可变类时需要编写的。    惰性转换    有时，你希望惰性地处理类中某个字段的初始化，以便仅在首次使用时才计算其值，这通常是因为创建该值耗时或占用大量内存。在\
  \ Groovy 中，你现在可以使用 *@Lazy* 注解来实现此目的：    如果你运行清单 3-47 中的代码，将会得到一个如图所示的异常。    ***清单\
  \ 3-47.***  使用 @Lazy    ``` 1.  class Groovy { 2.   @Lazy authors= ['Vishal', 'Christopher',\
  \ 'Joseph', 'James'] 3.  } 4.  def g = new Groovy() 5.  assert  g.dump().contains('Vishal')\
  \ Caught: Assertion failed: assert g.dump<>.contains<'Vishal'>        ¦ ¦      ¦\
  \        ¦ ¦      false        ¦ <Groovy@8ee016   $authors=null>        Groovy@8ee016\
  \ Assertion failed: assert g.dump<>.contains<'Vishal'>        ¦ ¦      ¦       \
  \ ¦ ¦      false        ¦ <Groovy@8ee016   $authors=null>        Groovy@8ee016 ```\
  \    强大的断言通知我们，authors 列表是 *null*，即使第 2 行中的 authors 列表不为 null。    这是因为 *@Lazy* 注解导致的。*@Lazy*\
  \ 字段注解会将字段实例化延迟到该字段首次使用时。在第 5 行中，由于 *@lazy* 注解，*authors* 未被初始化，这在清单 3-48 中得到了修正。\
  \    ***清单 3-48.***  使用 @Lazy 注解    ``` 1.  class Groovy { 2.   @Lazy authors= ['Vishal',\
  \ 'Christopher', 'Joseph', 'James'] 3.  } 4.  def g = new Groovy() 5.  assert  g.authors.size()\
  \ == 4 6.  assert  g.dump().contains('Vishal') ```    日志转换    对于日志记录，Groovy 包含了\
  \ *@Log、@Log4j、@Slf4j* 和 *@Commons*。清单 3-49 演示了如何使用 *@Log* 注解。    ***清单 3-49.***  使用\
  \ @Log    ``` 1\\. @groovy.util.logging.Log 2\\. class Test { 3\\. def someMethod()\
  \ { 4\\. log.fine(complexMethod()) 5\\. } 6\\. } 7\\. new Test().someMethod () ```\
  \    *   第 1 行：*@Log* 注解首先根据类名创建一个日志记录器。*   第 4 行：在尝试执行 *complexMethod()* 之前，日志方法会被包裹在一个条件检查中，以判断\
  \ *FINE* 级别是否已启用。    其结果等同于将日志调用包裹在以下条件中：    ``` if (logger.isEnabled(LogLevel.FINE))\
  \ ```    Newify 转换    *@Newify* 转换提供了两种实例化类的新方法。    清单 3-50 展示了一种类似 Ruby 的方法，通过\
  \ *new()* 类方法来创建实例：    ***清单 3-50.***  使用 @Newify 实现类似 Ruby 的实例创建方法    ``` @Newify\
  \ rubyLikeNew() {  assert Integer.new(42) == 42 }  rubyLikeNew() ```    ***清单 3-51.***  创建一棵树\
  \    ``` class Tree {     def elements     Tree(Object... elements) { this.elements\
  \ = elements as List } }  class Leaf {     def value     Leaf(value) { this.value\
  \ = value } }  def buildTree() {     new Tree(new Tree(new Leaf(1), new Leaf(2)),\
  \ new Leaf(3)) }  buildTree() ```    清单 3-51 中树的创建可读性不强，因为整行代码散布着许多 *new* 关键字。在这种情况下，Ruby\
  \ 方法也不会更具可读性，因为需要调用 *new()* 方法来创建每个元素。但是，通过使用 *@Newify*，我们可以采用“Python 方式”，完全省略 *new*\
  \ 关键字，从而略微提高树构建的视觉清晰度。清单 3-52 演示了一种类似 Python 的实例创建方法。    ***清单 3-52.***  使用 @Newify\
  \ 实现类似 Python 的实例创建方法    ``` @Newify([Tree, Leaf]) buildTree() {     Tree(Tree(Leaf(1),\
  \ Leaf(2)), Leaf(3)) } ```    单例转换    我们习惯于为 *static* 字段创建私有构造器、*getInstance()*\
  \ 方法，甚至是已初始化的 *public static final* 字段。单例模式需要一个私有构造器和一个公共的 *static* 方法来访问该唯一实例。\
  \    因此，无需编写如清单 3-53 所示的 Java 代码，你只需使用 *@Singleton* 注解来标注你的类型，如清单 3-54 所示：    ***清单\
  \ 3-53.***  一个单例类    ``` public class T {     public static final T instance = new\
  \ T();     private T() {} } ```    ***清单 3-54.***  使用 @Singleton    ``` @Singleton\
  \ class T {} ```    然后，可以简单地通过 *T.instance*（直接公共字段访问）来访问单例实例。    你还可以使用惰性加载方法，如清单\
  \ 3-55 所示，并带有一个额外的注解参数：    ***清单 3-55.***  使用带惰性加载的 @Singleton    ``` @Singleton(lazy\
  \ = true) class T {} ```    清单 3-55 中的代码或多或少等同于在清单 3-56 中创建的 Groovy 类：    ***清单\
  \ 3-56.***  @Singleton 的 Groovy 类表示    ``` class T {     private static volatile\
  \ T instance     private T() {}     static T getInstance () {         if (instance)\
  \ {             instance         } else {             synchronized(T) {                 if\
  \ (instance) {                     instance                 } else {                     instance\
  \ = new T ()                 }             }         }     } } ```    领域特定语言   \
  \ *通用*与*特定*的二分法在编程领域得以体现。领域特定语言（DSL）正是这种二分法表现形式之一。领域特定语言正如其名：特定于领域。    所有编程语言在诞生之初都是领域特定语言，但随着它们的发展，情况会发生变化。领域特定语言是为了解决特定领域（或更准确地说，特定领域）的问题而创建的，但随着它们逐渐演变为解决多个领域的问题，区分它们为特定语言的界限变得模糊。因此，这样的语言便从特定性跨越到了通用性。\
  \    DSL 专注于领域或问题，可以是外部类型或内部类型。    外部 DSL 定义了一种具有自定义语法和解析器的新语言。内部 DSL 也定义了一种新语言，但是在另一种语言的语法边界之内。内部\
  \ DSL 不需要自定义解析器。相反，它们就像用该语言编写的任何其他代码一样被解析。    使用 XML 的 Ant 是外部 DSL 的一个例子。另一方面，Gant\
  \ 使用 Groovy 来解决相同的问题，是内部 DSL 的一个例子。Groovy 凭借其元编程能力和灵活的语法，更适合设计和实现内部 DSL。    举例来说，使用\
  \ Groovy 的可选参数和 MOP，你可以将这段只有程序员才会喜欢的代码：    ``` println this.class.getResourceAsStream('readme.txt').getText()\
  \ 转换为： write 'readme.txt'.contents() ```    请注意，使用第二种方式，即使是非程序员也有机会理解代码的意图。    清单\
  \ 3-57 展示了如何实现这个用于写入文件的简单 DSL。\n\n\n\n***列表 3-57.***  简单 DSL 的实现  \n```  \n1.  String.metaClass.contents\
  \ = {  \n2.    this.class.getResourceAsStream(delegate).getText()  \n3.  }  \n4.\
  \  \n5.  def write = { file ->  \n6.    println file  \n7.  }  \n8.  \n9.  write\
  \ 'readme.txt'.contents()  \n```  \n第 1–3 行使用了上一节中相同的元编程实现，为 String 类添加了一个 contents\
  \ 闭包。该 contents 闭包根据字符串的值，从类路径中加载一个文件并将其作为文本返回。第 5–7 行实现了一个名为 write 的闭包，它仅对传入的参数执行\
  \ *println* 操作。最终，当 write 调用省略可选括号时，第 9 行的代码读起来就像一句完整的句子。  \n\n总结  \n结合前几章中关于 Groovy\
  \ 的主题，本章中介绍的 Groovy 高级主题——如单元测试、XML 处理、模板、Expando 和元编程——已为你使用基于 Groovy 的 Grails\
  \ 和 Griffon 框架开发 Web 和桌面应用程序做好了准备，这也是本书剩余部分的重点内容。  \n\n第 4 章  \n![image](img/frontdot.jpg)\
  \  \n\nGrails 简介  \n坦白说，开发 Web 应用程序是件难事。在当今环境下，这个问题更加突出：那些被视为 Web 2.0 的应用程序涉及大量技术，例如超文本标记语言（HTML）、层叠样式表（CSS）、异步\
  \ JavaScript 和 XML（Ajax）、XML、Web 服务、Java 以及数据库。在这些技术之上，还有众多开源框架可供选择，比如模型-视图-控制器（MVC）框架和\
  \ Ajax 框架。更糟糕的是，尽管构建应用程序的复杂性持续增长，预期的交付周期却在不断缩短。  \n\n近年来，Java 社区尝试通过使用 Java 平台企业版（Java\
  \ EE）及其前身 Java 2 平台企业版（J2EE）来构建应用程序，以解决这些问题。虽然这些平台已被证明具有可扩展性和健壮性，但它们并不支持快速、敏捷的开发。Java\
  \ EE 一再证明，它并非以应用程序级别的抽象来编写，而是基于更低的技术层次。这些缺陷促使了近期应用程序框架的发展，并随后催生了 Struts、Spring 和\
  \ Hibernate 等框架的流行。此外，编码、编译、打包、部署、测试和调试的开发周期对于任何真正的生产力而言都过于漫长，并且要求开发者过于频繁地切换上下文。\
  \  \n\nGrails 应运而生。Grails 是一个开源 Web 开发框架，它将最佳实践（例如约定优于配置和单元测试）与最优秀的开源应用程序框架（如 Spring、Hibernate\
  \ 和 SiteMesh）相结合。借助 Groovy 脚本语言的生产力，这一切都运行在健壮的 Java 和 Java EE 平台之上。  \n\n在本章中，你将了解\
  \ Grails 所包含的特性和开源框架。然后，你将学习如何利用 Grails 强大的脚手架功能来构建你的第一个 Grails 应用程序。  \n\n什么是 Grails？\
  \  \nGrails 不仅是 Java 平台上的一个开源 Web 框架，更是一个完整的开发平台。与大多数 Web 框架一样，Grails 是一个 MVC 框架，但它并非普通的\
  \ Java MVC 框架。与其他 Java MVC 框架类似，它确实拥有模型（在 Grails 中称为*领域类*），用于携带供视图显示的应用程序数据。然而，与其他\
  \ MVC 模型不同的是，Grails 的领域类可以自动持久化，甚至能生成底层数据库模式。与其他 MVC 框架一样，Grails 的控制器处理请求并协调服务或其他行为。\
  \  \n\n但与大多数 MVC 框架不同的是，服务和其它类可以通过基于命名约定的依赖注入自动注入。此外，Grails 控制器是请求作用域的，这意味着每个请求都会创建一个新的实例。最后，Grails\
  \ 的默认视图是 Groovy 服务器页面（GSP），它通常渲染 HTML。视图层还包括灵活的布局、模板功能和简单的标签库。  \n\nGrails 的其他优势包括极少的配置和更敏捷的开发周期。Grails\
  \ 通过使用主动约定，消除了大部分标准的 MVC 配置和部署描述符。同时，由于 Grails 利用了 Groovy 的动态语言特性，它通常能将开发周期缩短为仅需编码、刷新、测试和调试。这节省了宝贵的开发时间，并使开发过程比其他\
  \ Java MVC 框架或 Java EE 更加敏捷。  \n\n作为一个完整的开发平台，Grails 开箱即用地包含了 Web 容器、数据库、构建系统和测试工具。这种组合可以将项目启动时间和开发者环境搭建时间从几小时或几天缩短到几分钟。使用\
  \ Grails，你通常无需寻找和下载一堆服务器软件或框架即可开始。你也不必花时间创建或维护复杂的构建脚本。开始所需的一切都捆绑在一个易于安装的软件包中。  \n\
  \nGrails 拥有一系列令人印象深刻的功能，并通过集成经过验证的开源项目来提供如此丰富的功能。  \n\nGrails 特性  \nJava 领域中的大多数现代\
  \ Web 框架都错综复杂、充满曲折，并且忽视了“不要重复自己”（DRY）原则。Grails 建立在 Rails、Django 和 TurboGears 等动态框架所倡导的概念之上，通过利用\
  \ Spring 和 Hibernate 等已有的 Java 技术，显著降低了在 Java 平台上构建 Web 应用程序的复杂性。Grails 是一个全栈框架，致力于通过其核心技术和相关插件解决\
  \ Web 开发中的众多难题。其特性包括：  \n\n*   基于 Hibernate 构建的易用对象关系映射（ORM）层  \n*   一种富有表现力的视图技术，称为\
  \ Groovy 服务器页面（GSP）  \n*   基于 Spring MVC 构建的控制器层  \n*   基于 Groovy 驱动的 Gant 构建的命令行脚本环境\
  \  \n*   配置了热重载的内嵌 Tomcat 容器  \n*   通过内嵌的 Spring 容器实现依赖注入  \n*   基于 Spring 核心 MessageSource\
  \ 概念构建的国际化（i18n）支持  \n*   基于 Spring 事务抽象构建的事务性服务层  \n\n所有这些功能都通过 Groovy 语言的强大能力和领域特定语言（DSL）的广泛使用而变得易于使用。\
  \  \n\nGrails 的特性实在太多，无法一一列举。在本节中，我们将重点介绍其中一些更重要的特性。  \n\n约定优于配置  \nGrails 不依赖大量的\
  \ XML 配置文件，而是依靠约定来自行配置，从而使应用程序开发更简单、更高效。这些约定与目录结构相关，意味着使用文件的名称和位置来代替显式配置。这实质上意味着，你无需在\
  \ XML 配置文件中进行装配，只需遵循 Grails 约定创建一个类，Grails 就会将其装配到 Spring 中，或将其视为 Hibernate 实体。例如，如果你创建一个名为\
  \ User 的新领域类，Grails 会自动在数据库中创建一个名为 user 的表。这种约定优于配置的特性以其目录结构为核心。  \n\n\n\n通过采用**约定优于配置**的范式，Grails\
  \ 能够根据组件在目录结构中的名称和位置来判断其职责，从而让你仅在配置偏离标准时才需要对组件的特定方面进行配置。通过这种方式，遵循众所周知的约定，你可以更快地创建应用程序，因为花在配置上的时间会更少。\n\
  \n**单元测试**\n\n单元测试现已被公认为提高软件交付质量并实现应用程序长期可维护性的关键最佳实践。此外，对于使用 Groovy 等动态类型语言编写的应用程序，单元测试甚至更为重要，因为如果没有编译器和单元测试的帮助，识别变更的影响可能会很困难。这就是单元测试成为\
  \ Grails 主要约定的原因。\n\nGrails 将其单元测试分为两类：单元测试和集成测试。Grails 单元测试是独立的单元测试，除了可能的模拟对象外，没有其他依赖项。而集成测试则可以访问整个\
  \ Grails 环境，包括数据库。\n\n**脚手架**\n\n正如你将在本章后半部分看到的，Grails 拥有一个脚手架框架，可以用极少的代码生成具有创建、读取、更新和删除（CRUD）功能的应用程序，让你能够专注于通过创建具有属性、行为和约束的类来定义\
  \ Groovy 领域。在运行时或开发时，Grails 都可以为 CRUD 功能生成与领域类关联的控制器行为和 GSP 视图。同时，它甚至可以生成数据库模式，包括每个领域类对应的表。\n\
  \n**对象关系映射**\n\nGrails 包含一个强大的对象关系映射框架，称为 Grails 对象关系映射（GORM）。与大多数对象关系映射（ORM）框架一样，GORM\
  \ 可以将对象映射到关系数据库，并表示这些对象之间的关系，例如一对一或一对多。但 GORM 与其他 ORM 的不同之处在于，它是为 Groovy 这样的动态语言而构建的。它将\
  \ CRUD 方法直接注入到类中，而无需实现这些方法或从持久化超类继承。此外，它还能够为动态查找方法和搜索条件提供 ORM DSL。你将在第 6 章中了解更多关于\
  \ GORM 的内容。\n\n**插件**\n\nGrails 并不声称能解决所有 Web 开发问题。相反，它提供了一个插件架构和一个社区，你可以在其中找到用于安全、Ajax、测试、搜索、报告和\
  \ Web 服务等方面的插件。这种插件架构使得向应用程序添加复杂功能变得容易。我们将在本章后面的“Grails 插件”中更详细地讨论插件。\n\n**集成的开源框架**\n\
  \nGrails 没有“非我发明”（NIH）综合症。它不会重新发明轮子，而是集成了业界公认的最佳开源框架，本节将简要介绍其中几个。\n\n**Groovy**\n\
  \nGroovy 是 Grails 的支柱之一。Grails 2.0 自带 Groovy 1.8。正如你在第 1 章到第 3 章中所了解的，Groovy 是一种功能强大且灵活的开源语言，可以独立使用。然而，它与\
  \ Java 的集成、动态脚本特性以及简洁的语法使其成为 Grails 的完美补充，并为整个解决方案提供了敏捷特性。\n\n**Spring 框架**\n\n\
  Spring 框架的创建者 Rod Johnson 将其最佳描述为：在 Java EE API 之上提供应用程序级别的抽象。\n\n例如，无需处理事务管理的细节，Spring\
  \ 提供了一种在普通 Java 对象（POJO）周围声明事务的方法，以便你可以专注于实现业务逻辑。此外，由于 Spring 将 Java EE 特性带到了 POJO\
  \ 中，你可以在 Java EE 容器之外开发和测试应用程序代码，从而提高生产力。与 Hibernate 一起，Spring 对新的企业级 JavaBean（EJB）3.0\
  \ 规范产生了重大影响，该规范试图简化 Java EE 开发。\n\nGrails 隐式处理了大部分 Spring 集成工作。然而，在第 6 章中，你将学习如何在必要时显式配置和集成\
  \ Spring。\n\n**Hibernate**\n\nHibernate 是一个对象关系持久化框架，为 GORM 提供了基础。它能够将编写为 POJO 或\
  \ POGO（普通 Groovy 对象）的复杂领域类映射到关系数据库表，并映射表之间的关系。如前所述，Hibernate 对 EJB 3.0 规范，特别是 Java\
  \ 持久化 API（JPA）产生了重大影响。Hibernate 是众多 JBoss 项目之一。有关 Hibernate 的更多信息，请访问 `http://www.hibernate.org`。\n\
  \n**SiteMesh**\n\nSiteMesh 是一个网页布局框架，它实现了装饰器设计模式，用于渲染包含页眉、页脚和导航等恒定组件的 HTML。它是 OpenSymphony\
  \ 套件中的组件之一，托管在 OpenSymphony 网站上。作为开发者，Grails 向你隐藏了大部分 SiteMesh 细节，但在第 5 章中，你将看到如何创建页面布局和其他\
  \ Web 组件（如 GSP）。你可以在 `http://wiki.sitemesh.org/display/sitemesh/Home` 找到关于 SiteMesh\
  \ 的详细信息。\n\n**Ajax 框架**\n\n默认情况下，Grails 包含 jQuery 库，但也通过插件系统支持其他框架，如 Prototype、Dojo、Yahoo\
  \ UI 和 Google Web Toolkit。第 8 章将解释如何向应用程序添加 Ajax 功能以提高可用性。\n\n**Tomcat**\n\nGrails\
  \ 2.0 用嵌入式 Tomcat 容器替换了 Jetty，该容器配置为支持即时重新加载。第 12 章将解释如何将 Grails 应用程序部署到其他容器。\n\n\
  **H2**\n\nGrails 2.0 现在使用 H2³ 数据库代替 HSQLDB，并在开发模式下启用 H2 数据库控制台（URI 为 /dbconsole），以便可以轻松地从浏览器查询内存数据库。默认情况下，Grails\
  \ 使用嵌入式内存配置，因此每次运行应用程序时，数据库都会从头重建，所有数据都会丢失。第 12 章将解释如何配置 Grails 以使用其他数据库，如 MySQL。我们将在本章后面的“H2\
  \ 控制台”中进一步讨论 H2。要了解有关 H2 的更多信息，包括如何下载，请访问 `http://www.h2database.com/html/main.html`。\n\
  \n**Grails 架构**\n\n既然你已经了解了 Grails 中包含的一些特性和开源框架，那么你就能更好地理解 Grails 架构，如图 4-1 所示。\n\
  \n![9781430248064_Fig04-01.jpg](img/9781430248064_Fig04-01.jpg)\n\n图 4-1 . Grails\
  \ 架构\n\n在图 4-1 中，请注意 Grails 的基础是 Java 虚拟机（JVM）。同时，也要注意架构中 Java 语言与 JVM 的分离。在过去的几年里，Java\
  \ 社区涌现了大量在 JVM 上运行的新语言和移植语言。这一点在 Grails 中尤为重要，因为在 JVM 的上一层，你可以看到 Java 和 Groovy 语言都被使用了。\n\
  \n\n\n架构的最后一层是您将使用 Grails 构建的应用程序。通常，这一层遵循 MVC 模式。Grails 还使组织应用程序以创建粗粒度服务变得容易。为了简化开发，Grails\
  \ 包含一个命令行工具，用于创建许多 Grails 构件和管理 Grails 项目。Grails 命令行构建于 Gant 之上，Gant 是一个构建系统，它使用\
  \ Groovy 语言来编写 Apache Ant 任务的脚本，而不是使用 Ant 的 XML 格式。您将在第 12 章中了解更多关于 Gant 以及如何向 Grails\
  \ 命令行添加自定义脚本的内容。从运行时角度来看，您可以将开箱即用的 Grails 视为图 4-2 所示。\n\n![9781430248064_Fig04-02.jpg](img/9781430248064_Fig04-02.jpg)\n\
  \n图 4-2 .  Grails 默认运行时\n\n在图 4-2 中，您看到一个 Web 浏览器向 Tomcat Web 容器发出请求。该容器以类似于标准 MVC\
  \ 模型的方式将请求转发给控制器。控制器可以设置或使用来自领域类（模型）的数据。如前所述，所有 Grails 领域类都可以通过 GORM 框架进行持久化。\n\n\
  您不需要使用数据访问对象（DAO）模式或编写 SQL 来持久化对象。在第 6 章中，您将学习如何充分利用可持久化的领域类。\n\n开箱即用的 Grails 使用嵌入式\
  \ H2 数据库，这意味着该数据库与您的应用程序和 Tomcat Web 容器运行在同一个 JVM 中。当控制器处理完毕后，它会将请求转发给 GSP，GSP 是一种视图技术，用于渲染返回给请求浏览器的\
  \ HTML。\n\n**安装 Grails**\n\n考虑到使用 Grails 的替代方案——下载并安装 Web 容器或应用服务器、数据库和 MVC 框架——安装\
  \ Grails 似乎简单得令人难以置信。您需要做的就是解压一个文件并设置一些环境变量，然后就完成了。几乎所有内容都是自包含的。不过，Grails 确实有两个先决条件：您必须拥有\
  \ JDK 1.6 或更高版本，并且必须为该 JDK 配置 `JAVA_HOME` 环境变量。在本书中，我们将使用 Grails 2.1.0。\n\n请按照以下步骤安装\
  \ Grails：\n\n1.  从 `http://grails.codehaus.org/Download` 下载最新的 Grails .zip 或 .tar/.gz\
  \ 文件。\n2.  将存档解压到您首选的位置。\n3.  创建一个指向 Grails 存档解压路径的 `GRAILS_HOME` 环境变量。\n4.  将 `GRAILS_HOME\\\
  bin` 目录附加到 `PATH` 环境变量中。\n\n完成这些步骤后，Grails 命令行即可使用。您可以使用它来创建项目、创建构件、运行应用程序以及打包应用程序。\n\
  \n要验证您的安装，请打开一个命令窗口并输入命令 `grails -version`：\n\n```\n> grails –version\n```\n\n如果您已成功安装\
  \ Grails，该命令将输出以下内容：\n\n```\nGrails version: 2.1.0\n```\n\n**Collab-Todo 应用程序**\n\
  \n在本书中，我们将使用一个单一的 Web 应用程序示例来演示如何使用 Grails 框架编写 Web 应用程序。我们还会间歇性地使用独立的示例来介绍一些概念，这样学习\
  \ Grails 就不会与我们在过程中构建的应用程序紧密耦合。我们在本书中使用的应用程序是一个协作式 Web 2.0 待办事项应用程序，名为 Collab-Todo。该应用程序允许用户创建和管理分类中的待办事项。它还允许用户创建其他\
  \ Collab-Todo 用户的好友列表，以便轻松地将任务分配给其他用户。此外，它还包含报告、批量电子邮件以及一个富客户端和 Web 服务访问。\n\n让您尽早亲身体验\
  \ Grails 的强大功能和生产力非常重要，因此在本章的剩余部分，您将学习利用 Grails 的约定和脚手架来创建一个简单但功能完整的 Collab-Todo\
  \ 应用程序版本。从可用性和设计角度来看，这个初始版本的应用程序并非适合生产环境。然而，Grails 脚手架能够渲染一个简单但功能完整的 CRUD Web 应用程序，除了您的领域类代码之外几乎不需要任何代码。此外，Grails\
  \ 会生成数据库模式，并在应用程序运行时用该模式填充数据库。这个基于脚手架的应用程序版本适用于测试领域对象以及快速应用程序原型设计。\n\n图 4-3 展示了本章结束时\
  \ CRUD 待办事项页面可能的样子。\n\n![9781430248064_Fig04-03.jpg](img/9781430248064_Fig04-03.jpg)\n\
