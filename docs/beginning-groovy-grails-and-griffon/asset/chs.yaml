  \    与前面几章一样，我们不仅会使用一个插件，而且这个插件是基于久经考验的 Java 技术的。Searchable 插件基于 OpenSymphony Compass\
  \ 搜索引擎框架，而该框架底层又使用了 Apache Lucene。    Searchable 插件随 Grails 一起提供。通过执行以下命令安装它：  \
