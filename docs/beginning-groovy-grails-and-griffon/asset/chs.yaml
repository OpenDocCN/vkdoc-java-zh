  \  \n批处理  \n\nGrails 不仅仅是一个 Web 框架——它是一个应用程序框架。几乎所有的应用程序都包含必须定期执行的功能（每 15 分钟、每小时一次、每天两次、每天、每周、每月、每季度或每年）。这被称为*批处理*。Grails\
  \ 团队预见到了批处理的需求，并决定利用一个流行的开源第三方企业任务调度库：Quartz ¹。由于 Spring 框架是 Grails 的核心组件，而 Spring\
  \ 框架已经包含了 Quartz 集成，因此这是一个自然的选择。Quartz Grails 插件使得使用 Quartz 库变得简单。  \n\nQuartz 类似于\
  \ Unix 的 cron 工具，因为它提供了在未来执行任务的能力。然而，Quartz 与 Unix 的 cron 工具不同，因为它运行在应用服务器内部，并且可以完全访问所有应用程序组件。\
  \  \n\n本章将探讨批处理功能。我们将从安装 Quartz 插件和创建一个简单的任务开始。然后，我们将继续创建一个示例批处理报告工具。  \n\n安装 Quartz\
  \ 插件  \n\n如前所述，Grails 利用 Quartz 实现任务调度功能。Quartz 插件将 Quartz 集成到 Grails 中，并使 Quartz\
  \ 易于使用。  \n\n首先，在项目目录中执行以下命令：  \n\n```  \n> grails install-plugin quartz  \n```\
  \  \n\n或者，你可以使用 GGTS 的插件管理器。这将产生如图 11-1 所示的输出。  \n\n![9781430248064_Fig11-01.jpg](img/9781430248064_Fig11-01.jpg)\
  \  \n\n图 11-1 .  安装 Quartz  \n\n安装插件会在 `grails-app` 目录下创建 `jobs` 目录。  \n\n创建任务 \
  \ \n\n一个*任务*是一个包含你想要运行的代码的程序。在 Grails 中，任务定义了要做什么以及何时做。  \n\n作为 Quartz 运行的一个简单演示，让我们创建一个打印消息和当前时间的任务。第一步是创建任务，如下所示：\
  \  \n\n```  \n> grails create-job first  \n```  \n\n该命令在 `grails/job` 目录下生成 `FirstJob`\
  \ 类：  \n\n```  \npackage collab.todo  \nclass FirstJob {  \n    static triggers\
  \ = {  \n        simple repeatInterval: 5000l // 每 5 秒执行一次任务  \n    }  \n    def\
  \ execute() {  \n        // 执行任务  \n    }  \n}  \n```  \n\n![image](img/sq.jpg)\
  \ **注意**  仔细看 `timeout` 值，你会看到 `5000` 后面有一个 `l`。这个 `l` 将变量设为 `Long` 类型。还要注意，`create-job`\
  \ 遵循与其他 `create-*` 命令相同的约定，并在任务名称后附加后缀 `Job`。  \n\n`create-job` 命令创建了一个骨架任务，该任务预配置为在应用服务器启动后五秒运行一次。\
  \  \n\n因此，在服务器启动五秒后，`execute()` 方法中的代码将被执行。将以下代码添加到 `execute()` 方法中：  \n\n```  \n\
  println \"Hello from FirstJob: \"+ new Date()  \n```  \n\n清单 11-1 显示了完整的 `FirstJob`\
  \ 类。  \n\n***清单 11-1.***  完整的 FirstJob  \n\n```  \npackage collab.todo  \nclass\
  \ FirstJob {  \n    static triggers = {  \n        simple repeatInterval: 5000l\
  \ // 每 5 秒执行一次任务  \n    }  \n    def execute() {  \n        println \"Hello from\
  \ FirstJob: \"+ new Date()  \n    }  \n}  \n```  \n\n通过发出以下命令启动应用程序：  \n\n```  \n\
  > grails run-app  \n```  \n\n尽管你可能会将清单 11-1 中 `timeout` 属性的注释理解为 `FirstJob` 只执行一次，但从图\
  \ 11-2 的输出中可以看到，它每五秒执行一次。  \n\n![9781430248064_Fig11-02.jpg](img/9781430248064_Fig11-02.jpg)\
  \  \n\n图 11-2 .  每五秒输出一次  \n\n现在你已经了解了如何创建一个简单的任务，让我们继续讨论一些更有用的内容：一个批处理报告工具。  \n\
  \n构建批处理报告工具  \n\n作为示例，我们将构建一个批处理报告工具，该工具生成待办事项报告并在夜间通过电子邮件发送给用户。我们将利用前几章创建的几个服务：来自第\
  \ 8 章的 `EMailAuthenticatedService` 和来自第 10 章的 `ReportService`。图 11-3 显示了夜间报告流程的概览。\
  \  \n\n![9781430248064_Fig11-03.jpg](img/9781430248064_Fig11-03.jpg)  \n\n图 11-3\
  \ .  夜间报告流程  \n\n该流程从 `NightlyReportJob` 开始。当 Quartz 调用 `NightlyReportJob` 时，它会立即调用\
  \ `BatchService`。`BatchService` 是主要的控制例程。它促进与其他解决方案组件的交互。首先，`BatchService` 检索所有具有电子邮件地址的\
  \ `User` 对象。对于每个用户，`BatchService` 检索 `Todo` 对象。然后，`BatchService` 使用 `ReportService`\
  \ 生成 PDF 报告。最后，`BatchService` 使用 `EmailAuthenticatedService` 向用户发送带有报告附件的电子邮件。 \
  \ \n\n构建批处理报告工具需要以下步骤：  \n\n1.  创建并配置 `NightlyReportJob` 的执行。  \n2.  检索用户的待办事项。\
  \  \n3.  调用报告服务（在第 10 章中创建）。  \n4.  调用电子邮件服务（在第 8 章中创建）。  \n\n创建夜间报告任务  \n\n发出以下命令来创建\
  \ `NightlyReportJob`：  \n\n```  \n> grails create-job NightlyReport  \n```  \n\n\
  除了你在之前的 `FirstJob` 任务中看到的 `timeout` 属性外，你还可以使用几个额外的属性来控制任务执行。  \n\n设置名称和组  \n\n\
  你可以使用 `name` 和 `group` 属性来帮助你在与 Quartz 调度器交互时识别任务：  \n\n```  \nclass NightlyReportJob\
  \ {  \n    def name = \"NightlyReport\" // 任务名称  \n    def group = \"CollabTodo\"\
  \   // 任务组  \n```  \n\n控制执行频率  \n\n有两种技术可以控制任务执行频率：  \n\n*   使用 `startDelay` 和 `timeout`\
  \ 属性：这两个属性允许你控制任务的执行频率。`startDelay` 属性延迟任务在应用程序启动后开始执行的毫秒数。当你需要在任务开始前让系统启动时，这很有用。Grails\
  \ 默认将 `startDelay` 属性设为 0。`timeout` 属性是任务执行之间的毫秒数。Grails 默认将 `timeout` 属性设为 60,000\
  \ 毫秒，即 1 分钟。  \n\n\n\n*   使用 `cronExpression` 属性：对于所有 Unix 极客来说，它的工作方式正如你所期望的那样。它是一个使用\
  \ crontab 格式描述执行频率的字符串。如果你不熟悉这种方法，别担心——我们将在下文更详细地解释这种格式。这两种技术都可以用来控制执行频率。决定使用哪种技术取决于任务需求。如果任务可以通过定时器处理，那么设置\
  \ `startDelay` 和 `timeout` 属性就足够了，如下例所示：\n    ``` def startDelay = 20000     //\
  \ 等待 20 秒后启动任务 def timeout = 60000        // 每 60 秒执行一次任务 ```\n    如果任务对时间非常敏感，使用\
  \ `cronExpression` 属性可能更合适。但请注意，在任务的开发和初始测试阶段，你可能更希望使用 `startDelay`/`timeout` 技术，之后再切换到\
  \ `cronExpression` 方法。\n    ![image](img/sq.jpg) **警告**  根据任务的执行频率和持续时间，可能会出现一个任务的多个实例同时执行的情况。如果任务运行时间较长，并且当\
  \ `cronExpression` 属性导致其再次被调用时仍在运行，就可能发生这种情况。任务是否允许并发执行取决于具体需求。默认情况下，Quartz 插件允许任务并发执行。大多数情况下，你可能不希望允许任务并发执行。你可以通过将任务的\
  \ `concurrent` 属性设置为 `false` 来改变此行为。\n\n    cron 表达式告诉任务调度器何时运行任务。`cronExpression`\
  \ 属性值由六个字段组成，用空格分隔，分别表示秒、分钟、小时、日、月、星期，以及一个可选的第七个字段表示年份。cron 表达式从左到右表示这些字段：\n   \
  \ ``` Seconds Minutes Hours DayOfMonth Month DayOfWeek Year ```\n    例如，我们定义一个 `cronExpression`\
  \ 属性，让任务每天凌晨 1:00 运行，如下所示：\n    ``` def cronExpression = \"0 0 1 * * *\"  // 每天凌晨\
  \ 1:00 运行 ```\n    表 11-1 描述了 cron 表达式字段，表 11-2 总结了一些常用的特殊字符。（有关特殊字符的更完整说明，请参阅 Quartz\
  \ 文档：`http://www.quartz-scheduler.org/documentation/quartz-1.x/tutorials/crontrigger``.`）\n\
  \n    表 11-1. Cron 表达式字段\n     | 字段 | 值 | 特殊字符 | | --- | --- | --- | | 秒 | 0–59\
  \ | `, - * /` | | 分钟 | 0–59 | `, - * /` | | 小时 | 0–23 | `, - * /` | | 日 | 1–31 |\
  \ `, - * ? / L W` | | 月 | 1–12 或 JAN–DEC | `, - * /` | | 星期 | 1–7 或 SUN–SAT | `,\
  \ - * ? / L#` | | 年（可选） | 空或 1970–2099 | `, - * /` |\n\n    表 11-2. Cron 表达式特殊字符\n\
  \     | 字符 | 功能 | 示例 | | --- | --- | --- | | * | 所有值——匹配字段内所有允许的值。 | 小时字段中的 * 匹配一天的每个小时，即\
  \ 0–23。 | | ? | 无特定值——用于在允许使用该字符的两个字段之一中指定内容，而另一个字段则不指定。 | 要在每月的第十天执行任务，无论那天是星期几，将\
  \ DayOfMonth 字段设为 10，DayOfWeek 字段设为 ?。 | | - | 用于指定一个值范围。 | DayOfWeek 字段中的 2–6 会导致任务在星期一、星期二、星期三、星期四和星期五被调用。\
  \ | | , | 用于创建一个值列表。 | DayOfWeek 字段中的 MON, WED, FRI 会导致任务在星期一、星期三和星期五被调用。 | | /\
  \ | 用于指定增量。斜杠前的字符表示何时开始。斜杠后的字符表示增量。 | Minutes 字段中的 0/15 会导致任务在整点后的第 0、15、30 和 45\
  \ 分钟被调用。 |\n\n    Cron 表达式非常强大。只要稍加想象，你就可以指定多种多样的时间。表 11-3 展示了一些 cron 表达式示例。\n\n\
  \    表 11-3. Cron 表达式示例\n     | 表达式 | 含义 | | --- | --- | | `0 0 1 * * ?` | 每天凌晨\
  \ 1:00 调用 | | `0 15 2 ? * *` | 每天凌晨 2:15 调用 | | `0 15 2 * * ?` | 每天凌晨 2:15 调用 |\
  \ | `0 15 2 * * ? *` | 每天凌晨 2:15 调用 | | `0 15 2 * * ? 2008` | 在 2008 年期间每天凌晨 2:15\
  \ 调用 | | `0 * 13 * * ?` | 每天下午 1:00 到 1:59 之间每分钟调用一次 | | `0 0/5 14 * * ?` | 每天下午\
  \ 2:00 到 2:55 之间每 5 分钟调用一次 | | `0 0/5 14,18 * * ?` | 每天下午 2:00 到 2:55 之间每 5 分钟调用一次，并且每天下午\
  \ 6:00 到 6:55 之间每 5 分钟调用一次 | | `0 0–5 14 * * ?` | 每天下午 2:00 到 2:05 之间每分钟调用一次 | |\
  \ `0 10,45 14 ? 3 WED` | 在三月中的每个星期三下午 2:10 和 2:45 调用 | | `0 15 2 ? * MON-FRI` |\
  \ 每个星期一、星期二、星期三、星期四和星期五凌晨 2:15 调用 | | `0 15 2 15 * ?` | 每月第十五天凌晨 2:15 调用 | | `0\
  \ 0 12 1/5 * ?` | 从每月第一天开始，每 5 天的中午 12:00 调用 | | `0 11 11 25 12 ?` | 每年 12 月 25\
  \ 日上午 11:11 调用 |\n\n    清单 11-2 展示了 `NightlyReportJob` 的定义。请注意，它包含了两种控制执行频率的技术，其中\
  \ `startDelay`/`timeout` 的定义被注释掉了。\n\n    ***清单 11-2.***  NightlyReportJob 名称、组和执行频率配置\n\
  \    ``` class NightlyReportJob {   def cronExpression = \"0 0 1 * * *\" // 每天凌晨\
  \ 1:00 运行   def name = \"Nightly\"               // 任务名称   def group = \"CollabTodo\"\
             // 任务组  //  def startDelay = 20000           // 等待 20 秒后启动任务 //  def\
  \ timeout = 60000              // 每 60 秒执行一次任务 ```\n\n    你可以理解为什么 Grails 团队选择集成\
  \ Quartz 而不是创建新的东西。它非常强大。掌握了这些知识，你就可以继续前进，实现夜间报告任务的核心逻辑了。\n\n    检索用户的待办事项\n   \
  \ 下一步是利用 Spring 的自动装配依赖注入，将 `BatchService` 注入到任务中，如下所示：\n    ``` > grails create-service\
  \ Batch ```\n    清单 11-3 演示了 `BatchService` 的注入和执行。\n\n    ***清单 11-3.***  包含 Batch\
  \ Service 的 NightlyReportJob\n    ``` class NightlyReportJob {   def cronExpression\
  \ = \"0 0 1 * * *\" // 每天凌晨 1:00 运行   def name = \"Nightly\"               // 任务名称\
  \   def group = \"CollabTodo\"           // 任务组  //  def startDelay = 20000          \
  \ // 等待 20 秒后启动任务 //  def timeout = 60000              // 每 60 秒执行一次任务    def batchService\
  \   def execute() {       log.info \"开始执行夜间任务: \"+new Date()       batchService.nightlyReports.call()\
  \       log.info \"夜间任务执行完毕: \"+new Date()   } } ```\n    这段代码很直接。它定义了任务何时运行，并将任务委托给\
  \ `BatchService`。\n\n    下一步是在 batch service 上创建 `nightly` 闭包。它将包含检索用户待办事项的代码。清单\
  \ 11-4 演示了添加 nightly 闭包并检索用户待办事项。\n\n    ***清单 11-4.***  Batch Service 的 Nightly\
  \ 闭包\n    ``` class BatchService    . . .\n\n\n\n/*  \n *  运行夜间报告  \n */  \ndef\
