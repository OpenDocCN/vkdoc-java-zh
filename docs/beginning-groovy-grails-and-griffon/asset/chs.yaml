  \ 25-28 行使用 Grails 的`<g:actionSubmit>`标签创建了一个表单提交按钮。\n\n如果你现在运行应用程序并访问该视图，将会得到一个\
  \ 404 错误。这是因为顶栏通过`UserController`的`login`操作链接到了`login`视图，而该操作尚未创建。\n\n### 登录操作\n\
  \n目前，`UserController`是通过动态脚手架设置的。你将继续使用动态脚手架，并向其中添加`login`操作。清单 5-11 展示了`UserController`类的更新版本。\n\
  \n***清单 5-11.***  登录操作\n\n``` class UserController { static scaffold = User def\
  \ login() {} } ```\n\nWeb 开发中的一个常见最佳实践是将操作用作重定向机制。按照惯例，Grails 会使用操作的名称来查找同名的 GSP。\n\
  \n如果你现在点击“登录”链接，登录视图将会显示，并且“用户名”选择字段是空白的。通过创建两个用户来测试表单的功能。从主页开始，选择 UserController\
  \ ![image](img/arrow.jpg) 新建用户。现在当你选择“登录”时，“用户名”选择字段中就会填充内容（参见图 5-7）。\n\n![9781430248064_Fig05-07.jpg](img/9781430248064_Fig05-07.jpg)\n\
  \n图 5-7 .  已登录用户\n\n接下来，你需要通过`UserController`的`handleLogin`操作来实现登录逻辑。\n\n### 处理登录和注销操作\n\
  \n你调用`handleLogin`操作来让用户登录。当你调用该操作时，登录表单会传递要登录用户的`userName`。登录是通过将与`userName`关联的用户对象添加到会话来完成的。\n\
  \n如果找不到该用户，则会创建一条错误消息，并将用户重定向到登录视图。在这个特定示例中，登录本不应失败，但进行防御性编码仍然是一个好习惯。你使用`logout`操作将会话中的用户移除，以便用户能够注销。\n\
  \n清单 5-12 展示了如何增强`UserController`。\n\n***清单 5-12.***  增强后的 UserController\n\n```\
  \ class UserController { static  scaffold = User    def login() {} defhandleLogin()\
  \ { def user = User.findByUserName(params.userName) if (!user) { flash.message =\
  \ \"未找到用户名为 ${params.userName} 的用户\" redirect(action:'login') return } else { session.user\
  \ = user redirect(controller:'todo')  } }  def logout() { if(session.user) { session.user\
  \ = null redirect(action:'login')  }  } } ```\n\n现在，当用户登录时，她会被带到待办事项列表，并且顶栏会显示用户的名、姓以及一个“注销”链接。\n\
  \n### 外部化字符串\n\n与所有现代 Java Web 框架一样，Grails 支持消息资源包的概念。它使用`<g:message>`标签来查找属性文件以获取要显示的文本。例如，假设你很难决定顶栏是显示“登录”还是“登录”。你可以将字符串外部化，并在改变主意时简单地修改`messages.properties`文件。Grails\
  \ 使用消息资源包来显示错误。因此，如果你不喜欢收到的错误消息，可以通过修改消息资源包中的消息使其更友好。`messages.properties`文件位于`grails-app/i18n`目录中。清单\
  \ 5-13 展示了`messages.properties`文件的默认内容。\n\n***清单 5-13.***  messages.properties\n\
