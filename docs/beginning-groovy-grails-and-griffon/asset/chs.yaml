  \n### 整合所有部分\n\n你即将看到你的工作成果。你安装了 iReports 并将相应的库复制到了应用程序中。你创建了报告和报告标签库。你创建了 `ReportService`\
  \ 和 `ReportController`。剩下唯一要做的事情就是编写收集报告数据的代码，并将 `report` 标签挂接到应用程序中。\n\n### 收集报告数据\n\
  \n回顾“报告标签”部分，该标签允许你指定用于收集报告数据的控制器和操作。在本例中，你将指定 `TodoController` 和 `userTodo` 操作，因此你需要在\
  \ `TodoController` 上创建一个 `userTodo` 操作。代码清单 10-8 包含了该操作的内容。\n\n***代码清单 10-8.***  收集报告数据\n\
  \n``` def userTodo = {     def user = User.get(session.user.id)     return Todo.findAllByOwner(user)\
  \ } ```\n\n代码清单 10-8 中的代码查找当前用户的所有待办事项并返回结果。现在，你必须将 `report` 标签挂接到应用程序中。\n\n###\
  \ 向应用程序添加报告标签\n\n最后一步是将 `report` 标签添加到待办事项列表视图中，然后编辑该视图（`grails-app/views/todo/list.gsp`）。在文件底部，分页逻辑之后，添加\
  \ `report` 标签。请参考代码清单 10-9 作为示例。\n\n***代码清单 10-9.***  添加报告标签\n\n```     ... <div\
  \ class=\"paginateButtons\"> <g:paginate total=\"${Todo.count()}\" /> </div> <g:report\
  \ id=\"todoReport\" controller=\"TodoController\" action=\"userTodo\" report=\"\
  userTodo\" format=\"PDF,HTML,CSV,XLS,RTF,TXT,XML\"> <input type=\"hidden\" name=\"\
  userName\" value=\"${todoList[0]?.owner}\" /> </g:report> </div> </body> </html>\
  \ ```\n\n现在让我们来看看结果。启动应用程序，登录，然后选择 PDF 图标。图 10-10 显示了报告。\n\n![9781430248064_Fig10-10.jpg](img/9781430248064_Fig10-10.jpg)\n\
  \n图 10-10 .  报告\n\n恭喜，你成功构建了一个报告功能。既然已经有了这个功能，不重复使用它未免太可惜了。\n\n### 报告列表\n\n你做了很多出色的工作：你构建了报告功能的所有核心组件，并通过\
  \ `report` 标签增强了视图，使用户能够访问报告。你还了解了如何使用以下命令将报告参数传递给数据收集操作：\n\n``` <input type=\"\
  hidden\" name=\"userName\" value=\"${todoList[0]?.owner}\" /> ```\n\n在本例中，该参数是一个隐藏字段，但它同样可以是一个可见的输入字段。\n\
  \n用户期望能够指定一个截止日期范围，并只查看该范围内的待办事项，这是合理的。要满足这样的需求需要做些什么呢？嗯，你需要构建一个报告列表视图，并将其挂接到应用程序中。该视图需要列出所有可用的报告。如果某个报告不需要任何额外的参数，你可以直接从报告列表视图执行它。如果某个报告需要额外的参数，它将启动另一个页面，允许用户指定报告的输入参数。\n\
  \n最棒的是，你可以重用刚刚创建的所有组件。非常酷。\n\n鉴于这基本上是对你所学内容的重述，我们将把它留作练习，供你自行开发。\n\n### 另一种方法\n\n\
  在本章前面部分，我们讨论了使用领域模型为报告提供数据，或者使用嵌入式 SQL。出于几个充分的理由，我们决定使用领域模型方法，但另一种方法也值得考虑。\n\nMarcos\
  \ Fábio Pereira 为 Grails 创建了一个 Jasper 插件。事实上，Marcos 的工作为本章提供了一些灵感。所以在此向 Marcos 大声致谢：谢谢你，Marcos；你的出色工作得到了赞赏。\n\
  \nJasper 插件采用了嵌入式 SQL 方法。根据你的具体情况，这可能是一个适合你的解决方案。你可以通过运行 Grails 插件管理器来查看 Jasper\
  \ 插件，如图 10-11 所示。\n\n![9781430248064_Fig10-11.jpg](img/9781430248064_Fig10-11.jpg)\n\
  \n图 10-11 .  安装 Jasper 插件\n\n这将安装 Jasper 插件，输出如下所示：\n\n``` | Loading Grails 2.1.0\
  \ | Configuring classpath. | Environment set to development..... | Resolving plugin\
  \ jasper. Please wait… | Installing zip jasper-1.5.2.zip..... | Installed plugin\
  \ jasper-1.5.2 | Resolving plugin JAR dependencies..... | Plugin installed. ```\n\
  \n与我们上一节讨论的方法类似，要从 Jasper 创建报告，我们需要创建一个 `.jrxml` 文件并将其编译为 `.jasper` 报告文件。此外，我们使用\
  \ `jasperReport` 标签，如代码清单 10-10 所示。\n\n***代码清单 10-10.***  使用 jasperReport 标签\n\n\
  ``` <g:jasperReport controller=\"todo\" action=\"todoReport\" jasper=\"userTodo\"\
  \ format=\"PDF\"  /> <g:jasperReport controller=\"todo\" action=\"todoReport\" jasper=\"\
  userTodo\" format=\"XLS\"  /> ```\n\n`jasperReport` 标签的 `controller` 和 `action`\
  \ 属性共同指定要运行哪个操作来获取报告数据。`jasper` 属性指定要生成哪个报告，`format` 属性提供一种或多种报告格式供用户选择。代码清单 10-11\
  \ 展示了 `todoReport` 操作的片段。\n\n***代码清单 10-11.***  jasperReport 标签的 Action 属性\n\n```\
  \ def createReport() {         def todos = Todo.list()         chain(controller:'jasper',action:'index',model:[data:todos],params:params)\
  \ } ```\n\n图 10-12 显示了使用代码清单 10-10 和代码清单 10-11 的结果。\n\n![9781430248064_Fig10-12.jpg](img/9781430248064_Fig10-12.jpg)\n\
  \n图 10-12 .  报告的 pdf 和 xls 图标\n\n当我们在 `list.gsp` 中添加了 `jasperReport` 标签后，待办事项列表屏幕会显示用于\
  \ PDF 和 XLS 报告的 pdf 和 xls 图标。\n\n### 总结\n\n本章你收获颇丰。你没有为单个报告构建静态解决方案，而是构建了一个动态的报告功能，它支持多种报告和多种格式，并接受输入来驱动报告数据的选择。\n\
  \n在构建报告功能的过程中，你安装并配置了 JasperReports 报告引擎和 iReports 报告设计器。你使用 iReports 定义并编译了报告模板。\n\
  \n接着，你继续创建了一个报告标签库。你创建了供 `report` 标签调用的 `ReportController`。`ReportController` 负责促进数据收集并调用\
  \ `ReportService` 来生成报告。在 `ReportService` 中，你将 `Todo` 领域对象包装在 JavaBeans 数据源中，并将数据源、参数和报告模板传递给\
  \ JasperReports 报告引擎进行处理。\n\n\n\n报告引擎返回了报告的二进制版本，随后`ReportController`将其返回给用户。本章让你学到了一些新知识，并巩固了之前学过的内容。它向你展示了如何构建一个支持多种报告和格式的报告工具。下一章将在夜间批处理任务中利用`ReportService`生成并通过电子邮件发送用户待办事项报告。\
