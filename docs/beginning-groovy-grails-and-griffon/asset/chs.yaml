  \n### 脚手架\n\n脚手架允许你为给定的领域类自动生成整个应用程序，包括用于 CRUD 操作的视图和控制器*操作*。脚手架可以是静态的，也可以是动态的；两种类型的脚手架都会生成完全相同的代码。主要区别在于，在静态脚手架中，生成的代码在编译前对用户可用，并且可以在必要时轻松修改。然而，在动态脚手架中，代码在运行时于内存中生成，对用户不可见。我们将解释动态和静态脚手架，但在此之前，我们将创建一个领域类，然后使用脚手架为其自动生成整个应用程序。\n\
  \n### 创建领域类\n\n目前，我们创建的应用程序实际上并没有做任何事情；它只是渲染一个简单的文本响应。我们将继续创建一个领域类。要创建领域类，请使用 Grails\
  \ 的 `create-domain-class` 目标。这会在 `grails-app/domain` 目录中创建一个新的 Grails 领域类，并在 `test/unit`\
  \ 中为该领域类创建一个单元测试。\n\n要创建 `Todo` 领域类，你需要使用可选的类名执行 `create-domain-class` 目标，如下所示：\n\
  \n```bash\n> grails create-domain-class todo\n```\n\n如果你不提供类名，系统会提示你输入一个。执行 `create-domain-class`\
  \ 目标的输出如下所示：\n\n```bash\n| Created file grails-app/domain/collab/todo/Todo.groovy\n\
  | Created file test/unit/collab/todo/TodoTests.groovy\n```\n\n请注意，当使用可选的类名运行 `create-domain-class`\
  \ 目标时，你可以将类名保留为小写，Grails 会自动将其大写，以遵循标准的 Groovy 类命名约定。\n\n要使用 GGTS 创建领域类，请单击项目层次结构中的\
  \ `domain`，然后使用 `New` ![image](img/arrow.jpg) `Domain Class`，如图 4-15 所示。\n\n![9781430248064_Fig04-15.jpg](img/9781430248064_Fig04-15.jpg)\n\
  \n图 4-15 .  创建领域类\n\n清单 4-5 显示了生成的 `Todo` 领域类。\n\n***清单 4-5.***  Grails 生成的 Todo\
  \ 领域类\n\n```groovy\npackage collab.todo\n\nclass Todo {\n    static constraints\
  \ = {\n    }\n}\n```\n\n清单 4-5 中的 `Todo` 领域类看起来是最基本的 Groovy 类。正如你将在接下来的几节以及接下来的两章中学到的，Grails\
  \ 领域类远不止表面上看到的那么简单。\n\n清单 4-6 显示了在添加了 图 4-5 中 UML 图所示的字段后的 `Todo` 领域类。\n\n***清单\
  \ 4-6.***  添加了属性、约束和 `toString()` 方法后的 Todo 领域类\n\n```groovy\n 1. class Todo {\n\
  \ 2.\n 3.   String name\n 4.   String note\n 5.   Date createdDate\n 6.   Date dueDate\n\
  \ 7.   Date completedDate\n 8.   String priority\n 9.   String status\n10.\n11.\
  \   static constraints = {\n12.     name(blank:false)\n13.     createdDate()\n14.\
  \     priority()\n15.     status()\n16.     note(maxSize:1000, nullable:true)\n\
  17.     completedDate(nullable:true)\n18.     dueDate(nullable:true)\n19.   }\n\
  20.\n21.   String toString() {\n22.     name\n23.   }\n24. }\n```\n\n在清单 4-6 中，你会看到第\
  \ 3-9 行是 `String` 和 `Date` 类型的几个字段，这些字段是你在 `Todo` 领域类中期望看到的。然而，还有一些你未看到的附加属性，它们按照约定隐式地存在于\
  \ Grails 领域类中。这些属性包括 `id` 和 `version` 属性。\n\n正如你所料，`id` 属性表示一个唯一的自增标识符，在对象首次保存之前为\
  \ `null`。`version` 属性是 Hibernate 用于管理乐观锁的机制。每次保存对象时，其版本号都会递增，并且与 `id` 一样，它最初也是 `null`。在\
  \ Hibernate 保存任何对象之前，它首先检查数据库中的版本号，如果版本与即将保存的对象不匹配——意味着自上次读取以来它已被修改——Hibernate 将抛出\
  \ `org.hibernate.StaleObjectStateException`。\n\n第 11-19 行演示了 Grails 的约束结构。这些基本上是管理属性值的规则。例如，第\
  \ 12 行使用 `blank:false` 约束声明 `name` 属性是必需的且不能为空，而第 16-18 行的 `note`、`completedDate`\
  \ 和 `dueDate` 属性允许为 `null`。\n\n\n\n另外，请注意第 16 行的`note`属性最大长度为 1000 个字符。除了约束属性外，这些约束还决定了编辑页面上字段的排列顺序，以及\
  \ Grails 脚手架渲染的 HTML 表单字段类型。约束的顺序代表了页面上字段的顺序。虽然`String`通常由类型为`text`的 HTML 输入字段表示，但带有`maxSize`的`String`属性通常会渲染为文本区域的\
  \ HTML 输入字段，以支持更大的输入数据量。\n\n领域类也可以实现为方法的行为。第 21-23 行展示了重写的`toString()`方法。Grails\
  \ 领域类的默认`toString()`行为是打印类名，后跟冒号和对象 ID。为了让`toString()`更有帮助，第 21 行在`Todo`实例的`name`属性前添加了前缀。\n\
  \n本节只是浅尝辄止地介绍了领域类。你将在第 6 章中了解更多关于它们的内容。\n\n**动态脚手架**\n\n如前所述，动态脚手架在运行时为 CRUD 应用程序生成控制器操作和视图。要动态搭建领域类的脚手架，我们需要一个控制器。我们在清单\
  \ 4.1 中创建了一个控制器（`TodoController`）。要使用动态脚手架，请将`index`操作更改为`scaffold`属性，并为其分配领域类，如清单\
  \ 4-7 所示。仅此而已。这将为指定的领域类生成列表页面、创建页面、编辑页面和显示页面视图，以及删除功能。\n\n***清单 4-7.***  启用动态脚手架的\
  \ TodoController\n\n``` package collab.todo\nclass TodoController {\n    static\
  \ scaffold = Todo\n}\n```\n\n将`TodoController`更改为清单 4-7 所示的样子后，刷新浏览器并点击欢迎页面上的`TodoController`链接。\n\
  \n选择`TodoController`链接会将你带到图 4-16 所示的 Todo 列表页面。\n\n![9781430248064_Fig04-16.jpg](img/9781430248064_Fig04-16.jpg)\n\
  \n图 4-16 .  Todo 列表页面\n\n从图 4-16 所示的列表页面，你可以通过点击导航栏上的“新建 Todo”按钮来创建新的领域对象（如图 4-17\
  \ 所示）。\n\n![9781430248064_Fig04-17.jpg](img/9781430248064_Fig04-17.jpg)\n\n图 4-17\
  \ .  创建 Todo 页面\n\n保存页面按照约束的顺序显示属性列表，如图 4-17 的创建 Todo 页面所示。请注意，Grails 脚手架以适当的日期类型格式显示编辑字段。字符串显示为\
  \ HTML 文本输入字段，而`createdDate`则显示为一系列下拉菜单，用于选择月中的日、月、年、小时和秒。此外，由于`maxSize`约束，`note`属性显示为\
  \ HTML 文本区域输入。这还不是全部：Grails 脚手架还足够智能，能够使用约束进行表单验证，如图 4-18 所示。\n\n![9781430248064_Fig04-18.jpg](img/9781430248064_Fig04-18.jpg)\n\
  \n图 4-18 .  验证错误\n\n请注意，在图 4-18 中，如果表单提交时名称为空，页面顶部会显示一条验证消息。`blank:false`约束使得`name`属性成为必填项。\n\
  \n图 4-19 显示了一个只读视图。\n\n![9781430248064_Fig04-19.jpg](img/9781430248064_Fig04-19.jpg)\n\
  \n图 4-19 .  显示 Todo 页面\n\n显示 Todo 页面显示所有属性和值。它还提供了访问编辑 Todo 页面的途径，如图 4-20 所示，你可以在那里删除领域对象。\n\
  \n![9781430248064_Fig04-20.jpg](img/9781430248064_Fig04-20.jpg)\n\n图 4-20 .  编辑\
  \ Todo 页面\n\n图 4-20 所示的编辑 Todo 页面实际上与创建 Todo 页面相同，只是数据被重新填充为领域对象的值，并且页面底部有“更新”和“删除”按钮。\n\
  \n**静态脚手架**\n\n动态脚手架在测试领域类和开发原型时特别有用，但你可能希望自定义逻辑和视图。为此，你可以使用静态脚手架。静态脚手架也可以作为一个很好的学习工具，例如，用于理解\
  \ CRUD 应用程序的机制。要使用静态脚手架为领域类`Todo`生成控制器，请使用以下命令：\n\n``` > grails generate-controller\
  \  collab.todo.Todo\n```\n\n使用此命令，Grails 会在`grails-app/controllers`内生成`TodoController`类。`generate-controller`命令与之前介绍的`create-controller`命令不同，`create-controller`命令会创建一个带有默认操作`index()`的空控制器，而`generate-controller`命令则会创建包含所有\
  \ CRUD 操作代码的控制器。类似地，要生成视图，请使用以下命令：\n\n``` > grails generate-views  collab.todo.Todo\n\
  ```\n\n使用此命令，Grails 会在`grails-app/views/todo`内生成`.gsp`文件。\n\nGrails 还提供了在一个命令中同时生成控制器和视图的可能性，如下所示：\n\
  \n``` > grails generate-all  collab.todo.Todo\n```\n\n使用静态脚手架时需要记住一件重要的事情：因为所有控制器代码和视图代码都是为领域类生成的，如果领域类发生更改，Grails\
  \ 不会更新这些代码，并将此责任移交给开发人员。\n\n**完成剩余的领域**\n\n现在你已经创建了`Todo`领域和控制器类，你可以重复这些步骤来为剩余的领域和控制器（`Category`和`User`）创建领域类和控制器类。然后，你可以添加领域类之间的关系。\n\
  \n如图 4-5 中的 UML 图所示，`Category`类非常简单。清单 4-8 显示了使用 Grails 的`create-domain-class`目标生成类后，并从\
  \ UML 图中添加属性后的代码。\n\n***清单 4-8.***  Category 领域类\n\n``` package collab.todo\nclass\
  \ Category {\n    String name\n    String description\n\n    static constraints\
  \ = {\n        name(blank:false)\n    }\n\n    String toString() {\n        name\n\
  \    }\n}\n```\n\n在清单 4-8 中，你看到`Category`类只有`name`和`description`属性，以及一个返回`name`属性的重载`toString()`方法。这个重载的`toString()`方法稍后会变得很重要，因为它用于填充\
  \ HTML 选择字段。没有它，选择字段将只显示类别的 ID，使得在列表中区分类别变得困难。`Category`类还包含一个约束，要求`name`属性为必填项。\n\
  \n`User`领域类遵循与`Todo`和`Category`类相同的模式。清单 4-9 显示了使用 Grails 的`create-domain-class`目标生成类后，并从\
  \ UML 图中添加属性后的代码。\n\n***清单 4-9.***  User 领域类\n\n``` package collab.\n\n\n\n```groovy\n\
  class User {\n    String userName\n    String firstName\n    String lastName\n\n\
  \    static constraints = {\n        userName(blank:false,unique:true)\n       \
  \ firstName(blank:false)\n        lastName(blank:false)\n    }\n\n    String toString\
  \ () {\n        \"$lastName, $firstName\"\n    }\n}\n```\n\n在清单 4-9 中，`User` 类包含了\
  \ `userName`、`firstName` 和 `lastName` 属性。它还包含了一些约束条件，使得所有属性都是必填项，并强制 `userName`\
  \ 属性在数据库中唯一。最后，重写的 `toString()` 方法以“姓在前，名在后”的格式返回用户名。\n\n### 完成剩余的控制器\n\n控制器类与 `TodoController`\
  \ 如出一辙。清单 4-10 展示了使用 Grails `create-controller` 目标创建并设置了脚手架变量后的 `CategoryController`。\n\
  \n***清单 4-10.***  CategoryController\n\n```groovy\npackage collab.todo\n\nclass\
  \ CategoryController {\n    static scaffold = Category\n}\n```\n\n清单 4-11 展示了 `UserController`。\n\
  \n***清单 4-11.***  UserController\n\n```groovy\npackage collab.todo\n\nclass UserController\
  \ {\n    static scaffold = User\n}\n```\n\n完成 `Category` 和 `User` 的领域类及控制器类后，应用程序的起始页面会显示所有三个控制器。此外，点击相应的控制器链接，即可访问\
  \ `Category` 和 `User` 的 CRUD 页面。Grails 还提供了统计功能。在命令提示符下，输入 `grails stats`，您应该会看到类似如下的输出：\n\
  \n```shell\nD:\\devl\\workspace\\collab-todo>grails stats\n```\n\n```text\n+−−--------------------+−−-----+−−-----+\n\
  | Name                 | Files |  LOC  |\n+−−--------------------+−−-----+−−-----+\n\
  | Controllers          |     3 |    12 |\n| Domain Classes       |     3 |    54\
  \ |\n| Unit Tests           |     6 |    60 |\n+−−--------------------+−−-----+−−-----+\n\
  | Totals               |    12 |   126 |\n+−−--------------------+−−-----+−−-----+\n\
  ```\n\n### 创建领域关系\n\n目前，您有三个独立的领域类——`Todo`、`Category` 和 `User`——它们之间没有任何关系。但请记住，图\
  \ 4-5 中的 UML 图显示，用户拥有用户定义的类别以及按类别组织的待办事项。现在是时候使用 `belongsTo` 和 `hasMany` 属性来表示领域类之间的这些一对多关系了。\n\
  \n清单 4-12 展示了新的 `Todo` 类，其中显示了与 `User` 和 `Category` 的关系。\n\n***清单 4-12.***  与 User\
  \ 和 Category 领域类建立关系的 Todo 领域类\n\n```groovy\nclass Todo {\n    String name\n   \
  \ String note\n    Date createdDate\n    Date dueDate\n    Date completedDate\n\
  \    String priority\n    String status\n    User owner\n    Category category\n\
  \n    static belongsTo = [User, Category]\n\n    static constraints = {\n      \
  \  name(blank:false)\n        createdDate()\n        priority()\n        status()\n\
  \        note(maxSize:1000, nullable:true)\n        completedDate(nullable:true)\n\
  \        dueDate(nullable:true)\n    }\n\n    String toString() {\n        name\n\
  \    }\n}\n```\n\n请注意，在清单 4-12 中，通过 `belongsTo` 属性定义了与 `User` 和 `Category` 类的关系。我们还添加了新的\
  \ `owner` 和 `category` 属性。`belongsTo` 告诉 GORM，如果关联的用户或类别被删除，则删除相应的待办事项。脚手架会在“创建待办事项”和“编辑待办事项”屏幕上将这些关系呈现为选择字段，如图\
  \ 4-21 所示。\n\n![9781430248064_Fig04-21.jpg](img/9781430248064_Fig04-21.jpg)\n\n\
  图 4-21 . 带有类别和所有者选择字段的创建待办事项编辑页面\n\n与 `Todo` 类类似，`Category` 类与 `User` 有 `belongsTo`\
  \ 关系，但它也包含一个 `Todo` 的集合，如清单 4-13 所示。\n\n***清单 4-13.***  与 User 和 Todo 领域类建立关系的 Category\
  \ 领域类\n\n```groovy\nclass Category {\n    String name\n    String description\n\
  \    User user\n    static belongsTo = User\n    static hasMany = [todos: Todo]\n\
  \n    static constraints = {\n        name(blank:false)\n    }\n\n    String toString()\
  \ {\n        name\n    }\n}\n```\n\n请注意，除了与 `User` 关联的 `belongsTo` 之外，`Category`\
  \ 还包含一个 `hasMany` 属性，这是一个指定与 `Todo` 类一对多关系的映射。此外，可以通过 `todos` 属性访问该集合。\n\n最后，清单\
  \ 4-14 中的 `User` 类现在定义了与 `Todo` 和 `Category` 的关系。\n\n***清单 4-14.***  与 Todo 和 Category\
  \ 领域类建立关系的 User 领域类\n\n```groovy\nclass User {\n    String userName\n    String\
  \ firstName\n    String lastName\n\n    static hasMany = [todos: Todo, categories:\
  \ Category]\n\n    static constraints = {\n        userName(blank:false,unique:true)\n\
  \        firstName(blank:false)\n        lastName(blank:false)\n    }\n\n    String\
  \ toString () {\n        \"$lastName, $firstName\"\n    }\n}\n```\n\n如清单 4-14 所示，包含与\
  \ `Todo` 和 `Category` 类的关系所需的更改仅需一行代码。`hasMany` 属性标识了名为 `todos` 和 `categories` 的集合。\n\
  \n![image](img/sq.jpg) **注意** 我们将在第 6 章中更详细地讨论关系。\n\n如前所述，当您运行应用程序时，Hibernate 会根据领域类创建数据库模式。图\
  \ 4-22 显示了到目前为止领域类的实体关系图。\n\n![9781430248064_Fig04-22.jpg](img/9781430248064_Fig04-22.jpg)\n\
  \n图 4-22 . 实体关系图\n\n请注意，实体关系图看起来与图 4-5 中显示的 UML 图几乎相同。Hibernate 创建了三个表，表名基于类名。它还为每个属性创建字段，使用下划线代替驼峰式命名。另外，请注意\
  \ `id` 和 `version` 列是 Hibernate 用于对象标识和乐观锁的列。Hibernate 还创建外键来表示领域类之间的关系。\n\n在开发过程中，开箱即用的\
  \ Grails 使用 Tomcat Web 容器和嵌入式 H2 数据库。然而，许多生产环境使用其他 Web 容器或应用服务器，并使用基于服务器的数据库。在第\
  \ 12 章中，我们将探讨如何将应用程序打包和部署到替代的运行环境。\n\n### H2 控制台\n\n如前所述，Grails 2.0 在开发模式下启用了 H2\
  \ 数据库控制台（URI 为 `/dbconsole`），以便可以轻松地从浏览器查询内存数据库。要查看运行中的 dbconsole，请浏览至 `http://localhost:8080/collab-todo/dbconsole`。默认的登录参数应与\
  \ `grails-app/conf/Datasource.groovy` 中的默认值匹配，如图 4-23 所示。\n\n![9781430248064_Fig04-23.jpg](img/9781430248064_Fig04-23.jpg)\n\
