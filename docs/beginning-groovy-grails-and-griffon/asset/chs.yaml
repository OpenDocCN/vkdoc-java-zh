  \   println \"hello world\"\n  }\n}\nprintln \"hello world\" ```\n\n清单 3-4 展示了一个名为\
  \ *Hello.groovy* 的文件，其中包含脚本和两个类。编译此文件将生成三个类：*Hello.class*、*HelloWorld1.class* 和\
  \ *HelloWorld2.class*。\n\n***清单 3-4.***  Hello.groovy 文件：包含脚本和两个类\n``` class HelloWorld1{\n\
