  \ `lastName` 之前，创建按钮不会启用。我们将在下一节向你展示如何增强应用的外观和感觉，但在此之前，我们将介绍一个对于应用框架必须提供的功能而言非常重要的主题：应用生命周期。\
  \    ![9781430248064_Fig13-04.jpg](img/9781430248064_Fig13-04.jpg)    图 13-4 .  增强后的应用\
  \    Griffon 应用生命周期    Griffon 是一个开源、富客户端平台框架。在富客户端应用中，客户端不仅提供 UI（用户界面），还负责数据处理。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n富客户端应用程序通常构建在框架之上，借助插件实现可扩展性，并且可以通过全球分发的应用程序进行无缝更新。桌面应用程序共享一些通用特性，例如菜单、工具栏等。对于此类特性，富客户端平台提供了一个框架，可以快速滚动和组装这些特性。富客户端平台还提供了配置和扩展基础设施，框架可以通过这些基础设施声明式地加载菜单等特性，从而使开发人员能够专注于应用程序的核心业务。为此，桌面应用程序的关键关注点之一是其组件的生命周期管理。桌面应用程序应负责自举，为正在加载的组件分配资源，并在不需要时实例化并释放已分配的资源。Griffon\
  \ 通过其定义良好的生命周期管理解决了所有这些关注点。每个 Griffon 应用程序都会经历相同的生命周期阶段，无论它们以何种模式运行，但小程序模式除外，该模式多了一个阶段。每个阶段都有一个关联的生命周期脚本，该脚本将在适当的时间被调用，这些脚本位于应用程序结构中的\
  \ `griffon-app/lifecycle` 目录下。这些阶段如下：\n*   初始化\n*   启动\n*   就绪\n*   关闭\n*   停止\n\
  \n**初始化**\n\n初始化阶段是应用程序生命周期调用的第一个阶段。此时应用程序实例刚刚创建，其配置也已读取，但您还不能访问任何 MVC 成员。此阶段通常用于针对当前平台调整应用程序，包括其外观和感觉。清单\
  \ 13-9 展示了此阶段脚本（`Initialize.groovy`）中的代码。\n\n***清单 13-9.***  Initialize.groovy\n\
  \n```groovy\nimport groovy.swing.SwingBuilder\nimport static griffon.util.GriffonApplicationUtils.isMacOSX\n\
  \nSwingBuilder.lookAndFeel((isMacOSX ? 'system' : 'nimbus'), 'gtk', ['metal', [boldFonts:\
  \ false]])\n```\n\n此脚本中的代码使用一组名称来配置外观和感觉，这些名称解析为特定的 `lookAndFeel` 设置。\n\n**启动**\n\
  \n启动阶段负责实例化在应用程序配置（`Application.groovy`）中定义的所有 MVC 组，这些组在同一配置文件中也被标记为启动组。\n\n**就绪**\n\
  \n就绪阶段在启动阶段之后立即调用，条件是 UI 队列中没有待处理的事件。应用程序的主框架在此阶段结束时显示。此时应用程序已完全初始化；在应用程序准备好进入下一个生命周期阶段（关闭）之前，不会调用任何进一步的生命周期脚本。\n\
  \n**关闭**\n\n关闭阶段在应用程序即将关闭时开始。任何工件都可以通过调用应用程序实例上的 `shutdown()` 来启动关闭序列。这是 Griffon\
  \ 调用的最后一个生命周期脚本。关闭阶段代表了释放已用资源、保存配置设置以及关闭应用程序可能已打开的任何连接的最后机会。\n\n**停止**\n\n停止阶段仅在以小程序模式运行时可用。当小程序容器在小程序实例上调用\
  \ `destroy()` 时，会调用此阶段。\n\n这些就是 Griffon 应用程序生命周期中的所有阶段。它很简单，但却是 Griffon 对抗痛苦桌面应用程序开发的强大武器。您无需弄清楚每个任务应在何时以及如何被调用，而是让\
  \ Griffon 在需要时调用阶段处理脚本。这些脚本保证在 UI 线程（Swing 中的事件分发线程）内被调用。\n\n脚本名称与每个阶段名称匹配；您可以在\
  \ `griffon-app/lifecycle` 目录中找到它们。在下一节中，我们将深入探讨视图。\n\n![image](img/sq.jpg) **注意**\
  \ Swing 工具包有一条规则：所有长时间的计算必须在事件分发线程（简称 EDT）之外执行。该规则还规定，所有与 UI 组件的交互都必须在 EDT 内完成，包括构建组件和读取/写入组件属性。有关\
  \ Swing 并发的更多信息，可以从 `http://docs.oracle.com/javase/tutorial/uiswing/concurrency/index.html`\
  \ 获取。\n\n**视图**\n\nGroovy 可以做 Java 能做的任何事情。如果您从 Java 的角度考虑开发用户界面的目标，您有两个选择：Swing\
  \ 或标准小部件工具包（SWT）。任选其一都可以。您可以像在普通 Java 程序中一样，直接开始编写 Groovy 并使用 Swing 或 SWT。但是，如果您曾经编写过\
  \ Swing 或 SWT 代码，您现在可能不会太兴奋。\n\nGroovy 使用构建器¹来简化工作。它既有 Swing 系列的构建器（`SwingBuilder`²、`SwingXBuilder`\
  \ 和 `JideBuilder`³），也有 SWT 构建器（`SwtBuilder`⁴）。使用 Groovy 和构建器将使创建客户端应用程序变得容易得多。通常，Java\
  \ 开发人员更可能熟悉 Swing 而非 SWT。因此，我们将向您展示如何使用 Swing 作为表示技术，并使用 `SwingXBuilder` 来简化操作。`SwingXBuilder`\
  \ 扩展了 `SwingBuilder`，提供了对 `SwingBuilder` 所有功能的访问，以及来自 SwingLabs⁵ 的 Swing 组件。\n\n\
  **构建器概述**\n\nSwing 用户界面可以被视为图形组件的组合或树。如果您使用 Swing 进行过编程，您无疑熟悉将组件添加到其父组件的无休止模式。这可能是一个复杂、冗长的混乱局面。Groovy\
  \ 使用构建器来解决这个混乱。\n\n如果您花过一些时间使用 Groovy，您可能已经见过或使用过 `MarkupBuilder` 来构建 HTML 或 XML\
  \ 文档。构建器同样可以用于构建 Swing UI。\n\n理解 `SwingXBuilder` 价值的最简单方法是看一个例子。清单 13-10 展示了如何使用\
  \ `SwingXBuilder` 创建一个简单的用户界面。\n\n***清单 13-10.***  使用 SwingXBuilder 创建简单 UI\n\n\
  ```groovy\nimport groovy.swing.SwingXBuilder\nimport static javax.swing.WindowConstants.EXIT_ON_CLOSE\n\
  import javax.swing.*\n\nclass SimpleUI {\n    static void main(args) {\n       \
  \ def simpleUI = new SimpleUI()\n        simpleUI.run()\n    }\n        def swing\n\
  \    def count = 0\n\n    def run = {\n          swing = new SwingXBuilder()\n \
  \         swing.lookAndFeel('system')\n\n          // create the actions\n     \
  \     swing.action(id: 'exitAction',\n            name: 'Exit',\n            closure:\
  \ this.&exit,\n            mnemonic: 'x',\n            accelerator: 'F4',\n    \
  \        shortDescription: 'Exit SimpleUI'\n          )\n          swing.action(id:\
  \ 'aboutAction',\n            name: 'About',\n            closure: this.&showAbout,\n\
  \            mnemonic: 'A',\n            accelerator: 'F1',\n            shortDescription:\
  \ 'Find out about SimpleUI'\n          )\n          swing.action(id: 'clickAction',\n\
  \            name: 'Click',\n            closure: this.&click,\n            shortDescription:\
  \ 'Increment the Click Count'\n          )\n\n          // Define the Frame\n  \
  \        swing.\n\n\n\nframe(id:'simpleUIFrame', title: 'SimpleUI',                 location:\
  \ [100,100],                 defaultCloseOperation: EXIT_ON_CLOSE             )\
  \ {           // 定义菜单栏           menuBar {               menu(text: '文件', mnemonic:\
  \ 'F') {                   menuItem(exitAction)               }               glue()\
  \               menu(text: '帮助', mnemonic: 'H') {                   menuItem(aboutAction)\
  \               }           }            // 定义一些内容           button(id:'clickButton',\
  \ text:\"点击我\", action: clickAction)           // 在此处插入更多内容             }            swing.simpleUIFrame.pack()\
  \           swing.simpleUIFrame.show()     }      void click(event) {       count++\
  \       swing.clickButton.text = \"已点击 ${count} 次。\"     }     void showAbout(event)\
  \ {       JOptionPane.showMessageDialog(swing.simpleUIFrame, '\"这是 SimpleUI 应用程序''')\
  \     }     void exit(event) {       System.exit(0)     } } ```    执行 SimpleUI 应用程序将创建如图\
  \ 13-5 所示的用户界面。    ![9781430248064_Fig13-05.jpg](img/9781430248064_Fig13-05.jpg)\
  \    图 13-5 .  SimpleUI 应用程序    SimpleUI 应用程序创建了一个 Swing 用户界面，其特色是包含一个菜单栏，菜单栏中有“文件”菜单、“帮助”菜单，以及内容区域中的一个按钮。每次用户点击该按钮时，按钮上的文本都会改变。程序启动时，它会调用\
  \ `run` 闭包来构建 UI。`run` 闭包设置构建器，然后使用该构建器创建三个将在 UI 中使用的动作。接着，闭包使用构建器创建框架。框架包含一个菜单栏，菜单栏中包含“文件”和“帮助”菜单。每个菜单都包含引用先前创建的动作的菜单项。框架还包含一个标记为“点击我”的按钮，以及对\
  \ `clickAction` 动作的引用。    如果你更仔细地查看这些动作，你会注意到在创建动作时，一个名为 `closure` 的参数被传递给了构建器。对于\
  \ `clickAction`，要执行的闭包是 `click`。`click` 闭包会递增一个计数器并设置按钮的文本。    Griffon 视图    视图通常被编写为\
  \ Groovy 脚本，通过使用构建器节点组合元素来创建 UI。Griffon 默认支持 `SwingBuilder` 提供的所有节点。    可以在 `griffon-app/conf/Builder.groovy`\
  \ 中配置额外的节点；Griffon 运行时会确保正确设置构建器。    清单 13-11 展示了位于应用程序结构中的 `griffon-app/conf` 目录下的\
  \ `Builder.groovy`。    ***清单 13-11.***  Builder.groovy    ``` root {   'groovy.swing.SwingBuilder'\
  \ {     controller = ['Threading']     view = '*'   } } ```    在 清单 13-11 中，`root`\
  \ 节点是顶级节点，用于标记构建器使用的默认命名空间。如果你需要向控制器暴露额外的节点，请向 `Builder.groovy` 添加一个新的构建器，并将新构建器的所有库和依赖项放在应用程序的\
  \ `lib` 目录中。清单 13-12 演示了如何将 `MacWidgetsBuilder` (`http://griffon.codehaus.org/MacWidgetsBuilder`)\
  \ 添加到 `Builder.groovy`。    ***清单 13-12.***  将 MacWidgetsBuilder 添加到 Builder.groovy\
  \    ``` root {   'groovy.swing.SwingBuilder' {     controller = ['Threading']     view\
  \ = '*'   }   'griffon.builder.macwidgets.MacWidgetsBuilder'{     view = '*'   }\
  \ } ```    你也可以将以下行追加到默认的 `Builder.groovy` 文件中，作为清单 13-10 中 `MacWidgetsBuilder`\
  \ 块的替代方案。    ``` root.'griffon.builder.macwidgets.MacWidgetsBuilder'.view = '*'\
  \ ```    通过插件可以自动将构建器添加到你的构建器配置中。\n\n`http://griffon.codehaus.org/Builders` 上显示的所有构建器都有配套的插件，这些插件会自动添加构建器，这样你就不必手动添加了。此外，还有许多插件（参见\
  \ `http://artifacts.griffon-framework.org/plugins/`）可以提供你可以在视图中使用的额外节点。    你也可以通过在命令提示符下调用\
  \ `list-plugins` 命令目标来获取所有可用插件的列表。    ``` > griffon list-plugins ```    调用此命令会显示一个所有可用插件的表格，如图\
