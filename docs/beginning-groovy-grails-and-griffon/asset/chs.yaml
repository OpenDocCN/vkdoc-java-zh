  \ 获取所有拥有电子邮件地址的用户，然后针对每个用户，获取其待办事项并准备调用报告服务。  \n\n**调用报告服务**  \n\n在第 10 章中，你使用 JasperReports\
  \ 构建了一个报告工具。你可以复用该报告工具的组件来创建一份待办事项报告 PDF，并将其附加到电子邮件中。  \n\n你的第一反应可能是使用 `ReportController`。但这样行不通。报告控制器依赖于\
  \ HTTP 会话，并将 PDF 渲染到输出流中。你需要深入一层，直接使用 `ReportService`。  \n\n我们已经获取了用户的待办事项。现在我们需要做的就是将待办事项、报告模板以及一个用户名参数传递给报告服务。清单\
  \ 11-5 中高亮显示的部分说明了所需的步骤。  \n\n***清单 11-5.***  调用报告服务  \n\n```  \nclass BatchService\
