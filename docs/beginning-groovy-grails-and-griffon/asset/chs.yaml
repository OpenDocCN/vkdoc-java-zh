  \    图 5-6 .  登录视图    让我们看一下登录链接：`<g:link controller=\"user\" action=\"login\">Login</g:link>`。当用户选择“登录”链接时，会调用`UserController`上的`login`操作。我们将在下一节解释`login`操作。\
