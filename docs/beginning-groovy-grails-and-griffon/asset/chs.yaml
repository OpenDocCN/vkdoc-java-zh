  \ 类。\n\n**创建 Collab-Todo 应用程序**\n\n要创建 Collab-Todo 应用程序，您需要在命令行中使用可选的 project name\
  \ 执行 `create-app` 目标，如下所示：\n\n```\n> grails create-app collab-todo\n```\n\n前面命令行中的整行是一条命令，其中\
