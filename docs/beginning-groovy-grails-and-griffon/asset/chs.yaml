  \ `Todo` 领域对象中添加了 `static searchable = true` 这一行，如清单 8-3 所示。    ***清单 8-3.***  在\
  \ domain/Todo.groovy 中将我们的 Todo 标记为可搜索    ``` class Todo {     static searchable\
  \ = true     // . . . 继续 . . . } ```    这就是我们需要做的全部工作。那么这给我们带来了什么呢？如果你访问 `http://localhost:8080/collab-todo/searchable`，你会看到默认的搜索页面（见图\
