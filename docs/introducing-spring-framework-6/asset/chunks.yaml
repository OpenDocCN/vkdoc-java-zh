    ## Summary


    We’ve taken a lightning tour through the Spring MVC paradigm, using Spring Data
    for our data access (the model) and Thymeleaf for the presentation (the view),
    including internationalization to a light degree. In our next chapter, we’re going
    to integrate with external messaging systems.


    # Chapter 9: Integrating Your Spring Application with External Systems


    In previous chapters, we’ve focused on processes that are *synchronous processes*
    – we issue a command to a database and get a response, or we make a web request,
    and it gives us a rendered page. In this chapter, we’re going to introduce *asynchronous
    processing*, processes that do not create an immediate response.


    We’re also going to change approach slightly. In prior chapters, we’ve been building
    a “search engine” app, but the result is a lot of duplicated code, much of which
    isn’t relevant to the subject matter we’re addressing in a given chapter. We’re
    still going to duplicate *some* code, but we’re going to start trimming the scope
    of the “application” down, to save space and to focus on the specific techniques
    we’re addressing. Readers should be able to easily integrate the new topics into
    a wider codebase without much effort.


    Asynchronous processes are highly useful in computing, because they remove *time
    pressure* from responses, by their very nature. An HTTP request, for example,
    might need to respond in 10 milliseconds, or else the user might perceive the
    app as being “laggy” or slow. That can be difficult to address, because the web
    *client* is requesting data from a specific server, and that server can be presumed
    to have finite resources. If it’s a busy shopping day, and the consumers are hitting
    the web server with 400 requests more per second than it was designed to handle,
    you’re going to have a lot of unhappy customers, and fixing that problem isn’t
    trivial.


    With asynchronous processing, what typically happens is that each request gets
    put into a queue, and processes watch that queue for requests; if the queue gets
    backed up (because the things that watch the queue aren’t fast enough), then you
    simply add more watchers. If the queue empties, you can then reduce the number
    of watchers, to minimize resource consumption.


    In Chapter 6, we looked at the `JdbcTemplate` class as our gateway to working
    directly with JDBC (before introducing more flexible mechanisms using Spring Data).


    The reason we looked at `JdbcTemplate`, even though few programmers should target
    it directly without specific need, is because the templating model turns out to
    be quite applicable in other contexts, such as asynchronous programming.


    ## The Process


    We’re going to use the Java Message Service (JMS) as our example. There are other
    messaging APIs, but the good news for us is that while they do have slightly different
    specifics compared to JMS, we can switch to them without changing our architectural
    approach. JMS is, incidentally, a generalized messaging API itself; we might be
    using a messaging transport like AMQP 1.0, AMQP 0.9, or MQTT even though we’re
    using JMS as our access layer.'
