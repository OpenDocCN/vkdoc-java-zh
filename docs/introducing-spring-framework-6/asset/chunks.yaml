- fmt: "# 使用动态语言\n\n大多数用户可能会关注 Groovy 机制，因为它最简单直接，但高级用户可能会发现自己在某些时候会使用`<lang:std />`。\n\
    \n当我们使用`<lang:groovy />`指定一个 bean 时，我们可以通过`script-source`属性指定脚本从类路径或文件系统加载。如果不使用`script-source`，我们可以使用`<lang:inline-script/>`在配置文件本身中提供脚本内容。\n\
    \n我们还可以指定`refresh-check-delay`属性，该属性指定一个以毫秒为单位的时间段，在此之后动态 bean 的内容将被刷新。这意味着，如果你从文件系统加载（而不是从\
    \ Java 归档文件、zip 文件或其他静态资源加载），你可以在运行时编辑文件，并在正在运行的应用程序中实时看到更改的反映。\n\n**注意** 我们不会在本章中演示`refresh-check-delay`，因为在书中反映实时的文件系统更改本质上很困难，但这可能是\
    \ Spring 中动态脚本功能的**最佳特性**，因为它允许你在正在运行的容器中进行功能的实时开发，而无需依赖执行实时重新加载等的特殊\"开发\"模式。更重要的是，由于动态语言往往比\
    \ Java 本身更宽容，因此它非常适合快速原型开发。对于此功能，你需要将文件系统位置添加到类路径，并从文件系统加载脚本；更改脚本，设置`refresh-check-delay`，你的脚本将随时按原样执行，包括你的实时编辑。\n\
    \n话虽如此，让我们继续深入。\n\n## 最简单的动态 MessageService\n\n首先，让我们看看 Groovy 中`MessageService`接口的一个非常简单的实现，以便了解需要什么以及代码可能是什么样子。\n\
    \n***清单 12-3.*** `chapter12/src/test/resources/scripts/gmessage.groovy`\n\n```groovy\n\
    import md.MessageService\n\nclass GMessage implements MessageService {\n\n   \
    \ @Override\n    String getMessage() {\n\n        return 'hello world, man'\n\
    \    }\n}\n```\n\n这里的一切都直接映射到我们在 Java 中期望的内容，除了包声明和一些标准的 Java 语法（例如行终止分号）。当然，分号在\
    \ Groovy 中是不必要的，包在这里也不是特别重要；我们可以使用一个包，但脚本在自己的脚本上下文中运行，因此通常没有必要。\n\n这里的简单性是可以的，因为我们并不是要演示\
    \ Groovy 有多强大——一个简单的实现就足够了，我们很快就会看到稍微更 Groovy 风格的脚本。\n\n有了这个，现在我们准备看看如何在 Spring\
    \ 配置中定义它。\n\n以下是本章中我们将看到的三个 Spring 配置中的第一个；它简单地从类路径加载我们的`gmessage.groovy`脚本，并将其提供给我们的\
    \ Spring 应用程序。\n\n***清单 12-4.*** `chapter12/src/test/resources/simple-context.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/lang\n    http://www.springframework.org/schema/lang/spring-lang.xsd\"\
    >\n\n    <lang:groovy name=\"gmessage\"\n        script-source=\"classpath:/scripts/gmessage.groovy\"\
    />\n</beans>\n```\n\n这里需要注意的一点是，我们为脚本命名（为\"`gmessage`\"）——但这实际上并不是我们通常认为的 Spring\
    \ bean。如果我们使用`context.getBeanDefinitionNames()`获取 bean 名称，我们会看到类似`org.springframework.scripting.groovy.GroovyScriptFactory#0`的名称，而不是`gmessage`。然而，Spring\
    \ 的`ApplicationContext`会提供一个 bean 引用，如果我们使用名称（即`context.getBean(\"gmessage\")`）或类型（如`context.getBean(MessageService.class)`）。"
  raw: 'Most users will probably zero in on the Groovy mechanism, as it’s the simplest
    and most straightforward, but advanced users might find themselves using <lang:std
    /> at some point.


    When we specify a bean using <lang:groovy />, we can specify that the script is
    to be loaded from the classpath or filesystem, using the script-source attribute.
    If we don’t use script-source, we can provide the script content in the configuration
    file itself, using <lang:inline-script/>.


    Chapter 12 Using DynamiC LangUages


    We can also specify a refresh-check-delay attribute, which specifies a time period
    in milliseconds after which the dynamic bean’s content will be refreshed. This
    means that if you’re loading from the filesystem (as opposed to loading from a
    java archive, a zip file, or some other static resource), you can edit the file
    during runtime and see changes reflected live in your running application.


    **Note** We’re not demonstrating refresh-check-delay in this chapter, because
    reflecting live filesystem changes is essentially difficult to do in a book, but
    this is probably the *absolute best feature* of the dynamic scripting facility
    in spring, because it allows you to do live development of features in a running
    container, without relying on special “development” modes that do live reloading,
    etc. What’s more, since the dynamic languages tend to be a bit more forgiving
    than Java itself is, it’s fantastic for rapid prototyping. For this feature, you
    would add a filesystem location to the classpath and load the scripts from the
    filesystem; change the


    script, with refresh-check-delay set, and your script will be executed as it is


    at any given moment, including your live edits.


    With all that said, let’s keep going further.


    **The Simplest Dynamic MessageService**


    First, let’s take a look at a very simple implementation of our MessageService
    interface in Groovy, just to get a sense of what’s required and what the code
    might look like.


    ***Listing 12-3.*** chapter12/src/test/resources/scripts/gmessage.groovy **import**
    md.MessageService


    **class** GMessage **implements** MessageService {


    @Override


    String getMessage() {


    **return** ''hello world, man''


    }


    }


    Chapter 12 Using DynamiC LangUages


    Everything here maps directly to what we’d expect in Java, with the exception


    of a package declaration and some of the standard Java grammar such as the line-


    terminating semicolons. The semicolons are unnecessary in Groovy, of course, and
    the package isn’t exceptionally important here either; we can use one, but the
    scripts run in their own scripting context, so generally it’s unnecessary.


    The simplicity here is okay, because we’re not trying to demonstrate how powerful
    Groovy can be – a simple implementation is enough, and we’ll get to slightly more
    Groovy-ish scripts soon.


    With this, now we’re ready to see how it might be defined in a Spring configuration.


    Here’s the first of three Spring configurations we’ll see in this chapter; it
    simply loads our gmessage.groovy script from the classpath and provides it to
    our Spring application.


    ***Listing 12-4.*** chapter12/src/test/resources/simple-context.xml


    <?xml version="1.0" encoding="UTF-8"?>


    < **beans**


    xsi:schemaLocation="http://www.springframework.org/schema/beans


    http://www.springframework.org/schema/beans/spring-beans.xsd


    http://www.springframework.org/schema/lang


    http://www.springframework.org/schema/lang/spring-lang.xsd">


    < **lang:groovy** name="gmessage"


    script-source="classpath:/scripts/gmessage.groovy"/>


    </**beans**>


    One thing to note here is that we’ve named our script (as "gmessage") – but this
    isn’t actually a Spring bean the way we normally think of it. If we were to get
    the bean names with context.getBeanDefinitionNames(), we would see a name


    like org.springframework.scripting.groovy.GroovyScriptFactory#0 but not


    gmessage. Spring’s ApplicationContext will, however, provide a bean reference
    if we use the name – i.e., context.getBean("gmessage") – or the type, like context.


    getBean(MessageService.class).'
