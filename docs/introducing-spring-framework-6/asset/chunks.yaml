    It’s worth noting here: source code is also going to be complete unless otherwise
    specified.


    In the past, many programming books chose to describe parts of source files, so
    a given file on disk might be represented in four or five (or more!) source listings
    in paper.


    This means that readers were forced to rely on source code downloads, or their
    own attention to detail, to see the source files as intended.


    Instead, if you see a source file, you’re going to see all of it unless it’s already
    been presented, or organization requires otherwise; it’s possible that individual
    methods or sections will be presented before the entire file is shown, but the
    entire source file will be shown in its entirety.


    With that out of the way, it’s time to finally see some code!


    Our “Hello, World” application will use a Spring component, a “bean,” that


    implements a “message service.” This application will be vastly overengineered
    for what it’s designed to do, but it will validate that Spring itself is working
    in our application.


    It will have three parts, the “message service” definition itself, an implementation
    of that interface, and then an application that uses the interface and its definition.


    First, let’s take a look at the message service.


    ***Listing 1-4.*** chapter01-hello-world/src/main/java/chapter01/


    MessageService.java


    **package chapter01**;


    **public interface** MessageService {


    **public** String getMessage();


    }


