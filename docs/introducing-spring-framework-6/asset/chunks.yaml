  trans: '

    *《Spring Framework 6 入门》*是一本面向所有初识 Spring 框架并希望学习如何使用它构建应用程序的开发者的实践指南。在本书中，你将找到使用
    Spring 框架及其所有特性和模块创建企业级应用所需的所有必要元素。


    xv


    引言


    **本书的组织结构**


    本书使用一个简单的 **My Documents** 应用程序，你将在学习过程中逐步对其进行开发。全书共分为以下四个部分：


    • 第一部分：Spring 框架基础：你将学习依赖注入设计模式、Spring 的容器实现，以及它如何通过面向接口编程帮助你实现更好的设计。你将了解可以应用于
    Spring 框架的不同配置。你还将学习如何使用 Bean 作用域、处理集合和资源文件，以及如何测试你的 Spring 应用程序。


    • 第二部分：Spring 框架：你将学习如何添加持久化功能，并将你的 Spring 应用程序与其他系统集成。你还将能够将你的 Spring 应用程序部署到
    Web 上。


    • 第三部分：Spring 框架高级技术：你将学习如何将消息代理与 Spring 结合使用以实现大规模可扩展性和分布式架构，如何通过 RESTful API
    暴露你的应用程序，以及如何在应用程序中发送电子邮件和调度事件。


    • 第四部分：新的 Spring I/O：你将学习如何将 Spring 和 Groovy 集成到你的 Spring 应用程序中。你还将获得一些指导，了解在
    Spring 学习之旅中下一步可以探索哪些更深入的技术。


    **源代码**


    本书中使用的所有源代码都可以在 github.com/apress/introducing-spring-framework6 找到。下载内容将包含以下仅在线提供的附录：


    • 为你的操作系统安装 Java 和 Gradle

    • 其他推荐工具


    话不多说，让我们开始学习 Spring 框架吧！


    xvi


    **第 1 章**


    **你的第一个 Spring**


    **应用程序**


    大多数书籍在开始时都会对所介绍的技术及其历史进行冗长的解释，并且通常会提供一个很小的示例，但你需要读到后面的章节才能运行它。


    在本书中，我将采用不同的方法。我将从一些基础示例开始，并详细解释它们的作用以及如何使用它们，以便你能够快速了解 Spring。本章中的示例将向你展示将 Spring
    框架集成到任何现有项目，或者从头开始创建一个项目并轻松修改它是多么容易。


    图 1-1 展示了 Spring 产品组合网站 (https://spring.io)。在这个网站上，你可以找到所有 Spring 扩展、指南和文档，以帮助你更好地理解
    Spring 生态系统。如果你已经迫不及待想要深入了解，Spring 框架本身可以在 https://spring.io/projects/spring-framework
    找到。


    © Felipe Gutierrez, Joseph B. Ottinger 2022

    F. Gutierrez and J. B. Ottinger, *《Spring Framework 6 入门》*[, https://doi.org/10.1007/978-1-4842-8637-1_1](https://doi.org/10.1007/978-1-4842-8637-1_1#DOI)


    ![](img/index-15_1.png)


    第 1 章 你的第一个 Spring 应用程序


    ***图 1-1.** [`spring.io`](https://spring.io)*


    **前置要求**


    为了开始第一个 Spring 框架示例，我们需要安装一些工具。


    • 你需要安装并配置好 Java 开发工具包 (JDK)，并确保可以在命令行中访问它。与支持多种 Java 版本的早期 Spring 版本不同，Spring
    6 需要 Java 17 或更高版本。有许多网站提供 Java 17，但最合适的来源是 Adoptium 的分发页面 (https://adoptium.net/releases.html)
    或 Oracle 的网站 (www.oracle.com/java/technologies/downloads/)。

