    第 1 章 你的第一个 Spring 应用程序


    • 我们将使用 Gradle 构建工具，可在 [`gradle.org`](https://gradle.org) 找到（见图 1-2）。Gradle 是
    JVM 上最流行且功能最强大的两个构建工具之一；此处选择 Gradle 主要是因为它的构建脚本非常简单和简短。我们使用构建工具是因为这是非常标准的做法，它能为我们提供便捷的依赖管理和完整的构建生命周期，包括在构建过程中运行测试的能力；Gradle
    也是 Spring 团队本身的首选工具。


    ***图 1-2.** Gradle 网站*


    **源代码组织**


    本书中我们将看到大量源代码。本部分将描述这些代码的布局方式，以便于理解各部分内容的存放位置。


    第 1 章 你的第一个 Spring 应用程序


    本书将组织为一个 Gradle 项目，包含多个子目录.1。大多数子目录将是项目的“模块”，但也会有例外。


    顶级项目需要有自己的目录；对于作者来说，这个目录是 isf6（代表“Introducing Spring 6”）。大多数章节的代码将放在一个与章节编号对应的清晰命名的目录中：例如
    chapter02、chapter03 等。


    如果某个章节有两个独立的项目，它们将以章节编号和项目描述来命名，例如 chapter01-hello-world 和 chapter01-hello-boot。


    让我们先看一下“顶级”项目并进行设置，然后我们将开始编写一些实际使用 Spring 的代码。


    在安装 Java 和 Gradle 之后，我们需要做的第一件事是运行一个命令来初始化 Gradle：`gradle init`。


    这将启动一个简短的交互过程，Gradle 会询问我们想要哪些构建选项。


    默认选项即可，因为我们将覆盖它们；我们从这个过程中想要得到的主要结果是 Gradle 包装器的设置。我们需要替换此目录中的两个文件：`build.gradle`
    和 `settings.gradle`。


    顶级的 `build.gradle` 文件——位于你的“项目工作目录”中，因此所有相对路径都以“.”开头——应如下所示：


    ***清单 1-1.*** build.gradle


    apply plugin: ''java''


    sourceCompatibility = 17


    targetCompatibility = 17


    ext {


    springFrameworkVersion = "6.0.0-M4"


    testNgVersion = "7.6.1"


    }


    1 Gradle 使用一个包装器，为每个项目下载一份 Gradle 副本。这对于可重复构建非常有用，但它会在你的硬盘上为每个项目创建一个 Gradle 副本。因此，为本书创建一个单一项目比每个章节创建一个项目要高效得多，尽管某些章节会有独立的项目，例如
    chapter-01-hello-boot 项目。


    第 1 章 你的第一个 Spring 应用程序


    allprojects {


    apply plugin: ''java''


    repositories {


    maven {


    url "https://repo.spring.io/milestone"


    }


    maven {


    url "https://repo.spring.io/snapshot"


    mavenContent {


    snapshotsOnly()


    }


    }


    mavenCentral()


    }


    dependencies {


    implementation \


    "ch.qos.logback:logback-classic:1.2.11"


    testImplementation \


    "org.testng:testng:$testNgVersion"


    }


    test {


    useTestNG()


    }


    }


    这个文件看起来内容很多——但它也是我们将要使用的最长的构建文件之一。它的作用是告诉 Gradle 我们有一个 Java 项目（因此使用 Java 编译器），需要哪个
    Java 版本（17，撰写本文时的当前长期支持版本，也是 Spring 6 的要求），一组为构建提供版本信息的属性，以及所有项目都应执行的一组操作：它们都是
    Java 项目，都应从一组外部位置拉取依赖，并且都应依赖 TestNG 测试框架。


    我们接下来要覆盖的下一个文件是 `settings.gradle` 文件。

