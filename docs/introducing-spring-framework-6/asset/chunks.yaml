    请注意，这是一个“常规的 HTML 页面”。我们为 Thymeleaf 声明了一个 `th` 命名空间，但 `th:` 标签并不会阻止我们在任何常规浏览器中打开该页面以查看布局。


    **注意** 此页面的布局并非特别出色；在“优秀网页设计”的编年史中，这个页面可能会因其糟糕的设计而成为反面教材。


    现在，我们可以看看 Thymeleaf 的渲染效果。`html` 块不仅声明了 Thymeleaf 的命名空间，还声明了 `with` 和 `lang` 标签。这些是特殊的
    Thymeleaf *属性*，用于定位特定的 HTML 属性。`with` 属性允许我们定义一个变量供后续使用；我们在这里所做的是根据渲染环境中的语言，为模板提取一个名为
    `lang` 的变量。然后，`lang` 属性使用这个 `lang` *值*来告知浏览器模板使用的主要语言，许多浏览器可以根据此值为你提供自动翻译成不同语言的功能。


    渲染后的值使用了一种*表达式语言*。


    通常，octothorpe（即“井号”，`#` 字符）用于属性插值。它会查找一个属性名称，并将其值用作该属性的值。


    美元符号（`$` 字符）则从模板模型中检索一个值。


    `th:text` 属性会替换当前节点的值，因此渲染器会丢弃任何占位文本（即 HTML 文件中显示的默认文本）。因此，如果我们在资源包中有一个名为 `hello.text`
    的属性，其值为“Hello, world”，并且我们希望渲染以下模板块：


    **<span th:text**="#{hello.text}" **>** Hi there! **</span>**


    第 8 章 在 Web 上展示你的 Spring 应用程序


    在运行时，Thymeleaf 会将其渲染为：


    **<span>** Hello, world**</span>**


    我们还在模板中看到了 `th:each` 的使用，它允许我们遍历模型中集合里的*每一个*元素（基于我们的 `SearchController` 的 `docs`
    集合），并为每个元素使用一个名为 `doc` 的局部变量。因此，如果我们有一个 `Document` 类型的列表，我们可以通过使用 `th:text="${doc.name}"`
    来获取某个文档的名称，这将尝试调用“doc”所引用对象的 `getName()` 方法。


    与许多其他模板引擎一样，Thymeleaf 可以非常强大。


    我们只是触及了渲染引擎的皮毛；这里所展示的内容足以满足我们微不足道的需求，但你可能希望浏览 [www.thymeleaf.org/](http://www.thymeleaf.org/documentation.html)
    上的 [documentation.html](http://www.thymeleaf.org/documentation.html) 以获取更多详细信息，特别是关于表达式语言的部分。


    （例如，如果我们愿意，Thymeleaf 可以使用 Spring 原生的表达式语言，或者，如果你希望编写一个*完全自定义*的表达式语言，它也可以使用。）正如你从清单
    8-5 中看到的，我们同时使用了两种表达式——属性表达式和模型表达式——现在让我们来填充我们的属性值。我们有五个属性引用——`title`、`titles.search`、`titles.name`
    等等——因此这些将是我们消息包中的属性值，它们将被放置在 `src/main/resources` 中。让我们快速定义几个：一个用于英语（默认），一个用于西班牙语，一个用于荷兰语。


    ***清单 8-6.*** chapter08/src/main/resources/messages.properties


    title=My Documents


    titles.search=Search


    titles.name=Name


    titles.type=Type


    titles.location=Location


    ***清单 8-7.*** chapter08/src/main/resources/messages_es.properties title=Mis Documentos


    titles.search=Buscar


    titles.name=Nombre


    titles.type=Tipo


