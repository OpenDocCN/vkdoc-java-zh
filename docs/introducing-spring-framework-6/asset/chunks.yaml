- fmt: "# 排版后的内容\n\nWith all that said, however, you should be aware that there are\
    \ other ways to interact with databases; this is one among many. It’s probably\
    \ the simplest, and our next chapter will go into something far more powerful\
    \ (and portable).\n\n## Revisiting Our Simple Data Model\n\nFor the purposes of\
    \ this chapter, we are going to simplify our document data. So far, we have had\
    \ two classes: `Document` and `DocumentType`, with `DocumentType` being a Java\
    \ enum type (a predetermined list of possibilities). We’re going to focus only\
    \ on `Document` for this chapter and leave `DocumentType` as an exercise for the\
    \ next chapter.\n\nOur `Document` is going to look slightly different than what\
    \ we’ve seen, because we’re not including a `DocumentType` and we’re adding an\
    \ `id` field as an artificial identifier for the documents, much like a serial\
    \ number.\n\nIt’s a fairly long class, mostly because of boilerplate code for\
    \ the mutators and accessors; for the sake of simplicity (and because our examples\
    \ here don’t need them), we’re not including `equals()` and `hashCode()` methods.\
    \ We’re also going to include the `DocumentType` class, which is also part of\
    \ our model. These classes are very similar to prior versions of the entities\
    \ we’ve seen in prior chapters, with the main difference being the addition of\
    \ an artificial identifier for the `Document` class.\n\n**Note:** We could have\
    \ used the new record type in Java for `Document`. Given that we never modify\
    \ our data, it wouldn’t have been a stretch, and the mechanism we are going to\
    \ demonstrate for working with our data would work quite well with records.\n\n\
    However, some of our later chapters will revisit persistence with mutable types,\
    \ and records are less suitable there; we’re going to stick with the simple approach\
    \ for now.\n\n### Listing 6-1. `chapter06/src/main/java/c06/Document.java`\n\n\
    ```java\npackage c06;\n\npublic class Document {\n\n    private Integer id;\n\n\
    \    private String name;\n\n    private String location;\n\n    private DocumentType\
    \ type;\n\n    public Document(int id, String name, DocumentType type, String\
    \ location) {\n        this.id = id;\n        this.name = name;\n        this.type\
