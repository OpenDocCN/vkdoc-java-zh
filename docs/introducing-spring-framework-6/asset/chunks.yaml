    `</body>`


    `</html>`


    Note how it’s a “regular HTML page.” We declare a namespace of `th` for Thymeleaf,
    but the `th:` tags don’t prevent us from being able to open the page in any regular
    browser for layout.


    **Note** This page is not laid out particularly well; in the annals of “good web
    design,” this page would probably stand out as something to avoid.


    Now we can look at the Thymeleaf rendering. The `html` block not only declares
    the namespace for Thymeleaf but also declares `with` and `lang` tags. Those are
    special Thymeleaf *attributes* that target specific HTML attributes. The `with`
    attribute allows us to define a variable for later use; what we’re doing here
    is extracting a variable for the template, called `lang`, based on the language
    in our rendering environment. The `lang` attribute then uses this `lang` *value*
    to tell the browser what primary language the template is being rendered with,
    and many browsers can offer you automatic translation to different languages based
    on this value.


    The rendered values use an *expression language*.


    In general, the octothorpe – or “pound sign,” the `#` character – is a property
    interpolation. It will look up a property name and use that as the value for the
    attribute.


    The dollar sign – the `$` character – retrieves a value from the template model.


    The `th:text` attribute will replace the value of the current node, such that
    any placeholder text (the default text as shown in our HTML file) is discarded
    by the renderer. Thus, if we have a property called `hello.text` in our resource
    bundles with a value of “Hello, world” and we want to render the following template
    block:


    `<span th:text="#{hello.text}"> Hi there! </span>`


    This will be rendered by Thymeleaf at runtime as


    `<span> Hello, world</span>`


    We also see the use of `th:each` in our template, which allows us to iterate through
    *each* element in a collection from our model (the `docs` collection, based on
    our `SearchController`), using a local name called `doc` for each element. Thus,
    if we have a list of `Document` types, we can get the name of a given document
    by using `th:text="${doc.name}"`, which will try to call the `getName()` method
    of the object being referred to by “doc.”


    Thymeleaf can be extraordinarily powerful, as with many other templating engines.
    We are barely scratching the surface of the rendering engine; what we’re seeing
    here is sufficient for our paltry needs, but you may want to browse [www.thymeleaf.org/documentation.html](http://www.thymeleaf.org/documentation.html)
    for more details, especially about the expression language. (Thymeleaf can use
    Spring’s innate expression language if we so desire, for example, or it can use
    a *completely custom* expression language should you wish to write one.)


    As you can see from Listing [8-5](#index_split_002.html#p130), we’re using both
    kinds of expressions – property and model – and let’s fill out our property values.
    We have five property references – `title`, `titles.search`, `titles.name`, and
    so forth – so those will be our property values in the messages bundle, which
    will be placed in `src/main/resources`. Let’s define a few, in rapid order: one
    for English (the default), one for Spanish, and one for Dutch.


    ***Listing 8-6.*** `chapter08/src/main/resources/messages.properties`


    ```

    title=My Documents

    titles.search=Search

    titles.name=Name

    titles.type=Type

    titles.location=Location

    ```


    ***Listing 8-7.*** `chapter08/src/main/resources/messages_es.properties`


    ```

    title=Mis Documentos

    titles.search=Buscar

    titles.name=Nombre

    titles.type=Tipo

    titles.location=Ubicacion

    ```


    ***Listing 8-8.*** `chapter08/src/main/resources/messages_nl.properties`


    ```

    title=Mijn documenten

    titles.search=Zoeken

    titles.name=Naam

    titles.type=Type

    titles.location=Locatie

    ```


    Now, all that remains is to make it so that we can specify the locale for the
    rendering engine, which is part of our Spring configuration.'
