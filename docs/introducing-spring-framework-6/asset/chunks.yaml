- fmt: "Doing asynchronous invocation without Spring isn’t very useful in a book *covering*\
    \ Spring, and it’s very well covered by the Java tutorial and Java documentation,\
    \ anyway.\n\nWe’re going to ignore that possibility (although it’s worth noting\
    \ that Spring has ways to help you create an `ExecutorService` for its own asynchronous\
    \ dispatch, it’s not difficult, but it’s also not particularly instructive.)\n\
    \nThe `@Async` annotation is fascinating, but not incredibly useful for most applications.\n\
    \nIf the method being annotated with `@Async` returns nothing (as a method returning\
    \ `void`), `@Async` invokes it in a separate (configurable) `ExecutorService`\
    \ thread and returns immediately while the invoked method is run by the `ExecutorService`\
    \ thread.\n\nIf the method returns a `Future<V>` with data in it, it will *also*\
    \ be invoked in the executor service, but it has to have been designed to work\
