    a[t www.](http://www.tiobe.com/tiobe-index/)


    [tiobe.com/tiobe-index/](http://www.tiobe.com/tiobe-index/) – as of this writing,
    Kotlin is at #29, Groovy is at #39, and Java itself sits strong at #3.


    Chapter 12 Using DynamiC LangUages


    implementation \


    "org.springframework:spring-context:$springFrameworkVersion"


