  trans: "\n.tool.hbm2ddl.MultipleLinesSqlCommandExtractor\n\n当然，我们还可以在配置文件中为 Hibernate\
    \ 设置许多其他属性.3。\n\n终于，我们准备开始研究 Repository 本身了。\n\n**Spring Data 仓库**\n\nSpring Data\
    \ 提供了一个 `CrudRepository<Type, PrimaryKeyType>` 接口，它有两个类型参数：要持久化的类类型（本章中的 `Document`）以及与该类关联的主键类型（对于\
    \ `Document` 来说是 `Integer`）。\n\n`CrudRepository<?,?>` 接口提供了许多与数据访问对象相关的、相当标准化的操作：\n\
    \n3 请参阅 [`docs.spring.io/spring-boot/docs/current/reference/html/application-`](https://docs.spring.io/spring-boot/docs/current/reference/html/application-properties.html)\
    \ [properties.html](https://docs.spring.io/spring-boot/docs/current/reference/html/application-properties.html)\
    \ 以获取属性的*部分*列表。讽刺的是，我们这里使用的属性并不在此列表中。\n\n第 7 章 让 Spring 构建你的数据访问对象\n\n-   `save(T)`：保存传递给它的实体，并返回一个适用于后续操作的实例。\n\
    -   `saveAll(Iterable<T>)`：此方法接受一个实体的可迭代集合，并返回一个适用于后续持久化操作的实体集合，其作用类似于 `save()`\
    \ 对单个对象的处理。\n-   `findById(ID)`：此方法使用参数作为主键来查找实体。它返回一个 `Optional<T>` – 如果主键不存在，则\
    \ `Optional` 将包含一个空值。\n-   `existsById(ID)`：返回一个布尔值，指示主键是否存在于数据存储中。\n-   `findAll()`：返回一个\
    \ `Iterable<T>`，其中包含数据存储中该类型的所有实例。\n-   `findAllById(Iterable<ID>)`：为数据库中与 ID\
    \ 集合中的标识符匹配的每个实例返回一个 `Iterable<T>`。如果给定的 ID 在数据库中不存在，它就不会被包含在返回的 `Iterable<T>`\
    \ 中。\n-   `count()`：返回数据存储中为此类型管理的实体数量。\n-   `deleteById(ID)`：删除数据存储中与此 ID 匹配的记录。\n\
    -   `delete(T)`：删除给定的实体（假设它存在于数据库中）。\n-   `deleteAllById(Iterable<ID>)`：删除数据存储中所有匹配的\
    \ ID 条目。\n-   `deleteAll(Iterable<T>)`：从数据存储中删除所有与 `Iterable` 中匹配的条目（即“删除与传入集合匹配的记录”）。\n\
    -   `deleteAll()`：清除数据存储中的所有实体。\n\n如您所见，对于大多数与数据访问对象相关的操作来说，这已经相当灵活了；还有另一个实现，`PagingAndSortingRepository<?,?>`，它增加了通过分页遍历数据集的能力。\n\
    \nSpring 通过 Repository 接口提供了许多魔法。基本上，要获得 `CrudRepository<?,?>` 提供的所有功能，我们*必须*做的就是定义一个*单一*的接口，该接口扩展\
    \ `CrudRepository<?,?>`，并添加 Spring 所需的类型信息。\n\n第 7 章 让 Spring 构建你的数据访问对象\n\n对于实际的\
    \ `DocumentRepository`，我们已经做了大量的铺垫，但它就在这里，全部内容如下：\n\n***清单 7-8.*** chapter07/src/main/java/c07/DocumentRepository.java\n\
    \n```java\npackage c07;\n\nimport org.springframework.data.repository.CrudRepository;\n\
    import org.springframework.stereotype.Repository;\nimport java.util.List;\n\n\
    @Repository\npublic interface DocumentRepository\n        extends CrudRepository<Document,\
    \ Integer> {\n\n    List<Document> findByType(DocumentType type);\n}\n```\n\n\
    请注意 `findByType` 方法。Spring 会拦截此方法并插入一个有效的查询（基于存储引擎，此处为 JPA），这样我们甚至无需在任何地方定义有效的\
    \ JPA 查询：我们只需说，“哦，我们想使用 `type` 字段进行搜索”，Spring 就会为我们构建它。\n\n有一个完整的语法用于确定查询，它可以包含分页、排序、区分和其他元素；您可以在\
    \ [`docs.spring.io/spring-data/jpa/docs/current/reference/html/#repositories.query-methods.details`](https://docs.spring.io/spring-data/jpa/docs/current/reference/html/#repositories.query-methods.details)\
    \ 阅读完整的语法。有一些方法可以为 Repository 实例创建快捷方式（和自定义查询），但这超出了本章的范围。\n\n让我们展示这个结构在实际中的应用。我们需要做的主要事情是告诉我们的配置启用\
    \ Spring Data JPA，通过使用 `@EnableJpaRepositories` 注解；其他一切都很标准。这是我们的 `MyDocsConfiguration`\
    \ 类，它是我们测试结构的一部分。\n\n***清单 7-9.*** chapter07/src/test/java/c07/MyDocsConfiguration.java\n\
    \n```java\npackage c07;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
    \n@Configuration\n@EnableJpaRepositories\npublic class MyDocsConfiguration {\n\
    \n    @Bean\n    SearchEngine getEngine(DocumentRepository repository) {\n   \
    \     return new RepositorySearchEngine(repository);\n    }\n}\n```\n\n在此之后，我们的实际测试就变得轻而易举了：\n\
    \n***清单 7-10.*** chapter07/src/test/java/c07/MyDocsTest.java\n\n```java\npackage\
    \ c07;\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport org.springframework.boot.test.autoconfigure.orm.jpa.DataJpaTest;\n\
    import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.testng.annotations.Test;\n\nimport javax.sql.DataSource;\n\nimport\
    \ static c07.DocumentType.PDF;\nimport static org.testng.Assert.assertEquals;\n\
    import static org.testng.Assert.assertNotNull;\n\n@ContextConfiguration(classes\
    \ = {MyDocsConfiguration.class})\n@DataJpaTest\n@EnableAutoConfiguration\npublic\
    \ class\n        MyDocsTest extends AbstractTestNGSpringContextTests {\n\n   \
    \ @Autowired\n    SearchEngine engine;\n\n    @Autowired\n    DataSource ds;\n\
    \n    SearchEngine getEngine() {\n        return engine;\n    };\n\n    @Test\n\
    \    void testEngineNonNull() {\n        assertNotNull(ds);\n        assertNotNull(getEngine());\n\
    \    }\n\n    @Test\n    void testFindByType() {\n        var documents = getEngine().findByType(PDF);\n\
    \        assertNotNull(documents);\n        assertEquals(documents.size(), 1);\n\
    \        assertEquals(PDF.name,\n                documents.get(0).getType().name);\n\
    \        assertEquals(PDF.desc,\n                documents.get(0).getType().desc);\n\
    \        assertEquals(PDF.extension,\n                documents.get(0).getType().extension);\n\
    \    }\n\n    @Test\n    void testListAll() {\n        var documents = getEngine().listAll();\n\
    \        assertNotNull(documents);\n        assertEquals(documents.size(), 4);\n\
    \    }\n}\n```\n\n我们添加到测试中的注解（`@DataJpaTest` 和 `@EnableAutoConfiguration`）建立了\
    \ Spring 容器为测试所需应用的依赖关系，例如创建嵌入式数据库及其引用。\n\n第 7 章 让 Spring 构建你的数据访问对象\n\n**总结**\n"
- fmt: "# This is a lightning-speed tour of Spring Data\n\nThis is a lightning-speed\
    \ tour of `Spring Data`, which provides an easy, common layer between our application\
    \ code and a data store. This chapter used `JPA` (and thus the data store was\
    \ a relational database), but adapters exist for a number of other persistence\
    \ mechanisms, like `JDBC` (thus invalidating most of the work we did in [Chapter\
    \ 6](https://doi.org/10.1007/978-1-4842-8637-1_6)) or `MongoDB`, for example.\
    \ `Spring Data` gives us convenient and powerful access to standard access mechanisms,\
    \ including pagination, and saves us from ever having to write manual data access\
    \ objects again, should we find such things unpleasant.\n\n## Chapter 8: Showing\
    \ Your Spring Application on the Web\n\nIn the last two chapters, we took a look\
    \ at persistence in Spring, through the use of `JDBCTemplate` (when we built our\
    \ own `DAO`) and `Spring Data` (where we let Spring build out all of the mechanisms\
    \ by which we interacted with a data store). In this chapter, we’re going to switch\
    \ gears and take a look at exposing our application over the World Wide Web, using\
    \ a templating engine known as `Thymeleaf`[^1], using Spring Boot’s web starter\
    \ mechanism.\n\nThis chapter uses the same source code for data storage as [Chapter\
    \ 7](https://doi.org/10.1007/978-1-4842-8637-1_7). To build it, you can literally\
    \ copy the `src/main` directory from [Chapter 7](https://doi.org/10.1007/978-1-4842-8637-1_7),\
    \ changing the packages from `c07` to `c08`. There are ways we could have used\
    \ [Chapter 7](https://doi.org/10.1007/978-1-4842-8637-1_7)’s classes directly\
    \ without copying, but since we’re trying to keep a flat, short package structure,\
    \ it’s more work than its worth, and explaining Gradle project interdependencies\
    \ isn’t what this chapter is about.\n\n> **Note** This is a very simple chapter.\
    \ We’re actually not going to cover every real-world aspect of web applications\
    \ in Spring: no security, no real error handling, and no data validation for writing\
    \ new data into the database, among other things. These topics are, of course,\
    \ *important* – but they’re also outside of the scope of *this* book. We’re going\
    \ to cover writing data in [Chapter 9](https://doi.org/10.1007/978-1-4842-8637-1_9),\
    \ but for users interested in writing more complete web applications with Spring,\
    \ [https://apress.com](https://apress.com) has references that can guide you into\
    \ in-depth tutorials and references.\n\nFirst, let’s take a look at the build\
    \ script.\n\n[^1]: Thymeleaf’s home page is [www.thymeleaf.org/](http://www.thymeleaf.org/).\n\
    \n© Felipe Gutierrez, Joseph B. Ottinger 2022  \nF. Gutierrez and J. B. Ottinger,\
    \ *Introducing Spring Framework 6*, [https://doi.org/10.1007/978-1-4842-8637-1_8](https://doi.org/10.1007/978-1-4842-8637-1_8#DOI)\n\
    \n### Listing 8-1. `chapter08/build.gradle`\n\n```\nplugins {\n    id \"application\"\
    \n    id 'org.springframework.boot' version '3.0.0-M3'\n    id 'io.spring.dependency-management'\
    \ version '1.0.12.RELEASE'\n}\n\ndependencies {\n    implementation \\\n     \
    \   'org.springframework.boot:spring-boot-starter-web'\n    implementation \\\n\
    \        'org.springframework.boot:spring-boot-starter-thymeleaf'\n    implementation\
    \ \\\n        'org.springframework.boot:spring-boot-starter-data-jpa'\n    implementation\
    \ \\\n        'com.h2database:h2:2.1.214'\n    testImplementation \\\n       \
    \ \"org.springframework.boot:spring-boot-starter-test\"\n    testImplementation\
    \ \\\n        \"org.testng:testng:$testNgVersion\"\n}\n\napplication {\n    mainClass.set(\"\
    c08.Chapter8\")\n}\n```\n\nWe’ve included a database – `H2` – and the `spring-boot-starter-data-jpa`\
    \ dependencies, just like in [Chapter 7](https://doi.org/10.1007/978-1-4842-8637-1_7).\
    \ We’ve also included `spring-boot-starter-web` – which gives us the ability to\
    \ set up HTTP endpoints to connect to – and `spring-boot-starter-thymeleaf`, which\
    \ imports our templating engine (`Thymeleaf`) and sets up the rendering from Spring.\n\
    \nIf you’ve copied the files from [Chapter 7](https://doi.org/10.1007/978-1-4842-8637-1_7)\
    \ (and moved them to the `c08` package instead of `c07`), your directory tree\
    \ will look like this:\n\n```\nChapter 8: Showing Your Spring Application on the\
    \ Web\n```"
  raw: 'This is a lightning-speed tour of Spring Data, which provides an easy, common
    layer between our application code and a data store. This chapter used JPA (and
    thus the data store was a relational database), but adapters exist for a number
    of other persistence mechanisms, like JDBC (thus invalidating most of the work
    we did in Chapt[er 6](https://doi.org/10.1007/978-1-4842-8637-1_6)) or MongoDB,
    for example. Spring Data gives us convenient and powerful access to


    standard access mechanisms, including pagination, and saves us from ever having
    to write manual data access objects again, should we find such things unpleasant.


    **CHAPTER 8**


    **Showing Your Spring**


    **Application on the Web**


    In the last two chapters, we took a look at persistence in Spring, through the
    use of JDBCTemplate (when we built our own DAO) and Spring Data (where we let
    Spring build out all of the mechanisms by which we interacted with a data store).
    In this chapter, we’re going to switch gears and take a look at exposing our application
    over the World Wide Web, using a templating engine known as Thymeleaf, [1 us](#index_split_002.html#p124)ing
    Spring Boot’s web starter mechanism.


    This chapter uses the same source code for data storage as Chapt[er 7](https://doi.org/10.1007/978-1-4842-8637-1_7).
    To build it, you can literally copy the src/main directory from Chapt[er 7](https://doi.org/10.1007/978-1-4842-8637-1_7),
    changing the packages from c07 to c08\. There are ways we could have used Chapter
    [7](https://doi.org/10.1007/978-1-4842-8637-1_7)’s classes directly without copying,
    but since we’re trying to keep a flat, short package structure, it’s more work
    than its worth, and explaining Gradle project interdependencies isn’t what this
    chapter is about.


    **Note** This is a very simple chapter. We’re actually not going to cover every
    real-world aspect of web applications in Spring: no security, no real error handling,
    and no data validation for writing new data into the database, among other things.


    These topics are, of course, *important* – but they’re also outside of the scope
    of *this* book. We’re going to cover writing data in Cha[pter 9,](https://doi.org/10.1007/978-1-4842-8637-1_9)
    but for users interested in writing more complete web applications with Spring,
    [https://apress.com](https://apress.com) has references that can guide you into
    in- depth tutorials and references.


    First, let’s take a look at the build script.


    1 Thymeleaf’s home page is [www.thymeleaf.org/.](http://www.thymeleaf.org/)


    © Felipe Gutierrez, Joseph B. Ottinger 2022


    F. Gutierrez and J. B. Ottinger, *Introducing Spring Framework 6*[, https://doi.org/10.1007/978-1-4842-8637-1_8](https://doi.org/10.1007/978-1-4842-8637-1_8#DOI)


    ChapTer 8 ShoWing Your Spring appliCaTion on The Web


    ***Listing 8-1.*** chapter08/build.gradle


    plugins {


    id "application"


    id ''org.springframework.boot'' version ''3.0.0-M3''


    id ''io.spring.dependency-management'' version ''1.0.12.RELEASE''


    }


    dependencies {


    implementation \


    ''org.springframework.boot:spring-boot-starter-web''


    implementation \


    ''org.springframework.boot:spring-boot-starter-thymeleaf''


    implementation \


    ''org.springframework.boot:spring-boot-starter-data-jpa''


    implementation \


    ''com.h2database:h2:2.1.214''


    testImplementation \


    "org.springframework.boot:spring-boot-starter-test"


    testImplementation \


    "org.testng:testng:$testNgVersion"


    }


    application {


    mainClass.set("c08.Chapter8")


    }


    We’ve included a database – H2 – and the spring-boot-starter-data-jpa


    dependencies, just like in Chapter [7\. W](https://doi.org/10.1007/978-1-4842-8637-1_7)e’ve
    also included spring-boot-starter-web –


    which gives us the ability to set up HTTP endpoints to connect to – and spring-boot-starter-thymeleaf,
    which imports our templating engine (Thymeleaf) and sets up the rendering from
    Spring.


    If you’ve copied the files from Chapt[er 7](https://doi.org/10.1007/978-1-4842-8637-1_7)
    (and moved them to the c08 package instead of c07), your directory tree will look
    like this:


