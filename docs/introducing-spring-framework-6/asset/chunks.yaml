- fmt: "### 排版后内容\n\n**Listing 1-8.** `settings.gradle`\n\n```\npluginManagement {\n\
    \    repositories {\n        maven {\n            url \"https://repo.spring.io/milestone\"\
    \n        }\n        maven {\n            url \"https://repo.spring.io/snapshot\"\
    \n            mavenContent {\n                snapshotsOnly()\n            }\n\
    \        }\n        gradlePluginPortal()\n    }\n}\n\nrootProject.name = 'isf6'\n\
    include 'chapter01-hello-world'\ninclude 'chapter01-hello-boot'\n```\n\nNow we\
    \ see that our “book project” has two submodules, one called `chapter01-hello-world`\
    \ and the other called `chapter01-hello-boot`. As we go through the book, we’ll\
    \ need to add each chapter to the `settings.gradle`.\n\nLastly, let’s look at\
    \ some Java code.\n\n## Chapter 1 Your First Spring Application\n\n**Listing 1-9.**\
    \ `chapter01-hello-boot/src/main/java/chapter01/HelloWorldController.java`\n\n\
    ```\npackage chapter01;\n\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport\
    \ org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
    import org.springframework.web.bind.annotation.ResponseBody;\n\n@Controller\n\
    @EnableAutoConfiguration\npublic class HelloWorldController {\n\n    @GetMapping(path\
    \ = \"/\", produces = \"text/plain\")\n    @ResponseBody\n    public String getMessage()\
    \ {\n        return \"Hello, world!\";\n    }\n\n    public static void main(String[]\
    \ args) {\n        SpringApplication.run(HelloWorldController.class, args);\n\
    \    }\n}\n```\n\nHere, we’re marking the `HelloWorldController` as a type of\
    \ component, a `@Controller` of all things, which means it is meant to handle\
    \ HTTP requests. We tell it *which* requests with the `@GetMapping` annotation,\
    \ telling it to handle requests at the root of the URL – thus, `\"/\"` – and that\
    \ the response content is plain text, and to convert the method’s response data\
    \ directly to the output stream. [6](#index_split_000.html#p27)\n\nLastly, our\
    \ `main()` tells Spring Boot to run with the `HelloWorldController` as a configurable\
    \ class. In real practice, this is unwise – we’d normally have a separate “main\
    \ class” from our controllers (this violates the SOLID principles, as detailed\
    \ in Chapter [13](https://doi.org/10.1007/978-1-4842-8637-1_13)), but as a trivial\
