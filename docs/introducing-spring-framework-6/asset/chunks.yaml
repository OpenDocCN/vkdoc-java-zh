  raw: 'Doing asynchronous invocation without Spring isn’t very useful in a book *covering*
    Spring, and it’s very well covered by the Java tutorial and Java documentation,
    anyway.


    We’re going to ignore that possibility (although it’s worth noting that Spring
    has ways to help you create an ExecutorService for its own asynchronous dispatch,
    it’s not difficult, but it’s also not particularly instructive.)


    The @Async annotation is fascinating, but not incredibly useful for most applications.


    If the method being annotated with @Async returns nothing (as a method returning
    void), @Async invokes it in a separate (configurable) ExecutorService thread and
    returns immediately while the invoked method is run by the ExecutorService thread.


    If the method returns a Future<V> with data in it, it will *also* be invoked in
    the executor service, but it has to have been designed to work with asynchronous
    invocation.


    It’s not particularly difficult to work with – instead of returning, say, a List<String>,
    an asynchronous method would return Future<List<String>>.


    The only *problem* with that – perhaps a better way to write this is as a “problem,”
    with quotes – is that the use of the @Async annotation necessitates a change in
    how we write the underlying method in the first place. We can’t just say “Oh,
    this method is meant to be invoked asynchronously” and be done; we have to use
    a specific return type (the Future<V>) at the very least.


    As a result, methods marked as @Async are curiosities, effectively; you’re just
    as well off building your own Callable<V> instances and invoking them as asynchronous
    methods explicitly, since that’s simpler (being part of the language and library
    specifications already), and adding @Async does very little other than offering


    (potentially) a bridge to Spring configuring an ExecutorService for you, implicitly.


    The third method[8 is t](#index_split_002.html#p184)o use an actual scheduler
    to run tasks at specific times or at fixed rates. Let’s dig into this, since it’s
    a little more generally useful than @Async would be.


    **Note** This is not to imply that @Async is useless! It’s certainly got its own
    application; the fact that it uses a Spring-configured thread pool has its own
    power.


    It’s just that for *most* users, @Async is going to be of limited utility compared
    to other options.


    8 You didn’t lose track of the fact that we’re iterating through a list of options
    for asynchronous invocation, did you?


    ChapTeR 11 SendIng emaIlS fRom WIThIn SpRIng


    **Adding Scheduling Events in Spring**


    For asynchronous scheduling, we’re going to create a “SystemMonitor” service that
    indicates whether a “system” is working or not. It will start as an interface,
    and we’ll create two implementations that change the monitor’s “working” state
    over time to validate the scheduling mechanism.


    Here’s the interface itself:


    ***Listing 11-6.*** chapter11/src/main/java/md/SystemMonitor.java


    **package md**;


    **public interface** SystemMonitor {


    **default** boolean isWorking() {


    **return true**;


    }


    **default** void start() {


    }


    }


    We have a start() method so we can potentially control when to begin the state
    can change; by default, the interface does nothing worthwhile.


    There are a few options we have for scheduled events.


    1\. We have a *fixed-rate* system; events are triggered every so often,


    regardless of how long the events take to process. If an event takes


    longer than the elapsed time, new events will be scheduled and


    event overlap may occur.


    2\. We have an *elapsed-rate* system, where event scheduling occurs


    after an event is **finished** – if the period is 1 second and event


    takes 5 seconds to process, the next event will be scheduled for 1


    second after the processing is completed.


    3\. We have a specific time system, based on cron, where we can


    specify that events are triggered based on time and date patterns;


    we can specify that events are triggered on the first second of


    the fifth minute of the seventh hour of every Monday in a given


    month, for example.'
