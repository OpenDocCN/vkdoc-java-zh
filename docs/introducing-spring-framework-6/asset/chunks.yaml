    \ `id` from the URL *and* has body content. It then loads the `Document` (again,\
    \ throwing a “not found” exception if it doesn’t exist on the database) and checks\
    \ that the loaded document’s id matches the “updated document” id, throwing an\
    \ exception if there’s not a match.\n\nIt then copies the data from the “updated\
    \ document” into the entity that was loaded from the database. When the method\
    \ ends (and the transaction is committed), the database will contain the *new*\
    \ values rather than the old.\n\n> **Note:** If you’re wondering, yes, it’s slightly\
    \ ironic that we’re using `@Transactional` as “good practice” in a class that\
    \ really should delegate to a service class for all transactions.\n\n## Chapter\
    \ 10: Exposing a REST API\n\nAll this is well and good, and we have a “running\
    \ application” should we want one – but let’s build a test instead.\n\nFirst,\
