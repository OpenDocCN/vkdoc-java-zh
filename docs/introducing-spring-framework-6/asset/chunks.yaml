- fmt: "# Chapter 5 Using Resource Files\n\n```java\nimport java.util.Scanner;\nimport\
    \ static org.testng.Assert.assertEquals;\n```\n\n```java\n@Configuration\nclass\
    \ ResourceInjectionConfig {\n\n    @Bean\n    public Resource getHelloWorldResource()\
    \ {\n        return new DefaultResourceLoader()\n                .getResource(\"\
    classpath:hello.txt\");\n    }\n\n    @Bean\n    String getContent(Resource resource)\
    \ throws IOException {\n        try (var scanner = new Scanner(\n            \
    \    resource.getInputStream(),\n                StandardCharsets.UTF_8)\n   \
    \     ) {\n            scanner.useDelimiter(\"\\\\A\");\n            return scanner.hasNext()\
    \ ? scanner.next().trim() : \"\";\n        }\n    }\n}\n```\n\n```java\n@ContextConfiguration(classes\
    \ = {ResourceInjectionConfig.class})\npublic class ResourceInjectionTest\n   \
    \     extends AbstractTestNGSpringContextTests {\n\n    @Autowired\n    String\
    \ helloWorld;\n\n    @Test\n    void testHelloWorld() {\n        assertEquals(helloWorld,\
    \ \"Hello, world\");\n    }\n}\n```\n\nThe test itself is pretty straightforward:\
    \ declare a configuration class (`ResourceInjectionConfig`) and inject a `String`.\
    \ The `String` is named `helloWorld` – but the autowiring uses *type matching*,\
    \ so it looks for beans that match the type of the value.\n\nThe only bean we\
    \ have declared is returned from `getContent()`, so that's the method that gets\
    \ called to populate the value.\n\n## Chapter 5 Using Resource Files\n\nOur actual\
    \ test itself merely validates the value of the autowired `String`. But how do\
    \ we *get* the value in the first place?\n\nOur configuration class looks more\
    \ complicated (even with only two methods) than it might *need* to be. At the\
    \ same time, though, we build it like this because this configuration demonstrates\
    \ building a working configuration through composition, by breaking down what\
    \ we need into small, simple pieces.\n\nWe have, after all, two processes in loading\
    \ the resource:\n\n1. The `Resource` retrieval itself, or \"how do we get the\
    \ resource\"\n2. The conversion of a `Resource` into a `String`, which happens\
    \ when the value is retrieved for the first time, when the value is injected via\
    \ `@Autowired`\n\nEach of these is testable in and of itself.\n\nThe `getContent()`\
    \ method is not particularly admirable; it uses a bit of a brute force, slow method\
    \ of converting an `InputStream` to a `String`. Why, then, didn't we use a library\
    \ like Guava ([https://guava.dev](https://guava.dev)) to do the work for us?\n\
