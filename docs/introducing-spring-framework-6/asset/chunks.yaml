    我们在此关心的两个作用域是 singleton 和 prototype。


    在 Java 中，singleton 通常指一个被广泛使用的单一引用——你只需要（或想要）一个的对象。Java 实际上并不支持*真正*的 singleton
    概念——虽然可以实现，但极其困难。


    相反，Java 支持的是*每个类加载器*的 singleton 概念，这本身就有其困难之处，而且由于 Java 天生是多线程的，即使为给定类加载器构造 singleton
    也难以保证。请注意，这并非*不可能*，一旦你了解原理并接受其局限性，它可以简化为一个简单的模式（即：尽早静态实例化）。


    在 Spring 中，singleton 的作用域限定于一个应用上下文，但在给定的应用上下文中，无论何时检索对象，你都会获得相同的对象引用。


    作用域为 *prototype* 的组件，每次从上下文中*检索匹配对象*时，都会以定义为模型重新构造。这个定义很重要：如果你从上下文中检索一个 prototype
    组件，然后将其传递出去，你将持有相同的引用；Spring 不会深入你的代码为你创建新引用。你*必须*显式地从上下文中检索它们，才能触发 prototype
    行为。


    **注意** 默认作用域是 singleton——如果你没有明确告诉 Spring 使用哪个作用域，你将获得 singleton 行为。


    第 4 章 使用 Bean 作用域


    当你的组件不管理状态时，singleton 是合适的。如果你需要管理对象状态，例如跟踪给定对象或会话的状态，prototype 是最佳选择。


