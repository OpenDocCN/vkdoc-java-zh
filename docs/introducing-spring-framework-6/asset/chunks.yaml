    大多数用户可能会重点关注 Groovy 机制，因为它最简单直接，但高级用户可能会发现自己在某些时候会用到 `<lang:std />`。


    当我们使用 `<lang:groovy />` 指定一个 bean 时，可以通过 `script-source` 属性指定从类路径或文件系统加载脚本。如果不使用
    `script-source`，则可以在配置文件本身中使用 `<lang:inline-script/>` 提供脚本内容。


    第 12 章 使用动态语言


    我们还可以指定 `refresh-check-delay` 属性，该属性以毫秒为单位指定一个时间段，之后动态 bean 的内容将被刷新。这意味着，如果你从文件系统加载（而不是从
    Java 归档文件、zip 文件或其他静态资源加载），你可以在运行时编辑文件，并在正在运行的应用程序中实时看到更改的反映。


