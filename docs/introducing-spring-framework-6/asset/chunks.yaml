  trans: "\n这是对 Spring Data 的一次闪电式速览，它在我们应用程序代码与数据存储之间提供了一个简单、通用的抽象层。本章使用了 JPA（因此数据存储是关系型数据库），但也存在适用于其他多种持久化机制的适配器，例如\
    \ JDBC（这会使我们在[第 6 章](https://doi.org/10.1007/978-1-4842-8637-1_6)所做的大部分工作失效）或\
    \ MongoDB。Spring Data 为我们提供了便捷而强大的标准访问机制，包括分页，并且让我们从此无需再手动编写数据访问对象——如果我们觉得这类事情令人不快的话。\n\
    \n**第 8 章**\n\n**在 Web 上展示你的 Spring 应用程序**\n\n在最后两章中，我们通过使用 `JDBCTemplate`（当我们构建自己的\
    \ DAO 时）和 Spring Data（当我们让 Spring 构建出所有与数据存储交互的机制时）了解了 Spring 中的持久化。在本章中，我们将转换方向，探讨如何通过万维网来展示我们的应用程序，使用一个名为\
    \ Thymeleaf 的模板引擎，1 us 并利用 Spring Boot 的 Web 启动器机制。\n\n本章使用的数据存储源代码与[第 7 章](https://doi.org/10.1007/978-1-4842-8637-1_7)相同。要构建它，你可以直接复制第\
    \ 7 章的 `src/main` 目录，并将包名从 `c07` 改为 `c08`。我们本可以直接使用[第 7 章](https://doi.org/10.1007/978-1-4842-8637-1_7)的类而无需复制，但由于我们试图保持一个扁平、简短的包结构，这样做得不偿失，而且解释\
    \ Gradle 项目间的依赖关系并非本章的重点。\n\n**注意** 本章非常简单。实际上，我们不会涵盖 Spring 中 Web 应用程序的所有实际方面：没有安全性、没有真正的错误处理、也没有用于向数据库写入新数据的数据验证等等。\n\
    \n当然，这些主题*很重要*——但它们也超出了*本书*的范围。我们将在[第 9 章](https://doi.org/10.1007/978-1-4842-8637-1_9)中介绍数据写入，但对于有兴趣使用\
    \ Spring 编写更完整 Web 应用程序的读者，[`apress.com`](https://apress.com) 提供了参考资料，可以引导你深入学习教程和参考文献。\n\
    \n首先，让我们看一下构建脚本。\n\n1 Thymeleaf 的主页是 [www.thymeleaf.org/。](http://www.thymeleaf.org/)\n\
    \n© Felipe Gutierrez, Joseph B. Ottinger 2022\nF. Gutierrez 和 J. B. Ottinger，《Spring\
    \ Framework 6 入门》[, https://doi.org/10.1007/978-1-4842-8637-1_8](https://doi.org/10.1007/978-1-4842-8637-1_8#DOI)\n\
    \n第 8 章 在 Web 上展示你的 Spring 应用程序\n\n***清单 8-1.*** chapter08/build.gradle\n\nplugins\
    \ {\n    id \"application\"\n    id 'org.springframework.boot' version '3.0.0-M3'\n\
    \    id 'io.spring.dependency-management' version '1.0.12.RELEASE'\n}\n\ndependencies\
    \ {\n    implementation \\\n        'org.springframework.boot:spring-boot-starter-web'\n\
    \    implementation \\\n        'org.springframework.boot:spring-boot-starter-thymeleaf'\n\
    \    implementation \\\n        'org.springframework.boot:spring-boot-starter-data-jpa'\n\
    \    implementation \\\n        'com.h2database:h2:2.1.214'\n    testImplementation\
    \ \\\n        \"org.springframework.boot:spring-boot-starter-test\"\n    testImplementation\
    \ \\\n        \"org.testng:testng:$testNgVersion\"\n}\n\napplication {\n    mainClass.set(\"\
    c08.Chapter8\")\n}\n\n我们引入了一个数据库——H2——以及 `spring-boot-starter-data-jpa` 依赖项，就像[第\
    \ 7 章](https://doi.org/10.1007/978-1-4842-8637-1_7)一样。我们还引入了 `spring-boot-starter-web`——它使我们能够设置\
    \ HTTP 端点进行连接——以及 `spring-boot-starter-thymeleaf`，它导入了我们的模板引擎（Thymeleaf）并设置了来自\
    \ Spring 的渲染。\n\n如果你已经复制了[第 7 章](https://doi.org/10.1007/978-1-4842-8637-1_7)的文件（并将它们移动到\
    \ `c08` 包而不是 `c07` 包），你的目录树将如下所示：\n\n第 8 章 在 Web 上展示你的 Spring 应用程序\n"
- fmt: "### Listing 8-2. The Directory Structure for Chapter 8 So Far\n\n```\n.\n\
    ├── build.gradle\n└── src\n    └── main\n        ├── java\n        │   └── c08\n\
    \        │       ├── Document.java\n        │       ├── DocumentRepository.java\n\
    \        │       ├── DocumentType.java\n        │       ├── RepositorySearchEngine.java\n\
    \        │       └── SearchEngine.java\n        └── resources\n            ├──\
    \ application.properties\n            └── import.sql\n```\n\n**Warning** You **must**\
    \ copy the files from Chapter 7 to Chapter 8’s project directory! If you don’t,\
    \ this chapter simply won’t work.\n\nA Controller in Spring is a type of component,\
    \ much like a Repository is. It maps requests from the HTTP URL into method calls.\
    \ What we’re going to do is map a `SearchController` to `\"/search\"` and implement\
    \ a single mapping after that to `\"all\"` – so you can invoke a method, once\
    \ everything is wired and working, with `http://localhost:8080/search/all`.\n\n\
    The endpoint itself populates a *model* (which is passed in by Spring). A Model\
    \ is just a collection of attributes – represented as a `Map<K,V>` – that gets\
    \ passed to a rendering engine. After the model is populated, the method returns\
    \ a path to a template, a resource, that is appropriate for the rendering engine\
    \ in question; for us, it will be an HTML document with Thymeleaf tags to pull\
    \ data from the model.\n\n**Note** This is the “model-view-controller” paradigm\
    \ in motion: the “controller” populates a “model” and returns a reference to a\
    \ “view,” and it helps isolate the functions of the endpoint very easily. It’s\
    \ highly testable, highly modular, and horribly popular and useful, if you’re\
    \ doing server-side rendering. [2](#index_split_002.html#p127)\n\nLet’s take a\
    \ look at the Controller, and then we’ll take a detour through Thymeleaf a bit\
    \ and cover some more internationalization topics while we’re at it.\n\n### Listing\
    \ 8-3. `chapter08/src/main/java/c08/SearchController.java`\n\n```java\npackage\
    \ c08;\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
    \ org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
    import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
    \n@Controller\n@RequestMapping(\"/search\")\npublic class SearchController {\n\
    \    private SearchEngine engine;\n\n    @Autowired\n    public void setEngine(SearchEngine\
    \ engine) {\n        this.engine = engine;\n    }\n\n    @GetMapping(value = \"\
    /all\")\n    public String searchAll(Model model) {\n        model.addAttribute(\"\
    docs\", engine.listAll());\n        return \"search/all\";\n    }\n}\n```\n\n\
    2 It’s worth noting that server-side rendering is not very popular; modern UI\
    \ programming at the time of writing is more likely to use React with REST endpoints\
    \ than server-side rendering. With that said, the MVC model is a foundational\
    \ concept and we’ll cover REST in a later chapter.\n\nEverything here is fairly\
    \ normal for Spring so far: we have declared the `SearchController` as a `Controller`,\
    \ so the configuration can pick it up easily, and we provided a mutator so Spring\
    \ can set the `SearchEngine`.\n\nThe `searchAll()` method receives a `Model` reference\
    \ and simply puts an attribute in the model, called `\"docs\"`, with the values\
    \ returned by the `listAll()` method of the `SearchEngine` – which, as we saw\
    \ from the previous chapter, returns all of the entities specified in `import.sql`.\n\
    \nThen the `searchAll()` returns a reference to a template, with a value of `search/all`,\
    \ which presumably uses the model to render output appropriately. This is *not*\
    \ a filesystem reference, although it *can* be, and we’re going to use a template\
    \ engine that locates a resource in the classpath using `search/all` as a location.\
    \ We’ll get there. For now, though, we can easily write a test that executes the\
    \ `SearchController`’s methods manually and examine their output."
