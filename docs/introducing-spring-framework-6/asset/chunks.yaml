    jdbc.url=jdbc:h2:mem:chapter6\njdbc.username=sa\njdbc.password=\n```\n\nThe next\
    \ thing we’re going to look at is the `<jdbc:embedded-database/>` tag. This is\
    \ a convenience directive that accepts a `DataSource` and can run scripts on initialization.\
    \ We also specify the *type* of the database as `H2`, as the default is `HSQLDB`[.5](#index_split_001.html#p102).\n\
