    关系型数据库有很多选择；我们**唯一**的限制是是否存在对应的 JDBC 驱动程序，而几乎没有（如果有的话）关系型数据库缺少 JDBC 驱动程序。


    可选数据库包括 Oracle DB、MySQL、SQL Server、PostgreSQL、DB2 和 SQLite——这还远非完整列表。实际上，我们将使用一个*不在*这个列表中的数据库，名为
    H2。


    2 我们一直提到*关系型*数据库，是因为本章聚焦于使用 SQL 的数据库。它们是该领域最常见的数据库类型，但也存在其他非 SQL 数据库；我们将在下一章提及其中一些，但本章仍将重点讨论关系型数据库，因为当人们提到“数据库”时，通常指的就是关系型数据库。


    第 6 章 为 Spring 应用添加简单持久化


    [H2 (www.h2database.com/) 是一个](http://www.h2database.com/)开源数据库引擎，设计用于嵌入 JVM 中（尽管它也可以像大多数其他关系型数据库一样作为独立服务器进程运行）。偏好其他数据库并无问题，但请注意，本章中的
    SQL 语句*略微*偏向于 H2。


    正如我们将看到的，Spring 本身也鼓励使用 H2，并支持将其用于测试目的的数据库。我们将在清单 6-4 中看到其实际应用。


    **设置 JDBC 连接**


    Java 使用 DriverManager 的概念来控制数据库连接。通常，需要注册一个 JDBC 驱动程序（通过将其放入 JVM 类路径，因为 Java 具有
    JDBC 驱动程序的发现机制），并通过指定数据库的 JDBC URL 以及用户名和密码来请求数据库连接。


    **注意** 您可以通过 Java 教程了解 JDBC 的基础知识。请参阅 [`docs.oracle.com/javase/tutorial/jdbc/basics/`](https://docs.oracle.com/javase/tutorial/jdbc/basics/index.html)
    [index.html](https://docs.oracle.com/javase/tutorial/jdbc/basics/index.html) 了解更多信息；这虽然与我们相关，但超出了本书的范围。


    Spring 在 Spring 上下文中提供了一个可用的类：org.springframework.jdbc.datasource.DriverManagerDataSource。我们将使用属性占位符对其进行配置，这样通过在我们的
    XML 配置中使用 `<context:property-placeholder/>` 标签，就可以轻松更改连接使用的值。


    **注意** 到目前为止，我们为 Spring 使用了大量 Java 配置。这里我们使用的是 XML。这只是本章的风格选择；我们完全可以用 Java 实现同样的功能，这也让我们有机会探索更多
    XML 的功能。


    在进一步深入之前，让我们先构建 build.gradle 文件，该文件为本书新增了两个依赖项：H2 数据库和 spring-jdbc，后者使我们能够在上下文启动时构建数据库.3


    3 我们将在本章稍后部分很快介绍数据库初始化。


    第 6 章 为 Spring 应用添加简单持久化


