- fmt: "```java\nimport jakarta.persistence.*;\nimport java.io.Serializable;\nimport\
    \ java.util.StringJoiner;\n\n@Entity\n@Table(name=\"document\")\npublic class\
    \ Document implements Serializable {\n    @Id\n    @GeneratedValue(strategy =\
    \ GenerationType.AUTO)\n    Integer id;\n\n    @Column(nullable = false)\n   \
    \ String name;\n\n    @Column(nullable = false)\n    String location;\n\n    Document()\
    \ {\n    }\n\n    Document(String name, String location) {\n        setName(name);\n\
    \        setLocation(location);\n    }\n\n    public Integer getId() {\n     \
    \   return id;\n    }\n\n    public void setId(Integer id) {\n        this.id\
    \ = id;\n    }\n\n    public String getName() {\n        return name;\n    }\n\
    \n    public void setName(String name) {\n        this.name = name;\n    }\n\n\
    \    public String getLocation() {\n        return location;\n    }\n\n    public\
    \ void setLocation(String location) {\n        this.location = location;\n   \
    \ }\n\n    @Override\n    public String toString() {\n        return new StringJoiner(\"\
    , \", Document.class.getSimpleName() + \"[\", \"]\")\n                .add(\"\
    id=\" + id)\n                .add(\"name='\" + name + \"'\")\n               \
    \ .add(\"location='\" + location + \"'\")\n                .toString();\n    }\n\
    }\n```\n\n# Chapter 9 Integrating Your Spring Application with External Systems\n\
    \nWe also need a `DocumentRepository` to manage the interaction with a database\
    \ for `Document`:\n\n***Listing 9-3.*** `chapter09/src/main/java/md/DocumentRepository.java`\n\
    \n```java\npackage md;\n\nimport org.springframework.data.repository.CrudRepository;\n\
    \npublic interface DocumentRepository extends CrudRepository<Document, Integer>\
    \ {\n}\n```\n\n**Note** This is a *very* stripped-down interface, as we are doing\
    \ no querying or unusual access in this chapter. However, there’s absolutely nothing\
    \ preventing you from adding any features as you see fit.\n\nWe still want to\
    \ make sure that our schema is created when our application starts up, so we need\
    \ an `application.properties` file to tell Hibernate to create the database. In\
    \ production, this is a bad idea – you want to control your database schema very\
    \ carefully – but for our sample apps in this book, we want the implicit creation\
    \ of our schema.\n\n***Listing 9-4.*** `chapter09/src/main/main/resources/application.properties`\n\
    \n```properties\nspring.jpa.properties.hibernate.hbm2ddl.auto=create\n```\n\n\
    We have three classes left to create: `JmsPublisher`, which will *publish* our\
    \ data to a JMS queue, `JmsReceiver`, which will *receive* the data from the queue\
    \ (which shouldn’t surprise you, given the name), and lastly, a `MyDocsApp`, which\
    \ will manage the configuration and coordination of tasks.\n\n**Note** Your author\
    \ would prefer `JMSReceiver` over `JmsReceiver`, personally. There are ongoing\
    \ arguments over naming standards when acronyms are involved; is it `DvdPlayer`\
    \ or `DVDPlayer`? I fall on the `DVDPlayer` side, but Spring chose `JmsTemplate`\
    \ over `JMSTemplate`, and thus I am conforming to *that* standard instead of my\
    \ own. I am a team player, after all.\n\nLet’s take a look at `JmsReceiver` first.\n\
    \n***Listing 9-5.*** `chapter09/src/main/java/md/JmsReceiver.java`\n\n```java\n\
    package md;\n\nimport org.springframework.jms.annotation.JmsListener;\nimport\
    \ org.springframework.stereotype.Component;\n\n@Component\npublic class JmsReceiver\
    \ {\n    DocumentRepository dao;\n\n    JmsReceiver(DocumentRepository dao) {\n\
    \        this.dao = dao;\n    }\n\n    @JmsListener(destination = \"documents\"\
    )\n    public void receiveMessage(Document document) {\n        System.out.println(\"\
    Received <\" + document + \">\");\n        this.dao.save(document);\n    }\n}\n\
    ```\n\nThis is a fundamentally simple class. It uses a `DocumentRepository`; thus,\
    \ it uses one supplied to the constructor, but the interesting part is the `receiveMessage`\
    \ method, annotated with `@JmsListener`. The `@JmsListener` annotation here uses\
    \ a queue named `\"documents\"` – a sort of “named mailbox,” if you will, and\
    \ specified with the `destination` attribute of the `@JmsListener` annotation\
    \ – and it expects the “payload” of the message to be a `Document` reference.\n\
    \nWe’re not really doing anything here to coerce the payload type. As we’ll see\
    \ in our `JmsPublisher`, we’re sending a `Document` in serial form (thus, it’s\
    \ the right type, no matter what); you can always instruct Spring to attempt to\
    \ convert an incoming message to a valid type as required, with a `MessageConverter`.\n\
    \n**Note** We’re not configuring the `MessageConverter` here because we’re still\
    \ trying to avoid broker configuration. There are simply too many options and\
    \ alternatives to discuss some without acknowledging the rest of them, and that\
    \ could easily double the length of this *book*, not to mention hiding the purpose\
    \ of this *chapter*.\n\nOnce we receive the `Document`, we display it – just to\
    \ show that we have it – and then use the `DocumentRepository.save()` method,\
    \ which is responsible for talking to the database.\n\nThis method is fundamentally\
    \ simple, but the complexity of the operation is *completely* malleable. If the\
    \ mechanism for saving a document needed to talk to an external service to validate\
    \ ISBN for a book, or do some expensive validation based on the document type,\
    \ or *any other process we need*, the entry point for the service remains the\
    \ same; we just add whatever processing we happen to need for our application\
    \ requirements.\n\nWhat’s more, the performance impact of the entry point is (nearly)\
    \ irrelevant, because of the asynchronous invocation. If we can only process one\
    \ `Document` at a time in a given virtual machine, for some reason, all we need\
    \ to do to increase our throughput is simply add another JVM or another. As long\
    \ as the limit isn’t based on something external to our process, we can increase\
    \ the number of `Document` listeners arbitrarily.\n\n**Note** Of course, if the\
    \ limit is external to our consumer, we might not be able to change the throughput\
    \ quite as trivially. Imagine that our validation uses a web service that has\
    \ a limit of one process at a time; if we send 17 requests through, that limit\
    \ of one-at-a-time is still going to be what limits our processing as well. Welcome\
    \ to the world of asynchronous architecture.\n\nLet’s take a look at what “feeds”\
    \ the `JmsReceiver` – the `JmsPublisher`.\n\n***Listing 9-6.*** `chapter09/src/main/java/md/JmsPublisher.java`\n\
    \n```java\npackage md;\n\nimport org.springframework.jms.core.JmsTemplate;\nimport\
    \ org.springframework.stereotype.Component;\n\n@Component\npublic class JmsPublisher\
    \ {\n    private final JmsTemplate jmsTemplate;\n\n    public JmsPublisher(JmsTemplate\
    \ jmsTemplate) {\n        this.jmsTemplate = jmsTemplate;\n    }\n\n    public\
    \ void send(Document document) {\n        jmsTemplate.send(\"documents\",\n  \
    \              session -> session.createObjectMessage(document));\n    }\n}\n\
    ```\n\nThis is yet another very simple class. It receives a `JmsTemplate`, because\
    \ that’s how it publishes to a named queue, in the `send()` method. That method\
    \ mostly wraps the `JmsTemplate.send()` method, using a `MessageCreator` lambda\
    \ to create a JMS `ObjectMessage` with the `Document`.\n\nMost senders will follow\
    \ the same structure; the only variations would be in the destination names (`\"\
    documents\"`, here) and in possibly the structure of the `Message`; it’s an `ObjectMessage`\
    \ in this case (because we control the sender and the receiver, and we can use\
    \ the serialized form), but you might use a `TextMessage` or some other type of\
    \ `Message` implementation depending on your needs. (If you needed to send a message\
    \ in JSON or XML, for example, a `TextMessage` would be a good choice, but then\
    \ you’d convert the `Document` to JSON or XML, as required, as part of the message\
    \ creation.)\n\nNow we have working (and simple) classes to *consume* messages\
    \ (the `JmsReceiver`) and *produce* messages (the `JmsPublisher`) – it’s time\
    \ to tie everything together into an application of sorts. Our application will\
    \ have two `CommandLineRunner` beans as part of its configuration."
