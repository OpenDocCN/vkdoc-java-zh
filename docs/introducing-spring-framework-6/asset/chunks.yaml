- fmt: '# We’ve seen two different ways to approach configuration in Spring: programmatic
    configuration with a Java class and XML. We’ve seen component scanning as a variant
    for both Java and XML as well, which can be considered a third way to configure
    your components.


    ## Chapter 3 Applying Different Configurations


    **Type of Configuration** | **Usage**

    --- | ---

    `XML` | This can be used with third-party libraries and/or different development
    environments. It’s generally easy to read and follow, but it is very verbose and
    configurations need to be individually tracked. [9](#index_split_001.html#p70)

    `annotations` | It is another way to do configurations, but here you are attaching
    the Spring context to your application (i.e., you’re adding a Spring annotation
    at the *source level* to your components, and thus Spring must be in the compilation
    classpath for you to compile your classes; if your application uses Spring, of
    course, this is a very minor problem).

    `Java Bean Configuration` | This is the generally preferred mechanism for configuration,
    as developers are used to compilation; it’s very easy to understand and can also
    be very explicit.


    **Summary**


    In this chapter, we saw multiple different ways to load a Spring configuration
    – programmatic configuration, with component scanning as an alternative, and declarative
    configuration with XML, also with component scanning as a possibility. In the
    next chapter, we’re going to start adding features to our application.


    9 One of the neat features of XML configuration is that you can import one configuration
    file into another, a feature we did not demonstrate here because our configuration
    was too simple. In practice, this is done with third-party integrations, but *also*
    such integrations usually rely on component scanning or programmatic configuration.


    ## Chapter 4 Using Bean Scopes


    So far, we’ve seen the basic requirements of a **My Documents** application, and
    we’ve explored some aspects of configuration of a simple implementation of a search
    engine that can return either *all* documents or documents of a specific type.
    In all cases, we’ve returned what is effectively a *singleton* of every implementation,
    meaning that Spring constructs *one* instance of each component.


    In this chapter, we’re going to spend some time with bean *scopes*, which control
    when Spring constructs objects and how it uses them.


    **Scope**


    Scope is a term used in programming to describe *visibility*. In a programming
    language, a reference is “in scope” when it’s accessible; in Java, a reference
    can’t be used from outside a function if it’s declared *in* a function (unless,
    of course, it’s returned or exposed somehow). It also refers to the *lifecycle*
    of a reference, which is how Spring refers to it.


    **The Scopes**


    Spring actually has *six* scopes available, [1 w](#index_split_001.html#p71)ith
    four of them being applicable only in a web application’s context, which means
    that we’ll have to read more about them later – although we can take the concepts
    we’ll learn in *this* chapter and apply them when we encounter web applications
    in more depth.


    1 There is actually another bean scope *available*, called thread, but you have
    to do some setup to use it. It’s not typically registered because scoping a bean
    to a thread tends to create memory leaks unless the programmer is very careful.


    © Felipe Gutierrez, Joseph B. Ottinger 2022

    F. Gutierrez and J. B. Ottinger, *Introducing Spring Framework 6*[, https://doi.org/10.1007/978-1-4842-8637-1_4](https://doi.org/10.1007/978-1-4842-8637-1_4#DOI)


    ## Chapter 4 Using Bean Scopes


    **Scope** | **Description**

    --- | ---

    `singleton` | Scopes a single bean definition to a single object instance per
    Spring `ApplicationContext`.

    `prototype` | Scopes a single bean definition to any number of object instances.

    `request` | Scopes a single bean definition to the lifecycle of a single HTTP
    request; that is, each and every HTTP request will have its own instance of a
    bean created off the back of a single bean definition. Only valid in the context
    of a web-aware Spring `ApplicationContext`.

    `session` | (Content continues...)'
