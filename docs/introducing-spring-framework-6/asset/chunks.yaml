    \nLet’s see a test that validates whether the `FixedRateMonitorService` works\
    \ or not.\n\n> 9 The timing of scheduled events is not guaranteed. If we specify\
    \ 1000 milliseconds, it’ll generally be very close to 1000 milliseconds, but this\
    \ is not a real-time scheduler, so you may see variations of a few milliseconds\
