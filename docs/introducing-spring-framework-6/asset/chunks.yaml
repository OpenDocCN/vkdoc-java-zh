    **Building a REST API in Spring**


    In Spring, we can create a controller using the @Controller annotation, but @Controller
    implies that the HTTP methods return a *route* – to a rendering engine like Thymeleaf
    or something similar. In REST, the controller renders *data*, not *a page* – it’s
    meant for machine consumption, not human consumption, generally speaking.


    Thus, Spring also gives us a @RestController annotation that marks the HTTP


    methods as rendering an object model as the response body, instead of returning
    a reference to a route for which a renderer would be responsible.


    We return data itself from the methods, not references to routes with a


    populated Model.


    This also means that to create an end-user API, a rendering engine would have
    to be built using … something. Typically a rich client is built with JavaScript,
    using React or Angular (or any of a host of other such frameworks), and that rich
    client calls our REST'
