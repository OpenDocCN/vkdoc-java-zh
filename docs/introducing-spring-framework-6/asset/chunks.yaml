- fmt: "# Using Bean Scopes\n\nThe second component is a method to pull a boolean\
    \ value out of a configuration. It provides us the convenience of assuming a value\
    \ is `false` unless otherwise specified.\n\nThe third method is the interesting\
    \ one. It receives a configuration name (via the data provider, `getConfigurations()`),\
    \ loads the configuration, and then gets *four* beans references: two `Producer`\
    \ references and two `Consumer` references.\n\nIt *also* gets two boolean values\
    \ – which default to `false`, thanks to our `getValue()` method – that indicate\
    \ whether the configuration has set the scope of a given type to `prototype` or\
    \ not. [2](#index_split_001.html#p77)\n\nIf the type is set to `prototype`, then\
    \ the two references will *not be the same reference*.\n\nThey may have the same\
    \ values – and should, realistically – but the actual references will be different.\n\
    \nThe third `assertEquals` is a little confusing, though. There’s actually a matrix\
    \ of possibilities: we only use `prototype` when a type is *actively requested*\
    \ from the context, so we can have a `Consumer` prototype that gets given the\
    \ same `Producer` instance over and over again – i.e., unique `Consumer` and common\
    \ `Producer` – or we can have a `Producer` prototype, but a singleton `Consumer`,\
    \ so when that *one* consumer is created, it gets a unique `Producer`, but every\
    \ `Consumer` reference is the same.\n\nThe only condition under which you’d have\
    \ unique producers *and* consumers is when both types are set to `prototype` scope\
    \ – when the `Consumer` is retrieved from the context, a new `Producer` is created\
    \ for it (since the `Producer` scope is `prototype`), and this process is followed\
    \ for every `Consumer`, again, *assuming* both types are set to scope `prototype`.\
    \ Otherwise, we might have separate and unique `Consumer` instances that share\
    \ a `Producer` (i.e., `Consumer` is set to `prototype` but `Producer` is a singleton),\
    \ or we have a single `Consumer` instance, and thus only one `Producer` is created\
    \ for it (when `Consumer` is set to singleton).\n\nOur last assertion validates\
    \ the uniqueness of the `Producer` instances. If they are the same instance –\
    \ i.e., it’s *not* a `prototype` – the assertion tests that the `execute()` methods\
    \ generate a sequence. If they are singletons, they won’t generate sequential\
    \ values like this.\n\nHowever, we still can’t *run* anything, because we don’t\
    \ have any configurations. Here are four configurations – note how they’re largely\
    \ the same, only differing in setting the scopes for each type.\n\nIn every case,\
    \ we use `constructor-arg` to inject a `Producer` into a `Consumer` constructor.\n\
    \n**Listing 4-6.** `chapter04/src/test/resources/t1-noproto.xml`\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n\n<beans\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \    http://www.springframework.org/schema/beans/spring-beans.xsd\">\n\n    <bean\
    \ id=\"producer\" class=\"c04.Producer\"/>\n    <bean id=\"consumer\" class=\"\
    c04.Consumer\">\n        <constructor-arg name=\"producer\" ref=\"producer\"/>\n\
    \    </bean>\n    <bean id=\"producerBean\" class=\"java.lang.Boolean\">\n   \
    \     <constructor-arg name=\"s\" value=\"false\" />\n    </bean>\n</beans>\n\
    ```\n\n**Listing 4-7.** `chapter04/src/test/resources/t1-protoprod.xml`\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<beans\n    xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
    >\n\n    <bean id=\"producer\" class=\"c04.Producer\"\n        scope=\"prototype\"\
    />\n    <bean id=\"consumer\" class=\"c04.Consumer\">\n        <constructor-arg\
    \ name=\"producer\" ref=\"producer\"/>\n    </bean>\n    <bean id=\"producerBean\"\
    \ class=\"java.lang.Boolean\">\n        <constructor-arg name=\"s\" value=\"true\"\
    \ />\n    </bean>\n</beans>\n```\n\n**Listing 4-8.** `chapter04/src/test/resources/t1-protocons.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<beans\n    xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\"\
    >\n\n    <bean id=\"producer\" class=\"c04.Producer\"/>\n    <bean id=\"consumer\"\
    \ class=\"c04.Consumer\">\n        <constructor-arg name=\"producer\" ref=\"producer\"\
    />\n    </bean>\n    <bean id=\"producerBean\" class=\"java.lang.Boolean\">\n\
    \        <constructor-arg name=\"s\" value=\"true\" />\n    </bean>\n</beans>\n\
    ```\n\n2 We could have read the configuration manually and looked for the scope\
    \ attribute directly; there are also ways to look at the application context and\
    \ figure out the scope from its internal data structures. This was simpler and\
    \ avoided the distraction of walking through extra code."
