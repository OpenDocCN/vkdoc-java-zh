  raw: 'The format of the @Value is quite simple: “${app.title},” which is a straightforward
    lookup in the property resource we specified in the PropertySource annotation.


    **Note** if you use @PropertySource() with ignoreResourceNotFound=true,


    then the @Value will not interpolate the resource – you’ll get something


    like ${app.title} as the value instead of the value of the property. if


    ignoreResourceNotFound is left out, or is explicitly set to false, then the


    configuration will fail to load, with a FileNotFoundException.


    **Internationalization**


    **Note** i desperately wanted to call this section Internationalization (or, perhaps,
    Internationalisation or ¡Internacionalización!).


    thankfully, i have some measure of restraint even if my editor might not think
    so.


    plus, the section title ended up being too long.


    CHapteR 5 UsiNg ResoURCe Files


    In “Injecting a Resource” – the previous section – we showed the mechanism of


    getting an InputStream from a Resource and converting the InputStream to a String.


    That’s interesting, but not especially useful in and of itself. However, it *can*
    be useful –


    and necessary – in a world where more than one language is used.


    Let’s go a little further and show how one might use Java’s internationalization
    to display an application’s title based on locale.


    In Listin[g 5-5](#index_split_001.html#p88), we saw how we could load menu.properties,
    but we can use similar mechanisms to look up resources based on locale and go
    even further.


    Spring has the concept of a MessageSource, which provides us the ability to not
    only look up resources based on locale, but we can apply message formatting to
    the content, as well. It does so using the same rules as Java’s java.text.MessageFormat
    class.


    First, let’s see two property files. The first is a “default locale” and is based
    on an English locale, and the other is based on Dutch[.3](#index_split_001.html#p90)


    ***Listing 5-6.*** chapter05/src/test/resources/i18nmenu.properties


    app.title=My Documents


    app.greeting=Hello, {0}


    app.copyright=(c) 2022 by Apress Media


    ***Listing 5-7.*** chapter05/src/test/resources/i18nmenu_nl.properties app.title=Mijn
    Documenten


    app.greeting=Hallo, {0}


    As we see, we have three properties – app.title and app.greeting and app.


    copyright – with app.copyright not being localized at all.


    The app.greeting text uses a simple argument replacement structure, as per java.


    text.MessageFormat, and thus it will replace the {0} with the first argument in
    an array passed to the MessageSource.getMessage() method.


    If we look up app.copyright in the MessageSource, it will fall back to the default
    messages, so we expect any lookup for app.copyright to return the English text.


    Let’s show this in action. We’ll use three DataProvider methods so we can check


    each of the message types, and we’ll pass in different locales so we can exercise
    all of the functionality.


