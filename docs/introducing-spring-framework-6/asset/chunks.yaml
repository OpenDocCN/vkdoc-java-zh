    an identifier for the bean. only one unique iD can be defined.


    class


    points to a concrete class, given the full Java package.


    scope


    Tells the spring container how it will create the bean; by default if this scope
    property is not set, the bean will be a singleton instance. other scopes are


    prototype (an instance is created every time the bean is required), request


    (a single instance is created in each hTTp web request), and session (a bean


    is created and lives during the hTTp session).


    init-method


    This is the name of the method that will be called after a bean is created. it’s
    useful when you want to set a state after your object is created.'
