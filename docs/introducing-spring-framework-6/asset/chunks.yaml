    现在我们已经构建好了数据库，可以来看看 JDBCTemplate。


    **JDBCTemplate**


    Spring 文档将 JDBCTemplate 描述为“JDBC 核心包中的核心类”。它提供了许多方法，以简化对由 Connection 启用的操作的访问，例如通过
    PreparedStatement 执行 SQL。它管理对数据库连接的访问，提供隐式的异常转换以简化异常的声明和处理 6，并且还提供了将数据库信息映射到 Java
    类的简便方法，尽管其映射级别通常不如 Hibernate 这样的对象关系映射器。


    **注意** Spring 也提供了*多种*简便方法来利用 Hibernate 和其他对象关系映射器。最方便的方式是通过 Spring Data，我们将在后续章节中介绍。


    如果你不打算使用 Spring Data——老实说，你应该使用它，因为它为你的代码提供了极佳的控制和自由度——那么你需要花些时间掌握 JDBCTemplate。幸运的是，它是一个简单的类（尽管方法列表庞大），掌握起来相当容易。


    让我们看看更多的源代码，并最终让我们的文档管理器支持数据库。


    6 JDBCTemplate 将常见的 SQLException 实例转换为反映实际错误的特定异常类型，而不是使用通用异常。例如，你不会收到错误代码为 42101
    的 SQLException，而是会收到 BadSqlGrammarException——该代码是 H2 针对错误 SQL 语法的错误代码之一。


    **我们的服务接口与**


    **SearchEngine 实现**


    是时候开始处理清单 6-1 和 6-2 中的实体模型了。让我们看看 SearchEngine 接口，它本身几乎是前几章的逐字拷贝。


    值得注意的是，这些方法的返回类型扩展自 List 而非 Set；Set 意味着唯一的实例集合（这符合我们的需求），但你无法按顺序访问对象（它们*有*顺序，但我们无法轻易访问）。List
    提供了明确的顺序，但不保证唯一性。为简单起见，我们使用 List。


    ***清单 6-8.*** chapter06/src/main/java/c06/SearchEngine.java


    **package c06**;


    **import java**. **util**. **List**;


    **public interface** SearchEngine {


    List<Document> findByType(DocumentType documentType);


    List<Document> listAll();


    }


    最后，是一个新接口 DocumentDAO，它定义了“文档数据访问对象”需要提供的操作。由于我们演示的内容很简单，它与 SearchEngine 有直接的映射关系——我们本可以完全跳过这个接口，但在实际应用中，DAO
    的服务方法会比 SearchEngine 更简单，映射关系也不会那么清晰。


    ***清单 6-9.*** chapter06/src/main/java/c06/DocumentDAO.java


    **package c06**;


    **import java**. **util**. **List**;


    **public interface** DocumentDAO {


    List<Document> findByType(DocumentType documentType);


    List<Document> listAll();


    }

