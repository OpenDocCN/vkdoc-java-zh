- fmt: "```java\nimport org.slf4j.LoggerFactory;\nimport org.springframework.context.annotation.Scope;\n\
    \npublic class Consumer {\n    Logger logger = LoggerFactory.getLogger(this.getClass());\n\
    \    Producer producer;\n\n    Consumer(Producer producer) {\n        this.producer\
    \ = producer;\n        logger.info(\"constructed with producer \" + Integer.toHexString(producer.hashCode()));\n\
    \    }\n}\n```\n\n## Chapter 4 Using Bean Scopes\n\n```java\nProducer getProducer()\
    \ {\n    return producer;\n}\n\nint execute() {\n    return producer.execute();\n\
    }\n```\n\nNow we’re going to drop into a more complicated test class. What we\
    \ want to do is have a test class that loads a configuration and then validates\
    \ what that configuration *does* as part of our test. We’ll need some components\
    \ to test with: a `Consumer` and a `Producer`, with the `Consumer` exposing the\
    \ `Producer` to our test, so we can validate the configuration settings and behavior.\n\
    \n**Note** We’re changing the chapter packages to use `c04` instead of the `chapter04`\
    \ we’ve been using, because `chapter` is very verbose for repeated use.\n\n***Listing\
    \ 4-5.*** `chapter04/src/test/java/c04/ScopesTest.java`\n\n```java\npackage c04;\n\
    \nimport org.springframework.context.ApplicationContext;\nimport org.springframework.context.support.ClassPathXmlApplicationContext;\n\
    import org.springframework.core.io.Resource;\nimport org.springframework.core.io.support.ResourcePatternUtils;\n\
    import org.testng.annotations.DataProvider;\nimport org.testng.annotations.Test;\n\
    import java.io.IOException;\nimport java.util.Arrays;\nimport static org.testng.Assert.assertEquals;\n\
    \npublic class ScopesTest {\n    @DataProvider\n    public Object[][] getConfigurations()\
    \ {\n        var resolver = ResourcePatternUtils.getResourcePatternResolver(null);\n\
    \        try {\n            var resourceNames = Arrays\n                .stream(resolver.getResources(\"\
    classpath*:*.xml\"))\n                .map(Resource::getFilename)\n          \
    \      .map(e -> new String[]{e})\n                .toList()\n               \
    \ .toArray(new Object[0][]);\n            return resourceNames;\n        } catch\
    \ (IOException e) {\n            throw new RuntimeException(e);\n        }\n \
    \   }\n\n    boolean getValue(ApplicationContext context, String name) {\n   \
    \     try {\n            return context.getBean(name, Boolean.class);\n      \
    \  } catch (Exception ignored) {\n            return false;\n        }\n    }\n\
    \n    @Test(dataProvider = \"getConfigurations\")\n    public void testConfiguration(String\
    \ configName) {\n        var context = new ClassPathXmlApplicationContext(configName);\n\
    \        var p1 = context.getBean(Producer.class);\n        var p2 = context.getBean(Producer.class);\n\
    \        var c1 = context.getBean(Consumer.class);\n        var c2 = context.getBean(Consumer.class);\n\
    \        var producerPrototype = getValue(context, \"producerBean\");\n      \
    \  var consumerPrototype = getValue(context, \"consumerBean\");\n\n        assertEquals(p1\
    \ == p2, !producerPrototype);\n        assertEquals(c1 == c2, !consumerPrototype);\n\
    \        // the consumer is the *same reference* if\n        // consumerPrototype\
    \ is true, so the\n        // producerPrototype is not used more than once.\n\
    \        assertEquals(c1.getProducer() == c2.getProducer(),\n            !(producerPrototype\
    \ && consumerPrototype));\n        // if producerPrototype is true, then the sequence\
    \ will fail\n        assertEquals((p1.execute() + 1) == p2.execute(), !producerPrototype);\n\
    \    }\n}\n```\n\nThere are a number of things going on here. The intent of this\
    \ class is to iterate through a number of configurations, applying the same tests\
    \ to every configuration.\n\nBut the configurations specify different things,\
    \ so we’re going to try to include information about *expected values* from the\
    \ configurations, too.\n\nAs a result, our test has three components: the first\
    \ is a data provider method that uses a `ResourcePatternResolver` (acquired from\
    \ `ResourcePatternUtils`) to scan the classpath for our configurations. It returns\
    \ those matching resources as `Resource` references in a flat array, so we have\
    \ to convert it into an `Object[][]` containing only the filenames. The pattern\
    \ (`\"classpath*:*.xml\"`) will match *every XML file* in our classpath."
