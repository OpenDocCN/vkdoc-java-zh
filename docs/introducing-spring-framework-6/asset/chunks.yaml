- fmt: "# Tying It All Together\n\nSo far, we’ve copied our data access code nearly\
    \ verbatim from Chapter [7](https://doi.org/10.1007/978-1-4842-8637-1_7), which\
    \ gives us a working data model; we’ve built a Controller that invokes a rendered\
    \ page with our data model (including a test), and we’ve built a Thymeleaf template\
    \ (ready for internationalization) for use by our controller.\n\nIt’s time we\
    \ built a configuration and ran our code. We’re going to do it with a class called\
    \ `Chapter8`.\n\nAs a Spring Boot application, the responsibilities of our application\
    \ class are rather light, overall. Mostly it will declare itself as an application\
    \ and tell Spring to find its components on the classpath.\n\nThe exception to\
    \ the automation of everything, though, is in the internationalization, which\
    \ works well, but we’d like to be able to control it.\n\nTo handle the internationalization,\
    \ we need to have a locale resolver and a change interceptor. These will allow\
    \ us to add `?lang=es` to the URL, for example, to set the locale for the rendering\
    \ engine (and set a cookie for future invocations, which can be overridden by\
    \ using the parameter again.) The use of `lang` shows up in our HTML template\
    \ (as `th:lang=\"${lang}\"` in the `html` block) and *must* match the attribute\
    \ name the controller sets – after all, it’s part of the model for Thymeleaf.\n\
    \nBut with that said, the language resolution is the bulk of our application source\
    \ code.\n\nLet’s take a look:\n\n**Listing 8-9.** `chapter08/src/main/java/c08/Chapter8.java`\n\
    \n```java\npackage c08;\n\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
    import org.springframework.web.servlet.LocaleResolver;\nimport org.springframework.web.servlet.config.annotation.InterceptorRegistry;\n\
    import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;\nimport\
    \ org.springframework.web.servlet.i18n.CookieLocaleResolver;\nimport org.springframework.web.servlet.i18n.LocaleChangeInterceptor;\n\
    import java.util.Locale;\n\n@EnableJpaRepositories\n@SpringBootApplication\npublic\
    \ class Chapter8 implements WebMvcConfigurer {\n\n    @Bean\n    public LocaleResolver\
    \ localeResolver() {\n        var localeResolver = new CookieLocaleResolver();\n\
    \        localeResolver.setDefaultLocale(Locale.US);\n        return localeResolver;\n\
    \    }\n\n    @Bean\n    public LocaleChangeInterceptor localeChangeInterceptor()\
    \ {\n        var lci = new LocaleChangeInterceptor();\n        lci.setParamName(\"\
    lang\");\n        return lci;\n    }\n\n    @Override\n    public void addInterceptors(InterceptorRegistry\
    \ registry) {\n        registry.addInterceptor(localeChangeInterceptor());\n \
    \   }\n\n    public static void main(String[] args) {\n        SpringApplication.run(Chapter8.class,\
    \ args);\n    }\n}\n```\n\nAt this point, we can run `Chapter8` as an application.\
    \ If we’re in the `chapter08` directory, it’s as simple as the following:\n\n\
    ```\ngradle run\n```\n\nIf we’re in the top-level directory (the directory that\
    \ *contains* the `chapter08` project directory), we can invoke run on the project\
    \ itself:\n\n```\ngradle chapter08:run\n```\n\nIn all cases, the application should\
    \ start spewing logs, with the last one containing the following:\n\n```\nStarted\
    \ Chapter8 in 2.688 seconds (process running for 2.961)\n```\n\n(Your data will\
    \ obviously vary based on your system and system load.)\n\nNow we can actually\
    \ open a web browser and check out our application. In Figure 8-1, we see an invocation\
    \ with no language option (the default, English for your author), from `http://localhost:8080/search/all`:\n\
    \n**Figure 8-1.** The Search Page in English"
  raw: '**Tying It All Together**


    So far, we’ve copied our data access code nearly verbatim from Chapter [7](https://doi.org/10.1007/978-1-4842-8637-1_7),
    which gives us a working data model; we’ve built a Controller that invokes a rendered
    page with our data model (including a test), and we’ve built a Thymeleaf template
    (ready for internationalization) for use by our controller.


    It’s time we built a configuration and ran our code. We’re going to do it with
    a class called Chapter8.


    As a Spring Boot application, the responsibilities of our application class are
    rather light, overall. Mostly it will declare itself as an application and tell
    Spring to find its components on the classpath.


    The exception to the automation of everything, though, is in the internationalization,
    which works well, but we’d like to be able to control it.


    To handle the internationalization, we need to have a locale resolver and a change
    interceptor. These will allow us to add ?lang=es to the URL, for example, to set
    the locale for the rendering engine (and set a cookie for future invocations,
    which can be overridden by using the parameter again.) The use of lang shows up
    in our HTML


    template (as “th:lang="${lang}” in the html block) and *must* match the attribute
    name the controller sets – after all, it’s part of the model for Thymeleaf.


    But with that said, the language resolution is the bulk of our application source
    code.


    Let’s take a look:


    ChapTer 8 ShoWing Your Spring appliCaTion on The Web


    ***Listing 8-9.*** chapter08/src/main/java/c08/Chapter8.java


    **package c08**;


    **import org**. **springframework**. **boot**. **SpringApplication**; **import
    org**. **springframework**. **boot**. **autoconfigure**. **SpringBootApplication**;
    **import org**. **springframework**. **context**. **annotation**. **Bean**; **import
    org**. **springframework**. **data**. **jpa**. **repository**. **config**.


    **EnableJpaRepositories**;


    **import org**. **springframework**. **web**. **servlet**. **LocaleResolver**;
    **import org**. **springframework**. **web**. **servlet**. **config**. **annotation**.
    **Intercepto** **rRegistry**;


    **import org**. **springframework**. **web**. **servlet**. **config**. **annotation**.
    **WebMvcConfigurer**; **import org**. **springframework**. **web**. **servlet**.
    **i18n**. **CookieLocaleResolver**; **import org**. **springframework**. **web**.
    **servlet**. **i18n**. **LocaleChangeInterceptor**; **import java**. **util**.
    **Locale**;


    @EnableJpaRepositories


    @SpringBootApplication


    **public class** Chapter8 **implements** WebMvcConfigurer {


    @Bean


    **public** LocaleResolver localeResolver() {


    var localeResolver = **new** CookieLocaleResolver();


    localeResolver.setDefaultLocale(Locale.US);


    **return** localeResolver;


    }


    @Bean


    **public** LocaleChangeInterceptor localeChangeInterceptor() {


    var lci = **new** LocaleChangeInterceptor();


    lci.setParamName("lang");


    **return** lci;


    }


    @Override


    **public** void addInterceptors(InterceptorRegistry registry) {


    registry.addInterceptor(localeChangeInterceptor());


    }


    ![](index-135_1.png)


