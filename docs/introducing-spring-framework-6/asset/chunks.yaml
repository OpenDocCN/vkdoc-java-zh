    `factory-method` 这是用于创建 bean 的方法名称。换句话说，你需要提供将创建该对象实例的方法，并且此方法应包含参数。


    `destroy-method` 这是在你销毁 bean 之后将被调用的方法名称。


    `lazy-init`


    如果你希望容器在 bean 被调用或使用时（即当你从 `ApplicationContext` 调用 `getBean` 方法时），或者稍后从需要该对象的另一个实例类中创建
    bean，则可以将此属性设置为 `true`。


    第三章 应用不同的配置


    那么，我们简单配置所做的是：声明一个 Spring 配置（包含所有前言和 XML 声明），然后创建一个标识符为 `engine` 的单一引用，其类型为 `chapter03.StaticSearchEngine`，并在类实例化后调用
    `populateData()`。由于我们没有提供像 `scope` 这样的其他标签，因此它被创建为单例（每次我们向上下文请求 `engine` 时，都会得到*同一个引用*），并且通过使用无参构造器（Java
    默认构造器）来构建。


    **扩展配置**


    我们简单配置的问题在于它*过于*简单，而且功能也不足。让我们稍微改进一下。


    我们一直使用的 `chapter03.StaticSearchEngine` 就其用途而言是一个不错的实现；它实现了带有常量数据的 `SearchEngine`
    接口。


    然而，它非常冗长（因为它必须包含常量数据），而且没有人喜欢冗长的代码清单，因为它们会消耗大量纸张，从而用掉很多树木，对吧？6


    在本书中，我们将探索几种不同的创建种子数据的方法，但让我们先从使用 XML 配置来探索一些选项开始。我们将看到几组不同的代码清单，其中我们会提供一个 XML
    配置和一个 Java 类，所以请做好准备。


    首先，让我们看看如何通过指定构造器参数来构建测试，从而避免使用 `init-method`。以下是我们的测试类：


    ***清单 3-12.*** chapter03/src/test/java/chapter03/MyDocsXMLConstructorTest.java


    **package chapter03**;


    **import chapter03**. **service**. **SearchEngine**;


    **import org**. **springframework**. **beans**. **factory**. **annotation**. **Autowired**;
    **import org**. **springframework**. **test**. **context**. **ContextConfiguration**;
    **import org**. **testng**. **annotations**. **Test**;


    6 罗拉克丝完全支持这一观点。


    第三章 应用不同的配置


    @ContextConfiguration(locations={"/doccons.xml"})


    @Test


    **public class** MyDocsXMLConstructorTest


    **extends** MyDocsContextBaseTest {


    @Autowired


    SearchEngine engine;


    @Override


    **public** SearchEngine getEngine() {


    **return** engine;


    }


    }


    同样，从功能上讲，这里没有什么独特或特别之处。以下是 XML 配置，它开始向我们展示一些更有趣的内容：


    ***清单 3-13.*** chapter03/src/test/resources/doccons.xml


    <?xml version="1.0" encoding="UTF-8"?>


    < **beans**


    xsi:schemaLocation="http://www.springframework.org/schema/beans


    http://www.springframework.org/schema/beans/spring-beans.xsd">


    < **bean** id="engine"


    class="chapter03.StaticSearchEngine">


    < **constructor-arg**


    name="populate"


    type="boolean"


    value="true" />


    </**bean**>


    </**beans**>


    在这里，我们看到了在 `bean` 标签内部使用了 `constructor-arg` 标签。这允许我们传递构造器参数（这并不令人意外），并且可以按名称（如此处所示）或按位置指定特定参数。`type`
    是必需的，我们传递的是一个值而不是引用——这意味着如果我们需要或想要的话，我们可以有一个值为 `true` 的简单布尔类型 bean.7


    **注意** 将此配置与清单 3-7 进行比较和对比——你就会明白为什么许多程序员更喜欢程序化配置。

