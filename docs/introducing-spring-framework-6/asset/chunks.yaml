- fmt: "# Chapter 11 Sending Emails from Within Spring\n\nAnd then waits 4 seconds,\
    \ because we know the `FixedRateMonitorService` should be able to countdown entirely\
    \ in 3 seconds as a worst case.\n\nAfter the time has elapsed, we can validate\
    \ the monitoring service's state: if it's still working after 4 seconds, the timer\
    \ has *not* run and we have a failure condition; our scheduling hasn't worked\
    \ as expected.\n\nLet's take a look at one of our other scheduling options, the\
    \ cron-based option.\n\nThe UNIX `cron` utility allows us to specify when something\
    \ can happen based on a specially formatted string, with six fields separated\
    \ by spaces. The six fields are as follows:\n\n- **Second**: This is a number\
    \ from 0 to 59.\n- **Minute**: This is a number from 0 to 59.\n- **Hour**: This\
    \ is a number from 0 to 23.\n- **Day of the month**: This is a number from 1 to\
    \ 31.\n- **Month**: This is a number, from 1 to 12, or a three-letter abbreviation\
    \ for the month from the Gregorian calendar, so \"1\" is equivalent to \"Jan,\"\
    \ which means that the scheduling event matches \"January.\"\n- **Day of the week**:\
    \ This is a number, from 0 to 7, with 0 *and* 7 meaning \"Sunday\" or a three-letter\
    \ abbreviation matching the day as well, so Sunday can *also* be expressed as\
