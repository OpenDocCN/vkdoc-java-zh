    }


    }


    This is a fundamentally simple class. It uses a DocumentRepository; thus, it uses
    one supplied to the constructor, but the interesting part is the receiveMessage
    method, annotated with JmsListener. The JmsListener annotation here uses a queue
    named


    "documents" – a sort of “named mailbox,” if you will, and specified with the destination
    attribute of the @JmsListener annotation – and it expects the “payload” of the
    message to be a Document reference.


    We’re not really doing anything here to coerce the payload type. As we’ll see
    in our JmsPublisher, we’re sending a Document in serial form (thus, it’s the right
    type, no matter what); you can always instruct Spring to attempt to convert an
    incoming message to a valid type as required, with a MessageConverter.


    ChAPTeR 9 InTegRATIng YouR SPRIng APPlICATIon wITh exTeRnAl SYSTeMS


    **Note** we’re not configuring the MessageConverter here because we’re still trying
    to avoid broker configuration. There are simply too many options and alternatives
    to discuss some without acknowledging the rest of them, and that could easily
    double the length of this *book*, not to mention hiding the purpose of this *chapter*.


    Once we receive the Document, we display it – just to show that we have it – and
    then use the DocumentRepository save() method, which is responsible for talking
    to the database.


    This method is fundamentally simple, but the complexity of the operation is *completely*
    malleable. If the mechanism for saving a document needed to talk to an external
    service to validate ISBN for a book, or do some expensive validation based on
    the document type, or *any other process we need*, the entry point for the service
    remains the same; we just add whatever processing we happen to need for our application
    requirements.


    What’s more, the performance impact of the entry point is (nearly) irrelevant,


    because of the asynchronous invocation. If we can only process one Document at
    a time in a given virtual machine, for some reason, all we need to do to increase
    our throughput is simply add another JVM or another. As long as the limit isn’t
    based on something external to our process, we can increase the number of Document
    listeners arbitrarily.


    **Note** of course, if the limit is external to our consumer, we might not be
    able to change the throughput quite as trivially. Imagine that our validation
    uses a web service that has a limit of one process at a time; if we send 17 requests
    through, that limit of one-at- a-time is still going to be what limits our processing
    as well.


    welcome to the world of asynchronous architecture.


