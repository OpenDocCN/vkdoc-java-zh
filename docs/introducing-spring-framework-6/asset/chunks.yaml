  raw: 'relatively small classes, but the advantage here is that if you can identify
    what the class is supposed to do, you can focus solely on doing it well – creating
    a testable, simple, *reliable* implementation and making *design* of these classes
    fairly trivial.


    The open-closed principle says that classes should be extensible without having


    to modify the classes themselves. We’ve used a lot of inheritance in our examples,
    particularly in tests, where we create base functionality and mutate it to create
    the environments we need.


    The Liskov substitution principle says that subclasses – or implementations –
    should be fully substitutable for their parent types. This was demonstrated in
    this book most clearly in the data access and search engine examples, where we
    had a base type of Repository (from Spring) or SearchEngine (our custom interface)
    and we swapped


    implementations like mad in our tests. Every one of them was presumed to be equivalent
    in intent, within limits[.2](#index_split_002.html#p207)


    The interface segregation principle says that a class should never be forced to


    implement an interface it doesn’t use, nor should dependencies be forced to depend
    on methods they do not use. We’ve not demonstrated a violation of the interface


    segregation principle, but an example would be for the search engine interface
    in the early to have a mechanism by which it could *write* documents, going unused
    until we reached a point in the book where we’re accepting new data. The search
    engine had no such method, because *every* implementation would have been forced
    to include it. We could have designed a WritingSearchEngine that extended SearchEngine
    at some point (perhaps Chapter [9](https://doi.org/10.1007/978-1-4842-8637-1_9),
    where we finally updated a database from external data); only the implementations
    of WritingSearchEngine would have been required to fulfill the ability to write
    document references.


    2 Sometimes you might ignore Liskov for the purpose of testing, or for *very*
    special cases.


    Chapter 13 Where Do You Go From here?


    This creates a lean implementation of classes; again, simplicity is encouraged.
    It makes everything far easier to design and debug, which makes everyone more
    effective as programmers.


    The dependency inversion principle suggests that our design should depend on


    *abstractions*. We’ve used a ton of interfaces and (occasionally) base classes;
    these are the types that are used, except where we’re specifically testing concrete
    behavior.


    The dependencies are on the interfaces, not the concrete implementations, which


    means we’re programming to what the interfaces *intend* – to contract rather than
    to an actual class.


    Programming to contract means that we program based on what we’re intending to


    do, rather than how we do it. It’s not important to know that searching for a
    document queries a database – we only want to search for a document. That’s the
    difference between interface and implementation, and Spring does a *fantastic*
    job of encouraging us to use this principle.


    **The Wider World of Spring**


    The funny thing is: this book is an introduction to Spring, but it barely scratches
    the surface of the wider ecosystem. We’ve danced from subject to subject like
    pinballs, generally establishing more complex topics as we’ve gone along and integrating


    concepts we’ve learned from prior chapters, but even so we’ve done relatively
    little.


    Spring has modules for nearly *everything*. Looking at the Spring Initializr project
    ([https://start.spring.io), y](https://start.spring.io)ou can find libraries to
    help you use GRAPHQL, or HATEOAS, or reactive programming, multiple template engines
    (including Thymeleaf, which we demonstrated in our example code), a security layer
    with OAUTH2 or other security implementations, data access to relational systems
    (through JDBC or JPA, both of which were demonstrated) or NoSQL datastores like
    MongoDB, access to multiple messaging systems like Artemis or RabbitMQ, Kafka
    or Apache Camel, batch processing, and much, much more.


    And that’s *just* the official Spring projects; the open source world adds even
    more.


    Even beyond that, if the feature is able to be built in Java (or accessed from
    it), Spring’s design principles make it easy for you to implement your own services,
    as 207


    Chapter 13 Where Do You Go From here?


    with our email services in Chapter [11](https://doi.org/10.1007/978-1-4842-8637-1_11).
    [3 D](#index_split_002.html#p209)oing things the “Spring way” tends to create
    easily maintained code with tight focus on design to contract, so even if a Spring
    project doesn’t exist to fulfill what you need, Spring helps you determine what
    it is you *actually* need and focus on programming *that*, so you end up with
    composable modules that create a lot of power in your final design.


    Where *should* you look further? Well, as usual, it depends.


    If you’re manipulating data, Spring Data has a number of applicable projects,
    but your interest will mostly be based on what database you need to work with.


    For the Web, you’ll want to look at Spring Security, as well as the various rendering
    engines; you might also want to look at Reactive, although Reactive is going to
    apply most heavily in very high performance scenarios.


    For data processing, you’ll look at the other messaging layers like Kafka or RabbitMQ


    (if you’re not using JMS already); the concepts travel across the libraries just
    like Spring Data concepts apply to each repository type.


    The possibilities are endless, and it’s fascinating and empowering to explore


    and grow.


    3 It’s worth noting, in the pursuit of radical honesty, that the EmailService
    doesn’t *quite* follow SOLID principles in the interest of using fewer pages in
    print.


