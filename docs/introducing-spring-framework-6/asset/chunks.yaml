    ## About the Authors


    **Felipe Gutierrez** is a solutions software architect, with a bachelor’s and
    a master’s degree in computer science from Instituto Tecnologico y de Estudios
    Superiores de Monterrey Campus Ciudad de Mexico, with over 20 years of IT experience,
    during which time he developed programs for companies in multiple vertical industries,
    such as government, retail, healthcare, education, and banking. He is currently
    working as a principal technical instructor for Pivotal, specializing in Cloud
    Foundry, Spring Framework, Spring Cloud Native Applications, Groovy, and RabbitMQ,
    among other technologies. He has worked as a solutions architect for big companies
    like Nokia, Apple, Redbox, and Qualcomm, among others. He is also the author of
    *Introducing Spring Framework*, *Pro Spring Boot*, and *Spring Boot Messaging*,
    all published by Apress.


    **Joseph B. Ottinger** is reputedly an expert software developer, coder, and programmer
    with experience covering many technologies and platforms. He was the Editor in
    Chief for both *Java Developer Journal* and TheServerSide.com and has contributed
    to a large number of publications, open source projects, and commercial products
    over the years, using many different languages (but primarily Java, Python, and
    JavaScript). He is the author of *Hibernate Recipes* and *Beginning Hibernate*
    for Apress and has authored other books as well as a few articles here and there.
    He’s also constantly writing odes to random furry creatures grooving in caves
    with members of ancient cultures, or something.


    ---


    ## About the Technical Reviewer


    **Manuel Jordan Elera** is an autodidactic developer and researcher who enjoys
    learning new technologies for his own experiments and creating new integrations.
    Manuel won the Springy Award 2013 Community Champion and Spring Champion. In his
    little free time, he reads the Bible and composes music on his guitar. Manuel
    is known as `dr_pompeii`. He has tech-reviewed numerous books, including *Pro
    Spring MVC with WebFlux* (Apress, 2020), *Pro Spring Boot 2* (Apress, 2019), *Rapid
    Java Persistence and Microservices* (Apress, 2019), *Java Language Features* (Apress,
    2018), *Spring Boot 2 Recipes* (Apress, 2018), and *Java APIs, Extensions and
    Libraries* (Apress, 2018). You can read his detailed tutorials on Spring technologies
    and contact him through his blog at [www.manueljordanelera.blogspot.com](http://www.manueljordanelera.blogspot.com).
    You can follow Manuel on his Twitter account, `@dr_pompeii`.


    ---


    ## Acknowledgments


    I would like to express all my gratitude to the Apress team: first and foremost
    to Steve Anglin for accepting my proposal; Laura Berendson and Jill Balzaono for
    helping me out when I needed it; and the rest of the Apress team involved in this
    project. Thanks to everybody for making this possible.


    Thanks to our technical reviewer, Manuel Jordan, and the entire Spring team for
    making the Spring Framework the best programming and configuration model for modern
    Java-based enterprise applications.


    Thanks to my parents, Rocio Cruz and Felipe Gutierrez, for all their love and
    support, and to my best friend, my brother Edgar Gerardo Gutierrez. Even though
    we live far away, we are closer than ever; thanks, “macnitous.”


    —Felipe Gutierrez


    I’m constantly amazed that I’m asked to write these acknowledgments and dedications,
    mostly because they feel so limiting to point out only specific persons and events
    to whom I’m grateful. I would like to thank both grammar and spelling, and my
    sense of restraint in using both proper grammar *and* spelling in doing so, as
    well as the patience of my wife and family (and friends), without whom I’d hardly
    ever be able to do anything.


    This book was written to the tune of many classic ’70s tunes, many of which were
    cheesy soft rock for some reason, and I’d like to thank a whole host of one-hit-wonders
    without which I’d never wonder what the record industry was thinking back then.
    It’s awesome, and I miss it. May all of us live with as much love in our hearts
    for each other as we can stand.


    —Joseph B. Ottinger


    ---


    ## Introduction


    This book is an introduction to the well-known Spring Framework that offers an
    inversion of control container for the Java platform. The Spring Framework is
    an open source application framework that can be used with any Java application.


    After reading this book, you will know how to do the following:


    - Use the Spring Framework efficiently.

    - Add persistence through JDBC databases, with an easy migration to NoSQL.

    - Do unit and integration testing.

    - Create web applications and expose RESTful APIs.

    - Send messages via JMS, a model that extends to AMQP, RabbitMQ, and MQTT.

    - Use dynamic languages like Groovy, Ruby, and Bean Shell for Spring.

    - Use Groovy with Spring.

    - Use the new Spring Boot and Spring XD technologies.


    **Who This Book Is For**'
