    This is yet another very simple class. It receives a JmsTemplate, because that’s
    how it publishes to a named queue, in the send() method. That method mostly wraps
    the JmsTemplate.send() method, using a MessageCreator lambda to create a JMS


    ObjectMessage with the Document.


    Most senders will follow the same structure; the only variations would be in the
    destination names ("documents", here) and in possibly the structure of the Message;
    it’s an ObjectMessage in this case (because we control the sender and the receiver,
