    \ 12-7.*** `chapter12/src/test/resources/scripts/cgmessage.groovy`\n\n```groovy\n\
    import md.MessageService\n\n// we don't need a getMessage() because it's a groovy\
    \ accessor\n// by default.\n\nclass cgmessage implements MessageService {\n  \
    \  String message\n}\n```\n\nThis one-liner is roughly equivalent to a Java class\
    \ that looks something like this, except with a few more boilerplate methods:\n\
