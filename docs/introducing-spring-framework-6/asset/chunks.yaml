- fmt: "# The First `CommandLineRunner` and Data Publishing\n\nThe first `CommandLineRunner`\
    \ will require a `JmsPublisher` – which Spring will provide automatically, of\
    \ course, since it's an available `Component` – and publish 20 `Document` instances,\
    \ each with a random UUID[.2](#index_split_002.html#p146)\n\n> **Why do we use\
    \ UUID instead of the ranged value?** Because readers might want to run one, four,\
    \ or a hundred instances of the application at once. Using the ranged values would\
    \ duplicate the names, whereas random UUIDs, as shown here, won't conflict with\
    \ each other. So, reader, if you so desire, run as many copies of this application\
    \ as you like. It'd be fun.\n\n# Chapter 9: Integrating Your Spring Application\
    \ with External Systems\n\nThe second `CommandLineRunner` will wait 2 seconds[3](#index_split_002.html#p147)\
    \ – plenty of time for our publishing cycle to run – and dump *every* `Document`\
    \ our database has to the console, as a simple check that data *was* written to\
    \ the database.\n\nHere's our simple `MyDocsApp` class:\n\n***Listing 9-7.***\
    \ `chapter09/src/main/java/md/MyDocsApp.java`\n\n```java\npackage md;\n\nimport\
    \ org.springframework.boot.CommandLineRunner;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.context.annotation.Bean;\n\
    import org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\
    import org.springframework.jms.annotation.EnableJms;\nimport java.util.UUID;\n\
    import java.util.stream.IntStream;\n\n@EnableJpaRepositories\n@EnableJms\n@SpringBootApplication\n\
    public class MyDocsApp {\n\n    public static void main(String[] args) {\n   \
    \     SpringApplication.run(MyDocsApp.class, args);\n    }\n\n    @Bean\n    CommandLineRunner\
    \ send(JmsPublisher publisher) {\n        return args -> {\n            IntStream.rangeClosed(1,\
    \ 20).forEach(\n                (value) -> {\n                    var uuid = UUID.randomUUID().toString();\n\
    \                    publisher.send(\n                        new Document(\n\
    \                            \"document \" + uuid,\n                         \
    \   \"/documents/doc\" + uuid\n                        )\n                   \
    \ );\n                }\n            );\n        };\n    }\n\n    @Bean\n    CommandLineRunner\
    \ summarize(DocumentRepository dao) {\n        return args -> {\n            Thread.sleep(2000);\n\
    \            for (var document : dao.findAll()) {\n                System.out.println(document);\n\
    \            }\n        };\n    }\n}\n```\n\n> **\"Why does the database dump\
    \ wait two whole seconds?\"** is an obvious question to ask – and it's a good\
    \ question. The real answer is to allow enough time for readers to start other\
    \ copies of the application, as mentioned in the prior footnote, although they'd\
    \ still have to be quick about it – 2 seconds is enough time to give you room\
    \ to run another application without taking so much time that it feels like nothing\
    \ is happening. Feel free to play with the delay to fit your needs.\n\nWe can\
    \ run this with `gradle :chapter09:run`, and it emits a bunch of messages about\
    \ receiving (and storing) a bunch of documents and then displays the documents\
    \ stored in the database so we can validate that we've sent (and received) messages\
    \ through the broker.\n\n## What Have We Seen in This Code?\n\n1. We've seen how\
    \ to set up dependencies for use of asynchronous processing in Spring 6, focusing\
    \ on JMS. Using a different API would be a matter of changing the specific annotations\
    \ and dependencies, but the *pattern* would be the same. A broker will be started\
    \ up for us if one isn't already running, a situation ideal for development because\
    \ it means that the developers don't have to go through the process of setting\
    \ up a broker.\n\n2. We've seen how to create listeners that listen on destinations.\n\
    \n3. We've seen how to create components that can publish *to* destinations.\n\
    \n4. We've seen how to use the publishing components to write to those destinations,\
    \ in a class that might serve as a template for bulk data upload.\n\n## Summary\n\
    \nThis chapter has been a whirlwind introduction to using asynchronous messaging\
    \ APIs in Spring, leveraging the JMS integration within the Artemis message broker,\
    \ specifically to expose the ability to save data through our data access object\
    \ asynchronously.\n\nOther messaging APIs are available to Spring and work in\
    \ similar fashion to the JMS integration, but we've barely scratched the surface\
    \ of an entire architectural approach that has surprising power for scalability.\n\
    \nIn our next chapter, we're going to switch gears again and look at the Web again,\
    \ by exposing REST functionality to our data access object.\n\n---\n\n# Chapter\
    \ 10: Exposing a REST API\n\nIn our last chapter, we saw how to use asynchronous\
    \ messaging APIs in Spring using the `JmsTemplate` to send messages and the `@JmsReceiver`\
    \ annotation to *receive* them. Now we're going to step back into the land of\
    \ the Web, to build a set of endpoints that expose our data model to a rich client,\
    \ using REST.\n\n## What Is REST?\n\nREST stands for \"REpresentational State\
    \ Transfer\" and generally refers to APIs that conform to a rough definition of\
    \ resources accessed via URLs directly. It was defined by Dr. Roy Fielding in\
    \ a rather well-known dissertation[1](#index_split_002.html#p150).\n\nIn general,\
    \ REST asserts that every *thing* in your model can be represented through a URL,\
    \ and HTTP verbs can be used to interact with those things. For example, to get\
    \ a `Document` with an id of 1, one might access with an HTTP GET, at a URL of\
    \ `http://yourhost.com/documents/1`. To access *all* documents, you might *get*\
    \ `http://yourhost.com/documents` – note the lack of the identifier. Also note\
    \ that documents are referred to as plural; you're not accessing *a document*,\
    \ but you're accessing one of a *set* of documents.\n\nTo create a `Document`,\
    \ one could use a POST to `http://yourhost.com/documents` – as you're creating\
    \ a new `Document`, you have no id value, so you're posting the new values to\
    \ the collection of documents.\n\n> Dr. Fielding's dissertation can be found at\
    \ [www.ics.uci.edu/~fielding/pubs/dissertation/top.htm](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm),\
    \ and it's quite worth reading.\n\nTo *update* a document, you could use HTTP\
    \ PUT (or perhaps PATCH, but usually PUT in my experience); I've also seen POST\
    \ used for this purpose, but that's not advised (as it overloads POST for the\
    \ application in question)[2](#index_split_002.html#p151).\n\nTo *delete* a document,\
    \ the HTTP DELETE verb comes into play, again accessing the specific resource\
    \ at `http://yourhost.com/documents/1` for a `Document` with an id of 1.\n\n##\
    \ Building a REST API in Spring\n\nIn Spring, we can create a controller using\
    \ the `@Controller` annotation, but `@Controller` implies that the HTTP methods\
    \ return a *route* – to a rendering engine like Thymeleaf or something similar.\
    \ In REST, the controller renders *data*, not *a page* – it's meant for machine\
    \ consumption, not human consumption, generally speaking.\n\nThus, Spring also\
    \ gives us a `@RestController` annotation that marks the HTTP methods as rendering\
    \ an object model as the response body, instead of returning a reference to a\
    \ route for which a renderer would be responsible.\n\nWe return data itself from\
    \ the methods, not references to routes with a populated `Model`.\n\nThis also\
    \ means that to create an end-user API, a rendering engine would have to be built\
    \ using … something. Typically a rich client is built with JavaScript, using React\
    \ or Angular (or any of a host of other such frameworks), and that rich client\
    \ calls our REST API."
