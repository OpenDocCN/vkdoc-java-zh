    Chapter 12 Using DynamiC LangUages


    **Loading Functionality Dynamically with Groovy**


    Our build.gradle files have all been written in a language called “Groovy,” [2
    or](#index_split_002.html#p195)iginally designed as a dynamic language for the
    JVM and roughly analogous in a lot of ways to Ruby. Like Kotlin, it’s semantically
    very similar to Java, with a more sparse grammar than Java.


    That may or may not be a good thing; in the end, Groovy remains quite viable but
    is less popular than Kotlin according to the TIOBE index[.3](#index_split_002.html#p195)


    What we’re going to do is simple: we’re going to build a MessageService interface
    that defines a simple getMessage() accessor, very much like our “Hello World”


    functionality from Chapter [1](https://doi.org/10.1007/978-1-4842-8637-1_1). Then
    we’re going to implement it in three different ways, all with Groovy creating
    our Spring beans.


    There are some limitations to such components implemented in dynamic languages.


    When we’re using precompiled code, we can specify values to be provided to beans
    through their constructors. When we’re using dynamic languages, we can specify


    *properties* but not *constructor arguments*.


    We’re also somewhat limited to using XML for our configuration. The Java


    configuration for dynamic scripts would, after all, just use the JSR-223 ScriptEngine
    to load classes and coerce types into something the JVM can use, which would involve
    a decent amount of boilerplate code. It’s doable, but not really instructive;
    if you want the dynamic resolution, you can isolate part of your configuration
    into an XML file (as we’ve done for this chapter) and mix the XML configuration
    in with your Java configuration and get the best of both worlds.


    With all that said, let’s dive in. First, as always, we want to take a look at
    our build file.


    This is very much a simple build configuration, with the only difference between
    it and most of our configurations is the inclusion of Groovy.


