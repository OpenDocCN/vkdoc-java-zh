    不过，它有一些不同之处，而且这些差异影响很大。


    首先，测试继承了 `AbstractTestNGSpringContextTests`，这是一个提供一些在测试中有用的 Spring 特性的类。


    另一个变化是测试类本身使用了 `@ContextConfiguration` 注解：


    @ContextConfiguration(classes={TestConfiguration.class})


    这指定了我们使用的是*编程式配置*——一个处理配置的 Java 类，就像我们在[第 1 章](https://doi.org/10.1007/978-1-4842-8637-1_1)的“Hello
    World”应用程序中所做的那样——以及要加载哪个类名来进行配置。


    最后，我们有一个使用 `@Autowired` 注解的 `SearchEngine` 声明：


    @Autowired


    SearchEngine engine;


    假设测试的实例是由 Spring 管理的，鉴于我们已将其标记为继承 `AbstractTestNGSpringContextTests`，情况确实如此。当然，我们不必使用
    TestNG。JUnit 也可以，并且非常流行，但根据作者的观点，对于大多数常见用途，TestNG 往往更直接一些。`@Autowired` 会在可用的配置中查找满足类型要求的类实例，并*注入*该引用。


    `AbstractTestNGSpringContextTests` 超类使这个测试“由 Spring 管理”，因此 Spring 所做的是：


    1. 加载配置

    2. 加载测试本身

    3. 查找可以赋值给 `SearchEngine` 的配置元素

    4. 将该元素的引用赋值给 `engine` 属性

    5. 运行测试


    第 2 章 使用类与依赖关系


    之后，实际的测试本身只是 `MyDocumentsTest` 中测试的简单复制。


