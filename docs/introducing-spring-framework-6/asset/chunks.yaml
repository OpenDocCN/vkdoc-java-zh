- fmt: "# `factory-method`\n\nThis is the name of the method that will be used to\
    \ create the bean. In other words, you need to provide the method that will create\
    \ the instance of the object, and this method should have parameters.\n\n# `destroy-method`\n\
    \nThis is the name of the method that will be called after you dispose of the\
    \ bean.\n\n# `lazy-init`\n\nThis can be set to `true` if you want the container\
    \ to create your bean when it’s being called or used by you (when you called the\
    \ `getBean` method from the `ApplicationContext`) or maybe later from another\
    \ instance class that requires your object.\n\n# Chapter 3 Applying Different\
    \ Configurations\n\nWhat our simple configuration does, then, is declare a Spring\
    \ configuration (with all the preamble and XML declaration), and then it creates\
    \ a single reference, with the identifier of `engine`, and that its type is `chapter03.StaticSearchEngine`,\
    \ and after the class is instantiated, we call `populateData()`. Since we provide\
    \ no other tags like `scope`, it is created as a singleton (every time we ask\
    \ the context for `engine` we’ll get the *same* *reference*) and is constructed\
    \ through the use of a constructor with no arguments (the Java default constructor).\n\
    \n## Expanding the Configuration\n\nThe problem with our simple configuration\
    \ is that it is *too* simple. It’s also underpowered. Let’s fix that a bit.\n\n\
    The `chapter03.StaticSearchEngine` we’ve been using is a decent implementation\
    \ for its purpose; it fulfills the implementation of a `SearchEngine` with constant\
    \ data. However, it’s very verbose (because it has to include the constant data),\
    \ and nobody likes verbose code listings, because they consume a lot of paper,\
    \ and that uses up a lot of trees, right?\n\nWe’re going to explore a few different\
    \ ways to create seed data throughout this book, but let’s start here by using\
    \ our XML configuration to explore a few options. We’re going to see a few different\
    \ sets of code listings, where we provide an XML configuration and then a Java\
    \ class, so be ready.\n\nFirst, let’s see how we can construct our test such that\
    \ we don’t have to use `init-method`, by specifying constructor arguments. Here’s\
    \ our test class:\n\n***Listing 3-12.*** `chapter03/src/test/java/chapter03/MyDocsXMLConstructorTest.java`\n\
    \n```java\npackage chapter03;\n\nimport chapter03.service.SearchEngine;\nimport\
    \ org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.test.context.ContextConfiguration;\n\
    import org.testng.annotations.Test;\n\n@ContextConfiguration(locations={\"/doccons.xml\"\
    })\n@Test\npublic class MyDocsXMLConstructorTest extends MyDocsContextBaseTest\
    \ {\n\n    @Autowired\n    SearchEngine engine;\n\n    @Override\n    public SearchEngine\
    \ getEngine() {\n        return engine;\n    }\n}\n```\n\nAgain, functionally\
    \ there’s nothing unique or special here. Here’s the XML configuration, which\
    \ starts to show us something a little more interesting:\n\n***Listing 3-13.***\
    \ `chapter03/src/test/resources/doccons.xml`\n\n```xml\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n       xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n       xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n       http://www.springframework.org/schema/beans/spring-beans.xsd\"\
    >\n\n    <bean id=\"engine\"\n          class=\"chapter03.StaticSearchEngine\"\
    >\n        <constructor-arg\n                name=\"populate\"\n             \
    \   type=\"boolean\"\n                value=\"true\" />\n    </bean>\n</beans>\n\
    ```\n\nHere, we see the use of a `constructor-arg` tag inside the `bean` tag.\
    \ This allows us to pass constructor arguments, surprisingly enough, and can specify\
    \ the specific argument by name (as is done here) or by position. The `type` is\
    \ required, and we’re passing a value as opposed to a reference – which implies\
    \ that we could have a bean that was a simple boolean value of `true`, if we’d\
    \ needed or wanted that.\n\n**Note** Compare and contrast this configuration with\
    \ listing 3-7 – and you’ll see why many programmers prefer the programmatic configuration."
