  trans: '好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    相对较小的类，但这样做的好处是，如果你能确定一个类应该做什么，你就可以专注于把它做好——创建一个可测试、简单、*可靠*的实现，并使这些类的*设计*变得相当简单。


    开闭原则指出，类应该是可扩展的，而无需修改类本身。我们在示例中大量使用了继承，特别是在测试中，我们创建了基础功能并对其进行修改，以创建我们所需的环境。


    里氏替换原则指出，子类（或实现）应该可以完全替换其父类型。本书中，这一点在数据访问和搜索引擎示例中体现得最为明显，我们有一个基础类型 `Repository`（来自
    Spring）或 `SearchEngine`（我们自定义的接口），并且在测试中像发疯一样地替换实现。在合理的范围内，每个实现都被认为在意图上是等效的.2。


    接口隔离原则指出，一个类永远不应该被迫实现它不使用的接口，也不应该强迫依赖项依赖于它们不使用的方法。我们没有演示违反接口隔离原则的情况，但可以举一个例子：早期的搜索引擎接口有一个可以*写入*文档的机制，但直到书中我们开始接受新数据时才用到它。搜索引擎没有这样的方法，因为*每个*实现都会被强制包含它。我们本可以设计一个
    `WritingSearchEngine`，它在某个时刻（也许是第 [9](https://doi.org/10.1007/978-1-4842-8637-1_9)
    章，我们最终从外部数据更新数据库时）扩展了 `SearchEngine`；只有 `WritingSearchEngine` 的实现才需要满足写入文档引用的能力。


    2 有时，为了测试或*非常*特殊的情况，你可能会忽略里氏替换原则。


    第 13 章 接下来该往哪走？


    这创建了一个精简的类实现；再次强调，鼓励简单性。它使设计和调试变得容易得多，从而使每个人作为程序员都更有效率。


    依赖倒置原则建议我们的设计应该依赖于*抽象*。我们使用了大量的接口和（偶尔的）基类；这些是被使用的类型，除非我们专门测试具体的行为。依赖关系在接口上，而不是具体的实现上，这意味着我们编程是为了实现接口的*意图*——针对契约而非实际的类。


    针对契约编程意味着我们基于我们*打算*做什么来编程，而不是我们如何去做。知道搜索文档会查询数据库并不重要——我们只想搜索文档。这就是接口和实现之间的区别，而
    Spring 在鼓励我们使用这个原则方面做得*非常出色*。


    **更广阔的 Spring 世界**


    有趣的是：这本书是对 Spring 的介绍，但它仅仅触及了更广泛生态系统的皮毛。我们像弹球一样从一个主题跳到另一个主题，通常随着学习的深入而建立更复杂的主题，并整合我们从之前章节学到的概念，但即便如此，我们做的也相对较少。


    Spring 几乎为*所有*事情都提供了模块。查看 Spring Initializr 项目 ([`start.spring.io`](https://start.spring.io))，你可以找到帮助你使用
    GRAPHQL、HATEOAS、响应式编程、多种模板引擎（包括我们在示例代码中演示的 Thymeleaf）、带有 OAUTH2 或其他安全实现的安全层、对关系型系统（通过
    JDBC 或 JPA，两者都已演示）或 NoSQL 数据存储（如 MongoDB）的数据访问、对多个消息系统（如 Artemis 或 RabbitMQ、Kafka
    或 Apache Camel）的访问、批处理等等。


    而这*仅仅*是官方的 Spring 项目；开源世界还增加了更多。


    即使除此之外，如果某个功能可以用 Java 构建（或从 Java 访问），Spring 的设计原则也能让你轻松实现自己的服务，就像我们在第 [11](https://doi.org/10.1007/978-1-4842-8637-1_11)
    章中处理电子邮件服务一样。3 以“Spring 方式”做事往往能创建易于维护的代码，并紧密关注针对契约的设计，因此即使没有现成的 Spring 项目来满足你的需求，Spring
    也能帮助你确定你*实际*需要什么，并专注于*对此*进行编程，这样你最终会得到可组合的模块，这些模块在你的最终设计中会创造强大的功能。


    那么，你*应该*从哪里进一步探索呢？嗯，像往常一样，这取决于具体情况。


    如果你在处理数据，Spring Data 有许多适用的项目，但你的兴趣主要取决于你需要使用哪个数据库。


    对于 Web，你需要查看 Spring Security 以及各种渲染引擎；你可能还想了解 Reactive，尽管 Reactive 在非常高并发的场景中应用最为广泛。


    对于数据处理，你将查看其他消息层，如 Kafka 或 RabbitMQ（如果你还没有使用 JMS）；这些概念在各个库中都是通用的，就像 Spring Data
    的概念适用于每种存储库类型一样。


    可能性是无限的，探索和成长的过程既迷人又充满力量。


    3 值得指出的是，为了追求彻底的诚实，`EmailService` 并没有*完全*遵循 SOLID 原则，这是为了在印刷中节省篇幅。


