- fmt: "We saw earlier in this chapter that we could scan for components in Java instead\
    \ of having to declare them explicitly. We can do the same in XML, using a *different*\
    \ namespace, the context namespace, much as we use the util namespace. Our configuration\
    \ for component scanning might look like this:\n\n***Listing 3-16.*** `chapter03/src/test/resources/docscan.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<beans\n    xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \    http://www.springframework.org/schema/context\n    https://www.springframework.org/schema/context/spring-context.xsd\"\
    >\n\n    <context:component-scan base-package=\"chapter03.service\" />\n\n</beans>\n\
    ```\n\nThis configuration is a drop-in replacement for the component-scanning\
    \ configuration we saw in Listing [3-9](#index_split_000.html#p57). The key is\
    \ the inclusion of the context namespace, which provides the `component-scan`\
    \ tag.\n\nNote that we are not *using* this configuration yet – let’s consider\
    \ the value of all this XML, and then we’ll see this configuration in use in Listing\
    \ [3-17](#index_split_001.html#p68) just to prove it works as intended.\n\n##\
    \ Is XML Configuration a Good Idea?\n\nIf the question is “Is XML configuration\
    \ a good idea,” the answer has to be “yes,” but with a caveat: “when?”\n\nUnfortunately,\
    \ answering **when** XML configuration is a good idea is a little harder.\n\n\
    Here, we’ve had a separate test class for **each** of our XML configurations,\
    \ so there’s a lot of repetition: we *could* have had a single test class and\
    \ provided it a list of XML configurations, which would allow us to rapidly test\
    \ each configuration in order.\n\nIf we shorten one of the tests, it might look\
    \ something like this:\n\n***Listing 3-17.*** `chapter03/src/test/java/chapter03/MyDocsAllXMLsTest.java`\n\
    \n```java\npackage chapter03;\n\nimport chapter03.service.SearchEngine;\nimport\
    \ org.springframework.context.support.ClassPathXmlApplicationContext;\nimport\
    \ org.testng.annotations.DataProvider;\nimport org.testng.annotations.Test;\n\n\
    import static chapter03.model.DocumentType.PDF;\nimport static org.testng.Assert.assertEquals;\n\
    import static org.testng.Assert.assertNotNull;\n\npublic class MyDocsAllXMLsTest\
    \ {\n\n    @DataProvider\n    Object[][] getConfigs() {\n        return new Object[][]{\n\
    \                new Object[]{\"classpath:/documents.xml\"},\n               \
    \ new Object[]{\"classpath:/doccons.xml\"},\n                new Object[]{\"classpath:/docdata.xml\"\
    },\n                new Object[]{\"classpath:/docscan.xml\"}\n        };\n   \
    \ }\n\n    @Test(dataProvider = \"getConfigs\")\n    public void testSpring(String\
    \ configLocation) {\n        var context = new ClassPathXmlApplicationContext(configLocation);\n\
    \        var engine = context.getBean(SearchEngine.class);\n        assertNotNull(engine);\n\
    \        assertEquals(engine.listAll().size(), 4);\n        assertEquals(\n  \
    \              engine.findByType(PDF).get(0).getName(),\n                \"Book\
    \ Template.pdf\");\n    }\n}\n```\n\nThis uses TestNG’s `@DataProvider` annotation\
    \ to feed each XML configuration name into a single method, which itself applies\
    \ each of the tests (or an equivalent of them) from `MyDocsBaseTest`. It isn’t\
    \ quite an exact equivalent, because the `MyDocsBaseTest` class is designed around\
    \ having sole access to a `SearchEngine`, but it demonstrates dynamically loading\
    \ each XML file in rapid order; this **can** be done without using XML, but in\
    \ such cases XML is fairly convenient.\n\nWith that said, though, we’ve designed\
    \ our configurations in such a way that XML configuration works fairly naturally\
    \ (thanks to our use of static data in `StaticSearchEngine`) and environments\
    \ with more complete features would see diminishing returns for the effort expended.\n\
    \nIn general, as a programmer, you’ll find yourself gravitating toward programmatic\
    \ configuration, which feels far more natural as well as being far less verbose\
    \ than the XML equivalents.\n\n## Choosing a Configuration Approach"
  raw: 'We saw earlier in this chapter that we could scan for components in Java instead
    of having to declare them explicitly. We can do the same in XML, using a *different*
    namespace, the context namespace, much as we use the util namespace. Our


    configuration for component scanning might look like this:


    ***Listing 3-16.*** chapter03/src/test/resources/docscan.xml


    <?xml version="1.0" encoding="UTF-8"?>


    < **beans**


    xsi:schemaLocation="http://www.springframework.org/schema/beans


    http://www.springframework.org/schema/beans/spring-beans.xsd


    http://www.springframework.org/schema/context


    https://www.springframework.org/schema/context/spring-context.xsd">


    < **context:component-scan** base-package="chapter03.service" />


    </**beans**>


    This configuration is a drop-in replacement for the component-scanning


    configuration we saw in Listing [3-9](#index_split_000.html#p57). The key is the
    inclusion of the context namespace, which provides the component-scan tag.


    Note that we are not *using* this configuration yet – let’s consider the value
    of all this XML, and then we’ll see this configuration in use in Listin[g 3-17](#index_split_001.html#p68)
    just to prove it works as intended.


    ChapTer 3 applying DifferenT ConfiguraTions


    **Is XML Configuration a Good Idea?**


    If the question is “Is XML configuration a good idea,” the answer has to be “yes,”
    but with a caveat: “when?”


    Unfortunately, answering **when** XML configuration is a good idea is a little
    harder.


    Here, we’ve had a separate test class for **each** of our XML configurations,
    so there’s a lot of repetition: we *could* have had a single test class and provided
    it a list of XML


    configurations, which would allow us to rapidly test each configuration in order.


    If we shorten one of the tests, it might look something like this:


    ***Listing 3-17.*** chapter03/src/test/java/chapter03/MyDocsAllXMLsTest.java **package
    chapter03**;


    **import chapter03**. **service**. **SearchEngine**;


    **import org**. **springframework**. **context**. **support**. **ClassPathXmlApplicationContext**;
    **import org**. **testng**. **annotations**. **DataProvider**;


    **import org**. **testng**. **annotations**. **Test**;


    **import static chapter03**. **model**. **DocumentType**. **PDF**;


    **import static org**. **testng**. **Assert**. **assertEquals**;


    **import static org**. **testng**. **Assert**. **assertNotNull**;


    **public class** MyDocsAllXMLsTest {


    @DataProvider


    Object[][] getConfigs() {


    **return new** Object[][]{


    **new** Object[]{"classpath:/documents.xml"},


    **new** Object[]{"classpath:/doccons.xml"},


    **new** Object[]{"classpath:/docdata.xml"},


    **new** Object[]{"classpath:/docscan.xml"}};


    }


    @Test(dataProvider = "getConfigs")


    **public** void testSpring(String configLocation) {


    var context=


    **new** ClassPathXmlApplicationContext(configLocation);


    ChapTer 3 applying DifferenT ConfiguraTions


    var engine=context.getBean(SearchEngine.class);


    assertNotNull(engine);


    assertEquals(engine.listAll().size(), 4);


    assertEquals(


    engine.findByType(PDF).get(0).getName(),


    "Book Template.pdf");


    }


    }


    This uses TestNG’s @DataProvider annotation to feed each XML configuration name


    into a single method, which itself applies each of the tests (or an equivalent
    of them) from MyDocsBaseTest. It isn’t quite an exact equivalent, because the
    MyDocsBaseTest class is designed around having sole access to a SearchEngine,
    but it demonstrates dynamically loading each XML file in rapid order; this **can**
    be done without using XML, but in such cases XML is fairly convenient.


    With that said, though, we’ve designed our configurations in such a way


    that XML configuration works fairly naturally (thanks to our use of static data
    in StaticSearchEngine) and environments with more complete features would see


    diminishing returns for the effort expended.


    In general, as a programmer, you’ll find yourself gravitating toward programmatic
    configuration, which feels far more natural as well as being far less verbose
    than the XML


    equivalents.


    **Choosing a Configuration Approach**'
