- fmt: "# Chapter 6: Adding Simple Persistence to Your Spring Application\n\nIt’s\
    \ worth noting that this isn’t *really* what most people would consider a full-featured\
    \ data access object: it’s read-only, and rather sparse. You will also encounter\
    \ classes named “DAO” rather rarely in the Spring ecosystem, except in really\
    \ old code; you’re far more likely to see classes that are named “repositories”\
    \ instead, as there’s a base type in Spring Data called `Repository` that does\
    \ indeed implement a full set of reads and writes for entities. We’ll be going\
    \ over Spring Data in the next chapters and explore reading and writing further.\n\
    \nNow that we have our interfaces defined, we get to see some implementations,\
    \ at last. First, let’s look at the `SearchEngineService`, an implementation of\
    \ `SearchEngine` that delegates to an instance of `DocumentDAO`.\n\n***Listing\
    \ 6-10.*** `chapter06/src/main/java/c06/SearchEngineService.java`\n\n```java\n\
    package c06;\n\nimport java.util.List;\n\npublic class SearchEngineService implements\
    \ SearchEngine {\n\n    private DocumentDAO dao;\n\n    public void setDao(DocumentDAO\
    \ dao) {\n        this.dao = dao;\n    }\n\n    public DocumentDAO getDao() {\n\
    \        return dao;\n    }\n\n    @Override\n    public List<Document> findByType(DocumentType\
    \ documentType) {\n        return getDao().findByType(documentType);\n    }\n\n\
    \    @Override\n    public List<Document> listAll() {\n        return getDao().listAll();\n\
    \    }\n}\n```\n\nThe main thing to look for in `SearchEngineService` is the use\
    \ of an attribute for the `DocumentDAO`. Since the methods in the `SearchEngine`\
    \ and the `DocumentDAO` align so cleanly, we simply delegate to the `DocumentDAO`.\n\
