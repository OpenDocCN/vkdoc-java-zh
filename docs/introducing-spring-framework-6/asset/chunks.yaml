    \ a lot of programming is about tying concepts together, and you sometimes have\
    \ to describe the tying-together part before you can describe the concepts’ relevance\
    \ and application, especially when you’re writing about technologies like Spring,\
    \ which are *all about* the tying-together bits.\n\n## Chapter 6: Adding Simple\
    \ Persistence to Your Spring Application\n\nThe only interesting thing about the\
