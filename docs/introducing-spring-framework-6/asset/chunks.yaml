- fmt: "# Introducing Spring Framework 6\n\n*Introducing Spring Framework 6* is a\
    \ hands-on guide for any developer who is new to the Spring Framework and wants\
    \ to learn how to build applications with it. Within this book you will find all\
    \ the necessary elements to create enterprise-ready applications by using the\
    \ Spring Framework and all its features and modules.\n\n## How This Book Is Organized\n\
    \nThis book uses a simple **My Documents** application that you will develop incrementally\
    \ over the course of the book. The book consists of the following four parts:\n\
    \n- **Part 1: Spring Framework Basics**: You will learn about the dependency injection\
    \ design pattern, and Spring’s container implementation and how it will help you\
    \ create a better design by programming toward interfaces. You’ll learn the different\
    \ configurations that you can apply to the Spring Framework. You will also learn\
    \ how to use bean scopes, work with collections and resource files, and how to\
    \ test your Spring applications.\n- **Part 2: The Spring Framework**: You will\
    \ learn to add persistence and integrate your Spring application with other systems.\
    \ And you will be able to add your Spring application to the Web.\n- **Part 3:\
    \ Advanced Techniques with Spring Framework**: You will learn how to use message\
    \ brokers with Spring for massive scalability and distributed architecture, how\
    \ to expose your application using a RESTful API, and how to send emails and schedule\
    \ events in your application.\n- **Part 4: The New Spring I/O**: You will learn\
    \ how to integrate Spring and Groovy into your Spring application. You’ll also\
    \ get pointers on where to look for further technologies in your journey with\
    \ Spring.\n\n## Source Code\n\nAll source code used in this book can be found\
    \ at `github.com/apress/introducing-spring-framework6`. Included in this download\
    \ will be the following online-only appendixes:\n\n- Installing Java and Gradle\
    \ for your Operating System\n- Other Recommended Tools\n\nWith all that said,\
    \ let’s go ahead and start with the Spring Framework!\n\n# Chapter 1: Your First\
    \ Spring Application\n\nMost books start with a very long explanation about the\
    \ technology they are using, the history of it, and often a small example that\
    \ you can’t run until you reach later chapters.\n\nIn this book, I am going to\
    \ take a different approach. I am going to start with some basic examples, and\
    \ I will explain in detail what they do and how to use them so that you get to\
    \ know Spring quickly. The examples in this chapter will show you how easy it\
    \ is to integrate the Spring Framework into any existing project or how to start\
    \ one from scratch and modify it without any effort.\n\nFigure 1-1 shows the Spring\
    \ portfolio website (`https://spring.io`). In this website, you can find all of\
    \ the Spring Extensions, guides, and documentation to help you understand better\
    \ the Spring ecosystem. The Spring Framework itself can be found at `https://spring.io/projects/spring-framework`,\
    \ if you’re interested in drilling down already.\n\n© Felipe Gutierrez, Joseph\
    \ B. Ottinger 2022  \nF. Gutierrez and J. B. Ottinger, *Introducing Spring Framework\
    \ 6*, `https://doi.org/10.1007/978-1-4842-8637-1_1`\n\n***Figure 1-1.** `https://spring.io`*\n\
    \n## Pre-requirements\n\nIn order to start with the first Spring Framework example,\
    \ we need to have some tools installed.\n\n- You need the Java Development Kit\
    \ (JDK) installed and configured, accessible on the command line. Unlike previous\
    \ versions of Spring, which supported a wide range of Java versions, Spring 6\
    \ requires Java 17 or higher. There are many sites that provide Java 17, but the\
    \ most appropriate will be either Adoptium’s distribution page, at `https://adoptium.net/releases.html`,\
    \ or Oracle’s site, at `www.oracle.com/java/technologies/downloads/`."
  raw: '*Introducing Spring Framework 6* is a hands-on guide for any developer who
    is new to the Spring Framework and wants to learn how to build applications with
    it. Within this book you will find all the necessary elements to create enterprise-ready
    applications by using the Spring Framework and all its features and modules.


    xv


    InTroduCTIon


    **How This Book Is Organized**


    This book uses a simple **My Documents** application that you will develop incrementally
    over the course of the book. The book consists of the following four parts:


    • Part 1: Spring Framework Basics: You will learn about the


    dependency injection design pattern, and Spring’s container


    implementation and how it will help you create a better design


    by programming toward interfaces. You’ll learn the different


    configurations that you can apply to the Spring Framework. You


    will also learn how to use bean scopes, work with collections and


    resource files, and how to test your Spring applications.


    • Part 2: The Spring Framework: You will learn to add persistence and


    integrate your Spring application with other systems. And you will be


    able to add your Spring application to the Web.


    • Part 3: Advanced Techniques with Spring Framework: You will learn


    how to use message brokers with Spring for massive scalability and


    distributed architecture, how to expose your application using a


    RESTful API, and how to send emails and schedule events in your


    application.


    • Part 4: The New Spring I/O: You will learn how to integrate Spring


    and Groovy into your Spring application. You’ll also get pointers on


    where to look for further technologies in your journey with Spring.


    **Source Code**


    All source code used in this book can be found at github.com/apress/introducing-


    spring- framework6\. Included in this download will be the following online-only


    appendixes:


    • Installing Java and Gradle for your Operating System


    • Other Recommended Tools


    With all that said, let’s go ahead and start with the Spring Framework!


    xvi


    **CHAPTER 1**


    **Your First Spring**


    **Application**


    Most books start with a very long explanation about the technology they are using,
    the history of it, and often a small example that you can’t run until you reach
    later chapters.


    In this book, I am going to take a different approach. I am going to start with
    some basic examples, and I will explain in detail what they do and how to use
    them so that you get to know Spring quickly. The examples in this chapter will
    show you how easy it is to integrate the Spring Framework into any existing project
    or how to start one from scratch and modify it without any effort.


