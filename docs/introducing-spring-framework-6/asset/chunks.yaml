- fmt: "```groovy\n\"org.springframework:spring-core:$springFrameworkVersion\"\nimplementation\
    \ \\\n\"org.springframework:spring-context:$springFrameworkVersion\"\nimplementation\
    \ \\\n\"org.springframework:spring-test:$springFrameworkVersion\"\n}\n\napplication\
    \ {\n    mainClass.set(\"chapter01.Application\")\n}\n```\n\n3. If the references\
    \ to “depends on” and “versions” are unfamiliar to you, please take a look at\
    \ the Gradle quickstart; [https://docs.gradle.org/current/samples/sample_building_java_applications.html](https://docs.gradle.org/current/samples/sample_building_java_applications.html)\
    \ is an excellent resource to provide knowledge you’ll need early and often.\n\
    \n# Chapter 1 Your First Spring Application\n\nIt’s worth noting here: source\
    \ code is also going to be complete unless otherwise specified. In the past, many\
    \ programming books chose to describe parts of source files, so a given file on\
    \ disk might be represented in four or five (or more!) source listings in paper.\
    \ This means that readers were forced to rely on source code downloads, or their\
    \ own attention to detail, to see the source files as intended. Instead, if you\
    \ see a source file, you’re going to see all of it unless it’s already been presented,\
    \ or organization requires otherwise; it’s possible that individual methods or\
    \ sections will be presented before the entire file is shown, but the entire source\
    \ file will be shown in its entirety.\n\nWith that out of the way, it’s time to\
    \ finally see some code! Our “Hello, World” application will use a Spring component,\
    \ a “bean,” that implements a “message service.” This application will be vastly\
    \ overengineered for what it’s designed to do, but it will validate that Spring\
    \ itself is working in our application. It will have three parts, the “message\
    \ service” definition itself, an implementation of that interface, and then an\
    \ application that uses the interface and its definition.\n\nFirst, let’s take\
    \ a look at the message service.\n\n***Listing 1-4.*** `chapter01-hello-world/src/main/java/chapter01/MessageService.java`\n\
    \n```java\npackage chapter01;\n\npublic interface MessageService {\n    public\
    \ String getMessage();\n}\n```\n\nThis is obviously a very simple interface: it\
    \ defines a single method, `getMessage()`.\n\nOur next class, `HelloService`,\
    \ will be just as simple.\n\n***Listing 1-5.*** `chapter01-hello-world/src/main/java/chapter01/HelloService.java`\n\
    \n```java\npackage chapter01;\n\npublic class HelloService implements MessageService\
    \ {\n    @Override\n    public String getMessage() {\n        return \"Hello,\
    \ world!\";\n    }\n}\n```\n\nLastly, we have the actual application itself. Let’s\
    \ take a look at the source and then figure out what’s going on with it.\n\n***Listing\
    \ 1-6.*** `chapter01-hello-world/src/main/java/chapter01/Application.java`\n\n\
    ```java\npackage chapter01;\n\nimport org.springframework.context.annotation.*;\n\
    \n@Configuration\npublic class Application {\n    @Bean\n    MessageService helloWorldMessageService()\
    \ {\n        return new HelloService();\n    }\n\n    public static void main(String[]\
    \ args) {\n        var context = new AnnotationConfigApplicationContext(Application.class);\n\
    \        var service = context.getBean(MessageService.class);\n        System.out.println(service.getMessage());\n\
    \    }\n}\n```\n\nFirst, note that we’re using a lot of annotations here. This\
