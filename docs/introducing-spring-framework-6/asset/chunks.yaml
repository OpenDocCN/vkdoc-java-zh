    – and many others. See [https://datatracker.ietf.org/doc/html/rfc1081](https://datatracker.ietf.org/doc/html/rfc1081)
    for a starting point.


    5 IMAP is the “Internet Message Access Protocol” and is described by RFC 9051,
    a[t https://](https://datatracker.ietf.org/doc/html/rfc9051)


