    **Warning** You


    **must** copy the files from Chapter [7](https://doi.org/10.1007/978-1-4842-8637-1_7)
    to Chapter [8’](https://doi.org/10.1007/978-1-4842-8637-1_8)s project directory!


    if you don’t, this chapter simply won’t work.


    A Controller in Spring is a type of component, much like a Repository is. It


    maps requests from the HTTP URL into method calls. What we’re going to do is map
    a SearchController to “/search” and implement a single mapping after that to “all”
    –


    so you can invoke a method, once everything is wired and working, with http://


    localhost:8080/search/all.


    The endpoint itself populates a *model* (which is passed in by Spring). A Model
    is just a collection of attributes – represented as a Map<K,V> – that gets passed
    to a rendering engine. After the model is populated, the method returns a path
    to a template, a resource, that is appropriate for the rendering engine in question;
    for us, it will be an HTML document with Thymeleaf tags to pull data from the
    model.


    ChapTer 8 ShoWing Your Spring appliCaTion on The Web


    **Note** This is the “model-view-controller” paradigm in motion: the “controller”


    populates a “model” and returns a reference to a “view,” and it helps isolate


    the functions of the endpoint very easily. it’s highly testable, highly modular,
    and horribly popular and useful, if you’re doing server-side rendering. [2](#index_split_002.html#p127)


    Let’s take a look at the Controller, and then we’ll take a detour through Thymeleaf
    a bit and cover some more internationalization topics while we’re at it.


    ***Listing 8-3.*** chapter08/src/main/java/c08/SearchController.java


    **package c08**;


    **import org**. **springframework**. **beans**. **factory**. **annotation**. **Autowired**;
    **import org**. **springframework**. **stereotype**. **Controller**; **import
    org**. **springframework**. **ui**. **Model**;


    **import org**. **springframework**. **web**. **bind**. **annotation**. **GetMapping**;
    **import org**. **springframework**. **web**. **bind**. **annotation**. **RequestMapping**;


    @Controller


    @RequestMapping("/search")


    **public class** SearchController {


    **private** SearchEngine engine;


    @Autowired


    **public** void setEngine(SearchEngine engine) {


    **this**.engine = engine;


    }


    @GetMapping(value = "/all")


    **public** String searchAll(Model model) {


    model.addAttribute("docs", engine.listAll());


    **return** "search/all";


    }


    }


    2 It’s worth noting that server-side rendering is not very popular; modern UI
    programming at the time of writing is more likely to use React with REST endpoints
    than server-side rendering. With that said, the MVC model is a foundational concept
    and we’ll cover REST in a later chapter.


    ChapTer 8 ShoWing Your Spring appliCaTion on The Web


    Everything here is fairly normal for Spring so far: we have declared the


    SearchController as a Controller, so the configuration can pick it up easily,
    and we provided a mutator so Spring can set the SearchEngine.


    The searchAll() method receives a Model reference and simply puts an attribute


    in the model, called “docs,” with the values returned by the listAll() method
    of the SearchEngine – which, as we saw from the previous chapter, returns all
    of the entities specified in import.sql.


    Then the searchAll() returns a reference to a template, with a value of search/all,
    which presumably uses the model to render output appropriately. This is *not*
    a filesystem reference, although it *can* be, and we’re going to use a template
    engine that locates a resource in the classpath using search/all as a location.
    We’ll get there. For now, though, we can easily write a test that executes the
    SearchController’s methods manually and examine their output.'
