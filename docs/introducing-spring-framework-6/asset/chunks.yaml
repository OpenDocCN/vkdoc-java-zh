    测试本身相当直接：声明一个配置类（`ResourceInjectionConfig`）并注入一个 `String`。这个 `String` 被命名为 `helloWorld`——但自动装配使用的是*类型匹配*，因此它会寻找与值类型匹配的
    Bean。


    我们声明的唯一 Bean 是由 `getContent()` 返回的，因此该方法会被调用来填充该值。


    第 5 章 使用资源文件


    我们的实际测试本身仅仅验证了自动装配的 `String` 的值。但首先，我们是如何*获取*这个值的呢？


    我们的配置类看起来比它*可能*需要的更复杂（即使只有两个方法）。不过，我们之所以这样构建它，是因为这个配置演示了如何通过组合的方式构建一个可工作的配置，将我们所需的内容分解成小而简单的部分。


    毕竟，在加载资源时我们有两个过程：


    1.  资源检索本身，即“我们如何获取资源”

    2.  将 `Resource` 转换为 `String` 的过程，这发生在首次检索该值并通过 `@Autowired` 注入时


    这两个过程各自都是可测试的。


    `getContent()` 方法并不特别值得赞赏；它使用了一种有点粗暴、缓慢的方法将 `InputStream` 转换为 `String`。那么，我们为什么不使用像
    Guava ([`guava.dev`](https://guava.dev)) 这样的库来为我们完成这项工作呢？


    像往常一样，有几个原因：


    1.  我不想仅仅为了这一个功能而添加 Guava。Guava 是一个非常有用的库，但为了这一个方法添加依赖感觉非常沉重。

    2.  Spring 的作用域（参见第[4](https://doi.org/10.1007/978-1-4842-8637-1_4)章！）通过缓存 `getContent()`
    的值以供将来调用，帮助我们。默认作用域是单例；如果我们重复使用该值 400 次，Spring 将简单地返回它已经计算出的值，而不是创建 400 个 `Scanner`
    实例。我们可以在代码中展示这一点，但第[4](https://doi.org/10.1007/978-1-4842-8637-1_4)章已经演示了作用域，在本章中这样做会增加大量重复的代码清单，实在不值得。


    **从属性文件加载注入的值**


    Spring 也可以从属性文件中将值注入到 Bean 的值中。


    虽然“My Documents”对于我们的示例应用来说是一个合适的名称——并且我们将继续使用它——但如果我们能够在不重新编译应用程序的情况下更改它，那就更好了。


    第 5 章 使用资源文件


    让我们从一个属性文件中加载它，这个功能在我们的 Spring 之旅中将非常有用。


    我们可以通过使用两个注解来轻松实现：`@PropertySource` 和 `@Value`。


    应用于配置类的 `@PropertySource`，基本上会创建一个 Bean 本身，作为供 `@Value` 注解使用的资源。它有几个属性，但通常只有两个是相关的：一个是
    `value`——默认属性——它是对属性来源的引用。另一个是 `ignoreResourceNotFound`，一个布尔值，它将静默忽略无法加载资源的情况。（`ignoreResourceNotFound`
    的默认值是 `false`。）


    资源名称是一个灵活的名称。在最简单的用法中，它是对 Java 类路径中资源的引用。然而，它是一个 URL，因此你可以使用一个*方案*和一个资源名称来加载资源。


    方案通常是对应使用的资源加载器类型的引用。如果你使用过万维网，你可能熟悉像 `https`、`http`、`ftp` 甚至 `file` 这样的方案；浏览器知道如何处理使用这些方案作为加载器的资源。Spring
    的资源加载器推断出一个自定义方案 `classpath`——也可以显式使用——来从类路径加载资源。


    **注意** 还有一个 `classpath*` 变体，这是一种为资源加载通配符的方式。当你试图一次加载大量资源时，它特别有用，但我们不会在本章中使用它。


    另一个在这里为我们工作的注解是 `@Value`。它只有一个属性，一个表示查找的字符串。这使用了“Spring 表达式语言”，也称为“SpEL”，来解析表达式以获取值。


    SpEL 是*极其*强大的。它不仅可以在对象内部查找值（到任意深度），还可以调用这些对象上的方法，因此理论上你可以使用 SpEL 调用方法与数据库通信，例如。


    我们暂时不会深入探讨 SpEL 的庞大深度——我们将使用简单的对象查找——但如果你感兴趣，可以在 Spring 文档的“Spring 表达式语言 (SpEL)”下找到
    SpEL 的定义。2


    2 “Spring 表达式语言 (SpEL)”文档可以在 [`docs.spring.io/spring-framework/docs/6.0.x/reference/html/core.html#expressions`](https://docs.spring.io/spring-framework/docs/6.0.x/reference/html/core.html#expressions)
    找到。


