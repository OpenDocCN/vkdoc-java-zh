    ***清单 10-3.*** chapter10/src/main/java/md/DocumentRepository.java **package md**;


    **import org**. **springframework**. **data**. **jpa**. **repository**. **Query**;
    **import org**. **springframework**. **data**. **repository**. **CrudRepository**;
    **import java**. **util**. **List**;


    **public interface** DocumentRepository


    **extends** CrudRepository<Document, Integer> {


    List<Document> findAll();


    @Query("select max(d.id) from Document d")


    Integer findMaxId();


    }


    CrudRepository<Document,Integer> 接口实际上已经定义了 findAll() 方法，但其签名默认为 Iterable<Document>
    findAll()。这并不差，但使用 Iterable<Document> 比使用 List<Document> 需要更多繁琐的工作；我们在这里所做的是告诉
    Spring Data，我们希望它使用*这个*签名，因此 findAll() 返回的是 List<Document>。我们也可以使用 Set<Document>，但我们希望对集合进行有序访问，所以选择
    List<Document>。


