- fmt: "### **Listing 7-3.** `chapter07/src/main/java/c07/DocumentType.java`\n\n```java\n\
    package c07;\n\npublic enum DocumentType {\n\n    PDF(\"PDF\", \"Portable Document\
    \ Format\", \".pdf\"),\n\n    DOCX(\"DOCX\", \"Word Document\", \".docx\"),\n\n\
    \    URL(\"URL\", \"Universal Resource Locator\", \"\"),\n\n    DOC(\"DOC\", \"\
    Word Document\", \".doc\"),\n\n    NOTE(\"NOTE\", \"Ancillary note\", \"\");\n\
    \n    public final String name;\n\n    public final String desc;\n\n    public\
    \ final String extension;\n\n    DocumentType(String name, String desc, String\
    \ extension) {\n\n        this.name=name;\n\n        this.desc=desc;\n\n     \
    \   this.extension=extension;\n\n    }\n\n}\n```\n\nNext, let’s take a look at\
    \ our `SearchEngine` structure. The `SearchEngine` itself is going to be what\
    \ we’ve already seen: an interface with two methods.\n\n### **Listing 7-4.** `chapter07/src/main/java/c07/SearchEngine.java`\n\
    \n```java\npackage c07;\n\nimport java.util.List;\n\npublic interface SearchEngine\
    \ {\n\n    List<Document> findByType(DocumentType documentType);\n\n    List<Document>\
    \ listAll();\n\n}\n```\n\nWe’re going to be copying things wholesale again in\
    \ the next chapter, too.\n\n## Chapter 7 Letting Spring Build Your Data Access\
    \ Objects\n\nWe’re also going to have a concrete implementation, very similar\
    \ to the `DAOSearchEngine` from Chapter [6](https://doi.org/10.1007/978-1-4842-8637-1_6),\
    \ except as we’re going to use a Spring Data Repository, we’re going to call it\
    \ the `RepositorySearchEngine`. The purpose of this class is to delegate to a\
    \ `DocumentRepository`, which we’ll see very soon.\n\n### **Listing 7-5.** `chapter07/src/main/java/c07/RepositorySearchEngine.java`\n\
    \n```java\npackage c07;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import java.util.ArrayList;\nimport java.util.List;\n\npublic class RepositorySearchEngine\
    \ implements SearchEngine {\n\n    private final DocumentRepository dao;\n\n \
    \   public RepositorySearchEngine(DocumentRepository repository) {\n\n       \
    \ this.dao = repository;\n\n    }\n\n    public DocumentRepository getDao() {\n\
    \n        return dao;\n\n    }\n\n    @Override\n\n    public List<Document> findByType(DocumentType\
    \ documentType) {\n\n        return getDao().findByType(documentType);\n\n   \
    \ }\n\n    @Override\n\n    public List<Document> listAll() {\n\n        var documents\
    \ = new ArrayList<Document>();\n\n        getDao().findAll().forEach(documents::add);\n\
    \n        return documents;\n\n    }\n\n}\n```\n\n## Chapter 7 Letting Spring\
    \ Build Your Data Access Objects\n\nNote that we don’t have an annotation marking\
    \ this as a `@Service`, we’re going to define a configuration in Java that provides\
    \ access to the bean, as opposed to relying on scanning. We *could* use scanning,\
    \ but in practical reality you’ll see a mix of approaches.\n\nWe’ll want to have\
    \ seed data, so we’re going to reuse the `import.sql` from Chapter [6](https://doi.org/10.1007/978-1-4842-8637-1_6).\n\
    \nNote that we don’t need a `schema.sql` equivalent – we’re going to let Spring\
    \ Data create the schema, even though this is probably unwise in a production\
    \ environment. (We will, however, have to direct Hibernate to accept multiline\
    \ SQL statements, because otherwise they’re too long to print cleanly.)\n\n**Note:**\
    \ Spring Data will use `import.sql` from the classpath any time it knows it needs\
    \ to create the schema. As we’re using an in-memory database, no schema will exist,\
    \ and Spring Boot will run the import for us.\n\n### **Listing 7-6.** `chapter07/src/main/resources/import.sql`\n\
    \n```sql\ninsert into document (id, name, type, location)\nvalues (\n    1,\n\
    \    'Book Template',\n    'PDF',\n    '/Docs/Template.pdf'\n);\n\ninsert into\
    \ document (id, name, type, location)\nvalues (\n    2,\n    'Apress Home Page',\n\
    \    'URL',\n    'https://apress.com'\n);\n\ninsert into document (id, name, type,\
    \ location)\nvalues (\n    3,\n    'Chapter Template',\n    'DOC',\n    '/Docs/Chapter\
    \ Sample.doc'\n);\n\ninsert into document (id, name, type, location)\nvalues (\n\
    \    4,\n    'chapter 1',\n    'DOCX',\n    '/Book/Chapter 01.docx'\n);\n```\n\
    \nWe can tell Hibernate to accept the multiline SQL through the use of `application.properties`:\n\
    \n### **Listing 7-7.** `chapter07/src/main/resources/application.properties`\n\
    \n```properties\nspring.jpa.properties.hibernate.hbm2ddl\\\n.import_files_sql_extractor=org.hibernate\n\
    ```"
