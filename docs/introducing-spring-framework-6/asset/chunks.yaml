    \nAt long last, we’re ready to look at the Repository itself.\n\n## Spring Data\
    \ Repositories\n\nSpring Data provides a `CrudRepository<Type, PrimaryKeyType>`\
    \ interface, which has two type parameters: the type of the class being persisted\
    \ (`Document` in this chapter) and the type of the primary key associated with\
    \ the class being persisted (`Integer`, for `Document`).\n\nThe `CrudRepository<?,?>`\
    \ interface provides access to a number of fairly standardizable operations one\
    \ might want associated with a data access object:\n\n3 See [https://docs.spring.io/spring-boot/docs/current/reference/html/application-properties.html](https://docs.spring.io/spring-boot/docs/current/reference/html/application-properties.html)\
    \ for a *partial* list of properties. Ironically, the one we’re using here isn’t\
    \ in this list.\n\n- `save(T)` – this saves the entity passed to it and returns\
    \ an instance suitable for further operations.\n- `saveAll(Iterable<T>)` – this\
    \ method takes an iterable collection of entities and returns a collection of\
    \ entities suitable for further persistence operations, much as `save()` does\
    \ for individual objects.\n- `findById(ID)` – this method looks up an entity using\
    \ the parameter as a primary key. It returns an `Optional<T>` – if the primary\
    \ key doesn’t exist, the `Optional` will contain a null value.\n- `existsById(ID)`\
    \ – this returns a boolean value indicating whether the primary key exists in\
    \ the data store.\n- `findAll()` – this returns an `Iterable<T>` that contains\
    \ all instances of the type in the data store.\n- `findAllById(Iterable<ID>)`\
    \ – this returns an `Iterable<T>` for every instance in the database that has\
    \ a matching identifier in the set of ids. If a given id does not exist in the\
    \ database, it simply won’t be included in the returned `Iterable<T>`.\n- `count()`\
    \ – this returns the number of entities managed in the data store for this type.\n\
    - `deleteById(ID)` – this deletes a matching record in the data store for this\
    \ id.\n- `delete(T)` – this deletes a given entity, assuming it exists in the\
    \ database.\n- `deleteAllById(Iterable<ID>)` – this deletes all matching id entries\
    \ in the data store.\n- `deleteAll(Iterable<T>)` – this deletes all entries that\
    \ have matches in the `Iterable` from the data store (i.e., “delete records that\
    \ match the collection passed in”).\n- `deleteAll()` – this clears the data store\
    \ of all entities.\n\nAs you can see, this is quite flexible for most operations\
    \ one would want with a data access object; there’s another implementation, the\
    \ `PagingAndSortingRepository<?,?>`, that adds the ability to iterate through\
    \ a dataset with pagination.\n\nThere’s a lot of magic provided by Spring with\
    \ the `Repository` interfaces. Basically, to get everything the `CrudRepository<?,?>`\
    \ provides, all we *have* to do is define a *single* interface that extends the\
    \ `CrudRepository<?,?>`, adding the type information Spring needs.\n\nWe’ve had\
    \ an awful lot of buildup for the actual `DocumentRepository`, but here it is,\
    \ all of it:\n\n**Listing 7-8.** `chapter07/src/main/java/c07/DocumentRepository.java`\n\
    \n```java\npackage c07;\n\nimport org.springframework.data.repository.CrudRepository;\n\
    import org.springframework.stereotype.Repository;\nimport java.util.List;\n\n\
    @Repository\npublic interface DocumentRepository\n    extends CrudRepository<Document,\
    \ Integer> {\n\n    List<Document> findByType(DocumentType type);\n}\n```\n\n\
