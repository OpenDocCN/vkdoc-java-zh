- fmt: "### ***Listing 12-8.*** `chapter12/src/test/resources/property-context.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \                        http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \                        http://www.springframework.org/schema/lang\n        \
    \                http://www.springframework.org/schema/lang/spring-lang.xsd\"\
    >\n    <lang:groovy name=\"c.g.message\"\n                 script-source=\"classpath:/scripts/cgmessage.groovy\"\
    >\n        <lang:property name=\"message\" ref=\"message\"/>\n    </lang:groovy>\n\
    \    <bean name=\"message\" class=\"java.lang.String\">\n        <constructor-arg\
    \ value=\"hi there\" />\n    </bean>\n</beans>\n```\n\nAs with our previous example,\
    \ the only difference here is the use of the `<lang:groovy/>` tag to declare that\
    \ we’re dynamically loading it and the `<lang:property />` to configure it – note\
    \ how we inject a reference to `message` (with `ref`) just like we would with\
    \ any other Spring configuration. We could have used `value` just as easily. The\
    \ only real limitation that such scripted beans have is that we can’t use constructor\
    \ arguments.\n\nOf course, we can show you a configuration and a dynamic implementation,\
    \ but that’s not worth a lot without a test to validate it. Instead of using constants\
    \ for the expected message value, let’s load it from our Spring configuration.\n\
    \n### ***Listing 12-9.*** `chapter12/src/test/java/md/TestPropertyMessage.java`\n\
    \n```java\npackage md;\n\nimport org.springframework.test.context.ContextConfiguration;\n\
    import org.testng.annotations.Test;\n\n@ContextConfiguration(value = \"classpath:/property-context.xml\"\
    )\n@Test\npublic class TestPropertyMessage extends BaseMessageTest {\n}\n```\n\
    \nWe’re relying on the implementation of `BaseMessageTest` to do all of the work;\
    \ the main aspect of this test that differentiates it from any other of our tests\
    \ is the configuration filename.\n\n**Note** We could have used a test like Listing\
    \ [3-17](https://doi.org/10.1007/978-1-4842-8637-1_3#PC17), where we have a list\
    \ of configuration files in a `DataProvider`, loading each in a row and executing\
    \ them in a series. However, Listing [3-17](https://doi.org/10.1007/978-1-4842-8637-1_3#PC17)\
    \ was done mostly to show how that *could* be done; while there’s value in doing\
    \ so in a “real project,” here we’d want to build up our list of configuration\
    \ files, much as we did in [Chapter 3](https://doi.org/10.1007/978-1-4842-8637-1_3),\
    \ and work through what they do as we see them. The aggregate test adds no value.\n\
    \n## Inline Dynamic Content\n\nLet’s see one more example. In [Listing 12-8](#index_split_002.html#p201),\
    \ we see a configuration that loads an external file from the classpath and sets\
    \ a property in it; we don’t *have* to use an external file at all.\n\nWe can\
    \ write our service implementation directly in our configuration.\n\n### ***Listing\
    \ 12-10.*** `chapter12/src/test/resources/inline-context.xml`\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n     \
    \                   http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \                        http://www.springframework.org/schema/lang\n        \
    \                http://www.springframework.org/schema/lang/spring-lang.xsd\"\
    >\n    <lang:groovy name=\"inline.message\">\n        <lang:inline-script>\nimport\
    \ md.MessageService\n\nclass inlinegmessage implements MessageService {\n    String\
    \ message\n}\n        </lang:inline-script>\n        <lang:property name=\"message\"\
    \ ref=\"message\"/>\n    </lang:groovy>\n    <bean name=\"message\" class=\"java.lang.String\"\
    >\n        <constructor-arg value=\"aloha\" />\n    </bean>\n</beans>\n```\n\n\
    What do we *gain* from this? – primarily flexibility and ease of development.\
    \ We’ve been splattering a lot of files everywhere for our configurations and\
    \ implementation – a common facet of Java development – and here we have a trivial\
    \ way to shorten the distance between referencing the bean and its actual implementation.\n\
    \nIs this *valuable*? Well, as with so many other things, it depends. It’s likely\
    \ that this is actually a good way to *start* developing such services, as opposed\
    \ to a final delivery; you can work with a configuration with an inline implementation\
    \ until it works well enough and then convert it to an external file (as with\
    \ our other implementations) for refinement, possibly even reloading them as you\
    \ edit them on disk through the `refresh-check-delay` attribute in `<lang:groovy\
    \ />`.\n\nOf course, we can’t just show you the *configuration* without showing\
    \ you a test. As with [Listing 12-9](#index_split_002.html#p202), the test contributes\
    \ only the configuration filename to the process.\n\n### ***Listing 12-11.***\
    \ `chapter12/src/test/java/md/TestInlineMessage.java`\n\n```java\npackage md;\n\
    \nimport org.springframework.test.context.ContextConfiguration;\nimport org.testng.annotations.Test;\n\
    \n@ContextConfiguration(value = \"classpath:/inline-context.xml\")\n@Test\npublic\
    \ class TestInlineMessage extends BaseMessageTest {\n}\n```\n\n## Summary\n\n\
    In this chapter, we saw how to use dynamic languages and how they can help you\
    \ do quick and easy tasks; our task was quite trivial, but you could write anything\
    \ you needed to, like validating a URL, doing intent analysis through machine\
    \ learning, anything you’re able to express, honestly, leveraging the features\
    \ of the dynamic language implementation. We demonstrated Groovy here, but *any*\
    \ dynamic language that meets the JSR-223 specification can be used. We loaded\
    \ scripts from the classpath and implemented them inline in our configuration,\
    \ demonstrating a very powerful and easy way to develop behavior on the fly.\n\
    \n# CHAPTER 13\n\n# Where Do You Go From Here?\n\nWhat you’ve read so far has\
    \ been fairly encompassing for Java application development.\n\nWe’ve seen how\
    \ to build a project, how to configure dependency injection, and how to access\
    \ data; we’ve seen how to *present* data over the Web with an actual (but sparse)\
    \ interface using HTML and template rendering, as well as a REST API; we’ve seen\
    \ how to connect to message brokers, how to send (and receive) mail, and how to\
    \ configure Spring beans using dynamic language scripts on the fly.\n\nWhat’s\
    \ left?\n\nIt turns out that the answer is: nearly everything.\n\n## Spring and\
    \ the Impact on Development\n\nSpring’s been around for a long time, coming up\
    \ on nearly 20 years at the very least, from its earliest development. It’s used\
    \ quite literally by millions of Java developers and has heavily influenced the\
    \ entire Java ecosystem, from specifications to library implementations and further\
    \ to application design, by emphasizing and enabling SOLID principles, as described\
    \ by Robert Martin et al., [1](#index_split_002.html#p206) which are as follows:\n\
    \n- **S** – the single-responsibility principle\n- **O** – the open-closed principle\n\
    - **L** – the Liskov substitution principle\n- **I** – the interface segregation\
    \ principle\n- **D** – the dependency inversion principle\n\nThe single-responsibility\
    \ principle suggests that a class should do one thing and one thing only; if you\
    \ look back at our data access objects and our web controllers, you’ll see that\
    \ we tended to have tight focus on doing **one** thing: accessing data, or handling\
    \ input from the Web (and responding to it), or even delegating to our data access\
    \ classes such that we can add functionality if it’s appropriate.\n\nThe single-responsibility\
    \ principle tends to create a structure that has many\n\n---\n1 Martin, Robert\
    \ C., Michael C. Feathers, Timothy R. Ottinger, and Jeffrey J. Langr. *Clean Code:\
    \ A Handbook of Agile Software Craftsmanship*. Boston, MA: Pearson Education,\
    \ Inc, 2016.\n\n© Felipe Gutierrez, Joseph B. Ottinger 2022\nF. Gutierrez and\
    \ J. B. Ottinger, *Introducing Spring Framework 6*, [https://doi.org/10.1007/978-1-4842-8637-1_13](https://doi.org/10.1007/978-1-4842-8637-1_13#DOI)"
