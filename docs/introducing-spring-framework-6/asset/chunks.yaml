    我们首先注意到，这个测试中的 `@SpringBootTest` 引用了 `TestConfiguration.class`，因此测试拥有一个配置。


    此外，我们在 `source` 中引用了“发送邮箱地址”，在 `title` 中引用了“生成的标题”（由 UUID 生成），并且包含一个用于发送邮件的工具方法。


    （我们不需要引用正文内容，因为测试中并未用到它。）我们的第一个测试是 `testSendEmail()`，它非常简单：只是调用了 `EmailService.send()`
    方法。如果这里出错，意味着发送本身失败（毕竟异常会被传播）；我们尚未验证邮件是否真的已发送。那是*下一个*测试 `checkReceiveEmailFromInbox()`
    的任务。


    `checkReceiveEmailFromInbox()` 测试依赖于 `testSendEmail()` 的成功——毕竟，如果无法发送邮件，我们就不想再去搜索那封未能发送的邮件！


    该方法使用了 `EmailService.processMessages()` 方法；其谓词会查找主题与标题字符串（为此测试生成的随机 UUID）值匹配的邮件。消费者只是告知测试：是的，找到了该标题。然后测试会检查找到的值是否被设置为
    `true`——这意味着谓词成功找到了主题匹配的邮件。


    **注意** 我们使用了 `AtomicBoolean`，因为 Java 中的 lambda 表达式要求引用必须是 `final` 或*实际上*是 `final`
    的；使用 `AtomicBoolean` 意味着我们无需声明一个包含单个元素的 `final` 布尔数组，例如 `final boolean found[1];`。


    我们还有一个测试，它与 `checkReceiveEmailFromInbox()` 方法非常相似，实际上最初就是从它复制而来的。`checkReceivedEmailByTitle()`
    方法使用了一个谓词，该谓词仅返回与给定标题匹配的邮件，并在匹配到邮件时调用 `mailService.deleteMessage()` 方法（传入 `Folder`
    和 `Message`）。因此，如果它找到了*匹配的邮件*（即标题符合预期），我们不仅会标记该邮件为*已找到*，还会将其删除，这样我们就可以运行测试而不会用垃圾邮件填满
    POP3 邮箱。


    那么，我们最终拥有一个工具类（`EmailService`），它能够利用 Spring 的 `JavaMailSender` 轻松发送邮件（假设配置正确），并且我们还在
    `EmailService` 中构建了一些工具方法，演示了如何直接使用 JavaMail 来*读取*邮件。


    我们编写的 `EmailService` 可能本身并不具有广泛的通用性；它只能发送纯文本邮件，其读取邮件的机制局限于 POP3 而非更强大的 IMAP 协议（为简单起见），并且它读取邮件的方式实际上是遍历整个邮件文件夹。话虽如此，从一个仅用于演示目的的非常简单的类，到可能在生产代码中有用的东西，其实并不遥远，尤其是在我们了解了
    Spring 的异步能力之后。


    **Spring 中的异步任务**


    Spring 有多种处理任务异步调用的方法。[第 10 章](https://doi.org/10.1007/978-1-4842-8637-1_10)已经演示了通过
    JMS 使用消息代理的*架构*机制（其他协议如 MQTT，甚至特定代理如 RabbitMQ 也存在类似的可能性）。然而，JVM 本身也是多线程的，Spring
    帮助我们利用这一点来实现异步调用。


    *一般来说*，有三种方法可以利用多线程调用。


    1.  你可以手动管理，就像*没有* Spring 时一样，通过创建 `ExecutorService` 引用并通过它管理调度。

    2.  你可以使用 Spring 的 `@Async` 注解，通过配置将方法标记为支持异步调用。

    3.  你可以使用 Spring 调度器，基于本地时钟时间或按固定间隔调度方法调用。


