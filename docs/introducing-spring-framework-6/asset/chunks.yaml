- fmt: "# Chapter 12 Using Dynamic Languages\n\nThat’s pretty much it, but we haven’t\
    \ *used* it yet. Let’s fix that.\n\nFirst, we’re going to define a base test class\
    \ that provides basic functionality; it’ll autowire a `MessageService` and give\
    \ a hook for tests to specify what the message should be (as we’re going to change\
    \ the message for each of our examples). It will then check that the data it receives\
    \ from the dynamic implementation matches what is expected. Remember, this is\
    \ a *base* test class – we will extend it to provide actual testing functionality.\n\
    \n***Listing 12-5.*** `chapter12/src/test/java/md/BaseMessageTest.java`\n\n```java\n\
    package md;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.context.ApplicationContext;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.testng.annotations.Test;\n\nimport static org.testng.Assert.assertEquals;\n\
    \npublic abstract class BaseMessageTest extends\n        AbstractTestNGSpringContextTests\
    \ {\n\n    @Autowired\n    MessageService messageService;\n\n    @Autowired\n\
    \    ApplicationContext context;\n\n    public String getExpectedMessage() {\n\
    \        return context.getBean(\"message\", String.class);\n    }\n\n    @Test\n\
    \    void testMessageService() {\n        assertEquals(\n                messageService.getMessage(),\n\
    \                getExpectedMessage());\n    }\n}\n```\n\nNow we can look at an\
    \ actual test, `TestSimpleMessage.java`:\n\n***Listing 12-6.*** `chapter12/src/test/java/md/TestSimpleMessage.java`\n\
    \n```java\npackage md;\n\nimport org.springframework.test.context.ContextConfiguration;\n\
    import org.testng.annotations.Test;\n\n@ContextConfiguration(value = \"classpath:/simple-context.xml\"\
    )\n@Test\npublic class TestSimpleMessage extends BaseMessageTest {\n\n    @Override\n\
    \    public String getExpectedMessage() {\n        return \"hello world, man\"\
    ;\n    }\n}\n```\n\nThere’s not a lot to this class: it exists to provide a place\
    \ for the `@ContextConfiguration` (to specify which context file to load), it\
    \ includes the `@Test` annotation to force TestNG to evaluate it as a test (as\
    \ it has no tests of its own), and it has an implementation of `getExpectedMessage()`\
    \ that returns the message we expect, as a constant. Running this test will execute\
    \ the test from `BaseMessageTest` and validate that the `gmessage.groovy` script\
    \ does indeed return a message of `\"hello world, man\"` in proper Groovy-speak[.4](#index_split_002.html#p200)\n\
    \nSo what have we seen here? Not a lot – except that we’re loading the `gmessage.groovy`\
    \ dynamically, at runtime. It’s got constant behavior, so we’re not really doing\
    \ a lot besides loading it; that’s enough, but we can do more.\n\n4 I’ve been\
