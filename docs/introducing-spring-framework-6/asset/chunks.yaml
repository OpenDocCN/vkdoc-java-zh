    最后，我们准备来看看 REST 控制器本身。大部分情况下，它并没有什么特别之处，只是我们仍然在绕过一些重要的架构方面。


    第 10 章 暴露 REST API


    在典型的 Spring 代码中，我们会有*三个*类，而我们的示例只有*两个*：我们有一个与 `DocumentRepository` 通信的 `DocumentController`。在大多数
    Spring 设计中，你会有一个委托给 `DocumentService` 的 `DocumentController`，而 `DocumentService`
    本身会调用 `DocumentRepository` 上的方法。


    那么，我们为什么没有*那样做*呢？嗯，主要原因在于，对于我们正在演示的内容——REST 端点——额外的架构并没有增加任何价值。`DocumentController`
    会调用 `service.delete(id);`，而 `DocumentService` 会委托给 `DocumentRepository`，这样我们得到的只是一组主要将代码进一步向下委托到架构中的类。


    这种方式非常清晰，也是推荐的，但就我们*这里*的目的而言，它只会让章节变得更长，而没有实际好处。


    **注意** 在你自己的代码中，你应该优先使用多层架构。我们在这里没有使用它们，除非它们能带来好处，但这并不意味着它们*没有*好处；只是*在这里*没有好处。相反，我们将服务层和控制器层合并到了一个类中。


    以下是代码，我们将在看到清单后讲解其中的重要部分：


