    Java 本身更宽容，因此它非常适合快速原型开发。要使用此功能，你需要将一个文件系统位置添加到类路径，并从文件系统加载脚本；更改脚本，设置好 `refresh-check-delay`，你的脚本将按任意时刻的状态执行，包括你的实时编辑。


    话虽如此，让我们继续深入。


