- fmt: "accesses JDBC. [7](#index_split_002.html#p177)\n\n6 A `SimpleMailMessage`\
    \ is an object representing an email that has a very straightforward representation\
    \ of email – from, to, cc, bcc, and subject – and body contents are represented,\
    \ without having to get into multipart messages with downloadable content. See\
    \ [https://docs.spring.io/spring-framework/docs/current/javadoc-api/org/springframework/mail/SimpleMailMessage.html](https://docs.spring.io/spring-framework/docs/current/javadoc-api/org/springframework/mail/SimpleMailMessage.html)\
    \ for more.\n\n7 Remember, in JDBC, you get a `Connection`, and then you use that\
    \ to get a `PreparedStatement`, from which you get a `ResultSet`, as the typical\
    \ happy path for user code.\n\n# Chapter 11 Sending Emails from Within Spring\n\
    \n1. First, we get a `Session`.\n2. Then, we get a `Store` from the `Session`,\
    \ using an internal URL for the store type (“POP3” in this case). A `Store`, in\
    \ email contexts, is “where emails are stored.”\n3. We get a named `Folder` from\
    \ the store.\n4. At last, we can access `Message` entities from the `Folder`,\
    \ which are populated on demand, much as JDBC query results are accessed through\
    \ an active `Connection` – if the resources like the `Folder` are closed, we lose\
    \ access to the message attributes unless we’ve already copied them off.\n\nWe\
    \ know, given the nature of JavaMail data access, that we’ll need to have a way\
    \ to “save off” email contents; our first “access” method is `cloneMessage`, which\
    \ gives us a `SimpleMailMessage` based on the contents of a `Message`. We’re not\
    \ going for accuracy here, only sufficiency, as we’re not replicating JavaMail\
    \ in this chapter; thus, we copy off only the first from header, the first to\
    \ header, and the subject and simple text contents.\n\nThis method is insufficient\
    \ for any complex email addresses.\n\nAfter that, we have a number of cascading\
    \ methods:\n\n1. The `getSession()` method returns a JavaMail `Session`.\n2. The\
    \ `getStore(Session)` method takes a `Session` and returns a POP3-based `Store`,\
    \ based on the properties used to create the `EmailService`.\n3. The `getFolder(Store)`\
    \ method gets a named `Folder` (`INBOX`) from a `Store` and makes sure we can\
    \ write to it for convenience’ sake.\n\nOur next method is called `processMessages()`\
    \ and it’s … interesting. It takes two arguments: a `Predicate<Message>` and a\
    \ `BiConsumer<Folder, Message>`.\n\nWhat `processMessages()` is designed to do\
    \ is to read every message in the `INBOX` folder and select every message that\
    \ matches the predicate; for every message that matches the predicate, apply the\
    \ consumer.\n\n**Warning** our `EmailService` has a `getMessages()` method, but\
    \ `processMessages()` uses `getMessages()` from the `Folder` and not the `EmailService`.\
    \ We do not have a cyclic dependency, we promise.\n\nWe use this in `getMessages()`,\
    \ the very next method in `EmailService`. This method builds a local `List<SimpleMailMessage>`\
    \ and then passes in a predicate that always returns true – thus, it matches every\
    \ message – and a consumer that adds a cloned message (using `cloneMessage()`,\
    \ naturally) to the internal `getMessages()` list and then returns that list.\n\
    \nWe’ll see more of how we can apply `processMessages()` when we see our test\
    \ class, but first we have one last utility method, `deleteMessage()` – which\
    \ takes a `Folder` and a `Message`, making it a candidate for the consumer in\
    \ `processMessages()`. (It doesn’t use `processMessages()` to do anything because\
    \ it’s working on a reference we should already have, that we presumably got from\
    \ `getMessages()` or something like it.) That will, in fact, be exactly how the\
    \ method is used in our test class.\n\nIn fact, it’s time to *see* our test class\
    \ so we can tie all of this together and verify it works.\n\n**Warning** Remember,\
    \ none of this *will* work until you’ve set the runtime properties correctly.\
    \ How to set environment variables depends heavily on what operating system you\
    \ use and how you invoke the test.\n\nThis class contains a reference to the `EmailService`,\
    \ a “sending email address” in `source`, a “generated title” in `title` (generated\
    \ from a `UUID`), and contains a utility method to send email. The `sendEmail`\
    \ method returns a `long`, which is a simple “clock time” in milliseconds it takes\
    \ to run the method to send email; we don’t *need* that but it will be useful\
    \ in the second half of this chapter.\n\nNow let’s take a look at an actual test\
    \ class for `EmailService`.\n\nBefore we get to the test, we need a configuration.\
    \ It’s really just a placeholder for the Spring configuration annotations; in\
    \ a “real application,” we’d use `@SpringBootApplication` and get everything this\
    \ class has automatically, except for `@EnableScheduling`, which will show up\
    \ in the next section of this chapter. We could have more than one configuration\
    \ (one with `@EnableScheduling`, one without) but there’s not a benefit in doing\
    \ so; all `@EnableScheduling` does is tell Spring that it needs to instantiate\
    \ the scheduling service and scan for scheduling events, which we’ll cover soon.\n\
    \n***Listing 11-4.*** `chapter11/src/test/java/md/TestConfiguration.java`\n\n\
    ```java\npackage md;\n\nimport org.springframework.boot.autoconfigure.EnableAutoConfiguration;\n\
    import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
    import org.springframework.scheduling.annotation.EnableScheduling;\n\n@Configuration\n\
    @EnableAutoConfiguration\n@ComponentScan\n@EnableScheduling\npublic class TestConfiguration\
    \ {\n\n}\n```\n\nNow we get to our actual email service test.\n\n***Listing 11-5.***\
    \ `chapter11/src/test/java/md/TestEmailService.java`\n\n```java\npackage md;\n\
    \nimport jakarta.mail.MessagingException;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
    import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
    import org.testng.annotations.Test;\n\nimport java.time.LocalDate;\nimport java.util.UUID;\n\
    import java.util.concurrent.atomic.AtomicBoolean;\n\nimport static org.testng.Assert.assertTrue;\n\
    \n@SpringBootTest(classes = TestConfiguration.class)\npublic class TestEmailService\
    \ extends AbstractTestNGSpringContextTests {\n\n    @Autowired\n    EmailService\
    \ mailService;\n\n    @Value(\"${mail.address}\")\n    String source;\n\n    String\
    \ title = UUID.randomUUID().toString();\n\n    @Test\n    void testSendEmail()\
    \ {\n        mailService.send(\n                source,\n                source,\n\
    \                title,\n                \"This is a sample email, sent at \"\
    \ + LocalDate.now()\n        );\n    }\n\n    @Test(dependsOnMethods = \"testSendEmail\"\
    )\n    void checkReceiveEmailFromInbox() {\n        var messages = mailService.getMessages();\n\
    \        boolean found = false;\n        for (var message : messages) {\n    \
    \        if (title.equals(message.getSubject())) {\n                found = true;\n\
    \            }\n        }\n        assertTrue(found, \"failed to find message\
    \ with matching title\");\n    }\n\n    @Test(dependsOnMethods = \"testSendEmail\"\
    )\n    void checkReceivedEmailByTitle() {\n        var found = new AtomicBoolean(false);\n\
    \        mailService.processMessages(message -> {\n            try {\n       \
    \         return message.getSubject().equals(title);\n            } catch (MessagingException\
    \ e) {\n                throw new RuntimeException(e);\n            }\n      \
    \  },\n        (folder, message) -> {\n            mailService.deleteMessage(folder,\
    \ message);\n            found.set(true);\n        });\n        assertTrue(found.get(),\
    \ \"failed to find message with matching title\");\n    }\n}\n```"
