- fmt: "It turns out that Spring makes writing emails – sending them – pretty trivial,\
    \ because there’s a `JavaMailSender` interface that’s part of Spring; if we have\
    \ our application properties set up correctly (as shown in Listing [11-2, as](#index_split_002.html#p172)suming\
    \ your environment variables are set properly), we can trivially send mail with\
    \ `JavaMailSender`.\n\nReading email is a little different that writing email.\
    \ When you send mail, you typically use a standardized protocol called SMTP, [3\
    \ altho](#index_split_002.html#p172)ugh other custom protocols may exist.\n\n\
    When you read mail, you have many, many more options. One of the simplest protocols\
    \ is called P[OP3,4](#index_split_002.html#p172) although another common protocol\
    \ is IMAP[,5](#index_split_002.html#p172) and there are other alternatives to\
    \ these protocols, as well as variants of them. Each one has strengths and weaknesses;\
    \ POP3 is simple, but quite easy to use, and IMAP is probably the most common\
    \ and full-featured of the protocols, providing the concept of “folders” to emails\
    \ while adding some complexity to the process of retrieving emails. (As it turns\
    \ out, some of that complexity will affect how we use POP3, but it’ll be rather\
    \ mild.)\n\n3 SMTP stands for “Simple Mail Transfer Protocol,” as described as\
    \ of this writing by RFC 8314, which can be read from [https://datatracker.ietf.org/doc/html/rfc8314](https://datatracker.ietf.org/doc/html/rfc8314)\
    \ – and “Simple Mail Transfer Protocol” is an apt description, thankfully.\n\n\
    4 POP3 stands for “Post Office Protocol,” version 3, and is described by RFC 1081\
    \ – and many others. See [https://datatracker.ietf.org/doc/html/rfc1081](https://datatracker.ietf.org/doc/html/rfc1081)\
    \ for a starting point.\n\n5 IMAP is the “Internet Message Access Protocol” and\
    \ is described by RFC 9051, at [https://datatracker.ietf.org/doc/html/rfc9051](https://datatracker.ietf.org/doc/html/rfc9051).\n\
