    Chapter 12 Using DynamiC LangUages


    **Summary**


    In this chapter, we saw how to use dynamic languages and how they can help you
    do quick and easy tasks; our task was quite trivial, but you could write anything
    you needed to, like validating a URL, doing intent analysis through machine learning,
    anything you’re able to express, honestly, leveraging the features of the dynamic
    language implementation. We demonstrated Groovy here, but *any* dynamic language
    that meets the JSR-223 specification can be used. We loaded scripts from the classpath
    and implemented them inline in our configuration, demonstrating a very powerful
    and easy way to develop behavior on the fly.


