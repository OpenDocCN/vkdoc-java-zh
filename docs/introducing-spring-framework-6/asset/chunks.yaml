- fmt: "We have a lot of options for relational databases; [2 w](#index_split_001.html#p98)e’re\
    \ limited **only** by whether a `JDBC` driver exists for them or not, and there\
    \ are few (if any) relational databases for which `JDBC` drivers are not available.\n\
    \nOptions include databases like Oracle DB, MySQL, SQL Server, PostgreSQL, DB2,\
    \ and SQLite – and this is hardly an exhaustive list. In fact, we’re going to\
    \ use a database that’s *not* on this list, called H2.\n\n2 We keep mentioning\
    \ *relational* databases because this chapter is focused on databases that use\
    \ SQL. They’re the most common type of database in the field, but there are other\
    \ non-SQL databases; we’re going to mention some of them in the next chapter,\
    \ but we’re still going to focus on relationals because when you say “database,”\
    \ relational databases are what people usually think you’re talking about.\n\n\
    ## Chapter 6 adding Simple perSiStenCe to Your Spring appliCation\n\n[H2 (www.h2database.com/)](http://www.h2database.com/)\
    \ is an open source database engine that was designed to be embedded in a `JVM`\
    \ (although it can run as a separate server process, much like most other relational\
    \ databases). There’s no issue in having preferences for other databases, but\
    \ note that the SQL in this chapter caters *slightly* to H2.\n\nAs we’ll see,\
    \ Spring itself encourages use of H2, with support for a database for testing\
    \ purposes. We’ll see that in use in Listing [6-4.](#index_split_001.html#p100)\n\
    \n### Setting Up a JDBC Connection\n\nJava uses the concept of a `DriverManager`\
    \ to control database connections. Generally speaking, one registers a `JDBC`\
    \ driver (by putting it in the `JVM` classpath, as Java has a discovery mechanism\
    \ for `JDBC` drivers) and requests a database connection by specifying a `JDBC\
    \ URL` to a database along with a username and password.\n\n**Note** You can learn\
    \ about the basics of `JDBC` from the Java tutorial. See [https://docs.oracle.com/javase/tutorial/jdbc/basics/index.html](https://docs.oracle.com/javase/tutorial/jdbc/basics/index.html)\
    \ for more; it’s relevant for us here but is out of scope for this book.\n\nSpring\
    \ has a class available for use in Spring contexts, the `org.springframework.jdbc.datasource.DriverManagerDataSource`.\
    \ We’re going to configure it using property placeholders, so we can easily change\
    \ the values the connection uses, through the use of a `<context:property-placeholder/>`\
    \ tag in our XML configuration.\n\n**Note** We’ve used a lot of Java configuration\
    \ for Spring so far. Here, we’re using XML. This is just a style choice made for\
    \ this chapter; there’s nothing preventing us from doing the same in Java, and\
    \ this gives us a chance to explore more of the XML capabilities.\n\nBefore we\
    \ go too much further, let’s build our `build.gradle` file, which has two new\
    \ dependencies for this book: the H2 database and `spring-jdbc`, which gives us\
    \ the ability to construct our database on context startup[.3](#index_split_001.html#p99)\n\
    \n3 We’re going to describe database initialization very soon in this chapter.\n\
    \n### Chapter 6 adding Simple perSiStenCe to Your Spring appliCation\n\n***Listing\
    \ 6-3.*** chapter06/build.gradle\n\n```\ndependencies {\n    implementation \\\
    \n        \"org.springframework:spring-core:$springFrameworkVersion\"\n    implementation\
    \ \\\n        \"org.springframework:spring-context:$springFrameworkVersion\"\n\
    \    implementation \\\n        \"org.springframework:spring-test:$springFrameworkVersion\"\
    \n    implementation \\\n        \"org.springframework:spring-jdbc:$springFrameworkVersion\"\
    \n    implementation \\\n        \"com.h2database:h2:2.1.214\"\n}\n```\n\nNow\
    \ we can look at our Spring configuration. It’s got references to two classes\
    \ we don’t have source for yet, along with a reference to a `JDBCTemplate` instance,\
    \ which we’re *also* going to explain in an upcoming section in this chapter.\
    \ [4](#index_split_001.html#p100)\n\nNow that we have our build script, let’s\
    \ take a look at the configuration for this chapter. We want to zero in on the\
    \ `dataSource` bean and the things that go into configuring it, first."
