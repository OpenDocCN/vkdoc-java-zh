  raw: 'We’re going to use the spring-boot-starter-artemis project to provide our
    JMS


    layer; this actually imports the spring-messaging and spring-jms modules and wraps
    functionality around them, in particular around the Artemis message broker. If
    we include artemis-jms-server as a project dependency, Spring will start up a
    broker for us if one isn’t already available, much as the Spring Data relational
    dependencies will embed a database for us.


    Artemis[1](#index_split_002.html#p139) is one of many message brokers, based on
    the HornetQ message broker contributed to the Apache project. It provides a JMS-compatible
    container, of course, but also provides AMQP 1.0 and MQTT as underlying protocols.
    We’re going to focus on JMS, as it’s the most generic messaging layer.


    **Note** The most important thing we can learn is the general *technique* of using
    asynchronous messaging. If you use AMQP 0.9 (i.e., RabbitMQ), or MQTT, or any


    other supported messaging specification, the techniques will change only in terms
    of the specific annotations used, if you need specific broker features.


    1 Artemis’ home page is [https://activemq.apache.org/components/artemis/](https://activemq.apache.org/components/artemis/).


    ChAPTeR 9 InTegRATIng YouR SPRIng APPlICATIon wITh exTeRnAl SYSTeMS


    As with JDBC, the key interface for JMS is JmsTemplate. In real-world applications,
    it’s used primarily for *writing* messages, although it has mechanisms for receiving
    messages as well. (We’ll be using annotations to set up message listeners rather
    than leveraging JmsTemplate for receiving messages, as this is far more convenient
    and common for application developers.)


    The key method for sending messages is send(), oddly enough, with a few


    variants. The most useful one is send(String destinationName, MessageCreator


    messageCreator), which allows us to send a Message to a specific destination on
    the fly.


    Let’s start building out an application so we can see how this works.


    Our “application” is going to be a simple one. We’re going to create an application
    that sends 20 documents to an asynchronous queue; that queue will have a listener
    that creates database records based on those documents. We’re also going to dump
    the database contents after a few seconds, to make sure the data was written as
    we expected it to be.


    Let’s start building this out, by looking at our build.gradle, first.


    ***Listing 9-1.*** chapter09/build.gradle


    plugins {


    id "application"


    id ''org.springframework.boot'' version ''3.0.0-M4''


    id ''io.spring.dependency-management'' version ''1.0.13.RELEASE''


    }


    dependencies {


    implementation \


    ''org.springframework.boot:spring-boot-starter-data-jpa''


    implementation \


    ''org.springframework.boot:spring-boot-starter-artemis''


    implementation \


    ''com.h2database:h2:2.1.214''


    *// implementation \*


    *// ''org.apache.activemq:artemis-jms-server:2.24.0''*


    }


    application {


    mainClass.set("md.MyDocsApp")


    }


    ChAPTeR 9 InTegRATIng YouR SPRIng APPlICATIon wITh exTeRnAl SYSTeMS


    The important things to note here are:


    1\. The use of spring-boot-starter-artemis, which provides the


    JMS libraries for our application classpath, as well as providing


    hooks to start Artemis for us if we need it


    2\. The inclusion of artemis-jms-server, which is required if we


    want Boot to instantiate our broker for us (and we do, because


    broker configuration is very simple in development but in actual


    environments can be very complex and is outside of the scope of


    this book)


    3\. The inclusion of a database (H2) and the spring-boot-starter-


    data-jpa dependency, which gives us database access


    Now let’s get the database access out of the way. We will have a very simple Document
    class, with toString() implemented so we can trivially see the values in the Document
    for output. We’re using Spring Data JPA, so it has the JPA annotations included.
    Note that this class *must* implement Serializable, because we’re going to literally
    be serializing and deserializing it through our message broker.


    ***Listing 9-2.*** chapter09/src/main/java/md/Document.java


