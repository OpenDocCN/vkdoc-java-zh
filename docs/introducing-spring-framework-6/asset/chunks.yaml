    because there’s no need – again, it’s functionally identical to the XML


    configuration – and writing a test that can use the XML configuration *and* the
    annotations is more work than it’s worth for our purposes. it would be long and


    complicated and need more explanation than anyone would really want.


    **Summary**


    In this chapter, we saw how two of the primary scope types work in Spring and
    how they affect object construction (and when).


    **CHAPTER 5**


    **Using Resource Files**


    So far, we’ve put all of our data in *configurations* – whether as annotated source
    files or in XML configurations. In this chapter, we’re going to look at some Spring
    features to help us use data from external files.


    These external resources not only help us load the data we’re using[,1](#index_split_001.html#p83)
    but they’re also useful in separating out configuration, such as when you want
    to store secure data in external locations that shouldn’t be part of your source
    code or in internationalization for people who may not speak the same language
    you do.


    **Injecting a Resource**


    The first thing we’re going to do is create a configuration that provides a org.


    springframework.core.io.Resource – with the resource being something that holds
    the contents of a text file.


    Let’s start off by creating a chapter05 project. The build.gradle is very


    straightforward; it’s actually a *literal* copy of the build.gradle from Chapt[er
    4](https://doi.org/10.1007/978-1-4842-8637-1_4).


    ***Listing 5-1.*** chapter05/build.gradle


    dependencies {


    implementation \


    "org.springframework:spring-core:$springFrameworkVersion"


    implementation \


    "org.springframework:spring-context:$springFrameworkVersion"


    implementation \


    "org.springframework:spring-test:$springFrameworkVersion"


    }


    1 Consider Listing [2-6, fr](https://doi.org/10.1007/978-1-4842-8637-1_2#PC6)om
    Chapt[er 2, whic](https://doi.org/10.1007/978-1-4842-8637-1_2)h had a long list
    of new Document() calls to populate a list of documents. We should – and can –
    load that from external resources.


    © Felipe Gutierrez, Joseph B. Ottinger 2022


    F. Gutierrez and J. B. Ottinger, *Introducing Spring Framework 6*[, https://doi.org/10.1007/978-1-4842-8637-1_5](https://doi.org/10.1007/978-1-4842-8637-1_5#DOI)


    CHapteR 5 UsiNg ResoURCe Files


    Don’t forget to add include ''chapter05'' to the top-level settings.gradle.


    Let’s keep it simple and create a text file that says Hello, world – this is boring
    and predictable, but we’ll be validating the contents of the file in a test, so
    we *want* boring and predictable.


    ***Listing 5-2.*** chapter05/src/test/resources/hello.txt


    Hello, world


    **Note** Be careful about locations of the resources. Here, we’ve put hello.txt
    in our src/test/resources directory; what happens if we put it in src/main/


    resources as well, with different content? Resources are loaded through Java’s


    classloaders, so whichever version happens to be available first in the classpath
    is the one that will get loaded. Normally, test resources get added to the beginning
    of the classpath on test runs, so the test version will be used… for tests.


    Now for the fun part, let’s create a test that asserts that the contents of hello.txt
    match Hello, world as we expect. We’ll have two classes in one file, a configuration
    and a test, and the configuration is going to walk us through a few interesting
