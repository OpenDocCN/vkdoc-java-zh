    **private** final Properties sessionProperties;


    **private** final String username;


    **private** final String password;


    **private** final int pop3Port;


    **private** final String pop3Host;


    EmailService(JavaMailSender sender,


    @Value("${pop3.host}")


    String pop3Host,


