    3\. We’ve seen how to create components that can publish *to*


    destinations.


    4\. We’ve seen how to use the publishing components to write to


    those destinations, in a class that might serve as a template for


    bulk data upload.


    **Summary**


    This chapter has been a whirlwind introduction to using asynchronous messaging
    APIs in Spring, leveraging the JMS integration within the Artemis message broker,
    specifically to expose the ability to save data through our data access object
    asynchronously.


    Other messaging APIs are available to Spring and work in similar fashion to the
    JMS


    integration, but we’ve barely scratched the surface of an entire architectural
    approach that has surprising power for scalability.


    In our next chapter, we’re going to switch gears again and look at the Web again,
    by exposing REST functionality to our data access object.


    **CHAPTER 10**


    **Exposing a REST API**


    In our last chapter, we saw how to use asynchronous messaging APIs in Spring using
    the JmsTemplate to send messages and the @JmsReceiver annotation to *receive*
    them. Now we’re going to step back into the land of the Web, to build a set of
    endpoints that expose our data model to a rich client, using REST.


    **What Is REST?**


    REST stands for “REpresentational State Transfer” and generally refers to APIs
    that conform to a rough definition of resources accessed via URLs directly. It
    was defined by Dr. Roy Fielding in a rather well-known dissertation. [1](#index_split_002.html#p150)


    In general, REST asserts that every *thing* in your model can be represented through
    a URL, and HTTP verbs can be used to interact with those things. For example,
    to get a Document with an id of 1, one might access with an HTTP GET, a[t a URL
    of http://](http://yourhost.com/documents/1)


    [yourhost.com/documents/1](http://yourhost.com/documents/1). To access *all* documents,
    you might *get* [http://yourhost.](http://yourhost.com/documents)


    [com/documents](http://yourhost.com/documents) – note the lack of the identifier.
    Also note that documents are referred to as plural; you’re not accessing *a document*,
    but you’re accessing one of a *set* of documents.


    To create a Document, one could use a POST to [http://yourhost.com/documents](http://yourhost.com/documents)
    – as you’re creating a new Document, you have no id value, so you’re posting the
    new values to the collection of documents.


