    `var loadedDocument = loadDocument(id)`;


    **if** (`id != document.getId()`) {


    **throw new** `NotFoundException(id)`;


    }


    `loadedDocument.setName(document.getName())`;


    `loadedDocument.setLocation(document.getLocation())`;


    *// we don''t need an explicit save() because updating a managed*

    *// entity persists changes when the transaction ends.*


    }


    First, let’s note the use of a custom exception, the `NotFoundException`. This
    exists so we can easily map an exception condition to a specific HTTP code (404,
    in this case, the "not found" exception), through the use of the `@ResponseStatus`
    annotation.


    The first thing we see in the `DocumentController` itself is the use of `@RestController`
    instead of `@Controller`. This means that the method don’t return mapping to views
    (as with `@Controller`) – the methods return the actual objects we want to render
    for the client or `void` if there’s no HTTP response body.


    Next, we see the declaration of an injected value, the `DocumentRepository`.


    After that, we see the `loadDocument()` method, which handles the use of `Optional<Document>`
    to throw a `NotFoundException` if the value isn’t present. JPA itself actually
    handles such exceptions fairly trivially, but Spring Data has to compensate for
    the possible use of other data mechanisms.


    If we didn’t care about the specific error handling (the assignment of response
    status as well as a custom message), we could use `return dao.findById(id).orElseThrow(()
    -> new NotFoundException(id))`, which would end up with the exception being mapped
    to an HTTP server error response; this code is a little more clunky than just
    mapping the exception as we’ve done.


    We want the innate mapping of exceptions like this because "not found" isn’t the
    same as a "server error."


    Then we get to the actual mapping of our methods themselves. For methods we access
    with HTTP GET and other path-related verbs, we have a `@PathVariable` – thus we
    can call `get(Integer)` over the Web by using a URL such as `http://localhost:8080/documents/1`
    to access a `Document` with an `id` of 1. As with our `@Controller`, the `@PathVariable`
    is extrapolated from the URL path. The variable name is mapped to the `{id}` in
    the path, if there’s a match; we could tell the annotation how to map the name
    specifically if the argument name differed from the name in the URL path.


    The HTTP methods are all annotated not only with the appropriate request annotations
    but with `@Transactional`, which means that we’re establishing barriers around
    the operations such that they’re "safe" – if the database has a problem updating
    a record, an exception will be thrown and the updates will be properly discarded
    without leaving your database in a corrupted state. Our data model is too simple
    to have any real problems with transactions, but it’s still good practice.


    We have another GET method, except this time without the `/{id}` path variable;
    this is how REST suggests to retrieve a *collection*, in our case the entire set
    of `Document` objects we’re managing.


    The other methods are actually pretty straightforward: `post()` creates a new
    `Document` based on the body of the HTTP request sent (via HTTP POST, of course);
    `delete()` loads an existing document (throwing an HTTP "not found" response if
    the `id` doesn’t exist) and then deletes the entity. We do throw away the document
    reference, but if you wanted to, you could use it to report that the entity was
    deleted; since it’s unused, if you’re interested you can just remove the reference
    altogether.'
