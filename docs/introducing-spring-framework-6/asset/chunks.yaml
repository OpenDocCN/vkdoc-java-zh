    \n第 2 章 使用类与依赖关系\n\n4. 可通过关键字、名称、类型、内容、标签和类别进行搜索。\n\n5. 可按类别进行组织。\n\n6. 每个项目/文档可通过电子邮件或外部消息系统发送。\n\
