- fmt: "# Managing Spring Contexts\n\nManaging Spring contexts isn’t difficult, but\
    \ it’s not really *normal*, and we don’t need to practice using things we aren’t\
    \ going to encounter in real code; inheriting from `AbstractTestNGSpringContextTests`\
    \ is the “right way to go.”\n\nWith that said, however, Java only allows *one*\
    \ superclass, so we can’t inherit from a common base test class *and* a Spring\
    \ test class… or can we?\n\n## Chapter 3: Applying Different Configurations\n\n\
    We can’t inherit from two classes, but we *can* inherit from however many interfaces\
    \ we like, and Java introduced *default implementations* for interfaces all the\
    \ way back in Java 8. We can make a “base test” interface, and our tests can all\
    \ implement *that* interface and get the testing methods' implementations.\n\n\
    Let’s take a look at our `MyDocsBaseTest` as a starting point.\n\n**Listing 3-4.**\
    \ `chapter03/src/test/java/chapter03/MyDocsBaseTest.java`\n\n```java\npackage\
    \ chapter03;\n\nimport chapter03.service.SearchEngine;\n\nimport org.testng.annotations.Test;\n\
    \nimport static chapter03.model.DocumentType.PDF;\nimport static org.testng.Assert.assertEquals;\n\
    import static org.testng.Assert.assertNotNull;\n\npublic interface MyDocsBaseTest\
    \ {\n\n    SearchEngine getEngine();\n\n    @Test\n    default void testEngineNonNull()\
