- fmt: "Let’s explore more, though, and try to figure out if we can make the XML configuration\
    \ work for us instead of just being excessively verbose for the job we’re asking\
    \ it to perform. Let’s use it to populate our dataset.\n\nJust to get it out of\
    \ the way, let’s take a look at our test source. As with our other Spring tests\
    \ that use XML configuration, the only real differences here are in the name of\
    \ the class and the `@ContextConfiguration` annotation.\n\n***Listing 3-14.***\
    \ `chapter03/src/test/java/chapter03/MyDocsXMLDataTest.java`\n\n```\npackage chapter03;\n\
    \nimport chapter03.service.SearchEngine;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.test.context.ContextConfiguration;\nimport org.testng.annotations.Test;\n\
    \n@ContextConfiguration(locations={\"/docdata.xml\"})\n@Test\npublic class MyDocsXMLDataTest\n\
    \    extends MyDocsContextBaseTest {\n\n    @Autowired\n    SearchEngine engine;\n\
    \n    @Override\n    public SearchEngine getEngine() {\n        return engine;\n\
    \    }\n}\n```\n\nWe will show the use of references soon.\n\n## Chapter 3: Applying\
    \ Different Configurations\n\nWe’re going to populate our dataset by using a different\
    \ tag in our XML configuration, from a different XML *namespace*, the `util` namespace.\
    \ This means our XML header is going to change.\n\nOnce we’ve done that, we’ll\
    \ be able to use a `list` tag, and in the list we will be able to include a series\
    \ of other values. This is going to be a very verbose XML file, but it will show\
    \ us a few things: how to construct a list as a value and how to refer to a Spring\
    \ bean as a reference for a constructor, for example:\n\n***Listing 3-15.*** `chapter03/src/test/resources/docdata.xml`\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n        http://www.springframework.org/schema/beans/spring-beans.xsd\n\
    \        http://www.springframework.org/schema/util\n        http://www.springframework.org/schema/util/spring-util.xsd\"\
    >\n\n    <bean id=\"engine\"\n        class=\"chapter03.StaticSearchEngine\">\n\
    \        <constructor-arg name=\"documents\" ref=\"documentList\"/>\n    </bean>\n\
    \n    <util:list id=\"documentList\"\n        value-type=\"chapter03.model.Document\"\
    >\n\n        <bean id=\"doc1\" class=\"chapter03.model.Document\">\n         \
    \   <constructor-arg\n                name=\"name\"\n                value=\"\
    Book Template.pdf\"/>\n            <constructor-arg\n                name=\"type\"\
    \n                value=\"PDF\"/>\n            <constructor-arg\n            \
    \    name=\"location\"\n                value=\"/Docs/Template.pdf\"/>\n     \
    \   </bean>\n\n        <bean id=\"doc2\" class=\"chapter03.model.Document\">\n\
    \            <constructor-arg\n                name=\"name\"\n               \
    \ value=\"Apress Home Page\"/>\n            <constructor-arg\n               \
    \ name=\"type\"\n                value=\"URL\"/>\n            <constructor-arg\n\
    \                name=\"location\"\n                value=\"https://apress.com\"\
    />\n        </bean>\n\n        <bean id=\"doc3\" class=\"chapter03.model.Document\"\
    >\n            <constructor-arg\n                name=\"name\"\n             \
    \   value=\"Chapter Template.doc\"/>\n            <constructor-arg\n         \
    \       name=\"type\"\n                value=\"DOC\"/>\n            <constructor-arg\n\
    \                name=\"location\"\n                value=\"/Docs/Chapter Sample.doc\"\
    />\n        </bean>\n\n        <bean id=\"doc4\" class=\"chapter03.model.Document\"\
    >\n            <constructor-arg\n                name=\"name\"\n             \
    \   value=\"Chapter 01.docx\"/>\n            <constructor-arg\n              \
    \  name=\"type\"\n                value=\"DOCX\"/>\n            <constructor-arg\n\
    \                name=\"location\"\n                value=\"/Docs/Chapter 01.docx\"\
    />\n        </bean>\n\n    </util:list>\n</beans>\n```\n\nThe dataset construction\
