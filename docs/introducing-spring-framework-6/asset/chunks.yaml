    other custom protocols may exist.


    When you *read* mail, you have many, many more options. One of the simplest protocols
    is called P[OP3,4](#index_split_002.html#p172) although another common protocol
    is IMAP[,5](#index_split_002.html#p172) and there are *other* alternatives to
    these protocols, as well as variants of them. Each one has strengths and weaknesses;
    POP3 is simple, but quite easy to use, and IMAP is probably the most common and
    full-featured of the protocols, providing the concept of “folders” to emails while
    adding some complexity to the process of retrieving emails. (As it turns out,
    some of that complexity will affect how we use POP3, but it’ll be rather mild.)


