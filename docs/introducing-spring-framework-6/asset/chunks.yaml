- fmt: "# Bean Scopes\n\nScopes a single bean definition to the lifecycle of a HTTP\
    \ session. Only valid in the context of a web-aware Spring `ApplicationContext`.\n\
    \n`global`\n\nScopes a single bean definition to the lifecycle of a global HTTP\
    \ session. Typically only valid when used in a portlet context. Only valid in\
    \ the context of a web-aware Spring `ApplicationContext`.\n\nThe two scopes we\
    \ care about here are `singleton` and `prototype`.\n\nA `singleton`, in Java,\
    \ normally refers to a single reference that is made widely available – an object\
    \ that you only need (or want) one of. Java doesn’t really support the concept\
    \ of a *true* singleton – it can be done, but it’s absurdly difficult.\n\nInstead,\
    \ Java supports the idea of a singleton *per classloader*, which has its own difficulties,\
    \ and because Java is multithreaded by design, even constructing a singleton for\
    \ a given classloader can be hard to guarantee. Note that it’s not *impossible*\
    \ and once you know what you’re doing and accept the limitations, it can be reduced\
    \ to a simple pattern (to wit: instantiate statically and early).\n\nIn Spring,\
    \ a `singleton` is scoped to an application context, but within a given application\
    \ context, any time you retrieve an object, you’ll get the same object reference.\n\
    \nA component that is scoped as a `prototype` is constructed *every time you retrieve\
    \ a matching object from the context*, using the definition as a model. This definition\
    \ is important: if you retrieve a prototyped component from the context and then\
    \ pass that component around, you’re going to have the same reference; Spring\
    \ isn’t going to reach into your code and create new references for you. You *have*\
    \ to retrieve them explicitly from the context to trigger the prototyped behavior.\n\
    \n**Note** The default scope is `singleton` – if you don’t tell Spring explicitly\
    \ what scope to use, you’re going to get the `singleton` behavior.\n\n# Chapter\
    \ 4: Using Bean Scopes\n\n`Singletons` are appropriate when your components don’t\
    \ manage state. If you need to manage object state, such as tracking a status\
    \ of a given object or conversation, a `prototype` is best.\n\n## Using the Scopes\n\
    \nIn order to examine our scopes, we’re going to build a `chapter04` project,\
    \ of course, but we’re also going to build a test class that loads XML configurations\
    \ and run our tests using those configurations. They won’t be long, but they’ll\
    \ have some subtle differences, so be careful.\n\nOur `build.gradle` is quite\
    \ literally a copy of the `build.gradle` from Chapter [3](https://doi.org/10.1007/978-1-4842-8637-1_3).\n\
    \n***Listing 4-1.*** `chapter04/build.gradle`\n\n```\ndependencies {\n    implementation\
    \ \\\n        \"org.springframework:spring-core:$springFrameworkVersion\"\n  \
    \  implementation \\\n        \"org.springframework:spring-context:$springFrameworkVersion\"\
    \n    implementation \\\n        \"org.springframework:spring-test:$springFrameworkVersion\"\
    \n}\n```\n\nWe need to add a reference to our top-level `settings.gradle`:\n\n\
    ***Listing 4-2.*** `settings.gradle`\n\n```\n// prior content in settings.gradle\n\
    include 'chapter02'\ninclude 'chapter03'\ninclude 'chapter04'\n```\n\nBefore we\
    \ take a look at the test itself, let’s see some classes that we’ll use to test\
    \ out our scopes: a `Producer` and `Consumer` class.\n\nThe `Producer` produces\
    \ a value, a number of times a given method is called, and maintains internal\
    \ state to track this number. (This will be relevant for testing out our bean\
    \ scopes.) It also helpfully tells us when it’s being constructed.\n\n***Listing\
    \ 4-3.*** `chapter04/src/test/java/c04/Producer.java`\n\n```\npackage c04;\n\n\
    import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\npublic class Producer\
    \ {\n    Logger logger = LoggerFactory.getLogger(this.getClass());\n    int executions\
    \ = 0;\n\n    Producer() {\n        logger.info(\"constructed as \" + Integer.toHexString(hashCode()));\n\
    \    }\n\n    int execute() {\n        return ++executions;\n    }\n}\n```\n\n\
    Next comes our `Consumer` class, which has no internal state of its own but uses\
    \ a `Producer` and tells us what `Producer` with which it is constructed.\n\n\
    ***Listing 4-4.*** `chapter04/src/test/java/c04/Consumer.java`\n\n```\npackage\
    \ c04;\n\nimport org.slf4j.Logger;\n```"
