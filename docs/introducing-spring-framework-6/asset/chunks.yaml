    第13章 接下来去哪里？


    这创建了一个精简的类实现；再次强调，鼓励简单性。它使一切更容易设计和调试，从而使每个人作为程序员都更有效率。


    依赖倒置原则建议我们的设计应该依赖于*抽象*。我们使用了大量的接口和（偶尔）基类；这些是被使用的类型，除非我们专门测试具体行为。


    依赖关系在接口上，而不是具体实现上，这意味着我们编程是为了实现接口的*意图*——针对契约而不是针对实际的类。


    针对契约编程意味着我们基于我们*打算*做什么来编程，而不是我们如何做。知道搜索文档会查询数据库并不重要——我们只想搜索文档。这就是接口和实现之间的区别，而Spring在鼓励我们使用这个原则方面做得*非常出色*。


    **更广阔的Spring世界**


    有趣的是：这本书是对Spring的介绍，但它仅仅触及了更广泛生态系统的表面。我们像弹球一样从一个主题跳到另一个主题，通常随着我们的深入建立更复杂的主题，并整合我们从之前章节学到的概念，但即便如此，我们做的也相对较少。


    Spring有几乎*所有*东西的模块。查看Spring Initializr项目（[https://start.spring.io](https://start.spring.io)），你可以找到帮助你使用`GRAPHQL`、`HATEOAS`、响应式编程、多种模板引擎（包括我们在示例代码中演示的`Thymeleaf`）、带有`OAUTH2`或其他安全实现的安全层、对关系系统（通过`JDBC`或`JPA`，两者都已演示）或`NoSQL`数据存储（如`MongoDB`）的数据访问、对多个消息系统（如`Artemis`或`RabbitMQ`、`Kafka`或`Apache
    Camel`）的访问、批处理等等。


    而这*仅仅*是官方的Spring项目；开源世界增加了更多。


    即使超出这些，如果该功能可以用Java构建（或从Java访问），Spring的设计原则使你可以轻松实现自己的服务，就像我们在第[11](https://doi.org/10.1007/978-1-4842-8637-1_11)章中实现的电子邮件服务一样。[3
    D](#index_split_002.html#p209)以“Spring方式”做事往往会创建易于维护的代码，并紧密关注针对契约的设计，因此即使没有现成的Spring项目来满足你的需求，Spring也能帮助你确定你*实际*需要什么，并专注于*那方面*的编程，这样你最终会得到可组合的模块，在你的最终设计中创造强大的功能。


    你*应该*在哪里进一步探索？嗯，和往常一样，这取决于情况。


    如果你在处理数据，`Spring Data`有许多适用的项目，但你的兴趣主要取决于你需要使用哪个数据库。


    对于Web，你需要查看`Spring Security`以及各种渲染引擎；你可能还想查看`Reactive`，尽管`Reactive`在非常高性能的场景中应用最为广泛。


    对于数据处理，你将查看其他消息层，如`Kafka`或`RabbitMQ`（如果你还没有使用`JMS`）；这些概念在各个库中传播，就像`Spring Data`概念适用于每种仓库类型一样。


    可能性是无限的，探索和成长是迷人且令人充满力量的。


