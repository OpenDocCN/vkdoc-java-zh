- fmt: "# Data Access Objects\n\nIn Chapter [6](https://doi.org/10.1007/978-1-4842-8637-1_6),\
    \ we saw how we can build a data access object using JDBC, configured with Spring.\
    \ In this chapter, we’re going to take a look at Spring Data, which provides a\
    \ bridge to other underlying persistence mechanisms – the Java Persistence API,\
    \ in this case, using Hibernate as an underlying implementation.\n\nHibernate\
    \ is an “object-relational mapper,” meaning that it’s a library that maps data\
    \ between the object and relational models. (In regular human language, it takes\
    \ Java objects and stores them in a relational database or loads relational data\
    \ into an object model.)\n\nIt’s important to know what object-relational mapping\
    \ is; for most real Java applications, it’s considered foundational knowledge\
    \ in many cases – but for us, it’s enough to know that it’s in common use, and\
    \ Spring Data provides a trivial way to leverage it.\n\nLet’s dive in.\n\n## The\
    \ Project\n\nOur `build.gradle` comes first. It calls back rather heavily to the\
    \ Spring Boot build in Chapter [2](https://doi.org/10.1007/978-1-4842-8637-1_2),\
    \ in that it has a plug-in for Boot itself, as well as the dependency manager;\
    \ the dependencies it brings in include Spring Data JPA, Boot’s test framework,\
    \ TestNG, and – lastly – the H2 database.\n\n> 1 If “object-relational mapper”\
    \ as a term feels familiar to you, it’s because we mentioned it in passing in\
    \ the last chapter or because you’ve paid attention to the Java ecosystem a touch\
    \ in the last few years.\n\n© Felipe Gutierrez, Joseph B. Ottinger 2022  \nF.\
    \ Gutierrez and J. B. Ottinger, *Introducing Spring Framework 6*[, https://doi.org/10.1007/978-1-4842-8637-1_7](https://doi.org/10.1007/978-1-4842-8637-1_7#DOI)\n\
    \n**Listing 7-1.** `chapter07/build.gradle`\n\n```\nplugins {\n    id 'org.springframework.boot'\
    \ version '3.0.0-M3'\n    id 'io.spring.dependency-management' version '1.0.11.RELEASE'\n\
