    F. Gutierrez and J. B. Ottinger, *Introducing Spring Framework 6*[, https://doi.org/10.1007/978-1-4842-8637-1_4](https://doi.org/10.1007/978-1-4842-8637-1_4#DOI)


    CHaPTer 4 USing Bean SCOPeS


    singleton


    Scopes a single bean definition to a single object instance per Spring


    ApplicationContext.


    prototype Scopes a single bean definition to any number of object instances.


    request


    Scopes a single bean definition to the lifecycle of a single HTTP request; that
    is, each and every HTTP request will have its own instance of a bean created off
    the back of a single bean definition. Only valid in the context of a web-aware
    Spring ApplicationContext.


