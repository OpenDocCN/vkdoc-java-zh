  trans: "\n**数据访问对象**\n\n在第 [6](https://doi.org/10.1007/978-1-4842-8637-1_6) 章中，我们了解了如何使用\
    \ JDBC 构建一个由 Spring 配置的数据访问对象。在本章中，我们将探讨 Spring Data，它为其他底层持久化机制提供了桥梁——在本例中，是\
    \ Java 持久化 API，并使用 Hibernate 作为底层实现。\n\nHibernate 是一个“对象-关系映射器”，1 me 这意味着它是一个在对象模型和关系模型之间映射数据的库。（用通俗的话说，它接收\
    \ Java 对象并将其存储在关系数据库中，或者将关系数据加载到对象模型中。）\n\n了解什么是对象-关系映射很重要；对于大多数真实的 Java 应用程序来说，它在许多情况下被认为是基础知识——但对我们而言，只需知道它被广泛使用，并且\
    \ Spring Data 提供了一种简单的方法来利用它就足够了。\n\n让我们开始吧。\n\n**项目**\n\n首先来看我们的 `build.gradle`。它很大程度上沿用了第\
    \ [2 章](https://doi.org/10.1007/978-1-4842-8637-1_2) 中的 Spring Boot 构建配置，因为它包含了\
    \ Boot 本身的插件以及依赖管理器；它引入的依赖包括 Spring Data JPA、Boot 的测试框架、TestNG，以及——最后——H2 数据库。\n\
    \n1 如果你觉得“对象-关系映射器”这个术语很熟悉，那是因为我们在上一章中顺带提过，或者是因为你在过去几年里对 Java 生态系统有所关注。\n\n© Felipe\
    \ Gutierrez, Joseph B. Ottinger 2022\nF. Gutierrez 和 J. B. Ottinger, *Introducing\
    \ Spring Framework 6*[, https://doi.org/10.1007/978-1-4842-8637-1_7](https://doi.org/10.1007/978-1-4842-8637-1_7#DOI)\n\
    \n第 7 章 让 Spring 构建你的数据访问对象\n\n***清单 7-1.*** chapter07/build.gradle\n\nplugins\
    \ {\n    id 'org.springframework.boot' version '3.0.0-M3'\n    id 'io.spring.dependency-management'\
    \ version '1.0.11.RELEASE'\n}\n\ndependencies {\n    implementation \\\n     \
    \   \"org.springframework.boot:spring-boot-starter-data-jpa\"\n    implementation\
    \ \\\n        \"org.springframework.boot:spring-boot-starter-test\"\n    testImplementation\
    \ \\\n        \"org.testng:testng:$testNgVersion\"\n    implementation \\\n  \
    \      \"com.h2database:h2:2.1.214\"\n}\n\n接下来，让我们看看数据模型——`DocumentType` 和 `Document`\
    \ 类，它们将与我们在第 [6 章](https://doi.org/10.1007/978-1-4842-8637-1_6) 中看到的类非常（*非常*）相似。最大的区别在于\
    \ `Document` 类，因为我们为其添加了 JPA 映射注解；至少，我们必须定义实体及其主键。我们可以使用 Hibernate 或 JPA 的 XML\
    \ 配置文件来实现，但最简单且最常见的方法是像我们这里一样使用注解。映射中唯一“有趣”的方面是 `type` 字段，我们将其映射为 `String` 类型，以匹配第\
    \ [6 章](https://doi.org/10.1007/978-1-4842-8637-1_6) 中的数据模型。\n\n***清单 7-2.***\
    \ chapter07/src/main/java/c07/Document.java\n\n**package c07**;\n\n**import jakarta**.\
    \ **persistence**.*;\n\n@Entity\n**public class** Document {\n    @Id\n    Integer\
    \ id;\n\n    @Column(nullable = **false**)\n    String name;\n\n    @Column(nullable\
    \ = **false**)\n    String location;\n\n    @Column(nullable = **false**)\n  \
    \  @Enumerated(EnumType.STRING)\n    DocumentType type;\n\n    **public** Integer\
    \ getId() {\n        **return** id;\n    }\n\n    **public** void setId(Integer\
    \ id) {\n        **this**.id = id;\n    }\n\n    **public** String getName() {\n\
    \        **return** name;\n    }\n\n    **public** void setName(String name) {\n\
    \        this.name = name;\n    }\n\n    **public** String getLocation() {\n \
    \       **return** location;\n    }\n\n    **public** void setLocation(String\
    \ location) {\n        **this**.location = location;\n    }\n\n    **public**\
    \ DocumentType getType() {\n        **return** type;\n    }\n\n    **public**\
    \ void setType(DocumentType type) {\n        **this**.type = type;\n    }\n}\n\
