  raw: 'In main(), we set up an “application context” – a term we’re going to use
    a lot in this book – and then we use the context to look up a MessageService.


    Our last action in the code is to write the message to the console.


    It’s time to run this, because we’ve put an awful lot of effort into it so far.


    If we’re in the chapter01-hello-world directory, we can run it with gradle


    run as seen in Figure [1-4](#index_split_000.html#p24):


    ***Figure 1-4.** Executing the chapter01-hello-world project*


    As stated before[,5](#index_split_000.html#p24) this code is *massively* overengineered.


    But if it runs properly, what we’ve done is we created an application with a message
    service component and used that component type to look up an implementation of
    that service.


    Our “application” no longer knows what the component implementation is; it’s


    something that returns a simple, deterministic message, in this case, but could
    do anything – look up a message from a database or perhaps derive a message from
    an execution context, for example – and the application would not have to know
    at all.


    4 We will also see other annotations that serve the same role as @Bean in declaring
    components, with their primary differences being that they mark different *types*
    of beans, providing programmers with better ideas about how the beans should be
    used. Other annotations apply actual functional changes as well, but we’ll cover
    those as we get to them.


    5 You *did* read the chapter text exhaustively, didn’t you?


    Chapter 1 Your First spring appliCation


    That’s the true power of Spring: it helps us think in terms of components, which
    leads us to a process by which we write naturally modular code.


    Modular code can be written for testability – a feature we’re probably going to
    lean into here – which means better code.


    **Hello, Boot**


    The Spring team released a new mechanism all the way back with Spring 4 called
    “Spring Boot.” Spring Bo[ot (https://spring.io/projects/spring- boot) is its o](https://spring.io/projects/spring-boot)wn
    ecosystem by now and provides a very easy and convenient on-ramp to a whole host
    of features in Spring. It’s *so* convenient, in fact, that access to a lot of
    Spring features nearly mandates the use of Spring Boot; you don’t *literally*
    need it to do many things (after all, it’s written with Spring, so if the Spring
    team can do it, so can you), but many of its features aren’t worth replicating
    outside of Spring Boot.


    We’ll see a lot of Spring Boot as the book progresses.


    To show off a tiny sliver of what it can do, let’s write a “Hello World” web service,
    an application that generates a message when a URL is opened.


    The first thing we need to do is configure the build itself. This means creating
    a directory for the Spring Boot application (chapter01-hello-boot), creating a
    build.


    gradle for the new module, and adding it to our top-level settings.gradle file.


    Here’s our build.gradle, which sets up our dependency resolution and a


    dependency on a spring-boot-starter-web module, which imports a lot of features


    related to cranking up a web service in one easy dependency:


    ***Listing 1-7.*** chapter01-hello-boot/build.gradle


    plugins {


    id "application"


    id ''org.springframework.boot'' version ''3.0.0-M4''


    id ''io.spring.dependency-management'' version ''1.0.13.RELEASE''


    }


    dependencies {


    implementation \


    ''org.springframework.boot:spring-boot-starter-web''


    }


    Chapter 1 Your First spring appliCation


    application {


    mainClass.set("chapter01.HelloWorldController")


    }


    This build uses a Spring plug-in for Gradle that allows us to import Spring


    components from a “bill of materials” – we specify a general name for a dependency,
    and the plug-in looks up everything we need. Thus, when we include spring-boot-starter-web,
    the dependency-management plug-in imports a bunch of dependencies for us, so we
    don’t have to worry about looking up specific versions for dependencies.


    Next, let’s go ahead and fix our settings.gradle, so we can easily compile and
    run the module. The only line that’s changed is the last line.'
