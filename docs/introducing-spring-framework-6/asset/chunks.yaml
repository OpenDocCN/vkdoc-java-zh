- fmt: '# Chapter 10: Exposing a REST API


    It’s pretty simple: `getForEntity()` takes a URL and a reference class. Thus,
    we build a URL to fit the `get()` method in our controller, and we pass in a `Document.class`
    so the entity type can be mapped. Our utility method also presumes that the request
    works – if the `Document` isn’t found, we expect the test to fail, so we use `assertEquals()`
    to make sure the response code is 200. We then use `getBody()` to get the deserialized
    content from the response – remember, when we call `getForEntity()` we pass in
    the type of the content, so the body type will return the deserialized `Document`.


    After that, the test methods are pretty straightforward.


    The `testGetDocument()` grabs a single `Document` from the list of all `Document`
    entities directly from the database and then tries to fetch that specific `Document`
    from the REST endpoint. If the status code is 200 – as validated by `getDocument()`
    – and the expected name matches, we can assume the GET succeeded and returned
    the data we expected.


    The `testGetBadDocument()` is a little more interesting. The very first thing
    it does is find the highest id in the database. It then tries to get the *next*
    id (which shouldn’t exist). There’s something wrong with this test! This is not
    meant to be an exhaustive example, but the test is *not* transactional; it’s possible
    that we could get the maximum id, and *then* another process could create a new
    `Document` (which would get the “next id,” one higher than the “maximum”), and
    then we’d fetch the “missing document” using the id that was *just* allocated.
    We could create a service that established better transactional boundaries to
    make this test a little stronger, but to make it truly rigorous would be a lot
    of work from which most users wouldn’t learn much. So we’re going to make the
    “safe assumption” that no extra applications just *happen* to be hitting our random
    port at *just* the wrong time.


    The `testGetAllDocuments()` method uses a `Document[].class` as the return type.
    We could have used a `List<Document>` if we were willing to create a new type
    that Java could use to figure out that the `List` held `Document` references (remember,
    Java doesn’t reify, so to the compiled code `List<Document>` is the same as `List`);
    in this case, an array has the same semantics (in that it has a length) that we
    can compare against the size of the list of *all* documents that we retrieve at
    the beginning of the method.


    **Note:** So why did we use a `Document[]` instead of a `List<Document>`? Because
    of the reification! When the REST endpoint returns the set of `Document` entities,
    it does so in a JSON list, and when we invoke `getForEntity()`, we don’t have
    a reified type for `List<Document>` – so we’d have to cast or use some other workaround.
    A JSON array can be used for both a `List<?>` and an array, so we used the array
    for simplicity’s sake.


    After that, we have the `testPostDocument()` method, which checks to make sure
    that the list of `Document` entities after the POST is one greater than the list
    *before* the POST.


    The `testDeleteDocument()` method inverts that process; it deletes one document
    and validates that the set of all documents is smaller than it was.


    Lastly, we have two tests for PUT: `testPutDocument()`, which – logically enough
    – tests that we can apply updates to an existing document, making sure the update
    was applied to the database, and then `testPutDocumentWithBadId()`, which submits
    a changed `Document` with a new id as well. PUT doesn’t return a meaningful response
    from the `RestTemplate`, so we check against the database directly to make sure
    no updates were applied.


    Most of these are fairly straightforward; they’re not exhaustive, but they’re
    “complete enough” that if the `DocumentController` is implemented improperly,
    our tests will fail. It’d be a good exercise for the reader to make the tests
    more thorough, but it wouldn’t help demonstrate anything new about the API we’re
    building.


    ## Summary


    What we’ve seen in this chapter is the use of `@RestController` to create a simpler
    endpoint for rendering data for rich clients, as well as some extra features of
    Spring Data (like the ability to save entities). We’ve also seen a testing mechanism
    that goes through our controller to validate that the REST endpoints work; we
    have a model by which we can build a client to exercise document creation, reads,
    updates, and deletes (but ironically, not searches, but given that we have implemented
    a *controller*, merging our `SearchEngine` code from earlier chapters would not
    be difficult *at all*. It’d just serve as the service layer, delegated to by the
    controller.)


    In our next chapter, we’re going to switch gears again and look at how we can
    send and receive email in Spring.


    # Chapter 11: Sending Emails from Within Spring


    In this chapter, we’re going to look at sending and receiving email in Spring.
    We’re also going to look at a way that we can *schedule* processes in Spring such
    that they don’t block an executing thread, leveraging the JVM’s threading mechanisms.


    ## Sending Email


    Sending and receiving email in the JVM involves a low-level API called JavaMail.
    JavaMail is a specification and implementation that maps a number of mail-related
    APIs very closely, without being prejudiced toward how those APIs are used. After
    all, many libraries that wrap services try to be opinionated about “proper usage”
    – thus, a database library might **force** programmers into using transactions.
    Those opinions might be worthwhile and justified, but they’re also limiting. JavaMail
    and other such libraries try to represent the underlying protocols as they actually
    are, rather than suggesting proper usage that may not be appropriate for all cases.


    This isn’t a *bad* thing, but it’s not a *good* thing, either, because the email
    protocols are designed for *efficient* use and not *ease* of use. Writing code
    using JavaMail directly tends to make one appreciate good email clients that hide
    all of the underlying APIs from the user experience.


    Spring makes *sending* email using the SMTP protocol very easy, using an interface
    called `JavaMailSender`. However, it doesn’t really help us *read* emails without
    going to yet another Spring module, which is out of scope for this book; we’re
    going to get to use JavaMail to read messages.


    Another issue working with email is that you need an email server, much like you
    need a database to work with JDBC. Spring happily embeds the H2 database for us
    if it’s in the classpath, but email servers are a *bit* more complex to deploy
    than a simple embedded database.


    We’re going to leverage [https://mailtrap.io](https://mailtrap.io), by Railsware,
    which provides SMTP, IMAP, and POP3 endpoints for testing emails.


    **Note:** This is not meant to be an endorsement or recommendation of Railsware,
    but mailtrap.io is incredibly useful for what it’s designed to do; the way we’re
    using the site doesn’t push it to its limits, and there may be costs to using
    mailtrap in certain ways. Be careful, even though we’ve found no issues using
    mailtrap in the process of developing this chapter. It is worth saying that mailtrap.io
    helped your authors avoid a ton of documentation and deployment work.'
