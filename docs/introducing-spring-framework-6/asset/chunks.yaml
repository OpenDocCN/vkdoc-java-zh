    第 11 章 在 Spring 中发送电子邮件


    1.  首先，我们获取一个 `Session`。

    2.  然后，我们从 `Session` 中获取一个 `Store`，使用一个内部 URL 来指定存储类型（本例中为“POP3”）。在电子邮件上下文中，`Store`
    就是“电子邮件的存储位置”。

    3.  我们从 `Store` 中获取一个命名的 `Folder`。

    4.  最后，我们可以从 `Folder` 中访问 `Message` 实体，这些实体是按需填充的，就像通过活动的 `Connection` 访问 JDBC
    查询结果一样——如果像 `Folder` 这样的资源被关闭，除非我们已经复制了消息属性，否则我们将失去对这些属性的访问权限。


    鉴于 JavaMail 数据访问的特性，我们知道需要一种方法来“保存”电子邮件内容；我们的第一个“访问”方法是 `cloneMessage`，它根据 `Message`
    的内容为我们提供一个 `SimpleMailMessage`。我们在这里追求的不是精确性，而是足够性，因为我们不会在本章中复制 JavaMail；因此，我们只复制第一个发件人标头、第一个收件人标头、主题和简单的文本内容。


    此方法对于任何复杂的电子邮件地址都不够用。


    之后，我们有一系列级联方法：


    1.  `getSession()` 方法返回一个 JavaMail `Session`。

    2.  `getStore(Session)` 方法接收一个 `Session`，并根据用于创建 `EmailService` 的属性返回一个基于 POP3
    的 `Store`。

    3.  `getFolder(Store)` 方法从 `Store` 中获取一个命名的 `Folder`（INBOX），并确保我们可以写入该文件夹以方便操作。


    我们的下一个方法叫做 `processMessages()`，它……很有趣。它接受两个参数：一个 `Predicate<Message>` 和一个 `BiConsumer<Folder,
    Message>`。


    `processMessages()` 的设计目的是读取 INBOX 文件夹中的每条消息，并选择所有与谓词匹配的消息；对于每条匹配的消息，应用该消费者。


    **警告** 我们的 `EmailService` 有一个 `getMessages()` 方法，但 `processMessages()` 使用的是 `Folder`
    中的 `getMessages()` 方法，而不是 `EmailService` 中的。我们保证不存在循环依赖。


