    \ c04 | grep -v spring`. The actual output is much longer and quite a bit more\
    \ verbose. it’s more informative, too, over the long run, but the extra information\
    \ doesn’t serve our purposes here.\n\n## Annotations\n\nWe can set scope with\
    \ annotations as well, of course. The annotation itself is `org.springframework.context.annotation.Scope`,\
    \ and it would look something like this:\n\n***Listing 4-10.*** `chapter04/src/test/java/c04/AnnotatedProducer.java`\n\
    \n```java\npackage c04;\n\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
    import org.springframework.context.annotation.Scope;\nimport org.springframework.stereotype.Component;\n\
    \n@Component\n@Scope(\"singleton\")\npublic class AnnotatedProducer {\n    Logger\
    \ logger = LoggerFactory.getLogger(this.getClass());\n    int executions = 0;\n\
    \n    AnnotatedProducer() {\n        logger.info(\"constructed\");\n    }\n\n\
    \    int execute() {\n        return ++executions;\n    }\n}\n```\n\nThis class,\
    \ loaded by a context, would be an exact duplicate of the producer references\
    \ from our XML configurations, where the `Producer` is set to prototype scope.\
    \ The *only* difference is in the use of annotations."
