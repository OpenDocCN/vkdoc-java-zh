    **Spring 及其对开发的影响**


    Spring 已经存在了很长时间，从其最早的开发算起，至少已经将近 20 年了。它被数百万 Java 开发人员使用，并通过强调和实现 SOLID 原则（由
    Robert Martin 等人描述 1）深刻影响了整个 Java 生态系统，从规范到库实现，再到应用程序设计。这些原则如下：


    • S – 单一职责原则


    • O – 开闭原则


    • L – 里氏替换原则


    • I – 接口隔离原则


