    到目前为止，你所读到的内容对于 Java 应用程序开发来说已经相当全面了。


    我们已经了解了如何构建项目、如何配置依赖注入以及如何访问数据；我们了解了如何通过使用 HTML 和模板渲染的实际（但稀疏）界面以及 REST API 在 Web
