    第 12 章 使用动态语言


    这里的一切都直接映射到我们在 Java 中的预期，除了包声明和一些标准的 Java 语法（例如行终止分号）。当然，分号在 Groovy 中是不必要的，包在这里也不是特别重要；我们可以使用一个包，但脚本在自己的脚本上下文中运行，所以通常没有必要。


    这里的简单性是可以的，因为我们并不是要演示 Groovy 有多强大——一个简单的实现就足够了，我们很快就会看到稍微更 Groovy 风格的脚本。


    有了这个，现在我们准备看看如何在 Spring 配置中定义它。


    这是本章中我们将看到的三个 Spring 配置中的第一个；它简单地从类路径加载我们的 `gmessage.groovy` 脚本，并将其提供给我们的 Spring
    应用程序。


    ***清单 12-4.*** chapter12/src/test/resources/simple-context.xml


    <?xml version="1.0" encoding="UTF-8"?>


    < **beans**


    xsi:schemaLocation="http://www.springframework.org/schema/beans


    http://www.springframework.org/schema/beans/spring-beans.xsd


    http://www.springframework.org/schema/lang


    http://www.springframework.org/schema/lang/spring-lang.xsd">


    < **lang:groovy** name="gmessage"


    script-source="classpath:/scripts/gmessage.groovy"/>


    </**beans**>


    这里需要注意的一点是，我们为脚本命名了（命名为 "gmessage"）——但这实际上并不是我们通常认为的 Spring bean。如果我们使用 `context.getBeanDefinitionNames()`
    获取 bean 名称，我们会看到一个类似 `org.springframework.scripting.groovy.GroovyScriptFactory#0`
    的名称，而不是 `gmessage`。然而，Spring 的 `ApplicationContext` 会在我们使用该名称（即 `context.getBean("gmessage")`）或类型（如
    `context.getBean(MessageService.class)`）时提供一个 bean 引用。

