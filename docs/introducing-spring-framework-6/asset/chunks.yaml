    \ a valid query (based on the storage engine, which is JPA in this case), such\
    \ that we don’t even have to define a valid JPA query anywhere: we just say, “Oh,\
    \ we’d like to do a search using the type field,” and Spring will build it for\
    \ us.\n\nThere’s a full grammar for determining the query, which can include pagination,\
    \ order, distinctions, and other elements; you can read about the full grammar\
    \ at [https://docs.spring.io/spring-data/jpa/docs/current/reference/html/#repositories.query-methods.details](https://docs.spring.io/spring-data/jpa/docs/current/reference/html/#repositories.query-methods.details).\
    \ There are ways to create shortcuts (and custom queries) for `Repository` instances,\
