    @Controller


    这是 @Component 的另一种特化形式，用于标记该组件在 Web 上下文中使用。


    在 ScannedSearchEngine 中，我们有一个可能适合作为 @Repository 的候选者，因为它使用了读取操作，但从架构上看，它可能拥有一个
    SearchEngine 委托的存储引擎，而不是本身作为一个仓库。因此，我们将其标记为 @Service。


    ***清单 3-9.*** chapter03/src/test/java/chapter03/MyDocsScanTest.java **package
    chapter03**;


    **import chapter03**. **service**. **SearchEngine**;


    **import org**. **springframework**. **beans**. **factory**. **annotation**. **Autowired**;
    **import org**. **springframework**. **context**. **annotation**. **ComponentScan**;
    **import org**. **springframework**. **context**. **annotation**. **Configuration**;
    **import org**. **springframework**. **test**. **context**. **ContextConfiguration**;
    **import org**. **testng**. **annotations**. **Test**;


    第 3 章 应用不同的配置


    @Configuration


    @ComponentScan(basePackages = "chapter03.service")


    **class** MyDocsScanConfig {


    }


    @ContextConfiguration(classes={MyDocsScanConfig.class})


    @Test


    **public class** MyDocsScanTest


    **extends** MyDocsContextBaseTest {


    @Autowired


    SearchEngine engine;


    @Override


    **public** SearchEngine getEngine() {


    **return** engine;


    }


    }


    这里，我们有一个标记为 @Configuration 的 MyDocsScanConfig 类，但同时还有一个 @ComponentScan 注解，我们告诉*这个*注解去扫描
    chapter03.service 包——否则，它会扫描所有名称以*配置类*包名开头的包。因此，由于这个配置类位于 chapter03 中，如果我们没有传递
    basePackages 值，扫描将包括 chapter03——当前包——以及 chapter03 下的任何包。4


    当运行此测试时，Spring 将检查 @ComponentScan 中指定的**每一个**类，并检查它是否是 @Component 或组件的特化形式，例如
    @Service。如果是，它将把该类加载到 ApplicationContext 中并使其可用，这意味着 MyDocsScanTest 的自动装配可以正常工作，并且我们的测试通过。


    **注意** 一般来说，我们目前看到的显式配置类是最“轻量级”的配置方法。组件扫描很方便，但稍微重一些。


    4 Java 包实际上*并非*层次结构；包在语义上并不是其他包的“子包”。


    第 3 章 应用不同的配置


    **Spring 中的 XML 配置**


    我们的下一个类看起来与 MyDocsConfigurationTest 类几乎相同，但有两个不同之处。一是没有 MyDocsConfig 类；另一个区别是
    @ContextConfiguration 将引用一个 XML 配置而不是一个类。


    我们先来看一下 MyDocsXMLTest，然后再看 XML 本身，并讨论一下为什么我们可能会使用 XML 进行配置。


    ***清单 3-10.*** chapter03/src/test/java/chapter03/MyDocsXMLTest.java **package
    chapter03**;


    **import chapter03**. **service**. **SearchEngine**;


    **import org**. **springframework**. **beans**. **factory**. **annotation**. **Autowired**;
    **import org**. **springframework**. **test**. **context**. **ContextConfiguration**;
    **import org**. **testng**. **annotations**. **Test**;


    @ContextConfiguration(locations={"/documents.xml"})


    @Test


    **public class** MyDocsXMLTest


    **extends** MyDocsContextBaseTest {


    @Autowired


    SearchEngine engine;


    @Override


    **public** SearchEngine getEngine() {


    **return** engine;


    }


    }


    @ContextConfiguration 注解使用了一个 locations 属性，它是类路径上命名资源的集合。由于我们引用了 /documents.xml，它将从类路径的根目录加载该资源。在我们的项目中，它位于
    chapter03/src/test/resources/documents.xml——我们将在下一个清单中看到——因此它可用于测试。


    从功能上讲，这里没有什么独特或特殊之处。以下是 XML 配置，它开始向我们展示一些更有趣的内容：


    第 3 章 应用不同的配置


    ***清单 3-11.*** chapter03/src/test/resources/documents.xml


    <?xml version="1.0" encoding="UTF-8"?>


    < **beans**


    xsi:schemaLocation="http://www.springframework.org/schema/beans


    http://www.springframework.org/schema/beans/spring-beans.xsd">


    < **bean** id="engine"


    class="chapter03.StaticSearchEngine"


    init-method="populateData"


    />


    </**beans**>


    这里我们看到与 MyDocsConfig 类相比*大量*的文本，而且其中几乎没有什么是我们应用程序特有的；只有 <bean/> 引用与我们的测试有关。*它*的作用相当简单：标记一个
    Spring bean（相当于 @Bean 注解）并给它一个名称（"engine"），除非你给它一个特定的名称，否则注解*会隐含*这个名称，然后指定实现类——这与我们的其他测试一样——是
    StaticSearchEngine。


    XML 是一个相当庞大且非常正式的规范。对于像这样的小型配置，它们非常冗长——XML 本身需要大量的样板代码，这使得我们简单的配置变成了六行样板代码对应两行实际内容——信噪比相当低.5


    XML 以一个声明它是 XML 文件的前言开始，然后有一个层次化的节点结构：有一个顶级节点（<beans>），它通过各种*属性*（xmlns、xmlns:xsi
    和 xsi:schemaLocation 部分）描述内容，然后在结束标签之前包含更多节点，结束标签是节点名称前加一个斜杠（因此：</beans>）。


    一个节点*不必*包含其他节点，正如我们在 <bean> 中看到的，它在结束尖括号前用一个斜杠自行结束。


    顶级节点上的属性引入了 *XML 命名空间*，它们通知 XML 解析器该 XML 文件应该是什么样子。xmlns 表示 <beans> 默认使用一个特定的模式（由
    URL 引用的 beans 模式），该模式本身规定 <beans> 节点包含特定的其他节点，例如 <bean>，以及为了使 XML 文件有效，*这些*节点可以或必须是什么样子。


    如前所述，这是一个*非常*正式的规范，许多程序员对这种形式主义感到不满；XML 非常非常强大，但不太受欢迎。


    **注意** 大多数程序员，包括 Spring 团队本身，更喜欢在代码中进行配置而不是使用 XML，并且当使用 XML 时，文件是通过自动处理所有命名空间的工具生成的，或者头信息是从其他文件复制的。


    话虽如此，XML 格式*确实*有其用途。在我们展示 XML 配置的一些更有用的方面之前，让我们先弄清楚我们*当前*的配置使用那个单一的 <bean/> 引用在做什么。


    <bean> 标签可以有*许多*选项。作为其中一些选项的简短示例：


    **属性**


    **描述**


    id


    bean 的标识符。只能定义一个唯一的 ID。


    class


    指向一个具体类，给出完整的 Java 包名。


    scope


    告诉 Spring 容器如何创建 bean；默认情况下，如果未设置此 scope 属性，bean 将是一个单例实例。其他作用域包括 prototype（每次需要
    bean 时创建一个新实例）、request（在每个 HTTP Web 请求中创建一个单例实例）和 session（创建一个 bean 并在 HTTP 会话期间存在）。


    init-method


    这是在 bean 创建后将被调用的方法名称。当你想在对象创建后设置状态时，这很有用。

