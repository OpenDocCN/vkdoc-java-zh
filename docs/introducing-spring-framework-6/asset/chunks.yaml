    **Summary**


    In this chapter, you saw how to create a simple Spring “Hello World” application
    and run it. You also learned how Spring uses dependency injection to create all
    the dependencies and collaboration between classes. Thanks to the small example,
    you saw that it doesn’t matter what implementation you create; as long as you
    follow the interface, Spring will inject its implementation and have it ready
    when you need it.


    You got a small sneak peek of the Spring Boot, a project by the Spring Team that
    will be covered in the following chapters. Along the way we got to see how Spring
    can be used by Kotlin just as easy as it can be used from Java.


    The following chapters will cover more detail of the Spring Framework, its features,
    and its Extensions. You’ll learn how they work together and how they can be used
    in your daily development.


    **CHAPTER 2**


    **Working with Classes**


    **and Dependencies**


    In this chapter, we’re going to see the beginnings of an application to help us
    maintain references to documents. First, we’ll discuss what we’re trying to accomplish,
    and then we’ll create classes that can help us keep track of documents; then we’ll
    *use* these classes in a straightforward Java test, and finally, we’ll create
    an equivalent with Spring to demonstrate some more of the framework’s capabilities.


    **The “My Documents” Application**


    Our application, tentatively named “My Documents” because “Bob” was already taken,
    is a simple interface where we will eventually be able to add documents of various
    types – URLs, Word documents, PDFs – for future retrieval.'
