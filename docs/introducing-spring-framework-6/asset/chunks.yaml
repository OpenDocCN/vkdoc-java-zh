    **import static org**. **testng**. **Assert**.*;


    **public class** ControllerTest {


    @Test


    **public** void testSearchController() {


    var engine=**new** SearchEngine() {


    *// left empty because we don''t use it in the controller.*


    @Override


    **public** List<Document> findByType(DocumentType documentType) {


    **return null**;


    }


    @Override


    **public** List<Document> listAll() {


    **return** List.of(**new** Document());


    }


    };


    ChapTer 8 ShoWing Your Spring appliCaTion on The Web


    var controller=**new** SearchController();


    var model=**new** BindingAwareModelMap();


    controller.setEngine(engine);


    var view=controller.searchAll(model);


    @SuppressWarnings("unchecked")


    List<Document> docs= (List<Document>) model.getAttribute("docs"); assertNotNull(docs);


    assertEquals(docs.size(),1);


    assertEquals(view, "search/all");


    }


    }


    An interesting aspect of this test is that it doesn’t use Spring at all, except
    for the BindingAwareModelMap; it doesn’t use any other Spring resources or a Spring
    context at all. This is a straightforward Java test that creates a local SearchEngine
    implementation, then instantiates a controller, injects our mock SearchEngine,
    and then invokes the searchAll() method and examines its output to validate that
    it matches our expectations.


    But how might one use the SearchController on the actual Web? Let’s see.


    **Thymeleaf**


    Thymeleaf is a template rendering library. The general concept is that you provide
    a template – for example, an ordinary HTML page – and a model, and Thymeleaf will


    replace content in the template as you direct, using namespaced tags.


    **Note** We’ve seen using namespaces in our XMl configurations: they’re tags like


    <context:property-placeholder />, for example. namespaces allow us


    to reuse names by specifying where those names are sourced; for property-


    placeholder, it’s the context namespace.


    ChapTer 8 ShoWing Your Spring appliCaTion on The Web


    The nice thing about the Thymeleaf templates, when they’re HTML, is that they


    are literally valid HTML; the use of the Thymeleaf-specific aspects doesn’t matter
    until Thymeleaf is used to render the template. Thus, you can design an HTML page
    as a static page until it looks suitable for your purposes and then replace content
    with Thymeleaf as needed.


    Further, in Spring, Thymeleaf integration comes fully ready for internationalization.


    Spring loads a property bundle called messages for us automatically, so we don’t
    have to figure out where something is located, and therefore we can use internationalized
    text with very little effort.


    A template with a name like search/all defaults to being located in the classpath
    under templates, so for our Thymeleaf template, we’ll want a resource in the classpath
    at templates/search/all.html. We’ll need to create the src/main/resources/


    templates/search directory for this.


