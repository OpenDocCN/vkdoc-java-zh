- fmt: '# 排版后的内容


    The first thing we notice about this test is that the `@SpringBootTest` has a
    reference to `TestConfiguration.class` so the test has a configuration.


    We also have references to a “sending email address” in `source`, and a “generated
    title” in `title` (generated from a UUID), and contains a utility method to send
    email. (We don’t need a reference to body content as we’re not leveraging it for
    the tests.)


    Our first test is `testSendEmail()`, which is quite simple: it simply calls the
    `EmailService.send()` method. An error here means that the send itself fails (an
    exception will be propagated, after all); we’re not testing to verify that the
    email was sent yet. That’s the *next* test, `checkReceiveEmailFromInbox()`.


    The `checkReceiveEmailFromInbox()` test depends on the success of `testSendEmail()`
    – after all, if we can’t send email, we don’t want to search for the email that
    wasn’t able to be sent!


    This method uses the `EmailService.processMessages()` method; the predicate looks
    for any message whose subject matches the value of the `title` string (the random
    UUID, generated for this test). The consumer simply informs the test that yes,
    the title was found. The test then checks to make sure that the found value is
    set to true – meaning that the predicate managed to find an email with a matching
    title.


    **Note:** We are using an `AtomicBoolean` because lambdas in Java require either
    final or *effectively* final references; the use of `AtomicBoolean` means we don’t
    have to declare a final array of booleans with one element in it, like `final
    boolean found[1];`.


    We have one more test, which is very similar to the `checkReceiveEmailFromInbox()`
    method and, in fact, was initially copied from it. The `checkReceivedEmailByTitle()`
    method uses a predicate that only returns messages that match a given title, and
    it calls `mailService.deleteMessage()` with the `Folder` and `Message` when it
    matches a message. As a result, if it finds a *matching message* (i.e., the title
    is what we expect), we not only mark the message as being *found*, but we delete
    it so we can run the test without filling the POP3 mailbox with junk.


    So what we have, then, is a utility class (`EmailService`) which is able to use
    Spring’s `JavaMailSender` to send email trivially, assuming that our configuration
    is correct, and we’ve also built some utility methods in `EmailService` that demonstrate
    how we can also use JavaMail directly to *read* email.


    `EmailService`, as we’ve written it, is probably not inherently broadly useful;
    it sends only plain text email, and its mechanism for reading emails is locked
    into POP3 instead of the more powerful IMAP protocol (for simplicity’s sake),
    and the way that it reads mail is to literally iterate through an entire mail
    folder. With that said, it’s not much of a leap from what is a very simple class
    usable only for demonstration purposes to something that might be useful in production
    code, especially after we look at the asynchronous capabilities in Spring.


    ## Asynchronous Tasks in Spring


    Spring has multiple approaches to handling asynchronous invocation of tasks. Chapter
    10 already demonstrated the *architectural* mechanism of using message brokers
    through JMS (and similar possibilities exist for other protocols like MQTT or
    even specific brokers like RabbitMQ). However, the JVM itself is also multithreaded,
    and Spring helps us leverage that for asynchronous invocation as well.


    There are, *generally speaking*, three ways you can leverage multithreaded invocation.


    1. You can manage it manually, just as you would *without* Spring, by creating
    an `ExecutorService` reference and managing dispatch through it.

    2. You can use Spring’s `@Async` annotation to mark a method as supporting asynchronous
    invocation through a configuration.

    3. You can use a Spring scheduler to dispatch method calls based on local clock
    time or at regular intervals.'
