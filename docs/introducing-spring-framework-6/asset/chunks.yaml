    **Summary**


    In this chapter, you defined your first Spring application, called **My Documents**.
    This application will evolve over the course of the entire book, so you can experiment
    and add more features using the Spring Framework and its Extensions.


    You saw the differences using plain Java, and you added a Spring flavor to it;
    the Spring Framework will help you to have a better object-oriented design, applying
    its dependency injection implementation.


    In the next chapters, you will dive deeper into Spring and learn how to enhance
    your application. You will see how to use collections, how to add some persistence,
    and how to expose your application on the Web and much more.


