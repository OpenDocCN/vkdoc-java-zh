- fmt: '# `@Value` 注解格式


    `@Value` 的格式非常简单：`"${app.title}"`，这是对我们在 `@PropertySource` 注解中指定的属性资源进行直接查找。


    **注意**：如果使用 `@PropertySource()` 并设置 `ignoreResourceNotFound=true`，那么 `@Value`
    将不会解析该资源——你会得到类似 `${app.title}` 的值，而不是属性的实际值。如果省略 `ignoreResourceNotFound` 或将其显式设置为
    `false`，则配置将加载失败，并抛出 `FileNotFoundException`。


    # 国际化


    **注意**：我非常想将本节命名为“Internationalization”（或者也许是“Internationalisation”或“¡Internacionalización!”）。谢天谢地，我还有一些克制力——尽管我的编辑可能不这么认为。另外，这个章节标题也太长了。


    # 第5章 使用资源文件


    在上一节“注入资源”中，我们展示了从 `Resource` 获取 `InputStream` 并将 `InputStream` 转换为 `String` 的机制。这很有趣，但本身并不是特别有用。然而，在需要支持多种语言的环境中，它*可以*变得有用——而且是必要的。


    让我们更进一步，展示如何使用 Java 的国际化功能根据区域设置显示应用程序标题。


    在[清单5-5](#index_split_001.html#p88)中，我们看到了如何加载 `menu.properties`，但我们可以使用类似的机制根据区域设置查找资源，并更进一步。


    Spring 有 `MessageSource` 的概念，它不仅允许我们根据区域设置查找资源，还可以对内容应用消息格式化。它使用与 Java 的 `java.text.MessageFormat`
    类相同的规则来实现这一点。


    首先，让我们看两个属性文件。第一个是“默认区域设置”，基于英语区域设置，另一个基于荷兰语[.3](#index_split_001.html#p90)。


    ***清单5-6.*** `chapter05/src/test/resources/i18nmenu.properties`


    ```

    app.title=My Documents

    app.greeting=Hello, {0}

    app.copyright=(c) 2022 by Apress Media

    ```


    ***清单5-7.*** `chapter05/src/test/resources/i18nmenu_nl.properties`


    ```

    app.title=Mijn Documenten

    app.greeting=Hallo, {0}

    ```


    如我们所见，我们有三个属性——`app.title`、`app.greeting` 和 `app.copyright`——其中 `app.copyright`
    完全没有本地化。


    `app.greeting` 文本使用简单的参数替换结构（遵循 `java.text.MessageFormat` 规则），因此它会将 `{0}` 替换为传递给
    `MessageSource.getMessage()` 方法的数组中的第一个参数。


    如果我们在 `MessageSource` 中查找 `app.copyright`，它将回退到默认消息，因此我们期望任何对 `app.copyright`
    的查找都返回英文文本。


