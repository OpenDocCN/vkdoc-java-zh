    getDao().findAll().forEach(documents::add);


    **return** documents;


    }


    }


    第 7 章 让 Spring 构建您的数据访问对象


    请注意，我们没有使用注解将其标记为 @Service，而是将在 Java 中定义一个配置来提供对 bean 的访问，而不是依赖扫描。我们*可以*使用扫描，但在实际应用中，你会看到多种方法的混合使用。


