    1.0\" encoding=\"UTF-8\"?>\n<beans\nxsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    http://www.springframework.org/schema/beans/spring-beans.xsd\">\n\n<bean id=\"\
    producer\" class=\"c04.Producer\"\nscope=\"prototype\"/>\n\n<bean id=\"consumer\"\
    \ class=\"c04.Consumer\"\nscope=\"prototype\">\n<constructor-arg name=\"producer\"\
    \ ref=\"producer\"/>\n</bean>\n\n<bean id=\"producerBean\" class=\"java.lang.Boolean\"\
    >\n<constructor-arg name=\"s\" value=\"true\"/>\n</bean>\n\n<bean id=\"consumerBean\"\
    \ class=\"java.lang.Boolean\">\n<constructor-arg name=\"s\" value=\"true\"/>\n\
    </bean>\n\n</beans>\n```\n\nWith these configurations, we have examples of every\
    \ combination of scopes for our two classes:\n\n1. Everything is a singleton (and\
    \ only two instances are created, period, and they’re reused).\n2. `Producer`\
    \ is a singleton and `Consumer` is a prototype; we create two `Consumer` references,\
    \ but they have the same `Producer`.\n3. `Consumer` is a singleton and `Producer`\
    \ is a prototype; we only create one `Consumer` (which gets a unique `Producer`),\
    \ but requesting `Producer` references explicitly get new `Producer` references.\n\
    4. Both `Producer` and `Consumer` are prototypes, and thus each `Consumer` gets\
    \ a unique `Producer` reference.\n\nOur logs even display this, although since\
    \ they use reference ids, they’ll look different for every execution. For one\
    \ run of the test, for example, we see the following output, truncated to save\
    \ (a lot of) space:\n\n```\nINFO c04.Producer – constructed as 93cf163\nINFO c04.Consumer\
    \ – constructed with producer 93cf163\nINFO c04.Producer – constructed as 5c10f1c3\n\
    INFO c04.Producer – constructed as 7ac2e39b\nINFO c04.Producer – constructed as\
    \ 78365cfa\nINFO c04.Consumer – constructed with producer 78365cfa\nINFO c04.Producer\
    \ – constructed as 3f6db3fb\nINFO c04.Consumer – constructed with producer 3f6db3fb\n\
    INFO c04.Producer – constructed as 1506f20f\nINFO c04.Consumer – constructed with\
    \ producer 1506f20f\nINFO c04.Consumer – constructed with producer 1506f20f\n\
    INFO c04.Producer – constructed as 19553973\nINFO c04.Consumer – constructed with\
    \ producer 19553973\nINFO c04.Producer – constructed as 4c4748bf\nINFO c04.Producer\
    \ – constructed as 7ce97ee5\n```\n\n**Note** if you’re wondering, that output\
