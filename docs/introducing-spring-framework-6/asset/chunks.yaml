    • D – 依赖反转原则


    单一职责原则表明一个类应该只做一件事，并且只做一件事；如果你回顾我们的数据访问对象和 Web 控制器，你会发现我们倾向于专注于做**一件**事：访问数据，或处理来自
    Web 的输入（并做出响应），甚至委托给我们的数据访问类，以便在适当的情况下添加功能。


    单一职责原则倾向于创建一个包含许多

    '
- fmt: '相对较小的类，但这样做的好处是，如果你能识别出类应该做什么，你就可以专注于把它做好——创建一个可测试、简单、*可靠*的实现，并使这些类的*设计*变得相当简单。


    开闭原则指出，类应该是可扩展的，而无需修改类本身。我们在示例中大量使用了继承，特别是在测试中，我们创建基础功能并对其进行修改，以创建我们所需的环境。


    里氏替换原则指出，子类（或实现）应该能够完全替代其父类型。本书在数据访问和搜索引擎示例中最清晰地展示了这一点，我们有一个基础类型`Repository`（来自Spring）或`SearchEngine`（我们自定义的接口），并在测试中疯狂地替换实现。每个实现都被假定在意图上是等效的，在一定限度内[.2](#index_split_002.html#p207)。


    接口隔离原则指出，一个类永远不应该被迫实现它不使用的接口，也不应该强迫依赖项依赖于它们不使用的方法。我们没有演示违反接口隔离原则的情况，但一个例子是早期的搜索引擎接口有一个可以*写入*文档的机制，但直到书中我们接受新数据时才被使用。搜索引擎没有这样的方法，因为*每个*实现都会被强制包含它。我们本可以设计一个`WritingSearchEngine`，它在某个时候扩展了`SearchEngine`（也许是第[9](https://doi.org/10.1007/978-1-4842-8637-1_9)章，我们最终从外部数据更新了数据库）；只有`WritingSearchEngine`的实现才需要满足写入文档引用的能力。


