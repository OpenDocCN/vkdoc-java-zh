  raw: '**Data Access Objects**


    In Chapter [6](https://doi.org/10.1007/978-1-4842-8637-1_6), we saw how we can
    build a data access object using JDBC, configured with Spring. In this chapter,
    we’re going to take a look at Spring Data, which provides a bridge to other underlying
    persistence mechanisms – the Java Persistence API, in this case, using Hibernate
    as an underlying implementation.


    Hibernate is an “object-relational mapper,” [1 me](#index_split_001.html#p112)aning
    that it’s a library that maps data between the object and relational models. (In
    regular human language, it takes Java objects and stores them in a relational
    database or loads relational data into an object model.)


    It’s important to know what object-relational mapping is; for most real Java


    applications, it’s considered foundational knowledge in many cases – but for us,
    it’s enough to know that it’s in common use, and Spring Data provides a trivial
    way to leverage it.


    Let’s dive in.


    **The Project**


    Our build.gradle comes first. It calls back rather heavily to the Spring Boot
    build in Chapt[er 2, in th](https://doi.org/10.1007/978-1-4842-8637-1_2)at it
    has a plug-in for Boot itself, as well as the dependency manager; the dependencies
    it brings in include Spring Data JPA, Boot’s test framework, TestNG, and –


    lastly – the H2 database.


    1 If “object-relational mapper” as a term feels familiar to you, it’s because
    we mentioned it in passing in the last chapter or because you’ve paid attention
    to the Java ecosystem a touch in the last few years.


    © Felipe Gutierrez, Joseph B. Ottinger 2022


    F. Gutierrez and J. B. Ottinger, *Introducing Spring Framework 6*[, https://doi.org/10.1007/978-1-4842-8637-1_7](https://doi.org/10.1007/978-1-4842-8637-1_7#DOI)


    Chapter 7 Letting Spring BuiLd Your data aCCeSS oBjeCtS


    ***Listing 7-1.*** chapter07/build.gradle


    plugins {


    id ''org.springframework.boot'' version ''3.0.0-M3''


    id ''io.spring.dependency-management'' version ''1.0.11.RELEASE''


    }


    dependencies {


    implementation \


    "org.springframework.boot:spring-boot-starter-data-jpa"


    implementation \


    "org.springframework.boot:spring-boot-starter-test"


    testImplementation \


    "org.testng:testng:$testNgVersion"


    implementation \


    "com.h2database:h2:2.1.214"


    }


    Next, let’s take a look at the data model – the DocumentType and Document classes,
    which will be very ( *very*) similar to the classes we saw in Chapt[er 6\. T](https://doi.org/10.1007/978-1-4842-8637-1_6)he
    biggest difference is in Document, because we’re adding JPA mapping annotations
    to the class; we have to define the entity and its primary key, at the very least.
    We could do so with XML configuration files for Hibernate or JPA, but the simplest
    and most common


    approach is to use annotations as we’ve done here. The only “interesting” aspect
    to the mapping is for the type field, which we’re mapping as a String to match
    our data model from Chapter [6.](https://doi.org/10.1007/978-1-4842-8637-1_6)


