    Chapter 1 Your First spring appliCation


    • We’re going to use the Gradle Build Tool, found a[t https://gradle.org,](https://gradle.org)


    for the book (See Figur[e 1-2). Gr](#index_split_000.html#p16)adle is one of the
    two most popular and capable build tools for the JVM; choosing Gradle here is
    done mostly


    because it has very simple and short build scripts. We use a build tool


    because it’s very much standard practice and gives us easy dependency


    management and a full build lifecycle, including the ability to run


    tests as part of our build; Gradle is also the tool of choice of the Spring


    team itself.


    ***Figure 1-2.** The Gradle Website*


    **Source Code Organization**


    We’re going to be looking at a lot of source code in this book.


    This part will describe how it’s laid out so it’s easy to understand what is going
    where.


    Chapter 1 Your First spring appliCation


    The book is going to be organized as a Gradle project, with various subdirectories[.1](#index_split_000.html#p17)


    Most of the subdirectories will be “modules” of the project, although there will
    be exceptions.


    The top-level project needs its own directory; for the authors, it’s the isf6
    directory (for “Introducing Spring 6”). Most of the chapters'' code will be in
    a clearly named directory mapping to the chapter number: thus, chapter02, chapter03,
    and so forth.


    If a chapter has two separate projects, they’ll be named with the chapter and
    then a description of the project, like chapter01-hello-world and chapter01-hello-boot.


    Let’s take a look at the “top-level” project and set it up, and then we’ll get
    to writing some actual code that uses Spring.


    The first thing we need to do, after installing Java and Gradle, is run a command
    to initialize Gradle, gradle init.


    That will give us a short interaction where Gradle asks us what build options


    we want.


    The defaults are fine, because we’ll be overwriting them; the main result we want
    from this process is the setup of the Gradle wrapper. We want to replace two files
    in this directory, build.gradle and settings.gradle.


    The top-level build.gradle file – in your “project working directory,” so all
    relative paths start with “.” – should look like this:


    ***Listing 1-1.*** build.gradle


    apply plugin: ''java''


    sourceCompatibility = 17


    targetCompatibility = 17


    ext {


    springFrameworkVersion = "6.0.0-M4"


    testNgVersion = "7.6.1"


    }


    1 Gradle uses a wrapper that downloads a copy of Gradle for each project. This
    is very useful for repeatable builds, but it creates a copy of Gradle on your
    hard drive for each project. As a result, it’s far more efficient for us to have
    a single project for the book, rather than a project for each chapter, although
    some chapters will have separate projects, such as the chapter-01-hello-boot project.


    Chapter 1 Your First spring appliCation


    allprojects {


    apply plugin: ''java''


    repositories {


    maven {


    url "https://repo.spring.io/milestone"


    }


    maven {


    url "https://repo.spring.io/snapshot"


    mavenContent {


    snapshotsOnly()


    }


    }


    mavenCentral()


    }


    dependencies {


    implementation \


    "ch.qos.logback:logback-classic:1.2.11"


    testImplementation \


    "org.testng:testng:$testNgVersion"


    }


    test {


    useTestNG()


    }


    }


    This file looks like a lot – but it’s also one of the longer build files we’ll
    have.


    What it’s doing is telling Gradle that we have a Java project (therefore, use
    the Java compiler), what level of Java to require (17, the current long-term support
    release as of writing and a requirement for Spring 6), a set of properties to
    provide version information to the build, and then a set of things that all projects
    should do: they’re all Java projects, they all should pull dependencies from a
    set of external locations, and they should all rely on the TestNG testing framework.


    The next file we’ll want to overwrite is the settings.gradle file.'
