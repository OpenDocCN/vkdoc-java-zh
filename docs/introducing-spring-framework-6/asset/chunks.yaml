    \ documents, matching the data we’ve used for our `SearchEngine` through the rest\
    \ of the book:\n\n***Listing 6-7.*** `chapter06/src/main/resources/import.sql`\n\
    \n```sql\ninsert into document (id, name, type, location)\nvalues (\n  1,\n  'Book\
    \ Template',\n  'PDF',\n  '/Docs/Template.pdf'\n);\n\ninsert into document (id,\
    \ name, type, location)\nvalues (\n  2,\n  'Apress Home Page',\n  'URL',\n  'https://apress.com'\n\
    );\n\ninsert into document (id, name, type, location)\nvalues (\n  3,\n  'Chapter\
    \ Template',\n  'DOC',\n  '/Docs/Chapter Sample.doc'\n);\n\ninsert into document\
    \ (id, name, type, location)\nvalues (\n  4,\n  'chapter 1',\n  'DOCX',\n  '/Book/Chapter\
    \ 01.docx'\n);\n```\n\nNow that we have our database built, we can look at the\
    \ `JDBCTemplate`.\n\n## The `JDBCTemplate`\n\nThe Spring documentation describes\
    \ `JDBCTemplate` as the “central class in the JDBC core package.” It provides\
    \ a number of methods to ease access to operations enabled by a `Connection`,\
    \ such as executing SQL via `PreparedStatement`. It manages access to the database\
    \ connection, provides implicit exception translation for easier declaration and\
    \ handling of exceptions, and also provides easy access to mapping database information\
    \ into Java classes, although often not at the level of mappings that an object-relational\
    \ mapper like Hibernate can provide.\n\n**Note** Spring has *multiple* easy ways\
    \ to leverage Hibernate and other object-relational mappers, too. The most convenient\
    \ is through Spring Data, which we’ll look at in a later chapter.\n\nIf you’re\
    \ not going to use Spring Data – and you should, honestly, as it provides an incredible\
    \ level of control and freedom to your code – you’ll want to spend some time mastering\
    \ `JDBCTemplate`. Luckily, it’s a simple class – albeit with a huge list of methods\
    \ – and mastery is fairly trivial.\n\nLet’s look at more source code and make\
    \ our document manager database-aware at last.\n\n`JDBCTemplate` converts common\
    \ `SQLException` instances to specific types of exceptions that reflect the actual\
    \ errors, rather than having generic exceptions. For example, instead of a `SQLException`\
    \ with an error code of 42101, you would get a `BadSqlGrammarException` – with\
    \ the code being one of H2’s error codes for bad SQL grammar.\n\n## Our Service\
    \ Interfaces and the `SearchEngine` Implementation\n\nIt’s time for us to start\
    \ working with our entity model from Listings 6-1 and 6-2. Let’s take a look at\
    \ the `SearchEngine` interface, itself a near-literal copy from prior chapters.\n\
    \nIt’s worth noting that the return type from the methods extends `List` and not\
    \ `Set`; `Set` implies a unique set of instances (which fits what we want), but\
    \ you can’t access the objects in order (they *have* an order, but we can’t access\
    \ them trivially). `List` provides explicit order but has no guarantee of uniqueness.\
    \ For simplicity, we’re using `List`.\n\n***Listing 6-8.*** `chapter06/src/main/java/c06/SearchEngine.java`\n\
    \n```java\npackage c06;\n\nimport java.util.List;\n\npublic interface SearchEngine\
    \ {\n    List<Document> findByType(DocumentType documentType);\n    List<Document>\
    \ listAll();\n}\n```\n\nAnd finally, a new interface, the `DocumentDAO`, which\
    \ defines those operations that a “Document data-access object” would need to\
    \ provide. Due to the simplicity of what we’re demonstrating, it has direct mappings\
    \ to the `SearchEngine` – we could have skipped this interface altogether, but\
    \ in a real application, a DAO will have simpler service methods than the `SearchEngine`\
    \ would and would map less cleanly.\n\n***Listing 6-9.*** `chapter06/src/main/java/c06/DocumentDAO.java`\n\
    \n```java\npackage c06;\n\nimport java.util.List;\n\npublic interface DocumentDAO\
    \ {\n    List<Document> findByType(DocumentType documentType);\n    List<Document>\
    \ listAll();\n}\n```"
