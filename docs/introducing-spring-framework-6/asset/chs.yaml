  \n第 12 章 使用动态语言\n\n**注意** 我们可以使用像[清单 3-17](https://doi.org/10.1007/978-1-4842-8637-1_3#PC17)\
  \ 这样的测试，在 `DataProvider` 中有一个配置文件列表，逐行加载并依次执行。然而，[清单 3-17](https://doi.org/10.1007/978-1-4842-8637-1_3#PC17)\
  \ 主要是为了展示**可以**这样做；虽然在“真实项目”中这样做有其价值，但在这里，我们希望构建我们的配置文件列表，就像我们在[第 3 章](https://doi.org/10.1007/978-1-4842-8637-1_3)中所做的那样，并在看到它们时理解它们的作用。聚合测试并没有增加价值。\n\
  \n**内联动态内容**\n\n让我们再看一个例子。在清单 12-8 中，我们看到一个配置，它从类路径加载一个外部文件并设置其中的一个属性；我们*不必*使用外部文件。\n\
