  \n在查看测试本身之前，让我们先看看一些用于测试作用域的类：Producer 和 Consumer 类。\n\nProducer 生成一个值，即给定方法被调用的次数，并维护内部状态来跟踪这个次数。（这对于测试我们的\
  \ bean 作用域很重要。）它还会在构造时友好地通知我们。\n\n第 4 章 使用 Bean 作用域\n\n***清单 4-3.*** chapter04/src/test/java/c04/Producer.java\n\
  \n**package c04**;\n\n**import org**. **slf4j**. **Logger**;\n\n**import org**.\
  \ **slf4j**. **LoggerFactory**;\n\n**public class** Producer {\n\nLogger logger\
  \ = LoggerFactory.getLogger(**this**.getClass());\n\nint executions = 0;\n\nProducer()\
  \ {\n\nlogger.info(\"constructed as \"+Integer.toHexString(hashCode()));\n\n}\n\n\
  int execute() {\n\n**return** ++executions;\n\n}\n\n}\n\n接下来是我们的 Consumer 类，它本身没有内部状态，但使用\
  \ Producer 并告诉我们它是由哪个 Producer 构造的。\n\n***清单 4-4.*** chapter04/src/test/java/c04/Consumer.java\n\
  \n**package c04**;\n\n**import org**. **slf4j**. **Logger**;\n\n\n\n**import org**.**slf4j**.**LoggerFactory**;\n\
  \n**import org**.**springframework**.**context**.**annotation**.**Scope**; **public\
  \ class** Consumer {\n\nLogger logger= LoggerFactory.getLogger(**this**.getClass());\n\
  \nProducer producer;\n\nConsumer(Producer producer) {\n\n**this**.producer=producer;\n\
  \nlogger.info(\"使用生产者构造，其哈希码为：\"\n\n+Integer.toHexString(producer.hashCode()));\n\
  \n}\n\n第 4 章 使用 Bean 作用域\n\nProducer getProducer() {\n\n**return** producer;\n\n\
  }\n\nint execute() {\n\n**return** producer.execute();\n\n}\n\n}\n\n现在我们将进入一个更复杂的测试类。我们的目标是创建一个测试类，它加载一个配置，然后验证该配置*实际*执行的效果，作为测试的一部分。我们需要一些组件来进行测试：一个\
  \ Consumer 和一个 Producer，其中 Consumer 将 Producer 暴露给测试，以便我们验证配置设置和行为。\n\n**注意** 我们将章节包名改为使用\
  \ c04，而不是之前一直使用的 chapter04，因为 chapter 在重复使用时显得过于冗长。\n\n***清单 4-5.*** chapter04/src/test/java/c04/ScopesTest.java\n\
  \n**package c04**;\n\n**import org**.**springframework**.**context**.**ApplicationContext**;\
  \ **import org**.**springframework**.**context**.**support**.**ClassPathXmlApplicationContext**;\
  \ **import org**.**springframework**.**core**.**io**.**Resource**; **import org**.**springframework**.**core**.**io**.**support**.**ResourcePatternUtils**;\
  \ **import org**.**testng**.**annotations**.**DataProvider**;\n\n**import org**.**testng**.**annotations**.**Test**;\n\
  \n**import java**.**io**.**IOException**;\n\n**import java**.**util**.**Arrays**;\n\
  \n**import static org**.**testng**.**Assert**.**assertEquals**;\n\n**public class**\
  \ ScopesTest {\n\n@DataProvider\n\n**public** Object[][] getConfigurations() {\n\
  \nvar resolver =\n\nResourcePatternUtils.getResourcePatternResolver(**null**);\n\
  \n第 4 章 使用 Bean 作用域\n\n**try** {\n\nvar resourceNames = Arrays\n\n.stream(resolver.getResources(\"\
  classpath*:*.xml\"))\n\n.map(Resource::getFilename)\n\n.map(e -> **new** String[]{e})\n\
  \n.toList()\n\n.toArray(**new** Object[0][]);\n\n**return** resourceNames;\n\n}\
  \ **catch** (IOException e) {\n\n**throw new** RuntimeException(e);\n\n}\n\n}\n\n\
  boolean getValue(ApplicationContext context,\n\nString name) {\n\n**try** {\n\n\
  **return** context.getBean(name, Boolean.class);\n\n} **catch** (Exception ignored)\
  \ {\n\n**return false**;\n\n}\n\n}\n\n@Test(dataProvider = \"getConfigurations\"\
  )\n\n**public** void testConfiguration(String configName) {\n\nvar context =\n\n\
  **new** ClassPathXmlApplicationContext(configName);\n\nvar p1 = context.getBean(Producer.class);\n\
  \nvar p2 = context.getBean(Producer.class);\n\nvar c1 = context.getBean(Consumer.class);\n\
  \nvar c2 = context.getBean(Consumer.class);\n\nvar producerPrototype = getValue(context,\
  \ \"producerBean\");\n\nvar consumerPrototype = getValue(context, \"consumerBean\"\
  );\n\nassertEquals(p1 == p2, !producerPrototype);\n\nassertEquals(c1 == c2, !consumerPrototype);\n\
  \n*// 如果 consumerPrototype 为 true，则 consumer 是*相同引用*，*\n\n*// 因此 producerPrototype\
  \ 不会被多次使用。*\n\nassertEquals(c1.getProducer() == c2.getProducer(),\n\n!(producerPrototype\
  \ && consumerPrototype));\n\n*// 如果 producerPrototype 为 true，则序列将失败*\n\nassertEquals((p1.execute()\
  \ + 1) == p2.execute(), !producerPrototype);\n\n}\n\n}\n\n这里涉及多个要点。该类的目的是遍历多个配置，对每个配置应用相同的测试。\n\
  \n但由于不同配置指定了不同的内容，我们还需要尝试从配置中获取关于*预期值*的信息。\n\n因此，我们的测试包含三个部分：第一部分是一个数据提供方法，它使用`ResourcePatternResolver`（从`ResourcePatternUtils`获取）扫描类路径以查找我们的配置。它将这些匹配的资源作为`Resource`引用返回在一个扁平数组中，因此我们需要将其转换为仅包含文件名的`Object[][]`。模式`\"\
  classpath*:*.xml\"`将匹配类路径中的*每个 XML 文件*。\n\n\n\n第二个组件是一个从配置中提取布尔值的方法。它为我们提供了便利，除非另有指定，否则默认假定值为\
  \ false。\n\n第三个方法比较有趣。它接收一个配置名称（通过数据提供者 `getConfigurations()`），加载该配置，然后获取*四个* bean\
  \ 引用：两个 Producer 引用和两个 Consumer 引用。\n\n它还*获取*两个布尔值——得益于我们的 `getValue()` 方法，这两个值默认为\
  \ false——用于指示配置是否将给定类型的作用域设置为 prototype。2\n\n如果类型设置为 prototype，那么这两个引用将*不会是同一个引用*。\n\
  \n它们可能具有相同的值——实际上也应该如此——但实际的引用将是不同的。\n\n不过，第三个 assertEquals 有点令人困惑。实际上存在一个可能性矩阵：我们仅在从上下文中*主动请求*某个类型时才使用\
  \ prototype，因此我们可能有一个 Consumer prototype，它被反复赋予同一个 Producer 实例——即，唯一的 Consumer 和公共的\
  \ Producer——或者我们可能有一个\n\n2 我们可以手动读取配置并直接查找 scope 属性；也有方法可以查看应用程序上下文并从其内部数据结构中找出作用域。这样做更简单，并且避免了遍历额外代码带来的干扰。\n\
  \n第 4 章 使用 Bean 作用域\n\nProducer prototype，但 Consumer 是单例，因此当创建那*一个* Consumer 时，它会获得一个唯一的\
  \ Producer，但每个 Consumer 引用都是相同的。\n\n只有当两种类型都设置为 prototype 作用域时，才会出现 Producer *和*\
  \ Consumer 都唯一的情况——当从上下文中检索 Consumer 时，会为其创建一个新的 Producer（因为 Producer 作用域是 prototype），并且每个\
  \ Consumer 都遵循此过程，同样，*假设*两种类型都设置为 prototype 作用域。否则，我们可能会有独立且唯一的 Consumer 实例，它们\n\
  \n共享一个 Producer（即，Consumer 设置为 prototype 但 Producer 是单例），或者我们有一个单一的 Consumer 实例，因此只为其创建一个\
  \ Producer（当 Consumer 设置为单例时）。\n\n我们的最后一个断言验证了 Producer 实例的唯一性。如果它们是同一个实例——即，*不是*\
  \ prototype——则断言测试 `execute()` 方法是否生成一个序列。如果它们是单例，它们不会像这样生成连续的值。\n\n然而，我们仍然无法*运行*任何东西，因为我们没有任何配置。以下是四个配置——请注意它们大体相同，仅在为每种类型设置作用域上有所不同。\n\
  \n在每种情况下，我们都使用 `constructor-arg` 将一个 Producer 注入到 Consumer\n\n构造函数中。\n\n***清单 4-6.***\
  \ chapter04/src/test/resources/t1-noproto.xml\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<beans\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
  \    http://www.springframework.org/schema/beans/spring-beans.xsd\">\n\n    <bean\
  \ id=\"producer\" class=\"c04.Producer\"/>\n    <bean id=\"consumer\" class=\"c04.Consumer\"\
  >\n        <constructor-arg name=\"producer\" ref=\"producer\"/>\n    </bean>\n\
  \    <bean id=\"producerBean\" class=\"java.lang.Boolean\">\n        <constructor-arg\
  \ name=\"s\" value=\"false\" />\n    </bean>\n\n</beans>\n```\n\n第 4 章 使用 Bean 作用域\n\
  \n***清单 4-7.*** chapter04/src/test/resources/t1-protoprod.xml\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n\n<beans\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
