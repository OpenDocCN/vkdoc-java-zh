  \n**XML 中的组件扫描**\n\n\n\n我们在本章前面已经看到，可以在 Java 中扫描组件，而无需显式声明它们。在 XML 中也可以这样做，只需使用一个*不同*的命名空间，即\
  \ context 命名空间，就像我们使用 util 命名空间一样。我们的\n\n组件扫描配置可能如下所示：\n\n***清单 3-16.*** chapter03/src/test/resources/docscan.xml\n\
