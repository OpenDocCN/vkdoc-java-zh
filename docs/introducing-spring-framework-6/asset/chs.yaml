  \nSpring 中的 Controller 是一种组件类型，与 Repository 非常相似。它\n\n将来自 HTTP URL 的请求映射到方法调用。我们要做的是将\
  \ SearchController 映射到“/search”，然后在该映射之后实现一个到“all”的单一映射——\n\n这样，一旦所有内容都连接并正常工作，你就可以通过\
  \ http://localhost:8080/search/all 来调用一个方法。\n\n该端点本身会填充一个*模型*（由 Spring 传入）。模型只是一个属性的集合——表示为\
  \ Map<K,V>——它会被传递给渲染引擎。模型填充完毕后，该方法会返回一个模板路径，即一个适合当前渲染引擎的资源；对我们来说，它将是一个包含 Thymeleaf\
  \ 标签的 HTML 文档，用于从模型中提取数据。\n\n第 8 章 在 Web 上展示你的 Spring 应用程序\n\n**注意** 这就是“模型-视图-控制器”范式的实际应用：“控制器”\n\
  \n填充“模型”并返回对“视图”的引用，这有助于非常轻松地隔离端点的功能。如果你正在进行服务器端渲染，它高度可测试、高度模块化，并且非常流行和实用。2\n\n\
  让我们来看看这个 Controller，然后我们会稍微绕道了解一下 Thymeleaf，并同时涵盖一些国际化主题。\n\n***清单 8-3.*** chapter08/src/main/java/c08/SearchController.java\n\
  \n**package c08**;\n\n**import org**. **springframework**. **beans**. **factory**.\
  \ **annotation**. **Autowired**; **import org**. **springframework**. **stereotype**.\
  \ **Controller**; **import org**. **springframework**. **ui**. **Model**;\n\n**import\
  \ org**. **springframework**. **web**. **bind**. **annotation**. **GetMapping**;\
  \ **import org**. **springframework**. **web**. **bind**. **annotation**. **RequestMapping**;\n\
  \n@Controller\n\n@RequestMapping(\"/search\")\n\n**public class** SearchController\
  \ {\n\n**private** SearchEngine engine;\n\n@Autowired\n\n**public** void setEngine(SearchEngine\
  \ engine) {\n\n**this**.engine = engine;\n\n}\n\n@GetMapping(value = \"/all\")\n\
  \n**public** String searchAll(Model model) {\n\nmodel.addAttribute(\"docs\", engine.listAll());\n\
  \n**return** \"search/all\";\n\n}\n\n}\n\n2 值得注意的是，服务器端渲染并不十分流行；在撰写本文时，现代 UI 编程更倾向于使用带有\
  \ REST 端点的 React，而不是服务器端渲染。话虽如此，MVC 模型仍是一个基础概念，我们将在后面的章节中介绍 REST。\n\n第 8 章 在 Web\
  \ 上展示你的 Spring 应用程序\n\n到目前为止，这里的一切对于 Spring 来说都相当正常：我们已经将\n\nSearchController 声明为\
  \ Controller，因此配置可以轻松地识别它，并且我们提供了一个修改器，以便 Spring 可以设置 SearchEngine。\n\nsearchAll()\
  \ 方法接收一个 Model 引用，并简单地在模型中放入一个名为“docs”的属性，其值为 SearchEngine 的 listAll() 方法返回的值——正如我们在前一章中看到的，该方法返回\
  \ import.sql 中指定的所有实体。\n\n然后 searchAll() 返回一个对模板的引用，其值为 search/all，该模板大概会使用模型来适当地渲染输出。这*不是*一个文件系统引用，尽管它*可以*是，我们将使用一个模板引擎，该引擎会以\
  \ search/all 作为位置在类路径中定位资源。我们稍后会讲到这一点。不过现在，我们可以轻松地编写一个测试，手动执行 SearchController 的方法并检查它们的输出。\n\
