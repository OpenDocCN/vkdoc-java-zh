  aloha\" />\n\n</**bean**>\n\n</**beans**>\n\n我们从中*获得*了什么？——主要是灵活性和开发便利性。我们之前为了配置和实现，在多个地方散落了许多文件——这是\
  \ Java 开发的一个常见方面——而这里我们有一种简单的方法来缩短引用 bean 与其实际实现之间的距离。\n\n这*有价值*吗？嗯，与许多其他事情一样，这取决于具体情况。这可能实际上是*开始*开发此类服务的好方法，而不是最终交付；你可以使用带有内联实现的配置进行开发，直到它运行得足够好，然后将其转换为外部文件（就像我们的其他实现一样）进行优化，甚至可以通过\
  \ `<lang:groovy />` 中的 `refresh-check-delay` 属性，在磁盘上编辑它们时重新加载它们。\n\n当然，我们不能只向你展示*配置*而不展示测试。与清单\
