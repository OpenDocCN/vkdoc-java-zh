  \ args);\n\n}\n\n@Bean\n\nCommandLineRunner send(JmsPublisher publisher) {\n\n**return**\
  \ args -> {\n\nIntStream.rangeClosed(1, 20).forEach(\n\n(value) -> {\n\n3 “为什么数据库转储要等待整整两秒？”\
  \ 这是一个显而易见的问题——而且问得很好。真正的答案是留出足够的时间让读者启动应用程序的其他副本，如前一个脚注所述，尽管他们仍然需要快速操作——2 秒的时间足以让你有机会运行另一个应用程序，而不会花费太多时间以至于感觉什么都没发生。请随意调整延迟以满足你的需求。\n\
