  populateData\"\n\n/>\n\n</**beans**>\n\n这里我们看到与 MyDocsConfig 类相比*大量*的文本，而且其中几乎没有什么是我们应用程序特有的；只有\
  \ <bean/> 引用与我们的测试有关。*它*的作用相当简单：标记一个 Spring bean（相当于 @Bean 注解）并给它一个名称（\"engine\"\
  ），除非你给它一个特定的名称，否则注解*会隐含*这个名称，然后指定实现类——这与我们的其他测试一样——是 StaticSearchEngine。\n\nXML\
  \ 是一个相当庞大且非常正式的规范。对于像这样的小型配置，它们非常冗长——XML 本身需要大量的样板代码，这使得我们简单的配置变成了六行样板代码对应两行实际内容——信噪比相当低.5\n\
  \nXML 以一个声明它是 XML 文件的前言开始，然后有一个层次化的节点结构：有一个顶级节点（<beans>），它通过各种*属性*（xmlns、xmlns:xsi\
  \ 和 xsi:schemaLocation 部分）描述内容，然后在结束标签之前包含更多节点，结束标签是节点名称前加一个斜杠（因此：</beans>）。\n\n\
  一个节点*不必*包含其他节点，正如我们在 <bean> 中看到的，它在结束尖括号前用一个斜杠自行结束。\n\n顶级节点上的属性引入了 *XML 命名空间*，它们通知\
  \ XML 解析器该 XML 文件应该是什么样子。xmlns 表示 <beans> 默认使用一个特定的模式（由 URL 引用的 beans 模式），该模式本身规定\
  \ <beans> 节点包含特定的其他节点，例如 <bean>，以及为了使 XML 文件有效，*这些*节点可以或必须是什么样子。\n\n如前所述，这是一个*非常*正式的规范，许多程序员对这种形式主义感到不满；XML\
  \ 非常非常强大，但不太受欢迎。\n\n**注意** 大多数程序员，包括 Spring 团队本身，更喜欢在代码中进行配置而不是使用 XML，并且当使用 XML\
  \ 时，文件是通过自动处理所有命名空间的工具生成的，或者头信息是从其他文件复制的。\n\n话虽如此，XML 格式*确实*有其用途。在我们展示 XML 配置的一些更有用的方面之前，让我们先弄清楚我们*当前*的配置使用那个单一的\
  \ <bean/> 引用在做什么。\n\n<bean> 标签可以有*许多*选项。作为其中一些选项的简短示例：\n\n**属性**\n\n**描述**\n\nid\n\
  \nbean 的标识符。只能定义一个唯一的 ID。\n\nclass\n\n指向一个具体类，给出完整的 Java 包名。\n\nscope\n\n告诉 Spring\
  \ 容器如何创建 bean；默认情况下，如果未设置此 scope 属性，bean 将是一个单例实例。其他作用域包括 prototype（每次需要 bean 时创建一个新实例）、request（在每个\
  \ HTTP Web 请求中创建一个单例实例）和 session（创建一个 bean 并在 HTTP 会话期间存在）。\n\ninit-method\n\n这是在\
  \ bean 创建后将被调用的方法名称。当你想在对象创建后设置状态时，这很有用。\n\n\n\n`factory-method` 这是用于创建 bean 的方法名称。换句话说，你需要提供将创建该对象实例的方法，并且此方法应包含参数。\n\
  \n`destroy-method` 这是在你销毁 bean 之后将被调用的方法名称。\n\n`lazy-init`\n\n如果你希望容器在 bean 被调用或使用时（即当你从\
  \ `ApplicationContext` 调用 `getBean` 方法时），或者稍后从需要该对象的另一个实例类中创建 bean，则可以将此属性设置为 `true`。\n\
  \n第三章 应用不同的配置\n\n那么，我们简单配置所做的是：声明一个 Spring 配置（包含所有前言和 XML 声明），然后创建一个标识符为 `engine`\
  \ 的单一引用，其类型为 `chapter03.StaticSearchEngine`，并在类实例化后调用 `populateData()`。由于我们没有提供像\
  \ `scope` 这样的其他标签，因此它被创建为单例（每次我们向上下文请求 `engine` 时，都会得到*同一个引用*），并且通过使用无参构造器（Java\
  \ 默认构造器）来构建。\n\n**扩展配置**\n\n我们简单配置的问题在于它*过于*简单，而且功能也不足。让我们稍微改进一下。\n\n我们一直使用的 `chapter03.StaticSearchEngine`\
  \ 就其用途而言是一个不错的实现；它实现了带有常量数据的 `SearchEngine` 接口。\n\n然而，它非常冗长（因为它必须包含常量数据），而且没有人喜欢冗长的代码清单，因为它们会消耗大量纸张，从而用掉很多树木，对吧？6\n\
  \n在本书中，我们将探索几种不同的创建种子数据的方法，但让我们先从使用 XML 配置来探索一些选项开始。我们将看到几组不同的代码清单，其中我们会提供一个 XML\
  \ 配置和一个 Java 类，所以请做好准备。\n\n首先，让我们看看如何通过指定构造器参数来构建测试，从而避免使用 `init-method`。以下是我们的测试类：\n\
