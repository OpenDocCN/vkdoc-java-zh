  \n——Joseph B. Ottinger\n\nxiii\n\n**引言**\n\n本书是对著名的 Spring 框架的介绍，该框架为 Java 平台提供了一个控制反转容器。Spring\
  \ 框架是一个开源的应用框架，可以与任何 Java 应用程序一起使用。\n\n阅读本书后，您将了解如何执行以下操作：\n\n• 高效地使用 Spring 框架。\n\
  \n• 通过 JDBC 数据库添加持久性，并可轻松迁移到 NoSQL。\n\n• 进行单元测试和集成测试。\n\n• 创建 Web 应用程序并公开 RESTful\
  \ API。\n\n• 通过 JMS 发送消息，该模型可扩展到 AMQP、RabbitMQ 和 MQTT。\n\n• 为 Spring 使用动态语言，如 Groovy、Ruby\
  \ 和 Bean Shell。\n\n• 将 Groovy 与 Spring 结合使用。\n\n• 使用新的 Spring Boot 和 Spring XD 技术。\n\
  \n**本书读者对象**\n\n\n\n*《Spring Framework 6 入门》*是一本面向所有初识 Spring 框架并希望学习如何使用它构建应用程序的开发者的实践指南。在本书中，你将找到使用\
  \ Spring 框架及其所有特性和模块创建企业级应用所需的所有必要元素。\n\nxv\n\n引言\n\n**本书的组织结构**\n\n本书使用一个简单的 **My\
  \ Documents** 应用程序，你将在学习过程中逐步对其进行开发。全书共分为以下四个部分：\n\n• 第一部分：Spring 框架基础：你将学习依赖注入设计模式、Spring\
  \ 的容器实现，以及它如何通过面向接口编程帮助你实现更好的设计。你将了解可以应用于 Spring 框架的不同配置。你还将学习如何使用 Bean 作用域、处理集合和资源文件，以及如何测试你的\
  \ Spring 应用程序。\n\n• 第二部分：Spring 框架：你将学习如何添加持久化功能，并将你的 Spring 应用程序与其他系统集成。你还将能够将你的\
  \ Spring 应用程序部署到 Web 上。\n\n• 第三部分：Spring 框架高级技术：你将学习如何将消息代理与 Spring 结合使用以实现大规模可扩展性和分布式架构，如何通过\
  \ RESTful API 暴露你的应用程序，以及如何在应用程序中发送电子邮件和调度事件。\n\n• 第四部分：新的 Spring I/O：你将学习如何将 Spring\
  \ 和 Groovy 集成到你的 Spring 应用程序中。你还将获得一些指导，了解在 Spring 学习之旅中下一步可以探索哪些更深入的技术。\n\n**源代码**\n\
  \n本书中使用的所有源代码都可以在 github.com/apress/introducing-spring-framework6 找到。下载内容将包含以下仅在线提供的附录：\n\
  \n• 为你的操作系统安装 Java 和 Gradle\n• 其他推荐工具\n\n话不多说，让我们开始学习 Spring 框架吧！\n\nxvi\n\n**第\
  \ 1 章**\n\n**你的第一个 Spring**\n\n**应用程序**\n\n大多数书籍在开始时都会对所介绍的技术及其历史进行冗长的解释，并且通常会提供一个很小的示例，但你需要读到后面的章节才能运行它。\n\
  \n在本书中，我将采用不同的方法。我将从一些基础示例开始，并详细解释它们的作用以及如何使用它们，以便你能够快速了解 Spring。本章中的示例将向你展示将 Spring\
  \ 框架集成到任何现有项目，或者从头开始创建一个项目并轻松修改它是多么容易。\n\n图 1-1 展示了 Spring 产品组合网站 (https://spring.io)。在这个网站上，你可以找到所有\
  \ Spring 扩展、指南和文档，以帮助你更好地理解 Spring 生态系统。如果你已经迫不及待想要深入了解，Spring 框架本身可以在 https://spring.io/projects/spring-framework\
  \ 找到。\n\n© Felipe Gutierrez, Joseph B. Ottinger 2022\nF. Gutierrez and J. B. Ottinger,\
  \ *《Spring Framework 6 入门》*[, https://doi.org/10.1007/978-1-4842-8637-1_1](https://doi.org/10.1007/978-1-4842-8637-1_1#DOI)\n\
  \n![](img/index-15_1.png)\n\n第 1 章 你的第一个 Spring 应用程序\n\n***图 1-1.** [`spring.io`](https://spring.io)*\n\
  \n**前置要求**\n\n为了开始第一个 Spring 框架示例，我们需要安装一些工具。\n\n• 你需要安装并配置好 Java 开发工具包 (JDK)，并确保可以在命令行中访问它。与支持多种\
  \ Java 版本的早期 Spring 版本不同，Spring 6 需要 Java 17 或更高版本。有许多网站提供 Java 17，但最合适的来源是 Adoptium\
  \ 的分发页面 (https://adoptium.net/releases.html) 或 Oracle 的网站 (www.oracle.com/java/technologies/downloads/)。\n\
  \n\n\n[java/technologies/downloads/](http://www.oracle.com/java/technologies/downloads/)，两者皆可。\n\
  \n如果你使用的是 OSX 系统，也可以通过 SDKMan! 安装 Java（请参阅 [https://](https://sdkman.io) [sdkman.io](https://sdkman.io)）。\n\
  \n![](img/index-16_1.jpg)\n\n第 1 章 你的第一个 Spring 应用程序\n\n• 我们将使用 Gradle 构建工具，可在 [`gradle.org`](https://gradle.org)\
  \ 找到（见图 1-2）。Gradle 是 JVM 上最流行且功能最强大的两个构建工具之一；此处选择 Gradle 主要是因为它的构建脚本非常简单和简短。我们使用构建工具是因为这是非常标准的做法，它能为我们提供便捷的依赖管理和完整的构建生命周期，包括在构建过程中运行测试的能力；Gradle\
  \ 也是 Spring 团队本身的首选工具。\n\n***图 1-2.** Gradle 网站*\n\n**源代码组织**\n\n本书中我们将看到大量源代码。本部分将描述这些代码的布局方式，以便于理解各部分内容的存放位置。\n\
  \n第 1 章 你的第一个 Spring 应用程序\n\n本书将组织为一个 Gradle 项目，包含多个子目录.1。大多数子目录将是项目的“模块”，但也会有例外。\n\
  \n顶级项目需要有自己的目录；对于作者来说，这个目录是 isf6（代表“Introducing Spring 6”）。大多数章节的代码将放在一个与章节编号对应的清晰命名的目录中：例如\
  \ chapter02、chapter03 等。\n\n如果某个章节有两个独立的项目，它们将以章节编号和项目描述来命名，例如 chapter01-hello-world\
  \ 和 chapter01-hello-boot。\n\n让我们先看一下“顶级”项目并进行设置，然后我们将开始编写一些实际使用 Spring 的代码。\n\n\
  在安装 Java 和 Gradle 之后，我们需要做的第一件事是运行一个命令来初始化 Gradle：`gradle init`。\n\n这将启动一个简短的交互过程，Gradle\
  \ 会询问我们想要哪些构建选项。\n\n默认选项即可，因为我们将覆盖它们；我们从这个过程中想要得到的主要结果是 Gradle 包装器的设置。我们需要替换此目录中的两个文件：`build.gradle`\
  \ 和 `settings.gradle`。\n\n顶级的 `build.gradle` 文件——位于你的“项目工作目录”中，因此所有相对路径都以“.”开头——应如下所示：\n\
  \n***清单 1-1.*** build.gradle\n\napply plugin: 'java'\n\nsourceCompatibility = 17\n\
  \ntargetCompatibility = 17\n\next {\n\nspringFrameworkVersion = \"6.0.0-M4\"\n\n\
  testNgVersion = \"7.6.1\"\n\n}\n\n1 Gradle 使用一个包装器，为每个项目下载一份 Gradle 副本。这对于可重复构建非常有用，但它会在你的硬盘上为每个项目创建一个\
  \ Gradle 副本。因此，为本书创建一个单一项目比每个章节创建一个项目要高效得多，尽管某些章节会有独立的项目，例如 chapter-01-hello-boot\
  \ 项目。\n\n第 1 章 你的第一个 Spring 应用程序\n\nallprojects {\n\napply plugin: 'java'\n\nrepositories\
  \ {\n\nmaven {\n\nurl \"https://repo.spring.io/milestone\"\n\n}\n\nmaven {\n\nurl\
  \ \"https://repo.spring.io/snapshot\"\n\nmavenContent {\n\nsnapshotsOnly()\n\n}\n\
  \n}\n\nmavenCentral()\n\n}\n\ndependencies {\n\nimplementation \\\n\n\"ch.qos.logback:logback-classic:1.2.11\"\
  \n\ntestImplementation \\\n\n\"org.testng:testng:$testNgVersion\"\n\n}\n\ntest {\n\
  \nuseTestNG()\n\n}\n\n}\n\n这个文件看起来内容很多——但它也是我们将要使用的最长的构建文件之一。它的作用是告诉 Gradle 我们有一个\
  \ Java 项目（因此使用 Java 编译器），需要哪个 Java 版本（17，撰写本文时的当前长期支持版本，也是 Spring 6 的要求），一组为构建提供版本信息的属性，以及所有项目都应执行的一组操作：它们都是\
  \ Java 项目，都应从一组外部位置拉取依赖，并且都应依赖 TestNG 测试框架。\n\n我们接下来要覆盖的下一个文件是 `settings.gradle`\
  \ 文件。\n\n\n\n第一章 你的第一个 Spring 应用\n\n这段代码的作用是描述“主构建”中要包含的子项目。随着我们在书中内容的推进，这段代码也会发生变化。\n\
  \n我们的 `settings.gradle` 需要完成两件事：\n\n1.  配置项目，使其能够找到我们需要的插件。\n2.  配置本书内容的子模块。\n\n\
  在编写本书时，Spring 6 *尚未*发布。因此，我们需要使用非“官方发布版”的仓库。我们在 `build.gradle` 中已经看到了对里程碑版和快照版仓库的引用，但\
  \ Gradle 通过不同的机制解析依赖和插件；因此，我们需要分别配置它们。\n\n在用于插件解析的前置代码（即 `pluginManagement` 开头的那部分）之后，我们用一个简单的方式命名整个项目（`isf6`），然后包含了我们的第一个子模块\
  \ `chapter01-hello-spring`。随着本书内容的推进，我们会陆续添加更多子模块。2\n\n我们将从一个简单的“Hello, world”项目开始，项目名称为\
  \ `chapter01-hello-world`，因此我们的 `settings.gradle` 文件一开始会很简单。\n\n***清单 1-2.*** settings.gradle\n\
  \npluginManagement {\n\nrepositories {\n\nmaven {\n\nurl \"https://repo.spring.io/milestone\"\
  \n\n}\n\nmaven {\n\nurl \"https://repo.spring.io/snapshot\"\n\nmavenContent {\n\n\
  snapshotsOnly()\n\n}\n\n}\n\ngradlePluginPortal()\n\n}\n\n}\n\n2 如果你查看源码下载包，你会发现\
  \ `settings.gradle` 文件内容更多，并且以 `//tag::chapter01[]` 注释开头。这些注释是为了帮助格式化本书，本书使用了*实际源代码*作为清单，而不是复制的源码。\n\
  \n![](img/index-20_1.png)\n\n第一章 你的第一个 Spring 应用\n\nrootProject.name = 'isf6'\n\n\
  include 'chapter01-hello-world'\n\n章节在源码树中有两种表示方式。\n\n如果章节的代码可以通过单个构建清晰地表示，那么该章节将被命名为自己的子目录，例如\
  \ `chapter02`、`chapter03` 等。\n\n然而，如果章节实际上有两个构建过程，那么每个构建将拥有自己的目录，章节名称作为目录名的一部分。\n\
  \n有趣的是，本章将有两个构建，因此最终会得到例如 `chapter01-hello-world` 和 `chapter01-hello-boot` 这样的目录。\n\
  \n每章的源码组织将遵循 Gradle 源码标准。\n\n所有源文件都放在名为 `src` 的子目录中，其下通常有两个目录：`main` 和 `test`。\n\
  \n在每个目录中，会有一个对应源语言（如 `java`）或名为 `resources` 的目录，用于映射不需要编译的源文件。\n\n在这些目录下，你会看到按 Java\
  \ 包命名约定组织的源文件。\n\n因此，在我们为 `chapter01-hello-world` 创建好结构后，假设我们已经放置了一些 Java 源文件，我们会得到如图\
  \ 1-3 所示的目录树：\n\n***图 1-3.** 目前的目录树*\n\n第一章 你的第一个 Spring 应用\n\n**Hello World 示例**\n\
  \n我们已经多次提到 `chapter01-hello-world` 项目。让我们看看它实际包含什么。\n\n这是一个确保你的工具正确设置的好方法，这个应用本身没有内在价值（不过，让某物对你说“Hello”大概也是值得的）。\n\
  \n我们先处理掉基础设施部分，看看 `chapter01-hello-world` 的 `build.gradle` 文件。\n\n它非常简单：只指定了我们的源代码依赖于\
  \ `spring-core` 和 `spring-context`3，并使用一个占位符从清单 1-1（顶层 `build.gradle`）的 `ext` 部分拉取特定版本的依赖。\n\
  \n它还声明我们有一个带有主类的“application”，这将帮助我们在编写代码后运行它。\n\n***清单 1-3.*** chapter01-hello-world/build.gradle\n\
  \nplugins {\n\nid \"application\"\n\n}\n\ndependencies {\n\nimplementation \\\n\n\
  \n\n\"org.springframework:spring-core:$springFrameworkVersion\"\n\nimplementation\
  \ \\\n\n\"org.springframework:spring-context:$springFrameworkVersion\"\n\nimplementation\
  \ \\\n\n\"org.springframework:spring-test:$springFrameworkVersion\"\n\n}\n\napplication\
  \ {\n\nmainClass.set(\"chapter01.Application\")\n\n}\n\n3 如果你对“依赖”和“版本”的引用不熟悉，请查看\
  \ Gradle 快速入门指南；[`docs.gradle.org/current/samples/sample_building_java_`](https://docs.gradle.org/current/samples/sample_building_java_applications.html)\n\
  \n[applications.html 是一个](https://docs.gradle.org/current/samples/sample_building_java_applications.html)极好的资源，能为你提供早期及后续经常需要的知识。\n\
  \n第 1 章 你的第一个 Spring 应用程序\n\n值得注意的是：除非另有说明，源代码也将是完整的。\n\n过去，许多编程书籍选择描述源文件的各个部分，因此磁盘上的一个给定文件可能会在纸质书中以四五个（甚至更多！）源代码清单的形式呈现。\n\
  \n这意味着读者被迫依赖源代码下载，或者依靠自己的注意力来查看完整的源文件。\n\n相反，如果你看到一个源文件，你将看到它的全部内容，除非它已经展示过，或者出于组织结构的需要；有可能在展示整个文件之前，会先展示个别方法或部分内容，但整个源文件最终会完整呈现。\n\
  \n言归正传，是时候看一些代码了！\n\n我们的“Hello, World”应用程序将使用一个 Spring 组件，即一个“bean”，它实现了一个“消息服务”。这个应用程序对于其设计目的来说可能过于复杂，但它将验证\
  \ Spring 本身在我们的应用程序中是否正常工作。\n\n它将包含三个部分：“消息服务”定义本身、该接口的一个实现，以及一个使用该接口及其定义的应用程序。\n\
  \n首先，让我们看一下消息服务。\n\n***清单 1-4.*** chapter01-hello-world/src/main/java/chapter01/\n\
  \nMessageService.java\n\n**package chapter01**;\n\n**public interface** MessageService\
  \ {\n\n**public** String getMessage();\n\n}\n\n这显然是一个非常简单的接口：它定义了一个单一方法 getMessage()。\n\
  \n我们的下一个类 HelloService 也同样简单。\n\n***清单 1-5.*** chapter01-hello-world/src/main/java/\n\
  \nchapter01/HelloService.java\n\n**package chapter01**;\n\n**public class** HelloService\n\
  \n**implements** MessageService {\n\n@Override\n\n第 1 章 你的第一个 Spring 应用程序\n\n**public**\
  \ String getMessage() {\n\n**return** \"Hello, world!\";\n\n}\n\n}\n\n最后，我们来看实际的应用程序本身。\n\
  \n让我们查看源代码，然后弄清楚它的工作原理。\n\n***清单 1-6.*** chapter01-hello-world/src/main/java/\n\n\
  chapter01/Application.java\n\n**package chapter01**;\n\n**import org**. **springframework**.\
  \ **context**. **annotation**.*;\n\n@Configuration\n\n**public class** Application\
  \ {\n\n@Bean\n\nMessageService helloWorldMessageService() {\n\n**return new** HelloService();\n\
  \n}\n\n**public** static void main(String[] args) {\n\nvar context =\n\n**new**\
  \ AnnotationConfigApplicationContext(Application.class);\n\nvar service =\n\ncontext.getBean(MessageService.class);\n\
  \nSystem.out.println(service.getMessage());\n\n}\n\n}\n\n首先，请注意我们在这里使用了大量注解。\n\n\
  这个类既充当应用程序的入口点，又充当其自身的配置：配置类使用 @Configuration 注解。\n\n![](img/index-24_1.png)\n\n\
  第 1 章 你的第一个 Spring 应用程序\n\n我们还在一个返回 MessageService 的方法上使用了 @Bean 注解。该注解声明返回值是 Spring\
  \ 的一个组件 4 并给予它一个基于构建该 bean 的方法的名称，默认情况下：对于这个 bean，它的名称是 helloWorldMessageService。\n\
  \n这就是程序化配置标记组件的方式；这允许我们查找与类型匹配的组件，这是 Spring 最强大的特性之一。\n\n\n\n在 `main()` 方法中，我们建立了一个“应用上下文”——这是本书中会频繁使用的一个术语——然后利用该上下文查找一个\
  \ `MessageService`。\n\n代码中的最后一个操作是将消息输出到控制台。\n\n是时候运行它了，因为到目前为止我们已经投入了大量精力。\n\n\
  如果我们位于 `chapter01-hello-world` 目录下，可以使用 `gradle run` 命令来运行它，如图 1-4 所示：\n\n***图 1-4.**\
  \ 执行 chapter01-hello-world 项目*\n\n如前所述⁵，这段代码被*过度*设计了。\n\n但如果它能正常运行，那么我们所做的是创建了一个包含消息服务组件的应用程序，并使用该组件类型来查找该服务的实现。\n\
  \n我们的“应用程序”不再需要知道组件的具体实现是什么；它只是一个返回简单、确定性消息的东西（在本例中如此），但它可以做任何事情——例如，从数据库查找消息，或者从执行上下文中推导出消息——而应用程序完全无需知晓。\n\
  \n[⁴]: 我们还会看到其他一些注解，它们与 `@Bean` 在声明组件时扮演着相同的角色，主要区别在于它们标记了不同类型的 Bean，让程序员能更清楚地了解这些\
  \ Bean 应如何使用。其他注解还会带来实际的功能变化，我们会在遇到时进行讲解。\n\n[⁵]: 你*确实*已经通读了本章内容，对吧？\n\n**第 1 章\
  \ 你的第一个 Spring 应用程序**\n\n这就是 Spring 的真正力量：它帮助我们以组件的方式进行思考，从而引导我们编写出天然模块化的代码。\n\n\
  模块化代码可以为了可测试性而编写——这可能是我们在此要深入探讨的一个特性——这意味着更优质的代码。\n\n**你好，Boot**\n\n早在 Spring 4\
  \ 时代，Spring 团队就发布了一种名为“Spring Boot”的新机制。如今，[Spring Boot](https://spring.io/projects/spring-boot)\
  \ 已经发展成自己的生态系统，并为 Spring 中的大量功能提供了极其简便的入门途径。事实上，它*如此*便捷，以至于访问 Spring 的许多功能几乎都离不开\
  \ Spring Boot；你并非*绝对*需要它来完成所有事情（毕竟，它本身就是用 Spring 编写的，所以如果 Spring 团队能做到，你也能做到），但它的许多功能不值得在\
  \ Spring Boot 之外重新实现。\n\n随着本书的深入，我们会大量接触到 Spring Boot。\n\n为了展示其能力的冰山一角，让我们编写一个“Hello\
  \ World”Web 服务，即一个在打开 URL 时生成消息的应用程序。\n\n我们首先要做的是配置构建本身。这意味着要为 Spring Boot 应用程序创建一个目录（`chapter01-hello-boot`），为新模块创建一个\
  \ `build.gradle` 文件，并将其添加到顶层 `settings.gradle` 文件中。\n\n以下是我们的 `build.gradle` 文件，它设置了依赖解析，并添加了对\
  \ `spring-boot-starter-web` 模块的依赖，该模块通过一个简单的依赖引入了大量与快速搭建 Web 服务相关的功能：\n\n***清单 1-7.***\
  \ chapter01-hello-boot/build.gradle\n\n```groovy\nplugins {\n    id \"application\"\
  \n    id 'org.springframework.boot' version '3.0.0-M4'\n    id 'io.spring.dependency-management'\
  \ version '1.0.13.RELEASE'\n}\n\ndependencies {\n    implementation \\\n       \
  \ 'org.springframework.boot:spring-boot-starter-web'\n}\n\napplication {\n    mainClass.set(\"\
  chapter01.HelloWorldController\")\n}\n```\n\n这个构建使用了 Gradle 的 Spring 插件，该插件允许我们从“物料清单”中导入\
  \ Spring 组件——我们只需指定一个依赖的通用名称，插件就会自动查找我们所需的一切。因此，当我们包含 `spring-boot-starter-web`\
  \ 时，依赖管理插件会为我们导入一系列依赖，这样我们就不必担心查找特定版本的依赖了。\n\n接下来，让我们继续修改 `settings.gradle` 文件，以便能够轻松编译和运行该模块。唯一需要修改的是最后一行。\n\
  \n\n\n***清单 1-8.*** settings.gradle\n\npluginManagement {\n\nrepositories {\n\n\
  maven {\n\nurl \"https://repo.spring.io/milestone\"\n\n}\n\nmaven {\n\nurl \"https://repo.spring.io/snapshot\"\
  \n\nmavenContent {\n\nsnapshotsOnly()\n\n}\n\n}\n\ngradlePluginPortal()\n\n}\n\n\
  }\n\nrootProject.name = **'** isf6**'**\n\ninclude **'** chapter01-hello-world**'**\n\
  \ninclude **'** chapter01-hello-boot**'**\n\n现在我们可以看到，“图书项目”有两个子模块，一个名为 chapter01-hello-world，另一个名为\
  \ chapter01-hello-boot。在阅读本书的过程中，我们需要将每一章都添加到 settings.gradle 中。\n\n最后，让我们来看一些 Java\
  \ 代码。\n\n第 1 章 你的第一个 Spring 应用程序\n\n***清单 1-9.*** chapter01-hello-boot/src/main/java/chapter01/\n\
  \nHelloWorldController.java\n\n**package chapter01**;\n\n**import org**. **springframework**.\
  \ **boot**. **SpringApplication**; **import org**. **springframework**. **boot**.\
  \ **autoconfigure**. **EnableAutoConfiguration**; **import org**. **springframework**.\
  \ **stereotype**. **Controller**; **import org**. **springframework**. **web**.\
  \ **bind**. **annotation**. **GetMapping**; **import org**. **springframework**.\
  \ **web**. **bind**. **annotation**. **ResponseBody**;\n\n@Controller\n\n@EnableAutoConfiguration\n\
  \n**public class** HelloWorldController {\n\n@GetMapping(path = \"/\", produces\
  \ = \"text/plain\")\n\n@ResponseBody\n\n**public** String getMessage() {\n\n**return**\
  \ \"Hello, world!\";\n\n}\n\n**public** static void main(String[] args) {\n\nSpringApplication.run(HelloWorldController.class,args);\n\
  \n}\n\n}\n\n在这里，我们将 HelloWorldController 标记为一种组件类型，即 @Controller，这意味着它用于处理 HTTP\
  \ 请求。我们通过 @GetMapping 注解告诉它*哪些*请求，指示它处理根 URL 的请求——即 \"/\"——并且响应内容是纯文本，同时将方法的响应数据直接转换为输出流。6\n\
  \n最后，我们的 main() 方法告诉 Spring Boot 以 HelloWorldController 作为可配置类来运行。在实际实践中，这样做并不明智——我们通常会将“主类”与控制器分开（这违反了\
  \ SOLID 原则，详见第 [13](https://doi.org/10.1007/978-1-4842-8637-1_13) 章），但作为一个简单的示例，我们在此尽量减少代码清单的数量。\n\
  \n6 Spring 的 Web 服务实际上对响应内容有很强的控制能力，但我们的“Hello World”服务非常简单。\n\n![](img/index-28_1.jpg)\n\
  \n第 1 章 你的第一个 Spring 应用程序\n\n我们可以通过 Gradle 运行此应用程序，命令为 gradle :chapter01-hello-boot:run。这将在控制台输出一些信息（因为\
  \ Spring Boot 默认为我们设置了日志记录），然后等待传入的 HTTP 请求。我们的输出应该类似于图 1-5。\n\n***图 1-5.** 运行 gradle\
  \ :chapter01-hello-boot:run*\n\n我们可以通过访问 http://localhost:8080/ 来查看它生成的内容，该路径与我们通过\
  \ @GetMapping 注解设置的请求路径相匹配，并且我们应该会看到与图 1-6 等效的内容：\n\n![](img/index-29_1.jpg)\n\n\
  第 1 章 你的第一个 Spring 应用程序\n\n***图 1-6.** HelloWorldController 的响应*\n\n表面上看可能并不令人兴奋，但我们刚刚用几行简短的代码，通过\
  \ Spring Boot 启动了一个完整的用于处理 HTTP 请求的环境。\n\n**你好，Kotlin**\n\nSpring Boot 几乎能与任何 JVM\
  \ 语言良好配合，包括 Groovy、Kotlin，甚至 Scala。更重要的是，它能够以近乎原生的方式与这些语言协同工作。\n\n让我们看看使用 Kotlin\
  \ 时是什么样子。7\n\n7 Kotlin 是由 JetBrains 设计的一种语言。可以在 [`kotlinlang.org/`](https://kotlinlang.org/)\
  \ 找到它。\n\n第 1 章 你的第一个 Spring 应用程序\n\n首先，我们需要在 settings.gradle 中添加一个新模块。这只是一行代码，就像添加\
  \ chapter01-hello-boot 时一样——它应该如下所示。\n\n***清单 1-10.*** settings.gradle\n\npluginManagement\
  \ {\n\nrepositories {\n\nmaven {\n\nurl \"https://repo.spring.io/milestone\"\n\n\
  }\n\nmaven {\n\n\n\nurl \"https://repo.spring.io/snapshot\"\n\nmavenContent {\n\n\
  snapshotsOnly()\n\n}\n\n}\n\ngradlePluginPortal()\n\n}\n\n}\n\nrootProject.name\
  \ = **'** isf6**'**\n\ninclude **'** chapter01-hello-world**'**\n\ninclude **'**\
  \ chapter01-hello-boot**'**\n\ninclude **'** chapter01-hello-kotlin**'**\n\n当然，我们还需要一个\
  \ `build.gradle` 文件——它与清单 1-8 中的 `build.gradle` 几乎完全相同，只是增加了一行代码，用于添加 Kotlin 编译器支持：\n\
  \n***清单 1-11.*** chapter01-hello-kotlin/build.gradle\n\nplugins {\n\nid \"application\"\
  \n\nid \"org.jetbrains.kotlin.jvm\" version \"1.7.10\"\n\nid **'** org.springframework.boot**'**\
  \ version **'** 3.0.0-M4**'**\n\nid **'** io.spring.dependency-management**'** version\
  \ **'** 1.0.13.RELEASE**'**\n\n}\n\n第 1 章 您的第一个 Spring 应用程序\n\ndependencies {\n\n\
  implementation \\\n\n**'** org.springframework.boot:spring-boot-starter-web**'**\n\
  \n}\n\napplication {\n\nmainClass.set(\"chapter01.HelloWorldController\")\n\n}\n\
  \n我们的最后一个文件是直接从清单 1-9 逐功能复制过来的。它有一些不同之处：即，它位于 `src/main/kotlin/chapter01` 而不是 `src/main/java/chapter01`——注意这里使用的是\
  \ `kotlin` 而不是 `java`——当然，它是用 Kotlin 编写的，扩展名为 `.kt` 而不是 `.java`。（它还将消息改为 \"Hello,\
  \ Kotlin!\"，以帮助与基于 Java 的同类版本区分开来。）\n\n***清单 1-12.*** chapter01-hello-kotlin/src/main/kotlin/\n\
  \nchapter01/HelloWorldController.kt\n\n**package chapter01**\n\n**import org**.\
  \ **springframework**. **boot**. **SpringApplication**\n\n**import org**. **springframework**.\
  \ **boot**. **autoconfigure**. **EnableAutoConfiguration** **import org**. **springframework**.\
  \ **stereotype**. **Controller**\n\n**import org**. **springframework**. **web**.\
  \ **bind**. **annotation**. **GetMapping** **import org**. **springframework**.\
  \ **web**. **bind**. **annotation**. **ResponseBody**\n\n@Controller\n\n@EnableAutoConfiguration\n\
  \n**class** HelloWorldController {\n\n@get:ResponseBody\n\n@get:GetMapping(path\
  \ = [\"/\"], produces = [\"text/plain\"])\n\n**val** message: **String**\n\n**get**()\
  \ = \"Hello, Kotlin!\"\n\n**companion object** {\n\n@JvmStatic\n\n**fun** main(args:\
  \ Array<String>) {\n\n第 1 章 您的第一个 Spring 应用程序\n\nSpringApplication.run(HelloWorldController::**class**.java,\
  \ *args)\n\n}\n\n}\n\n}\n\n您可以使用 `gradle :chapter01-hello-kotlin:run` 运行*这个*类，然后打开\
