  \n我们还需要创建三个类：`JmsPublisher`，它将*发布*数据到 JMS 队列；`JmsReceiver`，它将从队列*接收*数据（根据名称，这应该不会让你感到意外）；最后是\
  \ `MyDocsApp`，它将管理任务的配置和协调。\n\n**注意** 就个人而言，作者更喜欢 `JMSReceiver` 而不是 `JmsReceiver`。\n\
  \n关于首字母缩略词命名标准的争论一直存在；是 `DvdPlayer` 还是 `DVDPlayer`？我倾向于 `DVDPlayer` 这一边，但 Spring\
  \ 选择了 `JmsTemplate` 而不是 `JMSTemplate`，因此我遵循*那个*标准，而不是我自己的标准。毕竟，我是一个团队合作者。\n\n第 9\
  \ 章 将 Spring 应用程序与外部系统集成\n\n让我们先看看 `JmsReceiver`。\n\n***清单 9-5.*** chapter09/src/main/java/md/JmsReceiver.java\n\
  \n**package md**;\n\n**import org**.**springframework**.**jms**.**annotation**.**JmsListener**;\
  \ **import org**.**springframework**.**stereotype**.**Component**;\n\n@Component\n\
  \n**public class** JmsReceiver {\n\nDocumentRepository dao;\n\nJmsReceiver(DocumentRepository\
  \ dao) {\n\n**this**.dao = dao;\n\n}\n\n@JmsListener(destination = \"documents\"\
  )\n\n**public** void receiveMessage(Document document) {\n\nSystem.out.println(\"\
  Received <\" + document + \">\");\n\n**this**.dao.save(document);\n\n}\n\n}\n\n\
  这是一个非常简单的类。它使用了一个 `DocumentRepository`；因此，它使用了构造函数提供的那个，但有趣的部分是 `receiveMessage`\
  \ 方法，它使用了 `@JmsListener` 注解。这里的 `@JmsListener` 注解使用了一个名为 `\"documents\"` 的队列——可以将其理解为一种“命名邮箱”，并通过\
  \ `@JmsListener` 注解的 `destination` 属性指定——并且它期望消息的“负载”是一个 `Document` 引用。\n\n我们在这里并没有真正做任何强制转换负载类型的事情。正如我们将在\
  \ `JmsPublisher` 中看到的，我们以序列化形式发送一个 `Document`（因此，无论怎样，它都是正确的类型）；你始终可以指示 Spring 尝试使用\
  \ `MessageConverter` 将传入消息转换为所需的有效类型。\n\n第 9 章 将 Spring 应用程序与外部系统集成\n\n**注意** 我们在这里没有配置\
  \ `MessageConverter`，因为我们仍然试图避免配置代理。有太多选项和替代方案需要讨论，而无法在不承认其他方案的情况下讨论其中一些，这很容易使本书的篇幅增加一倍，更不用说掩盖本章的目的了。\n\
  \n一旦我们接收到 `Document`，我们就显示它——只是为了表明我们拥有它——然后使用 `DocumentRepository` 的 `save()` 方法，该方法负责与数据库通信。\n\
  \n这个方法本质上很简单，但操作的复杂性是*完全*可变的。如果保存文档的机制需要与外部服务通信以验证书籍的 ISBN，或者根据文档类型进行一些昂贵的验证，或者*任何我们需要的其他过程*，服务的入口点保持不变；我们只需根据应用程序需求添加所需的任何处理。\n\
  \n更重要的是，由于异步调用，入口点的性能影响（几乎）无关紧要。如果出于某种原因，我们在给定的虚拟机中一次只能处理一个 `Document`，那么要提高吞吐量，我们只需添加另一个\
  \ JVM 即可。只要限制不是基于我们进程外部的因素，我们就可以任意增加文档监听器的数量。\n\n**注意** 当然，如果限制来自消费者外部，我们可能无法如此轻易地改变吞吐量。想象一下，我们的验证使用了一个一次只能处理一个进程的\
  \ Web 服务；如果我们发送 17 个请求，那么一次处理一个的限制仍然会限制我们的处理。\n\n欢迎来到异步架构的世界。\n\n让我们看看“喂养” `JmsReceiver`\
  \ 的是什么——`JmsPublisher`。\n\n***清单 9-6.*** chapter09/src/main/java/md/JmsPublisher.java\n\
  \n**package md**;\n\n**import org**.**springframework**.**jms**.**core**.**JmsTemplate**;\
  \ **import org**.**springframework**.**stereotype**.**Component**;\n\n@Component\n\
  \n第 9 章 将 Spring 应用程序与外部系统集成\n\n**public class** JmsPublisher {\n\n**private** final\
  \ JmsTemplate jmsTemplate;\n\n**public** JmsPublisher(JmsTemplate jmsTemplate) {\n\
  \n**this**.jmsTemplate = jmsTemplate;\n\n}\n\n**public** void send(Document document)\
  \ {\n\njmsTemplate.send(\"documents\",\n\nsession -> session.createObjectMessage(document));\n\
  \n}\n\n}\n\n这又是一个非常简单的类。它接收一个 `JmsTemplate`，因为这是它在 `send()` 方法中发布到命名队列的方式。该方法主要包装了\
  \ `JmsTemplate.send()` 方法，使用一个 `MessageCreator` lambda 表达式来创建一个包含 `Document` 的 JMS\
  \ `ObjectMessage`。\n\n大多数发送者都会遵循相同的结构；唯一的区别在于目标名称（这里是 `\"documents\"`）以及可能的消息结构；在这种情况下，它是一个\
  \ `ObjectMessage`（因为我们控制发送者和接收者，并且可以使用序列化形式），但你可能根据需要使用 `TextMessage` 或其他类型的 `Message`\
  \ 实现。（例如，如果你需要以 JSON 或 XML 格式发送消息，`TextMessage` 将是一个不错的选择，但随后你需要根据需要将 `Document`\
  \ 转换为 JSON 或 XML，作为消息创建的一部分。）现在我们有了可用的（且简单的）类来*消费*消息（`JmsReceiver`）和*生产*消息（`JmsPublisher`）——是时候将一切整合到一个应用程序中了。\n\
  \n我们的应用程序将有两个 `CommandLineRunner` bean 作为其配置的一部分。\n\n\n\n第一个 `CommandLineRunner`\
  \ 需要一个 `JmsPublisher`——Spring 当然会自动提供，因为它是一个可用的组件——并发布 20 个 `Document` 实例，每个实例都带有一个随机的\
  \ UUID.2。\n\n2 为什么我们使用 UUID 而不是范围值？因为读者可能想同时运行一个、四个或一百个应用程序实例。使用范围值会导致名称重复，而随机的\
  \ UUID（如下所示）则不会相互冲突。所以，读者，如果你愿意，可以随心所欲地运行这个应用程序的多个副本。这会很有趣。\n\n第 9 章 将 Spring 应用程序与外部系统集成\n\
  \n第二个 `CommandLineRunner` 将等待 2 秒 3——这足够我们的发布周期运行——并将数据库中*每个* `Document` 转储到控制台，作为数据*已*写入数据库的简单检查。\n\
