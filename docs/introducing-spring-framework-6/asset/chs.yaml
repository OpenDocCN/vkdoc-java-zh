  \n**package** md;\n\npublic **interface** MessageService {\n\nString getMessage();\n\
  \n}\n\n现在事情变得更有趣了。\n\n配置用动态语言编写的 Bean 的方法是使用 XML 中的 Bean 定义指令。动态语言有三个预定义的指令：\n\n\
  1.  `<lang:groovy />` 用于用 Groovy 编写的动态 Bean\n2.  `<lang:bsh />` 用于用 BeanShell（另一种针对\
  \ JVM 的脚本语言）编写的动态 Bean\n3.  `<lang:std />` 用于为*任何* `ScriptingEngine` 编写的动态 Bean，用户需指定使用哪个脚本引擎\n\
  \n\n\n大多数用户可能会重点关注 Groovy 机制，因为它最简单直接，但高级用户可能会发现自己在某些时候会用到 `<lang:std />`。\n\n当我们使用\
  \ `<lang:groovy />` 指定一个 bean 时，可以通过 `script-source` 属性指定从类路径或文件系统加载脚本。如果不使用 `script-source`，则可以在配置文件本身中使用\
  \ `<lang:inline-script/>` 提供脚本内容。\n\n第 12 章 使用动态语言\n\n我们还可以指定 `refresh-check-delay`\
  \ 属性，该属性以毫秒为单位指定一个时间段，之后动态 bean 的内容将被刷新。这意味着，如果你从文件系统加载（而不是从 Java 归档文件、zip 文件或其他静态资源加载），你可以在运行时编辑文件，并在正在运行的应用程序中实时看到更改的反映。\n\
  \n**注意** 本章我们不会演示 `refresh-check-delay`，因为在书中反映实时的文件系统更改本质上很困难，但这可能是 Spring 动态脚本功能中*绝对最好的特性*，因为它允许你在运行的容器中进行功能的实时开发，而无需依赖执行实时重载等操作的特殊“开发”模式。更重要的是，由于动态语言通常比\
  \ Java 本身更宽容，因此它非常适合快速原型开发。要使用此功能，你需要将一个文件系统位置添加到类路径，并从文件系统加载脚本；更改脚本，设置好 `refresh-check-delay`，你的脚本将按任意时刻的状态执行，包括你的实时编辑。\n\
  \n话虽如此，让我们继续深入。\n\n**最简单的动态 MessageService**\n\n首先，让我们看看 Groovy 中 `MessageService`\
