  \ id=\"producer\" class=\"c04.Producer\"\n          scope=\"prototype\"/>\n    <bean\
  \ id=\"consumer\" class=\"c04.Consumer\">\n        <constructor-arg name=\"producer\"\
  \ ref=\"producer\"/>\n    </bean>\n    <bean id=\"producerBean\" class=\"java.lang.Boolean\"\
  >\n        <constructor-arg name=\"s\" value=\"true\" />\n    </bean>\n\n</beans>\n\
  ```\n\n***清单 4-8.*** chapter04/src/test/resources/t1-protocons.xml\n\n```xml\n<?xml\
