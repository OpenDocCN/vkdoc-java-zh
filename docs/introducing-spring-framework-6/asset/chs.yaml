  \n当然，我们还可以在配置文件中为 Hibernate 设置许多其他属性.3。\n\n终于，我们准备开始研究 Repository 本身了。\n\n**Spring\
  \ Data 仓库**\n\nSpring Data 提供了一个 `CrudRepository<Type, PrimaryKeyType>` 接口，它有两个类型参数：要持久化的类类型（本章中的\
  \ `Document`）以及与该类关联的主键类型（对于 `Document` 来说是 `Integer`）。\n\n`CrudRepository<?,?>`\
  \ 接口提供了许多与数据访问对象相关的、相当标准化的操作：\n\n3 请参阅 [`docs.spring.io/spring-boot/docs/current/reference/html/application-`](https://docs.spring.io/spring-boot/docs/current/reference/html/application-properties.html)\
  \ [properties.html](https://docs.spring.io/spring-boot/docs/current/reference/html/application-properties.html)\
  \ 以获取属性的*部分*列表。讽刺的是，我们这里使用的属性并不在此列表中。\n\n第 7 章 让 Spring 构建你的数据访问对象\n\n-   `save(T)`：保存传递给它的实体，并返回一个适用于后续操作的实例。\n\
  -   `saveAll(Iterable<T>)`：此方法接受一个实体的可迭代集合，并返回一个适用于后续持久化操作的实体集合，其作用类似于 `save()`\
  \ 对单个对象的处理。\n-   `findById(ID)`：此方法使用参数作为主键来查找实体。它返回一个 `Optional<T>` – 如果主键不存在，则\
  \ `Optional` 将包含一个空值。\n-   `existsById(ID)`：返回一个布尔值，指示主键是否存在于数据存储中。\n-   `findAll()`：返回一个\
  \ `Iterable<T>`，其中包含数据存储中该类型的所有实例。\n-   `findAllById(Iterable<ID>)`：为数据库中与 ID 集合中的标识符匹配的每个实例返回一个\
  \ `Iterable<T>`。如果给定的 ID 在数据库中不存在，它就不会被包含在返回的 `Iterable<T>` 中。\n-   `count()`：返回数据存储中为此类型管理的实体数量。\n\
  -   `deleteById(ID)`：删除数据存储中与此 ID 匹配的记录。\n-   `delete(T)`：删除给定的实体（假设它存在于数据库中）。\n\
  -   `deleteAllById(Iterable<ID>)`：删除数据存储中所有匹配的 ID 条目。\n-   `deleteAll(Iterable<T>)`：从数据存储中删除所有与\
  \ `Iterable` 中匹配的条目（即“删除与传入集合匹配的记录”）。\n-   `deleteAll()`：清除数据存储中的所有实体。\n\n如您所见，对于大多数与数据访问对象相关的操作来说，这已经相当灵活了；还有另一个实现，`PagingAndSortingRepository<?,?>`，它增加了通过分页遍历数据集的能力。\n\
  \nSpring 通过 Repository 接口提供了许多魔法。基本上，要获得 `CrudRepository<?,?>` 提供的所有功能，我们*必须*做的就是定义一个*单一*的接口，该接口扩展\
  \ `CrudRepository<?,?>`，并添加 Spring 所需的类型信息。\n\n第 7 章 让 Spring 构建你的数据访问对象\n\n对于实际的\
  \ `DocumentRepository`，我们已经做了大量的铺垫，但它就在这里，全部内容如下：\n\n***清单 7-8.*** chapter07/src/main/java/c07/DocumentRepository.java\n\
  \n```java\npackage c07;\n\nimport org.springframework.data.repository.CrudRepository;\n\
  import org.springframework.stereotype.Repository;\nimport java.util.List;\n\n@Repository\n\
  public interface DocumentRepository\n        extends CrudRepository<Document, Integer>\
  \ {\n\n    List<Document> findByType(DocumentType type);\n}\n```\n\n请注意 `findByType`\
  \ 方法。Spring 会拦截此方法并插入一个有效的查询（基于存储引擎，此处为 JPA），这样我们甚至无需在任何地方定义有效的 JPA 查询：我们只需说，“哦，我们想使用\
  \ `type` 字段进行搜索”，Spring 就会为我们构建它。\n\n有一个完整的语法用于确定查询，它可以包含分页、排序、区分和其他元素；您可以在 [`docs.spring.io/spring-data/jpa/docs/current/reference/html/#repositories.query-methods.details`](https://docs.spring.io/spring-data/jpa/docs/current/reference/html/#repositories.query-methods.details)\
  \ 阅读完整的语法。有一些方法可以为 Repository 实例创建快捷方式（和自定义查询），但这超出了本章的范围。\n\n让我们展示这个结构在实际中的应用。我们需要做的主要事情是告诉我们的配置启用\
  \ Spring Data JPA，通过使用 `@EnableJpaRepositories` 注解；其他一切都很标准。这是我们的 `MyDocsConfiguration`\
  \ 类，它是我们测试结构的一部分。\n\n***清单 7-9.*** chapter07/src/test/java/c07/MyDocsConfiguration.java\n\
  \n```java\npackage c07;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.data.jpa.repository.config.EnableJpaRepositories;\n\n\
  @Configuration\n@EnableJpaRepositories\npublic class MyDocsConfiguration {\n\n \
  \   @Bean\n    SearchEngine getEngine(DocumentRepository repository) {\n       \
  \ return new RepositorySearchEngine(repository);\n    }\n}\n```\n\n在此之后，我们的实际测试就变得轻而易举了：\n\
  \n***清单 7-10.*** chapter07/src/test/java/c07/MyDocsTest.java\n\n```java\npackage\
  \ c07;\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport\
  \ org.springframework.boot.autoconfigure.EnableAutoConfiguration;\nimport org.springframework.boot.test.autoconfigure.orm.jpa.DataJpaTest;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.testng.annotations.Test;\n\nimport javax.sql.DataSource;\n\nimport static\
  \ c07.DocumentType.PDF;\nimport static org.testng.Assert.assertEquals;\nimport static\
  \ org.testng.Assert.assertNotNull;\n\n@ContextConfiguration(classes = {MyDocsConfiguration.class})\n\
  @DataJpaTest\n@EnableAutoConfiguration\npublic class\n        MyDocsTest extends\
  \ AbstractTestNGSpringContextTests {\n\n    @Autowired\n    SearchEngine engine;\n\
  \n    @Autowired\n    DataSource ds;\n\n    SearchEngine getEngine() {\n       \
  \ return engine;\n    };\n\n    @Test\n    void testEngineNonNull() {\n        assertNotNull(ds);\n\
  \        assertNotNull(getEngine());\n    }\n\n    @Test\n    void testFindByType()\
  \ {\n        var documents = getEngine().findByType(PDF);\n        assertNotNull(documents);\n\
  \        assertEquals(documents.size(), 1);\n        assertEquals(PDF.name,\n  \
  \              documents.get(0).getType().name);\n        assertEquals(PDF.desc,\n\
  \                documents.get(0).getType().desc);\n        assertEquals(PDF.extension,\n\
  \                documents.get(0).getType().extension);\n    }\n\n    @Test\n  \
  \  void testListAll() {\n        var documents = getEngine().listAll();\n      \
  \  assertNotNull(documents);\n        assertEquals(documents.size(), 4);\n    }\n\
  }\n```\n\n我们添加到测试中的注解（`@DataJpaTest` 和 `@EnableAutoConfiguration`）建立了 Spring 容器为测试所需应用的依赖关系，例如创建嵌入式数据库及其引用。\n\
  \n第 7 章 让 Spring 构建你的数据访问对象\n\n**总结**\n\n\n\n这是对 Spring Data 的一次闪电式速览，它在我们应用程序代码与数据存储之间提供了一个简单、通用的抽象层。本章使用了\
  \ JPA（因此数据存储是关系型数据库），但也存在适用于其他多种持久化机制的适配器，例如 JDBC（这会使我们在[第 6 章](https://doi.org/10.1007/978-1-4842-8637-1_6)所做的大部分工作失效）或\
  \ MongoDB。Spring Data 为我们提供了便捷而强大的标准访问机制，包括分页，并且让我们从此无需再手动编写数据访问对象——如果我们觉得这类事情令人不快的话。\n\
  \n**第 8 章**\n\n**在 Web 上展示你的 Spring 应用程序**\n\n在最后两章中，我们通过使用 `JDBCTemplate`（当我们构建自己的\
  \ DAO 时）和 Spring Data（当我们让 Spring 构建出所有与数据存储交互的机制时）了解了 Spring 中的持久化。在本章中，我们将转换方向，探讨如何通过万维网来展示我们的应用程序，使用一个名为\
  \ Thymeleaf 的模板引擎，1 us 并利用 Spring Boot 的 Web 启动器机制。\n\n本章使用的数据存储源代码与[第 7 章](https://doi.org/10.1007/978-1-4842-8637-1_7)相同。要构建它，你可以直接复制第\
  \ 7 章的 `src/main` 目录，并将包名从 `c07` 改为 `c08`。我们本可以直接使用[第 7 章](https://doi.org/10.1007/978-1-4842-8637-1_7)的类而无需复制，但由于我们试图保持一个扁平、简短的包结构，这样做得不偿失，而且解释\
  \ Gradle 项目间的依赖关系并非本章的重点。\n\n**注意** 本章非常简单。实际上，我们不会涵盖 Spring 中 Web 应用程序的所有实际方面：没有安全性、没有真正的错误处理、也没有用于向数据库写入新数据的数据验证等等。\n\
  \n当然，这些主题*很重要*——但它们也超出了*本书*的范围。我们将在[第 9 章](https://doi.org/10.1007/978-1-4842-8637-1_9)中介绍数据写入，但对于有兴趣使用\
  \ Spring 编写更完整 Web 应用程序的读者，[`apress.com`](https://apress.com) 提供了参考资料，可以引导你深入学习教程和参考文献。\n\
