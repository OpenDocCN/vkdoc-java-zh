  \ Spring 知道如何提供所选端口。\n\n类定义本身对于 Spring 和 TestNG 来说是标准的；它像我们其他的测试一样继承了`AbstractTestNGSpringContextTests`。\n\
  \n然后我们看到了`@LocalServerPort`的使用，我们将用它来构建我们的 URL。\n\n我们还有一个`TestRestTemplate`引用和一个对`DocumentRepository`的引用。`TestRestTemplate`是一个不会因异常而中止的类，这意味着与必须添加\
  \ try/catch 块来拦截问题相比，我们可以在测试中更轻松地*检查*异常。\n\n第 10 章 暴露 REST API\n\n**注意** 使用`TestRestTemplate`意味着也存在一个`RestTemplate`。这可能会让你感到惊讶，也可能不会，但确实*存在*一个`RestTemplate`——它的使用方式与`TestRestTemplate`相同，主要区别在于`RestTemplate`将异常条件*作为*异常传播，而不是仅仅将它们嵌入响应变量中。（换句话说，`TestRestTemplate`保留异常供我们检查，而`RestTemplate`则抛出它们。使用`TestRestTemplate`进行测试更简单。）\n\
  \n我们还有三个实用方法：一个用于使用端口引用构建 URL，一个用于从所有文档中获取“第一个文档”（未排序，因为它是一个实用方法，用于获取实际上**任何**存在的文档），还有一个使用我们的`restTemplate`通过\
  \ REST 检索文档的方法——这是我们真正关心的第一个方法，因为它展示了模板的工作原理。\n\n\n\n这其实很简单：`getForEntity()` 接收一个\
  \ URL 和一个引用类。因此，我们构建一个 URL 来匹配控制器中的 `get()` 方法，并传入 `Document.class` 以便映射实体类型。我们的工具方法还假定请求**能够成功**——如果找不到\
  \ Document，我们预期测试会失败，因此我们使用 `assertEquals()` 来确保响应码是 200。然后我们使用 `getBody()` 从响应中获取反序列化后的内容——请记住，当我们调用\
  \ `getForEntity()` 时，我们传入了内容的类型，因此 body 类型将返回反序列化后的 Document。\n\n之后，测试方法就相当直接了。\n\
  \n`testGetDocument()` 方法直接从数据库中所有 Document 实体的列表中抓取单个 Document，然后尝试从 REST 端点获取该特定\
  \ Document。如果状态码是 200（由 `getDocument()` 验证），并且预期的名称匹配，我们就可以认为 GET 操作成功并返回了我们期望的数据。\n\
  \n`testGetBadDocument()` 方法则更有趣一些。它做的第一件事是找到数据库中的最高 id。然后它尝试获取*下一个* id（这个 id 应该不存在\
  \ 4）。4 这个测试有问题！这并非旨在成为一个详尽的示例，但这个测试*不是*事务性的；我们有可能获取到最大 id，*然后*另一个进程可能创建一个新的 Document（该\
  \ Document 会获得“下一个 id”，比“最大 id”大 1），然后我们就会使用*刚刚*分配的 id 来获取“缺失的文档”。我们可以创建一个服务来建立更好的事务边界，使这个测试更健壮一些，但要使其真正严谨，需要做大量工作，而大多数用户从中也学不到什么。因此，我们做出“安全的假设”，即没有额外的应用程序*恰好*在*完全*错误的时间访问我们的随机端口。\n\
  \n第 10 章 暴露 REST API\n\n并检查响应的状态码，确保它是 404。如果不是 404，我们预期测试会失败。\n\n`testGetAllDocuments()`\
  \ 方法使用 `Document[].class` 作为返回类型。\n\n如果我们愿意创建一个新类型，让 Java 能够推断出 List 持有 Document\
  \ 引用（请记住，Java 不会具体化，因此对于编译后的代码，`List<Document>` 与 `List` 是相同的），我们本可以使用 `List<Document>`；在这种情况下，数组具有相同的语义（因为它有长度），我们可以将其与方法开头检索的*所有*文档列表的大小进行比较。\n\
  \n**注意** 那么，为什么我们使用 `Document[]` 而不是 `List<Document>` 呢？\n\n因为具体化！当 REST 端点返回 Document\
  \ 实体集合时，它是以 JSON 列表的形式返回的，当我们调用 `getForEntity()` 时，我们没有 `List<Document>` 的具体化类型——因此我们必须进行强制转换或使用其他变通方法。JSON\
  \ 数组既可以用于 `List<?>` 也可以用于数组，因此为了简单起见，我们使用了数组。\n\n之后，我们有 `testPostDocument()` 方法，它检查以确保\
  \ POST 之后的 Document 实体列表比 POST *之前*的列表多一个。\n\n`testDeleteDocument()` 方法则反转了这个过程；它删除一个文档，并验证所有文档的集合比之前更小。\n\
  \n最后，我们有两个针对 PUT 的测试：`testPutDocument()`，它——逻辑上足够——测试我们可以对现有文档应用更新，确保更新已应用到数据库；然后是\
  \ `testPutDocumentWithBadId()`，它提交一个带有新 id 的已更改 Document。PUT 不会从 `RestTemplate`\
  \ 返回有意义的响应，因此我们直接检查数据库，以确保没有应用任何更新。\n\n这些测试大多相当直接；它们并不详尽，但“足够完整”，以至于如果 `DocumentController`\
  \ 实现不当，我们的测试就会失败。\n\n对于读者来说，让测试更全面会是一个很好的练习，但这对于展示我们正在构建的 API 的任何新内容并无帮助。\n\n第 10\
  \ 章 暴露 REST API\n\n**总结**\n\n本章我们看到了使用 `@RestController` 为富客户端创建更简单的数据渲染端点，以及 Spring\
  \ Data 的一些额外特性（例如保存实体的能力）。我们还看到了一种通过控制器进行测试的机制，以验证 REST 端点是否正常工作；我们拥有一个模型，可以构建客户端来执行文档的创建、读取、更新和删除操作（但讽刺的是，不包括搜索，但鉴于我们已经实现了一个*控制器*，将前面章节的\
  \ SearchEngine 代码合并进来*完全*不难。它只需作为服务层，由控制器委托调用即可。）\n\n在下一章中，我们将再次转换方向，看看如何在 Spring\
  \ 中发送和接收电子邮件。\n\n**第 11 章**\n\n**从 Spring 内部发送电子邮件**\n\n在本章中，我们将研究在 Spring 中发送和接收电子邮件。我们还将研究一种在\
  \ Spring 中*调度*进程的方法，使其不会阻塞执行线程，并利用 JVM 的线程机制。\n\n**发送电子邮件**\n\n在 JVM 中发送和接收电子邮件涉及一个名为\
  \ JavaMail 的低级 API。\n\nJavaMail 是一个规范和实现，它非常紧密地映射了许多与邮件相关的 API，而不会对如何使用这些 API 抱有偏见。毕竟，许多封装服务的库都试图对“正确用法”持有主见——因此，一个数据库库可能会**强制**程序员使用事务.1。这些主见可能是有价值且合理的，但它们也具有局限性。JavaMail\
  \ 和其他类似的库试图按原样表示底层协议，而不是建议可能不适用于所有情况的正确用法。\n\n这并非*坏事*，但也不是*好事*，因为电子邮件协议是为*高效*使用而设计的，而不是为*易用*而设计的。直接使用\
  \ JavaMail 编写代码往往会让人欣赏那些从用户体验中隐藏所有底层 API 的优秀电子邮件客户端。\n\nSpring 使用一个名为 `JavaMailSender`\
  \ 的接口，使得使用 SMTP 协议*发送*电子邮件变得非常容易。然而，如果不使用另一个 Spring 模块，它并不能真正帮助我们*读取*电子邮件，而这超出了本书的范围;2；我们将使用\
  \ JavaMail 来读取消息。\n\n使用电子邮件的另一个问题是，你需要一个电子邮件服务器，就像你需要一个数据库来使用 JDBC 一样。如果 H2 数据库在类路径中，Spring\
  \ 会很乐意为我们嵌入它，但电子邮件服务器的部署比简单的嵌入式数据库要*复杂一些*。\n\n我们将利用 Railsware 提供的 [`mailtrap.io`](https://mailtrap.io)，它提供了用于测试电子邮件的\
  \ SMTP、IMAP 和 POP3 端点。\n\n**注意** 这并非旨在认可或推荐 Railsware，但 mailtrap.io 在其设计用途上非常有用；我们使用该网站的方式并未将其推向极限，并且以某些方式使用\
  \ mailtrap 可能会产生费用。请小心，尽管我们在编写本章的过程中使用 mailtrap 时没有发现任何问题。值得一说的是，mailtrap.io 帮助作者们避免了大量的文档编写和部署工作。\n\
  \n\n\n同样值得注意的是，**本章是首个测试无法在示例源代码中直接运行的章节**。你需要为 mailtrap（或你选择使用的任何服务）提供自己的凭证，示例源代码中并未包含*我们的*凭证。\n\
  \n在真正开始开发电子邮件服务之前，我们需要先设置一个 mailtrap.io 账户。\n\n**设置 MailTrap**\n\n首先，在浏览器中打开 https://mailtrap.io。在右上角，你会看到“登录”和“注册”按钮；请直接注册。你可以使用现有的\
  \ GMail、GitHub 或 Office365 账户，也可以使用自己的个人邮箱地址进行注册。\n\n2 Spring Integration 项目提供了一些便捷的类用于读取电子邮件，但\
  \ Spring Integration 实际上主要针对构建执行流水线。它非常强大，是一种常见的架构，但如此规模的事件处理超出了本章的讨论范围。\n\n![](img/index-170_1.png)\n\
  \n第 11 章 在 Spring 中发送电子邮件\n\n这将带你进入一个账户页面，默认情况下你会看到一个收件箱（名为“我的收件箱”）。SMTP 设置选项卡非常重要；其中有一个“显示凭证”的链接，点击后会显示一组\
  \ SMTP 和 POP3 设置，本章将用到这些信息。\n\n初始化时，页面看起来很像图 11-1。\n\n***图 11-1.** MailTrap 显示 SMTP\
  \ 配置设置*\n\n我们将使用这些配置数据来为测试构建一个 application.properties 文件。\n\n不过在此之前，我们需要先创建项目。\n\
