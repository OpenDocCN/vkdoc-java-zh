  \ 声明：\n\n@Autowired\n\nSearchEngine engine;\n\n假设测试的实例是由 Spring 管理的，鉴于我们已将其标记为继承\
  \ `AbstractTestNGSpringContextTests`，情况确实如此。当然，我们不必使用 TestNG。JUnit 也可以，并且非常流行，但根据作者的观点，对于大多数常见用途，TestNG\
  \ 往往更直接一些。`@Autowired` 会在可用的配置中查找满足类型要求的类实例，并*注入*该引用。\n\n`AbstractTestNGSpringContextTests`\
