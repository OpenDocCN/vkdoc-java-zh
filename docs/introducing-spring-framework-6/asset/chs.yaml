  **融会贯通**\n\n到目前为止，我们几乎逐字复制了第[7](https://doi.org/10.1007/978-1-4842-8637-1_7)章中的数据访问代码，这为我们提供了一个可用的数据模型；我们构建了一个控制器，该控制器使用我们的数据模型（包含一个测试）调用渲染页面，并且我们构建了一个\
  \ Thymeleaf 模板（已准备好进行国际化），供控制器使用。\n\n是时候构建配置并运行代码了。我们将使用一个名为 Chapter8 的类来完成这项工作。\n\
  \n作为一个 Spring Boot 应用程序，我们的应用程序类总体上的职责相当轻量。它主要声明自己是一个应用程序，并告诉 Spring 在类路径上查找其组件。\n\
  \n不过，所有自动化操作的一个例外是国际化，它运行良好，但我们希望能够对其进行控制。\n\n为了处理国际化，我们需要一个区域设置解析器和一个更改拦截器。例如，这些将允许我们向\
  \ URL 添加`?lang=es`，从而为渲染引擎设置区域设置（并设置一个 cookie 供将来调用使用，可以通过再次使用该参数来覆盖）。`lang`的使用出现在我们的\
  \ HTML 模板中（在 html 块中作为`th:lang=\"${lang}\"`），并且*必须*与控制器设置的属性名称匹配——毕竟，它是 Thymeleaf\
  \ 模型的一部分。\n\n但话虽如此，语言解析是我们应用程序源代码的主要部分。\n\n让我们来看一下：\n\n第 8 章 在 Web 上展示你的 Spring\
  \ 应用程序\n\n***清单 8-9.*** chapter08/src/main/java/c08/Chapter8.java\n\n**package c08**;\n\
  \n**import org.springframework.boot.SpringApplication**;\n**import org.springframework.boot.autoconfigure.SpringBootApplication**;\n\
  **import org.springframework.context.annotation.Bean**;\n**import org.springframework.data.jpa.repository.config.EnableJpaRepositories**;\n\
  **import org.springframework.web.servlet.LocaleResolver**;\n**import org.springframework.web.servlet.config.annotation.InterceptorRegistry**;\n\
  **import org.springframework.web.servlet.config.annotation.WebMvcConfigurer**;\n\
  **import org.springframework.web.servlet.i18n.CookieLocaleResolver**;\n**import\
  \ org.springframework.web.servlet.i18n.LocaleChangeInterceptor**;\n**import java.util.Locale**;\n\
  \n@EnableJpaRepositories\n@SpringBootApplication\n**public class** Chapter8 **implements**\
  \ WebMvcConfigurer {\n\n    @Bean\n    **public** LocaleResolver localeResolver()\
  \ {\n        var localeResolver = **new** CookieLocaleResolver();\n        localeResolver.setDefaultLocale(Locale.US);\n\
  \        **return** localeResolver;\n    }\n\n    @Bean\n    **public** LocaleChangeInterceptor\
  \ localeChangeInterceptor() {\n        var lci = **new** LocaleChangeInterceptor();\n\
  \        lci.setParamName(\"lang\");\n        **return** lci;\n    }\n\n    @Override\n\
  \    **public** void addInterceptors(InterceptorRegistry registry) {\n        registry.addInterceptor(localeChangeInterceptor());\n\
  \    }\n\n    **public** static void main(String[] args) {\n        SpringApplication.run(Chapter8.class,\
  \ args);\n    }\n}\n\n此时，我们可以将第 8 章作为应用程序运行。如果我们位于 chapter08 目录中，操作非常简单，如下所示：\n\n\
