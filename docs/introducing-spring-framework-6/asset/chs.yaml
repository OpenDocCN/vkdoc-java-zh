  \n通过这些配置，我们为两个类提供了所有作用域组合的示例：\n\n1.  所有 Bean 都是单例（并且只创建两个实例，仅此而已，它们会被重复使用）。\n2.\
  \  Producer 是单例，Consumer 是原型；我们创建了两个 Consumer 引用，但它们共享同一个 Producer。\n3.  Consumer\
  \ 是单例，Producer 是原型；我们只创建了一个 Consumer（它获得一个唯一的 Producer），但显式请求 Producer 引用会得到新的 Producer\
  \ 引用。\n4.  Producer 和 Consumer 都是原型，因此每个 Consumer 都会获得一个唯一的 Producer 引用。\n\n我们的日志也显示了这一点，但由于它们使用了引用\
  \ ID，每次执行时显示的内容都会不同。例如，在一次测试运行中，我们看到了以下输出（为节省大量篇幅，已截断）：\n\nINFO c04.Producer – constructed\
  \ as 93cf163\n\n第 4 章 使用 Bean 作用域\n\nINFO c04.Consumer – constructed with producer\
  \ 93cf163\n\nINFO c04.Producer – constructed as 5c10f1c3\n\nINFO c04.Producer –\
  \ constructed as 7ac2e39b\n\nINFO c04.Producer – constructed as 78365cfa\n\nINFO\
  \ c04.Consumer – constructed with producer 78365cfa\n\nINFO c04.Producer – constructed\
  \ as 3f6db3fb\n\nINFO c04.Consumer – constructed with producer 3f6db3fb\n\nINFO\
  \ c04.Producer – constructed as 1506f20f\n\nINFO c04.Consumer – constructed with\
  \ producer 1506f20f\n\nINFO c04.Consumer – constructed with producer 1506f20f\n\n\
  INFO c04.Producer – constructed as 19553973\n\nINFO c04.Consumer – constructed with\
  \ producer 19553973\n\nINFO c04.Producer – constructed as 4c4748bf\n\nINFO c04.Producer\
  \ – constructed as 7ce97ee5\n\n**注意** 如果你感到好奇，这个输出是通过将测试运行的输出通过管道传递给 `cut -d ' '\
  \ -f 4-99 | grep c04 | grep -v spring` 命令生成的。实际的输出要长得多，也详细得多。从长远来看，它提供的信息也更多，但额外的信息对我们这里的目的没有帮助。\n\
  \n**注解**\n\n当然，我们也可以使用注解来设置作用域。注解本身是 `org.springframework.context.annotation.Scope`，使用方式如下：\n\
  \n***清单 4-10.*** chapter04/src/test/java/c04/AnnotatedProducer.java **package c04**;\n\
  \n**import org**. **slf4j**. **Logger**;\n\n**import org**. **slf4j**. **LoggerFactory**;\n\
  \n**import org**. **springframework**. **context**. **annotation**. **Scope**; **import\
  \ org**. **springframework**. **stereotype**. **Component**;\n\n第 4 章 使用 Bean 作用域\n\
  \n@Component\n\n@Scope(\"singleton\")\n\n**public class** AnnotatedProducer {\n\n\
  Logger logger = LoggerFactory.getLogger(**this**.getClass());\n\nint executions\
  \ = 0;\n\nAnnotatedProducer() {\n\nlogger.info(\"constructed\");\n\n}\n\nint execute()\
  \ {\n\n**return** ++executions;\n\n}\n\n}\n\n这个类由上下文加载后，将与我们 XML 配置中 Producer 设置为原型作用域时的\
  \ Producer 引用完全一致。*唯一的*区别在于使用了注解。\n\n\n\n**注意** 本章的测试中我们不会使用 `AnnotatedProducer`，\n\
  \n因为没有必要——再次强调，它在功能上与 XML 配置完全相同——\n\n而编写一个既能使用 XML 配置*又*能使用注解的测试，对我们而言得不偿失。这样的测试会冗长\n\
  \n复杂，需要比任何人真正想要的更多的解释。\n\n**总结**\n\n在本章中，我们了解了 Spring 中两种主要作用域类型的工作原理，以及它们如何影响对象的构造（以及何时构造）。\n\
  \n**第 5 章**\n\n**使用资源文件**\n\n到目前为止，我们已将所有数据放入*配置*中——无论是作为带注解的源文件还是 XML 配置。在本章中，我们将探讨一些\
  \ Spring 特性，以帮助我们使用外部文件中的数据。\n\n这些外部资源不仅帮助我们加载正在使用的数据¹，而且在分离配置方面也很有用，例如当您希望将安全数据存储在不应属于源代码的外部位置，或者用于可能不说同一种语言的用户的国际化时。\n\
  \n**注入资源**\n\n我们要做的第一件事是创建一个提供 `org.springframework.core.io.Resource` 的配置——该资源是保存文本文件内容的对象。\n\
  \n让我们从创建一个 chapter05 项目开始。`build.gradle` 非常\n\n简单；它实际上是第 [4 章](https://doi.org/10.1007/978-1-4842-8637-1_4)\
  \ 中 `build.gradle` 的*字面*副本。\n\n***清单 5-1.*** chapter05/build.gradle\n\ndependencies\
  \ {\n\nimplementation \\\n\n\"org.springframework:spring-core:$springFrameworkVersion\"\
  \n\nimplementation \\\n\n\"org.springframework:spring-context:$springFrameworkVersion\"\
  \n\nimplementation \\\n\n\"org.springframework:spring-test:$springFrameworkVersion\"\
  \n\n}\n\n¹ 参考第 [2 章](https://doi.org/10.1007/978-1-4842-8637-1_2) 中的清单 [2-6](https://doi.org/10.1007/978-1-4842-8637-1_2#PC6)，其中有一长串\
  \ `new Document()` 调用来填充文档列表。我们应该——并且可以——从外部资源加载这些数据。\n\n© Felipe Gutierrez, Joseph\
  \ B. Ottinger 2022\n\nF. Gutierrez 和 J. B. Ottinger，《Spring Framework 6 入门》[，https://doi.org/10.1007/978-1-4842-8637-1_5](https://doi.org/10.1007/978-1-4842-8637-1_5#DOI)\n\
  \n第 5 章 使用资源文件\n\n不要忘记将 `include 'chapter05'` 添加到顶层 `settings.gradle` 中。\n\n让我们保持简单，创建一个内容为\
  \ `Hello, world` 的文本文件——这虽然无聊且可预测，但我们将在测试中验证文件内容，所以我们*需要*无聊且可预测。\n\n***清单 5-2.***\
  \ chapter05/src/test/resources/hello.txt\n\nHello, world\n\n**注意** 注意资源的位置。这里，我们将\
  \ `hello.txt` 放在了 `src/test/resources` 目录中；如果我们将其也放在 `src/main/resources` 中但内容不同，会发生什么？资源是通过\
  \ Java 的类加载器加载的，因此类路径中首先出现的版本将被加载。通常，在测试运行时，测试资源会被添加到类路径的开头，因此测试版本将用于……测试。\n\n现在进入有趣的部分，让我们创建一个测试，断言\
  \ `hello.txt` 的内容如我们所预期的那样匹配 `Hello, world`。我们将在同一个文件中包含两个类：一个配置和一个测试，配置将引导我们了解一些值得注意的有趣事项。\n\
  \n***清单 5-3.*** chapter05/src/test/java/c05/ResourceInjectionTest.java\n\npackage\
  \ c05;\n\nimport org.springframework.beans.factory.annotation.Autowired;\n\nimport\
  \ org.springframework.context.annotation.Bean;\n\nimport org.springframework.context.annotation.Configuration;\n\
  \nimport org.springframework.core.io.DefaultResourceLoader;\n\nimport org.springframework.core.io.Resource;\n\
  \nimport org.springframework.test.context.ContextConfiguration;\n\nimport org.springframework.test.context.testng.\n\
  \nAbstractTestNGSpringContextTests;\n\nimport org.testng.annotations.Test;\n\nimport\
  \ java.io.IOException;\n\nimport java.nio.charset.StandardCharsets;\n\n\n\nimport\
  \ java.util.Scanner;\n\nimport static org.testng.Assert.assertEquals;\n\n第 5 章 使用资源文件\n\
  \n@Configuration\n\nclass ResourceInjectionConfig {\n\n@Bean\n\npublic Resource\
  \ getHelloWorldResource() {\n\nreturn new DefaultResourceLoader()\n\n.getResource(\"\
  classpath:hello.txt\");\n\n}\n\n@Bean\n\nString getContent(Resource resource) throws\
  \ IOException {\n\ntry(var scanner = new Scanner(\n\nresource.getInputStream(),\n\
  \nStandardCharsets.UTF_8)\n\n) {\n\nscanner.useDelimiter(\"\\\\A\");\n\nreturn scanner.hasNext()?scanner.next().trim():\"\
  \";\n\n}\n\n}\n\n}\n\n@ContextConfiguration(classes = {ResourceInjectionConfig.class})\n\
  \npublic class ResourceInjectionTest\n\nextends AbstractTestNGSpringContextTests\
  \ {\n\n@Autowired\n\nString helloWorld;\n\n@Test\n\nvoid testHelloWorld() {\n\n\
  assertEquals(helloWorld, \"Hello, world\");\n\n}\n\n}\n\n测试本身相当直接：声明一个配置类（`ResourceInjectionConfig`）并注入一个\
  \ `String`。这个 `String` 被命名为 `helloWorld`——但自动装配使用的是*类型匹配*，因此它会寻找与值类型匹配的 Bean。\n\n\
  我们声明的唯一 Bean 是由 `getContent()` 返回的，因此该方法会被调用来填充该值。\n\n第 5 章 使用资源文件\n\n我们的实际测试本身仅仅验证了自动装配的\
  \ `String` 的值。但首先，我们是如何*获取*这个值的呢？\n\n我们的配置类看起来比它*可能*需要的更复杂（即使只有两个方法）。不过，我们之所以这样构建它，是因为这个配置演示了如何通过组合的方式构建一个可工作的配置，将我们所需的内容分解成小而简单的部分。\n\
  \n毕竟，在加载资源时我们有两个过程：\n\n1.  资源检索本身，即“我们如何获取资源”\n2.  将 `Resource` 转换为 `String` 的过程，这发生在首次检索该值并通过\
  \ `@Autowired` 注入时\n\n这两个过程各自都是可测试的。\n\n`getContent()` 方法并不特别值得赞赏；它使用了一种有点粗暴、缓慢的方法将\
  \ `InputStream` 转换为 `String`。那么，我们为什么不使用像 Guava ([`guava.dev`](https://guava.dev))\
  \ 这样的库来为我们完成这项工作呢？\n\n像往常一样，有几个原因：\n\n1.  我不想仅仅为了这一个功能而添加 Guava。Guava 是一个非常有用的库，但为了这一个方法添加依赖感觉非常沉重。\n\
  2.  Spring 的作用域（参见第[4](https://doi.org/10.1007/978-1-4842-8637-1_4)章！）通过缓存 `getContent()`\
  \ 的值以供将来调用，帮助我们。默认作用域是单例；如果我们重复使用该值 400 次，Spring 将简单地返回它已经计算出的值，而不是创建 400 个 `Scanner`\
  \ 实例。我们可以在代码中展示这一点，但第[4](https://doi.org/10.1007/978-1-4842-8637-1_4)章已经演示了作用域，在本章中这样做会增加大量重复的代码清单，实在不值得。\n\
  \n**从属性文件加载注入的值**\n\nSpring 也可以从属性文件中将值注入到 Bean 的值中。\n\n虽然“My Documents”对于我们的示例应用来说是一个合适的名称——并且我们将继续使用它——但如果我们能够在不重新编译应用程序的情况下更改它，那就更好了。\n\
  \n第 5 章 使用资源文件\n\n让我们从一个属性文件中加载它，这个功能在我们的 Spring 之旅中将非常有用。\n\n我们可以通过使用两个注解来轻松实现：`@PropertySource`\
  \ 和 `@Value`。\n\n应用于配置类的 `@PropertySource`，基本上会创建一个 Bean 本身，作为供 `@Value` 注解使用的资源。它有几个属性，但通常只有两个是相关的：一个是\
  \ `value`——默认属性——它是对属性来源的引用。另一个是 `ignoreResourceNotFound`，一个布尔值，它将静默忽略无法加载资源的情况。（`ignoreResourceNotFound`\
  \ 的默认值是 `false`。）\n\n资源名称是一个灵活的名称。在最简单的用法中，它是对 Java 类路径中资源的引用。然而，它是一个 URL，因此你可以使用一个*方案*和一个资源名称来加载资源。\n\
  \n方案通常是对应使用的资源加载器类型的引用。如果你使用过万维网，你可能熟悉像 `https`、`http`、`ftp` 甚至 `file` 这样的方案；浏览器知道如何处理使用这些方案作为加载器的资源。Spring\
  \ 的资源加载器推断出一个自定义方案 `classpath`——也可以显式使用——来从类路径加载资源。\n\n**注意** 还有一个 `classpath*`\
  \ 变体，这是一种为资源加载通配符的方式。当你试图一次加载大量资源时，它特别有用，但我们不会在本章中使用它。\n\n另一个在这里为我们工作的注解是 `@Value`。它只有一个属性，一个表示查找的字符串。这使用了“Spring\
  \ 表达式语言”，也称为“SpEL”，来解析表达式以获取值。\n\nSpEL 是*极其*强大的。它不仅可以在对象内部查找值（到任意深度），还可以调用这些对象上的方法，因此理论上你可以使用\
  \ SpEL 调用方法与数据库通信，例如。\n\n我们暂时不会深入探讨 SpEL 的庞大深度——我们将使用简单的对象查找——但如果你感兴趣，可以在 Spring\
  \ 文档的“Spring 表达式语言 (SpEL)”下找到 SpEL 的定义。2\n\n2 “Spring 表达式语言 (SpEL)”文档可以在 [`docs.spring.io/spring-framework/docs/6.0.x/reference/html/core.html#expressions`](https://docs.spring.io/spring-framework/docs/6.0.x/reference/html/core.html#expressions)\
  \ 找到。\n\n第 5 章 使用资源文件\n\n让我们看看这些在实际中是如何工作的。我们将有两个文件：一个是资源文件 `menu.properties`，另一个是测试类和配置。首先，`menu.properties`\
  \ 确实是一个非常简单的文件：\n\n***清单 5-4.*** chapter05/src/test/resources/menu.properties\n\n\
  app.title=My Documents\n\n现在，让我们看看 `PropertyTest.java`，它也包含一个配置类：\n\n***清单 5-5.***\
  \ chapter05/src/test/java/c05/PropertyTest.java\n\n**package c05**;\n\n**import\
  \ org**. **springframework**. **beans**. **factory**. **annotation**. **Autowired**;\
  \ **import org**. **springframework**. **beans**. **factory**. **annotation**. **Value**;\
  \ **import org**. **springframework**. **context**. **annotation**. **Bean**; **import\
  \ org**. **springframework**. **context**. **annotation**. **Configuration**; **import\
  \ org**. **springframework**. **context**. **annotation**. **PropertySource**; **import\
  \ org**. **springframework**. **test**. **context**. **ContextConfiguration**; **import**\n\
  \n**org**. **springframework**. **test**. **context**. **testng**. **AbstractTestNGSpringContextTests**;\
  \ **import org**. **testng**. **annotations**. **Test**;\n\n**import static org**.\
  \ **testng**. **Assert**. **assertEquals**;\n\n@Configuration\n\n@PropertySource(\"\
  classpath:/menu.properties\")\n\n**class** PropertyConfiguration {\n\n@Value(\"\
  ${app.title}\")\n\nString title;\n\n@Bean\n\nString getTitle() {\n\n**return** title;\n\
  \n}\n\n}\n\n@ContextConfiguration(classes = {PropertyConfiguration.class})\n\n**public\
  \ class** PropertyTest\n\n第 5 章 使用资源文件\n\n**extends** AbstractTestNGSpringContextTests\
  \ {\n\n@Autowired\n\nString title;\n\n@Test\n\nvoid testTitle() {\n\nassertEquals(title,\
  \ \"My Documents\");\n\n}\n\n}\n\n这个测试并不特别复杂。`PropertyConfiguration` 使用 `@PropertySource`\
  \ 来加载 `menu.properties`；它有一个属性，一个名为 `title` 的 `String`，通过 `@Value` 填充。`value` 属性本身是\
  \ `app.title`，恰好与我们在 `menu.properties` 中拥有的一个属性匹配，并且测试验证它是否符合我们的预期。\n\n\n\n@Value\
  \ 的格式非常简单：`“${app.title}”`，它直接查找我们在 `@PropertySource` 注解中指定的属性资源。\n\n**注意**：如果你使用\
  \ `@PropertySource()` 并设置 `ignoreResourceNotFound=true`，\n\n那么 `@Value` 将不会解析该资源——你得到的值会是类似\n\
  \n`${app.title}` 这样的字符串，而不是实际的属性值。如果\n\n省略 `ignoreResourceNotFound`，或将其显式设置为 `false`，则\n\
  \n配置将加载失败，并抛出 `FileNotFoundException`。\n\n**国际化**\n\n**注意**：我非常想将这一节命名为“国际化”（或者，也许是“Internationalisation”或“¡Internacionalización!”）。\n\
  \n谢天谢地，我还有些克制力，尽管我的编辑可能不这么认为。\n\n另外，这一节的标题也实在太长了。\n\n第 5 章 使用资源文件\n\n在上一节“注入资源”中，我们展示了如何从\
  \ `Resource` 获取 `InputStream`，\n\n并将 `InputStream` 转换为 `String` 的机制。\n\n这很有趣，但本身并不是特别有用。然而，在需要支持多种语言的环境中，\n\
  \n它*可以*变得有用——甚至是必要的。\n\n让我们更进一步，展示如何利用 Java 的国际化功能，根据区域设置显示应用程序的标题。\n\n在清单 5-5 中，我们看到了如何加载\
  \ `menu.properties`，\n\n但我们可以使用类似的机制，根据区域设置查找资源，并更进一步。\n\nSpring 提供了 `MessageSource`\
  \ 的概念，它不仅允许我们根据区域设置查找资源，\n\n还可以对内容应用消息格式化。它遵循与 Java 的 `java.text.MessageFormat`\
  \ 类相同的规则。\n\n首先，让我们看两个属性文件。第一个是“默认区域设置”，基于英语区域设置，\n\n另一个基于荷兰语.3。\n\n***清单 5-6.***\
  \ chapter05/src/test/resources/i18nmenu.properties\n\napp.title=My Documents\n\n\
  app.greeting=Hello, {0}\n\napp.copyright=(c) 2022 by Apress Media\n\n***清单 5-7.***\
  \ chapter05/src/test/resources/i18nmenu_nl.properties\n\napp.title=Mijn Documenten\n\
  \napp.greeting=Hallo, {0}\n\n如我们所见，这里有三个属性——`app.title`、`app.greeting` 和 `app.copyright`，\n\
  \n其中 `app.copyright` 完全没有进行本地化。\n\n`app.greeting` 文本使用了简单的参数替换结构，遵循 `java.text.MessageFormat`\
  \ 的规则，\n\n因此它会将 `{0}` 替换为传递给 `MessageSource.getMessage()` 方法的数组中的第一个参数。\n\n如果我们在\
  \ `MessageSource` 中查找 `app.copyright`，它将回退到默认消息，\n\n因此我们期望任何对 `app.copyright` 的查找都返回英文文本。\n\
  \n让我们实际演示一下。我们将使用三个 `DataProvider` 方法，以便检查每种消息类型，\n\n并传入不同的区域设置，以测试所有功能。\n\n3 我不会说荷兰语，也不会写荷兰文；我使用了翻译服务，并希望这些消息足够简单，能够正确表达。如果这里的荷兰语不准确，我会尽快修正。\n\
  \n第 5 章 使用资源文件\n\n***清单 5-8.*** chapter05/src/test/java/c05/I18NTest.java\n\n**package\
  \ c05**;\n\n**import org**. **springframework**. **beans**. **factory**. **annotation**.\
  \ **Autowired**; **import org**. **springframework**. **context**. **MessageSource**;\
  \ **import org**. **springframework**. **context**. **annotation**. **Bean**; **import\
  \ org**. **springframework**. **context**. **annotation**. **Configuration**; **import\
  \ org**. **springframework**. **context**. **support**. **ResourceBundleMessageSource**;\
  \ **import org**. **springframework**. **test**. **context**. **ContextConfiguration**;\
  \ **import**\n\n**org**. **springframework**. **test**. **context**. **testng**.\
  \ **AbstractTestNGSpringContextTests**; **import org**. **testng**. **annotations**.\
  \ **DataProvider**;\n\n**import org**. **testng**. **annotations**. **Test**;\n\n\
  **import java**. **util**. **Locale**;\n\n**import static org**. **testng**. **Assert**.\
  \ **assertEquals**;\n\n@Configuration\n\n\n\n**class** I18NConfiguration {\n\n@Bean(\"\
  messages\")\n\nMessageSource getMessageSource() {\n\nvar messageSource = **new**\
  \ ResourceBundleMessageSource();\n\nmessageSource.setBasename(\"i18nmenu\");\n\n\
  messageSource.setDefaultEncoding(\"UTF-8\");\n\n**return** messageSource;\n\n}\n\
  \n}\n\n@ContextConfiguration(classes = {I18NConfiguration.class})\n\n**public class**\
  \ I18NTest\n\n**extends** AbstractTestNGSpringContextTests {\n\n@Autowired\n\nMessageSource\
  \ messages;\n\n@DataProvider\n\nObject[][] getTitleTranslations() {\n\n**return\
  \ new** Object[][]{\n\n第 5 章 使用资源文件\n\n{\"en\", \"My Documents\"},\n\n{\"nl\", \"\
  Mijn Documenten\"}\n\n};\n\n}\n\n@DataProvider\n\nObject[][] getCopyrightTranslations()\
  \ {\n\n**return new** Object[][]{\n\n{\"en\"},\n\n{\"nl\"},\n\n};\n\n}\n\n@DataProvider\n\
  \nObject[][] getHelloTranslations() {\n\n**return new** Object[][]{\n\n{\"en\",\
  \ \"Hello, Joseph\", \"Joseph\"},\n\n{\"nl\", \"Hallo, Mattijs\", \"Mattijs\"}\n\
  \n};\n\n}\n\n@Test(dataProvider = \"getTitleTranslations\")\n\nvoid testTitle(String\
  \ encoding, String translation) {\n\nassertEquals(\n\nmessages.getMessage(\"app.title\"\
  , **null**, **new** Locale(encoding)), translation);\n\n}\n\n@Test(dataProvider\
  \ = \"getHelloTranslations\")\n\nvoid testGreeting(String encoding, String translation,\
  \ String name) {\n\nassertEquals(\n\nmessages.getMessage(\n\n\"app.greeting\",\n\
  \n**new** Object[]{name},\n\n**new** Locale(encoding)\n\n),\n\n第 5 章 使用资源文件\n\n\
  translation);\n\n}\n\n@Test(dataProvider = \"getCopyrightTranslations\")\n\nvoid\
  \ testCopyright(String encoding) {\n\nassertEquals(\n\nmessages.getMessage(\"app.copyright\"\
  , **null**, **new** Locale(encoding)),\n\n\"(c) 2022 by Apress Media\"\n\n);\n\n\
  }\n\n}\n\n欢迎有进取心的多语言读者添加更多翻译，以探索更多可能性。\n\n**总结**\n\n在本章中，我们探讨了如何使用资源文件在配置中设置值。我们还了解了如何利用\
  \ `MessageSource` 在一定程度上实现输出的国际化。\n\n**第 6 章**\n\n**为你的 Spring 应用**\n\n**添加简单的持久化**\n\
  \n在本章中，我们将探讨在应用程序代码之外进行数据存储的入门知识。到目前为止，我们一直将所有数据存储在枚举和静态搜索引擎中（少数例外情况用于演示从配置加载数据），但在现实世界中，关系型数据库是标准的数据存储库。我们将研究数据访问对象（DAO），以及如何设置数据库连接并将数据从数据库中移出。1\n\
  \n**持久化概念**\n\n使用数据库的惯用 Java 方法相当简单。要与数据库交互，你需要：\n\n1. 获取数据库连接。\n2. 启动事务。\n3. 创建\
  \ SQL 语句。\n4. 执行 SQL 语句。\n5. 解释结果。\n\n1 我们暂时还不会演示*写入*数据库。这将在后面的章节中介绍。我们保证。我们正在循序渐进地引入概念，并快速推进到更多功能。\n\
  \n© Felipe Gutierrez, Joseph B. Ottinger 2022\nF. Gutierrez 和 J. B. Ottinger, *Introducing\
  \ Spring Framework 6*[, https://doi.org/10.1007/978-1-4842-8637-1_6](https://doi.org/10.1007/978-1-4842-8637-1_6#DOI)\n\
  \n第 6 章 为你的 Spring 应用添加简单的持久化 6. 关闭事务。\n7. 关闭数据库连接。\n\n当然，在此过程中的多个环节都可能发生错误，而错误处理会打破这个顺序。\n\
  \nSpring 遵循此模型，但它也隐藏了实际代码中的大量基础设施。总的来说，这是一个巨大的好处，因为它意味着你的代码可以专注于实际要做的事情，而不是处理与数据库交互相关的典型管道工作。\n\
  \n为了在 Spring 中与关系型数据库交互，我们将在配置中设置一个数据库连接，并配置一个*模板*类来处理实际使用连接的操作。模板类为我们提供了简单的方法来执行\
  \ SQL——例如 `queryForObject`、`update` 等——并为我们管理底层连接，同时（可能）处理将结果映射到 Java 对象的过程。\n\n\
  \n\n尽管如此，你仍应了解还有其他与数据库交互的方式；这只是众多方法之一。它可能是最简单的一种，而我们的下一章将介绍更强大（且更具可移植性）的方法。\n\n\
  **重温我们的简单数据模型**\n\n为了本章的目的，我们将简化文档数据。到目前为止，我们有两个类：`Document` 和 `DocumentType`，其中\
  \ `DocumentType` 是一个 Java 枚举类型（一个预定义的可能值列表）。本章我们将只关注 `Document`，而将 `DocumentType`\
  \ 留作下一章的练习。\n\n我们的 `Document` 看起来会与我们之前见过的略有不同，因为我们没有包含 `DocumentType`，并且添加了一个 `id`\
  \ 字段作为文档的人工标识符，类似于序列号。\n\n这是一个相当长的类，主要是因为修改器和访问器的样板代码；为了简单起见（并且因为我们这里的示例不需要它们），我们没有包含\
  \ `equals()` 和 `hashCode()` 方法。我们还将包含 `DocumentType` 类，它也是我们模型的一部分。这些类与我们之前在之前章节中看到的实体版本非常相似，主要区别在于为\
  \ `Document` 类添加了一个人工标识符。\n\n第 6 章 为你的 Spring 应用程序添加简单的持久化 **注意** 我们可以使用 Java 中新的记录类型来表示\
  \ `Document`。鉴于我们从不修改数据，这并非牵强之举，而且我们将要演示的处理数据的机制也能很好地与记录类型配合使用。\n\n然而，我们后面的一些章节将重新讨论可变类型的持久化，而记录类型在这方面不太适用；我们现在将坚持使用简单的方法。\n\
