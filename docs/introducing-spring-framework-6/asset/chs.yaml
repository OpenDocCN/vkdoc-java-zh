  \n**<tbody>**\n\n**<tr th:each**=\"doc: ${docs}\" **>**\n\n**<td th:text**=\"${doc.name}\"\
  \ **>** 第一个文档**</td>**\n\n**<td th:text**=\"${doc.type}\" **>** PDF**</td>**\n\n\
  **<td th:text**=\"${doc.location}\" **>** /Documents/First.pdf**</td>**\n\n**</tr>**\n\
  \n**</tbody>**\n\n\n\n**</table>**\n\n**</body>**\n\n**</html>**\n\n请注意，这是一个“常规的\
  \ HTML 页面”。我们为 Thymeleaf 声明了一个 `th` 命名空间，但 `th:` 标签并不会阻止我们在任何常规浏览器中打开该页面以查看布局。\n\
  \n**注意** 此页面的布局并非特别出色；在“优秀网页设计”的编年史中，这个页面可能会因其糟糕的设计而成为反面教材。\n\n现在，我们可以看看 Thymeleaf\
  \ 的渲染效果。`html` 块不仅声明了 Thymeleaf 的命名空间，还声明了 `with` 和 `lang` 标签。这些是特殊的 Thymeleaf *属性*，用于定位特定的\
  \ HTML 属性。`with` 属性允许我们定义一个变量供后续使用；我们在这里所做的是根据渲染环境中的语言，为模板提取一个名为 `lang` 的变量。然后，`lang`\
  \ 属性使用这个 `lang` *值*来告知浏览器模板使用的主要语言，许多浏览器可以根据此值为你提供自动翻译成不同语言的功能。\n\n渲染后的值使用了一种*表达式语言*。\n\
  \n通常，octothorpe（即“井号”，`#` 字符）用于属性插值。它会查找一个属性名称，并将其值用作该属性的值。\n\n美元符号（`$` 字符）则从模板模型中检索一个值。\n\
  \n`th:text` 属性会替换当前节点的值，因此渲染器会丢弃任何占位文本（即 HTML 文件中显示的默认文本）。因此，如果我们在资源包中有一个名为 `hello.text`\
  \ 的属性，其值为“Hello, world”，并且我们希望渲染以下模板块：\n\n**<span th:text**=\"#{hello.text}\" **>**\
  \ Hi there! **</span>**\n\n第 8 章 在 Web 上展示你的 Spring 应用程序\n\n在运行时，Thymeleaf 会将其渲染为：\n\
  \n**<span>** Hello, world**</span>**\n\n我们还在模板中看到了 `th:each` 的使用，它允许我们遍历模型中集合里的*每一个*元素（基于我们的\
  \ `SearchController` 的 `docs` 集合），并为每个元素使用一个名为 `doc` 的局部变量。因此，如果我们有一个 `Document`\
  \ 类型的列表，我们可以通过使用 `th:text=\"${doc.name}\"` 来获取某个文档的名称，这将尝试调用“doc”所引用对象的 `getName()`\
  \ 方法。\n\n与许多其他模板引擎一样，Thymeleaf 可以非常强大。\n\n我们只是触及了渲染引擎的皮毛；这里所展示的内容足以满足我们微不足道的需求，但你可能希望浏览\
