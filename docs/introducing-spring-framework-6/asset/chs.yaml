  \n现在进入有趣的部分！让我们来构建一个 EmailService。\n\n电子邮件服务有两个主要用途：编写电子邮件和阅读电子邮件。\n\n\n\n事实证明，Spring\
  \ 让**编写**和发送电子邮件变得非常简单，因为 Spring 中有一个 `JavaMailSender` 接口；如果我们正确配置了应用程序属性（如清单 11-2\
  \ 所示，假设你的环境变量设置正确），我们就可以*轻松地*使用 `JavaMailSender` 发送邮件。\n\n读取电子邮件与编写电子邮件略有不同。当你*发送*邮件时，通常使用一种名为\
  \ SMTP 的标准化协议，3 尽管也可能存在其他自定义协议。\n\n当你*读取*邮件时，你有更多、更多的选择。最简单的协议之一是 POP3，4 尽管另一种常见协议是\
  \ IMAP,5，并且还有这些协议的*其他*替代方案及其变体。每种协议都有其优缺点；POP3 简单且易于使用，而 IMAP 可能是最常用且功能最全的协议，它为电子邮件提供了“文件夹”的概念，同时也增加了检索电子邮件过程的复杂性。（事实证明，这种复杂性中的一部分会影响我们使用\
  \ POP3 的方式，但影响会相当轻微。）\n\n3 SMTP 代表“简单邮件传输协议”，在撰写本文时由 RFC 8314 描述，可从 [`datatracker.ietf.org/doc/html/rfc8314`](https://datatracker.ietf.org/doc/html/rfc8314)\
  \ 阅读——幸运的是，“简单邮件传输协议”这个描述非常贴切。\n\n4 POP3 代表“邮局协议”第 3 版，由 RFC 1081 及其他许多文档描述。请参阅\
  \ [`datatracker.ietf.org/doc/html/rfc1081`](https://datatracker.ietf.org/doc/html/rfc1081)\
  \ 作为起点。\n\n5 IMAP 是“互联网消息访问协议”，由 RFC 9051 描述，位于 [https://](https://datatracker.ietf.org/doc/html/rfc9051)\n\
  \n[datatracker.ietf.org/doc/html/rfc9051。](https://datatracker.ietf.org/doc/html/rfc9051)\n\
