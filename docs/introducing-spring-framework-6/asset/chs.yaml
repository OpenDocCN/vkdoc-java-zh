  \ SMTP 在协议层面是如何工作的，或者不同的邮件提供商是如何运作的。从计算领域来看，它是一个不错的 API，但从人类领域来看，它是不够的；人类应该使用像 Spring\
  \ Email 这样的 API。\n\n如果在实现过程的早期就设计测试，通常更容易为其他人设计 API。当然，在完成测试所需的所有内容（例如对象模型、接口等）之前，它们是无法编译的，但先编写测试通常能让你更清楚地了解你的设计实际*需要*什么，以及哪些方面最值得精心设计。\n\
