  < **constructor-arg** name=\"producer\" ref=\"producer\"/>\n\n</**bean**>\n\n< **bean**\
  \ id=\"producerBean\" class=\"java.lang.Boolean\">\n\n< **constructor-arg** name=\"\
  s\" value=\"true\"/>\n\n</**bean**>\n\n< **bean** id=\"consumerBean\" class=\"java.lang.Boolean\"\
