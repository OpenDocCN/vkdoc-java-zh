  >\n\n< **context:component-scan** base-package=\"chapter03.service\" />\n\n</**beans**>\n\
  \n此配置可直接替代我们在清单 3-9 中看到的组件扫描配置。关键在于引入了 context 命名空间，它提供了 component-scan 标签。\n\n\
  请注意，我们目前还*没有*使用此配置——让我们先考虑所有这些 XML 的价值，然后我们将在清单 3-17 中看到此配置的实际使用，以证明它能按预期工作。\n\n\
  第 3 章 应用不同的配置\n\n**XML 配置是个好主意吗？**\n\n如果问题是“XML 配置是个好主意吗”，答案必须是“是”，但有一个前提：“什么时候？”\n\
  \n不幸的是，回答 XML 配置**何时**是个好主意要稍微困难一些。\n\n在这里，我们为**每个** XML 配置都准备了一个单独的测试类，因此存在大量重复：我们*本来可以*只用一个测试类，并向其提供一个\
  \ XML 配置列表，这样就能按顺序快速测试每个配置。\n\n如果我们缩短其中一个测试，它可能看起来像这样：\n\n***清单 3-17.*** chapter03/src/test/java/chapter03/MyDocsAllXMLsTest.java\
  \ **package chapter03**;\n\n**import chapter03**. **service**. **SearchEngine**;\n\
  \n**import org**. **springframework**. **context**. **support**. **ClassPathXmlApplicationContext**;\
  \ **import org**. **testng**. **annotations**. **DataProvider**;\n\n**import org**.\
  \ **testng**. **annotations**. **Test**;\n\n**import static chapter03**. **model**.\
  \ **DocumentType**. **PDF**;\n\n**import static org**. **testng**. **Assert**. **assertEquals**;\n\
  \n**import static org**. **testng**. **Assert**. **assertNotNull**;\n\n**public\
  \ class** MyDocsAllXMLsTest {\n\n@DataProvider\n\nObject[][] getConfigs() {\n\n\
  **return new** Object[][]{\n\n**new** Object[]{\"classpath:/documents.xml\"},\n\n\
  **new** Object[]{\"classpath:/doccons.xml\"},\n\n**new** Object[]{\"classpath:/docdata.xml\"\
  },\n\n**new** Object[]{\"classpath:/docscan.xml\"}};\n\n}\n\n@Test(dataProvider\
  \ = \"getConfigs\")\n\n**public** void testSpring(String configLocation) {\n\nvar\
  \ context=\n\n**new** ClassPathXmlApplicationContext(configLocation);\n\n第 3 章 应用不同的配置\n\
  \nvar engine=context.getBean(SearchEngine.class);\n\nassertNotNull(engine);\n\n\
  assertEquals(engine.listAll().size(), 4);\n\nassertEquals(\n\nengine.findByType(PDF).get(0).getName(),\n\
  \n\"Book Template.pdf\");\n\n}\n\n}\n\n这里使用了 TestNG 的 @DataProvider 注解，将每个 XML 配置名称传入一个方法，该方法本身会应用来自\
  \ MyDocsBaseTest 的每个测试（或其等效测试）。这并不完全等效，因为 MyDocsBaseTest 类被设计为独占访问一个 SearchEngine，但它演示了如何快速按顺序动态加载每个\
  \ XML 文件；这**可以**在不使用 XML 的情况下完成，但在这种情况下，XML 相当方便。\n\n话虽如此，我们设计配置的方式使得 XML 配置工作起来相当自然（得益于我们在\
  \ StaticSearchEngine 中使用了静态数据），而功能更完整的环境则会看到投入的精力带来的回报递减。\n\n总的来说，作为一名程序员，你会发现自己倾向于使用程序化配置，它感觉更自然，而且比等效的\
  \ XML 简洁得多。\n\n**选择配置方法**\n\n\n\n我们已经看到了在 Spring 中进行配置的两种不同方式：使用 Java 类的编程式配置和 XML\
  \ 配置。我们还看到了组件扫描作为 Java 和 XML 配置的一种变体，这可以被视为配置组件的第三种方式。\n\n第三章 应用不同的配置\n\n**配置类型**\n\
  \n**用途**\n\nXML\n\n可用于第三方库和/或不同的开发环境。通常易于阅读和理解，但非常冗长，且需要单独跟踪每个配置项。9\n\n注解\n\n这是另一种配置方式，但在此方式下，你将\
  \ Spring 上下文附加到你的应用程序中（即，你在*源码级别*为你的组件添加 Spring 注解，因此编译类时 Spring 必须位于编译类路径中；当然，如果你的应用程序使用了\
  \ Spring，这只是一个非常小的问题）。\n\nJava Bean 配置\n\n这通常是首选的配置机制，因为开发者习惯于编译；它非常易于理解，并且可以非常明确。\n\
  \n**总结**\n\n在本章中，我们看到了加载 Spring 配置的多种不同方式——编程式配置（组件扫描作为其替代方案），以及使用 XML 的声明式配置（组件扫描同样是一种可能的选择）。\n\
  \n在下一章中，我们将开始为我们的应用程序添加功能。\n\n9 XML 配置的一个巧妙特性是，你可以将一个配置文件导入到另一个配置文件中，我们在此没有演示这个特性，因为我们的配置过于简单。在实践中，这通常用于第三方集成，但*同样*，此类集成通常依赖于组件扫描或编程式配置。\n\
  \n**第四章**\n\n**使用 Bean 作用域**\n\n到目前为止，我们已经了解了 **My Documents** 应用程序的基本需求，并探讨了搜索引（能够返回*所有*文档或特定类型文档）的简单实现的一些配置方面。\n\
  \n在所有情况下，我们返回的都是每个实现的*单例*，这意味着 Spring 为每个组件只构造*一个*实例。\n\n在本章中，我们将花一些时间来讨论 Bean *作用域*，它控制着\
  \ Spring 何时构造对象以及如何使用它们。\n\n**作用域**\n\n作用域是编程中用来描述*可见性*的一个术语。在编程语言中，当一个引用可被访问时，它就“在作用域内”；在\
  \ Java 中，如果一个引用在函数*内部*声明，则不能在函数外部使用它（当然，除非它以某种方式被返回或暴露出来）。\n\n它也指引用的*生命周期*，Spring\
  \ 正是从这个角度来引用它的。\n\n**作用域类型**\n\nSpring 实际上有*六种*可用的作用域，1 其中四种仅适用于 Web 应用程序上下文，这意味着我们稍后需要进一步了解它们——尽管我们可以将本章学到的概念应用到以后更深入地接触\
  \ Web 应用程序时。\n\n1 实际上还有另一种可用的 Bean 作用域，称为线程作用域，但你需要进行一些设置才能使用它。它通常不会被注册，因为将 Bean\
  \ 的作用域限定为线程往往会导致内存泄漏，除非程序员非常小心。\n\n© Felipe Gutierrez, Joseph B. Ottinger 2022\n\
  F. Gutierrez 和 J. B. Ottinger，《Spring Framework 6 入门》[，https://doi.org/10.1007/978-1-4842-8637-1_4](https://doi.org/10.1007/978-1-4842-8637-1_4#DOI)\n\
  \n第四章 使用 Bean 作用域\n\nsingleton（单例）\n\n将单个 Bean 定义限定为每个 Spring ApplicationContext\
  \ 对应一个对象实例。\n\nprototype（原型）\n\n将单个 Bean 定义限定为任意数量的对象实例。\n\nrequest（请求）\n\n将单个 Bean\
  \ 定义限定为单个 HTTP 请求的生命周期；也就是说，每个 HTTP 请求都将拥有一个基于单个 Bean 定义创建的 Bean 实例。仅在支持 Web 的 Spring\
  \ ApplicationContext 上下文中有效。\n\nsession（会话）\n\n\n\n将单个 bean 定义的作用域限定为 HTTP 会话的生命周期。仅在基于\
  \ Web 的 Spring ApplicationContext 上下文中有效。\n\nglobal\n\n将单个 bean 定义的作用域限定为全局 HTTP\
  \ 会话的生命周期。通常仅在 portlet 上下文中使用时才有效。仅在基于 Web 的 Spring ApplicationContext 上下文中有效。\n\
  \n我们在此关心的两个作用域是 singleton 和 prototype。\n\n在 Java 中，singleton 通常指一个被广泛使用的单一引用——你只需要（或想要）一个的对象。Java\
  \ 实际上并不支持*真正*的 singleton 概念——虽然可以实现，但极其困难。\n\n相反，Java 支持的是*每个类加载器*的 singleton 概念，这本身就有其困难之处，而且由于\
  \ Java 天生是多线程的，即使为给定类加载器构造 singleton 也难以保证。请注意，这并非*不可能*，一旦你了解原理并接受其局限性，它可以简化为一个简单的模式（即：尽早静态实例化）。\n\
  \n在 Spring 中，singleton 的作用域限定于一个应用上下文，但在给定的应用上下文中，无论何时检索对象，你都会获得相同的对象引用。\n\n作用域为\
  \ *prototype* 的组件，每次从上下文中*检索匹配对象*时，都会以定义为模型重新构造。这个定义很重要：如果你从上下文中检索一个 prototype 组件，然后将其传递出去，你将持有相同的引用；Spring\
  \ 不会深入你的代码为你创建新引用。你*必须*显式地从上下文中检索它们，才能触发 prototype 行为。\n\n**注意** 默认作用域是 singleton——如果你没有明确告诉\
  \ Spring 使用哪个作用域，你将获得 singleton 行为。\n\n第 4 章 使用 Bean 作用域\n\n当你的组件不管理状态时，singleton\
  \ 是合适的。如果你需要管理对象状态，例如跟踪给定对象或会话的状态，prototype 是最佳选择。\n\n**使用作用域**\n\n为了检验我们的作用域，我们当然要构建一个\
  \ chapter04 项目，但我们还要构建一个测试类，加载 XML 配置并使用这些配置运行测试。这些测试不会很长，但会有一些细微差别，所以要小心。\n\n我们的\
  \ build.gradle 几乎是第 [3](https://doi.org/10.1007/978-1-4842-8637-1_3) 章 build.gradle\
  \ 的副本。\n\n***清单 4-1.*** chapter04/build.gradle\n\ndependencies {\n\nimplementation\
