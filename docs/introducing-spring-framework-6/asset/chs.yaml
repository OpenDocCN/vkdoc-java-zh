  \n我们仍然希望确保在应用程序启动时创建数据库模式，因此需要一个 `application.properties` 文件来告诉 Hibernate 创建数据库。在生产环境中，这是一个坏主意——你需要非常小心地控制数据库模式——但对于本书中的示例应用程序，我们希望隐式创建模式。\n\
