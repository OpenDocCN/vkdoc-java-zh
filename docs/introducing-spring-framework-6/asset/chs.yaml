  我们快速浏览了 Spring MVC 范式，使用 Spring Data 进行数据访问（模型），并使用 Thymeleaf 进行表示层（视图），还涉及了轻度的国际化。在下一章中，我们将与外部消息系统进行集成。\n\
  \n**第 9 章**\n\n**将你的 Spring 应用程序**\n\n**与外部系统集成**\n\n在前几章中，我们专注于*同步进程*——我们向数据库发出命令并获取响应，或者发起一个\
  \ Web 请求，然后它返回一个渲染好的页面。在本章中，我们将介绍*异步处理*，即那些不会立即产生响应的进程。\n\n我们还将稍微改变一下方法。在前几章中，我们一直在构建一个“搜索引擎”应用程序，但结果产生了大量重复代码，其中许多代码与我们在特定章节中讨论的主题无关。我们仍然会重复*一些*代码，但我们将开始缩减“应用程序”的范围，以节省篇幅并专注于我们正在讨论的具体技术。读者应该能够轻松地将这些新主题集成到更广泛的代码库中，而无需花费太多精力。\n\
  \n异步处理在计算中非常有用，因为它们本质上消除了响应中的*时间压力*。例如，一个 HTTP 请求可能需要在 10 毫秒内响应，否则用户可能会认为应用程序“卡顿”或缓慢。这可能很难解决，因为\
  \ Web*客户端*正在向特定服务器请求数据，而该服务器可以被认为资源有限。如果这是一个繁忙的购物日，消费者以每秒比服务器设计处理能力多 400 个请求的速度访问\
  \ Web 服务器，那么你将会有很多不满意的客户，而解决这个问题并非易事。\n\n使用异步处理，通常发生的情况是每个请求都被放入一个队列中，然后有进程监视该队列以获取请求；如果队列积压（因为监视队列的进程速度不够快），那么你只需增加更多的监视进程。如果队列清空，你就可以减少监视进程的数量，以最小化资源消耗。\n\
  \n在第[6](https://doi.org/10.1007/978-1-4842-8637-1_6)章中，我们将`JdbcTemplate`类视为直接使用\
  \ JDBC 的网关（在引入使用 Spring Data 的更灵活机制之前）。我们之所以研究`JdbcTemplate`，尽管没有特定需求时很少有程序员应该直接使用它，是因为模板模型在其他上下文中（例如异步编程）也非常适用。\n\
  \n**流程**\n\n我们将以 Java 消息服务（JMS）为例。还有其他消息 API，但对我们来说好消息是，虽然它们与 JMS 相比确实有一些细微的差别，但我们可以在不改变架构方法的情况下切换到它们。顺便提一下，JMS\
  \ 本身就是一个通用的消息 API；即使我们使用 JMS 作为访问层，我们可能也在使用像 AMQP 1.0、AMQP 0.9 或 MQTT 这样的消息传输协议。\n\
  \n\n\n我们将使用 `spring-boot-starter-artemis` 项目来提供 JMS 层；实际上，它会导入 `spring-messaging`\
  \ 和 `spring-jms` 模块，并围绕它们（特别是 Artemis 消息代理）封装功能。如果我们将 `artemis-jms-server` 作为项目依赖项包含进来，那么当没有可用的代理时，Spring\
  \ 会为我们启动一个代理，这与 Spring Data 的关系型依赖项会为我们嵌入一个数据库的方式非常相似。\n\nArtemis1 是众多消息代理之一，它基于贡献给\
  \ Apache 项目的 HornetQ 消息代理。它当然提供了一个兼容 JMS 的容器，但也提供了 AMQP 1.0 和 MQTT 作为底层协议。我们将重点放在\
  \ JMS 上，因为它是最通用的消息传递层。\n\n**注意** 我们能学到的最重要的事情是使用异步消息传递的通用*技术*。如果你使用 AMQP 0.9（即 RabbitMQ）、MQTT\
  \ 或任何其他受支持的消息传递规范，那么如果你需要特定的代理功能，这些技术仅在所使用的特定注解方面有所不同。\n\n1 Artemis 的主页是 [`activemq.apache.org/components/artemis/`](https://activemq.apache.org/components/artemis/)。\n\
  \n第 9 章 将 Spring 应用程序与外部系统集成\n\n与 JDBC 一样，JMS 的关键接口是 `JmsTemplate`。在实际应用中，它主要用于*写入*消息，尽管它也有接收消息的机制。（我们将使用注解来设置消息监听器，而不是利用\
  \ `JmsTemplate` 来接收消息，因为这对应用程序开发者来说更方便、更常见。）\n\n发送消息的关键方法是 `send()`，奇怪的是，它有几个变体。最有用的是\
  \ `send(String destinationName, MessageCreator messageCreator)`，它允许我们即时将消息发送到特定目的地。\n\
  \n让我们开始构建一个应用程序，以便了解其工作原理。\n\n我们的“应用程序”将是一个简单的程序。我们将创建一个应用程序，向异步队列发送 20 个文档；该队列将有一个监听器，根据这些文档创建数据库记录。我们还会在几秒钟后转储数据库内容，以确保数据按预期写入。\n\
  \n让我们从查看 `build.gradle` 开始构建。\n\n***清单 9-1.*** chapter09/build.gradle\n\n```\nplugins\
  \ {\n    id \"application\"\n    id 'org.springframework.boot' version '3.0.0-M4'\n\
  \    id 'io.spring.dependency-management' version '1.0.13.RELEASE'\n}\n\ndependencies\
  \ {\n    implementation \\\n        'org.springframework.boot:spring-boot-starter-data-jpa'\n\
  \    implementation \\\n        'org.springframework.boot:spring-boot-starter-artemis'\n\
  \    implementation \\\n        'com.h2database:h2:2.1.214'\n    // implementation\
  \ \\\n    // 'org.apache.activemq:artemis-jms-server:2.24.0'\n}\n\napplication {\n\
  \    mainClass.set(\"md.MyDocsApp\")\n}\n```\n\n第 9 章 将 Spring 应用程序与外部系统集成\n\n这里需要注意的重要事项是：\n\
  \n1.  使用 `spring-boot-starter-artemis`，它为我们的应用程序类路径提供了 JMS 库，并在我们需要时提供了为我们启动 Artemis\
  \ 的钩子。\n2.  包含 `artemis-jms-server`，如果我们希望 Boot 为我们实例化代理，则需要此依赖项（我们确实需要，因为代理配置在开发中非常简单，但在实际环境中可能非常复杂，并且超出了本书的范围）。\n\
  3.  包含一个数据库（H2）和 `spring-boot-starter-data-jpa` 依赖项，这为我们提供了数据库访问权限。\n\n现在让我们先把数据库访问搞定。我们将有一个非常简单的\
