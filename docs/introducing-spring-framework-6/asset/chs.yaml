  \n**import org**. **springframework**. **transaction**. **annotation**. **Transactional**;\
  \ **import org**. **springframework**. **web**. **bind**. **annotation**.*; **import\
  \ java**. **util**. **List**;\n\n@ResponseStatus(value = HttpStatus.NOT_FOUND)\n\
  \n**class** NotFoundException **extends** RuntimeException {\n\nNotFoundException(Integer\
  \ id) {\n\n**super**(String.format(\"resource not found: %d\",id));\n\n}\n\n}\n\n\
  第 10 章 暴露 REST API\n\n@RestController()\n\n**public class** DocumentController {\n\
  \n**private** DocumentRepository dao;\n\n**public** DocumentController(DocumentRepository\
  \ dao) {\n\n**this**.dao = dao;\n\n}\n\nDocument loadDocument(Integer id) {\n\n\
  var doc = dao.findById(id);\n\n**if** (doc.isPresent()) {\n\n**return** doc.get();\n\
  \n}\n\n**throw new** NotFoundException(id);\n\n}\n\n@GetMapping(\"documents/{id}\"\
  )\n\n@Transactional\n\nDocument get(@PathVariable Integer id) {\n\n**return** loadDocument(id);\n\
  \n}\n\n@GetMapping(\"documents\")\n\n@Transactional\n\nList<Document> getAll() {\n\
  \n**return** dao.findAll();\n\n}\n\n@PostMapping(\"documents\")\n\n@Transactional\n\
  \n\n\nDocument post(@RequestBody Document document) {\n\n**return** dao.save(document);\n\
  \n}\n\n@DeleteMapping(\"documents/{id}\")\n\n@Transactional\n\nvoid delete(@PathVariable\
  \ Integer id) {\n\n第 10 章 暴露 REST API\n\nvar document = loadDocument(id);\n\ndao.deleteById(id);\n\
  \n}\n\n@PutMapping(\"documents/{id}\")\n\n@Transactional\n\nvoid put(@PathVariable\
  \ Integer id, @RequestBody Document document) {\n\nvar loadedDocument = loadDocument(id);\n\
  \n**if**(id!= document.getId()) {\n\n**throw new** NotFoundException(id);\n\n}\n\
  \nloadedDocument.setName(document.getName());\n\nloadedDocument.setLocation(document.getLocation());\n\
  \n*// 我们不需要显式调用 save()，因为当事务结束时，*\n\n*// 对托管实体的更新会自动持久化变更。*\n\n}\n\n}\n\n首先，请注意我们使用了自定义异常\
  \ `NotFoundException`。这样做的目的是，通过 `@ResponseStatus` 注解，我们可以轻松地将异常条件映射到特定的 HTTP 状态码（本例中为\
  \ 404，即“未找到”异常）。\n\n在 `DocumentController` 中，我们首先看到的是使用了 `@RestController` 而非 `@Controller`。这意味着方法不会返回视图映射（如\
  \ `@Controller` 那样）——方法返回的是我们想要渲染给客户端的实际对象，如果没有 HTTP 响应体，则返回 `void`。\n\n接下来，我们看到声明了一个注入的值\
  \ `DocumentRepository`。\n\n之后，我们看到 `loadDocument()` 方法，它处理了 `Optional<Document>`\
  \ 的使用，以便在值不存在时抛出 `NotFoundException`。JPA 本身处理此类异常相当简单，但 Spring Data 必须考虑到可能使用其他数据机制的情况。\n\
  \n如果我们不关心特定的错误处理（即响应状态的分配以及自定义消息），我们可以使用 `return dao.findById(id).orElseThrow(()\
  \ -> new NotFoundException(id))`，这最终会导致异常被映射为 HTTP 服务器错误响应；这种代码比我们目前所做的异常映射方式要笨拙一些。\n\
  \n第 10 章 暴露 REST API\n\n我们希望像这样进行内在的异常映射，因为“未找到”与“服务器错误”是不同的。\n\n然后我们进入方法本身的实际映射。对于通过\
  \ HTTP GET 和其他与路径相关的动词访问的方法，我们使用 `@PathVariable`——因此，我们可以通过 Web 使用诸如 `http://localhost:8080/documents/1`\
  \ 这样的 URL 来调用 `get(Integer)` 方法，以访问 `id` 为 1 的 `Document`。与 `@Controller` 一样，`@PathVariable`\
  \ 是从 URL 路径中推断出来的。如果匹配，变量名会映射到路径中的 `{id}`；如果参数名与 URL 路径中的名称不同，我们可以通过注解来指定具体的映射方式。\n\
  \n所有 HTTP 方法不仅使用了适当的请求注解，还使用了 `@Transactional` 注解，这意味着我们为操作建立了屏障，使其变得“安全”——如果数据库在更新记录时出现问题，将会抛出异常，并且更新操作会被妥善丢弃，而不会使数据库处于损坏状态。我们的数据模型过于简单，不会出现真正的事务问题，但这仍然是一个良好的实践.3。\n\
  \n我们还有另一个 GET 方法，只是这次没有使用 `/{id}` 路径变量；这是 REST 建议的检索*集合*的方式，在本例中，即我们正在管理的所有 `Document`\
  \ 对象的集合。\n\n其他方法实际上相当直接：`post()` 根据发送的 HTTP 请求体（当然是通过 HTTP POST）创建一个新的 `Document`；`delete()`\
  \ 加载一个现有的文档（如果 id 不存在则抛出 HTTP“未找到”响应），然后删除该实体。我们确实丢弃了文档引用，但如果你愿意，可以用它来报告实体已被删除；由于它未被使用，如果你感兴趣，可以直接移除该引用。\n\
  \n\n\n`put()` 方法稍微有趣一些；它是我们*修改*现有 Document 的方式。它从 URL 中获取 id，*并且*包含请求体内容。然后它加载该\
  \ Document（同样，如果数据库中不存在该文档，则抛出“未找到”异常），并检查加载的文档 id 是否与“更新后的文档”id 匹配，如果不匹配则抛出异常。\n\
  \n接着，它将“更新后的文档”中的数据复制到从数据库加载的实体中。当方法结束（并且事务提交）时，数据库将包含*新*的值，而不是旧的值。\n\n3 如果你感到疑惑，是的，在一个本应将所有事务委托给服务类的类中使用\
  \ @Transactional 作为“良好实践”是有点讽刺意味的。\n\n第 10 章 暴露 REST API\n\n这一切都很好，如果我们想要的话，我们有一个“正在运行的应用程序”——但让我们先构建一个测试。\n\
