  \ set 方法，这样我们就能在安全地避免 SQL 注入的同时，充分利用 `JDBCTemplate` 提供的所有便捷功能。\n\n`JDBCTemplate`\
  \ 暴露了*大量*功能。然而，我们不打算深入探讨它们，因为通常你最好使用对象关系映射器，或者更好的选择是 Spring Data。\n\n**整合所有内容**\n\
