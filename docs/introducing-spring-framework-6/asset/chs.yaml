  \n}\n\n);\n\n};\n\n}\n\n@Bean\n\nCommandLineRunner summarize(DocumentRepository\
  \ dao) {\n\n**return** args->{\n\nThread.sleep(2000);\n\n**for**(var document:dao.findAll())\
  \ {\n\nSystem.out.println(document);\n\n}\n\n};\n\n}\n\n}\n\n我们可以使用 `gradle :chapter09:run`\
  \ 运行它，它会输出一系列关于接收（和存储）文档的消息，然后显示存储在数据库中的文档，以便我们验证已通过代理发送（和接收）消息。\n\n那么，我们从这段代码中看到了什么？\n\
  \n1.  我们看到了如何为在 Spring 6 中使用异步处理设置依赖关系，重点介绍了 JMS。使用不同的 API 只需更改特定的注解和依赖关系，但*模式*是相同的。如果代理尚未运行，系统会为我们启动一个，这种情况非常适合开发，因为这意味着开发人员无需经历设置代理的过程。\n\
  \n2.  我们看到了如何创建监听目标（destinations）的监听器。\n\n第 9 章 将 Spring 应用程序与外部系统集成\n\n3.  我们看到了如何创建可以向目标*发布*消息的组件。\n\
  \n4.  我们看到了如何使用发布组件向这些目标写入数据，该类可作为批量数据上传的模板。\n\n**总结**\n\n本章是对在 Spring 中使用异步消息传递\
  \ API 的快速介绍，利用了 Artemis 消息代理中的 JMS 集成，特别是为了展示通过数据访问对象异步保存数据的能力。\n\nSpring 还提供了其他消息传递\
  \ API，其工作方式与 JMS 集成类似，但我们仅仅触及了整个架构方法的皮毛，这种方法在可扩展性方面具有惊人的潜力。\n\n在下一章中，我们将再次转换方向，重新审视\
  \ Web，通过向数据访问对象暴露 REST 功能来实现。\n\n**第 10 章**\n\n**暴露 REST API**\n\n在上一章中，我们了解了如何使用\
  \ Spring 中的异步消息传递 API，使用 `JmsTemplate` 发送消息，并使用 `@JmsReceiver` 注解*接收*消息。现在，我们将回到\
  \ Web 领域，构建一组端点，通过 REST 将我们的数据模型暴露给富客户端。\n\n**什么是 REST？**\n\nREST 代表“表述性状态转移”（REpresentational\
  \ State Transfer），通常指符合通过 URL 直接访问资源的粗略定义的 API。它由 Roy Fielding 博士在一篇相当著名的论文中定义。1\n\
  \n通常，REST 断言模型中的每个*事物*都可以通过 URL 表示，并且可以使用 HTTP 动词与这些事物进行交互。例如，要获取 id 为 1 的 Document，可以使用\
  \ HTTP GET 访问 URL [`yourhost.com/documents/1`](http://yourhost.com/documents/1)。要访问*所有*文档，你可以*获取*\
  \ [`yourhost.com/documents`](http://yourhost.com/documents) – 注意缺少标识符。还要注意，文档以复数形式引用；你不是在访问*一个文档*，而是在访问一个*文档集合*中的一个。\n\
  \n要创建一个 Document，可以使用 POST 到 [`yourhost.com/documents`](http://yourhost.com/documents)\
  \ – 由于你正在创建一个新的 Document，你没有 id 值，因此你将新值发布到文档集合。\n\n1 Fielding 博士的论文可以在 [www.ics.uci.edu/~fielding/pubs/dissertation/top.htm](http://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm)\
  \ 找到，非常值得一读。\n\n© Felipe Gutierrez, Joseph B. Ottinger 2022\n\nF. Gutierrez and\
  \ J. B. Ottinger, *Introducing Spring Framework 6*[, https://doi.org/10.1007/978-1-4842-8637-1_10](https://doi.org/10.1007/978-1-4842-8637-1_10#DOI)\n\
  \n第 10 章 暴露 REST API\n\n要*更新*一个文档，你可以使用 HTTP PUT（或者可能是 PATCH，但根据我的经验通常是 PUT）；我也见过使用\
  \ POST 来实现此目的，但这并不推荐（因为它为特定应用程序重载了 POST 的用途）。2\n\n要*删除*一个文档，则使用 HTTP DELETE 动词，再次访问特定资源，例如对于\
  \ id 为 1 的 Document，访问 [`yourhost.com/documents/1`](http://yourhost.com/documents/1)。\n\
  \n**在 Spring 中构建 REST API**\n\n在 Spring 中，我们可以使用 `@Controller` 注解创建一个控制器，但 `@Controller`\
  \ 意味着 HTTP 方法返回一个*路由*——指向像 Thymeleaf 或类似模板引擎。在 REST 中，控制器渲染的是*数据*，而不是*页面*——通常来说，它是为机器消费而非人类消费而设计的。\n\
  \n因此，Spring 还为我们提供了 `@RestController` 注解，它将 HTTP 方法标记为将对象模型渲染为响应体，而不是返回一个由渲染器负责的路由引用。\n\
  \n我们从方法中返回数据本身，而不是返回带有填充的 `Model` 的路由引用。\n\n这也意味着，要创建一个面向最终用户的 API，必须使用……某种东西来构建渲染引擎。通常，富客户端是使用\
  \ JavaScript 构建的，使用 React 或 Angular（或任何其他此类框架），然后该富客户端调用我们的 REST\n\n\n\n获取所需数据的端点。\n\
  \n**注意** JavaScript 不在本书的讨论范围之内，构建一个功能丰富的客户端本身值得用一本书来阐述；本书并非为此而写！我们将在此处专注于 Spring，但\
