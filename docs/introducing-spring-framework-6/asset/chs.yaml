  \ `SearchEngine`，接着调用 `searchAll()` 方法并检查其输出，以验证它是否符合我们的预期。\n\n但是，如何在真实的 Web 上使用\
  \ `SearchController` 呢？让我们来看看。\n\n**Thymeleaf**\n\nThymeleaf 是一个模板渲染库。其总体概念是，你提供一个模板（例如，一个普通的\
  \ HTML 页面）和一个模型，Thymeleaf 将根据你的指示，使用命名空间标签替换模板中的内容。\n\n**注意** 我们在 XML 配置中已经见过命名空间的使用：例如，像\
  \ `<context:property-placeholder />` 这样的标签。命名空间允许我们通过指定名称的来源来重用名称；对于 `property-placeholder`，它来自\
  \ `context` 命名空间。\n\nThymeleaf 模板（当它们是 HTML 时）的一个优点是，它们实际上是有效的 HTML；在使用 Thymeleaf\
  \ 渲染模板之前，Thymeleaf 特有的部分不会产生影响。因此，你可以先将 HTML 页面设计为静态页面，直到它看起来符合你的需求，然后根据需要将内容替换为\
  \ Thymeleaf。\n\n此外，在 Spring 中，Thymeleaf 的集成已经为国际化做好了充分准备。Spring 会自动为我们加载一个名为 `messages`\
  \ 的属性包，因此我们无需弄清楚某个资源的位置，从而可以非常轻松地使用国际化文本。\n\n一个名为 `search/all` 的模板默认位于类路径下的 `templates`\
  \ 目录中，因此对于我们的 Thymeleaf 模板，我们需要在类路径的 `templates/search/all.html` 位置有一个资源。我们需要为此创建\
  \ `src/main/resources/templates/search` 目录。\n\n***清单 8-5.*** chapter08/src/main/resources/templates/search/all.html\n\
  \n<!DOCTYPE html>\n\n**<html xmlns:th**=\"http://www.thymeleaf.org\"\n\nth:with=\"\
