  \n**JDBCTemplate**\n\nSpring 文档将 JDBCTemplate 描述为“JDBC 核心包中的核心类”。它提供了许多方法，以简化对由\
  \ Connection 启用的操作的访问，例如通过 PreparedStatement 执行 SQL。它管理对数据库连接的访问，提供隐式的异常转换以简化异常的声明和处理\
  \ 6，并且还提供了将数据库信息映射到 Java 类的简便方法，尽管其映射级别通常不如 Hibernate 这样的对象关系映射器。\n\n**注意** Spring\
  \ 也提供了*多种*简便方法来利用 Hibernate 和其他对象关系映射器。最方便的方式是通过 Spring Data，我们将在后续章节中介绍。\n\n如果你不打算使用\
  \ Spring Data——老实说，你应该使用它，因为它为你的代码提供了极佳的控制和自由度——那么你需要花些时间掌握 JDBCTemplate。幸运的是，它是一个简单的类（尽管方法列表庞大），掌握起来相当容易。\n\
  \n让我们看看更多的源代码，并最终让我们的文档管理器支持数据库。\n\n6 JDBCTemplate 将常见的 SQLException 实例转换为反映实际错误的特定异常类型，而不是使用通用异常。例如，你不会收到错误代码为\
  \ 42101 的 SQLException，而是会收到 BadSqlGrammarException——该代码是 H2 针对错误 SQL 语法的错误代码之一。\n\
