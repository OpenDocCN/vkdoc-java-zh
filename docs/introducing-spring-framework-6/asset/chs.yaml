  \n本章涵盖了几个不同的主题：首先是电子邮件，我们使用`JavaMailSender`通过 Spring*发送*邮件；我们还了解了如何直接使用 JavaMail\
  \ API*读取*电子邮件。\n\n之后，我们探讨了 Spring 中的调度服务，结合邮件发送器，例如，可以根据需要从应用程序中定期发送定时邮件。\n\n在下一章中，我们将探讨如何使用动态语言为\
  \ Spring 应用程序提供功能。\n\n**第 12 章**\n\n**使用动态**\n\n**语言**\n\n在第[11](https://doi.org/10.1007/978-1-4842-8637-1_11)章中，我们了解了如何使用\
  \ Spring 内置的邮件发送类来发送电子邮件。在本章中，我们将探讨另一个完全不同的领域，即 Spring 将实际的脚本语言直接作为 Spring 组件来利用的能力。\n\
  \n我们将主要关注 Groovy，但也包含了 Beanshell 和 JRuby 的支持；只是它们不太可能很好地融入大多数开发者的范式。\n\n同样值得指出的是，在此上下文中，脚本指的是*实际的脚本*，而不是那些*可以被脚本化*的语言的编译版本。例如，Groovy\
  \ 可以编译成 Java 字节码，也可以作为字面脚本运行。\n\n如果你要编译成 Java 字节码，那么没有什么特别需要做的；你可以用`@Component`或`@Service`（或任何重要的构造型）注解这些类，然后让\
  \ Spring 从类路径加载这些类，就像使用 Java 一样。实际上，我们在第[1 章](https://doi.org/10.1007/978-1-4842-8637-1_1)中就已经看到了这一点，当时用的是\
  \ Kotlin。\n\n话虽如此，我们仍然可以利用 JSR 2231 来解释来自不同*位置*的各种语言源文件。\n\n\n\n1 JSR-223 即“Java\
  \ 平台脚本化”，其规范可在[www.jcp.org/en/jsr/](http://www.jcp.org/en/jsr/detail?id=223;) 找到，[detail?id=223;](http://www.jcp.org/en/jsr/detail?id=223;)\
  \ 它涵盖了通用脚本引擎的规范，常用于将 JavaScript 或 Groovy 加载到 Java 运行时中。\n\n© Felipe Gutierrez, Joseph\
  \ B. Ottinger 2022\n\nF. Gutierrez 和 J. B. Ottinger 著，*《Spring Framework 6 入门》*[,\
  \ https://doi.org/10.1007/978-1-4842-8637-1_12](https://doi.org/10.1007/978-1-4842-8637-1_12#DOI)\n\
  \n第 12 章 使用动态语言\n\n**使用 Groovy 动态加载功能**\n\n我们的 `build.gradle` 文件一直是用一种名为“Groovy”的语言编写的，2\
  \ 或它最初被设计为 JVM 的一种动态语言，在很多方面与 Ruby 大致相似。与 Kotlin 一样，它在语义上与 Java 非常相似，但语法比 Java 更简洁。\n\
  \n这可能是好事，也可能不是；最终，Groovy 仍然相当可行，但根据 TIOBE 指数.3，它不如 Kotlin 流行。\n\n我们要做的事情很简单：我们将构建一个\
  \ `MessageService` 接口，该接口定义一个简单的 `getMessage()` 访问器，非常类似于第 [1](https://doi.org/10.1007/978-1-4842-8637-1_1)\
  \ 章的“Hello World”功能。然后，我们将以三种不同的方式实现它，全部使用 Groovy 创建我们的 Spring Bean。\n\n用动态语言实现的此类组件存在一些限制。\n\
  \n当我们使用预编译代码时，可以通过构造函数为 Bean 指定要提供的值。当我们使用动态语言时，可以指定*属性*，但不能指定*构造函数参数*。\n\n我们在配置方面也受到一定限制，只能使用\
  \ XML。毕竟，动态脚本的 Java 配置只会使用 JSR-223 的 `ScriptEngine` 来加载类并将类型强制转换为 JVM 可以使用的类型，这将涉及大量样板代码。这是可行的，但并没有太多指导意义；如果你想要动态解析，可以将部分配置隔离到一个\
  \ XML 文件中（正如我们在本章中所做的那样），然后将 XML 配置与 Java 配置混合使用，从而两全其美。\n\n话虽如此，让我们开始吧。首先，像往常一样，我们先看看构建文件。\n\
  \n这是一个非常简单的构建配置，它与我们大多数配置的唯一区别在于引入了 Groovy。\n\n***清单 12-1.*** chapter12/build.gradle\n\
