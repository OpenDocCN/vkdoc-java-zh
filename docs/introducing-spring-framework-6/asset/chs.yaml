  **总结**\n\n在本章中，您了解了如何创建一个简单的 Spring “Hello World” 应用程序并运行它。您还学习了 Spring 如何使用依赖注入来创建所有依赖关系以及类之间的协作。通过这个简单的示例，您看到创建什么实现并不重要；只要遵循接口，Spring\
  \ 就会注入其实现，并在您需要时准备好。\n\n您对 Spring Boot 有了初步了解，这是 Spring 团队的一个项目，将在后续章节中介绍。在此过程中，我们了解到\
  \ Kotlin 可以像 Java 一样轻松地使用 Spring。\n\n后续章节将更详细地介绍 Spring 框架、其特性及其扩展。您将了解它们如何协同工作，以及如何在日常开发中使用它们。\n\
  \n**第 2 章**\n\n**使用类**\n\n**和依赖关系**\n\n在本章中，我们将看到一个应用程序的雏形，它可以帮助我们维护对文档的引用。首先，我们将讨论我们要实现的目标，然后创建能够帮助我们跟踪文档的类；接着，我们将在直接的\
  \ Java 测试中*使用*这些类，最后，我们将创建一个与 Spring 等效的版本，以展示该框架的更多功能。\n\n**“我的文档”应用程序**\n\n我们的应用程序暂定名为“我的文档”（因为“Bob”这个名字已经被占用了），它是一个简单的界面，我们最终将能够添加各种类型的文档——URL、Word\
  \ 文档、PDF——以便将来检索。\n\n\n\n我们对设计的基本要求包括以下要素：\n\n1. 用户身份验证（用户名、密码）。\n\n2. 能够添加、移除、删除、编辑项目/文档，例如：\n\
  \n   a. Microsoft Office、Apple、Open Documents 以及 PDF 文件\n\n   b. 笔记（文本笔记，限制为 255\
  \ 个字符）\n\n   c. 网站链接（URL）\n\n3. 每个项目/文档可以设为私有或公开。\n\n   a. 私有：项目/文档的所有者可以查看。\n\n\
  \   b. 公开：所有人都可以查看该文档。\n\n© Felipe Gutierrez, Joseph B. Ottinger 2022\n\nF. Gutierrez\
  \ 和 J. B. Ottinger，*《Spring Framework 6 入门》*[, https://doi.org/10.1007/978-1-4842-8637-1_2](https://doi.org/10.1007/978-1-4842-8637-1_2#DOI)\n\
  \n第 2 章 使用类与依赖关系\n\n4. 可通过关键字、名称、类型、内容、标签和类别进行搜索。\n\n5. 可按类别进行组织。\n\n6. 每个项目/文档可通过电子邮件或外部消息系统发送。\n\
  \n然而，我们不会在*本章*中实现所有这些功能——本章将通过创建一个允许我们按类型检索文档的 `SearchEngine`，来介绍系统设计的初步内容。\n\n\
  我们将在整本书中不断扩展应用程序设计，逐步添加功能，直到满足所有需求。\n\n审视我们的需求，在本章的范围内，有三个实体尤为突出：\n\n1. 文档（Document）\n\
  \n2. 文档类型（Document type，我们将限制为几种不同类型，使其成为 Java 枚举类型的候选）\n\n3. 搜索引擎（Search engine）\n\
  \n严格来说，我们并没有真正的 `SearchEngine`；我们有的是一个 `StorageEngine`，但在这里我们将使用 `SearchEngine`，因为我们尚未准备好添加动态存储。\n\
