  \ 12 行代码，而这些代码对我们理解数据模型毫无帮助。鉴于这些值是 final 的，我们以牺牲冗长性为代价，并没有损失任何功能。\n\n我们现在可以开始研究实际的数据库了。\n\
  \n**选择数据库**\n\n\n\n关系型数据库有很多选择；我们**唯一**的限制是是否存在对应的 JDBC 驱动程序，而几乎没有（如果有的话）关系型数据库缺少\
  \ JDBC 驱动程序。\n\n可选数据库包括 Oracle DB、MySQL、SQL Server、PostgreSQL、DB2 和 SQLite——这还远非完整列表。实际上，我们将使用一个*不在*这个列表中的数据库，名为\
  \ H2。\n\n2 我们一直提到*关系型*数据库，是因为本章聚焦于使用 SQL 的数据库。它们是该领域最常见的数据库类型，但也存在其他非 SQL 数据库；我们将在下一章提及其中一些，但本章仍将重点讨论关系型数据库，因为当人们提到“数据库”时，通常指的就是关系型数据库。\n\
  \n第 6 章 为 Spring 应用添加简单持久化\n\n[H2 (www.h2database.com/) 是一个](http://www.h2database.com/)开源数据库引擎，设计用于嵌入\
  \ JVM 中（尽管它也可以像大多数其他关系型数据库一样作为独立服务器进程运行）。偏好其他数据库并无问题，但请注意，本章中的 SQL 语句*略微*偏向于 H2。\n\
  \n正如我们将看到的，Spring 本身也鼓励使用 H2，并支持将其用于测试目的的数据库。我们将在清单 6-4 中看到其实际应用。\n\n**设置 JDBC 连接**\n\
  \nJava 使用 DriverManager 的概念来控制数据库连接。通常，需要注册一个 JDBC 驱动程序（通过将其放入 JVM 类路径，因为 Java 具有\
  \ JDBC 驱动程序的发现机制），并通过指定数据库的 JDBC URL 以及用户名和密码来请求数据库连接。\n\n**注意** 您可以通过 Java 教程了解\
  \ JDBC 的基础知识。请参阅 [`docs.oracle.com/javase/tutorial/jdbc/basics/`](https://docs.oracle.com/javase/tutorial/jdbc/basics/index.html)\
