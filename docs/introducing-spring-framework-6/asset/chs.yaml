  \nDocument document=**new** Document();\n\ndocument.setId(rs.getInt(\"id\"));\n\n\
  document.setLocation(rs.getString(\"location\"));\n\ndocument.setType(DocumentType.valueOf(rs.getString(\"\
  type\")));\n\ndocument.setName(rs.getString(\"name\"));\n\n**return** document;\n\
  \n}\n\n}\n\n第六章 为 Spring 应用添加简单的持久化功能 它只有一个方法（mapRow），本可以用 lambda 表达式实现，但那只是\n\n\
  \n\n对于这个用例来说，这是一个糟糕的选择，因为我们很可能需要在多个地方映射行。\n\n例如，`DocumentMapper` 可用于从 SQL 中映射特定查询的单行，但也可用于映射大量行；因此，我们最好为它创建一个类；它是一个函数式接口，因此我们**可以**用\
  \ lambda 描述该操作，但 lambda 会带来我们希望避免的性能和垃圾回收问题。7\n\n`DocumentJDBCDAO` 中最后一个方法很有趣，因为它使用了一个\
