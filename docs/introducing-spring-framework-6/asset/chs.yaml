  \ {\n\n**return** \"hello world, man\";\n\n}\n\n}\n\n这个类的内容不多：它存在的意义是为 `@ContextConfiguration`\
  \ 提供一个位置（以指定要加载哪个上下文文件），它包含了 `@Test` 注解以强制 TestNG 将其评估为测试（因为它本身没有测试方法），并且它实现了 `getExpectedMessage()`\
  \ 方法，该方法返回我们期望的消息，作为一个常量。运行此测试将执行 `BaseMessageTest` 中的测试，并验证 `gmessage.groovy` 脚本确实以地道的\
  \ Groovy 语言返回了一条内容为 \"hello world, man\" 的消息.4。\n\n那么，我们在这里看到了什么？不多——除了我们在运行时动态加载了\
  \ `gmessage.groovy`。它的行为是固定的，所以我们除了加载它之外并没有做太多事情；这已经足够了，但我们还可以做更多。\n\n4 我一直在克制自己，避免在本章中使用大量\
  \ 1970 年代的说话方式和词汇，这是我所知的唯一一次破戒。写这一章时，我还想穿着喇叭裤，但我妻子说我没有。她把它们烧了。\n\n第十二章 使用动态语言\n\n\
  **使用 Spring 配置动态 MessageService**\n\n让我们尝试配置通过脚本加载的 Spring Bean。首先，我们来看一下 `cgmessage.groovy`——代表“可配置的\
  \ Groovy 消息”。\n\n***清单 12-7.*** chapter12/src/test/resources/scripts/cgmessage.groovy\
  \ **import** md.MessageService\n\n*// 我们不需要 getMessage() 方法，因为默认情况下它是一个 Groovy 访问器。*\n\
  \n**class** cgmessage **implements** MessageService {\n\nString message\n\n}\n\n\
  这个单行类大致相当于一个看起来像这样的 Java 类，只是多了一些样板方法：\n\n**import md**. **MessageService**;\n\n\
  **class** cgmessage **implements** MessageService {\n\nString message;\n\n**public**\
  \ void setMessage(String message) {\n\n**this**.message=message;\n\n}\n\n**public**\
  \ String getMessage() {\n\n**return** message;\n\n}\n\n}\n\n当然，我们也可以动态加载 `cgmessage`，如果它能为我们做更多事情，那将非常方便。配置它看起来就像人们期望的\
  \ Bean 配置一样：\n\n\n\n***清单 12-8.*** chapter12/src/test/resources/property-context.xml\n\
  \n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n< **beans**\n\n第 12 章 使用动态语言\n\n\
  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\nhttp://www.springframework.org/schema/beans/spring-beans.xsd\n\
  \nhttp://www.springframework.org/schema/lang\n\nhttp://www.springframework.org/schema/lang/spring-lang.xsd\"\
  >\n\n< **lang:groovy** name=\"c.g.message\"\n\nscript-source=\"classpath:/scripts/cgmessage.groovy\"\
  >\n\n< **lang:property** name=\"message\" ref=\"message\"/>\n\n</**lang:groovy**>\n\
  \n< **bean** name=\"message\" class=\"java.lang.String\">\n\n< **constructor-arg**\
  \ value=\"hi there\" />\n\n</**bean**>\n\n</**beans**>\n\n与我们之前的示例一样，唯一的区别在于使用了\
  \ `<lang:groovy/>` 标签来声明我们正在动态加载它，以及使用 `<lang:property />` 标签来配置它——请注意我们如何像在其他任何\
  \ Spring 配置中一样，通过 `ref` 注入对 `message` 的引用。我们也可以轻松地使用 `value`。这种脚本化 bean 的唯一真正限制是我们不能使用构造函数参数。\n\
  \n当然，我们可以向你展示配置和动态实现，但如果没有测试来验证，这并没有太大价值。与其为预期的消息值使用常量，不如从我们的 Spring 配置中加载它。\n\n\
