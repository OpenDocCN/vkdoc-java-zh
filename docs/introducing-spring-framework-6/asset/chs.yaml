  \n我们在 `EmailService` 的下一个方法 `getMessages()` 中使用了它。此方法构建一个本地的 `List<SimpleMailMessage>`，然后传入一个始终返回\
  \ `true` 的谓词——因此，它会匹配所有消息——以及一个消费者，该消费者将克隆的消息（自然使用 `cloneMessage()`）添加到内部的 `getMessages()`\
  \ 列表中，然后返回该列表。\n\n当我们查看测试类时，我们将看到更多关于如何应用 `processMessages()` 的内容，但首先我们还有最后一个实用方法\
