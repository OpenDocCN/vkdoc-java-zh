  \ 指数是编程语言流行度的一个粗略指标，可在[www.](http://www.tiobe.com/tiobe-index/) [tiobe.com/tiobe-index/](http://www.tiobe.com/tiobe-index/)\
  \ 找到——截至撰写本文时，Kotlin 排名第 29 位，Groovy 排名第 39 位，而 Java 本身稳居第 3 位。\n\n第 12 章 使用动态语言\n\
