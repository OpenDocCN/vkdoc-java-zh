  \ Spring 的异步能力之后。\n\n**Spring 中的异步任务**\n\nSpring 有多种处理任务异步调用的方法。[第 10 章](https://doi.org/10.1007/978-1-4842-8637-1_10)已经演示了通过\
  \ JMS 使用消息代理的*架构*机制（其他协议如 MQTT，甚至特定代理如 RabbitMQ 也存在类似的可能性）。然而，JVM 本身也是多线程的，Spring\
  \ 帮助我们利用这一点来实现异步调用。\n\n*一般来说*，有三种方法可以利用多线程调用。\n\n1.  你可以手动管理，就像*没有* Spring 时一样，通过创建\
  \ `ExecutorService` 引用并通过它管理调度。\n2.  你可以使用 Spring 的 `@Async` 注解，通过配置将方法标记为支持异步调用。\n\
  3.  你可以使用 Spring 调度器，基于本地时钟时间或按固定间隔调度方法调用。\n\n第 11 章 从 Spring 内部发送电子邮件\n\n\n\n在本书*涵盖*Spring\
  \ 的背景下，不使用 Spring 进行异步调用意义不大，而且 Java 教程和 Java 文档对此已有非常详尽的介绍。\n\n我们将忽略这种可能性（尽管值得注意的是，Spring\
  \ 提供了帮助您为其自身异步调度创建 `ExecutorService` 的方法，这并不困难，但也没有特别的指导意义）。\n\n`@Async` 注解虽然引人注目，但对大多数应用程序来说并非极其有用。\n\
  \n如果被 `@Async` 注解的方法不返回任何内容（即返回 void 的方法），`@Async` 会在一个独立的（可配置的）`ExecutorService`\
  \ 线程中调用它，并立即返回，而被调用的方法则由 `ExecutorService` 线程执行。\n\n如果该方法返回一个包含数据的 `Future<V>`，它*也*会在执行器服务中被调用，但该方法必须被设计为能够处理异步调用。\n\
  \n使用它并不特别困难——例如，异步方法不会返回 `List<String>`，而是返回 `Future<List<String>>`。\n\n唯一的*问题*——或许更好的写法是带引号的“问题”——在于使用\
  \ `@Async` 注解首先就需要改变我们编写底层方法的方式。我们不能仅仅说“哦，这个方法应该被异步调用”就完事了；我们至少必须使用特定的返回类型（`Future<V>`）。\n\
  \n因此，被标记为 `@Async` 的方法实际上成了一种新奇事物；您完全可以直接构建自己的 `Callable<V>` 实例并将其显式作为异步方法调用，因为这样更简单（这已经是语言和库规范的一部分），而添加\
  \ `@Async` 除了（潜在地）提供一个桥梁，让 Spring 隐式地为您配置一个 `ExecutorService` 之外，几乎没什么其他作用。\n\n\
  第三种方法 8 是使用实际的调度器在特定时间或按固定频率运行任务。我们来深入探讨一下，因为它比 `@Async` 更具通用性。\n\n**注意** 这并非暗示\
  \ `@Async` 毫无用处！它当然有自己的应用场景；它使用 Spring 配置的线程池这一特性本身就具有其力量。\n\n只是对于*大多数*用户来说，与其他选项相比，`@Async`\
  \ 的实用性有限。\n\n8 您没有忘记我们正在遍历异步调用的选项列表吧？\n\n第 11 章 在 Spring 中发送电子邮件\n\n**在 Spring 中添加调度事件**\n\
  \n对于异步调度，我们将创建一个“SystemMonitor”服务，用于指示“系统”是否正在工作。它首先会是一个接口，我们将创建两个实现，这些实现会随时间改变监视器的“工作”状态，以验证调度机制。\n\
  \n以下是接口本身：\n\n***清单 11-6.*** chapter11/src/main/java/md/SystemMonitor.java\n\n**package\
  \ md**;\n\n**public interface** SystemMonitor {\n\n**default** boolean isWorking()\
  \ {\n\n**return true**;\n\n}\n\n**default** void start() {\n\n}\n\n}\n\n我们有一个 `start()`\
  \ 方法，以便我们可以控制状态何时开始改变；默认情况下，该接口不执行任何有价值的操作。\n\n对于调度事件，我们有几种选择。\n\n1.  我们有一个*固定频率*系统；事件会定期触发，无论事件处理需要多长时间。如果某个事件耗时超过间隔时间，新事件将被调度，并且事件可能会重叠。\n\
  \n2.  我们有一个*间隔时间*系统，其中事件调度是在事件**完成**之后进行的——如果周期是 1 秒，而事件处理需要 5 秒，那么下一个事件将在处理完成后的\
  \ 1 秒后被调度。\n\n3.  我们有一个基于 cron 的特定时间系统，我们可以指定事件根据时间和日期模式触发；例如，我们可以指定事件在给定月份中每个星期一的第七小时第五分钟的第一秒触发。\n\
  \n\n\n第 11 章 从 Spring 内部发送电子邮件\n\n首先，我们将了解固定速率选项。\n\n让我们实现一个定时服务——一旦启动——它就会进行内部倒计时，直到监控器“停止工作”。\n\
  \n**注意** 在实践中，我们会在监控服务中提供一个方法，以便在指示器开始出现故障时执行*某些操作*。例如，我们可能会向运维人员发送一封警告邮件，或者尝试重启出现故障的服务。由于这只是一个示例，我们仅记录状态并继续执行。\n\
  \n以下是一个以固定速率运行倒计时的“SystemMonitor”：\n\n***代码清单 11-7.*** chapter11/src/test/java/md/FixedRateMonitorService.java\
  \ **package md**;\n\n**import org**. **slf4j**. **Logger**;\n\n**import org**. **slf4j**.\
  \ **LoggerFactory**;\n\n**import org**. **springframework**. **scheduling**. **annotation**.\
  \ **Scheduled**; **import org**. **springframework**. **stereotype**. **Service**;\n\
  \n@Service\n\n**public class** FixedRateMonitorService **implements** SystemMonitor\
  \ {\n\nboolean started = **false**;\n\nint countdown = 3;\n\nLogger logger = LoggerFactory.getLogger(**this**.getClass());\n\
  \n@Override\n\n**public** void start() {\n\nstarted = **true**;\n\n}\n\n@Override\n\
  \n**public** boolean isWorking() {\n\n*// 只要触发时间尚未过去，*\n\n*// 就表示“正在工作”*\n\n**return**\
  \ countdown > 0;\n\n}\n\n第 11 章 从 Spring 内部发送电子邮件\n\n@Scheduled(fixedRate = 1000)\n\
  \nvoid updateWorkingState() {\n\n**if** (started) {\n\ncountdown = Math.max(countdown\
  \ - 1, 0);\n\nlogger.info(\n\nString.format(\n\n\"监控服务倒计时: %d, 状态: %b\",\n\ncountdown,\n\
  \nisWorking()));\n\n}\n\n}\n\n}\n\n该类被标记为 @Service，因此 Spring 会将其纳入管理。它包含一些工作变量，用于跟踪是否已启动，以及一个倒计时计数器和一个\
  \ Logger 引用，以便我们能够在发出倒计时事件时清晰地输出这些事件。\n\nstart() 方法只是一个标志，用于指示倒计时是否应该运行；我们的测试代码可以使用它来开始倒计时，而\
  \ isWorking() 方法则简单地指示倒计时是否已经结束。\n\n接下来是重点部分：updateWorkingState() 方法。\n\n首先，注意 @Scheduled\
  \ 注解，其 fixedRate 值为 1000。这意味着该方法将每 1000 毫秒被调用一次——基本上大约每秒一次[⁹]。在方法内部，*如果* start()\
  \ 方法已被调用，我们将倒计时递减，最小值设为 0（以防服务在启动后一直处于“已启动”状态），并输出一条包含新值的日志消息。\n\n让我们来看一个验证 FixedRateMonitorService\
  \ 是否正常工作的测试。\n\n[⁹]: 定时事件的执行时间并不保证。如果我们指定 1000 毫秒，通常会很接近 1000 毫秒，但这并非实时调度器，因此你可能会看到几毫秒的偏差。\n\
