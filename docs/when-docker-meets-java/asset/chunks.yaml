  trans: '

    #### 关键 Docker 命令


    为便于说明，以下是创建镜像时通常按顺序使用的命令：


    1.  `docker build`：Docker 守护进程负责构建我们的镜像。


    2.  `docker tag`：为镜像打上特定版本的标签。


    3.  `docker push`：最后，将镜像推送到远程 Docker Hub 仓库。


    另一个应用程序可能希望使用我们的镜像来运行以下命令。在此，所有操作均由 Docker 守护进程本身完成。


    1.  `docker pull`：Docker 首先需要在本地拥有镜像才能运行我们的容器。如果在本地未找到镜像，它将从镜像仓库中获取。


    2.  `docker run`：一旦镜像可用，我们就可以使用此命令在容器内启动并运行应用程序。


    我们讨论的所有命令都由 Docker CLI 执行，而相应的操作则由 Docker 守护进程执行。


    下图直观地展示了 Docker CLI、Docker 守护进程、Docker REST API、Docker 镜像仓库和 Docker 容器之间的交互，概述了
    Docker 客户端/服务器架构以及组件间的命令和数据流。


    ![](img/625177_1_En_2_Fig1_HTML.jpg)


    Docker 架构示意图。顶部，“Docker 主机”包含“Docker 引擎”，它管理着“Docker 守护进程”。守护进程与“Docker Hub”中的“Docker
    仓库”通信，管理“Docker 镜像”和“Docker 容器”，并与“Docker REST API”交互。API 接收来自“Docker CLI”的命令。箭头表示组件之间的关系和交互。


    图 2-1


    Docker 架构


    以下是每个部分的含义：


    *   **Docker 引擎**：这是 Docker 的核心部分，包括运行时和守护进程。它是 Docker 运行和管理各种 Docker 组件的层。


    *   **Docker 守护进程 (Dockerd)**：这是一个持久运行的后台服务，负责管理 Docker 镜像、容器、网络和卷。它是 Docker 架构中承担繁重工作的部分。


    *   **Docker REST API**：Docker 守护进程暴露了一个 REST API，供 Docker 客户端用来与守护进程通信。它允许用户或其他工具以编程方式与
    Docker 守护进程交互。


    *   **Docker CLI**：这个命令行界面允许用户使用命令与 Docker 交互。当我们在 Docker CLI 中输入命令时，它会通过 Docker
    REST API 将这些命令发送给 Docker 守护进程。


    *   **Docker 镜像**：这些是用于创建 Docker 容器的只读模板。镜像定义了容器环境以及在容器内运行的应用程序。


    *   **Docker 容器**：容器是由 Docker 守护进程执行的 Docker 镜像实例。它们将应用程序与底层系统以及彼此隔离开来。


    *   **Docker 仓库**：这个存储和内容分发系统以不同的标记版本保存命名的 Docker 镜像。用户通过使用 `docker push` 和 `docker
    pull` 命令与仓库交互。Docker Hub 是由 Docker, Inc. 运营的 Docker 仓库的公共实例。


    以下是图中所示的 Docker 架构中的交互流程：


    1.  **Docker CLI** 通过 **Docker REST API** 向 **Docker 守护进程** 发送命令。


    2.  **Docker 守护进程** 随后与 **Docker 仓库** 通信，根据需要拉取或推送镜像，或者在本地管理 **Docker 镜像** 和 **Docker
    容器**。


    3.  所有这些操作都在 **Docker 引擎** 的统辖之下，它促使这些组件无缝协同工作。


    ### 了解 Docker Desktop


    适用于 macOS 和 Windows 的 Docker Desktop 是实现应用程序容器化的最快、最简洁的方式。Docker 最初发布时，主要针对 Linux，并没有对
    Windows 和 macOS 等其他系统提供官方支持。在意识到这一设计上的局限性和巨大缺陷后，Docker 团队决定做一件了不起的事——为这些系统提供官方移植版，即
    Docker Desktop。


    根据官方文档：


    > *Docker Desktop 是一款适用于 macOS 和 Windows 机器的应用程序，用于构建和共享容器化应用程序和微服务。*


    打个比方，可以将 Docker Desktop 视为容器的 IDE。由于 Windows 和 macOS 本身不支持容器，Docker Desktop 通过使用其轻量级虚拟机来弥补这一不足。在
    Windows 上，它使用 Hyper-V 或 WSL2（前者更受青睐），在 macOS 上，它使用 Hyperkit。Docker Desktop 拥有一个有用的
    GUI 来控制这些虚拟机资源。


    Docker Desktop 的优势在于其简化的安装过程，它为 Mac 和 Windows 用户提供了一个单一的软件包。该软件包包含了有效使用 Docker
    所需的基本组件。


    一个典型的 Docker Desktop 安装包含以下组件：


    *   Docker 引擎


    *   Docker CLI


    *   Docker Compose


    *   Kubernetes


    *   内容信任


    *   凭据助手


    以下是一个简化的示意图，展示了 Docker Desktop 的组件：


    *   下图从高层次概述了 Docker Desktop 环境的不同组件如何协同工作，以实现应用程序的容器化和管理。


    ![](img/625177_1_En_2_Fig2_HTML.jpg)


    示意图展示了 Docker Desktop 组件与开发工具之间的交互。用户通过 GUI 与 Docker Desktop 交互，GUI 提供 UI 控件并管理
    Docker 引擎。Kubernetes、Docker Compose 和 Docker CLI 等开发工具编排容器并与 Docker 引擎通信。主机管理容器和镜像，提供资源并与
    Docker 引擎交互。箭头表示组件之间命令、脚本和文件的流动。


    图 2-2


    Docker Desktop 组件


    *   图中央部分是 Docker Desktop 本身，它直接作为用户界面工作。用户可以通过 Kubernetes 清单、Docker Compose 文件、命令和脚本与
    Docker Desktop 交互。


    *   然后，Docker Desktop 与保存容器和镜像的主机交互，这些容器和镜像由 Docker 引擎负责管理。Docker 的核心元素是 Docker
    引擎，它负责编排容器并提供必要的资源。


    *   此图进一步展示了作为 Docker Desktop 一部分的几个开发工具，包括 Kubernetes、Docker Compose 和 Docker
    CLI。这些工具与 Docker Desktop 融合，提供额外的功能和能力。


    现在，让我们探讨一下 Docker Desktop 提供的一些关键特性。


    ### Docker Desktop 特性


    以下是 Docker Desktop 的一些关键特性：


    *   简化的应用程序容器化和共享


    *   能够扫描镜像以发现潜在漏洞


    *   用于管理 Docker 组件的用户友好界面


    *   Docker Desktop 支持多种系统架构，包括 Apple M1、ARM 和 Windows


    *   引入 [Dev Environments](https://www.docker.com/blog/tech-preview-docker-dev-environments/)
    以创建一致且可重现的开发环境


    *   内置对 Kubernetes 的支持，能够使用 Docker Desktop 创建功能性的单节点 Kubernetes 集群


    *   通过由 [Docker 扩展](https://www.docker.com/blog/docker-extensions-discover-build-integrate-new-tools-into-docker-desktop/)
    驱动的第三方工具实现可扩展性


    *   使用 WSL2 在 Windows 上原生支持运行 Linux

    '
- fmt: '### Docker Desktop in Action


    Docker Desktop enhances the functionality of the underlying open source Docker
    components by offering user-friendly maintenance, monitoring, and upgrade features.
    It delivers a uniform user experience across various operating systems. With Docker
    Desktop, team collaboration is streamlined through Docker Dev Environments, enabling
    one-click sharing via Git or Docker Hub. It boasts a straightforward graphical
    interface for common tasks such as:


    *   **Initiating a container**


    You can start a new container with Docker Desktop that is based on a Docker image
    of your choice. You can choose the image and then optionally set settings for
    port mapping, environment variables, and volumes. It then launches the container
    in one click. This simplifies the process of spinning up new containerized applications,
    so users new to Docker can start easily.


    *   **Pausing and restarting a container**


    Docker Desktop offers a graphical user interface to pause and resume running containers.
    Pausing a container suspends its execution, allowing you to temporarily stop the
    container’s activity without losing its state. Restarting the paused container
    resumes its operation from the point where it was paused. This feature is useful
    for temporarily suspending a container’s activities, for example, during maintenance
    or debugging.


    *   **Stopping a container**


    The Docker Desktop interface allows you to easily stop running containers. It
    stops a container gently and closes the application or process running inside
    the container. This is useful if you have to stop a container and release the
    resources that container was using.


    *   **Configuring a local Kubernetes cluster**


    Docker Desktop provides built-in functionality to create and manage a local Kubernetes
    cluster. The user can enable and configure a single-node Kubernetes cluster directly
    from the Docker Desktop interface. This helps developers test and develop applications
    using Kubernetes without an additional separate Kubernetes setup.


    *   **Managing volumes**


    Docker Desktop allows a developer to manage the volumes by creating, inspecting,
    and mounting a volume right from the UI of the Docker Desktop. This therefore
    simplifies the process of managing persistent storage for your containerized applications
    and will thus ensure that no data is lost when the containers are stopped or removed.


    To show the capabilities of Docker Desktop, let’s try to run a pre-built image
    from Docker Hub.


    *   Look for the Docker Desktop icon on your Desktop. Double-click the Docker
    Desktop icon to launch the application.

    *   To locate images, click the search bar at the top or use the shortcut `⌘ +
    K`. To find the specific image used in this guide, search for `welcome-to-docker`.


    ![](images/625177_1_En_2_Chapter/625177_1_En_2_Figa_HTML.jpg)


    A Docker interface showing a search bar with the term `welcome-to-docker` entered.
    Below, there are tabs for Images, Containers, Volumes, Extensions, and Docs, with
    the Images tab selected, displaying 50 results. A highlighted Docker image named
    `docker/welcome-to-docker` is shown with over 1 million downloads and 16 stars.
    Options to `Pull` or `Run` the image are available.


    *   Choose **Run**.


    ![](images/625177_1_En_2_Chapter/625177_1_En_2_Figb_HTML.jpg)


    A screenshot of the Docker interface showing a search for `welcome-to-docker`
    with results under the Images tab. The interface displays options for Images,
    Containers, Volumes, Extensions, and Docs, each with a count of zero except for
    Images, which shows 50. Below, the `docker/welcome-to-docker` image is highlighted,
    with over one million downloads and a rating of 16 stars. The `Run` button is
    emphasized with a red arrow.


    *   Upon the display of **Optional settings**, enter the Host port number `8090`,
    and then click **Run**. This will map the internal port of the container to the
    host port specified and allow access to the application running in the container
    from the host machine.


    ![](images/625177_1_En_2_Chapter/625177_1_En_2_Figc_HTML.jpg)


    Docker interface for running a new container with the image `docker/welcome-to-docker:latest`.
    Optional settings include fields for container name, ports, volumes, and environment
    variables. The host port is set to `8090`, with a default container port of `80/tcp`.
    Buttons for `Cancel` and `Run` are at the bottom.


    *   Go to the Containers tab in Docker Desktop to view the container.


    ![](images/625177_1_En_2_Chapter/625177_1_En_2_Figd_HTML.jpg)


    Docker Desktop interface showing container management details. The top section
    displays CPU usage at 29.20% of 200% and memory usage at 457.53MB of 4.22GB. Below,
