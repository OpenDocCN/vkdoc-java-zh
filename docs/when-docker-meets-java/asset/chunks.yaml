- fmt: '### Key Docker Commands


    To illustrate, here are the commands in the sequence typically used to create
    an image:


    1.  `docker build`: Docker daemon is responsible for building our image.

    2.  `docker tag`: The image is tagged to a specific version.

    3.  `docker push`: Finally, the image is pushed to a remote Docker Hub registry.


    Another application might want to use our image to run the following commands.
    Here, all the action is done by the Docker daemon process itself.


    1.  `docker pull`: Docker first needs the image locally to run our containers.
    If the image is not found locally, it will get it from the image registry.

    2.  `docker run`: Once the image is available, we can use this command to start
    and run the application inside a container.


    The Docker CLI executes all the commands we discussed, while the Docker daemon
    performs the corresponding actions.


    The following diagram visually represents the interaction between the Docker CLI,
    Docker Daemon, Docker REST API, Docker Image Registry, and Docker Containers,
    providing an overview of the Docker client/server architecture and the flow of
    commands and data between the components.


    ![](images/625177_1_En_2_Chapter/625177_1_En_2_Fig1_HTML.jpg)


    Diagram illustrating Docker architecture. At the top, "Docker Host" contains "Docker
    Engine," which manages the "Docker Daemon." The Daemon communicates with "Docker
    Registry" in "Docker Hub," manages "Docker Images" and "Docker Containers," and
    interacts with "Docker REST API." The API receives commands from "Docker CLI."
    Arrows indicate relationships and interactions between components.


    **Figure 2-1** Docker architecture


    Here’s what each part represents:


    *   **Docker engine**: This is the core part of Docker, including the runtime
    and daemon process. It’s the layer on which Docker runs and manages various Docker
    components.

    *   **Docker daemon (Dockerd)**: This is a persistent background service that
    manages Docker images, containers, networks, and volumes. It’s the part that does
    the heavy lifting in the Docker architecture.

    *   **Docker REST api**: The Docker daemon exposes a REST API used by the Docker
    Client to communicate with the daemon. It allows users or other tools to interact
    programmatically with the Docker daemon.

    *   **Docker cli**: This command-line interface allows users to interact with
    Docker using commands. When we type a command into the Docker CLI, it sends these
    commands to the Docker daemon via the Docker REST API.

    *   **Docker images**: These are read-only templates with instructions for creating
    Docker containers. Images define the container environment and the application
    running within the container.

    *   **Docker containers**: Containers are instances of Docker images executed
    by the Docker daemon. They isolate applications from the underlying system and
    each other.

    *   **Docker registry**: This storage and content delivery system holds named
    Docker images in different tagged versions. Users interact with a registry by
    using `docker push` and `docker pull` commands. Docker Hub is a public instance
    of a Docker registry that Docker, Inc. operates.


    Here’s the interaction flow in the Docker architecture as per the diagram:


    1.  The **Docker CLI** sends a command to the **Docker daemon** via the **Docker
    REST API**.

    2.  The **Docker daemon** then communicates with the **Docker Registry** to pull
    or push images as requested or manages **Docker Images** and **Docker Containers**
    locally.

    3.  All these operations are under the umbrella of the **Docker Engine**, which
    facilitates these components working together seamlessly.


    ### Understanding Docker Desktop


    Docker Desktop for macOS and Windows is the fastest, no-clutter way to containerize
    applications. When Docker came initially, it was targeted for Linux, and there
    was no official support for other systems like Windows and macOS. After realizing
    this limitation and huge drawback in their design, the Docker Team decided in
    something great—the official port to these systems—called Docker Desktop.


    According to the official documentation:


    > *Docker Desktop is an application for macOS and Windows machines that is used
    to build and share containerized applications and microservices.*


    When drawing analogies, one might think of Docker Desktop as an IDE for containers.
    Since Windows and macOS do not natively support containers, Docker Desktop compensates
    by using its light VM. On Windows, it uses Hyper-V or WSL2 (since the former is
    preferred), and on macOS, it uses Hyperkit. Docker Desktop has a helpful GUI that
    controls these VM resources.


    The advantage of Docker Desktop lies in its streamlined installation process,
    as it offers a single package for Mac and Windows users. This package includes
    essential components to utilize Docker effectively.


    A typical Docker Desktop installation encompasses the following components:


    *   Docker Engine

    *   Docker CLI

    *   Docker Compose

    *   Kubernetes

    *   Content Trust

    *   Credential Helper


    Here’s a simplified diagram illustrating the components of Docker Desktop:


    *   The following diagram provides a high-level overview of how the different
    components of a Docker Desktop environment work together to enable containerization
    and management of applications.


    ![](images/625177_1_En_2_Chapter/625177_1_En_2_Fig2_HTML.jpg)


    Diagram illustrating the interaction between Docker Desktop components and development
    tools. The user interacts with Docker Desktop via GUI, which provides UI controls
    and manages the Docker Engine. Development tools like Kubernetes, Docker Compose,
    and Docker CLI orchestrate containers and communicate with the Docker Engine.
    The host manages containers and images, providing resources and interacting with
    the Docker Engine. Arrows indicate the flow of commands, scripts, and files between
    components.


    **Figure 2-2** Docker Desktop components


    *   The central part of the diagram is Docker Desktop itself, which works directly
    as the user interface. Users can interact with the Docker Desktop through Kubernetes
    manifests, Docker Compose files, commands, and scripts.

    *   Then, the Docker Desktop interacts with the Host that holds the containers
    and images, which the Docker Engine is responsible for. The core element of Docker
    is the Docker Engine, which is responsible for orchestrating the containers and
    providing the necessary resources.

    *   This diagram further shows several Development Tools that are part of Docker
    Desktop, including Kubernetes, DockerCompose, and DockerCLI. These tools blend
    in with the Docker Desktop for additional functionalities and abilities.


    Now, let’s explore some of the critical features Docker Desktop provides.


    ### Docker Desktop Features


    Here are some key features of Docker Desktop:


    *   Simplified containerization and sharing of applications

    *   Ability to scan images for potential vulnerabilities

    *   User-friendly interface for managing Docker components

    *   Docker Desktop supports multiple system architectures, including Apple M1,
    ARM, and Windows

    *   Introduction of [Dev Environments](https://www.docker.com/blog/tech-preview-docker-dev-environments/)
    for creating consistent and reproducible development environments

    *   Built-in support for Kubernetes, enabling the creation of functional single-node
    Kubernetes clusters using Docker Desktop

    *   Extensibility through third-party tools powered by [Docker extensions](https://www.docker.com/blog/docker-extensions-discover-build-integrate-new-tools-into-docker-desktop/)

    *   Native support for running Linux on Windows using WSL2'
