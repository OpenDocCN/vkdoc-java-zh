    \ 是一个开源工具，旨在简化 Java 应用的容器化过程，特别是当你使用构建自动化工具 Apache Maven 时。Dockerfile-Maven 插件通过将\
    \ Docker 直接集成到 Maven 构建流程中，让你能轻松简单地将 Java 应用打包到容器中，从而使构建和维护容器（尤其是基于手动创建的 Dockerfile）变得更加容易。\n\
    \nDockerfile-Maven 插件的主要优势：\n\n*   **简化的容器化流程**：Dockerfile-Maven 插件将 Docker 无缝集成到\
    \ Maven 构建流程中，简化了为 Java 应用创建 Docker 容器的过程。\n\n*   **手动 Dockerfile 的使用**：虽然该插件不会生成\
    \ Dockerfile，但它允许你使用手动创建的 Dockerfile，让你对容器配置和依赖项拥有完全的控制权。\n\n*   **高效的 Docker\
    \ 镜像构建**：通过一个简单的 Maven 命令，你就可以高效地构建 Docker 镜像，确保容器化过程的一致性和可靠性。\n\n*   **节省开发时间**：通过在构建流程中自动化\
    \ Docker 镜像的创建，该插件减少了手动干预的需求，从而节省了开发时间和精力。\n\n*   **与 Maven 生态系统的集成**：Dockerfile-Maven\
    \ 与 Maven 生态系统无缝集成，使其成为已经使用 Maven 进行项目开发的 Java 开发者的自然之选。\n\n*   **可定制的配置**：你可以在项目的\
    \ `pom.xml` 中灵活地自定义 Docker 镜像配置，以满足特定的应用需求。\n\n```\nmvn package  # 构建 Docker 镜像\n\
    mvn deploy   # 推送 Docker 镜像\n```\n\n### 入门指南\n\n使用 Spotify 的 Docker-Maven-Plugin\
    \ 非常简单：\n\n1.  **添加插件**：在你的项目 `pom.xml` 中，将 Docker-Maven-Plugin 添加为构建插件。指定镜像名称和其他必要的配置。\n\
    \n    ```\n    com.spotify\n    dockerfile-maven-plugin\n    ${dockerfile-maven-version}\n\
    \n    default\n\n    build\n    push\n\n    spotify/foobar\n    ${project.version}\n\
    \n    ${project.build.finalName}.jar\n\n    ```\n\n    我们来分解一下这段代码的重要部分：\n   \
    \ *   `<executions>`：此块定义了插件的一系列执行。在此例中，定义了一个执行。\n\n    *   `<execution>`：指定插件内的一个执行。它可以有一个\
    \ `<id>` 和一个 `<goals>` 列表。\n\n    *   `<id>`：执行的标识符（可选）。在此例中，它被命名为 `default`。\n\
    \n    *   `<goals>`：列出在此执行中将要执行的目标。这里指定了两个目标：`build` 和 `push`。\n\n    *   `<configuration>`：此块包含特定于\
    \ `dockerfile-maven-plugin` 的配置设置。`<repository>`：指定 Docker 镜像仓库的名称。在此示例中，它被设置为\
    \ `spotify/foobar`，即 Docker 镜像将要存储的仓库名称。\n\n    *   `<tag>`：设置 Docker 镜像的标签。它使用\
    \ Maven 变量 `${project.version}` 将标签动态设置为项目的版本。\n\n    *   `<buildArgs>`：允许你为 Docker\
    \ 镜像指定构建参数。在此例中，它将 `JAR_FILE` 构建参数设置为 `${project.build.finalName}.jar`，这很可能代表了要包含在镜像中的\
    \ JAR 文件的名称。\n\n    总的来说，此配置指示 `dockerfile-maven-plugin` 使用指定的 Dockerfile 构建一个\
    \ Docker 镜像，用项目版本为其打标签，并将其推送到 `spotify/foobar` Docker 镜像仓库。\n\n2.  **构建镜像**：运行一个\
    \ Maven 构建命令，例如 `mvn package`。该插件将在构建过程中自动为你的应用创建一个 Docker 镜像。\n\n3.  **推送到仓库**：使用\
    \ `mvn deploy` 命令，你可以将生成的 Docker 镜像推送到容器仓库，例如 Docker Hub 或 Google Container Registry。这通常是作为\
    \ CI/CD 流水线的一部分，用于生产部署。\n\n![](img/625177_1_En_6_Fig4_HTML.jpg)\n\n图示说明了处理 Docker\
    \ 镜像的两步过程。第一步显示一个文档图标，带有文本 \"mvn package\" 和 \"create docker image\" 指向一个立方体，表示创建\
    \ Docker 镜像。第二步显示一个类似的文档图标，带有文本 \"mvn deploy\" 和 \"push to image repository\"\
    \ 指向一组立方体，表示部署到镜像仓库。\n\n图 6-4\n\n使用 Spotify docker maven 插件的镜像构建过程\n\n### 使用云原生构建包构建容器镜像\n\
    \n### 理解构建包\n\n自动配置彻底改变了 Spring。我们一直依赖 Spring Boot 的默认设置来简化配置并提高生产力。Spring Boot\
    \ 自动配置是一项有助于简化 Spring 应用配置的特性。它旨在通过根据项目中的依赖项自动配置 Bean、设置和组件，来最大限度地减少所需的手动配置。\n\
    \n![](img/625177_1_En_6_Fig5_HTML.jpg)\n\n流程图说明了使用 Spring Boot 构建应用的过程。它从 \"Source\
    \ Code\" 开始，到 \"Spring Boot Autoconfiguration\"，最后以 \"Application\" 结束，箭头指示了进展方向。\n\
    \n图 6-5\n\nSpring Boot 自动配置\n\n例如，当你向 Spring Boot 项目添加一个依赖项（如 `spring-boot-starter-data-jpa`）时，框架会识别到类路径中存在与\
    \ JPA 相关的类，并启用相关的自动配置类，例如 `JpaRepositoriesAutoConfiguration` 和 `DataSourceAutoConfiguration`。如果这些\
    \ Bean 没有在其他地方定义，这些类会自动配置一些 Bean，如 `DataSource`、`EntityManagerFactory` 和 `TransactionManager`。此过程由外部配置属性控制，例如\
    \ `spring.datasource.url`，开发者可以使用这些属性来自定义设置。这个流程通过应用合理的默认值来简化复杂组件的设置，同时为自定义留出空间。\n\
    \n尽管这些默认设置通常运行良好，但许多人仍将其视为魔法。一旦我们开发了应用，容器化又该如何处理呢？编写一个遵循最佳实践（最小化层数、利用构建缓存）以获得最佳容器的\
    \ Dockerfile 可能会耗费大量时间，这对开发者来说可能并不理想。云原生构建包（Cloud-Native Buildpack）应运而生。CNB 就像\
    \ Spring 的自动配置一样，简化了容器管理，使其镜像了 Spring Boot 为我们的应用带来的简洁性。\n\n![](img/625177_1_En_6_Fig6_HTML.jpg)\n\
    \n流程图说明了使用云原生构建包将源代码转换为容器的过程。顺序由箭头指示，从 \"Source Code\" 到 \"Cloud Native Buildpack\"\
    ，最后到 \"Container\"。\n\n图 6-6\n\nSpring Boot 构建包\n\n构建包的主要作用是收集构建和运行应用所需的所有基本组件。它们通常在后台运行，并将我们的源代码转换为可运行的应用程序镜像，而无需使用\
    \ Dockerfile。\n\n从 Spring Boot 2.3 开始，它使用构建包来生成顶级的 OCI 容器，配置过程毫不费力。无需担心层、安全性、JVM\
    \ 内存计算等问题。只需一个命令即可创建我们的容器化应用。\n"
- fmt: "### Cloud-Native Buildpacks Features\n\nCloud-Native Buildpacks (CNBs) offer\
    \ several features and capabilities for building and packaging containerized applications.\
    \ Here are some of the key features supported by Cloud Native Buildpacks:\n\n\
    - **Dependency management**: CNBs can automatically detect and manage application\
    \ dependencies, such as language runtimes, libraries, and packages. They ensure\
    \ that the required dependencies are included in the application container.\n\
    - **Layered build**: CNBs follow a layered approach to build containers. This\
    \ means they create separate layers for different application parts, allowing\
    \ for efficient caching and reusability during the build process.\n- **Reproducible\
    \ builds**: CNBs focus on hermetic reproducible builds. This ensures that the\
    \ same source code and same dependencies lead to identical container images, which\
    \ is highly critical in reliability and security purposes.\n- **Build cache**:\
    \ CNBs utilize a build cache in which layers that are built can be cached. This\
    \ allows a cached layer to be reused as much as possible so that the build is\
    \ not rebuilding everything.\n- **Customizable builders**: CNBs provide the flexibility\
    \ to create custom builders tailored to specific application types or organization\
    \ requirements. Custom builders can include additional buildpacks and configurations.\n\
    - **Life Cycle phases**: The CNB build process consists of different life cycle\
    \ phases, which include detection, analysis, build, and export. All these life\
    \ cycle phases can be extended or customized depending on the use case.\n- **Security\
    \ scanning**: CNBs often integrate with security scanning tools to identify and\
    \ address vulnerabilities in application dependencies, enhancing the security\
    \ of the resulting container images.\n- **Environment variable injection**: CNBs\
    \ can inject environment variables into the application container, making it easy\
    \ to configure runtime settings or connect to external services.\n- **Multi-platform\
    \ support**: CNBs support building container images for multiple platforms and\
    \ architectures, making it easier to create images that can run on different cloud\
    \ providers and device types.\n- **Compatibility**: CNBs are compatible with various\
    \ container runtimes and orchestrators, such as Docker, Kubernetes, and Cloud\
    \ Foundry, making them versatile for different deployment scenarios.\n- **Continuous\
    \ integration (CI)**: CNBs can be integrated into CI/CD pipelines to automate\
    \ containerization, ensuring that applications are consistently built and packaged.\
    \ For example, buildpacks project offers a collection of [GitHub actions](https://github.com/buildpacks/github-actions)\
    \ for different buildpack-related activities. One of these actions allows us to\
    \ configure a job prepared with the `pack` CLI. It’s a straightforward process,\
    \ and we can use this action with ease:\n\n```\nuses: buildpacks/github-actions/setup-pack@v4.1.0\n\
    ```\n\n### Configuring Buildpack\n\nSpring Boot 2.3.0.M1 introduces native buildpack\
    \ support for both Maven and Gradle. This simplifies the process of generating\
    \ a Docker image for our application.\n\n- First, ensure we have a local Docker\
    \ installed and running. Spring Boot buildpack integration needs a running Docker\
    \ daemon. Otherwise, we get an error:\n\n```\nFailed to execute goal org.springframework.boot:spring-boot-maven-plugin:2.4.2:build-image\
    \ (default-cli) on project imagebuilder: Execution default-cli of goal org.springframework.boot:spring-boot-maven-plugin:2.4.2:build-image\
    \ failed: Connection to the Docker daemon at 'localhost' failed with error \"\
    [61] Connection refused\"; ensure the Docker daemon is running and accessible\n\
    ```\n\nIt differs from Jib in this aspect, where we don’t need a docker daemon\
    \ for building container images.\n\n- Next, create a new Spring Boot project using\
    \ [start.spring.io](http://start.spring.io).\n- For Maven, we can use the command,\
    \ and for Gradle, it’s `gradle bootBuildImage`. We can swiftly create a well-configured\
    \ image and store it in our local Docker daemon with a single command. It will\
    \ take a little time to run the first time around, but subsequent calls will be\
    \ quicker. We should see something like this in the build log:\n\n```\n[INFO]\
    \ Successfully built image 'docker.io/library/buildpack:0.0.1-SNAPSHOT'\n[INFO]\n\
    [INFO] ------------------------------------------------\n[INFO] BUILD SUCCESS\n\
    [INFO] ------------------------------------------------\n[INFO] Total time:  01:49\
    \ min\n[INFO] Finished at: 2021-02-20T01:07:08+05:30\n```\n\n- We now have an\
    \ OCI-compliant container image of our application that:\n  1. Includes necessary\
    \ middleware like the JRE.\n  2. Has specific customizations based on our application\
    \ framework (Spring Boot).\n  3. It was created in a disposable build container,\
    \ provided only with the application source code.\n  4. It is secure by default,\
    \ running as a non-root user with minimal packages installed.\n  5. It will be\
    \ named after our application and tagged with its version.\n\n- Finally, run:\n\
    \n```\ndocker run --rm -p 8080:8080 imageName\n```\n\nAnd check the output using\
    \ `http://localhost:8080/`.\n\n- By default, Buildpacks store the image on the\
    \ local Docker daemon when used with Spring Boot. Nevertheless, we can also push\
    \ our images to a remote container registry. We will need to make specific adjustments\
    \ in our Maven file to enable this functionality.\n\n```\n<plugin>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-maven-plugin</artifactId>\n    <configuration>\n\
    \        <image>\n            <name>docker.example.com/library/${project.artifactId}</name>\n\
    \            <publish>true</publish>\n        </image>\n        <docker>\n   \
    \         <publishRegistry>\n                <username>user</username>\n     \
    \           <password>secret</password>\n                <url>https://docker.example.com/v1/</url>\n\
    \                <email>user@example.com</email>\n            </publishRegistry>\n\
    \        </docker>\n    </configuration>\n</plugin>\n```\n\n## Summary\n\nThis\
    \ chapter explores container builder tools for Java applications, focusing on\
    \ Spring Boot. It covers Google Jib, Fabric8 Docker Maven Plugin, Spotify’s Docker-Maven-Plugin,\
    \ and Cloud-Native Buildpacks. All of these tools provide different means through\
    \ which Java applications are containerized, ranging from creating a Docker image\
    \ without Dockerfile using Jib and buildpack and integrating Docker image build\
    \ into the Maven build process. The chapter provides practical examples, configuration\
    \ details, and insights into the benefits of each tool. It aims to help developers\
    \ choose the right containerization method for their Java projects.\n\n# 7. Deploying\
    \ Docker Containers Using GitHub Actions\n\nContainerization is now a cornerstone\
    \ in application deployment strategies to run the software in light, consistent,\
    \ and scalable ways. Docker for Java applications makes it possible for them to\
    \ run anywhere, irrespective of differences between the underlying systems. With\
    \ GitHub Actions, developers can automate the building, testing, and deployment\
    \ of containers."
