  trans: "\n### 设置 Java 项目\n\n让我们讨论如何使用 GitHub Actions 创建 Java 应用程序构建流水线。在开始使用 GitHub\
    \ Actions 之前，请确保你在 GitHub 上有一个 Java 项目。在本示例中，我们将使用一个通过 Maven 构建的简单 Java 应用程序。\n\
    \n首先，你需要定义工作流。工作流是我们在仓库中设置的自定义自动化流程，用于在 GitHub 上构建、测试、打包或部署任何代码项目。\n\n1.  在我们的\
    \ GitHub 仓库中，导航到 `Actions` 选项卡。点击 `Java with Maven` 模板，或者自行设置一个工作流。\n\n![](img/625177_1_En_7_Fig3_HTML.jpg)\n\
    \n该图片展示了一个 GitHub Actions 设置页面，重点在于入门指南。页面包含一个导航栏，提供代码、议题和操作等选项。主体部分鼓励用户使用 GitHub\
    \ Actions 构建、测试和部署代码，并提示设置工作流。下方是仓库的推荐工作流，包括“Docker 镜像”、“使用 Maven 发布 Java 包”和“Java\
    \ with Maven”等选项，每个选项都附有简要说明和一个“配置”按钮。一个粉色箭头指向“Java with Maven”选项。\n\n图 7-3\n\n\
    设置操作\n\n1.  这将打开工作流编辑器。在这里，我们编写构建步骤。\n\n    ```\n    # 此工作流将使用 Maven 构建 Java 项目，并缓存/恢复所有依赖项以缩短工作流执行时间\n\
    \    name: Java CI with Maven\n    on:\n    push:\n    branches: [ \"main\" ]\n\
    \    pull_request:\n    branches: [ \"main\" ]\n    jobs:\n    build:\n    runs-on:\
    \ ubuntu-latest\n    steps:\n    - uses: actions/checkout@v3\n    - name: Set\
    \ up JDK 17\n    uses: actions/setup-java@v3\n    with:\n    java-version: '17'\n\
    \    distribution: 'temurin'\n    cache: maven\n    - name: Build with Maven\n\
    \    run: mvn -B package --file pom.xml\n    ```\n\n    工作流文件\n\n2.  测试是持续集成流程的关键环节。我们应该在工作流中集成测试，以确保代码质量：\n\
    \n    ```\n    - name: Test with Maven\n    run: mvn test\n    ```\n\n    此步骤在构建之后运行，并执行项目中的所有单元测试。\n\
    \n3.  构建和测试可能很耗时，这主要是由于依赖项造成的。为了加快速度，可以缓存依赖项：\n\n    ```\n    - name: Cache Maven\
    \ packages\n    uses: actions/cache@v2\n    with:\n    path: ~/.m2\n    key: ${{\
    \ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}\n    restore-keys: ${{ runner.os\
    \ }}-m2\n    ```\n\n    这会缓存 Maven 包，从而减少每次构建时获取它们的需求。\n\n4.  提交更改。这将触发工作流。\n\n\
    ![](img/625177_1_En_7_Fig4_HTML.jpg)\n\n显示两个按钮。左侧第一个按钮为深色，白色文字显示“取消更改”。右侧第二个按钮为亮绿色，白色文字显示“提交更改...”\n\
    \n图 7-4\n\n提交更改\n\n1.  工作流完成。\n\n![](img/625177_1_En_7_Fig5_HTML.jpg)\n\nGitHub\
    \ Actions 界面显示“Java CI with Maven”工作流中“Update maven.yml #2”构建成功。构建过程包括设置作业、运行\
    \ actions/checkout@v3、设置 JDK 17、使用 Maven 构建以及完成作业等步骤。每个步骤都有持续时间，整个过程耗时 39 秒。界面包含摘要、使用情况和工作流文件详情等选项。\n\
    \n图 7-5\n\n工作流完成\n\n请记住，尽管本指南描述的是一个使用 Maven 的最小化 Java 应用程序，但 GitHub Actions 仍然具有很大的灵活性。请根据不同的构建工具或部署目标的要求调整这些说明。然后充分利用自动化的力量来管理你的\
    \ Java 项目。\n\n## 使用 Docker GitHub Action 容器化 Java 应用程序\n\n让我们逐步了解如何使用 GitHub Actions\
    \ 和 Docker 容器化 Java 应用程序。\n\n### 理解流程\n\n该流程从一个用于 Java 应用程序的 Dockerfile 开始，该文件定义了环境以及构建容器镜像的指令。最后，定义\
    \ GitHub Actions 工作流，以便在每次向仓库推送更改时自动执行此流程。\n\n![](img/625177_1_En_7_Fig6_HTML.jpg)\n\
    \n流程图展示了使用 GitHub Actions 的 CI/CD 流水线。流程从“GitHub Actions”开始，接着是“构建 Docker 镜像”，然后是“Docker\
    \ 镜像构建完成”，继续“推送到 DockerHub”，最后以“DockerHub”结束。每个步骤由箭头连接，指示操作的顺序。\n\n图 7-6\n\nGitHub\
    \ Action Docker 流程\n\n### 编写 Dockerfile\n\nDockerfile 是一个包含各种命令的脚本，用于创建 Docker\
    \ 镜像。对于一个 Java 应用程序，一个典型的 Dockerfile 可能如下所示：\n\n```\n# 从 Docker Hub 使用基础 JDK 镜像\n\
    FROM openjdk:17-jdk\n# 设置容器内的工作目录\nWORKDIR /app\n# 复制 Maven 构建文件和源代码\nCOPY pom.xml\
    \ .\nCOPY src /app/src\n# 构建应用程序\nRUN mvn clean package\n# 暴露应用程序运行的端口\nEXPOSE\
    \ 8080\n# 运行 jar 文件\nCMD [\"java\", \"-jar\", \"target/myapp-1.0-SNAPSHOT.jar\"\
    ]\n```\n\n### 设置 GitHub Actions\n\nGitHub Actions 是一个自动化工具，允许我们根据事件（例如推送到仓库）运行工作流。为我们的\
    \ Java 应用程序添加 GitHub Actions 需要在仓库中创建 `.github/workflows` 目录，并在其中放置一个描述工作流的 YAML\
    \ 文件：\n\n```\nname: Java CI with Docker\non:\npush:\nbranches: [ main ]\njobs:\n\
    build:\nruns-on: ubuntu-latest\nsteps:\n- uses: actions/checkout@v2\n- name: Set\
    \ up JDK 17\nuses: actions/setup-java@v2\nwith:\njava-version: '17'\ndistribution:\
    \ 'adopt'\n- name: Build with Maven\nrun: mvn clean install\n- name: Build Docker\
    \ Image\nrun: docker build -t my-java-app .\n- name: Push Docker Image to Registry\n\
    run: |\necho ${{ secrets.DOCKER_HUB_PASSWORD }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME\
    \ }} --password-stdin\ndocker tag my-java-app ${{ secrets.DOCKER_HUB_USERNAME\
    \ }}/my-java-app:latest\n```\n\nGitHub Action Docker 工作流 YAML 文件\n\n此工作流执行以下操作：\n\
    \n**检出代码**：从主分支获取最新代码。\n\n```\n- uses: actions/checkout@v2\n```\n\n**设置 JDK**：为运行器环境配置\
    \ JDK。\n\n```\n- name: Set up JDK 17\nuses: actions/setup-java@v2\nwith:\njava-version:\
    \ '17'\ndistribution: 'adopt'\n```\n\n**使用 Maven 构建**：编译 Java 应用程序并运行所有测试。\n\n\
    ```\n- name: Build with Maven\nrun: mvn clean install\n```\n\n**构建 Docker 镜像**：使用\
    \ Dockerfile 构建 Docker 镜像。\n\n```\n- name: Build Docker Image\nrun: docker build\
    \ -t my-java-app .\n```\n\n**推送到 Docker 注册表**：镜像成功创建后，进行标记并推送到 Docker Hub。\n\n\
    ```\n- name: Push Docker Image to Registry\nrun: |\necho ${{ secrets.DOCKER_HUB_PASSWORD\
    \ }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin\ndocker\
    \ tag my-java-app ${{ secrets.DOCKER_HUB_USERNAME }}/my-java-app:latest\ndocker\
    \ push ${{ secrets.DOCKER_HUB_USERNAME }}/my-java-app:latest\n```\n\n`${{ secrets.DOCKER_HUB_USERNAME\
    \ }}` 和 `${{ secrets.DOCKER_HUB_PASSWORD }}` 是你在仓库设置中设置的 GitHub 机密，用于安全地向 Docker\
    \ 注册表进行身份验证。\n\n通过使用 GitHub Actions 和 Docker 容器化你的 Java 应用程序，你可以自动化构建和部署流程，从而提高生产力并减少人为错误的机会。这种\
    \ CI/CD 方法确保我们的开发团队可以专注于他们最擅长的事情——编写代码，而无需担心部署的复杂性。此外，Docker 的可移植性确保了 Java 应用程序可以在任何机器上运行，而不会出现“在我机器上能运行”的问题。\n"
- fmt: "# Deploying Java Application to GCP Using GitHub Action\n\nIn simple terms,\
    \ CI/CD automation essentially bridges your code repository to a live production\
    \ environment. For Java developers, application deployment to Google Cloud Platform\
    \ (GCP) just got easier using GitHub Actions and Docker. Prior knowledge of GCP\
    \ is required to proceed further.\n\n## Understanding the Workflow\n\nBefore we\
    \ dive into the deployment process, let’s understand the workflow:\n\n- **Code\
    \ commit**: Developers push code to a GitHub repository.\n- **GitHub Actions trigger**:\
    \ A push event triggers the GitHub Actions workflow.\n- **Build**: GitHub Actions\
    \ executes a workflow that builds a Docker image.\n- **Push to container registry**:\
    \ The Docker image is pushed to the Google Container Registry (GCR).\n- **Deploy\
    \ to GCP**: The image in GCR is then deployed to a GCP service like Google Kubernetes\
    \ Engine (GKE) or Google Cloud Run.\n\nHere is a diagram representing CI/CD flow\
    \ with Docker, GitHub Actions, and GCP.\n\n![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig7_HTML.jpg)\n\
    \nFlowchart illustrating a CI/CD pipeline for deploying an application to Google\
    \ Cloud Platform. The process begins with a push to the main branch, triggering\
    \ GitHub Actions. The workflow splits into two paths: one for checking out code\
    \ and setting up Docker, and the other for setting up the GCP SDK. The Docker\
    \ path includes building a Docker image and pushing it to the Google Container\
    \ Registry. Both paths converge at deploying to Google Cloud Run. Deployment success\
    \ leads to \"Application Running on GCP,\" while failure results in a \"Rollback\
    \ to Previous Version.\"\n\n**Figure 7-7** GitHub Actions with GCP\n\n## Setting\
    \ Up the Workflow\n\nTo configure this workflow:\n\n1. To deploy a Docker image\
    \ to Google Cloud Platform (GCP) using GitHub Actions, you’ll need to enable specific\
    \ GCP APIs to facilitate the integration. Navigate to GCP Console and ensure that\
    \ the following required Google Cloud APIs are enabled:\n   - Cloud Run `run.googleapis.com`\n\
    \   - Artifact Registry `artifactregistry.googleapis.com`\n\n2. Create and configure\
    \ Workload Identity Federation for GitHub ([`https://github.com/google-github-actions/auth#setting-up-workload-identity-federation`](https://github.com/google-github-actions/auth%2523setting-up-workload-identity-federation)).\n\
    \n3. Ensure the required IAM permissions are granted:\n   - Cloud Run:\n     -\
    \ `roles/run.admin`\n     - `roles/iam.serviceAccountUser` (to act as the Cloud\
    \ Run runtime service account)\n   - Artifact Registry:\n     - `roles/artifactregistry.admin`\
    \ (project or repository level)\n\n   **Note:** You should always follow the principle\
    \ of least privilege when assigning IAM roles.\n\n4. Create GitHub secrets for\
    \ `WIF_PROVIDER` and `WIF_SERVICE_ACCOUNT`.\n\n5. Change the values for the `GAR_LOCATION`,\
    \ `SERVICE`, and `REGION` environment variables.\n\nLet’s begin.\n\n**Step 1:**\
    \ Firstly, our Java application needs to be ready for deployment. This typically\
    \ involves:\n\n- Ensuring your application is thoroughly tested and stable\n-\
    \ Configuring your `pom.xml` or `build.gradle` file for a successful build\n\n\
    **Step 2:** For deploying a Java application, you may need to set up various GCP\
    \ resources such as a Compute Engine instance, App Engine, or Kubernetes Engine.\
    \ The choice depends on your application’s requirements.\n\n- **Compute Engine**:\
    \ Ideal for applications requiring custom virtual machines.\n- **App Engine**:\
    \ Suitable for applications that scale automatically.\n- **Kubernetes Engine**:\
    \ Best for containerized applications.\n- **Cloud Run**: It is a managed platform\
    \ that enables you to run stateless containers that are invocable via web requests\
    \ or Pub/Sub events.\n\n**Step 3:** Finally, we need to set up GitHub Actions\
    \ so that we automate our deployment workflow. Here’s how we can set it up:\n\n\
    - In your GitHub repository, create a `.github/workflows` directory.\n- Add a\
    \ workflow file (e.g., `deploy.yml`) in this directory.\n\n```\n- name: Google\
    \ Auth\njobs:\ndeploy:\n# Add 'id-token' with the intended permissions for workload\
    \ identity federation\npermissions:\ncontents: 'read'\nid-token: 'write'\nruns-on:\
    \ ubuntu-latest\nsteps:\n- name: Checkout\nuses: actions/checkout@v2\n- name:\
    \ Set up JDK\nuses: actions/setup-java@v2\nwith:\njava-version: '17'\nenv:\nPROJECT_ID:\
    \ YOUR_PROJECT_ID # TODO: update Google Cloud project id\nGAR_LOCATION: YOUR_GAR_LOCATION\
    \ # TODO: update Artifact Registry location\nSERVICE: YOUR_SERVICE_NAME # TODO:\
    \ update Cloud Run service name\nREGION: YOUR_SERVICE_REGION # TODO: update Cloud\
    \ Run service region\non:\npush:\nbranches: [ \"main\" ]\nname: Build and Deploy\
    \ to GCP Cloud Run\n```\n\nThis workflow does the following:\n\n- Triggers on\
    \ a push to the main branch.\n- Sets up Java environment.\n- Authenticates with\
    \ GCP using secrets.\n- Builds a Docker image and pushes it to the Google Artifact\
    \ Registry.\n- Deploys the image to Cloud Run using a GitHub Action specifically\
    \ for Cloud Run deployment.\n\n![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig8_HTML.jpg)\n\
    \nFlowchart illustrating the process of deploying a Docker container to Google\
    \ Cloud. Step 1: Authenticate to Google Cloud. Step 2: Authenticate Docker to\
    \ Artifact Registry. Step 3: Build a Docker Container. Step 4: Publish to Google\
    \ Artifact Registry. Step 5: Deploy to Cloud Run. Each step is connected by arrows\
    \ indicating the sequence.\n\n**Figure 7-8** GCP workflow\n\n**Step 4:** For security,\
    \ store sensitive information like GCP credentials as encrypted secrets in your\
    \ GitHub repository:\n\n- Go to your repository’s settings.\n- Click on “Secrets”.\n\
    \n![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig9_HTML.jpg)\n\nThe image shows\
    \ a section of a repository settings page under \"Security\" with options like\
    \ \"Code security and analysis,\" \"Deploy keys,\" and \"Secrets and variables.\"\
    \ The \"Repository secrets\" area indicates \"This repository has no secrets,\"\
    \ with a prominent green button labeled \"New repository secret.\"\n\n**Figure\
    \ 7-9** Setting up secret\n\n- Add your GCP service account key and project ID\
    \ as secrets.\n\n![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig10_HTML.jpg)\n\
    \nThe image shows a GitHub interface for adding a new secret in the \"Actions\
    \ secrets\" section. It includes fields labeled \"Name\" with placeholder text\
    \ \"YOUR_SECRET_NAME\" and \"Secret\" for entering sensitive information. A green\
    \ button labeled \"Add secret\" is at the bottom.\n\n**Figure 7-10** Creating\
    \ a secret\n\n**Step 5:** Once the workflow is configured, any push to the main\
    \ branch will trigger the deployment process. You can monitor the progress and\
    \ check logs in the “Actions” tab of your repository. Remember to regularly update\
    \ your workflow configurations to align with the evolving needs of your application\
    \ and team.\n\n# GitHub Actions Best Practices for CI/CD with Docker"
  raw: "## Deploying Java Application to GCP Using GitHub Action\n\nIn simple terms,\
    \ CI/CD automation essentially bridges your code repository to a live production\
    \ environment. For Java developers, application deployment to Google Cloud Platform\
    \ (GCP) just got easier using GitHub Actions and Docker. Prior knowledge of GCP\
    \ is required to proceed further.\n\n### Understanding the Workflow\n\nBefore\
    \ we dive into the deployment process, let’s understand the workflow:\n\n*   **Code\
    \ commit**: Developers push code to a GitHub repository.\n\n*   **GitHub Actions\
    \ trigger**: A push event triggers the GitHub Actions workflow.\n\n*   **Build**:\
    \ GitHub Actions executes a workflow that builds a Docker image.\n\n*   **Push\
    \ to container registry**: The Docker image is pushed to the Google Container\
    \ Registry (GCR).\n\n*   **Deploy to GCP**: The image in GCR is then deployed\
    \ to a GCP service like Google Kubernetes Engine (GKE) or Google Cloud run.\n\n\
    Here is a diagram representing CI/CD flow with Docker, GitHub Actions, and GCP.\n\
    \n![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig7_HTML.jpg)\n\nFlowchart illustrating\
    \ a CI/CD pipeline for deploying an application to Google Cloud Platform. The\
    \ process begins with a push to the main branch, triggering GitHub Actions. The\
    \ workflow splits into two paths: one for checking out code and setting up Docker,\
    \ and the other for setting up the GCP SDK. The Docker path includes building\
    \ a Docker image and pushing it to the Google Container Registry. Both paths converge\
    \ at deploying to Google Cloud Run. Deployment success leads to \"Application\
    \ Running on GCP,\" while failure results in a \"Rollback to Previous Version.\"\
    \n\nFigure 7-7\n\nGitHub Actions with GCP\n\n### Setting Up the Workflow\n\nTo\
    \ configure this workflow:\n\n1.  To deploy a Docker image to Google Cloud Platform\
    \ (GCP) using GitHub Actions, you’ll need to enable specific GCP APIs to facilitate\
    \ the integration. Navigate to GCP Console and ensure that the following required\
    \ Google Cloud APIs are enabled:\n    *   Cloud Run run.googleapis.com\n\n   \
    \ *   Artifact Registry artifactregistry.googleapis.com\n\n2.  Create and configure\
    \ Workload Identity Federation for GitHub ([`https://github.com/google-github-actions/auth#setting-up-workload-identity-federation`](https://github.com/google-github-actions/auth%2523setting-up-workload-identity-federation)).\n\
    \n3.  Ensure the required IAM permissions are granted:\n\n    Cloud Run\n    *\
    \   roles/run.admin\n\n    *   roles/iam.serviceAccountUser (to act as the Cloud\
    \ Run runtime service account)\n\n        Artifact Registry\n    *   roles/artifactregistry.admin\
    \ (project or repository level)\n\n        **Note** You should always follow the\
    \ principle of least privilege when assigning IAM roles.\n\n4.  Create GitHub\
    \ secrets for `WIF_PROVIDER` and `WIF_SERVICE_ACCOUNT.`\n\n5.  Change the values\
    \ for the `GAR_LOCATION`, `SERVICE`, and `REGION` environment variables.\n\nLet’s\
    \ begin.\n\n**Step 1:** Firstly, our Java application needs to be ready for deployment.\
    \ This typically involves:\n\n*   Ensuring your application is thoroughly tested\
    \ and stable\n\n*   Configuring your `pom.xml` or `build.gradle` file for a successful\
    \ build\n\n**Step 2:** For deploying a Java application, you may need to set up\
    \ various GCP resources such as a Compute Engine instance, App Engine, or Kubernetes\
    \ Engine. The choice depends on your application’s requirements.\n\n*   **Compute\
    \ engine**: Ideal for applications requiring custom virtual machines.\n\n*   **App\
    \ engine**: Suitable for applications that scale automatically.\n\n*   **Kubernetes\
    \ engine**: Best for containerized applications.\n\n*   **Cloud run**: It is a\
    \ managed platform that enables you to run stateless containers that are invocable\
    \ via web requests or Pub/Sub events.\n\n**Step 3:** Finally, we need to set up\
    \ GitHub Actions so that we automate our deployment workflow. Here’s how we can\
    \ set it up:\n\n*   In your GitHub repository, create a `.github/workflows` directory.\n\
    \n*   Add a workflow file (e.g., `deploy.yml`) in this directory.\n\n```\n- name:\
    \ Google Auth\njobs:\ndeploy:\n# Add 'id-token' with the intended permissions\
    \ for workload identity federation\npermissions:\ncontents: 'read'\nid-token:\
    \ 'write'\nruns-on: ubuntu-latest\nsteps:\n- name: Checkout\nuses: actions/checkout@v2\n\
    - name: Set up JDK\nuses: actions/setup-java@v2\nwith:\njava-version: '17'\nenv:\n\
    PROJECT_ID: YOUR_PROJECT_ID # TODO: update Google Cloud project id\nGAR_LOCATION:\
    \ YOUR_GAR_LOCATION # TODO: update Artifact Registry location\nSERVICE: YOUR_SERVICE_NAME\
    \ # TODO: update Cloud Run service name\nREGION: YOUR_SERVICE_REGION # TODO: update\
    \ Cloud Run service region\non:\npush:\nbranches: [ \"main\" ]\nname: Build and\
    \ Deploy to GCP Cloud Run\n```\n\nThis workflow does the following:\n\n*   Triggers\
    \ on a push to the main branch.\n\n*   Sets up Java environment.\n\n*   Authenticates\
    \ with GCP using secrets.\n\n*   Builds a Docker image and pushes it to the Google\
    \ artifact repository.\n\n*   Deploys the image to Cloud Run using a GitHub Action\
    \ specifically for Cloud Run deployment.\n\n![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig8_HTML.jpg)\n\
    \nFlowchart illustrating the process of deploying a Docker container to Google\
    \ Cloud. Step 1: Authenticate to Google Cloud. Step 2: Authenticate Docker to\
    \ Artifact Registry. Step 3: Build a Docker Container. Step 4: Publish to Google\
    \ Artifact Registry. Step 5: Deploy to Cloud Run. Each step is connected by arrows\
    \ indicating the sequence.\n\nFigure 7-8\n\nGCP workflow\n\n**Step 4:** For security,\
    \ store sensitive information like GCP credentials as encrypted secrets in your\
    \ GitHub repository:\n\n*   Go to your repository’s settings.\n\n*   Click on\
    \ “Secrets”.\n\n![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig9_HTML.jpg)\n\
    \nThe image shows a section of a repository settings page under \"Security\" with\
    \ options like \"Code security and analysis,\" \"Deploy keys,\" and \"Secrets\
    \ and variables.\" The \"Repository secrets\" area indicates \"This repository\
    \ has no secrets,\" with a prominent green button labeled \"New repository secret.\"\
    \n\nFigure 7-9\n\nSetting up secret\n\n*   Add your GCP service account key and\
    \ project ID as secrets.\n\n![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig10_HTML.jpg)\n\
    \nThe image shows a GitHub interface for adding a new secret in the \"Actions\
    \ secrets\" section. It includes fields labeled \"Name\" with placeholder text\
    \ \"YOUR_SECRET_NAME\" and \"Secret\" for entering sensitive information. A green\
    \ button labeled \"Add secret\" is at the bottom.\n\nFigure 7-10\n\nCreating a\
    \ secret\n\n**Step 5:** Once the workflow is configured, any push to the main\
    \ branch will trigger the deployment process. You can monitor the progress and\
    \ check logs in the “Actions” tab of your repository. Remember to regularly update\
    \ your workflow configurations to align with the evolving needs of your application\
    \ and team.\n\n## GitHub Actions Best Practices for CI/CD with Docker"
  trans: "\n## 使用 GitHub Action 将 Java 应用部署到 GCP\n\n简单来说，CI/CD 自动化本质上是在你的代码仓库和实际生产环境之间架起一座桥梁。对于\
    \ Java 开发者而言，借助 GitHub Actions 和 Docker，将应用部署到 Google Cloud Platform (GCP) 变得更加容易。继续操作前，需要具备\
    \ GCP 的相关知识。\n\n### 理解工作流程\n\n在深入部署流程之前，我们先来理解一下工作流程：\n\n*   **代码提交**：开发者将代码推送到\
    \ GitHub 仓库。\n*   **触发 GitHub Actions**：推送事件会触发 GitHub Actions 工作流程。\n*   **构建**：GitHub\
    \ Actions 执行一个工作流程来构建 Docker 镜像。\n*   **推送到容器仓库**：Docker 镜像被推送到 Google Container\
    \ Registry (GCR)。\n*   **部署到 GCP**：GCR 中的镜像随后被部署到 GCP 服务，例如 Google Kubernetes\
    \ Engine (GKE) 或 Google Cloud Run。\n\n下图展示了使用 Docker、GitHub Actions 和 GCP 的 CI/CD\
    \ 流程。\n\n![](img/625177_1_En_7_Fig7_HTML.jpg)\n\n流程图展示了将应用部署到 Google Cloud Platform\
    \ 的 CI/CD 管道。流程始于向主分支的推送，触发 GitHub Actions。工作流程分为两条路径：一条用于检出代码和设置 Docker，另一条用于设置\
    \ GCP SDK。Docker 路径包括构建 Docker 镜像并将其推送到 Google Container Registry。两条路径在部署到 Google\
    \ Cloud Run 处汇合。部署成功则进入“应用在 GCP 上运行”状态，失败则进行“回滚到上一个版本”。\n\n图 7-7\n\nGitHub Actions\
    \ 与 GCP\n\n### 设置工作流程\n\n要配置此工作流程：\n\n1.  要使用 GitHub Actions 将 Docker 镜像部署到 Google\
    \ Cloud Platform (GCP)，你需要启用特定的 GCP API 以促进集成。导航到 GCP 控制台，确保已启用以下必需的 Google Cloud\
    \ API：\n    *   Cloud Run：`run.googleapis.com`\n    *   Artifact Registry：`artifactregistry.googleapis.com`\n\
    \n2.  为 GitHub 创建并配置 Workload Identity Federation（[`https://github.com/google-github-actions/auth#setting-up-workload-identity-federation`](https://github.com/google-github-actions/auth%2523setting-up-workload-identity-federation)）。\n\
    \n3.  确保已授予所需的 IAM 权限：\n\n    Cloud Run\n    *   `roles/run.admin`\n    *   `roles/iam.serviceAccountUser`（用于充当\
    \ Cloud Run 运行时服务账号）\n\n    Artifact Registry\n    *   `roles/artifactregistry.admin`（项目或仓库级别）\n\
    \n    **注意** 在分配 IAM 角色时，应始终遵循最小权限原则。\n\n4.  为 `WIF_PROVIDER` 和 `WIF_SERVICE_ACCOUNT`\
    \ 创建 GitHub 密钥。\n\n5.  更改 `GAR_LOCATION`、`SERVICE` 和 `REGION` 环境变量的值。\n\n让我们开始吧。\n\
    \n**步骤 1：** 首先，我们的 Java 应用需要准备好进行部署。这通常包括：\n\n*   确保你的应用经过全面测试且稳定\n*   配置你的 `pom.xml`\
    \ 或 `build.gradle` 文件以成功构建\n\n**步骤 2：** 为了部署 Java 应用，你可能需要设置各种 GCP 资源，例如 Compute\
    \ Engine 实例、App Engine 或 Kubernetes Engine。选择取决于你的应用需求。\n\n*   **Compute Engine**：适用于需要自定义虚拟机的应用。\n\
    *   **App Engine**：适用于自动扩展的应用。\n*   **Kubernetes Engine**：最适合容器化应用。\n*   **Cloud\
    \ Run**：这是一个托管平台，允许你运行可通过 Web 请求或 Pub/Sub 事件调用的无状态容器。\n\n**步骤 3：** 最后，我们需要设置 GitHub\
    \ Actions 以实现部署工作流程的自动化。以下是设置方法：\n\n*   在你的 GitHub 仓库中，创建一个 `.github/workflows`\
    \ 目录。\n*   在此目录中添加一个工作流程文件（例如 `deploy.yml`）。\n\n```\n- name: Google Auth\njobs:\n\
    deploy:\n# 为工作负载身份联合添加具有预期权限的 'id-token'\npermissions:\ncontents: 'read'\nid-token:\
    \ 'write'\nruns-on: ubuntu-latest\nsteps:\n- name: Checkout\nuses: actions/checkout@v2\n\
    - name: Set up JDK\nuses: actions/setup-java@v2\nwith:\njava-version: '17'\nenv:\n\
    PROJECT_ID: YOUR_PROJECT_ID # TODO: 更新 Google Cloud 项目 ID\nGAR_LOCATION: YOUR_GAR_LOCATION\
    \ # TODO: 更新 Artifact Registry 位置\nSERVICE: YOUR_SERVICE_NAME # TODO: 更新 Cloud\
    \ Run 服务名称\nREGION: YOUR_SERVICE_REGION # TODO: 更新 Cloud Run 服务区域\non:\npush:\n\
    branches: [ \"main\" ]\nname: Build and Deploy to GCP Cloud Run\n```\n\n此工作流程执行以下操作：\n\
    \n*   在推送到主分支时触发。\n*   设置 Java 环境。\n*   使用密钥向 GCP 进行身份验证。\n*   构建 Docker 镜像并将其推送到\
    \ Google Artifact Registry。\n*   使用专门用于 Cloud Run 部署的 GitHub Action 将镜像部署到 Cloud\
    \ Run。\n\n![](img/625177_1_En_7_Fig8_HTML.jpg)\n\n流程图展示了将 Docker 容器部署到 Google\
    \ Cloud 的过程。步骤 1：向 Google Cloud 进行身份验证。步骤 2：向 Artifact Registry 进行 Docker 身份验证。步骤\
    \ 3：构建 Docker 容器。步骤 4：发布到 Google Artifact Registry。步骤 5：部署到 Cloud Run。每个步骤由箭头连接，指示顺序。\n\
    \n图 7-8\n\nGCP 工作流程\n\n**步骤 4：** 为了安全起见，将 GCP 凭据等敏感信息作为加密密钥存储在 GitHub 仓库中：\n\n\
    *   进入你的仓库设置。\n*   点击“Secrets”。\n\n![](img/625177_1_En_7_Fig9_HTML.jpg)\n\n图片显示了仓库设置页面中“Security”部分下的内容，包含“Code\
    \ security and analysis”、“Deploy keys”和“Secrets and variables”等选项。“Repository\
    \ secrets”区域显示“This repository has no secrets”，并带有一个醒目的绿色按钮“New repository secret”。\n\
    \n图 7-9\n\n设置密钥\n\n*   将你的 GCP 服务账号密钥和项目 ID 添加为密钥。\n\n![](img/625177_1_En_7_Fig10_HTML.jpg)\n\
    \n图片显示了 GitHub 中“Actions secrets”部分下添加新密钥的界面。它包含标有“Name”（占位符文本为“YOUR_SECRET_NAME”）和“Secret”（用于输入敏感信息）的字段。底部有一个绿色按钮“Add\
    \ secret”。\n\n图 7-10\n\n创建密钥\n\n**步骤 5：** 工作流程配置完成后，任何对主分支的推送都会触发部署过程。你可以在仓库的“Actions”选项卡中监控进度并查看日志。请记住定期更新你的工作流程配置，以适应应用和团队不断变化的需求。\n\
    \n## 使用 Docker 进行 CI/CD 的 GitHub Actions 最佳实践\n"
- fmt: "### Keep Workflows DRY (Don’t Repeat Yourself)\n\nAvoid duplicated code in\
    \ your GitHub Actions workflows. Reuse actions and shared logic by breaking your\
    \ workflow into modular pieces. You can have reusable workflows referenced by\
    \ several projects, thus reducing maintenance overhead and uniformly aligning\
    \ CI/CD pipelines across the board.\n\nSuppose you have a Java project and always\
    \ run the following steps to set up a Java, build with Maven, and run across different\
    \ workflows. You should instead create a composite action so that you don’t have\
    \ to repeat these several times again for each one of your workflows.\n\n**Step\
    \ 1: Create the composite action.**\n\nIn your repository, create a folder structure\
    \ for the composite action, like this:\n\n```\n.github/actions/java-maven-build\n\
    ├── action.yml\n```\n\nInside `action.yml`, define the steps you want to reuse:\n\
    \n```yaml\n# .github/actions/java-maven-build/action.yml\nname: 'Java Maven Build'\n\
    description: 'Set up Java, build with Maven, and run tests'\nruns:\n  using: 'composite'\n\
    \  steps:\n    - name: Set up JDK 17\n      uses: actions/setup-java@v3\n    \
    \  with:\n        java-version: '17'\n        distribution: 'temurin'\n      \
    \  cache: maven\n    - name: Build with Maven\n      run: mvn clean package --file\
    \ pom.xml\n    - name: Run Tests with Maven\n      run: mvn test\n```\n\n**Step\
    \ 2: Reuse the composite action in your workflows.**\n\nNow that the composite\
    \ action is defined, you can reuse it in multiple workflows. For instance, in\
    \ your `.github/workflows/main.yml`:\n\n```yaml\nname: Java CI\non:\n  push:\n\
    \    branches: [ main ]\n  pull_request:\n    branches: [ main ]\njobs:\n  build:\n\
    \    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v3\n \
    \     # Use the composite action\n      - uses: ./.github/actions/java-maven-build\n\
    ```\n\nThis approach keeps your workflows DRY by consolidating repeated steps\
    \ into a single composite action, making it easier to manage and update across\
    \ multiple pipelines.\n\n### Use Secrets for Sensitive Information\n\nStore sensitive\
    \ data like API keys, credentials, and tokens securely in GitHub’s Secrets management\
    \ system. This keeps sensitive information out of your codebase and workflow files.\
    \ Refer to these secrets in the workflow using `${{ secrets.YOUR_SECRET_NAME }}`,\
    \ ensuring that sensitive data is not exposed during the CI/CD process.\n\nExample:\n\
    \n```yaml\n- name: Login to Docker\n  run: echo ${{ secrets.DOCKER_PASSWORD }}\
    \ | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin\n```\n\n###\
    \ Leverage Caching to Reduce Build Times\n\nDependencies, for example, Maven or\
    \ npm packages, can significantly accelerate build times in CI workflows. The\
    \ GitHub Actions cache mechanism allows you to skip re-downloading dependencies\
    \ with each job run. It will be faster and more efficient, especially for big\
    \ projects.\n\nExample:\n\n```yaml\n- name: Cache Maven dependencies\n  uses:\
    \ actions/cache@v3\n  with:\n    path: ~/.m2\n    key: ${{ runner.os }}-maven-${{\
    \ hashFiles('**/pom.xml') }}\n    restore-keys: ${{ runner.os }}-maven\n```\n\n\
    ### Run Security and Performance Tests As Part of the CI Process\n\nSecurity scanning\
    \ and performance testing should be part of the CI/CD pipeline to catch issues\
    \ early. Tools such as Trivy for container vulnerabilities or JMeter for load\
    \ testing keep your deployments secure and reliable. Automating these tests ensures\
    \ you don’t ship potentially vulnerable or underperforming code.\n\nExample:\n\
    \n```yaml\n- name: Run Security Scan\n  uses: aquasecurity/trivy-action@v0.2.1\n\
    \  with:\n    image-ref: 'my-java-app'\n```\n\n## Summary\n\nThis chapter covers\
    \ automating Java application deployment using Docker and GitHub Actions. It begins\
    \ with an overview of GitHub Actions, explaining how workflows triggered by events\
    \ like code pushes can automate tasks such as building, testing, and deploying\
    \ code. The chapter then shows how to set up a CI pipeline for Java using Maven,\
    \ including caching to speed up builds.\n\nIt also explains how to containerize\
    \ a Java app using Docker and automate this process with GitHub Actions. Best\
    \ practices include reusing workflows, securing sensitive data, optimizing Docker\
    \ images with multi-stage builds, and running security tests. These steps streamline\
    \ and secure the CI/CD process. This chapter also covers how we can deploy Docker\
    \ images to GCP using GitHub Actions as the CI/CD process.\n\n# 8. Exploring Docker\
    \ Alternatives\n\nWhile Docker has been the go-to solution for containerization,\
    \ the container ecosystem has evolved much, introducing a few powerful alternatives\
    \ that address some of the pain points in modern development environments. This\
    \ chapter goes through four of the most popular Docker alternatives, Podman, Buildah,\
    \ Kaniko, and img, each of which offers unique advantages in different containerization\
    \ needs. From Podman’s daemonless architecture and improvements in security compared\
    \ to Docker through Buildah-specific image building capability, to a CI/CD-optimized\
    \ setup by Kaniko, and through img’s easier container image construction, these\
    \ applications represent the emerging wave of container solutions. Whether it’s\
    \ security, efficiency, or requirements of specific use cases, all these Docker\
    \ alternatives are necessary for understanding how one should proceed during the\
    \ journey toward containerization.\n\n## Podman\n\nPodman is an open source software\
    \ under which containers could be created, managed, and run on any Linux operating\
    \ system, originally developed and maintained by Red Hat with functionality quite\
    \ like Docker.\n\nIt has some distinct features:\n\n- **Daemonless**: It is daemonless\
    \ because it does not require having a central daemon as does Docker. A daemonless\
    \ architecture enhances security and reduces overhead since every container will\
    \ run separately under the identity of the user.\n- **Rootless**: Podman runs\
    \ containers without requiring root privileges, which is a huge security advantage\
    \ over Docker. This reduces the likelihood of a security breach through the method\
    \ of container escape (i.e., refers to a form of vulnerability by which the attacker\
    \ breaks free from the container boundaries to gain access to the potential underlying\
    \ operating system of the host).\n- **Docker compatibility**: Podman is designed\
    \ to be compatible with the CLI interface of Docker. Therefore, most of the Docker\
    \ commands can be replaced by the `podman` command.\n- **Pod concept**: Kubernetes\
    \ introduced the concept of pods (i.e., groups of containers that can be treated\
    \ collectively as a single unit). Podman uses similar concept, but it is suitable\
    \ for single-node use cases and lacks the orchestration capabilities of Kubernetes.\n\
    \nThese features make Podman a good alternative to Docker, especially when security\
    \ and resource efficiency are considered.\n\n## Setting Up Podman\n\nTo install\
    \ Podman Desktop on a Mac, you have two main methods: using the `.dmg` file or\
    \ Homebrew. Here are the detailed steps for both methods:\n\n**Using Homebrew:**\
    \ If you haven’t already installed Homebrew (a package manager for macOS), you\
    \ can install it by running the following command in your terminal:\n\n```bash\n\
    $ /bin/bash -c \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)\"\
    \n```\n\n- Once Homebrew is installed, you can install Podman by running the following\
    \ command in your terminal:\n\n```bash\n$ brew install podman\n```\n\n- After\
    \ installing Podman, you need to initialize a virtual machine (VM) which Podman\
    \ will use to run containers. Do this by running:\n\n```bash\n$ podman machine\
    \ init\n```\n\n- To start the Podman VM, run:\n\n```bash\n$ podman machine start\n\
    ```\n\n- Finally, you can verify that Podman is installed correctly by running:\n\
    \n```bash\n$ podman version\n```\n\nThis command should display the installed\
