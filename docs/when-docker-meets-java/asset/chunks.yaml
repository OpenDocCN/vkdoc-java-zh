    image. With a clear understanding of base images and alternatives such as Distroless,
    developers get well prepared to build and deploy Java applications using Docker
    more effectively.


    ## Containerizing and Running a Spring Boot Application


    ### Dockerizing a Spring Boot Application


    There are many advantages of running your Spring Boot application in a Docker
    container.


    *   First of all, developing in Docker is easy because it has a user-friendly
    CLI-based workflow that lets anyone develop, share, and run their containerized
    Spring applications flawlessly.


    *   Second, Docker streamlines installation; developers can use one package to
    deploy an application quickly.


    *   Last but not least, Docker ensures consistency between the development and
    production environments; developers can code and test locally.


    Containerizing a Spring Boot application is straightforward. You can achieve this
    by placing the `.jar` or `.war` file directly into a JDK base image and then package
    it into a Docker image. While numerous online resources are available to guide
    you through this process, many crucial aspects, such as Docker image security,
    image size optimization, proper tagging, and efficient build performance, often
    go unaddressed. This lesson will address these common concerns and provide nine
    valuable tips for containerizing your Spring Boot application.


    ### Building a Simple Spring Boot Application


    To illustrate the importance of addressing these concerns, let’s start by building
    a basic “Hello World” Spring Boot application. To create this application, we
    will begin by downloading a pre-initialized project using [Spring Initializr](https://start.spring.io/),
    generating a ZIP file, and following a few simple steps to run the application.


    Under the directory `src/main/java/com/helloworld/`, you can modify the `HelloWorldApplication.java`
    file. This file will contain the following code:


    ```

    package com.example.helloworld;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    @SpringBootApplication

    public class HelloWorldApplication {

    @RequestMapping("/")

    public String home() {

    return "Hello World!";

    }

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    ```


    To package your compiled code into a distributable format, such as a `JAR`, use
    the following commands:


    ```

    $ ./mvnw package

    $ java -jar target/*.jar

    ```


    You should now be able to access the “Hello World” application at http://localhost:8080
    through your web browser or via curl.


    ```

    $ curl localhost:8080

    Hello World!

    ```


    To Dockerize this application, you’ll need a Dockerfile. A Dockerfile is a text
    document that contains instructions for assembling a Docker image. Each instruction
    corresponds to a layer in the Docker image. Typically, developers use the following
    Dockerfile template:


    *   The first line defines the base image.


    *   The `ARG` instruction specifies variables available to the COPY instruction.


    *   The `COPY` instruction copies the JAR file from the target/ folder to the
    root of your Docker image.


    *   The `EXPOSE` instruction informs Docker about the container’s network port.


    *   Finally, the `ENTRYPOINT` command configures the container to run as an executable,
    equivalent to running the `java -jar target/*.jar` command.


    ```

    FROM eclipse-temurin:17-jdk

    ARG JAR_FILE=target/*.jar

    COPY ${JAR_FILE} app.jar

    EXPOSE 8080

    ENTRYPOINT ["java", "-jar", "/app.jar"]

    ```


    Build the Docker image using the following command:


    ```

    $ docker build -t spring-boot-helloworld .

    ```


    Finally, run the container with `docker run` command.


    ```

    $ docker run -p 8080:8080 -t spring-boot-helloworld

    ```


    However, a limitation of this approach is that you must create a `JAR` file on
    the host system using the `./mvnw package` command, which necessitates manual
    Java installation, configuration of the `JAVA_HOME` environment variable, and
    Maven installation. The JDK must reside outside the Docker container, adding complexity
    to the build environment.


    We can automate the `JAR` file creation during the image’s build to resolve this.


    ```

    FROM eclipse-temurin:jdk-17

    WORKDIR /app

    COPY .mvn/ .mvn

    COPY mvnw pom.xml ./

    RUN ./mvnw dependency:go-offline

    COPY src ./src

    CMD ["./mvnw", "spring-boot:run"]

    ```'
