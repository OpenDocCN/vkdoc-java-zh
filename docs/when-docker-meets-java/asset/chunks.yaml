- fmt: '# 1. Overview of Containers


    As a child, I spent so much time using Lego to build things, all the while thinking
    that there was no way these stupidly simple and standardized 2x4 bricks could
    be the origin of all the awesome possibilities. Little did I know that those colorful
    blocks were instilling in me the fundamental principle of modern software development.
    Just as Lego reinvented play, containers have fundamentally changed how we develop,
    package, and deploy applications. Now imagine your software as if it were a Lego
    construction. Containers are individual building blocks, standardized and endlessly
    combinable, each one representing a containerized component.


    Just like the toy bricks, containers provide a standard way to bundle applications
    for portability across any compatible system where they run. Need to scale up?
    Simple: add more “bricks.” Want to update a feature? Pop out one container and
    snap in another, without toppling the whole tower. Lego is magical in its modularity
    and flexibility: easily built, broken apart, and rebuilt. In software development,
    containers bring the same agility to software development. They isolate applications
    and their dependencies, just like individual Lego bricks are self-contained units.
    Such isolation ensures that just like a red 2×4 brick makes no difference whether
    it is in a castle or a spaceship, your application will be running identically
    whether it is on your laptop or inside a cloud data center.


    In this chapter, we put the pieces of container technology together and explore
    how those digital building blocks have constructed a new era in computing. At
    the end of this, you’re going to see how containers are the doors to innovation:
    making developers able to build, share, and deploy their digital creations with
    unimaginable ease and creativity.


    ## A Bit of History


    In 2010, a small startup called dotCloud was struggling in the competitive Platform-as-a-Service
    market. What they didn’t know was that they were actually about to change the
    tech world.


    Headed by Solomon Hykes, the dotCloud team developed an in-house tool for managing
    Linux containers that were meant to improve their system but soon became so much
    more.


    *Linux Containers are a kind of operating system-level virtualization, running
    multiple independent Linux environments on one machine. LXC shares the host machine’s
    kernel with each one, which gives a leaner alternative to a virtual machine, yet
    maintains process, file system, and network space isolation.*


    *LXC utilizes `cgroups` (control groups) and namespaces to manage and limit resources,
    producing a virtualization experience similar to running natively on an underlying
    system without the overhead of a full hypervisor.*


    Hykes introduced Docker at PyCon in March 2013. He received an immediate and enthusiastic
    response from the developers because Docker suggested a solution for how to more
    easily create, deploy, and run applications consistently in any environment.


    A key innovation in Docker was its capability to bundle an application and its
    dependencies in a standardized unit, that is, containing libraries, dependencies,
    configuration files, and runtime environment—in a consistent format, which is
    also called a container. This alone solved the age-old developer headache: “It
    works on my machine!”


    As Docker became popular, dotCloud shifted direction. They renamed it to Docker,
    Inc., and now focused exclusively on creating the Docker ecosystem. The project
    gained momentum very quickly:


    - Docker Hub was launched in 2014, providing a central location for images of
    containers.

    - In 2015, Docker Swarm followed with the native orchestration of containers.

    - Docker Enterprise Edition was released in 2017 to suit the needs of businesses.


    Docker was a total shift in software development. It made containerization and
    microservices architecture more popular and drastically changed how companies
    develop and deploy applications.


    It was not always smooth. Docker, Inc. had financial difficulties that forced
    it to sell its Enterprise business in 2019, although the core Docker technology
    remained very influential.


    Today, Docker is at the heart of many development workflows. This story exemplifies
    how an internal tool can become an industry-shaping technology through the uptake
    and contribution of an open source community.


    As we explore containers throughout this book, we’ll learn about the story of
    Docker in the background. It’s a reminder that radical solutions have humble beginnings,
    and when the timing is right, they have the power to transform whole industries.


    ## Definition of Containers


    Let’s begin by exploring a formal definition of containers before going deeper.


    ### Docker’s Definition


    Docker defines container as follows:


    *A container is a standard unit of software that packages up code and all its
    dependencies, so the application runs quickly and reliably from one computing
    environment to another. A Docker container image is a lightweight, standalone,
    executable package of software that includes everything needed to run an application:
    code, runtime, system tools, system libraries, and settings.*'
