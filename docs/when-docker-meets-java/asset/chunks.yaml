    #### Dockerfile


    Docker 在构建容器镜像时依赖于一份名为 Dockerfile 的文本文档。该文件包含一系列指令，用于定义 Docker 镜像的构建过程。用 Java
    的术语来说，我们可以将 Dockerfile 类比为 Java 类的定义。它包含了如何构建 Docker 镜像的指令。正如 Java 类规定了如何创建对象，Dockerfile
    则概述了构建 Docker 镜像的步骤。


    对于一个基础的 Java/Spring Boot 应用程序，Dockerfile 通常包含以下一组指令。


    ```

    FROM openjdk:17

    COPY target/*.jar app.jar

    ENTRYPOINT ["java","-jar","/app.jar"]

    ```


    `FROM` 指令指定了作为我们应用程序基础的基础镜像。


    `COPY` 指令将所选构建工具（例如 Maven、Ant 或 Gradle）生成的本地构建的 `.jar` 文件复制到我们的容器镜像中。


    至于 `ENTRYPOINT` 指令，它指定了容器启动时的默认可执行命令。在此示例中，我们的目标是使用 `java -jar` 命令来运行 `.jar` 文件。


    #### Docker 镜像


    类似于 JAR 文件将 Java 应用程序及其依赖项打包在一起，Docker 镜像封装了一个应用程序，包括其运行时、库和依赖项。两者都是随时可以部署的自包含单元。此外，正如
    JAR 文件可以轻松分发和共享，Docker 镜像也可以轻松分发和共享，允许用户从 Docker Hub 等 Docker 注册表中推送和拉取镜像，从而促进应用程序的无缝共享和分发。


    #### Docker CLI


    Docker CLI（命令行界面）是与 Docker 交互的主要方式。从 CLI 发出的命令通过这些通信渠道传输到 Docker 守护进程。在 Java 中，JShell
    允许开发者交互式地输入和执行 Java 代码片段，而 Docker CLI 则使开发者能够执行用于管理 Docker 组件的命令。


    #### Docker 容器


    Docker 容器就像 Java 类的一个实例。它是根据 Docker 镜像创建的可运行环境，类似于在 Java 中根据类创建对象。每个容器都是隔离的，并运行其自己的应用程序或服务。


    #### Docker 守护进程


    Docker 守护进程充当 Docker 的核心组件，如同中枢神经系统。它在主机系统中作为后台服务运行，负责执行通过 Docker CLI 发出的命令，例如
    `docker build`、`docker pull` 和 `docker run`。它可以比作在后台运行的 JVM。它负责运行和管理 Docker 容器，类似于
    JVM 管理 Java 应用程序执行的方式。


    #### Docker Hub


    Docker Hub 是镜像仓库，我们可以在其中存储、共享和管理容器镜像。可以将 Docker Hub 视为用于存储 Docker 镜像的中央仓库，类似于
    Maven 中央仓库存储 Java 库。例如，Docker Hub 就像是 Docker 镜像的 Maven 仓库。


    #### Docker Compose


    作为应用程序开发者，大多数情况下我们处理的应用程序包含多个组件，例如前端 API 和后端 API。假设应用程序需要额外的功能，例如 Nginx Web 服务器和数据库，后端
    API 使用该数据库将数据返回给前端 API。将这些不同的组件作为单独的容器运行和管理可能会变得非常棘手，需要多条 Docker 命令来确保整个应用程序的连贯运行。为了解决这个问题，Docker
    Compose 应运而生。Docker Compose 是一个用于运行多个容器的工具，使它们能够和谐地协同工作。这是通过使用 `docker-compose.yml`
    文件定义服务来实现的，该文件概述了应用程序所需的各种容器的配置和依赖关系。使用 Docker Compose，可以高效地简化整个应用程序栈的运行和管理。


    它更像是一个 Java 构建工具，例如 Maven 或 Gradle。例如，在 Maven 中，一个名为 `pom.xml` 的配置文件保存了项目及其依赖项的配置；类似地，在
    Docker 中，也有一个配置文件，通常是 `docker-compose.yml`，用于定义多容器 Docker 应用程序。


    一个示例 `docker-compose.yml` 文件。


    ```

    version: ''3''

    services:

    app:

    build: .

    image: my-java-app

    ports:

    - "8080:8080"

    environment:

    - SPRING_PROFILES_ACTIVE=prod

    ```


    这是一张说明 Docker 概念的图片。


    ![](img/625177_1_En_2_Fig3_HTML.jpg)


    说明 Docker 概念的图表。它展示了组件之间的关系：Dockerfile 定义 DockerImage，DockerHub 管理镜像存储，DockerCLI
    管理 DockerContainer，DockerDaemon 管理 DockerEngine，DockerCompose 将服务编排成 MultiContainer。


    图 2-3


    Docker 概念及其关系


    换句话说，如果能找到一种方法将 Docker 知识与 Java 开发者最熟悉的原理进行比较，那么 Java 开发者学习 Docker 知识就会变得更容易。因此，Dockerfile
    很像一个 Java 类的定义，其中包含关于如何构建 Docker 镜像的指令。Docker 镜像为应用程序、运行时库和依赖项所做的事情，与 JAR 文件所做的相同。Docker
    CLI 是与 Docker 交互的主要接口，而 Docker 守护进程则充当其中枢神经系统。Docker Hub 用于镜像的存储、共享和管理。Docker
    Compose 能够编排多个容器无缝协同工作，就像 Java 构建工具用于跨项目的配置和依赖管理一样。


    ### 总结


    本章介绍了 Docker 作为一个开源容器管理工具，它彻底改变了应用程序打包和部署的方式。它解释了 Docker 的核心原则“一次构建，随处运行”（BORA），该原则确保了应用程序在不同环境中的一致行为，这与常见的“在我机器上能运行”问题形成对比。


    然后，本章澄清了 Docker 不是什么——它不是一种虚拟化技术、不是容器编排器、不是虚拟机，也不是容器化应用程序的唯一方法。这些描述有助于将 Docker
    与相关但截然不同的概念区分开来。


    接着，本章深入探讨了 Docker 如何以其围绕 Docker 引擎的客户端-服务器架构工作。它解释了 Docker CLI 如何与 Docker 守护进程通信以执行诸如
    build、tag、push、pull 和 run 等命令。


    在关于 Docker Desktop 的部分，它解释了这款 GUI 应用程序如何在 macOS 和 Windows 上简化使用 Docker 的过程：简化的容器化、镜像扫描、对多种系统架构的多容器支持，以及与
    Kubernetes 等工具的集成。


    本章的最后部分介绍了关键的 Docker 概念，并与广为人知的 Java 开发原理进行了比较。它解释了 Dockerfile 如何类似于 Java 类的定义，Docker
    中的镜像如何类似于 JAR 文件，Docker 中的 CLI 如何类似于 JShell，Docker 中的容器如何类似于 Java 对象，Docker 中的守护进程如何等同于
    JVM，Docker Hub 如何类似于 Maven Central，以及 Docker 中的 Compose 如何类似于 Java 中的构建工具，例如 Maven
    或 Gradle。


    # 3. Docker 上手与运行


    在众多可用于应用程序打包和部署的工具中，Docker 是容器化领域最重要的工具之一。此过程中的关键要素之一是 Dockerfile，它代表了构建 Docker
    镜像所遵循的配置、依赖关系和步骤的蓝图。它包含若干指令，使我们能够使用 `docker build` 命令构建容器。

