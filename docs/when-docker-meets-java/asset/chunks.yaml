  raw: '## Unit Testing of Spring Boot Application


    Let’s say we have a simple `EmployeeService` class that we want to test:


    ```

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.stereotype.Service;

    @Service

    public class EmployeeService {

    private final EmployeeRepository employeeRepository;

    @Autowired

    public EmployeeService(EmployeeRepository employeeRepository) {

    this.employeeRepository = employeeRepository;

    }

    public Employee addEmployee(Employee employee) {

    return employeeRepository.save(employee);

    }

    }

    ```


    The `addEmployee` method is a simple example that adds a new employee to the repository.
    We can expand this class with additional methods to handle other CRUD operations.


    This `EmployeeService` class relies on `EmployeeRepository` to handle data operations.


    ```

    import org.springframework.data.repository.CrudRepository;

    import org.springframework.stereotype.Repository;

    @Repository

    public interface EmployeeRepository extends CrudRepository {

    }

    ```


    This repository interface provides basic CRUD operations for your `Employee` entity.
    You can extend it with custom query methods as needed.


    In the following example, `Employee` is your entity class, and `Long` is the type
    of the entity’s primary key. Here `@RedisHash("Employee")` annotation indicates
    that instances of `Employee` entity will be stored in Redis. The `@Id` annotation
    marks the field to be used as the identifier in Redis. The `name` and `position`
    fields are simple properties of the `Employee` entity.


    ```

    import org.springframework.data.annotation.Id;

    import org.springframework.data.redis.core.RedisHash;

    @RedisHash("Employee")

    public record Employee(@Id Long id, String name, String position) {}

    ```


    Java records automatically generate getters, `equals()`, `hashCode()`, and `toString()`
    methods, making them a perfect fit for simple data carrier classes like entities.
    Note that records are immutable, so every field is final.


    In the following unit test, we are trying to mock the interaction with `EmployeeRepository`.
    Here’s how you might write a unit test for `EmployeeService` using JUnit and Mockito:


    Mockito is a popular Java testing framework that allows the creation of mock objects,
    simulating and verifying method invocations in unit tests.


    ```

    public class EmployeeServiceTest {

    private EmployeeService employeeService;

    private EmployeeRepository mockRepository;

    @BeforeEach

    void setUp() {

    mockRepository = Mockito.mock(EmployeeRepository.class);

    employeeService = new EmployeeService(mockRepository);

    }

    @Test

    void testAddEmployee() {

    Employee employee = new Employee("John Doe", "Developer");

    Mockito.when(mockRepository.save(employee)).thenReturn(employee);

    Employee result = employeeService.addEmployee(employee);

    assertEquals(employee.getName(), result.getName());

    }

    }

    ```


    ## Integration Testing of Spring Boot Application


    Now, let’s consider a scenario where we want to test an `EmployeeRepository` that
    interacts with a Redis database, but without using Testcontainers. This typically
    involves more manual setup and can be complex.


    First, you’ll need a running instance of Redis. This could be on your local machine,
    a Docker container started manually, or a managed service. Assuming we have a
    Redis instance running on `localhost` at the default port `6379`, here’s how the
    test might look:


    ```

    @SpringBootTest

    public class EmployeeRepositoryIntegrationTest {

    @Autowired

    private EmployeeRepository employeeRepository;

    @Test

    public void testEmployeeRepository() {

    Employee employee = new Employee("John Doe", "Developer");

    employeeRepository.save(employee);

    Optional employee = employeeRepository.findById(employee.getId());

    assertTrue(employee.isPresent());

    assertEquals(employee.getName(), employee.get().getName());

    }

    }

    application-test.properties:

    spring.redis.host=localhost

    spring.redis.port=6379

    ```


    The `application-test.properties` file in a Spring Boot application is used to
    define properties specifically for testing environments. When you run tests, Spring
    Boot can be configured to use these properties instead of the regular `application.properties`
    or `application.yml`. This allows for setting up different configurations for
    testing, such as connecting to a different database or using different application
    settings.


    Adopting this manual approach to integration testing will introduce several complexities:


    *   This integration test assumes Redis is already running and accessible.


    *   We need to manually ensure that Redis is in a clean state before and after
    tests.


    *   Handling different environments (CI server, local development) can be challenging
    without Testcontainers.


    *   This approach lacks the isolation and environment parity provided by Testcontainers,
    potentially leading to flaky tests.


    This example illustrates the additional complexity and manual intervention required
    when not using a tool like Testcontainers, which automates these aspects.


    ## Spring Boot and Testcontainers


    The integration of Testcontainers with Spring Boot is quite a potent way to facilitate
    comprehensive application testing, mainly when it comes to interactions with external
    systems or databases. This integration allows creating and managing containers
    dynamically during your tests while providing an isolated environment similar
    to your production setup.


    Testcontainers integrates with JUnit, allowing us to define a test class that
    will start a container before the execution of any test. It is easy to use for
    integration tests communicating with backend services like MySQL, MongoDB, Redis,
    and so on.


    ![](images/625177_1_En_10_Chapter/625177_1_En_10_Fig2_HTML.jpg)


    Logos of four software technologies: Testcontainers with a cube icon, Spring Boot
    with a green power button symbol, Redis with a red stack of disks, and Docker
    represented by a blue whale carrying containers.


    Figure 10-2


    Testcontainers integration test


    Here’s how we can utilize Testcontainers in a Spring Boot test.


    ### Dependencies Setup


    First, make sure the required dependencies are included in our Maven or Gradle
    setup is crucial:


    For Maven:


    ```

    org.springframework.boot

    spring-boot-starter-test

    test


    org.springframework.boot

    spring-boot-testcontainers

    test


    org.testcontainers

    junit-jupiter

    test


    ```


    For Gradle:


    ```

    dependencies {

    testImplementation ''org.springframework.boot:spring-boot-starter-test''

    testImplementation ''org.springframework.boot:spring-boot-testcontainers''

    testImplementation ''org.testcontainers:junit-jupiter''

    }

    ```


    Alternatively, we can add dependencies using [start.​spring.​io](https://start.spring.io).


    ![](images/625177_1_En_10_Chapter/625177_1_En_10_Fig3_HTML.jpg)


    The image shows a search bar on the start.spring.io website with the text "testcontainer"
    entered. Below, a highlighted suggestion reads "Testcontainers TESTING," with
    a description stating, "Provide lightweight, throwaway instances of common databases,
    Selenium web browsers, or anything else that can run in a Docker container." A
    prompt on the right says, "Press ⌘ for multiple adds."


    Figure 10-3


    Adding Testcontainers dependency


    ### Annotate Test Classes


    Annotate your test classes with `@SpringBootTest` to enable Spring Boot context
    loading for tests and `@Testcontainers` to activate Testcontainers support.


    ```

    @Testcontainers

    @SpringBootTest

    class DemoApplicationTests {

    }

    ```'
