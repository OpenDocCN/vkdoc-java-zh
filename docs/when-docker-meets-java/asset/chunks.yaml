  trans: "\n### 云原生构建包特性\n\n云原生构建包（CNB）为构建和打包容器化应用程序提供了多项功能与能力。以下是云原生构建包支持的一些关键特性：\n\
    \n*   **依赖管理**：CNB 能够自动检测并管理应用程序的依赖项，例如语言运行时、库和软件包。它们确保所需的依赖项被包含在应用程序容器中。\n\n\
    *   **分层构建**：CNB 采用分层方法来构建容器。这意味着它们会为应用程序的不同部分创建独立的层，从而在构建过程中实现高效的缓存和可重用性。\n\n\
    *   **可重现构建**：CNB 专注于封闭式可重现构建。这确保了相同的源代码和相同的依赖项能够生成完全相同的容器镜像，这对于可靠性和安全性至关重要。\n\
    \n*   **构建缓存**：CNB 利用构建缓存，已构建的层可以被缓存。这使得缓存的层能够被尽可能多地重用，从而避免每次都重新构建所有内容。\n\n* \
    \  **可定制构建器**：CNB 提供了创建自定义构建器的灵活性，以满足特定的应用程序类型或组织需求。自定义构建器可以包含额外的构建包和配置。\n\n*\
    \   **生命周期阶段**：CNB 构建过程包含不同的生命周期阶段，包括检测、分析、构建和导出。所有这些生命周期阶段都可以根据用例进行扩展或自定义。\n\n\
    *   **安全扫描**：CNB 通常与安全扫描工具集成，以识别和解决应用程序依赖项中的漏洞，从而提高最终容器镜像的安全性。\n\n*   **环境变量注入**：CNB\
    \ 可以将环境变量注入到应用程序容器中，从而轻松配置运行时设置或连接到外部服务。\n\n*   **多平台支持**：CNB 支持为多个平台和架构构建容器镜像，使得创建能够在不同云提供商和设备类型上运行的镜像更加容易。\n\
    \n*   **兼容性**：CNB 与各种容器运行时和编排器兼容，例如 Docker、Kubernetes 和 Cloud Foundry，使其适用于不同的部署场景。\n\
    \n*   **持续集成（CI）**：CNB 可以集成到 CI/CD 流水线中，以自动化容器化过程，确保应用程序被一致地构建和打包。例如，buildpacks\
    \ 项目提供了一系列用于不同构建包相关活动的 [GitHub actions](https://github.com/buildpacks/github-actions)。其中一个操作允许我们配置一个使用\
    \ pack CLI 的作业。这个过程很直接，我们可以轻松地使用这个操作：\n\n```\nuses: buildpacks/github-actions/setup-pack@v4.1.0\n\
    ```\n\n### 配置构建包\n\nSpring Boot 2.3.0.M1 为 Maven 和 Gradle 引入了原生构建包支持。这简化了为我们的应用程序生成\
    \ Docker 镜像的过程。\n\n*   首先，确保我们本地已安装并运行 Docker。Spring Boot 构建包集成需要一个正在运行的 Docker\
    \ 守护进程。否则，我们会收到一个错误：\n\n    ```\n    Failed to execute goal org.springframework.boot:spring-boot-maven-plugin:2.4.2:build-image\
    \ (default-cli) on project imagebuilder: Execution default-cli of goal org.springframework.boot:spring-boot-maven-plugin:2.4.2:build-image\
    \ failed: Connection to the Docker daemon at 'localhost' failed with error \"\
    [61] Connection refused\"; ensure the Docker daemon is running and accessible\n\
    \    ```\n\n    在这方面它与 Jib 不同，Jib 不需要 Docker 守护进程来构建容器镜像。\n\n*   接下来，使用 [start.​spring.​io](http://start.spring.io)\
    \ 创建一个新的 Spring Boot 项目。\n\n*   对于 Maven，我们可以使用命令，对于 Gradle，则是 `gradle bootBuildImage`。我们可以通过一条命令快速创建一个配置良好的镜像，并将其存储在本地的\
    \ Docker 守护进程中。第一次运行会花费一些时间，但后续调用会更快。我们应该会在构建日志中看到类似这样的信息：\n\n    ```\n    [INFO]\
    \ Successfully built image 'docker.io/library/buildpack:0.0.1-SNAPSHOT'\n    [INFO]\n\
    \    [INFO] ------------------------------------------------\n    [INFO] BUILD\
    \ SUCCESS\n    [INFO] ------------------------------------------------\n    [INFO]\
    \ Total time:  01:49 min\n    [INFO] Finished at: 2021-02-20T01:07:08+05:30\n\
    \    ```\n\n*   我们现在有了一个符合 OCI 标准的应用程序容器镜像，它：\n    1.  包含了必要的中间件，如 JRE。\n\n  \
    \  2.  根据我们的应用程序框架（Spring Boot）进行了特定的定制。\n\n    3.  是在一个一次性的构建容器中创建的，仅提供了应用程序源代码。\n\
    \n    4.  默认是安全的，以非 root 用户身份运行，并且只安装了最少的软件包。\n\n    5.  将以我们的应用程序命名，并使用其版本进行标记。\n\
    \n*   最后，运行：\n\n    ```\n    docker run --rm -p 8080:8080 imageName\n    ```\n\
    \n    并使用 http://localhost:8080/ 检查输出。\n\n*   默认情况下，当与 Spring Boot 一起使用时，Buildpacks\
    \ 会将镜像存储在本地 Docker 守护进程中。尽管如此，我们也可以将镜像推送到远程容器仓库。我们需要在 Maven 文件中进行特定的调整以启用此功能。\n\
    \n    ```\n\n    org.springframework.boot\n    spring-boot-maven-plugin\n\n  \
    \  docker.example.com/library/${project.artifactId}\n    true\n\n    user\n  \
    \  secret\n    https://docker.example.com/v1/\n    user@example.com\n\n    ```\n\
    \n## 总结\n\n本章探讨了 Java 应用程序的容器构建工具，重点介绍了 Spring Boot。内容涵盖了 Google Jib、Fabric8 Docker\
    \ Maven Plugin、Spotify 的 Docker-Maven-Plugin 以及云原生构建包。所有这些工具都提供了不同的方式来实现 Java\
    \ 应用程序的容器化，从使用 Jib 和构建包无需 Dockerfile 创建 Docker 镜像，到将 Docker 镜像构建集成到 Maven 构建过程中。本章提供了实际示例、配置细节以及对每种工具优势的见解。旨在帮助开发人员为其\
    \ Java 项目选择正确的容器化方法。\n\n# 7. 使用 GitHub Actions 部署 Docker 容器\n\n容器化现已成为应用程序部署策略的基石，旨在以轻量、一致且可扩展的方式运行软件。用于\
    \ Java 应用程序的 Docker 使其能够随处运行，无论底层系统之间存在何种差异。借助 GitHub Actions，开发人员可以自动化容器的构建、测试和部署。\n"
- fmt: '# Understanding GitHub Actions


    GitHub Actions is an automation tool that allows us to run workflows based on
    events such as a push to a repository. GitHub Actions changed the face of CI/CD.
    It makes CI/CD easier for a Java developer by allowing automation right from their
    GitHub repositories: it builds, tests, and deploys automatically without human
    intervention. GitHub Actions can automate any type of software workflow. This
    simply runs a sequence of commands following particular events on a GitHub repository:
    push, creating a pull request, or similar actions.


    Here are some key features of GitHub Actions:


    - **Workflow automation**: We can automate our build, test, and deploy workflows
    using actions defined in YAML files within our repository.

    - **Events trigger**: Workflows can be triggered by GitHub events such as push
    and pull requests, issues created, releases, or any other event in the GitHub
    webhooks payload.

    - **Reusable components**: Actions can be created and shared as individual tasks,
    which others can use in their workflows.

    - **Marketplace**: GitHub Marketplace provides a community of shared actions that
    can be used to automate all sorts of processes.

    - **Language and platform support**: Actions support various programming languages
    and platforms, making them versatile for different projects.

    - **Hosted runners**: GitHub provides hosted runners for Linux, Windows, and macOS,
    allowing you to run workflows on fresh virtual machines.

    - **Self-hosted runners**: For custom environments or specific hardware requirements,
    we can also host our runners.

    - **Matrix builds**: We can test across multiple operating systems, versions,
    or environments by defining a matrix of different configurations.

    - **Secrets management**: We can store and use secrets, like API keys or credentials,
    securely in our workflows.

    - **Artifacts and caches**: We can upload artifacts from our workflows or cache
    dependencies to speed up the build process.


    ![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig1_HTML.jpg)


    Flowchart illustrating a GitHub Actions workflow. The process starts with "Push
    Code," leading to "GitHub Actions," which branches into three parallel steps:
    "Build," "Test," and "Deploy."


    **Figure 7-1** – GitHub Actions


    ## GitHub Action Components


    Let’s break down the critical elements of GitHub Actions:


    - **Workflow**: It’s a set of instructions to compile, test, package, or deploy
    code on GitHub. Defined in a YAML file within the `.github/workflows` folder of
    our repository, a workflow activates through specific events and comprises jobs.

    - **Events**: These are the triggers for workflows. Any activity, like a push
    to a branch or a new pull request, can initiate the workflow.

    - **Jobs**: A job is a sequence of steps that run in a virtual environment called
    a runner. Jobs organize the sequence of actions and can operate simultaneously
    or one after the other.

    - **Steps**: Each step in a job corresponds to a single action, such as retrieving
    the code or executing a shell command.

    - **Actions**: Actions are predefined commands you can run during steps, like
    pulling your code repository or setting up a Java Development Kit.

    - **Runners**: These are servers where we run workflows. GitHub provides these
    runners, or we can set up our own. They carry out the jobs and report the outcomes
    to your GitHub repository. GitHub’s runners are compatible with Ubuntu Linux,
    Windows, and macOS.


    ### Understanding Workflow YAML File


    The diagram below outlines the relationship between a GitHub repository, workflows,
    and GitHub Actions.


    ![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig2_HTML.jpg)


    Flowchart illustrating a GitHub Actions workflow. It starts with a "Git Push Event"
    in the GitHub Repository, which triggers the "Workflow YAML File." This defines
    the GitHub Actions workflow containing two jobs: "Job 1" and "Job 2." Job 1 consists
    of "Step 1.1" and "Step 1.2," while Job 2 consists of "Step 2.1" and uses "actions."


    **Figure 7-2** – GitHub YAML workflow


    Here’s a step-by-step explanation:


    - **GitHub repository**: `[Git Push Event]`: This is the starting point of the
    workflow. A Git push event occurs when someone pushes commits to a repository
    on GitHub. This event can trigger a workflow.

    - **Workflow**: `[Workflow YAML File]`: This file, typically named `main.yml`
    or `ci.yml`, is located in the `.github/workflows` directory of your repository.
    It defines the workflow to be executed when the Git push event occurs.

    - **GitHub Actions**: `[Workflow]`: This is the overall automated process defined
    by the workflow YAML file. It contains one or more jobs.

    - `[Job 1]` and `[Job 2]`: These are individual jobs within the workflow. Jobs
    are steps that execute on the same runner, which can run in parallel or sequentially
    as defined by the workflow.

    - `[Step 1.1]` and `[Step 1.2]`: These are steps within `Job 1`. Steps are individual
    tasks that can run commands or actions.

    - `[Step 2.1]`: This is a step within `Job 2`. Like the steps in `Job 1`, it can
    run commands or actions.

    - `[actions]`: This represents actions used in steps. GitHub Actions can use pre-built
    actions created by the community or custom ones defined in your repository.


    The diagram’s arrows show the direction of the workflow:


    - `|Triggers|`: The Git push event triggers the workflow defined in the workflow
    YAML file.

    - `|Defines|`: The workflow YAML file represents the actual workflow process.

    - `|Contains|`: The workflow contains `Job 1` and `Job 2`.

    - `|Consists of|`: `Job 1` consists of `Step 1.1` and `Step 1.2`.

    - `|Uses|`: `Step 2.1` uses one or more actions to perform its tasks.


    The above diagram shows how a Git push event triggers a defined workflow in the
    repository, which then controls the execution of jobs and steps through actions
    within the GitHub Actions environment.


