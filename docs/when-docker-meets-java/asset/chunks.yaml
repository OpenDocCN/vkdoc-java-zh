    | **Code elimination** | No exclusion of unreachable code from final executable.
    | Unreachable code at the time of native image creation is excluded from the final
    executable. |

    | **Immutable classpath** | In traditional JVM applications, the classpath can
    be modified dynamically, allowing the addition or modification of where the JVM
    searches for classes and resources. | The classpath is fixed at the time of building
