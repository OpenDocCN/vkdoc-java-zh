  trans: "\n### 示例\n\n*   **场景**：一个使用 HTTP 和 JSON 处理的简单 Java 应用程序。\n\n*   **Dockerfile\
    \ 设置**：\n    *   从 JDK 镜像开始，编译应用程序并运行 Jlink。\n    *   使用 Jlink 创建一个仅包含所需模块（`java.base`、`java.net.http`、`java.json`）的自定义运行时。\n\
    \    *   使用最小基础镜像构建最终镜像，复制自定义运行时和应用程序 JAR 文件。\n\n*   **示例 Dockerfile**：\n\n```\n\
    # 编译阶段\nFROM openjdk:11 as build\nWORKDIR /app\nCOPY . .\nRUN javac -d out --module-path\
    \ lib --module-source-path src $(find src -name \"*.java\")\nRUN jlink --add-modules\
    \ java.base,java.net.http,java.json --output jre\n# 最终阶段\nFROM alpine:latest\n\
    COPY --from=build /app/jre /opt/jre\nCOPY --from=build /app/out /app\nENTRYPOINT\
    \ [\"/opt/jre/bin/java\", \"-m\", \"com.myapp/com.myapp.Main\"]\n```\n\nJlink\
    \ 显著改变了将 Java 应用程序容器化的方式，使得创建更精简、更高效的容器镜像成为可能。对于 Java 开发者来说，它是一个强大的工具，尤其是在镜像大小和安全性至关重要的\
    \ Docker 环境中。掌握 Jlink 能让开发者为其现代云环境优化 Java 应用程序。\n\n## 使用无发行版基础镜像\n\n基础镜像在定义容器化应用程序的安全性、效率和大小方面至关重要。来自\
    \ Google 的无发行版镜像已广受欢迎，Java 开发者尤其广泛采用。\n\n### 理解无发行版镜像\n\n无发行版镜像是极简的容器镜像，仅包含应用程序及其运行时依赖项。它们不包含标准操作系统发行版中常见的包管理器、Shell\
    \ 或其他二进制文件。对于 Java 应用程序，无发行版镜像通常只包含一个 JVM 和应用程序的 JAR 文件，仅此而已。\n\n### 创建无发行版 Java\
    \ 镜像\n\n**编写 Dockerfile**：从一个仅包含 Java 运行时环境（JRE）的基础镜像开始。\n\n```\nFROM gcr.io/distroless/java17-debian12\n\
    COPY target/myapp.jar /app.jar\nCMD [\"app.jar\"]\n```\n\n**构建镜像**：使用 Docker 构建你的镜像。\n\
    \n```\n$ docker build -t my-java-app .\n```\n\n**运行容器**：部署你的应用程序。\n\n```\n$ docker\
    \ run -d my-java-app\n```\n\n### 无发行版镜像的优势\n\n*   **增强的安全性**：通过移除不必要的操作系统组件，显著减少了容器的攻击面。镜像中组件越少，意味着潜在漏洞越少。\n\
    *   **更小的镜像体积**：无发行版镜像非常精简，因此体积更小；在 CI/CD 流水线中拉取和推送所需时间更短。相比其他镜像，它们占用更少的存储空间。更小的镜像能加速在\
    \ Kubernetes 等编排系统中的部署时间。\n*   **简化与维护**：镜像中组件越少，打补丁和更新的需求就越少。为应用程序提供一个干净、最小的环境，确保在不同部署环境中的一致性。\n\
    \n### 最佳实践\n\n*   **了解应用程序的依赖项**：确保镜像中包含所有运行时依赖项。\n*   **调试挑战**：如果没有 Shell 或调试工具，排查运行中容器的问题可能会比较困难。考虑在开发阶段使用调试版本。\n\
    *   **保持更新**：定期更新基础镜像，以确保拥有 Java 运行时的最新安全补丁。\n\n无发行版镜像为在容器内部署 Java 应用程序提供了一种引人注目的方法，在安全性、效率和简洁性之间取得了平衡。采用无发行版镜像意味着开发者和组织可以降低在生产环境中运行庞大、复杂容器镜像的风险，同时享受精简高效的部署流程。未来，随着容器化领域趋向极简主义，行业将更倾向于使用无发行版镜像。\n\
    \n### 将 JVM 参数和资源限制应用于 Docker 容器\n\n在 Docker 容器中运行 Java 应用程序时，优化 JVM 设置和容器资源限制非常重要。优化的配置能确保资源有效利用，从而提升应用程序性能，避免出现内存溢出错误等常见问题。\n\
    \n### JVM 参数和资源限制的重要性\n\n**JVM 参数**：自定义 JVM 的行为以满足特定需求，例如垃圾回收策略、堆大小和其他性能相关设置。\n\
    **Docker 中的资源限制**：定义容器可以使用的最大 CPU 和内存资源，防止任何应用程序耗尽宿主系统的资源。\n**设置内存限制**：使用 Docker\
    \ 的 `-m` 或 `--memory` 标志来设置内存限制。\n示例：`docker run -m 512m my-java-app` 将容器的内存上限设为\
    \ 512 MB。\n**设置 CPU 限制**：使用 `--cpus` 限制容器可以使用的 CPU 核心数。\n示例：`docker run --cpus=2\
    \ my-java-app` 将应用程序限制为使用 2 个 CPU 核心。\n\n### 在 Docker 中传递 JVM 参数\n\n使用 `JAVA_OPTS`\
    \ 环境变量，或在 Dockerfile 的 `CMD` 或 `ENTRYPOINT` 中直接传递参数。\n\n```\ndocker run -e \"\
    JAVA_OPTS=-Xmx256m -Xms256m\" my-java-app\n```\n\n或者，我们也可以将其包含在 Dockerfile 中。\n\
    \n```\nENTRYPOINT [\"java\", \"-Xmx256m\", \"-Xms256m\", \"-jar\", \"myapp.jar\"\
    ]\n```\n\n### 平衡资源以获得最佳性能\n\n*   **了解应用程序需求**：对你的应用程序进行性能分析，以了解其资源使用模式。\n*   **避免过度分配**：不要分配超出必要的资源，因为这可能会使其他容器或进程资源匮乏。\n\
    *   **监控与调整**：持续监控性能并根据需要调整设置。\n\n## 为效率配置 Java 应用程序\n\n考虑一个在 Docker 容器中运行的 Java\
    \ Web 应用程序场景。为了让我们的 Web 应用程序获得最佳性能，需要注意什么？根据当前的应用程序负载，我们只需要 700 MB 内存和一个 CPU 核心。\n\
    \n在 Dockerfile 内部，我们可以将内存限制设置为 1 GB，CPU 限制设置为 1 个核心。即使应用程序需要大约 700 MB 的内存，我们也应该保留一些缓冲，以防使用量出现峰值。\n\
    \n我们还应该为垃圾回收和堆设置配置 JVM 参数。\n\n```\n$docker build -t my-java-app .\n$docker run\
    \ -m 1g --cpus=1 -e \"JAVA_OPTS=-Xmx700m -Xms700m -XX:+UseG1GC\" my-java-app\n\
    ```\n\n在 Docker 中调整 JVM 设置和设置资源限制，对于在容器化环境中高效、可靠地运行 Java 应用程序至关重要。这些配置有助于管理应用程序性能，确保资源的最佳利用，并维护应用程序和宿主系统的稳定性。根据应用程序行为进行定期监控和调整，对于实现最佳性能至关重要。\n\
    \n## 保护 Docker 镜像安全\n\n在容器化领域，Docker 镜像安全至关重要。随着 Docker 在应用程序部署中的广泛采用，确保 Docker\
    \ 镜像的安全对于防范攻击者可利用的漏洞至关重要。\n\n### 常见安全漏洞\n\n尽管 Docker 功能多样，但如果管理不当，也容易受到攻击。这可能会为攻击者或黑客提供入口点。\n\
    \n常见漏洞包括：\n\n*   **过时的软件和库**：包含过时操作系统、库或框架的镜像容易受到已知漏洞的攻击。\n*   **不安全的配置**：配置错误的\
    \ Dockerfile 或容器设置可能会使容器面临风险。\n*   **嵌入的密钥**：硬编码在镜像中的密钥可能导致未授权访问。\n*   **不必要的包**：在镜像中添加未使用的软件会增加攻击面。\n"
- fmt: "### Scanning for Vulnerabilities\n\n- **Choose a scanning tool**: Tools like\
    \ `Clair`, `Trivy`, `Synk`, or Docker’s scanning feature can be used.\n- **Integrate\
    \ scanning into CI/CD pipeline**: Automate the scanning process during image build\
    \ or deployment.\n- **Review and address findings**: Analyze the report generated\
    \ by the scanner and address the vulnerabilities identified.\n\n### Best Practices\n\
    \n- **Continuous monitoring**: Regularly scan images for vulnerabilities, even\
    \ after deployment.\n- **Dependency management**: Keep track of the dependencies\
    \ used in your Docker images and update them regularly.\n- **Minimize attack surface**:\
    \ Use minimal base images and avoid installing unnecessary packages.\n- **Non-root\
    \ user**: Run your container as a non-root user to reduce the risk of a container\
    \ breakout attack.\n- **`.dockerignore` file**: Use a `.dockerignore` file to\
    \ exclude unnecessary files and directories from your build context to prevent\
    \ potential leaks of sensitive information.\n- **Private registries and signed\
    \ images**: Store images in trusted, private container registries with strong\
    \ access controls. Use features like Docker Content Trust to sign images and verify\
    \ their integrity and origin.\n- **Implement the least privilege principle**:\
    \ Ensure that files and executables within the Docker image have the least privileges\
    \ necessary to run the application. Where possible, use read-only filesystems\
    \ in your containers to prevent unwanted changes.\n- **Securing application secrets**:\
    \ Never hardcode sensitive information like passwords or API keys in Docker images.\
    \ To manage sensitive information, use secret management tools like Docker Secrets,\
    \ HashiCorp Vault, or environment variables injected at runtime.\n- **Keeping\
    \ host system secure**: Ensure the Docker daemon is securely configured. Keep\
    \ the host system secure, as vulnerabilities in the host can affect all containers.\n\
    \nSecuring of Docker images is an ongoing process that demands constant maintenance,\
    \ vigilance, and best practices. By keeping up with vulnerabilities, maintaining\
    \ the latest images, and minimizing attack surfaces, you can enhance your Docker\
    \ deployments’ security dramatically. The integration of security practices into\
    \ the development and deployment pipeline is the way to ensure robust and secure\
    \ containerized applications.\n\n## Choosing Maven vs. JDK vs. JRE Base Image\n\
    \nIn the Docker ecosystem, choosing a base image is critical for building effective\
    \ and efficient Java applications. Maven, JDK, and JRE images each serve different\
    \ purposes. Understanding their differences and use cases is essential for optimal\
    \ Docker image construction.\n\n### Differences between Maven, JDK, and JRE Images\n\
    \n- **Maven image**: Includes the Maven build tool and typically a JDK. Best for\
    \ building Java applications from source.\n- **JDK (Java Development Kit) image**:\
    \ Contains the Java Runtime Environment (JRE), compilers, and tools to build Java-based\
    \ applications. Required for compiling Java code.\n- **JRE (Java Runtime Environment)\
    \ image**: The runtime needed to execute a Java application. It does not contain\
    \ the tools and compilers found in the JDK.\n\n### Pros and Cons\n\n| Image Type\
    \ | Pros | Cons | Use Case |\n| --- | --- | --- | --- |\n| Maven Image | Convenient\
    \ for building applications where Maven is the build tool<br>- Often includes\
    \ the JDK | Larger than JDK or JRE images, as it includes additional build tools\
    \ | Building Java applications during development or in CI/CD pipelines |\n| JDK\
    \ Image | Essential for compiling Java code and includes necessary tools for development\
    \ | Larger size compared to JRE images | Application development and any situation\
    \ where Java code needs to be compiled |\n| JRE Image | Smaller size, focused\
    \ on runtime only, and ideal for running Java applications | Cannot be used for\
    \ compiling Java code or any development-related tasks | Running Java applications\
    \ in production or any environment where code compilation is not required |\n\n\
    ### Best Practices\n\n- **Analyze your requirements**: Determine whether your\
    \ application needs to be compiled or if it’s only being run.\n- **Consider the\
    \ environment**: Use JDK images for development, CI/CD pipelines, and JRE images\
    \ for production.\n- **Size vs. functionality**: Balance the need for a smaller\
    \ image size with the functionality required.\n\n### Example\n\n- **Maven image**:\n\
    \    - **Scenario**: Building a Spring Boot application using Maven.\n    - **Dockerfile\
    \ example**:\n\n```\nFROM maven:3.6-jdk-11 AS build\nCOPY src /usr/src/app/src\n\
    COPY pom.xml /usr/src/app\nRUN mvn -f /usr/src/app/pom.xml clean package\n```\n\
    \n- **JDK image**:\n    - **Scenario**: Compiling a Java application.\n    - **Dockerfile\
    \ example**:\n\n```\nFROM openjdk:11-jdk\nCOPY . /usr/src/myapp\nWORKDIR /usr/src/myapp\n\
    RUN javac Main.java\n```\n\n- **JRE image**:\n    - **Scenario**: Running a pre-compiled\
    \ Java application.\n    - **Dockerfile example**:\n\n```\nFROM openjdk:11-jre-slim\n\
    COPY --from=build /usr/src/app/target/app.jar /usr/app/\nENTRYPOINT [\"java\"\
    , \"-jar\", \"/usr/app/app.jar\"]\n```\n\nIt depends on the needs of your Java\
    \ application in Docker. Maven images are most suitable for building scenarios\
    \ that involve Maven, JDK images are best suited for development and compilation\
    \ tasks, and JRE images are best optimized for running Java applications. Understanding\
    \ and aligning these choices with your application requirements ensures efficiency,\
    \ performance, and a streamlined development process.\n\n## Summary\n\nThis chapter\
    \ is a comprehensive review of Docker best practices that are vital for Java developers\
    \ in today’s containerized environments. The chapter starts with multistage builds,\
    \ which are advanced techniques for creating lean and secure Docker images. Isolating\
    \ the build environment from the runtime environment greatly reduces the size\
    \ of the final image but still keeps all the functionality needed; it shows how\
    \ to structure Dockerfiles and handle artifacts between stages.\n\nThe discussion\
    \ then moves on to Java runtime optimization using `jlink`, a powerful tool introduced\
    \ in Java 9. This section shows developers how to create custom runtime images\
    \ containing only the modules necessary for their applications. Not only does\
    \ this targeted approach reduce container size, but it also improves security\
    \ by minimizing the potential attack surface; it provides practical examples and\
    \ best practices for module selection in real-world scenarios.\n\nMoving on, the\
    \ chapter on distroless base images covers the minimal container image containing\
    \ just the application and its dependencies required at runtime. This proves to\
    \ be very valuable for improving security and efficiency in removing unnecessary\
    \ components, which results in a smaller, more secure, and easier-to-maintain\
    \ and deploy container.\n\nThe chapter then goes into detail on JVM arguments\
    \ and resource management, providing deep insight into the optimization of memory\
    \ usage, CPU allocation, and garbage collection settings. The extensive coverage\
    \ helps developers realize how resource allocation can be balanced for optimal\
    \ performance and common pitfalls in containerized Java applications. The guidance\
    \ provided ensures that applications run efficiently within their containerized\
    \ environments while maintaining stability and reliability.\n\nFinally, the chapter\
    \ will summarize security considerations by offering a comprehensive examination\
    \ of Docker image security best practices, including vulnerability scanning and\
    \ secure configuration management, implementing principles of least privilege,\
    \ continuous monitoring, and regular updating of containerized environments over\
    \ the application life cycle. Combined, these practices deliver a complete approach\
    \ to containerizing Java applications, enabling development teams to create solutions\
    \ that are efficient, secure, and maintainable, without falling into common pitfalls\
    \ in the implementation of Docker."
  raw: "### Scanning for Vulnerabilities\n\n*   **Choose a scanning tool**: Tools\
    \ like Clair, Trivy, Synk, or Docker’s scanning feature can be used.\n\n*   **Integrate\
