- fmt: '## Containerizing the Spring Boot Application


    Now, containerize your application. Create a `Dockerfile` (or `Containerfile`)
    in the project root. This file instructs how to build your application’s image.
    Include the base Java image, add your application’s jar file, and specify the
    entry point. Here’s a basic example:


    ```

    # Use an official Java runtime as a parent image

    FROM eclipse-temurin:17-jdk-jammy

    # Set the working directory in the container

    WORKDIR /app

    # Copy the jar file into the container at /app

    COPY target/demo-0.0.1-SNAPSHOT.jar /app/hello-world.jar

    # Make port 8080 available to the world outside this container

    EXPOSE 8080

    # Run the jar file

    ENTRYPOINT ["java","-jar","/app/hello-world.jar"]

    ```


    ## Building Container Image with Podman


    To create a container image using Podman Desktop, start by navigating to the Images
    section within Podman Desktop and then click the **Build an Image** button at
    the top-right corner, as shown in the following image.


    ![](images/625177_1_En_8_Chapter/625177_1_En_8_Fig10_HTML.jpg)


    A dark-themed interface showing an image management toolbar with three buttons:
    "Prune images," "Pull an image," and "Build an image." The "Build an image" button
    is highlighted with a pink arrow. A search bar labeled "Search images..." is also
    visible.


    Figure 8-10


    Building an image


    This action opens a menu where we can choose our location for `Containerfile`,
    typically found in the root directory of the demo folder. Once the `Containerfile`
    is selected, you can assign a name to the container image, such as "my-custom-image."


    Next, click **Build** to observe the creation of each image layer.


    ![](images/625177_1_En_8_Chapter/625177_1_En_8_Fig11_HTML.jpg)


    Interface for building a Docker image from a container file. It shows fields for
    "Containerfile Path" set to "/Users/.../Downloads/demo 3/containerfile," "Build
    context directory" set to "/Users/.../Downloads/demo 3," and "Image Name" set
    to "my-custom-image." A blue "Build" button is at the bottom.


    Figure 8-11


    Configuring containerfile


    You can find the image in your local image registry.


    ![](images/625177_1_En_8_Chapter/625177_1_En_8_Fig12_HTML.jpg)


    A screenshot of a Docker image interface showing an image named "docker.io/library/my-custom-image"
    with a tag labeled "latest." The image was created 1 minute ago and has a size
    of 431.39 MB. Options for actions include play, delete, and more settings.


    Figure 8-12


    Image in local registry


    ## Running Containerized Application


    Great! Now, head back to the Images section to view the containerized Spring Boot
    application, which has been successfully built and tagged as an image. To run
    this image as a container on our system, click the **Run** icon to the right of
    our container image, as shown in the following image.


    ![](images/625177_1_En_8_Chapter/625177_1_En_8_Fig13_HTML.jpg)


    A user interface displaying a Docker image with details. The image name is "docker.io/library/my-custom-image"
    with a tag labeled "latest." It was created one minute ago and is 431.39 MB in
    size. There are action icons on the right, including a play button and a trash
    bin, with a pink arrow pointing to the play button.


    Figure 8-13


    Run the image


    In the Port Mapping section, ensure that port 8080 of the container is mapped
    to port 8080 of the host. You can leave all other settings unchanged. Then, click
    **Start Container** to initiate the containerized version of your Spring Boot
    application, as illustrated in the following image.


    ![](images/625177_1_En_8_Chapter/625177_1_En_8_Fig14_HTML.jpg)


    Docker interface for creating a container from the image `docker.io/library/my-custom-image:latest`.
    It includes sections for setting volumes, port mapping, and environment variables.
    The local port 8080 is mapped to the container port 8080. There is an option to
    add custom port mapping and specify environment variables. A button labeled "Start
    Container" is highlighted in blue. Docker compatibility is indicated as version
    1.5.3.


    Figure 8-14


    Port mapping


    Now, the container is up and running.


    ![](images/625177_1_En_8_Chapter/625177_1_En_8_Fig15_HTML.jpg)


    The image shows a Docker container details interface for "suspicious_hypatia,"
    highlighting the "Logs" tab. The terminal displays a Spring Boot application startup
    log, indicating the initialization of a demo application using Java 17.0.9 with
    Apache Tomcat. Key events include starting the DemoApplication, initializing the
    Spring DispatcherServlet, and completing initialization in 7 milliseconds. The
    interface includes navigation tabs like Summary, Inspect, Kube, Terminal, and
    Tty. Docker compatibility is noted at the bottom.


    Figure 8-15


    Container up and running


    We have now successfully built and containerized a Spring Boot application using
    Podman. This approach simplifies development and ensures our application is ready
    for deployment in any environment that supports containers.


    ## Buildah


    Buildah is an open source tool that provides a command-line interface for creating
    and managing OCI (Open Container Initiative) compliant container images. As an
    alternative to Docker, Buildah is part of the suite of tools provided by Red Hat,
    along with Podman and Skopeo, to work with containers.


    Buildah is specialized in building container images. It doesn’t manage container
    life cycle operations like starting, stopping, or orchestrating containers. Buildah
    does not include a container runtime; it creates and prepares images.


    ### Buildah Features


    Here are some critical aspects of Buildah:


    | Feature | Description |

    | --- | --- |

    | **Rootless Container Image Building** | Buildah can create container images
    without requiring any access privileges, reducing the risk of privilege escalation
    attacks. |

    | **Daemonless Architecture** | Buildah operates without a central daemon, minimizing
    system resource usage and simplifying architecture by treating each operation
    as a separate process. |

    | **Compatibility with Dockerfiles** | Buildah can build images from existing
    Dockerfiles, easing the transition for users familiar with Docker. |

    | **Flexibility in Image Building** | Users can build images from scratch or using
    existing images, allowing for greater customization compared to Docker. |

    | **Integration with Other Tools** | Buildah integrates well with other tools
    like Podman for running containers and Skopeo for transferring and inspecting
    images. |

    | **Fully Scriptable CLI** | Buildah’s CLI is fully scriptable, making it suitable
    for use in build and deployment pipelines. |

    | **OCI Images Support** | Buildah generates images that are fully compatible
    with OCI-compliant tools and systems. |'
