    ### 使用 Buildpack 容器化 Spring Boot 应用


    Spring Boot 2.3 引入了一项令人兴奋的新特性：对 Buildpack 的支持。借助该特性，我们可以轻松创建 Docker 镜像，而无需手动编写
    Dockerfile 或通过命令行执行复杂的 `docker build` 命令。现在，只需一个简单的命令即可完成所有操作：


    ```

    $ mvn spring-boot:build-image

    ```


    同样，对于 Gradle 爱好者：


    ```

    $ ./gradlew bootBuildImage

    ```


    需要注意的是，只有在系统上安装并运行了 Docker 时，这些命令才能正确执行。`build-image` 目标通过完全自动化 Docker 镜像的创建和快速部署，极大地简化了流程，因此开发者不再需要手动编写
    Dockerfile 或处理特别复杂的构建命令。此过程抽象了底层的许多复杂性，提供了类似于 Heroku 或 Cloud Foundry 等平台的云端部署体验。


    这种方法进一步革新了构建 Docker 镜像的方式。我们无需在不同项目的多个 Dockerfile 中进行相同的修改，而是可以根据自己的用例来定制或自定义
    Buildpack 的镜像构建器。


    除了显而易见的简洁性和改进的开发者体验外，Buildpack 还能显著提升效率。例如，Buildpack 方法自然会产生分层的 Docker 镜像，并充分利用了
    `JAR` 文件的解压版本。


    ## 总结


    本章重点介绍了如何使用 Docker 容器化 Spring Boot Java 应用。首先探讨了基础镜像，所有 Docker 容器都由此开始：选项多种多样，从官方的
    OpenJDK 镜像到非常轻量级的 Alpine Linux 版本。


    接着，我们学习了如何将简单的“Hello World”Spring Boot 应用进行 Docker 化：将应用封装到 Docker 容器中的步骤。你还对多阶段构建等高级主题以及使用
    Distroless 镜像为 Docker 镜像提供安全建议有了一定的了解。


    一个非常值得注意的特性是 Buildpack，Spring Boot 2.3 现已提供此功能。这将允许你在不编写任何 Dockerfile 的情况下使用 Docker
    镜像：只需一个简单的命令，一切就绪。这使得容器化过程变得更加容易。


    # 6. 使用 Java 应用的容器构建工具


    本章将更深入地探讨四种主要工具：Google Jib、Fabric8 Docker Maven 插件、Spotify 的 Docker-Maven-Plugin
    以及 Cloud-Native Buildpacks。每种工具都以不同的方式处理 Java 应用的容器化，从简化 Docker 镜像创建到与 Maven 构建流程无缝集成。


    ## 使用 Google Jib 构建容器镜像


    ### 理解 Jib


    Google Jib 是由 Google 开发的 Java 容器化工具，它实际上是专门为 Java 开发者量身定制的。Jib 的与众不同之处在于其简洁性。Google
    Jib 简化了 Java 开发者创建容器镜像的过程：抽象了 Docker 的复杂性，使开发者能够专注于他们的工件。Jib 智能的分层技术以及对 Distroless
    镜像的使用，使得容器化过程既高效又安全。


    以下是 Jib 的一些关键特性：


    *   Jib 消除了开发者了解 Docker 安装的需求。


    *   Jib 无需守护进程即可运行。


    *   Jib 不需要 Dockerfile。


    *   Jib 不涉及 Docker 的复杂性，例如 `docker build`、`tag` 和 `push` 等过程。


    *   使用 Jib 容器化你的 Java 应用，Java 开发者只需将 Jib 插件添加到他们选择的构建工具（Maven 或 Gradle）中，仅此而已。


    *   Jib 智能地将你的应用分成多个层。当代码发生变化时，只有受影响的层会被重建，从而显著缩短构建时间。


    Jib 将应用的源代码作为输入，并为你的应用生成一个容器镜像作为输出。


    ![](img/625177_1_En_6_Fig1_HTML.jpg)


    流程图说明了使用 Jib 创建容器镜像的过程。序列从“源代码”开始，接着是一个指向“Jib”的箭头，最后以另一个指向“容器镜像”的箭头结束。


    图 6-1


    Jib 在行动


    ### 使用 Jib 构建


    一个 Java 应用镜像通常由一个包含应用 JAR 的层来表示。然而，Jib 采用了一种特殊的构建方法，将应用分解为多个层。这种拆分方式允许进行更细粒度的增量构建。因此，更改某些代码只会重建你更改的部分，而不会涉及应用的其他部分。默认情况下，这些层被放置在一个
    OpenJDK 基础镜像之上；你也可以配置自定义的基础镜像。


    在你的 `pom.xml` 文件中，你可以为 Spring Boot 项目配置 Maven Jib 插件。以下是一个示例配置：


    ```

    ...


    ...


    com.google.cloud.tools

    jib-maven-plugin

    3.3.2


    docker.io/my-docker-id/my-app


    ...


    ...


    ```


    配置好 Maven Jib 插件后，构建容器镜像就像运行一个 Maven 命令一样简单：


    ```

    mvn compile jib:build

    ```


    此命令会编译你的项目，构建 Docker 镜像，并将其推送到指定的容器仓库。


    对于基于 Gradle 的项目，你需要在 `build.gradle` 中包含 Jib Gradle 插件：


    ```

    plugins {

    id ''com.google.cloud.tools.jib'' version ''2.7.1''

    }

    jib.to.image = ''my-docker-id/my-app''

    ```


    使用以下命令通过 Gradle 创建并推送镜像。


    ```

    ./gradlew jib

    ```


    ### 理解 Jib 镜像分层


    Jib 的镜像分层策略允许对容器镜像的组成进行细粒度控制，在容器化过程中促进增量构建和高效的资源利用。


    以下是 Jib 创建的层的分解：


    1.  **依赖层**：此层包含应用使用的外部模块和库。这确保了依赖项是独立的并且可以单独缓存，从而增强了构建中的可重用性。


    2.  **资源层**：在资源层中，Jib 包含应用资源，如配置文件、模板和静态资源。这些资源可以同时单独缓存，从而减少构建时的冗余。


    3.  **类层**：此类层包含应用的 Java 实际编译类。每次代码更改时，只需重建此层，这大大加快了构建速度。


    4.  **快照依赖层**：Jib 为所有那些偶尔更改或属于快照的依赖项专门分配了一个精确的层。


    5.  **自定义层**：开发者提供的任何额外目录（通常通过配置提供）都可以转化为它们自己的层。


    这种清晰的层分离帮助 Jib 通过将应用分解为这些不同的层来优化构建过程。当发生更改时，只有受影响的层需要被重建并推送到仓库；其他层不受影响，从而实现更快、更高效的容器镜像更新。


    这有助于加快构建速度以及资源的使用方式。它确保只重建和推送必要的部分，从而保持容器镜像本身的大小最小化。


    ![](img/625177_1_En_6_Fig2_HTML.jpg)


    一个图表显示了六个重叠的彩色层堆叠。从上到下，这些层被标记为：依赖、类、资源、快照和自定义。每个标签都通过一个指向右侧的箭头连接到其对应的层。这些层在粉色和青色之间交替颜色。


    图 6-2


    Jib 镜像层

