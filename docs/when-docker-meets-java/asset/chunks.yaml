- fmt: '### Setting Up a Java Project


    Let’s discuss how to create a Java application build pipeline using GitHub Actions.
    Before we begin with GitHub Actions, make sure you have a Java project on GitHub.
    For this example, we will use a simple Java application built with Maven.


    First, you need to define the workflow. Workflows are custom automated processes
    we set up in your repository to build, test, package, or deploy any code project
    on GitHub.


    1. In our GitHub repository, navigate to the `Actions` tab. Click `Java with Maven`
    template or set up a workflow yourself.


    ![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig3_HTML.jpg)


    The image shows a GitHub Actions setup page with a focus on getting started. It
    includes a navigation bar with options like Code, Issues, and Actions. The main
    section encourages users to build, test, and deploy code using GitHub Actions,
    with a prompt to set up a workflow. Below, there are suggested workflows for the
    repository, including options like "Docker image," "Publish Java Package with
    Maven," and "Java with Maven," each with a brief description and a "Configure"
    button. A pink arrow points to the "Java with Maven" option.


    Figure 7-3: Setting up actions


    2. This opens the workflow editor. Here, we write our build steps.


    ```

    # This workflow will build a Java project with Maven, and cache/restore any dependencies
    to improve the workflow execution time

    name: Java CI with Maven

    on:

    push:

    branches: [ "main" ]

    pull_request:

    branches: [ "main" ]

    jobs:

    build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Set up JDK 17

    uses: actions/setup-java@v3

    with:

    java-version: ''17''

    distribution: ''temurin''

    cache: maven

    - name: Build with Maven

    run: mvn -B package --file pom.xml

    ```


    Workflow file


    3. Testing is a crucial aspect of the CI process. We should incorporate tests
    in our workflow to ensure code quality:


    ```

    - name: Test with Maven

    run: mvn test

    ```


    This step runs after the build and executes all unit tests in the project.


    4. Building and testing can be time-consuming, primarily due to dependencies.
    To speed up the process, cache the dependencies:


    ```

    - name: Cache Maven packages

    uses: actions/cache@v2

    with:

    path: ~/.m2

    key: ${{ runner.os }}-m2-${{ hashFiles(''**/pom.xml'') }}

    restore-keys: ${{ runner.os }}-m2

    ```


    This caches the Maven packages, reducing the need to fetch them for every build.


    5. Commit changes. This will trigger the workflow.


    ![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig4_HTML.jpg)


    Two buttons are displayed. The first button on the left is dark with white text
    that reads "Cancel changes." The second button on the right is bright green with
    white text that reads "Commit changes..."


    Figure 7-4: Committing changes


    6. Workflow completed.


    ![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig5_HTML.jpg)


    GitHub Actions interface showing a successful build for "Update maven.yml #2"
    in a Java CI with Maven workflow. The build process includes steps like setting
    up the job, running `actions/checkout@v3`, setting up JDK 17, building with Maven,
    and completing the job. Each step has a duration, with the entire process taking
    39 seconds. The interface includes options for summary, usage, and workflow file
    details.


    Figure 7-5: Workflow completion


    Remember, although the guide describes a minimal Java application with Maven,
    there is still a lot of flexibility within GitHub Actions. Tailor the instructions
    to the requirements of different build tools or deployment targets. Then take
    full advantage of the power of automation for your Java projects.


    ## Containerizing Java Application Using Docker GitHub Action


    Let us go through the steps to containerize a Java application using GitHub Actions
    and Docker.


    ### Understanding the Process


    This process starts with a `Dockerfile` for the Java application, defining the
    environment and instructions to build a container image. Lastly, GitHub Actions
    workflows are defined to automate the execution of this process every time any
    change is pushed to the repository.


    ![](images/625177_1_En_7_Chapter/625177_1_En_7_Fig6_HTML.jpg)


    Flowchart illustrating a CI/CD pipeline using GitHub Actions. The process starts
    with "GitHub Actions," followed by "Build Docker Image," then "Docker Image Built,"
    continues with "Push to DockerHub," and ends with "DockerHub." Each step is connected
    by arrows, indicating the sequence of actions.


    Figure 7-6: GitHub Action docker flow


    ### Writing a Dockerfile


    A `Dockerfile` is a script with various commands to create a Docker image. For
    a Java application, a typical `Dockerfile` might look something like this:


    ```

    # Use a base JDK image from Docker Hub

    FROM openjdk:17-jdk

    # Set the working directory inside the container

    WORKDIR /app

    # Copy the Maven build file and source code

    COPY pom.xml .

    COPY src /app/src

    # Build the application

    RUN mvn clean package

    # Expose the port the application runs on

    EXPOSE 8080

    # Run the jar file

    CMD ["java", "-jar", "target/myapp-1.0-SNAPSHOT.jar"]

    ```


    ### Setting Up Github Actions


    GitHub Actions is an automation tool that allows us to run workflows based on
    events such as a push to a repository. Adding GitHub Actions to our Java application
    requires creating the directory `.github/workflows` in our repository and placing
    within it a YAML file describing our workflow:


    ```

    name: Java CI with Docker

    on:

    push:

    branches: [ main ]

    jobs:

    build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v2

    - name: Set up JDK 17

    uses: actions/setup-java@v2

    with:

    java-version: ''17''

    distribution: ''adopt''

    - name: Build with Maven

    run: mvn clean install

    - name: Build Docker Image

    run: docker build -t my-java-app .

    - name: Push Docker Image to Registry

    run: |

    echo ${{ secrets.DOCKER_HUB_PASSWORD }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME
    }} --password-stdin

    docker tag my-java-app ${{ secrets.DOCKER_HUB_USERNAME }}/my-java-app:latest

    ```


    GitHub action docker workflow yaml file


    This workflow does the following:


    **Checkout code**: Grabs the latest code from the main branch.


    ```

    - uses: actions/checkout@v2

    ```


    **Set up jdk**: Configures the JDK for the runner environment.


    ```

    - name: Set up JDK 17

    uses: actions/setup-java@v2

    with:

    java-version: ''17''

    distribution: ''adopt''

    ```


    **Build with maven**: Compiles the Java application and runs any tests.


    ```

    - name: Build with Maven

    run: mvn clean install

    ```


    **Build docker image**: Constructs the Docker image using the `Dockerfile`.


    ```

    - name: Build Docker Image

    run: docker build -t my-java-app .

    ```


    **Push to docker registry**: After the image is successfully created, it’s tagged
    and then pushed to Docker Hub.


    ```

    - name: Push Docker Image to Registry

    run: |

    echo ${{ secrets.DOCKER_HUB_PASSWORD }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME
    }} --password-stdin

    docker tag my-java-app ${{ secrets.DOCKER_HUB_USERNAME }}/my-java-app:latest

    docker push ${{ secrets.DOCKER_HUB_USERNAME }}/my-java-app:latest

    ```


    The `${{ secrets.DOCKER_HUB_USERNAME }}` and `${{ secrets.DOCKER_HUB_PASSWORD
    }}` are GitHub secrets that you set in your repository settings for secure authentication
    to the Docker registry.


    By containerizing your Java application using GitHub Actions and Docker, you automate
    your build and deployment process, which enhances productivity and reduces the
    chance of human error. This CI/CD approach ensures our development team can focus
    on what they do best—writing code not worrying about deployment intricacies. Moreover,
    the portability of Docker ensures that the Java application can be run on any
    machine without the “it works on my machine” syndrome.'
