  trans: "\n## 容器初始化\n\n在你的测试类中使用 Testcontainers 的工具类创建容器实例。例如，如果你想启动一个内存中的 Redis\
    \ 缓存实例：\n\n```\n@Testcontainers\n@SpringBootTest\nclass DemoApplicationTests {\n\
    @Container\n@ServiceConnection\nstatic RedisContainer container = new RedisContainer(RedisContainer.DEFAULT_IMAGE_NAME);\n\
    @Test\nvoid myTest() {\nSystem.out.println(container.isRunning());\nSystem.out.println(container.getRedisURI());\n\
    }\n}\n```\n\n这段代码演示了 Testcontainers 与 Spring Boot 的集成，展示了如何在测试场景中使用 Redis 容器。以下是代码各部分的详细说明：\n\
    \n*   `@Testcontainers`：此注解表明该测试类将使用 Testcontainers。它允许我们管理测试类中使用的容器的生命周期。\n\n\
    *   `@SpringBootTest`：表明这是一个 Spring Boot 测试。它会加载完整的应用程序上下文，并允许与 Spring 组件进行集成测试。\n\
    \n*   `@Container`：此注解将一个字段标记为由 Testcontainers 管理的容器。在此例中，它声明了一个类型为 `RedisContainer`\
    \ 的静态字段 `container`。`RedisContainer` 使用默认的 Redis 镜像名称（`RedisContainer.DEFAULT_IMAGE_NAME`）进行实例化，该镜像从\
    \ DockerHub 仓库拉取。\n\n*   `@ServiceConnection`：促进 Spring Boot 的自动配置，以动态地注册所有必需的属性。在后台，此注解从容器类或\
    \ Docker 镜像名称中识别出必要的属性。\n\n*   `myTest()`：这是一个使用 `@Test` 注解的测试方法。在此方法内部：\n   \
    \ *   `container.isRunning()` 打印 Redis 容器是否正在运行。\n    *   `container.getRedisURI()`\
    \ 检索并打印正在运行的 Redis 容器的 URI。\n\n这段代码设置了一个测试类，利用 Testcontainers 来管理 Redis 容器。它演示了检查容器是否正在运行以及检索其\
    \ URI 等基本功能。这允许进行集成测试，确保应用程序能够与由 Testcontainers 管理的 Redis 实例正常工作。\n\n以下是我们如何修改之前手动创建\
    \ Redis 集群的示例，以使用 `RedisContainer`——一个来自 testcontainers-java 库的专用 Redis 容器类。\n\
    \n```\n@SpringBootTest\n@Testcontainers\npublic class EmployeeRepositoryIntegrationTest\
    \ {\n@Container\n@ServiceConnection\nstatic RedisContainer redis = new RedisContainer(DockerImageName.parse(\"\
    redis:latest\"));\n@Autowired\nprivate EmployeeRepository employeeRepository;\n\
    @Test\npublic void testEmployeeRepository() {\nEmployee employee = new Employee(1L,\
    \ \"John Doe\", \"Developer\");\nemployeeRepository.save(employee);\nOptional\
    \ foundEmployee = employeeRepository.findById(employee.getId());\nassertTrue(foundEmployee.isPresent(),\
    \ \"Employee should be found\");\nassertEquals(employee.getName(), foundEmployee.get().getName(),\
    \ \"Employee names should match\");\n}\n}\n```\n\n这种方法有几个优点：\n\n*   Testcontainers\
    \ 将自动启动一个 Redis 容器。\n*   对于容器化的 Redis 实例，无需 `application-test.properties` 文件。\n\
    *   无需本地安装 Redis。\n*   你将获得一个一致且隔离的测试环境。\n*   Testcontainers 会自动清理资源。\n*   测试套件在任何环境（本地、CI）中都能以相同的方式工作。\n\
    \n## 总结\n\n本章涵盖了 Testcontainers 的基础知识以及如何在 Java 中使用它，重点在于 Spring Boot 集成测试。它首先解释了\
    \ Testcontainers 背后的核心概念、其必要性以及主要特性：支持多种容器、与 JUnit 集成以及自动资源管理。然后，深入探讨了实现细节，重点介绍了\
    \ Spring Boot 应用程序在单元和集成级别的测试策略。\n\n本章提供了设置和使用 Testcontainers 的实践示例，并通过详细说明所需的配置步骤，演示了与\
    \ Redis 容器的集成。本章的主要重点在于，与传统的测试方式相比，Testcontainers 方法在实现环境一致性、可移植性和高效资源利用方面的优势。还涵盖了实践实现指南，例如依赖项设置和正确的注解使用，以便开发人员全面了解如何利用\
    \ Testcontainers 来获得更可靠、更易于维护的集成测试。\n\n# 11. Java 开发者的 Docker 最佳实践\n\n掌握适用于 Java\
    \ 应用程序的 Docker 最佳实践和策略\n\nDocker 已成为现代 Java 开发中不可或缺的一部分，它提供了一致、可移植且高效的方式来打包和部署应用程序。对于\
    \ Java 开发者来说，掌握 Docker 的最佳实践对于创建优化、安全且可用于生产的容器化应用程序至关重要。本章展示了如何有效地将 Docker 与 Java\
    \ 应用程序结合使用，详细介绍了在影响容器性能、安全性和效率的重要领域中的技术和策略。\n\n本章讨论的实践解决了 Java 开发者在容器化其应用程序时面临的常见挑战，从管理构建流程和运行时环境，到优化资源使用和确保安全性。这些源自实际经验和行业标准的最佳实践，为开发既健壮又易于维护的容器化\
    \ Java 应用程序奠定了坚实的基础。\n\n## 实施多阶段构建\n\nDocker 中的多阶段构建是一项强大的技术，它允许开发者通过在一个 `Dockerfile`\
    \ 中使用多个阶段（每个阶段都有自己的基础镜像）来创建精简且安全的镜像。我们可以显著减小最终镜像的大小并最大限度地减少其攻击面，使其更加安全。\n\n###\
    \ 理解多阶段构建\n\n**分离构建阶段：** 一个多阶段 Dockerfile 被划分为多个部分，每个部分都以一个 `FROM` 语句开始。这些部分被称为阶段。我们可以根据需要设置任意数量的阶段，并且每个阶段可以使用不同的基础镜像。\n\
    \n**分层构建：** 每个阶段都基于前一阶段的层进行构建。这意味着我们可以在较早的阶段中使用包含所有构建依赖项的基础镜像来编译或构建我们的应用程序，然后仅将所需的工件复制到使用更精简基础镜像的后续阶段中。\n\
    \n**阶段间工件传输：** 我们可以使用 `COPY --from=<stage>` 命令将工件从一个阶段复制到另一个阶段。这通常用于将编译后的应用程序从构建阶段移动到更小的运行时阶段。\n\
    \n**丢弃中间层：** 一旦最终镜像构建完成，先前阶段中创建的所有中间层都将被丢弃。这会产生一个小得多的最终镜像，其中仅包含运行应用程序所需的内容。\n\n\
    **减小镜像大小和安全风险：** 在初始阶段编译和构建应用程序，并仅将必要的工件复制到最终阶段，可以最大限度地减小最终镜像的大小。更小的镜像包含更少的组件，这意味着潜在漏洞更少，攻击面也更小。\n\
    \n### 创建一个基本的多阶段构建 Dockerfile\n\n**从构建阶段开始：** 使用基础镜像 `maven:3.6.3-jdk-11` 或其他适合你\
    \ Java 项目的镜像。添加源代码和任何必需的构建工具。\n\n**编译 Java 代码：** 执行构建命令（例如 `mvn clean package`）来编译\
    \ Java 应用程序。\n\n**设置运行时阶段：** 为运行时使用更精简的基础镜像 `openjdk:11-jre-slim`。从构建阶段复制编译好的\
    \ JAR 文件或类。\n\n**将编译后的代码复制到运行时阶段：** 使用 `COPY --from=build_stage /path/to/compiled/artifact\
    \ /path/in/runtime/image` 命令复制必要的文件。\n"
- fmt: '### Best Practices


    **Tips on organizing stages:** Name each stage for clarity (e.g., `FROM maven:3.6.3-jdk-11
    as builder`). Keep the build stage clean and focus only on what’s necessary to
    compile the code.


    **Minimizing layers and cache usage:** Minimize the number of layers by combining
    commands where possible. Leverage Docker’s build cache by organizing commands
    of least to most likely to change.


    ### Example


    **Stage 1. Build:** Using Maven image, add source code, and run `mvn package`.


    **Stage 2. Runtime:** Using the JRE image, copy the JAR file from the build stage.


    **Dockerfile structure:**


    ```

    # Build stage

    FROM maven:3.6.3-jdk-11 as builder

    WORKDIR /app

    COPY . .

    RUN mvn clean package

    # Runtime stage

    FROM openjdk:11-jre-slim

    COPY --from=builder /app/target/myapp.jar /usr/local/lib/myapp.jar

    ENTRYPOINT ["java","-jar","/usr/local/lib/myapp.jar"]

    ```


    Multistage builds are crucial for building light and secure Docker images for
    Java applications. Separation of the build and runtime environments can greatly
    reduce the size of the final image and minimize the security vulnerabilities that
    come with large and bloated images. That is a technique any serious Java developer
    should find invaluable in using Docker.


    ## Creating Slimmer Container Images with Java Jlink


    `jlink`, which was introduced in Java 9 as part of the Java Platform Module System,
    is a tool that allows users to create a custom Java runtime image containing only
    modules relevant to a particular application. Tailoring the runtime environment
    allows users to realize various important benefits, especially in terms of deployment
    in constrained environments, such as in containers.


    ### Key Features and Benefits of jlink


    - **Custom runtime images:** You can build a smaller, optimized Java runtime specifically
    to your application, including just the modules necessary and reducing runtime
    size as opposed to that of a normal Java Runtime Environment.

    - **Performance optimization:** Application startup can be faster and reduce the
    number of system resources used; this is valuable in a cloud and microservices
    setup.

    - **Enhanced security:** You reduce the surface area for security vulnerabilities
    by including only the modules that are required. Fewer modules mean fewer potential
    points of attack.

    - **Modularization:** `jlink` works with the module system introduced in Java
    9. This system allows for better encapsulation and more organized dependency management
    in Java applications.


    ### Knowing jlink


    - **Modules identification:** `jlink` works in terms of modules. Identify which
    modules are needed for your application. Analyze dependencies using tools such
    as `jdeps`.

    - **Custom runtime creation:** Now, once you have identified which modules are
    needed, you create a runtime image by including those modules using the `jlink`
    command. That’s a self-contained environment for running your application; no
    other installation of Java is needed to run it.

    - **Command line usage:** `jlink` is used via the command line, where you specify
    the modules to include and other options, such as compression level or the output
    directory.


    The following command creates a custom Java runtime image that includes only the
    specified Java platform modules and our modules, which is ideal for making small
    and efficient runtime environments for our Java applications.


    ```

    jlink --module-path $JAVA_HOME/jmods:path/to/your/modules --add-modules com.example.yourmodule
    --output path/to/output/directory

    ```


    In this command:


    - `--module-path:` This option specifies the module path. The module path is a
    list of directories that `jlink` searches for module definitions. In this command,
    `$JAVA_HOME/jmods` the path to the `jmods` directory is in the Java home directory.
    The `jmods` directory contains definitions for the Java platform modules. And
    `path/to/your/modules` path would replace this with the path to any additional
    modules we want to include in our runtime image that isn’t part of the standard
    Java distribution.

    - `--add-modules:` This option specifies the modules to add to the custom runtime
    image. In this case, `com.example.yourmodule` is the module name we want to include.
    We would replace `com.example.yourmodule` it with the actual name of the modules
    we have.

    - `--output:` This specifies the path to the directory where the custom runtime
    image will be created. We would replace `path/to/output/directory` with the path
    where we want the runtime image to be saved.


    The following diagram shows the critical steps involved in the `jlink` process.


    ![](images/625177_1_En_11_Chapter/625177_1_En_11_Fig1_HTML.jpg)


    Flowchart illustrating the process of creating a custom Java runtime image using
    jlink. The steps include: "Start: Invoke jlink," "Specify Module Path" with a
    note indicating it includes JDK and application modules, "Define Required Modules"
    with a note about modules to include in the runtime, "Customization Options,"
    "Create Runtime Image," and finally, "Custom Java Runtime Image." The chart includes
    legends explaining the module path and required modules.


    Figure 11-1


    jlink Java runtime image creation flow


    ### Use Cases for jlink


    - **Containerized applications:** Especially designed for Docker and other container
    platforms where image size affects performance considerably as well as resource
    usage.

    - **Creating minimal runtime environments:** Applications that only require a
    subset of the Java platform modules can create a runtime much smaller than the
    standard runtime. This is very helpful for microservices, serverless functions,
    or for any application where a small footprint is desirable.

    - **IoT and embedded systems:** Useful in environments with limited resources,
    such as IoT devices or embedded systems.

    - **Security:** Only necessary modules included, jlink reduces the surface area
    of security vulnerabilities. Applications are less prone to exploits that target
    modules that they do not even have.

    - **Faster startup time:** A smaller runtime can contribute to faster application
    startup times, which is particularly advantageous for desktop applications and
    tools that benefit from quick launch times.


    ### Step-by-Step Guide


    Using Jlink in Dockerfile


    - **Identify necessary modules:** Determine your application’s required modules.

    - **Create a Jlink Script:** Incorporate a script in your Dockerfile to execute
    Jlink with the identified modules.

    - **Assemble the runtime image:** Use Jlink to create the custom runtime.


    Selecting necessary Java modules


    - Use tools like `jdeps` to analyze your application’s module dependencies.

    - Include these modules in your Jlink command in the runtime image.


    ### Best Practices


    - **Minimal module set:** Only include the necessary modules.

    - **Compress the image:** Use Jlink’s compression options to reduce the size further.

    - **Layered Docker images:** Structure your Dockerfile to leverage Docker layer
    caching effectively.'
