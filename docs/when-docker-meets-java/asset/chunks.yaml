    Docker. Commands issued from the CLI are transmitted to the Docker daemon using
    these communication channels. In Java, JShell allows developers to enter and execute
    Java code snippets interactively, and the Docker CLI enables developers to execute
    commands for managing Docker components.


    #### Docker Container


    A Docker container is like an instance of a Java class. It’s a runnable environment
    created from a Docker image, similar to how objects are created from a class in
    Java. Each container is isolated and runs its application or service.


    #### Docker Daemon


    Docker daemon acts as the Docker core component, like the central nervous system.
    It runs as a background service in the host system and is responsible for executing
    the commands—like `docker build`, `docker pull`, and `docker run`—issued through
    the Docker CLI. It’s comparable to a JVM running in the background. It is responsible
    for running and managing Docker containers, similar to the way in which the JVM
    manages the execution of Java applications.


    #### Docker Hub


    Docker Hub is the image repository where we can store, share, and manage container
    images. Think of a Docker Hub as a central repository for storing Docker images,
    similar to how Maven Central Repository stores Java libraries. Docker Hub, for
    example, is like a Maven repository for Docker images.


    #### Docker Compose


    As application developers, in most cases we would be dealing with applications
    comprising several components, such as a front-end API and a back-end API. Say,
    for example, that the application requires extra features such as an Nginx web
    server and a database that the back-end API uses to serve data back to the front-end
    API. Running and managing these varied components as separate containers can get
    very tricky, with several Docker commands needed to assure the running of the
    entire application cohesively. To solve this problem, in comes Docker Compose.
    Docker Compose is a tool for running multiple containers, so they all work together
    in harmony. This is done through the definition of services using a docker-compose.yml
    file, outlining the configuration and dependencies of various containers needed
    for an application. It will be possible to efficiently streamline running and
    management of the whole application stack using Docker Compose.


    It’s much more of a Java build tool, such as Maven or Gradle. In Maven, for example,
    a configuration file named `pom.xml` holds the configuration of a project and
    its dependencies; similarly to Docker, in Docker, there is also one configuration
    file, usually `docker-compose.yml`, that defines multicontainer Docker applications.


    A Sample `docker-compose.yml` file.


    ```

    version: ''3''

    services:

    app:

    build: .

    image: my-java-app

    ports:

    - "8080:8080"

    environment:

    - SPRING_PROFILES_ACTIVE=prod

    ```


    Here is an image illustrating Docker concepts.


    ![](images/625177_1_En_2_Chapter/625177_1_En_2_Fig3_HTML.jpg)


    Diagram illustrating Docker concepts. It shows relationships between components:
    Dockerfile defines DockerImage, DockerHub manages image storage, DockerCLI manages
    DockerContainer, DockerDaemon manages DockerEngine, and DockerCompose orchestrates
    services into MultiContainer.


    Figure 2-3


    Docker concepts and their relationships


    In other words, what Docker knowledge for Java developers can be easier if one
    finds a way to compare it to the most familiar principles of Java. So, Dockerfile
    is much like a definition of a Java class with instructions regarding how to build
    a Docker image. A Docker image does for an application, runtime libraries, and
    dependencies what a JAR file does. The Docker CLI is the primary interface to
    interact with Docker, and Docker daemon acts as its central nervous system. Docker
    Hub is for image storage, sharing, and management. Docker Compose enables orchestrating
    several containers working together seamlessly, like Java build tools, for configuration
    and dependency management across projects.


    ### Summary


    The chapter introduces Docker as an open source container management tool that
    has revolutionized the way applications are packaged and deployed. It explains
    Docker’s core principle of “Build Once, Run Anywhere” (BORA), which ensures consistent
    application behavior across different environments, in contrast to the common
    “It works on my machine” problem.


    Then the chapter clarifies what Docker is not—a virtualization technology, or
    a container orchestrator, or a virtual machine, or the only method for containerizing
    applications. These descriptions help differentiate Docker from related but quite
    different concepts.


    Then, it goes into how Docker works with its client-server architecture around
    the Docker Engine. It explains how the Docker CLI communicates with the Docker
    daemon to run commands like build, tag, push, pull, and run.


    In the section about Docker Desktop, it explains how GUI application meant to
    make life easier using Docker on macOS and Windows: simplified containerization,
    scanning images, multicontainer support for numerous system architectures, and
    integration into tools such as Kubernetes.


    The last part of the chapter introduces key Docker concepts and draws comparisons
    with well-known Java development principles. It explains how a Docker file is
    similar to the definition of a Java class, an image in Docker is akin to a JAR
    file, the CLI in Docker is similar to JShell, a container in Docker is similar
    to a Java object, a daemon in Docker is equivalent to a JVM, a Docker Hub is similar
    to Maven Central, and Compose in Docker is like the build tools in Java, for instance,
    Maven or Gradle.


    # 3. Up and Running with Docker


    Among the many tools available for application packaging and deployment, Docker
    is one of the most important in containerization. One of the key elements in this
    process is the Dockerfile, which represents a blueprint of the configuration,
    dependencies, and steps followed to build a Docker image. It consists of several
    instructions that allow us to build containers using the `docker build` command.'
