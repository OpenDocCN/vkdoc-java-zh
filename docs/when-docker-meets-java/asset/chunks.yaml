- fmt: "### Managing a Docker Image\n\nManagement of Docker images comprises several\
    \ activities that one needs to do to handle the images efficiently in our containerized\
    \ applications. Here are a few ways that we can manage Docker images:\n\n- **Search\
    \ image**: The command `docker search` followed by a keyword shall show the available\
    \ images in any registry.\n- **Delete images**: This is done via the `docker rmi\
    \ image_name:tag` command. We cannot delete an image if there are running containers\
    \ based on this image. The `-f` flag forces removal.\n- **Cleanup unused images**:\
    \ Unused images can accumulate over time. All dangling, or unused, images are\
    \ removed via `docker image prune`.\n- **Image history**: See what makes up an\
    \ image, that is, layers, and see the commands used to build a given image via\
    \ `docker history image_name`.\n- **Image pruning**: The `docker system prune`\
    \ removes all unused images, containers, and networks. Note that it removes all\
    \ unused data.\n- **Image scanning**: Docker security scanning is a feature of\
    \ Docker that enables us to discover vulnerabilities in the components—software\
    \ packages, libraries, etc.—of our Docker images.\n\nThere are several operations\
    \ that we can perform on Docker images to manage them efficiently. These include\
    \ searching for available images in a registry by using the `docker search` command,\
    \ deleting images by using the `docker rmi` command, removing unused images with\
    \ `docker image prune`, checking an image’s history with the `docker history`\
    \ command, and lastly, `docker system prune` to remove all unused images, containers,\
    \ and networks. These are tasks that can help manage Docker images effectively\
    \ and aid the smooth functioning of containerized applications.\n\n### Summary\n\
    \nThis chapter gives a comprehensive guide to understanding and working with Docker,\
    \ focusing on Dockerfiles and container management. It introduces Dockerfiles\
    \ as blueprints for building container images, detailing key commands like `FROM`,\
    \ `RUN`, `CMD`, `COPY`, and `EXPOSE`. Best practices include optimizing image\
    \ size, managing secrets, and using multi-stage builds.\n\nThe chapter explains\
    \ the image-building process, tagging strategies, and steps for pushing, pulling,\
    \ and running images. It talks about debugging, image management, and commands\
    \ to inspect and clean up resources.\n\nThe chapter also highlights common mistakes\
    \ such as wrong port mapping, resource mismanagement, and security oversights\
    \ and focuses on scanning images and protection of sensitive data.\n\nIn the end,\
    \ the chapter summarizes the benefits of using Docker, such as having consistent\
    \ environments, simplified distribution, scalability, and resource usage.\n\n\
    # 4. Learning Advanced Docker Concepts\n\nDiscover how Docker containers communicate\
    \ and explore various Docker networking drivers. Learn how to enable data persistence\
    \ with containers using docker volumes. Know how to create, configure, and manage\
    \ multicontainer applications with Docker.\n\n## Exploring Docker’s Networking\n\
    \nNetworking is about communication between processes, and Docker’s networking\
    \ functions similarly. Docker networking mainly involves facilitating interaction\
    \ between Docker containers and the external world through the host machine on\
    \ which the Docker daemon operates.\n\nDocker supports diverse network types,\
    \ each tailored for specific usage scenarios. We’ll delve into Docker’s supported\
    \ network drivers in general, accompanied by code examples.\n\n### Docker’s Networking\
    \ vs. VM Networking\n\nDocker’s networking diverges from networking in virtual\
    \ machines (VMs) or physical machines in several ways:\n\nHere’s the information\
    \ presented in a tabular format.\n\n| Feature | VMs | Docker |\n| --- | --- |\
    \ --- |\n| **Networking Configurations** | Supports flexible configurations like\
    \ NAT and host networking. | Primarily uses a bridge network; host networking\
    \ is mostly supported on Linux. |\n| **Network Isolation** | Separate networking\
    \ stack for each VM. | Achieved via a network namespace. |\n| **Scale of Networking**\
    \ | Hosts fewer processes per VM, simplifying networking requirements. | Handles\
    \ numerous containers on a single host, requiring robust networking support. |\n\
    \n## Types of Docker Network Drivers\n\nDocker simplifies container communication\
    \ by creating a default bridge network, sparing users from grappling with networking\
    \ intricacies and allowing them to concentrate on container creation and operation.\
    \ While this default bridge network suffices in most cases, alternatives exist.\n\
    \nDocker presents three primary network drivers out of the box:\n\n- `bridge`\n\
    - `host`\n- `none`\n\nHowever, since these might only suit some context, we’ll\
    \ also delve into user-defined networks like `overlay` and `macvlan`. Let’s examine\
    \ each in more detail.\n\n### Bridge Driver\n\nThis serves as the default driver.\
    \ When we initiate Docker, a bridge network is established, and all newly launched\
    \ containers will automatically connect to this default bridge network.\n\nWe\
    \ can employ this when we want isolated containers to communicate internally.\
    \ Given the segregation of containers, the bridge network effectively resolves\
    \ port conflicts. It resolves port conflicts by providing each container with\
    \ its internal IP address within the bridge network’s subnet. Containers within\
    \ the same bridge network can interact, while Docker utilizes `iptables` on the\
    \ host machine to restrict access beyond the bridge.\n\nFollowing is an example\
    \ describing how the bridge network driver operates:\n\n- Check available networks\
    \ using the `docker network ls` command.\n- Launch two detached `busybox` (BusyBox\
    \ a lightweight container provides a single executable file that contains many\
    \ common Unix utilities, such as `ls`, `cat`, and `echo`, making it ideal for\
    \ environments where storage and resources are limited) containers, naming them\
    \ `container1` and `container2`, using the `docker run -dit` command.\n\n  Here,\
    \ in `-dit` flag `d` is for detached mode, and `it` ensures that bash or `sh`\
    \ can be allocated to a pseudo-terminal.\n\n  ```\n  docker run -dit --name container1\
    \ busybox /bin/sh\n  docker run -dit --name container2 busybox /bin/sh\n  ```\n\
    \n- Verify that the containers are up and running using the `docker ps`.\n\n \
    \ ```\n  $ docker ps\n  CONTAINER ID   IMAGE     COMMAND     CREATED         \
    \ STATUS          PORTS     NAMES\n  8a6464e82c4u   busybox   \"/bin/sh\"   6\
    \ seconds ago    Up 6 seconds              container2\n  9bea14032749   busybox\
    \   \"/bin/sh\"   28 seconds ago   Up 28 seconds             container1\n  ```\n\
    \n  In Docker, the `PORTS` section in the output of `docker ps` is empty when\
    \ the containers are started with the `-d` (detached) option and do not explicitly\
    \ expose or publish any ports.\n\n- Confirm that the containers are connected\
    \ to the bridge network with the `docker network inspect bridge`. Note down the\
    \ IP addresses of both containers.\n- Attach to **container1** using `docker attach`\
    \ command and attempt to ping the **container2** using its IP address.\n\n  ```\n\
    \  $ docker attach container1\n  / # whoami\n  root\n  / # hostname -i\n  182.18.0.2\n\
    \  / # ping 182.18.0.3\n  PING 182.18.0.3 (182.18.0.3): 56 data bytes\n  64 bytes\
    \ from 182.18.0.3: seq=0 ttl=64 time=2.083 ms\n  64 bytes from 182.18.0.3: seq=1\
    \ ttl=64 time=0.144 ms\n  ```\n\n- Please remember that we don’t recommend using\
    \ the bridge driver for production scenarios. It is ideal for single-host setups\
    \ where all containers run on the same Docker host.\n- Communication between containers\
    \ relies on IP addresses rather than automatic service discovery for translating\
    \ IP addresses to container names.\n- The bridge driver can also permit unrelated\
    \ containers to communicate, potentially posing a security hazard."
