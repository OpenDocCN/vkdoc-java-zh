  trans: "\n### 管理 Docker 镜像\n\nDocker 镜像的管理包含一系列操作，旨在高效处理容器化应用中的镜像。以下是管理 Docker 镜像的几种方式：\n\
    \n*   **搜索镜像**：使用 `docker search` 命令后跟关键词，即可显示任何仓库中的可用镜像。\n\n*   **删除镜像**：通过 `docker\
    \ rmi image_name:tag` 命令完成。如果存在基于该镜像运行的容器，则无法删除。`-f` 标志可强制删除。\n\n*   **清理未使用的镜像**：未使用的镜像会随时间累积。所有悬空或未使用的镜像可通过\
    \ `docker image prune` 移除。\n\n*   **镜像历史**：通过 `docker history image_name` 查看镜像的构成（即各层）以及构建该镜像所使用的命令。\n\
    \n*   **镜像修剪**：`docker system prune` 会移除所有未使用的镜像、容器和网络。请注意，它会删除所有未使用的数据。\n\n*\
    \   **镜像扫描**：Docker 安全扫描是 Docker 的一项功能，使我们能够发现 Docker 镜像组件（如软件包、库等）中的漏洞。\n\n我们可以对\
    \ Docker 镜像执行多种操作来高效管理它们。这些操作包括：使用 `docker search` 命令在仓库中搜索可用镜像、使用 `docker rmi`\
    \ 命令删除镜像、使用 `docker image prune` 移除未使用的镜像、使用 `docker history` 命令检查镜像历史，以及最后使用\
    \ `docker system prune` 移除所有未使用的镜像、容器和网络。这些任务有助于有效管理 Docker 镜像，并确保容器化应用的平稳运行。\n\
    \n### 总结\n\n本章提供了理解和操作 Docker 的全面指南，重点介绍了 Dockerfile 和容器管理。它将 Dockerfile 介绍为构建容器镜像的蓝图，并详细说明了\
    \ `FROM`、`RUN`、`CMD`、`COPY` 和 `EXPOSE` 等关键命令。最佳实践包括优化镜像大小、管理密钥以及使用多阶段构建。\n\n本章解释了镜像构建过程、标记策略，以及推送、拉取和运行镜像的步骤。它还讨论了调试、镜像管理以及检查和清理资源的命令。\n\
    \n本章还强调了常见错误，例如端口映射错误、资源管理不当和安全疏忽，并重点介绍了镜像扫描和敏感数据保护。\n\n最后，本章总结了使用 Docker 的优势，例如拥有一致的环境、简化分发、可扩展性和资源利用。\n\
    \n# 4. 学习高级 Docker 概念\n\n了解 Docker 容器如何通信，并探索各种 Docker 网络驱动。学习如何使用 Docker 卷实现容器的数据持久化。了解如何使用\
    \ Docker 创建、配置和管理多容器应用。\n\n## 探索 Docker 的网络\n\n网络关乎进程间的通信，Docker 的网络功能与之类似。Docker\
    \ 网络主要涉及通过运行 Docker 守护进程的主机，促进 Docker 容器与外部世界之间的交互。\n\nDocker 支持多种网络类型，每种类型都针对特定的使用场景而设计。我们将结合代码示例，深入探讨\
    \ Docker 支持的通用网络驱动。\n\n### Docker 网络与虚拟机网络的对比\n\nDocker 的网络与虚拟机或物理机的网络在以下几个方面有所不同：\n\
    \n以下信息以表格形式呈现。\n\n| 特性 | 虚拟机 | Docker |\n| --- | --- | --- |\n| **网络配置** | 支持灵活配置，如\
    \ NAT 和主机网络。 | 主要使用桥接网络；主机网络主要在 Linux 上支持。 |\n| **网络隔离** | 每个虚拟机拥有独立的网络栈。 | 通过网络命名空间实现。\
    \ |\n| **网络规模** | 每个虚拟机承载的进程较少，网络需求简单。 | 单个主机上处理大量容器，需要强大的网络支持。 |\n\n## Docker\
    \ 网络驱动的类型\n\nDocker 通过创建一个默认的桥接网络来简化容器通信，使用户无需处理复杂的网络细节，可以专注于容器的创建和运行。虽然这个默认桥接网络在大多数情况下已经足够，但仍有其他选择。\n\
    \nDocker 默认提供三种主要的网络驱动：\n\n*   bridge（桥接）\n\n*   host（主机）\n\n*   none（无）\n\n然而，由于这些可能并不适用于所有场景，我们还将深入探讨用户自定义网络，如\
    \ overlay（覆盖）和 macvlan。让我们逐一详细了解。\n\n### 桥接驱动\n\n这是默认驱动。当我们启动 Docker 时，会建立一个桥接网络，所有新启动的容器都会自动连接到这个默认的桥接网络。\n\
    \n当我们希望隔离的容器在内部通信时，可以使用此驱动。由于容器是隔离的，桥接网络能有效解决端口冲突。它通过为每个容器分配桥接网络子网内的内部 IP 地址来解决端口冲突。同一桥接网络内的容器可以相互交互，而\
    \ Docker 则利用主机上的 iptables 来限制对桥接网络外部的访问。\n\n以下示例描述了桥接网络驱动的工作原理：\n\n*   使用 `docker\
    \ network ls` 命令检查可用的网络。\n\n*   使用 `docker run -dit` 命令启动两个分离的 busybox（BusyBox\
    \ 是一个轻量级容器，提供一个包含许多常见 Unix 实用程序（如 `ls`、`cat` 和 `echo`）的单一可执行文件，非常适合存储和资源有限的环境）容器，分别命名为\
    \ `container1` 和 `container2`。\n\n    这里，`-dit` 标志中的 `d` 表示分离模式，`it` 确保 bash 或\
    \ `sh` 可以分配到一个伪终端。\n\n    ```\n    docker run -dit --name container1 busybox /bin/sh\n\
    \    docker run -dit --name container2 busybox /bin/sh\n    ```\n\n*   使用 `docker\
    \ ps` 验证容器是否正在运行。\n\n    ```\n    $ docker ps\n    CONTAINER ID   IMAGE     COMMAND\
    \     CREATED          STATUS          PORTS     NAMES\n    8a6464e82c4u   busybox\
    \   \"/bin/sh\"   6 seconds ago    Up 6 seconds              container2\n    9bea14032749\
    \   busybox   \"/bin/sh\"   28 seconds ago   Up 28 seconds             container1\n\
    \    ```\n\n    在 Docker 中，当容器使用 `-d`（分离）选项启动且未显式暴露或发布任何端口时，`docker ps` 输出中的 `PORTS`\
    \ 部分为空。\n\n*   使用 `docker network inspect bridge` 确认容器已连接到桥接网络。记下两个容器的 IP 地址。\n\
    \n*   使用 `docker attach` 命令附加到 **container1**，并尝试使用其 IP 地址 ping **container2**。\n\
    \n    ```\n    $ docker attach container1\n    / # whoami\n    root\n    / # hostname\
    \ -i\n    182.18.0.2\n    / # ping 182.18.0.3\n    PING 182.18.0.3 (182.18.0.3):\
    \ 56 data bytes\n    64 bytes from 182.18.0.3: seq=0 ttl=64 time=2.083 ms\n  \
    \  64 bytes from 182.18.0.3: seq=1 ttl=64 time=0.144 ms\n    ```\n\n*   请记住，我们不建议在生产场景中使用桥接驱动。它适用于所有容器都在同一\
    \ Docker 主机上运行的单一主机设置。\n\n*   容器间的通信依赖于 IP 地址，而不是自动服务发现（将 IP 地址转换为容器名称）。\n\n*\
    \   桥接驱动也可能允许不相关的容器进行通信，这可能带来安全风险。\n"
- fmt: '### Host Driver


    As the name implies, the host driver leverages the host machine’s networking.
    This removes network isolation between the container and the host machine where
    Docker operates.


    ```

    $docker run --rm -d --network host --name my_nginx nginx

    ```


    `--network host`: Uses the host network, meaning the container shares the host’s
    network namespace. The container will directly bind to the host’s ports without
    Docker’s network isolation.


    For example, the official Nginx image listens on port 80 by default; when a container
    bound to port `80` employs host networking, the container’s application is accessible
    on port 80 via the host’s IP address. So in this case, If the host machine’s port
    80 is not already in use, you can access Nginx at `http://localhost:80/`.


    This driver is Linux-specific and isn’t available on Docker desktop installations.
    We can leverage it if we want to depend on the host machine’s networking rather
    than Docker’s.


    ### None Driver


    This driver avoids attaching containers to any network. Containers remain cut
    off from the external network and communication with other containers.


    This driver is helpful when we need to deactivate networking on a container.


    ### Overlay and macvlan Drivers


    The overlay driver supports multi-host communication, often used in environments
    like Docker Swarm or Kubernetes. It allows containers across hosts to interact
    without intricate setups. It’s like a virtualized distributed network superimposed
    on an existing computer network.


    The macvlan driver connects Docker containers directly to the host machine’s physical
    network. It assigns a unique MAC address to a container, rendering it a virtual
    physical device on the network. This driver is ideal for modernizing legacy apps
    requiring direct physical network connection.


    Here’s a simple image that provides an overview of Docker’s network drivers and
    their primary purposes.


    ![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig1_HTML.jpg)


    Diagram illustrating Docker network drivers. The central node is "Network Drivers"
    under "Docker," branching into five types: "bridge" (default, connects containers
    on the same host), "host" (removes network isolation, uses host''s network), "overlay"
    (connects multiple Docker daemons, requires swarm mode), "macvlan" (assigns MAC
    addresses, makes containers appear as physical devices), and "none" (no external
    network interface, deactivates networking on a container).


    Figure 4-1


    Overview of docker network drivers


    ## Basic Docker Networking Commands


    Docker offers various commands for managing networks. We can list, create, connect,
    disconnect, inspect, and remove Docker networks using these commands.


    Table 4-1


    Docker networking commands


    | Command | Description |

    | --- | --- |

    | `docker network connect` | Connects a container to a network |

    | `docker network create` | Creates a new network |

    | `docker network disconnect` | Disconnects a container from a network |

    | `docker network inspect` | Displays detailed network information |


    To sum up, Docker’s three primary network drivers are bridge, host, and none.
    The host driver leverages the host machine’s networking, while the none driver
    cuts off containers from the external network. Then there are user-defined networks
    like overlay and macvlan, which support multi-host communication and are often
    used in environments like Docker Swarm or Kubernetes.


    ## Docker Volumes


    Docker volumes play a pivotal role in efficiently managing data within containers.
    First of all, let us understand what Docker volume is. A Docker volume is just
    a directory that lives outside of a container’s file system, yet it is available
    to the container. It allows data to persist even when the container is halted
    or deleted. They enable persistent and shareable data among containers, effectively
    separating application data from the underlying infrastructure. Volumes provide
    a bridge through which data can exist and survive independently of the containers
    using them. This fundamental distinction offers several advantages:


    *   **Persistence across container restarts**: Containers are temporary, with
    their data typically lost upon restart. Docker Volumes address this challenge
    by persisting data even as containers come and go.


    *   **Isolation and portability**: Volumes decouple data from containers, enhancing
    isolation and simplifying the sharing and transporting of data between different
    environments.


    *   **Data sharing**: Containers can share data through volumes, allowing multiple
    containers to access the same dataset concurrently. It enables microservices architectures
    and other scenarios where data must be shared between containers.


    ## Getting Started with Docker Volumes


    Volumes are stored in a part of the host filesystem managed by Docker (`/var/lib/docker/volumes/`
    on Linux by default).


    ![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig2_HTML.jpg)


    Diagram illustrating Docker architecture. A Docker Host runs a Docker Engine,
    which manages Docker Containers A and B. Both containers read/write data to Docker
    Volumes A and B, respectively. These volumes persist data on the Host File System.
    Arrows indicate the flow and management relationships between components.


    Figure 4-2


    Docker volume flow


    In this diagram:


    *   The **Docker Engine** runs on the **Docker Host** and manages containers and
    volumes.


    *   **Containers A** and **B** represent Docker containers running on the same
    Docker host.


    *   **Docker Volume A** and **Docker Volume B** are volumes created by the Docker
    Engine.


    *   These volumes persist data on the **Host File System**, independent of the
    life cycle of the containers.


    *   The containers read from and write data to these volumes, ensuring data persistence
    and consistency.


    ### Creating Docker Volumes


    Creating Docker volumes is easy. Use the `docker volume create` command followed
    by your desired volume name. For example, running `docker volume create mydata`
    produces a volume named “mydata.” Volumes may also be created at container-creation
    time using the `-v` flag.


    ### Listing Available Volumes


    Run the command `docker volume ls` to see all volumes available on our system.
    This will provide much-needed information about each volume including its name,
    unique ID, and the driver used for management.


    ### Volume Inspection


    To fully understand a Docker volume, explore its details with the `docker volume
    inspect` command and append the name of your volume. It shows comprehensive details
    about the configuration and how the volume is stored in our host system.


    ### Mounting Data Volumes


    One of the most distinguishing features of Docker volumes is their ability to
    be mounted in containers. This smooth interaction allows data to easily pass between
    containers. When starting up a container, one ensures that all the stored data
    in the volume is easily accessed.


    ```

    $ docker run -d -v mydata:/app/data myapp

    ```


    This command mounts the “mydata” volume to the “/app/data” directory within the
    container named “myapp.”


    ### Copy Containers Data


    Docker volumes facilitate the easy transfer of files and directories between containers.
    Utilize the `docker cp` command to copy data from one container to another without
    complications. It is very useful when one wants to transfer specific data without
    exposing the entire volume.


    ### Host Directories As Data Volumes


    Besides creating and managing internal Docker volumes, we can also include the
    host directories as volumes within the containers. This way presents a convenient
    means to work on data that resides on the host system while capitalizing on the
    containerized environment.


    ### Ownership and Permissions of Volumes


    Understanding volume permissions and ownership plays a crucial role in managing
    the data within containers. By default, data within a container remains with the
    permissions it has in the volume directory. We can also include user and group
    IDs with this to control the owner within the container.'
  raw: '### Host Driver


    As the name implies, the host driver leverages the host machine’s networking.
    This removes network isolation between the container and the host machine where
    Docker operates.


    ```

    $docker run --rm -d --network host --name my_nginx nginx

    ```


    **--network host**: Uses the host network, meaning the container shares the host’s
    network namespace. The container will directly bind to the host’s ports without
    Docker’s network isolation.


    For example, the official Nginx image listens on port 80 by default; when a container
    bound to port **80** employs host networking, the container’s application is accessible
    on port 80 via the host’s IP address. So in this case, If the host machine’s port
    80 is not already in use, you can access Nginx at `http://localhost:80/`.


    This driver is Linux-specific and isn’t available on Docker desktop installations.
    We can leverage it if we want to depend on the host machine’s networking rather
    than Docker’s.


    ### None Driver


    This driver avoids attaching containers to any network. Containers remain cut
    off from the external network and communication with other containers.


    This driver is helpful when we need to deactivate networking on a container.


    ### Overlay and macvlan Drivers


    The overlay driver supports multi-host communication, often used in environments
    like Docker Swarm or Kubernetes. It allows containers across hosts to interact
    without intricate setups. It’s like a virtualized distributed network superimposed
    on an existing computer network.


    The macvlan driver connects Docker containers directly to the host machine’s physical
    network. It assigns a unique MAC address to a container, rendering it a virtual
    physical device on the network. This driver is ideal for modernizing legacy apps
    requiring direct physical network connection.


    Here’s a simple image that provides an overview of Docker’s network drivers and
    their primary purposes.


    ![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig1_HTML.jpg)


    Diagram illustrating Docker network drivers. The central node is "Network Drivers"
    under "Docker," branching into five types: "bridge" (default, connects containers
    on the same host), "host" (removes network isolation, uses host''s network), "overlay"
    (connects multiple Docker daemons, requires swarm mode), "macvlan" (assigns MAC
    addresses, makes containers appear as physical devices), and "none" (no external
    network interface, deactivates networking on a container).


    Figure 4-1


    Overview of docker network drivers


    ## Basic Docker Networking Commands


    Docker offers various commands for managing networks. We can list, create, connect,
    disconnect, inspect, and remove Docker networks using these commands.


    Table 4-1


    Docker networking commands


    | Command | Description |

    | --- | --- |

    | `docker network connect` | Connects a container to a network |

    | `docker network create` | Creates a new network |

    | `docker network disconnect` | Disconnects a container from a network |

    | `docker network inspect` | Displays detailed network information |


    To sum up, Docker’s three primary network drivers are bridge, host, and none.
    The host driver leverages the host machine’s networking, while the none driver
    cuts off containers from the external network. Then there are user-defined networks
    like overlay and macvlan, which support multi-host communication and are often
    used in environments like Docker Swarm or Kubernetes.


