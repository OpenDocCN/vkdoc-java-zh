    | **Dynamic code awareness** | JVM has ability to adapt to dynamic code changes,
    including loading classes that were unknown at compile time, is one of its core
    strengths, allowing for flexible and dynamic Java applications. | GraalVM requires
    explicit instructions about dynamic code aspects such as reflection, resources,
    serialization, and dynamic proxies. |


    GraalVM''s ability to support multiple languages and improve application performance
    makes it a versatile tool for modern software development.


    ## Spring Boot 3 and GraalVM


    GraalVM is a version of OpenJDK enhanced with additional features, including the
    “native-image” utility. This utility performs ahead-of-time (AOT) compilation,
    efficiently processing your code to eliminate unneeded parts and then converting
    the remainder into highly optimized, system-specific native code. The performance
    improvements are remarkable, akin to those seen in C or Go applications. It results
    in binaries that start almost instantly and require significantly less RAM. With
    this technology, deploying a Spring Boot application can consume tens of megabytes
    of RAM and start in just a few hundred milliseconds.


    To leverage this, use `./gradlew nativeCompile` or `./mvnw -Pnative native:compile`.
    Both commands are used when creating native images in the context of GraalVM—a
    virtual machine that enables just-in-time (JIT) compilation of Java applications
    to platform-dependent executables, thus reducing startup time and memory usage.


    Spring Boot has officially supported this feature for production use since the
    release of Spring Boot 3.0 in November 2022.'
  trans: '

    ## Native Image 的局限性


    | 局限性 | 描述 |

    | --- | --- |

    | **平台依赖性** | 每个原生镜像都特定于一个平台，需要多次构建才能实现跨平台兼容。 |

    | **Java 功能受限** | Java 的某些动态特性（如反射）可能无法得到完全支持，或需要额外配置。 |

    | **调试复杂** | 原生镜像的调试比传统 Java 应用程序更具挑战性。 |


    ## Docker 与 Native Image 的区别


    原生镜像和 Docker 镜像在软件部署流程中服务于不同的目的，并运行于不同的层级：


    | 术语 | 范围 | 目的 | 使用场景 |

    | --- | --- | --- | --- |

    | **原生镜像** | 特指使用 GraalVM 等工具从 Java 代码编译生成的可执行文件。 | 创建一个特定于平台的独立可执行文件，包含必要的 Java
    类和一个精简的 JVM。 | 优化 Java 应用程序，实现更快的启动速度和更低的内存占用。 |

    | **Docker 镜像** | 一个轻量级、独立的可执行软件包，包含运行软件所需的一切：代码、运行时、系统工具、库和设置。 | 确保跨不同系统的一致环境和可移植性。
    | 用于将应用程序容器化，使其在隔离环境中运行。 |


    原生镜像专注于优化特定的 Java 应用程序，而 Docker 镜像则侧重于在不同环境中一致地打包和运行软件。原生镜像可以作为 Docker 镜像的一部分，但它们在核心功能和目标上有着根本性的不同。


    ## 理解 GraalVM


    GraalVM 是由 Oracle 开发的一款高性能多语言虚拟机。它通过提供以下特性来增强标准 Java 虚拟机（JVM）的能力：


    1.  **支持多种语言**：除 Java 外，它还能运行使用 JavaScript、Ruby、Python 及其他 JVM 语言编写的应用程序。


    2.  **即时编译器（JIT）**：通过在运行时将字节码编译为机器码来提升 Java 应用程序的性能。


    3.  **提前编译器（AOT）**：通过原生镜像技术，将 Java 应用程序编译成独立的可执行文件，这些文件启动更快且占用内存更少。


    4.  **互操作性**：实现不同编程语言之间的无缝集成。


    5.  **扩展与定制**：开发者可以根据特定需求扩展和定制该虚拟机。


    ## JIT 与 AOT 编译器对比


    | 特性 | JIT | AOT |

    | --- | --- | --- |

    | **时机** | 在运行时编译代码。 | 在运行前（构建过程中）编译代码。 |

    | **运作方式** | 程序运行时将字节码翻译为机器码。 | 生成特定于平台的二进制可执行文件。 |

    | **性能** | 基于运行时数据优化代码，可能达到高性能。 | 启动速度更快（代码已预编译），但缺乏运行时优化。 |

    | **灵活性** | 更具适应性，因为它是按需编译代码。 | 灵活性较低，因为它是为特定架构或平台编译的。 |

    | **内存使用** | 由于运行时编译，可能增加内存使用和启动时间。 | 通常内存占用更小，并减少运行时开销。 |


    ## JVM 与 GraalVM 对比


    | 特性 | JVM | GraalVM |

    | --- | --- | --- |

    | **语言支持** | 主要支持 Java 及基于 JVM 的语言，如 Scala 或 Kotlin。 | 支持更多语言，如 JavaScript、Ruby、Python
    和 R，使其成为多语言虚拟机。 |

    | **性能优化** | 使用即时（JIT）编译在运行时优化字节码。 | 包含先进的 JIT 编译器（Graal 编译器），实现更高效的性能优化。 |

    | **提前编译** | 原生不支持 AOT 编译。 | 提供原生镜像技术用于 AOT 编译，从 Java 应用程序创建独立可执行文件。 |

    | **互操作性** | 仅限于基于 JVM 的语言互操作。 | 增强的互操作性特性，支持混合语言应用程序。 |

    | **代码消除** | 不会从最终可执行文件中排除不可达代码。 | 在创建原生镜像时，不可达代码会从最终可执行文件中排除。 |

    | **不可变类路径** | 在传统 JVM 应用程序中，类路径可以动态修改，允许添加或更改 JVM 搜索类和资源的位置。 | 类路径在构建时固定，之后无法更改。
    |

    | **动态代码感知** | JVM 适应动态代码变化的能力（包括加载编译时未知的类）是其核心优势之一，支持灵活动态的 Java 应用程序。 | GraalVM
    需要关于动态代码方面（如反射、资源、序列化和动态代理）的明确指令。 |


    GraalVM 支持多种语言并提升应用程序性能的能力，使其成为现代软件开发中一款多功能工具。


    ## Spring Boot 3 与 GraalVM


    GraalVM 是 OpenJDK 的一个增强版本，增加了包括“native-image”工具在内的额外功能。该工具执行提前（AOT）编译，高效处理你的代码，消除不需要的部分，然后将剩余部分转换为高度优化、特定于系统的原生代码。其性能提升非常显著，堪比
    C 或 Go 应用程序。它生成的二进制文件几乎可以瞬间启动，并且所需 RAM 大幅减少。借助这项技术，部署一个 Spring Boot 应用程序可能仅消耗几十兆字节的
    RAM，并在短短几百毫秒内启动。


    要利用此功能，请使用 `./gradlew nativeCompile` 或 `./mvnw -Pnative native:compile`。这两个命令都用于在
    GraalVM 环境下创建原生镜像——GraalVM 是一种虚拟机，能够将 Java 应用程序即时（JIT）编译为平台相关的可执行文件，从而减少启动时间和内存使用。


    自 2022 年 11 月发布 Spring Boot 3.0 以来，Spring Boot 已正式支持此功能用于生产环境。

    '
- fmt: '# Building Native Images with Spring Boot


    To initiate a new native Spring Boot project with ease, navigate to [start.spring.io](https://start.spring.io),
    select the **GraalVM Native Support** dependency, and proceed to generate your
    project.


    ![](images/625177_1_En_9_Chapter/625177_1_En_9_Fig2_HTML.jpg)


    The image shows a dark interface with a green section labeled "DEVELOPER TOOLS."
    Below, a bright green banner reads "GraalVM Native Support," with a description
    stating, "Support for compiling Spring applications to native executables using
    the GraalVM native-image compiler." The top left corner lists technologies like
    Web, Security, JPA, Actuator, Devtools, and the top right corner suggests pressing
    a key for multiple additions.


    **Figure 9-2** Adding GraalVM dependency


    There are two main ways to build a Spring Boot native image application, and they
    are:


    **Using Spring Boot support for cloud-native buildpacks**: This method generates
    a lightweight container containing a native executable. This method is the most
    straightforward starting point for those familiar with Spring Boot''s container
    image support.


    > **Note**: Docker installation on the target machine is required.


    With Maven to create the image, run the following goal:


    ```

    $ mvn -Pnative spring-boot:build-image

    ```


    With Gradle to create the image, run the following goal:


    ```

    $ gradle bootBuildImage

    ```


    Then, you can run the app like any other container:


    ```

    $ docker run --rm demo:0.0.1-SNAPSHOT

    ```


    **Using GraalVM native build tools**: This approach generates a native executable
    directly. Opt for this choice if you''re interested in broader capabilities, such
    as conducting tests within a native image environment. It''s essential to have
    the GraalVM native-image compiler installed and ready on your system for this
    option.


    > **Note**: GraalVM 22.3+ is required.


    With Maven to create the executable, run the following goal:


    ```

    $ mvn -Pnative native:compile

    ```


    With Gradle to create the executable, run the following goal:


    ```

    $ gradle nativeCompile

    ```


    For executing a Maven-built native image, use this command:


    ```

    $ target/demo

    ```


    For executing a Gradle-built native image, use this command:


    ```

    $ build/native/nativeCompile/myproject

    ```


    These methods offer different advantages and can be chosen based on the specific
    needs and environment of the application.


    Here is a diagram explaining the build process using both methods for building
    native images with Spring Boot.


    ![](images/625177_1_En_9_Chapter/625177_1_En_9_Fig3_HTML.jpg)


    Flowchart illustrating two build methods starting from "Start" to "Optional: Run
    Tests." The left path involves "Spring Boot Support for Cloud Native Buildpacks,"
    requiring Docker installation to "Build Image." It proceeds with Maven or Gradle
    commands to run a container. The right path uses "GraalVM Native Build Tools,"
    requiring the GraalVM compiler to "Build Executable," followed by Maven or Gradle
    commands to execute the build. Both paths converge at an optional test step using
    Maven.


    **Figure 9-3** Spring Boot GraalVM build process


    ## Testing GraalVM Native Image for Spring Boot Application


    In the realm of GraalVM native image applications, it''s recommended to run most
    unit and integration tests on the JVM for efficiency and seamless IDE integration.
    Testing focuses on ensuring the Spring AOT engine processes the application correctly
    and GraalVM can produce a valid native image. Developers can test AOT processing
    using the JVM by enabling the `spring.aot.enabled` property.


    ```

    $ java -Dspring.aot.enabled=true -jar myapplication.jar

    ```


    Additionally, Spring Framework supports running tests in a native image environment,
    a feature particularly useful in CI pipelines. This approach requires setting
    up specific Maven or Gradle configurations and using relevant build tools.


    When setting up Maven for running native tests, make sure your `pom.xml` file
    is configured with `spring-boot-starter-parent` as the parent. This requires including
    a `<parent>` section in your `pom.xml` that aligns with this specification.


    ```

    org.springframework.boot

    spring-boot-starter-parent

    3.2.0

    ```


    You can also run your existing test suite in a native image. This is an efficient
    way to validate the compatibility of your application.


    To run your existing tests in a native image, run the following goal:


    ```

    $ mvn test -PnativeTest

    ```


    When using the Spring Boot Gradle plugin along with the GraalVM Native Image plugin,
    AOT test tasks are set up automatically. It''s important to ensure your Gradle
    build script includes a `plugins` block that contains `org.graalvm.buildtools.native`.


    For executing native tests using Gradle, you should utilize the `nativeTest` task.


    ```

    $ gradle nativeTest

    ```


    ## Understanding Quarkus: A Kubernetes Native Java Framework


    In the ever-evolving world of software development, efficiency and speed are paramount.
    Quarkus, a Kubernetes-native Java framework, is revolutionizing the way Java applications
    are developed and deployed in cloud environments. This section will introduce
    you to the basics of Quarkus and why it''s becoming a game-changer for Java developers.


    ### Knowing Quarkus


    Quarkus is an open source Java framework designed for Kubernetes, the widely used
    container orchestration platform. It optimizes Java specifically for containers,
    enabling it to become an effective platform for serverless, cloud, and Kubernetes
    environments.


    #### Key Features of Quarkus


    - **Container first**: Quarkus is built with container-based environments in mind,
    ensuring low memory footprint and fast startup times.

    - **Imperative and reactive**: It seamlessly supports both imperative and reactive
    programming models, catering to a wide range of application architectures.

    - **Microservices ready**: With built-in support for microservices patterns, Quarkus
    is ideal for building scalable and maintainable applications.

    - **Developer joy**: Offers live coding, unified configuration, and streamlined
    code for both imperative and reactive coding.


    ### Need for Quarkus with Kubernetes


    - **Fast startup and low memory footprint**: Quarkus applications start in milliseconds
    and consume a fraction of the memory compared to traditional Java applications.
    This is crucial for Kubernetes, where resources are scaled up and down frequently.

    - **Developer productivity**: Quarkus enhances developer productivity with hot-reload
    capabilities, meaning you can see changes in real time without restarting your
    application.

    - **Native compilation with GraalVM**: Quarkus can be compiled into a native executable
    using GraalVM, further reducing the memory footprint and startup time.

    - **Cloud-native ecosystem integration**: It integrates smoothly with Kubernetes,
    Docker, and cloud-native databases and messaging systems.'
