    ![](img/625177_1_En_4_Fig7_HTML.jpg)


    代码编辑器截图，左侧显示文件结构，右侧显示 YAML 配置文件。文件结构包括 `.gitignore`、`HELP.md`、`build.gradle` 和
    `compose.yaml` 等项，其中 `compose.yaml` 被高亮显示。YAML 文件定义了一个 PostgreSQL 服务，使用镜像 `postgres:latest`，设置了数据库名称、密码和用户的环境变量，以及端口
