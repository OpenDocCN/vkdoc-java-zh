- fmt: "# Container Initialization\n\nCreate container instances in your test classes\
    \ using Testcontainers’ utilities. For example, if you want to spin up an in-memory\
    \ Redis cache instance:\n\n```\n@Testcontainers\n@SpringBootTest\nclass DemoApplicationTests\
    \ {\n    @Container\n    @ServiceConnection\n    static RedisContainer container\
    \ = new RedisContainer(RedisContainer.DEFAULT_IMAGE_NAME);\n\n    @Test\n    void\
    \ myTest() {\n        System.out.println(container.isRunning());\n        System.out.println(container.getRedisURI());\n\
    \    }\n}\n```\n\nThis code snippet demonstrates the integration of Testcontainers\
    \ with Spring Boot, showcasing how to use a Redis container in a test scenario.\
    \ Here’s a breakdown of what each part of the code does:\n\n- `@Testcontainers`:\
    \ This annotation indicates that this test class will utilize Testcontainers.\
    \ It allows us to manage the lifecycle of containers used within the test class.\n\
    - `@SpringBootTest`: Indicates that this is a Spring Boot test. It loads the complete\
    \ application context and allows integration testing with Spring components.\n\
    - `@Container`: This annotation marks a field as a container Testcontainers manages.\
    \ In this case, it declares a static field `container` of type `RedisContainer`.\
    \ The `RedisContainer` is instantiated with the default Redis image name (`RedisContainer.DEFAULT_IMAGE_NAME`),\
    \ which is pulled from the DockerHub Registry.\n- `@ServiceConnection`: Facilitates\
    \ SpringBoot’s autoconfiguration to dynamically enlist all the required properties.\
    \ In the background, this annotation identifies the necessary properties from\
    \ the container class or the Docker image name.\n- `myTest()`: This is a test\
    \ method annotated with `@Test`. Inside this method:\n    - `container.isRunning()`\
    \ Prints whether the Redis container is running or not.\n    - `container.getRedisURI()`\
    \ Retrieves and prints the URI of the running Redis container.\n\nThis code sets\
    \ up a test class that utilizes Testcontainers to manage a Redis container. It\
    \ demonstrates basic functionalities like checking if the container is running\
    \ and retrieving its URI. This allows for integration testing, ensuring the application\
    \ works correctly with a Redis instance managed by Testcontainers.\n\nHere’s how\
    \ we can modify our previous example where we created a Redis cluster manually\
    \ to use `RedisContainer`—a specialized container class for Redis (from testcontainers-java\
    \ library).\n\n```\n@SpringBootTest\n@Testcontainers\npublic class EmployeeRepositoryIntegrationTest\
    \ {\n    @Container\n    @ServiceConnection\n    static RedisContainer redis =\
    \ new RedisContainer(DockerImageName.parse(\"redis:latest\"));\n\n    @Autowired\n\
    \    private EmployeeRepository employeeRepository;\n\n    @Test\n    public void\
    \ testEmployeeRepository() {\n        Employee employee = new Employee(1L, \"\
    John Doe\", \"Developer\");\n        employeeRepository.save(employee);\n    \
    \    Optional foundEmployee = employeeRepository.findById(employee.getId());\n\
    \        assertTrue(foundEmployee.isPresent(), \"Employee should be found\");\n\
    \        assertEquals(employee.getName(), foundEmployee.get().getName(), \"Employee\
    \ names should match\");\n    }\n}\n```\n\nThis approach has several advantages:\n\
    \n- Testcontainers will automatically start a Redis container.\n- No need for\
    \ `application-test.properties` for containerized Redis instance.\n- There is\
    \ no need for a local Redis installation.\n- You get a consistent and isolated\
    \ test environment.\n- Testcontainers automatically cleanups resources.\n- Test\
    \ suite works the same way in any environment (local, CI).\n\n## Summary\n\nThis\
    \ chapter covers the basics of Testcontainers and using it with Java, with the\
    \ focus on Spring Boot integration testing. It first explains what are the core\
    \ concepts behind Testcontainers, its necessity, and its major features: support\
    \ for diverse containers, integration with JUnit, and automatic resource management.\
    \ Then, it goes into the implementation details, focusing on testing strategies\
    \ for Spring Boot applications at unit and integration levels.\n\nThis chapter\
    \ provides practical examples of setting up and using Testcontainers and demonstrates\
    \ integration with Redis containers by detailing the required configuration steps.\
    \ The main emphasis throughout the chapter is on the advantages of the Testcontainers\
    \ way of doing things compared to traditional ways of testing—namely, in obtaining\
    \ environment parity, portability, and efficient resource utilization. Practical\
    \ implementation guidelines are also covered, such as dependency setup and proper\
    \ annotation usage, to provide a complete understanding for developers on how\
    \ to harness Testcontainers to have more reliable and maintainable integration\
    \ tests.\n\n# Docker Best Practices for Java Developers\n\nMastering Docker best\
    \ practices and strategies for Java applications\n\nDocker has become integral\
    \ to modern Java development, providing consistent, portable, and efficient ways\
    \ to package and deploy applications. Mastering the best practices involved in\
    \ Docker is important for creating optimized, secure, and production-ready containerized\
    \ applications for Java developers. This chapter shows how to use Docker effectively\
    \ with Java applications, detailing techniques and strategies in important areas\
    \ impacting container performance, security, and efficiency.\n\nThe practices\
    \ discussed in this chapter address the common challenges that Java developers\
    \ face when containerizing their applications, from managing build processes and\
    \ runtime environments to optimizing resource usage and ensuring security. Best\
    \ practices brought out from real-world experience and industry standards provide\
    \ a strong foundation for the development of containerized Java applications that\
    \ are both robust and maintainable.\n\n## Implementing Multistage Builds\n\nMultistage\
    \ build in Docker is a powerful technique that allows developers to create lean\
    \ and secure images using multiple stages in one `Dockerfile`, each with its base\
    \ image. We can significantly reduce the size of the final image and minimize\
    \ its attack surface, making it more secure.\n\n### Understanding Multistage Builds\n\
    \n**Separate build stages:** A multistage Dockerfile is divided into multiple\
    \ sections, each beginning with a `FROM` statement. These sections are called\
    \ stages. We can have as many stages as we need, and each stage can use a different\
    \ base image.\n\n**Building in layers:** Each stage is built upon the layers from\
    \ the previous stages. It means we can compile or build our application in an\
    \ earlier stage using a base image that includes all our build dependencies and\
    \ then copy only the artifacts we need into a later stage with a slimmer base\
    \ image.\n\n**Artifact transfer between stages:** We can copy artifacts from one\
    \ stage to another using the `COPY --from=<stage>` command. It is typically used\
    \ to move the compiled application from a build stage to a smaller run-time stage.\n\
    \n**Discarding intermediate layers:** Once the final image is built, all the intermediate\
    \ layers created in the previous stages are discarded. This results in a much\
    \ smaller final image containing what’s needed to run the application.\n\n**Reducing\
    \ image size and security footprint:** Compiling and building the application\
    \ in an initial stage and copying only the necessary artifacts to the final stage\
    \ minimizes the size of the final image. Smaller images contain fewer components,\
    \ translating to fewer potential vulnerabilities and a smaller attack surface.\n\
    \n### Creating a Basic Multistage Build Dockerfile\n\n**Start with a build stage:**\
    \ Use a base image `maven:3.6.3-jdk-11` or another that suits our Java project.\
    \ Add source code and any required build tools.\n\n**Compile the java code:**\
    \ Execute the build commands (`mvn clean package`, for instance) to compile the\
    \ Java application.\n\n**Setup the runtime stage:** Use a lighter base image `openjdk:11-jre-slim`\
    \ for the runtime. Copy the compiled JAR or classes from the build stage.\n\n\
    **Copying the compiled code to the runtime stage:** Use the `COPY --from=build_stage\
    \ /path/to/compiled/artifact /path/in/runtime/image` command to copy the necessary\
    \ files."
