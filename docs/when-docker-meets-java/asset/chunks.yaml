    ## 无发行版基础镜像


    无发行版（Distroless）是谷歌的一个项目，旨在创建注重安全性和简洁性的最小化基础镜像。这些镜像不包含传统 Linux 发行版中的包管理器或 Shell；因此，它们体积更小、更安全。这些镜像减少了应用程序的攻击面，甚至比
    Alpine Linux 镜像还要小。其核心理念是只保留与应用程序相关的内容，去除冗余。由于体积小巧，它们非常适合云场景，因为在云环境中计算资源是按量计费的。


    以下是一个用于 Java 应用程序的无发行版示例：


    ```

    FROM gcr.io/distroless/java:17

    ```


    ## 构建自定义基础镜像


    有时，你可能需要创建一个根据应用程序需求定制的自定义基础镜像。这可以包括添加应用程序所依赖的特定库、工具或配置。


    以下是一个创建包含额外依赖项的自定义基础镜像的简化示例：


    ```

    FROM eclipse-temurin:17-jdk AS base

    # 添加任何公共依赖项

    FROM base AS build

    COPY . /app

    WORKDIR /app

    RUN ./gradlew build

    FROM base AS final

    COPY --from=build /app/build/libs/my-app.jar /app.jar

    CMD ["java", "-jar", "/app.jar"]

    ```


    ## 多阶段构建优化


    多阶段构建通过分离构建环境和运行环境来优化最终镜像的大小。这减少了最终镜像中不必要的依赖项。多阶段 Docker 构建非常适合创建更小、更安全的镜像。这种方法提高了可重复性并减小了镜像体积。


    其思路是：在构建的第一阶段生成应用程序特定的工件，然后将它们插入到最终的运行镜像中。


    以下是一个用于容器化 Spring Boot 应用程序的多阶段 Dockerfile 示例：


    ```

    FROM maven:3.9.4-eclipse-temurin-17 AS build

    COPY . /app

    WORKDIR /app

    RUN mvn clean package

    FROM eclipse-temurin:17-jre

    COPY --from=build /app/target/my-app.jar /app.jar

    CMD ["java", "-jar", "/app.jar"]

    ```


    ## 安全考量


    选择尽可能接近官方维护仓库的基础镜像，并在 CI/CD 流水线中根据需要频繁更新，以便及时获取安全补丁和修复。建议使用 Clair 或 Trivy 等工具扫描
    Docker 镜像以发现漏洞。


    Clair 是一个用于容器镜像的开源静态分析工具，它可以解析镜像内容并报告影响容器镜像的漏洞。


    Trivy 是另一个开源安全扫描工具，可以跨以下领域发现漏洞和配置错误：


    *   代码仓库


    *   二进制工件


    *   容器镜像


    *   Kubernetes 集群


    在将 Java 应用程序 Docker 化时，正确选择基础镜像至关重要。兼容性、镜像大小和安全性是决定基础镜像的关键因素。通过清晰理解基础镜像以及无发行版等替代方案，开发人员可以更有效地使用
    Docker 构建和部署 Java 应用程序。


    ## 容器化并运行 Spring Boot 应用程序


    ### Docker 化 Spring Boot 应用程序


    在 Docker 容器中运行 Spring Boot 应用程序有许多优势。


    *   首先，在 Docker 中开发很容易，因为它拥有用户友好的基于 CLI 的工作流程，任何人都可以完美地开发、共享和运行其容器化的 Spring 应用程序。


    *   其次，Docker 简化了安装过程；开发人员可以使用一个包快速部署应用程序。


    *   最后但同样重要的是，Docker 确保了开发环境和生产环境之间的一致性；开发人员可以在本地编码和测试。


    容器化 Spring Boot 应用程序很简单。你可以通过将 `.jar` 或 `.war` 文件直接放入 JDK 基础镜像，然后将其打包成 Docker
    镜像来实现。虽然网上有大量资源指导你完成此过程，但许多关键方面，例如 Docker 镜像安全、镜像大小优化、正确标记和高效构建性能，往往被忽略。本课程将解决这些常见问题，并为容器化
    Spring Boot 应用程序提供九个有价值的技巧。


    ### 构建一个简单的 Spring Boot 应用程序


    为了说明解决这些问题的重要性，让我们从构建一个基本的“Hello World”Spring Boot 应用程序开始。要创建此应用程序，我们将首先使用 [Spring
