- fmt: '### Container vs. Virtual Machine


    You might be wondering whether we should consider containerizing our applications
    given the fact that VMs are considered the foundation of cloud computing. Some
    top cloud providers still have services that let you run your application on VMs.
    Before cloud computing was born, VMs were used for enterprise organizations’ mission-critical
    workloads, and they remain cost-effective and time-saving for business applications.


    Furthermore, containers and VMs help efficiently use computer resources but differ
    in some respects. Let’s take a moment to compare the differences between containers
    and virtual machines.


    **Table 1-1** Containers vs. virtual machines


    | Criteria | Container | Virtual Machine |

    | --- | --- | --- |

    | Definition | Containers encapsulate an application, its dependencies, libraries,
    binaries, and configuration files into a single package. | A virtual machine emulates
    a guest OS and abstracts the physical host machine it is running on. |

    | OS Architecture | Containers do not run full-blown operation systems but share
    an operating system kernel. | VMs allow us to run multiple full-blown guest operating
    systems on a host server and improve resource utilization. |

    | Size | Containers are lightweight, containing only the required dependencies
    to run our applications. | VMs contain an entire guest operating system, so their
    size is typically large (i.e., in a few GB). |

    | Startup Time | Containers startup time is less (i.e., typically in milliseconds).
    | VM’s startup time is generally in minutes because of its large size. |

    | Runtime Environment | Containers provide a predictable runtime environment.
    | With VMs, we must spend time and effort to ensure that environments are consistent.
    |

    | Maintenance | Easy to maintain and upgrade. We can throw away the old container
    and spin up a new one. | Maintaining and upgrading VMs is cumbersome. |


    To sum up, containers are maturing and gaining popularity, offering advantages
    like portability, better resource utilization, isolation, agility, easy scalability,
    improved productivity, and cloud support. They are suitable for CI/CD pipelines
    and compatible with multiple operating systems. Comparatively, VMs are efficient
    for business applications but are larger, take more time to start up, and require
    more effort to ensure compatibility.


    ### Rise of Docker


    Since its introduction in March 2013, Docker has emerged as the undeniable standard
    for containerizing application workloads. According to the 2024 Stack Overflow
    developer survey, Docker continues to be at the top of the list among professional
    developers in the most popular tool category.


    Now, let’s delve into the factors that have captivated developers and contributed
    to their fondness for Docker.'
