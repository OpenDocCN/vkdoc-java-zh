- fmt: "# Deleting Docker Volumes\n\nWhen volumes are no longer in use, `docker volume\
    \ rm` and the name of the volume make their deletion easier. However, this also\
    \ includes the deletion of the data stored in the volumes and should be exercised\
    \ with care.\n\n## Bulk Volume Deletion\n\nIn cases where more than one volume\
    \ needs to be removed, the command `docker volume prune` steps in. This command\
    \ deletes all volumes that are unlinked from running and stopped containers.\n\
    \nThe following diagram visually represents creating a Docker volume, mounting\
    \ it within a container, and using it to store and access data. Following is the\
    \ explanation in detail:\n\n1. **Create volume:** A Docker volume is created on\
    \ the host system using the `docker volume create` command or during container\
    \ creation using the `-v` flag.\n2. **Mount in container:** The created Docker\
    \ volume is mounted within a container during its launch, ensuring data sharing.\n\
    3. **Access and store data:** The container can access and store data within the\
    \ mounted Docker volume. Multiple containers can share the same volume.\n\n![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig3_HTML.jpg)\n\
    \nFlowchart illustrating the process of using Docker volumes. It starts with \"\
    Host System,\" followed by \"1. Create Volume,\" leading to \"Docker Volume.\"\
    \ Next, \"2. Mount in Container\" connects to \"Container,\" and finally, \"3.\
    \ Access and Store Data\" returns to \"Docker Volume.\" The chart shows the steps\
    \ for managing data in Docker containers.\n\n**Figure 4-3** Docker volumes in\
    \ action\n\nIn a nutshell, Docker volumes provide an effective means of managing\
    \ container data. It empowers the persistence of data, facilitates sharing, and\
    \ ensures effective communication between containers and the host system. Equipped\
    \ with the knowledge of creating, managing, and utilizing volumes efficiently,\
    \ we can amplify the versatility and efficiency of our containerized applications.\n\
    \n# Docker Compose\n\n## Understanding Docker Compose\n\nDocker Compose simplifies\
    \ the management of multicontainer applications, making it an excellent tool for\
    \ Java developers. We can seamlessly orchestrate complex setups by defining services,\
    \ networks, and volumes in a single file. Whether working on a Spring Boot application\
    \ or any Java project, Docker Compose enhances our development workflow. With\
    \ Docker Compose, Java developers can efficiently create, configure, and manage\
    \ multicontainer applications.\n\nDocker Compose simplifies the management of\
    \ multicontainer applications by defining them in a single `docker-compose.yml`\
    \ file. This file can include services, networks, and volumes, making it a convenient\
    \ tool for orchestrating complex setups. Like the Dockerfile, this file should\
    \ also be placed at the root of our project repository.\n\nHere’s a simple diagram\
    \ illustrating the basic structure of a Docker Compose file.\n\n![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig4_HTML.jpg)\n\
    \nFlowchart illustrating the structure of a Docker Compose configuration file.\
    \ At the top, \"Services\" connects downward to the central \"Docker Compose Configuration\
    \ File.\" From there, three branches extend to \"Containers,\" \"Networks,\" and\
    \ \"Volumes,\" indicating the components managed by the configuration file.\n\n\
    **Figure 4-4** Docker compose file components\n\n### Docker Compose File Components\n\
    \nIn this diagram, each component is represented separately, showing its relationship\
    \ to the Docker Compose configuration:\n\n- **Services** are the fundamental building\
    \ blocks defining the containers, their configurations, and their interaction.\
    \ A service is a definition for a containerized application or a microservice\
    \ within a Docker Compose configuration.\n- **Docker Compose configuration file**,\
    \ that is, `docker-compose.yaml`, connects three different components: \"Containers,\"\
    \ \"Networks,\" and \"Volumes.\" It serves as a central configuration file that\
    \ outlines how these components are defined and how they interact.\n\n# Setting\
    \ Up Docker Compose\n\nObtaining Docker Compose in the most straightforward and\
    \ advisable manner involves installing Docker Desktop, a complete package containing\
    \ Docker Compose, Docker Engine, and Docker CLI—essential components for Compose.\n\
    \nDocker Desktop is available on Linux, Mac, and Windows. If Docker Desktop is\
    \ already installed, finding the installed version of Compose can be found by\
    \ selecting \"About Docker Desktop\" from the whale icon on the Docker menu.\n\
    \n![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig5_HTML.jpg)\n\nThe image shows\
    \ the Docker Desktop interface with a blue background. The Docker logo and text\
    \ \"docker desktop\" are at the top left. Below, it displays the version number\
    \ \"4.17.0 (99724).\" The lower section lists components and their versions: Engine\
    \ 20.10.23, Credential Helper v0.7.0, Compose v2.15.1, and Kubernetes v1.25.4.\
    \ At the bottom, there are links labeled Release Notes, Acknowledgments, and Docker\
    \ Subscription Service Agreement.\n\n**Figure 4-5** Verifying docker compose installation\n\
    \nWe can also verify the installation by running the following command.\n\n```\n\
    $ docker-compose --version\n```\n\n# Docker Compose in Action\n\nLet’s understand\
    \ how docker compose works.\n\n- **Defining services with docker compose**: Services\
    \ in Docker Compose are equivalent to individual containers. Define services in\
    \ the `docker-compose.yml` file under the `services` section. For a Java application,\
    \ we might define a service for the application and another for the database.\n\
    \n  Example of defining a Java application service:\n\n  ```\n  version: '3'\n\
    \  services:\n    app:\n      build: .\n      ports:\n        - \"8080:8080\"\n\
    \      environment:\n        SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mydb\n\
    \        SPRING_DATASOURCE_USERNAME: user\n        SPRING_DATASOURCE_PASSWORD:\
    \ password\n      depends_on:\n        - db\n    db:\n      image: mysql:5.7\n\
    \      environment:\n        MYSQL_ROOT_PASSWORD: root\n        MYSQL_DATABASE:\
    \ mydb\n        MYSQL_USER: user\n        MYSQL_PASSWORD: password\n  ```\n\n\
    \  Service for Java Application\n\n- **Networking in docker compose**: Docker\
    \ Compose automatically creates a network for our services, allowing them to communicate\
    \ using service names as hostnames. This simplifies networking for Java applications\
    \ that need to connect to databases or other services.\n\n- **Managing dependencies\
    \ and startup order**: The `depends_on` directive ensures that services start\
    \ in the correct order, helping Java applications that rely on databases or other\
    \ services.\n\n- **Environment variables and secrets**: Environment variables\
    \ can be set in the `docker-compose.yml` file or separate `.env` files. This is\
    \ useful for passing configurations to Java applications without modifying the\
    \ source code.\n\n  Here in the following code under `environment` tag, we have\
    \ declared env variables for the Spring Boot application:\n\n  ```\n  version:\
    \ '3'\n  services:\n    app:\n      build: .\n      ports:\n        - \"8080:8080\"\
    \n      environment:\n        SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mydb\n\
    \        SPRING_DATASOURCE_USERNAME: user\n        SPRING_DATASOURCE_PASSWORD:\
    \ password\n  ```\n\n  Environment variables\n\n- **Scaling services**: Scaling\
    \ services is very easy with Docker Compose. Define the desired scale for a service,\
    \ and Docker Compose will create and manage multiple instances.\n\n  We can use\
    \ the `--scale` flag to specify the number of instances you want for a service:\n\
    \n  ```\n  $ docker-compose up --scale web=3\n  ```\n\n  If you are using Docker\
    \ Swarm, the `deploy.replicas` directive will specify the desired number of instances,\
    \ or replicas, for a service.\n\n  ```\n  version: '3'\n  services:\n    app:\n\
    \      image: openjdk:17\n      # ...\n      deploy:\n        replicas: 3\n  ```\n\
    \n  Scaling Services using Docker Swarm\n\n  When using `docker stack deploy`\
    \ and deploying a stack in Swarm mode, Docker will create the number of replicas\
    \ of the specified service.\n\n  ```\n  $ docker stack deploy -c docker-compose.yml\
    \ mystack\n  ```\n\n  This command uses the `deploy.replicas` setting to manage\
    \ the scale of the service."
  raw: "### Deleting Docker Volumes\n\nWhen volumes are no longer in use, `docker\
    \ volume rm` and the name of the volume make their deletion easier. However, this\
    \ also includes the deletion of the data stored in the volumes and should be exercised\
    \ with care.\n\n### Bulk Volume Deletion\n\nIn cases where more than one volume\
    \ needs to be removed, the command `docker volume prune` steps in. This command\
    \ deletes all volumes that are unlinked from running and stopped containers.\n\
    \nThe following diagram visually represents creating a Docker volume, mounting\
    \ it within a container, and using it to store and access data. Following is the\
    \ explanation in detail:\n\n1.  **Create volume:** A Docker volume is created\
    \ on the host system using the `docker volume create` command or during container\
    \ creation using the `-v` flag.\n\n2.  **Mount in container:** The created Docker\
    \ volume is mounted within a container during its launch, ensuring data sharing.\n\
    \n3.  **Access and store data:** The container can access and store data within\
    \ the mounted Docker volume. Multiple containers can share the same volume.\n\n\
    ![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig3_HTML.jpg)\n\nFlowchart illustrating\
    \ the process of using Docker volumes. It starts with \"Host System,\" followed\
    \ by \"1\\. Create Volume,\" leading to \"Docker Volume.\" Next, \"2\\. Mount\
    \ in Container\" connects to \"Container,\" and finally, \"3\\. Access and Store\
    \ Data\" returns to \"Docker Volume.\" The chart shows the steps for managing\
    \ data in Docker containers.\n\nFigure 4-3\n\nDocker volumes in action\n\nIn a\
    \ nutshell, Docker volumes provide an effective means of managing container data.\
    \ It empowers the persistence of data, facilitates sharing, and ensures effective\
    \ communication between containers and the host system. Equipped with the knowledge\
    \ of creating, managing, and utilizing volumes efficiently, we can amplify the\
    \ versatility and efficiency of our containerized applications.\n\n## Docker Compose\n\
    \n### Understanding Docker Compose\n\nDocker Compose simplifies the management\
    \ of multicontainer applications, making it an excellent tool for Java developers.\
    \ We can seamlessly orchestrate complex setups by defining services, networks,\
    \ and volumes in a single file. Whether working on a Spring Boot application or\
    \ any Java project, Docker Compose enhances our development workflow. With Docker\
    \ Compose, Java developers can efficiently create, configure, and manage multicontainer\
    \ applications.\n\nDocker Compose simplifies the management of multicontainer\
    \ applications by defining them in a single `docker-compose.yml` file. This file\
    \ can include services, networks, and volumes, making it a convenient tool for\
    \ orchestrating complex setups. Like the Dockerfile, this file should also be\
    \ placed at the root of our project repository.\n\nHere’s a simple diagram illustrating\
    \ the basic structure of a Docker Compose file.\n\n![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig4_HTML.jpg)\n\
    \nFlowchart illustrating the structure of a Docker Compose configuration file.\
    \ At the top, \"Services\" connects downward to the central \"Docker Compose Configuration\
    \ File.\" From there, three branches extend to \"Containers,\" \"Networks,\" and\
    \ \"Volumes,\" indicating the components managed by the configuration file.\n\n\
    Figure 4-4\n\nDocker compose file components\n\n#### Docker Compose File Components\n\
    \nIn this diagram, each component is represented separately, showing its relationship\
    \ to the Docker Compose configuration:\n\n*   Services are the fundamental building\
    \ blocks defining the containers, their configurations, and their interaction.\
    \ A service is a definition for a containerized application or a microservice\
    \ within a Docker Compose configuration.\n\n*   Docker Compose configuration file,\
    \ that is, `docker-compose.yaml,` connects three different components: “Containers,”\
    \ “Networks,” and “Volumes.” It serves as a central configuration file that outlines\
    \ how these components are defined and how they interact.\n\n## Setting Up Docker\
    \ Compose\n\nObtaining Docker Compose in the most straightforward and advisable\
    \ manner involves installing Docker Desktop, a complete package containing Docker\
    \ Compose, Docker Engine, and Docker CLI—essential components for Compose.\n\n\
    Docker Desktop is available on Linux, Mac, and Windows. If Docker Desktop is already\
    \ installed, finding the installed version of Compose can be found by selecting\
    \ “About Docker Desktop” from the whale icon on the Docker menu.\n\n![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig5_HTML.jpg)\n\
    \nThe image shows the Docker Desktop interface with a blue background. The Docker\
    \ logo and text \"docker desktop\" are at the top left. Below, it displays the\
    \ version number \"4.17.0 (99724).\" The lower section lists components and their\
    \ versions: Engine 20.10.23, Credential Helper v0.7.0, Compose v2.15.1, and Kubernetes\
    \ v1.25.4\\. At the bottom, there are links labeled Release Notes, Acknowledgments,\
    \ and Docker Subscription Service Agreement.\n\nFigure 4-5\n\nVerifying docker\
    \ compose installation\n\nWe can also verify the installation by running the following\
    \ command.\n\n```\n$ docker-compose --version\n```\n\n## Docker Compose in Action\n\
    \nLet’s understand how docker compose works.\n\n*   **Defining services with docker\
    \ compose**: Services in Docker Compose are equivalent to individual containers.\
    \ Define services in the `docker-compose.yml` file under the `services` section.\
    \ For a Java application, we might define a service for the application and another\
    \ for the database.\n\n    Example of defining a Java application service:\n\n\
    \    ```\n    version: '3'\n    services:\n    app:\n    build: .\n    ports:\n\
    \    - \"8080:8080\"\n    environment:\n    SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mydb\n\
    \    SPRING_DATASOURCE_USERNAME: user\n    SPRING_DATASOURCE_PASSWORD: password\n\
    \    depends_on:\n    - db\n    db:\n    image: mysql:5.7\n    environment:\n\
    \    MYSQL_ROOT_PASSWORD: root\n    MYSQL_DATABASE: mydb\n    MYSQL_USER: user\n\
    \    MYSQL_PASSWORD: password\n    ```\n\n    Service for Java Application\n\n\
    *   **Networking in docker compose**: Docker Compose automatically creates a network\
    \ for our services, allowing them to communicate using service names as hostnames.\
    \ This simplifies networking for Java applications that need to connect to databases\
    \ or other services.\n\n*   **Managing dependencies and startup order**: The `depends_on`\
    \ directive ensures that services start in the correct order, helping Java applications\
    \ that rely on databases or other services.\n\n*   **Environment variables and\
    \ secrets**: Environment variables can be set in the `docker-compose.yml` file\
    \ or separate `.env` files. This is useful for passing configurations to Java\
    \ applications without modifying the source code.\n\n    Here in the following\
    \ code under `environment` tag, we have declared env variables for the Spring\
    \ Boot application:\n\n    ```\n    version: '3'\n    services:\n    app:\n  \
    \  build: .\n    ports:\n    - \"8080:8080\"\n    environment:\n    SPRING_DATASOURCE_URL:\
    \ jdbc:mysql://db:3306/mydb\n    SPRING_DATASOURCE_USERNAME: user\n    ```\n\n\
    ```\nSPRING_DATASOURCE_PASSWORD: password\n```\n\nEnvrionment variables\n\n* \
    \  **Scaling services**: Scaling services is very easy with Docker Compose. Define\
    \ the desired scale for a service, and Docker Compose will create and manage multiple\
    \ instances.\n\n    We can use the `--scale` flag to specify the number of instances\
    \ you want for a service:\n\n```\n$docker-compose up --scale web=3\n```\n\nIf\
    \ you are using Docker Swarm, the `deploy.replicas` directive will specify the\
    \ desired number of instances, or replicas, for a service.\n\n```\nversion: '3'\n\
    services:\napp:\nimage: openjdk:17\n# ...\ndeploy:\nreplicas: 3\n```\n\nScaling\
    \ Services using Docker Swarm\n\nWhen using `docker stack deploy` and deploying\
    \ a stack in Swarm mode, Docker will create the number of replicas of the specified\
    \ service.\n\n```\n$docker stack deploy -c docker-compose.yml mystack\n```\n\n\
    This command uses the `deploy.replicas` setting to manage the scale of the service."
  trans: "\n### 删除 Docker 卷\n\n当卷不再使用时，`docker volume rm` 命令加上卷名可以轻松删除它们。不过，这也会删除卷中存储的数据，因此操作时需谨慎。\n\
    \n### 批量删除卷\n\n当需要删除多个卷时，可以使用 `docker volume prune` 命令。此命令会删除所有与运行中或已停止的容器解除关联的卷。\n\
    \n下图直观地展示了创建 Docker 卷、将其挂载到容器内，以及使用它来存储和访问数据的过程。详细说明如下：\n\n1.  **创建卷：** 在宿主机上使用\
    \ `docker volume create` 命令，或在创建容器时使用 `-v` 标志来创建 Docker 卷。\n\n2.  **挂载到容器：** 在容器启动时，将创建的\
    \ Docker 卷挂载到容器内，确保数据共享。\n\n3.  **访问和存储数据：** 容器可以访问已挂载的 Docker 卷并在其中存储数据。多个容器可以共享同一个卷。\n\
    \n![](img/625177_1_En_4_Fig3_HTML.jpg)\n\n流程图展示了使用 Docker 卷的过程。从“宿主机”开始，接着是“1.\
    \ 创建卷”，指向“Docker 卷”。然后是“2. 挂载到容器”，连接到“容器”，最后是“3. 访问和存储数据”，返回“Docker 卷”。该图展示了在\
    \ Docker 容器中管理数据的步骤。\n\n图 4-3\n\nDocker 卷的实际应用\n\n简而言之，Docker 卷提供了一种管理容器数据的有效方式。它支持数据持久化，方便数据共享，并确保容器与宿主机之间的有效通信。掌握了高效创建、管理和使用卷的知识，我们可以增强容器化应用程序的通用性和效率。\n\
    \n## Docker Compose\n\n### 理解 Docker Compose\n\nDocker Compose 简化了多容器应用程序的管理，是\
    \ Java 开发人员的绝佳工具。通过在单个文件中定义服务、网络和卷，我们可以无缝编排复杂的配置。无论是处理 Spring Boot 应用程序还是任何 Java\
    \ 项目，Docker Compose 都能增强我们的开发工作流程。借助 Docker Compose，Java 开发人员可以高效地创建、配置和管理多容器应用程序。\n\
    \nDocker Compose 通过在单个 `docker-compose.yml` 文件中定义多容器应用程序来简化其管理。该文件可以包含服务、网络和卷，使其成为编排复杂配置的便捷工具。与\
    \ Dockerfile 一样，此文件也应放置在我们项目仓库的根目录下。\n\n下面是一个简单的图表，说明了 Docker Compose 文件的基本结构。\n\
    \n![](img/625177_1_En_4_Fig4_HTML.jpg)\n\n流程图展示了 Docker Compose 配置文件的结构。顶部是“服务”，向下连接到中心的“Docker\
    \ Compose 配置文件”。从那里，三个分支延伸到“容器”、“网络”和“卷”，表示配置文件管理的组件。\n\n图 4-4\n\nDocker Compose\
    \ 文件组件\n\n#### Docker Compose 文件组件\n\n在此图中，每个组件都单独表示，展示了它们与 Docker Compose 配置的关系：\n\
    \n*   服务是定义容器、其配置及其交互的基本构建块。服务是 Docker Compose 配置中对容器化应用程序或微服务的定义。\n\n*   Docker\
    \ Compose 配置文件，即 `docker-compose.yaml`，连接了三个不同的组件：“容器”、“网络”和“卷”。它作为一个中心配置文件，概述了这些组件如何定义以及它们如何交互。\n\
    \n## 设置 Docker Compose\n\n获取 Docker Compose 最直接且推荐的方式是安装 Docker Desktop，这是一个包含\
    \ Docker Compose、Docker Engine 和 Docker CLI 的完整软件包——这些都是 Compose 的基本组件。\n\nDocker\
    \ Desktop 可在 Linux、Mac 和 Windows 上使用。如果已经安装了 Docker Desktop，可以通过从 Docker 菜单的鲸鱼图标中选择“关于\
    \ Docker Desktop”来查找已安装的 Compose 版本。\n\n![](img/625177_1_En_4_Fig5_HTML.jpg)\n\
    \n该图片显示了蓝色背景的 Docker Desktop 界面。左上角是 Docker 徽标和文本“docker desktop”。下方显示版本号“4.17.0\
    \ (99724)”。下部列出了组件及其版本：Engine 20.10.23、Credential Helper v0.7.0、Compose v2.15.1\
    \ 和 Kubernetes v1.25.4。底部有指向发行说明、致谢和 Docker 订阅服务协议的链接。\n\n图 4-5\n\n验证 Docker Compose\
    \ 安装\n\n我们也可以通过运行以下命令来验证安装。\n\n```\n$ docker-compose --version\n```\n\n## Docker\
    \ Compose 实战\n\n让我们了解 Docker Compose 是如何工作的。\n\n*   **使用 Docker Compose 定义服务**：Docker\
    \ Compose 中的服务等同于单个容器。在 `docker-compose.yml` 文件的 `services` 部分下定义服务。对于一个 Java\
    \ 应用程序，我们可能会为应用程序定义一个服务，为数据库定义另一个服务。\n\n    Java 应用程序服务定义示例：\n\n    ```\n    version:\
    \ '3'\n    services:\n    app:\n    build: .\n    ports:\n    - \"8080:8080\"\n\
    \    environment:\n    SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mydb\n    SPRING_DATASOURCE_USERNAME:\
    \ user\n    SPRING_DATASOURCE_PASSWORD: password\n    depends_on:\n    - db\n\
    \    db:\n    image: mysql:5.7\n    environment:\n    MYSQL_ROOT_PASSWORD: root\n\
    \    MYSQL_DATABASE: mydb\n    MYSQL_USER: user\n    MYSQL_PASSWORD: password\n\
    \    ```\n\n    Java 应用程序的服务\n\n*   **Docker Compose 中的网络**：Docker Compose 会自动为我们的服务创建一个网络，允许它们使用服务名称作为主机名进行通信。这简化了需要连接到数据库或其他服务的\
    \ Java 应用程序的网络配置。\n\n*   **管理依赖关系和启动顺序**：`depends_on` 指令确保服务按正确顺序启动，有助于依赖数据库或其他服务的\
    \ Java 应用程序。\n\n*   **环境变量和密钥**：环境变量可以在 `docker-compose.yml` 文件或单独的 `.env` 文件中设置。这对于在不修改源代码的情况下向\
    \ Java 应用程序传递配置非常有用。\n\n    在下面 `environment` 标签下的代码中，我们为 Spring Boot 应用程序声明了环境变量：\n\
    \n    ```\n    version: '3'\n    services:\n    app:\n    build: .\n    ports:\n\
    \    - \"8080:8080\"\n    environment:\n    SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mydb\n\
    \    SPRING_DATASOURCE_USERNAME: user\n    ```\n\n```\nSPRING_DATASOURCE_PASSWORD:\
    \ password\n```\n\n环境变量\n\n*   **扩展服务**：使用 Docker Compose 扩展服务非常容易。定义服务的期望规模，Docker\
    \ Compose 将创建并管理多个实例。\n\n    我们可以使用 `--scale` 标志来指定服务的实例数量：\n\n```\n$docker-compose\
    \ up --scale web=3\n```\n\n如果你使用的是 Docker Swarm，`deploy.replicas` 指令将指定服务的期望实例数或副本数。\n\
    \n```\nversion: '3'\nservices:\napp:\nimage: openjdk:17\n# ...\ndeploy:\nreplicas:\
    \ 3\n```\n\n使用 Docker Swarm 扩展服务\n\n当使用 `docker stack deploy` 在 Swarm 模式下部署堆栈时，Docker\
    \ 将创建指定服务的副本数。\n\n```\n$docker stack deploy -c docker-compose.yml mystack\n```\n\
    \n此命令使用 `deploy.replicas` 设置来管理服务的规模。\n"
- fmt: '## Docker Compose Support in Spring Boot


    Spring Boot 3.1 has introduced an exciting feature: built-in support for Docker
    Compose. This addition significantly simplifies the development process for Spring
    Boot applications that rely on Docker for environment setup. Before Spring Boot
    3.1, using Docker Compose involved manually running `docker compose up` to start
    services, followed by `docker compose down` to stop them. This required developers
    to manage Docker Compose separately and ensure their Spring Boot application’s
    configuration aligned with the dynamically assigned ports and service settings.


    With Spring Boot 3.1, this process is streamlined. Spring Boot can now automatically
    detect a `docker-compose.yaml` file and manage the life cycle of Docker Compose
    services directly. This means:


    - Spring Boot runs `docker compose up` automatically before connecting to services.

    - If the services are already running, Spring Boot uses them as they are.

    - Upon shutting down, the application `docker compose stop` is executed, preventing
    lingering Docker containers.


    The integration builds on the `ConnectionDetails` abstraction. Spring Boot automatically
    detects images started by Docker Compose and creates `ConnectionDetails` beans
    pointing to these services. This eliminates the need for manual configuration
    in many cases.


    Moreover, support for Docker Compose has been integrated into [start.spring.io](https://start.spring.io),
    accelerating your project setup process!


    - We can create a new project with the “Docker Compose support” option.


    ![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig6_HTML.jpg)


    Search interface displaying a query for "docker compose" with a suggestion highlighted
    in bright green. The suggestion reads "Docker Compose Support" with a label "DEVELOPER
    TOOLS" and a description stating it provides support for an enhanced development
    experience. A prompt indicates to press a key for multiple additions.


    Figure 4-6


    Add Docker Compose support dependency


    - And including dependencies like the “PostgreSQL driver,” you automatically receive
    a well-configured `compose.yaml` file at no extra cost.


    ![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig7_HTML.jpg)


    A screenshot of a code editor displaying a file structure on the left and a YAML
    configuration file on the right. The file structure includes items like `.gitignore`,
    `HELP.md`, `build.gradle`, and `compose.yaml`, which is highlighted. The YAML
    file defines a PostgreSQL service with the image `postgres:latest`, environment
    variables for database name, password, and user, and a port `5432`. At the top,
    there are "Download" and "Copy" buttons.


    Figure 4-7


    Preconfigured compose.yaml


    How amazing is that!


    Integrating Docker Compose into Spring Boot is a significant step in simplifying
    Spring Boot application development workflow. It allows developers to focus more
    on building their applications and less on configuring their development environment[.](https://spring.io/blog/2023/06/21/docker-compose-support-in-spring-boot-3-1)


    ## Summary


    This chapter has covered advanced Docker concepts: networking, volumes, and compose.
    We have examined network drivers like bridge, host, none, and user-defined networks
    and also learned about basic networking commands.


    For Docker volumes, we learned how they can be used for persistence and sharing
    between containers. This chapter showed how to create, list, and inspect volumes,
    mount them, and manage permissions and ownership; how to delete volumes was also
    shown.


    We then covered Docker Compose, which manages multicontainer applications. We
    also explained the structure of `docker-compose.yml` files and topics such as
    defining services, networking, managing dependencies, and scaling. The chapter
    concluded by providing an overview of Docker Compose support in Spring Boot 3.1,
    which improves integration and development workflows. Knowing these features will
    help in development and deploying containerized applications.


    In the next chapter, we will learn about various base images we can use for containerizing
    Java applications.


    # Containerizing Java Applications with Dockerfile


    This chapter will take a much deeper look at containerizing Java applications
    with Docker with a specific focus on Spring Boot. The key topics will include
    selection of base image for a `Dockerfile` and brief intro to buildpack for containerizing
    Spring Boot applications.


    ## Understanding Base Images


    A proper base image is crucial while working with Docker for Java applications.
    A base image is referred to as the foundation on which your application will be
    built. The base image holds the essential OS and runtime environment that your
    application needs to run. Therefore, the choice of a base image has a severe impact
    on many aspects, including size, compatibility, security, and performance.


    There are several essential considerations when selecting a base image for your
    Java application. Let’s consider those and the options you have when determining
    a good base image.


    ![](images/625177_1_En_5_Chapter/625177_1_En_5_Fig1_HTML.jpg)


    A steaming coffee mug with a blue whale logo sits inside an open shipping container.
    The container has the Docker logo on its side. The background is a gradient of
    blue and green.


    Figure 5-1


    Java inside a docker container


    ## Choosing JDK vs. JRE As the Base Image


    When choosing a base image for your Java application, you can select either JDK
    or JRE as your base image. Let’s explore the differences between the two:


    | Aspect | JDK Base Image | JRE Base Image |

    | --- | --- | --- |

    | Includes | Full Java development environment, including compiler and tools required
    for development. | Only the runtime environment is required to execute Java applications.
    |

    | Use Case | Suitable for building and compiling Java applications within the
    Docker image. | Suitable for deploying Java applications without development tools.
    |

    | Development vs. Production | Chosen during development or when code compilation
    is required within the container. | Preferred for production deployments due to
    reduced attack surface and smaller image size. |


    ## Official OpenJDK Images


    Images of official OpenJDK versions are also available from the likes of Oracle.
    They can be good, safe, and well-maintained choices. Different images exist in
    various versions and tags; you’ll get to use the exact Java version and JVM implementation
    your application requires.


    For instance, if you’re developing a Java 17 application, you can use the following
    `Dockerfile` snippet:


    ```

    FROM openjdk:17-jdk

    ```


    This line in the `Dockerfile` says it uses OpenJDK image as a base. OpenJDK is
    an open source implementation of the Java Platform.


    `17-jdk` indicates Java version 17, which is an LTS or a Long-Term Support version
    for Java, and the image contains the complete Java Development Kit, ready for
    compiling and building Java applications.


    ## Eclipse Temurin Images


    The Eclipse Temurin project provides a range of Docker images for different Java
    versions and JVM implementations. These images are community-supported and can
    be a good choice if you need specific features or optimizations. For example,
    you can use AdoptOpenJDK’s images with Java 17:


    ```

    FROM eclipse-temurin:17-jdk

    ```


    Specifies the Eclipse Temurin project image as the base. Eclipse Temurin provides
    high-quality, vendor-neutral builds of OpenJDK.


    ## Alpine Linux Images


    Alpine Linux is a slim distro mainly used to create small Docker images. If you
    use Alpine Linux as your base image, your image size will significantly reduce,
    making your application download and deploy much faster.


    Here’s an example of using Alpine Linux with OpenJDK 17:


    ```

    FROM eclipse-temurin:17-alpine

    ```


    Eclipse Temurin provides builds of the OpenJDK. Here Alpine refers to the Alpine
    Linux variant of the image. It is a lightweight distribution, making the image
    smaller and more secure.'
  raw: '## Docker Compose Support in Spring Boot


    Spring Boot 3.1 has introduced an exciting feature: built-in support for Docker
    Compose. This addition significantly simplifies the development process for Spring
    Boot applications that rely on Docker for environment setup. Before Spring Boot
    3.1, using Docker Compose involved manually running `docker compose up` to start
    services, followed by `docker compose down` to stop them. This required developers
    to manage Docker Compose separately and ensure their Spring Boot application’s
    configuration aligned with the dynamically assigned ports and service settings.


    With Spring Boot 3.1, this process is streamlined. Spring Boot can now automatically
    detect a `docker-compose.yaml` file and manage the life cycle of Docker Compose
    services directly. This means:


    *   Spring Boot runs `docker compose up` automatically before connecting to services.


    *   If the services are already running, Spring Boot uses them as they are.


    *   Upon shutting down, the application `docker compose stop` is executed, preventing
    lingering Docker containers.


    The integration builds on the `ConnectionDetails` abstraction. Spring Boot automatically
    detects images started by Docker Compose and creates `ConnectionDetails` beans
    pointing to these services. This eliminates the need for manual configuration
    in many cases.


    Moreover, support for Docker Compose has been integrated into [start.​spring.​io](https://start.spring.io),
    accelerating your project setup process!


    *   We can create a new project with the “Docker Compose support” option.


    ![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig6_HTML.jpg)


    Search interface displaying a query for "docker compose" with a suggestion highlighted
    in bright green. The suggestion reads "Docker Compose Support" with a label "DEVELOPER
    TOOLS" and a description stating it provides support for an enhanced development
    experience. A prompt indicates to press a key for multiple additions.


    Figure 4-6


    Add Docker Compose support dependency


    *   And including dependencies like the “PostgreSQL driver,” you automatically
    receive a well-configured `compose.yaml` file at no extra cost.


    ![](images/625177_1_En_4_Chapter/625177_1_En_4_Fig7_HTML.jpg)


    A screenshot of a code editor displaying a file structure on the left and a YAML
    configuration file on the right. The file structure includes items like `.gitignore`,
    `HELP.md`, `build.gradle`, and `compose.yaml`, which is highlighted. The YAML
    file defines a PostgreSQL service with the image `postgres:latest`, environment
    variables for database name, password, and user, and a port `5432`. At the top,
    there are "Download" and "Copy" buttons.


    Figure 4-7


    Preconfigured compose.yaml


    How amazing is that!


    Integrating Docker Compose into Spring Boot is a significant step in simplifying
    Spring Boot application development workflow. It allows developers to focus more
    on building their applications and less on configuring their development environment[.](https://spring.io/blog/2023/06/21/docker-compose-support-in-spring-boot-3-1)


    ## Summary


    This chapter has covered advanced Docker concepts: networking, volumes, and compose.
    We have examined network drivers like bridge, host, none, and user-defined networks
    and also learned about basic networking commands.


    For Docker volumes, we learned how they can be used for persistence and sharing
    between containers. This chapter showed how to create, list, and inspect volumes,
    mount them, and manage permissions and ownership; how to delete volumes was also
    shown.


    We then covered Docker Compose, which manages multicontainer applications. We
    also explained the structure of docker-compose.yml files and topics such as defining
    services, networking, managing dependencies, and scaling. The chapter concluded
    by providing an overview of Docker Compose support in Spring Boot 3.1, which improves
    integration and development workflows. Knowing these features will help in development
    and deploying containerized applications.


    In the next chapter, we will learn about various base images we can use for containerizing
    Java applications.


    # 5. Containerizing Java Applications with Dockerfile


    This chapter will take a much deeper look at containerizing Java applications
    with Docker with a specific focus on Spring Boot. The key topics will include
    selection of base image for a Dockerfile and brief intro to buildpack for containerizing
    Spring Boot applications.


    ## Understanding Base Images


    A proper base image is crucial while working with Docker for Java applications.
    A base image is referred to as the foundation on which your application will be
    built. The base image holds the essential OS and runtime environment that your
    application needs to run. Therefore, the choice of a base image has a severe impact
    on many aspects, including size, compatibility, security, and performance.


    There are several essential considerations when selecting a base image for your
    Java application. Let’s consider those and the options you have when determining
    a good base image.


    ![](images/625177_1_En_5_Chapter/625177_1_En_5_Fig1_HTML.jpg)


    A steaming coffee mug with a blue whale logo sits inside an open shipping container.
    The container has the Docker logo on its side. The background is a gradient of
    blue and green.


    Figure 5-1


    Java inside a docker container


    ## Choosing JDK vs. JRE As the Base Image


    When choosing a base image for your Java application, you can select either JDK
    or JRE as your base image. Let’s explore the differences between the two:


    | Aspect | JDK Base Image | JRE Base Image |

    | --- | --- | --- |

    | Includes | Full Java development environment, including compiler and tools required
    for development. | Only the runtime environment is required to execute Java applications.
    |

    | Use Case | Suitable for building and compiling Java applications within the
    Docker image. | Suitable for deploying Java applications without development tools.
    |

    | Development vs. Production | Chosen during development or when code compilation
    is required within the container. | Preferred for production deployments due to
    reduced attack surface and smaller image size. |


    ## Official OpenJDK Images


    Images of official OpenJDK versions are also available from the likes of Oracle.
    They can be good, safe, and well-maintained choices. Different images exist in
    various versions and tags; you’ll get to use the exact Java version and JVM implementation
    your application requires.


    For instance, if you’re developing a Java 17 application, you can use the following
    Dockerfile snippet: Images.


    ```

    FROM openjdk:17-jdk

    ```


    This line in the Dockerfile says it uses OpenJDK image as a base. OpenJDK is an
    open source implementation of the Java Platform.


    17-jdk indicates Java version 17, which is an LTS or a Long-Term Support version
    for Java, and the image contains the complete Java Development Kit, ready for
    compiling and building Java applications.


    ## Eclipse Temurin Images


    The Eclipse Temurin project provides a range of Docker images for different Java
    versions and JVM implementations. These images are community-supported and can
    be a good choice if you need specific features or optimizations. For example,
    you can use AdoptOpenJDK’s images with Java 17:


    ```

    FROM eclipse-temurin:17-jdk

    ```


    Specifies the Eclipse Temurin project image as the base. Eclipse Temurin provides
    high-quality, vendor-neutral builds of OpenJDK.


    ## Alpine Linux Images


    Alpine Linux is a slim distro mainly used to create small Docker images. If you
    use Alpine Linux as your base image, your image size will significantly reduce,
    making your application download and deploy much faster.


    Here’s an example of using Alpine Linux with OpenJDK 17:


    ```

    FROM eclipse-temurin:17-alpine

    ```


    Eclipse Temurin provides builds of the OpenJDK. Here Alpine refers to the Alpine
    Linux variant of the image. It is a lightweight distribution, making the image
    smaller and more secure.'
