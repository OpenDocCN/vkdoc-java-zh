- fmt: '### Understanding Containers


    This definition provides a more comprehensive and easily understandable explanation.
    For a Java application, the container will encompass the base image, `JRE` (Java
    Runtime Environment), application code, and other necessary dependencies for its
    execution.


    Let’s further illustrate this concept with an additional example. In Java, a `Class`
    serves as a blueprint or template defining the state and behavior of objects.
    By utilizing this template, we can create multiple instances of the class. Similarly,
    a container image is a template from which numerous container instances can be
    generated.


    Containers can be compared to black boxes without their internal details being
    visible. Each container possesses its own IP address, hostname, and disk. While
    we will explore the benefits of containers in future lessons, isolation is one
    of their notable advantages. Consider running two applications requiring distinct
    versions of Java or incompatible tools and libraries. Achieving this on virtual
    machines (VMs) would be challenging, resulting in resource wastage. However, such
    isolation is inherent with containers, and running multiple applications with
    different requirements becomes feasible.


    ![](images/625177_1_En_1_Chapter/625177_1_En_1_Fig1_HTML.jpg)


    Diagram illustrating a container structure. At the top, the word "Container" is
    displayed with a blue cube icon beneath it, representing the container. Below
    the icon, there are two labeled boxes: "App" and "Libs," indicating the application
    and libraries within the container.


    Figure 1-1


    Container


    As illustrated in Figure [1-2](#625177_1_En_1_Chapter.xhtml#Fig2), the accompanying
    image, the underlying infrastructure, represented at the bottom, can be a physical
    machine or a VM. On top of it lies the operating system layer. The container engine
    is responsible for running containers on the host machine. At the top of the image,
    we observe two separate applications running inside individual containers, each
    wholly isolated.


    ![](images/625177_1_En_1_Chapter/625177_1_En_1_Fig2_HTML.jpg)


    Diagram illustrating a containerized architecture. At the top, two containers
    labeled "Container 1" and "Container 2" each contain a blue cube icon, with "App1"
    and "Libs" in the first, and "App2" and "Libs" in the second. Below the containers
    is a "Container Engine" layer, followed by an "Operating System" layer, and at
    the bottom, a "Physical Machine or VM" layer.


    Figure 1-2


    Visual representation of containers


    Let’s understand more about containers with an analogy.


    - Imagine Java containers similar to `JAR` (Java Archive) files. In Java programming,
    a `JAR` file encapsulates Java classes and resources into a single file, making
    it convenient to distribute and run applications.

    - Now, picture containers as a broader concept that operates similarly. Like `JAR`
    files, containers package an application with its required dependencies and configuration
    files. This encapsulation ensures the application runs consistently across various
    environments, from development to production.

    - It’s similar to placing our Java program and all its dependencies inside a single,
    self-sufficient container, ensuring seamless functionality no matter where we
    put it. In this analogy, just as a `JAR` file contains compiled Java code and
    resources, a container houses an entire application with everything it needs to
    operate successfully.


    Containers encapsulate required dependencies, functioning as self-contained entities
    with IP addresses, hostnames, and disk configurations. The container engine executes
    them on the host machine. These containers package an application with essential
    dependencies and configuration files, ensuring consistent functionality across
    various environments, much like `JAR` files.


    ## The Significance of Containers


    According to the 2023 DZone Containers Trend Report, containerization continues
    to mature and usher. Moreover, container adoption is increasing, particularly
    in large businesses, as most large organizations are going through digital transformation
    to enhance their IT and business capabilities. The point is there are some apparent
    benefits of containerizing our workloads.


    So, what’s this fuss about containers, and why should we adopt containers in our
    organization?


    ### Key Advantages of Containers


    Containers offer several key advantages that make them a popular choice in software
    development and deployment.


    #### Portability


    Portability in computing refers to the capability of executing a computer program
    or software on an operating system different from the one it was initially designed
    for. Due to their inherent portability, containers can be utilized across various
    platforms. They are compatible with Linux, Windows, macOS, and numerous other
    widely used operating systems, ensuring consistent behavior on virtual machines,
    physical servers, and personal laptops.


    #### Resource Utilization


    Containers can be launched without booting an entire operating system, thus reducing
    resource consumption. We can operate efficiently using fewer resources and minimize
    our expenditure associated with cloud services or data center operations.


    #### Isolation


    By running containers on a single server, each container is isolated from all
    others thereby ensuring any issue in one specific container does not affect any
    other container with the same application being run in it.


    #### Agility


    Starts, stops, removals—everything happens swiftly because containers are lightweight
    and self-contained. Due to their quick startup and shutdown times, they are suitable
    for continuous integration and deployment (CI/CD) pipelines. Fast startup and
    shutdown times of the containers as compared to virtual machines contribute to
    faster development and deployment workflows that are more streamlined.


    #### Easy to Scale


    Horizontal scaling of containers becomes much easier by running multiple identical
    application instances. For instance, `Kubernetes` is a container orchestration
    tool that can automatically scale containers offering an advanced approach to
    containerized applications.


    #### Improved Productivity


    Often developers say “It works on my machine” meaning their code runs well without
    any issues in their setup. However, it often fails to work properly in the production
    environment as per the expectations. Containers solve this problem by providing
    predictable environments for them, so there is no need to bother about such compatibility
    problems.


    #### Cloud Support


    Major cloud platforms such as Amazon Web Services, Azure, and Google Cloud Platform
    have embraced containers. In other words, these platforms have adopted container-based
    services. This is made possible by containers being packaged in a standard format
    such as the Open Container Initiative (OCI) that enables them to run without any
    deviation on several cloud platforms. Hence, we can be assured that our application
    will run in the same way regardless of which cloud environment it runs on.


    The following diagram demonstrates some important aspects of containers like their
    isolation, self-containment, and lightweight design. It also emphasizes its portability
    meaning that your app could function with flexibility over different clouds.


    ![](images/625177_1_En_1_Chapter/625177_1_En_1_Fig3_HTML.jpg)


    Diagram illustrating the benefits and components of containers. The main node
    is "Container," branching into five benefits: "Isolated Application Environment,"
    "Lightweight," "Portability," "Efficiency," and "Scalability." "Isolated Application
    Environment" leads to "Container Image," which further divides into "Self-contained
    Unit" and "Dependencies," leading to "Application Code" and "Libraries." "Runtime"
    connects to "Environment Settings." Other benefits include "Resource Usage," "Run
    Anywhere," "Fast Startup," and "Replication."


    Figure 1-3


    Illustrating essential container attributes'
