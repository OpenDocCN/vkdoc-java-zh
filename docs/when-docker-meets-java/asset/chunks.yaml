  raw: '### Keep Workflows DRY (Don’t Repeat Yourself)


    Avoid duplicated code in your GitHub Actions workflows. Reuse actions and shared
    logic by breaking your workflow into modular pieces. You can have reusable workflows
    referenced by several projects, thus reducing maintenance overhead and uniformly
    aligning CI/CD pipelines across the board.


    Suppose you have a Java project and always run the following steps to set up a
    Java, build with maven, and run across different workflows. You should instead
    create a composite action so that you don’t have to repeat these several times
    again for each one of your workflows.


    Step 1: Create the composite action.


    In your repository, create a folder structure for the composite action, like this:


    ```

    .github/actions/java-maven-build

    ├── action.yml

    ```


    Inside `action.yml`, define the steps you want to reuse:


    ```

    # .github/actions/java-maven-build/action.yml

    name: ''Java Maven Build''

    description: ''Set up Java, build with Maven, and run tests''

    runs:

    using: ''composite''

    steps:

    - name: Set up JDK 17

    uses: actions/setup-java@v3

    with:

    java-version: ''17''

    distribution: ''temurin''

    cache: maven

    - name: Build with Maven

    run: mvn clean package --file pom.xml

    - name: Run Tests with Maven

    run: mvn test

    ```


    Step 2: Reuse the composite action in your workflows.


    Now that the composite action is defined, you can reuse it in multiple workflows.
    For instance, in your `.github/workflows/main.yml`:


    ```

    name: Java CI

    on:

    push:

    branches: [ main ]

    pull_request:

    branches: [ main ]

    jobs:

    build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    # Use the composite action

    - uses: ./.github/actions/java-maven-build

    ```


    This approach keeps your workflows DRY by consolidating repeated steps into a
    single composite action, making it easier to manage and update across multiple
    pipelines.


    ### Use Secrets for Sensitive Information


    Store sensitive data like API keys, credentials, and tokens securely in GitHub’s
    Secrets management system. This keeps sensitive information out of your codebase
    and workflow files. Refer to these secrets in the workflow using `${{ secrets.YOUR_SECRET_NAME
    }}`, ensuring that sensitive data is not exposed during the CI/CD process.


    Example:


    ```

    - name: Login to Docker

    run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME
    }} --password-stdin

    ```


    ### Leverage Caching to Reduce Build Times


    Dependencies, for example, Maven or npm packages, can significantly accelerate
    build times in CI workflows. The GitHub Actions cache mechanism allows you to
    skip re-downloading dependencies with each job run. It will be faster and more
    efficient, especially for big projects.


    Example:


    ```

    - name: Cache Maven dependencies

    uses: actions/cache@v3

    with:

    path: ~/.m2

    key: ${{ runner.os }}-maven-${{ hashFiles(''**/pom.xml'') }}

    restore-keys: ${{ runner.os }}-maven

    ```


    ### Run Security and Performance Tests As Part of the CI Process


    Security scanning and performance testing should be part of the CI/CD pipeline
    to catch issues early. Tools such as Trivy for container vulnerabilities or JMeter
    for load testing keep your deployments secure and reliable. Automating these tests
    ensures you don’t ship potentially vulnerable or underperforming code.


    Example:


    ```

    - name: Run Security Scan

    uses: aquasecurity/trivy-action@v0.2.1

    with:

    image-ref: ''my-java-app''

    ```


    ## Summary


    This chapter covers automating Java application deployment using Docker and GitHub
    Actions. It begins with an overview of GitHub Actions, explaining how workflows
    triggered by events like code pushes can automate tasks such as building, testing,
    and deploying code. The chapter then shows how to set up a CI pipeline for Java
    using Maven, including caching to speed up builds.


    It also explains how to containerize a Java app using Docker and automate this
    process with GitHub Actions. Best practices include reusing workflows, securing
    sensitive data, optimizing Docker images with multi-stage builds, and running
    security tests. These steps streamline and secure the CI/CD process. This chapter
    also covers how we can deploy Docker images to GCP using GitHub Actions as the
    CI/CD process.


    # 8. Exploring Docker Alternatives


    ​​While Docker has been the go-to solution for containerization, the container
    ecosystem has evolved much, introducing a few powerful alternatives that address
    some of the pain points in modern development environments. This chapter goes
    through four of the most popular Docker alternatives, Podman, Buildah, Kaniko,
    and img, each of which offers unique advantages in different containerization
    needs. From Podman’s daemonless architecture and improvements in security compared
    to Docker through Buildah-specific image building capability, to a CI/CD-optimized
    setup by Kaniko, and through img’s easier container image construction, these
    applications represent the emerging wave of container solutions. Whether it’s
    security, efficiency, or requirements of specific use cases, all these Docker
    alternatives are necessary for understanding how one should proceed during the
    journey toward containerization.


    ## Podman


    Podman is an open source software under which containers could be created, managed,
    and run on any Linux operating system, originally developed and maintained by
    Red Hat with functionality quite like Docker.


    It has some distinct features:


    *   **Daemonless**: It is daemonless because it does not require having a central
    daemon as does Docker. A daemonless architecture enhances security and reduces
    overhead since every container will run separately under the identity of the user.


    *   **Rootless**: Podman runs containers without requiring root privileges, which
    is a huge security advantage over Docker. This reduces the likelihood of a security
    breach through the method of container escape (i.e., refers to a form of vulnerability
    by which the attacker breaks free from the container boundaries to gain access
    to the potential underlying operating system of the host).


    *   **Docker compatibility**: Podman is designed to be compatible with the CLI
    interface of Docker. Therefore, most of the Docker commands can be replaced by
    the podman command.


    *   **Pod concept**: Kubernetes introduced the concept of pods (i.e., groups of
    containers that can be treated collectively as a single unit). Podman uses similar
    concept, but it is suitable for single-node use cases and lacks the orchestration
    capabilities of Kubernetes.


    These features make Podman a good alternative to Docker, especially when security
    and resource efficiency are considered.


    ## Setting Up Podman


    To install Podman Desktop on a Mac, you have two main methods: using the `.dmg`
    file or Homebrew. Here are the detailed steps for both methods:


    **Using homebrew:** If you haven’t already installed Homebrew (a package manager
    for macOS), you can install it by running the following command in your terminal:


    *   Once Homebrew is installed, you can install Podman by running the following
    command in your terminal:


    ```

    $ /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

    ```


    *   After installing Podman, you need to initialize a virtual machine (VM) which
    Podman will use to run containers. Do this by running:


    ```

    $ brew install podman

    ```


    *   To start the Podman VM, run:


    ```

    $ podman machine init

    ```


    *   Finally, you can verify that Podman is installed correctly by running:


    ```

    $ podman machine start

    ```


    ```

    $ podman version

    ```


    This command should display the installed version of Podman.'
  trans: '

    ### 保持工作流程 DRY（不要重复自己）


    避免在 GitHub Actions 工作流程中出现重复代码。通过将工作流程分解为模块化组件来重用操作和共享逻辑。你可以创建可被多个项目引用的可重用工作流程，从而减少维护开销，并统一协调整个
    CI/CD 流水线。


    假设你有一个 Java 项目，并且总是在不同的工作流程中运行以下步骤来设置 Java、使用 Maven 构建并运行测试。你应该创建一个复合操作，这样就不必为每个工作流程重复这些步骤。


    **步骤 1：创建复合操作。**


    在你的仓库中，为复合操作创建一个文件夹结构，如下所示：


    ```

    .github/actions/java-maven-build

    ├── action.yml

    ```


    在 `action.yml` 内部，定义你想要重用的步骤：


    ```

    # .github/actions/java-maven-build/action.yml

    name: ''Java Maven Build''

    description: ''设置 Java，使用 Maven 构建，并运行测试''

    runs:

    using: ''composite''

    steps:

    - name: 设置 JDK 17

    uses: actions/setup-java@v3

    with:

    java-version: ''17''

    distribution: ''temurin''

    cache: maven

    - name: 使用 Maven 构建

    run: mvn clean package --file pom.xml

    - name: 使用 Maven 运行测试

    run: mvn test

    ```


    **步骤 2：在工作流程中重用复合操作。**


    现在复合操作已定义，你可以在多个工作流程中重用它。例如，在你的 `.github/workflows/main.yml` 文件中：


    ```

    name: Java CI

    on:

    push:

    branches: [ main ]

    pull_request:

    branches: [ main ]

    jobs:

    build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    # 使用复合操作

    - uses: ./.github/actions/java-maven-build

    ```


    这种方法通过将重复步骤整合到单个复合操作中，使你的工作流程保持 DRY，从而更易于跨多个流水线进行管理和更新。


    ### 使用 Secrets 管理敏感信息


    将 API 密钥、凭据和令牌等敏感数据安全地存储在 GitHub 的 Secrets 管理系统中。这可以将敏感信息排除在你的代码库和工作流程文件之外。在工作流程中使用
    `${{ secrets.YOUR_SECRET_NAME }}` 引用这些 secrets，确保敏感数据在 CI/CD 过程中不会暴露。


    示例：


    ```

    - name: 登录到 Docker

    run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME
    }} --password-stdin

    ```


    ### 利用缓存减少构建时间


    依赖项，例如 Maven 或 npm 包，可以显著加快 CI 工作流程中的构建时间。GitHub Actions 缓存机制允许你跳过每次作业运行时重新下载依赖项。这将更快、更高效，尤其适用于大型项目。


    示例：


    ```

    - name: 缓存 Maven 依赖项

    uses: actions/cache@v3

    with:

    path: ~/.m2

    key: ${{ runner.os }}-maven-${{ hashFiles(''**/pom.xml'') }}

    restore-keys: ${{ runner.os }}-maven

    ```


    ### 将安全性和性能测试作为 CI 流程的一部分运行


    安全扫描和性能测试应作为 CI/CD 流水线的一部分，以便及早发现问题。诸如用于容器漏洞的 Trivy 或用于负载测试的 JMeter 等工具，可以确保你的部署安全可靠。自动化这些测试可以确保你不会发布存在潜在漏洞或性能不佳的代码。


    示例：


    ```

    - name: 运行安全扫描

    uses: aquasecurity/trivy-action@v0.2.1

    with:

    image-ref: ''my-java-app''

    ```


    ## 总结


    本章涵盖了使用 Docker 和 GitHub Actions 自动化 Java 应用程序部署。首先概述了 GitHub Actions，解释了由代码推送等事件触发的工作流程如何自动化构建、测试和部署代码等任务。然后，本章展示了如何使用
    Maven 为 Java 设置 CI 流水线，包括使用缓存来加速构建。


    本章还解释了如何使用 Docker 容器化 Java 应用程序，并使用 GitHub Actions 自动化此过程。最佳实践包括重用工作流程、保护敏感数据、使用多阶段构建优化
    Docker 镜像以及运行安全测试。这些步骤简化并保护了 CI/CD 过程。本章还介绍了如何使用 GitHub Actions 作为 CI/CD 流程将 Docker
    镜像部署到 GCP。


    # 8. 探索 Docker 替代方案


    虽然 Docker 一直是容器化的首选解决方案，但容器生态系统已经发展了很多，引入了一些强大的替代方案，以解决现代开发环境中的一些痛点。本章将介绍四种最流行的
    Docker 替代方案：Podman、Buildah、Kaniko 和 img，每种方案在不同的容器化需求中都提供了独特的优势。从 Podman 的无守护进程架构和相比
    Docker 的安全性改进，到 Buildah 特定的镜像构建能力，再到 Kaniko 针对 CI/CD 优化的设置，以及 img 更简单的容器镜像构建，这些应用代表了新兴的容器解决方案浪潮。无论是安全性、效率还是特定用例的需求，了解所有这些
    Docker 替代方案对于规划容器化之旅至关重要。


    ## Podman


    Podman 是一个开源软件，可以在任何 Linux 操作系统上创建、管理和运行容器，最初由 Red Hat 开发并维护，其功能与 Docker 非常相似。


    它有一些显著的特点：


    *   **无守护进程**：它是无守护进程的，因为它不像 Docker 那样需要一个中央守护进程。无守护进程架构增强了安全性并减少了开销，因为每个容器都将以用户身份独立运行。


    *   **无根模式**：Podman 无需 root 权限即可运行容器，与 Docker 相比，这是一个巨大的安全优势。这降低了通过容器逃逸方法（即攻击者突破容器边界以获取对底层主机操作系统访问权限的一种漏洞形式）发生安全漏洞的可能性。


    *   **Docker 兼容性**：Podman 被设计为与 Docker 的 CLI 接口兼容。因此，大多数 Docker 命令都可以用 `podman`
    命令替换。


    *   **Pod 概念**：Kubernetes 引入了 Pod 的概念（即可作为一个整体单元处理的容器组）。Podman 使用了类似的概念，但它适用于单节点用例，并且缺乏
    Kubernetes 的编排能力。


    这些特性使 Podman 成为 Docker 的一个良好替代方案，尤其是在考虑安全性和资源效率时。


    ## 设置 Podman


    要在 Mac 上安装 Podman Desktop，你有两种主要方法：使用 `.dmg` 文件或 Homebrew。以下是两种方法的详细步骤：


    **使用 Homebrew：** 如果你尚未安装 Homebrew（macOS 的包管理器），可以通过在终端中运行以下命令来安装它：


    *   安装 Homebrew 后，你可以通过在终端中运行以下命令来安装 Podman：


    ```

    $ /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

    ```


    *   安装 Podman 后，你需要初始化一个虚拟机（VM），Podman 将使用该虚拟机来运行容器。通过运行以下命令来执行此操作：


    ```

    $ brew install podman

    ```


    *   要启动 Podman VM，请运行：


    ```

    $ podman machine init

    ```


    *   最后，你可以通过运行以下命令来验证 Podman 是否安装正确：


    ```

    $ podman machine start

    ```


    ```

    $ podman version

    ```


    此命令应显示已安装的 Podman 版本。

