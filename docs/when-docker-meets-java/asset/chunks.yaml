  trans: '

    ### 最佳实践


    **关于组织阶段的提示：** 为每个阶段命名以便清晰识别（例如，`FROM maven:3.6.3-jdk-11 as builder`）。保持构建阶段简洁，仅关注编译代码所必需的内容。


    **最小化层数与缓存利用：** 尽可能合并命令以减少层数。通过将命令按变更可能性从低到高排序，充分利用 Docker 的构建缓存。


    ### 示例


    **阶段 1：构建**：使用 Maven 镜像，添加源代码，并运行 `mvn package`。


    **阶段 2：运行时**：使用 JRE 镜像，从构建阶段复制 JAR 文件。


    **Dockerfile 结构**：


    ```

    # 构建阶段

    FROM maven:3.6.3-jdk-11 as builder

    WORKDIR /app

    COPY . .

    RUN mvn clean package

    # 运行时阶段

    FROM openjdk:11-jre-slim

    COPY --from=builder /app/target/myapp.jar /usr/local/lib/myapp.jar

    ENTRYPOINT ["java","-jar","/usr/local/lib/myapp.jar"]

    ```


    多阶段构建对于为 Java 应用构建轻量且安全的 Docker 镜像至关重要。将构建环境与运行环境分离，可以大幅减小最终镜像的体积，并最大程度地减少因镜像臃肿而带来的安全漏洞。这是任何严肃的
    Java 开发者在使用 Docker 时都应掌握的重要技术。


    ## 使用 Java Jlink 创建更精简的容器镜像


    `jlink` 是 Java 9 中作为 Java 平台模块系统的一部分引入的工具，它允许用户创建仅包含特定应用所需模块的自定义 Java 运行时镜像。通过定制运行时环境，用户可以享受到多种重要优势，尤其是在容器等受限环境中的部署场景。


    ### jlink 的主要特性与优势


    *   **自定义运行时镜像**：你可以为应用构建一个更小、更优化的 Java 运行时，仅包含必要的模块，从而显著减小运行时体积，远小于标准 Java 运行时环境。


    *   **性能优化**：应用启动速度更快，系统资源占用更少；这在云环境和微服务架构中非常有价值。


    *   **增强的安全性**：通过仅包含必需的模块，减少了安全漏洞的攻击面。模块越少，潜在的攻击点就越少。


    *   **模块化**：`jlink` 与 Java 9 引入的模块系统协同工作。该系统允许 Java 应用实现更好的封装和更有组织的依赖管理。


    ### 了解 jlink


    *   **模块识别**：`jlink` 基于模块工作。首先确定你的应用需要哪些模块。可以使用 `jdeps` 等工具分析依赖关系。


    *   **创建自定义运行时**：确定所需模块后，使用 `jlink` 命令将这些模块包含进来，创建一个运行时镜像。这是一个自包含的应用运行环境，无需额外安装
    Java 即可运行。


    *   **命令行使用**：`jlink` 通过命令行使用，你需要指定要包含的模块以及其他选项，例如压缩级别或输出目录。


    以下命令创建一个自定义 Java 运行时镜像，其中仅包含指定的 Java 平台模块和我们自己的模块，这对于为 Java 应用创建小巧高效的运行时环境非常理想。


    ```

    jlink --module-path $JAVA_HOME/jmods:path/to/your/modules --add-modules com.example.yourmodule
    --output path/to/output/directory

    ```


    在此命令中：


    *   `--module-path:` 此选项指定模块路径。模块路径是一个目录列表，`jlink` 会在此路径中搜索模块定义。在此命令中，`$JAVA_HOME/jmods`
    是 Java 主目录中 `jmods` 目录的路径。`jmods` 目录包含 Java 平台模块的定义。而 `path/to/your/modules` 路径应替换为你希望包含在运行时镜像中、但非标准
    Java 发行版一部分的任何额外模块的路径。


    *   `--add-modules:` 此选项指定要添加到自定义运行时镜像中的模块。在此例中，`com.example.yourmodule` 是我们要包含的模块名称。你需要将
    `com.example.yourmodule` 替换为你实际拥有的模块名称。


    *   `--output:` 此选项指定创建自定义运行时镜像的输出目录路径。你需要将 `path/to/output/directory` 替换为你希望保存运行时镜像的路径。


    下图展示了 `jlink` 过程中的关键步骤。


    ![](img/625177_1_En_11_Fig1_HTML.jpg)


    流程图展示了使用 jlink 创建自定义 Java 运行时镜像的过程。步骤包括：“开始：调用 jlink”，“指定模块路径”（附注：包含 JDK 和应用模块），“定义所需模块”（附注：要包含在运行时中的模块），“自定义选项”，“创建运行时镜像”，最后是“自定义
    Java 运行时镜像”。图表包含解释模块路径和所需模块的图例。


    图 11-1


    jlink Java 运行时镜像创建流程


    ### jlink 的使用场景


    *   **容器化应用**：特别适用于 Docker 和其他容器平台，在这些平台上，镜像大小会显著影响性能和资源使用。


    *   **创建最小运行时环境**：对于仅需要 Java 平台模块子集的应用，可以创建比标准运行时小得多的运行时。这对于微服务、无服务器函数或任何需要小体积的应用非常有用。


    *   **物联网与嵌入式系统**：适用于资源受限的环境，如物联网设备或嵌入式系统。


    *   **安全性**：通过仅包含必要的模块，jlink 减少了安全漏洞的攻击面。应用不易受到针对其未包含模块的攻击。


    *   **更快的启动时间**：更小的运行时有助于加快应用启动速度，这对于桌面应用和需要快速启动的工具尤其有利。


    ### 分步指南


    在 Dockerfile 中使用 Jlink


    *   **识别必要模块：** 确定你的应用所需的模块。


    *   **创建 Jlink 脚本：** 在 Dockerfile 中集成一个脚本，用于使用已识别的模块执行 Jlink。


    *   **组装运行时镜像：** 使用 Jlink 创建自定义运行时。


    选择必要的 Java 模块


    *   使用 `jdeps` 等工具分析应用的模块依赖关系。


    *   在运行时镜像的 Jlink 命令中包含这些模块。


    ### 最佳实践


    *   **最小化模块集：** 仅包含必要的模块。


    *   **压缩镜像：** 使用 Jlink 的压缩选项进一步减小体积。


    *   **分层 Docker 镜像：** 合理组织 Dockerfile 的结构，以有效利用 Docker 层缓存。

    '
- fmt: '### Example


    **Scenario**: A simple Java application that uses HTTP and JSON processing.


    **Dockerfile setup**:

    - Start with a JDK image to compile the application and run `Jlink`.

    - Use `Jlink` to create a custom runtime including only the required modules (`java.base`,
    `java.net.http`, `java.json`).

    - Construct the final image using a minimal base, copying the custom runtime and
    application JAR.


    **Sample Dockerfile**:


    ```

    # Compile Stage

    FROM openjdk:11 as build

    WORKDIR /app

    COPY . .

    RUN javac -d out --module-path lib --module-source-path src $(find src -name "*.java")

    RUN jlink --add-modules java.base,java.net.http,java.json --output jre

    # Final Stage

    FROM alpine:latest

    COPY --from=build /app/jre /opt/jre

    COPY --from=build /app/out /app

    ENTRYPOINT ["/opt/jre/bin/java", "-m", "com.myapp/com.myapp.Main"]

    ```


    `Jlink` significantly changes the way one dockerizes Java applications, enabling
    the creation of slimmer, more efficient container images. It is a powerful tool
    for Java developers, particularly in the context of Docker, where image size and
    security are paramount. Mastering `Jlink` enables developers to optimize their
    Java applications for modern cloud environments.


    ## Using Distroless Base Images


    The base image is very significant in defining the security, efficiency, and size
    of containerized applications. Distroless images have emerged with much popularity
    from Google. In particular, Java developers widely adopt it.


    ### Understanding Distroless Images


    Distroless images are minimalistic container images containing only the application
    and its runtime dependencies. They do not include package managers, shells, or
    other binaries typically found in a standard operating system distribution. For
    Java applications, a distroless image would typically include a JVM and the application’s
    JAR file, nothing more.


    ### Creating Distroless Java Image


    **Write a Dockerfile**: Start with a base image that contains only a Java Runtime
    Environment (JRE).


    ```

    FROM gcr.io/distroless/java17-debian12

    COPY target/myapp.jar /app.jar

    CMD ["app.jar"]

    ```


    **Build the image**: Use Docker to build your image.


    ```

    $ docker build -t my-java-app .

    ```


    **Run your container**: Deploy your application.


    ```

    $ docker run -d my-java-app

    ```


    ### Benefits of Distroless Images


    - **Enhanced security**: By removing unnecessary operating system components,
    the attack surface of the container is significantly reduced. Fewer components
    in the image mean fewer potential vulnerabilities.

    - **Smaller image size**: Distroless images are minimalistic, making them smaller
    in size; they take less time to be pulled and pushed in the CI/CD pipeline. They
    use lesser storage spaces compared to other images. Smaller images accelerate
    the deployment time in orchestration systems such as Kubernetes.

    - **Simplicity and maintenance**: With fewer components in the image, there’s
    less need for patching and updates. Provides a clean and minimal environment for
    your application, ensuring consistency across different deployment environments.


    ### Best Practices


    - **Understand your application’s dependencies**: Ensure all runtime dependencies
    are included in your image.

    - **Debugging challenges**: With a shell or debugging tools, troubleshooting running
    containers can be more accessible. Consider using a debug version during the development
    phase.

    - **Keep up with updates**: Regularly update the base image to ensure you have
    the latest security patches for the Java runtime.


    Distroless images have a compelling approach in terms of deploying Java applications
    inside containers, balancing security, efficiency, and simplicity. Embracing distroless
    images means that developers and organizations reduce the risks of running large,
    complex container images in production while enjoying streamlined and efficient
    deployment processes. In the future, the industry will be more prone to distroless
    images with its trend towards minimalism in containerization.


    ### Applying JVM Arguments and Resource Limits to Docker Containers


    It is very important to optimize the JVM settings and container resource limits
    when running Java applications in Docker containers. Optimized configuration will
    ensure effective usage of resources, and consequently, application performance
    will increase without common issues like out-of-memory errors.


    ### Importance of JVM Arguments and Resource Limits


    **JVM arguments**: Customize the behavior of the JVM to suit specific needs, like
    garbage collection strategy, heap size, and other performance-related settings.


    **Resource limits in Docker**: Define the maximum amount of CPU and memory resources
    a container can use, preventing any application from exhausting the host system’s
    resources.


    **Setting memory limits**: Use Docker’s `-m` or `--memory` flag to set a memory
    limit.


    Example: `docker run -m 512m my-java-app` caps the container at 512 MB of memory.


    **Setting CPU limits**: Use `--cpus` to limit the number of CPU cores the container
    can use.


    Example: `docker run --cpus=2 my-java-app` limits the application to 2 CPU cores.


    ### Passing JVM Arguments in Docker


    Use the `JAVA_OPTS` environment variable or pass arguments directly in the `CMD`
    or `ENTRYPOINT` in the Dockerfile.


    ```

    docker run -e "JAVA_OPTS=-Xmx256m -Xms256m" my-java-app

    ```


    Or we can include it in the Dockerfile.


    ```

    ENTRYPOINT ["java", "-Xmx256m", "-Xms256m", "-jar", "myapp.jar"]

    ```


    ### Balancing Resources for Optimal Performance


    - **Understand application needs**: Profile your application to understand its
    resource usage patterns.

    - **Avoid over-allocation**: Don’t allocate more resources than necessary, as
    it could starve other containers or processes.

    - **Monitor and adjust**: Continuously monitor performance and adjust settings
    as needed.


    ## Configuring Java Applications for Efficiency


    Consider a scenario with a Java web application running in a Docker container.
    What do we need to take care of to get optimal performance from our web application?
    Per the current application load, we only need 700 MB of memory and one CPU core.


    Inside the Dockerfile, we can set the memory limit to 1 GB and the CPU limit to
    1 core. Even though the application needs ~700 MB of memory, we should keep some
    buffer in case there are spikes in the usage.


    We should also configure JVM arguments for garbage collection and heap settings.


    ```

    $docker build -t my-java-app .

    $docker run -m 1g --cpus=1 -e "JAVA_OPTS=-Xmx700m -Xms700m -XX:+UseG1GC" my-java-app

    ```


    Tuning JVM settings and setting resource limits in Docker is essential for running
    Java applications efficiently and reliably in containerized environments. These
    configurations help manage application performance, ensure optimal use of resources,
    and maintain the stability of both the application and the host system. Regular
    monitoring and adjustments based on the application’s behavior are essential to
    optimal performance.


    ## Securing Docker Images


    In containerization, Docker image security is paramount. With the widespread adoption
    of Docker in deploying applications, ensuring the security of Docker images is
    essential to protect against vulnerabilities that attackers could exploit.


    ### Common Security Vulnerabilities


    Although versatile, Docker is also vulnerable if not managed appropriately. This
    may offer attackers or hackers an entry point.


    Common vulnerabilities include:


    - **Outdated software and libraries**: Images containing outdated operating systems,
    libraries, or frameworks are vulnerable to known vulnerabilities.

    - **Insecure configuration**: A misconfigured Dockerfile or container setting
    might expose the container to risk.

    - **Embedded secrets**: Secrets hardcoded into images may cause unauthorized access.

    - **Unnecessary packages**: The addition of unused software in images raises the
    attack surface.'
