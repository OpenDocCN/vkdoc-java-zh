    |


    ## JVM vs. GraalVM


    | Feature | JVM | GraalVM |

    | --- | --- | --- |

    | **Language support** | Primarily supports Java and JVM-based languages like
    Scala or Kotlin. | Supports additional languages like JavaScript, Ruby, Python,
    and R, making it a polyglot VM. |

    | **Performance optimization** | Uses just-in-time (JIT) compilation to optimize
    bytecode at runtime. | Includes an advanced JIT compiler (Graal Compiler) for
