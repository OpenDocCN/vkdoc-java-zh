  trans: "\n### 扫描漏洞\n\n*   **选择扫描工具**：可使用 Clair、Trivy、Synk 或 Docker 的扫描功能等工具。\n\n\
    *   **将扫描集成到 CI/CD 流水线中**：在镜像构建或部署过程中自动化扫描流程。\n\n*   **审查并处理发现结果**：分析扫描器生成的报告，并处理已识别的漏洞。\n\
    \n### 最佳实践\n\n*   **持续监控**：定期扫描镜像中的漏洞，即使在部署之后也应如此。\n\n*   **依赖项管理**：跟踪 Docker\
    \ 镜像中使用的依赖项，并定期更新它们。\n\n*   **最小化攻击面**：使用最小化的基础镜像，并避免安装不必要的软件包。\n\n*   **非 root\
    \ 用户**：以非 root 用户身份运行容器，以降低容器逃逸攻击的风险。\n\n*   **.dockerignore 文件**：使用 `.dockerignore`\
    \ 文件从构建上下文中排除不必要的文件和目录，以防止敏感信息泄露。\n\n*   **私有仓库与签名镜像**：将镜像存储在具有强访问控制的受信任私有容器仓库中。使用\
    \ Docker Content Trust 等功能对镜像进行签名，并验证其完整性和来源。\n\n*   **实施最小权限原则**：确保 Docker 镜像中的文件和可执行文件仅拥有运行应用程序所需的最小权限。在可能的情况下，在容器中使用只读文件系统以防止不必要的更改。\n\
    \n*   **保护应用程序密钥**：切勿在 Docker 镜像中对密码或 API 密钥等敏感信息进行硬编码。要管理敏感信息，请使用 Docker Secrets、HashiCorp\
    \ Vault 等密钥管理工具，或在运行时注入的环境变量。\n\n*   **保持主机系统安全**：确保 Docker 守护进程配置安全。保持主机系统安全，因为主机中的漏洞可能会影响所有容器。\n\
    \n保护 Docker 镜像安全是一个持续的过程，需要持续的维护、警惕和最佳实践。通过及时了解漏洞、维护最新镜像以及最小化攻击面，您可以显著增强 Docker\
    \ 部署的安全性。将安全实践集成到开发和部署流水线中，是确保构建健壮且安全的容器化应用程序的方法。\n\n## 选择 Maven 与 JDK 与 JRE 基础镜像\n\
    \n在 Docker 生态系统中，选择基础镜像对于构建高效且有效的 Java 应用程序至关重要。Maven、JDK 和 JRE 镜像各有不同的用途。理解它们的差异和用例对于优化\
    \ Docker 镜像构建至关重要。\n\nMaven、JDK 和 JRE 镜像之间的区别\n\n*   **Maven 镜像**：包含 Maven 构建工具，通常还包含\
    \ JDK。最适合从源代码构建 Java 应用程序。\n\n*   **JDK（Java 开发工具包）镜像**：包含 Java 运行时环境（JRE）、编译器和用于构建基于\
    \ Java 的应用程序的工具。编译 Java 代码时需要。\n\n*   **JRE（Java 运行时环境）镜像**：执行 Java 应用程序所需的运行时环境。它不包含\
    \ JDK 中的工具和编译器。\n\n## 优缺点\n\n| 镜像类型 | 优点 | 缺点 | 使用场景 |\n| --- | --- | --- | ---\
    \ |\n| Maven 镜像 | 对于使用 Maven 作为构建工具的应用程序来说，构建方便<br>- 通常包含 JDK | 比 JDK 或 JRE 镜像更大，因为它包含了额外的构建工具\
    \ | 在开发期间或 CI/CD 流水线中构建 Java 应用程序 |\n| JDK 镜像 | 编译 Java 代码所必需，包含开发所需的工具 | 与 JRE\
    \ 镜像相比体积更大 | 应用程序开发以及任何需要编译 Java 代码的场景 |\n| JRE 镜像 | 体积更小，专注于运行时，非常适合运行 Java 应用程序\
    \ | 不能用于编译 Java 代码或任何与开发相关的任务 | 在生产环境或任何不需要代码编译的环境中运行 Java 应用程序 |\n\n### 最佳实践\n\
    \n*   **分析您的需求**：确定您的应用程序是需要编译还是仅需运行。\n\n*   **考虑环境**：在开发和 CI/CD 流水线中使用 JDK 镜像，在生产环境中使用\
    \ JRE 镜像。\n\n*   **大小与功能**：在更小的镜像大小与所需功能之间取得平衡。\n\n### 示例\n\n*   **Maven 镜像**：\n\
    \    *   **场景**：使用 Maven 构建一个 Spring Boot 应用程序。\n\n    *   **Dockerfile 示例**：\n\
    \n*   **JDK 镜像**：\n    *   **场景**：编译一个 Java 应用程序。\n\n    *   **Dockerfile 示例**：\n\
    \n```\nFROM maven:3.6-jdk-11 AS build\nCOPY src /usr/src/app/src\nCOPY pom.xml\
    \ /usr/src/app\nRUN mvn -f /usr/src/app/pom.xml clean package\n```\n\n*   **JRE\
    \ 镜像**：\n    *   **场景**：运行一个预编译的 Java 应用程序。\n\n    *   **Dockerfile 示例**：\n\n\
    ```\nFROM openjdk:11-jdk\nCOPY . /usr/src/myapp\nWORKDIR /usr/src/myapp\nRUN javac\
    \ Main.java\n```\n\n```\nFROM openjdk:11-jre-slim\nCOPY --from=build /usr/src/app/target/app.jar\
    \ /usr/app/\nENTRYPOINT [\"java\", \"-jar\", \"/usr/app/app.jar\"]\n```\n\n这取决于您的\
    \ Java 应用程序在 Docker 中的需求。Maven 镜像最适合涉及 Maven 的构建场景，JDK 镜像最适合开发和编译任务，而 JRE 镜像则针对运行\
    \ Java 应用程序进行了最佳优化。理解这些选择并将其与您的应用程序需求对齐，可以确保效率、性能以及精简的开发流程。\n\n## 总结\n\n本章全面回顾了在当今容器化环境中对\
    \ Java 开发者至关重要的 Docker 最佳实践。本章从多阶段构建开始，这是创建精简且安全的 Docker 镜像的高级技术。通过将构建环境与运行时环境隔离，可以极大地减小最终镜像的大小，同时仍保留所有必需的功能；本章展示了如何构建\
    \ Dockerfile 以及如何在阶段之间处理工件。\n\n接着，讨论转向使用 jlink 进行 Java 运行时优化，jlink 是 Java 9 中引入的一个强大工具。本节向开发者展示了如何创建仅包含其应用程序所需模块的自定义运行时镜像。这种有针对性的方法不仅减小了容器大小，还通过最小化潜在攻击面提高了安全性；本章提供了实际示例和在实际场景中选择模块的最佳实践。\n\
    \n接下来，关于无发行版基础镜像的章节涵盖了仅包含应用程序及其运行时所需依赖项的最小容器镜像。这对于通过移除不必要的组件来提高安全性和效率非常有价值，从而产生更小、更安全、更易于维护和部署的容器。\n\
    \n然后，本章详细介绍了 JVM 参数和资源管理，深入探讨了内存使用、CPU 分配和垃圾回收设置的优化。广泛的覆盖范围帮助开发者了解如何平衡资源分配以实现最佳性能，以及容器化\
    \ Java 应用程序中的常见陷阱。所提供的指导确保应用程序在其容器化环境中高效运行，同时保持稳定性和可靠性。\n\n最后，本章将通过全面审视 Docker\
    \ 镜像安全最佳实践来总结安全注意事项，包括漏洞扫描和安全配置管理、实施最小权限原则、持续监控以及在应用程序生命周期内定期更新容器化环境。这些实践相结合，提供了一种完整的\
    \ Java 应用程序容器化方法，使开发团队能够创建高效、安全且可维护的解决方案，同时避免在 Docker 实施中常见的陷阱。\n"
