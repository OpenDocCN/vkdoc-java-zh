    \ has come with an exciting new feature: buildpack support, where we can use an\
    \ effortlessly created Docker image instead of having to craft our own `Dockerfile`\
    \ and execute complex commands using `docker build` from the command line. All\
    \ that will now be required is a simple command:\n\n```\n$ mvn spring-boot:build-image\n\
    ```\n\nLikewise, for Gradle enthusiasts:\n\n```\n$ ./gradlew bootBuildImage\n\
    ```\n\nIt is important to note that these commands can only be executed correctly\
    \ when Docker is installed and running on our system. The `build-image` goal greatly\
    \ simplifies the process by completely automating the creation and the rapid deployment\
    \ of Docker images, so developers no longer need to manually craft a `Dockerfile`\
    \ or deal with especially complex build commands. This process abstracts away\
    \ a number of the underlying complexities. It provides a cloud-like deployment\
    \ experience comparable to a few platforms such as Heroku or Cloud Foundry.\n\n\
    This approach further revolutionizes how to construct Docker images. Rather than\
    \ having to make the same change in multiple `Dockerfile`s across different projects,\
    \ we can craft or customize the image builder of buildpacks for our use cases.\n\
    \nApart from the obvious simplicity and improved developer experience, buildpacks\
    \ can significantly enhance efficiency. For instance, the buildpacks approach\
    \ naturally results in a layered Docker image, and it takes advantage of the exploded\
    \ version of the `JAR` file.\n\n## Summary\n\nThis chapter focuses on containerizing\
    \ Spring Boot Java applications using Docker. It starts by exploring base images,\
    \ from which all Docker containers begin: options are diverse, from an official\
    \ OpenJDK image down to very lightweight Alpine Linux versions.\n\nNext, we learned\
    \ about Dockerizing a simple “Hello World” Spring Boot application: steps to wrap\
    \ the application in a Docker container. You also developed some understanding\
    \ of advanced topics like multi-stage builds and security recommendations for\
    \ your Docker images using Distroless images.\n\nOne very notable feature is buildpacks,\
    \ which Spring Boot 2.3 now offers. This will allow you to use Docker images without\
    \ writing a single `Dockerfile`: with just a simple command, you are good to go.\
    \ That makes the containerization process much easier.\n\n# 6. Working with Container\
    \ Builder Tools for Java Applications\n\nThis chapter will take a much deeper\
    \ look at four main tools: Google Jib, Fabric8 Docker Maven Plugin, Spotify’s\
    \ Docker-Maven-Plugin, and Cloud-Native Buildpacks. Each tool approaches Java\
    \ application containerization differently, from streamlining Docker image creation\
    \ to integrating seamlessly with Maven build processes.\n\n## Building Container\
    \ Images with the Google Jib\n\n### Understanding Jib\n\nGoogle Jib is the Java\
    \ containerizer developed by Google, and it’s actually tailor-made for Java developers.\
    \ What distinguishes Jib from others is its simplicity. Google Jib simplifies\
    \ creating a container image for Java developers: abstracting away the complexities\
    \ of Docker so that developers can focus on their artifacts. Jib’s intelligent\
    \ layering and use of distroless images make the containerization process efficient\
    \ and secure.\n\nFollowing are some of the key features of Jib:\n\n- Jib eliminates\
    \ the need for developers to know about Docker installation.\n- Jib operates without\
    \ a daemon.\n- Jib doesn’t require a `Dockerfile`.\n- Jib doesn’t engage with\
    \ Docker’s complexities, such as the `docker build`, `tag`, and `push` processes.\n\
    - With Jib to containerize your Java application, a Java developer can add a Jib\
    \ plugin to their chosen build tool (Maven or Gradle), and that’s all that’s required.\n\
    - Jib intelligently divides your application into multiple layers. When code changes\
    \ occur, only the affected layers are rebuilt, significantly reducing build times.\n\
    \nJib accepts your application’s source code as input and generates a container\
    \ image for your application as output.\n\n![](images/625177_1_En_6_Chapter/625177_1_En_6_Fig1_HTML.jpg)\n\
    \nFlowchart illustrating the process of creating a container image using Jib.\
    \ The sequence starts with \"Source Code,\" followed by an arrow pointing to \"\
    Jib,\" and concludes with another arrow leading to \"Container Image.\"\n\nFigure\
    \ 6-1 Jib in action\n\n### Building with Jib\n\nA Java application image is normally\
    \ represented by one layer containing the application JAR. However, Jib uses a\
    \ special build approach, breaking an application into multiple layers. This kind\
    \ of splitting allows for even more finely grained incremental builds. Thus, changing\
    \ some code rebuilds only those parts you have changed and does not involve other\
    \ parts of the application. These layers are placed, by default, over an OpenJDK\
    \ base image; otherwise, you can also configure a custom base image.\n\nIn your\
    \ `pom.xml` file, you can configure the Maven Jib plugin for Spring Boot projects.\
    \ Below is a sample configuration:\n\n```\n...\n<build>\n    <plugins>\n     \
    \   <plugin>\n            <groupId>com.google.cloud.tools</groupId>\n        \
    \    <artifactId>jib-maven-plugin</artifactId>\n            <version>3.3.2</version>\n\
    \            <configuration>\n                <to>\n                    <image>docker.io/my-docker-id/my-app</image>\n\
    \                </to>\n            </configuration>\n        </plugin>\n    </plugins>\n\
    </build>\n...\n```\n\nWith the Maven Jib plugin configured, building the container\
    \ image is as simple as running a Maven command:\n\n```\nmvn compile jib:build\n\
    ```\n\nThis command compiles your project, constructs the Docker image, and pushes\
    \ it to the specified container registry.\n\nFor Gradle-based projects, you include\
    \ the Jib Gradle plugin in your `build.gradle`:\n\n```\nplugins {\n    id 'com.google.cloud.tools.jib'\
    \ version '2.7.1'\n}\njib.to.image = 'my-docker-id/my-app'\n```\n\nUse the following\
    \ command to create and push an image with Gradle:\n\n```\n./gradlew jib\n```\n\
    \n### Understanding Jib Image Layering\n\nJib’s image layering strategy allows\
    \ for fine-grained control over the container image’s composition, promoting incremental\
    \ builds and efficient resource utilization during containerization.\n\nHere’s\
    \ a breakdown of the layers created by Jib:\n\n1. **Dependencies layer**: This\
    \ layer includes the external modules and libraries used by the application. This\
    \ ensures that dependencies are independent and cacheable separately and that\
    \ reusability in builds is enhanced.\n2. **Resources layer**: In the resources\
    \ layer, Jib includes application resources like configuration files, templates,\
    \ and static assets. These resources can be cached separately at the same time,\
    \ thus reducing redundancy while building.\n3. **Classes layer**: This class layer\
    \ has the actual compiled classes of the application in Java. With each change\
    \ in the code, only this layer needs to be rebuilt, which makes building a lot\
    \ faster.\n4. **Snapshot dependencies layer**: Jib dedicates an exact layer for\
    \ all those dependencies that are occasionally changing or are the snapshots.\n\
    5. **Custom layers**: Additional directories, if any that are provided by the\
    \ developer, usually through config may be turned into their layers.\n\nThis distinct\
    \ layer separation helps Jib to optimize the build process by breaking down the\
    \ application into these distinct layers. With changes, only the layers affected\
    \ need to be rebuilt and pushed to the registry; other layers are not affected,\
    \ making quicker and more efficient container image updates.\n\nThat helps to\
    \ speed up the builds as well as how the resources get used. It just makes sure\
    \ that only the necessary parts are rebuilt and pushed, which then keeps the size\
    \ of container images themselves minimal.\n\n![](images/625177_1_En_6_Chapter/625177_1_En_6_Fig2_HTML.jpg)\n\
    \nA diagram showing a stack of six overlapping, colored layers. From top to bottom,\
    \ the layers are labeled: Dependencies, Classes, Resources, Snapshot, and Custom.\
    \ Each label is connected to its respective layer with an arrow pointing right.\
    \ The layers alternate in color between pink and teal.\n\nFigure 6-2 Jib image\
    \ layers"
