  trans: '

    ## Docker 的基本原理


    Java 在软件开发中普及了“一次编写，到处运行（WORA）”的口号。这意味着，一旦编写完成，Java 应用程序就可以在任何拥有兼容 JVM 的设备或平台上运行。而
    Docker 则更进一步：它确保应用程序及其所有运行时环境都能被统一地打包、分发和运行。


    现在，我们来谈谈 Docker 工作原理背后的核心理念：一次构建，到处运行（BORA）。设想一下：两位开发人员正在开发同一个应用程序，他们希望在自己的本地机器上运行该应用以加快开发进程。开发人员
    A 最终在自己的工作站上成功运行了该应用，并将操作步骤分享给了开发人员 B。但当开发人员 B 按照这些步骤操作时，却无法轻松地让应用运行起来。


    为什么开发人员 B 在尝试运行该应用时会遇到困难呢？


    嗯，可能有多种原因，但一种可能是开发人员 A 无意中遗漏了关键指令，例如运行应用所需的环境变量。


    **请记住：** 这个问题在开发者中非常普遍，常常导致令人沮丧的情况，比如有人会声称“它在我的机器上能跑”，但换到其他环境却无法运行。


    这正是 Docker 的用武之地。它保证，如果使用 Docker 构建应用程序，无论在开发、测试还是生产环境中，其行为都将保持一致。Docker 消除了因环境差异导致的不一致性，提供了可靠且一致的应用程序执行体验。


    ### Docker 不是什么


    我们了解了 Docker 提供的功能，但理解其局限性同样至关重要。


    *   **Docker 不是虚拟化技术：** 像 VMware 或 Hyper-V 这样的虚拟化技术会创建包含完整操作系统的整个虚拟机，并模拟硬件资源。而
    Docker 则利用底层主机的操作系统，采用容器化技术，这是一种操作系统级别的虚拟化。Docker 容器共享相同的操作系统内核，并将应用程序进程彼此隔离。它不模拟硬件，也不运行完整的客户操作系统。


    *   **Docker 不是容器编排器：** Docker 的核心是一个用于在容器内开发、交付和运行应用程序的平台。虽然 Docker 提供了一个名为 Docker
    Swarm 的简单编排解决方案，但 Docker 本身并非编排器。像 Kubernetes、Amazon ECS 或 Apache Mesos 这样的工具是专用的容器编排器，旨在跨多台机器管理、扩展和维护容器化应用程序。


    *   **Docker 不是虚拟机或“轻量级虚拟机”：** 如前所述，虚拟机模拟硬件资源并运行完整的操作系统。虚拟机拥有自己的内核、二进制文件和库。而 Docker
    容器共享主机的内核，仅封装应用程序及其直接依赖项。容器比虚拟机轻量得多，但称其为“轻量级虚拟机”是用词不当，因为它们在完全不同的抽象层上运行。


    *   **Docker 不是容器化应用程序的唯一方法：** 虽然 Docker 普及了容器技术并使其更易用，但它并非容器化的唯一途径。其他工具和平台，如
    Podman、containerd 和 rkt (Rocket)，也提供了创建和管理容器的方法。它们可能具有区别于 Docker 的特定功能或设计理念，但服务于容器化应用程序这一相同的基本目的。


    *   **Docker 不是容器即服务（CaaS）平台：** CaaS 平台将容器编排、管理、扩展和运维功能作为服务提供，通常部署在云环境中。例如 Google
    Kubernetes Engine (GKE)、Amazon ECS 和 Azure Kubernetes Service (AKS)。Docker 的核心是一个用于创建和执行容器的工具。虽然
    Docker 公司围绕 Docker 提供了产品和服务（例如 Docker Hub、Docker Enterprise），但 Docker 本身作为一种技术，并非
    CaaS 解决方案。它可以成为 CaaS 产品的一部分，但其本身并非 CaaS。


    ### Docker 是如何工作的？


    Docker 采用客户端/服务器架构运行，其中 Docker 引擎是系统的核心组件。Docker 引擎由 Docker 守护进程、REST API 和命令行界面（CLI）组成。Docker
    CLI 与 Docker 守护进程暴露的 REST API 进行通信。当从 CLI 发出 Docker 命令时，这些命令会被 Docker 守护进程接收，然后由守护进程执行这些命令。


    Docker 的客户端-服务器架构依赖于一个名为 Docker 引擎的主要组件。Docker 引擎包含 Docker 守护进程、REST API 和 CLI。Docker
    CLI 与 Docker 守护进程暴露的 REST API 进行通信。因此，当从 CLI 发出 Docker 命令时，这些命令会被 Docker 守护进程接收，然后由守护进程执行这些命令。

