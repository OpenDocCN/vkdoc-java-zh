    uses: actions/setup-java@v2\nwith:\njava-version: '17'\ndistribution: 'adopt'\n\
    ```\n\n**Build with maven**: Compiles the Java application and runs any tests.\n\
    \n```\n- name: Build with Maven\nrun: mvn clean install\n```\n\n**Build docker\
    \ image**: Constructs the Docker image using the Dockerfile.\n\n```\n- name: Build\
    \ Docker Image\nrun: docker build -t my-java-app .\n```\n\n**Push to docker registry**:\
    \ After the image is successfully created, it’s tagged and then pushed to Docker\
    \ Hub.\n\n```\n- name: Push Docker Image to Registry\nrun: |\necho ${{ secrets.DOCKER_HUB_PASSWORD\
    \ }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin\ndocker\
    \ tag my-java-app ${{ secrets.DOCKER_HUB_USERNAME }}/my-java-app:latest\ndocker\
    \ push ${{ secrets.DOCKER_HUB_USERNAME }}/my-java-app:latest\n```\n\nThe `${{\
