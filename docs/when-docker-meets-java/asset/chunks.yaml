    ## Spring Boot 中的 Docker Compose 支持


    Spring Boot 3.1 引入了一项激动人心的特性：对 Docker Compose 的内置支持。这一新增功能极大地简化了那些依赖 Docker 进行环境设置的
    Spring Boot 应用程序的开发流程。在 Spring Boot 3.1 之前，使用 Docker Compose 需要手动运行 `docker compose
    up` 来启动服务，然后运行 `docker compose down` 来停止它们。这要求开发者单独管理 Docker Compose，并确保其 Spring
    Boot 应用程序的配置与动态分配的端口和服务设置保持一致。


    借助 Spring Boot 3.1，这一流程得到了简化。Spring Boot 现在可以自动检测 `docker-compose.yaml` 文件，并直接管理
    Docker Compose 服务的生命周期。这意味着：


    *   Spring Boot 会在连接到服务之前自动运行 `docker compose up`。


    *   如果服务已经在运行，Spring Boot 会直接使用它们。


    *   在关闭时，应用程序会执行 `docker compose stop`，从而防止 Docker 容器残留。


    该集成建立在 `ConnectionDetails` 抽象之上。Spring Boot 会自动检测由 Docker Compose 启动的镜像，并创建指向这些服务的
    `ConnectionDetails` bean。这在许多情况下消除了手动配置的需要。


    此外，对 Docker Compose 的支持已集成到 [start.​spring.​io](https://start.spring.io) 中，加速了您的项目设置流程！


    *   我们可以使用“Docker Compose support”选项创建一个新项目。


    ![](img/625177_1_En_4_Fig6_HTML.jpg)


    搜索界面显示了一个查询“docker compose”，并有一个以亮绿色高亮显示的推荐。该推荐显示为“Docker Compose Support”，带有一个“DEVELOPER
    TOOLS”标签，以及一段描述，说明它提供了对增强开发体验的支持。提示信息指示按某个键以进行多项添加。


    图 4-6


    添加 Docker Compose 支持依赖


