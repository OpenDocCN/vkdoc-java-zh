    offered is the ability to browse and select from a wide range of Quarkus extensions.
    Extensions are add-ons or libraries that integrate with Quarkus to provide additional
    functionality, like database connectivity, security, messaging, and more.


    *   **Streamlined dependencies management**: It automatically manages dependencies
    for the selected extensions, ensuring compatibility and reducing the hassle of
    manual dependency management.


    *   **Download or share your project**: After configuring your project, you can
    either download it as a ZIP file or share it with others using a generated URL.
    This feature is particularly useful for collaboration or for saving project configurations
    for future use.


    *   **Code generation**: The platform generates some basic code and configuration
    files based on your selections, helping you jump-start development.


    Steps to create your first project.


    *   **Access the platform**: Visit `code.quarkus.io` in your web browser.


    *   **Configure your project**: Input your project''s groupId, artifactId, and
    version. Select your preferred build tool.


    *   **Select extensions**: Browse through the list of available extensions. You
    can search for specific extensions or filter them by category.


    *   **Generate your project**: Once you''ve made your selections, click on the
    "Generate your application" button. This will create a customized Quarkus project.


    *   **Download/share**: You can then download the generated project as a ZIP file
    or copy the URL to share with others.


    *   **Start coding**: Unzip the downloaded file and open it in your favorite IDE
    or editor to start coding.


    ![](images/625177_1_En_9_Chapter/625177_1_En_9_Fig4_HTML.jpg)


    The image shows a software configuration interface for a Quarkus application.
    It includes fields for Group, Artifact, Version, Java Version, and Build Tool,
    with values such as "org.acme" and "Maven." A button labeled "Generate your application"
    is on the right. Below, there is a filter option and a section for selecting web
    extensions like "RESTEasy Reactive" and "RESTEasy Reactive Jackson," each with
    descriptions and compatibility notes.


    Figure 9-4


    Quarkus project onboarding


    Quarkus marks a significant shift in the Java ecosystem, bringing Java squarely
    into the modern cloud-native era. It''s not just about running Java in Kubernetes;
    it''s about making Java a first-class citizen in this landscape. With its unparalleled
    efficiency and developer-focused design, Quarkus is undoubtedly a framework worth
    exploring for any Java developer looking to step into the world of Kubernetes
    and cloud-native development.


    ## Building and Deploying Quarkus Application on Kubernetes


    In the world of cloud-native development, Kubernetes has emerged as the de facto
    standard for orchestrating containerized applications. Quarkus, known as "Supersonic
    Subatomic Java," is a Kubernetes-native Java framework tailored for GraalVM and
    HotSpot. This section will guide you through the process of building and deploying
    a Quarkus application on Kubernetes.


    ## Up and Running with Quarkus


    **Step 1**: We can start by generating a new Quarkus project. We can use `code.quarkus.io`
    to set up the project with the desired extensions, or use Maven/Gradle directly:


    ```

    mvn io.quarkus.platform:quarkus-maven-plugin:3.6.4:create \

    -DprojectGroupId=org.acme \

    -DprojectArtifactId=kubernetes-quickstart \

    -Dextensions=''resteasy-reactive,kubernetes,jib''

    cd kubernetes-quickstart

    ```


    This will create a new project containing the Kubernetes and Jib extensions. Furthermore,
    the following dependencies are added to our `pom.xml` file.


    ```

    io.quarkus

    quarkus-resteasy-reactive


    io.quarkus

    quarkus-kubernetes


    io.quarkus

    quarkus-container-image-jib


    ```


    By incorporating these dependencies, we facilitate the automatic creation of Kubernetes
    manifests with each build and simultaneously enable container image building using
    Jib. For instance, after executing the following:


    ```

    ./mvnw install

    ```


    Among the various generated files, we will observe two specific files—`kubernetes.json`
    and `kubernetes.yml`—located in the `target/kubernetes/` directory. When examining
    either of these files, it becomes apparent that they include definitions for a
    Kubernetes `Deployment` as well as a `Service`.


    ![](images/625177_1_En_9_Chapter/625177_1_En_9_Fig5_HTML.jpg)


    Flowchart illustrating the process of deploying a Quarkus application on Kubernetes.
    It begins with developing the application, followed by a build process using "mvn
    install." Next, Kubernetes manifests are generated, and a container image is created.
    The image is then pushed to a registry. Manifests are applied to Kubernetes, leading
    to deployment and running the application in Kubernetes.


    Figure 9-5


    Quarkus application deployment flow


    Just to reiterate, Quarkus offers the ability to automatically generate Kubernetes
    resources based on sane defaults and user-supplied configuration using [dekorate](https://dekorate.io/)
    .


    Furthermore, Quarkus can deploy the application to a target Kubernetes cluster
    by applying the generated manifests to the target cluster’s API Server.


    ```

    kubectl apply -f target/kubernetes/kubernetes.json

    ```


    Finally, when either one of the container image extensions is present, Quarkus
    can create a container image and push it to a registry before deploying the application
    to the target platform.


    ## Summary


    The chapter gave a detailed overview of how to build native images with GraalVM
    and integrate them with popular frameworks like Spring Boot. Although GraalVM
    native images have significant advantages, such as faster startup times and lower
    memory footprint, some limitations limit support of Java''s dynamic features such
    as reflection.


    Then, the discussion moves on to Spring Boot 3 native support which offers two
    main ways of building native images: Cloud Native Buildpacks and GraalVM Native
    Build Tools.


    Last but not least, it covers Quarkus, a Kubernetes-native Java framework built
    from the ground up for container environments, focusing on its features like live
    coding and support for imperative and reactive programming. Throughout the chapter,
    the focus remains on how these technologies are transforming Java applications
    to meet the demands of modern cloud-native architectures, particularly in containerized
    and Kubernetes.'
  trans: '

    ## Quarkus 入门指南


    开始使用 Quarkus 最简单的方式是访问 `code.quarkus.io`，这是 Quarkus 团队提供的在线平台，能显著简化创建新 Quarkus
    项目的流程。该平台设计得用户友好且高效，尤其适合初学者或希望快速搭建新 Quarkus 应用的开发者。


    以下是 `code.quarkus.io` 提供的功能概览：


    *   **用户友好的界面**：该网站拥有直观的界面，无需编写任何样板代码即可轻松创建和配置 Quarkus 项目。


    *   **可定制的项目设置**：你可以自定义项目的各个方面，例如 Maven Group、Artifact 和 Version。你还可以选择构建工具（Maven
    或 Gradle）。


    *   **扩展选择**：`code.quarkus.io` 提供的最强大功能之一是能够浏览并从广泛的 Quarkus 扩展中进行选择。扩展是与 Quarkus
    集成的附加组件或库，用于提供额外的功能，例如数据库连接、安全性、消息传递等。


    *   **简化的依赖管理**：它会自动管理所选扩展的依赖关系，确保兼容性并减少手动管理依赖的麻烦。


    *   **下载或分享你的项目**：配置完项目后，你可以将其下载为 ZIP 文件，或使用生成的 URL 与他人分享。此功能对于协作或保存项目配置以备将来使用特别有用。


    *   **代码生成**：该平台会根据你的选择生成一些基本代码和配置文件，帮助你快速启动开发。


    创建第一个项目的步骤。


    *   **访问平台**：在你的网页浏览器中访问 `code.quarkus.io`。


    *   **配置你的项目**：输入项目的 groupId、artifactId 和 version。选择你偏好的构建工具。


    *   **选择扩展**：浏览可用扩展列表。你可以搜索特定扩展或按类别进行筛选。


    *   **生成你的项目**：完成选择后，点击“Generate your application”按钮。这将创建一个定制的 Quarkus 项目。


    *   **下载/分享**：然后你可以将生成的项目下载为 ZIP 文件，或复制 URL 与他人分享。


    *   **开始编码**：解压下载的文件，并在你喜欢的 IDE 或编辑器中打开它，开始编码。


    ![](img/625177_1_En_9_Fig4_HTML.jpg)


    该图片展示了一个 Quarkus 应用的软件配置界面。它包含 Group、Artifact、Version、Java Version 和 Build Tool
    等字段，并带有诸如“org.acme”和“Maven”等值。右侧有一个标有“Generate your application”的按钮。下方是一个筛选选项和一个用于选择
    Web 扩展（如“RESTEasy Reactive”和“RESTEasy Reactive Jackson”）的区域，每个扩展都附有描述和兼容性说明。


    图 9-4


    Quarkus 项目入门


    Quarkus 标志着 Java 生态系统的一次重大转变，将 Java 直接带入了现代云原生时代。它不仅仅是在 Kubernetes 上运行 Java，更是让
    Java 成为该领域的一等公民。凭借其无与伦比的效率和以开发者为中心的设计，Quarkus 无疑是任何希望踏入 Kubernetes 和云原生开发世界的 Java
    开发者值得探索的框架。


    ## 在 Kubernetes 上构建和部署 Quarkus 应用


    在云原生开发的世界中，Kubernetes 已成为编排容器化应用的事实标准。Quarkus，被称为“超音速亚原子 Java”，是一个为 GraalVM 和
    HotSpot 量身定制的 Kubernetes 原生 Java 框架。本节将指导你在 Kubernetes 上构建和部署 Quarkus 应用的流程。


    ## 快速上手 Quarkus


    **步骤 1**：我们可以从生成一个新的 Quarkus 项目开始。我们可以使用 `code.quarkus.io` 来设置带有所需扩展的项目，或者直接使用
    Maven/Gradle：


    ```

    mvn io.quarkus.platform:quarkus-maven-plugin:3.6.4:create \

    -DprojectGroupId=org.acme \

    -DprojectArtifactId=kubernetes-quickstart \

    -Dextensions=''resteasy-reactive,kubernetes,jib''

    cd kubernetes-quickstart

    ```


    这将创建一个包含 Kubernetes 和 Jib 扩展的新项目。此外，以下依赖项会被添加到我们的 `pom.xml` 文件中。


    ```

    io.quarkus

    quarkus-resteasy-reactive


    io.quarkus

    quarkus-kubernetes


    io.quarkus

    quarkus-container-image-jib


    ```


    通过集成这些依赖项，我们可以在每次构建时自动生成 Kubernetes 清单，并同时使用 Jib 构建容器镜像。例如，执行以下命令后：


    ```

    ./mvnw install

    ```


    在生成的各种文件中，我们会在 `target/kubernetes/` 目录下看到两个特定文件——`kubernetes.json` 和 `kubernetes.yml`。检查这两个文件中的任何一个，都会发现它们包含了
    Kubernetes `Deployment` 和 `Service` 的定义。


    ![](img/625177_1_En_9_Fig5_HTML.jpg)


    流程图展示了在 Kubernetes 上部署 Quarkus 应用的过程。它从开发应用开始，接着是使用“mvn install”的构建过程。然后，生成 Kubernetes
    清单，并创建容器镜像。镜像随后被推送到注册表。清单被应用到 Kubernetes，从而在 Kubernetes 中部署和运行应用。


    图 9-5


    Quarkus 应用部署流程


    需要重申的是，Quarkus 能够基于合理的默认值和用户提供的配置，使用 [dekorate](https://dekorate.io/) 自动生成 Kubernetes
    资源。


    此外，Quarkus 可以通过将生成的清单应用到目标集群的 API Server，将应用部署到目标 Kubernetes 集群。


    ```

    kubectl apply -f target/kubernetes/kubernetes.json

    ```


    最后，当存在任一容器镜像扩展时，Quarkus 可以在将应用部署到目标平台之前，创建容器镜像并将其推送到注册表。


    ## 总结


    本章详细概述了如何使用 GraalVM 构建原生镜像，并将其与 Spring Boot 等流行框架集成。尽管 GraalVM 原生镜像具有显著优势，例如更快的启动时间和更低的内存占用，但一些限制限制了其对
    Java 动态特性（如反射）的支持。


    接着，讨论转向了 Spring Boot 3 的原生支持，它提供了两种构建原生镜像的主要方式：Cloud Native Buildpacks 和 GraalVM
    Native Build Tools。


    最后但同样重要的是，本章涵盖了 Quarkus，这是一个从头开始为容器环境构建的 Kubernetes 原生 Java 框架，重点介绍了其实时编码、支持命令式和响应式编程等特性。贯穿本章，重点始终放在这些技术如何改变
    Java 应用，以满足现代云原生架构的需求，尤其是在容器化和 Kubernetes 环境中。

