  raw: '### Docker Desktop in Action


    Docker Desktop enhances the functionality of the underlying open source Docker
    components by offering user-friendly maintenance, monitoring, and upgrade features.
    It delivers a uniform user experience across various operating systems. With Docker
    Desktop, team collaboration is streamlined through Docker Dev Environments, enabling
    one-click sharing via Git or Docker Hub. It boasts a straightforward graphical
    interface for common tasks such as:


    *   Initiating a container


    You can start a new container with Docker Desktop that is based on a Docker image
    of your choice.


    You can choose the image and then optionally set settings for port mapping, environment
    variables, and volumes. It then launches the container in one click.


    This simplifies the process of spinning up new containerized applications, so
    users new to Docker can start easily.


    *   Pausing and restarting a container


    Docker Desktop offers a graphical user interface to pause and resume running containers.


    Pausing a container suspends its execution, allowing you to temporarily stop the
    container’s activity without losing its state.


    Restarting the paused container resumes its operation from the point where it
    was paused.


    This feature is useful for temporarily suspending a container’s activities, for
    example, during maintenance or debugging.


    *   Stopping a container


    The Docker Desktop interface allows you to easily stop running containers.


    It stops a container gently and closes the application or process running inside
    the container.


    This is useful if you have to stop a container and release the resources that
    container was using.


    *   Configuring a local Kubernetes cluster


    Docker Desktop provides built-in functionality to create and manage a local Kubernetes
    cluster. The user can enable and configure a single-node Kubernetes cluster directly
    from the Docker Desktop interface.


    This helps developers test and develop applications using Kubernetes without an
    additional separate Kubernetes setup.


    *   Managing volumes


    Docker desktop allows a developer to manage the volumes by creating, inspecting,
    and mounting a volume right from the UI of the Docker desktop.


    This therefore simplifies the process of managing persistent storage for your
    containerized applications and will thus ensure that no data is lost when the
    containers are stopped or removed.


