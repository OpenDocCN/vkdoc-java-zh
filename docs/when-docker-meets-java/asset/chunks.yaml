  trans: '

    ### Docker Desktop 实战


    Docker Desktop 通过提供用户友好的维护、监控和升级功能，增强了底层开源 Docker 组件的功能。它在各种操作系统上提供统一的用户体验。借助
    Docker Desktop，通过 Docker 开发环境可以简化团队协作，实现通过 Git 或 Docker Hub 一键共享。它拥有一个直观的图形界面，用于处理常见任务，例如：


    *   **启动容器**


    您可以使用 Docker Desktop 基于您选择的 Docker 镜像启动一个新容器。


    您可以选择镜像，然后可选地设置端口映射、环境变量和卷的设置。然后，它一键启动容器。


    这简化了启动新容器化应用程序的过程，因此刚接触 Docker 的用户可以轻松上手。


    *   **暂停和重启容器**


    Docker Desktop 提供了一个图形用户界面来暂停和恢复正在运行的容器。


    暂停容器会挂起其执行，允许您在不丢失其状态的情况下临时停止容器的活动。


    重启暂停的容器会从其暂停的位置恢复运行。


    此功能对于临时挂起容器的活动非常有用，例如在维护或调试期间。


    *   **停止容器**


    Docker Desktop 界面允许您轻松停止正在运行的容器。


    它会优雅地停止容器，并关闭容器内运行的应用程序或进程。


    如果您必须停止容器并释放该容器正在使用的资源，这将非常有用。


    *   **配置本地 Kubernetes 集群**


    Docker Desktop 提供了创建和管理本地 Kubernetes 集群的内置功能。用户可以直接从 Docker Desktop 界面启用和配置单节点
    Kubernetes 集群。


    这有助于开发人员无需额外单独设置 Kubernetes 即可使用 Kubernetes 测试和开发应用程序。


    *   **管理卷**


    Docker Desktop 允许开发人员直接从 Docker Desktop 的用户界面创建、检查和挂载卷来管理卷。


    因此，这简化了为容器化应用程序管理持久化存储的过程，从而确保在容器停止或移除时不会丢失数据。


    为了展示 Docker Desktop 的功能，让我们尝试从 Docker Hub 运行一个预构建的镜像。


    *   在桌面上找到 Docker Desktop 图标。双击 Docker Desktop 图标启动应用程序。


    *   要定位镜像，请单击顶部的搜索栏或使用快捷键 ⌘ + K。要找到本指南中使用的特定镜像，请搜索“welcome-to-docker”。


    ![](img/625177_1_En_2_Figa_HTML.jpg)


    一个 Docker 界面，显示一个搜索栏，其中输入了术语“welcome-to-docker”。下方有镜像、容器、卷、扩展和文档选项卡，其中镜像选项卡被选中，显示
    50 个结果。一个名为“docker/welcome-to-docker”的高亮 Docker 镜像显示有超过 100 万次下载和 16 颗星。提供了“拉取”或“运行”该镜像的选项。


    *   选择**运行**。


    ![](img/625177_1_En_2_Figb_HTML.jpg)


    Docker 界面的截图，显示搜索“welcome-to-docker”的结果在镜像选项卡下。界面显示镜像、容器、卷、扩展和文档的选项，除了镜像显示 50
    个外，其他每个计数为零。下方，“docker/welcome-to-docker”镜像被高亮显示，拥有超过一百万次下载和 16 颗星的评分。“运行”按钮被一个红色箭头强调。


    *   显示**可选设置**后，输入主机端口号 8090，然后单击**运行**。这会将容器的内部端口映射到指定的主机端口，并允许从主机访问容器中运行的应用程序。


    ![](img/625177_1_En_2_Figc_HTML.jpg)


    用于运行新容器的 Docker 界面，镜像为“docker/welcome-to-docker:latest”。可选设置包括容器名称、端口、卷和环境变量的字段。主机端口设置为
    8090，默认容器端口为 80/tcp。底部有“取消”和“运行”按钮。


    *   转到 Docker Desktop 中的容器选项卡以查看该容器。


    ![](img/625177_1_En_2_Figd_HTML.jpg)


    Docker Desktop 界面显示容器管理详细信息。顶部区域显示 CPU 使用率为 200% 的 29.20%，内存使用率为 4.22GB 的 457.53MB。下方，一个容器列表包括一个名为“beautiful_gre”的容器，镜像为“docker/welcome-to-c”，当前正在运行，CPU
    使用率为 0%，端口为 8090:80，已启动 5 分钟。提供了搜索和过滤正在运行的容器的选项。


    *   单击端口(s)下给出的链接。


    ![](img/625177_1_En_2_Fige_HTML.jpg)


    一个仪表板界面，显示一个名为“beautiful_gre”的 Docker 容器，镜像为“docker/welcome-to-c”。容器状态为“运行中”，CPU
    使用率为 0%。可通过端口 8080:80 访问，并提供了指向“http://localhost:8080”的链接。右侧有操作选项。


    *   我们应该看到以下输出。


    ![](img/625177_1_En_2_Figf_HTML.jpg)


    一个浏览器窗口在蓝色背景上显示一条祝贺消息，并伴有五彩纸屑。文字内容为：“恭喜！！！您运行了第一个容器。”消息下方是三个代表社交媒体平台的图标。


    *   我们也有停止容器的选项。


    ![](img/625177_1_En_2_Figg_HTML.jpg)


    一个仪表板显示两个正在运行的 Docker 容器。第一个容器“beautiful_gre”使用镜像“docker/welcome-to-c”，CPU 使用率为
    0%，可通过端口 8090:80 访问，已启动 9 分钟。第二个容器“k8s_coredns”使用镜像“sha256:a4c11631cc”，CPU 使用率为
    0.25%，已启动 17 小时。两个容器都有停止或管理操作的选项。


    *   我们有多种管理容器的选项，即重启/暂停。


    ![](img/625177_1_En_2_Figh_HTML.jpg)


    一个仪表板显示五个 Docker 容器的列表及其详细信息。每个条目包括容器名称、镜像 ID、状态、CPU 使用率、端口和上次启动时间。所有容器都在运行，CPU
    使用率从 0% 到 5.54% 不等。第一个容器“beautiful_greider”有一个指向 8090.80 的端口链接，上次启动时间为 11 分钟前。第一个容器的操作菜单已打开，显示“查看详细信息”、“查看镜像包和
    CVE”、“复制 docker run”和“在终端中打开”等选项。


    总之，Docker Desktop 简化了 macOS 和 Windows 用户的应用程序和微服务容器化过程。它提供了一个用于管理 VM 资源的图形界面，并提供了简化的安装。功能包括简化的容器化和共享、镜像扫描、支持多种系统架构、开发环境以及对
    Kubernetes 的内置支持。


    ### 关键 Docker 概念


    让我们通过与熟悉的 Java 原则进行类比来理解 Docker。在接下来的章节中，让我们通过将它们与已经熟悉的 Java 开发领域联系起来，来审视其组成部分和相关术语。

