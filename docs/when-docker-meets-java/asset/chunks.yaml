  trans: '

    ### 容器 vs. 虚拟机


    你可能会想，既然虚拟机被认为是云计算的基础，我们是否应该考虑将应用程序容器化。一些顶级云服务提供商仍然提供让你在虚拟机上运行应用的服务。在云计算诞生之前，虚拟机就被用于企业组织的关键任务负载，并且对于商业应用而言，它们仍然具有成本效益且节省时间。


    此外，容器和虚拟机都有助于高效利用计算机资源，但在某些方面有所不同。让我们花点时间比较一下容器和虚拟机之间的差异。


    表 1-1


    容器与虚拟机对比


    | 标准 | 容器 | 虚拟机 |

    | --- | --- | --- |

    | 定义 | 容器将应用程序及其依赖项、库、二进制文件和配置文件封装到单个包中。 | 虚拟机模拟一个客户操作系统，并抽象出其运行的物理宿主机。 |

    | 操作系统架构 | 容器不运行完整的操作系统，而是共享一个操作系统内核。 | 虚拟机允许我们在宿主机上运行多个完整的客户操作系统，从而提高资源利用率。 |

    | 大小 | 容器是轻量级的，仅包含运行应用程序所需的依赖项。 | 虚拟机包含整个客户操作系统，因此其大小通常较大（例如，几个 GB）。 |

    | 启动时间 | 容器启动时间较短（例如，通常为毫秒级）。 | 虚拟机启动时间通常为分钟级，因为其体积较大。 |

    | 运行时环境 | 容器提供可预测的运行时环境。 | 使用虚拟机时，我们必须花费时间和精力来确保环境的一致性。 |

    | 维护 | 易于维护和升级。我们可以丢弃旧容器并启动一个新容器。 | 维护和升级虚拟机比较繁琐。 |


    总而言之，容器正在日趋成熟并越来越受欢迎，提供了可移植性、更好的资源利用率、隔离性、敏捷性、易于扩展、更高的生产力以及云支持等优势。它们适用于 CI/CD
    流水线，并与多种操作系统兼容。相比之下，虚拟机对于商业应用来说是高效的，但体积更大，启动时间更长，并且需要更多努力来确保兼容性。


    ### Docker 的兴起


    自 2013 年 3 月推出以来，Docker 已成为容器化应用负载无可争议的标准。根据 2024 年 Stack Overflow 开发者调查，在最受欢迎的工具类别中，Docker
    在专业开发者中继续位居榜首。


    现在，让我们深入探讨一下那些吸引开发者并让他们喜爱 Docker 的因素。

    '
- fmt: '#### Key Reasons for Docker’s Popularity


    Docker has gained popularity due to several key features and benefits:


    - **Cost savings:** Docker is the best choice because it allows us to exploit
    our existing infrastructure to the fullest. On account of this, Docker containers
    utilize fewer hardware resources compared to VMs; hence, it becomes a very economical
    solution. By deploying Docker containers, we can achieve great ROI due to efficient
    resource utilization.


    - **Security:** Applications are well segregated and isolated with Docker which
    makes it an excellent choice for enterprise settings. It is within this context
    that Docker’s ability to do so has made it the most suitable for use in an enterprise
    setup. For example, there is a tool called `Docker Scout` from Docker that inspects
    image contents and provides a detailed report highlighting packages and vulnerabilities
    identified. Another thing is that it gives recommendations on how to solve issues
    detected during image analysis.


    - **Easier development:** With the use of Docker, the “It works on my machine”
    problem can be eliminated since it ensures a consistent environment during all
    stages of the software development life cycle from local setups right through
    to production environments. This consistent environment helps developers significantly
    increase productivity by allowing them not to worry about infrastructure compatibility
    when writing codes. Furthermore, Docker images are versioned, so it is easy to
    roll back on previous image versions in case of problems, therefore adding an
    extra layer of flexibility and stability to the development process.


    - **Integration with existing tools:** Docker comes with direct support in several
    IDEs that are very widely used. This eases container-based application development
    and management in the inner development loop of the application. Docker’s inherent
    features and support from orchestration tools like `Kubernetes` make them efficient
    and resilient in production environments. Besides, Docker easily integrates into
    `GitHub Actions`—the widely used CI/CD platform—so that you can automate your
    pipeline for building, testing, and deploying container applications. Docker has
    many `GitHub Actions` available in the market—official, user-contributed—that
    provide building, annotating, and pushing of images with easy-to-use, reusable
    components from within our workflows.


    - **Microservices architecture:** The rise of microservices architecture demanded
    a solution to manage the complexity of deploying and scaling multiple services
    independently. Docker’s lightweight and modular nature makes it an excellent candidate
    for decomposing monolithic applications into microservices. Running stateless
    Microservices as containers is thus a logical choice. Thus, with this approach,
    deployments are simple, and scaling is facilitated, by exploiting existing hardware
    resources optimally. Each microservice can be put inside its container that could
    be developed, scaled up or down, and deployed autonomously. Airbnb, Netflix, and
    Paypal have all adopted Docker as a technology for building scalable fault-tolerant
    architectures of microservices.


    - **Hybrid and multi-cloud deployments:** More enterprises are embracing multi-cloud
    environments to avoid vendor lock-ins and global outages by depending on a single
    cloud provider. Having said that, each cloud provider comes with different configurations,
    policies, and tools for management, which makes the deployment of applications
    complex. Docker’s portability allows organizations to deploy applications in a
    consistent way for both hybrid and multi-cloud setups. We can build applications
    once and run anywhere using Docker containers, allowing seamless migration and
    deployment across diverse cloud providers or on-premises infrastructure. For example,
    a running container in `AWS EC2` can easily be moved to an environment within
    the `Google Cloud Platform` without change or loss of anything. This is the flexibility
    that can lower the risk of vendor lock-in and allows businesses to choose the
    infrastructure that businesses would prefer to use most.


    - **Versatility for various scenarios:** Docker is extremely flexible and can
    be used in a multitude of use cases. In an enterprise setting, when multiple tools
    and technologies are in use across the team, creating a consistent development
    environment becomes challenging. This is achievable with Docker, which gives the
    ability to standardize environments and set them up consistently. We can define
    infrastructure specifications within a `Dockerfile` and commit to a code repository.
    Developers can then effortlessly create their development environments using these
    specifications. We often rely on third-party tools like `PostgreSQL` or `Nginx`
    in application development. Leveraging container images of these third-party applications
    simplifies their execution, as all the necessary dependencies are encapsulated
    within the container. That means minimal manual configuration is required and
    that one does not have to be wasting a lot of time looking through documentation.
    This time-saving convenience applies to various tools, including databases and
    web servers, as container images are frequently available.


    ## Summary


    In conclusion, Docker has become the standard for containerizing application workloads
    due to its efficient utilization of resources, provides segregation and isolation
    for enterprise environments, ensures a consistent development environment, integrates
    with numerous developer tools, facilitates deployment of microservices-based architectures,
    and can be deployed consistently across hybrid and multi-cloud environments.


    # 2. Docker High-Level Overview


    Learn about docker, its architecture, its limitations, and how docker works.


    Docker is an open source container management tool, developed by Solomon Hykes,
    and it has grown to become the most used standard in containerizing application
    workloads within the last decade since its inception in March 2013. Indeed, Docker
    changed how we package and deploy applications at scale according to its “build
    once, run anywhere” principle.


    Docker provides a platform for effectively developing, distributing, and running
    applications as containers. It falls under the category of Platform as a Service
    within cloud computing.'
  raw: '#### Key Reasons for Docker’s Popularity


    Docker has gained popularity due to several key features and benefits:


    *   **Cost savings:** Docker is the best choice because it allows us to exploit
    our existing infrastructure to the fullest. On account of this, Docker containers
    utilize fewer hardware resources compared to VMs; hence, it becomes a very economical
    solution. By deploying Docker containers, we can achieve great ROI due to efficient
    resource utilization.


    *   **Security:** Applications are well segregated and isolated with Docker which
    makes it an excellent choice for enterprise settings. It is within this context
    that Docker’s ability to do so has made it the most suitable for use in an enterprise
    setup. For example, there is a tool called Docker Scout from Docker that inspects
    image contents and provides a detailed report highlighting packages and vulnerabilities
    identified. Another thing is that it gives recommendations on how to solve issues
    detected during image analysis.


    *   **Easier development:** With the use of Docker, the “It works on my machine”
    problem can be eliminated since it ensures a consistent environment during all
    stages of the software development life cycle from local setups right through
    to production environments. This consistent environment helps developers significantly
    increase productivity by allowing them not to worry about infrastructure compatibility
    when writing codes. Furthermore, Docker images are versioned, so it is easy to
    roll back on previous image versions in case of problems, therefore adding an
    extra layer of flexibility and stability to the development process.


    *   **Integration with existing tools:** Docker comes with direct support in several
    IDEs that are very widely used. This eases container-based application development
    and management in the inner development loop of the application. Docker’s inherent
    features and support from orchestration tools like Kubernetes make them efficient
    and resilient in production environments. Besides, Docker easily integrates into
    GitHub Actions—the widely used CI/CD platform—so that you can automate your pipeline
    for building, testing, and deploying container applications. Docker has many GitHub
    Actions available in the market—official, user-contributed—that provide building,
    annotating, and pushing of images with easy-to-use, reusable components from within
    our workflows.


    *   **Microservices architecture:** The rise of microservices architecture demanded
    a solution to manage the complexity of deploying and scaling multiple services
    independently. Docker’s lightweight and modular nature makes it an excellent candidate
    for decomposing monolithic applications into microservices. Running stateless
    Microservices as containers is thus a logical choice. Thus, with this approach,
    deployments are simple, and scaling is facilitated, by exploiting existing hardware
    resources optimally. Each microservice can be put inside its container that could
    be developed, scaled up or down, and deployed autonomously. Airbnb, Netflix, and
    Paypal have all adopted Docker as a technology for building scalable fault-tolerant
    architectures of microservices.


    *   **Hybrid and multi-cloud deployments:** More enterprises are embracing multi-cloud
    environments to avoid vendor lock-ins and global outages by depending on a single
    cloud provider. Having said that, each cloud provider comes with different configurations,
    policies, and tools for management, which makes the deployment of applications
    complex. Docker’s portability allows organizations to deploy applications in a
    consistent way for both hybrid and multi-cloud setups. We can build applications
    once and run anywhere using Docker containers, allowing seamless migration and
    deployment across diverse cloud providers or on-premises infrastructure. For example,
    a running container in AWS EC2 can easily be moved to an environment within the
    Google Cloud Platform without change or loss of anything. This is the flexibility
    that can lower the risk of vendor lock-in and allows businesses to choose the
    infrastructure that businesses would prefer to use most.


    *   **Versatility for various scenarios:** Docker is extremely flexible and can
    be used in a multitude of use cases. In an enterprise setting, when multiple tools
    and technologies are in use across the team, creating a consistent development
    environment becomes challenging. This is achievable with Docker, which gives the
    ability to standardize environments and set them up consistently. We can define
    infrastructure specifications within a Dockerfile and commit to a code repository.
    Developers can then effortlessly create their development environments using these
    specifications. We often rely on third-party tools like PostgreSQL or Nginx in
    application development. Leveraging container images of these third-party applications
    simplifies their execution, as all the necessary dependencies are encapsulated
    within the container. That means minimal manual configuration is required and
    that one does not have to be wasting a lot of time looking through documentation.
    This time-saving convenience applies to various tools, including databases and
    web servers, as container images are frequently available.


    ## Summary


    In conclusion, Docker has become the standard for containerizing application workloads
    due to its efficient utilization of resources, provides segregation and isolation
    for enterprise environments, ensures a consistent development environment, integrates
    with numerous developer tools, facilitates deployment of microservices-based architectures,
    and can be deployed consistently across hybrid and multi-cloud environments.


    # 2. Docker High-Level Overview


    Learn about docker, its architecture, its limitations, and how docker works.


    Docker is an open source container management tool, developed by Solomon Hykes,
    and it has grown to become the most used standard in containerizing application
    workloads within the last decade since its inception in March 2013\. Indeed, Docker
    changed how we package and deploy applications at scale according to its “build
    once, run anywhere” principle.


    Docker provides a platform for effectively developing, distributing, and running
    applications as containers. It falls under the category of Platform as a Service
    within cloud computing.'
  trans: '

    #### Docker 流行的关键原因


    Docker 因其几个关键特性和优势而广受欢迎：


    *   **成本节约：** Docker 是最佳选择，因为它能让我们最大限度地利用现有基础设施。正因如此，与虚拟机相比，Docker 容器消耗的硬件资源更少；因此，它成为一种非常经济的解决方案。通过部署
    Docker 容器，我们可以凭借高效的资源利用实现巨大的投资回报率。


    *   **安全性：** Docker 能够很好地隔离应用程序，这使其成为企业环境的绝佳选择。正是在这种背景下，Docker 的这种能力使其最适合在企业环境中使用。例如，Docker
    提供了一款名为 Docker Scout 的工具，它可以检查镜像内容，并提供一份详细报告，突出显示已识别的软件包和漏洞。此外，它还会就如何解决镜像分析过程中检测到的问题给出建议。


    *   **更简便的开发：** 使用 Docker 可以消除“在我机器上能运行”的问题，因为它能确保在软件开发生命周期的所有阶段（从本地环境到生产环境）都保持环境一致。这种一致的环境帮助开发者显著提高生产力，让他们在编写代码时无需担心基础设施的兼容性问题。此外，Docker
    镜像是版本化的，因此如果出现问题，可以轻松回滚到之前的镜像版本，从而为开发过程增加了额外的灵活性和稳定性。


    *   **与现有工具的集成：** Docker 在多个广泛使用的集成开发环境中都提供了直接支持。这简化了在应用程序内部开发循环中基于容器的应用程序开发和管理。Docker
    的固有特性以及来自 Kubernetes 等编排工具的支持，使其在生产环境中高效且具有弹性。此外，Docker 可以轻松集成到广泛使用的 CI/CD 平台
    GitHub Actions 中，这样你就可以自动化构建、测试和部署容器应用程序的流水线。Docker 在市场上提供了许多 GitHub Actions——包括官方和用户贡献的——这些
    Actions 可以在你的工作流中使用易于使用、可重用的组件来构建、注释和推送镜像。


    *   **微服务架构：** 微服务架构的兴起需要一种解决方案来管理独立部署和扩展多个服务的复杂性。Docker 轻量级和模块化的特性使其成为将单体应用分解为微服务的绝佳选择。因此，将无状态微服务作为容器运行是一个合乎逻辑的选择。通过这种方法，部署变得简单，并且通过优化利用现有硬件资源，扩展也变得更容易。每个微服务都可以放入其自己的容器中，可以独立地进行开发、扩缩容和部署。Airbnb、Netflix
    和 Paypal 都已采用 Docker 作为构建可扩展、容错的微服务架构的技术。


    *   **混合云和多云部署：** 越来越多的企业正在采用多云环境，以避免依赖单一云提供商而导致的供应商锁定和全局性故障。话虽如此，每个云提供商都有不同的配置、策略和管理工具，这使得应用程序的部署变得复杂。Docker
    的可移植性允许组织以一致的方式为混合云和多云环境部署应用程序。我们可以使用 Docker 容器一次构建应用程序，随处运行，从而实现在不同云提供商或本地基础设施之间的无缝迁移和部署。例如，在
    AWS EC2 中运行的容器可以轻松迁移到 Google Cloud Platform 内的环境，而无需任何更改或丢失任何内容。这种灵活性可以降低供应商锁定的风险，并允许企业选择他们最倾向于使用的基础设施。


    *   **适用于各种场景的通用性：** Docker 极其灵活，可用于多种用例。在企业环境中，当团队使用多种工具和技术时，创建一致的开发环境变得具有挑战性。Docker
    可以实现这一点，它能够标准化环境并进行一致地设置。我们可以在 Dockerfile 中定义基础设施规范，并将其提交到代码仓库。然后，开发人员可以使用这些规范轻松创建他们的开发环境。在应用程序开发中，我们经常依赖
    PostgreSQL 或 Nginx 等第三方工具。利用这些第三方应用程序的容器镜像可以简化其执行，因为所有必要的依赖项都封装在容器内。这意味着只需最少的手动配置，并且无需浪费时间查阅文档。这种节省时间的便利性适用于各种工具，包括数据库和
    Web 服务器，因为容器镜像通常很容易获得。


    ## 总结


    总之，Docker 已成为容器化应用程序工作负载的标准，因为它能高效利用资源，为企业环境提供隔离，确保一致的开发环境，与众多开发者工具集成，促进基于微服务架构的部署，并且可以在混合云和多云环境中进行一致部署。


    # 2. Docker 高级概述


    了解 Docker、其架构、局限性以及 Docker 的工作原理。


    Docker 是一个由 Solomon Hykes 开发的开源容器管理工具，自 2013 年 3 月诞生以来的过去十年中，它已发展成为容器化应用程序工作负载最常用的标准。事实上，Docker
    根据其“一次构建，随处运行”的原则，改变了我们大规模打包和部署应用程序的方式。


    Docker 提供了一个用于有效开发、分发和运行容器化应用程序的平台。它属于云计算中的平台即服务类别。

    '
- fmt: '# Docker’s Basic Principle


    Java popularized the slogan “Write Once, Run Anywhere (WORA)” in software development.
    That means once written, Java applications can run on any device or platform with
    a compatible JVM. Docker has taken this one step further: ensuring that the application
    and all its runtime environment are packaged, distributed, and run uniformly.


    Let us now talk about the underlying principle behind how Docker works: Build
    Once, Run Anywhere (BORA). Consider this: two developers are working on the same
    application, and they want to run the application on their local machines to speed
    up the development process. Developer A finally got the application running on
    their workstation and shared the steps they took with Developer B. When Developer
    B followed these steps, they couldn’t get the application up and running easily.


    Why did developer B encounter difficulties when trying to run the application?


    Well, there could be multiple answers to this but it could be possible that Developer
    A unintentionally omitted crucial instructions, such as environment variables
    to run the application.


    **Remember:** This issue is all too common among developers, leading to frustrating
    situations where some may assert that “it works on my machine.” At the same time,
    it fails to function on other setups.


    This is precisely where Docker shines, assuring that if an application is built
    using Docker, it will exhibit consistent behavior regardless of the environment—whether
    it be development, staging, or production. Docker eliminates the discrepancies
    caused by environment-specific variations, offering a reliable and consistent
    application execution experience.


    ## Docker Is Not!!!


    We know about the features offered by Docker, but it’s essential to understand
    its limitations.


    * **Docker is not a virtualization technology:** Virtualization technology, like
    VMware or Hyper-V, creates entire virtual machines with their operating systems,
    simulating hardware resources. On the other hand, Docker leverages the underlying
    host’s OS and uses containerization, a form of OS-level virtualization. Docker
    containers share the same OS kernel and isolate the application processes from
    each other. It does not emulate hardware or run full-blown guest operating systems.


    * **Docker is not a container orchestrator:** Docker, in its core form, is a platform
    to develop, ship, and run applications inside containers. While Docker provides
    a simple orchestration solution called Docker Swarm, Docker is not an orchestrator.
    Tools like Kubernetes, Amazon ECS, or Apache Mesos are dedicated container orchestrators
    designed to manage, scale, and maintain containerized applications across multiple
    machines.


    * **Docker is not a virtual machine (VM) or a “lightweight VM”:** As mentioned
    earlier, virtual machines emulate hardware resources and run whole operating systems.
    VMs have their kernel, binaries, and libraries. On the other hand, Docker containers
    share the host’s kernel and encapsulate only the application and its direct dependencies.
    Containers are significantly more lightweight than VMs, but it would be a misnomer
    to call them “lightweight VMs” as they operate at a different layer of abstraction.


    * **Docker is not the exclusive method for containerizing applications:** While
    Docker popularized container technology and made it more accessible, it’s not
    the sole method for containerization. Other tools and platforms, like Podman,
    containerd, and rkt (Rocket), also provide ways to create and manage containers.
    These might have specific features or design philosophies that distinguish them
    from Docker, but they serve the same fundamental purpose of containerizing applications.


    * **Docker is not a container as a service (CaaS) platform:** CaaS platforms provide
    container orchestration, management, scaling, and operational features as a service,
    often in cloud environments. Examples include Google Kubernetes Engine (GKE),
    Amazon ECS, and Azure Kubernetes Service (AKS). At its core, Docker is a tool
    designed for the creation and execution of containers. While Docker, Inc. has
    offered products and services around Docker (e.g., Docker Hub, Docker Enterprise),
    Docker itself, as a technology, isn’t a CaaS solution. It can be part of a CaaS
    offering but isn’t one by itself.


    ## How Does Docker Work?


    Docker operates on a client/server architecture, with Docker Engine as the system’s
    central component. Docker Engine consists of the Docker daemon, a REST API, and
    a command-line interface (CLI). The Docker CLI communicates with the REST API
    exposed by the Docker daemon. When Docker commands are issued from the CLI, they
    are received by the Docker daemon, which then executes those commands.


    Docker’s client-server architecture relies on a main component known as Docker
    Engine. Docker Engine comprises the Docker daemon, a REST API, and a CLI. The
    Docker CLI communicates with the REST API exposed by the Docker Daemon. So, when
    Docker commands are issued from the CLI, they are received by the Docker Daemon,
    which then executes those commands.'
