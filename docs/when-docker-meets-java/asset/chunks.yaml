- fmt: '# Creating a Dockerfile


    To commence, let’s start by creating an empty Dockerfile. Remember to name it
    with a capital “D,” that is, `Dockerfile`, without any file extension. By default,
    the `docker build` command looks for a file named “Dockerfile” (with a capital
    “D”) in the specified context.


    If we name it `dockerfile` or anything else, we will need to specify the Docker
    build file using the `-f` or `--file` flag during the build process.


    **Step 1**: Create a new directory on the terminal by running the command `mkdir
    docker`. Navigate to the directory using the command `cd docker`.


    **Step 2**: Now run `touch Dockerfile`, creating an empty Dockerfile for us.


    **Step 3**: Run the `vi Dockerfile` command and paste the following content. To
    save the change, press `Esc` to exit insert mode, then type `:wq,` and press `Enter`.


    - We use the `alpine` base OS image in the `FROM` command. It is a minimal, simple,
    secure image based on Alpine Linux. It is only 5 MB in size.

    - In the `RUN` command, we use the `apk`; the package manager will install Git
    inside the container image. This command is only executed when we build the container
    image.

    - In the `CMD` command, we use the `git --version` command executed when we run
    the container image.


    ```

    FROM alpine:latest

    RUN apk --no-cache add git

    CMD git --version

    ```


    **Step 4:** Build the image by executing the `docker build .` command with the
    Dockerfile.


    The `.` (dot) represents the build context. By using `.` (dot) as the build context,
    we are instructing Docker to look for the Dockerfile and associated files in the
    current directory and use them to build the Docker image.


    **Step 5:** Run the `docker image ls` (to list down images) command and note down
    `IMAGE ID` of the container image.


    **Step 6:** Execute the `docker run --rm -it IMAGE ID` command. Ensure that we
    paste the previously noted `IMAGE ID`. This command will display the git version
    as the output when we run the container image.


    The `-it` flags ensure an interactive session with the container, allowing us
    to see and interact with the output if necessary. The `--rm` flag automatically
    removes the container when it exits. This helps clean the system after the container
    is executed.


    The image below demonstrates the process by which a Dockerfile generates a container.


    ![](images/625177_1_En_3_Chapter/625177_1_En_3_Fig1_HTML.jpg)


    Diagram illustrating the Docker process: a Dockerfile is transformed into a Docker
    Image, represented by a whale carrying containers, which then leads to multiple
    Containers.


    **Figure 3-1** Docker image creation flow


    To summarize, we will have a handwritten Dockerfile, which we will use to build
    the Docker Image. Later on, we will use that image to run a container.


    Let’s talk about commands that we can use while writing a Dockerfile.


    ## Dockerfile Commands and Their Usage


    **Table 3-1** Common Dockerfile commands


    | Command | Usage | Example |

    | --- | --- | --- |

    | `ENV` | Sets environment variables inside the image | `ENV APP_HOME=/usr/src/app`
    |

    | `Label` | Use to specify metadata for image, i.e., email id of the maintainer,
    etc. | `LABEL maintainer="your-email@example.com"` |

    | `EXPOSE` | Port through which we can access our application | `EXPOSE 8080`
    |

    | `CMD` | Use to pass arguments to `ENTRYPOINT`. If `ENTRYPOINT` is not set, then
    the command in `CMD` gets executed | `CMD ["app.jar"]` |

    | `ENTRYPOINT` | Specify commands that get executed when we start the container
    | `ENTRYPOINT ["java", "-jar"]` |

    | `WORKDIR` | Current working directory | `WORKDIR $APP_HOME` |

    | `RUN` | To install packages required for our application | `RUN apt-get update
    && apt-get install -y openjdk-11-jre` |

    | `ADD` | Same as `COPY` but can also download and copy files from remote URLs.
    It can also decompress compressed files to the destination | `ADD https://example.com/external-app.jar
    $APP_HOME/app.jar` |

    | `COPY` | As the name suggests, it copies over files and directories from a source
    to a destination location | `COPY ./local-app-config $APP_HOME/config` |

    | `FROM` | Foundation layer upon which all other layers are built | `FROM ubuntu:latest`
    |


    ## Exploring Facts About Dockerfiles


    **Dockerfiles are not executable code**: A Dockerfile represents commands for
    image execution at build time. This isn’t directly executable like it was a program.


    ```

    # Dockerfile

    FROM openjdk:17-jdk

    WORKDIR /app

    COPY target/myapp.jar /app

    CMD ["java", "-jar", "myapp.jar"]

    ```


    Build and run:


    ```

    docker build -t my-java-app .

    docker run my-java-app

    ```


    **Layer caching**: Docker uses a layered file system for its images, where instructions
    in a Dockerfile are cached as layers to be used in accelerating subsequent builds.


    ```

    FROM openjdk:17-jdk

    WORKDIR /app

    COPY pom.xml /app  # Cached if pom.xml doesn''t change

    RUN mvn dependency:go-offline  # Dependencies are cached

    COPY src /app/src

    RUN mvn package  # Rebuilds only if src changes

    ```


    **Order matters**: Since the layers are cached, the order in which you have the
    instructions in a Dockerfile is significant. If you change an instruction, all
    future layers become invalid and need to be rebuilt.


    ```

    # Inefficient

    FROM openjdk:17-jdk

    WORKDIR /app

    COPY src /app/src

    COPY pom.xml /app

    RUN mvn package  # Rebuilds everything if pom.xml changes


    # Efficient

    FROM openjdk:17-jdk

    WORKDIR /app

    COPY pom.xml /app

    RUN mvn dependency:go-offline  # Cache dependencies

    COPY src /app/src

    RUN mvn package

    ```


    **Multiple base images**: Even though one can use only the `FROM` instruction
    with a Dockerfile, we can do that by using multi-stage builds, making it possible
    to bring artifacts from different bases into one image.


    ```

    # Stage 1: Build

    FROM maven:3.8-openjdk-17 as builder

    WORKDIR /app

    COPY . .

    RUN mvn clean package -DskipTests


    # Stage 2: Minimal runtime

    FROM openjdk:17-jre

    WORKDIR /app

    COPY --from=builder /app/target/myapp.jar /app

    CMD ["java", "-jar", "myapp.jar"]

    ```


    **Dangling images**: Images created with a tag that is later replaced by another
    image become “dangling images,” consuming space until they are pruned.


    ```

    $ docker image prune  # Remove dangling images

    ```


    **Image labeling**: With Docker, it is possible to add metadata to images using
    labels, and the kind of information that one can provide includes version, maintainer,
    or arbitrary information.


    ```

    FROM openjdk:17-jdk

    LABEL maintainer="you@example.com"

    LABEL version="1.0.0"

    LABEL description="Java Spring Boot application"

    ```


    **Escape characters**: Dockerfile supports backslashes (`\`) for escaping, but
    beware of inconsistencies with Windows paths; prefer double backslashes (`\\`)
    or forward slashes.


    ```

    # Use forward slashes or double backslashes for Windows

    COPY config/app-config.json /app/config/

    ```


    **Size optimization**: Be wary of your use of the instruction `COPY`, as it may
    inflate your images. Minimize this by using wildcards, so you only copy necessary
    files.


    ```

    # Avoid copying unnecessary files

    COPY target/*.jar /app/

    ```


    **Security concerns**: Don’t hardcode secrets in the Dockerfile. Pass sensitive
    data securely through the build arguments or environment variables.


    ```

    FROM openjdk:17-jdk

    ARG API_KEY

    ENV API_KEY=${API_KEY}

    CMD ["java", "-jar", "myapp.jar"]

    ```


    Pass secrets securely during build:


    ```

    docker build --build-arg API_KEY=mysecretkey -t my-java-app .

    ```'
