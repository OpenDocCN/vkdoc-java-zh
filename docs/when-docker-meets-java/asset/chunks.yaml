    Spring Boot 2.3 has come with an exciting new feature: buildpack support, where
    we can use an effortlessly created Docker image instead of having to craft our
    own Dockerfile and execute complex commands using docker build from the command
    line. All that will now be required is a simple command:


    ```

    $ mvn spring-boot:build-image

    ```


    Likewise, for Gradle enthusiasts:


    ```

    $ ./gradlew bootBuildImage

    ```


    It is important to note that these commands can only be executed correctly when
    Docker is installed and running on our system. The build-image goal greatly simplifies
    the process by completely automating the creation and the rapid deployment of
    Docker images, so developers no longer need to manually craft a Dockerfile or
    deal with especially complex build commands. This process abstracts away a number
    of the underlying complexities. It provides a cloud-like deployment experience
    comparable to a few platforms such as Heroku or Cloud Foundry.


    This approach further revolutionizes how to construct Docker images. Rather than
    having to make the same change in multiple Dockerfiles across different projects,
    we can craft or customize the image builder of buildpacks for our use cases.


    Apart from the obvious simplicity and improved developer experience, buildpacks
    can significantly enhance efficiency. For instance, the buildpacks approach naturally
    results in a layered Docker image, and it takes advantage of the exploded version
    of the `JAR` file.


    ## Summary


    This chapter focuses on containerizing Spring Boot Java applications using Docker.
    It starts by exploring base images, from which all Docker containers begin: options
    are diverse, from an official OpenJDK image down to very lightweight Alpine Linux
    versions.


    Next, we learned about Dockerizing a simple “Hello World” Spring Boot application:
    steps to wrap the application in a Docker container. You also developed some understanding
    of advanced topics like multi-stage builds and security recommendations for your
    Docker images using Distroless images.


    One very notable feature is buildpacks, which Spring Boot 2.3 now offers. This
    will allow you to use Docker images without writing a single Dockerfile: with
    just a simple command, you are good to go. That makes the containerization process
    much easier.


    # 6. Working with Container Builder Tools for Java Applications


    This chapter will take a much deeper look at four main tools: Google Jib, Fabric8
    Docker Maven Plugin, Spotify’s Docker-Maven-Plugin, and Cloud-Native Buildpacks.
    Each tool approaches Java application containerization differently, from streamlining
    Docker image creation to integrating seamlessly with Maven build processes.


    ## Building Container Images with the Google Jib


    ### Understanding Jib


    Google Jib is the Java containerizer developed by Google, and it’s actually tailor-made
    for Java developers. What distinguishes Jib from others is its simplicity. Google
    Jib simplifies creating a container image for Java developers: abstracting away
    the complexities of Docker so that developers can focus on their artifacts. Jib’s
    intelligent layering and use of distroless images make the containerization process
    efficient and secure.


    Following are some of the key features of Jib:


    *   Jib eliminates the need for developers to know about Docker installation.


    *   Jib operates without a daemon.


    *   Jib doesn’t require a Dockerfile.


    *   Jib doesn’t engage with Docker’s complexities, such as the docker build, tag,
    and push processes.


    *   With Jib to containerize your Java application, a Java developer can add a
    Jib plugin to their chosen build tool (Maven or Gradle), and that’s all that’s
    required.


    *   Jib intelligently divides your application into multiple layers. When code
    changes occur, only the affected layers are rebuilt, significantly reducing build
    times.


    Jib accepts your application’s source code as input and generates a container
    image for your application as output.


    ![](images/625177_1_En_6_Chapter/625177_1_En_6_Fig1_HTML.jpg)


    Flowchart illustrating the process of creating a container image using Jib. The
    sequence starts with "Source Code," followed by an arrow pointing to "Jib," and
    concludes with another arrow leading to "Container Image."


    Figure 6-1


    Jib in action


    ### Building with Jib


    A Java application image is normally represented by one layer containing the application
    JAR. However, Jib uses a special build approach, breaking an application into
    multiple layers. This kind of splitting allows for even more finely grained incremental
    builds. Thus, changing some code rebuilds only those parts you have changed and
    does not involve other parts of the application. These layers are placed, by default,
    over an OpenJDK base image; otherwise, you can also configure a custom base image.


    In your `pom.xml`file, you can configure the Maven Jib plugin for Spring Boot
    projects. Below is a sample configuration:


    ```

    ...


    ...


    com.google.cloud.tools

    jib-maven-plugin

    3.3.2


    docker.io/my-docker-id/my-app


    ...


    ...


    ```


    With the Maven Jib plugin configured, building the container image is as simple
    as running a Maven command:


    ```

    mvn compile jib:build

    ```


    This command compiles your project, constructs the Docker image, and pushes it
    to the specified container registry.


    For Gradle-based projects, you include the Jib Gradle plugin in your `build.gradle`:


    ```

    plugins {

    id ''com.google.cloud.tools.jib'' version ''2.7.1''

    }

    jib.to.image = ''my-docker-id/my-app''

    ```


    Use the following command to create and push an image with Gradle.


    ```

    ./gradlew jib

    ```


    ### Understanding Jib Image Layering


    Jib’s image layering strategy allows for fine-grained control over the container
    image’s composition, promoting incremental builds and efficient resource utilization
    during containerization.


    Here’s a breakdown of the layers created by Jib:


    1.  **Dependencies layer**: This layer includes the external modules and libraries
    used by the application. This ensures that dependencies are independent and cacheable
    separately and that reusability in builds is enhanced.


    2.  **Resources layer**: In the resources layer, Jib includes application resources
    like configuration files, templates, and static assets. These resources can be
    cached separately at the same time, thus reducing redundancy while building.


    3.  **Classes layer**: This class layer has the actual compiled classes of the
    application in Java. With each change in the code, only this layer needs to be
    rebuilt, which makes building a lot faster.


    4.  **Snapshot dependencies layer**: Jib dedicates an exact layer for all those
    dependencies that are occasionally changing or are the snapshots.


    5.  **Custom layers**: Additional directories, if any that are provided by the
    developer, usually through config may be turned into their layers.


    This distinct layer separation helps Jib to optimize the build process by breaking
    down the application into these distinct layers. With changes, only the layers
    affected need to be rebuilt and pushed to the registry; other layers are not affected,
    making quicker and more efficient container image updates.


    That helps to speed up the builds as well as how the resources get used. It just
    makes sure that only the necessary parts are rebuilt and pushed, which then keeps
    the size of container images themselves minimal.


    ![](images/625177_1_En_6_Chapter/625177_1_En_6_Fig2_HTML.jpg)


    A diagram showing a stack of six overlapping, colored layers. From top to bottom,
    the layers are labeled: Dependencies, Classes, Resources, Snapshot, and Custom.
    Each label is connected to its respective layer with an arrow pointing right.
    The layers alternate in color between pink and teal.


    Figure 6-2


    Jib image layers'
