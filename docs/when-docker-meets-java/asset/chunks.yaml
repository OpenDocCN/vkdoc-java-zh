    ### 为什么选择 img？


    `img` 的开发旨在解决传统 Docker 镜像构建方法所面临的若干挑战和限制：


    *   **无守护进程运行**：Docker 镜像的构建过程需要守护进程。这在共享或多租户环境以及 CI 系统中可能带来安全问题。


    *   **Root 权限**：Docker 需要 root 权限才能创建镜像，这显然是一个重大的安全隐患。而 img 不需要任何 root 权限。


    *   **简单性与可移植性**：img 是一个支持轻松构建、推送和拉取镜像的工具，因此对开发者和 CI/CD 流水线极具吸引力。


    ### img 的特性


    `img` 凭借其独特的功能脱颖而出：


    *   **无特权且无守护进程**：img 完全在用户空间运行，不需要任何守护进程，从而增强了安全性并减少了攻击面。


    *   **兼容 Docker 和 OCI 镜像**：它可以根据 Dockerfile 构建与 Docker 及其他 OCI 镜像格式兼容的镜像。


    *   **高效缓存**：得益于其高效的缓存机制，通过 img 进行重复构建的速度更快。


    *   **易于集成到 CI/CD 流水线**：它非常简单且不需要特权要求，因此可以非常轻松地融入自动化工作流。


    ### 使用 img 构建和推送 Docker 镜像


    **步骤 1. 安装 img：** 首先，在你的系统上安装 `img`。它适用于多种平台，可以从其 GitHub 仓库下载。


    **步骤 2. 准备你的 Dockerfile：** 确保你的 Dockerfile 已准备好构建镜像所需的所有指令。


    **步骤 3. 使用 img 构建镜像：** 导航到包含 Dockerfile 的目录并运行：


    ```

    $ img build -t yourusername/yourimagename:tag .

    ```


    将 `yourusername/yourimagename:tag` 替换为你的 Docker Hub 用户名、镜像名称和标签。`img` 将根据你的 Dockerfile
    构建镜像。


    **步骤 4. 将镜像推送到仓库：** 在推送镜像之前，先向你的 Docker 仓库进行身份验证：


    ```

    $ img login -u yourusername -p yourpassword

    ```


    然后，将镜像推送到 Docker Hub 或其他仓库：


    ```

    $ img push yourusername/yourimagename:tag

    ```


    **步骤 5. 验证镜像：** 推送后，检查你的 Docker 仓库以确保镜像已成功上传。


    `img` 是一个构建 Docker 和 OCI 镜像的强大工具，特别适用于那些对安全性、简单性以及与现有流水线集成性要求较高的环境。它允许无特权、无守护进程的镜像创建，解决了容器生态系统中的关键挑战。对于开发者和
    DevOps 专业人士来说，它是一个宝贵的资产，因为采用它可以简化工作流程、增强安全性并高效管理容器镜像。


    ## 总结


    本章介绍了 Docker 的四种替代方案，并指出了每种方案在容器生态系统中的用途：


    Podman 是 Docker 的一个独立替代方案。它支持无守护进程架构，并结合了无根容器管理。Podman 支持所有原生 Docker 命令，但增加了一个新功能：Pod
    管理。本章介绍了在 Mac 系统上安装 Podman 的过程，然后通过将一个 Spring Boot 应用容器化来实际演示其用法。


    Buildah 专注于创建容器镜像，为开发者提供了更大的灵活性和对镜像构建过程的控制。它不需要任何 root 权限，并且可以很好地与其他容器工具集成。本章探讨了
    Buildah 的一些特性，并提供了从头开始构建容器镜像的实践示例。


    Kaniko 解决了在受限环境（尤其是在 CI/CD 流水线运行中）中构建 Docker 镜像的问题。它完全无需 Docker 守护进程即可运行，并且设计为在容器内运行。此外，整个构建过程完全在用户空间进行，这使得它在需要在极度受限环境中构建镜像时完全合法。它专门针对
    Kubernetes 和云原生工作流进行了优化。


    img 是一种创建容器镜像的现代方法，其基础是简单性和安全性。它在用户空间运行，不需要 root 权限或守护进程，因此非常适合 CI/CD 环境。本章最后提供了使用
    img 构建和管理容器镜像的实用建议。


    这些工具共同展示了 Docker 之外可用于容器管理的多种方法，每种方法都为特定的用例和环境提供了独特的优势。了解这些替代方案有助于开发者和组织为其容器化需求选择最合适的工具。


    # 9. 使用 GraalVM 构建原生镜像


    了解如何使用 GraalVM 和 Quarkus 构建闪电般快速的云 Java 应用。


    在云原生世界中，将 Java 应用转换为高效、轻量级可执行文件的能力变得非常重要。Docker 容器彻底改变了应用的打包和部署方式，但每个容器内运行完整 JVM
    的开销仍然存在，这增加了内存使用量并减慢了启动速度。这正是 GraalVM 的用武之地，它通过将 Java 字节码转换为独立的原生可执行文件来克服这些限制，这些可执行文件几乎可以瞬间启动，并且消耗的内存显著减少——这些特性在微服务架构和无服务器环境中尤其有价值。


    此外，你还将了解到：GraalVM 原生镜像、Spring Boot 3 中的 GraalVM 原生镜像支持，以及 Quarkus 框架——它们在为现代部署环境优化
    Java 应用方面各有独特之处。


    ## 揭开原生镜像和 GraalVM 的神秘面纱


    GraalVM 是由 Oracle Labs 开发的高性能、多语言虚拟机，旨在支持在单个运行时上执行多种编程语言。它的设计目的是在提高性能的同时，减少传统基于
    JVM 的执行开销。


    在 Java 和 GraalVM 的语境中，原生镜像指的是从 Java 字节码创建的独立可执行文件。在深入探讨之前，让我们用一个餐厅和厨房的类比来理解这一点：


    *   **传统 JVM**：一个设备齐全的厨房，拥有各种电器和工具。它可以烹饪任何菜肴，但准备和清洁需要时间。


    *   **原生镜像**：一个专为特定类型菜肴定制的餐车。它更小，开始烹饪更快，效率更高，但不能轻易更改菜单。


    ## 原生镜像详解


    *   **转换**：将 Java 字节码转换为特定于平台的可执行文件。


    *   **组件**：包含应用类、依赖项以及来自 JDK 的静态链接原生代码。


    *   **无需 JVM**：JVM 被打包到可执行文件中，从而消除了目标系统上对 Java 运行时环境的需求。


    ![](img/625177_1_En_9_Fig1_HTML.jpg)


    流程图说明了将 Java 源代码转换为原生镜像的过程。顺序是：Java 源代码被编译成 Java 字节码，然后由 GraalVM 转换为原生镜像。箭头指示了每个步骤之间的进展。


    图 9-1


    原生镜像创建步骤


    ## 原生镜像的优势


    | 优势 | 描述 |

    | --- | --- |

    | **即时启动** | 原生镜像的启动速度比传统的基于 JVM 的应用更快。 |

    | **减少内存占用** | 消耗更少的内存，提升性能，尤其是在容器或无服务器等受限环境中。 |

    | **轻量级部署** | 由于体积更小且与容器化兼容，非常适合云原生应用。 |

    '
- fmt: '# Native Image Drawbacks


    | Drawback | Description |

    | --- | --- |

    | **Platform Dependency** | Each native image is specific to a platform, requiring
    multiple builds for cross-platform compatibility. |

    | **Limited Java Features** | Some dynamic features of Java, like reflection,
    may not be fully supported or require additional configuration. |

    | **Complex Debugging** | Debugging native images can be more challenging than
    traditional Java applications. |


    # Differences Between Docker and Native Image


    Native images and Docker images serve different purposes and operate at different
    levels in the software deployment process:


    | Term | Scope | Purpose | Use Case |

    | --- | --- | --- | --- |

    | **Native Image** | Specific to a compiled executable from Java code using tools
    like GraalVM. | Create a platform-specific, standalone executable with necessary
    Java classes and a reduced JVM. | Optimizes Java applications for faster startup
    and lower memory footprint. |

    | **Docker Image** | A lightweight, standalone, executable package that includes
    everything needed to run software, including code, runtime, system tools, libraries,
    and settings. | Ensures consistent environments and portability across different
    systems. | Used for containerizing applications to run them in isolated environments.
    |


    A native image focuses on optimizing a specific Java application, while a Docker
    image is about packaging and running software consistently in various environments.
    A native image can be part of a Docker image, but they are fundamentally different
    in their core functionalities and objectives.


    # Understanding GraalVM


    GraalVM is a high-performance polyglot virtual machine developed by Oracle. It
    enhances the capabilities of the standard Java Virtual Machine (JVM) by offering
    the following features:


    1. **Support for multiple languages**: Apart from Java, it can run applications
    written in JavaScript, Ruby, Python, and other JVM languages.

    2. **Just-in-time compiler (JIT)**: Improves the performance of Java applications
    by compiling bytecode to machine code at runtime.

    3. **Ahead-of-time compiler (AOT)**: Through the Native Image technology, it compiles
    Java applications into standalone executables, which start faster and require
    less memory.

    4. **Interoperability**: Enables seamless integration between different programming
    languages.

    5. **Extension and customization**: Developers can extend and customize the VM
    for specific requirements.


    # JIT vs. AOT Compiler


    | Feature | JIT | AOT |

    | --- | --- | --- |

    | **Timing** | Compiles code during runtime. | Compiles code before runtime, during
    the build process. |

    | **Operation** | Translates bytecode into machine code when a program is running.
    | Produces a binary executable specific to a platform. |

    | **Performance** | Optimizes code based on runtime data, potentially achieving
    high performance. | Faster startup times as code is pre-compiled, but lacks runtime
    optimization. |

    | **Flexibility** | More adaptable since it compiles code as needed. | Less flexible,
    as it''s compiled for specific architectures or platforms. |

    | **Memory usage** | Can increase memory usage and startup time due to runtime
    compilation. | Generally has a smaller memory footprint and reduces runtime overhead.
    |


    # JVM vs. GraalVM


    | Feature | JVM | GraalVM |

    | --- | --- | --- |

    | **Language support** | Primarily supports Java and JVM-based languages like
    Scala or Kotlin. | Supports additional languages like JavaScript, Ruby, Python,
    and R, making it a polyglot VM. |

    | **Performance optimization** | Uses just-in-time (JIT) compilation to optimize
    bytecode at runtime. | Includes an advanced JIT compiler (Graal Compiler) for
    more efficient performance optimizations. |

    | **Ahead-Of-Time compilation** | Doesn''t natively support AOT compilation. |
    Offers Native Image technology for AOT compilation, creating standalone executables
    from Java applications. |

    | **Interoperability** | Limited to JVM-based language interoperability. | Enhanced
    interoperability features, allowing for mixed-language applications. |

    | **Code elimination** | No exclusion of unreachable code from final executable.
    | Unreachable code at the time of native image creation is excluded from the final
    executable. |

    | **Immutable classpath** | In traditional JVM applications, the classpath can
    be modified dynamically, allowing the addition or modification of where the JVM
    searches for classes and resources. | The classpath is fixed at the time of building
    and cannot be altered. |

    | **Dynamic code awareness** | JVM has ability to adapt to dynamic code changes,
    including loading classes that were unknown at compile time, is one of its core
    strengths, allowing for flexible and dynamic Java applications. | GraalVM requires
    explicit instructions about dynamic code aspects such as reflection, resources,
    serialization, and dynamic proxies. |


    GraalVM''s ability to support multiple languages and improve application performance
    makes it a versatile tool for modern software development.


    # Spring Boot 3 and GraalVM


    GraalVM is a version of OpenJDK enhanced with additional features, including the
    `native-image` utility. This utility performs ahead-of-time (AOT) compilation,
    efficiently processing your code to eliminate unneeded parts and then converting
    the remainder into highly optimized, system-specific native code. The performance
    improvements are remarkable, akin to those seen in C or Go applications. It results
    in binaries that start almost instantly and require significantly less RAM. With
    this technology, deploying a Spring Boot application can consume tens of megabytes
    of RAM and start in just a few hundred milliseconds.


    To leverage this, use `./gradlew nativeCompile` or `./mvnw -Pnative native:compile`.
    Both commands are used when creating native images in the context of GraalVM—a
    virtual machine that enables just-in-time (JIT) compilation of Java applications
    to platform-dependent executables, thus reducing startup time and memory usage.


    Spring Boot has officially supported this feature for production use since the
    release of Spring Boot 3.0 in November 2022.'
