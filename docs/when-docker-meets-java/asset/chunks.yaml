    *Linux Containers are a kind of operating system-level virtualization, running
    multiple independent Linux environments on one machine. LXC shares the host machine’s
    kernel with each one, which gives a leaner alternative to a virtual machine, yet
    maintains* *process**, file system, and network space isolation.*


    *LXC utilizes cgroups (control groups) and namespaces to manage and limit resources,
    producing a virtualization experience similar to running natively on an underlying
    system without the overhead of a full hypervisor.*


    Hykes introduced Docker at PyCon in March 2013\. He received an immediate and
    enthusiastic response from the developers because Docker suggested a solution
    for how to more easily create, deploy, and run applications consistently in any
    environment.


    A key innovation in Docker was its capability to bundle an application and its
    dependencies in a standardized unit, that is, containing libraries, dependencies,
    configuration files, and runtime environment—in a consistent format, which is
