- fmt: '### Building and Tagging a Docker Image


    In this section, you will learn how to build an image using `Dockerfile`. Explore
    different strategies to tag an image.


    The `docker build` command allows us to construct an image using the `Dockerfile`
    and a context. The context denotes a collection of files accessible via a specific
    path or URL. It’s important to note that the build context operates recursively,
    meaning files in subdirectories are also included in the process. Consequently,
    we should execute the `docker build` command from a directory containing only
    the `Dockerfile`.


    Alternatively, we can employ a `.dockerignore` file to specify which files we
    want to exclude from the `docker build` process.


    The `docker build` command supports various flags, offering additional options
    and functionalities during the image construction.


    #### Example


    Let’s follow a step-by-step coding example to demonstrate building, tagging, and
    pushing a Docker image for a simple Java application to DockerHub.


    **Step 1\. Directory setup**: Assume we have a basic Java application with the
    following file structure:


    ```

    my-java-app/

    ├── src/

    │   └── Main.java

    └── Dockerfile

    ```


    **Step 2\. Create the java application**: Let’s create a simple Java application
    in the `Main.java` file:


    ```

    public class Main {

    public static void main(String[] args) {

    System.out.println("Hello,Docker!");

    }

    }

    ```


    **Step 3\. Create the dockerfile**: Next, we need to create a `Dockerfile` to
    define the Docker image:


    ```

    FROM eclipse-temurin:17-jdk-jammy

    COPY ./src /app

    WORKDIR /app

    RUN javac Main.java

    CMD ["java","Main"]

    ```


    This `Dockerfile` uses the official OpenJDK 17 image as the base, copies the `Main.java`
    file into the image, compiles it, and finally sets the command to run the compiled
    Java application.


    **Step 4\. Build the docker image**: Open the terminal or command prompt, and
    ensure we are inside the directory having `Dockerfile` on the terminal and type
    the following command.


    ```

    $ docker build -t my-java-app:1.0 .

    ```


    This command will build the Docker image with the tag (by using the `-t` flag)
    `my-java-app:1.0` as the build context. Setting the image name and tag while building
    our image is good practice. The `.` (dot) at the end of the command indicates
    to Docker that `Dockerfile` is present in the current working directory.


    **Step 5\. Verify the built docker image**: To verify that the Docker image was
    built successfully, run the following command:


    ```

    $ docker images

    ```


    We should see the `my-java-app` image with the `1.0` tag listed among our local
    Docker images.


    **Step 6\. Tag the docker image for dockerhub**: Now, we’ll tag the Docker image
    to prepare it for pushing to DockerHub:


    ```

    $ docker tag my-java-app:1.0 our-dockerhub-username/my-java-app:1.0

    ```


    Note


    Replace `our-dockerhub-username` with our actual DockerHub username.


    Here’s a simplified diagram that outlines the Docker image build process:


    ![](images/625177_1_En_3_Chapter/625177_1_En_3_Fig2_HTML.jpg)


    Flowchart illustrating the Docker image creation process. It begins with "Source
    Code" and "Dockerfile," leading to "docker build." This forms the "Build Context,"
    which is sent to the "Docker Daemon." The process splits into "Caching Layers"
    with "Existing Layers" and "Building Layers" with "New Layers," converging into
    "Assembled Image." The image undergoes "Image Tagging" before being stored in
    the "Local Image Repository." Optionally, it can be "Pushed" to a "Remote Registry."


    Figure 3-2


    Building and tagging a Docker image


    In this flow:


    - The process starts with our source code and a `Dockerfile`.

    - The `docker build` command initiates the build process.

    - The build context, which includes our source code and any other files in the
    directory or specified in the `Dockerfile`, is sent to the Docker daemon.

    - Docker then assembles the image in layers, utilizing the cache to speed up the
    build process.

    - New layers are created as needed based on instructions in the `Dockerfile`.

    - The assembled image is then optionally tagged with a name.

    - The final image is stored in our local image repository.

    - We can then push the image to a remote registry if desired.


    ### Tagging a Docker Image


    Tagging a Docker image is a best practice that brings numerous benefits throughout
    the software development and deployment life cycle. Image tagging is the process
    of assigning a meaningful label to an image, which can be used to differentiate
    its version, purpose, or environment. And here’s why it’s so important:


    #### Benefits of Image Tagging


    1. **Versioning and history**: Tagging can also be used to differentiate the various
    versions we have of our images. For instance, while updating our application,
    we can tag images with version numbers like `v1.0` and `v2.0`, or the dates on
    which they were taken such as `2023-07-17`. This helps to maintain a history of
    changes and provides a way back if needed.


    2. **Deployment and rollbacks**: If you are deploying an application into various
    environments—development, testing, and production—you can use tags to ensure that
    the appropriate image version is used in each environment. If a problem shows
    up in production, we’re able to easily roll back to a previous state with the
    tagged image.


    3. **Collaboration**: Tagging offers one of the most exact reference points for
    collaboration among developers. It allows team members to use the same tagged
    image, thereby ensuring consistency across development and testing environments.


    4. **Tagging**: Use tagging to promote images across the various stages of the
    development pipeline. At each stage of the pipeline, from local development, through
    testing, to production, we can tag an image as it passes, thus keeping a reliable
    version at each step.


    5. **Microservices/distributed systems**: There are times when services could
    rely on specific versions of other services inside the space of a microservice
    or distributed system. Tagging, in this regard, becomes really relevant to making
    sure that services can be found and used at compatible versions of their dependents.


    6. **Continuous integration/continuous deployment (CI/CD)**: This automates the
    pipeline, image creation, and deployment. Tags enable these pipelines to have
    a way of finding an exact version of an image and then tracking it at every stage
    throughout the pipeline.


    7. **Rollback and recovery**: In case a problem arises after deploying a new application
    version, with tagged images, we can quickly roll back to the previous version,
    thus reducing downtime and possible impacts.


    8. **Documentation**: Tagging is a way of documenting. An image tag is supposed
    to present useful information on the purpose and use of the image, the version,
    or any other important thing.


    9. **Testing and quality assurance**: Tagged images ensure that the tested version
    remains consistent with what will be deployed.


    10. **Image pruning**: As we build and tag new iterations of our images, we can
    delete the older images with out-of-date tags to save on storage space.'
