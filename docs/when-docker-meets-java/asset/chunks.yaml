- fmt: '#### Image Tagging Strategies


    Let’s understand some advanced image tagging strategies past just version numbers,
    so they offer clarity, traceability, and most importantly, consistency. It is
    by having consistent and meaningful tag methods that Docker images become easily
    managed—hence making it easy for you to identify and deploy the preferred image
    versions with ease.


    1. **Semantic versioning**: Tagging with semantic versioning is a common strategy
    to indicate the significance of an image. For example, if this image is meant
    for a specific release of our application:


    ```

    $ docker build -t my-java-app:1.0.0 .

    ```


    2. **Using the git commit hash**: Tag images based on respective git commit hash,
    so they can be traced back to specific versions of code. This is very useful in:


    3. **Environment-specific tags**: In case we are building images for various environments,
    for example, development, testing, and production, we can use environment-specific
    tags as follows:


    ```

    $ docker build -t my-java-app .

    $ docker build -t my-java-app .

    $ docker build -t my-java-app .

    ```


    4. **Date-based tags**: Tagging the build date of an image helps to trace the
    creation date of an image:


    ```

    $ docker build -t my-java-app .

    ```


    5. **Latest tag**: Using the `latest` tag for the latest build is a convenience,
    but not the best practice in a production environment due to the ambiguity it
    has:


    ```

    $ docker build -t my-java-app:2023-08-17 .

    ```


    ```

    $ docker build -t my-java-app .

    ```


    In conclusion, we can build a Docker image by using the `docker build` command
    to a Dockerfile and a context. The context is all the files in a certain path
    or URL. In this case, the `docker build` command will have numerous flags available
    to offer extra options. This is crucial in tagging for version control, history
    tracking, practices in deployment, collaboration, and the ability to promote images
    between different stages of the development pipeline.


    ### Pushing and Running a Docker Image


    In this section, we will learn about container management and discover the art
    of efficiently pushing Docker images to registries like DockerHub and seamlessly
    deploying them.


    In the world of containerization for deployment, Docker images are pushed to remote
    container registries. The concept of pushing a Docker image is that we want to
    upload our locally built Docker image to a remote image registry, that is, Docker
    Hub or private registry.


    The following are some of the highlights of pushing an image to registries like
    DockerHub with the help of `docker push` command:


    1. **Image distribution**: It allows us to push our images to distribute the Docker
    images in a remote location. They have shared that making images available for
    others’ use, developers, and systems is crucial for collaboration and deployment
    on heterogeneous environments.


    2. **Centralized image storage**: The Docker registries form centralized repositories
    for the storage and management of Docker images. When we push our images to a
    registry, there is one source of truth for the images that several teams and projects
    can access.


    3. **Consistent deployments**: Pushing images to a registry will ensure that the
    same image is present throughout development environments, through testing, and
    up to production. This greatly minimizes risks that come from a lack of consistency
    between different versions of the same image.


    4. **Share with others**: Should we decide to share our application with colleagues,
    clients, or the open source community, pushing images to a public registry—such
    as Docker Hub—allows other people to pull and run our application quickly, without
    building it on their machine.


    5. **Private registries**: Organizations often use private registries for the
    storage of proprietary or sensitive images. By pushing images to a private registry,
    access is restricted only to authorized users.


    6. **CI/CD pipelines**: Whenever a new image is built, it needs to be pushed to
    the container registry using the CI/CD. Then the following stages of the pipeline—testing
    or deployment—will be done using that image.


    7. **Version control**: We store a history of versions by pushing different versions
    of our images with unique tags to the registry. This would enable rolling back
    to a former version if necessary.


    8. **Scalability**: For applications deployed on many nodes, servers, or clusters,
    putting images into a registry ensures all the instances have the same image,
    resulting in better consistency of scaling and efficiency.


    9. **Saves on deployment time**: If we need to have more than one instance of
    an application, we can save a lot of time and resources just by pulling the image
    from the registry instead of having to build them on each instance.


    10. **Disaster recovery**: In the case of data loss or system failure, the application
    images will have been pushed to a registry and can be restored in a short time.


    Now, we’ll use the `docker push` command to push Docker image to DockerHub:


    ```

    $ docker push our-dockerhub-username/my-java-app:1.0

    ```


    Here is an image illustrating the sequence of Docker commands.


    ![](images/625177_1_En_3_Chapter/625177_1_En_3_Fig3_HTML.jpg)


    A sequence diagram illustrating the process of building, tagging, and pushing
    a Docker image. The developer initiates the process by executing the command `docker
    build -t my-java-app:1.0` on the Docker Host, resulting in the image being built.
    Next, the image is tagged with `docker tag my-java-app:1.0 registry.example.com/my-java-app:1.0`.
    Finally, the image is pushed to the Docker Registry using `docker push registry.example.com/my-java-app:1.0`.
    The diagram shows successful completion of each step, with messages indicating
    `Image Built`, `Image Tagged`, and `Image Pushed Successfully`.


    Figure 3-3


    Pushing a Docker image


    ### Running a Docker Image


    Running a Docker image is a straightforward process that allows developers to
    execute their containerized applications quickly. So we just finished our previous
    coding example for a simple Java application, by successfully building the image,
    tagging it, and pushing the Docker image to DockerHub. Now, let’s see how we can
    run that Docker image in the form of a Docker container.


    Open your terminal or command prompt and enter the following command to download
    the Docker image from DockerHub:


    ```

    $ docker pull our-dockerhub-username/my-java-app:1.0

    ```


    Note


    Replace `our-dockerhub-username` with our actual DockerHub username.


    With the image successfully pulled, we can now run it as a Docker container:


    ```

    $ docker run our-dockerhub-username/my-java-app:1.0

    ```


    Instantly, we will see the containerized Java application in action, with the
    console output displaying `Hello, Docker!` as it runs the Java code from within
    the container. This way, everything related to the application will be isolated
    from the host system so that dependencies or configurations described by the Docker
    image are self-sufficient.


    Running a Docker image allows developers to quickly test their applications within
    a controlled environment, without fear of conflicting dependencies or system-specific
    issues. This all means that development and deployment are simplified with the
    guarantee of consistent behavior across diverse platforms and environments.'
