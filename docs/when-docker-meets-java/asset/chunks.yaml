    ## 容器化 Spring Boot 应用


    现在，将你的应用容器化。在项目根目录下创建一个 `Dockerfile`（或 `Containerfile`）。该文件用于指导如何构建应用的镜像。需要包含基础
    Java 镜像、添加应用的 jar 文件，并指定入口点。以下是一个基本示例：


    ```

    # 使用官方 Java 运行时作为父镜像

    FROM eclipse-temurin:17-jdk-jammy

    # 在容器中设置工作目录

    WORKDIR /app

    # 将 jar 文件复制到容器中的 /app 目录

    COPY target/demo-0.0.1-SNAPSHOT.jar /app/hello-world.jar

    # 向容器外部暴露 8080 端口

    EXPOSE 8080

    # 运行 jar 文件

    ENTRYPOINT ["java","-jar","/app/hello-world.jar"]

    ```


    ## 使用 Podman 构建容器镜像


    要使用 Podman Desktop 创建容器镜像，首先导航到 Podman Desktop 中的“镜像”部分，然后点击右上角的 **构建镜像** 按钮，如下图所示。


    ![](img/625177_1_En_8_Fig10_HTML.jpg)


    一个深色主题的界面，显示了一个镜像管理工具栏，包含三个按钮：“清理镜像”、“拉取镜像”和“构建镜像”。“构建镜像”按钮被一个粉色箭头高亮显示。还有一个标记为“搜索镜像...”的搜索栏。


    图 8-10


    构建镜像


    此操作会打开一个菜单，我们可以在其中选择 `Containerfile` 的位置，通常位于 demo 文件夹的根目录。选择 `Containerfile`
    后，可以为容器镜像指定一个名称，例如“my-custom-image”。


    接下来，点击 **构建** 来观察每个镜像层的创建过程。


    ![](img/625177_1_En_8_Fig11_HTML.jpg)


    从容器文件构建 Docker 镜像的界面。它显示了“Containerfile 路径”字段，设置为“/Users/.../Downloads/demo 3/containerfile”；“构建上下文目录”字段，设置为“/Users/.../Downloads/demo
    3”；以及“镜像名称”字段，设置为“my-custom-image”。底部有一个蓝色的“构建”按钮。


    图 8-11


    配置容器文件


    你可以在本地镜像仓库中找到该镜像。


    ![](img/625177_1_En_8_Fig12_HTML.jpg)


    一个 Docker 镜像界面的截图，显示了一个名为“docker.io/library/my-custom-image”的镜像，标签为“latest”。该镜像创建于
    1 分钟前，大小为 431.39 MB。可执行的操作包括运行、删除和更多设置。


    图 8-12


    本地仓库中的镜像


    ## 运行容器化应用


    太棒了！现在，回到“镜像”部分，查看已成功构建并标记为镜像的容器化 Spring Boot 应用。要将其作为容器在系统上运行，请点击容器镜像右侧的 **运行**
    图标，如下图所示。


    ![](img/625177_1_En_8_Fig13_HTML.jpg)


    一个显示 Docker 镜像详情的用户界面。镜像名称为“docker.io/library/my-custom-image”，标签为“latest”。它创建于
    1 分钟前，大小为 431.39 MB。右侧有操作图标，包括一个播放按钮和一个垃圾桶，一个粉色箭头指向播放按钮。


    图 8-13


    运行镜像


    在“端口映射”部分，确保容器的 8080 端口映射到主机的 8080 端口。其他所有设置可以保持不变。然后，点击 **启动容器** 来启动 Spring Boot
    应用的容器化版本，如下图所示。


    ![](img/625177_1_En_8_Fig14_HTML.jpg)


    从镜像 `docker.io/library/my-custom-image:latest` 创建容器的 Docker 界面。它包括设置卷、端口映射和环境变量的部分。本地端口
    8080 映射到容器端口 8080。有一个添加自定义端口映射和指定环境变量的选项。一个标记为“启动容器”的按钮以蓝色高亮显示。Docker 兼容性显示为版本
    1.5.3。


    图 8-14


    端口映射


    现在，容器已启动并运行。


    ![](img/625177_1_En_8_Fig15_HTML.jpg)


    该图片显示了一个名为“suspicious_hypatia”的 Docker 容器详情界面，突出显示了“日志”选项卡。终端显示了一个 Spring Boot
    应用启动日志，指示使用 Java 17.0.9 和 Apache Tomcat 初始化一个演示应用。关键事件包括启动 DemoApplication、初始化
    Spring DispatcherServlet 以及在 7 毫秒内完成初始化。界面包含导航选项卡，如摘要、检查、Kube、终端和 Tty。底部注明了 Docker
    兼容性。


    图 8-15


    容器启动并运行


    我们现在已经成功使用 Podman 构建并容器化了一个 Spring Boot 应用。这种方法简化了开发流程，并确保我们的应用已准备好部署到任何支持容器的环境中。


    ## Buildah


    Buildah 是一个开源工具，它提供了一个命令行界面，用于创建和管理符合 OCI（开放容器倡议）标准的容器镜像。作为 Docker 的替代方案，Buildah
    是 Red Hat 提供的工具套件的一部分，与 Podman 和 Skopeo 一起用于处理容器。


    Buildah 专注于构建容器镜像。它不管理容器的生命周期操作，如启动、停止或编排容器。Buildah 不包含容器运行时；它只负责创建和准备镜像。


    ### Buildah 特性


    以下是 Buildah 的一些关键特性：


    | 特性 | 描述 |

    | --- | --- |

    | **无根容器镜像构建** | Buildah 可以在无需任何访问权限的情况下创建容器镜像，降低了权限提升攻击的风险。 |

    | **无守护进程架构** | Buildah 无需中央守护进程即可运行，通过将每个操作视为独立进程，最大限度地减少系统资源使用并简化架构。 |

    | **与 Dockerfile 兼容** | Buildah 可以从现有的 Dockerfile 构建镜像，方便熟悉 Docker 的用户进行过渡。 |

    | **镜像构建的灵活性** | 用户可以从零开始构建镜像，也可以使用现有镜像进行构建，与 Docker 相比，允许更大的定制化。 |

    | **与其他工具的集成** | Buildah 可以很好地与其他工具集成，例如用于运行容器的 Podman 和用于传输和检查镜像的 Skopeo。 |

    | **完全可脚本化的 CLI** | Buildah 的 CLI 完全可脚本化，使其适用于构建和部署流水线。 |

    | **支持 OCI 镜像** | Buildah 生成的镜像与符合 OCI 标准的工具和系统完全兼容。 |

