  trans: "\n## Podman 与 Buildah 对比\n\n我们来对 Podman 和 Buildah 进行功能对比。\n\n| 功能特性 | Buildah\
    \ | Podman |\n| --- | --- | --- |\n| **项目类型** | 开源 | 开源 |\n| **平台** | 适用于 Linux\
    \ | 适用于 Linux |\n| **主要功能** | 快速构建 OCI 镜像，无论是否使用 Dockerfile | 管理 OCI 镜像和容器，包括拉取、标记、创建和运行容器\
    \ |\n| **Dockerfile 支持** | 可以从 Dockerfile 构建镜像，也可以不使用 Dockerfile | 支持 Docker 命令，设计为\
    \ Docker 的直接替代品 |\n| **守护进程依赖** | 不以守护进程方式运行 | 不以守护进程方式运行 |\n| **Root 权限** | 无需\
    \ root 权限即可运行 | 无需 root 权限即可运行 |\n| **容器生命周期** | 通常用于构建镜像的短期容器 | 支持长期运行的常规容器 |\n\
    | **存储系统** | 使用与 Podman 不同的存储系统 | 使用与 Buildah 不同的存储系统 |\n| **集成** | 与 Podman 互补，用于构建镜像\
    \ | 与 Buildah 互补，用于管理容器 |\n\n![](img/625177_1_En_8_Fig16_HTML.jpg)\n\n一幅卡通插画，描绘了一只戴着安全帽的狗和一只海豹。狗戴着黄色安全帽，海豹戴着带有探照灯的白色安全帽。它们周围散落着扳手、螺丝刀和蓝图等工具，背景是充满活力的蓝色，并带有气泡。\n\
    \n图 8-16\n\nPodman 和 Buildah 是天作之合\n\n## 使用 Buildah 构建镜像\n\n要开始使用 Buildah，你可以将其安装在任何支持\
    \ OCI 的 Linux 发行版上。以下是一个快速指南：\n\n**安装**\n\n在 Fedora/Linux/CentOS 上，你可以使用 `sudo\
    \ dnf install buildah` 安装 Buildah。\n\n在 Ubuntu 上，首先使用 `sudo add-apt-repository\
    \ ppa:projectatomic/ppa` 添加 Kubic 项目的仓库，然后执行 `sudo apt-get update`，最后执行 `sudo\
    \ apt-get install buildah`。\n\n**构建镜像**：要创建一个新镜像，你可以从一个基础镜像或从头开始，然后使用 Buildah\
    \ 命令修改文件系统、设置环境变量、暴露端口以及定义入口点。\n\n**提交你的工作**：完成更改后，你可以使用 `buildah commit` 将工作容器提交为一个镜像。\n\
    \n**推送到仓库**：最后，你可以使用 `buildah push` 将你的镜像推送到容器仓库。\n\n假设你想创建一个包含 Web 服务器的简单容器镜像：\n\
    \n```\n# 从头开始创建一个新容器\nnew_container=$(buildah from scratch)\n# 挂载容器文件系统\nmountpoint=$(buildah\
    \ mount $new_container)\n# 安装一个 Web 服务器，例如 nginx\ndnf install --installroot $mountpoint\
    \ --releasever 30 nginx --setopt install_weak_deps=false -y\n# 设置一些配置和静态 HTML\
    \ 文件\necho 'Hello from Buildah!' > $mountpoint/usr/share/nginx/html/index.html\n\
    # 提交更改以创建新镜像\nbuildah commit $new_container my-webserver\n# 将镜像推送到仓库\nbuildah\
    \ push my-webserver docker://myregistry/my-webserver:latest\n```\n\nBuildah 专注于构建容器镜像，而\
    \ Docker 则提供更广泛的功能，包括编排和网络。对于主要关注构建和管理容器镜像的用户，尤其是在需要更高脚本化和灵活性的场景下，Buildah 为 Docker\
    \ 的镜像构建能力提供了一个强大的替代方案。\n\n## Kaniko\n\n在容器化领域，Docker 已成为创建和管理容器的代名词。然而，构建 Docker\
    \ 镜像通常需要一个 Docker 守护进程，这在无法或不安全运行守护进程的环境中带来了挑战。Kaniko 正是在此背景下应运而生，它提供了一种在持续集成（CI）管道等环境中构建容器镜像的解决方案，而无需\
    \ Docker 守护进程。\n\n### Kaniko 的必要性\n\nKaniko 由 Google 开发，旨在解决构建 Docker 镜像时的特定挑战：\n\
    \n*   **安全问题**：运行 Docker 守护进程通常需要提升权限，这可能会带来安全风险，尤其是在共享的 CI 环境中。\n*   **环境限制**：在特定环境（如\
    \ Kubernetes 集群）中运行 Docker 守护进程并不实际。\n*   **CI/CD 管道效率**：Kaniko 优化了直接在 CI/CD 管道内构建镜像的过程，无需依赖单独的环境来运行\
    \ Docker。\n\n## Kaniko 的特性\n\nKaniko 拥有多项特性，使其在构建 Docker 镜像时具有优势：\n\n*   **无需守护进程**：Kaniko\
    \ 不需要 Docker 守护进程来构建镜像，从而减少了攻击面，使其在共享环境中更安全。\n*   **在用户空间运行**：它完全在用户空间中执行 Dockerfile\
    \ 中的每条命令，使其与各种环境兼容。\n*   **缓存机制**：Kaniko 提供缓存选项以加速连续构建。\n*   **支持标准 Dockerfile\
    \ 指令**：你可以使用与 Docker 相同的 Dockerfile，从而轻松集成到现有工作流程中。\n\n### 理解 Kaniko\n\nKaniko\
    \ 执行器镜像（即 [gcr.​io/​kaniko-project/​executor:​latest](https://gcr.io/kaniko-project/executor:latest)）根据\
    \ Dockerfile 构建镜像并将其推送到仓库。它首先从 Dockerfile 中 `FROM` 命令指定的基础镜像中提取文件系统。然后，执行器运行 Dockerfile\
    \ 中的命令，并在每次执行后在用户空间中对文件系统进行快照。如果发生任何更改，它会将这些文件作为新层附加到基础镜像，并相应地更新镜像元数据。\n\n###\
    \ 使用 Kaniko 构建和推送 Docker 镜像\n\n*   **步骤 1：准备 Dockerfile 和上下文**：首先，像往常一样准备你的 Dockerfile。确保\
    \ Dockerfile 中引用的所有文件在构建上下文中都可用。\n*   **步骤 2：设置 Docker 仓库凭据**：Kaniko 需要访问你的仓库才能推送构建好的镜像。你需要创建一个包含凭据的\
    \ JSON 文件。该文件通常如下所示：\n\n    ```\n    {\n    \"auths\": {\n    \"https://index.docker.io/v1/\"\
    : {\n    \"username\": \"yourusername\",\n    \"password\": \"yourpassword\"\n\
    \    }\n    }\n    ```\n\n*   **步骤 3：在 Docker 中运行 Kaniko**：你不需要 Kubernetes 来运行\
    \ Kaniko。它可以作为 Docker 容器执行。操作方法如下：\n    1.  **挂载你的上下文和凭据**：使用 Docker 运行 Kaniko，挂载构建上下文目录和包含\
    \ Docker 仓库凭据的目录。\n\n        ```\n        docker run --rm \\\n        -v $(pwd):/workspace\
    \ \\\n        -v /path/to/kaniko/.docker/:/kaniko/.docker/ \\\n        gcr.io/kaniko-project/executor:latest\
    \ \\\n        --dockerfile /workspace/Dockerfile \\\n        --context dir:///workspace/\
    \ \\\n        --destination yourdockerhubusername/your-image-name:your-tag\n \
    \       ```\n\n    2.  **构建并推送**：Kaniko 将使用提供的 Dockerfile 和上下文构建镜像，然后将其推送到 Docker\
    \ 仓库中指定的目标位置。\n\n*   **步骤 4：验证镜像**：构建过程完成后，在 Docker 仓库中验证镜像，确保其已正确推送。\n\n```\n\
    }\n```\n\nKaniko 主要用于在可能不适合 Docker 的环境（例如 CI/CD 或 Kubernetes 环境）中进行无 root、无守护进程且安全的镜像构建。借助\
    \ Kaniko，开发者和 DevOps 团队可以安全高效地简化其 CI/CD 工作流程。\n\n## Img\n\n在不断发展的容器化领域，对多功能、安全且易于使用的容器镜像构建工具的需求从未如此强烈。`img`\
    \ 正是在此背景下应运而生，为 Docker 和容器技术中的镜像创建提供了一种全新的方法。\n"
- fmt: '### Why `img`?


    `img` was developed to address several challenges and limitations posed by traditional
    Docker image building methods:


    - **Daemonless operation**: The build process of a Docker image requires the daemon.
    This may pose a security problem—mainly in shared or multitenant environments,
    CI systems.

    - **Root privileges**: Docker requires root privilege to create the images, which
    is a great concern in terms of security, of course. `img` does not require any
    root access.

    - **Simplicity and portability**: `img` is a tool which supports building, pushing,
    and pulling images easily, and, therefore, becomes rather attractive to developers
    and pipelines for CI/CD.


    ### Features of `img`


    `img` stands out with its distinct features:


    - **Unprivileged and daemonless**: `img` runs totally in userspace and does not
    require any daemon, so it enhances security as well as reduces the attack surface.

    - **Compatibility with Docker and OCI images**: It can build images from Dockerfiles
    compatible with Docker and other OCI image formats.

    - **Efficient caching**: Thanks to its efficient caching mechanism, all repeated
    builds are faster via `img`.

    - **Easy integration into CI/CD pipelines**: It is very simple and does not require
    privileged requirements, so it quite easily fits into automated workflows.


    ### Using `img` to Build and Push Docker Images


    **Step 1. Installing `img`:** First, install `img` on your system. It’s available
    for various platforms and can be downloaded from its GitHub repository.


    **Step 2. Preparing your Dockerfile:** Ensure your Dockerfile is ready with all
    necessary instructions for building your image.


    **Step 3. Building the image with `img`:** Navigate to the directory containing
    your Dockerfile and run:


    ```

    $ img build -t yourusername/yourimagename:tag .

    ```


    Replace `yourusername/yourimagename:tag` with your Docker Hub username, image
    name, and tag. `img` will build the image based on your Dockerfile.


    **Step 4. Pushing the image to a registry:** Before pushing the image, authenticate
    with your Docker registry:


    ```

    $ img login -u yourusername -p yourpassword

    ```


    Then, push the image to Docker Hub or another registry:


    ```

    $ img push yourusername/yourimagename:tag

    ```


    **Step 5. Verifying the image:** After pushing, check your Docker registry to
    ensure the image has been uploaded successfully.


    `img` emerges as a very powerful tool for building Docker and OCI images, especially
    suited for environments where security, simplicity, and integration with the existing
    pipelines are paramount. This allows unprivileged, daemonless image creation,
    which solves key challenges in the container ecosystem. It is a valuable asset
    for developers and DevOps professionals because its adoption can streamline workflows,
    enhance security, and efficiently manage container images.


    ## Summary


    This chapter presents four alternatives of Docker and points out what each is
    useful for in the container ecosystems:


    - **Podman** is a standalone alternative for Docker. It supports daemonless architecture
    combined with rootless container management. Podman supports all native Docker
    commands but adds another feature: pod management. This chapter deals with the
    installation of Podman in Mac systems and then demonstrates it in practice by
    containerizing a Spring Boot application.


    - **Buildah** is focused on creating container images, giving developers more
    flexibility and control of the image-building process. It does not require any
    root privileges and integrates well with other container tools. This chapter explores
    some of the features of Buildah and provides practical examples of building container
    images from scratch.


    - **Kaniko** solves the problem of constructing Docker images in restricted environments
    where it is not feasible, especially within CI/CD pipeline runs. It operates completely
    without a Docker daemon. It is designed to run inside a container. Furthermore,
    the entire build process occurs entirely in user space, which makes it perfectly
    legal to use when an image has to be built in extremely constrained environments.
    It has been specifically optimized for Kubernetes and cloud-native workflows.


    - **`img`** is a contemporary approach to creating container images, which is
    based on simplicity and security. It runs in userspace and does not require root
    privilege or daemon, so it is really very well suited for the CI/CD environment.
    The chapter ends with practical advice on using `img` to build and manage your
    container images.


    Together, these tools demonstrate the diverse approaches available for container
    management beyond Docker, each offering unique advantages for specific use cases
    and environments. Understanding these alternatives helps developers and organizations
    choose the most appropriate tools for their containerization needs.


    # 9. Building Native Images with GraalVM


    Learn about building lightning-fast cloud Java applications with GraalVM and Quarkus.


    In a cloud-native world, the facility to convert Java applications into efficient,
    lightweight executables has gained much importance. Docker containers revolutionized
    application packaging and deployment but still carry the overhead of running a
    full JVM inside each container, increasing memory usage and slowing down startups.
    This is where GraalVM shines as it overcomes these limitations by converting Java
    bytecode into standalone native executables that start almost instantly and consume
    significantly less memory—features especially valuable in microservices architectures
    and serverless environments.


    Furthermore, you will learn about: GraalVM Native Images, GraalVM native image
    support in Spring Boot 3, and the Quarkus framework—all unique in their approach
    to optimizing Java applications for modern deployment environments.


    ## Demystifying Native Image and GraalVM


    GraalVM is an Oracle Labs-developed, high-performance, polyglot virtual machine
    designed to enable multiple programming languages to be executed on a single runtime.
    It was made to make improvements in performance while reducing the overhead of
    conventional JVM-based execution.


    A native image in the context of Java and GraalVM refers to a standalone executable
    file created from Java bytecode. Before we go deeper, let''s understand this with
    a restaurant and kitchen analogy:


    - **Traditional JVM**: A fully equipped kitchen with various appliances and tools.
    It can cook any dish but takes time to prepare and clean.

    - **Native image**: A food truck tailored to a specific cuisine type. It''s smaller,
    starts cooking faster, and is more efficient, but can’t change its menu easily.


    ## Native Image Explained


    - **Conversion**: Transforms Java bytecode into a platform-specific executable.

    - **Components**: Includes the application classes, dependencies, and statically
    linked native code from JDK.

    - **No JVM required**: The JVM is packaged into the executable, eliminating the
    need for a Java Runtime Environment on the target system.


    ![](images/625177_1_En_9_Chapter/625177_1_En_9_Fig1_HTML.jpg)


    Flowchart illustrating the process of converting Java source code to a native
    image. The sequence is: Java Source Code is compiled into Java Bytecode, which
    is then converted by GraalVM into a Native Image. Arrows indicate the progression
    between each step.


    **Figure 9-1** Native image creation steps


    ## Native Image Benefits


    | Benefit | Description |

    | --- | --- |

    | **Instant Startup** | Native images start faster than traditional JVM-based
    applications. |

    | **Reduced Memory Footprint** | Consumes less memory, enhancing performance,
    especially in constrained environments like containers or serverless. |

    | **Lightweight Deployment** | Ideal for cloud-native applications due to smaller
    size and compatibility with containerization. |'
