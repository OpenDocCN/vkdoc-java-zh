- fmt: "```xml\n</bean>\n\n<bean id=\"policyQuoteBurlapService\"\n      class=\"org.springframework.remoting.caucho.BurlapProxyFactoryBean\"\
    >\n    <property name=\"serviceUrl\"\n              value=\"http://localhost:7001/eInsureWeb/remoting/PolicyQuoteService\"\
    />\n    <property name=\"serviceInterface\"\n              value=\"com.apress.einsure.business.api.PolicyQuoteApplicationService\"\
    />\n</bean>\n\n</beans>\n```\n\nIt is important to note that since I have used\
    \ a proxy object with P2I, the business delegate does not need to change. Last\
    \ but not least, Listing 5-41 shows the stand-alone client.\n\n**Listing 5-41.**\
    \ `PolicyQuoteBurlapClient.java`\n\n```java\npublic class PolicyQuoteBurlapClient\
    \ {\n    public static void main(String[] args) {\n        accessViaSpringClient();\n\
    \    }\n\n    public static void accessViaSpringClient() {\n        String configFile\
    \ = \"com/xpress/channel/springburlap-config.xml\";\n        ApplicationContext\
    \ ctx = new ClassPathXmlApplicationContext(configFile);\n        PolicyQuoteBusinessDelegate\
    \ delegate =\n            (PolicyQuoteBusinessDelegate) ctx.getBean(\"policyQuoteDelegate\"\
    );\n        delegate.execute();\n    }\n}\n```\n\n## Consequences\n\n### Benefits\n\
    \n- It is easy to expose existing POJO services through a variety of remoting\
    \ options.\n- It is easy to develop Spring-based clients for remote web services.\n\
    - Technology- and platform-independent service access can be accomplished using\
    \ web services.\n- Existing services can now participate in a bigger integration\
    \ scenario.\n\n### Concerns\n\n- Burlap-Hessian is nonstandard with respect to\
    \ JAX-RPC and JAX-WS.\n- Accessing services over the network can have adverse\
    \ effects on application performance.\n- It will be necessary to implement a robust\
    \ security infrastructure as more and more services become available as remote\
    \ web services.\n\n## Summary\n\nSpring provides a robust high-level API that\
    \ makes writing data access code very simple. This is possible because the framework\
    \ takes care of the boilerplate code generally required for direct JDBC. The API\
    \ also embodies robust object design principles and patterns. Spring JDBC also\
    \ provides an OO wrapper to access legacy stored procedures through the PAO pattern.\
    \ Spring ORM module allows integration with ORM solutions. This also needs to\
    \ wrap with Data Access Object pattern to provide a consistent persistence API\
    \ to the business tier.\n\nWith Spring’s convenient support classes, it is possible\
    \ to support asynchronous processing with a service activator either in an EJB\
    \ server or in the Spring container. Finally, existing POJO-based Spring services\
    \ can be exposed as technology-independent remote web service components, primarily\
    \ by configuration.\n\nSecurity and transaction are two foremost important requirements\
    \ in any Java EE application. Unfortunately, not much has been written or discussed\
    \ about them. In Chapter 6, I will look into the need for security and transaction\
    \ in a Java EE application and discuss a few related patterns with the Spring\
    \ framework.\n\n# Chapter 6\n\n# Exploring Crosscutting Design Patterns\n\nMost\
    \ enterprise applications should be secured to prevent malicious access. They\
    \ also require transaction support to maintain data consistency. The Java EE platform\
    \ containers provide support for both security and transaction. However, these\
    \ services can be applied in any of the application tiers. Security, for example,\
    \ can be applied in the presentation tier to prevent unauthorized access of web\
    \ resources such as Java Server Pages. The EJB business tier components also require\
    \ protection because they can be accessed by different remote clients. The web\
    \ services in the integration tier also need secured access. Similarly, transactional\
    \ services may be used by the business tier or integration tier data access logic\
    \ depending on application need.\n\nUnfortunately, Sun’s Java BluePrints and the\
    \ book *Core J2EE Design Patterns* by Deepak Alur, Dan Malks, and John Crupi (Prentice\
    \ Hall, 2003) do not document any design strategy for transaction and security,\
    \ which are of critical importance to an enterprise application. Therefore, developers\
    \ and designers often have a dilemma when deciding the appropriate tier for applying\
    \ these application concerns. As a result, they often end up using a low-level\
    \ Java EE platform security API or the Java Transaction API in their code. The\
    \ core application concerns such as presentation and business logic are soon bloated\
    \ because of mixing transaction and security code. Hence, I decided to dedicate\
    \ this chapter to discussing design strategies to counter these crosscutting concerns\
    \ with the Spring Framework.\n\nThe Java EE specification and the Java Authorization\
    \ and Authentication Service (JAAS) API tries to standardize security services.\
    \ But they are limited in features and unsuitable for the majority of the applications.\
    \ The server vendors implement container security in a proprietary way, resulting\
    \ in vendor lock-in and limited portability. JAAS, on the other hand, just provides\
    \ a standard interface. The container support for JAAS too lacks any consistency.\
    \ So, development teams generally resort to a custom solution, which consumes\
    \ a significant portion of their development time. Spring Security, which was\
    \ earlier known as Acegi Security, is an easy-to-use and flexible security framework\
    \ that works irrespective of any container. It is based on the Spring IOC container\
    \ and heavily relies on its DI and AOP features. It provides declarative security\
    \ to web requests and business methods. It is highly extensible and provides out-of-the-box\
    \ components that cover almost every custom security need. In this chapter, I\
    \ will apply Spring Security in the context of some frequently used Java EE security\
    \ patterns described in the book *Core Security Patterns* by Christopher Steel,\
    \ Ramesh Nagappan, and Ray Lai (Prentice Hall, 2005).\n\nUnlike with security,\
    \ the Java EE containers provide robust support for distributed transactions involving\
    \ a variety of middleware and database servers. The Java EE specification supports\
    \ both the programmatic and declarative modes of transaction control. The declarative\
    \ transaction control is highly flexible and can be controlled by configuration.\
    \ Programmatic transaction management, on the other hand, can be very cumbersome\
    \ to develop and maintain. In this chapter, I will focus more on transaction strategies\
    \ primarily based on Spring AOP support and in the process explore some patterns\
    \ discussed in the book *Java Transaction Design Strategies* by Mark Richards\
    \ (Lulu.com, 2006).\n\nIn this chapter, I will heavily use AOP concepts. I will\
    \ also call upon the Spring Framework’s AOP support for several examples. If you\
    \ are new to AOP, then get started with the book *Foundations of AOP for J2EE\
    \ Development* by Renaud Pawlak, Jean-Philippe Retaillé, and Lionel Seinturieris\
    \ (Apress, 2006). Also, you should read the Spring AOP documentation at [http://static.springframework.org/spring/docs/2.5.x/reference/aop.html](http://static.springframework.org/spring/docs/2.5.x/reference/aop.html).\n\
    \n## Authentication and Authorization Enforcer\n\n### Problem\n\nThe eInsure application\
    \ handled sensitive information related to policies purchased by thousands of\
    \ people. It also managed crucial business intelligence data that was accessible\
    \ to the senior management of the companies using this product. So, it was important\
    \ that eInsure allowed only trusted parties to access data to prevent any kind\
    \ of data loss or tampering."
