    Spring 应用上下文的访问，并且充当 Web 服务中的第一个接触点。在本节中，我将尝试利用 Spring 框架和 Apache Axis Web 服务框架来公开策略报价服务。Apache
    Axis 提供了完整的基于 SOAP 的 JAX-RPC 实现。


    使用 Spring 开发基于 JAX-RPC 的 Web 服务的第一步是定义服务接口，如清单 5-29 所示。在此示例中，我将使用由应用服务实现的同一个`PolicyQuoteApplicationService`接口。


    **清单 5-29.** `PolicyQuoteApplicationService.java`


