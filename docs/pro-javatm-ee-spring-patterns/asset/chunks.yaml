    \ />\n</bean>\n\n<bean name=\"underwritingBusinessDelegate\"\n    class=\"com.apress.insurance.view.delegate.UnderWritingBusinessDelegate\"\
    \ />\n</beans>\n```\n\nThe web page that is presented to the end user’s browser\
    \ to create a policy does not require any dynamic data. Hence, I have configured\
    \ a `UrlFilenameViewController` object to handle this request. It converts a resource\
    \ name in the URL into a logical view name.\n\nSo, the request for `createPolicy.do`\
    \ will result in a symbolic view name: `createPolicy`. The `SimpleUrlHandlerMapping`\
    \ with wildcard mapping resolves any request starting with `create`, such as `createPolicy.do`,\
    \ and invokes the `UrlFilenameViewController`, which returns the logical view\
    \ name. Finally, the view resolver is invoked by the front controller to resolve\
    \ the logical view name to a physical resource, `/WEB-INF/jsp/createPolicy.jsp`.\n\
    \nIn `createPolicy.jsp` (Listing 3-20), whenever the user clicks the Save button,\
    \ a request is sent to the server for the resource `saveNewPolicy.do`. Now a handler\
    \ mapping chain has been configured in Listing 3-23. The `BeanNameUrlHandlerMapping`\
    \ with higher precedence is able to resolve this URL and invokes the `SaveNewPolicyController`.\
    \ The logical view name returned by this controller is finally resolved to the\
    \ resource `showPolicydetails.jsp`.\n\n## Using `SimpleFormController`\n\nA typical\
    \ web application involves displaying a form to collect user input. The users\
    \ fill in this form and submit the data to the web server for further processing.\n\
