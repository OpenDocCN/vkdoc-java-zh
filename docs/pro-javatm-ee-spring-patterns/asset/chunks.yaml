    简化部署


    有一种更简单的方法来部署 OMSWeb 项目。我假设你已经执行了 Maven install 目标来创建 WAR 文件，并且已经下载并安装了 Tomcat
    5.5。由于我使用的是 Windows，因此我将 Tomcat 安装在 c:\tomcat5.5。


    请注意，你不应下载并使用 Tomcat Windows 服务安装程序；而应选择简单的压缩包分发版。


    作为这种新部署策略的第一步，你需要为 OMSWeb 项目设置目标运行时（即 Web 应用程序将运行的服务器）。为此，请右键单击 OMSWeb 项目以启动上下文菜单，然后选择“属性”，如图
    7-19 所示。


