    filter. The filter intercepts incoming web requests and delegates to the authentication
    manager. To install the Spring Security gateway, you will need to install the
    special servlet filter class FilterToBeanProxy in web.xml, as shown in Listing
    6-1.


    **Listing 6-1.** web.xml *Fragment*


    <filter>


    <filter-name>springSecurityFilterGateway</filter-name>


    <filter-class>org.springframework.security.util.FilterToBeanProxy


    </filter-class>


    <init-param>


