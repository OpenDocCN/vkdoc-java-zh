    \ Java™ EE Patterns with the Spring Framework\n\n## Companion eBook\n\n**Pro Java™\
    \ EE Spring Patterns: Best Practices and Design Strategies Implementing Java™\
    \ EE Patterns with the Spring Framework**\n\nDear Readers,\n\nI have been using\
    \ the Spring Framework to speed up Java™ EE projects for three years as of this\
    \ writing. For those of you who have struggled with the complex Pro Java™ EE programming\
    \ model (and especially EJB™ APIs), the Spring Framework will come as a welcome\
    \ change to you. Spring, combined with Java™ EE patterns and IDE support, paves\
    \ the way for agile Java™ EE application development.\n\nI regularly apply the\
    \ Spring Framework with the Java™ EE design patterns to simplify application design\
    \ and development, and I have always wanted to document and share these solutions\
    \ for easy reference in the Java™ EE community. This book has given me the opportunity\
    \ to catalog and share the Spring Java™ EE patterns with you.\n\nI am confident\
    \ you will find this catalog useful for your daily application design and development\
    \ needs. Although the book’s primary focus is on design, you will find plenty\
    \ of working examples and reusable code so you can easily grasp the concepts being\
    \ presented.\n\nAfter you read this book, you will gain a completely different\
