    **157**


    EJB 2.0 引入了本地 EJB，旨在限制网络往返次数，从而提升性能。实现业务工作流的远程无状态会话 Bean 可以与本地实体 Bean 结合，仅通过一次网络往返即可完成特定用例。


    即便使用现代集成开发环境，编写无状态会话 Bean 也是一项繁琐的工作。每个 EJB 2.*x* 或 1.*x* SLSB 至少需要创建三个 Java 文件：你需要两个
    Java 文件分别用于 home 接口和远程接口，第三个文件用于 Bean 实现类。除此之外，还有两个 XML 部署描述符：标准的 `ejb-jar.xml`
    和另一个提供运行时元数据的供应商特定 XML。在接下来的几节中，我将尝试通过 Spring EJB 支持类来简化会话外观的开发。


    构建会话 Bean 的第一步是创建 home 接口，如清单 4-15 所示。


    **清单 4-15.** UnderwritingRemoteHome.java


    public interface UnderwritingRemoteHome extends EJBHome {


    UnderwritingRemote create() throws CreateException, RemoteException;


    }


    home 接口负责管理远程 EJB 对象的生命周期。在此例中，home 接口的 `create` 方法充当工厂角色，负责创建远程对象。远程对象实现远程接口，如清单
    4-16 所示。


    **清单 4-16.** UnderwritingRemote.java


    public interface UnderwritingRemote extends EJBObject {


    public void underwriteNewPolicy(String productCd,String name,int age) throws RemoteException;


    }


    远程接口定义了 SLSB 将向其客户端暴露的所有业务方法。Bean 实现类负责为远程接口中定义的业务方法提供实现。Spring 提供了便捷的基类来简化 Bean
    实现类的开发。


    因此，在深入实现细节之前，理解这些类非常重要。


    ![图片 44](img/index-180_1.png)


    10092ch04.qxd 7/24/08 5:10 PM Page 158


    **158**


    第 4 章 **■** 探索业务层设计模式


    如图 4-3 所示，`AbstractEnterpriseBean` 类构成了 Spring EJB 支持类的核心。此类可被子类化以支持不同形式的 EJB，例如会话
    Bean、消息驱动 Bean 等。然而，在大多数情况下，你无需这样做，因为 Spring 已经提供了合适的子类。`AbstractEnterpriseBean`
    类负责创建和加载 Spring Bean 工厂，并将其提供给 EJB。


    **图 4-3.** *类图：Spring 无状态会话 Bean 支持* `AbstractEnterpriseBean` 是通用类，Spring 提供了专门的
    `AbstractSessionBean` 类来开发会话 Bean 组件。该类实现了 `SessionBean` 接口，并负责保存由 EJB 容器注入的 `SessionContext`
    对象。但是，不应扩展此类来支持 SLSB。相反，你的 Bean 实现应继承自更专门的 `AbstractStatelessSessionBean`。该类实现了所有
    EJB 回调方法。这非常有用，因为在大多数情况下，你只需要这些回调的空实现。此特性简化了 Bean 实现类，促进了代码复用，并使其能够专注于业务逻辑。子类应重写
    `onEjbCreate` 方法，以在加载 Bean 工厂后执行任何后初始化操作。最后，清单 4-17 展示了 Bean 实现类。


