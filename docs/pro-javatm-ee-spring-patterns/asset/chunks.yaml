    **图 7-20.** *新建目标运行时*


    在“新建服务器运行时环境”屏幕上，选择“Apache Tomcat 5.5”，并选中“创建新的本地服务器”选项，如图 7-21 所示。然后单击“下一步”进入下一个屏幕以选择
    Tomcat 安装目录。


    ![Image 77](img/index-325_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM 第 303 页


    第 7 章 **■** 案例研究：构建订单管理系统


