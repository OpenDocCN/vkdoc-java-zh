    interface* (P2I). This principle states that concrete objects must implement an
    interface that is used in the caller program rather than the concrete object itself.
    Therefore, you can easily substitute a different implementation with little impact
    on client code. In other words, there is no direct dependency on the concrete
    implementation leading to low coupling.


