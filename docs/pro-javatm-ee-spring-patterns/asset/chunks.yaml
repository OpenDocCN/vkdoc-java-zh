    \ name=\"expression\" value=\"execution(* *.underwrite*(..))\" />\n    </bean>\n\
    \n    <bean class=\"org.springframework.aop.framework.autoproxy\n            \
    \    .DefaultAdvisorAutoProxyCreator\" />\n\n    <!—other beans -->\n</beans>\n\
    ```\n\nNote that this bean does not require a name or ID attribute because it\
    \ will be used by the Spring AOP module internally. It will check beans for method\
    \ names matching the advisor and will create appropriate proxies to intercept\
    \ calls to the method.\n\n## Consequences\n\n### Benefits\n\n- With Spring AOP\
    \ support, the audit trail can be applied declaratively on the POJO application\
    \ service components.\n- It has support for a variety of options for logging the\
    \ audit trail.\n- The Spring AOP–based audit trail has no impact on the application\
    \ code.\n\n### Concerns\n\n- Upfront knowledge of AOP is required, which is considered\
    \ difficult for junior developers.\n- Spring AOP makes extensive use of proxies\
    \ and bytecode generation. This adds to performance overhead.\n\n## Domain Service\
    \ Owner Transaction\n\n### Problem\n\nTransaction management is a critical concern\
    \ for any enterprise application. It is essential to maintain the consistency\
    \ of enterprise data. Transaction management is a complex system concern because\
    \ it involves interacting with a variety of enterprise information systems. In\
    \ Java EE servers, the applications can leverage the EJB container’s robust support\
    \ for distributed transaction. All the different types of EJBs—session, entity,\
    \ and message-driven beans—can subscribe to transactions declaratively. This often\
    \ puts the application designers in a dilemma when they get down to devising strategies\
    \ for transaction management. Consider the cases when your session bean accesses\
    \ a number of entity beans or when a message-driven bean invokes remote methods\
    \ on a session bean. Even with declarative Java EE transaction support, it becomes\
    \ difficult to make crucial decisions such as where to start a transaction, how\
    \ to propagate a transaction, and where to end it.\n\nSometimes Java EE applications\
    \ are required to support non-web-based clients such as Java Swing–based desktop\
    \ software. These clients more often than not resort to client-managed transactions.\
    \ This is done programmatically with JTA. This, however, dilutes the core goal\
    \ of the Swing clients to act only as the view tier. This also results in multiple\
    \ fine-grained calls to the business logic on the server, which leads to a surge\
    \ in network traffic."
