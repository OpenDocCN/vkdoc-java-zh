    这种模式还将对象创建集中到少数工厂类中，使其易于维护。借助工厂辅助类，还可以使对象创建变得可配置。你可以在某些属性文件或 XML 配置文件中定义要提供的具体实现，从而使其能够动态切换。


    **在注册表服务中定位**


    第三种方法对于 EJB 开发者来说应该很熟悉。他们经常需要在 JNDI 注册表服务中查找 EJB 对象引用。在这种情况下，EJB 对象已经创建并注册到 JNDI
    中，并带有特定的键。这些对象可能位于远程 JVM 中，但 JNDI 使用此键进行查找的方式与清单 2-2 非常相似。


    所有这些策略通常被称为*拉取*依赖注入。这是因为依赖对象是由最终使用它的对象拉入的。我更倾向于将拉取方法归类为依赖解析，而非依赖注入。这是因为真正的依赖注入发生在
    IOC 中，被称为*推送* DI。在这种方法中，外部容器或应用程序框架创建依赖对象并将其传递给需要它的对象。依赖对象通常通过构造函数或 setter 方法提供。然而，为此，应用程序框架必须知道要提供哪个依赖对象，以及要将依赖对象通知给哪个对象。


    有趣的是，EJB 容器不仅支持拉取 DI（例如，一个会话 bean 在 JNDI 中查找另一个会话 bean），还支持推送 DI。这一点从 setSessionContext(javax.ejb.SessionContext
    ctx) 或 setEntityContext(javax.ejb.EntityContext ctx) 方法中可以看出，在这些方法中，上下文对象由容器创建、初始化并传递给
    EJB 对象。这被称为*设值注入*。在后续章节中，当我谈到 Spring IOC 容器的 DI 特性时，你可以通过示例探索推送 DI 的不同变体。


    **DI 的优势**


    以下是 DI 的优势：


    • 依赖注入促进了松耦合。例如，借助工厂辅助类，你可以通过 P2I 移除硬编码的依赖。可以在应用程序外部配置它们，并提供热插拔和热替换的实现。


    • 它促进了测试驱动开发（TDD）。对象可以轻松测试，因为它们不需要任何特定容器来运行。只要依赖项通过某种机制注入，它们就可以被测试。


