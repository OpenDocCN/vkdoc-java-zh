    如清单 4-2 所示，业务委托是业务层的一个 POJO 客户端代理。它使用服务定位器来访问 EJB 对象。使用 Spring 框架，服务定位器对业务委托是透明工作的。由服务定位器查找的
    EJB 对象由 Spring IOC 容器注入到业务委托中。这个 EJB 对象用于委托业务逻辑调用。因此，业务委托知道如何使用诸如 EJB 之类的远程 API。业务委托还处理在
    EJB 方法调用期间引发的异常。它通常将这些异常转换为特定于应用程序的运行时异常。


    业务委托的另一个关键职责是为页面控制器提供一致的 API。为了实现这个目标，它将应用“面向接口编程 (P2I)”这一对象设计最佳实践。清单 10-12 展示了业务委托接口。


