    **结论**


    **优点**


    • 现在可以在编译阶段捕获远程接口与 Bean 实现之间的差异。


    • 业务接口的实现确保了一致性。


    • 由于页面控制器使用代理业务接口实现，因此消除了与业务委托相关的代码或层冗余。


    • 由于现在通过实现简单 Java 接口的代理对象来调用 EJB，因此可以轻松移除 EJB 依赖，并将应用程序部署到像 Apache Tomcat 这样的
    Web 服务器中。


    **关注点**


    • 业务接口无法在本地和远程无状态会话 Bean 之间复用。


    • 它增加了你为 EJB 维护的类数量。


    • 由于现在通过代理的反射机制调用 EJB 方法，因此增加了性能开销。


    **总结**


    在本章中，你探索了结合 Spring 和 EJB（具体来说是无状态会话 Bean）构建灵活业务层的不同方法。服务定位器和业务委托模式是作为远程对象暴露的业务逻辑的客户端扩展。会话外观模式为业务逻辑提供了粗粒度的访问，并使其能够访问容器提供的强大基础设施支持。应用服务模式描述了一种简单而灵活的机制，用于将业务逻辑封装在
    POJO 组件中。业务接口模式允许对暴露的业务方法进行编译时检查，并减少对业务委托的依赖。


