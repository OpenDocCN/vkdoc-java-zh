    \        <url-pattern>/remoting/*</url-pattern>\n    </servlet-mapping>\n\n  \
    \  <welcome-file-list>\n        <welcome-file>WEB-INF/jsp/index.jsp</welcome-file>\n\
    \    </welcome-file-list>\n\n    <jsp-config>\n        <taglib>\n            <taglib-uri>/spring</taglib-uri>\n\
    \            <taglib-location>\n                /WEB-INF/tld/spring-form.tld\n\
    \            </taglib-location>\n        </taglib>\n        <taglib>\n       \
    \     <taglib-uri>sitemesh-page</taglib-uri>\n            <taglib-location>\n\
    \                /WEB-INF/tld/sitemesh-page.tld\n            </taglib-location>\n\
    \        </taglib>\n        <taglib>\n            <taglib-uri>sitemesh-decorator</taglib-uri>\n\
    \            <taglib-location>\n                /WEB-INF/tld/sitemesh-decorator.tld\n\
    \            </taglib-location>\n        </taglib>\n    </jsp-config>\n\n</web-app>\n\
    ```\n\nThe next step is the most important because we export the POJO-based policy\
    \ quotation service as a `Burlap` remote service. Again, this can be done with\
    \ mere configuration, as in Listing 5-39. In this case, the `BurlapServiceExporter`\
    \ acts as the service endpoint.\n\n**Listing 5-39.** `insurance-servlet.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
