    Spring 框架、JBoss SEAM、OSGi、重构与预重构、富互联网应用、Scrum 和 XP。他目前就职于 Capgemini Consulting，帮助项目团队为电信、媒体和娱乐领域的领先供应商进行
    Java EE 项目的架构、设计与开发。在加入 Capgemini 之前，Dhrubojyoti 曾任职于 TATA Consultancy Services、Oracle
