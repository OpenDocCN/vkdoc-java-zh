    **53**


    **图 3-2.** *操作处理工作流*


    如图 3-2 所示，前端控制器与操作处理器交互，操作处理器随后调用页面控制器。图 3-3 中的类图展示了构成 Spring MVC 操作处理器组件的各种类和接口。


    **图 3-3.** *操作处理器类图*


    10092ch03.qxd 7/24/08 5:08 PM 第 54 页


    **54**


    第 3 章 **■** 探索表示层设计模式


    `HandlerMapping`接口是整个操作处理器组件的关键。在拦截到请求时，调度 Servlet 会查找适当的处理器映射对象，以在请求和请求处理对象之间建立映射。换句话说，处理器映射提供了一种抽象方式，将请求
    URL 映射到最终的处理器或页面控制器。


    顾名思义，`AbstractHandlerMapping`是一个抽象的处理器映射实现。它实现了`HandlerMapping`接口的`getHandler`方法。该方法返回一个`HandlerExecutionChain`，其中包含对以下内容的引用：


    •   实现了`Controller`接口或`ThrowawayController`接口的单个页面控制器实现

    •   一个可选的、实现了`HandlerInterceptor`接口的拦截器集合


    `BeanNameUrlHandlerMapping`和`SimpleUrlHandlerMapping`提供了`HandlerMapping`接口的两个具体实现，足以满足大多数情况。`BeanNameUrlHandlerMapping`是前端控制器使用的默认处理器映射。如果你的应用程序只需要这个处理器映射，那么无需进行任何配置。在某些情况下，你的应用程序可能需要多个处理器映射。正如我将在后面章节中展示的，Spring
    MVC 允许多个处理器映射协同工作。在这种情况下，前端控制器必须决定处理器映射被调用的顺序。处理器映射实现了`Ordered`接口，允许前端控制器决定处理器映射链中的正确顺序。具有最低`order`值的处理器映射拥有最高优先级。


    处理器映射仅持有页面控制器的引用。它不会调用其上的任何方法。处理器适配器负责调用页面控制器上的方法。所有处理器适配器都实现了`HandlerAdapter`接口。顾名思义，处理器适配器遵循
    GOF 适配器设计模式，并且最了解如何调用适当的页面控制器。这开启了另一个 Spring 扩展点，并允许轻松集成来自其他框架（如 WebWork 或 Struts
    Action 类）的页面控制器。应实现`handle`方法来调用页面控制器上的方法。这正是具体实现类`SimpleControllerHandlerAdapter`所做的。它能够调用实现了`Controller`接口的页面控制器。换句话说，它知道如何调用`handleRequest`方法并处理返回值。


    `HandlerExecutionChain`还包含一个可选的拦截器集合。这些拦截器提供了一种健壮的机制，用于在页面控制器处理请求之前和之后进行声明式处理。图
    3-4 中的时序图是图 3-1 的扩展，展示了 Spring MVC 应用程序控制器组件中操作处理器部分内的完整消息交换。


