    审计追踪是 Java EE 应用中另一个广泛使用但常被忽视的关注点。借助基于 Spring AOP 的拦截器支持，可以部署一个健壮、非侵入式且声明式的审计追踪系统。尽管
    EJB 容器提供了全面的事务支持，但这是有代价的。你的代码库无法在 EJB 容器之外运行，从而严重限制了可移植性。而借助基于 Spring AOP 的声明式事务支持，领域服务对象几乎可以无缝地在
    EJB 容器、Web 容器和独立组件中运行。


