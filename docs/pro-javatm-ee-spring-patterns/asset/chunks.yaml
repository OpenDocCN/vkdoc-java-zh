    清单 3-3 中值得关注的部分是 URL 映射。它表明该 Servlet 已被配置为处理所有以`.do`结尾的 URL 请求。如果您是一位经验丰富的 Java
    EE 开发者，并且曾使用过 Apache Struts 框架，您会立刻发现它与 ActionServlet 的相似之处。


    在初始化时，`DispatcherServlet`会在 Web 应用程序的`WEB-INF`文件夹中查找一个遵循命名规范`<servlet-name>-servlet.xml`的配置文件。这个
    XML 文件包含了所有 Bean 的配置信息，包括将由 Spring IOC 容器管理的页面控制器和视图管理器。前端控制器加载此文件以启动 Spring Web
    应用程序上下文，并获取对 Spring IOC 容器的访问权限。在我们的案例中，该文件将被命名为`insurance-servlet.xml`。


