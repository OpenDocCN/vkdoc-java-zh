- fmt: '# This Book’s Structure


    This book is structured in a very simple way. `Chapter 1` starts with an introduction
    to the fundamental concepts in enterprise application architecture. It analyzes
    various architectural styles in distributed computing, and it introduces `UML`
    as the tool for the visual representation of application design.


    `Chapter 2` introduces the `Spring Framework` and its role in building enterprise
    Java applications. This chapter also highlights the design pattern template that
    will be used in the next four chapters. `Chapter 3` explains the design problems
    in the presentation tier and presents solutions with the `Spring MVC` framework.
    `Chapter 4` elaborates on the business tier design patterns. This chapter also
    shows `Spring`’s support for simplifying `EJB` development.


    `Chapter 5` deals with the integration tier design patterns. `Chapter 6` takes
    a look into the often-overlooked areas of security and transaction design strategies.
    Finally, in `Chapter 7`, all the concepts presented in earlier chapters are used
    to develop an order management system.


    ## Prerequisites


    This book assumes you are familiar with the `Java EE` design patterns, the `Spring
    Framework`, and the `Eclipse IDE`.


    ## Downloading the Code


    The source code for this book is available to readers at [http://www.apress.com](http://www.apress.com)
    in the downloads section of this book’s home page. Please feel free to visit the
    Apress website and download all the code there. You can also check for errata
    and find related titles from Apress.


    ## Contacting the Authors


    Feel free to contact the author at [dhrubo.kayal@gmail.com](mailto:dhrubo.kayal@gmail.com).


    # CHAPTER 1


    # Introducing Enterprise Java Application Architecture and Design


    For a long time, `Java Enterprise Edition (Java EE)` has been the platform of
    choice across industries (banking, insurance, retail, hospitality, travel, and
    telecom, to name a few) for developing and deploying enterprise business applications.
    This is because `Java EE` provides a standard-based platform to build robust and
    highly scalable distributed applications that support everything from core banking
    operations to airline booking engines.


    However, developing successful `Java EE` applications can be a difficult task.
    The rich set of choices provided by the `Java EE` platform is daunting at first.
    The plethora of frameworks, utility libraries, integrated development environments
    (`IDEs`), and tool options make it all the more challenging. Hence, selecting
    appropriate technology is critical when developing `Java EE`–based software. These
    choices, backed by sound architectural and design principles, go a long way in
    building applications that are easy to maintain, reuse, and extend.


    This chapter takes a tour of the fundamental aspects of `Java EE` application
    architecture and design. They form the foundation on which the entire application
    is developed.


    The journey starts with a review of the evolution of distributed computing and
    `n-tier` application architecture. I will then show how the `Java EE` platform
    architecture addresses the difficulties in developing distributed applications.
    You will also learn about the `Model-View-Controller (MVC)` architectural principle.
    I’ll then combine `MVC` principles with the `Java EE` platform to derive multitier
    `Java EE` application architecture.


    With application architecture in place, I will focus on `Java EE` application
    design based on object-oriented principles. I will also explain the use of design
    patterns to simplify application design and the adoption of best practices. I’ll
    also touch on the `Java EE` design pattern catalog as documented by Sun’s `Java
    BluePrints` and subsequently elaborated on in the book *Core J2EE Design Pattern*
    by Deepak Alur et al (Prentice Hall, 2003).


    I’ll end the chapter with an introduction to `Unified Modeling Language (UML)`
    and its role in visually documenting `Java EE` design and architecture.'
