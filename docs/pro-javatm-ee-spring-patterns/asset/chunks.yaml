- fmt: '# The Access Decision Manager


    The access decision manager supplies each voter with the `Authentication` object
    and the `objectDefinitionSource` to make their decisions. The `RoleVoter` scans
    through the list of URL pattern to role mappings. For the matched URL, it will
    check the roles. It will vote if it finds a role starting with the prefix `ROLE`.
    You can alter this value by setting the `rolePrefix` property. If it finds a matching
    role, it votes `ACCESS_GRANTED`; otherwise, it votes `ACCESS_DENIED`. The `AuthenticatedVoter`
    will vote if it finds a predefined role in any of the matched URL to role mapping.
    One such predefined value is `IS_AUTHENTICATED_ANONYMOUSLY`. It will probe the
    `Authentication` object to determine whether the user has been authenticated anonymously.
    A positive finding will result in `ACCESS_GRANTED` being voted.


    ## Consequences


    ### Benefits


    - Spring Security can be enabled and altered by mere configuration.

    - Only users with valid identities are allowed access to the system.

    - Spring Security does not intrude into the application code. In fact, it can
    be applied without the application code having any knowledge about it.

    - Authenticated users can access only a subset of the application resources based
    on their roles.


    ### Concerns


    - You need to know about a lot of classes, interfaces, and above all configuration
    items. This adds to the development and maintenance overhead.


    ## Audit Interceptor


    ### Problem


    The auditing of business tier method invocation is a common requirement in most
    enterprise applications. This involves tracing the input arguments as well as
    the return values. The audit trail information can be later utilized for analysis
    in the case of any security lapses. Because this data may be needed for future
    reference, it is stored in a permanent store such as a filesystem or database.
    The audit trailing feature is applied at the business tier because it is the gateway
    to the business logic and can be accessed by a variety of clients.


    Since eInsure handled sensitive financial data, it too implemented an audit trail
    feature. This was used in the SLSBs. The audit trail API saved the method arguments
    and returned results in the database. This was also inflexible and mixed the business
    logic with the security concerns. This coupling led to frequent code changes as
    eInsure tried to fit in a customer-specific audit trail requirement. The SLSB
    in the eInsure application internally invoked multiple other session bean methods,
    each of which also used the audit trail API. Since the audit data was saved in
    the database, it increased the transactional overhead and degraded response time.


    The eInsure audit trail API was hardly configurable. As a result, it was difficult
    to switch on/off the audit trailing as and when required. It also did not allow
    the flexibility to filter what was being logged. For example, in certain cases
    you may not be interested to log only the values being passed to a method as arguments
    and not the value returned by the method. Also, you may not want to log all the
    values in the returned object. The eInsure audit trail also required that the
    incoming and outgoing objects must implement the `toString` method. Though this
    is a good practice, it often clutters code with long lines of calls to `StringBuffer.append`
    or those using String concatenation.


    ### Forces


    - Apply the audit trailing transparently on the business service.

    - The audit trailing must be configurable.

    - Allow an audit trace of requests, responses, and exceptions raised from a service.


    ### Solution


    Implement a centralized *audit interceptor* that can be declaratively used to
    apply the auditing of the business service invocations.


    ## Strategies with the Spring Framework'
