    访问决策管理器为每个投票者提供`Authentication`对象和`objectDefinitionSource`，以便他们做出决策。`RoleVoter`会扫描
    URL 模式与角色映射的列表。对于匹配的 URL，它将检查角色。如果找到以`ROLE`前缀开头的角色，它就会投票。你可以通过设置`rolePrefix`属性来更改此值。如果找到匹配的角色，则投`ACCESS_GRANTED`；否则，投`ACCESS_DENIED`。`AuthenticatedVoter`会在任何匹配的
    URL 到角色映射中找到预定义角色时进行投票。其中一个预定义值是`IS_AUTHENTICATED_ANONYMOUSLY`。它将探查`Authentication`对象，以确定用户是否已匿名认证。如果发现为肯定结果，则投`ACCESS_GRANTED`。


    **影响**


    优势


    • 仅通过配置即可启用和修改 Spring Security。


    • 只有拥有有效身份的用户才被允许访问系统。


