    eInsure 有一个登录页面，其界面简洁，用于接收用户名和密码。该页面还包含一个按钮控件，点击后会触发身份验证操作。因此，该登录页面的呈现无需调用任何业务逻辑。系统中还有许多类似页面。例如，有几个页面用于显示输入条件，这些条件可在触发保单、理赔等搜索之前提供。此外，我们还有用于查询系统中各种代码的查找页面。所有用于查找的值都在启动时从数据库加载并缓存在服务器上。之所以能做到这一点，是因为这些静态数据在应用程序运行期间从未改变。同时，加载用于创建保单或理赔的
    UI 页面所需的操作，仅需使用会话中缓存的用户信息。最后但同样重要的是，几乎每个页面都有一个打开帮助页面的链接。这些基于静态 HTML 的帮助页面提供了上下文相关的帮助，指导用户如何使用该特定页面中的不同功能（按钮、菜单、文本框等）。


    10092ch03.qxd 7/24/08 5:08 PM 第 124 页


    **124**


    第 3 章 **■** 探索表示层设计模式


    所有这些情况都不需要调用业务逻辑。尽管这些都是简单的场景，但我们基于 JSP 前端控制器的应用程序却无法以简单的方式处理这些情况。不同的开发人员创建了这些页面，并随意添加了
    if-else 块来处理各自的情况。最简单的方法是直接处理这些静态内容的请求，绕过页面控制器。但这会破坏应用程序整体统一的结构。此外，保护这些资源以防止未经授权的访问（例如直接在浏览器地址栏中输入
    URL）可能也很有用。


    **驱动因素**


    • 应用程序包含大量无需业务逻辑处理的静态视图。


    • 半静态视图基于缓存数据呈现。


    • 纯静态视图和半静态视图需要像其他动态视图一样得到一致的处理。


    **解决方案**


    使用*调度视图*来处理静态或半静态视图的呈现。


    Spring 框架中的策略


    调度视图实际上是结合其他表示层模式的最佳实践。它利用调度器将任务委托给视图。在这种情况下，调度器是控制器和视图解析器的组合。


    对于静态视图和半静态视图，此模式可以有两种变体。半静态视图使用缓存数据，因此需要视图助手的支持。我将从纯静态资源开始。图 3-17 展示了调度视图模式的静态结构。


    ![Image 39](img/index-147_1.png)


    10092ch03.qxd 7/24/08 5:08 PM 第 125 页


    第 3 章 **■** 探索表示层设计模式


    **125**


    **图 3-17.** *调度视图类图*


    除了 `UrlFilenameViewController` 之外，您之前已经见过大部分类和接口。这是一个具体的控制器实现，它将请求的 URL 路径转换为逻辑视图名称。例如，对
    `/PolicyCreateHelp.do` 的请求将被转换为视图名称 `PolicyCreateHelp`。然后，`InternalResourceViewResolver`
    会获取此视图名称，并将其解析为实际资源——`PolicyCreateHelp.jsp`。使用此控制器只需进行配置，如清单 3-57 所示。


    作为实现此模式的第一步，我们在 `/WEB-INF/jsp/help` 文件夹中创建 `PolicyCreateHelp.jsp` 文件。不建议使用静态 HTML
    文件来提供帮助内容。这是因为将来可能需要支持国际化的帮助。此外，可以使用 FreeMarker 或 Velocity 模板将实际内容与 JSP 分离，从而便于维护和修改。使用调度视图的最后一步是设置
    Spring 配置文件，如清单 3-57 所示。

