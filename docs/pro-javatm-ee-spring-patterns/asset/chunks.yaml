  trans: "\n第 3 章 **■** 探索表示层设计模式\n\n<bean name=\"/saveNewPolicy.do\"\n     class=\"\
    com.apress.insurance.web.controller.SaveNewPolicyController\" >\n    <property\
    \ name=\"uwrBusinessDelegate\"\n              ref=\"underwritingBusinessDelegate\"\
    \ />\n</bean>\n\n<bean name=\"underwritingBusinessDelegate\"\n     class=\"com.apress.insurance.view.delegate.UnderWritingBusinessDelegate\"\
    \ />\n</beans>\n\n呈现给终端用户浏览器用于创建保单的网页不需要任何动态数据。因此，我配置了一个`UrlFilenameViewController`对象来处理此请求。它会将\
    \ URL 中的资源名称转换为逻辑视图名称。\n\n因此，对`createPolicy.do`的请求将产生一个符号视图名称：`createPolicy`。带有通配符映射的`SimpleUrlHandlerMapping`会解析任何以`create`开头的请求（例如`createPolicy.do`），并调用`UrlFilenameViewController`，后者返回逻辑视图名称。最后，前端控制器调用视图解析器，将逻辑视图名称解析为物理资源`/WEB-INF/jsp/createPolicy.jsp`。\n\
    \n在`createPolicy.jsp`（清单 3-20）中，当用户点击“保存”按钮时，会向服务器发送一个请求，请求资源`saveNewPolicy.do`。现在，清单\
    \ 3-23 中配置了一个处理器映射链。优先级更高的`BeanNameUrlHandlerMapping`能够解析此 URL 并调用`SaveNewPolicyController`。该控制器返回的逻辑视图名称最终被解析为资源`showPolicydetails.jsp`。\n\
    \n**使用 SimpleFormController**\n\n典型的 Web 应用程序涉及显示表单以收集用户输入。用户填写此表单并将数据提交到 Web\
    \ 服务器进行进一步处理。\n\n`SimpleFormController`被广泛用于提供页面控制器实现，因为它协调和管理表单生命周期中两个最重要的方面——视图和提交。与许多其他\
    \ Spring MVC 类一样，该类也实现了模板设计模式，在工作流的适当点上是封闭修改但开放扩展的。工作流也可以通过设置各种可配置属性来改变。\n\n**表单显示**\n\
    \n我将首先查看`SimpleFormController`类提供的表单显示功能。\n\n图 3-10 展示了此功能的工作流程。\n\n![图 32](img/index-101_1.png)\n\
    \n10092ch03.qxd 2008 年 7 月 24 日 下午 5:08 第 79 页\n\n第 3 章 **■** 探索表示层设计模式\n\n**79**\n\
    \n**图 3-10.** *SimpleFormController 中的表单显示工作流程*\n这是一个过于简化的工作流程，因为我只想关注感兴趣的领域。\n\
    \n你可以在《Expert Spring MVC and Web Flow》（Apress，2006 年）一书中找到详细的工作流程和解释。如图 3-11 所示，Web\
    \ 浏览器对资源的请求最终被委托给页面控制器。`SimpleFormController`检测到请求是通过 HTTP GET 方式到达的，因此这不是表单提交，而是表单显示请求。它创建一个表单\
    \ bean 的实例，并使表单准备好显示。\n\n现在，我将以之前讨论的`AbstractCommandController`示例为例，尝试用`SimpleFormController`来实现它，因为后者提供了更大的灵活性。\n\
    \n作为第一步，我将简化 JSP，如清单 3-24 所示。请注意，不再使用 JavaScript 来提交表单。还要注意，表单的`action`属性没有指定值。这消除了与特定操作\
    \ URL 的任何耦合。除了这两处更改外，JSP 与清单 3-20 中呈现的相同。\n\n**清单 3-24.** WEB-INF/jsp/createPolicy.jsp\n\
    \n<html>\n<head>\n    <title>核保</title>\n</head>\n<form action=\"\" method=\"\
    POST\">\n\n10092ch03.qxd 2008 年 7 月 24 日 下午 5:08 第 80 页\n\n**80**\n\n第 3 章 **■**\
