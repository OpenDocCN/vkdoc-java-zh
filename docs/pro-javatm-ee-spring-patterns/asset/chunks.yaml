    \ This is useful in reducing concrete implementations of page controllers for\
    \ a large application. Spring MVC can determine which method to invoke using a\
    \ class called `MethodNameResolver`. This class can determine the method name\
    \ from a parameter set in the `HttpServletRequest`. |\n| `AbstractWizardFormController`\
    \ | Some use cases in an application are best handled by presenting multiple pages,\
