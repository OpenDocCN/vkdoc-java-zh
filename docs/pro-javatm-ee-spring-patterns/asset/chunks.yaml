    ## EJB 3 查找


    使用 EJB 3，您可以通过 Java EE 标准注解将 POJO 转变为会话 Bean。您不再需要处理 Home 接口和 XML 部署描述符。这些都极大地简化了
    EJB 开发。然而，EJB 3 的变化并未改变 Spring 服务定位器的工作方式。您仍然可以通过配置使用 `JndiObjectFactoryBean`
    作为服务定位器。如清单 4-6 所示，它用于查找两个不同的会话 Bean。


    **清单 4-6.** `insurance-servlet.xml`：EJB 3 查找


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>

    <beans

    xsi:schemaLocation="http://www.springframework.org/schema/beans http://www.springframework.org/schema/beans/spring-beans-2.5.xsd"

    >

    <!-- Other beans -->

    <!-- Remote EJB 3 SLSB -->

    <bean id="uwrRemoteService"

    class="org.springframework.jndi.JndiObjectFactoryBean">

    <property name="jndiName" value="UwrRemoteServiceBean/Remote" />

    <property name="jndiEnvironment">

    <props>

    <prop key="java.naming.factory.initial">

    org.jnp.interfaces.NamingContextFactory

    </prop>

    <prop key="java.naming.provider.url"> jnp://localhost:1099</prop>

    <prop key=" java.naming.factory.url.pkgs">org.jboss.naming.client</prop>

    </props>

    </property>

    </bean>

    <!-- Local EJB 3 SLSB -->

    <bean id="uwrLocalService"

    class="org.springframework.jndi.JndiObjectFactoryBean">

    <property name="jndiName" value=" UwrLocalServiceBean/Local " />

    </bean>

    </beans>

    ```


    ## JMS 对象的查找


    服务定位器不仅限于 EJB 组件；它可用于任何 JNDI 绑定的对象，例如 JMS 队列和主题或 JDBC 数据源。它也可以与 Web 服务一起使用。


    清单 4-7 查找了在 JBoss 中配置的本地 JMS 队列和主题。该清单还展示了在访问 JNDI 绑定对象时使用资源引用的两种方式。一种方式是在 `jndiName`
    属性中直接添加前缀；另一种方式是启用 `resourceRef` 属性，该属性会自动将字符串 `java:comp/env/` 添加到 JNDI 名称之前。


    **清单 4-7.** `insurance-servlet.xml`


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>

    <beans

    xsi:schemaLocation="http://www.springframework.org/schema/beans http://www.springframework.org/schema/beans/spring-beans-2.5.xsd">

    <!-- Other beans -->

    <bean id="testTopic"

    class="org.springframework.jndi.JndiObjectFactoryBean">

    <property name="jndiName" value="topic/testTopic" />

    </bean>

    <bean id="testQueue"

    class="org.springframework.jndi.JndiObjectFactoryBean">

    <property name="jndiName" value="queue/testQueue" />

    </bean>

    <bean id="resourceRefOnQueue"

    class="org.springframework.jndi.JndiObjectFactoryBean">

    <property name="jndiName" value="queue/resourceRefOnQueue" />

    <property name="resourceRef" value="true" />

    </bean>

    <bean id="sampleQueue"

    class="org.springframework.jndi.JndiObjectFactoryBean">

    <property name="jndiName" value="java:comp/env/topic/resourceRefOnQueue"

    </bean>

    />

    </beans>

    ```


    如清单 4-7 所示，您可以使用 `JndiObjectFactoryBean` 从 JNDI 查找 JMS 对象。对于远程 JMS 对象，您只需像清单 4-3
    中的 EJB 会话 Bean 一样添加 `jndiEnvironment` 属性即可。'
