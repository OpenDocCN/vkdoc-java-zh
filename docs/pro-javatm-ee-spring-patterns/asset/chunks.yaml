    To execute this modified workflow, I will need to map the request parameters to
    the form bean in some component. You already know that the most appropriate component
    for this is the handler adapter. Listing 3-40 shows the handler adapter that executes
    the `SimpleFormThrowawayController` controllers.


    **Listing 3-40.** `SimpleFormThrowawayControllerHandlerAdapter.java`


    ```

    package com.apress.insurance.web.handleradpter.api;


    public class SimpleFormThrowawayControllerHandlerAdapter


    extends ThrowawayControllerHandlerAdapter {


    public boolean supports(Object handler) {


    return (handler instanceof SimpleFormThrowawayController);


    }


    public ModelAndView handle(HttpServletRequest req, HttpServletResponse res, Object
    command) throws Exception {


    SimpleFormThrowawayController throwaway = (SimpleFormThrowawayController) command;


    Object formBean = throwaway.getFormbeanClass().newInstance();


    ServletRequestDataBinder binder = createBinder(req, formBean);


    binder.bind(req);


    binder.closeNoCatch();


    return throwaway.execute(formBean);


    }


    protected ServletRequestDataBinder createBinder(


    HttpServletRequest request, Object formbean) throws Exception {


    ServletRequestDataBinder binder = new ServletRequestDataBinder(formbean, getCommandName());


    initBinder(request, binder);


    return binder;


    }


    }

    ```


    Note that the `createBinder` method is responsible for binding the HTTP parameter
    values to the properties of the form bean. The handler adapter takes care of all
    the protocol-specific details. Finally, I will wire up everything in the Spring
    configuration file.


    Since this handler adapter is not a default one, I will need to explicitly declare
    it as part of the configuration information. Because I am using handler adapter
    chaining, the default handler adapter also has to be explicitly configured. Listing
    3-41 shows all of this.


    **Listing 3-41.** `insurance-servlet.xml`


    ```

    <?xml version="1.0" encoding="UTF-8"?>


    <beans


    xsi:schemaLocation="http://www.springframework.org/schema/beans


    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd">


    <bean name="throwawayHandlerAdapter"


    class="com.apress.insurance.web.handleradpter.api.SimpleFormThrowawayControllerHandlerAdapter"
    />


    <bean name="simpleControllerHandlerAdapter"


    class="org.springframework.web.servlet.mvc.SimpleControllerHandlerAdapter" />


    <bean name="viewResolver"


    class="org.springframework.web.servlet.view.InternalResourceViewResolver">


    <property name="viewClass"


    value="org.springframework.web.servlet.view.JstlView" />


    <property name="prefix" value="/WEB-INF/jsp/" />


    <property name="suffix" value=".jsp" />


    </bean>


    <bean name="/createClaim.do"


    class="com.apress.insurance.web.controller.DisplayNewClaimController" />


    <bean name="/saveClaim.do"


    class="com.apress.insurance.web.controller.SaveClaimController" />


    <bean name="underwritingBusinessDelegate"


    class="com.apress.insurance.view.delegate.UnderWritingBusinessDelegate" />


    </beans>

    ```


    In the previous few sections, I have tried to alter and extend the workflow of
