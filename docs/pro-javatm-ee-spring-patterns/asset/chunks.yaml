    **248**


    第 6 章 **■** 探索横切设计模式


    • Spring Security 不会侵入应用程序代码。事实上，即使应用程序代码对此一无所知，也可以应用它。


    • 经过身份验证的用户只能根据其角色访问应用程序资源的子集。


    关注点


    • 你需要了解大量的类、接口，尤其是配置项。这增加了开发和维护的开销。


    **审计拦截器**


    **问题**


    在大多数企业应用程序中，审计业务层方法调用是一个常见需求。这涉及跟踪输入参数以及返回值。


    审计跟踪信息日后可用于分析任何安全漏洞。由于这些数据可能用于将来参考，因此会存储在永久性存储中，例如文件系统或数据库。审计跟踪功能应用于业务层，因为它是业务逻辑的门户，并且可以被各种客户端访问。


    由于 eInsure 处理敏感的财务数据，它也实现了审计跟踪功能。该功能用于 SLSB 中。审计跟踪 API 将方法参数和返回结果保存到数据库中。这同样缺乏灵活性，并将业务逻辑与安全问题混为一谈。这种耦合导致
    eInsure 在尝试满足客户特定的审计跟踪需求时频繁更改代码。eInsure 应用程序中的 SLSB 内部调用了多个其他会话 Bean 方法，每个方法也都使用了审计跟踪
    API。由于审计数据保存在数据库中，这增加了事务开销并降低了响应时间。


    eInsure 的审计跟踪 API 几乎不可配置。因此，很难根据需要随时开启/关闭审计跟踪。它也不允许灵活地过滤被记录的内容。例如，在某些情况下，你可能只对记录作为参数传递给方法的值感兴趣，而对方法返回的值不感兴趣。此外，你可能不想记录返回对象中的所有值。eInsure
    的审计跟踪还要求传入和传出的对象必须实现`toString`方法。虽然这是一个好习惯，但它常常会使代码充斥着冗长的`StringBuffer.append`调用或使用字符串拼接的代码行。


    10092ch06.qxd 7/29/08 10:30 AM 第 249 页


    第 6 章 **■** 探索横切设计模式


    **249**


    **驱动力**


    • 透明地将审计跟踪应用于业务服务。


    • 审计跟踪必须是可配置的。


    • 允许对来自服务的请求、响应和引发的异常进行审计跟踪。


    **解决方案**


    实现一个集中的*审计拦截器*，可以声明式地用于对业务服务调用进行审计。


    Spring 框架的策略

    '
- fmt: "您可以使用 Spring AOP 支持轻松开发审计拦截器。通过 AOP，您可以将审计跟踪组件构建为独立的可重用组件，然后通过配置透明地应用它。由于审计拦截器需要支持方法的前置和后置处理以及异常处理，构建拦截器的第一步是开发一个*通知*。通知表示一段可重用的代码，可以透明地应用于实际的应用程序代码。由于\
    \ SLSB 是容器管理的组件，我将把拦截器应用于应用程序服务 POJO。\n\n清单 6-17 展示了审计拦截器通知。\n\n**清单 6-17.** `AuditAdviseInterceptor.java`\n\
    \n```java\npublic class AuditAdviseInterceptor implements MethodInterceptor {\n\
    \n    private AuditRules rules;\n\n    private boolean auditOn = true;\n\n   \
    \ private AuditLog auditLog;\n\n    public Object invoke(MethodInvocation invocation)\
    \ throws Throwable {\n\n        Object returnVal = null;\n\n        String eventCode\
    \ = \"\";\n\n        Object arguments[] = null;\n\n        try {\n\n         \
    \   returnVal = invocation.proceed();\n\n        } catch (Exception exp) {\n\n\
    \            //handle exception\n\n            throw e;\n\n        } finally {\n\
    \n            //post process\n\n            if (this.auditOn) {\n\n          \
    \      eventCode = getEventCode();\n\n                arguments = invocation.getArguments();\n\
    \n                AuditRule rule = rules.getRule(eventCode);\n\n             \
    \   if(rule!=null && rule.isApplyRule()){\n\n                    String thisMethod\
    \ = invocation.getMethod().getName();\n\n                    if(thisMethod.equals(rule.getRuleDefinition())){\n\
    \n                        AuditEvent ae = new AuditEvent(eventCode,arguments,\n\
    \n                                results,exp);\n\n                        auditLog.log(ae);\n\
    \n                    }\n\n                }\n\n            }\n\n        }\n\n\
    \        return returnVal;\n\n    }\n\n    private String getEventCode() {\n\n\
    \        String eventCode = \"\";\n\n        StackTraceElement[] stack = Thread.currentThread().getStackTrace();\
    \ eventCode = stack[7].getMethodName();\n\n        return eventCode;\n\n    }\n\
    \n    public AuditRules getRules() {\n\n        return rules;\n\n    }\n\n   \
    \ public void setRules(AuditRules rules) {\n\n        this.rules = rules;\n\n\
    \    }\n\n    public boolean isAuditOn() {\n\n        return auditOn;\n\n    }\n\
    \n    public void setAuditOn(boolean auditOn) {\n\n        this.auditOn = auditOn;\n\
    \n    }\n\n}\n```\n\n这个类做了很多事情。该类实现了 Spring AOP 类 `MethodInterceptor` 以提供环绕通知。关键在于\
    \ `invoke` 方法。该方法在您想要审计的目标业务方法调用之前和之后被调用。审计跟踪操作发生在 `finally` 块中。属性 `auditOn` 可用于全局停止审计跟踪。\n\
    \n如果审计跟踪标志设置为 `true`，则 `invoke` 方法会确定一个事件代码。这里，为简单起见，我假设粗粒度的会话外观方法名称作为事件代码。此事件代码应唯一，并用于从审计规则列表中查找审计规则。如果为此事件代码找到了审计规则并且该规则未被禁用，则会检查规则定义以确定它是否适用于当前的应用程序服务方法。最后，审计事件中的数据由审计记录器跟踪。清单\
    \ 6-18 展示了如何在 Spring 配置中装配这个类。\n\n**清单 6-18.** `audit-config.xml`\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n        xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n        http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
    >\n\n    <!--advice -->\n    <bean name=\"auditAdvice\"\n          class=\"com.apress.einsure.security.audit.AuditAdviseInterceptor\"\
