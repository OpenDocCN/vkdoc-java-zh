    ## Setting Up the Projects


    The first project that I will show how to set up is the simplest one. This project
    contains the JavaBeans that will be used to transfer data across layers and then
    across tiers. Here are the step-by-step instructions for creating this project:


    1. Create a new project by selecting **File** ➤ **New** ➤ **Project** in `ezJEE`.
    This displays the New Project Wizard, as shown in Figure 7-8.


    **Figure 7-8.** *Starting the New Project Wizard*


    ![Image 65](index-305_1.png)


    2. In the New Project Wizard, select **Maven Project**, and click **Next** to
    move to the Select Project Name and Location screen. On this screen, do not make
    any changes. Just click **Next** to move to the Select An Archetype screen, as
    shown in Figure 7-9.


    **Figure 7-9.** *Archetype selection*


    ![Image 66](index-306_1.jpg)


    3. Select `maven-archetype-quickstart`, and click **Next**. This will take you
    to the screen where you can specify the archetype parameters, as shown in Figure
    7-10.


    **Figure 7-10.** *Specifying archetype parameters*


    4. Enter the values shown in Figure 7-10, and click **Finish**.


    With these four steps you have created a Maven-based Java project in Blazon `ezJEE`.


    You will need to repeat these four steps to set up a few other Maven 2 projects,
    as listed in Table 7-2.


    **Table 7-2.** *Maven 2 Java Project Setup*


    | Project Name | Description | Package Name |

    |---|---|---|

    | `OMSJavabean` | Contains the JavaBean classes used as data container | `com.apress.oms.javabean`
    |

    | `OMSBusinessAPI` | Contains the business service interfaces | `com.apress.oms.business.api`
    |

    | `OMSBusinessImpl` | Contains the actual business logic implementations | `com.apress.oms.business.impl`
    |

    | `OMSPersistence` | Contains the data access objects | `com.apress.oms.persistence`
    |

    | `OMSBusinessRemote` | Contains the components required to export the business
    services as remote objects | `com.apress.oms.remoting` |

    | `OMSWeb` | Contains the presentation controller | `com.apress.oms.web.controller`
    |


    The last two projects in Table 7-2 should be created as Maven 2 web projects.
    The steps to create these projects are the same except the archetype selection.
    To set up web projects with Maven, you will need to select `maven-archetype-webapp`
    on the Select an Archetype screen.


    ## Adding Dependencies


    So far, all the Maven projects have been set up independently. But in order for
    these projects to compile and produce the final build, you will need to add dependencies
    amongst projects as well other frameworks. Table 7-3 lists the dependencies.


    **Table 7-3.** *Maven 2 Project Dependencies*


    | Project | Dependency |

    |---|---|

    | `OMSJavabean` | None |

    | `OMSBusinessAPI` | `OMSJavabean` |

    | `OMSBusinessImpl` | `OMSBusinessAPI`, `OMSJavabean` |

    | `OMSBusinessRemote` | `OMSBusinessAPI`, `OMSBusinessImpl`, `OMSJavabean`, Spring
    Framework |

    | `OMSPersistence` | `OMSJavabean`, Spring Framework |

    | `OMSWeb` | |'
