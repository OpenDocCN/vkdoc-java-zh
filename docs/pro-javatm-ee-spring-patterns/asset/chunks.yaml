  trans: '

    会话外观的远程接口定义了客户端可访问的业务方法。而 Bean 类则提供了这些业务方法的实现。然而，两者之间并没有直接关系。这会导致在运行时或部署时出现令人烦恼的错误，例如方法缺失、方法名称不一致、参数类型和数量不匹配以及异常。由于这些错误通常只在运行时才能被检测到，你可能会在“调试-修复-部署-测试”的循环中浪费大量精力。因此，远程接口与
    Bean 实现的这种解耦，使得在编译时早期捕获错误变得不可能。


    解决此问题的最简单方法是允许 Bean 类实现远程或本地接口。然而，EJB 规范并不允许这样做。虽然不常见，但有时会话 Bean 方法可能需要将其引用传递给被调用的方法。这在
    Java 编程中很常见，你会传递`this`引用。但在 EJB 中情况有所不同。EJB 客户端应始终使用远程接口来调用业务方法。这有助于 EJB 容器拦截所有业务方法调用，并为这些方法注册以应用安全性和事务等系统服务。现在，由于
    Bean 类没有实现远程接口，你被迫从`SessionContext`获取关联的`EJBObject`/`EJBLocalObject`，并将其传递给被调用的方法。如果
    Bean 类实现了远程或本地接口，则有可能无意中将`this`引用从 Bean 类传递给调用方法。然而，在这种情况下，EJB 容器的行为无法得到保证，你可能会得到意想不到的结果。


    Bean 类实现远程和本地接口还存在其他问题。


    `EJBObject`和`EJBLocalObject`接口定义了两组不同的方法。容器应在部署期间提供这些方法的实现。容器实现的方法对于 EJB 的整体运行至关重要。


    这些方法处理底层关注点，例如网络、参数和传递值的序列化，以及与容器协调系统服务。


    它们还将业务方法调用代理到实际的 Bean 实现。但是，如果 Bean 类实现了这些方法，它就必须为这些类提供实现，这最终可能导致 EJB 无法使用。为了编译
    Bean，实现需要实现这些接口中定义的方法。这反过来会用不必要的代码使 Bean 实现变得混乱。此外，如果远程接口由 Bean 实现实现，客户端只需通过强制转换远程接口即可访问实际的
    Bean，这违背了 EJB 的核心目标，即位置透明性和分布式业务对象。


