- fmt: '# Chapter 2: Simplifying Enterprise Java Applications with the Spring Framework


    The first chapter of this book discussed the fundamental principles of JavaEE
    application architecture and design. In this chapter, I will show how these concepts
    apply to the Spring Framework. I will begin with a brief overview of Spring and
    its importance as an application framework. Then, I’ll cover the building blocks
    that make up this framework, and in the process you will see the framework in
    action. After you understand the underlying principles of the Spring Framework,
    I will discuss its role in enterprise Java application architecture and design.
    Finally, I will wind up this chapter with the Spring Java design pattern directive
    that will be used in the next three chapters of this book. If you are interested
    in running the code in this chapter, then jump to Chapter 7, which provides step-by-step
    instructions for setting up Eclipse-based Blazon ezJEE Studio with the Spring
    Framework plug-in. It also shows you how to create the sample project structure
    required to develop and run these examples.


    ## What Is Spring?


    The Spring Framework is an open source application framework initially aimed at
    the Java platform. It has recently been ported to the .NET platform as well. The
    idea and code for this framework were first described by Rod Johnson in his book
    *Expert One-on-One J2EE Design and Development* (Wrox, 2002). This framework was
    the outcome of Rod’s extensive project experience working as an independent software
    consultant for financial sector customers in the United Kingdom.


    The Spring Framework is currently available under the Apache 2.0 open source license.
    It is a high-quality software product that can be used to build clean, flexible
    enterprise-class software. This is proven by tests done using `Structure101` from
    Headway Software ([http://www.headwaysoftware.com](http://www.headwaysoftware.com)).
    Chris Chedgey, founder and CEO of Headway, reports in this blog ([http://chris.headwaysoftware.com/2006/07/springs_structu.html](http://chris.headwaysoftware.com/2006/07/springs_structu.html))
    that the Spring Framework code has no package-level dependency cycles “despite
    its reasonable size of about 70KLOC (estimated from bytecode) divided into 139
    packages.”


    This speaks volumes about the sound underlying architecture and design of the
    Spring Framework. If you’re interested in more information, refer to [http://www.springframework.org/node/310](http://www.springframework.org/node/310).


    ## Why Is Spring So Important?


    The Java EE platform was intended to solve the complexities associated with distributed
    application development. The traditional Java EE platform achieved great success
    in standardizing low-level middleware services through the various APIs such as
    `EJB`, `JTA`, and `JMS`. This was possible because both commercial vendors and
    the open source community came together, realizing the immense potential of the
    platform based on standard Java. Because the primary focus was on standardizing
    system services, the fundamental problem of a simplified programming model was
    overlooked. Hence, in spite of widespread adoption in the late 1990s and early
    2000, developing multitier applications on the Java EE platform still required
    strenuous effort.


    The Java EE platform aimed to build applications based on a component model. A
    *component* is a self-contained piece of code that ideally could be reused in
    multiple applications. An order component can comprise an entity bean to handle
    the persistence of order information and a session bean to carry out different
    workflows on order entities. Theoretically, this has immense potential for reuse.
    But reality is different, because components developed in one project are seldom
    utilized again in another project. The Java EE server-specific deployment descriptors
    also make it difficult to reuse these components. The complexities in the Java
    EE programming model also leads to a lot of unnecessary code being written, tested,
    and maintained by development teams. This includes boilerplate code to look up
    an `EJB` object on the `JNDI` tree, retrieve a database connection, prepare and
    execute database queries, and finally release all database resources. The data
    transfer objects used to circumvent the limitations of the entity bean API seriously
    violated the object-oriented principle of encapsulation. Even a midsize project
    had a significant number of transfer objects to develop and maintain. All these
    led to a significant drain of resources that should otherwise be used only for
    developing sound business logic.


    `EJBs` were designed to help ease the development of transactional and distributed
    applications. Although even the smallest database-driven application requires
    transaction, it may not need to be distributed. However, overusing `EJBs`, especially
    session beans to simplify business logic, leads to the distribution being built
    into the application component model. Distributed applications are unduly complex
    and hence consume more CPU cycles for processing. They result in excessive and
    duplicated code along with metadata. Accessing a distributed application component
    requires network traversals, and marshalling and unmarshalling of large datasets.
    The misuses of distributed objects have often led to even a simple application
    not performing to its desired level.


    Java EE encompasses a lot of technologies and APIs that are inherently complex.
    The entity bean API, for example, required a significant learning curve and in
    turn provided limited benefits for an application. Since Java EE components run
    inside the application server containers, they are very difficult to unit test.
    This prevents test-driven development (TDD).


    The difficulties in Java EE application development forced the development community
    to look for alternatives. Soon there was a rapid proliferation of frameworks built
    on top of different Java EE APIs. The Apache Struts framework, for example, helps
    implement MVC principles using the servlet API. The framework implements a servlet-based
    front controller and allows developers to provide implementation for simple page
    controllers. Hibernate, on the other hand, emerged to answer the immense pain
    associated with entity bean development. It provided persistence of `POJOs` with
    minimal configuration metadata. These `POJOs` were not distributed objects like
    entity beans and hence led to better application performance. Hibernate did not
    require any container support, thus making it easy to unit test these persistence
    objects. Then there was HiveMind for developing simple `POJO`-based business services.'
