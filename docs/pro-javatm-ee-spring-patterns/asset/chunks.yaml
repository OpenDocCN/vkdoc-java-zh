    清单 3-57 中在底层发生了很多事情。请注意，一个通用的视图解析器同时服务于动态和静态资源。你还可以看到处理器映射链。


    优先级更高的 BeanNameUrlHandlerMapping 首先被选中。现在，对动态资源（如 /policysearch.do）的请求由此处理器映射解析。它会在应用程序上下文中查找名为
    /policydetails.do 的 bean，并将处理委托给它。然而，BeanNameUrlHandlerMapping 无法处理对 URL ClaimCreateHelp.do
    的请求。因此，会选取链中的下一个处理器映射 SimpleUrlHandlerMapping，将此 URL 解析到一个控制器。此处理器映射成功检测到了控制器。它使用通配符将传入的、以
    Help.do 结尾的 URL 解析为 UrlFilenameViewController 的一个实例。因此，UrlFilenameViewController
    处理所有静态请求，无需调用任何业务逻辑。这个具体的控制器实现会将请求 URL 转换为一个逻辑视图名称——ClaimCreateHelp。然后，它会使用前缀最终返回
    /help/ClaimCreateHelp。最后，视图解析器在文件夹 /WEB-INF/jsp 中查找文件 /help/ClaimCreateHelp.jsp，并返回该静态物理资源。简化的流程如图
