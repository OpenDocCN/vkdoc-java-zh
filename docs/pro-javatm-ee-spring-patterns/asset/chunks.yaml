    **JPA 事务**


    Java 持久化 API 是 EJB 3 中新的持久化标准，取代了广受诟病的实体 Bean。Spring 也通过 JpaTransactionManager
    支持 JPA 事务。这在 Spring 应用程序上下文中配置，如清单 6-28 所示。


