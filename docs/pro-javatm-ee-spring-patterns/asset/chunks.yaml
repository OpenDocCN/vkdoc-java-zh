    第 1 章


    企业级 Java 应用架构与设计入门


    长 期以来，Java 企业版（Java EE）一直是各行业（如银行、保险、零售、酒店、旅游和电信等）开发和部署企业级业务应用的首选平台。这是因为 Java
    EE 提供了一个基于标准构建健壮且高度可扩展分布式应用的平台，支持从核心银行操作到航空订票引擎等各种功能。


    然而，成功开发 Java EE 应用可能是一项艰巨的任务。Java EE 平台提供的丰富选择起初会令人望而生畏。大量的框架、实用库、集成开发环境（IDE）和工具选项使得挑战更加严峻。因此，在开发基于
    Java EE 的软件时，选择合适的技术至关重要。这些选择，加上合理的架构和设计原则，对于构建易于维护、重用和扩展的应用大有裨益。


    本章将探讨 Java EE 应用架构与设计的基本方面。它们是整个应用开发的基础。


    我们将从回顾分布式计算和多层应用架构的演变开始。然后，我将展示 Java EE 平台架构如何解决开发分布式应用中的难题。您还将了解模型-视图-控制器（MVC）架构原则。接着，我将把
    MVC 原则与 Java EE 平台相结合，推导出多层 Java EE 应用架构。


    在确立了应用架构之后，我将重点讨论基于面向对象原则的 Java EE 应用设计。我还将解释如何使用设计模式来简化应用设计并采纳最佳实践。我还会简要提及 Sun
    公司 Java BluePrints 中记录的 Java EE 设计模式目录，以及随后在 Deepak Alur 等人所著的《Core J2EE Design
    Pattern》（Prentice Hall, 2003）一书中详细阐述的内容。


    本章最后将介绍统一建模语言（UML）及其在可视化记录 Java EE 设计与架构中的作用。


