  trans: '

    eInsure 应用程序使用无状态会话 Bean（SLSB）来部署可远程访问的业务逻辑。这些 SLSB 从 JSP 控制器中被访问，如清单 4-1 所示。然而，正如我已经强调过的，业务对象应从业务委托中进行访问。


    不久之后，eInsure 代码被重构，并采用了业务委托模式。但从 JSP 控制器迁移到业务委托的业务服务访问代码仍然存在原有的问题。其中一个问题是为了响应用户操作而调用多个远程业务方法。eInsure
    中的“承保新保单”用例可分为四个子任务：保存保单详情、查询产品工作台以检索默认风险和保障列表、将这些风险和保障列表与保单关联，以及最终创建用于后续跟踪保费支付的会计记录。因此，为了完成这个用例，业务委托需要调用这四个远程业务方法。


    上一段描述的方法立即产生了副作用。从业务委托进行细粒度的远程业务方法调用增加了网络往返次数。这也要求每次方法调用都要在网络上对大量数据集进行编组和解组。最终结果是应用程序性能下降。而
    eInsure 中 SLSB 依赖实体 Bean 进行持久化这一事实，更是加剧了这一问题。每个子任务至少使用两个实体 Bean 来从关系数据库管理系统（RDBMS）中保存和检索数据。由于实体
    Bean 是可远程访问的持久化组件，并且需要进行数据编组和解组，它们也加剧了网络拥堵。


    10092ch04.qxd 7/24/08 5:10 PM 第 156 页


    **156**


    第 4 章 **■** 探索业务层设计模式


    每个用户操作从业务委托调用多个会话 Bean 方法，增加了业务逻辑溢出到客户层的可能性。这也增加了客户端事务管理的可能性，而 EJB 组件模型本应消除这种可能性。由于涉及多个会话
    Bean 方法，在使用声明式容器管理事务（CMT）支持时，设置适当的事务属性变得非常困难。使用本身即为事务性组件的实体 Bean 也无助于解决问题。很难决定是在会话
    Bean 中处理事务还是在实体 Bean 中处理事务。


    **驱动因素**


    • 将业务工作流整合到可远程访问的组件中。


    • 通过一次网络调用公开粗粒度的业务接口以访问实体 Bean。


    • 防止业务逻辑和系统级服务（如事务管理）溢出到业务层的客户端。


    • 通过整合业务方法来提高性能。


    **解决方案**


    公开一个可远程访问的*会话外观*，它将封装业务逻辑，同时向客户端公开一个粗粒度的 API。


    Spring 框架中的策略


    会话外观是将 GOF 外观模式应用于 EJB 会话 Bean 的一种实现。外观模式为子系统中的一组接口提供了一个统一的接口。换句话说，外观是一个更高级别的接口，使得子系统更易于使用。


    在 EJB 的上下文中，这意味着会话 Bean 充当外观，并且每个用户操作只公开一个业务方法。该方法进而调用私有的会话 Bean 方法。另一种选择是将整个业务逻辑整合到一个会话外观方法中。然后，该方法提供对业务层的粗粒度访问。由于远程业务对象的单个方法即可执行与用例相关的工作流，因此很容易在此方法上应用容器管理事务。在本章后面，我将结合应用程序服务模式解释一个更灵活、更清晰的解决方案。

