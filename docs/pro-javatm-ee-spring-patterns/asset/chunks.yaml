    As a result, they often end up using a low-level Java EE platform security API
    or the Java Transaction API in their code. The core application concerns such
    as presentation and business logic are soon bloated because of mixing transaction
    and security code. Hence, I decided to dedi-cate this chapter to discussing design
    strategies to counter these crosscutting concerns with the Spring Framework.


    The Java EE specification and the Java Authorization and Authentication Service
    (JAAS) API tries to standardize security services. But they are limited in features
    and unsuitable for the majority of the applications. The server vendors implement
    container security in a proprietary way, resulting in vendor lock-in and limited
    portability. JAAS, on the other hand, just provides a standard interface. The
    container support for JAAS too lacks any consistency. So, development teams generally
    resort to a custom solution, which consumes a significant portion of their development
    time. Spring Security, which was earlier known as Acegi Security, is an easy-to-use
