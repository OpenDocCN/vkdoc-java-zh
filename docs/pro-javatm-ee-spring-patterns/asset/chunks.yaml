    # About the Author


    **■DHRUBOJYOTI KAYAL** is an agile developer architect with almost a decade of
    experience working with Java EE. During this time, he has actively contributed
    to the architecture, design, and development of products and applications using
    enterprise Java technologies. His areas of interest include the Spring Framework,
    JBoss SEAM, OSGi, refactoring and prefactoring, rich Internet applications, Scrum,
    and XP. He currently works with Capgemini Consulting, where he helps project teams
    with the architecture, design, and development of Java EE projects for leading
    vendors in the telecom, media, and entertainment sectors. Prior to Capgemini,
    Dhrubojyoti worked for TATA Consultancy Services, Oracle, and Cognizant Technology
    Solutions.


