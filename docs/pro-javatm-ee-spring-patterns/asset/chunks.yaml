    第 5 章


    探索集成层


    设计模式


    **集**成层是一个边界层，它与不同的外部系统进行数据交换。eInsure 应用程序中的集成层访问关系型数据库，用于存储、检索和操作与保单、理赔、会计、客户和产品相关的数据。eInsure
    使用实体 Bean 对数据库执行典型的创建、读取、更新和删除（CRUD）操作。eInsure 的旧版本遗留了大量存储过程。eInsure 应用程序大量使用这些存储过程来处理数据库密集型任务，特别是那些在常规工作时间之后每天运行，或按每月、每季度等特定间隔运行的批处理作业。


    eInsure 的用户需要各种报告来了解业务状态的重要信息。为了满足报告需求，eInsure 系统连接到一个异步报告子系统。最后但同样重要的是，eInsure
    提供的某些服务必须作为 Web 服务暴露出来。这些服务由第三方外部应用程序使用。


    在本章中，我将从用于访问关系型数据库的数据访问对象（DAO）模式开始。我将探讨 DAO 的必要性，以及利用 Spring JDBC 支持来简化 DAO 实现的策略。Spring
    JDBC API 还可用于为存储过程提供面向对象风格的访问。在描述过程访问对象（PAO）模式时，我将详细解释这一点。此外，我还会结合服务激活器模式，介绍异步服务访问机制。最后，我将以
    Web 服务代理设计策略作为本章的结尾，该策略可用于将现有服务暴露为 Web 服务。


