    **268**


    第 6 章 **■** 探索横切设计模式


    最后，通过横切模式，我将结束使用 Spring 框架探索 Java EE 模式的旅程。在下一章中，我将应用目前探索的概念来构建一个订单管理系统的架构和设计。那么，请继续阅读，因为我将在过程中介绍一些有趣的设计和架构产物。


    10092ch07.qxd 7/29/08 10:38 AM 第 269 页


    第 7 章


    案例研究：构建订单


    管理系统


    **我**在前面的章节中探索了 Java EE 应用的架构和设计。我还解释了与 Spring 框架相关的 Java EE 设计模式。现在是时候将你目前学到的所有概念整合起来，构建一个基础应用了。在本章中，我将在订单管理系统（OMS）的背景下应用
    Spring Java EE 模式。这是我曾为一家电信公司构建的 OMS 的简化版本，该公司的客户使用它来注册增值服务，例如彩铃、视频广播、语音邮件等。使用这个
    OMS，用户可以登录，然后查找和订购服务。他们还可以搜索、取消和暂停订单。主要重点将放在构建轻量级架构和设计上。我还将演示开发、测试和部署此应用的步骤。


    对于这个示例 OMS，我将大量借鉴极限编程（XP）原则。如果应用得当，与那些强调规划并在前期架构和设计上投入大量精力的其他方法论相比，XP 为项目团队提供了极大的灵活性。像
    Spring 这样的应用框架，在 IDE 支持的支持下，最适合敏捷软件开发。如果你不熟悉 XP，可以访问


    [`www.extremeprogramming.org`](http://www.extremeprogramming.org) 快速了解其特性和工作流程。在本章的其余部分，我将通过一个定制的
    XP 迭代来开发订单管理系统的基础。当你继续阅读时，你会看到在本章的某些部分，我会将一些解决方案或开发任务留作练习。我这样做是为了让你思考在前几章中学到的内容。这也使阅读本章变得更有趣和更具互动性。如果你想验证你的解决方案和开发任务，请访问
    [`www.opengarage.org`](http://www.opengarage.org)，我在那里发布了本章的完整解决方案和代码。


    **269**


    10092ch07.qxd 7/29/08 10:39 AM 第 270 页


    **270**


    第 7 章 **■** 案例研究：构建订单管理系统


    **需求**


    要启动任何软件开发项目，你都需要一些文档化的业务需求。XP 采用*用户故事*来记录需求。每个用户故事描述了系统将如何解决一个业务问题。每个故事都是对需求的非常简短的描述，并且通常附有验收测试用例。因此，从需求到测试有清晰的可追溯性。用户故事写在*故事卡*上。


    使用敏捷流程，你不需要在启动项目之前就准备好所有需求。要开始第一次迭代，你只需要几个需求。在第一次迭代开始之后出现的用户故事会被添加到需求待办列表中。其中一些将根据其优先级从待办列表中选出，在未来的迭代中实施，直到待办列表被清空。对于本章中的
    OMS，我为第一次迭代挑选了三个优先级最高的需求。优先级由客户设定，用于决定是否从待办列表中选取一个需求在下次迭代中实施。


    这些需求的用户故事将在接下来的章节中描述。


    **故事卡：用户登录**


    系统只允许注册用户使用用户名和密码登录。如果登录失败，将向用户显示一条通用错误消息，并提示其再次登录。登录成功后，用户将进入主页，其中包含一个保存订单的链接。


    *验收测试集*：AT-01


    *优先级*：1


    **故事卡：查找服务**


    系统应提供一个功能，仅允许经过身份验证的用户查找可供订购的服务。此功能在一个新的弹出窗口中打开。当用户选择一项服务时，此弹出窗口关闭，并将相应的值提供给父页面。


    *验收测试集*：AT-02


    *优先级*：1


    ![图片 57](img/index-293_1.png)


    10092ch07.qxd 7/29/08 10:39 AM 第 271 页


    第 7 章 **■** 案例研究：构建订单管理系统


    **271**


    **故事卡：保存订单**


    系统允许经过身份验证的用户使用唯一的订单标识符保存订单。此标识符以后可用于搜索订单。用户需要使用查找功能来选择订单项。在第一个版本中，系统每个订单只允许一个项目。


    *验收测试集*：AT-03


    *优先级*：1


    **迭代规划**


    一旦确定了需求，就该进行*迭代规划*了。迭代规划通常为当前迭代要执行的编程和单元测试任务制定计划。你还应将架构、设计、编码标准合规性和重构添加到迭代计划中。每次迭代平均持续
    14 到 21 个工作日。在最初的几次迭代中，更多时间花在架构和设计的演进上。你不应该花费超过两到三次迭代来建立架构和设计的基线，之后编程任务应优先进行。


    你可以使用诸如 Microsoft Project 之类的先进软件来满足项目管理和规划需求。然而，为了遵循 XP 的简单性和灵活性理念，你可以使用诸如 Microsoft
    Excel 或 OpenOffice Calc 之类的电子表格软件进行快速规划和跟踪。图 7-1 显示了使用 Microsoft Excel 创建的示例 OMS
    第一次迭代的计划和跟踪器。


    **图 7-1.** *迭代 1 的计划和跟踪器*


    ![图片 58](img/index-294_1.png)


    10092ch07.qxd 7/29/08 10:39 AM 第 272 页


    **272**


    第 7 章 **■** 案例研究：构建订单管理系统


    如图 7-1 所示，跟踪器中的每一行代表一个需要在迭代中执行的任务。作为规划和跟踪的一部分，你有通用属性，例如预估小时数、实际小时数、开始日期、结束日期等。你还可以看到被委托执行特定任务的资源或人员。这个规划器中一个值得注意的重要属性是*偏差*。偏差有助于跟踪迭代的“健康状况”。正偏差通常表示任务花费的时间比最初估计的要长。你还可以维护一个总体项目摘要跟踪器，如图
    7-2 所示。这提供了项目整体进度的快速快照。


    **图 7-2.** *总体项目摘要跟踪器*

