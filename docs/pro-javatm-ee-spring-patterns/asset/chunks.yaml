    \n```\n<bean name=\"/policydetails.do\" class=\"com.apress.insurance.web.controller.PolicyDetailsController\"\
    />\n```\n\n## InternalResourceViewResolver\n\nIf the application uses only JSPs,\
    \ then maintaining an external view mapping configuration is not necessary. The\
    \ `InternalResourceViewResolver` class can determine the physical view in the\
    \ web application archive given the logical view name. Using this view resolver\
    \ is just a matter of configuration, as shown in Listing 3-15.\n\n**Listing 3-15.**\
    \ `insurance-servlet.xml`\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<beans\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \  http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\n>\n  <bean\
    \ name=\"viewResolver\" class=\"org.springframework.web.servlet.view.InternalResourceViewResolver\"\
    >\n    <property name=\"viewClass\" value=\"org.springframework.web.servlet.view.JstlView\"\
    ></property>\n    <property name=\"prefix\" value=\"/WEB-INF/jsp/\"></property>\n\
    \    <property name=\"suffix\" value=\".jsp\"></property>\n  </bean>\n  <bean\
    \ name=\"/policydetails.do\" class=\"com.apress.insurance.web.controller.PolicyDetailsController\"\
    />\n</beans>\n```\n\nNote that the `InternalResourceViewResolver` also returns\
    \ `JstlView`. It inherits two optional properties—`prefix` and `suffix`—from `UrlBasedViewResolver`\
    \ to completely resolve the physical resource. In this case, the view name `policydetails`\
    \ will map to a physical resource `/WEB-INF/jsp/policydetails.jps`. This view\
    \ resolver can also be used with views composed using the Apache Tiles layout\
    \ framework.\n\nIt is possible to chain view resolvers in case a single resolver\
    \ is insufficient for the application. The view resolver chaining works in a similar\
    \ way to the handler mapping chain because most of the view resolvers implement\
    \ the `Ordered` interface.\n\n## Consequences\n\n### Benefits\n\n- **Enhanced\
    \ modularity**: Partitioning view and command management into two distinct and\
    \ decoupled subsystems makes an application modular and robust.\n- **Increased\
    \ reusability**: The application controller makes it possible to reuse the controllers\
    \ and views.\n- **Increased extensibility**: The Spring application controller’s\
    \ various interfaces and abstract base classes with template methods make it easy\
    \ to extend the framework, supporting a variety of command controllers and views.\
    \ It is also possible to integrate third-party action-based web frameworks such\
    \ as WebWork, Struts, and so on, with Spring MVC as well as work with views such\
    \ as OpenLaszlo and Flex.\n\n### Concerns\n\n- **Steep learning curve**: Ideally,\
    \ the application controller should be a low-level framework concern. For most\
    \ common needs, you will generally not work with the application controller because\
    \ Spring has sensible defaults. However, it also throws this component wide open\
    \ for developers seeking extensibility and flexibility. This adds to the learning\
    \ curve because you now need to know a lot more about framework internals to support\
    \ exceptional requirements.\n\n## Page Controller\n\n### Problem\n\nThe JSP-based\
    \ controller introduced at the beginning of this chapter handled each user action\
    \ by executing code in `if-else` blocks. Each `if-else` block was responsible\
    \ primarily for invoking a session bean to carry out a distinct business function.\
    \ However, this was a most inflexible design and degraded reuse.\n\nI will point\
    \ out two simple use cases to elaborate on the problem discussed in the previous\
    \ paragraph. A claimant name can be modified until the claim is finally sanctioned.\
    \ Such modification involves a simple update operation on the claim record. Now\
    \ for a slightly tricky situation: consider a case when a lodged claim is rejected\
    \ because of a lack of evidence. It is easy to think of this as a delete operation.\
    \ However, it had to be handled as a soft delete by appending an effective end\
    \ date to the claim record. This was done because a rejected claim could be revived\
    \ once mandatory information is available. Moreover, it can be used as references\
    \ for policies taken by the claimant in the future.\n\nThe JSP front controller\
    \ had two distinct `if-else` blocks to cater to the two scenarios. Two separate\
    \ blocks of code were unnecessary, because the first case was an update of the\
    \ name field in the claim record, while the second case required the claim status\
    \ and effective end date fields to be modified in the same record. Thus, you have\
    \ two blocks of code where only a single block is really necessary. This is just\
    \ one example of several such blocks scattered in all the JSP controllers of eInsure.\
    \ Moreover, as I have already pointed out, JSP is not the appropriate controller\
    \ to house the user action handlers. For each new feature, a block needs to be\
    \ added that discouraged OO principles—encapsulation, inheritance, and reusability.\n\
    \nIt is easy to consider embedding these blocks in the front controller dispatcher\
    \ servlet. However, the dispatcher servlet would soon be polluted like the JSP\
    \ controller, leaving it inflexible and unsuitable for use across applications.\n\
    \n### Forces\n\n- Remove the code that invokes business logic in response to user\
    \ action to reusable components.\n- Identify the reusable components based on\
    \ the request URL instead of hard-coded event and screen code.\n- Deploy one reusable\
    \ component per user action.\n\n### Solution\n\nUse a *page controller* to consolidate\
    \ user action processing.\n\n### Strategies with the Spring Framework\n\nI have\
    \ already introduced Spring page controllers in connection with the Front Controller\
    \ and Application Controller design patterns. I have also discussed the workflow\
    \ involved in identifying the appropriate page controller and also configuring\
    \ them in the Spring registry. However, I left the implementation details until\
