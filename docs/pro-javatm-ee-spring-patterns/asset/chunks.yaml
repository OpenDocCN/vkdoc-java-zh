    Strategies with the Spring Framework


    In a Java EE application, an SLSB implements the domain service for a remote client.
    The SLSB is the most useful EJB component and can be used extensively for remoting
    and transaction support. However, as shown in Chapter 4, writing and maintaining
    an EJB is cumbersome because it involves a lot of classes and metadata. Also,
    they have little importance if your application needs to run out of an EJB container
    or in a web container. Moreover, a session facade intercepts only a remote business
    logic request, so in a strict sense the application service actually implements
