    第 1 章 **■** 企业 Java 应用程序架构与设计介绍


    **分布式计算的演进**


    在分布式计算中，应用程序被划分为更小的部分，这些部分在不同的计算机上同时运行。这也被称为*网络计算*，因为这些较小的部分通常使用基于 TCP/IP 或 UDP
    构建的协议通过网络进行通信。这些较小的应用程序部分被称为*层*。每一层提供一组独立的服务，可供连接层或客户端层使用。这些层可以进一步划分为*子层*，它们提供更细粒度的功能。大多数应用程序具有三个不同的子层：


    • *表示层*负责用户界面。


    • *业务层*执行业务规则。在此过程中，它还与数据访问层进行交互。


    • *数据访问层*负责检索和操作存储在企业信息系统（EIS）中的数据。


    通过分析分布式应用程序架构的逐步演变，可以更好地理解网络计算的现代状态。在接下来的几节中，我将通过合适的示例来审视分布式架构的演变。


    **单层架构**


    单层架构可以追溯到由哑终端连接的大型主机的时代。整个应用程序，包括用户界面、业务规则和数据等子层，都部署在同一个物理主机上。用户通过终端或控制台与这些系统交互，这些终端或控制台的处理能力非常有限，且基于文本（见图
    1-1）。


    **图 1-1.** *单层架构*


    ![Image 7](img/index-25_1.jpg)


    10092ch01.qxd 7/29/08 12:02 PM 第 3 页


    第 1 章 **■** 企业 Java 应用程序架构与设计介绍


    **3**


    **双层架构**


    在 20 世纪 80 年代早期，个人电脑（PC）变得非常流行。与哑终端相比，它们价格更低，处理能力更强。这为真正的分布式计算或*客户端-服务器*计算铺平了道路。客户端或
    PC 现在运行用户界面程序。它还支持图形用户界面（GUI），允许用户输入数据并与大型机服务器交互。大型机服务器现在只托管业务规则和数据。数据输入完成后，GUI
    应用程序可以选择性地执行验证，然后将数据发送到服务器以执行业务逻辑。基于 Oracle Forms 的应用程序是双层架构的一个很好的例子。表单提供加载在 PC
    上的 GUI，而业务逻辑（编码为存储过程）和数据则保留在 Oracle 数据库服务器上。


    随后出现了另一种形式的双层架构，其中不仅 UI，甚至业务逻辑也驻留在客户端层。这类应用程序通常连接到数据库服务器以运行各种查询。这些客户端被称为*胖客户端*，因为它们在客户端层拥有相当大比例的可执行代码（见图
    1-2）。


    **图 1-2.** *双层架构*


    ![Image 8](img/index-26_1.jpg)


    10092ch01.qxd 7/29/08 12:02 PM 第 4 页


    **4**


    第 1 章 **■** 企业 Java 应用程序架构与设计介绍


    **三层架构**


    双层胖客户端应用程序易于开发，但由于用户界面或业务逻辑的变更而进行的任何软件升级都必须推广到所有客户端。幸运的是，在 90 年代中期，硬件成本变得更低，CPU
    的处理能力显著提高。这一点，加上互联网和基于 Web 的应用程序开发趋势的增长，导致了三层架构的出现。


    在这种模型中，客户端 PC 只需要瘦客户端软件（如浏览器）来显示来自服务器的表示内容。服务器托管表示层、业务逻辑和数据访问逻辑。应用程序数据来自企业信息系统，例如关系型数据库。在此类系统中，业务逻辑可以被远程访问，因此可以通过
    Java 控制台应用程序支持独立的客户端。业务层通常通过数据访问层与信息系统交互。由于整个应用程序驻留在服务器上，该服务器也被称为*应用服务器*或*中间件*（见图
    1-3）。


    **图 1-3.** *三层应用程序*


    **多层架构**


    随着互联网带宽的广泛增长，世界各地的企业都为其服务提供了 Web 支持。因此，应用服务器不再承担表示层的任务。这个任务现在被卸载到专门的 Web 服务器上，由它们生成表示内容。这些内容被传输到客户端层上的浏览器，


    ![Image 9](img/index-27_1.jpg)


    10092ch01.qxd 7/29/08 12:02 PM 第 5 页


    第 1 章 **■** 企业 Java 应用程序架构与设计介绍


    **5**


    由浏览器负责渲染用户界面。多层架构中的应用服务器托管可远程访问的业务组件。表示层的 Web 服务器通过网络使用原生协议访问这些组件。图 1-4


    展示了多层应用程序。


    **图 1-4.** *多层应用程序*


    **Java EE 架构**


    开发多层分布式应用程序是一项复杂且具有挑战性的工作。将处理过程分布到不同的层中可以带来更好的资源利用率。它还允许将任务分配给最适合工作和开发特定层的专家。例如，网页设计师更适合在
    Web 服务器上处理表示层。另一方面，数据库开发人员可以专注于开发存储过程和函数。然而，将这些层保持为孤立的孤岛毫无用处。它们必须被集成以实现更大的企业目标。必须利用最高效的协议来完成这项工作；否则，会导致严重的性能下降。


    除了集成之外，分布式应用程序还需要各种服务。它必须能够在与不同的信息系统交互时创建、参与或管理事务。这对于确保企业数据的并发性是绝对必要的。


    由于多层应用程序是通过互联网访问的，因此它们必须由强大的安全服务来支持，以防止恶意访问。


    10092ch01.qxd 7/29/08 12:02 PM 第 6 页


    **6**


    第 1 章 **■** 企业 Java 应用程序架构与设计介绍


    如今，像 CPU 和内存这样的硬件成本已经大幅下降。


    但仍然存在限制，例如处理器支持的内存容量。因此，需要优化使用系统资源。现代分布式应用程序通常利用面向对象技术构建。因此，诸如对象缓存或对象池之类的服务非常有用。这些应用程序经常与关系型数据库和其他信息系统（如面向消息的中间件）交互。然而，打开与这些系统的连接成本很高，因为它会消耗大量进程资源，并可能成为性能的严重障碍。在这些场景中，连接池对于提高性能和优化资源利用非常有用。

