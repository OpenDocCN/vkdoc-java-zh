    \ JSP 文件中重复该通知。但是，使用布局，你只需更改构成页头的 JSP 文件，并在该通知不再相关时恢复原状。\n\n`eInsure` 通常使用表格来配置布局，并使用\
    \ JSP 包含（`include`）来动态包含子视图以组成主视图。尽管这种方案可行，但它是一种非常初级的方法，需要大量自定义代码才能使其成为一个灵活且可插拔的视图框架。Spring\
    \ 提供了与两个视图布局框架的集成，以简化复合视图的开发和维护。\n\n## 使用 SiteMesh\n\n`SiteMesh` 是来自 OpenSymphony\
    \ 的一个开源网页布局框架。可以从 `http://www.opensymphony.com/sitemesh/` 下载。使用 `SiteMesh` 的最大优势在于它非侵入式。因为它基于\
    \ Servlet 过滤器，使用它只需进行配置，即使没有 Spring MVC 也能工作。基于过滤器，它实现了 GOF 装饰器设计模式。它修改来自前端控制器\
    \ Servlet 的响应，在将最终响应发送到浏览器之前注入内容。\n\n使用 `SiteMesh` 的第一步是创建一个具有所需布局的 JSP 文件，如清单\
    \ 3-54 所示。\n\n**清单 3-54.** `WEB-INF/decorators/primaryLayout.jsp`\n\n```jsp\n\
    <%@ taglib uri=\"sitemesh-decorator\" prefix=\"decorator\" %>\n<%@ taglib uri=\"\
    sitemesh-page\" prefix=\"page\" %>\n<html>\n<head>\n<title>\neInsure - <decorator:title\
    \ default=\"Welcome!\" />\n</title>\n<decorator:head />\n</head>\n<body>\n<table\
    \ width=\"100%\">\n<tr id=\"header\">\n<h3>eInsure - rel 3.0.1 </h3>\n</tr>\n\
    <tr id=\"body\">\n<decorator:body />\n</tr>\n<tr id=\"footer\">\n<h3>eInsure -\
    \ All rights reserved </h3>\n</tr>\n</table>\n</html>\n```\n\n请注意，我使用了 `SiteMesh`\
    \ 特定的标签库来创建布局。`decorator:title` 标签从前端控制器发送的响应中获取标题信息。类似地，`decorator:head` 和 `decorator:body`\
    \ 标签包含原始响应中 `head` 和 `body` 标签内的信息，并将它们放入布局中。页头和页脚信息被整合到布局中的一个公共位置。要使用此布局框架和不同的标签，你必须在\
    \ `web.xml` 文件中包含 `SiteMesh` 过滤器和标签定义，如清单 3-55 所示。\n\n**清单 3-55.** `web.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<web-app version=\"2.4\"\
    \n    xmlns=\"http://java.sun.com/xml/ns/j2ee\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://java.sun.com/xml/ns/j2ee\n    http://java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\"\
