- fmt: "# The Mixed Approach to Persistence in eInsure\n\nThe mixed approach to persistence\
    \ in eInsure (entity beans and straight JDBC) made the business component vulnerable\
    \ to change. As you can see in Listing 5-1, the direct use of the JDBC API meant\
    \ a lot of boilerplate code for establishing a connection, preparing SQL statements,\
    \ setting parameters, executing the SQL, iterating over the result set to prepare\
    \ a list of Java objects, and finally releasing database resources. This last\
    \ step is critical and often neglected, causing connection leaks and resource\
    \ wastage. If the straight JDBC approach were used in all the DAO methods, it\
    \ would result in significant code duplication.\n\n## Forces\n\n- You should prevent\
    \ the unnecessary mixing of business logic with persistence logic.\n- The entity\
    \ bean is an obsolete technology.\n- The business tier required a consistent API\
    \ to access integration tier components.\n- Working directly with the JDBC API\
    \ leads to a lot of boilerplate code being written, thus degrading reusability\
    \ and increasing development time.\n\n## Solution\n\nImplement a *data access\
    \ object* (DAO) to encapsulate the data access logic and provide a consistent\
    \ interface to the business tier components.\n\n### Strategies with the Spring\
    \ Framework\n\nAs the name suggests, DAOs are generic objects and theoretically\
    \ can support any kind of persistence store. The primary goal of these classes\
    \ is to abstract the underlying data access mechanism from the business services.\
    \ Since most applications interact with RDBMSs, I will focus only on JDBC-based\
    \ data access objects.\n\nThe Spring JDBC module implements robust object design\
    \ principles that make it simple to develop JDBC-based DAOs. It takes care of\
    \ all the boilerplate code generally associated with JDBC API usage and helps\
    \ provide a consistent API for data access.\n\nApplication developers are no longer\
    \ required to work directly with the JDBC API; instead, they work with a high-level\
    \ API.\n\nBecause eInsure had an affinity for Oracle owing to its legacy, the\
    \ SQL syntax used in the next few sections will be compatible with Oracle Database.\
    \ But the general discussion and concepts hold true for any database, and using\
    \ them merely involves making minor changes in the SQL statements. Listing 5-2\
    \ shows the Oracle script to create the `T_POLICY_DETAIL` table and corresponding\
    \ sequence.\n\n**Listing 5-2.** `createTbl_T_Policy_Detail.sql`\n\n```sql\nCREATE\
    \ table \"T_POLICY_DETAIL\" (\n  \"POLICY_ID\" NUMBER,\n  \"PRODUCT_CD\" VARCHAR2(20)\
    \ NOT NULL,\n  \"POLICY_HOLDER\" VARCHAR2(150) NOT NULL,\n  \"AGE\" NUMBER,\n\
    \  constraint \"T_POLICY_DETAIL_PK\" primary key (\"POLICY_ID\")\n);\nCREATE sequence\
    \ \"T_POLICY_DETAIL_SEQ\";\n/\n```\n\nThe first step to building DAOs with Spring\
    \ is to declare interfaces for the DAOs. This follows program to interface (P2I),\
    \ as described earlier, as an object design best practice. It lays out a contract\
    \ with the clients that deal with the concrete implementations only through these\
    \ interfaces. As a result, it is easy to swap or modify implementation classes.\n\
    \nListing 5-3 shows the DAO interface for the policy details.\n\n**Listing 5-3.**\
    \ `PolicyDetailDao.java`\n\n```java\npackage com.apress.einusre.persistence.dao.api;\n\
    \npublic interface PolicyDetailDao {\n  String SAVE_POLICY_DETAILS_SQL = \"insert\
    \ into T_POLICY_DETAIL values(T_POLICY_DETAIL_SEQ.nextval,?,?,?)\";\n  \n  public\
    \ void savePolicyDetails(String productCd, String name, int age);\n}\n```\n\n\
    Figure 5-1 shows the Spring JDBC support classes. Spring provides a convenient\
    \ class called `JdbcDaoSupport` to ease the development of JDBC-based DAO classes.\
    \ This class is associated with a data source and supplies the `JdbcTemplate`\
    \ object for use in the DAO.\n\n**Figure 5-1.** *Class diagram: Spring JDBC support\
    \ classes*"
