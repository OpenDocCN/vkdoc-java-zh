    配置在根应用上下文中，如清单 6-7 所示。


    **清单 6-7.** applicationContext-security.xml


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE beans PUBLIC "-//SPRING//DTD BEAN//EN"


