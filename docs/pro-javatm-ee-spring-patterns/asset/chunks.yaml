    类图描述了系统中一组类和接口之间存在的静态关系。我将讨论的不同关系类型包括泛化、聚合和继承。图 1-8 展示了用于表示保险理赔详细信息的类的 UML 表示法。它由一个带有三个分隔区的矩形表示。第一个分隔区是类的名称。第二个分隔区表示类中的属性，最后一个分隔区显示在这些属性上定义的操作。请注意，属性和方法名称前的+和-符号用于表示可见性。+符号表示公共可见性，而-符号表示私有可见性，即该属性在此类外部不可访问。另外，你也可以选择性地表示属性的数据类型、方法返回类型和参数。


    **图 1-8.** *UML 类表示法*


    接口规定了实现必须遵守的契约。换句话说，实现接口的类提供了一组有保证的行为。接口的表示方式与类相同，都是矩形框，但有一个区别。顶部分隔区显示类名，并附加了构造型`<<interface>>`。构造型是一种扩展现有表示法的机制。一些
    UML 工具也使用圆圈来表示接口，而不明确提及方法。图 1-9 展示了这两种不同的形式。


    **图 1-9.** *UML 接口表示法*


    ![Image 15](img/index-38_1.png)


    ![Image 16](img/index-38_2.png)


    10092ch01.qxd 7/29/08 12:03 PM Page 16


    **16**


    第 1 章 **■** 企业 Java 应用程序架构与设计简介


    关系


    在接下来的几节中，我将探讨软件系统中类之间存在的重要关系。


    **泛化**


    *泛化*关系表示两个或多个类之间的继承。这是一种父子关系，其中子类继承父类的部分或全部属性和行为。子类也可以覆盖某些行为和属性。图 1-10 展示了泛化关系。


    **图 1-10.** *泛化*


    **关联**


    *关联*表示两个类之间的一般关系。在实际的类中，这表现为一个类持有另一个类的实例。一份保险单总是涉及一个或多个参与方，其中最突出的是拥有此保单的投保人。可能还有一位代理人帮助并指导投保人购买此保单。


    关联通常显示命名角色、基数（多重性）和约束，以详细描述关系，如图 1-11 所示。


    **图 1-11.** *关联*


    ![Image 17](img/index-39_1.png)


    ![Image 18](img/index-39_2.png)


    10092ch01.qxd 7/29/08 12:03 PM Page 17


    第 1 章 **■** 企业 Java 应用程序架构与设计简介


    **17**


    **聚合**


    *聚合*是一种关联形式，其中一个元素由其他更小的组成部分构成。这种关系由菱形空心箭头表示。在这种情况下，如果父对象被删除，子对象可能仍然继续存在。图 1-12
    展示了保险代理人与其工作的本地保险办事处之间的聚合关系。本地保险办事处是保险代理人执行任务（如保单承保、为客户存入保费以及各种其他职能）的地方。因此，即使本地办事处关闭，代理人也可以向另一个办事处报告。同样，代理人可以从一个本地办事处注销，并转移到同一保险公司的另一个办事处。


    **图 1-12.** *聚合*


    **组合**


    *组合*是一种更强的聚合形式；在这种情况下，如果父对象被删除，子对象也将不复存在。这种关系由菱形实心箭头表示。图 1-13 展示了参与某项保单或索赔的当事方与其地址之间的组合关系。如果该当事方从系统中删除，其地址也将被删除。


    **图 1-13.** *组合*


    ![Image 19](img/index-40_1.png)


    10092ch01.qxd 7/29/08 12:03 PM Page 18


    **18**


    第 1 章 **■** 企业 Java 应用程序架构与设计简介


    **时序图**


    *时序图*用于对系统的动态方面进行建模，它描述了在一段时间内系统中对象之间的消息交换。时序图用于展示为完成特定用例而在不同对象之间发生的交互序列。与表示整个应用程序领域模型的类图不同，时序图只能显示特定过程的交互细节。


    对象与消息


    在时序图中，对象以其名称在矩形框中并带有下划线的方式显示。消息由从一个对象开始并在另一个对象结束的箭头表示。一个对象可以调用自身的方法，这称为自消息，由起始和终止于同一对象的箭头表示，如图
    1-14 所示。


    **图 1-14.** *时序图中的生命线*


    生命线


    每个对象都有一条*生命线*，由从对象框向下延伸的虚线表示（如图 1-14 所示）。它代表了整个时序图的时间轴，时间流逝通过沿生命线向下移动来衡量。


    返回值


    时序图中的消息可以选择性地带有*返回值*，如图 1-15 所示。例如，`createNewPolicy`消息返回一个`PolicyDetail`对象。


    ![Image 20](img/index-41_1.png)


    10092ch01.qxd 7/29/08 12:03 PM Page 19


    第 1 章 **■** 企业 Java 应用程序架构与设计简介


    **19**


    **图 1-15.** *时序图中的可选返回值*


    **总结**


    开发分布式多层应用程序是一项艰巨的任务。Java EE 平台试图通过定义基于容器的架构来简化这项任务。它定义了应用程序代码运行时环境以及应提供的底层系统服务的规范。这使得应用程序开发人员能够专注于编写业务逻辑。Java
    EE 应用程序架构基于核心平台架构和既定的 MVC 原则。有了这一点，你可以在每一层中清晰地定义专门的组件层。例如，Web 层托管应用程序的表示层，而业务层和数据访问层通常位于应用服务器层。


    另一方面，Java EE 设计是一种扩展的对象设计。Java EE 设计模式目录提供了在层内和跨层之间组合对象及其交互的指导和最佳实践。该设计模式目录记录了设计人员和开发人员在成功交付
    Java EE 应用程序方面多年的经验。Java EE 设计和架构可以使用 UML 表示法进行文档化。这些是图形化的表示法，有助于提供领域对象静态结构和动态交互的图形化视图。


    在下一章中，我将展示 Spring Framework 如何进一步简化 Java EE 应用程序的设计和架构。如果你已经熟悉 Spring Framework，可以直接跳到第
    3 章。


    10092ch01.qxd 7/29/08 12:03 PM Page 20


    10092ch02.qxd 7/21/08 4:56 PM Page 21


    第 2 章


    使用 Spring Framework 简化企业


    Java 应用程序

