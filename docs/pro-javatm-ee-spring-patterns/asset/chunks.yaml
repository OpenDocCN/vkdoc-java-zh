    \        </servlet-class>\n        <load-on-startup>1</load-on-startup>\n    </servlet>\n\
    \    <servlet-mapping>\n        <servlet-name>insurance</servlet-name>\n     \
    \   <url-pattern>*.do</url-pattern>\n    </servlet-mapping>\n\n    <jsp-config>\n\
    \        <taglib>\n            <taglib-uri>/spring</taglib-uri>\n            <taglib-location>\n\
    \                /WEB-INF/tld/spring-form.tld\n            </taglib-location>\n\
    \        </taglib>\n        <!-- Start of SiteMesh tag config -->\n        <taglib>\n\
    \            <taglib-uri>sitemesh-page</taglib-uri>\n            <taglib-location>\n\
    \                /WEB-INF/tld/sitemesh-page.tld\n            </taglib-location>\n\
    \        </taglib>\n        <taglib>\n            <taglib-uri>sitemesh-decorator</taglib-uri>\n\
    \            <taglib-location>\n                /WEB-INF/tld/sitemesh-decorator.tld\n\
    \            </taglib-location>\n        </taglib>\n        <!-- End of SiteMesh\
    \ tag config -->\n    </jsp-config>\n</web-app>\n```\n\n作为最后一步，我将把布局包含在装饰器配置中，以便过滤器工作。清单\
    \ 3-56 显示了装饰器配置。\n\n**清单 3-56.** `WEB-INF/decorators.xml`\n\n```xml\n<decorators\
    \ defaultdir=\"/WEB-INF/decorators\">\n    <decorator name=\"primaryLayout\" page=\"\
