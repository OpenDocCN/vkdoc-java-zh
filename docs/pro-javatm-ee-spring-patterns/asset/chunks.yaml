    这个控制器效率低下，并且助长了过程式编程。每增加一个新功能，就不可避免地要添加一个 if-else 块。当时 eInsure 系统有数千个用例，其中承保模块占了很大比例。因此，控制器中充斥着大量的
    if-else 块，变得臃肿不堪。这个控制器表现出“胖魔法 Servlet”反模式（[`wiki.java.net/bin/view/Javapedia/`](http://wiki.java.net/bin/view/Javapedia/AntiPattern)


    [AntiPattern)](http://wiki.java.net/bin/view/Javapedia/AntiPattern) 的所有特征，试图执行过多的任务。它拦截请求，处理所有不同的服务请求，最后将响应转发给浏览器。


    这个控制器非常庞大，很快就超出了可管理的范围。随后，开发团队采用典型的克隆-修改编程风格，创建了一个名为 `UnderwritingControllerNew.jsp`
    的新控制器。但这个新控制器也很快变得臃肿，于是同样的步骤被重复，为又一个“新”控制器铺平了道路。其他模块，如会计、理赔等，情况也大同小异。每个模块都有多个控制器来处理该模块中可用功能的一个子集。


    基于面向对象组件的应用程序开发的主要目标之一是可重用性。但拥有过多的 JSP/Servlet 控制器只会助长过程式编程，并最大限度地降低可重用性。此外，应用程序拥有多个入口点会使其容易受到安全威胁。复制粘贴式的重用方式看似简单，但只有短期效益。它表面上节省了时间，但任何应用程序的修复都必须在所有重复的点上实施。诸如授权检查之类的通用服务也需要在所有控制器中复制。为了修复错误和进行维护，开发人员需要花费数小时来首先定位正确的控制器，然后找到合适的
    if-else 块，并理解遗留的数据结构和代码流程。结果是开发过程艰辛，并且浪费了不必要的精力。


    10092ch03.qxd 7/24/08 5:08 PM Page 45


    第 3 章 **■** 探索表示层设计模式


    **45**


    很明显，清单 3-2 中的 JSP 控制器试图执行三个主要任务：**1.** 拦截传入的请求。


    **2.** 调用企业 JavaBeans 组件，在多个 if-else 块中执行业务操作。


    **3.** 最后，选择要显示的下一个视图，并绑定由业务方法调用返回的模型对象。


    这类似于前面讨论过的 MVC 架构模式。然而，JSP 控制器组件承担了过多的职责，从而偏离了*单一职责原则*（SRP）。SRP 规定每个类应该只有一个职责，并且其所有功能都应紧密围绕这个职责。遵循单一关注点使得类健壮，并且被修改的可能性有限。SRP
    在 [`c2.com/cgi/`](http://c2.com/cgi)


    wiki?SingleResponsibilityPrinciple 有更详细的解释。


    你还应该考虑 JSP 是否是适合用作控制器的技术。这是因为 Java EE 平台中的每种技术都有其自身的角色。JSP 旨在成为一种动态视图技术。这使得用户界面代码可以由精通
    HTML 和 JavaScript 并了解一些 JSP 标签、脚本元素和隐式对象的开发人员编写。这些开发人员不必是经验丰富的 Java 程序员，从而解放了后者，让他们可以专注于编写业务逻辑和数据访问逻辑。因此，建议你将
    JSP 用作动态视图技术，而不是控制器。


    **驱动因素**


    •   过多的控制器使得维护和重用变得困难。

    •   整个应用程序应该有一个单一的入口点。

    •   控制器应遵循 SRP。它应该拦截请求，并将业务逻辑调用和视图选择委托给可插拔的组件。

    •   JSP 不应被用作控制器。

    •   在单一入口点周围以声明方式扩展功能。


    10092ch03.qxd 7/24/08 5:08 PM Page 46


    **46**


    第 3 章 **■** 探索表示层设计模式


    **解决方案**


    部署一个 Servlet 作为所有 Web 请求的单一公共网关。这个 Servlet 被称为*前端控制器* Servlet。有时这种模式也被称为网关 Servlet。


    Spring 框架中的策略


    Spring MVC 框架提供了一个开箱即用的前端控制器 Servlet，名为 `DispatcherServlet`。这个中央 Servlet 构成了 Spring
    MVC 框架的骨干，并与 Spring IOC 容器集成。因此，可以获得 Spring IOC 容器提供的所有好处。


    `DispatcherServlet` 拦截来自客户端的所有 Web 请求，并将它们路由到适当的页面控制器。页面控制器是简单的 POJO，负责与业务层组件交互。它们在
    Spring 容器中注册，并实现了 GOF 命令模式。页面控制器将在本章后面详细讨论。简而言之，前端控制器 Servlet 和页面控制器协同工作，构成了事件驱动
    Web 应用程序的核心。前端控制器没有任何 if-else 块。所有 if-else 块中的代码都被移到了页面控制器中。因此，前端控制器是一个可以在应用程序间重用的通用组件。


    前端控制器 Servlet 将选择下一个视图和绑定模型对象的职责委托给专门的视图管理器。这使得 `DispatcherServlet` 可以专注于单一职责：拦截请求，然后将其余功能委托给专门的处理器。因此，通用的前端控制器有助于减少控制器的数量。整个应用程序使用一个控制器
    Servlet 就足够了。这是可行的，因为可以通过简单的配置使页面控制器和视图管理器对前端控制器可访问。然而，一些设计者也倾向于每个模块使用一个前端控制器。这只是选择问题，但无论哪种情况，都要避免每个模块有多个控制器。


    **使用前端控制器**


    现在我将展示如何使用 Spring 的 `DispatcherServlet`。我还将讨论如何在此过程中重构有坏味道的 JSP。我倾向于为整个应用程序使用一个控制器，以最大限度地减少配置维护的开销。与所有
    Servlet 一样，使用 `DispatcherServlet` 的第一步是在 `web.xml` 文件中配置它。


    清单 3-3 中的代码将前端控制器 Servlet 注册到 Web 服务器。


    10092ch03.qxd 7/24/08 5:08 PM Page 47


    第 3 章 **■** 探索表示层设计模式


    **47**


    **清单 3-3.** web.xml


    <web-app>


    <servlet>


    <servlet-name>insurance</servlet-name>


    <servlet-class>


    org.springframework.web.servlet.DispatcherServlet


    </servlet-class>


    <load-on-startup>1</load-on-startup>


    </servlet>


    <servlet-mapping>


    <servlet-name>insurance</servlet-name>


    <url-pattern>*.do</url-pattern>


    </servlet-mapping>


    </web-app>

