    class="com.apress.insurance.web.controller.SaveClaimController" />


    </beans>


    10092ch03.qxd 7/24/08 5:08 PM Page 94


    **94**


    C H A P T E R 3 **■** E X P L O R I N G P R E S E N TAT I O N T I E R D E S I
    G N PAT T E R N S


    Thus, a throwaway controller is a combination of form bean and page controller.


    Note that its independence from the Servlet API increases reusability and makes
    this controller easier to unit test. But it has some disadvantages too. Since
    this is a stateful controller, a new instance should be created for each request.
    This in turn wastes space on the JVM heap, increasing the need for garbage collection
    and the resulting pauses.


    However, with a modern well-tuned JVM, this is not a major problem. This controller
    is very simple, without any detailed workflow. It does not support validation
    of form fields.'
  trans: '

    • *陡峭的学习曲线*：使用 Spring 时，MVC 控制器支持提供了大量选项。因此，开发者需要了解众多接口和抽象类，才能做出恰当的设计决策。


    • *难以维护*：现在，每个用例对应一个页面控制器。在大型应用中，这会导致控制器类数量庞大，难以管理和维护。


    **上下文对象**


    **问题**


    eInsure 有一个产品工作台，供业务分析师和产品设计师设计并推出保险产品。简而言之，一个保险产品定义了一组规则，用于承保特定类别的保单。eInsure
    的一位客户希望获得该产品工作台模块的离线版本。此应用程序将安装在业务分析师使用的笔记本电脑上。这将使他们即使在离线状态下也能制定产品细节，并在最终发布规则集之前，稍后与主数据库同步。


    对于这个离线应用程序，有两种选择。一种是基于 Java Swing 的桌面软件，另一种是在嵌入式 Web 服务器上运行并带有同步功能的同一 eInsure
    应用程序。我们的客户倾向于第一种方案。


    由于 eInsure 正在重构以使用 Spring 框架，我们最初认为大部分代码库（除了表示层的视图组件）都是可重用的。


    eInsure 团队对迁移到 Spring 感到高兴，因为这个 Swing 应用程序可以轻松地在容器外运行。


    但很快，当我们发现甚至连页面控制器都无法重用时，我们的高期望变成了失望。原因是表示层代码与 HTTP 协议和 Servlet API 紧密耦合。页面控制器实现了
    Controller 接口，并在此过程中大量使用了 `HttpServletRequest` 和 `HttpServletResponse` 对象。这些对象用于从表单提交中提取数据。结果导致一组页面控制器无法在
    Web 应用程序之外重用。开发团队别无选择，只能从头构建应用程序，造成了不必要的精力消耗。


    10092ch03.qxd 7/24/08 5:08 PM Page 91


    第 3 章 **■** 探索表示层设计模式


    **91**


    **驱动力**


    • 不要让特定于协议的 API 使用渗透到某一层的深处。这种侵入会降低可重用性，从而污染应用程序代码。


    • 确定使用特定于协议代码的适当上下文。在这种情况下，特定于协议代码的使用应仅限于前端控制器，或最多是应用控制器。


    • 提高页面控制器的可重用性。


    • 使页面控制器成为易于测试的组件。


    **解决方案**


    使用*上下文对象*来封装和共享表单数据，而无需任何协议依赖。


    Spring 框架中的策略


    在讨论页面控制器模式时，我确实尝试过摆脱特定于协议代码的耦合。但由于 `SimpleFormController` 继承自与 `HttpServletRequest`
    和 `HttpServletResponse` 对象关联的控制器，运行时依赖关系仍然存在。因此，无法在 Web 容器之外使用此控制器。


    然而，Spring MVC 提供了一个独立于任何特定于协议细节的控制器。`ThrowawayController` 接口完全不了解特定于 Servlet 的
    API。其实现类类似于 JSF 管理的 Bean，其属性映射到 HTML 表单字段。它还需要实现一个单一的 `execute` 方法，该方法应用于调用业务逻辑。仅当所有属性设置成功且没有数据转换错误时，处理程序适配器才会调用此方法。由于
    `ThrowawayController` 属于与其他控制器不同的类层次结构，执行这些控制器需要一个名为 `ThrowawayControllerHandlerAdapter`
    的特定处理程序适配器。但是，无需显式配置此处理程序适配器，因为它与 `SimpleControllerHandlerAdapter` 一起被假定为默认值。


    10092ch03.qxd 7/24/08 5:08 PM Page 92


    **92**


    第 3 章 **■** 探索表示层设计模式


    清单 3-34 展示了 `ThrowawayController` 的实现。它为每个属性定义了 getter/setter 组合来映射表单字段。处理程序适配器使用
    Servlet API 提取表单字段值，并将它们映射到此控制器的属性。这使得控制器可重用且不受协议特定细节的影响。它完全可以与 Swing 组件以及适当的处理程序适配器一起使用。


    **清单 3-34.** SaveClaimController.java


    ```java

    public class SaveClaimController implements ThrowawayController {


    private String claimantName;


    private String policyNo;


    private String productCd;


    public ModelAndView execute() throws Exception {


    //在此处调用业务逻辑


    return new ModelAndView("claimDetails");


    }


    public String getClaimantName() {


    return claimantName;


    }


    public void setClaimantName(String claimantName) {


    this.claimantName = claimantName;


    }


    public String getPolicyNo() {


    return policyNo;


    }


    public void setPolicyNo(String policyNo) {


    this.policyNo = policyNo;


    }


    public String getProductCd() {


    return productCd;


    }


    public void setProductCd(String productCd) {


    this.productCd = productCd;


    }


    }

    ```


    清单 3-35 展示了映射到刚才展示的一次性控制器的 JSP。


    10092ch03.qxd 7/24/08 5:08 PM Page 93


    第 3 章 **■** 探索表示层设计模式


    **93**


    **清单 3-35.** WEB-INF/jsp/createClaim.jsp


    ```jsp

    <html>


    <head>


    <title>新建索赔</title>


    </head>


