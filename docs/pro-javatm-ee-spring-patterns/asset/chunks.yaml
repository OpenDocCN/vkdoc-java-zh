- fmt: "# The Session Facade Pattern and Application Service\n\nThe session facades\
    \ run in the EJB container. As a result, they were difficult to unit test. A prospective\
    \ client of eInsure could not afford commercial application server licenses. Hence,\
    \ they wanted to deploy this application on open source products. Their team was\
    \ already using an Apache Tomcat and ObjectWeb JOTM-based platform to run a few\
    \ applications. Hence, they wanted to leverage the Tomcat web server with the\
    \ JDBC-based transaction-processing capabilities of the JOTM transaction monitor.\
    \ However, because the all-important business tier of eInsure was tightly coupled\
    \ to SLSB, it would be a painful and effort-intensive activity to successfully\
    \ run eInsure without an EJB container support.\n\n## Forces\n\n- Session bean\
    \ development requires experienced developers with sound knowledge of EJBs and\
    \ application servers.\n- The session facade should act only as a gateway to the\
    \ business tier and delegate the actual business logic execution to helpers. It\
    \ should declaratively subscribe to container services.\n- Session facades should\
    \ not grow to an unmanageable proportion.\n- Business logic should run outside\
    \ an EJB container.\n- Business logic should be easy to unit test.\n\n## Solution\n\
    \nUse an *application service* to concentrate business logic in POJO classes.\n\
    \n## Strategies with the Spring Framework\n\nAlthough it is quite legitimate to\
    \ put the business logic code in session facades, it is not the best approach.\
    \ You will be better served by moving the business logic to POJO components and\
    \ letting the session facade delegate to these POJOs. This will free up the session\
    \ facade. It can now act as the gateway to the remotely accessible business tier.\n\
    \nSince the business logic is now moved to POJO, it is easier to unit test. The\
    \ POJO application services sit behind the SLSB gateway and so can also leverage\
    \ robust infrastructure support such as transactions. In other words, all POJO\
    \ methods that are invoked from the session facade will be part of the same transaction\
    \ scope. Moving business logic to POJO components also reduces the effort that\
    \ will be required to run an application like eInsure in a web container.\n\n\
    The first step to writing an application service is to define an interface following\
    \ the P2I principle. Listing 4-21 shows the `UnderwritingApplicationService` interface.\n\
    \n**Listing 4-21.** `UnderwritingApplicationService.java`\n\n```java\npackage\
    \ com.apress.einsure.business.api;\n\npublic interface UnderwritingApplicationService\
    \ {\n\n    public void underwriteNewPolicy(String productCd, String name, int\
    \ age);\n\n}\n```\n\nListing 4-22 shows the application service implementation\
    \ class. Note that this class does not use entity beans for persistence needs.\
    \ Instead, it uses lightweight data access objects for persistence. You will learn\
    \ more about data access objects in Chapter 5.\n\n**Listing 4-22.** `UnderwritingApplicationServiceImpl.java`\n\
    \n```java\npackage com.apress.einsure.business.impl;\n\npublic class UnderwritingApplicationServiceImpl\
    \ implements\n        UnderwritingApplicationService {\n\n    private PolicyDetailDao\
    \ policyDetailDao;\n\n    public void underwriteNewPolicy(String productCd, String\
    \ name, int age) {\n        //business validation - is this age allowed for this\
    \ product\n        this.policyDetailDao.savePolicyDetails(productCd, name, age);\n\
    \    }\n\n    public PolicyDetailDao getPolicyDetailDao() {\n        return policyDetailDao;\n\
    \    }\n\n    public void setPolicyDetailDao(PolicyDetailDao policyDetailDao)\
    \ {\n        this.policyDetailDao = policyDetailDao;\n    }\n\n}\n```\n\nThe `PolicyDetailDao`\
    \ is injected in the application service by the Spring container. The data access\
    \ object also needs a data source to save data. This is shown in the EJB application\
    \ context configuration in Listing 4-23.\n\n**Listing 4-23.** `Underwriting-beans.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
    >\n\n    <bean id=\"uwrBusinessService\"\n        class=\"com.apress.einsure.business.impl.UnderwritingApplicationServiceImpl\"\
    >\n        <property name=\"policyDetailDao\" ref=\"policyDetailDao\"/>\n    </bean>\n\
    \n    <!-- Data access object -->\n    <bean id=\"policyDetailDao\"\n        class=\"\
    com.apress.einusre.persistence.dao.impl.PolicyDetailDaoImpl\">\n        <property\
    \ name=\"dataSource\" ref=\"datasource\"/>\n    </bean>\n\n    <!-- Lookup JNDI\
    \ bound datasource -->\n    <bean id=\"datasource\" class=\"org.springframework.jndi.JndiObjectFactoryBean\"\
    >\n        <property name=\"jndiName\" value=\"einsureDatasource\" />\n      \
    \  <property name=\"jndiEnvironment\">\n            <props>\n                <prop\
    \ key=\"java.naming.factory.initial\">\n                    org.jnp.interfaces.NamingContextFactory\n\
    \                </prop>\n                <prop key=\"java.naming.provider.url\"\
    >\n                    jnp://localhost:1099\n                </prop>\n       \
    \         <prop key=\"java.naming.factory.url.pkgs\">\n                    org.jboss.naming.client\n\
    \                </prop>\n            </props>\n        </property>\n    </bean>\n\
    \n</beans>\n```\n\nYou will need to alter the session facade (shown earlier in\
    \ Listing 4-17) to delegate to the application service that implements the business\
    \ logic. Listing 4-24 shows the modified implementation class. Note that the `onEjbCreate`\
    \ method now gets involved in doing something useful. It retrieves the POJO business\
    \ service object from the Spring application context associated with this EJB.\
    \ The constant in the business interface supplies the value of the key used to\
    \ look up the application service bean.\n\n**Listing 4-24.** `UnderwritingRemoteBean.java`\n\
    \n```java\npublic class UnderwritingRemoteBean extends AbstractStatelessSessionBean\
    \ {\n\n    private final String SERVICE_BEAN_KEY = \"uwrAppService\";\n    private\
    \ UnderwritingApplicationService uwrAppService;\n\n    public void underwriteNewPolicy(String\
    \ productCd, String name, int age)\n            throws RemoteException {\n   \
    \     //delegate to application service\n        uwrAppService.underwriteNewPolicy(productCd,\
    \ name, age);\n    }\n\n    protected void onEjbCreate() throws CreateException\
