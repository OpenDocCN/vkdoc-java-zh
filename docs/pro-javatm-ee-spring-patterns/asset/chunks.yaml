    # About the Technical Reviewer


    **■PROSENJIT BHATTACHARYYA** has been working with software ever since he was
    introduced to computers during his early school days. Starting with BASIC and
    Logo, he soon graduated to C, C++, and Java. Currently he concentrates on designing
    enterprise solutions based on the Java EE platform. An ardent supporter of open
    source, Prosenjit contributes to the community through his open source projects—JavaTrace
    and Dissect Framework—hosted on SourceForge. His enthusiasm about open source
    has earned him the sobriquet of “open source evangelist” amongst his acquaintances.
    Working for companies such as BEA Systems, Oracle Corporation, and IBM has enriched
    his experience and honed him into a thoroughbred software professional. Prosenjit’s
    hobbies include playing the guitar and working on the pit crew of an amateur racing
    team. He hopes to have his own racing team in the near future. Prosenjit can be
    contacted at [prosenjit.bhattacharyya@gmail.com.](mailto:bhattacharyya@gmail.com)


