    authenticationFailureUrl 中设置的 URL。


    在此示例中，用户被重定向到登录页面。authenticationFailureUrl 中指定的 errorId 会标记清单 6-5 中的 login.jsp
    文件，以显示因身份验证失败而产生的错误消息。


    Spring Security 通过 ProviderManager 类提供了一种自定义的身份验证管理器实现。该类又进一步委托给身份验证提供者。身份验证提供者是底层身份验证技术的适配器。通过这种策略，可以针对任何身份管理系统进行身份验证。

