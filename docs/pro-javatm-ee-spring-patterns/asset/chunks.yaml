    DataSourceTransactionManager 与 javax.sql.DataSource 对象一起工作。它确保从 DataSource 中检索到相同的
    Connection 对象并在事务中使用。如果事务成功，则在 Connection 对象上调用 commit 方法。如果事务失败，则将使用 rollback
    方法。简而言之，此事务管理器将实际的事务处理委托给数据库。


    **Hibernate 事务**


    如果你的应用程序使用 Hibernate ORM 来管理持久化，则可以使用 HibernateTransactionManager 来管理事务。此事务管理器与
    Hibernate SessionFactory 对象一起工作。它将事务处理委托给从 Hibernate Session 对象检索到的 org.hibernate.Transaction
    对象。根据事务成功或失败，将分别在此 Transaction 对象上调用 commit 和 rollback 方法。HibernateTransactionManager
    在 Spring 配置中装配，如清单 6-27 所示。


