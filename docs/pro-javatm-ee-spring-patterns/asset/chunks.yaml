- fmt: "```xml\n<value=\"com.apress.einsure.business.ejbfacade.UnderwritingLocalHome\"\
    \ />\n</bean>\n\n<bean id=\"claimSlsbLocalHome\" parent=\"lazyJndiObjectFactoryBean\"\
    >\n    <property name=\"jndiName\" value=\"ClaimBeanLocal\" />\n    <property\
    \ name=\"proxyInterface\" value=\"com.apress.einsure.business.ejbfacade.ClaimLocalHome\"\
    \ />\n</bean>\n</beans>\n```\n\nSpring 2.x introduces the new `jee` tag, which\
    \ makes it even simpler to look up JNDI objects.\n\nListing 4-10 shows how you\
    \ can use this new tag to look up the stateless session beans. Note that in order\
    \ to use this tag, you need to modify the configuration file to include the `jee`\
    \ namespace and schema location.\n\n**Listing 4-10.** `insurance-servlet.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xmlns:jee=\"\
    http://www.springframework.org/schema/jee\"\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\n    http://www.springframework.org/schema/jee\n\
    \    http://www.springframework.org/schema/jee/spring-jee-2.5.xsd\">\n    \n \
    \   <!-- local ejb lookup -->\n    <jee:jndi-lookup id=\"uwrSlsbLocalHome\"\n\
    \        cache=\"false\"\n        lookup-on-startup=\"false\"\n        jndi-name=\"\
    UnderwritingBeanLocal\"\n        proxy-interface=\"com.apress.einsure.business.ejbfacade.UnderwritingLocalHome\"\
    \ />\n    \n    <jee:jndi-lookup id=\"uwrSlsbRemoteHome\" jndi-name=\"UnderwritingBeanRemote\"\
    >\n        <!-- newline-separated, key-value pairs for the environment -->\n \
    \       <jee:environment>\n            java.naming.factory.initial=org.jnp.interfaces.NamingContextFactory\n\
    \            java.naming.provider.url=jnp://localhost:1099\n            java.naming.factory.url.pkgs=org.jboss.naming.client\n\
    \        </jee:environment>\n    </jee:jndi-lookup>\n</beans>\n```\n\nAnother\
    \ important aspect of the `JndiObjectFactoryBean` is the support for unit testing.\
    \ It makes it easy to test components out of the container. You can do this by\
    \ setting the `defaultObject` property. It is the fallback object, in case the\
    \ JNDI service or JNDI bound objects are unavailable. Listing 4-11 shows how to\
    \ use the fallback object.\n\n**Listing 4-11.** `insurance-servlet.xml`\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
    >\n    \n    <!-- Other beans -->\n    <bean name=\"uwrbusinessPOJO\"\n      \
    \  class=\"com.apress.einsure.business.UwrBusinessServiceImpl\" />\n    \n   \
    \ <bean name=\"uwrSlsbHome\"\n        class=\"org.springframework.jndi.JndiObjectFactoryBean\"\
    >\n        <property name=\"jndiName\" value=\"uwrbusinessslsb\" />\n        <property\
    \ name=\"defaultObject\" ref=\"uwrbusinessPOJO\" />\n        <property name=\"\
    jndiEnvironment\">\n            <props>\n                <prop key=\"java.naming.factory.initial\"\
    >org.jnp.interfaces.NamingContextFactory</prop>\n                <prop key=\"\
    java.naming.provider.url\">jnp://localhost:1099</prop>\n                <prop\
    \ key=\"java.naming.factory.url.pkgs\">org.jboss.naming.client</prop>\n      \
    \      </props>\n        </property>\n    </bean>\n</beans>\n```\n\nIt must be\
    \ noted that the `JndiObjectFactoryBean` is a convenient way to look up JNDI objects.\
    \ But the recommended approach is to use a proxy factory bean that effectively\
    \ combines the service locator with dependency injection. You will learn about\
    \ this strategy in connection with the Business Delegate pattern.\n\n## Consequences\n\
    \n**Benefits**\n\n- The Service Locator pattern abstracts the complex lookup mechanism\
    \ associated with service objects. This adds flexibility because the service clients\
    \ are freed from the lookup code.\n- JNDI lookup is achieved by mere configuration\
    \ with the Spring Framework."
