- fmt: '<%@ [taglib prefix="fmt" uri="http://java.sun.com/jsp/jstl/fmt" %>](http://java.sun.com/jsp/jstl/fmt)


    ```html

    <html>

    <head>

    <title>LoV - Product</title>

    </head>

    <body>

    <table>

    <tr>

    <td>Product Id</td>

    <td>Product Name</td>

    </tr>

    <c:forEach var="productDtl" items="${applicationScope.productDtlList}" >

    <tr>

    <td><c:out value="${productDtl.productId}"/></td>

    <td><c:out value="${productDtl.productName}"/></td>

    </tr>

    </c:forEach>

    </table>

    </body>

    </html>

    ```


    As shown in Listing 3-58, we are using a JSTL-based view helper to retrieve and
    present the data stored in application scope. `applicationScope` is an implicit
    object available with the JSTL Expression Language, and it gives a handle to the
    servlet context. In Listing 3-58, it looks for an attribute with the key `productDtlList`
    in the servlet context.


    To use this semistatic view, you need to slightly alter the configuration, as
    shown in Listing 3-59. Note that the `SimpleUrlHandlerMapping` has been configured
    to handle `UrlFilenameViewController`.


    **Listing 3-59.** `ProductLoV.jsp`


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>

    <beans

    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

    xsi:schemaLocation="http://www.springframework.org/schema/beans

    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd"

    >

    <!-- other beans as above -->

    <bean name="staticViewController"

    class="org.springframework.web.servlet.mvc.UrlFilenameViewController" >

    <property name="prefix" value="help/" />

    </bean>

    <bean name="semiStaticViewController"

    class="org.springframework.web.servlet.mvc.UrlFilenameViewController" >

    <property name="prefix" value="lookup/" />

    </bean>

    <bean

    class="org.springframework.web.servlet.handler.SimpleUrlHandlerMapping">

    <property name="mappings">

    <props>

    <prop key="/*Help.do">staticViewController</prop>

    <prop key="/*LoV.do">semiStaticViewController</prop>

    </props>

    </property>

    </bean>

    </beans>

    ```


    ## Consequences


    ### Benefits


    - **Foster best practice**: This lays down clear guidelines for combining presentation
    tier patterns.

    - **Easy to implement**: It is easy to implement this solution in Spring because
    we hardly need to write any code; everything is glued together using configuration.


    ### Concerns


    - **Overcomplex solution**: Dispatching to a static or semistatic view is a simple
    task. But still there is dependency on layering and various framework-specific
    components to maintain a consistent application architecture. This is a complex
    solution to a simple task.


    ## Service to Worker


    ### Problem


    The Dispatcher View pattern sets the guidelines for dispatching control to a static
    view. In the case of eInsure, these constituted only a handful of use cases. A
    vast majority of the use cases, however, required a dynamic view prepared from
    dynamic data.


    However, since this product was migrated from legacy PL/SQL it had data access
    code being invoked from page controllers. Since the product was implemented at
    several clients and required quick turnarounds, developers would resort to quick
    fixes. They would mix business logic with data access in page controllers, leading
    to a poorly designed solution.


    ### Forces


    - The application primarily needs to handle a dynamic view generated using dynamic
    data.

    - Business or data access code are mixed in action handlers.

    - The business logic and data access code should be placed in separate layers.


    ### Solution


    Use *server to worker* to coordinate request processing workflow by invoking components
    in different layers.


    ### Strategies with the Spring Framework'
