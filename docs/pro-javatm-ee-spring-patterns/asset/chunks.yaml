- fmt: '# Server to Worker Pattern


    Just like `Dispatcher View`, `Server to Worker` is essentially a guideline for
    building layered Java EE applications. It is similar to the MVC architectural
    pattern and proposes that the application must be divided into distinct layers
    corresponding to specific roles in a request-processing workflow.


    `Server to Worker` effectively is an extension of the `Dispatcher View` pattern.
    Just like `Dispatcher View`, it allows the organization of patterns in the presentation
    tier, with two differences. On one hand, it allows working with a dynamic view.
    On the other hand, it invokes business logic before passing control to view. The
    business logic must be accessed to retrieve the data required for the dynamic
    view. `Server to Worker` paves the way for connecting presentation and business
    layers. The bridge between the two layers is provided by the `Business Delegate`
    pattern, which we will explore in the next chapter.


    The page controllers typically do not directly invoke methods on the actual business
    objects. Rather, it invokes methods on the bridge or presentation tier proxy called
    the `business delegate object`. As shown earlier in listings, the business delegate
    is injected into the controller by the Spring container. The sequence diagram
    (Figure 3-19) shows the complete workflow of a `Server to Worker` pattern.


    ![Image 41](index-154_1.png)


    **Figure 3-19.** *Service to worker sequence diagram*


    ## Consequences


    ### Benefits


    - **Foster best practice**: This lays down clear guidelines for combining presentation
    tier patterns. It also provides the directive to connect business components from
    page controllers only.

    - **Easy to implement**: It is easy to implement this solution in Spring because
    everything is glued together using configuration once most of the custom components
    are ready. Spring also provides extensive support for building these custom components
    quickly and easily.

    - **Role separation**: With the guidelines set clearly, the task of application
    development can be distributed among page authors working on the view and application
    developers concentrating on page controllers and business components.


    ### Concerns


    - **Performance concern**: Too many layers and too much delegation can degrade
    performance. So, designers must be careful when deciding the layers and components
    to use.


    ## Summary


    In this chapter, I have extensively explored various presentation tier patterns.
    We started off at one end of the spectrum and finished at the other end, setting
    the stage for business layer patterns in Chapter 4. The `Front Controller` pattern
    intercepted all requests and delegated to the action handlers in the `Application
    Controller` pattern. The action handlers work with the `Context Object` and `Page
    Controller` patterns to invoke business logic. Once the page controller selects
    the logical view and returns the data retrieved from business logic invocation,
    control is passed back to the application controller. The application controller
    uses view management components to resolve the appropriate physical view and binds
    the application data. The `View Helper` pattern assists in adapting the application
    data in the views and builds composite views to send the final response for end
    user display. The working of the front controller and page controllers can be
    decorated with the `Intercepting Filter` pattern and handler interceptors. The
    `Dispatcher View` pattern provides the guidelines to combine all the presentation
    tier patterns to delegate efficiently to static views. Finally, the `Service to
    Worker` pattern paves the way for interaction with the business layer using the
    `Business Delegate` pattern.'
