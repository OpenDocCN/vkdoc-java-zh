    generally ignored or are mostly afterthoughts. Security design is of utmost importance
    for any enterprise application, and much has been written on this subject. This
    is especially important for Java EE applications because they service a variety
    of clients. The Authentication and Authorization Enforcer pattern can be used
    to prevent any malicious access to system resources. With out-of-the-box support
    from Spring Security, you can set up a security layer with mere configuration.'
