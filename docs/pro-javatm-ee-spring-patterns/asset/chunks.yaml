  trans: '

    这也大大降低了基于服务器的分布式计算的优势。使用客户端层编程式事务来开发、测试和维护应用程序是复杂的任务。


    在第四章中，我提到 eInsure 的一个客户希望我们将整个应用程序部署在 Apache Tomcat 上，这是一个 Web 服务器和 Servlet 容器。Tomcat
    没有 EJB 容器。因此，EJB 在 Tomcat 中无法工作，也没有事务管理支持。一个直接的选择是使用基于 JDBC 的事务支持。但这会很繁琐，并且需要编写和重构大量代码。另一个解决方案是使用开源事务监控器，例如
    ObjectWeb JOTM 或 Atomikos Essentials。但使用它们会带来与客户端管理事务相同的问题。


    **影响因素**


    •   尽可能避免客户端管理的事务。


    •   支持声明式事务管理，使其能够透明地应用。


    •   声明式事务管理也应在 EJB 容器之外工作。


    **解决方案**


    部署一个*领域服务所有者事务*，以在 EJB 容器内外声明式地应用事务。


