- fmt: "One such alternative is its support for the Burlap and Hessian remoting protocols\
    \ from Caucho. `Hessian` supports binary data exchange over HTTP. I will concentrate\
    \ on `Burlap`, which allows simple text and XML-based data transfer. It is just\
    \ a matter of configuration to export a Spring service for access through the\
    \ `Burlap` protocol. To do that, I will need to ensure that the dispatcher servlet\
    \ handles `Burlap` remoting. This requires some alteration in the web application\
    \ configuration file, as shown in Listing 5-38.\n\n**Listing 5-38.** `web.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<web-app version=\"2.4\"\
    \n    xmlns=\"http://java.sun.com/xml/ns/j2ee\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://java.sun.com/xml/ns/j2ee\n    http://java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\"\
    >\n\n    <servlet>\n        <servlet-name>insurance</servlet-name>\n        <servlet-class>\n\
    \            org.springframework.web.servlet.DispatcherServlet\n        </servlet-class>\n\
    \        <load-on-startup>1</load-on-startup>\n    </servlet>\n\n    <servlet-mapping>\n\
    \        <servlet-name>insurance</servlet-name>\n        <url-pattern>*.do</url-pattern>\n\
