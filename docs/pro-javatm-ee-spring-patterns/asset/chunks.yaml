    servlet has been configured to handle all requests ending with .do in the URL.
    If you are an experienced Java EE developer and have worked with the Apache Struts
    framework, you will immediately see its similarity to the ActionServlet.


    On initialization, the DispatcherServlet looks for a configuration file with the
    naming convention <servlet-name>-servlet.xml in the WEB-INF folder of the web
    application. This XML file contains the configuration information about all the
    beans, including the page controllers and view managers that will be managed by
    the Spring IOC container. The front controller loads this file to start the Spring
    web application context and get access to the Spring IOC container. In our case,
    this file will be named insurance-servlet.xml.


    This is shown in Listing 3-4 with only the page controllers.


    **Listing 3-4.** insurance-servlet.xml


    <?xml version="1.0" encoding="UTF-8"?>


    <beans


    [xsi:schemaLocation="http://www.springframework.org/schema/beans](http://www.w3.org/2001/XMLSchema-instance)


    [http://www.springframework.org/schema/beans/spring-beans-2.5.xsd">](http://www.w3.org/2001/XMLSchema-instance)


    <bean name="/createPolicy.do"


    class="com.apress.insuranceapp.web.CreatePolicyController"/>


    <bean name="/updatePolicy.do"


    class=" com.apress.insuranceapp.web.UpdatePolicyController"/>


    </beans>


    10092ch03.qxd 7/24/08 5:08 PM Page 48


    **48**


    C H A P T E R 3 **■** E X P L O R I N G P R E S E N TAT I O N T I E R D E S I
    G N PAT T E R N S


    The DispatcherServlet uses the BeanNameUrlHandlerMapping class to map an incoming
    request URL to the appropriate page controller that is going to process that request.
    The handler mapping bean, however, is not configured in Listing 3-4\. This is
    because Spring assumes this as a sensible default. As we will see later, it is
    possible to use different logic to map an incoming request to its handler by implementing
    the HandlerMapping interface.


    I will discuss other HandlerMapping implementations provided by the Spring Framework
    later in this chapter.


    With the central request-handling gateway installed, it’s time to refactor the
    JSP


    described in Listing 3-1 to route all requests to the front controller. This is
    shown in Listing 3-5.


    **Listing 3-5.** Policy.jsp


    <title>Underwriting</title>


    <script>


    function eventSubmit(url){


    document.uwr.action = url;


    document.uwr.submit();


    }


    </script>


    </head>


    <body onLoad="displayError(<%=request.getAttribute("ERROR_MESSAGE")%>)">


    <form action="" name="uwr">


    Name of Insured <input type="text" value="" />


    <br/>


    <input type="submit" value="Create" onClick="eventSubmit(''createPolicy.do'')"/>


    <input type="submit" value="Update" onClick="eventSubmit(''updatePolicy.do'')"/>


    </form>


    Note that the JSP no longer uses the event code and screen code. Instead, it now
    uses logical request URLs. When a request for the URL /createPolicy.do reaches
    the front controller, it uses the handler mapping to determine whether a page
    controller has been registered to process this request. The processing is then
    delegated to the appropriate page controller if one is registered; otherwise,
    an error is raised. In this case, the processing is carried out by the CreatePolicyController.
    The simplest controller would implement the handleRequest method of the org.springframework.web.servlet.mvc.Controller
    interface. The handleRequest method should have most of the code that was in the
    if-else block of the JSP controller. Simply stated, this controller will take
    care of the code in the if-else blocks. After the business components are invoked
    and page controllers return,


    ![Image 23](index-71_1.png)


    10092ch03.qxd 7/24/08 5:08 PM Page 49


    C H A P T E R 3 **■** E X P L O R I N G P R E S E N TAT I O N T I E R D E S I
    G N PAT T E R N S


    **49**


    the next view is selected with the help of view managers. The simplified sequence
    diagram in Figure 3-1 shows the interaction between the front controller, the
    page controller, and the view resolver. I will explain this diagram in greater
    detail in the subsequent sections.


    **Figure 3-1.** *Sequence diagram: front controller request flow* It is evident
    from Figure 3-1 that the doDispatch is the most important method in DispatcherServlet.
    It orchestrates and invokes the page controller and view. The InternalResourceView
    class is responsible for abstracting a JSP-based view.


    **Consequences**


    Benefits


    • *Out-of-the-box front controller*: The Spring MVC provides a ready-made front
    controller that can be used in the application by mere configuration.


    • *Centralized control*: The front controller provides a central entry point to
    consolidate and control the request inflow into the application. This makes it
    simpler to manage the application.


    10092ch03.qxd 7/24/08 5:08 PM Page 50


    **50**


    C H A P T E R 3 **■** E X P L O R I N G P R E S E N TAT I O N T I E R D E S I
    G N PAT T E R N S


    • *Simplified design*: The front controller now abides by SRP because it is involved
    only in intercepting requests and delegating to specialized classes.


    • *Promotes reusability*: The introduction of the front controller removes the
    module controllers and immensely improves reusability.


    Concerns


    • *Single point of failure*: The front controller is also a single point of failure
    for any application.


    **Application Controller**


    **Problem**


    The JSP controller presented while discussing the Front Controller pattern was
    intended to perform the following tasks related to request processing:


    **1.** Intercept incoming requests.


    **2.** Invoke business components.


    **3.** Identify and redirect to the next view.


    The Front Controller design pattern solved the first problem. As with the JSP
    controller, it is entirely possible to build the two other functions in the front
    controller. But that would result in a highly inflexible, fat, magic front controller
    that handles too many responsibilities. As the application grows, it becomes an
    uphill task to maintain and use such complex and specific front controllers. This
    was exactly the problem with the JSP-based controller used in the eInsure application.


    A new customer wanted to integrate their existing re-insurance product, built
    on the WebWork 2.0 framework, with eInsure. The integration soon ran into heavy
    weather because the controller was never designed to cater to this kind of requirement.
    Another existing client of eInsure demanded a new feature called *policy quotation*.
    This feature would enable the potential customers of this insurance company to
    get an approximate value of the premium they needed to pay for a new policy. For
    this they would use their mobile devices to connect to the system and supply the
    minimal information required to generate the quote—or tentative premium value.


    10092ch03.qxd 7/24/08 5:08 PM Page 51


    C H A P T E R 3 **■** E X P L O R I N G P R E S E N TAT I O N T I E R D E S I
    G N PAT T E R N S


    **51**


    The monolithic eInsure controller was coded to use only JSP as the view technology.


    Hence, it was inflexible, and supporting a new view suitable for mobile devices
    was very difficult.


    The new features discussed in the previous two paragraphs can be better managed
    with a strategy of “divide and conquer.” This involves employing pluggable components
    with the front controller that are specialized to handle specific tasks. Two such
    important components are the following:


    • *Action handler*: The action handler locates and executes the appropriate page
    controller. The page controllers decouple business logic invocation from the front
    controller. So, the WebWork 2.0 page controllers can be used with the front controller
    by implementing WebWork-specific action handler components.'
