    # Acknowledgments


    **I** would like to take this opportunity to thank a few people whose ideas, inspirations,
    and diligence have contributed significantly to this book. First and foremost,
    I thank Steve Anglin for providing me with the opportunity to author this book.
    We started with a completely different idea way back in September 2007. Later
    it was Steve who came up with the idea to merge the Spring Framework and Java
    EE design patterns.


    I am indebted to Prosenjit Bhattacharyya and Tom Welsh for the hours they spent
    on the technical review. Prosenjit is my old buddy since college days, and his
    objective feedback (especially for Chapter 7) helped give complete shape to each
    chapter in this book.


    I have learned a lot from Tom about writing in general. Tom’s guidance proved
    very important in presenting and elaborating on the topics correctly, in a clear
    and concise manner.


    This section would be incomplete without mentioning Kylie Johnston. Kylie has
    been the most patient and cooperative project manager. I must admit that this
    book probably would not have seen the light of day without her. I missed the deadlines
    for chapter submissions throughout the duration of this project. But Kylie always
    kept things on track by reminding me about the deadlines time and again yet also
    ensuring that a high-quality deliverable was produced. I must also thank Kim Wimpsett,
    Laura Cheu, and Elizabeth Berry for their fabulous work during production.


    I am also grateful to my former colleagues at Cognizant Technology Solutions—Suman
    Ray and Somnath Chakraborty—for guiding and encouraging me to take up a technical
    career path. The design directive idea discussed in Chapter 7 of this book was
    introduced by Somnath in 2005 and was an instant hit.


    **xvii**


