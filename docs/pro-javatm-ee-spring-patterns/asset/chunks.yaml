    ## **Summary**


    In this chapter, I showed how to build the basic structure for an order management
    system in an interactive way. Although I provided most of the foundation, I left
    enough for you to try to experience the application design and development with
    the Spring Framework and Java EE patterns. I also introduced you to user stories
    for agile requirements gathering. Then I discussed the strategies that should
    be adopted by describing the architecture and design for projects in a flexible
    way. Finally, I presented a quick tour to get started on the development using
    Blazon ezJEE, which is an Eclipse Ganymede-based agile development environment.


    As they say, all good things must come to an end. With this chapter, we’ve finished
    our journey of Java EE design patterns with the Spring Framework. I will keep
    updating and adding to this catalog, and you can find useful supplementary information
    related to Java EE Spring patterns on my web site at `http://www.opengarage.org`.


