    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
    >\n\n    <bean name=\"policyQuoteServiceImpl\"\n        class=\"com.apress.einsure.business.impl.\n\
    \        PolicyQuoteApplicationServiceImpl\">\n    </bean>\n\n    <bean name=\"\
    /PolicyQuoteService\"\n        class=\"org.springframework.remoting.caucho.\n\
    \        BurlapServiceExporter\">\n        <property name=\"service\" ref=\"policyQuoteServiceImpl\"\
    />\n        <property name=\"serviceInterface\"\n            value=\"com.apress.einsure.business.\n\
    \            api.PolicyQuoteApplicationService\"/>\n    </bean>\n\n</beans>\n\
    ```\n\nNow that I have exposed the policy quote service using `Burlap` remoting,\
    \ it’s time to focus on the client. Once more you will just need to configure\
    \ a proxy factory bean, and that’s more or less all there is to it, as shown in\
