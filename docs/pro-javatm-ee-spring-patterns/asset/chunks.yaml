- fmt: "# Summary\n\nFinally, I will wind up the topic with an analysis of the pros\
    \ and cons of the solutions provided.\n\nThis chapter builds on the foundation\
    \ laid by Chapter 1. In this chapter, I put the Spring application framework in\
    \ the context of Java EE application architecture and design. I highlighted the\
    \ problems associated with Java EE application development. The Spring Framework's\
    \ multitier components help address these common problems. Besides this, the Spring\
    \ Framework is an enabler for best practices and effective object design. You\
    \ probably realize by now that it has two facets—on one hand, it's an IOC container,\
    \ and on the other hand it's a set of libraries and APIs to help simplify Java\
    \ EE development. Just like any application, the Spring application framework's\
    \ core lies in the IOC container.\n\nThe different modules of the Spring Framework\
    \ leverage this core framework and help build robust flexible Java EE applications.\
    \ The modules can be used on demand, making Spring an extremely flexible application\
    \ development stack.\n\nTo give you a sound understanding of Spring Framework,\
    \ I showed how to put the different modules together to build a multitier Java\
    \ EE application. In the process, I touched upon the different options available\
    \ with Spring to design and develop the different tiers with the utmost flexibility.\
    \ Finally, I presented the design directive that I will use in the next four chapters\
    \ to explain the different Java EE design patterns. In the next chapter, you will\
    \ get into real action with the different presentation tier patterns where you\
    \ will first use this design directive template.\n\n# Exploring Presentation Tier\
    \ Design Patterns\n\nSometime back I joined a team that was developing a product\
    \ named eInsure for the insurance industry. The goal was to develop a comprehensive\
    \ online e-business solution encompassing all the major insurance processes such\
    \ as underwriting, claims management, accounting, customer relationship, re-insurance,\
    \ and so on. By the time I joined, this application already had a few major releases\
    \ and was being used in production by two clients. But the development team found\
    \ it highly cumbersome and effort-intensive to handle any new requirement, enhancement,\
    \ or change request. This would always lead to unnecessarily long develop-test-fix-release-maintain\
    \ (DTFRM) cycles. So, I started to investigate and soon made some critical observations\
    \ about the application.\n\nThe main reason for the problem was the source code.\
    \ The application was huge with nearly 350 JSPs, 30-odd session beans, 600+ POJO\
    \ helpers, 300+ tables, and an equal number of entity beans. The bulk of the existing\
    \ source code was generated by a tool that helped convert the legacy product written\
    \ in Oracle PL/SQL to Java EE. The generated source was based on the enterprise\
    \ Java component model, but deep down it had fundamental design flaws and bad\
    \ smells. Code smells generally indicate that something has gone wrong somewhere\
    \ in your application code. The term was popularized by Kent Beck and Martin Fowler\
    \ in the book *Refactoring: Improving the Design of Existing Code* (Addison-Wesley,\
    \ 1999). The data structures used in eInsure mimicked the PL/SQL tables and arrays.\
    \ As a result, the developers had to first grasp the behavior of legacy code and\
    \ data structures. As the new code was being added in the same legacy style, there\
    \ was no scope of any improvement.\n\nThe lack of design and OO skills in the\
    \ eInsure team (most of the team members themselves were making a transition to\
    \ acquire Java EE technology skills along with the product) added to the woes.\
    \ There was absolutely no design directive or code documentation. A good software\
    \ application should have different configuration parameters to control its runtime\
    \ behavior without having to modify any code. These configuration parameters are\
    \ generally stored in XML or properties file external to the application.\n\n\
    This configuration information can be modified by system administrators as per\
    \ the customization needs to alter the runtime behavior of the application. Unfortunately,\
    \ eInsure had only a small set of configuration parameters, making it vulnerable\
    \ to code changes.\n\nIn this and subsequent chapters, I will discuss in greater\
    \ detail some of the problems in the application under consideration. I will then\
    \ provide solutions to these problems by applying the Spring Framework and design\
    \ patterns and highlighting the best practices.\n\nThis chapter builds on the\
    \ foundation laid in Chapters 1 and 2. It shows the first glimpses of how design\
    \ patterns and the Spring Framework can work in unison to form the backbone of\
    \ a high-quality software application. In this chapter, I shall focus only on\
    \ the presentation tier.\n\n## Front Controller\n\n### Problem\n\nSo far, I have\
    \ been pointing out the negatives of eInsure. Now I will introduce you to a modified\
    \ version of the source from this application. The source has been cleaned up\
    \ considerably to concentrate on the problem.\n\nListing 3-1 shows a simplified\
    \ version of the JSP that was used to create and modify policy details. It is\
    \ evident from the JavaScript comments that the request was posted after URL-rewrite.\
    \ Since the same JSP was used for different underwriting operations, the JavaScript\
    \ always passed an event code and screen code combination. This was the case with\
    \ 95 percent of the JSPs in the application.\n\n**Listing 3-1.** Policy.jsp\n\n\
    ```jsp\n<title>Underwriting</title>\n\n<script>\nfunction eventValidateAndSubmit\
    \ (){\n  //modify URL\n  //submit form\n  document.uwr.submit();\n}\n</script>\n\
    \n<body onLoad=\"displayError(<%=request.getAttribute(\"ERROR_MESSAGE\")%>)\"\
    >\n<form name=\"uwr\" action=\"UnderwritingController.jsp\" method=\"post\">\n\
    \  Name of Insured <input type=\"text\" value=\"\" /><br/>\n  <input type=\"button\"\
    \ value=\"Create\"\n    onClick=\"eventValidateAndSubmit('UWR001','SCR001')\"\
    />\n  <input type=\"button\" value=\"Update\"\n    onClick=\"eventValidateAndSubmit('UWR002','SCR001')\"\
    />\n</form>\n```\n\nThe controller used this combination of event code and screen\
    \ code to uniquely identify a block of code to be executed for each user action\
    \ and subsequent selection of the next view to be rendered. This controller was\
    \ another JSP and was cluttered with several long-running `if-else` blocks, as\
    \ shown in Listing 3-2.\n\n**Listing 3-2.** UnderwritingController.jsp\n\n```jsp\n\
    <%\nString eventCode = request.getParameter(\"eventCode\");\nString screenCode\
    \ = request.getParameter(\"screenCode\");\nString inputPage = request.getParameter(\"\
    referrer\");\nString userCd = request.getParameter(\"userCode\");\nString nextView\
    \ = \"\";\n\ntry{\n  SecurityChecker.getInstance().check(userCd, eventCode);\n\
    \n  if(screenCode.equals(\"SCR001\") && eventCode.equals(\"UWR002\")){\n    //Look\
    \ up session bean\n    //Create policy by invoking session bean method\n    nextView\
    \ = \"Policy.jsp\";\n  }\n  else if(screenCode.equals(\"UWR002\") && eventCode.equals(\"\
    SCR001\")){\n    //similar to above\n    nextView = \"Policy.jsp\";\n  }\n  else{\n\
    \    request.setAttribute(\"ERROR_MESSAGE\",\n      \"You have attempted an unsupported\
    \ function\");\n    nextView = \"error.jsp\";\n  }\n}\ncatch(AppException appExp){\n\
    \  request.setAttribute(\"ERROR_MESSAGE\", appExp.getMessage());\n  nextView =\
    \ inputPage;\n}\ncatch(Throwable exp){\n  //error handling\n}\n%>\n```"
