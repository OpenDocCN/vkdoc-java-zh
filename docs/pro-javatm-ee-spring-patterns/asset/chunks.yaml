  trans: '

    与 Dispatcher View 类似，Server to Worker 本质上也是构建分层 Java EE 应用程序的指导方针。它与 MVC 架构模式相似，并建议应用程序必须划分为与请求处理工作流中特定角色相对应的不同层。


    Server to Worker 实际上是 Dispatcher View 模式的扩展。与 Dispatcher View 一样，它允许在表示层组织模式，但有两个不同之处。一方面，它允许使用动态视图。另一方面，它在将控制权传递给视图之前调用业务逻辑。必须访问业务逻辑以检索动态视图所需的数据。Server
    to Worker 为连接表示层和业务层铺平了道路。这两层之间的桥梁由 Business Delegate 模式提供，我们将在下一章中探讨。


    页面控制器通常不会直接调用实际业务对象上的方法。相反，它调用桥接层或表示层代理（称为*业务委托对象*）上的方法。如前文列表所示，业务委托由 Spring 容器注入到控制器中。时序图（图
    3-19）展示了 Server to Worker 模式的完整工作流程。


    ![Image 41](img/index-154_1.png)


