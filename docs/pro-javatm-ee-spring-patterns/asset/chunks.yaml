  trans: '

    你也可以使用任何其他测试框架，例如 TestNG。构建成功后，install 目标会生成一个 WAR 文件。在下一节中，我将逐步指导如何在 Tomcat 5.5
    上安装此 WAR 文件。要学习下一节，你需要下载、安装并启动 Tomcat Web 服务器。你可以在 [`tomcat.apache.org/`](http://tomcat.apache.org)
    获取详细说明。


    **部署项目**


    Maven 2 提供了一个插件，用于将生成的 WAR 文件部署到 Tomcat 5.5 服务器。你需要先安装此插件才能使用它。添加此插件的步骤与设置依赖项相同。要添加
    Maven 2 Tomcat 插件，请右键单击 OMSWeb 项目以启动上下文菜单。在上下文菜单中，选择 Maven **➤** 添加插件。如图 7-14
    所示。


    **图 7-14.** *添加 Maven 2 插件*


    在出现的“添加插件”屏幕上，在“查询”框中输入 **tomcat**。选择 Tomcat Maven 插件，如图 7-15 所示，然后单击“确定”。这将自动下载此插件所需的相应
    JAR 文件。


    ![Image 71](img/index-320_1.png)


    ![Image 72](img/index-320_2.jpg)


    10092ch07.qxd 7/29/08 10:39 AM 第 298 页


    **298**


    第 7 章 **■** 案例研究：构建订单管理系统


    **图 7-15.** *搜索并添加 Maven 2 插件*


    Maven 2 Tomcat 插件假定使用默认的 Tomcat Manager URL（[`localhost:8080/manager`](http://localhost:8080/manager)）来连接和部署
    WAR 文件。对于身份验证，它假定管理员的用户名为 admin，且没有密码。因此，要使其正常工作，你可能需要修改 tomcat-users.xml 文件来更改
    admin 用户的密码。此插件的 Maven 目标并非显式可用。因此，你需要创建一个新的运行配置，如图 7-16 所示，以执行 Tomcat Maven 插件目标。


    **图 7-16.** *创建运行配置*


    ![Image 73](img/index-321_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM 第 299 页


    第 7 章 **■** 案例研究：构建订单管理系统


    **299**


    这将打开创建新配置的屏幕，如图 7-17 所示。在此屏幕上，双击“Maven 构建”以创建新的 Maven 配置。填写如图 7-17 所示的值，但“目标”字段除外。


    **图 7-17.** *Maven 构建的新运行配置*


    对于目标，单击“选择”，在出现的目标搜索窗口中，查询 **tomcat**，如图 7-18 所示。你需要选择 deploy 任务并单击“确定”。这将使用 Tomcat
    部署目标的适当值填充图 7-17 中的文本框。


    ![Image 74](img/index-322_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM 第 300 页


    **300**


    第 7 章 **■** 案例研究：构建订单管理系统


    **图 7-18.** *搜索并选择目标*


