  raw: 'The ProviderManager class can be configured to work with multiple authentication
    providers. It will iterate through the list of authentication providers until
    the user is authenticated by one of them or the provider collection is exhausted.
    Listing 6-8 shows the provider manager configuration.


    **Listing 6-8.** applicationContext-security.xml


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE beans PUBLIC "-//SPRING//DTD BEAN//EN"


    ["http://www.springframework.org/dtd/spring-beans.dtd">](http://www.springframework.org/dtd/spring-beans.dtd)


    <beans>


    <!—Other beans -->


    <bean id="authenticationManager"


    class="org.springframework.security.providers.ProviderManager">


    <property name="providers">


    <list>


    <ref local="daoAuthenticationProvider"/>


    </list>


    </property>


    </bean>


    </beans>


    Note that in Listing 6-8, the provider manager works with a single authentication
    provider. Spring provides several out-of-the-box providers, as shown in Figure
    6-5.


    ![Image 54](index-260_1.png)


    10092ch06.qxd 7/29/08 10:30 AM Page 238


    **238**


    C H A P T E R 6 **■** E X P L O R I N G C R O S S C U T T I N G D E S I G N PAT
    T E R N S


    **Figure 6-5.** *Class diagram: authentication provider*


    The providers implement the AuthenticationProvider interface. It defines two methods.
    The authenticate method is used to trigger the actual authentication process.


    The authentication manager invokes this method and passes a reference to the Authentication
    object. The supports method checks whether the authentication provider can work
    with the given Authentication object. As shown in Figure 6-5, Spring provides
    several concrete implementations catering to most security requirements. Listing
    6-9


    shows the authentication provider for the current example.


    **Listing 6-9.** applicationContext-security.xml


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE beans PUBLIC "-//SPRING//DTD BEAN//EN"


    ["http://www.springframework.org/dtd/spring-beans.dtd">](http://www.springframework.org/dtd/spring-beans.dtd)


    <beans>


    <!—Other beans -->


    <bean id="authenticationManager"


    class="org.springframework.security.providers.ProviderManager">


    <property name="providers">


    <list>


    <ref local="daoAuthenticationProvider"/>


    </list>


    ![Image 55](index-261_1.png)


    10092ch06.qxd 7/29/08 10:30 AM Page 239


    C H A P T E R 6 **■** E X P L O R I N G C R O S S C U T T I N G D E S I G N PAT
    T E R N S


    **239**


    </property>


    </bean>


    <bean name="daoAuthenticationProvider"


    class="org.springframework.security.providers.dao.DaoAuthenticationProvider">


    <property name="userDetailsService" ref="userDetailsService"/>


    </bean>


    </beans>


    In this case I am going to use a data access object–based authentication provider:
    DaoAuthenticationProvider. This provider assumes that the user’s identity is stored
    in a relational database. To retrieve this information, it employs a data access
    object. The DAO is configured using the userDetailsService property.


    The principal and credential combination fetched from the database is matched
    with the one passed by the provider manager in the Authentication object. If there’s
    a successful match, an Authentication object with the user role list will be passed
    to the provider manager. A failure results in an AuthenticationException being
    raised, indicating a failed identity validation.


    The DAOs used by the DaoAuthenticationProvider should implement the UserDetailsService
    interface. This again is a single method interface and defines the method loadUserByUsername.
    Spring Security provides two ready-made implementations of this interface, as
    shown in Figure 6-6.


    **Figure 6-6.** *Class diagram: user details service*


    InMemoryDaoImpl is suitable for quick prototyping and testing. For real-world
    use, you need to use JdbcDaoImpl or provide a custom implementation. The UserDetailsService
    also needs to be wired up in the Spring application context, as shown in Listing
    6-10.


