  trans: '

    会话外观在 EJB 容器中运行，因此难以进行单元测试。eInsure 的一位潜在客户无法承担商业应用服务器许可证的费用，希望将该应用部署在开源产品上。他们的团队已经在使用基于
    Apache Tomcat 和 ObjectWeb JOTM 的平台运行一些应用，因此希望利用 Tomcat Web 服务器以及 JOTM 事务监控器基于
    JDBC 的事务处理能力。然而，由于 eInsure 至关重要的业务层与 SLSB 紧密耦合，要在没有 EJB 容器支持的情况下成功运行 eInsure 将是一项痛苦且耗费精力的工作。


    **驱动因素**


    • 会话 Bean 的开发需要经验丰富的开发人员，他们需具备扎实的 EJB 和应用服务器知识。

    • 会话外观应仅作为业务层的网关，并将实际业务逻辑执行委托给辅助类。它应以声明方式订阅容器服务。

    • 会话外观不应增长到难以管理的规模。

    • 业务逻辑应在 EJB 容器之外运行。

    • 业务逻辑应易于进行单元测试。


    **解决方案**


    使用*应用服务*将业务逻辑集中在 POJO 类中。


