    **影响**


    **优点**


    • ***增强的模块化***：将视图和命令管理划分为两个独立且解耦的子系统，使应用程序更具模块化和健壮性。


    • ***提高的可重用性***：应用程序控制器使得控制器和视图的重用成为可能。


    • ***增强的可扩展性***：Spring 应用程序控制器的各种接口和包含模板方法的抽象基类，使得扩展框架变得容易，支持多种命令控制器和视图。还可以将第三方基于动作的
    Web 框架（如 WebWork、Struts 等）与 Spring MVC 集成，并与 OpenLaszlo 和 Flex 等视图协同工作。


    **关注点**


