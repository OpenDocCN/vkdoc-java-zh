    **业务接口**


    **问题**

    '
- fmt: "会话外观的远程接口定义了客户端可访问的业务方法。而Bean类则提供了这些业务方法的实现。然而，两者之间没有直接关系。这会导致在运行时或部署时出现令人烦恼的错误，例如方法缺失、方法名称不一致、参数类型和数量不匹配以及异常。由于这些错误通常只在运行时才被检测到，您可能会在“调试-修复-部署-测试”循环中浪费大量精力。因此，远程接口与Bean实现的这种解耦使得无法在编译时及早捕获错误。\n\
    \n解决此问题的最简单方法是允许Bean类实现远程或本地接口。然而，EJB规范不允许这样做。虽然不常见，但有时会话Bean方法可能需要将其引用传递给被调用的方法。这在Java编程中很常见，您会传递`this`引用。但在EJB中情况有所不同。EJB客户端应始终使用远程接口来调用业务方法。这有助于EJB容器拦截所有业务方法调用，并为这些方法注册以应用安全性和事务等系统服务。现在，由于Bean类没有实现远程接口，您被迫从`SessionContext`获取关联的`EJBObject`/`EJBLocalObject`并将其传递给被调用的方法。如果Bean类实现了远程或本地接口，则有可能无意中将`this`引用从Bean类传递给调用方法。在这种情况下，EJB容器的行为无法保证，您可能会得到意外结果。\n\
    \nBean类实现远程和本地接口还存在其他问题。\n\n`EJBObject`和`EJBLocalObject`接口定义了两组不同的方法。容器应在部署期间提供这些方法的实现。容器实现的方法对于EJB的整体运行至关重要。\n\
    \n这些方法处理底层关注点，例如网络、参数和传递值的序列化，以及与容器协调系统服务。\n\n它们还将业务方法调用代理到实际的Bean实现。但是，如果Bean类实现了这些方法，则必须为这些类提供实现，这最终可能导致EJB无法使用。为了编译Bean，实现需要实现这些接口中定义的方法。这反过来会用不必要的代码使Bean实现变得混乱。此外，如果远程接口由Bean实现实现，客户端只需通过强制转换远程接口即可访问实际的Bean，这违背了EJB的核心目标，即位置透明性和分布式业务对象。\n\
    \n`10092ch04.qxd 7/24/08 5:10 PM Page 169`\n\n**第4章：探索业务层设计模式**\n\n**169**\n\n\
    **驱动因素**\n\n*   将业务方法整合到一个公共接口中。\n*   强制执行编译时检查，以防止远程接口与Bean实现之间出现异常。\n*   防止EJB\
    \ Bean实现类实现远程或本地接口。\n\n**解决方案**\n\n实现一个*业务接口*来整合业务方法，并对EJB方法应用编译时检查。\n\n### 使用Spring框架的策略\n\
    \n业务接口是一个普通的Java接口，它整合了Bean类将要实现的方法。本地和远程接口也扩展了该业务接口。\n\n因此，这个超级接口使方法签名和数量保持同步，并允许在编译时检测到任何差异。此外，由于业务接口不扩展`EJBObject`或`EJBLocalObject`，Bean类无需实现不必要的方法。我现在将展示如何针对不同类型和版本的无状态会话Bean将业务接口付诸实践。\n\
    \n图4-4展示了远程SLSB的业务接口类图。\n\n![Image 45](index-192_1.png)\n\n`10092ch04.qxd 7/24/08\
    \ 5:10 PM Page 170`\n\n**170**\n\n**第4章：探索业务层设计模式**\n\n**图4-4.** *类图：远程业务接口*\n\
    \n对于远程SLSB，业务接口方法必须声明抛出`RemoteException`的`throws`子句。否则，每个应用服务器附带的EJB验证工具将不允许部署此类EJB。SLSB的业务接口理想情况下应该是与应用服务关联的接口。然而，由于这种与`RemoteException`的依赖关系，我将创建一个单独的接口，如清单4-25所示。\n\
    \n**清单4-25.** `UnderwritingBusinessService.java`\n\n```java\npublic interface\
    \ UnderwritingBusinessService {\n\n    public void underwriteNewPolicy(String\
    \ productCd, String name, int age) throws RemoteException;\n\n}\n```\n\n现在，远程接口扩展了`UnderwritingBusinessService`，并且不再定义任何业务方法。如清单4-26所示。\n\
    \n**清单4-26.** `UnderwritingRemote`\n\n```java\npublic interface UnderwritingRemote\
    \ extends EJBObject, UnderwritingBusinessService {\n\n}\n```\n\n`10092ch04.qxd\
    \ 7/24/08 5:10 PM Page 171`\n\n**第4章：探索业务层设计模式**\n\n**171**\n\n为了实现编译时一致性，Bean实现类现在实现了业务服务接口，如清单4-27所示。请注意，我将继续按原样使用应用服务。\n\
    \n**清单4-27.** `UnderwritingRemoteBean.java`\n\n```java\npublic class UnderwritingRemoteBean\
    \ extends AbstractStatelessSessionBean implements UnderwritingBusinessService\
    \ {\n\n    private final String SERVICE_BEAN_KEY = \"uwrAppService\";\n    private\
    \ UnderwritingApplicationService uwrAppService;\n\n    public void underwriteNewPolicy(String\
    \ productCd, String name, int age) throws RemoteException {\n        // 将业务处理委托给应用服务\n\
    \        uwrAppService.underwriteNewPolicy(productCd, name, age);\n    }\n\n \
    \   protected void onEjbCreate() throws CreateException {\n        // 用于初始化\n\
