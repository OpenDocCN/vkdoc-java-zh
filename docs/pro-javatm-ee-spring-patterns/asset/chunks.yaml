    \ 标签，并在主布局中使用它。\n- 提取 `body` 标签中的内容，并在主布局中使用它。\n\n## 使用 Apache Tiles\n\nSpring\
    \ MVC 还提供了与 Apache Tiles 框架的集成。与 `SiteMesh` 一样，`Tiles` 是一个灵活且高度可扩展的框架，早期主要与 Struts\
