    **总结**


    在本章中，我展示了如何以交互方式为订单管理系统构建基本结构。虽然我提供了大部分基础，但我留下了足够的内容供您尝试体验使用 Spring 框架和 Java EE
    模式进行应用程序设计和开发。我还向您介绍了用于敏捷需求收集的用户故事。然后，我讨论了应采用的策略，通过以灵活的方式描述项目的架构和设计。最后，我提供了一个快速指南，帮助您开始使用
    Blazon ezJEE（一个基于 Eclipse Ganymede 的敏捷开发环境）进行开发。


    俗话说，天下没有不散的筵席。通过本章，我们完成了使用 Spring 框架进行 Java EE 设计模式的旅程。我将持续更新并扩充此目录，您可以在我的网站 [`www.opengarage.org`](http://www.opengarage.org)
