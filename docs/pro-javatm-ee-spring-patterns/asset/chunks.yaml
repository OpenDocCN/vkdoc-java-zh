- fmt: '# Security


    ## Problem


    The OMS application requires that only authenticated users can search for services
    and place orders. Anonymous users should be prevented from pasting a URL in the
    browser’s address bar and accessing a page in the application.


    ## Forces


    - Only valid users are allowed entry into the application.

    - All different entry points into an application should be guarded by authentication.

    - All authenticated users should have the appropriate roles/authority to access
    secure system resources.


    ## Solution


    All these forces probably are familiar to you. You guessed right—you will need
    to implement the Authentication and Authorization Enforcer design pattern to solve
    this problem. I will not delve much into the details of this solution because
    the entire problem can be addressed by this pattern described in Chapter 6.


    # Java Server Pages


    ## Problem


    The OMS application needs to display dynamic data to the end users. It also needs
    to show controls such as text fields and buttons for the users to interact with
    the application. The dynamic data and controls must be presented in a particular
    layout. It should be easy to rearrange the position of the data and controls in
    the layout with configuration. The layout should be flexible enough to add or
    remove new content.


    ## Forces


    - Users need to view dynamic data and different HTML controls in their browsers.

    - There needs to be flexible layout support.


    ## Solution


    The dynamic data can be displayed using the View Helper design pattern. In the
    case of the order management application, I will use JSTL tags to retrieve and
    display dynamic data. To render the different controls, you can use the Spring
    form tags. You can read more about the Spring form tags at `http://static.springframework.org/spring/docs/2.5.x/reference/view.html#view-jsp-formtaglib`.


    You can apply the Composite View pattern to include the JSP-based view in a flexible
    layout. The layout in the example OMS will be built using Apache Tiles 2. The
    Spring documentation provides comprehensive details about the integration with
    the Tiles layout framework; you can access it at `http://static.springframework.org/spring/docs/2.5.x/reference/view.html#view-tiles`.
    If you are interested to know more about layouts and the Tiles framework in general,
    read all about it at `http://tiles.apache.org/`.


    # Page Controller


    ## Problem


    The event generated by each user action needs to be handled outside the front
    controller. This will enable the front controller to concentrate on the core task
    of acting as the single point of entry into the application and hence conform
    to SRP. Once the request is received, the front controller delegates the actual
    request processing to some other components. These components should also be responsible
    for retrieving a model by invoking the business logic component.


    ## Forces


    - Remove the code that invokes business logic in response to user action to reusable
    components.

    - Identify the reusable components based on the request URL.

    - Deploy one reusable component per user action.


    ## Solution


    Obviously, you will use the Page Controller pattern discussed in Chapter 3 to
    solve this design issue. The OMS application will extensively use page controller
    implementations that extend the `SimpleFormController`. However, the home page
    controller that will be used for redirection on successful authentication will
    use a `UrlFilenameViewController`. This is because this page controller does not
    define a complete workflow and is used only to render a simple home page now.
    Figure 7-5 shows the page controller class diagram.


    **Figure 7-5.** *OMS class diagram for page controllers in iteration 1*


    The `ServiceLookupController` produces a list of matching services as per the
    search inputs supplied by the user. Similarly, the `SaveOrderController` saves
    the order information by invoking the business tier components.


    By now you must have observed the similarity between the design directives and
    the patterns presented earlier in this book. I have not shown the consequences
    for using the different solutions. This is deliberate. I am sure you can make
    out the consequences from the Spring Java EE patterns that were applied for a
    particular design issue. A consequences section with a benefit and concern analysis
    is a must when you deliver a design directive to a development team or customer.
    Also, I prefer to add a UML package diagram (besides class and sequence diagrams)
    in my design directives, because it helps reveal the coupling in the application.


    By now you should have a clear idea about the OMS application design. Table 7-1
    points you to the appropriate Spring Java EE design patterns for the rest of the
    design issues. You can try to elaborate on these design directives as well as
    add the “Consequences” section to the previous examples.


    **Table 7-1.** *Design Directive Pointers*


    | Design Issue | Spring Java EE Pattern |

    | --- | --- |

    | Dispatcher servlet | Front Controller |

    | Business interfaces | Business Interface |

    | Remote dispatcher servlet | Web Service Broker |

    | Business service | Application Service |

    | Data access object | Data Access Object |


    # Development


    Once the design is in place, the next step is to start the development. Before
    you get started, though, it’s imperative that you set up the team development
    environment. For the example OMS, I decided to use Blazon ezJEE 1.0.0, which is
    based on the Eclipse Ganymede release. It is a comprehensive agile Java EE development
    environment and comes bundled with all the essential plug-ins, including support
    for the Spring Framework. If you are familiar with the Eclipse IDE, then getting
    started with Blazon ezJEE will be a breeze. You can get Blazon ezJEE by following
    the download link at `http://www.opengarage.org`.


    Once you are done with the download, go through the quick-start guide to get started
    with this IDE. I will use Apache Maven (included in Blazon ezJEE) to build and
    deploy the web application artifacts. Maven is a useful tool for agile project
    development. It makes it easy to develop, build, and deploy projects in a very
    flexible and modular way. It promotes test-driven development by directly including
    unit test runs in the build process. It can also be used with Continuum (`http://continuum.apache.org/`)
    to support continuous integration. In the next few sections, I will explain how
    you can use Blazon ezJEE to set up the different projects required for the OMS
    application in the workspace.


    ## Setting Up the Workspace


    When you launch Blazon ezJEE for the first time, it will prompt you to select
    a workspace. Simply, a *workspace* is a folder in which you will keep your other
    Eclipse project directories. Because I am developing this OMS on the Windows platform,
    I will supply the fully qualified folder name as `c:\omsworkspace`, as shown in
    Figure 7-6.


    **Figure 7-6.** *Workspace selection*'
