    **226**


    第 6 章 **■** 探索横切设计模式


    • 所有已通过身份验证的用户都应拥有适当的角色/权限来访问安全的系统资源。


    • 身份验证和授权机制应封装为独立的组件，并通过配置透明地应用。


    **解决方案**


    实现一个可插拔的*身份验证与授权执行器*，用于验证用户身份并允许访问受保护的资源。


    Spring 框架中的策略


    Spring Security 将身份验证与授权执行器模式实现为一组两个截然不同但又紧密关联的组件。身份验证执行器和授权执行器组件协同工作，并在 Java
    EE Web 应用程序的表示层和业务层透明地应用身份验证和授权支持。正如你将在后续章节中看到的，这些组件具有高度的可配置性和可扩展性。


    身份验证执行器的主要职责是验证用户身份。它还会在任何请求到达 Web 应用程序时检查身份验证状态。如果用户已通过身份验证，则允许请求传递到授权执行器。如果身份验证失败，用户将被重定向到登录页面。


    身份验证执行器通常是可插拔的，这有助于快速适应任何新的身份验证机制，例如 OpenID。核心组件位于与协议无关的拦截器之后，并使用辅助程序来委托实际的验证过程。所有用户操作都必须通过这些拦截器来应用身份验证。


    一旦身份验证核心组件完成工作，授权执行器就会接手请求。它会检查发起此操作的用户是否有足够的权限来访问特定网页或执行某个方法。如果用户试图在未验证身份的情况下访问资源，授权执行器将强制其跳转到登录页面或访问被拒绝页面。图
    6-1 展示了身份验证与授权执行器的基本架构。


    ![Image 50](img/index-249_1.png)


    ![Image 51](img/index-249_2.png)


