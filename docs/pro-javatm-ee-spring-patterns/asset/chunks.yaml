  trans: '

    • **上下文**是问题存在的周围条件。


    • **问题**是领域中困难且不确定的主题区域。它受到所考虑上下文的限制。


    • **解决方案**是针对所考虑问题的补救措施。


    然而，并非每个问题的解决方案都能成为模式。问题必须频繁出现，才能拥有可复用的解决方案，并被视为一种模式。此外，模式必须建立一种通用词汇表，以便向开发人员和设计人员传达设计方案。例如，如果有人提到
    GOF 单例模式，那么所有相关方都应理解，你需要设计一个在应用程序中只存在单个实例的对象。为了实现这种设计模式，其描述通常辅以结构图和交互图以及代码片段。最后但同样重要的是，每个模式描述通常都以收益和关注点分析作为结尾。当我在第
    2 章讨论模式模板时，你将详细了解模式的组成部分。


    **Java EE 设计模式目录**


    如前所述，Java EE 作为主流的企业级开发平台已有近十年时间。在此期间，成千上万成功的应用程序和产品都是使用这项技术构建的。但也有一些努力失败了。失败的原因有多种，其中最主要的是设计和架构不完善。这是一个关键领域，因为设计和架构是从需求到构建阶段的桥梁。然而，Java
    EE 的设计师和架构师通过总结一系列有用的设计模式，从失败和成功中吸取了教训。这个 Java EE 模式目录为 Java EE 应用程序每一层中的对象交互提供了经过时间考验的解决方案指南和最佳实践。


    与平台本身一样，Java EE 模式目录也随着时间的推移而演变。如前所述，该目录最初是作为 Sun 公司 Java BluePrints 的一部分形成的，后来在《*Core
    J2EE Design Pattern*》（Prentice Hall，2003）一书中得到了详细阐述。表 1-1 列出了这些模式，并附有简要说明及其关联层。我将在后续章节中更详细地讨论它们。


