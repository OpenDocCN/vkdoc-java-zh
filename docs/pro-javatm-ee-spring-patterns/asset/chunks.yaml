    \ discussed so far, Spring MVC provides few other controllers (abstract as well\
    \ as concrete implementations) for specific requirements. Some of these controllers\
    \ are listed in Table 3-1. They are required occasionally only for a handful of\
    \ use cases.\n\n**Table 3-1.** Occasionally Useful Page Controllers\n\n| File\
    \ Name | Description |\n| --- | --- |\n| `MultiActionController` | Some developers\
    \ think it is useful to group a logical set of actions into a single controller\
    \ implementation class. All the actions related to a policy creation page—Save,\
