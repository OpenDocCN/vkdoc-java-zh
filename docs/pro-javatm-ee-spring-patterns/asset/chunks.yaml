    \n        class=\"com.apress.insurance.web.controller.SaveNewPolicyController\"\
    \ >\n        <property name=\"uwrBusinessDelegate\"\n            ref=\"underwritingBusinessDelegate\"\
    \ />\n        <property name=\"formView\"\n            value=\"createPolicy\"\
    \ />\n        <property name=\"commandName\"\n            value=\"policydetails\"\
