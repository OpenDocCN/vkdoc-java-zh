    使用 Spring 框架的策略


    在 Java EE 应用程序中，SLSB 为远程客户端实现领域服务。SLSB 是最有用的 EJB 组件，可广泛用于远程调用和事务支持。然而，如第四章所示，编写和维护
    EJB 很繁琐，因为它涉及大量的类和元数据。此外，如果你的应用程序需要在 EJB 容器之外或 Web 容器中运行，它们的重要性就不大了。而且，会话外观只拦截远程业务逻辑请求，因此严格来说，应用程序服务实际上实现了领域服务。


    使用 Spring 框架，即使对 POJO 应用程序服务组件，也可以提供声明式事务支持。这使得应用程序具有高度的可移植性。你现在只需更改少量配置，就可以将此应用程序部署在
    Web 容器中。这个带有 POJO 领域服务的应用程序，也可以继续在 EJB 容器中运行，并订阅容器管理的事务。因此，使用 Spring 框架，你不需要 EJB
    来支持事务。


    Spring 框架既不实现任何事务监控器，也不尝试直接管理事务。相反，它通过一个名为*平台事务管理器*的抽象层，将事务委托给底层的事务实现。对于大多数广泛使用的平台——JDBC、对象关系映射（如
    Hibernate 和 TopLink）、JTA、JCA 以及所有主流应用服务器——都有相应的事务管理器实现。在接下来的几节中，我将回顾一些常用的事务管理器。


    **纯 JDBC 事务**


    如果应用程序中直接使用 JDBC 或 Spring DAO，则 DataSourceTransactionManager 处理所有事务需求。它可以在 Spring
    应用程序上下文中配置，如清单 6-26 所示。


