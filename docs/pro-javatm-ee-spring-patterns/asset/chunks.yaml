    **169**


    **驱动力**


    • 将业务方法整合到一个公共接口中。

    • 强制执行编译时检查，以防止远程接口与 Bean 实现之间出现异常。

    • 防止 EJB Bean 实现类实现远程或本地接口。


    **解决方案**


    实现一个*业务接口*来整合业务方法，并对 EJB 方法应用编译时检查。


    与 Spring 框架的策略


    业务接口是一个普通的 Java 接口，它整合了 Bean 类将要实现的方法。本地和远程接口也扩展了该业务接口。


    因此，这个超级接口使方法签名和数量保持同步，并允许在编译时检测到任何差异。此外，由于业务接口不扩展`EJBObject`或`EJBLocalObject`，Bean
    类无需实现不必要的方法。我现在将展示如何针对不同类型和版本的无状态会话 Bean 将业务接口付诸实践。


    图 4-4 展示了远程 SLSB 的业务接口类图。


    ![Image 45](img/index-192_1.png)


