    第 7 章 **■** 案例研究：构建订单管理系统


    **277**


    **安全性**


    **问题**


    OMS 应用程序要求只有经过身份验证的用户才能搜索服务和下订单。应阻止匿名用户将 URL 粘贴到浏览器的地址栏中并访问应用程序中的页面。


    **影响因素**


    • 只允许有效用户进入应用程序。


    • 应用程序的所有不同入口点都应受到身份验证的保护。


    • 所有经过身份验证的用户都应具有适当的角色/权限来访问安全的系统资源。


    **解决方案**


    所有这些影响因素可能你都熟悉。你猜对了——你需要实现身份验证和授权强制器设计模式来解决这个问题。我不会深入探讨此解决方案的细节，因为整个问题都可以通过第 6
    章中描述的这种模式来解决。


    **Java 服务器页面**


    **问题**


    OMS 应用程序需要向最终用户显示动态数据。它还需要显示诸如文本字段和按钮之类的控件，以便用户与应用程序交互。动态数据和控件必须以特定的布局呈现。应该能够通过配置轻松地重新排列布局中数据和控件的位置。布局应足够灵活，以便添加或删除新内容。


    10092ch07.qxd 7/29/08 10:39 AM 第 278 页


    **278**


    第 7 章 **■** 案例研究：构建订单管理系统


    **影响因素**


    • 用户需要在其浏览器中查看动态数据和不同的 HTML 控件。


    • 需要灵活的布局支持。


    **解决方案**


    可以使用视图助手设计模式来显示动态数据。在订单管理应用程序的情况下，我将使用 JSTL 标签来检索和显示动态数据。要呈现不同的控件，你可以使用 Spring
    表单标签。你可以在 [`static.springframework.org/spring/docs/2.5.x/reference/view.html#view-jsp-formtaglib`](http://static.springframework.org/spring/docs/2.5.x/reference/view.html#view-jsp-formtaglib)
    阅读更多关于 Spring 表单标签的信息。


    你可以应用复合视图模式将基于 JSP 的视图包含在灵活的布局中。示例 OMS 中的布局将使用 Apache Tiles 2 构建。Spring 文档提供了与
    Tiles 布局框架集成的全面详细信息；你可以访问 [`static.springframework.org/spring/docs/2.5.x/reference/view.html#view-tiles`](http://static.springframework.org/spring/docs/2.5.x/reference/view.html#view-tiles)。如果你有兴趣了解有关布局和
    Tiles 框架的更多信息，请访问 [`tiles.apache.org/`](http://tiles.apache.org) 阅读所有相关内容。


    **页面控制器**


    **问题**


    每个用户操作生成的事件需要在前端控制器之外处理。


    这将使前端控制器能够专注于作为应用程序单一入口点的核心任务，从而符合 SRP。一旦收到请求，前端控制器将实际的请求处理委托给其他组件。这些组件还应负责通过调用业务逻辑组件来检索模型。


    **影响因素**


    • 将响应于用户操作而调用业务逻辑的代码提取到可重用组件中。


    • 根据请求 URL 识别可重用组件。


    • 为每个用户操作部署一个可重用组件。


    ![图片 61](img/index-301_1.png)


    10092ch07.qxd 7/29/08 10:39 AM 第 279 页


    第 7 章 **■** 案例研究：构建订单管理系统


    **279**


    **解决方案**


    显然，你将使用第 3 章讨论的页面控制器模式来解决这个设计问题。OMS 应用程序将广泛使用扩展了 `SimpleFormController` 的页面控制器实现。然而，用于在成功身份验证后进行重定向的主页控制器将使用
    `UrlFilenameViewController`。


    这是因为该页面控制器没有定义完整的工作流，现在仅用于呈现一个简单的主页。图 7-5 显示了页面控制器类图。


    **图 7-5.** *迭代 1 中页面控制器的 OMS 类图*


    `ServiceLookupController` 根据用户提供的搜索输入生成匹配服务的列表。类似地，`SaveOrderController` 通过调用业务层组件来保存订单信息。


    到现在，你一定已经观察到了本书前面介绍的设计指令与模式之间的相似性。我没有展示使用不同解决方案的后果。这是有意为之。我相信你可以从应用于特定设计问题的 Spring
    Java EE 模式中推断出后果。当你向开发团队或客户交付设计指令时，包含带有收益和关注点分析的后果部分是必须的。此外，我倾向于在我的设计指令中添加 UML
    包图（除了类图和序列图之外），因为它有助于揭示应用程序中的耦合。


    到现在，你应该对 OMS 应用程序设计有了清晰的认识。表 7-1


    为你指出了其余设计问题的适当 Spring Java EE 设计模式。你可以尝试详细阐述这些设计指令，并为前面的示例添加“后果”部分。


