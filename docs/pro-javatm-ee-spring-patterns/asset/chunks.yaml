    **总结**


    在本章中，我讨论了一些通常被忽略或事后才考虑的 Java EE 关键应用方面。安全设计对于任何企业应用都至关重要，关于这个主题已有大量论述。这对于 Java
    EE 应用尤其重要，因为它们服务于各种客户端。可以使用身份验证和授权强制器模式来防止对系统资源的任何恶意访问。借助 Spring Security 的开箱即用支持，您只需通过配置即可设置安全层。

