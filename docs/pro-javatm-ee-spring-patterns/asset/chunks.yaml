- fmt: '# Class Diagram


    A class diagram depicts the static relationships that exist among a group of classes
    and interfaces in the system. The different types of relationships that I will
    discuss are generalization, aggregation, and inheritance. Figure 1-8 shows the
    UML notation for a class used to represent the details of an insurance claim.
    It is represented by a rectangle with three compartments. The first compartment
    is the name of the class. The second compartment denotes the attributes in the
    class, and the last one shows the operations defined on these attributes. Note
    that the `+` and `–` signs before the attribute and method names are used to represent
    the visibility. The `+` sign denotes public visibility, and the `–` sign denotes
    private visibility or that the attribute is not accessible outside this class.
    Also note that, optionally, you can denote the data type of the attributes, method
    return type, and parameters.


    **Figure 1-8.** *UML class notation*


    Interfaces lay down the contract that implementations must fulfill. In other words,
    classes that implement an interface provide a guaranteed set of behavior. An interface
    is represented by the same rectangular box as a class, but with a difference.
    The top compartment shows the class name augmented by a stereotype `<<interface>>`.
    Stereotypes are a mechanism to extend an existing notation. Some UML tools also
    represent interfaces with a circle with no explicit mention of the methods. Figure
    1-9 shows the two different forms.


    **Figure 1-9.** *UML interface notations*


    ![Image 15](index-38_1.png)


    ![Image 16](index-38_2.png)


    # Relationships


    In the next few sections, I will examine the important relationships that exist
    between the classes in a software system.


    ## Generalization


    The *generalization* relation indicates inheritance between two or more classes.
    This is a parent-child relationship, in which the child inherits some or all of
    the attributes and behavior of the parent. It is also possible for the child to
    override some of the behaviors and attributes. Figure 1-10 shows the generalization
    relationship.


    **Figure 1-10.** *Generalization*


    ## Association


    *Association* shows a general relation between two classes. In an actual class,
    this is shown with one class holding an instance of the other. An insurance policy
    always has one or more parties involved, with the most prominent being the policyholder
    who owns this policy. There can be an agent who helps and guides the policyholder
    to take this policy.


    Association often shows named roles, cardinality, and constraints to describe
    the relation in detail, as shown in Figure 1-11.


    **Figure 1-11.** *Association*


    ![Image 17](index-39_1.png)


    ![Image 18](index-39_2.png)


    ## Aggregation


    *Aggregation* is a form of association in which one element consists of other,
    smaller constituents. This relationship is depicted by a diamond-shaped white
    arrowhead. In this case, if the parent object is deleted, the child object may
    still continue to exist. Figure 1-12 shows an aggregation relation between an
    insurance agent and the local insurance office in which he works. The local insurance
    office is where insurance agents carry out tasks such as policy underwriting,
    depositing premiums for their customers, and various other functions. So even
    if the local office is closed down, the agent can report to another office. Similarly,
    the agent can de-register from a local office and move to a different office of
    the same insurer.


    **Figure 1-12.** *Aggregation*


    ## Composition


    *Composition* is a stronger form of aggregation; as in this case, if the parent
    is deleted, the children will also no longer exist. This relationship is depicted
    by a diamond-shaped solid arrowhead. Figure 1-13 shows the composition relationship
    between a party involved in some policy or claim and their address. If the party
    is deleted from the system, its address will also be deleted.


    **Figure 1-13.** *Composition*


    ![Image 19](index-40_1.png)


    # Sequence Diagram


    A *sequence diagram* is used to model dynamic aspects of the system by depicting
    the message exchange between the objects in the system over a period of time.
    A sequence diagram is used to show the sequence of interactions that take place
    between different objects to fulfill a particular use case. Unlike a class diagram
    that represents the entire domain model of the application, a sequence diagram
    can show interaction details of a particular process only.


    ## Object and Messages


    In a sequence diagram, an object is shown with its name underlined in a rectangular
    box. The messages are represented by arrows starting on one object and ending
    on the other. An object can call a method on itself, which is a self-message and
    represented by an arrow starting and terminating on the same object, as shown
    in Figure 1-14.


    **Figure 1-14.** *Lifeline in a sequence diagram*


    ## Lifeline


    Each object has a *lifeline* represented by a dashed line going downward from
    the object box (as shown in Figure 1-14). It represents the time axis for the
    entire sequence diagram with time elapsed measured by moving downward on the lifeline.


    ## Return Values


    The messages in a sequence diagram can optionally have a *return value*, as shown
    in Figure 1-15. The `createNewPolicy` message, for instance, returns a `PolicyDetail`
    object.


    ![Image 20](index-41_1.png)


    **Figure 1-15.** *Optional return value in a sequence diagram*


    # Summary


    Developing distributed multitier applications is a daunting task. The Java EE
    platform looks to simplify this task by defining a container-based architecture.
    It defines a specification of the runtime environment for the application code
    and the low-level system services that it should provide. This allows the application
    developers to focus on writing business logic. The Java EE application architecture
    is based on the core platform architecture and established MVC principle. With
    this, you can clearly define specialized component layers in each tier. The web
    tier, for example, hosts the presentation layer of an application, whereas the
    business and data access layers generally reside on the application server tier.


    Java EE design, on the other hand, is an extended object design. The Java EE design
    patterns catalog provides guidance and best practices in composing the objects
    and their interaction within and across the layers and tiers. The design patterns
    catalog documents the years of experience of designers and developers in delivering
    successful Java EE applications. The Java EE design and architecture can be documented
    using UML notations. These are graphical notations that help provide a pictorial
    view of the static structures and dynamic interactions of the domain objects.


    In the next chapter, I’ll show how the Spring Framework further simplifies Java
    EE application design and architecture. If you have experience with the Spring
    Framework already, you can jump straight to Chapter 3.'
