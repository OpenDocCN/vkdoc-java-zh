    JNDI 对象查找迁移到一个通用的、可重用的组件中，使其能够与任何服务器协同工作。当团队在为一位新客户将产品部署到 IBM WebSphere 上遇到诸多问题时，这一点显得尤为突出。从清单
    4-1 可以清楚地看到，JNDI 查找使用了专有类，例如 `weblogic.jndi.WLInitialContextFactory`。这反过来又导致应用程序与供应商实现（本例中为
    BEA WebLogic 应用服务器）紧密耦合。这增加了移植到另一个 Java EE 应用服务器的痛苦。


    采用这种设计，每个 JSP 控制器只能支持单个会话 Bean。这也意味着，随着越来越多的承保用例被实现，会话 Bean 将增长到难以管理的大小。最终的结果是应用程序的设计和架构效率低下。


    请注意，`getEJBHome` 方法使用了一个静态 URL 来连接 JNDI 服务。这样做是假设 JSP 和 EJB 部署在同一个 JVM 中。虽然这种系统架构本身没有错（实际上在中等规模的应用中很常见），但这引发了一个严重的问题：如果
    JSP 和 EJB 将部署在一起，那么你真的需要 EJB 吗？开发和维护 EJB 的任务很艰巨。因此，除非你的应用程序需要 EJB 容器提供的系统服务（如远程调用、安全性、事务、对象池、故障转移等），否则使用
    POJO 业务组件会更好。


    为了充分利用 EJB 组件提供的优势，像 eInsure 这样的大型复杂应用程序应在生产环境中使用分布式部署架构。在这种部署场景下，表示层组件（如 JSP）将驻留在
    Web 容器（如 Apache Tomcat 或 Jetty）中。表示层组件访问部署在应用服务器（如 BEA WebLogic 或 Red Hat JBoss）上的
