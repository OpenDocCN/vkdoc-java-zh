- fmt: "The service locator can be turned on by configuration, as shown in Listing\
    \ 4-3. Applications should use a single instance of a `JndiObjectFactoryBean`\
    \ per JNDI object.\n\n**Listing 4-3.** `insurance-servlet.xml`\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\
    \ http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\">\n\n    <bean\
    \ name=\"underwritingBusinessDelegate\"\n          class=\"com.apress.insurance.view.delegate.UnderWritingBusinessDelegate\"\
    >\n        <property name=\"underWritingHome\" ref=\"uwrSlsbHome\" />\n    </bean>\n\
    \n    <bean name=\"uwrSlsbHome\"\n          class=\"org.springframework.jndi.JndiObjectFactoryBean\"\
    >\n        <property name=\"jndiName\" value=\"uwrbusinessslsb\" />\n        <property\
    \ name=\"jndiEnvironment\">\n            <props>\n                <prop key=\"\
    java.naming.factory.initial\">\n                    weblogic.jndi.WLInitialContextFactory\n\
    \                </prop>\n                <prop key=\"java.naming.provider.url\"\
    >\n                    t3://localhost:7001\n                </prop>\n        \
    \    </props>\n        </property>\n    </bean>\n</beans>\n```\n\nYou can use\
    \ Spring’s property placeholder feature to further externalize the configuration.\
    \ In this strategy, you replace the values of the different properties with placeholders.\
    \ Then you move the values to an external properties file. It is easy to change\
    \ the environment-specific values in the properties file and still keep the Spring\
    \ XML configuration unaffected. For a detailed treatment of Spring’s property\
    \ placeholder support, you can refer to [http://static.springframework.org/spring/docs/2.5.x/reference/beans.html#beans-factory-placeholderconfigurer](http://static.springframework.org/spring/docs/2.5.x/reference/beans.html#beans-factory-placeholderconfigurer).\n\
    \nSo, with the Spring Framework, it is possible to set up a configurable service\
    \ locator in no time.\n\nNow to support a different application server, you just\
    \ need to alter the configuration file. The code shown in Listing 4-4 makes it\
    \ possible to look up the same EJB deployed on a JBoss server.\n\n**Listing 4-4.**\
