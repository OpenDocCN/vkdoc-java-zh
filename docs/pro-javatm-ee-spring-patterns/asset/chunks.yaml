- fmt: "# 排版后的文本\n\nto 6 p.m. This would let them use this downtime to run scheduled\
    \ batch programs more efficiently. In addition, they wanted to track and analyze\
    \ the usage pattern of the web site. Last but not least, they wanted a configurable\
    \ monitor to track the time spent by individual page controllers in fulfilling\
    \ a request. This would be turned on from time to time to check system performance.\n\
    \nThe typical approach in this case would be to create some new components and\
    \ change some existing ones. But this is risky as new bugs can be added to the\
    \ existing codebase. A careful analysis of these new requirements reveals that\
    \ they can best be addressed by applying new reusable components before and after\
    \ the existing code. It should be possible to configure and apply these components\
    \ transparently without affecting the existing code. This would save lot of time\
    \ and effort if existing components had to be altered.\n\n## Forces\n\n- You want\
    \ common processing to be centralized into reusable components.\n- The preprocessing\
    \ and postprocessing components should be loosely coupled to the existing application\
    \ code.\n- Apply common processing declaratively.\n\n## Solution\n\nUse an *intercepting\
    \ filter* to apply reusable processing transparently before and after the actual\
