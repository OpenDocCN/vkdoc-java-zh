    C H A P T E R 5 **■** E X P L O R I N G I N T E G R AT I O N T I E R D E S I G
    N PAT T E R N S


    **195**


    **Procedure Access Object**


    **Problem**


    A customer of eInsure had a two-tier thick client lead management application.
    eInsure had to integrate with this existing two-tier application. The lead management
    application heavily used legacy stored procedures running on Oracle Database.
    The stored procedures contained both business logic and persistence logic. It
    was not possible to reuse the UI, which was built with Visual Basic. Because the
    integration had to be completed in a short time period, it was not possible to
    port the business logic to Java components.


    Moreover, eInsure was not allowed direct access to the database tables of the
    lead management application.


    The legacy version of eInsure had also left behind several stored procedures that
    were accessed using straight JDBC. But as you saw with DAO, this involves a lot
    of code redundancy. The mixing of persistence logic with business logic made the
    business tier a regular candidate for change. The stored procedure can directly
    subscribe to the transactional services provided by the RDBMS. This makes it difficult
    for the application server to manage distributed transactions. This often leads
    to bugs that are hard to detect and fix. Using stored procedures limits portability
    options. In other words, a lot of code changes are required to support the same
    application on a different RDBMS.


    **Forces**


    • Accessing a stored procedure from a session facade using the JDBC API causes
    an intermingling of persistence logic with application services.


    • Invoking a stored procedure involves lots of low-level programming against the
    JDBC API.


    • Stored procedure access with a low-level JDBC API results in a lot of code duplication.


    • Stored procedures make it difficult to apply system services such as transactions.


    **Solution**


    Use a *procedure access object* (PAO) to invoke stored procedures without directly
    interacting with a low-level JDBC API.


    ![Image 47](index-218_1.png)


    10092ch05.qxd 7/24/08 5:15 PM Page 196


    **196**


    C H A P T E R 5 **■** E X P L O R I N G I N T E G R AT I O N T I E R D E S I G
    N PAT T E R N S


    Strategies with the Spring Framework


    Spring JDBC provides the convenient abstract class StoredProcedure to execute
    stored procedures. This class, like other support classes in Spring JDBC, implements
    the GOF


    Template Design pattern and provides an OO abstraction of a stored procedure.
    With this class, it is possible to perform stored procedure operations such as
    setting input and output variables, using database-specific datatypes, and returning
    cursors. This specific class extends from the SqlCall class, which can be used
    to model the execution of any stored procedure and function. The root of the SqlCall
    class is the RdbmsOperation, which can be used to model any database-specific
    operation such as a SQL query to retrieve results, update or delete records, and
    invoke stored procedures. Figure 5-2 shows the class diagram of the stored procedure
    support classes.


    **Figure 5-2.** *Class diagram: Spring stored procedure support classes* To explore
    Spring JDBC’s support for stored procedure, I will show the case when lead information
    has to be saved into the database. Listing 5-17 shows the simplified signature
    of the stored procedure. This stored procedure is used to create a new lead in
    the database. It accepts the lead name and country as input and outputs the lead
    ID, which is the primary key in the database and generated by a sequence.


    **Listing 5-17.** *Stored Procedure Signature*


    SaveNewLead (:pLeadId OUT NUMBER,:pName IN VARCHAR2,:pCountryCd VARCHAR2)


