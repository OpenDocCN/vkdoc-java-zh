    <head>


    <title>New Claim</title>


    </head>


    <form action="saveClaim.do" method="POST"> Claimant Name <input type="text" name="claimantName"
    value="" /><br/> Policy Number <input type="text" name="policyNo" value="" /><br/>
    Product Code<input type="text" name="productCd" value="" /><br/>


    <input type="submit" value="Save" />


    </form>


    </body>


    </html>


    Finally, the controller needs to be added in the Spring configuration, as shown
