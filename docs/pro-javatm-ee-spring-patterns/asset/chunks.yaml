- fmt: "# Chapter 4: Exploring Business Tier Design Patterns\n\nEJB 2.0 introduced\
    \ local EJBs with the aim of limiting network trips and thus enhancing performance.\
    \ A remote stateless session bean implementing business workflow can be combined\
    \ with local entity beans to complete a particular use case in just one network\
    \ trip.\n\nWriting a stateless session bean is a tedious activity even with modern\
    \ integrated development environments. Each EJB 2.x or 1.x SLSB requires at least\
    \ three Java files to be created. You need two Java files for the home and remote\
    \ interfaces, while the third one is for the bean implementation class. Apart\
    \ from this, you have two XML deployment descriptors: the standard `ejb-jar.xml`\
    \ and the other vendor-specific XML that supplies runtime metadata. In the next\
    \ few sections, I will try to simplify the development of the session facade with\
    \ Spring EJB support classes.\n\nThe first step to building a session bean is\
    \ to create the home interface, as shown in Listing 4-15.\n\n**Listing 4-15.**\
    \ `UnderwritingRemoteHome.java`\n\n```\npublic interface UnderwritingRemoteHome\
    \ extends EJBHome {\n    UnderwritingRemote create() throws CreateException, RemoteException;\n\
    }\n```\n\nThe home interface is responsible for managing the life cycle of the\
    \ remote EJB object. In this case, the `create` method of the home interface acts\
    \ as a factory responsible for creating the remote objects. The remote object\
    \ implements the remote interface as shown in Listing 4-16.\n\n**Listing 4-16.**\
    \ `UnderwritingRemote.java`\n\n```\npublic interface UnderwritingRemote extends\
    \ EJBObject {\n    public void underwriteNewPolicy(String productCd, String name,\
    \ int age) throws RemoteException;\n}\n```\n\nThe remote interface defines all\
    \ the business methods that will be exposed by the SLSB to its clients. The bean\
    \ implementation class is responsible for providing implementation for the business\
    \ methods defined in the remote interface. Spring provides convenience base classes\
    \ to simplify the development of the bean implementation class.\n\nSo, it is important\
    \ to understand these classes before I get down into the implementation details.\n\
    \n![Image 44](index-180_1.png)\n\nAs you see in Figure 4-3, the `AbstractEnterpriseBean`\
    \ class forms the core of the Spring EJB support classes. This class can be subclassed\
    \ to support different forms of EJBs such as session beans, message-driven beans,\
    \ and so on. However, in most cases, you will not need to do that because Spring\
    \ already provides the appropriate subclasses. The `AbstractEnterpriseBean` class\
    \ helps create and load a Spring bean factory and makes it available to the EJB.\n\
    \n**Figure 4-3.** *Class diagram: Spring stateless session bean support*\n\nThe\
    \ `AbstractEnterpriseBean` is generic, and Spring provides a specialized `AbstractSessionBean`\
    \ class to develop session bean components. This class implements the `SessionBean`\
    \ interface and takes on the responsibility of saving the `SessionContext` object\
    \ injected by the EJB container. However, it should not be extended for supporting\
    \ SLSBs. Instead, your bean implementation should inherit from the more specialized\
    \ `AbstractStatelessSessionBean`. This class implements all the EJB callback methods.\
    \ This is very useful because in most cases you would require empty implementation\
    \ of these callbacks. This feature cleans up the bean implementation classes,\
    \ promotes reuse, and allows it to focus only on business logic. The subclasses\
    \ should override the `onEjbCreate` method to carry out any post-initialization\
    \ after loading the bean factory. Finally, Listing 4-17 shows the bean implementation\
    \ class.\n\n**Listing 4-17.** `UnderwritingRemoteBean.java`\n\n```\npublic class\
    \ UnderwritingRemoteBean extends AbstractStatelessSessionBean {\n```"
