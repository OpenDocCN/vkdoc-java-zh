    \ property `filterProcessesUrl`. APF will extract the URI using the `HttpServletRequest.getRequestURI()`\
    \ method. In this case, the method returns `/eInsureWeb/j_spring_security_check`.\
    \ This returned value is then compared to the context root and `filterProcessUrl`\
    \ combination to determine whether this URL has to be processed for authentication.\
    \ You may want to customize the names of the two text fields in Listing 6-5. I\
    \ have used the default values. To use custom values, you will need to configure\
    \ the properties `passwordParameter` and `usernameParameter` of the authentication\
    \ processing filter.\n\nNow, in the scenario under consideration, the APF determines\
    \ that the incoming request does need authentication. So, it will attempt to carry\
    \ out the actual authentication. For this it will use the `authenticationManager`\
    \ property. The authentication managers are pluggable helpers that carry out the\
    \ actual authentication; they implement the `AuthenticationManager` interface.\
    \ This interface defines a single method named `authenticate`. This method accepts\
    \ an `Authentication` object containing the user’s principal and credential. On\
    \ successful authentication, this method returns the `Authentication` object with\
    \ the user’s role list. This will be required later during authorization.\n\n\
    The authenticated user is redirected to the URL specified by the property `defaultTargetUrl`.\
    \ In this case, the user is directed to the web page for underwriting a new policy.\
    \ If the authentication fails, an `AuthenticationException` will be raised. In\
    \ this case, the user is redirected to the URL set in the property `authenticationFailureUrl`.\n\
    \nIn this example, the user is redirected to the login page. The `errorId` specified\
    \ in the `authenticationFailureUrl` flags the `login.jsp` file in Listing 6-5\
    \ to display the error messages because of an authentication failure.\n\nSpring\
    \ Security provides one custom authentication manager implementation in the form\
    \ of the `ProviderManager` class. This in turn delegates to authentication providers.\
    \ Authentication providers are adapters for the underlying authentication technology.\
    \ With this strategy, it is possible to authenticate with any identity management\
    \ system."
