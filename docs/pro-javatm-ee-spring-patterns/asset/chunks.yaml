    **总结**


    在本章中，我深入探讨了各种表示层模式。我们从一端开始，到另一端结束，为第 4 章的业务层模式奠定了基础。Front Controller 模式拦截所有请求并委托给
    Application Controller 模式中的动作处理器。动作处理器与 Context Object 和 Page Controller 模式协作以调用业务逻辑。一旦页面控制器选择了逻辑视图并返回从业务逻辑调用中检索到的数据，控制权就会传回给应用程序控制器。应用程序控制器使用视图管理组件来解析适当的物理视图并绑定应用程序数据。View
    Helper 模式有助于在视图中适配应用程序数据，并构建复合视图以发送最终响应供最终用户显示。前端控制器和页面控制器的工作可以通过 Intercepting
    Filter 模式和处理器拦截器进行装饰。Dispatcher View 模式提供了组合所有表示层模式以高效委托给静态视图的指导方针。最后，Service
    to Worker 模式为使用 Business Delegate 模式与业务层交互铺平了道路。


