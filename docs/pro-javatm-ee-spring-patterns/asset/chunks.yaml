    **使用第三方标签库**


    Spring 标签和 JSTL 是互补的标签库，提供了丰富的可重用功能集。尽管 Spring 标签为常见的 HTML 控件提供了不错的组件支持，但有时您需要更复杂的控件，例如前面提到的分页表格。在这种情况下，可以将第三方标签库与
    Spring 结合使用以简化开发。例如，Displaytag 是一个支持复杂分页和排序组件的开源标签库。可从 [`displaytag.sourceforge.net/11/`](http://displaytag.sourceforge.net/11)
    下载和使用。


    **结论**


    优势


    • *易于维护*：视图助手消除了脚本片段污染，从而清理了视图代码并提高了应用程序的可维护性。


    • *角色分离清晰*：现在可以将应用程序开发任务明确划分为核心 Java 程序员和 Web 作者。


    • *节省开发时间*：由于主要使用第三方视图助手标签库，您只需集成这些组件即可，因此可以加快开发速度。


