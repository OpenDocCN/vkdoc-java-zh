    **Java EE 应用程序设计**


    在前几节中，我为进一步详细探讨 Java EE 应用程序设计奠定了基础。然而，Java EE 软件设计本身就是一个庞大的主题，已有许多书籍对此进行论述。本书旨在通过
    Spring Framework 应用模式和最佳实践，来简化 Java EE 应用程序的设计与开发。因此，为了契合主题并保持简洁，我将只涵盖与此上下文相关的主题。这将使我能够在后续章节中，专注于理解该主题所必需的内容。


    一些开发者和设计师认为，Java EE 应用程序设计本质上就是面向对象设计。这没错，但 Java EE 应用程序设计涉及的内容远不止传统的对象设计。它需要找出问题域中的对象，然后确定它们之间的关系和协作。各个层中的对象被分配了职责，并定义了层间交互的接口。


    然而，任务并未就此结束。事实上，它变得更加复杂。这是因为，与传统的对象设计不同，Java EE 支持诸如 EJB 之类的分布式对象技术，用于部署业务组件。业务组件被开发为可远程访问的会话型企业
    JavaBean。JMS 和消息驱动 Bean（MDB）通过允许对象的分布式异步交互，使事情变得更加复杂。


    即使对于经验丰富的专业人士来说，分布式对象的设计也是一项极其复杂的任务。在制定最终解决方案之前，你需要考虑诸如可伸缩性、性能、事务等关键问题。使用粗粒度还是细粒度的会话
    EJB 外观的设计决策，会对 Java EE 应用程序的整体性能产生严重影响。同样，选择正确的方法来施加事务，也会对数据一致性产生关键影响。


    **使用模式简化应用程序设计**


    通过应用 Java EE 设计模式，可以极大地简化应用程序设计。


    Java EE 设计模式已在 Sun 的 Java 蓝图（[`java.sun.com/reference/blueprints`](http://java.sun.com/reference/blueprints)）以及《*Core
    J2EE Design Pattern*》（Prentice Hall, 2003）一书中有所记录。它们基于著名的《*Design Patterns: Elements
    of Reusable Object-Oriented Software*》（Addison Wesley, 1994）一书中描述的基本对象设计模式。这些模式也被称为四人帮（GOF）模式，因为这本书由四位作者合著：Eric
    Gamma、Richard Helm、Ralph Johnson 和 John Vlissides。


    Java EE 模式目录除了考虑核心对象设计原则外，还考虑了应对可远程访问分布式对象挑战的策略。


