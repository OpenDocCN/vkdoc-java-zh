  raw: 'The common strategy used by an enterprise application to establish trust with
    external users or systems is known as *authentication*. In the authentication
    process, the system asks a user one simple question: “Who you are?” The user will
    respond by supplying a principal (username) and credential (password). The system
    verifies the principal-credential combination, and if a match is found, the user
    is allowed to access the system. Note that authentication does not guarantee that
    the user has access to system resources. It merely unlocks the door to the web
    resources.


    10092ch06.qxd 7/29/08 10:30 AM Page 225


    C H A P T E R 6 **■** E X P L O R I N G C R O S S C U T T I N G D E S I G N PAT
    T E R N S


    **225**


    The decision whether an authenticated user has access to a resource is controlled
    by another process, called *authorization*. Authorization seeks to answer this
    question:


    “What can you do?” In other words, it tries to find out the operations that an
    authenticated user can perform in the system. In a Java EE application, this mainly
    involves protecting access to web resources such as JSPs. The user’s principal
    is generally associated with one or more roles. Each role in turn is linked to
    a set of resources or operations.


    The eInsure application had a sign-in form for users to supply a username and
    password combination to get authenticated. The supplied information was checked
    into the database, and valid users were granted access to carry out different
    operations.


    The database-driven authentication mechanism used in eInsure was rigid. It was
    placed deep inside the application and cut across all the tiers. In other words,
    the authentication logic was implemented just like any normal operation such as
    policy underwriting. In a refactored eInsure system, this would mean the request
    for authentication would be intercepted by the front controller and passed on
    to a page controller.


    This would be followed by the invocation of the business delegate, session facade,
    and data access objects.


    Ideally, authentication and security code should be applied transparently and
    need not span tiers. eInsure was being implemented by clients who had an existing
    enterprise-wide security policy and software in place. So, in most cases the database-driven
    approach did not work. Instead, the application had to adapt itself to the customers’


    existing security implementation such as Lightweight Directory Access Protocol
    (LDAP), Single Sign On (SSO), or OpenID. This resulted in a lot of code changes
    and testing in different tiers to integrate with an alternate authentication implementation.


    As shown in Listing 4-1 later in the chapter, the JSP controller used the user
    information as well as the event code to check whether the user has the privileges
    to execute a certain action. This check was also placed deep inside the presentation
    tier. Any changes to the authorization helper methods would lead to changes across
    all the controllers.


    Such deeply embedded authorization checks resulted in the mixing of security and
    presentation concerns. The authorization code in eInsure would query the database
    for each request to find out whether the user had the privileges to execute the
    action with the given event code. This database trip for each request had a negative
    impact on performance. Last but not least, the event code was hard-coded in the
    view and controller JSPs as well as maintained in the database. Any change to
    the event code value meant modification in all the JSPs. This often would lead
    to minor bugs that were very difficult to detect.


    **Forces**


    • Only valid users are allowed entry into the application.


    • All different entry points into an application should be guarded by authentication.


    10092ch06.qxd 7/29/08 10:30 AM Page 226


    **226**


    C H A P T E R 6 **■** E X P L O R I N G C R O S S C U T T I N G D E S I G N PAT
    T E R N S


    • All authenticated users should have the appropriate roles/authority to access
    secure system resources.


    • Authentication and authorization mechanisms should be encapsulated as independent
    components and applied transparently by configuration.


    **Solution**


    Implement a pluggable *authentication and authorization enforcer* to verify a
    user’s identity and allow access to secured resources.


    Strategies with the Spring Framework


    Spring Security implements the Authentication and Authorization Enforcer pattern
    as a set of two distinct yet very closely linked components. The authentication
    and authorization enforcer components work together and transparently apply authentication
    and authorization support both in the presentation tier of the Java EE web application
    and in the business tier. These components are highly configurable and extensible,
    as you will see in subsequent sections.


    The authentication enforcer’s primary responsibility is validating a user’s identity.
    It also checks for authentication whenever any request reaches the web application.
    If the user is authenticated, it allows the request to pass on to the authorization
    enforcer. If the authentication fails, the user will be redirected to the sign-on
    page.


    Authentication enforcers are generally pluggable, which helps to quickly adapt
    to any new authentication mechanism such as OpenID. The core component sits behind
    protocol-independent interceptors and uses helpers to delegate the actual authentication
    process. All user actions must go through these interceptors to apply authentication.


    Once the authentication core components are done, the authorization enforcer picks
    up the request. It checks to see whether the user who has initiated this action
    has enough privileges to access a particular web page or execute a certain method.
    If the user is trying to access a resource without validating his identity, the
    authorization enforcer will force him out to the sign-on page or access-denied
    page. Figure 6-1 shows the basic architecture of the authentication and authorization
    enforcer.


