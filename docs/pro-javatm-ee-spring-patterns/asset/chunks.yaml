    Strategies with the Spring Framework


    Although it is quite legitimate to put the business logic code in session facades,
    it is not the best approach. You will be better served by moving the business
    logic to POJO components and letting the session facade delegate to these POJOs.
    This will free up the session facade. It can now act as the gateway to the remotely
    accessible business tier.


    Since the business logic is now moved to POJO, it is easier to unit test. The
    POJO application services sit behind the SLSB gateway and so can also leverage
    robust infrastructure support such as transactions. In other words, all POJO methods
    that are invoked from the session facade will be part of the same transaction
    scope. Moving business logic to POJO components also reduces the effort that will
    be required to run an application like eInsure in a web container.


