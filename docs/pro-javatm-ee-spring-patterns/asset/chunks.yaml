    The different components of the Spring Security framework are the following:


    • The *security interceptor* acts as the gateway that intercepts requests for
    resources.


    It delegates security enforcement responsibilities to the core components. If
    a web resource is being protected, then the Spring Security interceptor is provided
    in the form of a servlet filter. Method invocation interceptors are implemented
    as aspects.


    • The *authentication manager* verifies a user’s identity. It is a pluggable component
    with a clearly defined service provider interface (SPI). So, it is possible to
    integrate virtually any authentication mechanism. Spring Security comes with several
    concrete authentication manager implementations covering most common needs.


    • The *access decision manager* is another pluggable component responsible for
    authorization. It allows authenticated requests to access system resources based
    on certain roles.


    Spring Security is based on the core Spring Framework. So, it has all the benefits
    of the Spring IOC container available with the security subsystem.


    **Authentication and Authorization with Spring Security**'
  trans: '

    企业应用与外部用户或系统建立信任的常用策略被称为*身份验证*。在身份验证过程中，系统会向用户提出一个简单的问题：“你是谁？”用户通过提供主体（用户名）和凭证（密码）来回应。系统会验证主体与凭证的组合，如果匹配成功，则允许用户访问系统。请注意，身份验证并不保证用户有权访问系统资源，它仅仅是打开了通往网络资源的大门。


    10092ch06.qxd 7/29/08 10:30 AM 第 225 页


    第 6 章 **■** 探索横切设计模式


    **225**


    决定已通过身份验证的用户是否有权访问资源的过程由另一个称为*授权*的流程控制。授权试图回答这个问题：“你能做什么？”换句话说，它试图找出已通过身份验证的用户可以在系统中执行哪些操作。在
    Java EE 应用程序中，这主要涉及保护对 JSP 等网络资源的访问。用户的主体通常与一个或多个角色相关联，而每个角色又链接到一组资源或操作。


    eInsure 应用程序有一个登录表单，供用户提供用户名和密码组合以进行身份验证。提供的信息会在数据库中进行核对，有效的用户将被授予执行不同操作的访问权限。


    eInsure 中使用的基于数据库的身份验证机制是僵化的。它被深埋在应用程序内部，并横跨所有层级。换句话说，身份验证逻辑的实现方式与保单核保等任何常规操作无异。在重构后的
    eInsure 系统中，这意味着对身份验证的请求将被前端控制器拦截，并传递给页面控制器。


    随后将调用业务委托、会话外观和数据访问对象。


    理想情况下，身份验证和安全代码应该透明地应用，无需跨越多个层级。eInsure 是由那些已经拥有企业级安全策略和软件的客户实施的。因此，在大多数情况下，基于数据库的方法并不奏效。相反，应用程序必须适应客户现有的安全实现，例如轻量级目录访问协议（LDAP）、单点登录（SSO）或
    OpenID。这导致了大量代码变更以及在不同层级进行测试，以便与替代的身份验证实现集成。


    如本章稍后的清单 4-1 所示，JSP 控制器使用用户信息以及事件代码来检查用户是否有权执行某个操作。这个检查也被深埋在表示层内部。对授权辅助方法的任何更改都将导致所有控制器的更改。


    这种深度嵌入的授权检查导致了安全关注点与表示关注点的混杂。eInsure 中的授权代码会为每个请求查询数据库，以确定用户是否有权使用给定的事件代码执行该操作。这种为每个请求进行的数据库查询对性能产生了负面影响。最后但同样重要的是，事件代码在视图和控制器
    JSP 中被硬编码，并在数据库中维护。对事件代码值的任何更改都意味着要修改所有 JSP。这常常会导致非常难以检测的小错误。


    **驱动力**


    • 只允许有效用户进入应用程序。


    • 应用程序的所有不同入口点都应受到身份验证的保护。


