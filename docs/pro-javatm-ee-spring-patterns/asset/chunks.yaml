    **匿名处理过滤器 (ANPF)**


    这是过滤器链中的第三个过滤器。其唯一目的是在安全上下文中设置一个匿名的 `Authentication` 对象。这将允许你浏览某些不安全的 URL，这些 URL
    无需验证用户身份即可查看。ANPF 可以像清单 6-13 所示那样进行配置。


    **清单 6-13.** applicationContext-security.xml


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE beans PUBLIC "-//SPRING//DTD BEAN//EN"


    ["http://www.springframework.org/dtd/spring-beans.dtd">](http://www.springframework.org/dtd/spring-beans.dtd)


    <beans>


    <!—其他 bean -->


    <bean id="anonymousProcessingFilter" class="org.springframework**➥**


    .security.providers.anonymous.AnonymousProcessingFilter">


    <property name="key" value="changeThis"/>


    <property name="userAttribute" value="anonymousUser,ROLE_ANONYMOUS"/>


    </bean>


    </beans>


    **异常转换过滤器 (ETF)**


    ETF 处理在身份验证或授权期间引发的任何异常。它在应用程序上下文中的配置如清单 6-14 所示。


    **清单 6-14.** applicationContext-security.xml


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE beans PUBLIC "-//SPRING//DTD BEAN//EN"


    ["http://www.springframework.org/dtd/spring-beans.dtd">](http://www.springframework.org/dtd/spring-beans.dtd)


    <beans>


    <!—其他 bean -->


    <bean id="exceptionTranslationFilter"


    class="org.springframework.security.ui.ExceptionTranslationFilter">


    <property name="authenticationEntryPoint" ref="authenticationEntryPoint" />


    <property name="accessDeniedHandler" ref="accessDeniedHandler" />


    </bean>


    <bean name ="authenticationEntryPoint" class="org.springframework. **➥**


    security.ui.webapp.AuthenticationProcessingFilterEntryPoint">


    <property name="loginFormUrl" value="/login.do"/>


    <property name="forceHttps" value="false"/>


    </bean>


    <bean name="accessDeniedHandler" class="org.springframework**➥**


    .security.ui.AccessDeniedHandlerImpl">


    <property name="errorPage" value="/denied.do"/>


    </bean>


    </beans>


    这个过滤器的任务很简单。在发生身份验证异常的情况下，ETF 使用 `authenticationEntryPoint` 属性将用户重定向到登录页面。如果发生授权失败，用户将被重定向到访问被拒绝页面。


    **过滤器安全拦截器 (FSI)**


    这是 Spring Security 中与身份验证处理过滤器并列的另一个关键过滤器。FSI 的主要职责是协助授权。如果未通过身份验证的用户试图访问受保护的资源，FSI
    应阻止该用户，并强制其进入访问被拒绝页面或登录页面。即使是已通过身份验证的用户，也可能只能访问资源的一个子集。FSI 确保有效用户只能访问其角色所允许的资源。它还允许用户匿名访问某些页面。例如，登录页面应对所有用户开放。FSI
    在 Spring 应用程序上下文中的配置如清单 6-15 所示。


    **清单 6-15.** applicationContext-security.xml


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE beans PUBLIC "-//SPRING//DTD BEAN//EN"


    ["http://www.springframework.org/dtd/spring-beans.dtd">](http://www.springframework.org/dtd/spring-beans.dtd)


    <beans>


    <!—其他 bean -->


    <bean id="filterInvocationInterceptor"


    class="org.springframework. **➥**


    security.intercept.web.FilterSecurityInterceptor">


    <property name="authenticationManager" ref="authenticationManager"/>


    <property name="accessDecisionManager" name="accessDecisionManager" />


    <property name="objectDefinitionSource">


    <value>


    CONVERT_URL_TO_LOWERCASE_BEFORE_COMPARISON


    PATTERN_TYPE_APACHE_ANT


    /secure/admin/**=ROLE_ADMIN


    /secure/**=IS_AUTHENTICATED_REMEMBERED


    /**=IS_AUTHENTICATED_ANONYMOUSLY


    </value>


    </property>


    </bean>


    </beans>


    关于 FSI，我首先要关注的属性是 `objectDefinitionSource`。在 Spring Security 中，受保护的资源被称为*对象定义*。这个名称是通用的，因为
    Spring Security 除了可以应用于 Web 应用程序外，还可以应用于方法调用和对象创建。`objectDefinitionSource` 由指令和
    URL 模式到角色的映射组成。这些指令与清单 6-3 中用于过滤器链代理的指令相同。


    拥有 `ROLE_ADMIN` 角色的用户可以访问所有以 `/secure/admin` 开头的 URL。只有经过身份验证的用户才允许进入所有以 `/secure`
    开头的 URL。所有其他 URL 可以匿名访问，或者如果用户已经过身份验证也可以访问。请注意，URL 映射将按照它们定义的顺序进行处理。此外，你可以自由地为你的应用程序定义任何你想要的角色。


    `authenticationManager` 属性使用了与 APF 相同的 Spring bean。它可以用于重新验证请求。这可能会影响应用程序性能，因此你需要谨慎设置，并且可以通过将
    FSI 的 `alwaysReauthenticate` 属性设置为 `false` 来控制这一点。`accessDecisionManager` 属性的工作方式类似于身份验证管理器，负责做出实际的授权决策。访问决策管理器的连接方式如清单
    6-16 所示。


    **清单 6-16.** applicationContext-security.xml


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE beans PUBLIC "-//SPRING//DTD BEAN//EN"


    ["http://www.springframework.org/dtd/spring-beans.dtd">](http://www.springframework.org/dtd/spring-beans.dtd)


    <beans>


    <!—其他 bean -->


    <bean name="accessDecisionManager"


    class="org.springframework.security.vote.AffirmativeBased">


    <property name="decisionVoters">


    <list>


    <bean class="org.springframework.security.vote.RoleVoter"/>


    <bean class="org.springframework.security.vote.AuthenticatedVoter"/>


    </list>


    </property>


    </bean>


    </beans>


    访问决策管理器实现了 `AccessDecisionManager` 接口。在这个例子中，我使用的是 `AffirmativeBased` 访问决策管理器。这个访问决策管理器由一个投票者列表控制。这类似于选举中的投票。这些投票者决定用户是否能够实际访问某个特定的受保护资源。访问决策管理器将向每个投票者征求投票。可能的值为
    `ACCESS_DENIED`、`ACCESS_GRANTED` 和 `ACCESS_ABSTAIN`（当投票者不确定时）。投票完成后，`AffirmativeBased`
    访问决策管理器执行一个简单的算法来得出结果。如果任何投票者投了 `ACCESS_GRANTED`，则授予用户访问权限。

