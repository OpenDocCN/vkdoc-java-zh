- fmt: "# Using a Factory Promotes P2I\n\nUsing a factory promotes an object design\
    \ best practice called *program to interface* (P2I). This principle states that\
    \ concrete objects must implement an interface that is used in the caller program\
    \ rather than the concrete object itself. Therefore, you can easily substitute\
    \ a different implementation with little impact on client code. In other words,\
    \ there is no direct dependency on the concrete implementation leading to low\
    \ coupling.\n\nListing 2-3 shows the `Car` interface.\n\n**Listing 2-3.** `Car.java`\n\
    \n```\npublic interface Car{\n    public Color getColor();\n    //other methods\n\
    }\n```\n\nThe `FerrariCar` provides a concrete implementation of the `Car` interface,\
    \ as shown in Listing 2-4.\n\n**Listing 2-4.** `FerrariCar.java`\n\n```\npublic\
    \ class FerrariCar implements Car{\n    //...implementation of methods defined\
    \ in Car\n    // ...implementation of other methods\n}\n```\n\nThis pattern also\
    \ consolidates object creation in only a handful of factory classes, making it\
    \ easy to maintain. With a factory helper, it is also possible to make object\
    \ creation configurable. You can define the concrete implementation that you supply\
    \ in some properties or XML configuration files, making it swappable on the fly.\n\
    \n## Locate in Registry Service\n\nThis third method should be familiar with EJB\
    \ developers. They often need to look up EJB object references on the JNDI registry\
    \ service. In this case, the EJB objects are already created and registered in\
    \ JNDI with a specific key. The objects may be located in a remote JVM, but JNDI\
    \ makes lookup using this key quite similar to Listing 2-2.\n\nAll these strategies\
    \ are commonly called *pull* dependency injection. This is because the dependent\
    \ object is pulled in by the object that ultimately uses it. I prefer to classify\
    \ the pull methods as dependency resolution, rather than dependency injection.\
    \ This is because the true dependency injection happens with IOC and is called\
    \ *push* DI. In this approach, an external container or application framework\
    \ creates and passes the dependent object to the object that requires it. The\
    \ dependent objects are mostly supplied using constructor or setter methods. However,\
    \ for this the application framework must know which dependent object to provide\
