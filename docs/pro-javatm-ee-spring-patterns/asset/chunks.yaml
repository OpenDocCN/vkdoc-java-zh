    # Chapter 3: Exploring Presentation Tier Design Patterns


    ## View Helper


    ### Problem


    The application controller and page controllers combine with the gateway servlet
    to solve three important concerns of request processing:


    - Request interception

    - Invoking business components from page controllers

    - Resolving the next view to be displayed with the data returned from business
    layer


    However, in all the earlier discussions, I have deliberately bypassed another
    critical concern—view creation. The data returned by the page controllers, as
    a result of invoking the business logic, have to be consumed by the view components
    to provide the final dynamic response.


    `eInsure` primarily used JSP as the view technology. The data returned by the
    business components was set as request attributes. It was later retrieved, processed,
    and used in the JSPs using scriptlets. In other words, the dynamic data was combined
    with the static markup or template text in the JSPs using embedded programming
    logic. This littering of scriptlets significantly reduced reuse and increased
    maintenance efforts.


    ### Forces


    - Remove the programming logic from the template-based views like JSP.

    - Achieve a division of labor between Java developers and web page authors.

    - Create reusable components that can be used to combine model data across views.


    ### Solution


    Use *view helpers* to adapt model data with the view components in the presentation
    layer.


    ![Image 37](index-130_1.png)


    ### Strategies with the Spring Framework


    This pattern separates out the logic for retrieving and processing model data
    from the static markup in the JSPs. It can optionally format data types such as
    date and currency, depending on the locale. As shown in Figure 3-15, it should
    be used as a thin layer to adapt model data into views. Note that view helpers
    should not be responsible for invoking business or data access logic.


    **Figure 3-15.** *Working of a view helper*


    #### JavaBeans View Helper


    This is the simplest form of view helper strategy. JSP provides out-of-the-box
    tags to support POJO view helpers. Listing 3-46 shows that `policydetails.jsp`
    is using the `PolicyDetail` POJO as the JavaBean view helper.


    **Listing 3-46.** `policydetails.jsp`


    ```jsp

    <jsp:useBean id="policydetails" scope="request"

    class="com.apress.insurance.common.dataholder.PolicyDetail"/>


    <html>

    <head>

    <title>Underwriting</title>

    <script>

    function eventSubmit(url){

    document.policy.action = url;

    document.policy.submit();

    }

    </script>

    </head>

    <body>

    <form name="policy">

    <table>

    <tr>

    <td>First Name:</td>

    <td><jsp:getProperty name="policydetails" property="firstName"/></td>

    </tr>

    <tr>

    <td>Last Name:</td>

    <td><jsp:getProperty name="policydetails" property="lastName"/></td>

    </tr>

    <tr>

    <td>Age :</td>

    <td><jsp:getProperty name="policydetails" property="age"/></td>

    </tr>

    <tr>

    <td colspan="3">

    <input type="button" value="Create"

    onClick="eventSubmit(''createPolicy.do'')" />

    <input type="button" value="Edit"

    onClick="eventSubmit(''editPolicy.do'')" />

    </td>

    </tr>

    </table>

    </form>

    </body>

    </html>

    ```


    The page controller is responsible for invoking the business object, which returns
    POJOs to be populated in views. Listing 3-47 shows the controller that binds the
    transfer object in the request scope.


    **Listing 3-47.** `PolicyDetailsController.java`


    ```java

