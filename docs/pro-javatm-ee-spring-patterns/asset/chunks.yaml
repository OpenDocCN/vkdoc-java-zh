- fmt: "# 第5章 探索集成层设计模式\n\n`JdbcTemplate`是Spring JDBC DAO支持中最重要的类。该类实现了GOF模板方法设计模式。模板方法模式定义了特定操作的工作流程或算法。它允许子类在不改变算法核心结构的情况下修改某些步骤。`JdbcTemplate`整合了所有与JDBC工作流相关的常见重复代码块。\n\
    \n正如我稍后将展示的，`JdbcTemplate`定义的工作流可以在适当的位置进行修改，以提供自定义处理。清单5-4显示了策略详情DAO实现类。\n\n\
    **清单5-4.** `PolicyDetailDaoImpl.java`\n\n```java\npackage com.apress.einusre.persistence.dao.impl;\n\
    \npublic class PolicyDetailDaoImpl extends JdbcDaoSupport implements PolicyDetailDao{\n\
