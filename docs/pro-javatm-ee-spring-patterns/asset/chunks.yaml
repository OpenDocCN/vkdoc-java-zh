    APF 需要做出的第一个决定是，传入的请求是否需要身份验证。为此，它依赖于属性 filterProcessesUrl。APF 将使用 HttpServletRequest.getRequestURI
    方法提取 URI。在本例中，该方法返回 /eInsureWeb/j_spring_security_check。然后将此返回值与上下文根和 filterProcessUrl
    的组合进行比较，以确定是否需要对这个 URL 进行身份验证处理。你可能希望自定义清单 6-5 中两个文本字段的名称。我使用了默认值。要使用自定义值，你需要配置身份验证处理过滤器的
    passwordParameter 和 usernameParameter 属性。


    现在，在当前场景下，APF 确定传入的请求确实需要身份验证。因此，它将尝试执行实际的身份验证。为此，它将使用 authenticationManager 属性。身份验证管理器是可插拔的辅助组件，负责执行实际的身份验证；它们实现了
    AuthenticationManager 接口。该接口定义了一个名为 authenticate 的单一方法。该方法接受一个包含用户主体和凭证的 Authentication
    对象。


    10092ch06.qxd 7/29/08 10:30 AM 第 237 页


    第 6 章 **■** 探索横切设计模式


    **237**


