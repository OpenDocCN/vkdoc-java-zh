    引言


    **本**书将 Java EE 设计模式与 Spring 框架相结合。Java EE 设计模式目录为任何 Java EE 应用的设计和架构提供了宝贵的参考。另一方面，Spring
    框架是 Java EE 的事实标准。Spring 以其固有的简单编程模型和对对象设计最佳实践的强调，帮助复兴并提高了 Java EE 平台的采用率。


    长期以来，我一直将 Spring 框架与设计模式结合使用来构建 Java EE 应用。本书旨在记录一份与最新 Java 5 EE 规范相关的、在 Spring
    框架中常用的设计策略目录。我相信这本书将成为那些有兴趣使用 Java EE 和 Spring 框架构建企业应用的设计师和开发者的参考。


