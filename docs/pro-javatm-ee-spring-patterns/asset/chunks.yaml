- fmt: 'The `eInsure` application used SLSBs to deploy remotely accessible business
    logic. These SLSBs were accessed from the JSP controllers as shown in Listing
    4-1. However, as I have already highlighted, business objects should be accessed
    from the business delegate.


    Soon, `eInsure` code was refactored, and the Business Delegate pattern was put
    in use. But the business service access code that moved from the JSP controller
    to the business delegate continued to have the original problems. One such problem
    was the invocation of multiple remote business methods in response to a user action.
    The use case "underwrite new policy" in `eInsure` could be divided into four subtasks:
    saving policy details, querying the product workbench to retrieve the default
    risk and cover list, associating these risks and cover list to the policy, and
    finally creating accounting records that will be used later to track premium payments.
    Hence, to fulfill this use case, the business delegate would invoke the four remote
    business methods.


    The approach described in the previous paragraph had immediate side effects. The
    fine-grained remote business method invocation from the business delegate increased
    network round-trips. This also required large data sets to be marshaled and unmarshaled
    over the network for each method call. The end result was the degradation of application
    performance. The whole thing was accentuated by the fact that in `eInsure` the
    SLSBs relied on entity beans for persistence. Each of the subtasks used at least
    two entity beans to save and retrieve data from the RDBMS. Since entity beans
    were remotely accessible persistence components and required data marshaling and
    unmarshaling, they also added to the network clog.


    Invoking multiple session bean methods from the business delegate per user action
    increased the chances of business logic spilling over into the client tier. It
    also increased the possibility of client-side transaction management that the
    EJB component model should have eliminated. Since multiple session bean methods
    were involved, it created a lot difficulty in setting the appropriate transaction
    attribute while using declarative container-managed transaction (CMT) support.
    Using entity beans that themselves were transactional components did not help
    the cause either. It was difficult to decide whether to handle transactions in
    session beans or in entity beans.


    ## Forces


    - Consolidate business workflow in remotely accessible components.

    - Expose coarse-grained business interfaces to access entity beans in one network
    call.

    - Prevent business logic and system-level services such as transaction management
    from spilling over into the business tier''s clients.

    - Improve performance by consolidating business methods.


    ## Solution


    Expose a remotely accessible *session facade*, which will encapsulate business
    logic while exposing a coarse-grained API to the clients.


    ### Strategies with the Spring Framework


    A session facade is an application of the GOF facade pattern to an EJB session
    bean. The facade pattern presents a unified interface for a group of interfaces
    in the subsystem. In other words, a facade is a higher-level interface that makes
    it easier to use the subsystem.


    In the context of EJBs, this means the session beans act as a facade and expose
    only a single business method per user action. This method in turn invokes private
    session bean methods. Another option is to consolidate the entire business logic
    in one session facade method. This method then provides coarse-grained access
    to the business tier. Because only a single method of the remote business object
    carries out the workflow pertaining to a use case, it is easy to apply a container-managed
    transaction on this method. Later in this chapter I will explain a flexible and
    cleaner solution in connection with the Application Service pattern.'
  raw: 'The eInsure application used SLSBs to deploy remotely accessible business
    logic. These SLSBs were accessed from the JSP controllers as shown in Listing
    4-1\. However, as I have already highlighted, business objects should be accessed
    from the business delegate.


    Soon, eInsure code was refactored, and the Business Delegate pattern was put in
    use. But the business service access code that moved from the JSP controller to
    the business delegate continued to have the original problems. One such problem
    was the invocation of multiple remote business methods in response to a user action.
    The use case “underwrite new policy” in eInsure could be divided into four subtasks:
    saving policy details, query-ing the product workbench to retrieve the default
    risk and cover list, associating these risks and cover list to the policy, and
    finally creating accounting records that will be used later to track premium payments.
    Hence, to fulfill this use case, the business delegate would invoke the four remote
    business methods.


    The approach described in the previous paragraph had immediate side effects. The
    fine-grained remote business method invocation from the business delegate increased
    network round-trips. This also required large data sets to be marshaled and unmarshaled
    over the network for each method call. The end result was the degradation of application
    performance. The whole thing was accentuated by the fact that in eInsure the SLSBs
    relied on entity beans for persistence. Each of the subtasks used at least two
    entity beans to save and retrieve data from the RDBMS. Since entity beans were
    remotely accessible persistence components and required data marshaling and unmarshaling,
    they also added to the network clog.


