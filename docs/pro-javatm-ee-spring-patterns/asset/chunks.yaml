    第 3 章 **■** 探索表示层设计模式


    **解决方案**


    使用*应用程序控制器*将操作和视图处理与前端控制器解耦。


    Spring 框架中的策略


    应用程序控制器是任何 Java EE Web 框架的重要内部组件。由于它静默地运行在网关 Servlet 之后，并且通常能满足应用程序的所有需求，开发者很少会关注这个组件。


    例如，在 Struts 框架中，`RequestProcessor`类承担了应用程序控制器的工作。在内部，Struts 的前端控制器`ActionServlet`将视图和操作管理委托给这个类。可以扩展这个类来覆盖默认行为。但
    Struts 开发者几乎从不这样做。


    Spring MVC 为`DispatcherServlet`编排的操作-视图管理提供了类似的支持。与 Struts 一样，通常不需要开发者付出任何努力，可能除了某些可选配置。你在之前的示例中已经看到了这一点。你既没有编写任何代码，也没有为视图或操作处理进行任何配置。然而，对资源`createPolicy.do`的请求却由适当的页面控制器处理了。这是可能的，因为
    Spring 为命令和视图处理提供了合理的默认值。在接下来的几节中，我将介绍 Spring 框架提供的各种应用程序控制器配置选项。Spring 框架高度灵活，它将应用程序控制器分为两个不同的部分，将在接下来的几节中讨论。


    操作处理


    Spring 的操作/命令处理起初可能会让人有些不知所措，因为涉及很多类。所以，我们将循序渐进地学习。图 3-2 展示了操作管理工作流的简化视图。我暂时有意省略了视图管理部分。


    ![图 24](img/index-75_1.png)


    ![图 25](img/index-75_2.png)


