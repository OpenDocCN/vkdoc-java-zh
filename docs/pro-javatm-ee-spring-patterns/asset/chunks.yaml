    Spring 框架提供了一套全面的类，用于从所有不同的应用服务器中检索 JNDI 绑定的对象。`JndiObjectFactoryBean` 是 Spring
    框架中使用最广泛的服务定位器类。它是一个工厂 Bean，因此实现了 `FactoryBean` 接口。工厂 Bean 是 Spring Bean 工厂内的一个对象工厂。因此，Spring
    IOC 容器对工厂 Bean 的处理方式与普通 Bean 不同。它的配置方式与普通 Bean 相同，但 Spring 不会返回 `JndiObjectFactoryBean`
    的新实例。相反，它暴露出来用于注入的对象始终是它创建或检索到的对象。对于 `JndiObjectFactoryBean`，这是通过 `getObject`
    方法实现的，该方法返回从 JNDI 检索到的对象。因此，此服务定位器实现可用于查找和注入任何类型的 JNDI 对象。由于 `JndiObjectFactoryBean`
    继承自 `JndiAccessor` 类，因此可以轻松配置各种与 JNDI 相关的属性。图 4-2 显示了 Spring JNDI 类图。


    **图 4-2.** *类图：服务定位器*


