    Because the entity beans ran inside the EJB containers, they were difficult to
    test. The result was long development cycles and maintenance overhead.


    The developers’ problems were compounded by the side effects of using entity beans.
    Because the accessing of getter/setters in entity beans were remote method invocations,
    the data transfer objects (DTOs) were designed to extract all the data from the
    entity beans in just a single method call. The DTOs were simple POJOs with getters
    and setters and implemented the Serializable interface. In a large to midsize
    project that had several DTOs, these classes added to the maintenance problem.
    A small field change in any DTO often resulted in compilation failures in multiple
    source files.


    The development community had no choice but to move to lightweight persistence
    solutions provided by ORM frameworks such as Hibernate, Kodo, iBatis, and others.


    These products focused on the persistence of POJOs with minimal configuration
    information. This proved to be a telling blow for entity beans, and it finally
    made way for JPA


