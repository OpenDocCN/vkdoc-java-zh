- fmt: "# The Spring Framework\n\nThe Spring Framework also started to address the\
    \ complexity associated with developing Java EE applications. However, unlike\
    \ the single-tier frameworks such as Struts, Hibernate, or HiveMind, Spring provides\
    \ a comprehensive multitier framework that can be leveraged in all tiers of an\
    \ application. It helps structure together the entire application with out-of-the-box\
    \ components as well as integrates with the best single-tier frameworks. Just\
    \ like its single-tier counterparts, it provides a simple programming model based\
    \ on POJOs and makes them easily testable because these components can run outside\
    \ server containers.\n\nThe Spring Inversion of Control (IOC) container (to be\
    \ discussed in the next section) is the heart of the entire framework. It helps\
    \ glue together the different parts of the application, thus forming a coherent\
    \ architecture. Spring MVC components can be used to build a very flexible web\
    \ tier. The IOC container simplifies the development of business layer with POJOs.\n\
    \nThese POJO business components can be made available as distributed objects\
    \ through the various remoting options available with Spring. They can also be\
    \ used to develop as well as connect to distributed EJB components. With Spring\
    \ AOP, it is possible to transparently apply system services such as transactions,\
    \ security, and instrumentation to POJO components. Spring JDBC and object-relational\
    \ mapping (ORM) components allow simplified interaction with databases. As an\
    \ application framework, Spring provides easy standards-based integration with\
    \ disparate information systems through Java Connector Architecture (JCA) and\
    \ web services. Last but not least, Spring security is a comprehensive solution\
    \ to cater to the security requirements of any enterprise application.\n\n## Spring\
    \ Framework’s Building Blocks\n\nSpring is an application framework and is divided\
    \ into several modules or components. Each module provides a specified set of\
    \ functionality and works more or less independently of the others. Needless to\
    \ say, these modules can be leveraged to build scalable yet flexible enterprise\
    \ Java applications. This system is very flexible, because developers can choose\
    \ to use only the module that is most appropriate in the context of a problem.\
    \ For example, a developer can just use the Spring DAO module and build the rest\
    \ of the application with non-Spring components. Moreover, Spring provides integration\
    \ points to work with other frameworks and APIs. If you think Spring is unsuitable\
    \ in a particular scenario, you can use alternatives. In case the development\
    \ team is more proficient in Struts, for example, it can be used instead of Spring\
    \ MVC while the rest of the application uses Spring components and features such\
    \ as JDBC and transactions. In the two scenarios described here, the developers\
    \ need not deploy the entire Spring Framework. They will require only the relevant\
    \ module (like Spring DAO) along with the Spring IOC container and the Struts\
    \ libraries.\n\nFigure 2-1 shows the various modules of the Spring Framework.\n\
    \n![Image 21](index-47_1.png)\n\n**Figure 2-1.** *High-level building blocks of\
    \ the Spring Framework*\n\n### Spring Core\n\nThe Core module forms the backbone\
    \ of the entire Spring Framework. All other Spring modules are dependent on this\
    \ module. It is also called the IOC container and is central to Spring’s support\
    \ for dependency injection (DI).\n\n#### Inversion of Control\n\nIOC is best described\
    \ by the term the *Hollywood principle*, which states “Don’t call us; we’ll call\
    \ you.” (The junior artists often hear this from production managers in Hollywood.)\
    \ However, this is important in software development as well to control the flow\
    \ of applications while ensuring high cohesion and low coupling. To better understand,\
    \ this let us consider a simple case when your application performs some calculations\
    \ and prints the end result using a logging library like log4j. In this case,\
    \ the application code is responsible for the flow of control while invoking methods\
    \ on the log4j API as and when necessary.\n\nIOC, on the other hand, is fundamental\
    \ to any framework. With IOC, an application object is typically registered with\
    \ the framework that takes the responsibility of invoking methods on the registered\
    \ object at an appropriate time or event. The control is inverted because instead\
    \ of application code invoking the framework API, things happen just the opposite.\
    \ Thus, in short, IOC is the principle of allowing another object or framework\
    \ to invoke methods on your application objects on the occurrence of appropriate\
    \ events.\n\nIOC is not a new concept and has been around for a long time. EJBs,\
    \ for example, supports IOC. The various EJB components such as session, entity,\
    \ and message-driven beans lay down specific contracts with the container by implementing\
    \ the methods defined in different interfaces. The session bean, for example,\
    \ implements the `ejbActivate` and `ejbPassivate` life-cycle methods defined in\
    \ the `javax.ejb.SessionBean` interface. However, these methods are never called\
    \ from other methods of the session bean; rather, the container calls these methods\
    \ at different times during the life cycle of the bean, thus inverting control.\
    \ Message-driven beans, for instance, implement the `onMessage` method of the\
    \ `javax.jms.MessageListener` interface. It is the responsibility of the container\
    \ to invoke this method on the event of a message arrival.\n\n#### Dependency\
    \ Injection\n\nIt is common for developers to believe that IOC and DI are the\
    \ same thing. This is incorrect, and I want to make it clear right at the outset\
    \ that they are two different yet related concepts. Just as IOC deals with inverting\
    \ the control flow in an application, DI describes how one object resolves or\
    \ finds other objects on which it needs to invoke some methods. There are several\
    \ ways to achieve DI, and one such strategy is IOC. I will explain the different\
    \ DI strategies one by one in the next few sections.\n\n##### Direct Instantiation\n\
    \nDirect instantiation is the simplest form of DI. The dependent object is directly\
    \ instantiated using the `new` operator, as shown in Listing 2-1.\n\n**Listing\
    \ 2-1.** `FormulaOneDriver.java`: *Using Direct Instantiation*\n\n```java\npublic\
    \ class FormulaOneDriver{\n\n    public Car getCar(){\n        Car car = new FerrariCar();\n\
    \        return car;\n    }\n}\n```\n\nThe Formula 1 driver object (`FormulaOneDriver`)\
    \ needs a car to drive. Hence, it creates an instance of the `Car` object directly\
    \ and uses it. Direct instantiation increases coupling and scatters object creation\
    \ code across the application, making it hard to maintain and unit test.\n\n#####\
    \ Factory Helper\n\nThe factory helper is a common and widely used dependency\
    \ injection strategy. It is based on the GOF factory method design pattern. The\
    \ factory method consolidates the use of the `new` operator and supplies appropriate\
    \ object instances based on some input. This is shown in Listing 2-2.\n\n**Listing\
    \ 2-2.** `FormulaOneDriver.java`: *Using Factory Helper*\n\n```java\npublic class\
    \ FormulaOneDriver{\n\n    public Car getCar(){\n        Car car = CarFactory.getInstance(\"\
    FERARI\");\n        return car;\n    }\n}\n```"
