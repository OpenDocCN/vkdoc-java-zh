    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用


    **图 2-2.** *使用 Spring 框架的轻量级应用架构* 图 2-2 展示了一个利用不同 Spring 框架模块的三层 Web 应用。我将逐一剖析每一层，以了解这些模块是如何被使用的，以及构建灵活、简单的企业级
    Spring 应用有哪些不同的选择。


    **表示层**


    顾名思义，Spring MVC 提供了遵循 MVC 模式构建 Web 应用的一流组件。与任何优秀的 Web 框架一样，Spring MVC 有助于构建控制器层。它非常灵活，支持多种用于视图管理的组件，包括核心
    Java EE 技术（如 JSP）以及其他技术（如可扩展样式表语言（XSL）和便携式文档格式（PDF））。


    如图 2-2 所示，来自客户端 Web 浏览器的 HTTP 请求首先由控制器组件拦截。该组件包含一个作为应用单一入口点的网关 Servlet。然后，该 Servlet
    将后续的用户请求委托给相应的处理器，这些处理器被称为*页面控制器*。页面控制器是简单的 Java 类，负责执行一个应用用例并调用业务服务。Spring


    10092ch02.qxd 2008 年 7 月 21 日 下午 4:56 第 37 页


    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用


    **37**


    MVC 还包含一个视图管理层（为简化起见未在图中显示），该层负责定位合适的视图（可能是另一个 JSP）。它还会绑定页面控制器在调用业务层模型对象后返回的数据对象，并最终将
    HTTP 响应分派给客户端。所有负责视图管理、控制器管理的对象以及页面控制器本身，都注册在底层的 Spring IOC 容器中。因此，Spring MVC
    模块可以享有该容器的所有优势。请注意，网关 Servlet 不属于 Spring IOC 容器的一部分；相反，它由 Web 服务器管理。


    Spring MVC 是一个多功能的模块，几乎支持所有可用的视图和模型技术。例如，如果你的开发团队对 Java Server Faces（JSF）或 Struts
    更有信心，那么将这些框架与 Spring MVC 集成是完全可行的。


    你可以很好地使用基于模板的视图引擎，如 Velocity 和 FreeMarker；基于文档的视图，如 PDF、Microsoft Word 和 Microsoft
    Excel；以及 Adobe Flex 提供的丰富用户界面。就模型而言，Spring MVC 不仅与 POJO 业务组件完美融合，而且与分布式 EJB


    组件也同样配合良好。


    **业务层**


    使用 Spring，你可以将业务组件开发为普通的 Java 类，而无需任何框架依赖。这与 EJB 编程模型完全相反，后者要求实现多个不同的接口以及部署描述符，使开发人员的生活变得复杂。


    POJO 业务对象都像前面示例中显示的任何其他 Bean 一样，在 Spring IOC 容器中进行配置。它们负责执行业务规则，并在此过程中使用集成层中可用的数据访问
    API 来操作应用数据。


    Spring AOP 模块在业务层扮演着重要角色。它可以用于声明式地应用和控制 POJO 业务组件上的事务和安全性。


    可以利用 Spring AOP 开发自定义切面，以收集审计跟踪信息或检测方法执行时间，而不会影响现有的应用代码。


    可以开发一个混合解决方案，结合使用 Spring POJO 和 EJB。Spring IOC


    实现了服务定位器模式（将在第 4 章讨论），用于查找（拉取式依赖注入）EJB 的 Home 接口，然后将这些对象注入到 POJO 业务对象中。


    请注意，EJB 容器提供的系统级服务现在可供应用使用。在这种场景下，Spring 框架使用会话 Bean 扮演了 EJB 客户端的角色。Spring 还通过便捷的超类帮助实现
    EJB。我们将在第 4 章作为 Spring 业务层模式的一部分更详细地探讨这一点。


    10092ch02.qxd 2008 年 7 月 21 日 下午 4:56 第 38 页


    **38**


    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用


    需要重点注意的是，Spring MVC 并不是连接到 Spring 业务层的唯一方式。可以将 Spring 业务对象暴露为 Web 服务。类似地，各种其他远程调用选项，如
    Spring 远程调用、Burlap-Hessian 等，也可以用于连接到 Spring 组件，使其作为远程组件可用。我将在第 4 章结合集成层模式探讨一些远程调用解决方案。


    **集成层**


    大多数应用中的集成层通过 POJO 数据访问对象，使用 JDBC API 与关系型数据库管理系统（RDBMS）进行交互。数据访问对象为业务层对象提供了一致的
    API，并封装了 JDBC API。Spring DAO 为简单灵活的数据访问对象提供了模板。数据访问对象更新关系型数据库，并从中检索数据。检索到的数据被封装在
    JavaBean 对象中，并返回给上层。


    与其他两层一样，即使在集成层，Spring 也提供了大量选择。Spring ORM 允许开发团队轻松使用对象关系桥接解决方案，例如 Hibernate 或
    TopLink。Java EE 应用中的集成层并不局限于与关系型数据库通信。可能还需要连接到大型机或 ERP/CRM 系统。与业务层一样，在这里我们也可以利用
    Spring JEE 模块，使用诸如 JCA 或 Web 服务等标准技术来连接这些系统和应用。


    **Spring 企业级 Java 设计模式指南**


    在上一章中，我讨论了 Java EE 架构和设计的基础。在此过程中，我提到设计中的最佳实践可以整理为设计指南或设计模式。这些为开发人员和设计人员之间交流设计思想提供了通用词汇。现在，我将把上一章学到的经验与本章的经验结合起来，以制定
    Spring Java EE


    应用设计模式指南。这个模式模板或指南将在接下来的四章中使用，以描述如何最好地使用 Spring 框架应用 Java EE 设计模式。


    **名称**


    这是用于标识模式的名称。


    10092ch02.qxd 2008 年 7 月 21 日 下午 4:56 第 39 页


    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用


    **39**


    **问题**


    本节描述了你试图解决的一个或多个问题。我将使用本节来强调在使用现有 Java EE 技术设计解决方案时的复杂性。


    **驱动力**


    本节承接上一节，概述了模式的意图及其适用性。


    **解决方案**


    我将提供解决所考虑问题的详细解决方案。在本节中，我将讨论使用 Spring 框架的不同可能策略。我还会确定各种最佳实践，并提及构成解决方案基础的基本模式和对象设计原则。将广泛使用
    UML 类图和时序图以及源代码示例来清晰地呈现解决方案。


    **后果**

