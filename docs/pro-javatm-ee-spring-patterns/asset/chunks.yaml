- fmt: "They also present controls such as buttons, links, and input boxes for the\
    \ users to interact with the system. But from the perspective of the application\
    \ controller and view management, `ViewResolver` is the most important interface.\
    \ It is responsible for the complete decoupling of view and controllers. Figure\
    \ 3-6 shows the basic view resolver class diagram.\n\n![Image 28](index-82_1.png)\n\
    \n**Figure 3-6.** *View management class diagram*\n\nThe `ViewResolver` interface\
    \ defines a single method, `resolveViewName`, which tries to resolve a view by\
    \ name. This method also takes a `Locale` object as an argument, which allows\
    \ implementing classes to support internationalized view lookup. The `BeanNameViewResolver`\
    \ class resolves a view by looking up the current application context for a bean\
    \ that has the same name as the view name. `AbstractCachingViewResolver` provides\
    \ a convenience base class to implement view resolvers. It caches view objects\
    \ once resolved. Like many other classes in the Spring Framework, this class implements\
    \ the template pattern, and subclasses implement the abstract method `loadView`.\n\
    \nThe `ResourceBundleViewResolver` and `XmlViewResolver` use resource bundles\
    \ and XML files to load view definitions. However, this is not the only difference,\
    \ as I will show you in the examples later in this chapter. `UrlBasedViewResolver`\
    \ is useful because it converts view names to URLs, without any mapping definition\
