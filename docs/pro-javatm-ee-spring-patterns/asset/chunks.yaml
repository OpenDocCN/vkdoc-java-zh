    \ validated, and an error code are passed to the `rejectIfEmpty` method for validation.\
    \ If there is a validation failure, the error object is populated with the error\
    \ message. This message is picked up from a resource bundle based on the supplied\
    \ error code.\n\n**Listing 3-30.** `PolicyFormbeanValidator.java`\n\n```java\n\
    public class PolicyFormbeanValidator implements Validator {\n\n    public boolean\
    \ supports(Class clazz) {\n        return PolicyFormBean.class.equals(clazz);\n\
    \    }\n\n    public void validate(Object formBean, Errors errors) {\n       \
    \ PolicyFormBean policybean = (PolicyFormBean) formBean;\n        ValidationUtils.rejectIfEmpty(errors,\
    \ \"firstName\", \"mandatoryfirstname\");\n    }\n}\n```\n\nNow that the validator\
    \ is ready, it must be connected to the controller. This is done by wiring it\
    \ in the Spring configuration. Apart from this, the resource bundle locator also\
    \ must be configured. This is shown in the modified Spring configuration in Listing\
    \ 3-31.\n\n**Listing 3-31.** `insurance-servlet.xml`\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\n>\n \
