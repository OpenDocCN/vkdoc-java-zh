    第 3 章 **■** 探索表示层设计模式


    **131**


    **驱动力**


    *   应用程序主要需要处理使用动态数据生成的动态视图。

    *   业务或数据访问代码混合在动作处理器中。

    *   业务逻辑和数据访问代码应放置在不同的层中。


    **解决方案**


    使用*服务到工作者*模式，通过调用不同层中的组件来协调请求处理工作流。


