    even to POJO application service components. This makes an application highly
    portable. You can now deploy this application in a web container with just a few
    configuration changes. This application, with the POJO domain service, can also
    continue to run in the EJB container and subscribe to container-managed transactions.
    Thus, with the Spring Framework, you do not need an EJB to support transactions.


    The Spring Framework neither implements any transaction monitor nor tries to directly
    manage transactions. Instead, it delegates to the underlying transaction implementation
    through an abstraction called a *platform transaction manager*. There are transaction
    manager implementations for most of the widely used platforms—JDBC, object-relational
    mapping such as Hibernate and TopLink, JTA, JCA, and all major application servers.
    In the next few sections, I will review some frequently used transaction managers.


    **Plain JDBC Transactions**


    The DataSourceTransactionManager handles all the transactional requirements if
    straight JDBC or Spring DAO is being used in the application. It can be configured
    in the Spring application context as shown in Listing 6-26.


