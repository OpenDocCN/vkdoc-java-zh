- fmt: '# Evolution of Distributed Computing


    In distributed computing, an application is divided into smaller parts that run
    simultaneously on different computers. This is also referred to as *network computing*
    because the smaller parts communicate over the network generally using protocols
    built on top of `TCP/IP` or `UDP`. The smaller application parts are called *tiers*.
    Each tier provides an independent set of services that can be consumed by the
    connecting or client tier. The tiers can be further divided into *layers*, which
    provide granular-level functions. Most applications have three distinct layers:


    - The *presentation layer* is responsible for the user interfaces.

    - The *business layer* executes the business rules. In the process, it also interacts
    with the data access layer.

    - The *data access layer* is responsible retrieving and manipulating data stored
    in enterprise information systems (EISs).


    The modern state of network computing can be better understood by analyzing the
    gradual transition of distributed application architecture. In the next few sections,
    I will examine the transition of distributed architecture with suitable examples.


    ## Single-Tier Architecture


    The single-tier architecture dates back to the days of monolithic mainframes connected
    by dumb terminals. The entire application comprising layers such as user interfaces,
    business rules, and data was collocated on the same physical host. The users interacted
    with these systems using terminals or consoles, which had very limited text-based
    processing capabilities (see Figure 1-1).


    **Figure 1-1.** *Single-tier architecture*


    ![Image 7](index-25_1.jpg)


    ## Two-Tier Architecture


    In the early 1980s, personal computers (PCs) became very popular. They were less
    expensive and had more processing power than the dumb terminal counterparts. This
    paved the way for true distributed, or *client-server*, computing. The client
    or the PCs now ran the user interface programs. It also supported graphical user
    interfaces (GUIs), allowing the users to enter data and interact with the mainframe
    server. The mainframe server now hosted only the business rules and data. Once
    the data entry was complete, the GUI application could optionally perform validations
    and then send the data to the server for execution of the business logic. `Oracle
    Forms`–based applications are a good example of two-tier architecture. The forms
    provide the GUI loaded on the PCs, and the business logic (coded as stored procedures)
    and data remain on the Oracle database server.


    Then there was another form of two-tier architecture in which not only the UI
    but even the business logic resided on the client tier. This kind of application
    typically connected to a database server to run various queries. These clients
    are referred to as *thick* or *fat* clients because they had a significant portion
    of the executable code in the client tier (see Figure 1-2).


    **Figure 1-2.** *Two-tier architecture*


    ![Image 8](index-26_1.jpg)


    ## Three-Tier Architecture


    Two-tier thick client applications are easy to develop, but any software upgrade
    because of changes in user interface or business logic has to be rolled out for
    all the clients. Luckily, the hardware cost became cheaper and processing power
    increased significantly on the CPU in the mid-90s. This, coupled with the growth
    of the Internet and web-based application development trends, resulted in the
    emergence of three-tier architectures.


    In this model, the client PC needs only thin client software such as a browser
    to display the presentation content coming from the server. The server hosts the
    presentation, the business logic, and the data access logic. The application data
    comes from enterprise information systems such as a relational database. In such
    systems the business logic can be accessed remotely, and hence it is possible
    to support stand-alone clients via a Java console application. The business layer
    generally interacts with the information system through the data access layer.
    Since the entire application resides on the server, this server is also referred
    to as an *application server* or *middleware* (see Figure 1-3).


    **Figure 1-3.** *Three-tier application*


    ![Image 9](index-27_1.jpg)


    ## N-Tier Architecture


    With the widespread growth of Internet bandwidth, enterprises around the world
    have web-enabled their services. As a result, the application servers are not
    burdened anymore with the task of the presentation layer. This task is now off-loaded
    to the specialized web servers that generate presentation content. This content
    is transferred to the browser on the client tier, which takes care of rendering
    the user interfaces. The application servers in n-tier architecture host remotely
    accessible business components. These are accessed by the presentation layer web
    server over the network using native protocols. Figure 1-4 shows the n-tier application.


    **Figure 1-4.** *N-tier application*


    ## Java EE Architecture


    Developing n-tier distributed applications is a complex and challenging job. Distributing
    the processing into separate tiers leads to better resource utilization. It also
    allows allocation of tasks to experts who are best suited to work and develop
    a particular tier. The web page designers, for example, are more equipped to work
    with the presentation layer on the web server. The database developers, on the
    other hand, can concentrate on developing stored procedures and functions. However,
    keeping these tiers as isolated silos serves no useful purpose. They must be integrated
    to achieve a bigger enterprise goal. It is imperative that this is done leveraging
    the most efficient protocol; otherwise, this leads to serious performance degradation.


    Besides integration, a distributed application requires various services. It must
    be able to create, participate, or manage transactions while interacting with
    disparate information systems. This is an absolute must to ensure the concurrency
    of enterprise data.


    Since n-tier applications are accessed over the Internet, it is imperative that
    they are backed by strong security services to prevent malicious access.


    These days, the cost of hardware, like CPU and memory, has gone down drastically.
    But still there is a limit, for example, to the amount of memory that is supported
    by the processor. Hence, there is a need to optimally use the system resources.
    Modern distributed applications are generally built leveraging object-oriented
    technologies. Therefore, services such as object caches or pools are very handy.
    These applications frequently interact with relational databases and other information
    systems such as message-oriented middleware. However, opening connections to these
    systems is costly because it consumes a lot of process resources and can prove
    to be a serious deterrent to performance. In these scenarios, a connection pool
    is immensely useful to improve performance as well as to optimize resource utilization.'
