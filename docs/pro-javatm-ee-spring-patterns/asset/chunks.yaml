    **使用 AbstractCommandController**


    Web 应用程序中的大多数用例都是通过收集 HTML 表单中提供的信息，然后基于这些表单数据执行业务操作来运行的。可以主要通过使用 `getParameter`
    方法从 `HttpServletRequest` 对象中获取所有表单数据。将请求对象传递给业务层是一种不好的做法，因为这样会使业务层依赖于特定协议类型的客户端。因此，可以使用
    `getParameter` 方法来检索所有必要的数据以填充 JavaBean 对象。这个 JavaBean 对象被传递给业务层。


    将 JavaBean 创建逻辑放在控制器中违反了 SRP（单一职责原则）。对表单字段的任何更改都可能导致控制器的更改。一个灵活且清晰的设计是在控制器外部创建此
    JavaBean 对象，并将其作为参数传递给控制器。实现 `AbstractCommand**➥**Controller` 类的控制器满足了这一要求。处理器适配器从
    `HttpServletRequest` 对象中填充 POJO 对象，然后将其传递给控制器。它将表单字段名称映射到 POJO 的属性。


