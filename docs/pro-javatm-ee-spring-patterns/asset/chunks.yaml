    public void savePolicyDetails(String productCd,String name,int age) {


    Object args [] = {productCd,name,new Integer(age)};


    this.getJdbcTemplate().update(PolicyDetailDao.


    SAVE_POLICY_DETAILS_SQL, args);


    }


    }


    From the simplified code in Listing 5-4, it is clear that JdbcTemplate fosters
    reuse, and this has resulted in a significant code reduction in the DAO implementation.
    The tight coupling with the JDBC and collection packages (as in Listing 5-1) has
    been removed.


    The leakage of JDBC resource is no longer a problem because JdbcTemplate methods
    ensure that database resources are released in the proper sequence after they
    have been used. In addition, you are not forced to handle exceptions while using
    Spring DAO. The JdbcTemplate class handles the SQLException and rethrows a runtime
    exception because in most cases it is not possible to recover from these database
    errors.


