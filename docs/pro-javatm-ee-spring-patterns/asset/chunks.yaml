    **标签库视图助手**


    基于 JavaBean 的视图助手使用起来很简单。最棒的是，即使没有 Spring 框架的任何支持，它也能工作。然而，它仍然将编程逻辑混入了 JSP 中。它也不允许使用基于组件的视图助手。让我们考虑一个场景，你需要在
    HTML 表格中分页显示搜索结果。如果我们有一个可重用的组件，能够根据搜索结果列表显示分页的搜索结果，那将非常方便。这个组件可以进一步扩展，以支持对任何列上的搜索结果进行排序。


    eInsure 中的 JSP 页面混合了 HTML 和 JavaBean 来显示诸如选择框和下拉菜单之类的组件。这些最好作为可重用组件来处理。


    所有这些组件都可以使用标签库轻松开发。标签库提供了通用的可重用组件，以满足直到现在为止使用 JavaBean 助手或脚本片段处理的不同需求。此外，还有高效的第三方基于组件的标签库可用，以简化灵活且健壮的视图组件的开发。


