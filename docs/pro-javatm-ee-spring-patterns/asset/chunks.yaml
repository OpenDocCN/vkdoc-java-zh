    **结论**


    优点


    *   *提高了灵活性*：应用程序现在由更小的视图组件组成，例如嵌入在布局中的控件和容器。这使得视图易于配置，并且可以快速高效地推出应用程序外观以及组件定位的更改。

    *   *提高了复用性*：使用此模式，同一个子视图可用于组成多个复合视图。


    关注点


    *   *性能*：在组合视图时，使用多个子视图可能会影响性能。因此，应审慎地将子视图数量控制在可接受的范围内。


