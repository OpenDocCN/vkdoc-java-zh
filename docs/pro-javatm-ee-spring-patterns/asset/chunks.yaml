    第 5 章 **■** 探索集成层设计模式


    **数据访问对象**


    **问题**


    eInsure 应用程序严重依赖实体 Bean 进行数据库操作。早在 1999 年，当实体 Bean 首次出现（作为 EJB 1.*x* 规范的一部分）时，它们被认为是一种卓越的企业级组件，将彻底改变企业软件的开发、部署、维护和可移植性。


    这种想法是有依据的。实体 Bean 提供了基于标准、容器管理、分布式、安全、事务性的持久化组件。它们提供了透明且自动的持久化功能，客户端无需担心底层数据存储。但这种流行只是昙花一现。随着开发人员、设计人员和架构师开始使用实体
    Bean，问题逐渐显现。他们很快意识到，除了持久化之外，实体 Bean 提供的大多数功能在他们的应用程序中并不需要。实体 Bean 的分布式特性导致客户端进行细粒度的调用。这增加了网络流量，并对性能产生了不利影响。


    第 4 章中描述的业务层外观模式是解决这种细粒度实体 Bean 访问问题的一种方案。会话 Bean 还负责处理安全性和事务性需求。


    随着使用量的迅速下降，EJB 2.*x* 规范引入了本地接口的概念，至少是为了缓解网络往返的问题。但这仍然没有解决开发实体 Bean 所涉及的复杂性。开发实体
    Bean 需要四个 Java 源文件，包括本地和远程接口、Bean 实现以及一个主键类。除了 Java 源文件之外，根据服务器供应商的不同，您还需要两到三个部署描述符。您已经从第
    4 章的会话 Bean 中了解了两个部署描述符。一些应用服务器使用第三个部署描述符来将数据库表和列映射到 Bean 类及其属性。由于实体 Bean 在 EJB
    容器内运行，因此很难进行测试。结果是开发周期长，维护开销大。


    使用实体 Bean 的副作用加剧了开发人员的问题。由于访问实体 Bean 中的 getter/setter 是远程方法调用，因此设计了数据传输对象（DTO），以便仅通过一次方法调用就从实体
    Bean 中提取所有数据。DTO 是简单的 POJO，包含 getter 和 setter，并实现了 Serializable 接口。在一个拥有多个 DTO
    的大型或中型项目中，这些类增加了维护问题。任何 DTO 中的一个小字段更改通常会导致多个源文件编译失败。


    开发社区别无选择，只能转向由 ORM 框架（如 Hibernate、Kodo、iBatis 等）提供的轻量级持久化解决方案。


    这些产品专注于以最少的配置信息实现 POJO 的持久化。这对实体 Bean 来说是一个沉重的打击，并最终为 EJB 3.*x* 规范中的 JPA 铺平了道路。JPA
    支持基于注解配置的 POJO 持久化。更重要的是，JPA 实体在 EJB 容器之外运行，并且易于测试。


    eInsure 开发团队很快意识到，返回大型列表的搜索操作在使用实体 Bean 时效率极低，因为搜索列表中的每个对象本身就是一个实体 Bean。因此，访问此实体
    Bean 中的属性会导致网络往返以及数据的编组和解组。团队很快转向了直接的 JDBC 方法。JDBC API 直接从会话 Bean 中使用，以执行 SQL
    查询，如清单 5-1 所示。


