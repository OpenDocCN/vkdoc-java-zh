    bean class is ensured. Amidst all the changes, the home interface remains unaffected.


    The business interface is not limited to providing compile-time checks. It can
    be used with the Spring proxy-based service locators to remove the code redundancy
    associated with the business delegate. Proxies are like duplicates that stand
    in for the real object. To remove the business delegate layer, you will need to
    alter the page controllers to now work with the business interface, as shown in
    Listing 4-28.


