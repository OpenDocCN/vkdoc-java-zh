    第 1 章 **■** 企业 Java 应用程序架构与设计介绍


    表 1-1 根据 Java EE 的当前状态略有改动。例如，数据传输对象模式已不再出现在目录中，因此未列出。该模式曾用于跨层传输数据，尤其在使用远程实体 Bean
    持久化组件时非常有用。但随着新的 Java 持久化 API（Java EE 5 平台的一部分）以及普通旧 Java 对象（POJO）编程模型的普遍趋势，该模式已不再相关。


    此表远非完整。某些模式可以跨层应用。例如，安全设计模式可以应用于表示层，以限制对 JSP 等 Web 资源的访问。类似地，安全模式可用于控制对业务层 EJB
    组件的方法调用。例如，事务模式可以应用于业务层和集成层。这些模式被归类为*横切*模式。我将在第 6 章详细探讨横切模式。


    **使用 UML 进行 Java EE 架构与设计**


    大多数现代应用程序都是迭代开发的。随着越来越多的需求变得可用，系统逐渐增长。此类系统的核心是通过迭代演进的高层设计和架构。为了开发团队和维护团队的利益，以文本和可视化形式记录设计和架构也是至关重要的。可视化表示非常有用，因为它有助于开发人员理解运行时交互和编译时依赖关系。


    UML 是一种图形化语言，用于对复杂企业系统中的架构和详细设计进行建模和可视化。它基于对象管理组织（OMG）开发的规范。我将使用 UML 2.0 表示法（这是最新版本），可在
    [`www.uml.org/`](http://www.uml.org) 获取。然而，UML 并不局限于架构和设计，它可用于软件开发的各个阶段。UML 提供了丰富的表示法集来描述类和对象以及各种关系和交互。


    现代 UML 建模工具，如 IBM Rational XDE、Visual Paradigm、Sparx Systems Enterprise Architect
    等，允许在系统设计期间应用设计模式和最佳实践。此外，使用这些工具，设计模型可用于生成应用程序源代码的很大一部分。


    UML 图有多种类型。但对于 Java EE 设计模式的分析，我将主要关注类图和序列图，以及一种称为*构造型*的简单扩展机制。如果你是 UML 新手或渴望了解更多，最好的
    UML 参考书是 Martin Fowler 所著的《*UML 精粹第三版*》（Addison Wesley，2005）。


