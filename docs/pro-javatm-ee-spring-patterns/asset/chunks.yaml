    • *简化设计*：前端控制器现在遵循单一职责原则，因为它只负责拦截请求并委托给专门的类。


    • *促进可重用性*：引入前端控制器消除了模块控制器，并极大地提高了可重用性。


    缺点


    • *单点故障*：前端控制器也是任何应用程序的单点故障。


    **应用程序控制器**


    **问题**


    在讨论前端控制器模式时介绍的 JSP 控制器，旨在执行以下与请求处理相关的任务：


    **1.** 拦截传入请求。


    **2.** 调用业务组件。


    **3.** 识别并重定向到下一个视图。


    前端控制器设计模式解决了第一个问题。与 JSP 控制器一样，完全可以在前端控制器中构建其他两个功能。但这将导致一个高度不灵活、臃肿、神奇的前端控制器，它承担了过多的职责。随着应用程序的增长，维护和使用如此复杂且特定的前端控制器将变得异常困难。这正是
    eInsure 应用程序中基于 JSP 的控制器所遇到的问题。


    一位新客户希望将他们基于 WebWork 2.0 框架构建的现有再保险产品与 eInsure 集成。集成很快就遇到了重重困难，因为控制器从未被设计来满足此类需求。eInsure
    的另一位现有客户要求一项名为*保单报价*的新功能。此功能将使该保险公司的潜在客户能够估算他们需要为新保单支付的保费近似值。为此，他们将使用移动设备连接到系统，并提供生成报价（或暂定保费值）所需的最少信息。


