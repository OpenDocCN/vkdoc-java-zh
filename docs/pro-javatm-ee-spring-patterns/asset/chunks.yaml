  raw: 'The session facades run in the EJB container. As a result, they were difficult
    to unit test. A prospective client of eInsure could not afford commercial application
    server licenses. Hence, they wanted to deploy this application on open source
    products. Their team was already using an Apache Tomcat and ObjectWeb JOTM-based
    platform to run a few applications. Hence, they wanted to leverage the Tomcat
    web server with the JDBC-based transaction-processing capabilities of the JOTM
    transaction monitor. However, because the all-important business tier of eInsure
    was tightly coupled to SLSB, it would be a painful and effort-intensive activity
    to successfully run eInsure without an EJB container support.


    **Forces**


    • Session bean development requires experienced developers with sound knowledge
    of EJBs and application servers.


    • The session facade should act only as a gateway to the business tier and delegate
    the actual business logic execution to helpers. It should declaratively subscribe
    to container services.


    • Session facades should not grow to an unmanageable proportion.


    • Business logic should run outside an EJB container.


    • Business logic should be easy to unit test.


    **Solution**


    Use an *application service* to concentrate business logic in POJO classes.


