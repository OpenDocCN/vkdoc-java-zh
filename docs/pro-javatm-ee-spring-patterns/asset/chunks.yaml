  trans: '

    **本**书第一章讨论了 JavaEE 应用程序架构与设计的基本原则。在本章中，我将展示这些概念如何应用于 Spring 框架。我将首先简要概述 Spring
    及其作为应用程序框架的重要性。接着，我会介绍构成该框架的构建模块，在此过程中你将看到框架的实际运作。在理解 Spring 框架的基本原理后，我将讨论它在企业级
    Java 应用程序架构与设计中的作用。最后，我将以 Spring Java 设计模式指令作为本章的收尾，该指令将在本书接下来的三章中使用。如果你有兴趣运行本章中的代码，可以直接跳到第
    7 章，那里提供了在基于 Eclipse 的 Blazon ezJEE Studio 中安装 Spring 框架插件的分步说明，同时还展示了如何创建开发和运行这些示例所需的示例项目结构。


    **什么是 Spring？**


    Spring 框架是一个开源应用程序框架，最初面向 Java 平台。最近它也被移植到了.NET 平台。该框架的理念和代码最初由 Rod Johnson 在其著作《*Expert
    One-on-One* *J2EE Design and Development*》（Wrox 出版社，2002 年）中描述。这个框架是 Rod 作为英国金融行业客户的独立软件顾问，在丰富的项目经验基础上取得的成果。


    **21**


    10092ch02.qxd 7/21/08 4:56 PM 第 22 页


    **22**


    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用程序


    Spring 框架目前基于 Apache 2.0 开源许可证发布。它是一个高质量的软件产品，可用于构建简洁、灵活的企业级软件。这一点已通过 Headway
    Software 公司的 Structure101 工具（[`www.headwaysoftware.com`](http://www.headwaysoftware.com)）的测试得到证实。Headway
    公司的创始人兼 CEO Chris Chedgey 在其博客（[`chris.headwaysoftware.com/2006/07/springs_structu.html`](http://chris.headwaysoftware.com/2006/07/springs_structu.html)）中报告称，Spring
    框架代码“尽管规模合理，约 70KLOC（根据字节码估算），分为 139 个包，却没有包级别的依赖循环。”


    这充分说明了 Spring 框架底层架构与设计的合理性。如果你希望了解更多信息，请参考[`www.springframework.org/node/310`](http://www.springframework.org/node/310)。


    **为什么 Spring 如此重要？**


    Java EE 平台旨在解决与分布式应用程序开发相关的复杂性。传统的 Java EE 平台通过 EJB、JTA 和 JMS 等各种 API，在标准化底层中间件服务方面取得了巨大成功。这之所以成为可能，是因为商业供应商和开源社区携手合作，共同认识到基于标准
    Java 的平台所具有的巨大潜力。由于主要关注点在于标准化系统服务，因此简化编程模型这一根本问题被忽视了。因此，尽管在 20 世纪 90 年代末和 21 世纪初被广泛采用，但在
    Java EE 平台上开发多层应用程序仍然需要付出巨大的努力。


    Java EE 平台旨在基于组件模型构建应用程序。*组件*是一段自包含的代码，理想情况下可以在多个应用程序中重用。一个订单组件可以包含一个实体 Bean 来处理订单信息的持久化，以及一个会话
    Bean 来对订单实体执行不同的工作流。理论上，这具有巨大的重用潜力。但现实情况却不同，因为在一个项目中开发的组件很少会在另一个项目中再次使用。Java EE
    服务器特定的部署描述符也使得这些组件难以重用。Java EE 编程模型的复杂性还导致开发团队编写、测试和维护大量不必要的代码。这包括用于在 JNDI 树上查找
    EJB 对象、获取数据库连接、准备和执行数据库查询，以及最终释放所有数据库资源的样板代码。用于规避实体 Bean API 限制的数据传输对象严重违反了面向对象的封装原则。即使是一个中等规模的项目，也需要开发和维护大量的传输对象。所有这些都导致了资源的严重消耗，而这些资源本应仅用于开发健全的业务逻辑。


    10092ch02.qxd 7/21/08 4:56 PM 第 23 页


    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用程序


    **23**


    EJB 旨在帮助简化事务性和分布式应用程序的开发。尽管即使是最小的数据库驱动应用程序也需要事务，但它可能不需要分布式。然而，过度使用 EJB，特别是使用会话
    Bean 来简化业务逻辑，会导致将分布式特性内建到应用程序组件模型中。分布式应用程序异常复杂，因此会消耗更多的 CPU 周期进行处理。它们会导致大量重复的代码和元数据。访问分布式应用程序组件需要网络遍历，以及大数据集的编组和解组。对分布式对象的误用常常导致即使是简单的应用程序也无法达到预期的性能水平。


    Java EE 包含了许多本质上就很复杂的技术和 API。例如，实体 Bean API 需要相当长的学习曲线，而给应用程序带来的好处却有限。由于 Java
    EE 组件在应用服务器容器内运行，因此它们很难进行单元测试。这阻碍了测试驱动开发（TDD）。


    Java EE 应用程序开发中的困难迫使开发社区寻找替代方案。很快，基于不同 Java EE API 构建的框架迅速涌现。例如，Apache Struts
    框架利用 Servlet API 帮助实现 MVC 原则。该框架实现了一个基于 Servlet 的前端控制器，并允许开发者为简单的页面控制器提供实现。另一方面，Hibernate
    的出现是为了解决与实体 Bean 开发相关的巨大痛苦。它提供了 POJO 的持久化功能，且只需最少的配置元数据。这些 POJO 不像实体 Bean 那样是分布式对象，因此带来了更好的应用程序性能。Hibernate
    不需要任何容器支持，从而使得对这些持久化对象进行单元测试变得容易。随后又出现了 HiveMind，用于开发基于 POJO 的简单业务服务。

