    **Using Apache Tiles**


    Spring MVC also provides integration with the Apache Tiles framework. Just like
    SiteMesh, Tiles is a flexible and highly extensible framework that earlier worked
    primarily with the Struts web framework. As of Tiles 2, it works independently
    as a flexible, feature-rich layout framework. Both SiteMesh and Tiles 2 are powerful
