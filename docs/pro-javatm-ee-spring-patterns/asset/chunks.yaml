    false\" />\n    <property name=\"proxyInterface\"\n              value=\"com.apress.einsure.business.ejbfacade.UnderwritingLocalHome\"\
    \ />\n  </bean>\n</beans>\n```\n\nThe `eInsure` application had a large number\
    \ of session beans carrying out business workflow. But this resulted in lots of\
    \ redundant metadata information bloating the Spring configuration file. You can\
    \ minimize the duplication of configuration information by inheriting from an\
    \ abstract template definition, as shown in Listing 4-9.\n\n**Listing 4-9.** `insurance-servlet.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n  xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n  http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
    >\n  <bean name=\"underwritingBusinessDelegate\"\n        class=\"com.apress.insurance.view.delegate.UnderWritingBusinessDelegate\"\
    >\n    <property name=\"uwrLocalHome\" ref=\"uwrSlsbLocalHome\" />\n  </bean>\n\
    \  <bean id=\"lazyJndiObjectFactoryBean\" abstract=\"true\"\n        class=\"\
    org.springframework.jndi.JndiObjectFactoryBean\">\n    <property name=\"cache\"\
    \ value=\"false\" />\n    <property name=\"lookupOnStartup\" value=\"false\" />\n\
    \  </bean>\n  <bean id=\"uwrSlsbLocalHome\" parent=\"lazyJndiObjectFactoryBean\"\
    >\n    <property name=\"jndiName\" value=\"UnderwritingBeanLocal\" />\n    <property\
    \ name=\"proxyInterface\"\n              value=\"com.apress.einsure.business.ejbfacade.UnderwritingLocalHome\"\
    \ />\n  </bean>\n</beans>\n```"
