    # Introduction


    **T** his book combines the Java EE design patterns with the Spring Framework.
    The Java EE design pattern catalog provides an invaluable reference for any Java
    EE application design and architecture. The Spring Framework, on the other hand,
    is the de facto standard for Java EE. Spring, with its inherently simple programming
    model and emphasis on object design best practices, has helped revive and increase
    the adoption of the Java EE platform.


    I have been using the Spring Framework in combination with design patterns to
    build Java EE applications for a long time now. This book is an effort to document
    a catalog of frequently used design strategies with the Spring Framework, which
    is relevant in the context of the latest Java 5 EE specifications. I am sure this
    book will be a reference for designers and developers who are interested in building
    enterprise applications with Java EE and the Spring Framework.


    ## Who This Book Is For


    This book is primarily meant for Java EE application designers and architects.
    Experienced developers with knowledge of the Java EE design patterns and the Spring
    Framework will also find this book immensely useful.


    ## How This Book Is Structured'
