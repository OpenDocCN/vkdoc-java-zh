- fmt: '**4.** Once the correct handler mapping for a given request is detected, its
    `getHandler` method is invoked to return an instance of `HandlerExecutionChain`.


    **5.** The `doDispatch` method looks for an interceptor list that has been configured
    in the Spring container. However, it is not mandatory to have interceptors for
    requests; it depends entirely on your requirement.


    **6.** If one or more interceptors have been configured, the `preHandle` method
    is invoked on each one of them to preprocess a request.


    **7.** The `doDispatch` method gets an instance of a page controller by invoking
    the `getHandler` method on `HandlerExecutionChain`.


    **8.** Just like handler mappings, there can be multiple handler adapters registered
    with the Spring MVC framework. The `getHandlerAdapter()` method of the front controller
    servlet looks up the list of handler adapters to find the one most suitable for
    executing the selected page controller.


    **9.** Once the handler adapter is found, the request processing is delegated
    to its `handle()` method.


    **10.** The `handle()` method is responsible for invoking the correct page controller
    methods and converting the returned value into a type that the Spring MVC framework
    understands.


    **11.** Finally, any postprocessing task is carried out with the help of the interceptors.


    ### Using Action Handlers


    As shown earlier, `HandlerMapping` along with `HandlerAdapter` forms the backbone
    of the robust and highly flexible Spring action management component. They bring
    the flexibility of program to interface (P2I), thus allowing different concrete
    implementations. Both the handler mapping and the handler adapter provide extension
    points into the Spring MVC framework. Let’s say you need to map a page controller
    based on a value set in a cookie. You can achieve this with a custom handler mapping
    implementation. Assume that this page controller was developed as part of some
    homegrown web framework. You can create a handler mapping implementation to invoke
    appropriate methods on this controller and consume the returned results. Using
    the customized version is as simple as implementing the interfaces or any of the
    abstract classes and then configuring it with the Spring container. However, this
    is not required in most cases. This is because Spring provides several concrete
    implementations that are sufficient in most cases. I have been explaining a lot
    of theoretical stuff so far, so I will now show how to put the implementation
    classes into action.


    #### `BeanNameUrlHandlerMapping`


    This handler mapping is used to map the request URL directly to the bean object
    or a page controller registered in the Spring IOC container. In other words, the
    URL is matched with the name of the bean in the application context. Consider
    a request for the following URL: `http://www.myinsuranceportal.com/insuranceapp/createPolicy.do`.
    This request is intercepted by the dispatcher or front controller servlet, which
    would look for a handler mapping registered in the Spring web application context.
    You can do this as shown in Listing 3-6.


    **Listing 3-6.** `insurance-servlet.xml`


    ```xml

    <beans>


    <bean name="beanNameUrlHandlerMapping"


    class="org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping"/>


    <bean name="/createPolicy.do" class="com.apress.insuranceapp.web.CreatePolicyController"/>


    </beans>

    ```


    However, as stated earlier, this configuration is optional because `BeanNameUrlHandlerMapping`
    is the default handler. In case no handler mapping is found in the web application
    context, Spring MVC will create an instance of `BeanNameUrlHandlerMapping`. Now
    that the handler mapping is detected, the front controller will then look up a
    bean with the name `/createPolicy.do` in the Spring container. It manages to resolve
    this as the `CreatePolicyController` command handler bean.


    This handler mapping works relative to the servlet mapping and is not dependent
    on the context path. Hence, changes in context path or servlet mapping will not
    require a change in the bean configuration in the Spring container. However, it
    is possible to turn on the use of full path by setting a boolean flag, `alwaysUseFullPath`,
    as shown in the configuration in Listing 3-7.


    **Listing 3-7.** `insurance-servlet.xml`


    ```xml

    <beans>


    <bean name="beanNameUrlHandlerMapping" class="org.springframework.web.servlet.handler.BeanNameUrlHandlerMapping">


    <property name="alwaysUseFullPath" value="true" />


    </bean>


    </beans>

    ```


    #### `SimpleUrlHandlerMapping`


    The `BeanNameUrlHandlerMapping` class does not support wildcards to resolve a
    request URL to a bean name. Let’s assume you want the `UpdatePolicyController`
    to handle two requests: `/createPolicy.do` and `/updatePolicy.do`. With `BeanNameUrlHandlerMapping`,
    you will need to configure two `<bean />` entries. This is redundant, and configuration
    can be simplified with Apache Ant–style wildcard path mapping with the `SimpleUrlHandlerMapping`
    class. Since this is not the default handler mapping, it has to be explicitly
    configured in the Spring configuration file, as shown in Listing 3-8.


    **Listing 3-8.** `insurance-servlet.xml`


    ```xml

    <beans>


    <bean name="simpleUrlHandlerMapping"


    class="org.springframework.web.servlet.handler.SimpleUrlHandlerMapping">


    <property name="mappings">


    <props>


    <prop key="/*Policy.do">updatePolicyController</prop>


    </props>


    </property>


    </bean>


    <bean name="updatePolicyController" class="com.apress.insuranceapp.web.UpdatePolicyController"/>


    </beans>

    ```


    As shown in Listing 3-8, the controllers are configured just like any other bean
    in the Spring container. The `mappings` property of the handler mapping is very
    important. It is wired using a `java.util.Properties` object. Each key of this
    object is a URL pattern. The key for the `updatePolicyController` is the URL pattern:
    `/*Policy.do`. It uses the `*` wildcard. This means any request URL ending with
    `Policy.do` will be handled by this page controller. Note that once this handler
    mapping is detected by the dispatcher servlet, it no longer needs to create the
    default bean handler mapping instance.


    ### View Handler


    Now it’s time to take a closer look at another piece of the application controller
    puzzle—view management. Figure 3-5 shows the simple application controller workflow
    with the view handler component.


    **Figure 3-5.** *View management workflow*


    The role of dispatcher servlet as the coordinator is reemphasized in Figure 3-5.
    Note that the view handlers are completely decoupled from the action management
    component. This is achieved with the `View` and `ViewResolver` interfaces. The
    `View` interface is an abstraction of any presentation technology available. This
    makes it possible to integrate and use with Spring MVC any presentation technology,
    such as an HTML-based JSP or a document-based PDF. Views essentially display the
    results of business object invocation.'
