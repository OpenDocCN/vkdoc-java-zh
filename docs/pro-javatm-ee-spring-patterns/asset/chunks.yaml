    **Using Third-Party Tag Library**


    Spring tags and JSTL are complementary tag libraries providing a rich set of reusable
    features. Although Spring tags provide decent component support for common HTML


    controls, at times you will need more complex controls, such as the pagination
    table mentioned earlier. In such scenarios, third-party tag libraries can be used
    along with Spring to ease development. Displaytag, for example, is an open source
    tag library supporting complex pagination and sorting components. It is available
    for download and use fr[om http://displaytag.sourceforge.net/11/.](http://displaytag.sourceforge.net/11)


    **Consequences**


    Benefits


    • *Ease maintenance*: View helpers remove scriptlet pollution and thus clean up
    view code and improve application maintainability.


    • *Clear role separation*: The task of application development can now be clearly
    divided between hard-core Java programmers and web authors.


    • *Save development time*: Since mostly third party view helper tag libraries
    are used, it can speed up development because you just need to integrate these
    components.


