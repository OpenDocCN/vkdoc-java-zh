    The access decision managers implement the AccessDecisionManager interface. In
    this case, I am using the AffirmativeBased access decision manager. This access
    decision manager is controlled by a list of voters. It is similar to voting in
    an election. These voters decide whether a user can actually access a particular
    protected resource. The access decision manager will poll each voter for a vote.
    The possible values are ACCESS_DENIED, ACCESS_GRANTED, and ACCESS_ABSTAIN (when
    the voter is unsure). Once the voting is done, the AffirmativeBased access decision
    manager executes a simple algorithm to arrive at the result. If any of the voters
    vote with ACCESS_GRANTED, the user is granted access.'
