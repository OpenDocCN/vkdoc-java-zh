    第 5 章 **■** 探索集成层设计模式


    **183**


    **驱动因素**


    • 应避免将业务逻辑与持久化逻辑不必要地混合。


    • 实体 Bean 已属过时技术。


    • 业务层需要统一的 API 来访问集成层组件。


    • 直接使用 JDBC API 会导致大量样板代码，降低可复用性并增加开发时间。


    **解决方案**


    实现*数据访问对象*（DAO）来封装数据访问逻辑，并为业务层组件提供一致的接口。


    Spring 框架策略


    顾名思义，DAO 是通用对象，理论上可支持任何类型的持久化存储。这些类的主要目标是从业务服务中抽象出底层数据访问机制。由于大多数应用程序与关系型数据库交互，我将重点讨论基于
    JDBC 的数据访问对象。


    Spring JDBC 模块实现了稳健的对象设计原则，使开发基于 JDBC 的 DAO 变得简单。它处理了通常与 JDBC API 使用相关的所有样板代码，并帮助提供一致的数据访问
    API。


    应用程序开发者不再需要直接使用 JDBC API，而是使用高级 API。


    由于 eInsure 因历史原因对 Oracle 有依赖性，后续章节使用的 SQL 语法将与 Oracle 数据库兼容。但通用讨论和概念适用于任何数据库，使用时只需对
