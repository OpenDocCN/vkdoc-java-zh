    **Constructor Injection**


    In this strategy, the dependent object is passed as part of the constructor call,
    as shown in Listing 2-10.


    **Listing 2-10.** `CarServiceImpl.java` *with Constructor Injection*


    ```java

    public class CarServiceImpl implements CarService{


    private CarDao carDao;


    public void CarServiceImpl (CarDao carDao){


    this.carDao = carDao;


    }


    public void refuel(Car car){


    carDao.updateFuelConsumed(car) ;


    }


    }

    ```


    To achieve constructor injection, you need to alter the configuration as well,
    as depicted in Listing 2-11.


    **Listing 2-11.** `spring-config.xml` *with Constructor Injection*


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <beans


    xsi:schemaLocation="http://www.springframework.org/schema/beans http://www.w3.org/2001/XMLSchema-instance


    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd"


    >


    <bean name="carDao"


    class="com.apress.simpleapp.dao.CatDaoImpl" />


    <bean name="carService"


    class="com.apress.simpleapp.service.CarServiceImpl">


    <constructor-arg>


    <ref bean="carDao"/>


    </constructor-arg>


    </beans>

    ```


    **Application Contexts**


    The bean factory is merely an object pool where objects are created and managed
    by configuration. For small applications, this is sufficient, but enterprise applications
    demand more. Application context builds on the foundations laid by the bean factory
    to provide services like the following:


    - Support for message resources required for internationalization

    - Support for aspect-oriented programming (AOP) and hence declarative transaction,
    security, and instrumentation support

    - Registering event listeners in the bean factory

    - Creating application layer–specific context such as `WebApplicationContext`
    for use in web applications


    The Spring application context can be created like a bean factory and without
    any alteration in the configuration file, as shown in Listing 2-12.


    **Listing 2-12.** `SpringInitializer.java` *: Starting an Application Context*


    ```java

    ApplicationContext context = new


    ClassPathXmlApplicationContext("spring-config.xml");

    ```


    `ClassPathXmlApplicationContext` looks for a `spring-config.xml` file in the classpath
    and initializes the application context. Similarly, a servlet listener can be
    registered to initialize application context in a web application—commonly called
    *web application context*.


    The listener looks for the configuration file at a specific location within the
    web application archive to start the web application context.


    So far, I have given a very basic and simplistic introduction to Spring IOC and
    DI features. For a detailed treatment of the subject, refer to the Spring 2.5
    documentation available at [http://static.springframework.org/spring/docs/2.5.x/reference/beans.html](http://static.springframework.org/spring/docs/2.5.x/reference/beans.html).


    **Spring AOP**


    Spring AOP is an important module that provides critical system-level services.
    It promotes loose coupling and allows cross-cutting concerns (such as business
    services and transactions) to be separated in a most elegant fashion. It allows
    these services to be applied transparently through declaration. With Spring AOP,
    it is possible to write custom aspects and configure them declaratively. Spring
    AOP supports the creation of aspects through AOP Alliance–compliant interfaces.
    It also supports AspectJ. Spring AOP is a complicated subject in itself, and a
    detailed discussion is beyond the scope of this book.


    I will, however, use AOP topics later in Chapter 6, to describe the transaction
    and security patterns. So, you may also consider reading a bit about AOP in the
    book *Foundations of AOP for J2EE Development* (Apress, 2005) and then check out
    the Spring AOP documentation [at http://static.springframework.org/spring/docs/2.5.x/reference/aop.html](http://static.springframework.org/spring/docs/2.5.x/reference/aop.html).


    **Spring DAO**


    Java EE applications use the JDBC API to connect to and perform operations on
    relational databases. However, this often results in a lot of common code being
    written for operations such as the following:


    - Retrieving a connection from the connection pool

    - Creating a `PreparedStatement` object

    - Binding SQL parameters

    - Executing the `PreparedStatement` object

    - Retrieving data from the `ResultSet` object and populating data container objects

    - Releasing all database resources


    This kind of boilerplate code seriously hurts reusability. Spring JDBC/DAO makes
    life very easy by removing the common code in templates. The templates implement
    the GOF template method design pattern and provide suitable extension points to
    plug-in custom code. This makes the data access code very clean and prevents nagging
    problems such as connection leaks, and so on, because the Spring Framework ensures
    that all database resources are released properly.


    **Spring ORM**


    ORM solutions provide easy persistence of POJO objects in relational databases.
    The Spring ORM module is essentially an extension of the DAO module. Just like
    the JDBC-based templates, Spring provides ORM templates to work with and integrate
    most of the leading ORM products such as Hibernate, OpenJPA, TopLink, iBatis,
    and others.


    I will cover the best practices and patterns involved with Spring DAO and ORM
    in Chapter 5.


    **JEE**


    The JEE module forms the basis for all of the Spring Framework’s interaction with
    various Java EE technologies such as EJB, JTA, JCA, and JavaMail. As you will
    read later in this book, just like Spring DAO, the JEE module provides components
    to simplify the development of and interaction with Java EE technologies such
    as EJB.


    **Web MVC**


    This module helps build highly flexible web applications leveraging the complete
    benefits of the Spring IOC container. It is based on the MVC architectural pattern
    and seamlessly integrates with the Servlet API. Spring MVC supports a pluggable
    architecture and works with a multitude of view technologies such as JSP, FreeMarker,
    Velocity, and Adobe Flex, to name just a few. If Spring MVC is not the framework
    of choice, then it is possible to integrate with existing web frameworks such
    as Struts, Webwork, and JSF and still reap the benefits offered by the core Spring
    Framework, in other words, IOC and DI.


    **Building a Layered Application with Spring**


    Now you are familiar with the roles of various Spring modules and have some idea
    of their responsibilities. I’ll now show how to put these modules together to
    build a layered web application with the Spring Framework. Figure 2-2 shows the
    high-level architecture of this application.


