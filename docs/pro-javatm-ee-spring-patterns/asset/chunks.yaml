    **应用服务器事务**


    JTATransactionManager 可以与应用服务器的事务支持一起工作。然而，不同应用服务器的事务管理实现差异很大。它们也提供不同程度的事务优化。为了利用这些特性，Spring
    附带了一些特定于应用服务器的事务管理器：WeblogicJtaTransactionManager (BEA WebLogic)、WebsphereUowTransactionManager
    (IBM WebSphere) 和 OC4JtaTransactionManager (Oracle 应用服务器)。


