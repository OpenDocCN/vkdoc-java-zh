- fmt: "This also greatly reduces the benefits of server-based distributed computing.\
    \ Developing, testing, and maintaining applications with client tier programmatic\
    \ transaction are complicated tasks.\n\nIn Chapter 4, I mentioned a client of\
    \ `eInsure` who wanted us to deploy the entire application on Apache Tomcat, which\
    \ is a web server and servlet container. Tomcat does not have an EJB container.\
    \ So, the EJBs did not work in Tomcat, and there was no transaction management\
    \ support. An immediate option was to use JDBC-based transaction support. But\
    \ this would be cumbersome and would require a lot of code to be written as well\
    \ as refactored. Another solution was to use open source transaction monitors\
    \ such as ObjectWeb JOTM or Atomikos Essentials. But using them would pose the\
    \ same problems as with client-managed transactions.\n\n**Forces**\n\n- Avoid\
    \ client-managed transactions wherever possible.\n- Support declarative transaction\
    \ management to be applied transparently.\n- Declarative transaction management\
    \ should work outside the EJB container as well.\n\n**Solution**\n\nDeploy a *domain\
    \ service owner transaction* to declaratively apply transactions both in and out\
    \ of the EJB container.\n\n## Strategies with the Spring Framework\n\nIn a Java\
    \ EE application, an SLSB implements the domain service for a remote client. The\
    \ SLSB is the most useful EJB component and can be used extensively for remoting\
    \ and transaction support. However, as shown in Chapter 4, writing and maintaining\
    \ an EJB is cumbersome because it involves a lot of classes and metadata. Also,\
    \ they have little importance if your application needs to run out of an EJB container\
    \ or in a web container. Moreover, a session facade intercepts only a remote business\
    \ logic request, so in a strict sense the application service actually implements\
    \ the domain service.\n\nWith the Spring Framework, it is possible to provide\
    \ declarative transaction support even to POJO application service components.\
    \ This makes an application highly portable. You can now deploy this application\
    \ in a web container with just a few configuration changes. This application,\
    \ with the POJO domain service, can also continue to run in the EJB container\
    \ and subscribe to container-managed transactions. Thus, with the Spring Framework,\
    \ you do not need an EJB to support transactions.\n\nThe Spring Framework neither\
    \ implements any transaction monitor nor tries to directly manage transactions.\
    \ Instead, it delegates to the underlying transaction implementation through an\
    \ abstraction called a *platform transaction manager*. There are transaction manager\
    \ implementations for most of the widely used platforms—JDBC, object-relational\
    \ mapping such as Hibernate and TopLink, JTA, JCA, and all major application servers.\
    \ In the next few sections, I will review some frequently used transaction managers.\n\
    \n### Plain JDBC Transactions\n\nThe `DataSourceTransactionManager` handles all\
    \ the transactional requirements if straight JDBC or Spring DAO is being used\
    \ in the application. It can be configured in the Spring application context as\
    \ shown in Listing 6-26.\n\n**Listing 6-26.** `transaction-config.xml`\n\n```xml\n\
    <beans>\n    <bean id=\"datasourceTransactionManager\" class=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\"\
    >\n        <property name=\"dataSource\" ref=\"dataSource\"/>\n    </bean>\n</beans>\n\
    ```\n\nThe `DataSourceTransactionManager` works with a `javax.sql.DataSource`\
    \ object. It ensures that the same `Connection` object is retrieved from the `DataSource`\
    \ and used in a transaction. If the transaction is successful, the `commit` method\
    \ is invoked on the `Connection` object. If the transaction is a failure, the\
    \ `rollback` method will be used. In short, this transaction manager delegates\
    \ the actual transaction processing to the database.\n\n### Hibernate Transactions\n\
    \n`HibernateTransactionManager` can be used to manage transactions if your application\
    \ uses Hibernate ORM to manage application persistence. This transaction manager\
    \ works with the Hibernate `SessionFactory` object. It delegates the transaction\
    \ handling to the `org.hibernate.Transaction` object retrieved from the Hibernate\
    \ `Session` object. The `commit` and `rollback` methods will be called on this\
    \ `Transaction` object depending on successful and failed transactions, respectively.\
    \ The `HibernateTransactionManager` is wired in the Spring configuration, as shown\
    \ in Listing 6-27.\n\n**Listing 6-27.** `transaction-config.xml`\n\n```xml\n<beans>\n\
    \    <bean id=\"hibernateTransactionManager\" class=\"org.springframework.orm.hibernate.HibernateTransactionManager\"\
    >\n        <property name=\"sessionFactory\" ref=\"hibernateSessionFactory\"/>\n\
    \    </bean>\n</beans>\n```\n\n### JPA Transactions\n\nThe Java Persistence API\
    \ is the new persistence standard in EJB 3, replacing the widely disliked entity\
    \ beans. Spring also supports JPA transactions through the `JpaTransactionManager`.\
    \ This is configured in the Spring application context, as in Listing 6-28.\n\n\
    **Listing 6-28.** `transaction-config.xml`\n\n```xml\n<beans>\n    <bean id=\"\
    jpaTransactionManager\" class=\"org.springframework.orm.jpa.JpaTransactionManager\"\
    >\n        <property name=\"entityManagerFactory\" ref=\"entityManagerFactory\"\
    \ />\n    </bean>\n</beans>\n```\n\nNote that this transaction manager needs an\
    \ entity manager factory, that is, an implementation of the `javax.persistence.EntityManagerFactory`.\
    \ This factory provides the `EntityManager`. The `JpaTransactionManager` uses\
    \ this `EntityManager` to coordinate transactions.\n\n### JTA Transactions\n\n\
    The transaction managers described earlier are not very suitable for distributed\
    \ XA transactions. XA describes a protocol to coordinate transactions involving\
    \ multiple transaction and resource managers. BEA WebLogic Server and JBoss Application\
    \ Server (AS) are examples of transaction managers. They manage transactions involving\
    \ multiple resource managers such as databases, messaging providers such as IBM\
    \ MQ Series, mainframes, and so on.\n\nIn such scenarios you will need to use\
    \ the `JTATransactionManager`. It generally delegates the transaction handling\
    \ responsibility to the underlying JTA implementation provided by BEA WebLogic\
    \ Server, JBoss AS, ObjectWeb JOTM, or Atomikos. Listing 6-29 shows the configuration\
    \ of `JTATransactionManager`.\n\n**Listing 6-29.** `transaction-config.xml`\n\n\
    ```xml\n<beans>\n    <bean id=\"transactionManager\" class=\"org.springframework.transaction.jta.JtaTransactionManager\"\
    >\n        <property name=\"transactionManagerName\" value=\"java:/TransactionManager\"\
    \ />\n    </bean>\n</beans>\n```\n\n`JtaTransactionManager` works with the `javax.transaction.UserTransaction`\
    \ and `javax.transaction.TransactionManager` objects, delegating responsibility\
    \ for transaction management to those objects. A successful transaction will be\
    \ committed with a call to the `UserTransaction.commit` method. Likewise, if the\
    \ transaction fails, the `UserTransaction.rollback` method will be called.\n\n\
    ### Application Server Transaction\n\n`JTATransactionManager` can work with application\
    \ server transaction support. However, application servers differ significantly\
    \ with regard to their transaction management implementation. They also provide\
    \ varying degrees of transaction optimizations. To leverage them, Spring comes\
    \ with a few application-server specific transaction managers: `WeblogicJtaTransactionManager`\
    \ (BEA WebLogic), `WebsphereUowTransactionManager` (IBM WebSphere), and `OC4JtaTransactionManager`\
    \ (Oracle Application Server).\n\n## Declarative Transaction"
