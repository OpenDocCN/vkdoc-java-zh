- fmt: '# eInsure Sign-In Page and Static Views


    `eInsure` had a sign-in page that presented a simple UI to accept a username and
    password. This screen also had a button control that, on being clicked, triggered
    the authentication action. Hence, the presentation of this sign-in page did not
    require any business logic invocation. There were many other pages similar to
    this. There were several pages to display the input criteria that can be supplied
    before triggering a search for the policy, claim, and so on. Then we had lookup
    pages for various codes used in the system. All the values used for lookup were
    loaded from the database at startup and cached on the server. This was possible
    because the static data never changed when the application was up and running.
    Also, the action to load the UI pages to create a policy or claim required only
    user information that was cached in the session. Last but not least, almost each
    page had a link to open a help page. The static HTML-based help pages provided
    context-sensitive help to guide the users on how to use the different features
    (buttons, menus, text boxes, and so on) in that particular page.


    All these cases required no business logic invocation. Although all these are
    simple scenarios, our application based on a JSP front controller was not able
    to handle the situation in a simple fashion. Different developers created these
    pages and merrily added `if-else` blocks to handle their cases. The simplest approach
    would be to handle the request for these static contents directly, bypassing the
    page controllers. But this breaks the overall uniform application structure. Also,
    it might be useful to secure these resources so that no unauthorized access (such
    as directly typing the URL in the browser address bar) is allowed.


    ## Forces


    - The application has a lot of static views that require no business logic processing.

    - The semistatic views are presented from cached data.

    - The purely static and semistatic views need to be handled consistently as other
    dynamic views.


    ## Solution


    Use a *dispatcher view* to handle the processing of a static or semistatic view.


    ### Strategies with the Spring Framework


    `Dispatcher View` is actually a best practice to combine the other presentation
    tier patterns. It employs dispatchers to delegate to the view. In this case, the
    dispatcher is a combination of a controller and view resolver.


    There can be two variants of this pattern for static and semistatic views. The
    semistatic views use cached data and hence need view helper support. I will start
    with the pure static resources. Figure 3-17 shows the static structure of the
    `Dispatcher View` pattern.


    ![Image 39](index-147_1.png)


    **Figure 3-17.** *Dispatcher view class diagram*


    You have encountered most of the classes and interfaces before, except `UrlFilenameViewController`.
    This is a concrete controller implementation and converts the requested URL path
    into a logical view name. For example, a request for `/PolicyCreateHelp.do` will
    be transformed to the view name `PolicyCreateHelp`. The `InternalResourceViewResolver`
    then picks up this view name to resolve it to the actual resource—`PolicyCreateHelp.jsp`.
    Using this controller is just a matter of configuration, as shown in Listing 3-57.


    As a first step to implementing this pattern, we create the `PolicyCreateHelp.jsp`
    file in the `/WEB-INF/jsp/help` folder. It is not advisable to use static HTML
    files to serve the help contents. This because in the future you may need to support
    internationalized help. Besides, `FreeMarker` or `Velocity` templates can be used
    to keep the actual content externalized separately from the JSP, making it easy
    to maintain and change. The final step in using the dispatcher view is setting
    up the Spring configuration file, as shown Listing 3-57.'
