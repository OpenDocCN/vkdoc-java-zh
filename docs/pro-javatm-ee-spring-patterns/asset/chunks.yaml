- fmt: '# An Audit Trail and Declarative Transactions


    An audit trail is another widely used but often ignored concern in Java EE applications.
    With Spring AOP-based interceptor support, it is possible to deploy a robust,
    nonintrusive, and declarative audit trail system. Although EJB containers provide
    comprehensive transaction support, it comes with a price. Your codebase will not
    run outside the EJB container, thus severely limiting portability. With Spring
    AOP-based declarative transaction support, the domain service objects run almost
    seamlessly in EJB containers, web containers, and stand-alone components.


    Finally, with the crosscutting patterns, I will end the journey of exploring Java
    EE patterns with the Spring Framework. In the next chapter, I will apply the concepts
    explored so far to build the architecture and design of an order management system.
    So, read on because I will introduce some interesting design and architecture
    artifacts in the process.


    # Case Study: Building an Order Management System


    I explored the architecture and design of Java EE applications in the earlier
    chapters. I also explained the Java EE design patterns with regard to the Spring
    Framework. Now it’s time to put all the concepts you’ve learned so far together
    to build a basic application. In this chapter, I will apply the Spring Java EE
    patterns in the context of an order management system (OMS). This is a simplified
    version of an OMS that I once built for a telecom company that was used by their
    customers to register for value-added services such as ringtones, video broadcasting,
    voicemail, and so on. Using this OMS, users can sign in and then look up and order
    services. They can also search, cancel, and suspend their orders. The primary
    focus will be on building a lightweight architecture and design. I will also demonstrate
    the steps to develop, test, and deploy this application.


    For this example OMS, I will borrow heavily from extreme programming (XP) principles.
    When applied properly, XP offers immense flexibility for project teams compared
    to other methodologies that stress planning and invest significant effort on up-front
    architecture and design. An application framework such as Spring, backed by IDE
    support, is best suited for agile software development. If you are new to XP,
    then you can visit [http://www.extremeprogramming.org](http://www.extremeprogramming.org)
    for a quick tour of the features and workflow. In the rest of this chapter, I
    will go through a customized XP iteration to develop the foundation of the order
    management system. As you read on, you will see that in some parts of this chapter
    I will leave some solution or development tasks as an exercise for you. I’ve done
    this to get you to think about what you have learned in the previous chapters.
    It also makes reading this chapter more interesting and interactive. If you want
    to validate your solutions and development tasks, then visit [http://www.opengarage.org](http://www.opengarage.org),
    where I have posted the entire solution and code for this chapter.


    ## Requirements


    To start any software development project, you need some documented business requirements.
    XP employs *user stories* for documenting requirements. Each user story describes
    how the system is going to solve a business problem. Each is a very short description
    of the requirement and is often accompanied by acceptance test cases. Thus, there
    is a clear traceability from the requirements to the tests. A user story is written
    on a *story card*.


    With agile processes, it is not necessary that you have all the requirements in
    place before starting a project. To start the first iteration, you need just a
    few requirements. The user stories coming after the start of the first iteration
    are added to the requirements backlog. A few of them will be picked from the backlog
    based on their priority for implementation in a future iteration until the backlog
    has been cleared. For the OMS in this chapter, I have picked up three requirements
    with the highest priority for the first iteration. The priority is set by the
    customer, and it is used to determine whether a requirement will be taken up from
    the backlog for implementation in the next iteration.


    The user stories for these requirements are described in the next sections.


    ### Story Card: Sign In Users


    The system allows only registered users to sign in with a username and password.
    In the case of a sign-in failure, the user will be notified with a generic error
    message and prompted to sign in again. On successful sign-in, the user is taken
    to the home page with a link to save the order.


    - *Acceptance test set*: `AT-01`

    - *Priority*: 1


    ### Story Card: Look Up Services


    The system should provide a facility to look up services available to order for
    authenticated users only. This opens in a new pop-up window. When the user selects
    a service, this pop-up closes, supplying the appropriate values to the parent
    page.


    - *Acceptance test set*: `AT-02`

    - *Priority*: 1


    ### Story Card: Save Order


    The system allows authenticated users to save an order with a unique order identifier.
    This identifier can be used later to search an order. The users need to use a
    lookup function to select the order items. In the first release, the system will
    allow only one item per order.


    - *Acceptance test set*: `AT-03`

    - *Priority*: 1


    ## Iteration Planning


    Once the requirements are identified, it’s time for *iteration planning*. Iteration
    planning generally produces a plan for the programming and unit testing tasks
    to be carried out for the current iteration. You should also add architecture,
    design, coding standards compliance, and refactoring to the iteration plan. Each
    iteration lasts 14 to 21 working days on average. In the first couple of iterations,
    more time is spent on architecture and design evolutions. You should not spend
    more than two to three iterations baselining your architecture and design, after
    which the programming tasks should take precedence.


    You can use advanced software such as Microsoft Project for your project management
    and planning needs. However, keeping with the XP philosophy of simplicity and
    flexibility, you can use spreadsheet software such as Microsoft Excel or OpenOffice
    Calc for quick planning and tracking. Figure 7-1 shows the plan and tracker for
    the first iteration of the example OMS created using Microsoft Excel.


    **Figure 7-1.** *Plan and tracker for iteration 1*


    As shown in Figure 7-1, each row in the tracker represents a task that needs to
    be carried out in the iteration. As part of the planning and tracking, you have
    the generic attributes such as estimated hours, actual hours, start date, end
    date, and so on. You can also see the resource or person who has been entrusted
    with a particular task. One important attribute worth noting in this planner is
    *variance*. Variance helps keep track of the “health” of the iteration. A positive
    variance generally indicates that a task has taken longer than initially estimated.
    You can also maintain an overall project summary tracker, as shown in Figure 7-2.
    This gives a quick snapshot of the overall progress of a project.


    **Figure 7-2.** *Overall project summary tracker*'
