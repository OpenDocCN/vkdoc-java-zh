- fmt: "As already discussed, object retrieval from the JNDI can be detrimental to\
    \ performance. In highly transactional applications, JNDI objects will be used\
    \ regularly. So, it is imperative that the clients cache and use these objects.\
    \ This is exactly what the `JndiObjectFactoryBean` does by default. It looks up\
    \ the JNDI tree when the Spring web application context is being initialized and\
    \ loads the JNDI bound objects. Hence, it is necessary that the EJBs are loaded\
    \ and registered in the JNDI before the Spring web application starts initialization.\n\
    \nThe object caching feature of the service locator is not very important for\
    \ applications that sparingly use JNDI objects. This will also cause problems\
    \ if you update your application with hot deployment support from the application\
    \ servers. Hot deployment allows an entire Java EE application to be reloaded\
    \ without bringing down the server.\n\nThis will also refresh the JNDI with new\
    \ objects. As a result, the service locator cache, if used, will have object references\
    \ that no longer exist. Hence, any further access to these objects will result\
    \ in runtime exceptions being raised.\n\nIt is possible to look up and load JNDI\
    \ objects lazily in the Spring IOC container. If JNDI object retrieval at startup\
    \ and subsequent caching had to be turned off, you must specify the proxy interface.\
    \ The proxy interface will enable the generation of a proxy object to stand in\
    \ for the real JNDI object. Hence, the proxy interface must be the same as the\
    \ JNDI object interface. As shown in Listing 4-8, I have specified the local home\
    \ interface as the proxy interface. Note that the actual JNDI object will be made\
    \ available on first use.\n\n**Listing 4-8.** `insurance-servlet.xml`\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n  xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \  http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\">\n  <!--\
    \ Other beans -->\n  <bean name=\"underwritingBusinessDelegate\"\n        class=\"\
    com.apress.insurance.view.delegate.UnderWritingBusinessDelegate\">\n    <property\
    \ name=\"uwrLocalHome\" ref=\"uwrSlsbLocalHome\" />\n  </bean>\n  <bean id=\"\
