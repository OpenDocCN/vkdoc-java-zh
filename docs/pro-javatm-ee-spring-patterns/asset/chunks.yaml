    **MVC 小插曲**


    Trygve Reenskaug 早在 1979 年就在一篇名为“Smalltalk-80™ 中的应用程序编程：如何使用模型-视图-控制器”的论文中首次描述了
    MVC。它最初被设计为一种将用户界面逻辑与业务逻辑分离的策略。然而，将两者隔离并没有任何有用的目的。它还建议添加一个间接层来连接和协调表示层和业务逻辑层。


    这个新层被称为*控制器层*。因此，简而言之，MVC 将应用程序分为三个不同但相互协作的组件：


    • *模型*通过应用业务规则来管理应用程序的数据。


    • *视图*负责显示应用程序数据并提供允许用户进一步与系统交互的控件。


    • *控制器*负责模型和视图之间的协调。


