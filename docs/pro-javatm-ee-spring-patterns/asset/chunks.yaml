    JdbcTemplate is the most important class in the Spring JDBC DAO support. This
    class implements the GOF Template Method design pattern. The Template Method pattern
    defines the workflow or algorithm for a specific operation. It allows the subclasses
    to modify certain steps without changing the algorithm’s core structure. JdbcTemplate
    consolidates all the common repeated code blocks typically associated with JDBC
    workflow.


    As I will show later, the workflow defined by JdbcTemplate can be modified at
    appropriate points to provide customized processing. Listing 5-4 shows the policy
    detail DAO implementation class.


    **Listing 5-4.** PolicyDetailDaoImpl.java


