    **24**


    C H A P T E R 2 **■** S I M P L I F Y I N G E N T E R P R I S E J AVA A P P L
    I C AT I O N S W I T H T H E S P R I N G F R A M E W O R K


    These POJO business components can be made available as distributed objects through
    the various remoting options available with Spring. They can also be used to develop
    as well as connect to distributed EJB components. With Spring AOP, it is possible
    to transparently apply system services such as transactions, security, and instrumentation
    to POJO components. Spring JDBC and object-relational mapping (ORM) components
    allow simplified interaction with databases. As an application framework, Spring
    provides easy standards-based integration with disparate information systems through
    Java Connector Architecture (JCA) and web services. Last but not least, Spring
    security is a comprehensive solution to cater to the security requirements of
    any enterprise application.


    **Spring Framework’s Building Blocks**


    Spring is an application framework and is divided into several modules or components.


    Each module provides a specified set of functionality and works more or less independently
    of the others. Needless to say, these modules can be leveraged to build scalable
    yet flexible enterprise Java applications. This system is very flexible, because
    developers can choose to use only the module that is most appropriate in the context
    of a problem. For example, a developer can just use the Spring DAO module and
    build the rest of the application with non-Spring components. Moreover, Spring
    provides integration points to work with other frameworks and APIs. If you think
    Spring is unsuitable in a particular scenario, you can use alternatives. In case
    the development team is more proficient in Struts, for example, it can be used
    instead of Spring MVC while the rest of the application uses Spring components
    and features such as JDBC and transactions. In the two scenarios described here,
    the developers need not deploy the entire Spring Framework. They will require
    only the relevant module (like Spring DAO) along with the Spring IOC container
    and the Struts libraries.


    Figure 2-1 shows the various modules of the Spring Framework.


    ![Image 21](index-47_1.png)


    10092ch02.qxd 7/21/08 4:56 PM Page 25


    C H A P T E R 2 **■** S I M P L I F Y I N G E N T E R P R I S E J AVA A P P L
    I C AT I O N S W I T H T H E S P R I N G F R A M E W O R K


    **25**


    **Figure 2-1.** *High-level building blocks of the Spring Framework* **Spring
    Core**


    The Core module forms the backbone of the entire Spring Framework. All other Spring
    modules are dependent on this module. It is also called the IOC container and
    is central to Spring’s support for dependency injection (DI).


    Inversion of Control


    IOC is best described by the term the *Hollywood principle*, which states “Don’t
    call us; we’ll call you.” (The junior artists often hear this from production
    managers in Hollywood.) However, this is important in software development as
    well to control the flow of applications while ensuring high cohesion and low
    coupling. To better understand, this let us consider a simple case when your application
    performs some calculations and prints the end result using a logging library like
    log4j. In this case, the application code is responsible for the flow of control
    while invoking methods on the log4j API as and when necessary.


    IOC, on the other hand, is fundamental to any framework. With IOC, an application
    object is typically registered with the framework that takes the responsibility
    of invoking methods on the registered object at an appropriate time or event.
    The control is inverted because instead of application code invoking the framework
    API, things happen just the opposite. Thus, in short, IOC is the principle of
    allowing another object or framework to invoke methods on your application objects
    on the occurrence of appropriate events.


    10092ch02.qxd 7/21/08 4:56 PM Page 26


    **26**


    C H A P T E R 2 **■** S I M P L I F Y I N G E N T E R P R I S E J AVA A P P L
    I C AT I O N S W I T H T H E S P R I N G F R A M E W O R K


    IOC is not a new concept and has been around for a long time. EJBs, for example,
    supports IOC. The various EJB components such as session, entity, and message-driven
    beans lay down specific contracts with the container by implementing the methods
    defined in different interfaces. The session bean, for example, implements the
    ejbActivate and ejbPassivate life-cycle methods defined in the javax.ejb.SessionBean
    interface. However, these methods are never called from other methods of the session
    bean; rather, the container calls these methods at different times during the
    life cycle of the bean, thus inverting control. Message-driven beans, for instance,
    implement the onMessage method of the javax.jms.MessageListener interface. It
    is the responsibility of the container to invoke this method on the event of a
    message arrival.


    Dependency Injection


    It is common for developers to believe that IOC and DI are the same thing. This
    is incorrect, and I want to make it clear right at the outset that they are two
    different yet related concepts. Just as IOC deals with inverting the control flow
    in an application, DI describes how one object resolves or finds other objects
    on which it needs to invoke some methods. There are several ways to achieve DI,
    and one such strategy is IOC. I will explain the different DI strategies one by
    one in the next few sections.


    **Direct Instantiation**


    Direct instantiation is the simplest form of DI. The dependent object is directly
    instanti-ated using the new operator, as shown in Listing 2-1.


    **Listing 2-1.** FormulaOneDriver.java *: Using Direct Instantiation* public class
    FormulaOneDriver{


    public Car getCar(){


    Car car = new FerrariCar();


    return car;


    }


    }


    The Formula 1 driver object (FormulaOneDriver) needs a car to drive. Hence, it
    creates an instance of the Car object directly and uses it. Direct instantiation
    increases coupling and scatters object creation code across the application, making
    it hard to maintain and unit test.


    10092ch02.qxd 7/21/08 4:56 PM Page 27


    C H A P T E R 2 **■** S I M P L I F Y I N G E N T E R P R I S E J AVA A P P L
    I C AT I O N S W I T H T H E S P R I N G F R A M E W O R K


    **27**


    **Factory Helper**


    The factory helper is a common and widely used dependency injection strategy.
    It is based on the GOF factory method design pattern. The factory method consolidates
    the use of the new operator and supplies appropriate object instances based on
    some input.


    This is shown in Listing 2-2.


    **Listing 2-2.** FormulaOneDriver.java *: Using Factory Helper* public class FormulaOneDriver{


    public Car getCar(){


    Car car = CarFactory.getInstance("FERARI");


    return car;


    }


