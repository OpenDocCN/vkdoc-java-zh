    • JNDI 查找应独立于供应商的 API 类和接口。实际上，只需更改配置参数，就应该能够在不同服务器之间切换。


    • 服务查找代码应足够灵活，以支持不同类型的业务对象：EJB、POJO 甚至 Web 服务。


    • 解决与 JNDI 查找相关的性能问题。


    **解决方案**


    使用*服务定位器*来封装 JNDI 对象查找，并消除任何性能开销。


    Spring 框架的策略


    正如我在第 3 章中所述，页面控制器是与业务层开始交互的最合适的组件。它们通过调用 POJO 业务委托对象上的方法来实现这一点。业务委托为业务层提供客户端接口，并负责访问远程
    EJB 对象。它们反过来依赖服务定位器来检索 EJB 的 Home 对象。图 4-1 展示了这种交互。


    **图 4-1.** *序列图：服务定位器交互*


    ![Image 43](img/index-162_1.png)


