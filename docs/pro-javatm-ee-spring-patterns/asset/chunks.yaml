    问题的主要原因在于源代码。该应用程序非常庞大，拥有近 350 个 JSP、30 多个会话 Bean、600 多个 POJO 辅助类、300 多个表以及同等数量的实体
    Bean。大部分现有源代码是由一个工具生成的，该工具有助于将用 Oracle PL/SQL 编写的遗留产品转换为 Java EE。生成的源代码基于企业级 Java
    组件模型，但深层存在根本性的设计缺陷和坏味道。代码坏味道通常表明应用程序代码中的某些地方出了问题。这个术语由 Kent Beck 和 Martin Fowler
    在《重构：改善既有代码的设计》（Addison-Wesley，1999）一书中推广开来。eInsure 中使用的数据结构模仿了 PL/SQL 表和数组。因此，开发人员必须首先掌握遗留代码和数据结构的行为。由于新代码是以相同的遗留风格添加的，因此没有任何改进的空间。


    eInsure 团队缺乏设计和面向对象技能（团队中的大多数成员自身也在随着产品一起过渡，以掌握 Java EE 技术技能），这加剧了困境。完全没有设计指导或代码文档。一个好的软件应用程序应该有不同的配置参数来控制其运行时行为，而无需修改任何代码。这些配置参数通常存储在应用程序外部的
    XML 或属性文件中。


