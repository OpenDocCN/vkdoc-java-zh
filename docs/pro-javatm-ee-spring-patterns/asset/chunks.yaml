- fmt: "# Chapter 5: Exploring Integration Tier Design Patterns\n\nIn Chapter 5, I\
    \ will cover the integration tier patterns. You have already had a short glimpse\
    \ of an integration tier pattern: the Data Access Object pattern. Integration\
    \ tier patterns expose a variety of strategies to retrieve data for use by the\
    \ business components. These patterns also help business objects alter enterprise\
    \ data. In addition to this, I will explore strategies to expose business tier\
    \ functionalities for use by external clients.\n\nThe integration tier is a boundary\
    \ tier and interacts with different external systems for data exchange. The integration\
    \ tier in the eInsure application accessed the relational database for storing,\
    \ retrieving, and manipulating data related to policies, claims, accounting, customers,\
    \ and products. eInsure used entity beans for typical create, read, update, and\
    \ delete (CRUD) operations with the database. The legacy version of eInsure had\
    \ lots of leftovers in the form of stored procedures. The eInsure application\
    \ made heavy use of these stored procedures for database-intensive tasks, especially\
    \ for the batch jobs that ran daily after regular business hours or in certain\
    \ intervals such as monthly or quarterly.\n\nUsers of eInsure required a variety\
    \ of reports to find out important information about the state of the business.\
    \ For reporting requirements, the eInsure system connected to an asynchronous\
    \ reporting subsystem. Last but not least, some of the services provided by eInsure\
    \ had to be exposed as web services. These services were consumed by third-party\
    \ external applications.\n\nIn this chapter, I will start with the Data Access\
    \ Object (DAO) pattern for accessing relational databases. I will explore the\
    \ need for DAO and the strategies to simplify DAO implementation with Spring JDBC\
    \ support. The Spring JDBC API can also be used to provide OO-style access to\
    \ stored procedures. I will explain this in detail while describing the Procedure\
    \ Access Object (PAO) pattern. Also, I will cover asynchronous service access\
    \ mechanisms in connection with the Service Activator pattern. I will wind up\
    \ the chapter with the Web Services Broker design strategy, which can be used\
    \ to expose existing services as web services.\n\n## Data Access Object\n\n###\
    \ Problem\n\nThe eInsure application relied heavily on entity beans for database\
    \ operations. Way back in 1999, when entity beans first made their appearance\
    \ (as part of the EJB 1.*x* specification), they were thought to be a remarkable\
    \ enterprise component that would completely change enterprise software development,\
    \ deployment, maintenance, and portability.\n\nThis thinking was backed by reason.\
    \ Entity beans provided standard-based, container-managed, distributed, secure,\
    \ transactional persistence components. They provided transparent and automatic\
    \ persistence without the client worrying about the underlying data store. But\
    \ this popularity was only short-lived. As developers, designers, and architects\
    \ started using entity beans, the problems became apparent. They soon realized\
    \ that most of the features offered by entity beans, except persistence, were\
    \ not required in their applications. The distributed nature of entity beans led\
    \ to fine-grained calls from the clients. This increased network traffic and had\
    \ an adverse impact on performance.\n\nThe Session Facade pattern described in\
    \ Chapter 4 was a solution to tackle this fine-grained entity bean access. The\
    \ session bean also took care of security and transactional requirements.\n\n\
    With the quickly declining usage, the EJB 2.*x* specification introduced the concept\
    \ of local interfaces to at least alleviate the problems of network trips. But\
    \ this still did not address the complexity involved in developing entity beans.\
    \ Entity bean development required four Java source files comprising the home\
    \ and remote interfaces, the bean implementation, and a primary key class. Apart\
    \ from the Java sources, you had two to three deployment descriptors depending\
    \ on your server vendors. You are already aware of the two deployment descriptors\
    \ from session beans in Chapter 4. Some application servers used a third deployment\
    \ descriptor for mapping the database table and column to the bean class and its\
    \ properties. Because the entity beans ran inside the EJB containers, they were\
    \ difficult to test. The result was long development cycles and maintenance overhead.\n\
    \nThe developers’ problems were compounded by the side effects of using entity\
    \ beans. Because the accessing of getter/setters in entity beans were remote method\
    \ invocations, the data transfer objects (DTOs) were designed to extract all the\
    \ data from the entity beans in just a single method call. The DTOs were simple\
    \ POJOs with getters and setters and implemented the `Serializable` interface.\
    \ In a large to midsize project that had several DTOs, these classes added to\
    \ the maintenance problem. A small field change in any DTO often resulted in compilation\
    \ failures in multiple source files.\n\nThe development community had no choice\
    \ but to move to lightweight persistence solutions provided by ORM frameworks\
    \ such as Hibernate, Kodo, iBatis, and others.\n\nThese products focused on the\
    \ persistence of POJOs with minimal configuration information. This proved to\
    \ be a telling blow for entity beans, and it finally made way for JPA in the EJB\
    \ 3.*x* specification. JPA supports POJO persistence with annotation-based configuration.\
    \ More important, JPA entities run outside the EJB container and are easily testable.\n\
    \nThe eInsure development team soon realized that search operations that returned\
    \ large lists were highly inefficient with entity beans since each object in the\
    \ search list was itself an entity bean. So, accessing a property in this entity\
    \ bean resulted in a network trip and in the marshaling and unmarshaling of the\
    \ data. The team soon switched over to a straight JDBC approach. The JDBC API\
    \ was being used directly from the session beans to execute SQL queries, as shown\
    \ in Listing 5-1.\n\n**Listing 5-1.** `UnderwritingRemoteBean.java`\n\n```java\n\
    public class UnderwritingRemoteBean implements SessionBean{\n\n    public List\
    \ listPolicyByProductAndAgeLevel(String productCd, int age) throws RemoteException\
    \ {\n\n        String SQL = \"SELECT POLICY_ID,PRODUCT_CODE, NAME, AGE FROM T_POLICY_DETAILS\n\
    \                      WHERE PRODUCT_CODE = ? AND AGE > ? \";\n\n        List\
    \ policyList = new ArrayList();\n        Connection conn = null;\n        PreparedStatement\
    \ pstmt = null;\n        ResultSet rs = null;\n\n        try{\n            pstmt\
    \ = conn.prepareStatement(SQL);\n            pstmt.setString(0, productCd);\n\
    \            pstmt.setInt(1, age);\n            rs = pstmt.executeQuery();\n\n\
    \            while(rs.next()){\n                policyList.add(new PolicyDetail(rs.getInt(\"\
    POLICY_ID\"),\n                                                rs.getString(\"\
    NAME\"),\n                                                rs.getString(\"NAME\"\
    ),\n                                                rs.getInt(\"AGE\")));\n  \
    \          }\n        }\n        catch(SQLException sqlex){\n            throw\
    \ new RuntimeException(sqlex);\n        }\n        finally{\n            if(rs!=null){\n\
    \                try {\n                    rs.close();\n                } catch\
    \ (SQLException ex) {\n                    throw new RuntimeException(ex);\n \
    \               }\n            }\n            if(pstmt!=null){\n             \
    \   try {\n                    pstmt.close();\n                } catch (SQLException\
    \ ex) {\n                    throw new RuntimeException(ex);\n               \
    \ }\n            }\n            if(conn!=null){\n                try {\n     \
    \               conn.close();\n                } catch (SQLException ex) {\n \
    \                   throw new RuntimeException(ex);\n                }\n     \
    \       }\n        }\n        return policyList;\n    }\n}\n```"
