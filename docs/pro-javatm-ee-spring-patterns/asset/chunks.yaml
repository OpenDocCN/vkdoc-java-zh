- fmt: '• The JNDI lookup should be independent of vendor API classes and interfaces.
    In fact, it should be possible to switch between different servers merely by changing
    configuration parameters.


    • The service lookup code should be flexible enough to support different types
    of business objects: EJBs, POJO, or even web services.


    • Address the performance concerns associated with JNDI lookup.


    ## Solution


    Use a `service locator` to encapsulate JNDI object lookup and eliminate any performance
    overhead.


    ### Strategies with the Spring Framework


    As I explained in Chapter 3, page controllers are the most appropriate components
    to start interaction with the business tier. They do so by invoking methods on
    POJO business delegate objects. The business delegates provide the client-side
    interface for the business tier and are responsible for accessing the remote EJB
    objects. They, in turn, rely on the service locator to retrieve the EJB home object.
    Figure 4-1 shows this interaction.


    **Figure 4-1.** *Sequence diagram: service locator interaction*


    ![Image 43](index-162_1.png)


    The Spring Framework provides a comprehensive set of classes for retrieving JNDI
    bound objects from all different application servers. The `JndiObjectFactoryBean`
    is the most widely used service locator class in the Spring Framework. It is a
    factory bean and hence implements the `FactoryBean` interface. A factory bean
    is an object factory within the Spring bean factory. Hence, a factory bean is
    treated differently from a normal bean by the Spring IOC container. It is configured
    in the same manner as an ordinary bean, but Spring will not return a new instance
    of `JndiObjectFactoryBean`. Instead, the object it exposes for injection is always
    the one that it creates or retrieves. In the case of `JndiObjectFactoryBean`,
    this is made possible by the `getObject` method that returns the object retrieved
    from the JNDI. Thus, this service locator implementation can be used to look up
    and inject any kind of JNDI object. Since `JndiObjectFactoryBean` inherits from
    the `JndiAccessor` class, it easy to configure various JNDI-related properties.
    Figure 4-2 shows the Spring JNDI class diagram.


    **Figure 4-2.** *Class diagram: Service locator*


    ### Remote EJB 2.x Lookup


    I will now put the `JndiObjectFactoryBean` to use. In Listing 3-27, I combined
    the page controller with the business delegate but deliberately did not show the
    code for the sake of simplicity. Listing 4-2 shows the business delegate implementation
    class. I will cover business delegates in detail later in this chapter. So, the
    sole intention of this business delegate listing here is to highlight how it is
    related to the service locator. As shown in Listing 4-2, the business delegate
    is completely decoupled from the service locator. The `JndiObjectFactoryBean`
    service locator works transparently with the Spring container to inject the EJB
    home object. Although it is possible to inject as many session beans as you want
    in this business delegate, the best practice is to have one EJB per business delegate.


    **Listing 4-2.** `UnderwritingBusinessDelegate.java`


    ```

    public class UnderWritingBusinessDelegate {


    private UnderwritingHome underWritingHome;


    public void createPolicy(PolicyFormBean policyBean) {


    try {


    Underwriting bean = this.underWritingHome.create();


    bean.underwriteNewPolicy(policyBean.getProductCode(),


    policyBean.getFirstName(), policyBean.getAge());


    } catch (RemoteException e) {


    throw new RuntimeException(e);


    } catch (CreateException e) {


    throw new RuntimeException(e);


    }


    }


    public UnderwritingHome getUnderWritingHome() {


    return underWritingHome;


    }


    public void setUnderWritingHome(UnderwritingHome underWritingHome) {


    this.underWritingHome = underWritingHome;


    }


    }

    ```'
