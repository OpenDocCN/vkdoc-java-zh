- fmt: "```java\npublic void underwriteNewPolicy(String productCd, String name, int\
    \ age) throws RemoteException {\n    //implement business rule\n    //invoke Entity\
    \ beans\n}\n\nprotected void onEjbCreate() throws CreateException {\n    //use\
    \ for post initialisation tasks\n}\n```\n\nTo register as a session bean and subscribe\
    \ to the container services, the Java classes must be supplemented with metadata\
    \ information. The metadata information is provided in the form of XML deployment\
    \ descriptors. The first deployment descriptor is `ejb-jar.xml`, which describes\
    \ the bean and system services it requires. In this case, the bean requires transactional\
    \ services for all its methods, as shown in Listing 4-18.\n\n**Listing 4-18.**\
    \ `ejb-jar.xml`\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<ejb-jar\
    \ version=\"2.1\"\n         xmlns=\"http://java.sun.com/xml/ns/j2ee\"\n      \
    \   xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"\
    http://java.sun.com/xml/ns/j2ee\n                             http://java.sun.com/xml/ns/j2ee/ejb-jar_2_1.xsd\"\
    >\n    <enterprise-beans>\n        <session>\n            <display-name>UnderwritingRemoteSB</display-name>\n\
    \            <ejb-name>UnderwritingRemoteBean</ejb-name>\n            <home>com.apress.einsure.business.ejbfacade.UnderwritingRemoteHome</home>\n\
    \            <remote>com.apress.einsure.business.ejbfacade.UnderwritingRemote</remote>\n\
    \            <ejb-class>com.apress.einsure.business.ejbfacade.UnderwritingRemoteBean</ejb-class>\n\
    \            <session-type>Stateless</session-type>\n            <transaction-type>Container</transaction-type>\n\
    \            <env-entry>\n                <env-entry-name>ejb/BeanFactoryPath</env-entry-name>\n\
    \                <env-entry-type>java.lang.String</env-entry-type>\n         \
    \       <env-entry-value>\n                    com/apress/einsure/business/ejbfacade/Underwriting-beans.xml\n\
    \                </env-entry-value>\n            </env-entry>\n        </session>\n\
    \    </enterprise-beans>\n    <assembly-descriptor>\n        <container-transaction>\n\
    \            <method>\n                <ejb-name>UnderwritingRemoteBean</ejb-name>\n\
    \                <method-name>*</method-name>\n            </method>\n       \
    \     <trans-attribute>Required</trans-attribute>\n        </container-transaction>\n\
    \    </assembly-descriptor>\n</ejb-jar>\n```\n\nAs I mentioned earlier, with Spring\
    \ EJB support it is possible to start an application context. The default mechanism\
    \ is to load an application context from a resource specified as a JNDI environment\
    \ variable: `java:comp/env/ejb/BeanFactoryPath`. Listing 4-18 highlights this\
    \ environment variable. This default behavior is provided with the help of the\
    \ `BeanFactoryLocator` implementation provided by the `ContextJndiBeanFactoryLocator`\
    \ class. It is also possible to provide a custom `BeanFactoryLocator` implementation\
    \ and inject it using the `setBeanFactoryLocator` method either in the `setSessionContext`\
    \ method or in the default constructor of the stateless session bean implementation\
    \ class.\n\nThe default behavior of `ContextJndiBeanFactoryLocator` can have serious\
    \ performance limitations. Loading and initializing an application context with\
    \ several beans defined in it can be time-consuming. You can overcome this by\
    \ using a shared bean factory for all the EJBs. The `ContextSingletonBeanFactoryLocator`\
    \ class provides this support. However, you need to be careful with a singleton\
    \ context and limit it only amongst the EJBs in your application. Sharing a common\
    \ application context amongst all tiers (presentation, business, and integration)\
    \ may result in lots of class-loading issues.\n\nListing 4-19 shows the Spring\
    \ configuration file required to start the SLSB application context. Currently,\
    \ it does not contain any bean definition. I will put this to effective use later\
    \ when I discuss the Application Service pattern.\n\n**Listing 4-19.** `Underwriting-beans.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans xmlns=\"http://www.springframework.org/schema/beans\"\
    \n       xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n       xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n                           http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
    >\n</beans>\n```\n\nFinally, to complete the EJB, you also need an application\
    \ server vendor-specific deployment descriptor, which is used to provide meta-information\
    \ such as the JNDI name to bind the EJB home object in the JNDI tree. Listing\
    \ 4-20 shows the JBoss-specific deployment descriptor.\n\n**Listing 4-20.** `jboss.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<jboss>\n    <enterprise-beans>\n\
    \        <session>\n            <ejb-name>UnderwritingRemoteBean</ejb-name>\n\
    \            <jndi-name>UnderwritingBeanRemote</jndi-name>\n            <local-jndi-name>UnderwritingBeanLocal</local-jndi-name>\n\
    \        </session>\n    </enterprise-beans>\n    <resource-managers>\n    </resource-managers>\n\
    </jboss>\n```\n\nThe final task is to compile, package, and deploy this EJB in\
    \ a JBoss 4.*x* application server. The clients can easily look up this EJB using\
    \ the Service Locator pattern described earlier in this chapter.\n\n## Consequences\n\
    \n### Benefits\n\n- The session facade exposes a coarse-grained API to the clients\
    \ of the remote business object.\n- It allows Java EE applications to effectively\
    \ leverage container-managed services such as transaction and security.\n- The\
    \ consolidation of business method invocation into a single coarse-grained call\
    \ reduces network trips and improves performance.\n- The session facade helps\
    \ to clearly establish the responsibilities of different components in a Java\
    \ EE application. This also prevents business logic from spilling over to the\
    \ client tier.\n\n### Concerns\n\n- Session facades have steep learning curves\
    \ with complex concepts.\n- Besides different classes and interfaces, a lot of\
    \ configuration information is required. This adds overhead during maintenance.\n\
    \n## Application Service\n\n### Problem\n\nThe eInsure application’s business\
    \ logic was entirely coded in the session facades. As I explained in connection\
    \ with session facades, EJB development was a very complex task. You had to work\
    \ with three Java source files. Then there were two deployment descriptors and\
    \ a large set of configuration information. EJB development requires seasoned\
    \ programmers. There are a lot of concepts related to system services, configuration,\
    \ and server-specific settings that can be managed effectively only with experienced\
    \ developers.\n\nThe container manages the life cycle of the EJB components. These\
    \ components also subscribe to different container services such as security,\
    \ transaction, and object pooling. The developers need to have a clear understanding\
    \ of the concepts and intricacies behind these services and life-cycle stages.\
    \ This is imperative to write code that will respond correctly to life-cycle state\
    \ changes. It will also help the developers appropriately set configuration metadata\
    \ and prevent unexpected results.\n\nSince the entire business logic is now in\
    \ the SLSB, chances are high that in a large-scale application like eInsure that\
    \ it will grow quickly to an unmanageable size. The session facade not only intercepts\
    \ business logic invocation, but also each method in the SLSB is responsible for\
    \ executing business rules. Hence, it also violated SRP. A simpler option would\
    \ be to model the session facade like a front controller servlet. It only takes\
    \ the responsibility of intercepting the business method execution requests. The\
    \ actual task of business logic execution is delegated to the helper classes."
