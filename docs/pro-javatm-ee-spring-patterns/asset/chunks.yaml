    因此，在这种情况下，保存映射信息的资源包将被命名为 insurance-views.properties、insurance-views_fr_CA.properties
    等。由于这种配置，许多操作在后台自动完成。我将在此处总结这些操作，以便您更好地理解：


    **1.** 对 policydetails.do 的请求被调度器 servlet 拦截。


    **2.** 该请求由 PolicyDetailsController 页面控制器处理。它设置应使用的逻辑视图名称，以呈现业务组件返回的数据。


    **3.** 调度器 servlet 使用控制器返回的逻辑视图名称以及请求中可用的区域设置信息来调用视图解析器。


    **4.** ResourceBundleViewResolver 首先根据区域设置检测相应的资源包。


    **5.** 使用逻辑视图名称来检测资源包中配置的相应视图类。在本例中，即属性 policydetails.class 的值。


    **6.** 最后，创建 JstlView 的一个实例，并将配置参数 policydetails.url 的值注入此对象，然后返回给调度器 servlet。


    此处介绍的设计可用于支持两种区域设置的应用程序，但它可能产生严重的副作用。使用属性文件进行视图管理是一种繁琐的方法。维护此应用程序可能是一场噩梦，因为我们需要为每个区域设置添加
    *n* 个 JSP。换句话说，如果我们支持 *m* 个区域设置，我们将拥有 *m** *n* 个 JSP 文件。


    此外，每个区域设置还需要一个视图配置文件。因此，实际上我们将需要维护 *m**(1+ *n*) 个 JSP 和配置文件。更好的方法是为所有区域设置使用单个
    JSP。该 JSP 由应用程序打算支持的各种区域设置的 *m* 个资源包支持。然后，可以在 JSP 中使用这些资源包，采用稍后描述的 View Helper
    模式。因此，实际上我们只需要维护 ( *n* + 2 *m*) 个文件，这大大简化了工作。


    **XmlViewResolver**


    XmlViewResolver 不支持本地化视图解析，如果我们打算实现“一个 JSP 适用于所有区域设置”的解决方案，则应使用它来替换 ResourceBundleViewResolver。因此，使用
    XmlViewResolver，只需一个 PolicyDetails.jsp 即可满足所有用户的需求，而本地化标签则存储在资源包中。大多数开发者发现，在 XML
    文件中配置视图映射更加方便。


