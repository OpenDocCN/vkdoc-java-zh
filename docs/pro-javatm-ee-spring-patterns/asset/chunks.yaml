- fmt: 'You can also use any other testing framework, such as `TestNG`, as well. On
    a successful build, the `install` goal generates a WAR file. In the next section,
    I will present a step-by-step guide to install this WAR file on Tomcat 5.5. To
    follow the next section, you will need to download, install, and start the Tomcat
    web server. You can get detailed instructions for this at [http://tomcat.apache.org/](http://tomcat.apache.org/).


    ## Deploying the Project


    Maven 2 provides a plug-in to deploy the generated WAR file in the Tomcat 5.5
    server. You need to install this plug-in before you can actually use it. The steps
    to adding this plug-in are the same as setting up the dependencies. To add the
    Maven 2 Tomcat plug-in, right-click the `OMSWeb` project to launch the context
    menu. In the context menu, select Maven **➤** Add Plugin. This is shown in Figure
    7-14.


    **Figure 7-14.** *Adding the Maven 2 plug-in*


    On the Add Plugin screen that appears, type `tomcat` in the Query box. Select
    the Tomcat Maven plug-in as shown in Figure 7-15, and click OK. This automatically
    downloads the relevant JAR files required by this plug-in.


    ![Image 71](index-320_1.png)


    ![Image 72](index-320_2.jpg)


    10092ch07.qxd 7/29/08 10:39 AM Page 298


    **298**


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    **Figure 7-15.** *Searching and adding the Maven 2 plug-in*


    The Maven 2 Tomcat plug-in assumes a default Tomcat Manager URL (`http://localhost:8080/manager`)
    to connect and deploy the WAR file. For authentication, it assumes that the manager’s
    username is `admin` with no password. So, in order to get this working, you may
    need to alter the `tomcat-users.xml` file to change the password of the `admin`
    user. The Maven goals for this plug-in are not available explicitly. So, you need
    to create a new run configuration as shown in Figure 7-16 to execute the Tomcat
    Maven plug-in goals.


    **Figure 7-16.** *Creating run configurations*


    ![Image 73](index-321_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM Page 299


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    **299**


    This opens the screen to create a new configuration, as shown in Figure 7-17.
    On this screen, double-click Maven Build to create a new Maven configuration.
    Fill in the values as shown in Figure 7-17, except Goals.


    **Figure 7-17.** *New run configuration for Maven build*


    For the goals, click Select, and in the goal search window that appears, query
    for `tomcat`, as shown in Figure 7-18. You will need to select the `deploy` task
    and click OK. This populates the text box in Figure 7-17 with the appropriate
    values for the Tomcat `deploy` goal.


    ![Image 74](index-322_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM Page 300


    **300**


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    **Figure 7-18.** *Searching and selecting a goal*


    Once the goal is selected, click Apply to save this configuration (for future
    use) and then click Run to execute this goal and install the `OMSWeb.war` file
    on the Tomcat server.


    Setting up and using the Maven plug-in for Tomcat is a complex task. Moreover,
    you may have reservations about using an alpha version of the plug-in. Also, you
    may not like the idea of changing the Tomcat manager user password and setting
    it to be blank. This plug-in has been around for some time now and has worked
    despite its alpha status. It is especially useful if you do not use continuous
    integration and in staging environments where you do not have access to Eclipse
    and need to execute all Maven goals from the command line.


    ![Image 75](index-323_1.png)


    10092ch07.qxd 7/29/08 10:39 AM Page 301


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    **301**


    ## Simplified Deployment


    There is a simpler way to deploy the `OMSWeb` project. I assume that you have
    already executed the Maven `install` goal to create the WAR file and have downloaded
    and installed Tomcat 5.5. Since I am on Windows, I have installed Tomcat at `c:\tomcat5.5`.


    Note that you should not download and use the Tomcat Windows Service installer;
    instead, choose the simple zipped distribution.


    As a first step to this new deployment strategy, you will need to set up the target
    runtime (or the server on which the web application will run) for the `OMSWeb`
    project. For this, right-click the `OMSWeb` project to launch the context menu,
    and select Properties, as shown in Figure 7-19.


    **Figure 7-19.** *Selecting OMSWeb project properties*


    ![Image 76](index-324_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM Page 302


    **302**


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    On the project properties screen for `OMSWeb`, select Targeted Runtimes. In the
    Targeted Runtimes view, click New, as shown in Figure 7-20.


    **Figure 7-20.** *New target runtime*


    On the New Server Runtime Environment screen, select Apache Tomcat 5.5, and check
    the Create a New Local Server option, as shown in Figure 7-21. Then click Next
    to move to the next screen to select the Tomcat installation directory.


    ![Image 77](index-325_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM Page 303


    **303**


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    **Figure 7-21.** *New server runtime: Apache Tomcat 5.5*


    On the Tomcat installation directory selection screen, you need to browse to and
    select the Tomcat installation home directory. Alternatively, you can also choose
    to download and install Tomcat from this screen. Since I have already installed
    Tomcat 5.5, I will choose `c:\tomcat5.5`, as shown in Figure 7-22. Click Finish
    to complete the installation of Tomcat 5.5 and the local server.


    ![Image 78](index-326_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM Page 304


    **304**


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    **Figure 7-22.** *Tomcat directory selection*


    Once complete, you are back again on the project properties screen. The newly
    created Tomcat runtime is now shown in this screen. You will need to select this
    new runtime and click OK, as shown in Figure 7-23.


    ![Image 79](index-327_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM Page 305


    **305**


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    **Figure 7-23.** *Selecting the new runtime*


    You’re not done yet. You need to create a new server from the local server configuration
    created just now. You can do this in the server control panel. For this you need
    to select Window **➤** Show View **➤** Servers in Blazon ezJEE IDE, as shown in
    Figure 7-24.


    ![Image 80](index-328_1.jpg)


    ![Image 81](index-328_2.png)


    10092ch07.qxd 7/29/08 10:39 AM Page 306


    **306**


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    **Figure 7-24.** *Enabling a Servers view*


    Once the Servers view is enabled, it opens a blank server control panel. The server
    control panel has buttons to start, stop, and restart a server. On the server
    control panel, right-click to launch the context menu, and select New **➤** Server,
    as shown in Figure 7-25.


    **Figure 7-25.** *Server control panel: new server setup*


    In the New Server dialog box that appears, select Apache Tomcat 5.5, and click
    Finish, as shown in Figure 7-26.


    ![Image 82](index-329_1.png)


    ![Image 83](index-329_2.png)


    10092ch07.qxd 7/29/08 10:39 AM Page 307


    **307**


    C H A P T E R 7 **■** C A S E S T U DY: B U I L D I N G A N O R D E R M A N A
    G E M E N T S YS T E M


    **Figure 7-26.** *Tomcat server setup*


    The Tomcat server now appears in a stopped state in the server control panel.
    Right-click it to add the `OMSWeb` project by selecting the Add and Remove Projects
    option, as shown in Figure 7-27.'
