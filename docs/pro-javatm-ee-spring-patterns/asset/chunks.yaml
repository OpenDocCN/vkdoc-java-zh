- fmt: "报告ID被传递给页面控制器，以便它能够向用户显示此令牌以供将来参考。用户可以使用此ID进行搜索，以查找其触发的报告生成状态。请注意，我还通过以`ReportMessageCreatorImpl`的形式传递`MessageCreator`接口的自定义实现，修改了`JmsTemplate`类的工作流程，如清单5-26所示。该类负责将传入消息转换为与JMS\
    \ API兼容的形式。\n\n**清单5-26.** `ReportMessageCreatorImpl.java`\n\n```java\npublic\
    \ class ReportMessageCreatorImpl implements MessageCreator{\n\n    private Map\
    \ reportData;\n\n    public ReportMessageCreatorImpl(Map reportData){\n      \
    \  this.reportData = reportData;\n    }\n\n    public Message createMessage(Session\
    \ jmsSession) throws JMSException {\n        MapMessage message = jmsSession.createMapMessage();\n\
    \        message.setObject(\"REPORT_DATA\", reportData.get(\"REPORT_DATA\"));\n\
    \        return message;\n    }\n}\n```\n\n向请求报告的用户发送最终响应有不同的策略。`eInsure`中的异步报告通常根据特定条件从RDBMS获取记录，应用格式化（如日期和货币），并将这些数据保存为各种格式的文件，包括Microsoft\
    \ Word、PDF、Microsoft Excel等。当报告文件生成完成时，通过电子邮件通知用户。\n\n## 消息驱动POJO\n\n使用Spring，即使没有应用服务器或JMS提供者，也可以支持异步消息监听器。实际上，可以将任何POJO类转变为消息监听器——即所谓的消息驱动POJO（MDP）——而无需任何EJB容器支持。MDP在Spring消息监听器容器中注册。消息监听器容器从JMS队列接收消息并调用已注册的MDP。\n\
    \n清单5-27展示了MDP。它独立于任何框架特定的接口或抽象类。由于消息监听器只是一个POJO，Spring无法确定当消息到达队列时应调用哪个方法。`MessageListenerAdapter`处理此问题。\n\
    \n**清单5-27.** `ReportMessageListener.java`\n\n```java\npublic class ReportMessageListener\
    \ {\n\n    private void processReport(Map reportParams){\n        //generate reports\n\
    \    }\n}\n```\n\n当Spring应用程序容器初始化并启动时，消息监听器容器也随之启动。您还需要注册消息监听器。这可以通过配置完成，如清单5-28所示。\n\
    \n**清单5-28.** `insurance-config.xml`\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"http://www.springframework.org/schema/beans\n\
    \    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\">\n\n \
    \   <!-- the other beans -->\n\n    <bean id=\"messageListener\"\n        class=\"\
    com.apress.einsure.report.async.messagelistener.ReportMessageListener\" />\n\n\
    \    <!-- this is the Message Driven POJO (MDP) -->\n    <bean id=\"messageListener\"\
    \n        class=\"org.springframework.jms.listener.adapter.MessageListenerAdapter\"\
    >\n        <constructor-arg>\n            <bean class=\"com.apress.einsure.report.async.messagelistener.ReportMessageListener\"\
    />\n        </constructor-arg>\n    </bean>\n\n    <!-- and this is the message\
    \ listener container -->\n    <bean id=\"jmsContainer\"\n        class=\"org.springframework.jms.listener.DefaultMessageListenerContainer\"\
    >\n        <property name=\"connectionFactory\" ref=\"qConnectionFactory\"/>\n\
    \        <property name=\"destination\" ref=\"qReport\"/>\n        <property name=\"\
    messageListener\" ref=\"messageListener\" />\n    </bean>\n</beans>\n```\n\n请注意，在此配置中，您已将消息监听器适配器注册到容器中。此适配器知道如何执行消息驱动POJO。`DefaultMessageListenerContainer`是使用最广泛的消息监听器容器。\n\
    \n## 后果\n\n### 优点\n\n- 在应用服务器和Spring IOC容器中，您都能获得对异步服务处理的强大支持。\n- 访问异步服务的客户端易于开发。\n\
    - 基于Spring的MDB构成了与外部系统进行JMS集成的骨干。\n- 由于请求是异步处理的，用户不会因长时间运行的任务而被阻塞。\n\n### 关注点\n\
    \n- Spring MDP易于开发和使用，但并非基于Java EE标准规范。使用MDP和Spring消息容器可能不适用于大规模的企业需求。\n\n## Web服务代理\n\
    \n### 问题\n\n生成保单报价是`eInsure`应用程序提供的一项非常重要的服务。此服务接受最基本的信息：保单金额、保障年限（“期限”）、保费频率，当然还有承保该保单的保险产品。给定这些输入，输出将是客户需支付的暂定保费。\n\
    \n此服务在在线`eInsure`应用程序中可用，并由核保人员和支持主管在柜台大量使用。然而，使用`eInsure`但无法直接访问该应用程序的合作伙伴、经销商和代理商也希望使用此功能。还有其他关联方希望仅将此功能作为小部件集成到他们的实用网站中。保单报价服务可通过会话门面进行远程访问。然而，实际功能是作为POJO应用程序服务实现的。这些外部应用程序大多运行在PHP上，其他的则运行在Microsoft\
    \ .NET平台上。可以为EJB创建非Java客户端，但这超出了开发这些外部应用程序的团队的技能范围。在这种情况下，另一种选择是以技术或平台无关的方式公开这些服务。Web服务是一个完美的解决方案。将保单报价功能公开为Web服务将使任何外部应用程序都能使用它，而不会受到技术障碍的限制。\n\
    \n### 驱动因素\n\n- 需要将内部服务暴露给外部客户端。\n- 服务应以技术中立的方式公开。\n- 在与外部系统集成时，首选开放标准来公开服务。\n\
    \n### 解决方案\n\n使用*Web服务代理*，基于开放的Web标准将业务服务暴露给外部客户端。\n\n#### 使用Spring框架的策略\n\nWeb服务通常涉及两个应用程序之间使用XML消息进行信息交换。这些XML消息遵循一种称为简单对象访问协议（SOAP）的标准。Web服务提供的操作在Web服务描述语言（WSDL）文件中描述。XML\
    \ SOAP消息可以通过多种网络协议传输，例如HTTP、SMTP和JMS。但是，我将仅介绍HTTP作为传输协议。\n\n##### 使用JAX-RPC的Web服务"
