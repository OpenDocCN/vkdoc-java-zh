    \n        class=\"com.apress.insurance.web.controller.SaveNewPolicyController\"\
    \ >\n        <property name=\"uwrBusinessDelegate\"\n            ref=\"underwritingBusinessDelegate\"\
    \ />\n        <property name=\"formView\"\n            value=\"createPolicy\"\
    \ />\n        <property name=\"commandName\"\n            value=\"policydetails\"\
    \ />\n        <property name=\"successView\"\n            value=\"policydetails\"\
    \ />\n        <property name=\"commandClass\"\n            value=\"com.apress.insuranceapp.web.formbean.PolicyFormBean\"\
    \ />\n        <property name=\"validator\"\n            ref=\"policyUnderwriteValidtor\"\
    \ />\n    </bean>\n\n    <bean id=\"messageSource\" class=\"org.springframework.context.support.ResourceBundleMessageSource\"\
    >\n        <property name=\"basename\" value=\"messages\"/>\n    </bean>\n\n \
    \   <bean name=\"policyUnderwriteValidtor\"\n        class=\"com.apress.insurance.web.validator.PolicyFormbeanValidator\"\
    \ />\n\n    <bean name=\"underwritingBusinessDelegate\"\n        class=\"com.apress.insurance.view.delegate.UnderWritingBusinessDelegate\"\
    \ />\n</beans>\n```\n\n保存错误消息的资源包文件的基本名称为 messages。清单 3-32 展示了一个示例资源包。\n\n**清单\
    \ 3-32.** WEB-INF/classes/messages_en_US.properties\n\n```properties\nmandatoryfirstname.policydetails.firstName=First\
    \ name field is mandatory\nmandatoryfirstname.policydetails.mandatorylastname=Last\
    \ name field is mandatory\nmandatoryfirstname.policydetails.mandatoryAge=Age field\
    \ is mandatory and should be an integer(0-9)\n```\n\n请注意，消息键与错误键不同。这是因为 MessageCodesResolver\
    \ 实现会转换错误键，以附加命令名称和字段名称。最后，我们还需要稍微修改 JSP，以便在相应字段旁边显示验证错误消息。为此，我将使用 Spring 提供的标签库来简化基于\
    \ JSP 的视图开发。清单 3-33 展示了修改后的 JSP。\n\n**清单 3-33.** WEB-INF/jsp/createPolicy.jsp\n\
    \n```jsp\n<%@ taglib prefix=\"form\" uri=\"http://www.springframework.org/tags/form\"\
    \ %>\n<%@ taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\" %>\n<%@\
    \ taglib prefix=\"fmt\" uri=\"http://java.sun.com/jsp/jstl/fmt\" %>\n<html>\n\
    <head>\n    <title>核保</title>\n    <style>\n        .error { color: red; }\n \
    \   </style>\n</head>\n<body>\n    <form:form action=\"\" method=\"POST\" commandName=\"\
    policydetails\">\n        名字 <form:input path=\"firstName\"/>\n        <form:errors\
    \ path=\"firstName\" cssClass=\"error\"/><br/>\n        姓氏 <form:input path=\"\
    lastName\"/>\n        <form:errors path=\"lastName\" cssClass=\"error\"/><br/>\n\
    \        年龄 <form:input path=\"age\"/> <form:errors path=\"age\" cssClass=\"error\"\
    /><br/>\n        <input type=\"submit\" value=\"保存\" />\n    </form:form>\n</body>\n\
    </html>\n```\n\n除了到目前为止讨论的控制器之外，Spring MVC 还针对特定需求提供了其他一些控制器（包括抽象实现和具体实现）。其中一些控制器列在表\
    \ 3-1 中。它们仅在少数用例中偶尔需要。\n\n**表 3-1.** *偶尔有用的页面控制器*\n\n| **文件名** | **描述** |\n| :---\
    \ | :--- |\n| MultiActionController | 一些开发者认为将一组逻辑相关的操作分组到一个控制器实现类中是有用的。与保单创建页面相关的所有操作——保存、编辑等——都可以放在一个继承自\
    \ MultiActionController 的类中。这有助于减少大型应用中页面控制器的具体实现数量。Spring MVC 可以使用一个名为 MethodNameResolver\
    \ 的类来确定要调用哪个方法。该类可以从 HttpServletRequest 中设置的参数来确定方法名。 |\n| AbstractWizardFormController\
    \ | 应用程序中的某些用例最好通过在执行最终操作前呈现多个页面来处理。这种多步骤用例在 Web 应用的注册或注册过程中很常见。eInsure 也部署了一个多步骤工作流来收集保单和索赔详情。Spring\
    \ MVC 通过 AbstractWizardFormController 类为建模此类用例提供了开箱即用的支持。 |\n\n**结论**\n\n优点\n\n\
    *   **提高了可重用性**：将用例处理整合到页面控制器中实现了重用。\n*   **提高了可扩展性**：借助 Spring 的支持，不仅可以实现自定义页面控制器，还可以与其他框架（如\
    \ Struts、WebWork 等）的页面控制器进行集成。\n*   **生命周期支持**：如果没有 Spring MVC，支持表单处理生命周期将导致大量自定义代码，造成精力浪费和维护困难。然而，使用\
    \ Spring，与表单生命周期和命令管理相关的大部分样板代码都是开箱即用的。\n\n关注点\n"
- fmt: "- **Steep learning curve**: With Spring, MVC controller support has a plethora\
    \ of options. As a result, developers need to know about plenty of interfaces\
    \ and abstract classes to make the appropriate design decisions.\n- **Hard to\
    \ maintain**: Now the application has one page controller per use case. In a large\
    \ application, this would lead to a huge set of controller classes, making it\
    \ difficult to manage and maintain.\n\n## Context Object\n\n### Problem\n\n`eInsure`\
    \ had a product workbench that was used by business analysts and product designers\
    \ to devise and roll out insurance products. Put simply, an insurance product\
    \ defines a set of rules used to underwrite a specific class of policies. One\
    \ of the customers who used `eInsure` wanted an offline version of the product\
    \ workbench module. This application would be installed on the laptops used by\
    \ the business analysts. This would enable them to work out the details of the\
    \ product even when offline and synchronize with the main database later, before\
    \ finally releasing the rulesets.\n\nThere were two choices for this offline application.\
    \ One was Java Swing–based desktop software, and the other was the same `eInsure`\
    \ application running on an embedded web server with a synchronization facility.\
    \ Our customer preferred the first solution.\n\nSince `eInsure` was being refactored\
    \ to use Spring Framework, our initial take was that most of the codebase (except\
    \ the presentation tier view components) would be reusable.\n\nThe `eInsure` team\
    \ was delighted about having moved to Spring because this Swing application would\
    \ run easily out of the container.\n\nBut soon our high hopes turned to despair\
    \ when we found that even the page controllers could not be reused. The reason\
    \ for this was that the presentation tier code was tightly coupled to the HTTP\
    \ protocol and the servlet API. The page controllers implemented the `Controller`\
    \ interface and in the process heavily used `HttpServletRequest` and `HttpServletResponse`\
    \ objects. These objects were used to extract the data from form submission. The\
    \ result was a set of page controllers that could not be reused outside a web\
    \ application. The development team was left with no choice but to build the application\
    \ from scratch, resulting in an unnecessary expenditure of effort.\n\n### Forces\n\
    \n- Don’t let protocol-specific API usage proliferate deep into a layer. This\
    \ intrusion pollutes application code by reducing reusability.\n- Identify the\
    \ appropriate context where protocol-specific code is to be used. In this case,\
    \ the use of protocol-specific code should be limited to the front controller\
    \ or at most the application controller.\n- Increase the reusability of page controllers.\n\
    - Make page controllers easily testable components.\n\n### Solution\n\nUse a *context\
    \ object* to encapsulate and share form data without any protocol dependency.\n\
    \n#### Strategies with the Spring Framework\n\nDuring the discussion of the Page\
    \ Controller pattern, I did make attempts to break free from the coupling of protocol-specific\
    \ code. But since the `SimpleFormController` inherited from controllers that had\
    \ association with the `HttpServletRequest` and `HttpServletResponse` objects,\
    \ the runtime dependency remained. Hence, it was not possible to use this controller\
    \ outside the web container.\n\nSpring MVC, however, provides a controller that\
    \ is independent of any protocol-specific details. The `ThrowawayController` interface\
    \ is completely unaware of the servlet-specific API. The implementation classes\
    \ are similar to JSF managed beans with the properties mapping to the HTML form\
    \ fields. It also needs to implement the single `execute` method that should be\
    \ used to invoke business logic. This method is called by the handler adapter\
    \ only when setting all the properties is successful and there is no data conversion\
    \ error. Since `ThrowawayController` belongs to a different class hierarchy than\
    \ other controllers, executing these controllers requires a specific handler adapter\
    \ called `ThrowawayControllerHandlerAdapter`. However, there is no need to configure\
    \ this handler adapter explicitly, because it is assumed as the default along\
    \ with `SimpleControllerHandlerAdapter`.\n\n**Listing 3-34.** `SaveClaimController.java`\n\
    \n```java\npublic class SaveClaimController implements ThrowawayController {\n\
    \n    private String claimantName;\n\n    private String policyNo;\n\n    private\
    \ String productCd;\n\n    public ModelAndView execute() throws Exception {\n\
    \        //Invoke business logic here\n        return new ModelAndView(\"claimDetails\"\
    );\n    }\n\n    public String getClaimantName() {\n        return claimantName;\n\
    \    }\n\n    public void setClaimantName(String claimantName) {\n        this.claimantName\
    \ = claimantName;\n    }\n\n    public String getPolicyNo() {\n        return\
    \ policyNo;\n    }\n\n    public void setPolicyNo(String policyNo) {\n       \
    \ this.policyNo = policyNo;\n    }\n\n    public String getProductCd() {\n   \
    \     return productCd;\n    }\n\n    public void setProductCd(String productCd)\
    \ {\n        this.productCd = productCd;\n    }\n}\n```\n\n**Listing 3-35.** `WEB-INF/jsp/createClaim.jsp`\n\
    \n```jsp\n<html>\n<head>\n<title>New Claim</title>\n</head>\n<form action=\"saveClaim.do\"\
    \ method=\"POST\">\n    Claimant Name <input type=\"text\" name=\"claimantName\"\
    \ value=\"\" /><br/>\n    Policy Number <input type=\"text\" name=\"policyNo\"\
    \ value=\"\" /><br/>\n    Product Code<input type=\"text\" name=\"productCd\"\
    \ value=\"\" /><br/>\n    <input type=\"submit\" value=\"Save\" />\n</form>\n\
    </body>\n</html>\n```\n\nFinally, the controller needs to be added in the Spring\
    \ configuration, as shown in Listing 3-36.\n\n**Listing 3-36.** `insurance-servlet.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
    \n>\n    <!- - Other beans - ->\n    <bean name=\"/saveClaim.do\"\n        class=\"\
    com.apress.insurance.web.controller.SaveClaimController\" />\n</beans>\n```\n\n\
    Thus, a throwaway controller is a combination of form bean and page controller.\n\
    \nNote that its independence from the Servlet API increases reusability and makes\
    \ this controller easier to unit test. But it has some disadvantages too. Since\
    \ this is a stateful controller, a new instance should be created for each request.\
    \ This in turn wastes space on the JVM heap, increasing the need for garbage collection\
    \ and the resulting pauses.\n\nHowever, with a modern well-tuned JVM, this is\
    \ not a major problem. This controller is very simple, without any detailed workflow.\
    \ It does not support validation of form fields."
  raw: '• *Steep learning curve*: With Spring, MVC controller support has a plethora
    of options. As a result, developers need to know about plenty of interfaces and
    abstract classes to make the appropriate design decisions.


    • *Hard to maintain*: Now the application has one page controller per use case.
    In a large application, this would lead to a huge set of controller classes, making
    it difficult to manage and maintain.


    **Context Object**


    **Problem**


    eInsure had a product workbench that was used by business analysts and product
    designers to devise and roll out insurance products. Put simply, an insurance
    product defines a set of rules used to underwrite a specific class of policies.
    One of the customers who used eInsure wanted an offline version of the product
    workbench module. This application would be installed on the laptops used by the
    business analysts. This would enable them to work out the details of the product
    even when offline and synchronize with the main database later, before finally
    releasing the rulesets.


    There were two choices for this offline application. One was Java Swing–based
    desktop software, and the other was the same eInsure application running on an
    embedded web server with a synchronization facility. Our customer preferred the
    first solution.


    Since eInsure was being refactored to use Spring Framework, our initial take was
    that most of the codebase (except the presentation tier view components) would
    be reusable.


    The eInsure team was delighted about having moved to Spring because this Swing
    application would run easily out of the container.


    But soon our high hopes turned to despair when we found that even the page controllers
    could not be reused. The reason for this was that the presentation tier code was
    tightly coupled to the HTTP protocol and the servlet API. The page controllers
    implemented the Controller interface and in the process heavily used HttpServletRequest
    and HttpServletResponse objects. These objects were used to extract the data from
    form submission. The result was a set of page controllers that could not be reused
    outside a web application. The development team was left with no choice but to
    build the application from scratch, resulting in an unnecessary expenditure of
    effort.


    10092ch03.qxd 7/24/08 5:08 PM Page 91


    C H A P T E R 3 **■** E X P L O R I N G P R E S E N TAT I O N T I E R D E S I
    G N PAT T E R N S


    **91**


    **Forces**


    • Don’t let protocol-specific API usage proliferate deep into a layer. This intrusion
    pollutes application code by reducing reusability.


    • Identify the appropriate context where protocol-specific code is to be used.
    In this case, the use of protocol-specific code should be limited to the front
    controller or at most the application controller.


    • Increase the reusability of page controllers.


    • Make page controllers easily testable components.


    **Solution**


    Use a *context object* to encapsulate and share form data without any protocol
    dependency.


    Strategies with the Spring Framework


    During the discussion of the Page Controller pattern, I did make attempts to break
    free from the coupling of protocol-specific code. But since the SimpleFormController
    inherited from controllers that had association with the HttpServletRequest and
    HttpServletResponse objects, the runtime dependency remained. Hence, it was not
    possible to use this controller outside the web container.


    Spring MVC, however, provides a controller that is independent of any protocol-specific
    details. The ThrowawayController interface is completely unaware of the servlet-specific
    API. The implementation classes are similar to JSF managed beans with the properties
    mapping to the HTML form fields. It also needs to implement the single execute
    method that should be used to invoke business logic. This method is called by
    the handler adapter only when setting all the properties is successful and there
    is no data conversion error. Since ThrowawayController belongs to a different
    class hierarchy than other controllers, executing these controllers requires a
    specific handler adapter called ThrowawayControllerHandlerAdapter. However, there
    is no need to configure this handler adapter explicitly, because it is assumed
    as the default along with SimpleControllerHandlerAdapter.


    10092ch03.qxd 7/24/08 5:08 PM Page 92


    **92**


    C H A P T E R 3 **■** E X P L O R I N G P R E S E N TAT I O N T I E R D E S I
    G N PAT T E R N S


    Listing 3-34 shows the ThrowawayController implementation. For each property it
    defines a getter/setter combination to map the form fields. The handler adapter
    extracts the form field values using the servlet API and maps them to the properties
    of this controller. This makes the controller reusable and free from protocol
    specifics. It can very well be used with Swing components with an appropriate
    handler adapter.


    **Listing 3-34.** SaveClaimController.java


    public class SaveClaimController implements ThrowawayController {


    private String claimantName;


    private String policyNo;


    private String productCd;


    public ModelAndView execute() throws Exception {


    //Invoke business logic here


    return new ModelAndView("claimDetails");


    }


    public String getClaimantName() {


    return claimantName;


    }


    public void setClaimantName(String claimantName) {


    this.claimantName = claimantName;


    }


    public String getPolicyNo() {


    return policyNo;


    }


    public void setPolicyNo(String policyNo) {


    this.policyNo = policyNo;


    }


    public String getProductCd() {


    return productCd;


    }


    public void setProductCd(String productCd) {


    this.productCd = productCd;


    }


    }


    Listing 3-35 shows the JSP that maps to the throwaway controller shown just now.


