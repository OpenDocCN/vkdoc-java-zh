  trans: '

    Spring 框架也开始着手解决开发 Java EE 应用程序所固有的复杂性。然而，与 Struts、Hibernate 或 HiveMind 等单层框架不同，Spring
    提供了一个全面的多层框架，可以在应用程序的所有层中使用。它通过开箱即用的组件来帮助构建整个应用程序，并与最佳的单层框架进行集成。与其单层框架的同类产品一样，它提供了一种基于
    POJO 的简单编程模型，并且由于这些组件可以在服务器容器之外运行，因此使它们易于测试。


    Spring 控制反转（IOC）容器（将在下一节讨论）是整个框架的核心。它有助于将应用程序的不同部分粘合在一起，从而形成一个连贯的架构。Spring MVC
    组件可用于构建非常灵活的 Web 层。IOC 容器通过 POJO 简化了业务层的开发。


    10092ch02.qxd 7/21/08 4:56 PM 第 24 页


    **24**


    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用程序


    这些 POJO 业务组件可以通过 Spring 提供的各种远程处理选项作为分布式对象使用。它们也可以用于开发以及连接到分布式 EJB 组件。借助 Spring
    AOP，可以将事务、安全性和检测等系统服务透明地应用于 POJO 组件。Spring JDBC 和对象关系映射（ORM）组件允许简化与数据库的交互。作为一个应用程序框架，Spring
    通过 Java 连接器架构（JCA）和 Web 服务提供了与不同信息系统的、基于标准的简易集成。最后但同样重要的是，Spring Security 是一个全面的解决方案，可以满足任何企业应用程序的安全需求。


    **Spring 框架的构建模块**


    Spring 是一个应用程序框架，被划分为多个模块或组件。


    每个模块提供一组特定的功能，并且或多或少地独立于其他模块工作。毋庸置疑，这些模块可用于构建可扩展且灵活的企业级 Java 应用程序。这个系统非常灵活，因为开发人员可以选择只使用在特定问题上下文中最合适的模块。例如，开发人员可以只使用
    Spring DAO 模块，并使用非 Spring 组件构建应用程序的其余部分。此外，Spring 提供了与其他框架和 API 协作的集成点。如果您认为 Spring
    在特定场景中不合适，可以使用替代方案。例如，如果开发团队更精通 Struts，则可以使用它来代替 Spring MVC，而应用程序的其余部分则使用 Spring
    组件和特性，如 JDBC 和事务。在这两种场景中，开发人员无需部署整个 Spring 框架。他们只需要相关的模块（如 Spring DAO）以及 Spring
    IOC 容器和 Struts 库。


    图 2-1 展示了 Spring 框架的各种模块。


    ![图 21](img/index-47_1.png)


    10092ch02.qxd 7/21/08 4:56 PM 第 25 页


    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用程序


    **25**


    **图 2-1.** *Spring 框架的高级构建模块* **Spring Core**


    Core 模块构成了整个 Spring 框架的支柱。所有其他 Spring 模块都依赖于这个模块。它也被称为 IOC 容器，是 Spring 支持依赖注入（DI）的核心。


    控制反转


    IOC 最好用“好莱坞原则”来描述，即“别打电话给我们，我们会打给你。”（在好莱坞，初级艺人经常从制片经理那里听到这句话。）然而，这在软件开发中对于控制应用程序流程，同时确保高内聚和低耦合也至关重要。为了更好地理解，让我们考虑一个简单的情况：您的应用程序执行一些计算，并使用像
    log4j 这样的日志库打印最终结果。在这种情况下，应用程序代码负责控制流程，并在必要时调用 log4j API 上的方法。


    另一方面，IOC 是任何框架的基础。使用 IOC，应用程序对象通常会向框架注册，框架负责在适当的时间或事件发生时调用注册对象上的方法。控制被反转了，因为不是应用程序代码调用框架
    API，而是恰恰相反。因此，简而言之，IOC 是允许另一个对象或框架在适当事件发生时调用您的应用程序对象上的方法的原则。


    10092ch02.qxd 7/21/08 4:56 PM 第 26 页


    **26**


    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用程序


    IOC 并不是一个新概念，它已经存在很长时间了。例如，EJB 就支持 IOC。各种 EJB 组件，如会话 Bean、实体 Bean 和消息驱动 Bean，通过实现不同接口中定义的方法，与容器建立特定的契约。例如，会话
    Bean 实现了 `javax.ejb.SessionBean` 接口中定义的 `ejbActivate` 和 `ejbPassivate` 生命周期方法。然而，这些方法永远不会从会话
    Bean 的其他方法中调用；相反，容器会在 Bean 生命周期的不同时间点调用这些方法，从而反转了控制。例如，消息驱动 Bean 实现了 `javax.jms.MessageListener`
    接口的 `onMessage` 方法。容器负责在消息到达事件发生时调用此方法。


    依赖注入


    开发人员普遍认为 IOC 和 DI 是同一回事。这是不正确的，我想从一开始就明确说明，它们是两个不同但相关的概念。正如 IOC 处理应用程序中控制流的反转一样，DI
    描述了一个对象如何解析或找到它需要调用某些方法的其他对象。有几种方法可以实现 DI，其中一种策略就是 IOC。我将在接下来的几节中逐一解释不同的 DI 策略。


    **直接实例化**


    直接实例化是 DI 的最简单形式。依赖对象直接使用 `new` 运算符进行实例化，如清单 2-1 所示。


    **清单 2-1.** FormulaOneDriver.java *：使用直接实例化* public class FormulaOneDriver{


    public Car getCar(){


    Car car = new FerrariCar();


    return car;


    }


    }


    F1 车手对象（`FormulaOneDriver`）需要一辆车来驾驶。因此，它直接创建了一个 `Car` 对象的实例并使用它。直接实例化增加了耦合度，并将对象创建代码分散到整个应用程序中，使其难以维护和进行单元测试。


    10092ch02.qxd 7/21/08 4:56 PM 第 27 页


    第 2 章 **■** 使用 Spring 框架简化企业级 Java 应用程序


    **27**


    **工厂辅助类**


    工厂辅助类是一种常见且广泛使用的依赖注入策略。它基于 GOF 工厂方法设计模式。工厂方法整合了 `new` 运算符的使用，并根据某些输入提供适当的对象实例。


    如清单 2-2 所示。


    **清单 2-2.** FormulaOneDriver.java *：使用工厂辅助类* public class FormulaOneDriver{


    public Car getCar(){


    Car car = CarFactory.getInstance("FERARI");


    return car;


    }


    }

