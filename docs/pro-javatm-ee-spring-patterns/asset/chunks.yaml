    **认证与授权执行器**


    **问题**


    eInsure 应用程序处理与数千人购买的保单相关的敏感信息。它还管理着使用该产品的公司高级管理层可以访问的关键商业智能数据。因此，eInsure 只允许受信任方访问数据以防止任何形式的数据丢失或篡改至关重要。'
- fmt: '企业应用与外部用户或系统建立信任的常用策略称为`authentication`（身份验证）。在身份验证过程中，系统会向用户提出一个简单的问题：“你是谁？”用户通过提供主体（用户名）和凭证（密码）来回应。系统会验证主体-凭证组合，如果匹配，则允许用户访问系统。请注意，身份验证并不保证用户有权访问系统资源，它仅仅打开了通往Web资源的大门。


    决定已认证用户是否有权访问资源的过程由另一个称为`authorization`（授权）的流程控制。授权试图回答这个问题：“你能做什么？”换句话说，它试图找出已认证用户在系统中可以执行的操作。在Java
    EE应用程序中，这主要涉及保护对Web资源（如JSP）的访问。用户的主体通常与一个或多个角色相关联，而每个角色又链接到一组资源或操作。


    `eInsure`应用程序有一个登录表单，供用户提供用户名和密码组合以进行身份验证。系统会将提供的信息与数据库进行核对，有效的用户将被授予执行不同操作的权限。


    `eInsure`中使用的基于数据库的身份验证机制是僵化的。它被深埋在应用程序内部，并横切了所有层级。换句话说，身份验证逻辑的实现方式与任何普通操作（如保单承保）一样。在重构后的`eInsure`系统中，这意味着身份验证请求将被前端控制器拦截，并传递给页面控制器。随后将调用业务委托、会话外观和数据访问对象。


    理想情况下，身份验证和安全代码应该透明地应用，并且不需要跨越多个层级。`eInsure`是由那些已经拥有企业级安全策略和软件的客户实施的。因此，在大多数情况下，基于数据库的方法并不奏效。相反，应用程序必须适应客户现有的安全实现，例如轻量级目录访问协议（LDAP）、单点登录（SSO）或`OpenID`。这导致了大量的代码更改和在不同层级进行测试，以便与替代的身份验证实现集成。


    如本章后面的清单4-1所示，JSP控制器使用用户信息以及事件代码来检查用户是否有权执行某个操作。这个检查也被深埋在表示层内部。对授权辅助方法的任何更改都会导致所有控制器的更改。


    这种深度嵌入的授权检查导致了安全关注点与表示关注点的混合。`eInsure`中的授权代码会为每个请求查询数据库，以查明用户是否有权使用给定的事件代码执行该操作。这种为每个请求进行的数据库查询对性能产生了负面影响。最后但同样重要的是，事件代码在视图和控制器JSP中以及数据库中被硬编码。对事件代码值的任何更改都意味着要修改所有JSP。这常常会导致一些非常难以检测的小错误。


    **驱动力**


    - 只有有效用户才被允许进入应用程序。

    - 应用程序的所有不同入口点都应受到身份验证的保护。

    - 所有已认证用户都应拥有适当的角色/权限来访问安全的系统资源。

    - 身份验证和授权机制应被封装为独立的组件，并通过配置透明地应用。


    **解决方案**


    实现一个可插拔的`authentication and authorization enforcer`（身份验证与授权执行器），用于验证用户身份并允许访问受保护的资源。


    **使用Spring框架的策略**


    `Spring Security`将`Authentication and Authorization Enforcer`模式实现为一组两个截然不同但又紧密关联的组件。身份验证和授权执行器组件协同工作，并在Java
    EE Web应用程序的表示层和业务层透明地应用身份验证和授权支持。正如你将在后续章节中看到的，这些组件具有高度的可配置性和可扩展性。


    身份验证执行器的主要职责是验证用户身份。当任何请求到达Web应用程序时，它还会检查身份验证状态。如果用户已通过身份验证，则允许请求传递给授权执行器。如果身份验证失败，用户将被重定向到登录页面。


    身份验证执行器通常是可插拔的，这有助于快速适应任何新的身份验证机制，例如`OpenID`。核心组件位于协议无关的拦截器之后，并使用辅助程序来委托实际的认证过程。所有用户操作都必须通过这些拦截器来应用身份验证。


    一旦身份验证核心组件完成工作，授权执行器就会接手请求。它会检查发起此操作的用户是否有足够的权限来访问特定的网页或执行某个方法。如果用户试图在未验证身份的情况下访问资源，授权执行器将强制其跳转到登录页面或访问被拒绝页面。图6-1展示了身份验证与授权执行器的基本架构。


