    />\n</beans>\n```\n\n实现`Controller`接口的类必须是线程安全的，因为它们默认是单例的。控制器可以完全访问`HttpServletRequest`和`HttpServletResponse`对象，因此它们依赖于HTTP协议。\n\
    \n但这同时也使得这些组件可以被依赖于HTTP的远程调用机制使用。如果目标独立于Servlet API且控制器不需要是线程安全的，可以使用`ThrowawayController`。\n\
    \n## 使用`AbstractController`\n\n在大多数情况下，实现`Controller`接口就足够了。然而，Spring提供了几个具体的以及抽象的控制器实现，可以根据需求进行扩展。图3-8中的类图展示了这样一个类。\n\
    \n![Image 30](index-94_1.png)\n![Image 31](index-94_2.png)\n\n**图3-8.** *抽象控制器类图*\n\
    \n如图3-8所示，`AbstractController`类实现了`Controller`接口，并定义了一个可供子类使用的明确工作流。该类实现了模板方法设计模式（GOF），定义了一个固定的工作流，并提供了合适的扩展点来改变工作流。图3-9所示的时序图说明了该类定义的工作流。\n\
    \n**图3-9.** *抽象控制器时序图*\n\n处理器适配器调用`handleRequest`方法来触发工作流。然后在父类`WebContentGenerator`上调用`checkAndPrepare`方法来执行以下活动：\n\
    \n1. 检查此请求的HTTP方法是否受支持。这可用于阻止不希望的HTTP方法请求，例如`DELETE`。通过支持`GET`请求，它可以用于访问某些只读资源，例如帮助页面。\n\
    2. 检查HTTP会话是否已启动。如果应用程序在进行进一步处理之前需要会话中已存储的某些数据，这将非常有用。\n3. 为客户端设置提示，指示由调度器Servlet发送的最终响应的缓存持续时间。\n\
    \n所有这些任务都可以通过配置来开启或关闭。前两个任务在失败时会抛出`ServletException`。这里的扩展点由抽象的`handleRequestInternal`方法提供。所有子类必须实现这个模板方法以提供自定义实现。因此，`AbstractController`是一个便利的基类，用于简化页面控制器的实现。\n\
    \n我将通过一个非常简单的用例来使用`AbstractController`。`eInsure`应用程序需要显示支持和帮助信息，以便用户能够舒适地处理应用程序的不同功能。清单3-18展示了这样一个场景的控制器。\n\
    \n**清单3-18.** `PolicyQuoteHelpController.java`\n\n```java\npublic class PolicyQuoteHelpController\
    \ extends AbstractController {\n\n    protected ModelAndView handleRequestInternal(HttpServletRequest\
    \ request,\n                                                  HttpServletResponse\
    \ response) throws Exception {\n        return new ModelAndView(\"policyquotehelp\"\
    );\n    }\n\n}\n```\n\n`PolicyQuoteHelpController`不调用任何业务逻辑。相反，它充当一个只读控制器，仅将控制权转移到下一个视图。但在这样做之前，它会检查请求是否通过HTTP\
    \ `GET`方法发出以及会话是否已存在。请注意，这两个选项是通过配置设置的，如清单3-19所示。\n\n**清单3-19.** `spring-config.xml`\n\
    \n```xml\n<beans>\n  <bean name=\"/policyquotehelp.do\" class=\"com.apress.insuranceapp.\n\
    \    web.controller.PolicyQuoteHelpController\">\n    <property name=\"supportedMethods\"\
    \ value=\"GET\"/>\n    <property name=\"requireSession\" value=\"true\"/>\n  </bean>\n\
    </beans>\n```\n\n如果不需要前面提到的两个检查，那么`UrlFilenameViewController`类可以与视图解析器结合使用，来实现仅传递逻辑视图名称的页面控制器。我将在本章后面讨论调度器视图模式时更详细地介绍这种控制器。\n\
    \n## 使用`AbstractCommandController`\n\nWeb应用程序中的大多数用例通过收集HTML表单中提供的信息，然后基于这些表单数据执行业务操作来工作。可以从`HttpServletRequest`对象中获取所有表单数据，主要使用`getParameter`方法。将请求对象传递给业务层是一种不好的做法，因为它会将业务层绑定到特定协议类型的客户端。因此，可以使用`getParameter`方法检索所有必需的数据来填充JavaBean对象。这个JavaBean对象被传递给业务层。\n\
    \n将JavaBean创建逻辑放在控制器中违反了单一职责原则（SRP）。表单字段的任何更改都可能导致控制器的更改。一个灵活且清晰的设计是在控制器外部创建这个JavaBean对象，并将其作为参数传递给控制器。这个需求由实现`AbstractCommandController`类的控制器来满足。处理器适配器从`HttpServletRequest`对象中填充POJO对象，然后将其传递给控制器。它将表单字段名称映射到POJO的属性。\n\
