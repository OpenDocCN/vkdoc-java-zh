    **问题**


    生成保单报价是 eInsure 应用程序提供的一项非常重要的服务。此服务仅接受最基本的信息：保单金额、保障年限（“期限”）、保费频率，当然还有承保该保单的保险产品。给定这些输入，输出将是客户需要支付的暂定保费。


    此服务在在线 eInsure 应用程序中可用，并由核保人和支持主管在柜台大量使用。然而，使用 eInsure 但无法直接访问该应用程序的合作伙伴、经销商和代理商也希望使用此功能。还有其他关联方希望仅将此功能作为小部件集成到他们的实用网站中。保单报价服务可以通过会话外观进行远程访问。然而，实际功能是作为
    POJO 应用程序服务实现的。这些外部应用程序大多运行在 PHP 上，其他则运行在 Microsoft .NET 平台上。可以为 EJB 提供非 Java
    客户端，但这超出了开发这些外部应用程序的团队的技能范围。在这种情况下，另一种选择是以技术或平台无关的方式公开这些服务。Web 服务是一个完美的解决方案。将保单报价功能公开为
    Web 服务将使任何外部应用程序都能使用它，而不会受到技术障碍的限制。


