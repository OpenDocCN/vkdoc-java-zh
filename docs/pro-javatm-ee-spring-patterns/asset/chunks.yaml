- fmt: '# CHAPTER 2 ■ SIMPLIFYING ENTERPRISE JAVA APPLICATIONS WITH THE SPRING FRAMEWORK


    **Figure 2-2.** *Lightweight application architecture with the Spring Framework*
    Figure 2-2 shows a three-tier web application leveraging the different Spring
    Framework modules. I will dissect each of the tiers to see how these modules are
    utilized and what different options are available to build a flexible, simple
    enterprise Spring application.


    ## Presentation Tier


    As the name suggests, `Spring MVC` provides first-class components to build web
    applications following the MVC pattern. Like any good web framework, `Spring MVC`
    helps build the controller layer. It is flexible and supports a variety of components
    for view management, including core Java EE technologies such as JSP and others
    such as Extensible Stylesheet Language (XSL) and Portable Document Format (PDF).


    As shown in Figure 2-2, the HTTP request from the client’s web browser is first
    intercepted by the controller component. This consists of a gateway servlet that
    acts as a single entry point into the application. The servlet then delegates
    successive user requests to respective handlers called *page controllers*. Page
    controllers are simple Java classes that execute one application use case and
    invoke the business services. `Spring MVC` also contains a view management layer
    (not shown for simplicity), which is responsible for locating an appropriate view
    (which may be another JSP). It also binds the data objects returned by the page
    controllers after invoking the model objects in the business tier and finally
    dispatches the HTTP response to the client. All the objects that are responsible
    for view management, controller management, and the page controllers themselves
    are registered in the underlying Spring IOC container. Thus, all the benefits
    of this container are available to the `Spring MVC` module. Note that the gateway
    servlet is not part of the Spring IOC container; rather, it is managed by the
    web server.


    `Spring MVC` is a versatile module and supports almost any view and model technology
    available. If your development team is more confident with Java Server Faces (JSF)
    or Struts, for example, it is quite possible to integrate these frameworks with
    `Spring MVC`.


    You can very well use template-based view engines such as Velocity and FreeMarker;
    document-based views such as PDF, Microsoft Word, and Microsoft Excel; and rich
    user interfaces provided by Adobe Flex. As far as the model is concerned, `Spring
    MVC` not only gels well with POJO business components, but it goes equally well
    with distributed EJB components.


    ## Business Tier


    With Spring you can develop business components as plain Java classes without
    any framework dependency. This is in complete contrast to the EJB programming
    model, which demands the implementation of several different interfaces along
    with deployment descriptors, making life complicated for the developer.


    The POJO business objects are all configured in the Spring IOC container just
    like any other bean shown in earlier examples. They are responsible for executing
    business rules, and in the process they manipulate application data using the
    data access API available in the integration tier.


    The Spring AOP module plays a significant role in the business tier. It can be
    used to declaratively apply and control transaction and security on the POJO business
    components.


    It is possible to utilize `Spring AOP` to develop custom aspects that collect
    audit trail information or instrument method execution time without affecting
    the existing application code.


    It is possible to develop a mixed solution with Spring POJO and EJBs. Spring IOC
    implements the service locator pattern (to be discussed in Chapter 4) to look
    up (pull DI) the EJB home interfaces and then injects those objects into the POJO
    business objects.


    Note that the system-level services provided by the EJB container are now available
    to the application. In this scenario, the Spring Framework played the role of
    an EJB client using a session bean. Spring also helps with EJB implementation
    through convenient superclasses. We will delve into this in greater detail as
    part of the Spring business layer patterns in Chapter 4.


    It is important to note that `Spring MVC` is not the only way of connecting to
    the Spring business tier. It is possible to expose Spring business objects as
    web services. Similarly, various other remoting options like Spring remoting,
    Burlap-Hessian, and so on, can be used to connect to Spring components, making
    them available as remote components. I will explore a few remoting solutions in
    connection with the integration tier patterns in Chapter 4.


    ## Integration Tier


    The integration tier in most applications interacts with the RDBMS using the JDBC
    API through POJO data access objects. The data access objects provide a consistent
    API for the business tier objects and wrap the JDBC API. `Spring DAO` provides
    templates for simple and flexible data access objects. The data access objects
    update relational databases as well as retrieve data from them. The retrieved
    data is wrapped in JavaBean objects and returned to the layers above.


    Just like the other two tiers, Spring provides plenty of options even in the integration
    tier. `Spring ORM` allows development teams to easily use an object relational
    bridge solution such as Hibernate or TopLink. The integration tier in a Java EE
    application is not limited to communicating with relational databases. It can
    be a requirement to connect to a mainframe or an ERP or CRM system. Just as with
    the business tier, here too we can leverage the `Spring JEE` module to connect
    to these systems and applications using standard technologies such as JCA or web
    services.


    ## Spring Enterprise Java Design Pattern Directive


    In the previous chapter, I have discussed the foundations of Java EE architecture
    and design. In the process, I mentioned that best practices in design can be collated
    as design directives or design patterns. These provide a common vocabulary to
    communicate design ideas among developers and designers. I will now combine the
    lessons learned in the previous chapter with those from this chapter to formulate
    the Spring Java EE application design pattern directive. This pattern template
    or directive will be used in the next four chapters to describe how Java EE design
    patterns can be best applied using the Spring Framework.


    ### Name


    This is the name used to identify a pattern.


    ### Problem


    This section describes one or more problems that you are trying to solve. I will
    use this section to highlight the complexities in devising a solution with existing
    Java EE technologies.


    ### Forces


    This section follows from the previous section and outlines the intent for the
    pattern and its applicability.


    ### Solution


    I will present the detailed solution to solve the problem under consideration.
    In this section, I will discuss different possible strategies with the Spring
    Framework. I will also identify various best practices and mention fundamental
    patterns and object design principles that contribute to the solution. UML class
    and sequence diagrams will be used extensively along with source code samples
    to present the solution clearly.


    ### Consequences'
