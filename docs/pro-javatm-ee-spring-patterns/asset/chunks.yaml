- fmt: '# View Handler


    The view handler finds a view, binds the model returned by the page controller,
    and prepares the response for the client. The view handler uses logical view names
    (explained in the next section), thus abstracting the actual view object from
    the front controller. Using the view handler, it is easy to support multiple view
    types (HTML, JSP, PDF, Microsoft Excel, and so on). So, the view handler component
    can be extended to help roll out views for mobile devices.


    These components are connected to the front controller via configuration. This
    enables the front controller to act as a coordinator only. This, along with decoupled
    action and view management, makes the front controller more robust, reusable,
    and highly extensible.


    ## Forces


    - Remove action and view management functionality from the front controller.

    - Deploy pluggable action and view handlers to provide support for different types
    of page controllers and views.

    - Improve the reusability, cohesion, and modularity of the application code.

    - The front controller should be generic and as lightweight as possible.

    - Promote test-driven development by making it possible to run unit tests outside
    the web container.


    ## Solution


    Use an application controller to decouple action and view handling from the front
    controller.


    ### Strategies with the Spring Framework


    The application controller is an important internal component of any Java EE web
    framework. Since it sits silently behind the gateway servlet and generally suffices
    to all the requirements of an application, developers are seldom bothered about
    this component.


    In the Struts framework, for instance, the `RequestProcessor` class does the job
    of an application controller. Internally, the Struts front controller `ActionServlet`
    delegates the view and action management to this class. It is possible to extend
    this class to override the default behavior. But Struts developers hardly ever
    do that.


    Spring MVC provides similar support for action-view management orchestrated by
    the `DispatcherServlet`. As with Struts, no effort is generally required from
    the developers except, perhaps, some optional configuration. You have already
    seen this in earlier examples. You have neither written any code nor done any
    configuration for view or action handling. Yet the request for the resource `createPolicy.do`
    was handled by the appropriate page controller. This is possible because Spring
    has sensible defaults for command and view handling. In the next few sections,
    I will go through the various application controller configuration options available
    with the Spring Framework. The Spring Framework is highly flexible in that it
    separates the application controller into two distinct parts to be discussed in
    the next few sections.


    ### Action Handling


    Spring action/command handling can be slightly overwhelming at first because lots
    of classes are involved. So, we will take it in simple steps. Figure 3-2 shows
    a simplified view of the action management workflow. I have deliberately left
    out the view management part for now.


    ![Image 24](index-75_1.png)


    ![Image 25](index-75_2.png)


    **Figure 3-2.** *Action-handling workflow*


    As shown in Figure 3-2, the front controller interacts with the action handler,
    which subsequently invokes the page controllers. The class diagram in Figure 3-3
    shows the various classes and interfaces that are part of the Spring MVC action
    handler component.


    **Figure 3-3.** *Action handler class diagram*


    The `HandlerMapping` interface is the key to the overall action handler component.
    On intercepting a request, the dispatcher servlet looks for the appropriate handler
    mapping object to map between the request and the request-processing object. In
    other words, a handler mapping provides an abstract way to map the request URL
    to the eventual handlers or page controllers.


    As the name suggests, `AbstractHandlerMapping` is an abstract handler mapping
    implementation. It implements the `getHandler` method of the `HandlerMapping`
    interface. This method returns a `HandlerExecutionChain`, which holds references
    to the following:


    - Single page controller implementations that implement either the `Controller`
    interface or the `ThrowawayController` interface

    - An optional set of interceptors implementing the `HandlerInterceptor` interface


    The `BeanNameUrlHandlerMapping` and `SimpleUrlHanderMapping` provide two concrete
    implementations of the `HandlerMapping` interface that are sufficient for most
    cases. The `BeanNameUrlHandlerMapping` is the default handler mapping used by
    the front controller. If your application needs only this handler mapping, then
    there is nothing to configure. In some cases, your application may require multiple
    handler mappings. As I will show in a later section, Spring MVC allows multiple
    handler mappings to work side by side. In this case, the front controller has
    to decide the order in which the handler mappings will be invoked. The handler
    mappings implement the `Ordered` interface, allowing the front controller to decide
    the right ordering in the handler mapping chain. The handler mapping with lowest
    order value has the highest priority.


    A handler mapping holds only the reference of a page controller. It does not invoke
    any method on it. A handler adapter is responsible for invoking methods on a page
    controller. All handler adapters implement the `HandlerAdapter` interface. As
    the name suggests, handler adapters follow the GOF adapter design pattern and
    have the best knowledge to invoke the appropriate page controller. This opens
    up another Spring extension point and allows easy integration of page controllers
    from other frameworks such as WebWork or Struts Action classes. The `handle` method
    should be implemented to invoke methods on the page controller. This is exactly
    what the concrete implementation class `SimpleControllerHandlerAdapter` does.
    It is capable of invoking page controllers that implement the `Controller` interface.
    In other words, it knows how to invoke the `handleRequest` method and handle the
    returned value.


    The `HandlerExecutionChain` also contains an optional set of interceptors. These
    provide a robust mechanism for declarative processing before and after a request
    is handled by the page controller. The sequence diagram in Figure 3-4 is an extension
    of Figure 3-1 and shows the complete message exchange within the action handler
    part of the Spring MVC application controller component.


    ![Image 26](index-77_1.png)


    **Figure 3-4.** *Action handler sequence diagram*


    This is a complex interaction diagram, showing the internals of the Spring application
    controller component. The different steps in this diagram are as follows:


    1. The request processing starts off with the `doService` method. It keeps a copy
    of the request attributes and delegates to the `doDispatch` method for further
    processing.

    2. The `doDispatch` method coordinates and controls the workflow of the application
    controller.

    3. The `getHandler` method is called on the dispatcher servlet to get hold of
    the appropriate handler mapping for the given request. There can be a list of
    handler mappings installed with the Spring MVC runtime. This method checks the
    list to select the appropriate handler mapping.'
