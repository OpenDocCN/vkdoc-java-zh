    **199**


    **Consequences**


    Benefits


    • The high-level API provided by Spring JDBC makes it easy to access legacy stored
    procedures.


    • PAO promotes object orientation and minimizes code redundancy.


    • PAO manages the boilerplate low-level code and resource management.


    Concerns


    • Using legacy stored procedures limits application portability.


    • It has difficult-to-manage system services such as transaction, security, and
    so on.


    • Invoking a stored procedure running on a remote database server comes with all
    the baggage associated with remote procedure calls. So, this can have a possible
    adverse effect on performance.


    **Service Activator**


    **Problem**


    Like most enterprise applications, eInsure also had to support reports. Reports
    provide valuable insights into the state of the business. In eInsure, for example,
    there were reports to find out how many policies have been sold per product over
    a period, how many premium collections over a period of time, the number of new
    leads in the month of January, and so on. The contents and number of reports varied
    with the needs of the customer.


    eInsure supported two types of reports: scheduled and user generated. The scheduled
    reports were triggered by schedulers like Unix CRON after certain intervals. An
    example of a scheduled report is the monthly premium collection report. The user-generated
    reports were triggered by the users of the eInsure application from their browser.
    A user would typically select a report, supply the necessary inputs, and start
    the report generation.


    10092ch05.qxd 7/24/08 5:15 PM Page 200


    **200**


    C H A P T E R 5 **■** E X P L O R I N G I N T E G R AT I O N T I E R D E S I G
    N PAT T E R N S


    This synchronous report generation strategy was found wanting in some midsize
    to large companies where eInsure was installed. As these companies used this application
    to add new products, policies, parties, and claims, the data volume increased
    at a rapid pace. This led to frustrating user experiences because the synchronous
    reports mostly timed out with the large data volume. The users were already frustrated
    because of the blocking nature of the synchronous reports. Most reports generated
    large data sets, and transferring this data from the database to the application
    server and subsequently to the client browser clogged the network.


    **Forces**


    • Applications need to support long-running use cases.


    • It is necessary to execute the business services asynchronously.


    • Long-running operations should not block users.


    **Solution**


    Use a *service activator* to receive and carry out an asynchronous service request.


    Strategies with the Spring Framework


    You can solve the blocking problem discussed earlier by allowing the actual report
    generation service request to be handled asynchronously. JMS message listeners
    can be applied to process this business request asynchronously. However, a more
    robust approach would be to use a message-driven bean (MDB). This is because MDBs
    combine the asynchronous behavior of the message listener with services provided
    by the EJB


    container.


    Spring provides support for building MDBs as well as sending messages to a JMS


    queue or topic. Just like stateless session beans, Spring also provides convenient
    base classes to develop MDBs, as shown in Figure 5-3\. The root of the class hierarchy
    is the AbstractEnterpriseBean class, which can be used to load a Spring application
    context.


    The subclass AbstractMessageDrivenBean is the convenient class for developing
    MDBs.'
