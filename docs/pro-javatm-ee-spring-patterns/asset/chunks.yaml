    the Spring application framework in the context of Java EE application architecture
    and design. I highlighted the problems associated with Java EE application development.
    The Spring Framework’s multitier components help address these common problems.
    Besides this, the Spring Framework is an enabler for best practices and effective
    object design. You probably realize by now that it has two facets—on one hand,
