    \n```java\npublic class SaveNewPolicyController extends SimpleFormController {\n\
    \    private UnderWritingBusinessDelegate uwrBusinessDelegate;\n\n    public SaveNewPolicyController()\
    \ {\n        setCommandClass(PolicyFormBean.class);\n    }\n\n    public void\
    \ setUwrBusinessDelegate(\n            UnderWritingBusinessDelegate uwrBusinessDelegate)\
    \ {\n        this.uwrBusinessDelegate = uwrBusinessDelegate;\n    }\n}\n```\n\n\
    Finally, I will wire up the beans in the Spring configuration file as shown in\
    \ Listing 3-26. This is a very clean configuration. A GET request for `/createPolicy.do`\
    \ is intercepted by the `SaveNewPolicyController`, which considers this as a form\
    \ display request. The property `formView` serves as a logical view name, which\
    \ is resolved to the physical view `/WEB-INF/jsp/createPolicy.jsp` to present\
    \ the form to the end user.\n\n**Listing 3-26.** `insurance-servlet.xml`\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
    >\n    <bean name=\"viewResolver\"\n        class=\"org.springframework.web.servlet.view.InternalResourceViewResolver\"\
    >\n        <property name=\"viewClass\"\n            value=\"org.springframework.web.servlet.view.JstlView\"\
    \ />\n        <property name=\"prefix\" value=\"/WEB-INF/jsp/\" />\n        <property\
    \ name=\"suffix\" value=\".jsp\" />\n    </bean>\n    <bean name=\"/createPolicy.do\"\
    \n        class=\"com.apress.insurance.web.controller.SaveNewPolicyController\"\
    \ >\n        <property name=\"uwrBusinessDelegate\"\n            ref=\"underwritingBusinessDelegate\"\
    \ />\n        <property name=\"formView\"\n            value=\"createPolicy\"\
    \ />\n    </bean>\n    <bean name=\"underwritingBusinessDelegate\"\n        class=\"\
    com.apress.insurance.view.delegate.UnderWritingBusinessDelegate\" />\n</beans>\n\
    ```\n\n## Form Submission\n\nThe underwriters using the eInsure application would\
    \ fill up this form and submit it to underwrite new policies. The controller determines\
    \ this request as a form submission, since the method attribute of the form was\
    \ set as POST. Now you must be wondering how this form submits to the URL `/createPolicy.do`\
    \ again because the action attribute in the form is not specified. This in fact\
    \ is a trick. If the action attribute is empty, the form will post back to itself,\
    \ that is, the page that presented the form. This will result in a new POST request\
    \ reaching the `SaveNewPolicyController`. Figure 3-11 shows the form submission\
    \ workflow.\n\n![Image 33](index-104_1.png)\n\n**Figure 3-11.** *Form submission\
    \ workflow in* `SimpleFormController`\n\nTo handle form submission, the controller\
    \ needs to override one of the many template methods. Since the goal is to just\
    \ invoke a business service in the controller, you can override the simplest method\
    \ called `doSubmitAction`. With this method, you do not need to explicitly return\
    \ any `ModelAndView` object. The form bean is automatically set in the model object\
    \ by the framework itself, with the identifier as the command name. If more data\
    \ has to be passed, then the `onSubmit` method needs to be overridden. This method\
    \ allows the creation of a `ModelAndView` object, which can be used to pass more\
    \ data than with the default approach.\n\nListing 3-27 shows the modified controller.\n\
    \n**Listing 3-27.** `SaveNewPolicyController.java`\n\n```java\npublic class SaveNewPolicyController\
    \ extends SimpleFormController {\n    private UnderWritingBusinessDelegate uwrBusinessDelegate;\n\
    \n    public SaveNewPolicyController() {\n        setCommandClass(PolicyFormBean.class);\n\
    \    }\n\n    public void setUwrBusinessDelegate(\n            UnderWritingBusinessDelegate\
    \ uwrBusinessDelegate) {\n        this.uwrBusinessDelegate = uwrBusinessDelegate;\n\
    \    }\n\n    /*\n    protected ModelAndView onSubmit(Object formbean) throws\
    \ Exception {\n        PolicyFormBean policyBean = (PolicyFormBean)formbean;\n\
    \        uwrBusinessDelegate.createPolicy(policyBean);\n        return new ModelAndView(this.getSuccessView(),\"\
    policydetails\",formbean);\n    }\n    */\n}\n```\n\nTo use the `SimpleFormController`,\
    \ you have to set a few configuration parameters. The first property is the `commandName`\
    \ property. This name is used as the key for the form bean object set in the model.\
    \ The next property you need to consider is `successView`. This specifies a logical\
    \ view name just like the property `formView`. This view will be used to render\
    \ a response in case of a successful form submission. Listing 3-28 shows the configuration\
    \ details.\n\nNote that the command class/form bean has also been configured in\
    \ `insurance-servlet.xml`. Hence, you don’t need to register the form bean in\
    \ the constructor of the page controller.\n\n**Listing 3-28.** `insurance-servlet.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"\
    http://www.springframework.org/schema/beans\n    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\"\
    >\n    <bean name=\"/createPolicy.do\"\n        class=\"com.apress.insurance.web.controller.SaveNewPolicyController\"\
    \ >\n        <property name=\"uwrBusinessDelegate\"\n            ref=\"underwritingBusinessDelegate\"\
    \ />\n        <property name=\"formView\"\n            value=\"createPolicy\"\
    \ />\n        <property name=\"commandName\"\n            value=\"policydetails\"\
    \ />\n        <property name=\"successView\"\n            value=\"policydetails\"\
    \ />\n        <property name=\"commandClass\"\n            value=\"com.apress.insuranceapp.web.formbean.PolicyFormBean\"\
    \ />\n    </bean>\n</beans>\n```\n\nFinally, Listing 3-29 shows the success view.\
    \ It uses JSTL tags to retrieve model data.\n\n**Listing 3-29.** `WEB-INF/jsp/policydetails.jsp`\n\
    \n```jsp\n<%@ taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\" %>\n\
    <%@ taglib prefix=\"fmt\" uri=\"http://java.sun.com/jsp/jstl/fmt\" %>\n<html>\n\
    <head>\n    <title>Underwriting</title>\n</head>\n<body>\n    <form>\n       \
    \ <table>\n            <tr>\n                <td>First Name:</td>\n          \
    \      <td><c:out value=\"${policydetails.firstName}\"/></td>\n            </tr>\n\
    \            <tr>\n                <td>Last Name:</td>\n                <td><c:out\
    \ value=\"${policydetails.lastName}\"/></td>\n            </tr>\n            <tr>\n\
    \                <td>Age :</td>\n                <td><c:out value=\"${policydetails.age}\"\
    /></td>\n            </tr>\n        </table>\n    </form>\n</body>\n</html>\n\
    ```\n\n## Form Validation\n\nIn the form shown in Listing 3-24, the fields have\
    \ certain restrictions. The first name and last name fields are mandatory, and\
    \ age must be an integer. It is possible to check these restrictions using client-side\
    \ JavaScript. However, most applications these days require cross-browser support,\
    \ and JavaScript is the most significant obstacle to this.\n\nThe alternative\
    \ option is server-side form validation. As shown in Figure 3-12, the `SimpleFormController`\
    \ supports server-side form validation.\n\nSpring MVC supports two types of validators:\n\
    \n- **Programmatic validators**: These implement the validations with customized\
    \ logic. These are generally carried out by classes that implement the `Validator`\
    \ interface. For the sake of simplicity, I will concentrate on this variety only."
