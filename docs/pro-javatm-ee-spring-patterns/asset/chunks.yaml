    致谢


    **我**想借此机会感谢一些人，他们的想法、灵感和勤奋为本书做出了重要贡献。首先，我要感谢 Steve Anglin 给我提供了撰写本书的机会。我们最初在
    2007 年 9 月提出了一个完全不同的想法。后来是 Steve 提出了将 Spring 框架和 Java EE 设计模式结合起来的想法。


    我非常感谢 Prosenjit Bhattacharyya 和 Tom Welsh 在技术审校上花费的时间。Prosenjit 是我大学时代的老朋友，他客观的反馈（尤其是对第
    7 章）帮助本书的每一章都形成了完整的形态。


    我从 Tom 那里学到了很多关于写作的知识。Tom 的指导对于以清晰简洁的方式正确呈现和阐述主题非常重要。


    如果不提及 Kylie Johnston，这部分内容将是不完整的。Kylie 是最有耐心、最合作的项目经理。我必须承认，没有她，这本书可能无法问世。在整个项目期间，我多次错过了章节提交的截止日期。但
