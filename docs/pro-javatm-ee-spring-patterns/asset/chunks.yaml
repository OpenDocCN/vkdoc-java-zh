    第 6 章 **■** 探索横切设计模式


    Spring Security 框架的不同组件如下：


    • *安全拦截器*充当拦截资源请求的网关。它将安全执行职责委托给核心组件。如果某个 Web 资源受到保护，则 Spring Security 拦截器会以 Servlet
    过滤器的形式提供。方法调用拦截器则作为切面实现。


    • *身份验证管理器*验证用户身份。它是一个具有明确定义的服务提供者接口（SPI）的可插拔组件。因此，几乎可以集成任何身份验证机制。Spring Security
    附带了几个具体的身份验证管理器实现，涵盖了大多数常见需求。


    • *访问决策管理器*是另一个负责授权的可插拔组件。它允许已通过身份验证的请求基于特定角色访问系统资源。


    Spring Security 基于核心 Spring 框架。因此，它拥有 Spring IOC 容器在安全子系统中可用的所有优势。


    **使用 Spring Security 进行身份验证与授权**

