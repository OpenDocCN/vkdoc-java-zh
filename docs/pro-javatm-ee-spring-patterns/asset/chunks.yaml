- fmt: '# Distributed Applications and Java EE


    Distributed applications typically use middleware servers to leverage system services
    such as transaction, security, and pooling. The middleware server API had to be
    used to access these services. Hence, application code would be muddled with a
    proprietary API. This lock-in to vendor API wastes a lot of development time and
    makes maintenance extremely difficult, besides limiting portability.


    In 1999, Sun Microsystems released the Java EE 2 platform to address the difficulties
    in the development of distributed multitier enterprise applications. The platform
    was based on Java Platform, Standard Edition 2, and as a result it had the benefit
    of “write once, deploy and run anywhere.” The platform received tremendous support
    from the open source community and major commercial vendors such as IBM, Oracle,
    BEA, and others because it was based on specifications. Anyone could develop the
    services as long as it conformed to the contract laid down in the specification.
    The specification and the platform have moved on from there; the platform is currently
    based on Java Platform, Standard Edition 5, and it is called Java Platform, Enterprise
    Edition 5. In this book, we will concentrate on this latest version, referred
    to officially as Java EE 5.


    ## Java EE Container Architecture


    The Java EE platform provides the essential system services through a container-based
    architecture. The container provides the runtime environment for the object-oriented
    application components written in Java. It provides low-level services such as
    security, transaction, life-cycle management, object lookup and caching, persistence,
    and network communication. This allows for the clear separation of roles. The
    system programmers can take care of developing the low-level services, and the
    application programmers can focus more on developing the business and presentation
    logic.


    ![Image 10](index-29_1.jpg)


    As shown in Figure 1-5, there are two server-side containers:


    - The *web container* hosts the presentation components such as Java Server Pages
    (JSP) and servlets. These components also interact with the EJB container using
    remoting protocols.

    - The *EJB container* manages the execution of Enterprise JavaBeans (EJB) components.


    **Figure 1-5.** *Java EE platform architecture*


    On the client side, the application client is a core Java application that connects
    to the EJB container over the network. The web browser, on the other hand, generally
    interacts with the web container using the HTTP protocol. The EJB and web containers
    together form the Java EE application server. The server in turn is hosted on
    the Java Virtual Machine (JVM).


    Different containers provide different sets of low-level services. The web container
    does not provide transactional support, but the EJB container does. These services
    can be accessed using standard Java EE APIs such as Java Transaction API (JTA),
    Java Message Service (JMS), Java Naming and Directory Interface (JNDI), Java Persistence
    API (JPA), and Java Transaction API (JTA). The greatest benefit, however, is that
    these services can be applied transparently on the application components by mere
    configuration. To interpose these services, the application components should
    be packaged in predefined archive files with specific XML-based deployment descriptors.
    This effectively helps cut down on development time and simplifies maintenance.


    ## Java EE Application Architecture


    The Java EE platform makes the development of distributed n-tier applications
    easier. The application components can be easily divided based on functions and
    hosted on different tiers. The components on different tiers generally collaborate
    using an established architectural principle called MVC.


    ### An MVC Detour


    Trygve Reenskaug first described MVC way back in 1979 in a paper called “Applications
    Programming in Smalltalk-80™: How to use Model-View-Controller.” It was primarily
    devised as a strategy for separating user interface logic from business logic.
    However, keeping the two isolated does not serve any useful purpose. It also suggests
    adding a layer of indirection to join and mediate between presentation and business
    logic layers.


    This new layer is called the *controller layer*. Thus, in short, MVC divides an
    application into three distinct but collaborating components:


    - The *model* manages the data of the application by applying business rules.

    - The *view* is responsible for displaying the application data and presenting
    the control that allows the users to further interact with the system.

    - The *controller* takes care of the mediation between the model and the view.


    ![Image 11](index-31_1.png)


    Figure 1-6 depicts the relationship between the three components. The events triggered
    by any user action are intercepted by the controller. Depending on the action,
    the controller invokes the model to apply suitable business rules that modify
    application data. The controller then selects a view component to present the
    modified application data to the end user. Thus, you see that MVC provides guidelines
    for a clean separation of responsibilities in an application. Because of this
    separation, multiple views and controllers can work with the same model.


    **Figure 1-6.** *Model-View-Controller*


    ### Java EE Architecture with MVC


    The MVC concept can be easily applied to form the basis for Java EE application
    architecture. Java EE servlet technology is ideally suited as a controller component.
    Any browser request can be transferred via HTTP to a servlet. A servlet controller
    can then invoke EJB model components, which encapsulate business rules and also
    retrieve and modify the application data. The retrieved and/or altered enterprise
    data can be displayed using JSP.


    As you’ll read later in this book, this is an oversimplified representation of
    real-life enterprise Java architecture, although it works for a small-scale application.
    But this has tremendous implications for application development. Risks can be
    reduced and productivity increased if you have specialists in the different technologies
    working together. Moreover, one layer can be transparently replaced and new features
    easily added without adversely affecting others (see Figure 1-7).


    ![Image 12](index-32_1.jpg)


    **Figure 1-7.** *Layered multitier Java EE application architecture based on MVC*


    ### Layers in a Java EE Application


    It is evident from Figure 1-7 that layered architecture is an extension of the
    MVC architecture. In the traditional MVC architecture, the data access or integration
    layer was assumed to be part of the business layer. However, in Java EE, it has
    been reclaimed as a separate layer. This is because enterprise Java applications
    integrate and communicate with a variety of external information systems for business
    data—relational database management systems (RDBMSs), mainframes, SAP ERP, or
    Oracle e-business suites, to name just a few. Therefore, positioning integration
    services as a separate layer helps the business layer concentrate on its core
    function of executing business rules.'
