    请注意，此 bean 不需要名称或 ID 属性，因为它将由 Spring AOP 模块内部使用。它会检查 bean 中与顾问匹配的方法名称，并创建适当的代理来拦截对该方法的调用。


    **结论**


    **优点**


    • 借助 Spring AOP 支持，审计追踪可以声明式地应用于 POJO 应用服务组件。


    • 它支持多种记录审计追踪的选项。


    • 基于 Spring AOP 的审计追踪对应用代码没有影响。


    **关注点**


    • 需要预先了解 AOP 知识，这对初级开发人员来说较为困难。


    • Spring AOP 大量使用代理和字节码生成，这会增加性能开销。


    **领域服务所有者事务**


    **问题**


    事务管理是任何企业应用的关键关注点。维护企业数据的一致性至关重要。事务管理是一个复杂的系统问题，因为它涉及与各种企业信息系统的交互。在 Java EE 服务器中，应用程序可以利用
    EJB 容器对分布式事务的强大支持。所有不同类型的 EJB——会话 Bean、实体 Bean、


    10092ch06.qxd 7/29/08 10:30 AM 第 257 页


    第 6 章 **■** 探索横切设计模式


    **257**


    以及消息驱动 Bean——都可以声明式地参与事务。这常常使应用设计者在制定事务管理策略时陷入两难境地。考虑以下情况：你的会话 Bean 访问多个实体 Bean，或者消息驱动
    Bean 在会话 Bean 上调用远程方法。即使有声明式 Java EE 事务支持，也难以做出关键决策，例如在哪里启动事务、如何传播事务以及在哪里结束事务。


    有时，Java EE 应用程序需要支持非基于 Web 的客户端，例如基于 Java Swing 的桌面软件。这些客户端通常采用客户端管理的事务。这通常通过
    JTA 以编程方式实现。然而，这削弱了 Swing 客户端仅作为视图层的核心目标，同时导致对服务器端业务逻辑的多次细粒度调用，从而引发网络流量激增。

