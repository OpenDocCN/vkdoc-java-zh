- fmt: 'Listing 3-3 中值得关注的部分是 URL 映射。它表明该 Servlet 已被配置为处理所有以`.do`结尾的 URL 请求。如果您是一位经验丰富的
    Java EE 开发者，并且使用过 Apache Struts 框架，您会立刻发现它与`ActionServlet`的相似之处。


    在初始化时，`DispatcherServlet`会在 Web 应用程序的`WEB-INF`文件夹中查找一个遵循命名规范`<servlet-name>-servlet.xml`的配置文件。这个
    XML 文件包含了所有 Bean 的配置信息，包括将由 Spring IOC 容器管理的页面控制器和视图管理器。前端控制器加载此文件以启动 Spring Web
    应用程序上下文，并获取对 Spring IOC 容器的访问权限。在我们的例子中，这个文件将被命名为`insurance-servlet.xml`。


    如清单 3-4 所示，其中仅包含页面控制器。


    **Listing 3-4.** `insurance-servlet.xml`


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <beans


    xsi:schemaLocation="http://www.springframework.org/schema/beans


    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd">


    <bean name="/createPolicy.do"


    class="com.apress.insuranceapp.web.CreatePolicyController"/>


    <bean name="/updatePolicy.do"


    class=" com.apress.insuranceapp.web.UpdatePolicyController"/>


    </beans>

    ```


    `DispatcherServlet`使用`BeanNameUrlHandlerMapping`类将传入的请求 URL 映射到将要处理该请求的相应页面控制器。然而，清单
    3-4 中并未配置处理器映射 Bean。这是因为 Spring 将其视为一个合理的默认值。稍后我们将看到，可以通过实现`HandlerMapping`接口，使用不同的逻辑将传入的请求映射到其处理器。


    我将在本章后面讨论 Spring 框架提供的其他`HandlerMapping`实现。


    安装了中央请求处理网关后，是时候重构清单 3-1 中描述的 JSP，将所有请求路由到前端控制器了。如清单 3-5 所示。


    **Listing 3-5.** `Policy.jsp`


    ```jsp

    <title>Underwriting</title>


    <script>


    function eventSubmit(url){


    document.uwr.action = url;


    document.uwr.submit();


    }


    </script>


    </head>


    <body onLoad="displayError(<%=request.getAttribute("ERROR_MESSAGE")%>)">


    <form action="" name="uwr">


    Name of Insured <input type="text" value="" />


    <br/>


    <input type="submit" value="Create" onClick="eventSubmit(''createPolicy.do'')"/>


    <input type="submit" value="Update" onClick="eventSubmit(''updatePolicy.do'')"/>


    </form>

    ```


    请注意，JSP 不再使用事件代码和屏幕代码。相反，它现在使用逻辑请求 URL。当对 URL `/createPolicy.do`的请求到达前端控制器时，它会使用处理器映射来确定是否有页面控制器已注册来处理此请求。如果已注册，则处理过程被委托给相应的页面控制器；否则，会引发错误。在这种情况下，处理由`CreatePolicyController`执行。最简单的控制器将实现`org.springframework.web.servlet.mvc.Controller`接口的`handleRequest`方法。`handleRequest`方法应包含
    JSP 控制器中`if-else`块的大部分代码。简而言之，该控制器将处理`if-else`块中的代码。在业务组件被调用且页面控制器返回后，


    ![Image 23](index-71_1.png)


    下一个视图将在视图管理器的帮助下被选中。图 3-1 中的简化时序图展示了前端控制器、页面控制器和视图解析器之间的交互。我将在后续章节中更详细地解释此图。


    **Figure 3-1.** *Sequence diagram: front controller request flow*


    从图 3-1 可以明显看出，`doDispatch`是`DispatcherServlet`中最重要的方法。它编排并调用页面控制器和视图。`InternalResourceView`类负责抽象基于
    JSP 的视图。


    **Consequences**


    Benefits


    - *开箱即用的前端控制器*：Spring MVC 提供了一个现成的前端控制器，只需通过配置即可在应用程序中使用。

    - *集中控制*：前端控制器提供了一个中心入口点，用于整合和控制进入应用程序的请求流。这使得管理应用程序更加简单。

    - *简化设计*：前端控制器现在遵循单一职责原则（SRP），因为它只负责拦截请求并委托给专门的类。

    - *促进可重用性*：引入前端控制器移除了模块控制器，极大地提高了可重用性。


    Concerns


    - *单点故障*：前端控制器也是任何应用程序的单点故障。


    **Application Controller**


    **Problem**


    在讨论前端控制器模式时介绍的 JSP 控制器，旨在执行与请求处理相关的以下任务：


    1.  拦截传入请求。

    2.  调用业务组件。

    3.  识别并重定向到下一个视图。


    前端控制器设计模式解决了第一个问题。与 JSP 控制器一样，完全可以在前端控制器中构建另外两个功能。但这将导致一个高度不灵活、臃肿、神奇的前端控制器，它承担了过多的职责。随着应用程序的增长，维护和使用这种复杂且特定的前端控制器将变得异常困难。这正是
    eInsure 应用程序中基于 JSP 的控制器所遇到的问题。


    一个新客户希望将他们基于 WebWork 2.0 框架构建的现有再保险产品与 eInsure 集成。集成很快就遇到了重重困难，因为控制器从未被设计来满足这类需求。eInsure
    的另一个现有客户要求一个新功能，称为*保单报价*。此功能将使这家保险公司的潜在客户能够了解他们需要为新保单支付的大致保费金额。为此，他们将使用移动设备连接到系统，并提供生成报价（或暂定保费金额）所需的最少信息。


    单一的 eInsure 控制器被编码为仅使用 JSP 作为视图技术。因此，它缺乏灵活性，支持适用于移动设备的新视图非常困难。


    前两段讨论的新功能可以通过“分而治之”的策略更好地管理。这涉及在前端控制器中使用专门处理特定任务的可插拔组件。两个这样重要的组件如下：


    - *动作处理器*：动作处理器定位并执行适当的页面控制器。页面控制器将业务逻辑调用从前端控制器解耦。因此，通过实现特定于 WebWork 的动作处理器组件，可以将
    WebWork 2.0 的页面控制器与前端控制器一起使用。'
