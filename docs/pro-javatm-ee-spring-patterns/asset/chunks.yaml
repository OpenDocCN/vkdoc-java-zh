    分布式应用程序通常使用中间件服务器来利用事务、安全性和池化等系统服务。必须使用中间件服务器 API 才能访问这些服务。因此，应用程序代码会与专有 API 混杂在一起。这种对供应商
    API 的锁定浪费了大量开发时间，使维护变得极其困难，并且限制了可移植性。


    1999 年，Sun Microsystems 发布了 Java EE 2 平台，以解决分布式多层企业应用程序开发中的难题。该平台基于 Java 平台标准版
    2，因此具有“一次编写，随处部署和运行”的优势。该平台得到了开源社区以及 IBM、Oracle、BEA 等主要商业供应商的巨大支持，因为它基于规范。只要符合规范中规定的约定，任何人都可以开发这些服务。规范和平台自此不断发展；该平台目前基于
    Java 平台标准版 5，并被称为 Java 平台企业版 5。在本书中，我们将重点介绍这个最新版本，官方称为 Java EE 5。


    Java EE 容器架构


    Java EE 平台通过基于容器的架构提供基本的系统服务。容器为用 Java 编写的面向对象的应用程序组件提供运行时环境。它提供底层服务，例如安全性、事务、生命周期管理、对象查找和缓存、持久化以及网络通信。这允许清晰地分离角色。系统程序员可以负责开发底层服务，而应用程序程序员可以更专注于开发业务逻辑和表示逻辑。


