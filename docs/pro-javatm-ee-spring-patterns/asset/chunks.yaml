    **架构**


    传统项目倾向于以计划周全的方式构建完整的应用程序架构。


    然而，经验表明，这种“大爆炸”式的方法往往会导致失败。


    应用程序架构取决于多种因素，包括功能性需求和非功能性需求。我们不可能总是提前考虑并整合所有影响架构的问题。随着客户业务需求的变化以及团队深入开发阶段，架构中的裂痕便会显现出来。


    相反，极限编程（XP）信奉演进式架构。在最初的几次迭代中，与架构相关的任务会消耗大量时间。项目从一个基础架构开始，并通过迭代不断演进。图 7-3 展示了示例订单管理系统（OMS）的架构。


    ![Image 59](img/index-295_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM 第 273 页


    第 7 章 **■** 案例研究：构建订单管理系统


    **273**


    **图 7-3.** *示例 OMS 的架构*


    如图 7-3 所示，OMS 被划分为三个不同的层级。每个层级又进一步划分为具有不同职责的层次。


    **表示层**


    表示层主要负责处理传入的请求，并准备基于 HTML 的视图以在浏览器上呈现。它还负责调用业务逻辑。业务层返回的数据随后用于生成对客户端的响应。


    10092ch07.qxd 7/29/08 10:39 AM 第 274 页


    **274**


    第 7 章 **■** 案例研究：构建订单管理系统


    安全


    该组件负责允许对表示层资源进行安全访问。


    JSP


    Java 服务器页面（JSP）提供了 OMS 应用程序的视图组件。


    调度 Servlet


    调度 Servlet 拦截所有穿过安全层的传入请求。


    它为每个用户操作调用相应的页面控制器。它还负责选取合适的视图组件，并将其与模型合并以准备最终的响应。


    页面控制器


    对于用户触发的每个操作，调度 Servlet 都会调用一个页面控制器。页面控制器进而与业务层组件进行交互。它接收业务层返回的模型以及下一个视图的逻辑引用，并将它们传递给调度
    Servlet。


    代理工厂 Bean 和业务接口


    代理工厂 Bean 和业务接口用于生成代理对象，以访问业务层组件。代理对象隐藏了访问远程业务对象的网络细节。页面控制器使用业务接口来调用业务对象代理上的方法。业务接口扮演的角色类似于
    EJB 的 Home 接口。


    **业务层**


    业务层负责执行业务规则。分布业务逻辑组件是一个可以提前做出的重要决策。这将帮助你选择合适的远程处理技术。对于示例 OMS，客户希望仅通过某种形式的 HTTP
    远程处理将业务逻辑暴露给外部零售门店。此外，团队并不熟悉 EJB。因此，我决定使用基于 HTTP 的快速、轻量级的 Hessian 远程处理。它可用于将


    10092ch07.qxd 7/29/08 10:39 AM 第 275 页


    第 7 章 **■** 案例研究：构建订单管理系统


    **275**


    POJO 导出为远程业务服务。之后，如果需要，这些 POJO 业务组件也可以作为 Web 服务暴露。


    如果业务服务暴露给外部客户端（例如零售门店使用的基于 Java Swing 的桌面应用程序），它们也需要安全服务。这个考量可以在后续的架构中考虑，当客户对此做出最终决定时。由于远程处理是通过使用
    Servlet 的 HTTP 进行的，因此表示层中使用的相同安全组件可以在业务层中重用。


    远程调度 Servlet


    该调度 Servlet 拦截所有通过 Hessian 协议进行的远程业务逻辑调用。它将实际调用分派给 POJO 业务组件。


    业务服务实现


    该层实现业务接口，并提供业务逻辑的实际实现。OMS 应用程序的业务服务层或应用服务层将作为 POJO 进行开发。


    数据访问对象


    数据访问对象（DAO）封装了与集成层的交互。在这种情况下，DAO 连接并操作存储在 Oracle RDBMS 中的数据。为此，它们使用 JDBC API。


    **集成层**


    集成层托管在 Oracle 10 *g* 数据库上。DAO 负责与此层交互。它们传递 SQL 命令来检索和操作存储在 RDBMS 中的数据。请注意，OMS
    不会使用任何存储过程，因为应用程序不需要任何批量或长时间运行的数据库操作。


    仔细观察图 7-3 会发现架构中缺少一些部分。例如，你可能注意到我没有包含任何关于事务或日志记录的描述。由于这只是项目的第一次迭代，我仍在斟酌这两个系统方面。对于事务，客户热衷于嵌入
    ObjectWeb JOTM 事务管理器。但是，我确信在这种情况下，Spring 框架的数据源事务管理器实现就足够了。因此，我决定将第二个选项作为开发任务的一部分来实现。这将使我能够突出其优势，例如健壮性和


    ![Image 60](img/index-298_1.png)


    10092ch07.qxd 7/29/08 10:39 AM 第 276 页


    **276**


    第 7 章 **■** 案例研究：构建订单管理系统


    易用性，以说服最终客户。所选的方法可以在后续迭代中应用，以重构演进式架构。请注意，在本书中，我将只讨论第一次迭代。感兴趣的读者可以将其作为架构重构的练习。你也可以访问
    [`www.opengarage.org 查看此练习的`](http://www.opengarage.org)结果。


    **设计**


    在架构的第一次迭代中，我成功地将应用程序划分为多个层级。每个层级被分解为具有不同功能的更小的层次。现在我将着手进行 OMS 应用程序的设计。让项目开发团队了解应用程序的设计非常重要。这有助于加快开发速度，因为现在它基于最佳实践和既定的指南与模式。因此，在进入实际的设计方面之前，我将先介绍一种非常方便但功能强大的发布设计说明的方法。


    我通常生成基于 HTML 的设计指令作为敏捷设计工件。


    图 7-4 展示了一个以 Javadoc 风格编写的设计指令。


    **图 7-4.** *设计指令：订单管理系统*


    设计指令的编写方式与 Javadoc 类似。Javadoc 中的每个元素描述了一个设计关注点。由于设计旨在为手头的问题提供高级解决方案，因此每个设计关注点都使用第
    2 章讨论的模式模板进行记录。在接下来的几节中，我将介绍其中一些设计关注点，并使用本书前面讨论的 Spring Java EE 模式来解决它们。


