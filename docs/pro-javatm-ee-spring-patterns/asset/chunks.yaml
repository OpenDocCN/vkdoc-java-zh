    •   *视图处理器*：视图处理器负责查找视图，绑定页面控制器返回的模型，并为客户端准备响应。视图处理器使用逻辑视图名称（将在下一节解释），从而将实际视图对象与前端控制器解耦。通过使用视图处理器，可以轻松支持多种视图类型（如
    HTML、JSP、PDF、Microsoft Excel 等）。因此，视图处理器组件可以被扩展，以帮助为移动设备部署视图。


    这些组件通过配置连接到前端控制器。这使得前端控制器仅充当协调者的角色。这一点，加上解耦的操作和视图管理，使得前端控制器更加健壮、可重用且高度可扩展。


    **驱动因素**


    •   从前端控制器中移除操作和视图管理功能。


    •   部署可插拔的操作和视图处理器，以支持不同类型的页面控制器和视图。


    •   提高应用程序代码的可重用性、内聚性和模块化程度。


    •   前端控制器应该是通用的，并且尽可能轻量。


