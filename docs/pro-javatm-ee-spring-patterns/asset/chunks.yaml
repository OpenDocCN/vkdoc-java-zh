    **图 7-21.** *新建服务器运行时：Apache Tomcat 5.5*


    在 Tomcat 安装目录选择屏幕上，你需要浏览并选择 Tomcat 安装主目录。或者，你也可以在此屏幕选择下载并安装 Tomcat。由于我已经安装了 Tomcat
    5.5，我将选择 c:\tomcat5.5，如图 7-22 所示。单击“完成”以完成 Tomcat 5.5 和本地服务器的安装。


    ![Image 78](img/index-326_1.jpg)


    10092ch07.qxd 7/29/08 10:39 AM 第 304 页


