  trans: '

    如前所述，从 JNDI 获取对象可能会影响性能。在高度事务性的应用中，JNDI 对象会被频繁使用。因此，客户端必须缓存并使用这些对象。这正是 `JndiObjectFactoryBean`
    的默认行为。它在 Spring Web 应用上下文初始化时查找 JNDI 树，并加载 JNDI 绑定的对象。因此，在 Spring Web 应用开始初始化之前，必须确保
    EJB 已加载并在 JNDI 中注册。


    对于不常使用 JNDI 对象的应用来说，服务定位器的对象缓存功能并不重要。如果你通过应用服务器的热部署支持来更新应用，这也会引发问题。热部署允许在不关闭服务器的情况下重新加载整个
    Java EE 应用。


    这也会用新对象刷新 JNDI。因此，如果使用了服务定位器缓存，其中将包含不再存在的对象引用。随后对这些对象的任何访问都将导致运行时异常。


    在 Spring IOC 容器中，可以延迟查找和加载 JNDI 对象。如果需要在启动时关闭 JNDI 对象检索及后续缓存，你必须指定代理接口。代理接口将生成一个代理对象来代表真实的
    JNDI 对象。因此，代理接口必须与 JNDI 对象接口相同。如清单 4-8 所示，我将本地 Home 接口指定为代理接口。请注意，实际的 JNDI 对象将在首次使用时才可用。


    **清单 4-8.** insurance-servlet.xml


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <beans


    xsi:schemaLocation="http://www.springframework.org/schema/beans http://www.springframework.org/schema/beans/spring-beans-2.5.xsd">


    <!- - 其他 Bean - ->


    <bean name="underwritingBusinessDelegate"


    class="com.apress.insurance.view.delegate.UnderWritingBusinessDelegate">


    <property name="uwrLocalHome" ref="uwrSlsbLocalHome" />


    </bean>


    <bean id="uwrSlsbLocalHome"


    class="org.springframework.jndi.JndiObjectFactoryBean">


    <property name="jndiName" value="UnderwritingBeanLocal" />


    <property name="cache" value="false" />


    <property name="lookupOnStartup" value="false" />


    <property name="proxyInterface"


    value="com.apress.einsure.business.ejbfacade.UnderwritingLocalHome" />


    </bean>


    </beans>

    ```


    eInsure 应用中有大量执行业务工作流的会话 Bean。但这导致了大量冗余的元数据信息，使 Spring 配置文件变得臃肿。你可以通过继承抽象模板定义来最小化配置信息的重复，如清单
    4-9 所示。


    **清单 4-9.** insurance-servlet.xml


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <beans


    xsi:schemaLocation="http://www.springframework.org/schema/beans http://www.springframework.org/schema/beans/spring-beans-2.5.xsd">


