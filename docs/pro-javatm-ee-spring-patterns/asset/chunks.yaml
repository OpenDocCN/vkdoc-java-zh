    设计模式描述了针对常见设计问题的可重用解决方案。它们是由经验丰富的开发者和设计师积累并记录下来的经过验证的指南和最佳实践。一个模式具有三个主要特征：

    '
- fmt: '- 上下文是问题存在的周围条件。

    - 问题是领域中困难且不确定的主题领域，它受其被考虑的上下文限制。

    - 解决方案是针对所考虑问题的补救措施。


    然而，并非每个问题的解决方案都能成为模式。问题必须频繁出现，才能拥有可复用的解决方案，并被视为模式。此外，模式必须建立一种通用词汇表，以便向开发者和设计者传达设计方案。例如，如果有人提到`GOF
    Singleton`模式，那么所有相关方都应理解，你需要设计一个在应用程序中仅有一个实例的对象。为了实现这种设计模式，其描述通常辅以结构图和交互图以及代码片段。最后但同样重要的是，每个模式描述通常以收益和关注点分析作为结尾。当我在第2章讨论模式模板时，你将详细了解模式的构成要素。


    ## Java EE 设计模式目录


    如前所述，Java EE 作为主流的企业级开发平台已有近十年历史。在此期间，使用该技术构建了成千上万成功的应用程序和产品。但也有一些尝试失败了。失败的原因有多种，其中最主要的是设计和架构不充分。这是一个关键领域，因为设计和架构是从需求到构建阶段的桥梁。然而，Java
    EE 设计者和架构师通过从失败和成功中吸取教训，制定了一份有用的设计模式列表。这个 Java EE 模式目录为 Java EE 应用程序每一层中的对象交互提供了经过时间考验的解决方案指南和最佳实践。


    与平台本身一样，Java EE 模式目录也随着时间的推移而演变。如前所述，该目录最初是作为 Sun 公司 Java BluePrints 项目的一部分形成的，后来在《Core
    J2EE Design Pattern》（Prentice Hall, 2003）一书中得到了详细阐述。表 1-1 列出了这些模式，并附有简要描述及其关联层。我将在后续章节中更详细地讨论它们。


    **表 1-1.** *Java EE 模式目录*


    | 层 | 模式名称 | 描述 |

    | :--- | :--- | :--- |

    | 表示层 | `View Helper` | 将表示逻辑与业务逻辑分离 |

    | | `Composite View` | 从多个较小的子视图构建基于布局的视图 |

    | | `Front Controller` | 为表示层资源提供单一访问点 |

    | | `Application Controller` | 作为前端控制器助手，负责协调页面控制器和视图组件 |

    | | `Service to Worker` | 在控制权最终传递给下一个视图之前执行业务逻辑 |

    | | `Dispatcher View` | 执行最少或无需业务逻辑来准备对下一个视图的响应 |

    | | `Page Controller` | 管理页面上的每个用户操作并执行业务逻辑 |

    | | `Intercepting Filters` | 预处理和后处理用户请求 |

    | | `Context Object` | 解耦应用程序控制器，使其不依赖于任何特定协议 |

    | 业务层 | `Business Delegate` | 作为桥梁，解耦页面控制器和可能为复杂远程分布式对象的业务逻辑 |

    | | `Service Locator` | 提供业务对象的句柄 |

    | | `Session Facade` | 为远程客户端公开进入业务层的粗粒度接口 |

    | | `Application Service` | 以简单 Java 对象的形式提供业务逻辑实现 |

    | | `Business Interface` | 整合业务方法并对 EJB 方法应用编译时检查 |

    | 集成层 | `Data Access Object` | 将数据访问逻辑与业务逻辑分离 |

    | | `Procedure Access Object` | 封装对数据库存储过程和函数的访问 |

    | | `Service Activator` (又名 `Message Facade`) | 异步处理请求 |

    | | `Web Service Broker` | 封装访问以 Web 服务标准暴露的外部应用程序的逻辑 |


    表 1-1 根据 Java EE 的当前状态略有改动。例如，`Data Transfer Object`模式在目录中已不再适用，因此未列出。该模式曾用于跨层传输数据，尤其在使用远程实体
    Bean 持久化组件时非常有用。但随着新的 Java 持久化 API（Java EE 5 平台的一部分）和普通 Java 对象（`POJO`）编程模型的普遍趋势，该模式已不再相关。


    该表远非完整。某些模式可以跨层应用。例如，安全设计模式可以应用于表示层，以限制对 Web 资源（如 JSP）的访问。类似地，安全模式可用于控制对业务层 EJB
    组件的方法调用。例如，事务模式可以应用于业务层和集成层。这些模式被归类为*横切*模式。我将在第 6 章详细探讨横切模式。


    ## 使用 UML 进行 Java EE 架构与设计


    大多数现代应用程序都是迭代开发的。随着越来越多的需求变得可用，系统逐渐成长。此类系统的核心是通过迭代演进的高层设计和架构。为了开发团队和维护团队的利益，以文本和可视化形式记录设计和架构也是至关重要的。可视化表示非常有用，因为它帮助开发者理解运行时交互和编译时依赖关系。


    `UML`是一种用于对复杂企业系统中的架构和详细设计进行建模和可视化的图形语言。它基于对象管理组织（`OMG`）开发的规范。我将使用`UML 2.0`符号（这是最新版本，可在`http://www.uml.org/`获取）。然而，`UML`并不局限于架构和设计，它可以用于软件开发的各个阶段。`UML`提供了一套丰富的符号来描述类和对象以及各种关系和交互。


    现代`UML`建模工具，如`IBM Rational XDE`、`Visual Paradigm`、`Sparx Systems Enterprise Architect`等，允许在系统设计期间应用设计模式和最佳实践。此外，使用这些工具，设计模型可用于生成应用程序源代码的很大一部分。


    `UML`有几种类型的图。但为了分析 Java EE 设计模式，我将主要关注类图和序列图，以及一种称为*构造型*的简单扩展机制。如果你不熟悉`UML`或渴望了解更多，最好的`UML`参考书是
    Martin Fowler 所著的《UML Distilled Third Edition》（Addison Wesley, 2005）。


