- fmt: "# Chapter 5: Exploring Integration Tier Design Patterns\n\nAs shown in Listing\
    \ 5-9, I have used an overloaded version of the `update` method to supply a prepared\
    \ statement setter. The `PreparedStatementSetter` is a callback interface used\
    \ by Spring JDBC to set the bind variables in the SQL being submitted to the database\
    \ for processing. Note that the `SQLException` thrown by the `setValues` method\
    \ will be handled and converted to a runtime exception called `DataAccessException`\
    \ by the framework.\n\nListing 5-10 shows the `PreparedStatementSetter` implementation\
    \ class.\n\n**Listing 5-10.** `SavePolicyPreparedStatementSetter.java`\n\n```\n\
    public final class SavePolicyPreparedStatementSetter\nimplements PreparedStatementSetter{\n\
    \n    private String productCd;\n    private String name;\n    private int age;\n\
    \n    public SavePolicyPreparedStatementSetter(String productCd, String name,\
