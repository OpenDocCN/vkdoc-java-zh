- fmt: '# Architecture


    Traditional projects tend to build a complete application architecture in a planned
    way.


    However, experience has shown that this big-bang approach often results in failures.


    Application architecture depends on a variety of factors including the functional
    and nonfunctional requirements. It is not always possible to think and incorporate
    all the issues that affect architecture in advance. As the customers business
    requirements change and the team gets deep into the development phase, the cracks
    in the architecture are revealed.


    XP, on the contrary, believes in evolutionary architecture. Architecture-related
    tasks consume a significant portion of the time in the first few iterations. The
    project starts with a base architecture that evolves through the iterations. Figure
    7-3 shows the architecture for the example OMS.


    ![Image 59](index-295_1.jpg)


    **Figure 7-3.** *Architecture of the example OMS*


    As shown in Figure 7-3, the OMS is divided into three distinct tiers. Each tier
    is divided into layers with distinct roles.


    ## Presentation Tier


    The presentation tier is primarily responsible for processing the incoming request
    and preparing the HTML-based view to be rendered on the browser. It is also responsible
    for invoking the business logic. The data returned by the business tier is then
    used to produce the response for the client.


    ### Security


    This component is responsible for allowing secured access to the presentation
    tier resources.


    ### JSP


    Java Server Pages (JSP) provides the view components of the OMS application.


    ### Dispatcher Servlet


    The dispatcher servlet intercepts all the incoming requests that cross the security
    layer. It invokes the appropriate page controller for each user action. It is
    also responsible for picking up the appropriate view component and merging it
    with the model to prepare the final response.


    ### Page Controller


    A page controller is invoked by the dispatcher servlet for each action triggered
    by the user. The page controller in turn interacts with the business tier components.
    It takes the model returned by the business tier and a logical reference to the
    next view and passes them to the dispatcher servlet.


    ### Proxy Factory Bean and Business Interfaces


    The proxy factory bean and the business interfaces are used to generate proxy
    objects to access the business tier components. The proxy objects hide the networking
    details for accessing remote business objects. The business interfaces are used
    by page controllers to invoke methods on the business object proxy. The business
    interfaces play a role similar to EJB home interfaces.


    ## Business Tier


    The business tier is responsible for executing the business rules. Distributing
    the business logic components is one important decision that can be made up front.
    This will help you choose the appropriate remoting technology. For the example
    OMS, the customer wants to expose the business logic only to external retail outlets
    over some form of HTTP remoting. Also, the team is not conversant with EJB. Hence,
    I have decided to use the fast, lightweight Hessian remoting, which is based on
    HTTP. It can be used to export POJOs as remote business services. Later, if required,
    these POJO business components can also be exposed as web services.


    The business services also need security services if they are exposed to external
    clients such as the Java Swing-based desktop application used by the retail outlets.
    This consideration can be factored into the architecture later, when the customer
    makes the final decision on this. Since the remoting is being done over HTTP using
    servlets, the same security component used in the presentation tier can be reused
    in the business tier.


    ### Remote Dispatcher Servlet


    This dispatcher servlet intercepts all the remote business logic invocations over
    the Hessian protocol. It dispatches the actual invocation on POJO business components.


    ### Business Service Implementations


    This layer implements the business interfaces and provides the actual implementation
    of the business logic. The business service or the application service layer for
    the OMS application will be developed as POJOs.


    ### Data Access Objects


    Data access objects (DAOs) encapsulate the interaction with the integration tier.
    In this case, the DAOs connect and manipulate data stored in the Oracle RDBMS.
    For this they use the JDBC API.


    ## Integration Tier


    The integration tier is hosted on an Oracle 10*g* database. The DAOs are responsible
    for interfacing with this tier. They pass SQL commands to retrieve and manipulate
    the data stored in the RDBMS. Note that OMS will not use any stored procedure
    because the application does not require any bulk or long-running database operation.


    A careful observation of Figure 7-3 will reveal a few missing pieces in the architecture.
    For example, you may have noticed that I did not include any description about
    transaction or logging. Since this is only the first iteration of the project,
    I was still deliberating about these two system aspects. In the case of transactions,
    the customer was keen to embed the ObjectWeb JOTM transaction manager. However,
    I was confident that the Spring Framework’s data source transaction manager implementation
    would be sufficient in this case. Hence, I decided to implement the second option
    as part of the development task. This would enable me to highlight its benefits
    such as robustness and ease of use to convince the end client. The selected approach
    can be applied in a subsequent iteration to refactor the evolutionary architecture.
    Note that in this book I will discuss only the first iteration. Interested readers
    can take this up as an exercise for architecture refactoring. You can also visit
    [http://www.opengarage.org](http://www.opengarage.org) to see the outcome of this
    exercise.


    # Design


    In the first pass of architecture, I managed to divide the application into tiers.
    Each tier was decomposed into smaller layers with distinct functions. Now I will
    get down to the design of the OMS application. It is important to educate the
    project development team on the design of the application. This helps speed up
    development because it is now based on best practices and established guidelines
    and patterns. Hence, before getting into the actual design aspects, I will touch
    upon a very convenient yet powerful way to publish design instructions.


    I generally produce an HTML-based design directive as an agile design artifact.
    Figure 7-4 shows a design directive composed in Javadoc style.


    **Figure 7-4.** *Design directive order management system*


    The design directive is composed just like a Javadoc. Each element in the Javadoc
    describes a design concern. Since design aims to provide a high-level solution
    to the problem at hand, each design concern is documented using the pattern template
    discussed in Chapter 2. In the next few sections, I will cover some of these design
    concerns and address them using the Spring Java EE patterns discussed earlier
    in this book.'
