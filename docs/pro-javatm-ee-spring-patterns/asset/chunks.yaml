- fmt: 'Declarative transaction management support is immensely useful for applications
    because it has the least impact on source code. It is nonintrusive and allows
    transaction to be applied to a component transparently. The Spring Framework supports
    declarative transaction management through its AOP module. In the next few sections,
    I will show how Spring declarative transactions can be applied to the application
    service classes discussed in Chapter 4.


    The first step to using Spring declarative transaction is to create an advice.
    In the case of transaction management, the transaction manager applies an advice,
    as shown in Listing 6-30.


    **Listing 6-30.** `transaction-config.xml`


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <beans


    xsi:schemaLocation="


    http://www.springframework.org/schema/beans


    http://www.springframework.org/schema/beans/spring-beans-2.5.xsd


    http://www.springframework.org/schema/tx


    http://www.springframework.org/schema/tx/spring-tx-2.5.xsd


    http://www.springframework.org/schema/aop


    http://www.springframework.org/schema/aop/spring-aop-2.5.xsd">


    <!-- this is the service object on which the transaction has to be applied -->


    <bean name="uwrAppService"


    class="com.apress.einsure.business.impl.UnderwritingApplicationServiceImpl">


    </bean>


    <!-- the transactional advice decides what needs to be done -->


    <tx:advice id="txAdvice" transaction-manager="txManager">


    <!- - More - - >


    </tx>


    <!-- DataSource -->


    <bean id="dataSource" class="org.apache.commons.dbcp.BasicDataSource" destroy-method="close">


    <property name="driverClassName" value="oracle.jdbc.driver.OracleDriver"/>


    <property name="url" value="jdbc:oracle:thin:@eInsureDev:1525:eInsure"/>


    <property name="username" value="scott"/>


    <property name="password" value="tiger"/>


    </bean>


    <!--


    Platform Transaction Manager, in this straight jdbd -->


    <bean id="txManager" class="org.springframework.jdbc.datasource.DataSourceTransactionManager">


    <property name="dataSource" ref="dataSource"/>


    </bean>


    <!-- other beans -->


    </beans>

    ```


    Note that I have introduced the namespace and schema for simplifying AOP and transaction
    configuration. In the previous example, I have assumed the application uses straight
    JDBC for persistence and hence configured the `DataSourceTransactionManager`.
    This will be used to apply transactional advice on the POJO application service.
    If you want to use another platform transaction manager, it’s just a matter of
    configuration.


    As you saw earlier with AOP, an advice needs to be combined with a pointcut to
    form an advisor, as shown in Listing 6-31.


    **Listing 6-31.** `transaction-config.xml`


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <beans


    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"


    xsi:schemaLocation="


