  raw: 'JAX-RPC is one of the most popular and simple mechanisms for developing web
    services in Java. It can be used to create SOAP-based services called *endpoints*.
    The Spring convenience base class ServletEndpointSupport makes it simple to develop
    endpoints. This class is useful since it provides access to the Spring application
    context, as well as acts as the first point of contact in a web service. In this
    section, I will try to expose the policy quotation service utilizing the Spring
    Framework and the Apache Axis web services framework. Apache Axis provides a full
    SOAP-based JAX RPC implementation.


    The first step in the development of a JAX RPC-based web service with Spring is
    to define the service interface as in Listing 5-29\. In this case, I will use
    the same PolicyQuoteApplicationService implemented by the application service.


    **Listing 5-29.** PolicyQuoteApplicationService.java


    public interface PolicyQuoteApplicationService {


    public String BEAN_KEY = "policyQuoteApplicationService"; public double calculatePolicyQuote(String
    productCd,int age,


    double sumAssured,int term);


    }


    The next step is to implement the endpoint class as in Listing 5-30. This endpoint
    will implement the service interface, but the implementation methods delegate
    to the actual application service.


