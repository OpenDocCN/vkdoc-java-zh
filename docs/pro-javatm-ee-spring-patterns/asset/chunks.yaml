    >\n</bean>\n\n<!-- the transactional advice decides what needs to be done -->\n\
    <tx:advice id=\"txAdvice\" transaction-manager=\"txManager\">\n    <!-- More -->\n\
    </tx:advice>\n\n<!-- DataSource -->\n<bean id=\"dataSource\" class=\"org.apache.commons.dbcp.BasicDataSource\"\
    \n      destroy-method=\"close\">\n    <property name=\"driverClassName\" value=\"\
    oracle.jdbc.driver.OracleDriver\"/>\n    <property name=\"url\" value=\"jdbc:oracle:thin:@eInsureDev:1525:eInsure\"\
    />\n    <property name=\"username\" value=\"scott\"/>\n    <property name=\"password\"\
    \ value=\"tiger\"/>\n</bean>\n\n<!-- Platform Transaction Manager, in this case\
    \ straight jdbc -->\n<bean id=\"txManager\"\n      class=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\"\
    >\n    <property name=\"dataSource\" ref=\"dataSource\"/>\n</bean>\n\n<aop:config>\n\
    \    <aop:pointcut id=\"uwrServiceMethods\"\n                  expression=\"execution(*\
    \ com.apress.einsure.business.*.Underwriting*.*(..))\"/>\n    <aop:advisor advice-ref=\"\
    txAdvice\" pointcut-ref=\"uwrServiceMethods\"/>\n</aop:config>\n\n<!-- other beans\
    \ -->\n</beans>\n\nFinally, I will set up the transaction attributes applicable\
    \ to the methods of the application service, as shown in Listing 6-32.\n\n**Listing\
    \ 6-32.** `transaction-config.xml`\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<beans\n    xsi:schemaLocation=\"\n        http://www.springframework.org/schema/beans\n\
    \        http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\n  \
    \      http://www.springframework.org/schema/tx\n        http://www.springframework.org/schema/tx/spring-tx-2.5.xsd\n\
    \        http://www.springframework.org/schema/aop\n        http://www.springframework.org/schema/aop/spring-aop-2.5.xsd\"\
    >\n\n    <!-- this is the service object on which the transaction has to be applied\
    \ -->\n    <bean name=\"uwrAppService\"\n          class=\"com.apress.einsure.business.impl.UnderwritingApplicationServiceImpl\"\
    >\n    </bean>\n\n    <!-- the transactional advice decides what needs to be done\
    \ -->\n    <tx:advice id=\"txAdvice\" transaction-manager=\"txManager\">\n   \
    \     <tx:attributes>\n            <!-- all methods starting with 'list' fetch\
    \ data from db, hence read-only -->\n            <tx:method name=\"list*\" read-only=\"\
    true\"/>\n            <!-- other methods use the default transaction propagation\
    \ attribute REQUIRES -->\n            <tx:method name=\"underwrite*\"/>\n    \
    \        <tx:method name=\"update*\" propagation=\"REQUIRES_NEW\"/>\n        </tx:attributes>\n\
    \    </tx:advice>\n\n    <!-- DataSource -->\n    <!-- Platform Transaction Manager,\
    \ in this straight jdbd -->\n    <bean id=\"txManager\" class=\"org.springframework.jdbc.datasource.DataSourceTransactionManager\"\
    >\n        <property name=\"dataSource\" ref=\"dataSource\"/>\n    </bean>\n\n\
    \    <aop:config>\n        <aop:pointcut id=\"uwrServiceMethods\"\n          \
    \            expression=\"execution(* com.apress.einsure.business.*.Underwriting*.*(..))\"\
    />\n        <aop:advisor advice-ref=\"txAdvice\" pointcut-ref=\"uwrServiceMethods\"\
    />\n    </aop:config>\n\n    <!-- other beans -->\n</beans>\n```\n\nThe transaction\
    \ attributes have been set with the AOP advice. All methods starting with `list`\
    \ are read-only and do not participate in transactions. Methods starting with\
    \ `underwrite` are associated with a default transactional propagation attribute\
    \ of `REQUIRED`.\n\nThis is similar to the EJB transaction setting. An invocation\
    \ of the `underwriteNewpolicy` method on `UnderwritingApplicationService` will\
    \ result in this method, either starting a new transaction or joining an existing\
    \ transaction. Similarly, any `update` method will run in a new transaction scope.\n\
    \nUnlike in EJBs, the Spring Framework supports a declarative rollback configuration\
    \ as well. In general, if a `Runtime` exception (or its subclass) is thrown from\
    \ the POJO application service method, Spring will mark that transaction for rollback.\
    \ It is possible to specify the exceptions that will result in rollback. You can\
    \ also configure the exceptions that will not cause a rollback, as shown in Listing\
    \ 6-33.\n\n**Listing 6-33.** `transaction-config.xml`\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<beans\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"\n        http://www.springframework.org/schema/beans\n\
    \        http://www.springframework.org/schema/beans/spring-beans-2.5.xsd\n  \
    \      http://www.springframework.org/schema/tx\n        http://www.springframework.org/schema/tx/spring-tx-2.5.xsd\n\
    \        http://www.springframework.org/schema/aop\n        http://www.springframework.org/schema/aop/spring-aop-2.5.xsd\"\
    >\n\n    <!-- this is the service object on which the transaction has to be applied\
    \ -->\n    <bean name=\"uwrAppService\"\n          class=\"com.apress.einsure.business.impl.UnderwritingApplicationServiceImpl\"\
    >\n    </bean>\n\n    <!-- the transactional advice decides what needs to be done\
    \ -->\n    <tx:advice id=\"txAdvice\" transaction-manager=\"txManager\">\n   \
    \     <tx:attributes>\n            <!-- all methods starting with 'list' fetch\
    \ data from db, hence read-only -->\n            <tx:method name=\"list*\" read-only=\"\
    true\"/>\n            <!-- other methods use the default transaction propagation\
    \ attribute REQUIRES -->\n            <tx:method name=\"underwrite*\" rollback-for=\"\
    ProductRuleViolationException\"/>\n            <tx:method name=\"update*\" propagation=\"\
    REQUIRES_NEW\"\n                       no-rollback-for=\"TruncatedFirstNameException\"\
    />\n        </tx:attributes>\n    </tx:advice>\n\n    <!-- other beans -->\n</beans>\n\
    ```\n\n## Consequences\n\n### Benefits\n\n- Declarative transaction support has\
    \ no impact on existing source code.\n- With the Spring declarative transaction\
    \ and different transaction manager support, the same application can be switched\
