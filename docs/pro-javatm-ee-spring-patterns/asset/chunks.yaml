    为 Tomcat 设置和使用 Maven 插件是一项复杂的任务。此外，你可能对使用该插件的 alpha 版本有所保留。而且，你可能不喜欢更改 Tomcat
    管理器用户密码并将其设置为空的想法。这个插件已经存在了一段时间，尽管是 alpha 状态，但一直运行良好。当你未使用持续集成，或者在无法访问 Eclipse
    且需要从命令行执行所有 Maven 目标的暂存环境中，它尤其有用。


